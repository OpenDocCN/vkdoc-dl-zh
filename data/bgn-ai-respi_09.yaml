- en: It is time to focus on how to configure this ANN now that the data set input
    and training sets have been developed.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在数据集输入和训练集已经开发出来，是时候关注如何配置这个ANN了。
- en: Configuring the ANN for Handwritten Number Detection
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置用于手写数字检测的ANN
- en: The first step in this process is to decide on the basic ANN configuration.
    I have primarily used three-layer ANNs up to this point and I see no real reason
    to change that approach. The number of output nodes is determined to be 10 based
    on the previous discussion. What remains is to figure out the number of input
    and hidden nodes to create.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程的第一个步骤是决定基本ANN配置。到目前为止，我主要使用三层ANN，我认为没有真正的理由改变这种方法。根据之前的讨论，输出节点的数量确定为10。剩下的是确定要创建的输入和隐藏节点的数量。
- en: Figuring out the number of input nodes is relatively easy because there are
    784 separate pixel values that must be examined. This means that the ANN needs
    784 input nodes. That seems like a lot, but the nature of this problem dictates
    that is the number required to take advantage of all the data present in the problem
    domain.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 确定输入节点数相对容易，因为必须检查784个单独的像素值。这意味着ANN需要784个输入节点。这看起来很多，但这个问题的本质决定了这是利用问题域中所有数据的所需数量。
- en: 'Determining the number of nodes in the hidden layer is a more difficult issue
    to resolve. There is no analytic method available to determine the appropriate
    number. I have done a fair amount of research on this topic and have determined
    that most AI researchers use a variety of “rules of thumb” to determine this number.
    The following are among the most common:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 确定隐藏层节点数是一个更难以解决的问题。没有可用的分析方法来确定适当的数量。我在这个主题上做了一些研究，并确定大多数人工智能研究人员使用各种“经验法则”来确定这个数字。以下是最常见的几种：
- en: Use the mean of the input layer nodes (N[i]) and output layer nodes (N[o]).
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用输入层节点（N[i]）和输出层节点（N[o]）的平均值。
- en: Take the square root of N[i] times N[o].
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 取N[i]乘以N[o]的平方根。
- en: The number of hidden layer nodes (N[h]) should be between the size of the N[i]
    and N[o].
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐藏层节点数（N[h]）应该在N[i]和N[o]的大小之间。
- en: Nh should be 2/3 the size of N[i] plus N[o].
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Nh应该是N[i]的2/3加上N[o]。
- en: Nh should be less than twice the size of the N[i].
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Nh应该小于N[i]的两倍。
- en: One fact that became abundantly clear to me is that an ANN configuration often
    turns into a trial-and-error situation. There are two related terms that you should
    be familiar with and those are under-fitting and over-fitting. Under-fitting happens
    in an ANN when there are too few nodes present to support adequate training. The
    symptoms of under-fitting are that the ANN cannot be trained and/or the error
    is high enough to render the ANN unusable. The converse is true of over-fitting,
    in which there is a surplus of nodes, training is hampered by too many links,
    and the ANN performance suffers. When over-fitting occurs, the ANN has so much
    information processing capacity that the limited amount of data contained in the
    training set is not sufficient to train all the nodes in the hidden layer. Additionally,
    a large number of unneeded nodes in the hidden layer increases the time that it
    takes to train the network. This increased training time can make it impossible
    to adequately train the ANN. To achieve optimal performance, the goal is to neither
    under-fit nor over-fit an ANN.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 一个对我来说非常明显的事实是，人工神经网络（ANN）的配置往往变成了一种试错过程。有两个相关的术语你应该熟悉，那就是欠拟合和过拟合。在ANN中，当节点太少以至于无法支持足够的训练时，就会发生欠拟合。欠拟合的症状是ANN无法训练，或者错误率足够高以至于使ANN无法使用。相反，过拟合的情况则相反，节点过多，训练受到过多链接的阻碍，ANN的性能受到影响。当发生过拟合时，ANN的信息处理能力如此之强，以至于训练集中包含的有限数据量不足以训练隐藏层中的所有节点。此外，隐藏层中大量不必要的节点增加了训练网络所需的时间。这种增加的训练时间可能使得无法充分训练ANN。为了实现最佳性能，目标是既不欠拟合也不过拟合ANN。
- en: 'Based on the preceding discussion and my research, I came to the following
    conclusion on setting the appropriate number of hidden layer nodes :'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 基于前面的讨论和我的研究，我得出以下关于设置适当数量的隐藏层节点的结论：
- en: The number of hidden layer nodes in a three-layer ANN should be set at the square
    of the number of output nodes, but should not exceed the mean of the input and
    output layer nodes.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在三层ANN中，隐藏层节点数应设置为输出节点数的平方，但不应超过输入层和输出层节点数的平均值。
- en: This conclusion might be considered a “mashup” of the various rules of thumb
    stated earlier. I have also noted anecdotally that there seems to be a squaring
    relationship that often pops up in ANN technology. This relationship was present
    when the mean was calculated for the initial weighting and when the error function
    slope was calculated. Squaring the 10 output nodes means that 100 hidden layer
    nodes should be set. This value seems appropriate for an initial try. It can easily
    be changed if the ANN performs poorly.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这个结论可能被认为是前面提到的各种经验法则的“混合体”。我还注意到，在ANN技术中似乎经常出现平方关系。这种关系在计算初始权重平均值和计算错误函数斜率时都存在。将10个输出节点平方意味着应该设置100个隐藏层节点。这个值似乎是一个初始尝试的合适值。如果ANN表现不佳，这个值可以很容易地改变。
