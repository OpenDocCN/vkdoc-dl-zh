- en: 'Demo 9-1: MNIST Data Set'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示9-1：MNIST数据集
- en: I will show you how an ANN can recognize handwritten numbers. The training and
    test data used in this project come directly from two Mixed National Institute
    of Standards and Technology (MNIST) databases. These databases have been widely
    used for training and testing ANNs for many years and are an accepted standard
    for rating how accurate a particular ANN is for accomplishing a task.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我将向您展示一个人工神经网络（ANN）如何识别手写数字。本项目使用的训练和测试数据直接来自两个混合国家标准与技术研究院（MNIST）数据库。这些数据库多年来一直被广泛用于训练和测试ANN，并且是评估特定ANN完成特定任务准确性的一个公认标准。
- en: The genesis for the MNIST databases comes from input images taken from handwritten
    numeric symbols by 500 people, half of which were US Census Bureau employees and
    the other half were high school students. The original black-and-white images
    were also normalized to fit a 20 × 20-pixel-image bounding block and further anti-aliased,
    which generated a one-byte grayscale value for each pixel. What this means will
    be made very clear to you shortly.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST数据库的起源来自于500人手写的数字符号输入图像，其中一半是美国人口普查局的员工，另一半是高中生。原始的黑白图像也被标准化以适应20 × 20像素图像边界块，并进一步抗锯齿，这为每个像素生成了一个字节的灰度值。这究竟意味着什么将在稍后向您解释清楚。
- en: 'The MNIST data sets are quite large, consisting of 60,000 training images (104MB)
    and 10,000 testing images (18MB). Both data sets are freely available in a comma-separated
    value (CSV) format from the following websites:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST数据集相当大，包括60,000个训练图像（104MB）和10,000个测试图像（18MB）。这两个数据集都可以从以下网站免费获取，以逗号分隔值（CSV）格式：
- en: 'Training set: [`http://www.pjreddie.com/media/files/mnist_train.csv`](http://www.pjreddie.com/media/files/mnist_train.csv)'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练集：[`http://www.pjreddie.com/media/files/mnist_train.csv`](http://www.pjreddie.com/media/files/mnist_train.csv)
- en: 'Test set: [`http://www.pjreddie.com/media/files/mnist_test.csv`](http://www.pjreddie.com/media/files/mnist_test.csv)'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试集：[`http://www.pjreddie.com/media/files/mnist_test.csv`](http://www.pjreddie.com/media/files/mnist_test.csv)
- en: The training set should be used to train the ANN. All the included records are
    labeled, meaning that the CSV data is identified with the corresponding image
    it is representing. The test set is used to check how well the ANN functions in
    recognizing test CSV data. The test data set also contains labels as an aid to
    verify whether the ANN successfully identified the correct number. Separating
    training from test data is always a good idea because the ANN could return stored
    patterns if the training data was also the test data. This situation would not
    be a good indicator of how well the ANN actually learned.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 训练集应用于训练人工神经网络（ANN）。所有包含的记录都有标签，这意味着 CSV 数据与它所代表的图像相对应。测试集用于检查 ANN 在识别测试 CSV
    数据方面的表现。测试数据集还包含标签，作为验证 ANN 是否成功识别正确数字的辅助。将训练数据与测试数据分开总是个好主意，因为如果训练数据也是测试数据，ANN
    可能会返回存储的模式。这种情况并不能很好地表明 ANN 实际上学习得如何。
- en: Figure [9-1](#Fig1) shows only the beginning of the first record contained in
    the training data set as displayed by a hex editor application running on my MacBook
    Pro.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-1](#Fig1) 显示了由运行在我的 MacBook Pro 上的十六进制编辑器应用程序显示的训练数据集中的第一条记录的开头部分。
- en: '![A436848_1_En_9_Fig1_HTML.jpg](A436848_1_En_9_Fig1_HTML.jpg)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig1_HTML.jpg](A436848_1_En_9_Fig1_HTML.jpg)'
- en: Figure 9-1.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-1.
- en: A portion of the first record in the MNIST training data set
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 训练数据集的第一条记录的一部分
- en: 'There are 784 bytes composing one image because each image in the database
    has been resized to 28 × 28 pixels or 784 overall. Each pixel value represents
    the equivalent grayscale value of a pixel. One byte has a numeric range of 0 to
    255, where 0 is total white and 255 is total black. Each database image therefore
    consists of 784 pixel values, 785 commas, and 1 byte for the label, which sums
    to 1570 bytes overall. While one record of this size is not too hard to handle,
    having more than 60,000 of them in one file tends to overload most programs, especially
    programs that are expected to run on a Raspberry Pi. Fortunately, there are two
    very small subsets of both the larger MNIST train and the test data sets, which
    are available at the following websites :'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 一张图像由 784 个字节组成，因为数据库中的每张图像都已被调整到 28 × 28 像素或总共 784 个像素。每个像素值代表一个像素的等效灰度值。一个字节的数值范围是
    0 到 255，其中 0 是全白，255 是全黑。因此，每个数据库图像由 784 个像素值、785 个逗号和 1 个用于标签的字节组成，总共 1570 个字节。虽然单个这样的记录处理起来并不困难，但一个文件中超过
    60,000 个这样的记录往往会超载大多数程序，尤其是那些预期在树莓派上运行的程序。幸运的是，较大的 MNIST 训练和测试数据集都有两个非常小的子集，这些子集可以在以下网站上找到：
- en: Test data set [`https://raw.githubusercontent.com/makeyourownneuralnetwork/makeyourownneuralnetwork/master/mnist_dataset/mnist_test_10.csv`](https://raw.githubusercontent.com/makeyourownneuralnetwork/makeyourownneuralnetwork/master/mnist_dataset/mnist_test_10.csv)
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试数据集 [https://raw.githubusercontent.com/makeyourownneuralnetwork/makeyourownneuralnetwork/master/mnist_dataset/mnist_test_10.csv](https://raw.githubusercontent.com/makeyourownneuralnetwork/makeyourownneuralnetwork/master/mnist_dataset/mnist_test_10.csv)
- en: Train data set [`https://raw.githubusercontent.com/makeyourownneuralnetwork/makeyourownneuralnetwork/master/mnist_dataset/mnist_train_100.csv`](https://raw.githubusercontent.com/makeyourownneuralnetwork/makeyourownneuralnetwork/master/mnist_dataset/mnist_train_100.csv)
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练数据集 [https://raw.githubusercontent.com/makeyourownneuralnetwork/makeyourownneuralnetwork/master/mnist_dataset/mnist_train_100.csv](https://raw.githubusercontent.com/makeyourownneuralnetwork/makeyourownneuralnetwork/master/mnist_dataset/mnist_train_100.csv)
- en: 'I opened both downloaded data sets using the hex editor and they appeared to
    be just fine. However, to use the data in a Python script, you need to use some
    statements to access these data sets. The following Python statements instantiate
    a file object named `dataFile`, read the data line by line into a list object
    named `dataList`, and finally close the file. These statement types are a very
    common way to read data files with Python :'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用十六进制编辑器打开了两个下载的数据集，它们看起来都很正常。然而，要在 Python 脚本中使用这些数据，你需要使用一些语句来访问这些数据集。以下
    Python 语句创建了一个名为 `dataFile` 的文件对象，将数据逐行读入一个名为 `dataList` 的列表对象，并最终关闭文件。这些语句类型是使用
    Python 读取数据文件的非常常见的方式：
- en: '[PRE0]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Figure [9-2](#Fig2) shows an interactive session on a Raspberry Pi where I used
    the preceding statements to create the `dataList` object.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-2](#Fig2) 显示了在树莓派上使用前面的语句创建 `dataList` 对象的交互式会话。
- en: '![A436848_1_En_9_Fig2_HTML.jpg](A436848_1_En_9_Fig2_HTML.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig2_HTML.jpg](A436848_1_En_9_Fig2_HTML.jpg)'
- en: Figure 9-2.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-2.
- en: Interactive Python session creating a dataList object
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 dataList 对象的交互式 Python 会话
- en: I ran the Python session in the same directory where the MNIST data set was
    located. If you do not have the data set in the same directory, then you have
    to prepend the appropriate path to the MNIST data set name to avoid the Python
    error of not finding the file.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我在MNIST数据集所在的同一目录中运行了Python会话。如果你没有在同一个目录中拥有数据集，那么你必须将适当的路径添加到MNIST数据集名称之前，以避免Python找不到文件的错误。
- en: You may start examining the data once it has been read. I entered `len(dataList)`
    to find out the number of records that were put into the `dataList` object. The
    return value was `100`, as expected. Figure [9-3](#Fig3) shows this statement
    along with a display of the first record, which I directed by entering `dataList[0]`.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦数据被读取，你就可以开始检查数据。我输入了`len(dataList)`来找出被放入`dataList`对象中的记录数。返回值是`100`，正如预期的那样。图[9-3](#Fig3)展示了这一语句以及第一个记录的显示，这是通过输入`dataList[0]`来实现的。
- en: '![A436848_1_En_9_Fig3_HTML.jpg](A436848_1_En_9_Fig3_HTML.jpg)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig3_HTML.jpg](A436848_1_En_9_Fig3_HTML.jpg)'
- en: Figure 9-3.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-3。
- en: dataList properties
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: dataList属性
- en: If you closely examine the `datalist[0]` display in the figure, you probably
    see that the data begins and ends with apostrophes. This indicates that the `dataList[0]`
    record is recognized as a string by the Python interpreter. It may look like numbers
    but it is considered just a string of ASCII characters according to Python. The
    character just before the ending apostrophe is `\n`, which is the “escaped” letter
    `n`. This indicates to Python that the first record ends and it should place a
    new line at that point. New line characters are delimiters for the record set,
    telling Python where one record ends and the next begins. All 100 records are
    indexed, meaning they may be individually accessed by using the appropriate index
    number along the list name, as I did to access the first record (i.e., `dataList[0]`).
    The indices are 0 based, ranging from 0 to 99 in this case.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仔细检查图中的`datalist[0]`显示，你可能看到数据以撇号开始和结束。这表明`dataList[0]`记录被Python解释器识别为字符串。它看起来像数字，但根据Python，它被认为只是一个ASCII字符的字符串。结束撇号前的字符是`\n`，这是“转义”的字母`n`。这告诉Python第一个记录结束，并且它应该在这一点放置一个新行。换行符是记录集的分隔符，告诉Python一个记录在哪里结束，下一个记录在哪里开始。所有100条记录都是索引的，这意味着可以通过使用列表名称旁边的适当索引号单独访问它们，就像我用来访问第一个记录（即`dataList[0]`）那样。索引是从0开始的，在这个例子中范围从0到99。
- en: Next, I show you how to image a record, instead of simply looking at sterile
    numbers that make little to no sense.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将向你展示如何想象一个记录，而不仅仅是看那些毫无意义的数字。
- en: Imaging a MNIST Record
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 想象一个MNIST记录
- en: 'It is actually fairly easy to image a data record using a few Python commands.
    I used the Python GUI IDLE 2 to accomplish the next steps. A GUI environment is
    necessary to show the resultant image. You can use the Python 3 GUI if so desired,
    but you need to modify the following installation statements for Python 3\. The
    matplotlib library is required to create and display the image; more specifically,
    the `imshow` and `show` methods contained in the pyplot package, which is part
    of the overall matplotlib library . Enter the following commands to install the
    matplotlib library:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，使用几个Python命令来想象一个数据记录相当容易。我使用Python GUI IDLE 2来完成下一步。一个GUI环境是必要的，以便显示结果图像。如果你愿意，可以使用Python
    3 GUI，但需要修改以下Python 3的安装语句。需要matplotlib库来创建和显示图像；更具体地说，是包含在matplotlib库中的pyplot包中的`imshow`和`show`方法。输入以下命令来安装matplotlib库：
- en: '[PRE1]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Once the installation is completed, you are ready to enter the next commands
    to read in the data from the 100-record, abbreviated data set. Enter these commands
    :'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，你就可以输入下一步的命令来读取来自100条记录的简略数据集。输入以下命令：
- en: '[PRE2]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The first two import commands are not needed for the data-read portion, but
    I always want to put any import statements at the start of a code block. The `dataFile`
    logical reference is created with the open statement and it points to the start
    of the 100-record file. The actual read happens with the next statement that reads
    in 100 separate records into a list object named `dataList`. The `readlines` method
    just reads one character after another until it encounters a new-line character
    (`\n`). At that instant, it creates a new record for the list and resumes the
    character-by-character reads until it encounters the end-of-file (EOF) character
    , which ceases the read process. The `close` method just “destroys” the `dataFile`
    logical reference so that the file will not be inadvertently modified.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 前两个导入命令在数据读取部分不是必需的，但我总是希望将任何导入语句放在代码块的开头。`dataFile`逻辑引用是通过open语句创建的，它指向100条记录文件的开始。实际的读取是通过下一个语句完成的，该语句将100个单独的记录读入名为`dataList`的列表对象中。`readlines`方法只是逐个字符读取，直到遇到换行符（`\n`）。在那个瞬间，它为列表创建一个新的记录，并继续逐个字符的读取，直到遇到文件结束（EOF）字符，这会停止读取过程。`close`方法只是“销毁”`dataFile`逻辑引用，这样文件就不会被意外修改。
- en: 'The script is set to image a selected record once the data set is in memory.
    The following code accomplishes this objective :'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦数据集存储在内存中，脚本就会设置为对选定的记录进行图像化。以下代码实现了这一目标：
- en: '[PRE3]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The first command creates a small list object named `record0` that consists
    of all 785 elements in the first record that were read into the large `dataList`
    object. There are 785 separate list elements in the `record0` object because the
    `split` method created them by using the comma delimiter as an indicator for separation.
    The second command uses the `imshow` method to create the image to be displayed.
    It starts with the second list element and it is a grayscale image that is shaped
    into a 28 × 28–pixel array. Note the spelling of `Greys` in the `imshow` argument
    list. Finally, the `show` method actually displays the image in the IDLE 2 GUI.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个命令创建了一个名为`record0`的小列表对象，它包含读入大`dataList`对象中的第一个记录的所有785个元素。`record0`对象中有785个单独的列表元素，因为`split`方法通过使用逗号分隔符作为分隔的指示符来创建了它们。第二个命令使用`imshow`方法创建要显示的图像。它从第二个列表元素开始，它是一个28
