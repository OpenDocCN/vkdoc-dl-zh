- en: '9. Machine Learning: Practical ANN Demonstrations'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 机器学习：实用的ANN演示
- en: This is the final chapter in the series exploring machine learning. I demonstrate
    two practical examples of an artificial neuron network (ANN) based on the concepts
    and Python implementations discussed in the previous chapters. You should review
    the material in at least the two previous chapters to gain the most benefit from
    reading and even duplicating this chapter’s demonstrations.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 这是探索机器学习的系列中的最后一章。我展示了基于前几章讨论的概念和Python实现的两个实际的人工神经网络（ANN）的例子。您应该至少回顾前两章的内容，以便从阅读和复制本章的演示中获得最大收益。
- en: I would like to give much credit to Tariq Rashid, whose book Make Your Own Neural
    Network (CreateSpace Independent Publishing Platform, 2016) was a source of inspiration
    and guidance for me in preparing this and other chapters in my book. I highly
    recommend Tariq’s book to readers who wish to gain more insight into practical
    ANNs. Tariq also has a blog at [`http://makeyourownneuralnetwork.blogspot.co.uk/`](http://makeyourownneuralnetwork.blogspot.co.uk/)
    , which I found to be a highly useful source of information and lively discussions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常感谢Tariq Rashid，他的书籍《Make Your Own Neural Network》（CreateSpace Independent
    Publishing Platform，2016年）为我准备本书和其他章节提供了灵感和指导。我强烈推荐Tariq的书籍给那些希望深入了解实际ANN的读者。Tariq还有一个博客在[`http://makeyourownneuralnetwork.blogspot.co.uk/`](http://makeyourownneuralnetwork.blogspot.co.uk/)，我发现这是一个非常有用的信息来源和充满活力的讨论平台。
- en: The demonstrations in this chapter are centered on recognizing handwritten numbers.
    They are classic ANN projects that fully demonstrate the learning capability of
    an ANN.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的演示主要集中在识别手写数字上。它们是经典的ANN项目，充分展示了ANN的学习能力。
