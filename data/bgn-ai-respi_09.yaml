  zh: 以下代码段创建了一个样本训练数组，该数组用于更新ANN权重，以便它可以识别特定的数字。让我们使用之前讨论的现实输入值创建小MNIST训练数据集的第一条记录的训练数组。Python代码非常简单，如下所示：
