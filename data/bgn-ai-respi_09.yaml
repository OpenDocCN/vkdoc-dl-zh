  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我将讨论如何准备数据集，以便它们可以有效地与ANN一起使用。
- en: Adjusting the Input and Output Data Sets
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调整输入和输出数据集
- en: 'You certainly know that all MNIST data sets contain values ranging from 0 to
    255, which is well beyond the range that any ANN that I have developed so far
    can accept. The input values should be in a preferred range of 0.01 to 1.0, which
    matches the sigmoid function input requirements quite nicely. The following Python
    statement adjusts the values range for a MNIST data set record to match the preferred
    range for an ANN input data set:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 您当然知道所有MNIST数据集包含从0到255的值，这远远超出了我迄今为止开发的任何ANN可以接受的范围。输入值应该在0.01到1.0的优选范围内，这与sigmoid函数的输入要求非常吻合。以下Python语句调整MNIST数据集记录的值范围，以匹配ANN输入数据集的优选范围：
- en: '[PRE4]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Figure [9-6](#Fig6) shows an adjusted record set created in an interactive Python
    session. A portion of the record set is also shown in the screenshot, confirming
