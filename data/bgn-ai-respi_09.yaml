  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图[9-6](#Fig6)显示了在交互式Python会话中创建的调整后的记录集。记录集的一部分也显示在屏幕截图上，确认新的MNIST值在所需的输入值范围内。
- en: '![A436848_1_En_9_Fig6_HTML.jpg](A436848_1_En_9_Fig6_HTML.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig6_HTML.jpg](A436848_1_En_9_Fig6_HTML.jpg)'
