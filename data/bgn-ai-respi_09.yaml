  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig10_HTML.jpg](A436848_1_En_9_Fig10_HTML.jpg)'
- en: Figure 9-10.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-10.
- en: trainANN output with test inputs
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: trainANN输出与测试输入
- en: Table [9-2](#Tab2) neatly summarizes the results comparing the label value with
    the index of the highest value in the output array.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [9-2](#Tab2) 清晰地总结了将标签值与输出数组中最高值的索引进行比较的结果。
- en: Table 9-2.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 表 9-2.
- en: Test Results
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 测试结果
- en: '| Label | 7 | 2 | 1 | 0 | 4 | 1 | 4 | 9 | 5 | 9 |'
  id: totrans-122
  prefs: []
  type: TYPE_TB
  zh: '| 标签 | 7 | 2 | 1 | 0 | 4 | 1 | 4 | 9 | 5 | 9 |'
- en: '| Index | 7 | 3 | 1 | 0 | 4 | 1 | 7 | 6 | 0 | 7 |'
  id: totrans-123
  prefs: []
  type: TYPE_TB
  zh: '| 索引 | 7 | 3 | 1 | 0 | 4 | 1 | 7 | 6 | 0 | 7 |'
- en: '| Match | x |   | x | x | x | x |   |   |   |   |'
  id: totrans-124
  prefs: []
  type: TYPE_TB
  zh: '| 匹配 | x |   | x | x | x | x |   |   |   |'
- en: The 50 percent was rather disappointing, but maybe that was to be expected because
    the ANN was trained with only 100 records out of more than 60,000 available for
    training. I did notice that the output values were fairly high for those records
    that matched, whereas the ones that didn’t match had a uniform spread of random-like
    values.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 50%的结果相当令人失望，但也许这是可以预料的，因为ANN只使用了60,000多条训练记录中的100条进行训练。我确实注意到，对于匹配的记录，输出值相当高，而那些不匹配的记录则具有随机值均匀分布的特点。
- en: 'I next slightly modified the code to automatically calculate the success rate,
    especially considering that I was going to run 10,000 test records through and
    I did not want to manually calculate that test run. I also deleted the display
    code for the output arrays. The following code implements these changes :'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我随后稍微修改了代码，以自动计算成功率，特别是考虑到我打算运行10,000个测试记录，而且我不想手动计算那个测试运行。我还删除了输出数组的显示代码。以下代码实现了这些更改：
- en: '[PRE11]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: I ran the trainANN script six times and saw some interesting results, as shown
    in Figure [9-11](#Fig11).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我运行了trainANN脚本六次，并看到了一些有趣的结果，如图 [9-11](#Fig11) 所示。
- en: '![A436848_1_En_9_Fig11_HTML.jpg](A436848_1_En_9_Fig11_HTML.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig11_HTML.jpg](A436848_1_En_9_Fig11_HTML.jpg)'
- en: Figure 9-11.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-11.
- en: trainANN script with success rate calculations
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 带有成功率计算的trainANN脚本
- en: 'The success rate varied from 0.4 to 0.6; it used the same test input data set.
    The only reasonable explanation is that some weight matrices were better fitted
    than others were. These matrices are generated using a random normal distribution,
    as I discussed in Chapter [8](A436848_1_En_8_Chapter.html), and apparently, some
    are slightly better suited to produce more accurate results than others are. Let’s
    hope that these random variations disappear when the ANN is trained using the
    full 60,000 training record set. To use the 60,000 record set only requires the
    following change to the file’s `open` statement in the trainANN.py script :'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 成功率在0.4到0.6之间变化；使用了相同的测试输入数据集。唯一合理的解释是，某些权重矩阵比其他矩阵更适合。这些矩阵是使用随机正态分布生成的，正如我在第[8](A436848_1_En_8_Chapter.html)章中讨论的那样，显然，有些稍微更适合产生比其他更准确的结果。让我们希望当使用完整的60,000个训练记录集训练ANN时，这些随机变化会消失。要使用60,000个记录集，只需在trainANN.py脚本中的文件`open`语句中进行以下更改：
- en: '[PRE12]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: I made this change and reran the 10 test data records. I was pleasantly surprised
    that the success rate now equaled 0.90\. Incidentally, the Raspberry Pi took about
    5 minutes to process the full training set, which I didn’t think was very long
    for a quad-core, 1.2GHz processor.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我进行了这个更改并重新运行了10个测试数据记录。我很高兴地发现，现在的成功率达到了0.90。顺便说一下，树莓派处理完整的训练集大约花了5分钟，我觉得对于一个四核、1.2GHz的处理器来说并不算长。
- en: 'The next step is to run the full 10,000-record test data set. You can do that
    by again changing only one statement:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是运行完整的10,000个记录测试数据集。你可以通过再次更改一个语句来完成：
- en: '[PRE13]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: This time, the script took about 8 minutes to complete and displayed a very
    respectable 0.9381 success match rate.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，脚本大约花了8分钟来完成，并显示了一个非常令人尊重的0.9381成功匹配率。
- en: I next wanted to see wanted to see how the match success rate varied with different
    learning rates. To do this, I added a new loop around both the train and test
    code in the trainANN.py script, where the learn rate was changed in 0.1 increments
    from 0.1 to 0.9\. Figure [9-12](#Fig12) shows the results for this test.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我想看看匹配成功率如何随着不同的学习率而变化。为此，我在trainANN.py脚本中的训练和测试代码周围添加了一个新的循环，其中学习率以0.1的增量从0.1变化到0.9。图[9-12](#Fig12)显示了这次测试的结果。
- en: '![A436848_1_En_9_Fig12_HTML.jpg](A436848_1_En_9_Fig12_HTML.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig12_HTML.jpg](A436848_1_En_9_Fig12_HTML.jpg)'
- en: Figure 9-12.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-12.
- en: Match success rates with different learning rates
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 不同学习率下的匹配成功率
- en: The maximum success match rate of 0.9442 was for a learning rate equal to 0.1\.
    This is a very good recognition rate, comparable with many larger and more complex
    research-grade ANNs. I really believe that you will be pleased to have created
    such a well-performing ANN if you have duplicated what I have done to this point.
    I can say from personal experience that most college AI students have not accomplished
    what you have done in this chapter. You should be very happy with the background
    and education you have achieved to this point.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 当学习率等于0.1时，最大成功匹配率为0.9442。这是一个非常好的识别率，可以与许多更大、更复杂的科研级ANN相媲美。我真心相信，如果你复制了我到目前为止所做的一切，你会非常高兴地创建出这样一个表现良好的ANN。我可以从个人经验中说，大多数大学AI学生都没有在本章中完成你所做的事情。你应该对你的背景和教育感到非常满意。
- en: However, do not be timid about trying some additional experiments to see how
    the ANN performs with different parameters, including changing the number of hidden
    nodes. One technique that Tariq mentions in his book is the concept of epochs,
    where the ANN is trained multiple times using the same training data set. Each
    complete training cycle is termed an epoch. Tariq, as well as other AI researchers,
    have found that it is often possible to over-train an ANN, resulting in an overall
    poorer performance than could be expected from just running several epochs. The
    exact reason for this phenomenon is unknown, except that researchers do speculate
    that the ANN is over-fitted due to the excessive data inputs. See the previous
    the discussion regarding over-fitting, which explains the symptoms that appear
    with this type of training.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，不要因为尝试一些额外的实验而感到胆怯，以查看 ANN 在不同参数下的表现，包括更改隐藏节点的数量。Tariq 在他的书中提到的一种技术是“时代”的概念，即
    ANN 使用相同的训练数据集多次进行训练。每个完整的训练周期被称为一个时代。Tariq 以及其他 AI 研究人员发现，通常可以过度训练 ANN，导致整体性能比仅运行几个时代要差。这种现象的确切原因尚不清楚，除了研究人员推测
    ANN 由于数据输入过多而过度拟合。请参阅有关过度拟合的先前讨论，该讨论解释了这种训练类型出现的症状。
- en: The fun and interesting aspect of ANNs is that there is a lot of variety present,
    with which you can experiment to try to tweak out additional performance. While
    94 to 95 percent recognition accuracy is nothing to be ashamed of, it is also
    worthwhile to try to improve the ANN just a little more. You could also try building
    a convolutional ANN, which purportedly has a 98.5 percent success rate with the
    MNIST test data set. A blog by Dr. Adrian Rosebrock at [`www.pyimagesearch.com`](http://www.pyimagesearch.com)
    explains how this is done. It is a bit complicated, but using a great Python library
    named Keras, along with Adrian’s custom libraries, allows a rapid and trouble-free
    ANN build. These are highly recommended for those of you who want to go the extra
    step.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: ANN 的有趣和有趣之处在于存在很多多样性，您可以进行实验以尝试调整额外的性能。虽然 94 到 95% 的识别准确率没有什么可羞愧的，但尝试进一步提高
    ANN 的性能也是值得的。您还可以尝试构建卷积 ANN，据称在 MNIST 测试数据集上具有 98.5% 的成功率。Adrian Rosebrock 博士在
    [`www.pyimagesearch.com`](http://www.pyimagesearch.com) 的博客中解释了如何做到这一点。这有点复杂，但使用一个名为
    Keras 的优秀 Python 库以及 Adrian 的自定义库，可以快速且无故障地构建 ANN。这些对于想要更进一步的人来说非常推荐。
- en: In the next section, I show you a complementary project that uses a Pi Camera
    for handwritten number recognition.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我将向您展示一个互补项目，该项目使用 Pi 相机进行手写数字识别。
- en: 'Demo 9-2: Handwritten Number Recognition with a Pi Camera'
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示 9-2：使用 Pi 相机进行手写数字识别
- en: 'The very first thing you must do is ensure that the Pi Camera has been enabled
    in the Raspberry Pi configuration. The easiest way to do this is to run the raspi-config
    utility by entering the following command at the command line:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 您必须做的第一件事是确保 Pi 相机已在 Raspberry Pi 配置中启用。最简单的方法是通过在命令行中输入以下命令来运行 raspi-config
    工具：
- en: '[PRE14]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: You then see the menu displayed, as shown in Figure [9-13](#Fig13).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您会看到显示的菜单，如图 [9-13](#Fig13) 所示。
- en: '![A436848_1_En_9_Fig13_HTML.jpg](A436848_1_En_9_Fig13_HTML.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig13_HTML.jpg](A436848_1_En_9_Fig13_HTML.jpg)'
- en: Figure 9-13.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-13。
- en: raspi-config menu
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: raspi-config 菜单
- en: Select 6 Enable Camera. This option installs the drivers for the Pi Camera.
    The drivers enable the camera device and the Jessie operating system to work together.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 选择 6 启用相机。此选项安装 Pi 相机的驱动程序。驱动程序使相机设备和 Jessie 操作系统协同工作。
- en: The next step is to install the Pi Camera. The camera connects to the Raspberry
    Pi using a flex ribbon cable that should already be attached to the camera when
    purchased. The cable’s free end plugs into the camera serial interface (CSI) connector
    , which is located on the board and directly behind the RJ-45 connector. To plug
    in the cable, you must first carefully pull directly up on two black plastic tabs
    on each side of a slim plastic bar. Be very careful because this is a flimsy piece
    of plastic that can easily be broken from using too much force. The plastic piece
    will become loose, yet is still attached to the connector body.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是安装 Pi 相机。相机通过一根柔性扁平电缆连接到 Raspberry Pi，这根电缆在购买相机时应该已经连接到相机上。电缆的自由端插入到相机串行接口（CSI）连接器，该连接器位于电路板上，直接位于
    RJ-45 连接器后面。要插入电缆，您必须首先小心地直接向上拉起细塑料条两侧的两个黑色塑料卡扣。请非常小心，因为这是一个容易因用力过猛而损坏的塑料件。塑料件会变得松动，但仍附着在连接器本体上。
- en: Next, carefully insert the flex cable into the socket with the exposed, silver-colored
    contacts facing away from the RJ-45 connector. The blue backing on the ribbon
    cable should face the RJ-45 connector. Ensure that the cable is firmly seated
    at the bottom of the connector and that the cable is perpendicular to the board
    and not slanted in any way in the connector. Next, gently push down on the black
    plastic tabs to lock the cable in place. Note that there is no clicking or other
    noise to indicate the plastic piece is completely seated. Just use firm but gentle
    pressure to lock it in place. As a caution, I have noticed that the cable can
    become dislodged if the camera is moved about, causing the ribbon cable to slightly
    shift in the connector. If this happens, you usually see that the software reports
    that it cannot connect with the camera any more. If you see that error, just reseat
    the connector. Figure [9-14](#Fig14) is a close-up of the camera ribbon cable
    connected to the CSI connector.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，仔细将柔性电缆插入带有暴露的银色触点的插座中。电缆带上的蓝色背面应朝向RJ-45连接器。确保电缆在连接器的底部牢固就位，并且电缆与电路板垂直，在连接器中没有任何倾斜。接下来，轻轻按下黑色塑料卡扣以锁定电缆。请注意，没有咔哒声或其他噪音来指示塑料部件已完全就位。只需使用坚定但温和的压力将其锁定即可。作为警告，我注意到如果移动相机，电缆可能会松动，导致连接器中的电缆略微移动。如果发生这种情况，你通常会看到软件报告无法再与相机连接。如果你看到这个错误，只需重新安装连接器。图[9-14](#Fig14)是摄像机连接带连接到CSI连接器的特写。
- en: '![A436848_1_En_9_Fig14_HTML.jpg](A436848_1_En_9_Fig14_HTML.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig14_HTML.jpg](A436848_1_En_9_Fig14_HTML.jpg)'
- en: Figure 9-14.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-14。
- en: Camera ribbon cable connected
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 摄像机连接带已连接
- en: 'You will next need to install some Python libraries, which are required for
    taking pictures with Python. That task is easily accomplished by entering the
    following commands :'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你需要安装一些Python库，这些库是使用Python拍照所必需的。通过输入以下命令可以轻松完成这项任务：
- en: '[PRE15]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: You are ready to take pictures once all of the preceding is done. I will take
    you through a step-by-step Python interactive session to demonstrate how to image
    a handwritten number .
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成所有上述步骤后，你就可以拍照了。我将通过一个逐步的Python交互会话来演示如何对手写数字进行图像处理。
- en: First, you need a handwritten number as the subject. I suggest using a black,
    fine-point Sharpie to draw a single number on a piece of white paper that is approximately
    4 × 4 inches. I drew the number 9 as my subject. You can draw whatever number
    you want. Figure [9-15](#Fig15) shows my handwritten number.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要一个手写数字作为主题。我建议使用黑色细尖的Sharpie在约4 × 4英寸的白色纸上画一个数字。我用数字9作为我的主题。你可以画任何你想要的数字。图[9-15](#Fig15)显示了我的手写数字。
- en: '![A436848_1_En_9_Fig15_HTML.jpg](A436848_1_En_9_Fig15_HTML.jpg)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig15_HTML.jpg](A436848_1_En_9_Fig15_HTML.jpg)'
- en: Figure 9-15.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-15。
- en: Subject handwritten number
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 主题：手写数字
- en: 'It may look a bit odd because the image was captured using a monochrome effect
    from the Pi Camera, which I explain shortly. Take my word for the fact that the
    paper was white and the number was very dark. The following is the Python interactive
    session, with comments following each command:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来有点奇怪，因为图像是使用Pi Camera的单色效果捕获的，我将在稍后解释。请相信我，纸张是白色的，数字非常暗。以下是一个Python交互会话，每个命令后面都有注释：
- en: '[PRE16]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The picamera package contains all the modules needed to capture, save, and read
    images.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: picamera包包含所有用于捕获、保存和读取图像的模块。
- en: '[PRE17]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: This instantiates an object named `camera`, upon which the desired operations
    can be called.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这实例化了一个名为`camera`的对象，可以在其上调用所需的操作。
- en: '[PRE18]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: This command sets up the Pi Camera to take black-and-white images, which are
    more technically described as monochrome or even “shades of gray.”
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令设置Pi Camera以拍摄黑白图像，这在技术上描述为单色或甚至是“灰色阴影”。
- en: '[PRE19]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: The image is taken or captured with this command. In this case, it is stored
    in the current directory with the name `ninebw.jpg`. It is in the default high-resolution
    format of 1920 × 1080 pixels. I recommend that the piece of paper with the number
    on it be placed about 5 inches in front of the camera and supported such that
    it is perpendicular to the camera. The Pi Camera lens has a very wide angle, so
    it will completely fill the sensor with the subject at such a close distance.
    The resulting image will be drastically reduced and resized in the processing
    script.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此命令捕获或获取图像。在这种情况下，它以`ninebw.jpg`的名称存储在当前目录中。它以默认的高分辨率格式1920 × 1080像素。我建议将写有数字的纸张放在相机前方约5英寸处，并支撑使其垂直于相机。Pi相机镜头具有非常广的视角，因此在如此近的距离下，它将完全填满传感器。在处理脚本中，结果图像将被大幅缩小并调整大小。
- en: Figure [9-16](#Fig16) shows the Pi Camera version 2 in a clear plastic holder
    facing the paper with the number written on it. Incidentally, the inexpensive
    holder is available on Amazon.com.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-16](#Fig16) 展示了Pi Camera版本2在透明的塑料支架中面向写有数字的纸张。顺便说一句，这个价格低廉的支架在Amazon.com上有售。
- en: '![A436848_1_En_9_Fig16_HTML.jpg](A436848_1_En_9_Fig16_HTML.jpg)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig16_HTML.jpg](A436848_1_En_9_Fig16_HTML.jpg)'
- en: Figure 9-16.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-16.
- en: Pi Camera set up to capture image
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: Pi相机设置以捕获图像
- en: The complete interactive Python session that captures the number image is shown
    in Figure [9-17](#Fig17).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-17](#Fig17) 展示了捕获数字图像的完整交互式Python会话。
- en: '![A436848_1_En_9_Fig17_HTML.jpg](A436848_1_En_9_Fig17_HTML.jpg)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig17_HTML.jpg](A436848_1_En_9_Fig17_HTML.jpg)'
- en: Figure 9-17.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-17.
- en: Interactive Python session
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 交互式Python会话
- en: I modified the trainANN.py script so that it used the image Figure [9-15](#Fig15)
    as the test data input. The complete listing named trainANN_Image.py is shown
    next, with clarifying explanations following the listing.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我修改了trainANN.py脚本，使其使用图 [9-15](#Fig15) 作为测试数据输入。完整的列表trainANN_Image.py如下所示，其中在列表之后有解释说明。
- en: '[PRE20]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Please note that I did not have to change the basic ANN class to incorporate
    these modifications into the trainANN_Image script, which is a powerful reason
    for separating class definitions from the functional or application code.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，我无需更改基本ANN类，就可以将这些修改纳入trainANN_Image脚本中，这是将类定义与功能或应用代码分离的强大理由。
- en: The next discussion just concerns the changes that were made to the original
    trainAN.py script to accommodate the new imaging processing function.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个讨论仅涉及对原始trainAN.py脚本所做的更改，以适应新的图像处理功能。
- en: Modifying the trainAN.py Script
  id: totrans-187
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 修改trainAN.py脚本
- en: 'Start with the following command:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 从以下命令开始：
- en: '[PRE21]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The Python imaging library (PIL) and `Image`, one of its components, are required
    to process an image using Python.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Python处理图像需要Python图像库（PIL）及其组件之一`Image`。
- en: '[PRE22]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: These commands load the file, which is hard-coded in the script, and then proceeds
    to resize it to just a 28 × 28 pixels–sized image. The anti-alias argument ensures
    that no artifacts are created during the downsizing operation.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这些命令加载脚本中硬编码的文件，然后将其调整大小为28 × 28像素大小的图像。反走样参数确保在缩小操作过程中不会创建任何伪影。
- en: '[PRE23]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: This command converts the 784 pixel values into a list named `pixels`.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令将784个像素值转换为名为`pixels`的列表。
- en: '[PRE24]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The pixels list is then converted into an array suitable to be stored as a comma-separated
    array in a file named `test.csv`. This newly created file is then processed in
    exactly the same manner as all the other test files in the unmodified trainANN.py
    script.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将像素列表转换为适合存储在名为`test.csv`的文件中的逗号分隔数组。这个新创建的文件随后以与未修改的trainANN.py脚本中所有其他测试文件完全相同的方式进行处理。
- en: Figure [9-18](#Fig18) shows the output data array, in which you clearly see
    that the very last element is the highest of the entire array that corresponds
    to the ANN believing that it has recognize the number 9, which is the correct
    answer.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-18](#Fig18) 展示了输出数据数组，其中你可以清楚地看到最后一个元素是整个数组中最高的，这对应于ANN相信它已经识别出数字9，这是正确答案。
- en: '![A436848_1_En_9_Fig18_HTML.jpg](A436848_1_En_9_Fig18_HTML.jpg)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig18_HTML.jpg](A436848_1_En_9_Fig18_HTML.jpg)'
- en: Figure 9-18.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-18.
- en: Output data array
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 输出数据数组
- en: This demonstration took a considerable amount of effort to prepare and run to
    show that a Raspberry Pi–controlled camera coupled with a well-trained ANN can
    literally recognize a number written in a fashion it had never seen before.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这个演示需要相当多的准备和运行工作，以展示一个由Raspberry Pi控制的相机与一个训练有素的ANN结合使用，实际上可以识别出以前从未见过的以这种方式书写的数字。
- en: The final portion of this demonstration describes how to automate the image-recognition
    process.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 本演示的最后部分描述了如何自动化图像识别过程。
- en: Automated Number Recognition with an ANN
  id: totrans-203
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用ANN进行自动数字识别
- en: Automating the process of imaging with an ANN is a fairly simple task. I used
    an interrupt-driven structure wherein the image capture and processing is initiated
    by pressing a push button connected to one of the Raspberry Pi GPIO pins.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ANN自动处理图像的过程相对简单。我使用了一个中断驱动的结构，其中图像捕获和处理是通过按下连接到Raspberry Pi GPIO引脚之一的按钮来启动的。
- en: The first item is the hardware setup, which consists of connecting the Pi Camera,
    a push button, and an LED to the Raspberry Pi using the Pi Cobbler I/O adapter.
    Figure [9-19](#Fig19) is a Fritzing diagram showing the connections for the LED
    and push button to the Pi Cobbler.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 第一项是硬件设置，它包括使用Pi Cobbler I/O适配器将Pi相机、按钮和LED连接到Raspberry Pi。图[9-19](#Fig19)是一个Fritzing图，显示了LED和按钮连接到Pi
    Cobbler的连接方式。
- en: '![A436848_1_En_9_Fig19_HTML.jpg](A436848_1_En_9_Fig19_HTML.jpg)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig19_HTML.jpg](A436848_1_En_9_Fig19_HTML.jpg)'
- en: Figure 9-19.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-19。
- en: LED and push button connections
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: LED和按钮连接
- en: I saw no need for a separate schematic because the connections are clearly shown
    in Figure [9-19](#Fig19). The Pi Camera is connected as previously discussed.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为没有必要单独绘制电路图，因为连接已经在图[9-19](#Fig19)中清楚地显示了。Pi相机连接方式如前所述。
- en: There is a “forever loop” in the new script, which I named automatedImager.py,
    that simply flashes an LED while awaiting the interrupt signal to start the image
    processing. The complete script is listed next with indicating the new modifications
    from the trainANN_Image.py script.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 新脚本中有一个“永远循环”，我将其命名为automatedImager.py，它只是等待中断信号来启动图像处理时闪烁LED。完整的脚本列在下面，并指出了从trainANN_Image.py脚本中的新修改。
- en: '[PRE25]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Test Run
  id: totrans-212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试运行
- en: I set up the Pi Camera in exactly the same manner as I did for the manual test
    run. The LED started blinking after the training finished, indicating that the
    system was ready for a push button press to activate the image capture and ANN
    analysis. The results of the ANN test run are shown in Figure [9-20](#Fig20).
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 我将Pi相机设置成与手动测试运行完全相同的方式。训练完成后，LED开始闪烁，表明系统已准备好通过按下按钮来激活图像捕获和ANN分析。ANN测试运行的结果显示在图[9-20](#Fig20)中。
- en: '![A436848_1_En_9_Fig20_HTML.jpg](A436848_1_En_9_Fig20_HTML.jpg)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_9_Fig20_HTML.jpg](A436848_1_En_9_Fig20_HTML.jpg)'
- en: Figure 9-20.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-20。
- en: Automated test run output
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 自动测试运行输出
- en: The last array element was the highest value in the array, indicating that the
    ANN recognized the number as a 9, which is the correct number.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 数组中的最后一个元素是数组中的最大值，这表明人工神经网络（ANN）将这个数字识别为9，这是正确的数字。
- en: This project concludes the practical demonstrations that I wished to show you.
    You should consider them as a starting point for further experimentation and practice
    with ANNs.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目完成了我希望向您展示的实用演示。您应该把它们视为进一步实验和ANN实践的开始点。
- en: Summary
  id: totrans-219
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Two ANN demonstrations were presented in this chapter. These demonstrations
    showed how a trained ANN could recognize handwritten numbers. The training data
    set consisted of 60,000 records from the MNIST database.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了两个ANN演示。这些演示展示了经过训练的ANN如何识别手写数字。训练数据集由MNIST数据库中的60,000条记录组成。
- en: The first demonstration used 10,000 test data records from a database separate
    from the MNIST training database. It turned out that a three-layer ANN achieved
    a 94.5 percent successful recognition rate.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 第一项演示使用了来自与MNIST训练数据库不同的数据库中的10,000个测试数据记录。结果显示，三层ANN达到了94.5%的成功识别率。
- en: The second demonstration used a Pi Camera to recognize a handwritten number.
    A Python script converted a captured image into an input data record that successfully
    recognized the handwritten number.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 第二项演示使用了Pi相机来识别手写数字。一个Python脚本将捕获的图像转换为输入数据记录，成功识别了手写数字。
- en: A slightly modified version of the Python script was then demonstrated, which
    fully automated the image-recognition process.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 然后演示了一个略微修改过的Python脚本，它完全自动化了图像识别过程。
