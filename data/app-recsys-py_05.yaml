- en: Implementing Co-Clustering
  id: totrans-111
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现协同聚类
- en: Co-clustering (also known as *bi-clustering*) is commonly used in collaborative
    filtering. It is a data-mining technique that simultaneously clusters the columns
    and rows of a DataFrame/matrix. It differs from normal clustering, where each
    object is checked for similarity with other objects based on a single entity/type
    of comparison. As in co-clustering, you check for co-grouping of two different
    entities/types of comparison for each object simultaneously as a pairwise interaction.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 协同聚类（也称为 *双聚类*）在协同过滤中常用。它是一种数据挖掘技术，可以同时聚类 DataFrame/矩阵的列和行。它与基于单个实体/比较类型的正常聚类不同，在协同聚类中，你同时检查每个对象的两个不同实体/比较类型的分组，作为一个成对交互。
- en: Let’s try modeling with the co-clustering method.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试使用协同聚类方法进行建模。
