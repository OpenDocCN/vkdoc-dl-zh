- en: 11. Multi-model Arrangement
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 多模型排列
- en: '*Democracy cannot succeed unless those who express their choice are prepared
    to choose wisely. The real safeguard of democracy, therefore, is education.*'
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*民主若要成功，除非那些表达自己选择的人愿意明智地选择。因此，民主的真正保障是教育。*'
- en: ''
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Franklin D. Roosevelt, US President
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ——富兰克林·D·罗斯福，美国总统
- en: A single model calling all the shots on the final decisions is somewhat of a
    dictatorship. A dictator can be efficient, but often successful decisions are
    informed by a collective group of thinkers. *Multi-model arrangement* concerns
    the construction of model systems in which models interact in different ways to
    produce a theoretically more informed output.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 单一模型在最终决策中占据主导地位，这有点像独裁。独裁者可能效率很高，但通常成功的决策是由一群思考者共同决定的。*多模型排列*涉及构建模型系统，其中模型以不同的方式相互作用，以产生理论上更全面的结果。
- en: Different models offer different perspectives when modeling any datasets. Even
    though two models may obtain the same performance metric value, their *performance
    distributions* – that is, how their strengths and weaknesses are distributed across
    the dataset and the space of new data – are likely different. One particular model
    may be better suited toward certain types of samples or approaches prediction
    in broad strokes rather than thin slices. One model might be more aggressive and
    volatile with predictions, whereas a different one may be more conservative and
    reserved across samples.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的模型在建模任何数据集时提供不同的视角。即使两个模型可能获得相同的性能指标值，它们的*性能分布*——即它们的优势和劣势如何在数据集和新数据的空间中分布——可能不同。一个特定的模型可能更适合某些类型的样本或以粗线条预测而不是细切片来预测。一个模型可能在预测上更加激进和波动，而另一个模型可能在样本中更加保守和谨慎。
- en: Rather than just choosing one particular model, we can choose several different
    models to form a multi-model arrangement. We pass the input into the entire system,
    rather than a singular model, and aggregate the output to form a prediction informed
    by multiple different perspectives. Aggregating/ensembling models in well-designed
    ways can be incredibly effective, as has been demonstrated in previous chapters
    (notably, in the “Boosting and Stacking Neural Networks” section of Chapter [7](525591_1_En_7_Chapter.xhtml),
    on tree-Based models).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是仅仅选择一个特定的模型，我们可以选择几个不同的模型来形成一个多模型排列。我们将输入传递给整个系统，而不是单个模型，并将输出汇总以形成由多个不同视角所指导的预测。以精心设计的方式汇总/集成模型可以非常有效，这在之前的章节中已有证明（特别是在第
    [7](525591_1_En_7_Chapter.xhtml) 章的“提升和堆叠神经网络”部分，关于基于树的模型）。
- en: 'In this brief chapter, we will cover three key multi-model arrangement techniques:
    average weighting, input-informed weighting, and meta-evaluation. We will also
    discuss meta-evaluation, a multi-model arrangement technique that can be used
    to estimate model confidence/error in contexts where a probability is not easily
    available.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章简短的章节中，我们将介绍三种关键的多模型排列技术：平均加权、输入信息加权以及元评估。我们还将讨论元评估，这是一种多模型排列技术，可用于在概率不易获得的情况下估计模型置信度/误差。
- en: Average Weighting
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平均加权
- en: 'Average weighting is a fairly intuitive and simple method to aggregate the
    outputs of multiple models together. Given a set of model outputs ![$$ \left\{{\hat{y}}_1,{\hat{y}}_2,\dots,
    {\hat{y}}_n\right\} $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq1.png),
    we can simply take the average of the outputs to obtain an aggregate result ![$$
    \overline{\hat{y}} $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq2.png)
    (Figure [11-1](#Fig1)):'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 平均加权是一种相当直观且简单的方法，用于汇总多个模型的输出。给定一组模型输出 ![$$ \left\{{\hat{y}}_1,{\hat{y}}_2,\dots,
    {\hat{y}}_n\right\} $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq1.png)，我们可以简单地取输出的平均值以获得汇总结果
    ![$$ \overline{\hat{y}} $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq2.png)（图
    [11-1](#Fig1)）：
- en: '![$$ \overline{\hat{y}}=\frac{1}{n}{\sum}_{i=1}^n{\hat{y}}_i $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_Equa.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \overline{\hat{y}}=\frac{1}{n}{\sum}_{i=1}^n{\hat{y}}_i $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_Equa.png)'
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig1_HTML.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig1_HTML.png)'
- en: A flow diagram of average weighting. It presents input data with model A alpha,
    B beta, C gamma, and D delta and weighted output.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 平均加权的流程图。它展示了输入数据与模型 A 的 alpha、B 的 beta、C 的 gamma 和 D 的 delta 以及加权输出。
- en: Figure 11-1
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-1
- en: Averaging ensemble
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 集成平均
- en: For instance, say we have a Random Forest classifier, decision tree classifier,
    Gradient Boosting classifier, and neural network model trained on the Higgs Boson
    dataset. We can take the average of their outputs and hopefully obtain improved
    performance.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设我们有一个基于希格斯玻色子数据集训练的随机森林分类器、决策树分类器、梯度提升分类器和神经网络模型。我们可以取它们输出的平均值，并希望获得更好的性能。
- en: 'However, it is almost always true that some models are better than others.
    Models that are better should have a higher weight in the output. Rather than
    taking a simple average, we can take a *weighted average* by associating each
    model with a weighting coefficient representing how much of an impact it has on
    the final system output. Given a set of model weights {*w*[1], *w*[2], …, *w*[*n*]}
    and model outputs ![$$ \left\{{\hat{y}}_1,{\hat{y}}_2,\dots, {\hat{y}}_n\right\}
    $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq3.png), we
    can simply obtain a weighted average/linear combination ![$$ \overline{\hat{y}}
    $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq4.png) (Figure
    [11-2](#Fig2)):'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，几乎总是有些模型比其他模型更好。表现更好的模型应该在输出中具有更高的权重。与其简单地取平均值，我们还可以通过将每个模型与其表示其对最终系统输出影响程度的权重系数相关联来取加权平均。给定一组模型权重
    { *w*[1], *w*[2], …, *w*[*n*]} 和模型输出 ![$$ \left\{{\hat{y}}_1,{\hat{y}}_2,\dots,
    {\hat{y}}_n\right\} $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq3.png)，我们可以简单地获得加权平均/线性组合
    ![$$ \overline{\hat{y}} $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq4.png)（图
    [11-2](#Fig2)）：
- en: '![$$ \overline{\hat{y}}={\sum}_{i=1}^n{\hat{y}}_i\cdotp {w}_i $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_Equb.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \overline{\hat{y}}={\sum}_{i=1}^n{\hat{y}}_i\cdotp {w}_i $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_Equb.png)'
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig2_HTML.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图 11-2](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig2_HTML.png)'
- en: A flowchart of a weighted averaging ensemble. It presents the input data with
    model A alpha, B beta, C gamma, and D delta and weighted output.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 加权平均集成流程图。它展示了输入数据与模型 A 的 alpha、B 的 beta、C 的 gamma 和 D 的 delta 以及加权输出。
- en: Figure 11-2
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-2
- en: Weighted averaging ensemble
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 加权平均集成
- en: There are many approaches we can use to find the optimal model weighting set
    *w*. If the models are performing a regression or binary classification problem,
    we can train a Linear Regression model to predict the ground truth given a dataset
    of model outputs ![$$ \left\{{\hat{y}}_1,{\hat{y}}_2,\dots, {\hat{y}}_n\right\}
    $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq5.png) for
    each sample. This is quick to implement and train.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用许多方法来找到最佳模型权重集 *w*。如果模型执行回归或二分类问题，我们可以训练一个线性回归模型来预测给定模型输出数据集 ![$$ \left\{{\hat{y}}_1,{\hat{y}}_2,\dots,
    {\hat{y}}_n\right\} $$](../images/525591_1_En_11_Chapter/525591_1_En_11_Chapter_TeX_IEq5.png)
    的每个样本的真实值。这快速实现和训练。
- en: 'Note that it is considered good practice to train meta-models on the validation
    dataset, although the subject is up for debate. The logic is as such: when we
    actually deploy the model in a real-world setting, we want the meta-model to incorporate
    the predictions of models operating in a real-world setting (in which models may
    make mistakes), rather than in a training regime. However, this can require infeasible
    data splitting, especially in the context of small datasets. It is acceptable
    to train an aggregatory Linear Regression model to predict the training set labels
    given model predictions informed by the training set inputs, given that the models
    are not overfitting.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在验证数据集上训练元模型被认为是良好的实践，尽管这个主题值得讨论。逻辑是这样的：当我们实际上在现实世界环境中部署模型时，我们希望元模型包含在现实世界环境中运行的模型（其中模型可能会出错）的预测，而不是在训练环境中。然而，这可能需要不可行的数据分割，特别是在小数据集的背景下。如果模型没有过拟合，训练一个聚合线性回归模型来预测由训练集输入信息驱动的训练集标签是可接受的。
- en: Using Linear Regression is less suited for multiclass problems, because the
    model outputs one of many possible classes for each sample. One cannot simply
    average the predictions in a trivial way. Instead, we can use Bayesian optimization
    frameworks to find the optimal weighting for each model prediction.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 使用线性回归对于多分类问题不太合适，因为模型为每个样本输出许多可能的类别之一。不能简单地以平凡的方式平均预测。相反，我们可以使用贝叶斯优化框架来找到每个模型预测的最佳权重。
- en: To demonstrate, let’s consider the NASA Wildfire dataset. The objective is to
    categorize a satellite-observed wildfire into one of four types – presumed vegetation
    fire, active volcano, other static land source, or offshore – given collected
    satellite reading data.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示，让我们考虑NASA野火数据集。目标是根据收集到的卫星阅读数据，将卫星观测到的野火分类为四种类型之一——假设为植被火灾、活跃火山、其他静态陆地来源或海上。
- en: Let’s begin by creating an ensemble of classifiers and training each on the
    dataset (Listing [11-1](#PC1)).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先创建一个分类器集成，并在数据集（代码列表 [11-1](#PC1)）上对每个分类器进行训练。
- en: '[PRE0]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: For convenience, let’s write an ensemble class that simply weights all models’
    predictions the same. We begin by creating a set of blank votes for each sample
    to be predicted upon. Each model adds a “vote” for which class it predicts a certain
    sample falls into. We then choose the class that has the highest number of votes
    as the final class. All models have the same vote weight; this gives it the average
    ensembling quality (Listing [11-2](#PC2)).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了方便起见，让我们编写一个简单的集成类，该类对所有模型的预测结果赋予相同的权重。我们首先为每个要预测的样本创建一组空白投票。每个模型为它预测的某个样本属于哪个类别添加一个“投票”。然后我们选择获得投票数最多的类别作为最终类别。所有模型具有相同的投票权重；这赋予了它平均集成质量（代码列表
    [11-2](#PC2)）。
- en: '[PRE1]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As one may expect, the performance of such an ensemble is mediocre and worse
    than several of the top-performing models in isolation.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，这种集成性能平庸，甚至不如一些独立运行的顶级模型。
- en: We can modify our `AverageEnsemble` class to accept a set of model weights;
    rather than incrementing a vote for a class with `+1`, we increment it by the
    assigned vote weightage. This allows some models to have more general influence
    than others in determining the final outcome (Listing [11-3](#PC3)).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以修改我们的`AverageEnsemble`类以接受一组模型权重；而不是通过`+1`对某一类进行投票，我们通过分配的投票权重来增加它。这使得某些模型在确定最终结果时比其他模型具有更广泛的影响（代码列表
    [11-3](#PC3)）。
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'We can now use Hyperopt to optimize the set of `modelweights`. Our objective
    function creates a `WeightedAverageEnsemble` with the given set of models and
    the sampled set of parameters. We’ll consider a weighted ensemble to be better
    if the F1 score is higher. Because this is a multiclass problem but the F1 score
    is defined in original form for binary classification, we need to pass a mechanism
    by which to apply the F1 score to multiple classes. Specifying `average=''macro''`
    aggregates the F1 score intuitively: it is simply the average of the F1 scores
    for each of the individual classes (Listing [11-4](#PC4)).'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以使用Hyperopt来优化`modelweights`集。我们的目标函数创建了一个包含给定模型和参数样本的`WeightedAverageEnsemble`。我们将认为加权集成更好，如果F1分数更高。因为这是一个多类问题，但F1分数是以二分类的原始形式定义的，我们需要传递一个机制来将F1分数应用于多个类别。指定`average='macro'`直观地聚合F1分数：它只是每个单独类别的F1分数的平均值（代码列表
    [11-4](#PC4)）。
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Let’s demonstrate how we might do something similar with neural networks. Consider
    the following set of five different neural network model architectures: `modelA`,
    `modelB`, `modelC`, `modelD`, and `modelE` (Listing [11-5](#PC5)).'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们演示如何使用神经网络做类似的事情。考虑以下五个不同的神经网络模型架构：`modelA`、`modelB`、`modelC`、`modelD`和`modelE`（代码列表
    [11-5](#PC5)）。
- en: '[PRE4]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Each model has a different “spirit” or “character.” Some process inputs more
    bluntly and others more thoroughly. Some use one-dimensional convolutions, some
    use two-dimensional convolutions, and some use nonlinearity. Diversity makes for
    a strong ensemble (Figures [11-3](#Fig3) through [11-7](#Fig7)).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 每个模型都有不同的“精神”或“性格”。有些处理输入更为直接，而有些则更为彻底。有些使用一维卷积，有些使用二维卷积，还有些使用非线性。多样性使得集成（图
    [11-3](#Fig3) 至 [11-7](#Fig7)）更加强大。
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig7_HTML.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图7](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig7_HTML.png)'
- en: A flowchart of a model E design. It presents 11 levels with input 5 as input
    layer, dense 18, reshape 1, con v 1 d, con v 1 d 1, max pooling 1 d, con v 1 d
    2, con v 1 d 3, flatten 1, dense 19, and dense 20.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 模型E设计流程图。它展示了11个级别，输入5为输入层，密集层18，重塑1，一维卷积1，一维卷积1，一维最大池化1，一维卷积2，一维卷积3，扁平化1，密集层19和密集层20。
- en: Figure 11-7
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-7
- en: Model E architecture
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 模型E架构
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig6_HTML.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图6](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig6_HTML.png)'
- en: A flowchart of a model D design. It presents 11 levels with input 3 as input
    layer, dense 15, reshape, con v 2 d, con v 2 d 1, max polling 2 d, con v 2 d 2,
    con v 2 d 3, flatten, dense 16, and dense 17.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 模型D设计流程图。它展示了11个级别，输入3为输入层，密集层15，重塑，二维卷积2，二维卷积1，二维最大池化2，二维卷积2，二维卷积3，扁平化，密集层16和密集层17。
- en: Figure 11-6
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
