- en: Model B architecture
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 模型B架构
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig3_HTML.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig3_HTML.png)'
- en: A flowchart of a model A design. It presents 4 levels with input 1 as input
    layer, dense, dense 1, and dense 2.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 模型A设计的流程图。它展示了4个级别，输入1作为输入层，密集，密集1，和密集2。
- en: Figure 11-3
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-3
- en: Model A architecture
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 模型A架构
- en: Listing [11-6](#PC6) demonstrates the process of training each of these models.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[11-6](#PC6)展示了训练这些模型的过程。
- en: '[PRE5]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Since neural networks output probabilities (as opposed to ordinal integers representing
    classes used in scikit-learn models), we simply scale the probabilities by a weighting
    factor and add the predicted probabilities, choosing the class with the highest
    “continuous vote” as the final class (Listing [11-7](#PC7)).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 由于神经网络输出概率（与scikit-learn模型中使用的表示类别的序数整数相反），我们只需通过加权因子缩放概率并添加预测概率，选择“连续投票”最高的类别作为最终类别（列表[11-7](#PC7)）。
- en: '[PRE6]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Our optimization procedure looks pretty similar as before (Listing [11-8](#PC8)).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的优化过程看起来与之前相似（列表[11-8](#PC8)）。
- en: '[PRE7]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: However, because we are working with neural networks – highly versatile computational
    structures – we can also use other methods. One, for instance, is to integrate
    all these models into one large piece. In order to weight/multiply each model’s
    prediction by a certain quantity, we’ll use a bit of a “cheat” and apply a 1-length
    convolution, which simply multiplies each element in a given sequence by the same
    value (assuming the bias is disabled). Afterward, we will simply add each of the
    scaled model predictions together and then pass through softmax such that the
    output of the complete linked model architecture remains a set of valid class
    probabilities (Listing [11-9](#PC9), Figure [11-8](#Fig8)).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，因为我们正在处理神经网络——高度通用的计算结构——我们也可以使用其他方法。例如，一种方法是将所有这些模型集成到一个大块中。为了按一定数量加权/乘以每个模型的预测，我们将使用一点“作弊”并应用一个1长度的卷积，这会将给定序列中的每个元素乘以相同的值（假设禁用了偏差）。之后，我们将简单地添加每个缩放后的模型预测，然后通过softmax，使得完整链接的模型架构的输出仍然是一组有效的类别概率（列表[11-9](#PC9)，图[11-8](#Fig8)）。
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig8_HTML.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig8_HTML.png)'
- en: A flowchart of a meta-model design. It presents model A and B sequential, model
    C functional, model D and E sequential, with input 6 as input layer, and each
    model with 3 levels that connect to levels of add and lambda.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 元模型设计的流程图。它展示了模型A和B的顺序，模型C的功能，模型D和E的顺序，输入6作为输入层，每个模型有3个级别连接到加和lambda的级别。
- en: Figure 11-8
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-8
- en: A meta-model architecture combining each of the models together and automatically
    determining weightings
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 将每个模型组合在一起并自动确定权重的元模型架构
- en: '[PRE8]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Another approach would be to concatenate each of the outputs along a joint axis
    and to apply a time-distributed dense layer across each dimension of the output.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法是将每个输出的联合轴上的输出连接起来，并在输出的每个维度上应用时间分布的密集层。
- en: If you call `model.summary()`, you’ll find that the total number of parameters
    is 22,326; 22,311 are untrainable because they belong to `modelA`, `modelB`, `modelC`,
    `modelD`, or `modelE`. The remaining five trainable parameters are simply the
    output weights for each of the models.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你调用`model.summary()`，你会发现总参数数是22,326；其中22,311个不可训练，因为它们属于`modelA`，`modelB`，`modelC`，`modelD`或`modelE`。剩下的五个可训练参数是每个模型的输出权重。
- en: Fitting is standard (Listing [11-10](#PC10)).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 调整是标准的（列表[11-10](#PC10)）。
- en: '[PRE9]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: An advantage of this is design is that we can do some more fine-tuning overall
    by unfreezing each of the models and training the entire architecture to further
    optimize each of the models’ weights in relationship to each other (Listing [11-11](#PC11)).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设计的优势在于，我们可以通过解冻每个模型并训练整个架构来进一步优化每个模型之间的权重关系，从而进行一些更精细的调整（代码列表 [11-11](#PC11)）。
- en: '[PRE10]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This can be a good strategy to build effective large networks from a wide, diverse
    ensemble of smaller candidate models.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以是一个从广泛、多样化的候选模型集合中构建有效大型网络的好策略。
- en: Input-Informed Weighting
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 输入信息权重
- en: Average weighting allows us to understand which models are generally more trustworthy
    and which ones are less trustworthy. The more trustworthy models are ideally given
    a higher weight, whereas the less trustworthy models are weighted lower. However,
    some models may specialize in predicting a minority case; because they perform
    poorer overall, however, average weighting will mark these “specialist” models
    as generally untrustworthy and weight their prediction contributions down *for
    all samples* (even when it is predicting on a sample case it “specializes” in).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 平均权重使我们能够了解哪些模型通常更可靠，哪些模型不太可靠。更可靠的模型理想情况下应给予更高的权重，而不太可靠的模型则给予较低的权重。然而，某些模型可能专门预测少数案例；然而，由于它们的整体表现较差，平均权重将把这些“专家”模型标记为通常不可靠，并将它们的预测贡献降低到所有样本中（即使它们在预测它们“专门化”的样本案例时也是如此）。
- en: 'To reconcile this problem, we need to use a more complex form of weighting:
    *input-informed weighting*. In input-informed weighting, the specific weighting
    configuration is not static but rather dependent on the input received. This way,
    if a particular model or set of models specializes on a certain input, its contributions
    will be ideally weighted higher (and lower for other inputs it performs poorly
    on).'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们需要使用更复杂的权重形式：*输入信息权重*。在输入信息权重中，特定的权重配置不是静态的，而是依赖于接收到的输入。这样，如果一个特定的模型或一组模型在某个特定输入上专门化，其贡献将理想地给予更高的权重（在其他输入上表现不佳时给予较低的权重）。
- en: This sort of scheme works best for neural networks, which are able to capture
    complex relationships between the “specialization” or performance distribution
    of model performance and certain types of inputs. Let’s create a weighting model
    that takes in an input and outputs several outputs, one for each model (Listing
    [11-12](#PC12)).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方案最适合神经网络，因为神经网络能够捕捉模型性能的“专业化”或性能分布与某些类型输入之间的复杂关系。让我们创建一个权重模型，它接收一个输入并输出多个输出，每个模型一个（代码列表
    [11-12](#PC12)）。
- en: '[PRE11]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'This weighting model can be incorporated into the meta-model: the output of
    each model is multiplied by the corresponding weighting of the weighting model
    (which itself predicts weights informed by the input) (Listing [11-13](#PC13),
    Figure [11-9](#Fig9)).'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这种权重模型可以纳入元模型：每个模型的输出乘以权重模型的相应权重（该权重模型本身根据输入预测权重）（代码列表 [11-13](#PC13)，图 [11-9](#Fig9)）。
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig9_HTML.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig9_HTML.png)'
- en: A flowchart of a design of an input ensembled model. It presents the model functional
    for input 7 as input layer along with model A, E, D sequential, and model C functional.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 输入集成模型设计的流程图。它展示了输入层为输入7，以及模型A、E、D的顺序和模型C的功能。
- en: Figure 11-9
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-9
- en: An input-informed ensemble model architecture.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 一个输入信息集成模型架构。
- en: '[PRE12]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'A good example of similar techniques at work in deep learning research literature
    can be found in the paper “Who Said What: Modeling Individual Labelers Improves
    Classification”^([1](#Fn1)) by Melody Y. Guan, Varun Gulshan, Andrew M. Dai, and
    Geoffrey E. Hinton. Guan et al. tackle the problem of modeling expert-crowdsourced
    annotations. In this data collection scheme, a set of specialized data is labeled
    by multiple expert annotators. This scheme occurs often, for instance, in modeling
    medical datasets, in which several medical professionals may annotate a single
    sample. However, we may sometimes encounter disagreement or discrepancy in the
    labels of different annotators on the same sample.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '在深度学习研究文献中，类似技术的良好例子可以在Melody Y. Guan、Varun Gulshan、Andrew M. Dai和Geoffrey
    E. Hinton合著的论文“Who Said What: Modeling Individual Labelers Improves Classification”中找到^([1](#Fn1))。Guan等人解决了建模专家众包注释的问题。在这种数据收集方案中，一组专业数据由多个专家注释员进行标注。这种情况经常发生，例如，在建模医学数据集时，几个医疗专业人员可能会标注单个样本。然而，我们有时可能会遇到不同注释员对同一样本标签的不一致或差异。'
- en: The simple and dominant method to deal with disagreement in crowdsourced annotations
    is to somehow aggregate the different annotations and model the aggregated annotation.
    For instance, if five doctors rate the severity of a diagnosis from 0 to 100 as
    {88, 97, 73, 84, 86}, the overall annotation for the sample would be listed as
    85.6\. The model would then be trained to predict the diagnosis severity of the
    sample as 85.6.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 处理众包注释中的不一致的简单且主导方法是以某种方式聚合不同的注释并建模聚合注释。例如，如果五位医生将诊断的严重性从 0 到 100 评分分别为 {88,
    97, 73, 84, 86}，则该样本的整体注释将被列出为 85.6。然后，模型会被训练来预测该样本的诊断严重性为 85.6。
- en: Guan et al. instead predict each expert’s annotations for a particular sample.
    In continuation of our five-doctor example, the model would be trained to jointly
    predict each of the diagnoses {88, 97, 73, 84, 86}. Then, the model learns the
    optimal averaging weights for each model, similar to our previous discussion of
    weighted averaging of model predictions. Guan et al. also design and train a more
    complex model in which the weighting is input-informed. Ultimately, the research
    finds – to paraphrase from the paper itself – that aggregating the modeled annotations
    beats modeling the aggregated annotation. This is the power of meta-modeling at
    work (Figure [11-10](#Fig10))!
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: Guan 等人不是预测特定样本的每个专家的注释，而是继续我们的五位医生示例，模型会被训练来联合预测诊断 {88, 97, 73, 84, 86} 中的每一个。然后，模型学习每个模型的最佳平均权重，类似于我们之前关于模型预测加权平均的讨论。Guan
    等人还设计并训练了一个更复杂的模型，其中权重是输入信息驱动的。最终，这项研究发现——引用自论文本身——聚合模型注释优于对聚合注释的建模。这正是元建模的力量所在（图
    [11-10](#Fig10)）！
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig10_HTML.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图 11-10](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig10_HTML.png)'
- en: 3 illustrations. They present training phase 1 with learning labeler models,
    training phase 2 with learning averaging weights, and evaluation phase of predictions
    by individual labeler models.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 3 个插图。他们展示了第一阶段的学习标签器模型，第二阶段的学习平均权重，以及单个标签器模型的预测评估阶段。
- en: Figure 11-10
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-10
- en: 'Different learning phases/types of a multi-modeling ensemble. From Guan et
    al., “Who Said What: Modeling Individual Labelers Improves Classification”'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '多模型集成不同学习阶段/类型。来自 Guan 等人的“Who Said What: Modeling Individual Labelers Improves
    Classification”'
- en: Meta-evaluation
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 元评估
- en: 'We can use principles and ideas from multi-model arrangement to understand
    a useful technique for real-world deployment of machine learning and/or deep learning
    models: meta-evaluation.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用多模型排列的原则和思想来理解一个用于现实世界部署机器学习或深度学习模型的有用技术：元评估。
- en: For a certain set of problems, model confidence is trivially obtainable because
    it is inherently embedded in the algorithm design. Logistic Regression, for instance,
    directly gives us an estimate of the model’s “confidence” that a particular input
    falls into a particular class. Neural networks trained on classification problems
    directly return the probability that an input belongs to a certain class. However,
    in many other cases, gauging model confidence and/or error is not as clear.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 对于某些问题集，模型置信度是显而易见的，因为它固有地嵌入在算法设计中。例如，逻辑回归直接给出模型对特定输入属于特定类别的“置信度”估计。在分类问题上训练的神经网络直接返回输入属于某个类别的概率。然而，在许多其他情况下，评估模型置信度和/或误差并不那么清晰。
- en: Note
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: In many cases, even the output class probabilities of a classification network
    don’t provide meaningful information about the confidence/trustworthiness of the
    network’s predictions, due to the softmax layer used in classification output
    layers. This forces all output probabilities to sum to 1\. One technique used
    specifically for classification networks to reconcile this problem is to introduce
    an additional class representing “none of the above,” which can be trained on
    images from none of the classes in the original dataset.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，由于分类输出层中使用的 softmax 层，分类网络的输出类概率甚至不提供关于网络预测的置信度/可信度的有意义信息。这迫使所有输出概率之和为
    1。一种专门用于分类网络的解决此问题的技术是引入一个额外的类别，代表“以上皆非”，该类别可以训练在原始数据集中不属于任何类别的图像上。
- en: During model development, we generally care only about aggregate-level model
    error. We want to minimize the aggregate error (e.g., Mean Squared Error, mean
    binary cross-entropy, etc.) of the model across the dataset. However, when models
    are deployed, they operate on a sample-by-sample basis. It becomes important to
    know when a model’s predictions are likely to be correct or incorrect for each
    sample being used for inference and by how much. This can be used to gauge how
    to act based on a model’s predictions. For instance, if a model gives a diagnosis
    that a patient does indeed have cancer, we would like to know the model’s specific
    confidence on this sample case more than the general knowledge that the model
    has such-and-such error rate.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型开发过程中，我们通常只关心聚合级别的模型错误。我们希望最小化模型在整个数据集上的聚合错误（例如，均方误差、平均二元交叉熵等）。然而，当模型部署时，它们是按样本逐个操作的。了解模型对每个用于推理的样本的预测可能是正确还是错误，以及错误程度变得很重要。这可以用来衡量根据模型预测采取行动的方式。例如，如果一个模型给出诊断，表明患者确实患有癌症，我们希望了解模型对这个样本案例的具体置信度，而不仅仅是模型具有这样的错误率的一般知识。
- en: Listing [11-14](#PC14) defines an architecture (visualized in Figure [11-11](#Fig11))
    that estimates the error of the prediction given the original input and the predicted
    output.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[11-14](#PC14)定义了一个架构（如图[11-11](#Fig11)所示），它根据原始输入和预测输出估计预测的错误。
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig11_HTML.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig11_HTML.png)'
- en: A flowchart of a meta-model design. It presents 7 levels with data as input
    layer, dense, dense 1, dense 2 and 3, concatenate, dense 4, and dense 5.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 元模型设计的流程图。它展示了7个级别，数据作为输入层，密集层，密集1、2和3层，连接层，密集4层和密集5层。
- en: Figure 11-11
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-11
- en: A meta-modeling architecture
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 元建模架构
- en: '[PRE13]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Now, we can train on the error. In this case, we want to give the model both
    the original inputs and the predicted values; the target is the absolute error
    of the prediction (Listing [11-15](#PC15)).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以对错误进行训练。在这种情况下，我们希望给模型提供原始输入和预测值；目标是预测的绝对误差（见列表[11-15](#PC15)）。
- en: '[PRE14]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: During the prediction phase, you can then pass in the prediction (along with
    the original input) through the meta-evaluation model to get an understanding
    for how much you can trust the individual prediction.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在预测阶段，您可以通过将预测（连同原始输入）通过元评估模型传递，来了解您对单个预测可以信任的程度。
- en: This technique is similar to that of residual learning employed in boosting
    ensembles (see Chapter [1](525591_1_En_1_Chapter.xhtml), on Gradient Boosting
    algorithms, and Chapter [7](525591_1_En_7_Chapter.xhtml), on GrowNet).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术与在提升集成中使用的残差学习技术相似（参见第[1](525591_1_En_1_Chapter.xhtml)章关于梯度提升算法，以及第[7](525591_1_En_7_Chapter.xhtml)章关于GrowNet）。
- en: Another technique used for large neural networks is to force the neural network
    to both make the formal prediction and simultaneously estimate the error of such
    a prediction. By this method, the error estimation is made “self-consciously”
    by the model with knowledge of the internal states used to form a prediction.
    However, it is important to severely discount the importance of the error estimation
    output early on in training (like changing the value of *α* for multitask autoencoders)
    to ensure the network reaches a point of satisfactory performance such that estimating
    error is feasible and meaningful.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 用于大型神经网络的另一种技术是迫使神经网络既要做出正式预测，同时还要估计这种预测的错误。通过这种方法，错误估计是由模型“有意识地”根据形成预测所使用的内部状态进行的。然而，在训练初期（例如，改变多任务自编码器的*α*值）严重降低错误估计输出的重要性是很重要的，以确保网络达到一个令人满意的性能点，这样估计错误是可行且有意义的。
- en: Key Points
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: In this chapter, we discussed various multi-model arrangement methods.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了各种多模型排列方法。
- en: Multi-model arrangement provides a set of tools to composite multiple models
    together. This can make systems more robust, jointly informed, and self-aware.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多模型排列提供了一套组合多个模型的工具。这可以使系统更加鲁棒、共同知情和自我意识。
- en: In simplest form, the output of all models in an ensemble can be averaged. However,
    some models may perform better than others. Weighted averaging, in which each
    model’s prediction is associated with a weight, captures relative performance/trustworthiness
    across an ensemble of models. Input-informed weighting makes this weighting dependent
    on the type of input, to accommodate model specialization in certain types of
    inputs. All weightings can be learned through meta-optimization or, if all models
    are neural networks, can be fixed and arranged into a meta-neural network.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在最简单的形式中，集成中所有模型的输出可以平均。然而，某些模型可能比其他模型表现更好。加权平均，其中每个模型的预测都与一个权重相关联，可以捕捉到模型集成中相对性能/可信度的变化。基于输入的信息加权使得这种加权依赖于输入的类型，以适应模型在特定类型输入上的专业化。所有加权都可以通过元优化来学习，或者如果所有模型都是神经网络，则可以固定并排列成一个元神经网络。
- en: Meta-evaluation is a framework to predict a model’s error on a per-sample basis.
    This allows for the characterization of model trustworthiness and confidence in
    live deployment.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 元评估是一个框架，用于预测模型在每个样本上的误差。这允许对模型的可信度和在实际部署中的信心进行表征。
- en: In this book’s final chapter, we will look at deep learning interpretability.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的最后一章，我们将探讨深度学习的可解释性。
