- en: Model D architecture
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 模型D架构
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig5_HTML.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig5_HTML.png)'
- en: A flow diagram of a model C design. It presents 7 levels with input 3 as input
    layer, dense 8, dense 9 and 12, dense 10, dense 11, concatenate, and dense 14.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 模型C设计的流程图。它展示了7个级别，输入3作为输入层，密集8，密集9和12，密集10，密集11，连接，和密集14。
- en: Figure 11-5
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-5
- en: Model C architecture
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 模型C架构
- en: '![](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig4_HTML.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_11_Chapter/525591_1_En_11_Fig4_HTML.png)'
- en: A flowchart of a model B design. It presents 6 levels with input 2 as input
    layer, dense 3, dense 4, dense 5, dense 6, and dense 7.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 模型B设计的流程图。它展示了6个级别，输入2作为输入层，密集3，密集4，密集5，密集6，和密集7。
- en: Figure 11-4
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
