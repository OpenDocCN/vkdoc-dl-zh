- en: Multivariate Imputation Via “mice” Package in R
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: R中通过“mice”包进行多元插补
- en: A synthetic data imputation method is a technique for imputing missing data
    by creating new, artificial data points that are based on known values. This can
    be done using a variety of methods, such as creating a regression model to predict
    missing values or using a clustering algorithm to generate new data points that
    are similar to existing ones.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据插补方法是一种通过创建基于已知值的新的人工数据点来插补缺失数据的技术。这可以通过多种方法完成，例如创建回归模型来预测缺失值或使用聚类算法生成与现有数据点相似的新数据点。
- en: The advantage of synthetic data imputation is that it can be used to fill in
    missing data in a way that is not biased by the existing data. This is because
    the new data points are generated from scratch, rather than being estimated based
    on the known data.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据插补的优点在于它可以以不受现有数据偏倚的方式填充缺失数据。这是因为新数据点是从头开始生成的，而不是基于已知数据进行估计。
- en: The disadvantage of synthetic data imputation is that it can be time-consuming
    to generate new data points, and there is always the possibility that the artificial
    data will not be an accurate representation of the real data. In general, synthetic
    data imputation is a useful technique for handling missing data, but it should
    be used with caution.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据插补的缺点在于生成新的数据点可能耗时，并且总有可能人工数据不能准确反映真实数据。一般来说，合成数据插补是处理缺失数据的有用技术，但应谨慎使用。
- en: The basis of synthetic data proposed by Rubin (2004) is based on the multiple
    imputations of missing data. In statistical predictive modeling, missing values
    affect the reliability of prediction results. Therefore, some common methods are
    used to solve the missing value problem. Some machine learning algorithms claim
    to essentially handle missing data. But how good these algorithms are not well
    known.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: Rubin（2004）提出的合成数据基础是基于缺失数据的多次插补。在统计预测建模中，缺失值会影响预测结果的可靠性。因此，一些常用方法被用来解决缺失值问题。一些机器学习算法声称可以本质上处理缺失数据。但这些算法有多好并不为人所知。
- en: Without changing the missing values in the data set, the observed precision
    values can be modified by making multiple pulls from the non-Bayesian predictive
    distribution or the posterior predictive distribution. Although real datasets
    are not used, the multiple synthetic datasets produced can provide accurate statistical
    inferences. For researchers to draw reliable conclusions from the combined results,
    analyses using multiple synthetic data must be combined into a single inference.
    Therefore, the additional variability induced by the imputation procedure needs
    to be reflected.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在不改变数据集中的缺失值的情况下，可以通过从非贝叶斯预测分布或后验预测分布中进行多次抽取来修改观察到的精度值。尽管没有使用真实数据集，但产生的多个合成数据集可以提供准确的统计推断。为了从综合结果中得出可靠的结论，必须将使用多个合成数据的分析合并成一个单一的推断。因此，插补过程引起的额外变异性需要得到反映。
- en: The method to be used to assign the missing values greatly affects the success
    of the predicted model. In most statistical analyzes, the list-based deletion
    method is used to impute missing values. However, this method is not used much
    because it causes a loss of information. On the other hand, R software has packages
    that re successful in imputing missing values. The “mice” “Amelia”, “missForest”, “Hmisc”,
    and “mi” packages are used to impute missing values in R [[4](#Par7004)]. There
    are many ways to impute missing values, each with its advantages and disadvantages.
    The most important thing is to choose a method that best suits the data set and
    the type of analysis being performed.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 用于分配缺失值的方法对预测模型的成功有很大影响。在大多数统计分析中，使用基于列表的删除方法来插补缺失值。然而，这种方法使用不多，因为它会导致信息丢失。另一方面，R软件有包可以成功插补缺失值。“mice”、“Amelia”、“missForest”、“Hmisc”和“mi”包用于在R中插补缺失值
    [[4](#Par7004)]。有几种插补缺失值的方法，每种方法都有其优缺点。最重要的是选择最适合数据集和分析类型的方法。
- en: Mice is a package used to impute missing values. This package assumes that missing
    data is missing randomly. The probability that a value is missing depends only
    on the observed values. Using these observed values, missing data can be estimated.
    Mice package uses a method that imputed data on a per-variable basis. This method
    specifies an assignment pattern per variable.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: Mice是一个用于插补缺失值的包。此包假设缺失数据是随机缺失的。一个值缺失的概率仅取决于观察到的值。使用这些观察值，可以估计缺失数据。Mice包使用一种按变量插补数据的方法。这种方法为每个变量指定一个分配模式。
- en: Usually, the mice package uses joint modeling, sequential modeling, and fully
    conditional specification methods to impute missing data and write the paragraph above
    differently. These methods are used to improve the accuracy of the imputation
    by using information from other variables in the data set. This can be done by
    using a joint model to impute the missing data and then using a sequential model
    to improve the accuracy of the imputation. Finally, a fully conditional specification
    can be used to further improve the accuracy of the imputation.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，mice包使用联合建模、顺序建模和完全条件指定方法来插补缺失数据，并以上述不同方式编写段落。这些方法通过使用数据集中其他变量的信息来提高插补的准确性。这可以通过使用联合模型来插补缺失数据，然后使用顺序模型来提高插补的准确性来实现。最后，可以使用完全条件指定来进一步提高插补的准确性。
- en: In the joint modeling method, the joint distribution is specified indirectly;
    by specifying the distribution of each variable *x* separately. This method uses
    a different synthesis model to simultaneously draw synthetic data for all variables
    in *x*. In sequential modeling, each variable is factored into a set of univariate
    models. Each set of models here is conditioned on the variables placed earlier.
    For example, consider the array ***x***[(<*j*)] = (*x*[1], …, *x*[*j* − 1]). If
    this array specifies the variables occurring before *x*[*j*], then the *m* − *th*
    synthetic dataset is calculated as follows [[5](#Par7005)].
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在联合建模方法中，联合分布是间接指定的；通过分别指定每个变量*x*的分布。这种方法使用不同的合成模型来同时为*x*中的所有变量抽取合成数据。在顺序建模中，每个变量被分解成一组单变量模型。这里的每个模型集都是基于之前放置的变量进行条件化。例如，考虑数组***x***[(<*j*)]
    = (*x*[1], …, *x*[*j* − 1])。如果这个数组指定了*x*[*j*]之前出现的变量，那么*m* − *th*个合成数据集的计算如下 [[5](#Par7005)]。
- en: '![$$ {x}_{syn}^{(m)}\sim P\left(\boldsymbol{x}|\boldsymbol{z}\right)=\prod
    \limits_{j=1}^pP\left({x}_j|{\boldsymbol{x}}_{\left(&lt;j\right)},\boldsymbol{z}\right)
    $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equa.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![${x}_{syn}^{(m)}\sim P\left(\boldsymbol{x}|\boldsymbol{z}\right)=\prod \limits_{j=1}^pP\left({x}_j|{\boldsymbol{x}}_{\left(&lt;j\right)},\boldsymbol{z}\right)$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equa.png)'
- en: In the fully conditional specification method, each model is separate and can
    be applied to any other variable in the data set. This is done by conditioning
    the other variable. For example, let ***x***[(−*j*)] = (*x*[1], …, *x*[*j* − 1],
    *x*[*j* + 1], …, *x*[*p*]) specifically, refer to variables in ***x*** other than
    *x*[*j*]. In this case, the *m* − *th* synthetic dataset for each *x*[*j*] value
    is drawn using the following formula [[5](#Par7005)].
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在完全条件指定方法中，每个模型都是独立的，可以应用于数据集中的任何其他变量。这是通过条件化其他变量来实现的。例如，让***x***[(−*j*)] =
    (*x*[1], …, *x*[*j* − 1], *x*[*j* + 1], …, *x*[*p*])，具体参考***x***中除了*x*[*j*]之外的其他变量。在这种情况下，每个*x*[*j*]值的*m* − *th*个合成数据集是使用以下公式抽取的
    [[5](#Par7005)]。
- en: '![$$ {x}_{j, syn}^{(m)}\sim P\left({x}_j|{\boldsymbol{x}}_{\left(-\boldsymbol{j}\right)},\boldsymbol{z}\right)=\prod
    \limits_{j=1}^pP\left({x}_j|{\boldsymbol{x}}_{\left(&lt;j\right)},\boldsymbol{z}\right)
    $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equb.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equb.png)'
- en: In the above equation, it can take *j* = 1, 2, …, *p* values. The flexibility
    that joint modeling, sequential modeling, and fully conditional specification
    [[6](#Par7006)] methods provide in determining the joint distribution *P*(*x*,
    *z*) can sometimes be different. If all variables have a normal distribution and
    a linear relationship, then the predictive distributions expressed by the three
    methods are also equivalent.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述公式中，它可以取*j* = 1, 2, …, *p*的值。联合建模、顺序建模和完全条件指定[[6](#Par7006)]方法在确定联合分布*P*(*x*,
    *z*)时提供的灵活性有时可能不同。如果所有变量都具有正态分布和线性关系，那么三种方法表示的预测分布也是等效的。
