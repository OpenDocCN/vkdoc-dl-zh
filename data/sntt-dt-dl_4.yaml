- en: 4. Synthetic Data Generation with R
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 使用R进行合成数据生成
- en: In this chapter, we will explore how to generate synthetic data using the R
    programming language. We’ll start by looking at some of the basic functions used
    to generate synthetic data. Next, we’ll look at how to construct a value vector
    from a known univariate distribution. Next, we’ll look at how to construct a vector
    from a multi-level categorical variable. We will look at how to build a neural
    network in R using the nnet package. We will give an example of image augmentation
    using a torch package. Next, we’ll explore how to generate synthetic data in R
    using the mice conjurer and synthpop package. Finally, the topic of copulas and
    R practices related to copula, normal copula, and Gaussian copula will be covered.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨如何使用R编程语言生成合成数据。我们将首先查看一些用于生成合成数据的基本函数。接下来，我们将探讨如何从已知单变量分布中构建值向量。然后，我们将探讨如何从多级分类变量中构建向量。我们将探讨如何使用nnet包在R中构建神经网络。我们将给出使用torch包进行图像增强的示例。接下来，我们将探索如何使用mice
    conjurer和synthpop包在R中生成合成数据。最后，我们将讨论copulas以及与copula、正态copula和高斯copula相关的R实践。
- en: Basic Functions Used in Generating Synthetic Data
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成合成数据时使用的常用函数
- en: 'A synthetic data generation method is an approach to creating new, artificial
    data that resembles real data in some way. There are many ways to generate synthetic
    data, but all methods share the same goal: to create data that can be used to
    train machine learning models without the need for real data.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据生成方法是一种创建新的人工数据的方法，这些数据在某些方面类似于真实数据。有许多生成合成数据的方法，但所有方法都有相同的目标：创建可以用于训练机器学习模型而无需真实数据的数据。
- en: Basic functions are used in synthetic data generation for a variety of reasons.
    First, basic functions allow for the construction of new variables that are not
    present in the original data set. This is important because it allows for the
    creation of variables that may be important for the analysis but were not originally
    measured. Second, basic functions can be used to transform variables in the original
    data set. This is important because it allows for the creation of new variables
    that are more appropriate for the analysis. Finally, basic functions can be used
    to create missing values in the data set. This is important because it allows
    for the creation of a more realistic data set that includes missing values.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 基本函数在合成数据生成中用于多种原因。首先，基本函数允许构建原始数据集中不存在的新变量。这很重要，因为它允许创建可能对分析很重要但最初未测量的变量。其次，基本函数可以用于转换原始数据集中的变量。这很重要，因为它允许创建更适合分析的新变量。最后，基本函数可以用于在数据集中创建缺失值。这很重要，因为它允许创建包含缺失值的更真实的数据集。
- en: There are functions in the R programming language that can be used to create
    synthetic datasets. These datasets can be used to test code used in R programming.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: R编程语言中有一些函数可以用于创建合成数据集。这些数据集可以用于测试R编程中使用的代码。
- en: The codes used in this example are from [`https://projets.pasteur.fr/projects/rap-r/wiki/Synthetic_Data_Generation`](https://projets.pasteur.fr/projects/rap-r/wiki/Synthetic_Data_Generation).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本例中使用的代码来自[https://projets.pasteur.fr/projects/rap-r/wiki/Synthetic_Data_Generation](https://projets.pasteur.fr/projects/rap-r/wiki/Synthetic_Data_Generation)。
