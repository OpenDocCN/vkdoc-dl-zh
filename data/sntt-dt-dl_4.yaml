- en: Normal Copula
  id: totrans-370
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正态copula
- en: The normal copula is a function that describes the distribution of a random
    variable in terms of the distribution of two other random variables. It is used
    to calculate the probability that a given random variable will fall within a certain
    range given the distributions of two other random variables. The normal copula
    is particularly useful for modeling financial risk, where it can be used to calculate
    the likelihood of a portfolio experiencing a certain level of loss.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 正态copula是一个函数，它用两个其他随机变量的分布来描述随机变量的分布。它用于计算在给定两个其他随机变量的分布的情况下，给定随机变量将落在某个范围内的概率。正态copula在建模金融风险方面特别有用，它可以用来计算投资组合经历一定水平损失的可能性。
- en: 'In this example, the codes used to generate normal copula are taken from [`http://copula.r-forge.r-project.org/book/04_fitting.xhtml`](http://copula.r-forge.r-project.org/book/04_fitting.xhtml):'
