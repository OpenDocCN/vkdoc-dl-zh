- en: The results of the analysis suggest that the model should be refined. Sometimes
    there may be some contradictory results in the observed data. This situation can
    be corrected by using different data synthesis methods.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 分析结果建议应该细化模型。有时观测数据中可能会有一些矛盾的结果。这种情况可以通过使用不同的数据合成方法来纠正。
- en: The confidence interval plot in Figure [4-29](#Fig29) shows that the confidence
    intervals for coefficients estimated using synthetic data are in general, narrower
    than those estimated using observed data. This is likely because the synthetic
    data were generated using the model that was fit to the observed data, so the
    synthetic data are “more” like the data that the model was fit to.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-29](#Fig29)中的置信区间图显示，使用合成数据估计的系数的置信区间通常比使用观测数据估计的置信区间窄。这可能是由于合成数据是使用拟合观测数据的模型生成的，因此合成数据“更”像模型拟合的数据。
- en: The Mahalanobis distance ratio for lack-of-fit is 2, which means that the synthesis
    model is not a good fit for the observed data.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 缺失拟合的马氏距离比率为2，这意味着合成模型对观测数据不是很好的拟合。
