- en: The Mahalanobis distance inequality test shows that the agreement between the
    synthetic data and the observational data is tested with a chi-square test. The
    R analysis output above shows that the average of 4 syntheses and 12 coefficients
    is 0.9016549\. This shows that the synthesis models agree with the real data.
  id: totrans-310
