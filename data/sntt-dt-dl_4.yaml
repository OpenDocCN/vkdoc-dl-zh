- en: Generating Synthetic Data with the “conjurer” Package in R
  id: totrans-198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用R中的“conjurer”包生成合成数据
- en: The “conjurer” package in R provides a set of tools for performing mathematical
    operations on arrays of data. It includes functions for computing the conjugate,
    determinant, and inverse of matrices, as well as for solving systems of linear
    equations. The package also includes a variety of other mathematical functions,
    such as for calculating the sum and product of arrays of numbers.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: R中的“conjurer”包提供了一套用于在数据数组上执行数学运算的工具。它包括计算矩阵的共轭、行列式和逆的函数，以及解线性方程组的函数。该包还包括各种其他数学函数，例如用于计算数字数组的总和和乘积的函数。
- en: The “conjurer” package in R is designed for creating synthetic data. It provides
    several functions for creating data sets with specific distributions, as well
    as for simulating random events. In this section we will demonstrate how to use
    the “conjurer” package to generate synthetic data.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: R中的“conjurer”包旨在创建合成数据。它提供了一些用于创建具有特定分布的数据集的函数，以及用于模拟随机事件的函数。在本节中，我们将演示如何使用“conjurer”包生成合成数据。
- en: 'The codes used in this example are taken from [`https://www.r-bloggers.com/2020/01/generate-synthetic-data-using-r/`](https://www.r-bloggers.com/2020/01/generate-synthetic-data-using-r/).
    The analysis was done in five steps:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 本例中使用的代码来自[`https://www.r-bloggers.com/2020/01/generate-synthetic-data-using-r/`](https://www.r-bloggers.com/2020/01/generate-synthetic-data-using-r/)。分析分为五个步骤：
- en: '[PRE30]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Creat a Customer
  id: totrans-203
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建一个客户
- en: The customer ID is a number assigned to each customer to help distinguish them
    from each other. The customer ID is based on how many customers there are and
    will range from 1 to however many customers there are. The function “buildCust”
    is used to create the customer ID and it takes a “numOfCust” argument to specify
    how many customer IDs to create.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 客户ID是分配给每个客户的数字，用于区分他们。客户ID基于客户数量，范围从1到客户数量。
- en: '[PRE31]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Creat a Product
  id: totrans-206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建一个产品
- en: During product creation, each product is assigned a product ID. The product
    ID is also similar to the customer ID. The product ID for each product must be
    between sku001 and sku100, and the price range for each product must be specified long
    with the product ID. This is a way to create a unique ID for a product. The IDs
    made up of the product’s “sku” number (or any other unique identifier) and the
    price range for that product. This way, the ID will always be the same length.
    For example, let’s find 20 products between $30-80 using the “buildProb” function.
    The number of IDs of the products to be created here is shown as “numOfProud”,
    the minimum price is shown with “minPrice”, and the maximum price is shown with
    “maxPrice”.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在产品创建过程中，每个产品都会分配一个产品ID。产品ID也与客户ID相似。每个产品的产品ID必须在sku001和sku100之间，并且每个产品的价格范围必须与产品ID一起指定。这是为产品创建唯一ID的一种方式。由产品的“sku”编号（或任何其他唯一标识符）和该产品的价格范围组成的ID。这样，ID的长度始终相同。例如，让我们使用“buildProb”函数找到20个介于$30-80之间的产品。这里要创建的产品ID数量显示为“numOfProud”，最低价格显示为“minPrice”，最高价格显示为“maxPrice”。
- en: '[PRE32]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Creating Transactions
  id: totrans-209
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建交易
- en: Transactions are created after a set of customer IDs and products are created.
    Transactions are created using the “genTrans” function.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建一组客户ID和产品之后创建交易。交易是通过“genTrans”函数创建的。
- en: '[PRE33]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: The output is shown in Figure [4-20](#Fig20).
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 输出如图[4-20](#Fig20)所示。
- en: '![](../images/534235_1_En_4_Chapter/534235_1_En_4_Fig20_HTML.jpg)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/534235_1_En_4_Chapter/534235_1_En_4_Fig20_HTML.jpg)'
- en: A transaction graph. The graph is highly fluctuating and has a maximum value
    of more than 120.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 交易图。该图波动很大，最大值超过120。
- en: Figure 4-20
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-20
- en: Transaction graph
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 交易图
- en: Generating Synthetic Data
  id: totrans-217
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成合成数据
- en: In the final stage of synthetic data, customers, products, and transactions
    are brought together. Transactions are created with the “buildPareto” function.
    This function has “factor1”, “factor2” and “Pareto” arguments in its structure.
    “factor1”, and “factor2” are variables to match with each other. The “Pareto”
    variable is based on the concept of the Pareto principle. Accordingly, the sum
    of the *x* and *y* values is numerically 100 and is expressed as *c*(*x*,*y*).
    If Pareto is *c*(80,20), 80% of “factor1” is allocated to 20% of “factor2”.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在合成数据的最终阶段，客户、产品和交易被整合在一起。交易是通过“buildPareto”函数创建的。这个函数在其结构中包含“factor1”、“factor2”和“Pareto”参数。“factor1”和“factor2”是相互匹配的变量。而“Pareto”变量基于帕累托原理。因此，*x*和*y*值的总和数值上是100，并以*c*(*x*,*y*)的形式表达。如果Pareto是*c*(80,20)，则80%的“factor1”分配给20%的“factor2”。
- en: '[PRE34]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: As a result, a data set of transactions, customers, and products is obtained
    by recording the transactions of a business over 365 days. This data set contains
    information on the customers who made the transactions, the products that were purchased,
    and on which the date the transaction occurred. “transactionID” is a different
    identifier of the transaction. “SKU” indicates the product purchased in the transaction.
    “dayNum” indicates how many days in a year. “mthNum” indicates which month it
    is. If “mthNum” is 1, it represents January, and if it is 12, it represents December.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 通过记录365天内的业务交易，从而获得交易、客户和产品数据集。该数据集包含有关进行交易的客户、购买的产品以及交易发生的日期的信息。“transactionID”是交易的另一个标识符。“SKU”表示交易中购买的产品。“dayNum”表示一年中的天数。“mthNum”表示当前是哪个月。如果“mthNum”是1，则代表一月，如果是12，则代表十二月。
- en: Generating Synthetic Data with “Synthpop” Package In R
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用R中的“Synthpop”包生成合成数据
- en: Data synthesis techniques such as synthpop and GANS often use purely conditional
    synthesis. These techniques use all available information from the model for each
    variable to find all meaningful relationships between variables. These developed
    models are quite different from the old methods that used small variable sets
    selected by hand. If two different subsets of data have very different distribution
    patterns between immediate variables, it may be difficult for some models to accurately
    predict both datasets. In this case, positions in the data can be determined using
    NIST’s k-marginal metric.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 数据合成技术，如synthpop和GANS，通常使用纯条件合成。这些技术使用模型中每个变量的所有可用信息来找到变量之间的所有有意义的关系。这些开发出的模型与旧方法大不相同，旧方法使用的是手工选择的变量小集。如果两个不同的数据子集在直接变量之间的分布模式非常不同，那么某些模型可能难以准确预测这两个数据集。在这种情况下，可以使用NIST的k-marginal度量来确定数据中的位置。
- en: 'The “synthpop” package is a tool for synthesizing realistic population data.
    It can be used to generate synthetic data sets that are representative of a real
    population or to generate data sets with specific characteristics that are not
    present in the real population. The package can be used to generate data set with
    a wide variety of characteristics, including:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: “synthpop”包是一个用于合成真实人口数据的工具。它可以用来生成代表真实人口的合成数据集，或者生成具有真实人口中不存在特定特征的数据集。该包可以用来生成具有广泛特征的数据集，包括：
- en: Demographic characteristics (age, sex, race, etc.)
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人口统计特征（年龄、性别、种族等）
- en: Socioeconomic characteristics (income, education, occupation, etc.)
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社会经济特征（收入、教育、职业等）
- en: Behavioral characteristics (consumer behavior, health-related behaviors, etc.)
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行为特征（消费者行为、与健康相关的行为等）
- en: Spatial characteristics (location, mobility patterns, etc.)
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 空间特征（位置、移动模式等）
- en: The package can be used to generate data sets of any size, from a few hundred
    to millions of individuals. The data sets can be generated for any geographic
    area, from a single city to an entire country.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '该包可以用来生成任何大小的数据集，从几百到几百万个个体。可以为任何地理区域生成数据集，从单个城市到整个国家。 '
- en: The “synthpop” package is a valuable tool for researchers and analysts who need
    realistic synthetic data set. It can generate data sets for simulations or test
    data-driven models and algorithms. The package can also be used to generate data sets
    for use in marketing or social science research.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: “synthpop”包是研究人员和分析人员需要真实合成数据集的有价值工具。它可以生成用于模拟或测试数据驱动模型和算法的数据集。该包还可以用于生成用于营销或社会科学研究的数据集。
- en: Now let’s make a sample application using the “synthpop” package.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们使用“synthpop”包做一个示例应用。
- en: '[PRE35]'
  id: totrans-231
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Datasets in many different fields, such as data science and machine learning,
    have missing values. Therefore, it is often difficult to effectively handle this
    data, and there is often no best solution. On the other hand, missing data is
    also important for the model and the target problem. There is no perfect way to
    handle missing data. Here, it is explained how datasets with missing values ​​should
    be handled.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多不同领域的数据集中，例如数据科学和机器学习，都存在缺失值。因此，通常很难有效地处理这些数据，并且往往没有最佳解决方案。另一方面，缺失数据对于模型和目标问题也是重要的。处理缺失数据没有完美的方法。在这里，将解释如何处理具有缺失值的数据集。
- en: 'The purpose of synthesizing synthetic data is to produce a dataset that is
    most similar to the original dataset. Two methods are used here to handle missing
    data: the processing of missing values before analysis, and the use of imputation
    methods. Here, the imputation method is generally preferred because it gives better
    results. Because pre-generating missing values ​​from the analysis can affect
    how missing values ​​are handled.'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 合成合成数据的目的是生成与原始数据集最相似的数据集。这里使用了两种方法来处理缺失数据：分析前的缺失值处理和使用填充方法。在这里，通常更喜欢填充方法，因为它给出了更好的结果。因为从分析中预先生成缺失值可能会影响缺失值的处理方式。
- en: '[PRE36]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Use the “misForest” package to impute missing values. The “missForest” package
    in R data sets is a tool for imputing missing values in datasets. It uses a random
    forest algorithm to create a model to predict missing values in a data set.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 使用“misForest”包来填充缺失值。R 数据集中的“missForest”包是一个用于在数据集中填充缺失值的工具。它使用随机森林算法创建一个模型来预测数据集中的缺失值。
- en: '[PRE37]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Simulate a random data frame with missing values
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟一个带有缺失值的随机数据框
