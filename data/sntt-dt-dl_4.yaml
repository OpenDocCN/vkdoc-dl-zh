- en: Augmented Data
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 增强数据
- en: The general purpose of machine learning is to automatically classify and label
    data or discover patterns in a dataset. Using machine learning, we can classify
    datasets and make predictions using the data. If we aim to classify a dataset,
    for example, to separate photos into cats and dogs, we need to give some of the
    data to the machine by labeling it. The labeling process is the process of identifying
    the types of data in a set of raw data, such as images, text, and photographs.
    From such labeled data, the computer learns whether a photo contains a cat or
    a tumor and can then identify classes of unlabeled data. The data labeling process
    is a necessary process for the computer to see and recognize images, text, and
    speech.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习的一般目的是自动对数据进行分类和标记，或在数据集中发现模式。使用机器学习，我们可以对数据集进行分类并使用数据进行预测。如果我们旨在对数据集进行分类，例如，将照片分为猫和狗，我们需要通过标记将一些数据提供给机器。标记过程是识别一组原始数据（如图像、文本和照片）中数据类型的流程。从这样的标记数据中，计算机学习照片是否包含猫或肿瘤，然后可以识别未标记数据的类别。数据标记过程是计算机看到并识别图像、文本和语音的必要过程。
- en: Data augmentation is a technique used in synthetic data, which is a technique
    used to generate new data points using a training dataset. The purpose of data
    augmentation is to improve the quality of the training dataset, which can help to
    improve the quality of the model. Data augmentation can be used to add more data
    points to the dataset, to improve the distribution of the data, to add more variety
    to the data, or to improve the data quality.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 数据增强是一种在合成数据中使用的技巧，它是一种使用训练数据集生成新数据点的技巧。数据增强的目的是提高训练数据集的质量，这有助于提高模型的质量。数据增强可以用来向数据集添加更多数据点，以改善数据的分布，增加数据的多样性，或提高数据质量。
- en: Computer vision and machine learning are ways to make images look better. Image
    augmentation is a technique used in these fields to make images look better. This
    can involve applying “geometric transformations, color space augmentations, kernel
    filters, mixing images, random erasing, feature space augmentation, adversarial
    training, GANs, neural style transfer, and meta-learning” [[1](#Par7001)]. These
    algorithms can be applied in different ways to produce different results.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉和机器学习是使图像看起来更好的方法。图像增强是这些领域中用于使图像看起来更好的技巧。这可能涉及应用“几何变换、颜色空间增强、核滤波、混合图像、随机擦除、特征空间增强、对抗训练、GANs、神经风格迁移和元学习”
    [[1](#Par7001)]。这些算法可以以不同的方式应用，以产生不同的结果。
- en: 'AlexNet is a deep learning network that was developed by Alex Krizhevsky. It
    was one of the first networks to use data augmentation, which helped it to achieve
    better results. AlexNet used two types of augmentations: horizontal reflections
    and image translations.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: AlexNet是由Alex Krizhevsky开发的深度学习网络。它是第一个使用数据增强的网络之一，这有助于它取得更好的结果。AlexNet使用了两种类型的增强：水平反射和图像平移。
- en: All inputs in AlexNet must be of size 256x256\. If the input image is not of
    that size, it must be converted to that size before being used for training the
    network.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在AlexNet中，所有输入必须为256x256大小。如果输入图像不是这个大小，必须在用于训练网络之前将其转换为该大小。
- en: Supervised learning is a way to get a computer to learn from data. In this approach,
    data is first labeled (or classified), and then the computer uses that data to
    learn how to do things on its own. This means that the computer is taught how
    to do something by being shown examples of what is wanted. Supervised learning
    is important to train the model using labeled data based on “*ground truth."*
    For example, people might ask, “Is there a bird in this photo?” when working with
    unlabeled data. The accuracy of the models depends on the correctness of the data.
    For example, the accuracy of a facial recognition model depends on the correctness
    of the data labeling the faces.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习是一种让计算机从数据中学习的方法。在这种方法中，数据首先被标记（或分类），然后计算机使用这些数据来学习如何自己做事。这意味着计算机通过展示想要的结果的例子来学习如何做某事。监督学习对于使用基于“*真实情况*”的标记数据训练模型非常重要。例如，当处理未标记数据时，人们可能会问：“这张照片里有没有鸟？”模型的准确性取决于数据的正确性。例如，面部识别模型的准确性取决于标记面部数据的正确性。
- en: In natural language processing processes, important parts of the text are determined
    manually, and labels are given to them to create the training dataset. In this
    type of labeling, if sentiment analysis is to be applied, text parts, names, places,
    and people that determine the sentiment are labeled. Also, in such a process,
    certain parts of the text can be marked using a bounding box. In audio data, sounds
    (such as barking, chirping, bird sounds, breaking) are first converted into text
    and these are used as training data in structured data format.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在自然语言处理过程中，文本的重要部分是手动确定的，并为其分配标签以创建训练数据集。在这种类型的标记中，如果应用情感分析，则会对确定情感的文本部分、名称、地点和人物进行标记。此外，在这样一个过程中，可以使用边界框标记文本的某些部分。在音频数据中，首先将声音（如狗吠、鸣叫、鸟鸣、破碎声）转换为文本，这些文本作为结构化数据格式中的训练数据使用。
- en: The “ggpubr” package is an add-on for the popular “ggplot2” package for R that
    provides several functions for creating and manipulating publication-quality graphs.
    These functions include creating custom themes, adding annotations and labels,
    and customizing the layout and appearance of graphs. The “ggpubr” package also
    includes several functions for importing and exporting data to and from different
    formats, making it easy to create graphs that can be used in reports or presentations.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: “ggpubr”包是R中流行的“ggplot2”包的附加包，它提供了创建和操作出版物质量图形的几个函数。这些函数包括创建自定义主题、添加注释和标签以及自定义图形的布局和外观。此外，“ggpubr”包还包括几个用于导入和导出不同格式的数据函数，这使得创建可用于报告或演示的图形变得容易。
- en: An example of how to create a text graphical object with R’s “ggpubr” package.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 使用R的“ggpubr”包创建文本图形对象的示例。
- en: '[PRE10]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../images/534235_1_En_4_Chapter/534235_1_En_4_Figa_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/534235_1_En_4_Chapter/534235_1_En_4_Figa_HTML.jpg)'
- en: A text defining iris dataset, training test, and their uses.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 定义鸢尾花数据集、训练测试及其用途的文本。
- en: Augmentation can be accomplished by making changes to existing data or using
    GANs. These changes can include padding, rotating, scaling, flipping, translating,
    cropping, zooming, darkening, brightening, and color modification. Additionally,
    noise can be added, and contrast can be changed.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 增强可以通过对现有数据进行更改或使用生成对抗网络（GANs）来实现。这些更改可以包括填充、旋转、缩放、翻转、平移、裁剪、缩放、变暗、变亮和颜色修改。此外，还可以添加噪声，并改变对比度。
- en: TF-Transformation Functions is a data augmentation method developed by Stanford
    AI Lab. This method is an image processing technique used to obtain data sets.
    TF-Transformation Functions enable datasets to be obtained by changing images
    and sounds. This method allows obtaining datasets by recording images from different
    angles and sounds at different frequencies.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: TF-Transformation Functions是由斯坦福AI实验室开发的一种数据增强方法。这种方法是一种图像处理技术，用于获取数据集。TF-Transformation
    Functions通过改变图像和声音来获取数据集。这种方法允许通过从不同角度录制图像和不同频率的声音来获取数据集。
- en: How the data is transformed into augmented data with the transformation functions
    (listed changes to existing data) is seen in the following Figure [4-7](#Fig7).
    We can label images, pixels, or key points to allow the computer to see them,
    or we can create a “*bounding box"* that bounds a digital image in the process
    to convert the training data into a labeled form. Labeling data in this way will
    allow the vision model to classify images, locate objects, identify key points of
    the image, or identify the part of the image.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下图 [4-7](#Fig7) 中可以看到，数据是如何通过变换函数（列出对现有数据的更改）转换为增强数据的。我们可以标注图像、像素或关键点，以便计算机能够看到它们，或者我们可以在转换训练数据为标记形式的过程中创建一个“*矩形框*”，将数字图像框定在过程中。以这种方式标注数据将允许视觉模型对图像进行分类、定位对象、识别图像的关键点或识别图像的某部分。
- en: '![](../images/534235_1_En_4_Chapter/534235_1_En_4_Fig7_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图 4-7](../images/534235_1_En_4_Chapter/534235_1_En_4_Fig7_HTML.jpg)'
- en: A photograph of a man with his right hand up. The face of the man is in a square
    box and some points are on his hands forming lines.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一张男人举起右手的照片。男人的脸部在一个方形框内，一些点在他的手上形成线条。
- en: Figure 4-7
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-7
- en: Bounding Box
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 矩形框
- en: Transformation operations such as padding, random rotating, and re-scaling,
    which we listed before, can be done manually, as well as automatic transformation
    operations can be performed on them after they are framed in the “bounding box”,
    as seen in Figure [4-7](#Fig7).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前列出的变换操作，如填充、随机旋转和重新缩放，可以手动完成，也可以在它们被框定在“矩形框”中后执行自动变换操作，如图 [4-7](#Fig7) 所示。
- en: There are different formats of bounding box annotations. The coordinates of
    the rectangular borders marking the person in the image are called *bounding boxes*.
    An example of bounding boxes is given in Figure [4-8](#Fig8).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 矩形框标注有不同的格式。标记图像中人物的矩形边框的坐标称为 *矩形框*。图 [4-8](#Fig8) 中给出了矩形框的示例。
- en: '![](../images/534235_1_En_4_Chapter/534235_1_En_4_Fig8_HTML.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图 4-8](../images/534235_1_En_4_Chapter/534235_1_En_4_Fig8_HTML.jpg)'
- en: A photograph is labeled as a man and woman in rectangular boxes. The size of
    the box for men is 260 cross 684 and for a woman is 165 cross 532.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一张照片被标记为男人和女人，用矩形框标注。男人的矩形框大小为 260 宽 x 684 高，女人的矩形框大小为 165 宽 x 532 高。
- en: Figure 4-8
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-8
- en: An example image with a bounding box
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 带有矩形框的示例图像
- en: Data augmentation is a suitable technique to improve the efficiency of image
    classifiers. Augmentation is done by adding new data to existing data. For example,
    we can generate new data by rotating an existing photo or by decreasing or increasing
    its brightness. The two properties of a good tester are intra-class invariance
    and inter-class distinctiveness. *Intra-class invariance* means that a data point
    can be replaced by another data point within the same class without affecting
    the results of the tester. *Inter-class distinctiveness* means that a data point
    can be replaced by a data point from a different class without affecting the results
    of the tester.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 数据增强是一种提高图像分类器效率的合适技术。增强是通过向现有数据添加新数据来完成的。例如，我们可以通过旋转现有照片或通过增加或减少其亮度来生成新数据。一个好的测试者的两个特性是类内不变性和类间区分性。*类内不变性*意味着一个数据点可以被同一类中的另一个数据点替换，而不会影响测试者的结果。*类间区分性*意味着一个数据点可以被来自不同类别的数据点替换，而不会影响测试者的结果。
- en: GANs are used to create new data that is as similar as possible to the real
    data. This is done by having a generator create data that is indistinguishable
    from the real data, while the discriminator tries to differentiate between the
    real data and the generated data. This process helps to create a more accurate
    approximation of the “true distribution” of data.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: GANs 用于创建尽可能接近真实数据的新数据。这是通过让生成器创建与真实数据不可区分的数据，同时判别器试图区分真实数据和生成数据来实现的。这个过程有助于创建数据“真实分布”的更准确近似。
- en: Python packages used for data augmentation include the Keras ImageDataGenerator,
    Skimage, and OpenCV. Anonymizing data means removing personal information from
    a dataset. This is done to protect people’s privacy. It is especially popular
    for text, a kind of structured data used in industries like finance and healthcare
    [[2](#Par7002)].
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 用于数据增强的 Python 包包括 Keras ImageDataGenerator、Skimage 和 OpenCV。匿名化数据意味着从数据集中删除个人信息。这是为了保护人们的隐私。这在金融和医疗保健等行业使用的结构化数据（如文本）中尤其受欢迎
    [[2](#Par7002)]。
- en: Anonymized and augmented data are different from synthetic data. Anonymized
    data is data that has been altered so that the identities of the people or organizations
    involved are hidden. Augmented data is data that has been altered to include extra
    information. Synthetic data is data that has been created artificially, using
    data augmentation techniques. For example, we can create a synthetic photo of
    cars using photos of cars.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 匿名增强数据与合成数据不同。匿名数据是经过修改的数据，使得涉及的个人或组织的身份被隐藏。增强数据是经过修改以包含额外信息的数据。合成数据是使用数据增强技术人工创建的数据。例如，我们可以使用汽车的照片创建一个合成汽车照片。
- en: Random erasing is a technique used in training CNNs. This technique randomly
    selects a rectangular region in the image and deletes its pixels with random values.
    This is claimed to help correct over-fitting in the model.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 随机擦除是一种在训练卷积神经网络（CNN）时使用的技巧。这种技巧随机选择图像中的一个矩形区域，并用随机值删除其像素。这声称有助于纠正模型中的过拟合。
- en: The Falling Things dataset is a collection of 61,500 images taken in household
    environments, which can be used to train and evaluate object detection and pose
    estimation algorithms. The dataset includes images of objects in various positions,
    allowing researchers to test algorithms for accurately detecting and estimating
    the position of objects. Additionally, the dataset includes images of objects
    in different depths and with different sensor modalities, allowing researchers
    to test algorithms for accurately estimating the depth and detecting objects in
    different environments.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: “掉落物”数据集是一个包含61,500张家庭环境拍摄图像的集合，可用于训练和评估目标检测和姿态估计算法。该数据集包括各种位置上的物体图像，使研究人员能够测试算法以准确检测和估计物体的位置。此外，该数据集还包括不同深度和不同传感器模态的物体图像，使研究人员能够测试算法以准确估计深度和在不同环境中检测物体。
- en: While the data augmentation technique is applied in computer vision, Reinforcement
    Learning with Augmented Data (RAD) technique can be applied. In this technique,
    it has been demonstrated by a study that the person performing the application
    provides an improvement in data efficiency and generalization by learning with
    various views of the same input. Reinforcement learning can be more widely applied
    to the real world if the gap between data efficiency and generalization is bridged.
    This would allow for more accurate learning from data and improve the overall
    performance of reinforcement learning algorithms.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 当数据增强技术在计算机视觉中得到应用时，增强数据强化学习（RAD）技术也可以被应用。在这一技术中，一项研究表明，执行应用的人通过学习同一输入的不同视角，提高了数据效率和泛化能力。如果能够弥合数据效率和泛化之间的差距，强化学习就可以更广泛地应用于现实世界。这将使得从数据中学习更加准确，并提高强化学习算法的整体性能。
- en: Image Augmentation Using Torch Package
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Torch包进行图像增强
- en: Torch is a machine learning library that is used to do natural language processing,
    computer vision, and general machine learning tasks. Torch is written in Lua, which
    is a scripting language that is easy to learn and use. The Torch has a lot of
    different statistical and graphical techniques that can be used, making which
    makes it versatile. Torch is popular among data scientists because it provides
    a wide range of algorithms and a large user community.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: Torch是一个用于执行自然语言处理、计算机视觉和通用机器学习任务的机器学习库。Torch是用Lua编写的，Lua是一种易于学习和使用的脚本语言。Torch拥有许多不同的统计和图形技术，可以用于各种任务，这使得它非常灵活。Torch在数据科学家中很受欢迎，因为它提供了广泛的算法和庞大的用户社区。
- en: 'Torch provides two main interfaces: an imperative programming style and a functional
    style. In the functional style, you first define the mathematical operations (or
    *nodes*) that make up the graph, and then you “wire” them together. Nodes can
    be connected in any order, and the resulting graph can be run in any order. This
    makes it easy to try out new ideas and see what works best.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: Torch提供了两种主要接口：命令式编程风格和函数式风格。在函数式风格中，你首先定义构成图的数学运算（或*节点*），然后“连接”它们。节点可以按任何顺序连接，生成的图也可以按任何顺序运行。这使得尝试新想法并看到什么效果最好变得容易。
- en: Torch also has a wide variety of built-in nodes for common tasks, such as matrix
    operations, convolutions, and so on. You can also write your nodes in C/C++ or
    Lua.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: Torch还提供了大量内置节点，用于常见任务，如矩阵运算、卷积等。你还可以用C/C++或Lua编写自己的节点。
- en: One of the advantages of Torch is that it is very fast. For example, the popular
    machine learning algorithm, support-vector machines can be trained much more quickly
    in Torch than in other languages. This is because Torch uses a library called
    CUDA, which provides a way to use your computer’s graphics processing unit (GPU)
    on your computer to perform some calculations. This can speed up training by a
    factor of 10 or more.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: Torch的一个优点是它非常快。例如，流行的机器学习算法支持向量机在Torch中的训练速度比在其他语言中快得多。这是因为Torch使用一个名为CUDA的库，它提供了一种方法，可以在您的计算机上使用图形处理单元（GPU）来执行一些计算。这可以将训练速度提高10倍或更多。
- en: Torch is also well-integrated with other scientific computing libraries, such
    as NumPy and SciPy. This makes it easy to use Torch to perform complex calculations
    on large data sets. Finally, Torch is open source and free to use.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: Torch也与其他科学计算库（如NumPy和SciPy）很好地集成。这使得使用Torch在大型数据集上执行复杂计算变得容易。最后，Torch是开源的，并且免费使用。
- en: The Torch package is a library for image augmentation. It provides a range of
    functions for modifying images, including cropping, rotating, scaling, and flipping.
    It also includes a range of filters, such as blur and saturation, that can be
    applied to images.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: Torch包是一个用于图像增强的库。它提供了一系列修改图像的函数，包括裁剪、旋转、缩放和翻转。它还包括一系列可以应用于图像的过滤器，如模糊和饱和度。
- en: The Torch package is a useful tool for increasing the diversity of your training data
    set. By applying a range of image modifications, you can create a more varied
    set of images that better represent the range of images that your algorithm will
    encounter in practice. This can help your algorithm to better learn to recognize
    objects and patterns in images.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: Torch包是一个用于增加您的训练数据集多样性的有用工具。通过应用一系列图像修改，您可以创建一个更具多样性的图像集，更好地代表您的算法在实际中可能遇到的图像范围。这可以帮助您的算法更好地学习识别图像中的对象和模式。
- en: The Torch package is also useful for debugging your algorithm. By visually inspecting
    the output of the torch package, you can quickly identify any problems with your
    algorithm, which helps you improve the accuracy of your algorithm.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: Torch包对于调试您的算法也非常有用。通过视觉检查torch包的输出，您可以快速识别算法中的任何问题，这有助于提高算法的准确性。
- en: Neural networks are a type of machine learning algorithm that can be used to
    model complex patterns in data. This means that they can be used to learn how
    to do things like recognizing animals’ faces or understanding speech. The Torch
    is a library that provides tools for working with neural networks. In this example,
    you will learn how to create a neural network using R, a programming language.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络是一种可以用于模拟数据中复杂模式的机器学习算法。这意味着它们可以用来学习如何做诸如识别动物的面部或理解语音之类的事情。Torch是一个提供用于处理神经网络的工具的库。在这个例子中，您将学习如何使用R编程语言创建神经网络。
- en: The codes used in this example are taken from the address “[`https://anderfernandez.com/en/blog/how-to-create-neural-networks-with-torch-in-/".r/".`](https://anderfernandez.com/en/blog/how-to-create-neural-networks-with-torch-in-r/)
    Once the package is installed, you can create a new matrix data or change the
    dimensions of existing data.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 本例中使用的代码来自地址[《如何在R中使用Torch创建神经网络》](https://anderfernandez.com/en/blog/how-to-create-neural-networks-with-torch-in-r/)。一旦安装了包，您就可以创建新的矩阵数据或更改现有数据的维度。
- en: '[PRE11]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: In our model, we use this model that created by Jauregui 2022, to generate different
    dimension of wine data set.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的模型中，我们使用Jauregui 2022年创建的模型来生成不同维度的葡萄酒数据集。
- en: '[PRE12]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The wine data set comes from [`https://www.kaggle.com/datasets/nareshbhat/wine-quality-binary-classification`](https://www.kaggle.com/datasets/nareshbhat/wine-quality-binary-classification).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 葡萄酒数据集来自[《葡萄酒质量二分类数据集》](https://www.kaggle.com/datasets/nareshbhat/wine-quality-binary-classification)。
- en: '[PRE13]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Also, you can resize an image using the “torchvision” packages.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，您还可以使用“torchvision”包调整图像大小。
- en: '[PRE14]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The image that used in this example comes from [`https://www.kaggle.com/datasets/vishalsubbiah/pokemon-images-and-types`](https://www.kaggle.com/datasets/vishalsubbiah/pokemon-images-and-types).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 本例中使用的图像来自[《宝可梦图像和类型数据集》](https://www.kaggle.com/datasets/vishalsubbiah/pokemon-images-and-types)。
- en: '[PRE15]'
