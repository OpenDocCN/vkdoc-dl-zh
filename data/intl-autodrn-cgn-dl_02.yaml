- en: 2. AI Rover System Design and Analysis
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. AI漫游车系统设计和分析
- en: We aim to develop an autonomous AI rover that can execute an exploratory mission
    in the Egyptian catacombs. Artificial intelligence (AI) systems such as the AI
    rover are complex and challenging to understand. Using the informal background
    story from Chapter 1, we will “draw pictures” to better understand our complex
    problem. We will use Universal Modeling Language (UML) diagrams to understand
    the structure and behavior of the system. Models are simplifications of complex
    ideas. For example, Newton’s Second Law of Motion tries to explain the physics
    of momentum. It is an excellent approximation, but it is not 100% accurate. It
    leaves out gravity, friction, and so on. But it *is* helpful.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是开发一个能够在埃及地下墓穴执行探险任务的自主人工智能漫游车。人工智能（AI）系统，如AI漫游车，复杂且难以理解。利用第一章的非正式背景故事，我们将“绘制图表”以更好地理解我们复杂的问题。我们将使用通用建模语言（UML）图来理解系统的结构和行为。模型是复杂想法的简化。例如，牛顿第二定律试图解释动量的物理。这是一个非常好的近似，但并不完全准确。它忽略了重力、摩擦等因素。但它*确实*是有帮助的。
- en: '*“All models are wrong, but some are useful.”*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*“所有模型都是错误的，但有些是有用的。”*'
- en: —George Box
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: ——乔治·博克斯
- en: So, to help us understand the complex rover system, we will model the stuff
    we don’t understand well using UML diagrams, which are helpful in modeling structure
    and behavior. The best thing about UML is that it can help us understand a fuzzy,
    poorly defined problem, taking us from a very informal description of the problem
    to its formal requirements and specifications. You do not need fancy software
    to draw UML diagrams, as you can draw them by hand. One of the significant advantages
    of software developed with UML is that some programs will generate simple skeleton
    codes of the structure defined by class diagrams.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了帮助我们理解复杂的漫游车系统，我们将使用UML图来模拟我们不太了解的部分，这些图在建模结构和行为方面非常有帮助。UML的最佳之处在于它可以帮助我们理解模糊、定义不明确的问题，将我们从一个非常非正式的问题描述带到其正式的需求和规范。您不需要复杂的软件来绘制UML图，因为您可以手动绘制。使用UML开发的软件的一个显著优点是，一些程序将生成由类图定义的结构的基本骨架代码。
- en: First, we model the problem at a very high level. We do not have to understand
    everything up front, just enough to “scope” the problem. We stop if we understand
    our problem well enough to create a complete solution. If we still cannot understand
    how to solve our problem, we expand the parts of our model we do not understand
    completely to understand a little more of the solution. We can start developing
    a solution, and if we get stuck, we can back off and reexamine this part of the
    problem by modeling it in more detail (i.e., adding a friction component to Newton’s
    equation.)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们在非常高的层次上对问题进行建模。我们不必一开始就了解所有内容，只需足够了解“范围”问题即可。当我们对问题理解得足够好，可以创建一个完整的解决方案时，我们就会停止。如果我们仍然不知道如何解决问题，我们将扩展我们不完全理解的模型部分，以更好地理解解决方案的一部分。我们可以开始开发解决方案，如果我们遇到困难，我们可以退后一步，通过更详细地建模这部分问题（即，在牛顿方程中添加摩擦成分）来重新审视这个问题。
- en: Although UML diagrams look very similar to caveman art, they are helpful for
    high-level modeling or understanding a complex system. So, let us start making
    “useful” models.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管UML图看起来与穴居人的艺术非常相似，但它们对于高级建模或理解复杂系统非常有帮助。因此，让我们开始制作“有用”的模型。
- en: Chapter Objectives
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 章节目标
- en: 'The reader will be able to achieve the following by reading this chapter:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 通过阅读本章，读者将能够实现以下目标：
- en: Review the software specifications and requirements for the AI rover.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回顾AI漫游车的软件规范和需求。
- en: Use a Universal Modeling Language (UML) framework for object-oriented software
    development for the AI rover.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用通用建模语言（UML）框架进行AI漫游车的面向对象软件开发。
- en: Create UML use cases to satisfy requirements.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建UML用例以满足需求。
- en: Understand the difference between functional and non-functional requirements.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解功能和非功能需求之间的区别。
- en: Identify functional and non-functional requirements for the AI rover.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定AI漫游车的功能和非功能需求。
- en: Learn how to handle complexity within the AI rover.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习如何处理AI漫游车中的复杂性。
- en: Understand the five levels of software and hardware design.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解软件和硬件设计的五个层次。
- en: Review what software tools will be required for this chapter.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回顾本章所需的软件工具。
- en: Understand the AI rover’s static and dynamic features.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解AI漫游车的静态和动态特性。
- en: Placing the Problem in Context
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将问题置于上下文中
- en: Understanding what belongs to the system and what does not belong to the system
    is our first step. This defines the context of the system. To accomplish this,
    we first need to define the “black box” that represents our rover. A black box
    system means that we know it has inputs and outputs, but we do not know how the
    inputs give us the outputs (Figure [2-1](#Fig1).)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 理解属于系统和不属于系统的内容是我们的第一步。这定义了系统的上下文。为了完成这个任务，我们首先需要定义代表我们的探测车的“黑盒”。黑盒系统意味着我们知道它有输入和输出，但我们不知道输入是如何产生输出的（图[2-1](#Fig1)）。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig1_HTML.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig1_HTML.png)'
- en: A diagram of the black box system. It consists of a right arrow labeled input
    that points to a square labeled system with three question marks below it. Another
    right arrow labeled output is at the right of the square.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒系统的图。它由一个标记为输入的右箭头指向一个标记为系统的正方形，其下方有三个问号。正方形右侧还有一个标记为输出的右箭头。
- en: Figure 2-1
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-1
- en: Black box system
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒系统
- en: Defining our system should be done in simple English, not engineering technobabble.
    Our first attempt at writing a goal is “an intelligent rover that can explore
    unknown environments.” This is simple and straightforward, but is it complete?
    At this time, we will consider it “complete enough,” but we may expand it later
    when we understand the problem better.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 用简单的英语定义我们的系统，而不是工程术语。我们第一次尝试写目标时是“一个能够探索未知环境的智能探测车。”这很简单，很直接，但它完整吗？目前，我们将它视为“足够完整”，但当我们更好地理解问题后，我们可能会扩展它。
- en: As written, it gives us a description of a system that states what is in the
    system (explore mission, intelligence, etc.) and what is not in the system (search
    and rescue missions, robot killers, etc.). Although a context diagram is not UML,
    we will create a simple one—first we start with our system description and treat
    it as a black box.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如此描述，它给出了一个系统的描述，说明了系统中有什么（探索任务、智能等）以及系统中没有什么（搜索和救援任务、机器人杀手等）。尽管上下文图不是UML，但我们将创建一个简单的上下文图——首先，我们从系统描述开始，将其视为一个黑盒。
- en: Next, we try to figure out who or what will interact with our black box. The
    things that interact with the system are called actors. In our book, actors are
    drawn as ovals.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们试图弄清楚谁或什么会与我们的黑盒交互。与系统交互的事物被称为演员。在我们的书中，演员被绘制成椭圆形。
- en: In our exploration problem, we start with one actor. The actor “operates” the
    rover like a remote-control car by “starting the rover,” “navigating the rover,”
    and “ending the mission the rover is on” (Figure [2-2](#Fig2)).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的探索问题中，我们从一个演员开始。演员“操作”探测车，就像遥控车一样，通过“启动探测车”、“导航探测车”和“结束探测车上的任务”（图[2-2](#Fig2)）。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig2_HTML.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig2_HTML.png)'
- en: A schematic of the addition of actors. An oval, labeled operator points to a
    box on the right, labeled, intelligent self-driving rover that can explore unknown
    environments. A box below the operator is labeled navigate, start mission, and
    end mission.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 添加演员的示意图。一个标记为操作员的椭圆形指向右侧的一个方框，标记为“能够探索未知环境的智能自动驾驶探测车”。操作员下面的方框标记为“导航”、“启动任务”和“结束任务”。
- en: Figure 2-2
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-2
- en: Adding the actors
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 添加演员
- en: Next, we attempt to define what the interactions will be. We do not care how
    the interactions will be implemented, just that they are listed. The supervisor
    does not directly control the rover like a remote-control car, but rather the
    supervisor plans the mission and tells the rover to “start the mission,” “stop,”
    “return,” etc. (Figure [2-3](#Fig3)). The operator may direct the rover to “stop,”
    “turn left,” etc. Since the rover is autonomous, it must observe the environment
    and supply input to itself to “change direction,” “stop,” “return,” etc. Notice
    that each interaction is of the form *verb-noun* or *verb* .
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们试图定义交互将是什么。我们不在乎交互将如何实现，只关心它们被列出。主管不会像遥控车一样直接控制探测车，而是主管计划任务，告诉探测车“启动任务”、“停止”、“返回”等（图[2-3](#Fig3)）。操作员可能指示探测车“停止”、“向左转”等。由于探测车是自主的，它必须观察环境并向自己提供输入以“改变方向”、“停止”、“返回”等。注意，每个交互的形式是*动词-名词*或*动词*。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig3_HTML.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig3_HTML.png)'
- en: A schematic of the context with constraints. A box labeled develop an intelligent
    self-driving rover, divides into supervisor with plan and supervise missions,
    stop, and return; operator with control movement, use sensor, and stop; rover
    with change direction, reroute, and so on. A list on the top has Raspberry P i
    4, Linux desktop O S, and so on.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 带有约束的上下文示意图。一个标有“开发智能自动驾驶漫游车”的框分为监督者（带计划和管理任务、停止和返回）、操作员（控制移动、使用传感器和停止）以及漫游车（改变方向、重新规划路线等）。顶部有一个列表，包括Raspberry
    Pi 4、Linux桌面操作系统等。
- en: Figure 2-3
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-3
- en: Context diagram with constraints
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 带有约束的上下文图
- en: The last step in our context diagram is to figure out what limitations are on
    our system. These are known as constraints and may be based on hardware, software,
    or business reasons. For instance, we will use a Raspberry Pi 4—this means we
    have a quad-core 1.5 GHz Arm Cortex-A72–based processor. It will not run faster.
    It can have up to 4 GB RAM and no more. The Pixhawk chip will be our autopilot
    system, thus limiting us to its functionality. We will use less than s$500 in
    purchasing the entire system. These are all constraints that are necessary to
    document at the beginning so that we limit our search for a solution to within
    the boundaries of the constraints (Figure [2-3](#Fig3)).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的上下文图中，最后一步是确定我们系统上的限制。这些被称为约束，可能基于硬件、软件或商业原因。例如，我们将使用Raspberry Pi 4——这意味着我们有一个基于四核1.5
    GHz Arm Cortex-A72处理器的处理器。它不会运行得更快。它可以有高达4 GB的RAM，不能再多了。Pixhawk芯片将作为我们的自动驾驶系统，从而限制我们的功能。我们在购买整个系统时将花费少于500美元。这些都是我们在开始时必须记录的约束，以便我们将解决方案的搜索限制在约束的范围内（图[2-3](#Fig3)）。
- en: At this point, we have enough to begin to understand the problem. We don’t have
    enough information to complete the solution, but we have a glimmer of the complexity.
    Obviously, the project is bigger than this diagram suggests, but we can modify
    the diagram as we more fully understand the problem. The context diagram also
    starts to help us to understand the functional and non-functional requirements.
    The constraints are examples of non-functional requirements, and the lists below
    each actor are examples of functional requirements.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经足够理解问题。我们没有足够的信息来完成解决方案，但我们已经看到了复杂性的曙光。显然，项目比这个图所暗示的要大，但我们可以随着对问题的更深入理解来修改这个图。上下文图也开始帮助我们理解功能和非功能需求。约束是非功能需求的例子，每个参与者下面的列表是功能需求的例子。
- en: Developing the First Static UML Diagrams for AI Rover
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为AI漫游车开发第一个静态UML图
- en: We will continue our discussion of developing a rudimentary adaptable navigational
    system for the AI rover. We should state that what is meant by the word “adaptable”
    in this sense is that the robot is able to stop and avoid collisions with obstacles
    encountered within its driving path. We will see in future chapters of this manuscript
    that we will develop sense-and-avoid capabilities that will allow the rover to
    develop alternative paths to help it to circumnavigate obstacles located within
    its path. The future development of the AI rover's ability to determine alternative
    driving paths will be critical for it to avoid obstacles encountered during its
    decent into and exploration of the well, caverns, tombs, and catacombs located
    at the base of the Great Pyramids of Egypt.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将继续讨论为AI漫游车开发基本的适应性导航系统。我们应该指出，在这个意义上，“适应性”一词的意思是机器人能够在其行驶路径中停止并避免与遇到的障碍物相撞。我们将在本手稿的后续章节中看到，我们将开发感知和避免能力，这将使漫游车能够开发替代路径，帮助它绕过其路径中的障碍物。AI漫游车确定替代行驶路径的未来发展将对其在埃及大金字塔底部下降和探索时遇到的障碍物进行规避至关重要。
- en: The purpose of doing static modeling for each of the components of the AI rover
    is to design the interfaces between the hardware portions of the AI rover, the
    software components within the AI rover, and the environment (simulated or physical).
    This is done to create the static structure of the AI rover under development
    so as to develop the class diagrams for (in this case) the beginnings of the adaptive
    navigation component of the AI rover. This is especially important for developing
    the Python routines that are needed for the near-real-time nature of an AI rover.
    Therefore, the system-context class diagram can be developed by static modeling
    the system classes that are connected to the different software and hardware components
    of the AI rover. For example, please refer to the class diagram in Figure [2-4](#Fig4).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对 AI 洞察者每个组件进行静态建模的目的是设计 AI 洞察者硬件部分、AI 洞察者内部的软件组件以及环境（模拟或物理）之间的接口。这样做是为了创建正在开发的
    AI 洞察者的静态结构，以便开发类图（在这种情况下是 AI 洞察者自适应导航组件的起点）。这对于开发 AI 洞察者近实时性质所需的 Python 程序尤为重要。因此，可以通过对连接到
    AI 洞察者不同软件和硬件组件的系统类进行静态建模来开发系统上下文类图。例如，请参阅图 [2-4](#Fig4) 中的类图。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig4_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-4](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig4_HTML.jpg)'
- en: A class diagram of the camera navigation. It consists of the human-operator,
    external user class of ground control station, system class of A I rover navigation
    system, external output wheel, and Raspberry P i G P I O classes of wheel actuator.
    System class consists of external input device class of electro-optical camera.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这是相机导航的类图。它包括人机操作员、地面控制站的外部用户类、AI 洞察者导航系统的系统类、外部输出轮，以及轮执行器的 Raspberry Pi GPIO
    类。系统类包括光电相机的外部输入设备类。
- en: Figure 2-4
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-4
- en: Class diagram for camera navigation
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 相机导航的类图
- en: Now let’s review the contents found within Figure [2-4](#Fig4). We have now
    developed the context class diagram for the first use case that was developed
    in Figure [2-3](#Fig3). The context class diagram reveals how the system needs
    to interface with external devices or actors. The navigation system for the AI
    rover accepts a command from the human operator through the ground control station.
    This command then tells the robot to what destination it needs to travel within
    the grid-map. In our case, we have selected an electro-optical camera to be interfaced
    with the AI rover navigation system. There are other sensors that could be employed
    with this interface, such as LiDAR, ultrasonic, and proximity sensors. The critical
    need for the context class diagram corresponds to the interactions between the
    AI rover’s navigational system, the connected camera sensor, the output wheel
    actuator device via the Raspberry Pi’s GPIO, and the external interaction with
    the ground control station and the human operator. We could also easily add a
    timer to the system to periodically send update commands to the wheel actuator,
    to allow the wheel actuator to be more reactive to direction updates.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来回顾一下图 [2-4](#Fig4) 中找到的内容。我们已经为图 [2-3](#Fig3) 中开发的第一用例开发了上下文类图。上下文类图揭示了系统需要如何与外部设备或参与者进行接口。AI
    洞察者的导航系统通过地面控制站接受来自人机操作员的命令。这个命令然后告诉机器人它需要在网格图中前往哪个目的地。在我们的案例中，我们选择将光电相机与 AI 洞察者导航系统接口。还有其他传感器可以与这个接口一起使用，例如激光雷达、超声波和接近传感器。上下文类图的关键需求对应于
    AI 洞察者导航系统、连接的相机传感器、通过 Raspberry Pi 的 GPIO 连接的输出轮执行器设备以及与地面控制站和人类操作员的外部交互。我们还可以轻松地向系统中添加计时器，定期向轮执行器发送更新命令，以便轮执行器能够对方向更新做出更快的反应。
- en: The primary purpose of developing static class diagrams is to allow us to develop
    the foundations for creating the dynamic modeling for the adaptive navigational
    component for the AI rover. Another primary purpose of developing that static
    model is to resolve the problem of the navigational component into objects within
    the system. A critical part of this process is to identify the external interfaces
    of the navigational component. These interface objects would be the wheel actuator
    interface, the ground control station interface, and the sensor interface. Now
    we will need to consider how to develop the control objects that are necessary
    to allow the AI rover to operate correctly. These control objects are critically
    needed to provide coordination and collaboration between the objects defined within
    both the use case and the static modeling of the navigation component. Examples
    of control objects would be the coordinator, state-dependent control, mission
    timer, and camera control or camera vision signal processing. As such, there will
    also be storage memory objects, which store memory that needs to be contained
    in order for the navigational controls to be operational; they would be the navigational
    map (could use QGIS), driving pathway determined, destination, and current map
    position (possibly data from GPS). The use of the current map position and the
    mission timer could allow us to develop a prediction as to the mission duration
    and power-rate consumption characteristics of the AI rover’s moving from its current
    position to a targeted position. We could also use the mission timer to determine
    if the AI rover has fallen into a position that it cannot escape from and whether
    the rover might need to turn the electrical power off and conserve power as a
    result of the unsatisfactory period of time that the AI rover has taken to reach
    its intended target location. This might be true in the event that the rover has
    either flipped over to one of its sides or has become trapped and can no longer
    proceed to the final destination point. Events such as this need to be handled
    by our mission timer. We could also designate our mission timer and the navigational
    timer as being one and the same. The mission or navigational control timer will
    be controlled by the navigational control object. We also need to point out to
    the reader that the navigational control object itself will ultimately be controlled
    by the cognitive deep learning intelligence engine object that we are now in the
    process of creating.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 开发静态类图的主要目的是为了让我们能够为AI漫游车的自适应导航组件创建动态建模的基础。开发该静态模型的另一个主要目的是将导航组件的问题分解为系统内的对象。这个过程的一个关键部分是确定导航组件的外部接口。这些接口对象包括轮子执行器接口、地面控制站接口和传感器接口。现在我们需要考虑如何开发必要的控制对象，以使AI漫游车能够正确运行。这些控制对象对于在用例和导航组件的静态建模中定义的对象之间提供协调和协作至关重要。控制对象的例子包括协调器、状态相关控制、任务计时器以及相机控制或相机视觉信号处理。因此，还将有存储内存对象，它们存储需要包含在导航控制中才能使其操作有效的内存；它们将是导航地图（可能使用QGIS）、已确定的驾驶路径、目的地和当前地图位置（可能是来自GPS的数据）。使用当前地图位置和任务计时器可以让我们预测AI漫游车从当前位置移动到目标位置的任务持续时间和功率消耗特性。我们还可以使用任务计时器来确定AI漫游车是否陷入了一个无法逃脱的位置，以及漫游车是否因为AI漫游车到达预定目标位置所花费的不满意的时间而需要关闭电力并节省能量。这可能发生在漫游车翻到一边或被困住，无法继续前往最终目的地点的情况下。此类事件需要由我们的任务计时器处理。我们还可以将我们的任务计时器和导航计时器指定为同一对象。任务或导航控制计时器将由导航控制对象控制。我们还需要向读者指出，导航控制对象本身最终将由我们目前正在创建的认知深度学习智能引擎对象控制。
- en: As we develop the object structure for our navigational system, we can see that
    we can add localizer and path-planner algorithms to the internal structure of
    the navigational system. By taking advantage of the object-oriented programming
    paradigm, we can test different types of localizer and path-finding algorithms
    to statistically analyze, test, and determine which one of those groups of algorithms
    is the most computationally efficient. For example, we could determine through
    statistical analysis whether the A* algorithm would be ideal within the role of
    exploring the Egyptian catacombs as the main path-finding algorithm. As such,
    we can review the class structure diagram of the navigational system shown in
    Figure [2-5](#Fig5).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们为我们的导航系统开发对象结构，我们可以看到我们可以在导航系统的内部结构中添加定位器和路径规划算法。通过利用面向对象编程范式，我们可以测试不同类型的定位器和路径寻找算法，以进行统计分析、测试并确定这些算法组中哪一个是最计算高效的。例如，我们可以通过统计分析来确定A*算法在作为探索埃及地下墓穴的主要路径寻找算法的角色中是否是理想的。因此，我们可以回顾图[2-5](#Fig5)所示的导航系统类结构图。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig5_HTML.jpg)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig5_HTML.jpg)'
- en: A class diagram of A I rover navigational system. External user of C G S has
    ground control station and path-finding information, external output device of
    wheel actuator has wheel actuator and Q G I S navigational map, external input
    device of camera sensor has camera interface and current position. It also has
    mission timer, localizer, and so on.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能漫游车导航系统的类图。C G S的外部用户有地面控制站和路径寻找信息，轮执行器的外部输出设备有轮执行器和Q G I S导航地图，摄像头传感器的外部输入设备有摄像头接口和当前位置。它还包括任务计时器、定位器等。
- en: Figure 2-5
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-5
- en: AI rover system class-association relationship
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能漫游车系统类关联关系
- en: Developing the First Dynamic UML Diagrams for AI Rover
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开发人工智能漫游车的第一个动态UML图
- en: The purpose of dynamic modeling is to capture and understand the dynamic nature
    of the AI rover system so we can understand its subsequent components. It is important
    to note that dynamic diagrams make use of the interactions that were identified
    during the initial use-case and static-diagramming process for object structuring
    of the AI rover navigational system, as identified in Figure [2-5](#Fig5).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 动态建模的目的是捕捉和理解人工智能漫游车系统的动态特性，以便我们能够理解其后续组件。值得注意的是，动态图利用了在人工智能漫游车导航系统对象结构化过程中识别出的初始用例和静态绘图过程中的交互，如图[2-5](#Fig5)所示。
- en: By now, it should be evident how an object-oriented approach to design can allow
    us to develop systems with scaling complexity. We are now able to visualize the
    first robotic structures in software and hardware which are starting to take form.
    We can now start to develop the modular control structure, which is composed of,
    at first, the deep learning networks, and later the cognitive architecture that
    will be constructed on top of these deep learning networks. This modular control
    structure will also allow us to create specialized components that pertain to
    the interfaced components, such as LiDAR and camera sensors. Each of these software
    components will act as a brick in the final creation of an AI rover.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，应该很明显，面向对象的设计方法如何使我们能够开发具有可扩展复杂性的系统。我们现在能够在软件和硬件中可视化最初开始形成的第一个机器人结构。我们现在可以开始开发模块化控制结构，最初由深度学习网络组成，后来在这些深度学习网络之上构建认知架构。这种模块化控制结构还将使我们能够创建与接口组件相关的专用组件，例如激光雷达和摄像头传感器。这些软件组件中的每一个都将作为最终创建人工智能漫游车的一个砖块。
- en: The Robotic Operating System (ROS) that we will be reviewing in Chapter [3](494112_1_En_3_Chapter.xhtml)
    will also allow us to develop a general-purpose robotic control software package
    that will be based on components both in simulation with AirSim and Gazebo and
    within the real-world system. The already present nature of modularity and flexibility
    that is available within recent variants of ROS will allow us to experiment with
    and develop complex robot systems with cognitive engines built in. The use of
    ROS will allow us to also integrate components for kinematics, dynamics, control,
    decision making, limited situational awareness, and software–hardware interfaces.
    Each these items will be either a class or an object that can be added or removed
    within the open-source development environment for ROS.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在第[3](494112_1_En_3_Chapter.xhtml)章中回顾的机器人操作系统（ROS）也将使我们能够开发一个基于AirSim和Gazebo模拟以及现实世界系统组件的通用机器人控制软件包。ROS最近版本中已经存在的模块化和灵活性将允许我们实验并开发内置认知引擎的复杂机器人系统。使用ROS还将使我们能够集成运动学、动力学、控制、决策、有限情境感知和软件-硬件接口的组件。每个这些项目都将是一个可以添加或删除在ROS开源开发环境中的类或对象。
- en: One last step we need to review before we go into developing the actual dynamic
    model is the business process for the robotic navigational task that was discussed
    in the last section on static modeling for the AI rover. This task that is being
    controlled at first by our deep learning routines and then finally our cognitive
    engine that will be built on top of it will most definitely need to modeled within
    an object-oriented framework because of the number of interacting and controlling
    components. The one problem that needs to be addressed is self-localization as
    one of the main goals for navigation. The information sent to the navigation system
    is provided as the direction and distance from the goal to target. The AI robot
    must also deal with errors caused by sensors and environmental uncertainty. Therefore,
    we will go over the business model diagram, which represents how the mobile robot
    cognitive deep learning navigation system must operate. This system was developed
    with a hierarchical paradigm in mind. The AI rover, as well as the decision-making
    cognitive deep learning engine, acts only after planning the driving pathway by
    processing sensor readings. The cognitive deep learning system allows the robot
    to enable a navigational task with continuous sensing in a static environment
    where there are no objects moving, as within the Egyptian catacombs. Once the
    navigational task is being executed, the AI rover will complete a new cycle of
    information from all available sensors and then finish with a single move command
    (Forward, Backward, Left, or Right) produced by the cognitive deep learning engine.
    Eventually, in the later chapters of this book, the amount of distance covered
    with each Forward or Backward movement command and the degrees for the angle of
    attack with each Left or Right command will ultimately be produced by the cognitive
    deep learning engine itself.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们进入实际动态模型开发之前，需要回顾的最后一步是关于AI漫游车静态建模部分所讨论的机器人导航任务的业务流程。这个任务最初由我们的深度学习程序控制，然后最终由构建在其之上的认知引擎控制，由于涉及大量交互和控制组件，因此肯定需要在面向对象框架内进行建模。需要解决的一个问题是自定位，这是导航的主要目标之一。导航系统接收到的信息是目标与目标之间的方向和距离。AI机器人还必须处理由传感器和环境不确定性引起的误差。因此，我们将回顾业务模型图，它表示移动机器人认知深度学习导航系统必须如何操作。这个系统是在考虑分层范式的情况下开发的。AI漫游车以及决策制定认知深度学习引擎，只有在处理传感器读数并规划驾驶路径后才会行动。认知深度学习系统允许机器人在静态环境中执行导航任务，在这种环境中没有物体移动，例如在埃及地下墓穴中。一旦导航任务开始执行，AI漫游车将完成来自所有可用传感器的信息的新循环，然后由认知深度学习引擎产生的单个移动命令（前进、后退、左转或右转）结束。最终，在本书的后续章节中，每次前进或后退移动命令覆盖的距离以及每次左转或右转命令的攻击角度将最终由认知深度学习引擎本身产生。
- en: Note
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Please be aware that we will be closely reviewing and describing the subsections
    of the business logic that will describe the navigational and cognitive deep learning
    processes needed for the AI rover to explore the catacombs and external structures
    of the Egyptian pyramids. This business logic is critical in helping us to create
    the UML class diagrams. This portion of the text needs to be closely read and
    examined for comprehension.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，我们将密切审查和描述业务逻辑的子部分，这些子部分将描述AI漫游车探索埃及地下墓穴和金字塔外部结构所需的导航和认知深度学习过程。这个业务逻辑对于帮助我们创建UML类图至关重要。这部分文本需要仔细阅读和检查以理解。
- en: Therefore, the first section of this process has to start at the beginning of
    the business logic diagram itself. When the adaptive navigational task begins,
    the first process, in the form of a box, will obtain sensor readings from LiDAR,
    ultrasonic, proximity sensors, and Raspberry Pi 4 cameras. The first process (processes
    are indicated in the diagram as boxes) executed is the sensor readings. This information
    is then sent to update the resource database of Sensor Data. All databases are
    represented by cylinders in business logic diagrams. Sensor Data is a list of
    all sensor spatial coordinates retrieved by the Sensors process, and the data
    will usually utilize the cartesian coordinate system. These coordinates are usually
    the ending points of the vectors starting at the robot and ending in the detected
    obstacles within the Egyptian catacombs. What this means is that the coordinates
    indicate the position that the robot was in when it took the sensor sample and
    the corresponding calculated distance and coordinates of the sensor data point
    of the object that was detected by the same sensor. Figure [2-6](#Fig6) represents
    the UML business logic diagram of this very first stage of the adaptive navigational
    task for the AI rover.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这个过程的第一部分必须从业务逻辑图的开始处开始。当自适应导航任务开始时，第一个过程，以一个方框的形式出现，将从激光雷达、超声波、接近传感器和Raspberry
    Pi 4摄像头获取传感器读数。执行的第一个过程（在图中以方框表示的过程）是传感器读数。然后，这些信息被发送以更新传感器数据资源数据库。所有数据库在业务逻辑图中都表示为圆柱体。传感器数据是传感器过程检索到的所有传感器空间坐标的列表，数据通常利用笛卡尔坐标系。这些坐标通常是起点在机器人处，终点在埃及地下墓穴内检测到的障碍物内的向量的终点。这意味着坐标表示了机器人在进行传感器采样时的位置，以及由同一传感器检测到的对象的相应计算距离和传感器数据点的坐标。图[2-6](#Fig6)表示了AI漫游车自适应导航任务这个最初阶段的UML业务逻辑图。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig6_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig6_HTML.jpg)'
- en: A logic diagram of the sensors and sensor database. A dark circle on the top-left
    corner and a curved right arrow point to the sensors such as camera, lidar, and
    ultrasonic. The sensors further point to a cylinder on the right, through a dotted
    right arrow, labeled sensor data, via use.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 传感器和传感器数据库的逻辑图。左上角的一个黑色圆圈和一条向右弯曲的箭头指向传感器，如摄像头、激光雷达和超声波传感器。传感器进一步通过一条虚线向右指向一个圆柱体，标记为传感器数据，通过使用。
- en: Figure 2-6
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-6
- en: Business logic diagram for sensors and sensor database
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 传感器和传感器数据库的业务逻辑图
- en: Note
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Please note that every process and database for the AI rover’s adaptive navigational
    task will be fully described conceptually and logically within their correct and
    corresponding chapters in this book. Remember this AI rover needs to survive.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，本书中关于AI漫游车自适应导航任务的每一个过程和数据库都将在其正确和相应的章节中从概念和逻辑上进行全面描述。记住，这个AI漫游车需要生存。
- en: Once the Sensors process has completed, there will be another process to be
    executed. This next process is called the SLAM or Vision Processing Analysis process.
    The SLAM, or Simultaneous Localization and Mapping, is a statistical algorithm
    for processing either a two-dimensional or a three-dimensional map and thus determining
    the location of the robot within the ever-expanding map. We will also talk about
    how the map process of SLAM might be limited due to memory allocation issues for
    such a problem. For the purpose of this version of the AI rover, we will be concentrating
    on a two-dimensional representation for SLAM in order to determine the location
    of the robot and what course adjustments might need to be made as the AI rover
    is carrying out its mission in the catacombs. The local map is based on the estimate
    of its position, and this same local map is then integrated within the global
    map to help the AI rover navigate toward its goal location. SLAM utilizes multiple
    estimated values that can then integrate information from several sensor sources.
    SLAM then determines the position of the AI rover and updates it to the Sensor
    Data database. Another algorithm that can be used within SLAM or image processing
    is to use monocular or binocular cameras to determine the position of an object
    and to execute sense-and-avoid maneuvers for the AI rover as it is going from
    one point to the next.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦传感器处理完成，将会有另一个过程需要执行。这个后续过程被称为SLAM或视觉处理分析过程。SLAM，即同时定位与建图，是一种用于处理二维或三维地图的统计算法，从而确定机器人在不断扩展的地图中的位置。我们还将讨论SLAM的地图处理可能因内存分配问题而受限。对于这个版本的AI漫游车，我们将专注于二维表示的SLAM，以确定机器人的位置以及AI漫游车在地下墓穴执行任务时可能需要做出的航向调整。局部地图基于其位置的估计，然后这个相同的局部地图被整合到全局地图中，以帮助AI漫游车导航到目标位置。SLAM利用多个估计值，然后整合来自多个传感器源的信息。SLAM随后确定AI漫游车的位置，并将其更新到传感器数据数据库。在SLAM或图像处理中可以使用的一种算法是使用单目或双目相机确定物体的位置，并在AI漫游车从一个点到另一个点移动时执行感知与规避动作。
- en: Once the Position and the Sensor Data databases have been updated, the next
    step is to execute the Occupancy Grid process. This process transforms the sensor
    data within a tessellated map of the probability of obstacles’ being within a
    certain point or region of the grid. It then uploads the local map, which is why
    the local map must be current and centralized constantly at the AI rover’s location.
    Once this is done the local map is then incorporated into the global map, which
    could also use the GIS software package QGIS as the database. Figure [2-7](#Fig7)
    shows the UML business logic diagram that describes this process within the AI
    rover’s adaptive navigational task.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦位置和传感器数据数据库已更新，下一步是执行占用网格过程。这个过程将传感器数据转换为一个镶嵌地图中障碍物在网格的某个点或区域内的概率。然后上传局部地图，这就是为什么局部地图必须始终保持在AI漫游车的当前位置，并且是当前的、集中的。一旦完成，局部地图就被纳入全局地图，全局地图也可能使用GIS软件包QGIS作为数据库。图[2-7](#Fig7)显示了描述AI漫游车自适应导航任务中此过程的UML业务逻辑图。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig7_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig7_HTML.jpg)'
- en: A logic diagram for S L A M and cognitive processing. The sensors point to sensor
    data and S L A M for L i D A R, to occupancy grid to local map Q G I S and update
    map to global map Q G I S and cognitive deep learning engine path planning. S
    L A M for L i D A R points to position to occupancy grid and cognitive deep learning
    engine path planning.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: S L A M和认知处理的逻辑图。传感器指向传感器数据、SLAM（用于L i D A R）、占用网格到局部地图Q G I S以及更新地图到全局地图Q G
    I S和认知深度学习引擎路径规划。SLAM（用于L i D A R）指向位置到占用网格和认知深度学习引擎路径规划。
- en: Figure 2-7
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-7
- en: Business logic diagram for SLAM and cognitive processing
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: SLAM和认知处理的业务逻辑图
- en: The final process involves cognitive deep learning, which directly controls
    the path-planning process, one of the primary responsibilities and characteristics
    of the cognitive intelligence engine. The cognitive engine is thus provided with
    the most current version of the global map database, as well as the required goals
    of the navigational task and the estimated location of the AI rover. The driving
    path solution is then generated by the cognitive deep learning engine and is then
    followed by the rover itself. The path is essentially cartesian coordinates interpolated
    by straight lines for the rover to traverse. Therefore, each line is a specific
    driving action for the AI rover’s wheel actuators. Also, the pathway is determined
    by the physical dimensions of the rover, as it determines whether the rover has
    clearance with respect to areas around the rover itself. The cognitive engine
    also regularly updates the path segment. The path segment is what actually and
    directly gives the commands to the wheel actuators as to how to follow the pathway
    driving solution. If all of the goals have NOT been completed, then the entire
    cycle begins again. That is the reason for the diamond-shaped decision block in
    the UML diagram in Figure [2-8](#Fig8).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 最终过程涉及认知深度学习，它直接控制路径规划过程，这是认知智能引擎的主要职责和特性之一。因此，认知引擎提供了全球地图数据库的最新版本，以及导航任务的所需目标和
    AI 探索者的估计位置。然后由认知深度学习引擎生成驾驶路径解决方案，并由探索者本身跟随。路径基本上是用于探索者穿越的直线插值笛卡尔坐标。因此，每条线都是 AI
    探索者车轮执行器的特定驾驶动作。此外，路径由探索者的物理尺寸决定，因为它决定了探索者与其周围区域是否有空间。认知引擎还定期更新路径段。路径段实际上是直接向车轮执行器下达命令，指示如何遵循路径驾驶解决方案。如果所有目标尚未完成，则整个周期再次开始。这就是
    UML 图中图 [2-8](#Fig8) 中菱形决策块的原因。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig8_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-8](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig8_HTML.jpg)'
- en: A logic diagram for path segmentation and move commands. Position points to
    Cognitive deep learning from the top and goal and path point to it from the bottom.
    The cognitive deep learning points to path segmentation and move A I rover. Path
    segmentation also points to Move A I rover, it further points to a blank square
    on the top left corner.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 路径分割和移动命令的逻辑图。从顶部开始，位置点指向认知深度学习，从底部开始，目标和路径点指向它。认知深度学习指向路径分割和移动 AI 探索者。路径分割也指向移动
    AI 探索者，它进一步指向左上角的空白方块。
- en: Figure 2-8
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-8
- en: Business logic diagram for path segmentation and move commands
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 路径分割和移动命令的业务逻辑图
- en: Note
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Now the entire adaptive navigation task that is being controlled by the cognitive
    engine can be appreciated within the following UML business logic diagram (Figure
    [2-9](#Fig9)).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 现在可以在以下 UML 业务逻辑图中（图 [2-9](#Fig9)）欣赏到由认知引擎控制的整个自适应导航任务。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig9_HTML.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-9](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig9_HTML.jpg)'
- en: A logic diagram for the A I rover system. The various compartments are sensors,
    sensor data, S L A M for L i D A R, position, occupancy grid, local map Q G I
    S, update map, global map Q G I S, goal, path, cognitive deep learning, path segment,
    move A I rover, and a blank square at the last.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: AI 探索者系统的逻辑图。各种部分包括传感器、传感器数据、用于 LiDAR 的 SLAM、位置、占用网格、局部地图 QGIS、更新地图、全局地图 QGIS、目标、路径、认知深度学习、路径段、移动
    AI 探索者，以及最后的空白方块。
- en: Figure 2-9
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-9
- en: Entire business logic for the AI rover system
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: AI 探索者系统的完整业务逻辑
- en: Developing the First Dynamic UML Class Diagrams
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开发第一个动态 UML 类图
- en: Developing the adaptive navigational requirements means that the goals stated
    by the human operator must be obeyed and followed, including by the cognitive
    deep learning engine that is operating within the AI rover. Therefore, we will
    set the goals or the tasks as the primary super-class that takes precedence over
    the entire structure of the software system that expresses itself as the software
    architecture of the AI rover. The `Goals` super-class is the class that is responsible
    for the goals that are to be followed by the AI rover. Therefore, the `GOALS`
    super-class will utilize both the `AI_Rover` class and the `Cognitive_Deep_Learning`_`Planning`
    class. The main functions or algorithms of the `GOALS` super-class are to establish
    the goals and to check which goals have been completed. Another method could represent
    the progress or percentage completed of an AI rover exploring a particular Egyptian
    tomb or catacomb. In addition, the use of `GOALS` as a super-class helps to create
    a rudimentary subsumption architecture, where the goals of the system are obtained
    and that tells the AI rover to go to each goal point.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 开发自适应导航需求意味着人类操作员提出的所有目标都必须被遵守和执行，包括在 AI 探测车内部运行的认知深度学习引擎。因此，我们将目标或任务设定为主要的超类，它在整个软件系统结构中占据优先地位，该系统以
    AI 探测车的软件架构形式表达自己。`Goals` 超类是负责 AI 探测车要遵循的目标的类。因此，`GOALS` 超类将利用 `AI_Rover` 类和
    `Cognitive_Deep_Learning_Planning` 类。`GOALS` 超类的主要功能或算法是建立目标和检查哪些目标已经完成。另一种方法可以表示
    AI 探测车探索特定埃及墓穴或地下墓穴的进度或完成百分比。此外，将 `GOALS` 作为超类有助于创建一个基本的吸收架构，其中获取系统的目标并告诉 AI 探测车前往每个目标点。
- en: Therefore, we will now create the UML class diagram. We will add each level
    of classes one at a time to allow the reader to have a complete understanding
    of the UML class architecture of the AI rover. This is essentially the entire
    program structure for the AI rover, with all the correct interconnections. Therefore,
    the first class that we will be working on is the `GOALS` class, which states
    all of the goals that need to be completed by the AI rover. Figure [2-10](#Fig10)
    shows the UML class diagram for the `GOALS` class.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在将创建 UML 类图。我们将逐级添加每个类，以便读者能够完全理解 AI 探测车的 UML 类架构。这实际上是 AI 探测车的整个程序结构，包括所有正确的互连。因此，我们将首先处理的是
    `GOALS` 类，它声明了 AI 探测车需要完成的所有目标。图 [2-10](#Fig10) 展示了 `GOALS` 类的 UML 类图。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig10_HTML.jpg)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig10_HTML.jpg)'
- en: A class diagram for the A I rover goals consists of a rectangle labeled goals.
    A plus sign is marked in the top left corner of the rectangle. Faded vertical
    bars are marked on the top and bottom sides of the rectangle. Short and faded
    horizontal lines are marked on the left and right sides of the rectangle.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: AI 探测车目标类图由一个标记为“目标”的矩形组成。在矩形的左上角标记有一个加号。在矩形的顶部和底部标记有淡化的垂直条。在矩形的左右两侧标记有短而淡化的水平线。
- en: Figure 2-10
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-10
- en: AI rover Goals class diagram
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: AI 探测车目标类图
- en: There are two main sub-classes that are connected to the `GOALS` super-class.
    The first connected sub-class is the `AI_Rover` class. This sub-class is the one
    responsible for describing the type of AI rover that will be used within the cognitive
    deep learning system. The `AI_Rover` class contains a composition of at least
    one wheel actuator and one sensor. The `Wheel_Actuator` class is the one responsible
    for interfacing with and sending commands to the motor controllers that drive
    the AI rover itself to the next waypoint or pathway determined by the cognitive
    deep learning controller. The `Wheel_Actuator` class then has additional sub-classes,
    such as the `Heading` and `Steering_Controls` classes. The `Heading` class determines
    the consistent velocity of the AI rover traveling within the pathway determined
    by the cognitive deep learning controller. The `Steering_Controls` class is responsible
    for assigning the correct steering or (wheel-turning) velocity of the wheel actuators
    turning the AI rover. The `Heading` and `Steering_Controls` classes will usually
    be interfaced with the PID (partial integral derivative controllers of the rover
    platform that will be determined. Usually, these PID controllers will be manifested
    as hardware closed-loop controller components outside of the Raspberry Pi 4 module.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 与`GOALS`超级类连接的两个主要子类。第一个连接的子类是`AI_Rover`类。这个子类负责描述将在认知深度学习系统中使用的AI探测车的类型。`AI_Rover`类包含至少一个轮子执行器和至少一个传感器。`Wheel_Actuator`类负责与电机控制器接口并发送命令，这些控制器驱动AI探测车到达认知深度学习控制器确定的下一个航点或路径。`Wheel_Actuator`类随后有额外的子类，例如`Heading`和`Steering_Controls`类。`Heading`类确定AI探测车在认知深度学习控制器确定的路径中行驶的恒定速度。`Steering_Controls`类负责分配正确的转向或（轮转向）速度给轮子执行器，以使AI探测车转向。`Heading`和`Steering_Controls`类通常将与将要确定的探测车平台的PID（部分积分微分控制器）接口。通常，这些PID控制器将以硬件闭环控制器组件的形式在外部Raspberry
    Pi 4模块中实现。
- en: The next sub-class that is connected with the `GOALS` super-class is the actual
    `Cognitive_Deep_Learning_Planning` class. This class is responsible for the correct
    decision-making analysis, limited situational awareness, and sense-and-avoid properties
    of the AI rover conducting its missions within the Egyptian catacombs. The prime
    directive of the `Cognitive_Deep_Learning_Planning` class is to develop the correct
    path-planning solutions to be used for the critical navigation of the AI rover.
    This navigation also needs to be adaptable, so that the AI rover can find an alternative
    path in the event it encounters an impasse. Therefore, the `Cognitive_Deep_Learning_Planning`
    class must utilize the `MAP` class, which is a super-class of both the local and
    global maps. The main concern for the `Cognitive_Deep_Learning_Planning` class
    is to achieve the goals stated within the `GOALS` super-class. The `Cognitive_Deep_Learning_Planning`
    class generates both the whole path and the actual path segment to be sent to
    the AI rover’s wheel actuators. The `Cognitive_Deep_Learning_Planning` class will
    need access to methods to retrieve and send information regarding the robot’s
    next path segment, which is planned with respect to the AI rover’s current position.
    Some of the methods of this class are `Set_Goal`, `Determine_Global_Path`, and
    `Get_Path_Segment`. These methods will be used by the cognitive deep learning
    controller in the event that the robot needs to find an alternative driving path
    segment to follow, with the time allotted before the AI rover’s battery becomes
    decapacitated. Figure [2-11](#Fig11) shows the UML class diagram of the classes
    that we have reviewed and discussed so far.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 与`GOALS`超级类连接的下一个子类是实际的`Cognitive_Deep_Learning_Planning`类。这个类负责在埃及地下墓穴执行任务的人工智能漫游车的正确决策分析、有限的情境意识和感知与规避特性。`Cognitive_Deep_Learning_Planning`类的首要指令是开发用于人工智能漫游车关键导航的正确路径规划解决方案。这种导航也需要具有适应性，以便人工智能漫游车在遇到僵局时能够找到替代路径。因此，`Cognitive_Deep_Learning_Planning`类必须利用`MAP`类，这是一个局部和全局地图的超级类。`Cognitive_Deep_Learning_Planning`类的主要关注点是实现`GOALS`超级类中声明的目标。`Cognitive_Deep_Learning_Planning`类生成整个路径和实际路径段，这些路径段将被发送到人工智能漫游车的轮子执行器。`Cognitive_Deep_Learning_Planning`类将需要访问方法来检索和发送有关机器人下一个路径段的信息，该路径段是根据人工智能漫游车的当前位置规划的。这个类的一些方法包括`Set_Goal`、`Determine_Global_Path`和`Get_Path_Segment`。这些方法将在机器人需要找到替代驾驶路径段以遵循时，由认知深度学习控制器使用，前提是在人工智能漫游车的电池耗尽之前有足够的时间。图[2-11](#Fig11)显示了我们已经审查和讨论过的类的UML类图。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig11_HTML.jpg)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig11_HTML.jpg)'
- en: A U M L dynamic class diagram for A I rover. The goals divide into A I rover
    and cognitive deep learning planning. A I rover divides into wheel actuator and
    sensors. The wheel actuator extends to heading and steering controls. Cognitive
    deep learning planning points to map. The map extends to global and local maps.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能漫游车的UML动态类图。目标分为人工智能漫游车和认知深度学习规划。人工智能漫游车分为轮子执行器和传感器。轮子执行器扩展到航向和转向控制。认知深度学习规划指向地图。地图扩展到全局和局部地图。
- en: Figure 2-11
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-11
- en: First stage of the UML dynamic class diagram for AI rover
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能漫游车UML动态类图的第一个阶段
- en: The `Sensors` class is the class that many other sensors can be developed from
    within the architecture of the AI rover. We have derived the sensors of `force`,
    `proximity`, `tracker`, `range`, `position`, `velocity`, and `acceleration`. We
    can derive other sensors from the `Sensors` class, such as LiDAR, Radar, and monocular
    and binocular cameras. All of these sensors can be developed based on the requirements
    of the shareholders and developers. We will need to have discrete increments of
    time, since we are operating within a digital platform such as the Raspberry Pi.
    This would be an example of `time_increment` within the discrete time steps the
    AI rover’s architecture must complete. The other methods would be `START`, `STOP`,
    `SetUpdateTime`, `GetUpdateTime`, `S_Variance`, `G_Variance`, and `READ`. The
    `READ` function returns information derived from the sensors. The position, velocity,
    and acceleration sensors and the classes that develop them obtain information
    from their respective sensors. For example, the `position` class derives its information
    from an encoder, which gives faulty values over time. However, the use of the
    map system derived from the SLAM and vision processing sensors, such as cameras,
    can allow for these erroneous position values to be corrected by the localization
    methods derived by the `MAP` class. There is one last class in the second stage
    that we need to discuss. The `Range` class represents the range sensor within
    the AI rover. This range sensor could in reality be an algorithm that processes
    information from a monocular camera (a camera with only one lens) and uses a form
    of triangularization to determine the distance to targets based on estimating
    the distance from the edges of objects to the position of the AI rover. However,
    typically these sensors are either binocular cameras, laser range finders, or
    ultrasonic sensors. These sensors thus are responsible for estimating the distance
    between the surfaces of objects and the position of the AI rover. The `range`
    sensor also has a critical role to play in the creation of the `MAP` and SLAM
    processing classes found in the first stage of the AI rover’s architecture. It
    is important to consider eliminating the blind spots that are found within the
    SLAM processing of the passageways of the Egyptian pyramid complex and subterranean
    catacombs and tombs. Let’s discuss the sensors that will help in that regard.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '`Sensors` 类是在AI巡游车架构内可以从中开发出许多其他传感器的类。我们已经推导出了`force`、`proximity`、`tracker`、`range`、`position`、`velocity`和`acceleration`传感器。我们可以从`Sensors`类中推导出其他传感器，例如激光雷达、雷达、单目和双目摄像头。所有这些传感器都可以根据股东和开发者的需求进行开发。由于我们是在像树莓派这样的数字平台上操作，我们需要有离散的时间增量。这将是AI巡游车架构必须完成的离散时间步骤中的`time_increment`的一个例子。其他方法包括`START`、`STOP`、`SetUpdateTime`、`GetUpdateTime`、`S_Variance`、`G_Variance`和`READ`。`READ`函数返回从传感器中推导出的信息。位置、速度和加速度传感器以及开发它们的类从它们各自的传感器中获取信息。例如，`position`类从编码器中推导其信息，编码器会随着时间的推移给出错误值。然而，使用来自SLAM和视觉处理传感器（如摄像头）推导出的映射系统，可以允许通过`MAP`类推导出的定位方法来纠正这些错误的位置值。在第二阶段还有一个类需要讨论。`Range`类代表AI巡游车中的距离传感器。实际上，这个距离传感器可能是一个处理单目摄像头（只有一个镜头的摄像头）信息的算法，并使用三角化的形式来确定目标距离，基于估计物体边缘到AI巡游车位置的距离。然而，通常这些传感器是双目摄像头、激光测距仪或超声波传感器。因此，这些传感器负责估计物体表面与AI巡游车位置之间的距离。`range`传感器在创建AI巡游车架构第一阶段中找到的`MAP`和SLAM处理类中也扮演着关键角色。考虑消除在埃及金字塔复合体通道的SLAM处理中发现的盲点是很重要的。让我们讨论将有助于这一点的传感器。'
- en: The first sensor is the LIDAR laser sensor and/or class. This sensor can detect
    the presence or absence of an object in front of the AI rover. This determines
    the azimuth angle (direction) in which the object is located with respect to the
    AI rover’s position.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个传感器是激光雷达传感器和/或类别。该传感器可以检测AI巡游车前方物体的存在与否。这决定了物体相对于AI巡游车位置的方位角（方向）。
- en: The tracker sensor and class is responsible for the visual tracking of a target.
    However, this functionality might be incorporated directly within the cognitive
    deep learning engine. Therefore, this functionality might instead be incorporated
    within the `Cognitive_Deep_Learning_Planning` class. However, we could make this
    process a secondary process and not have it be developed within the cognitive
    system.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 追踪传感器和类负责对目标的视觉追踪。然而，这项功能可能直接集成在认知深度学习引擎中。因此，这项功能可能被集成在`Cognitive_Deep_Learning_Planning`类中。然而，我们可以将这个过程作为一个次要过程，而不是在认知系统中开发它。
- en: The `Stereo_Vision` class also uses the binocular cameras, in order to determine
    the range between a target and the location of the AI rover. This will require
    information from the camera as well as a range-finding sensor. The range-finding
    sensor could be either a proximity sensor or a laser range-finding sensor. Therefore,
    we will now reveal the final piece of the main architecture view of the cognitive
    deep learning system, which has been combined with the rest of the controlling
    structure of the AI rover. The UML class diagram is as shown in Figure [2-12](#Fig12).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '`Stereo_Vision` 类也使用双目摄像头，以便确定目标与AI探测车位置之间的距离。这需要来自摄像头以及测距传感器的信息。测距传感器可以是接近传感器或激光测距传感器。因此，我们现在将揭示认知深度学习系统主架构视图的最后一部分，它已经与AI探测车的其余控制结构相结合。UML类图如图
    [2-12](#Fig12) 所示。'
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig12_HTML.jpg)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig12_HTML.jpg)'
- en: A U M L dynamic class diagram for A I rover. Goals divide into A I rover and
    cognitive deep learning planning. A I rover points to wheel actuator and sensors.
    Wheel actuator extends to heading and steering controls; sensors extend to force,
    proximity, tracker, position, and so on. It further has the cognitive deep learning
    structure at the bottom.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: AI探测车的UML动态类图。目标分为AI探测车和认知深度学习规划。AI探测车指向轮子执行器和传感器。轮子执行器扩展到航向和转向控制；传感器扩展到力、接近、追踪、位置等。它还包含底部的认知深度学习结构。
- en: Figure 2-12
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-12
- en: Second stage for the UML dynamic class diagram for the AI rover
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: AI探测车的UML动态类图的第二阶段
- en: Developing the First Dynamic UML Sequence Diagrams
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开发第一组动态UML序列图
- en: One of the final dynamic UML diagrams that we will be reviewing is the sequence
    diagram. The following sequence diagrams will allow us to closely examine the
    interactions between the objects that allow the AI rover to autonomously operate
    within the Egyptian catacombs or any other unknown environment. These diagrams
    also reveal the time events of when messages were sent to different objects within
    the software architecture itself. They also show which methods are called by their
    respective objects within the AI rover. If we review the global map, we see that
    it allows for both static and dynamic changes within the environment encountered
    within the Egyptian catacombs. We can also see how SLAM—or the simultaneous localization
    and mapping—changes with new sensor data obtained from LiDAR, ultrasonic, or even
    monocular and/or binocular cameras allows the local map (immediate area around
    the AI rover itself) to update itself and the global map. The updating process
    of the global map allows for correction of the estimated position of the AI rover
    within the Egyptian catacombs. This is especially true when the unknown environment
    within the catacombs for some reason has unexpectedly and drastically changed.
    An example of a drastic change within the catacombs could be that there has been
    a catastrophic collapse or cave-in and there is structural destruction that has
    denied access to the AI rover’s driving pathway solution. This would mean that
    the `isGlobalMapChanged` method will indicate that the known global map of the
    Egyptian catacombs has been completely disturbed, and that there is a need for
    the cognitive deep learning engine to derive another or updated driving pathway
    solution for the AI rover to execute in order to complete its mission objectives.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要回顾的最后一个动态 UML 图是序列图。以下序列图将使我们能够密切观察允许 AI 探路者在埃及地下墓穴或任何其他未知环境中自主操作的对象之间的交互。这些图还揭示了在软件架构内部向不同对象发送消息的时间事件。它们还显示了
    AI 探路者内部各自对象调用的方法。如果我们查看全局地图，我们会看到它允许在埃及地下墓穴遇到的环境中进行静态和动态变化。我们还可以看到 SLAM（即同时定位与建图）如何随着从激光雷达、超声波甚至单目和/或双目摄像头获得的新传感器数据而变化，允许局部地图（AI
    探路者周围的即时区域）更新自身和全局地图。全局地图的更新过程允许纠正 AI 探路者在埃及地下墓穴中的估计位置。这在地下墓穴内部未知环境由于某种原因意外且剧烈变化时尤其如此。地下墓穴中剧烈变化的例子可能是发生了灾难性的坍塌或塌陷，有结构破坏阻止了
    AI 探路者行驶路径解决方案的进入。这意味着 `isGlobalMapChanged` 方法将表明埃及地下墓穴的已知全局地图已被完全扰乱，并且需要认知深度学习引擎推导出另一个或更新的行驶路径解决方案，以便
    AI 探路者执行以完成其任务目标。
- en: 'We will now review the following dynamic UML sequence diagram (Figure [2-13](#Fig13))
    for the case where there have been no dramatic changes within the ancient Egyptian
    catacomb environment being explored by the AI rover and thus no global map updates.
    The following will be a chronological list of events:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将回顾以下动态 UML 序列图（图 [2-13](#Fig13)），这种情况是在 AI 探路者在古埃及地下墓穴探索过程中没有发生重大变化，因此没有全局地图更新。以下将是一个按时间顺序的事件列表：
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig13_HTML.jpg)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-13](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig13_HTML.jpg)'
- en: A U M L sequence diagram for cognitive navigation and controls. It has 7 columns.
    The different components are human operator as user, subsumption architecture
    as goal, deep learning planning as cognitive D L P, Egyptian catacombs may uncertain
    layout as global map, P I D controller as A I rover, autopilot G P S as position,
    and note as range.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 认知导航和控制 UML 序列图。它包含 7 列。不同的组件包括：人类操作员作为用户，吸收架构作为目标，深度学习规划作为认知 DLP，埃及地下墓穴可能的不确定布局作为全局地图，PID
    控制器作为 AI 探路者，自动驾驶 GPS 作为位置，以及备注作为范围。
- en: Figure 2-13
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-13
- en: UML sequence diagram for cognitive navigation and controls
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 认知导航和控制 UML 序列图
- en: We can first see that the `USER` class has set and defined goals and initiated
    the `Start` process.
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们首先可以看到，`USER` 类已经设置和定义了目标并启动了 `Start` 过程。
- en: Once that has been completed, the `GOAL` class sends a start mechanism to the
    `AI_Rover` class, which will power up the PID electronics. We could also further
    develop this sequence diagram to include an additional diagram to execute a diagnostic
    check for the PID electronics to determine if the rover kit itself is correctly
    operational. Please consider that a possible exercise for this chapter.
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦完成，`GOAL`类向`AI_Rover`类发送启动机制，这将启动PID电子设备。我们还可以进一步开发这个序列图，包括一个额外的图来执行PID电子设备的诊断检查，以确定探测车套件本身是否正确运行。请考虑这是本章的一个可能练习。
- en: The `AI_Rover` class then proceeds to start the `Position` class methods, which
    means gathering information from the GPS of the PixHawk autopilot and/or from
    the global map for the location estimate.
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后`AI_Rover`类继续启动`Position`类的方法，这意味着从PixHawk自动驾驶仪的GPS或从全局地图获取位置估计信息。
- en: The `AI_Rover` class then starts the `range` class methods, which usually means
    receiving information from the global map.
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后`AI_Rover`类启动`range`类方法，通常意味着从全局地图接收信息。
- en: The `GOALS` class then translates the required goals and tasks to be completed
    by the cognitive deep learning engine, which is acting as the controller of the
    AI rover, to then derive a driving pathway solution.
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后`GOALS`类将认知深度学习引擎需要完成的目标和任务转换为驱动路径解决方案，该引擎作为AI探测车的控制器。
- en: The cognitive deep learning controller then makes a request to determine the
    physical and geospatial location of the AI rover within either the entranceway
    of the Egyptian catacombs or within the catacombs themselves. This request is
    sent from the cognitive deep learning controller directly to the `AI_Rover` class
    itself.
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 认知深度学习控制器随后请求确定AI探测车在埃及地下墓穴入口或地下墓穴内部的物理和地理空间位置。此请求直接从认知深度学习控制器发送到`AI_Rover`类本身。
- en: The `AI_Rover` class then sends a `READ` command to the `Position` class that
    is handling information between the PixHawk autopilot, the PID electronics of
    the rover kit, and the Raspberry Pi 4 module.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后`AI_Rover`类向处理PixHawk自动驾驶仪、探测车套件的PID电子设备和Raspberry Pi 4模块之间信息的`Position`类发送`READ`命令。
- en: The `AI_Rover` then handles the return `PositionValue` coming from the `Position`
    class.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后`AI_Rover`处理来自`Position`类的返回`PositionValue`。
- en: The `PositionValue` data is then passed from the `AI_Rover` class back to the
    requesting `Cognitive_Deep_Learning_Planning` class.
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后`PositionValue`数据从`AI_Rover`类传递回请求的`Cognitive_Deep_Learning_Planning`类。
- en: The cognitive deep learning engine then requests the `GetMap` method of the
    `Global_Map` class to retrieve information from the current global map, with the
    AI rover at the center of the map.
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 认知深度学习引擎随后请求`Global_Map`类的`GetMap`方法，从当前的全局地图中检索信息，其中AI探测车位于地图的中心。
- en: The `MAP_DETAIL` data and request is then sent back from the `Global_Map` class
    to the `Cognitive_Deep_Learning_Planning` class.
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后`MAP_DETAIL`数据和请求从`Global_Map`类发送回`Cognitive_Deep_Learning_Planning`类。
- en: Then the cognitive deep learning controller will determine the best driving
    pathway for the AI rover to execute given the current information obtained from
    the global map.
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，认知深度学习控制器将根据从全局地图获得的信息确定AI探测车执行的最佳驾驶路径。
- en: The `FindPathWays` method is then executed within the cognitive deep learning
    engine to calculate and determine the best pathway with the current information.
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，在认知深度学习引擎中执行`FindPathWays`方法，以计算和确定最佳路径。
- en: There is then a `PathwayFound` message sent from the `Cognitive_Deep_Learning_Planning`
    class back to the `GOAL` class to inform it that a driving solution has been found.
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，从`Cognitive_Deep_Learning_Planning`类向`GOAL`类发送`PathwayFound`消息，通知它已找到驾驶解决方案。
- en: A `HasMAPChanged` message is then sent from the `Cognitive_Deep_Learning_Planning`
    class to the `Global_Map` class.
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，从`Cognitive_Deep_Learning_Planning`类向`Global_Map`类发送`HasMAPChanged`消息。
- en: If the `Global_Map` class returns a message of `NO` back to the `Cognitive_Deep_Learning_Planning`
    class then the `Cognitive_Deep_Learning_Planning` class sends a `ReadPosition`
    request message to the `AI_Rover` class, which then sends the message of `READ`
    to the `Position` class.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果`Global_Map`类向`Cognitive_Deep_Learning_Planning`类返回`NO`消息，则`Cognitive_Deep_Learning_Planning`类向`AI_Rover`类发送`ReadPosition`请求消息，然后`AI_Rover`类将`READ`消息发送给`Position`类。
- en: The `PositionValue` message containing position data is sent from the `Position`
    class back to `AI_Rover` and then from there back to the `Cognitive_Deep_Learning_Planning`
    class.
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含位置数据的 `PositionValue` 消息从 `Position` 类发送回 `AI_Rover`，然后从那里发送回 `Cognitive_Deep_Learning_Planning`
    类。
- en: A `PathSegmentDerived` message is then sent to the `GOALS` class.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后向 `GOALS` 类发送一个 `PathSegmentDerived` 消息。
- en: The `GOALS` class then sends a `MOVE` command with the `PathSegmentDerived`
    solution as an argument to the `AI_Rover` class, which is then sent as a message
    to the `Wheel_Actuator` class. The rover by this time should start moving to drive
    the path segments determined by the `Cognitive_Deep_Learning_Planning` class,
    acting as an adaptive navigator within the software hierarchy of the AI rover.
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，`GOALS` 类将带有 `PathSegmentDerived` 解决方案的 `MOVE` 命令作为参数发送给 `AI_Rover` 类，该命令随后作为消息发送给
    `Wheel_Actuator` 类。此时，探测车应该开始移动，以驱动由 `Cognitive_Deep_Learning_Planning` 类确定的路径段，作为
    AI 探测车软件层次结构中的自适应导航器。
- en: The following UML sequence diagram (Figure [2-14](#Fig14)) will describe the
    process of updating both the local and the global maps based on either SLAM or
    image-processing data updates. This happens in the cases where the environment
    that the AI rover is exploring is either static or is changing and dynamic.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 以下 UML 时序图（图 [2-14](#Fig14)）将描述基于 SLAM 或图像处理数据更新的过程，以更新局部和全局地图。这发生在 AI 探测车正在探索的环境是静态的还是动态变化的情况下。
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig14_HTML.jpg)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig14_HTML.jpg)'
- en: A U M L sequence diagram for S L A M and video processing. It consists of five
    columns. The different components are localization map process as A I rover, G
    P S auto-pilot as position, proximity as range, Q G I S as local map, and Q G
    I S as global map.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: SLAM 和视频处理的 UML 时序图。它由五个列组成。不同的组件被标记为定位地图过程作为 AI 探测车、GPS 自动驾驶作为位置、接近作为范围、Q G
    I S 作为局部地图，以及 Q G I S 作为全局地图。
- en: Figure 2-14
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-14
- en: UML sequence diagram for SLAM and video processing
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: SLAM 和视频处理的 UML 时序图
- en: The `AI_Rover` class sends a start message to the `Position` and `Range` classes.
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`AI_Rover` 类向 `Position` 和 `Range` 类发送启动消息。'
- en: The local map then sends a `READ` and retrieves a `RANGE` message to and from
    the `Range` class.
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 局部地图随后发送一个 `READ` 消息，从 `Range` 类读取并检索一个 `RANGE` 消息。
- en: The local map then sends a `READ` and retrieves a `POSITION` message to and
    from the `Position` class.
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 局部地图随后发送一个 `READ` 消息，从 `Position` 类读取并检索一个 `POSITION` 消息。
- en: The local map then updates itself.
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 局部地图随后自行更新。
- en: Then the local map updates the global map.
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，局部地图更新全局地图。
- en: The `SLAM_VIDEO_Proc` method is then executed within the local class, and then
    it again updates the local map.
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后在局部类中执行 `SLAM_VIDEO_Proc` 方法，然后它再次更新局部地图。
- en: The AI rover is then centered within the local map. This process is continually
    cycled ad infinitum.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，AI 探测车被定位在局部地图中。这个过程不断循环，无限进行。
- en: 'The following UML sequence diagram (Figure [2-15](#Fig15)) is one in which
    there would be a drastic and detectable change with the global map or even local
    map within the Egyptian catacomb environment. An example of this would be if a
    floor or a passageway within the Egyptian catacombs were to unexpectedly collapse.
    As such, is it is critically important for the AI rover to be adaptable enough
    to calculate a new driving path solution. The cognitive deep learning engine should
    have some degree of limited situational awareness to determine if continuing the
    mission is advisable or is dangerous. This process is described within the following
    steps and procedures:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 以下 UML 时序图（图 [2-15](#Fig15)）是其中在埃及地下墓穴环境中全局地图或甚至局部地图发生剧烈且可检测的变化的情况。一个例子是，如果埃及地下墓穴中的地板或通道意外坍塌。因此，AI
    探测车必须足够适应，以计算新的驾驶路径解决方案至关重要。认知深度学习引擎应具有一定的有限情境意识，以确定继续任务是否可行或危险。这个过程在以下步骤和程序中描述：
- en: '![](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig15_HTML.jpg)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_2_Chapter/494112_1_En_2_Fig15_HTML.jpg)'
- en: A U M L sequence diagram for drastic change to global map. It consists of five
    columns. The different components are note as goals, deep learning planning as
    cognitive D L P, Q G I S as local map, Q G I S as global map, and P I D electronics
    for rover kit as A I rover.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: UML 时序图用于全局地图的剧烈变化。它由五个列组成。不同的组件被标记为目标、深度学习规划作为认知 D L P、Q G I S 作为局部地图、Q G I
    S 作为全局地图，以及用于探测车套件的 P I D 电子设备作为 AI 探测车。
- en: Figure 2-15
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-15
- en: UML sequence diagram for drastic change to global map
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 全局地图剧烈变化的 UML 时序图
- en: The `UPDATEMAP` message is sent from the local map to the global map, whereupon
    the global map is updated.
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`UPDATEMAP` 消息从本地地图发送到全局地图，随后全局地图被更新。'
- en: The `GOALS` class then sends a `DERIVEPATHSEGMENT` request message.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后 `GOALS` 类发送一个 `DERIVEPATHSEGMENT` 请求消息。
- en: The `Cognitive_Deep_Learning_Planning` class then sends an `isGlobalMapChanged`
    request message to the `Global_Map` class.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后 `Cognitive_Deep_Learning_Planning` 类向 `Global_Map` 类发送一个 `isGlobalMapChanged`
    请求消息。
- en: If the `Global_Map` class returns a `YES` response message, then the `Cognitive_Deep_Learning_Planning`
    class sends a `READPOSITION` command to the `AI_Rover` class.
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果 `Global_Map` 类返回一个 `YES` 响应消息，那么 `Cognitive_Deep_Learning_Planning` 类将向 `AI_Rover`
    类发送一个 `READPOSITION` 命令。
- en: The `POSITION` data message is then returned to the `Cognitive_Deep_Learning_Planning`
    class, which then requests a `GetMAP` message from the `Global_Map` class, which
    is then returned as a `MAP_DETAIL` data message.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`POSITION` 数据消息随后返回到 `Cognitive_Deep_Learning_Planning` 类，该类随后从 `Global_Map`
    类请求一个 `GetMAP` 消息，该消息随后作为 `MAP_DETAIL` 数据消息返回。'
- en: The `Cognitive_Deep_Learning_Planning` class then finds alternative pathways
    and sends that information to the `GOALS` class.
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后 `Cognitive_Deep_Learning_Planning` 类找到替代路径并将该信息发送到 `GOALS` 类。
- en: The `GOALS` class then sends an alternative driving solution with `MOVE(PathSegmentDerived)`
    to the `AI_Rover` class, where the rover’s `Wheel_Actuator` class should be making
    the corrective heading and steering adjustments.
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后 `GOALS` 类通过 `MOVE(PathSegmentDerived)` 发送一个替代驾驶解决方案到 `AI_Rover` 类，其中漫游车的
    `Wheel_Actuator` 类应该进行纠正航向和转向调整。
- en: Summary
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We should state that we have now reviewed and become familiar with multiple
    software and system design analysis approaches. One approach was in regards to
    developing UML use-case diagrams that can help us to determine both the functional
    and non-functional requirements for developing this fairly sophisticated self-driving,
    adaptable, and intelligent rover system. The next UML diagrams that we reviewed
    were the business logic and class diagrams, which showed how the modular classes
    relate to each other and how they might send information to each other. For example,
    consider how the `Cognitive_Deep_Learning_Planning` class controller serves as
    an adaptable navigator for the AI rover itself. The use of these UML diagrams
    allows us to quickly specify and review some very difficult complexities involved
    in the creation of the AI rover self-driving platform.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应该指出，我们现在已经审查并熟悉了多种软件和系统设计分析方法。一种方法是与开发 UML 用例图相关，这些用例图可以帮助我们确定开发这个相当复杂的自动驾驶、适应性和智能漫游系统所需的功能性和非功能性需求。我们审查的下一个
    UML 图是业务逻辑和类图，它们显示了模块化类之间的关系以及它们如何相互发送信息。例如，考虑 `Cognitive_Deep_Learning_Planning`
    类控制器本身如何作为 AI 漫游的自适应导航器。使用这些 UML 图使我们能够快速指定和审查在创建 AI 漫游自动驾驶平台中涉及的一些非常复杂的复杂性。
- en: We have also revealed how an adaptable intelligent robot system can be modeled
    with UML object-oriented concepts. The position of the robot is at first corrected
    by SLAM, and the planning is conducted by the `Cognitive_Deep_Learning_Planning`
    class controller within a grid system. We have considered both static and dynamic
    environments, and we have developed a software hierarchy that might allow for
    what would otherwise be a very computationally expensive approach to navigating
    dynamic environments. The objects were shown within these UML diagrams, as well
    as how they interact with each other. All of these classes were controlled by
    the `GOALS` class, which acted as the commander or pilot, and the `Cognitive_Deep_Learning_Planning`
    class controller acted as a kind of adaptive navigator for the AI rover exploring
    the netherworlds of the Egyptian catacomb complexes.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还揭示了如何使用 UML 面向对象概念来对适应性智能机器人系统进行建模。机器人的位置最初通过 SLAM 进行校正，规划由 `Cognitive_Deep_Learning_Planning`
    类控制器在网格系统中执行。我们考虑了静态和动态环境，并开发了一个软件层次结构，这可能允许以其他方式非常计算密集的方法来导航动态环境。这些对象在 UML 图中显示，以及它们如何相互交互。所有这些类都由
    `GOALS` 类控制，该类充当指挥官或飞行员，而 `Cognitive_Deep_Learning_Planning` 类控制器充当 AI 探索埃及地下墓穴复杂结构的地下世界的自适应导航器。
- en: We should also state that the use of these UML diagrams can allow us to develop
    the implementation of the controlling software system for the AI rover, in that
    these same UML diagrams can be auto-generated into Python source code. There are
    multiple development environments that can allow for this to happen, such as Modelio
    UML, Papyrus IBM Eclipse, Rational IBM software, Microsoft Visual Studios, and
    many others. By using the UML diagrams, we can help manage the complexity that
    might arise with such an advanced robotic rover platform. If there are any specification
    or requirements changes, we can manage those as would be expected within any software
    development project.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还应该指出，使用这些UML图可以使我们开发人工智能漫游车的控制软件系统的实现，因为这些相同的UML图可以自动生成Python源代码。有多种开发环境可以实现这一点，例如Modelio
    UML、Papyrus IBM Eclipse、Rational IBM软件、Microsoft Visual Studios以及许多其他环境。通过使用UML图，我们可以帮助管理可能在这种高级机器人漫游车平台上出现的复杂性。如果有任何规范或需求变更，我们可以在任何软件开发项目中像预期的那样管理这些变更。
- en: Extra Credit
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 额外加分
- en: In reviewing the business logic diagram, where would one need to include an
    autopilot?
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在审查业务逻辑图时，在哪里需要包含自动驾驶系统？
- en: In reviewing the class diagrams, again, where would one need to include an autopilot?
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在审查类图时，再次，在哪里需要包含自动驾驶系统？
- en: Why would UML diagrams help us in understanding class interactions, data, and
    message exchanges?
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么UML图能帮助我们理解类交互、数据和消息交换？
- en: What is the concept behind the “Unexpected Query Problem” for the AI rover?
    We will discuss this concept in later chapters, but please use resources on the
    internet to find and derive your best answer to this question.
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能漫游车背后的“意外查询问题”概念是什么？我们将在后面的章节中讨论这个概念，但请利用互联网上的资源来寻找并推导出你对这个问题的最佳答案。
