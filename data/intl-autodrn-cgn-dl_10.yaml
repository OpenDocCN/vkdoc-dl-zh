- en: 10. Subsumption Cognitive Architecture
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 吸收认知架构
- en: 'This chapter discusses subsumption cognitive architecture ideas, including
    approaches, potential methods, and examples, and then we finish with where the
    field is headed, plus other techniques. By the end of the chapter, you will have
    an understanding of the following:'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论吸收认知架构的思想，包括方法、潜在方法和示例，然后我们总结该领域的发展方向以及其他技术。到本章结束时，你将理解以下内容：
- en: Subsumption **c**ognitive **a**rchitecture (SCA)
  id: totrans-2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吸收认知架构（Subsumption Cognitive Architecture，SCA）
- en: 'Subsumption structure’s four key areas: drone situated awareness (SA), embodiment,
    intelligence, and emergence'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吸收结构的四个关键领域：无人机情境意识（SA）、具身化、智能和涌现
- en: How to program your drone to possess a subsumption cognitive architecture by
    utilizing the provided Python code examples
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何通过提供的Python代码示例编程你的无人机以拥有吸收认知架构
- en: How SCA compares to other cognitive architectures
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SCA与其他认知架构的比较
- en: Cognitive Architectures for Autonomy
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自主认知架构
- en: Subsumption cognitive architecture (SCA) involves a construct that is a management
    structure proposed to guide conduct via symbolic mental representations of the
    world; subsumption architecture couples sensory data to motion determination in
    an intimate and bottom-up fashion. It does this by way of decomposing the whole
    conduct into sub-behaviors. These sub-behaviors are broken down into a hierarchy
    of layers. Each layer implements a precise degree of behavioral competence, and
    higher stages can subsume lower degrees (a.k.a., integrate/combine lower levels
    into a more comprehensive whole) to create possible behavior. For example, a drone’s
    lowest layer should be "avoid an object." The second layer would be "wander around,"
    which runs underneath the third layer, "explore the world." Because a robot needs
    to have the capacity to "avoid objects" to "wander around" effectively, the subsumption
    architecture creates a device in which the higher layers use the lower-level competencies.
    The layers, which all acquire sensor information, work in parallel and generate
    outputs. These outputs can be instructions to actuators or signals that suppress
    or inhibit different layers.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 吸收认知架构（SCA）涉及一个结构，这是一个旨在通过世界的符号心理表征来引导行为的结构；吸收架构以亲密和自下而上的方式将感官数据与运动决定相结合。它是通过将整个行为分解为子行为来做到这一点的。这些子行为被分解为一系列层级。每一层实现精确的行为能力，较高阶段可以吸收较低阶段（即，将较低层次整合/组合成一个更全面的整体）以创造可能的行为。例如，无人机最低层应该是“避开物体”。第二层将是“四处游荡”，它位于第三层“探索世界”之下。因为机器人需要具备“避开物体”的能力才能有效地“四处游荡”，所以吸收架构创建了一个高层使用低层能力的设备。所有层都获取传感器信息，并行工作并生成输出。这些输出可以是给执行器的指令或抑制或抑制不同层的信号。
- en: Subsumption Structure
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸收结构
- en: '**Subsumption structure** is a reactive robotic structure closely related to
    behavior-based robotics. Subsumption has been extensively influential in independent
    robotics and real-time AI. It utilizes intelligence from a considerably exclusive
    perspective. Drones are based on the whole notion of intelligence, corresponding
    to unconscious thinking processes. Instead of modeling factors of human genius
    via image manipulation, this approach is aimed at real-time interplay and possible
    responses to a dynamic lab or workplace environment.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**吸收结构**是一种反应式机器人结构，与基于行为的机器人紧密相关。吸收结构在独立机器人和实时人工智能领域产生了广泛的影响。它从相当独特的角度利用智能。无人机基于整个智能概念，对应于无意识思维过程。这种方法不是通过图像操作来模拟人类天才的因素，而是旨在实时互动以及对动态实验室或工作场所环境的可能响应。'
- en: 'The intention is to be knowledgeable using the following four key ideas:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 目的是通过以下四个关键思想来获得知识：
- en: Drone Situated Awareness (SA) – An essential concept of SA AI is that a robot
    should be in a position to react to its surroundings within a human-like time
    frame. The situated mobile robot is not to symbolize the world by utilizing an
    inside set of symbols and then act on this model. Instead, “The actual real world
    is its model.” a skill that a suitable perception-to-action setup can use to directly
    interact with the world as opposed to modeling it. Yet, every module/behavior
    nevertheless models the world, but close to the sensorimotor signals on an efficient
    level. These accessible models necessarily use assumptions about the world that
    are hardcoded in the algorithms themselves; however, they do avoid using memory
    to predict the world's behavior, instead relying on direct sensory feedback as
    much as possible.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 无人机情境意识（SA） – 情境意识人工智能的一个基本概念是，机器人应该能够在类似于人类的时间框架内对其周围环境做出反应。情境移动机器人不应通过使用内部符号集来象征世界，然后在这个模型上采取行动。相反，“实际的真实世界是其模型。”这是一种合适的感知到行动设置可以直接与世界互动而不是建模世界的能力。然而，每个模块/行为仍然在有效级别上对世界进行建模，但接近于传感器运动信号。这些可访问的模型必然使用算法本身硬编码的世界假设；然而，它们避免使用记忆来预测世界的行为，而是尽可能多地依赖直接感官反馈。
- en: Embodiment – Constructing a consolidated agent completes two artifacts. First,
    it forces the designer to check and to create an integrated bodily management
    system, no longer theoretical fashions or simulated robots that might no longer
    work in the physical world. The second is that it can clear up the image grounding
    problem, a philosophical difficulty many common AIs encounter, without delay,
    coupling sense data with significant actions. The world grounds regress, and the
    inner relation of the behavioral layers is directly grounded in the world the
    robot perceives.
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 体现 – 构建一个综合的智能体完成了两个艺术品。首先，它迫使设计者检查并创建一个综合的身体管理系统，不再是可能不再在物理世界中工作的理论模式或模拟机器人。第二是它可以立即解决图像基础问题，这是一个许多常见人工智能遇到的哲学难题，即立即将感官数据与重要行动耦合。世界基础回归，行为层之间的内部关系直接根植于机器人感知的世界。
- en: Intelligence – Looking at evolutionary progress, developing perceptual and mobility
    skills is a critical basis for human-like intelligence. Also, by using top-down
    representations as a workable beginning point for AI, it seems that “intelligence
    is decided by way of the dynamics of interaction with the world.”
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 智能性 – 从进化进程来看，发展感知和移动技能是人类智能的关键基础。此外，通过使用自上而下的表示作为人工智能的可行起点，似乎“智能是通过与世界互动的动态来决定的。”
- en: Emergence – Conventionally, individual modules are not regarded as shrewd in
    themselves. It is the interplay of such modules, evaluated by gazing at the agent
    and its environment, that is generally deemed competent (or not). “Intelligence,”
    therefore, “is in the eye of the observer.”
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 出现 – 传统上，单个模块本身并不被认为是有智慧的。这种模块之间的相互作用，通过观察智能体及其环境来评估，通常被认为是合格的（或不是）。因此，“智能”在观察者的眼中。
- en: The ideas just outlined are still a part of an ongoing debate involving the
    nature of the brain and how the development of robotics and AI ought to be fostered.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 上述概述的想法仍然是关于大脑的本质以及如何培养机器人技术和人工智能发展的持续辩论的一部分。
- en: One idea could be to add intelligence in layers, like downloading “apps” as
    needed or upgrading to a newer or better version. It all comes down to how much
    intelligence the designer believes the robot needs (Harbour et al. 2019; Murphy
    2019).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 一个想法可能是按层添加智能，就像按需下载“应用”或升级到更新或更好的版本一样。这一切都取决于设计者认为机器人需要多少智能（Harbour 等人，2019；Murphy，2019）。
- en: Layers and Augmented Finite-State Machines
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 层次与增强有限状态机
- en: Each layer comprises a deposit of processors that are augmented finite-state
    machines (AFSM), the augmentation being delivered with “instantiation” variables
    to keep programmable data structures. A layer is a module and is accountable for
    a single behavioral goal, such as “wander around.” There is no central manipulator
    inside or between these behavioral modules. All AFSMs continually and asynchronously
    receive input from the applicable sensors and send output to actuators (or different
    AFSMs). Input alerts that are not examined before a new one is delivered wind
    up getting discarded. These discarded indicators are common and are beneficial
    for overall performance because discarding them lets the robot work in real time
    by dealing only with the most immediate information.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 每一层都包含一个由增强有限状态机（AFSM）组成的处理器沉积，增强通过“实例化”变量提供以保持可编程数据结构。一个层是一个模块，负责单一的行为目标，例如“四处游荡”。在这些行为模块内部或之间没有中央操纵器。所有
    AFSM 都持续且异步地从适用的传感器接收输入并将输出发送到执行器（或不同的 AFSM）。在新输入到来之前未检查的输入警报最终会被丢弃。这些被丢弃的指示器很常见，并且对整体性能有益，因为丢弃它们可以让机器人通过仅处理最直接的信息来实时工作。
- en: Because there is no central control, AFSMs talk with each other through inhibition
    and suppression signals. Inhibition indicators block indicators from accomplishing
    actuators or AFSMs, and suppression alerts block or replace the inputs to layers
    or their AFSMs. This system of AFSM verbal exchange is how better optimization
    layers subsume lower ones (see Figure [10-1](#Fig1)), as properly as how the structure
    offers priority and motion determination arbitration in general to make the best
    choice. An example could be 1.) Start with Explore World. 2.) Clearly it will
    subsume Wander Around. 3.) Next Avoid Objects while Exploring World.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 由于没有中央控制，AFSM 通过抑制和抑制信号相互交谈。抑制指示器阻止指示器完成执行器或 AFSM，而抑制警报阻止或替换层或其 AFSM 的输入。这种
    AFSM 交流系统是更好的优化层吸收较低层的方式（见图 [10-1](#Fig1)），以及结构如何提供优先级和运动决定仲裁以做出最佳选择。一个例子可以是：1.)
    从探索世界开始。2.) 明显地，它将吸收四处游荡。3.) 接下来在探索世界时避免物体。
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig1_HTML.jpg)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-1](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig1_HTML.jpg)'
- en: A schematic of subsumption architecture with sensor information and actuators.
    Sensor information is divided into three levels, labeled, explore world, wander
    around, and avoid objects. Each level passes down information to the lower level
    and it reaches the actuators, where it flows back to sensor information.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 吸收架构的示意图，包括传感器信息和执行器。传感器信息分为三个级别，标记为探索世界、四处游荡和避免物体。每个级别将信息传递到下一级，然后到达执行器，信息从那里流回传感器信息。
- en: Figure 10-1
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-1
- en: 'Abstract representation of subsumption architecture, with the higher-level
    layers subsuming the roles of lower-level layers when the sensory information
    determines it. (Brooks, Rodney. [1999]. Cambrian Intelligence: The Early History
    of the New AI. Cambridge, MA: MIT Press.)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '吸收架构的抽象表示，当感官信息决定时，高级层吸收低级层的角色。（布鲁克斯，罗德尼。[1999]。 Cambrian Intelligence: The
    Early History of the New AI。剑桥，马萨诸塞州：麻省理工学院出版社。）'
- en: The improvement of layers follows an instinctive progression. The lowest layer
    is created, tested, and fixed. Once that lowest stage runs, one attaches the second
    layer with the proper suppression and inhibition connections to the first layer.
    After testing and fixing the blended behavior, this technique can be repeated
    for (theoretically) any variety of behavioral modules.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 层的改进遵循一种本能的进步。创建、测试和修复最低层。一旦这个最低阶段运行，就将第二层与适当的抑制和抑制连接附加到第一层。在测试和修复混合行为后，这种技术可以（理论上）重复用于任何行为模块的任何种类。
- en: Examples Using a Cognitive Assumption Architecture
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用认知假设架构的示例
- en: Note
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Check out Carnegie Mellon University’s open source Robot Navigation Toolkit
    (CARMEN) at [`http://www.cs.cmu.edu/~carmen/links.html`](http://www.cs.cmu.edu/%257Ecarmen/links.html).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 查看卡内基梅隆大学的开源机器人导航工具包（CARMEN）[`http://www.cs.cmu.edu/~carmen/links.html`](http://www.cs.cmu.edu/%257Ecarmen/links.html)。
- en: Rython robotics (Pyro) is composed of a set of Python trainings that encapsulate
    the lower-stage details ([`https://works.swarthmore.edu/cgi/viewcontent.cgi?article=1009&context=fac-comp-sci`](https://works.swarthmore.edu/cgi/viewcontent.cgi%253Farticle%253D1009%2526context%253Dfac-comp-sci)).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Rython 机器人（Pyro）由一系列封装低级细节的 Python 训练组成（[`https://works.swarthmore.edu/cgi/viewcontent.cgi?article=1009&context=fac-comp-sci`](https://works.swarthmore.edu/cgi/viewcontent.cgi%253Farticle%253D1009%2526context%253Dfac-comp-sci)）。
- en: Figure [10-2](#Fig2) presents a schematic of the Pyro architecture. Users write
    robotic control packages via a single application programming interface (API).
    The API is carried out as an object-oriented hierarchy that provides an abstraction
    layer atop all the supplier-supplied precise robotic APIs. For example, in Figure
    [10-2](#Fig2), all the unique APIs have been abstracted into the classification
    `pyro.robot`. In addition, different abstractions and services are handy in the
    Pyro library. The libraries assist to simplify the robot’s unique facets and to
    supply insulation from the important lower-stage points of the hardware or simulation
    environments (Blank, Kumar, Meeden, & Yanco, 2003).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图[10-2](#Fig2)展示了Pyro架构的示意图。用户通过单个应用程序编程接口（API）编写机器人控制包。API作为面向对象层次结构执行，为所有供应商提供的特定机器人API提供了抽象层。例如，在图[10-2](#Fig2)中，所有独特的API都抽象为`pyro.robot`类别。此外，Pyro库中还有不同的抽象和服务可用。这些库有助于简化机器人的独特方面，并提供对硬件或模拟环境重要低级点的隔离（Blank,
    Kumar, Meeden, & Yanco, 2003）。
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig2_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig2_HTML.jpg)'
- en: A schematic chart of the pyro architecture. Pyro library, you are a robot control
    program and python library constitute a pyro robot. Pyro robot is divided into
    Khepera, pioneer, handy board, and others. Each type consists of its robot A P
    I and driver module.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: Pyro架构的示意图。Pyro库、你是机器人控制程序和Python库构成了一个Pyro机器人。Pyro机器人分为Khepera、先锋、便携式板和其他。每种类型都包含其机器人API和驱动模块。
- en: Figure 10-2
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-2
- en: Pyro architecture
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: Pyro架构
- en: It is no longer necessary to recognize all the details of the Pyro implementation,
    but the reader should observe that the whole control program is independent of
    the type of robotics and the type of sensor being used. Listing [10-1](#PC1) will
    keep the robot away from barriers when they are within the safe distance of 1
    robot unit (discussed below) of the robot's front left or front center various
    sensors (lines 6 and 9, respectively), agnostic of the kind of robot. Lines 14
    and 15 exhibit the details of Pyro's automated initialization mechanism. Such
    traces will be left out in subsequent examples (Blank et al. 2003).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 不必了解Pyro实现的全部细节，但读者应注意到整个控制程序独立于机器人的类型和所使用的传感器的类型。列表[10-1](#PC1)将使机器人在距离机器人前左或前中心各种传感器（分别在第6行和第9行讨论）的安全距离内（1个机器人单位）避开障碍物，无论机器人的类型如何。第14行和第15行展示了Pyro自动初始化机制的细节。此类跟踪将在后续示例中省略（Blank
    et al. 2003）。
- en: '[PRE0]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Most of the Pyro framework is written in Python, an easy-to-read scripting language
    that appears very similar to pseudocode. It additionally integrates effortlessly
    with C and C++ code, which makes it feasible to rapidly incorporate existing code.
    The C/C++ interface also enables very costly routines (like imaginative and prescient
    programs) at lower tiers for quicker runtime efficiency. Also, we are able to
    “wrap” applications written in C and C++ (such as Player/Stage) so that they are
    instantly, and natively, handy in Python. Refer to Listings [10-2](#PC2) through
    [10-4](#PC4), which are discussed in the sections that follow.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: Pyro框架的大部分是用Python编写的，这是一种易于阅读的脚本语言，看起来非常类似于伪代码。它还与C和C++代码无缝集成，这使得快速整合现有代码成为可能。C/C++接口还允许在较低级别实现非常昂贵的例程（如视觉程序），以实现更快的运行时效率。此外，我们还可以将用C和C++编写的应用程序（如Player/Stage）“包装”起来，以便它们在Python中立即和本地可用。请参阅以下列表[10-2](#PC2)至[10-4](#PC4)，这些将在后续章节中讨论。
- en: '[PRE1]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Controlling the Robotic Car
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 控制机器人汽车
- en: 'Now we’ll describe how to program a Raspberry Pi that directly controls a robotic
    car. The robot vehicle is the same just used; however, it now uses subsumption
    architecture to manage the behaviors. Python is the language used for the subsumption
    instructions and scripts. Creating subsumptive Java classes is done with leJOS.
    You can study more about these Java lessons at [`www.lejos.org`](http://www.lejos.org).
    There are two major classes required: one abstract category named `Behavior` and
    the other named `Controller`. The `Behavior` class encapsulates the car’s conduct
    via the use of the following methods:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将描述如何编程一个直接控制机器人汽车的Raspberry Pi。机器人车辆与之前使用的相同；然而，现在它使用吸收架构来管理行为。用于吸收指令和脚本的编程语言是Python。创建吸收性Java类使用leJOS完成。你可以在[`www.lejos.org`](http://www.lejos.org)了解更多关于这些Java课程的信息。需要两个主要的类：一个名为`Behavior`的抽象类别，另一个名为`Controller`。`Behavior`类通过以下方法封装了汽车的行为：
- en: '`takeControl`: Returns a Boolean price indicating if the `Behavior` class has
    to take control or not'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`takeControl`: 返回一个布尔值，表示 `Behavior` 类是否需要控制'
- en: '`action`: Implements the particular conduct completed by way of the car'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`action`: 通过汽车实现特定的行为'
- en: '`suppress`: Causes the motion conduct to immediately stop, and then returns
    the automobile state to one in which the subsequent conduct can occur (Norris
    2019).'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`suppress`: 导致运动行为立即停止，然后返回汽车状态，以便后续行为可以发生（Norris 2019）。'
- en: '[PRE4]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Controller Class and Object
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 控制器类和对象
- en: 'The `Controller` class contains the main subsumption logic that determines
    which behaviors are active based on priority and the need for activation. The
    following are some of the methods in this class:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '`Controller` 类包含主要的子吸收逻辑，该逻辑根据优先级和激活需求确定哪些行为是活跃的。以下是这个类中的一些方法：'
- en: '`__init__()`: Initializes the `Controller` object'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__init__()`: 初始化 `Controller` 对象'
- en: '`add()`: Adds a behavior to the list of available behaviors. The order in which
    they are added determines the behavior’s priority.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`add()`: 将行为添加到可用行为的列表中。它们被添加的顺序决定了行为的优先级。'
- en: '`remove()`: Removes a behavior from the list of available behaviors. Stops
    any running behavior if the next highest behavior overrides it.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`remove()`: 从可用行为的列表中删除一个行为。如果下一个最高优先级的行为覆盖它，则停止任何正在运行的行为。'
- en: '`update()`: Stops an old behavior and runs the new behavior'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`update()`: 停止旧的行为并运行新的行为'
- en: '`step()`: Finds the next active behavior and runs it'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`step()`: 找到下一个活跃的行为并运行它'
- en: '`find_next_active_behavior()`: Finds the next behavior wishing to be active'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`find_next_active_behavior()`: 找到下一个希望变得活跃的行为'
- en: '`find_and_set_new_active_behavior()`: Finds the next behavior wishing to be
    active and makes it active'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`find_and_set_new_active_behavior()`: 找到下一个希望变得活跃的行为并使其活跃'
- en: '`start()`: Runs the selected action method'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`start()`: 运行选定的行为方法'
- en: '`stop()`: Stops the current action'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`stop()`: 停止当前的行为'
- en: '`continously_find_new_active_behavior()`: Monitors in real-time for new behaviors
    desiring to be active'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`continuously_find_new_active_behavior()`: 实时监控希望变得活跃的新行为'
- en: (Beginning Artificial Intelligence with the Raspberry Pi .... [`https://idoc.pub/documents/beginning-artificial-intelligence-with-the-raspberry-pi-1430zjgkdo4j`](https://idoc.pub/documents/beginning-artificial-intelligence-with-the-raspberry-pi-1430zjgkdo4j))
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: （从树莓派开始人工智能······[《https://idoc.pub/documents/beginning-artificial-intelligence-with-the-raspberry-pi-1430zjgkdo4j》](https://idoc.pub/documents/beginning-artificial-intelligence-with-the-raspberry-pi-1430zjgkdo4j)）
- en: The `Controller` object also functions as a scheduler, where one behavior is
    active at a time. The active behavior is decided by the sensor data and its priority.
    Any old active behavior is suppressed when a behavior with a higher priority signals
    that it wants to run (Norris 2019).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '`Controller` 对象还充当调度器，一次只有一个行为是活跃的。活跃的行为由传感器数据和其优先级决定。当具有更高优先级的行为发出信号表示它想要运行时，任何旧活跃的行为都会被抑制（Norris
    2019）。'
- en: '[PRE5]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: There are two ways to use the `Controller` class. The first way is to let the
    class take care of the scheduler itself by calling the `start` method. The other
    way is to forcibly start the scheduler by calling the `step` method. (Norris 2019).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `Controller` 类有两种方式。第一种方式是让类自己处理调度器，通过调用 `start` 方法。另一种方式是通过调用 `step` 方法强制启动调度器。（Norris
    2019）
- en: '[PRE6]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Controller Category
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 控制器类别
- en: The `Controller` category regularly occurs by means of allowing a large range
    of behaviors to be applied to the usage of general-purpose methods. The `take
    Control()` approach lets in a behavior to signal that it needs to take control
    of the robot. The way it does this is discussed later. The `action()` method is
    the way a behavior starts to control the robot. The impediment-avoidance conduct
    kicks off its `action()` method if a sensor detects an impediment in the robot’s
    path. The `suppress()` approach is used by using a higher-priority conduct to
    quit or suppress the `action()` method of a lower-precedence behavior. This happens
    when an impediment-avoidance conduct takes over from the normal forward movement
    behavior by way of suppressing the `ahead` behavior’s `action()` method and using
    its own action.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '`Controller` 类别通过允许将大量行为应用于通用方法的使用，而经常出现。`take Control()` 方法允许一个行为发出信号，表明它需要控制机器人。这种方式将在后面讨论。`action()`
    方法是行为开始控制机器人的方式。如果传感器检测到机器人路径上的障碍物，障碍物避免行为将启动其 `action()` 方法。使用更高优先级的行为来退出或抑制较低优先级行为的
    `action()` 方法，这就是 `suppress()` 方法的使用方式。这发生在障碍物避免行为通过抑制 `ahead` 行为的 `action()`
    方法并使用自己的行为来接管正常前进运动行为时。'
- en: Controller Type
  id: totrans-65
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 控制器类型
- en: The `Controller` type requires a listing or array of behavior objects that contain
    the robot’s overall behavior. A `Controller` instance starts with the highest
    array index in the behavior array and examines the `takeControl()` method’s return
    value. If true, it calls that behavior’s `action()` method. If it is false, the
    `Controller` checks the next behavior object’s `takeControl()` return value. Prioritization
    takes place by attaching index array values to each behavior object. The `Controller`
    category continuously rescans all the behavior objects and suppresses a lower-priority
    behavior if a greater-precedence behavior asserts the `takeControl()` method while
    the lower-priority `action()` method is activated. Figure [10-3](#Fig3) shows
    this procedure with all the behaviors that are eventually added.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '`Controller` 类型需要一个列表或数组，其中包含包含机器人整体行为的对象。一个 `Controller` 实例从行为数组的最高索引开始，检查
    `takeControl()` 方法的返回值。如果是真的，它将调用该行为的 `action()` 方法。如果是假的，`Controller` 将检查下一个行为对象的
    `takeControl()` 返回值。通过将索引数组值附加到每个行为对象上来实现优先级排序。`Controller` 类别会持续重新扫描所有行为对象，并在更高优先级的行为在较低优先级的
    `action()` 方法激活时断言 `takeControl()` 方法时，抑制较低优先级的行为。图 [10-3](#Fig3) 展示了添加所有行为后的此过程。'
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig3_HTML.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig3_HTML.jpg)'
- en: A flowchart of the behavioral state. The chart is divided into sensors, behaviors,
    and actuators. Sensors include battery voltage and ultrasonic sensors which leads
    to stop robot and avoid obstacles in behaviors which further leads to motors in
    actuators. Behaviors also consist of normal behavior.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 行为状态流程图。图表分为传感器、行为和执行器。传感器包括电池电压和超声波传感器，这导致在行为中停止机器人并避开障碍物，进而导致在执行器中的电机。行为还包括正常行为。
- en: Figure 10-3
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-3
- en: Behavior state diagram (based on Norris 2019)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 行为状态图（基于 Norris 2019）
- en: It is now time to create a relatively simple behavior-based robot example.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候创建一个相对简单的基于行为的机器人示例了。
- en: Creating a Behavior-Based Robot
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建基于行为的机器人
- en: The `Controller` class allows a large range of behaviors to be applied via the
    use of the general-purpose methods. The `takeControl` method allows a behavior
    to signal that it wishes to take control of the robot. The `action` method is
    the way a behavior starts to manage the robot. The obstacle-avoidance behavior
    kicks off its `action` method if a sensor detects an impediment in the robot's
    path. The `suppress` method is used with the aid of a greater-precedence behavior
    to give up or suppress the `action` method of a lower-priority behavior. For instance,
    an impediment-avoidance behavior takes over from the normal forward-motion behavior
    by suppressing the forward behavior's `action` method and having its very own
    `action`.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '`Controller` 类允许通过使用通用方法应用广泛的行为。`takeControl` 方法允许一个行为发出信号，表示它希望控制机器人。`action`
    方法是行为开始管理机器人的方式。如果传感器检测到机器人路径上的障碍物，障碍物避免行为将启动其 `action` 方法。`suppress` 方法与更高优先级的行为一起使用，以放弃或抑制较低优先级行为的
    `action` 方法。例如，障碍物避免行为通过抑制正常前进行为的 `action` 方法并拥有自己的 `action` 来接管正常前进行为。'
- en: It is now time to create a simple behavior-based robotic example. The `Controller`
    class requires a listing or array of `Behavior` objects that form the robot's
    basic behavior. A `Controller` instance begins with the highest array index in
    the `Behavior` array and tests the `takeControl` method's return value. If true,
    it calls that behavior's `action` method. If it is false, the `Controller` examines
    the next `Behavior` object's `takeControl()` method’s return value. Prioritization
    occurs by looking at the index array values connected to each `Behavior` object.
    The `Controller` category continuously rescans all the `Behavior` objects and
    suppresses lower-priority behavior (Norris 2019).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候创建一个简单的基于行为的机器人示例了。`Controller` 类需要一个列表或数组，其中包含构成机器人基本行为的 `Behavior` 对象。一个
    `Controller` 实例从 `Behavior` 数组的最高索引开始，测试 `takeControl` 方法的返回值。如果是真的，它将调用该行为的 `action`
    方法。如果是假的，`Controller` 将检查下一个 `Behavior` 对象的 `takeControl()` 方法的返回值。通过查看与每个 `Behavior`
    对象连接的索引数组值来决定优先级。`Controller` 类别会持续重新扫描所有 `Behavior` 对象，并在更高优先级的行为在较低优先级的 `action()`
    方法激活时断言 `takeControl()` 方法时，抑制较低优先级的行为（Norris 2019）。
- en: Other Cognitive Architectures
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他认知架构
- en: 'Cognitive architectures in general refer to the following:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，认知架构指的是以下内容：
- en: An operational architecture that describes what the system does on a theoretical
    level.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个描述系统在理论层面上做什么的操作架构。
- en: The system architecture can be developed by a manufacturer (or research group)
    and may look like a data-flow diagram.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统架构可以由制造商（或研究小组）开发，可能看起来像数据流图。
- en: The technical architecture specifies the actual procedures and code structure.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术架构指定了实际的过程和代码结构。
- en: In the following sections we'll look at some of the different kinds of architecture.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将探讨一些不同类型的架构。
- en: Reactive Cognitive Architecture
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反应式认知架构
- en: 'A reactive (or behavioral) cognitive architecture contains the following:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 反应式（或行为）认知架构包含以下内容：
- en: 'Operational Architecture: describes *what* the system does at a high level,
    not how it does it'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 操作架构：描述系统在高级别上 *做什么*，而不是如何做
- en: 'Systems Architecture: describes how a system works in terms of *major subsystems*'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统架构：描述系统如何通过 *主要子系统* 来工作
- en: 'Technical Architecture: describes how a system works in terms of *implementation
    details*, language, algorithms, and code'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术架构：描述系统如何通过 *实现细节*、语言、算法和代码来工作
- en: Behavioral robotics, shown in Figure [10-4](#Fig4), is a basic “instinctive”
    architecture with sets of SENSE-ACT couplings called behaviors that get turned
    on/off based on stimulus; within this architecture there is no plan.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [10-4](#Fig4) 所示的行为机器人学是一种基本的“本能”架构，其中包含一系列称为行为的 SENSE-ACT 连接集，这些连接根据刺激被打开/关闭；在这个架构中没有任何计划。
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig4_HTML.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig4_HTML.png)'
- en: A chart of behavioral robotics. A box labeled reactive or behavioral layer points
    to another layer that contains boxes labeled sense and act with double-headed
    arrows between them.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 行为机器人学的图表。一个标记为反应式或行为层的框指向另一个包含标记为感知和动作的框，它们之间有双头箭头。
- en: Figure 10-4
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-4
- en: Behavioral robotics (MIT Press 2019)
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 行为机器人学（MIT Press 2019）
- en: 'Control theory is at a “lower” level; however, the behavior reacts very quickly
    because it is close to the sensor. This list is not exhaustive:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 控制理论处于“较低”层次；然而，由于它靠近传感器，行为反应非常快。这个列表并不详尽：
- en: '*Reactive (Type 1, behaviors):*'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '*反应式（类型1，行为）:*'
- en: Tightly coupled with sensing, consequently very quick
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与感知紧密耦合，因此非常快速
- en: Many nearly concurrent stimulus-response behaviors, linked together with simple
    scripting
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 许多几乎同时发生的刺激-反应行为，通过简单的脚本链接在一起
- en: Action generated by sensed or external stimulus
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由感知或外部刺激产生的动作
- en: No situational awareness, no mission monitoring
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有情境意识，没有任务监控
- en: Models are of the vehicle, not of the environment
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型是关于车辆，而不是环境
- en: Thus far, behavioral organization suggests three layers of intelligence with
    distinctly different levels of perception, knowledge, planning horizons, and time
    scales. The AI robotics field has converged on PLAN, then SENSE-ACT, with LEARN
    being added later as needed at different points. Technically this is SENSE-PLAN,
    SENSE-ACT, but historically the sensing for planning, just like the execution
    monitoring, is lumped in with “PLAN.” See Vemuru et al. (2019).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，行为组织表明存在三个不同感知、知识、规划范围和时间尺度的智能层。人工智能机器人领域已经汇聚到 PLAN，然后是 SENSE-ACT，LEARN
    在需要时作为后期添加。技术上这是 SENSE-PLAN，SENSE-ACT，但历史上，用于规划的感知，就像执行监控一样，被归入“PLAN”。参见 Vemuru
    等人（2019）。
- en: Canonical Operational Architecture
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 典型操作架构
- en: A canonical operational architecture is a potential method for how to program
    an intelligent robot. It's a type of model that aims to show data entities and
    relationships in the simplest feasible form in order to integrate processes across
    various systems and databases (Figure [10-5](#Fig5)). Very often, the data exchanged
    across various systems rely on different languages, syntax, and protocols. The
    architecture consists of three layers that generally represent interaction, deliberative,
    and behavioral.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 典型操作架构是编程智能机器人的潜在方法。它是一种模型，旨在以最简单可行的方式展示数据实体和关系，以便整合跨各种系统和数据库的过程（图 [10-5](#Fig5)）。在各个系统中交换的数据通常依赖于不同的语言、语法和协议。该架构由三个层次组成，通常代表交互、审议和行为。
- en: The interaction layer consists of procedural, functional, and ontological languages
    such as OWL. The deliberative layer consists of functional languages such as Lisp.
    The behavioral layer consists of procedural languages such as C, C++, and Java.
    Each layer has a different type of program structure.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 交互层由程序性、功能性和本体语言（如 OWL）组成。审议层由功能语言（如 Lisp）组成。行为层由程序语言（如 C、C++ 和 Java）组成。每一层都有不同类型的程序结构。
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig5_HTML.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig5_HTML.png)'
- en: A diagram of the canonical operational architecture with three layers from top
    to bottom labeled as interaction layer, deliberative layer, and behavioral layer.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 从上到下分为三层，分别标记为交互层、深思熟虑层和行为层的规范操作架构图。
- en: Figure 10-5
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-5
- en: Canonical operational architecture (Harbour et al. 2019; MIT Press 2019)
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 规范操作架构（Harbour 等人 2019年；麻省理工学院出版社 2019年）
- en: 'How much intelligence the robot needs is determined by the following:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人需要多少智能由以下因素确定：
- en: What functions the robot needs to do, such as to generate, monitor, select,
    implement, execute behaviors, or to learn.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器人需要执行哪些功能，例如生成、监控、选择、实施、执行行为或学习。
- en: What planning horizon the functions require; for example, Present, Present+Past,
    Present+Past+Future.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 函数需要什么规划范围；例如，现在、现在+过去、现在+过去+未来。
- en: How fast the algorithms need to update needs to be determined.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要确定算法更新的速度。
- en: Control theory may have to be implemented, such as using a closed world and
    guaranteed execution rates.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能需要实现控制理论，例如使用封闭世界和保证执行速率。
- en: Is the model for Local, or Global, or Both operations?
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该模型是针对本地、全局还是两者兼而有之的操作？
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig6_HTML.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig6_HTML.jpg)'
- en: A schematic of a three-axis system, with the planes labeled as mission complexity,
    human independence, and environmental complexity.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一个三轴系统示意图，其中平面被标记为任务复杂性、人类独立性和环境复杂性。
- en: Figure 10-6
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-6
- en: Complexities (MIT Press 2019)
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂性（麻省理工学院出版社 2019年）
- en: System and Technical Architectures
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 系统和技术架构
- en: 'A system architecture is developed by a researcher or study group and has three
    paradigms: hierarchical or reactive, or hybrid deliberative/reactive. System architectures
    can make the cognitive architecture for intelligence more tangible. They are very
    dependent on the implementation and involve sub-systems. The following are some
    additional features:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 系统架构是由研究人员或研究小组开发的，并具有三种范例：分层或反应式，或混合的深思熟虑/反应式。系统架构可以使智能的认知架构更具体。它们非常依赖于实现并涉及子系统。以下是一些附加功能：
- en: Able to relate the functions in the canonical operational architecture to the
    five common sub-systems
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够将规范操作架构中的功能与五个常见子系统相关联
- en: Classify a system’s architecture as being either hierarchical, reactive, or
    hybrid deliberative/reactive based on 1) the relationship of the three AI robot
    primitives and 2) sensing handling
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据以下1）三个AI机器人原语的关系和2）感知处理将系统的架构分类为分层、反应式或混合的深思熟虑/反应式。
- en: Able to draw the hybrid deliberative/reactive system architecture
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够绘制混合的深思熟虑/反应式系统架构
- en: Know three ways of generally organizing systems
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解通常组织系统的三种方式
- en: Understand these contributions to canonical system architecture
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解这些对规范系统架构的贡献
- en: 'In order to make the architecture more tangible, again we add functions such
    as hybrid deliberative/reactive architecture, which yields three layers. The five
    sub-systems of the system architecture are as follows:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使架构更具体，我们再次添加了混合的深思熟虑/反应式架构，从而产生三层。系统架构的五个子系统如下：
- en: Navigation (generating)
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航（生成）
- en: Mapmaker, environment modeling
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 地图制作，环境建模
- en: Planning (mission generation, executing)
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 规划（任务生成、执行）
- en: Motor schemas (performing motor commands)
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 电机模式（执行电机命令）
- en: Perception, sensing, perceptual schemas
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 感知、传感、感知模式
- en: 'Technical architectures typically involve a new procedure, such as potential
    fields. The technical architecture is influenced by the operational and system
    architectures. The technical architecture contains specific algorithms, as well
    as control and knowledge structures. Sub-systems can further be reduced to two
    terms that are two attributes:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 技术架构通常涉及一项新程序，例如潜在场。技术架构受操作和系统架构的影响。技术架构包含特定的算法，以及控制和知识结构。子系统可以进一步简化为两个术语，即两个属性：
- en: 1\. *Relationship*, which is how the three building blocks, or robot primitives,
    are arranged
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 1. *关系*，即三个构建块或机器人原语的排列方式
- en: 2\. *Content*, which is how sensing is handled (MIT Press 2019)
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 2. *内容*，即如何处理感知（麻省理工学院出版社 2019年）
- en: The Human Model
  id: totrans-132
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 人类模型
- en: When one is deriving a cognitive model in order to achieve machine awareness,
    one must look to the human model. Let’s start with the upper brain or cortex;
    here, we have reasoning over symbols and data about goals. Next, the middle brain
    converts sensor data into symbols data. Finally, the spinal cord and “lower” brain
    are where skills and responses occur. This can make a most abstract canonical
    operational architecture, creating a lot of interaction between the deliberative
    and behavioral (reactive) layers (Figure [10-7](#Fig7)).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个人为了实现机器意识而推导认知模型时，必须参考人类模型。让我们从大脑的上部或皮层开始；在这里，我们有关于目标和数据的推理。接下来，中间大脑将传感器数据转换为符号数据。最后，脊髓和“下部”大脑是技能和反应发生的地方。这可以创建一个最抽象的规范操作架构，在策略和行为的（反应性）层之间产生大量交互（见图[10-7](#Fig7)）。
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig7_HTML.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig7_HTML.png)'
- en: A schematic of the autonomous behavior with the interaction between the subsystems
    of navigation, learning, sensors, planning, world map, behavior, perception, mission
    planner navigator pilot, and G P S I M U odometry landmarks to provide motor commands
    from a human controller.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 自主行为的示意图，展示了导航、学习、传感器、规划、世界地图、行为、感知、任务规划导航飞行员和GPS IMU测距地标之间的交互，以从人类控制器提供电机命令。
- en: Figure 10-7
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-7
- en: Autonomous behavior
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 自主行为
- en: Figure [10-8](#Fig8) shows the AI primitives (building blocks) with an agent.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图[10-8](#Fig8)显示了与智能体一起的AI原语（构建块）。
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig8_HTML.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig8_HTML.jpg)'
- en: Four rectangular boxes are labeled sense, plan, act, and learn. Learn is highlighted.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 四个矩形框分别标记为感知、计划、行动和学习。学习被突出显示。
- en: Figure 10-8
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-8
- en: AI Primitives
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: AI原语
- en: A Hierarchical Paradigm for Operational Architectures
  id: totrans-143
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 操作架构的层次范例
- en: '**Hierarchies** are a natural way to organize, as they are not fundamentally
    rigid or inefficient (Figure [10-9](#Fig8)). They are more flexible than centralized
    planning, and the goals and priorities are salient (Albus & Mystel 2001; Murphy,
    2019).'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '**层次结构**是一种自然的组织方式，因为它们不是根本上的僵化或不高效（见图[10-9](#Fig8)）。它们比集中式规划更灵活，目标和优先级更加明显（Albus
    & Mystel 2001；Murphy, 2019）。'
- en: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig9_HTML.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_10_Chapter/494112_1_En_10_Fig9_HTML.jpg)'
- en: A schematic of a hierarchical paradigm. A loop of sense, plan, and act is on
    the top. Below is a diagram of a plan, sensors, and algorithms that enter the
    world model to provide action. Adjoining text reads world model is a fused global
    data structure. It combines a priori representation, sensed info, and cognitive
    understanding.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 层次范例的示意图。感知、计划和行动的循环位于顶部。下面是计划、传感器和算法进入世界模型的图示，以提供行动。相邻的文本说明世界模型是一个融合的全局数据结构。它结合了先验表示、感知信息和认知理解。
- en: Figure 10-9
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-9
- en: Hierarchial paradigm (altered from Murphy 2019)
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 层次范例（改编自Murphy 2019）
- en: Deliberative Architectures
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 策略架构
- en: This is where the AI robot receives and processes all of its available sensory
    information, then utilizes the appropriate internally stored knowledge it has,
    along with AI, and then reasons to create a plan of action. To do this, the robot
    must run a search through all potential plans until it finds one that will successfully
    do the job. This requires the AI robot to look forward and consider all feasible
    moves and outcomes. Unfortunately, this can be time consuming, creating latencies;
    however, advances in AI could shorten this time and allow the robot to act strategically.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是AI机器人接收并处理所有可用感官信息的地方，然后利用它存储的适当内部知识，结合AI，然后进行推理以创建行动计划。为此，机器人必须对所有潜在的计划进行搜索，直到找到一项能够成功完成工作的计划。这要求AI机器人向前看，考虑所有可行的移动和结果。不幸的是，这可能会很耗时，产生延迟；然而，AI的进步可以缩短这一时间，并允许机器人战略性地行动。
- en: Reactive Architectures
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反应架构
- en: To allow the robot to respond very quickly to changing and unstructured environments,
    a reactive architecture can be utilized. This is where sensory inputs are tightly
    coupled to effector outputs, to allow for "stimulus-response" to occur. Animals
    in nature are largely reactive. However, this has limitations. Because it is stimulus-response
    only, this architecture has no working memory, no internal representations of
    the environment, and no ability to learn over time.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使机器人能够快速响应不断变化和无结构的环境，可以使用反应式架构。在这里，感觉输入与执行器输出紧密耦合，以便发生“刺激-反应”。自然界中的动物大多是反应性的。然而，这也有局限性。因为只有刺激-反应，这种架构没有工作记忆，没有环境的内部表示，也没有随着时间的推移学习的能力。
- en: Hybrid Architectures
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 混合架构
- en: 'In a hybrid architecture, the best of both can be combined: reactive and deliberative.
    In it, one part/type/system of the robot’s "mind/brain" plans, while another deals
    with immediate reaction, such as avoiding obstacles and staying on the road. The
    obvious challenges are effectively and efficiently bringing these two parts of
    the mind/brain together (Harbour et al. 2019). This may require an additional
    part of the AI robot mind/brain to be the “executive.” (See Harbour et al. 2019.)
    Hybrid architectures can combine the responsiveness of reactive systems with the
    flexibility of purely deliberative systems, with the more traditional symbolic
    or deliberative methods yielding high levels of robustness. Solely reactive systems
    lack the ability to take into account a priori knowledge about the environment
    or to keep track of the past (what works and what does not work) via long-term
    memory. Nor do they use working memory; they just react. An example of a hybrid
    system could be a typical three-layer hybrid architecture: bottom layer is the
    reactive/behavior-based layer (Type 1 processing), in which sensors/actuators
    are closely coupled; the upper layer provides the deliberative component (e.g.,
    planning, localization) (Type 2 processing); while the intermediate between the
    two could be called the executive layer or be contained in Type 2\. (See Harbour
    et al. 2019.)'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在混合架构中，可以结合两者的优点：反应性和深思熟虑。在其中，机器人“心智/大脑”的一部分/类型/系统进行规划，而另一部分则处理即时反应，例如避开障碍物和保持在道路上。明显的挑战是有效地将这两部分心智/大脑结合起来（Harbour
    等人，2019年）。这可能需要人工智能机器人心智/大脑的额外部分作为“执行者”。（参见 Harbour 等人，2019年。）混合架构可以将反应性系统的响应性与纯粹深思熟虑系统的灵活性结合起来，更传统的符号或深思熟虑的方法产生高水平的鲁棒性。仅反应性系统缺乏考虑环境先验知识的能力，也不能通过长期记忆跟踪过去（什么有效，什么无效）。它们也不使用工作记忆；它们只是反应。一个混合系统的例子可以是典型的三层混合架构：底层是反应性/基于行为的层（类型1处理），其中传感器/执行器紧密耦合；上层提供深思熟虑的组件（例如，规划，定位）（类型2处理）；而介于两者之间的部分可以称为执行层或包含在类型2中。（参见
    Harbour 等人，2019年。）
- en: Summary
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Extra Credit
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 额外加分
- en: 'Exercise 10.1: Describe the **architecture types**?'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 练习10.1：描述**架构类型**？
- en: 'Exercise 10.2: Describe **subsumption cognitive architecture**?'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 练习10.2：描述**子吸收认知架构**？
- en: 'Exercise 10.3: Utilizing a **cognitive architecture** as described and shown
    in this chapter, design, develop, and program your assigned hardware (robot) with
    software to perform a mission assigned by your instructor utilizing intelligence
    (AI).'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 练习10.3：利用本章所述和展示的认知架构，设计、开发和编程分配给你的硬件（机器人），使用软件执行由指导教师分配的任务，利用智能（AI）。
- en: Task
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务
- en: 'There are four categories: Time, Subject of Action, Movement, and Dependency.'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 有四个类别：时间、行动主体、运动和依赖性。
- en: 'Time:'
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 时间：
- en: 'Fixed time. Ex.: Collect as many items in 20 minutes.'
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 固定时间。例如：在20分钟内收集尽可能多的物品。
- en: 'Minimum time. Ex.: Visit all buildings in area as fast as possible (minimize
    the time).'
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最短时间。例如：尽可能快地访问区域内的所有建筑物（最小化时间）。
- en: 'Unlimited time. Ex.: Patrol the buildings in the area.'
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无限时间。例如：在该区域内巡逻建筑物。
- en: 'Synchronization required. Ex.: Push two or more buttons at same time.'
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要同步。例如：同时按下两个或更多按钮。
- en: 'Subject of Action: This has two categories: object-based and robot-based.'
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 行动主体：这有两个类别：基于对象和基于机器人。
- en: Movement. Going-to or going-while, coverage or convergence.
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运动。前往或边走边去，覆盖或收敛。
- en: 'Dependency: Independent, dependent, and interdependent.'
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 依赖性：独立、依赖和相互依赖。
- en: References
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: 'Blank, D., Kumar, D., Meeden, L., & Yanco, H. (2003). Pyro: A python-based
    versatile programming environment for teaching robotics. *Journal on Educational
    Resources in Computing (JERIC)*, *3*(4), 1–es.'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 布兰克，D.，库马尔，D.，米登，L.，扬科，H. (2003)。Pyro：一种基于Python的通用编程环境，用于机器人教学。*教育计算资源杂志（JERIC）*，*3*(4)，1–es.
- en: Clark, J.D., & Harbour, S.D. (2019). Unpublished.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 克拉克，J.D.，哈伯尔，S.D. (2019)。未发表。
- en: Clark, J.D., Mitchell, W.D., Vemuru, K.V., & Harbour, S.D. (2019). Unpublished.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 克拉克，J.D.，米切尔，W.D.，维穆鲁，K.V.，哈伯尔，S.D. (2019)。未发表。
- en: Chang, T.H., Hsu, C.S., Wang, C., & Yang, L.–K. (2008). On board measurement
    and warning module for measurement and irregular behavior. *IEEE Transactions
    on Intelligent Transportation Systems*, *9*(3), 501–513.
  id: totrans-174
