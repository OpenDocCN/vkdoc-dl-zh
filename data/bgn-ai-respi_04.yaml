  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '|   |   | paper | rock | scissors |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '|   |   | paper | rock | scissors |'
