- en: There are a lot of jumpers to connect in this setup, so be especially carefully
    when wiring the solderless breadboard. I recommend that you use a separate power
    rail for the 5V supply that should be located on the top of the breadboard if
    you are using a horizontal orientation for the board. Pay particular attention
    that you do not connect any 5V source to a Raspberry Pi input because it will
    surely destroy that input pin. The GPIO inputs are strictly limited to a maximum
    level of 3.3V, anything higher will burn out that input pin and likely cause further
    damage to the Raspberry Pi core.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个设置中需要连接很多跳线，因此在焊接无焊点面包板时要特别小心。如果你使用的是水平方向的板，建议使用单独的电源轨为5V供电，应位于面包板的顶部。特别注意不要将任何5V电源连接到Raspberry
    Pi的输入，因为这肯定会损坏该输入引脚。GPIO输入严格限制在最大3.3V，任何高于这个电压的都会烧毁输入引脚，并可能对Raspberry Pi核心造成进一步损坏。
- en: Figure [4-12](#Fig12) shows the complete physical setup with each of the push
    buttons’ functions labeled.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-12](#Fig12)显示了完整的物理设置，每个按钮的功能都已标注。
- en: '![A436848_1_En_4_Fig12_HTML.jpg](A436848_1_En_4_Fig12_HTML.jpg)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_4_Fig12_HTML.jpg](A436848_1_En_4_Fig12_HTML.jpg)'
- en: Figure 4-12.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-12.
- en: Physical setup for the automated Nim game
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 自动Nim游戏的物理设置
- en: The program that controls this hardware is named automated_nim.py. It is based
    on the previous program, except all the inputs are now accomplished with callback
    functions and an LCD display is used to show the game status. I felt it was appropriate
    to first discuss how the LCD display functions with the Raspberry Pi before actually
    getting into the main program.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 控制此硬件的程序名为automated_nim.py。它基于之前的程序，但所有输入现在都是通过回调函数完成的，并且使用LCD显示屏来显示游戏状态。我觉得在真正进入主程序之前，首先讨论LCD显示屏如何与Raspberry
    Pi一起工作是很合适的。
- en: LCD Display
  id: totrans-201
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 液晶显示屏
- en: I will first acknowledge that most of the material in this section is based
    on a very good Adafruit tutorial by Tony DiCola available at [`https://learn.adafruit.com/character-lcd-with-raspberry-pi-or-beaglebone-black/overview`](https://learn.adafruit.com/character-lcd-with-raspberry-pi-or-beaglebone-black/overview)
    .
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先承认，本节的大部分内容是基于Tony DiCola编写的一个非常好的Adafruit教程，该教程可在[https://learn.adafruit.com/character-lcd-with-raspberry-pi-or-beaglebone-black/overview](https://learn.adafruit.com/character-lcd-with-raspberry-pi-or-beaglebone-black/overview)找到。
- en: Inexpensive 16 × 2 or 16 × 4 LCDs with 16 connector pins are most likely using
    a Hitachi HD44780 controller or a generic equivalent. The LCD uses a parallel
    interface, meaning that you need multiple wires from the Raspberry Pi to control
    it. This setup uses only four data pins and two control pins. This configuration
    is known as the LCD nibble input mode. The other mode is where a full byte, or
    eight bits, is transferred each time there is a new character input to the LCD.
    Obviously, the nibble mode is slower than the byte mode, but for this application,
    the speed difference is not apparent. The Raspberry Pi is only sending data to
    the display; it is not reading any data. This means that that you do not have
    to be concerned about any 5V pulses being sent to the more sensitive Raspberry
    Pi input pins that only have a 3.3V maximum voltage input, as I mentioned earlier.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 价格低廉的16 × 2或16 × 4液晶显示屏，具有16个连接引脚，很可能是使用Hitachi HD44780控制器或其通用等效控制器。该液晶显示屏使用并行接口，这意味着您需要从Raspberry
    Pi引出多根线来控制它。此配置仅使用四个数据引脚和两个控制引脚。这种配置被称为LCD nibble输入模式。另一种模式是在每次向LCD输入新字符时，传输一个完整的字节或八位。显然，nibble模式比字节模式慢，但在此应用中，速度差异并不明显。Raspberry
    Pi只向显示屏发送数据；它不读取任何数据。这意味着您不必担心发送到更敏感的Raspberry Pi输入引脚的任何5V脉冲，因为这些引脚的最大电压输入为3.3V，正如我之前提到的。
- en: 'The register select pin #4 on the 16-pin LCD header has two uses. When pulled
    low, the Raspberry Pi can send control commands to the LCD, such as change to
    a designated character position or clear the screen. This is mode is referred
    to as writing to the instruction or command register. When the register select
    pin is set high, the LCD controller goes into a data mode and accepts data to
    display on the screen.'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 16引脚LCD引脚上的寄存器选择引脚#4有两个用途。当拉低时，Raspberry Pi可以向LCD发送控制命令，例如更改到指定的字符位置或清除屏幕。这种模式被称为写入指令或命令寄存器。当寄存器选择引脚设置为高时，LCD控制器进入数据模式并接受要显示在屏幕上的数据。
- en: 'The read/write pin #5 is grounded, because only data is to be written to the
    LCD for this setup.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 读写引脚#5接地，因为在此配置中只需向LCD写入数据。
- en: 'The enable pin #6 is toggled as necessary to write data to the input registers
    that eventually display on the screen.'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 使能引脚#6根据需要切换，以写入最终显示在屏幕上的输入寄存器中的数据。
- en: After you wire the LCD, push button switches, and potentiometer, you need to
    load a special Python library that allows the LCD display to work with the Raspberry
    Pi. This library was created by the clever folks at Adafruit, who have a lot of
    libraries to support all sorts of devices and sensors. The procedure I go through
    next is also applicable to loading most other specialty Adafruit libraries.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在连接LCD、按钮开关和电位计后，您需要加载一个特殊的Python库，该库允许LCD显示屏与Raspberry Pi一起工作。这个库是由Adafruit的聪明人创建的，他们有很多库来支持各种设备和传感器。我接下来要执行的程序也适用于加载大多数其他Adafruit专用库。
- en: Loading the Adafruit LCD Library
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载Adafruit LCD库
- en: 'You need the Git application to load the library because Adafruit uses github.com
    to store all of its libraries. Enter the following commands to install Git:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要Git应用程序来加载库，因为Adafruit使用github.com来存储其所有库。请输入以下命令来安装Git：
- en: '[PRE15]'
  id: totrans-210
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Once Git is installed, you can now download the LCD library. This download
    process is called cloning. It results in new directory named `Adafruit_Python_CharLCD`
    created in your home directory. Enter this command:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦安装了 Git，你现在可以下载 LCD 库。这个下载过程被称为克隆。它会在你的主目录中创建一个名为 `Adafruit_Python_CharLCD`
    的新目录。输入以下命令：
- en: '[PRE16]'
  id: totrans-212
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'The newly created directory contains all the required files for the next step,
    which is to set up the library. The setup process is long and involved; however,
    there is a simple setup script provided to automate the whole process. Enter the
    following commands to set up the library:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 新创建的目录包含设置库所需的全部文件，下一步是设置库。设置过程既长又复杂；然而，提供了一个简单的设置脚本来自动化整个过程。输入以下命令来设置库：
- en: '[PRE17]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Figure [4-13](#Fig13) shows the beginning and ending of the install process.
    Overall, there are more than 70 separate actions taking place in the installation,
    including downloading and building multiple dependencies.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-13](#Fig13) 展示了安装过程的开始和结束。总的来说，在安装过程中发生了超过 70 个单独的操作，包括下载和构建多个依赖项。
- en: '![A436848_1_En_4_Fig13_HTML.jpg](A436848_1_En_4_Fig13_HTML.jpg)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_4_Fig13_HTML.jpg](A436848_1_En_4_Fig13_HTML.jpg)'
- en: Figure 4-13.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-13。
- en: LCD library installation script execution
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: LCD 库安装脚本执行
- en: Now, you should test the both the hardware and the software installations to
    verify that everything is working properly.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你应该测试硬件和软件安装，以验证一切是否正常工作。
- en: LCD Test
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LCD 测试
- en: 'The test program named char_lcd.py should be located in the examples subdirectory
    of the `Adafruit_Python_CharLCD` directory that was created after the Git clone
    operation completed. Go to the examples directory and enter this command:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 命名为 char_lcd.py 的测试程序应位于 Git 克隆操作完成后创建的 `Adafruit_Python_CharLCD` 目录的 examples
    子目录中。转到 examples 目录并输入以下命令：
- en: '[PRE18]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: If everything is wired correctly, and all the libraries are installed properly,
    you should see the display as shown in Figure [4-14](#Fig14).
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切接线正确，并且所有库都已正确安装，你应该会看到如图 [4-14](#Fig14) 所示的显示。
- en: '![A436848_1_En_4_Fig14_HTML.jpg](A436848_1_En_4_Fig14_HTML.jpg)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_4_Fig14_HTML.jpg](A436848_1_En_4_Fig14_HTML.jpg)'
- en: Figure 4-14.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-14。
- en: Result of running the char_lcd.py program
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 运行 char_lcd.py 程序的结果
- en: If you do not see this display, please recheck all the wiring because it is
    pretty easy to misplace a jumper insertion point or connect to the wrong pin on
    the Pi Cobbler or LCD module. As I mentioned earlier, most faults are normally
    wiring or interconnection mistakes.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有看到这个显示，请重新检查所有接线，因为很容易错放跳线插入点或连接到 Pi Cobbler 或 LCD 模块上的错误引脚。正如我之前提到的，大多数故障通常是接线或互连错误。
- en: Assuming that the LCD test was successful, it is now time to consider the main
    Nim program.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 LCD 测试成功，现在是时候考虑主要的 Nim 程序了。
- en: automated_nim.py
  id: totrans-229
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: automated_nim.py
- en: 'This program has been substantially changed from the previous Nim program because
    of the need to incorporate callback functions and LCD display routines. I have
    also incorporated some AI logic into the program: the computer opponent now uses
    the game theory n mod 4 = 1 equation to help in its stick selection, in addition
    to using the random number generator when the optimal pick is not achievable.'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 由于需要整合回调函数和 LCD 显示例程，这个程序与之前的 Nim 程序相比已经发生了重大变化。我还将一些 AI 逻辑整合到程序中：计算机对手现在使用博弈论方程
    n mod 4 = 1 来帮助其选择棍子，此外，当无法实现最佳选择时，还会使用随机数生成器。
- en: automated_nim.py listing
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: automated_nim.py 列表
- en: '[PRE19]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: I believe you will find that defeating the computer in this program is quite
    difficult, which differs sharply from the earlier, more naive Nim program. Figure
    [4-15](#Fig15) is a photograph of the LCD screen captured while I was playing
    a round with the computer.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信你会发现在这个程序中击败计算机相当困难，这与早期的、更天真的 Nim 程序形成鲜明对比。图 [4-15](#Fig15) 是我在与计算机进行一轮游戏时捕获的
    LCD 屏幕照片。
- en: '![A436848_1_En_4_Fig15_HTML.jpg](A436848_1_En_4_Fig15_HTML.jpg)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_4_Fig15_HTML.jpg](A436848_1_En_4_Fig15_HTML.jpg)'
- en: Figure 4-15.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-15。
- en: LCD display during round play
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 轮次游戏中的 LCD 显示
- en: This automated Nim program is the final project in this chapter. There are more
    Python games readily available in the Jessie Linux distribution that you may wish
    to investigate. They can be found in the main X window GUI that is shown in Figure
    [4-16](#Fig16).
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这个自动化的 Nim 程序是本章的最终项目。在 Jessie Linux 发行版中，你可以轻松找到更多 Python 游戏，你可能希望对其进行调查。它们可以在图
    [4-16](#Fig16) 所示的主 X 窗口 GUI 中找到。
- en: '![A436848_1_En_4_Fig16_HTML.jpg](A436848_1_En_4_Fig16_HTML.jpg)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_4_Fig16_HTML.jpg](A436848_1_En_4_Fig16_HTML.jpg)'
- en: Figure 4-16.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-16。
- en: Additional Python games
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 其他 Python 游戏
- en: These games are curtesy of Al Sweigert, whose website is at [`www.inventwithpython.com`](http://www.inventwithpython.com)
    . At this website, you may freely download a 347-page e-book entitled Making Games
    with Python & Pygame, in which Al describes, in detail, how the games listed in
    Figure [4-16](#Fig16) function. It is highly recommended for those readers interested
    in taking the next step in Python game development beyond what I have discussed
    in this chapter.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 这些游戏由Al Sweigert提供，他的网站是[www.inventwithpython.com](http://www.inventwithpython.com)。在这个网站上，您可以免费下载一本347页的电子书，书名为《用Python
    & Pygame制作游戏》，Al在其中详细描述了图[4-16](#Fig16)中列出的游戏的工作原理。对于那些对Python游戏开发感兴趣并希望超越本章所讨论的内容的读者来说，这是一本强烈推荐的书籍。
- en: Summary
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Fairly simple game programs written in the Python language were the focus of
    this chapter. I presented several versions of two games—rock-paper-scissors and
    Nim—that progressed from relatively naive versions to more sophisticated versions
    incorporating AI into the computer opponent.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的重点是Python语言编写的相对简单的游戏程序。我展示了两个游戏——剪刀石头布和Nim——的几个版本，这些版本从相对简单的版本发展到更复杂的版本，这些复杂版本将AI集成到了计算机对手中。
- en: One of goals of this chapter was to show how fairly straightforward AI concepts
    can be implemented into classic game play where a human player opposes a computer
    program.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的一个目标是要展示如何将相对简单的AI概念应用到经典游戏中，在这些游戏中，人类玩家与计算机程序进行对抗。
- en: Another incidental goal was to demonstrate some hardware and software technology
    that included Python interrupts and to show how to use an LCD display with the
    Raspberry Pi.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个附带目标是展示一些硬件和软件技术，包括Python中断，并展示如何使用树莓派上的LCD显示屏。
