  zh: 表[4-5](#Tab5)是详细说明所有板子互连的引脚列表。请注意，LCD引脚编号从左边的1开始，到右边的16结束，如Fritzing图所示。可变电阻是“颠倒”的，这使引脚位于顶部。左侧引脚连接到地，中间引脚连接到LCD引脚3，右侧引脚连接到5V。
