- en: 4. Games
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 游戏
- en: 'This chapter is all about games. But the games I discuss are not the multi-million-dollar
    video blockbusters that are currently saturating the marketplace. Instead, they
    are the much simpler games that have been around for a very long time; some for
    thousands of years. But even in these simple games, AI has had an impact. The
    games discussed in this chapter traditionally involve two human opponents, but
    the modern varieties involve one human playing against a computer. That’s where
    the AI comes in: to provide some randomness and competition to the human player
    such that playing the game does not quickly become boring and trivial.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章全部关于游戏。但我所讨论的游戏并不是目前市场上充斥着的价值数百万美元的视频游戏大作。相反，它们是那些存在了很长时间的简单游戏；有些已经存在了数千年。即使在这些简单游戏中，人工智能也产生了影响。本章讨论的游戏传统上涉及两个人类对手，但现代版本涉及一个人类与计算机对战。这就是人工智能的用武之地：为人类玩家提供一些随机性和竞争性，使得游戏不会很快变得无聊和单调。
- en: Each demonstration presents several iterations for which you will need some
    additional parts, as detailed in the Table [4-1](#Tab1).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 每个演示都需要一些额外的零件，具体细节见表 [4-1](#Tab1)。
