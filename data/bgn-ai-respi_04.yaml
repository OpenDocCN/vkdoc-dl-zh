- en: 'The first game to be demonstrated is that old-time favorite we all have played:
    rock-paper-scissors.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要演示的游戏是我们都玩过的那个老牌游戏：掷骰子。
- en: 'Demo 4-1: Rock-Paper-Scissors'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示 4-1：掷骰子
- en: 'Here are the rules for the human-to-human rock-paper-scissors game , in case
    you have not played it for a while. Each opponent clenches his or her fist, counts
    to three, and then displays one of the following hand signals:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是关于人机掷骰子游戏的规则，以防你有一段时间没有玩了。每个对手紧握拳头，数到三，然后展示以下手势之一：
- en: 'Flat hand: paper'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平手：纸张
- en: 'Fist: rock'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拳头：石头
- en: 'Two fingers in a V: scissors'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两指成 V 形：剪刀
- en: 'Winning is determined as follows:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 获胜的规则如下：
- en: The same signal from each opponent is a tie.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个对手的相同信号表示平局。
- en: Rock dulls a scissor, so the rock sign wins.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 石头击败剪刀，所以石头标志获胜。
- en: Paper covers a rock, so the paper sign wins.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 纸覆盖石头，所以纸标志获胜。
- en: Scissors cut paper, so the scissor sign wins.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 剪刀剪破纸，所以剪刀标志获胜。
- en: There are only nine possible combinations, including three ways to tie. Each
    opponent has three ways to win, as described, which leads to the nine possible
    combinations.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 只有九种可能的组合，包括三种平局的方式。每个对手有三种获胜的方式，如上所述，这导致了九种可能的组合。
- en: The following Python program named prs.py is a straightforward implementation
    of the rock-paper-scissors game. This program does not use any Prolog statements
    demonstrated in the previous chapter, but instead relies on standard Python `if
    ... else` statements . These statements have the same effect as the if <condition>
    then <conclusion> discussed in the section on inference.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 以下名为 prs.py 的 Python 程序是掷骰子游戏的直接实现。这个程序没有使用前一章中展示的任何 Prolog 语句，而是依赖于标准的 Python
    `if ... else` 语句。这些语句的效果与推理部分讨论的 if <条件> then <结论> 相同。
- en: prs.py listing
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: prs.py 列表
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Figure [4-1](#Fig1) shows several rounds that I conducted with the Raspberry
    Pi .
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-1](#Fig1) 展示了我用树莓派进行的几轮游戏。
- en: '![A436848_1_En_4_Fig1_HTML.jpg](A436848_1_En_4_Fig1_HTML.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_4_Fig1_HTML.jpg](A436848_1_En_4_Fig1_HTML.jpg)'
- en: Figure 4-1.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-1。
- en: Rock-paper-scissors game play
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 掷骰子游戏玩法
- en: I do want to comment on one aspect of this program, which is especially directed
    to those readers who are not too comfortable with writing Python programs. The
    `elif` command is a contraction of the words `else if` and is used as part of
    a nested `if ... else` structure, which implements the game logic. The game logic
    can also be portrayed in a tree diagram, as shown in Figure [4-2](#Fig2).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我确实想对程序的一个方面发表评论，这个方面特别针对那些不太熟悉编写Python程序的那些读者。`elif`命令是`else if`单词的缩写，它是嵌套的`if
    ... else`结构的一部分，用于实现游戏逻辑。游戏逻辑也可以用树状图表示，如图[4-2](#Fig2)所示。
- en: '![A436848_1_En_4_Fig2_HTML.jpg](A436848_1_En_4_Fig2_HTML.jpg)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_4_Fig2_HTML.jpg](A436848_1_En_4_Fig2_HTML.jpg)'
- en: Figure 4-2.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-2。
- en: Tree diagram for rock-paper-scissors game
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 掷骰子游戏的树状图
- en: I think you can appreciate the symmetry of the logic as depicted in the figure.
    Note that there are six leafs or end points, which show where the player either
    wins or loses. This matches exactly with the six win/loss combinations I mentioned
    earlier.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我想你可以欣赏图中所描述的逻辑的对称性。注意，有六个叶子或终点，显示了玩家要么赢要么输的地方。这与我之前提到的六个胜负组合完全一致。
- en: 'Believe or not, there is some underlying strategy, which can be invoked when
    playing this game against a human opponent. To understand the competitive strategy,
    I must first assign some values to the game outcomes. Let’s assume the following
    reasonable point assignment for each outcome:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 信不信由你，这个游戏中存在某种潜在的战略，当与人类对手玩游戏时可以调用。为了理解竞争战略，我必须首先为游戏结果分配一些值。让我们假设以下合理的点分配方案：
- en: Win = 2 points
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 胜利 = 2分
- en: Tie = 1 point
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平局 = 1分
- en: Loss = 0 points
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 失败 = 0分
- en: Table [4-2](#Tab2) shows, on average, what the expected player values should
    be for a long run of consecutive play.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 表[4-2](#Tab2)显示了，在连续长时间的游戏中，平均预期玩家值应该是多少。
- en: Table 4-2.
