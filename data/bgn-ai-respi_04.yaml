- en: Clearly, there is a best move on the player’s part based on the opponent’s previous
    move, which is based on normal human behaviors. However, it is not too hard to
    program in a check routine to avoid providing the human player a competitive advantage.
    The code would be something like the following; but note that I just used the
    index integer values and not the equivalent string values .
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，根据对手的上一轮动作，玩家在动作上有一个最佳选择，这是基于正常的人类行为。然而，编写一个检查例程以避免给人类玩家提供竞争优势并不太难。代码可能如下所示；但请注意，我只是使用了索引整数值，而没有使用等效的字符串值。
- en: '[PRE1]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`lastMove` and `won` are new integer variables representing the computer’s
    previous selection and whether it won, respectively. I did not incorporate this
    code into the current program because I just wanted to demonstrate the classic
    game design.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '`lastMove` 和 `won` 是两个新的整数变量，分别代表计算机的上一轮选择和是否获胜。我没有将此代码集成到当前程序中，因为我只想演示经典的游戏设计。'
- en: My next iteration of the rock-paper-scissors game eliminates keyboard entry
    and the screen display, and replaces them with push buttons and LEDs.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我对剪刀石头布游戏的下一个迭代版本消除了键盘输入和屏幕显示，并用按钮开关和 LED 取代它们。
- en: Rock-Paper-Scissors Game with Switches and LEDs
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用开关和 LED 的剪刀石头布游戏
- en: 'I thought it would both be fun and interesting to change the game play on the
    Raspberry Pi to use push button switches to select the sign and have LEDs indicate
    a win, lose, or tie for the game. In this project, I also introduce how the Raspberry
    Pi handles interrupts using the Python language. There is one caveat to this program.
    It must be started using the following command-line entry:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为将Raspberry Pi上的游戏玩法改为使用按钮开关选择标志，并用 LED 表示游戏胜利、失败或平局，既有趣又引人入胜。在这个项目中，我还介绍了
    Raspberry Pi 如何使用 Python 语言处理中断。这个程序有一个注意事项。它必须使用以下命令行条目启动：
- en: '[PRE2]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The Raspberry Pi system now needs to be set up. The Fritzing diagram is shown
    in Figure [4-3](#Fig3).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在需要设置 Raspberry Pi 系统。Fritzing 图表如图 [4-3](#Fig3) 所示。
- en: '![A436848_1_En_4_Fig3_HTML.jpg](A436848_1_En_4_Fig3_HTML.jpg)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_4_Fig3_HTML.jpg](A436848_1_En_4_Fig3_HTML.jpg)'
- en: Figure 4-3.
