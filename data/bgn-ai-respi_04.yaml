- en: The averaged player score should not surprise you, as over the long run (assuming
    random choices by each opponent), the expected scores or values should be equally
    divided over all the possible outcomes. But now, let’s add a twist to the normal
    approach and take advantage of a human trait. This trait or behavior involves
    random number selection. If you asked someone to select three random numbers from
    1 to 10, odds would favor that they might answer 7, 4, and 8, or some similar
    variation. They could easily answer 5, 5, and 5, which would have satisfied the
    request, but using the word random obviously biases behavior. Let’s assume now
    that your opponent selected rock in the last round. It is more likely than not
    that he will not select rock again for the next round. The averaged expected values
    table can now be modified, as shown in Table [4-3](#Tab3).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 平均玩家得分不应该让你感到惊讶，因为从长远来看（假设每个对手都做出随机选择），预期的得分或值应该平均分配到所有可能的结果中。但现在，让我们给正常方法增加一个转折，并利用人类的一个特性。这种特性或行为涉及随机数字的选择。如果你要求某人从1到10中选择三个随机数字，他们可能会回答7、4和8，或者类似的变体。他们可能会轻松地回答5、5和5，这会满足要求，但使用“随机”这个词显然会偏袒行为。现在假设你的对手在上一个回合选择了石头。他不太可能在下一个回合再次选择石头。现在可以修改平均预期值表，如表[4-3](#Tab3)所示。
- en: Table 4-3.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 表4-3。
- en: Modified Averaged Expected Values
  id: totrans-55
