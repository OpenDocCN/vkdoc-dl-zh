- en: 6. Competitive Networks for AI Agents
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 为AI代理的竞争网络
- en: 'In the last chapter, we studied the different parts of deep reinforcement learning
    (RL) and also studied the interactivity of the Python API to build custom models.
    Since there are various paradigms inside RL, we will be exploring adversarial
    and cooperative learning in addition to curriculum learning. Since we have an
    idea of the actor critic class of algorithms, including proximal policy operation
    (PPO), we will also look into an off-policy counterpart that we mentioned in the
    last chapter: deep deterministic policy gradient (DDPG). The important aspects
    in this chapter include understanding the significant improvement in training
    when curriculum learning is applied along with a policy gradient variant. This
    allows the agent to learn in incremental steps when placed in a new dynamic environment.
    In this section, we will be exploring more samples of machine learning (ML) agents
    to get an overview of adversarial self-play, where an agent has to compete with
    an adversary to gain rewards. After covering the fundamental topics, we will also
    be looking at certain simulations using ML Agents, including the Kart game (which
    we mentioned in the previous chapter). Let us begin with curriculum learning,
    and then we will explore competitive networks.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们研究了深度强化学习（RL）的不同部分，并学习了Python API的交互性以构建自定义模型。由于RL内部存在各种范式，我们将探索对抗学习和合作学习，以及课程学习。鉴于我们已经了解了actor
    critic类算法，包括近端策略操作（PPO），我们还将探讨上一章中提到的离策略对应物：深度确定性策略梯度（DDPG）。本章的重要方面包括理解在应用课程学习以及策略梯度变体时训练的显著改进。这允许代理在置于新的动态环境中时以增量步骤进行学习。在本节中，我们将探索更多机器学习（ML）代理的样本，以获得对抗自我游戏的概述，其中代理必须与对手竞争以获得奖励。在涵盖基本主题之后，我们还将查看使用ML代理的某些模拟，包括我们在上一章中提到的卡丁车游戏。让我们从课程学习开始，然后我们将探索竞争网络。
- en: Curriculum Learning
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 课程学习
- en: 'Curriculum learning is an approach that involves increasing the complexity
    of the learning environment gradually. In practical cases, the agent gets scalar
    rewards after achieving its goal, and in complex environments it may be difficult
    for the agent to accomplish that task. This method provides incremental rewards
    at each step to stabilize the learning of the agent. This can be thought of as
    an agent that is getting trained with an increasing level of difficulty at each
    step. The two major policies that are considered in curriculum learning include:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 课程学习是一种涉及逐步增加学习环境复杂性的方法。在实际情况下，代理在实现其目标后获得标量奖励，在复杂环境中，代理可能难以完成该任务。这种方法在每一步提供增量奖励以稳定代理的学习。这可以被视为代理在每一步以递增的难度级别进行训练。在课程学习中考虑的两个主要策略包括：
- en: Designing a metric to quantify the difficulty of a task for sorting tasks accordingly
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计一个度量标准来量化任务的难度，以便相应地对排序任务进行排序
- en: Providing a sequence of tasks with increasing levels of difficulty to the agent
    during training and increased stabilization
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练期间向代理提供一系列难度递增的任务，并增加稳定性
- en: 'There are several variants of curriculum learning that are dependent on different
    policies. Some of the variants of include:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 存在几种依赖于不同策略的课程学习变体。其中一些变体包括：
- en: '**Task-specific curriculum learning** **:** This involves gradually increasing
    the complexity of the tasks to be performed by the agent. Some of the generalizations
    arising out of this form of learning include:'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特定任务的课程学习**：这涉及逐步增加代理要执行的任务的复杂性。由此形式的学习产生的某些泛化包括：'
- en: cleaner examples that lead to better generalization
  id: totrans-8
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更简洁的示例，有助于更好的泛化
- en: introducing more difficult examples gradually to speed up training
  id: totrans-9
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逐步引入更困难的示例以加快训练速度
- en: If we are using an incremental increase of level complexity as our main metric,
    there is a requirement to quantify the difficulty (complexity) of the level. This
    can be resolved by using a minimal loss deep network with respect to another network
    while the former is getting trained. This allows the agent to learn sequentially
    using an improving network as the complexity of the level increases. In this section,
    we will be exploring this category of curriculum learning with PPO policy using
    ML Agents. Task-specific curriculum learning uses procedural content generation,
    which is used to randomize a particular level or environment in a game. We can
    get an idea of this when we study about PCG in the Obstacle Tower Challenge in
    the next chapter, as we will understand how the levels use curriculum learning
    to increase the complexity of the environment . We can also modify some features
    from the previous lessons on different deep RL algorithms to make it task-specific
    or reward-specific curriculum learning. Since we were using the OpenAI Gym environments
    such as CartPole and MountainCar for our implementations, we are unable to modify
    the inherent environments. However, we can increase or decrease the rewards after
    each step of training. This has an indirect effect of modifying the gradient convergence
    of the deep networks. In case of decreasing the rewards successively at each step
    of training, we apply the agent to a harsh condition where the rewards effectively
    decrease; as a result, the gradient ascent step in policy gradient algorithms
    such as A2C will decrease. The opposite will be the case when the rewards are
    increased at each step, which signifies an incremental curriculum learning approach.
    In the PPO-A2C Curriculum Reward Specific.ipynb Notebook, we can see the contrast
    in the rewards for each iteration of training for the two cases; in the first
    case, we have the original implementation of the algorithm, whereas in the second
    case, we have an incremental reward strategy where the reward gets doubled after
    each successive iteration. The change is in the “agent.run” method, where in place
    of directly assigning the rewards to the next step, we multiply the rewards by
    two and then pass it on.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将等级复杂度的增量增加作为主要指标，就需要量化等级的难度（复杂度）。这可以通过在训练过程中使用与另一个网络的最小损失深度网络来解决。这允许代理随着等级复杂度的增加而按顺序使用改进的网络进行学习。在本节中，我们将使用
    PPO 政策通过 ML Agents 探索这种课程学习类别。特定任务的课程学习使用程序内容生成，用于随机化游戏中的特定等级或环境。我们可以在下一章学习关于障碍塔挑战中的
    PCG 时了解这一点，因为我们将了解等级如何使用课程学习来增加环境的复杂度。我们还可以从之前关于不同深度强化学习算法的课中修改一些特征，使其成为特定任务或奖励特定的课程学习。由于我们使用
    OpenAI Gym 环境如 CartPole 和 MountainCar 进行实现，我们无法修改固有的环境。然而，我们可以在每次训练步骤后增加或减少奖励。这间接地影响了深度网络的梯度收敛。在训练的每一步连续减少奖励的情况下，我们将代理置于奖励实际上减少的严酷条件下；因此，在
    A2C 策略梯度算法中的梯度上升步骤将减少。当每一步增加奖励时，情况相反，这标志着增量课程学习方法的实现。在 PPO-A2C Curriculum Reward
    Specific.ipynb 笔记本中，我们可以看到两种情况下每个训练迭代的奖励对比；在第一种情况下，我们有算法的原始实现，而在第二种情况下，我们有一个增量奖励策略，其中奖励在每次连续迭代后翻倍。变化发生在“agent.run”方法中，我们不是直接将奖励分配给下一步，而是将奖励乘以二，然后传递。
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Alternatively the “discount_reward” method can also be changed to define the
    rewards for the next steps by providing an incremental discount. The outcome can
    be visualized with the help of Tensorboard training as well. The contrast in the
    rewards can be observed as shown in Figure [6-1](#Fig1).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，“discount_reward”方法也可以更改，通过提供增量折扣来定义下一步的奖励。结果可以用 Tensorboard 训练来可视化。如图 [6-1](#Fig1)
    所示，可以看到奖励的对比。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig1_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig1_HTML.jpg)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig1_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig1_HTML.jpg)'
- en: Figure 6-1
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-1
- en: Rewards with original PPO-A2C on CartPole environment
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在 CartPole 环境上使用原始 PPO-A2C 的奖励
- en: The second case shows the increase in rewards, which also implies an increase
    in the gradient ascent of the policy functions, as shown in Figure [6-2](#Fig2).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种情况显示了奖励的增加，这也意味着策略函数的梯度上升增加，如图 [6-2](#Fig2) 所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig2_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig2_HTML.jpg)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig2_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig2_HTML.jpg)'
- en: Figure 6-2
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-2
- en: Rewards with reward-based curriculum on PPO-A2C on CartPole
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在CartPole上的PPO-A2C基于奖励的课程
- en: Now for a better effect the hyperparameters inside the loss function (“trpo_ppo_penalty_loss”)
    can also be changed. A gradual increment or decrement in the hyperparameters can
    affect the learning of the agent, which is analogous to increasing or decreasing
    the difficulty of the tasks. By changing the hyperparameter “prob” in the “trpo_ppo_penalty_loss,”
    we can visualize the change in the epoch loss through Tensorboard, as shown in
    Figure [6-3](#Fig3).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现在为了获得更好的效果，损失函数内部的超参数（“trpo_ppo_penalty_loss”）也可以进行更改。超参数的逐渐增加或减少会影响智能体的学习，这类似于增加或减少任务的难度。通过在“trpo_ppo_penalty_loss”中更改“prob”超参数，我们可以通过Tensorboard可视化地看到损失函数随迭代周期的变化，如图[6-3](#Fig3)所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig3_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig3_HTML.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig3_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig3_HTML.jpg)'
- en: Figure 6-3
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-3
- en: Changing the epoch loss by gradually changing the hyperparameters
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 通过逐渐改变超参数来改变迭代周期的损失
- en: '**Teacher student curriculum learning:** In this context, the agent learns
    through an N-task curriculum and an adaptive policy. The concept of this form
    of curriculum learning involves two strategies:'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**师生课程学习法**：在这个背景下，智能体通过一个N任务课程和自适应策略进行学习。这种课程学习形式的概念涉及两种策略：'
- en: The loss function changes before and after every iteration of learning, and
    this helps the agent to optimize the rewards for each level. In this case, the
    change in loss functions triggers a change in the reward signals, which also changes
    the gradient ascent for a particular policy.
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 损失函数在学习的每次迭代前后都会发生变化，这有助于智能体优化每个级别的奖励。在这种情况下，损失函数的变化触发了奖励信号的变化，这也改变了特定策略的梯度上升。
- en: In case of policy gradient algorithms such as PPO, the KL divergence between
    two networks—the teacher and the student networks—helps the agent to learn in
    the direction of increasing difficulty. The model complexity increases when it
    modestly generalizes the training samples and stabilizes the networks to allow
    the agent to learn.
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在像PPO这样的策略梯度算法中，两个网络——教师网络和学生网络——之间的KL散度有助于智能体朝着增加难度的方向学习。当模型适度泛化训练样本并稳定网络以允许智能体学习时，模型复杂性会增加。
- en: In this form of curriculum learning, the teacher network provides a policy for
    the student network to learn. The student can then learn complex tasks by following
    the policy of the teacher. Generally this leads to a faster learning, but owing
    to consistent changes in the loss function, the student may forget the previous
    training. To simplify, both the teacher and student are deep learning networks
    where the task of the teacher network is to propose a set of complex activities
    that the student network can perform. There are discrete and continuous space
    variants of this form of curriculum learning. The teacher network can also use
    Epsilon-Greedy and Thompson sampling and other exploration-exploitation algorithms
    to increase the difficulty of the set of tasks. In this case, we will study about
    teacher student curriculum learning with the help of “PPO-A2C Teacher Student
    Curriculum Learning.ipynb” Notebook. We will use the original A2C algorithm, which
    will be our student network, and we will have an alternate A2C algorithm with
    changing loss functions as the teacher network. Since the student network is the
    same as in the previous chapter, we will focus on the teacher network. For this,
    we have separate arrays for retaining the rewards, labels, states, and probabilities
    for the teacher network, as mentioned here.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种课程学习形式中，教师网络为学生网络提供学习策略。学生随后可以通过遵循教师的策略来学习复杂任务。通常这会导致学习速度更快，但由于损失函数的持续变化，学生可能会忘记之前的训练。为了简化，教师和学生都是深度学习网络，其中教师网络的任务是提出一组学生网络可以执行的活动。这种课程学习形式有离散和连续空间变体。教师网络还可以使用Epsilon-Greedy和Thompson抽样以及其他探索-利用算法来增加任务集的难度。在这种情况下，我们将通过“PPO-A2C
    Teacher Student Curriculum Learning.ipynb”笔记本来研究师生课程学习法。我们将使用原始的A2C算法作为我们的学生网络，我们将有一个具有变化损失函数的替代A2C算法作为教师网络。由于学生网络与上一章相同，我们将重点关注教师网络。为此，我们为教师网络分别有保留奖励、标签、状态和概率的数组，如此处所述。
- en: '[PRE1]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'In the next section we will look into the “build_teacher_actor_model” method,
    which is similar to the “build_actor_model” (student network). The difference
    in this case is that we pass a Boolean value in the arguments for alternating
    between two different loss functions: the clipped PPO loss and the KL divergence
    PPO loss. We also changed some of the hyperparameter values in this method—namely,
    the epsilon, prob, and clip_loss values. The rest of the code segment is similar
    to the previously written PPO algorithm. The requirement for changing the loss
    function is to optimize the reward signals , and this is mentioned as follows:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨“build_teacher_actor_model”方法，该方法与“build_actor_model”（学生网络）类似。在这个案例中的区别在于，我们通过参数传递一个布尔值，在两种不同的损失函数之间交替：裁剪的
    PPO 损失和 KL 散度 PPO 损失。我们还在这个方法中更改了一些超参数值——即 epsilon、prob 和 clip_loss 值。代码段的其他部分与之前编写的
    PPO 算法类似。改变损失函数的要求是优化奖励信号，如下所述：
- en: '[PRE2]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The “teacher_memory” method is used for one hot-encoding the actions as well
    as storing the rewards, labels, and probabilities, similarly to the “memory” method
    in A2C. The “teacher_act” method is for selecting the actions with the highest
    probabilities, similarly to the “act” method in original A2C. We have similar
    methods as the A2C code (student network) in the teacher network, as we see the
    methods are prefixed with “teacher_<method name>.” In the main method, after we
    initialize the states, actions, and rewards for the student and the teacher networks,
    we train them separately. In case the rewards from the teacher network exceed
    the student network, it assigns the rewards and trains it in the new policy. The
    alternating policy at each stage of training also optimizes the rewards signal.
    In the normal A2C algorithm without teacher network supervision, the Tensorboard
    plot shows the epoch loss (error reduction in the value estimates denoted by the
    red segment) and the rewards (blue segment), as shown in Figure [6-4](#Fig4).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: “teacher_memory”方法用于对动作进行 one-hot 编码以及存储奖励、标签和概率，类似于 A2C 中的“memory”方法。“teacher_act”方法用于选择概率最高的动作，类似于原始
    A2C 中的“act”方法。在教师网络中，我们有与 A2C 代码（学生网络）类似的方法，我们看到这些方法都是以“teacher_<方法名>”为前缀。在主方法中，初始化学生和教师网络的状态、动作和奖励后，我们分别对它们进行训练。如果教师网络的奖励超过学生网络，它将分配奖励并在新的策略中对其进行训练。在每个训练阶段的交替策略也优化了奖励信号。在没有教师网络监督的正常
    A2C 算法中，Tensorboard 图表显示了时代损失（用红色部分表示的价值估计误差减少）和奖励（蓝色部分），如图 [6-4](#Fig4) 所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig4_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig4_HTML.jpg)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig4_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig4_HTML.jpg)'
- en: Figure 6-4
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-4
- en: Original PPO-A2C without teacher student curriculum learning
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 无教师-学生课程学习的原始 PPO-A2C
- en: With the teacher network in place, we can see the rewards getting spiked due
    to change in the gradient ascent as well as in the policy. The rewards for this
    case can be represented by the orange segment, as shown in Figure [6-5](#Fig5).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在教师网络就位的情况下，我们可以看到由于梯度上升策略以及策略的变化，奖励值出现了峰值。这个案例的奖励可以用图 [6-5](#Fig5) 中显示的橙色部分来表示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig5_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig5_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig5_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig5_HTML.jpg)'
- en: Figure 6-5
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-5
- en: PPO-A2C with teacher student curriculum learning
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 带有教师-学生课程学习的 PPO-A2C
- en: '**Curriculum learning** **through self-play** **:** In this case, agents learn
    through self-play, which uses a similar teacher student type to curriculum learning,
    with certain changes. The difference from the teacher student framework is that
    here an adversarial approach is used for training the agent. We have two different
    networks. The task of the first network is to retrieve rewards from the environment
    by attaining a state S[1] from S[0] and set the initial benchmarks for attaining
    that reward. The second network has to reach the state S[1] in a shorter time
    span and retrieve the same rewards. Hence the two networks are in an adversarial
    positioning with respect to each other; the first network has to cover the maximum
    rewards and set a proper benchmark, while the second network has to attain that
    in a smaller time span as compared to the first one. In this case, we have two
    different methods that take place for the second network.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过自我对弈进行课程学习**：在这种情况下，代理通过自我对弈来学习，这使用了一种类似于课程学习的教师-学生类型，但有一些变化。与教师-学生框架的不同之处在于，这里使用了一种对抗性方法来训练代理。我们有两个不同的网络。第一个网络的任务是从环境中检索奖励，通过从S[0]获得状态S[1]并设置获得该奖励的初始基准。第二个网络必须在更短的时间内达到状态S[1]并检索相同的奖励。因此，这两个网络在相互之间处于对抗位置；第一个网络必须覆盖最大奖励并设置适当的基准，而第二个网络必须在比第一个网络更短的时间内达到这一点。在这种情况下，我们对第二个网络有两种不同的方法。'
- en: In self-play mode, the first network alters state from S[0] to S[1] and then
    the second network has the task to reset the environment back to initial state
    S[0]
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在自我对弈模式下，第一个网络将状态从S[0]更改为S[1]，然后第二个网络的任务是将环境重置回初始状态S[0]。
- en: In target task mode, the second network receives a reward signal if it reaches
    the particular new state in a shorter time span.
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在目标任务模式下，如果第二个网络在更短的时间内达到特定的新的状态，它将收到奖励信号。
- en: Let us represent the first network as the teacher in this case and the second
    network as the student. The task of the teacher network is to increase the efficiency
    of the student network. For this the teacher tries to choose a task that will
    take a considerable time for the student to complete. The student network receives
    rewards when it completes the task faster than the teacher, and as the difficulty
    of the task increases , the teacher should reduce the difference between the timestamps
    of completion of the tasks to enable the student to learn. In self-play this is
    attained by training a network with the same set of parameters as the current
    network so as to increase the efficiency of training of the first network. Now
    let us understand this concept with a few modifications in our PPO algorithm.
    We will be using the teacher student curriculum learning code segment as our base
    and will only modify the “main” method. Open the “PPO-A2C Self Play Curriculum
    Learning.ipynb” Notebook. In the “main” method, we have a list of rewards that
    will be provided for three time-steps denoted by the “reward_level” array.
  id: totrans-42
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将第一个网络代表为教师，第二个网络代表为学生。教师网络的任务是提高学生网络的效率。为此，教师试图选择一个需要学生花费相当长时间才能完成的任务。当学生网络比教师更快地完成任务时，它会收到奖励，随着任务难度的增加，教师应该减少任务完成时间戳之间的差异，以便学生能够学习。在自我对弈中，这是通过训练一个与当前网络具有相同参数集的网络来实现的，以提高第一个网络的训练效率。现在让我们通过在我们PPO算法中的一些修改来理解这个概念。我们将使用教师-学生课程学习代码段作为我们的基础，并且只修改“main”方法。打开“PPO-A2C
    Self Play Curriculum Learning.ipynb”笔记本。在“main”方法中，我们有一个奖励列表，这些奖励将由“reward_level”数组表示的三个时间步提供。
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'We then run through this array and grant the teacher network its rewards on
    completing a new task. The student network then has a task to complete the activity
    in a shorter timespan, which is controlled by the “min_time” variable. Once the
    student completes the tasks the teacher rewards, the student network for that
    particular level and the process continues. We can see a sharp contrast in the
    values of the student and the teacher rewards. If the difference is too high,
    this implies the student network is unable to get sufficient rewards or perform
    faster than the teacher network. Although the cumulative rewards of this system
    increase, there is a sufficient margin between the two networks. This can be addressed
    by changing the hyperparameters as well as defining alternate loss functions that
    would penalize the teacher network in case the difference between the rewards
    goes above a certain threshold . This is implemented by the following lines:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们遍历这个数组，并在完成新任务后给予教师网络其奖励。学生网络随后有一个任务，在更短的时间内完成活动，这由“min_time”变量控制。一旦学生完成了教师奖励的任务，该特定级别的学生网络就会继续。我们可以看到学生和教师奖励之间的值有明显的对比。如果差异太大，这表明学生网络无法获得足够的奖励或比教师网络更快地执行。尽管这个系统的累积奖励在增加，但两个网络之间有足够的差距。这可以通过更改超参数以及定义替代损失函数来解决，如果奖励之间的差异超过某个阈值，则会对教师网络进行惩罚。这通过以下几行代码实现：
- en: '[PRE4]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The Tensorboard visualization of the epoch loss for this form of curriculum
    learning is provided in Figure [6-6](#Fig6).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [6-6](#Fig6) 提供了这种课程学习形式的 Tensorboard 阶段损失可视化。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig6_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig6_HTML.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig6_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig6_HTML.jpg)'
- en: Figure 6-6
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-6
- en: PPO-A2C with self-play curriculum learning
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: PPO-A2C 与自玩课程学习
- en: Now if we compare this (orange segment) with the epoch loss for teacher student
    curriculum learning (blue segment), we will see that the latter has a lower loss
    gradient as compared to self-play, whereas the rewards are more for self-play.
    This is due to the adversarial nature of the teacher and student networks in self-play,
    which leads to more rewards in this case. This also implies a faster convergence
    than ordinary teacher student curriculum learning. In the initial stages, the
    self-play has a more deep loss gradient owing to the student network not being
    able to compete with the teacher, but that decreases as the levels increase. This
    is demonstrated by the Tensorboard plot, as shown in Figure [6-7](#Fig7).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在如果我们将这个（橙色部分）与教师学生课程学习的阶段损失（蓝色部分）进行比较，我们会看到与自玩相比，后者的损失梯度更低，而奖励更高。这是由于自玩中教师和学生网络的对抗性质，这导致了这种情况下的更多奖励。这也意味着比普通的教师学生课程学习有更快的收敛速度。在初始阶段，由于学生网络无法与教师竞争，自玩有更深的损失梯度，但随着级别的增加，这种梯度会减少。这由
    Tensorboard 图像展示，如图 [6-7](#Fig7) 所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig7_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig7_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig7_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig7_HTML.jpg)'
- en: Figure 6-7
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-7
- en: Epoch loss comparison between teacher student and self-play (CL)
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 教师学生与自玩（CL）之间的阶段损失比较
- en: Adversarial self-play is the major form of learning that we will see in detail
    in this chapter when we will analyze the soccer environment in ML Agents. Along
    with these major forms of curriculum learning, there are other variants as well.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对抗自玩是我们将在本章详细分析的，当我们在 ML Agents 中分析足球环境时，将看到的主要学习形式。除了这些主要的学习形式外，还有其他变体。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig8_HTML.png](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig8_HTML.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig8_HTML.png](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig8_HTML.png)'
- en: Figure 6-8
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-8
- en: Goal GAN for automatic goal generation curriculum learning
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 目标 GAN 用于自动目标生成课程学习
- en: '**Automatic Goal Generation** **:** This form of curriculum learning relies
    on generated goals and chooses a feasible goal that the agent can solve with the
    current policy. This is an interesting aspect of curriculum learning, as the goals
    are generated randomly for the agent to achieve. This is achieved with the help
    of adversarial networks or GAN, which we studied in the last chapter in the context
    of the model-free GAIL algorithm. Since we are aware that a GAN has a generator
    and a discriminator that are in competition against each other, we can use this
    concept to train the agent. The objective of the generator is to produce intermediate
    goals that the agent has to achieve. These are referred to as “GOID,” which implies
    goals of intermediate difficulty. The generator network then has to be trained
    to produce such intermediate goals and has associated minimum and maximum values,
    denoted by R[min] and R[max], respectively, which controls the maximum and minimum
    probability of attaining the goal by the agent during T time-steps. The role of
    the discriminator is to determine whether the goal can be achieved by the agent
    during the time slot provided and also to verify whether the goal is from the
    GOID set. The policy gradient function can be used in this case as :'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动目标生成** **：** 这种课程学习方法依赖于生成的目标，并选择一个代理能够用当前策略解决的问题可行的目标。这是课程学习的一个有趣方面，因为目标是随机生成的，以便代理实现。这是通过对抗网络或
    GAN 实现的，我们在上一章中在无模型 GAIL 算法的背景下研究了它。由于我们知道 GAN 有一个生成器和判别器，它们相互竞争，我们可以使用这个概念来训练代理。生成器的目标是产生代理必须实现的中级目标。这些被称为“GOID”，意味着中级难度的目标。然后，生成器网络必须被训练以产生这样的中级目标，并具有相关的最小和最大值，分别用
    R[min] 和 R[max] 表示，这控制了代理在 T 个时间步内达到目标的最大和最小概率。判别器的作用是确定代理是否能够在提供的时间段内实现目标，并验证目标是否来自
    GOID 集合。在这种情况下，可以使用策略梯度函数，如下所示：'
- en: π* (a[t]|s[t], g)=arg max[π] E[R^g(π)],
  id: totrans-59
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: π* (a[t]|s[t], g)=arg max[π] E[R^g(π)],
- en: 'where R^g(π) is the success probability of reaching the goal g and a and s
    are actions and states, respectively. This principle of learning using GANs is
    called goal GAN. The generator and the discriminator functions for goal GAN curriculum
    learning can be defined as follows:'
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中 R^g(π) 是达到目标 g 的成功概率，a 和 s 分别是动作和状态。使用 GAN 进行学习的这种原理被称为目标 GAN。目标 GAN 课程学习的生成器和判别器函数可以定义为以下：
- en: L[GoalGAN](G) =(½) E[z][ (D(G(Z))- c)²]
  id: totrans-61
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: L[GoalGAN](G) =(½) E[z][ (D(G(Z))- c)²]
- en: L[GoalGAN](D) = (½) E[g][ (D(g)- b)² + (1-y[g]) (D(g)- a)²] + (½) E[z][ (D(G(Z))-
    a)²],
  id: totrans-62
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: L[GoalGAN](D) = (½) E[g][ (D(g)- b)² + (1-y[g]) (D(g)- a)²] + (½) E[z][ (D(G(Z))-
    a)²],
- en: 'where a is the label for fake data, b is the label for real data, and c is
    the value that generator G wants discriminator D to believe for fake data. y[g]
    is a Boolean variable that signifies whether the goal is real (1) or not (0).
    There are three main components in this form of curriculum learning, which include
    :'
  id: totrans-63
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中 a 是伪造数据的标签，b 是真实数据的标签，c 是生成器 G 想要判别器 D 相信的伪造数据的值。y[g] 是一个布尔变量，表示目标是否真实（1）或不是（0）。这种形式的学习课程有三个主要组成部分，包括：
- en: 'policy solver: The policy solver gets a goal g and receives a reward signal
    R^g(π) when the goal is attained.'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 策略求解器：策略求解器获得一个目标 g，并在目标达成时接收奖励信号 R^g(π)。
- en: 'discriminator D: This predicts whether the goal is attainable by the agent
    and generally uses a classification model.'
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 判别器 D：这预测代理是否能够实现目标，通常使用分类模型。
- en: 'generator G: The generator is responsible for generating goals g within a feasible
    score limit.'
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成器 G：生成器负责在可行的分数限制内生成目标 g。
- en: This form of curriculum learning that uses GANs as the internal architecture
    is used for systematic training of the agent with increasing difficulty level.
    This is illustrated in Figure [6-8](#Fig8).
  id: totrans-67
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种使用 GAN 作为内部架构的课程学习方法用于以递增难度级别系统地训练代理。这在图 [6-8](#Fig8) 中得到了说明。
- en: We will be using the “AGG.ipynb” to determine the effects of goal GAN in curriculum
    learning with the help of a custom generator and discriminator model. The “build_generator_model”
    method is responsible for creating the generator network, and the “build_discriminator_model”
    is responsible for creating the discriminator network. We will look into the generator
    model, which is almost similar to the critic model with the change in the kernel
    size and kernel initializer.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用“AGG.ipynb”来确定目标GAN在课程学习中的影响，这得益于自定义的生成器和判别器模型。`build_generator_model`方法负责创建生成器网络，而`build_discriminator_model`负责创建判别器网络。我们将研究生成器模型，它与评论家模型几乎相同，只是在内核大小和内核初始化器上有所不同。
- en: '[PRE5]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The discriminator network has an additional “LeakyReLU” with the normal dense
    neural network model architecture . This assists the network to segregate between
    original goals (rewards) and fake goals (rewards). This is denoted by the following
    lines:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 判别器网络在正常的密集神经网络模型架构上有一个额外的“LeakyReLU”。这有助于网络区分原始目标（奖励）和假目标（奖励）。这是以下几行代码所表示的：
- en: '[PRE6]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'The next segment is the “train” method, where we use five samples from the
    original states and labels for the generator network to generate fake samples.
    Then we train the generator with these samples. Similarly we train the entire
    states and labels with the discriminator model. The actor critic model is also
    present, which is the policy solver in our case. This is done by the following
    lines:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分是“训练”方法，其中我们使用原始状态和标签的五样本来让生成器网络生成假样本。然后我们用这些样本来训练生成器。同样，我们用判别器模型来训练整个状态和标签。演员-评论家模型也存在，在这种情况下，它是策略求解器。这是通过以下几行代码实现的：
- en: '[PRE7]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: If we train this GAN on the PPO-A2C policy, then we clearly visualize the rewards
    that are generated by the generator and the discriminator along with the epoch
    loss of the policy solver (agent). This is shown in Figure [6-9](#Fig9).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在PPO-A2C策略上训练这个GAN，那么我们可以清楚地可视化生成器和判别器生成的奖励以及策略求解器（代理）的损失。这如图[6-9](#Fig9)所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig9_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig9_HTML.jpg)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig9_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig9_HTML.jpg)'
- en: Figure 6-9
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-9
- en: Scores and epoch loss of goal GAN curriculum learning
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 目标GAN课程学习的分数和损失
- en: Now we have covered the details of the different aspects of curriculum learning,
    there are some other methods such as skilled-based curriculum learning and curriculum
    learning through distillation.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经涵盖了课程学习不同方面的细节，还有一些其他方法，例如基于技能的课程学习和通过蒸馏的课程学习。
- en: '**Skilled-based curriculum learning** **:** This relies on analyzing different
    tasks simultaneously to determine which tasks provide a better reward signal.
    This is done with the help of expectation maximization or variation EM method
    and helps the agent to learn in an unsupervised manner. This is also related to
    meta RL, where the agent tries to figure a proper policy to get the best rewards.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于技能的课程学习**：这依赖于同时分析不同的任务以确定哪些任务提供更好的奖励信号。这是通过期望最大化或变分EM方法实现的，有助于代理以无监督的方式学习。这也与元强化学习相关，其中代理试图找到合适的策略以获得最佳奖励。'
- en: '**Curriculum learning** **through distillation** **:** This involves using
    transfer learning to generate different skills and to prevent catastrophic forgetting.
    Progressive neural networks and long short-term memory (LSTM)-based memory networks
    play an important role in training the agent to learn with the help of transfer
    learning methods.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过蒸馏的课程学习**：这涉及到使用迁移学习来生成不同的技能，并防止灾难性遗忘。渐进神经网络和基于长短期记忆（LSTM）的记忆网络在训练代理使用迁移学习方法学习时发挥着重要作用。'
- en: Curriculum Learning in ML Agents
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习代理中的课程学习
- en: We will consider curriculum learning in ML agents with the help of the Wall
    Jump Unity Scene in Unity. The target of the blue agent in this case, is to reach
    the green target area by crossing a wall. This wall can be scaled with the help
    of the yellow block, which acts as a platform on which the agent can jump to reach
    the target on the other side of the wall. Based on the height of the wall, the
    agent has to move the yellow block so as to scale the wall. If originally the
    agent was trained in an environment having a big wall, it would have taken a larger
    time for the agent to figure out by using PPO or SAC algorithm. Hence, the concept
    of curriculum learning plays an important role here. The height of the wall is
    initially 0 and then it gradually increases, and this gives the agent an idea
    where the original green target is placed. Thus for successive iterations of training,
    as the height of the wall increases, the agent has to use the yellow platform
    to cross it. In the initial stages there is no wall present, and in this case
    the agent has to jump over the yellow platform to reach the target; as the level
    increases, the height of the wall increases systematically. This increases the
    cumulative reward for each successive level. The comparison between two levels
    of training is shown in Figure [6-10](#Fig10)(a, b).
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将借助 Unity 中的 Wall Jump 场景来考虑机器学习代理的课程学习。在这种情况下，蓝色代理的目标是通过穿越墙壁到达绿色目标区域。这个墙壁可以通过黄色块进行缩放，黄色块作为一个平台，代理可以跳到墙壁另一侧的目标。根据墙壁的高度，代理必须移动黄色块以缩放墙壁。如果代理最初在一个有大墙壁的环境中训练，它将需要更多的时间通过
    PPO 或 SAC 算法来找出这一点。因此，课程学习概念在这里起着重要作用。墙壁的初始高度为 0，然后逐渐增加，这给代理一个原始绿色目标位置的概念。因此，在连续的训练迭代中，随着墙壁高度的增加，代理必须使用黄色平台来穿越它。在初始阶段没有墙壁，在这种情况下，代理必须跳过黄色平台以到达目标；随着级别的提高，墙壁的高度系统地增加。这增加了每个连续级别的累积奖励。两个训练级别的比较如图
    [6-10](#Fig10)(a, b) 所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig10_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig10_HTML.jpg)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig10_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig10_HTML.jpg)'
- en: Figure 6-10
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-10
- en: (a & b). Changing the wall height to simulate curriculum learning
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: (a & b). 将墙壁高度更改为模拟课程学习
- en: 'Let us first understand the Wall Jump environment through the scripts, and
    then we will be training this environment through curriculum learning. For this
    we will look into the WallJumpAgent C# script that controls the agent’s movements.
    Along with this script, there are also Behavior Parameters, Model Overrider, and
    Decision Requester scripts attached to the agent as in our previous cases. The
    blue agent also uses RayPerceptionSensorComponent3D for collecting observations.
    In the first section, there are three different types of neural network brains
    that are used for inference: noWallBrain, smallWallBrain, and bigWallBrain. Each
    of these is separately used depending on the height of the wall for curriculum
    learning. Then there are variables that control the agent, the ground material,
    and the properties of jumping—height, time, start position, and end position.
    The variables also control the spawn area, the bounds of spawn area, colliders,
    target area, and the yellow platform.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先通过脚本了解 Wall Jump 环境，然后我们将通过课程学习来训练这个环境。为此，我们将查看控制代理运动的 WallJumpAgent C#
    脚本。除了这个脚本外，还有行为参数、模型覆盖者和决策请求者脚本附加到代理上，就像我们之前的案例一样。蓝色代理还使用 RayPerceptionSensorComponent3D
    来收集观察结果。在第一部分，有三种不同类型的神经网络大脑用于推理：noWallBrain、smallWallBrain 和 bigWallBrain。根据墙壁的高度，这些分别用于课程学习。然后有控制代理、地面材料、跳跃属性（高度、时间、起始位置和结束位置）的变量。这些变量还控制出生区域、出生区域的边界、碰撞体、目标区域和黄色平台。
- en: '[PRE8]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The “Initialize” method is used for initializing the variables that were declared
    in the previous step. This method is the overridden method that was used in our
    previous samples as well.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: “初始化”方法用于初始化在之前步骤中声明的变量。这个方法是之前示例中使用的重写方法。
- en: '[PRE9]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Then we have the “Jump” method, which is used to trigger jumps with a frequency
    value denoted by the jumpingTime float variable. This also allows the blue agent
    to jump from its current position.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们有“跳跃”方法，该方法用于通过跳转时间浮点变量表示的频率值来触发跳跃。这也允许蓝色代理从当前位置跳跃。
- en: '[PRE10]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The “DoGroundCheck” method is used for evaluating the current position of the
    agent depending on whether it is grounded or not. It does this with the help of
    colliders. The “Physics.OverlapBoxNonAlloc” method is used for storing the colliders
    within a given box. This method is controlled by the Boolean variable smallCheck,
    and depending on this value, it determines whether the agent’s colliders are colliding
    with the platform, wall, and the ground. This provides the agent information related
    to the current environment by checking against different tags for collision.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: “DoGroundCheck”方法用于根据智能体是否接地来评估智能体的当前位置。它通过碰撞器来完成此操作。 “Physics.OverlapBoxNonAlloc”方法用于在给定的盒子内存储碰撞器。此方法由布尔变量smallCheck控制，根据此值，它确定智能体的碰撞器是否与平台、墙壁和地面发生碰撞。通过检查不同的碰撞标签，这为智能体提供了有关当前环境的信息。
- en: '[PRE11]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The “MoveTowards” method is used for moving the agent in the direction of the
    target. This is done with the help of the “Vector3.MoveTowards” method, which
    controls the motion based on the agent’s velocity and position.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: “MoveTowards”方法用于使智能体朝着目标方向移动。这是通过“Vector3.MoveTowards”方法完成的，该方法根据智能体的速度和位置控制运动。
- en: '[PRE12]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Then we have the overridden method “CollectObservations,” similarly to our previous
    projects, which collects observations with the help of ray sensors. The sensors
    check for the distance between the agent and the target, as well as the distance
    from the ground, and use the DoGroundCheck to check for colliders in the environment.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们有重写的方法“CollectObservations”，类似于我们之前的项目，它通过射线传感器收集观察数据。传感器检查智能体和目标之间的距离，以及与地面的距离，并使用“DoGroundCheck”来检查环境中的碰撞器。
- en: '[PRE13]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The “GetRandomSpawnPos” is a method that is used by the agent and the yellow
    platform to spawn randomly anywhere within the bounds of the ground platform.
    This is done with the help of “Random.Range” method.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: “GetRandomSpawnPos”是一个方法，智能体和黄色平台使用它来在地面平台的边界内随机生成位置。这是通过“Random.Range”方法完成的。
- en: '[PRE14]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The “Moveagent” method is used to control the motion of the agent by analyzing
    the vector observation space from the ray sensors. It uses the “DoGroundCheck”
    to validate the current location and colliders, and based on the observation array,
    the agent can move forward, upward, or right. The agent uses the “AddForce” method
    to trigger the jump in a particular direction.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: “Moveagent”方法用于通过分析来自射线传感器的矢量观察空间来控制智能体的运动。它使用“DoGroundCheck”来验证当前位置和碰撞器，并根据观察数组，智能体可以向前、向上或向右移动。智能体使用“AddForce”方法在特定方向上触发跳跃。
- en: '[PRE15]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The “OnActionReceived” method is an overridden method that uses raycasts (ray
    sensors) to provide the observation space. It then uses the “SetReward” method
    to provide a negative reward every time the agent is not able to reach the target
    and also terminates that episode of training. It also signals the reward phase
    by triggering a change in the ground material.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: “OnActionReceived”方法是一个重写的方法，它使用射线（射线传感器）来提供观察空间。然后它使用“SetReward”方法在智能体无法达到目标时提供负奖励，并终止该训练周期。它还通过触发地面材料的变化来触发奖励阶段。
- en: '[PRE16]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The “Heuristic” method is used for heuristic control of the agent. This relies
    on the heuristic brain and is used when no trained inference models or external
    brains are used.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: “Heuristic”方法用于智能体的启发式控制。这依赖于启发式大脑，并在没有训练的推理模型或外部大脑时使用。
- en: '[PRE17]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'The “OnTriggerStay” method checks if the agent has reached the goal, and then
    it uses the “SetReward” method to provide a positive reward if the agent is successful.
    The agent does this by checking whether the collider has “goal” tag as mentioned
    in the code segment here:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: “OnTriggerStay”方法检查智能体是否已达到目标，然后它使用“SetReward”方法在智能体成功时提供正奖励。智能体通过检查是否如代码段中所述具有“goal”标签的碰撞器来完成此操作：
- en: '[PRE18]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The “ResetBlock” method is used for resetting the position of the yellow block
    in the scene at the start of every episode of training.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: “ResetBlock”方法用于在每个训练周期的开始时重置场景中黄色方块的位置。
- en: '[PRE19]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'The “OnEpisodeBegin” method is an overridden method that resets the agent’s
    position, velocity, and direction using the “ResetBlock” method. The “FixedUpdate”
    method controls the actual game logic and calls the “ConfigureAgent” method as
    follows:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: “OnEpisodeBegin”方法是一个重写的方法，它使用“ResetBlock”方法重置智能体的位置、速度和方向。 “FixedUpdate”方法控制实际的游戏逻辑，并按如下方式调用“ConfigureAgent”方法：
- en: '[PRE20]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'The “ConfigureAgent” method controls the inference neural networks to be used
    based on the height of the wall and is associated with the curriculum learning
    part. If the value of “config” is 0, it implies that there is no wall (wall with
    0 height), and the agent uses noWallBrain brain for inference. This is by using
    the “SetModel” method. If the height of the wall is 1 unit, then the agent uses
    “smallWallBrain” as the inference brain. For wall height values greater than 1
    unit, the agent uses bigWallBrain for inference. The agent computes the height
    of the wall with the help of localScale variable after receiving inputs from the
    ray sensors. This is shown by the following lines of code:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: “ConfigureAgent”方法根据墙壁的高度控制要使用的推理神经网络，并且与课程学习部分相关联。如果“config”的值为0，则表示没有墙壁（高度为0的墙壁），代理使用noWallBrain大脑进行推理。这是通过使用“SetModel”方法实现的。如果墙壁的高度为1单位，那么代理使用“smallWallBrain”作为推理大脑。对于大于1单位的墙壁高度值，代理使用bigWallBrain进行推理。代理在接收到来自射线传感器的输入后，通过局部缩放变量帮助计算墙壁的高度。这由以下代码行所示：
- en: '[PRE21]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: That is the script that controls the blue agent, and in this case, we can see
    that depending on the height of the wall, the agent pushes the yellow platform
    accordingly to scale it. Also the agent uses a different inference brain, depending
    on the height of the wall. There is also an associated script, WallJumpSettings,
    which controls the different properties of the environment such as ground material
    color, the speed, jump height, and the jump velocity of the agent.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这是控制蓝色代理的脚本，在这种情况下，我们可以看到根据墙壁的高度，代理相应地推动黄色平台以进行缩放。此外，代理根据墙壁的高度使用不同的推理大脑。还有一个相关的脚本，WallJumpSettings，它控制环境的各种属性，例如地面材料颜色、速度、跳跃高度和代理的跳跃速度。
- en: '[PRE22]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Now that we have read about the script that controls the agent in the environment,
    let us understand another unique script before we use the “mlagents-train” method
    to train the agent.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经了解了控制环境中代理的脚本，那么在我们使用“mlagents-train”方法训练代理之前，让我们先了解另一个独特的脚本。
- en: Since we will be using curriculum learning to train our agents, we have to use
    a different “yaml” script that controls the hyperparameters to systematically
    increase the level of rewards and height of the wall. This can be found in the
    Curricula folder inside the Config folder. Inside the Curricula folder, we have
    the Wall_Jump.yaml script. Here we see, we have BigWallJump and SmallWallJump
    as the curriculum learning parameters for the two modes of inference. The measure,
    min_lesson_length, and signal_smoothing are the same for both of them. In the
    BigWallJump set of curriculum learning, we observe that the rewards threshold
    increases from 0.1 to 0.3 and then to 0.5\. This is again task (reward)-specific
    curriculum learning, which we studied. Also we have the big_wall_min_height, which
    gradually increases from 0.0 to 8.0 in steps of 2 units. We have the big_wall_max_height,
    which determines the maximum height that the wall should be limited to for a particular
    episode. In this case, for the first episode, the maximum wall height is 4 units,
    while the minimum is 0 units, and this pattern follows successively as the height
    increases with an increase in the reward.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将使用课程学习来训练我们的代理，我们必须使用一个不同的“yaml”脚本，该脚本控制超参数，以系统地增加奖励级别和墙壁的高度。这可以在Config文件夹内的Curricula文件夹中找到。在Curricula文件夹中，我们有Wall_Jump.yaml脚本。在这里我们可以看到，我们有大WallJump和小WallJump作为两种推理模式的课程学习参数。min_lesson_length和signal_smoothing对两者都是相同的。在大WallJump的课程学习中，我们观察到奖励阈值从0.1增加到0.3，然后增加到0.5。这又是任务（奖励）特定的课程学习，这是我们研究过的。我们还有大_wall_min_height，它以2个单位的步长逐渐从0.0增加到8.0。我们有big_wall_max_height，它确定特定剧集墙壁应限制的最大高度。在这种情况下，对于第一个剧集，最大墙壁高度为4单位，最小为0单位，并且随着高度的逐渐增加，奖励也随之增加，这种模式会依次延续。
- en: '[PRE23]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: In the SmallWallJump case, we have the threshold of rewards for each level.
    This increases from 1.0 to 5.0 in steps of 2 units. The “small_wall_height” also
    increases from 1.5 to 4.0 units with a step size of 0.5 units.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在SmallWallJump案例中，我们为每个级别设置了奖励阈值。这个阈值以2个单位的步长从1.0增加到5.0。同样，“small_wall_height”也从1.5单位增加到4.0单位，步长为0.5单位。
- en: '[PRE24]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'This is the script that has to be added with our original trainer_config.yaml
    file (PPO-policy) to train the agent in curriculum learning. The hyperparameters
    and properties for the PPO network are the same as in the previous cases. Now
    for training the agent we have to write the following command from the config
    folder:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这是需要添加到我们的原始 trainer_config.yaml 文件（PPO策略）中的脚本，以在课程学习中训练代理。PPO 网络的超参数和属性与之前的情况相同。现在，为了训练代理，我们必须从
    config 文件夹中编写以下命令：
- en: '[PRE25]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'To generalize this syntax:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 为了泛化这个语法：
- en: '[PRE26]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: On running this, we can visualize the training, and in this case we will be
    using the BigWallJump parameters for curriculum learning, as shown in Figure [6-11a](#Fig11).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此命令后，我们可以可视化训练，在这种情况下，我们将使用 BigWallJump 参数进行课程学习，如图 [6-11a](#Fig11) 所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig11_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig11_HTML.jpg)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig11_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig11_HTML.jpg)'
- en: Figure 6-11a
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-11a
- en: Curriculum training on wall jump with no wall
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 无墙壁的墙跳课程训练
- en: In this case, we can see the training as the height of the wall increases, as
    shown in Figure [6-11b](#Fig12).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们可以看到随着墙壁高度的增加，如图 [6-11b](#Fig12) 所示的训练。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig12_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig12_HTML.jpg)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig12_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig12_HTML.jpg)'
- en: Figure 6-11b
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-11b
- en: Curriculum training on wall jump with wall height
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 带有墙壁高度的墙跳课程训练
- en: 'Now that we know how to visualize this training with the help of Tensorboard,
    let us write the command again for starting tensorboard as follows:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了如何使用 Tensorboard 可视化这个训练，让我们再次写下启动 tensorboard 的命令如下：
- en: '[PRE27]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: This is run from the config folder and starts on the port 6006\. We can then
    evaluate the rewards (cumulative), episode length, and epoch loss. A preview of
    the training using curriculum learning is provided in Figure [6-12](#Fig13).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这是从 config 文件夹中运行的，并在端口 6006 上启动。然后我们可以评估奖励（累积）、回合长度和纪元损失。使用课程学习提供的训练预览如图 [6-12](#Fig13)
    所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig13_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig13_HTML.jpg)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig13_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig13_HTML.jpg)'
- en: Figure 6-12
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-12
- en: Tensorboard visualization of curriculum learning in wall jump
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 墙跳中的课程学习 Tensorboard 可视化
- en: We have observed how curriculum learning can be triggered in Unity with the
    help of an additional yaml file in the Curricula folder. For any new simulations
    or games that we create using ML Agents, we can add our own set of yaml parameters
    script for curriculum learning using the same pattern mentioned before. There
    are additional curriculum learning scripts as well for soccer and test, which
    can be read for a better understanding. In the next section we will be focusing
    on another deep RL algorithm, DDPG, before moving on to adversarial self-play
    and cooperative networks.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经观察到如何在 Unity 中使用 Curricula 文件夹中的额外 yaml 文件来触发课程学习。对于任何我们使用 ML Agents 创建的新模拟或游戏，我们可以添加自己的
    yaml 参数脚本，用于课程学习，使用之前提到的相同模式。还有额外的课程学习脚本，用于足球和测试，可以阅读以获得更好的理解。在下一节中，我们将专注于另一个深度强化学习算法，即
    DDPG，然后再继续到对抗性自我博弈和合作网络。
- en: Extended Deep Reinforcement Learning Algorithms
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展深度强化学习算法
- en: Deep Deterministic Policy Gradient
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度确定性策略梯度
- en: 'In this context, we will be studying the DDPG algorithm, which is an off-policy
    actor critic variant. This algorithm combines the deep Q-network (DQN) for continuous
    action spaces with a traditional actor critic policy. It is closely related to
    the original Q-learning algorithm, which uses the Bellman update with the exception
    that this occurs only in continuous spaces. The need for continuity in the algorithm
    comes from the fact that for discrete spaces, computing the maximum Q-value (rewards)
    is feasible. However, in the case of continuous action spaces, there are uncountable
    computations that are required before arriving at the maximum value. We can recall
    from the previous section that in the original DQN algorithm, there is a replay
    buffer that stores the past action/observation spaces as well as a frozen target
    network whose weights cannot be changed. The same approach is applied here as
    well, but the action space is continuous, and that is where gradient comes into
    the picture. There are two distinct attributes in the DDPG framework:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，我们将研究DDPG算法，它是一个离线策略演员评论变体。该算法将连续动作空间的深度Q网络（DQN）与传统的演员评论策略相结合。它与原始的Q学习算法密切相关，除了只在连续空间中发生贝尔曼更新之外。算法中连续性的需求来自于，对于离散空间，计算最大的Q值（奖励）是可行的。然而，在连续动作空间的情况下，在达到最大值之前需要进行不可计数的计算。我们可以从上一节回忆起，在原始的DQN算法中，有一个重放缓冲区，它存储过去的动作/观察空间，以及一个冻结的目标网络，其权重不能更改。这里也应用了相同的方法，但动作空间是连续的，这就是梯度出现的地方。在DDPG框架中有两个不同的属性：
- en: '**Deep Q Learning** **:** This part of DDPG relies on a traditional DQN that
    uses the Bellman equation for computing the error in the Q-values. This error,
    which is termed mean squared Bellman error (MSBE), is the quadratic loss function,
    which the algorithm has to minimize through gradient descent. The equations can
    be written as follows:'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深度Q学习** **:** DDPG的这一部分依赖于使用贝尔曼方程计算Q值误差的传统DQN。这个误差被称为平均平方贝尔曼误差（MSBE），是二次损失函数，算法必须通过梯度下降来最小化。方程可以写成如下：'
- en: Y(s,a,r,s**`**) = r + y max[a] Q[θ](s**`**,a**`**)
  id: totrans-144
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Y(s,a,r,s**`**) = r + y max[a] Q[θ](s**`**,a**`**)
- en: L(θ) = E[θ] [(Y(s,a,r,s**`**) - Q[θ](s,a))²],
  id: totrans-145
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: L(θ) = E[θ] [(Y(s,a,r,s**`**) - Q[θ](s,a))²],
- en: 'where y(gamma) is the exploration-exploitation factor. This forms the initial
    part of the DDPG algorithm, and since the algorithm relies on continuous action
    spaces, the gradient is computed by partial differentiation of the quadratic loss
    function. The modified loss function can be represented as :'
  id: totrans-146
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中y(gamma)是探索-利用因子。这构成了DDPG算法的初始部分，由于算法依赖于连续动作空间，梯度是通过二次损失函数的偏微分来计算的。修改后的损失函数可以表示为：
- en: L(θ) = E[θ] [ ( Q[θ](s,a) –( r + Y(1-d) max[a`] (Q[θ](s`,a`)) )²],
  id: totrans-147
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: L(θ) = E[θ] [ ( Q[θ](s,a) –( r + Y(1-d) max[a`] (Q[θ](s`,a`)) )²],
- en: 'where the (1-d) value determines whether the agent is in the terminal or nonterminal
    step of the training process. The gradient computation with respect to the Q-value
    can be computed by using partial derivatives:'
  id: totrans-148
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中(1-d)的值决定了代理是在训练过程的终端步骤还是非终端步骤。关于Q值的梯度计算可以通过偏导数来计算：
- en: ∂L(θ)/∂Q [θ](s,a) =∂ E[θ] [ ( Q[θ](s,a) –( r + Y(1-d)max[a`] (Q[θ](s`,a`)) )²]
    /∂Q [θ](s,a).
  id: totrans-149
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: ∂L(θ)/∂Q [θ](s,a) =∂ E[θ] [ ( Q[θ](s,a) –( r + Y(1-d)max[a`] (Q[θ](s`,a`)) )²]
    /∂Q [θ](s,a).
- en: 'Now from our previous concept of DQN, we know that replay buffers and target
    network training are the two most important characteristics for an off-policy
    network . The replay buffer allows the DDPG algorithm to choose between most recently
    used to older samples to prevent overfitting. Because in DDPG, we have to determine
    the maximum Q-value in continuous spaces, this is done with the help of the target
    network. The target network is trained to maximize the value of Q[θ](s`, a`),
    and this is represented using μ[θ](s`). In many cases additional noise is added
    to improve efficiency. Also the trained target network works on the quadratic
    MSBE loss function to update the Q-value:'
  id: totrans-150
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在我们从之前对DQN的概念中了解到，重放缓冲区和目标网络训练是一个离线策略网络最重要的两个特性。重放缓冲区允许DDPG算法在最近使用过的样本和较老的样本之间进行选择，以防止过拟合。因为在DDPG中，我们必须在连续空间中确定最大的Q值，这是通过目标网络来实现的。目标网络被训练以最大化Q[θ](s`,
    a`)的值，这用μ[θ](s`)来表示。在许多情况下，为了提高效率，还会添加额外的噪声。此外，训练后的目标网络在二次MSBE损失函数上工作以更新Q值：
- en: Q [θ](s`,a`) = Q [θ](s,a) - α ∂L(θ)/∂Q [θ](s,a),
  id: totrans-151
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Q [θ](s`,a`) = Q [θ](s,a) - α ∂L(θ)/∂Q [θ](s,a),
- en: where α is the learning rate of the algorithm.
  id: totrans-152
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中α是算法的学习率。
- en: '**Policy network** **:** The policy for DDPG involves using the policy gradient
    algorithm to maximize the value estimates from a policy. This is the simplest
    form of gradient ascent-based policy optimization technique, which we studied
    in the previous chapter and can be formulated as:'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略网络**：DDPG的策略涉及使用策略梯度算法来最大化策略的价值估计。这是基于梯度上升策略优化的最简单形式，我们在上一章中已经研究过，可以表示为：'
- en: ∆[θ] J(θ) = max E[Q [θ](s`,μ[θ](s`))]
  id: totrans-154
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: ∆[θ] J(θ) = max E[Q [θ](s`,μ[θ](s`))]
- en: 'This completes the mathematical aspects of this off-policy algorithm. Now we
    will look into the details of its implementation with the help of stable baselines
    on the MountainCarContinuous environment. Open the DDPG_Baselines.ipynb Python
    Notebook in Google Colab. Since most of the libraries and frameworks are similar
    to the previous use-cases, we will concentrate on the core implementation. We
    get the action spaces from the Gym environment, and then we apply a noise to the
    action (mentioned before). This noise is to increase stability in training the
    DQN and is called the OrnsteinUhlenbeckActionNoise. Then we call the DDPG policy
    from Baselines and pass on the required parameters using the action and parameter
    noises. This is done by the following lines:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了这个离线策略算法的数学方面。现在我们将借助稳定基线在MountainCarContinuous环境上查看其实施的细节。在Google Colab中打开DDPG_Baselines.ipynb
    Python笔记本。由于大多数库和框架与之前的用例相似，我们将专注于核心实现。我们从Gym环境获取动作空间，然后对动作应用噪声（之前提到过）。这种噪声是为了增加训练DQN的稳定性，被称为OrnsteinUhlenbeckActionNoise。然后我们调用Baselines中的DDPG策略，并通过动作和参数噪声传递所需参数。这是通过以下行完成的：
- en: '[PRE28]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Then we run a loop to train the agent on DDPG policy for 4000 iterations, and
    the model predicts the rewards for each stage of training. The visualization of
    the training is also updated on the screen with the help of “ipythondisplay” library.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们运行一个循环，在DDPG策略上对代理进行4000次迭代训练，模型预测每个训练阶段的奖励。借助“ipythondisplay”库，训练的可视化也在屏幕上更新。
- en: '[PRE29]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: On running this, we will get to see the different attributes such as reference
    Q mean values , rollout Q mean values, as well as the training episode length,
    duration, epochs, steps, the critic, and actor loss, as shown in Figure [6-13](#Fig14).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此代码后，我们将看到不同的属性，例如参考Q均值、滚动Q均值，以及训练阶段长度、持续时间、时代、步骤、评论家和演员损失，如图[6-13](#Fig14)所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig14_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig14_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig14_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig14_HTML.jpg)'
- en: Figure 6-13
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-13
- en: Output of training DDPG on the MountainCarContinuous environment
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在MountainCarContinuous环境上训练DDPG的输出
- en: We can also see the car trying to get up the cliff to reach the flag, as shown
    in Figure [6-14](#Fig15).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以看到汽车试图爬上悬崖以到达旗帜，如图[6-14](#Fig15)所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig15_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig15_HTML.jpg)'
  id: totrans-164
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig15_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig15_HTML.jpg)'
- en: Figure 6-14
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-14
- en: Mountain car training visualization
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 山地车训练可视化
- en: This algorithm is a classic off-policy algorithm and can also be used in case
    of training the Reacher environment in Unity ML Agents. In this case, we can use
    the Baseline implementation of the algorithm. As we read in Chapter [3](502041_1_En_3_Chapter.xhtml)
    regarding the different environments, the Reacher is a complex robotic arm simulation
    environment where the robot is credited with rewards if it keeps the arms within
    the green spherical balls. Some of the best implementations of solving this problem
    require PPO with DDPG for continuous spaces. As DDPG uses actor critic mechanism
    as the policy network, PPO provides a good stability in training. As mentioned
    in the last chapter, we can use the Python API for interfacing and running our
    Baseline Gym models on Unity ML Agents to train them. This is left for an enthusiastic
    reader to try training the Reacher agent with DDPG. Figure [6-15](#Fig16) shows
    a preview of training the environment with DDPG.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 此算法是一种经典的离线策略算法，也可以用于在 Unity ML Agents 中训练 Reacher 环境。在这种情况下，我们可以使用算法的基线实现。正如我们在第
    [3](502041_1_En_3_Chapter.xhtml) 章节中关于不同环境的阅读中提到的，Reacher 是一个复杂的机器人臂模拟环境，如果机器人保持手臂在绿色球形球内，则机器人会获得奖励。解决此问题的最佳实现之一需要使用
    PPO 和 DDPG 进行连续空间的训练。由于 DDPG 使用演员评论机制作为策略网络，PPO 在训练中提供了良好的稳定性。正如上一章所述，我们可以使用 Python
    API 来接口和运行我们的基线 Gym 模型在 Unity ML Agents 上进行训练。这留给热情的读者尝试使用 DDPG 训练 Reacher 代理。图
    [6-15](#Fig16) 展示了使用 DDPG 训练环境的预览。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig16_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig16_HTML.jpg)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig16_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig16_HTML.jpg)'
- en: Figure 6-15
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-15
- en: Reacher environment with PPO-DDPG off-policy training
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 基于 PPO-DDPG 的离线策略训练的 Reacher 环境
- en: Now we will be looking briefly into some variants of the DDPG algorithm.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将简要探讨 DDPG 算法的某些变体。
- en: Twin Delayed DDPG
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 双延迟 DDPG
- en: 'This is a variant of the DDPG algorithm that improves over DDPG by using clipping
    of the policy updates, similarly to clipped PPO, and uses delayed policy updates
    to prevent it from overestimating the Q-value. Twine-delayed DDPG (TD3) is almost
    similar to DDPG with certain modifications:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种 DDPG 算法的变体，通过使用策略更新的剪切，类似于剪切 PPO，并使用延迟策略更新来防止其高估 Q 值。双延迟 DDPG (TD3) 几乎与
    DDPG 相似，但有一些修改：
- en: '**Target policy smoothing** **:** As mentioned in the case of DDPG, we have
    a target network that uses MSBE loss as the metric. This is modified in TD3 algorithm
    by clipping the noise added to the target network. This is bounded within the
    range a[low]≤ a ≤ a[high]. The target actions are computed in this case as:'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标策略平滑** **:** 如 DDPG 的情况所述，我们有一个使用 MSBE 损失作为度量指标的目标网络。在 TD3 算法中，通过剪切添加到目标网络的噪声进行了修改。这被限制在范围
    a[low]≤ a ≤ a[high] 内。在这种情况下，目标动作的计算如下：'
- en: a`(s`) = clip( μ[θ](s`) + clip(ε,-c,c), a[low], a[high] ),
  id: totrans-175
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: a`(s`) = clip( μ[θ](s`) + clip(ε,-c,c), a[low], a[high] ),
- en: where (-c, c) are the hyperparameters. The clipping factor plays an important
    role in regularization of the algorithm and removes the drawbacks of DDPG. DDPG
    exploits sharp points on the curve and this gives brittle and unstable rewards
    in many cases. Smoothing the curve using TD3 plays an important role in stabilizing
    it.
  id: totrans-176
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中 (-c, c) 是超参数。剪切因子在算法的正则化中起着重要作用，并消除了 DDPG 的缺点。DDPG 利用曲线上的尖锐点，这在许多情况下会导致脆弱和不稳定的奖励。使用
    TD3 平滑曲线在稳定它方面起着重要作用。
- en: '**Clipped double Q-learning:** This technique acts as a minimization objective
    that tries to minimize the Q-values coming from the two networks in double DQN.
    We have the formulation as follows:'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**剪切双 Q 学习**：这种技术作为最小化目标，试图最小化双 DQN 中来自两个网络的 Q 值。我们的公式如下：'
- en: R (y,s`,d)=r + y(1-d) min[`] (Q[θ1](s`,a`), Q[θ2](s`,a`)),
  id: totrans-178
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: R (y,s`,d)=r + y(1-d) min[`] (Q[θ1](s`,a`), Q[θ2](s`,a`)),
- en: 'where symbols have their usual meaning. Based on this rewards value, the two
    DQNs are trained with their corresponding MSBE loss as follows:'
  id: totrans-179
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中符号具有其通常的含义。基于此奖励值，两个 DQN 使用其相应的 MSBE 损失进行训练，如下所示：
- en: L[1](θ) = E[θ1] [(Q[θ1](s,a) - R(y,s`,d)) ²]
  id: totrans-180
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: L[1](θ) = E[θ1] [(Q[θ1](s,a) - R(y,s`,d)) ²]
- en: L[2](θ) = E[θ2] [(Q[θ2](s,a) - R(y,s`,d)) ²]
  id: totrans-181
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: L[2](θ) = E[θ2] [(Q[θ2](s,a) - R(y,s`,d)) ²]
- en: A smaller Q-value for the target network helps prevent overestimation and stabilizes
    the training.
  id: totrans-182
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 目标网络的 Q 值较小有助于防止高估并稳定训练过程。
- en: '**Delayed policy control** **:** TD3 updates the policies in a delayed manner
    and also uses the basic maximization of the policy gradient as the core function:'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟策略控制** **:** TD3 以延迟方式更新策略，并使用策略梯度的基本最大化作为核心功能：'
- en: ∆[θ] J(θ) = max E[Q [θ](s`,μ[θ](s`))]
  id: totrans-184
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: ∆[θ] J(θ) = max E[Q [θ](s`,μ[θ](s`))]
- en: It is recommended to update the policy after every two Q-function (value) updates.
  id: totrans-185
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 建议在每次两个Q函数（值）更新后更新策略。
- en: This completes the twin delayed DDPG algorithm. This can be visualized in the
    TD3-Baselines.ipynb Notebook, which contains the OpenAI implementation of the
    algorithm. Most of the code segment is the same as in DDPG, with the only change
    in the policy of the algorithm.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了双延迟DDPG算法。这可以在TD3-Baselines.ipynb笔记本中可视化，其中包含OpenAI对该算法的实现。大部分代码段与DDPG相同，唯一的区别在于算法的策略。
- en: '[PRE30]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: In this case, we are using the Pendulum environment for training this algorithm,
    as shown in Figure [6-16](#Fig17).
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们使用摆锤环境来训练此算法，如图[6-16](#Fig17)所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig17_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig17_HTML.jpg)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig17_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig17_HTML.jpg)'
- en: Figure 6-16
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-16
- en: TD3 training in the pendulum environment
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 摆锤环境中的TD3训练
- en: 'Some of the other variants include:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 其他一些变体包括：
- en: '**Distributed deep deterministic policy gradient (D4PG)** **:** This uses a
    distributional critic as the core functionality. This allows a distributed training
    of the DDPG network using prioritized experience replay. D4PG uses multiple distributed
    actors working in parallel and feeding data into the same replay buffer.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分布式深度确定性策略梯度（D4PG）** **:** 这使用分布式评论家作为核心功能。这允许使用优先经验回放来分布式训练DDPG网络。D4PG使用多个并行工作的分布式演员，并将数据输入到相同的回放缓冲区中。'
- en: '**Multi-agent deep deterministic policy gradient (MADDPG)** **:** This is a
    multi-agent version of the DDPG algorithm where the environment changes in response
    to all the agents working in the scene. This can be compared to a multi-agent
    Markov Decision Process (MDP). The critic in this case learns from a centralized
    action value function for a particular agent. This may give rise to conflicting
    reward functions and also a competitive environment. In this case there are multiple
    actors that are present for each agent that update the policy gradient.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多智能体深度确定性策略梯度（MADDPG）** **:** 这是DDPG算法的多智能体版本，其中环境根据场景中所有工作的智能体进行变化。这可以与多智能体马尔可夫决策过程（MDP）相比较。在这种情况下，评论家从特定智能体的集中式动作价值函数中学习。这可能导致冲突的奖励函数和竞争性环境。在这种情况下，每个智能体都有多个演员存在，用于更新策略梯度。'
- en: We have completed learning about most of the algorithms related to on- and off-policy
    deep RL. DDPG is an important off-policy algorithm for continuous vector spaces
    and can be used in ML Agents where the mode in the Behavior Parameters script
    is of type Continuous. In the next section we will be focusing on adversarial
    self-play and cooperative networks.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经完成了关于在线和离线深度强化学习相关算法的大部分学习。DDPG是连续向量空间的重要离线算法，可以在ML Agents中使用，其中行为参数脚本中的模式为连续类型。在下一节中，我们将重点关注对抗性自我博弈和合作网络。
- en: Adversarial Self-Play and Cooperative Learning
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对抗性自我博弈与合作学习
- en: Adversarial Self-Play
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对抗性自我博弈
- en: This is an important aspect of training agents to play in a dynamic environment.
    In addition to the obstacles present in the environment, there is also another
    agent whose reward signals are antagonistic with respect to the player agent.
    This adversarial agent controls the player. Adversarial self-play is used when
    the agents also perceive another agent to be an obstacle along with the environment.
    Self-play involves the player agent trying to win over a past state of itself,
    which is the scenario in adversarial play. The adversarial agent forces the player
    agent to change its policies and attain better Q-value estimates than what it
    achieved in its previous states. However, in most of the cases, the level of difficulty
    should be properly controlled so as to prevent the player agent from getting penalized.
    This can be observed in the case of the tennis environment, where the player agent
    has to compete against an adversarial agent to get points. Depending on the level
    of gameplay of the adversary, the player agent has to adjust its policies accordingly.
    At the start of the gameplay, if a strong adversary is provided, then the player
    agent may not be able to learn significantly. In contrast, if the opponent becomes
    weaker as the training progresses, this may lead to an instability in learning
    of the player agent. Using the same policy for the above two cases can be problematic
    for the player, as it may not learn significantly. This makes adversarial play
    very difficult to estimate. In self-play, as mentioned, an agent tries to compete
    against its past self, by changing its policy and gets rewarded if the current
    self is better than the past self. This improvement of the agent can only come
    from the increasing level of difficulty of the gameplay, including the strength
    of the adversary. Curriculum learning plays a significant role here to moderate
    and control the level of difficulty as the gameplay progresses. With the help
    for curriculum learning (task-specific), the player utilizes adversarial self-play
    to methodically update its policies to reach a specific goal, as shown in Figure
    [6-17](#Fig18).
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这是训练智能体在动态环境中进行游戏的一个重要方面。除了环境中存在的障碍物外，还有一个与玩家智能体奖励信号相反的智能体。这个对抗性智能体控制着玩家。当智能体也把另一个智能体视为环境中的障碍时，就会使用对抗性自我博弈。自我博弈涉及玩家智能体试图赢得过去的状态，这是对抗性游戏的情况。对抗性智能体迫使玩家智能体改变其策略，并取得比之前状态更好的
    Q 值估计。然而，在大多数情况下，应该适当地控制难度级别，以防止玩家智能体受到惩罚。这在网球环境中可以观察到，玩家智能体必须与对抗性智能体竞争以获得分数。根据对手的游戏水平，玩家智能体必须相应地调整其策略。在游戏开始时，如果提供了强大的对手，那么玩家智能体可能无法显著学习。相反，如果对手随着训练的进行而变得较弱，这可能会导致玩家智能体学习的不稳定。对于上述两种情况使用相同的策略可能会对玩家造成问题，因为它可能无法显著学习。这使得对抗性游戏非常难以估计。在自我博弈中，如前所述，智能体通过改变其策略来尝试与其过去自我竞争，如果当前自我比过去自我更好，则会获得奖励。智能体的这种改进只能来自游戏难度的提高，包括对手的强度。课程学习在这里起着重要的作用，以调节和控制游戏过程中难度的级别。借助课程学习（特定任务），玩家利用对抗性自我博弈有系统地更新其策略，以达到特定的目标，如图
    [6-17](#Fig18) 所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig18_HTML.png](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig18_HTML.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig18_HTML.png](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig18_HTML.png)'
- en: Figure 6-17
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-17
- en: Agent in an adversarial self-play environment
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 对抗性自我博弈环境中的智能体
- en: Cooperative Learning
  id: totrans-202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 协作学习
- en: Cooperative networks are used in multi-agent environments, where we have multiple
    agents in a particular group compete against adversarial agents in a different
    group. The groups can be greater than two, and in this case, we have a cluster
    of agents with the same policies and reward estimates trained to reach the same
    goal. In adversarial gameplay, we have two or more deep RL neural networks that
    compete against each other for value maximization. In cooperative gameplay, we
    have two or more deep RL neural networks that are similar in architecture, policies,
    and loss functions trained with the same motive. However, modifications can be
    made between the cooperating agents to learn to change their policies by observing
    each other. This is another important metric where one of the agents uses a policy
    gradient technique as A2C and the other cooperating agent can imitate it using
    GAIL. This kind of cooperative network-based agents are generally found in group-based
    games such as soccer. In the soccer environment(two players), we have two different
    teams, each having two players. Among the players in a particular team, one of
    them is a goalie while the other is a striker. Both these players (agents) must
    work in cooperation with each other to defeat the opponent team, which also contains
    a goalie and a striker. This environment is beautifully crafted to show both cooperative
    learning between the agents on the same team as well as adversarial self-play
    between the agents of different teams. Figure [6-18](#Fig19) shows a preview of
    the environment.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 在多智能体环境中，合作网络被用于多个智能体在特定组内相互竞争，对抗不同组中的对抗性智能体。组可以超过两个，在这种情况下，我们有一个由具有相同策略和奖励估计的智能体集群，它们被训练以达到相同的目标。在对抗性游戏中，我们有两个或更多的深度强化学习（RL）神经网络，它们相互竞争以实现价值最大化。在合作游戏中，我们有两个或更多的深度强化学习（RL）神经网络，它们的架构、策略和损失函数相似，并且用相同的动机进行训练。然而，在合作智能体之间可以进行修改，以便通过观察对方来学习改变它们的策略。这是另一个重要的指标，其中一个智能体使用A2C作为策略梯度技术，而另一个合作智能体可以使用GAIL来模仿它。这种基于合作网络的智能体通常出现在基于团队的游戏中，如足球。在足球环境（两名玩家）中，我们有两个不同的队伍，每个队伍都有两名球员。在特定队伍的球员中，其中一名是守门员，而另一名是前锋。这两名球员（智能体）必须相互合作，以击败对方队伍，对方队伍也包含守门员和前锋。这个环境被精心设计，以展示同一队伍中的智能体之间的合作学习，以及不同队伍中的智能体之间的对抗性自我游戏。图[6-18](#Fig19)展示了环境的预览。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig19_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig19_HTML.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig19_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig19_HTML.jpg)'
- en: Figure 6-18
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-18
- en: Adversarial and cooperative learning in the soccer environment
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 足球环境中的对抗性和合作学习
- en: Let us understand the soccer environment in detail in this section.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，让我们详细了解足球环境。
- en: Soccer Environment for Adversarial and Cooperative Learning
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用于对抗性和合作学习的足球环境
- en: 'We may have played AI-based football or soccer games like FIFA, where we have
    seen intelligent AI agents (players) playing along with us as well as against
    us. This is a classic example where both adversarial and cooperative networks
    play an important role. In the Unity scene, we have two different teams: blue
    and purple. Each team consists of two players that are effectively agents. Each
    of these agents contain the Behavior Parameters and Model Overrider as well as
    the Decision Requester scripts attached to it. Additionally we have the RayPerceptionSensorComponent3D
    script, which control the discrete observation space for the agents. In this case,
    we will first study the “AgentSoccer script. At the start of the script, we have
    the types of the team— 0 and 1, which represent the blue and the purple Teams,
    respectively. It also contains types of the players based on their locations on
    the platform; if the agent is placed closer to the goal, it becomes a goalie,
    whereas for other locations it becomes a striker.'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能玩过基于AI的足球或足球游戏，如FIFA，我们在这些游戏中看到了智能AI代理（玩家）与我们并肩作战，也与我们对抗。这是一个对抗性和合作网络都扮演重要角色的经典例子。在Unity场景中，我们有两个不同的队伍：蓝色和紫色。每个队伍由两名球员组成，这些球员实际上是智能体。每个智能体都包含附加在其上的行为参数和模型覆盖者脚本以及决策请求者脚本。此外，我们还有RayPerceptionSensorComponent3D脚本，它控制智能体的离散观察空间。在这种情况下，我们将首先研究“AgentSoccer脚本。在脚本的开始处，我们有队伍的类型——0和1，分别代表蓝色和紫色队伍。它还包含基于球员在平台上的位置的球员类型；如果智能体放置在靠近球门的位置，它就变成守门员，而对于其他位置，它就变成前锋。
- en: '[PRE31]'
  id: totrans-210
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Then we have the different variables that control the position, ID of the agent,
    the kick power, the speed of the agent (lateral, existential, forward), and the
    parameters that control the team, rigidbodies of the agents.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们有不同的变量，用于控制代理的位置、ID、踢球力量、代理的速度（横向、存在、前向），以及控制团队和代理刚体的参数。
- en: '[PRE32]'
  id: totrans-212
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The overridden “Initialize” method is used for assigning the different agents
    to their respective teams and also assigns their IDs respectively. Depending on
    the position of the agent, it is assigned a lateral and forward velocity, and
    we can see different values for goalie and striker. It also assigns the rigidbodies
    and the maximum angular velocities of the agents.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 覆盖的“Initialize”方法用于将不同的代理分配到各自的队伍中，并分别分配它们的ID。根据代理的位置，它被分配一个横向和前向速度，我们可以看到守门员和前锋的不同值。它还分配代理的刚体和最大角速度。
- en: '[PRE33]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: The “MoveAgent” method moves the agents after receiving the ray observations.
    Depending on the actions received, the switch code block moves the agents along
    a particular axis (forward and lateral motion) and also allows it to rotate. Then
    it uses the “AddForce” method to trigger the motion of the agent along a particular
    direction.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: “MoveAgent”方法在接收到射线观察后移动代理。根据接收到的动作，switch代码块将代理沿特定轴（前进和横向运动）移动，并允许它旋转。然后它使用“AddForce”方法触发代理沿特定方向的移动。
- en: '[PRE34]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The “OnActionReceived” overridden method controls the rewards received by the
    agent based on its position. If the position is that of a goalie, a positive reward
    is provided. If the position is that of a striker, a negative existential reward
    is provided. For all other generic cases, a small negative reward is provided
    to the agent.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 覆盖的“OnActionReceived”方法根据代理的位置控制代理收到的奖励。如果位置是守门员的位置，则提供正奖励。如果位置是前锋的位置，则提供负的存在奖励。对于所有其他通用情况，向代理提供小的负奖励。
- en: '[PRE35]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: We have the “Heuristic” method, which is common for all the ML Agents scripts,
    and uses different keys (W, A [forward], S, D [rotate], E, Q [right]) to control
    the agent. Used mainly as a player brain and also in imitation learning.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有“启发式”方法，这是所有机器学习代理脚本的通用方法，并使用不同的键（W、A [前进]、S、D [旋转]、E、Q [右]）来控制代理。主要用于玩家大脑和模仿学习。
- en: '[PRE36]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: The “OnCollisionEnter” method is important for rewarding the agent and the team
    when the ball enters the opponent’s goal. The force of kicking the ball by the
    agent also increases if it is at the goalie position. Normally for each goals
    scored, the agent gets a reward of +1.0 and for each goal conceded, a negative
    score of -1.0 is received. In all other cases, a negative score of -0.0003 units
    is received.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: “OnCollisionEnter”方法在球进入对手球门时对代理和团队进行奖励非常重要。如果代理处于守门员位置，它踢球的力也会增加。通常，对于每个进球，代理获得+1.0的奖励，对于每个失球，收到-1.0的负分。在其他所有情况下，收到-0.0003单位的负分。
- en: '[PRE37]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: The “OnEpisodeBegin” method is used for resetting the agent, and the positions
    of the different agents in the scene. It also resets the velocity, force and the
    penalty time of the environment.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: “OnEpisodeBegin”方法用于重置代理，以及场景中不同代理的位置。它还重置速度、力和环境的处罚时间。
- en: '[PRE38]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: This completes the agent script. This script is added to both the players on
    both the teams. For a particular team, the respective properties are triggered
    (based on enums). There are other additional scripts that assist this script,
    such as the SoccerBallController script. This controls the collisions with the
    different game objects, particularly what game object the ball has touched (blue
    team player, purple team player, goal)
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了代理脚本。此脚本被添加到两队球员中。对于特定的队伍，相应的属性被触发（基于枚举）。还有其他辅助脚本，如SoccerBallController脚本。它控制与不同游戏对象的碰撞，特别是球接触了哪个游戏对象（蓝色队伍球员、紫色队伍球员、球门）。
- en: '[PRE39]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: The SoccerField area controls the platform or the ground on which the game is
    being played. This includes lighting the platform when a goal is scored as well
    as adding rewards of +1.0 units for the goal scoring agent, and a negative reward
    is attributed to the conceded agent.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 足球场区域控制游戏正在进行的平台或地面。这包括在进球时照亮平台，以及为进球的代理添加+1.0单位的奖励，并为失球的代理分配负奖励。
- en: '[PRE40]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: There is also a “ResetBall” method that is called in the Socceragent script
    during the start of each episode. This resets the ball to the middle of the platform
    and resets its rotation, scale, and direction.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个场景开始时，Socceragent 脚本中还会调用一个名为“ResetBall”的方法。这个方法会将球重置到平台的中间，并重置其旋转、缩放和方向。
- en: '[PRE41]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: The last script in this context is the SoccerSettings script, which has variables
    controlling the materials of the blue and purple teams, the speed of the agents,
    as well as a Boolean variable for randomizing the agents during training.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个上下文中，最后一个脚本是 SoccerSettings 脚本，它包含控制蓝队和紫队材料、代理速度以及用于在训练期间随机化代理的布尔变量的变量。
- en: '[PRE42]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Now we will be training this scene with the help of PPO-based curriculum learning
    to see the adversarial self-play and cooperative learning in action.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将使用基于 PPO 的课程学习来训练这个场景，以观察对抗自我学习和合作学习的效果。
- en: Training Soccer Environment
  id: totrans-234
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练足球环境
- en: 'We will be using curriculum learning since for any team (player agents) the
    level of difficulty of training should increment gradually. This allows the agents
    of both the teams to learn using a stable policy for optimal rewards. Similar
    to training the Wall Jump environment in the previous section, we will use the
    following code to start the training process from the Anaconda prompt (Command
    prompt) terminal:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用课程学习，因为对于任何一支队伍（玩家代理）来说，训练的难度应该逐渐增加。这允许两支队伍的代理使用稳定的策略来获得最佳奖励。类似于上一节中训练
    Wall Jump 环境，我们将使用以下代码从 Anaconda 命令提示符（命令提示符）终端开始训练过程：
- en: '[PRE43]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: On running this command, we can see that the PPO algorithm uses the hyperparameters
    as we saw in the previous chapters. Additionally we are also using the parameters
    present in the Soccer.yaml curriculum learning script. We can observe that the
    rewards threshold increases by 0.05 units starting from 0.05, and also the ball_touch
    parameter decreases gradually from 1.0 to 0.0\. This implies as the difficulty
    increases, it becomes harder for the agent in a particular team to retain the
    ball for a longer time. For the initial levels, the agents can have the ball for
    a longer time span, and as the levels increase, this time decreases. In a practical
    football or soccer match, it can be observed that if two teams are very competitive,
    the ball possession ratio decreases for both the teams.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此命令后，我们可以看到 PPO 算法使用了我们在前几章中看到的超参数。此外，我们还在 Soccer.yaml 课程学习脚本中使用了参数。我们可以观察到奖励阈值从
    0.05 单位开始增加，并且球触球参数从 1.0 逐渐减少到 0.0。这意味着随着难度的增加，特定队伍的代理保留球的时间变得更长变得困难。在初始级别，代理可以拥有球更长的时间段，随着级别的增加，这个时间段会减少。在实际的足球或足球比赛中，可以观察到如果两支队伍非常竞争，两队的球权比例都会下降。
- en: '[PRE44]'
  id: totrans-238
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: The training scene appears as shown in Figure [6-19](#Fig20).
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 训练场景如图 [6-19](#Fig20) 所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig20_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig20_HTML.jpg)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig20_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig20_HTML.jpg)'
- en: Figure 6-19
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-19
- en: Training soccer environment using adversarial–cooperative learning
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 使用对抗-合作学习训练足球环境
- en: Tensorboard Visualization
  id: totrans-243
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Tensorboard 可视化
- en: 'Let us visualize this training process in Tensorboard as well. We will be using
    the command:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在 Tensorboard 中也可视化这个训练过程。我们将使用以下命令：
- en: '[PRE45]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: This command needs to be called from the config folder inside the ML Agents
    repository. We can visualize the cumulative rewards, the loss and other parameters
    of the training. Figure [6-20](#Fig21) shows a preview of the Tensorboard visualization.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 这个命令需要从 ML Agents 存储库中的 config 文件夹中调用。我们可以可视化累积奖励、损失和其他训练参数。图 [6-20](#Fig21)
    展示了 Tensorboard 可视化的预览。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig21_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig21_HTML.jpg)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig21_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig21_HTML.jpg)'
- en: Figure 6-20
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-20
- en: Tensorboard visualization of the training
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: Tensorboard 训练可视化
- en: We can change the hyperparameters to visualize how it affects the training,
    the loss, and the rewards. After a considerable amount of training period, we
    can see that the agents are playing really well. We have seen how the effect of
    adversarial (different teams) and cooperative (same teams) learning mode affects
    the agents’ ability to tackle the environment. We can use different algorithms
    apart from PPO, such as SAC (or other soft Q-learning technique) to see the difference
    in the training process. While the tennis environment is a pure competitive (adversarial)
    learning-based environment, in the soccer environment, we have the flavors of
    both adversarial as well as cooperative learning. It has to be kept in mind that
    we can also change the hyperparameter properties, including the neural network
    parameters present in the Model.py script that we mentioned in the last chapter
    and see the changes in the outputs. Significantly it can be observed how changing
    the recurrent network properties (LSTM network properties) can change the learning
    of the agent.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以更改超参数以可视化它如何影响训练、损失和奖励。经过相当长一段时间的训练后，我们可以看到代理们表现得很出色。我们已经看到了对抗性（不同团队）和合作性（同一团队）学习模式如何影响代理应对环境的能力。我们可以使用除了PPO之外的不同算法，例如SAC（或其他软Q学习技术）来观察训练过程中的差异。虽然网球环境是一个基于纯粹竞争（对抗性）学习的环境，但在足球环境中，我们既有对抗性也有合作性学习的味道。我们必须记住，我们还可以更改超参数属性，包括我们在上一章中提到的Model.py脚本中存在的神经网络参数，并观察输出的变化。值得注意的是，我们可以观察到改变循环网络属性（LSTM网络属性）如何改变代理的学习。
- en: Building an Autonomous AI Agent for a Mini Kart Game
  id: totrans-251
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为迷你卡丁车游戏构建一个自主人工智能代理
- en: We will now build an autonomous driving agent for a miniature Kart game using
    ML Agents. We will be training this on PPO policy as well, but any other policies
    can be used. In this scenario, the agent has to reach the destination by moving
    along a small racetrack. The catch is that the racetrack is curved, and the agent
    should be able to navigate seamlessly through it. As the path length increases,
    the training episode length also increases. Since we will not be using visual
    observation sensors (no CNNs), we will be primarily focusing on using ray perception
    sensors to get information from the current position of the agent, the distance
    from the goal as well as the current direction. For this we will be opening the
    Tinyagent Unity scene. This is a miniature version of a racetrack Kart game where
    only one agent is present. If we can make the agent learn the trajectory to reach
    the goal, we can even extend it to create a full-fledged game using more such
    competitive agents (along with curriculum learning). The scene appears as shown
    in Figure [6-21](#Fig22).
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将使用ML Agents构建一个微型卡丁车游戏的自主驾驶代理。我们还将使用PPO策略进行训练，但也可以使用其他策略。在这个场景中，代理必须沿着一个小赛道移动以到达目的地。难点在于赛道是弯曲的，代理应该能够无缝地通过它。随着路径长度的增加，训练阶段的长度也会增加。由于我们不会使用视觉观察传感器（没有CNN），我们将主要关注使用射线感知传感器从代理的当前位置、目标距离以及当前方向获取信息。为此，我们将打开Tinyagent
    Unity场景。这是一个迷你版的赛道卡丁车游戏，其中只有一个代理。如果我们能让代理学会到达目标的轨迹，我们甚至可以扩展它，使用更多这样的竞争性代理（以及课程学习）来创建一个完整的游戏。场景如图[6-21](#Fig22)所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig22_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig22_HTML.jpg)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig22_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig22_HTML.jpg)'
- en: Figure 6-21
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-21
- en: Autonomous AI agent in tiny agent Unity scene
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 在微型代理Unity场景中的自主人工智能代理
- en: 'We have an agent (blue-colored) that is inside a Kart. The agent has a RayPerceptionSensorComponent3D
    script for collecting the observations. It also has the Behavior Parameters, Model
    Overrider, and Decision Requester scripts attached with it. For this case, we
    are using a discrete distribution and let us explore the Tinyagent script. The
    main idea behind designing is that the agent computes the distance between the
    target and its current position. For any movement along the direction of the target,
    the agent is incrementally rewarded. If the agent crashes against the boundary
    of the poles, then it gets a negative reward. The time for reaching the goal is
    also a factor in deciding the rewards—the more the time it takes, the more penalty
    the agent receives. As we progress, we will see that we compute the direction
    as well as the relative distance between the agent (Kart) and the destination.
    If the agent moves in the opposite direction as the target, then it also gets
    a negative reward. With this concept, let us understand the script. The script
    contains the variables such as the game objects, the target, and the current position
    of the agent with respect to the target. It also controls materials for coloring
    the ground when it collides with the track boundaries (red) or on reaching the
    destination (green). For computing the relative distance, we will be using three
    variables: prev_spawn_dist, prev_target_dist, and prev_dist. These are used for
    adjusting the positions of the agent at the start of each episode of training
    and also to compute the distance from the target.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一个位于卡车内部的代理（蓝色）。代理有一个 RayPerceptionSensorComponent3D 脚本来收集观察结果。它还附带了行为参数、模型覆盖器和决策请求器脚本。对于这种情况，我们使用离散分布，让我们来探索
    Tinyagent 脚本。设计背后的主要思想是代理计算目标与其当前位置之间的距离。对于沿目标方向的任何移动，代理都会逐渐获得奖励。如果代理撞到极地的边界，则它将获得负面奖励。达到目标所需的时间也是决定奖励的一个因素——所需时间越长，代理收到的惩罚就越大。随着我们的进展，我们将看到我们不仅计算了代理（卡车）与目的地之间的方向，还计算了相对距离。如果代理向与目标相反的方向移动，它也会获得负面奖励。有了这个概念，让我们来理解这个脚本。脚本包含诸如游戏对象、目标以及代理相对于目标的当前位置等变量。它还控制着当与赛道边界（红色）碰撞或达到目的地时（绿色）用于着色的材料。为了计算相对距离，我们将使用三个变量：prev_spawn_dist、prev_target_dist
    和 prev_dist。这些用于调整每个训练周期的开始时代理的位置，以及计算从目标到代理的距离。
- en: '[PRE46]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: We then have the “Initialize” overridden method, which initializes the target
    position, and the Kart agent position assigns its rigidbody component.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们有“Initialize”覆盖方法，它初始化目标位置，并将 Kart 代理位置分配给其刚体组件。
- en: '[PRE47]'
  id: totrans-259
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: We then have the “CollectObservations” method, which is used for collecting
    discrete vector observations. It computes the relative distance between the Kart
    and the destination and uses it as an observation. The velocity of the agent (Kart)
    is also taken as an observation.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们有“CollectObservations”方法，用于收集离散向量观察结果。它计算卡车与目的地之间的相对距离，并将其用作观察结果。代理（卡车）的速度也被视为观察结果。
- en: '[PRE48]'
  id: totrans-261
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Then we have the MoveAgent script, which controls the motion of the Kart depending
    on the observation received from the sensors. Since the agent can move in the
    forward and up direction and can also rotate along a particular axis, we have
    a total of 6 vectors in the action spaces, -2 for each x and z axes for rectilinear
    motion (positive and negative), and 2 along the rotational axis. Then we use the
    AddForce component to add a force to the Kart agent.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们有 MoveAgent 脚本，它根据从传感器接收到的观察结果来控制卡车的运动。由于代理可以向前和向上移动，并且还可以沿着特定轴旋转，因此动作空间中总共有
    6 个向量，每个 x 轴和 z 轴有 -2 个用于直线运动（正负），以及沿着旋转轴有 2 个。然后我们使用 AddForce 组件向 Kart 代理添加力。
- en: '[PRE49]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Then we have the “OnActionReceived” overridden method, which controls the distance
    of the Kart from the starting position, as well as from the destination. This
    is required because the agent gets credited if its distance increases from the
    starting position. For every forward motion toward the target, the agent gets
    a reward of 0.009 units, and on reaching the target, it gets a reward of 5 units.
    For every time-step the agent does not reach the vicinity of the target, it gets
    a negative credit of -0.005 units. To prevent the agent from moving along the
    y axis, a negative reward of -2 units is added each time the Kart topples. We
    can create more such conditions according to our will to change the environment
    reward signals.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们有“OnActionReceived”重写方法，它控制赛车与起始位置以及目标之间的距离。这是必需的，因为如果智能体的距离从起始位置增加，它将获得奖励。对于每个朝向目标的正向移动，智能体获得
    0.009 单位的奖励，并且在到达目标时获得 5 单位的奖励。对于每个智能体没有到达目标附近的时间步，它获得 -0.005 单位的负奖励。为了防止智能体沿着
    y 轴移动，每次赛车翻倒时都会增加 -2 单位的负奖励。我们可以根据我们的意愿创建更多此类条件来改变环境奖励信号。
- en: '[PRE50]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: The “OnCollisionEnter” method is used for checking whether the Kart has collided
    with the boundary of the track or has reached the destination. For the former
    case, a negative reward of -0.5 units is credited and the episode is terminated,
    very similar to the case when in a racing game we collide with the boundary and
    are eliminated. For the latter case, we again receive a positive reward of 3 units
    and the ground color changes (green), signaling that the agent has reached the
    goal.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: “OnCollisionEnter”方法用于检查赛车是否与赛道边界发生碰撞或已到达目的地。对于前者，会获得 -0.5 单位的负奖励，并终止该集，这与在赛车游戏中碰撞边界并被淘汰的情况非常相似。对于后者，我们再次获得
    3 单位的正奖励，地面颜色变为（绿色），这表示智能体已达到目标。
- en: '[PRE51]'
  id: totrans-267
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Then we have the “OnEpisodeBegin” method, which calls the “Reset” method to
    reset the scene at the start of every episode. It places the Kart at the starting
    position again and resets its velocity, angular velocity, and also its rotation.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们有“OnEpisodeBegin”方法，该方法在每集开始时调用“Reset”方法来重置场景。它将赛车放置在起始位置，并重置其速度、角速度以及旋转。
- en: '[PRE52]'
  id: totrans-269
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: That conclusively completes the agent script. We have created an autonomous
    agent that will be using ray sensors to collect observations to reach the target.
    Now we have to train this agent.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 这样就完成了智能体脚本的编写。我们已经创建了一个将使用射线传感器收集观察结果以到达目标的自主智能体。现在我们必须训练这个智能体。
- en: Training Tiny Agent with PPO Policy
  id: totrans-271
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 PPO 策略训练小型智能体
- en: 'We will be using the default hyperparameters of PPO to train this agent, but
    it has to be mentioned that in this case we are not using curriculum learning.
    It is left for the reader to create a yaml script for training this agent with
    curriculum learning (task-specific) by following the previous sections. Since
    this is a practically challenging environment, this requires several hours (days
    even) for training on a CPU. Thus it is recommended to train this with curriculum
    learning approach by creating a yaml script that controls the start position of
    the Kart agent. In the initial stages, we can position the agent closer to the
    target so that it comes in direct line of sight, and the agent can get credited
    with rewards. For successive levels of training, the position can be changed by
    moving the agent far from the target position. We use the command:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用 PPO 的默认超参数来训练这个智能体，但必须指出的是，在这种情况下，我们并没有使用课程学习。读者可以根据前几节的内容创建一个 yaml 脚本，以课程学习（任务特定）的方式训练这个智能体。由于这是一个实际操作具有挑战性的环境，这需要在
    CPU 上训练数小时（甚至数天）。因此，建议通过创建一个控制 Kart 智能体起始位置的 yaml 脚本来使用课程学习方法进行训练。在初始阶段，我们可以将智能体放置得更靠近目标，以便它能够直接看到目标，并且智能体可以获得奖励。对于后续的训练级别，可以通过将智能体移动到远离目标位置来改变位置。我们使用的命令是：
- en: '[PRE53]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Tuning the hyperparameters can also be done to find the different characteristic
    parameters that affect the agent. Training the Kart agent appears as shown in
    Figure [6-22](#Fig23).
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 调整超参数也可以用来找到影响智能体的不同特征参数。如图 [6-22](#Fig23) 所示，Kart 智能体的训练过程如下。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig23_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig23_HTML.jpg)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig23_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig23_HTML.jpg)'
- en: Figure 6-22
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-22
- en: Training tiny agent with PPO policy in ML Agents
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ML Agents 中使用 PPO 策略训练小型智能体
- en: Visualization and Future Work
  id: totrans-278
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化和未来工作
- en: 'Let us visualize this training in Tensorboard. This can be done by using the
    command:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在Tensorboard中可视化这个训练过程。这可以通过以下命令完成：
- en: '[PRE54]'
  id: totrans-280
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: The visualization provides an estimate of the cumulative rewards and epoch loss
    for the Kart agent. A typical visualization is shown in Figure [6-23](#Fig24).
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化提供了Kart代理的累积奖励和epoch损失的估计。典型的可视化如图[6-23](#Fig24)所示。
- en: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig24_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig24_HTML.jpg)'
  id: totrans-282
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_6_Chapter/502041_1_En_6_Fig24_HTML.jpg](../images/502041_1_En_6_Chapter/502041_1_En_6_Fig24_HTML.jpg)'
- en: Figure 6-23
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-23
- en: Tensorboard visualization of tiny agent
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: Tensorboard中微型代理的可视化
- en: This project is a starting point for further development by the readers. The
    template provides the sample for building an autonomous AI agent that can navigate
    through certain terrains in the environment. If we place several other such Kart
    agents in the scene and simultaneously train all of them using the PPO/SAC policy,
    we can build an AI-based racing game. However, training these agents requires
    a huge amount of time (probably days for multiple agents). We can also create
    the curriculum learning script to include adversarial components in case of a
    multi-agent Kart game. After all the agents are trained, we can play against those
    trained agents and see who comes first.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目是读者进一步发展的起点。模板提供了构建一个能够在环境中导航特定地形的自主AI代理的样本。如果我们场景中放置几个这样的Kart代理，并使用PPO/SAC策略同时训练所有这些代理，我们可以构建一个基于AI的赛车游戏。然而，训练这些代理需要大量的时间（可能需要多天来训练多个代理）。我们还可以创建包含对抗性组件的课程学习脚本，以应对多智能体Kart游戏的情况。所有代理训练完成后，我们可以与这些训练过的代理进行比赛，看看谁先到达。
- en: Summary
  id: totrans-286
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'This completes the chapter that has been a descriptive projection of the different
    aspects of curriculum learning and adversarial Learning as well as creating simulations
    and games. To summarize:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了对课程学习、对抗性学习以及创建模拟和游戏的不同方面的描述性投影。总结如下：
- en: We studied curriculum learning and its different branches, including task-specific
    learning, teacher student curriculum learning, as well as automatic goal generation
    using goal GAN algorithms.
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们研究了课程学习及其不同分支，包括任务特定学习、教师-学生课程学习和使用目标GAN算法自动生成目标。
- en: We then visualized the steps to train the Wall Jump environment in ML Agents
    with the help of PPO-based curriculum learning.
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在ML Agents中利用基于PPO的课程学习，可视化了训练Wall Jump环境的步骤。
- en: The next section was based on extended deep RL algorithms, including the off-policy
    DDPG algorithm. We also covered the variants of DDPG including TD3, D4P,G and
    MADDPG algorithms. We used the OpenAI Gym Stable Baselines implementation of the
    algorithms for training the environments.
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一个部分是基于扩展的深度强化学习算法，包括离策略DDPG算法。我们还涵盖了DDPG的变体，包括TD3、D4PG、MADDPG算法。我们使用OpenAI
    Gym Stable Baselines实现这些算法来训练环境。
- en: Next we learned about adversarial self-play and cooperative learning, which
    is important in the context of multi-agent-based games and simulations. We saw
    the contrast between the two forms of learning and also understood the importance
    of self-play. We then visualized this process using the Soccer environment and
    trained it using the PPO policy.
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，我们学习了对抗性自玩和协作学习，这在基于多智能体的游戏和模拟的背景下非常重要。我们对比了两种学习形式，并理解了自玩的重要性。然后，我们使用足球环境可视化了这一过程，并使用PPO策略进行训练。
- en: The last section was based on building an autonomous AI agent for a miniature
    Kart game. The agent had to reach the target from a given starting position without
    colliding with the track boundary. We trained this agent with the PPO policy of
    ML Agents and visualized the training process with Tensorboard. There are further
    scopes in terms of building more autonomous agent-based racing games with this
    template.
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后一个部分是基于构建微型Kart游戏的自主AI代理。代理必须从给定的起始位置到达目标，而不与赛道边界相撞。我们使用ML Agents的PPO策略训练了这个代理，并使用Tensorboard可视化了训练过程。在这个模板的基础上，我们可以进一步构建更多基于自主代理的赛车游戏。
- en: In the next and the last chapter, we will be focusing on additional algorithms,
    certain case studies from Unity Technologies, as well as different platforms for
    deep RL.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章和最后一章中，我们将关注额外的算法、Unity Technologies的一些案例研究以及不同的深度强化学习平台。
