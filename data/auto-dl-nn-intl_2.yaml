- en: '| `l1_size` | Output size of first linear layer | 512, 1024, 2048 |'
  id: totrans-523
  prefs: []
  type: TYPE_TB
  zh: '| `l1_size` | 第一个线性层的输出大小 | 512, 1024, 2048 |'
- en: '| `l2_size` | Output size of second linear layer | 0, 512, 1024If 0 value is
    chosen, then the second linear layer is skipped |'
