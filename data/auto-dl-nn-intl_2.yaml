- en: Since the feature extraction component of the LeNet Evolution model returns
    more features than it did with the MNIST problem, we should also let the experiment
    create a more advanced decision maker component. The decision maker component
    can be improved by adding an extra linear layer. This is the easiest and most
    efficient way to enhance a decision maker component. Since we proved the sustainability
    of the dropout layer and ReLU activation in the previous section, they will also
    be used in the decision maker component. Figure [2-21](#Fig21) demonstrates two
    variants of the decision maker component.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 LeNet 进化模型的特征提取组件返回的特征比 MNIST 问题中多，因此我们应让实验创建一个更高级的决策组件。可以通过添加一个额外的线性层来改进决策组件。这是增强决策组件最简单、最有效的方法。由于我们在上一节中证明了
    dropout 层和 ReLU 激活的可持续性，它们也将用于决策组件。图 [2-21](#Fig21) 展示了决策组件的两个变体。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig21_HTML.png)'
