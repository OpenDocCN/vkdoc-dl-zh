  zh: 此外，我们还将使用 `learning_rate` 作为训练超参数，以下为可选项：0.001, 0.0001。
- en: In this experiment, we are not just looking for the best hyperparameters, but
    we are trying to create a new architecture of the deep learning model based on
    the principles of the original LeNet model. Here, we try not just to tune an existing
