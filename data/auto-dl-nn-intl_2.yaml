- en: '[PRE87]'
  id: totrans-435
  prefs: []
  type: TYPE_PRE
  zh: '[PRE87]'
- en: And after implementing `LeNetUpgradeModel`, we can implement the NNI trial script using
    Listing [2-19](#PC89).
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现`LeNetUpgradeModel`之后，我们可以使用列表[2-19](#PC89)来实现NNI试验脚本。
- en: 'We import necessary modules and pass code root directory to system path:'
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 我们导入必要的模块并将代码根目录传递到系统路径：
- en: '[PRE88]'
  id: totrans-438
  prefs: []
  type: TYPE_PRE
  zh: '[PRE88]'
- en: 'The `trial` method initializes the model, trains it, tests it, and returns
    the NNI metric:'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: '`trial`方法初始化模型，训练它，测试它，并返回NNI指标：'
- en: '[PRE89]'
  id: totrans-440
  prefs: []
  type: TYPE_PRE
  zh: '[PRE89]'
- en: 'Next, we define the main entry point for the trial:'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义试验的主要入口点：
- en: '[PRE90]'
  id: totrans-442
  prefs: []
  type: TYPE_PRE
  zh: '[PRE90]'
- en: Remember that a trial script can be executed in stand-alone mode, so you can
    run a ch2/lenet_upgrade/pt_trial.py to test its execution with custom parameters.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，试验脚本可以在独立模式下执行，因此你可以运行`ch2/lenet_upgrade/pt_trial.py`来测试其使用自定义参数的执行情况。
- en: Performing LeNet Upgrade HPO Experiment
  id: totrans-444
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 执行LeNet升级HPO实验
- en: We are now ready to run our second experiment. We can consider this experiment
    as a battle between Vanilla LeNet model and LeNet enhanced by ReLU and dropout.
    Please be aware that the results of this study will be specific to the MNIST problem.
    An experiment launched on a different dataset can lead to completely different
    results. Listing [2-20](#PC92) defines the configuration of the LeNet Upgrade
    experiment.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以运行我们的第二个实验了。我们可以将这个实验视为Vanilla LeNet模型与通过ReLU和dropout增强的LeNet之间的战斗。请注意，这项研究的结果将特定于MNIST问题。在数据集上启动的实验可能会导致完全不同的结果。列表[2-20](#PC92)定义了LeNet升级实验的配置。
- en: '[PRE91]'
  id: totrans-446
  prefs: []
  type: TYPE_PRE
  zh: '[PRE91]'
- en: 'We will limit the number of trials:'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将限制试验次数：
- en: '[PRE92]'
  id: totrans-448
  prefs: []
  type: TYPE_PRE
  zh: '[PRE92]'
- en: 'Uncomment PyTorch trial line to run the experiment using PyTorch implementation:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 取消注释PyTorch试验行以使用PyTorch实现运行实验：
- en: '[PRE93]'
  id: totrans-450
  prefs: []
  type: TYPE_PRE
  zh: '[PRE93]'
- en: 'GridSearch Tuner cannot be used for search spaces that utilize nested choice,
    so we pick Random Search Tuner:'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: GridSearch Tuner不能用于使用嵌套选择的搜索空间，所以我们选择Random Search Tuner：
- en: '[PRE94]'
  id: totrans-452
  prefs: []
  type: TYPE_PRE
  zh: '[PRE94]'
- en: 'The experiment can be run as follows:'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 实验可以按以下方式进行：
- en: '[PRE95]'
  id: totrans-454
  prefs: []
  type: TYPE_PRE
  zh: '[PRE95]'
- en: Note
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Duration ~ 3 hours on Intel Core i7 with CUDA (GeForce GTX 1050)
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 在Intel Core i7和CUDA（GeForce GTX 1050）上运行时间为约3小时
- en: 'The experiment returned the following best trial hyperparameters:'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 实验返回了以下最佳试验超参数：
- en: '`activation``:` relu'
  id: totrans-458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`activation`: relu'
- en: '`use_dropout``:` 1'
  id: totrans-459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`use_dropout`: 1'
- en: '`rate``:` 0.5'
  id: totrans-460
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`rate`: 0.5'
- en: '`filter_size``:` 32'
  id: totrans-461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`filter_size`: 32'
- en: '`kernel_size``:` 5'
  id: totrans-462
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kernel_size`: 5'
- en: '`l1_size``:` 256'
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`l1_size`: 256'
- en: '`batch_size``:` 512'
  id: totrans-464
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`batch_size`: 512'
- en: '`learning_rate``:` 0.001'
  id: totrans-465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`learning_rate`: 0.001'
- en: The best trial demonstrated a **0.9923** result, which is a significant improvement
    over the 0.9885 we got in the previous section. We see that the best hyperparameter
    combination uses ReLU activation and dropout (p=0.5) layer. Could this mean that
    LeNet empowered by ReLU and dropout won this battle? Let’s look at the top 1%
    trials in the hyperparameter panel (Figure [2-16](#Fig16)) to answer this question.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳试验展示了**0.9923**的结果，这比我们在上一节中获得的0.9885有显著改进。我们看到最佳超参数组合使用了ReLU激活和dropout（p=0.5）层。这难道意味着通过ReLU和dropout增强的LeNet赢得了这场战斗？让我们看看超参数面板（图[2-16](#Fig16)）中排名前1%的试验，以回答这个问题。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig16_HTML.jpg)'
  id: totrans-467
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig16_HTML.jpg)'
- en: Figure 2-16
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-16
- en: Hyperparameter panel of LeNet Upgrade HPO top 1% trials
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet升级HPO前1%试验的超参数面板
- en: 'Figure [2-16](#Fig16) demonstrates that all three best hyperparameter combinations
    have the following hyperparameter values:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-16](#Fig16)表明，所有三个最佳超参数组合都具有以下超参数值：
- en: '`activation`: relu'
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`activation`: relu'
- en: '`use_dropout`: 1'
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`use_dropout`: 1'
- en: which can be considered as solid evidence in favor of using the ReLU and dropout
    techniques. Of course, this result may seem somewhat obvious, but this is only
    because you already know about the benefits of using ReLU and dropout layers.
    Initially, this fact did not seem so obvious and required practical evidence,
    which we have just demonstrated.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以被视为使用ReLU和dropout技术的有力证据。当然，这个结果可能看起来有些明显，但这仅仅是因为你已经知道了使用ReLU和dropout层的益处。最初，这个事实并不那么明显，需要实际证据，这正是我们刚刚展示的。
- en: Finally, let’s take a look at the MNIST database samples that the upgraded LeNet
    model failed to classify. These samples are presented in Figure [2-17](#Fig17).
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们看看升级版LeNet模型未能分类的MNIST数据库样本。这些样本在图[2-17](#Fig17)中展示。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig17_HTML.jpg)'
  id: totrans-475
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig17_HTML.jpg)'
- en: Figure 2-17
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-17
- en: Upgraded LeNet model fails
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 升级版LeNet模型失败
- en: 'I deliberately didn’t print the correct results in Figure [2-17](#Fig17). Take
    one minute, write down your answer for each sample, and compare it with the correct
    answers in the following:'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 我故意没有在图[2-17](#Fig17)中打印出正确的结果。花一分钟，为每个样本写下你的答案，并与以下正确答案进行比较：
- en: '*Answers. #1: 9\. #2: 7\. #3: 7\. #4: 0\. #5: 2\. #6: 8\. #7: 2\. #8: 9\. #9\.
    8*'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: '*答案。 #1: 9。 #2: 7。 #3: 7。 #4: 0。 #5: 2。 #6: 8。 #7: 2。 #8: 9。 #9: 8*。'
- en: If you haven’t made a single mistake, then I admire you! I guessed only four
    numbers. If a human has difficulties recognizing some handwritten characters,
    then the neural network is already close to its performance threshold. The current
    result of the upgraded LeNet model we have developed is close to the best.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你一个错误都没有犯，那么我真的很佩服你！我猜对了四个数字。如果人类在识别一些手写字符时都有困难，那么神经网络已经接近其性能阈值。我们开发的升级版LeNet模型的当前结果已经接近最佳。
- en: This section demonstrates how new deep learning techniques can be injected into
    existing architecture. We defined a search space to choose the best design combination.
    HPO chose an upgraded model design that significantly improved the performance
    of the original model. And this is a very simple and useful technique that will
    allow you to uptune your models using the latest advances in machine learning.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 本节展示了如何将新的深度学习技术注入现有架构。我们定义了一个搜索空间来选择最佳的设计组合。HPO选择了一个升级的模型设计，显著提高了原始模型的表现。这是一个非常简单且有用的技术，将允许你使用机器学习的最新进展来优化你的模型。
- en: From LeNet to AlexNet
  id: totrans-482
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从LeNet到AlexNet
- en: 'Libraries: TensorFlow (Keras API), PyTorch (PyTorch Lightning)'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 库：TensorFlow（Keras API）、PyTorch（PyTorch Lightning）
- en: Well, handwriting recognition is a rather important task, but it seems that
    it’s time to move on to more complicated problems. Let’s try to classify more
    complex objects. How about developing a model that will classify humans and horses?
    Figure [2-18](#Fig18) shows samples of “humans or horses” dataset. This dataset
    contains 300×300 color images, that is, (300, 300, 3) tensors. Obviously, the
    image of a human or a horse is more complex than a 28×28 grayscale image of a
    handwritten number. And perhaps, we will need to evolve the LeNet model that we
    considered earlier. We will call it *LeNet Evolution* model.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，手写识别是一个相当重要的任务，但似乎是我们应该转向更复杂的问题的时候了。让我们尝试对更复杂的对象进行分类。开发一个能够对人类和马进行分类的模型怎么样？图[2-18](#Fig18)显示了“人类或马”数据集的样本。这个数据集包含300×300彩色图像，即（300，300，3）张量。显然，人类或马的图像比手写数字的28×28灰度图像更复杂。也许，我们需要进化之前考虑的LeNet模型。我们将称之为*LeNet进化*模型。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig18_HTML.jpg)'
  id: totrans-485
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig18_HTML.jpg)'
- en: Figure 2-18
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-18
- en: Humans vs. horses dataset
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 人马数据集
- en: 'Let’s look at the architecture of the LeNet model again. LeNet model design
    can be divided into two components: *feature extraction* and *decision making*.
    Indeed, the convolution layer stack (*Conv2D → Activation → MaxPool2D → Conv2D
    → Activation → MaxPool2D → Flatten*) is responsible for extracting image patterns,
    that is, feature extraction. At the same time, the fully connected layer stack
    (*Linear → Activation → Linear → SoftMax*) is responsible for selecting particular
    patterns to classify an input object. Figure [2-19](#Fig19) shows the areas of
    responsibility for each component.'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次看看LeNet模型的架构。LeNet模型的设计可以分为两个部分：*特征提取*和*决策制定*。实际上，卷积层堆叠（*Conv2D → Activation
    → MaxPool2D → Conv2D → Activation → MaxPool2D → Flatten*）负责提取图像模式，即特征提取。同时，全连接层堆叠（*Linear
    → Activation → Linear → SoftMax*）负责选择特定的模式以对输入对象进行分类。图[2-19](#Fig19)显示了每个组件的责任区域。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig19_HTML.png)'
  id: totrans-489
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig19_HTML.png)'
- en: Figure 2-19
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-19
- en: Feature extraction and decision maker components
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 特征提取和决策制定组件
- en: 'Since human and horse images are more complex, we need to make the feature
    extraction component more sophisticated. Two types of layer sequences are usually
    responsible for extracting image patterns: *Conv2D → Activation → MaxPool2D* and
    *Conv2D → Activation*. We can build an experiment that will inject different feature
    extraction sequences to find the best model design to solve the “human and horses”
    classification problem. In the following, we define three types of feature extraction
    layer sequences adding `none` as an empty sequence:'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 由于人类和马的图像更复杂，我们需要使特征提取组件更加复杂。通常有两种类型的层序列负责提取图像模式：*Conv2D → Activation → MaxPool2D*和*Conv2D
    → Activation*。我们可以构建一个实验，将不同的特征提取序列注入其中，以找到解决“人类和马”分类问题的最佳模型设计。以下，我们定义了三种类型的特征提取层序列，添加`none`作为空序列：
- en: '`simple`: *Conv2D → Activation*'
  id: totrans-493
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`simple`: *Conv2D → Activation*'
- en: '`with_pool`: *Conv2D → Activation → MaxPool2D*'
  id: totrans-494
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`with_pool`: *Conv2D → Activation → MaxPool2D*'
- en: '`none`: Identity layer'
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`none`: 标识层'
- en: 'Each feature extraction sequence will have additional layer hyperparameters:
    `filters`, `kernel`, `pool_size`.'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 每个特征提取序列将具有额外的层超参数：`filters`、`kernel`、`pool_size`。
- en: 'Let the LeNet Evolution model have three pattern extraction slots. Each of
    these slots can be filled with one of the feature extraction sequences: `simple`,
    `with_pool`, `none`. For example, a LeNet Evolution model can have three feature
    extraction slots filled with the following layer sequences:'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 让LeNet进化模型有三个模式提取槽位。每个槽位都可以填充以下特征提取序列之一：`simple`、`with_pool`、`none`。例如，一个LeNet进化模型可以有如下层序列填充的三个特征提取槽位：
- en: '`with_pool`: *Conv2D(*`kernel_size`*=5,* `filters`*=16) → Activation → MaxPool2D(*`pool_size`*=3)*'
  id: totrans-498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`with_pool`: *Conv2D(*`kernel_size`*=5,* `filters`*=16) → 激活 → MaxPool2D(*`pool_size`*=3)*'
- en: '`none`: Identity'
  id: totrans-499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`none`: 标识符'
- en: '`simple`: *Conv2D(*`kernel_size`*=3,* `filters`*=8)→ Activation*'
  id: totrans-500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`simple`: *Conv2D(*`kernel_size`*=3,* `filters`*=8)→ 激活*'
- en: 'And finally, the LeNet Evolution feature extraction component will look the
    following way: *Conv2D(*`kernel_size`*=5,* `filters`*=16) → Activation → MaxPool2D(*`pool_size`*=3)
    → Conv2D(*`kernel_size`*=3,* `filters`*=8) → Activation*.'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，LeNet 进化特征提取组件将呈现如下形式：*Conv2D(*`kernel_size`*=5,* `filters`*=16) → 激活 → MaxPool2D(*`pool_size`*=3)
    → Conv2D(*`kernel_size`*=3,* `filters`*=8) → 激活*。
- en: We can consider feature extraction sequences as the building blocks of the LeNet
    Evolution model, as shown in Figure [2-20](#Fig20).
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将特征提取序列视为 LeNet 进化模型的构建块，如图 [2-20](#Fig20) 所示。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig20_HTML.png)'
  id: totrans-503
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig20_HTML.png)'
- en: Figure 2-20
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-20
- en: LeNet Evolution feature extraction component
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 进化特征提取组件
- en: And so we can define the three design hyperparameters of the LeNet Evolution
    model. Table [2-4](#Tab4) provides LeNet Evolution model design hyperparameters.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以定义 LeNet 进化模型的三个设计超参数。表 [2-4](#Tab4) 提供了 LeNet 进化模型设计超参数。
- en: Table 2-4
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-4
- en: LeNet Evolution feature extraction hyperparameters
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 进化特征提取超参数
- en: '| Name | Description | Values |'
  id: totrans-509
  prefs: []
  type: TYPE_TB
  zh: '| 名称 | 描述 | 值 |'
- en: '| --- | --- | --- |'
  id: totrans-510
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| `fe_slot_1` | Feature Extraction Sequence 1 | • `none`• `simple`  • `filters`:
    8, 16, 32  • `kernel`: 5, 7, 9, 11• `with_pool:`  • `filters`: 8, 16, 32  • `kernel`:
    5, 7, 9, 11  • `pool_size:` 3, 5, 7 |'
  id: totrans-511
  prefs: []
  type: TYPE_TB
  zh: '| `fe_slot_1` | 特征提取序列 1 | • `none`• `simple`  • `filters`: 8, 16, 32  • `kernel`:
    5, 7, 9, 11• `with_pool:`  • `filters`: 8, 16, 32  • `kernel`: 5, 7, 9, 11  • `pool_size:`
    3, 5, 7 |'
- en: '| `fe_slot_2` | Feature Extraction Sequence 2 | • `none`• `simple`  • `filters`:
    8, 16, 32  • `kernel:` 5, 7, 9, 11  • `with_pool:`  • `filters`: 8, 16, 32  • `kernel`:
    5, 7, 9, 11  • `pool_size:` 3, 5, 7 |'
  id: totrans-512
  prefs: []
  type: TYPE_TB
  zh: '| `fe_slot_2` | 特征提取序列 2 | • `none`• `simple`  • `filters`: 8, 16, 32  • `kernel:`
    5, 7, 9, 11  • `with_pool:`  • `filters`: 8, 16, 32  • `kernel`: 5, 7, 9, 11  • `pool_size:`
    3, 5, 7 |'
- en: '| `fe_slot_3` | Feature Extraction Sequence 3 | • `none`• `simple`  • `filters`:
    8, 16, 32  • `kernel`: 5, 7, 9, 11• `with_pool:`  • `filters`: 8, 16, 32  • `kernel`:
    5, 7, 9, 11  • `pool_size:` 3, 5, 7 |'
  id: totrans-513
  prefs: []
  type: TYPE_TB
  zh: '| `fe_slot_3` | 特征提取序列 3 | • `none`• `simple`  • `filters`: 8, 16, 32  • `kernel`:
    5, 7, 9, 11• `with_pool:`  • `filters`: 8, 16, 32  • `kernel`: 5, 7, 9, 11  • `pool_size:`
