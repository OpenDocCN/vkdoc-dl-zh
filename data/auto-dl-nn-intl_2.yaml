- en: Upgrading LeNet with ReLU and Dropout
  id: totrans-382
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用ReLU和Dropout升级LeNet
- en: 'Libraries: TensorFlow (Keras API), PyTorch'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 库：TensorFlow (Keras API), PyTorch
- en: 'Experienced data scientists may have the question: Hey?! Why didn’t we use
    the dropout layer and rectified linear unit (ReLU) as the activation function
    for LeNet model in the previous section? Because the original LeNet model did
    not use the ReLU activation. And the dropout technique was first introduced in
    2012, 22 years after creating the LeNet architecture. One of the main problems
    with the LeNet concept was that it used sigmoid as an activation function. The
    sigmoid activation function led to slower training and a vanishing gradient problem.
    The dropout technique is also one of the most popular regularization methods.
    Nowadays, we cannot imagine a successful pattern recognition model that does not
    use ReLU and dropout layers. Let’s pretend that we have never heard anything about
    ReLU and dropout, and someone advises us to inject these techniques into a LeNet
    model to improve its performance. We can do research using HPO that will help
    us find the best architecture.'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 经验丰富的数据科学家可能会提出这样的问题：嘿？！为什么在前一节我们没有使用dropout层和ReLU作为LeNet模型的激活函数呢？因为原始的LeNet模型并没有使用ReLU激活函数。而dropout技术首次是在2012年提出的，距离LeNet架构的创建已有22年。LeNet概念的主要问题之一是它使用了sigmoid作为激活函数。sigmoid激活函数导致了训练速度变慢和梯度消失问题。dropout技术也是最受欢迎的正则化方法之一。如今，我们无法想象一个不使用ReLU和dropout层的成功模式识别模型。让我们假设我们从未听说过ReLU和dropout，有人建议我们将这些技术注入LeNet模型以提升其性能。我们可以通过HPO进行研究，这将帮助我们找到最佳架构。
- en: Let’s introduce an `activation` design hyperparameter responsible for choosing
    the activation function. To simplify the problem, we will use a one-for-all policy.
    This means that if the `activation` hyperparameter has a `sigmoid` value, then
    the LeNet model will have a sigmoid function for all activations. The same is
    true if `activation` has a `relu` value. Figure [2-14](#Fig14) presents `activation`
    hyperparameter.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们引入一个负责选择激活函数的`激活`设计超参数。为了简化问题，我们将使用一种“一刀切”的政策。这意味着如果`激活`超参数的值为`sigmoid`，那么LeNet模型将使用sigmoid函数作为所有激活函数。如果`激活`的值为`relu`，情况也是如此。图[2-14](#Fig14)展示了`激活`超参数。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig14_HTML.png)'
  id: totrans-386
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig14_HTML.png)'
- en: Figure 2-14
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-14
- en: Activation design hyperparameter
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 激活设计超参数
- en: 'Typically, a dropout layer is inserted between linear layers. But we initially
    do not know whether this technique would be effective, so we have to make possible
    two variants of LeNet architecture: with dropout layer and without dropout layer.
    To do this, we use the `use_dropout` design hyperparameter. If `use_dropout` is
    `0`, then the LeNet model does not use the dropout layer, and if `use_dropout`
    is `1`, then the LeNet model uses the dropout layer. At the same time, the dropout
    layer will be tested using three different *p* (dropout rate) values: 0.3, 0.5,
    and 0.7\. Figure [2-15](#Fig15) presents `use_dropout` design hyperparameter.'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，dropout层会被插入到线性层之间。但我们最初并不知道这项技术是否有效，因此我们必须制作两种可能的LeNet架构变体：带有dropout层和不带有dropout层。为此，我们使用`use_dropout`设计超参数。如果`use_dropout`为`0`，则LeNet模型不使用dropout层；如果`use_dropout`为`1`，则LeNet模型使用dropout层。同时，dropout层将使用三种不同的*p*（dropout率）值进行测试：0.3、0.5和0.7。图[2-15](#Fig15)展示了`use_dropout`设计超参数。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig15_HTML.png)'
  id: totrans-390
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig15_HTML.png)'
- en: Figure 2-15
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-15
- en: Dropout design hyperparameter
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout设计超参数
- en: 'Each model design works well with specific layer hyperparameters. Therefore,
    we also need to include layer hyperparameters in the search space. In this experiment,
    we will use the same hyperparameters we used in the previous section. But we will
    choose slightly different values ​​for them:'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 每个模型设计都与特定的层超参数相匹配。因此，我们还需要将层超参数包含在搜索空间中。在这个实验中，我们将使用与上一节相同的超参数。但我们将选择稍微不同的值：
