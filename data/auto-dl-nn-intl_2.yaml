- en: LeNet Evolution decision maker component
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 进化决策组件
- en: The design of the decision maker component will be determined by the following
    hyperparameters shown in Table [2-5](#Tab5).
