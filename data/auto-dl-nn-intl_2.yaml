- en: 'Uncomment PyTorch trial line to run the experiment using PyTorch implementation:'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 取消PyTorch试验行的注释以使用PyTorch实现运行实验：
- en: '[PRE64]'
  id: totrans-345
