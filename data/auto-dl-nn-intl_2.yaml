- en: We will study tuning algorithms in detail in Chapter [3](526245_1_En_3_Chapter.xhtml).
    In this chapter, we will consider only **Random Search Tuner** and **Grid Search
    Tuner**.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在第 [3](526245_1_En_3_Chapter.xhtml) 章节中详细研究调优算法。在本章中，我们将仅考虑 **随机搜索调优器** 和
    **网格搜索调优器**。
- en: Random Search Tuner
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随机搜索调优器
- en: The Random Search Tuner is the most straightforward approach to choosing a combination
    of hyperparameters. As the name implies, the combination of hyperparameters is
    chosen absolutely randomly. Despite the simplicity of this approach, it can sometimes
    give very good results.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 随机搜索调优器是选择超参数组合的最直接方法。正如其名所示，超参数的组合是绝对随机选择的。尽管这种方法很简单，但它有时可以给出非常好的结果。
- en: Random Search Tuner is set as
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 随机搜索调优器设置为
- en: '[PRE22]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Figure [2-6](#Fig6) illustrates the Random Search Tuner in action.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-6](#Fig6) 展示了随机搜索调优器的工作情况。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig6_HTML.png)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig6_HTML.png)'
- en: Figure 2-6
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-6
- en: Random Search Tuner
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 随机搜索调优器
- en: In some cases, Random Search Tuner is well suited for exploring the search space
    when you need to extract information about hyperparameters’ impact on model performance.
    After a random search space exploration, you can redefine hyperparameter search
    space and select another tuner.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，随机搜索调优器非常适合在需要提取关于超参数对模型性能影响的信息时探索搜索空间。在随机搜索空间探索之后，你可以重新定义超参数搜索空间并选择另一个调优器。
- en: Grid Search Tuner
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网格搜索调优器
- en: Grid Search Tuner performs an exhaustive search, that is, Grid Search Tuner
    will search all the possible combinations from the search space. Grid Search Tuner
    is well suited for small search spaces.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索调优器执行穷举搜索，即网格搜索调优器将搜索搜索空间中所有可能的组合。网格搜索调优器非常适合小搜索空间。
- en: Grid Search Tuner is set as
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索调优器设置为
- en: '[PRE23]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Figure [2-7](#Fig7) illustrates the Grid Search Tuner in action.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-7](#Fig7) 展示了网格搜索调优器的工作情况。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig7_HTML.png)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig7_HTML.png)'
- en: Figure 2-7
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-7
- en: Grid Search Tuner
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索调优器
- en: Grid Search Tuner accepts only search space variables that are generated with
    `choice`, `quniform`, and `randint` functions.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索调优器只接受使用 `choice`、`quniform` 和 `randint` 函数生成的搜索空间变量。
- en: Organizing Experiment
  id: totrans-198
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织实验
- en: And so, we are all set to begin our first explorations. Let’s look at the file
    organization pattern we’ll be using in this book. I also recommend that you follow
    the same approach.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已经准备好开始我们的第一次探索。让我们看看本书中将使用的文件组织模式。我也建议你遵循相同的方法。
- en: 'These simple rules will help you avoid unnecessary errors when running an experiment:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这些简单的规则将帮助你在进行实验时避免不必要的错误：
- en: Use a separate directory for each experiment.
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每个实验使用单独的目录。
- en: Specify the current directory as trial code directory in the experiment configuration.
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实验配置中将当前目录指定为试验代码目录。
- en: Keep the model class and training/testing methods in a separate file.
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将模型类和训练/测试方法保存在单独的文件中。
- en: Add root code folder to the system path in trial file.
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在试验文件中将根代码文件夹添加到系统路径。
- en: Do not mix model and trial files.
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要混合模型和试验文件。
- en: Let’s look at a dummy experiment that follows these rules ch2/experiment_pattern.
    Listing [2-4](#PC25) provides the experiment configuration file.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个遵循这些规则 ch2/experiment_pattern 的虚拟实验。列表 [2-4](#PC25) 提供了实验配置文件。
- en: 'The configuration file marks the current directory as the working directory:
    `trialCodeDirectory: .`'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: '配置文件将当前目录标记为工作目录：`trialCodeDirectory: .`'
- en: '[PRE24]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Model class and training/testing methods are in a separate file shown in Listing
    [2-5](#PC26).
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 模型类和训练/测试方法在单独的文件中，如列表 [2-5](#PC26) 所示。
- en: '[PRE25]'
  id: totrans-210
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Table 2-3
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-3
- en: NNI API
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: NNI API
- en: '| Method | Description |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
  zh: '| 方法 | 描述 |'
- en: '| --- | --- |'
  id: totrans-214
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| `nni.get_next_parameter()` | Required method that receives trial parameters
    from NNI Tuner as `Dict` object |'
  id: totrans-215
  prefs: []
  type: TYPE_TB
  zh: '| `nni.get_next_parameter()` | 必须方法，从 NNI 调优器接收试验参数作为 `Dict` 对象 |'
- en: '| `nni.report_intermediate_result(m)` | Optional method that sends intermediate
    results to NNI Tuner |'
  id: totrans-216
  prefs: []
  type: TYPE_TB
  zh: '| `nni.report_intermediate_result(m)` | 可选方法，将中间结果发送给 NNI 调优器 |'
- en: '| `nni.report_final_result(m)` | Required method that sends final metrics that
    represents model’s performance |'
  id: totrans-217
  prefs: []
  type: TYPE_TB
  zh: '| `nni.report_final_result(m)` | 必须方法，用于发送表示模型性能的最终指标 |'
- en: The trial script receives parameters from the NNI tuner, initializes the model,
    trains it, and tests its performance. The trial script interacts with NNI using
    the following API methods shown in Table [2-3](#Tab3).
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 试验脚本从 NNI 调优器接收参数，初始化模型，训练它，并测试其性能。试验脚本使用以下 API 方法与 NNI 交互，如表 [2-3](#Tab3) 所示。
- en: Let’s look at the trial script pattern in Listing [2-6](#PC27).
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看列表 [2-6](#PC27) 中的试验脚本模式。
- en: 'We import necessary modules:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们导入必要的模块：
- en: '[PRE26]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: And here, we add the root directory of the code to the system path. This is
    done because NNI has no idea about the structure of our code and the location
    of modules.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将代码的根目录添加到系统路径中。这样做是因为 NNI 对我们代码的结构和模块的位置一无所知。
- en: '[PRE27]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Now, we can import the classes we need from our code structure:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以从我们的代码结构中导入所需的类：
- en: '[PRE28]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Trial initiates the model, trains it, measures its performance, and returns
    the result to NNI Tuner:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 试验初始化模型，训练它，测量其性能，并将结果返回给 NNI 调优器：
- en: '[PRE29]'
  id: totrans-227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'And here is the entry point to the trial script:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是试验脚本的入口点：
- en: '[PRE30]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: You can run trial script ch2/experiment_pattern/trial.py in stand-alone mode.
    It means you can run this script without getting any errors. The `nni.get_next_parameter()`
    method will return an empty `dict` that you can merge with your trial parameters.
    This is convenient if you want to test trial execution.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以以独立模式运行 trial 脚本 ch2/experiment_pattern/trial.py。这意味着你可以运行此脚本而不会出现任何错误。`nni.get_next_parameter()`
    方法将返回一个空的 `dict`，你可以将其与你的试验参数合并。如果你想要测试试验执行，这很方便。
- en: Experiment file structure pattern can be depicted as it is shown in Figure [2-8](#Fig8).
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 实验文件结构模式可以如图 2-8 所示。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig8_HTML.png)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig8_HTML.png)'
- en: Figure 2-8
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-8
- en: Experiment file structure
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 实验文件结构
- en: Fine! We’ve defined different hyperparameter types, examined how to define search
    spaces, studied simple tuners, and represented a pattern for creating experiments.
    We are now ready to move on to real research. The following sections will examine
    how HPO methods optimize the model for the specific problem and help develop a
    new model design.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 好的！我们已经定义了不同的超参数类型，检查了如何定义搜索空间，研究了简单的调优器，并代表了一个创建实验的模式。我们现在可以继续进行实际的研究。接下来的几节将检查
    HPO 方法如何针对特定问题优化模型，并帮助开发新的模型设计。
- en: Optimizing LeNet for MNIST Problem
  id: totrans-236
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 LeNet 以解决 MNIST 问题
- en: 'Libraries: TensorFlow (Keras API), PyTorch'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 库：TensorFlow (Keras API)，PyTorch
- en: 'MNIST Classifier problem is a common problem to test various machine learning
    approaches. Convolutional neural networks have made a breakthrough in image recognition,
    so we also use the MNIST dataset for diving into the HPO area. The MNIST database
    contains images of handwritten digits. It is split into two sets: a training set
    of 60,000 samples and a test set of 10,000 examples. Figure [2-9](#Fig9) displays
    several samples from the MNIST dataset.'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 分类器问题是一个常见的测试各种机器学习方法的难题。卷积神经网络在图像识别方面取得了突破，因此我们也使用 MNIST 数据集来深入研究 HPO
    领域。MNIST 数据库包含手写数字的图像。它分为两个集合：一个包含 60,000 个样本的训练集和一个包含 10,000 个示例的测试集。图 [2-9](#Fig9)
    显示了 MNIST 数据集的几个样本。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig9_HTML.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig9_HTML.jpg)'
- en: Figure 2-9
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-9
- en: MNIST database
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 数据库
- en: MNIST dataset is a set of 28×28 grayscale images. Therefore, each dataset object
    is a (28, 28, 1) tensor. Let’s examine several samples of this dataset.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 数据集是一组 28×28 的灰度图像。因此，每个数据集对象是一个 (28, 28, 1) 张量。让我们检查这个数据集的几个样本。
- en: '[PRE31]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Listing [2-7](#PC32) displays the image in Figure [2-10](#Fig10).
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-7](#PC32) 显示了图 [2-10](#Fig10) 中的图像。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig10_HTML.jpg)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig10_HTML.jpg)'
- en: Figure 2-10
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-10
- en: MNIST samples
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 样本
- en: This may seem like a very simple task, but it is not. Recall how often you could
    not understand the number written down by another person’s hand. Handwritten digit
    recognition was one of the first fundamental problems of pattern recognition.
    LeNet-5 is one of the earliest neural networks used for recognizing handwritten
    and machine-printed characters. The main reason behind the popularity of this
    model was its straightforward architecture. It is a multilayer convolution neural
    network for image classification. Abstract LeNet model design is depicted in Figure
    [2-11](#Fig11).
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来是一个非常简单的任务，但实际上并非如此。回想一下，你有多少次无法理解别人手写的数字。手写数字识别是模式识别的第一个基本问题之一。LeNet-5
    是最早用于识别手写和机器打印字符的神经网络之一。这个模型之所以受欢迎，主要原因是其直接的架构。它是一个用于图像分类的多层卷积神经网络。LeNet 模型的抽象设计如图
    [2-11](#Fig11) 所示。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig11_HTML.jpg)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig11_HTML.jpg)'
- en: Figure 2-11
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-11
- en: LeNet architecture
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 架构
- en: 'Our goal is to optimize the LeNet model to the handwritten digit recognition
    problem. The easiest thing is to start Layer Hyperparameter Optimization. Let’s
    just count the number of layer hyperparameters in the LeNet model:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是将 LeNet 模型优化到手写数字识别问题。最简单的事情就是从层超参数优化开始。让我们先计算 LeNet 模型中的层超参数数量：
- en: '**Conv2D layer**: Five basic hyperparameters (`out_channels`, `kernel_size`,
    `stride`, `padding`, `dilation`)'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Conv2D 层**：五个基本超参数 (`out_channels`, `kernel_size`, `stride`, `padding`, `dilation`)'
- en: '**MaxPool2D layer**: Two basic hyperparameters (`kernel_size`, `stride`)'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MaxPool2D 层**：两个基本超参数 (`kernel_size`, `stride`)'
- en: '**Linear layer****:** Two basic hyperparameters (`out_features`, `use_bias`)'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**线性层**：两个基本超参数 (`out_features`, `use_bias`)'
- en: LeNet contains two Conv2D layers, two MaxPool2D layers, and two linear layers.
    Thus, we have 2×5 + 2×2 + 2×2 = 14 layer hyperparameters in LeNet model. Let’s
    assume that for each hyperparameter, we will have a set of possible values ​​that
    will consist of only two elements, although, of course, many hyperparameters require
    more values ​​for the flexibility of the experiment. But even this binary search
    space contains 2^(14) = 16 384 elements. And these are just the most primitive
    layer hyperparameters for one of the simplest deep learning models. As the complexity
    of the model increases, the number of possible hyperparameters in it grows exponentially.
    Even the most advanced tuner can take a very long time to explore this search
    space. Therefore, we need some experience and intuition, which will allow us to
    select the critical hyperparameter range for each model without increasing the
    search space too much.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 包含两个 Conv2D 层，两个 MaxPool2D 层和两个线性层。因此，LeNet 模型中有 2×5 + 2×2 + 2×2 = 14
    个层超参数。假设对于每个超参数，我们将有一个只包含两个元素的可能的值集合，尽管，当然，许多超参数需要更多的值以增加实验的灵活性。但即使这个二进制搜索空间也包含
    2^(14) = 16,384 个元素。而且这些只是最简单的深度学习模型中的一种最原始的层超参数。随着模型复杂性的增加，其中的可能超参数数量呈指数增长。即使是最先进的调优器也需要很长时间来探索这个搜索空间。因此，我们需要一些经验和直觉，这将使我们能够为每个模型选择关键的超参数范围，而不会过多地增加搜索空间。
- en: 'Let’s consider only the following layer hyperparameters:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们仅考虑以下层超参数：
- en: '**Conv2D layer 1**: `filter_size_1`, `kernel_size_1`'
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卷积2D层1**：`filter_size_1`，`kernel_size_1`'
- en: '**Conv2D layer 2**: `filter_size_2`, `kernel_size_2`'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卷积2D层2**：`filter_size_2`，`kernel_size_2`'
- en: '**Linear layer**: `out_features`'
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**线性层**：`out_features`'
- en: In order to reduce the size of the search space, we set
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减少搜索空间的大小，我们设置
- en: '`filter_size_2 = 2 * filter_size_1`'
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`filter_size_2 = 2 * filter_size_1`'
- en: '`kernel_size_1 = kernel_size_2`'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kernel_size_1 = kernel_size_2`'
- en: 'Then, we will focus on only three hyperparameters for LeNet model:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将专注于LeNet模型的三个超参数：
- en: '`filter_size`'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`filter_size`'
- en: '`kernel_size`'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kernel_size`'
- en: '`out_features`'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`out_features`'
- en: 'Usually, the best values ​​for the `filter_size` of the convolutional layer
    are presented as 2^n. Therefore, we will choose the following ones for the search
    space: 8, 16, 32\. The `kernel_size` values ​​are usually chosen in a set of 2n
    + 1\. And the larger the image is, the larger `kernel_size` value ​​​​should be
    chosen. The samples of the MNIST dataset are 28×28 images. These are pretty small
    images, so we shouldn’t choose large `kernel_size` values: 2, 3, 5\. The best
    values ​​for `l1_size` are powers of two, as for `filter_size`. The linear layer
    is applied to the tensor after the flatten layer, which means that we have to
    consider the dimension of the tensor that the previous layers will produce. In
    the case of the MNIST problem, we will focus on the following `l1_size` values:
    32, 64, 128\. For MaxPool2D layer we will set the lowest possible value of `pool_size`,
    which is 2, and set `sigmoid` as the activation function. Yes! That’s the function
    that has been used for quite a long time as an activation function for most pattern
    recognition problems. We will return to the problem of choosing an activation
    function in the next section.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，卷积层的`filter_size`最佳值表示为2的n次方。因此，我们将选择以下搜索空间中的参数：8、16、32。`kernel_size`的值通常选择在2n
    + 1的集合中。图像越大，应选择更大的`kernel_size`值。MNIST数据集的样本是28×28的图像。这些图像相当小，所以我们不应该选择大的`kernel_size`值：2、3、5。`l1_size`的最佳值是2的幂，就像`filter_size`一样。线性层应用于展平层之后的张量，这意味着我们必须考虑前一层将产生的张量维度。在MNIST问题的情况下，我们将关注以下`l1_size`值：32、64、128。对于MaxPool2D层，我们将设置`pool_size`的最小可能值，即2，并将`sigmoid`作为激活函数。是的！这就是长期以来作为大多数模式识别问题激活函数所使用的函数。我们将在下一节回到选择激活函数的问题。
- en: 'We will use classic batch neural network training with `Adam` optimizer. So
    let’s now look at training hyperparameters. I suggest starting the study by selecting
    the simplest hyperparameters: `batch_size` and `learning rate`. The best parameters
    for `batch_size` are expressed as 2^n and `learning_rate` as 10^(-n). For this
    case, we will choose the following: 256, 512, 1024 for `batch_size` and 0.01,
    0.001, 0.0001 for `learning_rate`.'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用经典的批量神经网络训练和`Adam`优化器。现在让我们看看训练超参数。我建议从选择最简单的超参数开始：`batch_size`和`learning
    rate`。`batch_size`的最佳参数表示为2的n次方，`learning rate`表示为10的-n次方。对于这个案例，我们将选择以下参数：`batch_size`为256、512、1024，`learning
    rate`为0.01、0.001、0.0001。
- en: Now let’s convert the hyperparameter constraints we made earlier into NNI search
    space. Listing [2-8](#PC33) defines the search space for LeNet hyperparameter
    optimization search space.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将我们之前做出的超参数约束转换为NNI搜索空间。列表[2-8](#PC33)定义了LeNet超参数优化搜索空间的搜索空间。
- en: '[PRE32]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Fine! In the next step, we will create TensorFlow and PyTorch implementations
    of the LeNet model considering the HPO problem.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 好的！在下一步中，我们将创建考虑HPO问题的LeNet模型的TensorFlow和PyTorch实现。
