  zh: 执行LeNet Evolution HPO实验
- en: And so we come to the climax of this section. We can consider this experiment
    a full-fledged scientific study that will create a unique deep learning model
    for a classification problem on a specific dataset. It will take the best principles
    of pattern recognition from the LeNet model. The LeNet Evolution model attempts
    to move from the LeNet model to a more complex one. Let’s define the experiment
    configuration and run it finally. Listing [2-26](#PC143) contains the configuration
    for the LeNet Evolution HPO Experiment.
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们来到了本节的高潮。我们可以将这个实验视为一个完整的科学研究，它将为特定数据集上的分类问题创建一个独特的深度学习模型。它将采用LeNet模型中最佳的图案识别原则。LeNet
    Evolution模型试图从LeNet模型过渡到一个更复杂的模型。让我们定义实验配置并最终运行它。列表[2-26](#PC143)包含了LeNet Evolution
    HPO实验的配置。
