- en: Performing LeNet HPO Experiment
  id: totrans-341
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 执行LeNet HPO实验
- en: And so now, we are all set for our first HPO study. Any real-world experiment
    can take several hours to several weeks, which is natural because each trial creates
    a unique model and training method. And the process of training can take quite
    a long time, depending on a model design and dataset. Some of the experiments
    in this book took quite a long time. Therefore, you can skip a complete experiment
    run or limit the number of trials with the `maxTrialNumber` setting. Keep in mind
    that if you run a limited experiment, your results may differ significantly from
    those presented in the book. For each experiment, I will give the time it took
    to complete it on a specific machine. We need to configure the NNI experiment
    and run it. Listing [2-13](#PC64) contains the configuration for the LeNet HPO
    Experiment.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在已经为我们的第一次HPO研究做好了准备。任何真实世界的实验可能需要几小时到几周的时间，这是自然的，因为每个试验都会创建一个独特的模型和训练方法。训练过程可能需要相当长的时间，这取决于模型设计和数据集。本书中的一些实验花费了相当长的时间。因此，您可以跳过完整的实验运行或使用`maxTrialNumber`设置限制试验次数。请记住，如果您运行有限的实验，您的结果可能与书中展示的结果有显著差异。对于每个实验，我将给出在特定机器上完成它所需的时间。我们需要配置NNI实验并运行它。 列表[2-13](#PC64)包含LeNet
    HPO实验的配置。
