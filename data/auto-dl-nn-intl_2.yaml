- en: 2. Hyperparameter Optimization
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 超参数优化
- en: Almost every deep learning model has a large number of hyperparameters. Choosing
    the proper hyperparameters is one of the most common problems in AutoML. A small
    change in one of the model’s hyperparameters can significantly change its performance.
    Hyperparameter Optimization (HPO) is the first and most effective step in deep
    learning model tuning. Due to its ubiquity, Hyperparameter Optimization is sometimes
    regarded as synonymous with AutoML.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎每个深度学习模型都有大量的超参数。选择合适的超参数是 AutoML 中最常见的问题之一。模型的一个超参数的微小变化可能会显著改变其性能。超参数优化（HPO）是深度学习模型调整的第一步，也是最有效的一步。由于其普遍性，超参数优化有时被视为与
    AutoML 同义词。
- en: NNI provides a broad and flexible set of HPO tools. This chapter will examine
    various neural network designs and how NNI can be applied to optimize their hyperparameters
    for particular problems.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: NNI 提供了一组广泛且灵活的超参数优化（HPO）工具。本章将探讨各种神经网络设计以及如何将 NNI 应用于针对特定问题优化它们的超参数。
- en: What Is Hyperparameter?
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是超参数？
- en: 'Let’s start the chapter by defining what a model *hyperparameter* is. A deep
    learning model has three types of parameters:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过定义什么是模型 *超参数* 来开始本章。深度学习模型有三种类型的参数：
- en: '**Weights and biases (or model parameters)**: Parameters of linear (or tensor)
    functions in the neural network’s architecture, which are tuned during its training.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**权重和偏差（或模型参数）**：神经网络架构中线性（或张量）函数的参数，在训练过程中进行调整。'
- en: '**Hyperparameters**: Initial global variables that are set manually and affect
    the behavior of the functions, the training algorithm, and the neural network’s
    architecture.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超参数**：手动设置的初始全局变量，影响函数的行为、训练算法和神经网络的架构。'
- en: '**Task parameters**: The parameters that the task sets for you. These parameters
    lie in the problem requirements, which need to be satisfied and cannot be changed.
    For example, suppose we solve the binary classification problem determining “cat
    or dog?” by analyzing their pictures. In that case, we have a task parameter:
    **2**, which indicates the number of output classes. Or, for example, we have
    the air temperature prediction problem for the next three days. Then parameter
    3 is a task parameter, and it lies in the task requirements and cannot be changed
    in any way.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务参数**：任务为您设置的参数。这些参数位于问题要求中，需要满足且不能更改。例如，假设我们通过分析它们的图片来解决“猫或狗？”的二分类问题。在这种情况下，我们有一个任务参数：**2**，表示输出类别的数量。或者，例如，我们有预测未来三天空气温度的问题。那么参数
    3 是一个任务参数，它位于任务要求中，不能以任何方式更改。'
- en: 'Let’s look at an example of a Fully Connected Neural Network (or Dense Network)
    with three linear (or dense) layers with activation functions and five-valued
    input vector and scalar output, which can be represented as follows in the TensorFlow
    framework:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个包含三个线性（或密集）层、激活函数、五值输入向量和标量输出的全连接神经网络（或密集网络）的例子，这在 TensorFlow 框架中可以表示如下：
- en: 'We import necessary packages:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们导入必要的包：
- en: '[PRE0]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Next, we set task parameters which are task requirements. Our Fully Connected
    Neural Network has to receive five-valued input vector and output a scalar value:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们设置任务参数，即任务要求。我们的全连接神经网络必须接收五值输入向量并输出一个标量值：
- en: '[PRE1]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Since we have three linear (or dense) layers, we can specify the `output_dimension`
    value for two of them. The third layer has an `output_dimension` value of 1 because
    this is a task requirement. These values ​​are hyperparameters:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们有三个线性（或密集）层，我们可以为其中两个指定 `output_dimension` 值。第三层的 `output_dimension` 值为
    1，因为这是一个任务要求。这些值是超参数：
- en: '[PRE2]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'We initialize the FCNN model:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们初始化 FCNN 模型：
- en: '[PRE3]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'And here we have FCNN model parameters:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这里我们有 FCNN 模型参数：
- en: '[PRE4]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: which are presented in Table [2-1](#Tab1).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这些在表 [2-1](#Tab1) 中展示。
- en: Table 2-1
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-1
- en: FCNN model weights and biases
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: FCNN 模型权重和偏差
- en: '| Layer | Output Shape | Param # | Explained |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
  zh: '| 层 | 输出形状 | 参数数量 | 解释 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| `l1` | `(None, 8)` | `48` | 5×8 weight matrix + 8 bias vector = 48 |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
  zh: '| `l1` | `(None, 8)` | `48` | 5×8 权重矩阵 + 8 偏置向量 = 48 |'
- en: '| `l2` | `(None, 4)` | `36` | 8×4 weight matrix + 4 bias vector = 36 |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| `l2` | `(None, 4)` | `36` | 8×4 权重矩阵 + 4 偏置向量 = 36 |'
- en: '| `l3` | `(None, 1)` | `5` | 4×1 weight matrix + 1 bias vector = 5 |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
  zh: '| `l3` | `(None, 1)` | `5` | 4×1 权重矩阵 + 1 偏置向量 = 5 |'
- en: '`Total params: 89`'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '`总参数数：89`'
- en: The model shown in Listing [2-1](#PC1) has 2 hyperparameters and 89 model parameters.
    Hyperparameters usually directly affect the number of model parameters. Indeed,
    in Listing [2-1](#PC1), the `l1_dim` and `l2_dim` hyperparameters set the dimensions
    of weight matrices and bias vectors. Figure [2-1](#Fig1) illustrates the hyperparameter
    impact on the FCNN model architecture and its parameters.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[2-1](#PC1)中显示的模型有2个超参数和89个模型参数。超参数通常直接影响模型参数的数量。实际上，在列表[2-1](#PC1)中，`l1_dim`和`l2_dim`超参数设置了权重矩阵和偏置向量的维度。图[2-1](#Fig1)说明了超参数对FCNN模型架构及其参数的影响。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig1_HTML.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig1_HTML.jpg)'
- en: Figure 2-1
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-1
- en: Hyperparameter impact
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 超参数影响
- en: 'We can distinguish four types of hyperparameters:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以区分四种类型的超参数：
- en: '***Layer*** hyperparameter'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**层**超参数'
- en: '***Training*** hyperparameter'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练**超参数'
- en: '***Feature*** hyperparameter'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征**超参数'
- en: '***Design*** hyperparameter'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计**超参数'
- en: Let’s examine each of these hyperparameter types.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查这些超参数类型中的每一个。
- en: Layer Hyperparameter
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 层超参数
- en: 'Almost all layers of a deep learning model imply the presence of initial parameters.
    For example:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎所有深度学习模型的层都隐含了初始参数的存在。例如：
- en: '**Dropout layer**: Assumes *p* (0 < *p* < 1) parameter, which defines dropout
    probability'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Dropout层**：假设*p*（0 < *p* < 1）参数，它定义了dropout概率'
- en: '**MaxPool 2D layer**: Assumes `pool_size` parameter, which defines the pooling
    dimension'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最大池化2D层**：假设`pool_size`参数，它定义了池化维度'
- en: '**Convolutional 2D layer**: Assumes `kernel_size` parameter'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卷积2D层**：假设`kernel_size`参数'
- en: We can refer to these hyperparameters as *layer hyperparameters*.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这些超参数称为*层超参数*。
- en: Training Hyperparameter
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练超参数
- en: The training process is an integral part of the model architecture. Each model
    generates a multidimensional loss function surface. The model training process
    tries to find the best local minima on the loss function surface. The training
    process parameters can drastically affect trained model performance.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程是模型架构的一个组成部分。每个模型生成一个多维损失函数表面。模型训练过程试图在损失函数表面上找到最佳局部最小值。训练过程参数可以极大地影响训练模型的性能。
- en: The most common example is *learning rate* tuning. Most training algorithms
    use gradient descent as the main idea behind model training. The gradient descent
    concept means that a transition vector is calculated for each point on the loss
    function surface. But the length of this vector is determined by the *learning
    rate* parameter. Too high *learning rate* parameter can lead to a gradient descent
    explosion and a complete inability to find an acceptable local minima on the loss
    function surface. At the same time, too low *learning rate* stops the training
    process at a too high point on the surface and does not allow model parameters
    to reach a lower point. Figure [2-2](#Fig2) demonstrates the learning rate problem.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的例子是*学习率*调整。大多数训练算法使用梯度下降作为模型训练背后的主要思想。梯度下降的概念意味着为损失函数表面的每个点计算一个过渡向量。但这个向量的长度是由*学习率*参数决定的。过高的*学习率*参数可能导致梯度下降爆炸，完全无法在损失函数表面上找到可接受的局部最小值。同时，过低的*学习率*会在表面上停止训练过程，并且不允许模型参数达到更低点。图[2-2](#Fig2)展示了学习率问题。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig2_HTML.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig2_HTML.png)'
- en: Figure 2-2
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-2
- en: Learning rate problem
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 学习率问题
- en: The most common training hyperparameters are
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的训练超参数包括
- en: '*Training epochs number*'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*训练轮数*'
- en: '*Learning rate*'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*学习率*'
- en: '*Batch size*'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*批量大小*'
- en: Layer Hyperparameter and Training Hyperparameter Optimization is the most common
    way to tune a model due to the ease of this approach implementation.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 层超参数和训练超参数优化是调整模型最常见的方式，因为这种方法实现起来比较容易。
- en: Feature Hyperparameter
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 特征超参数
- en: Feature hyperparameter affects dataset preprocessing methods. The data structure
    in the input dataset can significantly improve the model’s performance, especially
    in natural language processing (NLP) problems. But transformations of the input
    dataset do not always improve the model’s performance, so you often have to “play”
    with various feature preprocessing techniques to reach the best results.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 特征超参数影响数据集预处理方法。输入数据集中的数据结构可以显著提高模型性能，尤其是在自然语言处理（NLP）问题中。但输入数据集的转换并不总是提高模型性能，因此你经常不得不“玩”各种特征预处理技术以达到最佳结果。
- en: 'Let’s examine a dataset that contains movie reviews data. This dataset includes
    the following features:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考察一个包含电影评论数据的数据集。这个数据集包括以下特征：
- en: '**Feature** ***A***: Movie budget (*example: 100 000 000$*)'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征** ***A***：电影预算（例如：10亿美元*）'
- en: '**Feature** ***B***: Review date (*example: 2021-05-03*)'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征** ***B***：评论日期（例如：2021-05-03*）'
- en: '**Feature** ***C***: Review text (*example: I love good movies, but unfortunately,
    this is not one of them*.)'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征** ***C***：评论文本（例如：我喜欢好电影，但不幸的是，这部不是其中之一。）'
- en: And we are solving the classical binary classification problem, that is, we
    have to determine whether the review is negative or positive. Then we can apply
    the following preprocessing, which is shown in Figure [2-3](#Fig3).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在解决经典的二元分类问题，即我们必须确定评论是负面还是正面。然后我们可以应用以下预处理，如图 [2-3](#Fig3) 所示。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig3_HTML.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig3_HTML.png)'
- en: Figure 2-3
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-3
- en: Dataset preprocessing driven by feature hyperparameters
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 由特征超参数驱动的数据集预处理
- en: 'The dataset preprocessing shown in Figure [2-3](#Fig3) has the following feature
    hyperparameters: *use Normalization*, *use Weekend labeling*, and *use Stop words
    removal*. Let’s describe their meanings:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-3](#Fig3) 中所示的数据集预处理具有以下特征超参数：*使用归一化*，*使用周末标签*和*使用停用词去除*。让我们描述它们的含义：
- en: '***use Normalization:***'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***使用归一化：***'
- en: 'Normalization is a common technique for converting numeric data by converting
    all values to the range from 0 to 1\. *use Normalization* hyperparameter manages
    the application of normalization to feature A (budget):'
  id: totrans-67
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 归一化是将数值数据转换为 0 到 1 范围的常见技术。*使用归一化*超参数管理对特征 A（预算）应用归一化：
- en: '**0**: Normalization is not applied to feature A.'
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0**：对特征 A 不应用归一化。'
- en: '**1**: Normalization is applied to feature A and produces A` feature.'
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1**：对特征 A 应用归一化，生成 A`特征。'
- en: '***use Weekend labeling:***'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***使用周末标签：***'
- en: The date does not carry any information for the neural network. But an extra
    datetime labeling might help. For example, reviews left on holidays can be positive
    more often because people are in a good mood. Then we can use the weekend labeling
    method, which will label each date if it is a holiday or a weekend. Date series
    can then be converted from *2021-11-05*, *2021-11-06*, *2021-11-07*, … to 0, 1,
    1, ….
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 日期对神经网络不携带任何信息。但额外的日期时间标签可能有所帮助。例如，节假日留下的评论更可能是积极的，因为人们心情好。然后我们可以使用周末标签方法，该方法将为每个日期标记是否为节假日或周末。日期序列随后可以转换为
    *2021-11-05*，*2021-11-06*，*2021-11-07*，…，到 0，1，1，…。
- en: '**0**: Weekend labeling is not applied, and feature B is removed from the dataset.'
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0**：不应用周末标签，并将特征 B 从数据集中移除。'
- en: '**1**: Weekend labeling is applied, and feature B is converted to feature B’.'
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1**：应用周末标签，并将特征 B 转换为特征 B’。'
- en: '***use Stop words removal:***'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***使用停用词去除：***'
- en: Removing stop words from text is a common practice that cleans the text from
    noise. Stop words removal often helps speed up training and improve the quality
    of an NLP model.
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 从文本中去除停用词是一种常见的做法，它可以清除文本中的噪声。停用词去除通常有助于加快训练速度并提高 NLP 模型的质量。
- en: '**0**: Stop words removal is not applied to feature C.'
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0**：对特征 C 不应用停用词去除。'
- en: '**1**: Stop words removal is applied to feature C and produces feature C`.'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1**：对特征 C 应用停用词去除，生成特征 C’。'
- en: 'For example, this combination of feature hyperparameters {*use Normalization*:
    0, *use Weekend labeling*: 1, *use Stop words removal*: 1} will transform original
    dataset [A, B, C] to [A, B’, C’].'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这个特征超参数的组合（**使用归一化**：0，**使用周末标签**：1，**使用停用词去除**：1）将原始数据集 [A, B, C] 转换为 [A,
    B’，C’]。
- en: Design Hyperparameter
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设计超参数
- en: Design hyperparameter has a direct impact on the choice of neural network architecture.
    Their values ​​control the choice of neural network layers and connections between
    them.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 设计超参数对神经网络架构的选择有直接影响。它们的值控制着神经网络层的选择以及它们之间的连接。
- en: Figure [2-4](#Fig4) shows design hyperparameters.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-4](#Fig4) 显示设计超参数。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig4_HTML.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig4_HTML.png)'
- en: Figure 2-4
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-4
- en: Design hyperparameters
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 设计超参数
- en: 'The design hyperparameter search shown in Figure [2-4](#Fig4) has the following
    design hyperparameters: *use Dropout*, *use MaxPool*, and *Activation function*.
    And they affect the model design the following way:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-4](#Fig4) 中所示的设计超参数搜索具有以下设计超参数：*使用Dropout*，*使用MaxPool*和*激活函数*。它们以下述方式影响模型设计：
- en: '***use Dropout*****:**'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***使用Dropout*****：**'
- en: '**0**: *Dropout layer* is skipped.'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0**：跳过 *Dropout 层*。'
- en: '**1**: *Dropout layer* is connected.'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1**：连接了*Dropout层*。'
- en: '***use MaxPool*****:**'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用MaxPool**：'
- en: '**0**: *MaxPool layer* is skipped.'
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0**：跳过了*MaxPool层*。'
- en: '**1**: *Max Poll layer* is connected.'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1**：连接了*Max Poll层*。'
- en: '***Activation function*****:**'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**激活函数**：'
- en: '**1**: *Sigmoid activation* function is connected.'
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1**：连接了*Sigmoid激活*函数。'
- en: '**2**: *Hyperbolic tangent activation* function is connected.'
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2**：连接了*双曲正切激活*函数。'
- en: '**3**: *Rectified linear activation* function is connected.'
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**3**：连接了*修正线性激活*函数。'
- en: 'For example, this combination of design hyperparameters {*use Dropout*: 1,
    *use MaxPool*: 0, *Activation function*: 3} will generate the following sequence
    of layers in the neural network architecture:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这个设计超参数的组合（*使用Dropout*：1，*使用MaxPool*：0，*激活函数*：3）将在神经网络架构中生成以下层序列：
- en: Linear layer
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性层
- en: Dropout layer
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Dropout层
- en: ReLU activation
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ReLU激活
- en: Linear layer
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性层
- en: Design Hyperparameter Optimization is used less often because it is more challenging
    to implement than Layer Hyperparameter or Training Hyperparameter Optimization.
    But design hyperparameter tuning can produce great results. It chooses the best
    combination of layers and connections between them for a particular problem. Design
    Hyperparameter Optimization can be considered as an intermediate approach between
    Hyperparameter Optimization and Neural Architecture Search.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 设计超参数优化使用得较少，因为它比层超参数或训练超参数优化更难实现。但设计超参数调整可以产生很好的结果。它为特定问题选择了最佳层组合及其之间的连接。设计超参数优化可以被视为超参数优化和神经架构搜索之间的中间方法。
- en: Search Space
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 搜索空间
- en: 'Say we have determined the model’s hyperparameters, which will need to be optimized.
    Next, we must define a search space for each of the hyperparameters. Determining
    the search space requires some experience and intuition. You must understand that
    the larger the search space, the longer the experiment. And it is more difficult
    to find a suitable solution. Therefore, it is pointless to specify a huge number
    of values in the search space. For example, if `l1` is a hyperparameter that specifies
    the dimension of a linear layer (`tensorflow.keras.layers.Dense(l1)` or `torch.nn.Linear(out_features
    = l1)`), then you don’t need to set the search space for the hyperparameter to
    `[1, 2, 3,..., 999, 1000]`. For the hyperparameter `l1`, values ​​expressing the
    power of two (2^n) are more suitable: `[4, 8, 16, ..., 256]`, because the representation
    size of linear layers is relevant only proportionally, not additively (if `l1
    = 256` performed poorly, thus, it is highly likely that `l1 = 256 + 8` will show
    the same result). A reasonable choice of hyperparameters can significantly reduce
    the time of the experiment without losing its quality. Before specifying a search
    space, you can perform manual exploration to determine which hyperparameter values
    ​​have the most impact on model performance.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们已经确定了模型的超参数，这些参数需要被优化。接下来，我们必须为每个超参数定义一个搜索空间。确定搜索空间需要一些经验和直觉。你必须理解，搜索空间越大，实验所需的时间就越长。而且找到合适的解决方案也更困难。因此，在搜索空间中指定大量值是没有意义的。例如，如果`l1`是一个指定线性层维度（`tensorflow.keras.layers.Dense(l1)`或`torch.nn.Linear(out_features
    = l1)`）的超参数，那么你不需要将超参数的搜索空间设置为`[1, 2, 3,..., 999, 1000]`。对于超参数`l1`，表示2的幂（2^n）的值更合适：`[4,
    8, 16, ..., 256]`，因为线性层的表示大小只与比例相关，而不是与加法相关（如果`l1 = 256`表现不佳，那么，`l1 = 256 + 8`很可能会有相同的结果）。合理选择超参数可以显著减少实验时间，而不会降低其质量。在指定搜索空间之前，你可以进行手动探索，以确定哪些超参数值对模型性能影响最大。
- en: 'The search space for the HPO problem is defined by defining a set of possible
    values ​​for each of the hyperparameters. NNI allows the following sampling strategies
    to define hyperparameter search space: `choice`, `randint`, `uniform`, `quniform`,
    `loguniform`, `qloguniform`, `normal`, `qnormal`, `lognormal`, and `qlognormal`.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: HPO问题的搜索空间是通过定义每个超参数的可能值集来定义的。NNI允许以下采样策略来定义超参数搜索空间：`choice`、`randint`、`uniform`、`quniform`、`loguniform`、`qloguniform`、`normal`、`qnormal`、`lognormal`和`qlognormal`。
- en: choice
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择
- en: '[PRE5]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Choice sampling strategy allows you to manually specify a list of values ​​that
    a hyperparameter can take. It can be a list of numbers and strings. For example:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 选择采样策略允许你手动指定一个超参数可以取的值的列表。它可以是一个数字和字符串的列表。例如：
- en: '[PRE6]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Choice sampling also supports nested search spaces. Nested choice is especially
    useful when dealing with design hyperparameters. Here is the example of nested
    choice sampling:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 选择采样也支持嵌套搜索空间。嵌套选择在处理设计超参数时特别有用。以下是嵌套选择采样的例子：
- en: '[PRE7]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: randomint
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: randomint
- en: '[PRE8]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Chooses random integer from lower (inclusive) to upper (exclusive).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 从下限（包含）到上限（不包含）选择随机整数。
- en: uniform
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: uniform
- en: '[PRE9]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Chooses random value according to uniform distribution on `[low, high]`.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 根据区间 `[low, high]` 上的均匀分布选择随机值。
- en: quniform
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: quniform
- en: '[PRE10]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Acts like uniform sampling but with `q` discretization that can be expressed
    as `clip(round(uniform(low, high) / q) * q, low, high)`. For example, for `_value`
    specified as `[1, 11, 2.5]`, possible values are `[1, 2.5, 5, 7.5, 10, 11]`.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于 uniform 样本，但具有 `q` 离散化，可以表示为 `clip(round(uniform(low, high) / q) * q, low,
    high)`。例如，对于 `_value` 指定为 `[1, 11, 2.5]`，可能的值是 `[1, 2.5, 5, 7.5, 10, 11]`。
- en: loguniform
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: loguniform
- en: '[PRE11]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Chooses random value according to loguniform distribution on `[low, high]` that
    can be expressed as `np.exp(uniform(np.log(low), np.log(high)))`.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 根据区间 `[low, high]` 上的对数均匀分布选择随机值，可以表示为 `np.exp(uniform(np.log(low), np.log(high)))`。
- en: qloguniform
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: qloguniform
- en: '[PRE12]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Acts like loguniform sampling but with `q` discretization that can be expressed
    as `clip(round(loguniform(low, high) / q) * q, low, high)`.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于 loguniform 样本，但具有 `q` 离散化，可以表示为 `clip(round(loguniform(low, high) / q) *
    q, low, high)`。
- en: normal
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: normal
- en: '[PRE13]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Chooses random value according to normal distribution with μ = `mu` and σ =
    `sigma`.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 根据μ = `mu` 和 σ = `sigma` 的正态分布选择随机值。
- en: qnormal
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: qnormal
- en: '[PRE14]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Acts like normal sampling but with `q` discretization that can be expressed
    as `round(normal(mu, sigma) / q) * q`.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于 normal 样本，但具有 `q` 离散化，可以表示为 `round(normal(mu, sigma) / q) * q`。
- en: lognormal
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: lognormal
- en: '[PRE15]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Chooses random value according to lognormal distribution with μ = `mu` and σ
    = `sigma` that can be expressed as `np.exp(normal(mu, sigma))`.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 根据μ = `mu` 和 σ = `sigma` 的对数正态分布选择随机值，可以表示为 `np.exp(normal(mu, sigma))`。
- en: qlognormal
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: qlognormal
- en: '[PRE16]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Acts like lognormal sampling but with `q` discretization that can be expressed
    as `round(exp(normal(mu, sigma)) / q) * q`.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于 lognormal 样本，但具有 `q` 离散化，可以表示为 `round(exp(normal(mu, sigma)) / q) * q`。
- en: The implementation of sampling strategies is in `nni.parameter expressions`.
    You can explore search space sampling strategies manually, as shown in Listing
    [2-2](#PC18).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 样本策略的实现位于 `nni.parameter expressions` 中。您可以手动探索搜索空间采样策略，如列表 [2-2](#PC18) 所示。
- en: '[PRE17]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: We generate 20 samples using quniform strategy`:`
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 quniform 策略生成 20 个样本：`
- en: '[PRE18]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Visualize generated samples`:`
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化生成的样本：`
- en: '[PRE19]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: And after, you can observe generated samples using `quniform` method in Figure
    [2-5](#Fig5).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，您可以使用 `quniform` 方法在图 [2-5](#Fig5) 中观察生成的样本。
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig5_HTML.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig5_HTML.jpg)'
- en: Figure 2-5
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-5
- en: quniform samples
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: quniform 样本
- en: Let’s examine an example of a JSON search space definition.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查一个 JSON 搜索空间定义的例子。
- en: '[PRE20]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Listing [2-3](#PC21) demonstrates a typical search space for deep learning
    model:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-3](#PC21) 展示了深度学习模型的典型搜索空间：
- en: '`dropout_rate`: Layer hyperparameter that defines the *p* parameter in dropout
    layer. `dropout_rate` can take any value from 0.1 to 0.5.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dropout_rate`：定义 dropout 层中 *p* 参数的层超参数。`dropout_rate` 可以取 0.1 到 0.5 之间的任何值。'
- en: '`conv_size``:` Layer hyperparameter that defines the kernel size of convolutional
    layer. `conv_size` can take any value from the list: 2, 3, 5, 7.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`conv_size`：定义卷积层核大小的层超参数。`conv_size` 可以取列表中的任何值：2、3、5、7。'
- en: '`layer1_hidden_size``:` Layer hyperparameter that defines the output dimension
    of the first linear layer. `layer1_hidden_size` can take any value from the list:
    128, 512, 1024.'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`layer1_hidden_size`：定义第一层线性层输出维度的层超参数。`layer1_hidden_size` 可以取列表中的任何值：128、512、1024。'
- en: '`layer2_hidden_size``:` Layer hyperparameter that defines the output dimension
    of the second linear layer. `layer2_hidden_size` can take any value from the list:
    16, 32, 64.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`layer2_hidden_size`：定义第二层线性层输出维度的层超参数。`layer2_hidden_size` 可以取列表中的任何值：16、32、64。'
- en: '`activation_function``:` Design hyperparameter that defines output activation
    function. `activation_function` can take any value from the list: tanh, sigmoid,
    relu.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`activation_function`：定义输出激活函数的设计超参数。`activation_function` 可以取列表中的任何值：tanh、sigmoid、relu。'
- en: '`training_batch_size``:` Training hyperparameter that defines batch size that
    will be used during training. `training_batch_size` can take any value from the
    list: 100, 250, 500.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`training_batch_size`：定义训练期间将使用的批量大小的训练超参数。`training_batch_size` 可以取列表中的任何值：100、250、500。'
- en: '`training_learning_rate``:` Training hyperparameter that defines learning rate.
    `training_learning_rate` can take any value from 0.0001 to 0.1.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`training_learning_rate``:` 定义学习率的训练超参数。`training_learning_rate` 可以取从 0.0001
    到 0.1 的任何值。'
- en: Tuners
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调优器
- en: After defining the search space, we need to define a tuner that will explore
    the search space and select trial hyperparameter combinations based on the existing
    results.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义搜索空间之后，我们需要定义一个调优器，该调优器将探索搜索空间并根据现有结果选择试验超参数组合。
- en: 'The tuner is set as follows in the configuration file:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 调优器在配置文件中的设置如下：
- en: '[PRE21]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Each tuner has its own set of parameters. The only common parameter for all
    tuners is `optimize_mode`, which marks the direction of optimization of the metric
    that characterizes the model’s performance: `minimize`, `maximize`.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 每个调优器都有自己的参数集。所有调优器唯一的共同参数是 `optimize_mode`，它标记了表征模型性能的指标优化方向：`minimize`（最小化）、`maximize`（最大化）。
- en: Table [2-2](#Tab2) provides the list of tuners available in NNI v2.7.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [2-2](#Tab2) 提供了 NNI v2.7 中可用的调优器列表。
- en: Table 2-2
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-2
- en: Search Tuners
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索调优器
- en: '| Configuration Id | Name |'
