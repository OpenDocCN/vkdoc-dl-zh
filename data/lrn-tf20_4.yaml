  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet 架构
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig7_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig7_HTML.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig7_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig7_HTML.jpg)'
- en: Figure 4-7
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-7
- en: DenseNet architecture
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: DenseNet 架构
- en: DenseNet. This architecture was developed by Gao Huang, Zhuang Liu, Laurens
    van der Maaten, and Kilian Q. Weinberger in 2016\. DenseNet was reported to achieve
    better performance with less complexity, compared to ResNet. A typical DenseNet
    architecture is depicted in Figure [4-7](#Fig7).
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DenseNet。这个架构是由 Gao Huang、Zhuang Liu、Laurens van der Maaten 和 Kilian Q. Weinberger
    在 2016 年开发的。DenseNet 与 ResNet 相比，据报道在更少的复杂度下实现了更好的性能。典型的 DenseNet 架构如图 [4-7](#Fig7)
    所示。
- en: Transfer Learning
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迁移学习
- en: Imagine that there are two friends, A and B, who recently planned to learn to
    drive a car, so that once they finished learning, they could buy a car for their
    commute. Suppose A used to take public transportation to commute, and B used a
    geared bike. Now, when both start to learn to drive a car, assuming that both
    A and B have the same intelligence level, who will be in a better position to
    learn more quickly? Yes, you’re right; it will be B. Because B has been using
    a bike, he will be applying his knowledge of controlling the bike, through the
    combination of clutch, gear, accelerator, and brakes, to control a car. The only
    new skill he must learn is to adjust his driving for a car, which is much bigger
    than a bike. For A, driving a car requires an entirely new skill set, as he has
    never ridden a bike/car. Hence, he will require more time and effort to learn
    to drive a car. This example illustrates how a typical human behavior acquired
    through past experiences of performing a certain task can be applied to a new
    but similar or related task. This has helped humans evolve faster and spend less
    time and effort on learning new tasks.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 想象有两个朋友，A 和 B，他们最近计划学习开车，以便一旦他们完成学习，他们就可以为通勤买一辆车。假设 A 以前乘坐公共交通工具通勤，而 B 使用变速自行车。现在，当他们都开始学习开车时，假设
    A 和 B 智力水平相同，谁将更快地学会？是的，你是对的；将是 B。因为 B 一直在骑自行车，他将把控制自行车的知识应用到控制汽车上，这需要结合离合器、变速器、油门和刹车。他唯一需要学习的新技能是调整他的驾驶以适应汽车，这比自行车大得多。对于
    A 来说，开车需要一套全新的技能，因为他从未骑过自行车/汽车。因此，他将需要更多的时间和精力来学习开车。这个例子说明了通过执行某个任务的过去经验获得的人类典型行为如何应用于一个新但相似或相关的任务。这有助于人类更快地进化，并在学习新任务上花费更少的时间和精力。
- en: The same thing, applied to machine learning, is called transfer learning. According
    to the book *Deep Learning* by Ian Goodfellow, Aaron Courville, and Yoshua Bengio
    (MIT Press, 2016), the definition of transfer learning is a “ situation where
    what has been learned in one setting is exploited to improve generalization in
    another setting.”
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 将同样的事情应用到机器学习中，被称为迁移学习。根据 Ian Goodfellow、Aaron Courville 和 Yoshua Bengio 所著的《深度学习》（MIT
    Press，2016）一书，迁移学习的定义是“在一个设置中学习到的知识被用来改善另一个设置中的泛化。”
- en: Let’s derive a mathematical formula in support of the preceding definition,
    using the example of learning to drive a car that was mentioned previously. Let’s
    first understand what a *domain* and *task* are, with respect to transfer learning.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '让我们通过之前提到的学习开车的例子推导出一个支持上述定义的数学公式。首先，让我们了解在迁移学习方面，**域** 和 **任务** 是什么。 '
- en: A domain **D** comprises a feature space **S** and a marginal probability distribution
    (mpd) **P(X)**, where **S = s**[**1**]**,…,s**[**n**] **∈ S**. Given a specific
    domain, **D = {S , P(S)}**, a task consists of a label space **Y** and an objective
    predictive function **f(·)** (denoted by **T = {P, f(·)})**, which is not observed
    but can be learned from the training data, which consist of pairs **{s**[**i**]**,
    p**[**i**]**}**, where **s**[**i**] **∈ S** and **p**[**i**] **∈ P**. The function
    **f(·)** can be used to predict the corresponding label, **f(s)**, of a new instance
    **s**. Probabilistically, **f(s)** can be written as **P(p|s)**. Let’s suppose
    we denote the activity of riding a bike as **D**[**S**] and call it as a source
    domain. Now let’s call the activity of driving a car **D**[**T**] and call it
    as target domain. Suppose riding a bike on a busy street is one task **T**[**S**]
    of the domain **D**[**S**], whereas driving a car on a busy street is a task **T**[**T**]
    of domain **D**[**T**].
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 一个域 **D** 包含一个特征空间 **S** 和一个边缘概率分布（mpd）**P(X**)，其中 **S = s**[**1**]**,…,s**[**n**]
    **∈ S**. 给定一个特定的域，**D = {S , P(S)}**，一个任务包括一个标签空间 **Y** 和一个目标预测函数 **f(·**)（用 **T
    = {P, f(·)}** 表示），该函数未观察到，但可以从训练数据中学习，训练数据由对 **{s**[**i**]**, p**[**i**]**}**
    组成，其中 **s**[**i**] **∈ S** 和 **p**[**i**] **∈ P**. 函数 **f(·**) 可以用来预测新实例 **s**
    的对应标签 **f(s**)。从概率上讲，**f(s**) 可以表示为 **P(p|s**)。假设我们将骑自行车的活动表示为 **D**[**S**] 并将其称为源域。现在让我们将开车的活动称为
    **D**[**T**] 并将其称为目标域。假设在繁忙的街道上骑自行车是域 **D**[**S**] 的一个任务 **T**[**S**]，而在繁忙的街道上开车是域
    **D**[**T**] 的一个任务 **T**[**T**]。
- en: Mathematically, given a source domain **D**[**S**] and a learning task **T**[**S**],
    a target domain **D**[**T**] and learning task **T**[**T**], the aim of transfer
    learning is to help improve the learning of the (target) predictive function **f**[**T**]**(·)**
    in **D**[**T,**] leveraging the knowledge in **D**[**S**] and **T**[**S**], where
    **D**[**S**] **≠ D**[**T**] or **T**[**S**] **≠ T**[**T**]. In simple terms, transfer
    learning is the use of knowledge gained by B in riding his bike on a busy street,
    applied to driving a car on another busy street.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '从数学上讲，给定源域 **D**[**S**] 和学习任务 **T**[**S**]，目标域 **D**[**T**] 和学习任务 **T**[**T**]，迁移学习的目的是通过利用
    **D**[**S**] 和 **T**[**S**] 中的知识，帮助提高在 **D**[**T**] 中的（目标）预测函数 **f**[**T**]**(·)**
    的学习，其中 **D**[**S**] **≠ D**[**T**] 或 **T**[**S**] **≠ T**[**T**]。简单来说，迁移学习是利用
    B 在繁忙街道上骑自行车获得的知识，应用于另一条繁忙街道上开车。 '
- en: Transfer Learning and Machine Learning
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 迁移学习与机器学习
- en: In the preceding example, if the target and source domains are the same, i.e.,
    if driving a car is both the source as well as the target domain (**D**[**S**]
    **= D**[**T**]), and the learning tasks are the same or similar, i.e., driving
    a car in two different busy streets (**T**[**S**] **= T**[**T**]), the learning
    problem becomes a traditional machine learning problem. However, one should note
    that transfer learning is an application of a research problem to a machine learning
    problem and not an algorithm or technique. Transfer learning is different from
    traditional machine learning, as it uses pre-trained models that have been built
    with some task **T**[**S**] as an input to be used for another task **T**[**T**]
    in a way that will help to jump-start the development process for task **T**[**T**].
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的例子中，如果目标和源域相同，即如果开车是源域以及目标域（**D**[**S**] **= D**[**T**]），并且学习任务相同或相似，即在不同繁忙街道上开车（**T**[**S**]
    **= T**[**T**]），学习问题就变成了传统的机器学习问题。然而，应该注意的是，迁移学习是将研究问题应用于机器学习问题的一种应用，而不是算法或技术。迁移学习与传统的机器学习不同，因为它使用了一些任务
    **T**[**S**] 作为输入构建的预训练模型，用于另一个任务 **T**[**T**]，以帮助启动任务 **T**[**T**] 的发展过程。
- en: Figure [4-8](#Fig8) depicts a typical machine learning system. We can see that
    for a particular task for a given domain, the machine learning model is able to
    learn and generalize well. However, if there is a new task from a different domain,
    it must build an altogether new model, to be able to generalize for that task/domain.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-8](#Fig8) 描述了一个典型的机器学习系统。我们可以看到，对于给定域的特定任务，机器学习模型能够很好地学习和泛化。然而，如果有一个来自不同域的新任务，它必须构建一个全新的模型，才能为该任务/域进行泛化。
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig8_HTML.png](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig8_HTML.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig8_HTML.png](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig8_HTML.png)'
- en: Figure 4-8
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-8
- en: Machine learning methodology
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习方法
- en: Figure [4-9](#Fig9) depicts a typical transfer learning methodology. We can
    see that for Task/Domain A, the machine learning model is able to learn and generalize
    well. Now, here, we extract the “general” knowledge gained from Task/Domain A
    and apply it to a similar Task/Domain B.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-9](#Fig9) 描述了一个典型的迁移学习方法。我们可以看到，对于任务/域 A，机器学习模型能够很好地学习和泛化。现在，我们提取从任务/域
    A 获得的“通用”知识，并将其应用于类似的任务/域 B。
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig9_HTML.png](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig9_HTML.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig9_HTML.png](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig9_HTML.png)'
- en: Figure 4-9
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-9
- en: Transfer learning methodology
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习方法
- en: 'Following are applications of transfer learning:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些迁移学习的应用：
- en: 'Deep learning/image recognition: Use of Word2vec and fastText models for sentiment
    analysis of Twitter data on a particular topic'
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度学习/图像识别：使用 Word2vec 和 fastText 模型对特定主题的 Twitter 数据进行情感分析
- en: 'Natural language processing: Use of AlexNet and Inceptions models for object
    detection'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自然语言处理：使用 AlexNet 和 Inceptions 模型进行目标检测
- en: 'Following are advantages of transfer learning:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是迁移学习的优势：
- en: Reduced training time, by using some of the modules of an already developed
    model to a new one
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过使用已开发模型的一些模块来构建新的模型，减少了训练时间
- en: Usefulness in scenarios in which there is not sufficient data to train a model
    for desired results
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在没有足够数据来训练模型以获得所需结果的情况下，迁移学习具有实用性
- en: Variational Autoencoders Using TensorFlow 2.0
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 TensorFlow 2.0 的变分自编码器
- en: To understand what variational autoencoders are, you must first understand what
    autoencoders are, where they are used, and what the difference is between VAEs
    and the other forms of autoencoders.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解变分自动编码器是什么，你必须首先了解自动编码器是什么，它们在哪里使用，以及VAE与其他自动编码器形式之间的区别。
- en: Autoencoders
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动编码器
- en: 'Autoencoders are a type of ANN that is used to generate output data in the
    same unsupervised manner as for input data. An autoencoder essentially comprises
    two main parts: an encoder and a decoder. The encoder compresses the input data
    into a lower dimensional representation of it, and the decoder decompresses the
    representation into the original input data. Figure [4-10](#Fig10) shows a simple
    autoencoder applied on images.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器是一种用于以与输入数据相同的方式无监督地生成输出数据的ANN。自动编码器本质上包含两个主要部分：编码器和解码器。编码器将输入数据压缩为其低维表示，解码器将表示解压缩为原始输入数据。图[4-10](#Fig10)展示了应用于图像的简单自动编码器。
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig10_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig10_HTML.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig10_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig10_HTML.jpg)'
- en: Figure 4-10
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-10
- en: Basic autoencoder
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 基本自动编码器
- en: Applications of Autoencoders
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动编码器的应用
- en: One limitation of autoencoders is that they can only be used to reconstruct
    data that the encoder part of the autoencoders has seen during the training. They
    cannot be used to generate new data. This is where variational autoencoders enter
    the picture.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器的一个局限性是，它们只能用于重建编码器部分在训练期间看到的自动编码器数据。它们不能用于生成新数据。这就是变分自动编码器发挥作用的地方。
- en: 'Following are two applications of autoencoders:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是自动编码器的两个应用：
- en: As a dimensionality reduction technique to observe/visualize high-dimensional
    data into lower dimensions
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 作为一种降维技术，用于将高维数据观察/可视化到低维
- en: As a compression technique to save memory and network cost
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 作为一种压缩技术，用于节省内存和网络成本
- en: Variational Autoencoders
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变分自动编码器
- en: A VAE is a type of generative model plus general autoencoders that let us sample
    from the model, to generate data. Most VAE architecture is the same as that of
    a generic autoencoder, except that VAEs force the compressed representation of
    the input data to follow a zero mean and a unit variance Gaussian distribution.
    A simple VAE architecture is shown in Figure [4-11](#Fig11).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: VAE是一种生成模型，结合了通用自动编码器，允许我们从模型中采样以生成数据。大多数VAE架构与通用自动编码器相同，除了VAE强制输入数据的压缩表示遵循零均值和单位方差的高斯分布。一个简单的VAE架构如图[4-11](#Fig11)所示。
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig11_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig11_HTML.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig11_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig11_HTML.jpg)'
- en: Figure 4-11
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-11
- en: Basic VAE architecture
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 基本VAE架构
- en: Implementation of Variational Autoencoders Using TensorFlow 2.0
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用TensorFlow 2.0实现变分自动编码器
- en: Let’s build a VAE model that will help us to generate new handwritten digits,
    using the Fashion-MNIST data set. This data set comprises 70,000 images (black-and-white)
    of handwritten digits, ranging from 0 to 9, out of which 60,000 are for training,
    and the remaining 10,000 are for testing. Each grayscale image is normalized to
    fit a 28 × 28 pixel bounding box.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个VAE模型，使用Fashion-MNIST数据集来帮助我们生成新的手写数字。这个数据集包含70,000张手写数字（黑白）图像，从0到9，其中60,000张用于训练，剩下的10,000张用于测试。每个灰度图像被归一化以适应28
    × 28像素的边界框。
- en: Load the required Python modules.
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加载所需的Python模块。
- en: Load the Fashion-MNIST data set with train-test split, normalization, and binarization.
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用训练-测试拆分、归一化和二值化加载Fashion-MNIST数据集。
- en: '[PRE13]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Batching and shuffling the data set
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批处理和打乱数据集
- en: '[PRE14]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Use `tf.keras.Sequential` to build the encoder and decoder.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用`tf.keras.Sequential`构建编码器和解码器。
- en: '[PRE15]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: We will be building two convolutional neural networks for the encoder and decoder
    wrapping, with `tf.keras.Sequential`.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用`tf.keras.Sequential`构建两个卷积神经网络，用于编码器和解码器的封装。
- en: Build an optimizer function.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建优化器函数。
- en: '[PRE16]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Training
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练
- en: '[PRE17]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Generate an image with a trained model.
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用训练好的模型生成图像。
- en: '[PRE18]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '[PRE19]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figo_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figo_HTML.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figo_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figo_HTML.jpg)'
- en: As we can see from the preceding, we were able to generate new images of handwritten
    digits, using the Fashion-MNIST data set for training.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们能够使用Fashion-MNIST数据集进行训练，生成新的手写数字图像。
- en: The code for the VAE implementation using TensorFlow 2.0 can be found at [`http://bit.ly/CNNVAETF2`](http://bit.ly/CNNVAETF2).
    You can save a copy of the code and run it in the Google Colab environment. Try
    experimenting with different parameters and note the results.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TensorFlow 2.0实现的VAE代码可以在[http://bit.ly/CNNVAETF2](http://bit.ly/CNNVAETF2)找到。你可以保存代码副本并在Google
    Colab环境中运行它。尝试调整不同的参数并记录结果。
- en: Conclusion
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we have explored various well-known architectures for image
    processing and generation. Also, we have considered the concept of transfer learning
    and how it has helped to speed up machine learning development and bring more
    accuracy to models for which training data is not abundant. Finally, you have
    seen how we can leverage the TensorFlow and Keras APIs, to build these architectures.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了图像处理和生成中各种著名的架构。此外，我们还考虑了迁移学习概念，以及它是如何帮助加速机器学习发展并提高训练数据不足的模型的准确性的。最后，你看到了我们如何利用TensorFlow和Keras
    API来构建这些架构。
