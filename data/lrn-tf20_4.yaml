- en: Figure 4-5
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-5
- en: GoogleNet architecture
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: GoogleNet 架构
- en: ResNet. This architecture was developed by Kaiming He, Xiangyu Zhang, Shaoqing
    Ren, and Jian Sun in 2015\. It won the ILSVRC-2015 competition, with a top-five
    error rate of 3.57%, which was lower than the human error top-five rate. Figure
    [4-6](#Fig6) shows the ResNet architecture.
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ResNet。这个架构是由 Kaiming He、Xiangyu Zhang、Shaoqing Ren 和 Jian Sun 在 2015 年开发的。它在
    ILSVRC-2015 竞赛中获胜，顶级错误率为 3.57%，低于人类顶级错误率。图 [4-6](#Fig6) 展示了 ResNet 架构。
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig6_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig6_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig6_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig6_HTML.jpg)'
