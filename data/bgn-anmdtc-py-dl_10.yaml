  type: TYPE_IMG
  zh: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig41_HTML.jpg)'
- en: A graph of observation versus date time has a densely fluctuating curve with
    sharp high peaks and a few dots over the lines.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 观测值与时间戳的图表具有密集波动曲线，有尖锐的高峰和几处在线上的点。
- en: Figure 10-38
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-38
- en: The identified anomalies using the transformer predictions
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 使用变压器预测识别的异常
- en: Figure [10-38](#Fig41) shows that quite a few points are labeled as anomalies.
    Most importantly, the model managed to predict as anomalies Thanksgiving, Christmas,
    New Year’s Eve, and a snowstorm-type weather anomaly, among some other points.
    That being said, there are quite a few points that don’t seem like they should
    be anomalies. One problem with the transformer is that it does tend to overfit
    due to its high model capacity. However, you can play with the hyperparameters
    of the transformer model as well as add early stopping or any other mechanism
    to your training loop to see if you can manage the overfitting.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 图[10-38](#Fig41)显示，相当多的点被标记为异常。最重要的是，模型成功地将感恩节、圣诞节、除夕和类似暴风雪的天气异常预测为异常，以及其他一些点。尽管如此，还有一些点看起来不应该被标记为异常。Transformer的一个问题是它确实倾向于过拟合，因为它具有很高的模型容量。然而，你可以调整Transformer模型的超参数，以及在你的训练循环中添加早期停止或其他机制，以查看你是否可以管理过拟合。
- en: It’s a balancing act, because how well the transformer fits the training data
    during the training process informs the anomaly detection algorithm later on.
    This is due to significant deviations from the time Series as determined by the
    predicted outputs of the transformer will be flagged as anomalies. But if the
    model underfits the training data, you may not pick up on anomalies that you should.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个平衡行为，因为Transformer在训练过程中如何拟合训练数据将影响后续的异常检测算法。这是由于Transformer预测输出的时间序列的显著偏差将被标记为异常。但如果模型欠拟合训练数据，你可能会错过你应该注意到的异常。
- en: Overall, this was an example of **unsupervised anomaly detection**. We took
    a subset of the original sequence, trained the model to output a prediction given
    rolling windows, and we calculated a threshold by which we can identify anomalies.
    None of the steps in this process involved a training label.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，这是一个**无监督异常检测**的例子。我们取了原始序列的一部分，训练模型在给定滚动窗口的情况下输出预测，并通过计算一个阈值来识别异常。在这个过程中，没有任何步骤涉及到训练标签。
- en: Summary
  id: totrans-309
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed transformer networks and examined how they fare
    when applied to anomaly detection.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了Transformer网络，并考察了它们在应用于异常检测时的表现。
- en: In Chapter [11](483137_2_En_11_Chapter.xhtml), we will look at the practical
    use case of anomaly detection in real-world scenarios.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[11](483137_2_En_11_Chapter.xhtml)章中，我们将探讨异常检测在现实场景中的实际应用案例。
