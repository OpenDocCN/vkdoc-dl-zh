- en: Let’s now create the training dataset. We will be using a rolling-window approach
    and a window size of `time_steps`, which we will shorthand to **T** in this explanation.
    We will iterate through the dataset a window length of T at a time, taking the
    first T-1 values as the x and the T^(th) values as the y. We will teach the model
    to read an input of T-1 values and predict the T^(th). Refer to Figure [10-15](#Fig17).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们创建训练数据集。我们将使用滚动窗口方法，窗口大小为 `time_steps`，我们将在此解释中简写为 **T**。我们将以 T 长度的窗口一次迭代通过数据集，将前
    T-1 个值作为 x，将 T^(th) 个值作为 y。我们将教会模型读取 T-1 个值的输入并预测 T^(th)。参见图 [10-15](#Fig17)。
