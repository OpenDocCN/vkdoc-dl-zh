- en: If you do not see loss values decreasing and matching in magnitude to what Figure
    [10-29](#Fig31) shows (given by the loss and mean absolute error metrics), and
    it gets stuck around a loss of 0.15, you should restart the training process.
    For this particular dataset, if the epochs consistently produce a loss of around
    0.15, that indicates that the transformer isn’t learning and only produces a straight
    line or some other faulty output. You can visualize this with the subsequent code
    blocks if desired.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有看到损失值下降并与图 [10-29](#Fig31) 显示的（由损失和平均绝对误差指标给出）相匹配，并且它卡在约 0.15 的损失上，你应该重新启动训练过程。对于这个特定的数据集，如果
    epoch 一直产生约 0.15 的损失，这表明转换器没有学习，并且只产生直线或其他错误输出。如果你希望，可以使用后续的代码块来可视化这一点。
