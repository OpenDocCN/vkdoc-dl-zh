- en: What Is a Transformer?
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是转换器？
- en: A transformer is a class of deep learning architecture that has revolutionized
    the field of natural language processing (NLP). Succeeding recurrent neural network
    (RNN)-based architectures like the LSTM model, transformer networks are able to
    scale up to extremely large parameter and dataset sizes thanks to their ability
    to train and make inferences in parallel. This parallelization capability is possible
    because the layers of the network rely on the concept of self-attention.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 转换器是一类深度学习架构，它彻底改变了自然语言处理（NLP）领域。继基于循环神经网络（RNN）的架构，如 LSTM 模型之后，转换器网络能够扩展到极其大的参数和数据集大小，这得益于它们并行训练和推理的能力。这种并行化能力之所以可能，是因为网络的层依赖于自注意力的概念。
- en: '**Self-attention**, on a high level, is the mechanism by which the model learns
    to assign importance weights to tokens in a sequence in relation to a specific
    token being evaluated. For example, take the sentence “The dog ate some food and
    it became full,” and consider that the model is trying to evaluate what “it” means
    in this context. The word “it” could refer to either “dog” or “food.” The model,
    recognizing language patterns from all the training it’s done, learns to assign
    a higher importance to “dog” than “food” in this case, and thus pays more attention
    to “dog” instead.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**自注意力**，从高层次来看，是模型学习根据特定被评估的标记，在序列中为标记分配重要性权重的机制。例如，考虑句子“狗吃了些食物，它变得饱了”，假设模型正在尝试评估在这个上下文中“它”的含义。单词“它”可能指的是“狗”或“食物”。模型通过从所有训练中识别出的语言模式，学习在这种情况下将更高的重要性分配给“狗”而不是“食物”，因此更关注“狗”。'
- en: In the numerical terms that a model operates on, the model places a higher weight
    on the embedding representation of “dog” as it is evaluating the embedding representation
    of “it” to understand the sequence more accurately. At a very high level, self-attention
    basically means that the model pays attention to specific details of the input
    to understanding of context. Since this process can operate on the entire sequence
    at once, it is able to accurately capture long-range dependencies, avoid vanishing/exploding
    gradients, and avoid losing context over very long sequences.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型操作的数值术语中，当模型评估“它”的嵌入表示以理解序列时，它对“狗”的嵌入表示赋予更高的权重。在非常高的层次上，自注意力基本上意味着模型关注输入的具体细节以理解上下文。由于这个过程可以一次性在整个序列上操作，它能够准确地捕捉长距离依赖关系，避免梯度消失/爆炸，并避免在非常长的序列中丢失上下文。
- en: Transformer networks have outclassed RNN-based counterparts at many NLP tasks,
    such as text classification, question answering, sentiment analysis, machine translation,
    and so on. Perhaps the most recent and exciting type of transformer model is the
    large language model (LLM). Trained on enormous amounts of text data, an LLM performs
    tasks like text generation, question answering, summarization, translation, code
    writing, and even brainstorming. Some LLMs can be tuned to serve as conversational
    chatbots, able to perform multiple of these tasks in a human-like manner. Perhaps
    the most famous and successful of these LLMs is ChatGPT, a model so powerful that
    its foundational model, GPT4, has been described by some researchers to be a key
    point toward achieving artificial general intelligence.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 转换器网络在许多NLP任务上优于基于RNN的对应物，例如文本分类、问答、情感分析、机器翻译等等。也许最新和最激动人心的转换器模型类型是大型语言模型（LLM）。在大量文本数据上训练的LLM执行文本生成、问答、摘要、翻译、代码编写甚至头脑风暴等任务。一些LLM可以被调整以作为对话聊天机器人，能够以类似人类的方式执行多个这些任务。在这些LLM中最著名和最成功的是ChatGPT，这个模型非常强大，以至于一些研究人员将其基础模型GPT4描述为通往实现通用人工智能的关键点。
- en: 'While we won’t be creating any sentient AI in this chapter, we can take advantage
    of the ability of the transformer model to perform well on sequence-based tasks
    to perform time-series anomaly detection. In comparison to RNNs, transformer models
    carry the following advantages:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们不会在本章中创建任何有感知的AI，但我们可以利用转换器模型在基于序列的任务上表现良好的能力来执行时间序列异常检测。与RNN相比，转换器模型具有以下优势：
- en: '**Parallelization**: The ability of the transformer model to process sequences
    in parallel enables it to make fuller use of GPU computing power, allowing it
    to train and make inferences in parallel and in less time than an RNN-based network
    can do so.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并行化**：转换器模型能够并行处理序列的能力，使其能够更充分地利用GPU计算能力，允许它在比基于RNN的网络更短的时间内并行训练和进行推理。'
- en: '**Large sequences**: Because of the self-attention mechanism, the transformer
    pays attention to every token in the sequence at once, regardless of distance.
    This allows for better, more accurate modeling of relationships between tokens
    anywhere in the sequence.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**长序列**：由于自注意力机制，转换器一次关注序列中的每个标记，无论距离多远。这允许更好地、更准确地建模序列中任何位置的标记之间的关系。'
- en: '**Scalability**: Because of the parallelization of transformers, we can scale
    up to far larger sizes than is feasible for RNN-based networks.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：由于转换器的并行化，我们可以扩展到比基于RNN的网络可行的大得多的规模。'
- en: '**Vanishing gradient**: Though transformers are very deep, they make use of
    residual skip connections over the blocks, allowing the gradient to propagate
    deeper through the network as necessary and stabilize training, allowing for ease
    of scale by making the networks deeper.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**梯度消失**：尽管转换器非常深，但它们在块之间使用残差跳跃连接，允许梯度在必要时更深入地通过网络传播，从而稳定训练，通过使网络更深来实现易于扩展。'
- en: '**Rich feature learning**: A transformer can have multiple attention heads,
    each of which can learn a specific set of features given the input data. It is
    sort of comparable to how CNN filters can learn different kernels, such as one
    filter learning horizontal edge detection while another learns vertical edge detection.
    Having multiple attention heads enables a transformer to gain a deeper and better
    understanding of the given inputs.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**丰富的特征学习**：转换器可以有多个注意力头，每个注意力头都可以根据输入数据学习一组特定的特征。这有点类似于CNN滤波器可以学习不同的核，例如一个滤波器学习水平边缘检测，而另一个滤波器学习垂直边缘检测。拥有多个注意力头使转换器能够更深入、更好地理解给定的输入。'
- en: Given all these advantages, it’s easy to see why transformers have overtaken
    RNNs, even though some RNNs have been modified to use attention mechanisms.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到所有这些优势，很容易理解为什么转换器已经超越了RNN，尽管一些RNN已经被修改以使用注意力机制。
- en: 'That being said, transformers do have some disadvantages:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，转换器确实有一些缺点：
- en: '**Computational demand**: Transformers scale very well, but they are incredibly
    computationally expensive due to the heavy parameter count. They require large
    amounts of GPU memory, which is both resource intensive and monetarily expensive.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算需求**：转换器扩展得很好，但由于参数数量庞大，它们在计算上极其昂贵。它们需要大量的GPU内存，这既资源密集又昂贵。'
- en: '**Data hungry**: Transformers also require lots of data to train well, which
    can be troublesome to provide without the proper computational resources.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据饥渴**：变压器也需要大量数据来训练，如果没有适当的计算资源，这可能很麻烦。'
- en: '**Overfitting**: Transformers have many parameters, meaning their model capacity
    is very high. Though this enables them to perform very powerfully, it can also
    lead to some serious overfitting to smaller datasets.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过拟合**：变压器有大量参数，这意味着它们的模型容量非常高。虽然这使得它们能够非常强大地执行，但也可能导致对较小数据集的严重过拟合。'
- en: '**Sequential inference**: Although transformers perform sequence processing
    in parallel, they generate tokens sequentially—one at a time using the previous
    tokens. It’s just that the sequence processing itself is done in parallel, whereas
    in an LSTM it’s still sequential.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**顺序推理**：尽管变压器并行执行序列处理，但它们是顺序生成标记的——一次生成一个，使用之前的标记。只是序列处理本身是并行的，而在 LSTM 中仍然是顺序的。'
- en: '**Hallucination**: More applicable to text generation tasks, transformers can
    “hallucinate” plausible-sounding outputs that are actually wrong. This is noticeable
    in LLMs that tend to confidently make up incorrect information.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻觉**：更适用于文本生成任务，变压器可以“产生”听起来合理但实际上是错误的输出。这在倾向于自信地编造错误信息的 LLM 中是明显的。'
- en: Transformer Architecture
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变压器架构
- en: Figure [10-1](#Fig1) shows what the architecture of a transformer looks like^([1](#Fn1)).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-1](#Fig1) 展示了变压器的架构看起来是什么样子^([1](#Fn1))。
- en: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig1_HTML.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig1_HTML.jpg)'
- en: An architecture diagram of the transformer has an encoder connected to a decoder
    with output probabilities. The encoder has inputs and input embedding, and the
    decoder has outputs and output embedding.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 变压器的架构图显示了一个编码器连接到具有输出概率的解码器。编码器有输入和输入嵌入，解码器有输出和输出嵌入。
- en: Figure 10-1
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-1
- en: The high-level architecture of a transformer, which is composed of an encoder
    (the blue block) and a decoder (the red block)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 变压器的整体架构，由编码器（蓝色块）和解码器（红色块）组成
- en: On a high level, the job of the encoder is to learn to encode the input sequence
    in such a manner that allows for a rich understanding of the original input sequence.
    The decoder then takes the output embedding and the encoding output of the encoder,
    processes it, and outputs some type of value. This could be a word token in the
    case of text generation models, or a real-value output in the case of a regression
    model. In Figure [10-1](#Fig1), as well as the original paper from which the figure
    was adapted, the decoder output is processed by a linear layer and a `softmax()`
    layer to create probabilities for determining the output word token.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在高层次上，编码器的任务是学习以某种方式编码输入序列，从而允许对原始输入序列有丰富的理解。然后解码器处理输出嵌入和解码器的编码输出，进行处理，并输出某种类型的值。这可能是文本生成模型中的单词标记，或者回归模型中的实值输出。在图
    [10-1](#Fig1) 以及从该图改编的原始论文中，解码器输出通过线性层和 `softmax()` 层进行处理，以创建确定输出单词标记的概率。
- en: The input embedding is a representation of the original input token, meant to
    capture its meaning. Input embeddings can be pre-initialized to specific, learned
    embeddings, or they can be learned through the training process by the model.
    The same goes for the output embedding. Because the model has no recurrence and
    processes the whole sequence in parallel, the transformer doesn’t understand the
    order of tokens in the sequence. That is why we must include a positional embedding,
    which helps encode the relative positions of all the tokens in the sequence.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 输入嵌入是原始输入标记的表示，旨在捕捉其含义。输入嵌入可以预先初始化为特定的学习嵌入，或者它们可以通过模型在训练过程中学习。输出嵌入也是如此。由于模型没有递归并且并行处理整个序列，变压器无法理解序列中标记的顺序。这就是为什么我们必须包含位置嵌入，它有助于编码序列中所有标记的相对位置。
- en: Transformer Encoder
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变压器编码器
- en: Next, let’s look at the encoder in detail. Refer to Figure [10-2](#Fig2).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们详细看看编码器。参见图 [10-2](#Fig2)。
- en: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig2_HTML.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig2_HTML.png)'
- en: A reverse flowchart is as follows. Positionally embedded input embedding leads
    to N encoder blocks. The encoder blocks are components of the encoder.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 逆流程图如下。位置嵌入的输入嵌入导致 N 个编码器块。编码器块是编码器的一部分。
- en: Figure 10-2
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-2
- en: The encoder takes the combined input embedding and positional embedding and
    passes it through a Series of N encoder blocks
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器接收组合的输入嵌入和位置嵌入，并通过一系列 N 个编码器块传递。
- en: The encoder is itself comprised of a Series of encoder blocks that the inputs
    pass through. By the end of the entire encoder, the output sequence should be
    some kind of encoded embedding that represents the original input sequence.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器本身由一系列编码器块组成，输入通过这些块。在整个编码器结束时，输出序列应该是一种编码嵌入，它代表了原始输入序列。
- en: So, what exactly is contained within this encoder block? Refer to Figure [10-3](#Fig3).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这个编码器块中到底包含什么呢？请参阅图 [10-3](#Fig3)。
- en: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig3_HTML.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig3_HTML.jpg)'
- en: A flowchart has the components of the encoder block as follows. Multi-headed
    attention layer, add and norm, and feed-forward layer. The pathway to the attention
    layer is connected to the add and norm. The pathway from the first add and norm
    is connected to the second add and norm.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图包含编码器块的组件如下。多头注意力层，加和归一化，和前馈层。通往注意力层的路径连接到加和归一化。从第一个加和归一化到第二个加和归一化的路径连接。
- en: Figure 10-3
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-3
- en: An encoder block
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 一个编码器块
- en: The encoder block passes the input through a multi-head attention layer, responsible
    for computing the attention weights and for learning different features per attention
    head that all get aggregated via the feed-forward layer. The “add and norm” step
    basically involves adding the input before the multi-head attention layer to the
    output of the multi-head attention layer and then normalizing it. This is called
    a *residual skip-connection*, since during backpropagation, the gradient can propagate
    up the network more directly, skipping over the multi-head attention layer if
    needed. Because the gradient can skip over the multi-head attention layer, it
    avoids the issue of vanishing gradient since chain-rule would add more values
    to be multiplied with the gradient and potentially diminish its magnitude (if
    these multipliers were also less than 1 in magnitude). This allows the transformer
    to become much deeper, since the gradient signal goes farther up the network without
    being diminished in magnitude.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器块通过一个多头注意力层传递输入，该层负责计算注意力权重，并为每个注意力头学习不同的特征，这些特征通过前馈层进行聚合。所谓的“加和归一化”步骤基本上是将多头注意力层之前的输入加到多头注意力层的输出上，然后对其进行归一化。这被称为
    *残差跳跃连接*，因为在反向传播过程中，梯度可以更直接地向上传播网络，如果需要，可以跳过多头注意力层。由于梯度可以跳过多头注意力层，因此避免了梯度消失的问题，因为链式法则会添加更多要乘以梯度的值，并可能减小其幅度（如果这些乘数的大小也小于
    1）。这使得 Transformer 可以变得非常深，因为梯度信号可以向上传播更远，而不会减小幅度。
- en: A feed forward layer is a regular neural network layer, so what is a multi-head
    attention layer? Refer to Figure [10-4](#Fig4).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 前馈层是一个常规的神经网络层，那么多头注意力层是什么呢？请参阅图 [10-4](#Fig4)。
- en: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig4_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig4_HTML.jpg)'
- en: A flowchart is as follows. Sublayer input points to Q linear, K linear, and
    V linear which point to scaled dot product attention, concat, and linear.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图如下。子层输入指向 Q 线性，K 线性，和 V 线性，它们指向缩放点积注意力，连接和线性。
- en: Figure 10-4
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-4
- en: The multi-head attention layer zoomed in
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 放大查看多头注意力层
- en: The sublayer refers to the multi-head attention sublayer. Focusing on one particular
    head of this multi-head attention layer, the sublayer input is passed through
    three separate linear layers, each responsible for computing the **Query (Q)**,
    **Key (K)**, and **Value (V)** matrices. Let’s zoom into the scaled dot-product
    attention block itself and find out how the Q, K, and V matrices are used. Refer
    to Figure [10-5](#Fig5).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 子层指的是多头注意力子层。专注于这个多头注意力层的一个特定头，子层输入通过三个独立的线性层传递，每个层负责计算 **查询 (Q)**、**键 (K)**
    和 **值 (V)** 矩阵。让我们放大缩放点积注意力块本身，看看 Q、K 和 V 矩阵是如何使用的。请参阅图 [10-5](#Fig5)。
- en: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig5_HTML.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig5_HTML.jpg)'
- en: A flowchart is as follows. Q and K, Mat Mul, scale, mask, Soft Max, Mat Mul.
    V points to the second Mat Mul. An outward arrow extends from the second Mat Mul.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图如下。Q 和 K，矩阵乘法，缩放，掩码，Soft Max，矩阵乘法。V 指向第二个矩阵乘法。从第二个矩阵乘法延伸出一个向外箭头。
- en: Figure 10-5
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-5
- en: How the Q, K, and V matrices are used in a scaled dot-product attention head.
    The mask is optional
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在缩放点积注意力头中如何使用 Q、K 和 V 矩阵。掩码是可选的
- en: Figure [10-5](#Fig5) depicts what goes on in the scaled dot-product attention
    layer given the Q, K, and V matrices output by their respective linear layers.
    These linear layers are neural networks layers without any activation functions.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图[10-5](#Fig5)描述了在由各自的线性层输出的Q、K和V矩阵的条件下，缩放点积注意力层中发生的情况。这些线性层是没有激活函数的神经网络层。
- en: 'Let’s focus on the high-level. Q, K, and V can be thought of as follows:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们关注一下高层次的内容。Q、K和V可以这样理解：
- en: '**Q (Query)**: The “question” about certain parts of the input. Different attention
    heads can focus on different parts of the input and thus ask different “questions”
    about the input. Example: What is the phrase “the animal” most relevant to in
    the input “the animal is eating food”?'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Q (Query)**: 关于输入中某些部分的“问题”。不同的注意力头可以关注输入的不同部分，从而对输入提出不同的问题。例如：在输入“the animal
    is eating food”（这只动物正在吃食物）中，“the animal”（这只动物）这个短语最相关的是什么？'
- en: '**K (Key)**: The “reference” material, transforming the input in a particular
    way. When the scaled dot-product of Q, K followed by `softmax()` is computed,
    we get attention scores that “answer” the question and give us a weighting of
    importance of what tokens to pay “attention” to. Example: “eating” might have
    the highest attention score in the input “the animal is eating food.”'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**K (Key)**: “参考”材料，以特定方式转换输入。当计算Q、K的缩放点积并随后应用`softmax()`时，我们得到注意力分数，这些分数“回答”了问题，并给出了对哪些标记需要给予“关注”的重要性的加权。例如：“eating”（吃）可能在输入“the
    animal is eating food”（这只动物正在吃食物）中具有最高的注意力分数。'
- en: '**V (Value)**: The “answer” and a different transformation of the input. When
    multiplied with the attention scores, we get the final output embedding of this
    scaled dot-product attention mechanism. Example: Q and K tell us that “eating”
    is most relevant to “the animal.” The generated embedding is then some kind of
    interpretation of the input sentence focusing on “the animal” and “eating,” to
    be further transformed by subsequent layers.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**V (Value)**: “答案”和输入的不同转换。当与注意力分数相乘时，我们得到缩放点积注意力机制的最终输出嵌入。例如：Q和K告诉我们“eating”（吃）与“the
    animal”（这只动物）最相关。生成的嵌入是对输入句子的一种解释，专注于“the animal”（这只动物）和“eating”（吃），然后由后续层进一步转换。'
- en: Keep in mind that because of the multiple attention heads, each will learn to
    ask different “questions” and in the end produce a richer and more diverse understanding
    of the original input. When scaled up and fed a lot of diverse data, these models
    can learn to link concepts and ideas across different fields, allowing LLMs like
    ChatGPT to produce more compelling, informed, and accurate responses across a
    wide variety of fields (aside from the tendency of LLMs to sometimes produce confident
    but factually untrue answers).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，由于存在多个注意力头，每个头都会学会提出不同的问题，最终产生对原始输入更丰富和多样化的理解。当这些模型在大量多样化的数据上进行扩展时，它们可以学会在不同领域之间建立概念和想法的联系，使得像ChatGPT这样的LLM能够在广泛的领域内产生更有说服力、信息丰富和准确的回答（尽管LLM有时会产生自信但事实上不准确的答案）。
- en: Back to the multi-head attention layer, the outputs of each scaled dot-product
    attention head are concatenated and passed through a linear layer. This should
    now bring us to the add and norm step of Figure [10-3](#Fig3). With the output
    of this multi-head attention layer added to its input and normalized, we pass
    it through a feedforward layer (a neural network layer with an activation function),
    and then repeat another add and norm step.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 回到多头注意力层，每个缩放点积注意力头的输出被连接起来，并通过一个线性层传递。现在，我们应该到达图[10-3](#Fig3)中的加和归一化步骤。将这个多头注意力层的输出加到其输入上并归一化后，我们通过一个前馈层（一个带有激活函数的神经网络层）传递，然后重复另一个加和归一化步骤。
- en: With all the preceding discussion, we have explored the inner workings of one
    encoder block. An encoder layer is simply a sequence of N of these encoder blocks,
    the final output of which is the final encoding generated.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有前面的讨论之后，我们已经探讨了编码器块的工作原理。编码器层只是N个这样的编码器块的序列，其最终输出是生成的最终编码。
- en: Transformer Decoder
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Transformer 解码器
- en: The decoder architecture is very similar to that of the encoder but with a few
    key differences. Let’s look at the high-level overview of the decoder architecture,
    shown in Figure [10-6](#Fig6).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器架构与编码器非常相似，但有一些关键的不同之处。让我们看一下解码器架构的高层次概述，如图[10-6](#Fig6)所示。
- en: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig6_HTML.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig6_HTML.jpg)'
- en: A flowchart is as follows. Positionally embedded output embedding and M decoder
    blocks. Three arrows from the encoder output point to each decoder block. Decoder
    blocks are the components of the decoder.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图如下。位置嵌入输出嵌入和 M 个解码器块。从编码器输出指向每个解码器块的三条箭头。解码器块是解码器的组成部分。
- en: Figure 10-6
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-6
- en: The high-level overview of the decoder in a transformer
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer 中解码器的高级概述
- en: The decoder is comprised of M decoder blocks, and each of them takes the encoder’s
    final output as an additional input to the preceding decoder block’s output (or
    the output embedding with positional encoding if it’s the first decoder block).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器由 M 个解码器块组成，每个块都将编码器的最终输出作为前一个解码器块输出的附加输入（如果是第一个解码器块，则为带有位置编码的输出嵌入）。
- en: What does each of these decoder blocks look like? Refer to Figure [10-7a](#Fig7).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这些解码器块看起来是什么样子？请参考图 [10-7a](#Fig7)。
- en: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig7_HTML.jpg)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig7_HTML.jpg)'
- en: A flowchart is as follows. Masked multi-head attention layer, add and norm,
    multi-head attention layer, add and norm, feed-forward layer, and add and norm.
    The final encoder output points to the multi-head attention layer.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图如下。遮蔽多头注意力层、加和归一化、多头注意力层、加和归一化、前馈层和加和归一化。最终的编码器输出指向多头注意力层。
- en: Figure 10-7a
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-7a
- en: The decoder has an additional multi-head attention layer that performs cross-attention
    (self-attention that focuses on the encoder’s final output)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器有一个额外的多头注意力层，该层执行交叉注意力（关注编码器最终输出的自注意力）
- en: The masked multi-head attention layer performs the same function as the multi-head
    attention layer from the encoder, except that it applies a causality mask so that
    attention is computed on previous tokens, not future tokens.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 被遮蔽的多头注意力层执行与编码器中的多头注意力层相同的功能，除了它应用了一个因果掩码，因此注意力是在前一个标记上计算的，而不是在未来的标记上。
- en: As for the second multi-head attention layer, this one is not masked. The query
    comes from the output of the masked multi-head attention layer, but the key and
    value matrices are computed using the output of the final encoder layer. This
    allows for computing attention scores with the context of the encoder’s representation
    of the original input sequence.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第二个多头注意力层，这个层没有被遮蔽。查询来自被遮蔽的多头注意力层的输出，但键和值矩阵是使用最终编码器层的输出计算的。这允许在编码器对原始输入序列的表示的上下文中计算注意力分数。
- en: For example, in a language translation task from English to French, the encoder
    can ingest the English sentence and output some encoding. This encoding can be
    seen as some kind of “thought” matrix that represents the initial English sentence.
    While translating to French, the model uses this thought matrix to focus on the
    relevant parts of the English sentence. The rest of the decoder block is just
    as it is in the encoder block.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在从英语到法语的语言翻译任务中，编码器可以处理英语句子并输出一些编码。这种编码可以看作是一种“思维”矩阵，代表初始英语句子。在翻译成法语时，模型使用这个思维矩阵来关注英语句子的相关部分。解码器块的其余部分与编码器块中的情况相同。
- en: The final output of the decoder can be passed into further layers as needed.
    In Figure [10-1](#Fig1), it’s passed into a linear layer and then softmaxed to
    get a probability distribution over output tokens.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器的最终输出可以根据需要传递到进一步的层。在图 [10-1](#Fig1) 中，它被传递到一个线性层，然后通过 softmax 得到一个输出标记的概率分布。
- en: Altogether, the transformer architecture looks like Figure [10-7b](#Fig8).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，Transformer 架构看起来如图 [10-7b](#Fig8) 所示。
- en: '![](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig8_HTML.jpg)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_10_Chapter/483137_2_En_10_Fig8_HTML.jpg)'
- en: An architectural flow is as follows. An encoder has inputs, input embedding,
    and an encoder block with an add and norm layer pointing to the multi-head attention
    layer of the decoder. The decoder has outputs, output embedding, and a decoder
    block with several layers leading to output probabilities.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 架构流程如下。编码器有输入、输入嵌入和一个编码器块，该块包含一个加和归一化层，指向解码器的多头注意力层。解码器有输出、输出嵌入和一个解码器块，该块包含多个层，最终输出概率。
- en: Figure 10-7b
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-7b
- en: The full transformer architecture including the encoder blocks and decoder blocks.
    N and M may be equal, as is the case in the original Attention Is All You Need
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 包括编码器块和解码器块在内的完整 Transformer 架构。N 和 M 可能相等，正如在原始的《Attention Is All You Need》中那样。
- en: Transformer Inference
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Transformer 推理
- en: 'Inference with transformers is done in an autoregressive manner. The following
    is how it works in a machine translation setting:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 使用转换器进行推理是自回归的。以下是在机器翻译设置中的工作方式：
- en: Encode the input sentence using the encoder.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用编码器对输入句子进行编码。
- en: Use `<sos>` as the token to indicate the start of a sentence for the decoder.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `<sos>` 作为标记来指示解码器句子的开始。
- en: Using `<sos>` and the encoding, get the probability distribution for the next
    word.
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `<sos>` 和编码，获取下一个单词的概率分布。
- en: Use a selection technique to pick a word—a greedy search algorithm takes the
    highest probability word, but you can also sample the top K tokens or conduct
    beam search.
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用选择技术选择一个单词——贪婪搜索算法选择概率最高的单词，但您也可以采样前K个标记或进行束搜索。
- en: Take the next word, add it to the output sequence to get `<sos>` and `<first_output>`,
    where `<first_output>` is meant to be whatever first word was selected.
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 取下一个单词，将其添加到输出序列中，以获得 `<sos>` 和 `<first_output>`，其中 `<first_output>` 指的是所选的第一个单词。
- en: Repeating this for the other words until the cutoff length was reached or the
    end of sequence `<eos>` token is reached, indicating the end of the sentence.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复此过程，直到达到截止长度或达到序列的结束标记 `<eos>`，表示句子的结束。
- en: With that, you should have a high-level understanding of how transformer networks
    operate. We can now get started with implementing a transformer and using it to
    perform time-series anomaly detection.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你应该对转换器网络的工作原理有一个高级的理解。现在我们可以开始实现转换器并使用它来进行时间序列异常检测。
- en: Anomaly Detection with the Transformer
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用转换器进行异常检测
- en: Let’s try applying a transformer to the New York taxi dataset to see how it
    performs **unsupervised anomaly detection** in a time-series setting. Just like
    with the LSTM and TCN examples in the prior two chapters, we will be training
    the transformer to take an input sequence of time steps 1 through T-1 and predict
    the T^(th) time-series value. Once again, the first half of the time-series data
    will be set as the training set, since it shouldn’t contain the anomalies seen
    in the latter half. The 95^(th) percentile of the prediction error (given by mean
    absolute error between predicted values and actual time-series values) is used
    as the error threshold for determining anomalies. If a prediction error is higher
    than this threshold, it is labeled as an anomaly.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试将一个转换器应用于纽约出租车数据集，看看它在时间序列设置中如何执行**无监督异常检测**。就像在前两章中的LSTM和TCN示例一样，我们将训练转换器以接受时间步长1到T-1的输入序列，并预测第T个时间序列值。再次，时间序列数据的前一半将被设置为训练集，因为它不应该包含后一半中出现的异常。预测误差的第95百分位数（由预测值和实际时间序列值之间的平均绝对误差给出）用作确定异常的错误阈值。如果一个预测误差高于此阈值，则将其标记为异常。
- en: The reasoning for training only on the first half of the sequence is to teach
    the model what normal time-series values look like before we predict on the latter
    half with anomalies. The idea is that the predicted value will not match the anomaly,
    producing a higher error and being flagged as an anomaly. Since no labels are
    required for anomaly detection, this is an unsupervised learning task.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 只在序列的前半部分进行训练的理由是，在我们用异常预测后半部分之前，教模型正常时间序列值看起来是什么样子。想法是预测值不会匹配异常，产生更高的误差，并被标记为异常。由于异常检测不需要标签，这是一个无监督学习任务。
- en: Access the notebook provided at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%2010%20Transformers/chapter10_transformer.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%2010%20Transformers/chapter10_transformer.ipynb).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 访问提供的笔记本[https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%2010%20Transformers/chapter10_transformer.ipynb](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%2010%20Transformers/chapter10_transformer.ipynb)。
- en: The data is provided on GitHub as well at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master/data`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master/data).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 数据也提供在GitHub上，在[https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master/data](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master/data)。
- en: One thing to note is that there isn’t a ready implementation of the transformer
    layers in Keras, so they must be implemented and defined from scratch. TensorFlow
    offers a guide that implements the basic transformer at [`https://www.tensorflow.org/text/tutorials/transformer`](https://www.tensorflow.org/text/tutorials/transformer).
    In this section we incorporate that code and make some minor modifications to
    fit our task, as instead of machine translation (which expects token representations
    of words), we are operating on direct values.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
