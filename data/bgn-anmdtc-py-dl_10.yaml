- en: If you are following along with TensorFlow’s tutorial, you’ll notice that the
    call to the embedding layer has been removed here. This is because we are passing
    real-value inputs, and we are not trying to embed them. That being said, we still
    want to positionally encode these inputs, so we will need the positional encoding
    to tell the transformer the relative order of each element in the input sequence.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在跟随 TensorFlow 的教程，你会注意到这里已经移除了对嵌入层的调用。这是因为我们传递了实值输入，我们并不试图嵌入它们。话虽如此，我们仍然想要位置编码这些输入，因此我们需要位置编码来告诉
    Transformer 输入序列中每个元素的相对顺序。
