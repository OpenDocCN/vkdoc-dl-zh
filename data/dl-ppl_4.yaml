  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig13_HTML.jpg](Images/484548_1_En_15_Fig13_HTML.jpg)'
- en: Figure 15-13
  id: totrans-392
  prefs: []
