- en: Part IVApplying What You’ve Learned
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四部分 应用所学知识
- en: 13. Selected Topics in Computer Vision
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 13. 计算机视觉中的选讲主题
- en: After finishing Part III of *Deep Learning Pipeline*, you are ready now to build
    your pipeline. You now see the whole picture, but it's fair to tell you that you
    are missing some parts in each approach, and we will fill the gaps by giving you
    some advanced concepts in both natural language processing and computer vision.
    Then we will give you some examples, using different types of datasets to ensure
    that you can apply a deep learning pipeline correctly and easily.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成《深度学习流程》第三部分后，您现在可以开始构建您的流程了。您现在看到了整个图景，但公平地说，您在每个方法中都有一些缺失的部分，我们将通过向您介绍自然语言处理和计算机视觉中的高级概念来填补这些空白。然后，我们将通过使用不同类型的数据集来给出一些示例，以确保您能够正确且容易地应用深度学习流程。
- en: Now, after finishing Chapter [11](484548_1_En_11_Chapter.xhtml) in Part III,
    it’s good to add some extra knowledge that makes it easier for the reader when
    they work. We’ll be discussing and using prebuilt model architectures that made
    a state-of-the-art accurate prediction and produced a very high accuracy in competitions.
    We’ll also discuss a new concept—transfer learning. This concept will help you
    to save both time and computational power, and we will show you the guidelines
    for using transfer learning with different models.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在完成第三部分的第 [11](484548_1_En_11_Chapter.xhtml) 章节后，增加一些额外的知识，以便读者在操作时更加方便。我们将讨论和利用那些在预测中达到最先进准确度并在竞赛中产生极高准确率的预构建模型架构。我们还将讨论一个新概念——迁移学习。这个概念将帮助您节省时间和计算能力，并且我们将向您展示使用不同模型进行迁移学习的指南。
- en: Different Architectures in Convolutional Neural Networks
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 卷积神经网络中的不同架构
- en: 'The challenging part of using convolutional neural networks (CNNs) in practice
    is how to design model architectures that best use these simple elements: the
    layer types, the loss function, the optimizer, and all the hyperparameters. All
    these are the issues you may find challenging when you are attempting to build
    a good model.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中使用卷积神经网络（CNNs）具有挑战性的部分是如何设计模型架构，以最佳方式使用这些简单元素：层类型、损失函数、优化器和所有超参数。所有这些问题都是您在尝试构建一个好的模型时可能会遇到的挑战。
- en: A useful approach to learning how to design effective CNN architectures is to
    study successful applications. This is particularly straightforward to do because
    of the intense study and application of CNNs through the past 10 to 20 years for
    the ImageNet Large Scale Visual Recognition Competition, or ILSVRC. This challenge
    resulted in both rapid advancement in the state of the art for very difficult
    computer vision tasks, and the development of general innovations in the architecture
    of CNN models.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何设计有效的CNN架构的一个有用方法是研究成功的应用。由于过去10到20年对ImageNet大规模视觉识别竞赛（ILSVRC）的密集研究和应用，这使得这一做法特别直接。这一挑战既导致了非常困难的计算机视觉任务在技术上的快速进步，也促进了CNN模型架构的一般创新。
- en: In this section, we will go through a few widely used CNN architectures used
    today. These network architectures can be used in many tasks such as classification,
    but also, with minor modifications, segmentation, localization, and detection.
    Also, there are pretrained versions of each of these networks that enable the
    community to do transfer learning or fine-tune the models. Except LeNet, almost
    all the CNN models have won the ImageNet competition for classification of a thousand
    classes.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将介绍目前广泛使用的几个CNN架构。这些网络架构可用于许多任务，如分类，而且，经过轻微修改，还可以用于分割、定位和检测。此外，这些网络都有预训练版本，使社区能够进行迁移学习或微调模型。除了LeNet之外，几乎所有的CNN模型都赢得了ImageNet竞赛的千类分类。
- en: 'We will begin with the LeNet-5, which is often described as the first successful
    and important application of CNNs prior to the ILSVRC. Then we’ll look at three
    other winning architectural innovations for CNNs developed for the ILSVRC, namely:
    AlexNet, VGG, and ResNet.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从LeNet-5开始，它通常被描述为在ILSVRC之前第一个成功且重要的卷积神经网络应用。然后我们将探讨为ILSVRC开发的三个其他获胜的CNN架构创新，即：AlexNet、VGG和ResNet。
- en: By understanding these milestone models and their architecture or architectural
    innovations from a high-level, you will develop both an appreciation for the use
    of these architectural elements in modern applications of CNN in computer vision,
    and be able to identify and choose architecture elements that may be useful in
    the design of your own models.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 通过从高层次理解这些里程碑模型及其架构或架构创新，你将既能够欣赏这些架构元素在现代计算机视觉中CNN应用的使用，又能够识别和选择可能对你的模型设计有用的架构元素。
- en: LeNet
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LeNet
- en: The first successful CNN was developed by Yann LeCunn in 1990 for classifying
    handwritten digits successfully for OCR-based activities such as reading ZIP codes,
    checks, and so on. LeNet5 is the latest offering from Yann LeCunn and his colleagues.
    It takes in 32 × 32 size images as input and passes them through a convolutional
    layer to produce six feature maps of size 28 × 28\. The six feature maps are then
    subsampled to produce six output images of size 14 × 14\. Subsampling can be thought
    of as a pooling operation. The second convolutional layer has 16 feature maps
    of size 10 × 10, while the second subsampling layer reduces the feature map sizes
    to 5 × 5\. This is followed by two fully connected layers of 120 and 84 units,
    respectively, followed by the output layer of ten classes corresponding to ten
    digits.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个成功的CNN是由Yann LeCunn在1990年开发的，用于成功地对基于OCR的活动（如读取ZIP代码、支票等）进行手写数字分类。LeNet5是Yann
    LeCunn及其同事的最新作品。它接受32×32大小的图像作为输入，并通过卷积层产生六个大小为28×28的特征图。然后这六个特征图被下采样以产生六个大小为14×14的输出图像。下采样可以被视为一个池化操作。第二个卷积层有16个大小为10×10的特征图，而第二个下采样层将特征图的大小减少到5×5。随后是两个分别有120和84个单元的全连接层，然后是十个类别的输出层，对应于十个数字。
- en: This model was developed for use in a handwritten character recognition problem
    and demonstrated on the MNIST standard dataset, achieving approximately 99.2%
    classification accuracy (or 0.8% error rate). The network was then described as
    the central technique in a broader system referred to as Graph Transformer Networks.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型是为用于手写字符识别问题而开发的，并在MNIST标准数据集上进行了演示，实现了大约99.2%的分类准确率（或0.8%的错误率）。该网络随后被描述为称为图变换网络的一个更广泛系统中的核心技术。
- en: Compared with modern applications, the number of filters is also small, but
    the trend of increasing the number of filters with the depth of the network also
    remains a common pattern in modern usage of the technique.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 与现代应用相比，滤波器的数量也较少，但随着网络深度的增加，增加滤波器数量的趋势在现代技术的应用中仍然是一个常见的模式。
- en: The flattening of the feature maps and interpretation and classification of
    the extracted features by fully connected layers also remains a common pattern
    today. In modern terminology, the final section of the architecture is often referred
    to as the classifier, whereas the convolutional and pooling layers earlier in
    the model are referred to as the feature extractor.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 特征图的展平和通过全连接层对提取特征的解释和分类仍然是今天的一个常见模式。在现代术语中，架构的最后一部分通常被称为分类器，而模型中较早的卷积和池化层被称为特征提取器。
- en: Figure [13-1](#Fig1) represents the LeNet5 architecture diagram.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [13-1](#Fig1) 表示了LeNet5架构图。
- en: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig1_HTML.jpg](Images/484548_1_En_13_Fig1_HTML.jpg)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig1_HTML.jpg](Images/484548_1_En_13_Fig1_HTML.jpg)'
- en: Figure 13-1
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-1
- en: The architecture of LeNet
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet的架构
- en: One of the key features that make this architecture different from the previous
    work is that the pooling though subsampling takes 2 × 2 neighborhood patches and
    sums up the four-pixel intensity values. The sum is scaled by a trainable weight
    and a bias, and then fed through a sigmoid activation function. This is a little
    different from what is done for max pooling and average pooling.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 使这种架构与先前工作不同的关键特性之一是，通过子采样进行池化时，采用2×2邻域补丁，并求和四个像素强度的值。这个和通过一个可训练的权重和偏置进行缩放，然后通过sigmoid激活函数。这与最大池化和平均池化所做的工作略有不同。
- en: Another key feature is that the filter kernel used for convolution is of size
    5 × 5, and the output units are radial basis function (RBF) units instead of the
    softmax function. The 84 units of the fully connected layers had 84 connections
    to each of the classes and hence, 84 corresponding weights. The 84 weights/class
    represent each class’s characteristics. If the inputs to those 84 units are very
    close to the weights corresponding to a class, then the inputs are more likely
    to belong to that class.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键特性是用于卷积的滤波器核大小为5 × 5，输出单元是径向基函数（RBF）单元而不是softmax函数。全连接层的84个单元与每个类别有84个连接，因此有84个相应的权重。84个/类权重代表每个类别的特征。如果那些84个单元的输入非常接近对应于一个类别的权重，那么输入更有可能属于该类。
- en: In a softmax we look at the dot product of the inputs to each of the class’s
    weight vectors, while in RBF units we look at the Euclidean distance between the
    input and the output class representative’s weight vectors. The greater the Euclidean
    distance, the smaller the chance of the input belonging to that class. The same
    can be converted to probability by exponentiating the negative of the distance
    and then normalizing over the different classes.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在softmax中，我们查看每个类别的权重向量的输入的点积，而在RBF单元中，我们查看输入与输出类别代表性权重向量之间的欧几里得距离。欧几里得距离越大，输入属于该类的可能性越小。这可以通过对距离的负数进行指数化，然后在不同类别上进行归一化，转换为概率。
- en: 'The Euclidean distances over all the classes for an input record would act
    as the loss function for that input (Figure [13-2](#Fig2)). Let *x* = [*x*[1],
    *x*[2], …, *x*[83], *x*[84]]^(*T*) ∈ *R*^(84 × 1) be the output vector of the
    fully connected layer. For each class, there would be 84 weight connections. If
    the representative class’s weight vector for the ith class is *w*[*i*] ∈ *R*^(84 × 1),
    then the output of the *i*^(*th*) class unit can be given by the following:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个输入记录的所有类别的欧几里得距离将作为该输入的损失函数（图[13-2](#Fig2)）。令 *x* = [*x*[1], *x*[2], …,
    *x*[83], *x*[84]]^(*T*) ∈ *R*^(84 × 1) 为全连接层的输出向量。对于每个类别，都会有84个权重连接。如果第i个类别的代表性权重向量为
    *w*[*i*] ∈ *R*^(84 × 1)，那么第i个类别单元的输出可以由以下公式给出：
- en: '![$$ d\left(x,{w}_i\right)={\sum}_{j=1}^{84}{\left({x}_j-{w}_{ij}\right)}^2
    $$](Images/484548_1_En_13_Chapter_TeX_Equa.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![d(x,wi)=∑j=1^84(xj−wij)^2](Images/484548_1_En_13_Chapter_TeX_Equa.png)'
- en: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig2_HTML.jpg](Images/484548_1_En_13_Fig2_HTML.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig2_HTML.jpg](Images/484548_1_En_13_Fig2_HTML.jpg)'
- en: Figure 13-2
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图13-2
- en: How Euclidean distance works
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 欧几里得距离是如何工作的
- en: AlexNet
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AlexNet
- en: The work that perhaps could be credited with sparking renewed interest in neural
    networks, and the beginning of the dominance of deep learning in many computer
    vision applications, was the 2012 paper by Alex Krizhevsky, et al. titled “ImageNet
    Classification with Deep Convolutional Neural Networks.” It won the 2012 ImageNet
    ILSVRC. It was the first time that a CNN architecture beat other methods by a
    huge margin. Their network achieved an error rate of 15.4% on its top five predictions
    as compared with a 26.2% error rate for the second-best entry.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 可能可以归功于激发对神经网络重新产生兴趣的工作，以及深度学习在许多计算机视觉应用中占据主导地位的开始，是Alex Krizhevsky等人于2012年发表的论文，标题为“使用深度卷积神经网络的ImageNet分类”。它赢得了2012年ImageNet
    ILSVRC。这是CNN架构首次以巨大优势击败其他方法的第一次。他们的网络在最高五项预测上的错误率为15.4%，而第二好的参赛者的错误率为26.2%。
- en: Important in the design of AlexNet was a suite of methods that were new or successful,
    but not widely adopted at the time. Now they have become standards when using
    CNNs for image classification.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在AlexNet的设计中，一套当时新颖或成功但尚未广泛采用的方法非常重要。现在，它们已成为使用CNN进行图像分类的标准。
- en: AlexNet made use of the rectified linear activation function, or ReLU, as the
    non-linearity after each convolutional layer, instead of S-shaped functions such
    as the logistic or tanh that were common up until that point. Also, a softmax
    activation function was used in the output layer, now a staple for multiclass
    classification with neural networks.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: AlexNet使用了修正线性激活函数，或ReLU，作为每个卷积层之后的非线性，而不是之前常见的S形函数，如logistic或tanh。此外，输出层使用了softmax激活函数，现在它是神经网络进行多类分类的标准。
- en: The architectural diagram of AlexNet is represented in Figure [13-3](#Fig3).
    AlexNet consists of five convolutional layers, max pooling layers, and dropout
    layers, and three fully connected layers in addition to the input and output layer
    of a thousand class units.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: AlexNet的架构图表示在图[13-3](#Fig3)中。AlexNet由五个卷积层、最大池化层和dropout层组成，以及除了输入和输出层的一千个类单位之外，还有三个完全连接层。
- en: The average pooling used in LeNet-5 was replaced with a max pooling method,
    although in this case, overlapping pooling was found to outperform the nonoverlapping
    pooling that is commonly used today (e.g., stride of pooling operation is the
    same size as the pooling operation, e.g., 2 × 2 pixels). To address overfitting,
    the newly proposed dropout method was used between the fully connected layers
    of the classifier part of the model to improve generalization error.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet-5中使用的平均池化被替换为最大池化方法，尽管在这种情况下，重叠池化被发现优于今天常用的非重叠池化（例如，池化操作的步长与池化操作的大小相同，例如，2×2像素）。为了解决过拟合问题，在模型分类器部分的完全连接层之间使用了新提出的dropout方法，以改善泛化误差。
- en: The inputs to the network are images of size 224 × 224 × 3\. The first convolutional
    layer produces 96 feature maps corresponding to 96 filter kernels of size 11 × 11 × 3,
    with strides of four-pixel units. The second convolutional layer produces 256
    feature maps corresponding to filter kernels of size 5 × 5 × 48\. The first two
    convolutional layers are followed by max pooling layers, whereas the next three
    convolutional layers are placed one after another without any intermediate max
    pooling layers. The fifth convolutional layer is followed by a max pooling layer,
    two fully connected layers of 4096 units, and finally, a softmax output layer
    of one thousand classes. The third convolutional layer has 384 filter kernels
    of size 3 × 3 × 256, whereas the fourth and fifth convolutional layers have 384
    and 256 filter kernels each of size 3 × 3 × 192.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 网络的输入是大小为224×224×3的图像。第一个卷积层产生96个特征图，对应于96个大小为11×11×3的滤波器核，步长为四个像素单位。第二个卷积层产生256个特征图，对应于大小为5×5×48的滤波器核。前两个卷积层后面跟着最大池化层，而接下来的三个卷积层一个接一个地放置，没有中间的最大池化层。第五个卷积层后面跟着一个最大池化层，两个4096个单位的完全连接层，最后是一个1000个类别的softmax输出层。第三个卷积层有384个大小为3×3×256的滤波器核，而第四和第五个卷积层各有384和256个大小为3×3×192的滤波器核。
- en: A dropout of 0.5 was used in the last two fully connected layers. You will notice
    that the depth of the filter kernels for convolutions is half the number of feature
    maps in the preceding layer for all but the third convolutional layer. And this
    is because the model was split into two pipelines to train on the GPU hardware
    of the time.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后两个完全连接层中使用了0.5的dropout。你会注意到，除了第三个卷积层之外，所有卷积的滤波器核深度都是前一层特征图数量的二分之一。这是因为模型被分成两个管道，以训练当时的GPU硬件。
- en: However, if you observe carefully, for the third convolutional activity there
    is cross-connectivity for convolution, so the filter kernel is of dimension 3 × 3 × 256
    and not 3 × 3 × 128\. The same kind of cross-connectivity applies to the fully
    connected layers, and hence, they behave as ordinary fully connected layers with
    4096 units.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你仔细观察，对于第三个卷积活动，存在卷积的交叉连接，因此滤波器核的维度是3×3×256，而不是3×3×128。相同类型的交叉连接也适用于完全连接层，因此它们表现为具有4096个单位的普通完全连接层。
- en: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig3_HTML.jpg](Images/484548_1_En_13_Fig3_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig3_HTML.jpg](Images/484548_1_En_13_Fig3_HTML.jpg)'
- en: Figure 13-3
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图13-3
- en: The architecture of AlexNet
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: AlexNet的架构
- en: 'We can summarize the key aspects of the architecture relevant in modern models
    as follows:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将现代模型中相关的架构关键方面总结如下：
- en: Use of the ReLU activation function after convolutional layers and softmax for
    the output layer
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在卷积层后使用ReLU激活函数，对于输出层使用softmax
- en: Use of max pooling instead of average pooling
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用最大池化而非平均池化
- en: Use of dropout regularization between the fully connected layers
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在完全连接层之间使用dropout正则化
- en: Pattern of convolutional layer fed directly to another convolutional layer
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接将卷积层模式馈送到另一个卷积层的模式
- en: Use of data augmentation
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用数据增强
- en: VGG
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: VGG
- en: An important work that sought to standardize architecture design for deep convolutional
    networks and developed much deeper and better performing models in the process
    was the 2014 paper titled “Very Deep Convolutional Networks for Large-Scale Image
    Recognition” by Karen Simonyan and Andrew Zisserman.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 一项旨在标准化深度卷积网络架构设计的重要工作，并在过程中开发出更深、性能更好的模型，是 2014 年由 Karen Simonyan 和 Andrew
    Zisserman 发表的论文，题为“用于大规模图像识别的非常深的卷积网络”。
- en: Their architecture is generally referred to as VGG after the name of their lab,
    the Visual Geometry Group at Oxford. Their model was developed and demonstrated
    in the same ILSVRC competition—in this case, the ILSVRC-2014 version of the challenge.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的架构通常被称为 VGG，以他们实验室的名字命名，即牛津大学的视觉几何组。他们的模型在同一个 ILSVRC 竞赛中开发和展示——在这种情况下，是 ILSVRC-2014
    版本的挑战。
- en: The first important difference that has become a de facto standard is the use
    of a large number of small filters. Specifically, filters with the size 3 × 3
    and 1 × 1 with the stride of one, different from the large sized filters in LeNet-5
    and the smaller but still relatively large filters and large stride of four in
    AlexNet.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个重要的区别已经成为事实上的标准，那就是使用大量的小型滤波器。具体来说，使用大小为 3×3 和 1×1 的滤波器，步长为 1，这与 LeNet-5
    中的大型滤波器以及 AlexNet 中较小但仍相对较大的滤波器和步长为四的滤波器不同。
- en: Max pooling layers are used after most, but not all, convolutional layers, learning
    from the example in AlexNet. Yet all pooling is performed with the size 2 × 2
    and the same stride; that too has become a de facto standard. Specifically, the
    VGG networks use examples of two, three, and even four convolutional layers stacked
    together before a max pooling layer is used. The rationale was that stacked convolutional
    layers with smaller filters approximate the effect of one convolutional layer
    with a larger sized filter, (e.g., three stacked convolutional layers with 3 × 3
    filters approximates one convolutional layer with a 7 × 7 filter).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数但不是所有的卷积层之后使用最大池化层，这是从 AlexNet 中的例子中学到的。然而，所有的池化都是使用大小为 2×2 和相同的步长进行的；这也已经成为事实上的标准。具体来说，VGG
    网络在最大池化层之前使用两个、三个甚至四个卷积层堆叠的例子。其理由是，具有较小滤波器的堆叠卷积层近似于具有较大滤波器的一个卷积层的效果，（例如，三个堆叠的
    3×3 滤波器的卷积层近似于一个 7×7 滤波器的卷积层）。
- en: Another important difference is the very large number of filters used. The number
    of filters increases with the depth of the model, although it starts at a relatively
    large number of 64 and increases through 128, 256, and 512 filters at the end
    of the feature extraction part of the model.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的区别是使用的滤波器数量非常多。滤波器的数量随着模型深度的增加而增加，尽管它从相对较大的 64 个开始，通过 128、256 和 512 个滤波器增加到模型特征提取部分的末尾。
- en: 'A number of variants of the architecture were developed and evaluated, although
    two are referred to most commonly, given their performance and depth. They are
    named for the number of layers: they are the VGG-16 and the VGG-19 for 16 and
    19 learned layers, respectively.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 开发了并评估了该架构的许多变体，尽管最常见的两种是 VGG-16 和 VGG-19，分别对应于 16 和 19 层学习层，鉴于它们的性能和深度。
- en: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig4_HTML.jpg](Images/484548_1_En_13_Fig4_HTML.jpg)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig4_HTML.jpg](Images/484548_1_En_13_Fig4_HTML.jpg)'
- en: Figure 13-4
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-4
- en: The architecture of VGG
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: VGG 架构
- en: Figure [13-4](#Fig4) represents the architecture of VGG16\. The input to the
    network is images of size 224 × 224 × 3\. The first two convolutional layers produce
    64 feature maps, each followed by max pooling. The filters for convolution are
    of spatial size 3 × 3, with a stride of 1 and pad of 1\. Max pooling is of size
    2 × 2, with a stride of 2 for the whole network. The third and fourth convolutional
    layers produce 128 feature maps, each followed by a max pooling layer. The rest
    of the network follows in a similar fashion, as shown in Figure [13-4](#Fig4).
    At the end of the network there are three fully connected layers of 4096 units,
    each followed by the output softmax layer of a thousand classes. Dropout is set
    at 0.5 for the fully connected layers. All the units in the network have ReLU
    activations.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图[13-4](#Fig4)表示VGG16的架构。网络的输入是224×224×3大小的图像。前两个卷积层产生64个特征图，每个后面跟着最大池化。卷积的过滤器空间大小为3×3，步长为1，填充为1。最大池化大小为2×2，整个网络的步长为2。第三和第四个卷积层产生128个特征图，每个后面跟着一个最大池化层。网络的其余部分以类似的方式继续，如图[13-4](#Fig4)所示。网络末尾有三个4096个单位的完全连接层，每个后面跟着一个输出softmax层，有1000个类别。完全连接层的Dropout设置为0.5。网络中的所有单元都有ReLU激活。
- en: 'We can summarize the key aspects of the architecture that are relevant in modern
    models as follows:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以总结出与现代模型相关的架构的关键方面如下：
- en: Use of very small convolutional filters (e.g., 3 × 3 and 1 × 1 with a stride
    of one)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用非常小的卷积过滤器（例如，3×3和1×1，步长为1）
- en: Use of max pooling with a size of 2 × 2 and a stride of the same dimensions
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用2×2大小和相同维度的步长进行最大池化
- en: The importance of stacking convolutional layers together before using a pooling
    layer to define a block
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在使用池化层定义块之前堆叠卷积层的重要性
- en: Dramatic repetition of the convolutional-pooling block pattern
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 显著重复卷积-池化块模式
- en: Development of very deep (16 and 19 layer) models
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发非常深的（16和19层）模型
- en: ResNet
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ResNet
- en: ResNet is a 152-layer-deep CNN from Microsoft that won the ILSVRC 2015 competition
    with an error rate of only 3.6%, which is perceived to be better than the human
    error rate of 5–10%.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet是来自微软的152层深度CNN，它在2015年ILSVRC竞赛中以仅3.6%的错误率获胜，这被认为优于5-10%的人类错误率。
- en: A final important innovation in CNNs that we will review was proposed by Kaiming
    He, et al. in their 2016 paper titled “Deep Residual Learning for Image Recognition.”
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要回顾的CNN中的一项重要创新是由Kaiming He等人于2016年提出的，标题为“用于图像识别的深度残差学习”的论文。
- en: Their model had an impressive 152 layers. Key to the model design is the idea
    of residual blocks that make use of shortcut connections. These are simply connections
    in the network architecture where the input is kept as-is (not weighted) and passed
    on to a deeper layer (e.g., skipping the next layer).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的模型有令人印象深刻的152层。模型设计的关键是使用快捷连接的残差块的想法。这些是网络架构中的简单连接，其中输入保持原样（未加权）并传递给更深的一层（例如，跳过下一层）。
- en: 'ResNet implements residual blocks as follows: after each series of convolution–ReLUs–convolution
    operations, the input to the operation is fed back to the output of the operation.
    In traditional methods, while doing Convolution and other transformations, we
    try to fit an underlying mapping to the original data to solve the classification
    task.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 实现残差块的方式如下：在每个卷积-ReLU-卷积操作系列之后，将操作的输入反馈到操作的输出。在传统方法中，在进行卷积和其他变换时，我们试图将底层映射拟合到原始数据以解决分类任务。
- en: Again, a residual block is a pattern of two convolutional layers with ReLU activation,
    where the output of the block is combined with the input to the block (e.g., the
    shortcut connection). A projected version of the input is used via 1 × 1 if the
    shape of the input to the block is different from the output of the block, the
    so-called 1 × 1 convolution. These are referred to as projected shortcut connections,
    compared with the unweighted or identity shortcut connections.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，残差块是两个具有ReLU激活的卷积层的一个模式，其中块的输出与块的输入（例如，快捷连接）相结合。如果块的输入形状与块的输出不同，则使用1×1卷积来使用输入的投影版本，这被称为1×1卷积。这些被称为投影快捷连接，与未加权的或恒等快捷连接相比。
- en: However, with ResNet’s residual block concept, we try to learn a residual mapping
    and not a direct mapping from the input to output. Formally, in each small block
    of activities we add the input to the block to the output. This is illustrated
    in Figure [13-5](#Fig5). This concept is based on the hypothesis that it is easier
    to fit a residual mapping than to fit the original mapping from input to output.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随着ResNet的残差块概念，我们试图学习一个残差映射，而不是从输入到输出的直接映射。形式上，在每一个小的活动块中，我们将块的输入加到输出上。这如图[13-5](#Fig5)所示。这个概念基于假设，拟合残差映射比拟合从输入到输出的原始映射更容易。
- en: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig5_HTML.jpg](Images/484548_1_En_13_Fig5_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig5_HTML.jpg](Images/484548_1_En_13_Fig5_HTML.jpg)'
- en: Figure 13-5
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图13-5
- en: How ResNet works
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet的工作原理
- en: 'We can summarize the key aspects of the architecture relevant to modern models
    as follows:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以总结与现代模型相关的架构的关键方面如下：
- en: Use of shortcut connections
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用快捷连接
- en: Development and repetition of the residual blocks
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 残差块的开发和重复
- en: Development of very deep (152-layer) models
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建非常深的（152层）模型
- en: Transfer Learning
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迁移学习
- en: A neural network is trained on data. This network gains knowledge from this
    data, which is compiled as “*weights*” of the network. These weights can be extracted
    and then transferred to any other neural network. Instead of training the other
    neural network from scratch, we **“transfer”** the learned features.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 一个神经网络在数据上训练。这个网络从这些数据中获取知识，这些知识被编译为网络的“*权重*”。这些权重可以被提取出来，然后转移到任何其他神经网络。我们不是从头开始训练另一个神经网络，而是**“迁移”**学到的特征。
- en: Transfer learning in a broad sense refers to storing knowledge gained while
    solving a problem, and using that knowledge for a different problem in a similar
    domain. Transfer learning has been hugely successful in the field of deep learning
    for a variety of reasons. Deep learning models in general have a huge number of
    parameters because of the nature of the hidden layers and the connectivity scheme
    within the different units.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 广义上的迁移学习指的是在解决一个问题时获得的知识，并在类似领域中的不同问题上使用这些知识。由于各种原因，迁移学习在深度学习领域取得了巨大的成功。由于隐藏层和不同单元之间的连接方案的性质，深度学习模型通常具有大量的参数。
- en: To train such a huge model, lots of data is required or the model will suffer
    from overfitting problems. In many problems, the huge amount of data required
    to train the model is not available, but the nature of the problem requires a
    deep learning solution in order to have a reasonable impact. For instance, in
    image processing for object recognition, deep learning models are known to provide
    state-of-the-art solutions. In such cases, transfer learning can be used to generate
    generic features from a pretrained deep learning model, and then use those features
    to build a simple model to solve the problem. So, the only parameters for this
    problem are the ones used to build the simple model.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 要训练如此大的模型，需要大量的数据，否则模型将遭受过拟合问题。在许多问题中，训练模型所需的大量数据不可用，但问题的性质要求使用深度学习解决方案才能产生合理的影响。例如，在图像处理中的目标识别，深度学习模型已知可以提供最先进的解决方案。在这种情况下，可以使用迁移学习从预训练的深度学习模型中生成通用特征，然后使用这些特征构建一个简单的模型来解决问题。因此，这个问题的唯一参数是用于构建简单模型的那些参数。
- en: What Is a Pretrained Model, and Why Use It?
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是预训练模型，为什么使用它？
- en: Simply put, a pretrained model is a model created by someone else to solve a
    similar problem. Instead of building a model from scratch to solve a similar problem,
    you use the model trained on other problem as a starting point.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，预训练模型是由其他人创建来解决类似问题的模型。与其从头开始构建一个模型来解决类似问题，不如使用在其他问题上训练的模型作为起点。
- en: So, pretrained models are generally trained on a huge corpus of data and thus
    have reliable parameters. When we process images through several layers of convolutions,
    the initial layers learn to detect very generic features such as curls and edges.
    As the network grows deeper, the convolutional layers in the deeper layers learn
    to detect more complex features relevant to the specific kind of dataset.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，预训练模型通常是在大量数据集上训练的，因此具有可靠的参数。当我们通过几层卷积处理图像时，初始层学会检测非常通用的特征，如卷曲和边缘。随着网络的加深，深层中的卷积层学会检测与特定数据集相关的更复杂的特征。
- en: For example, say you want to build a self-learning car. You can spend years
    to build a decent image recognition algorithm from scratch or you can take an
    inception model (a pretrained model) from Google that was built on ImageNet data
    to identify images in those pictures. A pretrained model may not be 100% accurate
    in your application, but it saves the huge efforts required to reinvent the wheel.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你想构建一个自学习的汽车。你可以花费数年从头开始构建一个不错的图像识别算法，或者你可以从Google那里获取一个基于ImageNet数据构建的预训练模型（如Inception模型）来识别那些图片中的图像。预训练模型可能在你应用中不是100%准确，但它节省了重新发明轮子的巨大努力。
- en: As another example, in a classification, the deeper layers would learn to detect
    features such as eyes, nose, face, and so forth. Let’s assume we have a VGG19
    architecture model trained on one thousand categories of the ImageNet dataset.
    Now, if we get a smaller dataset that has fewer categories of images similar to
    those of the VGG19 pretrained model dataset, we can use the same VGG19 model up
    to the fully connected layer and then replace the output layer with the new classes.
    Also, we keep the weights of the network fixed until the fully connected layer,
    and only train the model to learn the weights from the fully connected layer to
    the output layer.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 作为另一个例子，在分类任务中，深层网络会学习检测诸如眼睛、鼻子、面部等特征。假设我们有一个在ImageNet数据集的1000个类别上训练过的VGG19架构模型。现在，如果我们得到一个较小的数据集，其中包含与VGG19预训练模型数据集相似但类别更少的图像，我们可以使用相同的VGG19模型直到全连接层，然后替换输出层以适应新的类别。此外，我们保持网络直到全连接层的权重不变，只训练模型从全连接层到输出层学习权重。
- en: This is because the dataset’s nature is the same as the smaller dataset. Thus,
    the features learned in the pretrained model through the different parameters
    are good enough for the new classification problem, and we only need to learn
    the weights from the fully connected layer to the output layer. This is a huge
    reduction in the number of parameters to learn, and it will reduce the overfitting.
    Had we trained the small dataset using VGG19 architecture, it might have suffered
    from severe overfitting because of the large number of parameters to learn on
    a small dataset. What do you do when the dataset’s nature is very different from
    that of the dataset used for the pretrained model?
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为数据集的本质与较小的数据集相同。因此，预训练模型通过不同参数学习到的特征对于新的分类问题已经足够好，我们只需要学习从全连接层到输出层的权重。这大大减少了需要学习的参数数量，并将减少过拟合。如果我们使用VGG19架构训练小数据集，它可能会因为在小数据集上学习大量参数而严重过拟合。当数据集的本质与预训练模型使用的数据集非常不同时，你该怎么办？
- en: Well, in that case, we can use the same pretrained model but fix only the parameters
    for the first couple of sets of convolutions–ReLUs–max pooling layers and then
    add a couple of convolutions–ReLU–max pooling layers that would learn to detect
    features intrinsic to the new dataset. Finally, we would have to have a fully
    connected layer followed by the output layer. Since we are using the weights of
    the initial sets of convolutions–ReLUs–max pooling layers from the pretrained
    VGG19 network, the parameters with respect to those layers need not be learned.
    As mentioned earlier, the early layers of convolution learn very generic features,
    such as edges and curves, which are applicable to all kinds of images. The rest
    of the network would need to be trained to learn specific features inherent to
    the specific problem dataset.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，在这种情况下，我们可以使用相同的预训练模型，但只固定前几组卷积-ReLU-最大池化层的参数，然后添加几组卷积-ReLU-最大池化层，这些层将学习检测新数据集固有的特征。最后，我们需要一个全连接层，然后是输出层。由于我们使用了预训练的VGG19网络中初始卷积-ReLU-最大池化层的权重，因此那些层的参数不需要学习。如前所述，卷积的早期层学习非常通用的特征，如边缘和曲线，这些特征适用于所有类型的图像。网络的其余部分需要训练以学习特定问题数据集固有的特定特征。
- en: How to Use a Pretrained Model?
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何使用预训练模型？
- en: What is our objective when we train a neural network? We wish to identify the
    correct weights for the network by multiple forward and backward iterations. By
    using pretrained models that have been previously trained on large datasets, we
    can directly use the weights and architecture obtained and apply the learning
    on our problem statement. This is how *transfer learning* works. We “*transfer
    the learning*” of the pretrained model to our specific problem statement.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们训练神经网络时，我们的目标是什么？我们希望通过多次正向和反向迭代来识别网络的正确权重。通过使用在大型数据集上预先训练过的预训练模型，我们可以直接使用获得的权重和架构，并将学习应用于我们的问题陈述。这就是迁移学习的工作原理。我们将预训练模型的“学习”迁移到我们具体的问题陈述中。
- en: We should be very careful while choosing what pretrained model to use in an
    individual case. If the problem statement we have at hand is very different from
    the one on which the pretrained model was trained, the prediction we would get
    would be very inaccurate. For example, a model previously trained for speech recognition
    would work horribly if we tried to use it to identify objects.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择使用哪个预训练模型时，我们应该非常小心。如果我们手头的问题陈述与预训练模型训练的问题非常不同，我们得到的预测将非常不准确。例如，一个之前用于语音识别的模型，如果我们尝试用它来识别物体，效果会非常糟糕。
- en: We are lucky that many pretrained architectures are directly available for us
    as preloaded weights or in the Keras library. The **Imagenet** dataset, for example,
    has been widely used to build various architectures, since it is large enough
    (1.2M images) to create a generalized model.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很幸运，许多预训练架构作为预加载的权重或直接在 Keras 库中直接可用。例如，**ImageNet** 数据集已被广泛用于构建各种架构，因为它足够大（1.2M
    张图片），可以创建一个通用模型。
- en: These pretrained networks demonstrate a strong ability to generalize to images
    outside the given dataset via transfer learning. We make modifications in the
    preexisting model by fine-tuning the model. Since we assume that the pretrained
    network has been trained quite well, we would not want to modify the weights too
    soon and too much. While modifying, we generally use a learning rate smaller than
    the one used for initially training the model.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这些预训练网络通过迁移学习展示了将泛化能力应用于给定数据集之外的图像的强大能力。我们通过微调模型对现有模型进行修改。由于我们假设预训练网络已经训练得相当好了，我们不想过早或过多地修改权重。在修改时，我们通常使用比最初训练模型时更小的学习率。
- en: Ways to Fine-Tune the Model
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微调模型的方法
- en: '**Feature extraction:** We can use a pretrained model as a feature extraction
    mechanism. We can remove the output layer (the one that gives the probabilities
    for being in each of the 1,000 classes) and then use the entire network as a fixed
    feature extractor for the new data set.'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**特征提取：** 我们可以将预训练模型用作特征提取机制。我们可以移除输出层（给出属于每个1,000个类别的概率的那个层），然后使用整个网络作为新数据集的固定特征提取器。'
- en: '**Use the Architecture of the pretrained model:** We can use the architecture
    of the model while we initialize all the weights randomly, and train the model
    according to our dataset again.'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用预训练模型的架构：** 我们可以在初始化所有权重为随机值的同时使用模型的架构，并根据我们的数据集再次训练模型。'
- en: '**Train some layers while freezing others:** Another way to use a pretrained
    model is to train it partially. We can keep the weights of initial layers of the
    model frozen while we retrain only the higher layers. We can try to test how many
    layers are to be frozen and how many to be trained.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**训练一些层同时冻结其他层：** 使用预训练模型的另一种方法是部分训练它。我们可以在重新训练仅较高层的同时保持模型初始层的权重冻结。我们可以尝试测试要冻结多少层以及要训练多少层。'
- en: Pretrained VGG19
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预训练的 VGG19
- en: In this section, we are going to demonstrate how to use the pretrained VGG19
    model. Using such a great model with this less amount of training will help you
    to solve complex problems with less effort. So, let’s import the packages that
    we will use in this example.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将演示如何使用预训练的 VGG19 模型。使用这样一个优秀的模型，以如此少的训练量，可以帮助你以更少的努力解决复杂问题。所以，让我们导入在这个例子中我们将使用的包。
- en: '[PRE0]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: After importing all the packages, we need to download the CIFAR-10 dataset.
    This is the dataset we used before in Chapter [11](484548_1_En_11_Chapter.xhtml).
    You can check how we built the model, and how much time and computational power
    we payed to train the model.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 导入所有包之后，我们需要下载 CIFAR-10 数据集。这是我们在第 [11](484548_1_En_11_Chapter.xhtml) 章节中使用的数据集。你可以检查我们是如何构建模型的，以及我们为训练模型付出了多少时间和计算资源。
- en: Now, after you import the packages we are going to use and loaded the CIFAR-10
    dataset, it’s now time to build the model.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在你导入了我们将要使用的包并加载了CIFAR-10数据集之后，现在是时候构建模型了。
- en: We first have to create the input/output variables, and also the hyperparameters
    we will use in the model building.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先需要创建输入/输出变量，以及我们在模型构建中将要使用的超参数。
- en: '[PRE1]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We will use `VGG19` with `softmax_cross_entropoy` loss, of course, and the `AdamOptimizer`
    for optimizing the model.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用`VGG19`和`softmax_cross_entropoy`损失，当然，以及`AdamOptimizer`来优化模型。
- en: '[PRE2]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: If you called `print_outputs` of the logits, you will see the model architecture
    summary. It’s similar to the Keras `model.summary` function that shows each layer
    name, type, its input and output, and the number of parameters per each layer.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你调用了`print_outputs`的logits，你会看到模型架构摘要。它与Keras的`model.summary`函数类似，显示了每个层的名称、类型、其输入和输出以及每层的参数数量。
- en: '[PRE3]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now let us print the model summary using `print_summary`; we will see the total
    layers in the model, the total weights, and the number of parameters.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用`print_summary`打印模型摘要；我们将看到模型中的总层数、总权重和参数数量。
- en: '[PRE4]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now, after we’ve built the model architecture, and checked the total parameters
    and total layers in the model, we are ready to train it and see what will happen.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在我们构建了模型架构，并检查了模型中的总参数和总层数之后，我们就可以开始训练它，看看会发生什么。
- en: '[PRE5]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: If this code step is running correctly for you, then we can say “well done to
    you.” Now the model is training as in the output below, and after it finishes,
    you will see the result in Figure [13-6](#Fig6).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这个代码步骤对你运行正确，那么我们可以说“做得好。”现在模型正在按照下面的输出进行训练，训练完成后，你将在图[13-6](#Fig6)中看到结果。
- en: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig6_HTML.jpg](Images/484548_1_En_13_Fig6_HTML.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_13_Chapter/484548_1_En_13_Fig6_HTML.jpg](Images/484548_1_En_13_Fig6_HTML.jpg)'
- en: Figure 13-6
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图13-6
- en: The prediction of the left image
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 左侧图像的预测
- en: '[PRE6]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Summary
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we learned about advanced operations in CNNs, and how state-of-art
    architecture models such as LeNet, AlexNet, VGG, and ResNet work.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们学习了CNN中的高级操作，以及像LeNet、AlexNet、VGG和ResNet这样的最先进架构模型是如何工作的。
- en: Further, we discussed what transfer learning is, and how to perform transfer
    learning using the pretrained versions of these CNNs. In the next chapter, we
    will discuss some selected topics in natural language processing and how they
    are useful for you to know and understand.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们讨论了迁移学习是什么，以及如何使用这些CNN的预训练版本进行迁移学习。在下一章中，我们将讨论自然语言处理中的某些选 topics，以及它们对你了解和理解的有用之处。
- en: 14. Selected Topics in Natural Language Processing
  id: totrans-119
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 14. 自然语言处理中的选 topics
- en: In the previous chapter, we showed you some advanced concepts in computer vision
    such as state-of-art architectures and the transfer learning approach. It is important
    for you to understand these concepts when you are about to build a model to do
    a certain task for you.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们向您展示了计算机视觉中的某些高级概念，如最先进架构和迁移学习方法。当你准备构建一个模型来完成特定任务时，理解这些概念非常重要。
- en: In this chapter, we will discuss some concepts in natural language processing
    (NLP) that are necessary to fully understand the sequential methods, which are
    considered to be the traditional methods of NLP. They are relied on by the bag-of-words
    model and the vector space of words model.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论一些自然语言处理（NLP）中的概念，这些概念对于完全理解序列方法至关重要，这些方法被认为是NLP的传统方法。它们依赖于词袋模型和词向量空间模型。
- en: One of the key areas for NLP is the syntactic and semantic analysis of language.
    Syntactic analysis refers to how words are grouped and connected in a sentence.
    The main tasks in syntactic analysis are tagging parts of speech, detecting syntactic
    classes (such as verbs, nouns, and noun phrases), and assembling sentences by
    constructing syntax trees. Semantic analysis refers to complex tasks such as finding
    synonyms, or performing word-verb disambiguation.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理的关键领域之一是语言的句法和语义分析。句法分析指的是单词如何在句子中分组和连接。句法分析的主要任务包括词性标注、检测句法类别（如动词、名词和名词短语），以及通过构建句法树来组装句子。语义分析指的是寻找同义词或执行词-动词歧义消解等复杂任务。
- en: Vector Space Model
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向量空间模型
- en: In NLP information-retrieval systems, a document is generally represented as
    simply a vector of the count of the words it contains. For retrieving documents
    similar to a specific document, either the cosine of the angle or the dot product
    between the document and other documents is computed. The cosine of the angle
    between two vectors gives a similarity measure based on the similarity between
    their vector compositions. To illustrate this fact, let us look at two vectors,
    *x*, *y* = *R*^(2 × 1), shown as *x* = [2 3]^(*T*) and *y* = [4 5]^(*T*).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在 NLP 信息检索系统中，一个文档通常被简单地表示为包含其包含的单词计数的向量。为了检索与特定文档相似的文档，要么计算文档与其他文档之间的角度余弦或点积。两个向量之间的角度余弦给出了基于它们向量组成的相似度度量。为了说明这一点，让我们看看两个向量
    *x* 和 *y* = *R*^(2 × 1)，分别表示为 *x* = [2 3]^(*T*) 和 *y* = [4 5]^(*T*)。
- en: Although vectors *x* and *y* are different, their cosine similarity is the maximum
    possible value of 1\. This is because the two vectors are identical in their component
    compositions. The ratio of the first component to the second component for both
    vectors is 2/32/3; hence, content composition-wise they are treated as being similar.
    Therefore, documents with high cosine similarity are generally considered similar
    in nature.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然向量 *x* 和 *y* 是不同的，但它们的余弦相似度是最大可能的值 1。这是因为这两个向量在分量组成上完全相同。两个向量的第一个分量与第二个分量的比例都是
    2/3；因此，从内容组成上看，它们被视为相似。因此，具有高余弦相似度的文档通常被认为是本质上相似的。
- en: 'Let’s say we have two sentences: *Doc*1 = [*The dog chased the cat*] and *Doc*2 = [*The cat was
    chased down by the dog*]. The number of distinct words in the two sentences would
    be the vector space dimension for this problem. The distinct words are *The*,
    *dog*, *chased*, *the*, *cat*, *down*, *by*, and *was*. So, we can represent each
    document as an eight-dimensional vector of word counts (Table [14-1](#Tab1)) .'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有两个句子：*Doc*1 = [*The dog chased the cat*] 和 *Doc*2 = [*The cat was chased
    down by the dog*]。这两个句子中不同单词的数量就是该问题的向量空间维度。不同的单词有 *The*，*dog*，*chased*，*the*，*cat*，*down*，*by*
    和 *was*。因此，我们可以将每个文档表示为一个包含单词计数的八维向量（表 [14-1](#Tab1)）。
- en: Table 14-1
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 表 14-1
- en: Words per Document Example
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 每个文档的单词数示例
- en: '| Word/Doc | The | Dog | Chased | Cat | Down | By | Was |'
  id: totrans-129
  prefs: []
  type: TYPE_TB
  zh: '| 词/文档 | The | Dog | Chased | Cat | Down | By | Was |'
- en: '| --- | --- | --- | --- | --- | --- | --- | --- |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- | --- | --- | --- |'
- en: '| Doc 1 | 1 | 1 | 1 | 1 | 0 | 0 | 0 |'
  id: totrans-131
  prefs: []
  type: TYPE_TB
  zh: '| Doc 1 | 1 | 1 | 1 | 1 | 0 | 0 | 0 |'
- en: '| Doc 2 | 1 | 1 | 1 | 1 | 1 | 1 | 1 |'
  id: totrans-132
  prefs: []
  type: TYPE_TB
  zh: '| Doc 2 | 1 | 1 | 1 | 1 | 1 | 1 | 1 |'
- en: If we represent *Doc*1 by *v*[1] and *Doc*2 by *v*[2], then the cosine similarity
    can be expressed as ![$$ \mathit{\cos}\left({v}_1,{v}_2\right)=\frac{{v_1}^T\
    {v}_2}{\left\Vert {v}_1\left\Vert \right\Vert {v}_2\right\Vert } $$](Images/484548_1_En_14_Chapter_TeX_IEq1.png)
    (Figure [14-1](#Fig1)) and the Euclidean distance is expressed as ![$$ d\left({v}_1,{v}_2\right)=\sqrt{\sum
    {\left({v}_1-{v}_2\right)}^2} $$](Images/484548_1_En_14_Chapter_TeX_IEq2.png)
    (Figure [14-2](#Fig2)),
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们用 *v*[1] 表示 *Doc*1，用 *v*[2] 表示 *Doc*2，那么余弦相似度可以表示为 ![公式](Images/484548_1_En_14_Chapter_TeX_IEq1.png)（图
    [14-1](#Fig1)）和欧几里得距离可以表示为 ![公式](Images/484548_1_En_14_Chapter_TeX_IEq2.png)（图
    [14-2](#Fig2)），
- en: where ‖*v*[1]‖ is the magnitude or the *l*[2] norm of the vector *v*[1]. As
    stated earlier, cosine similarity gives a measure of the similarity based on the
    component composition of each vector. If the components of the document vectors
    are in somewhat similar proportion, the cosine distance would be high. It doesn’t
    take the magnitude of the vector into consideration.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，‖*v*[1]‖ 是向量 *v*[1] 的模或 *l*[2] 范数。如前所述，余弦相似度给出了基于每个向量的分量组成的相似度度量。如果文档向量的分量在某种程度上成比例相似，余弦距离就会很高。它不考虑向量的模。
- en: In certain cases, when the documents are of highly varying lengths, the dot
    product between the document vectors is taken instead of the cosine similarity.
    This is done when, along with the content of the document, the size of the document
    is also compared. For instance, we can have a tweet in which the words *global*
    and *economics* might have word counts of 1 and 2, respectively, while a newspaper
    article might have word counts of 50 and 100, respectively, for the same words.
    Assuming the other words in both documents have insignificant counts, the cosine
    similarity between the tweet and the newspaper article would be close to 1\. Since
    the tweet sizes are significantly smaller, the word counts proportion of 1 : 2
    for global and economics doesn’t really compare to the proportion of 1 : 2 for
    these words in the newspaper article.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，当文档长度高度不同时，我们使用文档向量之间的点积而不是余弦相似度。这是在比较文档内容的同时，也对比文档大小时进行的。例如，我们可能有一个推文，其中单词“global”和“economics”的词频分别为1和2，而一篇报纸文章中相同的单词的词频可能分别为50和100。假设其他单词在这两个文档中的词频都微不足道，推文和报纸文章之间的余弦相似度将接近1。由于推文的大小显著较小，全球和经济学这两个单词的词频比例1:2并不真正等同于报纸文章中这些单词的1:2比例。
- en: Hence, it doesn’t really make sense to assign such a high similarity measure
    to these documents for several applications. In that case, taking the dot product
    as a similarity measure rather than the cosine similarity helps, since it scales
    up the cosine similarity by the magnitude of the word vectors for the two documents.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于许多应用来说，将这些文档赋予如此高的相似度测量并没有太多意义。在这种情况下，将点积作为相似度度量而不是余弦相似度是有帮助的，因为它通过两个文档的单词向量的大小来放大余弦相似度。
- en: For comparable cosine similarities, documents with higher magnitudes would have
    higher dot product similarity, since they have enough text to justify their word
    composition. The word composition for small texts might just be by chance and
    not be a true representation of its intended representation. For most applications
    where the documents are of comparable lengths, cosine similarity is a fair enough
    measure.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 对于可比的余弦相似度，具有更高幅度的文档将具有更高的点积相似度，因为它们有足够的文本来证明其词组。小文本的词组可能只是偶然，并不能真正代表其意图的表达。对于大多数文档长度相当的应用，余弦相似度是一个足够好的度量。
- en: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig2_HTML.jpg](Images/484548_1_En_14_Fig2_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig2_HTML.jpg](Images/484548_1_En_14_Fig2_HTML.jpg)'
- en: Figure 14-2
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-2
- en: How Euclidean distance works
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 欧几里得距离是如何工作的
- en: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig1_HTML.jpg](Images/484548_1_En_14_Fig1_HTML.jpg)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig1_HTML.jpg](Images/484548_1_En_14_Fig1_HTML.jpg)'
- en: Figure 14-1
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-1
- en: How cosine distance works
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 余弦距离是如何工作的
- en: Vector Representation of Words
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单词的向量表示
- en: Just as the documents are expressed as vectors of different word counts, a word
    in a corpus can also be expressed as a vector, with the components being counts
    the word has in each document.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 正如文档被表示为不同词频的向量一样，语料库中的一个单词也可以表示为一个向量，其分量是单词在每个文档中的词频。
- en: Other ways of expressing words as vectors would be to have the component specific
    to a document set to 1 if the word is present in the document or 0 if the word
    doesn’t exist in the document.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 将单词表示为向量的其他方法是将特定于文档集的分量设置为1，如果单词存在于文档中，或者设置为0，如果单词不存在于文档中。
- en: Reusing the same example, a word can be expressed as a two-dimensional vector
    [1 1]^(*T*) in the corpus of two documents. In a huge corpus of documents, the
    dimensionality of the word vector would be large as well. Like document similarity,
    word similarity can be computed through either cosine similarity or dot product.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 重复使用相同的例子，一个单词可以在两个文档的语料库中表示为一个二维向量 [1 1]^(*T*)。在一个巨大的文档语料库中，单词向量的维度也会很大。像文档相似度一样，单词相似度可以通过余弦相似度或点积来计算。
- en: Another way to represent words in a corpus is to one-hot encode them. In that
    case, the dimensionality of each word would be the number of unique words in the
    corpus. Each word would correspond to an index that would be set to 1 for the
    word, and all other remaining entries would be set to 0\. So, each would be extremely
    sparse. Even similar words would have entries set to 1 for different indexes,
    so any kind of similarity measure would not work.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在语料库中表示词的另一种方式是对它们进行one-hot编码。在这种情况下，每个词的维度将是语料库中唯一词的数量。每个词将对应一个索引，该索引将设置为1，用于该词，而所有其他剩余条目将设置为0。因此，每个词都会非常稀疏。即使相似的词也会在不同的索引上设置1，所以任何类型的相似度度量都不会起作用。
- en: To represent word vectors better so that the similarity of the words can be
    captured more meaningfully, and also to render less dimensionality to word vectors,
    Word2Vec was introduced.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地表示词向量，以便更有意义地捕捉词的相似性，并且为了减少词向量的维度，Word2Vec被引入。
- en: Word2Vec
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Word2Vec
- en: Word2Vec is an intelligent way of expressing a word as a vector by training
    the word against words in its neighborhood. Words that are contextually like the
    given word would produce high cosine similarity or dot product when their Word2Vec
    representations are considered.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: Word2Vec是一种通过训练词与其邻域中的词来表达词作为向量的智能方式。与给定词在上下文中相似的词，当考虑它们的Word2Vec表示时，会产生高的余弦相似度或点积。
- en: Generally, the words in the corpus are trained with respect to the words in
    their neighborhood to derive the set of the Word2Vec representations. The two
    most popular methods of extracting Word2Vec representations are the CBOW (continuous
    bag of words) method and the Skip-Gram method. The core idea behind CBOW is expressed
    in Figure [14-3](#Fig3).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，语料库中的词是根据其邻域中的词进行训练的，以推导出Word2Vec表示的集合。提取Word2Vec表示的最流行的方法是CBOW（连续词袋）方法和Skip-Gram方法。CBOW背后的核心思想如图[14-3](#Fig3)所示。
- en: Continuous Bag of Words
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 连续词袋
- en: The Word2Vec family of models is unsupervised. This means that you can just
    give it a corpus without additional labels or information and it can construct
    dense word embeddings from the corpus. But you will still need to leverage a supervised,
    classification methodology once you have this corpus to get to these embeddings.
    But we will do that from within the corpus itself, without any auxiliary information.
    We can model this CBOW architecture now as a deep learning classification model
    such that we take in the ***context words as our input, X*** and try to predict
    the ***target word, Y***. In fact, building this architecture is simpler than
    the Skip-gram model where we try to predict a whole bunch of context words from
    a source target word.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: Word2Vec模型家族是无监督的。这意味着你只需给它一个语料库，无需额外的标签或信息，它就能从语料库中构建密集的词嵌入。但一旦你有了这个语料库，你仍然需要利用监督的分类方法来获取这些嵌入。但我们将从语料库本身内部进行，而不需要任何辅助信息。现在我们可以将这种CBOW架构建模为一个深度学习分类模型，这样我们就可以将**上下文词作为我们的输入，X**，并尝试预测**目标词，Y**。实际上，构建这个架构比尝试从源目标词预测一串上下文词的Skip-gram模型要简单。
- en: The CBOW method tries to predict the center word from the context of the neighboring
    words in a specific window length. Let’s look at the following sentence and consider
    a window of five as a neighborhood.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: CBOW方法试图从特定窗口长度的邻域词的上下文中预测中心词。让我们看看以下句子，并考虑一个窗口长度为五的邻域。
- en: '*“The cat jumped over the fence and crossed the road.”*'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '*“猫跳过栅栏，穿过马路。”*'
- en: In the first instance, we will try to predict the word *jumped* from its neighborhood
    *the cat over the*. In the second instance, as we slide the window by one position,
    we will try to predict the word *over* from the neighboring words *cat jumped
    the fence*. This process would be repeated for the entire corpus.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一种情况下，我们将尝试从其邻域*the cat over the*预测单词*jumped*。在第二种情况下，当我们滑动窗口一个位置时，我们将尝试从邻域词*cat
    jumped the fence*预测单词*over*。这个过程将在整个语料库中重复进行。
- en: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig3_HTML.jpg](Images/484548_1_En_14_Fig3_HTML.jpg)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig3_HTML.jpg](Images/484548_1_En_14_Fig3_HTML.jpg)'
- en: Figure 14-3
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-3
- en: The CBOW model
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: CBOW模型
- en: As shown in Figure [14-3](#Fig3), the CBOW model is trained on the context words
    as input and the center word as the output. The words in the input layer are expressed
    as one-hot encoded vectors, where the component for the specific word is set to
    1 and all other components are set to 0\. The number of unique words *V* in the
    corpus determines the dimensionality of these one-hot encoded vectors, hence *x*(*t*) ∈ *R*^(*V* × 1).
    Each one-hot encoded vector *x*(*t*) is multiplied by the input embeddings matrix
    *WI* ∈ *R*^(*N* × *V*) to extract the word embeddings vector *u*(*k*) ∈ *R*^(*N* × 1)
    specific to that word. The index *k* in *u*(*k*) signifies that *u*(*k*) is the
    word embedded for the *k*^(*th*) word in the vocabulary. The hidden-layer vector
    *h* is the average of the input embeddings vectors for all the context words in
    the window, therefore *h* ∈ *R*^(*N* × 1) has the same dimension as that of the
    word embeddings vectors.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [14-3](#Fig3) 所示，CBOW 模型以上下文单词作为输入，中心词作为输出进行训练。输入层的单词表示为 one-hot 编码向量，其中特定单词的分量设置为
    1，所有其他分量设置为 0。语料库中独特的单词数量 *V* 决定了这些 one-hot 编码向量的维度，因此 *x*(*t*) ∈ *R*^(*V* × 1)。每个
    one-hot 编码向量 *x*(*t*) 都与输入嵌入矩阵 *WI* ∈ *R*^(*N* × *V*) 相乘，以提取特定单词的词嵌入向量 *u*(*k*) ∈ *R*^(*N* × 1)。*u*(*k*)
    中的索引 *k* 表示 *u*(*k*) 是词汇表中第 *k*^(*th*) 个单词的嵌入。隐藏层向量 *h* 是窗口中所有上下文单词的输入嵌入向量的平均值，因此
    *h* ∈ *R*^(*N* × 1) 与词嵌入向量具有相同的维度。
- en: '![$$ h=\frac{1}{l-1}{\sum}_{j=\left(i-2\right)\ j\ne i}^{\left(i+1\right)}(WI){x}^j
    $$](Images/484548_1_En_14_Chapter_TeX_Equa.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![隐藏层向量计算公式](Images/484548_1_En_14_Chapter_TeX_Equa.png)'
- en: where *l* is the length of the window size.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *l* 是窗口大小的长度。
- en: Similarly, all the word embeddings vectors for the input words are extracted,
    and their average is the output of the hidden layer. The output of the hidden
    layer *h* is supposed to represent the embeddings of the target word. All the
    words in the vocabulary have another set of word embeddings housed in the output
    embeddings matrix *WO* ∈ *R*^(*V* × *N*). Let the word embeddings in *WO* be represented
    by *v*(*i*) ∈ *R*^(*N* × 1), where the index *i* denotes the *j*th word in the
    vocabulary in order, as maintained in both the one-hot encoding scheme and the
    input embeddings matrix.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，提取所有输入单词的词嵌入向量，它们的平均值是隐藏层的输出。隐藏层输出 *h* 应该表示目标词的嵌入。词汇表中的所有单词在输出嵌入矩阵 *WO* ∈ *R*^(*V* × *N*)
    中都有另一组词嵌入。设 *WO* 中的词嵌入为 *v*(*i*) ∈ *R*^(*N* × 1)，其中索引 *i* 表示词汇表中按顺序的 *j*th 个单词，正如在一维编码方案和输入嵌入矩阵中保持的那样。
- en: '![$$ \left[ WO\right]\left[h\right]=\left[{v}_1^Th,{v}_2^Th,\dots, {v}_i^Th,\dots,
    {v}_v^Th\right] $$](Images/484548_1_En_14_Chapter_TeX_Equb.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![输出层向量计算公式](Images/484548_1_En_14_Chapter_TeX_Equb.png)'
- en: The dot product of the hidden-layer embeddings *h* is computed with each of
    the *v*^(*i*)or *v*[*i*] for simplicity by multiplying the matrix *WO* by *h*.
    The dot product, as we know, would give a similarity measure for each of the output
    words embeddings *v*^(*i*) *where j* ∈ *R*^(*N*) and the hidden-layer computed
    embeddings *h*. The dot products are normalized to probability through a softmax
    and, based on the target word *w*^(*t*), the categorical cross-entropy loss is
    computed and backpropagated through gradient descent to update the matrices’ weights
    for both the input and output embeddings matrices.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏层嵌入 *h* 与每个 *v*^(*i*) 或 *v*[*i*] 的点积（为了简便起见）通过将矩阵 *WO* 乘以 *h* 来计算。正如我们所知，点积将为每个输出单词嵌入
    *v*^(*i*) 提供一个相似度度量，其中 *j* ∈ *R*^(*N*) 和隐藏层计算的嵌入 *h*。点积通过 softmax 归一化为概率，并根据目标词
    *w*^(*t*)，计算并反向传播到梯度下降中，以更新输入和输出嵌入矩阵的权重。
- en: 'The softmax output probability for the *j*^(*th*) word of the vocabulary, *w*[*(j)*],
    given the context words, is given by the following:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在给定上下文单词的情况下，词汇表中的第 *j* 个单词 *w*[*(j)*] 的 softmax 输出概率如下：
- en: '![$$ p\left(w={w}^i\ |\ h\right)={p}^i=\frac{e^{v_i^Th}}{\sum_k^V{e}^{v_k^Th}}
    $$](Images/484548_1_En_14_Chapter_TeX_Equc.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![概率密度函数公式](Images/484548_1_En_14_Chapter_TeX_Equc.png)'
- en: 'If the actual output is represented by a one-hot encoded vector *y*, then the
    loss function for the particular combination of target word and its context words
    can be given by the following:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果实际输出表示为一个 one-hot 编码向量 *y*，那么特定目标词及其上下文单词组合的损失函数可以表示如下：
- en: '![$$ C={\sum}_i^v{y}_i\mathit{\log}\left({p}^i\right) $$](Images/484548_1_En_14_Chapter_TeX_Equd.png)'
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C={\sum}_i^v{y}_i\mathit{\log}\left({p}^i\right) $$](Images/484548_1_En_14_Chapter_TeX_Equd.png)'
- en: The different *p*^(*i*) are dependent on the input and output embeddings matrices’
    components, which are parameters to the cost function *C*. The cost function can
    be minimized with respect to these embeddings parameters through backpropagation
    gradient-descent techniques. To make this more intuitive, let’s say our target
    variable is *cat*. If the hidden-layer vector *h* gives the maximum dot product
    with the outer matrix word embeddings vector for *cat* while the dot product with
    the other outer word embeddings is low, then the embeddings vectors are more or
    less correct. So, very little error or *log* loss will be backpropagated to correct
    the embeddings matrices. However, let’s say the dot product of *h* with *cat*
    is less, and that of the other outer embeddings vectors is more; the loss of the
    softmax is going to be significantly higher, and thus more errors/log loss are
    going to be backpropagated to reduce the error.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的*p*^(*i*)取决于输入和输出嵌入矩阵的组件，这些是成本函数*C*的参数。可以通过反向传播梯度下降技术最小化这些嵌入参数。为了使这一点更直观，让我们说我们的目标变量是*cat*。如果隐藏层向量*h*与*cat*的外部矩阵词嵌入向量具有最大的点积，而与其他外部词嵌入向量的点积较低，那么嵌入向量大致是正确的。因此，将非常小的错误或*log*损失反向传播以纠正嵌入矩阵。然而，假设*h*与*cat*的点积较小，而与其他外部嵌入向量的点积较大；softmax的损失将显著增加，因此将反向传播更多的错误/损失以减少错误。
- en: Implementing Continuous Bag of Words
  id: totrans-172
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现连续词袋模型
- en: The CBOW TensorFlow implementation has been illustrated in this section. The
    neighboring words within a distance of two from either side are used to predict
    the middle word. The output layer is a big softmax over the entire vocabulary.
    The word embeddings vectors are chosen to be of size 128\. The detailed implementation
    is outlined in the following code. See also Figure [14-4](#Fig4).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 本节已展示了CBOW的TensorFlow实现。在两侧距离为两的范围内，使用邻近的词来预测中间的词。输出层是对整个词汇表的大softmax。词嵌入向量的大小被选为128。详细的实现已在以下代码中概述。另请参阅图[14-4](#Fig4)。
- en: The first thing in the code is that we need to import the needed packages, and
    as always, these packages include TensorFlow.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 代码中的第一件事是我们需要导入所需的包，而且像往常一样，这些包包括TensorFlow。
- en: '[PRE7]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Then we need to put in the utility functions; these functions will help us a
    lot in processing text data such as text to vector transformations and more.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们需要添加实用函数；这些函数将极大地帮助我们处理文本数据，如文本向量化转换等。
- en: '[PRE8]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Then we load the data. To simplify this process, we put in a dummy paragraph
    for the sack of ease. You can put a real data if you want to.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们加载数据。为了简化这个过程，我们为了方便起见放入了一个虚拟段落。如果你想的话，可以放入真实数据。
- en: '[PRE9]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Then we will use our functions to process the data, transforming it to `x_train`
    and `y_train`, and also extract some info like `vocab_size` .
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们将使用我们的函数来处理数据，将其转换为`x_train`和`y_train`，并提取一些信息，如`vocab_size`。
- en: '[PRE10]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Now, after loading and processing the data, we need to implement the CBOW. But
    first we need to set the parameters and create variables.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在加载数据并处理后，我们需要实现CBOW。但首先我们需要设置参数并创建变量。
- en: '[PRE11]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Now, let’s create the model.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们创建模型。
- en: '[PRE12]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: And, after creating the architecture, let’s create the graph and run the model.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在创建架构后，让我们创建图并运行模型。
- en: '[PRE13]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: If the model is working, we will see this output.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果模型运行正常，我们将看到以下输出。
- en: '[PRE14]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: After running the model and finishing the epochs, we can use the following code
    to plot the model.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行模型并完成epoch后，我们可以使用以下代码来绘制模型。
- en: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig4_HTML.jpg](Images/484548_1_En_14_Fig4_HTML.jpg)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig4_HTML.jpg](Images/484548_1_En_14_Fig4_HTML.jpg)'
- en: Figure 14-4
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-4
- en: The TSNE of the CBOW
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: CBOW的TSNE
- en: '[PRE15]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The word embeddings learned have been projected to a 2-D plane through the TSNE
    plot. The TSNE plot gives a rough idea of the neighborhood of a given word. We
    can see that the word embeddings vectors learned are reasonable. For instance,
    the words *deep* and *learning* are very close to each other. Similarly, the words
    *biological* and *references* are also very close to each other.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 通过TSNE图，学习到的词嵌入已经被投影到一个二维平面上。TSNE图给出了给定词的邻域的大致概念。我们可以看到学习到的词嵌入向量是合理的。例如，单词*deep*和*learning*彼此非常接近。同样，单词*biological*和*references*也彼此非常接近。
- en: Skip-Gram Model for Word Embeddings
  id: totrans-196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 词嵌入的Skip-Gram模型
- en: 'Skip-gram models work the other way around. Instead of trying to predict the
    current word from the context words, as in CBOW, in Skip-gram models the context
    words are predicted based on the current word. Generally, given a current word,
    context words are taken in its neighborhood in each window. For a given window
    of five words, there would be four context words that one needs to predict based
    on the current word. Figure [14-5](#Fig5) shows the high-level design of a Skip-gram
    model. Much like CBOW, in the Skip-gram model one needs to learn two sets of word
    embeddings: one for the input words and one for the output context words. A Skip-gram
    model can be seen as a reversed CBOW model.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: Skip-gram模型的工作方式相反。与CBOW中试图从上下文单词预测当前单词不同，在Skip-gram模型中，上下文单词是基于当前单词进行预测的。通常，给定一个当前单词，上下文单词在每个窗口中取其邻居。对于一个包含五个单词的给定窗口，将会有四个基于当前单词进行预测的上下文单词。图[14-5](#Fig5)展示了Skip-gram模型的高级设计。与CBOW类似，在Skip-gram模型中，需要学习两套词嵌入：一套用于输入单词，另一套用于输出上下文单词。Skip-gram模型可以看作是CBOW模型的反转。
- en: '![../images/484548_1_En_14_Chapter/484548_1_En_14_Fig5_HTML.jpg](Images/484548_1_En_14_Fig5_HTML.jpg)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![图像](Images/484548_1_En_14_Fig5_HTML.jpg)'
- en: Figure 14-5
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-5
- en: How Skip-gram works
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: Skip-gram的工作原理
- en: In the CBOW model, the input to the model is a one-hot encoded vector *x*^(*i*) ∈ *R*^(*V* × 1)
    for the current word, where *V* is the size of the vocabulary of the corpus. However,
    unlike CBOW, here the input is the current word and not the context words. The
    input *x*^(*i*), when multiplied by the input word embeddings matrix *WI*, produces
    the word embeddings vector *u*^(*k*) ∈ *R*^(*N* × 1), given that *x*^(*t*) represents
    the *k*^(*th*) word in the vocabulary list. *N*, as before, represents the word
    embeddings dimensionality. The hidden-layer output *h* is nothing but *u*^(*k*).
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在CBOW模型中，模型的输入是一个针对当前单词的one-hot编码向量 *x*^(*i*) ∈ R^(*V* × 1)，其中 *V* 是语料库词汇表的大小。然而，与CBOW不同，这里的输入是当前单词而不是上下文单词。当输入
    *x*^(*i*) 与输入词嵌入矩阵 *WI* 相乘时，会产生词嵌入向量 *u*^(*k*) ∈ R^(*N* × 1)，前提是 *x*^(*t*) 代表词汇表列表中的第
    *k* 个单词。*N*，如前所述，代表词嵌入的维度。隐藏层输出 *h* 实际上就是 *u*^(*k*)。
- en: The dot product of the hidden-layer output *h* is computed with every word vector
    *v(j)* of the outer embeddings’ matrix *WO* ∈ *R*^(*V* × *N*) by computing [*WO*][*h*]
    just as in CBOW. However, instead of one softmax output layer, there are multiple
    softmax layers based on the number of context words that we are going to predict.
    For example, in Figure [14-5](#Fig5) there are four softmax output layers corresponding
    to the four context words. The input to each of these softmax layers is the same
    set of dot products in [*WO*][*h*], representing how similar the input word is
    to each word in the vocabulary.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏层输出 *h* 与外层嵌入矩阵 *WO* ∈ R^(*V* × *N*) 中每个单词向量 *v(j)* 的点积被计算，就像在CBOW中一样，通过计算
    [*WO*][*h*]。然而，与一个softmax输出层不同，有多个softmax层，基于我们将要预测的上下文单词的数量。例如，在图[14-5](#Fig5)中有四个softmax输出层，对应于四个上下文单词。每个softmax层的输入是[*WO*][*h*]中的相同一组点积，表示输入单词与词汇表中每个单词的相似程度。
- en: '![$$ \left[ WO\right]\left[h\right]=\left[{v}_1^Th,{v}_2^Th,\dots, {v}_i^Th,\dots,
    {v}_v^Th\right] $$](Images/484548_1_En_14_Chapter_TeX_Eque.png)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_14_Chapter_TeX_Eque.png)'
- en: 'Similarly, all the softmax layers would receive the same set of probabilities
    corresponding to all the vocabulary words, with the probability of the *j*^(*th*)
    word *w*^(*j*) given the current or the center word *w*^(*k*) being given by the
    following:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，所有softmax层都会接收到对应于所有词汇单词的相同概率集，其中给定当前或中心单词 *w*^(*k*) 的 *j*^(*th*) 单词 *w*^(*j*)
    的概率由以下公式给出：
- en: '![$$ p\left({w}^j\ |\ {w}^k\right)={p}^i=\frac{e^{v_j^T{w}^k}}{\sum_k^V{e}^{v_k^T{w}^k}}
    $$](Images/484548_1_En_14_Chapter_TeX_Equf.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_14_Chapter_TeX_Equf.png)'
- en: 'If there are four target words, and their one-hot encoded vectors are represented
    by *y*^(*j* − 2), *y*^(*j* − 1), *y*^(*j* + 1), *y*^(*j* + 2) ∈ *R*^(*v* × 1),
    then the total loss function *C* for the word combination would be the summation
    of all four softmax losses as represented here:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有四个目标单词，并且它们的one-hot编码向量分别表示为 *y*^(*j* - 2)，*y*^(*j* - 1)，*y*^(*j* + 1)，*y*^(*j*
    + 2) ∈ R^(*v* × 1)，那么单词组合的总损失函数 *C* 将是所有四个softmax损失的加和，如此处所示：
- en: '![$$ C=-{\sum}_{m=t-2\ m\ne t}^{t+2}{\sum}_j^V{y}_j^m\mathit{\log}\left({p}^j\right)
    $$](Images/484548_1_En_14_Chapter_TeX_Equg.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_14_Chapter_TeX_Equg.png)'
- en: Gradient descent using backpropagation can be used to minimize the cost function
    and derive the input and output embeddings matrices’ components.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 使用反向传播的梯度下降可以用来最小化损失函数，并推导出输入和输出嵌入矩阵的组件。
- en: 'Here are a few salient features about the Skip-gram and CBOW models:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是关于 Skip-gram 和 CBOW 模型的几个显著特点：
- en: For Skip-gram models, the window size is not generally fixed. Given a maximum
    window size, the window size at each current word is randomly chosen so that smaller
    windows are chosen more frequently than larger ones. With Skip-gram, one can generate
    a lot of training samples from a limited amount of text, and infrequent words
    and phrases are also very well represented.
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于 Skip-gram 模型，窗口大小通常不是固定的。给定最大窗口大小，每个当前单词的窗口大小是随机选择的，以便较小的窗口比较大的窗口更频繁地被选择。使用
    Skip-gram，可以从有限数量的文本中生成大量的训练样本，并且不常见单词和短语也得到很好的表示。
- en: CBOW is much faster to train than Skip-gram and has slightly better accuracy
    for frequent words.
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CBOW 的训练速度比 Skip-gram 快得多，并且对于常见单词的准确性略高。
- en: Both Skip-gram and CBOW look at local windows for word co-occurrences and then
    try to predict either the context words from the center word (as with Skip-gram)
    or the center word from the context words (as with CBOW). So, basically, we observe
    in Skip-gram that locally within each window the probability of the co-occurrence
    of the context word *w*[*C*] and the current word *w*[*t*], given by *P*(*w*[*c*]|
    *w*[*t*]), is assumed to be proportional to the exponential of the dot product
    of their word embeddings vectors.
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Skip-gram 和 CBOW 都查看局部窗口中的单词共现，然后尝试预测中心词的上下文单词（如 Skip-gram 所做的那样）或从上下文单词预测中心词（如
    CBOW 所做的那样）。因此，基本上，我们在 Skip-gram 中观察到，在每个窗口的局部范围内，上下文单词 *w*[*C*] 和当前单词 *w*[*t*]
    的共现概率 *P*(*w*[*c*]| *w*[*t*]) 被假定为与它们单词嵌入向量的点积的指数成正比。
- en: where *u* and *v* are the input and output word embeddings vectors for the current
    and context words, respectively. Since the co-occurrence is measured locally,
    these models miss utilizing the global co-occurrence statistics for word pairs
    within certain window lengths. Next, we are going to explore a basic method to
    look at the global co-occurrence statistics over a corpus, and then use SVD (singular
    value decomposition) to generate word vectors.
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其中 *u* 和 *v* 分别是当前和上下文单词的输入和输出单词嵌入向量。由于共现是局部测量的，因此这些模型未能利用一定窗口长度内单词对的全球共现统计信息。接下来，我们将探索一种基本方法来查看语料库上的全局共现统计信息，然后使用
    SVD（奇异值分解）来生成单词向量。
- en: Implementing Skip-Gram
  id: totrans-214
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现 Skip-Gram
- en: In this section, we will illustrate the Skip-gram model for learning word vector
    embeddings with a TensorFlow implementation. The model is trained on a small dataset
    for easy representation. However, the model can be used to train large corpuses
    as desired. As illustrated in the Skip-gram section, the model is trained as a
    classification network. However, we are more interested in the word embeddings
    matrix than in the actual classification of words. The size of the word embeddings
    has been chosen to be 128\. The detailed code is represented as follows. Once
    the word embeddings vectors are learned, they are projected via TSNE on a two-dimensional
    surface for visual interpretation.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过 TensorFlow 的实现来展示 Skip-gram 模型，用于学习单词向量嵌入。该模型在一个小型数据集上训练，以便于表示。然而，该模型可以根据需要用于训练大型语料库。正如
    Skip-gram 部分所示，该模型被训练为一个分类网络。然而，我们更感兴趣的是单词嵌入矩阵，而不是单词的实际分类。单词嵌入的大小已被选择为 128。详细的代码如下所示。一旦学习到单词嵌入向量，它们将通过
    TSNE 投影到二维表面上，以便进行可视化解释。
- en: As always, we have to import the needed packages, including TensorFlow.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，我们必须导入所需的包，包括 TensorFlow。
- en: '[PRE16]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: And we import the utility functions—all of them.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 并且我们导入所有实用函数。
- en: '[PRE17]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: After this, we need to load the data. For simplicity, we will use the same paragraph
    used in the previous example, so you have to load it or load your own data. And
    do not forget to process it.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们需要加载数据。为了简单起见，我们将使用之前示例中使用的相同段落，因此您必须加载它或加载您自己的数据。并且不要忘记对其进行处理。
- en: Then, we need to set the parameters and create the needed variables such as
    training input and output, weights, and biases for the model.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们需要设置参数并创建模型所需的变量，例如训练输入和输出、权重和偏差。
- en: '[PRE18]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Now we are ready to create the Skip-gram model. Let’s build it.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经准备好创建 Skip-gram 模型了。让我们来构建它。
- en: '[PRE19]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Now you can run the model, the same as the previous model in the CBOW example,
    and see the result using the TSNE plot. We will leave this job for you as an exercise.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以运行模型，就像CBOW示例中的上一个模型一样，并使用TSNE图查看结果。我们将把这个任务留给你作为练习。
- en: GloVe
  id: totrans-226
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GloVe
- en: Now we’ll discuss one of the newer methods of creating vector space models of
    word semantics, more commonly known as word embeddings. GloVe, coined from Global
    Vectors, is a model for distributed word representation. The model is an unsupervised
    learning algorithm for obtaining vector representations for words. This is achieved
    by mapping words into a meaningful space where the distance between words is related
    to semantic similarity. Training is performed on aggregated global word–word co-occurrence
    statistics from a corpus, and the resulting representations showcase interesting
    linear substructures of the word vector space. It was developed as an open source
    project at Stanford. As a log-bilinear regression model for unsupervised learning
    of word representations, it combines the features of two model families, namely
    the global matrix factorization and local context window methods.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将讨论创建词义向量空间模型的一种较新的方法，更常被称为词嵌入。GloVe，源自全局向量，是一个分布式词表示的模型。该模型是一个无监督学习算法，用于获取单词的向量表示。这是通过将单词映射到一个有意义的空间中实现的，其中单词之间的距离与语义相似性相关。训练是在语料库中聚合的全局单词-单词共现统计上进行的，并且产生的表示展示了词向量空间中的有趣线性子结构。它是在斯坦福大学作为一个开源项目开发的。作为一个无监督学习词表示的对数双线性回归模型，它结合了两个模型家族的特征，即全局矩阵分解和局部上下文窗口方法。
- en: GloVe is a pretrained, readily available, word embeddings vectors library from
    Stanford University. The training method for GloVe is significantly different
    from those for CBOW and Skip-gram. Instead of basing predictions on local-running
    windows for words, GloVe uses global word-to-word co-occurrence statistics from
    a corpus to train the model and derive the GloVe vectors. Pretrained GloVe word
    embeddings are available at [`https://nlp.stanford.edu/projects/glove/`](https://nlp.stanford.edu/projects/glove/).
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: GloVe是来自斯坦福大学的一个预训练、现成的词嵌入向量库。GloVe的训练方法与CBOW和Skip-gram的方法显著不同。GloVe不是基于局部运行的窗口来预测单词，而是使用语料库中的全局单词-单词共现统计来训练模型并推导出GloVe向量。预训练的GloVe词嵌入可以在[https://nlp.stanford.edu/projects/glove/](https://nlp.stanford.edu/projects/glove/)找到。
- en: In NLP, global matrix factorization is the process of using matrix factorization
    methods from linear algebra to perform rank reduction on a large term-frequency
    matrix. These matrices usually represent either term`–`document frequencies, in
    which the rows are words and the columns are documents (or sometimes paragraphs),
    or term`–`term frequencies, which have words on both axes and measure co-occurrence.
    Global matrix factorization applied to term-document frequency matrices is more
    commonly known as latent semantic analysis (LSA). In latent semantic analysis,
    the high-dimensional matrix is reduced via singular value decomposition (SVD).
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在自然语言处理（NLP）中，全局矩阵分解是使用线性代数中的矩阵分解方法对大型词频矩阵进行秩降低的过程。这些矩阵通常表示术语-文档频率，其中行是单词，列是文档（或有时是段落），或者术语-术语频率，其中两个轴都有单词，并测量共现。应用于术语-文档频率矩阵的全局矩阵分解更常被称为潜在语义分析（LSA）。在潜在语义分析中，通过奇异值分解（SVD）降低高维矩阵。
- en: Like SVD methods, GloVe looks at the global co-occurrence statistics, but the
    relation of the word and context vectors with respect to the co-occurrences count
    is a little different. If there are two words *wi* and *wj* and a context word
    *w*[*k*], then the ratio of the probabilities *P*(*w*[*k*]| *w*[*i*]) and *P*(*w*[*k*]|
    *w*[*j*]) provide more information than the probabilities themselves.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 与SVD方法类似，GloVe查看全局共现统计，但单词和上下文向量与共现计数的关系略有不同。如果有两个单词 *wi* 和 *wj* 以及一个上下文单词 *w*[*k*]，那么概率比
    *P*(*w*[*k*]| *w*[*i*]) 和 *P*(*w*[*k*]| *w*[*j*]) 提供的信息比概率本身更多。
- en: 'Collect word co-occurrence statistics in the form of word co-occurrence matrix
    *X*. Each element *Xij* of such a matrix represents how often word *i* appears
    in the context of word *j*. Usually we scan our corpus in the following manner:
    for each term we look for context terms within some area defined by a *window_size*
    before the term and a *window_size* after the term. Also, we give less weight
    for more distant words, usually using this formula:'
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收集词共现统计信息，以词共现矩阵 *X* 的形式。这样一个矩阵的每个元素 *Xij* 代表词 *i* 在词 *j* 的上下文中出现的频率。通常我们以以下方式扫描我们的语料库：对于每个术语，我们在术语之前和之后定义的某个
    *window_size* 范围内寻找上下文术语。此外，我们给予较远词语较少的权重，通常使用以下公式：
- en: '![$$ decay=\frac{1}{offset} $$](Images/484548_1_En_14_Chapter_TeX_Equh.png)'
  id: totrans-232
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_14_Chapter_TeX_Equh.png)'
- en: 'Define soft constraints for each word pair:'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每一对词定义软约束：
- en: '![$$ {w}_i^T{w}_j+{b}_i+{b}_j=\mathit{\log}\left({X}_{ij}\right) $$](Images/484548_1_En_14_Chapter_TeX_Equi.png)'
  id: totrans-234
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_14_Chapter_TeX_Equi.png)'
- en: Here, *w*[*i*] = vector for the main word, *w*[*j*] = vector for the context
    word, and *b*[*i*], *b*[*j*] are scalar biases for the main and context words.
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这里，*w*[*i*] = 主词的向量，*w*[*j*] = 上下文词的向量，*b*[*i*]，*b*[*j*] 是主词和上下文词的标量偏差。
- en: Define a cost function.
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义一个损失函数。
- en: '![$$ J={\sum}_i^V{\sum}_j^Vf\left({X}_{ij}\right){\left({w}_i^T{w}_j+{b}_i+{b}_j-\mathit{\log}\left({X}_{ij}\right)\right)}^2
    $$](Images/484548_1_En_14_Chapter_TeX_Equj.png)'
  id: totrans-237
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_14_Chapter_TeX_Equj.png)'
- en: 'Here, *f* is a weighting function, which helps us to prevent learning only
    from extremely common word pairs. The GloVe authors chose the following function:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，*f* 是一个加权函数，它帮助我们防止只从极其常见的词对中学习。GloVe 作者选择了以下函数：
- en: '![$$ f\left({X}_{ij}\right)=\Big\{{\left(\frac{X_{ij}}{x_{max}}\right)}^{\propto}\kern0.5em
    if\ {X}_{ij}&lt; XMAX\ 1\kern0.75em otherwise $$](Images/484548_1_En_14_Chapter_TeX_Equk.png)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_14_Chapter_TeX_Equk.png)'
- en: Summary
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter we discussed the traditional methods of natural language processing.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了自然语言处理的传统方法。
- en: 'In the next and final chapter, we will show you some examples of how to build
    a deep learning pipeline on three different datasets: one on a tabular dataset;
    another on images; and the final one on text data, showing you a TensorFlow model
    from the ground up with progressive documentation.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章和最后一章中，我们将向您展示如何在三个不同的数据集上构建深度学习管道的示例：一个在表格数据集上；另一个在图像上；最后一个在文本数据上，从零开始展示
    TensorFlow 模型，并逐步提供文档。
- en: 15. Applications
  id: totrans-243
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 15. 应用
- en: Case Study—Tabular Dataset
  id: totrans-244
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究——表格数据集
- en: Understanding the Dataset
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解数据集
- en: 'In this section, we are going to understand the dataset. By understanding,
    we mean that we are going to extract any information we can get from this data
    and we are going to exercise on “Titanic: Machine Learning from Disaster” from
    Kaggle ([`www.kaggle.com/c/titanic`](http://www.kaggle.com/c/titanic)). I was
    also inspired to do some visual analysis of the dataset from some other resources
    I came across. So, let us start coding.'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将了解数据集。通过了解，我们的意思是我们将从这个数据中提取任何我们可以得到的信息，并且我们将练习 Kaggle 上的“Titanic：灾难中的机器学习”（[`www.kaggle.com/c/titanic`](http://www.kaggle.com/c/titanic)）。我也受到了从其他我遇到的资源中进行数据集可视化分析的启发。因此，让我们开始编码。
- en: If you browse the dataset page on Kaggle, you will notice that the page gives
    information about the details of the passengers aboard the Titanic, and a column
    on survival of the passengers. Those who survived are represented as “`1`” and
    those who did not survive are represented as “`0`”. The goal of this exercise
    is to determine if, with the other features/information about the passengers,
    it is possible to determine those who are likely to survive.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您浏览 Kaggle 上的数据集页面，您会注意到该页面提供了关于泰坦尼克号上乘客详细信息的说明，以及关于乘客生存情况的列。幸存者表示为“`1`”，未幸存者表示为“`0`”。本练习的目标是确定，是否可以通过其他关于乘客的特征/信息，来预测那些可能幸存的人。
- en: To check any hypothesis you have in mind, you need a good visualization, to
    see the information inside the data. Data visualization allows decision makers
    to see relationships among multidimensional datasets, and provides new ways to
    understand data through the use of heat maps, fever charts, and other rich graphical
    representations.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检查你心中的任何假设，你需要一个好的可视化，以查看数据中的信息。数据可视化使决策者能够看到多维度数据集之间的关系，并通过使用热图、温度图和其他丰富的图形表示，提供了理解数据的新方法。
- en: Let us first import all the needed packages. You are free to use another package,
    but these are the ones recommended to get the job done.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先导入所有需要的包。你可以自由使用其他包，但这些是完成任务所推荐的。
- en: '[PRE20]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: If you do not remember the preceding packages, here is a small summary about
    three of them, but do not hesitate to return to the introduction part and read
    about all the packages this book contains.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你记不起前面的包，这里是对其中三个包的小总结，但不要犹豫，回到介绍部分阅读这本书包含的所有包。
- en: '**pandas** is a great library that deals with everything that NumPy and SciPy
    cannot do. Thanks to its specific data structures, namely DataFrames and Series,
    pandas allows you to handle complex tables of data of different types and time
    series. Also, you can then slice, dice, handle missing elements, add, rename,
    aggregate, reshape, and finally visualize your data as well.'
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**pandas** 是一个处理 NumPy 和 SciPy 无法处理的任何事情的出色库。多亏了其特定的数据结构，即 DataFrame 和 Series，pandas
    允许你处理不同类型和时序的复杂数据表。然后，你可以切片、切块、处理缺失元素、添加、重命名、聚合、重塑，最后还可以可视化你的数据。'
- en: '**matplotlib**​ is a Python 2-D plotting library that produces publication
    quality figures in a variety of hard copy formats and interactive environments
    across platforms. Also, it contains all components that are required to create
    quality plots from data and visualize them interactively. For simple plotting,
    the pyplot module provides a MATLAB-like interface.'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**matplotlib** 是一个 Python 2-D 绘图库，能够在多种硬拷贝格式和跨平台的交互式环境中生成高质量的图形。此外，它包含创建高质量图表并交互式可视化的所有必需组件。对于简单的绘图，pyplot
    模块提供了一个类似 MATLAB 的界面。'
- en: '**Seaborn** is a Python data visualization library based on matplotlib. It
    provides a high-level interface for drawing attractive and informative statistical
    graphics.'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Seaborn** 是一个基于 matplotlib 的 Python 数据可视化库。它提供了一个高级接口，用于绘制吸引人且信息丰富的统计图形。'
- en: Scratching the Surface
  id: totrans-255
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 探索表面
- en: 'After loading all needed packages, we need to load the dataset; of course we
    will use pandas to load it as follows:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 在加载所有需要的包之后，我们需要加载数据集；当然，我们将使用 pandas 来加载，如下所示：
- en: '[PRE21]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The `head()` function will print the first five rows of the DataFrame that contain
    the dataset (Figure [15-1](#Fig1)).
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: '`head()` 函数将打印包含数据集的 DataFrame 的前五行（见图 [15-1](#Fig1)）。'
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig1_HTML.jpg](Images/484548_1_En_15_Fig1_HTML.jpg)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig1_HTML.jpg](Images/484548_1_En_15_Fig1_HTML.jpg)'
- en: Figure 15-1
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-1
- en: The pandas DataFrame that contains the Titanic dataset
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 包含泰坦尼克号数据集的 pandas DataFrame
- en: Note
  id: totrans-262
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: If you wonder why you don’t see a similar table, that’s because we have **Jupyter**
    as the IDE. So, try to download it and install it.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想知道为什么看不到类似的表格，那是因为我们使用了 **Jupyter** 作为 IDE。所以，尝试下载并安装它。
- en: Now, before we start visualizing the dataset, we need a bit of information about
    each column of this dataset, and we can achieve this by calling the `info()` function
    from the DataFrame.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在我们开始可视化数据集之前，我们需要了解每个数据集列的一些信息，我们可以通过调用 DataFrame 的 `info()` 函数来实现这一点。
- en: '[PRE22]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: This function outputs the summary of the dataset. The summary contains column
    names, types and number of non-null entries, and it outputs the size of the DataFrame
    in memory as follows (Figure [15-2](#Fig2)).
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数输出数据集的摘要。摘要包含列名、数据类型和非空条目数量，并输出 DataFrame 在内存中的大小，如下所示（见图 [15-2](#Fig2)）。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig2_HTML.jpg](Images/484548_1_En_15_Fig2_HTML.jpg)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig2_HTML.jpg](Images/484548_1_En_15_Fig2_HTML.jpg)'
- en: Figure 15-2
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-2
- en: Titanic DataFrame column information
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 泰坦尼克号 DataFrame 列信息
- en: Now we can start visualizing each column and see if we can extract any knowledge
    from it or not.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以开始可视化每一列，看看我们是否能从中提取出任何知识。
- en: Let us warm up with the Sex column, which seems simple because it consists of
    only male/female entries. So let us count them up by using the `factorplot()`
    . This function takes the case sensitive column name, the DataFrame, and kind
    count, because we just need to count them up (Figure [15-3](#Fig3)).
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从看似简单的“性别”列开始热身，因为它只包含男/女条目。因此，让我们使用`factorplot()`函数来计数它们。这个函数接受大小写敏感的列名、DataFrame和计数类型，因为我们只需要计数（见图[15-3](#Fig3)）。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig3_HTML.jpg](Images/484548_1_En_15_Fig3_HTML.jpg)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig3_HTML.jpg](Images/484548_1_En_15_Fig3_HTML.jpg)'
- en: Figure 15-3
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-3
- en: A sex count visualization
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 性别计数可视化
- en: '[PRE23]'
  id: totrans-275
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: We can see that the count of males is almost double the count of females, but
    we know that the number of females who survived is greater than the number of
    males who survived. We can prove it by visualizing the count of survivors and
    see the number of survived/not survived males and females (Figure [15-4](#Fig4)).
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到男性的计数几乎是女性的两倍，但我们知道存活的女性的数量大于存活男性的数量。我们可以通过可视化存活者的计数来证明这一点，并查看存活/未存活的男性和女性的数量（见图[15-4](#Fig4)）。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig4_HTML.jpg](Images/484548_1_En_15_Fig4_HTML.jpg)'
  id: totrans-277
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig4_HTML.jpg](Images/484548_1_En_15_Fig4_HTML.jpg)'
- en: Figure 15-4
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-4
- en: The sex/survived count
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 性别/存活计数
- en: 'We can do that by using the same `factorplot()`, adding to it one more parameter
    which is hue, as follows:'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过使用相同的`factorplot()`函数，并添加一个额外的参数——色调，来实现这一点：
- en: '[PRE24]'
  id: totrans-281
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: We can now prove the percentage of survived/not survived of both males and females,
    just by looking at two visualization charts.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以通过查看两个可视化图表来证明男性和女性存活/未存活的百分比。
- en: The next step is to make things more complex, by adding the Pclass column to
    the equation (Figure [15-5](#Fig5)).
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是使事情更加复杂，通过添加Pclass列到等式中（见图[15-5](#Fig5)）。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig5_HTML.jpg](Images/484548_1_En_15_Fig5_HTML.jpg)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig5_HTML.jpg](Images/484548_1_En_15_Fig5_HTML.jpg)'
- en: Figure 15-5
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-5
- en: The Pclass count
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: Pclass计数
- en: '[PRE25]'
  id: totrans-287
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: This column represents the class reserved for each passenger, either *1 = first,
    2 = second, or 3 = third class*. If you look at the chart, you can see that almost
    half of the passengers are in third class. I think it make sense that most passengers
    are in third class, in an expensive type of transportation.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 这列代表为每位乘客预留的舱位等级，即*1 = 一等，2 = 二等，或3 = 三等*. 如果你查看图表，你会看到几乎一半的乘客都在三等舱。我认为在一种昂贵的交通工具上，大多数乘客都在三等舱是有道理的。
- en: 'Now, let’s see the count of each Sex through each `Pclass`, and we will do
    the same as we did before. We can see something strange happens here. If you look
    carefully at the chart (Figure [15-6](#Fig6)), you might see what I have seen,
    which is the following: In first and second class the count number of males almost
    equals the number of females, but in the third class the number of males is almost
    double. You might intuit that from watching the “Titanic” movie: when you see
    *Leonardo DiCaprio’s character* traveling in third class, you can see that most
    of the class consists of males.'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看每个`Pclass`中每种性别的计数，我们将像之前一样做。我们可以看到这里发生了一些奇怪的事情。如果你仔细查看图表（见图[15-6](#Fig6)），你可能会看到我看到的，如下所示：在头等和二等舱中，男性和女性的计数几乎相等，但在三等舱中，男性的数量几乎是女性的两倍。你可能从观看“泰坦尼克号”电影中直觉到这一点：当你看到*莱昂纳多·迪卡普里奥的角色*在三等舱旅行时，你会看到这个舱位的大部分都是由男性组成的。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig6_HTML.jpg](Images/484548_1_En_15_Fig6_HTML.jpg)'
  id: totrans-290
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig6_HTML.jpg](Images/484548_1_En_15_Fig6_HTML.jpg)'
- en: Figure 15-6
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-6
- en: The Pclass/sex count
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: Pclass/性别计数
- en: '[PRE26]'
  id: totrans-293
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Digging Deeper
  id: totrans-294
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 深入挖掘
- en: For now, we think you have some good understanding, but from now on we will
    go deeper. Therefore, we will not only depend on the information from columns,
    we also will extract and fabricate the column dimensions to get more and more
    information.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，我们认为你已经有了很好的理解，但从现在开始我们将更深入地探讨。因此，我们不仅将依赖于列的信息，我们还将提取和构建列维度以获取更多信息。
- en: 'We need to extract more features. By saying that, we mean we will create new
    columns that contain knowledge that was hidden. For instance, we need to calculate
    the number of children who were in the ship. We can extract it from the Age column
    with some associations from the Sex column, and save it as the person column (Figure
    [15-7](#Fig7)), as in the following code:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要提取更多特征。换句话说，我们将创建包含隐藏知识的新列。例如，我们需要计算船上孩子的数量。我们可以通过从性别列中提取一些关联并保存为人员列（图[15-7](#Fig7)）来从年龄列中提取它，如下面的代码所示：
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig7_HTML.jpg](Images/484548_1_En_15_Fig7_HTML.jpg)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig7_HTML.jpg](Images/484548_1_En_15_Fig7_HTML.jpg)'
- en: Figure 15-7
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-7
- en: The modified Titanic DataFrame
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 修改后的泰坦尼克号DataFrame
- en: '[PRE27]'
  id: totrans-300
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Now, let’s see if the new feature can help us to gain a hypothesis.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看这个新特征是否能帮助我们得出一个假设。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig8_HTML.jpg](Images/484548_1_En_15_Fig8_HTML.jpg)'
  id: totrans-302
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig8_HTML.jpg](Images/484548_1_En_15_Fig8_HTML.jpg)'
- en: Figure 15-8
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-8
- en: The Pclass/person count
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: Pclass/人员计数
- en: '[PRE28]'
  id: totrans-305
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: As always, we will make a `factorplot` to see if we gain some knowledge or not.
    As you see in Figure [15-8](#Fig8), the count number of children (child) in third
    class is huge compare with both first and second class. But the count number of
    males still is almost the same, so let us find the total count of people per age.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，我们将制作一个`factorplot`来查看是否获得了一些知识。如图[15-8](#Fig8)所示，第三班孩子的数量（child）与第一班和第二班相比非常庞大。但男性的数量仍然几乎相同，所以让我们找出每个年龄段的总人数。
- en: We can done this with the `hist()` function that calculates the histogram of
    the age; simply, it counts the frequency of the variable within an interval.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用`hist()`函数来完成这项工作，该函数计算年龄的直方图；简单来说，它计算变量在区间内的频率。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig9_HTML.jpg](Images/484548_1_En_15_Fig9_HTML.jpg)'
  id: totrans-308
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig9_HTML.jpg](Images/484548_1_En_15_Fig9_HTML.jpg)'
- en: Figure 15-9
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-9
- en: The Age histogram
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 年龄直方图
- en: '[PRE29]'
  id: totrans-311
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: As you can see in Figure [15-9](#Fig9), the frequency of people on the ship
    who are between 16 and 35 is much greater than the people above that age or children
    below it.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[15-9](#Fig9)所示，16至35岁之间船上的人的频率远高于该年龄以上的人或年龄较小的孩子。
- en: 'Let’s go a step further and count the frequency of male/female per age. We
    do it by stacking multiple figures and creating what’s called `FacetGrid` . This
    `FacetGrid` is composed of two charts: each of them is a kdeplot type that represents
    either male or female, and each `kdeplot` represents the Age of the owing Sex
    type.'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更进一步，按年龄计算男性和女性的频率。我们通过堆叠多个图形并创建所谓的`FacetGrid`来完成。这个`FacetGrid`由两个图表组成：每个图表都是一个表示男性或女性的kdeplot类型，每个`kdeplot`代表相应性别类型的年龄。
- en: So, to simplify the process, you can find all the other visualizations in the
    code accompanying this book. Go check it and see if you can extract more information
    and more understanding from this dataset.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了简化过程，你可以在本书附带的代码中找到所有其他可视化。去看看，看看你是否能从这个数据集中提取更多信息和理解。
- en: Preprocessing Dataset
  id: totrans-315
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预处理数据集
- en: 'If you take a look in this table’s features/columns from left to right, you
    will see the following:'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从左到右查看这个表的特性/列，你会看到以下内容：
- en: '**PassengerId:** This column contains the ID of each observation, and it is
    an almost useless feature for any machine learning model; we cannot extract any
    correlation between this feature and the target/output.'
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PassengerId:** 这一列包含每个观察值的ID，对于任何机器学习模型来说，这是一个几乎无用的特征；我们无法从这个特征和目标/输出之间提取任何相关性。'
- en: '**Survived:** This column is the output feature, sometimes called the target
    or response; it contains values per observation—either 1 if the passenger survived
    or 0 if not.'
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Survived:** 这一列是输出特征，有时也称为目标或响应；它包含每个观察值的数据——如果乘客幸存则为1，如果不则为0。'
- en: '**Pclass:** This column contains the class of each passenger on the ship; it’s
    values are either 1, 2, or 3.'
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Pclass:** 这一列包含船上每位乘客的等级；其值可以是1、2或3。'
- en: '**Age:** This column contains the age of each passenger on the ship, and it
    is a good feature. But with some tweaking, we can extract a new feature from it:
    whether the passenger is a child or not, and that’s of course with the help of
    the Sex column.'
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Age:** 这一列包含船上每位乘客的年龄，这是一个很好的特征。但通过一些调整，我们可以从中提取一个新的特征：乘客是否是孩子，当然这需要借助性别列。'
- en: But, if you take a careful look at the Age column, you will see that it contains
    some null/empty values. Theoretically of course, we can fill these values. Using
    some statistics, we can assume that this column follows some unknown distribution,
    and most of the data is repeated as a phenomenon called the distribution mean.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如果你仔细看看Age列，你会看到它包含一些空/空值。当然，从理论上讲，我们可以填充这些值。使用一些统计方法，我们可以假设这个列遵循某种未知的分布，并且大部分数据都重复出现，这种现象被称为分布均值。
- en: So, without digging into the rock of statistics, we can ensure that filling
    the missing values with the most repeated ones will do the job, and by saying
    “most repeated,” we mean the mean value of the column.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，不深入研究统计学，我们可以确保用最重复的值填充缺失值将有效，而当我们说“最重复”时，我们指的是列的均值。
- en: Calculating the mean is not that hard, and thankfully, the pandas library provides
    us with wonderful functionalities that help us not waste a lot of time. The function
    `mean()` calculates the mean of the Age column easily.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 计算平均值并不难，幸运的是，pandas库提供了许多功能，帮助我们节省大量时间。`mean()`函数可以轻松计算Age列的平均值。
- en: '[PRE30]'
  id: totrans-324
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Now what remains is to fill the empty value in that column with this value,
    and again we can do that by the `fillna()` function : by passing a certain value
    to it, we can fill all the empties/nulls in that column.'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 现在剩下的就是用这个值填充那个列中的空值，我们同样可以通过`fillna()`函数来完成：通过传递一个特定的值给它，我们可以填充那个列中的所有空值/空值。
- en: '[PRE31]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: In the Titanic dataset, the Cabin column does not provide us with any useful
    knowledge; besides, it is mostly null values. So we will not use it, because it
    is useless and will influence any machine learning model. The processing step
    for this column is to remove it from the DataFrame.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 在泰坦尼克号数据集中，Cabin列并没有给我们提供任何有用的知识；此外，它大部分是空值。因此，我们不会使用它，因为它无用且会影响任何机器学习模型。对于这个列的处理步骤是将它从DataFrame中移除。
- en: '[PRE32]'
  id: totrans-328
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: As an optional step, you may want to clean and use the Embarked column, but
    we do not recommend that. It did not give us any useful knowledge, and we recommend
    removing it, but we gave you this step if you wanted to try this.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 作为可选步骤，你可能想清理并使用Embarked列，但我们不推荐这样做。它没有给我们提供任何有用的知识，我们建议移除它，但我们给你这个步骤是因为你可能想尝试一下。
- en: '[PRE33]'
  id: totrans-330
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: After filling the empties, now let’s go and check if there are any empties existing
    in the whole dataset or not.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 在填充空值之后，现在让我们去检查整个数据集中是否还存在任何空值。
- en: '[PRE34]'
  id: totrans-332
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Now, after we’ve ensured that there are no empties in the whole dataset, let’s
    go and craft some new features that might help the machine learning model.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在确保整个数据集中没有空值之后，让我们去创建一些可能有助于机器学习模型的新特征。
- en: We will start with an easy one, combining both the Parch and `SibSp` columns,
    and build a new column that is Boolean. It contains either With Family or Without
    Family values, and those are equal to *True/False* values, therefore we consider
    it a Boolean column.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从简单的一个开始，结合Parch和`SibSp`列，并构建一个新列，它是布尔类型。它包含With Family或Without Family值，这些值等于*True/False*值，因此我们将其视为布尔列。
- en: '[PRE35]'
  id: totrans-335
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: After that, we will create a new column called person, which is similar to the
    Sex column, but the difference is it also tells us if the passenger is a child
    (if the passenger age is under 16 years).
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们将创建一个名为person的新列，它与Sex列类似，但不同之处在于它还告诉我们乘客是否是儿童（如果乘客年龄小于16岁）。
- en: '[PRE36]'
  id: totrans-337
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Now, let’s give it a look, and see what our data looks like so far (Figure [15-10](#Fig10)).
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看，看看我们的数据到目前为止看起来是什么样子（图[15-10](#Fig10)）。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig10_HTML.jpg](Images/484548_1_En_15_Fig10_HTML.jpg)'
  id: totrans-339
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig10_HTML.jpg](Images/484548_1_En_15_Fig10_HTML.jpg)'
- en: Figure 15-10
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-10
- en: The head() of the data after some preprocessing
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理后的数据的前几行
- en: '[PRE37]'
  id: totrans-342
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Now let’s transform the person, alone, and embarked to one-hot encoded columns.
    If you do not know what one-hot encoded means, you can search for it. It’s a type
    of transformation that basically transforms any column to a binary format.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将person、alone和embarked转换成独热编码列。如果你不知道独热编码是什么，你可以搜索一下。它是一种转换类型，基本上将任何列转换成二进制格式。
- en: '[PRE38]'
  id: totrans-344
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Also, we will transform the `Pclass` to on-hot-encoding form and rename its
    columns `class_1`, `class_2`, and `class_3`.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们将`Pclass`转换为独热编码形式，并将其列重命名为`class_1`、`class_2`和`class_3`。
- en: '[PRE39]'
  id: totrans-346
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: The processing step that we will apply to Age is very simple; we will remove
    the percent of it, as there’s is no age 20.2\. We can achieve this by calling
    `ceil()` and applying it to the age.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将对年龄应用的处理步骤非常简单；我们将移除其百分比，因为没有20.2岁的年龄。我们可以通过调用`ceil()`并将其应用于年龄来实现这一点。
- en: And we will do the same processing step to the Fare column too.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将对票价列也进行相同的处理步骤。
- en: '[PRE40]'
  id: totrans-349
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Now, we will add all the new columns to our dataset. Using the `concat()` function
    , we can add columns to DataFrame with an `axis=1` parameter, and rows with `axis=0`.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将添加所有新的列到我们的数据集中。使用`concat()`函数，我们可以通过`axis=1`参数向DataFrame中添加列，通过`axis=0`参数添加行。
- en: '[PRE41]'
  id: totrans-351
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Now, let us drop all the useless columns from the DataFrame, and all the repeated/correlated
    (e.g., the `Pclass` and its classes) columns too.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们从DataFrame中删除所有无用的列，以及所有重复的/相关的（例如，`Pclass`及其类别）列。
- en: '[PRE42]'
  id: totrans-353
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: At last, after finishing cleaning and extracting knowledge from this dataset,
    it is fair to take a last look at it (Figure [15-11](#Fig11)) before going on
    to the next step. Also, it is recommended to save the data after cleaning the
    pipeline, to make it easier for you and for backup purposes too.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在继续下一步之前，公平的做法是在查看它（图[15-11](#Fig11)）之后，对数据进行最后一次检查。此外，建议在清理管道后保存数据，以便于您使用，同时也为了备份目的。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig11_HTML.jpg](Images/484548_1_En_15_Fig11_HTML.jpg)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig11_HTML.jpg](Images/484548_1_En_15_Fig11_HTML.jpg)'
- en: Figure 15-11
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-11
- en: The Titanic DataFrame after the preprocessing step
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理步骤之后的泰坦尼克号数据框
- en: '[PRE43]'
  id: totrans-358
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: For the last step in preprocessing, we will create a checkpoint of the data,
    to make a backup and make sure there’s no data loss.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 在预处理的最后一步，我们将创建数据的检查点，以进行备份并确保没有数据丢失。
- en: '[PRE44]'
  id: totrans-360
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Building the Model
  id: totrans-361
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: And here we are at the core of our application, building the model with TensorFlow.
    Now we will use all that we have learned in the previous part to build a neural
    network that is able to classify the observations about who survived the Titanic
    or not.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经到达了应用程序的核心，使用TensorFlow构建模型。现在，我们将利用之前部分学到的所有知识来构建一个能够对泰坦尼克号乘客是否生还进行分类的神经网络。
- en: We will create a function that is called `build_neural_network` that will build
    the whole network for us and return the graph that we will train. The network
    should take an input that is equal in shape to the preprocessed Titanic dataset,
    and return an output that is either 0 or 1.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将创建一个名为`build_neural_network`的函数，该函数将为我们构建整个网络并返回我们将要训练的图。网络应该接受一个形状与预处理后的泰坦尼克号数据集相等的输入，并返回一个0或1的输出。
- en: '[PRE45]'
  id: totrans-364
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Now, after we’ve created the whole neural network model, we need to make sure
    the dataset is divided into training observations/batches for the model. So, we
    will create a function that takes the data and yields batches that have a size
    of 32, or whatever size that you set.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在我们创建整个神经网络模型之后，我们需要确保数据集被划分为模型用于训练的观察值/批次。因此，我们将创建一个函数，该函数接受数据并产生大小为32或你设置的任何大小的批次。
- en: '[PRE46]'
  id: totrans-366
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Now we need to define some parameters for the model, such as the number of epochs,
    learning rate, and batch size.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要为模型定义一些参数，例如epoch数量、学习率和批量大小。
- en: '[PRE47]'
  id: totrans-368
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Now, we will create a session that we will run the whole network graph onto.
    We will iterate the number of epochs, and inside of each epoch we’ll generate
    some batches that we’ll feed to the model, and generate a loss that will be backpropagated
    to enhance the model weights.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将创建一个会话，我们将运行整个网络图。我们将迭代epoch的数量，在每个epoch内部生成一些批次，我们将将其喂给模型，并生成一个损失，该损失将被反向传播以增强模型权重。
- en: '[PRE48]'
  id: totrans-370
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: 'If this code is running correctly for you without any errors, you will see
    this progress log in your output shell:'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这段代码在你的环境中运行正确，没有任何错误，你将在输出shell中看到这个进度日志：
- en: '[PRE49]'
  id: totrans-372
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: And finally, after the model finishes the training, you can see an analysis
    of it to decide if you need to enhance the model or not (Figure [15-12](#Fig12)).
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，当模型完成训练后，你可以看到它的分析结果，以决定是否需要增强模型（图[15-12](#Fig12)）。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig12_HTML.jpg](Images/484548_1_En_15_Fig12_HTML.jpg)'
  id: totrans-374
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig12_HTML.jpg](Images/484548_1_En_15_Fig12_HTML.jpg)'
- en: Figure 15-12
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-12
- en: The model progress through the dataset
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 模型在数据集上逐步进行
- en: Case Study—IMDB Movie Review Data with Word2Vec
  id: totrans-377
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究——使用Word2Vec的IMDB电影评论数据
- en: In this section we will start with the **IMDB** data and use *Word2Vec*, the
    most common processing algorithm with the **gensim** package. We already talked
    about Word2Vec in previous chapters, but in this chapter we’ll try to use it with
    the IMDB dataset; so let’s take a quick tour. In this section we have some rows/samples/observations
    that each one of them is either a positive or negative sample, and we will divide
    those samples into training and testing sets. But the new thing that we will do
    is to transform it as numbers as we talked about with word embeddings. Then, after
    the transformation, we will pass it to a new layer to feed the learning layer
    to complete the learning task, or save it in a pickle. In this case, we want you
    to learn how to use this gensim embeddings and understand the concept of Word2Vec,
    so you can then learn more about Word2Vec. This is a very well-used case for learning
    to build good models.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将从 **IMDB** 数据开始，使用 **gensim** 包中最常见的处理算法 *Word2Vec*。我们已经在之前的章节中讨论了 Word2Vec，但在这个章节中，我们将尝试使用
    IMDB 数据集；所以让我们快速浏览一下。在本节中，我们有几行/样本/观测值，每个样本要么是正面样本，要么是负面样本，我们将把这些样本分为训练集和测试集。但我们将要做的新的东西是将其转换为数字，就像我们之前讨论的词嵌入一样。然后，在转换之后，我们将将其传递到新的层中，以供学习层完成学习任务，或者将其保存为
    pickle 格式。在这种情况下，我们希望您学习如何使用 gensim 嵌入，并理解 Word2Vec 的概念，然后您可以进一步学习 Word2Vec。这是一个非常常用的案例，用于学习构建好的模型。
- en: '[PRE50]'
  id: totrans-379
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'We need to load files: positive ones, negative ones, and test files.'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要加载文件：正面的、负面的和测试文件。
- en: '[PRE51]'
  id: totrans-381
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: '`positiveFiles` contain positive reviews.'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: '`positiveFiles` 包含正面评论。'
- en: '[PRE52]'
  id: totrans-383
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: We now need to know the size of positive reviews and negative reviews.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在需要知道正面评论和负面评论的大小。
- en: '[PRE53]'
  id: totrans-385
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Let’s put all types of reviews in the same DataFrame so we can see them.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把所有类型的评论放入同一个 DataFrame 中，这样我们就可以看到它们了。
- en: '[PRE54]'
  id: totrans-387
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: Get the data shape; it should be a number with three as the dimension of data.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 获取数据形状；它应该是一个有三个维度的数字。
- en: '[PRE55]'
  id: totrans-389
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
