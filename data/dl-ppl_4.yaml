- en: The first ten rows of reviews
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 评论的前十行
- en: '[PRE56]'
  id: totrans-394
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: Stop words in English are to be ignored.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 英文中的停用词应该被忽略。
- en: '[PRE57]'
  id: totrans-396
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: Define the function that does the cleaning process.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 定义执行清理过程的函数。
- en: '[PRE58]'
  id: totrans-398
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Figa_HTML.jpg](Images/484548_1_En_15_Figa_HTML.jpg)'
  id: totrans-399
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Figa_HTML.jpg](Images/484548_1_En_15_Figa_HTML.jpg)'
- en: '[PRE59]'
  id: totrans-400
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: Now let’s see the gensim package and how to use it with Word2Vec.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看 gensim 包以及如何使用 Word2Vec。
- en: '[PRE60]'
  id: totrans-402
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: Let’s bulid a Word2Vec model and initialize parameters.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个 Word2Vec 模型并初始化参数。
- en: '[PRE61]'
  id: totrans-404
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: After the model is trained, let’s save it.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 模型训练完成后，让我们保存它。
- en: '[PRE62]'
  id: totrans-406
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: Load the model into Word2Vec, which is a module in gensim.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 将模型加载到 Word2Vec 中，这是 gensim 中的一个模块。
- en: '[PRE63]'
  id: totrans-408
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: Let’s find the most similar movies.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们找到最相似的电影。
- en: '[PRE64]'
  id: totrans-410
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: The next step is to extract data using its label.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是使用其标签提取数据。
- en: '[PRE65]'
  id: totrans-412
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: 'Let’s see the shapes of the train/test datasets:'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看训练/测试数据集的形状：
- en: '[PRE66]'
  id: totrans-414
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: See Figure [12-14](#Fig14).
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 见图 [12-14](#Fig14)。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig14_HTML.jpg](Images/484548_1_En_15_Fig14_HTML.jpg)'
  id: totrans-416
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig14_HTML.jpg](Images/484548_1_En_15_Fig14_HTML.jpg)'
- en: Figure 15-14
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-14
- en: Five rows of valid DataFrame
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 五行有效的 DataFrame
- en: Now we’ll do some data preprocessing, which the last iteration before we train
    our model.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将进行一些数据预处理，这是在我们训练模型之前的最后一个迭代。
- en: '[PRE67]'
  id: totrans-420
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: Case Study—Image Segmentation
  id: totrans-421
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究——图像分割
- en: You might wonder what image segmentation is. In computer vision, image segmentation
    is the process of partitioning a digital image into multiple segments. The goal
    of segmentation is to simplify and/or change the representation of an image into
    something that is more meaningful and easier to analyze. Let’s understand image
    segmentation using a simple example. Consider Figure [15-15](#Fig15).
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想知道图像分割是什么。在计算机视觉中，图像分割是将数字图像分割成多个段的过程。分割的目标是简化图像的表示，或者将其转换为更具有意义且更容易分析的形式。让我们通过一个简单的例子来理解图像分割。考虑图
    [15-15](#Fig15)。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig15_HTML.jpg](Images/484548_1_En_15_Fig15_HTML.jpg)'
  id: totrans-423
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig15_HTML.jpg](Images/484548_1_En_15_Fig15_HTML.jpg)'
- en: Figure 15-15
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-15
- en: An example image that we are going to segment
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要分割的一个示例图像
- en: We can divide or partition the image into various parts called segments. It’s
    not a great idea to process the entire image at the same time, as there will be
    regions in the image that do not contain any information. By dividing the image
    into segments, we can make use of the important segments for processing the image.
    That, in a nutshell, is how image segmentation works.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将图像划分为不同的部分，称为段。同时处理整个图像不是一个好主意，因为图像中会有不包含任何信息的区域。通过将图像划分为段，我们可以利用重要的段来处理图像。简而言之，这就是图像分割的工作原理。
- en: 'An image is a collection or set of different pixels. We group together the
    pixels that have similar attributes, using image segmentation. Take a moment to
    look at Figure [12-16](#Fig16) (it’ll give you a practical idea of image segmentation):'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 图像是一组或集合不同的像素。我们使用图像分割将具有相似属性的像素分组在一起。花点时间看看图 [12-16](#Fig16)（它将给您一个图像分割的实际概念）：
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig16_HTML.jpg](Images/484548_1_En_15_Fig16_HTML.jpg)'
  id: totrans-428
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig16_HTML.jpg](Images/484548_1_En_15_Fig16_HTML.jpg)'
- en: Figure 15-16
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-16
- en: The difference between object detection and instance segmentation
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 物体检测与实例分割之间的区别
- en: So, let’s now build an application that is able to segment any image and extract
    instances from it. To start doing this, we need to import all the packages we
    are going to use. It seems that there’s a new package, `skimage` ; this package
    contains a lot of operations that help you to deal with images data.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，现在让我们构建一个能够分割任何图像并从中提取实例的应用程序。要开始这样做，我们需要导入我们将要使用的所有包。似乎有一个新的包，`skimage`；这个包包含许多帮助您处理图像数据的操作。
- en: '[PRE68]'
  id: totrans-432
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Now we need to illustrate a new architecture model called Mask R-CNN. Data scientists
    and researchers at Facebook AI Research (FAIR) pioneered a deep learning architecture,
    called Mask R-CNN, which can create a pixel-wise mask for each object in an image.
    This is a really cool concept, so follow along closely!
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要说明一个新的架构模型，称为 Mask R-CNN。Facebook AI Research（FAIR）的数据科学家和研究人员开创了一种深度学习架构，称为
    Mask R-CNN，可以为图像中的每个对象创建像素级掩码。这是一个非常酷的概念，所以请密切关注！
- en: 'Mask R-CNN is an extension of the popular Faster R-CNN object detection architecture.
    Mask R-CNN adds a branch to the already existing Faster R-CNN outputs. The Faster
    R-CNN method generates two things for each object in the image:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: Mask R-CNN 是流行的 Faster R-CNN 物体检测架构的扩展。Mask R-CNN 为现有的 Faster R-CNN 输出添加了一个分支。Faster
    R-CNN 方法为图像中的每个对象生成两样东西：
- en: Its class
  id: totrans-435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它的类别
- en: The bounding box coordinates
  id: totrans-436
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 边界框坐标
- en: Mask R-CNN adds a third branch to this that outputs the object mask as well.
    Take a look at Figure [15-17](#Fig17) to get an inside look at how Mask R-CNN
    works.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: Mask R-CNN 为此添加了第三个分支，该分支输出对象掩码。请查看图 [15-17](#Fig17) 以了解 Mask R-CNN 的工作原理。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig17_HTML.jpg](Images/484548_1_En_15_Fig17_HTML.jpg)'
  id: totrans-438
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig17_HTML.jpg](Images/484548_1_En_15_Fig17_HTML.jpg)'
- en: Figure 15-17
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-17
- en: How Mask R-CNN works
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: Mask R-CNN 的工作原理
- en: We take an image as input and pass it to the ConvNet, which returns the feature
    map for that image
  id: totrans-441
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们将图像作为输入传递给 ConvNet，它返回该图像的特征图
- en: The region proposal network (RPN) is applied on these feature maps. This returns
    the object proposals along with their object score.
  id: totrans-442
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这些特征图上应用区域提议网络（RPN）。这返回了对象提议及其对象分数。
- en: An RoI pooling layer is applied on these proposals to bring down all the proposals
    to the same size.
  id: totrans-443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这些提议上应用 RoI 池化层，将所有提议降低到相同的大小。
- en: Finally, the proposals are passed to a fully connected layer to classify and
    output the bounding boxes for objects. It also returns the mask for each proposal.
  id: totrans-444
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，提议被传递到一个全连接层，用于分类并输出对象的边界框。它还返回每个提议的掩码。
- en: 'First, we will download the model that we are going to use from GitHub by using
    the command:'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将使用命令从 GitHub 下载我们将要使用的模型：
- en: '[PRE69]'
  id: totrans-446
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: Then we should set the path of the model, to make sure our code sees the model
    downloaded.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们应该设置模型的路径，以确保我们的代码可以看到下载的模型。
- en: '[PRE70]'
  id: totrans-448
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: Then we will import the model and its visualization and utilities.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将导入模型及其可视化工具。
- en: '[PRE71]'
  id: totrans-450
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: After this, we are going to set the logs folder for future analysis and debugging.
    Also, we are going to load the weight from the `h5` data file.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之后，我们将为未来的分析和调试设置日志文件夹。我们还将从 `h5` 数据文件中加载权重。
- en: '[PRE72]'
  id: totrans-452
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: Now we need to set the image directory that our model will read the data from,
    and set the machine configuration. Also, we will instantiate the model and load
    its weight.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要设置图像目录，我们的模型将从该目录读取数据，并设置机器配置。此外，我们将实例化模型并加载其权重。
- en: '[PRE73]'
  id: totrans-454
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: Now we will create the class names; these names come from the COCO dataset that
    the model was trained on.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将创建类名；这些名称来自模型训练所用的 COCO 数据集。
- en: '[PRE74]'
  id: totrans-456
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: Now we need to test if the model that we loaded is working correctly, so we
    will load a test image and feed it to the model and see the output.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要测试我们加载的模型是否工作正常，因此我们将加载一个测试图像并将其输入到模型中，以查看输出。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig18_HTML.jpg](Images/484548_1_En_15_Fig18_HTML.jpg)'
  id: totrans-458
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig18_HTML.jpg](Images/484548_1_En_15_Fig18_HTML.jpg)'
- en: Figure 15-18
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-18
- en: The image contains some pedestrians that the network should extract
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 图像包含网络应该提取的一些行人
- en: '[PRE75]'
  id: totrans-461
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: 'As you can see in Figure [15-18](#Fig18), the image contains many objects,
    and the network should extract the objects and classify their labels. When Mask
    R-CNN extracts each object, it generates the bond box of the object to tell where
    the object is, and its label too. There’s another output that we consider amazing:
    it creates a mask-like boundary over the object. To do that, the network classifies
    each pixel as to whether it belongs to the given object or not.'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您在图 [15-18](#Fig18) 中所见，图像包含许多对象，网络应该提取这些对象并分类它们的标签。当 Mask R-CNN 提取每个对象时，它会生成对象的边界框以告知对象的位置及其标签。还有一个我们认为非常出色的输出：它为对象创建了一个类似遮罩的边界。为此，网络将每个像素分类为是否属于给定的对象。
- en: Now let’s see the Mask R-CNN output; to do that, we write a simple line of code
    that makes the network prediction work.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看 Mask R-CNN 的输出；为此，我们编写了一行简单的代码，使网络预测工作。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig19_HTML.jpg](Images/484548_1_En_15_Fig19_HTML.jpg)'
  id: totrans-464
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig19_HTML.jpg](Images/484548_1_En_15_Fig19_HTML.jpg)'
- en: Figure 15-19
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-19
- en: The extracted output of the network
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 网络提取的输出结果
- en: '[PRE76]'
  id: totrans-467
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: As you see in Figure [15-19](#Fig19), the network output extracted the pedestrians
    exactly. It even extracted the person who is inside the car on the right. Isn’t
    that awesome work? But it’s not only pedestrians/persons that the network extracts;
    there are many classes that the network can classify. You can see the class variables
    in the preceding code to see how many classes and what classes/objects that Mask
    R-CNN can extract.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您在图 [15-19](#Fig19) 中所见，网络输出精确地提取了行人。它甚至提取了右侧车内的人。这不是很棒的工作吗？但网络提取的不仅仅是行人/人；网络可以分类许多类别。您可以通过查看前面的代码中的类变量来了解
    Mask R-CNN 可以提取多少类别以及哪些类别/对象。
- en: To extract a certain object inside the image, you can simply iterate over the
    objects until you find the wanted one, and do whatever you want (Figure [15-20](#Fig20)).
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 要提取图像中的某个特定对象，您可以简单地遍历对象，直到找到所需的那个，然后做您想做的事情（图 [15-20](#Fig20)）。
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig20_HTML.jpg](Images/484548_1_En_15_Fig20_HTML.jpg)'
  id: totrans-470
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig20_HTML.jpg](Images/484548_1_En_15_Fig20_HTML.jpg)'
- en: Figure 15-20
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-20
- en: The each object segmented from the network
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 网络分割出的每个对象
- en: '[PRE77]'
  id: totrans-473
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: Summary
  id: totrans-474
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we showed you some examples to learn how to apply the knowledge
    you have gained from this book. All the applications in this book are designed
    to make sure that you learn every single concept from tabular dataset to text
    to images dataset, and apply these concepts in a practical manner.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们向您展示了几个示例，以学习如何应用从本书中获得的知识。本书中的所有应用都旨在确保您从表格数据集到文本数据集再到图像数据集，都能学习到每个单一的概念，并以实际的方式应用这些概念。
- en: We hope that you have enjoyed this chapter, as there’s no theory and it contains
    a lot of code, and enjoyed the whole book too.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望您喜欢本章，因为没有理论，它包含了很多代码，也希望您喜欢整本书。
- en: By ending this chapter, you have finished the journey of learning what the deep
    learning pipeline is and how to apply it in real life.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结束本章，您已经完成了学习深度学习流程及其在实际生活中应用的过程。
