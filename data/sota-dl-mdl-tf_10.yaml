- en: DCGAN Experiment with Small Images
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在小图像上实验DCGAN
- en: Using CNN architectures with GANs can produce much better results than simple
    feedforward networks with GANs. A **Deep Convolutional generative adversarial
    network** (DCGAN) is a GAN with convolutional neural networks as its generator
    and discriminator. Instead of using a feedforward network for the generator and
    discriminator, we substitute a CNN. The DCGAN architecture achieves superior performance
    with image processing tasks in many cases.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 使用CNN架构与GAN结合可以产生比简单的前馈网络与GAN结合更好的结果。**深度卷积生成对抗网络**（DCGAN）是一种GAN，其生成器和分辨器使用卷积神经网络。我们不是使用前馈网络作为生成器和分辨器，而是用CNN代替。DCGAN架构在许多情况下在图像处理任务中实现了优越的性能。
- en: Create the Generator
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建生成器
- en: 'Import libraries:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE19]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Create the generator as shown in Listing [10-5](#PC21).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 创建与列表[10-5](#PC21)中所示的生成器。
- en: '[PRE20]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Begin by feeding the generator small tensors (7 × 7 pixels) projected to 128
    dimensions resulting in a 6,272-dimensional space. Multiply 7 × 7 × 128 to get
    the dimensional space. The goal is to increase tensor image size to match Fashion-MNIST
    images at 28 × 28 and decrease depth to 1 to match channel size. We created this
    network through trial and error experimentation. Experiment with the initial tensor
    size, but be aware that doing so changes the neuron calculations for both the
    generator and discriminator.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 首先向生成器提供小张量（7 × 7像素），并将其投影到128个维度，形成一个6,272维的空间。将7 × 7 × 128相乘以获得维空间。目标是增加张量图像的大小以匹配28
    × 28的Fashion-MNIST图像，并将深度减少到1以匹配通道大小。我们通过试错实验创建了此网络。尝试不同的初始张量大小，但请注意，这样做会改变生成器和分辨器的神经元计算。
- en: Specifically, the generator accepts codings of size 100 and projects them to
    6,272 dimensions (7 × 7 × 128). The generator then reshapes the projection to
    a 7 × 7 × 128 tensor, which is batch-normalized and fed to a transposed convolutional
    layer with a stride of 2\. The stride up-samples the tensor to 14 × 14 because
    it doubles the 7 × 7 dimension. The layer also reduces the tensor's depth from
    128 to 64\. The result is batch-normalized again and fed to another transposed
    convolutional layer with a stride of 2\. The stride up-samples it to 28 × 28 because
    it doubles the 14 × 14 dimension. The layer also reduces the tensor's depth from
    64 to 1\. The output tensor has shape (28, 28, 1), which is the goal because Fashion-MNIST
    images have shape 28 × 28 × 1\. Since the final layer uses *tanh* activation,
    outputs are reshaped between the range –1 and 1.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，生成器接受大小为100的编码，并将它们投影到6,272个维度（7 × 7 × 128）。然后生成器将投影重塑为一个7 × 7 × 128的张量，该张量经过批量归一化，并输入到一个步长为2的转置卷积层。步长将张量上采样到14
    × 14，因为它将7 × 7维度翻倍。该层还将张量的深度从128减少到64。结果是再次进行批量归一化，并输入到另一个步长为2的转置卷积层。步长将其上采样到28
    × 28，因为它将14 × 14维度翻倍。该层还将张量的深度从64减少到1。输出张量的形状为(28, 28, 1)，这是目标，因为Fashion-MNIST图像的形状为28
    × 28 × 1。由于最终层使用*tanh*激活，输出在-1和1之间重塑。
- en: The hyperbolic tangent activation function is also referred to as the tanh function.
    It is very similar to the sigmoid activation function and even has the same S
    shape. But the function takes any real value as input and outputs values in the
    range –1 to 1\. We used tanh instead of sigmoid for the output layer because it
    performed better in this case.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 双曲正切激活函数也被称为tanh函数。它与sigmoid激活函数非常相似，甚至具有相同的S形状。但该函数接受任何实数值作为输入，并输出范围在-1到1之间的值。我们之所以使用tanh而不是sigmoid作为输出层，是因为在这种情况下它的表现更好。
- en: 'Generate images with the untrained generator:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 使用未训练的生成器生成图像：
- en: '[PRE21]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Create the Discriminator
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建分辨器
- en: Create the discriminator as shown in Listing [10-6](#PC23).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 创建与列表[10-6](#PC23)中所示的分辨器。
- en: '[PRE22]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: The discriminator looks like a regular CNN for binary classification (the final
    Dense layer is 1), except it uses strides to down-sample instead of max pooling
    layers.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 分辨器看起来像用于二分类的常规CNN（最终密集层为1），但它使用步长进行下采样而不是最大池化层。
- en: Create the DCGAN
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建DCGAN
- en: 'Create the DCGAN from the DCGAN generator and discriminator:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 从DCGAN生成器和分辨器创建DCGAN：
- en: '[PRE23]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Compile the Discriminator Model
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译分辨器模型
- en: Since the discriminator is naturally a binary classifier (fake or real images),
    we naturally use binary cross-entropy loss. Since the generator is only trained
    through the DCGAN model, we *don't need* to compile it. The DCGAN model is also
    a binary classifier, so it can use the same loss function. Importantly, the discriminator
    should not be trained during the second phase. So we make it non-trainable before
    compiling the DCGAN model.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 由于判别器自然是一个二元分类器（伪造或真实图像），我们自然使用二元交叉熵损失。由于生成器仅通过DCGAN模型进行训练，所以我们*不需要*编译它。DCGAN模型也是一个二元分类器，因此它可以使用相同的损失函数。重要的是，判别器在第二阶段不应该进行训练。因此，我们在编译DCGAN模型之前将其设置为不可训练。
- en: 'Compile the DCGAN:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 编译DCGAN：
- en: '[PRE24]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Reshape
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新塑形
- en: 'Since outputs range from –1 to 1 due to tanh activation in the final layer
    of the generator, rescale the training set to the same range:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 由于生成器最终层的tanh激活导致输出范围从-1到1，因此将训练集重新缩放到相同的范围：
- en: '[PRE25]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Build the Input Pipeline
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Build the pipeline with batch size of 32:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 使用32个批次的批量大小构建管道：
- en: '[PRE26]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Train
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练
- en: 'Clear and seed:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 清除并设置随机种子：
- en: '[PRE27]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Train for a few epochs:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 训练几个周期：
- en: '[PRE28]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Wow! Much better!
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！好多了！
- en: Generate Images with the Trained Generator
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用训练好的生成器生成图像
- en: 'Use the trained DC generator to make images:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 使用训练好的DC生成器生成图像：
- en: '[PRE29]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: DCGAN Experiment with Large Images
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大图像深度卷积生成对抗网络实验
- en: A very simple Deep Convolutional GAN worked well with Fashion-MNIST. But images
    in this dataset are small and grayscale. Let’s see how well a Deep Convolutional
    GAN works with the *rock_paper_scissors* dataset, which contains large color images
    of hands playing the rock-paper-scissors game.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 一个非常简单的深度卷积生成对抗网络在Fashion-MNIST上表现良好。但这个数据集中的图像很小，是灰度的。让我们看看深度卷积生成对抗网络在包含玩剪刀石头布游戏的手的大彩色图像的*rock_paper_scissors*数据集上的表现如何。
- en: Inspect Metadata
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查元数据
- en: 'Load the dataset to inspect its metadata:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 加载数据集以检查其元数据：
- en: '[PRE30]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Inspect the metadata object:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 检查元数据对象：
- en: '[PRE31]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'Get class labels and number of classes:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 获取类别标签和类别数量：
- en: '[PRE32]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Visualize some examples:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化一些示例：
- en: '[PRE33]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Load Data for Training
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载训练数据
- en: 'Load train and test images as NumPy arrays:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练和测试图像作为NumPy数组加载：
- en: '[PRE34]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'Inspect shapes:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 检查形状：
- en: '[PRE35]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: The dataset contains 2,520 300 × 300 × 3 images. Since images are the same size,
    we don't have to resize them. However, we resize images for another reason explained
    later in the chapter.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集包含2,520个300 × 300 × 3的图像。由于图像大小相同，我们不需要调整大小。然而，我们调整大小是为了在章节后面解释的另一个原因。
- en: Massage the Data
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理数据
- en: 'Shrink the dataset to a power of 2 to guarantee equal batches:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集缩小到2的幂以保证批次相等：
- en: '[PRE36]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: When we tried to train with the original dataset size, we got an error. So we
    created equal batches to eradicate the error.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们尝试使用原始数据集大小进行训练时，我们遇到了错误。因此，我们创建了相等的批次以消除错误。
- en: 'Create a function to reformat images:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个重新格式化图像的函数：
- en: '[PRE37]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Although we don’t have to resize images, we do so to make it easier to create
    a model with an appropriate number of neurons at each layer of the network. We
    mentioned earlier in the chapter that all images are the same 300 × 300 pixel
    size. But we resize to a power of 2 for convenience.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们不需要调整图像大小，但我们这样做是为了更容易创建具有适当神经元数量的网络层的模型。我们在本章前面提到，所有图像都是300 × 300像素大小。但我们将其调整到2的幂以方便。
- en: A generator begins by projecting relatively small images onto many dimensions
    with a large depth size and gradually increases image size and decreases depth
    size until it outputs the image size we want. So it's easier to work with values
    divisible by and multiplicative of 2\. Deep learning models also perform better
    when the number of neurons in a model is based on the power of 2.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器开始时，将相对较小的图像投影到具有大深度的多个维度上，并逐渐增加图像大小并减少深度大小，直到输出我们想要的图像大小。因此，使用能被2整除和乘以2的值更容易工作。深度学习模型在模型中神经元的数量基于2的幂时也表现更好。
- en: Build the Input Pipeline
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Create tensors from feature images:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 从特征图像创建张量：
- en: '[PRE38]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'Transform images for peak performance:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 转换图像以获得最佳性能：
- en: '[PRE39]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Visualize some examples from a batch as shown in Listing [10-7](#PC41).
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[10-7](#PC41)所示，可视化一批示例。
- en: '[PRE40]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: We don’t show labels because we don’t need them for our unsupervised experiment.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有显示标签，因为我们不需要它们进行我们的无监督实验。
- en: Build the Model
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Clear and seed:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 清除并设置随机种子：
- en: '[PRE41]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Create the generator as shown in Listing [10-8](#PC43).
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[10-8](#PC43)所示创建生成器。
- en: '[PRE42]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: The number of neurons is based on the power of 2 with one exception. The final
    layer contains three neurons to represent the number of classes.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元的数量基于2的幂，只有一个例外。最终层包含三个神经元来表示类别数量。
- en: Since we want to generate large color images, begin by feeding the generator
    a bigger (32 × 32) tensor projected to 256 dimensions. So the resulting dimensional
    space is a 262,144\. Multiply 32 by 32 by 256 to get this value.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们想要生成大型的彩色图像，首先将一个更大的（32 × 32）张量投影到256维，然后输入给生成器。因此，结果维度空间是262,144。将32乘以32乘以256得到这个值。
- en: The generator reshapes the projection to a 32 × 32 × 256 tensor, which is batch-normalized
    and fed to a transposed convolutional layer with a stride of 2\. The stride up-samples
    the tensor to 64 × 64 because it doubles the 32 × 32 dimension. The layer also
    reduces the tensor's depth from 256 to 128\. The result is batch-normalized again
    and fed to another transposed convolutional layer with a stride of 2\. The stride
    up-samples it to 128 × 128 because it doubles the 64 × 64 dimension. The layer
    also reduces the tensor's depth from 128 to 64\. The result is batch-normalized
    again and fed to another transposed convolutional layer with a stride of 2\. The
    stride up-samples it to 256 × 256 because it doubles the 128 × 128 dimension.
    The layer also reduces the tensor's depth from 64 to 3.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器将投影重塑为一个32 × 32 × 256的张量，该张量经过批量归一化，然后输入到一个步长为2的转置卷积层。步长将张量上采样到64 × 64，因为它将32
    × 32维度加倍。该层还将张量的深度从256减少到128。结果是再次批量归一化，然后输入到另一个步长为2的转置卷积层。步长将其上采样到128 × 128，因为它将64
    × 64维度加倍。该层还将张量的深度从128减少到64。结果是再次批量归一化，然后输入到另一个步长为2的转置卷积层。步长将其上采样到256 × 256，因为它将128
    × 128维度加倍。该层还将张量的深度从64减少到3。
- en: The output tensor has shape (256, 256, 3), which is our goal because we want
    them to be the original 256 × 256 × 3 shape. Since the final layer uses tanh activation,
    outputs are reshaped between the range –1 and 1.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 输出张量的形状为（256，256，3），这是我们想要的目标，因为我们希望它们是原始的256 × 256 × 3形状。由于最终层使用tanh激活，输出在-1和1之间重塑。
- en: Note
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Hopefully you can see why we use powers of 2 to layer the model. We start our
    generator with a large dimensional space and, layer by layer, we reduce tensor
    dimensions back to the original shape of images from our dataset. Up-sampling
    and reducing tensors by 2 is very easy mathematically.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你能看到我们为什么使用2的幂次来分层模型。我们以一个大的维度空间开始我们的生成器，然后一层层地减少张量维度，回到我们数据集图像的原始形状。通过2上采样和减少张量是非常容易的数学运算。
- en: 'Inspect:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 检查：
- en: '[PRE43]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: Create the discriminator as shown in Listing [10-9](#PC45).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如图 [10-9](#PC45) 所示的判别器。
- en: '[PRE44]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: The discriminator accepts 256 × 256 × 3 images, down-samples tensors to 128
    × 128, and increases depth from 32 to 64\. Tensors are fed to a transposed convolutional
    layer, which down-samples tensors to 64 × 64 and increases depth to 128\. The
    result is flattened to a 524,288-dimensional space (64 × 64 × 128). Since we are
    conducting binary classification, the final Dense layer includes only *one* neuron.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 判别器接受256 × 256 × 3图像，将张量下采样到128 × 128，并将深度从32增加到64。张量被输入到一个转置卷积层，该层将张量下采样到64
    × 64，并将深度增加到128。结果是展平到一个524,288维的空间（64 × 64 × 128）。由于我们正在进行二元分类，最终的密集层只包含**一个**神经元。
- en: The generator up-samples tensors to activate neurons in a higher-dimensional
    space. The discriminator down-samples tensors back to the original image size
    from the data for effective feature classification.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器上采样张量以激活更高维度空间中的神经元。判别器将张量下采样回原始图像大小，以对数据进行有效特征分类。
- en: 'Inspect:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 检查：
- en: '[PRE45]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: 'Create the DCGAN:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 创建DCGAN：
- en: '[PRE46]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Compile the Discriminator Model
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译判别器模型
- en: 'Since the discriminator is naturally a binary classifier (fake or real images),
    we naturally use binary cross-entropy loss. Since the generator is only trained
    through the DCGAN model, we *don''t need* to compile it. The DCGAN model is also
    a binary classifier, so it can use the same loss function. Importantly, the discriminator
    should not be trained during the second phase. So we make it non-trainable before
    compiling the DCGAN model:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 由于判别器天然是一个二元分类器（伪造或真实图像），我们自然使用二元交叉熵损失。由于生成器仅通过DCGAN模型进行训练，所以我们**不需要**编译它。DCGAN模型也是一个二元分类器，因此它可以使用相同的损失函数。重要的是，在第二阶段不应该训练判别器。因此，在编译DCGAN模型之前，我们将其设置为不可训练：
- en: '[PRE47]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Rescale
  id: totrans-183
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新缩放
- en: 'Create a function to rescale:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个重新缩放的函数：
- en: '[PRE48]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Since outputs range from –1 to 1 due to tanh activation in the final layer of
    the generator, rescale the training set to the same range.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 由于生成器最终层的tanh激活导致输出范围从-1到1，因此将训练集重新缩放到相同的范围。
- en: 'Rescale images:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 重新缩放图像：
- en: '[PRE49]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Train Model and Generate Images
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型并生成图像
- en: Create a function to plot images as shown in Listing [10-10](#PC51).
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来绘制如图[10-10](#PC51)所示的图像。
- en: '[PRE50]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: Create a training loop function to train the DCGAN as shown in Listing [10-11](#PC52).
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个训练循环函数来训练DCGAN，如图[10-11](#PC52)所示。
- en: '[PRE51]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Train the DCGAN:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 训练DCGAN：
- en: '[PRE52]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: With just a few epochs, we can see that the generated images begin to represent
    rock, paper, and scissors hands. But the generator and discriminator models we
    built are very simple. To generate realistic images, we need to create a much
    more robust model.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 只需经过几个epoch，我们就可以看到生成的图像开始代表石头、剪刀、布的手势。但我们所构建的生成器和判别器模型非常简单。为了生成逼真的图像，我们需要创建一个更加健壮的模型。
- en: Summary
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we built a GAN with a feedforward network with mediocre generated
    facsimiles. With a DCGAN, generated facsimiles were much more realistic for Fashion-MNIST.
    For rock_paper_scissors, facsimiles weren’t great. We could try training the model
    for more epochs, but this takes a lot of time and may take more memory than your
    computer can handle.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们构建了一个具有正向网络的GAN，其生成的复制品质量一般。对于Fashion-MNIST，使用DCGAN生成的复制品更加逼真。对于石头剪刀布，复制品并不出色。我们可以尝试训练模型更多的epoch，但这需要花费大量时间，并且可能需要比你的电脑能处理的更多内存。
