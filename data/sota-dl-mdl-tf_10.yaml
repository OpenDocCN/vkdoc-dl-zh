- en: 10. Generative Adversarial Networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 生成对抗网络
- en: Generative modeling is an unsupervised learning technique that involves automatically
    discovering and learning the regularities (or patterns) in input data so that
    a trained model can generate new examples that plausibly could have been drawn
    from the original dataset. A popular type of generative model is a generative
    adversarial network. **Generative adversarial networks** (GANs) are generative
    models that create new data instances that resemble the training data.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 生成建模是一种无监督学习技术，它涉及自动发现和学习输入数据中的规律性（或模式），以便训练后的模型可以生成新的示例，这些示例可能来自原始数据集。一种流行的生成模型是生成对抗网络。**生成对抗网络**（GANs）是生成模型，可以创建与训练数据相似的新数据实例。
- en: GANs frame the problem as a supervised learning problem with two submodels,
    namely, a generator model and discriminator model. The *generator* model is trained
    to generate new examples. The *discriminator* model attempts to classify examples
    as either real (from the domain) or fake (generated). The domain represents images
    from the original training set. The two models are trained together in a zero-sum
    adversarial game until the discriminator model is fooled about half the time.
    The result of training is generation of plausible examples.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: GANs将问题框架化为一个带有两个子模型的监督学习问题，即生成器模型和判别器模型。*生成器*模型被训练以生成新的示例。*判别器*模型试图将示例分类为真实（来自域）或伪造（生成）。域表示来自原始训练集的图像。这两个模型在零和对抗游戏中一起训练，直到判别器模型大约一半的时间被欺骗。训练的结果是生成可信的示例。
- en: GANs excel at realistic examples in image-to-image translation tasks such as
    translating photos of summer to winter or day to night. They have also been successful
    at generating photorealistic photos of objects, scenes, and people that even humans
    cannot tell are fake. GANs can create images that look like photographs of human
    faces even though the faces don't belong to any real person.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: GANs在图像到图像的翻译任务中表现出色，例如将夏季照片转换为冬季或白天转换为夜晚。它们还成功地生成了逼真的物体、场景和人物照片，即使人类也无法分辨出这些照片是伪造的。GANs可以创建看起来像人类面部照片的图像，即使这些面部不属于任何真实人物。
- en: We demonstrate a GAN with a code example. We also demonstrate Deep Convolutional
    GANs (DCGANs) with code examples. A GAN uses a feedforward network to learn, while
    a Deep Convolutional GAN uses a convolutional network to learn.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过代码示例演示了一个GAN。我们还通过代码示例演示了深度卷积生成对抗网络（DCGANs）。GAN使用前馈网络来学习，而深度卷积GAN使用卷积网络来学习。
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 各章节的Notebooks位于以下URL：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/paperd/deep-learning-models](https://github.com/paperd/deep-learning-models)'
- en: We begin with a GAN experiment. We continue with two Deep Convolutional GAN
    (DCGAN) experiments. A GAN generates facsimile images from input images. A DCGAN
    does the same, but generates much more realistic facsimiles.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从一个GAN实验开始。我们继续进行两个深度卷积生成对抗网络（DCGAN）实验。GAN从输入图像生成类似图像。DCGAN做同样的事情，但生成的类似图像更加逼真。
