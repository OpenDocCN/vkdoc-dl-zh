- en: Build the GAN
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建生成对抗网络（GAN）
- en: 'Get input shape:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 获取输入形状：
- en: '[PRE6]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Clear and seed:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 清除并设置随机种子：
- en: '[PRE7]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Import libraries:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE8]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Build the generator as shown in Listing [10-1](#PC10).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表 [10-1](#PC10) 构建生成器。
- en: '[PRE9]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: As we know, a *generator* is used to generate new plausible examples from the
    problem domain. It takes a random distribution as input (typically Gaussian) and
    outputs some data (typically an image). The random inputs can be thought of as
    the latent representations (or codings) of the image to be generated. So generators
    have the same functionality as decoders in a variational autoencoder and can be
    used in the same way to generate new images. However, they are trained very differently.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，*生成器*用于从问题域生成新的合理示例。它接受一个随机分布作为输入（通常是高斯分布）并输出一些数据（通常是图像）。随机输入可以被认为是待生成图像的潜在表示（或编码）。因此，生成器具有与变分自编码器中的解码器相同的功能，并且可以以相同的方式用于生成新图像。然而，它们的训练方式非常不同。
- en: The generator learns to create fake data by incorporating feedback from the
    discriminator. It learns to make the discriminator classify its output as real.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器通过结合判别器的反馈来学习创建伪造数据。它学习使判别器将其输出分类为真实。
- en: Generator training requires tighter integration between the generator and the
    discriminator than discriminator training requires. The portion of the GAN that
    trains the generator includes random input, the generator network, discriminator
    output, and generator loss. The generator network transforms random input into
    a data instance. The discriminator network classifies the generated data. Generator
    loss penalizes the generator for failing to fool the discriminator.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器训练需要比判别器训练更紧密的生成器和判别器之间的集成。训练生成器的 GAN 部分包括随机输入、生成器网络、判别器输出和生成器损失。生成器网络将随机输入转换为数据实例。判别器网络对生成的数据进行分类。生成器损失对生成器未能欺骗判别器进行惩罚。
- en: Now, build the discriminator as shown in Listing [10-2](#PC11).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，按照列表 [10-2](#PC11) 构建判别器。
- en: '[PRE10]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: As we also know, a *discriminator* is used to classify examples as real (from
    the domain) or fake (generated from the generator). It takes either a fake image
    from the generator or a real image from the training set as input and guesses
    whether the input image is fake or real. The discriminator is a regular binary
    classifier (real or fake images). It takes an image as input and ends with a Dense
    layer containing a single unit.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，*判别器*用于将示例分类为真实（来自域）或伪造（由生成器生成）。它接受来自生成器的伪造图像或来自训练集的真实图像作为输入，并猜测输入图像是伪造的还是真实的。判别器是一个常规的二分类器（真实或伪造图像）。它接受一个图像作为输入，并以包含单个单元的
    Dense 层结束。
- en: 'Create the model:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE11]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Compile the Discriminator Model
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译判别器模型
- en: Since the discriminator is naturally a binary classifier (fake or real images),
    we naturally use binary cross-entropy loss. Since the generator is only trained
    through the GAN model, we *don't need* to compile it. The GAN model is also a
    binary classifier, so it can use the same loss function. Importantly, the discriminator
    should not be trained during the second phase. So we make it non-trainable before
    compiling the GAN model.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 由于判别器本质上是一个二元分类器（伪造或真实图像），我们自然使用二元交叉熵损失。由于生成器仅通过GAN模型进行训练，我们**不需要**编译它。GAN模型也是一个二元分类器，因此它可以使用相同的损失函数。重要的是，在第二阶段训练判别器之前，不应对其进行训练。因此，我们在编译GAN模型之前将其设置为不可训练。
- en: '[PRE12]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Training data fed to the discriminator comes from two sources – real and fake
    data. For our experiment, real data instances are Fashion-MNIST images. The discriminator
    uses these instances as positive examples during training. Fake data instances
    are created by the generator. The discriminator uses these instances as negative
    examples during training.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 输入到判别器的训练数据来自两个来源——真实数据和伪造数据。在我们的实验中，真实数据实例是Fashion-MNIST图像。判别器将这些实例用作训练中的正例。伪造数据实例由生成器创建。判别器将这些实例用作训练中的负例。
- en: During discriminator training, the generator does not train. Its weights remain
    constant while it produces examples for the discriminator to train on.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在判别器训练期间，生成器不进行训练。其权重保持不变，同时它为判别器生成训练示例。
- en: The discriminator connects to two loss functions – generator and discriminator.
    During discriminator training, the discriminator ignores the generator loss and
    just uses the discriminator loss. The discriminator classifies both real data
    and fake data from the generator. Discriminator loss penalizes the discriminator
    for misclassifying a real instance as fake or a fake instance as real. The discriminator
    updates its weights through back-propagation from the discriminator loss through
    the discriminator network.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 判别器连接到两个损失函数——生成器和判别器。在判别器训练期间，判别器忽略生成器损失，仅使用判别器损失。判别器对来自生成器的真实数据和伪造数据进行分类。判别器损失对判别器因错误地将真实实例分类为伪造实例或伪造实例分类为真实实例进行惩罚。判别器通过从判别器损失通过判别器网络进行反向传播来更新其权重。
- en: Build the Input Pipeline
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Build the pipeline with batch size of 32:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 使用32个批次的管道构建：
- en: '[PRE13]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Create a Custom Loop for Training
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建自定义训练循环
- en: Since the training loop is unusual, we can't use the regular fit method. Instead
    we create a custom loop that accepts a dataset to iterate through images. Training
    is unusual because it is not sequential. The discriminator is trained on real
    and fake images fed by the generator in phase 1\. The generator is trained on
    what the discriminator produces from what it learned in phase 2\. So there are
    feedback loops in the training process.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 由于训练循环不寻常，我们无法使用常规的fit方法。相反，我们创建一个自定义循环，该循环接受一个数据集以迭代图像。训练不寻常，因为它不是顺序的。在第一阶段，判别器在生成器提供的真实和伪造图像上进行训练。在第二阶段，生成器在判别器从其学习内容中产生的结果上进行训练。因此，在训练过程中存在反馈循环。
- en: Create a training loop function as shown in Listing [10-3](#PC15).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如列表[10-3](#PC15)所示的训练循环函数。
- en: '[PRE14]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Each training iteration is divided into two phases. The first phase trains the
    discriminator. A batch of real images is sampled from the training set, and an
    equal number of fake images is produced by the generator. Labels are set to 0
    for fake images and 1 for real images. The discriminator is trained on the labeled
    batch for one step using binary cross-entropy loss. Importantly, back-propagation
    only optimizes the weights of the discriminator during this phase. The second
    phase trains the generator. The generator produces another batch of fake images,
    and the discriminator distinguishes between fake and real images. No real images
    are added to the batch, and all labels are set to 1 to indicate they are real
    (though they are not real). The idea is that the generator produces images that
    the discriminator incorrectly believes are real! Crucially, weights of the discriminator
    are frozen during this step so back-propagation only affects the weights of the
    generator.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 每个训练迭代分为两个阶段。第一阶段训练判别器。从训练集中采样一批真实图像，生成器生成相同数量的假图像。标签设置为0表示假图像，1表示真实图像。判别器使用二元交叉熵损失在一个步骤上对标记的批次进行训练。重要的是，在这个阶段，反向传播只优化判别器的权重。第二阶段训练生成器。生成器生成另一批假图像，判别器区分假图像和真实图像。批中没有添加真实图像，所有标签都设置为1以表示它们是真实的（尽管它们不是真实的）。目的是让生成器生成判别器错误地认为是真实的图像！关键的是，在这个步骤中冻结判别器的权重，所以反向传播只影响生成器的权重。
- en: Technically speaking, phase 1 feeds Gaussian noise to the generator to produce
    fake images. Target *y1* is set to 0 for fake and 1 for real images. The discriminator
    is then trained on the batch. Phase 2 feeds the GAN some Gaussian noise. The generator
    starts by producing fake images. The discriminator then tries to guess if images
    are fake or real. The idea is to make the discriminator believe that the fake
    images are real, so target *y2* is set to 1.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术角度讲，第一阶段向生成器输入高斯噪声以生成假图像。目标*y1*设置为0表示假图像，1表示真实图像。然后，在批次上训练判别器。第二阶段向GAN输入一些高斯噪声。生成器首先生成假图像。然后判别器尝试猜测图像是真是假。目的是让判别器相信假图像是真的，因此目标*y2*设置为1。
- en: Humans can easily ignore noise, but ML algorithms struggle. Small, human-imperceptible
    pixel changes can dramatically alter a neural network's ability to make an accurate
    prediction. Research has shown that *noise* and *Gaussian blurring* show near-immediate
    smoothing on tested models. **Gaussian blurring** (also known as Gaussian smoothing)
    is the result of blurring an image by a Gaussian function. It is widely used in
    ML to reduce image noise and reduce detail.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 人类可以轻易忽略噪声，但机器学习算法却很困难。微小的、人类难以察觉的像素变化可以显著改变神经网络做出准确预测的能力。研究表明，*噪声*和*高斯模糊*在测试模型上显示出几乎立即的平滑效果。**高斯模糊**（也称为高斯平滑）是通过高斯函数模糊图像的结果。它在机器学习中广泛用于减少图像噪声和减少细节。
- en: For an excellent resource on adding noise, peruse
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 关于添加噪声的绝佳资源，请参阅
- en: '[`https://blog.roboflow.com/why-to-add-noise-to-images-for-machine-learning/`](https://blog.roboflow.com/why-to-add-noise-to-images-for-machine-learning/)'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '[为什么要在机器学习中向图像添加噪声](https://blog.roboflow.com/why-to-add-noise-to-images-for-machine-learning/)'
