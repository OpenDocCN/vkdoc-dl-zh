- en: Kubeflow Pipelines – Kubeflow for Poets
  id: totrans-236
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Kubeflow Pipelines – 诗人的 Kubeflow
- en: Kubeflow Pipelines is a simple platform for building and deploying containerized
    machine learning workflows on Kubernetes. Kubeflow pipelines make it easy to implement
    production-grade machine learning pipelines without bothering on the low-level
    details of managing a Kubernetes cluster.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: Kubeflow 流水线是一个简单的平台，用于在 Kubernetes 上构建和部署容器化的机器学习工作流程。Kubeflow 流水线使得实现生产级机器学习流水线变得容易，无需担心管理
    Kubernetes 集群的底层细节。
- en: Kubeflow Pipelines is a core component of Kubeflow and is also deployed when
    Kubeflow is deployed. The Pipelines dashboard is shown in Figure [46-6](#Fig6).
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: Kubeflow 流水线是 Kubeflow 的核心组件，当部署 Kubeflow 时也会部署。流水线仪表板如图 [46-6](#Fig6) 所示。
- en: '![../images/463852_1_En_46_Chapter/463852_1_En_46_Fig6_HTML.jpg](../images/463852_1_En_46_Chapter/463852_1_En_46_Fig6_HTML.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_46_Chapter/463852_1_En_46_Fig6_HTML.jpg](../images/463852_1_En_46_Chapter/463852_1_En_46_Fig6_HTML.jpg)'
- en: Figure 46-6
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 图 46-6
- en: Kubeflow Pipelines dashboard
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: Kubeflow 流水线仪表板
- en: Components of Kubeflow Pipelines
  id: totrans-242
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Kubeflow 流水线的组件
- en: A Pipeline describes a machine learning workflow, where each component of the
    pipeline is a self-contained set of codes that are packaged as Docker images.
    Each pipeline can be uploaded individually and shared on the Kubeflow Pipelines
    user interface (UI). A pipeline takes inputs (parameters) required to run the
    pipeline and the inputs and outputs of each component.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 流水线描述了一个机器学习工作流程，其中流水线的每个组件都是一个自包含的代码集合，这些代码被打包成 Docker 镜像。每个流水线都可以单独上传并在 Kubeflow
    流水线用户界面（UI）上共享。流水线需要输入（参数）来运行流水线以及每个组件的输入和输出。
- en: The Kubeflow Pipelines platform consists of
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: Kubeflow 流水线平台由以下部分组成
- en: A user interface (UI) for managing and tracking Experiments, jobs, and runs
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于管理和跟踪实验、作业和运行的用户界面（UI）
- en: An engine for scheduling multi-step ML workflows
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于调度多步骤机器学习工作流程的引擎
- en: An SDK for defining and manipulating pipelines and components
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于定义和操作流水线和组件的 SDK
- en: Notebooks for interacting with the system using the SDK (taken from [`www.kubeflow.org/docs/pipelines/pipelines-overview/`](http://www.kubeflow.org/docs/pipelines/pipelines-overview/)
    )
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 SDK 与系统交互的笔记本（摘自[`www.kubeflow.org/docs/pipelines/pipelines-overview/`](http://www.kubeflow.org/docs/pipelines/pipelines-overview/)）
