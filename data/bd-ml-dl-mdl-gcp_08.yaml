- en: Part VIIIProductionalizing Machine Learning Solutions on GCP
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第八部分：在GCP上生产化机器学习解决方案
- en: 45. Containers and Google Kubernetes Engine
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 45. 容器和Google Kubernetes Engine
- en: The microservice architecture is an approach for developing and deploying enterprise
    cloud-native software applications that involve separating the core business capabilities
    of the application into decoupled components. Each business capability represents
    some functionality that the application provides as services to the end user.
    The idea of microservices is in contrast to the monolithic architecture which
    involves building applications as a composite of its “individual” capabilities.
    See an illustration in Figure [45-1](#Fig1).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 微服务架构是一种开发和企业级云原生软件应用的方法，它涉及将应用程序的核心业务能力分解为解耦的组件。每个业务能力代表应用程序提供给最终用户的一些功能。微服务理念与单体架构相对立，单体架构涉及将应用程序构建为其“个体”能力的组合。请参见图[45-1](#Fig1)中的说明。
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig1_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig1_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig1_HTML.jpg)'
- en: Figure 45-1
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图45-1
- en: Microservice applications (right) vs. monolithic applications (left)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 微服务应用程序（右）与单体应用程序（左）的比较
- en: Microservices interact with each other using representational state transfer
    (REST) communications for stateless interoperability. By stateless, we mean that
    “the server does not store state about the client session.” These protocols can
    be HTTP request/response APIs or an asynchronous messaging queue. This flexibility
    allows the microservice to easily scale and respond to request even if another
    microservice fails.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 微服务通过表示状态转移（REST）通信进行交互，以实现无状态互操作性。这里的“无状态”意味着“服务器不存储客户端会话的状态。”这些协议可以是HTTP请求/响应API或异步消息队列。这种灵活性使得微服务可以轻松扩展并响应请求，即使另一个微服务失败。
- en: '**Advantages of Microservices**'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**微服务的优势**'
- en: Loosely coupled components make the application fault tolerant.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 松散耦合的组件使应用程序具有容错性。
- en: Ability to scale out making each component highly available.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够扩展，使每个组件都具有高度可用性。
- en: The modularity of components makes it easier to extend existing capabilities.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组件的模块化使得扩展现有功能变得更容易。
- en: '**Challenges with Microservices**'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**微服务的挑战**'
- en: The software architecture increases in complexity.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软件架构的复杂性在增加。
- en: Overhead in management and orchestration of microservices. We will, however,
    see in the next sessions how Docker and Kubernetes work to mitigate this challenge.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微服务管理和编排的开销。然而，在接下来的几节课中，我们将看到Docker和Kubernetes如何共同努力来减轻这一挑战。
- en: Docker
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Docker
- en: Docker is a virtualization application that abstracts applications into isolated
    environments known as containers. The idea behind a container is to provide a
    unified platform that includes the software tools and dependencies for developing
    and deploying an application.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Docker是一种虚拟化应用程序，它将应用程序抽象为称为容器的隔离环境。容器背后的理念是提供一个统一的平台，包括开发和应用部署所需的软件工具和依赖项。
- en: The traditional way of developing applications is where an application is designed
    and hosted on a single server. This is illustrated in Figure [45-2](#Fig2). This
    setup is prone to several problems including the famous “it works on my machine
    but not on yours”. Also in this architecture, apps are difficult to scale and
    to migrate resulting in huge costs and slow deployment.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的应用程序开发方式是将应用程序设计并托管在单个服务器上。这如图[45-2](#Fig2)所示。这种配置容易遇到几个问题，包括著名的“在我的机器上运行正常，但在你的机器上不正常”。此外，在这种架构中，应用程序难以扩展和迁移，导致成本高昂和部署缓慢。
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig2_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig2_HTML.jpg)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig2_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig2_HTML.jpg)'
- en: Figure 45-2
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图45-2
- en: Application running on a single server
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 单服务器上运行的应用程序
- en: Virtual Machines vs. Containers
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟机与容器
- en: Virtual machines (VMs), illustrated in Figure [45-3](#Fig3), emulate the capabilities
    of a physical machine making it possible to install and run operating systems
    by using a hypervisor. The hypervisor is a piece of software on the physical machine
    (the host) that makes it possible to carry out virtualization where multiple guest
    machines are managed by the host machine.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟机（VM），如图[45-3](#Fig3)所示，模拟了物理机的功能，使得可以通过使用虚拟化软件（即管理程序）安装和运行操作系统。管理程序是物理机（即主机）上的软件，它使得在主机机器管理多个客户机时能够实现虚拟化。
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig3_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig3_HTML.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig3_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig3_HTML.jpg)'
- en: Figure 45-3
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图 45-3
- en: Virtual machines
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟机
- en: Containers on the other hand isolate the environment for hosting an application
    with its own libraries and software dependencies; however, as opposed to a VM,
    containers on a machine all share the same operating system kernel. Docker is
    an example of a container. This is illustrated in Figure [45-4](#Fig4).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，容器为托管具有自己的库和软件依赖项的应用程序提供了隔离的环境；然而，与VM不同，机器上的所有容器都共享相同的操作系统内核。Docker是容器的一个例子。这如图
    [45-4](#Fig4) 所示。
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig4_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig4_HTML.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig4_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig4_HTML.jpg)'
- en: Figure 45-4
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 45-4
- en: Containers
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 容器
- en: Working with Docker
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Docker
- en: Google Cloud Shell comes pre-configured with Docker.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: Google Cloud Shell 默认配置了Docker。
- en: Key concepts to note are
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的关键概念是
- en: 'Dockerfile: A Dockerfile is a text file that specifies how an image will be
    created.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Dockerfile：Dockerfile是一个文本文件，它指定了如何创建镜像。
- en: 'Docker images: Images are created by building a Dockerfile.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Docker镜像：镜像是通过构建Dockerfile创建的。
- en: 'Docker containers: Docker containers are the running instance of an image.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Docker容器：Docker容器是镜像的运行实例。
- en: The diagram in Figure [45-5](#Fig5) highlights the process to build an image
    and run a Docker container.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [45-5](#Fig5) 强调了构建镜像和运行Docker容器的过程。
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig5_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig5_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig5_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig5_HTML.jpg)'
- en: Figure 45-5
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图 45-5
- en: Steps to deploying a Docker container
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 部署Docker容器的步骤
- en: Table [45-1](#Tab1) shows key commands when creating a Dockerfile.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [45-1](#Tab1) 展示了创建Dockerfile时的关键命令。
- en: Table 45-1
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 表 45-1
- en: Commands for Creating Dockerfiles
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 创建Dockerfile的命令
- en: '| Command | Description |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 命令 | 描述 |'
- en: '| --- | --- |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| **FROM** | The base Docker image for the Dockerfile. |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| **FROM** | Dockerfile的基Docker镜像。|'
- en: '| **LABEL** | Key-value pair for specifying image metadata. |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| **LABEL** | 用于指定镜像元数据的键值对。|'
- en: '| **RUN** | It executes commands on top of the current image as new layers.
    |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| **RUN** | 它在当前镜像之上执行命令作为新层。|'
- en: '| **COPY** | Copies files from the local machine to the container file system.
    |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| **COPY** | 从本地机器复制文件到容器文件系统。|'
- en: '| **EXPOSE** | Exposes runtime ports for the Docker container. |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| **EXPOSE** | 对Docker容器公开运行时端口。|'
- en: '| **CMD** | Specifies the command to execute when running the container. This
    command is overridden if another command is specified at runtime. |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| **CMD** | 指定在运行容器时执行的命令。如果运行时指定了另一个命令，则此命令将被覆盖。|'
- en: '| **ENTRYPOINT** | Specifies the command to execute when running the container.
    Entrypoint commands are not overridden by a command specified at runtime. |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| **ENTRYPOINT** | 指定在运行容器时执行的命令。Entrypoint命令不会被在运行时指定的命令覆盖。|'
- en: '| **WORKDIR** | Set working directory of the container. |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| **WORKDIR** | 设置容器的当前工作目录。|'
- en: '| **VOLUME** | Mount a volume from the local machine file system to the Docker
    container. |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| **VOLUME** | 从本地机器文件系统挂载卷到Docker容器。|'
- en: '| **ARG** | Set Environment variable as a key-value pair when building the
    image. |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| **ARG** | 在构建镜像时设置环境变量作为键值对。|'
- en: '| **ENV** | Set Environment variable as a key-value pair that will be available
    in the container after building. |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| **ENV** | 设置环境变量作为键值对，该键值对将在构建后可用于容器。|'
- en: Build and Run a Simple Docker Container
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建和运行简单的Docker容器
- en: Clone the book repository to run this example in Cloud Shell; we have a bash
    script titled **date-script.sh** in the chapter folder. The script assigns the
    current date to a variable and then prints out the date to the console. The Dockerfile
    will copy the script from the local machine to the docker container file system
    and execute the shell script when running the container. The Dockerfile to build
    the container is stored in **docker-intro/hello-world**.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 将本书的仓库克隆到Cloud Shell中以运行此示例；我们在章节文件夹中有一个名为**date-script.sh**的bash脚本。该脚本将当前日期赋值给一个变量，然后将其打印到控制台。Dockerfile会将脚本从本地机器复制到docker容器文件系统，并在运行容器时执行shell脚本。用于构建容器的Dockerfile存储在**docker-intro/hello-world**。
- en: '[PRE0]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s view the bash script.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们查看bash脚本。
- en: '[PRE1]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Let’s view the Dockerfile.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们查看Dockerfile。
- en: '[PRE2]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The Docker image will be built off the Alpine Linux package . See [`https://hub.docker.com/_/alpine`](https://hub.docker.com/_/alpine)
    . The `CMD` routine executes the script when the container runs.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: Docker镜像将基于Alpine Linux包构建。请参阅[https://hub.docker.com/_/alpine](https://hub.docker.com/_/alpine)。`CMD`例程在容器运行时执行脚本。
- en: Build the Image
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建镜像
- en: Run the following command to build the Docker image.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 运行以下命令来构建Docker镜像。
- en: '[PRE3]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Build output
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 构建输出
- en: '[PRE4]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Run the Container
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行容器
- en: Execute the following command to run the Docker container.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 执行以下命令以运行Docker容器。
- en: '[PRE5]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Important Docker Commands
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重要的Docker命令
- en: In this section, let’s review some important Docker commands.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，让我们回顾一些重要的Docker命令。
- en: Commands for Managing Images
  id: totrans-73
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 管理镜像的命令
- en: Table [45-2](#Tab2) contains commands for managing Docker images.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 表[45-2](#Tab2) 包含管理Docker镜像的命令。
- en: Table 45-2
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 表45-2
- en: Docker Commands for Managing Images
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: Docker管理镜像的命令
- en: '| Command | Description |'
  id: totrans-77
  prefs: []
  type: TYPE_TB
  zh: '| 命令 | 描述 |'
- en: '| --- | --- |'
  id: totrans-78
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| `docker images` | List all images on the machine. |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '| `docker images` | 列出机器上的所有镜像。 |'
- en: '| `docker rmi [IMAGE_NAME]` | Remove the image with name `IMAGE_NAME` on the
    machine. |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| `docker rmi [IMAGE_NAME]` | 从机器上删除名为 `IMAGE_NAME` 的镜像。 |'
- en: '| `docker rmi $(docker images -q)` | Remove all images from the machine. |'
  id: totrans-81
  prefs: []
  type: TYPE_TB
  zh: '| `docker rmi $(docker images -q)` | 从机器上删除所有镜像。 |'
- en: Commands for Managing Containers
  id: totrans-82
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 管理容器的命令
- en: Table [45-3](#Tab3) contains commands for managing Docker containers.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 表[45-3](#Tab3) 包含管理Docker容器的命令。
- en: Table 45-3
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 表45-3
- en: Docker Commands for Managing Containers
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: Docker管理容器的命令
- en: '| Command | Description |'
  id: totrans-86
  prefs: []
  type: TYPE_TB
  zh: '| 命令 | 描述 |'
- en: '| --- | --- |'
  id: totrans-87
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| `docker ps` | List all containers. Append `–a` to also list containers not
    running. |'
  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| `docker ps` | 列出所有容器。追加 `–a` 也可以列出未运行的容器。 |'
- en: '| `docker stop [CONTAINER_ID]` | Gracefully stop the container with `[CONTAINER_ID]`
    on the machine. |'
  id: totrans-89
  prefs: []
  type: TYPE_TB
  zh: '| `docker stop [CONTAINER_ID]` | 在机器上优雅地停止具有 `[CONTAINER_ID]` 的容器。 |'
- en: '| `docker kill CONTAINER_ID]` | Forcefully stop the container with `[CONTAINER_ID]`
    on the machine. |'
  id: totrans-90
  prefs: []
  type: TYPE_TB
  zh: '| `docker kill CONTAINER_ID` | 在机器上强制停止具有 `[CONTAINER_ID]` 的容器。 |'
- en: '| `docker rm [CONTAINER_ID]` | Remove the container with `[CONTAINER_ID`] from
    the machine. |'
  id: totrans-91
  prefs: []
  type: TYPE_TB
  zh: '| `docker rm [CONTAINER_ID]` | 从机器上删除具有 `[CONTAINER_ID]` 的容器。 |'
- en: '| `docker rm $(docker ps -a -q)` | Remove all containers from the machine.
    |'
  id: totrans-92
  prefs: []
  type: TYPE_TB
  zh: '| `docker rm $(docker ps -a -q)` | 从机器上删除所有容器。 |'
- en: Running a Docker Container
  id: totrans-93
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 运行Docker容器
- en: 'Let’s break down the following command for running a Docker container:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解以下运行Docker容器的命令：
- en: '[PRE6]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: where
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: '`-d` runs the container in detached mode. This mode runs the container in the
    background.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`-d` 以分离模式运行容器。此模式在后台运行容器。'
- en: '`-it` runs in interactive mode, with a terminal session attached.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`-it` 以交互模式运行，并附加一个终端会话。'
- en: '`--rm` removes the container when it exits.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`--rm` 在容器退出时删除容器。'
- en: '`--name` specifies a name for the container.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`--name` 为容器指定一个名称。'
- en: '`-p` does port forwarding from host to the container (i.e., host:container)
    .'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`-p` 从主机到容器进行端口转发（即，主机:容器）。'
- en: Kubernetes
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Kubernetes
- en: When a microservice application is deployed in production, it usually has many
    running containers that need to be allocated the right amount of resources in
    response to user demands. Also, there is a need to ensure that the containers
    are online, are running, and are communicating with one another. The need to efficiently
    manage and coordinate clusters of containerized applications gave rise to Kubernetes.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 当微服务应用程序在生产中部署时，它通常有许多正在运行的容器，需要根据用户需求分配正确的资源量。此外，还需要确保容器在线、正在运行并且相互通信。高效管理和协调容器化应用程序集群的需求催生了Kubernetes。
- en: Kubernetes is a software system that addresses the concerns of deploying, scaling,
    and monitoring containers. Hence, it is called a container orchestrator. Examples
    of other container orchestrators in the wild are Docker Swarm, Mesos Marathon,
    and HashiCorp Nomad.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: Kubernetes是一个软件系统，它解决了部署、扩展和监控容器的问题。因此，它被称为容器编排器。野外的其他容器编排器示例包括Docker Swarm、Mesos
    Marathon和HashiCorp Nomad。
- en: Kubernetes was built and released by Google as an open source software, which
    is now managed by the Cloud Native Computing Foundation (CNCF) . Google Cloud
    Platform offers a managed Kubernetes service called Google Kubernetes Engine (GKE).
    Amazon Elastic Container Service for Kubernetes (EKS) also provides a managed
    Kubernetes service.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: Kubernetes是由谷歌开发和发布的开源软件，现在由云原生计算基金会（CNCF）管理。谷歌云平台提供了一个名为谷歌容器引擎（GKE）的托管Kubernetes服务。亚马逊弹性容器服务（EKS）也提供了一个托管的Kubernetes服务。
- en: Features of Kubernetes
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Kubernetes的功能
- en: 'The following are some features of Kubernetes:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些Kubernetes的特性：
- en: '`Horizontal auto-scaling:` Dynamically scales containers based on resource
    demands'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`水平自动扩展:` 根据资源需求动态扩展容器'
- en: '`Self-healing:` Re-provisions failed nodes in response to health checks'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`自我修复:` 响应健康检查重新部署失败的节点'
- en: '`Load balancing:` Efficiently distributes requests between containers in a
    pod'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`负载均衡:` 在Pod中的容器之间高效地分配请求'
- en: '`Rollbacks and updates:` Easily update or revert to a previous container deployment
    without causing application downtime'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`回滚和更新:` 无需停机即可轻松更新或回滚到以前的容器部署'
- en: '`DNS service discovery:` Uses Domain Name System (DNS) to manage container
    groups as a Kubernetes service'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`DNS服务发现:` 使用域名系统（DNS）将容器组作为Kubernetes服务管理'
- en: Components of Kubernetes
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Kubernetes的组件
- en: The main components of the Kubernetes engine are
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Kubernetes引擎的主要组件包括
- en: '`Master node(s):` Manages the Kubernetes cluster. There may be more than one
    master node in high availability mode for fault-tolerance purposes. In this case,
    only one is the master, and the others follow.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`主节点(s):` 管理Kubernetes集群。在高可用性模式下可能有多个主节点以实现容错。在这种情况下，只有一个主节点，其他节点跟随。'
- en: '`Worker node(s):` Machine(s) that runs containerized applications that are
    scheduled as pod(s).'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`工作节点(s):` 运行作为Pod(s)调度的容器化应用的机器。'
- en: The illustration in Figure [45-6](#Fig6) provides an overview of the Kubernetes
    architecture.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图[45-6](#Fig6)展示了Kubernetes架构的概述。
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig6_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig6_HTML.jpg)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig6_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig6_HTML.jpg)'
- en: Figure 45-6
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图45-6
- en: High-level overview of Kubernetes components
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: Kubernetes组件的高级概述
- en: Master Node(s)
  id: totrans-121
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 主节点(s)
- en: The master node consists of
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 主节点由以下组成
- en: '**etcd (distributed key-store):** It manages the Kubernetes cluster state.
    This distributed key-store can be a part of the master node or external to it.
    Nevertheless, all master nodes connect to it.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**etcd (分布式键存储):** 它管理Kubernetes集群状态。这个分布式键存储可以是主节点的一部分，也可以是外部。然而，所有主节点都连接到它。'
- en: '**api server:** It manages all administrative tasks. The `api server` receives
    commands from the user (`kubectl` cli, REST or GUI); these commands are executed
    and the new cluster state is stored in the distributed key-store.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**API服务器:** 管理所有管理任务。`API服务器`从用户（`kubectl` cli、REST或GUI）接收命令；这些命令被执行，新的集群状态存储在分布式键存储中。'
- en: '**scheduler:** It schedules work to worker nodes by allocating pods. It is
    responsible for resource allocation.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**调度器:** 通过分配Pod来调度工作到工作节点。它负责资源分配。'
- en: '**controller:** It ensures that the desired state of the Kubernetes cluster
    is maintained. The desired state is what is contained in a JSON or YAML deployment
    file.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**控制器:** 确保Kubernetes集群的期望状态得到维护。期望状态包含在JSON或YAML部署文件中。'
- en: Worker Node(s)
  id: totrans-127
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 工作节点(s)
- en: The worker node(s) consists of
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 工作节点(s)由以下组成
- en: '**kubelet:** The `kubelet` agent runs on each worker node. It connects the
    worker node to the `api server` on the master node and receives instructions from
    it. It ensures the pods on the node are healthy.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**kubelet:** `kubelet`代理在每个工作节点上运行。它将工作节点连接到主节点上的`api server`，并从中接收指令。它确保节点上的Pod保持健康。'
- en: '**kube-proxy:** It is the Kubernetes network proxy that runs on each worker
    node. It listens to the `api server` and forwards requests to the appropriate
    pod. It is important for load balancing.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**kube-proxy:** 它是运行在每个工作节点上的Kubernetes网络代理。它监听`API服务器`并将请求转发到适当的Pod。对于负载均衡非常重要。'
- en: '**pod(s):** It consists of one or more containers that share network and storage
    resources as well as container runtime instructions. Pods are the smallest deployable
    unit in Kubernetes.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Pod(s):** 它由一个或多个容器组成，这些容器共享网络和存储资源以及容器运行时指令。Pod是Kubernetes中最小的可部署单元。'
- en: Writing a Kubernetes Deployment File
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编写Kubernetes部署文件
- en: The Kubernetes deployment file defines the desired state for the various Kubernetes
    objects. Examples of Kubernetes objects are
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: Kubernetes部署文件定义了各种Kubernetes对象所需的状态。Kubernetes对象的示例包括
- en: '**Pods:** It is a collection of one or more containers.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Pods:** 它是一组一个或多个容器。'
- en: '**ReplicaSets:** It is part of the controller in the master node. It specifies
    the number of replicas of a pod that should be running at any given time. It ensures
    that the specified number of pods is maintained in the cluster.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ReplicaSets:** 它是主节点控制器的一部分。它指定在任何给定时间应该运行的Pod副本数。它确保在集群中保持指定数量的Pod。'
- en: '**Deployments:** It automatically creates `ReplicaSets`. It is also part of
    the `controller` in the master node. It ensures that the cluster’s current state
    matches the desired state.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部署（Deployments）**：它自动创建 `ReplicaSets`。它也是主节点中的 `controller` 的一部分。它确保集群的当前状态与期望状态相匹配。'
- en: '**Namespaces:** It partitions the cluster into sub-clusters to organize users
    into groups.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**命名空间（Namespaces）**：它将集群划分为子集群，以将用户组织到组中。'
- en: '**Service:** It is a logical group of pods with a policy to access them.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务（Service）**：它是一个逻辑组，包含一组具有访问策略的 pod。'
- en: '*ServiceTypes:* It specifies the type of service, for example, ClusterIP, NodePort,
    LoadBalancer, and ExternalName. As an example, LoadBalancer exposes the service
    externally using a cloud provider’s load balancer.'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*服务类型（ServiceTypes）*：它指定了服务的类型，例如，ClusterIP、NodePort、LoadBalancer 和 ExternalName。例如，LoadBalancer
    使用云提供商的负载均衡器公开服务。'
- en: Other important tags in writing a Kubernetes deployment file
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 编写 Kubernetes 部署文件时的其他重要标签
- en: '**spec:** It describes the desired state of the cluster'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规范（spec）**：它描述了集群的期望状态。'
- en: '**metadata:** It contains information of the object'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**元数据（metadata）**：它包含对象的信息。'
- en: '**labels:** It is used to specify attributes of objects as key-value pairs'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标签（labels）**：它用于以键值对的形式指定对象属性。'
- en: '**selector:** It is used to select a subset of objects based on their label
    values'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择器（selector）**：它用于根据对象的标签值选择对象的一个子集。'
- en: The deployment file is specified as a yaml file.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 部署文件指定为 yaml 文件。
- en: Deploying Kubernetes on Google Kubernetes Engine
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 Google Kubernetes Engine 上部署 Kubernetes
- en: Google Kubernetes engine (GKE) provides a managed environment for deploying
    application containers. To create and deploy resources on GCP from the local shell,
    the Google command-line SDK gcloud will have to be installed and configured. If
    this is not the case on your machine, follow the instructions at [`https://cloud.google.com/sdk/gcloud/`](https://cloud.google.com/sdk/gcloud/)
    . Otherwise, a simpler option is to use the Google Cloud Shell which already has
    gcloud and kubectl (the Kubernetes command-line interface) installed.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: Google Kubernetes Engine (GKE) 为部署应用程序容器提供了一个托管环境。要从本地 shell 在 GCP 上创建和部署资源，必须安装和配置
    Google 命令行 SDK gcloud。如果您的机器上没有这样做，请按照 `https://cloud.google.com/sdk/gcloud/`
    上的说明操作。否则，一个更简单的选项是使用已经安装了 gcloud 和 kubectl（Kubernetes 命令行界面）的 Google Cloud Shell。
- en: Creating a GKE Cluster
  id: totrans-148
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建 GKE 集群
- en: Run the following command to create a cluster of containers on GKE. Assign the
    cluster name.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 运行以下命令以在 GKE 上创建一个容器集群。指定集群名称。
- en: '[PRE7]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: A Kubernetes cluster is created on GCP with three nodes (as default). The GKE
    dashboard on GCP is shown in Figure [45-7](#Fig7).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在 GCP 上创建了一个具有三个节点（默认）的 Kubernetes 集群。GCP 上的 GKE 仪表板如图 [45-7](#Fig7) 所示。
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig7_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig7_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig7_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig7_HTML.jpg)'
- en: Figure 45-7
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图 45-7
- en: Google Kubernetes Engine dashboard
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: Google Kubernetes Engine 仪表板
- en: '[PRE8]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: To learn more about creating clusters with Google Kubernetes Engine, visit [`https://cloud.google.com/kubernetes-engine/docs/how-to/creating-a-cluster`](https://cloud.google.com/kubernetes-engine/docs/how-to/creating-a-cluster)
    .
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多关于使用 Google Kubernetes Engine 创建集群的信息，请访问 `https://cloud.google.com/kubernetes-engine/docs/how-to/creating-a-cluster`。
- en: Run the following command to display the nodes of the provisioned cluster on
    GKE.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 运行以下命令以显示 GKE 上已配置集群的节点。
- en: '[PRE9]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Delete the Kubernetes Cluster on GKE
  id: totrans-159
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 删除 GKE 上的 Kubernetes 集群
- en: Run the following command to delete a cluster on GKE.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 运行以下命令以在 GKE 上删除一个集群。
- en: '[PRE10]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Note
  id: totrans-162
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Always remember to clean up cloud resources when they are no longer needed.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 总是记得在不再需要时清理云资源。
- en: This chapter introduced the concepts of a microservice architecture and provided
    an overview of working with Docker containers for building applications in isolated
    environments/sandboxes. In the event that many of such containers are deployed
    in production, this chapter introduces Kubernetes as a container orchestrator
    for managing the concerns of deploying, scaling, and monitoring containers.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了微服务架构的概念，并概述了在隔离环境/沙盒中构建应用程序时使用 Docker 容器的工作方式。如果在生产中部署了许多这样的容器，本章介绍了 Kubernetes
    作为容器编排器，用于管理部署、扩展和监控容器的相关问题。
- en: The next chapter will discuss on Kubeflow and Kubeflow Pipelines for deploying
    machine learning components into production on Kubernetes.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 下一章将讨论如何在 Kubernetes 上部署机器学习组件到生产环境中的 Kubeflow 和 Kubeflow Pipelines。
- en: 46. Kubeflow and Kubeflow Pipelines
  id: totrans-166
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 46. Kubeflow 和 Kubeflow Pipelines
- en: Machine learning is often and rightly viewed as the use of mathematical algorithms
    to teach the computer to learn tasks that are computationally infeasible to program
    as a set of specified instructions. However, it turns out that these algorithms
    constitute only a small fraction of the overall learning pipeline from an engineering
    perspective. Building high-performant and dynamic learning models includes a number
    of other critical components. These components actually dominate the space of
    concerns for delivering an end-to-end machine learning product.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习通常且正确地被视为使用数学算法教会计算机学习那些作为一组指定指令难以编程的任务。然而，从工程角度来看，这些算法仅占整体学习流程的一小部分。构建高性能和动态的学习模型包括许多其他关键组件。这些组件实际上主导了交付端到端机器学习产品的关注点空间。
- en: A typical machine learning production pipeline looks like the illustration in
    Figure [46-1](#Fig1).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的机器学习生产流程看起来就像图 [46-1](#Fig1) 中的插图。
- en: '![../images/463852_1_En_46_Chapter/463852_1_En_46_Fig1_HTML.jpg](../images/463852_1_En_46_Chapter/463852_1_En_46_Fig1_HTML.jpg)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_46_Chapter/463852_1_En_46_Fig1_HTML.jpg](../images/463852_1_En_46_Chapter/463852_1_En_46_Fig1_HTML.jpg)'
- en: Figure 46-1
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 图 46-1
- en: Machine learning production pipeline
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习生产流程
- en: From the preceding diagram, observe that the process flow in the pipeline is
    iterative. This repetitive pattern is central to machine learning experimentation,
    design, and deployment.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 从前面的图中可以看出，管道中的流程是迭代的。这种重复的模式是机器学习实验、设计和部署的核心。
- en: The Efficiency Challenge
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 效率挑战
- en: It is easy to recognize that the pipeline requires a significant amount of development
    operations for the seamless transition from one component to another when building
    a learning model. This interoperability of parts has given rise to Machine Learning
    Ops, also known as MLOps. The term is coined as an amalgam of Machine Learning
    and DevOps.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 容易认识到，在构建学习模型时，管道需要大量的开发操作，以便在组件之间实现无缝过渡。这种部件的互操作性催生了机器学习运维，也称为 MLOps。该术语是机器学习和
    DevOps 的结合体。
- en: The conventional way of doing machine learning is to perform all of the Experiment
    and development work in Jupyter notebooks, and the model is exported and sent
    off to the software development team for deployment and endpoint generation for
    integration into downstream software products, while the DevOps team handles the
    infrastructure and configuration of the machine for model development. This monolithic
    style of working results in a machine learning process that is not reusable, difficult
    to scale and maintain, and even tougher to audit and perform model improvement,
    and it is easily fraught with errors and unnecessary complexities.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，机器学习的方法是在 Jupyter 笔记本中执行所有实验和开发工作，然后将模型导出并发送给软件开发团队进行部署和端点生成，以便集成到下游软件产品中，而
    DevOps 团队则负责模型开发的基础设施和配置。这种单体式的工作方式导致机器学习过程不可重用，难以扩展和维护，甚至更难以审计和进行模型改进，并且容易充满错误和不必要的复杂性。
- en: However, by incorporating the microservice design pattern to machine learning
    development, we can address a host of these concerns and really streamline the
    productionalization process.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，通过将微服务设计模式融入机器学习开发中，我们可以解决这些众多问题，并真正简化生产过程。
- en: Kubeflow
  id: totrans-177
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Kubeflow
- en: Kubeflow is a platform that is created to enhance and simplify the process of
    deploying machine learning workflows on Kubernetes. Using Kubeflow, it becomes
    easier to manage a distributed machine learning deployment by placing components
    in the deployment pipeline such as the training, serving, monitoring, and logging
    components into containers on the Kubernetes cluster.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: Kubeflow 是一个旨在增强和简化在 Kubernetes 上部署机器学习工作流程的平台。使用 Kubeflow，通过将训练、服务、监控和日志组件等组件放置在
    Kubernetes 集群上的容器中，可以更容易地管理分布式机器学习部署。
- en: The goal of Kubeflow is to abstract away the technicalities of managing a Kubernetes
    cluster so that a machine learning practitioner can quickly leverage the power
    of Kubernetes and the benefits of deploying products within a microservice framework.
    Kubeflow has its history as an internal Google framework for implementing machine
    learning pipelines on Kubernetes before being open sourced late 2017.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: Kubeflow 的目标是抽象化管理 Kubernetes 集群的复杂性，以便机器学习从业者可以快速利用 Kubernetes 的强大功能和在微服务框架中部署产品的优势。Kubeflow
    最初是作为 Google 内部用于在 Kubernetes 上实现机器学习管道的框架，于 2017 年晚些时候开源。
