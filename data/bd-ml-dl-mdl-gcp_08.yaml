  type: TYPE_IMG
  zh: '![../images/463852_1_En_47_Chapter/463852_1_En_47_Fig2_HTML.jpg](../images/463852_1_En_47_Chapter/463852_1_En_47_Fig2_HTML.jpg)'
- en: Figure 47-2
  id: totrans-312
  prefs:
