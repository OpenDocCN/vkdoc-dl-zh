- en: This chapter covered setting up Kubeflow on Kubernetes and introduced working
    with Kubeflow Pipelines to manage containerized machine learning workflows. The
    next chapter will deploy an end-to-end machine learning solution with Kubeflow
    Pipelines.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了在Kubernetes上设置Kubeflow以及介绍使用Kubeflow Pipelines管理容器化机器学习工作流程。下一章将使用Kubeflow
    Pipelines部署端到端机器学习解决方案。
- en: 47. Deploying an End-to-End Machine Learning Solution on Kubeflow Pipelines
  id: totrans-273
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 47. 在Kubeflow Pipelines上部署端到端机器学习解决方案
- en: A Kubeflow pipeline component is an implementation of a pipeline task. A component
    is a step in the workflow. Each task takes one or more artifacts as input and
    may produce one or more artifacts as output.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: Kubeflow管道组件是管道任务的实现。组件是工作流程中的一步。每个任务接受一个或多个工件作为输入，并可能产生一个或多个工件作为输出。
- en: 'Each component usually includes two parts:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 每个组件通常包括两个部分：
- en: 'Client code: The code that talks to endpoints to submit jobs, for example,
    code to connect with the Google Cloud Machine Learning Engine.'
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户端代码：与端点通信以提交作业的代码，例如，与Google Cloud Machine Learning Engine连接的代码。
- en: 'Runtime code: The code that does the actual job and usually runs in the cluster,
    for example, the code that prepares the model for training on Cloud MLE.'
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行时代码：执行实际工作的代码，通常在集群中运行，例如，为在Cloud MLE上训练准备模型的代码。
- en: A component consists of an interface (inputs/outputs), the implementation (a
    Docker container image and command-line arguments), and metadata (name, description).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 一个组件由一个接口（输入/输出）、实现（一个Docker容器镜像和命令行参数）以及元数据（名称、描述）组成。
- en: Overview of a Simple End-to-End Solution Pipeline
  id: totrans-279
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单端到端解决方案管道概述
- en: In this simple example, we will implement a deep neural regressor network to
    predict the closing prices of Bitcoin crypto-currency. The machine learning code
    itself is pretty basic as it is not the focus of this article. The goal here is
    to orchestrate a machine learning engineering solution using microservice architectures
    on Kubernetes with Kubeflow Pipelines. The code for this chapter is in the book
    code repository. Clone the repository from the GCP Cloud Shell.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个简单的示例中，我们将实现一个深度神经网络回归器来预测比特币加密货币的收盘价。机器学习代码本身相当基础，因为这不是本文的重点。这里的目的是使用Kubeflow
    Pipelines在Kubernetes上通过微服务架构编排机器学习工程解决方案。本章的代码在书中的代码仓库中。从GCP Cloud Shell克隆仓库。
- en: 'The pipeline consists of the following components:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 管道由以下组件组成：
- en: Move raw data hosted on GitHub to a storage bucket.
  id: totrans-282
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将托管在GitHub上的原始数据移动到存储桶中。
- en: Transform the dataset using Google Dataflow.
  id: totrans-283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用Google Dataflow转换数据集。
- en: Carry out hyper-parameter training on Cloud Machine Learning Engine.
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Cloud Machine Learning Engine上执行超参数训练。
- en: Train the model with the optimized hyper-parameters.
  id: totrans-285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用优化超参数训练模型。
- en: Deploy the model for serving on Cloud MLE.
  id: totrans-286
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Cloud MLE上部署模型以进行服务。
- en: Create a Container Image for Each Component
  id: totrans-287
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为每个组件创建容器镜像
- en: 'First, we’ll package the client and runtime code into a Docker image. This
    image also contains the secure service account key to authenticate against GCP.
    For example, the component to transform the dataset using Dataflow has the following
    files built into its image:'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将客户端和运行时代码打包成一个Docker镜像。此镜像还包含用于对GCP进行身份验证的安全服务账户密钥。例如，使用Dataflow转换数据集的组件在其镜像中包含以下文件：
- en: '`__ Dockerfile`: Dockerfile to build the Docker image.'
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__ Dockerfile`：用于构建Docker镜像的Dockerfile。'
- en: '`__ build.sh`: Script to initiate the container build and upload to Google
    Container Registry.'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__ build.sh`：用于启动容器构建并将其上传到Google Container Registry的脚本。'
- en: '`__ dataflow_transform.py`: Code to run the beam pipeline on Cloud Dataflow.'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__ dataflow_transform.py`：在Cloud Dataflow上运行beam管道的代码。'
- en: '`__ service_account.json`: Secure key to authenticate container on GCP.'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__ service_account.json`：用于在GCP上对容器进行身份验证的安全密钥。'
- en: '`__ local_test.sh`: Script to run the image pipeline component locally.'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__ local_test.sh`：用于在本地运行镜像管道组件的脚本。'
- en: Build Containers Before Uploading to Kubeflow Pipelines
  id: totrans-294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在上传到Kubeflow Pipelines之前构建容器
- en: Before uploading the pipeline to Kubeflow Pipelines, be sure to build the component
    containers so that the latest version of the code is packaged and uploaded as
    images to the container registry. The code provides a handy `bash` script to build
    all containers.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 在将管道上传到Kubeflow Pipelines之前，请确保构建组件容器，以便将最新版本的代码打包并作为镜像上传到容器注册库。代码提供了一个方便的`bash`脚本来构建所有容器。
- en: Compile the Pipeline Using the Kubeflow Pipelines DSL Language
  id: totrans-296
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Kubeflow Pipelines DSL语言编译管道
- en: The pipeline code contains a specification on how the components interact with
    one another. Each component has an output that serves as an input to the next
    component in the pipeline. The Kubeflow pipeline DSL language `dsl-compile` from
    the Kubeflow Pipelines SDK is used to compile the pipeline code in Python for
    upload to Kubeflow Pipelines.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 管道代码包含组件之间如何相互作用的规范。每个组件都有一个输出，作为管道中下一个组件的输入。Kubeflow Pipelines SDK中的Kubeflow
    pipeline DSL语言`dsl-compile`用于将管道代码编译成Python代码，以便上传到Kubeflow Pipelines。
- en: Ensure the Kubeflow Pipelines SDK is installed on the local machine by running
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 通过运行来确保本地机器上安装了Kubeflow Pipelines SDK
- en: '[PRE15]'
  id: totrans-299
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Compile the pipeline by running
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 通过运行来编译管道
- en: '[PRE16]'
  id: totrans-301
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: For the sample code, we used
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 对于示例代码，我们使用了
- en: '[PRE17]'
  id: totrans-303
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Upload and Execute the Pipeline to Kubeflow Pipelines
  id: totrans-304
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将管道上传并执行到Kubeflow Pipelines
- en: 'The following steps upload and execute the compiled pipeline on Kubeflow Pipelines:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤将上传并执行在Kubeflow Pipelines上编译的管道：
- en: Upload the pipeline to Kubeflow Pipelines (Figure [47-1](#Fig1)).
  id: totrans-306
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将管道上传到Kubeflow Pipelines（图[47-1](#Fig1)）。
- en: '![../images/463852_1_En_47_Chapter/463852_1_En_47_Fig1_HTML.jpg](../images/463852_1_En_47_Chapter/463852_1_En_47_Fig1_HTML.jpg)'
  id: totrans-307
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_47_Chapter/463852_1_En_47_Fig1_HTML.jpg](../images/463852_1_En_47_Chapter/463852_1_En_47_Fig1_HTML.jpg)'
- en: Figure 47-1
  id: totrans-308
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图47-1
- en: Upload the compiled pipeline to Kubeflow Pipelines
  id: totrans-309
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将编译后的管道上传到Kubeflow Pipelines
- en: Click the pipeline to see the static graph of the flow (Figure [47-2](#Fig2)).
  id: totrans-310
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击管道以查看流程的静态图（图[47-2](#Fig2)）。
- en: '![../images/463852_1_En_47_Chapter/463852_1_En_47_Fig2_HTML.jpg](../images/463852_1_En_47_Chapter/463852_1_En_47_Fig2_HTML.jpg)'
  id: totrans-311
  prefs:
