  type: TYPE_NORMAL
  zh: 管道摘要图
- en: Create an Experiment and run to execute the pipeline (Figure [47-3](#Fig3)).
  id: totrans-314
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建实验并运行以执行管道（图[47-3](#Fig3)）。
