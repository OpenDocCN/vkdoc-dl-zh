- en: '**Set up a Kubernetes cluster on GKE.**'
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在GKE上设置Kubernetes集群。**'
- en: '[PRE11]'
  id: totrans-206
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Create OAuth client ID to identify Cloud IAP:** Kubeflow uses Cloud Identity-Aware
    Proxy (Cloud IAP) to connect to Jupyter and other running web apps securely. Kubeflow
    uses email addresses for authentication. In this section, we’ll create an OAuth
    client ID which will be used to identify Cloud IAP when requesting access to a
    user’s email account:'
  id: totrans-207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建OAuth客户端ID以标识Cloud IAP：**Kubeflow使用Cloud Identity-Aware Proxy (Cloud IAP)安全地连接到Jupyter和其他运行中的Web应用程序。Kubeflow使用电子邮件地址进行身份验证。在本节中，我们将创建一个OAuth客户端ID，该ID将用于在请求访问用户的电子邮件账户时标识Cloud
    IAP：'
- en: Go to the [APIs &​ Services](https://console.cloud.google.com/apis/credentials)
    ➤ [Credentials](https://console.cloud.google.com/apis/credentials) page in GCP
    Console.
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往GCP控制台中的[APIs & Services](https://console.cloud.google.com/apis/credentials)
    ➤ [Credentials](https://console.cloud.google.com/apis/credentials)页面。
- en: Go to the OAuth consent screen (see Figure [46-2](#Fig2)).
  id: totrans-209
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往OAuth同意屏幕（见图[46-2](#Fig2)）。
- en: Assign an Application name, for example, My-Kubeflow-App.
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分配一个应用程序名称，例如，My-Kubeflow-App。
- en: For authorized domains, use [YOUR_PRODJECT_ID].cloud.goog.
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于授权域，使用[YOUR_PRODJECT_ID].cloud.goog。
- en: Go to the Credentials tab (see Figure [46-3](#Fig3)).
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往凭证选项卡（见图[46-3](#Fig3)）。
- en: Click Create credentials, and then click OAuth client ID.
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击创建凭证，然后点击OAuth客户端ID。
- en: Under Application type, select Web application.
  id: totrans-214
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在“应用程序类型”下，选择Web应用程序。
- en: Choose a **Name** to identify the OAuth client ID (see Figure [46-4](#Fig4)).
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个**名称**来标识OAuth客户端ID（见图[46-4](#Fig4)）。
- en: 'In the Authorized redirect URIs box, enter the following:'
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在“授权重定向URI”框中，输入以下内容：
- en: '`https://<deployment_name>.endpoints.<project>.cloud.goog/_gcp_gatekeeper/authenticate`'
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`https://<deployment_name>.endpoints.<project>.cloud.goog/_gcp_gatekeeper/authenticate`'
- en: <deployment_name> must be the name of the Kubeflow deployment.
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: <deployment_name>必须是Kubeflow部署的名称。
- en: <project> is the GCP project ID.
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: <project>是GCP项目ID。
- en: In this case, it will be
  id: totrans-220
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这种情况下，它将是
- en: '[`https://ekaba-kubeflow-app.endpoints.oceanic-sky-230504.cloud.goog/_gcp_gatekeeper/authenticate`](https://ekaba-kubeflow-app.endpoints.oceanic-sky-230504.cloud.goog/_gcp_gatekeeper/authenticate)'
  id: totrans-221
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[GCP端点认证](https://ekaba-kubeflow-app.endpoints.oceanic-sky-230504.cloud.goog/_gcp_gatekeeper/authenticate)'
- en: Take note of the client ID and client secret that appear in the OAuth client
    window. This is needed to enable Cloud IAP.
  id: totrans-222
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意OAuth客户端窗口中出现的客户端ID和客户端密钥。这需要启用Cloud IAP。
