  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 与客户17975相似的用户的示例输出。暴露了客户的15个最近邻居的数据。数据包括客户ID、Jaccard指数、交集和并集。
- en: Figure 10-7
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-7
- en: The output
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 输出
- en: Now let’s recommend the product based on similar users.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们根据相似用户推荐产品。
- en: '[PRE10]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This function gets the following information.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数获取以下信息。
- en: The top eight stock codes and product names bought by a particular customer
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 某个客户购买的前八个股票代码和产品名称
- en: Recommendations for the same customer and the number of times neighbors bought
    the same item
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同一客户的推荐和邻居购买相同商品的数量
- en: The following steps are followed to get to the desired.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤是为了达到预期的结果。
- en: Get the most similar customers for the given customer.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取给定客户的相似客户。
- en: Fetch all the items bought by the nearest neighbors and remove the items the
    target customer has already bought.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取最近邻居购买的所有商品，并移除目标客户已经购买的商品。
- en: From the filtered set of items, count the number of times each item is repeating
    within the shopping carts of nearest neighbors and then sort that list on the
    count of repetitions and return in descending order.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从过滤后的商品集中，统计每个商品在最近邻居的购物车中重复出现的次数，然后根据重复次数对列表进行排序，并按降序返回。
- en: Now, let’s try customer 17850.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们尝试客户17850。
- en: '[PRE11]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
