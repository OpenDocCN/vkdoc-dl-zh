- en: The output
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 输出
- en: Let’s upload the entities into the Neo4j database.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将实体上传到Neo4j数据库。
- en: To implement knowledge graphs in Neo4J, the DataFrame must be converted into
    a relational database. First, customers and stocks must be converted into entities
    (or nodes of a graph) to build a relationship between them.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 要在Neo4J中实现知识图谱，DataFrame必须转换为关系数据库。首先，客户和股票必须转换为实体（或图的节点），以在它们之间建立关系。
- en: '[PRE3]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Once the customer nodes are done, create nodes for the stock.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦完成客户节点，为股票创建节点。
- en: '[PRE4]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Next, create a link between the stock codes and title, which are needed to recommend
    items.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，创建一个链接，将股票代码和标题（推荐商品所需）关联起来。
- en: For this, let’s create another property key called 'Title' into the existing
    stock entity in our Neo4j database.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，让我们在我们的Neo4j数据库中现有的库存实体中创建另一个属性键，称为'Title'。
- en: '[PRE5]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Create a relationship between customers and stocks.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在客户和股票之间创建关系。
- en: Since all the transactions are in the dataset, the relation is already known
    and present. To convert it into an RDS, cipher queries must be run in Neo4j to
    build the relationship.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 由于所有交易都在数据集中，关系已经已知并存在。要将它转换为RDS，必须在Neo4j中运行加密查询来构建关系。
- en: '[PRE6]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Next, let’s find similarities between users using the relationship created.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们使用创建的关系来查找用户之间的相似性。
- en: The Jaccard similarity can be calculated as the ratio between the intersection
    and the union of two sets. It is a measure of similarity, and as it is a percentage
    value, it ranges between 0% to 100%. More similar sets have a higher value.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: Jaccard相似度可以计算为两个集合的交集与并集的比率。这是一个相似度的度量，作为一个百分比值，它介于0%到100%之间。更相似的集合具有更高的值。
- en: '[PRE7]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The following is a sample output.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个示例输出。
- en: '[PRE8]'
