- en: Summary
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter briefly covered knowledge graphs and how graph-based recommendation
    engines work. You saw an actual implementation of an end-to-end graph-based recommender
    system using Neo4j knowledge graphs. The concepts used are very new and advanced
    and have become popular recently. Big players like Netflix and Amazon are shifting
    to graph-based systems for their recommendations; hence, the approach is very
    relevant and must-know.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 本章简要介绍了知识图谱以及基于图推荐引擎的工作原理。您看到了一个使用Neo4j知识图谱的端到端图推荐系统的实际实现。所使用的一些概念非常新颖且先进，最近也变得流行起来。像Netflix和Amazon这样的行业巨头正在转向基于图的系统来进行他们的推荐；因此，这种方法非常相关且必须了解。
