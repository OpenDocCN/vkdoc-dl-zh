- en: 10. Graph-Based Recommender Systems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 基于图的推荐系统
- en: 'The previous chapter covered deep learning-based recommender systems and explained
    how to implement end-to-end neural collaborative filtering. This chapter explores
    another recent advanced method: graph-based recommendation systems powered by
    knowledge graphs.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 上一章介绍了基于深度学习的推荐系统，并解释了如何实现端到端的神经协同过滤。本章探讨了另一种最近的高级方法：由知识图谱驱动的基于图的推荐系统。
- en: Figure [10-1](#Fig1) illustrates a graph-based recommendation system for movie
    recommendations.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-1](#Fig1) 展示了一个基于图的用于电影推荐的推荐系统。
- en: '![](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig1_HTML.jpg)'
- en: A structural representation of a recommender system for movie recommendations.
    The structure of the network exhibits the relationship between the user and the
    items.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 一个用于电影推荐的推荐系统的结构表示。网络的架构展示了用户和项目之间的关系。
- en: Figure 10-1
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-1
- en: Graph-based movie recommendations
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 基于图的电影推荐
- en: In graph-based recommendation systems, knowledge graph structures represent
    relationships between users and items. A knowledge graph is the structure of a
    network of interconnected datasets, enriched with semantics, that is visualized
    graphically by illustrating the relationship between multiple entities. The graph
    structure, when visualized, has three primary components; nodes, edges, and labels.
    The edge of the link defines the relationship between two nodes/entities, where
    each node can be any object, user, item, place, and so forth. The underlying semantics
    provide an additional dynamic context to the defined relationships, enabling more
    complex decision-making.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于图的推荐系统中，知识图谱结构表示用户和项目之间的关系。知识图谱是一个由语义丰富、相互连接的数据集网络结构，通过展示多个实体之间的关系进行图形化表示。当图形化展示时，有三个主要组件：节点、边和标签。链接的边定义了两个节点/实体之间的关系，其中每个节点可以是任何对象、用户、项目、地点等。底层语义为定义的关系提供了额外的动态上下文，使得决策更加复杂。
- en: Figure [10-2](#Fig2) shows a simple one-to-one relationship in a knowledge graph
    structure.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-2](#Fig2) 展示了知识图谱结构中的一个简单一对一关系。
- en: '![](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig2_HTML.jpg)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig2_HTML.jpg)'
- en: A knowledge graph of the link between A, B, and C. A, B, and C represent the
    subject, predicate, and object respectively.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: A、B 和 C 之间的链接知识图谱。A、B 和 C 分别代表主题、谓词和宾语。
- en: Figure 10-2
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-2
- en: Simple knowledge graph connection
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 简单知识图谱连接
- en: Figure [10-3](#Fig3) explains knowledge graphs.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-3](#Fig3) 解释了知识图谱。
- en: '![](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig3_HTML.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig3_HTML.png)'
- en: A knowledge graph with deep dynamic context is obtained from the combination
    of data, graph, and semantics.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 通过数据、图和语义的结合，获得了一个具有深度动态上下文的知识图谱。
- en: Figure 10-3
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-3
- en: Knowledge graphs explained
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱解释
- en: This chapter uses Neo4j to implement the knowledge graphs. Neo4j is one of the
    best graph databases in the market today. It is a high-performance graph store
    with a user-friendly query language that is highly scalable and robust.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 本章使用 Neo4j 实现知识图谱。Neo4j 是目前市场上最好的图数据库之一。它是一个高性能的图存储，具有用户友好的查询语言，高度可扩展且稳健。
- en: The knowledge graphs will fetch similar users for the required recommendations.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱将检索所需推荐的相关用户。
- en: Implementation
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现
- en: The following installs and imports the required libraries.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码安装并导入所需的库。
- en: '[PRE0]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Before establishing the connection between Neo4j and the notebook, create a
    new sandbox in Neo4j at [`https://neo4j.com/sandbox/`](https://neo4j.com/sandbox/).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立 Neo4j 和笔记本之间的连接之前，请在 Neo4j 中创建一个新的沙盒，网址为[`https://neo4j.com/sandbox/`](https://neo4j.com/sandbox/)。
- en: Once the sandbox is created, you must change the URL and the password.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦创建了沙盒，您必须更改 URL 和密码。
- en: You can find them in the connection details, as shown in Figure [10-4](#Fig4).
  id: totrans-25
