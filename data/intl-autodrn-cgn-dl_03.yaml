- en: 3. Installing Linux and Development Tools
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 安装 Linux 和开发工具
- en: 'Before we start developing our rover, we have to install the right tools. Just
    like a carpenter needs a hammer to nail and a painter needs a paintbrush to paint,
    we need tools to support our project. Our rover will use the Robot Operating System
    (ROS), and ROS runs on Linux. Linux gives us a simple text editor and the Python
    programming language. We also need a simulator to test whether our rover works;
    thus, we will install ROS-aware Gazebo and Rviz. Finally, we assume most of our
    audience will be using the Windows operating system, so we will install all of
    these programs on a virtual machine using VirtualBox. In summary, we will review
    the following:'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始开发我们的漫游车之前，我们必须安装正确的工具。就像木匠需要锤子来钉钉子，画家需要画笔来画画一样，我们需要工具来支持我们的项目。我们的漫游车将使用机器人操作系统
    (ROS)，ROS 在 Linux 上运行。Linux 给我们一个简单的文本编辑器和 Python 编程语言。我们还需要一个模拟器来测试我们的漫游车是否工作；因此，我们将安装
    ROS-aware Gazebo 和 Rviz。最后，我们假设大多数观众将使用 Windows 操作系统，因此我们将使用 VirtualBox 在虚拟机上安装所有这些程序。总之，我们将回顾以下内容：
- en: Installing Oracle’s VirtualBox in Microsoft Windows
  id: totrans-2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 Microsoft Windows 中安装 Oracle 的 VirtualBox
- en: Installing Linux Ubuntu 20.04.4 in VirtualBox
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 VirtualBox 中安装 Linux Ubuntu 20.04.4
- en: Acquiring the ROS environment variable key
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取 ROS 环境变量密钥
- en: Installing ROS
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装 ROS
- en: Starting ROS for the very first time
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一次启动 ROS
- en: Learning important Linux ROS shell commands
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习重要的 Linux ROS 命令行
- en: Installing Anaconda
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装 Anaconda
- en: Learning Ubuntu Linux commands necessary to develop rover prototypes
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习开发漫游车原型所需的 Ubuntu Linux 命令
- en: What are ROS launch files?
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ROS 启动文件是什么？
- en: Running Gazebo and Rviz to test our system
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行 Gazebo 和 Rviz 以测试我们的系统
- en: Summary, exercises, and hints
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要、练习和提示
- en: Before We Begin
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在我们开始之前
- en: 'We must consider the following preconditions:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须考虑以下先决条件：
- en: If you are planning on using the Ubuntu Linux operating system as the host operating
    system, then there is no need to install VirtualBox.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您计划使用 Ubuntu Linux 操作系统作为主机操作系统，那么不需要安装 VirtualBox。
- en: Different versions of ROS target specific versions of Ubuntu Linux. We will
    use Noetic ROS, which specifically requires Ubuntu Linux 20.04.4\. Make sure you
    match the ROS version to the correct Linux version. This is important during “Installing
    VirtualBox …” and “Installing Ubuntu Linux …”
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ROS 的不同版本针对特定版本的 Ubuntu Linux。我们将使用 Noetic ROS，它特别需要 Ubuntu Linux 20.04.4。确保您将
    ROS 版本与正确的 Linux 版本匹配。这在“安装 VirtualBox ...”和“安装 Ubuntu Linux ...”期间非常重要。
- en: 'The ORDER of installation is important: VirtualBox, Ubuntu, Anaconda, ROS.
    Any other order may cause problems.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装顺序很重要：VirtualBox、Ubuntu、Anaconda、ROS。任何其他顺序可能会导致问题。
- en: Ubuntu Linux 20.04.x is also known as Focal Fossa. We will call it Ubuntu. We
    will use Noetic ROS, but we will call it ROS.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Ubuntu Linux 20.04.x 也被称为 Focal Fossa。我们将称之为 Ubuntu。我们将使用 Noetic ROS，但我们将称之为
    ROS。
- en: Although all shell text commands will be for Noetic ROS, they are compatible
    with earlier versions of ROS, such as Kinetic and Indigo.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尽管所有 shell 文本命令都将针对 Noetic ROS，但它们与 ROS 的早期版本（如 Kinetic 和 Indigo）兼容。
- en: Installing the VirtualBox Software
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装 VirtualBox 软件
- en: The purpose of the Oracle VirtualBox is to create virtual machines to develop
    and run programs in an operating system other than your regular system. The virtual
    machine is an emulation of the target operating system. We want the Ubuntu Linux
    20.04.04 OS emulated on our Microsoft Windows system. (There are versions of VirtualBox
    for Mac OS and Linux.) After installing VirtualBox, we will install an Ubuntu
    Linux 20.04.04 virtual machine. This virtual Ubuntu Linux 20.04.4 OS will serve
    as our ROS development environment. This virtual machine is essentially a program
    that executes an entire operating system, such as Ubuntu Linux 20.04.4 OS, as
    an application. The physical computer, running Microsoft Windows, serves as the
    *host*, and Ubuntu Linux 20.04.4 serves as the *guest*.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle VirtualBox 的目的是创建虚拟机，以便在除常规系统以外的操作系统上开发和运行程序。虚拟机是目标操作系统的模拟。我们希望在 Microsoft
    Windows 系统上模拟 Ubuntu Linux 20.04.04 操作系统。（VirtualBox 有适用于 Mac OS 和 Linux 的版本。）安装
    VirtualBox 后，我们将安装 Ubuntu Linux 20.04.04 虚拟机。这个虚拟的 Ubuntu Linux 20.04.4 操作系统将作为我们的
    ROS 开发环境。这个虚拟机本质上是一个程序，它作为一个应用程序执行整个操作系统，如 Ubuntu Linux 20.04.4 操作系统。运行 Microsoft
    Windows 的物理计算机作为 *主机*，Ubuntu Linux 20.04.4 作为 *客户机*。
- en: The Ubuntu Linux guest operating system in VirtualBox will be the very foundation
    of our test and development environment for the rover in this book.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: VirtualBox 中的 Ubuntu Linux 客户端操作系统将是本书中漫游车测试和开发环境的基础。
- en: 'Install Oracle’s VirtualBox from the following link:'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从以下链接安装Oracle的VirtualBox：
- en: '[`www.virtualbox.org/wiki/Downloads`](http://www.virtualbox.org/wiki/Downloads)'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[`www.virtualbox.org/wiki/Downloads`](http://www.virtualbox.org/wiki/Downloads)'
- en: Go to the list of **host** operating systems and choose Microsoft Windows and
    install the VirtualBox software (orange box in Figure [3-1](#Fig1)). For other
    operating systems, see [`www.virtualbox.org/manual/ch02.html`](http://www.virtualbox.org/manual/ch02.html).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 前往**主机**操作系统列表，选择Microsoft Windows并安装VirtualBox软件（见图[3-1](#Fig1)中的橙色框）。对于其他操作系统，请参阅[`www.virtualbox.org/manual/ch02.html`](http://www.virtualbox.org/manual/ch02.html)。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig1_HTML.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig1_HTML.jpg)'
- en: A screenshot of download virtual box tab.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 创建虚拟机的截图。
- en: Figure 3-1
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-1
- en: Downloading Oracle’s VirtualBox
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 下载Oracle的VirtualBox
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig2_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig2_HTML.jpg)'
- en: A screenshot of Oracle setup wizard window with highlighted next button.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle设置向导窗口的截图，其中突出显示了“下一步”按钮。
- en: Figure 3-2
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-2
- en: Installing Oracle’s VirtualBox
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Oracle的VirtualBox
- en: After downloading the VirtualBox executable, find the file and double-click
    on it to execute. You should now see an image something like Figure [3-2](#Fig2).
    Click *Next.*
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下载VirtualBox可执行文件后，找到该文件并双击以执行。现在您应该看到一个类似于图[3-2](#Fig2)的图像。点击“*下一步*”。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig3_HTML.jpg)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig3_HTML.jpg)'
- en: A screenshot of Oracle network interfaces window with highlighted yes button.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle网络接口窗口的截图，其中突出显示了“是”按钮。
- en: Figure 3-3
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-3
- en: Installing Oracle’s VirtualBox (continued)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Oracle的VirtualBox（继续）
- en: Accept the default settings on the next couple of pop-up windows until you get
    the warning about resetting the network (Figure [3-3](#Fig3)). Click *Yes*, and
    the VirtualBox program will install.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在接下来的几个弹出窗口中接受默认设置，直到出现关于重置网络的警告（见图[3-3](#Fig3)）。点击“*是*”，VirtualBox程序将安装。
- en: Creating a New VirtualBox Virtual Machine
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建新的VirtualBox虚拟机
- en: Now that we have installed Oracle’s VirtualBox, run the program by double-clicking
    on its icon.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经安装了Oracle的VirtualBox，通过双击其图标来运行程序。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig4_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig4_HTML.jpg)'
- en: A screenshot of buttons labeled preferences, import, export, new, and add. Text
    below it reads welcome to Virtualbox!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 标有“首选项”、“导入”、“导出”、“新建”和“添加”按钮的截图。其下方的文本为“欢迎使用Virtualbox！”
- en: Figure 3-4
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-4
- en: Creating a virtual machine within Oracle’s VirtualBox
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在Oracle的VirtualBox中创建虚拟机
- en: After it starts, you will see an area on the window that looks like Figure [3-4](#Fig4).
    To create a new machine, i.e., one that has not been installed before, click on
    *New*. If you do not see this ribbon bar, then you can access it from the ***Tools
    ➤ New*** toolbar.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动后，您将在窗口上看到一个区域，看起来像图[3-4](#Fig4)。要创建一个新机器，即之前未安装过的机器，请点击“*新建*”。如果您看不到这个工具栏，则可以从“***工具
    ➤ 新建***”工具栏访问它。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig5_HTML.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig5_HTML.jpg)'
- en: A screenshot of Oracle setup wizard window for filling name, machine folder,
    type, and version. Next button is highlighted at the bottom.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle设置向导窗口的截图，用于填写名称、机器文件夹、类型和版本。底部突出显示了“下一步”按钮。
- en: Figure 3-5
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-5
- en: Creating a virtual machine within Oracle’s VirtualBox
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在Oracle的VirtualBox中创建虚拟机
- en: Fill out the installation form like in Figure [3-5](#Fig5). Click *Next*. This
    does not install the operating system; it is a placeholder for later.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按照图[3-5](#Fig5)中的示例填写安装表单。点击“*下一步*”。这不会安装操作系统；它是一个占位符，用于后续操作。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig6_HTML.jpg)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig6_HTML.jpg)'
- en: A screenshot of Oracle setup wizard window for selecting memory size. Next button
    is highlighted at the bottom.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle设置向导窗口的截图，用于选择内存大小。底部突出显示了“下一步”按钮。
- en: Figure 3-6
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-6
- en: Allocating memory for the virtual machine
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 为虚拟机分配内存
- en: Next, we allocate memory for our development system. The default is 1024 MB,
    but we will allocate at least 2048 MB (Figure [3-6](#Fig6)). You may allocate
    more, but 2048 MB is enough.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们为我们的开发系统分配内存。默认为1024 MB，但我们将分配至少2048 MB（见图[3-6](#Fig6)）。您可以分配更多，但2048
    MB已经足够。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig7_HTML.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig7_HTML.jpg)'
- en: A screenshot of Oracle setup wizard window for check-in options for hard disk.
    Create a virtual hard disk now option is checked-in and create button is highlighted
    at the bottom.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle设置向导窗口的截图，用于检查硬盘的选项。现在创建虚拟硬盘选项已勾选，底部的创建按钮突出显示。
- en: Figure 3-7
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-7
- en: Creating virtual hard disk
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 创建虚拟硬盘
- en: To create the virtual disk on the physical hard disk, accept the default settings
    shown in Figure [3-7](#Fig7). Since we do not have an existing drive, we have
    to create a new drive.
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要在物理硬盘上创建虚拟磁盘，接受图[3-7](#Fig7)中显示的默认设置。由于我们没有现有的驱动器，我们必须创建一个新的驱动器。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig8_HTML.jpg)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig8_HTML.jpg)'
- en: A screenshot of Oracle setup wizard window for check-in options for hard disk
    file type. V D I option is checked-in and next button is highlighted at the bottom.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle设置向导窗口的截图，用于检查硬盘文件类型的选项。VDI选项已勾选，底部的下一步按钮突出显示。
- en: Figure 3-8
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-8
- en: Setting the virtual hard drive type
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 设置虚拟硬盘类型
- en: Accept the default setting for the virtual hard drive type shown in Figure [3-8](#Fig8).
    We chose VDI because it is optimized for VirtualBox.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接受图[3-8](#Fig8)中显示的虚拟硬盘类型的默认设置。我们选择了VDI，因为它针对VirtualBox进行了优化。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig9_HTML.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig9_HTML.jpg)'
- en: A screenshot of Oracle setup wizard window for check-in options for storage
    on physical hard disk. Dynamically allocated option is checked-in and next button
    is highlighted at the bottom.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle设置向导窗口的截图，用于检查物理硬盘上的存储选项。动态分配选项已勾选，底部的下一步按钮突出显示。
- en: Figure 3-9
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-9
- en: Setting the physical hard drive to allocate dynamically
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 将物理硬盘设置为动态分配
- en: Accept the default setting for the type of physical disk storage type shown
    in Figure [3-9](#Fig9). We chose dynamic, so the size can grow and shrink automatically.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接受图[3-9](#Fig9)中显示的物理磁盘存储类型的默认设置。我们选择了动态，因此大小可以自动增长和缩小。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig10_HTML.jpg)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig10_HTML.jpg)'
- en: A screenshot of Oracle setup wizard window for file location and size. Size
    is set at 10 G B and create button is highlighted at the bottom.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle设置向导窗口的截图，用于文件位置和大小。大小设置为10 G B，底部的创建按钮突出显示。
- en: Figure 3-10
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-10
- en: Setting the location and size of the virtual disk
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 设置虚拟磁盘的位置和大小
- en: Finally, set the location and maximum size your virtual disk can hold (Figure
    [3-10](#Fig10)). The default location is derived from your original disk name,
    and the default size is okay for our little project. Click *Create.*
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，设置虚拟磁盘的位置和最大大小（图[3-10](#Fig10)）。默认位置是从您的原始磁盘名称派生的，默认大小对我们的小型项目来说已经足够。点击*创建*。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig11_HTML.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig11_HTML.jpg)'
- en: A screenshot of Oracle V M Virtual box manager. A bar on the left lists melodic
    Linux running and Ubuntu R O S power off.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle VM VirtualBox管理器的截图。左侧的条目列出了正在运行的melodic Linux和关闭的Ubuntu R O S。
- en: Figure 3-11
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-11
- en: Installation complete
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成
- en: You should now have a virtual machine installed, as shown by the orange box
    in Figure [3-11](#Fig11).
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您现在应该已经安装了一个虚拟机，如图[3-11](#Fig11)中的橙色框所示。
- en: What we have just done is create an empty disk that we will next install in
    our Ubuntu Linux operating system.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚创建了一个空磁盘，我们将在下一个步骤中将它安装到我们的Ubuntu Linux操作系统中。
- en: Installing Linux Ubuntu 20.04.4 in VirtualBox
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在VirtualBox中安装Linux Ubuntu 20.04.4
- en: To download the required DVD/CD ISO image for Ubuntu Linux 20.04.4, a.k.a Focal
    Fossa, go to [`http://old-releases.ubuntu.com/releases/20.04.4/`](http://old-releases.ubuntu.com/releases/18.04.4/).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 要下载Ubuntu Linux 20.04.4（即Focal Fossa）所需的DVD/CD ISO镜像，请访问[`http://old-releases.ubuntu.com/releases/20.04.4/`](http://old-releases.ubuntu.com/releases/18.04.4/)。
- en: By default, the image is a 64-bit architecture, so you will see a [64-bit PC
    (AMD64) desktop image](http://old-releases.ubuntu.com/releases/18.04.4/ubuntu-18.04-desktop-amd64.iso).
    If your physical RAM is less than 4 GB you should use the 32-bit architecture
    version. Even though it says “AMD” it is also the download for Intel chips.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，镜像为64位架构，因此您将看到一个[64位PC (AMD64) 桌面镜像](http://old-releases.ubuntu.com/releases/18.04.4/ubuntu-18.04-desktop-amd64.iso)。如果您的物理RAM小于4
    GB，您应使用32位架构版本。尽管它标明为“AMD”，但它也适用于英特尔芯片。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig12_HTML.jpg)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig12_HTML.jpg)'
- en: A screenshot of Ubuntu R O S settings of general options in Oracle V M Virtual
    box manager.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在Oracle VM VirtualBox管理器中Ubuntu R O S设置的一般选项截图。
- en: Figure 3-12
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-12
- en: ISO settings
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: ISO设置
- en: After downloading the Ubuntu image, we need to load it into our virtual machine
    on VirtualBox. Click on Ubuntu_ROS to highlight that virtual disk. Click on Settings,
    and you will see a popup menu similar to that in Figure [3-12](#Fig12).
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下载 Ubuntu 镜像后，我们需要将其加载到 VirtualBox 上的虚拟机中。点击 Ubuntu_ROS 以突出显示该虚拟磁盘。点击设置，你将看到一个类似于图
    [3-12](#Fig12) 的弹出菜单。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig13_HTML.jpg)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig13_HTML.jpg)'
- en: A screenshot of Ubuntu R O S settings of storage options in Oracle V M Virtual
    box manager.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu ROS 存储选项在 Oracle VM VirtualBox 管理器中的设置截图。
- en: Figure 3-13
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-13
- en: Storage settings needed to attach ISO image
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 需要的存储设置以附加 ISO 镜像
- en: We need to install the specific version of the operating system that we set
    as a placeholder earlier (“Installing VirtualBox,” Step 3). Our version is dictated
    by the Noetic ROS, which is specifically designed for Ubuntu Linux 20.04.4\. Click
    on **Storage**. In Figure [3-13](#Fig13), notice the empty disk icon (orange box)
    and the disk on the far right (red box). This is where we will attach our downloaded
    ISO image. Click the red box icon to connect the downloaded ISO file. Choose the
    first option, “Choose Virtual Optical Disk File…”
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们需要安装之前设置为占位符的特定版本的操作系统（“安装 VirtualBox”，步骤 3）。我们的版本由 Noetic ROS 决定，它专门为 Ubuntu
    Linux 20.04.4 设计。点击 **存储**。在图 [3-13](#Fig13) 中，注意空磁盘图标（橙色框）和最右侧的磁盘（红色框）。这就是我们将附加下载的
    ISO 镜像的地方。点击红色框图标以连接下载的 ISO 文件。选择第一个选项，“选择虚拟光盘文件…”
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig14_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig14_HTML.jpg)'
- en: A screenshot of Windows explorer with I S O image files.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: Windows 资源管理器中 ISO 镜像文件的截图。
- en: Figure 3-14
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-14
- en: Select your ISO image and open it
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 选择您的 ISO 镜像并打开它
- en: Find and select your downloaded ISO file. Ours was saved in the “Download” folder.
    Select “Ubuntu-20.04.4-desktop-amd64.iso” and then click *Open*. This will attach
    the ISO file to your VirtualBox as the operating system. If you wanted to, you
    could now run your Linux system. However, we are going to tweak the settings of
    our operating system to make the development environment easier to use, as seen
    in Figure [3-14](#Fig14).
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查找并选择您的下载 ISO 文件。我们的文件保存在“下载”文件夹中。选择“Ubuntu-20.04.4-desktop-amd64.iso”，然后点击
    *打开*。这将把 ISO 文件附加到 VirtualBox 作为操作系统。如果您愿意，现在可以运行您的 Linux 系统。然而，我们将调整操作系统的设置，以便开发环境更容易使用，如图
    [3-14](#Fig14) 所示。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig15_HTML.jpg)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig15_HTML.jpg)'
- en: A screenshot of Ubuntu R O S settings with selected file for of storage in Oracle
    V M Virtual box manager.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu ROS 存储选项在 Oracle VM VirtualBox 管理器中已选择的文件截图。
- en: Figure 3-15
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-15
- en: ISO image attached
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 已附加 ISO 镜像
- en: In Figure [3-15](#Fig15), the word “empty” has been replaced with your ISO image
    name. Your operating system is installed.
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在图 [3-15](#Fig15) 中，“空”一词已被替换为您的 ISO 镜像名称。您的操作系统已安装。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig16_HTML.jpg)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig16_HTML.jpg)'
- en: A screenshot of Ubuntu R O S settings of display options in Oracle V M Virtual
    box manager.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu ROS 显示选项在 Oracle VM VirtualBox 管理器中的设置截图。
- en: Figure 3-16
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-16
- en: Display settings
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 显示设置
- en: Change your display settings to match Figure [3-16](#Fig16). We assume you have
    at least 4 GB video and SVGA. Setting the Scale Factor to 200% lets the window
    be a reasonable size.
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将您的显示设置更改为与图 [3-16](#Fig16) 相匹配。我们假设您至少有 4 GB 的视频和 SVGA。将缩放因子设置为 200% 可以使窗口大小合理。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig18_HTML.jpg)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig18_HTML.jpg)'
- en: A screenshot of Ubuntu R O S settings of system processor options in Oracle
    V M Virtual box manager.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu ROS 系统处理器选项在 Oracle VM VirtualBox 管理器中的设置截图。
- en: Figure 3-18
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-18
- en: System processor settings
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 系统处理器设置
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig17_HTML.jpg)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig17_HTML.jpg)'
- en: A screenshot of Ubuntu R O S settings of system motherboard options in Oracle
    V M Virtual box manager.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu ROS 系统主板选项在 Oracle VM VirtualBox 管理器中的设置截图。
- en: Figure 3-17
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-17
- en: System motherboard settings
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 系统主板设置
- en: Finally, we need to set a couple of system settings. Figure [3-17](#Fig17) shows
    the optimal RAM to be assigned (green bar), and Figure [3-18](#Fig18) shows the
    optimal CPUs that can be assigned (green bars). The green bars match your computer’s
    hardware our system has 8 GB RAM and 4 CPUs, so that is what we assigned. If you
    choose any values in the red, then the system will be configured to a different
    set of hardware; therefore, it will be slower.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们需要设置一些系统设置。图[3-17](#Fig17)显示了要分配的最佳RAM（绿色条），图[3-18](#Fig18)显示了可以分配的最佳CPU（绿色条）。绿色条与您的计算机硬件匹配，我们的系统有8GB
    RAM和4个CPU，所以我们分配了这些。如果您选择红色区域中的任何值，则系统将被配置为不同的硬件集；因此，它将运行得更慢。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig19_HTML.jpg)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig19_HTML.jpg)'
- en: A screenshot of settings, discard, and start button with a drop-down menu next
    to it. The settings and start button are highlighted.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 设置、丢弃和启动按钮的截图，旁边有一个下拉菜单。设置和启动按钮被突出显示。
- en: Figure 3-19
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-19
- en: Starting the Ubuntu Linux OS as a guest virtual machine
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 以虚拟机形式启动Ubuntu Linux OS
- en: Your system should now be ready to install a fully operational virtual Linux
    system. Click on *Start* (or double-click on your drive) to start installing your
    Linux system. See Figure [3-19](#Fig19).
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的系统现在应该准备好安装一个完全运行的虚拟Linux系统。点击*启动*（或双击您的驱动器）以开始安装您的Linux系统。见图[3-19](#Fig19)。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig20_HTML.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig20_HTML.jpg)'
- en: A screenshot of Ubuntu Linux O S install setup window with preference for language.
    Two icons on the right are try Ubuntu and install ubuntu.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu Linux OS安装设置窗口的截图，偏好语言。右侧有两个图标：试用Ubuntu和安装Ubuntu。
- en: Figure 3-20
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-20
- en: Ubuntu Linux OS install setup
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu Linux OS安装设置
- en: Click on *Install Ubuntu* (Figure [3-20](#Fig20)). We will be selecting the
    defaults most of the time during the installation. If necessary, change the settings
    for your installation.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击*安装Ubuntu*（见图[3-20](#Fig20)）。在安装过程中，我们大多数时候都会选择默认设置。如有必要，更改您的安装设置。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig21_HTML.jpg)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig21_HTML.jpg)'
- en: A screenshot of Ubuntu Linux O S install setup window for keyboard layout selected
    to the U S english .
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu Linux 操作系统安装设置窗口的截图，选择键盘布局为美国英语。
- en: Figure 3-21
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-21
- en: Ubuntu keyboard preferences
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu键盘首选项
- en: Our next step is to set the keyboard preferences (Figure [3-21](#Fig21)). The
    default settings were sufficient for us since we are currently located in the
    United States.
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们的下一步是设置键盘首选项（见图[3-21](#Fig21)）。由于我们目前位于美国，默认设置对我们来说已经足够。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig22_HTML.jpg)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig22_HTML.jpg)'
- en: A screenshot of Ubuntu Linux O S install setup window for updates and other
    software. The normal installation and download updates while installing are checked-in.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu Linux 操作系统安装设置窗口的截图，用于更新和其他软件。常规安装和安装时下载更新已被选中。
- en: Figure 3-22
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-22
- en: Normal Ubuntu installation
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 正常Ubuntu安装
- en: Once we have established the keyboard settings, we can then set the normal installation
    for Ubuntu (Figure [3-22](#Fig22)).
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦我们设置了键盘设置，我们就可以设置Ubuntu的正常安装（见图[3-22](#Fig22)）。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig23_HTML.jpg)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig23_HTML.jpg)'
- en: A screenshot of Ubuntu Linux O S install setup window for installation type
    selected to erase disk and install Ubuntu.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu Linux 操作系统安装设置窗口的截图，选择安装类型为擦除磁盘并安装Ubuntu。
- en: Figure 3-23
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-23
- en: Erase disk and install Ubuntu (continued)
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 擦除磁盘并安装Ubuntu（继续）
- en: We assume there are no prior installments of Ubuntu before proceeding with the
    final installation (Figure [3-23](#Fig23)). The default settings are once again
    sufficient for us.
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在进行最终安装之前，我们假设没有先前的Ubuntu安装（见图[3-23](#Fig23)）。默认设置对我们来说已经足够。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig24_HTML.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig24_HTML.jpg)'
- en: A screenshot of Ubuntu Linux O S install setup confirmation window for writing
    the changes on the disk.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu Linux 操作系统安装设置确认窗口的截图，用于在磁盘上写入更改。
- en: Figure 3-24
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-24
- en: Ubuntu installation warning
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu安装警告
- en: Once the installation process begins, we might also encounter a warning that
    declares that we are about to rewrite the targeted virtual disk (Figure [3-24](#Fig24)).
    We then click *Continue*.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦安装过程开始，我们可能会遇到一个警告，声明我们即将重写目标虚拟磁盘（见图[3-24](#Fig24)）。然后我们点击*继续*。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig25_HTML.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig25_HTML.jpg)'
- en: A screenshot of Ubuntu Linux O S timezone setting on the world map with highlighted
    New York.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu Linux操作系统时区设置截图，突出显示纽约。
- en: Figure 3-25
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-25
- en: Ubuntu timezone setting
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu时区设置
- en: Set the correct time zone for the Ubuntu computer system (Figure [3-25](#Fig25)).
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置Ubuntu计算机系统的正确时区（见图[3-25](#Fig25)）。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig26_HTML.jpg)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig26_HTML.jpg)'
- en: A screenshot of sections to fill in name, computer's name, username, password,
    confirm password, and require my password to log in.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 填写名称、计算机名称、用户名、密码、确认密码以及要求输入密码以登录的截图。
- en: Figure 3-26
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-26
- en: Setting the name, username, and password for the Ubuntu installation
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 设置Ubuntu安装的名称、用户名和密码
- en: 'Finally, we input the name, username, and password for the Ubuntu system (Figure
    [3-26](#Fig26)). Since we are only using Ubuntu as a development platform, we
    should use a strong password for security purposes. To maintain the highest levels
    of password security for the Ubuntu Development environment, we could use numbers
    0–9, letters a–z or A–Z, and special characters such as #, ^, and *.'
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们输入Ubuntu系统的名称、用户名和密码（见图[3-26](#Fig26)）。由于我们只将Ubuntu用作开发平台，出于安全考虑，我们应该使用强密码。为了保持Ubuntu开发环境最高级别的密码安全性，我们可以使用数字0-9、字母a-z或A-Z以及特殊字符，如#、^和*。
- en: Congratulations! You have successfully installed Ubuntu Linux, as indicated
    by the green rectangle in Figure [3-27](#Fig27). Next, we will need to install
    the tools needed for software development. Ubuntu gives us Python as our programming
    language and Gedit text editor. We need to install ROS, which will give us the
    library to control the rover. The full ROS installation will give us simulator
    and visualization tools, Gazebo, and Rviz. We will add a couple of other libraries
    that will be used later in the book, namely TensorFlow (deep learning) and OpenCV
    (computer vision).
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！您已成功安装Ubuntu Linux，如图[3-27](#Fig27)中的绿色矩形所示。接下来，我们需要安装软件开发所需的工具。Ubuntu为我们提供了Python作为编程语言和Gedit文本编辑器。我们需要安装ROS，这将为我们提供控制探测车的库。完整的ROS安装将为我们提供模拟器和可视化工具Gazebo和Rviz。我们还将添加一些将在本书后面使用的其他库，即TensorFlow（深度学习）和OpenCV（计算机视觉）。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig27_HTML.jpg)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig27_HTML.jpg)'
- en: A screenshot of Oracle V M Virtual ox manager with listed melodic Linux and
    Ubuntu R O S.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: Oracle VM VirtualBox管理器截图，列出了melodic Linux和Ubuntu ROS。
- en: Figure 3-27
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-27
- en: Ubuntu finally installed
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu最终安装完成
- en: Updating Ubuntu Linux 20.04.4
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更新Ubuntu Linux 20.04.4
- en: Now that we have installed Ubuntu, to start the operating system, click on the
    *Start* button (Figure [3-27](#Fig27)). You may be prompted for additional installation
    information; just reply “yes” to the default choices. It will also ask you to
    log in. After the operating system launches, you should have a window that looks
    like Figure [3-28](#Fig28). (The VirtualBox menu and bottom of the screen commands
    will be cropped off of future images.) We are now ready to install ROS through
    terminal commands.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经安装了Ubuntu，要启动操作系统，请点击*开始*按钮（见图[3-27](#Fig27)）。您可能会被提示输入额外的安装信息；只需对默认选项回答“是”。它还会要求您登录。操作系统启动后，您应该有一个类似于图[3-28](#Fig28)的窗口。（VirtualBox菜单和屏幕底部命令将在未来的图像中被裁剪掉。）我们现在可以通过终端命令安装ROS。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig28_HTML.jpg)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig28_HTML.jpg)'
- en: A screenshot of Ubuntu home screen.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu主屏幕截图。
- en: Figure 3-28
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-28
- en: Ubuntu initial screen
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu初始屏幕
- en: In Figure [3-28](#Fig28), the desktop includes system application icons on the
    left, a trashcan to delete items, a header bar that has the day and time, and
    four icons in the upper right-hand corner (network, sound, battery, and down arrow).
    We will discuss these as necessary.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[3-28](#Fig28)中，桌面包括左侧的系统应用程序图标、一个用于删除项目的垃圾桶、一个显示日期和时间的标题栏，以及右上角四个图标（网络、声音、电池和向下箭头）。如有必要，我们将讨论这些内容。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig29_HTML.jpg)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig29_HTML.jpg)'
- en: A screenshot of Ubuntu home screen with open in terminal option selected on
    the right-click access menu.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu主屏幕截图，右键点击访问菜单中选择在终端中打开选项。
- en: Figure 3-29
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-29
- en: Ubuntu open terminal selection. Access menu by right-clicking
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu打开终端选择。通过右键点击访问菜单。
- en: To start a terminal window, right-click on the desktop background, being sure
    to avoid icons (Figure [3-29](#Fig29)). Click on the **Open in Terminal** menu
    choice.
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要启动一个终端窗口，请右键单击桌面背景，确保避开图标（图[3-29](#Fig29)）。点击**在终端中打开**菜单选项。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig30_HTML.png)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig30_HTML.png)'
- en: A screenshot of Ubuntu terminal window with an arrow pointing at a square button.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu终端窗口截图，箭头指向一个方形按钮。
- en: Figure 3-30
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-30
- en: Ubuntu terminal session
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu终端会话
- en: On a freshly installed Linux system, your terminal will be full screen (Figure
    [3-30](#Fig30)). Later on, we will run multiple terminals at the same time, so
    let’s make the terminal “windowed” by clicking on the □ in the upper-right corner
    of the terminal, as indicated by the orange arrow.
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在全新安装的Linux系统中，您的终端将全屏显示（图[3-30](#Fig30)）。稍后，我们将同时运行多个终端，因此请通过点击终端右上角的□来将终端设置为“窗口化”，如图中橙色箭头所示。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig31_HTML.jpg)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig31_HTML.jpg)'
- en: A screenshot of Ubuntu terminal window on the home screen.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu终端窗口在主屏幕上的截图。
- en: Figure 3-31
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-31
- en: Ubuntu initial terminal screen
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu初始终端屏幕
- en: Now we have a terminal window on our desktop (Figure [3-31](#Fig31)). The installation
    of ROS will be done through this terminal window using commands. We are not going
    to fully explain the commands, since it is beyond the scope of this book, but
    simple internet research should suffice if you want to investigate further.
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在我们已经在桌面上有一个终端窗口（图[3-31](#Fig31)）。ROS的安装将通过此终端窗口使用命令来完成。我们不会完全解释这些命令，因为它们超出了本书的范围，但如果你想要进一步研究，简单的网络搜索应该足够了。
- en: 'Even though we just installed Ubuntu Linux 20.04.4, there may be software updates
    to drivers, applications, etc. We need to update the operating system. We will
    be using `sudo apt-get` commands. *Sudo* means “superuser do” and it temporarily
    elevates you with system administrator privileges; therefore, you will have to
    enter your password. Execute the following command in the terminal to update the
    necessary features:'
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尽管我们刚刚安装了Ubuntu Linux 20.04.4，但仍可能需要更新驱动程序、应用程序等软件。我们需要更新操作系统。我们将使用`sudo apt-get`命令。*Sudo*意味着“超级用户执行”，它暂时赋予您系统管理员权限；因此，您将需要输入密码。在终端中执行以下命令以更新必要的功能：
- en: '[PRE0]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We can also see the first command in Figure [3-32](#Fig32) highlighted in the
    orange rectangle. After entering your password, you will see a few lines of updates.
    This is a download of lists of the latest version numbers of operating system
    files, not the upgrades! Enter the following:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以看到图[3-32](#Fig32)中橙色矩形中高亮显示的第一个命令。输入您的密码后，您将看到几行更新。这是操作系统文件最新版本号的列表下载，而不是升级！输入以下内容：
- en: '[PRE1]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: to upgrade your operating system files to the latest versions.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 升级您的操作系统文件到最新版本。
- en: After it stops, you will now have the newest version of Ubuntu Linux 20.04.4
    installed (Figure [3-33](#Fig33)). As an aside, for this chapter, from now on,
    we will show commands in the terminal in an orange rectangle, not in text prose.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 停止后，您现在将安装上最新版本的Ubuntu Linux 20.04.4（图[3-33](#Fig33)）。顺便说一下，对于本章，从现在起，我们将以橙色矩形显示终端中的命令，而不是以文本叙述的形式。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig33_HTML.jpg)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig33_HTML.jpg)'
- en: A screenshot of command window with a list of commands.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 命令窗口截图，显示命令列表。
- en: Figure 3-33
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-33
- en: Ubuntu terminal update completed
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu终端更新完成
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig32_HTML.jpg)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig32_HTML.jpg)'
- en: A screenshot of command window with two highlighted text that reads sudo apt-get
    update and sudo apt-get upgrade.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 命令窗口截图，显示两个高亮文本，分别为sudo apt-get update和sudo apt-get upgrade。
- en: Figure 3-32
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-32
- en: Ubuntu terminal update command
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu终端更新命令
- en: We have now updated our Ubuntu Linux system to the latest version. Next, we
    need to set up Ubuntu to allow external libraries (ROS, etc.) These libraries
    come from external repositories.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在已将Ubuntu Linux系统更新到最新版本。接下来，我们需要设置Ubuntu以允许外部库（ROS等）。这些库来自外部仓库。
- en: Configuring Ubuntu Repositories
  id: totrans-202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置Ubuntu仓库
- en: To download repositories from external third-party software sites, such as `ROS.org`,
    we need to tell the system about these sites. To do this, click on the System
    Settings icon on the left side of your desktop (Figure [3-34](#Fig34)).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 要从外部第三方软件网站（如`ROS.org`）下载仓库，我们需要告诉系统这些网站。为此，请点击桌面左侧的系统设置图标（图[3-34](#Fig34)）。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig34_HTML.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig34_HTML.jpg)'
- en: A screenshot of Ubuntu system settings icon.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu系统设置图标的截图。
- en: Figure 3-34
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-34
- en: Ubuntu system settings icon (orange box)
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu系统设置图标（橙色框）
- en: Up pop several icons. Click the Software Updates icon on the desktop (Figure
    [3-35](#Fig35)).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 弹出几个图标。点击桌面上的软件更新图标（图[3-35](#Fig35)）。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig35_HTML.jpg)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig35_HTML.jpg)'
- en: A screenshot of Ubuntu software update icon.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu软件更新图标的截图。
- en: Figure 3-35
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-35
- en: Ubuntu software update icon
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu软件更新图标
- en: Next, we select the Settings option as in Figure [3-36](#Fig36). The Settings
    option defines the software to be installed or upgraded, including third-party
    software, such as ROS.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们选择如图[3-36](#Fig36)所示的设置选项。设置选项定义了要安装或升级的软件，包括第三方软件，如ROS。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig36_HTML.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig36_HTML.png)'
- en: A screenshot of Ubuntu software update dialog box with highlighted settings
    button.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu软件更新对话框截图，突出显示设置按钮。
- en: Figure 3-36
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-36
- en: Ubuntu software settings option
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu软件设置选项
- en: On the new popup window, select the **Ubuntu Software** tab and set the checkboxes
    shown in Figure [3-37](#Fig37). Once those selections have been made, then please
    click *Close*. These selections approve the download of third-party software.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在新的弹出窗口中，选择**Ubuntu软件**选项卡，并设置如图[3-37](#Fig37)所示的复选框。一旦做出这些选择，请点击*关闭*。这些选择批准下载第三方软件。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig37_HTML.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig37_HTML.png)'
- en: A screenshot of highlighted Ubuntu software tab on a dialog box titled software
    and updates.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 软件和更新标题对话框中突出显示的Ubuntu软件选项卡截图。
- en: Figure 3-37
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-37
- en: Display of selected repository checkboxes
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 显示选定的仓库复选框
- en: Installing Anaconda
  id: totrans-223
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装Anaconda
- en: '**As a reminder, the ORDER of installation is important: VirtualBox, Ubuntu,
    Anaconda, ROS. Any other order may cause problems.**'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '**提醒一下，安装顺序很重要：VirtualBox，Ubuntu，Anaconda，ROS。任何其他顺序可能会导致问题。**'
- en: Developing a complex software project is made more manageable if we use an integrated
    development environment (IDE). An IDE combines a simple text editor (Gedit) and
    a compiler (Anaconda). Doing the programming in an IDE makes the programming process
    easier because the built-in tools and the IDE are smart enough to catch simple
    errors. There are many great IDEs available for Linux; we chose Gedit for its
    elegant simplicity. The Anaconda compiler can run Python 2.7, which is required
    by ROS.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们使用集成开发环境（IDE）来开发复杂的软件项目，那么它将变得更加易于管理。IDE结合了一个简单的文本编辑器（Gedit）和一个编译器（Anaconda）。在IDE中进行编程可以使编程过程更容易，因为内置的工具和IDE足够智能，可以捕获简单的错误。Linux有许多优秀的IDE；我们选择了Gedit，因为它简洁优雅。Anaconda编译器可以运行Python
    2.7，这是ROS所需的。
- en: First, we need to install the Anaconda Python compiler from [`https://anaconda.com/products/individual`](https://anaconda.com/products/individual).
    Scroll down to find the link for the 64-bit Linux download (Figure [3-38](#Fig38)).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要从[`https://anaconda.com/products/individual`](https://anaconda.com/products/individual)安装Anaconda
    Python编译器。向下滚动以找到64位Linux下载链接（图[3-38](#Fig38)）。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig38_HTML.jpg)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig38_HTML.jpg)'
- en: A screenshot of Anaconda installer wizard with 64-bit x86 installer 529 M B
    option selected.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda安装向导的截图，选择了64位x86安装选项529 MB。
- en: Figure 3-38
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-38
- en: Anaconda install
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda安装
- en: 'Now that we have downloaded the installation file, we need to locate it. Figure
    [3-39](#Fig39) shows the four steps: 1) click on the file cabinet; 2) click on
    downloads; 3) you will see the Anaconda shell script, and 4) open a terminal at
    this disk location using a right-click near the file name.'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经下载了安装文件，我们需要找到它。图[3-39](#Fig39)显示了四个步骤：1)点击文件柜；2)点击下载；3)你会看到Anaconda shell脚本，4)在文件名附近右键点击，在此磁盘位置打开一个终端。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig39_HTML.jpg)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig39_HTML.jpg)'
- en: A screenshot of highlighted downloads and open in terminal option.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 高亮显示下载和打开终端选项的截图。
- en: Figure 3-39
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-39
- en: Anaconda locating download
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda定位下载
- en: After opening the terminal, enter the two commands shown in Figure [3-40](#Fig40).
    The first command makes the shell script executable. The second command executes
    the shell script so that it is installed on Linux.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 打开终端后，输入图[3-40](#Fig40)中显示的两个命令。第一个命令使shell脚本可执行。第二个命令执行shell脚本，以便在Linux上安装。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig40_HTML.jpg)'
  id: totrans-237
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig40_HTML.jpg)'
- en: A screenshot of command window while installing Anaconda.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 安装 Anaconda 时的命令窗口截图。
- en: Figure 3-40
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-40
- en: Anaconda bash install
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda bash 安装
- en: Now that we have installed our compiler, we need to set up the operating system
    to accept ROS. We do this by setting up the ROS source list and key.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经安装了我们的编译器，我们需要设置操作系统以接受 ROS。我们通过设置 ROS 源列表和密钥来实现这一点。
- en: ROS Source List
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ROS 源列表
- en: 'Now that we have successfully configured our Ubuntu repositories to allow for
    “restricted,” “universe,” and “multiverse” repositories, allowing the installation
    and updating of the necessary supporting software for ROS, we can now set up the
    required software list from the `ROS.org` Foundation website. This can be accomplished
    with the following terminal command:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经成功配置了 Ubuntu 仓库以允许“受限”、“宇宙”和“多元”仓库，允许安装和更新 ROS 所需的必要支持软件，我们现在可以从 `ROS.org`
    基金会网站设置所需的软件列表。这可以通过以下终端命令完成：
- en: '[PRE2]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The ROS source list has now been configured. Now we will set the ROS environment
    key.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: ROS 源列表现在已配置。现在我们将设置 ROS 环境密钥。
- en: ROS Environment Variable Key
  id: totrans-246
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ROS 环境变量密钥
- en: 'The ROS environment variable key verifies and validates the origin of the ROS
    source-code repository. It also guarantees the software has not been modified
    without the consent of the owner. The key makes the ROS repositories “trusted”
    software sites for downloads, installations, and updates. Type in the following
    shell command at the terminal prompt (Figure [3-41](#Fig41)):'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: ROS 环境变量密钥用于验证和确认 ROS 源代码仓库的来源。它还确保软件未经所有者同意未被修改。该密钥使 ROS 仓库成为下载、安装和更新的“受信任”软件站点。在终端提示符中输入以下
    shell 命令（图 [3-41](#Fig41)）：
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig41_HTML.jpg)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig41_HTML.jpg)'
- en: A screenshot of command window while installing Anaconda with Noetic R O S install
    key.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 安装 Anaconda 时带有 Noetic ROS 安装密钥的命令窗口截图。
- en: Figure 3-41
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-41
- en: Getting Noetic ROS install key
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 获取 Noetic ROS 安装密钥
- en: '[PRE3]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Note
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The ROS.org Community recently discovered a security flaw with the original
    key for Noetic ROS. That is why we are using this newer key. The reader needs
    to be vigilant of all security upgrades, maintenance, and/or additional enhancements
    within the ROS ecosystem. The reader needs to occasionally review and check for
    such security updates within the `ROS.org` discussion forums.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: ROS.org 社区最近发现 Noetic ROS 原始密钥存在安全漏洞。这就是为什么我们使用这个更新的密钥。读者需要警惕 ROS 生态系统中的所有安全升级、维护和/或额外增强。读者需要偶尔在
    `ROS.org` 讨论论坛中审查和检查此类安全更新。
- en: Installing the Robotic Operating System (ROS)
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装机器人操作系统 (ROS)
- en: The two commands needed to install ROS are shown in Figure [3-42](#Fig42). The
    first command is just good practice and verifies all the system software is up
    to date, while the second command installs the full ROS library. The downloading
    and installation of over 1,000 files can take a long time. (My computer took more
    than 30 minutes.)
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 安装 ROS 需要的两个命令如图 [3-42](#Fig42) 所示。第一个命令是良好的实践，用于验证所有系统软件是否是最新的，而第二个命令则安装完整的
    ROS 库。下载和安装超过 1,000 个文件可能需要很长时间。（我的电脑花费了超过 30 分钟。）
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig42_HTML.jpg)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig42_HTML.jpg)'
- en: A screenshot of command window with two highlighted text that reads sudo apt-get
    update and sudo apt-get install ros-noetic-desktop-full.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 命令窗口截图，其中高亮显示的文本为 sudo apt-get update 和 sudo apt-get install ros-noetic-desktop-full。
- en: Figure 3-42
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-42
- en: Ubuntu ROS install
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu ROS 安装
- en: The full-featured version of Noetic ROS should now be installed. Let us take
    this system out for a spin.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: Noetic ROS 的完整功能版本现在应该已经安装。让我们来测试一下这个系统。
- en: Note
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'If you receive an error that none of the Noetic packages could be located,
    you might be required to upgrade the Ubuntu software. Please execute the following
    terminal commands:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您收到错误信息，表明无法找到任何 Noetic 软件包，您可能需要升级 Ubuntu 软件。请执行以下终端命令：
- en: '`$ sudo apt-get update`'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '`$ sudo apt-get update`'
- en: '`$ sudo apt-get upgrade`'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '`$ sudo apt-get upgrade`'
- en: Installing ROSINSTALL
  id: totrans-266
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装 ROSINSTALL
- en: 'You have successfully installed ROS to your Linux system. However, there exist
    some additional libraries that will make the development of your project simpler.
    These are accessed through `rosinstall`:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 您已成功将 ROS 安装到您的 Linux 系统中。然而，存在一些额外的库，可以使您项目的开发更加简单。这些库通过 `rosinstall` 访问：
- en: '[PRE4]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Be very careful about the spaces and dashes in the previous command. If you
    get an error, verify every dash and space.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一个命令中的空格和连字符上要非常小心。如果你遇到错误，请验证每个连字符和空格。
- en: Starting ROS for the Very First Time
  id: totrans-270
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一次启动 ROS
- en: The next three commands are used to wake up ROS and check for any ROS-dependent
    library updates. These should be run the first time you start up ROS. The ROS
    we downloaded and installed in Figure [3-42](#Fig42) may not have the latest subcomponents.
    The second command checks for any updates available for subcomponents.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 下三个命令用于唤醒 ROS 并检查任何 ROS 相关库的更新。这些命令应该在第一次启动 ROS 时运行。我们在图 [3-42](#Fig42) 中下载和安装的
    ROS 可能没有最新的子组件。第二个命令检查子组件是否有可用的更新。
- en: '[PRE5]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Adding the ROS Path
  id: totrans-273
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加 ROS 路径
- en: Every time you want to use ROS, you need to tell the operating system where
    to look for the ROS commands, i.e., add the ROS path to the global path. Since
    we have to do this every time we want to use ROS, we will create a bash script.
    In a text editor (Gedit), create a file called `STARTrosconfig.sh` with the included
    lines (Figure [3-43](#Fig43)).
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 每次你想使用 ROS 时，你需要告诉操作系统 ROS 命令的查找位置，即添加 ROS 路径到全局路径。由于我们每次使用 ROS 都必须这样做，我们将创建一个
    bash 脚本。在文本编辑器（Gedit）中，创建一个名为 `STARTrosconfig.sh` 的文件，包含以下行（图 [3-43](#Fig43)）。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig43_HTML.jpg)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig43_HTML.jpg)'
- en: A screenshot of command window.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 命令窗口的截图。
- en: Figure 3-43
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-43
- en: Starting ROS configuration in Gedit
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Gedit 中启动 ROS 配置
- en: Next, save the file to the `/home/ros` directory. This will be reflected in
    the Gedit user interface by the small orange box, as in Figure [3-44](#Fig44).
    Open a new terminal. Using Figure [3-38](#Fig38) as our guide, we are going to
    make `STARTrosconfig.sh` executable. Orange boxes are commands you will type in,
    and green boxes are outputs you should observe. After you type in your first two
    commands, observe that `STARTrosconfig.sh` is white, which means it is not executable.
    The next command (`ls -la STARTrosconfig.sh`) is optional and looks at the details
    for the file. You should note that the file can be read (r) and written (w), but
    not executed (-). To change this, you must issue the change mode command (`chmod
    +rwx STARTrosconfig.sh`). To verify the change occurred`, ls -la` `STARTrosconfig.sh`
    will show `rwx` and a green name. Success!
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，将文件保存到 `/home/ros` 目录。这将在 Gedit 用户界面中通过小橙色框反映出来，如图 [3-44](#Fig44) 所示。打开一个新的终端。以图
    [3-38](#Fig38) 为指导，我们将使 `STARTrosconfig.sh` 可执行。橙色框是你要输入的命令，绿色框是你应该观察的输出。在你输入前两个命令后，观察
    `STARTrosconfig.sh` 是白色的，这意味着它不可执行。下一个命令（`ls -la STARTrosconfig.sh`）是可选的，它查看文件的详细信息。你应该注意，文件可读（r）和可写（w），但不能执行（-）。要更改这一点，你必须发出更改模式命令（`chmod
    +rwx STARTrosconfig.sh`）。要验证更改是否发生，`ls -la STARTrosconfig.sh` 将显示 `rwx` 和绿色名称。成功！
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig44_HTML.jpg)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig44_HTML.jpg)'
- en: A screenshot of command window with many highlighted commands.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 命令窗口截图，其中许多命令被突出显示。
- en: Figure 3-44
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-44
- en: Making STARTrosconfig an executable
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 使 STARTrosconfig 可执行
- en: '*Every time* you want to work with ROS, open a terminal and type `source` `STARTrosconfig.sh`.
    This adds the ROS path to the system (Figure [3-45](#Fig45)). To verify the ROS
    variables were installed correctly, type `env | grep ROS_*`. This command looks
    at the environment variables (`env`) and selects only those variables starting
    with “`ROS_`”.'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: '*每次*你想与 ROS 一起工作时，打开一个终端并输入 `source STARTrosconfig.sh`。这将 ROS 路径添加到系统中（图 [3-45](#Fig45)）。为了验证
    ROS 变量是否正确安装，输入 `env | grep ROS_*`。此命令查看环境变量（`env`）并仅选择以“`ROS_`”开头的变量。'
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig45_HTML.jpg)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig45_HTML.jpg)'
- en: A screenshot of command window.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 命令窗口的截图。
- en: Figure 3-45
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-45
- en: Verify ROS paths
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 验证 ROS 路径
- en: Creating a ROS Catkin Workspace
  id: totrans-289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建 ROS Catkin 工作空间
- en: 'Once the ROS environment variables have been established, we create a workspace
    directory to develop the ROS applications. ROS requires a “catkin” workspace consisting
    of three subfolders (src, build, and devel). Each of these folders needs script
    files to help compile the project. This workspace should be located in the user
    home directory. Therefore, use the following shell commands to create the workspace:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立了 ROS 环境变量，我们创建一个工作空间目录来开发 ROS 应用程序。ROS 需要一个由三个子文件夹（src、build 和 devel）组成的“catkin”工作空间。每个这些文件夹都需要脚本文件来帮助编译项目。此工作空间应位于用户主目录中。因此，使用以下
    shell 命令创建工作空间：
- en: '[PRE6]'
  id: totrans-291
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Note
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'If you receive the following error—“Ackermann msgs were not found by Cmake”—or
    that any other type of error message was not found, then you need to manually
    install the correct package, such as the Ackermann package, as follows:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您收到以下错误——“Ackermann 消息未由 Cmake 找到”——或任何其他类型的错误消息未找到，那么您需要手动安装正确的包，例如 Ackermann
    包，如下所示：
- en: '`$ sudo apt install ros-noetic-ackermann-msgs`'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: '`$ sudo apt install ros-noetic-ackermann-msgs`'
- en: 'The script command `catkin_init_workspace` sets the `src` folder as the project
    source file repository. The script command `catkin_make` creates the `devel` and
    `build` folders and adds the necessary script files. We will use the `catkin_ws`
    workspace as the central directory to develop and test all of the software components.
    Now we need to make certain that the `catkin_ws` workspace is sourced for ROS:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本命令 `catkin_init_workspace` 将 `src` 文件夹设置为项目源文件存储库。脚本命令 `catkin_make` 创建 `devel`
    和 `build` 文件夹并添加必要的脚本文件。我们将使用 `catkin_ws` 工作空间作为开发测试所有软件组件的中心目录。现在我们需要确保 `catkin_ws`
    工作空间已为 ROS 源：
- en: '[PRE7]'
  id: totrans-296
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Now you should have the `catkin_ws` workspace successfully sourced as the main
    workspace that operates on top of the ROS environment. As such, if you execute
    the following shell text command:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您应该已经成功地将 `catkin_ws` 工作空间作为在 ROS 环境上运行的主要工作空间源。因此，如果您执行以下 shell 文本命令：
- en: '[PRE8]'
  id: totrans-298
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'It should then display the following output to the terminal prompt window:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 它应该在终端提示窗口中显示以下输出：
- en: '[PRE9]'
  id: totrans-300
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Note
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: <username> will be the Ubuntu Linux OS username you defined earlier.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: '`<username>` 将是您之前定义的 Ubuntu Linux OS 用户名。'
- en: The `catkin_ws` workspace has now been sourced as the main workspace directory
    for developing applications within the ROS environment. If we did not obtain the
    ROS package path directory output as expected, please consult debugging issues
    within the `ROS.org` Community website for further information.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: '`catkin_ws` 工作空间现在已作为在 ROS 环境中开发应用程序的主要工作空间目录。如果我们没有获得预期的 ROS 包路径目录输出，请咨询 `ROS.org`
    社区网站中的调试问题以获取更多信息。'
- en: Final Checks for Noetic ROS
  id: totrans-304
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Noetic ROS 的最终检查
- en: 'The following shell text command will determine if the correct version of ROS
    has indeed been installed and is operational:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 以下 shell 文本命令将确定是否已正确安装并运行了正确的 ROS 版本：
- en: '[PRE10]'
  id: totrans-306
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: If the output is `Noetic`, then you have completely succeeded in obtaining a
    fully operational ROS environment. Congratulations.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输出为 `Noetic`，那么您已经完全成功获得了完全可操作的 ROS 环境。恭喜。
- en: Note
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: All shell commands used in this book are compatible with both the current and
    future Noetic versions of ROS. The only difference might be the number of parameters
    and substituting the word “Noetic” for the correct rosversion where necessary.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中使用的所有 shell 命令都与当前和未来的 Noetic 版本的 ROS 兼容。唯一可能的不同之处在于参数的数量，并在必要时将“Noetic”替换为正确的
    rosversion。
- en: Noetic ROS Architecture
  id: totrans-310
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Noetic ROS 架构
- en: With the successful installation of Noetic ROS, we will introduce its architecture.
    The ROS architecture was designed to operate with robots of all types (rovers,
    drones, planes, boats, submarines, etc.). As such, the ROS framework was designed
    to handle multiple components or nodes in a robot. A node is a sensor, motor,
    controller, etc. In other words, it is a piece of hardware that performs a function
    for the robot. ROS refers to a “program node” as the software necessary to control
    the hardware. The primary node is known as the central master node.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 在成功安装 Noetic ROS 之后，我们将介绍其架构。ROS 架构旨在与所有类型的机器人（漫游车、无人机、飞机、船只、潜艇等）一起运行。因此，ROS
    框架被设计来处理机器人中的多个组件或节点。节点是一个传感器、电机、控制器等。换句话说，它是一块执行机器人功能的硬件。ROS 将控制硬件所需的软件称为“程序节点”。主节点被称为中心主节点。
- en: The ROS architecture handles the communication between nodes. For example, if
    the central master node receives data from a distance sensor node indicating an
    object is in our path, then the master node might send move commands to a driver
    node to change the robot’s directions (Figure [3-46](#Fig46)). The ROS architecture
    helps us to manage the increasing complexity of a robot system as more features,
    sensors, and actuators are added.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: ROS 架构处理节点之间的通信。例如，如果中心主节点从距离传感器节点接收数据，指示有物体在我们的路径上，那么主节点可能会向驱动节点发送移动命令以改变机器人的方向（图
    [3-46](#Fig46)）。ROS 架构帮助我们管理随着更多功能、传感器和执行器的添加而不断增加的机器人系统复杂性。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig46_HTML.jpg)'
  id: totrans-313
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig46_HTML.jpg)'
- en: A schematic of an oval labeled master connected to line detector via surface,
    driver via velocity, controller via distance, surface, and velocity, and distance
    sensor via distance.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 一个椭圆形的示意图，标记为master，通过表面连接到线检测器，通过速度连接到驱动器，通过距离、表面和速度连接到控制器，通过距离连接到距离传感器。
- en: Figure 3-46
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-46
- en: Preliminary ROS architecture AI rover layout
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 初步的ROS架构AI巡游车布局
- en: 'Figure [3-46](#Fig46) shows five nodes: the master node and four system nodes.
    When a system node starts, it sends information to the master comprising the type
    of data that the node can send and receive. The nodes that send data to the master
    node are called *publisher nodes*. For example, the Distance Sensor and Line Detector
    nodes are publisher nodes, since they send data (distance to target and surface
    information, respectfully) to the master node. The nodes that receive data from
    the master node are called *subscriber nodes*. So the Driver node is a subscriber
    node since it receives velocity data from the master node. The Controller node
    is both a publisher and a subscriber node.'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-46](#Fig46)显示了五个节点：主节点和四个系统节点。当一个系统节点启动时，它会向主节点发送信息，包括节点可以发送和接收的数据类型。向主节点发送数据的节点被称为*发布节点*。例如，距离传感器和线检测器节点是发布节点，因为它们向主节点发送数据（目标距离和表面信息）。从主节点接收数据的节点被称为*订阅节点*。因此，驱动器节点是一个订阅节点，因为它从主节点接收速度数据。控制器节点既是发布节点也是订阅节点。
- en: The Controller node will be hosting the deep learning and cognitive deep learning
    routines developed in later chapters. These deep learning routines will send and
    receive messages to and from the ROS master node. The master node will reroute
    that message to their intended nodes, such as a message to the Driver node to
    control the speed.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 控制节点将托管在后续章节中开发的深度学习和认知深度学习例程。这些深度学习例程将向ROS主节点发送和接收消息。主节点将重新路由这些消息到它们的目标节点，例如将消息发送到驱动节点以控制速度。
- en: Simple “Hello World” ROS Test
  id: totrans-319
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简单的“Hello World”ROS测试
- en: 'Now that we have described the basic ROS architecture, let’s determine if our
    installation of ROS was successful by executing simple ROS tutorial scripts. This
    script will simply have two ROS nodes: a talker (publisher) and a listener (subscriber).
    If we look at Figure [3-47](#Fig47), we see three nodes. First, when the listener
    is created, it tells the master node that it wants to listen to the talker (subscribes).
    Next, when the talker is created it registers with the master node. Finally, the
    talker generates (publishes) a message; this means it sends the message to the
    master. This causes the master node to send the message to all nodes listening
    to the talker, which means the message is sent to the listener.'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经描述了基本的ROS架构，让我们通过执行简单的ROS教程脚本来确定ROS的安装是否成功。这个脚本将简单地有两个ROS节点：一个说话人（发布者）和一个监听人（订阅者）。如果我们看图[3-47](#Fig47)，我们会看到三个节点。首先，当监听人被创建时，它告诉主节点它想监听说话人（订阅）。接下来，当说话人被创建时，它向主节点注册。最后，说话人生成（发布）一条消息；这意味着它将消息发送到主节点。这导致主节点将消息发送到所有监听说话人的节点，这意味着消息被发送到监听人。
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig47_HTML.jpg)'
  id: totrans-321
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig47_HTML.jpg)'
- en: A schematic of an oval labeled R O S master with a box below it labeled hello
    world. Two ovals on the bottom left and bottom right labeled talker node and listener
    node point at R O S master via arrows labeled 1 and 2, respectively. An arrow
    from talker node points at hello world which point at listener node.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 一个椭圆形的示意图，标记为ROS主，下面有一个标记为hello world的矩形框。左下角和右下角有两个椭圆形，分别标记为说话人节点和监听人节点，通过标记为1和2的箭头指向ROS主。从说话人节点发出的一个箭头指向hello
    world，它指向监听人节点。
- en: Figure 3-47
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-47
- en: Simple talker and listener node ROS test example
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的说话人和监听人节点ROS测试示例
- en: 'We are eventually going to open three terminals, each one a node. (If you want
    to, install **Terminator** from the Ubuntu Software store to open multiple tiled
    terminals. It makes running the ROS scripts easier.) Open the first terminal,
    which we will make the ROS master node:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最终将打开三个终端，每个终端都是一个节点。（如果你愿意，可以从Ubuntu软件商店安装**Terminator**以打开多个平铺终端。这使运行ROS脚本更容易。）打开第一个终端，我们将将其设置为ROS主节点：
- en: '[PRE11]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Go back to the desktop and open a second terminal. We will make it the listener:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 返回桌面并打开第二个终端。我们将将其设置为监听人：
- en: '[PRE12]'
  id: totrans-328
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Go back to the desktop and open a third terminal and make it the talker:'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 返回桌面并打开第三个终端，将其设置为说话人：
- en: '[PRE13]'
  id: totrans-330
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'You should then see on the talker terminal:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该在说话人终端上看到以下内容：
- en: '[PRE14]'
  id: totrans-332
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'And you should then see on the listener terminal:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你应该在监听人终端上看到以下内容：
- en: '[PRE15]'
  id: totrans-334
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'If you have made it this far, congratulations, you have successfully installed
    VirtualBox, Ubuntu Linux, and Noetic ROS. (Do not shut down the nodes, as we will
    use them in the next section.) Next, we visit two components that come with ROS:
    RQT Graph and Gazebo Robot Simulator. (We will talk about Rviz and TensorFlow
    when we use them.)'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经走到这一步，恭喜你，你已经成功安装了 VirtualBox、Ubuntu Linux 和 Noetic ROS。（不要关闭节点，因为我们将在下一节中使用它们。）接下来，我们将访问
    ROS 中的两个组件：RQT 图和 Gazebo 机器人模拟器。（当我们使用 Rviz 和 TensorFlow 时，我们将讨论它们。）
- en: ROS RQT Graph
  id: totrans-336
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ROS RQT 图
- en: 'The RQT Graph is an important visualization and debugging tool. This graphing
    tool will be used to debug running nodes and inspect the communication between
    them. We will use RQT Graph to inspect our two nodes that are running from the
    previous section. In a new terminal, enter the following command, and you will
    get something like Figure [3-48](#Fig48):'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: RQT 图是一个重要的可视化和调试工具。这个绘图工具将用于调试正在运行的节点并检查它们之间的通信。我们将使用 RQT 图来检查上一节中运行的两个节点。在一个新的终端中，输入以下命令，你将得到类似于图
    [3-48](#Fig48) 的内容：
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig48_HTML.jpg)'
  id: totrans-338
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig48_HTML.jpg)'
- en: A screenshot of R Q T graph tool window. A oval on the left reads talker and
    an oval on the right reads listener with a rightward arrow in between labeled
    chatter.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: R Q T 图工具窗口的截图。左侧的一个椭圆形上写着“发言者”，右侧的一个椭圆形上写着“监听者”，中间有一个向右的箭头，标有“chatter”。
- en: Figure 3-48
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-48
- en: Talker node sending information to listener node
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 发言节点向监听节点发送信息
- en: '[PRE16]'
  id: totrans-342
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The ROS command `rosrun rqt_graph rqt_graph` graphically displays all active
    publisher and subscriber nodes in an RQT Graph window. The interpretation of Figure
    [3-43](#Fig43) is that `/talker` is sending a message to `/listener`. Notice that
    the ROS master node is left out. The default message pipeline name is `/chatter`.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: ROS 命令 `rosrun rqt_graph rqt_graph` 在 RQT 图窗口中以图形方式显示所有活动的发布者和订阅者节点。图 [3-43](#Fig43)
    的解释是 `/talker` 正在向 `/listener` 发送消息。请注意，ROS 主节点被省略了。默认的消息管道名称是 `/chatter`。
- en: ROS Gazebo
  id: totrans-344
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ROS Gazebo
- en: Gazebo is a graphical simulation tool used to visualize any virtual world you
    create. The virtual world can contain objects, robots, buildings, obstacles, etc.
    You define them in terms Gazebo understands, and it will be simulated in a Gazebo
    window.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: Gazebo 是一个用于可视化你创建的任何虚拟世界的图形模拟工具。虚拟世界可以包含对象、机器人、建筑、障碍物等。你用 Gazebo 理解的术语定义它们，它将在
    Gazebo 窗口中进行模拟。
- en: 'Gazebo is a standalone program that needs to be tied to the ROS system and
    world definition. This means we will “launch” the program from “within” ROS using
    the `roslaunch` command. Briefly, the ROS way of doing things: `rosrun` and `roslaunch`.
    The command `rosrun` launches a (Python) script to run an object’s script by itself
    (or a limited number of other objects). In contrast, `roslaunch` loads and executes
    all objects (and associated scripts) in a world environment, where each object
    can interact with the other objects.'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: Gazebo 是一个需要与 ROS 系统和世界定义关联的独立程序。这意味着我们将使用 `roslaunch` 命令在 ROS 内部“启动”程序。简要来说，ROS
    的操作方式：`rosrun` 和 `roslaunch`。`rosrun` 命令启动一个（Python）脚本，通过自身（或有限数量的其他对象）运行对象的脚本。相比之下，`roslaunch`
    在世界环境中加载并执行所有对象（及其相关脚本），其中每个对象都可以与其他对象交互。
- en: 'The `roslaunch` tool is the standard ROS method for starting Gazebo’s simulated
    world and robots. To verify that Gazebo is correctly installed, we will launch
    the supplied `willowgarage_world.launch` shown in Figure [3-49](#Fig49) with the
    following command:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: '`roslaunch` 工具是启动 Gazebo 模拟世界和机器人的标准 ROS 方法。为了验证 Gazebo 是否正确安装，我们将使用以下命令启动图
    [3-49](#Fig49) 中显示的提供的 `willowgarage_world.launch`：'
- en: '![](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig49_HTML.jpg)'
  id: totrans-348
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_3_Chapter/494112_1_En_3_Fig49_HTML.jpg)'
- en: A computer generated layout of Willow garage.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: Willow garage 的计算机生成布局。
- en: Figure 3-49
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-49
- en: Willow Garage generated world
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: Willow Garage 生成的世界
- en: '[PRE17]'
  id: totrans-352
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Now that we have verified Gazebo is installed correctly, we will be replacing
    the `willowgarage_world.launch` file with our world: a simplified simulated world
    of the unexplored Egyptian Catacombs and our intrepid AI rover. The AI rover’s
    scripts with adaptive intelligence and decision making will circumvent ancient
    dangers that might still await us.'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经验证了 Gazebo 正确安装，我们将用我们的世界替换 `willowgarage_world.launch` 文件：一个简化的模拟世界，包括未探索的埃及地下墓穴和我们的勇敢的
    AI 探索车。AI 探索车的脚本将具有自适应智能和决策能力，以避开可能仍然等待我们的古代危险。
- en: Summary
  id: totrans-354
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: To start our project, we installed VirtualBox and a virtual Ubuntu Linux 20.04.4
    LTS operating system. We then installed Anaconda, our Python programming interpreter,
    on Ubuntu. Lastly, we successfully installed the Noetic ROS on Ubuntu. This completed
    setting up our development environment.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 为了启动我们的项目，我们安装了 VirtualBox 和一个虚拟的 Ubuntu Linux 20.04.4 LTS 操作系统。然后我们在 Ubuntu
    上安装了 Anaconda，我们的 Python 编程解释器。最后，我们成功地在 Ubuntu 上安装了 Noetic ROS。这完成了我们的开发环境的设置。
- en: To verify the environment was successfully installed, we created and ran two
    ROS nodes that communicated through Python scripts. We used RQT Graph to visualize
    the running nodes. Finally, we verified the Gazebo simulator could be launched
    from ROS. (I don’t know about you, but I am tired.) Now that we have set up our
    development environment, we can start designing and developing our AI rover explorer
    and our simplified virtual Egyptian catacombs world.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 为了验证环境是否成功安装，我们创建了两个 ROS 节点并通过 Python 脚本进行通信。我们使用 RQT Graph 来可视化正在运行的节点。最后，我们验证了
    Gazebo 模拟器可以从 ROS 中启动。（我不知道你，但我累了。）现在我们已经设置了我们的开发环境，我们可以开始设计和开发我们的 AI 探索车以及简化版的虚拟埃及地下墓穴世界。
- en: Extra Credit
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 额外加分
- en: What other worlds can be explored within the `roslaunch` command for the Gazebo
    simulator? If need be, please consult internet resources.
  id: totrans-358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Gazebo 模拟器的 `roslaunch` 命令中可以探索哪些其他世界？如果需要，请查阅互联网资源。
- en: What other tests could be used to determine a successful installation of ROS?
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用哪些其他测试来确定 ROS 的成功安装？
- en: What other messages can be exchanged between nodes?
  id: totrans-360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 节点之间可以交换哪些其他消息？
