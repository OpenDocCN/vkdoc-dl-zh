  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 我还在函数中添加了准确率计算，以便更容易地看到我们的表现如何。通过使用python调用让模型运行
- en: '[PRE22]'
  id: totrans-336
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'will give you the following output:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 将会给出以下输出：
- en: '[PRE23]'
  id: totrans-338
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: This model will work exactly as the one with the gradient descent optimizer
    provided by TensorFlow. But now, you have access to the gradients, and you can
    modify them, add noise to them (if you want to try), and so on. In Figure [4-30](#Fig30),
    you can see the cost function behavior (on the right side) and the accuracy vs.
    the epochs (on the left side) that we get with this model.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型将完全像TensorFlow提供的梯度下降优化器所做的那样工作。但现在，你可以访问梯度，并且可以修改它们，如果想要的话，添加噪声，等等。在图[4-30](#Fig30)中，你可以看到我们使用这个模型得到的成本函数行为（在右侧）和准确率与训练轮数的关系（在左侧）。
- en: Note
  id: totrans-340
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: TensorFlow is a great library, because it gives you the flexibility to build
    your models basically from scratch. But it is important to understand how the
    different methods work, to be able to use the library to its fullest. You need
    to have a very good understanding of the mathematics behind the algorithms, to
    be able to tune them or to develop variations.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow是一个非常好的库，因为它允许你从头开始构建你的模型。但是，理解不同的方法是如何工作的是非常重要的，以便能够充分利用这个库。你需要对算法背后的数学有非常深入的理解，以便能够调整它们或开发变体。
