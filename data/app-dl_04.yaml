  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig8_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig8_HTML.jpg)'
- en: Figure 4-8
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-8
- en: Cost function vs. the number of epochs. In plot (A), the entire range of values
    that the cost functions assume are plotted. In plot (B), the area around *J* = 0
    has been zoomed in to show how the cost functions decrease much faster for smaller
    values of *ν*.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 成本函数与迭代次数的关系。在图（A）中，成本函数所假设的整个值域被绘制出来。在图（B）中，*J* = 0 附近的区域被放大以显示成本函数对于较小的 *ν*
    值下降得更快。
- en: Exponential Decay
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指数衰减
- en: Another way of reducing the learning rate is according to the formula called
    exponential decay
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种降低学习率的方法是根据称为指数衰减的公式
- en: '![$$ \gamma ={\gamma}_0{\nu}^{j/T} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equg.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \gamma ={\gamma}_0{\nu}^{j/T} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equg.png)'
- en: See Figure [4-9](#Fig9) to get an idea of the speed of the learning rate. Note
    that the y axis has been plotted in logarithmic scale, to make the entity of the
    changes easier to compare. Note how for *ν* = 0.01, after 200 iterations (not
    epochs), the learning rate is already a factor 1000 smaller than that at the start!
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 参见图 [4-9](#Fig9) 以了解学习率速度的概念。请注意，y 轴已绘制为对数刻度，以便更容易比较变化的实体。注意对于 *ν* = 0.01，在
    200 次迭代（不是时期）后，学习率已经比开始时小了 1000 倍！
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig9_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig9_HTML.jpg)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig9_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig9_HTML.jpg)'
- en: Figure 4-9
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-9
- en: 'Decrease in the learning rate for three values of *ν*: 0.01, 0.1, and 0.8,
    and *T* = 100, using the exponential decay algorithm'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 对于三个 *ν* 值的学习率下降：0.01、0.1 和 0.8，以及 *T* = 100，使用指数衰减算法
- en: We can apply this method to our problem with *ν* = 0.2 and *T* = 3 and, again,
    the algorithm converges. In Figure [4-10](#Fig10), the initial learning rate of
    *γ*[0] = 2 has been chosen, and an exponential decay algorithm with *ν* = 0, 2
    and *T* = 3 has been used. The different estimates ***w***[***n***] are indicated
    with points. The minimum is indicated by the circle approximately in the middle
    of the image. The algorithm is now able to converge. Each point has been labeled
    with the iteration number, to make following the weights update easier.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将此方法应用于我们的问题，其中 *ν* = 0.2 和 *T* = 3，并且算法再次收敛。在图 [4-10](#Fig10) 中，选择了初始学习率
    *γ*[0] = 2，并使用了 *ν* = 0、2 和 *T* = 3 的指数衰减算法。不同的估计 ***w***[***n***] 用点表示。最小值用图像中间大约的圆圈表示。现在算法能够收敛。每个点都标有迭代次数，以便更容易地跟踪权重更新。
