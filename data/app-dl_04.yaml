- en: Natural Exponential Decay
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自然指数衰减
- en: Another way of reducing the learning rate is according to the formula called
    natural exponential decay
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 降低学习率的另一种方法是按照称为自然指数衰减的公式进行
- en: '![$$ \gamma ={\gamma}_0{e}^{-\nu j} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equh.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \gamma ={\gamma}_0{e}^{-\nu j} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equh.png)'
- en: This case is particularly interesting because it allows you to learn a few important
    things. Consider first Figure [4-11](#Fig11), to compare how different values
    of *ν* relate to different decreases in speed for the learning rate.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 此案例特别有趣，因为它允许你学习一些重要的事情。首先考虑图 [4-11](#Fig11)，以比较不同的 *ν* 值如何与学习率速度的不同下降相关。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig11_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig11_HTML.jpg)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig11_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig11_HTML.jpg)'
- en: Figure 4-11
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-11
- en: 'Decreased learning rate for three values of *ν*: 0.01, 0.1, and 0.8 and *T* = 100,
    *using* the natural exponential decay algorithm. Note that the y axis has been
    plotted in logarithmic scale, to make the entity of the changes easier to compare.
    Note how for *ν* = 0.8 after 200 iterations (not epochs), the learning rate is
    already a factor 10^(64) smaller than that at the start.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 对于三个 *ν* 值：0.01、0.1 和 0.8 以及 *T* = 100 的学习率下降，*使用* 自然指数衰减算法。请注意，y 轴已绘制为对数刻度，以便更容易比较变化的实体。注意对于
    *ν* = 0.8，在 200 次迭代（不是时期）后，学习率已经比开始时小了 10^(64) 倍。
- en: I would like to draw your attention to the values on the y axis (note that it
    is using a logarithmic scale). For *ν* = 0.8 after 200 iterations, the learning
    rate is a factor of 10^(−64) of the initial value! Practically zero. That means
    that already after a few iterations, no more updates can occur, because the learning
    rate is too small. To give you an idea of the scale of 10^(−64), a hydrogen atom
    is “only” roughly 10^(−11) *m*! So, unless you are very careful with the choice
    of *ν*, you will not get very far.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我想引起你注意y轴上的值（注意它使用了对数刻度）。对于*ν* = 0.8，在200次迭代后，学习率是初始值的10^(-64)倍！实际上为零。这意味着在几次迭代之后，就不再有更新发生，因为学习率太小。为了给你一个10^(-64)的量级概念，一个氢原子“只有”大约10^(-11)
    *m*！所以，除非你非常小心地选择*ν*，否则你不会走得很远。
- en: 'Consider Figure [4-12](#Fig12), for which I have plotted our weights, as they
    are updated with the GD algorithm, for two values of the learning rate: 0.2 (dotted)
    and 0.5 (continuous).'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑图[4-12](#Fig12)，其中我绘制了我们的权重，随着GD算法的更新，对于学习率的两个值：0.2（虚线）和0.5（连续线）。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig12_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig12_HTML.jpg)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig12_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig12_HTML.jpg)'
- en: Figure 4-12
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-12
- en: Illustration of the gradient descent algorithm with natural exponential decay
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 自然指数衰减的梯度下降算法示意图
- en: To check the convergence, we need to zoom in around the minimum. You’ll see
    that in Figure [4-13](#Fig13). In case you are wondering why the minimum seems
    to be in a different position relative to the contour lines as in Figure [4-12](#Fig12),
    this is because the contour lines are not the same, because in Figure [4-13](#Fig13),
    we are much closer to the minimum.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检查收敛性，我们需要在最小值周围进行放大。你会在图[4-13](#Fig13)中看到。如果你想知道为什么最小值相对于图[4-12](#Fig12)中的等高线位置似乎不同，这是因为等高线并不相同，因为在图[4-13](#Fig13)中，我们离最小值更近。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig13_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig13_HTML.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig13_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig13_HTML.jpg)'
- en: Figure 4-13
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-13
- en: Illustration of the gradient descent algorithm zoomed in around the minimum.
    The same method and parameters used in Figure [4-12](#Fig12) have been used here.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在最小值周围的梯度下降算法的放大示意图。这里使用了与图[4-12](#Fig12)相同的方法和参数。
- en: Now we see something that makes again sense. The continuous line is for *ν* = 0.5;
    therefore, the learning rate decreases much faster and does not manage to reach
    the minimum. In fact, after only 7 iterations, we have *γ* = 0.06, and after 20
    iterations, we have *γ* = 9 · 10^(−5), a value so small that the convergence no
    longer manages to proceed at a reasonable speed! Again, it is very instructive
    to check the cost function decrease for the two parameters (see Figure [4-14](#Fig14)).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们看到一些有意义的图。连续线对应于*ν* = 0.5；因此，学习率下降得更快，并且没有达到最小值。实际上，在仅7次迭代后，我们就有*γ* = 0.06，在20次迭代后，我们就有*γ*
    = 9 · 10^(-5)，这是一个如此小的值，以至于收敛性不再能够以合理的速度进行！再次强调，检查两个参数的成本函数下降是非常有教育意义的（见图[4-14](#Fig14))。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig14_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig14_HTML.jpg)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig14_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig14_HTML.jpg)'
- en: Figure 4-14
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-14
- en: Cost function vs. the number of epochs for natural exponential decay for two
    values of *ν* = 0.2 and 0.5\. In plot (A), the entire range of values that the
    cost functions assume are plotted. In plot (B), the area around *J* = 0 has been
    zoomed in to show how the cost functions decrease much faster for smaller values
    of *ν*.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 成本函数与自然指数衰减的周期数对比，针对两个*ν*值，0.2和0.5。在图(A)中，成本函数所假设的整个值域被绘制出来。在图(B)中，*J* = 0附近的区域被放大，以展示成本函数在*ν*较小值时下降得更快。
- en: We see with plot (B) how the cost function for *ν* = 0.5 does not reach zero
    and becomes practically constant, because the learning rate is too small. You
    may think that by using more iterations, the method will eventually converge,
    but that is not the case. Refer to Figure [4-15](#Fig15) to see that the convergence
    process actually stops, owing to the learning rate being almost zero after a while.
    In the figure, the initial learning rate of *γ*[0] = 2 has been chosen, and an
    exponential decay algorithm with *ν* = 0.5 has been used. The GD does not manage
    to reach the minimum. The different estimates ***w***[***n***] are indicated with
    points. The minimum is indicated by the circle approximately in the middle of
    the image. The algorithm is now able to converge. Each point has been labeled
    with the iteration number, to make following the weights update easier.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 从图(B)中我们可以看到，当*ν* = 0.5时，损失函数没有达到零，并变得实际上是一个常数，因为学习率太小。你可能认为通过使用更多的迭代，方法最终会收敛，但事实并非如此。参见图[4-15](#Fig15)以查看收敛过程实际上停止了，因为一段时间后学习率几乎为零。在图中，初始学习率*γ*[0]
    = 2已被选择，并使用了*ν* = 0.5的指数衰减算法。GD未能达到最小值。不同的估计***w***[***n***]用点表示。最小值用图像中间的大约圆形表示。现在算法能够收敛。每个点都标有迭代次数，以便更容易地跟踪权重更新。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig15_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig15_HTML.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig15_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig15_HTML.jpg)'
- en: Figure 4-15
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-15
- en: Illustration of the gradient descent algorithm zoomed in around the minimum
    for 200 iterations
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降算法在最小值附近放大200次迭代的示意图
- en: Let’s check the learning rate during this process for *ν* = 0.5 (see Figure
    [4-16](#Fig16)). Check the values along the y axis. The learning rate reaches
    10^(−40) after roughly 175 iterations. For all practical purposes, it is zero.
    The GD algorithm will not update the weights anymore, regardless of how many iterations
    you let it run.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查*ν* = 0.5过程中的学习率（见图[4-16](#Fig16))。检查y轴上的值。学习率在大约175次迭代后达到10^(−40)。对于所有实际目的，它都是零。GD算法将不再更新权重，无论你让它运行多少次迭代。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig16_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig16_HTML.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig16_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig16_HTML.jpg)'
- en: Figure 4-16
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-16
- en: Learning rate vs. the number of iterations with natural exponential decay for
    *ν* = 0.5\. Note that the y axis is in logarithmic scale, to better highlight
    the change of *γ*.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 自然指数衰减下*ν* = 0.5的学习率与迭代次数的关系。请注意，y轴是对数刻度，以更好地突出*γ*的变化。
- en: To finish, let’s compare the methods by putting them on the same plot, to get
    an idea of the relative behavior. In Figure [4-17](#Fig17), you can see three
    plots tracking the learning rate decay for each method with different parameters.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们通过将它们放在同一个图表上来比较这些方法，以获得相对行为的想法。在图[4-17](#Fig17)中，你可以看到三个图表跟踪每种方法不同参数的学习率衰减。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig17_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig17_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig17_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig17_HTML.jpg)'
- en: Figure 4-17
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-17
- en: Comparison of different parameters of the learning rate decay for the algorithm
    indicated
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 算法中学习率衰减不同参数的比较
- en: Note
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: You should be aware of how fast your learning rate is decreasing, to avoid it
    becoming practically zero and stopping your convergence altogether.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该注意你的学习率下降的速度，以避免它实际上变为零并完全停止收敛。
- en: tensorflow Implementation
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: tensorflow实现
- en: I should briefly talk about how `tensorflow` implements the methods I just explained,
    because there are a few details that you should know. In `tensorflow`, you can
    find the following functions to perform dynamic learning rate decay:^([2](#Fn2))
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我应该简要地谈谈`tensorflow`如何实现我刚才解释的方法，因为有一些细节你应该知道。在`tensorflow`中，你可以找到以下函数来执行动态学习率衰减:^([2](#Fn2))
- en: Exponential decay → `tf.train.exponential_decay` ( [`https://goo.gl/fiE2ML`](https://goo.gl/fiE2ML)
    )
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指数衰减 → `tf.train.exponential_decay` ([https://goo.gl/fiE2ML](https://goo.gl/fiE2ML))
- en: Inverse time decay → `tf.train.inverse_time_decay` ( [`https://goo.gl/GXK6MX`](https://goo.gl/GXK6MX)
    )
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逆时间衰减 → `tf.train.inverse_time_decay` ([https://goo.gl/GXK6MX](https://goo.gl/GXK6MX))
- en: Natural exponential decay → `tf.train.natural_exp_decay` ( [`https://goo.gl/cGJe52`](https://goo.gl/cGJe52)
    )
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自然指数衰减 → `tf.train.natural_exp_decay` ([https://goo.gl/cGJe52](https://goo.gl/cGJe52))
- en: Step decay → `tf.train.piecewise_constant` ( [`https://goo.gl/bL47ZD`](https://goo.gl/bL47ZD)
    )
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 步骤衰减 → `tf.train.piecewise_constant` ([`https://goo.gl/bL47ZD`](https://goo.gl/bL47ZD))
- en: Polynomial decay → `tf.train.polynomial_decay` ( [`https://goo.gl/zuJWNo`](https://goo.gl/zuJWNo)
    )
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多项式衰减 → `tf.train.polynomial_decay` ([`https://goo.gl/zuJWNo`](https://goo.gl/zuJWNo))
- en: Polynomial decay is a slightly more complex way of decreasing the learning rate.
    This had not been discussed, because it is rarely used, but you can read the documentation
    on the TensorFlow web site, to get an idea of how it works.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 多项式衰减是降低学习率的一种稍微复杂的方法。这还没有讨论过，因为它很少使用，但你可以在TensorFlow网站上阅读文档，以了解它是如何工作的。
- en: TensorFlow uses an additional parameter to give you a bit more flexibility.
    Take, for example, the inverse time decay method. Our equation for the learning
    rate decay was
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow使用一个额外的参数来提供更多的灵活性。以逆时间衰减方法为例。我们学习率衰减的方程是
- en: '![$$ \gamma =\frac{\gamma_0}{1+\nu j} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equi.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![γ =γ₀/(1+νj)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equi.png)'
- en: 'where we have two parameters: *γ*[0] and *ν*. TensorFlow uses three parameters:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 其中我们有两个参数：*γ*[0]和*ν*。TensorFlow使用三个参数：
- en: '![$$ \gamma =\frac{\gamma_0}{1+\frac{\nu j}{\nu_{ds}}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equj.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![γ =γ₀/(1+νj/νds)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equj.png)'
- en: where *ν*[*ds*] is called in TensorFlow code `decay_step`. The formula you will
    find in the TensorFlow official documentation in Python code is
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 其中*ν*[*ds*]在TensorFlow代码中称为`decay_step`。你将在TensorFlow官方文档中找到的Python代码中的公式是
- en: '[PRE2]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'to link TensorFlow language with our notation, as follows:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将TensorFlow语言与我们的符号联系起来，如下所示：
- en: '`global_step` → *j* (number of iterations)'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`global_step` → *j*（迭代次数）'
- en: '`decay_rate` → *ν*'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`decay_rate` → *ν*'
- en: '`decay_step` → *ν*[*ds*]'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`decay_step` → *ν*[*ds*]'
- en: '`learning_rate` → *γ*[*o*] (initial learning rate)'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`learning_rate` → *γ*[*o*]（初始学习率）'
- en: 'You may ask yourself why you want to have this additional parameter. The parameter
    , mathematically speaking, is redundant. We can simply set our *ν* to the same
    value of *ν*/*ν*[*ds*], and we would get the same result. The problem, practically,
    is that *j* (the number of iterations) gets very big very quickly, and, therefore,
    our *ν* may need to assume very small values, to be able to get a reasonable learning
    rate decrease. The goal of the parameter *ν*[*ds*] is to scale the number of iterations.
    For example, you can set this parameter to *ν*[*ds*] = 10⁵, thereby making the
    decrease of the learning rate occur on a scale of 10⁵ iterations, instead of every
    single iteration. If you have a huge dataset with 10⁸ observations, and you use
    a mini-batch size of 50, you will get 2 · 10⁶ iterations for each epoch. Suppose
    you then want your learning rate to be 1/5 of the initial value after 100 epochs.
    For this, you would need a *ν* = 2 · 10^(−8), a rather small value that, more
    important, depends on the size of your dataset and the mini-batch size. If you
    “normalize,” so to speak, the number of iterations, you can choose a value for
    *ν* that can remain constant, if you choose to change, for example, the mini-batch
    size. There is an additional practical reason (more important than that I just
    discussed), which is the following: the `tensorflow` function has an additional
    parameter: `staircase`, which can assume the values of `True` or `False`. If set
    to `True`, the following function is used:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会问自己为什么需要这个额外的参数。从数学上讲，这个参数是多余的。我们可以简单地设置我们的*ν*等于*ν*/*ν*[*ds*]的相同值，我们就会得到相同的结果。实际上，问题是*j*（迭代次数）会非常快地变得非常大，因此，我们的*ν*可能需要取非常小的值，以便能够得到合理的学习率下降。参数*ν*[*ds*]的目标是缩放迭代次数。例如，你可以将此参数设置为*ν*[*ds*]
    = 10⁵，从而使学习率的下降发生在10⁵次迭代的规模上，而不是每次迭代。如果你有一个包含10⁸个观察值的巨大数据集，并且你使用50的迷你批量大小，你将得到每个epoch的2·10⁶次迭代。假设你希望在100个epoch后，你的学习率是初始值的1/5。为此，你需要*ν*
    = 2·10^(−8)，这是一个相当小的值，更重要的是，它取决于你的数据集大小和迷你批量大小。如果你“规范化”，换句话说，迭代次数，你可以选择一个值，如果选择改变，例如，迷你批量大小，这个值可以保持不变。还有一个额外的实际原因（比刚才讨论的更重要），那就是：`tensorflow`函数有一个额外的参数：`staircase`，它可以取`True`或`False`的值。如果设置为`True`，则使用以下函数：
- en: '![$$ \gamma =\frac{\gamma_0}{1+\nu \left[\frac{j}{\nu_{ds}}\right]} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equk.png)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![γ =γ₀/(1+ν[ j/νds ])](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equk.png)'
- en: And, therefore, you get an update only for each *ν*[*ds*] iteration, instead
    of continuously. In Figure [4-18](#Fig18), you can see the difference for *ν* = 0.5
    and *ν*[*ds*] = 20 for 200 iterations. You may want to keep your learning rate
    constant for ten epochs before updating it.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你只会在每个 *ν*[*ds*] 迭代时进行更新，而不是连续更新。在图 [4-18](#Fig18) 中，你可以看到 *ν* = 0.5 和 *ν*[*ds*]
    = 20 在 200 次迭代中的差异。你可能希望在更新之前保持学习率在十个周期内保持不变。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig18_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig18_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig18_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig18_HTML.jpg)'
- en: Figure 4-18
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-18
- en: Learning rate decay with the two variations obtained with `tensorflow` with
    `staircase` = `True` and `False`
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `tensorflow` 的两种变化获得的 `staircase` = `True` 和 `False` 的学习率衰减
- en: 'The same parameters are needed by the functions `tf.train.inverse_time_decay`,
    `tf.train.natural_exp_decay`, and `tf.train.polynomial_decay`. They work in the
    same way, and the purpose of the additional parameter is what I just described.
    Don’t be confused when implementing the methods in `tensorflow`, if you need this
    additional parameter. I will show you how to implement it for inverse time decay,
    but it works in the same exact way for all the other types. You need the following
    additional lines of code:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `tf.train.inverse_time_decay`、`tf.train.natural_exp_decay` 和 `tf.train.polynomial_decay`
    需要相同的参数。它们以相同的方式工作，额外参数的目的就是我刚才描述的。在实现 `tensorflow` 中的方法时，如果你需要这个额外参数，不要感到困惑。我将向你展示如何实现逆时间衰减，但其他类型的工作方式完全相同。你需要以下额外的代码行：
- en: '[PRE3]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: and then you must modify the line of code in which you specify the optimizer
    you are using with this.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你必须修改指定你使用的优化器的代码行。
- en: '[PRE4]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The only difference is the additional parameter in the `minimize` function:
    `global_step = global_step`. The `minimize` function will update the `global_step`
    variable with the iteration number with each update. That’s all. It works in the
    same way for the other functions.'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的区别是 `minimize` 函数中的额外参数：`global_step = global_step`。`minimize` 函数将使用每次更新的迭代数更新
    `global_step` 变量。就是这样。其他函数的工作方式相同。
- en: 'The only difference is for the function `piecewise_constant`, which requires
    different parameters: `x`, `boundaries`, and `values`. For example (from the TensorFlow
    documentation):'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的区别在于 `piecewise_constant` 函数，它需要不同的参数：`x`、`boundaries` 和 `values`。例如（来自 TensorFlow
    文档）：
- en: '*…use a learning rate that’s 1.0 for the first 100000 steps, 0.5 for steps
    100001 to 110000, and 0.1 for any additional steps*'
  id: totrans-169
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*…使用 1.0 的学习率进行前 100000 步，100001 到 110000 步使用 0.5，任何额外的步骤使用 0.1*'
- en: This would require
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这将需要
- en: '[PRE5]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The code
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 代码
- en: '[PRE6]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'will give a learning rate of `l1` before `b1` iterations, `l12` between `b1`
    and `b2` iterations, `l23` between `b2` and `b3` iterations , and so on. Keep
    in mind that with this method, you must set manually all the values and boundaries
    in the code. This will require quite some patience, if you want to test each combination
    to see whether it is working well. An implementation of the step decay algorithm
    in TensorFlow would look like this:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 将在 `b1` 次迭代之前提供学习率 `l1`，在 `b1` 和 `b2` 次迭代之间提供 `l12`，在 `b2` 和 `b3` 次迭代之间提供 `l23`，依此类推。请注意，使用这种方法时，你必须手动在代码中设置所有值和边界。如果你想要测试每种组合以查看其是否工作良好，这将需要相当多的耐心。TensorFlow
    中实现步衰减算法的示例如下：
- en: '[PRE7]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Applying the Methods to the Zalando Dataset
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将方法应用于 Zalando 数据集
- en: Let’s try to apply the methods you just learned to a realistic scenario. For
    this, we will employ the Zalando dataset used in Chapter [3](463356_1_En_3_Chapter.xhtml).
    Please check Chapter [3](463356_1_En_3_Chapter.xhtml) again, to see how to load
    the dataset and how to prepare the data. At the end of the chapter, we wrote the
    functions to construct a model with many layers and a function to train it. Let’s
    consider a model with 4 hidden layers, each containing 20 neurons. Let’s compare
    how the model learns with a starting initial learning rate of 0.01, keep that
    constant, and then apply the inverse time decay algorithm , starting with a *γ*[0] = 0.1,
    *ν* = 0.1, and *ν*[*ds*] = 10³ (see Figure [4-19](#Fig19)).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试将你刚刚学到的方法应用到实际场景中。为此，我们将使用第 [3](463356_1_En_3_Chapter.xhtml) 章中使用的 Zalando
    数据集。请再次查看第 [3](463356_1_En_3_Chapter.xhtml) 章，了解如何加载数据集以及如何准备数据。在章节末尾，我们编写了构建多层模型的函数以及训练它的函数。让我们考虑一个包含
    4 个隐藏层，每个层包含 20 个神经元的模型。让我们比较一下，以 0.01 的初始学习率开始，保持该值不变，然后应用逆时间衰减算法，起始参数为 *γ*[0]
    = 0.1，*ν* = 0.1，*ν*[*ds*] = 10³（见图 [4-19](#Fig19)）。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig19_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig19_HTML.jpg)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig19_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig19_HTML.jpg)'
- en: Figure 4-19
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-19
- en: Cost function behavior for a neural network of 4 layers, each having 20 neurons,
    applied to the Zalando dataset . The continous line is for a model with a constant
    learning rate of *γ* = 0.01\. A dashed line is for a network in which we have
    used the inverse time decay algorithm, with a *γ*[0] = 0.1, *ν* = 0.1, and *ν*[*ds*] = 10³.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 4层神经网络损失函数的行为，每层有20个神经元，应用于Zalando数据集。实线表示学习率恒定为*γ* = 0.01的模型。虚线表示使用了逆时间衰减算法的网络，其中*γ*[0] = 0.1，*ν* = 0.1，*ν*[*ds*] = 10³。
- en: So, even with a starting learning rate ten times larger, the algorithm is much
    more efficient. Is has been proven in several research papers that applying a
    dynamic learning rate makes learning faster and more efficient, as we have noted
    in this case.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，即使起始学习率大十倍，算法也更为高效。在几篇研究论文中已经证明，应用动态学习率可以使学习更快、更有效，正如我们在这个案例中提到的。
- en: Note
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Unless you are using optimization algorithms that include a learning rate change
    during training (you will see them in the next sections), it is generally a good
    idea to use dynamic learning rate decay. This makes learning stable and usually
    faster. The downside is that you have more hyperparameters to tune.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你使用在训练过程中包含学习率变化的优化算法（你将在下一节中看到它们），否则通常使用动态学习率衰减是一个好主意。这使得学习更加稳定，通常也更快。缺点是你有更多的超参数需要调整。
- en: Normally, it is a good idea, when using dynamic learning rate decay , to start
    with an initial learning rate *γ*[0] bigger than you would normally use. Because
    *γ* is decreasing, this won’t normally create problems and will make the convergence
    at the beginning (one hopes) faster. As you should now expect, there are no fixed
    rules on which method works better. Each case and dataset is different, and some
    testing is always required, to see which parameter value yields the best results.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，当使用动态学习率衰减时，从比通常使用的初始学习率*γ*[0]更大的值开始是一个好主意。因为*γ*是递减的，这通常不会引起问题，并且会使开始时的收敛（希望如此）更快。正如你现在应该预料到的，没有固定的规则来确定哪种方法更好。每个案例和数据集都是不同的，并且总是需要进行一些测试，以查看哪个参数值会产生最佳结果。
- en: Common Optimizers
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见优化器
- en: 'Until now, we have used gradient descent to minimize our cost function. That
    is not the most efficient way to proceed, and there are some modifications to
    the algorithm that can make it much faster and more efficient. This is a very
    active area of research, and you will find an incredible number of algorithms,
    based on different ideas, to make the learning faster. I will cover here the most
    instructive and well-known ones: Momentum, RMSProp, and Adam. Additional material
    that you can consult to investigate the most exotic algorithms has been written
    by S. Ruder, in a paper titled *An overview of gradient descent optimization algorithms*
    (available at [`https://goo.gl/KgKVgG`](https://goo.gl/KgKVgG) ). The paper is
    not for beginners and requires an extensive mathematical background, but it gives
    an overview of such unusual algorithms as Adagrad, Adadelta, and Nadam. Additionally,
    it reviews weights update schemes applicable in distributed in such environments
    as Hogwild!, Downpour SGD, and many more. Surely, it is a read worth your time.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直使用梯度下降来最小化我们的损失函数。这并不是最有效的方法，而且有一些算法的修改可以使它更快、更有效。这是一个非常活跃的研究领域，你会发现基于不同想法的算法数量惊人，这些算法可以使学习更快。在这里，我将介绍最具有指导性和最著名的几种：动量、RMSProp和Adam。S.
    Ruder已经撰写了额外的材料，你可以查阅以研究最奇特算法，标题为《梯度下降优化算法概述》（可在[`https://goo.gl/KgKVgG`](https://goo.gl/KgKVgG)
    获取）。这篇论文不是为初学者准备的，需要广泛的数学背景，但它概述了像Adagrad、Adadelta和Nadam这样的不寻常算法。此外，它还回顾了适用于Hogwild!、Downpour
    SGD等分布式环境中的权重更新方案。当然，这是一篇值得你花时间阅读的文章。
- en: To understand the basic idea of Momentum (and partially, too, RMSProp and Adam),
    you first must understand what exponentially weighted averages are.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解动量（以及部分地，RMSProp和Adam）的基本概念，你首先必须了解指数加权平均是什么。
- en: Exponentially Weighted Averages
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指数加权平均
- en: Let’s suppose that you are measuring a quantity *θ* (it could be the temperature
    where you live) over time—once a day, for example. You will have a series of measurements
    that we can indicate with *θ*[*i*], where *i* goes from 1 to a certain number
    *N*. Bear with me, if, at the beginning, this does not make much sense; however,
    let’s define recursively a quantity *v*[*n*] as
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在测量一个量 \( *θ* \)（它可能是你所在地的温度）随时间的变化——例如，每天测量一次。你将有一系列测量值，我们可以用 \( *θ*[i*]
    表示，其中 \( *i* \) 从 1 到某个数 \( *N* \)。请耐心等待，如果一开始这不太有意义；然而，让我们递归地定义一个量 \( *v*[n*]
    如下：
- en: '![$$ {\displaystyle \begin{array}{l}{v}_0=1\\ {}{v}_1=\beta {v}_0+\left(1-\beta
    \right){\theta}_1\\ {}{v}_2=\beta {v}_1+\left(1-\beta \right){\theta}_2\end{array}}
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equl.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( \begin{array}{l} v_0=1\\ v_1=\beta v_0+\left(1-\beta\right)\theta_1\\
    v_2=\beta v_1+\left(1-\beta\right)\theta_2 \end{array} \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equl.png)'
- en: and so on, with *β*, a real number with 0 < *β* < 1\. Generally, we could write
    the *n*^(*th*) term as
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 等等，其中 \( *β* \) 是一个 0 < \( *β* \) < 1 的实数。一般来说，我们可以将第 \( *n* \) 项写成
- en: '![$$ {v}_n=\beta {v}_{n-1}+\left(1-\beta \right){\theta}_n $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equm.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( v_n=\beta v_{n-1}+\left(1-\beta\right)\theta_n \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equm.png)'
- en: Now let’s write all the terms, *v*[1], *v*[2], and so on, just as a function
    of *β* and *θ*[*i*] (so, not recursively). For *v*[2], we have
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将所有项 \( v[1], v[2] \) 等等，都写成 \( *β* \) 和 \( *θ*[*i*] \) 的函数（因此，不是递归的）。对于
    \( v[2] \)，我们有
- en: '![$$ {v}_2=\beta \left(\beta {v}_0+\left(1-\beta \right){\theta}_1\right)+\left(1-\beta
    \right){\theta}_2={\beta}^2+\left(1-\beta \right)\left(\beta {\theta}_1+{\theta}_2\right)
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equn.png)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( v_2=\beta(\beta v_0+\left(1-\beta\right)\theta_1)+\left(1-\beta\right)\theta_2=\beta^2+\left(1-\beta\right)(\beta\theta_1+\theta_2)
    \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equn.png)'
- en: for *v*[3],
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 \( v[3] \)，我们有
- en: '![$$ {v}_3={\beta}^3+\left(1-\beta \right)\left[{\beta}^2{\theta}_1+\beta {\theta}_2+{\theta}_3\right]
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equo.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( v_3=\beta^3+\left(1-\beta\right)\left[\beta^2\theta_1+\beta\theta_2+\theta_3\right]
    \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equo.png)'
- en: Generalizing, we obtain
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 推广开来，我们得到
- en: '![$$ {v}_n={\beta}^n+\left(1-\beta \right)\left[{\beta}^{n-1}{\theta}_1+{\beta}^{n-2}{\theta}_2+\dots
    +{\theta}_n\right] $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equp.png)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( v_n=\beta^n+\left(1-\beta\right)\left[\beta^{n-1}\theta_1+\beta^{n-2}\theta_2+\dots
    +\theta_n\right] \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equp.png)'
- en: Or, more elegantly (without the three dots),
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，更优雅地（没有省略号），
- en: '![$$ {v}_n={\beta}^n+\left(1-\beta \right)\sum \limits_{i=1}^n{\beta}^{n-i}{\theta}_i
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equq.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( v_n=\beta^n+\left(1-\beta\right)\sum_{i=1}^n\beta^{n-i}\theta_i \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equq.png)'
- en: 'Now let’s try to understand what this formula means . First, note that the
    term *β*^(*n*) disappears if we choose *v*[0] = 0\. Let’s do that (we set *v*[0] = 0)
    and consider now what remains:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们尝试理解这个公式的含义。首先，注意如果我们选择 \( v[0] = 0 \)，则项 \( *β*^(*n*) \) 将消失。让我们这样做（我们将
    \( *v*[0] \) 设置为 0）并考虑现在剩下什么：
- en: '![$$ {v}_n=\left(1-\beta \right)\sum \limits_{i=1}^n{\beta}^{n-i}{\theta}_i
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equr.png)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( v_n=\left(1-\beta\right)\sum_{i=1}^n\beta^{n-i}\theta_i \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equr.png)'
- en: 'Are you still with me? Now comes the interesting part. Let’s define the convolution
    between two sequences.^([3](#Fn3)) Consider two sequences: *x*[*n*] and *h*[*n*].
    The convolution between the two (which we indicate with the symbol ∗) is defined
    by'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你还在吗？现在到了有趣的部分。让我们定义两个序列之间的卷积。[3](#Fn3) 考虑两个序列：\( *x*[n*] \) 和 \( *h*[n*] \)。两个序列之间的卷积（我们用符号
    ∗ 表示）定义为
- en: '![$$ {x}_n\ast {h}_n=\sum \limits_{k=-\infty}^{\infty }{x}_k{h}_{n-k} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equs.png)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( x_n\ast h_n=\sum_{k=-\infty}^{\infty }x_kh_{n-k} \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equs.png)'
- en: Now, because we have only a finite number of measurements for our quantity *θ*[*i*],
    we will have
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，因为我们只有有限数量的测量值用于我们的量 \( *θ*[i*] \)，我们将有
- en: '![$$ {\theta}_k=0\kern1.78em k&gt;n,k\le 0 $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equt.png)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( \theta_k=0\kern1.78em k>n,k\le 0 \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equt.png)'
- en: Therefore, we can write *v*[*n*] as a convolution as
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以将 \( *v*[n*] 写作一个卷积，如下所示
- en: '![$$ {v}_n={\theta}_n\ast {b}_n $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equu.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![公式：\( v_n=\theta_n\ast b_n \)](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equu.png)'
- en: where we have defined
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 其中我们定义了
- en: '![$$ {b}_n=\left(1-\beta \right){\beta}^n $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equv.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {b}_n=\left(1-\beta \right){\beta}^n $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equv.png)'
- en: To get an idea of what that means, let’s plot together *θ*[*n*], *b*[*n*], and
    *v*[*n*]. To do this, let’s assume that *θ*[*n*] has a Gaussian shape (the exact
    form is not relevant, it is only for illustrative purposes), and let’s take *β* = 0.9
    (see Figure [4-20](#Fig20)).
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解这意味着什么，让我们一起绘制 *θ*[*n*]，*b*[*n*]，和 *v*[*n*]。为此，让我们假设 *θ*[*n*] 具有高斯形状（确切形式无关紧要，只是为了说明目的），并且让我们取
    *β* = 0.9（见图 [4-20](#Fig20))。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig20_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig20_HTML.jpg)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig20_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig20_HTML.jpg)'
- en: Figure 4-20
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-20
- en: A plot (left) showing *θ*[*n*] (solid line) and *b*[*n*] (dotted line) together,
    and one (right) showing the points that must be summed to obtain *v*[*n*] for
    *n* = 50
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 一张图（左）显示了 *θ*[*n*]（实线）和 *b*[*n*]（虚线）一起，另一张图（右）显示了为了获得 *n* = 50 的 *v*[*n*] 必须求和的点
- en: Now I’ll discuss briefly Figure [4-20](#Fig20). The Gaussian curve (*θ*[*n*])
    will be convoluted with *b*[*n*] to obtain *v*[*n*]. The result can be seen in
    the plot at right. All those terms, (1 − *β*)*β*^(*n* − *i*)*θ*[*i*] for *i* = 1,
    …, 50 (plotted at right), will be summed to obtain *v*[50]. Intuitively, *v*[*n*]
    is the average of all *θ*[*n*] for *n* = 1, …, 50\. Each term is then multiplied
    by a term (*b*[*n*]) that is 1 for *n* = 50 and then decreases rapidly for *n*,
    decreasing toward 1\. Basically, this is a weighted average, with an exponentially
    decreasing weight (thus the name). The terms farther from *n* = 50 are less and
    less relevant, while the terms close to *n* = 50 get more weight. This is also
    a moving average. For each *n*, all the preceding terms are added, each multiplied
    by a weight (*b*[*n*]).
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我将简要讨论图 [4-20](#Fig20)。高斯曲线 (*θ*[*n*]) 将与 *b*[*n*] 卷积以获得 *v*[*n*]。结果可以在右边的图中看到。所有这些项，(1 − *β*)*β*^(*n* − *i*)*θ*[*i*]
    对于 *i* = 1, …, 50（在右图中绘制），将求和以获得 *v*[50]。直观上，*v*[*n*] 是所有 *θ*[*n*] 对于 *n* = 1,
    …, 50 的平均值。每个项然后乘以一个项 (*b*[*n*])，对于 *n* = 50 为 1，然后对于 *n* 迅速下降，趋向于 1。基本上，这是一个加权平均，具有指数下降的权重（因此得名）。远离
    *n* = 50 的项越来越不相关，而接近 *n* = 50 的项获得更多权重。这同样是一个移动平均。对于每个 *n*，所有前面的项都相加，每个乘以一个权重
    (*b*[*n*])。
- en: 'I would like now to show you why there is this factor 1 − *β* in *b*[*n*].
    Why not choose only *β*^(*n*)? The reason is very simple. The sum of *b*[*n*]
    over all positive *n* is equal to 1\. Let’s see why. Consider the following equation:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 我想现在向您展示为什么在 *b*[*n*] 中存在这个因子 1 − *β*。为什么不只选择 *β*^(*n*) 呢？原因非常简单。所有正 *n* 的 *b*[*n*]
    之和等于 1。让我们看看原因。考虑以下方程：
- en: '![$$ \sum \limits_{k=1}^{\infty }{b}_k=\left(1-\beta \right)\sum \limits_{k=1}^{\infty
    }{\beta}^n=\left(1-\beta \right)\underset{N\to \infty }{\lim}\frac{1-{\beta}^{N+1}}{1-\beta
    }=\left(1-\beta \right)\frac{1}{1-\beta }=1 $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equw.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \sum \limits_{k=1}^{\infty }{b}_k=\left(1-\beta \right)\sum \limits_{k=1}^{\infty
    }{\beta}^n=\left(1-\beta \right)\underset{N\to \infty }{\lim}\frac{1-{\beta}^{N+1}}{1-\beta
    }=\left(1-\beta \right)\frac{1}{1-\beta }=1 $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equw.png)'
- en: where we have used the fact that for *β* < 1, we have ![$$ \underset{\kern1.75em
    N\to \infty }{\lim {\beta}^{N+1}}=0 $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_IEq1.png),
    and that for a geometric series, we have
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 其中我们使用了对于 *β* < 1，我们有 ![$$ \underset{\kern1.75em N\to \infty }{\lim {\beta}^{N+1}}=0
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_IEq1.png)，并且对于几何级数，我们有
- en: '![$$ \sum \limits_{k=1}^na{r}^{k-1}=\frac{a\left(1-{r}^n\right)}{1-r} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equx.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \sum \limits_{k=1}^na{r}^{k-1}=\frac{a\left(1-{r}^n\right)}{1-r} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equx.png)'
- en: The algorithm we described to calculate *v*[*n*] is nothing else than the convolution
    of our quantity *θ*[*i*], with a series the sum of which is equal to 1 and has
    the form (1 − *β*)*β*^(*i*).
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们描述的用于计算 *v*[*n*] 的算法实际上就是我们的数量 *θ*[*i*] 与一个级数的卷积，该级数的和等于 1，形式为 (1 − *β*)*β*^(*i*)。
- en: Note
  id: totrans-221
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The exponentially weighted average *v*[*n*] of a series of a quantity *θ*[*n*]
    is the convolution *v*[*n*] = *θ*[*n*] ∗ *b*[*n*] of our quantity *θ*[*i*], with
    *b*[*n*] = (1 − *β*)*β*^(*n*), where *b*[*n*] has the property that its sum over
    the positive values of *n* is equal to 1\. It has the intuitive meaning of a moving
    average, in which each term is multiplied by weights given by the sequence *b*[*n*].
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 一个数量 *θ*[*n*] 的指数加权平均值 *v*[*n*] 是我们的数量 *θ*[*i*] 的卷积 *v*[*n*] = *θ*[*n*] ∗ *b*[*n*]，其中
    *b*[*n*] = (1 − *β*)*β*^(*n*)，*b*[*n*] 具有这样的性质，即其正值的和等于 1。它具有移动平均的直观意义，其中每个项都乘以由序列
    *b*[*n*] 给出的权重。
- en: As you choose *β* smaller and smaller, the number of points *θ*[*n*] that have
    a weight significantly different from zero decreases, as you can see in Figure
    [4-21](#Fig21), in which the series *b*[*n*] for different values of *β* is plotted.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你将 *β* 越来越小，具有显著不同于零的权重的点 *θ*[*n*] 的数量会减少，如图 [4-21](#Fig21) 所示，其中绘制了不同 *β*
    值的 *b*[*n*] 系列图。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig21_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig21_HTML.jpg)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig21_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig21_HTML.jpg)'
- en: Figure 4-21
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-21
- en: 'The series *b*[*n*] for three values of *β*: 0.9, 0.8, and 0.3\. Note that
    as *β* gets smaller, the series is significantly different from zero for an increasingly
    smaller number of values around *n* = 0.'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '*β* 的三个值：0.9、0.8 和 0.3 的 *b*[*n*] 系列图。注意，随着 *β* 的减小，*n* = 0 附近的系列值显著不同于零的数量越来越少。'
- en: This method is at the very core of the Momentum optimizer and more advanced
    learning algorithms, and you will see in the next sections how it works in practice.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法是动量优化器和更高级学习算法的核心，你将在下一节中看到它在实际中的应用。
- en: Momentum
  id: totrans-228
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 动量
- en: You will remember that in plain gradient descent, the weights updates are calculated
    with the equations
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 你会记得，在普通的梯度下降中，权重更新是通过以下方程计算的
- en: '![$$ \Big\{{\displaystyle \begin{array}{l}{w}_{\left[n+1\right]}={w}_{\left[n\right]}-\gamma
    {\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)\\
    {}{b}_{\left[n+1\right]}={b}_{\left[n\right]}-\gamma \frac{\partial J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)}{\partial
    b}\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equy.png)'
  id: totrans-230
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Big\{{\displaystyle \begin{array}{l}{w}_{\left[n+1\right]}={w}_{\left[n\right]}-\gamma
    {\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)\\
    {}{b}_{\left[n+1\right]}={b}_{\left[n\right]}-\gamma \frac{\partial J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)}{\partial
    b}\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equy.png)'
- en: The idea behind the Momentum optimizer is to use exponentially weighted averages
    of the corrections of the gradient and then use them for the weights updates.
    More mathematically we calculate
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 动量优化器的理念是使用梯度校正的指数加权平均值，然后使用这些平均值进行权重更新。更数学地，我们计算
- en: '![$$ \Big\{{\displaystyle \begin{array}{l}{v}_{w,\left[n+1\right]}=\beta {v}_{w,\left[n\right]}+\left(1-\beta
    \right){\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)\\
    {}{v}_{b,\left[n+1\right]}=\beta {v}_{b,\left[n\right]}+\left(1-\beta \right)\frac{\partial
    J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)}{\partial b}\end{array}}
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equz.png)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Big\{{\displaystyle \begin{array}{l}{v}_{w,\left[n+1\right]}=\beta {v}_{w,\left[n\right]}+\left(1-\beta
    \right){\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)\\
    {}{v}_{b,\left[n+1\right]}=\beta {v}_{b,\left[n\right]}+\left(1-\beta \right)\frac{\partial
    J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)}{\partial b}\end{array}}
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equz.png)'
- en: and we will then perform the updates with the equations
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将使用以下方程进行更新
- en: '![$$ \Big\{{\displaystyle \begin{array}{l}{w}_{\left[n+1\right]}={w}_{\left[n\right]}-\gamma
    {v}_{w,\left[n\right]}\\ {}{b}_{\left[n+1\right]}={b}_{\left[n\right]}-\gamma
    {v}_{b,\left[n\right]}\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equaa.png)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Big\{{\displaystyle \begin{array}{l}{w}_{\left[n+1\right]}={w}_{\left[n\right]}-\gamma
    {v}_{w,\left[n\right]}\\ {}{b}_{\left[n+1\right]}={b}_{\left[n\right]}-\gamma
    {v}_{b,\left[n\right]}\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equaa.png)'
- en: where usually ***v***[*w*, [0]] = **0** and *v*[*b*, [0]] = 0 are chosen. That
    means, as you can now understand from the discussion about exponentially weighted
    averages from the previous section, that instead of using the derivatives of the
    cost functions with respect to the weights, we update the weights with a moving
    average of the derivatives. Usually, experience shows that a bias correction could
    theoretically be neglected.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，通常 ***v***[*w*, [0]] = **0** 和 *v*[*b*, [0]] = 0 被选择。这意味着，正如你从上一节关于指数加权平均的讨论中现在可以理解的那样，我们不是使用关于权重的成本函数的导数，而是用导数的移动平均来更新权重。通常，经验表明，理论上可以忽略偏差校正。
- en: Note
  id: totrans-236
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The Momentum algorithm uses an exponential weighted average of the derivatives
    of the cost function with respect to the weights for the weights updates. In this
    way, not only the derivatives at a given iteration are used, but also the past
    behavior is considered. It may happen that the algorithm oscillates around the
    minimum, instead of converging directly. This algorithm can escape from plateaus
    much more efficiently than standard gradient descent.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 动量算法使用关于权重的成本函数导数的指数加权平均来更新权重。这样，不仅使用给定迭代的导数，还考虑了过去的行为。可能发生的情况是，算法在最小值周围振荡，而不是直接收敛。这个算法比标准梯度下降更有效地逃离平台期。
- en: Sometimes, you find in books or blogs a slightly different formulation (I provide
    here only the equation for the weights, ***w***, for brevity).
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，你在书籍或博客中会发现稍微不同的表述（为了简洁，这里只提供了权重w的方程）。
- en: '![$$ {v}_{w,\left[n+1\right]}=\gamma {v}_{w,\left[n\right]}+\eta {\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equab.png)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{w,\left[n+1\right]}=\gamma {v}_{w,\left[n\right]}+\eta {\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equab.png)'
- en: The idea and meaning remain the same. It is simply a slightly different mathematical
    formulation. I find that the method I described is easier to understand intuitively
    with the notion of sequence convolution and of weighted averages than this second
    formulation. Another formulation that you will find (and one that TensorFlow uses)
    is
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 理念和意义保持不变。这仅仅是一种稍微不同的数学表述。我发现，与这种第二种表述相比，我描述的方法通过序列卷积和加权平均的概念更容易直观理解。你还会发现另一种表述（TensorFlow使用的也是这种表述）是：
- en: '![$$ {v}_{w,\left[n+1\right]}={\eta}^t{v}_{w,\left[n\right]}+{\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equac.png)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{w,\left[n+1\right]}={\eta}^t{v}_{w,\left[n\right]}+{\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equac.png)'
- en: where *η*^(*t*) is called by TensorFlow Momentum (the superscript *t* indicates
    that this variable is used by TensorFlow). In this formulation, the weight update
    assumes the form
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，*η*^(*t*) 被TensorFlow称为动量（上标*t*表示这个变量被TensorFlow使用）。在这个表述中，权重更新的形式是：
- en: '![$$ {w}_{\left[n+1\right]}={w}_{\left[n\right]}-{\gamma}^t{v}_{w,\left[n+1\right]}={w}_{\left[n\right]}-{\gamma}^t\left({\eta}^t{v}_{w,\left[n\right]}+{\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)\right)={w}_{\left[n\right]}-{\gamma}^t{\eta}^t{v}_{w,\left[n\right]}-{\gamma}^t{\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equad.png)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equad.png)'
- en: where, again, the superscript *t* indicates that the variable is the one used
    by TensorFlow. Although it seems different, this formulation is completely equivalent
    to the formulation I gave you at the beginning of this section.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，再次，上标*t*表示这个变量是TensorFlow使用的变量。尽管看起来不同，但这种表述与我在本节开头给出的表述完全等价。
- en: '![$$ {w}_{\left[n+1\right]}={w}_{\left[n\right]}-\gamma \beta {v}_{w,\left[n\right]}-\gamma
    \left(1-\beta \right){\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equae.png)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{\left[n+1\right]}={w}_{\left[n\right]}-\gamma \beta {v}_{w,\left[n\right]}-\gamma
    \left(1-\beta \right){\nabla}_{\mathbf{w}}J\left({w}_{\left[n\right]},{b}_{\left[n\right]}\right)
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equae.png)'
- en: The TensorFlow formulation and the one I discussed previously are equivalent,
    if we choose
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们选择
- en: '![$$ \Big\{{\displaystyle \begin{array}{l}\eta =\frac{\beta }{1-\beta}\\ {}{\gamma}^t=\gamma
    \left(1-\beta \right)\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equaf.png)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Big\{{\displaystyle \begin{array}{l}\eta =\frac{\beta }{1-\beta}\\ {}{\gamma}^t=\gamma
    \left(1-\beta \right)\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equaf.png)'
- en: That can be seen by simply comparing the two different equations for the weights
    updates. Typically, values around *η* = 0.9 in TensorFlow implementations are
    used, and they generally work well.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以通过简单地比较权重更新的两个不同方程来看到。通常，在TensorFlow实现中，*η* = 0.9附近的值被使用，并且它们通常效果很好。
- en: Implementing Momentum in TensorFlow is extraordinarily easy. Just replace the
    `GradientDescentOptimizer` with `tf.train.MomentumOptimizer(learning_rate = learning_rate,
    momentum = 0.9)`.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow中实现动量非常简单。只需将`GradientDescentOptimizer`替换为`tf.train.MomentumOptimizer(learning_rate
    = learning_rate, momentum = 0.9)`。
- en: The Momentum almost always converges faster than plain gradient descent.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 动量几乎总是比普通梯度下降收敛得快。
- en: Note
  id: totrans-251
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Comparing the different parameters in the different optimizers is wrong. The
    learning rate, for example, has a different meaning in the different algorithms.
    What you should compare is the best convergence speed you can achieve with several
    optimizers, regardless of the choice of parameters. Comparing the GD for a learning
    rate of 0.01 with Adam (covered later) for the same learning rate does not make
    much sense. You should compare the optimizers with the parameters that give you
    the best and fastest convergence, to decide which one to use.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 比较不同优化器中的不同参数是错误的。例如，学习率在不同的算法中有不同的含义。你应该比较的是几个优化器可以达到的最佳收敛速度，而不管参数的选择。将学习率为0.01的GD与稍后介绍的Adam（学习率相同）进行比较没有太多意义。你应该比较具有最佳和最快收敛速度的优化器，以决定使用哪一个。
- en: In Figure [4-22](#Fig22), you can see the cost function for the problem discussed
    in the previous section for plain gradient descent (with *γ* = 0.05) and for Momentum
    (with *γ* = 0.05 and *η* = 0.9). You can see how the Momentum optimizer oscillates
    around the minimum. What is difficult to see on the y scale is that with Momentum,
    *J* reaches a much lower value.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[4-22](#Fig22)中，你可以看到前一小节讨论的问题的成本函数，对于普通梯度下降（*γ* = 0.05）和动量（*γ* = 0.05和*η* = 0.9）。你可以看到动量优化器是如何在最小值周围振荡的。在y轴上难以看到的是，使用动量，*J*达到的值要低得多。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig22_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig22_HTML.jpg)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig22_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig22_HTML.jpg)'
- en: Figure 4-22
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-22
- en: Cost function vs. the number of epochs for plain gradient descent (with *γ* = 0.05)
    and for Momentum (with *γ* = 0.05 and *η* = 0.9). You can see how the Momentum
    optimizer oscillates a bit around the minimum.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 成本函数与普通梯度下降（*γ* = 0.05）和动量（*γ* = 0.05和*η* = 0.9）的epoch数量。你可以看到动量优化器在最小值周围略有振荡。
- en: More interesting is to check how the Momentum optimizer chooses its path along
    the cost function surface. In Figure [4-23](#Fig23), you can see a 3D surface
    plot of the cost function . The continuous line is the path that the gradient
    descent optimizer chooses, along the maximum steepness, as expected. The dashed
    line is the one that the Momentum optimizer chooses as it oscillates around the
    minimum.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 更有趣的是检查动量优化器如何在成本函数表面上选择其路径。在图[4-23](#Fig23)中，你可以看到成本函数的3D表面图。连续线表示梯度下降优化器选择的路径，沿着最大斜率，正如预期的那样。虚线表示动量优化器选择的路径，因为它在最小值周围振荡。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig23_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig23_HTML.jpg)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig23_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig23_HTML.jpg)'
- en: Figure 4-23
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-23
- en: 3D surface plot of the cost function J. The continuous line is the path that
    the gradient descent optimizer chooses—along the maximum steepness, as expected.
    The dashed line is the one that the Momentum optimizer chooses as it oscillates
    around the minimum.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: J函数的3D表面图。连续线表示梯度下降优化器选择的路径——沿着最大斜率，正如预期的那样。虚线表示动量优化器选择的路径，因为它在最小值周围振荡。
- en: I want to convince you that Momentum is faster and better at converging. To
    do that, let’s check in the weights plane how the two optimizers behave. In Figure
    [4-24](#Fig24), you can see the path that the two optimizers have chosen. On the
    right plot, you can see a zoom around the minimum. You can see how gradient descent
    after 100 epochs does not manage to reach the minimum, although it seems to choose
    a more direct path toward the minimum. It gets very close, but not close enough.
    The Momentum optimizer oscillates around the minimum and reaches it very efficiently.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 我想说服你们，动量（Momentum）在收敛方面更快、更好。为此，让我们检查权重平面中两个优化器的行为。在图[4-24](#Fig24)中，你可以看到两个优化器选择的路径。在右侧的图中，你可以看到一个围绕最小值的放大视图。你可以看到梯度下降（Gradient
    Descent）在100个epoch后未能达到最小值，尽管它似乎选择了一条通往最小值的更直接路径。它非常接近，但还不够近。动量优化器在最小值周围振荡，并非常有效地达到它。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig24_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig24_HTML.jpg)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig24_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig24_HTML.jpg)'
- en: Figure 4-24
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-24
- en: Path that the two optimizers have chosen. The right plot shows a zoom around
    the minimum. You can see how Momentum reaches the minimum after oscillating around
    it, while GD does not manage to reach it in 100 epochs.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 两个优化器选择的路径。右侧的图显示了围绕最小值的放大视图。你可以看到动量在围绕最小值振荡后达到它，而梯度下降（GD）在100个epoch内未能达到它。
- en: RMSProp
  id: totrans-265
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RMSProp
- en: Let’s move to something a bit more complex, but usually more efficient. Let
    me give you the mathematical equations, and then we will compare them to the others
    we have seen so far. At each iteration, we need to calculate
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们转向一个稍微复杂一些，但通常更有效的方法。让我给出数学方程式，然后我们将把它们与我们迄今为止看到的其他方程式进行比较。在每次迭代中，我们需要计算
- en: '![$$ \Big\{{\displaystyle \begin{array}{l}{S}_{w,\left[n+1\right]}={\beta}_2{S}_{w,\left[n\right]}+\left(1-{\beta}_2\right){\nabla}_wJ\left(w,b\right)\circ
    {\nabla}_wJ\left(w,b\right)\\ {}{S}_{b,\left[n+1\right]}={\beta}_2{S}_{b,\left[n\right]}+\left(1-{\beta}_2\right)\frac{\partial
    J\left(w,b\right)}{\partial b}\circ \frac{\partial J\left(w,b\right)}{\partial
    b}\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equag.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Big\{{\displaystyle \begin{array}{l}{S}_{w,\left[n+1\right]}={\beta}_2{S}_{w,\left[n\right]}+\left(1-{\beta}_2\right){\nabla}_wJ\left(w,b\right)\circ
    {\nabla}_wJ\left(w,b\right)\\ {}{S}_{b,\left[n+1\right]}={\beta}_2{S}_{b,\left[n\right]}+\left(1-{\beta}_2\right)\frac{\partial
    J\left(w,b\right)}{\partial b}\circ \frac{\partial J\left(w,b\right)}{\partial
    b}\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equag.png)'
- en: where the symbol ∘ indicates an element-wise product. Then we will do the update
    of our weights with the equations
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 其中符号 ∘ 表示逐元素乘积。然后我们将使用以下方程更新我们的权重
- en: '![$$ \Big\{{\displaystyle \begin{array}{l}{w}_{\left[n+1\right]}={w}_{\left[n\right]}-\frac{\gamma
    {\nabla}_wJ\left(w,b\right)}{\sqrt{S_{w,\left[n+1\right]}+\epsilon }}\\ {}{b}_{\left[n+1\right]}={b}_{\left[n\right]}-\gamma
    \frac{\partial J\left(w,b\right)}{\partial b}\frac{1}{\sqrt{S_{b,\left[n\right]}+\epsilon
    }}\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equah.png)'
  id: totrans-269
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Big\{{\displaystyle \begin{array}{l}{w}_{\left[n+1\right]}={w}_{\left[n\right]}-\frac{\gamma
    {\nabla}_wJ\left(w,b\right)}{\sqrt{S_{w,\left[n+1\right]}+\epsilon }}\\ {}{b}_{\left[n+1\right]}={b}_{\left[n\right]}-\gamma
    \frac{\partial J\left(w,b\right)}{\partial b}\frac{1}{\sqrt{S_{b,\left[n\right]}+\epsilon
    }}\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equah.png)'
- en: 'So, first you determine an exponential weighted average of the quantities ***S***[***w***,
    [*n* + 1]] and *S*[*b*, [*n* + 1]] and then use them to modify the derivatives
    that you use to do your weights updates. The *ϵ*, usually *ϵ* = 10^(−8), is there
    to avoid the denominator going to zero in case the quantities ***S***[***w***,
    [*n* + 1]] and *S*[*b*, [*n* + 1]] go to zero. The intuitive idea is that if the
    derivative is big, then the *S* quantities are big; therefore, the factors ![$$
    1/\sqrt{S_{w,\left[n+1\right]}+\epsilon } $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_IEq2.png)
    or ![$$ 1/\sqrt{S_{b,\left[n\right]}+\epsilon } $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_IEq3.png)
    will be smaller and the learning will slow down. The reverse is also true, so
    if the derivatives are small, the learning will be faster. This algorithm will
    make the learning faster for the parameters that are slowing it down. In TensorFlow,
    it is again particularly easy to use it simply with the following code:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，首先确定 ***S***[***w***, [*n* + 1]] 和 *S*[*b*, [*n* + 1]] 的指数加权平均值，然后使用它们来修改你用来更新权重的导数。*ϵ*，通常
    *ϵ* = 10^(−8)，是为了防止 ***S***[***w***, [*n* + 1]] 和 *S*[*b*, [*n* + 1]] 为零时分母变为零。直观的想法是，如果导数很大，那么
    *S* 量就很大；因此，因子 ![$$ 1/\sqrt{S_{w,\left[n+1\right]}+\epsilon } $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_IEq2.png)
    或 ![$$ 1/\sqrt{S_{b,\left[n\right]}+\epsilon } $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_IEq3.png)
    就会更小，学习就会减慢。反之亦然，所以如果导数很小，学习就会更快。这个算法将使学习对于减慢它的参数更快。在 TensorFlow 中，使用以下代码非常简单：
- en: '[PRE8]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Let’s check what path this optimizer chooses. In Figure [4-25](#Fig25), you
    can see that RMSProp oscillates around the minimum. While the GD does not reach
    it, the RMSProp algorithm has time to do several loops around it before reaching
    it.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查这个优化器选择的路径。在图 [4-25](#Fig25) 中，你可以看到 RMSProp 围绕最小值振荡。虽然 GD 没有达到它，但 RMSProp
    算法有足够的时间在达到它之前围绕它做几个循环。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig25_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig25_HTML.jpg)'
  id: totrans-273
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig25_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig25_HTML.jpg)'
- en: Figure 4-25
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-25
- en: Path chosen toward the cost function minimum by plain gradient descent and RMSProp
    . The latter makes loops around the minimum and then reaches it. In the same number
    of epochs, the GD does not even get that close. Note the scale of the plot on
    the right. The zoom level is very high. We are looking at an extreme close-up
    (the GD path is not even visible on this scale) around the minimum.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: '普通梯度下降和 RMSProp 选择向成本函数最小值的路径。后者围绕最小值做循环，然后达到它。在相同数量的周期内，GD 甚至没有接近。注意右边的图表的比例。缩放级别非常高。我们正在查看最小值周围的极端特写（GD
    路径在这个比例上甚至不可见）。 '
- en: In Figure [4-26](#Fig26), you can see in 3D the same path along the cost function
    surface.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [4-26](#Fig26) 中，你可以从 3D 视角看到沿着成本函数表面的相同路径。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig26_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig26_HTML.jpg)'
  id: totrans-277
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig26_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig26_HTML.jpg)'
- en: Figure 4-26
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-26
- en: Path choosen by the GD (*γ* = 0.05) and RMSProp (*γ* = 0.05, *η* = 0.9, *ϵ* = 10^(−10))
    along the surface of the cost function. The red dot indicates the minimum. RMSProp
    , especially at the beginnig, chooses a more direct path toward the minimum than
    GD.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: GD (*γ* = 0.05) 和 RMSProp (*γ* = 0.05, *η* = 0.9, *ϵ* = 10^(−10)) 沿着成本函数表面的路径选择。红色圆点表示最小值。RMSProp，尤其是在开始阶段，比
    GD 选择了一条更直接的路径向最小值前进。
- en: In Figure [4-27](#Fig27), you can see GD, RMSProp and Momentum paths. You can
    see how the RMSProp path is much more direct toward the minimum. It gets close
    to it very quickly and then oscillates closer and closer. It overshoots a bit
    at the beginning but then corrects itself quickly and comes back.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [4-27](#Fig27) 中，你可以看到 GD、RMSProp 和动量的路径。你可以看到 RMSProp 的路径向最小值非常直接。它迅速接近它，然后越来越接近地振荡。它开始时略微超出，但随后迅速纠正并回来。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig27_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig27_HTML.jpg)'
  id: totrans-281
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig27_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig27_HTML.jpg)'
- en: Figure 4-27
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-27
- en: Path toward the minimum choosen by GD, RMSProp, and Momentum. You can see how
    the RMSProp path toward the minimum is much more direct. It gets around it very
    quickly and then oscillates closer and closer.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: GD、RMSProp 和动量选择的向最小值的路径。你可以看到 RMSProp 向最小值的路径要直接得多。它迅速绕过它，然后越来越接近地振荡。
- en: Adam
  id: totrans-284
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Adam
- en: The last algorithm we will look at is called Adam (Adaptive Moment estimation).
    It combines the ideas of RMSProp and Momentum in one optimizer. Like Momentum,
    it uses an exponential weighted averages of past derivatives, and like RMSProp,
    it uses the exponentially weighted averages of past squared derivatives.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要查看的最后一种算法称为 Adam（自适应矩估计）。它将 RMSProp 和动量的思想结合在一个优化器中。像动量一样，它使用过去导数的指数加权平均值，像
    RMSProp 一样，它使用过去平方导数的指数加权平均值。
- en: 'You will have to calculate the same quantities that you need for Momentum and
    for RMSProp, and then you must calculate the following quantities:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要计算与动量和 RMSProp 相同的量，然后你必须计算以下量：
- en: '![$$ {\displaystyle \begin{array}{c}{v}_{w,\left[n\right]}^{corrected}=\frac{v_{w,\left[n\right]}}{1-{\beta}_1^n}\\
    {}{v}_{b,\left[n\right]}^{corrected}=\frac{v_{b,\left[n\right]}}{1-{\beta}_1^n}\end{array}}
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equai.png)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{c}{v}_{w,\left[n\right]}^{corrected}=\frac{v_{w,\left[n\right]}}{1-{\beta}_1^n}\\
    {}{v}_{b,\left[n\right]}^{corrected}=\frac{v_{b,\left[n\right]}}{1-{\beta}_1^n}\end{array}}
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equai.png)'
- en: Similarly, you must calculate
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，你必须计算
- en: '![$$ {\displaystyle \begin{array}{c}{S}_{w,\left[n\right]}^{corrected}=\frac{S_{w,\left[n\right]}}{1-{\beta}_2^n}\\
    {}{S}_{b,\left[n\right]}^{corrected}=\frac{S_{b,\left[n\right]}}{1-{\beta}_2^n}\end{array}}
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equaj.png)'
  id: totrans-289
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{c}{S}_{w,\left[n\right]}^{corrected}=\frac{S_{w,\left[n\right]}}{1-{\beta}_2^n}\\
    {}{S}_{b,\left[n\right]}^{corrected}=\frac{S_{b,\left[n\right]}}{1-{\beta}_2^n}\end{array}}
    $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equaj.png)'
- en: Where we have used *β*[1] for the hyperparameter, we will use it in Momentum
    and *β*[2] for the one we used in RMSProp. Then, as we did in RMSProp, we will
    update our weights with the equations
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们使用 *β*[1] 作为超参数的地方，我们将它在动量中使用，而在 RMSProp 中使用 *β*[2]。然后，就像我们在 RMSProp 中做的那样，我们将使用以下方程更新我们的权重
