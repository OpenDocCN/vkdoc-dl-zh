  id: totrans-342
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig30_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig30_HTML.jpg)'
