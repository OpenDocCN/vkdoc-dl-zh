  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| 超参数 | 示例 |'
- en: '| --- | --- |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Parameter D | *D* = 10 |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 参数 D | *D* = 10 |'
- en: Inverse Time Decay
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 逆时间衰减
- en: Another way of updating the learning rate is with the formula called inverse
    time decay
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 更新学习率的另一种方法是使用称为逆时间衰减的公式
- en: '![$$ \gamma =\frac{\gamma_0}{1+\nu j} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equf.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \gamma =\frac{\gamma_0}{1+\nu j} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equf.png)'
- en: 'where *ν* is a parameter called the decay rate. In Figure [4-5](#Fig5), you
    can see a comparison of the learning rate decrease for three parameters of *ν*:
    0.01, 0.1, and 0.8\. In Figure [4-5](#Fig5), you also can see how the learning
    rate decreases for the three different values of *ν*. Note that the y axis has
    been plotted in logarithmic scale, to make the entity of the changes easier to
    compare. Note that the *y* axis is logarithmic.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *ν* 是一个称为衰减率的参数。在图 [4-5](#Fig5) 中，你可以看到三个 *ν* 参数（0.01、0.1 和 0.8）的学习率下降的比较。在图
    [4-5](#Fig5) 中，你还可以看到对于三个不同的 *ν* 值，学习率是如何下降的。注意，y 轴已经被绘制在对数尺度上，以便更容易比较变化的实体。注意，*y*
    轴是按对数刻度的。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig5_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig5_HTML.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig5_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig5_HTML.jpg)'
- en: Figure 4-5
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-5
- en: 'Decreased learning rate for three values of ν: 0.01, 0.1, and 0.8, using the
    inverse time decay algorithm'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 使用逆时间衰减算法对三个 *ν* 值（0.01、0.1 和 0.8）的学习率下降
- en: This method also makes the GD algorithm discussed in Chapter [2](463356_1_En_2_Chapter.xhtml)
    converge. In Figure [4-6](#Fig6), you can see how the weights converge toward
    the minimum location after only a few iterations when choosing *ν* = 0.2\. In
    Figure [4-6](#Fig6), the initial learning rate of *γ*[0] = 2 has been chosen,
    and an inverse time decay algorithm with *ν* = 0.2 has been used. The different
    estimates ***w***[***n***] are indicated with points. The minimum is indicated
    by the circle approximately in the middle of the image. The algorithm is now able
    to converge. Each point has been labeled with the iteration number, to make following
    the weights update easier.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法也使得第 [2](463356_1_En_2_Chapter.xhtml) 章中讨论的GD算法收敛。在图 [4-6](#Fig6) 中，选择了 *γ*[0] = 2
    的初始学习率，并使用了 *ν* = 0.2 的逆时间衰减算法。不同的估计值 ***w***[***n***] 用点表示。最小值用图像中间大约的圆圈表示。现在算法能够收敛。每个点都标有迭代次数，以便更容易地跟踪权重更新。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig6_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig6_HTML.jpg)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig6_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig6_HTML.jpg)'
- en: Figure 4-6
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-6
- en: Illustration of gradient descent algorithm with inverse time decay for *ν* = 0.2
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '*ν* = 0.2 时的梯度下降算法示意图'
- en: It is very interesting to see what happens if we choose a bigger value for *ν*.
    In Figure [4-7](#Fig7), the initial learning rate of *γ*[0] = 2 has been chosen,
    and an inverse time decay algorithm with *ν* = 1.5 has been used. The different
    estimates ***w***[***n***] are indicated with points. The minimum is indicated
    by the circle approximately in the middle of the image. The algorithm is now able
    to converge . Each point has been labeled with the iteration number, to make following
    the weights update easier.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们选择一个更大的 *ν* 值，会发生什么非常有趣。在图 [4-7](#Fig7) 中，选择了 *γ*[0] = 2 的初始学习率，并使用了 *ν* = 1.5
    的逆时间衰减算法。不同的估计值 ***w***[***n***] 用点表示。最小值用图像中间大约的圆圈表示。现在算法能够收敛。每个点都标有迭代次数，以便更容易地跟踪权重更新。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig7_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig7_HTML.jpg)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig7_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig7_HTML.jpg)'
- en: Figure 4-7
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-7
- en: Illustration of the gradient descent algorithm for *ν* = 1.5
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '*ν* = 1.5 时的梯度下降算法示意图'
- en: What we observe in Figure [4-7](#Fig7) makes perfect sense . Increasing *ν*
    makes the learning rate decrease faster, and, therefore, more steps are required
    to reach the minimum, because the learning rate is increasingly smaller, in comparison
    to what happens in Figure [4-6](#Fig6). We can compare the behavior of the cost
    functions for the two values of *ν*. In Figure [4-8](#Fig8), you can see in plot
    (A) the cost function vs. the number of epochs. At first sight, the two seem to
    converge equally as fast. But let’s zoom around *J* = 0 in plot (B). You can clearly
    see how with *ν* = 0.2 the convergence is much faster, because the learning rate
    is bigger than for *ν* = 1.5.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在图 [4-7](#Fig7) 中观察到的内容完全合理。增加 *ν* 使得学习率下降得更快，因此需要更多的步骤才能达到最小值，因为与图 [4-6](#Fig6)
    中发生的情况相比，学习率越来越小。我们可以比较两个 *ν* 值的成本函数的行为。在图 [4-8](#Fig8) 中，你可以在图（A）中看到成本函数与迭代次数的关系。乍一看，两者似乎以相同的速度收敛。但让我们在图（B）中放大
    *J* = 0 附近。你可以清楚地看到，当 *ν* = 0.2 时，收敛得更快，因为学习率比 *ν* = 1.5 时更大。
