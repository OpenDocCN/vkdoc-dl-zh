- en: 4. Training Neural Networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 训练神经网络
- en: 'Building complex networks with TensorFlow is quite easy, as you have probably
    realized by now. A few lines of code are enough to construct networks with thousands
    (and even more) parameters. It should be clear by now that problems arise while
    training such networks. It is difficult, unstable, and slow to test hyperparameters,
    because a run over a few hundred epochs may take hours. This is not only a performance
    problem; otherwise, it would suffice to use faster and faster hardware. The problem
    is that very often, the convergence process (the learning) does not work at all.
    It stops, it diverges, or it never gets close to the minimum of the cost function.
    We need ways of making the training process efficient, fast, and reliable. You
    will look at two of the main strategies that will help with the training of complex
    networks: dynamic learning rate decay and optimizers that are smarter than plain
    gradient descent ([GD] such as RMSProp, Momentum, and Adam).'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TensorFlow构建复杂网络相当简单，正如你可能现在已经意识到的。几行代码就足以构建具有数千（甚至更多）参数的网络。现在应该很清楚，在训练这样的网络时会出现问题。测试超参数既困难又不稳定，又慢，因为运行几百个epoch可能需要数小时。这不仅仅是一个性能问题；否则，使用更快更快的硬件就足够了。问题在于，非常经常，收敛过程（学习）根本不起作用。它停止了，它发散了，或者它从未接近成本函数的最小值。我们需要找到使训练过程高效、快速和可靠的方法。你将了解两种主要策略，这些策略将有助于复杂网络的训练：动态学习率衰减和比普通梯度下降（如RMSProp、Momentum和Adam）更智能的优化器。
- en: Dynamic Learning Rate Decay
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动态学习率衰减
- en: 'I mentioned several times that the learning rate *γ* is a very important parameter
    and that choosing it badly will make your model not perform. Refer again to Figure
    [2-12](463356_1_En_2_Chapter.xhtml#Fig12), which shows you how choosing a learning
    rate that is too big will make your gradient descent algorithm bounce around the
    minimum and not converge. Without discussing them, let’s rewrite the equations
    that describe the weight and bias update described in Chapter [2](463356_1_En_2_Chapter.xhtml)
    when discussing the gradient descent algorithm. (Remember: I described the algorithm
    for a problem with two weights *w*[0] and *w*[1].)'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我多次提到，学习率*γ*是一个非常重要的参数，而且选择不当会使你的模型表现不佳。请再次参阅图[2-12](463356_1_En_2_Chapter.xhtml#Fig12)，它展示了选择一个过大的学习率将如何使你的梯度下降算法在最小值周围弹跳，而不能收敛。不讨论这些，让我们重写描述第[2](463356_1_En_2_Chapter.xhtml)章中讨论的梯度下降算法时权重和偏差更新的方程式。（记住：我描述了具有两个权重*w*[0]和*w*[1]的问题的算法。）
- en: '![$$ {w}_{0,\left[n+1\right]}={w}_{0,\left[n\right]}-\gamma \frac{\partial
    J\left({w}_{0,\left[n\right]},{w}_{1,\left[n\right]}\right)}{\partial {w}_0} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equa.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equa.png)'
- en: '![$$ {w}_{1,\left[n+1\right]}={w}_{1,\left[n\right]}-\gamma \frac{\partial
    J\left({w}_{0,\left[n\right]},{w}_{1,\left[n\right]}\right)}{\partial {w}_1} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equb.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equb.png)'
- en: As a reminder, following is an overview of the notation. (Please refer again
    to Chapter [2](463356_1_En_2_Chapter.xhtml), if you don’t remember how the gradient
    descent is working.)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 作为提醒，以下是对符号的概述。（如果你不记得梯度下降是如何工作的，请再次参阅第[2](463356_1_En_2_Chapter.xhtml)章。）
- en: '*w*[0, [*n*]]: Weight 0 at iteration *n*'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*w*[0, [*n*]]: 迭代*n*时的权重0'
- en: '*w*[1, [*n*]]: Weight 1 at iteration *n*'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*w*[1, [*n*]]: 迭代*n*时的权重1'
- en: '*J*(*w*[0, [*n*]], *w*[1, [*n*]]): Cost function at iteration *n*'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*J*(*w*[0, [*n*]], *w*[1, [*n*]]): 迭代*n*时的成本函数'
- en: '*γ*: Learning rate'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*γ*: 学习率'
- en: To show the effect of what I will discuss, we will consider the same problem
    described in the section “Learning Rate in a Practical Example,” in Chapter [2](463356_1_En_2_Chapter.xhtml).
    Plotting the weights *w*[0, *n*], *w*[1, *n*] on the contour lines of the cost
    function for *γ* = 2 (see Figure [4-1](#Fig1)) shows (as you will remember from
    Chapter [2](463356_1_En_2_Chapter.xhtml)) how the values of weights oscillate
    around the minimum of (*w*[0, *n*], *w*[1, *n*]). Here, the problem of a learning
    rate that is too big is clearly visible. The algorithm cannot converge, because
    the steps that it takes are too big to be able to get close to the minimum. The
    different estimates ***w***[***n***] are indicated with points in Figure [4-1](#Fig1).
    The minimum is indicated by the circle approximately in the middle of the image.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示我将要讨论的效果，我们将考虑第二章“实际例子中的学习率”中描述的相同问题。[2](463356_1_En_2_Chapter.xhtml)。在成本函数的等高线上绘制权重
    *w*[0, *n*], *w*[1, *n*]（见图[4-1](#Fig1)），可以显示（正如你从第二章[2](463356_1_En_2_Chapter.xhtml)中记得的那样）权重值是如何围绕
    (*w*[0, *n*], *w*[1, *n*]) 的最小值振荡的。在这里，学习率过大的问题非常明显。算法无法收敛，因为它所采取的步子太大，无法接近最小值。图[4-1](#Fig1)中的点表示不同的估计
    ***w***[***n***]。最小值用图像中间的大约圆形表示。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig1_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig1_HTML.jpg)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig1_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig1_HTML.jpg)'
- en: Figure 4-1
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-1
- en: Illustration of the gradient descent algorithm. Here, the learning rate of *γ* = 2
    has been chosen
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降算法的示意图。在这里，学习率 *γ* = 2 已被选择
- en: 'But you may have noticed that in our algorithm, we made a pretty important
    decision (without stating it explicitly): *we keep the learning rate constant
    for each iteration*. But there is no reason for doing so. On the contrary, it
    is quite a bad idea. Intuitively, a big learning rate will make the convergence
    move fast at the beginning, but as soon as you are around the minimum, you will
    want to use a much smaller learning rate, to allow the algorithm to converge in
    the most efficient way toward the minimum. We want to have a learning rate that
    starts (relatively) big and then decreases with the iterations. But how should
    it decrease? There are several methods that are used today, and in the next section,
    we will look at those used most frequently and how to implement them in Python
    and TensorFlow. We will use the same problem with which Figure [4-1](#Fig1) and
    [2-12](463356_1_En_2_Chapter.xhtml#Fig12) were generated and compare the behavior
    of the different algorithms. Please take some time to review the section in Chapter
    [2](463356_1_En_2_Chapter.xhtml) on gradient descent, to have the material clear
    in your head before reading the next sections.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 但你可能已经注意到，在我们的算法中，我们做出了一个相当重要的决定（虽然没有明确说明）：*我们在每次迭代中保持学习率不变*。但这样做没有理由。相反，这相当糟糕。直观上，大的学习率会在开始时使收敛速度加快，但一旦你接近最小值，你将希望使用一个更小的学习率，以便算法以最有效的方式向最小值收敛。我们希望有一个开始时（相对）较大然后随着迭代次数减少的学习率。但它是如何减少的呢？目前有几种方法被使用，在下一节中，我们将探讨最常用的方法以及如何在Python和TensorFlow中实现它们。我们将使用生成图[4-1](#Fig1)和[2-12](463356_1_En_2_Chapter.xhtml#Fig12)的相同问题，并比较不同算法的行为。请在阅读下一节之前，花些时间回顾第二章中关于梯度下降的部分，以便在脑海中清晰这些材料。
- en: Iterations or Epochs ?
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 迭代或时期？
- en: 'Before looking at the various methods, I would like to shed some light on the
    question: what are the iterations we are talking about? Are they epochs? Technically,
    this is not the case. An iteration is when you update your weights. Consider,
    for example, mini-batch gradient descent. In that case, an iteration occurs after
    each mini-batch (when you update the weights). Consider the Zalando dataset in
    Chapter [3](463356_1_En_3_Chapter.xhtml): 60,000 training cases and a mini-batch
    size of 50\. In that case, you would have 1200 iterations in an epoch. What is
    important for the decrease of the learning rate is the number of updates you perform
    on the weights, not the number of epochs. If you used stochastic gradient descent
    (SGD) on the Zalando dataset (update the weights after each observation), you
    would have 60,000 iterations, and you might need to decrease the learning more
    than with mini-batch gradient descent, because it is updated more often. In the
    case of batch gradient descent, where you update your weight after one complete
    sweep over the training data, you would update the learning rate exactly once
    each epoch.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在查看各种方法之前，我想先谈谈一个问题：我们所说的迭代是什么？是 epoch 吗？技术上，情况并非如此。迭代是指你更新你的权重。以，例如，小批量梯度下降为例。在这种情况下，每次小批量（当你更新权重）之后都会发生迭代。以第
    [3](463356_1_En_3_Chapter.xhtml) 章节中的 Zalando 数据集为例：60,000 个训练案例和批大小为 50。在这种情况下，你在一个
    epoch 中会有 1200 次迭代。对于学习率降低来说，重要的是你在权重上执行更新的次数，而不是 epoch 的数量。如果你在 Zalando 数据集上使用随机梯度下降（SGD）（在每个观察值后更新权重），你会有
    60,000 次迭代，你可能需要比小批量梯度下降降低更多的学习率，因为它更新得更频繁。在批量梯度下降的情况下，你在遍历完整个训练数据后更新权重，你会在每个
    epoch 中恰好更新一次学习率。
- en: Note
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Iterations in dynamic learning rate decay refer to the step in the algorithm
    in which the weights are updated. For example, if you use SGD on the Zalando dataset
    in Chapter [3](463356_1_En_3_Chapter.xhtml), with a mini-batch size of 50, in
    one epoch (a sweep over the 60,000 training observations), you have 1200 iterations.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 动态学习率衰减中的迭代指的是算法中更新权重的步骤。例如，如果你在第 [3](463356_1_En_3_Chapter.xhtml) 章节中使用 SGD
    对 Zalando 数据集进行处理，批大小为 50，在一个 epoch（遍历 60,000 个训练观察值）中，你会有 1200 次迭代。
- en: This is very important to understand correctly. If you do, you can choose the
    parameters of the different algorithms for learning rate decay properly. If you
    choose them thinking that the learning rate is updated only after each epoch,
    you may make big mistakes.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常重要，正确理解这一点后，你可以正确选择不同学习率衰减算法的参数。如果你认为学习率只在每个 epoch 后更新，你可能会犯大错误。
- en: Note
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: For each algorithm that decreases dynamically, the learning rate will introduce
    new hyperparameters that you must optimize, adding some complexity to your model-selection
    process.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个动态降低的学习率算法，学习率将引入新的超参数，你必须优化这些超参数，这会给你的模型选择过程增加一些复杂性。
- en: Staircase Decay
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 阶梯衰减
- en: 'The staircase decay method is the most basic one to use. It consists of reducing
    the learning rate manually in the code and hard-coding the changes, based on what
    seems to work. For example, how can we make the GD algorithm converge in Figure
    [4-1](#Fig1), starting with a *γ* = 2? Let’s consider the following decay (in
    which we have indicated with *j* the iteration number):'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降法中的阶梯衰减方法是最基本的一种。它包括在代码中手动降低学习率，并基于似乎有效的方法进行硬编码。例如，我们如何使 GD 算法在图 [4-1](#Fig1)
    中收敛，起始 *γ* = 2？让我们考虑以下衰减（其中我们用 *j* 表示迭代次数）：
- en: '![$$ \gamma =\Big\{{\displaystyle \begin{array}{c}2\kern0.5em j&lt;4\\ {}0.4\kern0.5em
    j\ge 4\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equc.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \gamma =\Big\{{\displaystyle \begin{array}{c}2\kern0.5em j&lt;4\\ {}0.4\kern0.5em
    j\ge 4\end{array}} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equc.png)'
- en: Simply including this with the Python code
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 简单地将其包含在 Python 代码中
- en: '[PRE0]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: will give a converging algorithm (see Figure [4-2](#Fig2)). Here, the initial
    learning rate of *γ*[0] = 2 has been chosen, and from the iteration 4, *γ* = 0.4
    has been used. The different estimates ***w***[***n***] are indicated with points.
    The minimum is indicated by the circle approximately in the middle of the image.
    The algorithm is now able to converge. Each point has been labeled with the iteration
    number, to make following the weights update easier.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 将给出一个收敛的算法（见图 [4-2](#Fig2)）。在这里，初始学习率 *γ*[0] = 2 已被选择，从迭代 4 开始使用 *γ* = 0.4。不同的估计
    ***w***[***n***] 用点表示。最小值用图像中间的大约圆形表示。现在算法能够收敛。每个点都标有迭代次数，以便更容易地跟踪权重更新。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig2_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig2_HTML.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig2_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig2_HTML.jpg)'
- en: Figure 4-2
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-2
- en: Illustration of gradient descent algorithm with a staircase decay method
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 步长衰减方法的梯度下降算法示意图
- en: 'The first steps are big, and then, as we decrease the learning rate to 0.4
    at iteration 4, they become smaller, and the GD is able to converge toward the
    minimum. With this simple modification , we have achieved a nice result. The problem
    is that when dealing with complicated datasets and models (such as we did in Chapter
    [3](463356_1_En_3_Chapter.xhtml)), this process requires (if it works) a lot of
    tests. You will have to reduce the learning rate several times, and finding the
    right iteration and values for the learning rate decrease is a really challenging
    task, so much so that it is actually not usable, unless you are dealing with very
    easy datasets and networks. The method is also not very stable, and, depending
    on the data you have, may require continuous tuning. TL;DR^([1](#Fn1)): don’t
    use it.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步很大，然后，当我们把学习率降低到 0.4（在迭代 4 时），它们变得较小，GD 能够收敛到最小值。通过这种简单的修改，我们得到了一个很好的结果。问题是，当处理复杂的数据集和模型（如我们在第
    [3](463356_1_En_3_Chapter.xhtml) 章中做的）时，这个过程（如果有效）需要很多测试。你将不得不多次降低学习率，并且找到正确的迭代和学习率降低的值是一项真正的挑战性任务，如此之多以至于实际上不可用，除非你处理的是非常容易的数据集和网络。该方法也不太稳定，并且，根据你的数据，可能需要持续调整。TL;DR^([1](#Fn1))：不要使用它。
- en: Table 4-1
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4-1
- en: Additional Hyperparameters Introduced
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 引入的额外超参数
- en: '| Hyperparameter | Example |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| 超参数 | 示例 |'
- en: '| --- | --- |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| The iteration at which the algorithm will update the learning rate | In this
    example, we choose iteration number 4 |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 算法更新学习率的迭代次数 | 在这个例子中，我们选择迭代次数 4 |'
- en: '| The values of the learning rate after each change (multiple values) | In
    this example, we had, from iteration 1 to 3, *γ* = 2, and, from iteration 4, *γ* = 0.4.
    |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| 每次变化后的学习率值 | 在这个例子中，我们从迭代 1 到 3，*γ* = 2，从迭代 4 开始，*γ* = 0.4。 |'
- en: Step Decay
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步长衰减
- en: Something slightly more automatic is the so-called step decay. This method reduces
    the learning rate by a constant factor every certain number of iterations. Mathematically,
    it can be written as
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 所说的步长衰减稍微自动化一些。这种方法在每一定数量的迭代中通过一个常数因子减少学习率。从数学上讲，它可以写成
- en: '![$$ \gamma =\frac{\gamma_0}{\left\lfloor j/D+1\right\rfloor } $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equd.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \gamma =\frac{\gamma_0}{\left\lfloor j/D+1\right\rfloor } $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Equd.png)'
- en: 'where ⌊*a*⌋ indicates the integer part of *a*, and *D* (indicated in the code
    later with `epoch_drop`) is an integer constant that we can tune. For example,
    using the following code:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ⌊*a*⌋ 表示 *a* 的整数部分，*D*（在后面的代码中用 `epoch_drop` 表示）是一个可以调整的整数常数。例如，使用以下代码：
- en: '[PRE1]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: will again give a convergent algorithm. In Figure [4-3](#Fig3), the initial
    learning rate of *γ*[0] = 2 has been chosen, and every 2 iterations, the learning
    rate decreases according to *γ*[0]/⌊*j*/2+1⌋. The different estimates ***w***[***n***]
    are indicated with points. The minimum is indicated by the circle approximately
    in the middle of the image. The algorithm is now able to converge. Each point
    has been labeled with the iteration number, to make following the weights update
    easier.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 将再次给出一个收敛的算法。在图 [4-3](#Fig3) 中，选择了初始学习率 *γ*[0] = 2，并且每 2 次迭代，学习率根据 *γ*[0]/⌊*j*/2+1⌋
    减少。不同的估计 ***w***[***n***] 用点表示。最小值用图像中间大约的圆圈表示。现在算法能够收敛。每个点都标有迭代次数，以便更容易地跟踪权重更新。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig3_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig3_HTML.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig3_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig3_HTML.jpg)'
- en: Figure 4-3
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-3
- en: Illustration of gradient descent algorithm with step decay
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 步长衰减的梯度下降算法示意图
- en: It is important to have an idea of how fast the learning rate is decreasing.
    You don’t want to have a learning rate close to zero after only a few iterations;
    otherwise, your convergence will never succeed. In Figure [4-4](#Fig4), you can
    see a comparison of how fast (or slow) the learning rate is decreasing for three
    values for *D*.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 了解学习率下降的速度是很重要的。你不想在几次迭代后就有一个接近零的学习率；否则，你的收敛将永远不会成功。在图 [4-4](#Fig4) 中，你可以看到对于三个
    *D* 值，学习率下降的速度（或慢速）的比较。
- en: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig4_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig4_HTML.jpg)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_4_Chapter/463356_1_En_4_Fig4_HTML.jpg](../images/463356_1_En_4_Chapter/463356_1_En_4_Fig4_HTML.jpg)'
- en: Figure 4-4
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-4
- en: 'Decrease in the learning rate for three values of *D*: 10, 20, and 50, using
    the step decay algorithm'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 使用步进衰减算法对三个 *D* 值（10、20 和 50）的学习率下降
- en: Note, for example, how with *D* = 10, the learning rate is roughly 10 times
    smaller after only 100 iterations! If you make your learning rate decrease too
    fast, you may see your convergence grind to a halt after only a few iterations.
    Always try to get an idea of how fast your *γ* is decreasing.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，例如，当 *D* = 10 时，学习率在仅经过 100 次迭代后就大约减小了 10 倍！如果你使学习率下降得太快，你可能会在仅几次迭代后看到你的收敛速度减慢。始终尝试了解你的
    *γ* 是如何下降的。
- en: Note
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: A good way of getting a feel for how fast your learning rate is decreasing is
    to try to determine after how many iterations *γ* is ten times smaller than the
    initial value. Keep in mind that if you get a *γ* = *γ*[0]/10 after 10*D* iterations,
    you will get *γ* = *γ*[0]/100 after only 100*D* iterations, and *γ* = *γ*[0]/10³
    after only 10³*D* iterations, and so on. If this occurs, what is needed can be
    answered only by testing the rate properly with several values of *D*.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解你的学习率下降速度有多快，一个好的方法是尝试确定经过多少次迭代后 *γ* 变为初始值的十分之一。记住，如果在 10*D* 次迭代后你得到 *γ* = *γ*[0]/10，那么在只有
    100*D* 次迭代后，你将得到 *γ* = *γ*[0]/100，而在只有 10³*D* 次迭代后，你将得到 *γ* = *γ*[0]/10³，以此类推。如果发生这种情况，需要通过使用几个
    *D* 的值来正确测试速率才能回答需要什么。
- en: Let’s consider a concrete example. Suppose you are training your model with
    `1e-5` observations for 5000 epochs, with a mini-batch sizes of 50 and a starting
    learning rate of *γ*[0] = 0.2\. If you choose *D* = 10 without thinking, you will
    have
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个具体的例子。假设你用 `1e-5` 的观察值训练模型 5000 个周期，批大小为 50，起始学习率为 *γ*[0] = 0.2。如果你不考虑就选择
    *D* = 10，你将得到
- en: '![$$ \gamma =\frac{\gamma_0}{20000}=\frac{0.2}{20000}={10}^{-5} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Eque.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \gamma =\frac{\gamma_0}{20000}=\frac{0.2}{20000}={10}^{-5} $$](../images/463356_1_En_4_Chapter/463356_1_En_4_Chapter_TeX_Eque.png)'
- en: after only 100 epochs, so you will not gain much by using 5000 epochs if you
    reduce the learning rate so quickly.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在仅 100 个周期后，所以如果你如此快速地降低学习率，使用 5000 个周期并不会带来太多好处。
- en: Table 4-2
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4-2
- en: Additional Hyperparameters Introduced
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 引入的额外超参数
