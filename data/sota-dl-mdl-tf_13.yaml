- en: 'Verify that the GPU is active:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 验证GPU是否激活：
- en: '[PRE1]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If ‘/device:GPU:0’ is displayed, the GPU is active. If ‘..’ is displayed, the
    regular CPU is active.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果显示“/device:GPU:0”，则GPU已激活。如果显示“..”，则常规CPU已激活。
- en: Note
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: If you get the error **NAME ‘TF’ IS NOT DEFINED**, re-execute the code to import
    the TensorFlow library!
  id: totrans-45
