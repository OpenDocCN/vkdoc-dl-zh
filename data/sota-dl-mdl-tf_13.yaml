- en: Object Detection Experiment
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 物体检测实验
- en: We grab images from Google Drive and Wikimedia Commons for the experiment. We
    use the pre-trained *faster_rcnn/openimages_v4/inception_resnet_v2* object detection
    module for image object detection. The object detection model is trained on Open
    Images V4 (version 4) with the ImageNet pre-trained Inception ResNet V2 (version
    2) as the image feature extractor. The module internally performs non-maximum
    suppression. The maximum number of detections outputted is 100\. So it detects
    a maximum of 100 objects in a given scene. Detections are outputted for 600 boxable
    categories. A *boxable category* is one that is capable of (or suitable for) placing
    in a bounding box.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从 Google Drive 和 Wikimedia Commons 中抓取图像用于实验。我们使用预训练的 *faster_rcnn/openimages_v4/inception_resnet_v2*
    对象检测模块进行图像对象检测。该对象检测模型在 Open Images V4（版本 4）上训练，使用 ImageNet 预训练的 Inception ResNet
    V2（版本 2）作为图像特征提取器。该模块内部执行非极大值抑制。输出的最大检测数量为 100。因此，它在一个场景中最多检测 100 个对象。对于 600 个可检测类别，输出检测结果。*可检测类别*
    是指那些能够（或适合）放入边界框中的类别。
- en: '*Open Images* is a dataset of approximately nine million richly annotated images
    with image-level labels, object bounding boxes, object segmentations, visual relationships,
    and local narratives. The images are very diverse and often contain complex scenes
    with several objects (8.4 per scene on average).'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '*Open Images* 是一个包含大约九百万丰富标注图像的数据集，具有图像级标签、对象边界框、对象分割、视觉关系和局部叙述。图片种类繁多，通常包含复杂场景和多个对象（平均每个场景有
    8.4 个对象）。'
- en: The training set of *Open Images V4* contains 14.6 million bounding boxes for
    600 object classes on 1.74 million images, which makes it the largest existing
    dataset with object location annotations (as of this writing). The boxes have
    been largely manually drawn by professional annotators to ensure accuracy and
    consistency. The images are very diverse and often contain complex scenes with
    several objects (8.4 per image on average). Moreover, the dataset is annotated
    with image-level labels spanning thousands of classes.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '*Open Images V4* 的训练集包含在 1.74 百万张图片上的 600 个对象类别，共计 1460 万个边界框，这使得它成为目前最大的具有对象位置标注的数据集（截至本文写作之时）。这些边界框主要由专业标注员手动绘制，以确保准确性和一致性。图片种类繁多，通常包含复杂场景和多个对象（平均每张图片有
    8.4 个对象）。此外，数据集还标注了涵盖数千个类别的图像级标签。'
- en: Note
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: It is recommended to run this module on a GPU to get acceptable inference times.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 建议在 GPU 上运行此模块以获得可接受的推理时间。
- en: Import Requisite Libraries
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 导入必需的库
- en: 'Enable access to the TF-hub module:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 启用对 TF-hub 模块的访问：
- en: '[PRE2]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Access a plotting module:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 访问绘图模块：
- en: '[PRE3]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Access modules for file handling and manipulating data in memory:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 访问文件处理和内存中数据处理模块：
- en: '[PRE4]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This *tempfile* module creates temporary files and directories. The *urlopen*
    module is the uniform resource locator (URL) handling module for Python. It is
    used to fetch a URL. A URL is a reference to a web resource that specifies its
    location on a computer network and a mechanism for retrieving it. The *BytesIO*
    module manipulates byte data in memory.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 *tempfile* 模块用于创建临时文件和目录。*urlopen* 模块是 Python 的统一资源定位符（URL）处理模块。它用于获取 URL。URL
    是对网络资源的引用，它指定了其在计算机网络上的位置以及检索它的机制。*BytesIO* 模块用于在内存中操作字节数据。
- en: 'Access modules from the PIL library:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 从 PIL 库访问模块：
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The *Image* module allows image upload into memory. The remaining modules enable
    image manipulation.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*Image* 模块允许将图像上传到内存。其余模块用于图像处理。'
- en: 'Import NumPy:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 NumPy：
- en: '[PRE6]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Create Functions for the Experiment
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为实验创建函数
- en: 'The first function displays an image:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个函数显示一张图像：
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: We present many different display functions to provide alternative ways to display
    images. For practice, create your own display function (or functions) and use
    it for this experiment.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提供了许多不同的显示函数，以提供显示图像的替代方式。为了实践，创建你自己的显示函数（或函数），并用于这次实验。
- en: The second function draws a bounding box around an image within a scene as shown
    in Listing [13-1](#PC9).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个函数在场景中的图像周围绘制一个边界框，如图 [13-1](#PC9) 所示。
- en: '[PRE8]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The function accepts a processed image, x and y minimum and maximum coordinates,
    color, font, thickness, and a list of display strings. The processed image is
    sent by the *draw_boxes* function, which is presented next. The x and y coordinates
    provide the boundaries of the bounding box for the image. The color, font, thickness,
    and list of strings are provided by the *draw_boxes* function. The remainder of
    the function adds a bounding box to an image.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 函数接受一个处理后的图像、x 和 y 的最小和最大坐标、颜色、字体、粗细和显示字符串列表。处理后的图像由 *draw_boxes* 函数发送，该函数将在下面介绍。x
    和 y 坐标提供了图像边界框的边界。颜色、字体、粗细和字符串列表由 *draw_boxes* 函数提供。函数的其余部分向图像添加一个边界框。
- en: Begin by creating an ImageDraw object and assigning it to variable *draw*. The
    *ImageDraw* module is used to create new images, annotate or retouch existing
    images, and generate graphics on the fly for web use. Image x and y coordinates
    are assigned to variables, and boundary lines are assigned to the ImageDraw object.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 首先创建一个 ImageDraw 对象并将其分配给变量 *draw*。*ImageDraw* 模块用于创建新图像、注释或修复现有图像，并为网络使用动态生成图形。将图像的
    x 和 y 坐标分配给变量，并将边界线分配给 ImageDraw 对象。
- en: The function continues by assigning the list of display strings to variable
    *display_str_heights*. Display strings are used to label the bounding boxes for
    each image in a scene. If the total height of the display strings added to the
    top of the bounding box exceeds the top of the image, we need to stack the strings
    below the bounding box instead of above it. The reason is to ensure that strings
    that identify each image in a bounding box are readable. The *total_display_str_height*
    variable ensures that each display string has a reasonable top and bottom margin
    for display. You can experiment with this value, but the setting is pretty good
    as it is. The next bit of logic checks the top and bottom margins to ensure a
    good fit of the image inside the bounding box container.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 函数继续通过将显示字符串的列表分配给变量 *display_str_heights*。显示字符串用于为场景中每个图像的边界框标记。如果添加到边界框顶部的显示字符串的总高度超过图像的顶部，我们需要将字符串堆叠在边界框下方而不是上方。原因是确保识别每个边界框中图像的字符串可读。*total_display_str_height*
    变量确保每个显示字符串在显示时有合理的顶部和底部边距。您可以尝试调整此值，但当前的设置已经相当好了。接下来的逻辑检查顶部和底部边距，以确保图像在边界框容器内良好适配。
- en: The remainder of the function reverses (with a for loop) the list of display
    strings for display from bottom to top. The *draw.rectangle* method draws a bounding
    box around each image. The *draw.text* method labels each bounding box with its
    appropriate label. When the loop is finished, an image that includes all bounding
    boxes is created.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 函数的其余部分通过循环（for 循环）反转显示字符串的列表，以便从底部到顶部显示。*draw.rectangle* 方法在每个图像周围绘制边界框。*draw.text*
    方法用适当的标签标记每个边界框。当循环完成后，创建一个包含所有边界框的图像。
- en: The third function accepts an image, boxes, class labels, scores, maximum number
    of boxes, and minimum score. The parameters with the exception of the image are
    generated by a pre-trained model. With the accepted parameter values, it overlays
    labeled boxes on an image with formatted scores and label names as shown in Listing [13-2](#PC10).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个函数接受一个图像、边界框、类别标签、分数、最大边界框数量和最小分数。除了图像之外的所有参数都是由预训练模型生成的。使用接受的参数值，它将带有格式化分数和标签名称的标记边界框叠加到图像上，如列表
    [13-2](#PC10) 所示。
- en: '[PRE9]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The draw_boxes function is a container because it accepts the image and dictionaries
    from the pre-trained model, calls *draw_bounding_box_on_image*, and returns an
    image with bounding boxes drawn around detected objects.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: draw_boxes 函数是一个容器，因为它接受来自预训练模型的图像和字典，调用 *draw_bounding_box_on_image*，并返回一个在检测到的对象周围绘制了边界框的图像。
- en: Although the function looks complex, it is pretty straightforward. It creates
    the colors inherent in the image. We need the colors because we recreate the detected
    objects from the scene so we can draw bounding boxes around them. It then creates
    the fonts that we use to label each bounding box. For practice, you can change
    the fonts. It then loops through all of the objects to retrieve (from dictionaries
    output from a pre-trained model) their x and y coordinates in the scene, labels,
    scores, image pixels, and colors to supply to the *draw_bounding_box_on_image*
    function. This function draws the bounding boxes for each object and returns a
    scene with bounding boxed images.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然函数看起来很复杂，但实际上非常直接。它创建了图像中固有的颜色。我们需要颜色，因为我们需要从场景中重新创建检测到的对象，以便在它们周围绘制边界框。然后它创建了用于标记每个边界框的字体。为了练习，你可以更改字体。然后它遍历所有对象，从预训练模型输出的字典中检索场景中的
    x 和 y 坐标、标签、分数、图像像素和颜色，以提供给 *draw_bounding_box_on_image* 函数。此函数为每个对象绘制边界框，并返回带有边界框图像的场景。
- en: Note
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: To avoid confusion, think of the original image as a scene. The pre-trained
    model learns how to identify image objects in the scene. It outputs a set of dictionaries
    that contain information about the objects it detects and coordinates for the
    bounding boxes from the scene. We then draw the bounding boxes from the dictionary
    information. So when we talk about image objects, we mean the objects that are
    detected from the scene.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免混淆，请将原始图像想象成一个场景。预训练模型学习如何识别场景中的图像对象。它输出一系列字典，包含它检测到的对象信息和场景中边界框的坐标。然后我们根据字典信息绘制边界框。所以当我们谈论图像对象时，我们指的是从场景中检测到的对象。
- en: Load a Pre-trained Object Detection Model
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载预训练的对象检测模型
- en: 'Load an object detection module and apply it on the downloaded image:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 加载对象检测模块并将其应用于下载的图像：
- en: '[PRE10]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The pre-trained model is an object detection model trained on Open Images V4
    with ImageNet pre-trained Inception ResNet V2 as the image feature extractor.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练模型是在 Open Images V4 上训练的对象检测模型，使用 ImageNet 预训练的 Inception ResNet V2 作为图像特征提取器。
- en: Open Images is huge! It contains 15,851,536 boxes on 600 categories, 2,785,498
    instance segmentations on 350 categories, 3,284,280 relationship annotations on
    1,466 relationships, 675,155 localized narratives, and 59,919,574 image-level
    labels on 19,957 categories. It also includes an optional extension with 478,000
    crowdsourced images with more than 6,000 categories.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: Open Images 非常庞大！它包含 600 个类别中的 15,851,536 个边界框，350 个类别中的 2,785,498 个实例分割，1,466
    个关系中的 3,284,280 个关系注释，675,155 个局部叙述，以及 19,957 个类别中的 59,919,574 个图像级标签。它还包括一个可选扩展，包含
    478,000 个具有 6,000 多个类别的众包图像。
- en: The module performs non-maximum suppression internally. The maximum number of
    detections outputted is 100\. Detections are outputted for 600 boxable categories.
    It is recommended to run this module on a GPU to get acceptable inference times.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 该模块在内部执行非最大值抑制。输出的最大检测数量为 100。检测输出针对 600 个可检测类别。建议在 GPU 上运行此模块以获得可接受的推理时间。
- en: The model accepts a variable-size three-channel image. It outputs several dictionaries
    including detection_boxes (bounding box coordinates), detection_class_entities
    (detection class names), detection_class_names (human-readable class names), detection_class_labels
    (labels as tensors), and detection_scores (detection scores). Detection scores
    indicate how confident the model is in labeling the object.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型接受一个可变大小的三通道图像。它输出多个字典，包括 detection_boxes（边界框坐标）、detection_class_entities（检测类别名称）、detection_class_names（可读类别名称）、detection_class_labels（作为张量的标签）和
    detection_scores（检测分数）。检测分数表示模型在标记对象时的置信度。
- en: Note
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We provide the details on Open Images for the curious. The pre-trained model
    handles the workload. We just use its outputs to create a visualization.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为好奇者提供了 Open Images 的详细信息。预训练模型处理工作负载。我们只是使用其输出创建可视化。
- en: Load an Image from Google Drive
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从 Google Drive 加载图像
- en: 'Mount Google Drive to the Colab notebook:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 将 Google Drive 挂载到 Colab 笔记本：
- en: '[PRE11]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Be sure that the image is in the *appropriate directory* (i.e., Colab Notebooks)
    in your Google Drive!
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 确保图像位于 Google Drive 中的 *适当目录*（即 Colab 笔记本）！
- en: 'Access and display the image:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 访问和显示图像：
- en: '[PRE12]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Convert the JPEG image to a Python Imaging Library (PIL) image and display it.
    PIL is a library that supports opening, manipulating, and saving many different
    image file formats. It is also known as the Pillow library.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 将 JPEG 图像转换为 Python 图像库 (PIL) 图像并显示。PIL 是一个支持打开、操作和保存多种不同图像文件格式的库。它也被称为 Pillow
    库。
- en: 'Check image size:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 检查图像大小：
- en: '[PRE13]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Prepare the Image
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备图像
- en: 'Generate a temporary path for the image file:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 为图像文件生成一个临时路径：
- en: '[PRE14]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Prepare the image for processing and save it to the temporary file path:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 准备图像以进行处理并将其保存到临时文件路径：
- en: '[PRE15]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Run Object Detection on the Image
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在图像上运行对象检测
- en: 'Create a function to load the image:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数以加载图像：
- en: '[PRE16]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The function loads the image and prepares it for the pre-trained model.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数加载图像并为其准备预训练模型。
- en: Create a function to run object detection as shown in Listing [13-3](#PC18).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数以运行如清单 [13-3](#PC18) 所示的对象检测。
- en: '[PRE17]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: The function accepts the loaded pre-trained model signature and path to the
    image (scene). It loads the image and converts it to a NumPy array for model consumption.
    Run the model signature on the NumPy image. Retrieve the dictionary key/value
    pairs from dictionaries outputted from the pre-trained model. Create a scene with
    bounding boxes around detected objects and display it.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数接受加载的预训练模型签名和图像（场景）的路径。它加载图像并将其转换为NumPy数组以供模型使用。在NumPy图像上运行模型签名。从预训练模型输出的字典中检索字典键/值对。创建一个带有检测对象边界框的场景并显示它。
- en: 'Run the detector:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 运行检测器：
- en: '[PRE18]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: As we know, the pre-trained model is limited to detecting 100 objects. But the
    message is misleading because it says that 100 objects are found no matter what
    scene is fed into the model.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，预训练模型限制在检测100个对象。但信息具有误导性，因为它说无论将什么场景输入到模型中，都会找到100个对象。
- en: Detection is perfect, but don’t get too excited. The model is powerful enough
    to detect images in a simple scene. The scene is simple because the background
    offers no distractions and each dog/cat is separately presented.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 检测完美无缺，但不要过于兴奋。模型足够强大，可以检测简单场景中的图像。场景之所以简单，是因为背景没有干扰，每只狗/猫都是单独呈现的。
- en: 'Let’s try another one:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再试一次：
- en: '[PRE19]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Process the image:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 处理图像：
- en: '[PRE20]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Run the detector:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 运行检测器：
- en: '[PRE21]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Detection is perfect, but the image is simple.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 检测完美无缺，但图像很简单。
- en: Detect Images from Complex Scenes
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从复杂场景中检测图像
- en: 'Let’s try detection on more complex images. We’ve already located some images
    from Wikimedia Commons, but you can locate your own by following a few simple
    steps:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试在更复杂的图像上进行检测。我们已经从维基媒体共享资源找到了一些图像，但您可以通过遵循几个简单的步骤找到自己的图像：
- en: 'Go to the following URL: [`https://commons.wikimedia.org/wiki/Main_Page`](https://commons.wikimedia.org/wiki/Main_Page)'
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往以下URL：[`https://commons.wikimedia.org/wiki/Main_Page`](https://commons.wikimedia.org/wiki/Main_Page)
- en: Click the Images link.
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击图像链接。
- en: Click an image.
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击一张图像。
- en: Right-click the image.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 右键点击图像。
- en: Select “Copy link address” from the drop-down menu.
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择“复制链接地址”。
- en: Paste the link address into a code cell.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将链接地址粘贴到代码单元格中。
- en: Surround the link address with single or double quotes.
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将链接地址用单引号或双引号括起来。
- en: Assign to a variable.
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 赋值给一个变量。
- en: Create a Download Function
  id: totrans-132
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建一个下载函数
- en: Create a function to download, process, and save an image to a temporary file
    path as shown in Listing [13-4](#PC23).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数以下载、处理并将图像保存到临时文件路径，如清单 [13-4](#PC23) 所示。
- en: '[PRE22]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: The function generates a temporary path for the image file. It then reads the
    image file from the supplied URL. The function continues by converting the image
    file to a PIL image. The PIL image is then resized, converted to RGB, and saved
    to the temporary file path. The function ends by returning the filename of the
    PIL image.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数为图像文件生成一个临时路径。然后从提供的URL读取图像文件。函数继续将图像文件转换为PIL图像。然后PIL图像被调整大小，转换为RGB，并保存到临时文件路径。函数最后通过返回PIL图像的文件名结束。
- en: Load an Image Scene
  id: totrans-136
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 加载图像场景
- en: 'Load a scene from a Wikimedia Commons URL:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 从维基媒体共享资源URL加载场景：
- en: '[PRE23]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The source for the image scene is located at
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图像场景的来源位于
- en: '[`https://commons.wikimedia.org/wiki/File:At_taverna_under_the_church,_Ano_Potamia,_Naxos,_190574.jpg`](https://commons.wikimedia.org/wiki/File:At_taverna_under_the_church,_Ano_Potamia,_Naxos,_190574.jpg)'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '[`https://commons.wikimedia.org/wiki/File:At_taverna_under_the_church,_Ano_Potamia,_Naxos,_190574.jpg`](https://commons.wikimedia.org/wiki/File:At_taverna_under_the_church,_Ano_Potamia,_Naxos,_190574.jpg)'
- en: Detect
  id: totrans-141
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 检测
- en: 'Run object detection:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 运行对象检测
- en: '[PRE24]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: With a more complex scene, detection is not perfect. But it does make some correct
    detections.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在更复杂的场景中，检测并不完美。但它确实进行了一些正确的检测。
- en: Detect on More Scenes
  id: totrans-145
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在更多场景中进行检测
- en: Piece together some paths as shown in Listing [13-5](#PC26).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 按照清单 [13-5](#PC26) 所示拼接一些路径。
- en: '[PRE25]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Create a function to detect images in a scene:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数以检测场景中的图像：
- en: '[PRE26]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Run object detection on one of the scenes:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在场景之一上运行对象检测
- en: '[PRE27]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: So scene complexity limits detection accuracy.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，场景的复杂性限制了检测的准确性。
- en: 'Try one more:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 再试一次：
- en: '[PRE28]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Find the Source
  id: totrans-155
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 找到来源
- en: We sometimes come across Wikimedia Commons images in our research. But the sources
    of such images are never (at least in our experience) included. If we want to
    use the image in any way, we must locate its source to see if it is permitted.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在研究过程中有时会遇到维基百科 Commons 图片。但此类图片的来源从未（至少在我们经验中）被包括。如果我们想以任何方式使用图片，我们必须找到其来源以查看是否允许。
- en: Find the Source of a Wikipedia Commons Image
  id: totrans-157
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 查找维基百科 Commons 图片的来源
- en: 'We can find the source of an image with a few steps:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过几个步骤找到图片的来源：
- en: Substitute *commons* for *upload.*
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 *commons* 替换为 *upload.*
- en: Change *wikipedia* to *wiki.*
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 *wikipedia* 替换为 *wiki.*
- en: Substitute *commons/(number)/(number)* for *File:*
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 *commons/(number)/(number)* 替换为 *File:*
- en: Translate the *%(number)* to its *HTML encoded equivalent.*
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 *%(number)* 翻译为其 *HTML 编码的等效值*。
- en: To find the HTML encoded equivalent, peruse
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到 HTML 编码的等效值，请查阅
- en: '[`https://krypted.com/utilities/html-encoding-reference/`](https://krypted.com/utilities/html-encoding-reference/)'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '[HTML 编码参考](https://krypted.com/utilities/html-encoding-reference/)'
- en: Note
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We cannot guarantee that this process works for every image, but it works for
    the ones that we have used.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不能保证这个过程适用于每张图片，但它适用于我们使用的那些图片。
- en: 'Let’s try the process on the tavern image:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试对酒馆图片进行此过程：
- en: '[`https://upload.wikimedia.org/wikipedia/commons/4/45/Green_Dragon_Tavern_%2836196%29.jpg`](https://upload.wikimedia.org/wikipedia/commons/4/45/Green_Dragon_Tavern_%252836196%2529.jpg)'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '[绿龙酒馆图片](https://upload.wikimedia.org/wikipedia/commons/4/45/Green_Dragon_Tavern_%252836196%2529.jpg)'
- en: 'Substitute *commons* for *upload*:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '将 *commons* 替换为 *upload*:'
- en: '[`https://commons.wikimedia.org/wikipedia/commons/4/45/Green_Dragon_Tavern_%2836196%29.jpg`](https://commons.wikimedia.org/wikipedia/commons/4/45/Green_Dragon_Tavern_%252836196%2529.jpg)'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '[绿龙酒馆图片](https://commons.wikimedia.org/wikipedia/commons/4/45/Green_Dragon_Tavern_%2836196%29.jpg)'
- en: 'Change *wikipedia* to *wiki*:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '将 *wikipedia* 替换为 *wiki*:'
- en: '[`https://commons.wikimedia.org/wiki/commons/4/45/Green_Dragon_Tavern_%2836196%29.jpg`](https://commons.wikimedia.org/wiki/commons/4/45/Green_Dragon_Tavern_%252836196%2529.jpg)'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '[绿龙酒馆图片](https://commons.wikimedia.org/wiki/commons/4/45/Green_Dragon_Tavern_%2836196%29.jpg)'
- en: 'Substitute *commons/(number)/(number)* for *File*:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '将 *commons/(number)/(number)* 替换为 *File*:'
- en: '[`https://commons.wikimedia.org/wiki/File:Green_Dragon_Tavern_%2836196%29.jpg`](https://commons.wikimedia.org/wiki/File:Green_Dragon_Tavern_%252836196%2529.jpg)'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '[绿龙酒馆图片](https://commons.wikimedia.org/wiki/File:Green_Dragon_Tavern_%252836196%2529.jpg)'
- en: 'Translate:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译：
- en: '[`https://commons.wikimedia.org/wiki/File:Green_Dragon_Tavern_(36196).jpg`](https://commons.wikimedia.org/wiki/File:Green_Dragon_Tavern_%252836196%2529.jpg)'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '[绿龙酒馆图片](https://commons.wikimedia.org/wiki/File:Green_Dragon_Tavern_(36196).jpg)'
- en: The %28 and %29 codes translate into left and right parentheses from the HTML
    Encoding Reference.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '%28 和 %29 代码在 HTML 编码参考中转换为左右括号。'
- en: 'The casino image is easier because we don’t have to do any translations:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 赌场图片更容易，因为我们不需要进行任何翻译：
- en: '[`https://commons.wikimedia.org/wiki/File:Circus_Circus_Hotel-Casino_sign.jpg`](https://commons.wikimedia.org/wiki/File:Circus_Circus_Hotel-Casino_sign.jpg)'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '[马戏团酒店-赌场标志图片](https://commons.wikimedia.org/wiki/File:Circus_Circus_Hotel-Casino_sign.jpg)'
- en: 'Here are the sources for the remaining images:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是剩余图片的来源：
- en: '[`https://commons.wikimedia.org/wiki/File:Leon_hot_air_balloon_festival_2010.jpg`](https://commons.wikimedia.org/wiki/File:Leon_hot_air_balloon_festival_2010.jpg)'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '[莱昂热气球节2010年图片](https://commons.wikimedia.org/wiki/File:Leon_hot_air_balloon_festival_2010.jpg)'
- en: '[`https://commons.wikimedia.org/wiki/File:2012_Festival_of_Sail_-_7943922284.jpg`](https://commons.wikimedia.org/wiki/File:2012_Festival_of_Sail_-_7943922284.jpg)'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '[2012年帆船节图片](https://commons.wikimedia.org/wiki/File:2012_Festival_of_Sail_-_7943922284.jpg)'
- en: '[`https://commons.wikimedia.org/wiki/File:17_mai_2018.jpg`](https://commons.wikimedia.org/wiki/File:17_mai_2018.jpg)'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '[2018年5月17日图片](https://commons.wikimedia.org/wiki/File:17_mai_2018.jpg)'
- en: '[`https://commons.wikimedia.org/wiki/File:Fruit_baskets.jpg`](https://commons.wikimedia.org/wiki/File:Fruit_baskets.jpg)'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '[水果篮图片](https://commons.wikimedia.org/wiki/File:Fruit_baskets.jpg)'
- en: '[`https://commons.wikimedia.org/wiki/File:Fruit_stands,_Rue_de_Seine,_Paris_22_May_2014.jpg`](https://commons.wikimedia.org/wiki/File:Fruit_stands,_Rue_de_Seine,_Paris_22_May_2014.jpg)'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '[塞纳河畔水果摊，巴黎，2014年5月22日图片](https://commons.wikimedia.org/wiki/File:Fruit_stands,_Rue_de_Seine,_Paris_22_May_2014.jpg)'
- en: '[`https://commons.wikimedia.org/wiki/File:Wine_tasting_@_brown_brothers.jpg`](https://commons.wikimedia.org/wiki/File:Wine_tasting_%2540_brown_brothers.jpg)'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '[葡萄酒品鉴 @ 布朗兄弟](https://commons.wikimedia.org/wiki/File:Wine_tasting_%2540_brown_brothers.jpg)'
- en: Summary
  id: totrans-187
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We used a powerful pre-trained image detector model on several image scenes
    to demonstrate object detection. The model worked extremely well on simple scenes,
    but not as well on complex ones. As object detection in deep learning continues
    to evolve, we are confident that future models will vastly improve detection capability.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在几个图像场景上使用了一个强大的预训练图像检测模型来展示目标检测。该模型在简单场景上工作得非常好，但在复杂场景上则不那么理想。随着深度学习中的目标检测技术不断进步，我们相信未来的模型将大大提高检测能力。
