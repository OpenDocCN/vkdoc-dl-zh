- en: 13. Object Detection
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 13. 目标检测
- en: '**Object detection** is an automated computer vision technique for locating
    instances of objects in digital photographs or videos. Specifically, object detection
    draws bounding boxes around one or more effective targets located in a still image
    or video data. An **effective target** is the object of interest in the image
    or video data that is being investigated. The effective target (or targets) should
    be known at the beginning of the task.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标检测**是一种自动化的计算机视觉技术，用于在数字照片或视频中定位对象的实例。具体来说，目标检测在静态图像或视频数据中围绕一个或多个有效目标绘制边界框。一个**有效目标**是正在调查的图像或视频数据中感兴趣的对象。有效目标（或目标）应在任务开始时已知。'
- en: Object Detection in a Natural Scene
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自然场景中的目标检测
- en: Detecting objects in natural scenes is effortless for us, but extremely challenging
    for computer algorithms. As humans, we look at a scene and identify objects of
    interest without a thought. We process visual data in the ventral visual stream,
    which is a hierarchy of areas in the brain that helps in object recognition. We
    recognize different types and sizes of objects and categorize them with the aid
    of cells in our visual cortex that respond to simple shapes like lines and curves.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们来说，在自然场景中检测对象是轻而易举的，但对于计算机算法来说却极具挑战性。作为人类，我们看一个场景并识别感兴趣的对象，无需思考。我们在腹侧视觉流中处理视觉数据，这是一个大脑中帮助识别对象的区域层次结构。我们识别不同类型和大小的对象，并借助视觉皮层中响应简单形状（如线条和曲线）的细胞对它们进行分类。
- en: With object detection, data scientists attempt to mimic what humans do with
    computer algorithms. But before a computer algorithm can even begin to detect
    objects, a natural scene must be captured as a digital image (or digital video).
    A **digital image** is composed of picture elements (or pixels). A **pixel** is
    the basic logical unit in digital graphics. Simply, a pixel is a tiny square of
    color.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 使用目标检测，数据科学家试图模仿人类用计算机算法所做的事情。但在计算机算法甚至开始检测对象之前，必须将自然场景捕获为数字图像（或数字视频）。一个**数字图像**由图像元素（或像素）组成。一个**像素**是数字图形中的基本逻辑单元。简单来说，像素是一个微小的彩色方块。
- en: Pixels are uniformly combined in a two-dimensional (2D) grid to form a complete
    digital image, video, text or any visible element on a computer display. Each
    pixel has a specific number, and this number tells the algorithm its color. The
    number represents the pixel intensity value. The pixel intensity value represents
    a grayscale or color image.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 像素在二维（2D）网格中均匀组合，形成一个完整的数字图像、视频、文本或计算机显示上的任何可见元素。每个像素都有一个特定的数值，这个数值告诉算法其颜色。这个数值代表像素强度值。像素强度值代表灰度或彩色图像。
- en: In grayscale images, each pixel represents the intensity of only one color.
    So a grayscale image can be represented by a single 2D matrix (or grid). In the
    standard RGB system, color images have three channels (red, green, and blue).
    So a color image can be represented by three 2D matrices. One matrix represents
    the intensity of red in the pixel. One represents the intensity of green in the
    pixel. And one represents the intensity of blue in the pixel.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在灰度图像中，每个像素只代表一种颜色的强度。因此，灰度图像可以用一个单一的二维矩阵（或网格）表示。在标准的RGB系统中，彩色图像有三个通道（红色、绿色和蓝色）。因此，彩色图像可以用三个二维矩阵表示。一个矩阵代表像素中红色的强度。一个代表像素中绿色的强度。还有一个代表像素中蓝色的强度。
- en: Each matrix is considered a color channel. A **color channel** is an array of
    values (one per pixel) that together specify one aspect or dimension of the image.
    So RGB color contains three color channels – red, green, and blue. Each color
    channel is expressed from 0 (least saturated) to 255 (most saturated). So 16,777,216
    (256³) different colors can be represented in the RGB color space by combining
    red, green, and blue pixel intensities.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 每个矩阵被视为一个颜色通道。一个**颜色通道**是一组值（每个像素一个）的组合，共同指定图像的一个方面或维度。因此，RGB颜色包含三个颜色通道——红色、绿色和蓝色。每个颜色通道从0（最不饱和）到255（最饱和）表示。因此，通过组合红色、绿色和蓝色的像素强度，RGB颜色空间可以表示16,777,216（256³）种不同的颜色。
- en: Once a digital image is captured as a grayscale (2D matrix) or color (three
    color channel 2D matrices) image, it is processed for model consumption. Only
    then can computer algorithms inspect each 2D grid of pixel values to begin identifying
    patterns.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦将数字图像捕获为灰度（2D矩阵）或彩色（三个颜色通道的2D矩阵）图像，它就会经过处理以供模型使用。只有在这种情况下，计算机算法才能检查每个像素值的二维网格，以开始识别模式。
- en: Detection vs. Classification
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检测与分类
- en: Image classification presents an input image to a neural network so it can learn
    a single class label associated with the image. The network can also learn the
    probability associated with the class label. The learned class label characterizes
    the contents of the entire image or at least the most dominant and visible contents
    of the image. So an image classification network is able to learn how to correctly
    label an image of a cat.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图像分类将输入图像呈现给神经网络，以便它能够学习与图像相关的单个类别标签。网络还可以学习与类别标签相关的概率。学习到的类别标签描述了整个图像的内容，或者至少是图像中最主要和最明显的部分。因此，图像分类网络能够学习如何正确地标记一张猫的图片。
- en: Object detection presents an input image to a neural network so it can learn
    the exact location of an image in a picture object (or scene). To locate input
    images in a scene, object detection algorithms create a list of bounding boxes
    for each object in the picture. Bounding boxes are created as the (x, y) coordinate
    input image locations. The algorithms also identify the class labels associated
    with each bounding box and the probability/confidence score associated with each
    bounding box and class label.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 目标检测将输入图像呈现给神经网络，以便它能够学习图像在图片对象（或场景）中的确切位置。为了在场景中定位输入图像，目标检测算法为图片中的每个对象创建一个边界框列表。边界框作为输入图像的(x,
    y)坐标位置创建。算法还识别与每个边界框和类别标签相关的类别标签以及与每个边界框和类别标签相关的概率/置信度分数。
- en: Simply, image classification involves one image into the network and one class
    label out. Object detection involves one image into the network and multiple bounding
    boxes and their associated class labels out.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，图像分类涉及将一张图像输入网络，并输出一个类别标签。目标检测涉及将一张图像输入网络，并输出多个边界框及其相关的类别标签。
- en: Object detection is commonly applied to count, locate, and label objects in
    a scene with precision. Neural networks are the state-of-the-art methods for object
    detection. Convolutional neural networks are frequently used to automatically
    learn inherent features of an object to identify them within an image by differentiating
    it from its background.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 目标检测通常用于精确地计数、定位和标记场景中的对象。神经网络是目标检测的最先进方法。卷积神经网络常用于自动学习对象的固有特征，通过将其与背景区分开来，在图像中识别它们。
- en: Whereas image classification involves assigning a class label to an image, object
    localization involves drawing a bounding box around one or more objects in an
    image scene. So classification separates images into different classes, while
    object localization identifies effective targets in an image scene. Object detection
    is more challenging than localization because it combines classification and object
    localization to learn how to draw a bounding box around each object of interest
    in the image (or effective target) and assign it a class label. The difference
    between object localization and object detection is subtle. Object localization
    aims to locate the main (or most visible) object in an image scene, while object
    detection tries to find out all the objects and their boundaries.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 与图像分类涉及将类别标签分配给图像不同，目标定位涉及在图像场景中围绕一个或多个对象绘制边界框。因此，分类将图像分为不同的类别，而目标定位则识别图像场景中的有效目标。目标检测比定位更具挑战性，因为它结合了分类和目标定位，以学习如何在图像中围绕每个感兴趣的对象（或有效目标）绘制边界框并为其分配类别标签。目标定位和目标检测之间的区别很微妙。目标定位旨在定位图像场景中的主要（或最明显的）对象，而目标检测则试图找出所有对象及其边界。
- en: Imagine that an image contains two cats and a person. Object detection networks
    are able to locate instances of entities and classify the types of entities found
    within the image. So an object detection network can locate two cats and a person
    in this image and classify them correctly.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下一张图片中包含两只猫和一个人。目标检测网络能够定位实体实例并分类图像中发现的实体类型。因此，目标检测网络可以在这张图片中定位两只猫和一个人，并正确地分类它们。
- en: Object detection is commonly confused with image recognition. So how are they
    different? Image recognition assigns a label to an image. A picture of a dog receives
    the label *dog*. A picture of two dogs still receives the label *dog*. Object
    detection, however, draws a bounding box around each dog and labels the box as
    *dog*. The model predicts where each object is in the image and the label that
    should be applied to it. So object detection provides more information about an
    image than recognition.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 对象检测通常与图像识别混淆。那么它们有什么不同？图像识别为图像分配一个标签。一只狗的图片收到标签*dog*。两只狗的图片仍然收到标签*dog*。然而，对象检测却在每个狗周围画一个边界框，并将该框标记为*dog*。模型预测每个对象在图像中的位置及其应应用的标签。因此，对象检测比识别提供了更多关于图像的信息。
- en: Bounding Boxes
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 边界框
- en: A **bounding box** is an imaginary rectangle that serves as a point of reference
    for object detection and creates a collision box for that object. The area of
    a bounding box (usually shortened to *bbox*) is defined by two longitudes and
    two latitudes where latitude is a decimal number between –90.0 and 90.0 and longitude
    is a decimal number between –180.0 and 180.0\. Data annotators draw bbox rectangles
    to outline an object of interest within each image (scene) by defining its x and
    y coordinates.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**边界框**是一个想象中的矩形，用作对象检测的参考点，并为该对象创建一个碰撞框。边界框的面积（通常简称为*bbox*）由两个经度和两个纬度定义，其中纬度是介于-90.0和90.0之间的十进制数，经度是介于-180.0和180.0之间的十进制数。数据标注员通过定义其x和y坐标来绘制bbox矩形，以在每个图像（场景）中勾勒出感兴趣的对象。'
- en: A hitbox (or collision box) is an invisible shape commonly used in video games
    for real-time collision detection. So it is a type of bounding box. It is often
    a rectangle (in 2D games) or cuboid (in 3D) that is attached to and follows a
    point on a visible object (such as a model or a sprite).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 击中框（或碰撞框）是在视频游戏中常用的一种不可见形状，用于实时碰撞检测。因此，它是一种边界框。它通常是一个矩形（在2D游戏中）或长方体（在3D中），它附着并跟随一个可见对象上的一个点（例如模型或精灵）。
- en: Basic Structure
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本结构
- en: Deep learning object detection models typically have two parts. An *encoder*
    takes an image as input and runs it through a series of blocks and layers that
    learn to extract statistical features used to locate and label objects. Outputs
    from the encoder are then passed to a *decoder*, which predicts bounding boxes
    and labels for each object.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习对象检测模型通常有两个部分。一个*编码器*接受图像作为输入，并通过一系列块和层运行它，这些块和层学会提取用于定位和标记对象的统计特征。编码器的输出随后传递给一个*解码器*，该解码器预测每个对象的边界框和标签。
- en: The simplest decoder is a pure regressor. A regressor is the name given to any
    variable in a regression model that is used to predict a response variable. A
    regressor is also referred to as an explanatory variable, an independent variable,
    a manipulated variable, a predictor variable or a feature. The whole point of
    building a regression model is to understand how changes in a regressor lead to
    changes in a response variable (or regressand). So a regressor is a feature, and
    a regressand is a response variable (or target).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的解码器是纯回归器。回归器是指任何用于预测响应变量的回归模型中的变量。回归器也被称为解释变量、自变量、操作变量、预测变量或特征。构建回归模型的整体目的是理解回归器的变化如何导致响应变量（或回归和）的变化。因此，回归器是一个特征，而回归和是一个响应变量（或目标）。
- en: '**Regression** is a supervised ML technique used to predict continuous values.
    The goal of a regression algorithm is to plot a best-fit line or a curve between
    the data. A regressor is connected to the output of the encoder and directly predicts
    the location and size of each bounding box.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**回归**是一种监督式机器学习技术，用于预测连续值。回归算法的目标是在数据之间绘制最佳拟合线或曲线。回归器连接到编码器的输出，并直接预测每个边界框的位置和大小。'
- en: The output of a regressor model is the x, y coordinate pair for the object and
    its extent (or intensity) in the image. But a regressor is limited because we
    need to specify the number of boxes ahead of time. If an image has two dogs but
    the regressor model was designed to detect a single object, one of the dogs goes
    unlabeled. But if we know the number of objects we need to predict in each image
    ahead of time, pure regressor-based models may be a good option.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 回归器模型的输出是对象在图像中的x，y坐标对及其范围（或强度）。但回归器有限制，因为我们需要提前指定框的数量。如果一个图像中有两只狗，但回归器模型被设计为检测单个对象，其中一只狗将不会被标记。但如果我们提前知道每个图像中需要预测的对象数量，纯回归器模型可能是一个不错的选择。
- en: An extension of the regressor approach is a region proposal network. The decoder
    in a region proposal network proposes regions of an image where it believes an
    object might reside. The pixels belonging to these regions are then fed into a
    classification subnetwork to determine a label (or reject the proposal). The network
    then runs the pixels containing those regions through a classification network.
    The benefit of this method is a more accurate and flexible model that can propose
    arbitrary numbers of regions that may contain a bounding box. But the added accuracy
    comes at the cost of computational efficiency.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 回归器方法的扩展是区域提议网络。区域提议网络中的解码器提议图像中可能存在对象的区域。然后，将这些区域的像素输入到分类子网络中，以确定标签（或拒绝提议）。然后，网络将包含这些区域的像素通过分类网络。这种方法的好处是更准确、更灵活的模型，可以提出任意数量的可能包含边界框的区域。但增加的准确性是以计算效率为代价的。
- en: A single shot detector (SSD) seeks a middle ground. Rather than using a subnetwork
    to propose regions, a SSD relies on a set of predetermined regions. A grid of
    anchor points is laid over the input image. At each anchor point, boxes of multiple
    shapes and sizes serve as regions. For each box at each anchor point, the model
    outputs a prediction of whether or not an object exists within the region and
    modifications to the box’s location and size to make it fit the object more precisely.
    Because there are multiple boxes at each anchor point and anchor points may be
    close together, a SSD produces many potential detections that overlap. So post-processing
    must be applied to SSD outputs to cull the best one by pruning deficient ones.
    The most popular post-processing technique for SDD is non-maximum suppression.
    *Non-max suppression* is used to select the most appropriate bounding box for
    an object.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 单次射击检测器（SSD）寻求一个中间地带。而不是使用子网络来提出区域，SSD依赖于一组预定的区域。在输入图像上放置一个锚点网格。在每一个锚点上，多个形状和大小的框作为区域。对于每个锚点上的每个框，模型输出一个预测，以确定该区域内是否存在对象，以及修改框的位置和大小以使其更精确地适应对象。因为每个锚点有多个框，且锚点可能彼此靠近，所以SSD会产生许多潜在的检测，这些检测可能重叠。因此，必须对SSD输出进行后处理，通过剪枝不足的检测来筛选出最佳的一个。SDD最流行的后处理技术是非最大值抑制。*非最大值抑制*用于选择对象的最合适的边界框。
- en: Object detectors output the location and label for each object, but how do we
    measure performance? The most common metric for object location is intersection-over-union
    (IOU). Given two bounding boxes, IOU computes the area of the intersection and
    divides by the area of the union. The value ranges from 0 (no interaction) to
    1 (perfectly overlapping). A simple percent correct metric can be used for labels.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 物体检测器输出每个对象的定位和标签，但我们如何衡量性能？物体定位最常用的指标是交并比（IOU）。给定两个边界框，IOU计算交集的面积，并将其除以并集的面积。值范围从0（无交互）到1（完全重叠）。可以使用简单的正确百分比指标来衡量标签。
