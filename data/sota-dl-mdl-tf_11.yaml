  zh: '[PRE46]'
- en: 'Get image type:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 获取图像类型：
- en: '[PRE47]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Create a function to display learned images as shown in Listing [11-7](#PC49).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来显示如图11-7所示的学习图像：
- en: '[PRE48]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: 'Display the closest latent images between the feature and target:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 显示特征和目标之间的最接近的潜在图像：
- en: '[PRE49]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: During each step of the training loop, the function generates a new image by
    leveraging the pre-trained weights from progan-128\. It then computes the loss
    between the newly generated image and the target. Gradually, through gradient
    descent and loss minimization techniques, images become more and more similar
    to the target. It’s magic!
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练循环的每一步中，该函数通过利用progan-128的预训练权重生成一个新的图像。然后，它计算新生成的图像与目标之间的损失。通过梯度下降和损失最小化技术，图像逐渐变得更加接近目标。这是魔法！
- en: 'Contrast the first generated image against the target:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 将第一个生成的图像与目标进行对比：
- en: '[PRE50]'
