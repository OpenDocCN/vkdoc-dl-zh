- en: Instead of creating a target image with progan-128 from a latent vector, create
    a target image with progan-128 from an uploaded image vector.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是从潜在向量使用progan-128创建目标图像，而是从上传的图像向量使用progan-128创建目标图像。
- en: 'Generate a seed and create an initial feature vector from the latent space:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 生成一个种子并从潜在空间创建一个初始特征向量：
- en: '[PRE61]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: Notice that we use a different seed value. Of course, you can use any seed value
    you wish. But always use the same seed value across experiments for reproducibility.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们使用了不同的种子值。当然，您可以使用任何您想要的种子值。但始终在实验中使用相同的种子值以确保可重复性。
- en: 'Grab an image from a local drive and display:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 从本地驱动器获取一张图像并显示：
- en: '[PRE62]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: 'Convert the uploaded image to float32 for TensorFlow consumption:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 将上传的图像转换为float32以供TensorFlow使用：
