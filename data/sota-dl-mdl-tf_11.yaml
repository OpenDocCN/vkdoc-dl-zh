- en: 'Install the logging module on top of standard logging:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在标准日志模块之上安装日志模块：
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The logging module is from the Abseil Python package, which provides various
    libraries for building Python applications. The module defines functions and classes
    that allow designers to build a flexible event logging system for applications
    and libraries. The key benefit of the logging API is that all Python modules can
    participate in logging. So our application log can include its own messages integrated
    with messages from third-party modules.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 日志模块来自Abseil Python包，该包为构建Python应用程序提供各种库。该模块定义了函数和类，允许设计人员为应用程序和库构建灵活的事件日志系统。日志API的关键优势是所有Python模块都可以参与日志记录。因此，我们的应用程序日志可以包括其自己的消息，这些消息与第三方模块的消息集成。
- en: 'Install image processing libraries:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 安装图像处理库：
- en: '[PRE4]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The *imageio* library provides an easy interface to read and write a wide range
    of image data including animated images, volumetric data, and scientific formats.
    The *PIL.Image* module is used to represent a Python Imaging Library (PIL) image.
    The library adds support for opening, manipulating, and saving many different
    image file formats. The *plt* library is used for displaying images. The *display*
    module is a public API for display tools in IPython. *IPython* is an interactive
    shell built with Python. The *transform* module is used for image processing.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '*imageio* 库提供了一个易于使用的接口，用于读取和写入各种图像数据，包括动画图像、体积数据和科学格式。*PIL.Image* 模块用于表示 Python
    Imaging Library (PIL) 图像。该库增加了对打开、操作和保存许多不同图像文件格式的支持。*plt* 库用于显示图像。*display* 模块是
    IPython 中显示工具的公共 API。*IPython* 是一个用 Python 构建的交互式外壳。*transform* 模块用于图像处理。'
- en: 'Import other requisite libraries:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 导入其他必需的库：
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '*NumPy* is a Python library used for working with scalars, arrays, and matrices.
    The *hub* module allows access to TensorFlow Hub, which is a repository of trained
    machine learning models. The *embed* module is used to embed animation in a notebook.
    The *time* library provides many ways of representing time in code such as objects,
    numbers, and strings.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '*NumPy* 是一个用于处理标量、数组和矩阵的 Python 库。*hub* 模块允许访问 TensorFlow Hub，这是一个训练好的机器学习模型的存储库。*embed*
    模块用于在笔记本中嵌入动画。*time* 库提供了许多在代码中表示时间的方法，如对象、数字和字符串。'
- en: Create Functions for Image Display
