- en: Latent Vectors and Image Arrays
  id: totrans-337
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 潜在向量和图像数组
- en: The progan-128 module generates a new image from either a latent vector of size
    (1, 512) or float vector of size 128 × 128 × 3\. A latent vector accepted by progan-128
    is a one-dimensional vector of size 512\. A float vector accepted by progan-128
    is a 128 × 128 × 3-pixel vector.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: progan-128 模块可以从大小为 (1, 512) 的潜在向量或大小为 128 × 128 × 3 的 float 向量生成新的图像。progan-128
    接受的潜在向量是一个大小为 512 的一维向量。progan-128 接受的 float 向量是一个 128 × 128 × 3 像素的向量。
- en: The progan-128 module is an image generator based on the TensorFlow re-implementation
    of Progressive GANs. It maps from a 512-dimensional latent space to images. During
    training, latent space vectors are sampled from a normal distribution.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: progan-128 模块是基于 TensorFlow 重实现的渐进式 GANs 的图像生成器。它将 512 维的潜在空间映射到图像。在训练过程中，潜在空间向量是从正态分布中采样的。
- en: According to the documentation, progan-128 takes an input tensor with datatype
    float32 and shape (?, 512). The input tensor to progan-128 represents a batch
    of latent vectors. The output from progan-128 is a float tensor with shape (?,
    128, 128, 3), which represents a batch of RGB images. We can also generate a new
    image from an image array, which is not included in the documentation.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 根据文档，progan-128 接收一个数据类型为 float32、形状为 (?, 512) 的输入张量。progan-128 的输入张量代表一批潜在向量。progan-128
    的输出是一个形状为 (?, 128, 128, 3) 的 float 张量，它代表一批 RGB 图像。我们还可以从一个图像数组生成一个新的图像，但这在文档中并未提及。
- en: To view progan-128 documentation, peruse
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看 progan-128 文档，请查阅
- en: '[`https://tfhub.dev/google/progan-128/1`](https://tfhub.dev/google/progan-128/1)'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: '[`https://tfhub.dev/google/progan-128/1`](https://tfhub.dev/google/progan-128/1)'
- en: Generate a New Image from a Latent Vector
  id: totrans-343
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从潜在向量生成新的图像：
- en: 'Create a random normal vector from the latent space:'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 从潜在空间创建一个随机正态向量：
- en: '[PRE96]'
  id: totrans-345
  prefs: []
  type: TYPE_PRE
  zh: '[PRE96]'
- en: The tf.random.normal API outputs random values from a normal distribution. So
    the new vector consists of 512 randomly drawn values from a normal distribution
    based on our latent space.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: tf.random.normal API 从正态分布输出随机值。因此，新向量由从我们的潜在空间中随机抽取的 512 个正态分布值组成。
- en: 'Convert the tensor to NumPy to enable inspection:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 将张量转换为 NumPy 以便检查：
- en: '[PRE97]'
  id: totrans-348
  prefs: []
  type: TYPE_PRE
  zh: '[PRE97]'
- en: 'Inspect some elements from the NumPy array:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 检查 NumPy 数组的一些元素：
- en: '[PRE98]'
  id: totrans-350
  prefs: []
  type: TYPE_PRE
  zh: '[PRE98]'
- en: Each element in the new vector represents a latent dimension (or latent variable)
    that cannot be directly observed, but can be assumed to exist. Since latent dimensions
    exist, they can be used to explain patterns of variation in observed variables.
    In our experiment, observed variables represent CelebA images. So we can feed
    progan-128 the new vector to generate a new image.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 新向量中的每个元素代表一个潜在维度（或潜在变量），这些维度无法直接观察到，但可以假设其存在。由于潜在维度存在，它们可以用来解释观察变量中的变化模式。在我们的实验中，观察变量代表
    CelebA 图片。因此，我们可以将新向量输入到 progan-128 中以生成新的图片。
- en: 'Create a float output tensor from the latent space with progan-128:'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 progan-128 从潜在空间创建一个浮点输出张量：
- en: '[PRE99]'
  id: totrans-353
  prefs: []
  type: TYPE_PRE
  zh: '[PRE99]'
- en: 'Display the float output tensor as an image:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 将浮点输出张量显示为图片：
- en: '[PRE100]'
  id: totrans-355
  prefs: []
  type: TYPE_PRE
  zh: '[PRE100]'
- en: So progan-128 generates a 128 × 128 × 3 image from a latent vector.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，progan-128 从一个潜在向量生成了一个 128 × 128 × 3 的图片。
- en: Generate a New Image from an Image Vector
  id: totrans-357
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从图像向量生成新的图片
- en: 'Get an image from Google Drive:'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 从 Google Drive 获取图片：
- en: '[PRE101]'
  id: totrans-359
  prefs: []
  type: TYPE_PRE
  zh: '[PRE101]'
- en: 'Convert the JPEG image to an image vector of the appropriate datatype and size:'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 将 JPEG 图片转换为适当数据类型和大小的图像向量：
- en: '[PRE102]'
  id: totrans-361
  prefs: []
  type: TYPE_PRE
  zh: '[PRE102]'
- en: 'Display a slice from the vector:'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 显示向量的一个切片：
- en: '[PRE103]'
  id: totrans-363
  prefs: []
  type: TYPE_PRE
  zh: '[PRE103]'
- en: The vector is definitely not from the latent space!
  id: totrans-364
  prefs: []
