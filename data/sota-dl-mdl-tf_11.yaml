  zh: 创建一个用于显示 PIL 图像的函数：
- en: '[PRE6]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Create a function to display an image:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个用于显示图像的函数：
- en: '[PRE7]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The *imshow()* function is used to display data as an image.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *imshow()* 函数来显示数据作为图像。
- en: Create a function to display animation as shown in Listing [11-1](#PC9).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个用于显示如图 [11-1](#PC9) 所示动画的函数。
- en: '[PRE8]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Create Latent Space Dimensions
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建潜在空间维度
- en: Latent space is useful for learning data features and finding simpler representations
    of data for analysis. Humans have an understanding of a broad range of topics
    and the events belonging to those topics. Latent space aims to provide a similar
    understanding for a computer model through a quantitative spatial representation.
    So latent space is really just a measurable spatial representation of a compressed
    reality for a specific training experiment.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 潜在空间对于学习数据特征和找到数据分析的简化表示非常有用。人类对广泛的主题及其相关事件有理解。潜在空间旨在通过定量的空间表示为计算机模型提供类似的理解。因此，潜在空间实际上只是特定训练实验中压缩现实的可测量空间表示。
- en: Compressing a dataset into latent space helps a model better understand the
    observed data because the model deals with much smaller variations than it would
    with the entire dataset. So the model learns from a smaller space than if it had
    to learn from the actual observed pixel space.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集压缩到潜在空间有助于模型更好地理解观察到的数据，因为模型处理的变化比整个数据集要小得多。因此，模型从比实际观察到的像素空间更小的空间中学习。
- en: The terms high dimensional and low dimensional help define how specific or general
    the kinds of features we want our latent space to learn and represent. *High-dimensional*
    latent space is sensitive to more specific features of the input data, but can
    sometimes lead to overfitting when there isn’t sufficient training data. *Low-dimensional*
    latent space aims to capture the most important features (or aspects) required
    to learn and represent the input data.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 高维和低维这些术语有助于定义我们希望我们的潜在空间学习并表示的特征的具体性或普遍性。*高维* 潜在空间对输入数据的更具体特征敏感，但如果没有足够的训练数据，有时会导致过拟合。*低维*
    潜在空间旨在捕捉学习并表示输入数据所需的最重要特征（或方面）。
- en: 'Set a high-dimensional latent space of 512 because the pre-trained model we
    use for this experiment was trained on this latent space:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 设置高维潜在空间为512，因为我们用于此实验的预训练模型是在这个潜在空间上训练的：
- en: '[PRE9]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The pre-trained model maps from a 512-dimensional latent space to images. We
    can retrieve latent dimensions from the *module.structured_input_signature* method
    if we don’t know beforehand the module we are using. We show how to do this later
    in the chapter.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练模型将512维的潜在空间映射到图像。如果我们事先不知道使用的模块，我们可以从 *module.structured_input_signature*
    方法中检索潜在维度。我们将在本章后面展示如何做到这一点。
- en: Set Verbosity for Error Logging
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置错误日志的详细程度
- en: 'To see logging errors:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看日志错误：
- en: '[PRE10]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Image Generation Experiment
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 图像生成实验
- en: We use the progan-128 pre-trained model to generate realistic images of human
    faces. The *progan-128* model is a Progressive GAN trained on CelebA (CelebFaces
    Attributes Dataset) for 128 × 128 pixel images. It maps from a 512-dimensional
    latent space to images. During training, the latent space vectors are sampled
    from a normal distribution.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 progan-128 预训练模型生成逼真的人脸图像。*progan-128* 模型是在 CelebA（CelebFaces Attributes
    Dataset）上训练的 Progressive GAN，用于 128 × 128 像素图像。它从 512 维潜在空间映射到图像。在训练过程中，潜在空间向量是从正态分布中采样的。
- en: The module takes a tensor (Tensor(tf.float32, shape=[?, 512]) that represents
    a batch of latent vectors as input and outputs a tensor (Tensor(tf.float32, shape=[?,
    128, 128, 3]) that represents a batch of RGB images. The original model is trained
    on a GPU for 636,801 steps with a batch size 16.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 该模块接受一个表示一批潜在向量的张量（Tensor(tf.float32, shape=[?, 512]）作为输入，并输出一个表示一批 RGB 图像的张量（Tensor(tf.float32,
    shape=[?, 128, 128, 3]））。原始模型在 GPU 上训练了 636,801 步，批大小为 16。
- en: '*CelebA* is a large-scale face attributes dataset containing more than 200,000
    celebrity images. Each image has 40 attribute annotations. Images in this dataset
    cover large pose variations and background clutter. CelebA also has large diversities,
    large quantities, and rich annotations including'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '*CelebA* 是一个包含超过 200,000 张名人图像的大规模人脸属性数据集。每个图像有 40 个属性注释。该数据集中的图像覆盖了大量的姿态变化和背景杂乱。CelebA
    还具有多样性大、数量多和丰富的注释，包括'
- en: '* 10,177 unique celebrity images'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 10,177 张独特名人图像'
- en: '* 202,599 face images'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 202,599 张人脸图像'
- en: '* 5 landmark locations'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 5 个地标位置'
- en: '* 40 binary attribute annotations per image'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 每个图像 40 个二进制属性注释'
- en: CelebA can be employed as the training and test sets for computer vision tasks
    such as face attribute recognition, face detection, landmark (or facial part)
    localization, and face editing and synthesis.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: CelebA 可以用作计算机视觉任务（如人脸属性识别、人脸检测、地标（或面部部分）定位、人脸编辑和合成）的训练和测试集。
- en: Create a Function to Interpolate a Hypersphere
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建一个用于插值超球面的函数
- en: Create a function to interpolate the space between vectors in the latent space
    as shown in Listing [11-2](#PC12).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来插值潜在空间中向量之间的空间，如列表 [11-2](#PC12) 所示。
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The function initiates latent space interpolation between two randomly initialized
    vectors. It interpolates between vectors that are nonzero and don’t both lie on
    a line going through the origin and returns the normalized interpolated vectors
    to the calling environment. **Image** **interpolation** is the process of generating
    in-between images from a sequence of images.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数从两个随机初始化的向量开始，在潜在空间中进行潜在空间插值。它插值非零向量，并且这两个向量不都位于通过原点的直线上，然后将归一化的插值向量返回到调用环境。**图像**
    **插值**是从一系列图像生成中间图像的过程。
- en: The function begins by creating two Euclidean normed vectors v1 and v2\. It
    then normalizes v2 to have the same norm as v1\. It continues by interpolating
    between the two vectors on the hypersphere (or latent space) to produce a set
    of vectors based on the number of interpolation steps.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 函数首先创建两个欧几里得范数向量 v1 和 v2。然后它将 v2 归一化，使其具有与 v1 相同的范数。然后它在超球面（或潜在空间）上在这两个向量之间进行插值，以产生基于插值步数的向量集。
- en: A **hypersphere** is a four-dimensional analog of a sphere. Although a sphere
    exists in 3D space, its surface is two-dimensional. Similarly, a hypersphere has
    a three-dimensional surface that curves into 4D space. Our universe could be the
    hypersurface of a hypersphere.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**超球面**是球面的四维类似物。虽然球面存在于三维空间中，但其表面是二维的。同样，超球面有一个三维的表面，它弯曲到四维空间中。我们的宇宙可能是超球面的超曲面。'
- en: Load the Pre-trained Model
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载预训练模型
- en: 'Set a global random seed to maintain reproducibility:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 设置全局随机种子以保持可重复性：
- en: '[PRE12]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Set the seed value. Use any number that you wish. But use the same number on
    all experiments for reproducibility.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 设置随机种子值。可以使用任何你想要的数字。但为了可重复性，所有实验中都要使用相同的数字。
- en: 'Load the pre-trained Progressive GAN (progan-128):'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 加载预训练的 Progressive GAN (progan-128)：
- en: '[PRE13]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Get output shapes:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 获取输出形状：
- en: '[PRE14]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The Progressive GAN (progan-128) is trained on CelebA using image size of 128
    × 128 × 3 pixel images.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Progressive GAN (progan-128) 在 CelebA 上使用 128 × 128 × 3 像素大小的图像进行训练。
- en: 'Get dimensions for the latent space:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 获取潜在空间的维度：
- en: '[PRE15]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The progan-128 model maps from a 512-dimensional latent space to images. During
    training, latent space vectors are sampled from a normal distribution.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Progan-128 模型将 512 维的潜在空间映射到图像。在训练过程中，潜在空间向量是从正态分布中采样的。
- en: Generate and Display an Image
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成并显示图像
- en: A *new* image can be generated from a random point in the latent space. Begin
    by creating a random normal vector in the latent space. Continue by feeding the
    vector to progan-128\. The pre-trained model identifies the closest vector in
    the latent space to the random vector and generates an image from the closest
    vector. Algorithmically, progan-128 identifies the closest latent vector by minimizing
    the overall distance between the real and generated distributions.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 可以从潜在空间中的随机点生成一个新图像。首先在潜在空间中创建一个随机正态向量。然后继续将向量输入到progan-128中。预训练模型通过最小化真实和生成分布之间的总距离来算法性地识别最近的潜在向量，并从最近的向量生成一个图像。
- en: 'Create a function to find the closest vector in the latent space:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来找到潜在空间中最接近的向量：
- en: '[PRE16]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The function creates a random normal vector between 1 and 512 (the size of our
    latent space). It then uses progan-128 to generate an image from the closest latent
    vector to the random latent vector we created.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 函数在1到512（我们潜在空间的大小）之间创建一个随机正态向量。然后使用progan-128从创建的随机潜在向量最近的潜在向量生成一个图像。
- en: 'Display a generated image:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 显示一个生成的图像：
- en: '[PRE17]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Not bad! The pre-trained model generates a relatively realistic image from a
    vector drawn from the latent space.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 还不错！预训练模型从潜在空间中抽取的向量生成了一个相对逼真的图像。
- en: Create a Function to Generate Multiple Images
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建一个生成多个图像的函数
- en: The function creates two random vectors, interpolates the space between them
    in the latent space, and uses progan-128 to generate images as shown in Listing
    [11-3](#PC19).
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 函数创建两个随机向量，在潜在空间中插值它们之间的空间，并使用progan-128生成如列表[11-3](#PC19)中所示的图像。
- en: '[PRE18]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The function creates two random normal variables from the 512-dimensional latent
    space. It then creates a tensor with *n* steps of interpolation between v1 and
    v2\. It ends by using progan-128 to generate *n* images based on the tensor. Since
    the tensor consists of n steps of interpolation, generated images are along a
    line of interpolation bounded by the closest vectors in the latent space between
    v1 and v2.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 函数从512维潜在空间中创建两个随机正态变量。然后创建一个张量，包含从v1到v2之间的*n*个插值步。最后，使用progan-128根据张量生成*n*个图像。由于张量由n个插值步组成，生成的图像位于由v1和v2之间潜在空间中最近的向量所界定的插值线上。
- en: Create an Animation
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建一个动画
- en: 'Create an animation based on n generated images:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 基于n个生成的图像创建一个动画：
- en: '[PRE19]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Pretty amazing! With the help of progan-128, we create an animation based on
    interpolation between two vectors in the latent space closest to the two random
    vectors we created. The number of steps makes a big difference in the animation
    process! The higher the number of steps, the more interpolated images are created
    between the vectors in the latent space. So experiment with the number of steps
    to see what happens. But don’t use too big of an n size because you may run out
    of memory!
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 非常惊人！借助progan-128，我们根据潜在空间中两个向量之间的插值创建了一个动画。步骤的数量在动画过程中有很大影响！步骤数越多，在潜在空间中的向量之间生成的插值图像就越多。所以尝试不同的步骤数，看看会发生什么。但不要使用太大的n值，因为您可能会耗尽内存！
- en: Tip
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Keep interpolation steps relatively low to avoid a memory crash! Although Colab
    is a cloud service, the free version is pretty limited in the amount of allocated
    RAM to a notebook.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 保持插值步数相对较低以避免内存崩溃！尽管Colab是一个云服务，但免费版本在为笔记本分配的RAM数量上相当有限。
- en: Display Interpolated Image Vectors
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示插值图像向量
- en: Display interpolated image vectors to deconstruct the image generation process.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 显示插值图像向量以分解图像生成过程。
- en: 'Get the number of interpolated images in the latent space bounded by random
    vectors v1 and v2:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 获取由随机向量v1和v2界定的潜在空间中插值图像的数量：
- en: '[PRE20]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: We set interpolation steps to 100, so we have 100 interpolated images.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将插值步数设置为100，因此我们有100个插值图像。
- en: 'Display the initial interpolated image:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 显示初始插值图像：
- en: '[PRE21]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Display the final interpolated image:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 显示最终的插值图像：
- en: '[PRE22]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: So the animation begins with the initial image and morphs into the final image
    because interpolated vectors are along a line in the latent space bounded by random
    vectors v1 and v2.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，动画从初始图像开始，逐渐变为最终图像，因为插值向量位于由随机向量v1和v2界定的潜在空间线上的一个点。
- en: Create a function to display generated image vectors from the latent space as
    shown in Listing [11-4](#PC24).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来显示从潜在空间生成的图像向量，如列表[11-4](#PC24)所示。
- en: '[PRE23]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Display interpolated images:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 显示插值图像：
- en: '[PRE24]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: It’s fascinating to see how the model creates a series of images that morph
    from the initial to final one based on interpolated vectors from the latent space!
    So a learning model can create a series of vectors on a linear path between two
    points in the latent space as we demonstrated with our animation.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 看到模型如何根据潜在空间中的插值向量从初始图像到最终图像创建一系列图像，这是一个非常迷人的过程！因此，学习模型可以在潜在空间中两点之间创建一系列线性路径上的向量，正如我们通过我们的动画所展示的那样。
- en: Display Multiple Images from a Single Vector
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从单个向量显示多张图像
- en: 'Create a function to return a latent vector and image:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数以返回一个潜在向量和图像：
- en: '[PRE25]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: The function returns a random normal latent vector and an image generated by
    progan-128 from the random latent vector. Each time the function is executed,
    images are different because each latent vector is generated from a random vector,
    fed into progan-128, and generated.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 函数返回一个随机正态潜在向量和由progan-128从随机潜在向量生成的图像。每次函数执行时，图像都不同，因为每个潜在向量都是从随机向量生成的，输入到progan-128中，然后生成的。
- en: 'Display:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 显示：
- en: '[PRE26]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: For each loop cycle, a slice from each latent vector and its corresponding image
    are displayed. The two images are dissimilar and have no relationship because
    we create a latent vector close to a *random vector* for each loop cycle. But
    there is no path between the vectors because we didn’t create a series of latent
    vectors on a linear path bounded by two random vectors! We only interpolated a
    single vector from the latent space for each loop cycle.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个循环周期，都会显示每个潜在向量及其对应的图像的一个切片。这两个图像彼此不同且没有关系，因为我们为每个循环周期创建了一个接近*随机向量*的潜在向量。但是，向量之间没有路径，因为我们没有在两个随机向量定义的线性路径上创建一系列潜在向量！我们只为每个循环周期从潜在空间中插值了一个单个向量。
- en: Display several images as shown in Listing [11-5](#PC28).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 显示如列表[11-5](#PC28)中所示的多张图像。
- en: '[PRE27]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Again, images are dissimilar and have no relationship because the function creates
    a latent vector close to a random latent vector each time it is invoked!
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，由于每次调用函数时都会创建一个接近随机潜在向量的潜在向量，因此图像彼此不同且没有关系！
- en: Create a Target Latent Vector from an Uploaded Image
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从上传的图像创建一个目标潜在向量
- en: As we’ve already demonstrated, we can create a random normal latent vector and
    generate a new image from it. Alternatively, we can create a vector from an uploaded
    image vector and generate a new image from it.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前所展示的，我们可以创建一个随机正态潜在向量并从中生成一个新的图像。或者，我们可以从一个上传的图像向量创建一个向量并从中生成一个新的图像。
- en: 'Import the requisite library:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 导入所需的库：
- en: '[PRE28]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Create a function to get an uploaded image from your local drive:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数以从您的本地驱动器获取上传的图像：
- en: '[PRE29]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: The function uses *files.upload()* from the *google.colab* library to enable
    file uploads to the notebook. It uses *imread()* from the *imageio* library to
    read the image from a local drive. The function returns a resized image in the
    form expected by progan-128 using *transform.resize()* from the *skimage* library.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 函数使用*files.upload()*从*google.colab*库启用文件上传到笔记本。它使用*imread()*从*imageio*库读取本地驱动器上的图像。该函数使用*skimage*库中的*transform.resize()*返回一个符合progan-128期望的调整大小后的图像。
- en: Note
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Be sure to have an image on your local drive to upload. As a convenience, we
    recommend using one of the images included on the website for this chapter. Just
    copy the image to your local drive.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保您的本地驱动器上有一个图像可以上传。为了方便，我们建议使用本章网站上包含的图像之一。只需将图像复制到您的本地驱动器上。
- en: 'Get an image from your local drive:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 从您的本地驱动器获取一个图像：
- en: '[PRE30]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Click *Choose Files* to select the image you want to load from your local drive.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 点击*选择文件*以从您的本地驱动器选择要加载的图像。
- en: 'Display the image:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 显示图像：
- en: '[PRE31]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'Create a generated image based on the local image vector:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 基于本地图像向量创建一个生成的图像：
- en: '[PRE32]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Instead of creating a random normal latent vector to generate an image, create
    a vector from an uploaded image to generate an image. We do need to convert the
    local image tensor to a float tensor. Continue by generating an image from the
    float tensor with the help of progan-128\. End by displaying the image. The progan-128
    model generates a new image based on what it learned from CelebA. So a generated
    image resembles a human face regardless of what image is uploaded because progan-128
    learned on human faces! Although deep learning is amazing, it is still limited
    to what it is trained upon (at least for the time being).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是创建一个随机正态潜在向量来生成图像，从上传的图像创建一个向量来生成图像。我们确实需要将本地图像张量转换为浮点张量。接着，在progan-128的帮助下从浮点张量生成图像。最后，显示图像。progan-128模型根据从CelebA学习到的内容生成新的图像。所以生成的图像类似于人脸，无论上传什么图像，因为progan-128是在人脸上学习的！尽管深度学习很神奇，但它仍然受限于其训练的内容（至少目前是这样）。
- en: Custom Loop Learning Experiment
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自定义循环学习实验
- en: The objective of a supervised learning experiment is to predict the correct
    label for newly presented input data. The model learns how to connect input features
    to a predicted outcome in a very precise manner. Although GANs are unsupervised
    experiments, we can create a *pseudo-supervised* experiment by creating a series
    of latent vectors on a linear path bounded by two randomly generated vectors.
    We identify one of the generated vectors as the feature vector and the other as
    the predicted (or target) image. A **latent vector** is one that is drawn from
    the latent space that cannot be accessed or manipulated during training. The idea
    is similar to how feedforward neural networks cannot manipulate values output
    by hidden layers.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习实验的目的是预测新呈现的输入数据的正确标签。模型以非常精确的方式学习如何将输入特征与预测结果相连接。尽管GANs是无监督实验，但我们可以通过在两个随机生成的向量之间定义的线性路径上创建一系列潜在向量来创建一个**伪监督**实验。我们识别其中一个生成的向量为特征向量，另一个为预测（或目标）图像。**潜在向量**是从潜在空间中抽取的，在训练期间无法访问或操作。这个想法与前馈神经网络无法操作隐藏层输出的值类似。
- en: We train the model by defining a loss function between the feature vector and
    target image and use gradient descent on the feature vector to find variable values
    that minimize the loss. Training begins by defining a loss function between the
    feature image and target image. A custom training loop enables a gradient descent
    algorithm and the loss function to find variable values that minimize the loss
    between the feature vector and target.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过在特征向量和目标图像之间定义损失函数，并在特征向量上使用梯度下降来找到最小化损失的可变值来训练模型。训练开始于在特征图像和目标图像之间定义损失函数。一个自定义的训练循环使梯度下降算法和损失函数能够找到最小化特征向量和特征向量之间损失的可变值。
- en: Create the Feature Vector
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建特征向量
- en: 'Generate a seed for reproducibility and create a feature vector:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 生成一个种子以实现可重复性并创建特征向量：
- en: '[PRE33]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Change the seed to generate a different image. Be careful to use the same seed
    value to maintain reproducibility between experiments.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 更改种子以生成不同的图像。请注意，使用相同的种子值以保持实验之间的可重复性。
- en: Note
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We set a different random seed for this experiment. We could have kept the global
    random seed that we set in the first experiment. But we decided to separate the
    seeds for the two experiments.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为这个实验设置了一个不同的随机种子。我们本可以保留在第一个实验中设置的全球随机种子。但我们决定将两个实验的种子分开。
- en: The feature vector can be thought of as the initial vector because the model
    learns through gradient steps how to proceed from an initial latent vector to
    the final target image.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 特征向量可以被视为初始向量，因为模型通过梯度步骤学习如何从初始潜在向量过渡到最终的目标图像。
- en: 'Verify that the feature vector was drawn from the latent space:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 验证特征向量是否是从潜在空间中抽取的：
- en: '[PRE34]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The feature vector is drawn from the 512-dimensional latent space as indicated
    by shape 1 × 512\. So the feature vector is a one-dimensional vector with 512
    elements.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 特征向量是从形状为 1 × 512 的 512 维潜在空间中抽取的。因此，特征向量是一个包含 512 个元素的单一维向量。
- en: Display an Image from the Feature Vector
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从特征向量显示图像
- en: 'Display an image from the feature vector using progan-128:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 使用progan-128从特征向量显示图像：
- en: '[PRE35]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Create the Target Image
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建目标图像
- en: 'Create the target image from the latent space:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 从潜在空间创建目标图像：
- en: '[PRE36]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'Verify its shape:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 验证其形状：
- en: '[PRE37]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: The shape of the target tensor is 128 × 128 × 3, which is the shape expected
    by progan-128.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 目标张量的形状是 128 × 128 × 3，这是progan-128期望的形状。
- en: 'Display the target image:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 显示目标图像：
- en: '[PRE38]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Create a Function to Find the Closest Latent Vector
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建查找最近似潜在向量的函数
- en: The function defines a loss function between the feature vector and target image.
    It uses gradient descent to find variable values that minimize loss as shown in
    Listing [11-6](#PC40).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 函数在特征向量和目标图像之间定义了一个损失函数。它使用梯度下降来找到最小化损失变量的值，如列表 [11-6](#PC40) 所示。
- en: '[PRE39]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: The function accepts the feature vector, number of steps, steps per image, and
    loss algorithm. It then initializes variables including the optimizer and loss
    function. It also converts the feature vector to a tf.Variable. A *tf.Variable*
    is a tensor whose value can be changed during training.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 函数接受特征向量、步骤数、每图像步骤数和损失算法。然后初始化包括优化器和损失函数在内的变量。它还将特征向量转换为 tf.Variable。*tf.Variable*
    是一个张量，其值可以在训练期间更改。
- en: The function continues with a custom training loop. For custom loop learning,
    TensorFlow provides the *tf.GradientTape* API for automatic differentiation. TensorFlow
    records relevant operations executed inside the context of a tf.GradientTape onto
    a virtual tape. TensorFlow then uses the virtual tape to compute the gradients
    of a recorded computation using reverse-mode differentiation.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 函数继续使用自定义训练循环。对于自定义循环学习，TensorFlow 提供了 *tf.GradientTape* API 用于自动微分。TensorFlow
    将在 tf.GradientTape 上下文中执行的相关操作记录到一个虚拟带上。然后，TensorFlow 使用虚拟带通过反向模式微分来计算记录计算的梯度。
- en: '**Automatic differentiation** (AD) is a set of techniques to numerically evaluate
    the derivative of a function specified by a computer program. We use AD to compute
    the gradient of a computation with respect to some inputs (e.g., tf.Variables).
    AD implements two distinct modes. *Forward-mode differentiation* traverses the
    chain rule from inside out. *Reverse-mode differentiation* traverses the chain
    rule from outside to inside. Automatic differentiation is useful for implementing
    ML algorithms such as back-propagation for training neural networks.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '**自动微分** (AD) 是一套用于数值评估由计算机程序指定的函数导数的技巧。我们使用 AD 来计算某个输入（例如，tf.Variables）相对于计算梯度的值。AD
    实现了两种不同的模式。*前向模式微分* 从内部向外遍历链式法则。*反向模式微分* 从外部向内部遍历链式法则。自动微分对于实现机器学习算法，如用于训练神经网络的反向传播非常有用。'
- en: For an excellent resource on automatic differentiation, peruse
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 关于自动微分的优秀资源，请参阅
- en: '[`https://rufflewind.com/2016-12-30/reverse-mode-automatic-differentiation`](https://rufflewind.com/2016-12-30/reverse-mode-automatic-differentiation)'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '[《https://rufflewind.com/2016-12-30/reverse-mode-automatic-differentiation》](https://rufflewind.com/2016-12-30/reverse-mode-automatic-differentiation)'
- en: To differentiate automatically, TensorFlow needs to remember what operations
    happen in what order during the forward pass. Then, during the backward pass,
    TensorFlow traverses this list of operations in *reverse order* to compute gradients.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 为了自动微分，TensorFlow 需要记住在正向传递过程中发生的操作顺序。然后，在反向传递过程中，TensorFlow 以 *反向顺序* 遍历这个操作列表来计算梯度。
- en: The gradient tape uses the pre-trained model to generate an image, finds the
    space between the feature image and target image, uses regularization to get more
    realistic images, calculates loss, applies the gradient descent algorithm, and
    optimizes the gradients. Once training is completed, the function returns an array
    of generated images and an array of losses calculated during training.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度带使用预训练模型生成图像，找到特征图像和目标图像之间的空间，使用正则化得到更逼真的图像，计算损失，应用梯度下降算法，并优化梯度。一旦训练完成，该函数返回一个生成的图像数组以及训练期间计算的损失数组。
- en: Since latent vectors are sampled from a normal distribution, we can get more
    realistic images if we regularize the length of the latent vector to the average
    length of all vectors from this distribution. We implement regularization with
    the *regularizer* variable in the gradient tape section of the function.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 由于潜在向量是从正态分布中采样的，如果我们把潜在向量的长度正则化为所有向量的平均长度，我们可以得到更逼真的图像。我们在函数的梯度带部分使用 *regularizer*
    变量来实现正则化。
- en: Create the Loss Function
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建损失函数
- en: 'Create the loss function algorithm:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 创建损失函数算法：
- en: '[PRE40]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Use Mean Absolute Error (MAE) reduction for the loss function algorithm. **MAE**
    measures the difference between two continuous variables.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 使用平均绝对误差 (MAE) 减少损失函数算法。**MAE** 衡量两个连续变量之间的差异。
- en: Generally, the *tf.losses.MeanAbsoluteError* API computes the mean of absolute
    differences between labels and predictions. In our experiment, it computes the
    mean absolute difference between latent vectors and the actual target.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，*tf.losses.MeanAbsoluteError* API计算标签和预测之间的绝对差异的平均值。在我们的实验中，它计算潜在向量和实际目标之间的平均绝对差异。
- en: Train the Model
  id: totrans-187
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Clear previous model sessions:'
