  zh: 因此，progan-128 从一个未从潜在空间抽取的特征图像向量生成了一个 128 × 128 × 3 的图片！
- en: Summary
  id: totrans-368
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We demonstrated two Progressive Growing GAN experiments in a detailed and step-by-step
    manner. We also verified that progan-128 can also generate a realistic image from
    a feature vector not drawn from the latent space.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以详细和逐步的方式演示了两个渐进式增长生成对抗网络（Progressive Growing GAN）实验。我们还验证了 progan-128 也可以从未从潜在空间抽取的特征向量生成逼真的图片。
