  zh: 清除先前的模型会话：
- en: '[PRE41]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Tip
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: When running multiple training sessions in a notebook, it is a good idea to
    clear previous model sessions prior to training a model with the tf.keras.backend.clear_session
    API.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 当在笔记本中运行多个训练会话时，在用tf.keras.backend.clear_session API训练模型之前清除先前的模型会话是一个好主意。
- en: 'Invoke the training function:'
  id: totrans-192
