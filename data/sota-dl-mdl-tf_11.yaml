  zh: 使用MSE减少训练模型：
- en: '[PRE55]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: 'Plot loss:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制损失图：
