  zh: 使用MSE而不是MAE：
- en: '[PRE53]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: '**Mean Squared Error** (MSE) measures the average of the squares of the errors
    (average squared difference) between the estimated values and the target. The
    *tf.losses.MeanSquaredError* API computes the mean of squares of errors between
    labels and predictions.'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '**均方误差** (MSE)衡量的是估计值与目标之间的误差平方的平均值（平均平方差异）。*tf.losses.MeanSquaredError* API计算标签和预测之间误差平方的平均值。'
- en: 'Clear previous model sessions:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 清除先前的模型会话：
- en: '[PRE54]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: 'Train the model with MSE reduction:'
  id: totrans-227
  prefs: []
