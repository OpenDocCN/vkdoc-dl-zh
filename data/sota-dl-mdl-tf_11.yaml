  zh: 展示模型的表现如何：
- en: '[PRE51]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Grab ‘mae_images[-1]’ to display the final generated image.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 获取‘mae_images[-1]’以显示最终生成的图像。
