  type: TYPE_NORMAL
  zh: 使用 TensorFlow 2.0 实现深度神经网络的代码可以在[http://bit.ly/DNNTF2](http://bit.ly/DNNTF2)找到。您可以保存代码的副本并在
    Google Colab 环境中运行它。尝试使用不同的参数进行实验并记录结果。
- en: As observed, the training accuracy for the simple neural network is about 90%,
    whereas it is 94% for the DNNs, and the test accuracy for the simple neural network
    is about 87%, whereas it is 89% for DNNs. It goes to show that we were able to
    achieve higher accuracy by adding more hidden layers to the neural network architecture.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如观察所示，简单神经网络的训练准确率约为 90%，而深度神经网络的准确率约为 94%，简单神经网络的测试准确率约为 87%，而深度神经网络的准确率约为
    89%。这表明，通过向神经网络架构中添加更多隐藏层，我们能够实现更高的准确率。
- en: Estimators Using the Keras Model
