- en: Conclusion
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, you have seen how easy it is to build neural networks in TensorFlow
    2.0 and also how to leverage Keras models, to build custom TensorFlow estimators.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您已经看到在 TensorFlow 2.0 中构建神经网络是多么容易，以及如何利用 Keras 模型来构建自定义 TensorFlow 估算器。
