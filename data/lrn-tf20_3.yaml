  zh: 在第 [2](489297_1_En_2_Chapter.xhtml) 章中，我们构建了各种机器学习模型，使用了预制的估计器。然而，TensorFlow
    API 也为我们提供了足够的灵活性来构建自定义估计器。在本节中，您将看到我们如何使用 Keras 模型创建一个自定义估计器。实现如下。
