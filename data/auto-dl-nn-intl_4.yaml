  prefs: []
  type: TYPE_NORMAL
  zh: NNI 使用 Netron 来可视化试验模型。Netron 是一个用于神经网络、深度学习和机器学习模型的微型查看器。点击 `Netron` 按钮，你会看到如图
    [4-5](#Fig5) 所示的屏幕。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig5_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig5_HTML.jpg)'
- en: Figure 4-5
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-5
- en: Netron model visualization
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: Netron 模型可视化
- en: Now we can declare that we have found a solution to the problem of finding a
    model that maximizes the value of the chain of operators *F*. The Data Flow Graph
    of this model is shown in Figure [4-6](#Fig6).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以声明我们已经找到了一个解决方案，即找到最大化操作符链 *F* 值的模型。该模型的 Data Flow Graph 如图 [4-6](#Fig6)
    所示。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig6_HTML.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig6_HTML.png)'
- en: Figure 4-6
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-6
- en: Best Data Flow Graph in Model Space
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 模型空间中的最佳数据流图
- en: The purpose of this example was to demonstrate that the primary goal of a NAS
    approach is to find a DFG that maximizes (or minimizes) a black-box function.
    In the same way HPO methods are searching for parameters that maximize (or minimize)
    the black-box function. After introducing basic NAS techniques, we can dive into
    more details.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 本例的目的是证明 NAS 方法的主要目标是找到一个最大化（或最小化）黑盒函数的数据流图 (DFG)。同样，HPO 方法也在寻找最大化（或最小化）黑盒函数的参数。在介绍基本
    NAS 技术之后，我们可以深入了解更多细节。
- en: Retiarii Framework
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Retiarii 框架
- en: Retiarii framework is designed to separate the main logical entities of Neural
    Architecture Search. This makes the NAS procedure clear and elegant. Using the
    Retiarii framework, the researcher can only focus on particular aspects of the
    investigation. The main components of the Retiarii framework are
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Retiarii 框架旨在分离神经架构搜索的主要逻辑实体。这使得 NAS 流程清晰且优雅。使用 Retiarii 框架，研究人员可以只关注调查的特定方面。Retiarii
    框架的主要组件包括
- en: Base Model
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础模型
- en: Mutator
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变异器
- en: Model Space
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型空间
- en: Evaluator
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估器
- en: Exploration Strategy
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索策略
- en: '*Base Model* is the primary skeleton of a neural network. Base Model is actually
    a simple deep learning model that solves some problem. Often the Base Model does
    not show good performance. But it has some primary neural architecture and training
    algorithm.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '*基础模型* 是神经网络的主要骨架。基础模型实际上是一个简单的深度学习模型，用于解决某些问题。通常，基础模型的表现并不出色。但它具有一些基本的神经网络架构和训练算法。'
- en: '*Mutator* is a possible change that a Base Model can be subjected to. Mutator
    defines the transformation of the Base Model architecture into another one. Usually,
    many mutators are applied to Base Model.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '*变异器* 是基模型可能遭受的可能变化。变异器定义了将基模型架构转换为另一个架构的转换。通常，许多变异器都应用于基模型。'
- en: '*Model Space* is the set of all possible Base Model mutations. Each mutator
    generates several variants of neural network architectures. Applying all mutators
    to the Base Model defines the Model Space.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '*模型空间* 是所有可能的基模型变异的集合。每个变异器生成几种神经网络架构的变体。将所有变异器应用于基模型定义了模型空间。'
- en: '*Evaluator* measures the performance of a sample from the Model Space. This
    is a typical algorithm for training and testing a neural network.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '*评估器* 测量模型空间中样本的性能。这是一个典型的训练和测试神经网络的算法。'
- en: '*Exploration Strategy* defines the Model Space exploration algorithm. The main
    objective of the Exploration Strategy is to find the best model in the least number
    of trials.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '*探索策略* 定义了模型空间的探索算法。探索策略的主要目标是找到在最少尝试次数中最佳模型。'
- en: All these concepts are pretty familiar to us after studying Hyperparameter Optimization.
    Table [4-1](#Tab1) contains the main logical entities from NAS and HPO. As you
    can see, they mean almost the same thing.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习超参数优化之后，所有这些概念对我们来说都非常熟悉。表 [4-1](#Tab1) 包含了 NAS 和 HPO 的主要逻辑实体。如您所见，它们几乎意味着相同的东西。
- en: Table 4-1
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4-1
- en: NAS and HPO logical entities
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: NAS 和 HPO 逻辑实体
- en: '| NAS | HPO |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
  zh: '| 神经架构搜索 (NAS) | 超参数优化 (HPO) |'
- en: '| --- | --- |'
  id: totrans-98
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Base Model + Mutator | Search space type |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
  zh: '| 基础模型 + 变异器 | 搜索空间类型 |'
- en: '| Model Space | Search space |'
  id: totrans-100
  prefs: []
  type: TYPE_TB
  zh: '| 模型空间 | 搜索空间 |'
- en: '| Evaluator | Trial |'
  id: totrans-101
  prefs: []
  type: TYPE_TB
  zh: '| 评估器 | 尝试 |'
- en: '| Exploration Strategy | Tuner |'
  id: totrans-102
  prefs: []
  type: TYPE_TB
  zh: '| 探索策略 | 调优器 |'
- en: Figure [4-7](#Fig7) illustrates the relationship of various components in the
    Retiarii framework.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-7](#Fig7) 展示了 Retiarii 框架中各种组件之间的关系。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig7_HTML.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig7_HTML.png)'
- en: Figure 4-7
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-7
- en: Retiarii framework
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: Retiarii 框架
- en: Let’s go ahead and look at each of these components in detail.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐一详细查看这些组件。
- en: Base Model
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基础模型
- en: The Base Model is a starting point from which all possible architecture modifications
    will be made. For example, the Base Model for NAS of the MNIST problem can be
    presented as it is shown in Listing [4-3](#PC23).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 基础模型是从中做出所有可能的架构修改的起点。例如，MNIST 问题 NAS 的基模型可以表示为如列表 [4-3](#PC23) 所示。
- en: 'Importing PyTorch modules:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 PyTorch 模块：
- en: '[PRE22]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'You must use the `nni.retiarii.nn.pytorch as nn` module to declare layers in
    a deep learning model:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 您必须使用 `nni.retiarii.nn.pytorch as nn` 模块来声明深度学习模型中的层：
- en: '[PRE23]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Base Model must be annotated with `nni.retiarii.model_wrapper():`
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 基础模型必须使用 `nni.retiarii.model_wrapper()` 进行注释：
- en: '[PRE24]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Next, we have the classic LeNet model design for the digit recognition problem:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们有用于数字识别问题的经典 LeNet 模型设计：
- en: '[PRE25]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Frequent mistakes in Base Model design are:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 基础模型设计中常见的错误包括：
- en: Missing `@model_wrapper` annotation on Base Model
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础模型缺少 `@model_wrapper` 注释
- en: Using `import torch.nn as nn` instead of `nni.retiarii.nn.pytorch as nn` declaring
    layers
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`import torch.nn as nn`而不是`nni.retiarii.nn.pytorch as nn`声明层
- en: Mutators
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变异器
- en: 'Base Model is a single model. To create Model Space, we have to add Mutators
    to the Base Model. Each mutator provides a way to change the Base Model. All possible
    mutations applied to the Base Model form the Model Space. NNI provides the following
    mutation operations: `LayerChoice`, `ValueChoice`, `InputChoice`, and `Repeat`.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 基础模型是一个单一模型。为了创建模型空间，我们必须向基础模型添加变异器。每个变异器提供了一种改变基础模型的方法。所有应用于基础模型的可能变异构成了模型空间。NNI提供了以下变异操作：`LayerChoice`、`ValueChoice`、`InputChoice`和`Repeat`。
- en: LayerChoice
  id: totrans-123
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 层选择
- en: '`LayerChoice` mutator forms the candidate layers for a layer placeholder. One
    of these layers is tried in the exploration process. `LayerChoice` mutator is
    applied to the Base Model the following way:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '`LayerChoice`变异器为层占位符形成候选层。在探索过程中尝试这些层之一。`LayerChoice`变异器按以下方式应用于基础模型：'
- en: '[PRE26]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '`LayerChoice` adds layer variations to the Base Model as shown in Figure [4-8](#Fig8).'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '`LayerChoice`将层变化添加到基础模型，如图[4-8](#Fig8)所示。'
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig8_HTML.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig8_HTML.png)'
- en: Figure 4-8
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-8
- en: LayerChoice Mutator
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 层选择变异器
- en: '`LayerChoice` is the most straightforward way to mutate the Base Model.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '`LayerChoice`是变异基础模型最直接的方式。'
- en: ValueChoice
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ValueChoice
- en: '`ValueChoice` forms the list of single values to be tried as layer hyperparameters.
    `ValueChoice` can be used as layer hyperparameters only. It cannot be used as
    an arbitrary hyperparameter like `batch_size` or `learning_rate` in the evaluation
    process. `ValueChoice` mutator is applied to the Base Model the following way:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '`ValueChoice`形成要尝试的单个值的列表，作为层超参数。`ValueChoice`只能用作层超参数。它不能用作评估过程中的任意超参数，如`batch_size`或`learning_rate`。`ValueChoice`变异器按以下方式应用于基础模型：'
- en: '[PRE27]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '`ValueChoice` can be considered as a layer hyperparameter in the HPO context.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在HPO背景下，`ValueChoice`可以被视为层超参数。
- en: InputChoice
  id: totrans-135
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: InputChoice
- en: '`InputChoice` tries different connections. It takes several tensors and chooses
    `n_chosen` tensors from them. `InputChoice` mutator is applied to the Base Model
    the following way:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '`InputChoice`尝试不同的连接。它从几个张量中选择`n_chosen`个张量。`InputChoice`变异器按以下方式应用于基础模型：'
- en: '[PRE28]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: '`InputChoice` is designed to find the best data flow branches in neural network
    architecture. Figure [4-9](#Fig9) illustrates this concept.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '`InputChoice`旨在寻找神经网络架构中最佳的数据流分支。图[4-9](#Fig9)说明了这一概念。'
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig9_HTML.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig9_HTML.png)'
- en: Figure 4-9
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-9
- en: InputChoice Mutator
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: InputChoice变异器
- en: 'If `InputChoice` picks more than one candidate tensors (i.e., `n_chosen` >
    1), then the reduction strategy is applied: `sum`, `mean`, `concat`. This is a
    very useful technique that allows to extract and merge several connections at
    the same time. `InputChoice` for multiple candidates with reduction can be applied
    the following way:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如果`InputChoice`选择了多个候选张量（即`n_chosen` > 1），则应用缩减策略：`sum`、`mean`、`concat`。这是一种非常有用的技术，允许同时提取和合并多个连接。具有缩减的多候选`InputChoice`可以按以下方式应用：
- en: '[PRE29]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: The preceding code generates the search space shown in Figure [4-10](#Fig10).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码生成了图[4-10](#Fig10)中显示的搜索空间。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig10_HTML.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig10_HTML.png)'
- en: Figure 4-10
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-10
- en: InputChoice Mutator for multiple candidates
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 多候选`InputChoice`变异器
- en: '`InputChoice` Mutator for multiple candidates can choose the same tensor several
    times. It happens when other connections do not bring any helpful information
    to neural network performance.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 多候选`InputChoice`变异器可以选择相同的张量多次。这种情况发生在其他连接不会对神经网络性能带来任何有用的信息时。
- en: 'Also, `InputChoice` allows adding skip connection technique to neural architecture.
    Skip connection is one of the core techniques in modern neural network design.
    It was first introduced in 2015 in “Deep Residual Learning for Image Recognition”
    ([`https://arxiv.org/pdf/1512.03385.pdf`](https://arxiv.org/pdf/1512.03385.pdf)).
    Skip connection can be implemented using the following pattern:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，`InputChoice`允许将跳过连接技术添加到神经网络架构中。跳过连接是现代神经网络设计中的一种核心技术。它首次在2015年的“用于图像识别的深度残差学习”中提出（[`https://arxiv.org/pdf/1512.03385.pdf`](https://arxiv.org/pdf/1512.03385.pdf)）。跳过连接可以使用以下模式实现：
- en: '[PRE30]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: In the first case, the model will use the skip connection technique, but not
    in the second one. Figure [4-11](#Fig11) demonstrates skip connection mutation.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一种情况下，模型将使用跳过连接技术，但在第二种情况下则不会。图 [4-11](#Fig11) 展示了跳过连接突变。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig11_HTML.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig11_HTML.png)'
- en: Figure 4-11
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-11
- en: InputChoice. Skip connection mutation
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 输入选择. 跳过连接突变
- en: 'Let’s examine the application of the `InputChoice` mutator using an arithmetic
    DFG as an example. Say we have *x* = 1 and three operator pipelines which consist
    of multiplication operators:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个算术 DFG 例子来检查 `InputChoice` 突变器的应用。假设我们有 *x* = 1 和三个由乘法运算符组成的操作管道：
- en: '[PRE31]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'You need to select two pipelines whose sum is maximum. You can select the same
    pipeline twice. This is a fairly simple task. It is intuitively clear that the
    sum of the last pipeline will give the maximum value. Let’s run the third pipeline:
    1 → 1 × 2 → 2 × 3 → 6 × 4 → 24; thus, the maximum value we can obtain is `48`.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要选择两个管道，其总和最大。您可以多次选择相同的管道。这是一个相当简单的任务。直观上很清楚，最后一个管道的总和将给出最大值。让我们运行第三条管道：1
    → 1 × 2 → 2 × 3 → 6 × 4 → 24；因此，我们可以获得的最大值是 `48`。
- en: Now let’s obtain the same result using NNI and `InputChoice` Mutator using Listing
    [4-4](#PC33).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用 NNI 和 `InputChoice` 突变器通过列表 [4-4](#PC33) 来获得相同的结果。
- en: 'Importing common modules:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 导入常用模块：
- en: '[PRE32]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Importing `nni` modules:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 `nni` 模块：
- en: '[PRE33]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: '`ProdBlock` acts as a multiplier operator. It simply multiplies the tensor
    by some value:'
  id: totrans-163
  prefs: []
