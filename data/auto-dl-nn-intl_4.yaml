- en: Repeat
  id: totrans-190
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 重复
- en: '`Repeat` mutator repeats some action a certain number of times. In the NAS
    context, the `Repeat` mutator tries to determine how often to iterate the same
    neural network block. For example, the ResNet neural network architecture implies
    a stack of Residual Blocks. But the optimal number of Residual Blocks may depend
    on the specific task. Figure [4-13](#Fig13) shows part of the ResNet architecture.'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '`Repeat` 突变器重复执行某些操作一定次数。在 NAS 的上下文中，`Repeat` 突变器试图确定迭代相同神经网络块的频率。例如，ResNet
    神经网络架构暗示了一个残差块的堆叠。但最优的残差块数量可能取决于具体任务。图 [4-13](#Fig13) 显示了 ResNet 架构的一部分。'
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig13_HTML.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig13_HTML.png)'
