  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-14
- en: Regularized Evolution Strategy
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 正则化进化策略
- en: 'The implementation of Regularized Evolution Strategy has the following parameters:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 正则化进化策略的实现具有以下参数：
- en: '`optimize_mode:`'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`optimize_mode:`'
- en: '**Type**: `string`'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `string`'
- en: '**Default**: `maximize`'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `最大化`'
- en: '**Values**: ’`maximize`’ | ’`minimize`’'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: '**值**: ’`最大化`’ | ’`最小化`’'
- en: Sets the evolution direction.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 设置进化方向。
- en: '`population_size:`'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`population_size:`'
- en: '**Type**: `int`'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `int`'
- en: '**Default**: `100`'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `100`'
- en: The number of individuals in the population.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 种群中的个体数量。
- en: '`cycles:`'
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cycles:`'
- en: '**Type**: `int`'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `int`'
- en: '**Default**: `20000`'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `20000`'
- en: The number of generations of the algorithm.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 算法的代数。
- en: '`sample_size:`'
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`sample_size:`'
- en: '**Type**: `int`'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `int`'
- en: '**Default**: `25`'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `25`'
- en: The number of individuals that should participate in each Tournament Selection.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 应该参与每个竞赛选择的个体数量。
- en: '`mutation_prob:`'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`mutation_prob:` '
- en: '**Type**: `float`'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `float`'
- en: '**Default**: `0.05`'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `0.05`'
- en: Probability that mutation occurs in each mutator in the Model Space.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 模型空间中每个突变体发生突变的概率。
- en: 'For more details, please refer to the original paper describing Regularized
    Evolution approach: [`https://arxiv.org/abs/1802.01548`](https://arxiv.org/abs/1802.01548).'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 更多细节，请参阅描述正则化进化方法的原始论文：[`https://arxiv.org/abs/1802.01548`](https://arxiv.org/abs/1802.01548)。
- en: TPE Strategy
  id: totrans-291
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: TPE 策略
- en: TPE Strategy (`nni.retiarii.strategy.TPEStrategy`) is a Sequential Model-Based
    Optimization approach based on Tree-structured Parzen Estimator. It acts the same
    way as TPE Tuner we studied in Chapter [3](526245_1_En_3_Chapter.xhtml).
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: TPE 策略 (`nni.retiarii.strategy.TPEStrategy`) 是基于树结构帕累托估计器的序列模型优化方法。它与我们第 [3](526245_1_En_3_Chapter.xhtml)
    章节中研究的 TPE 调谐器作用相同。
- en: 'For more details, please refer to the original paper describing the TPE approach:
    [`https://papers.nips.cc/paper/2011/file/86e8f7ab32cfd12577bc2619bc635690-Paper.pdf`](https://papers.nips.cc/paper/2011/file/86e8f7ab32cfd12577bc2619bc635690-Paper.pdf).'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 更多细节，请参阅描述 TPE 方法的原始论文：[`https://papers.nips.cc/paper/2011/file/86e8f7ab32cfd12577bc2619bc635690-Paper.pdf`](https://papers.nips.cc/paper/2011/file/86e8f7ab32cfd12577bc2619bc635690-Paper.pdf)。
- en: RL Strategy
  id: totrans-294
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: RL 策略
- en: RL Strategy (`nni.retiarii.strategy.PolicyBasedRL`) implements the Reinforcement
    Learning approach based on policy-gradient method (Proximal Policy Optimization
    or PPO). RL Strategy implements a special Recurrent Neural Network called Controller.
    Controller generates various model architectures from Model Space. The Controller
    acts as a stochastic policy; hence, it returns the mutation probability for each
    of the Mutators in the Model Space. After each trial, the Controller updates the
    weights of its RNN according to the Proximal Optimization Policy method. This
    approach allows exploring the Model Space by constructing a probability distribution
    for each of the mutators.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: RL 策略 (`nni.retiarii.strategy.PolicyBasedRL`) 实现了基于策略梯度的方法（近端策略优化或 PPO）的强化学习方法。RL
    策略实现了一个特殊的循环神经网络，称为控制器。控制器从模型空间生成各种模型架构。控制器作为一个随机策略；因此，它为模型空间中的每个突变体返回突变概率。每次试验后，控制器根据近端优化策略方法更新其
    RNN 的权重。这种方法通过为每个突变体构建概率分布来探索模型空间。
- en: Figure [4-15](#Fig15) demonstrates RL Strategy in action.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-15](#Fig15) 展示了 RL 策略的实际应用。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig15_HTML.png)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![图 4-15](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig15_HTML.png)'
- en: Figure 4-15
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-15
- en: Reinforcement Learning (Proximal Policy Optimization) Strategy
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习（近端策略优化）策略
- en: RL Strategy requires `tianshou` package to be installed. Tianshou is a Reinforcement
    Learning platform based on pure PyTorch.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: RL 策略需要安装 `tianshou` 包。Tianshou 是一个基于纯 PyTorch 的强化学习平台。
- en: '[PRE69]'
  id: totrans-301
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: 'The implementation of RL Strategy has the following parameters:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: RL 策略的实现有以下参数：
- en: '`max_collect`:'
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`max_collect`:'
- en: '**Type**: `int`'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**：`int`'
- en: '**Default**: `100`'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**：`100`'
- en: How many epochs Exploration Strategy performs.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 探索策略执行多少个 epoch。
- en: '`Trial_per_collect`:'
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Trial_per_collect`:'
- en: '**Type**: `int`'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**：`int`'
- en: '**Default**: `20`'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**：`20`'
- en: How many trials (trajectories) each time collector collects. After each completed
    trajectory, the trainer will sample the batch from the replay buffer and do the
    Controller update.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 每次收集器收集多少次试验（轨迹）。在每个完成的轨迹之后，训练器将从重放缓冲区中采样批次并更新控制器。
- en: 'For more details, please refer to the original paper describing the Neural
    Architecture Search with Reinforcement Learning: [`https://arxiv.org/pdf/1611.01578.pdf`](https://arxiv.org/pdf/1611.01578.pdf).'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 更多细节，请参阅描述基于强化学习的神经架构搜索的原论文：[《https://arxiv.org/pdf/1611.01578.pdf》](https://arxiv.org/pdf/1611.01578.pdf)。
- en: Experiment
  id: totrans-312
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验
- en: 'And the last thing left is the Experiment. Retiarii Experiment is launched
    in stand-alone (embedded) mode and contains seven steps:'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 最后剩下的是实验。Retiarii 实验以独立（嵌入式）模式启动，包含七个步骤：
- en: Declare Model Space
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 声明模型空间
- en: Declare Model Evaluator
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 声明模型评估器
- en: Declare Exploration Strategy
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 声明探索策略
- en: Initialize Retiarii Experiment
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始化 Retiarii 实验
- en: Configure Retiarii Experiment
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置 Retiarii 实验
- en: Launch Experiment
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启动实验
- en: Returning results
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回结果
- en: 'The following pattern can be used to create Retiarii Experiment:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用以下模式创建 Retiarii 实验：
- en: '[PRE70]'
  id: totrans-322
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: You can use the WebUI after running the experiment the same way we did earlier
    launching HPO experiments.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在运行实验后使用 WebUI，就像我们之前启动 HPO 实验时一样。
- en: CIFAR-10 LeNet NAS
  id: totrans-324
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: CIFAR-10 LeNet NAS
- en: 'Let’s study the application of Multi-trial NAS to the CIFAR-10 problem. CIFAR-10
    is a common dataset for image classification problem. It contains 60,000 color
    images (32×32 pixels) from 10 different classes: *airplane*, *automobile*, *bird*,
    *cat*, *deer*, *dog*, *frog*, *horse*, *ship*, and *truck*.'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们研究多试验 NAS 在 CIFAR-10 问题中的应用。CIFAR-10 是一个常见的图像分类问题数据集。它包含来自 10 个不同类别（飞机、汽车、鸟、猫、鹿、狗、青蛙、马、船和卡车）的
    60,000 个彩色图像（32×32 像素）。
- en: 'Please run the following command to download the CIFAR-10 dataset to your machine:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 请运行以下命令将 CIFAR-10 数据集下载到您的机器上：
- en: '[PRE71]'
  id: totrans-327
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: Figure [4-16](#Fig16) demonstrates several samples from CIFAR10 dataset.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-16](#Fig16) 展示了 CIFAR10 数据集的几个样本。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig16_HTML.jpg)'
  id: totrans-329
  prefs: []
  type: TYPE_IMG
  zh: '![图 4-16](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig16_HTML.jpg)'
- en: Figure 4-16
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-16
- en: CIFAR-10 samples
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: CIFAR-10 样本
- en: 'Let’s try to find an appropriate deep learning model based on the LeNet approach
    solving the CIFAR-10 classification problem. As we already know, the LeNet image
    recognition architecture can be divided into two components: *Feature Extraction
    Component* and *Decision Maker Component*. The *Feature Extraction Component*
    consists of a sequence of Feature Extraction blocks with convolution layer. *Decision
    Maker Component* consists of Fully Connected Components with linear layer.'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试找到一个基于 LeNet 方法解决 CIFAR-10 分类问题的合适深度学习模型。正如我们已知的，LeNet 图像识别架构可以分为两个部分：*特征提取组件*和*决策者组件*。*特征提取组件*由一系列带有卷积层的特征提取块组成。*决策者组件*由带有线性层的完全连接组件组成。
- en: 'The design of the Feature Extraction block can be as follows:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 特征提取块的设计可以如下所示：
- en: '`Conv` → `Activation`'
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Conv` → `Activation`'
- en: '`Conv` → `Pool` → `Activation`'
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Conv` → `Pool` → `Activation`'
- en: Figure [4-17](#Fig17) demonstrates possible architecture options for the Feature
    Extraction block or Feature Extraction block space.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-17](#Fig17) 展示了特征提取块或特征提取块空间的可能架构选项。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig17_HTML.png)'
  id: totrans-337
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig17_HTML.png)'
- en: Figure 4-17
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-17
- en: Feature Extraction block space
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 特征提取块空间
- en: 'In the same way, we can determine the possible designs for the Fully Connected
    block:'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，我们可以确定完全连接块的可能设计：
- en: '`Linear` → `Activation`'
  id: totrans-341
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Linear` → `Activation`'
- en: '`Linear` → `Dropout` → `Activation`'
  id: totrans-342
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Linear` → `Dropout` → `Activation`'
- en: Figure [4-18](#Fig18) illustrates Fully Connected block space.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-18](#Fig18) 说明完全连接块空间。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig18_HTML.png)'
  id: totrans-344
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig18_HTML.png)'
- en: Figure 4-18
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-18
- en: Fully Connected block space
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 完全连接块空间
- en: Note
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 注
- en: 'Actually, `Linear` → `Dropout(p=1)` → `Activation` equals `Linear` → `Activation`,
    and it is possible to design the same block space from Figure [4-18](#Fig18) without
    using two connections. We could achieve the same block space using simple Layer
    Hyperparameter Optimization: `Linear` → `Dropout(p=[.3, .5, .8, 1])` → `Activation`.
    But we use two connections on purpose here because we want to demonstrate how
    the Multi-trial NAS chooses the best connection.'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，`Linear` → `Dropout(p=1)` → `Activation` 等于 `Linear` → `Activation`，并且可以设计出与图
    [4-18](#Fig18) 相同的块空间而不使用两个连接。我们可以通过简单的层超参数优化实现相同的块空间：`Linear` → `Dropout(p=[.3,
    .5, .8, 1])` → `Activation`。但在这里我们故意使用两个连接，因为我们想展示多试验 NAS 如何选择最佳连接。
- en: The neural architecture we are looking for consists of Feature Extraction and
    Fully Connected block sequences. Each of these blocks may have the architecture
    shown in Figures [4-17](#Fig17) and [4-18](#Fig18), respectively. The LeNet NAS
    algorithm must find the optimal Feature Extraction and Fully Connected block sequence
    lengths, as well as their architectures. The Model Space for LeNet NAS can be
    drawn as depicted in Figure [4-19](#Fig19).
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所寻找的神经网络架构由特征提取和完全连接块序列组成。这些块中的每一个都可能具有图 [4-17](#Fig17) 和 [4-18](#Fig18) 中所示的架构。LeNet
    NAS 算法必须找到最优的特征提取和完全连接块序列长度，以及它们的架构。LeNet NAS 的模型空间可以如图 [4-19](#Fig19) 所示绘制。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig19_HTML.png)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig19_HTML.png)'
- en: Figure 4-19
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-19
- en: LeNet NAS Model Space
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet NAS 模型空间
- en: We will start implementing the CIFAR-10 LeNet NAS by defining a Feature Extraction
    block in Listing [4-7](#PC73).
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过定义列表 [4-7](#PC73) 中的特征提取块来开始实现 CIFAR-10 LeNet NAS。
- en: '[PRE72]'
  id: totrans-354
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: '`FeatureExtractionBlock` takes the following parameters:'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: '`FeatureExtractionBlock` 接受以下参数：'
- en: '`dim:` Input–output channels'
  id: totrans-356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dim:` 输入-输出通道'
- en: '`kernel_size:` Kernel of convolution layer'
  id: totrans-357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kernel_size:` 卷积层的核大小'
- en: '`activation:` Activation function'
  id: totrans-358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`activation:` 激活函数'
- en: '`block_num`: Ordinal number of the block in Feature Extraction sequence'
  id: totrans-359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`block_num`: 特征提取序列中块的序号'
- en: '[PRE73]'
  id: totrans-360
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: 'Initializing core convolution layer:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化核心卷积层：
- en: '[PRE74]'
  id: totrans-362
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: 'Declaring pool and activation layers:'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 声明池化和激活层：
- en: '[PRE75]'
  id: totrans-364
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: 'Switch choice for two different branches:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 对两个不同分支的选择：
- en: '`Conv` → `Pool` → `Activation`'
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Conv` → `Pool` → `Activation`'
- en: '`Conv` → `Activation`'
  id: totrans-367
  prefs:
  - PREF_UL
