  type: TYPE_NORMAL
  zh: LeNet NAS 最佳模型架构
- en: The research we made in this section can be a good starting point for your own
    NAS solutions. It contains basic techniques used in Multi-trial NAS. Here, we
    used the LeNet model as the Base Model, but you can choose any model and any mutators
    that fit the concrete problem better. But we haven’t achieved a great result in
    the LeNet NAS. In the next section, we’ll try another NAS with a more sophisticated
    approach.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在本节中进行的这项研究可以作为您自己的 NAS 解决方案的良好起点。它包含了在多试验 NAS 中使用的基本技术。在这里，我们使用了 LeNet 模型作为基础模型，但您可以选择任何模型和任何更适合具体问题的修改器。但我们没有在
    LeNet NAS 中取得很好的结果。在下一节中，我们将尝试使用更复杂的方法进行另一种 NAS。
- en: CIFAR-10 ResNet NAS
  id: totrans-450
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: CIFAR-10 ResNet NAS
- en: Let’s try to find another approach to the architecture search that solves the
    CIFAR-10 problem. In 2015, the article “Deep Residual Learning for Image Recognition”
    ([`https://arxiv.org/pdf/1512.03385.pdf`](https://arxiv.org/pdf/1512.03385.pdf))
    was published. This article had a huge impact on deep learning in general. It
    introduced the concept of a residual term, which could degrade the blocks of the
    neural network, which overwhelmed its performance.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试找到另一种解决 CIFAR-10 问题的架构搜索方法。2015 年，发表了文章“用于图像识别的深度残差学习”([`https://arxiv.org/pdf/1512.03385.pdf`](https://arxiv.org/pdf/1512.03385.pdf))。这篇文章对深度学习产生了巨大影响。它引入了残差项的概念，可以降低神经网络块的性能，从而提高其性能。
- en: The basic building block of the ResNet model is the Bottleneck block. Original
    Bottleneck block skips connections inside. But we will add this as an optional
    feature. NAS algorithm will define if it is appropriate to use the skip connection
    technique for the Bottleneck block. So there are two variants of Bottleneck block
    in ResNet NAS *with* and *without* skip connection technique. The architecture
    of the Bottleneck block space can be demonstrated as shown in Figure [4-21](#Fig21).
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet 模型的基本构建块是瓶颈块。原始瓶颈块内部跳过连接。但我们将将其作为可选功能添加。NAS 算法将定义是否适合为瓶颈块使用跳转连接技术。因此，在
    ResNet NAS 中有两种瓶颈块变体：带有和没有跳转连接技术的。瓶颈块空间的结构可以在图 [4-21](#Fig21) 中展示。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig21_HTML.png)'
  id: totrans-453
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig21_HTML.png)'
- en: Figure 4-21
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-21
- en: Bottleneck block space
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 瓶颈块空间
- en: Another component of ResNet is the Residual Cell. Residual Cell consists of
    a sequence of Bottleneck blocks. The optimal length of the Bottleneck sequence
    in Residual Cell depends on the concrete dataset. Figure [4-22](#Fig22) shows
    the Residual Cell space.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet 的另一个组件是残差单元。残差单元由一系列瓶颈块组成。残差单元中瓶颈序列的最优长度取决于具体的数据集。图 [4-22](#Fig22) 展示了残差单元的空间。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig22_HTML.png)'
  id: totrans-457
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig22_HTML.png)'
- en: Figure 4-22
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-22
- en: Residual Cell space
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 残差单元空间
- en: 'And finally, we can construct the ResNet model. ResNet has the following architecture:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以构建 ResNet 模型。ResNet 具有以下架构：
- en: Initial convolution layer
  id: totrans-461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始卷积层
- en: Residual Cell sequence
  id: totrans-462
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 残差单元序列
- en: Several Fully Connected layers
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 几个全连接层
- en: The optimal length of a Residual Cell sequence depends on the dataset. And we
    will try to find it in ResNet NAS. Figure [4-23](#Fig23) presents the complete
    Model Space for ResNet NAS.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 残差单元序列的最优长度取决于数据集。我们将在 ResNet NAS 中尝试找到它。图 [4-23](#Fig23) 展示了 ResNet NAS 的完整模型空间。
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig23_HTML.png)'
  id: totrans-465
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig23_HTML.png)'
- en: Figure 4-23
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-23
- en: ResNet NAS space
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet NAS 空间
- en: Listing [4-11](#PC110) defines the Bottleneck block for ResNet Model Space.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [4-11](#PC110) 定义了 ResNet 模型空间中的瓶颈块。
- en: '[PRE109]'
  id: totrans-469
  prefs: []
  type: TYPE_PRE
  zh: '[PRE109]'
- en: 'Bottleneck expansion ratio:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 瓶颈扩展比：
- en: '[PRE110]'
  id: totrans-471
  prefs: []
  type: TYPE_PRE
  zh: '[PRE110]'
- en: 'The number of output channels that are produced by Bottleneck block:'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 瓶颈块产生的输出通道数：
- en: '[PRE111]'
  id: totrans-473
  prefs: []
  type: TYPE_PRE
  zh: '[PRE111]'
- en: 'Bottleneck takes the following parameters:'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 瓶颈块接受以下参数：
- en: '`cell_num`: The ordinal number of Residual Cell this block belongs to'
  id: totrans-475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cell_num`：此块所属的残差单元的序号'
- en: '`in_channels`: Input channels to the first convolution layer'
  id: totrans-476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`in_channels`：第一个卷积层的输入通道'
- en: '`out_channels`: Output channels to all convolutional layers in the block'
  id: totrans-477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`out_channels`：块中所有卷积层的输出通道'
- en: '`i_downsample`: Identity downsample block'
  id: totrans-478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`i_downsample`：标识下采样块'
- en: '[PRE112]'
  id: totrans-479
  prefs: []
  type: TYPE_PRE
  zh: '[PRE112]'
- en: 'Defining three convolution layers with batch normalization:'
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 定义三个带有批量归一化的卷积层：
- en: '[PRE113]'
  id: totrans-481
  prefs: []
  type: TYPE_PRE
  zh: '[PRE113]'
- en: 'Skip connection acts the same for all blocks in Residual Cell because all `InputChoice`
    mutators share the same label in the Residual Cell:'
