  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: Retiarii 使用 `import nni.retiarii.nn.pytorch as nn` 来导入 PyTorch。使用此包中实现 NAS 的层非常重要。
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: First, we need to define the Model Space for Exploration. Model Space in the
    NAS context can be considered as search space in the HPO context. Model Space
    is represented by a class that contains all possible architectures to try. Each
    such class must be annotated with `@model_wrapper`.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要定义探索的模型空间。在 NAS 的上下文中，模型空间可以被视为 HPO 上下文中的搜索空间。模型空间由一个包含所有可能架构的类表示。每个这样的类都必须使用
    `@model_wrapper` 进行注释。
- en: '[PRE4]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Different variants of the neural network architecture are determined by special
    methods called *Mutators*. Mutators define the rules for different variations
    or mutations of the model. The `LayerChoice` mutator defines different layer choices.
    In the following, `LayerChoice` selects one of three layers: `Tanh`, `Sigmoid`,
    and `ReLU`:'
