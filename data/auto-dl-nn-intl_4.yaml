  zh: 因此，拥有一个可以迭代构建不同长度块堆叠的工具将非常方便。这正是 `Repeat` 突变器所做的事情。让我们检查 `Repeat` 突变器在合成算术任务中的实现，就像我们之前为
    `InputChoice` 突变器所做的那样。假设我们有一个将值添加到张量中的块序列。我们需要找到这个序列的最佳长度。列表 [4-5](#PC51) 描述了此问题的模型空间。
