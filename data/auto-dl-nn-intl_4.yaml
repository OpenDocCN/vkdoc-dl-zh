  zh: 使用 Retiarii 深入研究神经架构搜索（NAS）的最佳方式是检查一个寻找特定任务最优数据流图（DFG）的简单示例。我们不会深入探讨神经网络的设计，而是将重点放在一个简单的算术问题上。假设我们有一些操作符链
    *F*，它执行以下操作：
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We can enrich the chain *F* with the following statements:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用以下语句丰富链 *F*：
