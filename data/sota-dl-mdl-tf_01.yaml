  id: totrans-393
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 模型数据
- en: 'Clear and seed:'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置种子：
- en: '[PRE103]'
  id: totrans-395
  prefs: []
  type: TYPE_PRE
  zh: '[PRE103]'
- en: Create the model as shown in Listing [1-12](#PC105).
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表 [1-12](#PC105) 创建模型。
- en: '[PRE104]'
  id: totrans-397
  prefs: []
  type: TYPE_PRE
  zh: '[PRE104]'
- en: 'Inspect:'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 检查：
- en: '[PRE105]'
  id: totrans-399
  prefs: []
  type: TYPE_PRE
  zh: '[PRE105]'
- en: 'Compile:'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE106]'
  id: totrans-401
  prefs: []
  type: TYPE_PRE
  zh: '[PRE106]'
- en: 'Train:'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE107]'
  id: totrans-403
  prefs: []
  type: TYPE_PRE
  zh: '[PRE107]'
- en: Summary
  id: totrans-404
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We built ML input pipeline examples from three types of data. The first experiments
    built pipelines from data loaded into memory. We then built a pipeline from external
    files. The final experiment built a pipeline from cloud storage.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从三种类型的数据构建了 ML 输入管道示例。第一次实验是从加载到内存中的数据构建管道。然后我们从外部文件构建了一个管道。最后的实验是从云存储构建了一个管道。
