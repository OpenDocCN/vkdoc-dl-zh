- en: 1. Build TensorFlow Input Pipelines
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 构建TensorFlow输入管道
- en: We introduce you to TensorFlow input pipelines with the tf.data API, which enables
    you to build complex input pipelines from simple, reusable pieces. Input pipelines
    are the lifeblood of any deep learning experiment because learning models expect
    data in a TensorFlow consumable form. It is very easy to create high-performance
    pipelines with the tf.data.Dataset abstraction (a component of the tf.data API)
    because it represents a sequence of elements from a dataset in a simple format.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们向您介绍TensorFlow输入管道，使用tf.data API，它使您能够从简单的、可重复使用的组件构建复杂的输入管道。输入管道是任何深度学习实验的生命线，因为学习模型期望以TensorFlow可消费的形式接收数据。使用tf.data.Dataset抽象（tf.data
    API的组件）创建高性能管道非常容易，因为它以简单格式表示数据集中的元素序列。
- en: Although data cleaning is a critical component of input pipelining, we focus
    on building pipelines with cleansed data. We want to focus you on building TensorFlow
    consumable pipelines rather than data cleansing. A data scientist can spend upwards
    of 80% of the total machine learning (ML) project’s time on just cleaning the
    data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管数据清洗是输入管道线中的关键组成部分，但我们专注于构建清洗后的数据管道。我们希望您专注于构建TensorFlow可消费的管道，而不是数据清洗。数据科学家可能将超过80%的总机器学习（ML）项目时间用于仅数据清洗。
- en: We build input pipelines from three data sources. The first data source is from
    data loaded into memory. The second one is from external files. The final one
    is from cloud storage.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从三个数据源构建输入管道。第一个数据源是从内存中加载的数据。第二个来源是外部文件。最后一个来源是云存储。
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 章节的笔记本位于以下URL：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/tensorflow)'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/paperd/deep-learning-models](https://github.com/paperd/tensorflow)'
- en: What Are Input Pipelines?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 输入管道是什么？
- en: A **machine learning (ML)** **input pipeline** is an approach to codify and
    automate the workflows required to produce a machine learning model. *ML workflows*
    are the phases that are implemented during a ML project. Typical phases include
    data collection, data preprocessing, building datasets, model training and refinement,
    evaluation, and deployment to production. So the goal of an input pipeline is
    to automate the workflows (or phases) associated with ML problem solving. Once
    an input pipeline is automated, it can be reused as new data is added to a ML
    project. It can even be tweaked for use with similar ML projects.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**机器学习（ML）输入管道**是一种将生成机器学习模型所需的工作流程编码和自动化的方法。"ML工作流程"是在机器学习项目期间实施的阶段。典型的阶段包括数据收集、数据预处理、构建数据集、模型训练和优化、评估以及部署到生产环境。因此，输入管道的目标是自动化与机器学习问题解决相关的工作流程（或阶段）。一旦输入管道自动化，它就可以在添加新数据到机器学习项目时重复使用。它甚至可以调整以用于类似的机器学习项目。'
- en: The first step in any input pipeline is data preprocessing. In this step, raw
    data is gathered, cleansed, and merged into a single organized framework. **Data
    cleaning** is the process of identifying and fixing any issues with a dataset.
    The objective of data cleaning is to fix any data that is incorrect, inaccurate,
    incomplete, incorrectly formatted, duplicated, or irrelevant to the purpose of
    the ML project so that the cleansed dataset is correct, consistent, reliable,
    and usable.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 任何输入管道的第一步是数据预处理。在这一步中，原始数据被收集、清洗并合并到一个单一的有序框架中。"数据清洗"是识别和修复数据集中任何问题的过程。数据清洗的目标是修复任何不正确、不准确、不完整、格式错误、重复或不相关于机器学习项目目的的数据，以便清洗后的数据集是正确的、一致的、可靠的和可用的。
- en: Without robust and accurate data as input to train a model, projects are more
    likely to fail. Once data is properly prepared, the focus of an input pipeline
    is on writing and executing ML algorithms to obtain a ML model.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 没有健壮和准确的数据作为训练模型的输入，项目更有可能失败。一旦数据得到适当准备，输入管道的焦点就转向编写和执行机器学习算法以获得机器学习模型。
- en: Why Build Input Pipelines?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么构建输入管道？
- en: To understand the importance of input pipelines, it is beneficial to look at
    the typical stages that data science teams work through when building a ML model.
    Implementing a ML model from scratch tends to be very problem-oriented. So a data
    science team focuses on producing a model to solve a single business problem.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解输入管道的重要性，查看数据科学团队在构建机器学习模型时通常会经历的典型阶段是有益的。从头开始实现机器学习模型往往非常问题导向。因此，数据科学团队专注于产生一个模型来解决单个商业问题。
- en: Manual Workflow
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 手动工作流程
- en: Typically, teams start with a *manual workflow* with no existing infrastructure.
    Data collection, data cleaning, model training, and evaluation are likely written
    in a single notebook. The notebook is run locally to produce a model, which is
    handed over to an engineer tasked with turning it into an application programming
    interface (API) endpoint. An **API endpoint** is a remote tool utilizing ML to
    solve a specific problem within a specific project. So the engineer works with
    a trained model to create an API tool that can be deployed across platforms.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，团队从没有现有基础设施的**手动工作流程**开始。数据收集、数据清洗、模型训练和评估可能都写在单个笔记本中。笔记本在本地运行以生成模型，然后交给一个工程师，负责将其转换为应用程序编程接口（API）端点。**API
    端点**是一种远程工具，利用机器学习在特定项目中解决特定问题。因此，工程师与训练好的模型一起工作，创建一个可以跨平台部署的 API 工具。
- en: A manual workflow is often ad hoc and starts to break down when a team begins
    to speed up its iteration cycle because manual processes are difficult to repeat
    and document. Code in a single notebook format tends to be unsuitable for collaboration.
    In a manual workflow scenario, the **model** is the product.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 手动工作流程通常是临时的，当团队开始加快其迭代周期时，它开始崩溃，因为手动流程难以重复和记录。单笔记本格式的代码通常不适合协作。在手动工作流程场景中，**模型**就是产品。
- en: Automated Workflow
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动化工作流程
- en: Once teams move from a stage where they are occasionally updating a single model
    to having multiple frequently updated models in production, a pipeline approach
    becomes paramount. In this scenario, we don’t build and maintain a model. We develop
    and maintain a pipeline. So the **pipeline** is the product.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦团队从偶尔更新单个模型的状态转变为在生产中拥有多个频繁更新的模型，采用管道方法变得至关重要。在这种情况下，我们不是构建和维护模型，而是开发和维护管道。因此，**管道**就是产品。
- en: An automated pipeline consists of components and a blueprint for how the components
    are integrated to produce and update the most crucial component – the model. With
    automated workflows, code is split into more manageable components including data
    preprocessing, model training, model evaluation, and retraining triggers. Such
    triggers are put in place to automatically fire when a model requires retraining.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化管道由组件及其如何集成以生成和更新最重要的组件——模型——的蓝图组成。使用自动化工作流程，代码被拆分为更易于管理的组件，包括数据预处理、模型训练、模型评估和重新训练触发器。这些触发器被放置在那里，以便在模型需要重新训练时自动触发。
- en: The system offers the ability to execute, iterate, and monitor a single component
    in the context of the entire pipeline with the same ease and rapid iteration as
    running a local notebook cell on a laptop. It also lets us define the required
    inputs and outputs, library dependencies, and monitored metrics.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 系统提供了在管道的整个上下文中以与在笔记本电脑上运行本地笔记本单元格相同的轻松和快速迭代方式执行、迭代和监控单个组件的能力。它还允许我们定义所需的输入和输出、库依赖项和监控指标。
- en: The ability to split problem solving into reproducible, predefined, and executable
    components forces the team to adhere to a joined (or joint) process. A joined
    process, in turn, creates a well-defined language between the data scientists
    and engineers that eventually leads to an automated setup that is the ML equivalent
    of continuous integration (CI). CI is the practice of automating the integration
    of code changes from multiple contributors into a single software project so the
    final product is capable of auto-updating itself.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 将问题解决分解为可重复、预定义和可执行组件的能力迫使团队遵守联合（或联合）流程。反过来，这种联合流程在数据科学家和工程师之间创建了一种定义良好的语言，最终导致了一个自动化的设置，这是机器学习（ML）的持续集成（CI）等效物。CI
    是一种自动化将多个贡献者的代码更改集成到单个软件项目中的实践，以便最终产品能够自动更新自身。
- en: Basic Input Pipeline Mechanics
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本输入管道机制
- en: The *tf.data.Dataset* API supports writing descriptive and efficient input pipelines,
    which follows a common pattern. First, create a source dataset from the input
    data. Second, apply data transformations to preprocess the data. Third, iterate
    over the dataset and process the elements. Iteration happens in a streaming fashion
    so the entire dataset doesn’t need to fit into memory.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '`tf.data.Dataset` API 支持编写描述性和高效的输入管道，遵循一个常见的模式。首先，从输入数据创建一个源数据集。其次，应用数据转换来预处理数据。第三，遍历数据集并处理元素。迭代以流式方式进行，因此整个数据集不需要全部适合内存。'
- en: Once a data source is created, transform it into a new dataset by chaining method
    calls on the tf.data.Dataset object. The dataset object is a Python iterable that
    can be consumed with a for loop.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦创建了一个数据源，就可以通过在 tf.data.Dataset 对象上链式调用方法将其转换成一个新的数据集。数据集对象是一个 Python 可迭代对象，可以用
    for 循环消费。
- en: A TensorFlow dataset is typically created in two distinct ways. We can create
    a dataset from data stored in memory or in one or more files. If need be, however,
    we can create a dataset with a data transformation based on one or more tf.data.Dataset
    objects.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 数据集通常以两种不同的方式创建。我们可以从存储在内存中或一个或多个文件中的数据创建数据集。然而，如果需要，我们也可以基于一个或多个
    tf.data.Dataset 对象创建一个基于数据转换的数据集。
- en: To create a TensorFlow dataset from memory, use either the *from_tensors()*
    or *from_tensor_slices()* method. To create a TensorFlow dataset from data stored
    in a file in the recommended TFRecord format, use the *TFRecordDataset()* method.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 要从内存中创建 TensorFlow 数据集，请使用 *from_tensors()* 或 *from_tensor_slices()* 方法。要从存储在文件中的数据创建
    TensorFlow 数据集，请使用推荐的 TFRecord 格式，并使用 *TFRecordDataset()* 方法。
- en: The **from_tensors()** method combines the input tensor from the data source
    and returns a dataset with a single element. The **from_tensor_slices()** method
    creates a dataset with a separate element for each row of the input tensor. An
    **input tensor** is a vector or matrix of n dimensions that represents the data
    source. We focus on the *from_tensor_slices()* method because we want to be able
    to conveniently inspect and process each element from the data source.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**from_tensors()** 方法将数据源中的输入张量组合起来，并返回一个包含单个元素的数据集。**from_tensor_slices()**
    方法为输入张量的每一行创建一个单独元素的数据集。**输入张量**是一个表示数据源的 n 维向量或矩阵。我们专注于 *from_tensor_slices()*
    方法，因为我们希望能够方便地检查和处理数据源中的每个元素。'
- en: High-Performance Pipelines
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高性能管道
- en: The tf.data API enables creation of flexible and efficient input pipelines by
    delivering data for the next step of training before the current step has finished.
    We focus on three of the best practices for building performant TensorFlow input
    pipelines, namely, prefetch, cache, and shuffle. We discuss each of these practices
    with examples when we build input pipelines later in the chapter.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: tf.data API 通过在当前步骤完成之前提供训练的下一步数据，从而创建灵活且高效的输入管道。我们专注于构建高性能 TensorFlow 输入管道的三个最佳实践，即预取、缓存和洗牌。当我们在本章后面构建输入管道时，我们将通过示例讨论这些实践。
- en: Google Developers Codelabs
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Google Developers Codelabs
- en: Even after you work through the examples in this book, you may want to add to
    your deep learning application knowledge by exploring additional tutorials. *Google
    Developers Codelabs* provide guided tutorials emphasizing hands-on coding examples.
    Most tutorials step you through the process of building a small application or
    adding a new feature to an existing application. They cover a wide range of topics
    such as Android Wear, Google Compute Engine, Project Tango, and Google APIs on
    iOS.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你已经完成了这本书中的示例，你也可能希望通过探索额外的教程来增加你的深度学习应用知识。*Google Developers Codelabs* 提供了强调动手编码实例的指导教程。大多数教程都会逐步引导你构建一个小型应用程序或向现有应用程序添加新功能。它们涵盖了广泛的主题，例如
    Android Wear、Google Compute Engine、Project Tango 以及 iOS 上的 Google API。
- en: To peruse the Codelabs website, visit
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 要浏览 Codelabs 网站，请访问
- en: '[`https://codelabs.developers.google.com/`](https://codelabs.developers.google.com/)'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://codelabs.developers.google.com/](https://codelabs.developers.google.com/)'
- en: Create a New Notebook in Colab
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Colab 中创建一个新的笔记本
- en: Within the Colab environment, it is easy to create a new notebook. Open Google
    Colab in a browser (if not already open). From the pop-up window, click *New notebook*.
    If already in the Colab environment, click *File* in the top-left menu under *Welcome
    to Colaboratory*. Click *New notebook* from the drop-down menu. A code cell is
    now ready for executing Python code! Add code or text cells by clicking the *+
    Code* or *+ Text* button. For more options, click *Insert* from the main menu.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Colab 环境中，创建一个新的笔记本非常容易。在浏览器中打开 Google Colab（如果尚未打开）。从弹出窗口中，点击 *New notebook*。如果已经在
    Colab 环境中，请点击左上角的菜单栏下的 *Welcome to Colaboratory* 中的 *File*。从下拉菜单中选择 *New notebook*。现在就有一个代码单元格可以执行
    Python 代码了！通过点击 *+ Code* 或 *+ Text* 按钮添加代码或文本单元格。要获取更多选项，请从主菜单中选择 *Insert*。
- en: For an introduction to Colab, peruse
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解 Colab 的介绍，请查阅
- en: '[`https://colab.research.google.com/`](https://colab.research.google.com/)'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://colab.research.google.com/](https://colab.research.google.com/)'
- en: 'To create your first piece of code, add the following in the code cell:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建你的第一段代码，请在代码单元格中添加以下内容：
- en: '[PRE0]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: To execute the code, click the *little arrow to the left*. The output from the
    code cell shows the result of the multiplication.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行代码，请点击左边的 *小箭头*。代码单元的输出显示了乘法的结果。
- en: Tip
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: We recommend copying and pasting code from the website.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们建议从网站复制并粘贴代码。
- en: Import the TensorFlow Library
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入 TensorFlow 库
- en: 'Before we can do anything in TensorFlow, we must import the appropriate Python
    library. It is common practice to alias the TensorFlow library as **tf**. So go
    ahead and execute the import in a new code cell:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们能够在 TensorFlow 中做任何事情之前，我们必须导入适当的 Python 库。将 TensorFlow 库别名为 **tf** 是一种常见的做法。因此，请在新的代码单元中执行导入操作：
- en: '[PRE1]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: GPU Hardware Accelerator
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPU 硬件加速器
- en: 'To vastly speed up processing, use the GPU available from the Google Colab
    cloud service. Colab provides a free Tesla K80 GPU of about 12 GB RAM (as of this
    writing). It’s very easy to enable the GPU in a Colab notebook:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了极大地加快处理速度，请使用 Google Colab 云服务提供的 GPU。Colab 提供了一个大约 12 GB RAM 的免费 Tesla K80
    GPU（截至本文写作时）。在 Colab 笔记本中启用 GPU 非常简单：
- en: Click *Runtime* in the top-left menu.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右上角菜单中点击 *运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择 *更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 *硬件加速器* 下拉菜单中选择 *GPU*。
- en: Click *Save*.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *保存*。
- en: Note
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The GPU must be enabled in *each* notebook. But it only has to be enabled once.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 必须在每个笔记本中启用 GPU。但只需启用一次。
- en: 'Verify that the GPU is active:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 验证 GPU 是否处于活动状态：
- en: '[PRE2]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: If ‘/device:GPU:0’ is displayed, the GPU is active. If ‘ ’ is displayed, the
    regular CPU is active.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果显示 ‘/device:GPU:0’，则 GPU 正在运行。如果显示 ‘’，则常规 CPU 正在运行。
- en: Tip
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: If you get the error **NAME ‘TF’ IS NOT DEFINED**, re-execute the code to import
    the TensorFlow library! For some reason, we sometimes have to re-execute the TensorFlow
    library import in Colab. We don’t know why this is the case.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果出现错误 **NAME ‘TF’ IS NOT DEFINED’，重新执行代码以导入 TensorFlow 库！由于某种原因，我们有时必须在 Colab
    中重新执行 TensorFlow 库导入。我们不知道这是为什么。
- en: Colab is a wonderful tool to work with TensorFlow. However, it does have its
    limitations. Colab applies dynamic resource provisioning. In order to be able
    to offer computational resources for free, Colab dynamically adjusts usage limits
    and hardware availability on the fly. So available resources in Colab vary over
    time to accommodate fluctuations in demand. In a nutshell, this means that Colab
    may not always be available for use! One solution is to move to Colab Pro for
    a small monthly fee. As of this writing, the cost is $9.99/month.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Colab 是一个与 TensorFlow 一起工作的出色工具。然而，它确实有其局限性。Colab 应用动态资源分配。为了能够免费提供计算资源，Colab
    会动态调整使用限制和硬件可用性。因此，Colab 中的可用资源会随时间变化，以适应需求波动。简而言之，这意味着 Colab 可能并不总是可用！一个解决方案是转为使用
    Colab Pro，只需支付小额月费。截至本文写作时，费用为 $9.99/月。
- en: Tip
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: For serious TensorFlow users, we recommend moving to Colab Pro. It is not free,
    but it is quite inexpensive. From our experience, it is more powerful than the
    free version, and it is more readily available.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 对于严肃的 TensorFlow 用户，我们建议转为使用 Colab Pro。它不是免费的，但价格相当低廉。根据我们的经验，它比免费版本更强大，并且更易于获得。
- en: Create a TensorFlow Dataset
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建 TensorFlow 数据集
- en: 'Create a dataset of three tensors with six elements each:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个包含三个张量，每个张量有六个元素的数据集：
- en: '[PRE3]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Create the dataset. Transform it into a tf.data.Dataset object with the from_tensor_slices()
    method. The shape of the dataset is (6,), which means that each row contains six
    scalar values.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据集。使用 from_tensor_slices() 方法将其转换为 tf.data.Dataset 对象。数据集的形状为 (6,), 这意味着每一行包含六个标量值。
- en: Tip
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: We highly recommend testing small pieces of code in their own code cells to
    reduce debugging time and effort.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们强烈建议在各自的代码单元中测试小块代码，以减少调试时间和精力。
- en: Consume the Dataset
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 消费数据集
- en: 'Iterate over the dataset to display tensor information:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 遍历数据集以显示张量信息：
- en: '[PRE4]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Since the tf.data.Dataset object is created with from_tensor_slices(), it is
    a Python iterable that can be consumed with a for loop. With TensorFlow datasets,
    use the *numpy()* method to explicitly convert each tensor to a NumPy array.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 tf.data.Dataset 对象是通过 from_tensor_slices() 创建的，它是一个 Python 可迭代对象，可以用 for
    循环来消费。在使用 TensorFlow 数据集时，使用 *numpy()* 方法显式地将每个张量转换为 NumPy 数组。
- en: 'Alternatively, we can use the *take()* method to iterate over a TensorFlow
    dataset:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们可以使用 *take()* 方法遍历 TensorFlow 数据集：
- en: '[PRE5]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We add *3* as a parameter in the take() method to grab three examples.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在 take() 方法中添加 *3* 作为参数，以获取三个示例。
- en: 'Another option is to create a Python iterator:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个选项是创建一个 Python 迭代器：
- en: '[PRE6]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Initialize a counter variable. Use the *iter()* method to create an iterator.
    Consume the iterator with the *next()* method and display the results.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化一个计数器变量。使用*iter()*方法创建一个迭代器。使用*next()*方法消费迭代器并显示结果。
- en: Dataset Structure
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集结构
- en: The *element_spec* property of tf.data.Dataset allows inspection of the dataset.
    The property returns a nested structure of the tf.TypeSpec object that matches
    the structure of the element. The nested structure may be a single component,
    a tuple of components, or a nested tuple of components.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: tf.data.Dataset的*element_spec*属性允许检查数据集。该属性返回一个与元素结构匹配的tf.TypeSpec对象的嵌套结构。嵌套结构可能是一个组件，一个组件的元组，或者一个组件的嵌套元组。
- en: 'Inspect the dataset:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 检查数据集：
- en: '[PRE7]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Shape and datatype are displayed.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 显示形状和数据类型。
- en: 'Alternatively, we can just display the tf.data.Dataset object:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们也可以直接显示tf.data.Dataset对象：
- en: '[PRE8]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Create a Dataset from Memory
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从内存中创建数据集
- en: If all of your input data fits in memory, the simplest way to create a TensorFlow
    dataset is to convert it to tf.Tensor objects with the from_tensor_slices() method.
    Now, we are going to build a pipeline. We begin by loading a clean dataset. We
    continue by scaling the feature data images. Scaling (or feature scaling) is a
    method used to normalize the range of independent variables or features of a dataset.
    Scaling is important because ML models tend to work better if the pixels that
    make up each image are smaller in size. We inspect the data with code and visualizations.
    Next, we configure the pipeline for performance. We end by creating a model, training
    the model, and evaluating the model.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如果所有输入数据都适合内存，创建TensorFlow数据集的最简单方法是将它转换为tf.Tensor对象，使用from_tensor_slices()方法。现在，我们将构建一个管道。我们首先加载一个干净的数据库。然后，我们继续缩放特征数据图像。缩放（或特征缩放）是一种用于归一化数据集独立变量或特征范围的方法。缩放很重要，因为机器学习模型如果组成每个图像的像素尺寸更小，则往往表现更好。我们使用代码和可视化来检查数据。接下来，我们配置管道以获得性能。最后，我们创建一个模型，训练模型并评估模型。
- en: Load and Inspect Data
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载数据并检查：
- en: To build an input pipeline, we need a dataset. Since the focus is on building
    a TensorFlow consumable pipeline, we work with cleansed datasets.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建输入管道，我们需要一个数据集。由于重点是构建TensorFlow可消费的管道，我们使用清洗过的数据集。
- en: 'Load training and test data in memory:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在内存中加载训练和测试数据：
- en: '[PRE9]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Download Fashion-MNIST data into training and test sets. We use training data
    to teach the model. We use test data to evaluate the model. Fashion-MNIST is a
    dataset of Zalondo’s article images. It contains 60,000 training and 10,000 test
    examples. The dataset is intended to serve as a direct drop-in replacement of
    the original MNIST dataset for benchmarking machine learning algorithms.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 将Fashion-MNIST数据下载到训练集和测试集中。我们使用训练数据来训练模型。我们使用测试数据来评估模型。Fashion-MNIST是Zalondo文章图像的数据集。它包含60,000个训练样本和10,000个测试样本。该数据集旨在作为原始MNIST数据集的直接替换，用于基准测试机器学习算法。
- en: 'Inspect:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 检查：
- en: '[PRE10]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Training and test sets are tuples where the first tuple element contains feature
    images and the second contains corresponding labels. Both datasets are NumPy arrays.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 训练集和测试集是元组，其中第一个元组元素包含特征图像，第二个包含相应的标签。这两个数据集都是NumPy数组。
- en: 'Load images and labels into variables:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 将图像和标签加载到变量中：
- en: '[PRE11]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: By separating images and labels from the respective datasets, we can more easily
    process images and labels as needed.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将图像和标签从各自的数据库中分离出来，我们可以更轻松地按需处理图像和标签。
- en: 'Verify shapes:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 验证形状：
- en: '[PRE12]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Training data consists of 60,000 28 × 28 feature images and 60,000 labels. Test
    data consists of 10,000 28 × 28 feature images and 10,000 labels.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据由60,000个28 × 28的特征图像和60,000个标签组成。测试数据由10,000个28 × 28的特征图像和10,000个标签组成。
- en: Scale and Create the tf.data.Dataset
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缩放并创建tf.data.Dataset
- en: 'Scale data for efficient processing and create the training and test sets:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放数据以进行高效处理并创建训练集和测试集：
- en: '[PRE13]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Get slices of the NumPy arrays in the form of tf.data.Dataset objects with *from_tensor_slices()*.
    Feature image pixel values are typically integers that range from 0 to 255\. To
    scale, divide feature images by 255 to get pixel values that range from 0 to 1.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 使用*from_tensor_slices()*从NumPy数组中获取切片，形成tf.data.Dataset对象。特征图像像素值通常是介于0到255之间的整数。为了缩放，将特征图像除以255以获得介于0到1之间的像素值。
- en: Scaling images is a critical preprocessing step because deep learning models
    train faster on smaller images. Moreover, many deep learning model architectures
    require that images are the same size. But raw images tend to vary in size.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放图像是一个关键的前处理步骤，因为深度学习模型在较小的图像上训练得更快。此外，许多深度学习模型架构要求图像尺寸相同。但是原始图像的尺寸往往不同。
- en: 'Inspect training and test tensors:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 检查训练和测试张量：
- en: '[PRE14]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Both datasets are *TensorSliceDataset* objects, which means that they are iterators.
    An **iterator** is an object that contains a countable number of examples that
    can be traversed with the *next()* method.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 两个数据集都是 *TensorSliceDataset* 对象，这意味着它们是迭代器。一个 **迭代器** 是一个包含可计数示例的对象，可以使用 *next()*
    方法遍历。
- en: 'Display the first label from the training set:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练集中的第一个标签：
- en: '[PRE15]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Each example in the training set contains an image matrix and its corresponding
    label. The *next()* method returns a tuple with the first image matrix and its
    label in positions 0 and 1 in the tuple respectively.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 训练集中的每个示例都包含一个图像矩阵及其对应的标签。*next()* 方法返回一个元组，其中第一个图像矩阵和其标签分别位于元组的第 0 和第 1 个位置。
- en: 'Display ten labels from the training set:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练集中的十个标签：
- en: '[PRE16]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The *batch()* method takes *n* examples from a dataset.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '*batch()* 方法从一个数据集中取 *n* 个示例。'
- en: 'Display all 60,000 labels from the training set:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练集中的所有 60,000 个标签：
- en: '[PRE17]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Display the first image from the training set:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练集中的第一张图像：
- en: '[PRE18]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Verify that the first image is a 28 × 28 matrix:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 验证第一张图像是一个 28 × 28 的矩阵：
- en: '[PRE19]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: To find dimensions of a matrix in Python, the height (or rows) is *len(matrix),*
    and the width (or columns) is *len(matrix[0])*.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 要在Python中找到矩阵的维度，高度（或行）是 *len(matrix)*，宽度（或列）是 *len(matrix[0])*。
- en: Verify Scaling
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 验证缩放
- en: 'Display a pre-scaled tensor from the training set:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练集中的预缩放张量：
- en: '[PRE20]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Display the same tensor after scaling:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 显示缩放后的相同张量：
- en: '[PRE21]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Voilà! The pixels are scaled between 0 and 1.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！像素被缩放到 0 到 1 之间。
- en: Check Tensor Shape
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查张量形状
- en: 'Check shapes:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 检查形状：
- en: '[PRE22]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Fashion-MNIST images are equally sized. So we don’t have to resize them!
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: Fashion-MNIST 图像大小相同。所以我们不需要调整它们的大小！
- en: Inspect Tensors
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查张量
- en: 'Check train and test tensors:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 检查训练和测试张量：
- en: '[PRE23]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: All is well.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 一切正常。
- en: Preserve the Shape
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 保留形状
- en: 'Assign a variable to the feature image shape for use in the model:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 为模型使用分配一个变量给特征图像形状：
- en: '[PRE24]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Visualize
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化
- en: 'Visualize an element from the training set:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化训练集中的元素：
- en: '[PRE25]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Although Fashion-MNIST images are grayscale, we can bring them to life with
    colors using predefined color maps built into the matplotlib library. A **color
    map** is an array of colors used to map pixel data to actual color values.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Fashion-MNIST图像是灰度的，但我们可以使用matplotlib库中预定义的颜色图用颜色使它们生动起来。**颜色图** 是一个颜色数组，用于将像素数据映射到实际颜色值。
- en: 'Peruse the following URL for detailed information about matplotlib color maps:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 查阅以下网址以获取有关matplotlib颜色图的详细信息：
- en: '[`https://matplotlib.org/3.1.0/tutorials/colors/colormaps.html`](https://matplotlib.org/3.1.0/tutorials/colors/colormaps.html)'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '[matplotlib 颜色图教程](https://matplotlib.org/3.1.0/tutorials/colors/colormaps.html)'
- en: Define Class Labels
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义类别标签
- en: 'From our experience working with Fashion-MNIST, we know the corresponding labels:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们与Fashion-MNIST合作的经验中，我们知道相应的标签：
- en: '[PRE26]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Convert a Numerical Label to a Class Label
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将数值标签转换为类别标签
- en: 'Labels are numerical in the tf.data.Dataset that we just loaded, but we can
    display the corresponding class name with the *class_labels* list we just created:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们刚刚加载的 tf.data.Dataset 中，标签是数值的，但我们可以使用我们刚刚创建的 *class_labels* 列显示相应的类别名称：
- en: '[PRE27]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Take an example and display the label as a numerical value and string value.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 取一个示例并显示标签的数值和字符串值。
- en: Create a Plot of Examples from the Dataset
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从数据集中创建示例的绘图
- en: 'Take some images and labels from the training set:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 从训练集中取一些图像和标签：
- en: '[PRE28]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Create a function to display a grid of examples as shown in Listing [1-1](#PC30).
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来显示如图 1-1 所示的示例网格。
- en: '[PRE29]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'Invoke the function:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE30]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: It’s always a good idea to check out the dataset to see if it is as we expect.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 总是检查数据集是否如我们所期望的那样是一个好主意。
- en: Build the Consumable Input Pipeline
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建可消费的输入管道
- en: We say *consumable input pipeline* because the actual pipeline starts when data
    is actually acquired. We use this terminology to emphasize the importance of transforming
    the training and test datasets into efficient tensors for TensorFlow model consumption.
    We see examples that refer to this part as building the input pipeline, but the
    input pipeline encompasses the entire workflow from raw data to generalized model.
    In later chapters, we drop the word “consumable.”
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我们称之为 *可消费输入管道*，因为实际的管道是在数据实际获取时开始的。我们使用这个术语来强调将训练和测试数据集转换为高效张量以供TensorFlow模型消费的重要性。我们看到一些例子将这部分称为构建输入管道，但输入管道涵盖了从原始数据到通用模型的整个工作流程。在后面的章节中，我们将省略“可消费”这个词。
- en: Configure the Dataset for Performance
  id: totrans-160
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 配置数据集以优化性能
- en: Use buffered prefetching and caching to improve I/O performance. Shuffle data
    to improve model performance.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 使用缓冲预取和缓存来提高I/O性能。打乱数据以提高模型性能。
- en: '**Prefetching** is a function in the tf.data API that overlaps data preprocessing
    and model execution while training, which reduces the overall training time of
    a model. To perform this operation, add the *tf.Dataset.prefetch* transformation
    to the input pipeline.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**预取**是tf.data API中的一个功能，它在训练过程中重叠数据预处理和模型执行，从而减少了模型的总体训练时间。要执行此操作，将*tf.Dataset.prefetch*转换添加到输入管道中。'
- en: Add the *tf.data.Dataset.cache* transformation to the pipeline to keep images
    in memory after they’re loaded off disk during the first epoch, which ensures
    that the dataset doesn’t become a bottleneck during training. So caching saves
    operations (e.g., file opening, data reading) from being executed during each
    epoch.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 将*tf.data.Dataset.cache*转换添加到管道中，以在第一次周期从磁盘加载图像后将其保留在内存中，这确保了数据集在训练期间不会成为瓶颈。因此，缓存可以节省在每个周期执行的操作（例如，文件打开、数据读取）。
- en: '**Shuffling** data serves the purposes of reducing variance (ensuring that
    a model remains general) and reducing overfitting. An obvious case for shuffling
    is when data is sorted by class (or target). We shuffle to ensure that the training,
    test, and validation sets are representative of the overall distribution of the
    data. To perform this operation, add the *tf.Dataset.shuffle* transformation to
    the pipeline.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '**打乱**数据旨在减少方差（确保模型保持泛化性）和减少过拟合。一个明显的打乱案例是当数据按类别（或目标）排序时。我们打乱以确保训练、测试和验证集代表数据的整体分布。要执行此操作，将*tf.Dataset.shuffle*转换添加到管道中。'
- en: Training is always performed on batches of training data and labels. Doing so
    helps the algorithm converge. **Batch** is when all of a dataset is used to compute
    the gradient during one iteration. **Mini-batch** is when a subset of a dataset
    is used to compute the gradient during one iteration. To perform this operation,
    add the *tf.Dataset.batch* transformation to the pipeline.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 训练始终在训练数据和标签的批次上执行。这样做有助于算法收敛。**批次**是在一次迭代中使用整个数据集来计算梯度。**小批量**是在一次迭代中使用数据集的子集来计算梯度。要执行此操作，将*tf.Dataset.batch*转换添加到管道中。
- en: The *batch dimension* is typically the first dimension of data tensors. So a
    tensor of shape [100, 192, 192, 3] contains 100 images of 192 × 192 pixels with
    three values per pixel (RGB) in each batch. The **RGB color model** is an additive
    color model in which red, green, and blue lights are added together in various
    ways to reproduce a broad array of colors.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '*批维度*通常是数据张量的第一个维度。因此，形状为[100, 192, 192, 3]的张量包含100张192×192像素的图像，每个像素有三个值（RGB）在每个批次中。**RGB颜色模型**是一种加色模型，其中红、绿、蓝光以各种方式相加以重现广泛的颜色。'
- en: 'Build the consumable input pipeline:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 构建可消费的输入管道：
- en: '[PRE31]'
  id: totrans-168
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Shuffle training data. Shuffling randomizes training data, which ensures that
    each data element is independent from other data elements during each training
    epoch. Learning models tend to perform best when exposed to independently sampled
    data.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 打乱训练数据。打乱随机化训练数据，确保在每次训练周期中每个数据元素与其他数据元素独立。学习模型在接触到独立采样的数据时往往表现最佳。
- en: Batch, cache, and prefetch training and test data. Adding the *cache()* transformation
    increases performance because data is read and written only once during the first
    epoch rather than during every epoch. Adding the *prefetch(1)* transformation
    is a good idea because it adds efficiency to the batching process. That is, while
    our training algorithm is working on one batch, TensorFlow is working on the dataset
    in parallel to get the next batch ready. So this transformation can dramatically
    improve training performance.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 批量、缓存和预取训练和测试数据。添加*cache()*转换可以提高性能，因为数据只在第一次周期中读取和写入一次，而不是在每个周期中。添加*prefetch(1)*转换是一个好主意，因为它增加了批处理过程的效率。也就是说，当我们的训练算法在一个批次上工作时，TensorFlow正在并行处理数据集，以便准备好下一个批次。因此，这种转换可以显著提高训练性能。
- en: Like other tf.data.Dataset methods, prefetch operates on the elements of the
    input dataset. It has no concept of examples vs. batches. So prefetch two examples
    with examples.prefetch(2) and prefetch two batches with 20 examples per batch
    with examples.batch(20).prefetch(2).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他tf.data.Dataset方法一样，预取操作在输入数据集的元素上执行。它没有示例与批次的概念。因此，使用examples.prefetch(2)预取两个示例，使用examples.batch(20).prefetch(2)预取每个批次包含20个示例的两个批次。
- en: The test (or validation) set is used to demonstrate how well the trained model
    works on examples it hasn’t seen during training. So it being shuffled is irrelevant.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 测试（或验证）集用于展示训练好的模型在训练过程中未见过的示例上的表现如何。因此，它是否被洗牌是无关紧要的。
- en: We set batch size and shuffle size based on trial and error experiments. You
    can experiment by adjusting batch and shuffle sizes.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我们根据试错实验设置批量大小和洗牌大小。你可以通过调整批量和洗牌大小来实验。
- en: 'Inspect tensors:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE32]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Build the Model
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Import requisite libraries:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 导入必要的库：
- en: '[PRE33]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'Clear previous models and generate a seed for reproducibility of results:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 清除之前的模型并为结果的重复性生成一个种子：
- en: '[PRE34]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: We use zero for the seed value, but any number can be substituted.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用零作为种子值，但任何数字都可以替换。
- en: Tip
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Clearing previous models does *not* reset the current model to its initial state.
    To reset a model, just rebuild the input pipeline for the model!
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 清除之前的模型并不会将当前模型重置到其初始状态。要重置模型，只需重新构建模型的输入管道！
- en: 'Create the model:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE35]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: The basic building block of a neural network is the layer. Layers extract representations
    from the data fed into them. Hopefully, these representations are meaningful for
    the problem at hand. Most of deep learning consists of chaining together simple
    layers. Most layers, such as *Dense*, have parameters that are learned during
    training.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的基本构建块是层。层从输入的数据中提取表示。希望这些表示对于当前问题是有意义的。大多数深度学习都是由简单的层连接而成的。大多数层，如*密集层*，在训练过程中学习参数。
- en: The first layer in this network is a *Flatten* layer, which transforms the format
    of the images from a two-dimensional array (of 28 by 28 pixels) to a one-dimensional
    array (of 28 * 28 = 784 pixels). Think of this layer as unstacking rows of pixels
    in the image and lining them up. This layer has no parameters to learn because
    it only reformats the data.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 这个网络中的第一层是一个*Flatten*层，它将图像的格式从二维数组（28x28像素）转换为了一维数组（28x28=784像素）。将这个层想象成将图像中的像素行展开并排列起来。这个层没有需要学习的参数，因为它只重新格式化数据。
- en: After the pixels are flattened, the network consists of a sequence of two Dense
    layers. Dense layers are fully connected neural layers, which means that all the
    neurons in a layer are connected to all neurons in the next layer.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在像素被展平后，网络由一系列两个密集层组成。密集层是完全连接的神经网络层，这意味着一个层中的所有神经元都与下一层的所有神经元相连。
- en: The first Dense layer has 128 nodes (or neurons). We add a *Dropout* layer after
    the first Dense layer to reduce overfitting. The second (and last) layer returns
    a logits array with length of 10\. **Logits** are the outputs of a layer of neurons
    before the activation function is applied. Each node contains a score that indicates
    that the current image belongs to one of the ten classes.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个密集层有128个节点（或神经元）。我们在第一个密集层之后添加一个*Dropout*层来减少过拟合。第二个（也是最后一个）层返回一个长度为10的logits数组。**Logits**是在应用激活函数之前神经层输出的结果。每个节点包含一个分数，表示当前图像属于十个类别中的哪一个。
- en: '**Dropout** is a regularization method that approximates training a large number
    of neural networks with different architectures in parallel. During training,
    some number of layer outputs are randomly ignored or “dropped out,” which has
    the effect of making the layer look like and be treated like a layer with a different
    number of nodes and connectivity to the prior layer. In effect, each update to
    a layer during training is performed with a different “view” of the configured
    layer.'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '**Dropout**是一种正则化方法，它近似于并行训练具有不同架构的大量神经网络。在训练过程中，一些层输出会被随机忽略或“丢弃”，这使得层看起来像并且被当作具有不同节点数量和与前一层连接性的层来处理。实际上，在训练过程中对层的每次更新都是使用配置层的一个不同“视图”来执行的。'
- en: 'Inspect the model:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE36]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Compile and Train the Model
  id: totrans-193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: Compile the model with *SparseCategoricalCrossentropy* loss. Sparse categorical
    cross-entropy performs well when classes are mutually exclusive. That is, each
    sample belongs exactly to one class. An advantage of using sparse categorical
    cross-entropy is that it saves time in memory as well as computation because it
    uses a single integer for a class rather than a whole vector.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 使用*SparseCategoricalCrossentropy*损失函数编译模型。当类别互斥时，稀疏分类交叉熵表现良好。也就是说，每个样本恰好属于一个类别。使用稀疏分类交叉熵的优点是它节省了内存和计算时间，因为它使用单个整数来表示一个类别而不是整个向量。
- en: The *from_logits=True* attribute informs the loss function that the output values
    generated by the model are not normalized. That is, the softmax function *has
    not* been applied on them to produce a probability distribution.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: '*from_logits=True* 属性通知损失函数，模型生成的输出值未经归一化。也就是说，softmax 函数*尚未*应用于它们以产生概率分布。'
- en: 'Compile:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE37]'
  id: totrans-197
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'Train the model:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE38]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: The model is training with ten epochs. The number of **epochs** is the number
    of times the learning algorithm works through the entire training dataset. Loss
    and accuracy are displayed for training and test data. Training loss and accuracy
    are based on what the model learned during training. Test loss and accuracy are
    based on new data that the model hasn’t learned upon. So the closer test accuracy
    is to training accuracy, the more generalizable the model. Of course, we want
    to have high test accuracy and low test loss.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 模型正在使用十个周期进行训练。**周期**的数量是学习算法遍历整个训练数据集的次数。训练数据和测试数据的损失和准确度被显示出来。训练损失和准确度基于模型在训练期间学到的内容。测试损失和准确度基于模型尚未学习的新数据。因此，测试准确度越接近训练准确度，模型的泛化能力越强。当然，我们希望测试准确度高，测试损失低。
- en: Load a TensorFlow Dataset as NumPy
  id: totrans-201
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 TensorFlow 数据集加载为 NumPy
- en: The previous section modeled Fashion-MNIST data based on a Keras dataset. However,
    we can load data as a TensorFlow dataset (TFDS) and convert it into NumPy arrays
    for very easy processing. We cover TFDS in detail in a later chapter.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 上一节基于 Keras 数据集对 Fashion-MNIST 数据进行了建模。然而，我们可以将数据作为 TensorFlow 数据集（TFDS）加载，并将其转换为
    NumPy 数组以进行非常简单的处理。我们将在后面的章节中详细介绍 TFDS。
- en: For this experiment, we load the MNIST dataset instead of Fashion-MNIST. We
    do this because we work with Fashion-MNIST many times in later chapters. So we
    just want to expose you to another dataset for practice. Once the data is loaded
    and converted to NumPy, the input pipeline phases are the same as in the previous
    section.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个实验，我们加载 MNIST 数据集而不是 Fashion-MNIST。我们这样做是因为我们在后面的章节中多次使用 Fashion-MNIST。所以我们只想让你接触另一个数据集进行练习。一旦数据被加载并转换为
    NumPy，输入管道阶段与上一节相同。
- en: 'Create a training set as NumPy arrays in a single batch:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练集作为一个批次创建为 NumPy 数组：
- en: '[PRE39]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: By using *batch_size=-1*, the full dataset is loaded as a single batch. The
    *tfds.load()* function loads the dataset. The *tfds.as_numpy()* function converts
    the dataset to NumPy arrays.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *batch_size=-1*，整个数据集被加载为一个单独的批次。*tfds.load()* 函数加载数据集。*tfds.as_numpy()*
    函数将数据集转换为 NumPy 数组。
- en: The training set contains 60,000 28 × 28 images. The *1* dimension indicates
    that the data is grayscale. A **grayscale** image is one in which the only colors
    are shades of gray. That is, the image only contains luminance (or brightness)
    information and no color information.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 训练集包含 60,000 个 28 × 28 的图像。*1* 维度表示数据是灰度的。**灰度**图像是只包含灰色阴影的图像。也就是说，图像只包含亮度（或亮度）信息，没有颜色信息。
- en: 'Create the corresponding test set:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 创建相应的测试集：
- en: '[PRE40]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Inspect Shapes and Pixel Intensity
  id: totrans-210
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查形状和像素强度
- en: 'Get training shapes:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 获取训练形状：
- en: '[PRE41]'
  id: totrans-212
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'Get test shapes:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 获取测试形状：
- en: '[PRE42]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Create a function to find the first pixel vector with pixel intensity values
    as shown in Listing [1-2](#PC44).
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来查找像素强度值如清单 [1-2](#PC44) 所示的第一个像素向量。
- en: '[PRE43]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Invoke the function:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE44]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: The nonzero values are pixel intensities.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 非零值是像素强度。
- en: 'Display the first pixel with intensity greater than zero:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 显示第一个强度大于零的像素：
- en: '[PRE45]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Scale
  id: totrans-222
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缩放
- en: 'Since NumPy array values are float, divide them by 255 to scale the image pixels:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 NumPy 数组值是浮点数，因此将它们除以 255 以缩放图像像素：
- en: '[PRE46]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: 'Verify that scaling worked:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 验证缩放是否成功：
- en: '[PRE47]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Prepare Data for TensorFlow Consumption
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备数据以供 TensorFlow 使用
- en: 'Slice NumPy arrays into TensorFlow datasets:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 将 NumPy 数组切割成 TensorFlow 数据集：
- en: '[PRE48]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: 'Inspect:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 检查：
- en: '[PRE49]'
  id: totrans-231
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Build the Consumable Input Pipeline
  id: totrans-232
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建可消费的输入管道
- en: 'Initialize parameters, shuffle training data, and batch and prefetch training
    and test data:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化参数，打乱训练数据，并批量和预取训练和测试数据：
- en: '[PRE50]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Inspect tensors:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE51]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Build the Model
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: Earlier, we imported requisite libraries. Since they are already in memory,
    we don’t need to import them again (assuming that we are using the same notebook).
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 之前，我们导入了所需的库。由于它们已经在内存中，我们不需要再次导入它们（假设我们使用的是同一个笔记本）。
- en: 'Get tensor shape:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 获取张量形状：
- en: '[PRE52]'
  id: totrans-240
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: 'Clear previous models and generate a seed for reproducibility of results:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 清除之前的模型并为结果的重复性生成一个种子：
- en: '[PRE53]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: 'Create the model:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE54]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: Compile and Train the Model
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译并训练模型
- en: 'Compile with sparse categorical cross-entropy. Notice that we **don''t** set
    *from_logits=True* because we use *softmax* activation in the output layer of
    the model to produce a probability distribution from the logits. The **softmax**
    activation function acts on a vector to increase the difference between the largest
    component and all others and normalizes the vector to have a sum of 1 so that
    it can be interpreted as a vector of probabilities. It is used as the last step
    in classifiers:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 使用稀疏分类交叉熵进行编译。注意，我们没有设置*from_logits=True*，因为我们使用模型输出层的*softmax*激活函数来生成从logits的概率分布。**softmax**激活函数作用于向量，增加最大分量与其他分量的差异，并将向量归一化，使其总和为1，以便它可以被解释为概率向量。它在分类器的最后一步中使用：
- en: '[PRE55]'
  id: totrans-247
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: 'Train the model:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE56]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: We train for just three epochs because MNIST is so easy to train.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只训练了三个epoch，因为MNIST很容易训练。
- en: Create a Dataset from Files
  id: totrans-251
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从文件创建数据集
- en: Create a TensorFlow dataset from files with a Keras utility. We use the Keras
    utility because it greatly simplifies processing of the flowers dataset. The *flowers
    dataset* is public with thousands of flower photos distributed into five classes.
    Just like the Fashion-MNIST and MNIST examples, we build an input pipeline following
    similar workflow phases.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Keras实用工具从文件创建TensorFlow数据集。我们使用Keras实用工具，因为它极大地简化了花朵数据集的处理。*flowers dataset*是公开的，包含数千张花朵照片，分布在五个类别中。就像Fashion-MNIST和MNIST示例一样，我们按照类似的流程阶段构建输入管道。
- en: Download and Inspect the Dataset
  id: totrans-253
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 下载并检查数据集
- en: 'Import a library for visualization:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 导入用于可视化的库：
- en: '[PRE57]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: 'The dataset contains several thousand photos of flowers in five subdirectories
    with one flower photo per class. The directory structure is as follows:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包含五个子目录中的数千张花朵照片，每个类别一张花朵照片。目录结构如下：
- en: '[PRE58]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: 'Download data with the tf.keras.utils.get_file utility:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 使用tf.keras.utils.get_file实用工具下载数据：
- en: '[PRE59]'
  id: totrans-259
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: The *tf.keras.utils.get_file* utility downloads a file from a URL if not already
    in the cache. The *pathlib.Path* function provides a concrete path to the files.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '*tf.keras.utils.get_file*实用工具如果缓存中没有，会从URL下载文件。*pathlib.Path*函数提供了文件的具体路径。'
- en: 'Count the number of flower photos downloaded and available in data_dir:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 计算在data_dir中下载并可用的花朵照片数量：
- en: '[PRE60]'
  id: totrans-262
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: There are 3670 files of flower images.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 有3670个花朵图像文件。
- en: 'The *data_dir* path points to directories that each hold a different type of
    flower. Let’s see the directories:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '*data_dir*路径指向包含不同类型花朵的目录。让我们看看这些目录：'
- en: '[PRE61]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: Each directory contains images of that type of flower.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 每个目录都包含该类型花朵的图像。
- en: 'Access some of the files:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 访问一些文件：
- en: '[PRE62]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: 'Display labels from each file:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 显示每个文件的标签：
- en: '[PRE63]'
  id: totrans-270
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: 'Each directory contains images of that type of flower. Here is the first flower
    in the *daisy* directory:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 每个目录都包含该类型花朵的图像。以下是*daisy*目录中的第一朵花：
- en: '[PRE64]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: 'Display the number of daisy images:'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 显示向日葵图像的数量：
- en: '[PRE65]'
  id: totrans-274
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: 'Let’s display several images from the *roses* directory. Create a list to hold
    roses:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们显示*roses*目录中的几幅图像。创建一个列表来保存玫瑰：
- en: '[PRE66]'
  id: totrans-276
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: 'Grab labels from some of the files:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 从一些文件中获取标签：
- en: '[PRE67]'
  id: totrans-278
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: Display some roses as shown in Listing [1-3](#PC69).
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 显示如列表[1-3](#PC69)中所示的一些玫瑰：
- en: '[PRE68]'
  id: totrans-280
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Notice that images are not of the same size!
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到图像大小并不相同！
- en: Parse Data with the tf.keras.preprocessing Utility
  id: totrans-282
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用tf.keras.preprocessing实用工具解析数据
- en: The *tf.keras.preprocessing.image_dataset_from_directory* utility offers incredible
    convenience for loading and parsing images off disk! We show the convenience of
    the utility in the “*Create Training and Test Sets”* subsection.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: '*tf.keras.preprocessing.image_dataset_from_directory*实用工具为从磁盘加载和解析图像提供了极大的便利！我们在“*创建训练集和测试集*”子节中展示了该实用工具的便利性。'
- en: Set Parameters
  id: totrans-284
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 设置参数
- en: 'Set batch size, image height, and image width:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 设置批量大小、图像高度和图像宽度：
- en: '[PRE69]'
  id: totrans-286
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: We set batch size initially to 32 because it tends to be a good size for many
    of the datasets with which we work. We set image height and width at 180 because
    we get good results and the model trains really fast. Feel free to experiment
    with these parameters.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最初将批量大小设置为32，因为它对于许多我们工作的数据集来说通常是一个很好的大小。我们将图像高度和宽度设置为180，因为我们得到了良好的结果，模型训练得非常快。请随意尝试这些参数。
- en: Our inspection revealed that image size differs. Since TensorFlow models expect
    images of the same size, we must resize them.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的检查显示图像大小不同。由于TensorFlow模型期望图像大小相同，我们必须调整它们的大小。
- en: Create Training and Test Sets
  id: totrans-289
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建训练集和测试集
- en: The *tf.keras.preprocessing.image_dataset_from_directory* utility generates
    a tf.data.Dataset from image files in a directory. The utility is very useful
    because it allows us to conveniently split, seed, resize, and batch data. Let’s
    split data into 81% training and 19% test sets. We set this split based on numerous
    experiments. Of course, you can tweak the sizes with your own experiment. The
    combination of the *validation_split* and *subset* parameters determines the train
    and test splits.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: The *tf.keras.preprocessing.image_dataset_from_directory* 工具从目录中的图像文件生成一个 tf.data.Dataset。这个工具非常有用，因为它允许我们方便地分割、设置种子、调整大小和批处理数据。让我们将数据分割成81%的训练集和19%的测试集。我们根据多次实验设置了这个分割。当然，你可以根据自己的实验调整大小。*validation_split*
    和 *subset* 参数的组合决定了训练和测试的分割。
- en: 'Set aside 81% for training data:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 为训练数据留出81%：
- en: '[PRE70]'
  id: totrans-292
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: 'Set aside 19% for test data:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 为测试数据留出19%：
- en: '[PRE71]'
  id: totrans-294
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: Inspect Tensors
  id: totrans-295
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 检查张量
- en: 'Inspect :'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 检查：
- en: '[PRE72]'
  id: totrans-297
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: 'Take the first batch from the training set and preserve shapes:'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 从训练集中取第一个批次并保留形状：
- en: '[PRE73]'
  id: totrans-299
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: We take the first batch to help us inspect a batch from the dataset. We preserve
    the shape of the batch and batch size for use in the model. Batch size is 32,
    and images are resized to 180 × 180 × 3\. The *3* value indicates that images
    have three channels, which means they are RGB (color). Labels have shape (32,)
    that corresponds to the 32 scalar images.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 我们取第一批数据来帮助我们检查数据集中的一个批次。我们保留批次的形状和批次大小以供模型使用。批次大小为32，图像被调整大小为180 × 180 × 3。*3*这个值表示图像有三个通道，这意味着它们是RGB（彩色）。标签的形状为(32,)，对应于32个标量图像。
- en: Get Class Names
  id: totrans-301
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 获取类别名称
- en: 'We already identified the classes from the directory names. But we can now
    access them with the *class_names* method:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经从目录名称中识别了类别。但现在我们可以使用 *class_names* 方法访问它们：
- en: '[PRE74]'
  id: totrans-303
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: Display Examples
  id: totrans-304
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 显示示例
- en: Take a batch from the training set and plot some images as shown in Listing
    [1-4](#PC76).
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 从训练集中取一个批次并绘制一些图像，如列表[1-4](#PC76)所示。
- en: '[PRE75]'
  id: totrans-306
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: Scale the Data
  id: totrans-307
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据缩放
- en: As noted earlier in the chapter, a pixel is represented by 256 values. So RGB
    channel values are in the [0, 255] range. Since neural networks work better with
    small values, data is typically scaled to be in the [0, 1] range.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 如本章前面所述，一个像素由256个值表示。因此RGB通道值在[0, 255]范围内。由于神经网络在小值上表现更好，数据通常被缩放到[0, 1]范围内。
- en: 'Create a function to scale images:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个缩放图像的函数：
- en: '[PRE76]'
  id: totrans-310
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: The function is used when we configure the input pipeline.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们配置输入管道时使用该函数。
- en: Configure the Dataset for Performance
  id: totrans-312
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 配置数据集以优化性能
- en: Use buffered prefetching to get data from disk to mitigate I/O issues. Cache
    data to keep images in memory after they’re loaded off disk. Caching saves operations
    like file opening and data reading from being executed during each epoch.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 使用缓冲预取从磁盘获取数据以减轻I/O问题。缓存数据以在从磁盘加载后保持图像在内存中。缓存可以节省在每个epoch执行文件打开和数据读取等操作。
- en: Build the Input Pipeline
  id: totrans-314
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Scale, shuffle the training set, and cache and prefetch train and test sets:'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放、打乱训练集，并缓存和预取训练和测试集：
- en: '[PRE77]'
  id: totrans-316
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: Note
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Since training and test data have already been batched by the utility, *do not*
    batch when building the input pipeline!
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 由于训练数据和测试数据已经被工具批处理，因此在构建输入管道时*不要*进行批处理！
- en: Build the Model
  id: totrans-319
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建模型
- en: Since we are working with large color images, we need to build a convolutional
    neural network (CNN) model to garner respectable performance because flower images
    are color with higher pixel counts.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们处理的是大尺寸彩色图像，因此我们需要构建一个卷积神经网络（CNN）模型以获得可观的性能，因为花卉图像是彩色的，并且具有更高的像素计数。
- en: 'We need additional libraries for a CNN:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要额外的库来构建CNN：
- en: '[PRE78]'
  id: totrans-322
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: 'Get the number of classes for use in the model:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 获取用于模型的类别数量：
- en: '[PRE79]'
  id: totrans-324
  prefs: []
  type: TYPE_PRE
  zh: '[PRE79]'
- en: 'Clear any previous models and generate a random seed:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 清除任何之前的模型并生成一个随机种子：
- en: '[PRE80]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: Create a multilayer CNN as shown in Listing [1-5](#PC82).
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个多层CNN，如列表[1-5](#PC82)所示。
- en: '[PRE81]'
  id: totrans-328
  prefs: []
  type: TYPE_PRE
  zh: '[PRE81]'
- en: The first layer scales the data. The second layer contains 32 neurons with a
    3 × 3 convolutional kernel (or filter). Activation is *relu*. The third layer
    uses maximum pooling to reduce the spatial size of a layer by just keeping the
    maximum values. As such, the pooling layer reduces image dimensionality without
    losing important features or patterns. The next four layers repeat the same pattern
    as the second and third layers. The Flatten layer converts pooled data into a
    single column because a Dense layer expects data in this form. The final Dense
    layer enables classification and prediction.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层缩放数据。第二层包含32个神经元，具有3 × 3的卷积核（或过滤器）。激活为*relu*。第三层使用最大池化来通过仅保留最大值来减少层的空间大小。因此，池化层在不丢失重要特征或模式的情况下减少了图像的维度。接下来的四层重复了第二和第三层的相同模式。Flatten层将池化数据转换为单列，因为Dense层期望数据以这种形式。最终的Dense层使分类和预测成为可能。
- en: Compile and Train the Model
  id: totrans-330
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile with SparseCategoricalCrossentropy():'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SparseCategoricalCrossentropy()进行编译：
- en: '[PRE82]'
  id: totrans-332
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: Since *softmax* is applied to outputs, we **don’t** set *from_logits=True*.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 由于*softmax*应用于输出，我们**不**设置*from_logits=True*。
- en: 'Train the model:'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE83]'
  id: totrans-335
  prefs: []
  type: TYPE_PRE
  zh: '[PRE83]'
- en: The model is overfitting because validation accuracy is low compared to training
    accuracy. But we have not made any attempt to tune the model. In the next chapter,
    we explore a powerful technique to mitigate overfitting.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 模型过拟合，因为验证准确率低于训练准确率。但我们没有尝试调整模型。在下一章中，我们将探讨一种强大的技术来减轻过拟合。
- en: Get Flowers from Google Cloud Storage
  id: totrans-337
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从Google Cloud Storage获取Flowers
- en: We demonstrated input pipelining with data from memory and from files. We can
    also pipeline data from cloud storage. Flowers data is hosted in a public bucket
    on Google Cloud Storage (GCS). So we can grab flower files from GCS. We can read
    flowers as JPEG files or as TFRecord files. For data modeling, we use TFRecord
    files. For optimal performance, we read from multiple TFRecord files at once.
    The **TFRecord format** is a simple format for storing a sequence of binary records.
    A TFRecord file contains a sequence of records, which can only be read sequentially.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 我们展示了使用内存和文件中的数据进行的输入管道化。我们也可以从云存储中管道化数据。Flowers数据托管在Google Cloud Storage (GCS)上的公共存储桶中。因此，我们可以从GCS中获取flower文件。我们可以将花朵作为JPEG文件或TFRecord文件读取。对于数据建模，我们使用TFRecord文件。为了获得最佳性能，我们一次读取多个TFRecord文件。**TFRecord格式**是一种简单的格式，用于存储一系列二进制记录。TFRecord文件包含一系列记录，这些记录只能顺序读取。
- en: Read Flowers as JPEG Files and Perform Simple Processing
  id: totrans-339
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 将Flowers作为JPEG文件读取并执行简单处理
- en: 'Read JPEG files based on a GCS pattern:'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 根据GCS模式读取JPEG文件：
- en: '[PRE84]'
  id: totrans-341
  prefs: []
  type: TYPE_PRE
  zh: '[PRE84]'
- en: GCS_PATTERN is a *glob pattern* that supports the “*” and “?” wildcards. **Globs**
    (also known as glob patterns) are patterns that can expand a wildcard pattern
    into a list of pathnames that match the given pattern.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: GCS_PATTERN是一个*glob pattern*，支持“*”和“？”通配符。**Globs**（也称为glob patterns）是模式，可以将通配符模式扩展为与给定模式匹配的路径名列表。
- en: 'Get the number of JPEG images:'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 获取JPEG图像的数量：
- en: '[PRE85]'
  id: totrans-344
  prefs: []
  type: TYPE_PRE
  zh: '[PRE85]'
- en: 'Create a dataset of filenames from GCS_PATTERN and peruse its contents:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 从GCS_PATTERN创建文件名数据集并查看其内容：
- en: '[PRE86]'
  id: totrans-346
  prefs: []
  type: TYPE_PRE
  zh: '[PRE86]'
- en: We need the data in (image, label) tuples to work with the images and labels
    independently. So create a function to return a dataset of (image, label) tuples
    as shown in Listing [1-6](#PC88).
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要以(image, label)元组的形式提供数据，以便独立处理图像和标签。因此，创建一个函数以返回包含(image, label)元组的数据集，如列表[1-6](#PC88)所示。
- en: '[PRE87]'
  id: totrans-348
  prefs: []
  type: TYPE_PRE
  zh: '[PRE87]'
- en: 'Map the function to each filename to create a dataset of (image, label) tuples:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 将函数映射到每个文件名以创建一个包含(image, label)元组的数据集：
- en: '[PRE88]'
  id: totrans-350
  prefs: []
  type: TYPE_PRE
  zh: '[PRE88]'
- en: 'Peruse:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 查看：
- en: '[PRE89]'
  id: totrans-352
  prefs: []
  type: TYPE_PRE
  zh: '[PRE89]'
- en: 'Display an image:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 显示图像：
- en: '[PRE90]'
  id: totrans-354
  prefs: []
  type: TYPE_PRE
  zh: '[PRE90]'
- en: Although we don’t train with this dataset, let’s see how to convert text labels
    to encoded labels as shown in Listing [1-7](#PC92).
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们不使用此数据集进行训练，但让我们看看如何将文本标签转换为编码标签，如列表[1-7](#PC92)所示。
- en: '[PRE91]'
  id: totrans-356
  prefs: []
  type: TYPE_PRE
  zh: '[PRE91]'
- en: Take a label. Compare it against the class name list to find its position in
    the list. Create a one-hot vector. Convert the one-hot vector into a label tensor.
    We don’t train with this dataset because it is not the way to model complex data
    from GCS. But it is a simple way to load and inspect the data.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 取一个标签。将其与类名列表进行比较，以找到其在列表中的位置。创建一个one-hot向量。将one-hot向量转换为标签张量。我们不使用此数据集进行训练，因为这不是从GCS建模复杂数据的方式。但它是一种简单的方法来加载和检查数据。
- en: Read and Process Flowers as TFRecord Files
  id: totrans-358
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 读取和处理Flowers作为TFRecord文件
- en: The best way to model complex data from GCS is as TFRecord files. A TFRecord
    file stores data as a sequence of binary strings. Binary strings are very efficient
    to process.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 从GCS建模复杂数据最佳方式是作为TFRecord文件。TFRecord文件将数据存储为一系列二进制字符串。二进制字符串非常高效。
- en: Read TFRecord Files
  id: totrans-360
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 读取TFRecord文件
- en: 'Read TFRecord files based on a GCS pattern:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 根据GCS模式读取 TFRecord 文件：
- en: '[PRE92]'
  id: totrans-362
  prefs: []
  type: TYPE_PRE
  zh: '[PRE92]'
- en: 'Get the number of buckets:'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 获取桶的数量：
- en: '[PRE93]'
  id: totrans-364
  prefs: []
  type: TYPE_PRE
  zh: '[PRE93]'
- en: We grabbed 16 buckets. Since there are 3670 flower files, 15 buckets contain
    230 images (15 × 230 = 3,450), and the final bucket contains 220 images. Add 3,450
    to 220 to get 3,670.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 我们抓取了 16 个桶。由于有 3670 个花朵文件，15 个桶包含 230 张图片（15 × 230 = 3,450），最后一个桶包含 220 张图片。将
    3,450 加上 220 得到 3,670。
- en: 'Display a file:'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 显示一个文件：
- en: '[PRE94]'
  id: totrans-367
  prefs: []
  type: TYPE_PRE
  zh: '[PRE94]'
