  zh: 设置图像调整大小、管道化和训练轮数参数：
- en: '[PRE95]'
  id: totrans-370
  prefs: []
  type: TYPE_PRE
  zh: '[PRE95]'
- en: Use *AUTOTUNE* to prompt the tf.data runtime, which tunes the value dynamically
    at runtime.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *AUTOTUNE* 来提示 tf.data 运行时，它会在运行时动态调整值。
- en: Note
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: AUTOTUNE is experimental, which means that the operation may change in the future.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: AUTOTUNE 是实验性的，这意味着该操作可能在将来发生变化。
- en: 'Set validation split and class labels:'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 设置验证分割和类别标签：
- en: '[PRE96]'
  id: totrans-375
  prefs: []
  type: TYPE_PRE
  zh: '[PRE96]'
- en: Create data splits, validation steps, and steps per epoch as shown in Listing
    [1-8](#PC98).
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据分割、验证步骤和每轮步骤，如列表 [1-8](#PC98) 所示。
- en: '[PRE97]'
  id: totrans-377
  prefs: []
  type: TYPE_PRE
  zh: '[PRE97]'
- en: Create Functions to Load and Process TFRecord Files
  id: totrans-378
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建加载和处理 TFRecord 文件的函数
- en: Create a function to parse a TFRecord file as shown in Listing [1-9](#PC99).
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来解析 TFRecord 文件，如列表 [1-9](#PC99) 所示。
- en: '[PRE98]'
  id: totrans-380
  prefs: []
  type: TYPE_PRE
  zh: '[PRE98]'
- en: The function accepts a TFRecord file. A dictionary holds datatypes common to
    TFRecords. The tf.string datatype converts the image to byte strings (list of
    bytes). The tf.int64 converts the class label to a 64-bit integer scalar value.
    The TFRecord file is parsed into (image, label) tuples. The image element, a JPEG-encoded
    image, is decoded into a uint8 image tensor. The image tensor is scaled to the
    [0, 1] range for faster training. It is then reshaped to a standard size for model
    consumption. The class label element is cast to a scalar.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数接受一个 TFRecord 文件。一个字典包含 TFRecords 中常见的数据类型。tf.string 数据类型将图像转换为字节字符串（字节列表）。tf.int64
    将类别标签转换为 64 位整数标量值。TFRecord 文件被解析为 (image, label) 元组。图像元素，一个 JPEG 编码的图像，被解码为一个
    uint8 图像张量。图像张量被缩放到 [0, 1] 范围以加快训练速度。然后将其重塑为模型消费的标准大小。类别标签元素被转换为标量。
- en: Create a function to load TFRecord files as tf.data.Dataset as shown in Listing
    [1-10](#PC100).
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来将 TFRecord 文件加载为 tf.data.Dataset，如列表 [1-10](#PC100) 所示。
- en: '[PRE99]'
  id: totrans-383
  prefs: []
  type: TYPE_PRE
  zh: '[PRE99]'
- en: The function accepts TFRecord files. For optimal performance, code is included
    to read from multiple TFRecord files at once. The options setting allows order-altering
    optimizations. As such, *n* files are read in parallel, and data order is disregarded
    in favor of reading speed.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数接受 TFRecord 文件。为了最佳性能，代码包括从多个 TFRecord 文件同时读取的功能。选项设置允许顺序改变优化。因此，*n* 个文件并行读取，数据顺序被忽略，以读取速度为优先。
- en: Create a function to build an input pipeline from TFRecord files as shown in
    Listing [1-11](#PC101).
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，从 TFRecord 文件构建输入管道，如列表 [1-11](#PC101) 所示。
- en: '[PRE100]'
  id: totrans-386
  prefs: []
  type: TYPE_PRE
  zh: '[PRE100]'
- en: The function accepts TFRecord files and calls the *load_dataset* function. The
    function continues by building an input pipeline by caching, repeating, shuffling,
    batching, and prefetching the dataset. Repeating and shuffling are only mapped
    to training data to follow best practices for a Keras dataset.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数接受 TFRecord 文件并调用 *load_dataset* 函数。函数继续通过缓存、重复、打乱、批处理和预取数据集来构建输入管道。重复和打乱仅映射到训练数据，以遵循
    Keras 数据集的最佳实践。
- en: Create Training and Test Sets
  id: totrans-388
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建训练和测试集
- en: 'Instantiate the datasets:'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 实例化数据集：
- en: '[PRE101]'
  id: totrans-390
  prefs: []
  type: TYPE_PRE
  zh: '[PRE101]'
