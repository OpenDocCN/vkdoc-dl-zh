- en: 10. Meta-optimization
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 元优化
- en: If you optimize everything, you will always be unhappy.
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你优化一切，你将永远不快乐。
- en: ''
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Donald Knuth, Computer Scientist
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ——唐纳德·克努特，计算机科学家
- en: The legendary Donald Knuth was right about many things, but meta-optimization
    is indeed strong evidence that most people can be pretty happy optimizing most
    things (not quite *everything*, admittedly). Optimization in its standard form
    concerns the reconciliation of ambiguities and uncertainties on the direct level
    of parameter-to-loss model. But when we construct said models, we also run into
    ambiguities and uncertainties that are generally overlooked and forgotten. Meta-optimization
    concerns the optimization of these *meta-parameters* (alternatively, “hyperparameters”),
    which can not only improve performance but also potentially be more efficient
    than manual tuning.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 传奇的唐纳德·克努特在很多事情上都是正确的，但元优化确实是有力证据表明，大多数人可以相当快乐地优化大多数事情（当然，不是所有事情）。标准形式的优化涉及在参数到损失模型的直接层面上解决模糊性和不确定性。但当我们构建这些模型时，我们也会遇到通常被忽视和遗忘的模糊性和不确定性。元优化涉及这些*元参数*（或称“超参数”）的优化，这不仅可以提高性能，而且可能比手动调整更有效率。
- en: This chapter begins with a brief discussion of key concepts and motivations
    of meta-optimization, followed by an exploration of no-gradient optimization methods
    often used for meta-optimization procedures. The next two sections demonstrate
    how meta-optimization with the library Hyperopt can be used to optimize the model
    and the data pipeline. Lastly, the chapter concludes with a brief section on Neural
    Architecture Search.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本章首先简要讨论了元优化的关键概念和动机，然后探讨了常用于元优化过程的非梯度优化方法。接下来的两节展示了如何使用Hyperopt库进行元优化，以优化模型和数据管道。最后，本章以关于神经架构搜索的简要部分结束。
- en: 'Meta-optimization: Concepts and Motivations'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 元优化：概念和动机
- en: If you have been following along with the scripts outlined throughout the book,
    you inevitably will sometimes encounter points at which you must decide how to
    build a system, but which specific possibility you choose feels arbitrary or equally
    unsure – for instance, whether to use the `GradientBoostingClassifier` or the
    `AdaBoostClassifier`, whether the maximum tree depth should be 128 or 64, how
    many layers should be in a particular neural network cell, how many nodes to put
    in a particular layer, the exact proportion used for a dropout layer, and so on.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你一直在跟随书中概述的脚本，你不可避免地会在某些时候遇到你必须决定如何构建系统，但具体选择哪种可能性感觉是随意的或同样不确定的时刻——例如，是否使用`GradientBoostingClassifier`或`AdaBoostClassifier`，最大树深度应该是128还是64，特定神经网络细胞中应该有多少层，特定层应该放入多少节点，dropout层使用的确切比例，等等。
- en: The truth is that for most of these decisions, it doesn’t really matter which
    path you choose. Whether a specific layer has 128 or 256 nodes likely will not
    noticeably impact the final performance because deep learning systems are so large
    and one single decision is comparatively insignificant. Which optimizer you use
    might have an impact, but not one that is incredible (unless you are switching
    from a primitive caveman optimizer, of course). We can call these decisions *meta-parameters*
    because they are decisions determining the “form” and “shape” of the model rather
    than the specific weights determining its predictive behavior.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，对于这些决定中的大多数，你选择哪条路径实际上并不重要。一个特定层是否有128或256个节点可能不会对最终性能产生明显影响，因为深度学习系统如此之大，单个决策相对而言微不足道。你使用的优化器可能会有影响，但影响并不巨大（除非你正在从原始的穴居人优化器切换，当然）。我们可以将这些决策称为*元参数*，因为它们是决定模型的“形式”和“形状”的决定，而不是决定其预测行为的特定权重。
- en: However, if we somehow make decisions for all these meta-parameters simultaneously
    – that is, we set each meta-parameter such that it is optimal with respect to
    all other meta-parameters – we can end up significantly altering the system’s
    performance overall.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们以某种方式同时为所有这些元参数做出决策——也就是说，我们将每个元参数设置为相对于所有其他元参数都是最优的——我们最终可以显著改变系统的整体性能。
- en: '*Meta-optimization*, also referred to sometimes as meta-learning or auto-ML,
    is the process of “learning how to learn” – a meta-model (or “*controller* model”)
    finds the best meta-parameters for a *candidate* model’s validation performance
    (Figure [10-1](#Fig1)). We can use meta-optimization to find the best type of
    model to use, the best meta-parameters for that best model, and the best data
    preprocessing and postprocessing schemes for that best model and best set of meta-parameters.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*元优化*，有时也称为元学习或自动机器学习（auto-ML），是“学习如何学习”的过程——一个元模型（或“*控制器*模型”）找到候选模型验证性能的最佳元参数（图[10-1](#Fig1)）。我们可以使用元优化来找到最佳模型类型，为该最佳模型找到最佳元参数，以及为该最佳模型和最佳元参数集找到最佳的数据预处理和后处理方案。'
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig1_HTML.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig1_HTML.png)'
- en: A flowchart of a meta optimization procedure of a controller that adjusts to
    maximize candidate valid performance through a model structure.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 一个控制器元优化流程图，通过模型结构调整以最大化候选模型的验证性能。
- en: Figure 10-1
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-1
- en: Relationship between controller model and controlled model in meta-optimization
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 元优化中控制器模型与受控模型之间的关系
- en: 'There are three key components of a meta-optimization campaign: the meta-parameter
    space, the objective function, and the optimization procedure.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 元优化活动有三个关键组成部分：元参数空间、目标函数和优化过程。
- en: The *meta-parameter space* describes (a) which meta-parameters are being optimized
    and (b) how the optimization procedure should go about sampling the meta-parameters
    being optimized. Some meta-parameters must be integers (e.g., number of nodes),
    whereas others must be proportions (e.g., dropout rate). Moreover, we may have
    more confidence in the success of certain domains of the meta-parameter space
    over others. For instance, a low dropout rate (e.g., 0.1–0.3) is almost surely
    more effective at regularization than a high dropout rate (e.g., 0.7–0.9), because
    high dropout rates significantly hinder information transfer. This distribution
    of confidence must be specified in the construction of the meta-parameter space.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*元参数空间*描述了（a）正在优化的哪些元参数以及（b）优化过程应该如何对正在优化的元参数进行采样。一些元参数必须是整数（例如，节点数），而其他则必须是比例（例如，dropout率）。此外，我们可能对元参数空间中某些领域的成功比其他领域更有信心。例如，低dropout率（例如，0.1–0.3）几乎肯定比高dropout率（例如，0.7–0.9）在正则化方面更有效，因为高dropout率会显著阻碍信息传递。这种信心分布必须在元参数空间的构建中指定。'
- en: The *objective function* describes how the meta-parameters being sampled come
    together into a model and returns the performance of a model built and trained
    using the sampled meta-parameters. For instance, if we want to optimize the number
    of hidden nodes in a shallow neural network with only one hidden layer, the objective
    function will accept the sampled number of hidden nodes, construct a neural network
    with that many hidden nodes, fit until convergence, and return performance on
    the validation dataset. The goal of meta-optimization is to minimize this objective
    function.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*目标函数*描述了被采样的元参数如何组合成一个模型，并返回使用采样的元参数构建和训练的模型的性能。例如，如果我们想优化一个只有一层隐藏层的浅层神经网络的隐藏节点数，目标函数将接受采样的隐藏节点数，构建具有那么多隐藏节点的神经网络，拟合直到收敛，并在验证数据集上返回性能。元优化的目标是使这个目标函数最小化。'
- en: The *optimization procedure* is the algorithm by which new combinations of meta-parameters
    are sampled from the search space given the performance of previous meta-parameter
    combinations. Ideally, such an algorithm would be adaptive – if a set of meta-parameters
    performs very poorly, it should sample meta-parameters quite far away; if a set
    performs exceptionally well, it should sample nearby meta-parameters to “hang
    on to” and exploit the good performance. The user generally does not need to implement
    the optimization procedure.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*优化过程*是根据先前元参数组合的性能从搜索空间中采样新的元参数组合的算法。理想情况下，这样的算法应该是自适应的——如果一组元参数表现非常差，它应该采样远离的元参数；如果一组表现异常出色，它应该采样附近的元参数以“保持”并利用良好的性能。用户通常不需要实现优化过程。'
- en: Hyperparameter optimization in deep learning is generally considered to be an
    expensive task, because (a) neural networks have so many more possible directions
    for hyperparameter variation compared with classical machine learning algorithms
    and (b) neural networks generally take significantly longer than classical machine
    learning algorithms to train. Research in fields like Neural Architecture Search,
    a subfield of hyperparameter optimization in which a meta-model/controller (often
    another neural network) attempts to find the optimal neural network architecture
    for a task, can involve experiments lasting several days on supercharged hardware.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习中的超参数优化通常被认为是一项昂贵的任务，因为（a）与经典机器学习算法相比，神经网络有更多可能的方向进行超参数变化，并且（b）神经网络通常比经典机器学习算法的训练时间要长得多。在神经网络架构搜索等领域的研究，这是超参数优化的一个子领域，其中元模型/控制器（通常是另一个神经网络）试图为任务找到最优的神经网络架构，可能需要使用超级硬件进行持续数天的实验。
- en: However, hyperparameter optimization in deep learning for structured data is
    comparatively more accessible than optimizing deep learning pipelines for computer
    vision and natural language processing tasks. Neural network models for structured
    data are often faster to train and smaller; this allows the optimization procedure
    to repeatedly sample a much wider array of neural network meta-parameter combinations
    without specialized hardware in a feasible amount of time.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在结构化数据中进行的深度学习超参数优化，相较于为计算机视觉和自然语言处理任务优化深度学习流程来说，相对更容易实现。结构化数据的神经网络模型通常训练速度更快，体积更小；这使得优化过程可以在不使用专用硬件的情况下，在合理的时间内重复采样更广泛的神经网络元参数组合。
- en: In this section, we’ll explore hyperparameter optimization for a variety of
    applications, including optimizing classical machine learning models, deep learning
    training procedures, deep learning architectures, data pipelines, and more.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨各种应用的超参数优化，包括优化经典机器学习模型、深度学习训练过程、深度学习架构、数据管道等。
- en: No-Gradient Optimization
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 无梯度优化
- en: The hyperparameter optimization tools we will be using are more broadly tools
    for *no-gradient optimization*.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要使用的超参数优化工具更广泛地被认为是*无梯度优化*工具。
- en: Consider some function *f*(*x*). You only have access to its output given a
    certain input, and you know that it is expensive to calculate (i.e., it takes
    a nontrivial amount of time to process one query). Your task is to find the set
    of inputs that minimizes the output of the function as much as possible.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑某个函数 *f*(*x*)。你只能在其给定输入的情况下访问其输出，并且你知道计算它是昂贵的（即，处理一个查询需要非平凡的时间）。你的任务是找到一组输入，尽可能多地最小化函数的输出。
- en: This sort of setup is known as a black box optimization problem (Figure [10-2](#Fig2)),
    because the algorithm or entity attempting to find a solution to the problem has
    access to very little or no information about the function. You have access only
    to the output of any input passed into the function, but not the derivative. This
    bars the usage of gradient-based methods that have proved successful in the domain
    of neural networks.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置被称为黑盒优化问题（图[10-2](#Fig2)），因为试图找到问题解决方案的算法或实体几乎无法获取有关函数的任何信息。你只能访问传递给函数的任何输入的输出，但不能访问导数。这阻碍了梯度方法的使用，而梯度方法在神经网络领域已被证明是成功的。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig2_HTML.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig2_HTML.png)'
- en: An illustration presents 2 black box minimized objective functions with inputs
    and outputs.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图展示了2个具有输入和输出的黑盒最小化目标函数。
- en: Figure 10-2
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-2
- en: 'Objective functions to minimize. Top: black box function with no explicit information
    given. Bottom: explicitly defined loss function (in this case MSE)'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 要最小化的目标函数。顶部：没有给出明确信息的黑盒函数。底部：明确定义的损失函数（在这种情况下是均方误差MSE）。
- en: Black box optimization is, generally speaking, the name of the game in feasible
    meta-parameter optimization. While there are several methods for differentiating
    meta-parameter optimization,^([1](#Fn1)) black box optimization has been a long-studied
    problem that has strong applications to expensive black box problems. The meta-parameter
    optimization procedure is given no information other than the loss incurred by
    a candidate model trained with the sampled meta-parameters.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒优化通常被认为是可行元参数优化的游戏规则。虽然存在几种区分元参数优化的方法[^([1](#Fn1))]，但黑盒优化一直是一个长期研究的问题，它对昂贵的黑盒问题有很强的应用性。元参数优化过程除了使用采样元参数训练的候选模型所造成的损失外，没有其他信息。
- en: 'So-called “naïve” meta-optimization algorithms/procedures use the following
    general structure to solve black box optimization problems:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 所说的“天真”元优化算法/程序使用以下一般结构来解决黑盒优化问题：
- en: Select structural parameters for a proposed controlled model.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为一个提议的受控模型选择结构参数。
- en: Obtain the performance of a controlled model trained under those selected structural
    parameters.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取在所选结构参数下训练的受控模型的表现。
- en: Repeat.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复。
- en: 'There are two generally recognized naïve meta-optimization algorithms used
    as a baseline against more sophisticated meta-optimization methods:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种通常认可的元优化算法被用作更复杂元优化方法的基线：
- en: '*Grid search*: In a grid search, every combination of a user-specified list
    of values for each parameter is tried and evaluated. Consider a hypothetical model
    with two structural parameters we would like to optimize, *A* and *B*. The user
    may specify the search space for *A* to be [1, 2, 3] and the search space for
    *B* to be [0.5, 1.2]. Here, “search space” indicates the values for each parameter
    that will be tested. A grid search would train six models for every combination
    of these parameters – *A* = 1 and *B* = 0.5, *A* = 1 and *B* = 1.2, *A* = 2 and
    *B* = 0.5, and so on.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*网格搜索*：在网格搜索中，尝试并评估每个参数用户指定列表中值的每一种组合。考虑一个假设的模型，我们希望优化两个结构参数，*A* 和 *B*。用户可能指定
    *A* 的搜索空间为 [1, 2, 3]，*B* 的搜索空间为 [0.5, 1.2]。在这里，“搜索空间”表示将要测试的每个参数的值。网格搜索将为这些参数的每一种组合训练六个模型——*A*
    = 1 和 *B* = 0.5，*A* = 1 和 *B* = 1.2，*A* = 2 和 *B* = 0.5，等等。'
- en: '*Random search*: In a random search, the user provides information about a
    feasible distribution of potential values that each structural parameter could
    take on. For instance, the search space for *A* may be a normal distribution with
    mean 2 and standard deviation 1, and the search space for *B* might be a uniform
    choice from the list of values [0.5, 1.2]. A random search would then randomly
    sample parameter values and return the best-performing set of values.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*随机搜索*：在随机搜索中，用户提供有关每个结构参数可能取的潜在值的可行分布的信息。例如，*A* 的搜索空间可能是一个均值为 2、标准差为 1 的正态分布，而
    *B* 可能是从值列表 [0.5, 1.2] 中均匀选择的。然后随机搜索将随机采样参数值并返回表现最好的值集。'
- en: Grid search and random search are considered to be naïve search algorithms because
    they do not incorporate the results from their previously selected structural
    parameters into how they select the next set of structural parameters; they simply
    repeatedly “query” structural parameters blindly and return the best-performing
    set. While grid and random searches have their place in certain meta-optimization
    problems – grid search suffices for small meta-optimization problems, and random
    search proves to be a surprisingly strong strategy for models that are relatively
    cheaper to train – they cannot produce consistently strong results for more complex
    models, like neural networks. The problem is not necessarily that these naïve
    methods inherently cannot produce good sets of parameters, but that they take
    too long to do so due to the large search space and slow black box query time.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索和随机搜索被认为是天真搜索算法，因为它们没有将先前选定的结构参数的结果纳入如何选择下一组结构参数的方式中；它们只是简单地盲目地反复“查询”结构参数并返回表现最好的那一组。虽然网格搜索和随机搜索在某些元优化问题中有其位置——网格搜索对于小元优化问题足够，随机搜索对于相对便宜的训练模型来说证明是一种惊人的强大策略——但它们不能为更复杂的模型，如神经网络，产生一致的良好结果。问题并不一定在于这些天真方法本质上不能产生好的参数集，而是由于搜索空间大和黑盒查询时间慢，它们需要太长时间才能做到这一点。
- en: A key component of the unique character of meta-optimization that distinguishes
    it from other fields of optimization problems is the impact of the evaluation
    step in amplifying any inefficiencies in the meta-optimization system. Generally,
    to quantify how good certain selected structural parameters are, a model is fully
    trained under those structural parameters, and its performance on the test set
    is used as the evaluation. In the context of neural networks, this evaluation
    step can take hours. Thus, an effective meta-optimization system should attempt
    to require as few models to be built and trained as possible before arriving at
    a good solution. (Compare this with standard neural network optimization, in which
    the model queries the loss function and updates its weights accordingly anywhere
    from hundreds of thousands to millions of times in the span of hours.)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 元优化独特性格的关键组成部分，使其区别于其他优化问题领域的是评估步骤对元优化系统中任何低效的影响。通常，为了量化某些所选结构参数的好坏，模型会在这些结构参数下进行完全训练，并在测试集上的性能用作评估。在神经网络的情况下，这一评估步骤可能需要数小时。因此，一个有效的元优化系统应尽量减少在找到良好解决方案之前需要构建和训练的模型数量。（这与标准神经网络优化形成对比，在标准神经网络优化中，模型在数小时内查询损失函数并相应地更新其权重，次数从数十万到数百万不等。）
- en: 'To prevent inefficiency in the selection of new structural parameters to evaluate,
    successful meta-optimization methods used for models like neural networks include
    another step – incorporating knowledge from previous “experiments” into determining
    the next best set of parameters to select:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止在评估新结构参数选择时的低效，用于神经网络等模型的成功元优化方法包括另一个步骤——将先前“实验”中的知识纳入确定下一个最佳参数集的选择中：
- en: Select structural parameters for a proposed controlled model.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为提议的受控模型选择结构参数。
- en: Obtain the performance of a controlled model trained under those selected structural
    parameters.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取在所选结构参数下训练的受控模型的性能。
- en: Incorporate knowledge about the relationship between selected structural parameters
    and the performance of a model trained under such parameters into the next selection.
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将关于所选结构参数与在相应参数下训练的模型性能之间关系的信息纳入下一次选择中。
- en: Repeat.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复。
- en: Hyperopt, the popular hyperparameter optimization framework we will use for
    meta-optimization, uses Bayesian optimization to address the black box optimization
    problem. Provided with a well-designed search space, Hyperopt can generally find
    solutions that perform better than manual designs.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: Hyperopt，我们将用于元优化的流行超参数优化框架，使用贝叶斯优化来解决黑盒优化问题。在提供良好的搜索空间的情况下，Hyperopt通常可以找到比手动设计更好的解决方案。
- en: Bayesian optimization is often used in black box optimization problems because
    it succeeds in obtaining reliably good results with a relatively small number
    of required queries to the objective function. The spirit of Bayesian modeling
    is to begin with a set of *prior* beliefs and continually update that set of beliefs
    with new information to form *posterior* beliefs. It is this spirit of continuous
    update – searching for new information in places where it is needed – that makes
    Bayesian optimization a robust and versatile tool in black box optimization problems.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯优化常用于黑盒优化问题，因为它能够在相对较少的目标函数查询次数下获得可靠的良好结果。贝叶斯建模的精神是从一组*先验*信念开始，并不断地用新信息更新这组信念以形成*后验*信念。正是这种持续更新的精神——在需要的地方寻找新信息——使得贝叶斯优化在黑盒优化问题中成为一个强大且多功能的工具。
- en: Consider a hypothetical objective function, represented in Figure [10-3](#Fig3).
    In the context of meta-optimization, this function represents the loss or cost
    of a certain model (*y*-axis) incurred by a model trained using the sample parameter(s)
    (*x*-axis). The goal is to find the value(s) of *x* that minimizes the cost (Figure
    [10-3](#Fig3)).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个假设的目标函数，如图[10-3](#Fig3)所示。在元优化的背景下，这个函数代表使用样本参数（*x*-轴）训练的模型因训练而产生的损失或成本（*y*-轴）。目标是找到使成本最小化的*x*值（图[10-3](#Fig3)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig3_HTML.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig3_HTML.png)'
- en: An illustration of a line displayed from left to right in a fluctuating trend.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一条从左到右显示的波动趋势的线图示例。
- en: Figure 10-3
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-3
- en: A hypothetical cost function, showing the loss incurred by a model with some
    parameter x. For the sake of convenient visualization, in this case we are optimizing
    a one-parameter model or optimizing the loss with respect to only one parameter
    (i.e., looking at a cross-section of the full loss landscape)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 一个假设的成本函数，显示了具有某些参数 x 的模型所承受的损失。为了便于可视化，在这种情况下，我们优化的是一个单参数模型或仅针对一个参数（即查看整个损失景观的横截面）进行损失优化
- en: However, to the meta-optimization algorithm, the cost function is a black box.
    It cannot “see” the entire function – if it could, solving the minimization problem
    would be trivial. The function is displayed for the user for convenience in understanding
    Bayesian optimization, but be sure to distinguish between what the optimization
    process does and doesn’t know!
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于元优化算法来说，成本函数是一个黑盒。它无法“看到”整个函数——如果它能，解决最小化问题就会变得微不足道。该函数显示给用户以方便理解贝叶斯优化，但请务必区分优化过程知道什么和不知道什么！
- en: All the optimization procedure has access to is the set of sampled points. Using
    these sampled points, it develops a *hypothesis* about the shape of the true cost
    function. This is known formally as a *surrogate function*. The surrogate function
    approximates the objective/cost function and represents the current set of beliefs
    on how the objective function behaves with respect to sampled parameters/independent
    variables.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 优化过程所能访问的只是采样点的集合。使用这些采样点，它提出了关于真实成本函数形状的*假设*。这正式称为*代理函数*。代理函数近似目标/成本函数，并代表关于目标函数相对于采样参数/独立变量的行为的当前信念集合。
- en: Figure [10-4](#Fig4) demonstrates how two sampled points are used as the basis
    for a surrogate function (red, dotted). While the model isn’t able to “see” the
    complete objective function, it *can* “see” the complete surrogate function. The
    surrogate function is a mathematically represented function whose properties can
    be easily accessed through established techniques. The optimization procedure
    can determine which points are promising or risky based on the surrogate model.
    If a certain proposed point *x* has a high surrogate function value, then it is
    a riskier decision. If a certain proposed point *x* has a low surrogate function
    value, then it is more promising (Figure [10-4](#Fig4)).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-4](#Fig4) 展示了如何使用两个采样点作为代理函数（红色，虚线）的基础。虽然模型无法“看到”完整的目标函数，但它*可以*“看到”完整的代理函数。代理函数是一个可以用数学表示的函数，其属性可以通过既定的技术轻松访问。优化过程可以根据代理模型确定哪些点是具有潜力的或具有风险的。如果某个提议的点
    *x* 具有高代理函数值，那么它是一个风险较高的决策。如果某个提议的点 *x* 具有低代理函数值，那么它更有潜力（图 [10-4](#Fig4)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig4_HTML.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig4_HTML.png)'
- en: An illustration of a surrogate function through 2 lines with a trend of fluctuation.
    4 locations are labelled on the lines as promising points, sampled point, risky
    point, and sampled point.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 通过两条趋势波动线展示代理函数的示意图。在两条线上标记了4个位置，作为具有潜力的点、采样点、风险点和采样点。
- en: Figure 10-4
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-4
- en: Fitting a surrogate function to two sampled points and using the surrogate function
    to develop estimations for how promising and risky certain unsampled points are
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 将代理函数拟合到两个采样点，并使用代理函数来开发对某些未采样点具有潜力和风险的估计
- en: Because our surrogate function here is defined only by two points, it is unwise
    for the optimization procedure to enact a strictly greedy sampling policy. Suppose
    the procedure decides to evaluate the true value of both of these points (by evaluating
    them through the objective function). We find that the risky point actually minimized
    the objective function more than the promising point, which means that taking
    the risk paid off! We can now update the surrogate function to reflect these sampled
    points and identify new promising points to sample (Figure [10-5](#Fig5)).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们这里的代理函数仅由两个点定义，因此优化过程执行严格贪婪采样策略是不明智的。假设该过程决定评估这两个点的真实值（通过评估目标函数）。我们发现风险点实际上比具有潜力的点更有效地最小化了目标函数，这意味着承担风险是值得的！我们现在可以更新代理函数以反映这些采样点，并确定新的具有潜力的点进行采样（图
    [10-5](#Fig5)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig5_HTML.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig5_HTML.png)'
- en: An illustration. It presents a refitting of the surrogate function through 3
    lines with a trend of fluctuation, and intersection at 4 locations of sampled
    point. A promising point on located on one of the lines.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图。它展示了通过 3 条趋势波动线对代理函数的重新拟合，以及与 4 个采样点的交点。一个有希望的点位于其中一条线上。
- en: Figure 10-5
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-5
- en: A refitting of the surrogate function to newly sampled points and an update
    of estimations for how promising or risky unsampled points are
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对新采样点进行代理函数的重新拟合，以及更新对未采样点有希望或风险的估计
- en: 'This process repeats: increased “intelligent”/informed sampling helps to define
    the surrogate function such that it becomes a more and more accurate representation
    of the true objective function (Figure [10-6](#Fig6)).'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程重复进行：增加的“智能”/信息性采样有助于定义代理函数，使其成为越来越准确的真正目标函数的表示（图 [10-6](#Fig6)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig6_HTML.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-6](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig6_HTML.png)'
- en: An illustration of refitting of the surrogate function through 4 lines with
    a trend of fluctuation. 5 sampled points are located on the dark shaded line.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 通过 4 条趋势波动线重新拟合代理函数的插图。5 个采样点位于深阴影线上。
- en: Figure 10-6
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-6
- en: A second refitting of the surrogate function to newly sampled points and an
    update of estimations for how promising or risky unsampled points are
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对新采样点进行代理函数的第二次重新拟合，以及更新对未采样点有希望或风险的估计
- en: Note that the visualization of the surrogate models here is deterministic, but
    in practice the surrogate functions used are probabilistic. The functions return
    *p*(*y*| *x*), or the probability that the objective function’s output is *y*
    given *x*. Probabilistic surrogate functions are more natural to update and sample
    from in a Bayesian manner.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这里代理模型的可视化是确定性的，但在实践中使用的代理函数是概率性的。这些函数返回 *p*(*y*| *x*)，即给定 *x* 时目标函数输出为 *y*
    的概率。概率性代理函数以贝叶斯方式更新和采样更为自然。
- en: Because a random or grid search does not take any of the previous results into
    consideration when determining the next sampled set of parameters, these “naïve”
    algorithms save time and computation in calculating the next set of parameters
    to sample. However, the additional computation Bayesian optimization algorithms
    use to determine the next point to sample is used to construct a surrogate function
    more intelligently with fewer queries. Net-wise, the reduction in necessary queries
    to the objective function generally outweighs the increase in time and computation
    to determine the next sampled point, making the Bayesian optimization method more
    efficient.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 由于随机或网格搜索在确定下一个采样参数集时没有考虑任何先前结果，这些“天真”算法在计算下一个采样参数集时节省了时间和计算。然而，贝叶斯优化算法用于确定下一个采样点的额外计算被用来更智能地构建代理函数，查询次数更少。总的来说，减少对目标函数的必要查询次数通常超过了确定下一个采样点所需的时间和计算的增加，这使得贝叶斯优化方法更加高效。
- en: 'This process of optimization is known more abstractly as *Sequential Model–Based
    Optimization (SMBO)*. It operates as a central concept or template against which
    various model optimization strategies can be formulated and compared. SMBO contains
    one key feature: a surrogate function for the objective function that is updated
    with new information and used to determine new points to sample. Two key attributes
    differentiate different SMBO methods: the design of the acquisition function (the
    process determining how new points are sampled given the surrogate models) and
    the method of constructing the surrogate model (how to incorporate sampled points
    into an approximate representation of the objective function). Hyperopt uses the
    Tree-Structured Parzen Estimator (TPE) surrogate model and acquisition strategy.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这种优化过程更抽象地被称为 *基于模型的序列优化（SMBO）*。它作为一个核心概念或模板，各种模型优化策略可以据此制定和比较。SMBO 包含一个关键特性：一个用于目标函数的代理函数，该函数会根据新信息进行更新，并用于确定新的采样点。两个关键属性区分不同的
    SMBO 方法：获取函数的设计（给定代理模型确定如何采样新点的过程）和构建代理模型的方法（如何将采样点纳入目标函数的近似表示）。Hyperopt 使用树结构帕累托估计器（TPE）代理模型和获取策略。
- en: The Expected Improvement measurement quantifies the expected improvement with
    respect to the set of parameters to be optimized, *x*. For instance, if the surrogate
    model *p*(*y*| *x*) evaluates to zero for all values of *y* less than some threshold
    value *y*^∗ – that is, there is zero probability that the set of input parameters
    *x* could yield an output of the objective function less than *y*^∗ – there is
    probably no improvement to be found by sampling *x*.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 预期改进测量量化了与要优化的参数集*x*相关的预期改进。例如，如果代理模型*p*(*y*| *x*)对所有小于某个阈值值*y*^∗的*y*值都评估为零——也就是说，输入参数*x*的集合产生目标函数输出小于*y*^∗的概率为零——那么通过采样*x*可能找不到任何改进。
- en: 'The Tree-Structured Parzen Estimator is built to work toward a set of parameters
    *x* that maximizes Expected Improvement. Like all surrogate functions used in
    Bayesian optimization, it returns *p*(*y*| *x*) – the probability that the objective
    function’s output is *y* given an input *x*. Instead of directly obtaining this
    probability, it uses Bayes’s rule:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 树结构化的Parzen估计器旨在寻找一组*x*参数，以最大化预期改进。像所有在贝叶斯优化中使用的代理函数一样，它返回*p*(*y*| *x*)——给定输入*x*，目标函数输出的概率。它不是直接获得这个概率，而是使用贝叶斯定理：
- en: '![$$ p\left(y|x\right)=\frac{p\left(x|y\right)\cdot p(y)}{p(x)} $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equa.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![$$ p\left(y|x\right)=\frac{p\left(x|y\right)\cdot p(y)}{p(x)} $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equa.png)'
- en: 'The *p*(*x*| *y*) term represents the probability that the input to the objective
    function was *x* given an output *y*. To calculate this, two distribution functions
    are used: *l*(*x*) if the output *y* is less than some threshold *y*^∗ and *g*(*x*)
    if the output *y* is less than some threshold *y*^∗. To sample values of *x* that
    yield objective function outputs less than the threshold, the strategy is to draw
    from *l*(*x*) rather than *g*(*x*). (The other terms, *p*(*x*) and *p*(*y*), can
    be easily calculated as they do not involve conditionals.) Sampled values with
    the highest expected improvement are evaluated through the objective function.
    The resulting value is used to update the probability distributions *l*(*x*) and
    *g*(*x*) for better prediction.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '*p*(*x*| *y*)项表示在给定输出*y*的情况下，目标函数的输入为*x*的概率。为了计算这个概率，使用了两个分布函数：*l*(*x*)，如果输出*y*小于某个阈值*y*^∗，以及*g*(*x*)，如果输出*y*小于某个阈值*y*^∗。为了采样*x*的值，使得目标函数的输出小于阈值，策略是从*l*(*x*)而不是*g*(*x*)中抽取。（其他项，如*p*(*x*)和*p*(*y*)，可以很容易地计算，因为它们不涉及条件。）具有最高预期改进的采样值将通过目标函数进行评估。得到的值用于更新*l*(*x*)和*g*(*x*)的概率分布，以实现更好的预测。'
- en: Ultimately, the Tree-Structured Parzen Estimator strategy attempts to find the
    best objective function inputs to sample by continually updating its two internal
    probability distributions to maximize the quality of prediction.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，树结构化的Parzen估计器策略试图通过不断更新其两个内部概率分布，以最大化预测质量，来找到最佳的样本目标函数输入。
- en: Note
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'You may be wondering: What is tree-structured about the Tree-Structured Parzen
    Estimator strategy? In the original TPE paper, the authors suggest that the “tree”
    component of the algorithm’s name is derived from the tree-like nature of the
    hyperparameter space: the value chosen for one hyperparameter determines the set
    of possible values for other parameters. For instance, if we are optimizing the
    architecture of a neural network, we first determine the number of layers before
    determining the number of nodes in the third layer.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想：树结构化的Tree-Structured Parzen Estimator策略是什么意思？在原始的TPE论文中，作者建议算法名称中的“树”部分来源于超参数空间的树状特性：一个超参数的值决定了其他参数的可能值集合。例如，如果我们正在优化神经网络架构，我们首先确定层数，然后再确定第三层的节点数。
- en: Let’s begin exploring the implementation of no-gradient optimization by finding
    the minima of simple scalar-to-scalar functions.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始通过寻找简单标量到标量函数的最小值来探索无梯度优化的实现。
- en: 'Consider the following problem: find the value of *x* that minimizes'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下问题：找到使以下表达式最小化的*x*的值：
- en: '![$$ f(x)={\left(x-1\right)}^2 $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equb.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![$$ f(x)={\left(x-1\right)}^2 $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equb.png)'
- en: (Recall a similar exercise in Chapter [1](525591_1_En_1_Chapter.xhtml), used
    to demonstrate the gradient descent algorithm.)
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: （回忆一下第[1](525591_1_En_1_Chapter.xhtml)章中的类似练习，该练习用于演示梯度下降算法。）
- en: Some simple math will tell you that the global minimum is at *x* = 1\. However,
    the model does not have access to the analytical expression – it must find the
    minimum by iteratively sampling from the function (Listing [10-1](#PC1), Figure
    [10-7](#Fig7)).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一些简单的数学运算会告诉你，全局最小值在 *x* = 1 处。然而，模型无法访问解析表达式——它必须通过从函数中迭代采样来找到最小值（见代码清单 [10-1](#PC1)，图
    [10-7](#Fig7)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig7_HTML.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-7](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig7_HTML.jpg)'
- en: A graph with grids. Y axis is numbered from 0 to 35, in increments of 5\. X
    axis is numbered from 0 to 4 and negative 4, in increments of 2\. A curve is displayed
    with a decreasing and an increasing trend, with a point marked at approximately
    (1, 0).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一个带有网格的图表。Y 轴从 0 到 35，以 5 为增量编号。X 轴从 0 到 4 和 -4，以 2 为增量编号。显示了一个具有递减和递增趋势的曲线，并在大约
    (1, 0) 处有一个标记点。
- en: Figure 10-7
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-7
- en: The graph of *y* = (*x* − 1)² and its minimum at *x* = 1
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '*y* = (*x* - 1)² 的图形及其在 *x* = 1 处的最小值'
- en: '[PRE0]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The first step is to define the search space. Say that we are most confident
    that the true value of *x* that minimizes *y* = (*x* − 1)² is somewhere near 0
    and that the farther *x* is from 0, the less confidence that it will minimize
    the function. This reflects a *normal distribution* with a center of 0\. The standard
    deviation represents how quickly our confidence drops in *x*’s merits to minimize
    the objective function as *x* moves farther from the mean.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是定义搜索空间。假设我们最有信心的是，使 *y* = (*x* - 1)² 最小的 *x* 的真实值在 0 附近，而且 *x* 越远离 0，它最小化函数的信心就越低。这反映了以
    0 为中心的 *normal distribution*。标准差表示当 *x* 从均值移动得更远时，我们对 *x* 最小化目标函数的信心下降的速度。
- en: To define spaces in Hyperopt, you must create a dictionary in which keys are
    parameter identifiers/references/names and the values are Hyperopt hyperparameter
    search space objects (Listing [10-2](#PC2)). In this case, we will use hp.normal,
    which defines a parameter that will be sampled in a Gaussian fashion. All `hp.type`
    spaces accept a name as the first argument. For `hp.normal`, we can specify the
    mean (`mu`) and standard deviation (`sigma`) afterward.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 要在 Hyperopt 中定义空间，您必须创建一个字典，其中键是参数标识符/引用/名称，值是 Hyperopt 超参数搜索空间对象（见代码清单 [10-2](#PC2)）。在这种情况下，我们将使用
    `hp.normal`，它定义了一个将以高斯方式采样的参数。所有 `hp.type` 空间都接受一个名称作为第一个参数。对于 `hp.normal`，我们可以在后面指定均值（`mu`）和标准差（`sigma`）。
- en: '[PRE1]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Our objective function takes in a dictionary params. params is structured in
    the same way as our search space, except each of the keys has been replaced with
    the sampled value. `params['x']` will return a float sampled from the normal distribution,
    rather than a `hp.normal` object. We can evaluate the sampled value through our
    sample function (Listing [10-3](#PC3)).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标函数接受一个字典 `params`。`params` 的结构与我们搜索空间的结构相同，只是每个键都已被采样值替换。`params['x']`
    将返回一个从正态分布中采样的浮点数，而不是 `hp.normal` 对象。我们可以通过我们的采样函数（见代码清单 [10-3](#PC3)）评估采样值。
- en: '[PRE2]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: To perform optimization, use the function minimization function `fmin`, which
    accepts the objective function and search space arguments. You can additionally
    provide the algorithm (the previously discussed Tree-Structured Parzen Estimator
    is recommended) and the maximum number of queries/evaluations that can be made
    to the objective function. Note that Hyperopt may stop earlier than the maximum
    number of evaluations if it reaches a satisfactory solution and determines that
    it is unlikely there are other unexplored better solutions (Listing [10-4](#PC4)).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 要进行优化，请使用函数最小化函数 `fmin`，它接受目标函数和搜索空间参数。您还可以提供算法（推荐使用之前讨论过的树结构帕累托估计器）以及可以对目标函数进行的最大查询/评估次数。请注意，如果
    Hyperopt 在达到满意解并确定不太可能有其他未探索的更好解之前停止，则它可能停止早于最大评估次数（见代码清单 [10-4](#PC4)）。
- en: '[PRE3]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: After several hundred evaluations, Hyperopt finds the minimizing value of *x*
    to be 1.0058378772703804, which is very close to the true value of 1\. Success!
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 经过数百次评估后，Hyperopt 找到最小化 *x* 的值为 1.0058378772703804，这非常接近真实值 1。成功！
- en: 'Consider another function defined as follows:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑另一个如下定义的函数：
- en: '![$$ f(x)={\sin}^2x $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equc.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![f(x)={sin}^2x](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equc.png)'
- en: Multiples of *π* minimize this function, since sin(*kπ*) = 0 for any integer
    *k*. Suppose we want Hyperopt to find a solution that minimizes the function and
    resides between 2 and 4\. We know that 2 < *π* < 4 and that argmin(sin²*x*) = *kπ*;
    thus, argmin(sin²*x*{2 < *x* < 4}) = *π*. Tackling this optimization problem leads
    us nicely to an approximation for *π* (Listing [10-5](#PC5), Figure [10-8](#Fig8))!
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '*π* 的倍数最小化这个函数，因为对于任何整数 *k*，sin(*kπ*) = 0。假设我们想让 Hyperopt 找到一个解，该解最小化函数并位于
    2 和 4 之间。我们知道 2 < *π* < 4，并且 argmin(sin²*x*) = *kπ*；因此，argmin(sin²*x*{2 < *x*
    < 4}) = *π*。解决这个优化问题很自然地引导我们得到 *π* 的一个近似值（见[10-5](#PC5)列表，图[10-8](#Fig8)）！'
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig8_HTML.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-8](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig8_HTML.png)'
- en: A graph with grids. Y axis is numbered from 0.0 to 1.0, in increments of 0.2\.
    X axis is numbered from negative 2 to 8, in increments of 2\. A curve is displayed
    with a trend of fluctuation, a point marked at approximately (3, 0.0).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 一个带有网格的图形。Y 轴从 0.0 到 1.0 编号，增量是 0.2。X 轴从负 2 到 8 编号，增量是 2。显示了一条波动趋势的曲线，大约在 (3,
    0.0) 处有一个点。
- en: Figure 10-8
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-8
- en: The graph of *sin*²*x* and one of its minima at *x* = *π* marked
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '*sin*²*x* 的图像及其在 *x* = *π* 处的一个最小值被标记'
- en: '[PRE4]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Rather than using a normal distribution, we use a uniform distribution with
    minimum 2 and maximum 4 to reflect our knowledge of the space (Listing [10-6](#PC6)).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是使用正态分布，而是使用最小值为 2 和最大值为 4 的均匀分布来反映我们对空间的了解（见[10-6](#PC6)列表）。
- en: '[PRE5]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: After ten trials, Hyperopt’s approximation of *π* is 3.254149; after 100 trials,
    it is 3.139025; after 1000, it is 3.141426\. For reference, the actual value of
    pi rounded to six digits is 3.141593 – our no-gradient approximation was only
    about 0.00017 off!
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 经过十次试验后，Hyperopt 对 *π* 的近似值为 3.254149；经过 100 次试验后，它是 3.139025；经过 1000 次后，它是
    3.141426。为了参考，π 的实际值四舍五入到六位数字是 3.141593 – 我们的无梯度近似只差了大约 0.00017！
- en: 'Often, however, functions are not defined for all values in the domain we want
    to search on. Hyperopt allows us to specify when a parameter or set of parameters
    is invalid using *statuses*. Consider minimizing the following function, which
    is undefined at *x* = 0 (Listing [10-7](#PC7), Figure [10-9](#Fig9)):'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，通常情况下，我们想要搜索的域中并非所有值都能定义函数。Hyperopt 允许我们使用 *状态* 来指定何时一个参数或一组参数是无效的。考虑最小化以下函数，它在
    *x* = 0 处未定义（见[10-7](#PC7)列表，图[10-9](#Fig9)）：
- en: '![$$ y=\frac{1}{x^2}+{x}^2 $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equd.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![方程式 $ y=\frac{1}{x^2}+{x}^2 $](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equd.png)'
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig9_HTML.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-9](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig9_HTML.png)'
- en: A graph with grids. Y axis is numbered from 2 to 16, in increments of 2\. X
    axis is numbered from negative 4 to 4, in increments of 1\. 2 curves are presented
    with each low peak point at approximately, (negative 1, 2) and (1, 2), respectively.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 一个带有网格的图形。Y 轴从 2 到 16 编号，增量是 2。X 轴从负 4 到 4 编号，增量是 1。展示了 2 条曲线，每条曲线的最低峰值点分别在大约
    (负 1, 2) 和 (1, 2)。
- en: Figure 10-9
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-9
- en: The graph of ![$$ \frac{1}{x^2}+{x}^2 $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_IEq1.png),
    with both minimas at *x* ∈ {−1, 1}
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '![方程式 $ \frac{1}{x^2}+{x}^2 $ 的图像]，在 *x* ∈ {−1, 1} 处有两个最小值'
- en: '[PRE6]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'It’s not easy to specify in the search space that *x* should not be 0; instead,
    we return `{''status'':''fail''}` from the objective function if it receives an
    invalid value. If the sampled parameters are valid, we return `{''status'':''ok'',
    ''loss'': ...}` – filling in the “loss” with whatever loss is incurred by the
    given set of sampled parameters (Listing [10-8](#PC8)).'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '在搜索空间中指定 *x* 不应为 0 并不容易；相反，如果目标函数接收到一个无效值，我们从目标函数返回 `{''status'':''fail''}`。如果采样的参数是有效的，我们返回
    `{''status'':''ok'', ''loss'': ...}` – 用给定的采样参数集产生的任何损失来填充“loss”（见[10-8](#PC8)列表）。'
- en: '[PRE7]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Notice that this particular function has two global minima, both of which are
    equally valid. Given that the search space is symmetric and centered directly
    in between the minimizing values of *x*, Hyperopt will arrive at a particular
    solution entirely random about half of the time.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这个特定的函数有两个全局最小值，它们都是同样有效的。鉴于搜索空间是对称的，并且直接位于 *x* 的最小值之间，Hyperopt 大约有一半的时间会随机得到一个特定的解。
- en: 'Sometimes, we can’t even describe precisely which sampled parameters or parameter
    sets will yield invalid results. For instance, consider the following function,
    which is invalid on the real domain both for values of *x* < 0 and sin(*x*²) < 0
    (the latter condition occurring more frequently as *x* → ∞) (Listing [10-9](#PC9),
    Figure [10-10](#Fig10)):'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，我们甚至无法精确描述哪些采样参数或参数集会产生无效结果。例如，考虑以下函数，它在实数域上对于*x* < 0和sin(*x*²) < 0（后者在*x* → ∞时更频繁发生）都是无效的（代码清单[10-9](#PC9)，图[10-10](#Fig10)）：
- en: '![$$ y=\frac{1}{\sqrt{x}}-\sqrt{\sin \left({x}^2\right)} $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Eque.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![y=1/√x-√sin(x²)](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Eque.png)'
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig10_HTML.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Fig10_HTML.png)'
- en: A graph with grids. 16 low peak point curves are presented between 0 to 10 on
    the x axis.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 一个带有网格的图形。在x轴的0到10之间展示了16条低峰值曲线。
- en: Figure 10-10
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-10
- en: The graph of ![$$ y=\frac{1}{\sqrt{x}}-\sqrt{\mathit{\sin}\left({x}^2\right)}
    $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_IEq3.png)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '![y=1/√x-√sin(x²)](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_IEq3.png)的图形'
- en: '[PRE8]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Say we want to minimize this function between 0 and 10\. Rather than specifying
    which sampled parameter values will yield an invalid result – which is a pretty
    arduous algebraic task – we can carry out the calculation first and then deal
    with the fallout afterward if it blows up. In this case, if we perform an invalid
    operation with NumPy, the result will be `np.nan`. We can execute the objective
    function evaluation and return a failed status if it is `nan` (Listing [10-10](#PC10)).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要在0到10之间最小化这个函数。而不是指定哪些采样参数值会产生无效结果——这是一个相当繁重的代数任务——我们可以在计算之后处理可能出现的任何问题。在这种情况下，如果我们使用NumPy执行无效操作，结果将是`np.nan`。如果目标是`nan`，我们可以执行目标函数评估并返回失败状态（代码清单[10-10](#PC10)）。
- en: '[PRE9]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: In alternative situations where executing the objective function given the sampled
    set of parameters throws an error (e.g., building a neural network with an invalid
    architecture), you can also use a try/except architecture in which a failed status
    is returned if there is any error in the objective function evaluation. Hyperopt
    finds a reasonably good minimum (Figure [10-11](#Fig11)).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他情况下，如果给定采样参数集执行目标函数抛出错误（例如，使用无效架构构建神经网络），您也可以使用try/except结构，如果在目标函数评估中存在任何错误，则返回失败状态。Hyperopt找到了一个相当好的最小值（图[10-11](#Fig11)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig11_HTML.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Fig11_HTML.png)'
- en: A graph with grids. 16 low peak point curves are presented between 0 to 10 on
    the x axis. The fifteenth curve towards the right side, presents a point marked
    approximately at (9.5, negative 0.4).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 一个带有网格的图形。在x轴的0到10之间展示了16条低峰值曲线。右侧的第15条曲线，大约标记在(9.5, 负0.4)的位置。
- en: Figure 10-11
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-11
- en: The graph of ![$$ y=\frac{1}{\sqrt{x}}-\sqrt{\mathit{\sin}\left({x}^2\right)}
    $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_IEq5.png) with
    the minimum discovered by Hyperopt marked as a point
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: Hyperopt发现的最低点标记为点的![y=1/√x-√sin(x²)](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_IEq5.png)的图形
- en: Optimizing Model Meta-parameters
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化模型元参数
- en: In this section, we’ll apply our knowledge of Hyperopt’s syntax to begin meta-optimization
    of classical machine learning models and deep learning models. Rather than dealing
    with simple *f* : *x* → *y* minimization problems, we will be constructing large
    possible search spaces that are used to build and train a model in the objective
    function.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将应用我们对Hyperopt语法的了解，开始对经典机器学习模型和深度学习模型进行元优化。我们不会处理简单的 *f* : *x* → *y*
    最小化问题，而是将构建用于在目标函数中构建和训练模型的大搜索空间。
- en: Let’s consider the Higgs Boson dataset, which we have approached from multiple
    different directions previously in the book. This dataset is a generally difficult
    modeling problem, but perhaps we will be able to find a better solution using
    meta-optimization (Figure [10-12](#Fig12)).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑Higgs玻色子数据集，我们之前在书中从多个不同的方向对其进行了探讨。这个数据集通常是一个难以建模的问题，但也许我们可以通过元优化（图[10-12](#Fig12)）找到更好的解决方案。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig12_HTML.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Fig12_HTML.png)'
- en: A table of 22 columns with the Higgs Boson dataset. At the bottom a text presents
    as, 68636 rows, cross, 29 columns.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 一个包含22列的Higgs玻色子数据集表格。底部显示为68636行，交叉，29列。
- en: Figure 10-12
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-12
- en: The Higgs Boson dataset
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: Higgs玻色子数据集
- en: 'We will begin by trying to find the best classical machine learning model:
    one of Logistic Regression, Decision Tree, Random Forest, Gradient Boosting, AdaBoost,
    and multilayer perceptron (Figure [10-13](#Fig13)). This is the most overarching
    implicit meta-parameter in the modeling pipeline: which model you even choose
    to model a dataset with is itself a meta-parameter! Beyond this, however, there
    are meta-parameters within each model that need to be optimized. For instance,
    there are different depth values and criteria used in constructing a Decision
    Tree; these can significantly alter the behavior of one Decision Tree compared
    with the other. The Random Forest and Gradient Boosting models have an additional
    meta-parameter – the number of estimators in the ensemble. We not only want to
    choose the best model but also the best set of meta-parameters for that model.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将尝试找到最佳的经典机器学习模型：逻辑回归、决策树、随机森林、梯度提升、AdaBoost和多层感知器之一（图[10-13](#Fig13)）。这是建模管道中最基本的隐含元参数：你甚至选择用哪个模型来建模数据集本身就是一个元参数！然而，除此之外，每个模型内部还有需要优化的元参数。例如，在构建决策树时，有不同的深度值和标准；这些可以显著改变一个决策树与其他决策树的行为差异。随机森林和梯度提升模型还有一个额外的元参数——集成中的估计器数量。我们不仅想要选择最佳模型，还想要为该模型选择最佳的元参数集。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig13_HTML.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig13_HTML.png)'
- en: An illustration of 6 search space for model type. They are, logistic regression,
    decision tree, random forest, gradient boosting, AdaBoost, and multilayer perception.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 模型类型搜索空间的示例。它们包括逻辑回归、决策树、随机森林、梯度提升、AdaBoost和多层感知器。
- en: Figure 10-13
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-13
- en: Search space for which model to use and parameters relevant to that model
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 用于选择模型及其相关参数的搜索空间
- en: Let’s begin by importing each of our relevant models (Listing [10-11](#PC11)).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从导入我们相关的每个模型开始（列表[10-11](#PC11)）。
- en: '[PRE10]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: We will use the F1 score to evaluate the best model. Recall from Chapter [1](525591_1_En_1_Chapter.xhtml)
    that the F1 score is a more balanced and informed metric for binary classification
    problems than accuracy. Additionally, we need to import our space definition (`hyperopt.hp`),
    function minimization (`hyperopt.fmin`), and Tree-Structured Parzen Estimator
    (`hp.tpe`) utilities (Listing [10-12](#PC12)).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用F1分数来评估最佳模型。回顾第[1](525591_1_En_1_Chapter.xhtml)章，F1分数是比准确率更平衡、更信息化的二分类问题指标。此外，我们还需要导入我们的空间定义（`hyperopt.hp`）、函数最小化（`hyperopt.fmin`）和树结构帕累托估计器（`hp.tpe`）实用工具（列表[10-12](#PC12)）。
- en: '[PRE11]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'We can begin to construct our space. We want to make a decision about which
    model to use; the key-value pair `''model'': hp.choice(''model'', models)` tells
    Hyperopt that this meta-parameter called ‘model’ must be sampled as one choice
    out of the given list of models (which are uninstantiated model objects). If the
    selected model is Linear Regression, we want to choose whether to use no regularization
    or L2 regularization; if the selected model is a decision tree, we want to choose
    whether to use Gini or entropy criterion (see Chapter [1](525591_1_En_1_Chapter.xhtml))
    and the maximum depth. To define the sampling space of a meta-parameter that is
    roughly continuous but only takes on quantized values, we use `hp.qtype`; in this
    case, `quniform(''name'', 1, 30, q=1)` defines a uniform distribution between
    1 and 30 quantized with factor 1 (quantization defined as ![$$ x\to \frac{\textrm{round}\left(q\cdot
    x\right)}{q} $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_IEq6.png)
    for some quantization factor *q*). If we wanted multiples of two, we could set
    the quantization factor to `q=2`. We can continue listing out each of the meta-parameters
    in a similar fashion (Listing [10-13](#PC13)).'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '我们可以开始构建我们的空间。我们需要决定使用哪个模型；键值对 `''model'': hp.choice(''model'', models)` 告诉
    Hyperopt，这个名为‘model’的元参数必须从给定的模型列表（这些是未实例化的模型对象）中选择一个选项进行采样（这些模型）。如果选定的模型是线性回归，我们想要选择是否使用无正则化或L2正则化；如果选定的模型是决策树，我们想要选择是否使用Gini或熵标准（见第[1](525591_1_En_1_Chapter.xhtml)章）以及最大深度。为了定义一个元参数的采样空间，这个空间大致是连续的，但只取量化值，我们使用
    `hp.qtype`；在这种情况下，`quniform(''name'', 1, 30, q=1)` 定义了一个在1到30之间的均匀分布，量化因子为1（量化定义为
    ![$$ x\to \frac{\textrm{round}\left(q\cdot x\right)}{q} $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_IEq6.png)
    对于某个量化因子 *q*）。如果我们想要2的倍数，我们可以将量化因子设置为 `q=2`。我们可以以类似的方式继续列出每个元参数（列表[10-13](#PC13)）。'
- en: '[PRE12]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: However, this is a very poor way to structure our search space for a number
    of reasons. Philosophically, we are not structuring the space in a way consistent
    with the inherent nature of the meta-parameters. Everything is placed linearly,
    whereas they should be somehow nested (as shown in the hierarchical diagram in
    Figure [10-13](#Fig13)). From a technical-theoretical perspective, most of the
    points we end up sampling have no effect on the output. For instance, if the selected
    model is Linear Regression, then only one other meta-parameter is relevant (lr_penalty),
    and all other 11 are irrelevant. We are structuring the space in a way that makes
    optimization difficult, because the majority of sampled parameters are guaranteed
    to not affect the outcome at all. From an implementation perspective, this sort
    of search space structuring forces us to write a horrendously long objective function.
    We need to duplicate everything and implicitly structure relationships anyway,
    as shown in Listing [10-14](#PC14).
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于许多原因，这是一种非常糟糕的方式来构建我们的搜索空间。从哲学上讲，我们没有以与元参数固有性质一致的方式构建空间。所有东西都是线性排列的，而它们应该以某种方式嵌套（如图[10-13](#Fig13)中的分层图所示）。从技术-理论的角度来看，我们最终采样的大多数点对输出没有影响。例如，如果选定的模型是线性回归，那么只有一个其他元参数是相关的（lr_penalty），其余的11个都是不相关的。我们以使优化困难的方式构建空间，因为大多数采样的参数肯定不会对结果产生任何影响。从实现的角度来看，这种搜索空间结构迫使我们编写一个极其冗长的目标函数。我们需要复制一切，并隐式地构建关系，如列表[10-14](#PC14)所示。
- en: '[PRE13]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: To avoid this, we will use a *nested search space*. Rather than just choosing
    a model objective, we choose a model “bundle.” This “bundle” includes not only
    the actual model itself but a *sub–search space* for meta-parameters specific
    to that selected model. By nesting dictionaries within each other, we can more
    accurately capture the relationship between meta-parameters. Technically speaking,
    we are creating a list of dictionaries, in which each dictionary represents a
    subspace with potentially more search spaces and each `hp.choice()` samples a
    dictionary during exploration (Listing [10-15](#PC15)).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免这种情况，我们将使用一个*嵌套搜索空间*。而不是仅仅选择一个模型目标，我们选择一个模型“包”。这个“包”不仅包括实际的模型本身，还包括针对所选模型的特定元参数的*子搜索空间*。通过在字典之间嵌套字典，我们可以更准确地捕捉元参数之间的关系。从技术上来说，我们正在创建一个字典列表，其中每个字典代表一个具有更多搜索空间的子空间，每个
    `hp.choice()` 在探索过程中采样一个字典（列表[10-15](#PC15)）。
- en: '[PRE14]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: When we define our search space this way, our objective function becomes exceptionally
    clean (Listing [10-16](#PC16)).
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们以这种方式定义搜索空间时，我们的目标函数变得异常简洁（列表[10-16](#PC16)）。
- en: '[PRE15]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: What is Listing [10-16](#PC16) doing? Recall that the model is stored as an
    uninstantiated object, which can be instantiated using the parenthesis notation
    (e.g., `model = DecisionTreeClassifier()`). Additionally, we want to construct
    the model with the sampled set of parameters. From the search space defined in
    Listing [10-15](#PC15), we see that `params['models']['parameters']` yields a
    dictionary in which keys are parameter names and values will be the sampled values
    for those parameters. The unpacking `**` command in Python can be used to “translate”
    this dictionary into object construction such that each key is a parameter and
    each value is the parameter value. We conveniently have named each of the keys
    in our parameter dictionaries in the search space the same as the initialization
    arguments in the model constructor, and thus we can initialize our model and all
    the sampled parameters in one line of code.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [10-16](#PC16) 在做什么？回想一下，模型存储为一个未实例化的对象，可以使用括号表示法进行实例化（例如，`model = DecisionTreeClassifier()`）。此外，我们希望使用采样参数集来构建模型。从列表
    [10-15](#PC15) 中定义的搜索空间中，我们看到 `params['models']['parameters']` 返回一个字典，其中键是参数名称，值是这些参数的采样值。Python
    中的 `**` 解包命令可以用来“转换”这个字典为对象构造，使得每个键是一个参数，每个值是参数值。我们方便地将搜索空间中参数字典中的每个键命名为与模型构造函数中的初始化参数相同的名称，因此我们可以用一行代码初始化我们的模型和所有采样参数。
- en: Practically speaking, however, we have to make one adjustment. Hyperopt samples
    quantized inputs (e.g., for tree depth of a Decision Tree) as floats, even if
    the actual values are mathematically integers (e.g., `2.0`, `42.0`). `sklearn`
    throws an error when we pass a float value into an argument that accepts only
    integers. Therefore, we can add some “cleaning” code in our objective function
    to make sure that the `n_estimators` parameter is cast to an integer and also
    is at least 1 (it is possible for Hyperopt to sample values less than 1, since
    we technically defined a quantized *normal* distribution). We can initialize our
    model as previously with this set of cleaned parameters (Listing [10-17](#PC17)).
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我们不得不进行一项调整。Hyperopt 以浮点数的形式采样量化输入（例如，决策树的最大树深度），即使实际值在数学上是整数（例如，`2.0`，`42.0`）。当我们将浮点值传递给只接受整数的参数时，`sklearn`
    会抛出错误。因此，我们可以在目标函数中添加一些“清理”代码，以确保 `n_estimators` 参数被转换为整数，并且至少为 1（Hyperopt 可能会采样小于
    1 的值，因为我们实际上定义了一个量化的 *normal* 分布）。我们可以使用这组清理后的参数初始化我们的模型，就像之前一样（列表 [10-17](#PC17)）。
- en: '[PRE16]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Note additionally that we return the negative F1 score because Hyperopt *minimizes*
    the given objective function. If we were to omit the negation, Hyperopt would
    in fact be finding the worst model. (Purely theoretically speaking, the worst
    model is very close to the best model – just flip the labels.)
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，请注意我们返回负的 F1 分数，因为 Hyperopt 是最小化给定的目标函数。如果我们省略否定，Hyperopt 实际上是在寻找最差的模型。（纯粹从理论上讲，最差的模型与最佳模型非常接近——只需翻转标签。）
- en: 'After 30 evaluations, Hyperopt determines that the best set of parameters (stored
    in `best`) is as follows:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 经过 30 次评估后，Hyperopt 确定最佳参数集（存储在 `best` 中）如下：
- en: '[PRE17]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: The selected value for the parameter ‘models’ is 2; the model at index 2 in
    the list of models in the search space is the Random Forest classifier. The optimal
    model is a Random Forest classifier using the entropy criterion with a maximum
    tree depth of 16 and 69 estimators. After training separately, this model obtains
    an F score of about 0.73, which is quite high for the Higgs Boson dataset.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 参数 'models' 的选择值是 2；搜索空间中模型列表中的第 2 个模型是随机森林分类器。最佳模型是一个使用熵标准、最大树深度为 16 和 69 个估计器的随机森林分类器。经过单独训练后，此模型获得大约
    0.73 的 F 分数，对于希格斯玻色子数据集来说相当高。
- en: We can also use meta-optimization to optimize how we train neural networks.
    For instance, we may want to choose the best optimizer, optimizer parameters,
    and the decay factor and patience of a learning rate manager. Note that we need
    to structure our optimizer in a nested/hierarchical fashion because some parameters
    are only relevant if another parameter is sampled at a certain value (i.e., we
    want to capture parameter dependencies). However, we will reliably need to sample
    the patience and decay factor of a learning rate manager; thus, we can add these
    to the space as parameters in a sub-dictionary for the purposes of organization
    but don’t “choose” whether they are relevant or not via nested choice (Listing
    [10-18](#PC19)).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用元优化来优化我们训练神经网络的方式。例如，我们可能希望选择最佳的优化器、优化器参数以及学习率管理器的衰减因子和耐心。请注意，我们需要以嵌套/分层的方式构建我们的优化器，因为某些参数只有在另一个参数采样到某个特定值时才相关（即我们想要捕捉参数依赖关系）。然而，我们确实需要可靠地采样学习率管理器的耐心和衰减因子；因此，我们可以将这些添加到子字典中作为参数，以组织的目的，但不要通过嵌套选择“选择”它们是否相关（见代码清单[10-18](#PC19)）。
- en: '[PRE18]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Since creating a neural network requires a nontrivial amount of code, it’s good
    practice to create a separate method that constructs a neural network architecture.
    In this case, we will employ a simple static seven-layer network (Listing [10-19](#PC20)).
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 由于创建神经网络需要相当数量的代码，因此创建一个单独的方法来构建神经网络架构是一种良好的实践。在这种情况下，我们将采用一个简单的静态七层网络（见代码清单[10-19](#PC20)）。
- en: '[PRE19]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Our objective is to minimize the validation binary cross-entropy. The objective
    function takes in the sampled parameters, initializes a neural network, and fits
    it using the given optimizer parameters and learning rate manager (Listing [10-20](#PC21)).
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是最小化验证二进制交叉熵。目标函数接受采样参数，初始化一个神经网络，并使用给定的优化器参数和学习率管理器进行拟合（见代码清单[10-20](#PC21)）。
- en: '[PRE20]'
  id: totrans-168
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Note that because we are using a relatively lightweight neural network architecture
    and tabular datasets are comparatively small, training and evaluating 100 neural
    networks (or more) is not computationally unfeasible on ordinary hardware.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，由于我们使用的是相对轻量级的神经网络架构，并且表格数据集相对较小，因此在普通硬件上训练和评估100个神经网络（或更多）在计算上并非不可行。
- en: 'The best solution yielded in one run is as follows:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 单次运行中产生的最佳解决方案如下：
- en: '[PRE21]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: This particular neural network model reaches an F1 score of almost 0.74.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这个特定的神经网络模型达到了几乎0.74的F1分数。
- en: Beyond just optimizing the model’s training parameters, we can also try to optimize
    the neural network’s architecture. Let’s parametrize the `build_NN` function by
    allowing for various dimensions of the network (Listing [10-21](#PC23)). In an
    effort to build more complex nonlinear network topologies, we will use multiple
    branches (see Figure [10-14](#Fig14)). Each branch is composed of a certain number
    of 28-neuron fully connected layers, followed by a certain number of 16-neuron
    fully connected layers. These branches are merged together through a certain joining
    method (either adding or concatenating) and processed by a certain number of 16-neuron
    layers. This gives us five dimensions of parametrization.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 除了优化模型的训练参数之外，我们还可以尝试优化神经网络的架构。我们将通过允许网络具有不同的维度来参数化`build_NN`函数（见代码清单[10-21](#PC23)）。为了构建更复杂的非线性网络拓扑，我们将使用多个分支（见图[10-14](#Fig14)）。每个分支由一定数量的28神经元全连接层组成，随后是一定数量的16神经元全连接层。这些分支通过某种连接方法（要么是添加，要么是连接）合并在一起，并通过一定数量的16神经元层进行处理。这为我们提供了五个参数化维度。
- en: '[PRE22]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: We can correspondingly design a search space (Listing [10-22](#PC24)). In addition
    to optimizing for the optimizer and learning rate management, we will also provide
    five fields for Hyperopt to optimize the neural network architecture. `quniform`
    works fine for all the fields except for the join method, which is a choice between
    adding and concatenating.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以相应地设计一个搜索空间（见代码清单[10-22](#PC24)）。除了优化优化器和学习率管理之外，我们还将为Hyperopt提供五个字段来优化神经网络架构。`quniform`对所有字段都适用，除了连接方法，它是在添加和连接之间进行选择。
- en: '[PRE23]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: To understand how different branch sizes manifest, see Listing [10-23](#PC25)
    and Figure [10-14](#Fig14).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解不同分支大小的表现，请参阅代码清单[10-23](#PC25)和图[10-14](#Fig14)。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig14_HTML.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![图10-14](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig14_HTML.png)'
- en: 6 flowcharts of 6 branches. Each branch varies in design, with similar features
    of input, out dense, and add.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 6个分支的6个流程图。每个分支在设计上有所不同，具有类似输入、输出密集和添加的特征。
- en: Figure 10-14
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-14
- en: Visualization of architectures with varying numbers of branches (holding other
    architectural features constant)
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化具有不同分支数量（保持其他架构特征不变）的架构
- en: '[PRE24]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Moreover, to illustrate the architectural diversity of topologies generated
    from our five dimensions of architecture parametrization, see Listing [10-24](#PC26)
    and Figure [10-15](#Fig15). You can think of each of the displayed architectures
    as occupying some point in the search space.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，为了说明从我们五个架构参数化维度生成的拓扑结构的多样性，请参阅列表 [10-24](#PC26) 和图 [10-15](#Fig15)。你可以把显示的每个架构看作是在搜索空间中占据某个点。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig15_HTML.png)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-15](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig15_HTML.png)'
- en: 35 flowcharts. They present the branch samples in the search space for suitable
    selection. Each sample varies in design, with similar features of input, out dense,
    and add.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 35 个流程图。它们展示了搜索空间中适合选择的分支样本。每个样本在设计上有所不同，具有类似输入、输出密集和添加的特征。
- en: Figure 10-15
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-15
- en: Sample selection of architectures possible in our search space
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们搜索空间中可能选择的架构样本
- en: '[PRE25]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: The objective function is not difficult to write, due to our well-designed implementation
    of the search space. We can simply unpack relevant architectural parameters and
    pass them into the `build_NN` function, which instantiates the sampled architecture
    (Listing [10-25](#PC27)).
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们精心设计的搜索空间实现，目标函数不难编写。我们可以简单地解包相关的架构参数，并将它们传递给 `build_NN` 函数，该函数实例化了样本架构（列表
    [10-25](#PC27)）。
- en: '[PRE26]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'The best-discovered architecture for a sample run had two branches, three 28-node
    layers followed by three 110-node layers in each branch and four 110-node layers
    after an add-based joining. The discovered architecture seems reasonable: it exploits
    the nonlinearity of multiple branches, but is overall a well-balanced topology
    (Figure [10-16](#Fig16)).'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 对于样本运行的最佳发现的架构有两个分支，每个分支有三个 28 节点层，之后每个分支有三个 110 节点层，再之后是一个基于添加的连接后的四个 110 节点层。发现的架构看起来是合理的：它利用了多个分支的非线性，但整体上是一个平衡良好的拓扑结构（见图
    [10-16](#Fig16)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig16_HTML.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-16](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig16_HTML.png)'
- en: A flowchart. It presents a suitable option through a hyperopt architecture.
    Dense numbers 2266 to 2282 are displayed, along with input, output, none and numbers.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图。它通过超参数优化架构展示了一个合适的选项。显示了 2266 到 2282 的密集数字，以及输入、输出、无和数字。
- en: Figure 10-16
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-16
- en: The best architecture (within our problem space) for this problem, discovered
    by Hyperopt
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: Hyperopt 发现的（在我们问题空间内）针对此问题的最佳架构
- en: However, note that Hyperopt was not designed for intensive architecture search.
    Later in this chapter, we’ll explore how we can use more specialized frameworks
    to run Neural Architecture Search (NAS) operations.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，请注意，Hyperopt 并未设计用于密集架构搜索。在本章的后面部分，我们将探讨如何使用更专业的框架来运行神经架构搜索（NAS）操作。
- en: Optimizing Data Pipelines
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化数据管道
- en: Building the model itself is a relatively small component of the overall modeling
    process! Any data scientist who has worked on real-world data problems understands
    that tasks like data cleaning and preparation comprise a large part of the labor
    and time required to work one’s way through the data pipeline. Along the way,
    you will make many decisions on how to manipulate the data that may seem arbitrary
    or unoptimized. We can optimize these decisions, too, with meta-optimization tools.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 构建模型本身是整个建模过程中的一个相对较小的组成部分！任何在现实世界数据问题上工作过的数据科学家都明白，数据清洗和准备等任务构成了通过数据管道所需的大量劳动和时间。在这个过程中，你将做出许多关于如何操作数据的决定，这些决定可能看似任意或不优化。我们也可以使用元优化工具来优化这些决定。
- en: Let’s use the Ames Housing dataset, which has many categorical features that
    require intensive data encoding. Recall we used this dataset in Chapter [2](525591_1_En_2_Chapter.xhtml)
    to try out different categorical encoding techniques (Listing [10-26](#PC28),
    Figure [10-17](#Fig17)).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用 Ames 房屋数据集，它包含许多需要密集数据编码的分类特征。回想一下，我们在第 [2](525591_1_En_2_Chapter.xhtml)
    章节中使用这个数据集来尝试不同的分类编码技术（列表 [10-26](#PC28)，图 [10-17](#Fig17)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig17_HTML.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-17](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig17_HTML.png)'
- en: A table of 22 columns with the Ames housing dataset. At the bottom a text presents
    as, 1460 rows, cross, 60 columns.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 一个包含 22 列的 Ames 房屋数据集表格。底部显示为 1460 行，交叉，60 列。
- en: Figure 10-17
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-17
- en: The Ames Housing dataset
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: Ames 房屋数据集
- en: '[PRE27]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Plotting out a univariate distribution of house prices demonstrates a pretty
    significant range of prices, spanning the range of hundreds of thousands of dollars
    (Figure [10-18](#Fig18)).
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 房价的单变量分布图显示了相当大的价格范围，覆盖了数十万美元的价格范围（见图[10-18](#Fig18)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig18_HTML.jpg)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![图10-18](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig18_HTML.jpg)'
- en: 'A graph of count versus sale price. Values are estimated. The highest and lowest
    data are, 100000 to 200000: 175, and 600000 to 700000: 1.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 销售价格与数量分布图。值是估计的。最高和最低数据是：100000到200000：175，600000到700000：1。
- en: Figure 10-18
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-18
- en: Distribution of house prices in the Ames Housing dataset
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: Ames住房数据集中房价的分布
- en: We mainly care about categorical features here, since these are ones that need
    preprocessing. We want to find which type of categorical encoding is optimal for
    each feature.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我们主要关注分类特征，因为这些是需要预处理的特征。我们想要找到哪种类型的分类编码对每个特征是最优的。
- en: Categorical features need to be encoded somehow. Instead of guessing which categorical
    encoding technique to use for each feature (or across all features), we can define
    a search space in which we want to choose the best categorical encoder for each
    categorical column in the Ames Housing dataset (Figure [10-19](#Fig19)).
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 分类特征需要以某种方式进行编码。而不是猜测每个特征（或所有特征）应该使用哪种分类编码技术，我们可以在Ames住房数据集中为每个分类列定义一个搜索空间，以选择最佳分类编码器（见图[10-19](#Fig19)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig19_HTML.png)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![图10-19](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig19_HTML.png)'
- en: A table of 5 columns with 4 sets of search space of label encoder.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 一个包含5列和4个标签编码器搜索空间集合的表格。
- en: Figure 10-19
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-19
- en: Demonstration of mapping a set of possible categorical encoders to each categorical
    feature
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 将一组可能的分类编码器映射到每个分类特征的演示
- en: Ideally, at the conclusion of such a search, the meta-optimization procedure
    would select the best combination of categorical encoding techniques for each
    column such that a model trained on the categorically encoded dataset yields the
    best validation performance (Figure [10-20](#Fig20)).
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，在完成这样的搜索后，元优化过程将选择每个列的最佳分类编码技术组合，以便在分类编码的数据集上训练的模型能够获得最佳的验证性能（见图[10-20](#Fig20)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig20_HTML.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![图10-20](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig20_HTML.png)'
- en: A table of 5 columns with 4 sets of search space of label encoder. 4 encoder
    categories are highlighted in each set, namely, one hot encoder, target encoder,
    James Stein encoder, and label encoder.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 一个包含5列和4个标签编码器搜索空间集合的表格。每个集合中突出显示4个编码器类别，即单热编码器、目标编码器、James Stein编码器和标签编码器。
- en: Figure 10-20
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-20
- en: Demonstration of selecting a single best categorical encoder from the set of
    categorical encoders for each categorical feature in the dataset
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据集中每个分类特征的最佳分类编码器集合中的选择演示
- en: 'First, we need to determine which columns in the dataset are categorical or
    not. This is not a trivial task, because there are several dozen columns in the
    dataset and some categorical features are numbers. Moreover, some features can
    be reasonably considered both to be categorical and continuous, like the number
    of bathrooms in a house. This quantity is technically continuous, but is categorical
    in nature because there are only really four to five unique values that this feature
    could feasibly occupy. We’ll define a categorical feature as a feature that satisfies
    the following condition: it either is filled with strings or contains five or
    less unique values (Listing [10-27](#PC29)). This isn’t perfect, but it gets the
    job done.'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要确定数据集中哪些列是分类的或不是分类的。这不是一个简单任务，因为数据集中有几十列，其中一些分类特征是数字。此外，一些特征可以合理地被认为是既可以是分类的也可以是连续的，比如房屋中的浴室数量。这个数量在技术上来说是连续的，但在本质上来说是分类的，因为这个特征可能只占据四到五个独特的值。我们将定义分类特征为满足以下条件的特征：它要么填充了字符串，要么包含五个或更少的独特值（见[10-27](#PC29)）。这并不完美，但能完成任务。
- en: '[PRE28]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Now, we need to actually construct our space. To begin with, we want a set of
    categorical encoders to consider for each feature (Listing [10-28](#PC30)). We’ll
    choose several earlier discussed in Chapter [2](525591_1_En_2_Chapter.xhtml) and
    create a list of possible encoders.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要实际构建我们的空间。首先，我们想要考虑每个特征的分类编码器集合（见[10-28](#PC30)）。我们将选择第[2](525591_1_En_2_Chapter.xhtml)章中讨论的几个，并创建一个可能的编码器列表。
- en: '[PRE29]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: To create the space, we simply need to loop through each column in the dataset
    and determine if it is a categorical feature or not. If it is, we take note of
    it in `cat_features` and create a parameter in the search space that allows Hyperopt
    to choose between any of the encoders to apply for that particular feature (Listing
    [10-29](#PC31)).
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建空间，我们只需遍历数据集中的每一列，并确定它是否是分类特征。如果是，我们在 `cat_features` 中记录它，并在搜索空间中创建一个参数，允许
    Hyperopt 在对该特定特征应用任何编码器之间进行选择（见[10-29](#PC31)）。
- en: '[PRE30]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Now, our space has a parameter for each categorical variable. You can probably
    already imagine the structure of the objective function from our previous exercises.
    The objective function will accept a dictionary of parameters, and we will apply
    the selected encoders to each feature (using something like `encoder.fit_transform(data)`).
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们的空间为每个分类变量都有一个参数。你可能已经能够想象出我们之前练习中目标函数的结构。目标函数将接受一个参数字典，我们将对每个特征应用选定的编码器（使用类似
    `encoder.fit_transform(data)` 的方法）。
- en: However, there’s a problem. Some of the categorical encoders (e.g., count encoder,
    target encoder) used require a target feature *y* in addition to the categorical
    feature *x*, whereas others (e.g., one-hot encoder, ordinal encoder) require only
    the categorical feature *x*. We cannot train all encoders the same way. To reconcile
    with this, we can associate each encoder in the search space with metadata (similar
    to the practice of “bundling” introduced earlier with nested search spaces). In
    this case, we can attach a Boolean to each encoder indicating if it requires a
    target feature during training or not. When we read in the set of selected parameters,
    we can determine exactly how to use the encoder with respect to the categorical
    feature by observing that Boolean status.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，存在一个问题。一些分类编码器（例如，计数编码器、目标编码器）在训练时除了分类特征 *x* 之外还需要目标特征 *y*，而其他编码器（例如，独热编码器、有序编码器）只需要分类特征
    *x*。我们不能以相同的方式训练所有编码器。为了解决这个问题，我们可以在搜索空间中将每个编码器与元数据关联（类似于之前在嵌套搜索空间中引入的“捆绑”实践）。在这种情况下，我们可以为每个编码器附加一个布尔值，指示它在训练期间是否需要目标特征。当我们读取所选参数集时，我们可以通过观察该布尔状态来确定如何根据分类特征使用编码器。
- en: To implement this, we can restructure our list of encoders to instead a list
    of encoder “bundles,” in which each bundle contains the actual encoder object
    as its first element and the Boolean value as the second element (Listing [10-30](#PC32)).
    Note that Hyperopt doesn’t care about how you structure the choice search space,
    as long as you give it a list of some objects (e.g., sets, tuples, lists) to choose
    from.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这一点，我们可以重构我们的编码器列表，改为一个编码器“捆绑”列表，其中每个捆绑包含实际的编码器对象作为第一个元素，布尔值作为第二个元素（见[10-30](#PC32)）。请注意，Hyperopt
    不关心你如何结构化选择搜索空间，只要你给它一个列表，其中包含一些可以选择的对象（例如，集合、元组、列表）。
- en: '[PRE31]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Now we can build our objective function. We will loop through each of the categorical
    features and encode them using the sampled encoder and then add them to a dataset
    (Listing [10-31](#PC33)). We’ll run train-test split with the same seed and train
    a Random Forest regressor model on that dataset. The performance of the set is
    the mean absolute error of that model on the validation dataset.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以构建我们的目标函数。我们将遍历每个分类特征，使用采样编码器对其进行编码，然后将它们添加到数据集中（见[10-31](#PC33)）。我们将使用相同的种子进行训练-测试分割，并在该数据集上训练一个随机森林回归器模型。该集的性能是该模型在验证数据集上的平均绝对误差。
- en: '[PRE32]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: We can fit it using standard objectives (Listing [10-32](#PC34)).
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用标准目标函数来拟合它（见[10-32](#PC34)）。
- en: '[PRE33]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: The best model obtains a validation loss of 825\. This is a good result – that’s
    825 dollars off on predicting house price with a much larger target output range.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳模型获得了825的验证损失。这是一个好结果——这意味着在预测房价时，与更大的目标输出范围相比，减少了825美元。
- en: 'Moreover, we can print out the contents of the best-discovered set of encoders.
    Hyperopt displays the indices of the best encoders for a particular column. The
    results are interesting to think about; you can do a lot of important analyses
    about the nature of the feature based on which type of encoder is most beneficial
    to prediction:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们可以打印出最佳发现的编码器集的内容。Hyperopt 显示了特定列的最佳编码器的索引。这些结果值得思考；你可以基于哪种编码器对预测最有益，进行很多关于特征本质的重要分析：
- en: '[PRE34]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: We can also optimize which model is used. It may be the case that the best set
    of encoders for the Random Forest regressor is not the best set of encoders for
    a different regressor that performs better overall. This follows similar logic
    as previously discussed; we can define a search space of possible models that
    will be instantiated and trained inside the objective function (Listing [10-33](#PC36)).
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以优化所使用的模型。可能的情况是，对于随机森林回归器来说最佳的编码器集合，对于表现更好的不同回归器来说并不是最佳的。这与之前讨论的逻辑相似；我们可以在目标函数内部定义一个可能的模型搜索空间，这些模型将被实例化并在其中训练（见列表[10-33](#PC36)）。
- en: '[PRE35]'
  id: totrans-239
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Within the objective function, we instantiate the model with `()` and fit on
    the encoded set of features, returning the validation Mean Absolute Error as a
    measure of badness to be minimized (Listing [10-34](#PC37)).
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 在目标函数中，我们使用`()`实例化模型，并在编码的特征集上拟合，返回验证均方误差作为需要最小化的坏度度量（见列表[10-34](#PC37)）。
- en: '[PRE36]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: This model performs much better, obtaining a Mean Absolute Error of 373.589\.
    The best selected model uses LASSO regression, which you likely would not have
    expected to be the best-performing algorithm!
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型表现更好，获得了373.589的均方误差。最佳选择的模型使用LASSO回归，这可能是你不会期望它是表现最好的算法！
- en: 'Moreover, we can optimize the hyperparameters of the model. This brings everything
    previously discussed together: we are optimizing, more or less, the entire data
    pipeline from encoding to model training. The definition of the model hyperparameter
    search space is very similar to the previously discussed sample, but in this case
    we use regression rather than classification models and therefore optimize a somewhat
    different set of hyperparameters (Listing [10-35](#PC38)).'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还可以优化模型的超参数。这把之前讨论的所有内容都综合在一起：我们或多或少地优化了从编码到模型训练的整个数据管道。模型超参数搜索空间的定义与之前讨论的示例非常相似，但在这个情况下，我们使用回归模型而不是分类模型，因此优化了一组不同的超参数（见列表[10-35](#PC38)）。
- en: '[PRE37]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'We get a validation error of about 145 with the following parameter dictionary.
    This is almost a fivefold decrease in error from our first hyperparameter optimization
    procedure on this dataset and likely an even larger decrease in error compared
    with a manually designed model:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下参数字典，我们得到大约145的验证误差。这几乎是我们在这个数据集上第一次超参数优化过程中的误差的五倍减少，并且与手动设计的模型相比，误差的减少可能更大：
- en: '[PRE38]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: However, it should be noted that meta-optimization can – in a minority of cases
    – be prone to *meta-overfitting*, in which we overly parametrize our search space
    and end up creating a highly specialized model that performs very well on the
    validation dataset, but not on new data. Meta-overfitting is only relevant when
    the search space size drastically overshadows the size of the dataset, because
    it is quite difficult to overfit on a “secondary” level through the outputs of
    a model. This can occur when optimizing a very large set of neural network meta-parameters
    on a comparatively much smaller dataset, but seldom in other cases. Imagine, for
    instance, that your hands were replaced with monkeys that had their own will and
    actions. Performing intricate, fine-grained, and highly coordinated movements
    like grabbing a cup of coffee (i.e., having the monkey’s hand grab the coffee
    and bring it to your lips) is very difficult because you only have “meta-level”
    control over the monkeys, but not direct control over the monkeys’ hands. In cases
    where meta-overfitting may be a risk, either reduce the search space, increase
    the dataset (perhaps through data generation techniques like VAEs), and/or separate
    the validation dataset itself into two parts such that you can evaluate the “true”
    performance of the hyper-optimized best model.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，需要注意的是，元优化在少数情况下可能会出现*元过拟合*的风险，在这种情况下，我们过度参数化我们的搜索空间，最终创建了一个在验证数据集上表现非常出色的非常专业化的模型，但在新数据上表现不佳。元过拟合只有在搜索空间的大小远远超过数据集大小时才相关，因为通过模型的输出在“二级”层面上过度拟合是非常困难的。这可能会发生在优化一个非常大的神经网络元参数集，而数据集相对较小的情况下，但在其他情况下很少发生。想象一下，如果你的手被猴子取代了，而这些猴子有自己的意志和行动。执行复杂、精细和高度协调的动作，比如抓起一杯咖啡（即猴子用手抓起咖啡并送到你的嘴边），是非常困难的，因为你只有对猴子的“元级”控制，而没有对猴子手部的直接控制。在可能存在元过拟合风险的情况下，可以减少搜索空间，增加数据集（可能通过VAEs等数据生成技术），以及/或者将验证数据集本身分成两部分，这样你就可以评估超优化最佳模型的“真实”性能。
- en: 'A common criticism of meta-optimization is that it takes a long time. However,
    the evaluation metric for whether to use meta-optimization or not is to evaluate
    *its efficiency relative to your efficiency*. We can define efficiency as follows:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 元优化的一个常见批评是它花费的时间很长。然而，是否使用元优化的评估指标是评估*其相对于你效率的效率*。我们可以如下定义效率：
- en: '![$$ \textrm{efficiency}=\frac{\textrm{success}\ \textrm{of}\ \textrm{model}}{\textrm{time}\
    \textrm{and}\ \textrm{labor}\ \textrm{exerted}\ \textrm{creating}\ \textrm{model}}
    $$](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equf.png)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![效率公式](../images/525591_1_En_10_Chapter/525591_1_En_10_Chapter_TeX_Equf.png)'
- en: More often than not, using meta-optimization techniques will have higher efficiency
    than manually creating a model, because manually designing models often takes
    a nontrivial amount of time and labor yet on average yields average performance.
    Even if the meta-optimization space is even just reasonably set up, chances are
    that you will get something out of it.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 更多的时候，使用元优化技术将比手动创建模型具有更高的效率，因为手动设计模型通常需要相当多的时间和劳动，但平均而言，性能却很一般。即使元优化空间只是合理设置，你也很可能会从中得到一些东西。
- en: In many ways, meta-optimization allows you to integrate many of the deep learning
    tools learned before (and tools we will learn later). For instance, you could
    use meta-optimization to determine whether to and how to use artificial, convolutional,
    and/or recurrent processing layers in your neural network design. The design is
    in your hands!
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多方面，元优化允许你整合之前学习过的许多深度学习工具（以及我们稍后将要学习的工具）。例如，你可以使用元优化来确定是否以及在神经网络设计中使用人工、卷积和/或循环处理层。设计掌握在你手中！
- en: Neural Architecture Search
  id: totrans-252
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 神经架构搜索
- en: Previously, we demonstrated how general Bayesian hyperparameter optimization
    methods implemented in Hyperopt could be used to accomplish tasks like optimizing
    a neural network architecture. However, neural network architecture optimization
    is a quite specific task, and attempting to apply general tools to solve specific
    tasks generally causes inefficiency due to overhead (like using a generic tool
    like a shovel to move large mounds of rock when a specialized tool like a bulldozer
    is needed).
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 之前，我们演示了如何在Hyperopt中实现的一般贝叶斯超参数优化方法可用于完成诸如优化神经网络架构等任务。然而，神经网络架构优化是一个相当具体的问题，试图将通用工具应用于特定任务通常会导致效率低下，因为存在开销（例如，当需要专门的工具如推土机时，却使用通用的工具如铲子来移动大量的岩石）。
- en: The specific theory behind the subfield of Neural Architecture Search is beyond
    the scope of the book. In this section, we will demonstrate client-end usage of
    the friendly, high-level NAS library AutoKeras. True to its name, AutoKeras is
    a Keras/TensorFlow-based Neural Architecture Search library that uses a variation
    of Bayesian optimization designed particularly for NAS.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 神经架构搜索子领域的具体理论超出了本书的范围。在本节中，我们将演示友好、高级的神经架构搜索库AutoKeras在客户端的使用。正如其名，AutoKeras是一个基于Keras/TensorFlow的神经架构搜索库，它使用了一种特别为神经架构搜索设计的贝叶斯优化的变体。
- en: 'AutoKeras’s syntax reflects that of Keras: different “blocks” or “layers” can
    be chained together in functional API–like syntax. The blocks in AutoKeras can
    be thought of as “super-layers” – the use can specify the general nature of the
    block, but the specific composition of the block is optimized using the AutoKeras
    NAS algorithm.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: AutoKeras的语法反映了Keras的语法：不同的“块”或“层”可以在功能API-like语法中链接在一起。在AutoKeras中，块可以被视为“超级层”——用户可以指定块的一般性质，但块的特定组成是通过AutoKeras
    NAS算法进行优化的。
- en: Say we want to find the optimal neural network architecture for the Higgs Boson
    dataset. We will use the `ak.StructuredDataInput` block to accept structured data
    input (i.e., tabular data). Afterward, we attach `ak.StructuredDataBlock`, which
    is an abstracted block object that processes structured data. The output of the
    structured data block is passed into `ak.ClassificationHead`, because we want
    to perform a classification task (Listing [10-36](#PC40)).
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要为希格斯玻色子数据集找到最佳神经网络架构。我们将使用`ak.StructuredDataInput`块来接受结构化数据输入（即，表格数据）。之后，我们附加`ak.StructuredDataBlock`，这是一个抽象的块对象，用于处理结构化数据。结构化数据块的输出传递到`ak.ClassificationHead`，因为我们想要执行分类任务（见列表[10-36](#PC40)）。
- en: '[PRE39]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: The layers can then be compiled into `ak.AutoModel`. The `overwrite` parameter
    allows new better-performing models to replace older poorer-performing models
    in storage and is recommended for large-scale trials. The `max_trials` parameter
    determines the maximum number of sample neural network architectures AutoKeras
    will run before experiment termination. The search can be fitted using standard
    Keras syntax. Note that AutoKeras further splits the `X_train` and `y_train` into
    “subtraining” and “subvalidation” sets. After training, the best model can be
    exported using `.export_model()`. Since the output is a Keras model, we can perform
    operations like saving the model or plotting its architecture (Listing [10-37](#PC41),
    Figure [10-21](#Fig21)).
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 层可以被编译成 `ak.AutoModel`。`overwrite` 参数允许新的性能更好的模型替换存储中的旧的性能较差的模型，并且在大规模试验中推荐使用。`max_trials`
    参数决定了在实验终止前 AutoKeras 将运行的最大样本神经网络架构数量。搜索可以使用标准的 Keras 语法进行拟合。请注意，AutoKeras 进一步将
    `X_train` 和 `y_train` 分割成“子训练”和“子验证”集。训练后，可以使用 `.export_model()` 导出最佳模型。由于输出是一个
    Keras 模型，我们可以执行保存模型或绘制其架构等操作（列表 [10-37](#PC41)，图 [10-21](#Fig21)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig21_HTML.png)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig21_HTML.png)'
- en: A flowchart. It presents a suitable option through Auto Keras classification
    of a dataset. Input layer displays, multicategory encoding, normalization of batch,
    dense, R e L U, dropout, and activation.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图。它通过 Auto Keras 对数据集的分类展示了合适的选项。输入层显示，多类别编码，批量归一化，密集层，ReLU，dropout 和激活。
- en: Figure 10-21
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-21
- en: The best deep learning model architecture for the Higgs Boson dataset, discovered
    by AutoKeras
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: AutoKeras 发现的 Higgs Boson 数据集的最佳深度学习模型架构
- en: '[PRE40]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: We can also adapt our search to a regression problem – the Ames Housing dataset
    – by simply swapping the output `ak.ClassificationHead` with `ak.RegressionHead`.
    In this case, we can also pass in `categorical_encoding = True` to have AutoKeras
    learn optimal categorical encoding techniques too (Listing [10-38](#PC42)).
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以通过简单地交换输出 `ak.ClassificationHead` 为 `ak.RegressionHead` 来将我们的搜索适应到回归问题——即
    Ames 住房数据集。在这种情况下，我们还可以传递 `categorical_encoding = True` 以让 AutoKeras 学习最优的分类编码技术（列表
    [10-38](#PC42)）。
- en: '[PRE41]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: AutoKeras’s best solution performs quite poorly (although acceptably, speaking
    on the absolute) relative to our more manual design implemented earlier in the
    “Optimizing Data Pipelines” subsection (Figure [10-22](#Fig22)).
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 与我们在“优化数据管道”子节中较早实现的更手动设计相比，AutoKeras 的最佳解决方案表现相当差（尽管在绝对意义上是可以接受的）（图 [10-22](#Fig22)）。
- en: '![](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig22_HTML.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_10_Chapter/525591_1_En_10_Fig22_HTML.png)'
- en: A flowchart. It presents a suitable option through Auto Keras classification
    of a dataset. Input layer displays, multicategory encoding, dense, R e L U, dropout,
    along with regression head 1, none and numbers.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图。它通过 Auto Keras 对数据集的分类展示了合适的选项。输入层显示，多类别编码，密集层，ReLU，dropout，以及回归头部 1，无和数字。
- en: Figure 10-22
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-22
- en: The best deep learning model architecture for the Ames Housing dataset, discovered
    by AutoKeras
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: AutoKeras 发现的 Ames 住房数据集的最佳深度学习模型架构
- en: 'The poor performance of AutoKeras’s search for the optimal Ames Housing dataset
    neural network can demonstrate one or multiple of three takeaways: (a) neural
    networks are not the best for every problem (and can actually do very poorly in
    some contexts), (b) custom-optimized categorical encoding can do wonders for categorical
    feature–heavy datasets, and (c) Neural Architecture Search – for all its shiny
    glitz and glamour – doesn’t always work out.'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: AutoKeras 对最优 Ames 住房数据集神经网络搜索的较差性能可以展示以下一个或多个要点：(a) 神经网络并不是适合每个问题（实际上在某些情况下可能表现非常糟糕），(b)
    定制的优化分类编码可以对分类特征密集型数据集产生奇迹，(c) 尽管神经网络架构搜索（NAS）光彩夺目，但并不总是有效。
- en: AutoKeras has many additional adaptations for multi-input and multi-output heads,
    which can be useful if you want to build multimodal models like in Chapter [4](525591_1_En_4_Chapter.xhtml)
    or [5](525591_1_En_5_Chapter.xhtml). It is especially helpful for processing text
    data, which can require a significant labor investment; AutoKeras’s text heads
    and embedding layers require little manual work.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: AutoKeras 为多输入和多输出头部提供了许多额外的适配，如果你想要构建像第 [4](525591_1_En_4_Chapter.xhtml) 章或
    [5](525591_1_En_5_Chapter.xhtml) 章中那样的多模态模型，这可能会很有用。对于需要大量劳动投入处理文本数据的情况，这尤其有帮助；AutoKeras
    的文本头部和嵌入层几乎不需要手动工作。
- en: Generally speaking, AutoKeras and NAS are neither tools to be wholly relied
    upon nor wholly dismissed. In many cases, a NAS-discovered architecture may be
    the inspiration for a high-performing somewhat manually designed network, as is
    often the case in deep learning research.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，AutoKeras和NAS既不是完全依赖的工具，也不是完全摒弃的工具。在许多情况下，NAS发现的架构可能成为高性能的、部分手动设计的网络的灵感来源，这在深度学习研究中是常见的情况。
- en: Key Points
  id: totrans-274
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: In this chapter, we discussed meta-optimization and its application to various
    components of the model development process.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了元优化及其在模型开发过程各个组成部分中的应用。
- en: In meta-optimization, a meta-model searches for the set of hyperparameters that
    optimizes a model’s performance.
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在元优化中，一个元模型搜索一组超参数，这些超参数可以优化模型的表现。
- en: In Bayesian optimization, a probabilistic surrogate model is both updated by
    sampled points and used to inform next points to sample.
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在贝叶斯优化中，一个概率代理模型既通过采样点更新，也用于指导下一个采样点。
- en: Meta-optimization can be used to optimize which model is used, model hyperparameters
    (including the architecture and training parameters of models), and data encodings
    (among other components of the modeling process).
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 元优化可用于优化使用哪种模型、模型超参数（包括模型的架构和训练参数）以及数据编码（建模过程中的其他组成部分）。
- en: Meta-optimization is especially feasible with tabular data models, relatively
    speaking, since these tend to be smaller than computer vision or natural language
    processing models.
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 元优化在表格数据模型中尤其可行，相对而言，因为这些模型通常比计算机视觉或自然语言处理模型要小。
- en: In the next chapter, we will explore how models can be effectively arranged
    to form powerful ensembles and “self-aware” systems.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何有效地安排模型以形成强大的集成和“自感知”系统。
