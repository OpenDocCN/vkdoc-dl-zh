- en: 11. Emerging Areas and Techniques in Recommender Systems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 推荐系统中的新兴领域和技术
- en: This book has shown you multiple implementations of recommender systems (also
    known as *recommendation systems*) using various techniques. You have gained a
    holistic view of all these methods. Topics like deep learning and graph-based
    approaches are still improving. Recommender systems have been a major research
    interest for a long time. Newer, more complex, and more interesting avenues have
    been discovered, and research continues in the same direction.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书向您展示了使用各种技术实现的多个推荐系统（也称为*推荐系统*）的实现方式。您已经对这些方法有了全面的认识。像深度学习和基于图的方法这样的主题仍在不断进步。推荐系统长期以来一直是主要的研究兴趣。已经发现了更复杂、更有趣的新途径，并且研究仍在同一方向上继续进行。
- en: This chapter looks at real-time, context-aware, conversational, and multi-task
    recommenders to showcase the vast potential for research and growth in this field.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了实时、上下文感知、对话和多任务推荐者，以展示该领域研究和增长的巨大潜力。
- en: Real-Time Recommendations
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实时推荐
- en: In general, batch recommendations are computationally inexpensive and preferred
    because they can be generated daily (for example) and are much simpler to operationalize.
    But recently, more focus has been on developing real-time recommendations. Real-time
    recommendations are generally more computationally expensive since they must be
    generated on-demand and are based on live user interactions. Operationalizing
    real-time recommendations is also more complex.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，批量推荐在计算上成本较低，更受欢迎，因为它们可以每天（例如）生成，并且更容易操作化。但最近，更多的关注点在于开发实时推荐。实时推荐通常在计算上更昂贵，因为它们必须按需生成，并且基于实时用户交互。操作实时推荐也更为复杂。
- en: Then why are real-time recommendations needed? They are essential when a time-based
    and mission-centric customer journey depends on context. In most scenarios, real-time
    demand needs to be met before the user loses interest and the demand fades. Also,
    real-time analysis of a customer’s journey leads to better recommendations in
    the current scenario. Conversely, a batch recommendation suggests products similar
    to those seen/bought by a customer in previous interactions.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么需要实时推荐呢？当基于时间和以任务为中心的客户旅程依赖于上下文时，它们是必不可少的。在大多数情况下，在用户失去兴趣和需求减弱之前，需要满足实时需求。此外，对客户旅程的实时分析有助于在当前情况下提供更好的推荐。相反，批量推荐建议的产品与客户在之前的互动中看到/购买的产品相似。
- en: Conversational Recommendations
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对话推荐
- en: Recent years have seen a lot of research and effort in developing more conversational
    systems. It is believed to revolutionize how human-computer interactions happen
    in the future. This influence can also be seen in the recent developments in recommender
    systems in the form of conversational systems.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，在开发更多对话系统方面进行了大量的研究和努力。人们相信这将会彻底改变未来人机交互的方式。这种影响也可以在推荐系统最近的对话系统发展中看到。
- en: Figure [11-1](#Fig1) shows the system design of conversational recommenders.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-1](#Fig1)显示了对话推荐系统的系统设计。
- en: '![](../images/537881_1_En_11_Chapter/537881_1_En_11_Fig1_HTML.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图11-1](../images/537881_1_En_11_Chapter/537881_1_En_11_Fig1_HTML.png)'
- en: A system design architecture of conversational recommenders. It starts with
    input processing, output generation, dialogue management system, user modelling
    system, recommendation engine to domain and background knowledge.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对话推荐系统的系统设计架构。它从输入处理开始，到输出生成，再到对话管理系统、用户建模系统、推荐引擎到领域和背景知识。
- en: Figure 11-1
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-1
- en: System design of conversational recommendations
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 对话推荐系统的系统设计
- en: Conversational recommender systems aim to produce recommendations from textual/spoken
    dialogs so that the users can interact with a computer in a natural, conversational
    manner. It has recently become extremely popular and is extensively used in voice
    assistants and chatbots. It uses natural language understanding (input) and generation
    (output). The different actions for various input dialogs are generated with the
    help of a dialog management system.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 对话推荐系统旨在从文本/语音对话中生成推荐，以便用户可以以自然、对话的方式与计算机交互。它最近变得极其流行，并在语音助手和聊天机器人中得到广泛应用。它使用自然语言理解（输入）和生成（输出）。通过对话管理系统生成针对各种输入对话的不同操作。
- en: Context-Aware Recommenders
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文感知推荐者
- en: Researchers and practitioners have recognized the importance of contextual information
    in many fields, such as e-commerce personalization, information retrieval, ubiquitous
    and mobile computing, data mining, marketing, and management. Although there has
    been a lot of research in recommender systems, many existing approaches do not
    consider other contextual information, such as time, place, or other people’s
    company, to find the most relevant. It focuses on recommending articles to users.
    (such as watching a movie or eating). There is a growing understanding that relevant
    contextual information is important in recommender systems and that it is important
    to consider it when making recommendations.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员和从业者已经认识到在许多领域，如电子商务个性化、信息检索、普适和移动计算、数据挖掘、营销和管理中，上下文信息的重要性。尽管在推荐系统方面已经进行了大量研究，但许多现有方法并没有考虑其他上下文信息，如时间、地点或他人的陪伴，以找到最相关的信息。它专注于向用户推荐文章。（例如观看电影或吃饭）。越来越多的人认识到，相关的上下文信息在推荐系统中很重要，并且在做出推荐时考虑它是重要的。
- en: Context-aware recommender systems represent an emerging area of ​​experimentation
    and research aimed at delivering more accurate content based on the user’s context
    at any given moment. For example, is the user at home or on the go? Are they using
    a large or small screen? Morning or evening? Given the data available to a particular
    user, the contextual system may provide recommendations that the user will likely
    accept in these scenarios.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 基于上下文的推荐系统代表了一个新兴的实验和研究领域，旨在根据用户在任何给定时刻的上下文提供更准确的内容。例如，用户是在家还是在外？他们是在使用大屏幕还是小屏幕？早上还是晚上？给定特定用户的可用数据，上下文系统可能会提供用户在这些场景下可能会接受的推荐。
- en: Figure [11-2](#Fig2) shows different types of contextual recommenders.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-2](#Fig2)展示了不同类型的上下文推荐器。
- en: '![](../images/537881_1_En_11_Chapter/537881_1_En_11_Fig2_HTML.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图11-2](../images/537881_1_En_11_Chapter/537881_1_En_11_Fig2_HTML.png)'
- en: A flow chart depicts the types of contextual recommenders. It includes content
    and collaborative based, hybrid to contextual recommenders.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图描述了不同类型的上下文推荐器。它包括基于内容和基于协作的，以及混合到上下文推荐器。
- en: Figure 11-2
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-2
- en: Different types of contextual recommenders
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 不同类型的上下文推荐器
- en: Multi-task Recommenders
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多任务推荐器
- en: In many domains, there are several rich and important sources of feedback to
    draw from while building a recommender system. For example, e-commerce websites
    generally record user visits (to product pages), user clicks (click-stream data),
    additions to carts, and purchases made at every user and item level. Post-purchase
    inputs like reviews and returns are also recorded.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多领域，在构建推荐系统时，可以借鉴的丰富且重要的反馈来源有好几个。例如，电子商务网站通常记录用户访问（产品页面）、用户点击（点击流数据）、添加到购物车以及每个用户和物品级别的购买情况。购买后的输入，如评论和退货，也被记录下来。
- en: Integrating these different forms of feedback is critical to building systems
    that yield better results rather than building a task-specific model. This is
    especially true where some data is sparse (purchases, returns, and reviews) and
    some data is abundant (such as clicks). In these scenarios, a joint model may
    use representations obtained from an abundant task to improve its predictions
    on a sparse one through a phenomenon known as *transfer learning*.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 整合这些不同形式的反馈对于构建能够产生更好结果的系统至关重要，而不是构建特定任务的模型。这在某些数据稀疏（如购买、退货和评论）而某些数据丰富（如点击）的情况下尤其如此。在这些场景中，联合模型可能使用从丰富任务中获得的表示来通过称为*迁移学习*的现象提高其对稀疏任务的预测。
- en: Multi-task learning is an ML learning approach in which multiple learning tasks
    are simultaneously tackled while exploiting their commonalities and differences.
    It has been predominantly used in NLP and computer vision, which has been quite
    successful. In recent times, the use of this method in building robust recommender
    systems has garnered a lot of interest. Building deep neural networks based on
    multi-task learning is widely used due to its multiple advantages.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务学习是一种机器学习学习方法，在这种方法中，同时处理多个学习任务，同时利用它们的共性和差异。它主要被用于自然语言处理和计算机视觉，取得了相当的成功。近年来，在构建鲁棒推荐系统时使用这种方法引起了广泛关注。基于多任务学习的深度神经网络因其多种优势而得到广泛应用。
- en: It avoids overfitting.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它避免了过拟合。
- en: It provides interpretable outputs to explain recommendations.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它提供可解释的输出以解释推荐。
- en: It implicitly expands the data and thereby alleviates the sparsity problem.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它隐式地扩展了数据，从而减轻了稀疏性问题。
- en: Figure [11-3](#Fig3) explains the architecture of multi-task learning.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-3](#Fig3)解释了多任务学习的架构。
- en: '![](../images/537881_1_En_11_Chapter/537881_1_En_11_Fig3_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_11_Chapter/537881_1_En_11_Fig3_HTML.jpg)'
- en: An architecture of multitasking. It consists of three tasks specified layers
    task A, B, and C and shared layers.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务处理架构。它由三个指定层任务A、B和C以及共享层组成。
- en: Figure 11-3
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-3
- en: Multi-task learning architecture
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务学习架构
- en: You can also deploy multi-task learning to tackle cross-domain recommendations,
    where generating recommendations for each domain is a separate task.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以部署多任务学习来解决跨域推荐问题，其中为每个域生成推荐是一个单独的任务。
- en: Joint Representation Learning
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 联合表示学习
- en: Joint Representation Learning (JRL), a recent approach, is capable of learning
    multi-representation models of users and items simultaneously. It uses a deep
    representation learning architecture, where each type of information source (textual
    review, product images, rating points, etc.) is adopted to learn appropriate user
    and item representations.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 联合表示学习（JRL），一种最近的方法，能够同时学习用户和物品的多表示模型。它使用深度表示学习架构，其中每种类型的信息源（文本评论、产品图像、评分点等）都被采用来学习适当的用户和物品表示。
- en: Figure [11-4](#Fig4) explains the representation of JRL.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-4](#Fig4)解释了JRL的表示。
- en: '![](../images/537881_1_En_11_Chapter/537881_1_En_11_Fig4_HTML.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_11_Chapter/537881_1_En_11_Fig4_HTML.png)'
- en: A set of three flow charts depict the J R L representation. It includes representation
    learning of reviews, representation learning of images, and representation learning
    of ratings.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一组三个流程图描述了J R L的表示。它包括评论的表示学习、图像的表示学习和评分的表示学习。
- en: Figure 11-4
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-4
- en: Representation of JRL
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: JRL的表示
- en: In JRL, multiple representations from different sources are integrated through
    a separate layer that obtains common representations for users and items. Finally,
    the per-source and joint representation layers are trained using pairwise learning
    to rank the top N recommendations. JRL is generally much quicker in online predictions
    than other deep learning approaches since it uses simple vector multiplications.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在JRL中，来自不同来源的多个表示通过一个单独的层进行整合，该层为用户和物品获得共同表示。最后，使用成对学习来训练每个来源和联合表示层，以对前N个推荐进行排序。由于JRL使用简单的向量乘法，因此在在线预测中通常比其他深度学习方法快得多。
- en: Conclusion
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Recommender systems have been gaining traction since the start of the e-commerce
    era, but it has been around for some time. The first recommender system was developed
    in 1979 in a system called Grundy, a computer-based librarian that offered suggestions
    on books to read. The first commercial use of recommender systems was in the early
    1990s. Since then, it has taken off because the financial incentives and time-saving
    qualities that recommender systems provide are unmatchable. Recommender systems
    have become essential for better user experience in many domains. The most popular
    example is that of Netflix and its recommendation engine, which receives heavy
    funding and focuses on research and development.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐系统自电子商务时代开始以来一直备受关注，但它已经存在了一段时间。第一个推荐系统是在1979年开发的，名为Grundy的系统，这是一个基于计算机的图书管理员，为读者提供阅读建议。推荐系统的首次商业应用是在20世纪90年代初。从那时起，它因提供无与伦比的财务激励和时间节省特性而迅速发展。推荐系统在许多领域的用户体验中变得至关重要。最典型的例子是Netflix及其推荐引擎，它获得了大量资金，并专注于研究和开发。
- en: The constant need for recommender systems and their importance in various domains
    has led to a huge demand for building good, reliable, and robust systems. It calls
    for more research and innovation in developing these systems. This benefits businesses
    and helps users save time in making decisions and getting the most suitable option,
    which would be missed in most scenarios if done manually.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 对推荐系统及其在各个领域中的持续需求及其重要性导致了构建良好、可靠和健壮系统的巨大需求。这要求在开发这些系统方面进行更多研究和创新。这有利于企业，并帮助用户在做出决策和获得最合适的选项时节省时间，这在大多数情况下如果手动进行将会错过。
- en: This book presented the various popular methods to implement an end-to-end recommender
    system in Python, ranging from basic arithmetic operations to advanced graph-based
    systems. All these methods can be useful depending on the requirements and the
    domain. Hands-on knowledge of these approaches will assist you in building the
    ideal Recommendation Engine (RC). We hope that this book is a useful tool for
    developers and practitioners. It should ease and further elevate the ongoing work
    and research in this exciting field by providing a deeper knowledge of the various
    concepts and implementation of recommendation engines.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 本书介绍了在Python中实现端到端推荐系统的各种流行方法，从基本的算术运算到高级的基于图系统。所有这些方法根据需求和领域都可以是有用的。对这些方法的实际了解将帮助您构建理想的推荐引擎（RC）。我们希望这本书对开发者和从业者来说是一个有用的工具。通过提供对各种概念和推荐引擎实现的更深入知识，它应该能够简化并进一步提升在这个激动人心的领域中的现有工作和研究。
