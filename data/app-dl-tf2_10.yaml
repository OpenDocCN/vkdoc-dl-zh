- en: 10. Metric Analysis
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 指标分析
- en: 'Let’s consider a classification problem (similar to one that we have seen so
    far in the book). While doing all our work we made a strong assumption without
    explicitly saying it: we assume that all the observations are correctly labelled!
    We cannot say that with certainty. To perform the labelling, we needed some manual
    intervention, and therefore there must be a certain number of images that are
    improperly classified since humans are not perfect. This is an important revelation.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个分类问题（类似于我们在书中看到的问题）。在我们做所有工作的同时，我们做出了一个强烈的假设，但没有明确说出来：我们假设所有观测都是正确标记的！我们无法确定这一点。为了执行标记，我们需要一些手动干预，因此一定有某些图像被错误分类，因为人类是不完美的。这是一个重要的启示。
- en: 'Consider the following scenario: we are supposed to reach 90% accuracy in a
    classification problem. We could try to get better and better accuracy, but when
    is it sensible to stop trying? If your labels are wrong in 10% of the cases, the
    model, as sophisticated as it may be, will never be able to generalize to new
    data with a very high accuracy since it learned the wrong classes for many images.
    We spend quite a lot of time checking and preparing the training data and normalizing
    it, but not much time is typically spent checking the labels themselves. We typically
    assume that all classes have similar characteristics. (We will discuss later in
    this chapter what that exactly means; for the moment an understanding of the idea
    will suffice.) What if the quality of images (suppose our inputs are images) for
    specific classes is worse than for others? What if the number of pixels whose
    gray values are different than zero is dramatically different for different classes?
    What if some images are completely blank. What happens in that case? As you can
    imagine, we cannot check all the images manually and try to detect such issues.
    Suppose we have millions of images, a manual analysis is surely not possible.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下场景：我们本应在一个分类问题中达到90%的准确率。我们可以尝试不断提高准确率，但何时停止尝试才是合理的？如果你的标签在10%的情况下是错误的，那么无论模型多么复杂，它都无法以非常高的准确率泛化到新的数据，因为它学习了许多图像的错误类别。我们花费了大量时间检查和准备训练数据以及对其进行归一化，但通常没有花太多时间检查标签本身。我们通常假设所有类别都有相似的特征。（我们将在本章后面讨论这究竟意味着什么；目前，对这一想法的理解就足够了。）如果特定类别的图像质量（假设我们的输入是图像）比其他类别差，会怎样？如果不同类别的像素灰度值不同于零的数量差异很大，会怎样？如果有些图像完全空白，会怎样？在这种情况下会发生什么？正如你所想象的那样，我们无法手动检查所有图像并尝试检测这些问题。假设我们有数百万张图像，手动分析肯定是不可能的。
- en: 'We need a new weapon in our arsenal to be able to spot such cases and to be
    able to tell how a model is doing. This new weapon is the focus of this chapter
    and is what it is typically called “metric analysis.” Very often people in this
    field refer to this array of methods as “error analysis.” However, this name is
    a bit confusing, especially for beginners. Error can refer to too many things:
    Python code bugs, error in the methods, in the algorithms, errors in the choice
    of optimizers, and so on.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要在我们武器库中添加一种新武器，以便能够发现这样的案例，并能够了解模型的表现。这个新武器是本章的重点，通常被称为“指标分析”。在这个领域，人们经常将这一系列方法称为“错误分析”。然而，这个名称有点令人困惑，尤其是对于初学者来说。错误可以指很多事物：Python代码错误、方法错误、算法错误、优化器选择错误等等。
- en: You will learn in this chapter how to obtain fundamental information about how
    your model is doing and how good your data is. You will do this by evaluating
    your optimizing metric on a set of different datasets that you can derive from
    your data.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习如何获取关于你的模型表现如何以及你的数据好坏的基本信息。你将通过评估你的优化指标在从你的数据中衍生出的不同数据集上来完成这项工作。
- en: Recall that we discussed, in the case of regression, how in the case of *MSE*[*train*] ≫ *MSE*[*dev*]
    we are in a regime of overfitting. Our metric is the MSE and evaluating it on
    two datasets, training and dev, and comparing the two values can tell us if the
    model is overfitting or not. We will expand this methodology in this chapter to
    be able to extract much more information from the data and the model.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，我们在回归的情况下讨论了当 *MSE*[*train*] ≫ *MSE*[*dev*] 时，我们处于过拟合的状态。我们的指标是均方误差（MSE），在训练集和验证集上评估它，并比较这两个值可以告诉我们模型是否过拟合。在本章中，我们将扩展这一方法，以便从数据和模型中提取更多信息。
- en: Human-Level Performance and Bayes Error
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人类水平的表现和贝叶斯误差
- en: In most of the datasets that we use for supervised learning, someone has labelled
    the observations. Take for example a dataset where we have images that are classified.
    If we ask people to classify all images (imagine this being possible, regardless
    of the number of images), the accuracy obtained will never be 100%. Some images
    maybe too blurry to be classified correctly, and people make mistakes. If, for
    example, 5% of the images are not classified correctly, due for example to how
    blurry they are, we must expect that the maximum accuracy people can reach will
    always be less than 95%.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们用于监督学习的多数数据集中，有人已经对观测进行了标注。例如，有一个数据集，其中我们有一些被分类的图片。如果我们要求人们对所有图片进行分类（想象一下这是可能的，无论图片数量多少），得到的准确率永远不会是100%。有些图片可能太模糊而无法正确分类，人们也会犯错误。例如，如果5%的图片由于模糊等原因没有被正确分类，我们必须预期人们可以达到的最大准确率将始终低于95%。
- en: 'Let’s consider a problem of classification. First, let’s define what we mean
    by the word *error*. We associate the word “error” with the following quantity,
    indicated with *ϵ*:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个分类问题。首先，让我们定义一下我们所说的“错误”这个词。我们将“错误”这个词与以下数量联系起来，用 *ϵ* 表示：
- en: '![$$ \epsilon \equiv 1- Accuracy $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equa.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \epsilon \equiv 1- Accuracy $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equa.png)'
- en: For example, if we reach an accuracy of 95%, we will have *ϵ* = 1 − 0.95 = 0.05
    or expressed as percent *ϵ* = 5%.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我们达到了95%的准确率，我们将有 *ϵ* = 1 − 0.95 = 0.05，或者用百分比表示为 *ϵ* = 5%。
- en: A useful concept to understand is the *human-level performance*, which can be
    defined as “the lowest value for the error *ϵ* that can be reached by a person
    performing the classification task.” We will indicate it with *ϵ*[*hlp*].
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有用的概念是理解“人类水平的表现”，它可以定义为“执行分类任务的人可以达到的最小错误 *ϵ* 值。”我们将用 *ϵ*[*hlp*] 来表示它。
- en: Let’s look at a concrete example. Let’s suppose we have a set of 100 images.
    Now let’s suppose we ask three people to classify the 100 images. Let’s imagine
    that they obtain 85%, 83% and 84% accuracy. In this case, human-level performance
    accuracy will be *ϵ*[*hlp*] = 5%. Note that someone else maybe much better at
    this task, and therefore it’s always important to consider that the value of *ϵ*[*hlp*]
    we get is an estimate and should only serve as a guideline.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个具体的例子。假设我们有一组100张图片。现在假设我们让三个人来对这100张图片进行分类。让我们想象他们分别达到了85%、83%和84%的准确率。在这种情况下，人类水平的表现准确率将是
    *ϵ*[*hlp*] = 5%。请注意，其他人可能在这个任务上表现得更好，因此始终考虑我们得到的 *ϵ*[*hlp*] 的值是一个估计，并且只能作为指导。
- en: 'Now let’s complicate things a bit. Suppose we are working on a problem in which
    doctors classify MRI scans in two classes: ones with signs of cancer and ones
    without. Now let’s suppose we calculate *ϵ*[*hlp*] from the results of untrained
    students obtaining 15%, from doctors with a few years of experience obtaining
    8%, from experienced doctors obtaining 2%, and from experienced groups of doctors
    obtaining 0.5%. What is *ϵ*[*hlp*] in this case? You should always choose the
    lowest value you can get, for reasons we will discuss later.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们稍微复杂一点。假设我们正在处理一个问题，医生需要将MRI扫描分为两类：有癌症迹象的和没有的。现在假设我们根据未受过训练的学生获得15%、有几年经验的医生获得8%、有经验的医生获得2%和有经验的医生群体获得0.5%的结果来计算
    *ϵ*[*hlp*]。在这种情况下，*ϵ*[*hlp*] 是多少？您应该始终选择您能得到的最低值，原因我们将在后面讨论。
- en: 'We can now expand the definition of *ϵ*[*hlp*] to a second definition:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以将 *ϵ*[*hlp*] 的定义扩展为第二个定义：
- en: '*Human-level performance* is “the lowest value for the error *ϵ* that can be
    reached by people or *groups* of people performing the classification task.”'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: “人类水平的表现”是指“人们或 *群体* 人们执行分类任务可以达到的最小错误 *ϵ* 值。”
- en: Note
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: You do not need to decide which definition is right. Just use the one that gives
    you the lowest value of *ϵ*[*hlp*].
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要决定哪个定义是正确的。只需使用给您提供最低 *ϵ*[*hlp*] 值的那个定义即可。
- en: Now let’s talk a bit about the why we must choose the lowest value we can get
    for *ϵ*[*hlp*]. The *lowest error that that can be reached by any classifier*
    is called the *Bayes error* and it’s a very important quantity. We will indicate
    it with *ϵ*[*Bayes*]. Usually, *ϵ*[*hlp*] is very close to *ϵ*[*Bayes*], at least
    in tasks where humans excel, like image recognition. *It is commonly said that
    that human-level performance* *error* *is a proxy for the Bayes error.* Normally
    it’s impossible to evaluate *ϵ*[*Bayes*] and therefore practictioners use *ϵ*[*hlp*],
    assuming the two are close since the latter is easier (relatively) to estimate.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们谈谈为什么我们必须选择尽可能低的 *ϵ*[*hlp*] 值。任何分类器所能达到的 *最低错误率* 被称为贝叶斯错误，这是一个非常重要的量。我们将用
    *ϵ*[*Bayes*] 来表示它。通常，*ϵ*[*hlp*] 非常接近 *ϵ*[*Bayes*]，至少在人类擅长如图像识别等任务中是这样。通常说，*人类水平的表现*
    *错误率* 是贝叶斯错误的代理。通常情况下，评估 *ϵ*[*Bayes*] 是不可能的，因此从业者使用 *ϵ*[*hlp*]，假设两者接近，因为后者更容易（相对而言）估计。
- en: Now keep in mind that it makes sense to compare the two values and assume that
    *ϵ*[*hlp*] is a proxy for *ϵ*[*Bayes*] only if people (or groups of people) perform
    classification in the same way as the classifier. For example, it’s okay if both
    use the same images to do classification. But, in the cancer example, if the doctors
    use additional scans and analysis to make a diagnosis, the comparison is not fair
    anymore since human-level performance is not a proxy for Bayes error anymore.
    Doctors, having more data at their disposal, will clearly be better than the model,
    which has as the input only the images.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在请记住，只有在人们（或人群）以与分类器相同的方式进行分类时，比较这两个值并假设 *ϵ*[*hlp*] 是 *ϵ*[*Bayes*] 的代理才有意义。例如，如果两者都使用相同的图像进行分类，这是可以接受的。但是，在癌症的例子中，如果医生使用额外的扫描和分析来做出诊断，那么比较就不再公平了，因为人类水平的表现不再是贝叶斯错误的代理。医生拥有更多的数据可供使用，将明显优于只有图像作为输入的模型。
- en: Note
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: '*ϵ*[*hlp*] and *ϵ*[*Bayes*] are close to each other only when the classifications
    by the humans and by the model are done the same way. So always be sure that is
    the case before assuming that human-level performance is a proxy for the Bayes
    error.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 只有当人类和模型的分类方式相同时，*ϵ*[*hlp*] 和 *ϵ*[*Bayes*] 才会接近。所以，在假设人类水平的表现是贝叶斯错误的代理之前，一定要确保这一点。
- en: Something else that you will notice when working on models is that with relatively
    low effort you can reach a low error, and often (almost) reach *ϵ*[*hlp*]. After
    passing human-level performance (and in several cases that is possible), progress
    tends to be very slow, as shown in Figure [10-1](#Fig1).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在模型上工作时，你还会注意到，只需相对较低的努力，你就可以达到低错误率，并且经常（几乎）达到 *ϵ*[*hlp*]。在超过人类水平的表现（在许多情况下这是可能的）之后，进步往往非常缓慢，如图
    [10-1](#Fig1) 所示。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig1_HTML.jpg)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig1_HTML.jpg)'
- en: Figure 10-1
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-1
- en: Typical values of accuracy that can be reached vs. amount of time invested.
    At the beginning, it's very easy with machine learning to get good accuracy, and
    often reach *ϵ*[*hlp*]. This is indicated by the line in the plot. After that
    point, progress tends to be very slow
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 可达到的准确度典型值与投入的时间量。一开始，使用机器学习获得良好的准确度非常容易，并且经常达到 *ϵ*[*hlp*]。这在图表中的线表示。之后，进步往往非常缓慢
- en: 'As long as the error of your algorithm is bigger than *ϵ*[*hlp*] you can use
    the following techniques to get better results:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 只要你的算法错误率大于 *ϵ*[*hlp*]，你就可以使用以下技术来获得更好的结果：
- en: Get better labels from humans or groups, for example from groups of doctors
    in the case of medical data, as in our example.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从人类或群体中获取更好的标签，例如在医疗数据的情况下，从医生群体中获取，就像我们的例子中那样。
- en: Get more labelled data from humans or groups.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从人类或群体中获取更多标记数据。
- en: Do a good metric analysis to determine the best strategy for getting better
    results. You will learn how to do this in this chapter.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行良好的度量分析，以确定获得更好结果的最佳策略。你将在本章中学习如何做到这一点。
- en: '*As soon as your algorithm gets better than human-level performance you cannot
    rely on those techniques anymore.* It’s important to get an idea of those numbers
    to be able to decide what to do to get better results. In our example of MRI scans,
    we could get better labels by relying on other sources that are not related to
    humans, such as checking the diagnosis a few years after the MRI time point, when
    it’s more clear if the patient developed cancer or not. In the case of image classification,
    you might decide to label a few thousands of images of specific classes. This
    is not usually possible, but you must be aware that you can get labels using means
    other than asking humans to perform the same kind of task that your algorithm
    is performing.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '*一旦你的算法的表现超过人类水平，你就不能再依赖那些技术了。* 了解这些数字很重要，以便能够决定如何获得更好的结果。在我们的MRI扫描示例中，我们可以通过依赖与人类无关的其他来源来获得更好的标签，例如在MRI时间点几年后检查诊断，那时如果患者是否发展出癌症会更清楚。在图像分类的情况下，你可能会决定标记几千张特定类别的图片。这通常是不可能的，但你必须意识到，你可以使用除了要求人类执行与你的算法相同类型任务之外的其他方式来获取标签。'
- en: Note
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Human-level performance is a good proxy for the Bayes error for tasks that humans
    excel at, such as image recognition. It can be very far from Bayes error for tasks
    that humans don't do well.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人类擅长执行的任务，如图像识别，人类水平的表现是一个很好的贝叶斯错误的代理。对于人类不擅长的任务，它可能非常远离贝叶斯错误。
- en: A Short Story About Human-Level Performance
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于人类水平表现的短篇故事
- en: 'It is instructive to know about the work that Andrej Karpathy has done, while
    trying to estimate human-level performance in a specific case. You can read the
    entire story on his blog post (a long post, but worth reading) [1]. What he did
    is extremely informative about human-level performance. Karpathy was involved
    in the ILSVRC contest: ImageNet Large Scale Visual Recognition Challenge in 2014
    [2]. The task was made up of 1.2 million images (training set) classified in 1000
    categories and included objects like animals, abstract objects like a spiral,
    scenes, and many others. Results were evaluated on a dev dataset. GoogleLeNet
    (a model developed by Google) reached an astounding 6.7% error. Karpathy asked
    himself *how do humans compare*?'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在尝试估计特定案例中的人类水平表现时了解Andrej Karpathy所做的工作是有教育意义的。你可以在他的博客文章（一篇很长的文章，但值得一读）[1]中阅读整个故事。他所做的事情对于了解人类水平表现非常有信息量。Karpathy参与了2014年的ILSVRC竞赛：ImageNet大规模视觉识别挑战赛[2]。任务由120万张图片（训练集）组成，分为1000个类别，包括动物、抽象物体如螺旋、场景等许多其他内容。结果在一个开发数据集上进行了评估。GoogleLeNet（由谷歌开发的一个模型）达到了惊人的6.7%错误率。Karpathy问自己*人类是如何比较的*？
- en: 'The question is a lot more complicated that it may seem at first. Since the
    images were all classified by humans, shouldn’t *ϵ*[*hlp*] = 0%? Well, not really.
    In fact, the images were first obtained with a web search, then filtered and labelled
    by asking people binary questions: is this a hook or not (for example).'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是比最初看起来要复杂得多。由于所有图片都是由人类分类的，*ϵ*[*hlp*] = 0%不是应该的吗？实际上并不是。事实上，这些图片最初是通过网络搜索获得的，然后通过询问人们二进制问题进行过滤和标记：这是钩子还是不是（例如）。
- en: The images were collected, as Karpathy mentioned in his blog post, in a binary
    way. People were not asked to assign to each image a class by choosing from the
    1000 available as the algorithms were doing. You may think that this is a technicality,
    but the difference in how the labelling occurs makes the correct evaluation of
    *ϵ*[*hlp*] quite a complicated matter. So Karpathy set to work and developed a
    web interface that consisted of an image on the left and the 1000 classes with
    examples on the right. You can see an example of the interface in Figure [10-2](#Fig2).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图片的收集方式，正如Karpathy在他的博客文章中提到的，是以二进制的方式进行。人们没有被要求从1000个可用的类别中选择一个来给每个图片分类，因为算法正在这样做。你可能认为这是一个技术细节，但标签方式的差异使得对*ϵ*[*hlp*]的正确评估变得相当复杂。因此，Karpathy开始工作并开发了一个包含左侧的图片和右侧的1000个类别及其示例的网页界面。你可以在图[10-2](#Fig2)中看到一个界面示例。
- en: 'You can try the interface [3] to realize how complicated is such a task. People
    kept missing classes and making mistakes. The best error that was reached was
    around 15%. So, he did what every scientist at some point in his career have to
    do: he bored himself out of his mind and did a careful annotation, sometimes needing
    20 minutes for a single image. As he formulated in his blog post, he did it only
    #forscience. He was able to reach a stunning *ϵ*[*hlp*] = 5.1%. 1.7% better than
    the best algorithm at the time. He listed sources of errors that GoogLeNet is
    more susceptible to than humans, such as problems with multiple objects in an
    image, and sources of errors that humans are more susceptible to than GoogLeNet,
    such as problems with classes with a huge granularity (dogs are classified in
    120 different subclasses).'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '你可以尝试这个界面 [3]，以了解这样一个任务有多么复杂。人们一直在错过类别并犯错误。达到的最佳错误率大约是 15%。所以，他做了每个科学家在其职业生涯的某个时刻都必须做的事情：他让自己无聊至极，并进行了仔细的标注，有时需要花费
    20 分钟来标注一张图片。正如他在博客文章中所述，他这样做只是为了 #forscience。他能够达到惊人的 *ϵ*[*hlp*] = 5.1%，比当时最好的算法高
    1.7%。他列出了 GoogLeNet 比人类更容易出错的原因，例如图像中多个对象的问题，以及人类比 GoogLeNet 更容易出错的原因，例如具有巨大粒度的类别问题（狗被分类在
    120 个不同的子类别中）。'
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig2_HTML.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig2_HTML.png)'
- en: Figure 10-2
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-2
- en: The web interface developed by Karpathy. Not everyone finds it fun to look at
    120 breeds of dogs to try to classify the dog on the left (by the way, it's a
    Tibetan Mastiff)
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: Karpathy 开发的网页界面。并不是每个人都觉得看 120 种狗的品种来尝试分类左边的狗（顺便说一句，它是一只藏獒）很有趣
- en: If you have a few hours to spare, try it. You will get a whole new appreciation
    of the difficulties of evaluating human-level performance. Defining and evaluating
    human-level performance is a very tricky task. It is important to understand that
    *ϵ*[*hlp*] is dependent on how humans approach the classification task, and is
    dependent on the time invested, on the patience of the people, and on many factors
    that are difficult to quantify. The main reason for it being so important, apart
    from the philosophical aspect of knowing when a machine becomes better than humans,
    is that it is often taken as a proxy for the Bayes error.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有多几个小时空闲时间，试试看。你将对评估人类水平表现的困难性有一个全新的认识。定义和评估人类水平表现是一个非常棘手的工作。重要的是要理解 *ϵ*[*hlp*]
    取决于人类如何处理分类任务，以及投入的时间、人们的耐心以及许多难以量化的因素。它之所以如此重要，除了知道何时机器比人类更好的哲学方面之外，还因为它通常被视为贝叶斯错误的代理。
- en: Human-Level Performance on MNIST
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MNIST 人类水平的表现
- en: 'Before moving on to the next subject, let’s look at another example of human-level
    performance on a dataset we have analyzed together: the MNIST dataset. Human-level
    performance has been widely analyzed and has been found to be *ϵ*[*hlp*] = 0.2%
    [4]. Now you may wonder why a human cannot reach a 100% accuracy on simple digits.
    Look at Figure [10-3](#Fig3) and see if you can say which digits are in the image.
    You may understand why *ϵ*[*hlp*] = 0% is not possible, and why a person cannot
    reach 100% accuracy. Other reasons may be related to which culture people are
    coming from. In some countries, the digit 7 is written in a very similar way to
    1s are for example, and in some cases, mistakes can be made. In other countries,
    the digit 7 has a small dash along the vertical bar, making it easier to distinguish
    from a 1.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续下一个主题之前，让我们看看另一个例子，即我们在分析的数据集中人类水平的表现：MNIST 数据集。人类水平的表现已经被广泛分析，并且发现其准确率 *ϵ*[*hlp*]
    = 0.2% [4]。现在你可能想知道为什么人类不能达到简单的数字的 100% 准确率。看看图 [10-3](#Fig3)，看看你是否能说出图像中的数字。你可能理解为什么
    *ϵ*[*hlp*] = 0% 是不可能的，以及为什么一个人不能达到 100% 的准确率。其他原因可能与人们的文化背景有关。在一些国家，数字 7 的写法与
    1 非常相似，例如，在某些情况下，可能会出错。在其他国家，数字 7 在垂直条上有一个小横线，这使得它更容易与 1 区分开来。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig3_HTML.jpg)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig3_HTML.jpg)'
- en: Figure 10-3
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-3
- en: A set of digits from the MNIST dataset almost impossible to recognize. Such
    examples are one of the reasons that *ϵ*[*hlp*] cannot reach zero
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 数据集中一组几乎无法识别的数字。这样的例子是 *ϵ*[*hlp*] 无法达到零的原因之一
- en: Bias
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 偏差
- en: 'Now let’s start with metric analysis: a set of procedures that will give you
    information on how your model is doing—how good or bad your data is—by looking
    at your optimized metric evaluated on different datasets.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们从度量分析开始：一系列程序，通过查看你在不同数据集上评估的优化度量，为你提供有关你的模型表现的信息——你的数据是好是坏。
- en: Note
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Metric analysis consists of a set of procedures that will give you information
    about how your model is doing—how good or bad your data is—by looking at your
    optimized metric evaluated on different datasets.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 度量分析包括一系列程序，通过查看你在不同数据集上评估的优化度量，为你提供有关你的模型表现的信息——你的数据是好是坏。
- en: 'To start, we need to define a third error: the one evaluated on the training
    dataset, indicated with *ϵ*[*train*].'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要定义第三个错误：在训练数据集上评估的错误，用*ϵ*[*train*]表示。
- en: The first question we want to answer is if our model is not as flexible or complex
    as needed to reach human-level performance. Or, in other words, we want to know
    if our model has a high bias with respect to human-level performance.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要回答的第一个问题是，我们的模型是否不够灵活或复杂，无法达到人类水平的表现。或者换句话说，我们想知道我们的模型在人类水平表现上是否有很高的偏差。
- en: 'To answer the previous question, we can do the following:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答前面的问题，我们可以做以下几步：
- en: Calculate the error from the model from the training dataset *ϵ*[*train*] and
    then calculate |*ϵ*[*train*] − *ϵ*[*hlp*]|. If the number is not small (bigger
    than a few percent), then we are in the presence of bias (sometimes called avoidable
    bias). In other words, our model is too simple to capture the real subtleties
    of our data.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从训练数据集的模型计算错误*ϵ*[*train*]，然后计算|*ϵ*[*train*] − *ϵ*[*hlp*]|。如果这个数字不是很小（大于几个百分比），那么我们就在偏差的存在中（有时称为可避免的偏差）。换句话说，我们的模型太简单，无法捕捉到我们数据的真正细微差别。
- en: Let’s define the following quantity
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义以下量
- en: '![$$ \Delta {\epsilon}_{Bias}=\left|{\epsilon}_{train}-{\epsilon}_{hlp}\right|
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equb.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Delta {\epsilon}_{Bias}=\left|{\epsilon}_{train}-{\epsilon}_{hlp}\right|
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equb.png)'
- en: 'The bigger Δ*ϵ*[*Bias*] is, the more bias in our model. In this case, you want
    to do better on the training set, since you know you can do better on your training
    data (we will look at the problem of overfitting in a moment). The following techniques
    work in reducing bias:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Δ*ϵ*[*Bias*]越大，我们模型中的偏差就越大。在这种情况下，你希望在训练集上做得更好，因为你知道你可以在训练数据上做得更好（我们将在稍后讨论过拟合的问题）。以下技术有助于减少偏差：
- en: Bigger networks (more layers or neurons)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更大的网络（更多层或神经元）
- en: More complex architectures (Convolutional Neural Networks, for example)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更复杂的架构（例如卷积神经网络）
- en: Train your model longer (for more epochs)
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更长时间地训练你的模型（更多的epoch）
- en: Use better optimizers (like Adam)
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用更好的优化器（如Adam）
- en: Do a better hyper-parameter search (we looked at it in detail in Chapter [7](463356_2_En_7_Chapter.xhtml))
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行更好的超参数搜索（我们已在第[7](463356_2_En_7_Chapter.xhtml)章中详细讨论过）
- en: Now there is something else you need to understand. Knowing *ϵ*[*hlp*] and reducing
    the bias to reach it are two very different things. Suppose you know the *ϵ*[*hlp*]
    for your problem. This does not mean that you need to reach it. It may well be
    that you are using the wrong architecture, but you may not have the required skills
    to be able to develop a network sophisticated enough. It may even be that the
    effort required to reach that error level is prohibitive (in terms of hardware
    or infrastructure). Always keep in mind what your problem’s requirements are.
    Always try to understand what is good enough. For an application that recognizes
    cancer, you may want to invest as much as possible to reach the highest accuracy
    possible. You do not want to send someone home and discover later that they really
    do have cancer. On the other hand, if you build a system to recognize cats from
    web images, you may decide that a higher error than *ϵ*[*hlp*] is completely acceptable.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在还有其他一些事情你需要理解。知道*ϵ*[*hlp*]并降低偏差以达到它是两件非常不同的事情。假设你知道你问题的*ϵ*[*hlp*]。这并不意味着你需要达到它。可能你正在使用错误的架构，但你可能没有足够的技能来开发足够复杂的网络。甚至可能达到那个错误水平所需的努力是过度的（从硬件或基础设施的角度来看）。始终记住你问题的要求。始终尝试理解什么足够好。对于一个用于识别癌症的应用，你可能希望尽可能多地投资以达到尽可能高的准确率。你不想让某人回家，后来发现他们真的有癌症。另一方面，如果你构建一个从网络图像中识别猫的系统，你可能会决定比*ϵ*[*hlp*]更高的错误率是完全可接受的。
- en: Metric Analysis Diagram
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 度量分析图
- en: 'This chapter looks at different problems you will encounter when developing
    your models and how to spot them. We looked at the first one: bias, sometimes
    also called avoidable bias. We saw how this can be spotted by calculating Δ*ϵ*[*Bias*].
    At the end of this chapter, you will have a few of those quantities that you can
    calculate to spot problems.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将探讨你在开发模型时可能会遇到的不同问题以及如何识别它们。我们探讨了第一个问题：偏差，有时也称为可避免的偏差。我们看到了如何通过计算 Δ*ϵ*[*偏差*]
    来识别它。在本章结束时，你将有一些可以计算来识别问题的数量。
- en: 'To make understanding them easier, let’s build a Metric Analysis Diagram (MAD).
    It is simply a bar diagram, where each bar represents a problem. Let’s start building
    one with (for the moment) the only quantity we have discussed: bias. You can see
    it in Figure [10-4](#Fig4). At the moment it is a pretty dumb diagram, but you
    will see how useful it is to keep things under control when you have several problems
    at the same time.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使理解它们更容易，让我们构建一个度量分析图（MAD）。它只是一个条形图，其中每个条形代表一个问题。让我们从（目前）我们唯一讨论过的数量：偏差开始构建。你可以在图
    [10-4](#Fig4) 中看到它。目前它是一个非常简单的图表，但当你同时有几个问题时，你会看到它如何有助于控制局面。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig4_HTML.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig4_HTML.jpg)'
- en: Figure 10-4
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-4
- en: 'The Metric Analysis Diagram (MAD) with just one of the quantities we encounter
    in this chapter: *Δϵ*[*Bias*]'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 仅包含我们在本章中遇到的一个数量：*Δϵ*[*偏差*] 的度量分析图（MAD）
- en: Training Set Overfitting
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练集过拟合
- en: Another problem we have discussed at length in the previous chapters is overfitting
    the training data . You will remember that while doing regression you can have
    overfitting if *MSE*[*train*] ≫ *MSE*[*dev*]. The same applies in classification
    problems. Let’s indicate, using *ϵ*[*train*], the error our model has on our training
    dataset and use *ϵ*[*dev*] for the one on the dev dataset. We can then say we
    are overfitting the training set if *ϵ*[*train*] ≫ *ϵ*[*dev*]. Let’s define a
    new quantity
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在前几章中，我们详细讨论了另一个问题：训练数据过拟合。你会记得，在进行回归时，如果 *MSE*[*训练集*] ≫ *MSE*[*开发集*]，你可能会出现过拟合。在分类问题中也是如此。让我们用
    *ϵ*[*训练集*] 表示模型在训练集上的错误，用 *ϵ*[*开发集*] 表示在开发集上的错误。然后我们可以说，如果我们训练集的 *ϵ*[*训练集*] ≫ *ϵ*[*开发集*]，那么我们正在过拟合训练集。让我们定义一个新的数量
- en: '![$$ \Delta {\epsilon}_{overfitting\ train}=\left|{\epsilon}_{train}-{\epsilon}_{dev}\right|
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equc.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Delta {\epsilon}_{overfitting\ train}=\left|{\epsilon}_{train}-{\epsilon}_{dev}\right|
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equc.png)'
- en: With this quantity, we can say we are overfitting the training dataset if *Δϵ*[*overfitting
    train*] is bigger than a few percent.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个数量，如果我们说训练数据集过拟合，如果 *Δϵ*[*过拟合训练集*] 大于几个百分比。
- en: 'Let’s summarize what we have defined and discussed so far. We have three errors:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们总结一下到目前为止我们已经定义和讨论的内容。我们有三类错误：
- en: '*ϵ*[*train*]: The error of our classifier on the training dataset'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ϵ*[*训练集*]: 我们在训练集上的分类器错误'
- en: '*ϵ*[*hlp*]: Human-level performance (as discussed in the previous sections)'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ϵ*[*人类水平表现*]: 人类水平的表现（如前几节所述）'
- en: '*ϵ*[*dev*]: The error of our classifier on the dev dataset'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ϵ*[*开发集*]: 我们在开发集上的分类器错误'
- en: 'With those three quantities we have defined:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这三个我们定义的数量：
- en: 'Δ*ϵ*[*Bias*] = |*ϵ*[*train*] − *ϵ*[*hlp*]|: Measures how much “bias” we have
    between the training dataset and human-level performance'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Δ*ϵ*[*偏差*] = |*ϵ*[*训练集*] − *ϵ*[*人类水平表现*]|: 衡量训练数据集与人类水平表现之间的“偏差”程度'
- en: '*Δϵ*[*overfitting train*] = |*ϵ*[*train*] − *ϵ*[*dev*]|: Measures the amount
    of overfitting of the training dataset'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Δϵ*[*过拟合训练集*] = |*ϵ*[*训练集*] − *ϵ*[*开发集*]|: 衡量训练数据集过拟合的程度'
- en: 'In addition, up to now, we have used two datasets:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，到目前为止，我们已经使用了两个数据集：
- en: 'Training dataset: The dataset we use to train our model (you should know it
    by now)'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练数据集：我们用来训练模型的数据库（你现在应该已经知道了）
- en: 'Dev dataset: A second dataset we use to check the overfitting on the training
    dataset'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发数据集：我们用来检查训练集过拟合的第二个数据集
- en: Now let’s suppose our model has bias and is slightly overfitting the training
    dataset, meaning we have Δ*ϵ*[*Bias*] = 6% and *Δϵ*[*overfitting train*] = 4%.
    Our MAD now becomes what is depicted in Figure [10-5](#Fig5).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在假设我们的模型有偏差，并且略微过拟合了训练数据集，这意味着我们有一个 Δ*ϵ*[*偏差*] = 6% 和 *Δϵ*[*过拟合训练集*] = 4%。我们的MAD现在变成了图
    [10-5](#Fig5) 中所示的内容。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig5_HTML.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig5_HTML.png)'
- en: Figure 10-5
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-5
- en: 'The MAD diagram for our two problems: bias and overfitting of training dataset'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们两个问题的度量分析图（MAD）：偏差和训练数据集过拟合
- en: In Figure [10-5](#Fig5), you can see the relative gravity of the problems we
    have, and you may decide which one you want to address first.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[10-5](#Fig5)中，你可以看到我们面临的问题的相对重要性，你可能决定先解决哪一个。
- en: 'Usually when you are overfitting the training dataset, it’s commonly known
    as a variance problem. When this happens, you can try the following techniques
    to minimize this problem:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 通常当你过度拟合训练数据集时，这通常被称为方差问题。当这种情况发生时，你可以尝试以下技术来最小化这个问题：
- en: Get more data for your training set
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为你的训练集获取更多数据
- en: Use regularization (see Chapter [5](463356_2_En_5_Chapter.xhtml) for a complete
    discussion of the subject)
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用正则化（参见第[5](463356_2_En_5_Chapter.xhtml)章对该主题的完整讨论）
- en: Try data augmentation (for example, if you are working with images, you can
    try rotating them, shifting them, etc.)
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试数据增强（例如，如果你正在处理图像，你可以尝试旋转、平移等）
- en: Try “simpler” network architectures
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试“更简单”的网络架构
- en: As usual, there are no fixed rules, and you must determine which techniques
    work best on your problem by testing .
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常，没有固定的规则，你必须通过测试来确定哪些技术在你的问题上效果最好。
- en: Test Set
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试集
- en: 'Now let’s quickly mention another problem you may find. Let’s recall how you
    choose the best model in a machine learning project (this is not specific to deep
    learning by the way). Let’s suppose you are working on a classification problem.
    First you decide which optimizing metric you want, and suppose you decide to use
    accuracy. Then you build an initial system, feed it with training data, and see
    how it is doing on the dev dataset to see if you are overfitting your training
    data. You will remember that in previous chapters we talked often about hyper-parameters:
    parameters that are not influenced by the learning process. Examples of hyper-parameters
    are the learning rate, regularization parameter, etc. We have seen many of them
    in the previous chapters.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们快速提一下另一个你可能遇到的问题。让我们回顾一下你在机器学习项目中如何选择最佳模型（顺便说一下，这并不特定于深度学习）。假设你正在处理一个分类问题。首先，你决定你想要哪个优化指标，假设你决定使用准确率。然后你构建一个初始系统，用训练数据喂它，看看它在dev数据集上的表现，以确定你是否过度拟合了训练数据。你会记得在之前的章节中我们经常谈论超参数：不受学习过程影响的参数。超参数的例子包括学习率、正则化参数等。我们在前面的章节中看到了很多。
- en: Let’s say you are working with a specific neural network architecture; you need
    to search the best values for the hyper-parameters to see how good your model
    can get. To do that, you train several models with different values of the hyper-parameters
    and check their performance on the dev dataset. What can happen is that your models
    work well on the dev dataset but do not generalize at all, since you select only
    the best values using the dev dataset. You incur in the risk of overfitting the
    dev dataset with choosing specific values of your hyper-parameters. To see if
    this is the case, you create a third dataset, called the test dataset, and cut
    a portion of the observations from your starting dataset. Then you use that test
    dataset to check the performance of your models.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在使用一个特定的神经网络架构；你需要搜索超参数的最佳值，以查看你的模型可以有多好。为此，你用不同值的超参数训练几个模型，并检查它们在dev数据集上的性能。可能发生的情况是，你的模型在dev数据集上表现良好，但根本不能泛化，因为你只使用dev数据集选择了最佳值。你冒着用超参数的特定值过度拟合dev数据集的风险。为了确定这是否是情况，你创建了一个第三数据集，称为测试数据集，并从你的起始数据集中切出部分观测值。然后你使用那个测试数据集来检查你模型的性能。
- en: We must define a new quantity
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须定义一个新的量
- en: '![$$ \Delta {\epsilon}_{overfitting\  dev}=\left|{\epsilon}_{dev}-{\epsilon}_{test}\right|
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equd.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Delta {\epsilon}_{overfitting\  dev}=\left|{\epsilon}_{dev}-{\epsilon}_{test}\right|
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equd.png)'
- en: Where *ϵ*[*test*] is the error evaluated on the test set. We can add it to the
    MAD diagram, as shown in Figure [10-6](#Fig6).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '*ϵ*[*test*] 是在测试集上评估的错误。我们可以将其添加到MAD图中，如图[10-6](#Fig6)所示。'
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig6_HTML.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig6_HTML.png)'
- en: Figure 10-6
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-6
- en: 'The MAD diagram for the three problems we might encounter: bias, overfitting
    the training data, and overfitting the dev data'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能遇到的三种问题的MAD图：偏差、过度拟合训练数据、过度拟合dev数据
- en: Note that if you are not doing a hyper-parameter search, you will not need a
    test dataset. It is only useful when you are doing extensive searches. Otherwise,
    in most cases, it’s useless and takes away observations that you may use for training.
    What we discussed so far assumes that your dev and test sets observations have
    the same characteristics. If use high-resolution images from a smartphone for
    training and the dev dataset, and you use images from the web in low resolution
    for your test dataset, you may see a big |*ϵ*[*dev*] − *ϵ*[*test*]|. But that
    will probably be due to the differences in the images and not because of an overfitting
    problem. Later in the chapter, we discuss what can happen when different sets
    come from different distributions (another way of saying that the observations
    have different characteristics).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果你没有进行超参数搜索，你不需要测试数据集。它只有在进行广泛搜索时才有用。否则，在大多数情况下，它是无用的，并且会占用你可能用于训练的观察数据。我们之前讨论的内容假设你的开发集和测试集观察数据具有相同的特征。如果你使用来自智能手机的高分辨率图像进行训练和开发数据集，而你使用来自网络的低分辨率图像进行测试数据集，你可能会看到一个很大的
    |*ϵ*[*dev*] − *ϵ*[*test*]|。但这可能是因为图像的差异，而不是因为过度拟合问题。在本章的后面部分，我们将讨论当不同集来自不同分布时可能发生的情况（这是说观察数据具有不同特征的一种方式）。
- en: How to Split Your Dataset
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何分割你的数据集
- en: Now let’s briefly discuss how to split the data.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们简要讨论一下如何分割数据。
- en: 'What exactly does *split* mean? Well, as we discussed in the previous section,
    you will need a set of observations to make the model learn, which you call your
    training set. You will also need a set of observations that will make your dev
    set and then a final set that is called the test set. Data is typically split
    so that 60% for the training set, 20% for the dev set, and 20% for test set. Usually,
    the kind of split is indicated in this form: 60/20/20, where the first number
    (60) refers to the percentage of the entire dataset that is in the training set,
    the second (20) to the percentage of the entire dataset that is in the dev set,
    and the last (20) to the percentage that is in the test set. You may find in books,
    blogs, or articles, sentences like this “We split our dataset 80/10/10” for example.
    This is what it means.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: “split”究竟是什么意思呢？嗯，正如我们在上一节所讨论的，你需要一组观察数据来让模型学习，这组数据你称之为训练集。你还需要一组观察数据来构成你的开发集，然后是一组最终的数据集，称为测试集。数据通常会被分成60%用于训练集，20%用于开发集，以及20%用于测试集。通常，这种分割形式是这样的：60/20/20，其中第一个数字（60）表示整个数据集中在训练集中的百分比，第二个数字（20）表示整个数据集中在开发集中的百分比，最后一个数字（20）表示在测试集中的百分比。你可能会在书籍、博客或文章中看到这样的句子，例如“我们分割数据集为80/10/10”。这就是它的意思。
- en: In the deep learning field you will deal with big datasets. For example, if
    we have *m* = 10⁶, we could use a split like 98/1/1\. Keep in mind that 1% of
    10⁶ is 10⁴, so still a big number! Remember that the dev/test set must be big
    enough to give high confidence of the performance of the model, but not unnecessarily
    big. Additionally, you want to save as many observations as possible for your
    training set.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度学习领域，你将处理大量数据集。例如，如果我们有 *m* = 10⁶，我们可以使用98/1/1的分割。记住，10⁶的1%是10⁴，所以仍然是一个很大的数字！记住，开发集/测试集必须足够大，以便对模型的性能有很高的信心，但不是无谓地大。此外，你希望尽可能多地保留观察数据用于训练集。
- en: Tip
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: When deciding on how to split your dataset, if you have a big number of observations
    (such as 10⁶ or even more), you can split your dataset 98/1/1 or 90/5/5\. As soon
    as your dev and test datasets reach a reasonable size (which depends on your problem),
    you can stop. When deciding on how to split your dataset, keep in mind how big
    your dev/test sets must be.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当决定如何分割你的数据集时，如果你有大量的观察数据（例如10⁶或更多），你可以将数据集分割为98/1/1或90/5/5。一旦你的开发集和测试集达到合理的大小（这取决于你的问题），你就可以停止。在决定如何分割数据集时，请记住你的开发集/测试集必须有多大。
- en: Remember that, as you may know, size is not everything. Your dev and test datasets
    should be representative of your training dataset and problem. Let’s look at an
    example. Let’s consider the ImageNet challenge we described earlier. You want
    to classify images in 1,000 different classes. To know how your model is performing
    in your dev and test datasets, you need enough images for each class in each set.
    If you decide to use only 1000 observations for the dev or test datasets, you
    are not going to get a reasonable result, since you will have only one observation
    for each class. You should decide to build your dev and test datasets by choosing
    for example 100 images for each class at least, thus building two datasets (dev
    and test) each containing 10⁵ observations in total (remember we have 1000 classes).
    In this case it would not be sensible to go below this number. This is not only
    relevant in the deep learning context, but in machine learning in general. You
    should always try to build a dev/test dataset so that it reflects the same distribution
    of observations you have in your training set. To better understand this concept,
    take the MNIST dataset for example. Let’s load the dataset with the following
    code (we will see more details about the MNIST data in the following paragraph)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，如您所知，大小并不是一切。您的开发集和测试集应该代表您的训练集和问题。让我们看看一个例子。让我们考虑我们之前描述的ImageNet挑战。您想要对1,000个不同的类别进行图像分类。为了了解您的模型在开发集和测试集中的表现，您需要为每个类别在每个集中有足够的图像。如果您决定只为开发集或测试集选择1,000个观察值，您将无法得到合理的结果，因为每个类别只有一个观察值。您应该决定通过例如为每个类别选择至少100个图像来构建开发集和测试集，从而构建两个数据集（开发集和测试集），每个数据集总共包含10⁵个观察值（记住我们有1,000个类别）。在这种情况下，低于这个数字是不合理的。这不仅与深度学习环境相关，而且在机器学习领域也适用。您应该始终尝试构建一个开发/测试集，使其反映与您的训练集中相同的观察值分布。为了更好地理解这个概念，以MNIST数据集为例。让我们使用以下代码加载数据集（我们将在下一段中看到更多关于MNIST数据的细节）
- en: '[PRE0]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then we can check how often (in percent) each digit appears in the training
    dataset
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以检查每个数字在训练数据集中出现的频率（百分比）
- en: '[PRE1]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This gives us the result
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这给出了以下结果
- en: '[PRE2]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Not every digit appears the same number of times in the training dataset. Whenever
    you build a dev and/or a test dataset, you should check that the data distributions
    are similar. Otherwise, when applying a model to the dev or test dataset, you
    could get a result that does not make much sense, since the model learned from
    a different class distribution. In this case for the sake of clarity we just reasoned
    on labels to see how the algorithm is working. In real life, you would need to
    split the features of course. Since the original distribution is almost uniform,
    you should expect a result that is very similar to the original one. Let’s see
    how often (in percent) each digit appears in the test dataset
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据集中并非每个数字出现的次数都相同。每次构建开发集和/或测试集时，您都应该检查数据分布是否相似。否则，当将模型应用于开发集或测试集时，您可能会得到一个没有太多意义的结论，因为模型是从不同的类别分布中学习的。在这种情况下，为了清晰起见，我们只是基于标签进行推理，以了解算法是如何工作的。在现实生活中，您当然需要分割特征。由于原始分布几乎均匀，您应该期望得到一个与原始分布非常相似的结果。让我们看看每个数字在测试数据集中出现的频率（百分比）
- en: '[PRE3]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This gives us the result
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这给出了以下结果
- en: '[PRE4]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: You can compare these results to the one from the entire dataset. You will notice
    that they are very close—not the same, but close enough. In this case, we can
    proceed without worries. But if this is not the case, be sure you have a similar
    distribution in every dataset you’re going to use.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以将这些结果与整个数据集的结果进行比较。您会注意到它们非常接近——不是完全相同，但足够接近。在这种情况下，我们可以无忧无虑地继续。但如果不是这种情况，请确保您将要使用的每个数据集都具有相似的分布。
- en: If the training, dev, and test datasets don’t have the same distribution, this
    can be quite dangerous when checking how the model is doing. Your model may end
    up learning from a *unbalanced class distribution.*
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 如果训练、开发集和测试集没有相同的分布，在检查模型表现时可能会相当危险。模型最终可能会从*不平衡的类别分布*中学习。
- en: Note
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We typically talk about an unbalanced class distribution in a dataset for a
    classification problem when one or more classes appear a different number of times
    than others. This becomes a problem in the learning process when the difference
    is significant. A few percent of difference is often not an issue.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 当在分类问题中，一个或多个类别的出现次数与其他类别不同时，我们通常会在数据集中讨论不平衡的类别分布。当差异显著时，这会成为学习过程中的一个问题。几个百分点的差异通常不是问题。
- en: If you have a dataset with three classes, for example, where you have 1000 observations
    in each class, then the dataset has a perfectly balanced class distribution, but
    if you have only 100 observations in class 1, 10,000 observations in class 2,
    and 5,000 in class 3, then this is an unbalanced class distribution. This is not
    a rare occurrence. Suppose you need to build a model that recognizes fraudulent
    credit card transactions. It is safe to assume that those transactions are a very
    small percentage of the entire number of transactions that you have at your disposal!
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您有一个包含三个类别的数据集，其中每个类别有 1000 个观测值，那么数据集具有完美的类别分布，但如果类别 1 中只有 100 个观测值，类别
    2 中有 10,000 个观测值，类别 3 中有 5,000 个观测值，那么这是一个不平衡的类别分布。这种情况并不少见。假设您需要构建一个识别欺诈信用卡交易模型的模型。可以安全地假设这些交易占您可用的交易总数的一个非常小的百分比！
- en: Tip
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: When splitting your dataset, you must pay great attention not only to the number
    of observations you have in each dataset, but also to which observations go into
    each dataset. Note that this problem is not specific to deep learning but is important
    generally in machine learning.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在分割数据集时，您必须非常注意每个数据集中观测值的数量，以及哪些观测值进入每个数据集。请注意，这个问题不仅与深度学习相关，而且在机器学习中也普遍重要。
- en: Details on how to deal with unbalanced datasets are beyond the scope of this
    book, but is important to understand what kind of consequences this can have.
    In the next section, you learn what can happen if you feed an unbalanced dataset
    to a neural network. At the end of that section, we give you a few hints on what
    to do in such a case.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 关于如何处理不平衡数据集的详细信息超出了本书的范围，但了解这可能会产生什么样的后果是很重要的。在下一节中，您将了解如果向神经网络馈送不平衡数据集会发生什么。在该节的末尾，我们将为您提供一些在这种情况下可以采取的提示。
- en: 'Unbalanced Class Distribution: What Can Happen'
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不平衡类别分布：可能会发生什么
- en: Since we are talking about how to split our dataset to perform metric analysis
    , it’s important to grasp the concept of unbalanced class distribution and know
    how to deal with it. In deep learning, you will find yourself very often splitting
    datasets and you should be aware of the problems you may encounter if you do it
    the wrong way. Let’s look at a concrete example of how bad things can go if you
    do it wrong.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在讨论如何分割我们的数据集以执行度量分析，因此理解不平衡类别分布的概念并了解如何处理它非常重要。在深度学习中，您会发现您经常需要分割数据集，并且如果您以错误的方式执行此操作，您应该意识到可能会遇到的问题。让我们看看一个具体的例子，说明如果以错误的方式执行，事情可能会变得多么糟糕。
- en: We will use the MNIST dataset [5], and we will do basic logistic regression
    with a single neuron. The MNIST database is a large database of handwritten digits
    that we can use to train our model. The MNIST database contains 70,000 images.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用 MNIST 数据集 [5]，并将使用单个神经元进行基本的逻辑回归。MNIST 数据库是一个包含手写数字的大型数据库，我们可以用它来训练我们的模型。MNIST
    数据库包含 70,000 张图像。
- en: “The original black and white (bilevel) images from MNIST were normalized to
    fit in a 20x20 pixel box while preserving their aspect ratio. The resulting images
    contain gray levels as a result of the anti-aliasing technique used by the normalization
    algorithm. The images were centered in a 28x28 image by computing the center of
    mass of the pixels and translating the image so as to position this point at the
    center of the 28x28 field” [5].
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: “MNIST 的原始黑白（双色调）图像被归一化以适应 20x20 像素框，同时保持其纵横比。由于归一化算法使用的抗锯齿技术，结果图像包含灰度级。” [5]。
- en: Our features will be the gray value for each pixel, so we will have 28x28 =
    784 features whose values go from 0 to 255 (gray values). The dataset contains
    all ten digits, from 0 to 9\. With the following code, you can prepare the data
    to use in the following sections. As usual, let’s first import the necessary library.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的特征将是每个像素的灰度值，因此我们将有 28x28 = 784 个特征，其值从 0 到 255（灰度值）。数据集包含所有十个数字，从 0 到 9。以下代码可以帮助您准备以下部分中使用的数据。像往常一样，我们首先导入必要的库。
- en: '[PRE5]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: First, we load the data
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们加载数据
- en: '[PRE6]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: It is useful to define a function to visualize the digits, to get an idea of
    how they look.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 定义一个函数来可视化数字是有用的，以了解它们的外观。
- en: '[PRE7]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: For example , we can plot one randomly (see Figure [10-7](#Fig7)).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们可以随机绘制一个（见图 [10-7](#Fig7)）。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig7_HTML.jpg)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![图 10-7](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig7_HTML.jpg)'
- en: Figure 10-7
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-7
- en: The 36003rd digit in the dataset. It is easily recognizable as a 7
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集中的第 36003 个数字。它很容易被识别为 7
- en: '[PRE8]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Now that we have inspected the dataset a bit, here comes the important part.
    We create a new label. We assign to all observations for the digit 1 the label
    0, and to all other digits (0, 2, 3, 4, 5, 6, 7, 8, and 9) the label 1 with this
    code
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经检查了数据集，接下来是重要的部分。我们创建一个新的标签。我们用此代码将所有数字 1 的观测值分配标签 0，将所有其他数字（0、2、3、4、5、6、7、8
    和 9）分配标签 1
- en: '[PRE9]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The `y_train_unbalanced` and `y_test_unbalanced` arrays will contain the new
    labels. Note that the dataset is now heavily unbalanced. Label 0 appears roughly
    10% of the time, while label 1 appears 90% of the time.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '`y_train_unbalanced` 和 `y_test_unbalanced` 数组将包含新的标签。请注意，数据集现在严重不平衡。标签 0 大约出现
    10% 的时间，而标签 1 出现 90% 的时间。'
- en: We then reshape (to provide the data in the right dimension required by the
    neural network) and normalize the training and the test data
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将训练数据和测试数据进行重塑（以提供神经网络所需的正确维度）并归一化
- en: '[PRE10]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Then we build our network with a single neuron
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们用单个神经元构建我们的网络
- en: '[PRE11]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: At this point in the book, you should understand this simple model easily, as
    you have seen it several times. Now we define the function to run the model
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的这一部分，你应该能够轻松理解这个简单的模型，因为你已经看到它好几次了。现在我们定义一个运行该模型的函数
- en: '[PRE12]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Let’s run the model with the code
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用代码运行这个模型
- en: '[PRE13]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: And check the accuracy with the code
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 然后用代码检查准确率
- en: '[PRE14]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: You get a very good 88.1% accuracy . Not bad right? But are you sure that the
    result is that good? Now let’s check the confusion matrix^([1](#Fn1)) for our
    labels with the code
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 你得到了一个非常好的 88.1% 的准确率。不错吧？但你确定结果这么好吗？现在让我们用代码检查我们的标签的混淆矩阵^([1](#Fn1))。
- en: '[PRE15]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: When you run the code, you get the following result
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 当你运行代码时，你会得到以下结果
- en: '[PRE16]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Slightly better formatted and with some explanatory information, the matrix
    looks like Table [10-1](#Tab1).
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 稍微格式化得更好，并添加了一些解释信息，矩阵看起来像表 [10-1](#Tab1)。
- en: Table 10-1
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 表 10-1
- en: Confusion Matrix for the Model Described in the Text
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 文本中描述的模型的混淆矩阵
- en: '|   | Predicted Class 0 | Predicated Class 1 |'
  id: totrans-164
  prefs: []
  type: TYPE_TB
  zh: '|   | 预测类别 0 | 预测类别 1 |'
- en: '| --- | --- | --- |'
  id: totrans-165
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| **Real class 0** | 0 | 6742 |'
  id: totrans-166
  prefs: []
  type: TYPE_TB
  zh: '| **真实类别 0** | 0 | 6742 |'
- en: '| **Real class 1** | 0 | 53258 |'
  id: totrans-167
  prefs: []
  type: TYPE_TB
  zh: '| **真实类别 1** | 0 | 53258 |'
- en: How should we read this table? In the “Predicted Class 0” column, you will see
    the number of observations that our model predicts of being of class 0 for each
    real class. 0 is the number of observations our model predicts of being of class
    0 and are really in class 0\. 0 is the number of observations that our model predicts
    in class 0 but are really in class 1.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应该如何阅读这个表格？在“预测类别 0”列中，你会看到我们的模型预测每个真实类别属于类别 0 的观测值的数量。0 是我们的模型预测属于类别 0 且确实属于类别
    0 的观测值的数量。0 是我们的模型预测属于类别 0 但实际上属于类别 1 的观测值的数量。
- en: It should be easy to see that our model effectively predicts all observations
    to be in class 1 (a total of 6742+53258 = 60000). Since we have a total of 60,000
    observations in our training set, we get an accuracy of 53258/60000 = 0.887, as
    our Keras code told us. But not because our model is good, simply because it has
    effectively classified all observations in class 1\. We don’t need a neural network
    in this case to reach this accuracy. What happens is that our model sees observations
    belonging to class 0 so rarely that they almost don’t influence the learning,
    which is dominated by the observations in class 1.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 应该很容易看出我们的模型有效地预测所有观测值都属于类别 1（总共 6742+53258 = 60000）。由于我们的训练集中总共有 60,000 个观测值，我们得到了
    53258/60000 = 0.887 的准确率，正如我们的 Keras 代码所告诉我们的。但这并不是因为我们的模型很好，只是因为它有效地将所有观测值分类为类别
    1。在这种情况下，我们不需要神经网络就能达到这个准确率。发生的情况是，我们的模型看到属于类别 0 的观测值非常少，以至于它们几乎不影响学习，学习过程主要由类别
    1 的观测值主导。
- en: What at the beginning seemed a nice result , turns out is a really bad one.
    This is an example of how badly things can go if you don’t pay attention to the
    distributions of your classes. This of course applies not only when splitting
    your dataset, but in general when you approach a classification problem, regardless
    of the classifier you want to train (it does not apply only to neural networks).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 最初看似不错的结果，实际上却非常糟糕。这是如果你不注意你类别的分布，事情可能会多么糟糕的一个例子。这当然不仅适用于在划分你的数据集时，而且在一般地处理分类问题时都适用，无论你想要训练哪种分类器（这不仅仅适用于神经网络）。
- en: Tip
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: When splitting your dataset into complex problems, you need to pay close attention
    not only to the number of observations you have in your datasets, but also to
    what observations you choose and to the distribution of the classes.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 当将你的数据集分割成复杂问题时，你需要注意的不仅是你在数据集中有多少观测值，还包括你选择的观测值以及类别的分布。
- en: 'To conclude this section, let me give you a few hints about how to deal with
    unbalanced datasets:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 为了总结本节内容，让我给你一些建议，关于如何处理不平衡数据集：
- en: '**Change your metric:** In our example, you may want to use something else
    instead of accuracy, since it can be misleading. You could try using the confusion
    matrix for example, or other metrics like precision, recall, or F1 (review them
    if you don’t know them, as they are very important to know). Another important
    way of checking how your model is doing, and one that I suggest you learn, is
    the ROC Curve, which will help you tremendously.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改变你的度量标准：** 在我们的例子中，你可能想用除了准确率之外的其他指标，因为准确率可能会误导。例如，你可以尝试使用混淆矩阵，或者其他指标如精确度、召回率或F1（如果你不知道它们，请复习它们，因为了解它们非常重要）。检查你的模型表现的一个重要方法，并且我建议你学习的方法，是ROC曲线，它将极大地帮助你。'
- en: '**Work with an undersampled dataset:** If you have for example 1000 observations
    in class 1 and 100 in class 2, you may create a new dataset with 100 random observations
    in class 1 and the 100 you have in class 2\. The problem with this method is that
    you will have a lot less data to feed to your model to train it.'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与欠采样数据集一起工作：** 如果你例如有类别1中的1000个观测值和类别2中的100个观测值，你可以在类别1中创建一个新的数据集，包含100个随机观测值，以及你已有的类别2中的100个观测值。这种方法的问题是你将提供给模型训练的数据量会大大减少。'
- en: '**Work with an oversampled dataset:** You may try to do the opposite. You may
    take the 100 observations in class 2 and replicate them ten times to end up with
    1000 observations in class 2 (sometimes called sampling with replacement).'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与过采样数据集一起工作：** 你可能尝试做相反的事情。你可能将类别2中的100个观测值复制十次，最终在类别2中得到1000个观测值（有时称为替换采样）。'
- en: '**Get more data in the class with less observations:** This is not always possible.
    In the case of fraudulent credit card transactions, you cannot go around and generate
    new data, unless you want to go to jail .'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在观测值较少的类别中获取更多数据：** 这并不总是可能的。在欺诈信用卡交易的情况下，你不能四处生成新数据，除非你愿意去坐牢。'
- en: Datasets with Different Distributions
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**不同分布的数据集**'
- en: 'Now I want to discuss another terminology issue, which will lead us to understanding
    a common problem in the deep learning world. Very often you will hear sentences
    like: “the sets come from different distributions.” This sentence is not always
    easy to understand. Take for example two datasets formed by images taken with
    a professional DSLR, and a second one created by images taken with an old smartphone.
    In the deep learning world, we say that those two sets come from different distributions.
    But what is the meaning of the sentence? The two datasets differ for various reasons:
    resolution of images, blurriness due to different quality of lens, amount of colors,
    how much is in focus, and possibly more. All those differences are what is usually
    meant by different “distributions.”'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我想讨论另一个术语问题，这将引导我们理解深度学习领域的一个常见问题。你经常会听到这样的句子：“这些集合来自不同的分布。”这句话并不总是容易理解。例如，考虑由专业DSLR相机拍摄的照片组成的两个数据集，以及由旧智能手机拍摄的照片组成的第二个数据集。在深度学习领域，我们说这两个集合来自不同的分布。但这句话的含义是什么？这两个数据集因各种原因而不同：图像的分辨率、由于镜头质量不同而导致的模糊度、颜色的数量、焦点集中的程度，以及可能还有更多。所有这些差异通常被理解为不同的“分布”。
- en: 'Let’s look at another example. We could consider two datasets: one made of
    images of white cats and one made of images of black cats. Also, in this case
    we talk about different distributions. This becomes a problem when you train a
    model on one set and want to apply it to the other. For example, if you train
    a model on a set of images of white cats, you probably are not going to do very
    good on the dataset of black cats, since your model has never seen black cats
    during training.'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看另一个例子。我们可以考虑两个数据集：一个是白猫的图像，另一个是黑猫的图像。在这种情况下，我们也谈论不同的分布。当你在一个集合上训练模型并希望将其应用于另一个集合时，这成为一个问题。例如，如果你在一个白猫图像的集合上训练模型，你很可能在黑猫图像的数据集上表现不会很好，因为你的模型在训练过程中从未见过黑猫。
- en: Note
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: 'When talking about datasets coming from different distributions, it is usually
    meant that the observations have different characteristics in the two datasets:
    black and white cats, high- and low-resolution images, speech recording in Italian
    and in German, and so on.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到来自不同分布的数据集时，通常意味着两个数据集中的观测值具有不同的特征：黑白猫，高分辨率和低分辨率图像，意大利语和德语的语音记录，等等。
- en: Since data is precious, people often try to create the different datasets (train,
    dev, etc.) from different sources. For example, you may decide to train your model
    on a set made of images taken from the web and see how good it is on a set made
    of images you took with your smartphone. This may seem a nice idea to be able
    to use as much data as possible, but it may give you many headaches. Let’s see
    what happens in a real case so that you see the consequences of doing something
    like this.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据非常宝贵，人们通常会尝试从不同的来源创建不同的数据集（train，dev等）。例如，你可能会决定在一个由网络上的图像组成的集合上训练你的模型，并看看它在由你用智能手机拍摄的图像组成的集合上的表现如何。这可能看起来是一个很好的想法，能够尽可能多地使用数据，但它可能会给你带来很多麻烦。让我们看看在真实案例中会发生什么，以便你看到这样做带来的后果。
- en: 'Let’s consider the subset of the MNIST dataset made of the two digits: 1 and
    2\. We will build a dev dataset coming from a different distribution, shifting
    a subset of the images ten pixels to the right. We will train our model on the
    images as they are in the original dataset and apply the model to images shifted
    ten pixels to the right. Let’s first load the data'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑MNIST数据集的子集，它由两个数字：1和2组成。我们将构建一个来自不同分布的dev数据集，将图像的子集向右移动十像素。我们将以原始数据集中的图像形式训练我们的模型，并将模型应用于向右移动十像素的图像。让我们首先加载数据
- en: '[PRE17]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: First select only digits 1 and 2
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 首先只选择数字1和2
- en: '[PRE18]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: We have 12,700 observations in the training dataset and 2167 in the test dataset
    (we will call it dev dataset from now on in this chapter).
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据集中有12,700个观测值，测试数据集中有2,167个（从现在起在本章中我们将称之为dev数据集）。
- en: Then we normalize the features
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们归一化特征
- en: '[PRE19]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: And then we transform the matrixes to give them the right dimensions
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将矩阵转换为正确的维度
- en: '[PRE20]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: And finally, we shift the labels to have 0 and 1
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将标签移动到0和1
- en: '[PRE21]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: We can check the sizes of the arrays with this code
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用以下代码检查数组的尺寸
- en: '[PRE22]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: That gives us
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 这给我们带来了
- en: '[PRE23]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: We have 12,700 observations in our training set and 2167 in the dev set. Now
    let’s duplicate the dev dataset and shift each image to the right ten pixels.
    We can do this quickly with this code
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的训练集中有12,700个观测值，在dev集中有2,167个。现在让我们复制dev数据集，并将每个图像向右移动十像素。我们可以用以下代码快速完成这个操作
- en: '[PRE24]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: To make the shift easy, we first reshaped the images in a 28x28 matrix, then
    simply shifted the columns with `tmp_shifted[:,10:28] = tmp[:,0:18]`. Then we
    simply reshape the images in a one-dimensional array of 784 elements. The labels
    remain the same. Figure [10-8](#Fig8) shows a random image from the dev dataset
    on the left and its shifted version on the right.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使偏移更容易，我们首先将图像重塑为28x28的矩阵，然后简单地使用`tmp_shifted[:,10:28] = tmp[:,0:18]`移动列。然后我们简单地将图像重塑为一维数组，包含784个元素。标签保持不变。图[10-8](#Fig8)显示了dev数据集中的一个随机图像及其向右移动的版本。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig8_HTML.png)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
  zh: '![图10-8](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig8_HTML.png)'
- en: Figure 10-8
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-8
- en: One random image from the dataset (on the left) and its shifted version (on
    the right)
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集中的一个随机图像（在左侧）及其移动版本（在右侧）
- en: Now let’s build a network with a single neuron and See what happens.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们构建一个只有一个神经元的网络，看看会发生什么。
- en: '[PRE25]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: This gives us the output
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这给我们带来了以下输出
- en: '[PRE26]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Let’s calculate the accuracy for the three datasets: `x_train_normalised`,
    `x_test_normalised`, and `x_test_shifted` with the code'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用以下代码计算三个数据集的准确率：`x_train_normalised`，`x_test_normalised`和`x_test_shifted`
- en: '[PRE27]'
  id: totrans-210
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: We get the following results after 100 epochs
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 在100个epoch之后，我们得到了以下结果
- en: For the training dataset, we get 97%.
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于训练数据集，我们得到了97%。
- en: For the dev dataset, we get 98%.
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于dev数据集，我们得到了98%。
- en: For the train-dev (you will see later why it’s called this), the one with the
    shifted images, we get 54%. A very bad result.
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于train-dev（你稍后会看到为什么叫这个名字），即带有偏移图像的那个，我们得到了54%。一个非常糟糕的结果。
- en: What has happened is that the model has learned from a dataset where all the
    images are centered in the box and therefore could not generalize images shifted
    and not centered.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 发生的事情是，模型从所有图像都居中的数据集中学习，因此无法泛化偏移且未居中的图像。
- en: When training a model on a dataset, you will get good results usually on observations
    that are like the ones in the training set. But how can you find out if you have
    such a problem? There is a relatively easy way of doing that, by expanding the
    MAD diagram. Let’s see how to do it.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在数据集上训练模型时，你通常会在与训练集相似的观察结果上获得良好的结果。但你怎么能找出你是否存在这样的问题呢？有一种相对简单的方法来做这件事，就是扩展
    MAD 图。让我们看看如何做。
- en: 'Suppose you have a training dataset and a dev dataset where the observations
    have different characteristics (they are coming from different distributions).
    You create a small subset from the training set, called the train-dev dataset,
    and end up with three datasets—a training and a train-dev coming from the same
    distribution (the observations have the same characteristics) and a dev set, where
    the observations are somehow different, as we discussed previously. Then you train
    your model on your training set, and evaluate your error *ϵ* on the three datasets:
    *ϵ*[*train*], *ϵ*[*dev*] and *ϵ*[*train* − *dev*]. If your train and dev sets
    are coming from the same distributions, so is the train-dev set. In this case
    you should expect *ϵ*[*dev*] ≈ *ϵ*[*train* − *dev*]. If we define'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你有一个训练数据集和一个开发数据集，其中观察结果具有不同的特征（它们来自不同的分布）。你从训练集中创建一个小子集，称为 train-dev 数据集，最终得到三个数据集——一个来自相同分布（观察结果具有相同特征）的训练集和一个
    train-dev，以及一个开发集，其中观察结果在某种程度上不同，正如我们之前讨论的那样。然后你在训练集上训练你的模型，并在三个数据集上评估你的误差 *ϵ*：*ϵ*[*train*]，*ϵ*[*dev*]
    和 *ϵ*[*train* − *dev*]。如果你的训练集和开发集来自相同的分布，那么 train-dev 集也是。在这种情况下，你应该期望 *ϵ*[*dev*] ≈ *ϵ*[*train* − *dev*]。如果我们定义
- en: '![$$ \Delta {\epsilon}_{train- dev}=\mid {\epsilon}_{dev}-{\epsilon}_{train-
    dev}\mid $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Eque.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Delta {\epsilon}_{train- dev}=\mid {\epsilon}_{dev}-{\epsilon}_{train-
    dev}\mid $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Eque.png)'
- en: we should expect *Δϵ*[*train* − *dev*] ≈ 0\. If the train (and train-dev) and
    the dev set are coming from different distributions (the observations have different
    characteristics), we should expect Δ*ϵ*[*train* − *dev*] to be big. If we consider
    the MNIST example, we have in fact Δ*ϵ*[*train* − *dev*] = 0.46 or 46%, which
    is a huge difference.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应该期望 *Δϵ*[*train* − *dev*] ≈ 0。如果训练集（和 train-dev）以及开发集来自不同的分布（观察结果具有不同的特征），我们应该期望
    Δ*ϵ*[*train* − *dev*] 很大。如果我们考虑 MNIST 示例，我们实际上有 Δ*ϵ*[*train* − *dev*] = 0.46 或
    46%，这是一个巨大的差异。
- en: 'Let’s recap what you should do to find out if your training and your dev (or
    test) dataset have observations with different characteristics (they are coming
    from different observations):'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下你应该做什么来找出你的训练集和你的开发集（或测试集）是否有具有不同特征的观察结果（它们来自不同的观察结果）：
- en: 'Split your training set in two: one that you will use for training, and that
    you will call the train set, and a smaller one that you will call “train-dev”
    set.'
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的训练集分成两部分：一部分你将用于训练，称为训练集，另一部分较小，称为“train-dev”集。
- en: Train your model on the train set.
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练集上训练你的模型。
- en: 'Evaluate your error *ϵ* on the three sets: train, dev, and train-dev.'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在三个集合上评估你的误差 *ϵ*：训练集、开发集和 train-dev。
- en: Calculate the quantity Δ*ϵ*[*train* − *dev*]. If it’s big this will give strong
    evidence that the original training and dev sets are coming from different distributions.
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算量 Δ*ϵ*[*train* − *dev*]。如果它很大，这将提供强有力的证据表明原始的训练集和开发集来自不同的分布。
- en: 'Figure [10-9](#Fig9) is an example of the MAD diagram with the problem we just
    discussed. Don’t look at the numbers; they are just for illustrative purposes
    (read: I just put them there).'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-9](#Fig9) 是我们刚才讨论的问题的 MAD 图示例。不要看数字；它们只是为了说明目的（读：我只是把它们放那里）。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig9_HTML.jpg)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![MAD 图示例](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig9_HTML.jpg)'
- en: Figure 10-9
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-9
- en: An example of the MAD diagram with the data mismatch problem added
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 添加数据不匹配问题的 MAD 图示例
- en: 'The MAD diagram in Figure [10-9](#Fig9) can tell us the following things (I
    highlight only a few ideas; for a more complete list of things you can reread
    the previous sections):'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-9](#Fig9) 中的 MAD 图可以告诉我们以下信息（我只突出了一些想法；对于更完整的信息，你可以重新阅读前面的章节）：
- en: The bias (between training and human-level performance) is quite small, so we
    are not that far from the best we can achieve (let’s assume that human-level performance
    is a proxy for the Bayes error). You could try bigger networks, better optimizers,
    and so on.
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏差（训练和人类水平性能之间的差异）相当小，所以我们离我们能达到的最佳水平并不远（让我们假设人类水平性能是贝叶斯错误的代理）。你可以尝试更大的网络、更好的优化器等等。
- en: We are overfitting the datasets, so we could try regularization or get more
    data.
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们对数据集进行了过拟合，因此我们可以尝试正则化或获取更多数据。
- en: We have a strong problem with data mismatch (sets coming from different distributions)
    between train and dev. You will see what you could do to solve this problem later
    in the chapter.
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在训练集和开发集之间存在着严重的数据不匹配问题（来自不同分布的集合）。你将在本章后面看到你可以如何解决这个问题。
- en: We are also slightly overfitting the dev dataset during our hyper-parameter
    search.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我们的超参数搜索过程中，我们对开发集也进行了一点点过拟合。
- en: Note that you don’t need to create the bar plot as we have done here. Technically,
    you just need the four numbers to draw the same conclusions.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，你不需要创建我们在这里所做的条形图。技术上，你只需要四个数字来得出相同的结论。
- en: Tip
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Once you have your MAD diagram (or simply the numbers), interpreting it will
    give you hints about what you should try to get better results, for example a
    better accuracy.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了你的MAD图（或简单地数字），解释它将给你提供关于你应该尝试什么以获得更好结果的提示，例如更高的准确率。
- en: 'You can try the following techniques to address data mismatch between sets:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以尝试以下技术来解决集合之间的数据不匹配问题：
- en: You can carry manual error analysis to understand the difference between the
    sets, and then decide what to do (you see an example in the last section of this
    chapter). This is time consuming and usually quite difficult, because once you
    know what the difference is, it may be very difficult to find a solution.
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以进行手动错误分析来理解集合之间的差异，然后决定要做什么（你可以在本章的最后部分看到一个例子）。这很耗时，通常相当困难，因为一旦你知道差异是什么，可能很难找到解决方案。
- en: You could try to make the training set more similar to your dev/test sets; for
    example, if you are working with images and the test/dev sets have a lower resolution
    you may decide to lower the resolution of the images in the training set.
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以尝试使训练集与你的开发/测试集更相似；例如，如果你正在处理图像，并且测试/开发集具有较低的分辨率，你可能会决定降低训练集中图像的分辨率。
- en: 'As usual, there are no fixed rules. Just be aware of the problem and think
    about the following: your model will learn the characteristics from your training
    data, so when it’s applied to completely different data, it won’t usually do well.
    Always get training data that reflects the data you want your model to work on,
    not vice versa.'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常一样，没有固定的规则。只需注意这个问题，并考虑以下内容：你的模型将从你的训练数据中学习特征，因此当它应用于完全不同的数据时，通常表现不佳。始终获取反映你希望模型工作的数据集的训练数据，而不是相反。
- en: k-fold Cross Validation
  id: totrans-241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: k折交叉验证
- en: 'This technique is very powerful and should be known by any machine learning
    practitioner (not only in the deep learning world): k-fold cross validation. The
    technique is a way of finding a solution to the following two problems :'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术非常强大，任何机器学习从业者都应该知道（不仅限于深度学习领域）：k折交叉验证。这种技术是解决以下两个问题的方法：
- en: What do you do when your dataset is too small to split into a train and dev/test
    set?
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你的数据集太小，无法划分为训练集和开发/测试集时，你会怎么做？
- en: How do you get information on the variance of your metric?
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何获取指标方差的有关信息？
- en: Let’s describe the idea with pseudo-code.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用伪代码来描述这个想法。
- en: 'Partition your complete dataset in k equally big subsets: *f*[1], *f*[2], …,
    *f*[*k*]. The subsets are also called folds. Normally the subsets are not overlapping,
    which means that each observation appears in one and only one fold.'
  id: totrans-246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将你的完整数据集划分为k个大小相等的子集：*f*[1]，*f*[2]，…，*f*[*k*]。这些子集也被称为折。通常这些子集是不重叠的，这意味着每个观测值只出现在一个折中。
- en: 'For i going from 1 to *k*:'
  id: totrans-247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于i从1到*k*：
- en: Train your model on all the folds except *f*[*i*].
  id: totrans-248
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在除了*f*[*i*]之外的所有折上训练你的模型。
- en: Evaluate your metric on the fold *f*[*i*]. The fold *f*[*i*] will be the dev
    set in iteration *i*.
  id: totrans-249
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在折*f*[*i*]上评估你的指标。在迭代*i*中，折*f*[*i*]将是开发集。
- en: Evaluate the average and variance of your metric on the *k* results.
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估你的指标在*k*个结果上的平均值和方差。
- en: A typical value for *k* is 10, but that depends on the size of your dataset
    and on the characteristic of your problem.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '*k*的典型值是10，但这取决于你的数据集的大小和问题的特征。'
- en: Remember that the discussion about how to split a dataset also applies here.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，关于如何划分数据集的讨论也适用于这里。
- en: Note
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: When you are creating your folds, you must take care that your folds reflect
    the structure of your original dataset. If your original dataset has ten classes
    for example, you must make sure that each of your folds have all the ten classes
    with the same proportions.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 当你创建你的折时，你必须注意你的折反映了你原始数据集的结构。如果你的原始数据集有十个类别，例如，你必须确保你的每个折都有十个类别，并且比例相同。
- en: Although this may seem a very attractive technique to deal generally with datasets
    with less than optimal size, it may be quite complex to implement. But, as you
    will see shortly, checking your metric on the different folds will give you important
    information on a possible overfitting of your training dataset.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这可能看起来是一种处理小于最佳规模的数据集的非常有吸引力的技术，但实现起来可能相当复杂。但是，正如你很快就会看到的，检查你的指标在不同折上的表现将给你关于训练数据集可能过度拟合的重要信息。
- en: Let’s try this on a real dataset and see how to implement it. Note that you
    can implement k-fold cross validation easily in `sklearn`, but I will develop
    it from scratch, to show you what is happening in the background. Everyone (well,
    almost) can copy code from the web to implement k-fold cross validation in `sklearn`,
    but not many can explain how it works and understand it, and therefore be able
    to choose the right `sklearn` method or parameters.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在一个真实的数据集上尝试这个方法，看看如何实现它。请注意，你可以在 `sklearn` 中轻松实现k折交叉验证，但我会从头开始开发，以便向你展示后台发生的事情。每个人（好吧，几乎所有人）都可以从网上复制代码来实现
    `sklearn` 中的k折交叉验证，但不是很多人能解释它是如何工作的，并理解它，因此能够选择正确的 `sklearn` 方法或参数。
- en: As a dataset we will use the reduced MNIST dataset containing only digits 1
    and 2\. We will do a simple logistic regression with one neuron to make the code
    easy to understand and to let you concentrate on the cross-validation part and
    not on other implementation details that are not relevant here. The goal of this
    section is to show you how k-fold cross validation works and why it’s useful,
    not to implement it with the smallest amount of code possible.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据集，我们将使用只包含数字1和2的简化MNIST数据集。我们将使用一个神经元进行简单的逻辑回归，以便使代码易于理解，并让你专注于交叉验证部分，而不是其他与此无关的实现细节。本节的目标是向你展示k折交叉验证是如何工作的以及为什么它是有用的，而不是用尽可能少的代码来实现它。
- en: As before, import the MNIST dataset. Remember that the dataset has 70,000 observations
    and is made of grayscale images, each 28x28 pixel in size. Then select only digit
    1 and 2 and rescale the labels to make sure that digit 1 has label 0 and digit
    2 has label 1.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，导入MNIST数据集。请记住，该数据集有70,000个观察值，由28x28像素大小的灰度图像组成。然后只选择数字1和2，并重新缩放标签，以确保数字1的标签为0，数字2的标签为1。
- en: Now we need a small trick. To keep the code simple, we will consider only the
    training dataset and we will create folds starting from it.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要一个小技巧。为了使代码简单，我们只考虑训练数据集，并从它创建折。
- en: Now let’s create ten arrays, each containing a list of indexes that we will
    use to select images
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将创建十个数组，每个数组都包含一个索引列表，我们将使用它来选择图像。
- en: '[PRE28]'
  id: totrans-261
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: In each fold, we will have 1270 images (12700/10, 12700 is the total number
    of observations in the training dataset that have label 1 or 2). Now let’s create
    the arrays containing the images
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个折中，我们将有1270张图像（12700/10，12700是训练数据集中标签为1或2的观察总数）。现在让我们创建包含图像的数组。
- en: '[PRE29]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'If you think this code is convoluted, you are right. There are faster ways
    of doing it with `sklearn`, but it’s very instructive to see how to do it manually
    step by step. We first create empty lists: `x_train_inputfold` and `y_train_inputfold`.
    Each element of the list will be a fold, so an array of images or of labels. So,
    if we want to get all images in fold 2, we simply use `inputfold x_train_inputfold[1]`
    (remember in Python, indexes start from 0). Those list, converted to the last
    two lines in NumPy arrays, will have three dimensions, as you can easily see with
    these statements'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为这段代码很复杂，你是对的。使用 `sklearn` 有更快的方法来做这件事，但看到它是如何一步一步手动完成的非常有教育意义。我们首先创建空列表：`x_train_inputfold`
    和 `y_train_inputfold`。列表中的每个元素都将是一个折，即图像或标签的数组。所以，如果我们想获取第2折中的所有图像，我们只需使用 `inputfold
    x_train_inputfold[1]`（记住在Python中，索引从0开始）。这些列表转换为NumPy数组的最后两行，将具有三个维度，正如你通过这些语句可以轻松看到的那样。
- en: '[PRE30]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: That gives us
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 这给我们
- en: '[PRE31]'
  id: totrans-267
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: In `x_train_inputfold` the first dimension indicates the fold number, the second
    the observation, and the third the gray values of the pixels. In `y_train_inputfold`
    the first dimension indicates the fold number and the second the label. For example,
    to get image with index 1234 from fold 0, you would need to use the code
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `x_train_inputfold` 中，第一个维度表示折叠编号，第二个维度表示观测值，第三个维度表示像素的灰度值。在 `y_train_inputfold`
    中，第一个维度表示折叠编号，第二个维度表示标签。例如，要从折叠 0 获取索引为 1234 的图像，你需要使用以下代码
- en: '[PRE32]'
  id: totrans-269
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Remember you should check that you still have a balanced dataset in each fold,
    or in other words that you have as many 1s as 2s. Let’s check for fold 0 (you
    can do the same check for the others):'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，你应该检查每个折叠中你仍然有一个平衡的数据集，换句话说，你应该有与 2s 相同数量的 1s。让我们检查折叠 0（你也可以对其他折叠进行相同的检查）：
- en: '[PRE33]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: That gives us
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 这给我们
- en: '[PRE34]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: For our purposes, this is balanced enough. Now we need to normalize the features
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的目的，这已经足够平衡了。现在我们需要归一化特征。
- en: '[PRE35]'
  id: totrans-275
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: You could normalize the data in one shot, but we like to make it evident that
    we are dealing with folds to make it clear for the reader.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '你可以一次性归一化数据，但我们喜欢让读者清楚我们正在处理折叠。 '
- en: Now we are ready to build our network. We will use a one-neuron network for
    logistic regression, with the sigmoid activation function. At this point we will
    need to iterate through the folds. Remember our pseudo-code at the beginning?
    Select one fold as the dev set and train the model on all other folds concatenated.
    Proceed in this way for all the folds. The code could look like this (it’s a bit
    long, so take a few minutes to understand it). The code includes comments indicating
    which step we are talking about, since you will find a numbered list of the steps
    for explanation next.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们准备构建我们的网络。我们将使用一个神经元网络进行逻辑回归，并使用 sigmoid 激活函数。此时，我们需要遍历所有折叠。记得我们开始时的伪代码吗？选择一个折叠作为开发集，并在所有其他连接的折叠上训练模型。对所有折叠都按这种方式进行。代码可能看起来像这样（它有点长，所以请花几分钟时间理解它）。代码中包含注释，指示我们正在讨论的步骤，因为接下来你会找到一个编号的步骤列表进行解释。
- en: '[PRE36]'
  id: totrans-278
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'The code follows these steps:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 代码遵循以下步骤：
- en: Do a loop over all the folds (in this case from 1 to 10) iterating with the
    variable `i` from 0 to 9.
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对所有折叠（在这种情况下从 1 到 10）进行循环，使用变量 `i` 从 0 到 9 迭代。
- en: For each `i`, use the fold `i` as the dev set and concatenate all the other
    folds and use the result as the train set.
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每个 `i`，使用折叠 `i` 作为开发集，并将所有其他折叠连接起来作为训练集。
- en: For each `i`, train the model.
  id: totrans-282
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每个 `i`，训练模型。
- en: 'For each `i`, evaluate the accuracy on the two datasets (train and dev) and
    save the values in the two lists: `train_acc` and `dev_acc`.'
  id: totrans-283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每个 `i`，评估两个数据集（训练和开发）的准确度，并将值保存到两个列表中：`train_acc` 和 `dev_acc`。
- en: 'If you run this code, you will get output that looks like this for each fold
    (you will get ten times the following output, once for each fold):'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你运行此代码，你将为每个折叠得到类似这样的输出（你会得到十次以下输出，每次为一个折叠）：
- en: '[PRE37]'
  id: totrans-285
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Notice that you will get slightly different accuracy values for each fold. It
    is very instructive to study how the accuracy values are distributed. Since we
    have ten folds, we have ten values to study. In Figure [10-10](#Fig10), you can
    see the distribution of the values for the train set (left plot) and for the dev
    set (right plot).
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，对于每个折叠，你将得到略微不同的准确度值。研究这些准确度值的分布是非常有教育意义的。由于我们有十个折叠，因此我们有十个值需要研究。在图 [10-10](#Fig10)
    中，你可以看到训练集（左图）和开发集（右图）的值分布。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig10_HTML.jpg)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig10_HTML.jpg)'
- en: Figure 10-10
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-10
- en: Distribution of the accuracy values for the train set (left plot) and for the
    dev set (right plot). Note that the two plots use the same scale on both axes
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 训练集（左图）和开发集（右图）的准确度值分布。注意，两个图表在两个轴上使用相同的刻度
- en: The image is quite instructive. You can see that the accuracy values for the
    training set are concentrated around the average, while the ones evaluated on
    the dev set are much more spread out! This shows how the model on new data behaves
    less well than on the data it has trained on. The standard deviation for the training
    data is 3.5 · 10^(−4) and for the dev set it’s 3.5 · 10^(−3), ten times bigger
    than the value on the train set. In this way you also get an estimate of the variance
    of your metric when applied to new data, and to how it generalizes.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图片非常有指导意义。你可以看到训练集的准确值集中在平均值附近，而评估在开发集上的准确值则分布得更加广泛！这表明模型在新数据上的表现不如在训练数据上。训练数据的标准差为3.5·10^(-4)，而开发集的标准差为3.5·10^(-3)，是训练集的十倍。这样你也可以估计出你的指标在应用于新数据时的方差以及其泛化程度。
- en: 'If you are interested in learning how to do this quickly with `sklearn`, check
    out the official documentation for the `KFold` method [6]. When you are dealing
    with datasets with many classes (remember our discussion about how to split your
    sets?), you must pay attention and do what is called *stratified sampling*. `Sklearn`
    provides a method to do that too: `stratifiedKFold` [7].'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感兴趣，想快速学习如何使用`sklearn`做这件事，请查看`KFold`方法的官方文档[6]。当你处理具有许多类别的数据集时（记住我们关于如何划分你的集的讨论？），你必须注意并执行所谓的*分层抽样*。`Sklearn`也提供了一个方法来做这件事：`stratifiedKFold`
    [7]。
- en: You can now easily find averages and standard deviations. For the training set,
    we have an average accuracy of 98.5% and a standard deviation of 0.035%, while
    for the dev set we have an average accuracy of 98.4% with a standard deviation
    of 0.35%. Now you can even provide an estimate of the variance of your metric.
    Pretty cool!
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以轻松地找到平均值和标准差。对于训练集，我们有98.5%的平均准确率和0.035%的标准差，而对于开发集，我们有98.4%的平均准确率和0.35%的标准差。现在你甚至可以提供一个关于你的指标方差的估计。非常酷！
- en: 'Manual Metric Analysis: An Example'
  id: totrans-293
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 手动指标分析：一个示例
- en: 'We mentioned earlier that sometimes it’s useful to do a manual analysis of
    your data, to check if the results (or the errors) you are getting are plausible.
    This section has a basic example to shows you a concrete idea of what is meant
    by this and how complicated it can be. Let’s consider the following question:
    our very simple model (remember we are using only one neuron) can get 98% of accuracy!
    Is the problem of recognizing digits that easy? Let’s try to see if that is the
    case. First of all, note that our training set does not even have the two-dimensional
    information about the images. If you remember, each image is converted into a
    one-dimensional array of values: the gray values of each pixel, starting on the
    top-left and going row by row from top to bottom. Are the 1s and the 2s easy to
    recognize? Let’s see how the real input for our model looks and start analyzing
    the digit 1\. Let’s take an example from fold 0\. In Figure [10-11](#Fig11), you
    can see the image on the left and a bar plot of the gray values of the 784 pixels
    as they are seen from our model. Remember that as observations, we have a one-dimensional
    array of the 784 gray values of the pixels in the image.'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前提到，有时手动分析你的数据是有用的，以检查你得到的结果（或错误）是否合理。本节提供了一个基本示例，以具体说明这意味着什么以及它可能有多复杂。让我们考虑以下问题：我们非常简单的模型（记住我们只使用一个神经元）可以达到98%的准确率！识别数字的问题真的那么简单吗？让我们看看这是否如此。首先，请注意，我们的训练集甚至没有图像的二维信息。如果你还记得，每个图像都被转换成一个一维的值数组：每个像素的灰度值，从左上角开始，逐行从上到下。1和2容易识别吗？让我们看看我们模型的实际输入，并开始分析数字1。让我们以第0折为例。在图[10-11](#Fig11)中，你可以看到左边的图像和从我们的模型看到的784个像素灰度值的条形图。记住，作为观察值，我们有一个包含图像中784个像素灰度值的一维数组。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig11_HTML.jpg)'
  id: totrans-295
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig11_HTML.jpg)'
- en: Figure 10-11
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-11
- en: An example from fold 0 for the digit 1\. The image on the left and a bar plot
    of the gray values of the 784 pixels as they are seen from our model on the right.
    Remember that as inputs we have a one-dimensional array of the 784 gray values
    of the pixels
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 第0折的数字1的示例。左边的图像和从我们的模型看到的784个像素灰度值的条形图。记住，作为输入，我们有一个包含784个像素灰度值的一维数组。
- en: 'Remember that we reshape our 28x28 image into a one-dimensional array, so when
    reshaping the digit 1 in Figure [10-11](#Fig11), we find black points roughly
    each 28 pixels, since the 1 is almost a vertical column of black points. In Figure
    [10-12](#Fig12), you can see other 1s, and you will notice how, when reshaped
    as one dimensional, they look all the same: several bars roughly equally spaced.
    Now that you know what to look for, we can easily say that all the images in Figure
    [10-12](#Fig12) are of the digit 1.'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，我们将28x28的图像重塑为一维数组，因此当我们将图[10-11](#Fig11)中的数字1重塑时，我们发现大约每28个像素有一个黑色点，因为1几乎是一个垂直的黑色点列。在图[10-12](#Fig12)中，你可以看到其他的1，你会注意到当它们被重塑为一维时，它们看起来都是一样的：几个条形大致等间距。现在你知道要找什么了，我们就可以轻松地说，图[10-12](#Fig12)中的所有图像都是数字1。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig12_HTML.png)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig12_HTML.png)'
- en: Figure 10-12
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-12
- en: 'Four examples of the digit 1, reshaped as one-dimensional arrays. They all
    look the same: a number of bars roughly equally spaced'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 数字1的四个例子，重塑为单维数组。它们看起来都一样：几个条形大致等间距
- en: Now let’s look at the digit 2\. In Figure [10-13](#Fig13), you can see an example,
    similar to what we had in Figure [10-11](#Fig11).
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看数字2。在图[10-13](#Fig13)中，你可以看到一个例子，与我们之前在图[10-11](#Fig11)中看到的是相似的。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig13_HTML.jpg)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig13_HTML.jpg)'
- en: Figure 10-13
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-13
- en: An example from fold 0 for the digit 2\. The image on the left and a bar plot
    of the gray values of the 784 pixels as they are seen from our model. Remember
    that as observations we have a one-dimensional array of the 784 gray values of
    the pixels of the image
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 数字2的0折叠的一个例子。左边的图像以及从我们的模型中看到的784个像素的灰度值的条形图。记住，作为观察，我们有一个包含图像像素784个灰度值的一维数组
- en: Now things look different. We have two regions where the bars are much more
    dense in the plot on the right in Figure [10-13](#Fig13). This is between pixels
    100 and 200 and especially after pixel 500\. Why? Well, the two areas correspond
    to the two horizontal parts of the image. Figure [10-14](#Fig14) highlights how
    different parts look when they’re reshaped as a one-dimensional array.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 现在看起来不同了。在图[10-13](#Fig13)的右边的图表中，有两个区域条形比其他地方更密集。这发生在像素100到200之间，尤其是在像素500之后。为什么？好吧，这两个区域对应于图像的两个水平部分。图[10-14](#Fig14)突出了当它们被重塑为单维数组时，不同部分看起来是怎样的。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig14_HTML.jpg)'
  id: totrans-307
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig14_HTML.jpg)'
- en: Figure 10-14
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-14
- en: How different parts of the images look when they're reshaped as a one-dimensional
    array. Horizontal parts are labelled as (A) and (B), while the more vertical part
    is labelled as (C)
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 当图像的不同部分被重塑为单维数组时，它们看起来是怎样的。水平部分标记为（A）和（B），而更垂直的部分标记为（C）
- en: Horizontal parts (A) and (B) are clearly different than part (C) when reshaped
    as a one-dimensional array. The vertical part (C) looks like the digit 1, with
    many equally spaced bars, as you can check in the lower-right bar plot labelled
    (C). While the more horizontal parts appear as many bars clustered together in
    groups, as can be seen in the upper-right and lower-left bar plots labelled (A)
    and (B). So, when reshaped, if you find those cluster of bars, that means you
    are looking at a 2\. If you see only equally spaced small groups of bars, as in
    the plot (C) in Figure [10-14](#Fig14), you are looking at a 1\. You don’t even
    need to see the two-dimensional image if you know what to look for. Note that
    this pattern is constant. Figure [10-15](#Fig15) shows four examples of the digit
    2, and you can clearly see the wider clusters of bars.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 当重塑为单维数组时，水平部分（A）和（B）与部分（C）明显不同。垂直部分（C）看起来像数字1，有许多等间距的条形，正如你在标记为（C）的右下角条形图中可以检查的那样。而更水平的部分则看起来像许多条形聚集在一起成组，如右上角和左下角的条形图标记为（A）和（B）所示。因此，当重塑时，如果你发现那些条形聚集，那么这意味着你正在看一个2。如果你只看到等间距的小组条形，就像图[10-14](#Fig14)中的（C）图所示，那么你正在看一个1。如果你知道要找什么，甚至不需要看到二维图像。注意，这种模式是恒定的。图[10-15](#Fig15)显示了数字2的四个例子，你可以清楚地看到更宽的条形聚集。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig15_HTML.png)'
  id: totrans-311
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig15_HTML.png)'
- en: Figure 10-15
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-15
- en: Four examples of the digit 2 reshaped as one-dimensional arrays. The wider clusters
    of bars can clearly be seen
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 数字2的四个例子，重塑为单维数组。更宽的条形聚集可以清楚地看到
- en: As you can imagine, this is an easy pattern to spot for an algorithm, and so
    it’s to be expected that this model works so good. Even a human can spot the images,
    even when reshaped, without any effort. Such a detailed analysis would not be
    necessary in a real-life project, but it’s really instructive to see what you
    can learn from your data. Understanding the characteristics of your data may help
    you design your model or understand why is not working. Advanced architectures,
    like convolutional networks, will be able to learn exactly those two-dimensional
    features in a very efficient way.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所想，对于算法来说，这是一个很容易发现的模式，因此可以预期这个模型会工作得很好。即使是人类，在没有任何努力的情况下，也可以识别出图像，即使它们被重新塑形。这样的详细分析在现实生活中的项目中可能并不必要，但看到你能从数据中学到什么是非常有教育意义的。理解你数据的特征可能有助于你设计模型或理解为什么它不起作用。高级架构，如卷积网络，将能够以非常有效的方式学习这两个二维特征。
- en: Let’s also check how the network learned to recognize digits. You will remember
    that the output of our neuron is
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们也检查一下网络是如何学习识别数字的。你会记得我们神经元的输出是
- en: '![$$ \hat{y}=\sigma (z)=\sigma \left({w}_1{x}_1+{w}_2{x}_2+\dots +{w}_{n_x}{x}_{n_x}+b\right)
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equf.png)'
  id: totrans-316
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{y}=\sigma (z)=\sigma \left({w}_1{x}_1+{w}_2{x}_2+\dots +{w}_{n_x}{x}_{n_x}+b\right)
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_Equf.png)'
- en: Where *σ* is the sigmoid function, *x*[*i*] for *i* = 1, …, 784 are the gray
    values of the pixel of the image, *w*[*i*] for *i* = 1, …, 784 are the weights
    and *b* is the bias. Remember that when ![$$ \hat{y}&gt;0.5 $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_IEq1.png)
    we classify the image in class 1 (so digit 2), and if ![$$ \hat{y}&lt;0.5 $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_IEq2.png)
    we classify the image in class 0 (so digit 1). Now if you remember our discussion
    in Chapter [2](463356_2_En_2_Chapter.xhtml) of the sigmoid function you will remember
    that *σ*(*z*) ≥ 0.5 when *z* ≥ 0 and *σ*(*z*) < 0.5 for *z* < 0\. That means that
    our network should learn the weights in such a way that for all the 1s, we have
    *z* < 0 and for all the 2s, *z* ≥ 0\. Let’s see if that is really the case.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *σ* 是 Sigmoid 函数，*x*[*i*] 对于 *i* = 1, …, 784 是图像像素的灰度值，*w*[*i*] 对于 *i* =
    1, …, 784 是权重，*b* 是偏置。记住，当 ![$$ \hat{y}&gt;0.5 $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_IEq1.png)
    时，我们将图像分类为类别 1（即数字 2），如果 ![$$ \hat{y}&lt;0.5 $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_IEq2.png)
    时，我们将图像分类为类别 0（即数字 1）。现在如果你还记得我们在第 [2](463356_2_En_2_Chapter.xhtml) 章节中对 Sigmoid
    函数的讨论，你会记得当 *z* ≥ 0 时，*σ*(*z*) ≥ 0.5，而当 *z* < 0 时，*σ*(*z*) < 0.5。这意味着我们的网络应该以这种方式学习权重，对于所有的
    1，我们都有 *z* < 0，而对于所有的 2，*z* ≥ 0。让我们看看这真的是否如此。
- en: In Figure [10-16](#Fig16), you can see a plot for a digit 1 where you can find
    the weights *w*[*i*] (as a solid line) of our trained network after 600 epochs
    (and after reaching an accuracy of 98%) and the gray value of the pixel *x*[*i*]
    rescaled to have a maximum of 0.5 (as a dashed line). Look how each time *x*[*i*]
    is big, then *w*[*i*] is negative. And when *w*[*i*] > 0 the *x*[*i*] are almost
    zero. Clearly the result ![$$ {w}_1{x}_1+{w}_2{x}_2+\dots +{w}_{n_x}{x}_{n_x}+b
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_IEq3.png) will
    be negative, and therefore *σ*(*z*) < 0.5 and the network will identify the image
    as a 1\. Figure [10-16](#Fig16) is zoomed in to make this behavior more evident.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [10-16](#Fig16) 中，你可以看到一个数字 1 的图像，其中你可以找到我们的训练网络在 600 个 epoch 后（达到 98% 的准确率后）的权重
    *w*[*i*]（以实线表示）以及像素 *x*[*i*] 的灰度值重新缩放到最大值为 0.5（以虚线表示）。看看每次 *x*[*i*] 值大时，*w*[*i*]
    都是负值。而当 *w*[*i*] > 0 时，*x*[*i*] 几乎为零。显然，结果 ![$$ {w}_1{x}_1+{w}_2{x}_2+\dots +{w}_{n_x}{x}_{n_x}+b
    $$](../images/463356_2_En_10_Chapter/463356_2_En_10_Chapter_TeX_IEq3.png) 将是负值，因此
    *σ*(*z*) < 0.5，网络将识别该图像为 1。图 [10-16](#Fig16) 被放大以使这种行为更加明显。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig16_HTML.png)'
  id: totrans-319
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig16_HTML.png)'
- en: Figure 10-16
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-16
- en: Plot for a digit 1 where you can find the weights *w*[*i*] (the solid lines)
    of our trained network after 600 epochs (and after reaching an accuracy of 98%)
    and the gray value of the pixel *x*[*i*] rescaled to have a maximum of 0.5 (the
    dashed lines)
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 数字 1 的图像，其中你可以找到我们的训练网络在 600 个 epoch 后（达到 98% 的准确率后）的权重 *w*[*i*]（实线）以及像素 *x*[*i*]
    的灰度值重新缩放到最大值为 0.5（虚线）
- en: In Figure [10-17](#Fig17), you can see the same plot for a digit 2\. You will
    remember from our previous discussion that, for a 2, we can see many bars clustered
    together in groups up to pixel 250 (roughly). Let’s look at the weights in that
    region. Where the pixel gray values are big, the weights are positive, giving
    then a positive value of *z* and therefore *σ*(*z*) ≥ 0.5\. That means the image
    would be classified as a 2.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[10-17](#Fig17)中，您可以看到数字2的相同图像。您会记得，对于数字2，我们可以在像素250（大约）之前看到许多条形图聚集在一起。让我们看看该区域的权重。在像素灰度值大的地方，权重是正的，因此
    *z* 的值也是正的，因此 *σ*(*z*) ≥ 0.5。这意味着图像将被分类为2。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig17_HTML.png)'
  id: totrans-323
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig17_HTML.png)'
- en: Figure 10-17
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-17
- en: Plot for a digit 2 where you can find the weights *w*[*i*] (solid lines) of
    our trained network after 600 epochs (and after reaching an accuracy of 98%) and
    the gray value of the pixel *x*[*i*] rescaled to have a maximum of 0.5 (dashed
    lines)
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 数字2的图像，其中您可以找到经过600个epoch（并在达到98%的准确率后）训练的网络的权重 *w*[*i*]（实线）以及像素 *x*[*i*] 的灰度值重新缩放到最大值为0.5（虚线）
- en: As an additional check, Figure [10-18](#Fig18) plots *w*[*i*] · *x*[*i*] for
    all values of *i* for a digit 1\. You can see how almost all the points lie below
    zero. Note that *b* =  − 0.16 in this case as well.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外的检查，图[10-18](#Fig18)绘制了数字1的所有 *i* 值的 *w*[*i*] · *x*[*i*]。您可以看到几乎所有点都位于零以下。请注意，在这种情况下，*b* =  − 0.16。
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig18_HTML.png)'
  id: totrans-327
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig18_HTML.png)'
- en: Figure 10-18
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-18
- en: '*w*[*i*] · *x*[*i*] for *i* = 1, …, 784 for a digit 1\. You can see how almost
    all the values lie below zero. The thick line at zero is made of all the points
    *i* such that *w*[*i*] · *x*[*i*] = 0'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: '*w*[*i*] · *x*[*i*] 对于 *i* = 1, …, 784 的数字1。您可以看到几乎所有值都低于零。零处的粗线是由所有满足 *w*[*i*] · *x*[*i*] = 0
    的点 *i* 组成的'
- en: As you can see, in very easy cases it is possible to understand how a network
    learns and therefore it would be much easier to debug strange behaviors. But don’t
    expect this to be possible when dealing with more complex cases. The analysis
    we did here would not be so easy, for example, if you tried to do the same with
    digits 3 and 8 instead of 1 and 2.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，在非常简单的情况下，可以理解网络是如何学习的，因此调试奇怪行为会容易得多。但不要期望在处理更复杂的情况时也能如此。例如，如果您尝试用数字3和8而不是1和2来做同样的分析，这里的分析就不会那么容易。
- en: Exercises
  id: totrans-331
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: 'Exercise 1 (Level: Easy)'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 练习1（难度：简单）
- en: Perform k-fold cross-validation using the built-in function of the `sklearn`
    library and compare the results.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `sklearn` 库的内置函数执行k折交叉验证，并比较结果。
- en: 'Exercise 2 (Level: Medium)'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 练习2（难度：中等）
- en: Look at different performance metrics (for example sensitivity, specificity,
    ROC curve, etc.) and calculate them for the unbalanced class problem. Try to understand
    how these can help you in the evaluation of the models.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 查看不同的性能指标（例如灵敏度、特异性、ROC曲线等）并计算它们对于不平衡类别问题的结果。尝试理解这些指标如何帮助您评估模型。
