    NNI 剪枝预训练模型。让我们继续深入研究剪枝算法。
- en: One-Shot Pruners
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一次性剪枝器
- en: 'One-shot pruning algorithms prune weights only once based on a specific metric.
    Usually, pruned weights are close to zero, and pruner suggests that their removal
    will not impact the model’s accuracy. One-shot pruners act the following way:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性剪枝算法基于特定指标仅剪枝一次权重。通常，剪枝后的权重接近于零，剪枝器建议移除它们不会影响模型的准确率。一次性剪枝器按以下方式操作：
- en: Pruner accepts a model and selects active weights and the weights to be pruned.
    As a result, the pruner returns a model and a binary mask, where 1 means active
    weight and 0 means weight to be pruned.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 剪枝器接受一个模型并选择活动权重和要剪枝的权重。因此，剪枝器返回一个模型和一个二进制掩码，其中 1 表示活动权重，0 表示要剪枝的权重。
- en: Original model is speeded up by pruning redundant weights resulting a compressed
    model.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过剪枝冗余权重，原始模型被加速，从而得到一个压缩模型。
- en: Fine-tuning algorithm retrains the compressed model to adjust its weights.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调算法重新训练压缩模型以调整其权重。
- en: This pruner flow algorithm is depicted in Figure [6-3](#Fig3).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 此剪枝流程算法如图 [6-3](#Fig3) 所示。
- en: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig3_HTML.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig3_HTML.png)'
- en: Figure 6-3
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-3
- en: One-shot pruning
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性剪枝
- en: 'We can define the main steps to implement one-shot pruning algorithms using
    NNI the following way:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用以下方式定义使用 NNI 实现一次性剪枝算法的主要步骤：
- en: Load a pre-trained model
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加载预训练模型
- en: Initialize pruner
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始化剪枝器
- en: Compress original model
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 压缩原始模型
- en: Retrain compressed model
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新训练压缩模型
- en: Save compressed model
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存压缩模型
- en: Load and speed up compressed model
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加载并加速压缩模型
- en: '**Step 1**. Model loading is a native PyTorch operation:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1**. 模型加载是 PyTorch 的原生操作：'
- en: '[PRE17]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**Step 2**. To initialize the pruner, we must specify the pruner configuration
    (we will study the pruner configuration in the next section). Here is an example
    of pruner initialization:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2**. 为了初始化剪枝器，我们必须指定剪枝器配置（我们将在下一节研究剪枝器配置）。以下是一个剪枝器初始化的示例：'
- en: '[PRE18]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '**Step 3**. Pruner compresses original model applying its logic to reduce model
    weights:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3**. 剪枝器通过应用其逻辑压缩原始模型以减少模型权重：'
- en: '[PRE19]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '**Step 4**. Compressed model is being retrained according to the same training
    algorithm as the original one:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4**. 根据与原始模型相同的训练算法重新训练压缩模型：'
- en: '[PRE20]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '**Step 5**. Compressed model is stored using `pruner.export_model` method:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 5**. 使用 `pruner.export_model` 方法存储压缩模型：'
- en: '[PRE21]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '**Step 6**. Saved model is loaded and wrapped by `nni.compression.pytorch.ModelSpeedup`
    class:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 6**. 使用 `nni.compression.pytorch.ModelSpeedup` 类加载存储的模型：'
- en: '[PRE22]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: And that’s it. The compressed model is ready to use! Let’s create a helper script
    that will apply steps 2–6 we defined earlier. Listing [6-4](#PC24) applies a pruning
    algorithm and returns a compressed model.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。压缩模型已准备好使用！让我们创建一个辅助脚本，该脚本将应用我们之前定义的步骤 2–6。清单 [6-4](#PC24) 应用剪枝算法并返回一个压缩模型。
- en: 'Importing modules:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 导入模块：
- en: '[PRE23]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '`oneshot_prune` method accepts the following parameters:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '`oneshot_prune` 方法接受以下参数：'
- en: '`model_original:` Pre-trained original model'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`model_original:` 预训练原始模型'
- en: '`pruner_cls:` Pruner class'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pruner_cls:` 剪枝器类'
- en: '`pruner_config:` Pruner configuration'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pruner_config:` 剪枝器配置'
- en: '`train_ds:` Train dataset'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`train_ds:` 训练数据集'
