- en: Summary
  id: totrans-386
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Pruning is an essential part of automated deep learning. It denotes the neural
    network complexity problem. In addition to the fact that we need an accurate neural
    network, we also need a lightweight neural network. We will always prefer a neural
    network with 1M parameters over a neural network with 10M parameters if they have
    the same accuracy. In this chapter, we have covered the basic principles of model
    pruning using NNI. Model pruning is a significant direction of ​​neural network
    optimization that allows the integration of machine learning models into simple
    devices.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 修剪是自动化深度学习的一个关键部分。它表示神经网络复杂性问题。除了我们需要一个精确的神经网络之外，我们还需要一个轻量级的神经网络。如果它们具有相同的准确性，我们总是会偏好拥有100万个参数的神经网络而不是拥有1000万个参数的神经网络。在本章中，我们介绍了使用NNI进行模型修剪的基本原理。模型修剪是神经网络优化的重要方向，它允许将机器学习模型集成到简单的设备中。
