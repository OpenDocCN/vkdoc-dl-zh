- en: '[PRE34]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: We will prune `Conv2d` layers with `0.8` sparsity and `Linear` layers with `0.6`
    sparsity. Also, we will exclude the final classifier linear layer `fc3` from pruning.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将对 `Conv2d` 层进行 `0.8` 的稀疏度剪枝，对 `Linear` 层进行 `0.6` 的稀疏度剪枝。此外，我们将排除最终的分类器线性层
    `fc3` 进行剪枝。
- en: '[PRE35]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'Defining pruner:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 定义剪枝器：
- en: '[PRE36]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'Compressing original model using `LevelPruner`:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `LevelPruner` 压缩原始模型：
- en: '[PRE37]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'Visualizing prune mask:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化剪枝掩码：
- en: '[PRE38]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Figure [6-4](#Fig4) shows the mask of a pruned model. We see that the mask leaves
    40% active weights for linear layers and 20% active weights for convolutional
    layers.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [6-4](#Fig4) 展示了剪枝模型的掩码。我们看到掩码为线性层保留了 40% 的激活权重，为卷积层保留了 20% 的激活权重。
- en: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig4_HTML.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig4_HTML.jpg)'
- en: Figure 6-4
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-4
- en: LevelPruner active weights
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: LevelPruner 激活权重
- en: 'Comparing original model and compressed one:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 比较原始模型和压缩模型：
- en: '[PRE39]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: The original model has `0.991` accuracy, and the compressed one has the same
    `0.991` accuracy. Table [6-3](#Tab3) compares the architectures of original and
    compressed models.
  id: totrans-161
