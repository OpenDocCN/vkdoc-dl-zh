    12,107 nonzero weights only. At the beginning of the retraining, the compressed
    model is less accurate than the original model. But after 10 training epochs,
    the compressed model achieves the same accuracy as the original model, having
    only 12,107 active weights out of 59,780\. Obviously, the original LeNet model
    was redundant and could be replaced by pruned one.
  id: totrans-48
