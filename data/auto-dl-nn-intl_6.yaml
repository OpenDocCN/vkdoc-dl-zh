- en: 6. Model Pruning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 模型剪枝
- en: Deep learning models have reached significant success in many real-life problems.
    A lot of devices use neural networks to perform everyday tasks. However, complex
    neural networks are computationally expensive. And not all devices have GPU processors
    to run deep learning models. Therefore, it would be helpful to perform model compression
    methods to reduce the model size and accelerate model performance without losing
    accuracy significantly. One of the main model compression techniques is model
    pruning. Pruning optimizes the model by eliminating some model weights. It can
    eliminate a significant amount of model weights with no negligible damage to model
    performance. A pruned model is lighter and faster. Pruning is a straightforward
    approach that can give nice model speedup results.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习模型在许多现实生活中的问题中取得了显著的成功。许多设备使用神经网络来执行日常任务。然而，复杂的神经网络计算成本很高。并非所有设备都有 GPU 处理器来运行深度学习模型。因此，执行模型压缩方法以减小模型大小并加速模型性能，同时不显著降低精度，将非常有帮助。主要的模型压缩技术之一是模型剪枝。剪枝通过消除一些模型权重来优化模型。它可以消除大量模型权重，而对模型性能的损害可以忽略不计。剪枝模型更轻、更快。剪枝是一种简单的方法，可以给出很好的模型加速结果。
- en: NNI provides a toolkit to help users to execute model pruning algorithms. `NNI
    2.7` version (which is used in this book) supports pruning for the PyTorch framework
    only. This chapter will study several pruning algorithms and learn how to apply
    them in practice.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: NNI 提供了一个工具包，帮助用户执行模型剪枝算法。`NNI 2.7` 版本（本书中使用）仅支持 PyTorch 框架的剪枝。本章将研究几种剪枝算法，并学习如何在实践中应用它们。
- en: What Is Model Pruning?
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是模型剪枝？
- en: Complex neural networks have a lot of layers and many weights. ResNet, DenseNet,
    and VGGNet take up tens of megabytes to store their weights. Developers often
    use these architectures to solve many practical problems. But the chosen architecture
    is often too redundant for the problem being solved, and it contains a lot of
    extra weights and even extra layers. In practice, you can remove excess weights
    from the model, which will significantly speed up calculations in the neural network.
    Sometimes, deep learning models perfectly fit the problem, and they do not have
    explicit redundancy. Still, they are too computationally heavy to be deployed
    to the special device they need to act in. In such cases, developers may sacrifice
    the model accuracy for acceleration.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的神经网络有很多层和许多权重。ResNet、DenseNet 和 VGGNet 占用数十兆字节来存储它们的权重。开发者经常使用这些架构来解决许多实际问题。但所选架构通常对于要解决的问题来说过于冗余，它包含很多额外的权重，甚至还有额外的层。在实践中，你可以从模型中移除多余的权重，这将显著加快神经网络中的计算速度。有时，深度学习模型完美地适应问题，它们没有明显的冗余。然而，它们计算量太大，无法部署到它们需要执行的特殊设备上。在这种情况下，开发者可能为了加速而牺牲模型精度。
- en: 'Let’s describe how the pruning algorithm acts:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们描述一下剪枝算法是如何工作的：
- en: We take a ready-to-use pre-trained deep learning model we want to prune.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们选择一个预训练的深度学习模型，该模型是我们想要剪枝的。
- en: Pruning algorithm eliminates (prunes) several weights in the neural network.
    By eliminating, we mean that the algorithm zeroes these weights. Zeroing the weights
    significantly speeds up calculations since multiplying by 0 is always 0, and there
    is no need to do complex calculations. Usually, candidates for elimination are
    already close to zero, so their zeroing should not seriously affect the model’s
    performance.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 剪枝算法消除了（剪枝）神经网络中的几个权重。通过消除，我们指的是算法将这些权重置零。置零权重可以显著加快计算速度，因为乘以 0 总是等于 0，而且不需要进行复杂的计算。通常，候选消除的权重已经接近零，因此它们的置零不应该严重影响模型性能。
- en: Pruned model is retrained (fine-tuned) on the same dataset as the original model,
    but zeroed weights no longer change their values and remain zero all the time.
    During retraining, active weights try to take over the functions of the removed
    neurons to continue solving the problem successfully.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 剪枝模型在原始模型相同的数据集上重新训练（微调），但零值的权重不再改变其值，始终保持为零。在重新训练过程中，活跃的权重试图接管被移除神经元的函数，以继续成功解决问题。
- en: Figure [6-1](#Fig1) illustrates the pruning algorithm.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [6-1](#Fig1) 展示了剪枝算法。
- en: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig1_HTML.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig1_HTML.png)'
- en: Figure 6-1
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-1
- en: Pruning algorithm application
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 剪枝算法应用
- en: Pruning is a great technique, but sometimes, it degrades the model. It is not
    always possible to remove weights without compromising the model’s accuracy in
    complex neural networks. However, model accuracy degradation can be minimal, and
    we’ll see further that it is possible to compress a model by 80% with almost no
    accuracy decrease.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 剪枝是一种很好的技术，但有时它会导致模型性能下降。在复杂的神经网络中，有时不可能在不影响模型准确率的情况下移除权重。然而，模型准确率下降可以非常小，我们将会看到，通过几乎不降低准确率，可以将模型压缩
    80%。
- en: Note
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Term **fine-tuning** means retraining technique that trains the unpruned weights
    from their final trained values. In this chapter, we will use the terms **fine-tuning**
    and **retraining** interchangeably.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 术语 **微调** 指的是一种重新训练技术，它从最终训练值重新训练未剪枝的权重。在本章中，我们将交替使用术语 **微调** 和 **重新训练**。
- en: LeNet Model Pruning
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LeNet 模型剪枝
