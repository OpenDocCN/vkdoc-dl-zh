- en: FPGM Pruner
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: FPGM 剪枝器
- en: FPGM (Filter Pruning via Geometric Median) Pruner is a one-shot pruner that
    prunes filters with the smallest geometric median. For more details, please refer
    to the original paper “Filter Pruning via Geometric Median for Deep Convolutional
    Neural Networks Acceleration” ([`https://arxiv.org/pdf/1811.00250.pdf`](https://arxiv.org/pdf/1811.00250.pdf)).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: FPGM（通过几何中值进行滤波器剪枝）剪枝器是一种一次性剪枝器，它通过最小的几何中值剪枝滤波器。更多详情请参阅原始论文“通过几何中值进行滤波器剪枝以加速深度卷积神经网络”([`https://arxiv.org/pdf/1811.00250.pdf`](https://arxiv.org/pdf/1811.00250.pdf))。
- en: 'FPGM Pruner supports `Conv2d`, `Linear` as layers for pruning operation. FPGM
    Pruner is applied the following way:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: FPGM 剪枝器支持 `Conv2d`、`Linear` 作为剪枝操作的层。FPGM 剪枝器的应用方式如下：
