- en: Yes, the accuracy of the original model degraded from 0.991 to 0.9883, but we
    compressed the original model more than five times! We made our model lightweight,
    and now it is more attractive for economical usage.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，原始模型的准确率从0.991下降到0.9883，但我们压缩了原始模型超过五次！我们使我们的模型轻量化，现在它对经济使用更具吸引力。
- en: In this section, we have demonstrated the practical use of iterative pruners
    in real-world cases. We see that iterative pruning significantly benefits practical
    deep learning deployment problems.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们展示了迭代剪枝器在实际案例中的实际应用。我们看到迭代剪枝显著地促进了实际深度学习部署问题。
