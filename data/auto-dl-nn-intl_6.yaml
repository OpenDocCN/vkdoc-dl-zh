  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 理解模型剪枝概念的最佳方式是将它付诸实践。让我们回到众所周知的 LeNet 模型和经典的 MNIST 问题。LeNet 模型的设计在列表 [6-1](#PC1)
