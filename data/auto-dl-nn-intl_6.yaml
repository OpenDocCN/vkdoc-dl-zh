- en: L1Norm and L2Norm Pruners
  id: totrans-206
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: L1Norm 和 L2Norm 剪枝器
- en: L1Norm Pruner and L2Norm Pruner are one-shot pruners that prune layers according
    to *L*[*1*]*-norm* and *L*[*2*]*-norm*, respectively. For more details, please
    refer to the original paper “Pruning Filters for Efficient ConvNets” ([`https://arxiv.org/pdf/1608.08710.pdf`](https://arxiv.org/pdf/1608.08710.pdf)).
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: L1Norm 剪枝器和 L2Norm 剪枝器是单次剪枝器，分别根据 *L*[*1*]*-范数和 *L*[*2*]*-范数剪枝层。更多详情请参阅原始论文“用于高效卷积神经网络的剪枝滤波器”([`https://arxiv.org/pdf/1608.08710.pdf`](https://arxiv.org/pdf/1608.08710.pdf))。
- en: 'L1Norm and L2Norm pruners support `Conv2d`, `Linear` as a layer for pruning
    operation. `L1NormPruner` and `L2NormPruner` are applied the following way:'
