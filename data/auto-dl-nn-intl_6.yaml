  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`epochs:` 训练轮数'
- en: '`model_input_shape:` Shape of model input'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`model_input_shape:` 模型输入形状'
- en: '[PRE24]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: '**Step 2**. Initializing pruner:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2**. 初始化剪枝器：'
- en: '[PRE25]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: '**Step 3**. Compressing original model:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3**. 压缩原始模型：'
- en: '[PRE26]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '**Step 4**. Retraining compressed model:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4**. 重新训练压缩模型：'
- en: '[PRE27]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '**Step 5**. Saving compressed model:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 5**. 保存压缩模型：'
- en: '[PRE28]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: '**Step 6**. Loading and speeding up compressed model:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 6**. 加载并加速压缩模型：'
- en: '[PRE29]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Fine. Since we know how to apply one-shot pruning algorithms, let’s go further
    and study some of them.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 好的。既然我们知道如何应用单次剪枝算法，那么让我们进一步研究一些算法。
- en: Pruner Configuration
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 剪枝器配置
- en: Each pruner accepts configuration, which specifies its internal logic. Pruner
    configuration is a `List` of `Dict` entries, and each entry specifies a pruning
    strategy applied to a specified layer set. Table [6-2](#Tab2) describes pruner
    configuration parameters.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 每个剪枝器接受配置，该配置指定其内部逻辑。剪枝器配置是一个 `List` 的 `Dict` 条目列表，每个条目指定应用于指定层集的剪枝策略。表 [6-2](#Tab2)
    描述了剪枝器配置参数。
- en: Table 6-2
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 表 6-2
- en: Pruner configuration
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 剪枝器配置
- en: '| Key | Description |'
  id: totrans-127
  prefs: []
  type: TYPE_TB
  zh: '| 键 | 描述 |'
- en: '| --- | --- |'
  id: totrans-128
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| `sparsity` | Specifies the sparsity for each layer in this configuration
    entry to be compressed. If `sparsity = 0.8`, then 80% of layer weights will be
    pruned, and 20% will be left active |'
  id: totrans-129
  prefs: []
  type: TYPE_TB
  zh: '| `sparsity` | 指定要压缩的配置条目中每个层的稀疏度。如果 `sparsity = 0.8`，则 80% 的层权重将被剪枝，20% 将保持活跃
    |'
- en: '| `op_types` | Specifies what types of operations to compress. `''default''`
    means following the algorithm’s default setting. All supported module types for
    PyTorch are defined package file `nni/compression/pytorch/default_layers.py:``''Conv1d'',
    ''Conv2d'', ''Conv3d'', ''ConvTranspose1d'', ''ConvTranspose2d'', ''ConvTranspose3d'',
    ''Linear'', ''Bilinear'',   ''PReLU'', ''Embedding'', ''EmbeddingBag''` |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
  zh: '| `op_types` | 指定要压缩的操作类型。`''default''` 表示遵循算法的默认设置。PyTorch 支持的所有模块类型在包文件 `nni/compression/pytorch/default_layers.py`
    中定义：`''Conv1d'', ''Conv2d'', ''Conv3d'', ''ConvTranspose1d'', ''ConvTranspose2d'',
    ''ConvTranspose3d'', ''Linear'', ''Bilinear'',   ''PReLU'', ''Embedding'', ''EmbeddingBag''`
    |'
- en: '| `op_names` | Specifies names of operations to be compressed. If this field
    is omitted, operations will not be filtered by it |'
  id: totrans-131
  prefs: []
  type: TYPE_TB
  zh: '| `op_names` | 指定要压缩的操作名称。如果此字段被省略，则操作将不会通过它进行过滤 |'
- en: '| `op_partial_names` | Operation partial names to be compressed. If `op_partial_names
    = ''fc_''`, then all layers with the following mask `''fc_*''` will be pruned
    |'
  id: totrans-132
  prefs: []
  type: TYPE_TB
  zh: '| `op_partial_names` | 要压缩的操作部分名称。如果 `op_partial_names = ''fc_''`，则所有具有以下掩码
    `''fc_*''` 的层都将被剪枝 |'
- en: '| `exclude` | Default is False. If this field is True, it means the operations
    with specified types and names will be excluded from the compression |'
  id: totrans-133
  prefs: []
  type: TYPE_TB
  zh: '| `exclude` | 默认为 False。如果此字段为 True，则表示具有指定类型和名称的操作将被排除在压缩之外 |'
- en: 'Here is an example of the pruning configuration of a one-shot pruner applied
    to the LeNet model:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个将单次剪枝器应用于 LeNet 模型的剪枝配置示例：
- en: '[PRE30]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'If you don’t want to specify a special pruning strategy for each layer type,
    then you can use the following configuration:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不想为每个层类型指定特殊的剪枝策略，则可以使用以下配置：
- en: '[PRE31]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Level Pruner
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 级别剪枝器
- en: Level pruner is a straightforward one-shot pruner. Sparsity level means prune
    ratio, that is, `sparsity=0.7` means that 70% of model weight parameters will
    be pruned. Level pruner sorts the weights in the specified layer by their absolute
    values. And then mask to zero the smallest magnitude weights until the desired
    sparsity level is reached.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 级别剪枝器是一个简单的单次剪枝器。稀疏度级别表示剪枝比率，即 `sparsity=0.7` 表示将剪枝 70% 的模型权重参数。级别剪枝器按绝对值对指定层的权重进行排序。然后，将最小幅度权重掩码为零，直到达到所需的稀疏度级别。
- en: 'Level pruner is applied the following way:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 级别剪枝器是这样应用的：
- en: '[PRE32]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Let’s apply `LevelPruner` to prune the LeNet model using Listing [6-5](#PC34).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们应用 `LevelPruner` 剪枝 LeNet 模型，如清单 [6-5](#PC34) 所示。
- en: 'Importing modules:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 导入模块：
- en: '[PRE33]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
