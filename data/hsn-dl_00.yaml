- en: 'I have been lucky enough to have met people who inspired me to learn. First
    of all, I would like to thank Professor Moinuddin, former Pro-Vice Chancellor,
    Delhi Technological University, for his unconditional support. He has deposed
    his faith in me in my formative years and helped me grow. I would also like to
    thank the late Professor A. K. Sharma, former Dean and Chairperson, Department
    of Computer Science, YMCA, Faridabad, for his constant encouragement. I have been
    able to write this book, author papers, and work on projects only because of the
    encouragement provided by him. I am also thankful to the following academicians
    and professionals for their encouragement and providing unconditional support
    to me:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我很幸运地遇到了一些激励我学习的人。首先，我要感谢德里科技大学前副校长Moinuddin教授，感谢他无条件的支持。他在我成长的过程中对我充满信心，并帮助我成长。我还要感谢已故的A.
    K. Sharma教授，他是YMCA Faridabad计算机科学系的前院长和主席，感谢他不断的鼓励。我之所以能够写这本书、发表论文和从事项目，仅仅是因为他提供的鼓励。我还要感谢以下学者和专业人士，感谢他们的鼓励和无条件支持：
- en: Professor I. K. Bhat, Vice Chancellor, MRU, India
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 印度MRU大学副校长I. K. Bhat教授
- en: Professor Prashant Jha, King’s College London
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 伦敦国王学院教授 Prashant Jha
- en: Professor Tapas Kumar, Associate Dean, SET, MRIIRS, India
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 印度MRIIRS SET学院副院长Tapas Kumar教授
- en: Professor Ranjit Biswas, former Dean, Faculty of Engineering, Jamia Hamdard
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哈里亚纳大学工程学院前院长Ranjit Biswas教授
- en: Professor Naresh Chauhan, Department of Computer Science, YMCA University of
    Science and Technology
