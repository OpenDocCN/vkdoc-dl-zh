- en: Item-to-Item Collaborative Filtering
  id: totrans-133
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 项目-项目协同过滤
- en: Item-to-item based collaborative filtering recommends items that a particular
    user might like by finding items similar to ones they already purchased and then
    creating a matrix profile for each item. Purchase history or user ratings are
    also used.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 基于项目的协同过滤推荐可能喜欢的项目，通过找到他们已经购买的商品的相似商品，并为每个商品创建一个矩阵配置文件。购买历史或用户评分也被使用。
- en: A matrix is formed to describe the behavior of all the users (purchase history
    in our example) corresponding to all the items. This matrix helps calculate the
    similarity metrics (cosine similarity) between items to formulate the item-item
    relations. This relation is used to recommend items similar to those previously
    purchased by the selected user.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 形成一个矩阵来描述所有用户（以我们的示例为例）对应所有商品的行为。此矩阵有助于计算项目之间的相似度度量（余弦相似度），以制定项目-项目关系。此关系用于推荐与选定用户之前购买的项目相似的项目。
