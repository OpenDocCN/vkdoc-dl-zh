  zh: '[PRE43]'
- en: 'Defining helper function creating convolution layer:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 定义创建卷积层的辅助函数：
- en: '[PRE44]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: 'Setting `LayerChoices` for `conv1` and `conv2` layers:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 为 `conv1` 和 `conv2` 层设置 `LayerChoices`：
- en: '[PRE45]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: 'Setting `InputChoice` for linear layers:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 为线性层设置 `InputChoice`：
- en: '[PRE46]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: 'Defining `forward` method:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 定义 `forward` 方法：
- en: '[PRE47]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Since we defined One-shot Model Space using NNI, we can move on to implementing
    advanced One-shot algorithms.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们使用 NNI 定义了 One-shot 模型空间，我们可以继续实现高级的 One-shot 算法。
- en: One-Shot Algorithms
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: One-Shot 算法
- en: 'At the moment, One-shot NAS is a young area and is developing rapidly. Many
    algorithms that implement the One-shot concept are being invented at the moment.
    This section will study two of the most popular One-shot algorithms: Efficient
    Neural Architecture Search (ENAS) and Differentiable Architecture Search (DARTS).'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，One-shot NAS 是一个新兴领域，发展迅速。目前正在发明许多实现 One-shot 概念的算法。本节将研究两种最受欢迎的 One-shot
    算法：高效神经网络架构搜索 (ENAS) 和可微架构搜索 (DARTS)。
- en: Efficient Neural Architecture Search (ENAS)
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高效神经网络架构搜索 (ENAS)
- en: Efficient Neural Architecture Search (ENAS) is a fast and inexpensive approach
    for automatic model design. In ENAS, a controller discovers neural network architectures
    by searching for an optimal subnet within a large Supernet. The controller is
    trained with a policy gradient to select a subnet that maximizes the expected
    reward on a validation set. Meanwhile, the model corresponding to the selected
    subnet is trained to minimize the loss function. Sharing parameters among child
    models allows ENAS to deliver strong empirical performances. It uses much fewer
    GPU hours than classical Multi-trial NAS approaches.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 高效神经架构搜索（ENAS）是一种快速且经济的自动模型设计方法。在 ENAS 中，控制器通过在大型超网络中搜索最佳子网络来发现神经网络架构。控制器使用策略梯度进行训练，以选择一个子网络，该子网络在验证集上最大化预期奖励。同时，对应于所选子网络的模型被训练以最小化损失函数。在子模型之间共享参数使得
    ENAS 能够提供强大的经验性能。它使用的 GPU 小时数比经典的多试验 NAS 方法少得多。
- en: The original paper “Efficient Neural Architecture Search via Parameter Sharing”
    ([`https://arxiv.org/pdf/1802.03268.pdf`](https://arxiv.org/pdf/1802.03268.pdf))
    has a lot of formulas and can be too complicated. Let’s study the idea of this
    approach in a more practical way.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 原始论文“通过参数共享进行高效的神经架构搜索”（[`https://arxiv.org/pdf/1802.03268.pdf`](https://arxiv.org/pdf/1802.03268.pdf)）有很多公式，可能过于复杂。让我们以更实际的方式研究这种方法的思想。
- en: One of the key concepts in ENAS is Reinforcement Learning Controller or RL Controller
    or simply Controller. RL Controller contains a neural network *θ* that learns
    how to extract the most efficient subnets from the Supernet. The main task of
    the RL Controller is to find the optimal subnet in the Supernet, and it is trained
    according to the Reinforcement Learning algorithm. The Controller creates a subnet
    by defining a binary mask, where 1 activates layer and 0 disables it. Figure [5-10](#Fig10)
    shows how RL Controller selects subnet from the Supernet using binary mask.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: ENAS 中的一个关键概念是强化学习控制器或 RL 控制器或简称控制器。RL 控制器包含一个神经网络 *θ*，该神经网络学习如何从超网络中提取最有效的子网络。RL
    控制器的主要任务是找到超网络中的最佳子网络，并且它根据强化学习算法进行训练。控制器通过定义一个二进制掩码来创建子网络，其中 1 激活层，0 禁用它。图 [5-10](#Fig10)
    展示了 RL 控制器如何使用二进制掩码从超网络中选择子网络。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig10_HTML.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig10_HTML.png)'
- en: Figure 5-10
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-10
- en: RL Controller subnet selection
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: RL 控制器子网络选择
- en: RL Controller picks a subnet and runs one or several training epochs. The core
    of the ENAS approach is the weight-sharing technique. The same layers in different
    subnets share the same weights. When Controller picks a subnet, it is not being
    trained from scratch; layers share weights that have already been trained. Weight-sharing
    concept is demonstrated in Figure [5-11](#Fig11).
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: RL 控制器选择一个子网络并运行一个或多个训练周期。ENAS 方法的核心是权重共享技术。不同子网络中的相同层共享相同的权重。当控制器选择子网络时，它不是从头开始训练；层共享已经训练过的权重。权重共享概念在图
    [5-11](#Fig11) 中得到演示。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig11_HTML.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig11_HTML.png)'
- en: Figure 5-11
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-11
- en: Weight sharing
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 权重共享
- en: 'The weight-sharing approach allows the Controller to find the best architecture
    with small iterations and without retraining a new subnet from scratch each time.
    ENAS algorithm can be demonstrated using the following pseudo-code:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 权重共享方法允许控制器通过少量迭代找到最佳架构，而无需每次从头开始重新训练新的子网络。可以使用以下伪代码演示 ENAS 算法：
- en: 'We initialize a Supernet: `S`'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 我们初始化一个超网络：`S`
- en: 'And load train and validation datasets: `train_ds, val_ds`'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 并加载训练和验证数据集：`train_ds, val_ds`
- en: 'Next, the algorithm initializes ENAS Controller (Controller(S, θ)), where *θ*
    denotes Controller weights that help choose optimal subnet from `S` Supernet:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，算法初始化 ENAS 控制器（Controller(S, θ))，其中 *θ* 表示控制器权重，这些权重有助于从 `S` 超网络中选择最佳子网络：
- en: '[PRE48]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: 'Main training loop:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 主要训练循环：
- en: 'Supernet training loop:'
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 超网络训练循环：
- en: '[PRE49]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: 'Controller implements stochastic policy, which means that it operates with
    probabilities. The most promising subnet has the highest probability to be chosen:'
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 控制器实现随机策略，这意味着它以概率进行操作。最有希望的子网络有最高的被选中的概率：
- en: '[PRE50]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Subnet network is trained once (i.e., only one training epoch) on a training
    batch using weight-sharing technique (Figure [5-11](#Fig11)):'
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 子网络网络使用权重共享技术在一个训练批次上训练一次（即，只有一个训练周期）（图 [5-11](#Fig11)）：
- en: '[PRE51]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Controller training loop. In this loop, Controller learns how to find a subnet
    that gives the highest reward, that is, accuracy on validation dataset:'
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 控制器训练循环。在这个循环中，控制器学习如何找到一个子网络，使其获得最高的奖励，即验证数据集上的准确率：
- en: '[PRE52]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: 'Controller chooses subnet and calculates its accuracy on validation dataset
    batch:'
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 控制器选择子网络并在验证数据集批次上计算其准确率：
- en: '[PRE53]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: 'Controller collects experience about subnet performance:'
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 控制器收集关于子网络性能的经验：
- en: '[PRE54]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: 'Controller updates its weights *θ* according to new experience:'
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 控制器根据新的经验更新其权重 *θ*：
- en: '[PRE55]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: '[PRE56]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: 'After training, Controller returns the best subnet:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 训练完成后，控制器返回最佳的子网络：
- en: '[PRE57]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: In the algorithm described earlier, the Controller trains various subnets on
    the training dataset and then tests them on the validation dataset. By repeating
    this process many times, the Controller understands which architectures show the
    best accuracy and gradually reduces the exploration process to a limited number
    of architectures. At the end of the training process, the Controller converges
    to one or several of the best architectures.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面描述的算法中，控制器在训练数据集上训练各种子网络，然后在验证数据集上测试它们。通过重复这个过程多次，控制器了解哪些架构显示出最佳的准确率，并逐渐将探索过程减少到有限数量的架构。在训练过程结束时，控制器收敛到一个或几个最佳架构。
- en: 'Let’s see how ENAS works in practice:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 ENAS 在实际中的应用：
- en: Initially, the Controller has no assumptions about subnets, and it chooses random
    subnets for single training (subnet is trained for one training epoch only) using
    the weight-sharing technique as depicted in Figure [5-11](#Fig11).
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始时，控制器对子网络没有假设，它使用如图 [5-11](#Fig11) 所示的权重共享技术随机选择子网络进行单次训练（子网络仅训练一个训练周期）。
- en: After, Controller generates subnets based on *θ* weights and collects accuracy
    on the validation dataset.
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，控制器根据 *θ* 权重生成子网络，并在验证数据集上收集准确率。
- en: Based on experience gained in step 2, Controller updates *θ* values.
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 基于第 2 步中获得的经验，控制器更新 *θ* 值。
- en: Figure [5-12](#Fig12) demonstrates steps 1–3 we described earlier.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-12](#Fig12) 展示了我们之前描述的步骤 1–3。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig12_HTML.jpg)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig12_HTML.jpg)'
- en: Figure 5-12
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-12
- en: ENAS in action. Initial epoch
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: ENAS 在行动中。初始周期
- en: Next, Controller chooses the most promising subnets to train using the weight-sharing
    technique and tests their accuracy on the validation dataset, as shown in Figure
    [5-13](#Fig13).
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，控制器使用权重共享技术选择最有希望的子网络进行训练，并在验证数据集上测试它们的准确率，如图 [5-13](#Fig13) 所示。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig13_HTML.jpg)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig13_HTML.jpg)'
- en: Figure 5-13
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-13
- en: ENAS in action. Middle training
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: ENAS 在行动中。中间训练
- en: After training Supernet layers separately and updating *θ* experience, Controller
    converges to some subnet that it considers the best. Figure [5-14](#Fig14) illustrates
    it.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 在分别训练 Supernet 层并更新 *θ* 经验后，控制器收敛到一些它认为最佳的子网络。图 [5-14](#Fig14) 说明了这一点。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig14_HTML.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig14_HTML.jpg)'
- en: Figure 5-14
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-14
- en: ENAS in action. End training
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: ENAS 在行动中。结束训练
- en: One-shot ENAS algorithm is close to RL Strategy from Multi-trial NAS, but with
    one significant difference. ENAS does not make a complete subnet training cycle
    but uses weight sharing and incremental one-step training. This difference dramatically
    speeds up the process of finding the best architecture.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 单次 ENAS 算法接近多试验 NAS 的 RL 策略，但有一个显著的区别。ENAS 不进行完整的子网络训练周期，而是使用权重共享和增量一步训练。这种差异显著加快了寻找最佳架构的过程。
- en: 'NNI implements ENAS using the following classes:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: NNI 使用以下类实现 ENAS：
- en: '**PyTorch**: `nni.retiarii.oneshot.pytorch.enas.EnasTrainer`'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PyTorch**: `nni.retiarii.oneshot.pytorch.enas.EnasTrainer`'
- en: '**TensorFlow**: `nni.algorithms.nas.tensorflow.enas.EnasTrainer`'
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TensorFlow**: `nni.algorithms.nas.tensorflow.enas.EnasTrainer`'
- en: Table [5-3](#Tab3) shows `EnasTrainer` parameters.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [5-3](#Tab3) 显示了 `EnasTrainer` 参数。
- en: Table 5-3
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-3
- en: EnasTrainer parameters
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: EnasTrainer 参数
- en: '| Parameter | Description |'
  id: totrans-249
  prefs: []
  type: TYPE_TB
  zh: '| 参数 | 描述 |'
- en: '| --- | --- |'
  id: totrans-250
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| `model` | PyTorch or TensorFlow model to be trained |'
  id: totrans-251
  prefs: []
  type: TYPE_TB
  zh: '| `model` | 要训练的 PyTorch 或 TensorFlow 模型 |'
- en: '| `loss` | `Type: callable`Loss function |'
  id: totrans-252
  prefs: []
  type: TYPE_TB
  zh: '| `loss` | `类型：可调用`损失函数 |'
- en: '| `metrics` | `Type: callable`Measures model accuracy |'
  id: totrans-253
  prefs: []
  type: TYPE_TB
  zh: '| `metrics` | `类型：可调用`衡量模型准确率 |'
- en: '| `reward_function` | `Type: callable`Is used by ENAS Controller to calculate
    reward. Usually, `reward_function` returns model accuracy |'
  id: totrans-254
  prefs: []
  type: TYPE_TB
  zh: '| `reward_function` | `类型：可调用`由 ENAS 控制器用于计算奖励。通常，`reward_function` 返回模型准确率
    |'
- en: '| `optimizer` | `Type: Optimizer`Optimizer for model training |'
  id: totrans-255
  prefs: []
  type: TYPE_TB
  zh: '| `optimizer` | `类型：优化器` 模型训练的优化器 |'
- en: '| `num_epochs` | `Type: int`Number of epochs planned for training |'
  id: totrans-256
  prefs: []
  type: TYPE_TB
  zh: '| `num_epochs` | `类型：整数` 计划用于训练的周期数 |'
- en: '| `dataset` | `Type: Dataset`Training dataset |'
  id: totrans-257
  prefs: []
  type: TYPE_TB
  zh: '| `dataset` | `类型：数据集` 训练数据集 |'
- en: '| `batch_size` | `Type: int, Default: 64`Training batch size |'
  id: totrans-258
  prefs: []
  type: TYPE_TB
  zh: '| `batch_size` | `类型：整数，默认：64` 训练批大小 |'
- en: '| `workers` | `Type: int, Default: 4`Workers for data loading |'
  id: totrans-259
  prefs: []
  type: TYPE_TB
  zh: '| `workers` | `类型：整数，默认：4` 数据加载的工作者 |'
- en: '| `log_frequency` | `Type: int, Default: None`Logging step count |'
  id: totrans-260
  prefs: []
  type: TYPE_TB
  zh: '| `log_frequency` | `类型：整数，默认：None` 记录步骤计数 |'
- en: '| `grad_clip` | `Type: float, Default: 5.0`Gradient clipping. Set to 0 to disable
    |'
  id: totrans-261
  prefs: []
  type: TYPE_TB
  zh: '| `grad_clip` | `类型：浮点数，默认：5.0` 梯度裁剪。设置为 0 以禁用 |'
- en: '| `entropy_weight` | `Type: float, Default: 0.0001`Sample entropy loss weight
    |'
  id: totrans-262
  prefs: []
  type: TYPE_TB
  zh: '| `entropy_weight` | `类型：浮点数，默认：0.0001` 样本熵损失权重 |'
- en: '| `skip_weight` | `Type: float, Default: 0.8`Skip penalty loss weight |'
  id: totrans-263
  prefs: []
  type: TYPE_TB
  zh: '| `skip_weight` | `类型：浮点数，默认：0.8` 跳过惩罚损失权重 |'
- en: '| `baseline_decay` | `Type: float, Default: 0.999`Baseline decay rate. New
