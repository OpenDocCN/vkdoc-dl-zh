- en: Figure [5-17](#Fig17) depicts block operation space.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-17](#Fig17) 描述了块操作空间。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig17_HTML.png)'
  id: totrans-384
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig17_HTML.png)'
- en: Figure 5-17
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-17
- en: GeneralSupernet block operation
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: GeneralSupernet 块操作
- en: Each *n*th cell accepts one required input which is transformed by block operation
    and *n* additional inputs. Additional inputs are not required and can be zeroed
    in different subnets. The normalized sum of block operation output and additional
    inputs forms cell output. Figure [5-18](#Fig18) demonstrates examples of cell
    spaces.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 第 *n* 个单元格接受一个必需的输入，该输入通过块操作转换，并接受 *n* 个额外的输入。额外的输入不是必需的，可以在不同的子网络中置零。块操作输出和额外输入的归一化总和形成单元格输出。图
    [5-18](#Fig18) 展示了单元格空间的示例。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig18_HTML.png)'
  id: totrans-388
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig18_HTML.png)'
- en: Figure 5-18
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-18
- en: GeneralSupernet cell
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: GeneralSupernet 单元格
- en: The sequence of cells forms the GeneralSupernet, and the output of each cell
    can be the input of the subsequent cell. After every three cells, a `FactorizedReduced`
    layer is inserted. In this section, we will use a GeneralSupernet with six cells.
    Figure [5-19](#Fig19) depicts GeneralSupernet architecture.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 单元格的序列构成了 GeneralSupernet，每个单元格的输出可以是后续单元格的输入。每三个单元格之后，插入一个`FactorizedReduced`层。在本节中，我们将使用具有六个单元格的
    GeneralSupernet。图 [5-19](#Fig19) 描述了 GeneralSupernet 架构。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig19_HTML.png)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig19_HTML.png)'
- en: Figure 5-19
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-19
- en: GeneralSupernet
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: GeneralSupernet
- en: 'Let’s calculate how many subnets GeneralSupernet has: (6) × (6×2) × (6×2²)
    × (6×2³) × (6×2⁴) × (6×2⁵) = 6⁶ × 2^(1+2+3+4+5) ~ 1,500,000,000\. Of course, it
    is not possible to efficiently explore this Model Space using a Multi-trial NAS
    approach. It is also possible to use the GeneralSupernet with 9, 12, or 24 cells.
    In this case, the number of subnets will become enormous.'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算 GeneralSupernet 有多少个子网络：(6) × (6×2) × (6×2²) × (6×2³) × (6×2⁴) × (6×2⁵)
    = 6⁶ × 2^(1+2+3+4+5) ~ 1,500,000,000。当然，使用多试验 NAS 方法来有效地探索这个模型空间是不可能的。也可以使用具有
    9、12 或 24 个单元格的 GeneralSupernet。在这种情况下，子网络的数量将变得极其庞大。
- en: There are a lot of predefined Supernets for One-shot NAS that are aimed at solving
    a specific class of problems. And GeneralSupernet we defined earlier is one of
    the simplest. Let’s implement GeneralSupernet and run One-shot NAS on the CIFAR-10
    dataset.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多预定义的 One-shot NAS Supernets，旨在解决特定类别的问题。我们之前定义的 GeneralSupernet 是其中最简单的一个。让我们实现
    GeneralSupernet 并在 CIFAR-10 数据集上运行 One-shot NAS。
