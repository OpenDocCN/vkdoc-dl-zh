- en: And here, we again face the problem that there is no unique approach for solving
    any situation, and the No Free Lunch theorem applies here as well. But understanding
    how each algorithm acts will help you make the right choice for solving a particular
    problem.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 而在这里，我们再次面临没有解决任何情况唯一方法的问题，并且无免费午餐定理也适用于此处。但了解每个算法如何行动将有助于你为解决特定问题做出正确的选择。
- en: Summary
  id: totrans-554
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'One-shot NAS is a very promising area of ​​study. It allows you to find neural
    network solutions in a reasonable time. Currently, One-shot algorithms can discover
    completely new architectural keys to solve the most complex problems. This field
    is developing rapidly and will be a handy tool in any researcher’s toolkit. In
    this chapter, we introduced the basic concepts of One-shot NAS and mastered using
    two of its algorithms: ENAS and DARTS. This can be a good starting point for putting
    One-shot NAS into practice. In the next chapter, we will consider the important
    problem of model compression, which allows you to eliminate unnecessary neural
    network elements without losing its accuracy.'
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性NAS是一个非常有前景的研究领域。它允许你在合理的时间内找到神经网络解决方案。目前，一次性算法可以发现完全新的架构关键点来解决最复杂的问题。这个领域正在快速发展，并将成为任何研究人员工具箱中的便捷工具。在本章中，我们介绍了一次性NAS的基本概念，并掌握了其两种算法：ENAS和DARTS。这可以是一个将一次性NAS付诸实践的良好起点。在下一章中，我们将考虑模型压缩这个重要问题，这允许你在不损失其准确性的情况下消除不必要的神经网络元素。
