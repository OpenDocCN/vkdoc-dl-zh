- en: '`call` method accepts `mask` parameter, which activates candidate layer in
    a `sum` merge operation. The `mask` parameter is not passed in the training mode,
    and all candidates are summed:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '`call` 方法接受 `mask` 参数，该参数在 `sum` 合并操作中激活候选层。`mask` 参数在训练模式下未传递，所有候选层都被相加：'
- en: '[PRE16]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'But in evaluation mode, we pass `mask` parameter and activate only particular
    layers:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
