- en: Figure [5-21](#Fig21) visualizes the result returned by DARTS.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-21](#Fig21) 展示了 DARTS 返回的结果。
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig21_HTML.png)'
  id: totrans-529
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig21_HTML.png)'
- en: Figure 5-21
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-21
- en: DARTS GeneralSupernet best architecture
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: DARTS GeneralSupernet 最佳架构
- en: The architectures obtained using ENAS (Figure [5-20](#Fig20)) and DARTS (Figure-21)
    are similar. They tend to use the `SepConvBranch(5)` operation and share `Cell0`
    output. ENAS best architecture and DARTS best architecture achieve 91.2% and 92.8%
    accuracy, respectively. But we can further improve the accuracy if we increase
    the number of cells (`num_cells`) in the GeneralSupernet. This will make the search
    longer, but it will result in a more accurate target architecture. The beautiful
    thing is that we can use the same GeneralSupernet and One-shot algorithm for any
    pattern recognition problem. This gives us a universal approach to solving typical
    deep learning problems. Absolutely One-shot NAS is one of the most significant
    achievements of automated deep learning.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ENAS (图 [5-20](#Fig20)) 和 DARTS (图-21) 获得的架构相似。它们倾向于使用 `SepConvBranch(5)`
    操作并共享 `Cell0` 输出。ENAS 最佳架构和 DARTS 最佳架构分别达到 91.2% 和 92.8% 的准确率。但如果我们增加 GeneralSupernet
    中的细胞数量 (`num_cells`)，可以进一步提高准确率。这将使搜索时间更长，但将导致更精确的目标架构。美妙的是，我们可以使用相同的 GeneralSupernet
    和 One-shot 算法来解决任何模式识别问题。这为我们解决典型的深度学习问题提供了一个通用方法。绝对的一步 NAS 是自动深度学习最显著的成就之一。
- en: HPO vs. Multi-trial NAS vs. One-Shot NAS
  id: totrans-533
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: HPO 与多试验 NAS 与 One-Shot NAS
- en: 'And so, at the moment, we have three different approaches to optimize and construct
    deep learning models: HPO, Multi-trial NAS, and One-shot NAS. And a fair question
    may arise: which method is better to choose? But this question does not have a
    clear answer. Each approach is better suited for a specific task.'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，目前我们有三种不同的方法来优化和构建深度学习模型：HPO、多试验 NAS 和 One-shot NAS。一个公平的问题可能随之而来：哪种方法更好？但这个问题没有明确的答案。每种方法更适合特定的任务。
- en: '**HPO** deals with black-box optimization and is suitable for selecting optimization
    algorithms, training batch size, and tuning the predesigned model. HPO results
    can be visualized and easily analyzed. HPO can be a good starting point to dive
    into a completely new problem or a good finishing point when the final tuning
    is performed.'
  id: totrans-535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**HPO** 处理黑盒优化，适用于选择优化算法、训练批量大小以及调整预设计的模型。HPO 的结果可以可视化并易于分析。HPO 可以是深入一个全新的问题或当进行最终调整时的一个良好的终点。'
- en: '**Multi-trial NAS** is only concerned with finding the optimal architecture.
    Despite its durability, Multi-trial NAS is more accurate than One-shot NAS. Multi-trial
    NAS results are much easier to interpret because this approach provides metrics
    for each tried architecture.'
  id: totrans-536
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多试验 NAS** 只关注寻找最佳架构。尽管其耐用性，但多试验 NAS 的准确率高于 One-shot NAS。多试验 NAS 的结果更容易解释，因为这种方法为每个尝试的架构提供了指标。'
- en: '**One-shot NAS** is well suited for finding complex architectures for very
    tough tasks. One-shot NAS is good at finding optimal subnets in Model Space with
    millions and billions of elements. It is fast, but it is hard to interpret because
    you get only the best subnet, and you don’t know any additional information about
    another possible solution.'
  id: totrans-537
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一次性NAS**非常适合寻找非常困难任务的复杂架构。一次性NAS擅长在包含数百万和数十亿元素的模型空间中找到最优子网。它速度快，但难以解释，因为你只得到最佳子网，而不知道任何关于其他可能解决方案的额外信息。'
