  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将创建一个普通的Multi-trial NAS。脚本[5-1](#PC1)（TensorFlow实现）和脚本[5-2](#PC3)（PyTorch实现）实现了图[5-1](#Fig1)中显示的模型。
