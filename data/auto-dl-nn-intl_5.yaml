- en: According to Table [5-1](#Tab1), the best candidate is (`Conv5×5, Conv5×5`).
    Well, we tried every neural design candidate and found the most suitable one for
    the MNIST problem. Of course, the Multi-trial NAS we implemented earlier is quite
    simple, but that’s how all Multi-trial approaches act in general.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 [5-1](#Tab1) 表，最佳候选是 (`Conv5×5, Conv5×5`)。嗯，我们尝试了每个神经网络设计候选，并找到了最适合 MNIST
    问题的那个。当然，我们之前实现的多次试验 NAS 很简单，但这就是所有多次试验方法的一般行为。
- en: But for now, let’s try to get the same result using the One-shot NAS approach!
    First, we create the Supernet model depicted in Figure [5-2](#Fig2) (in Listing
    [5-5](#PC13) [TensorFlow implementation] and Listing [5-6](#PC19) [PyTorch implementation]).
  id: totrans-67
