    We can perform the convolution with the code
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑核 ![$$ {\mathfrak{I}}_V $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq13.png)。我们可以使用以下代码进行卷积
