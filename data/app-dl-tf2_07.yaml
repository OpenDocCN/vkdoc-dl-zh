  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Figure [7-10](#Fig10) shows the original matrix (on the left) and the output
    of the convolution on the right. The convolution with the kernel ![$$ {\mathfrak{I}}_V
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq14.png) has clearly
    detected the sharp transition in the original matrix, marking with a vertical
    black line where the transition from black to white happens. For example, consider
    *B*[11] = 0
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [7-10](#Fig10) 展示了原始矩阵（在左侧）和卷积的输出（在右侧）。使用核 ![$$ {\mathfrak{I}}_V $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq14.png)
    的卷积清楚地检测到了原始矩阵中的尖锐过渡，用垂直的黑线标记了从黑色到白色的过渡位置。例如，考虑 *B*[11] = 0
- en: '![$$ {\displaystyle \begin{array}{l}{B}_{11}=\left(\begin{array}{ccc}10&amp;
    10&amp; 10\\ {}10&amp; 10&amp; 10\\ {}10&amp; 10&amp; 10\end{array}\right)\ast
    {\mathfrak{I}}_V=\left(\begin{array}{ccc}10&amp; 10&amp; 10\\ {}10&amp; 10&amp;
    10\\ {}10&amp; 10&amp; 10\end{array}\right)\ast \left(\begin{array}{ccc}1&amp;
    0&amp; -1\\ {}1&amp; 0&amp; -1\\ {}1&amp; 0&amp; -1\end{array}\right)\\ {}=10\times
    1+10\times 0+10\times -1+10\times 1+10\times 0+10\times -1+10\times 1+10\times
    0+10\times -1=0\end{array}} $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equah.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![计算结果](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equah.png)'
- en: Note that in the input matrix
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 注意在输入矩阵中
- en: '![$$ \left(\begin{array}{ccc}10&amp; 10&amp; 10\\ {}10&amp; 10&amp; 10\\ {}10&amp;
    10&amp; 10\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equai.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equai.png)'
- en: there is no transition, as all the values are the same. On the contrary, if
    you consider *B*[13], you need to consider this region of the input matrix
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有过渡，因为所有值都相同。相反，如果你考虑*B*[13]，你需要考虑输入矩阵的这个区域
- en: '![$$ \left(\begin{array}{ccc}10&amp; 10&amp; 0\\ {}10&amp; 10&amp; 0\\ {}10&amp;
    10&amp; 0\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equaj.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equaj.png)'
- en: where there is a clear transition, since the right-most column is made up of
    0s, and the rest are 10s. Now you get a different result
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里有一个明显的过渡，因为最右侧的列由0组成，其余的是10。现在你得到了不同的结果
- en: '![$$ {\displaystyle \begin{array}{l}{B}_{11}=\left(\begin{array}{ccc}10&amp;
    10&amp; 0\\ {}10&amp; 10&amp; 0\\ {}10&amp; 10&amp; 0\end{array}\right)\ast {\mathfrak{I}}_V=\left(\begin{array}{ccc}10&amp;
    10&amp; 0\\ {}10&amp; 10&amp; 0\\ {}10&amp; 10&amp; 0\end{array}\right)\ast \left(\begin{array}{ccc}1&amp;
    0&amp; -1\\ {}1&amp; 0&amp; -1\\ {}1&amp; 0&amp; -1\end{array}\right)\\ {}=10\times
    1+10\times 0+0\times -1+10\times 1+10\times 0+0\times -1+10\times 1+10\times 0+0\times
    -1=30\end{array}} $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equak.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equak.png)'
- en: As soon as there is a big change in values along the horizontal direction, this
    is how the convolution will return a high value since the values multiplied by
    the column with 1 in the kernel will be bigger. When there is a transition from
    small to high values along the horizontal axis, the elements multiplied by -1
    will give a result that is bigger in absolute value. Therefore the final result
    will be negative and big in absolute value. This is why this kernel can also detect
    when you pass from a light color to a darker color or vice versa. In fact, if
    you consider the opposite transition (from 0 to 10) in a hypothetical different
    matrix *A*, you would have
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦在水平方向上出现大的值变化，这就是卷积返回高值的原因，因为内核中列值为1的乘积会更大。当在水平轴上从低值过渡到高值时，乘以-1的元素将给出绝对值更大的结果。因此，最终结果将是负数且绝对值较大。这就是为什么这个核也可以检测到你从浅色过渡到深色或反之亦然。实际上，如果你考虑一个假设的不同矩阵*A*中的相反过渡（从0到10），你会得到
- en: '![$$ {\displaystyle \begin{array}{l}{B}_{11}=\left(\begin{array}{ccc}0&amp;
    10&amp; 10\\ {}0&amp; 10&amp; 10\\ {}0&amp; 10&amp; 10\end{array}\right)\ast {\mathfrak{I}}_V=\left(\begin{array}{ccc}0&amp;
    10&amp; 10\\ {}0&amp; 10&amp; 10\\ {}0&amp; 10&amp; 10\end{array}\right)\ast \left(\begin{array}{ccc}1&amp;
    0&amp; -1\\ {}1&amp; 0&amp; -1\\ {}1&amp; 0&amp; -1\end{array}\right)\\ {}=0\times
    1+10\times 0+10\times -1+0\times 1+10\times 0+10\times -1+0\times 1+10\times 0+10\times
    -1=-30\end{array}} $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equal.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equal.png)'
- en: Since this time, we move from 0 to 10 along the horizontal direction.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这次，我们在水平方向上从0移动到10。
- en: '![](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig10_HTML.jpg)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig10_HTML.jpg)'
- en: Figure 7-10
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-10
- en: The result of the convolution of the matrix ex_mat with the kernel ![$$ {\mathfrak{I}}_V
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq15.png)
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵ex_mat与核![公式](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TEX_IEq15.png)卷积的结果
- en: Note how, as expected, the output matrix is 5 × 5 since the original matrix
    is 7 × 7 and the kernel is 3 × 3.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，正如预期的那样，输出矩阵是5×5，因为原始矩阵是7×7，而核是3×3。
- en: Pooling
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 池化
- en: Pooling is the second operation that is fundamental in CNNs. This operation
    is much easier to understand than convolution. To understand it, let’s again make
    a concrete example and let’s consider what is called *max pooling*. Let’s again
    consider the 4 × 4 matrix we used in the convolution section
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 池化是 CNN 中第二个基本操作。这个操作比卷积更容易理解。为了理解它，我们再次做一个具体的例子，并考虑所谓的 *最大池化*。让我们再次考虑卷积部分中使用的
    4×4 矩阵
- en: '![$$ A=\left(\begin{array}{cccc}{a}_1&amp; {a}_2&amp; {a}_3&amp; {a}_4\\ {}{a}_5&amp;
    {a}_6&amp; {a}_7&amp; {a}_8\\ {}{a}_9&amp; {a}_{10}&amp; {a}_{11}&amp; {a}_{12}\\
    {}{a}_{13}&amp; {a}_{14}&amp; {a}_{15}&amp; {a}_{16}\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equam.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 A 的表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equam.png)'
- en: To perform max pooling, we need to define a region of size *n*[*K*] × *n*[*K*],
    analogous to what we did for convolution. Let’s consider *n*[*K*] = 2\. What we
    need to do is start in the top-left corner of our matrix *A* and select a *n*[*K*] × *n*[*K*]
    region, in our case 2 × 2 from *A*. Here we would select
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行最大池化，我们需要定义一个大小为 *n*[*K*]×*n*[*K*] 的区域，类似于我们在卷积中做的。让我们考虑 *n*[*K*] = 2。我们需要做的是从矩阵
    *A* 的左上角开始，选择一个 *n*[*K*]×*n*[*K*] 的区域，在我们的例子中是从 *A* 中选择 2×2 的区域。在这里我们会选择
- en: '![$$ \left(\begin{array}{cc}{a}_1&amp; {a}_2\\ {}{a}_5&amp; {a}_6\end{array}\right)
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equan.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵的子集表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equan.png)'
- en: or the elements marked in bold face in matrix *A* here
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 或者是矩阵 *A* 中标记为粗体的元素
- en: '![$$ A=\left(\begin{array}{cccc}{\boldsymbol{a}}_{\mathbf{1}}&amp; {\boldsymbol{a}}_{\mathbf{2}}&amp;
    {a}_3&amp; {a}_4\\ {}{\boldsymbol{a}}_{\mathbf{5}}&amp; {\boldsymbol{a}}_{\mathbf{6}}&amp;
    {a}_7&amp; {a}_8\\ {}{a}_9&amp; {a}_{10}&amp; {a}_{11}&amp; {a}_{12}\\ {}{a}_{13}&amp;
    {a}_{14}&amp; {a}_{15}&amp; {a}_{16}\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equao.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 A 的表示（粗体标记）](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equao.png)'
- en: From the elements selected, *a*[1], *a*[2], *a*[5], and *a*[6], the max pooling
    operation selects the maximum value giving a result that we will indicate with
    *B*[1]
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 从选定的元素中，*a*[1]，*a*[2]，*a*[5]，和 *a*[6]，最大池化操作将选择最大值，我们将用 *B*[1] 来表示这个结果
- en: '![$$ {B}_1=\underset{i=1,2,5,6}{\max }{a}_i $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equap.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 B1 的表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equap.png)'
- en: Then we need to shift our 2 × 2 window two columns, typically the same number
    of columns the selected region has, to the right, and select the elements marked
    in bold
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们需要将我们的 2×2 窗口向右移动两个列，通常是所选区域列数的相同数量，并选择标记为粗体的元素
- en: '![$$ A=\left(\begin{array}{cccc}{a}_1&amp; {a}_2&amp; {\boldsymbol{a}}_{\mathbf{3}}&amp;
    {\boldsymbol{a}}_{\mathbf{4}}\\ {}{a}_5&amp; {a}_6&amp; {\boldsymbol{a}}_{\mathbf{7}}&amp;
    {\boldsymbol{a}}_{\mathbf{8}}\\ {}{a}_9&amp; {a}_{10}&amp; {a}_{11}&amp; {a}_{12}\\
    {}{a}_{13}&amp; {a}_{14}&amp; {a}_{15}&amp; {a}_{16}\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equaq.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 A 的表示（粗体标记）](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equaq.png)'
- en: Or in other words the smaller matrix
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 或者换句话说，是更小的矩阵
- en: '![$$ \left(\begin{array}{cc}{a}_3&amp; {a}_4\\ {}{a}_7&amp; {a}_8\end{array}\right)
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equar.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵的子集表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equar.png)'
- en: The max pooling algorithm will then select the maximum of the values giving
    a result that we will indicate with *B*[2]
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 最大池化算法将选择这些值的最大值，我们将用 *B*[2] 来表示这个结果
- en: '![$$ {B}_2=\underset{i=3,4,7,8}{\max }{a}_i $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equas.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 B2 的表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equas.png)'
- en: At this point we cannot shift the 2 × 2 region to the right anymore, so we shift
    it two rows down and start the process again from the left side of *A*, selecting
    the elements marked in bold and getting the maximum and calling it *B*[3].
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们不能再将 2 × 2 区域向右移动了，所以我们将其向下移动两行，并从 *A* 的左侧开始再次进行这个过程，选择加粗的元素，得到最大值，并称之为
    *B*[3]。
- en: '![$$ A=\left(\begin{array}{cccc}{a}_1&amp; {a}_2&amp; {a}_3&amp; {a}_4\\ {}{a}_5&amp;
    {a}_6&amp; {a}_7&amp; {a}_8\\ {}{\boldsymbol{a}}_{\mathbf{9}}&amp; {\boldsymbol{a}}_{\mathbf{10}}&amp;
    {a}_{11}&amp; {a}_{12}\\ {}{\boldsymbol{a}}_{\mathbf{13}}&amp; {\boldsymbol{a}}_{\mathbf{14}}&amp;
    {a}_{15}&amp; {a}_{16}\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equat.png)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 A 的另一种表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equat.png)'
- en: The stride *s* in this context has the same meaning discussed in convolution.
    It is simply the number of rows or columns you move your region when selecting
    the elements. Finally, we select the last region 2 × 2 in the bottom-lower part
    of *A*, selecting the elements *a*[11], *a*[12], *a*[15], and *a*[16]. We then
    get the maximum, and we call it *B*[4]. With the values we obtain in this process,
    in the example the four values *B*[1], *B*[2], *B*[3], and *B*[4], we will build
    an output tensor
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个上下文中，步长 *s* 与卷积中讨论的含义相同。它只是选择元素时移动区域行或列的数量。最后，我们在 *A* 的底部左下角选择最后一个 2 × 2
    区域，选择元素 *a*[11]、*a*[12]、*a*[15] 和 *a*[16]。然后我们得到最大值，我们称之为 *B*[4]。在这个过程中我们获得的所有值，例如，示例中的四个值
    *B*[1]、*B*[2]、*B*[3] 和 *B*[4]，我们将构建一个输出张量
- en: '![$$ B=\left(\begin{array}{cc}{B}_1&amp; {B}_2\\ {}{B}_3&amp; {B}_4\end{array}\right)
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equau.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 B 的表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equau.png)'
- en: In the example, we have *s* = 2\. Basically, this operation takes as input a
    matrix *A*, a stride *s*, and a kernel size *n*[*K*] (the dimension of the region
    we selected in the example before) and returns a new matrix *B* with dimensions
    given by the same formula we discussed for convolution
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在示例中，我们有 *s* = 2。基本上，这个操作以矩阵 *A*、步长 *s* 和核大小 *n*[*K*]（我们在示例中选择的区域的尺寸）作为输入，并返回一个新矩阵
    *B*，其尺寸由我们之前讨论的卷积公式给出
- en: '![$$ {n}_B=\left\lfloor \frac{n_A-{n}_K}{s}+1\right\rfloor $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equav.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {n}_B=\left\lfloor \frac{n_A-{n}_K}{s}+1\right\rfloor $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equav.png)'
- en: To reiterate, the idea is to start at the top-left of your matrix *A*, take
    a region of dimensions *n*[*K*] × *n*[*K*], apply the max function to the selected
    elements, then shift the region of *s* elements toward the right. Then select
    a new region of dimensions *n*[*K*] × *n*[*K*], apply the function to its values,
    and so on. Figure [7-11](#Fig11) shows how you select the elements from matrix
    *A* with stride *s* = 2.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，思路是从矩阵 *A* 的左上角开始，取一个尺寸为 *n*[*K*] × *n*[*K*] 的区域，对选定的元素应用最大函数，然后将 *s* 个元素的区域向右移动。然后选择一个新的尺寸为
    *n*[*K*] × *n*[*K*] 的区域，对其值应用函数，依此类推。图 [7-11](#Fig11) 展示了如何从矩阵 *A* 中选择元素，步长 *s* = 2。
- en: '![](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig11_HTML.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图 7-11 的图片](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig11_HTML.jpg)'
- en: Figure 7-11
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-11
- en: A visualization of pooling with stride *s* = 2
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 步长 *s* = 2 的池化可视化
- en: For example, applying max pooling to the input *A*
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，对输入 *A* 应用最大池化
- en: '![$$ A=\left(\begin{array}{cccc}1&amp; 3&amp; 5&amp; 7\\ {}4&amp; 5&amp; 11&amp;
    3\\ {}4&amp; 1&amp; 21&amp; 6\\ {}13&amp; 15&amp; 1&amp; 2\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equaw.png)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 A 的表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equaw.png)'
- en: will get you the results (which are very easy to verify)
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 将得到结果（这些结果很容易验证）
- en: '![$$ B=\left(\begin{array}{cc}4&amp; 11\\ {}15&amp; 21\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equax.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵 B 的最终表示](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equax.png)'
- en: Since 4 is the maximum of the values marked in bold
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 4 是加粗标记的值中的最大值
- en: '![$$ A=\left(\begin{array}{cccc}\mathbf{1}&amp; \mathbf{3}&amp; 5&amp; 7\\
    {}\mathbf{4}&amp; \mathbf{5}&amp; 11&amp; 3\\ {}4&amp; 1&amp; 21&amp; 6\\ {}13&amp;
    15&amp; 1&amp; 2\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equay.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![$$ A=\left(\begin{array}{cccc}\mathbf{1}&amp; \mathbf{3}&amp; 5&amp; 7\\
    {}\mathbf{4}&amp; \mathbf{5}&amp; 11&amp; 3\\ {}4&amp; 1&amp; 21&amp; 6\\ {}13&amp;
    15&amp; 1&amp; 2\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equay.png)'
- en: 11 is the maximum of the values marked in bold
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 11是标记为粗体的值的最大值
- en: '![$$ A=\left(\begin{array}{cccc}1&amp; 3&amp; \mathbf{5}&amp; \mathbf{7}\\
    {}4&amp; 5&amp; \mathbf{11}&amp; \mathbf{3}\\ {}4&amp; 1&amp; 21&amp; 6\\ {}13&amp;
    15&amp; 1&amp; 2\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equaz.png)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
  zh: '![$$ A=\left(\begin{array}{cccc}1&amp; 3&amp; \mathbf{5}&amp; \mathbf{7}\\
    {}4&amp; 5&amp; \mathbf{11}&amp; 3\\ {}4&amp; 1&amp; 21&amp; 6\\ {}13&amp; 15&amp;
    1&amp; 2\end{array}\right) $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equaz.png)'
- en: and so on. It’s worth mentioning another way of doing pooling, although not
    as widely used as max pooling, and that’s *average pooling*. Instead of returning
    the maximum of the selected values, it returns the average.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 以及等等。值得一提的是另一种池化方法，尽管不如最大池化广泛使用，那就是*平均池化*。它不是返回所选值的最大值，而是返回平均值。
- en: Note
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The most common pooling operation is max pooling. Average pooling is not as
    widely used, but can be found in specific network architectures.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的池化操作是最大池化。平均池化不如最大池化广泛使用，但可以在特定的网络架构中找到。
- en: Padding
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 填充
- en: 'Sometimes, when dealing with images, it’s not optimal to get a result from
    a convolution operation that has dimensions that are different than the original
    image. In that case, you do what is called “padding .” Basically, the idea is
    very simple: it consists of adding rows of pixels to the top and bottom and to
    the columns of pixels on the right and on the left of the final images, which
    are filled with values to make the resulting matrices the same size of the original
    one. Some strategies are filling the added pixels with zeros, with the values
    of the closest pixels, and so on. For example, in our example the `ex_out` matrix,
    zero-padding would look like this'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，在处理图像时，从卷积操作得到的结果维度与原始图像不同并不总是最优的。在这种情况下，你会进行所谓的“填充”。基本上，这个想法非常简单：它包括在最终图像的顶部和底部以及右侧和左侧的像素行中添加像素行，并用值填充以使结果矩阵与原始矩阵大小相同。一些策略包括用零填充添加的像素，用最接近像素的值填充，等等。例如，在我们的`ex_out`矩阵示例中，零填充看起来是这样的
- en: '[PRE12]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The use and reasons behind padding goes beyond the scope of this book, but it’s
    important to know that this exists. Only as a reference, if you use padding *p*
    (the width of the rows and the columns you use as padding), the final dimensions
    of the matrix *B*, in case of convolution and pooling, is given by
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 填充的使用和背后的原因超出了本书的范围，但重要的是要知道这一点。仅作为参考，如果你使用填充*p*（用作填充的行和列的宽度），在卷积和池化的情况下，矩阵*B*的最终维度由以下公式给出
- en: '![$$ {n}_B=\left\lfloor \frac{n_A+2p-{n}_K}{s}+1\right\rfloor $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equba.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {n}_B=\left\lfloor \frac{n_A+2p-{n}_K}{s}+1\right\rfloor $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equba.png)'
- en: Note
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'When dealing with real images, you always have color images, coded in three
    channels: RGB. That means that you need to do convolution and pooling in three
    dimensions: width, height, and color channel. This will add a layer of complexity
    to the algorithms.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理真实图像时，你总是有彩色图像，编码在三个通道中：RGB。这意味着你需要对宽度、高度和颜色通道进行卷积和池化。这将给算法增加一个复杂性层。
- en: Building Blocks of a CNN
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CNN的构建块
- en: Basically, convolutions and pooling operations are used to build the layers
    used in CNNs. In CNNs, you can typically find the following layers
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，卷积和池化操作用于构建CNN中使用的层。在CNN中，你通常可以找到以下层
- en: Convolutional layers
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层
- en: Pooling layers
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 池化层
- en: Fully connected layers
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全连接层
- en: 'Fully connected layers are exactly what you have already seen in all previous
    chapters: a layer where neurons are connected to all neurons of previous and subsequent
    layers. You know them already. But the first two require some additional explanation.'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 完全连接层正是你在所有前面的章节中已经看到过的：一个神经元连接到前一层和后一层所有神经元的层。你已经熟悉它们了。但前两个需要一些额外的解释。
- en: Convolutional Layers
  id: totrans-202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 卷积层
- en: A convolutional layer takes as input a tensor (it can be three-dimensional,
    due to the three color channels). For example, an image of certain dimensions.
    It then applies a certain number of kernels, typically 10, 16, or even more, adds
    a bias, applies the ReLU activation functions (for example) to introduce non-linearity
    to the result of the convolution, and produces an output matrix, *B*. If you remember
    the notation we used in the previous chapters, the result of the convolution will
    have the role of *W*^([*l*])*Z*^([*l* − 1]), which we discussed in Chapter [3](463356_2_En_3_Chapter.xhtml).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积层以张量（由于有三个颜色通道，它可以是三维的）作为输入。例如，一个特定维度的图像。然后它应用一定数量的核，通常是 10、16 或更多，添加一个偏差，应用
    ReLU 激活函数（例如）以将非线性引入卷积的结果，并产生一个输出矩阵，*B*。如果你记得我们在前几章中使用的符号，卷积的结果将扮演 *W*^([*l*])*Z*^([*l* − 1])
    的角色，我们在第 [3](463356_2_En_3_Chapter.xhtml) 章讨论过。
- en: In the previous sections, we saw some examples of applying convolutions with
    just one kernel. How can you apply several kernels at the same time? Well, the
    answer is very simple. The final tensor (now we use the word tensor since it will
    not be a simple matrix anymore) *B* will have not two dimensions but three. Let’s
    indicate the number of kernels you want to apply with *n*[*c*] (the *c* is used
    since sometimes people talk about channels). *You simply apply each filter to
    the input independently and stack the results.* So instead of a single matrix
    *B* with dimensions *n*[*B*] × *n*[*B*], you get a final tensor ![$$ \overset{\sim
    }{B} $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq16.png)
    of dimensions *n*[*B*] × *n*[*B*] × *n*[*c*]. That means that
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们看到了使用单个核应用卷积的一些示例。如何同时应用多个核呢？答案非常简单。最终的张量（现在我们使用“张量”这个词，因为它将不再是一个简单的矩阵）*B*
    将有三个维度而不是两个。让我们用 *n*[*c*]（*c* 被使用，因为有时人们会谈论通道）来表示你想要应用的核的数量。*你只需独立地将每个滤波器应用于输入，并将结果堆叠起来即可。*
    所以，你不会得到一个维度为 *n*[*B*] × *n*[*B*] 的单个矩阵 *B*，而是得到一个维度为 *n*[*B*] × *n*[*B*] × *n*[*c*]
    的最终张量 ![$$ \overset{\sim }{B} $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq16.png)。这意味着
- en: '![$$ {\overset{\sim }{B}}_{i,j,1}\kern1em \forall i,j\in \left[1,{n}_B\right]
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equbb.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\overset{\sim }{B}}_{i,j,1}\kern1em \forall i,j\in \left[1,{n}_B\right]
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equbb.png)'
- en: will be the output of convolution of the input image with the first kernel.
    And
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 将是输入图像与第一个核的卷积输出。并且
- en: '![$$ {\overset{\sim }{B}}_{i,j,2}\kern1em \forall i,j\in \left[1,{n}_B\right]
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equbc.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\overset{\sim }{B}}_{i,j,2}\kern1em \forall i,j\in \left[1,{n}_B\right]
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equbc.png)'
- en: will be the output of convolution with the second kernel, and so on. The convolution
    layer is nothing more than something that transforms the input into an output
    tensor. But what are the weights in this layer? *The weights, or the parameters
    that the network learns during the training phase, are the elements of the kernel
    themselves.* We discussed that we have *n*[*c*] kernels, each of *n*[*K*] × *n*[*K*]
    dimensions. That means that we have ![$$ {n}_K^2{n}_c $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq17.png)
    *parameters in a convolutional layer*.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 将是第二个核的卷积输出，依此类推。卷积层不过是将输入转换为输出张量的东西。但这个层中的权重是什么？*权重，或者说网络在训练阶段学习的参数，就是核本身的元素.*
    我们讨论过，我们有 *n*[*c*] 个核，每个核的维度是 *n*[*K*] × *n*[*K*]。这意味着在一个卷积层中有 ![$$ {n}_K^2{n}_c
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq17.png) 个 *参数*。
- en: Note
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The number of parameters that you have in a convolutional layer, ![$$ {n}_K^2{n}_c
    $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq18.png), is independent
    of the input image size. This fact helps reduce overfitting, especially when dealing
    with large input images.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 在卷积层中你拥有的参数数量，![$$ {n}_K^2{n}_c $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_IEq18.png)，与输入图像的大小无关。这个事实有助于减少过拟合，尤其是在处理大输入图像时。
- en: Sometimes this layer is indicated with the word *CONV* and then a number. In
    our case, we could call this layer CONV1\. Figure [7-12](#Fig12) shows a representation
    of a convolutional layer. The input image gets transformed by applying convolution
    with *n*[*c*] kernels in a tensor of dimensions *n*[*A*] × *n*[*A*] × *n*[*c*].
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 有时这个层可以用单词 *CONV* 后跟一个数字来表示。在我们的例子中，我们可以把这个层称为 CONV1。图 [7-12](#Fig12) 展示了一个卷积层的表示。输入图像通过应用
    *n*[*c*] 个核在维度为 *n*[*A*] × *n*[*A*] × *n*[*c*] 的张量中进行卷积而变换。
- en: '![](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig12_HTML.jpg)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig12_HTML.jpg)'
- en: Figure 7-12
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-12
- en: A representation of a convolutional layer^([1](#Fn1))
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积层的表示^([1](#Fn1))
- en: 'Of course, a convolutional layer must not necessarily be placed immediately
    after the inputs. A convolutional layer may get as input the output of any other
    layer of course. Keep in mind that your input image will usually have dimensions
    *n*[*A*] × *n*[*A*] × 3, since an image in color has three channels: Red, Green,
    and Blue. A complete analysis of the tensors involved in a CNN when considering
    color images goes beyond the scope of this book. Very often in diagrams, the layer
    is simply indicated as a cube or a square.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，卷积层不一定必须紧跟在输入之后。卷积层当然可以接收任何其他层的输出作为输入。请记住，您的输入图像通常具有维度 *n*[*A*] × *n*[*A*]
    × 3，因为彩色图像有三个通道：红色、绿色和蓝色。在考虑彩色图像时，CNN中涉及的张量的完整分析超出了本书的范围。在图中，层通常简单地表示为一个立方体或一个正方形。
- en: Pooling Layers
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 池化层
- en: 'A pooling layer is usually indicated with *POOL* and a number: for example,
    POOL1\. It takes as input a tensor and gives as output another tensor after applying
    pooling to the input.'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 常用 *POOL* 和一个数字来表示池化层：例如，POOL1。它接收一个张量作为输入，并在对输入应用池化后输出另一个张量。
- en: Note
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'A pooling layer has no parameter to learn, but it introduces additional hyper-parameters:
    *n*[*K*] and stride *s*. Typically, in pooling layers you do not use padding,
    since one of the reasons to use pooling is to reduce the dimensionality of the
    tensors.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 池化层没有参数可以学习，但它引入了额外的超参数：*n*[*K*] 和步长 *s*。通常，在池化层中不使用填充，因为使用池化的一个原因就是减少张量的维度。
- en: Stacking Layers Together
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 堆叠层
- en: In CNNs, you often stack convolutional and pooling layers together, one after
    the other. Figure [7-13](#Fig13) shows a convolutional and a pooling layer stack.
    A convolutional layer is always followed by a pooling layer. Sometimes the two
    together are called a layer. The reason is that a pooling layer has no learnable
    weights and therefore it is simply seen as a simple operation that is associated
    with the convolutional layer. So be aware when you read papers or blogs and be
    sure you understand their intentions.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在CNN中，您通常会堆叠卷积和池化层，一个接一个。图 [7-13](#Fig13) 展示了一个卷积和池化层堆叠。卷积层总是后面跟着一个池化层。有时这两个一起被称为一个层。原因是池化层没有可学习的权重，因此它被视为与卷积层相关联的简单操作。所以当您阅读论文或博客时，要小心，确保您理解他们的意图。
- en: '![](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig13_HTML.jpg)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig13_HTML.jpg)'
- en: Figure 7-13
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-13
- en: A representation of how to stack convolutional and pooling layers
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如何堆叠卷积和池化层的表示
- en: To conclude this part on CNNs, Figure [7-14](#Fig14) shows an example of a CNN.
    Figure [7-14](#Fig14) is an example like the very famous LeNet-5 network[1]. You
    have the inputs, then two convolution-pooling layers, then three fully connected
    layers, and then an output layer. This is where you may have your softmax function,
    if, for example, you perform multiclass classification. We included some numbers
    in the figure to give you an idea of the size of the different layers.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 为了总结CNN的部分，图 [7-14](#Fig14) 展示了一个CNN的示例。图 [7-14](#Fig14) 是一个非常著名的LeNet-5网络的示例[1]。您有输入，然后是两个卷积-池化层，然后是三个全连接层，最后是输出层。这就是您可能放置softmax函数的地方，如果您进行多类分类的话。我们在图中添加了一些数字，以给您不同层的大小提供一个概念。
- en: '![](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig14_HTML.png)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_7_Chapter/463356_2_En_7_Fig14_HTML.png)'
- en: Figure 7-14
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-14
- en: A representation of a CNN similar to the LeNet-5 network
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于LeNet-5网络的CNN表示
- en: An Example of a CNN
  id: totrans-229
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CNN的一个示例
- en: 'Let’s try to build a network to give you a feeling of how the process works
    and what the code looks like. We will not do any hyper-parameter tuning or optimization
    to keep the section understandable. We will build the following architecture with
    the following layers, in this order:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试构建一个网络，让您对这个过程的工作方式和代码的样子有一个感觉。我们将不会进行任何超参数调整或优化，以保持本节易于理解。我们将按照以下顺序使用以下层构建以下架构：
- en: 'Convolution layer 1 (CONV1): Six filters 5 × 5, stride *s* = 1.'
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层1（CONV1）：六个5 × 5的过滤器，步长 *s* = 1。
- en: We then apply ReLU to the output of the previous layer.
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后我们对前一层的输出应用ReLU。
- en: Max pooling layer 1 (POOL1) with a window 2 × 2, stride *s* = 2.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1个最大池化层（POOL1）窗口大小为2 × 2，步长 *s* = 2。
- en: 'Convolution layer 2 (CONV2): 16 filters 5 × 5, stride *s* = 1.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层2（CONV2）：16个5 × 5的过滤器，步长 *s* = 1。
- en: We then apply ReLU to the output of the previous layer.
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后我们将ReLU应用于前一层的结果。
- en: Max pooling layer 2 (POOL2) with a window 2 × 2, stride *s* = 2.
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有2×2窗口和步长*s* = 2的最大池化层2（POOL2）。
- en: Fully Connected Layer with 128 neurons with activation function ReLU.
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有128个神经元的全连接层，激活函数为ReLU。
- en: Fully Connected Layer with ten neurons for classification of the Zalando dataset.
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有10个神经元的全连接层，用于Zalando数据集的分类。
- en: Softmax output neuron.
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软max输出神经元。
- en: We import the Zalando dataset
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 我们导入Zalando数据集
- en: '[PRE13]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Check there if you do not remember the dataset’s details. Let’s prepare the
    data (reshaping the samples and one-hot encoding the labels):'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不记得数据集的细节，请检查那里。让我们准备数据（重塑样本和独热编码标签）：
- en: '[PRE14]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: and
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 和
- en: '[PRE15]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Note that in this case, we use as network’s inputs tensors of dimensions `(number_of_images,
    image_height, image_width, color_channels)`. Since the Zalando dataset is made
    up of gray values images, the `color_channels` will be equal to 1\. Each observation
    is in a row (since feed-forward neural networks take as input *flattened* tensors).
    If you check the dimensions with the code
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在这种情况下，我们使用网络输入的张量维度为`(number_of_images, image_height, image_width, color_channels)`。由于Zalando数据集由灰度值图像组成，`color_channels`将等于1。每个观察值都在一行中（因为前馈神经网络将*展平*的张量作为输入）。如果你用代码检查维度
- en: '[PRE16]'
  id: totrans-247
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: You will get the results
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 你将得到结果
- en: '[PRE17]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: We need to normalize the data
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要规范化数据
- en: '[PRE18]'
  id: totrans-251
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: We can now start to build our network. With Keras, creating and training a CNN
    model is straightforward; the following function defines the network’s architecture
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以开始构建我们的网络。使用Keras，创建和训练CNN模型非常简单；以下函数定义了网络的架构
- en: '[PRE19]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Remember that the convolutional layer will require the two-dimensional image,
    and not a flattened list of gray values of the pixels.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，卷积层将需要二维图像，而不是像素灰度值的展平列表。
- en: Note
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: One of the biggest advantages of CNNs is that they use the two-dimensional information
    contained in the input image, this is why the input of convolutional layers are
    two-dimensional images, and not a flattened vector.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: CNN的最大优点之一是它们使用了输入图像中包含的二维信息，这就是为什么卷积层的输入是二维图像，而不是展平的向量。
- en: 'When building CNNs in Keras, a single line of code (and a Keras method) will
    correspond to a different layer. The `build_model` function creates a CNN stacking
    `Conv2D` (which builds a convolutional layer) and `MaxPooling2D` (which builds
    a max pooling layer) layers. The stride is a tuple since it gives the stride in
    different dimensions (for rows and columns). In our examples we have gray images,
    but we could also have RGB, for example. That would mean having more dimensions:
    the three color channels.'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 在Keras中构建CNN时，一行代码（以及一个Keras方法）将对应于不同的层。`build_model`函数创建了一个CNN堆叠的`Conv2D`层（构建卷积层）和`MaxPooling2D`层（构建最大池化层）。步长是一个元组，因为它给出了不同维度上的步长（对于行和列）。在我们的例子中，我们有灰度图像，但也可以是RGB，例如。这意味着将有更多的维度：三个颜色通道。
- en: 'Let’s display the architecture of the model so far, using `model.summary()`:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用`model.summary()`显示到目前为止的模型架构：
- en: '[PRE20]'
  id: totrans-259
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Note that the output of every convolutional and pooling layer is a 3D tensor
    of shape `(height, width, number_of_filters)`. The first dimension (i.e., the
    number of batches), is set to `None` since the network does not know it yet and
    thus it can be applied to every set of samples, of any length. The width and height
    dimensions decrease as you go deeper into the network. The number of output channels
    for each `Conv2D` layer is controlled by the first function argument. Typically,
    as the width and height decrease, you can afford (computationally) to add more
    output filters to each `Conv2D` layer.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，每个卷积和池化层的输出都是一个形状为`(height, width, number_of_filters)`的3D张量。第一个维度（即批次的数量），设置为`None`，因为网络还不知道它，因此它可以应用于任何长度的样本集。随着网络深度的增加，宽度和高度维度会减小。每个`Conv2D`层的输出通道数由第一个函数参数控制。通常，随着宽度和高度减小，你可以（在计算上）为每个`Conv2D`层添加更多的输出滤波器。
- en: To complete the model, we added two `Dense` layers. They take vectors as input
    (which are 1D), while the current output is a 3D tensor. This is why you first
    need to flatten the 3D output to 1D, then add one or more `Dense` layers on top.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 为了完成模型，我们添加了两个`Dense`层。它们以向量作为输入（这些是1维的），而当前的输出是一个3维张量。这就是为什么你首先需要将3维输出展平为1维，然后在上层添加一个或多个`Dense`层。
- en: Now it’s time to train and test our network. We will use mini-batch gradient
    descent with a batch size of 100 and we will train our network for ten epochs.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候训练和测试我们的网络了。我们将使用批大小为100的迷你批梯度下降，并将网络训练十个epochs。
- en: '[PRE21]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: If you run this code (it took roughly four minutes on a medium performance laptop),
    it will start, after just one epoch, with a training accuracy of 76.3%. After
    ten epochs it will reach a training accuracy of 91% (88% on the dev set). We have
    trained our network here only for ten epochs. You can get much higher accuracy
    if you train longer. Additionally, note that we have not done any hyper-parameter
    tuning so this would get you much better results if you spent time tuning the
    parameters.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你运行这段代码（在一台中等性能的笔记本电脑上大约需要四分钟），它将在仅仅一个epoch后开始，训练准确率达到76.3%。经过十个epochs后，训练准确率将达到91%（在开发集上为88%）。我们在这里只训练了十个epochs。如果你训练时间更长，可以得到更高的准确率。此外，请注意，我们还没有进行任何超参数调整，所以如果你花时间调整参数，这将得到更好的结果。
- en: 'As you may have noticed, every time you introduce a convolutional layer, you
    will introduce new hyper-parameters for each layer:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所注意到的，每次你引入一个卷积层，你将为每个层引入新的超参数：
- en: Kernel size
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内核大小
- en: Stride
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 步幅
- en: Padding
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 填充
- en: Those will need to be tuned to get optimal results. Typically, researchers tend
    to use existing architectures for specific tasks that have been already optimized
    by other practitioners and are well documented in papers.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 这些需要调整以获得最佳结果。通常，研究人员倾向于使用已经由其他从业者优化并已在论文中良好记录的现有架构来执行特定任务。
- en: Conclusion
  id: totrans-270
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: You should now have a basic understanding of how CNN networks work, and on what
    principles they work on. Convolutional neural networks are used extensively in
    multiple forms for various tasks, from classification (as you have seen here)
    to object localization, object segmentation, instance segmentation, and much more.
    This chapter just scratched the surface. But you should understand the building
    blocks of CNNs and should be able to understand how more complex architecture
    is built and structured.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在应该对CNN网络的工作原理以及它们基于什么原则有基本的了解。卷积神经网络在多种形式下被广泛用于各种任务，从分类（如你所见）到目标定位、目标分割、实例分割等等。本章只是触及了表面。但你应该理解CNN的构建块，并且应该能够理解更复杂的架构是如何构建和组织的。
- en: Exercises
  id: totrans-272
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: 'Exercise 1 (Convolution) (Level: Easy)'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 练习1（卷积）（难度：简单）
- en: 'Try to apply the different convolution operators like the ones you saw in this
    chapter, but to different images, such as the handwritten digits of the MNIST
    database ([`http://yann.lecun.com/exdb/mnist/`](http://yann.lecun.com/exdb/mnist/)).
    To download the dataset from TensorFlow, use the following lines of code:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试应用本章中看到的不同的卷积算子，但应用于不同的图像，例如MNIST数据库中的手写数字（[链接](http://yann.lecun.com/exdb/mnist/)）。要从TensorFlow下载数据集，请使用以下代码行：
- en: '[PRE22]'
  id: totrans-275
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Exercise 2 (CNN) (Level: Easy)'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 练习2（CNN）（难度：简单）
- en: Try to build a multiclass classification model like the one you saw in this
    chapter, but using the MNIST database of handwritten digits instead.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试构建一个多类分类模型，就像你在本章中看到的那样，但使用MNIST手写数字数据库。
- en: 'Exercise 3 (CNN)(Level: Medium)'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 练习3（CNN）（难度：中等）
- en: Try to change the network’s parameters to see if you can get a better accuracy.
    Change kernel size, stride, and padding.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试更改网络的参数，看看你是否可以得到更高的准确率。更改内核大小、步幅和填充。
