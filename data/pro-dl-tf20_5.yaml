    in blur font are written at the bottom
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 单位数字的10个盒子集位于顶部，底部以模糊字体书写相同的数字
- en: Figure 5-18
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-18
- en: Display of the original image followed by the reconstructed image
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 展示原始图像后跟重建图像
- en: '[PRE4]'
  id: totrans-542
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Figure [5-18](#Fig20) shows the reconstruction of the images by sparse encoders,
    while Figure [5-19](#Fig21) shows the decoder weights in the form of images. The
    weights corresponding to hidden unit layers are images being displayed in Figure
    [5-19](#Fig21). This gives you some idea as to the kind of features the sparse
    encoders are learning. The final image that is reconstructed is the linear combination
    of these images, with the hidden layer activations acting as the linear weights.
    Essentially, each of these images is detecting low-level features in the form
    of hand strokes for the written digits. In terms of linear algebra, these images
    form a basis for representing the reconstructed images.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-18](#Fig20)显示了稀疏编码器对图像的重建，而图[5-19](#Fig21)显示了以图像形式展示的解码器权重。对应于隐藏单元层的权重是图[5-19](#Fig21)中显示的图像。这让你对稀疏编码器正在学习的特征类型有所了解。重建的最终图像是这些图像的线性组合，隐藏层激活作为线性权重。本质上，每个这些图像都在检测手写数字的低级特征，以手写笔触的形式。从线性代数的角度来看，这些图像构成了表示重建图像的基。
- en: Denoising Autoencoder
  id: totrans-544
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 去噪自动编码器
- en: Denoising autoencoders works like a standard autoencoder, with nonlinear activations
    in the hidden layers, the only difference being that instead of the original input
    *x*, a noisy version of *x*, say ![$$ \tilde{x} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq27.png),
    is fed to the network. The reconstructed image at the output layer is compared
    with the actual input *x* while computing the error in reconstruction. The idea
    is that the hidden structured learned from the noisy data is rich enough to reconstruct
    the original data. Hence, this form of autoencoder can be used for reducing noise
    in the data since it learns a robust representation of the data from the hidden
    layer. For example, if an image has been blurred by some distortion, then a denoising
    autoencoder can be used to remove the blur. An autoencoder can be converted into
    a denoising autoencoder by just introducing a stochastic noise addition unit.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 去噪自动编码器的工作方式类似于标准自动编码器，隐藏层使用非线性激活，唯一的区别是，不是使用原始输入 *x*，而是使用 *x* 的噪声版本，例如 ![$$
    \tilde{x} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq27.png)，将其输入到网络中。输出层的重建图像与实际输入
    *x* 进行比较，以计算重建误差。其想法是，从噪声数据中学习到的隐藏结构足够丰富，可以重建原始数据。因此，这种形式的自动编码器可以用于减少数据中的噪声，因为它从隐藏层学习到数据的一个鲁棒表示。例如，如果一个图像被某种扭曲模糊了，那么可以使用去噪自动编码器来去除模糊。只需引入一个随机噪声添加单元，就可以将自动编码器转换为去噪自动编码器。
- en: For images, denoising autoencoders can have hidden layers as convolutional layers
    instead of standard neural units. This ensures that the topological structure
    of the image is not compromised when defining the autoencoder network.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 对于图像，去噪自动编码器可以使用卷积层作为隐藏层，而不是标准神经网络单元。这确保了在定义自动编码器网络时，图像的拓扑结构不会被破坏。
- en: A Denoising Autoencoder Implementation in TensorFlow
  id: totrans-547
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow中的去噪自动编码器实现
- en: In this section, we will work through the implementation of a denoising autoencoder
    that learns to remove noise from input images. Two kinds of noise have been introduced
    to the input images—namely, Gaussian and salt and pepper noise—and the implemented
    denoising autoencoder can remove both efficiently. The detailed implementation
    is illustrated in Listing [5-5](#PC6).
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过实现一个去噪自动编码器，该编码器学习从输入图像中去除噪声。已经将两种噪声引入到输入图像中——即高斯噪声和盐和胡椒噪声——并且实现的去噪自动编码器可以有效地去除这两种噪声。详细的实现如图
    [5-5](#PC6) 所示。
