- en: 5. Unsupervised Learning with Restricted Boltzmann Machines and Autoencoders
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 使用受限玻尔兹曼机和自编码器的无监督学习
- en: Unsupervised learning is a branch of machine learning that tries to find hidden
    structures within unlabeled data and derive insights from it. Clustering, data
    dimensionality-reduction techniques, noise reduction, segmentation, anomaly detection,
    fraud detection, and other rich methods rely on unsupervised learning to drive
    analytics. Today, with so much data around us, it is impossible to label all data
    for supervised learning. This makes unsupervised learning even more critical.
    Restricted Boltzmann machines and autoencoders are unsupervised methods that are
    based on artificial neural networks. They have a wide range of uses in data compression
    and dimensionality reduction, noise reduction from data, anomaly detection, generative
    modeling, collaborative filtering, and initialization of deep neural networks,
    among other things. We will go through these topics in detail and then touch upon
    a couple of unsupervised preprocessing techniques for images, namely, PCA (principal
    component analysis) whitening and ZCA whitening. Also, since restricted Boltzmann
    machines use sampling techniques during training, I have briefly touched upon
    Bayesian inference and Markov chain Monte Carlo sampling for reader’s benefit.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 无监督学习是机器学习的一个分支，它试图从未标记的数据中找到隐藏的结构，并从中得出见解。聚类、数据降维技术、噪声减少、分割、异常检测、欺诈检测和其他丰富的方法都依赖于无监督学习来驱动分析。如今，随着我们周围数据的激增，为监督学习标记所有数据是不可能的。这使得无监督学习变得更加关键。受限玻尔兹曼机和自编码器是基于人工神经网络的非监督方法。它们在数据压缩、降维、数据噪声减少、异常检测、生成建模、协同过滤以及深度神经网络初始化等方面有广泛的应用。我们将详细探讨这些主题，然后简要介绍两种无监督图像预处理技术，即主成分分析（PCA）白化和ZCA白化。此外，由于受限玻尔兹曼机在训练过程中使用采样技术，为了读者的方便，我简要介绍了贝叶斯推理和马尔可夫链蒙特卡洛采样。
- en: Boltzmann Distribution
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 玻尔兹曼分布
- en: 'Restricted Boltzmann machines are energy models based on the Boltzmann distribution
    law of classical physics, where the state of particles of any system is represented
    by their generalized coordinates and velocities. These generalized coordinates
    and velocities form the phase space of the particles, and the particles can be
    in any location in the phase space with specific energy and probability. Let us
    consider a classical system with *N* gas molecule particles, and let the generalized
    position and velocity of any particle be represented by *r* ∈ *R*^(3 × 1) and
    *v* ∈ *R*^(3 × 1), respectively. The location of the particle in the phase space
    can be represented by (*r*, *v*). Every such possible value of (*r*, *v*) that
    the particle can take is called a *configuration* of the particle. Further, all
    the *N* particles are identical in the sense that they are equally likely to take
    up any state. Given such a system at thermodynamic temperature *T*, the probability
    of any such configuration is as follows:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 受限玻尔兹曼机是基于经典物理学的玻尔兹曼分布定律的能量模型，其中任何系统的粒子状态由它们的广义坐标和速度表示。这些广义坐标和速度构成了粒子的相空间，粒子可以在相空间中的任何位置以特定的能量和概率存在。让我们考虑一个具有
    *N* 个气体分子粒子的经典系统，任何粒子的广义位置和速度分别用 *r* ∈ *R*^(3 × 1) 和 *v* ∈ *R*^(3 × 1) 表示。粒子在相空间中的位置可以用
    (*r*, *v*) 表示。粒子可以采取的每一个可能的 (*r*, *v*) 值都称为粒子的 *配置*。进一步，所有 *N* 个粒子在意义上是相同的，即它们以相同的可能性采取任何状态。给定这样的系统在热力学温度
    *T* 下，任何这样的配置的概率如下：
- en: '![$$ P\left(r,v\right)\propto {e}^{-\frac{E\left(r,v\right)}{KT}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equa.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![概率分布公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equa.png)'
- en: '*E*(*r*, *v*) is the energy of any particle at configuration (*r*, *v*), and
    *K* is the Boltzmann constant. Hence, we see that the probability of any configuration
    in the phase space is proportional to the exponential of the negative of the energy
    divided by the product of the Boltzmann constant and the thermodynamic temperature.
    To convert the relationship into an equality, the probability needs to be normalized
    by the sum of the probabilities of all the possible configurations. If there are
    *M* possible phase-space configurations for the particles, then the probability
    of any generalized configuration (*r*, *v*) can be expressed as follows:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '*E*(*r*, *v*) 是任何粒子在配置 (*r*, *v*) 中的能量，*K* 是玻尔兹曼常数。因此，我们看到任何配置在相空间中的概率与玻尔兹曼常数和热力学温度的乘积除以能量的指数成正比。为了将这种关系转换为等式，需要通过所有可能配置的概率之和来归一化概率。如果粒子有
    *M* 个可能的相空间配置，那么任何广义配置 (*r*, *v*) 的概率可以表示如下：'
- en: '![$$ P\left(r,v\right)=\frac{e^{-\frac{E\left(r,v\right)}{KT}}}{Z} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equb.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left(r,v\right)=\frac{e^{-\frac{E\left(r,v\right)}{KT}}}{Z} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equb.png)'
- en: 'where *Z* is the partition function given by the following:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *Z* 是由以下给出的配分函数：
- en: '![$$ Z=\sum \limits_{i=1}^M{e}^{-\frac{E\left({\left(r,v\right)}_i\right)}{KT}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equc.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Z=\sum \limits_{i=1}^M{e}^{-\frac{E\left({\left(r,v\right)}_i\right)}{KT}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equc.png)'
- en: 'There can be several values of *r* and *v* separately. However, *M* denotes
    the total number of possible unique combinations of *r* and *v*. In the preceding
    equation, we have in general represented the *i*-th unique combination of *r*
    and *v* as (*r*, *v*)[*i*]. If *r* can take up *n* distinct coordinate values
    whereas *v* can take up *m* distinct velocity values, then the total number of
    possible configurations *M* = *n* × *m*. In such cases, the partition function
    can also be expressed as follows:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*r* 和 *v* 可能分别有几个值。然而，*M* 表示 *r* 和 *v* 可能的独特组合总数。在先前的方程中，我们通常将 *r* 和 *v* 的第
    *i* 个独特组合表示为 (*r*, *v*)[*i*]。如果 *r* 可以取 *n* 个不同的坐标值，而 *v* 可以取 *m* 个不同的速度值，那么可能的总配置数
    *M* = *n* × *m*。在这种情况下，配分函数也可以表示如下：'
- en: '![$$ Z=\sum \limits_{j=1}^m\sum \limits_{i=1}^n{e}^{-\frac{E\left({r}_i,{v}_j\right)}{KT}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equd.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Z=\sum \limits_{j=1}^m\sum \limits_{i=1}^n{e}^{-\frac{E\left({r}_i,{v}_j\right)}{KT}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equd.png)'
- en: The thing to note here is that the probability of any configuration is higher
    when its associated energy is low. For the gas molecules, it’s intuitive as well
    given that high-energy states are always associated with unstable equilibrium
    and hence are less likely to retain the high-energy configuration for long. The
    particles in the high-energy configuration will always be in a pursuit to occupy
    much more stable low-energy states.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这里需要注意的是，当与其相关的能量较低时，任何配置的概率都较高。对于气体分子来说，这也是直观的，因为高能量状态总是与不稳定平衡相关联，因此不太可能长时间保持高能量配置。处于高能量配置的粒子将始终追求占据更稳定的低能量状态。
- en: 'If we consider two configurations *s*[1] = (*r*[1], *v*[1]) and *s*[2] = (*r*[2],
    *v*[2]), and if the number of gas molecules in these two states are *N*[1] and
    *N*[2], respectively, then the probability ratio of the two states is a function
    of the energy difference between the two states:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们考虑两种配置 *s*[1] = (*r*[1], *v*[1]) 和 *s*[2] = (*r*[2], *v*[2])，并且如果这两种状态中的气体分子数分别为
    *N*[1] 和 *N*[2]，那么这两种状态的概率比是两个状态之间能量差的函数：
- en: '![$$ \frac{N_1}{N_2}=\frac{P\left({r}_1,{v}_1\right)}{P\left({r}_2,{v}_2\right)}={e}^{-\frac{E\left({r}_1,{v}_1\right)-\left({r}_2,{v}_2\right)}{KT}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Eque.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{N_1}{N_2}=\frac{P\left({r}_1,{v}_1\right)}{P\left({r}_2,{v}_2\right)}={e}^{-\frac{E\left({r}_1,{v}_1\right)-\left({r}_2,{v}_2\right)}{KT}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Eque.png)'
- en: We will digress a little now and briefly discuss Bayesian inference and Markov
    chain Monte Carlo (MCMC) methods since restricted Boltzmann machines use sampling
    through MCMC techniques, especially Gibbs sampling, and some knowledge of these
    would go a long way toward helping the readers appreciate the working principles
    of restricted Boltzmann machines.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在稍微偏离一下主题，简要地讨论一下贝叶斯推理和马尔可夫链蒙特卡洛（MCMC）方法，因为受限玻尔兹曼机通过MCMC技术进行采样，特别是吉布斯采样，对这些方法的一些了解将大大有助于读者理解受限玻尔兹曼机的工作原理。
- en: 'Bayesian Inference: Likelihood, Priors, and Posterior Probability Distribution'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 贝叶斯推理：似然、先验和后验概率分布
- en: 'As discussed in Chapter [1](http://dx.doi.org/10.1007/978-1-4842-3096-1_1),
    whenever we get data, we build a model by defining a likelihood function over
    the data conditioned on the model parameters and then try to maximize that likelihood
    function. Likelihood is nothing but the probability of the seen or observed data
    given the model parameters:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如第[1](http://dx.doi.org/10.1007/978-1-4842-3096-1_1)章所述，每当获得数据时，我们通过在模型参数条件下定义一个似然函数来构建模型，然后尝试最大化这个似然函数。似然函数不过是给定模型参数的观测或观察数据的概率：
- en: '![$$ Likelihood=P\left( Data/ Model\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equf.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![似然=数据/模型概率](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equf.png)'
- en: 'To get the model defined by its parameters, we maximize the likelihood of the
    seen data:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了得到由其参数定义的模型，我们最大化观测数据的似然：
- en: '![$$ Model=\underset{Model}{\underbrace{Arg\kern0.5em \operatorname{Max}}}P\left(
    Data/ Model\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equg.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![模型=最大化数据/模型概率](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equg.png)'
- en: Since we are only trying to fit a model based on the observed data, there is
    a high chance of overfitting and not generalizing to new data if we go for simple
    likelihood maximization.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们只是在尝试根据观察到的数据来拟合一个模型，如果我们仅仅追求简单的似然最大化，那么高概率会出现过拟合，并且无法推广到新的数据。
- en: If the data size is huge, the seen data is likely to represent the population
    well, and so maximizing the likelihood may suffice. On the other hand, if the
    seen data is small, there is a high chance that it might not represent the overall
    population well, and thus the model based on likelihood would not generalize well
    to new data. In that case, having a certain prior belief over the model and constraining
    the likelihood by that prior belief would lead to better results. Let’s say our
    prior belief is in the form of knowing the probability distribution over the model
    parameters, i.e., *P*(*Model*) is known. We can in that case update our likelihood
    by the prior information to get a distribution over the model given the data.
    As per Bayes’ theorem of conditional probability,
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数据量很大，观测数据很可能很好地代表总体，因此最大化似然可能就足够了。另一方面，如果观测数据量小，它很可能不能很好地代表总体，因此基于似然的模型可能无法很好地推广到新数据。在这种情况下，对模型有一定的先验信念，并通过该先验信念约束似然，将导致更好的结果。假设我们的先验信念是以模型参数的概率分布的形式存在的，即*P*(*模型*)是已知的。在这种情况下，我们可以通过先验信息更新我们的似然，以获得给定数据的模型分布。根据贝叶斯条件概率定理，
- en: '![$$ P\left( Model/ Data\right)=\frac{P\left( Data/ Model\right)P(Model)}{P(Data)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equh.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![模型/数据概率=数据/模型概率*模型概率/数据概率](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equh.png)'
- en: '*P*(*Model*/*Data*) is called the *posterior distribution* and is generally
    more informative since it combines one’s prior knowledge about the data or model.
    Since this probability of data is independent of the model, the posterior is directly
    proportional to the product of the likelihood and the prior as shown in the following:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '*P*(*模型/数据*)被称为*后验分布*，它通常更具有信息量，因为它结合了关于数据或模型的前置知识。由于这个数据概率与模型无关，后验概率直接与似然和先验的乘积成正比，如下所示：'
- en: '![$$ P\left( Model/ Data\right)\propto P\left( Data/ Model\right)P(Model) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equi.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![模型/数据概率](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equi.png)'
- en: One can build a model by maximizing the posterior probability distribution instead
    of the likelihood. This method of obtaining the model is called maximize a posterior,
    or MAP. Both likelihood and MAP are point estimates for the models and thus don’t
    cover the whole uncertainty space. Taking the model that maximizes the posterior
    means taking the mode of the probability distribution of the model. Point estimates
    given by the maximum likelihood function don’t correspond to any mode, since likelihood
    is not a probability distribution function. If the probability distribution turns
    out to be multimodal, these point estimates are going to perform even more poorly.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过最大化后验概率分布来构建模型，而不是似然。这种方法被称为最大化后验，或MAP。似然和MAP都是模型的点估计，因此不涵盖整个不确定性空间。取最大化后验的模型意味着取模型概率分布的众数。由最大似然函数给出的点估计不对应于任何众数，因为似然不是一个概率分布函数。如果概率分布是多模态的，这些点估计将表现得更加糟糕。
- en: 'A better approach is to take the average of the model over the whole uncertainty
    space, i.e., to take the mean of the model based on the posterior distribution,
    as follows:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更好的方法是取整个不确定性空间上模型的平均值，即基于后验分布取模型的均值，如下所示：
- en: '![$$ Model=E\left[ Model/ Data\right]=\underset{Model}{\int } Model\kern0.5em
    P\left( Model/ Data\right)d(Model) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equj.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![Model = E[Model/ Data] = ∫ Model P(Model/ Data)d(Model)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equj.png)'
- en: To motivate the ideas of likelihood and posterior and how they can be used to
    derive model parameters, let’s get back to the coin problem again.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了激发似然和后验的概念以及它们如何用于推导模型参数，让我们再次回到硬币问题。
- en: Suppose we toss a coin six times, out of which heads appear five times. If one
    is supposed to estimate the probability of heads, what would the estimate be?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们抛掷硬币六次，其中出现正面五次。如果需要估计正面的概率，估计值会是什么？
- en: 'Here, the model for us is to estimate the probability of heads *θ* in a throw
    of a coin. Each toss of a coin can be treated as an independent Bernoulli trial
    with the probability of heads being *θ*. The likelihood of the data, given the
    model, is given by the following:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，对我们来说的模型是估计抛掷硬币时出现正面的概率 *θ*。每次抛掷硬币都可以被视为一个独立的伯努利试验，其出现正面的概率为 *θ*。给定模型的数据似然由以下给出：
- en: '![$$ P\left( Data/\theta \right)=P\left({x}_1{x}_2{x}_3{x}_4{x}_5{x}_6/\theta
    \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equk.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![P(Data/θ) = P(x1x2x3x4x5x6/θ)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equk.png)'
- en: where *x*[*i*] ∀ *i* ∈ {1, 2, 3, 4, 5, 6} denotes the event of either heads
    (*H*) or tails (*T*).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *x*[*i*] ∀ *i* ∈ {1, 2, 3, 4, 5, 6} 表示出现正面 (*H*) 或反面 (*T*) 的事件。
- en: 'Since the throws of coins are independent, the likelihood can be factorized
    as follows:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 由于硬币的抛掷是独立的，似然可以分解如下：
- en: '![$$ P\left( Data/\theta \right)=P\left({x}_1{x}_2{x}_3{x}_4{x}_5{x}_6/\theta
    \right)=\prod \limits_{i=1}^6P\left({x}_i/\theta \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ1.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![P(Data/θ) = P(x1x2x3x4x5x6/θ) = ∏(i=1 to 6)P(xi/θ)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ1.png)'
- en: (5.1.1)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: (5.1.1)
- en: 'Each throw of dice follows the Bernoulli distribution; hence the probability
    of heads is *θ*, and the probability of tails is (1 − *θ*), and in general its
    probability mass function is given by the following:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 每次掷骰子遵循伯努利分布；因此正面的概率是 *θ*，反面的概率是 (1 - *θ*)，并且一般其概率质量函数如下所示：
- en: '![$$ P\left(x=j/\theta \right)={\theta}^j{\left(1-\theta \right)}^{\left(1-j\right)}\forall
    j\in \left\{0,1\right\} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ2.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![P(x=j/θ) = θ^j(1-θ)^(1-j) ∀ j∈ {0,1}](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ2.png)'
- en: (5.1.2)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: (5.1.2)
- en: where *j* = 1 denotes heads and *j* = 0 denotes tails.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *j* = 1 表示正面，*j* = 0 表示反面。
- en: 'Since there are five heads and one tail combining (1) and (2), the likelihood
    *L* as a function of *θ* can be expressed as follows:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 由于有五个正面和一个反面，结合(1)和(2)，似然 *L* 作为 *θ* 的函数可以表示如下：
- en: '![$$ L\left(\theta \right)={\theta}^5\left(1-\theta \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ3.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![L(θ) = θ^5(1-θ)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ3.png)'
- en: (5.1.3)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: (5.1.3)
- en: Maximum likelihood methods treat the ![$$ \hat{\theta} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq1.png)
    that minimizes *L*(*θ*) as the model parameter. Hence,
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 最大似然方法将使 *L*(*θ*) 最小的 ![$$ \hat{\theta} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq1.png)
    视为模型参数。因此，
- en: '![$$ \hat{\theta}=\underset{\theta }{\underbrace{Arg\kern0.5em \operatorname{Max}}}\kern0.5em
    L\left(\theta \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equl.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{\theta}=\underset{\theta }{\underbrace{Arg\kern0.5em \operatorname{Max}}}\kern0.5em
    L\left(\theta \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equl.png)'
- en: 'If we take the derivative of the computed likelihood in ([5.1.3](#Equ3)) and
    set it to zero, we will arrive at the likelihood estimate for *θ*:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们对 ([5.1.3](#Equ3)) 中计算出的似然函数求导并令其等于零，我们将得到 *θ* 的似然估计：
- en: '![$$ \frac{d L\left(\theta \right)}{d\theta}=5{\theta}^4-6{\theta}^5=0\space
    =&gt;\theta =\frac{5}{6} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equm.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{d L\left(\theta \right)}{d\theta}=5{\theta}^4-6{\theta}^5=0\space
    =&gt;\theta =\frac{5}{6} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equm.png)'
- en: In general, if someone asks us our estimate of *θ* without our doing a similar
    maximization of likelihood, we at once answer the probability to be ![$$ \frac{5}{6}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq2.png) by the
    basic definition of probability that we learned in high school, i.e.,
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，如果有人问我们 *θ* 的估计值，而我们没有进行类似的似然最大化，我们就会立即根据我们在高中学习的概率的基本定义回答概率为 ![$$ \frac{5}{6}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq2.png)，即，
- en: '![$$ P\left( event={}^{"}{a}^{"}\right)=\frac{Number\ of\ occurences\ of\ the\
    {event}^{"}{a}^{"}}{Total\ number\ of\ occurences\ of\  all\  events\ } $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equn.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left( event={}^{"}{a}^{"}\right)=\frac{Number\ of\ occurences\ of\ the\
    {event}^{"}{a}^{"}}{Total\ number\ of\ occurences\ of\  all\  events\ } $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equn.png)'
- en: In a way, our head is thinking about likelihood and relying on the data seen
    thus far.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在某种程度上，我们的头脑在思考似然并依赖于迄今为止看到的数据。
- en: '*Now, let’s suppose had we not seen the data and someone asked us to determine
    the probability of heads; what would have been a logical estimate?*'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '*现在，假设我们没有看到数据，有人让我们确定正面的概率；一个合理的估计会是什么？*'
- en: Well, it depends on any prior belief that we may have about the coin. If we
    assume a fair coin, which in general is the most obvious assumption to make given
    that we have no information about the coin, ![$$ \theta =\frac{1}{2} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq3.png)
    would have been a good estimate. However, when we are assuming instead of doing
    a point estimate of prior for *θ*, it’s better to have a probability distribution
    over *θ* with the probability maximum at ![$$ \theta =\frac{1}{2} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq4.png).
    The prior probability distribution is a distribution over the model parameter
    *θ*.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，这取决于我们可能对硬币的任何先验信念。如果我们假设一枚公平的硬币，这在一般情况下是最明显的假设，因为我们对硬币没有任何信息，![$$ \theta
    =\frac{1}{2} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq3.png)
    将是一个很好的估计。然而，当我们假设而不是对 *θ* 的先验进行点估计时，最好有一个概率分布，其概率最大值在 ![$$ \theta =\frac{1}{2}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq4.png)。先验概率分布是模型参数
    *θ* 的分布。
- en: A beta distribution with parameters *α* = 2, *β* = 2 would be a good prior distribution
    in this case since it has a maximum probability at ![$$ \theta =\frac{1}{2} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq5.png)
    and is symmetrical around it.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，参数为 *α* = 2, *β* = 2 的 Beta 分布将是一个很好的先验分布，因为它在 ![$$ \theta =\frac{1}{2}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq5.png) 处达到最大概率，并且围绕它是对称的。
- en: '![$$ P\left(\theta \right)= Beta\left(\alpha =2,\beta =2\right)=\frac{\theta^{\alpha
    -1}{\left(1-\theta \right)}^{\beta -1}}{B\left(\alpha, \beta \right)}=\frac{\theta
    \left(1-\theta \right)}{B\left(\alpha, \beta \right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equo.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![Beta分布公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equo.png)'
- en: 'For fixed values of *α* and *β*, *B*(*α*, *β*) is constant and is the normalizing
    or partition function to this probability distribution. It can be computed as
    follows:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对于固定的 *α* 和 *β* 值，*B*(*α*, *β*) 是常数，并且是此概率分布的正则化或配分函数。它可以如下计算：
- en: '![$$ B\left(\alpha, \beta \right)=\frac{\tau \left(\alpha \right)\tau \left(\beta
    \right)}{\tau \left(\alpha +\beta \right)}=\frac{\tau (2)\tau (2)}{\tau (4)}=\frac{1!1!}{3!}=\frac{1}{6}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equp.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![B(α, β)=τ(α)τ(β)/(τ(α+β))=τ(2)τ(2)/τ(4)=1!1!/3!=1/6](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equp.png)'
- en: Even if one doesn’t remember the formula, it can be found out by just integrating
    *θ*(1 − *θ*) and taking the reciprocal of the same as the normalizing constant
    since the integral of the probability distribution should be 1.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 即使一个人不记得公式，也可以通过只对θ(1−θ)进行积分并取其倒数作为归一化常数来找到它，因为概率分布的积分应该是1。
- en: '![$$ P\left(\theta \right)=\frac{\theta \kern0.5em \left(1-\theta \right)}{6}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ4.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![P(θ)=θ(1−θ)/6](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ4.png)'
- en: (5.1.4)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: (5.1.4)
- en: 'If we combine the likelihood and the prior, we get the posterior probability
    distribution as follows:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将似然和先验结合起来，我们得到如下后验概率分布：
- en: '![$$ P\left(\theta /D\right)\propto {\theta}^5\left(1-\theta \right)\frac{\theta
    \kern0.5em \left(1-\theta \right)}{6}=\kern1em \frac{\theta^6{\left(1-\theta \right)}^2}{6}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equq.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![P(θ/D)∝θ^5(1−θ)θ(1−θ)/6=θ^6(1−θ)^2/6](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equq.png)'
- en: 'The proportional sign comes since we have ignored the probability of data.
    In fact, we can take the 6 out as well and express the posterior as follows:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 比例符号出现是因为我们忽略了数据的概率。实际上，我们也可以将6提出来，并将后验表示如下：
- en: '![$$ P\left(\theta /D\right)\propto {\theta}^6{\left(1-\theta \right)}^2 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equr.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![P(θ/D)∝θ^6(1−θ)^2](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equr.png)'
- en: 'Now, 0 ≤ *θ* ≤ 1 since *θ* is a probability. Integrating *θ*⁶(1 − *θ*)² in
    the range of 0 to 1 and taking the reciprocal would give us the normalizing factor
    of the posterior, which comes out to be 252\. Hence, the posterior can be expressed
    as follows:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，由于θ是一个概率，0≤θ≤1。在0到1的范围内对θ^6(1−θ)^2进行积分并取其倒数将给出后验的归一化因子，结果为252。因此，后验可以表示如下：
- en: '![$$ P\left(\theta /D\right)=\frac{\theta^6{\left(1-\theta \right)}^2}{252}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ5.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![P(θ/D)=θ^6(1−θ)^2/252](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ5.png)'
- en: (5.1.5)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: (5.1.5)
- en: 'Now that we have the posterior, there are two ways we can estimate *θ*. We
    can maximize the posterior and get a MAP estimate of *θ* as follows:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了后验，有两种方法可以估计θ。我们可以最大化后验，得到θ的MAP估计如下：
- en: '![$$ {\theta}_{MAP}=\underset{\theta }{\underbrace{Arg\kern0.5em \operatorname{Max}}}\kern0.5em
    P\left(\theta /D\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equs.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![θ_MAP=ArgMaxP(θ/D)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equs.png)'
- en: '![$$ \frac{d P\left(\theta /D\right)}{d\theta}=0\space =&gt;\theta =\frac{3}{4}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equt.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![dP(θ/D)/dθ=0 <=> θ=3/4](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equt.png)'
- en: We see the MAP estimate of ![$$ \frac{3}{4} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq6.png)
    is more conservative than the likelihood estimates of ![$$ \frac{5}{6} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq7.png)
    since it takes the prior into consideration and doesn’t blindly believe the data.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到，由于它考虑了先验并不仅仅相信数据，所以MAP估计的3/4比似然估计的5/6更保守。
- en: 'Now, let’s look at the second approach, the pure Bayesian approach, and take
    the mean of the posterior distribution to average over all the uncertainties for
    *θ*:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来看第二种方法，即纯贝叶斯方法，并取后验分布的均值来对所有关于θ的不确定性进行平均：
- en: '![$$ {\displaystyle \begin{array}{c}E\left[\theta /D\right]=\underset{\theta
    =0}{\int^1}\theta P\left(\theta /D\right) d\theta \\ {}=\underset{\theta =0}{\int^1}\frac{\theta^7{\left(1-\theta
    \right)}^2}{252} d\theta \\ {}\space =0.7\end{array}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equu.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equu.png)'
- en: Plotted in Figure [5-1a](#Fig1) through Figure [5-1c](#Fig3) are the likelihood
    function and the prior and posterior probability distributions for the coin problem.
    One thing to note is the fact that the likelihood function is not a probability
    density function or a probability mass function, whereas the prior and posteriors
    are probability mass or density functions.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[5-1a](#Fig1)至图[5-1c](#Fig3)中绘制了似然函数以及硬币问题的先验和后验概率分布。需要注意的是，似然函数不是概率密度函数或概率质量函数，而先验和后验是概率质量或密度函数。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig3_HTML.jpg)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig3_HTML.jpg)'
- en: A graph for posterior probability has values on theta on the x-axis and probability
    data on the y-axis. It has a peak between the theta value of 0.6 and 0.8.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 后验概率分布图在x轴上有theta的值，在y轴上有概率数据。它在theta值为0.6和0.8之间有一个峰值。
- en: Figure 5-1c
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-1c
- en: Posterior probability distribution
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 后验概率分布
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig2_HTML.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig2_HTML.jpg)'
- en: A line graph for probability distribution has values on theta on the x-axis
    and probability on the y-axis. It forms the shape of a parabola vertically.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 概率分布的线形图在x轴上有theta的值，在y轴上有概率。它垂直形成抛物线形状。
- en: Figure 5-1b
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-1b
- en: Prior probability distribution
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 先验概率分布
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig1_HTML.jpg)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig1_HTML.jpg)'
- en: A line graph plots the likelihood function. It peaks at the approximate value
    of theta as 0.8\.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图用于绘制似然函数。它在theta约为0.8时达到峰值。
- en: Figure 5-1a
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-1a
- en: Likelihood function plot
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 似然函数图
- en: For complicated distributions, the posterior probability distribution can turn
    out to be very complex with several parameters and is unlikely to represent known
    probability distribution forms such as normal, gamma, and so on. Thus, it may
    become seemingly impossible to compute the integral over the whole uncertainty
    space of the model in order to compute the mean of the posterior.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 对于复杂的分布，后验概率分布可能非常复杂，具有多个参数，并且不太可能代表已知的概率分布形式，如正态分布、伽马分布等。因此，计算整个模型不确定性空间上的积分以计算后验均值的任务可能看似不可能。
- en: Markov chain Monte Carlo methods of sampling can be used in such cases to sample
    model parameters, and then their mean is a fair estimate of the mean of the posterior
    distribution. If we sample *n* sets of model parameters *M*[*i*], then
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在此类情况下，可以使用马尔可夫链蒙特卡洛采样方法来采样模型参数，然后它们的均值是对后验分布均值的公平估计。如果我们采样*n*组模型参数*M*[*i*]，那么
- en: '![$$ E\left[ Model/ Data\right]\approx \sum \limits_{i=1}^n{M}_i $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equv.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equv.png)'
- en: Generally, the mean of the distribution is taken since it minimizes the squared
    error.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，取分布的均值，因为它最小化了平方误差。
- en: Basically, the expectation
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，期望
- en: '*E*[(*y* − *c*)²] is minimized when *c* = *E*[*y*]. Given that we are trying
    to represent the probability of the distribution by a single representative such
    that the squared error over the probability distribution is minimized, mean is
    the best candidate.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '*E*[(*y* − *c*)²]在*c* = *E*[*y*]时最小化。鉴于我们试图通过一个代表值来表示分布的概率，使得概率分布上的平方误差最小化，均值是最好的候选者。'
- en: However, one can take the median of the distribution if the distribution is
    skewed or there is more noise in the data in the form of potential outliers. This
    estimated median can be based on the samples drawn from the posterior.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果分布是偏斜的，或者数据中存在更多噪声，如潜在的异常值，则可以取分布的中位数。这个估计的中位数可以基于从后验中抽取的样本。
- en: Markov Chain Monte Carlo Methods for Sampling
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 马尔可夫链蒙特卡洛采样方法
- en: Markov chain Monte Carlo methods, or MCMC, are some of the most popular techniques
    for sampling from complicated posterior probability distributions or in general
    from any probability distribution for multivariate data. Before we get to MCMC,
    let’s talk about Monte Carlo sampling methods in general. Monte Carlo sampling
    methods try to compute the area under a curve based on sampled points.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫链蒙特卡洛方法，或 MCMC，是用于从复杂的后验概率分布或一般地从任何概率分布中采样多变量数据的一些最流行技术。在我们深入探讨 MCMC 之前，让我们先谈谈一般的蒙特卡洛采样方法。蒙特卡洛采样方法试图根据采样点来计算曲线下的面积。
- en: 'For example, the area of the transcendental number *Pi*(*π*) can be computed
    by sampling points within a square of radius 1 and noting down the number of sampled
    points within one-fourth of the circle of diameter 2 enclosed within the square.
    As shown in Figure [5-2](#Fig4), the area of *Pi* can be computed as follows:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可以通过在半径为 1 的正方形内采样点并记录下直径为 2 的圆的四分之一内的采样点数来计算超越数 *π*（π）的面积。如图 [5-2](#Fig4)
    所示，*π* 的面积可以按以下方式计算：
- en: '![$$ \frac{4^{\ast } Area(OAC)}{Area(OABC)}={4}^{\ast}\frac{\left(\frac{1}{4}\right)\pi
    {r}^2}{r^2}=\pi $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equw.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![面积比公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equw.png)'
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig4_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![π面积图](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig4_HTML.jpg)'
- en: A diagram of a circle having a radius equal to 1\. A square O A B C has sides
    equal to the length of the radius. There is a formula of pi alongside which reads,
    4 times the area of O A C over the area of O A B C.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 一个半径等于 1 的圆的示意图。一个边长等于半径的方形 OABC。旁边有一个 π 的公式，读作：OAC 面积是 OABC 面积的 4 倍。
- en: Figure 5-2
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-2
- en: Area of Pi
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: π面积
- en: In Listing [5-1](#PC1), the Monte Carlo method for computing the value of *Pi*
    is illustrated. As we can see, the value comes out to nearly the value of *Pi*.
    The accuracy can be improved by sampling more points.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在列表 [5-1](#PC1) 中，展示了计算 *π* 值的蒙特卡洛方法。正如我们所见，计算出的值几乎等于 *π* 的值。通过增加采样点数可以提高精度。
- en: '[PRE0]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The simple Monte Carlo method is highly inefficient if the dimension space is
    large since the larger the dimensionality is, the more prominent the effects of
    correlation are. Markov chain Monte Carlo methods are efficient in such scenarios
    since they spend more time collecting samples from high-probability regions than
    from lower-probability regions. The normal Monte Carlo method explores the probability
    space uniformly and hence spends as much time exploring low-probability zones
    as it does high-probability zones. As we know, the contribution of a low-probability
    zone is insignificant when computing the expectation of functions through sampling,
    and hence when an algorithm spends a lot of time in such a zone, it leads to significantly
    higher processing time. The main heuristic behind the Markov chain Monte Carlo
    method is to explore the probability space not uniformly but rather to concentrate
    more on the high-probability zones. In high-dimensional space, because of correlation,
    most of the space is sparse, with high density found only at specific areas. So,
    the idea is to spend more time and collect more samples from those high-probability
    zones and spend as little time as possible exploring low-probability zones.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 当维度空间很大时，简单的蒙特卡洛方法效率非常低，因为维度越大，相关性的影响越明显。马尔可夫链蒙特卡洛方法在这种情况下效率很高，因为它们在收集高概率区域的样本上花费的时间比在低概率区域上多。普通的蒙特卡洛方法在概率空间中均匀探索，因此花费与探索高概率区域一样多的时间在探索低概率区域。众所周知，在通过采样计算函数期望值时，低概率区域的贡献是微不足道的，因此当算法在这样一个区域花费大量时间时，会导致显著更高的处理时间。马尔可夫链蒙特卡洛方法背后的主要启发式方法是探索概率空间不是均匀的，而是更多地关注高概率区域。在多维空间中，由于相关性，大部分空间是稀疏的，高密度只出现在特定的区域。因此，想法是花更多时间并从那些高概率区域收集更多样本，尽可能少地探索低概率区域。
- en: Markov chain can be thought of as a stochastic/random process to generate a
    sequence of random samples evolving over time. The next value of the random variable
    is only determined by the prior value of the variable. Markov chain, once it enters
    a high-probability zone, tries to collect as many points with a high-probability
    density as possible. It does so by generating the next sample, conditioned on
    the current sample value, so that points near the current sample are chosen with
    high probability and points far away are chosen with low probability. This ensures
    that the Markov chain collects as many points as possible from a current high-probability
    zone. However, occasionally a long jump from the current sample is required to
    explore other potential high-probability zones far from the current zone where
    the Markov chain is working.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫链可以被视为一个随机/随机过程，用于生成随时间演化的随机样本序列。随机变量的下一个值仅由变量的先前值决定。一旦马尔可夫链进入高概率区域，它就会尝试收集尽可能多的具有高概率密度的点。它是通过根据当前样本值生成下一个样本来做到这一点的，这样就可以以高概率选择靠近当前样本的点，以低概率选择远离的点。这确保了马尔可夫链尽可能多地从当前高概率区域收集点。然而，偶尔需要从当前样本进行长距离跳跃，以探索远离当前区域的其他潜在高概率区域。
- en: The Markov chain concept can be illustrated with the movement of gas molecules
    in an enclosed container at a steady state. A few parts of the container have
    a higher density of gas molecules than the other areas, and since the gas molecules
    are at a steady state, the probabilities of each state (determined by the position
    of a gas molecule) would remain constant even though there might be gas molecules
    moving from one position to another.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫链的概念可以用封闭容器在稳态下气体分子的运动来阐述。容器的一些部分比其他区域有更高的气体分子密度，由于气体分子处于稳态，每个状态的概率（由气体分子的位置决定）将保持不变，即使可能有气体分子从一个位置移动到另一个位置。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig5_HTML.jpg)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig5_HTML.jpg)'
- en: An illustration of the movement of gases inside a cuboidal box. Three states
    are marked as a, b, and c.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 一个立方体盒子内气体运动的示意图。三个状态被标记为 a、b 和 c。
- en: Figure 5-3
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-3
- en: 'Movement of gases in an enclosed container at steady state with only three
    states: A, B, and C'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 仅具有三种状态（A、B 和 C）的封闭容器中气体的稳态运动
- en: For the sake of simplicity, let us assume there are only three states (position
    of the gas molecules, in this case) for the gas molecules, as shown in Figure
    [5-3](#Fig5). Let us denote those states by *A*, *B*, and *C* and their corresponding
    probabilities by *P*[*A*], *P*[*B*], and *P*[*C*].
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化起见，让我们假设气体分子（在这种情况下）只有三种状态（位置），如图 [5-3](#Fig5) 所示。让我们用 *A*、*B* 和 *C* 来表示这些状态，并用
    *P*[*A*]、*P*[*B*] 和 *P*[*C*] 来表示它们相应的概率。
- en: Since the gas molecules are in steady state, if there are gas molecules transitioning
    to other states, equilibrium needs to be maintained to keep the probability distribution
    stationary. The simplest assumption to consider is that probability mass going
    from state *A* to state *B* should come back to *A* from *B*; i.e., pairwise,
    the states are in equilibrium.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 由于气体分子处于稳态，如果有气体分子过渡到其他状态，为了保持概率分布的稳定性，需要维持平衡。最简单的假设是，从状态 *A* 到状态 *B* 的概率质量应该从
    *B* 回到 *A*；即，成对的状态处于平衡状态。
- en: 'Let’s say *P*(*B*/*A*) determines the transition probability from *A* to *B*.
    So, probability mass going from *A* to *B* is given by the following:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 *P*(*B*/*A*) 决定了从 *A* 到 *B* 的转移概率。因此，从 *A* 到 *B* 的概率质量由以下给出：
- en: '![$$ P(A)\left(B/A\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ6.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P(A)\left(B/A\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ6.png)'
- en: (5.2.1)
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: (5.2.1)
- en: 'Likewise, probability mass coming to *A* from *B* is given by the following:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，从 *B* 到 *A* 的概率质量由以下给出：
- en: '![$$ P(B)P\left(A/B\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ7.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P(B)P\left(A/B\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ7.png)'
- en: (5.2.2)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: (5.2.2)
- en: 'So, in steady state from ([5.2.1](#Equ6)) and ([5.2.2](#Equ7)), we have the
    following:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，从 ([5.2.1](#Equ6)) 和 ([5.2.2](#Equ7)) 的稳态中，我们有以下结果：
- en: '![$$ P(A)\left(B/A\right)=P(B)P\left(A/B\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ8.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P(A)\left(B/A\right)=P(B)P\left(A/B\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ8.png)'
- en: (5.2.3)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: (5.2.3)
- en: to maintain the stationarity of the probability distribution. This is called
    a *detailed balance condition*, and it is a sufficient but not necessary condition
    for the stationarity of a probability distribution. The gas molecules can be in
    equilibrium in more complex ways, but since this form of detail balance is mathematically
    convenient when the possible state space is infinite, this approach has been widely
    used in Markov chain Monte Carlo methods to sample the next point based on the
    current point. In short, movement of the Markov chain is expected to behave like
    gas molecules at steady state spending more time in high-probability region than
    in low probability keeping the detailed balance condition intact.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持概率分布的平稳性。这被称为*详细平衡条件*，它是概率分布平稳的充分但不必要条件。气体分子可以通过更复杂的方式达到平衡，但由于当可能的状态空间是无限大时，这种形式的详细平衡在数学上很方便，因此这种方法在马尔可夫链蒙特卡洛方法中被广泛用于根据当前点采样下一个点。简而言之，马尔可夫链的运动预期将像在稳态下气体分子那样，在高概率区域花费的时间比在低概率区域多，从而保持详细的平衡条件。
- en: 'A few other conditions that need to be satisfied for a good implementation
    of Markov chain are listed here:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 列出以下是一些需要满足的、对于良好实现马尔可夫链的几个其他条件：
- en: '**Irreducibility:** A desirable property of the Markov chain is that we can
    go from one state to any other state. This is important since in Markov chain,
    although we want to keep exploring nearby states of a given state with high probability,
    at times we might have to take a jump and explore some far neighborhood with the
    expectation that the new zone might be another high-probability zone.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不可约性**：马尔可夫链的一个理想特性是我们可以从一个状态转移到任何其他状态。这很重要，因为在马尔可夫链中，尽管我们希望以高概率探索给定状态的邻近状态，但在某些时候我们可能需要跳跃并探索一些远邻区域，期望新的区域可能是另一个高概率区域。'
- en: '**Aperiodicity:** The Markov chain shouldn’t repeat too often, as otherwise
    it won’t be possible to traverse the whole space. Imagine a space with 20 states.
    If, after exploring five states, the chain repeats, it would not be possible to
    traverse all 20 states, thus leading to suboptimal sampling.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非周期性**：马尔可夫链不应该重复得太频繁，否则将无法遍历整个空间。想象一个有20个状态的空间。如果在探索了五个状态之后链重复，那么将无法遍历所有20个状态，从而导致采样次优。'
- en: Metropolis Algorithm
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 梅特罗波利斯算法
- en: The Metropolis algorithm is a Markov chain Monte Carlo method that uses the
    current accepted state to determine the next state. A sample at time (*t* + 1)
    is conditionally dependent upon the sample at time *t*. The proposed state at
    time (*t* + 1) is drawn from a normal distribution with a mean equal to the current
    sample at time *t* with a specified variance. Once drawn, the ratio of the probability
    is checked between the sample at time (*t* + 1) and time *t*. If ![$$ \frac{P\left({x}^{\left(t+1\right)}\right)}{P\left({x}^{(t)}\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq8.png) is greater
    than or equal to 1, then the sample *x*^((*t* + 1)) is chosen with a probability
    of 1; if it is less than 1, then the sample is chosen randomly.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 梅特罗波利斯算法是一种马尔可夫链蒙特卡洛方法，它使用当前接受的状态来确定下一个状态。在时间 (*t* + 1) 的样本有条件地依赖于时间 *t* 的样本。在时间
    (*t* + 1) 提出的状态是从一个均值为当前时间 *t* 的样本且具有指定方差的正态分布中抽取的。一旦抽取，就检查时间 (*t* + 1) 和时间 *t*
    的样本之间的概率比。如果 ![$$ \frac{P\left({x}^{\left(t+1\right)}\right)}{P\left({x}^{(t)}\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq8.png) 大于或等于
    1，则选择样本 *x*^((*t* + 1)) 的概率为 1；如果它小于 1，则随机选择样本。
- en: Mentioned next are the detailed implementation steps.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 下文将介绍详细的实现步骤。
- en: Start with any random sample point *X*^((1)).
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从任何随机样本点 *X*^((1)) 开始。
- en: Choose the next point *X*^((2)) that is conditionally dependent on *X*^((1)).
    You can choose *X*^((2)) from a normal distribution with a mean of *X*^((1)) and
    some finite variance; let’s say *S*². So,
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择下一个点 *X*^((2))，它有条件地依赖于 *X*^((1))。你可以从均值为 *X*^((1)) 且具有某些有限方差（例如 *S*²）的正态分布中选择
    *X*^((2))。因此，
- en: '*X*^((2))~*Normal* (*X*^((1)), *S*²). A key deciding factor for good sampling
    is to choose the variance *S*² very judicially. The variance shouldn’t be too
    large, since in that case the next sample *X*^((2)) has less of a chance of staying
    near the current sample *X*^((1)), in which case a high-probability region might
    not be explored as much since the next sample is selected far away from the current
    sample most of the time. At the same time, the variance shouldn’t be too small.
    In such cases, the next samples would almost always stay near the current point,
    and hence the probability of exploring a different high-probability zone far from
    the current zone would reduce.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '*X*^((2))~*正态分布* (*X*^((1)), *S*²)。良好采样的一个关键决定因素是明智地选择方差 *S*²。方差不应该太大，因为在这种情况下，下一个样本
    *X*^((2)) 有更少的可能性保持在当前样本 *X*^((1)) 附近，在这种情况下，由于大多数情况下下一个样本选择远离当前样本，因此可能不会充分探索高概率区域。同时，方差也不应该太小。在这种情况下，下一个样本几乎总是保持在当前点附近，因此探索远离当前区域的不同高概率区域的可能性会降低。'
- en: Some special heuristics are used in determining whether to accept *X*^((2))
    once it has been generated from the preceding step.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在确定是否接受从先前步骤生成的 *X*^((2)) 时，会使用一些特殊的启发式方法。
- en: If the ratio *P*(*X*^((2)))/*P*(*X*^((1))) > = 1, then accept *X*^((2)) and
    keep it as a valid sample point. The accepted sample becomes the *X*^((1)) for
    generating the next sample.
  id: totrans-131
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *P*(*X*^((2)))/*P*(*X*^((1))) ≥ 1，则接受 *X*^((2)) 并将其保留为有效样本点。被接受的样本成为生成下一个样本的
    *X*^((1))。
- en: The ratio *P*(*X*^((2)))/*P*(*X*^((1))) < 1, *X*^((2)) is accepted if the it
    is greater than a randomly generated number from the uniform distribution between
    0 and 1, i.e., *U* [0, 1].
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *P*(*X*^((2)))/*P*(*X*^((1))) < 1，则当 *X*^((2)) 大于从 0 到 1 的均匀分布中随机生成的数字时，接受
    *X*^((2))，即 *U* [0, 1]。
- en: As we can see, if we move to a higher-probability sample, then we accept the
    new sample, and if we move to a lower-probability sample, we sometimes accept
    and sometimes reject the new sample. The probability of rejection increases if
    the ratio *P*(*X*^((2)))|*P*(*X*^((1))) is small. Let’s say the ratio of *P*(*X*^((2)))|*P*(*X*^((1)))
    = 0.1\. When we generate a random number *r*[*u*] between 0 and 1 from a uniform
    distribution, then the probability of *r*[*u*] > 0.1 is 0.9, which in turn implies
    that the probability of the new samples getting rejected is 0.9\. In general,
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，如果我们移动到一个更高概率的样本，那么我们接受新的样本，如果我们移动到一个更低概率的样本，我们有时接受有时拒绝新的样本。如果 *P*(*X*^((2)))|*P*(*X*^((1)))
    的比率很小，拒绝的概率会增加。比如说，*P*(*X*^((2)))|*P*(*X*^((1))) 的比率是 0.1。当我们从均匀分布中生成一个介于 0 和
    1 之间的随机数 *r*[*u*] 时，*r*[*u*] > 0.1 的概率是 0.9，这反过来又意味着新样本被拒绝的概率是 0.9。一般来说，
- en: '![$$ P\left({r}_u&gt;r\right)=1-r $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equx.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![概率公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equx.png)'
- en: where *r* is the ratio of the probability of the new sample and the old sample.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *r* 是新样本和旧样本概率的比率。
- en: Let’s try to intuit why such heuristics work for Markov chain Monte Carlo methods.
    As per detailed balance,
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试直观地理解为什么这样的启发式方法适用于马尔可夫链蒙特卡洛方法。根据详细平衡原理，
- en: '![$$ P\left({X}^{(1)}\right)P\left({X}^{(2)}/{X}^{(1)}\right)=P\left({X}^{(2)}\right)P\left({X}^{(1)}/{X}^{(2)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equy.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![概率公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equy.png)'
- en: 'We have conveniently taken the transition probabilities to follow normal distribution
    without validating whether these transition probabilities adhere to the detailed
    balanced conditions for stationarity of the probability distribution that we wish
    to sample from. Let us consider that the ideal transition probabilities between
    the two states *X*[1] and *X*[2] to maintain the stationarity of the distribution
    are given by *P*(*X*[1]|*X*[2]) and *P*(*X*[2]|*X*[1]). Hence, as per detailed
    balance, the following condition must be satisfied:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们方便地假设转换概率遵循正态分布，而没有验证这些转换概率是否遵循我们希望从中采样的概率分布的平稳性的详细平衡条件。让我们考虑，为了保持分布的平稳性，两个状态
    *X*[1] 和 *X*[2] 之间的理想转换概率由 *P*(*X*[1]|*X*[2]) 和 *P*(*X*[2]|*X*[1]) 给出。因此，根据详细平衡原理，以下条件必须得到满足：
- en: '![$$ P\left({X}_1/{X}_2\right)P\left({X}_1\right)=P\left({X}_2/{X}_1\right)P\left({X}_2\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equz.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![概率公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equz.png)'
- en: However, discovering such an ideal transition probability function that ensures
    stationarity by imposing a detailed balance condition is hard. We start off with
    a suitable transition probability function; let’s say *T*(*x*/y), where *y* denotes
    the current state and *x* denotes the next state to be sampled based on *y*. For
    the two states *X*[1] and *X*[2], the assumed transition probabilities are thus
    given by *T*(*X*[1]/*X*[2]) for a move from state *X*[2] to *X*[1] and by *T*(*X*[2]/*X*[1])
    for a move from state *X*[1] to *X*[2]. Since the assumed transition probabilities
    are different than the ideal transition probabilities required to maintain stationarity
    through detailed balance, we get the opportunity to accept or reject samples based
    on how good the next move is. To cover up this opportunity, an acceptance probability
    for the transition of states is considered such that for a transition of a state
    from *X*[1] to *X*[2]
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，发现这样一个理想的转移概率函数，通过施加详细平衡条件来确保平稳性是困难的。我们从一个合适的转移概率函数开始；比如说 *T*(*x*/y)，其中 *y*
    表示当前状态，*x* 表示基于 *y* 样本的下个状态。对于两个状态 *X*[1] 和 *X*[2]，假设的转移概率由 *T*(*X*[1]/*X*[2])
    给出，表示从状态 *X*[2] 转移到 *X*[1]，以及由 *T*(*X*[2]/*X*[1]) 给出，表示从状态 *X*[1] 转移到 *X*[2]。由于假设的转移概率与维持平稳性所需的理想转移概率不同，我们有机会根据下一步的好坏来接受或拒绝样本。为了掩盖这种机会，考虑一个状态转移的接受概率，使得从
    *X*[1] 到 *X*[2] 的状态转移
- en: '![$$ P\left({X}_2/{X}_1\right)=T\left({X}_2/{X}_1\right)A\left({X}_2/{X}_1\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaa.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({X}_2/{X}_1\right)=T\left({X}_2/{X}_1\right)A\left({X}_2/{X}_1\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaa.png)'
- en: where *A*(*X*[2]/*X*[1]) is the acceptance probability of the move from *X*[1]
    to *X*[2].
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *A*(*X*[2]/*X*[1]) 是从 *X*[1] 到 *X*[2] 的转移的接受概率。
- en: As per detailed balance,
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 根据详细平衡原理，
- en: '![$$ P\left({X}_1/{X}_2\right)P\left({X}_1\right)=P\left({X}_2/{X}_1\right)P\left({X}_2\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equab.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({X}_1/{X}_2\right)P\left({X}_1\right)=P\left({X}_2/{X}_1\right)P\left({X}_2\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equab.png)'
- en: 'Replacing the ideal transition probability as the product of the assumed transition
    probability and the acceptance probability, we get the following:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 将理想转移概率替换为假设转移概率和接受概率的乘积，我们得到以下结果：
- en: '![$$ T\left({X}_2/{X}_1\right)A\left({X}_2/{X}_1\right)P\left({X}_1\right)=T\left({X}_1/{X}_2\right)A\left({X}_1/{X}_2\right)P\left({X}_2\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equac.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![$$ T\left({X}_2/{X}_1\right)A\left({X}_2/{X}_1\right)P\left({X}_1\right)=T\left({X}_1/{X}_2\right)A\left({X}_1/{X}_2\right)P\left({X}_2\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equac.png)'
- en: 'Rearranging this, we get the acceptance probability ratio as follows:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 重新排列这个，我们得到接受概率比如下：
- en: '![$$ \frac{A\left({X}_2/{X}_1\right)}{A\left({X}_1/{X}_2\right)}=\frac{T\left({X}_1/{X}_2\right)P\left({X}_2\right)}{T\left({X}_2/{X}_1\right)P\left({X}_1\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equad.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{A\left({X}_2/{X}_1\right)}{A\left({X}_1/{X}_2\right)}=\frac{T\left({X}_1/{X}_2\right)P\left({X}_2\right)}{T\left({X}_2/{X}_1\right)P\left({X}_1\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equad.png)'
- en: 'One simple proposal that satisfies this is given by the Metropolis algorithm
    as follows:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 满足这一条件的一个简单建议由 Metropolis 算法给出如下：
- en: '![$$ A\left({X}_2/{X}_1\right)=\min \left(1,\frac{T\left({X}_1/{X}_2\right)P\left({X}_2\right)}{T\left({X}_2/{X}_1\right)P\left({X}_1\right)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equae.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![$$ A\left({X}_2/{X}_1\right)=\min \left(1,\frac{T\left({X}_1/{X}_2\right)P\left({X}_2\right)}{T\left({X}_2/{X}_1\right)P\left({X}_1\right)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equae.png)'
- en: 'In the Metropolis algorithm, the assumed transitional probability is generally
    assumed to be a normal distribution that is symmetric, and hence *T*(*X*[1]/*X*[2])
    = *T*(*X*[2]/*X*[1]). This simplifies the acceptance probability of the move from
    *X*[1] to *X*[2] as follows:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Metropolis 算法中，假设的转移概率通常假设为对称的正态分布，因此 *T*(*X*[1]/*X*[2]) = *T*(*X*[2]/*X*[1])。这简化了从
    *X*[1] 到 *X*[2] 的转移的接受概率如下：
- en: '![$$ A\left({X}_2/{X}_1\right)=\min \left(1,\frac{P\left({X}_2\right)}{P\left({X}_1\right)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaf.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![$$ A\left({X}_2/{X}_1\right)=\min \left(1,\frac{P\left({X}_2\right)}{P\left({X}_1\right)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaf.png)'
- en: If the acceptance probability is 1, then we accept the move with probability
    1, while if the acceptance probability is less than 1, let’s say *r*, then we
    accept the new sample with probability *r* and reject the sample with probability
    (1 − *r*). This rejection of samples with the probability (1 − *r*) is achieved
    by comparing the ratio with the randomly generated sample *r*[*u*] from a uniform
    distribution between 0 and 1 and rejecting the sample in cases where *r*[*u*] > *r*.
    This is because for a uniform distribution probability *P*(*r*[*u*] > *r*) = 1 − *r*,
    which ensures the desired rejection probability is maintained.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 如果接受概率是 1，那么我们以概率 1 接受移动，而如果接受概率小于 1，比如说 *r*，那么我们以概率 *r* 接受新的样本，以概率 (1 − *r*)
    拒绝样本。这种以概率 (1 − *r*) 拒绝样本的方法是通过将比率与从 0 到 1 的均匀分布中随机生成的样本 *r*[*u*] 进行比较来实现的，在 *r*[*u*] > *r*
    的情况下拒绝样本。这是因为对于均匀分布，概率 *P*(*r*[*u*] > *r*) = 1 − *r*，这确保了所需的拒绝概率得到维持。
- en: In Listing [5-2](#PC2), we illustrate the sampling from a bivariate Gaussian
    distribution through the Metropolis algorithm.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在列表 [5-2](#PC2) 中，我们通过 Metropolis 算法展示了从二元高斯分布中进行采样的过程。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig6_HTML.jpg)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig6_HTML.jpg)'
- en: An illustration of Gaussian distribution on the x-y plane between the values
    of Negative to positive 4\. It has a cluster of dots clubbed at a specific area.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在 x-y 平面上展示高斯分布的插图，范围从负 4 到正 4。它有一个在特定区域的点群。
- en: Figure 5-4
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-4
- en: Plot of sampled points from multivariate Gaussian distribution using Metropolis
    algorithm
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Metropolis 算法从多元高斯分布中采样的点集图
- en: '[PRE1]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We see from the output that the mean and the covariance of the sampled points
    closely represent the mean and covariance of the bivariate Gaussian distribution
    from which we are sampling. Also, the scatter plot in Figure [5-4](#Fig6) closely
    resembles the bivariate Gaussian distribution.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 从输出结果中我们可以看到，样本点的均值和协方差与我们所采样的二元高斯分布的均值和协方差非常接近。此外，图 [5-4](#Fig6) 中的散点图也与二元高斯分布非常相似。
- en: Now that we are aware of the Markov chain Monte Carlo methods of sampling from
    probability distribution, we will learn about another MCMC method called Gibbs
    sampling while examining restricted Boltzmann machines.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经了解了从概率分布中进行采样的马尔可夫链蒙特卡洛方法，我们将通过研究受限玻尔兹曼机来学习另一种称为吉布斯抽样的 MCMC 方法。
- en: Restricted Boltzmann Machines
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 受限玻尔兹曼机
- en: Restricted Boltzmann machines (RBMs) belong to the unsupervised class of machine-learning
    algorithms that utilize the Boltzmann equation of probability distribution. Illustrated
    in Figure [5-5](#Fig7) is a two-layer restricted Boltzmann machine architecture
    that has a hidden layer and a visible layer. There are weight connections between
    all the hidden and visible layers’ units. However, there are no hidden-to-hidden
    or visible-to-visible unit connections. The term *restricted* in RBM refers to
    this constraint on the network. The hidden units of an RBM are conditionally independent
    from one another given the set of visible units. Similarly, the visible units
    of an RBM are conditionally independent from one another given the set of hidden
    units. Restricted Boltzmann machines are most often used as a building block for
    deep networks rather than as an individual network itself. In terms of probabilistic
    graphic models, restricted Boltzmann machines can be defined as undirected probabilistic
    graphic models containing a visible layer and a single hidden layer. Much like
    PCA, RBMs can be thought of as a way of representing data in one space (given
    by the visible layer *v*) into a different space (given by the hidden or latent
    layer *h*). When the size of the hidden layer is less than the size of the visible
    layer, then RBMs perform a dimensionality reduction of data. RBMs are generally
    trained on binary data.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 受限玻尔兹曼机（RBMs）属于利用概率分布的玻尔兹曼方程的无监督机器学习算法类别。图[5-5](#Fig7)展示了具有一个隐藏层和一个可见层的两层受限玻尔兹曼机架构。所有隐藏层和可见层的单元之间存在权重连接。然而，没有隐藏层到隐藏层或可见层到可见层的单元连接。RBM中的“受限”一词指的是这种对网络的约束。给定可见单元集合，RBM的隐藏单元彼此之间条件独立。同样，给定隐藏单元集合，RBM的可见单元彼此之间条件独立。受限玻尔兹曼机通常用作深度网络的构建块，而不是作为一个独立的网络本身。在概率图形模型方面，受限玻尔兹曼机可以定义为包含一个可见层和一个单独隐藏层的无向概率图形模型。与PCA类似，RBMs可以被视为将数据在由可见层
    *v* 给定的一个空间中表示为另一个空间（由隐藏或潜在层 *h* 给定）的方法。当隐藏层的大小小于可见层的大小时，RBMs执行数据的降维。RBMs通常在二进制数据上训练。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig7_HTML.jpg)'
  id: totrans-164
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig7_HTML.jpg)'
- en: A diagram represents the interconnections between 4 nodes on the left and 3
    nodes on the right. The left-side nodes are labeled as V 1, V 2, V i, and V m.
    The right-side nodes are labeled as h 1, h j, and h n.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 一个图表示了左侧4个节点和右侧3个节点之间的互连。左侧的节点标记为V 1, V 2, V i, 和 V m。右侧的节点标记为h 1, h j, 和 h
    n.
- en: Figure 5-5
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-5
- en: Restricted Boltzmann machine visible and hidden layer architecture
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 受限玻尔兹曼机可见层和隐藏层架构
- en: Let the visible units of the RBM be represented by vector *v* = [*v*[1] *v*[2]…*v*[*m*]]^(*T*) ∈ *R*^(*m* × 1)
    and the hidden units be represented by *h* = [*h*[1]*h*[2]…*h*[*n*]]^(*T*) ∈ ℝ^(*n* × 1)*h* = [*h*[1] *h*[2]…*h*[*n*]]^(*T*) ∈ *R*^(*n* × 1).
    Also, let the weight connecting the *i-th* visible unit to the *j-th* hidden unit
    be represented by *w*[*ij*], ∀ *i* ∈ {1, 2, ..*m*}, ∀ *j* ∈ {1, 2, ..*n*}. We
    can represent the matrix containing the weights *w*[*ij*] as *W* ∈ *R*^(*m* × *n*).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 让RBM的可见单元由向量 *v* = [*v*[1] *v*[2]…*v*[*m*]]^(*T*) ∈ *R*^(*m* × 1) 表示，隐藏单元由 *h*
    = [*h*[1] *h*[2]…*h*[*n*]]^(*T*) ∈ *ℝ*^(*n* × 1) 表示。此外，让连接第 *i* 个可见单元和第 *j* 个隐藏单元的权重表示为
    *w*[*ij*]，∀ *i* ∈ {1, 2, ..*m*}，∀ *j* ∈ {1, 2, ..*n*}。我们可以将包含权重 *w*[*ij*] 的矩阵表示为
    *W* ∈ *R*^(*m* × *n*).
- en: 'The energy of the joint probability distribution having hidden state *h* and
    visible state *v* is given by the following:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 具有隐藏状态 *h* 和可见状态 *v* 的联合概率分布的能量由以下公式给出：
- en: '![$$ P\left(v,h\right)=\frac{e^{-E\left(h,v\right)}}{Z} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ9.png)'
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ9.png)'
- en: (5.3.1)
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.1)
- en: where *E*(*v*, *h*) is the energy of the joint configuration (*v*, *h*) and
    *Z* is the normalizing factor, commonly known as the partition function. This
    probability is based on the Boltzmann distribution and assumes the Boltzmann constant
    and thermal temperature as 1.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *E*(*v*, *h*) 是联合配置 (*v*, *h*) 的能量，*Z* 是归一化因子，通常称为配分函数。这个概率基于玻尔兹曼分布，并假设玻尔兹曼常数和热温度为1。
- en: '![$$ Z=\sum \limits_v\sum \limits_h{e}^{-E\left(v,h\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ10.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ10.png)'
- en: (5.3.2)
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.2)
- en: 'The energy *E*(*v*, *h*) of the joint configuration (*v*, *h*) is given by
    the following:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 联合配置 (*v*, *h*) 的能量 *E*(*v*, *h*) 由以下给出：
- en: '![$$ E\left(v,h\right)=-{b}^Tv-{c}^Th-{v}^T Wh $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ11.png)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ11.png)'
- en: (5.3.3)
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.3)
- en: '![$$ E\left(v,h\right)=-\sum \limits_{i=1}^m{b}_i{v}_i-\sum \limits_{j=1}^n{c}_j{h}_j-\sum
    \limits_{j=1}^n\sum \limits_{i=1}^m{v}_i{w}_{ij}{h}_j $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ12.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ12.png)'
- en: (5.3.4)
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.4)
- en: The vectors *b* = [*b*[1] *b*[2]…*b*[*m*]]^(*T*) ∈ *R*^(*m* × 1) and *c* = [*c*[1] *c*[2]….
    *c*[*n*]]^(*T*) ∈ *R*^(*n* × 1) are biases at the visible and hidden units, respectively,
    as we will see later.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 向量 *b* = [*b*[1] *b*[2]…*b*[*m*]]^(*T*) ∈ *R*^(*m* × 1) 和 *c* = [*c*[1] *c*[2]…
    *c*[*n*]]^(*T*) ∈ *R*^(*n* × 1) 分别是可见单元和隐藏单元的偏置，正如我们稍后将会看到的。
- en: 'In any graphical probabilistic model, the idea is to compute the joint probability
    distribution over various sets of events. Combining ([5.3.1](#Equ9)) and ([5.3.3](#Equ11)),
    we get the following:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何图形概率模型中，思想是计算各种事件集合的联合概率分布。结合 ([5.3.1](#Equ9)) 和 ([5.3.3](#Equ11))，我们得到以下：
- en: '![$$ P\left(v,h\right)=\frac{e^{b^Tv+{c}^Th+{v}^T Wh}}{Z} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ13.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ13.png)'
- en: (5.3.5)
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.5)
- en: The partition function *Z* is hard to compute, which makes the computation of
    *P*(*v*, *h*) hard to compute. For a small set of events, it is possible to compute
    the partition function. If there are many variables in *v* and *h*, the number
    of possible joint events will be exceedingly large, considering all such combinations
    become hard.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 配分函数 *Z* 难以计算，这使得 *P*(*v*, *h*) 的计算变得困难。对于事件的小集合，可以计算配分函数。如果 *v* 和 *h* 中有许多变量，可能的联合事件数量将非常大，考虑到所有这些组合都变得难以计算。
- en: 'However, the conditional probability distribution *P*(*h*/*v*) is easy to compute
    and sample from. The following deduction will justify this:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，条件概率分布 *P*(*h*/*v*）易于计算和采样。以下推导将证明这一点：
- en: '![$$ {\displaystyle \begin{array}{c}P\left(h/v\right)=\frac{P\left(v,h\right)}{P(v)}\\
    {}=\frac{P\left(v,h\right)}{\sum \limits_hP\left(v,h\right)}\\ {}\space =\frac{\frac{e^{b^Tv+{c}^Th+{v}^T
    Wh}}{Z}}{\sum \limits_h\frac{e^{b^Tv+{c}^Th+{v}^T Wh}}{Z}}\\ {}\space =\frac{e^{b^Tv+{c}^Th+{v}^T
    Wh}}{\sum \limits_h{e}^{b^Tv+{c}^Th+{v}^T Wh}}\\ {}\space =\frac{e^{b^Tv}{e}^{c^Th}{e}^{v^T
    Wh}}{e^{b^Tv}{\sum}_h{e}^{c^Th}{e}^{v^T Wh}}\\ {}\space =\frac{e^{c^Th}{e}^{v^T
    Wh}}{\sum \limits_h{e}^{c^Th}{e}^{v^T Wh}}\end{array}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equag.png)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equag.png)'
- en: 'We can expand the numerator and denominator in terms of the components of the
    different vectors involved, as follows:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将分子和分母按涉及的不同向量的分量展开，如下所示：
- en: '![$$ {\displaystyle \begin{array}{l}{e}^{c^Th}{e}^{v^T Wh}={e}^{c^Th+{v}^T
    Wh}\\ {}\operatorname{}={e}^{\sum \limits_{j=1}^n\left({c}_j{h}_j+{v}^TW\left[:,j\right]{h}_j\right)}\end{array}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equah.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equah.png)'
- en: 'Since the exponential of a sum is equal to the product of the exponentials,
    the preceding equation can be written in product form as follows:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 由于和的指数等于指数的乘积，前面的方程可以写成如下乘积形式：
- en: '![$$ {e}^{c^Th}{e}^{v^T Wh}=\prod \limits_{j=1}^n{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ14.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ14.png)'
- en: (5.3.6)
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.6)
- en: 'Now, let’s look at the denominator, which looks similar to the numerator only
    with a sum over all possible hidden states *h*. Using the expression for ![$$
    {e}^{c^Th}{e}^{v^T Wh} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq9.png)
    in ([5.3.6](#Equ14)), the denominator can be expressed as follows:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看分母，它与分子看起来相似，只是对所有的可能隐藏状态 *h* 进行了求和。使用 ([5.3.6](#Equ14)) 中的 ![$$ {e}^{c^Th}{e}^{v^T
    Wh} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq9.png) 的表达式，分母可以表示如下：
- en: '![$$ \sum \limits_h{e}^{c^Th}{e}^{v^T Wh}=\space \sum \limits_h\prod \limits_{j=1}^n{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ15.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \sum \limits_h{e}^{c^Th}{e}^{v^T Wh}=\space \sum \limits_h\prod \limits_{j=1}^n{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ15.png)'
- en: (5.3.7)
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.7)
- en: 'The sum over vector means the sum over all combinations of its components.
    Each hidden unit *h*[*i*] can have a binary state of 0 or 1, and hence *h*[*j*] ∈ {0,
    1} ∀ *j* ∈ (1, 2, 3, ..*n*}. So, the summation over vector *h* in ([5.3.7](#Equ15))
    can be expanded into multiple summations corresponding to each of its components:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 向量的求和意味着对其所有分量组合的求和。每个隐藏单元 *h*[*i*] 可以有一个二进制状态 0 或 1，因此 *h*[*j*] ∈ {0, 1} ∀
    *j* ∈ (1, 2, 3, ..*n*}。所以，在 ([5.3.7](#Equ15)) 中对向量 *h* 的求和可以展开成对应于其每个分量的多个求和：
- en: '![$$ {\displaystyle \begin{array}{c}\sum \limits_h{e}^{c^Th}{e}^{v^T Wh}=\sum
    \limits_{h_1=0}^1\sum \limits_{h_2=0}^1..\sum \limits_{h_n=0}^1\prod \limits_{j=1}^n{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}\\
    {}=\sum \limits_{h_1=0}^1\sum \limits_{h_2=0}^1..\sum \limits_{h_n=0}^1\left({e}^{c_1{h}_1+{v}^TW\left[:,1\right]{h}_1}\right)\left({e}^{c_2{h}_2+{v}^TW\left[:,2\right]{h}_2}\right)\dots
    \left({e}^{c_n{h}_n+{v}^TW\left[:,n\right]{h}_n}\right)\end{array}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ16.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{c}\sum \limits_h{e}^{c^Th}{e}^{v^T Wh}=\sum
    \limits_{h_1=0}^1\sum \limits_{h_2=0}^1..\sum \limits_{h_n=0}^1\prod \limits_{j=1}^n{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}\\
    {}=\sum \limits_{h_1=0}^1\sum \limits_{h_2=0}^1..\sum \limits_{h_n=0}^1\left({e}^{c_1{h}_1+{v}^TW\left[:,1\right]{h}_1}\right)\left({e}^{c_2{h}_2+{v}^TW\left[:,2\right]{h}_2}\right)\dots
    \left({e}^{c_n{h}_n+{v}^TW\left[:,n\right]{h}_n}\right)\end{array}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ16.png)'
- en: (5.3.8)
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.8)
- en: 'Now, let’s look at a very simple manipulation involving products and sums with
    two discrete variables *a* and *b*:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看涉及两个离散变量 *a* 和 *b* 的一个非常简单的乘积和求和操作：
- en: '![$$ {\displaystyle \begin{array}{c}\sum \limits_{j=1}^2\sum \limits_{i=1}^3{a}_i{b}_j={a}_1{b}_1+{a}_2{b}_1+{a}_3{b}_1+{a}_1{b}_2+{a}_2{b}_2+{a}_3{b}_2\\
    {}={b}_1\left({a}_1+{a}_2+{a}_3\right)+{b}_2\left({a}_1+{a}_2+{a}_3\right)\\ {}\space
    =\left({a}_1+{a}_2+{a}_3\right)\left({b}_1+{b}_2\right)\\ {}\space =\left(\sum
    \limits_{i=1}^3{a}_i\right)\left(\sum \limits_{j=1}^2{b}_j\right)\end{array}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equai.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{c}\sum \limits_{j=1}^2\sum \limits_{i=1}^3{a}_i{b}_j={a}_1{b}_1+{a}_2{b}_1+{a}_3{b}_1+{a}_1{b}_2+{a}_2{b}_2+{a}_3{b}_2\\
    {}={b}_1\left({a}_1+{a}_2+{a}_3\right)+{b}_2\left({a}_1+{a}_2+{a}_3\right)\\ {}\space
    =\left({a}_1+{a}_2+{a}_3\right)\left({b}_1+{b}_2\right)\\ {}\space =\left(\sum
    \limits_{i=1}^3{a}_i\right)\left(\sum \limits_{j=1}^2{b}_j\right)\end{array}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equai.png)'
- en: 'So, we see that when we take elements of variables with independent indices,
    the sum of the products of the variables can be expressed as the product of the
    sum of the variables. Similar to this example, the elements of *h* (i.e., *h*[*i*])
    in general are involved in the product ![$$ \left({e}^{c_1{h}_1+{v}^TW\left[:,1\right]{h}_1}\right)\left({e}^{c_2{h}_2+{v}^TW\left[:,2\right]{h}_2}\right)\dots
    \left({e}^{c_n{h}_n+{v}^TW\left[:,n\right]{h}_n}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq10.png)
    independently, and hence the expression in ([5.3.8](#Equ16)) can be simplified
    as follows:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们看到当我们取具有独立索引的变量的元素时，变量的乘积之和可以表示为变量之和的乘积。类似于这个例子，*h* 的元素（即 *h*[*i*]）通常独立地参与以下乘积
    ![$$ \left({e}^{c_1{h}_1+{v}^TW\left[:,1\right]{h}_1}\right)\left({e}^{c_2{h}_2+{v}^TW\left[:,2\right]{h}_2}\right)\dots
    \left({e}^{c_n{h}_n+{v}^TW\left[:,n\right]{h}_n}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq10.png)，因此
    ([5.3.8](#Equ16)) 中的表达式可以简化如下：
- en: '![$$ \sum \limits_h{e}^{c^Th}{e}^{v^T Wh}=\sum \limits_{h_1=0}^1\left({e}^{c_1{h}_1+{v}^TW\left[:,1\right]{h}_1}\right)\sum
    \limits_{h_1=0}^1\left({e}^{c_2{h}_2+{v}^TW\left[:,2\right]{h}_2}\right)..\sum
    \limits_{h_n=0}^1\left({e}^{c_n{h}_n+{v}^TW\left[:,n\right]{h}_n}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaj.png)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \sum \limits_h{e}^{c^Th}{e}^{v^T Wh}=\sum \limits_{h_1=0}^1\left({e}^{c_1{h}_1+{v}^TW\left[:,1\right]{h}_1}\right)\sum
    \limits_{h_1=0}^1\left({e}^{c_2{h}_2+{v}^TW\left[:,2\right]{h}_2}\right)..\sum
    \limits_{h_n=0}^1\left({e}^{c_n{h}_n+{v}^TW\left[:,n\right]{h}_n}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaj.png)'
- en: '![$$ \sum \limits_h{e}^{c^Th}{e}^{v^T Wh}=\prod \limits_{j=1}^n\sum \limits_{h_j=0}^1\left({e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ17.png)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ17.png)'
- en: (5.3.9)
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.9)
- en: 'Combining the expressions for numerator and denominator from ([5.3.6](#Equ14))
    and ([5.3.9](#Equ17)), we have the following:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 将([5.3.6](#Equ14))和([5.3.9](#Equ17))的分子和分母的表达式结合起来，我们得到以下结果：
- en: '![$$ P\left(h/v\right)=\frac{\prod \limits_{j=1}^n{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}}{\prod
    \limits_{j=1}^n{\sum}_{h_j=0}^1{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equak.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equak.png)'
- en: 'Simplifying this in terms of components of *h* on both sides, we get the following:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在*h*的分量上简化这个表达式，我们得到以下结果：
- en: '![$$ P\left({h}_1{h}_2..{h}_n/v\right)=\prod \limits_{j=1}^n\left(\frac{e^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}}{\sum
    \limits_{h_j=0}^1{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equal.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equal.png)'
- en: '![$$ =\left(\frac{e^{c_1{h}_1+{v}^TW\left[:,1\right]{h}_1}}{\sum \limits_{h_1=0}^1{e}^{c_1{h}_1+{v}^TW\left[:,1\right]{h}_1}}\right)\left(\frac{e^{c_2{h}_2+{v}^TW\left[:,1\right]{h}_2}}{\sum
    \limits_{h_2=0}^1{e}^{c_2{h}_2+{v}^TW\left[:,2\right]{h}_2}}\right)\left(\frac{e^{c_n{h}_n+{v}^TW\left[:,n\right]{h}_n}}{\sum
    \limits_{h_n=0}^1{e}^{c_n{h}_n+{v}^TW\left[:,n\right]{h}_{1n}}}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ18.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ18.png)'
- en: (5.3.10)
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.10)
- en: 'The joint probability distribution of elements of *h* conditioned on *v* has
    factored into the product of expressions independent of each other conditioned
    on *v*. This leads to the fact that the components of *h* (i.e., *h*[*i*] ∀ *i* ∈ {1,
    2, …*n*}) are conditionally independent of each other given *v*. This gives us
    the following:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 在给定*v*的条件下，*h*的元素的条件联合概率分布分解为相互独立的表达式的乘积。这导致*h*的分量（即*h*[*i*] ∀ *i* ∈ {1, 2,
    …*n*}）在给定*v*的条件下相互独立。这给我们以下结果：
- en: '![$$ P\left({h}_1{h}_2..{h}_n/v\right)=P\left({h}_1/v\right)P\left({h}_2/v\right)..P\left({h}_n/v\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ19.png)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ19.png)'
- en: (5.3.11)
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.11)
- en: '![$$ P\left({h}_j/v\right)=\frac{e^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}}{\sum
    \limits_{h_j=0}^1{e}^{c_j{h}_j+{v}^TW\left[:,j\right]{h}_j}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ20.png)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ20.png)'
- en: (5.3.12)
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.12)
- en: 'Replacing *h*[*j*] = 1 and *h*[*j*] = 0 in ([5.3.12](#Equ20)), we get the following:'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 将([5.3.12](#Equ20))中的*h*[*j*] = 1和*h*[*j*] = 0替换，我们得到以下结果：
- en: '![$$ P\left({h}_j=1/v\right)=\frac{e^{c_j+{v}^TW\left[:,j\right]}}{1+{e}^{c_j+{v}^TW\left[:,j\right]}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ21.png)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ21.png)'
- en: (5.3.13)
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.13)
- en: '![$$ P\left({h}_j=0/v\right)=\frac{1}{1+{e}^{c_j+{v}^TW\left[:,j\right]}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ22.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ22.png)'
- en: (5.3.14)
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.14)
- en: 'The expressions for ([5.3.13](#Equ21)) and ([5.3.14](#Equ22)) illustrate the
    fact that the hidden units *h*[*i*] ∀ *i* ∈ {1, 2, …*n*} are independent sigmoid
    units:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: ([5.3.13](#Equ21))和([5.3.14](#Equ22))的表达式说明了隐藏单元*h*[*i*] ∀ *i* ∈ {1, 2, …*n*}是独立的sigmoid单元：
- en: '![$$ P\left({h}_j=1/v\right)=\sigma \left({c}_j+{v}^TW\left[:,j\right]\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ23.png)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ23.png)'
- en: (5.3.15)
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.15)
- en: 'Expanding the components of *v* and *W*[:, *j*], we can rewrite ([5.3.15](#Equ23))
    as follows:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 展开向量*v*和*W*[:, *j*]的分量，我们可以将([5.3.15](#Equ23))重新写为以下形式：
- en: '![$$ P\left({h}_j=1/v\right)=\sigma \left({c}_j+\sum \limits_{i=1}^m{v}_i{w}_{ij}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ24.png)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({h}_j=1/v\right)=\sigma \left({c}_j+\sum \limits_{i=1}^m{v}_i{w}_{ij}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ24.png)'
- en: (5.3.16)
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.16)
- en: where *σ*(.) represents the sigmoid function such that
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 其中*σ*(.)代表sigmoid函数，使得
- en: '![$$ \sigma (x)=\frac{1}{\left(1+{e}^{-x}\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equam.png)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \sigma (x)=\frac{1}{\left(1+{e}^{-x}\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equam.png)'
- en: Proceeding in a similar fashion, it can be proven that
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 以类似的方式继续进行，可以证明
- en: '![$$ P\left({v}_1{v}_2..{v}_m/h\right)=\space P\left({v}_1/h\right)P\left({v}_2/h\right)..P\left({v}_m/h\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equan.png)'
  id: totrans-229
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({v}_1{v}_2..{v}_m/h\right)=\space P\left({v}_1/h\right)P\left({v}_2/h\right)..P\left({v}_m/h\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equan.png)'
- en: 'which means the hidden units are conditionally independent of each other given
    the visible states. Since RBM is a symmetrical undirected network, like the visible
    units, the probability of the visible units given the hidden states can be similarly
    expressed as follows:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着隐藏单元在给定可见状态的情况下相互独立。由于RBM是一个对称的无向网络，就像可见单元一样，给定隐藏状态时可见单元的概率可以类似地表示如下：
- en: '![$$ P\left({v}_i=1/h\right)=\sigma \left({b}_i+\sum \limits_{j=1}^n{h}_j{w}_{ij}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ25.png)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({v}_i=1/h\right)=\sigma \left({b}_i+\sum \limits_{j=1}^n{h}_j{w}_{ij}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ25.png)'
- en: (5.3.17)
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.17)
- en: From ([5.3.16](#Equ24)) and ([5.3.17](#Equ25)), we can clearly see that the
    visible and hidden units are actually binary sigmoid units with the vectors *b*
    and *c* providing the biases at the visible and hidden units, respectively. This
    symmetrical and independent conditional dependence of the hidden and visible units
    can be useful while training the model.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 从([5.3.16](#Equ24))和([5.3.17](#Equ25))中，我们可以清楚地看到，可见单元和隐藏单元实际上是具有向量*b*和*c*提供偏置的二进制sigmoid单元。隐藏单元和可见单元这种对称且独立的条件依赖性在训练模型时可能很有用。
- en: Training a Restricted Boltzmann Machine
  id: totrans-234
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练受限玻尔兹曼机
- en: 'We need to train the Boltzmann machine in order to derive the model parameters
    *b*, *c*, *W*, where *b* and *c* are the bias vectors at the visible and hidden
    units, respectively, and *W* is the weight connection matrix between the visible
    and hidden layers. For ease of reference, the model parameters can be collectively
    referred to as follows:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要训练玻尔兹曼机以推导出模型参数*b*、*c*、*W*，其中*b*和*c*分别是可见单元和隐藏单元的偏置向量，而*W*是可见层和隐藏层之间的权重连接矩阵。为了便于参考，可以将模型参数统称为以下内容：
- en: '![$$ \theta =\left[b;c;W\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equao.png)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \theta =\left[b;c;W\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equao.png)'
- en: 'The model can be trained by maximizing the log likelihood function of the input
    data points with respect to the model parameters. The input is nothing but the
    data corresponding to the visible units for each data point. The likelihood function
    is given by the following:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型可以通过最大化输入数据点的对数似然函数相对于模型参数来训练。输入仅仅是每个数据点对应于可见单元的数据。似然函数由以下给出：
- en: '![$$ L\left(\theta \right)=P\left({v}^{(1)}{v}^{(2)}..{v}^{(m)}/\theta \right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equap.png)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![$$ L\left(\theta \right)=P\left({v}^{(1)}{v}^{(2)}..{v}^{(m)}/\theta \right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equap.png)'
- en: Assuming the data points are independent given the model,
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 假设给定模型，数据点是独立的，
- en: '![$$ L\left(\theta \right)=P\left({v}^{(1)}/\theta \left)P\right({v}^{(2)}/\theta
    \right)..P\left({v}^{(m)}/\theta \right)=\prod \limits_{t=1}^mP\left({v}^{(t)}/\theta
    \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ26.png)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
  zh: '![$$ L\left(\theta \right)=P\left({v}^{(1)}/\theta \left)P\right({v}^{(2)}/\theta
    \right)..P\left({v}^{(m)}/\theta \right)=\prod \limits_{t=1}^mP\left({v}^{(t)}/\theta
    \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ26.png)'
- en: (5.3.18)
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.18)
- en: 'Taking the log on both sides to get the log likelihood expression of the function
    in ([5.3.18](#Equ26)), we have the following:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 对等式([5.3.18](#Equ26))的两边取对数，得到函数的对数似然表达式，如下所示：
- en: '![$$ C=\log L\left(\theta \right)=\sum \limits_{t=1}^m\log P\left({v}^{(t)}/\theta
    \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ27.png)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C=\log L\left(\theta \right)=\sum \limits_{t=1}^m\log P\left({v}^{(t)}/\theta
    \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ27.png)'
- en: (5.3.19)
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.19)
- en: 'Expanding the probabilities in ([5.3.19](#Equ27)) by its joint probability
    form, we get the following:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 通过其联合概率形式展开 ([5.3.19](#Equ27)) 中的概率，我们得到以下结果：
- en: '![$$ {\displaystyle \begin{array}{c}C=\sum \limits_{t=1}^m logP\left({v}^{(t)}/\theta
    \right)\\ {}\space =\sum \limits_{t=1}^m\mathit{\log}\sum \limits_hP\left({v}^{(t)},h/\theta
    \right)\\ {}\space \space =\sum \limits_{t=1}^m\mathit{\log}\sum \limits_h\frac{e^{-E\left({v}^{(t)},h\right)}}{Z}\\
    {}\space \space =\sum \limits_{t=1}^m\mathit{\log}\frac{\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}}{Z}\\
    {}\space \space =\sum \limits_{t=1}^m\mathit{\log}\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}-\sum
    \limits_{t=1}^m logZ\\ {}\space \space =\sum \limits_{t=1}^m\mathit{\log}\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}- mlogZ\end{array}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ28.png)'
  id: totrans-246
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{c}C=\sum \limits_{t=1}^m logP\left({v}^{(t)}/\theta
    \right)\\ {}\space =\sum \limits_{t=1}^m\mathit{\log}\sum \limits_hP\left({v}^{(t)},h/\theta
    \right)\\ {}\space \space =\sum \limits_{t=1}^m\mathit{\log}\sum \limits_h\frac{e^{-E\left({v}^{(t)},h\right)}}{Z}\\
    {}\space \space =\sum \limits_{t=1}^m\mathit{\log}\frac{\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}}{Z}\\
    {}\space \space =\sum \limits_{t=1}^m\mathit{\log}\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}-\sum
    \limits_{t=1}^m logZ\\ {}\space \space =\sum \limits_{t=1}^m\mathit{\log}\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}- mlogZ\end{array}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ28.png)'
- en: (5.3.20)
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.20)
- en: 'The partition function *Z* is not constrained by visible-layer inputs *v*^((*t*))
    unlike the first term in ([5.3.20](#Equ28)). *Z* is the sum of the negative exponentials
    of the energies over all possible combinations of *v* and *h* and so can be expressed
    as follows:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 分子函数 *Z* 不受可见层输入 *v*^((*t*)) 的约束，与 ([5.3.20](#Equ28)) 中的第一项不同。*Z* 是所有可能的 *v*
    和 *h* 组合的能量负指数之和，因此可以表示如下：
- en: '![$$ Z=\sum \limits_v\sum \limits_h{e}^{-E\left(v,h\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaq.png)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Z=\sum \limits_v\sum \limits_h{e}^{-E\left(v,h\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaq.png)'
- en: 'Replacing *Z* with this expression in ([5.3.20](#Equ28)), we get the following:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 将 *Z* 用这个表达式替换 ([5.3.20](#Equ28))，我们得到以下结果：
- en: '![$$ C=\sum \limits_{t=1}^m\log \sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}-m\log
    \sum \limits_v\sum \limits_h{e}^{-E\left(v,h\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ29.png)'
  id: totrans-251
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C=\sum \limits_{t=1}^m\log \sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}-m\log
    \sum \limits_v\sum \limits_h{e}^{-E\left(v,h\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ29.png)'
- en: (5.3.21)
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.21)
- en: 'Now, let’s take the gradient of the cost function with respect to the combined
    parameter *θ*. We can think of *C* as comprising two components, *ρ*^+ and *ρ*^−,
    as shown in the following:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们对成本函数关于组合参数 *θ* 求梯度。我们可以将 *C* 视为包含两个部分，*ρ*^+ 和 *ρ*^−，如下所示：
- en: '![$$ {\rho}^{+}=\sum \limits_{t=1}^m\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equar.png)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\rho}^{+}=\sum \limits_{t=1}^m\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equar.png)'
- en: '![$$ {\rho}^{-}=m\log \sum \limits_v\sum \limits_h{e}^{-E\left(v,h\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equas.png)'
  id: totrans-255
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\rho}^{-}=m\log \sum \limits_v\sum \limits_h{e}^{-E\left(v,h\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equas.png)'
- en: 'Taking the gradient of *ρ*^+ with respect to *θ*, we have the following:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 对 *ρ*^+ 关于 *θ* 求梯度，我们得到以下结果：
- en: '![$$ {\nabla}_{\theta}\left({\rho}^{+}\right)=\sum \limits_{t=1}^m\frac{\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)}{\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ30.png)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_{\theta}\left({\rho}^{+}\right)=\sum \limits_{t=1}^m\frac{\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)}{\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ30.png)'
- en: (5.3.22)
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.22)
- en: 'Now, let’s simplify ![$$ \frac{\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)}{\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq11.png)
    by dividing both the numerator and the denominator by *Z*:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们通过将分子和分母都除以 *Z* 来简化 ![$$ \frac{\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)}{\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq11.png)：
- en: '![$$ {\nabla}_{\theta}\left({\rho}^{+}\right)=\sum \limits_{t=1}^m\frac{\sum
    \limits_h\frac{e^{-E\left({v}^{(t)},h\right)}}{Z}{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)}{\frac{\sum
    \limits_h{e}^{-E\left({v}^{(t)},h\right)}}{Z}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ31.png)'
  id: totrans-260
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ31.png)'
- en: (5.3.23)
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.23)
- en: '![$$ \frac{e^{-E\left({v}^{(t)},h\right)}}{Z}=P\left({v}^{(t)},h/\theta \right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq12.png) and ![$$
    \frac{\sum \limits_h{e}^{-E\left({v}^{(t)},h\right)}}{Z}=P\left({v}^{(t)}/\theta
    \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq13.png).
    Using these expressions for the probabilities in ([5.3.23](#Equ31)), we get the
    following:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '![概率公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq12.png)
    和 ![概率公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq13.png)。使用这些表达式来处理
    ([5.3.23](#Equ31)) 中的概率，我们得到以下结果：'
- en: '![$$ {\displaystyle \begin{array}{c}{\nabla}_{\theta}\left({\rho}^{+}\right)=\sum
    \limits_{t=1}^m\frac{\sum \limits_hP\left({v}^{(t)},h/\theta \right){\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)}{P\left({v}^{(t)}/\theta
    \right)}\\ {}\space =\sum \limits_{t=1}^m\sum \limits_h\frac{P\left({v}^{(t)},h/\theta
    \right)}{P\left({v}^{(t)}/\theta \right)}{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\\
    {}=\sum \limits_{t=1}^m\sum \limits_hP\left(h/{v}^{(t)},\theta \right){\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\end{array}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ32.png)'
  id: totrans-263
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ32.png)'
- en: (5.3.24)
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.24)
- en: One can remove the *θ* from the probability notations, such as *P*(*v*^((*t*)),
    *h*/*θ*), *P*(*v*^((*t*)), *h*/*θ*), and so forth, for ease of notation if one
    wishes to, but it is better to keep them since it makes the deductions more complete,
    which allows for better interpretability of the overall training process.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 可以从概率符号中移除 *θ*，例如 *P*(*v*^((*t*)), *h*/*θ*), *P*(*v*^((*t*)), *h*/*θ*), 等等，如果愿意的话，为了简化符号，但最好保留它们，因为这样可以使推导更加完整，从而更好地解释整个训练过程。
- en: 'Let us look at the expectation of functions, which gives us the expression
    seen in ([5.3.24](#Equ32)) in a more meaningful form ideal for training purposes.
    The expectation of *f* (*x*), given *x*, follows probability mass function *P*(*x*)
    and is given by the following:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看函数的期望，它以更具有意义的形式给出了 ([5.3.24](#Equ32)) 中的表达式，这对于训练目的来说是非常理想的。给定 *x* 的 *f*
    (*x*) 的期望遵循概率质量函数 *P*(*x*)，并由以下给出：
- en: '![$$ E\left[f(x)\right]=\sum \limits_xP(x)f(x) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equat.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![期望公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equat.png)'
- en: If *x* = [*x*[1] *x*[2]…. *x*[*n*]]^(*T*) ∈ *R*^(*n* × 1) is multivariate, then
    the preceding expression holds true and
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 *x* = [*x*[1] *x*[2]… *x*[*n*]]^(*T*) ∈ *R*^(*n* × 1) 是多元的，那么前面的表达式是正确的，并且
- en: '![$$ E\left[f(x)\right]=\sum \limits_xP(x)f(x)=\sum \limits_{x_1}\sum \limits_{x_2}..\sum
    \limits_{x_n}P\left({x}_1,{x}_2,..,{x}_n\right)f\left({x}_1,{x}_2,..,{x}_n\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equau.png)'
  id: totrans-269
  prefs: []
  type: TYPE_IMG
  zh: '![期望公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equau.png)'
- en: 'Similarly, if *f* (*x*) is a vector of functions such that *f* (*x*) = [ *f*[1](*x*)*f*[2](*x*)]^(*T*),
    one can use the same expression as for expectation. Here, one would get a vector
    of expectations, as follows:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，如果 *f* (*x*) 是一个函数向量，使得 *f* (*x*) = [ *f*[1](*x*) *f*[2](*x*)]^(*T*)，可以使用与期望相同的表达式。在这里，会得到一个期望向量，如下所示：
- en: '![$$ E\left[f(x)\right]=\sum \limits_xP(x)f(x)=\left[\begin{array}{c}\sum \limits_{x_1}\sum
    \limits_{x_2}..\sum \limits_{x_n}P\left({x}_1,{x}_2,..,{x}_n\right){f}_1\left({x}_1,{x}_2,..,{x}_n\right)\\
    {}\sum \limits_{x_1}\sum \limits_{x_2}..\sum \limits_{x_n}P\left({x}_1,{x}_2,..,{x}_n\right){f}_2\left({x}_1,{x}_2,..,{x}_n\right)\end{array}\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ33.png)'
  id: totrans-271
  prefs: []
  type: TYPE_IMG
  zh: '![E[f(x)]=∑_xP(x)f(x)=[∑_x_1∑_x_2...∑_x_nP(x_1,x_2,...,x_n)f_1(x_1,x_2,...,x_n)∑_x_1∑_x_2...∑_x_nP(x_1,x_2,...,x_n)f_2(x_1,x_2,...,x_n)]](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ33.png)'
- en: (5.3.25)
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.25)
- en: 'To explicitly mention the probability distribution in the expectation notation,
    one can rewrite the expectation of functions or expectation of vector of functions
    whose variables *x* follow probability distribution *P*(*x*) as follows:'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在期望符号中明确提及概率分布，可以将变量*x*遵循概率分布*P*(x)的函数的期望或函数向量期望重写如下：
- en: '![$$ {E}_{P(x)}\left[f(x)\right]=\sum \limits_xP(x)f(x) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equav.png)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![E_P(x)[f(x)]=∑_xP(x)f(x)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equav.png)'
- en: 'Since we are working with gradients, which are vectors of different partial
    derivatives, and each of the partial derivatives is a function of *h* for given
    values of *θ* and *v*, the equation in ([5.3.24](#Equ32)) can be expressed in
    terms of expectation of the gradient ∇[*θ*](−*E*(*v*^((*t*)), *h*)) with respect
    to the probability distribution *P*(*h*/*v*^((*t*)), *θ*) as follows:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们处理的是梯度，它是不同偏导数的向量，并且每个偏导数都是*h*的函数，给定*θ*和*v*的值，因此([5.3.24](#Equ32))中的方程可以用关于概率分布*P*(h/v^(t),θ)的梯度期望∇[*θ*](−*E*(*v*^((*t*)),
    *h*))来表示，如下所示：
- en: '![$$ {\nabla}_{\theta}\left({\rho}^{+}\right)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ34.png)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![∇_θ(ρ^+)=∑_t=1^mE_P(h/v^(t),θ)[∇_θ(-E(v^(t),h))]](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ34.png)'
- en: (5.3.26)
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.26)
- en: Note that the expectation ![$$ {E}_{P\left(h/{v}^{(t)},\theta \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq14.png) is a
    vector of expectations, as has been illustrated in ([5.3.25](#Equ33)).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，期望![E_P(h/v^(t),θ)[∇_θ(-E(v^(t),h))]](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq14.png)是一个期望向量，如([5.3.25](#Equ33))所示。
- en: 'Now, let’s get to the gradient of ![$$ {\rho}^{-}=m\log \sum \limits_v\sum
    \limits_h{e}^{-E\left(v,h\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq15.png)
    with respect to the *θ*:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们求关于*θ*的梯度![ρ^-=mlog∑_v∑_he^(-E(v,h))]([ρ^-=mlog∑_v∑_he^(-E(v,h))])(../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq15.png)：
- en: '![$$ {\displaystyle \begin{array}{c}{\nabla}_{\theta}\left({\rho}^{-}\right)=m\frac{\sum
    \limits_v\sum \limits_h{e}^{-E\left(v,h\right)}{\nabla}_{\theta}\left(-E\left(v,h\right)\right)}{\sum
    \limits_v\sum \limits_h{e}^{-E\left(v,h\right)}}\\ {}\space =m\frac{\sum \limits_v\sum
    \limits_h{e}^{-E\left(v,h\right)}{\nabla}_{\theta}\left(-E\left(v,h\right)\right)}{Z}\\
    {}\space =m\sum \limits_v\sum \limits_h\frac{e^{-E\left(v,h\right)}}{Z}{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\\
    {}=m\sum \limits_v\sum \limits_hP\left(v,h/\theta \right){\nabla}_{\theta}\left(-E\left(v,h\right)\right)\\
    {}\space =m{E}_{P\left(h,v/\theta \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right]\end{array}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ35.png)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![∇_θ(ρ^-)=m(∑_v∑_he^(-E(v,h))/∇_θ(-E(v,h)))(∑_v∑_he^(-E(v,h)))/(∑_v∑_he^(-E(v,h)))](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ35.png)'
- en: (5.3.27)
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.27)
- en: 'The expectation in ([5.3.27](#Equ35)) is over the joint distribution of *h*
    and *v*, whereas the expectation in ([5.3.26](#Equ34)) is over the *h* given a
    seen *v*. Combining ([5.3.26](#Equ34)) and ([5.3.27](#Equ35)), we get the following:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: ([5.3.27](#Equ35))中的期望是在*h*和*v*的联合分布上，而([5.3.26](#Equ34))中的期望是在给定已观察*v*的*h*上。结合([5.3.26](#Equ34))和([5.3.27](#Equ35))，我们得到以下结果：
- en: '![$$ {\nabla}_{\theta }(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]-{mE}_{P\left(h,v/\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ36.png)'
  id: totrans-283
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_{\theta }(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]-{mE}_{P\left(h,v/\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ36.png)'
- en: (5.3.28)
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.28)
- en: If we look at the gradient with respect to all the parameters in ([5.3.28](#Equ36)),
    it has two terms. The first term is dependent on the seen data *v*^((*t*)), while
    the second term depends on samples from the model. The first term increases the
    likelihood of the given observed data, while the second term reduces the likelihood
    of data points from the model.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们观察 ([5.3.28](#Equ36)) 中的所有参数的梯度，它有两个项。第一项依赖于观察到的数据 *v*^((*t*))，而第二项依赖于模型中的样本。第一项增加了给定观察数据的似然性，而第二项减少了模型数据点的似然性。
- en: Now, let’s do some simplification of the gradient for each of the parameter
    sets in *θ*, i.e., *b*, *c*, and *W*.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们对 *θ* 中每个参数集的梯度进行一些简化，即，*b*、*c* 和 *W*。
- en: '![$$ {\nabla}_b\left(-E\left(v,h\right)\right)={\nabla}_b\left({b}^Tv+{c}^Th+{v}^T
    Wh\right)=v $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ37.png)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_b\left(-E\left(v,h\right)\right)={\nabla}_b\left({b}^Tv+{c}^Th+{v}^T
    Wh\right)=v $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ37.png)'
- en: (5.3.29)
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.29)
- en: '![$$ {\nabla}_c\left(-E\left(v,h\right)\right)={\nabla}_c\left({b}^Tv+{c}^Th+{v}^T
    Wh\right)=h $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ38.png)'
  id: totrans-289
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_c\left(-E\left(v,h\right)\right)={\nabla}_c\left({b}^Tv+{c}^Th+{v}^T
    Wh\right)=h $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ38.png)'
- en: (5.3.30)
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.30)
- en: '![$$ {\nabla}_W\left(-E\left(v,h\right)\right)={\nabla}_W\left({b}^Tv+{c}^Th+{v}^T
    Wh\right)={vh}^T $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ39.png)'
  id: totrans-291
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_W\left(-E\left(v,h\right)\right)={\nabla}_W\left({b}^Tv+{c}^Th+{v}^T
    Wh\right)={vh}^T $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ39.png)'
- en: (5.3.31)
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.31)
- en: 'Using ([5.3.28](#Equ36)) through ([5.3.31](#Equ39)), the expression for the
    gradient with respect to each of the parameter sets is given by the following:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ([5.3.28](#Equ36)) 到 ([5.3.31](#Equ39))，关于每个参数集的梯度表达式如下所示：
- en: '![$$ {\nabla}_b(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta \right)}\left[{v}^{(t)}\right]-{mE}_{P\left(h,v/\theta
    \right)}\left[v\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ40.png)'
  id: totrans-294
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_b(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta \right)}\left[{v}^{(t)}\right]-{mE}_{P\left(h,v/\theta
    \right)}\left[v\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ40.png)'
- en: (5.3.32)
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.32)
- en: Since the probability distribution of the first term is conditioned on v^((*t*)),
    the expectation of v^((*t*)) with respect to *P*(*h*/*v*^((*t*)), *θ*) is v^((*t*)).
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 由于第一项的概率分布是条件于 v^((*t*)) 的，因此 v^((*t*)) 关于 *P*(*h*/*v*^((*t*)), *θ*) 的期望是 v^((*t*)).
- en: '![$$ {\nabla}_b(C)=\sum \limits_{t=1}^m{v}^{(t)}-{mE}_{P\left(h,v/\theta \right)}\left[v\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ41.png)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_b(C)=\sum \limits_{t=1}^m{v}^{(t)}-{mE}_{P\left(h,v/\theta \right)}\left[v\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ41.png)'
- en: (5.3.33)
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.33)
- en: '![$$ {\nabla}_c(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta \right)}\left[h\right]-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ42.png)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_c(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta \right)}\left[h\right]-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ42.png)'
- en: (5.3.34)
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.34)
- en: The expectation of *h* over the probability distribution *P*(*h*/*v*^((*t*)),
    *θ*) can be easily computed since each of the units of *h* (i.e., *h*[*j*]) given
    *v*^((*t*)) is independent. Each of them is a sigmoid unit with two possible outcomes,
    and their expectation is nothing but the output of the sigmoid units, i.e.,
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 在概率分布 *P*(*h*/*v*^((*t*)), *θ*) 上对 *h* 的期望可以很容易地计算，因为给定 *v*^((*t*)) 的每个 *h*
    的单元（即 *h*[*j*]）都是独立的。每个单元都是一个具有两种可能结果的 Sigmoid 单元，它们的期望仅仅是 Sigmoid 单元的输出，即，
- en: '![$$ {E}_{P\left(h/{v}^{(t)},\theta \right)}\left[h\right]={\hat{h}}^{(t)}=\sigma
    \left(c+{W}^T{v}^{(t)}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaw.png)'
  id: totrans-302
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {E}_{P\left(h/{v}^{(t)},\theta \right)}\left[h\right]={\hat{h}}^{(t)}=\sigma
    \left(c+{W}^T{v}^{(t)}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaw.png)'
- en: 'If we replace the expectation with *ĥ*, then the expression in ([5.3.34](#Equ42))
    can be written as follows:'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将期望替换为 *ĥ*，那么 ([5.3.34](#Equ42)) 中的表达式可以写成以下形式：
- en: '![$$ {\nabla}_c(C)=\sum \limits_{t=1}^m{\hat{h}}^{(t)}-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ43.png)'
  id: totrans-304
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_c(C)=\sum \limits_{t=1}^m{\hat{h}}^{(t)}-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ43.png)'
- en: (5.3.35)
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.35)
- en: Similarly,
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，
- en: '![$$ {\displaystyle \begin{array}{l}{\nabla}_W\kern0.5em (C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\kern0.5em
    \theta \right)}\left[{v}^{(t)}{h}^T\right]-{mE}_{P\left(h,\kern0.5em v/q\right)}\left[h\right]\\
    {}\operatorname{}=\sum \limits_{t=1}^m{v}^{(t)}{\hat{h}}^{(t)T}-{mE}_{P\left(h,\kern0.5em
    v/\theta \right)}\left[h\right]\end{array}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ44.png)'
  id: totrans-307
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}{\nabla}_W\kern0.5em (C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\kern0.5em
    \theta \right)}\left[{v}^{(t)}{h}^T\right]-{mE}_{P\left(h,\kern0.5em v/q\right)}\left[h\right]\\
    {}\operatorname{}=\sum \limits_{t=1}^m{v}^{(t)}{\hat{h}}^{(t)T}-{mE}_{P\left(h,\kern0.5em
    v/\theta \right)}\left[h\right]\end{array}} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ44.png)'
- en: (5.3.36)
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.36)
- en: So, the expressions in ([5.3.33](#Equ41)), ([5.3.35](#Equ43)), and ([5.3.36](#Equ44))
    represent the gradients with respect to the three parameter sets. For easy reference,
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，([5.3.33](#Equ41))、([5.3.35](#Equ43)) 和 ([5.3.36](#Equ44)) 中的表达式代表了关于三个参数集的梯度。为了便于参考，
- en: '![$$ \left\{\begin{array}{l}{\nabla}_b(C)=\sum \limits_{t=1}^m{v}^{(t)}-{mE}_{P\left(h,v/\theta
    \right)}\left[v\right]\\ {}{\nabla}_c(C)=\sum \limits_{t=1}^m{\hat{h}}^{(t)}-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right]\\ {}{\nabla}_W(C)=\sum \limits_{t=1}^m{v}^{(t)}{\hat{h}}^{(t)^T}-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right]\end{array}\right. $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ45.png)'
  id: totrans-310
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left\{\begin{array}{l}{\nabla}_b(C)=\sum \limits_{t=1}^m{v}^{(t)}-{mE}_{P\left(h,v/\theta
    \right)}\left[v\right]\\ {}{\nabla}_c(C)=\sum \limits_{t=1}^m{\hat{h}}^{(t)}-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right]\\ {}{\nabla}_W(C)=\sum \limits_{t=1}^m{v}^{(t)}{\hat{h}}^{(t)^T}-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right]\end{array}\right. $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ45.png)'
- en: (5.3.37)
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: (5.3.37)
- en: Based on these gradients, gradient-descent techniques can be invoked to iteratively
    get the parameter values that maximize the likelihood function. However, there
    is a little complexity involved to compute the expectations with respect to the
    joint probability distribution *P*(*h*, *v*/*θ*) at each iteration of gradient
    descent. The joint distribution is hard to compute because of the seemingly large
    number of combinations for *h* and *v* in cases where they are moderate to large
    dimensionality vectors. Markov chain Monte Carlo sampling (MCMC) techniques, especially
    Gibbs sampling, can be used to sample from the joint distribution and compute
    the expectations in ([5.3.37](#Equ45)) for the different parameter sets. However,
    MCMC techniques take a long time to converge to a stationary distribution, after
    which they provide good samples. Hence, to invoke MCMC sampling at each iteration
    of gradient descent would make the learning very slow and impractical.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些梯度，可以调用梯度下降技术来迭代地获取最大化似然函数的参数值。然而，在梯度下降的每次迭代中计算关于联合概率分布 *P*(*h*, *v*/*θ*)
    的期望值涉及一些复杂性。由于在 *h* 和 *v* 是中等到高维向量的情况下，它们似乎有大量的组合，联合分布难以计算。马尔可夫链蒙特卡洛采样（MCMC）技术，特别是吉布斯采样，可以用来从联合分布中采样并计算不同参数集的期望值（[5.3.37](#Equ45)）。然而，MCMC
    技术需要很长时间才能收敛到平稳分布，之后它们提供良好的样本。因此，在梯度下降的每次迭代中都调用 MCMC 采样会使学习变得非常缓慢且不切实际。
- en: Gibbs Sampling
  id: totrans-313
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 吉布斯采样
- en: Gibbs sampling is a Markov chain Monte Carlo method that can be used to sample
    observations from a multivariate probability distribution. Suppose we want to
    sample from a multivariate joint probability distribution *P*(*x*) where *x* = [*x*[1]*x*[2].
    . *x*[*n*]]^(*T*).
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 吉布斯采样是一种马尔可夫链蒙特卡洛方法，可用于从多元概率分布中采样观测值。假设我们想从一个多元联合概率分布 *P*(*x*) 中采样，其中 *x* = [*x*[1]*x*[2].
    . *x*[*n*]]^(*T*).
- en: 'Gibbs sampling generates the next value of a variable *x*[*i*] conditioned
    on all the current values of the other variables. Let the *t*-th sample drawn
    be represented by *x*^((*t*)) = [*x*[1]^((*t*))*x*[2]^((*t*)). . *x*[*n*]^((*t*))]^(*T*).
    To generate the (*t* + 1) sample seen next, follow this logic:'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 吉布斯采样生成变量 *x*[*i*] 的下一个值，该值基于其他所有变量的当前值。让第 *t* 个抽取的样本表示为 *x*^((*t*)) = [*x*[1]^((*t*))*x*[2]^((*t*)).
    . *x*[*n*]^((*t*))]^(*T*). 要生成下一个 (*t* + 1) 个样本，遵循以下逻辑：
- en: Draw the variable *x*[*j*]^((*t* + 1)) by sampling it from a probability distribution
    conditioned on the rest of the variables. In other words, draw *x*[*j*]^((*t* + 1))
    from
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过从基于其他变量的概率分布中采样来抽取变量 *x*[*j*]^((*t* + 1))。换句话说，从
- en: '![$$ P\left({x_j}^{\left(t+1\right)}/{x_1}^{\left(t+1\right)}{x_2}^{\left(t+1\right)}..{x_{j-1}}^{\left(t+1\right)}{x_{j+1}}^{(t)}..{x_n}^{(t)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equax.png)'
  id: totrans-317
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equax.png)'
- en: So basically, for sampling *x*[*j*] conditioned on the rest of the variables,
    for the *j* − 1 variables before *x*[*j*], their values for the (*t* + 1) instance
    are considered since they have already been sampled, while for the rest of the
    variables, their values at instance *t* are considered since they are yet to be
    sampled. This step is repeated for all the variables.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 所以基本上，对于在其余变量条件下采样 *x*[*j*]，对于 *x*[*j*] 之前的 *j* − 1 个变量，它们的 (*t* + 1) 实例的值被考虑，因为它们已经被采样，而对于其余的变量，它们的
    *t* 实例的值被考虑，因为它们尚未被采样。这一步骤对所有变量都要重复进行。
- en: If each *x*[*j*] is discrete and can take, let’s say, two values 0 and 1, then
    we need to compute the probability *p*[1] = *P*(*x*[*j*]^((*t* + 1)) = 1/*x*[1]^((*t* + 1))*x*[2]^((*t* + 1)).
    . *x*[*j* − 1]^((*t* + 1))*x*[*j* + 1]^((*t*)). . *x*[*n*]^((*t*))). We can then
    draw a sample *u* from a uniform probability distribution between 0 and 1 (i.e.,
    *U*[0, 1]), and if *p*[1] ≥ *u* set *x*[*j*]^((*t* + 1)) = 1 , else set *x*[*j*]^((*t* + 1)) = 0\.
    This kind of random heuristics ensures that the higher the probability *p*[1]
    is, the greater the chances are of *x*[*j*]^((*t* + 1)) getting selected as 1\.
    However, it still leaves room for 0 getting selected with very low probability,
    even if *p*[1] is relatively large, thus ensuring that the Markov chain doesn’t
    get stuck in a local region and can explore other potential high-density regions
    as well. There is the same kind of heuristics that we saw for the Metropolis algorithm
    as well.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 如果每个 *x*[*j*] 是离散的，并且可以取，比如说，两个值 0 和 1，那么我们需要计算概率 *p*[1] = *P*(*x*[*j*]^((*t* + 1)) = 1/*x*[1]^((*t* + 1))*x*[2]^((*t* + 1)).
    . *x*[*j* − 1]^((*t* + 1))*x*[*j* + 1]^((*t*)). . *x*[*n*]^((*t*))). 然后，我们可以从
    0 到 1 的均匀概率分布中抽取一个样本 *u*（即 *U*[0, 1]），如果 *p*[1] ≥ *u*，则将 *x*[*j*]^((*t* + 1)) = 1
    设置，否则将 *x*[*j*]^((*t* + 1)) = 0\. 这种随机启发式方法确保了概率 *p*[1] 越高，*x*[*j*]^((*t* + 1))
    被选为 1 的可能性就越大。然而，它仍然留有 0 被以非常低的概率选中的空间，即使 *p*[1] 相对较大，从而确保马尔可夫链不会陷入局部区域，还可以探索其他潜在的高密度区域。这与我们在梅特罗波利斯算法中看到的类似启发式方法相同。
- en: If one wishes to generate *m* samples from the joint probability distribution
    *P*(*x*), the preceding step has to be repeated *m* times.
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果一个人希望从联合概率分布 *P*(*x*) 中生成 *m* 个样本，那么前面的步骤需要重复 *m* 次。
- en: The conditional distributions for each variable based on the joint probability
    distribution are to be determined before the sampling can proceed. If one is working
    on Bayesian networks or restricted Boltzmann machines, there are certain constraints
    within the variables that help determine these conditional distributions in an
    efficient manner.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 在采样之前，需要确定每个变量基于联合概率分布的条件分布。如果一个人在处理贝叶斯网络或受限玻尔兹曼机，变量之间有一些约束，有助于以有效的方式确定这些条件分布。
- en: 'As an example, if one needs to do Gibbs sampling from a bivariate normal distribution
    with mean [0 0] and covariance matrix ![$$ \left[\begin{array}{cc}1&amp; \rho
    \\ {}\rho &amp; 1\end{array}\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq16.png),
    then the conditional probability distributions can be computed as follows:'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果一个人需要从一个均值为 [0 0] 和协方差矩阵 ![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq16.png)
    的双变量正态分布中进行吉布斯采样，那么条件概率分布可以按以下方式计算：
- en: '![$$ P\left({x}_2/{x}_1\right)=P\left({x}_1,{x}_2\right)/P\left({x}_1\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equay.png)'
  id: totrans-323
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equay.png)'
- en: '![$$ P\left({x}_1/{x}_2\right)=P\left({x}_1,{x}_2\right)/P\left({x}_2\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaz.png)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equaz.png)'
- en: If one derives the marginal distributions *P*(*x*[1]) and *P*(*x*[2]) as ![$$
    \underset{x_2}{\int }P\left({x}_1,{x}_2\right){dx}_2 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq17.png)
    and ![$$ \underset{x_1}{\int }P\left({x}_1,{x}_2\right){dx}_1 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq18.png),
    then
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 如果导出边缘分布 *P*(*x*[1]) 和 *P*(*x*[2]) 为 ![$$ \underset{x_2}{\int }P\left({x}_1,{x}_2\right){dx}_2
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq17.png) 和 ![$$
    \underset{x_1}{\int }P\left({x}_1,{x}_2\right){dx}_1 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq18.png)，那么
- en: '![$$ {x}_2/{x}_1\sim Normal\left(\rho {x}_1,1-{p}^2\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equba.png)'
  id: totrans-326
  prefs: []
  type: TYPE_IMG
  zh: '![x2/x1~Normal(ρx1,1-p^2)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equba.png)'
- en: '![$$ {x}_1/{x}_2\sim Normal\left(\rho {x}_2,1-{p}^2\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbb.png)'
  id: totrans-327
  prefs: []
  type: TYPE_IMG
  zh: '![x1/x2~Normal(ρx2,1-p^2)] (../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbb.png)'
- en: Block Gibbs Sampling
  id: totrans-328
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 块状吉布斯采样
- en: 'There are several variants of Gibbs sampling. Block Gibbs sampling is one of
    them. In block Gibbs sampling, more than one variable is grouped together, and
    then the group of variables is sampled together conditioned on the rest of the
    variables, as opposed to sampling for individual variables separately. For example,
    in a restricted Boltzmann machine, the hidden unit state variables *h* = [*h*[1] *h*[2]….
    *h*[*n*]]^(*T*) can be sampled together conditioned on the visible unit states
    =[*v*[1] *v*[2]…*v*[*m*]]^(*T*) and vice versa. Hence, for sampling from the joint
    probability distribution over *P*(*v*, *h*), through block Gibbs sampling, one
    can sample all the hidden states given the visible unit states through the conditional
    distribution *P*(*h*/*v*) and sample all the visible unit states given the hidden
    unit states through the conditional distribution *P*(*v*/*h*). The samples at
    the (*t* + 1) iteration of Gibbs sampling can be generated as follows:'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 吉布斯采样有几种变体。块状吉布斯采样是其中之一。在块状吉布斯采样中，多个变量被分组在一起，然后基于其他变量的条件，对变量组进行采样，而不是分别对单个变量进行采样。例如，在受限玻尔兹曼机中，隐藏单元状态变量
    *h* = [*h*[1] *h*[2]… *h*[*n*]]^(*T*) 可以在可见单元状态 =[*v*[1] *v*[2]…*v*[*m*]]^(*T*)
    的条件下一起采样，反之亦然。因此，为了从联合概率分布 *P*(*v*, *h*) 中采样，通过块状吉布斯采样，可以在条件分布 *P*(*h*/*v*) 的给定下采样所有隐藏状态，并通过条件分布
    *P*(*v*/*h*) 采样所有可见单元状态。吉布斯采样的 (*t* + 1) 迭代中的样本可以生成如下：
- en: '![$$ {h}^{\left(t+1\right)}\sim P\left(h|{v}^{(t)}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbc.png)'
  id: totrans-330
  prefs: []
  type: TYPE_IMG
  zh: '![h^(t+1)~P(h|v^(t))] (../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbc.png)'
- en: '![$$ {v}^{\left(t+1\right)}\sim P\left(v\right|{h}^{\left(t+1\right)}\Big)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbd.png)'
  id: totrans-331
  prefs: []
  type: TYPE_IMG
  zh: '![v^(t+1)~P(v|h^(t+1))] (../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbd.png)'
- en: Therefore, (*v*^((*t* + 1)), *h*^((*t* + 1))) is the combined sample at iteration
    (*t* + 1).
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，(*v*^((*t* + 1)), *h*^((*t* + 1))) 是迭代 (*t* + 1) 的组合样本。
- en: 'Based on samples collected by the above sampling method, the expectation of
    a function *f* (*h*, *v*) can be computed as follows:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 基于上述采样方法收集的样本，函数 *f* (*h*, *v*) 的期望可以计算如下：
- en: '![$$ E\left[f\left(h,v\right)\right]\approx \frac{1}{M}\sum \limits_{t=1}^Mf\left({h}^{(t)},{v}^{(t)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Eqube.png)'
  id: totrans-334
  prefs: []
  type: TYPE_IMG
  zh: '![E[f(h,v)]≈1/M∑t=1Mf(h^(t),v^(t))] (../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Eqube.png)'
- en: where *M* denotes the number of samples generated from the joint probability
    distribution *P*(*v*, *h*).
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *M* 表示从联合概率分布 *P*(*v*, *h*) 生成的样本数量。
- en: Burn-in Period and Generating Samples in Gibbs Sampling
  id: totrans-336
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 吉布斯采样中的预烧期和生成样本
- en: To consider the samples as independent as possible for expectation computation
    generally the samples are picked up at an interval of *k* samples. The larger
    the value of *k*, the better at removing the autocorrelation among the generated
    samples. Also, the samples generated at the beginning of the Gibbs sampling are
    ignored. These ignored samples are said to have been generated in the burn-in
    period.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在期望计算中将样本尽可能视为独立，通常以 *k* 个样本的间隔选取样本。*k* 的值越大，越有利于消除生成样本之间的自相关性。此外，吉布斯采样开始时生成的样本被忽略。这些被忽略的样本被称为在预烧期生成的。
- en: The burn-in period uses the Markov chain to settle down to an equilibrium distribution
    before we can start drawing samples from it. This is required because we generate
    the Markov chain from an arbitrary sample that might be a low-probability zone
    with respect to the actual distribution, and so we can throw away those unwanted
    samples. The low-probability samples don’t contribute much to the actual expectation,
    and thus having plenty of them in the sample would obscure the expectation. Once
    the Markov chain has run long enough, it will sample from the high-probability
    zones frequently, at which point we can start collecting the samples.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 烧录期使用马尔可夫链在我们可以从中抽取样本之前达到平衡分布。这是必需的，因为我们从可能相对于实际分布处于低概率区域的任意样本生成马尔可夫链，因此我们可以丢弃这些不需要的样本。低概率样本对实际期望的贡献不大，因此在样本中有大量这些样本会模糊期望。一旦马尔可夫链运行足够长，它将频繁地从高概率区域抽取样本，此时我们可以开始收集样本。
- en: Using Gibbs Sampling in Restricted Boltzmann Machines
  id: totrans-339
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在受限玻尔兹曼机中使用Gibbs采样
- en: 'Block Gibbs sampling can be used to compute the expectations with respect to
    the joint probability distribution *P*(*v*, *h*/*θ*) as mentioned in the equations
    in ([5.3.37](#Equ45)) for computing the gradient with respect to the model parameters
    *b*, *c*, and *W*. Here are the equations from ([5.3.37](#Equ45)) for easy reference:'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 如方程（[5.3.37](#Equ45)）中所述，可以使用块Gibbs采样来计算相对于联合概率分布 *P*(*v*, *h*/*θ*) 的期望，用于计算相对于模型参数
    *b*，*c* 和 *W* 的梯度。以下是方程（[5.3.37](#Equ45)）的方程，便于参考：
- en: '![$$ \left\{\begin{array}{l}{\nabla}_b(C)=\sum \limits_{t=1}^m{v}^{(t)}-{mE}_{P\left(h,v/\theta
    \right)}\left[v\right]\\ {}{\nabla}_c(C)=\sum \limits_{t=1}^m\hat{h}-{mE}_{P\left(h,v/\theta
    \right)}\left[h\right]\\ {}{\nabla}_W(C)=\sum \limits_{t=1}^m{v}^{(t)}{\hat{h}}^T-{mE}_{P\left(h,v/\theta
    \right)}\left[{vh}^T\right]\end{array}\right. $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbf.png)'
  id: totrans-341
  prefs: []
  type: TYPE_IMG
  zh: '![ {∇}_b(C) = ∑(t=1)^m v^(t) - mE_P(h,v/θ)[v] ; {∇}_c(C) = ∑(t=1)^m ^h - mE_P(h,v/θ)[h]
    ; {∇}_W(C) = ∑(t=1)^m v^(t) ^h^T - mE_P(h,v/θ)[vh^T] ]](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbf.png)'
- en: 'The expectations *E*[*P*(*h*,*v*/*θ*)][*v*], *E*[*P*(*h*,*v*/*θ*)][*h*], and
    *E*[*P*(*h*,*v*/*θ*)][*vh*^(*T*)], all require sampling from the joint probability
    distribution *P*(*v*, *h*/*θ*). Through block Gibbs sampling, samples (*v*, *h*)
    can be drawn as follows based on their conditional probabilities, where *t* denotes
    the iteration number of Gibbs sampling:'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 期望 *E*[*P*(*h*,*v*/*θ*)][*v*]，*E*[*P*(*h*,*v*/*θ*)][*h*]，以及 *E*[*P*(*h*,*v*/*θ*)][*vh*^(*T*)]，所有这些都需要从联合概率分布
    *P*(*v*, *h*/*θ*) 中进行采样。通过块Gibbs采样，可以根据它们的条件概率抽取 (*v*, *h*) 样本，其中 *t* 表示Gibbs采样的迭代次数：
- en: '![$$ {h}^{\left(t+1\right)}\sim P\left(h/{v}^{(t)},\theta \right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbg.png)'
  id: totrans-343
  prefs: []
  type: TYPE_IMG
  zh: '![h^(t+1) ~ P(h/v^(t),θ)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbg.png)'
- en: '![$$ {v}^{\left(t+1\right)}\sim P\left(v/{h}^{\left(t+1\right)},\theta \right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbh.png)'
  id: totrans-344
  prefs: []
  type: TYPE_IMG
  zh: '![v^(t+1) ~ P(v/h^(t+1),θ)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbh.png)'
- en: 'What makes sampling even easier is the fact that the hidden units are independent
    given the visible unit states, and vice versa:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 使得采样更加容易的是，隐藏单元在给定可见单元状态的情况下是独立的，反之亦然：
- en: '![$$ P\left(h/v\right)=P\left({h}_1/v\right)P\left({h}_2/v\right)..P\left({h}_n/v\right)=\prod
    \limits_{j=1}^nP\left({h}_j/v\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbi.png)'
  id: totrans-346
  prefs: []
  type: TYPE_IMG
  zh: '![P(h/v) = P(h1/v)P(h2/v) .. P(hn/v) = ∏(j=1)^n P(hj/v)](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbi.png)'
- en: This allows each of the individual hidden unit *h*[*j*] to be sampled independently
    of the other in parallel given the visible unit states. The parameter *θ* has
    been removed from the preceding notation since *θ* would remain constant for a
    step of gradient descent when we perform Gibbs sampling.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 这允许在给定可见单元状态的情况下，每个单独的隐藏单元 *h*[*j*] 可以独立于其他单元并行采样。参数 *θ* 已从前面的符号中移除，因为在执行Gibbs采样时，*θ*
    将在梯度下降的步骤中保持不变。
- en: 'Now, each of the hidden unit output state *h*[*j*] can be either 0 or 1, and
    its probability of assuming state 1 is given by ([5.3.16](#Equ24)) as follows:'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，每个隐藏单元输出状态 *h*[*j*] 可以是0或1，其假设状态1的概率由方程（[5.3.16](#Equ24)）给出如下：
- en: '![$$ P\left({h}_j=1/v\right)=\sigma \left({c}_j+\sum \limits_{i=1}^m{v}_i{w}_{ij}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbj.png)'
  id: totrans-349
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbj.png)'
- en: This probability can be computed based on the current value of *v* = *v*^((*t*))
    and model parameters *c*, *W* ∈ *θ*. The computed probability *P*(*h*[*j*] = 1/*v*^((*t*)))
    is compared to a random sample *u* generated from a uniform distribution *U*[0,
    1]. If *P*(*h*[*j*] = 1/*v*^((*t*))) > *u*, then the sampled *h*[*j*] = 1, else
    *h*[*j*] = 0\. Each of the hidden unit *h*[*j*] sampled in this manner forms the
    combined hidden unit state vector *h*^((*t* + 1)).
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 这个概率可以根据当前值 *v* = *v*^((*t*)) 和模型参数 *c*, *W* ∈ *θ* 来计算。计算出的概率 *P*(*h*[*j*] = 1/*v*^((*t*)))
    与从均匀分布 *U*[0, 1] 生成的随机样本 *u* 进行比较。如果 *P*(*h*[*j*] = 1/*v*^((*t*))) > *u*，则采样 *h*[*j*] = 1，否则
    *h*[*j*] = 0。以这种方式采样的每个隐藏单元 *h*[*j*] 形成了组合隐藏单元状态向量 *h*^((*t* + 1))。
- en: 'Similarly, the visible units are independent given the hidden unit states:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，在给定隐藏单元状态的情况下，可见单元是独立的：
- en: '![$$ P\left(v/h\right)=P\left({v}_1/h\right)P\left({v}_2/h\right)..P\left({v}_n/h\right)=\prod
    \limits_{i=1}^mP\left({v}_i/h\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbk.png)'
  id: totrans-352
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbk.png)'
- en: Each of the visible units can be sampled independently given *h*^((*t* + 1))
    to get the combined *v*^((*t* + 1)) in the same way as for the hidden units. The
    required sample thus generated in the (*t* + 1) iteration is given by (*v*^((*t* + 1)),
    *h*^((*t* + 1))).
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 在给定 *h*^((*t* + 1)) 的情况下，每个可见单元可以独立采样以获得与隐藏单元相同的组合 *v*^((*t* + 1))。因此，在 (*t* + 1)
    迭代中生成的所需样本由 (*v*^((*t* + 1)), *h*^((*t* + 1))) 给出。
- en: 'All the expectations *E*[*P*(*h*,*v*/*θ*)][*v*], *E*[*P*(*h*,*v*/*θ*)][*h*],
    and *E*[*P*(*h*,*v*/*θ*)][*vh*^(*T*)] can be computed by taking the averages of
    the samples generated through Gibbs sampling. Through Gibbs sampling, if we take
    *N* samples after considering burn-in periods and autocorrelation as discussed
    earlier, the required expectation can be computed as follows:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 所有期望值 *E*[*P*(*h*,*v*/*θ*)][*v*], *E*[*P*(*h*,*v*/*θ*)][*h*], 和 *E*[*P*(*h*,*v*/*θ*)][*vh*^(*T*)]
    可以通过取通过吉布斯采样生成的样本的平均值来计算。通过吉布斯采样，如果我们考虑了前面讨论的烧录期和自相关，并在之后取 *N* 个样本，所需的期望值可以按以下方式计算：
- en: '![$$ {E}_{P\left(h,v/\theta \right)}\left[v\right]\approx \frac{1}{N}\sum \limits_{i=1}^N{v}^{(i)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbl.png)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbl.png)'
- en: '![$$ {E}_{P\left(h,v/\theta \right)}\left[h\right]\approx \frac{1}{N}\sum \limits_{i=1}^N{h}^{(i)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbm.png)'
  id: totrans-356
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbm.png)'
- en: '![$$ {E}_{P\left(h,v/\theta \right)}\left[{vh}^T\right]\approx \frac{1}{N}\sum
    \limits_{i=1}^N{v}^{(i)}{h}^{(i)T} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbn.png)'
  id: totrans-357
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbn.png)'
- en: However, performing Gibbs sampling for the joint distribution to generate *N*
    samples in each iteration of gradient descent becomes a tedious task and is often
    impractical. There is an alternate way of approximating these expectations, called
    *contrastive divergence*, which we will discuss in the next section.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为了生成 *N* 个样本，在梯度下降的每次迭代中对联合分布进行吉布斯采样变得是一项繁琐的任务，并且通常不切实际。有一种近似这些期望值的方法，称为**对比散度**，我们将在下一节中讨论。
- en: Contrastive Divergence
  id: totrans-359
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**对比散度**'
- en: Performing Gibbs sampling on the joint probability distribution *P*(*h*, *v*|
    *θ*) at each step of gradient descent becomes challenging since Markov chain Monte
    Carlo methods such as Gibbs sampling take a long time to converge, which is required
    in order to produce unbiased samples. These unbiased samples drawn from the joint
    probability distribution are used to compute the expectations terms *E*[*P*(*h*,*v*/*θ*)][*v*],
    *E*[*P*(*h*,*v*/*θ*)][*h*], and *E*[*P*(*h*,*v*/*θ*)][*vh*^(*T*)], which are nothing
    but components of the term *E*[*P*(*h*, *v*/*θ*)][∇[*θ*](−*E*(*v*, *h*))] in the
    combined expression for gradients as deduced in ([5.3.28](#Equ36)).
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 在梯度下降的每一步对联合概率分布 *P*(*h*, *v*| *θ*) 进行吉布斯抽样变得具有挑战性，因为像吉布斯抽样这样的马尔可夫链蒙特卡洛方法需要很长时间才能收敛，而这正是产生无偏样本所必需的。这些从联合概率分布中抽取的无偏样本用于计算期望项
    *E*[*P*(*h*,*v*/*θ*)][*v*]，*E*[*P*(*h*,*v*/*θ*)][*h*]，和 *E*[*P*(*h*,*v*/*θ*)][*vh*^(*T*)]，这些实际上就是梯度综合表达式中
    *E*[*P*(*h*, *v*/*θ*)][∇[*θ*](−*E*(*v*, *h*))] 的组成部分，如([5.3.28](#Equ36))中推导出的。
- en: '![$$ {\nabla}_{\theta }(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]-{mE}_{P\left(h,v/\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbo.png)'
  id: totrans-361
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_{\theta }(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]-{mE}_{P\left(h,v/\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right] $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbo.png)'
- en: The second term in the preceding equation can be rewritten as a summation over
    the *m* data points, and hence
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 前一方程中的第二项可以重写为对 *m* 个数据点的求和，因此
- en: '![$$ {\nabla}_{\theta }(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]-\sum
    \limits_{t=1}^m{E}_{P\left(h,v/\theta \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbp.png)'
  id: totrans-363
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_{\theta }(C)=\sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]-\sum
    \limits_{t=1}^m{E}_{P\left(h,v/\theta \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbp.png)'
- en: Contrastive divergence approximates the overall expectation *E*[*P*(*h*, *v*/*θ*)][∇[*θ*](−*E*(*v*,
    *h*))] by a point estimate at a candidate sample ![$$ \left(\overline{v},\overline{h}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq19.png) obtained
    by performing Gibbs sampling for only a couple of iterations.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 对比散度通过在通过仅进行几次迭代进行吉布斯抽样的候选样本 ![$$ \left(\overline{v},\overline{h}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq19.png)
    上进行点估计来近似整体期望 *E*[*P*(*h*, *v*/*θ*)][∇[*θ*](−*E*(*v*, *h*))]。
- en: '![$$ {E}_{P\left(h,v/\theta \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right]\space
    \approx {\nabla}_{\theta}\left(-E\left(\overline{v},\overline{h}\right)\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbq.png)'
  id: totrans-365
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {E}_{P\left(h,v/\theta \right)}\left[{\nabla}_{\theta}\left(-E\left(v,h\right)\right)\right]\space
    \approx {\nabla}_{\theta}\left(-E\left(\overline{v},\overline{h}\right)\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbq.png)'
- en: 'This approximation is done for every data point *v*^((*t*)), and hence the
    expression for the overall gradient can be rewritten as follows:'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 这种近似对每个数据点 *v*^((*t*)) 都进行，因此整体梯度的表达式可以重写如下：
- en: '![$$ {\nabla}_{\theta }(C)\approx \sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]-\sum
    \limits_{t=1}^m\left[{\nabla}_{\theta}\left(-E\left({\overline{v}}^{(t)},{\overline{h}}^{(t)}\right)\right)\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbr.png)'
  id: totrans-367
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_{\theta }(C)\approx \sum \limits_{t=1}^m{E}_{P\left(h/{v}^{(t)},\theta
    \right)}\left[{\nabla}_{\theta}\left(-E\left({v}^{(t)},h\right)\right)\right]-\sum
    \limits_{t=1}^m\left[{\nabla}_{\theta}\left(-E\left({\overline{v}}^{(t)},{\overline{h}}^{(t)}\right)\right)\right]
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbr.png)'
- en: Figure [5-6](#Fig8) illustrates how Gibbs sampling is performed for each input
    data point *v*^((*t*)) to get the expectation approximation over the joint probability
    distribution by a point estimate. The Gibbs sampling starts with *v*^((*t*)),
    and based on the conditional probability distribution *P*(*h*/*v*^((*t*))), the
    new hidden state *h*' is obtained. As discussed earlier, each of the hidden unit
    *h*[*j*] can be sampled independently and combined to form the hidden state vector
    *h* '. Then *v*' is sampled based on the conditional probability distribution
    *P*(*v*/*h*'). This iterative process is generally run for couple of iterations,
    and the final *v* and *h* sampled are taken as the candidate sample ![$$ \left(\overline{v},\overline{h}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq20.png).
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-6](#Fig8) 展示了如何对每个输入数据点 *v*^((*t*)) 进行吉布斯抽样，通过点估计来获得联合概率分布的期望近似。吉布斯抽样从
    *v*^((*t*)) 开始，并根据条件概率分布 *P*(*h*/*v*^((*t*))) 获得新的隐藏状态 *h*'。如前所述，每个隐藏单元 *h*[*j*]
    可以独立采样并组合形成隐藏状态向量 *h* '。然后根据条件概率分布 *P*(*v*/*h*') 采样 *v*'。这个迭代过程通常运行几个迭代，最后采样的
    *v* 和 *h* 被作为候选样本 ![$$ \left(\overline{v},\overline{h}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq20.png)。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig8_HTML.jpg)'
  id: totrans-369
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig8_HTML.jpg)'
- en: An illustration represents the directions of 4 arrows. The starting arrow has
    the value of p open parenthesis, h over v, closed parenthesis, and ends with p
    open parenthesis, v over h, closed parenthesis.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 一个插图表示4个箭头的方向。起始箭头具有 p 开括号，h over v，闭括号，并结束于 p 开括号，v over h，闭括号。
- en: Figure 5-6
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-6
- en: Gibbs sampling for two iterations to get one sample for contrastive divergence
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 对比散度进行两次迭代以获得一个样本
- en: The contrastive divergence method makes the gradient descent faster since the
    Gibbs sampling in each step of gradient descent is limited to only a few iterations,
    mostly one or two per data point.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 对比散度方法使得梯度下降更快，因为在梯度下降的每一步中，吉布斯抽样的迭代次数被限制在只有几个，通常是每个数据点一个或两个。
- en: A Restricted Boltzmann Implementation in TensorFlow
  id: totrans-374
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow中的受限玻尔兹曼机实现
- en: In this section, we will go through the implementation of restricted Boltzmann
    machines using the MNIST dataset. Here, we try to model the structure of the MNIST
    images by defining a restricted Boltzmann machine network that consists of the
    image pixels as the visible units and 500 hidden layers in order to decipher the
    internal structure of each image. Since the MNIST images are 28 × 28 in dimension,
    when flattened as a vector, we have 784 visible units. We try to capture the hidden
    structures properly by training the Boltzmann machines. Images that represent
    the same digit should have similar hidden states, if not the same, when said hidden
    states are sampled given the visible representations of the input images. When
    the visible units are sampled, given their hidden structure, the visible unit
    values when structured in an image form should correspond to the label of the
    image. The detailed code is illustrated in Listing [5-3a](#PC3).
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过使用MNIST数据集来实现受限玻尔兹曼机。在这里，我们试图通过定义一个由图像像素作为可见单元和500个隐藏层组成的受限玻尔兹曼机网络来模拟MNIST图像的结构，以便解码每个图像的内部结构。由于MNIST图像的维度是28×28，当将其展平为向量时，我们有784个可见单元。我们试图通过训练玻尔兹曼机来正确地捕捉隐藏结构。表示相同数字的图像应该具有相似的隐藏状态，如果不是完全相同，那么在给定输入图像的可见表示时，这些隐藏状态被采样。当采样可见单元时，给定它们的隐藏结构，以图像形式结构化的可见单元值应该对应于图像的标签。详细的代码在列表
    [5-3a](#PC3) 中展示。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig10_HTML.jpg)'
  id: totrans-376
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig10_HTML.jpg)'
- en: An illustration represents 20 boxes arranged in 4 rows and 5 columns. Each box
    contains a single-digit number from 0 to 9.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 一个插图表示20个盒子排列成4行5列。每个盒子包含一个从0到9的单个数字。
- en: Figure 5-8
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-8
- en: Simulated images given the hidden states
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 根据隐藏状态生成的模拟图像
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig9_HTML.jpg)'
  id: totrans-380
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig9_HTML.jpg)'
- en: An illustration represents 20 boxes arranged in 4 rows and 5 columns. Each box
    contains a single-digit number.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 一个插图表示20个盒子排列成4行5列。每个盒子包含一个单独的数字。
- en: Figure 5-7
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-7
- en: Actual test images
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 实际测试图像
- en: '[PRE2]'
  id: totrans-384
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We can see from Figure [5-7](#Fig9) and Figure [5-8](#Fig10) that the RBM model
    did a good job of simulating the input images given their hidden representations.
    Hence, restricted Boltzmann machines can be used as generative models as well.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 从图 [5-7](#Fig9) 和图 [5-8](#Fig10) 可以看出，RBM模型在给定其隐藏表示的情况下很好地模拟了输入图像。因此，受限玻尔兹曼机可以用作生成模型。
- en: Collaborative Filtering Using Restricted Boltzmann Machines
  id: totrans-386
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用受限玻尔兹曼机进行协同过滤
- en: 'Restricted Boltzmann machines can be used for collaborative filtering in making
    recommendations. Collaborative filtering is the method of predicting the preference
    of a user for an item by analyzing the preferences of many users for items. Given
    a set of items and users along with the ratings the users have provided for a
    variety of items, the most common method for collaborative filtering is the matrix
    factorization method, which determines a set of vectors for the items as well
    as for the users. The rating assigned by a user to an item can then be computed
    as the dot product of the user vector *u*^((*j*)) with the item vector *v*^((*k*)).
    Hence, the rating can be expressed as follows:'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 受限玻尔兹曼机可用于协同过滤中的推荐。协同过滤是通过分析许多用户对物品的偏好来预测用户对物品偏好的方法。给定一组物品和用户以及用户对各种物品提供的评分，协同过滤最常见的方法是矩阵分解方法，该方法确定物品和用户的一组向量。然后，用户对物品分配的评分可以计算为用户向量
    *u*^((*j*)) 与物品向量 *v*^((*k*)) 的点积。因此，评分可以表示如下：
- en: '![$$ {r}^{(jk)}={u}^{(j)T}{v}^{(k)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbs.png)'
  id: totrans-388
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {r}^{(jk)}={u}^{(j)T}{v}^{(k)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbs.png)'
- en: where *j* and *k* represent the *j-th* user and the *kth* item, respectively.
    Once the vectors for each item and each user have been learned, the expected ratings
    a user would assign to a product they haven’t rated yet can be found out by the
    same method. Matrix factorization can be thought of as decomposing a big matrix
    of ratings into user and item vectors.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *j* 和 *k* 分别代表第 *j* 个用户和第 *k* 个物品。一旦学习到每个物品和每个用户的向量，就可以通过相同的方法找到用户对尚未评分的产品可能分配的预期评分。可以将矩阵分解视为将评分的大矩阵分解为用户和物品向量。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig11_HTML.jpg)'
  id: totrans-390
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig11_HTML.jpg)'
- en: A set of 3 blocks labeled as rating matrix, user vector matrix, and item vector
    matrix. Users are denoted as u and items are denoted as v.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 一组标记为评分矩阵、用户向量矩阵和物品向量矩阵的3个块。用户用u表示，物品用v表示。
- en: Figure 5-9
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-9
- en: Schematic diagram of a matrix factorization method for collaborative filtering
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 协同过滤的矩阵分解方法示意图
- en: Illustrated in Figure [5-9](#Fig11) is a schematic diagram of a matrix factorization
    method that decomposes a user item rating matrix into two matrices consisting
    of user vectors and item vectors. The dimensionality of the user and rating vectors
    must be equal for their dot product to hold true, which gives an estimate of what
    rating the user might assign to a particular item. There are several matrix factorization
    methods, such as singular value decomposition (SVD), nonnegative matrix factorization,
    alternating least squares, and so on. Any of the suitable methods can be used
    for matrix factorization depending on the use. Generally, SVD requires filling
    in the missing ratings (where the users have not rated the items) in the matrix,
    which might be a difficult task, and hence methods such as alternating least squares,
    which only take the provided ratings and not the missing values, work well for
    collaborative filtering.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [5-9](#Fig11) 中展示了将用户物品评分矩阵分解为两个矩阵的矩阵分解方法，这两个矩阵分别由用户向量和物品向量组成。用户和评分向量的维度必须相等，以便它们的点积成立，这给出了用户可能分配给特定物品的评分估计。存在多种矩阵分解方法，例如奇异值分解（SVD）、非负矩阵分解、交替最小二乘法等。根据用途，可以使用任何合适的方法进行矩阵分解。通常，SVD需要在矩阵中填充缺失的评分（用户未对物品进行评分的地方），这可能是一项艰巨的任务，因此如交替最小二乘法等仅取提供的评分而不取缺失值的方法对协同过滤非常有效。
- en: Now, we will look at a different method of collaborative filtering that uses
    restricted Boltzmann machines. Restricted Boltzmann machines were used by the
    winning team in the Netflix Challenge of Collaborative Filtering, and so let’s
    consider the items as movies for this discussion. The visible units for this RBM
    network would correspond to movie ratings, and instead of being binary, each movie
    would be a five-way SoftMax unit to account for the five possible ratings from
    1 to 5\. The number of hidden units can be chosen arbitrarily; we chose *d* here.
    There would be several missing values for different movies since all the movies
    would not be rated by all the users. The way to handle them is to train a separate
    RBM for each user based on only the movies that user has rated. The weights from
    the movies to the hidden units would be shared by all users. For instance, let’s
    say *User A* and *User B* rate the same movie; they would use the same weights
    connecting the movie unit to the hidden units. So, all the RBMs would have the
    same hidden units, and of course their activation of the hidden units may be very
    different.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将探讨一种不同的协同过滤方法，该方法使用受限玻尔兹曼机。受限玻尔兹曼机在Netflix协同过滤挑战赛中获胜的团队中使用过，因此让我们在这个讨论中将项目视为电影。这个RBM网络的可视单元将对应于电影评分，而不是二进制，每部电影将是一个五向SoftMax单元，以考虑从1到5的五种可能的评分。隐藏单元的数量可以选择任意值；我们在这里选择了*d*。对于不同的电影会有几个缺失值，因为并非所有用户都会对每部电影进行评分。处理这些缺失值的方法是为每个用户基于其已评分的电影训练一个单独的RBM。从电影到隐藏单元的权重将由所有用户共享。例如，假设*用户A*和*用户B*对同一部电影进行评分；他们会使用连接电影单元到隐藏单元的相同权重。因此，所有RBM都将具有相同的隐藏单元，当然它们对隐藏单元的激活可能非常不同。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig13_HTML.jpg)'
  id: totrans-396
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig13_HTML.jpg)'
- en: An illustration of the restricted Boltzmann view for a user. It has 3 hidden
    binary features connected to 3 movie ratings, M 2, M 4, and M 6.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 用户受限玻尔兹曼视图的示意图。它有3个连接到3个电影评分（M 2、M 4和M 6）的隐藏二进制特征。
- en: Figure 5-11
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-11
- en: Restricted Boltzmann view for User B
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 用户B的受限玻尔兹曼机视图
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig12_HTML.jpg)'
  id: totrans-400
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig12_HTML.jpg)'
- en: An illustration represents 3 nodes connected to 3 rectangular blocks. The nodes
    are labeled as hidden binary features, whereas the rectangular boxes represent
    movie ratings.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示意图表示3个节点连接到3个矩形块。节点被标记为隐藏二进制特征，而矩形框代表电影评分。
- en: Figure 5-10
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-10
- en: Restricted Boltzmann view for User A
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 用户A的受限玻尔兹曼机视图
- en: As we can see from Figure [5-10](#Fig12) and Figure [5-11](#Fig13), the restricted
    Boltzmann views for User A and User B are different since they differ in the selection
    of movies they have rated. However, for the movies they both have rated, the weight
    connections are the same. This kind of architecture—where each user’s RBM is trained
    separately while the RBMs share weights for same movies—helps overcome the problem
    of missing ratings and at the same time allows generalized weights for a movie
    to hidden layer connection for all the users. From each movie to the hidden unit
    and vice versa, there are actually five connections, one for each of the possible
    ratings for a movie. However, to keep the representation simple, only one combined
    connection has been shown in the diagrams. Each of the models can be trained separately
    through gradient descent using contrastive divergence, and the model weights can
    be averaged across the different RBMs so that all the RBMs share the same weights.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们从图[5-10](#Fig12)和图[5-11](#Fig13)中可以看到，用户A和用户B的受限玻尔兹曼视图不同，因为它们在已评分的电影选择上有所不同。然而，对于他们共同评分的电影，权重连接是相同的。这种架构——每个用户的RBM分别训练，同时RBM共享相同电影的权重——有助于克服缺失评分的问题，同时允许所有用户对电影到隐藏层连接的通用权重。从每个电影到隐藏单元以及相反方向，实际上有五个连接，每个电影的可能评分都有一个。然而，为了保持表示简单，图中只显示了一个组合连接。每个模型都可以通过对比散度使用梯度下降分别进行训练，并且可以将不同RBM的模型权重平均，以便所有RBM共享相同的权重。
- en: 'From [5.3.17](#Equ25), we have for the binary visible unit the following:'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 从[5.3.17](#Equ25)，对于二进制可视单元，我们有以下公式：
- en: '![$$ P\left({v}_i=1/h\right)=\sigma \left({b}_i+\sum \limits_{j=1}^n{h}_j{w}_{ij}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbt.png)'
  id: totrans-406
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({v}_i=1/h\right)=\sigma \left({b}_i+\sum \limits_{j=1}^n{h}_j{w}_{ij}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbt.png)'
- en: Now that the visible units have *K* possible ratings, the visible units are
    *K* dimensional vectors with only one index corresponding to the actual rating
    set to 1, and the rest are all set to zero. So, the new expression of the probability
    of a rating over *K* possible ratings would be given by a SoftMax function. Also,
    do note that the *m* in this case is the number of movies a user has watched and
    would vary for different RBMs for different users. The constant *n* denotes the
    number of hidden units in the hidden layer for each RBM.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，可见单元有 *K* 个可能的评分，可见单元是 *K* 维向量，只有一个索引对应实际的评分设置为 1，其余都设置为 0。因此，在 *K* 个可能的评分上的评分概率的新表达式将由
    SoftMax 函数给出。同时，请注意，在这种情况下，*m* 是用户观看的电影数量，对于不同用户的 RBM 会不同。常数 *n* 表示每个 RBM 隐藏层中的隐藏单元数量。
- en: '![$$ P\left({v_i}^{(k)}=1/h\right)=\frac{e^{\left({b_i}^{(k)}+{\sum}_{j=1}^n{h}_j{w_{ij}}^{(k)}\right)}}{\sum
    \limits_{l=1}^K{e}^{\left({b_i}^{(l)}+{\sum}_{j=1}^n{h}_j{w_{ij}}^{(l)}\right)}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ46.png)'
  id: totrans-408
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ46.png)'
- en: (5.4.1)
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: (5.4.1)
- en: where *w*[*ij*]^((*k*)) is the weight connecting the *kth* rating index for
    visible unit *i* to the *j-th* hidden unit and *b*[*i*]^((*k*)) represents the
    bias at the visible unit *i* for its *k-th* rating.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *w*[*ij*]^((*k*)) 是连接可见单元 *i* 的第 *k* 个评分索引到第 *j* 个隐藏单元的权重，而 *b*[*i*]^((*k*))
    表示可见单元 *i* 的第 *k* 个评分处的偏置。
- en: 'The energy of a joint configuration *E*(*v*, *h*) is given by the following:'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 联合配置 *E*(*v*, *h*) 的能量由以下公式给出：
- en: '![$$ E\left(v,h\right)=-\sum \limits_{k=1}^K\sum \limits_{i=1}^m{b_i}^{(k)}{v_i}^{(k)}-\sum
    \limits_{j=1}^n{c}_j{h}_j-\sum \limits_{k=1}^K\sum \limits_{j=1}^n\sum \limits_{i=1}^m{v_i}^{(k)}{w_{ij}}^{(k)}{h}_j
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ47.png)'
  id: totrans-412
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ47.png)'
- en: (5.4.2)
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: (5.4.2)
- en: So,
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，
- en: '![$$ P\left(v,h\right)\propto {e}^{-E\left(v,h\right)}={e}^{\sum \limits_{k=1}^K\sum
    \limits_{i=1}^m{b_i}^{(k)}{v_i}^{(k)}+\sum \limits_{j=1}^n{c}_j{h}_j+\sum \limits_{k=1}^K\sum
    \limits_{j=1}^n\sum \limits_{i=1}^m{v_i}^{(k)}{w_{ij}}^{(k)}{h}_j} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ48.png)'
  id: totrans-415
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ48.png)'
- en: (5.4.3)
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: (5.4.3)
- en: 'The probability of the hidden unit given the input *v* is as follows:'
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 给定输入 *v* 的隐藏单元的概率如下：
- en: '![$$ P\left( hj=1/v\right)=\frac{e^{\left({c}_j+{\sum}_{i=1}^m{\sum}_{k=1}^K{v_i}^{(k)}{w_{ij}}^{(k)}\right)}}{1+{e}^{\left({c}_j+{\sum}_{i=1}^m{\sum}_{k=1}^K{v_i}^{(k)}{w_{ij}}^{(k)}\right)}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ49.png)'
  id: totrans-418
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ49.png)'
- en: (5.4.4)
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: (5.4.4)
- en: 'Now, the obvious question: How do we predict the rating for a movie a user
    has not seen? As it turns out, the computation for this is not that involved and
    can be computed in linear time. We need to compute the probability of the user
    rating *r* to an unknown movie *q* given the user’s ratings on seen movies. Let
    the movie ratings the user has already provided be denoted by *V*. So, we need
    to compute the probability *P*(*v*[*q*]^((*k*))/*V*) as follows:'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，一个明显的问题：我们如何预测用户对一部未看过的电影的评分？实际上，这个计算并不复杂，可以在线性时间内完成。我们需要计算用户对未知电影 *q* 的评分
    *r* 的概率，前提是用户对已看电影的评分。设用户已经提供的电影评分为 *V*。因此，我们需要计算概率 *P*(*v*[*q*]^((*k*))/*V*）如下：
- en: '![$$ P\left({v_q}^{(k)}/V\right)=\sum \limits_hP\left({v_q}^{(k)},h/V\right)=\frac{\sum
    \limits_hP\left({v_q}^{(k)},h,V\right)}{P(V)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ50.png)'
  id: totrans-421
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ50.png)'
- en: (5.4.5)
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: (5.4.5)
- en: 'Since *P*(*V*) is fixed for all movie ratings *k*, from ([5.4.5](#Equ50)) we
    have the following:'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 *P*(*V*) 对于所有电影评分 *k* 都是固定的，从 ([5.4.5](#Equ50)) 我们可以得到以下结论：
- en: '![$$ {\displaystyle \begin{array}{l}P\left({v_q}^{(k)}/V\right)\propto \sum
    \limits_hP\left({v_q}^{(k)},h,V\right)\\ {}\kern1em \propto \sum \limits_h{e}^{-E\left({v_q}^{(k)},h,V\right)}\end{array}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ51.png)'
  id: totrans-424
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}P\left({v_q}^{(k)}/V\right)\propto \sum
    \limits_hP\left({v_q}^{(k)},h,V\right)\\ {}\kern1em \propto \sum \limits_h{e}^{-E\left({v_q}^{(k)},h,V\right)}\end{array}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ51.png)'
- en: (5.4.6)
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: (5.4.6)
- en: 'This is a three-way energy configuration and can be computed easily by adding
    the contribution of *v*[*q*]^((*k*)) in ([5.4.2](#Equ47)), as shown here:'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个三向能量配置，可以通过简单地将 ([5.4.2](#Equ47)) 中的 *v*[*q*]^((*k*)) 的贡献相加来轻松计算，如下所示：
- en: '![$$ E\left({v_q}^{(k)},V,h\right)=-\sum \limits_{k=1}^K\sum \limits_{i=1}^m{b_i}^{(k)}{v_i}^{(k)}-\sum
    \limits_{j=1}^n{c}_j{h}_j-\sum \limits_{k=1}^K\sum \limits_{j=1}^n\sum \limits_{i=1}^m{v_i}^{(k)}{w_{ij}}^{(k)}{h}_j-\sum
    \limits_{j=1}^n{v_s}^{(k)}{w_{sj}}^{(k)}{h}_j-{v_s}^{(k)}{b}^{(k)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ52.png)'
  id: totrans-427
  prefs: []
  type: TYPE_IMG
  zh: '![$$ E\left({v_q}^{(k)},V,h\right)=-\sum \limits_{k=1}^K\sum \limits_{i=1}^m{b_i}^{(k)}{v_i}^{(k)}-\sum
    \limits_{j=1}^n{c}_j{h}_j-\sum \limits_{k=1}^K\sum \limits_{j=1}^n\sum \limits_{i=1}^m{v_i}^{(k)}{w_{ij}}^{(k)}{h}_j-\sum
    \limits_{j=1}^n{v_s}^{(k)}{w_{sj}}^{(k)}{h}_j-{v_s}^{(k)}{b}^{(k)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equ52.png)'
- en: ( 5.4.7)
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: ( 5.4.7)
- en: 'Substituting *v*[*q*]^((*k*)) = 1 in ([5.4.7](#Equ52)), one can find the value
    of *E*(*v*[*q*]^((*k*)) = 1, *V*, *h*), which is proportional to the following:'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 将 ([5.4.7](#Equ52)) 中的 *v*[*q*]^((*k*)) = 1 代入，可以找到 *E*(*v*[*q*]^((*k*)) = 1,
    *V*, *h*) 的值，该值与以下内容成比例：
- en: '![$$ P\left({v_q}^{(k)}=1,V,h\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbu.png)'
  id: totrans-430
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({v_q}^{(k)}=1,V,h\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbu.png)'
- en: 'For all *K* values of rating *k*, the preceding quantity *E*(*v*[*q*]^((*k*)) = 1,
    *V*, *h*) needs to be computed and then normalized to form probabilities. One
    can then either take the value of *k* for which the probability is maximum or
    compute the expected value of *k* from the derived probabilities, as shown here:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有评分 *k* 的 *K* 值，需要计算前述量 *E*(*v*[*q*]^((*k*)) = 1, *V*, *h*) 并将其归一化以形成概率。然后可以选择概率最大的
    *k* 值，或者从导出的概率中计算 *k* 的期望值，如下所示：
- en: '![$$ \hat{k}=\underset{k}{\underbrace{argmax}}P\left({v_q}^{(k)}=1/V\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbv.png)'
  id: totrans-432
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{k}=\underset{k}{\underbrace{argmax}}P\left({v_q}^{(k)}=1/V\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbv.png)'
- en: '![$$ \hat{k}=\sum \limits_{k=1}^5k\times P\left({v_q}^{(k)}=1/V\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbw.png)'
  id: totrans-433
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{k}=\sum \limits_{k=1}^5k\times P\left({v_q}^{(k)}=1/V\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbw.png)'
- en: The expectation way of deriving the rating turns out to give better predictions
    than a hard assignment of a rating based on the maximum probability.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 通过期望值方法导出的评分比基于最大概率的硬分配评分给出更好的预测。
- en: Also, one simple way to derive the probability of the rating *k* for a specific
    unrated movie *q* by a user with rating matrix *V* is to first sample the hidden
    states *h* given the visible ratings input *V*; i.e., draw *h*~*P*(*h*/*V*). The
    hidden units are common to all and hence carry information about patterns for
    all movies. From the sampled hidden units, we try to sample the value of *v*[*q*]^((*k*));
    i.e., draw *v*[*q*]^((*k*))~*P*(*v*[*q*]^((*k*))/*h*). This back-to-back sampling,
    first from *V* → *h* and then from *h* → *v*[*q*]^((*k*)), is equivalent to sampling
    *v*[*q*]^((*k*))~*P*(*v*[*q*]^((*k*))/*V*). I hope this helps in providing an
    easier interpretation.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，通过首先根据可见评分输入 *V* 样本隐藏状态 *h*，可以简单地推导出用户对特定未评分电影 *q* 的评分 *k* 的概率；即，从 *P*(*h*/*V*)
    中抽取 *h*。隐藏单元对所有电影都是共同的，因此携带有关所有电影模式的信息。从样本的隐藏单元中，我们尝试抽取 *v*[*q*]^((*k*)) 的值；即，从
    *P*(*v*[*q*]^((*k*))/*h*) 中抽取 *v*[*q*]^((*k*))。这种连续采样，首先从 *V* → *h*，然后从 *h* → *v*[*q*]^((*k*))，相当于从
    *P*(*v*[*q*]^((*k*))/*V*) 中抽取 *v*[*q*]^((*k*))。希望这有助于提供更简单的解释。
- en: Deep-Belief Networks (DBNs)
  id: totrans-436
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度信念网络 (DBNs)
- en: Deep-belief networks are based on the restricted Boltzmann machine, but, unlike
    an RBN, a DBN has multiple hidden layers. The weights in each hidden layer *K*
    are trained by keeping all the weights in the prior (*K* − 1 ) layers constant.
    The activities of the hidden units in the (*K* − 1) layer are taken as input for
    the *Kth* layer. At any time during training, two layers are involved in learning
    the weight connections between them. The learning algorithm is the same as that
    of restricted Boltzmann machines. Illustrated in Figure [5-12](#Fig14) is a high-level
    schematic diagram for a deep-belief network.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 深度信念网络基于受限玻尔兹曼机，但与 RBN 不同，DBN 有多个隐藏层。每个隐藏层 *K* 中的权重通过保持先前 (*K* - 1) 层的所有权重不变来训练。(*K*
    - 1) 层中隐藏单元的活动被用作 *Kth* 层的输入。在训练的任何时刻，两个层都参与学习它们之间的权重连接。学习算法与受限玻尔兹曼机相同。图 [5-12](#Fig14)
    展示了深度信念网络的高级示意图。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig14_HTML.jpg)'
  id: totrans-438
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig14_HTML.jpg)'
- en: A block diagram represents 2 blocks. The upper block has 2 rectangular boxes
    labeled h 2 and h1 connected by a double-headed arrow marked as w 2\. The bottom
    block has 2 boxes labeled h 1 and v connected by a double-headed arrow marked
    as w 1.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 块图表示 2 个块。上面的块有两个标有 h 2 和 h1 的矩形框，通过一个标记为 w 2 的双头箭头连接。下面的块有两个标有 h 1 和 v 的框，通过一个标记为
    w 1 的双头箭头连接。
- en: Figure 5-12
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-12
- en: Deep-belief network using RBMs
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 RBM 的深度信念网络
- en: Like RBM, in DBN each layer can be trained by gradient descent using contrastive
    divergence. The DBN learning algorithm is used to learn the initial weights of
    a deep network being used for supervised learning so that the network has a good
    set of initial weights to start with. Once the pretraining is done for the deep-belief
    network, we can add an output layer to the DBN based on the supervised problem
    at hand. Let’s say we want to train a model to perform classification on the MNIST
    dataset. In that case, we would have to append a ten-class SoftMax layer. We can
    then fine-tune the model by using backpropagation. Since the model already has
    an initial set of weights from unsupervised DBN learning, the model would have
    a good chance of converging faster when backpropagation is invoked.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 与 RBM 类似，在 DBN 中，每一层都可以通过对比散度使用梯度下降进行训练。DBN 学习算法用于学习用于监督学习的深度网络的初始权重，以便网络有一个良好的初始权重集来开始。一旦深度信念网络的预训练完成，我们就可以根据手头的监督问题向
    DBN 添加一个输出层。假设我们想要训练一个模型在 MNIST 数据集上进行分类。在这种情况下，我们不得不附加一个十类的 SoftMax 层。然后我们可以通过使用反向传播来微调模型。由于模型已经从无监督的
    DBN 学习中获得了初始权重集，因此在调用反向传播时，模型有很好的机会更快地收敛。
- en: Whenever we have sigmoid units in a network, if the network weights are not
    initialized properly, there is a high chance that one might have a vanishing-gradient
    problem. This is because the output of sigmoid units is linear within a small
    range, after which the output saturates, leading to near-zero gradients. Since
    the backpropagation is essentially a chain rule of derivatives, the gradient of
    the cost function with respect to any weight would have sigmoid gradients from
    the layers prior to it from a backpropagation order. So, if few of the gradients
    in the sigmoid layers are operating in the saturated regions and producing gradients
    close to zero, the latter layers, gradients of the cost function with respect
    to the weights, would be close to zero, and there is a high chance that the learning
    would stop. When the weights are not properly initialized, there is a high chance
    that the network sigmoid units could go into the unsaturated region and lead to
    near-zero gradients in the sigmoid units. However, when the network weights are
    initialized by DBN learning, there is less of a chance of the sigmoid units operating
    in the saturated zone. This is because the network has learned something about
    the data while it was pretraining, and there is a smaller chance that the sigmoid
    units will operate in saturated zones. Such problems with the activation unit
    saturating are not present for ReLU activation functions since they have a constant
    gradient of 1 for input values greater than zero.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 每当我们网络中有sigmoid单元时，如果网络权重没有正确初始化，那么出现梯度消失问题的可能性很高。这是因为sigmoid单元的输出在很小的范围内是线性的，之后输出饱和，导致接近零的梯度。由于反向传播本质上是一阶导数的链式法则，关于任何权重的成本函数的梯度都会从前面的层获得sigmoid梯度。因此，如果sigmoid层中的一些梯度在饱和区域操作并产生接近零的梯度，那么关于权重的成本函数的梯度（即后层的梯度）将接近零，学习停止的可能性很高。当权重没有正确初始化时，网络sigmoid单元进入非饱和区域的概率很高，这会导致sigmoid单元中出现接近零的梯度。然而，当网络权重通过DBN学习初始化时，sigmoid单元在饱和区域操作的几率较小。这是因为网络在预训练期间已经对数据有所了解，sigmoid单元在饱和区域操作的几率较小。对于ReLU激活函数，不存在激活单元饱和的问题，因为当输入值大于零时，它们具有恒定的梯度1。
- en: We now look at an implementation of DBN pretraining of weights followed by the
    training of a classification network by appending the output layer to the hidden
    layer of the RBM. In Listing [5-3a](#PC3), we implemented RBM, wherein we learned
    the weights of the visible-to-hidden connections, assuming all the units are sigmoid.
    To that RBM, we are going to stack the output layer of ten classes for the MNIST
    dataset and train the classification model using the weights from the visible-to-hidden
    units learned as the initial weights for the classification network. Of course,
    we would have a new set of weights corresponding to the connection of the hidden
    layer to the output layer. See the detailed implementation in Listing [5-3b](#PC4).
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看一下使用RBM的隐藏层输出层附加到DBN隐藏层后的权重预训练，以及随后通过附加输出层到RBM隐藏层来训练分类网络。在列表[5-3a](#PC3)中，我们实现了RBM，其中我们学习了可见到隐藏连接的权重，假设所有单元都是sigmoid。对于这个RBM，我们将堆叠MNIST数据集的十个类别的输出层，并使用从可见到隐藏单元学习到的权重作为分类网络的初始权重来训练分类模型。当然，我们将有一组新的权重，对应于隐藏层到输出层的连接。请参见列表[5-3b](#PC4)中的详细实现。
- en: '[PRE3]'
  id: totrans-445
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: As we can see from the preceding output, with the pretrained weights from RBM
    used as initial weights for the classification network, we can get good accuracy
    of around 95% on the MNIST test dataset by just running it for few epochs. This
    is impressive given that the network does not have any convolutional layers.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述的输出所示，使用RBM预训练的权重作为分类网络的初始权重，我们只需运行几个epoch，就能在MNIST测试数据集上获得大约95%的良好准确率。考虑到网络没有卷积层，这是令人印象深刻的。
- en: Autoencoders
  id: totrans-447
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动编码器
- en: Autoencoders are unsupervised artificial neural networks that are used to generate
    a meaningful internal representation of the input data. The autoencoder network
    generally consists of three layers—the input layer, the hidden layer, and the
    output layer. The input layer and hidden layer combination acts as the encoder,
    while the hidden layer and output layer combination acts as the decoder. The encoder
    tries to represent the input as a meaningful representation at the hidden layer,
    while the decoder reconstructs the input back into its original dimension at the
    output layer. Typically, some cost function between the reconstructed input and
    the original input is minimized as part of the training process.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器是无监督的人工神经网络，用于生成输入数据的具有意义的内部表示。自动编码器网络通常由三层组成——输入层、隐藏层和输出层。输入层和隐藏层的组合充当编码器，而隐藏层和输出层的组合充当解码器。编码器试图在隐藏层中表示输入的有意义表示，而解码器将输入重新构建回原始维度，在输出层。通常，在训练过程中，将重建输入和原始输入之间的某些成本函数最小化。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig15_HTML.jpg)'
  id: totrans-449
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig15_HTML.jpg)'
- en: A node diagram represents the architecture of a basic autoencoder. 6 nodes at
    the left labeled x 1 to x 6, connect to 6 nodes at the right labeled y 1 to y
    6, through 4 nodes in the middle labeled h 1 to h 4.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 节点图表示了基本自动编码器的架构。左侧有6个节点，标记为x 1到x 6，通过中间的4个节点（标记为h 1到h 4）连接到右侧的6个节点，标记为y 1到y
    6。
- en: Figure 5-13
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-13
- en: Architecture of a basic autoencoder
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 基本自动编码器的架构
- en: 'Figure [5-13](#Fig15) represents a basic autoencoder with one hidden layer
    and the input and the output layers. The input *x* = [*x*[1] *x*[2]…*x*[6]]^(*T*) ∈ *R*^(6 × 1),
    while the hidden layer *h* = [*h*[1] *h*[2]. . *h*[4]]^(*T*) ∈ *R*^(4 × 1). The
    output *y* is chosen to be equal to *x* so that the error between the reconstructed
    input ![$$ \hat{y} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq21.png)
    can be minimized to get a meaningful representation of the input in the hidden
    layer. For generality purposes, let’s take the following:'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-13](#Fig15)表示了一个具有一个隐藏层以及输入和输出层的简单自动编码器。输入 *x* = [*x*[1] *x*[2]…*x*[6]]^(*T*)
    ∈ *R*^(6 × 1)，而隐藏层 *h* = [*h*[1] *h*[2] . . *h*[4]]^(*T*) ∈ *R*^(4 × 1)。输出 *y*
    被选择为等于 *x*，以便最小化重建输入 ![$$ \hat{y} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq21.png)
    之间的误差，从而在隐藏层中获得输入的有意义表示。为了通用性，让我们考虑以下情况：
- en: '![$$ x={\left[{x}_1\ {x}_2\dots {x}_n\right]}^T\in {R}^{n\times 1} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbx.png)'
  id: totrans-454
  prefs: []
  type: TYPE_IMG
  zh: '![x={\left[{x}_1\ {x}_2\dots {x}_n\right]}^T\in {R}^{n\times 1}](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbx.png)'
- en: '![$$ h={\left[{h}_1\ {h}_2\dots {h}_d\right]}^T\in {R}^{d\times 1} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equby.png)'
  id: totrans-455
  prefs: []
  type: TYPE_IMG
  zh: '![h={\left[{h}_1\ {h}_2\dots {h}_d\right]}^T\in {R}^{d\times 1}](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equby.png)'
- en: '![$$ y=x={\left[{y}_1\ {y}_2\dots {y}_6\right]}^T\in {R}^{n\times 1} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbz.png)'
  id: totrans-456
  prefs: []
  type: TYPE_IMG
  zh: '![y=x={\left[{y}_1\ {y}_2\dots {y}_6\right]}^T\in {R}^{n\times 1}](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equbz.png)'
- en: Let the weights from *x* to *h* be represented by the weight matrix *W* ∈ *R*^(*d* × *n*)
    and the biases at the hidden unit be represented by *b* = [*b*[1] *b*[2]…*b*[*d*]]^(*T*) ∈ *R*^(*d* × 1).
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 将*x*到*h*的权重表示为权重矩阵*W* ∈ *R*^(*d* × *n*)，并将隐藏单元的偏差表示为*b* = [*b*[1] *b*[2]…*b*[*d*]]^(*T*)
    ∈ *R*^(*d* × 1)。
- en: Similarly, let the weights from *h* to *y* be represented by the weight matrix
    *W*^′ ∈ *R*^(*n* × *d*) and the biases at the output units be represented by *b*^′ = [*b*[1] *b*[2]…*b*[*n*]]^(*T*) ∈ *R*^(*n* × 1).
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，将*h*到*y*的权重表示为权重矩阵*W*′ ∈ *R*^(*n* × *d*)，并将输出单元的偏差表示为*b*′ = [*b*[1] *b*[2]…*b*[*n*]]^(*T*)
    ∈ *R*^(*n* × 1)。
- en: 'The output of the hidden unit can be expressed as follows:'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏单元的输出可以表示如下：
- en: '![$$ h={f}_1\left( Wx+b\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equca.png)'
  id: totrans-460
  prefs: []
  type: TYPE_IMG
  zh: '![h={f}_1\left( Wx+b\right) ](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equca.png)'
- en: where *f*[1] is the element-wise activation function at the hidden layer. The
    activation function can be linear, ReLU, sigmoid, and so forth depending on its
    use.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *f*[1] 是隐藏层的逐元素激活函数。激活函数可以是线性的、ReLU、sigmoid等，具体取决于其用途。
- en: 'Similarly, the output of the output layer can be expressed as follows:'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，输出层的输出可以表示如下：
- en: '![$$ \hat{y}={f}_2\left({W}^{\hbox{''}}\;h+{b}^{\hbox{''}}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcb.png)'
  id: totrans-463
  prefs: []
  type: TYPE_IMG
  zh: '![ \hat{y}={f}_2\left({W}^{\hbox{''}}\;h+{b}^{\hbox{''}}\right) ](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcb.png)'
- en: 'If the input features are of a continuous nature, one can minimize a least
    square–based cost function as follows to derive the model weights and biases based
    on the training data:'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输入特征是连续的，可以通过以下基于最小二乘的成本函数来最小化，从而根据训练数据推导模型权重和偏差：
- en: '![$$ C={\sum}_{k=1}^m{{\left\Vert {\hat{y}}^{(k)}-{y}^{(k)}\right\Vert}_2}^2={\sum}_{k=1}^m{{\left\Vert
    {\hat{y}}^{(k)}-{x}^{(k)}\right\Vert}_2}^2 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcc.png)'
  id: totrans-465
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C={\sum}_{k=1}^m{{\left\Vert {\hat{y}}^{(k)}-{y}^{(k)}\right\Vert}_2}^2={\sum}_{k=1}^m{{\left\Vert
    {\hat{y}}^{(k)}-{x}^{(k)}\right\Vert}_2}^2 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcc.png)'
- en: where ![$$ {{\left\Vert {\hat{y}}^{(k)}-{x}^{(k)}\right\Vert}_2}^2 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq22.png)
    is the Euclidean or the *l*² norm distance between the reconstructed output vector
    and the original input vector and m is the number of data points on which the
    model is trained on.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ![$$ {{\left\Vert {\hat{y}}^{(k)}-{x}^{(k)}\right\Vert}_2}^2 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq22.png)
    是重构输出向量与原始输入向量之间的欧几里得或 *l*² 范数距离，m 是模型训练的数据点数量。
- en: If we represent all the parameters of the model by the vector, *θ* = [*W*; *b*;
    *W* ^′; *b*^′], then the cost function *C* can be minimized with respect to all
    the parameters of the model *θ* to derive the model
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将模型的全部参数表示为向量，*θ* = [*W*; *b*; *W* ^′; *b*^′]，那么成本函数 *C* 可以通过最小化模型的所有参数
    *θ* 来推导模型
- en: '![$$ \hat{\theta}=\underset{\theta }{\underbrace{Arg\kern0.5em \operatorname{Min}}}\kern0.5em
    C\left(\theta \right)=\underset{\theta }{\underbrace{Arg\kern0.5em \operatorname{Min}}}\sum
    \limits_{k=1}^m{\hat{y}}^{(k)}-{x^{(k)}}_2^2 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcd.png)'
  id: totrans-468
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{\theta}=\underset{\theta }{\underbrace{Arg\kern0.5em \operatorname{Min}}}\kern0.5em
    C\left(\theta \right)=\underset{\theta }{\underbrace{Arg\kern0.5em \operatorname{Min}}}\sum
    \limits_{k=1}^m{\hat{y}}^{(k)}-{x^{(k)}}_2^2 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcd.png)'
- en: '![$$ \hat{\theta}=\arg \underset{\theta }{\min }C\left(\theta \right)=\underset{\theta
    }{\textrm{argmin}}{\sum}_{k=1}^m{{\left\Vert {\hat{y}}^{(k)}-{x}^{(k)}\right\Vert}_2}^2
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equce.png)'
  id: totrans-469
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{\theta}=\arg \underset{\theta }{\min }C\left(\theta \right)=\underset{\theta
    }{\textrm{argmin}}{\sum}_{k=1}^m{{\left\Vert {\hat{y}}^{(k)}-{x}^{(k)}\right\Vert}_2}^2
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equce.png)'
- en: 'The learning rule of the model as per gradient descent is as follows:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的学习规则如下，根据梯度下降法：
- en: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}-\eta {\nabla}_{\theta }C\left({\theta}^{(t)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcf.png)'
  id: totrans-471
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}-\eta {\nabla}_{\theta }C\left({\theta}^{(t)}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcf.png)'
- en: where *η* is the learning rate, *t* represents the iteration number, and ∇[*θ*]*C*(*θ*^((*t*)))
    is the gradient of the cost function with respect to *θ* at *θ* = *θ*^((*t*)).
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *η* 是学习率，*t* 表示迭代次数，∇[*θ*]*C*(*θ*^((*t*))) 是成本函数关于 *θ* 在 *θ* = *θ*^((*t*)))
    处的梯度。
- en: 'Now, let us consider several cases as follows:'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们考虑以下几种情况：
- en: When the dimension of the hidden layer is less than that of the input layer,
    i.e., (*d* < *n*) where *d* is the hidden layer and *n* is the dimension of input
    layer, then the autoencoder works as a data-compression network that projects
    the data from a high-dimensional space to a lower-dimensional space given by the
    hidden layer. This is a lossy data-compression technique. It can also be used
    for noise reduction in the input signal.
  id: totrans-474
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当隐藏层的维度小于输入层的维度时，即 (*d* < *n*)，其中 *d* 是隐藏层，*n* 是输入层的维度，那么自动编码器作为一个数据压缩网络，将数据从高维空间投影到由隐藏层给出的低维空间。这是一种有损数据压缩技术。它也可以用于输入信号的噪声减少。
- en: When (*d* < *n*) and all the activation functions are linear, then the network
    learns to do a linear PCA (principal component analysis).
  id: totrans-475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 (*d* < *n*) 并且所有激活函数都是线性的，那么网络学习进行线性PCA（主成分分析）。
- en: When (*d* ≥ *n*) and the activation functions are linear, then the network may
    learn an identity function, which might not be of any use. However, if the cost
    function is regularized to produce a sparse hidden representation, then the network
    may still learn an interesting representation of the data.
  id: totrans-476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 (*d* ≥ *n*) 并且激活函数是线性的，那么网络可能学习到一个恒等函数，这可能没有任何用处。然而，如果成本函数被正则化以产生稀疏的隐藏表示，那么网络仍然可能学习到有趣的数据表示。
- en: Complex nonlinear representations of input data can be learned by having more
    hidden layers in the network and by making the activation functions nonlinear.
    A schematic diagram of such a model is represented in Figure [5-14](#Fig16). When
    taking multiple hidden layers, it is a must that one takes nonlinear activation
    functions to learn nonlinear representations of data since several layers of linear
    activations are equivalent to a single linear activation layer.
  id: totrans-477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过在网络中增加隐藏层并使激活函数非线性，可以学习输入数据的复杂非线性表示。这种模型的示意图如图 [5-14](#Fig16) 所示。当采用多个隐藏层时，必须使用非线性激活函数来学习数据的非线性表示，因为几层线性激活相当于一个单一的线性激活层。
- en: Feature Learning Through Autoencoders for Supervised Learning
  id: totrans-478
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过自动编码器进行监督学习的特征学习
- en: When we deal with multiple hidden layers, as shown in Figure [5-14](#Fig16),
    and have a nonlinear activation function in the neural units, then the hidden
    layers learn nonlinear relations between the variables of the input data. If we
    are working on a classification-related problem of two classes where the input
    data is represented by *x* ∈ *R*^(6 × 1), we can learn interesting nonlinear features
    by training the autoencoder as in Figure [5-14](#Fig16) and then using the output
    of the second hidden layer vector *h*^((2)) ∈ *R*^(3 × 1). This new nonlinear
    feature representation given by *h*^((2)) can be used as the input to a classification
    model, as shown in Figure [5-15](#Fig17). When the hidden layer whose output we
    are interested in has a dimensionality less than that of the input, it is equivalent
    to the nonlinear version of principal component analysis wherein we are just consuming
    the important nonlinear features and discarding the rest as noise.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们处理多个隐藏层，如图 [5-14](#Fig16) 所示，并且在神经网络单元中有一个非线性激活函数时，隐藏层就会学习输入数据变量之间的非线性关系。如果我们正在处理一个涉及两类输入数据
    *x* ∈ R^(6 × 1) 的分类相关问题，我们可以通过如图 [5-14](#Fig16) 所示的训练自动编码器来学习有趣的非线性特征，然后使用第二个隐藏层向量
    *h*^((2)) ∈ R^(3 × 1) 的输出。由 *h*^((2)) 给出的这种新的非线性特征表示可以用作分类模型的输入，如图 [5-15](#Fig17)
    所示。当我们感兴趣的隐藏层的维度小于输入维度时，它等同于主成分分析的非线性版本，其中我们只是消耗重要的非线性特征，并将其余的作为噪声丢弃。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig17_HTML.jpg)'
  id: totrans-480
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig17_HTML.jpg)'
- en: A node diagram represents 3 nodes at the left named h subscript 1, 2, and 3
    connect to a small node at the right. The arrow at the end denotes the function
    of p, y equals 1 over x.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 一个节点图表示左侧的 3 个节点，分别命名为 h_1、2 和 3，它们连接到右侧的一个小节点。图末端的箭头表示 p 的函数，y 等于 1/x。
- en: Figure 5-15
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-15
- en: Classifier with features learned from autoencoder
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 从自动编码器学习特征的特征分类器
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig16_HTML.jpg)'
  id: totrans-484
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig16_HTML.jpg)'
- en: A node diagram represents the architecture of the autoencoder. It has 23 separate
    nodes that are interconnected by arrows. It is divided into multiple layers.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 一个节点图表示自动编码器的架构。它有 23 个独立的节点，通过箭头相互连接。它分为多个层。
- en: Figure 5-14
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-14
- en: Autoencoder with multiple hidden layers
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 具有多个隐藏层的自动编码器
- en: When we deal with multiple hidden
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们处理多个隐藏层时
- en: The overall network can be combined into a single network for class-prediction
    purpose at test time by combining the two networks as shown in Figure [5-16](#Fig18).
    From the autoencoder, only the part of the network up to the second hidden layer
    that is producing output *h*^((2)) needs to be considered, and then it needs to
    be combined with the classification network as in Figure [5-15](#Fig17).
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试时间，可以将整体网络组合成一个用于类别预测的单个网络，如图 [5-16](#Fig18) 所示。从自动编码器中，只需要考虑产生输出 *h*^((2))
    的网络直到第二个隐藏层部分，然后需要将其与如图 [5-15](#Fig17) 所示的分类网络结合。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig18_HTML.png)'
  id: totrans-490
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig18_HTML.png)'
- en: A node diagram represents the classification network for prediction classes.
    It has 14 separate nodes that are further interconnected by arrows. It is divided
    into four layers.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 一个节点图表示用于预测类别的分类网络。它有 14 个独立的节点，通过箭头进一步相互连接。它分为四层。
- en: Figure 5-16
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-16
- en: Combined classification network for prediction of classes
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 用于类别预测的联合分类网络
- en: 'One might ask the obvious question: Why would linear PCA not suffice for the
    task the autoencoder is performing in this example? Linear PCA or principal component
    analysis only takes care of capturing the linear relationship between input variables
    and tries to decompose the input variables into components that are not linearly
    dependent on each other. These components are called *principal components* and
    are uncorrelated with each other, unlike the original input variables. However,
    the input variables are not always going to be related in a linear fashion that
    leads to linear correlation. Input variables might be correlated in much more
    complex, nonlinear ways, and such nonlinear structures within the data can be
    captured only through nonlinear hidden units in the autoencoders.'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 一个人可能会问一个明显的问题：为什么线性PCA不足以完成这个例子中自动编码器所执行的任务？线性PCA或主成分分析只关注捕捉输入变量之间的线性关系，并试图将输入变量分解为彼此不线性相关的组件。这些组件被称为
    *主成分*，并且它们彼此之间不相关，与原始输入变量不同。然而，输入变量并不总是以线性方式相关，从而导致线性相关性。输入变量可能以更复杂、非线性的方式相关，而这种非线性结构只能通过自动编码器中的非线性隐藏单元来捕捉。
- en: Kullback-Leibler (KL) Divergence
  id: totrans-495
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Kullback-Leibler (KL) 散度
- en: 'The KL divergence measures the disparity or divergence between two random variables.
    If two random variables *X*[1] and *X*[2] have distributions *P*(*X*[1] = *x*)
    and *Q*(*X*[2] = *x*), then the KL divergence of *Q* with respect to *P* is given
    by the following:'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: KL散度衡量两个随机变量之间的差异或发散程度。如果两个随机变量 *X*[1] 和 *X*[2] 的分布分别为 *P*(*X*[1] = *x*) 和 *Q*(*X*[2]
    = *x*)，那么 *Q* 相对于 *P* 的KL散度由以下公式给出：
- en: '![$$ KL\Big(P\mid \left|Q\right)={E}_{x\sim P(x)}\log \frac{P(x)}{Q(x)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcg.png)'
  id: totrans-497
  prefs: []
  type: TYPE_IMG
  zh: '![KL散度公式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcg.png)'
- en: 'If *P* and *Q* are discrete probability distributions over a domain *χ*, we
    can express KL divergence in a sum form as the following:'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 *P* 和 *Q* 是定义在域 *χ* 上的离散概率分布，我们可以将KL散度表示为以下求和形式：
- en: '![$$ KL\Big(P\mid \left|Q\right)=\sum \limits_{x\in \chi}\textrm{P}\left(\textrm{x}\right)\
    \log \frac{P(x)}{Q(x)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equch.png)'
  id: totrans-499
  prefs: []
  type: TYPE_IMG
  zh: '![KL散度求和形式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equch.png)'
- en: 'Alternately if *P* and *Q* are continuous probability distributions, we can
    write KL divergence in an integral form as follows:'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 *P* 和 *Q* 是连续概率分布，我们可以将KL散度写成以下积分形式：
- en: '![$$ KL\Big(P\mid \left|Q\right)=\underset{\chi }{\int }P(x)\log \frac{P(x)}{Q(x)}
    dx $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equci.png)'
  id: totrans-501
  prefs: []
  type: TYPE_IMG
  zh: '![KL散度积分形式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equci.png)'
- en: 'Now let us look at some of the properties of KL divergence:'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看一下KL散度的性质：
- en: 'When the distribution of *P* and *Q* are same, i.e., *P*(*x*) = *Q*(*x*); ∀ *x* ∈ *χ*,
    then KL divergence is zero:'
  id: totrans-503
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 *P* 和 *Q* 的分布相同，即 *P*(*x*) = *Q*(*x*)；∀ *x* ∈ *χ*，则KL散度为零：
- en: '![$$ KL\Big(P\mid \left|Q\right)=\underset{\chi }{\int}\textrm{P}\left(\textrm{x}\right)\log
    \frac{P(x)}{Q(x)} dx=\underset{\chi }{\int }P(x)\log \frac{P(x)}{P(x)} dx=\underset{\chi
    }{\int }P(x)\log 1 dx=0 $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcj.png)'
  id: totrans-504
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![KL散度积分形式](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcj.png)'
- en: At a given point *x*, if *P*(*x*) is exceedingly larger than *Q*(*x*), then
    it would increase the KL divergence. This is because the log ratio ![$$ \frac{P(x)}{Q(x)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq23.png) is going
    to be large in this case weighted by a large value of the density *P*(*x*). Hence
    KL divergence in some sense gives the disparity between two probability distributions
    over a common domain.
  id: totrans-505
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一个给定点 *x*，如果 *P*(*x*)远大于 *Q*(*x*)，那么它会增加KL散度。这是因为在这种情况下，对数比率 ![$$ \frac{P(x)}{Q(x)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq23.png) 将会很大，并且由密度
    *P*(*x*) 的大值加权。因此，从某种意义上说，KL散度给出了两个概率分布在一个共同域上的差异。
- en: At a given point *x* if *Q*(*x*) is exceedingly larger than *P*(*x*), then it
    would not have a very high impact on KL divergence since in this case the relatively
    smaller *P*(*x*) would weigh the high negative log ratio ![$$ \frac{P(x)}{Q(x)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq24.png) down.
  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在给定点 *x*，如果 *Q*(*x*) 远远大于 *P*(*x*)，那么它对 KL 散度的影响不会很大，因为在这种情况下，相对较小的 *P*(*x*)
    会降低高负对数比 ![$$ \frac{P(x)}{Q(x)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq24.png)
    的影响。
- en: The KL divergence is not symmetric since for two different distributions,
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: KL 散度不是对称的，因为对于两个不同的分布，
- en: '![$$ \underset{\chi }{\int}\textrm{P}\left(\textrm{x}\right)\log \frac{P(x)}{Q(x)}
    dx\ne \underset{\chi }{\int}\textrm{Q}\left(\textrm{x}\right)\log \frac{Q(x)}{P(x)}
    dx $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equck.png)'
  id: totrans-508
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![$$ \underset{\chi }{\int}\textrm{P}\left(\textrm{x}\right)\log \frac{P(x)}{Q(x)}
    dx\ne \underset{\chi }{\int}\textrm{Q}\left(\textrm{x}\right)\log \frac{Q(x)}{P(x)}
    dx $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equck.png)'
- en: Hence *KL*(*P*‖*Q*) ≠ *KL*(*Q*‖*P*). The non-symmetry property of KL divergence
    prevents it from being a distance measure.
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 因此 *KL*(*P*‖*Q*) ≠ *KL*(*Q*‖*P*). KL 散度的非对称性质阻止它成为一个距离度量。
- en: 'For Bernoulli random variables *X* and *Y* having means of *ρ*[1] and *ρ*[2],
    respectively, the KL divergence between the variables *X* and *Y* is given by
    the following:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 对于具有均值 *ρ*[1] 和 *ρ*[2] 的伯努利随机变量 *X* 和 *Y*，变量 *X* 和 *Y* 之间的 KL 散度由以下公式给出：
- en: '![$$ KL\left({\rho}_1\Big\Vert {\rho}_2\right)={\rho}_1\log \left(\frac{\rho_1}{\rho_2}\right)+\left(1-{\rho}_1\right)\log
    \left(\frac{1-{\rho}_1}{1-{\rho}_2}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcl.png)'
  id: totrans-511
  prefs: []
  type: TYPE_IMG
  zh: '![$$ KL\left({\rho}_1\Big\Vert {\rho}_2\right)={\rho}_1\log \left(\frac{\rho_1}{\rho_2}\right)+\left(1-{\rho}_1\right)\log
    \left(\frac{1-{\rho}_1}{1-{\rho}_2}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcl.png)'
- en: From the preceding expression, we can see that the KL divergence is 0 when
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 从前面的表达式中，我们可以看到当
- en: '*ρ*[1] = *ρ*[2]; i.e., when both distributions are identical. When *ρ*[1] ≠ *ρ*[2],
    the KL divergence increases monotonically with the difference of the means. If
    *ρ*[1] is chosen to be 0.2, then the KL divergence versus the *ρ*[2] plot is as
    expressed in Figure [5-17](#Fig19).*ρ*[1] = *ρ*[2]'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: '*ρ*[1] = *ρ*[2]; 即，当两个分布相同。当 *ρ*[1] ≠ *ρ*[2] 时，KL 散度随着均值差异的单调递增。如果选择 *ρ*[1]
    为 0.2，那么 KL 散度与 *ρ*[2] 的关系图如图 [5-17](#Fig19) 所示。*ρ*[1] = *ρ*[2]'
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig19_HTML.jpg)'
  id: totrans-514
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig19_HTML.jpg)'
- en: A line graph of K L divergence versus rho subscript 2 represents a curve with
    an increasing trend.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: KL 散度与 rho 下标 2 的线图代表一个呈上升趋势的曲线。
- en: Figure 5-17
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-17
- en: KL divergence plot for mean *ρ*[1] = 0.2
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 均值 *ρ*[1] = 0.2 的 KL 散度图
- en: As we can see, the KL divergence is at its minimum at *ρ*[2] = *ρ*[1] = 0.2
    and increases monotonically on either side of *ρ*[2] = 0.2\. We will be using
    KL divergence to introduce sparsity in the hidden layer for sparse autoencoders
    in the next section.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，KL 散度在 *ρ*[2] = *ρ*[1] = 0.2 处达到最小值，并在 *ρ*[2] = 0.2 的两侧单调递增。在下一节中，我们将使用
    KL 散度来介绍稀疏自动编码器中隐藏层的稀疏性。
- en: Sparse Autoencoders
  id: totrans-519
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 稀疏自动编码器
- en: The purpose of autoencoders, as we discussed earlier, is to learn interesting
    hidden structures of the input data or, more specifically, to learn interesting
    relations among the different variables in the input. The most common way to derive
    these hidden structures is to make the hidden layer dimension smaller than the
    input data dimension so that the autoencoder is forced to learn a compressed representation
    of the input data. This compressed representation is forced to reconstruct the
    original data, and hence the compressed representation should have enough information
    to capture the input sufficiently well. This compressed representation will only
    be able to capture the input data efficiently if there is redundancy in the data
    in the form of correlation and other nonlinear associations between the input
    variables. If the input features are relatively independent, then such compression
    would not be able to represent the original data well. So, for the autoencoder
    to give an interesting low-dimensional representation of the input data, the data
    should have enough structure in it in the form of correlation and other nonlinear
    associations between input variables.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器的目的是，正如我们之前讨论的，学习输入数据的有趣隐藏结构，或者更具体地说，学习输入中不同变量之间的有趣关系。最常见的方法是通过使隐藏层维度小于输入数据维度，从而迫使自动编码器学习输入数据的压缩表示。这种压缩表示被迫重建原始数据，因此压缩表示应该包含足够的信息来充分捕捉输入。这种压缩表示只有在数据中存在冗余，例如输入变量之间的相关性和其他非线性关联时，才能有效地捕捉输入数据。如果输入特征相对独立，那么这种压缩就无法很好地表示原始数据。因此，为了使自动编码器给出输入数据的有趣低维表示，数据中应该包含足够的结构，这种结构以输入变量之间的相关性和其他非线性关联的形式存在。
- en: One thing that we touched upon earlier is that when the number of hidden layer
    units is larger than the dimensionality of the input, there is a high possibility
    that the autoencoder will learn identity transform after setting the weights corresponding
    to the extra hidden layers to zero. In fact, when the number of input and hidden
    layers is the same, the optimal solution for the weight matrix connecting the
    input to the hidden layer is the identity matrix. However, even when the number
    of hidden units is larger than the dimensionality of the input, the autoencoder
    can still learn interesting structures within the data, provided some constraints.
    One such constraint is to restrict the hidden layer output to be sparse so that
    those activations in the hidden layer units on average are close to zero. We can
    achieve this sparsity by adding a regularization term to the cost function based
    on KL divergence. Here, the ρ[1] will be very close to zero, and the average activation
    in the hidden unit over all training samples would act as the ρ[2] for that hidden
    unit. Generally, ρ[1] is selected to be very small, to the order of 0.04, and
    hence if the average activation in each of the hidden units is not close to 0.04,
    then the cost function would be penalized.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前提到的一点是，当隐藏层单元的数量大于输入的维度时，自动编码器在将对应额外隐藏层的权重设置为零后，有很大可能性会学习到恒等变换。事实上，当输入层和隐藏层的数量相同时，连接输入到隐藏层的权重矩阵的最优解是单位矩阵。然而，即使隐藏单元的数量大于输入的维度，只要满足某些约束条件，自动编码器仍然可以在数据中学习到有趣的结构。其中一个约束是限制隐藏层输出为稀疏，这样隐藏层单元的平均激活值就接近于零。我们可以通过在成本函数中添加基于KL散度的正则化项来实现这种稀疏性。在这里，ρ[1]将非常接近于零，所有训练样本中隐藏单元的平均激活值将作为该隐藏单元的ρ[2]。通常，ρ[1]被选得非常小，大约为0.04，因此如果每个隐藏单元的平均激活值不接近0.04，则成本函数将受到惩罚。
- en: 'Let *h* ∈ *R*^(*d* × 1) be the hidden layer sigmoid activations of the input
    *x* ∈ *R*^(*n* × 1) where *d* > *n*. Further, let the weights connecting the inputs
    to the hidden layer be given by *W* ∈ *R*^(*d* × *n*) and the weights connecting
    the hidden layer to the output layer be given by *W*^′ ∈ *R*^(*n* × *d*). If the
    bias vectors at the hidden and output layers are given by *b* and *b*'', respectively,
    then the following relationship holds true:'
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 设 *h* ∈ R^(d × 1) 为输入 *x* ∈ R^(n × 1) 的隐藏层sigmoid激活，其中 *d* > *n*。进一步，设连接输入到隐藏层的权重为
    *W* ∈ R^(d × n)，连接隐藏层到输出层的权重为 *W*′ ∈ R^(n × d)。如果隐藏层和输出层的偏置向量分别为 *b* 和 *b*′，则以下关系成立：
- en: '![$$ {h}^{(k)}=\sigma \left({Wx}^{(k)}+b\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcm.png)'
  id: totrans-523
  prefs: []
  type: TYPE_IMG
  zh: '![隐藏层输出 ${h}^{(k)}=\sigma \left({Wx}^{(k)}+b\right)$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcm.png)'
- en: '![$$ {\hat{y}}^{(k)}=f\left({W}^{\prime }{h}^{(k)}+{b}^{\prime}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcn.png)'
  id: totrans-524
  prefs: []
  type: TYPE_IMG
  zh: '![预测值 $\hat{y}^{(k)}=f\left({W}^{\prime }{h}^{(k)}+{b}^{\prime}\right)$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcn.png)'
- en: 'where *h*^((*k*)) and ![$$ {\hat{y}}^{(k)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq25.png)
    are the hidden layer output vector and the reconstructed input vector for the
    *kth* input training data point. The cost function to be minimized with respect
    to the parameters of the model (i.e., *W*, *W* ′, *b*, *b*′) is given by the following:'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *h*^((*k*)) 和 ![重建输入向量 $\hat{y}^{(k)}$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq25.png)
    分别是第 *k* 个输入训练数据点的隐藏层输出向量和重建输入向量。相对于模型参数（即 *W*，*W* ′，*b*，*b*′）的最小化损失函数如下：
- en: '![$$ C={\sum}_{k=1}^m{{\left\Vert {\hat{y}}^{(k)}-{x}^{(k)}\right\Vert}_2}^2+\lambda
    \sum \limits_{j=1}^d KL\Big(\rho \mid \left|{\hat{\rho}}_j\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equco.png)'
  id: totrans-526
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数 $C={\sum}_{k=1}^m{{\left\Vert {\hat{y}}^{(k)}-{x}^{(k)}\right\Vert}_2}^2+\lambda
    \sum \limits_{j=1}^d KL\Big(\rho \mid \left|{\hat{\rho}}_j\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equco.png)'
- en: where ![$$ {\hat{\rho}}_j $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq26.png)
    is the average activation in the *j-th* unit of the hidden layer over all the
    training samples and can be represented as follows. Also, *h*[*j*]^((*k*)) represents
    the hidden layer activation at unit *j* for the *kth* training sample.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ![平均激活 $\hat{\rho}_j$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq26.png)
    是所有训练样本中隐藏层第 *j* 个单元的平均激活，可以表示如下。此外，*h*[*j*]^((*k*)) 表示第 *k* 个训练样本在第 *j* 个单元的隐藏层激活。
- en: '![$$ {\hat{\rho}}_j=\frac{1}{m}\sum \limits_{k=1}^m{h}_j^{(k)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcp.png)'
  id: totrans-528
  prefs: []
  type: TYPE_IMG
  zh: '![平均激活 $\hat{\rho}_j=\frac{1}{m}\sum \limits_{k=1}^m{h}_j^{(k)}$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcp.png)'
- en: '![$$ KL\left(\rho \Big\Vert {\hat{\rho}}_j\right)=\rho \log \left(\frac{\rho
    }{{\hat{\rho}}_j}\right)+\left(1-\rho \right)\log \left(\frac{1-\rho }{1-{\hat{\rho}}_j}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcq.png)'
  id: totrans-529
  prefs: []
  type: TYPE_IMG
  zh: '![KL散度 $KL\left(\rho \Big\Vert {\hat{\rho}}_j\right)=\rho \log \left(\frac{\rho
    }{{\hat{\rho}}_j}\right)+\left(1-\rho \right)\log \left(\frac{1-\rho }{1-{\hat{\rho}}_j}\right)$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcq.png)'
- en: Generally, *ρ* is selected as 0.04 to 0.05 so that the model learns to produce
    average hidden layer unit activations very close to 0.04, and in the process the
    model learns sparse representation of the input data in the hidden layer.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，*ρ* 被选为 0.04 到 0.05，这样模型就能学会产生非常接近 0.04 的平均隐藏层单元激活，在这个过程中，模型学会了在隐藏层中对输入数据进行稀疏表示。
- en: Sparse autoencoders are useful in computer vision to learn low-level features
    that represent the different kinds of edges at different locations and orientations
    within the natural images. The hidden layer output gives the weight of each of
    these low-level features, which can be combined to reconstruct the image. If 10 × 10
    images are processed as 100-dimensional input, and if there are 200 hidden units,
    then the weights connecting input to hidden units—i.e., *W* or hidden units to
    the output reconstruction layer *W* '—would comprise 200 images of size 100 (10 × 10).
    These images can be displayed to see the nature of the features they represent.
    Sparse encoding works well when supplemented with PCA whitening, which we will
    discuss briefly later in this chapter.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 稀疏自编码器在计算机视觉中非常有用，可以学习低级特征，这些特征表示自然图像中不同位置和方向的边缘类型。隐藏层输出给出了这些低级特征中每个特征的权重，这些权重可以组合起来重建图像。如果将
    10×10 的图像处理为 100 维的输入，并且有 200 个隐藏单元，那么连接输入到隐藏单元的权重——即 *W* 或隐藏单元到输出重建层 *W* '——将包含
    200 个大小为 100（10×10）的图像。这些图像可以显示出来，以查看它们所代表的特征的性质。稀疏编码在结合 PCA 白化时效果很好，我们将在本章稍后简要讨论。
- en: Sparse Autoencoder Implementation in TensorFlow
  id: totrans-532
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow 中的稀疏自编码器实现
- en: In this section, we will implement a sparse autoencoder that has more hidden
    units than the input dimensionality. The dataset for this implementation is the
    MNIST dataset. Sparsity has been introduced in the implemented network through
    KL divergence. Also, the weights of the encoder and decoder are used for L2 regularization
    to ensure that in the pursuit of sparsity, these weights don’t adjust themselves
    in undesired ways. The autoencoder and decoder weights represent overrepresented
    basis, and each of these basis tries to learn some low-level feature representations
    of the images, as discussed earlier. The encoder and the decoder are taken to
    be the same. These weights that make up the low-level feature images have been
    displayed to highlight what they represent. The detailed implementation has been
    outlined in Listing [5-4](#PC5).
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将实现一个具有比输入维度更多隐藏单元的稀疏自动编码器。本实现的数据库是MNIST数据集。通过KL散度在实现的网络中引入了稀疏性。此外，编码器和解码器的权重被用于L2正则化，以确保在追求稀疏性的过程中，这些权重不会以不期望的方式调整自己。自动编码器和解码器的权重代表过度表示的基，每个基都试图学习图像的一些低级特征表示，如前所述。编码器和解码器被视为相同。这些构成低级特征图像的权重已被展示出来，以突出它们所代表的内容。详细的实现已在列表[5-4](#PC5)中概述。
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig21_HTML.jpg)'
  id: totrans-534
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig21_HTML.jpg)'
- en: An illustration represents 100 boxes arranged in 10 rows and 10 columns. Each
    box contains a single-digit number. The fonts are in blur format.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图表示100个盒子，排列成10行10列。每个盒子包含一个一位数。字体为模糊格式。
- en: Figure 5-19
  id: totrans-536
