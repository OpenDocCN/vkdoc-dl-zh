- en: 7. Reframing Difficult Deep Learning Problems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7. 重新定义困难的深度学习问题
- en: '*Successful transformations reframe the problem that makes the solution possible.
    They erase existing boundaries and start from scratch.*'
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*成功的转换重新定义了问题，使得解决方案成为可能。它们消除了现有的边界，并从头开始。*'
- en: ''
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Malcolm Gladwell, Journalist and Author
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ——马尔科姆·格拉德威尔，记者和作家
- en: 'To speak very roughly, the deep learning process can be represented with three
    central sequentially connected components: the creation of the architecture, the
    definition of training procedures and methods, and the training of the model itself.
    This is the general deep learning modeling workflow. Each of the chapters this
    book has covered up to this point can be categorized approximately into at least
    one of these categories. Chapter [2](516104_1_En_2_Chapter.xhtml), on transfer
    learning and pretraining, discussed methods of training models to transfer and
    develop knowledge from sources other than the original dataset. Chapter [3](516104_1_En_3_Chapter.xhtml),
    on autoencoders, discussed various usages of the versatile autoencoder concept
    and architecture. Chapter [4](516104_1_En_4_Chapter.xhtml), on model compression,
    discussed various modifications to the neural network architecture, in addition
    to alterations in the training procedure. Chapter [5](516104_1_En_5_Chapter.xhtml),
    on meta-optimization, discussed the automation of parameters in neural network
    architecture and training procedures. Chapter [6](516104_1_En_6_Chapter.xhtml),
    on successful neural network design, discussed successful design patterns and
    techniques in neural network architectures and model implementation.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 大致来说，深度学习过程可以用三个中心、依次连接的组件来表示：架构的创建、训练程序和方法的定义以及模型的训练本身。这是深度学习的一般建模工作流程。本书到目前为止所涵盖的每一章都可以大致归类为至少这些类别之一。关于迁移学习和预训练的第[2](516104_1_En_2_Chapter.xhtml)章讨论了从原始数据集以外的来源训练模型以转移和开发知识的方法。关于自编码器的第[3](516104_1_En_3_Chapter.xhtml)章讨论了多才多艺的自编码器概念和架构的各种用途。关于模型压缩的第[4](516104_1_En_4_Chapter.xhtml)章讨论了神经网络架构的多种修改，以及训练程序中的变更。关于元优化的第[5](516104_1_En_5_Chapter.xhtml)章讨论了神经网络架构和训练程序中参数的自动化。关于成功神经网络设计的第[6](516104_1_En_6_Chapter.xhtml)章讨论了神经网络架构和模型实现中的成功设计模式和技巧。
- en: In this last chapter – Chapter [7](516104_1_En_7_Chapter.xhtml) – we will be
    taking a step back, moving away from strictly the study of building successful
    and efficient neural network systems and toward a more broad perspective on *using*,
    not just *doing*, deep learning in real-world problems. In order to do this, we’re
    going to need to be comfortable with *reframing* difficult real-world problems
    that often don’t come in a format that is convenient for successful application
    of deep learning. Although deep learning is an incredibly powerful and versatile
    tool, it often requires the human knack for problem-solving in the face of difficult
    tasks.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后一章——第[7](516104_1_En_7_Chapter.xhtml)章——我们将退后一步，从严格研究构建成功且高效的神经网络系统转向更广泛的视角，即在实际问题中*使用*而不是仅仅*执行*深度学习。为了做到这一点，我们需要对重新定义那些通常不适合深度学习成功应用格式的困难现实世界问题感到舒适。尽管深度学习是一个极其强大且多功能的工具，但它通常需要人类在困难任务面前解决问题的技巧。
- en: The key theme we will explore in this chapter is that of *data*. Data is the
    basis of deep learning problems, and it is a key factor in informing how one approaches
    the key components of deep learning (Figure [7-1](#Fig1)).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章我们将探讨的关键主题是*数据*。数据是深度学习问题的基础，它是影响一个人如何处理深度学习关键组件的关键因素（图[7-1](#Fig1)）。
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig1_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig1_HTML.jpg)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig1_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig1_HTML.jpg)'
- en: Figure 7-1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-1
- en: 'Deep learning vs. deep learning: the role data plays in influencing each of
    the components of deep learning'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习与深度学习：数据在影响深度学习各个组件中的作用
- en: 'We’ve reached a point in which it’s difficult to abstract the notion of “reframing
    the problem” into a generalized theory or a simple set of bullet points. This
    chapter will present three case studies as examples of successful reframing of
    difficult deep learning problems, in relation to data: experimentation with data
    representation, corrupted data, and limited data. While these case studies are
    not to be taken as strictly representative of the problems that you will face
    and need to reframe, they demonstrate that innovation comes with pushing and breaking
    boundaries. In doing so, hopefully they give you the creative spark to begin tackling
    new and unseen problems yourself.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经到达了一个难以将“重新定义问题”的概念抽象化为一个通用理论或一系列简单要点。本章将提供三个案例研究，作为成功重新定义困难深度学习问题的例子，这些问题与数据相关：数据表示的实验、损坏的数据和有限的数据。虽然这些案例研究不应被视为严格代表你将面临并需要重新定义的问题，但它们表明创新伴随着推动和突破边界。在这样做的同时，希望它们能激发你的创造力，开始自己解决新的和未见过的问题。
- en: 'Data Representation: DeepInsight'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据表示：深度洞察
- en: Data is a valuable commodity whose purity has become more and more prized throughout
    deep learning development. Whereas traditional machine learning methods often
    heavily relied upon human feature cleaning, engineering, and alteration, modern
    deep learning pushes toward a continual decreasing dependency on humans to perform
    data preprocessing by automating the preparation of the data, most commonly through
    clever neural network architecture designs.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是一种有价值的商品，其纯度在深度学习发展的过程中变得越来越受到重视。而传统的机器学习方法通常严重依赖人类特征清洗、工程化和修改，现代深度学习则推动向人类对数据进行预处理的持续降低依赖，通过自动化数据的准备来实现，这通常是通过巧妙的神经网络架构设计来完成的。
- en: Deep learning is automating the transgression of data forms; different methods
    of representing data are being bridged together in an automated fashion. Yet,
    there still remains a divide in data that deep learning still requires the guidance
    of humans to navigate – the *contextual dimension* of the data. By this, we mean
    not merely the dimensions (i.e., shape) of the data or the encoded knowledge it
    represents, but the organization of data along various dimensions of context from
    the data’s origin, like spatial dimensions of width, height, and channels in an
    image, the dimension of time in audio inputs, and the dimension of sequence in
    text inputs. The contextual dimension of the data best describes what we understand
    to be meaningfully different “types” or “forms” of data in the context of deep
    learning.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习正在自动化数据形式之间的越界；不同的数据表示方法正在以自动化的方式被连接起来。然而，数据中仍然存在一个深度学习仍然需要人类指导来导航的分歧——数据的*上下文维度*。通过这种方式，我们不仅意味着数据的维度（即形状）或它所表示的编码知识，而且还意味着数据在其来源的各个上下文维度上的组织，例如图像的宽度、高度和通道的空间维度，音频输入的时间维度，以及文本输入的序列维度。数据的上下文维度最好地描述了我们在深度学习背景下理解的有意义不同的“类型”或“形式”的数据。
- en: 'So-called “specialized” data forms like images are generally reduced to the
    basic component of deep learning, the vector, upon which they can be processed
    as a primary element among standard layers and manipulations. This has been the
    general convention in the progression of deep learning development: the concept
    of feature extraction implies a tendency of complex data toward simplicity; the
    important elements of complex data are extracted, and from these elements, even
    more important elements are extracted, etc. Thus, complex data forms are reduced
    to the processing unit of the vector.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 所说的“专用”数据形式，如图像，通常被简化为深度学习的基本组成部分——向量，它们可以作为标准层和操作中的主要元素进行处理。这已经成为深度学习发展过程中的一个普遍惯例：特征提取的概念意味着复杂数据向简单性的趋势；复杂数据的重要元素被提取出来，然后从这些元素中提取出更加重要的元素，等等。因此，复杂的数据形式被简化为向量的处理单元。
- en: This is a rather unexplicit assumption or tradition in deep learning development,
    from which reframing the design paradigm and transgressing boundaries may yield
    new innovative and effective approaches. We can reframe the traditional flow of
    image data to vector form as vector data flowing into *image* form. Convolutional
    operations provide a local approach to feature extraction – that is, complex arrangements
    of data are progressively smoothed with local filters such that information is
    *progressively* generalized – that fully connected layers do not offer, viewing
    and processing all information at once. Intuitively, we may hypothesize that local
    extraction of features may prove to be valuable in domains other than just images.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这在深度学习的发展中是一个相当不明确的假设或传统，从重新构架设计范式和跨越边界中可能会产生新的创新和有效的方法。我们可以将传统将图像数据流向向量形式重新构架为向量数据流向
    *图像* 形式。卷积操作提供了一种局部特征提取的方法——也就是说，通过局部滤波器逐步平滑复杂的数据排列，从而使信息 *逐步* 概化——这是全连接层所不具备的，全连接层一次处理所有信息。直观地，我们可能假设局部特征提取可能对除了图像以外的领域也很有价值。
- en: 'Alok Sharma, Edwin Vans, Daichi Shigemizu, Keith A. Boroevich, and Tatsuhiko
    Tsunoda reframe this traditional design paradigm in their 2019 paper “DeepInsight:
    A methodology to transform a non-image data to an image for convolution neural
    network architecture.”^([1](#Fn1)) The DeepInsight method is a pipeline to transform
    structured/tabular data (this does not bar sequential or text-based data, as long
    as it is framed in a structured data format) into image-based data, which is then
    used for training in a standard convolutional neural network.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: Alok Sharma、Edwin Vans、Daichi Shigemizu、Keith A. Boroevich 和 Tatsuhiko Tsunoda
    在他们 2019 年的论文“DeepInsight：一种将非图像数据转换为图像以用于卷积神经网络架构的方法”中重新构架了这种传统设计范式^([1](#Fn1))。DeepInsight
    方法是一个将结构化/表格数据（这并不排除序列或基于文本的数据，只要它以结构化数据格式呈现）转换为基于图像数据的管道，然后用于在标准卷积神经网络中进行训练。
- en: The first step of DeepInsight is to acquire a feature matrix that is used to
    map individual features in structured data to spatial coordinates in the corresponding
    image. This feature density matrix is used as a “template” to generate individual
    images for each individual vector. Each feature is associated with a pixel in
    the “template” matrix. This association is performed via a clever trick in which
    the data is *transposed* and used in dimensionality reduction via methods like
    Kernel PCA or t-Stochastic Neighbor Embedding. Traditionally, in a dataset of
    *n* samples and *d* features, dimensionality reduction to two spatial dimensions
    yields a dataset of *n* samples and two features. However, if we apply dimensionality
    reduction to the *transpose* of such a dataset, we treat each of the *d* features
    as a sample and each of the *n* samples as a feature, yielding a reduced dataset
    with *d* samples and two features. Thus, each of the *d* features has been mapped
    to a two-dimensional point in the “template” matrix.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight 的第一步是获取一个特征矩阵，用于将结构化数据中的单个特征映射到相应图像中的空间坐标。这个特征密度矩阵被用作“模板”来为每个向量生成单个图像。每个特征都与“模板”矩阵中的一个像素相关联。这种关联是通过一种巧妙的方法实现的，即数据被
    *转置* 并通过核主成分分析（Kernel PCA）或 t-Stochastic Neighbor Embedding 等方法进行降维。传统上，在包含 *n*
    个样本和 *d* 个特征的样本集中，降维到两个空间维度会产生一个包含 *n* 个样本和两个特征的样本集。然而，如果我们对这样的数据集的 *转置* 应用降维，我们将每个
    *d* 个特征视为一个样本，每个 *n* 个样本视为一个特征，从而得到一个包含 *d* 个样本和两个特征的降维数据集。因此，每个 *d* 个特征都已被映射到“模板”矩阵中的二维点。
- en: Using a transformation method like Kernel PCA and t-SNE that preserves local
    relationships, we can map features that behave similarly to one another to physically
    closer locations in the feature matrix (Figure [7-2](#Fig2)). This allows similar
    features in the generated images to be processed more efficiently by convolutions.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 使用像核主成分分析（Kernel PCA）和 t-SNE 这样的变换方法，这些方法可以保持局部关系，我们可以将彼此行为相似的特征映射到特征矩阵中物理上更近的位置（图
    [7-2](#Fig2)）。这使得生成的图像中的相似特征可以通过卷积更有效地处理。
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig2_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig2_HTML.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig2_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig2_HTML.jpg)'
- en: Figure 7-2
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-2
- en: Mapping features into locations in the template matrix *m*. *g*[*i*] is used
    to indicate a particular feature. →^(*T*) indicates the transformation procedure
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 将特征映射到模板矩阵 *m* 中的位置。*g*[*i*] 用于表示一个特定的特征。→^(*T*) 表示变换过程
- en: Once the “template” feature matrix has been established, we can create an image
    for an input vector by establishing a point in the image corresponding to the
    location allocated for that specific feature (Figure [7-3](#Fig3)). (You can observe
    from this that DeepInsight is designed on high-dimensional data; a high number
    of features is needed to populate the image since each point in the image is one
    feature.) In order to prevent redundancy in image representation, the convex hull
    algorithm is utilized to select the smallest rectangle consisting of all the data,
    cropping out unnecessary blank sides. The data is correspondingly rotated, and
    the space is mapped into pixel, image-based format, which can then be passed through
    a standard convolutional neural network.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立了“模板”特征矩阵，我们就可以通过在图像中建立一个对应于该特定特征分配位置的点来为输入向量创建一个图像（见图 [7-3](#Fig3)）。（你可以从这一点看出，DeepInsight
    是基于高维数据设计的；需要大量的特征来填充图像，因为图像中的每个点都是一个特征。）为了防止图像表示中的冗余，使用了凸包算法来选择包含所有数据的最大矩形，裁剪掉不必要的空白边缘。数据相应地旋转，并将空间映射到基于像素的图像格式，然后可以通过标准的卷积神经网络进行处理。
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig3_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig3_HTML.jpg)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig3_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig3_HTML.jpg)'
- en: Figure 7-3
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-3
- en: 'The DeepInsight pipeline: mapping vectors to pixel coordinates'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight 流程：将向量映射到像素坐标
- en: Sharma et al. use a model to process this structured turned image data that
    combines many of the previously discussed in this book. The architecture (shown
    in Figure [7-4](#Fig4)) used to process the images uses parallel representation
    with a cardinality of two, in which each of the branches is a simple linear stack
    of linear cells, which follow the standard convolutional pooling dynamic (with
    additional batch normalization and ReLU layers). The two branches are merged and
    processed for the classification output. The difference between the two branches
    lies in the filter size of image operations; by using an architecture that explicitly
    captures differently sized patterns within the image, the model is more effectively
    able to look for both broader patterns and smaller nuances simultaneously and
    combine the findings of these two perspectives to form a more accurate judgment.
    The number of cell repeats, filter sizes, learning rates, and other hyperparameters
    are tuned using Bayesian optimization.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: Sharma 等人使用一个模型来处理这种结构化的图像数据，该模型结合了本书中之前讨论的许多内容。用于处理图像的架构（如图 [7-4](#Fig4) 所示）使用具有两个基数度的并行表示，其中每个分支都是一个简单的线性堆叠的线性单元，遵循标准的卷积池化动态（包括额外的批量归一化和
    ReLU 层）。两个分支合并并处理以产生分类输出。两个分支之间的区别在于图像操作的滤波器大小；通过使用一个能够明确捕捉图像中不同大小模式的架构，模型能够更有效地同时寻找更广泛的模式和更小的细微差别，并将这两个视角的发现结合起来，形成更准确的判断。使用贝叶斯优化调整了单元重复次数、滤波器大小、学习率和其他超参数。
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig4_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig4_HTML.jpg)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig4_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig4_HTML.jpg)'
- en: Figure 7-4
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-4
- en: Architecture used for DeepInsight pipeline
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight 流程使用的架构
- en: 'The resulting DeepInsight pipeline performs very well on both genetic data,
    which the model was originally designed for, and other high-dimensional data contexts.
    Sharma et al. evaluate the method on five benchmark datasets: RNA-seq, a biological
    RNA sequence dataset from the NIH TCGA dataset; a subset from the TIMIT corpus,
    a speech dataset; the Relathe dataset, derived from news documents; the Madelon
    dataset, which is a synthetically constructed binary classification problem; and
    ringnorm DELVE, another synthetically constructed binary classification problem.
    These five datasets represent a wide array of problem contexts and data spaces;
    the DeepInsight method performs much better than other algorithms that have become
    successful staple methods in modeling structured/tabular datasets (Table [7-1](#Tab1)).
    See Figure [7-5](#Fig5) for a visualization on how DeepInsight generates meaningful
    visual representations across these datasets.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示，DeepInsight管道在模型最初设计的遗传数据以及其他高维数据环境中表现都非常出色。Sharma等人对五个基准数据集进行了方法评估：RNA-seq，来自NIH
    TCGA数据集的生物RNA序列数据集；TIMIT语料库的一个子集，一个语音数据集；Relathe数据集，来自新闻文档；Madelon数据集，一个合成的二元分类问题；以及ringnorm
    DELVE，另一个合成的二元分类问题。这五个数据集代表了广泛的问题背景和数据空间；DeepInsight方法的表现远优于其他在建模结构化/表格数据集方面已成功成为主流方法的算法（见表[7-1](#Tab1)）。请参阅图[7-5](#Fig5)以了解DeepInsight如何生成这些数据集的有意义视觉表示。
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig5_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig5_HTML.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig5_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig5_HTML.jpg)'
- en: Figure 7-5
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-5
- en: Visualization of image patterns mapped by DeepInsight. Differences in samples
    from Cancer, Text, and Vowel datasets are shown as the small patches in the middle
    columns. These differences are extracted by convolutional filters to perform more
    effective classification than another method
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight映射的图像模式可视化。来自癌症、文本和元音数据集的样本差异显示在中间列的小块中。这些差异通过卷积滤波器提取，以实现比其他方法更有效的分类。
- en: Table 7-1
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 表7-1
- en: Performance of DeepInsight against other common methods for structured data
    with various datasets
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight与其他常见结构化数据处理方法的性能对比，使用各种数据集
- en: '| Dataset | Decision Tree | AdaBoost | Random Forest | DeepInsight |'
  id: totrans-36
