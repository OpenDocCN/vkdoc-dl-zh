- en: 3. Model-Based Approaches
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 基于模型的策略
- en: Chapter [2](502835_2_En_2_Chapter.xhtml) talked about the parts of the setup
    that form the agent and the part that forms the environment. To recap, the agent
    gets the state *S*[*t*] = *s* and follows a policy *π*(*s*| *a*) that maps states
    to actions. The agent uses this policy to take an action *A*[*t*] = *a* when in
    state *S*[*t*] = *s*. The system transitions to the next time instant of *t* + 1\.
    The environment responds to the action (*A*[*t*] = *a*) by putting the agent in
    a new state of *S*[*t* + 1] = *s*^′ and providing feedback to the agent in terms
    of a reward, *R*[*t* + 1]. The agent has no control over what the new state *S*[*t* + 1]
    and reward *R*[*t* + 1] will be. The transition from (*S*[*t*] = *s*, *A*[*t*] = *a*) → (*R*[*t* + 1] = *r*,
    *S*[*t* + 1] = *s*^′) is governed by the environment. This is known as *transition
    dynamics*. For a given pair of (*s*, *a*), there could be one or more pairs of
    (*r*, *s*^′). In a deterministic world, you would have a single pair of (*r*,
    *s*^′) for a fixed combination of (*s*, *a*). However, in stochastic environments,
    that is, environments with uncertain outcomes, you could have many pairs of (*r*,
    *s*^′) for a given (*s*, *a*). Chapter [2](502835_2_En_2_Chapter.xhtml) also looked
    at the computation of state values *V*(*s*) and state-action values *Q*(*s*, *a*)
    and the recursive relationship between current state/state-action values and next
    state/state-action values (in Equations [2-19](502835_2_En_2_Chapter.xhtml#Equ19)
    and [2-21](502835_2_En_2_Chapter.xhtml#Equ21)).
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 第 [2](502835_2_En_2_Chapter.xhtml) 章讨论了构成智能体和环境的各个部分。为了回顾，智能体获取状态 *S*[*t*] = *s*
    并遵循一个将状态映射到动作的策略 *π*(*s*| *a*)。智能体使用这个策略在状态 *S*[*t*] = *s* 时采取动作 *A*[*t*] = *a*。系统过渡到下一个时间点
    *t* + 1。环境通过将智能体置于新的状态 *S*[*t* + 1] = *s*^′ 并提供奖励 *R*[*t* + 1] 作为反馈来响应动作 (*A*[*t*] = *a*)。智能体无法控制新的状态
    *S*[*t* + 1] 和奖励 *R*[*t* + 1] 将会是什么。从 (*S*[*t*] = *s*, *A*[*t*] = *a*) → (*R*[*t* +
    1] = *r*, *S*[*t* + 1] = *s*^′) 的转换由环境控制。这被称为 *转换动力学*。对于给定的 (*s*, *a*) 对，可能存在一个或多个
    (*r*, *s*^′) 对。在确定性世界中，对于固定的 (*s*, *a*) 组合，你将有一个唯一的 (*r*, *s*^′) 对。然而，在具有不确定结果的随机环境中，对于给定的
    (*s*, *a*)，你可能有多个 (*r*, *s*^′) 对。第 [2](502835_2_En_2_Chapter.xhtml) 章还探讨了状态值 *V*(*s*)
    和状态-动作值 *Q*(*s*, *a*) 的计算，以及当前状态/状态-动作值与下一个状态/状态-动作值之间的递归关系（在方程 [2-19](502835_2_En_2_Chapter.xhtml#Equ19)
    和 [2-21](502835_2_En_2_Chapter.xhtml#Equ21) 中）。
- en: RL agents learn optimal actions for any given state, which maximizes the total
    reward the agent gets by following an optimal set of actions as the agent transitions
    from one state to another. Equations [2-19](502835_2_En_2_Chapter.xhtml#Equ19)
    and [2-21](502835_2_En_2_Chapter.xhtml#Equ21) clearly indicate that *V*(*s*) and
    *Q*(*s*, *a*) depend on two components, the transition dynamics and the next state/state-action
    values. To lay the foundations of RL learning, this chapter starts with the simplest
    setup—one in which the transition dynamics Pr{ *S*[*t* + 1] = *s*^′, *R*[*t* + 1] = *r* | *S*[*t*] = *s*,
    *A*[*t*] = *a*} are known. It also assumes that the number of states and actions
    possible in a given state form a closed, small set of discrete values. Such a
    simplifying assumption will help you develop the foundations of RL learning algorithms.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习智能体学习任何给定状态的最优动作，通过智能体从一个状态过渡到另一个状态时遵循最优动作集来最大化智能体获得的累积奖励。方程 [2-19](502835_2_En_2_Chapter.xhtml#Equ19)
    和 [2-21](502835_2_En_2_Chapter.xhtml#Equ21) 清楚地表明 *V*(*s*) 和 *Q*(*s*, *a*) 依赖于两个组件，即转换动力学和下一个状态/状态-动作值。为了建立强化学习的基础，本章从最简单的设置开始——其中转换动力学
    Pr{ *S*[*t* + 1] = *s*^′, *R*[*t* + 1] = *r* | *S*[*t*] = *s*, *A*[*t*] = *a*}
    是已知的。它还假设在给定状态下可能的状态和动作的数量形成一个封闭的、小的离散值集合。这样的简化假设将有助于你建立强化学习算法的基础。
- en: In real life, these assumptions are not valid. Consider an example of a robotic
    arm (or any physical system). Each time the arm is moved, due to the mechanical
    parts involved, the movement may be imprecise and therefore the next state is
    only approximately defined in a strict sense. Further, consider the case of a
    self-driving car, where the state at the next instant depends on many other stochastic
    elements like the sudden move by another car or a pedestrian, which may vary from
    time to time. This shows that prior knowledge of the transition function is an
    assumption that can be made only in very simple scenarios. The second assumption
    of a finite set of discrete states and actions is not valid for most of the physical
    systems that live in the world of continuous states and actions.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中，这些假设并不成立。考虑一个机械臂（或任何物理系统）的例子。每次移动机械臂时，由于涉及的机械部件，移动可能不够精确，因此下一个状态在严格意义上只能近似定义。进一步考虑自动驾驶汽车的例子，下一个状态取决于许多其他随机元素，如另一辆车的突然移动或行人的移动，这些可能随时间而变化。这表明，在非常简单的场景中，对转移函数的先验知识是一个可以做出的假设。第二个假设是有限个离散状态和动作的集合，对于大多数存在于连续状态和动作世界中的物理系统来说并不成立。
- en: Hence, the algorithms you will study in later chapters use various techniques
    to either estimate these transition functions using sampling and other related
    approaches under *model-based RL* or side-step the need to explicitly estimate
    the transition functions under *model-Free RL*. I discussed these in the section
    on “Solution Approaches with a Mind Map” toward the end of Chapter [2](502835_2_En_2_Chapter.xhtml).
    These approaches help remove both these constraints and I will discuss these in
    detail as you progress through the book.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你将在后续章节中学习的算法使用各种技术，在基于模型的强化学习（*model-based RL*）下通过采样和其他相关方法来估计这些转移函数，或者在无模型强化学习（*model-Free
    RL*）下绕过显式估计转移函数的需要。我在第 [2](502835_2_En_2_Chapter.xhtml) 章末尾的“带有思维导图的解决方案方法”部分讨论了这些内容。这些方法有助于消除这两个约束，随着你阅读本书的进展，我将详细讨论这些方法。
- en: Coming back to the focus of this chapter, the agents in this chapter use the
    transition knowledge to “plan” a policy that maximizes the cumulative return of
    the state value *v*[π](*s*) or *q*[π](*s*, *a*). All these algorithms are based
    on dynamic programming, which allows you to break the problem into smaller subproblems
    and use the recursive relationship of Bellman equations explained in Chapter [2](502835_2_En_2_Chapter.xhtml).
    Next, I will extend the approach to come up with a more general framework of policy
    improvement.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 回到本章的重点，本章中的智能体使用转移知识来“规划”一个策略，该策略最大化状态值 *v*[π](*s*) 或 *q*[π](*s*, *a*) 的累积回报。所有这些算法都是基于动态规划的，这允许你将问题分解成更小的子问题，并使用第
    [2](502835_2_En_2_Chapter.xhtml) 章中解释的贝尔曼方程的递归关系。接下来，我将扩展这种方法，提出一个更通用的策略改进框架。
- en: Grid World Environment
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网格世界环境
- en: The coding exercises are based on a simple grid world environment—an idealized
    maze world of 16 squares arranged in a 4x4 format, as shown in Figure [3-1](#Fig1).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 编码练习基于一个简单的网格世界环境——一个理想化的 16 个方块组成的 4x4 格式迷宫世界，如图 [3-1](#Fig1) 所示。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig1_HTML.jpg)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图 3-1](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig1_HTML.jpg)'
- en: An illustration of a 4 by 4 grid. The grid has 16 blocks that are labeled from
    0 to 15\. 0 and 15 lie on the opposite end of the grid.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 4x4 网格的示意图。网格有 16 个方块，编号从 0 到 15。0 和 15 位于网格的对角端。
- en: Figure 3-1
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-1
- en: Grid world environment. It is a 4×4 grid with terminal states at the top left
    and bottom right. Numbers in the grid represent the state S
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 网格世界环境。它是一个 4x4 的网格，终端状态位于顶部左角和底部右角。网格中的数字代表状态 S
- en: 'The top-left and bottom-right positions are terminal states shown as shaded
    cells in the figure. In a given cell, the agent can move in any of the four directions:
    `UP, RIGHT, DOWN,` and `LEFT`. The actions deterministically move the agent in
    the direction of the action unless there is a wall. In the case of hitting a wall,
    the agent stays in the current position. The agent gets a reward of `-1` every
    time step until it reaches the terminal state.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 顶部左角和底部右角的位置是终端状态，在图中以阴影单元格表示。在给定的单元格中，智能体可以朝四个方向中的任何一个移动：`UP, RIGHT, DOWN`
    和 `LEFT`。动作确定性地将智能体移动到动作的方向，除非有墙壁。在碰到墙壁的情况下，智能体保持在当前位置。智能体在达到终端状态之前，每一步都会获得 `-1`
    的奖励。
- en: I will keep the implementation of the grid-world environment to bare bones,
    just implementing the core capabilities. For a detailed way to create custom environments
    in the Gymnasium library, refer to the documentation of Gymnasium.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我将保持网格世界环境的实现尽可能简单，只实现核心功能。有关在Gymnasium库中创建自定义环境的详细方法，请参阅Gymnasium的文档。
- en: You’ll create a new class called `GridworldEnv` that implements the transition
    dynamics Pr{ *S*[*t* + 1] = *s*^′, *R*[*t* + 1] = *r* | *S*[*t*] = *s*, *A*[*t*] = *a*}
    as a dictionary `P` in which `P[s][a]` gives a list of tuples with the values
    `(probability, next_state, reward, done)`. In other words, for a given state *s*
    and action *a*, it gives a list of tuples consisting of the possible next states
    *s*^′, reward *r*, and probability *p*(*s*^′, *r*| *s*, *a*). The fourth value
    in the tuple is a Boolean flag called `done` that indicates if the next state
    *s*^′ is a terminal state or not.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 你将创建一个新的类`GridworldEnv`，该类实现转换动力学Pr{ *S*[*t* + 1] = *s*^′, *R*[*t* + 1] = *r* | *S*[*t*] = *s*,
    *A*[*t*] = *a*}作为一个字典`P`，其中`P[s][a]`给出一个包含值`(probability, next_state, reward,
    done)`的元组列表。换句话说，对于给定的状态*s*和动作*a*，它给出一个由可能的下一个状态*s*^′、奖励*r*和概率*p*(*s*^′, *r*| *s*,
    *a*)组成的元组列表。元组中的第四个值是一个布尔标志`done`，表示下一个状态*s*^′是否为终止状态。
- en: The transition dynamics `P` are known under the current setup of model-based
    learnings, which is the focus of this chapter. However, `P` is unknown in real-world
    problems, whether model-based or model-free. Algorithms either learn without the
    knowledge of the model (transition dynamics) or build an approximation of the
    model dynamics to solve the RL optimization problem. You will study these algorithms
    in subsequent chapters. Listing [3-1](#PC1) shows the transition function implementation
    of grid world, which is contained in the script file `gridworld.py`.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于模型的学习的当前设置下，转换动力学`P`是已知的，这是本章的重点。然而，在现实世界问题中，无论是基于模型还是无模型，`P`都是未知的。算法要么在没有模型（转换动力学）知识的情况下学习，要么构建模型动力学的近似来解决强化学习优化问题。你将在后续章节中学习这些算法。列表[3-1](#PC1)显示了网格世界的转换函数实现，该实现包含在脚本文件`gridworld.py`中。
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The `limit_coordinates` function makes sure that the agent does not use all
    of the grid. If you are in one of the left-most cells, an action to move “left”
    does not let the agent get out of the grid. The agent in such a case stays unmoved,
    as there is no way to go left while in a left-most cell.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '`limit_coordinates`函数确保智能体不会使用整个网格。如果你位于最左边的单元格之一，向左移动的动作不会让智能体离开网格。在这种情况下，智能体保持不动，因为没有办法在左边的单元格中向左移动。'
- en: The `transition_prob` function takes the current position of the agent and an
    action such as UP or DOWN. It moves the agent as per the action, taking care to
    not let the agent fall off the grid. It returns a tuple of `prob_of_new_state,
    next state value, reward` and a `done` flag. In the current environment, you are
    modeling a deterministic world, which means that the move based on the action
    is certain and the outcome is only a single new state with a probability of 1.0\.
    Therefore, `prob_of_new_state` in the returned tuple is always 1 and only one
    tuple is returned for each state-action pair. However, in a stochastic world,
    for each state, action pair would get a list of tuples, whereby each tuple refers
    to one of the possible states the agent could find itself in after the action.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '`transition_prob`函数接受智能体的当前位置和一个动作，如向上或向下。它根据动作移动智能体，同时注意不要让智能体掉出网格。它返回一个包含`prob_of_new_state,
    next state value, reward`和`done`标志的元组。在当前环境中，你正在模拟一个确定性世界，这意味着基于动作的移动是确定的，结果只有一个具有概率1.0的新状态。因此，返回元组中的`prob_of_new_state`始终为1，并且对于每个状态-动作对只返回一个元组。然而，在随机世界中，对于每个状态-动作对都会得到一个元组列表，其中每个元组都指的是智能体在动作后可能发现自己处于的某个可能状态。'
- en: Let’s now focus on the model-based algorithms, which is the focus of this chapter.
    I will first explain the concept of dynamic programming.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来关注基于模型的算法，这是本章的重点。我将首先解释动态规划的概念。
- en: Dynamic Programming
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动态规划
- en: Dynamic programming is an optimization technique that was developed by Richard
    Bellman in the 1950s. In the context of algorithmic thinking, dynamic programming
    is equated with the concept of avoiding repeated work by remembering partial results.
    Stated another way, it refers to simplifying a complex problem into simpler sub-parts
    in a recursive way. This recursive breaking down into simpler problems stops once
    you reach a level of simplification where the problem can be solved trivially.
    An example is the calculation of a Fibonacci series.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 动态规划是一种由理查德·贝尔曼在20世纪50年代开发的优化技术。在算法思维背景下，动态规划等同于通过记住部分结果来避免重复工作的概念。换句话说，它指的是以递归方式将复杂问题简化为更简单的子问题。这种递归分解到更简单的问题会在达到可以轻易解决问题的简化程度时停止。一个例子是计算斐波那契数列。
- en: A Fibonacci series is defined as *F*[*i*] = *F*[*i* − 1] + *F*[*i* − 2] with
    the base case of *F*[1] = *F*[2] = 1\. Let’s look at how to calculate *F*[51].
    *F*[51] = *F*[50] + *F*[49]. But *F*[50] itself has to be calculated first, using
    *F*[49] + *F*[48]. As you can see, to calculate *F*[51], you need to calculate
    *F*[49] twice, first as part of *F*[50] and then directly as the second term in
    the equation of *F*[51]. Using dynamic programming, you can calculate *F*[49]
    only once and store it the first time it is calculated. Any subsequent call to
    calculate *F*[49] would return the previously stored value instead of calculating
    it again. There are two ways to implement this. A top-down approach of starting
    with the big problem and recursively breaking it down into calculations of smaller
    sub-problems (when implemented in a naïve way) would lead to exponential growth
    of runtime due to repeated calculations of a sub-problem multiple times, similar
    to what I talked about in the context of *F*[49] and illustrated in Figure [3-2](#Fig2).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 斐波那契数列定义为*F*[*i*] = *F*[*i* − 1] + *F*[*i* − 2]，其基本情况为*F*[1] = *F*[2] = 1。让我们看看如何计算*F*[51]。*F*[51]
    = *F*[50] + *F*[49]。但是，*F*[50]本身必须先计算，使用*F*[49] + *F*[48]。如您所见，为了计算*F*[51]，您需要计算*F*[49]两次，第一次作为*F*[50]的一部分，然后直接作为*F*[51]方程中的第二项。使用动态规划，您只需计算一次*F*[49]并将其存储在第一次计算时。任何后续调用计算*F*[49]都会返回之前存储的值，而不是再次计算。有两种实现方式。一种是从大问题开始，递归地将它分解为较小子问题的计算（如果以原始方式实现），这会导致子问题多次重复计算，从而导致运行时间的指数级增长，类似于我在*F*[49]的上下文中讨论的，并在图[3-2](#Fig2)中展示的情况。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig2_HTML.jpg)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig2_HTML.jpg)'
- en: A recursion diagram. From top, F 6 splits into F 5 and F 4\. Similarly, F 5
    is divided into F 4 and F 3\. F 4 is divided into F 2 and F 3\. F 4 is further
    split into F 3 and F 2.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个递归图。从顶部开始，F 6 分解为 F 5 和 F 4。同样，F 5 被分解为 F 4 和 F 3。F 4 被进一步分解为 F 2 和 F 3。F
    4 还被分解为 F 3 和 F 2。
- en: Figure 3-2
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-2
- en: Recursion diagram of calculating Fibonacci *F*[6]
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 计算斐波那契*F*[6]的递归图
- en: You can see from Figure [3-2](#Fig2) that to calculate *F*[6], you need to calculate
    *F*[5] once, *F*[4] twice, *F*[3] three times, *F*[2] five times, and *F*[1] seven
    times. As you calculate the Fibonacci value of higher numbers, the lower number’s
    Fibonacci values need to be calculated/accessed multiple times. The way to avoid
    this exponential growth is to a) store the values as you go from the top node
    in Figure [3-2](#Fig2) to the leaf nodes, in a *top-down approach*, or b) start
    the calculation from leaves and climb up the tree to reach the root node at the
    top, in a *bottom-up approach*. The technique of saving values as you calculate
    and using them the next time when they are needed is called *memoization* and
    should not be confused with memorization.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从图[3-2](#Fig2)中看出，为了计算*F*[6]，您需要先计算*F*[5]一次，*F*[4]两次，*F*[3]三次，*F*[2]五次，以及*F*[1]七次。随着您计算更高数字的斐波那契值，较低数字的斐波那契值需要多次计算/访问。避免这种指数增长的方法是：a)
    在从图[3-2](#Fig2)中的顶部节点到叶子节点的过程中存储值，采用*自顶向下*的方法；或者b) 从叶子节点开始计算，然后向上爬树直到达到顶部的根节点，采用*自底向上*的方法。在计算过程中保存值并在下次需要时使用它们的技巧称为*记忆化*，不应与记忆混淆。
- en: Dynamic programing in the world of mathematics optimization refers to the simplification
    of a calculation into a sequence of steps over time—that is, calculating current
    time step values from the values of the previous time step. This is the approach
    you will be using to build a time-indexed recursion for calculating the state
    values *v*[π](*s*). Take a look at the Bellman equation, which expresses the value
    of a state *v*[π](*s*) in terms of the policy π(*a*| *s*), system dynamics *p*(*s*^′,
    *r*| *s*, *a*), and state value of successor states *v*[π](*s*^′).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在数学优化领域，动态规划指的是将计算简化为一系列随时间进行的步骤——也就是说，从上一时间步的值计算当前时间步的值。这是您将用于构建计算状态值 *v*[π](*s*)
    的时间索引递归的方法。看看贝尔曼方程，它用策略 π(*a*| *s*), 系统动力学 *p*(*s*^′, *r*| *s*, *a*), 和后续状态的状态值
    *v*[π](*s*^′) 来表示状态 *v*[π](*s*) 的值。
- en: '![$$ {v}_{\pi }(s)=\sum \limits_a\pi \left(a|s\right)\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equa.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\pi }(s)=\sum \limits_a\pi \left(a|s\right)\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equa.png)'
- en: This expresses the value *v*[π](*s*) in terms of other state values *v*[π](*s*^′),
    all of which are unknown. If you could somehow get all the successor state values
    for the current state, you would be able to calculate *v*[π](*s*). This shows
    the recursive nature of the equation.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这表示状态值 *v*[π](*s*) 是基于其他状态值 *v*[π](*s*^′) 的，所有这些值都是未知的。如果您能以某种方式获得当前状态的所有后续状态值，您就能计算出
    *v*[π](*s*)。这显示了方程的递归性质。
- en: Note that a particular value *v*[π](*s*^′) would be needed multiple times wherever
    *s*^′ is a successor state of some state *s*. Because of this, you can cache (i.e.,
    store) the value *v*[π](*s*^′) and use it multiple times to avoid recalculating
    *v*[π](*s*^′) again and again, every time it is needed.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，特定的值 *v*[π](*s*^′) 将会在 *s*^′ 是某些状态 *s* 的后续状态的地方被多次使用。因此，您可以缓存（即存储）值 *v*[π](*s*^′)
    并多次使用它，以避免每次需要时都重新计算 *v*[π](*s*^′)。
- en: Dynamic programming is an extensively used optimization technique for a varied
    class of problems; it allows decomposition of complex problems into smaller problems.
    Some common applications are scheduling algorithms, graph algorithms like shortest
    path, graphical models like Viterbi algorithms, and lattice models in bioinformatics.
    As this book is about reinforcement learning, I restrict the use of dynamic programming
    for solving the Bellman expectation and Bellman optimality equations, both for
    value and action-value functions. These equations are given in Chapter [2](502835_2_En_2_Chapter.xhtml),
    in Equations [2-18](502835_2_En_2_Chapter.xhtml#Equ18), [2-21](502835_2_En_2_Chapter.xhtml#Equ21),
    [2-24](502835_2_En_2_Chapter.xhtml#Equ24), and [2-25](502835_2_En_2_Chapter.xhtml#Equ25).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 动态规划是一种广泛使用的优化技术，适用于各种问题类别；它允许将复杂问题分解为更小的问题。一些常见应用包括调度算法、图算法如最短路径、图模型如维特比算法，以及生物信息学中的晶格模型。由于本书是关于强化学习的，我限制动态规划用于解决贝尔曼期望和贝尔曼最优方程，这些方程用于值函数和动作值函数。这些方程在第二章[2](502835_2_En_2_Chapter.xhtml)中给出，在方程[2-18](502835_2_En_2_Chapter.xhtml#Equ18)、[2-21](502835_2_En_2_Chapter.xhtml#Equ21)、[2-24](502835_2_En_2_Chapter.xhtml#Equ24)和[2-25](502835_2_En_2_Chapter.xhtml#Equ25)中。
- en: 'Equation [2-18](502835_2_En_2_Chapter.xhtml#Equ18) shows the recursive nature
    of state values *v*[π](*s*) in terms of successor state values *v*[π](*s*^′) as
    reproduced here:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 方程[2-18](502835_2_En_2_Chapter.xhtml#Equ18)展示了状态值 *v*[π](*s*) 的递归性质，它基于后续状态值
    *v*[π](*s*^′)，如下所示：
- en: '![$$ {v}_{\pi }(s)=\sum \limits_a\pi \left(a|s\right)\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ1.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\pi }(s)=\sum \limits_a\pi \left(a|s\right)\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ1.png)'
- en: (3-1)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: (3-1)
- en: 'Equation [2-21](502835_2_En_2_Chapter.xhtml#Equ21) showed the recursive nature
    state-action values *q*[π](*s*, *a*) in terms of successor state-action values
    *q*[π](*s*^′| *a*^′) as reproduced here:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 方程[2-21](502835_2_En_2_Chapter.xhtml#Equ21)展示了状态-动作值 *q*[π](*s*, *a*) 的递归性质，它基于后续状态-动作值
    *q*[π](*s*^′| *a*^′)，如下所示：
- en: '![$$ {q}_{\pi}\left(s,a\right)=\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ \sum \limits_{a^{\prime }}\pi \left({a}^{\prime
    }|{s}^{\prime}\right)\ q\left({s}^{\prime },{a}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ2.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {q}_{\pi}\left(s,a\right)=\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ \sum \limits_{a^{\prime }}\pi \left({a}^{\prime
    }|{s}^{\prime}\right)\ q\left({s}^{\prime },{a}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ2.png)'
- en: (3-2)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: (3-2)
- en: 'Equation [2-24](502835_2_En_2_Chapter.xhtml#Equ24) showed the recursive relationship
    of state-value *v*[∗](*s*) in terms of successor state-values *v*[∗](*s*^′) as
    shown in Equation [3-3](#Equ3). I remove the outer summation in Equation [3-1](#Equ1)
    and replace it with a *max* function. This is the Bellman Optimality Equation:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 方程式 [2-24](502835_2_En_2_Chapter.xhtml#Equ24) 展示了状态值 *v*[∗](*s*) 与后续状态值 *v*[∗](*s*^′)
    之间的递归关系，如方程式 [3-3](#Equ3) 所示。我在方程式 [3-1](#Equ1) 中移除了外层求和，并用一个 *max* 函数替换。这就是贝尔曼最优方程：
- en: '![$$ {v}_{\ast }(s)=\underset{a}{\max}\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\ast}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ3.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\ast }(s)=\underset{a}{\max}\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\ast}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ3.png)'
- en: (3-3)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: (3-3)
- en: Equation [2-25](502835_2_En_2_Chapter.xhtml#Equ25) showed the recursive relationship
    between the state-action values *q*[∗](*s*, *a*) in terms of successor state-action
    values *q*[∗](*s*^′| *a*^′) under the Bellman optimality construction, where the
    inner sum in Equation [3-2](#Equ2) is replaced with the *max* function.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 方程式 [2-25](502835_2_En_2_Chapter.xhtml#Equ25) 展示了在贝尔曼最优构造下，状态动作值 *q*[∗](*s*,
    *a*) 与后续状态动作值 *q*[∗](*s*^′| *a*^′) 之间的递归关系，其中方程式 [3-2](#Equ2) 中的内层求和被 *max* 函数替换。
- en: '![$$ {q}_{\ast}\left(s,a\right)=\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma \underset{a^{\prime }}{\mathit{\max}}{q}_{\ast}\left({s}^{\prime
    },{a}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ4.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {q}_{\ast}\left(s,a\right)=\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma \underset{a^{\prime }}{\mathit{\max}}{q}_{\ast}\left({s}^{\prime
    },{a}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ4.png)'
- en: (3-4)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: (3-4)
- en: Each of these four equations represents the *v* or *q* value of a state or state-action
    pair in terms of the value of successor states or state-actions meeting the recursive
    nature of dynamic programming.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这四个方程中的每一个都代表了状态或状态动作对的 *v* 或 *q* 值，这是基于后续状态或状态动作的值，体现了动态规划的递归性质。
- en: Remember that each of the summations in these four equations is nothing but
    the expectation operation *E*[·] over all possible values reward and the next
    state in the next time period, which is a function of the current state and action
    taken in that state.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这四个方程中的每一个求和实际上都是对所有可能的价值奖励和下一个时间段的下一个状态进行期望操作 *E*[·]，这是一个关于当前状态和在该状态下采取的动作的函数。
- en: In the following sections, you will first use the expectation in Equation [3-1](#Equ1)
    and/or [3-2](#Equ2) to evaluate a policy, which is known as an *evaluation* or
    *prediction*. You will then use optimality Equation [3-3](#Equ3) and/or [3-4](#Equ4)
    to find an optimal policy that maximizes the state values and state-action values,
    which is known as *policy improvement*.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，你将首先使用方程式 [3-1](#Equ1) 和/或 [3-2](#Equ2) 中的期望来评估策略，这被称为 *评估* 或 *预测*。然后，你将使用最优方程式
    [3-3](#Equ3) 和/或 [3-4](#Equ4) 来找到一个最优策略，该策略最大化状态值和状态动作值，这被称为 *策略改进*。
- en: Once you understand this concept, you will look at a generalized setup, an extensively
    used generalized framework for policy improvement. I conclude the chapter by talking
    about the practical challenges in large-scale problem setups and various approaches
    to optimizing dynamic programming in that context.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你理解了这个概念，你将看到一种通用的设置，这是一种广泛使用的用于策略改进的通用框架。我通过讨论在大规模问题设置中的实际挑战以及在该背景下优化动态规划的多种方法来结束本章。
- en: As discussed at the beginning of this chapter, I mostly focus on the class of
    problems whereby you have a finite set of states the agent can find itself in
    as well as a finite set of actions in each state. Problems with continuous states
    and continuous actions can technically be solved using dynamic programming by
    first discretizing the states and actions. You will see an example of such an
    approach toward the end of Chapter [4](502835_2_En_4_Chapter.xhtml). It also forms
    the bulk of Chapter [5](502835_2_En_5_Chapter.xhtml).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如本章开头所述，我主要关注一类问题，即代理可以发现自己处于有限状态集合中，每个状态也有一个有限动作集合。具有连续状态和连续动作的问题可以通过首先离散化状态和动作，然后使用动态规划技术来解决。你将在第
    [4](502835_2_En_4_Chapter.xhtml) 章的末尾看到一个这样的方法的例子。这构成了第 [5](502835_2_En_5_Chapter.xhtml)
    章的大部分内容。
- en: Policy Evaluation/Prediction
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 政策评估/预测
- en: This section uses Equation [3-1](#Equ1) to derive the state values using its
    iterative nature and the concepts of dynamic programming. Equation [3-1](#Equ1)
    represents the state value for a state *s* in terms of its successor states. The
    values of states also depend on the policy the agent is following, which is defined
    as policy *π*(*a*| *s*) in Equation [3-1](#Equ1). As you may have noticed, because
    of this dependence of value on policy, all the state values are subscripted with
    *π* to signify that state values in Equation [3-1](#Equ1) are the ones obtained
    by following a specific policy *π*(*a*| *s*). To stress once again the importance
    of a policy π, note that changing the policy *π* will produce a different set
    of values, *v*[*π*](*s*) and *q*[*π*](*s*, *a*).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 本节使用方程 [3-1](#Equ1) 通过其迭代性质和动态规划的概念推导状态值。方程 [3-1](#Equ1) 以其后续状态为条件表示状态 *s* 的状态值。状态值还取决于代理遵循的策略，这在方程
    [3-1](#Equ1) 中定义为策略 *π*(*a*| *s*)。正如你可能已经注意到的，由于值对策略的这种依赖性，所有状态值都带有下标 *π*，以表明方程
    [3-1](#Equ1) 中的状态值是通过遵循特定策略 *π*(*a*| *s*) 获得的。再次强调策略 π 的重要性，请注意，改变策略 *π* 将产生不同的值集，*v*[*π*](*s*)
    和 *q*[*π*](*s*, *a*)。
- en: The relationship in Equation [3-1](#Equ1) can be graphically represented by
    a backup diagram, as shown in Figure [3-3](#Fig3).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 [3-1](#Equ1) 中的关系可以通过回溯图来图形化表示，如图 [3-3](#Fig3) 所示。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig3_HTML.jpg)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图3-3](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig3_HTML.jpg)'
- en: An illustration of a backup diagram of the Bellman expectation equation. The
    illustration has dark circles and empty circles. The dark circles signify actions,
    and the empty circles signify states.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 贝尔曼期望方程的回溯图的说明。深色圆圈表示动作，空圆圈表示状态。
- en: Figure 3-3
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-3
- en: Backup diagram of Bellman expectation equation for state-value functions. Empty
    circles signify states, and dark circles signify actions
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 状态值函数的贝尔曼期望方程的回溯图。空圆圈表示状态，深色圆圈表示动作
- en: The agent starts in state *s*. It takes an action *a* based on its current policy
    *π*(*a*| *s*). As a result of this action, the environment transitions the agent
    to a new state *s*^′ along with the reward *r* based on the system dynamics *p*(*s*^′,
    *r*| *s*, *a*). It should be evident that Equation [3-1](#Equ1) forms a system
    of equations, one equation for each state. If there are *N* states, you will have
    *N* such equations. The number of equations equals the total number of states,
    mathematically represented as *N* =  ∣ *S*∣, and is the same as the number of
    unknown state values *v*(*s*), one for each state *S* = *s*. Thus, Equation [3-1](#Equ1)
    represents a system of |*S*| equations with |*S*| unknowns.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 代理从状态 *s* 开始。根据其当前策略 *π*(*a*| *s*) 采取动作 *a*。由于这个动作，环境根据系统动力学 *p*(*s*^′, *r*| *s*,
    *a*) 将代理转移到新的状态 *s*^′ 并获得奖励 *r*。应该很明显，方程 [3-1](#Equ1) 形成了一个方程组，每个状态一个方程。如果有 *N*
    个状态，你将会有 *N* 个这样的方程。方程的数量等于状态的总数，数学上表示为 *N* =  ∣ *S*∣，并且与每个状态 *S* = *s* 的未知状态值
    *v*(*s*) 的数量相同。因此，方程 [3-1](#Equ1) 代表了一个包含 |*S*| 个方程和 |*S*| 个未知数的方程组。
- en: 'You could solve the system of equations using any linear programming technique.
    The recursive set of N equations can be represented in Vector Algebra notation.
    While you will not be using this approach in real-life problems for reasons soon
    to be discussed, I will go over the approach to vectorization of Equation [3-1](#Equ1).
    This is optional and you may skip it if you are not very mathematically inclined.
    You first rewrite Equation [3-1](#Equ1) by merging the outer and inner summations
    in two separate summations:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用任何线性规划技术来解决这个方程组。这组 N 个递归方程可以用向量代数表示。虽然你不会在现实生活中的问题中使用这种方法，原因将在后面讨论，但我将介绍方程
    [3-1](#Equ1) 的向量化方法。这是可选的，如果你不是非常倾向于数学，你可以跳过它。你首先通过合并两个单独的求和来重写方程 [3-1](#Equ1)：
- en: '![$$ {v}_{\pi }(s)=\sum \limits_{a,s^{\prime },r}\pi \left(a|s\right).p\left({s}^{\prime
    },r\ \right|s,a\left).r+\gamma .\sum \limits_{a,\kern0.5em {s}^{\prime },r}\pi
    \left(a|s\right).p\left({s}^{\prime },r\ \right|s,a\right).{v}_{\pi}\left({s}^{\prime}\right)
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equb.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\pi }(s)=\sum \limits_{a,s^{\prime },r}\pi \left(a|s\right).p\left({s}^{\prime
    },r\ \right|s,a\left).r+\gamma .\sum \limits_{a,\kern0.5em {s}^{\prime },r}\pi
    \left(a|s\right).p\left({s}^{\prime },r\ \right|s,a\right).{v}_{\pi}\left({s}^{\prime}\right)
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equb.png)'
- en: (3-5)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: (3-5)
- en: 'Now take the summation over successor state *s*^′ out of the summation:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将后继状态 *s*^′ 的求和从求和中提取出来：
- en: '![$$ {v}_{\pi }(s)=\sum \limits_{s^{\prime },a,r}\pi \left(a|s\right).p\left({s}^{\prime
    },r\ \right|s,a\left).r+\gamma .\sum \limits_{s^{\prime }}\sum \limits_{a,r}\pi
    \left(a|s\right).p\left({s}^{\prime },r\ \right|s,a\right).{v}_{\pi}\left({s}^{\prime}\right)
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equc.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\pi }(s)=\sum \limits_{s^{\prime },a,r}\pi \left(a|s\right).p\left({s}^{\prime
    },r\ \right|s,a\left).r+\gamma .\sum \limits_{s^{\prime }}\sum \limits_{a,r}\pi
    \left(a|s\right).p\left({s}^{\prime },r\ \right|s,a\right).{v}_{\pi}\left({s}^{\prime}\right)
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equc.png)'
- en: 'The first term on the right—*π*(*a*| *s*). *p*(*s*^′, *r* |*s*, *a*) with the
    summation over all possible *s*^′, *a*, *r* is nothing but the expectation, *E*[.]
    due to a specific policy, π. Also note that you will have *N* such equations,
    one for each state *S* = *s*. If you write all the *N* equations, one below the
    other, you can specify all *v*[π](*s*), all *N* of them as a single vector of
    size 1*xN* denoted as ***V***[**π**]. In a similar fashion, the first term on
    the right side can be expressed as a vector of rewards of size 1*xN* depicted
    as *R*[π], thereby denoting the expected reward for each state based on the policy
    that the agent follows in each of the state. The summation ![$$ \sum \limits_{a,r}\pi
    \left(a|s\right).p\left({s}^{\prime },r\ \right|s,a\Big) $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_IEq1.png)
    in the second expression on the right can be expressed as *P*[π] and is the transition
    dynamics of the system under a specific policy. This will be a matrix of size
    *NxN* with a number of rows and number of columns equal to the total number of
    states *N*. Making these changes, you can represent the previous equation as follows:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 右侧的第一个项——*π*(*a*| *s*). *p*(*s*^′, *r* |*s*, *a*)，其中对所有可能的 *s*^′, *a*, *r* 进行求和，实际上就是由于特定策略
    π 的期望，*E*[.]。请注意，你将会有 *N* 个这样的方程，每个状态 *S* = *s* 对应一个。如果你将所有 *N* 个方程依次写出，你可以指定所有
    *v*[π](*s*)，所有 *N* 个都作为一个大小为 1*xN* 的单个向量表示为 ***V***[**π**]。以类似的方式，右侧的第一个项可以表示为一个大小为
    1*xN* 的奖励向量，表示为 *R*[π]，从而表示基于代理在每个状态下遵循的策略的每个状态的期望奖励。右侧第二个表达式的求和 ![$$ \sum \limits_{a,r}\pi
    \left(a|s\right).p\left({s}^{\prime },r\ \right|s,a\Big) $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_IEq1.png)
    可以表示为 *P*[π]，这是在特定策略下的系统动态。这将是一个大小为 *NxN* 的矩阵，行数和列数等于总状态数 *N*。进行这些更改后，你可以将前面的方程表示如下：
- en: '![$$ {V}_{\uppi}={R}_{\uppi}+\upgamma \cdotp {P}_{\uppi}\cdotp {V}_{\uppi}
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equd.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {V}_{\uppi}={R}_{\uppi}+\upgamma \cdotp {P}_{\uppi}\cdotp {V}_{\uppi}
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equd.png)'
- en: 'Collecting all the terms with *V*[π] on left, you get:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有包含 *V*[π] 的项收集到左边，你得到：
- en: '![$$ {V}_{\uppi}\cdotp \left(I+\upgamma \cdotp {P}_{\uppi}\right)={R}_{\uppi}
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Eque.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {V}_{\uppi}\cdotp \left(I+\upgamma \cdotp {P}_{\uppi}\right)={R}_{\uppi}
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Eque.png)'
- en: 'You can now rewrite the vector equation as follows:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以将向量方程重写如下：
- en: '![$$ {V}_{\uppi}={\left(I+\upgamma \cdotp {P}_{\uppi}\right)}^{-1}\cdotp {R}_{\uppi}
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equf.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {V}_{\uppi}={\left(I+\upgamma \cdotp {P}_{\uppi}\right)}^{-1}\cdotp {R}_{\uppi}
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equf.png)'
- en: As you can see, calculating *V*[*π*] involves inverting an *N* × *N* matrix
    (*I* + *γ* · *P*[*π*]), which is not feasible for a large value of *N*. And this
    is the primary reason that you would not use the linear algebra approach to solve
    this system of *N* linear equations.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，计算 *V*[*π*] 涉及到逆一个 *N* × *N* 矩阵 (*I* + *γ* · *P*[*π*])，这对于大的 *N* 值来说是不切实际的。这也是你不会使用线性代数方法来解决这个
    *N* 个线性方程组的主要原因。
- en: Instead, I will resort to the use of iterative solutions. This is achieved by
    starting with some random state values *v*[0](*s*) at first iteration *k* = 0
    and using them on the right side of Equation [3-1](#Equ1) to obtain the state
    values at the next iteration step.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我将求助于迭代解法。这是通过在第一次迭代 *k* = 0 时使用一些随机的状态值 *v*[0](*s*) 来实现的，并在方程 [3-1](#Equ1)
    的右侧使用它们来获得下一迭代步骤的状态值。
- en: '![$$ {v}_{k+1}(s)\leftarrow \sum \limits_a\pi \left(a|s\right)\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_k\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ5.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{k+1}(s)\leftarrow \sum \limits_a\pi \left(a|s\right)\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_k\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ5.png)'
- en: (3-6)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: (3-6)
- en: Notice the change of subscript from *π* to (*k*) and (*k* + 1). Also notice
    the change of equality (=) to assignment (←). You are now representing the state
    values at iteration (*k* + 1) in terms of the state values in the previous iteration
    *k*, and there will be *N* (total number of states) such updates in each iteration.
    It can be shown that, as the iteration index *k* increases and goes to infinity
    (∞), *v*[*k*] will converge to *v*[π]. This approach of finding the values of
    all the states for a given policy is known as *policy evaluation*. You start from
    an arbitrarily chosen value of *v*[*o*] at *k* = 0 and iterate over the state
    values using Equation [3-6](#Equ5), until the state values *v*[*k*] stop changing.
    The other name for policy evaluation is *prediction*—that is, predicting the state
    values for a given policy. The convergence of *v*[*k*] to *v*[π] is guaranteed
    because *v*[*k*] = *v*[π] is a fixed point and it flows from a contraction mapping
    theorem which you can look up in advanced texts.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 注意下标从 *π* 到 (*k*) 和 (*k* + 1) 的变化。还要注意等号 (=) 到赋值 (←) 的变化。你现在正在用上一轮迭代的 *k* 中的状态值来表示迭代
    (*k* + 1) 中的状态值，并且每个迭代中会有 *N*（状态总数）这样的更新。可以证明，随着迭代索引 *k* 的增加并趋向于无穷大 (∞)，*v*[*k*]
    将收敛到 *v*[π]。这种为给定策略找到所有状态值的方法被称为 *策略评估*。你从 *k* = 0 时任意选择的 *v*[*o*] 值开始，使用方程 [3-6](#Equ5)
    迭代状态值，直到状态值 *v*[*k*] 停止变化。策略评估的另一个名称是 *预测*——即预测给定策略的状态值。*v*[*k*] 收敛到 *v*[π] 是有保证的，因为
    *v*[*k*] = *v*[π] 是一个不动点，并且它来自一个收缩映射定理，你可以在高级文本中查找。
- en: While updating all the *N* state values *v*[*k* + 1], one for each of the N
    states, from the previous iteration values of states (*N* of the *v*[*k*] values),
    there are two approaches. The first such approach is known as the *synchronous
    version*. In this, you maintain two arrays for the values of the states—one from
    the previous iteration *k* which is used to update the second array to hold updated
    state values in the current iteration *k* + 1\. At the end of the current iteration,
    the values from the second array to the first array and the next cycle of iteration
    from *k* + 1 to *k* + 2 is initiated.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在更新所有 *N* 个状态值 *v*[*k* + 1]，每个状态一个，从上一轮迭代的各个状态值（*N* 个 *v*[*k*] 值）中，有两种方法。第一种方法被称为
    *同步版本*。在这种情况下，你维护两个数组来存储状态值——一个是上一轮迭代 *k* 的，用于更新第二个数组以在当前迭代 *k* + 1 中存储更新的状态值。在当前迭代结束时，将第二个数组的值复制到第一个数组，并开始从
    *k* + 1 到 *k* + 2 的下一轮迭代。
- en: The second approach is known as *asynchronous version**,* because there is only
    one array and updates are carried out in place. This is shown to display faster
    convergence while requiring memory for only one array. In the approach, there
    are many ways to choose which state value to update in what sequence. I will discuss
    this in detail in a subsequent section in this chapter.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种方法被称为 *异步版本*，因为只有一个数组，并且更新是在原地进行的。这表明它具有更快的收敛速度，同时只需要一个数组的内存。在这个方法中，有许多选择更新哪个状态值以及更新顺序的方法。我将在本章后续部分详细讨论这一点。
- en: Figure [3-4](#Fig4) shows the pseudocode for iterative policy evaluation.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-4](#Fig4) 显示了迭代策略评估的伪代码。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig4_HTML.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig4_HTML.jpg)'
- en: An illustration of iterative policy evaluation. It takes in pie value, the policy
    to be evaluated. The algorithm initializes state values, makes a copy, and runs
    a loop until delta is less than theta.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代策略评估的示意图。它接受策略值，要评估的策略。算法初始化状态值，进行复制，并运行循环，直到 delta 小于 theta。
- en: Figure 3-4
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-4
- en: Iterative policy evaluation algorithm
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代策略评估算法
- en: Let’s now apply the algorithm to the grid world given in Figure [3-1](#Fig1).
    This assumes a random policy *π*(*a*| *s*) where each of the four actions (`UP,
    RIGHT, DOWN, LEFT`) have an equal probability of 0.25\. Listing [3-2](#PC2) shows
    relevant portions of the code for iterative policy evaluation applied to the grid
    world. This is from the file `3.a-policy-evaluation.ipynb`.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将算法应用于图 [3-1](#Fig1) 中给出的网格世界。这假设有一个随机策略 *π*(*a*| *s*)，其中四个动作（`UP`，`RIGHT`，`DOWN`，`LEFT`）具有相等的概率
    0.25。列表 [3-2](#PC2) 显示了应用于网格世界的迭代策略评估的相关代码部分。这是来自文件 `3.a-policy-evaluation.ipynb`。
- en: '[PRE1]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: You start with k=0, the index of current iteration, and two arrays `V` and `V_new`
    to hold the values of the states in the grid. The inner `for` loop `for s in range(env.nS)`
    loops over all the states to update the array `V_new` with *v*[*k* + 1](*s*) from
    the previous state values *v*[*k*](*s*) contained in the array `V` using Equation
    [3-1](#Equ1). Along the way, it records the maximum change in value across all
    the states and stores this maximum change in the `delta` variable. Next, it copies
    the values from `V_new` to `V` and checks if the maximum change in the current
    iteration, as stored in `delta,` is less than the initial threshold, called `theta`.
    If the check is true, the program terminates printing the grid and its state values.
    If `delta` is more than `theta`, the program loops back to the next iteration,
    incrementing the iteration counter `k` by 1\. The final values of the states in
    the grid for following this random policy produced by the program are shown in
    Figure [3-5](#Fig5).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 您从 k=0 开始，这是当前迭代的索引，以及两个数组 `V` 和 `V_new` 来存储网格中状态值。内部 `for` 循环 `for s in range(env.nS)`
    遍历所有状态，使用方程式 [3-1](#Equ1) 更新数组 `V_new` 中的 *v*[*k* + 1](*s*)，这些值包含在数组 `V` 中的先前状态值
    *v*[*k*](*s*)。在这个过程中，它记录了所有状态之间的最大值变化，并将这个最大变化存储在 `delta` 变量中。接下来，它将 `V_new` 中的值复制到
    `V` 中，并检查当前迭代中存储在 `delta` 中的最大变化是否小于初始阈值，称为 `theta`。如果检查为真，程序终止，打印网格及其状态值。如果 `delta`
    大于 `theta`，程序将回退到下一次迭代，迭代计数器 `k` 增加 1。程序产生的随机策略产生的网格中状态的最终值如图 [3-5](#Fig5) 所示。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig5_HTML.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig5_HTML.jpg)'
- en: An illustration of a 4 by 4 grid. The opposite end blocks of the grid are labeled
    0\. The blocks from top to bottom are labeled 0, - 14, - 20, - 22, - 14, - 18,
    - 20, - 20, - 20, - 20, - 18, - 14, - 22, - 20, - 14, and 0.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 4x4 网格的示意图。网格的对角端块标记为 0。从上到下标记的块为 0, -14, -20, -22, -14, -18, -20, -20, -20,
    -20, -18, -14, -22, -20, -14, 和 0。
- en: Figure 3-5
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-5
- en: 'Policy evaluation: *v*[*π*](*s*) for the grid world from Figure [3-1](#Fig1)
    with the agent following a random policy. Each of the four actions (`UP`, `DOWN`,
    `LEFT`, and `RIGHT`) have an equal probability of `0.25`'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 策略评估：对于图 [3-1](#Fig1) 中的网格世界，智能体遵循随机策略的 *v*[*π*](*s*)。四个动作（`UP`，`DOWN`，`LEFT`
    和 `RIGHT`）具有相等的概率 `0.25`
- en: 'Note that the values have converged. Let’s look at the third row in the last
    column with a state value of *v*[*π*](*s*) =  − 14\. In this state, the `UP` action
    will take the agent to a cell with a state value of -20, the `LEFT` action takes
    the agent to a cell with a state value of -18, the `DOWN` action takes the agent
    to a terminal state with a value of 0, and the `RIGHT` action hits the wall, leaving
    the agent in the same state. Let’s apply Equation [3-1](#Equ1). I will expand
    the right side of Equation [3-1](#Equ1) with the actions applied in order—`TOP,
    RIGHT`, `DOWN`, and `LEFT`:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 注意值已经收敛。让我们看看最后一列的第三行，状态值为 *v*[*π*](*s*) =  − 14。在这个状态下，`UP` 动作将智能体带到状态值为 -20
    的单元格，`LEFT` 动作将智能体带到状态值为 -18 的单元格，`DOWN` 动作将智能体带到具有值为 0 的终端状态，而 `RIGHT` 动作撞到墙壁，使智能体保持在同一状态。让我们应用方程式
    [3-1](#Equ1)。我将使用按顺序应用的行动——`TOP`，`RIGHT`，`DOWN` 和 `LEFT` 来展开方程式 [3-1](#Equ1) 的右侧：
- en: -14 = 0.25*(-1+(-20)) + 0.25*(-1+(-14)) + 0.25*(-1+0) + 0.25*(-1+(-18))
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: -14 = 0.25*(-1+(-20)) + 0.25*(-1+(-14)) + 0.25*(-1+0) + 0.25*(-1+(-18))
- en: -14 = -14
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: -14 = -14
- en: The values on both sides are matching, which confirms convergence. Accordingly,
    the values shown in Figure [3-5](#Fig5) are the state values when the agent follows
    a random policy. Note that this considers a discount factor of γ = 1.0.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 两边的值是一致的，这证实了收敛。因此，图 [3-5](#Fig5) 中显示的值是当智能体遵循随机策略时的状态值。请注意，这考虑了折扣因子 γ = 1.0。
- en: This section considered a random policy with equal probability of action in
    all four directions. However, this probably may not be an optimal policy to follow.
    There could be one or more optimal policies producing higher state values. The
    next section looks at a way to devise the algorithm to find a better policy.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 本节考虑了一个在所有四个方向上具有相等动作概率的随机策略。然而，这可能不是一个最优的策略。可能存在一个或多个产生更高状态值的最优策略。下一节将探讨设计算法以找到更好策略的方法。
- en: Policy Improvement and Iterations
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 策略改进与迭代
- en: The previous section discussed an algorithm to get state values *v*[*π*](*s*)
    for a given policy. You could use this information to improve upon the policy.
    In the grid world, you have four actions that you can take from any state. Instead
    of following a random policy *π*(*a*| *s*), you’ll now look at the value of taking
    all four actions individually and then follow the policy *π* after that step.
    This will give you four values of *q*(*s*, *a*) action values, which are the action
    values of taking each of the four possible actions in the grid world.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 上一节讨论了一个获取给定策略的状态值 *v*[*π*](*s*) 的算法。你可以使用这些信息来改进策略。在网格世界中，你从任何状态都可以采取四种动作。现在，你将分别考虑采取所有四种动作的价值，然后在该步骤之后遵循策略
    π。这将给出四个 *q*(*s*, *a*) 动作值，这些是网格世界中采取四个可能动作的动作值。
- en: '![$$ q\left(s,a\right)=\sum \limits_{s^{\prime },r}p\left({s}^{\prime },r\
    \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equg.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![ \( q(s,a) = \sum \limits_{s^{\prime },r}p(s^{\prime },r \ |s,a)\ \left[r+\gamma
    v_{\pi}(s^{\prime})\right] \)](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equg.png)'
- en: 'Note that *q*(*s*, *a*) has no subscript of *π*. You are evaluating *q*(*s*,
    *a*) for all possible actions while in state *S* = *s*. If any of the *q*(*s*,
    *a*) values are greater than the current state value *v*[*π*](*s*), it means that
    current policy *π*(*a*| *s*) is not taking the optimal action. You can improve
    the current policy in current state *S* = *s* by taking the *q*-value, maximizing
    action *A* = *a* and defining this to be the policy in state *S* = *s*. It will
    give a higher state value compared to the current policy *π*(*a*| *s*). This new
    policy is defined as *π*^′(*a*| *s*). In other words, you define the following:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到 *q*(*s*, *a*) 没有下标 *π*。你在状态 *S* = *s* 下评估所有可能动作的 *q*(*s*, *a*) 值。如果任何 *q*(*s*,
    *a*) 值大于当前状态值 *v*[*π*](*s*)，这意味着当前策略 *π*(*a*| *s*) 没有采取最优动作。你可以通过采取 *q*-值，最大化动作
    *A* = *a* 并将其定义为状态 *S* = *s* 下的策略来改进当前状态 *S* = *s* 下的当前策略。这将给出比当前策略 *π*(*a*| *s*)
    更高的状态值。这个新策略被定义为 *π*′(*a*| *s*)。换句话说，你定义以下内容：
- en: '![$$ {\pi}^{\prime}\left(a|s\right)=\underset{a}{argmax}\ q\left(s,a\right)
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ6.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![ \( \pi^{\prime}(a|s) = \underset{a}{argmax}\ q(s,a) \)](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ6.png)'
- en: (3-7)
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: (3-7)
- en: 'There is a general result called *policy improvement theorem**,* which states:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 存在一个称为 *策略改进定理* 的一般结果，它指出：
- en: Let there be two deterministic policies π and π^′ such that, for all *s* ∈ *S*,
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 设有两个确定性的策略 π 和 π′，使得对于所有 *s* ∈ *S*，
- en: '![$$ {q}_{\uppi}\left(s,{\uppi}^{\prime }(s)\right)\ge {v}_{\uppi}(s) $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equh.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![ \( q_{\uppi}(s,{\uppi}^{\prime}(s)) \ge v_{\uppi}(s) \)](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equh.png)'
- en: 'Then the policy π^′ must be as good as or better than π. In other words:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，策略 π′ 必须与 π 一样好或更好。换句话说：
- en: '![$$ {v}_{\pi}^{\prime }(s)\ge {v}_{\pi }(s)\kern0.75em s\ \mathit{\text{\EUR}}\
    S $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equi.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![状态值 \( v_{\pi}^{\prime}(s) \ge v_{\pi}(s) \kern0.75em s\ \mathit{\text{\EUR}}\
    S \)](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equi.png)'
- en: The values for all states under the new policy π^′ are going to be equal to
    or greater than the state values under previous policy *π*.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在新策略 π′ 下，所有状态的价值将等于或大于在先前策略 *π* 下的状态价值。
- en: Stated differently, while choosing a maximizing action in a specific state *S* = *s*
    improves the state value of that state, it cannot reduce the values of other states.
    It can either leave them unchanged or improve those other states that depend on
    *S* = *s*.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，在特定状态 *S* = *s* 中选择最大化动作可以提高该状态的状态值，但它不能降低其他状态的价值。它要么保持它们不变，要么提高依赖于 *S*
    = *s* 的其他状态。
- en: The previous maximizing step could be applied to all the states based on their
    current *q*-values. It can be seen as a greedy step since you are maximizing the
    state value of a particular state without considering anything else. Extending
    this greedy step action across all states in the MDP is known as a *greedy policy*.
    The recursive state value relationship is given by the Bellman’s optimality Equations
    [3-3](#Equ3) and [3-4](#Equ4).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 基于当前的状态 *q* 值，前一个最大化步骤可以应用于所有状态。这可以被视为一个贪婪步骤，因为你是在最大化特定状态的状态值，而不考虑其他任何因素。将这个贪婪步骤动作扩展到
    MDP 中的所有状态被称为 *贪婪策略*。递归状态值关系由贝尔曼最优方程 [3-3](#Equ3) 和 [3-4](#Equ4) 给出。
- en: 'You now have a framework to improve the policy. For a given MDP, you first
    do policy evaluation iteratively to obtain state values *v*(*s*), and then you
    apply the greedy selection of action by maximizing the *q* values as per Equation
    [3-7](#Equ6). This results in state values going out of sync with Bellman equations,
    as the maximization step is applied to each individual state without flowing it
    through all the successor states. Therefore, you again carry out the policy iteration
    under the new policy *π*^′ to find the state/action values under the improved
    policy. Once the values are obtained, the maximizing action from Equation [3-7](#Equ6)
    is applied again to further improve the policy to *π*^″. The cycle goes on until
    no further improvement is observed. This sequence of action can be depicted as
    follows:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你有一个框架来改进策略。对于一个给定的 MDP，你首先迭代地进行策略评估以获得状态值 *v*(*s*)，然后根据方程 [3-7](#Equ6) 通过最大化
    *q* 值来应用贪婪选择动作。这导致状态值与贝尔曼方程不同步，因为最大化步骤应用于每个单独的状态，而没有通过所有后续状态流动。因此，你再次在新的策略 *π*^′
    下进行策略迭代，以找到改进策略下的状态/动作值。一旦获得这些值，就再次应用方程 [3-7](#Equ6) 中的最大化动作，以进一步改进策略到 *π*^″。这个过程会一直进行，直到没有观察到进一步的改进。这个动作序列可以表示如下：
- en: '![$$ {\pi}_0\overset{evaluate}{\to }\ {v}_{\pi_0}\overset{improve}{\to }\ {\pi}_1\overset{evaluate}{\to
    }{v}_{\pi_1}\overset{improve}{\to }{\pi}_2\dots ..\overset{improve}{\to }\ {\pi}_{\ast}\overset{evaluate}{\to
    }{v}_{\ast } $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equj.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![π_0 评估 → v_π_0 改进 → π_1 评估 → v_π_1 改进 → π_2 ... 改进 → π_∗ 评估 → v_∗ ](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equj.png)'
- en: From the policy improvement theorem, you know that each swipe of greedy improvement
    and policy evaluation (![$$ {v}_{\pi}\overset{improve}{\to }\ {\pi}^{\prime}\overset{evaluate}{\to
    }{v}_{\pi}\Big) $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_IEq2.png))
    gives you a policy that is better than the previous one with ![$$ {v}_{\pi}^{\prime
    }(s)\ge {v}_{\pi }(s)\kern0.75em s\ \text{\EUR}\ S $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_IEq3.png).
    For an MDP that has a finite number of discrete states along with a finite number
    of actions in each state and with each swipe leading to an improvement, an optimal
    policy would be found once you stop observing any further improvement in state
    values. This is bound to happen within a finite number of cycles of improvement.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 从贪婪改进和策略评估的定理中，你知道每次贪婪改进和策略评估 (![$$ {v}_{\pi}\overset{improve}{\to }\ {\pi}^{\prime}\overset{evaluate}{\to
    }{v}_{\pi}\Big) $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_IEq2.png))
    都会给你一个比上一个更好的策略，其中 ![$$ {v}_{\pi}^{\prime }(s)\ge {v}_{\pi }(s)\kern0.75em s\
    \text{\EUR}\ S $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_IEq3.png)。对于一个具有有限数量的离散状态和每个状态有限数量的动作的
    MDP，以及每次改进都会导致改进的情况，一旦你停止观察到状态值的任何进一步改进，就会找到一个最优策略。这肯定会在有限次数的改进周期内发生。
- en: This approach to finding an optimal policy is called *policy iteration*. Figure
    [3-6](#Fig6) shows the pseudocode for policy iteration.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这种寻找最优策略的方法被称为 *策略迭代*。图 [3-6](#Fig6) 展示了策略迭代的伪代码。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig6_HTML.jpg)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig6_HTML.jpg)'
- en: An illustration of a policy iteration algorithm for finite M D P. The algorithm
    contains two steps, policy evaluation step and the policy improvement step.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有限 MDP 的策略迭代算法的示意图。该算法包含两个步骤，策略评估步骤和策略改进步骤。
- en: Figure 3-6
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-6
- en: Policy iteration algorithm for finite MDP
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 有限MDP的策略迭代算法
- en: Now apply the policy-iteration algorithm to the grid world from Figure [3-1](#Fig1).
    Listing [3-3](#PC3) shows the code for the policy iteration applied to the grid
    world. The complete code is given in `3-b-policy-iteration.ipynb`. The `policy_evaluation`
    function remains the same as Listing [3-2](#PC2). There is a new function, called
    `policy_improvement`, which applies greedy maximization to return a policy that
    improves upon the existing policy. `policy_iteration` is a function that runs
    `policy_evaluation` followed by `policy_improvement` in a loop until the state
    values stop increasing and converge to a fixed point.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将策略迭代算法应用于图[3-1](#Fig1)中的网格世界。列表[3-3](#PC3)显示了应用于网格世界的策略迭代的代码。完整的代码在`3-b-policy-iteration.ipynb`中给出。`policy_evaluation`函数与列表[3-2](#PC2)中的相同。有一个新函数，称为`policy_improvement`，它应用贪婪最大化以返回一个优于现有策略的策略。`policy_iteration`是一个函数，它循环运行`policy_evaluation`和`policy_improvement`，直到状态值停止增加并收敛到一个固定点。
- en: '[PRE2]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: In the policy improvement, you loop over all states and do greedy maximization
    for each state, as shown in the `for` loop `for s in range(env.nS)`. In a given
    state *s*, you first calculate the current state-action values `Q[s,a]` and pick
    the action *a* with maximum Q value. This action becomes the new policy in that
    given state. If there is more than one action with same maximum state value, all
    such actions are taken as a set of best actions in that state with equal probabilities.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在策略改进中，你遍历所有状态并对每个状态进行贪婪最大化，如`for s in range(env.nS)`中的`for`循环所示。在给定状态`s`中，你首先计算当前状态动作值`Q[s,a]`并选择具有最大Q值的动作`a`。这个动作成为该给定状态的新策略。如果有多个动作具有相同的最优状态值，则将这些动作视为该状态的最佳动作集合，并且具有相等的概率。
- en: The policy iteration step, as shown in Listing [3-4](#PC4), iterates over policy
    evaluation and policy improvement in a loop until the values converge and there
    is no further improvement observed.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 策略迭代步骤，如列表[3-4](#PC4)所示，循环遍历策略评估和策略改进，直到值收敛且没有观察到进一步的改进。
- en: '[PRE3]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Figure [3-7](#Fig7) shows the state values for each grid cell as a result of
    running `policy_iteration` on the grid world.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-7](#Fig7)显示了在网格世界中运行`policy_iteration`后每个网格单元的状态值。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig7_HTML.jpg)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig7_HTML.jpg)'
- en: An illustration of 4 by 4 grid. The opposite blocks of the grid have 0 values.
    The values from top to bottom are 0, - 1, - 2, - 3, - 1, - 2, - 3, - 2, - 2, -
    3, - 2, - 1, - 3, - 2, - 1, and 0.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 4x4网格的示意图。网格的对角块具有0值。从上到下的值是0, -1, -2, -3, -1, -2, -3, -2, -2, -3, -2, -1, -3,
    -2, -1, 和0。
- en: Figure 3-7
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-7
- en: Policy iteration *v*[∗](*s*) for the grid world from Figure [3-1](#Fig1). The
    agent is following an optimal policy as found by applying policy_iteration from
    Listing [3-4](#PC4)
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-1](#Fig1)中网格世界的策略迭代*v*[∗](*s*)。智能体正在遵循通过应用列表[3-4](#PC4)中的`policy_iteration`找到的最优策略。
- en: Note that the optimal state values are the number of steps required to reach
    the closest terminal state with a -ve sign. As the reward is -1 for each time
    step until the agent reaches the terminal state, the optimal policy would take
    the agent to the terminal state in the minimal number of possible steps multiplied
    with -1\. For some states, more than one action could lead to the same number
    of steps to reach the terminal state. For example, looking at the top-right state
    with the state value = -3, it takes three steps to reach the terminal state at
    the top left and also three steps to reach the terminal state at the bottom right.
    In other words, the state value is the negative of the Manhattan distance between
    the state and nearest terminal state.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，最优状态值是达到最近终端状态所需步数的数量。由于每个时间步的奖励是-1，直到智能体达到终端状态，因此最优策略将智能体引导到终端状态，步数尽可能少，乘以-1。对于某些状态，多个动作可能导致达到终端状态的步数相同。例如，查看状态值=-3的右上角状态，到达左上角的终端状态需要三步，到达右下角的终端状态也需要三步。换句话说，状态值是状态与最近终端状态之间的曼哈顿距离的相反数。
- en: You can also extract the optimal policy, as shown in Figure [3-8](#Fig8). The
    left side of the figure shows the policy as extracted from the code in Listing
    [3-4](#PC4), and the right side of the diagram shows the same policy graphically
    superimposed on the grid.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以提取最优策略，如图[3-8](#Fig8)所示。图的左侧显示了从列表[3-4](#PC4)中的代码提取的策略，图的右侧显示了将相同的策略图形化叠加在网格上的策略图。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig8_HTML.jpg)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![策略评估图](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig8_HTML.jpg)'
- en: 2 illustrations. Left. An illustration of optimal policy highlights the probability
    of action for each cell in the grid on the right. Right. An illustration of a
    4 by 4 grid with values ranging from - 3 to 0.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 2个插图。左。最优策略的插图，突出显示网格右侧每个单元格的动作概率。右。一个4x4网格的插图，值从-3到0。
- en: Figure 3-8
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-8
- en: 'Optimal state values v∗(s) for the grid world as shown in Figure [3-7](#Fig7).
    Left: optimal policy with probability of action for each cell in the grid. Right:
    grid superimposed with the optimal policy'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[3-7](#Fig7)所示的网格世界中的最优状态值v∗(s)。左：网格中每个单元格的动作概率的最优策略。右：最优策略叠加的网格
- en: As discussed earlier, policy evaluation is also known as *prediction,* as you
    are trying to find the state values consistent with the current policy of the
    agent. Similarly, using policy iteration to find an optimal policy is also known
    as *control*—to control the agent and find an optimal policy.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，策略评估也被称为*预测*，因为你正在尝试找到与智能体当前策略一致的状态值。同样，使用策略迭代来找到最优策略也被称为*控制*——控制智能体并找到最优策略。
- en: Value Iteration
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 值迭代
- en: This section looks at policy iteration and computes how many passes you need
    to find an optimal policy. Policy iteration has two steps. The first step is policy
    evaluation, which is run for the current policy. It requires multiple passes over
    the state space so that state values converge and become consistent with the current
    policy. The second part of the loop is policy improvement, which requires one
    pass over the state space to find the best action for each state—that is, greedy
    improvement with respect to the current state action values. From this, it is
    evident that a large part of the time is spent in policy evaluation and letting
    values converge.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了策略迭代并计算了找到最优策略所需的迭代次数。策略迭代有两个步骤。第一步是策略评估，它针对当前策略运行。它需要在状态空间中多次迭代，以便状态值收敛并符合当前策略。循环的第二部分是策略改进，它需要在状态空间中遍历一次，以找到每个状态的最佳动作——即相对于当前状态动作值的贪婪改进。由此可知，大部分时间都花在了策略评估和值收敛上。
- en: 'An alternative approach is to truncate the loop inside policy evaluation well
    before the state values have converged. When you truncate the loop inside policy
    evaluation to only one loop, you are using an approach known as *value iteration*.
    Similar to the approach of Equation [3-6](#Equ5), you take the Bellman optimality
    from Equation [3-3](#Equ3) for the state value and convert it into an assignment
    with iteration. The revised equation is as follows:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法是，在状态值收敛之前很久就截断策略评估中的循环。当你将策略评估中的循环截断为仅一个循环时，你使用的方法被称为*值迭代*。类似于方程[3-6](#Equ5)的方法，你从方程[3-3](#Equ3)中取状态值的贝尔曼最优性，并将其转换为带有迭代的赋值。修改后的方程如下：
- en: '![$$ {v}_{k+1}(s)\leftarrow \underset{a}{\max}\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_k\left({s}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ7.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![状态值更新公式](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ7.png)'
- en: (3-8)
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: (3-8)
- en: As you iterate, the state values will keep improving and will converge to v*,
    which are the optimal values.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 随着迭代的进行，状态值将不断改进并收敛到v*，这些是最佳值。
- en: '![$$ {v}_0\to {v}_1\to \dots {v}_k\to {v}_{k+1}\to \dots \to {v}_{\ast } $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equk.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![状态转移图](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equk.png)'
- en: Once the values converge to optimal state values, you can use a one-step backup
    diagram to find the optimal policy.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦值收敛到最优状态值，你可以使用一步回溯图来找到最优策略。
- en: '![$$ {\pi}_{\ast}\left(a\ |\ s\right)\underset{a}{= argmax}\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\ast}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ8.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![最优策略公式](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equ8.png)'
- en: (3-9)
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: (3-9)
- en: The previous procedure to iterate over values by taking a max at each step is
    known as *value iteration*. Figure [3-9](#Fig9) shows the pseudocode for value
    iteration.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在每一步取最大值来迭代值的先前的过程被称为*值迭代*。图[3-9](#Fig9)展示了值迭代的伪代码。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig9_HTML.jpg)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig9_HTML.jpg)'
- en: An illustration of a value iteration algorithm. It initializes state values
    v, makes a copy, and runs a loop until theta is greater than delta. The output
    of the algorithm illustrates a deterministic policy.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 值迭代算法的示意图。它初始化状态值 v，创建一个副本，并运行一个循环，直到 theta 大于 delta。算法的输出说明了确定性策略。
- en: Figure 3-9
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-9
- en: Value iteration algorithm for a finite MDP
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 有限 MDP 的值迭代算法
- en: You can now apply the previous value iteration algorithm to the grid world given
    in Figure [3-1](#Fig1). Listing [3-5](#PC5) contains the code for value iteration
    applied to the grid world. Check out the `3.c-value-iteration.ipynb` file for
    a detailed implementation. The `value_iteration` function is the straight implementation
    of the pseudocode in Figure [3-9](#Fig9).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在可以将之前的价值迭代算法应用于图 [3-1](#Fig1) 中给出的网格世界。列表 [3-5](#PC5) 包含了应用于网格世界价值迭代算法的代码。查看
    `3.c-value-iteration.ipynb` 文件以获取详细实现。`value_iteration` 函数是图 [3-9](#Fig9) 中伪代码的直接实现。
- en: '[PRE4]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The output of running the value algorithm against the grid world will produce
    the optimal state values *v*[∗](*s*) and optimal policy ![$$ {v}_{\uppi^{\ast
    }}\left(a|s\right) $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_IEq4.png)
    with the same values and policy, as shown in Figures [3-7](#Fig7) and [3-8](#Fig8).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 运行价值算法对网格世界进行操作将产生具有相同值和策略的最优状态值 *v*[∗](*s*) 和最优策略 ![$$ {v}_{\uppi^{\ast }}\left(a|s\right)
    $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_IEq4.png)，如图 [3-7](#Fig7)
    和 [3-8](#Fig8) 所示。
- en: Before moving forward, let’s summarize. What you have learned until now are
    classified as *synchronous dynamic programming algorithms*, as summarized in Table
    [3-1](#Tab1).
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续前进之前，让我们总结一下。到目前为止你所学的都被归类为 *同步动态规划算法*，如表 [3-1](#Tab1) 所总结。
- en: Table 3-1
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3-1
- en: Synchronous Dynamic Programming Algorithms
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 同步动态规划算法
- en: '| Algorithm | Bellman Equation | Type of Problem |'
  id: totrans-153
  prefs: []
  type: TYPE_TB
  zh: '| 算法 | 贝尔曼方程 | 问题类型 |'
- en: '| --- | --- | --- |'
  id: totrans-154
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Iterative policy evaluation | Expectation equations | Prediction |'
  id: totrans-155
  prefs: []
  type: TYPE_TB
  zh: '| 迭代策略评估 | 期望方程 | 预测 |'
- en: '| Policy iteration | Expectation equations and greedy improvement | Control
    |'
  id: totrans-156
  prefs: []
  type: TYPE_TB
  zh: '| 策略迭代 | 期望方程和贪婪改进 | 控制 |'
- en: '| Value iteration | Optimality equations | Control |'
  id: totrans-157
  prefs: []
  type: TYPE_TB
  zh: '| 值迭代 | 最优性方程 | 控制 |'
- en: Generalized Policy Iteration
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 广义策略迭代
- en: The policy iteration described earlier has two steps. The first step is *policy
    evaluation*, which gets the state values in sync with the current policy the agent
    is following. It requires multiple passes over all the states for state values
    to converge to *v*[π]. The second step is greedy action selection, which improves
    the policy. As explained, the second step of improvement results in the current
    state of values going out of sync with the new policy. Therefore, you have to
    carry out yet another round of policy evaluation to bring the state values back
    into sync with the new policy. The cycle of *evaluation* followed by *improvement*
    stops when there is no further change to the state values. This happens when the
    agent has reached an optimal policy, when the state values are optimal and in
    sync with the optimal policy. The convergence to the optimal policy (fixed point)
    *v*[*π*] can be depicted visually, as shown in Figure [3-10](#Fig10).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 之前描述的策略迭代有两个步骤。第一步是 *策略评估*，它使状态值与智能体当前遵循的策略同步。这需要多次遍历所有状态，使状态值收敛到 *v*[π]。第二步是贪婪动作选择，它改进策略。如前所述，改进的第二步会导致当前状态值与新的策略不同步。因此，你必须进行另一轮策略评估，以将状态值重新同步到新的策略。当状态值不再发生变化时，*评估*
    后续 *改进* 的循环停止。这发生在智能体达到最优策略时，当状态值是最优的并且与最优策略同步时。最优策略（固定点）*v*[*π*] 的收敛可以直观地表示，如图
    [3-10](#Fig10) 所示。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig10_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig10_HTML.jpg)'
- en: An illustration of iteration between two steps. A line gets reflected infinitely
    between two fixed planes labeled pie = greedy and v = v pie. The first step is
    used to evaluate the state values in sync, followed by improving the policy.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 两个步骤之间的迭代示意图。一条线在标记为 pie = 贪婪和 v = v pie 的两个固定平面之间无限反射。第一步用于评估状态值同步，随后改进策略。
- en: Figure 3-10
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-10
- en: Iteration between the two steps. The first step is evaluating to get the state
    values in sync with the policy being followed. The second step is improving the
    policy to do a greedy maximization for actions
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在两个步骤之间进行迭代。第一步是评估以使状态值与遵循的策略同步。第二步是改进策略以进行贪婪最大化动作。
- en: You have seen two extremes for the number of loops to iterate inside the policy
    evaluation step. Also, every iteration, be it policy evaluation or policy improvement,
    covered all the states in the model. But there can be many variations.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经看到了策略评估步骤中循环次数的两个极端。此外，无论是策略评估还是策略改进，每次迭代都会覆盖模型中的所有状态。但可能会有很多变化。
- en: First, even within a single iteration of *evaluation + improvement*, you can
    visit only a partial set of states to evaluate as well as a partial set of the
    state-actions in a given state to improve with greedy maximization. The *policy
    improvement theorem* guarantees that even partial coverage of the states or partial
    coverage of state-action maximization will lead to an improvement unless the agent
    is already following an optimal policy.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，即使在单个 *评估 + 改进* 迭代中，你也只能访问部分状态进行评估，以及给定状态中部分状态动作进行贪婪最大化改进。*策略改进定理* 保证，即使是对状态或状态动作最大化的部分覆盖也将导致改进，除非代理已经遵循最优策略。
- en: Secondly, you do not have to carry out the evaluation step over multiple iterations
    until the state values converge. You could stop early. The state value sync does
    not need to be complete. It may terminate midway.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，你不必在状态值收敛之前进行多次迭代评估。你可以提前停止。状态值同步不需要完全完成。它可能在中途终止。
- en: All of this results in the arrows in Figure [3-10](#Fig10) stopping short of
    touching the bottom line of *v* = *v*[π]. The arrow diagram in this scenario is
    shown in Figure [3-11](#Fig11).
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些导致图 [3-10](#Fig10) 中的箭头在触及 *v* = *v*[π] 的底部线之前停止。此场景的箭头图如图 [3-11](#Fig11)
    所示。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig11_HTML.jpg)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig11_HTML.jpg)'
- en: An illustration of an iteration that is just enough to cover all the states.
    A line gets reflected infinitely between two fixed planes labeled pie = greedy
    and v = v pie. The first step is used to evaluate the state values in sync, followed
    by improving the policy. The line touches the top of the plane.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 一个迭代示例，刚好覆盖所有状态。一条线在标记为 pie = greedy 和 v = v pie 的两个固定平面之间无限反射。第一步用于同步评估状态值，随后改进策略。线条触及平面的顶部。
- en: Figure 3-11
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-11
- en: Iterating just enough to cover all the states in a single iteration leads to
    not touching the bottom line *v* = *v*[*π*]
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 仅在单次迭代中覆盖所有状态，导致没有触及 *v* = *v*[π] 的底部线。
- en: Similarly, the step of policy improvement may not carry out improvement for
    all the states, which this time leads to arrows in Figure [3-10](#Fig10) stopping
    short of the upper line of π = *greedy*(*v*). Figure [3-12](#Fig12) shows the
    arrow diagram for such a case.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，策略改进的步骤可能不会对所有状态进行改进，这导致图 [3-10](#Fig10) 中的箭头在 π = *greedy*(*v*) 的上限处停止。图
    [3-12](#Fig12) 展示了这种情况的箭头图。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig12_HTML.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig12_HTML.jpg)'
- en: An illustration of an iteration during the policy improvement step. A line gets
    reflected infinitely between two fixed planes labeled pie = greedy and v = v pie.
    The first step is used to evaluate the state values in sync, followed by improving
    the policy. The line touches the bottom of the plane.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 政策改进步骤中的迭代示例。一条线在标记为 pie = greedy 和 v = v pie 的两个固定平面之间无限反射。第一步用于评估状态值以同步，随后改进策略。线条触及平面的底部。
- en: Figure 3-12
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-12
- en: Iterating when the policy improvement step is not carried out over all the states,
    leading to not touching the top line *π* = *greedy*(*v*)
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 当策略改进步骤没有覆盖所有状态时进行迭代，导致没有触及 *π* = *greedy*(*v*) 的顶部线。
- en: In summary, these two steps of policy evaluation and policy improvement—with
    all their variations—lead to convergence as long as each state is visited enough
    times in both evaluation and improvement. This is known as *generalized policy
    iteration* (GPI). Most of the algorithms that you will study in this book can
    be classified as some form of GPI. When you go through the various algorithms,
    keep in mind the images shown in Figures [3-10](#Fig10) through [3-12](#Fig12).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，只要在每个评估和改进中每个状态被访问足够多次，这两个步骤——策略评估和策略改进——及其所有变体都会导致收敛。这被称为 *广义策略迭代*（GPI）。本书中你将学习的绝大多数算法都可以归类为某种形式的GPI。当你研究各种算法时，请记住图
    [3-10](#Fig10) 到 [3-12](#Fig12) 中所示的形象。
- en: '![](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig13_HTML.jpg)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_3_Chapter/502835_2_En_3_Fig13_HTML.jpg)'
- en: An illustration of 2 blocks are labeled v and pie. They are interconnected through
    evaluation and improvement vectors. The evaluation equation is v = v pie s. The
    improvement equation is pie = greed V.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 两个块被标记为 v 和 pie。它们通过评估和改进向量相互连接。评估方程是 v = v pie s。改进方程是 pie = greed V。
- en: Figure 3-13
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-13
- en: Iteration between the two steps. The first step is evaluation to get state values
    in sync with the policy being followed. The second step is that of policy improvement
    to do a greedy maximization for actions
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 两个步骤之间的迭代。第一步是评估，以获取与遵循的策略同步的状态值。第二步是策略改进，进行贪婪最大化行为
- en: Asynchronous Backups
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 异步回溯
- en: Dynamic programming–based algorithms have scalability issues. The dynamic programming
    approach is much better and more scalable than direct solution methods such as
    linear programing, which involve solving a matrix equation. However, dynamic programming
    still does not scale well with real-life problems. Consider a single sweep under
    policy iteration. It requires a visit to each state, and under each state, you
    need to consider all the possible actions. Further, each action involves a calculation
    that may theoretically involve all the states again, depending on the state transition
    function *p*(*s*^′, *r*| *s*, *a*). In other words, every iteration has a complexity
    of *O*(|*A*| ∗ |*S*|²), one |*S*| for covering each state and |*A*| for visiting
    each action in a given state, taking the computation to *O*(|*A*| ∗ |*S*|). Then
    one more |*S*| is added due to the backup equation, where for a given state and
    one specific action in that state, you need to visit all possible states the system
    may transition to as a result of the action, taking the overall complexity to
    *O*(|*A*| ∗ |*S*|²).
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 基于动态规划的算法存在可扩展性问题。动态规划方法比直接解决方案方法（如线性规划，涉及解矩阵方程）更好且更可扩展。然而，动态规划在现实问题中仍然无法很好地扩展。考虑策略迭代下的单次遍历。它需要访问每个状态，并且在每个状态下，你需要考虑所有可能的行为。此外，每个行为都涉及一个计算，理论上可能再次涉及所有状态，这取决于状态转移函数
    *p*(*s*^′, *r*| *s*, *a*）。换句话说，每次迭代的复杂度为 *O*(|*A*| ∗ |*S*|²)，其中 |*S*| 用于覆盖每个状态，|*A*|
    用于访问给定状态中的每个行为，将计算复杂度提升到 *O*(|*A*| ∗ |*S*|)。然后由于回溯方程，再增加一个 |*S*|，对于给定状态和该状态中的一个特定行为，你需要访问系统可能因该行为而转换到的所有可能状态，从而使整体复杂度达到
    *O*(|*A*| ∗ |*S*|²)。
- en: You started with policy iteration under which you carried out multiple iterations
    as part of evaluation step for the state values to converge. The second control
    method was value iteration. You then reduced the evaluation iterations to only
    one step by leveraging Bellman optimality equations. All these were synchronous
    dynamic programming algorithms under which all states are updated using Bellmen
    backup Equations [3-1](#Equ1) to [3-4](#Equ4).
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 你从策略迭代开始，在评估步骤中进行多次迭代，以使状态值收敛。第二种控制方法是值迭代。然后你通过利用贝尔曼最优方程将评估迭代减少到只有一步。所有这些都是同步动态规划算法，其中所有状态都使用贝尔曼回溯方程
    [3-1](#Equ1) 到 [3-4](#Equ4) 进行更新。
- en: However, there is no need to update each state in every iteration. You could
    update and/or optimize in any order covering only partial parts of the total states
    in the system. All such methods to sweep over states yield optimal state values
    and optimal policies as long as each state is visited often enough. There are
    various approaches to making a sweep, as shown in Table [3-2](#Tab2).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，没有必要在每次迭代中更新每个状态。你可以按任何顺序更新和/或优化，只覆盖系统中的部分总状态。所有这些遍历状态的方法都能产生最优状态值和最优策略，只要每个状态被访问足够频繁。如图
    [3-2](#Tab2) 所示，有各种方法进行遍历。
- en: Table 3-2
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3-2
- en: Flavors of Dynamic Programming Sweeps
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 动态规划遍历的变种
- en: '| Approach | Pros | Cons |'
  id: totrans-188
  prefs: []
  type: TYPE_TB
  zh: '| 方法 | 优点 | 缺点 |'
- en: '| --- | --- | --- |'
  id: totrans-189
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Dynamic Programming | Scales better than linear programming | Requires multiple
    passes for convergence |'
  id: totrans-190
  prefs: []
  type: TYPE_TB
  zh: '| 动态规划 | 比线性规划可扩展性更好 | 需要多次迭代才能收敛 |'
- en: '| In-Place Dynamic Programming | Lower memory footprint | Same scaling issues
    as DP |'
  id: totrans-191
  prefs: []
  type: TYPE_TB
  zh: '| 就地动态规划 | 内存占用更低 | 与DP相同的缩放问题 |'
- en: '| Dynamic Programming with Prioritized Sweeping | Faster convergence | Some
    states may take longer to converge due to infrequent updates |'
  id: totrans-192
  prefs: []
  type: TYPE_TB
  zh: '| 带优先级扫描的动态规划 | 收敛更快 | 由于更新频率较低，某些状态可能需要更长的时间才能收敛 |'
- en: '| Real-time Dynamic Programming | Most scalable | Offers only asymptotic convergence
    if each state is updated enough times (infinite in asymptotic limit) |'
  id: totrans-193
  prefs: []
  type: TYPE_TB
  zh: '| 实时动态规划 | 最具可扩展性 | 如果每个状态更新足够多次（在渐近极限中为无限次），则仅提供渐近收敛 |'
- en: The first one is *in-place dynamic programming*. Up until now, you have maintained
    two copies of the states. The first copy holds the existing state values, and
    the second copy holds the new state values after the update. An *in-place* strategy
    uses only a copy of the state value array. The same array is used for reading
    old and updating new state values. As an example, let’s look at the value iteration
    in Equation [3-8](#Equ7) and rewrite the version for an in-place update. Note
    the subtle difference in the subindices on state values on the right and left
    sides of original value iteration equation, as compared to those in-place versions.
    The original version uses the array *V*[*k*] to update a new array *V*[*k* + 1],
    while the in-place edit updates the same array.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个方法是 *就地动态规划*。到目前为止，你一直维护着状态的两个副本。第一个副本包含现有的状态值，第二个副本包含更新后的新状态值。*就地*策略仅使用状态值数组的副本。相同的数组用于读取旧值和更新新状态值。例如，让我们看看方程
    [3-8](#Equ7) 中的值迭代，并重写就地更新的版本。注意与就地版本相比，在原始值迭代方程的左右两侧状态值上的子索引的微妙差异。原始版本使用数组 *V*[*k*]
    来更新新的数组 *V*[*k* + 1]，而就地编辑更新的是相同的数组。
- en: 'Here is the original update Equation [3-8](#Equ7):'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是原始更新方程 [3-8](#Equ7)：
- en: '![$$ {v}_{k+1}(s)\leftarrow \underset{a}{\max}\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_k\left({s}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equl.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{k+1}(s)\leftarrow \underset{a}{\max}\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_k\left({s}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equl.png)'
- en: The in-place version of the same is shown here. It’s same array of *v*(*s*)
    on both sides of the arrow.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 这里展示了相同操作的就地版本。箭头两边的 *v*(*s*) 数组是相同的。
- en: '![$$ v(s)\leftarrow \underset{a}{\max}\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ v\left({s}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equm.png)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![$$ v(s)\leftarrow \underset{a}{\max}\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ v\left({s}^{\prime}\right)\right] $$](../images/502835_2_En_3_Chapter/502835_2_En_3_Chapter_TeX_Equm.png)'
- en: Experiments have shown that in-place edits offer faster convergence as the values
    move up even midway of an iteration.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 实验表明，就地编辑在值在迭代中途移动时提供了更快的收敛。
- en: The second idea revolves around the order in which states should be updated.
    In synchronous programing, you update all the states in a single iteration. However,
    values may converge faster if you use *prioritized sweeping*. Prioritized sweeping
    requires knowledge of the predecessors of a state. Suppose you have just updated
    a state *S* = *s* and the value changed by an amount Δ. All the predecessor states
    of state *S* = *s* are added to a priority queue with a priority of Δ. If a specific
    predecessor state is already there in the priority queue with a priority more
    than Δ, it is left untouched. In the next iteration, a new state with the highest
    priority is taken out of the queue and updated, taking you back to the beginning
    of the loop. The strategy of priority sweeping *requires knowledge of reverse
    dynamics*—that is, the predecessors of a given state.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个想法是关于状态更新的顺序。在同步编程中，你会在单次迭代中更新所有状态。然而，如果你使用 *优先级扫描*，值可能会更快地收敛。优先级扫描需要了解状态的前驱。假设你刚刚更新了状态
    *S* = *s*，并且值改变了Δ量。所有状态 *S* = *s* 的前驱状态都会以Δ为优先级添加到优先队列中。如果特定前驱状态已经在优先队列中，并且优先级高于Δ，则保持不变。在下一次迭代中，从队列中取出具有最高优先级的新状态并更新，这将你带回到循环的开始。优先级扫描的策略
    *需要了解反向动力学*——即给定状态的前驱。
- en: The third idea is *real-time dynamic programming*. With this approach, you only
    update the value of the states that the agent has currently seen—that is, the
    states that are relevant to the agent and use its current path of exploration
    to prioritize the updates. The approach avoids wasteful updates to the states
    that are not on the horizon of the agent’s current path and hence mostly irrelevant.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个想法是**实时动态规划**。使用这种方法，你只更新智能体当前已看到的那些状态的价值——即与智能体相关的状态，并使用其当前的探索路径来优先更新。这种方法避免了更新那些不在智能体当前路径前景中的状态，因此这些状态大多是不相关的。
- en: Dynamic programming, both synchronous and asynchronous, uses full-width backups
    like the one shown in Figure [3-3](#Fig3). For a given state, you need to know
    every action possible and every successor state *S* = *s*^′. You also need to
    know the environment dynamics *p*(*s*^′, *r*| *s*, *a*). However, using an asynchronous
    approach does not completely solve the scalability issue. It only extends the
    scalability a bit. In other words, dynamic programming is feasible only for midsize
    problems even with asynchronous updates.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 动态规划，无论是同步还是异步，都使用类似于图[3-3](#Fig3)中所示的全范围回溯。对于给定状态，你需要知道每个可能的行为以及每个后继状态 *S* = *s*^′。你还需要知道环境动态
    *p*(*s*^′, *r*| *s*, *a*)。然而，使用异步方法并不能完全解决可扩展性问题。它只是稍微扩展了可扩展性。换句话说，即使使用异步更新，动态规划也仅适用于中等规模的问题。
- en: The big assumption that breaks down for most of the real-life problems is that
    of having prior knowledge of the transition function or environment dynamics *p*(*s*^′,
    *r*| *s*, *a*). This chapter assumed knowledge of dynamics to introduce Bellman
    equations and the core foundation of how dynamic programming is used for solving
    problems in RL. Starting with the next chapter, I explain a more scalable approach
    to solving reinforcement learning problems using sample-based methods. Under sample-based
    methods, you drop the assumption of prior and complete knowledge of the environment
    dynamics. Also, to build scalability, you’ll find efficient ways to avoid carrying
    out full-width sweeps.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数现实生活中的问题，一个重要的假设是拥有对转换函数或环境动态 *p*(*s*^′, *r*| *s*, *a*) 的先验知识。本章假设了解动态特性，以介绍贝尔曼方程和动态规划在强化学习问题中解决问题的核心基础。从下一章开始，我将解释一种更可扩展的基于样本方法的强化学习问题解决方案。在基于样本的方法中，你将放弃对环境和动态的先验和完全知识的假设。此外，为了构建可扩展性，你将找到有效的方法来避免执行全范围扫描。
- en: Summary
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter introduced the concept of dynamics programming and explained how
    it is applied to the field of reinforcement learning. In order to facilitate this
    discussion, I made an assumption of knowing the dynamics of the system *p*(*s*^′,
    *r*| *s*, *a*). The chapter first looked at policy evaluation for prediction—that
    is, to calculate the state values for a given policy. Next, the chapter looked
    at policy iteration for control—that is, to find a better policy than the current
    one if the current policy is not already optimal. This was followed by exploring
    the concept of value iteration, which was obtained by combining evaluation and
    improvement into a single equation.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了动态规划的概念，并解释了它是如何应用于强化学习领域的。为了便于讨论，我假设已知系统的动态 *p*(*s*^′, *r*| *s*, *a*)。本章首先探讨了策略评估，即计算给定策略的状态值。接下来，本章探讨了策略迭代，即如果当前策略不是最优的，则寻找比当前策略更好的策略。随后，本章探讨了值迭代的理念，这是通过将评估和改进合并为一个单一方程获得的。
- en: These approaches then led to the topic of generalized policy iteration. You
    looked at the convergence path that generalized policy iteration follows. Throughout
    the chapter, I used a running example of grid world, which had a 4x4 grid with
    simple dynamics. Finally, the chapter covered various shortcuts you can take to
    speed up the algorithms under the topic of asynchronous dynamic programming.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 这些方法进而引出了广义策略迭代的话题。你研究了广义策略迭代遵循的收敛路径。在整个章节中，我使用了一个运行示例——网格世界，它有一个4x4的网格和简单的动态特性。最后，本章涵盖了在异步动态规划主题下可以采取的各种捷径，以加快算法的执行速度。
