- en: 2. GPU Architectures, Optimizations, and Deployment
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. GPU 架构、优化和部署
- en: 2.1 Deep Learning Frameworks
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1 深度学习框架
- en: 2.1.1 What Is a Deep Learning Framework?
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.1 什么是深度学习框架？
- en: Imagine that you want to teach a robot to recognize cats in photos. You could
    write all the instructions from scratch, but that would take forever and be super
    complicated. That’s where deep learning frameworks come in.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你想要教一个机器人识别照片中的猫。你可以从头开始编写所有指令，但这会花费很长时间，并且非常复杂。这就是深度学习框架发挥作用的地方。
- en: Deep learning frameworks are like toolkits that help you build intelligent machines
    without starting from zero. They give you premade building blocks, like LEGO pieces,
    so that you can design, train, and improve AI systems more easily.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习框架就像工具包，帮助你构建智能机器而不需要从头开始。它们为你提供了预制构建块，就像乐高积木，这样你可以更轻松地设计、训练和改进 AI 系统。
- en: A deep learning framework is a software package designed to help researchers
    and data scientists build, train, and evaluate deep learning models. These frameworks
    simplify the process of training models by abstracting the underlying algorithms
    used in deep learning, neural networks, and machine learning. The various frameworks
    are given in Figure [2.1](#Fig1).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习框架是一个旨在帮助研究人员和数据科学家构建、训练和评估深度学习模型的软件包。这些框架通过抽象化深度学习、神经网络和机器学习所使用的底层算法，简化了训练模型的过程。各种框架在图
    [2.1](#Fig1) 中给出。
- en: Through a high-level programming interface, deep learning frameworks provide
    essential building blocks, such as layers, activation, loss functions, and optimization
    techniques. This allows users to focus on designing models and conducting experiments
    without worrying about the low-level mathematical and computational details.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 通过高级编程接口，深度学习框架提供了必要的构建块，如层、激活函数、损失函数和优化技术。这使得用户可以专注于设计模型和进行实验，而无需担心底层数学和计算细节。
- en: '![Mind map illustrating a "Deep Learning Framework" at the center, connected
    to six nodes: "Neural Networks," "Layers," "Optimization Techniques," "High-Level
    Interface," "GPU Acceleration (cuDNN, NCCL)," and "Popular (TensorFlow, PyTorch,
    MXNet)." Each node represents a component or feature related to deep learning
    frameworks.](../images/641715_1_En_2_Chapter/641715_1_En_2_Fig1_HTML.jpg)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![思维导图展示了中心位置的“深度学习框架”，连接到六个节点：“神经网络”、“层”、“优化技术”、“高级接口”、“GPU 加速（cuDNN、NCCL）”和“流行（TensorFlow、PyTorch、MXNet）”。每个节点代表与深度学习框架相关的组件或特性。](../images/641715_1_En_2_Chapter/641715_1_En_2_Fig1_HTML.jpg)'
- en: Fig. 2.1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.1
- en: 'A figure illustrating components of a deep learning framework. Central node
    labeled “Deep Learning Framework” connects to five nodes: “Neural Networks,” “Layers,”
    “Optimization Techniques,” “High-Level Interface,” and “GPU Acceleration (cuDNN,
    NCCL).” Another node labeled “Popular (TensorFlow, PyTorch, MXNet)” is also connected.
    Each node is color-coded, highlighting different aspects of the framework'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅展示深度学习框架组件的图。中心节点标记为“深度学习框架”，连接到五个节点：“神经网络”、“层”、“优化技术”、“高级接口”和“GPU 加速（cuDNN、NCCL）”。还有一个标记为“流行（TensorFlow、PyTorch、MXNet）”的节点也连接到中心节点。每个节点都有不同的颜色编码，突出框架的不同方面。
- en: '![Text in a black header reads "Deep Learning Framework." Below, italicized
    text describes it as a software library that provides tools and interfaces to
    design, train, and deploy deep neural networks efficiently, often with support
    for GPU acceleration.](../images/641715_1_En_2_Chapter/641715_1_En_2_Figaaa_HTML.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![黑色标题中的文字为“深度学习框架。”下方为斜体文字，描述它为一个提供工具和接口的软件库，用于高效地设计、训练和部署深度神经网络，通常支持 GPU
    加速。](../images/641715_1_En_2_Chapter/641715_1_En_2_Figaaa_HTML.png)'
- en: Popular deep learning frameworks like `PyTorch`, `TensorFlow`, `MXNet`, and
    others are optimized to work with GPU-accelerated libraries such as `cuDNN` and
    `NCCL`, enabling high-performance multi-GPU training and speeding up model training
    and inference.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 流行的深度学习框架，如 `PyTorch`、`TensorFlow`、`MXNet` 等，针对与 GPU 加速库（如 `cuDNN` 和 `NCCL`）一起工作进行了优化，使得高性能的多
    GPU 训练成为可能，并加快了模型训练和推理的速度。
- en: 2.1.2 Why Use a Deep Learning Framework?
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.2 为什么使用深度学习框架？
- en: 'There are several advantages to using deep learning frameworks:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 使用深度学习框架有以下几个优点：
- en: Instead of coding every detail yourself, you use ready-made components that
    accelerate development and reduce errors.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不必自己编写每个细节，而是使用现成的组件来加速开发并减少错误。
- en: These frameworks are capable of handling large amounts of data and performing
    complex tasks such as speech recognition, image analysis, and language translation
    with high performance.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些框架能够处理大量数据，并以高性能执行复杂任务，如语音识别、图像分析和语言翻译。
- en: Whether you are a beginner or a seasoned expert, these frameworks support a
    wide range of applications, from simple prototypes to cutting-edge AI systems.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无论您是初学者还是有经验的专家，这些框架都支持广泛的应用，从简单的原型到前沿的AI系统。
- en: They provide prebuilt libraries for defining network layers, types (such as
    CNNs and RNNs), and common model architectures.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们提供了用于定义网络层、类型（如CNN和RNN）和常见模型架构的预构建库。
- en: These frameworks support a wide range of applications, including computer vision,
    speech processing, and natural language processing.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些框架支持广泛的应用，包括计算机视觉、语音处理和自然语言处理。
- en: They offer familiar interfaces through popular programming languages such as
    Python, C, C++, and Scala, making them accessible to a broad audience.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们通过Python、C、C++和Scala等流行编程语言提供熟悉的接口，使它们对广大用户群体可访问。
- en: Many frameworks are optimized with NVIDIA deep learning libraries such as `cuDNN`,
    `NCCL`, and `cuBLAS`, ensuring efficient GPU-accelerated deep learning training.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 许多框架通过NVIDIA深度学习库（如`cuDNN`、`NCCL`和`cuBLAS`）进行了优化，确保高效的GPU加速深度学习训练。
- en: 2.1.3 Popular Frameworks
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.3.3 流行框架
- en: 2.1.3.1 TensorFlow
  id: totrans-22
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.1.3.1 TensorFlow
- en: Developed by Google, TensorFlow is known for its scalability, production-ready
    capabilities, and support for both high-level and low-level APIs. It excels in
    mobile and embedded device deployment. Figure [2.2](#Fig2) gives the overview
    of TensorFlow architecture.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 由Google开发的TensorFlow以其可扩展性、生产就绪能力和对高级和低级API的支持而闻名。它在移动和嵌入式设备部署方面表现出色。图[2.2](#Fig2)给出了TensorFlow架构的概述。
- en: Steps to Use TensorFlow
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TensorFlow的步骤
- en: '**Install TensorFlow:** Use `pip install tensorflow` in your terminal or command
    prompt to install the latest version of TensorFlow.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**安装TensorFlow**：在您的终端或命令提示符中使用`pip install tensorflow`安装TensorFlow的最新版本。'
- en: '**Import the Library:** In your Python script or notebook, add `import tensorflow
    as tf` to start using TensorFlow.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**导入库**：在您的Python脚本或笔记本中添加`import tensorflow as tf`以开始使用TensorFlow。'
- en: '**Prepare the Data:** Load and preprocess your dataset. TensorFlow supports
    NumPy arrays, Pandas DataFrames, and built-in datasets via `tf.data` and `tf.keras.datasets`.'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**准备数据**：加载并预处理您的数据集。TensorFlow支持NumPy数组、Pandas DataFrames以及通过`tf.data`和`tf.keras.datasets`提供的内置数据集。'
- en: '**Build the Model:** Use the high-level Keras API (`tf.keras`) to define a
    neural network architecture with layers like `Dense`, `Conv2D`, or `LSTM`.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**构建模型**：使用高级Keras API (`tf.keras`) 定义一个具有`Dense`、`Conv2D`或`LSTM`等层的神经网络架构。'
- en: '**Compile the Model:** Specify the loss function, optimizer, and evaluation
    metrics using the `model.compile()` method.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**编译模型**：使用`model.compile()`方法指定损失函数、优化器和评估指标。'
- en: '**Train the Model:** Fit the model to your training data using `model.fit()`,
    and monitor performance over multiple epochs.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**训练模型**：使用`model.fit()`将模型拟合到您的训练数据，并在多个epoch上监控性能。'
- en: '**Evaluate and Predict:** Use `model.evaluate()` to test on new data and `model.predict()`
    to make predictions.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**评估和预测**：使用`model.evaluate()`在新数据上测试，并使用`model.predict()`进行预测。'
- en: '**Save and Deploy:** Save your model using `model.save()` and deploy it on
    mobile, embedded, or cloud platforms as needed.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**保存和部署**：使用`model.save()`保存您的模型，并根据需要将其部署到移动、嵌入式或云平台。'
- en: '![Flow chart illustrating the architecture of a system. The top box is labeled
    "Client (Python API)" and points to "TensorFlow Core," which includes "computation
    graph, operations, tensors." This connects to "Distributed Execution Engine,"
    leading to "Hardware Abstraction Layer," which interfaces with "CPU, GPU, TPU."](../images/641715_1_En_2_Chapter/641715_1_En_2_Fig2_HTML.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![说明系统架构的流程图。顶部框标记为“客户端（Python API）”并指向“TensorFlow核心”，其中包含“计算图、操作、张量”。这连接到“分布式执行引擎”，进而连接到“硬件抽象层”，该层与“CPU、GPU、TPU”接口](../images/641715_1_En_2_Chapter/641715_1_En_2_Fig2_HTML.jpg)'
- en: Fig. 2.2
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.2
- en: A TensorFlow architecture is given which mentions various layers as client,
    core, execution engine, abstraction layer. Abstraction layers consist of three
    parts as CPU, GPU and TPU
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 给出的TensorFlow架构中提到了客户端、核心、执行引擎和抽象层等各个层。抽象层由CPU、GPU和TPU三个部分组成。
- en: 2.1.3.2 PyTorch
  id: totrans-36
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.1.3.2 PyTorch
- en: PyTorch is an open source deep learning framework developed by Facebook’s AI
    Research lab. It is known for its dynamic computation graph, which allows the
    network structure to be built at runtime. This flexibility enables developers
    to make changes on the fly and inspect their models more intuitively. As a result,
    PyTorch is particularly appealing for research and experimentation, as it simplifies
    the process of testing and debugging. With a syntax that is both natural and closely
    aligned with standard Python programming, PyTorch offers an easy learning curve
    and high flexibility, making it a favorite among academics and developers alike.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch 是由 Facebook 的人工智能研究实验室开发的开源深度学习框架。它以其动态计算图而闻名，允许在运行时构建网络结构。这种灵活性使得开发者能够即时进行更改并更直观地检查他们的模型。因此，PyTorch
    特别适合研究和实验，因为它简化了测试和调试的过程。PyTorch 提供了一种既自然又与标准 Python 编程紧密对齐的语法，具有易于学习和高度灵活的特点，因此在学术界和开发者中都非常受欢迎。
- en: Steps to Use PyTorch
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 PyTorch 的步骤
- en: '**Install PyTorch:** Visit [https://​pytorch.​org/​get-started/​locally/​](https://pytorch.org/get-started/locally/)
    and follow the instructions to install PyTorch using pip or conda, depending on
    your system and CUDA support.'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**安装 PyTorch：** 访问 [https://pytorch.org/get-started/locally/](https://pytorch.org/get-started/locally/)
    并根据您的系统和 CUDA 支持情况，遵循说明使用 pip 或 conda 安装 PyTorch。'
- en: '**Import PyTorch:** Use `import torch` to access PyTorch functionalities in
    your Python script or notebook.'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**导入 PyTorch：** 使用 `import torch` 在您的 Python 脚本或笔记本中访问 PyTorch 功能。'
- en: '**Create Tensors:** Tensors are the core data structure in PyTorch. Use `torch.tensor()`,
    `torch.zeros()`, `torch.ones()`, etc., to create tensors.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建张量：** 张量是 PyTorch 中的核心数据结构。使用 `torch.tensor()`、`torch.zeros()`、`torch.ones()`
    等，来创建张量。'
- en: '**Perform Operations:** PyTorch supports a wide range of tensor operations
    such as addition, multiplication, reshaping, and more.'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**执行操作：** PyTorch 支持广泛的张量操作，例如加法、乘法、重塑等。'
- en: '**Define a Model:** Use **torch.nn.Module** to define neural network models.
    Create a class that inherits from **nn.Module** and define layers in **__init__**
    and forward pass in **forward()**.'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义模型：** 使用 **torch.nn.Module** 来定义神经网络模型。创建一个继承自 **nn.Module** 的类，并在 **__init__**
    中定义层，在 **forward()** 中定义前向传递。'
- en: '**Set Loss Function and Optimizer:** Choose a loss function (e.g., **nn.Cross**
    **EntropyLoss**) and an optimizer (e.g., **torch.optim.SGD**) to train your model.'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设置损失函数和优化器：** 选择一个损失函数（例如，**nn.CrossEntropyLoss**）和一个优化器（例如，**torch.optim.SGD**）来训练你的模型。'
- en: '**Train the Model:** Loop through epochs, feed data to the model, compute loss,
    backpropagate using **loss.backward()**, and update weights using `optimizer.step()`.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**训练模型：** 通过循环遍历时代，将数据输入到模型中，计算损失，使用 **loss.backward()** 进行反向传播，并使用 `optimizer.step()`
    更新权重。'
- en: '**Evaluate the Model:** Use validation/test data to evaluate model performance.
    Disable gradient computation using **torch.no_grad()** during evaluation.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**评估模型：** 使用验证/测试数据来评估模型性能。在评估期间使用 **torch.no_grad()** 禁用梯度计算。'
- en: '**Save and Load Model:** Use **torch.save()** to save and **torch.load()**
    to load models.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**保存和加载模型：** 使用 **torch.save()** 保存模型，使用 **torch.load()** 加载模型。'
- en: 2.1.3.3 JAX
  id: totrans-48
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.1.3.3 JAX
- en: JAX is a high-performance numerical computing library developed by Google, designed
    to seamlessly combine the flexibility of Python and NumPy with the power of automatic
    differentiation and hardware acceleration. At its core, JAX extends NumPy by offering
    a familiar API through **jax.numpy**, allowing users to write code that looks
    and feels like standard NumPy but with added capabilities. One of its standout
    features is automatic differentiation, which enables gradient computation for
    arbitrary Python functions using tools like **grad** and **jacrev**, making it
    ideal for machine learning and scientific computing. JAX also leverages XLA (accelerated
    linear algebra) to compile and optimize code for execution on CPUs, GPUs, and
    TPUs, significantly boosting performance. Through decorators like **@jit**, users
    can apply just-in-time compilation to speed up functions, while **vmap** and **pmap**
    provide powerful mechanisms for vectorization and parallelism across devices.
    JAX promotes a functional programming style, emphasizing immutability and pure
    functions, which aligns well with modern ML frameworks such as Flax and Haiku.
    Its growing popularity in research and development stems from its ability to scale
    efficiently, support complex models, and integrate seamlessly with cutting-edge
    hardware, making it a preferred choice for many in the machine learning and scientific
    computing communities.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: JAX 是由 Google 开发的高性能数值计算库，旨在无缝结合 Python 和 NumPy 的灵活性以及自动微分和硬件加速的强大功能。在其核心，JAX
    通过提供 **jax.numpy** 的熟悉 API 来扩展 NumPy，使用户能够编写看起来和感觉像标准 NumPy 的代码，但增加了额外的功能。其最突出的特性之一是自动微分，它使用
    **grad** 和 **jacrev** 等工具为任意 Python 函数提供梯度计算，使其非常适合机器学习和科学计算。JAX 还利用 XLA（加速线性代数）来编译和优化代码，以便在
    CPU、GPU 和 TPUs 上执行，显著提高性能。通过 **@jit** 等装饰器，用户可以将即时编译应用于函数，以加快执行速度，而 **vmap** 和
    **pmap** 提供了强大的机制，用于跨设备进行向量化和平行化。JAX 推崇函数式编程风格，强调不可变性和纯函数，这与现代机器学习框架如 Flax 和 Haiku
    非常契合。其在研究和开发中的日益流行源于其高效的扩展能力、支持复杂模型以及与尖端硬件无缝集成的能力，使其成为机器学习和科学计算社区许多人的首选选择。
- en: Steps to Use JAX
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 JAX 的步骤
- en: '**Install JAX:** Visit [https://​github.​com/​google/​jax](https://github.com/google/jax)
    or follow the official installation guide. Use pip to install JAX and its dependencies.
    For CPU-only support, run `pip install jax jaxlib`; for GPU support, install the
    appropriate CUDA-compatible version of `jaxlib`.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**安装 JAX**：访问 [https://github.com/google/jax](https://github.com/google/jax)
    或遵循官方安装指南。使用 pip 安装 JAX 及其依赖项。对于仅 CPU 的支持，运行 `pip install jax jaxlib`；对于 GPU 支持，安装与
    CUDA 兼容的 `jaxlib` 适当版本。'
- en: '**Import JAX Modules:** Use `import jax`, `import jax.numpy as jnp`, and other
    relevant modules like `jax.random` to access JAX functionalities.'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**导入 JAX 模块**：使用 `import jax`、`import jax.numpy as jnp` 以及其他相关模块如 `jax.random`
    来访问 JAX 功能。'
- en: '**Create Arrays with jax.numpy:** JAX uses `jax.numpy` as a drop-in replacement
    for NumPy. You can create arrays using functions like `jnp.array()`, `jnp.zeros()`,
    and `jnp.ones()`.'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用 jax.numpy 创建数组**：JAX 使用 `jax.numpy` 作为 NumPy 的替代品。您可以使用 `jnp.array()`、`jnp.zeros()`
    和 `jnp.ones()` 等函数创建数组。'
- en: '**Use Automatic Differentiation:** Compute gradients using `jax.grad()` for
    scalar-output functions. For more complex derivatives, use `jax.jacfwd()` and
    `jax.jacrev()`.'
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用自动微分**：对于标量输出函数，使用 `jax.grad()` 计算梯度。对于更复杂的导数，使用 `jax.jacfwd()` 和 `jax.jacrev()`。'
- en: '**Apply JIT Compilation:** Use the `@jax.jit` decorator to compile functions
    for faster execution using XLA (accelerated linear algebra).'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**应用 JIT 编译**：使用 `@jax.jit` 装饰器编译函数，以便使用 XLA（加速线性代数）进行更快执行。'
- en: '**Vectorize with vmap:** Use `jax.vmap()` to automatically vectorize functions
    across array dimensions, enabling efficient batch computations.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用 vmap 向量化**：使用 `jax.vmap()` 自动向量化跨数组维度的函数，以实现高效的批量计算。'
- en: '**Parallelize with pmap:** For multidevice parallelism (e.g., across GPUs or
    TPUs), use `jax.pmap()` to distribute computations.'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用 pmap 并行化**：对于多设备并行（例如，跨 GPU 或 TPUs），使用 `jax.pmap()` 来分配计算。'
- en: '**Integrate with ML Frameworks:** Use libraries like Flax or Haiku to build
    and train neural networks on top of JAX, leveraging its functional programming
    style and performance.'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**与 ML 框架集成**：使用 Flax 或 Haiku 等库在 JAX 上构建和训练神经网络，利用其函数式编程风格和性能。'
- en: '**Debug and Profile:** Use tools like `jax.debug.print()` and profiling utilities
    to monitor performance and debug JAX programs effectively.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**调试和性能分析**：使用 `jax.debug.print()` 和性能分析工具来监控性能并有效地调试 JAX 程序。'
- en: 2.1.4 Comparison of Popular Frameworks
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.4 流行框架的比较
- en: This subsection gives the comparison of popular frameworks described in subsection
    [2.1.3](#Sec4), viz., PyTorch, TensorFlow, and JAX, highlighting the unique strengths
    and design philosophies of each frameworks as given in Table [2.1](#Tab1). PyTorch
    is known for its dynamic computation graphs and intuitive interface, making it
    a favorite among researchers and developers for rapid experimentation. TensorFlow,
    with its static graph approach and extensive ecosystem including Keras and TensorFlow
    Lite, is well-suited for scalable production environments and deployment across
    platforms. JAX stands out for its functional programming style and high-performance
    numerical computing, leveraging XLA for efficient execution on CPUs, GPUs, and
    TPUs. Together, these frameworks offer diverse capabilities, allowing developers
    to choose the most appropriate tool based on their specific machine learning needs
    and workflow preferences.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 本小节给出了第 [2.1.3](#Sec4) 小节中描述的流行框架的比较，即 PyTorch、TensorFlow 和 JAX，突出显示每个框架的独特优势和设计理念，如表
    [2.1](#Tab1) 所示。PyTorch 以其动态计算图和直观的界面而闻名，这使得它成为研究人员和开发人员进行快速实验的热门选择。TensorFlow
    通过其静态图方法和包括 Keras 和 TensorFlow Lite 在内的广泛生态系统，非常适合可扩展的生产环境和跨平台的部署。JAX 因其函数式编程风格和高性能数值计算而突出，利用
    XLA 在 CPU、GPU 和 TPU 上进行高效的执行。这些框架共同提供了多样化的功能，允许开发人员根据他们特定的机器学习需求和流程偏好选择最合适的工具。
- en: Table 2.1
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2.1
- en: Comparison of PyTorch, TensorFlow, and JAX
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch、TensorFlow 和 JAX 的比较
- en: '| Feature | PyTorch | TensorFlow | JAX |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| 功能 | PyTorch | TensorFlow | JAX |'
- en: '| --- | --- | --- | --- |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Origin | Facebook | Google | Google |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| 来源 | Facebook | Google | Google |'
- en: '| Primary use case | Deep learning | Deep learning | High-performance numerical
    computing and ML research |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| 主要用途 | 深度学习 | 深度学习 | 高性能数值计算和机器学习研究 |'
- en: '| Differentiation Support | Autograd | TensorFlow GradientTape | Autograd |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| 微分支持 | Autograd | TensorFlow GradientTape | Autograd |'
- en: '| Hardware acceleration | CPU, GPU | CPU, GPU, TPU | CPU, GPU, TPU (via XLA)
    |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '| 硬件加速 | CPU, GPU | CPU, GPU, TPU | CPU, GPU, TPU (通过 XLA) |'
- en: '| Programming style | Imperative | Declarative | Functional |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '| 编程风格 | 命令式 | 声明式 | 函数式 |'
- en: '| Ecosystem | Rich ecosystem with libraries like torchvision, torchaudio, etc.
    | Extensive ecosystem including Keras, TensorFlow Extended (TFX), TensorFlow Lite,
    etc. | Growing ecosystem with libraries like Flax, Haiku, Objax, etc. |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '| 生态系统 | 拥有 torchvision、torchaudio 等库的丰富生态系统 | 包括 Keras、TensorFlow Extended
    (TFX)、TensorFlow Lite 等在内的广泛生态系统 | 拥有 Flax、Haiku、Objax 等库的日益增长的生态系统 |'
- en: '| Performance | High performance, especially with dynamic computation graphs
    | High performance with static computation graphs | High performance with XLA
    compilation and optimization |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| 性能 | 高性能，尤其是在动态计算图方面 | 使用静态计算图的高性能 | 使用 XLA 编译和优化的高性能 |'
- en: 2.2 Setting GPU Support
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.2 设置 GPU 支持
- en: Setting up GPU support is crucial in optimizing the performance of machine learning
    frameworks like PyTorch, TensorFlow, and JAX. GPUs are designed to handle parallel
    computations efficiently, making them ideal for training deep learning models.
    To begin, users must ensure that their system has a compatible NVIDIA GPU and
    that the appropriate drivers are installed. Next, installing CUDA (Compute Unified
    Device Architecture) and cuDNN (CUDA Deep Neural Network library) is essential,
    as these provide the low-level APIs required for GPU acceleration. Each framework
    has specific installation instructions to enable GPU support PyTorch and TensorFlow
    offer pip or conda packages tailored for different CUDA versions. At the same
    time, JAX requires installing a matching version of `jaxlib` with GPU support.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在优化像 PyTorch、TensorFlow 和 JAX 这样的机器学习框架的性能时，设置 GPU 支持至关重要。GPU 被设计用来高效地处理并行计算，这使得它们非常适合训练深度学习模型。首先，用户必须确保他们的系统有一个兼容的
    NVIDIA GPU，并且已经安装了适当的驱动程序。接下来，安装 CUDA（计算统一设备架构）和 cuDNN（CUDA 深度神经网络库）是必不可少的，因为这些提供了
    GPU 加速所需的底层 API。每个框架都有特定的安装说明来启用 GPU 支持，PyTorch 和 TensorFlow 提供了针对不同 CUDA 版本的
    pip 或 conda 包。同时，JAX 需要安装具有 GPU 支持的匹配版本的 `jaxlib`。
- en: After setting up the computing environment, an essential next step is to verify
    the availability of hardware accelerators such as GPUs. Most machine learning
    frameworks provide functions to detect and utilize these devices effectively.
    Ensuring that computations run on the GPU can significantly enhance performance,
    especially when training deep learning models. Monitoring device memory usage
    and computation placement is also advisable to use resources efficiently. In systems
    with multiple GPUs, many frameworks support distributed or parallel computing
    techniques to speed up processing further. Proper hardware configuration accelerates
    model training and enables scaling to larger datasets and more complex architectures,
    making it a foundational aspect of any serious data-driven application.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置计算环境之后，一个重要的下一步是验证硬件加速器（如 GPU）的可用性。大多数机器学习框架提供检测和有效利用这些设备的功能。确保计算在 GPU 上运行可以显著提高性能，尤其是在训练深度学习模型时。监控设备内存使用和计算位置也是建议的，以有效地使用资源。在具有多个
    GPU 的系统中，许多框架支持分布式或并行计算技术以进一步加快处理速度。适当的硬件配置可以加速模型训练，并使扩展到更大的数据集和更复杂的架构成为可能，这是任何严肃的数据驱动应用程序的基础方面。
- en: 2.2.1 NVIDIA GPU Driver Requirements
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.1 NVIDIA GPU 驱动程序要求
- en: It is essential to install the correct NVIDIA GPU drivers to enable GPU acceleration
    for machine learning frameworks such as PyTorch, TensorFlow, and JAX. These drivers
    act as the interface between the operating system and the GPU hardware, allowing
    frameworks to utilize the GPU for computation. The driver version must be compatible
    with the installed version of CUDA. NVIDIA regularly updates its drivers to support
    newer CUDA versions and improve performance and stability.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 安装正确的 NVIDIA GPU 驱动程序对于启用 PyTorch、TensorFlow 和 JAX 等机器学习框架的 GPU 加速至关重要。这些驱动程序作为操作系统和
    GPU 硬件之间的接口，允许框架利用 GPU 进行计算。驱动程序版本必须与安装的 CUDA 版本兼容。NVIDIA 定期更新其驱动程序以支持新的 CUDA
    版本，并提高性能和稳定性。
- en: Before installing, users should check their GPU model and operating system to
    download the appropriate driver from the official NVIDIA website. On Linux systems,
    it is recommended to use the package manager or NVIDIA’s runfile installer, while
    Windows users can use the executable installer provided by NVIDIA. After installation,
    reboot the system and verify the driver installation using tools like `nvidia-smi`,
    which displays the driver version, GPU status, and CUDA compatibility. Ensuring
    the correct driver setup is a foundational step for successful GPU acceleration
    in deep learning workflows.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装之前，用户应检查他们的 GPU 型号和操作系统，从官方 NVIDIA 网站下载适当的驱动程序。在 Linux 系统上，建议使用包管理器或 NVIDIA
    的 runfile 安装程序，而 Windows 用户可以使用 NVIDIA 提供的可执行安装程序。安装后，重新启动系统，并使用如 `nvidia-smi`
    等工具验证驱动程序的安装，这些工具会显示驱动程序版本、GPU 状态和 CUDA 兼容性。确保正确的驱动程序设置是成功进行深度学习工作流程中 GPU 加速的基础步骤。
- en: 2.2.2 Installing CUDA and cuDNN
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.2 安装 CUDA 和 cuDNN
- en: To enable GPU acceleration for machine learning frameworks, it is essential
    to install CUDA and cuDNN. CUDA is a parallel computing platform and API model
    developed by NVIDIA, while cuDNN is a GPU-accelerated library for deep neural
    networks. Begin by visiting the official NVIDIA website to download the appropriate
    versions of CUDA and cuDNN that match your GPU and operating system. Follow the
    installation instructions carefully, ensuring that environment variables such
    as `PATH` and `LD_LIBRARY_PATH` (on Linux) or system paths (on Windows) are correctly
    configured. After installation, verify the setup by running sample programs or
    using framework-specific commands to check GPU availability.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 要启用机器学习框架的 GPU 加速，安装 CUDA 和 cuDNN 是至关重要的。CUDA 是由 NVIDIA 开发的并行计算平台和 API 模型，而
    cuDNN 是用于深度神经网络的 GPU 加速库。首先，访问官方 NVIDIA 网站下载与您的 GPU 和操作系统匹配的 CUDA 和 cuDNN 的适当版本。仔细遵循安装说明，确保环境变量（如
    `PATH` 和 `LD_LIBRARY_PATH`，在 Linux 上）或系统路径（在 Windows 上）正确配置。安装后，通过运行示例程序或使用框架特定的命令来检查
    GPU 可用性，以验证设置。
- en: 2.2.3 Verifying GPU Availability
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.3 验证 GPU 可用性
- en: After setting up the computing environment, an essential next step is to verify
    the availability of hardware accelerators such as GPUs. Most machine learning
    frameworks provide built-in functions to detect and utilize these devices effectively.
    Ensuring that computations are assigned to the GPU can significantly improve performance,
    particularly during model training. Monitoring memory usage and device placement
    is also essential to ensure optimal resource utilization. In systems with multiple
    GPUs, many frameworks support distributed or parallel execution to enhance computational
    efficiency further. Proper hardware configuration speeds up model development
    and enables scaling to larger datasets and more complex architectures, making
    it a fundamental step in any modern machine learning workflow.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置计算环境之后，验证硬件加速器（如GPU）的可用性是下一步的重要步骤。大多数机器学习框架都提供了内置函数来有效地检测和利用这些设备。确保计算被分配到GPU上可以显著提高性能，尤其是在模型训练期间。监控内存使用和设备放置也是确保最佳资源利用的关键。在具有多个GPU的系统上，许多框架支持分布式或并行执行，以进一步提高计算效率。适当的硬件配置可以加快模型开发，并使其能够扩展到更大的数据集和更复杂的架构，这是任何现代机器学习工作流程中的基本步骤。
- en: 2.2.4 Managing GPU Memory Usage and Visibility
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.4 管理GPU内存使用和可见性
- en: A common strategy is allocating GPU memory on demand rather than reserving all
    available memory simultaneously. This helps multiple applications or models share
    the GPU more efficiently. Some frameworks enable memory growth, allowing memory
    usage to expand as needed instead of preallocating all resources at the start
    of execution.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 一种常见的策略是按需分配GPU内存，而不是同时保留所有可用内存。这有助于多个应用程序或模型更有效地共享GPU。一些框架允许内存增长，使得内存使用可以根据需要扩展，而不是在执行开始时预分配所有资源。
- en: Another helpful feature is setting memory limits or logical partitions. This
    is especially important in multiuser or multimodel environments, where GPU resources
    must be shared fairly or isolated between processes.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个有用的功能是设置内存限制或逻辑分区。这在多用户或多模型环境中尤为重要，在这些环境中，GPU资源必须公平共享或在不同进程间隔离。
- en: 'In addition to framework-level tools, external utilities such as `nvidia-smi`
    provide real-time monitoring of GPU usage, including memory consumption, utilization
    percentage, and active processes. For example:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 除了框架级别的工具之外，外部实用程序如`nvidia-smi`提供了对GPU使用的实时监控，包括内存消耗、利用率百分比和活动进程。例如：
- en: '[PRE0]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This command-line tool is valuable for diagnosing bottlenecks or verifying that
    computations are properly running on the GPU.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令行工具对于诊断瓶颈或验证计算是否正确运行在GPU上非常有价值。
- en: 'Environment variables like `CUDA_VISIBLE_DEVICES` can also be used to restrict
    which GPUs are visible to an application, helping manage GPU allocation manually
    in multi-GPU systems:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 环境变量如`CUDA_VISIBLE_DEVICES`也可以用来限制应用程序可见的GPU，帮助在多GPU系统中手动管理GPU分配：
- en: '[PRE1]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Overall, careful management of GPU memory and visibility leads to better resource
    utilization, reduced crashes, and improved scalability for large-scale training
    and experimentation.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，仔细管理GPU内存和可见性可以更好地利用资源，减少崩溃，并提高大规模训练和实验的可扩展性。
- en: 2.3 GPU Acceleration in TensorFlow
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.3 TensorFlow中的GPU加速
- en: GPU acceleration plays a vital role in scaling deep learning tasks, and TensorFlow
    provides robust support for leveraging GPU hardware to enhance performance. By
    default, TensorFlow automatically detects available GPUs and attempts to use them
    for computation. This allows models to run significantly faster than CPU execution,
    especially for operations involving large matrix computations and deep neural
    networks.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: GPU加速在扩展深度学习任务中起着至关重要的作用，TensorFlow提供了强大的支持，以利用GPU硬件来提升性能。默认情况下，TensorFlow会自动检测可用的GPU并尝试使用它们进行计算。这使得模型运行速度比CPU执行快得多，尤其是在涉及大型矩阵计算和深度神经网络的操作中。
- en: TensorFlow supports many GPU configurations, including single-GPU and multi-GPU
    environments. TensorFlow places operations on the GPU device when a GPU is available
    unless explicitly directed otherwise. Users can manually inspect or control device
    placement, but TensorFlow’s automatic placement typically optimizes performance.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow支持许多GPU配置，包括单GPU和多GPU环境。当可用GPU时，TensorFlow会将操作放置在GPU设备上，除非明确指定其他操作。用户可以手动检查或控制设备放置，但TensorFlow的自动放置通常可以优化性能。
- en: Efficient GPU usage also requires proper memory management. TensorFlow allows
    developers to configure how memory is allocated on the GPU. For example, memory
    growth can allow TensorFlow to allocate GPU memory incrementally, avoiding the
    need to reserve the entire memory block upfront. This is particularly useful in
    environments where multiple applications or users share the same GPU.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的 GPU 使用还要求适当的内存管理。TensorFlow 允许开发者配置 GPU 上内存的分配方式。例如，内存增长可以让 TensorFlow 逐步分配
    GPU 内存，避免预先保留整个内存块的需求。这在多个应用程序或用户共享同一 GPU 的环境中特别有用。
- en: TensorFlow offers high-level strategies for distributed training in multi-GPU
    setups, such as `tf.distribute.Strategy`, which enables seamless training across
    multiple GPUs or even multiple machines. These strategies abstract the complexity
    of parallel execution while maintaining high scalability and efficiency.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 为多 GPU 设置提供了高级分布式训练策略，例如 `tf.distribute.Strategy`，它可以在多个 GPU 或甚至多台机器之间实现无缝训练。这些策略抽象了并行执行的复杂性，同时保持了高可扩展性和效率。
- en: 2.3.1 GPU-Compatible Tensors and Operations
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3.1 GPU 兼容张量和操作
- en: To take full advantage of GPU acceleration, tensors, and operations in a machine
    learning framework must be compatible with GPU devices. GPU-compatible tensors
    are data structures that reside in GPU memory, allowing for high-speed computation
    and parallelism. Most modern frameworks, including TensorFlow, PyTorch, and JAX,
    automatically manage tensor placement on available hardware, but they also offer
    manual control when needed.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分利用 GPU 加速，机器学习框架中的张量和操作必须与 GPU 设备兼容。兼容 GPU 的张量是位于 GPU 内存中的数据结构，允许高速计算和并行处理。大多数现代框架，包括
    TensorFlow、PyTorch 和 JAX，都会自动管理张量在可用硬件上的放置，但它们也提供了在需要时进行手动控制的功能。
- en: When the involved tensors are placed on a GPU device, operations such as matrix
    multiplication, convolution, and backpropagation are optimized for GPUs. These
    operations are typically supported through low-level libraries like cuDNN or CUDA,
    which are used internally by the frameworks to achieve high performance.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及的张量放置在 GPU 设备上时，矩阵乘法、卷积和反向传播等操作针对 GPU 进行了优化。这些操作通常通过 cuDNN 或 CUDA 等低级库来支持，这些库是框架内部用于实现高性能的。
- en: In practice, users must ensure that
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，用户必须确保
- en: Tensors are explicitly created or moved to the GPU when required.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当需要时，张量必须显式创建或移动到 GPU。
- en: All participating tensors in an operation reside on the same device to avoid
    unnecessary data transfer overhead between CPU and GPU.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 操作中所有参与的张量都位于同一设备上，以避免在 CPU 和 GPU 之间进行不必要的传输开销。
- en: The selected operations are supported on GPU hardware, as some operations may
    still default to CPU.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选定的操作支持在 GPU 硬件上运行，因为某些操作可能默认使用 CPU。
- en: Frameworks provide utility functions to inspect and control device placement.
    For example, TensorFlow allows developers to specify the device context, while
    PyTorch uses methods like `.to(’cuda’)` to transfer tensors to the GPU. Failing
    to place tensors and operations properly may lead to suboptimal performance or
    runtime errors due to device mismatches.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 框架提供了检查和控制设备放置的实用函数。例如，TensorFlow 允许开发者指定设备上下文，而 PyTorch 使用类似 `.to(‘cuda’)`
    的方法将张量传输到 GPU。未能正确放置张量和操作可能会导致由于设备不匹配而导致的性能不佳或运行时错误。
- en: By ensuring that tensors and their corresponding operations are compatible with
    GPU execution, developers can significantly improve training speed and computational
    efficiency.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 通过确保张量和相应的操作与 GPU 执行兼容，开发者可以显著提高训练速度和计算效率。
- en: 2.3.2 Automatic vs. Manual Device Placement
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3.2 自动与手动设备放置比较
- en: 'Modern machine learning frameworks offer two primary strategies for assigning
    computations to devices such as CPUs and GPUs: automatic and manual device placement.
    Understanding these approaches’ differences is essential for developing efficient
    and portable models.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现代机器学习框架为将计算分配给设备（如 CPU 和 GPU）提供了两种主要策略：自动和手动设备放置。理解这些方法之间的差异对于开发高效且可移植的模型至关重要。
- en: '**Automatic device placement** allows the framework to choose the most appropriate
    device for each operation based on availability and compatibility. This approach
    simplifies development by abstracting away hardware management. Most frameworks
    default to automatic placement, which ensures that operations are executed on
    the GPU when available and fall back to the CPU when necessary. This is especially
    useful for beginners or in rapid prototyping scenarios.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**自动设备放置**允许框架根据可用性和兼容性为每个操作选择最合适的设备。这种方法通过抽象硬件管理来简化开发。大多数框架默认使用自动放置，确保操作在可用时在GPU上执行，并在必要时回退到CPU。这对于初学者或在快速原型设计场景中特别有用。'
- en: '**Manual device placement**, on the other hand, gives developers explicit control
    over where operations and tensors are located. This is useful in performance-critical
    applications, multi-GPU environments, or cases where developers want to optimize
    memory usage and execution flow. Manual placement typically involves specifying
    device scopes or using API calls to move tensors and operations to a specific
    device.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**手动设备放置**，另一方面，则让开发者对操作和张量所在的位置拥有明确控制权。这在性能关键的应用、多GPU环境或开发者希望优化内存使用和执行流程的情况下非常有用。手动放置通常涉及指定设备作用域或使用API调用将张量和操作移动到特定设备。'
- en: While automatic placement is sufficient for most general use cases, manual placement
    is valuable when fine-grained control is required. For example, placing certain
    model parts on different GPUs can improve parallelism, or keeping frequently used
    data on the same device can reduce communication overhead.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然自动放置对于大多数通用用例来说已经足够，但在需要精细控制时，手动放置非常有价值。例如，将某些模型部分放置在不同的GPU上可以提高并行性，或者将频繁使用的数据保留在同一个设备上可以减少通信开销。
- en: In summary, automatic device placement emphasizes ease of use and portability,
    while manual placement offers precision and optimization capabilities. A balanced
    understanding of both methods enables developers to design scalable and efficient
    machine learning workflows.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，自动设备放置强调易用性和可移植性，而手动放置提供精确性和优化能力。对这两种方法的平衡理解使开发者能够设计可扩展且高效的机器学习工作流程。
- en: 2.3.3 Enabling Mixed-Precision Training
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3.3 启用混合精度训练
- en: Mixed-precision training is an optimization technique that combines 16-bit and
    32-bit floating-point computations to accelerate deep learning model training
    and reduce memory consumption. Many neural network operations do not require complete
    32-bit precision, and using 16-bit precision where appropriate allows for faster
    computation and increased throughput, especially on modern GPUs equipped with
    specialized hardware such as tensor cores. Most machine learning frameworks offer
    built-in support for mixed-precision training, which automatically manages the
    precision of operations and variables to maintain performance without compromising
    model accuracy. While enabling mixed-precision training typically requires minimal
    code changes, it is essential to ensure that the underlying hardware supports
    half-precision operations and that numerical stability is preserved using techniques
    such as loss scaling. Overall, mixed-precision training is a powerful strategy
    to improve training speed and memory efficiency, making it particularly valuable
    when working with large models or datasets.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 混合精度训练是一种优化技术，它结合了16位和32位浮点计算来加速深度学习模型训练并减少内存消耗。许多神经网络操作不需要完整的32位精度，而在适当的情况下使用16位精度可以加快计算速度并提高吞吐量，尤其是在配备了专用硬件（如张量核心）的现代GPU上。大多数机器学习框架都提供了内置的混合精度训练支持，它自动管理操作和变量的精度，以保持性能而不牺牲模型精度。虽然启用混合精度训练通常只需要进行最小的代码更改，但确保底层硬件支持半精度操作并使用损失缩放等技术保持数值稳定性是至关重要的。总的来说，混合精度训练是一种强大的策略，可以提高训练速度和内存效率，尤其是在处理大型模型或数据集时特别有价值。
- en: 2.3.4 Using MirroredStrategy for Multi-GPU Training
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3.4 使用MirroredStrategy进行多GPU训练
- en: MirroredStrategy is a high-level API provided by TensorFlow to enable synchronous
    training across multiple GPUs on a single machine. It works by creating a copy
    of the model on each available GPU (called a replica) and synchronizing the model
    weights during training. Each replica processes a portion of the input data in
    parallel, and gradients are aggregated across all replicas before updating the
    model parameters. This approach helps accelerate training while ensuring that
    all GPUs contribute equally to the learning process. Using MirroredStrategy requires
    minimal changes to existing code and allows developers to scale up their models
    efficiently without manual device placement or custom parallelization logic. It
    benefits large models or datasets that would benefit from distributed computation,
    offering a balance between performance and ease of use.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: MirroredStrategy 是 TensorFlow 提供的一个高级 API，用于在单台机器上的多个 GPU 之间启用同步训练。它通过在每个可用的
    GPU 上创建模型的一个副本（称为副本）并在训练期间同步模型权重来实现。每个副本并行处理输入数据的一部分，并在更新模型参数之前，将梯度聚合到所有副本中。这种方法有助于加速训练，同时确保所有
    GPU 都平等地参与到学习过程中。使用 MirroredStrategy 需要最小程度的代码更改，并允许开发者高效地扩展他们的模型，无需手动设备放置或自定义并行化逻辑。它适用于那些可以从分布式计算中受益的大型模型或数据集，在性能和易用性之间提供了平衡。
- en: 2.4 Multi-GPU Training Strategies
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4 多 GPU 训练策略
- en: Multi-GPU training strategies are designed to reduce training time and handle
    larger models or datasets by distributing computation across multiple GPUs. These
    strategies are broadly classified into **data parallelism**, **model parallelism**,
    and **hybrid parallelism**.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 多 GPU 训练策略旨在通过在多个 GPU 之间分配计算来减少训练时间，并处理更大的模型或数据集。这些策略被广泛分为 **数据并行**、**模型并行**
    和 **混合并行**。
- en: 2.4.1 Data Parallelism
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4.1 数据并行
- en: 'In data parallelism, the entire model is replicated across all GPUs, and each
    GPU processes a different mini-batch of input data. Let $$$D = \{x_1, x_2, \dots
    , x_n\}$$$ be a dataset of size *n*, and let there be *k* GPUs available. The
    dataset is divided into *k* partitions, each of size approximately $$$n/k$$$.
    Each GPU $$$G_i$$$ (where $$$i = 1,\dots ,k$$$) computes the gradients $$$\nabla
    _i \mathcal {L}(\theta )$$$ for its partition of data, and a synchronization step
    aggregates gradients: $$$\displaystyle \begin{aligned} \nabla \mathcal{L}(\theta)
    = \frac{1}{k} \sum_{i=1}^{k} \nabla_i \mathcal{L}(\theta) \end{aligned} $$$ (2.1)'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据并行中，整个模型被复制到所有 GPU 上，每个 GPU 处理不同的输入数据的小批量。设 $$D = \{x_1, x_2, \dots , x_n\}$$
    为大小为 *n* 的数据集，并设有 *k* 个可用的 GPU。数据集被分为 *k* 个分区，每个分区的大小大约为 $$n/k$$。每个 GPU $$G_i$$（其中
    $$i = 1,\dots ,k$$）计算其数据分区上的梯度 $$\nabla _i \mathcal {L}(\theta )$$，并在同步步骤中聚合梯度：$$\displaystyle
    \begin{aligned} \nabla \mathcal{L}(\theta) = \frac{1}{k} \sum_{i=1}^{k} \nabla_i
    \mathcal{L}(\theta) \end{aligned} $$ (2.1)
- en: This aggregated gradient is then used to update the model parameters $$$\theta
    $$$. Frameworks like TensorFlow’s **MirroredStrategy** and PyTorch’s **DistributedDataParallel
    (DDP)** efficiently manage this synchronization using all-reduce operations.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 然后使用这个聚合的梯度来更新模型参数 $$\theta$$。像 TensorFlow 的 **MirroredStrategy** 和 PyTorch
    的 **DistributedDataParallel (DDP)** 这样的框架通过 all-reduce 操作有效地管理这种同步。
- en: 2.4.2 Model Parallelism
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4.2 模型并行
- en: In model parallelism, the model is split across GPUs, with each GPU responsible
    for computing a subset of the model layers. This is useful when the model is too
    large to fit on a single GPU. Consider a neural network $$$\displaystyle \begin{aligned}
    f(x) = f_k \circ f_{k-1} \circ \dots \circ f_1(x)\end{aligned} $$$ (2.2)
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型并行中，模型被分割到多个 GPU 上，每个 GPU 负责计算模型层的一个子集。当模型太大而无法适应单个 GPU 时，这很有用。考虑一个神经网络 $$\displaystyle
    \begin{aligned} f(x) = f_k \circ f_{k-1} \circ \dots \circ f_1(x)\end{aligned}
    $$ (2.2)
- en: where each subfunction $$$f_i$$$ represents a block of layers. With model parallelism,
    each function $$$f_i$$$ is assigned to a different GPU. During the forward pass,
    data flows through GPUs sequentially, and the backward pass propagates gradients
    in reverse order.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 其中每个子函数 $$$f_i$$$ 代表一组层。在模型并行中，每个函数 $$$f_i$$$ 被分配到不同的 GPU 上。在正向传播过程中，数据按顺序流经
    GPU，而在反向传播过程中，梯度以相反的顺序传播。
- en: 2.4.3 Hybrid Parallelism
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4.3 混合并行
- en: Hybrid parallelism integrates both *data parallelism* and *model parallelism*
    to leverage the strengths of each strategy, particularly in the training of extremely
    large models (e.g., Transformers, GPT-like architectures) where neither strategy
    alone suffices.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 混合并行结合了 *数据并行* 和 *模型并行*，以利用每种策略的优势，尤其是在训练极其大的模型（例如，Transformer、GPT 类架构）时，单独使用任何一种策略都不足以满足需求。
- en: Let the training dataset be $$$D = \{x_1, x_2, \dots , x_N\}$$$, and suppose
    we have $$$\displaystyle \begin{aligned} K = D_p \times M_p\end{aligned}$$$
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 假设训练数据集为 $$$D = \{x_1, x_2, \dots , x_N\}$$$, 并且我们有 $$$\displaystyle \begin{aligned}
    K = D_p \times M_p\end{aligned}$$$
- en: GPUs, where
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: GPU，其中
- en: $$$D_p$$$ is the number of data-parallel groups (i.e., replicas of the model).
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$$D_p$$$ 是数据并行组的数量（即模型的副本）。
- en: $$$M_p$$$ is the number of model-parallel partitions within each replica.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$$M_p$$$ 是每个副本内的模型并行分区数量。
- en: Each data-parallel group processes a disjoint subset of the data. Let $$$D_i$$$
    be the local dataset for data-parallel group *i* ($$$i = 1, \dots , D_p$$$), where
    $$$\displaystyle \begin{aligned} D = \bigcup_{i=1}^{D_p} D_i, \quad D_i \cap D_j
    = \emptyset \quad \text{for } i \neq j \end{aligned} $$$ (2.3)
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 每个数据并行组处理数据的一个不相交子集。令 $$$D_i$$$ 为数据并行组 *i* 的本地数据集（$$$\i = 1, \dots , D_p$$$），其中
    $$$\displaystyle \begin{aligned} D = \bigcup_{i=1}^{D_p} D_i, \quad D_i \cap D_j
    = \emptyset \quad \text{for } i \neq j \end{aligned} $$$（2.3）
- en: 'Each replica contains a model $$$f(x)$$$ that is split across $$$M_p$$$ GPUs.
    If the model is represented as a sequence of layers: $$$\displaystyle \begin{aligned}
    f(x) = f_L \circ f_{L-1} \circ \dots \circ f_1(x) \end{aligned} $$$ (2.4)'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 每个副本包含一个模型 $$$f(x)$$$，该模型分布在 $$$M_p$$$ 个 GPU 上。如果模型表示为层序列：$$$\displaystyle \begin{aligned}
    f(x) = f_L \circ f_{L-1} \circ \dots \circ f_1(x) \end{aligned} $$$（2.4）
- en: the layers are partitioned across devices so that GPU $$$G_{i,j}$$$ (where *i*
    denotes the data-parallel group and $$$j = 1, \dots , M_p$$$ the model partition)
    holds a submodel $$$f^{(j)}$$$ such that $$$\displaystyle \begin{aligned} f(x)
    = f^{(M_p)} \circ f^{(M_p - 1)} \circ \dots \circ f^{(1)}(x) \end{aligned} $$$
    (2.5)
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 层被分配到设备上，使得 GPU $$$G_{i,j}$$$（其中 *i* 表示数据并行组，而 $$$j = 1, \dots , M_p$$$ 表示模型分区）持有子模型
    $$$f^{(j)}$$$，使得 $$$\displaystyle \begin{aligned} f(x) = f^{(M_p)} \circ f^{(M_p
    - 1)} \circ \dots \circ f^{(1)}(x) \end{aligned} $$$（2.5）
- en: Forward Pass
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 前向传播
- en: 'Within each data-parallel group, the input $$$x \in D_i$$$ is forwarded sequentially
    through all $$$M_p$$$ GPUs: $$$\displaystyle \begin{aligned} z_1 = f^{(1)}(x),
    \quad z_2 = f^{(2)}(z_1), \dots, \quad \hat{y} = f^{(M_p)}(z_{M_p - 1}) \end{aligned}$$$'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个数据并行组内，输入 $$$x \in D_i$$$ 依次通过所有的 $$$M_p$$$ 个 GPU：$$$\displaystyle \begin{aligned}
    z_1 = f^{(1)}(x), \quad z_2 = f^{(2)}(z_1), \dots, \quad \hat{y} = f^{(M_p)}(z_{M_p
    - 1}) \end{aligned}$$$
- en: Backward Pass
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播
- en: 'Gradients are computed in reverse order and passed backward across model partitions:
    $$$\displaystyle \begin{aligned} \frac{\partial \mathcal{L}}{\partial z_{M_p}}
    \rightarrow \frac{\partial \mathcal{L}}{\partial z_{M_p - 1}} \rightarrow \dots
    \rightarrow \frac{\partial \mathcal{L}}{\partial x} \end{aligned} $$$ (2.6)'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度以相反的顺序计算，并通过模型分区向后传递：$$$\displaystyle \begin{aligned} \frac{\partial \mathcal{L}}{\partial
    z_{M_p}} \rightarrow \frac{\partial \mathcal{L}}{\partial z_{M_p - 1}} \rightarrow
    \dots \rightarrow \frac{\partial \mathcal{L}}{\partial x} \end{aligned} $$$（2.6）
- en: Gradient Synchronization
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度同步
- en: 'After each backward pass, gradients across the $$$D_p$$$ replicas are synchronized
    via all-reduce: $$$\displaystyle \begin{aligned} \nabla \mathcal{L}(\theta) =
    \frac{1}{D_p} \sum_{i=1}^{D_p} \nabla_i \mathcal{L}(\theta) \end{aligned} $$$
    (2.7)'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在每次反向传播后，通过 all-reduce 同步 $$$D_p$$$ 个副本之间的梯度：$$$\displaystyle \begin{aligned}
    \nabla \mathcal{L}(\theta) = \frac{1}{D_p} \sum_{i=1}^{D_p} \nabla_i \mathcal{L}(\theta)
    \end{aligned} $$$（2.7）
- en: 2.4.4 Comparison of Multi-GPU Strategies
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4.4 多GPU策略的比较
- en: 'Table [2.2](#Tab2) compares three common multi-GPU training strategies—data
    parallelism, model parallelism, and hybrid parallelism—across three critical dimensions:
    model size suitability, scaling efficiency, and communication overhead. Data parallelism
    is best suited for small to medium-sized models, as the entire model is replicated
    on each GPU. It offers high scaling efficiency, especially when the dataset is
    large, but incurs medium communication overhead due to gradient synchronization
    across devices after each training step.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [2.2](#Tab2) 比较了三种常见的多GPU训练策略——数据并行、模型并行和混合并行——在三个关键维度上的表现：模型大小适用性、扩展效率和通信开销。数据并行最适合小型到中型模型，因为整个模型在每个
    GPU 上都有副本。它提供了高扩展效率，尤其是在数据集很大时，但由于每个训练步骤后设备间的梯度同步，它也带来了中等的通信开销。
- en: Table 2.2
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2.2
- en: Comparison of Multi-GPU Training Strategies
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 多GPU训练策略的比较
- en: '| Strategy | Model size suitability | Scaling efficiency | Communication overhead
    |'
  id: totrans-143
  prefs: []
  type: TYPE_TB
  zh: '| 策略 | 模型大小适用性 | 扩展效率 | 通信开销 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-144
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Data parallelism | Small to medium | High | Medium (due to gradient synchronization)
    |'
  id: totrans-145
  prefs: []
  type: TYPE_TB
  zh: '| 数据并行 | 小到中等 | 高 | 中等（由于梯度同步）|'
- en: '| Model parallelism | Very large | Medium | High (due to layer-wise data transfer)
    |'
  id: totrans-146
  prefs: []
  type: TYPE_TB
  zh: '| 模型并行 | 非常大 | 中等 | 高（由于层间数据传输）|'
- en: '| Hybrid parallelism | Extremely large | High | Very high (requires careful
    tuning) |'
  id: totrans-147
  prefs: []
  type: TYPE_TB
  zh: '| 混合并行性 | 极大 | 高 | 非常高（需要仔细调整） |'
- en: In contrast, model parallelism is more appropriate for huge models that cannot
    fit into a single GPU’s memory. Here, different segments of the model are distributed
    across GPUs. Although this strategy reduces memory constraints, it introduces
    high communication overhead, as intermediate activations must be transferred between
    devices during forward and backward passes. Its scaling efficiency is generally
    lower than data parallelism due to these synchronization demands and a potential
    imbalance in layer-wise computational loads.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，模型并行性更适合无法适应单个 GPU 内存的大型模型。在这里，模型的各个部分被分布到不同的 GPU 上。尽管这种策略减少了内存限制，但它在正向和反向传播过程中需要在设备之间传输中间激活值，因此引入了较高的通信开销。由于其同步需求和层间计算负载的不平衡，其扩展效率通常低于数据并行性。
- en: Hybrid parallelism combines aspects of both data and model parallelism, making
    it well-suited for extremely large-scale models such as GPT-3 or large vision
    transformers. While it achieves high scaling efficiency by exploiting both strategies,
    it suffers from high communication overhead and requires careful coordination
    and tuning. This strategy is typically used in large-scale distributed training
    environments, often involving specialized frameworks and hardware. Overall, the
    choice of parallelism strategy depends on the model size, resource availability,
    and the desired trade-off between performance and complexity.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 混合并行性结合了数据并行性和模型并行性的方面，使其非常适合像 GPT-3 或大型视觉变换器这样的极大规模模型。虽然它通过利用这两种策略实现了高扩展效率，但它也遭受了高通信开销，并需要仔细的协调和调整。这种策略通常用于大规模分布式训练环境，通常涉及专门的框架和硬件。总的来说，并行策略的选择取决于模型大小、资源可用性和性能与复杂度之间的期望权衡。
- en: 2.5 GPU Memory Optimization Techniques
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.5 GPU 内存优化技术
- en: Efficient GPU memory utilization is critical for training deep learning models,
    especially when working with large architectures, high-resolution data, or limited
    hardware resources. Without proper optimization, training may fail due to out-of-memory
    (OOM) errors. Various techniques have been developed to address this challenge,
    balancing memory consumption with computational efficiency.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 高效利用 GPU 内存对于训练深度学习模型至关重要，尤其是在处理大型架构、高分辨率数据或有限的硬件资源时。如果没有适当的优化，训练可能会因内存不足（OOM）错误而失败。已经开发出各种技术来应对这一挑战，在内存消耗和计算效率之间取得平衡。
- en: 2.5.1 Gradient Checkpointing (Recomputation)
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.5.1 梯度检查点（重新计算）
- en: Gradient checkpointing reduces memory usage by trading off computation for storage.
    Instead of storing the entire computational graph during the forward pass, only
    selected “checkpoints” are saved. Intermediate activations are discarded and recomputed
    during the backward pass as needed.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度检查点通过以存储为代价来减少内存使用。在正向传播过程中，不是存储整个计算图，而是只保存选定的“检查点”。中间激活值在反向传播过程中根据需要丢弃并重新计算。
- en: 'Let $$$f(x) = f_n \circ f_{n-1} \circ \dots \circ f_1(x)$$$ represent a deep
    neural network with *n* layers. Normally, all intermediate outputs $$$z_i = f_i(z_{i-1})$$$
    are stored to compute gradients via backpropagation: $$$\displaystyle \begin{aligned}
    \frac{\partial \mathcal{L}}{\partial z_i} = \frac{\partial \mathcal{L}}{\partial
    z_{i+1}} \cdot \frac{\partial z_{i+1}}{\partial z_i} \end{aligned}$$$'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 令 $$f(x) = f_n \circ f_{n-1} \circ \dots \circ f_1(x)$$ 表示具有 *n* 层的深度神经网络。通常，所有中间输出
    $$z_i = f_i(z_{i-1})$$ 都会被存储起来，以便通过反向传播计算梯度：$$\displaystyle \begin{aligned} \frac{\partial
    \mathcal{L}}{\partial z_i} = \frac{\partial \mathcal{L}}{\partial z_{i+1}} \cdot
    \frac{\partial z_{i+1}}{\partial z_i} \end{aligned}$$
- en: With checkpointing, only outputs at selected layers (e.g., every *k* layers)
    are stored, and others are recomputed during backward propagation. This reduces
    memory complexity from $$$\mathcal {O}(n)$$$ to approximately $$$\mathcal {O}(\sqrt
    {n})$$$ in certain strategies like Chen et al.’s “Training Deep Nets with Sublinear
    Memory Cost.”
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 使用检查点时，只有选定层（例如，每 *k* 层）的输出被存储，其他层在反向传播过程中重新计算。这降低了内存复杂度，在某些策略（如陈等人提出的“以亚线性内存成本训练深度网络”）中，从
    $$\mathcal {O}(n)$$ 降低到大约 $$\mathcal {O}(\sqrt {n})$$。
- en: 2.5.2 Mixed-Precision Training
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.5.2 混合精度训练
- en: Mixed-precision training uses 16-bit (FP16) floating-point numbers instead of
    the standard 32-bit (FP32) to reduce memory footprint and accelerate computation.
    However, certain operations (e.g., loss accumulation) must remain in higher precision
    to avoid numerical instability.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 混合精度训练使用16位（FP16）浮点数而不是标准的32位（FP32），以减少内存占用并加速计算。然而，某些操作（例如，损失累积）必须保持更高的精度，以避免数值不稳定性。
- en: For instance, weights $$$\mathbf {W} \in \mathbb {R}^{m \times n}$$$ and activations
    $$$\mathbf {X} \in \mathbb {R}^{n \times b}$$$ (where *b* is batch size) can be
    represented in FP16\. The output $$$\displaystyle \begin{aligned} \mathbf{Y} =
    \mathbf{W} \cdot \mathbf{X} \end{aligned}$$$
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，权重 $$$\mathbf {W} \in \mathbb {R}^{m \times n}$$$ 和激活 $$$\mathbf {X} \in
    \mathbb {R}^{n \times b}$$$（其中 *b* 是批量大小）可以用FP16表示。输出 $$$\displaystyle \begin{aligned}
    \mathbf{Y} = \mathbf{W} \cdot \mathbf{X} \end{aligned}$$$
- en: 'is computed using specialized tensor cores, and a scaled loss $$$\mathcal {L}
    = \hat {\mathcal {L}} / s$$$ is used with dynamic loss scaling factor *s* to prevent
    underflow: $$$\displaystyle \begin{aligned} \frac{\partial \mathcal{L}}{\partial
    \theta} = \frac{1}{s} \cdot \frac{\partial \hat{\mathcal{L}}}{\partial \theta}
    \end{aligned}$$$'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 使用专门的张量核心进行计算，并使用动态损失缩放因子 *s* 的缩放损失 $$$\mathcal {L} = \hat {\mathcal {L}} /
    s$$$ 以防止下溢：$$$\displaystyle \begin{aligned} \frac{\partial \mathcal{L}}{\partial
    \theta} = \frac{1}{s} \cdot \frac{\partial \hat{\mathcal{L}}}{\partial \theta}
    \end{aligned}$$$
- en: 2.5.3 Layer-Wise Memory Reuse
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.5.3 层级内存重用
- en: In sequential models, memory used by earlier layers can be released once it
    is no longer needed. Some frameworks implement memory reuse by reusing buffers
    for intermediate outputs that do not overlap in a lifetime. This technique benefits
    feed-forward architectures such as ResNet and Transformer blocks, where intermediate
    outputs can be deallocated or reused before the backward pass begins.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在顺序模型中，一旦不再需要，早期层的内存就可以释放。某些框架通过重用中间输出（这些输出在其生命周期中不重叠）的缓冲区来实现内存重用。这种技术对ResNet和Transformer块等前馈架构有益，其中中间输出可以在反向传播开始之前被释放或重用。
- en: 2.5.4 Memory Growth and Garbage Collection
  id: totrans-162
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.5.4 内存增长和垃圾回收
- en: 'Frameworks like TensorFlow allow enabling memory growth, which avoids preallocating
    the entire GPU memory block. This can be enabled with:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于TensorFlow这样的框架允许启用内存增长，这避免了预分配整个GPU内存块。这可以通过以下方式启用：
- en: '[PRE2]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Garbage collection can also be triggered explicitly in some frameworks to reclaim
    unused memory during training, especially when using dynamic computation graphs.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些框架中，还可以显式触发垃圾回收，以在训练期间回收未使用的内存，尤其是在使用动态计算图时。
