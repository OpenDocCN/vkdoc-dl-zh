  zh: 对于 RMSprop 优化器，损失和准确率随学习率的变体
- en: '**Adam**'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '**Adam**'
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig19_HTML.jpg)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig19_HTML.jpg)'
