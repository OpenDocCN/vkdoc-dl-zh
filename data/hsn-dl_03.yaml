  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论
- en: 'Implement the following using a Single-Layer Perceptron: ![$$ y=\underset{\_}{A+B}\
    \left( NOR\  gate\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq12.png)
    where y is the output and A and B are the inputs. You are expected to find the
    values of weights and the threshold for a Single-Layer Perceptron.'
  id: totrans-372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用单层感知器实现以下内容：![$$ y=\underset{\_}{A+B}\ \left( NOR\  gate\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq12.png)，其中y是输出，A和B是输入。你预计会找到单层感知器的权重和阈值。
- en: 'Implement the following using a Multi-layer Perceptron: ![$$ y= AB+\underset{\_}{AB}\
    \left( XNOR\ gate\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq13.png)
    where y is the output and A and B are the inputs. You are expected to find the
    values of weights and the threshold for a Multi-layer Perceptron.'
  id: totrans-373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用多层感知器实现以下内容：![$$ y= AB+\underset{\_}{AB}\ \left( XNOR\  gate\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq13.png)，其中y是输出，A和B是输入。你预计会找到多层感知器的权重和阈值。
- en: The tanh activation can be expressed as ![$$ f(x)=\frac{e^x-{e}^{-x}}{e^x+{e}^{-x}}
    $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq14.png). Express
    the derivative of tanh with respect to tanh.
  id: totrans-374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 双曲正切激活函数可以表示为 ![$$ f(x)=\frac{e^x-{e}^{-x}}{e^x+{e}^{-x}} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq14.png)。表达tanh相对于自身的导数。
- en: If ![$$ f(x)=\frac{e^x-{e}^{-x}}{e^x+{e}^{-x}} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq15.png),
    find the relationship between *f*(*x*) and *f*(−*x*).
  id: totrans-375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果 ![$$ f(x)=\frac{e^x-{e}^{-x}}{e^x+{e}^{-x}} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq15.png)，找出
    *f*(*x*) 和 *f*(−*x*) 之间的关系。
- en: In a Multi-layer Perceptron prove that as the number of layers increases, the
    use of sigmoid and tanh activation will hamper the learning of weights of earlier
    layers.
  id: totrans-376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在多层感知器中证明，随着层数的增加，sigmoid和tanh激活函数的使用将阻碍早期层的权重学习。
- en: Explain the backpropagation algorithm. Derive the formula for backpropagation
    for a Multi-layer Perceptron having two hidden layers if the
  id: totrans-377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释反向传播算法。如果对于具有两个隐藏层的多层感知器，推导出反向传播的公式，那么
- en: Activation function is sigmoid.
  id: totrans-378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活函数是sigmoid。
- en: Activation function is tanh.
  id: totrans-379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活函数是tanh。
- en: Compare the features of various activation functions and explain why ReLU is
    considered better as compared with the rest.
  id: totrans-380
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 比较各种激活函数的特征，并解释为什么ReLU相对于其他函数被认为更好。
- en: Prove that a Single-Layer Perceptron cannot classify nonlinearly separable data.
  id: totrans-381
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 证明单层感知器不能对非线性可分数据进行分类。
- en: Numerical
  id: totrans-382
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数值
- en: Consider two networks, one having an input layer of 128 neurons and a single
    hidden layer of 64 neurons and the other having 128 neurons in the input layer
    and two hidden layers of 32 and 16 neurons. Which do you think is better and why?
    Explain your answer in terms of the number of parameters and learning.
  id: totrans-383
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑两个网络，一个具有128个神经元的输入层和一个64个神经元的单隐藏层，另一个具有128个神经元的输入层和两个32和16个神经元的隐藏层。你认为哪个更好，为什么？请从参数数量和学习的角度解释你的答案。
- en: 'Consider a network having four neurons in the input layer and three neurons
    in the hidden layer and a single neuron in the output layer. The initial inputs,
    weights, and bias associated with them and the actual output are given as follows:'
  id: totrans-384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑一个具有四个输入层神经元、三个隐藏层神经元和一个输出层神经元的网络。与它们相关的初始输入、权重、偏置以及实际输出如下：
- en: The given inputs *x*[1] = 0.5, *x*[2] = 0.1, *x*[3] = 0.4, *x*[4] = 0.7 and
    the initial random weights *w*[11] = 0.2, *w*[12] =  − 0.1, *w*[13] = 0.4, *w*[21] = 0.5,
    *w*[22] = 0.3, *w*[23] = 0.1, *w*[31] =  − 0.4, *w*[32] = 0.2, *w*[33] = 0.5,
    *w*[41] = 0.3, *w*[42] =  − 0.2, *w*[43] = 0.2 of input to the hidden layer and
    *w*[11] = 0.3, *w*[21] = 0.2, *w*[31] = 0.6 of hidden to the output layer. The
    actual value of output is 0.6\. The learning rate is 0.1.
  id: totrans-385
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 给定的输入 *x*[1] = 0.5, *x*[2] = 0.1, *x*[3] = 0.4, *x*[4] = 0.7 以及初始随机权重 *w*[11]
    = 0.2, *w*[12] = -0.1, *w*[13] = 0.4, *w*[21] = 0.5, *w*[22] = 0.3, *w*[23] =
    0.1, *w*[31] = -0.4, *w*[32] = 0.2, *w*[33] = 0.5, *w*[41] = 0.3, *w*[42] = -0.2,
    *w*[43] = 0.2 用于输入层，以及 *w*[11] = 0.3, *w*[21] = 0.2, *w*[31] = 0.6 用于输出层。实际输出值为
    0.6。学习率为 0.1。
- en: What will be the updated weights and bias for the hidden and the output layer
    after the first and the second iteration?
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一次和第二次迭代后，隐藏层和输出层的更新权重和偏置将是什么？
