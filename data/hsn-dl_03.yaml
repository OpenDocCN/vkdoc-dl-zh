  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 Adam 优化器，损失和准确率随学习率的变体
- en: Now let us move to the implementation of Multi-layer Perceptron to classify
    the Breast Cancer dataset with two hidden layers using the ***Keras*** module
    (Listing [3-7](#PC7)).
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们转向使用 ***Keras*** 模块（列表 [3-7](#PC7)）实现多层感知器，以两个隐藏层对乳腺癌数据集进行分类。
- en: '[PRE6]'
  id: totrans-261
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig20_HTML.jpg)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig20_HTML.jpg)'
