- en: The above implementations are also used to classify the Myocardial Infarction
    Complications dataset, which is slightly complex and has 1700 samples and 109
    features. The first implementation that follows contains a single hidden layer
    having 50 neurons (Listing [3-8](#PC8)). In the second implementation, the model
    contains two hidden layers having 25 and 12 neurons (Listing [3-9](#PC9)).
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
