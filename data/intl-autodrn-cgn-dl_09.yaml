- en: Pilot’s Gesture Assignment
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 飞行员手势分配
- en: A computer vision system can consist of a digital video camera, a neural processing
    unit such as Myriad 2, and a single board computer to read the pilot’s gestures.
    The computer vision system can be trained using a face-detection machine learning
    algorithm for real-time monitoring of the “happy” or “unhappy” facial expression
    of the pilot. The agents who play the game of flying the plane in the simulator
    are particularly advised to show a happy gesture (☺) when their actions result
    in a safe operation and an unhappy gesture (☹) when their actions result in a
    risky, unsafe, or catastrophic operation. The computer vision system can be as
    simple as a Google AIY kit, which operates with a TensorFlow machine learning
    model to detect a smile.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉系统可以由一个数字视频摄像头、一个如Myriad 2的神经处理单元以及一个用于读取飞行员手势的单板计算机组成。计算机视觉系统可以使用面部检测机器学习算法进行训练，以实时监控飞行员的“快乐”或“不快乐”的面部表情。在模拟器中玩飞行游戏的角色特别建议在他们的行动导致安全操作时展示一个快乐的表情（☺），在他们的行动导致风险、不安全或灾难性操作时展示一个不快乐的表情（☹）。计算机视觉系统可以像Google
    AIY套件一样简单，它使用TensorFlow机器学习模型来检测微笑。
- en: 'Reinforcement Learning Agent: Learning from Pilot’s Actions'
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 强化学习代理：从飞行员的行为中学习
- en: We first consider a human-in-the-loop approach to develop an REL agent that
    can use artificial intelligence to determine a human pilot’s gesture and calculate
    rewards. This type of reinforcement learning agent is trained with episodes that
    are generated when a pilot is flying an aircraft in a simulator; i.e., on a computer.
    In a typical episode, the REL agent provides a sequence of actions for the pilot
    to follow. These instructions produce one of two results, either success or failure.
    The agent observes the psychological reaction of the pilot as well the flight
    environment and receives a positive or negative reward. The agent receives a +1
    reward when the pilot’s gesture is “happy” and a -1 reward when the pilot’s gesture
    is “unhappy.” For example, the same set of episodes can be trained with different
    reward structures to find out an optimal set for safe operations. The training
    process is repeated until convergence of the learning process is achieved. After
    training the agent using a sufficiently large number of episodes, the knowledge
    acquired by the REL agent is expected to represent a novel form of AI that directs
    the pilot with accurate instructions for various phases of flight. Figure [9-1](#Fig1)
    shows a learning framework of an REL agent and its interactions with the flight
    simulator and the computer vision system that detects the pilot’s gesture for
    receiving rewards to update the *Q*(*s,a*) function, where *s* is the current
    state and *a* is the action, and the policy is *π*(*s,a*).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先考虑一种闭环方法来开发一个强化学习代理（REL agent），它可以利用人工智能来确定人类飞行员的动作并计算奖励。这种强化学习代理通过在模拟器中飞行飞机时生成的场景进行训练；即，在计算机上。在典型场景中，强化学习代理为飞行员提供一系列要遵循的动作。这些指令会产生两种结果之一，要么成功要么失败。代理观察到飞行员的心理学反应以及飞行环境，并收到正面或负面的奖励。当飞行员的表情是“快乐”时，代理收到+1的奖励，当飞行员的表情是“不快乐”时，代理收到-1的奖励。例如，可以使用不同的奖励结构对同一组场景进行训练，以找出安全操作的最佳组合。训练过程会重复进行，直到学习过程收敛。在用足够多的场景训练代理后，预期强化学习代理获得的知识将代表一种新型的AI，它通过准确的指令指导飞行员在飞行各个阶段的操作。图[9-1](#Fig1)显示了强化学习代理的学习框架及其与飞行模拟器和检测飞行员手势以接收奖励以更新*Q*(*s,a*)函数的计算机视觉系统的交互，其中*s*是当前状态，*a*是动作，策略是*π*(*s,a*)。
- en: '![](../images/494112_1_En_9_Chapter/494112_1_En_9_Fig1_HTML.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_9_Chapter/494112_1_En_9_Fig1_HTML.jpg)'
- en: A flowchart of R E L has the components in 2 columns. Flight simulator dynamics
    and pilot actions on the left and right, respectively, have a double-headed arrow
    between them. Pilot actions point to is the pilot happy? No, reward equals minus
    1\. Yes, reward equals plus 1 in the left column. Reward points to R L agent,
    Q; s, a, pi of s, a below it.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: R E L 的流程图包含 2 列组件。左侧是飞行模拟器动力学，右侧是飞行员动作，它们之间有一个双箭头。飞行员动作指向的是飞行员是否高兴？不，奖励等于 -1。是，左列中的奖励等于
    +1。奖励指向 R L 代理，Q；s，a，s 下的 a，π。
- en: Figure 9-1
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-1
- en: A framework for the reinforcement learning (REL) agent and its interactions
    with its environment, consisting of the flight simulator and the pilot’s gesture-recognition
    system
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习 (R E L) 代理及其与环境的交互框架，包括飞行模拟器和飞行员手势识别系统
- en: Flight Simulator Game Framework
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 飞行模拟器游戏框架
- en: Figure [9-2](#Fig2) shows a game framework in a flight simulator for generating
    the states, actions, rewards, *Q* function, and policy. The flight simulator game
    framework has an additional local reward and a long-term reward compared to the
    reward structure of the REL agent. The game REL agent in the flight simulator
    game framework receives as additional reward of -1 for each instance of a state
    variable’s gradient falling outside the safe range. An optional long-term reward
    of +2 is also awarded to the game REL agent when the total time taken to reach
    the destination is below a preset value. The REL agent will receive a reward of
    +1 when all of the state variable’s derivatives are within the safe range. The
    choice of rewards is arbitrary and can evolve to a more realistic one based on
    various episodes. A game simulator module initiates the game by extracting actions,
    using the current policy to simulate the flight dynamics. Then, two other modules
    evaluate the flight dynamics and the gesture of the pilot to identify the rewards.
    Then, the *Q*(*s,a*) function is calculated and updated for each state–action
    pair and the associated reward. The policy *π*(*s,a*) is then recalculated from
    the *Q*(*s,a*) values and updated.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-2](#Fig2) 展示了在飞行模拟器中生成状态、动作、奖励、*Q* 函数和策略的游戏框架。与 R E L 代理的奖励结构相比，飞行模拟器游戏框架具有额外的局部奖励和长期奖励。在飞行模拟器游戏框架中，当状态变量的梯度超出安全范围时，游戏
    R E L 代理将获得额外的奖励 -1。当达到目的地所需的总时间低于预设值时，游戏 R E L 代理还将获得可选的长期奖励 +2。当所有状态变量的导数都在安全范围内时，R
    E L 代理将获得奖励 +1。奖励的选择是任意的，可以根据各种场景逐渐演变成更现实的一种。游戏模拟器模块通过提取动作，使用当前策略模拟飞行动力学来启动游戏。然后，其他两个模块评估飞行动力学和飞行员的动作以确定奖励。然后，计算并更新每个状态-动作对的
    *Q*(*s,a*) 函数和相关的奖励。然后，根据 *Q*(*s,a*) 值重新计算策略 *π*(*s,a*) 并更新。
- en: '![](../images/494112_1_En_9_Chapter/494112_1_En_9_Fig2_HTML.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_9_Chapter/494112_1_En_9_Fig2_HTML.jpg)'
- en: 'A flowchart of a flight simulator game has the following steps. Initial state:
    s. Action: a, next state: s prime. Simulate dynamics. Evaluate dynamics. Identity
    reward. Game R L agent with the components calculate Q of s, a, and update policy,
    pi of s, a. Game R L agent points to policy: pi of s, a that points to initial
    state and next state.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 飞行模拟器游戏流程图有以下步骤。初始状态：s。动作：a，下一个状态：s'。模拟动力学。评估动力学。识别奖励。游戏 R L 代理包含计算 s，a 的 Q
    值并更新策略 π 的组件。游戏 R L 代理指向策略：指向初始状态和下一个状态的 π。
- en: Figure 9-2
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-2
- en: The game framework for flight simulator as a game for obtaining the states,
    actions, rewards, Q function, and policy
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 飞行模拟器作为游戏以获取状态、动作、奖励、Q 函数和策略的框架
- en: Summary
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter presented a novel theme of aviation with the injection of AI in
    the form of an REL agent that learns flying skills by observing the pilot’s psychological
    reaction and flight path in a simulator. A unique feature of this AI framework
    is that the pilot and the REL agent learn flying skills simultaneously, forming
    a symbiotic relationship.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提出了一个新颖的航空主题，通过注入学习飞行技能的 R E L 代理形式的 AI 来实现。这个 AI 框架的独特之处在于飞行员和 R E L 代理同时学习飞行技能，形成了一种共生关系。
- en: In this context, identifying suitable methods for detecting pilot behavior is
    key to developing an AI based on reinforcement learning. With sufficient training
    within the proposed framework, the REL agent is expected to learn to fly the aircraft
    as well as to guide the pilot for safe aviation.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，确定检测飞行员行为的合适方法是开发基于强化学习的AI的关键。在所提出的框架内进行足够的训练后，预计REL代理能够学会驾驶飞机，并为安全航空提供飞行员指导。
- en: Policies and Value Functions
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 策略和价值函数
- en: Policy map states to actions
  id: totrans-64
  prefs:
