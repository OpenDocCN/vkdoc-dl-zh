  type: TYPE_NORMAL
  zh: 将策略映射到动作
- en: Probability of taking - action *a* while in state *s*
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在状态 *s* 下采取动作 *a* 的概率
- en: '*π*(*a*| *s*) = ℙ[*A*[*t*] = *a*| *S*[*t*] = *s*]'
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*π*(*a*| *s*) = ℙ[*A*[*t*] = *a*| *S*[*t*] = *s*]'
