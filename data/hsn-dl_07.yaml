- en: 6\. Miscellaneous
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 杂项
- en: As in the case of Neural Networks, we can use L1 or L2 or L1`–`L2 regularizations.
    The constraints of the weights can also be specified using the layer's weight
    constraint class.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 与神经网络的情况一样，我们可以使用 L1 或 L2 或 L1–L2 正则化。也可以使用层的权重约束类来指定权重的约束。
- en: Having seen the building blocks of a sequential model and an overview of keras.layers,
    let us create a model to classify digits of the MNIST dataset.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在了解了顺序模型的基本构建块和 keras.layers 的概述之后，让我们创建一个模型来对 MNIST 数据集的数字进行分类。
- en: 'MNIST Dataset Classification Using LeNet: Prerequisite'
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 LeNet 对 MNIST 数据集进行分类：先决条件
- en: Let us try to understand the layers by creating a simple dense network using
    ***keras.layers***. The reader is expected to write a code that implements a simple
    model to classify the MNIST dataset. The model should contain three layers having
    20, 10, and 5 neurons, respectively. The Appendix A, given at the end of this
    book, discusses the training and evaluation of the models. The Appendix A also
    includes the code. However, try not to refer to the code before trying the task.
    You should get an accuracy of more than 90% using this model. Also, report the
    effect of change of the activation functions and the number of neurons in the
    hidden layer on the performance of the model.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过创建一个简单的密集网络来尝试理解层，使用 ***keras.layers***。读者被期望编写一个实现简单模型的代码，用于对 MNIST 数据集进行分类。该模型应包含三个层，分别有
    20、10 和 5 个神经元。本书末尾的附录 A 讨论了模型的训练和评估。附录 A 还包括了代码。然而，在尝试任务之前，尽量不要参考代码。使用此模型，你应该获得超过
    90% 的准确率。此外，报告激活函数的变化和隐藏层神经元数量的变化对模型性能的影响。
- en: The implementation of this task using LeNet is given in the next section. The
    reader is expected to compare the outputs of the two implementations, the number
    of trainable parameters, and the time required for training the models.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分将给出使用 LeNet 实现此任务的示例。读者被期望比较两种实现的输出、可训练参数的数量以及训练模型所需的时间。
- en: So far we have learned the creation of a model and its compilation. Let us now
    have a look at some of the most popular CNN models.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经学习了模型的创建和编译。现在让我们看看一些最流行的 CNN 模型。
- en: LeNet
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LeNet
- en: LeNet was one of the first CNN models, which was successfully applied to handwritten
    digit recognition. This model laid the foundation of Convolutional Neural Networks.
    The model was developed at Bell Labs and applied the backpropagation algorithm
    to CNN. It had better generalization capabilities as compared with the single-layer
    networks as established by the paper [[2](#CR2)] by the creator Yann LeCun. The
    proposed model displayed excellent performance, giving an error rate of just 1%.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 是第一个成功应用于手写数字识别的 CNN 模型之一，为卷积神经网络奠定了基础。该模型在 Bell Labs 开发，并将反向传播算法应用于 CNN。与单层网络相比，它具有更好的泛化能力，正如创建者
    Yann LeCun 在论文 [[2](#CR2)] 中所提出的。该提出的模型表现出色，错误率仅为 1%。
- en: Structure
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结构
- en: 'The structure of this model would inspire many others and prove a milestone
    in Deep Learning research. Originally, the convolutions were referred to as the
    receptive fields. The pooling layers of this model perform average pooling. LeNet-5
    had the following layers:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型的结构将激励许多其他模型，并在深度学习研究中证明是一个里程碑。最初，卷积被称为感受野。该模型的池化层执行平均池化。LeNet-5 具有以下层：
- en: The first layer of the model is a convolutional layer with six kernels of size
    5 × 5.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的第一层是一个具有 5 × 5 大小六个核的卷积层。
- en: The next layer is a pooling layer, which converts the input to 14 × 14 by using
    a 2 × 2 average pooling.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一个层是一个池化层，它通过使用 2 × 2 平均池化将输入转换为 14 × 14。
- en: The next layer is a convolutional layer followed by a pooling layer similar
    to the second layer of this model.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一个层是一个卷积层，后面跟着一个与该模型第二层类似的池化层。
- en: The fifth layer is a flattening layer, and the sixth layer is a fully connected
    layer with 120 units.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第五层是一个展平层，第六层是一个具有 120 个单元的全连接层。
- en: The seventh layer is a fully connected layer with 84 units and an activation.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第七层是一个具有 84 个单元和激活功能的全连接层。
- en: The last layer is the output softmax layer, which is of size ten neurons.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后一层是输出 softmax 层，包含十个神经元。
- en: Figure [7-1](#Fig1) shows the structure of LeNet.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [7-1](#Fig1) 展示了 LeNet 的结构。
- en: '![](../images/611710_1_En_7_Chapter/611710_1_En_7_Fig1_HTML.jpg)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_7_Chapter/611710_1_En_7_Fig1_HTML.jpg)'
- en: Figure 7-1
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-1
- en: The structure of LeNet
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 的结构
- en: Note that the size of the kernels in LeNet is small. This means the number of
    parameters to be learned is reduced, hence alleviating the performance of the
    network. This was necessary as these networks were designed in the late 1990s
    when the computational power of machines was limited. It may also be noted that
    the presence of small kernels hinders the capacity of the network to learn complex
    patterns, hence mitigating the chances of overfitting.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到 LeNet 中的核大小很小。这意味着需要学习的参数数量减少，从而减轻了网络的性能。这在1990年代末这些网络被设计出来时是必要的，因为那时的机器计算能力有限。还应该注意的是，小核的存在阻碍了网络学习复杂模式的能力，从而降低了过拟合的风险。
- en: The choice of stride in a CNN also affects the performance of the model. The
    use of appropriate stride strikes a balance between the dimensionality of feature
    maps and the extraction of pertinent information. If the stride is too large,
    then it leads to loss of information.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在 CNN 中步长的选择也会影响模型的性能。使用适当的步长在特征图维度和提取相关信息之间取得平衡。如果步长太大，则会导致信息丢失。
- en: LeNet uses average pooling in place of max pooling, as max pooling extracts
    the most important part, whereas average pooling extracts the average information
    from the region, hence preserving the special structure**.**
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 使用平均池化代替最大池化，因为最大池化提取最重要的部分，而平均池化则从区域中提取平均信息，从而保留了特殊结构**。**
- en: Implementation
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实现
- en: The following code implements the LeNet-5 model. The data is loaded and split
    into the train and the test set. Since the input images are 28 × 28 but LeNet
    takes 32 × 32 as input, padding is done. Note that the padding is done only in
    the second and the third dimensions as the first dimension represents the number
    of samples. The model is then created.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码实现了 LeNet-5 模型。数据被加载并分割为训练集和测试集。由于输入图像是 28×28，但 LeNet 使用 32×32 作为输入，因此进行了填充。请注意，填充仅在第二和第三维度上进行，因为第一维度表示样本数量。然后创建模型。
- en: '**Step 1**: This step involves loading the data and obtaining the train and
    the test data:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1**：这个步骤涉及加载数据并获得训练数据和测试数据：'
- en: '[PRE17]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**Step 2**: Padding is done to convert 28 × 28 images to 32 × 32 images:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2**：进行填充以将 28×28 图像转换为 32×32 图像：'
- en: '[PRE18]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '**Step 3**: In this step, the train and the test data are normalized, and the
    label is converted to a one-hot form:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3**：在这个步骤中，训练数据和测试数据被归一化，标签被转换为独热编码形式：'
- en: '[PRE19]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '**Step 4**: In this step, the model is crafted. This model consists of the
    following layers:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4**：在这个步骤中，构建模型。该模型由以下层组成：'
- en: The first layer is a convolutional layer with six filters having kernel size
    (5,5).
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一层是一个具有六个滤波器、核大小为（5,5）的卷积层。
- en: The second layer is an average pooling layer of size (2,2).
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二层是一个大小为（2,2）的平均池化层。
- en: The third layer is a convolutional layer with 16 filters having kernel size
    (5,5).
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三层是一个具有16个滤波器、核大小为（5,5）的卷积层。
- en: The fourth layer is an average pooling layer again of size (2,2).
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第四层再次是一个大小为（2,2）的平均池化层。
- en: The fifth layer is a flattening layer.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第五层是一个展平层。
- en: The sixth layer is a fully connected layer with 120 units and ReLU activation.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第六层是一个包含120个单元的完全连接层，并使用 ReLU 激活。
- en: The seventh layer is a fully connected layer with 84 units and ReLU activation.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第七层是一个包含84个单元的完全连接层，并使用 ReLU 激活。
- en: The last layer is the output softmax layer, which is of size ten neurons (one
    of ten digits).
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后一层是输出 softmax 层，大小为十个神经元（十个数字中的一个）。
- en: '[PRE20]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '**Step 5**: This step involves training the model. Note that the batch size
    is taken as 128:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 5**：这个步骤涉及训练模型。注意批大小被设置为128：'
- en: '[PRE21]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '**Output:**'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出**：'
- en: '[PRE22]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '**Step 6 (a)**: The training loss and the validation loss are then analyzed:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 6（a）**：然后分析训练损失和验证损失：'
- en: '[PRE23]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '**Output:**'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出**：'
- en: '![](../images/611710_1_En_7_Chapter/611710_1_En_7_Figa_HTML.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_7_Chapter/611710_1_En_7_Figa_HTML.jpg)'
- en: '**Step 6 (b)**: The training accuracy and the validation accuracy are then
    analyzed:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 6（b）**：然后分析训练准确率和验证准确率：'
- en: '[PRE24]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: '**Output:**'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出**：'
- en: '![](../images/611710_1_En_7_Chapter/611710_1_En_7_Figb_HTML.jpg)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_7_Chapter/611710_1_En_7_Figb_HTML.jpg)'
- en: Having seen the architecture of LeNet and its application to the MNIST dataset,
    let us now move to another popular CNN, namely, AlexNet.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在了解了LeNet的架构及其在MNIST数据集上的应用后，我们现在转向另一个流行的CNN，即AlexNet。
- en: AlexNet
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AlexNet
- en: 'AlexNet was developed by Alex Krizhevsky, a Ukraine-born computer scientist.
    It is a CNN model, which won the ImageNet 2012 challenge. It was inspired by LeNet
    and had eight layers. This model used max pooling as against average pooling in
    LeNet-5\. The model laid stress on the depth and used GPUs for training. AlexNet
    challenged the CNN models prevalent at that time, by reducing the training time,
    still improving the performance. The following features made AlexNet stand apart:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: AlexNet是由乌克兰出生的计算机科学家Alex Krizhevsky开发的。它是一个CNN模型，赢得了2012年的ImageNet挑战赛。它受到LeNet的启发，有八个层。这个模型使用最大池化而不是LeNet-5中的平均池化。该模型强调深度并使用GPU进行训练。AlexNet通过减少训练时间，同时提高性能，挑战了当时盛行的CNN模型。以下特征使AlexNet脱颖而出：
- en: 'Relu Activation: AlexNet used Rectified Linear Units instead of the popular
    sigmoid or the tanh function. This drastically reduced the time and helped this
    model achieve a 25% error rate on the CIFAR-10 dataset.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ReLU激活：AlexNet使用了修正线性单元（Rectified Linear Units）而不是流行的sigmoid或tanh函数。这大大减少了时间，并帮助这个模型在CIFAR-10数据集上实现了25%的错误率。
- en: 'GPU: AlexNet used multiple GPUs and divided the model neurons among them.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPU：AlexNet使用了多个GPU，并将模型神经元分配给它们。
- en: 'Concept of Overlapping Pooling: The authors introduced the concept of overlapping
    pooling and established that this leads to less overfitting. This also improved
    its error rate.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重叠池化概念：作者引入了重叠池化的概念，并证明这会导致更少的过拟合。这也提高了其错误率。
- en: AlexNet was the winner of the ImageNet Large Scale Visual Recognition Challenge,
    in 2012\. It had eight layers and was initially trained on more than 1,000,000
    images. It could classify the images into 1000 classes and is generally considered
    better than LeNet. As per [[3](#CR3)], the top 1% and top 5% error rates achieved
    with the help of this network were 37.5% and 17%, respectively. The total number
    of parameters in this network was around 60,000,000\. The following discussion
    describes why this network performed much better than previously developed networks.
    The structure of this network is as follows.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: AlexNet在2012年赢得了ImageNet大规模视觉识别挑战赛。它有八个层，最初在超过100万张图像上进行了训练。它可以对图像进行1000个类别的分类，通常被认为比LeNet更好。根据[[3](#CR3)]，借助这个网络实现的前1%和前5%错误率分别为37.5%和17%。这个网络的总参数数量约为6000万个。以下讨论描述了为什么这个网络比之前开发的网络表现更好。这个网络的结构如下。
- en: '**Structure:**'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '**结构：**'
- en: The model contains the Conv2D, activation, pooling, softmax, and dense layers,
    arranged as discussed in the code that follows.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型包含Conv2D、激活、池化、softmax和密集层，按照随后的代码中讨论的顺序排列。
- en: '**Code:**'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE25]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: The major problem with the above architecture is the inability of a single GPU
    (GTX 580) available at that time to house all the training data, as they needed
    1.2 million examples to train the network. To handle this they used multiple GPUs
    (two in particular) and divided the kernels among them. For example, in the first
    convolutional layer, the number of kernels was 96, and each GPU was provided with
    48 of them. Likewise, for the second each was provided with 128 of them. The third,
    fourth, and fifth were also divided accordingly. Refer to Figure [7-2](#Fig2)
    [[1](#CR1)] in which the parallelization scheme is shown.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 上文架构的主要问题是当时可用的单个GPU（GTX 580）无法容纳所有训练数据，因为它们需要120万个示例来训练网络。为了处理这个问题，他们使用了多个GPU（特别是两个），并将内核分配给它们。例如，在第一个卷积层中，内核的数量是96，每个GPU分配到了48个。同样，对于第二个卷积层，每个GPU分配到了128个。第三、第四和第五个卷积层也相应地分配。请参阅图[7-2](#Fig2)
    [[1](#CR1)]，其中显示了并行化方案。
- en: '![](../images/611710_1_En_7_Chapter/611710_1_En_7_Fig2_HTML.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_7_Chapter/611710_1_En_7_Fig2_HTML.jpg)'
- en: Figure 7-2
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-2
- en: The structure of AlexNet as shown in the original paper [[1](#CR1)]
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 原始论文中展示的AlexNet结构 [[1](#CR1)]
- en: As per the paper, the above trick reduced the top 1% error by 1.7%. The author
    also employed local response normalization in which the activity of a neuron was
    normalized vis-a-vis the adjacent kernels “at the same spatial positions.” They
    also employed overlapping pooling as against the conventional non-overlapping
    pooling used in the earlier architectures.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 根据论文，上述技巧将前1%的错误率降低了1.7%。作者还采用了局部响应归一化，其中神经元的活性相对于“在同一空间位置”的相邻内核进行了归一化。他们还采用了重叠池化，而不是早期架构中使用的传统非重叠池化。
- en: 'In order to reduce overfitting, two major tricks were used: one was data augmentation,
    which effectively means to artificially increase the dataset by preserving the
    corresponding labels. They use the concept of generating the augmented data and
    not storing in the memory. The other method they employed for reducing the overfitting
    was dropout. They used p = 0.5 in each of the hidden neurons. This reduced the
    overfitting but doubled the number of iterations required for coverage.'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减少过拟合，使用了两个主要的技巧：一个是数据增强，这实际上意味着通过保留相应的标签来人工增加数据集。他们使用生成增强数据的概念，而不是存储在内存中。他们用来减少过拟合的另一种方法是dropout。他们在每个隐藏神经元中使用p
    = 0.5。这减少了过拟合，但将所需的迭代次数翻倍以实现覆盖。
- en: This architecture was far better than LeNet, but more effective and efficient
    architectures were yet to come. The next section presents some such architectures.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构比LeNet好得多，但更有效率和效率的架构还有待出现。下一节将介绍一些这样的架构。
- en: Some More Architectures
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一些其他架构
- en: GoogLeNet
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GoogLeNet
- en: GoogLeNet was the winner of the 2014 ILSVRC competition. The model was originally
    called Inception V1, as it introduced the inception block. The block uses three
    filters of sizes ranging from 1 × 1 to 5 × 5\. This allowed the model to capture
    the course as well as the finer details. It may be noted that the model confirms
    the computations by adding a bottleneck of 1 × 1\. The model also used sparse
    connections and normalization. The global average pooling, in the last layer,
    and the RmsProp optimizer were used in the model. The model was heterogeneous,
    and the topology needed management in each module. The feature space was being
    drastically reduced in the next layer, therefore leading to the possibility of
    a loss of important information.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: GoogLeNet在2014年的ILSVRC竞赛中获胜。该模型最初被称为Inception V1，因为它引入了Inception模块。该模块使用从1×1到5×5不同尺寸的三个过滤器。这使得模型能够捕捉到粗略的细节以及更精细的细节。需要注意的是，模型通过添加1×1的瓶颈来确认计算。该模型还使用了稀疏连接和归一化。在最后一层中使用了全局平均池化和RmsProp优化器。该模型是非同质的，每个模块都需要管理拓扑结构。在下一层中，特征空间被大幅减少，因此可能导致重要信息的丢失。
- en: The inception module includes the combination of convolutional layers having
    different kernel sizes and pooling layers. These multiple branches extract the
    features at different scales, thus generating a richer set of features, hence
    recognizing the complex patterns. This also makes the network more efficient.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: Inception模块包括具有不同核大小的卷积层和池化层的组合。这些多个分支在不同尺度上提取特征，从而生成更丰富的特征集，因此能够识别复杂的模式。这也使得网络更加高效。
- en: ResNet
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ResNet
- en: ResNet was the winner of the 2015 ILSVRC competition. It is a 152-layer-deep
    CNN. Despite being deeper as compared with AlexNet and VGG, it demonstrated lesser
    computational complexity. This model introduced the concept of residual learning.
    As a matter of fact, ResNet gained a 28% improvement on the famous image recognition
    benchmark dataset named COCO. The idea of bypassing the pathways used in Highway
    Networks was exploited in the model to address the issues in training the networks.
    ResNet introduced shortcut connections within layers to enable cross-layer connectivity.
    This sped up the convergence of deep networks, thereby providing the ability to
    avoid gradient diminishing problems to the ResNet.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet在2015年的ILSVRC竞赛中获胜。它是一个152层的深度卷积神经网络。尽管与AlexNet和VGG相比更深，但它展示了更低的计算复杂度。该模型引入了残差学习的概念。实际上，ResNet在著名的图像识别基准数据集COCO上提高了28%。模型利用了在Highway
    Networks中使用的路径的绕过思想来解决网络训练中的问题。ResNet在层内引入了快捷连接以实现跨层连接。这加快了深度网络的收敛速度，从而为ResNet提供了避免梯度消失问题的能力。
- en: DenseNet
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: DenseNet
- en: This model was conceived to solve the vanishing gradient problem. This model
    connected each preceding layer to all the next layers in a feed-forward fashion.
    This implies that the feature maps of all the previous layers were used as inputs
    into all subsequent layers [[4](#CR4)]. This provides the ability to explicitly
    differentiate between information that is added to the network and information
    that is preserved to the network. However, this model is parametrically pricey
    especially on increasing the number of feature maps. Take a pause and think if
    this CNN can be considered a sequential model.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型是为了解决梯度消失问题而设计的。这个模型以前馈方式将每个前一层连接到所有下一层。这意味着所有前层的特征图都被用作后续所有层的输入 [[4](#CR4)]。这提供了显式区分添加到网络中的信息和保留在网络中的信息的能力。然而，这个模型在增加特征图数量时参数化成本很高。暂停一下，思考一下这个CNN是否可以被认为是序列模型。
- en: Conclusion
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: CNNs are generally used for images. Their performance on images is far superior
    vis-à-vis the MLPs. The last two chapters discussed the basics of CNNs, various
    models, and implementations. The chapters presented implementations from scratch
    and the use of Keras. The reader should be able to implement the models and make
    changes in the existing models. However, in some of the models, the number of
    learnable parameters is huge. In the next chapters, we will learn how to deal
    with this problem.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: CNNs通常用于图像。它们在图像上的性能远优于MLPs。后两章讨论了CNN的基本原理、各种模型和实现。这些章节从头开始介绍了实现和使用Keras。读者应该能够实现这些模型并在现有模型中进行修改。然而，在某些模型中，可学习的参数数量非常大。在下一章中，我们将学习如何处理这个问题。
- en: Having learned MLPs and CNNs, the next chapters deal with the applications of
    these CNNs in object recognition and segmentation. Before that let's test what
    we have learned.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习了MLPs和CNNs之后，下一章将讨论这些CNN在目标识别和分割中的应用。在那之前，让我们测试一下我们所学的。
