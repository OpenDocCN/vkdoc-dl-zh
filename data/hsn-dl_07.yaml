  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 初始化权重
- en: The weights can be created only if the size of the input is known in advance.
    Initially, when the weights are not provided, there are no weights. The weights
    are created when the shape of the input is specified. The weights of a layer can
    be seen using the **layers.weights**. The following code creates a dense layer
    having ten neurons. When an input of size 5 × 5 is given to the layer, the shape
    of the weights so created becomes TensorShape([5, 10]). This is also applicable
    to sequential models.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 只有在事先知道输入大小的情况下才能创建权重。最初，当未提供权重时，没有权重。当指定输入的形状时创建权重。可以使用 **layers.weights**
