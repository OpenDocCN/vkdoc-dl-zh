  zh: 在看到序列模型的创建之后，我们现在简要讨论一下 Keras 层。
- en: Keras Layers
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Keras 层
- en: The Keras Layers application programming interface provides TITO (Tensor In
    Tensor Out) functions and the corresponding weights. In the training part, when
    a layer receives the data, the weights are stored in **layers.weights**. Some
    of the important layers of this interface are as follows.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Keras 层应用程序编程接口提供了 TITO (Tensor In Tensor Out) 函数及其相应的权重。在训练部分，当层接收到数据时，权重存储在
    **layers.weights** 中。此接口的一些重要层如下。
