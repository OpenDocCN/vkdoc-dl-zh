- en: 11. Geospatial Guidance for AI Rover
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 为人工智能探测车提供地理空间导航
- en: Throughout this chapter, you will learn about geospatial data, how Geographic
    Information Systems (GIS) is incorporated into AI, and the rover's navigation
    awareness. You will come to understand and develop the first navigational GIS
    routines for this rover.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将了解地理空间数据，地理信息系统（GIS）如何融入人工智能，以及探测车的导航意识。你将学会理解和开发为这辆探测车设计的第一个导航GIS程序。
- en: Where you are located can be a simple question to answer for humans. We gather
    data from the world around us using our senses. The brain processes this information
    into a location. We then use additional data to confirm that location. The AI
    rover will need to do the same thing using systems and programming loaded onto
    the rover.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人类来说，确定自己的位置可能是一个简单的问题。我们通过感官收集周围世界的数据。大脑将这些信息处理成位置。然后我们使用额外的数据来确认这个位置。人工智能探测车将需要使用加载到探测车上的系统和编程来完成同样的任务。
- en: The Need for Geospatial Guidance
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 地理空间导航的需求
- en: The AI rover will use geospatial data to locate itself. This data is not unique;
    it is used everywhere and in many different fields, such as transportation, archeology,
    earth sciences, agriculture, and many more. Geospatial data is anything that has
    a spatial component related to a location. This location could be on Earth, in
    the oceans (beneath or on the surface), in the solar system, on the moon, or other
    celestial bodies, and the hot-topic area that a lot of geospatial work is being
    performed in relation to is Mars. The many rovers and UAS on Mars are all using
    geospatial data to operate in that environment.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能探测车将使用地理空间数据来确定自己的位置。这些数据并非独一无二；它们被广泛应用于各个领域，如交通、考古学、地球科学、农业等。地理空间数据是指与位置相关的任何具有空间成分的数据。这个位置可能位于地球、海洋（水下或海面）、太阳系、月球或其他天体，而许多地理空间工作都在火星上进行，这是一个热门领域。火星上的许多探测车和无人机都在使用地理空间数据在该环境中运行。
- en: 'To understand geospatial data, we have to have an understanding of geomatics.
    The umbrella discipline of geomatics provides the foundational tools that geospatial
    data uses. These tools include storage, analysis, collection methodologies, and
    dissemination techniques. Geomatics involves several sub-disciplines. Each of
    these disciplines is sophisticated enough to be its own specialty in and of itself.
    Many professionals will focus their entire careers on just one of these disciplines.
    Geomatics contains the following disciplines: surveying, geodesy, cartography,
    photogrammetry, remote sensing, and geographical information science (GIS). There
    are many more that will not be discussed in this chapter. The AI rover will use
    many facets of each of these disciplines. Thus, an understanding of each of them
    is warranted.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解地理空间数据，我们必须了解测绘学。测绘学的总学科提供了地理空间数据使用的基础工具。这些工具包括存储、分析、收集方法和传播技术。测绘学包括几个子学科。每个学科都足够复杂，可以成为其自身的专业。许多专业人士将他们整个职业生涯都专注于这些学科中的一个。测绘学包含以下学科：测量学、大地测量学、制图学、摄影测量学、遥感学和地理信息系统（GIS）。本章将不讨论更多学科。人工智能探测车将使用这些学科中的许多方面。因此，了解每个学科都是必要的。
- en: The first discipline and the foundation that all others use is geodesy. Geodesy
    is the understanding of the accuracy of our measurements, understanding the Earth’s
    size orientation in space, and knowing how different phenomena impact our location.
    Under geodesy, datums are created for the environment. These datums are used as
    a starting point or a location where zero is measured. There are many different
    types of datums. They can be horizontal or vertical, tidal, local, state, or global.
    These datums can be based on the geode or ellipsoid and can be used in conjunction
    with one another. Geodesy also includes coordinate systems. Common coordinate
    systems are latitude and longitude, Universal Transverse Mercator (UTM), and Military
    Grid Reference System (MGRS). These coordinate systems allow the rover to calculate
    its location and for that location to be easily found by others. A map is then
    used to depict this locational data. Representing a globe poses some problems
    with two-dimensional maps; specifically, the distortions created by defining a
    curved surface on a two-dimensional map. Only a globe would be able to preserve
    all the qualities and minimize distortions. This issue can be solved by using
    projections. These projections are cylindrical, conical, and azimuthal. You now
    know some of the critical principles behind geodesy.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个学科，也是所有其他学科的基础，是大地测量学。大地测量学是理解我们测量的准确性，理解地球在空间中的大小和方向，以及了解不同现象如何影响我们的位置。在大地测量学下，为环境创建了基准面。这些基准面被用作起点或零点测量的位置。存在许多不同类型的基准面。它们可以是水平的或垂直的、潮汐的、局部的、州的或全球的。这些基准面可以基于地球椭球体，并且可以相互结合使用。大地测量学还包括坐标系。常见的坐标系有纬度和经度、通用横轴墨卡托（UTM）和军事网格参考系统（MGRS）。这些坐标系允许漫游者计算其位置，并且其他人可以轻松找到该位置。然后使用地图来描绘这些位置数据。在二维地图上表示地球球体会带来一些问题；具体来说，是在二维地图上定义曲面时产生的扭曲。只有地球球体才能保留所有特性并最小化扭曲。这个问题可以通过使用投影来解决。这些投影是圆柱形、锥形和方位形的。你现在已经了解了一些大地测量学背后的关键原则。
- en: The next discipline is cartography. Cartography is the art, science, and technology
    of creating maps using information from geodesy and other disciplines. Cartography
    in the modern age uses computers to create maps, and on these we can display many
    different types of data. These maps are designed with the end user in mind. Cartography
    products can be topographic maps with contour lines, shaded relief, planimetric,
    and many more. No matter what product is generated, how the end user will use
    the product is the primary focus of cartography. Would a pilot need to know the
    distance between sewer grates?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个学科是制图学。制图学是利用来自大地测量学和其他学科的信息创建地图的艺术、科学和技术。在现代社会，制图学使用计算机来创建地图，在这些地图上我们可以展示许多不同类型的数据。这些地图的设计是以最终用户为出发点的。制图学产品可以是带有等高线的地形图、阴影地形图、平面图以及更多。无论生成什么产品，最终用户如何使用该产品是制图学的首要关注点。飞行员是否需要知道排水沟盖板之间的距离？
- en: Another discipline under geomatics is surveying. Surveying is the direct measurements
    taken using systems such as photogrammetric ground control, GPS, and traditional
    field surveying methods. Traditional field serving techniques for horizontal control
    use traversing, triangulation, and trilateration. In the vertical datum, differential
    and trigonometric leveling are used. Already you can see the complex nature of
    geomatics, where one discipline’s information is required for the others.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个属于测绘学的学科是测量学。测量学是直接使用像摄影测量地面控制、GPS和传统野外测量方法等系统进行的测量。传统的水平控制野外服务技术使用导线、三角测量和三角定位。在垂直基准面上，使用的是水准测量和三角测量。你已经可以看到测绘学的复杂性质，其中某一学科的信息对其他学科是必需的。
- en: GPS is another system used by geomatics. GPS has simplified data collection
    and displays a location on the Earth’s surface. It uses information from GIS,
    surveying, and geodesy in order to display this position. Humans, in general,
    have come to rely on GPS and have a basic understanding of GPS. GPS is a constellation
    of satellites that send a signal down to Earth, which is received by a GPS receiver,
    which then displays our location on a moving map. However, there is much more
    to GPS than what the end user sees. Typical systems today use a combination of
    different GPS systems. This is referred to as the Global Navigation Satellite
    System, or GNSS. The GNSS can use the USA-based GPS, but it also uses other countries’
    GPS systems. The GNSS is preferred because of its higher accuracy.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: GPS是测绘学中使用的另一个系统。GPS简化了数据收集，并在地球表面上显示位置。它利用GIS、测量学和大地测量学中的信息来显示这个位置。人类普遍开始依赖GPS，并对GPS有基本了解。GPS是由卫星组成的星座，这些卫星向地球发送信号，由GPS接收器接收，然后显示我们在移动地图上的位置。然而，GPS的内容远不止终端用户所看到的。当今的典型系统使用不同GPS系统的组合。这被称为全球导航卫星系统，或GNSS。GNSS可以使用基于美国的GPS，但它也使用其他国家的GPS系统。GNSS因其更高的精度而被优先考虑。
- en: The more satellites in view of the receiver, the better accuracy you will get
    in the form of an average position. For any GPS, there are three main components.
    The first is the control segment. The control segment monitors the health of the
    satellite constellation and sends corrections when warranted. The spaceborne is
    the next segment. These are the GPS satellites themselves. GPS satellites are
    placed in orbits that allow the entire Earth to be covered at any one time. These
    orbits ensure that a minimum number of satellites are in view to localize your
    position. The last segment is the user. This segment requires a receiver that
    can receive the GPS satellites’ specific signals. Computational processing and
    a display are also a part of this system. The primary function of GPS is triangulation
    and uses the time-of-arrival concept. The satellite transmits a signal that travels
    from the satellite to the receiver. The receiver will process the distance from
    that specific satellite. The GPS uses this distance and distances from additional
    satellites, and the receiver unit can then triangulate your position on Earth.
    You need three satellites in view for a horizontal position, and to add a vertical
    position, the number increases to four satellites.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 接收器视野中的卫星越多，你将获得更好的平均位置精度。对于任何GPS，有三个主要组成部分。第一个是控制段。控制段监控卫星星座的健康状况，并在必要时发送校正。下一个部分是空间段。这些就是GPS卫星本身。GPS卫星被放置在轨道上，使得在任何时候都能覆盖整个地球。这些轨道确保至少有少量卫星在视野中，以便定位你的位置。最后一个部分是用户。这一部分需要一个能够接收GPS卫星特定信号的接收器。计算处理和显示也是这个系统的一部分。GPS的主要功能是三角测量，并使用到达时间概念。卫星发送一个从卫星到接收器的信号。接收器将处理从那个特定卫星的距离。GPS使用这个距离以及来自其他卫星的距离，接收器单元然后可以三角测量你在地球上的位置。为了获得水平位置，你需要看到三个卫星，为了添加垂直位置，卫星的数量增加到四个。
- en: The last component of geomatics this chapter will discuss is remote sensing.
    Remote sensing relies on gathering data without being in direct contact with the
    analyzed object. This can be accomplished with sensors that use areas in the visual
    spectrum as well as outside it. There are a variety of sensors that could be used
    for remote sensing, including electro-optical, infrared, multispectral, hyperspectral,
    chemical, biological, or nuclear. These are all passive sensors, meaning they
    receive information but do not transmit. An active sensor, such as ultrasonic,
    LiDAR, and RADAR, transmits energy that bounces off an object and is then received.
    These sensors, if attached to the AI rover, provide two benefits. The first is
    that these sensors could be coupled with AI sensing to identify and avoid objects
    that could stop the rover in its path. The second benefit is that all the data
    collected could be analyzed after the rover returned to the entrance.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将要讨论的地理信息学的最后一个组成部分是遥感。遥感依赖于在不直接接触分析对象的情况下收集数据。这可以通过使用视觉频谱区域以及之外的传感器来实现。可用于遥感的传感器种类繁多，包括光电、红外、多光谱、超光谱、化学、生物或核传感器。这些都是被动传感器，意味着它们接收信息但不传输。一种主动传感器，如超声波、激光雷达和雷达，会发射能量，该能量从物体上反射回来，然后被接收。如果将这些传感器连接到人工智能漫游车，将提供两个好处。第一个好处是这些传感器可以与人工智能感知相结合，以识别和避开可能阻碍漫游车前进路径的物体。第二个好处是收集的所有数据都可以在漫游车返回入口后进行分析。
- en: The multispectral and hyperspectral sensors gather data in targeted bands of
    the EM spectrum and produce a spectral signature. This spectral signature can
    be compared to known spectral signatures to identify what the object is made out
    of or composed of, which would be highly beneficial when classifying objects/obstacles.
    RADAR, LiDAR, and ultrasonic sensors are all primary sensors that can map out
    obstacles.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 多光谱和超光谱传感器在电磁频谱的目标波段收集数据，并产生一个光谱特征。这个光谱特征可以与已知的光谱特征进行比较，以确定物体是由什么材料或由什么组成的，这在分类物体/障碍物时将非常有用。雷达、激光雷达和超声波传感器都是可以绘制障碍物地图的主要传感器。
- en: The AI rover will use a variety of sensors and add-ons to navigate and map the
    catacombs of Egypt. This function, at its core, requires the use of many of the
    principles of geomatics. Thus, an understanding is needed of these core functions.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能漫游车将使用各种传感器和附加设备来导航和绘制埃及地下墓穴的地图。这个功能的核心需要使用许多地理信息学的原则。因此，需要了解这些核心功能。
- en: The significant difference the AI rover will encounter is the known versus the
    unknown. Programing a rover to navigate a known space on the surface is relatively
    easy. Let the rover acquire its starting GPS coordinates, and the operator or
    AI will plot the mission in the form of waypoints. The autopilot and connected
    mission planning software make all the calculations necessary. The AI rover starts
    the mission and monitors and makes corrections as the mission progresses. The
    added benefit is that a human operator can monitor the AI rover’s progress via
    a data-link and override or adjust as necessary. Ground, air, or sea, this is
    essentially what uncrewed operators do to gather data. In an open space, with
    access to the operator and GPS, this operation is ideal and has led to a more
    efficient gathering of geospatial data.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能漫游车将遇到的一个显著差异是已知与未知之间的差异。编程漫游车在表面上的已知空间导航相对容易。让漫游车获取其起始GPS坐标，操作员或人工智能将以航点形式规划任务。自动驾驶和连接的任务规划软件进行所有必要的计算。人工智能漫游车开始任务，并在任务进行过程中监控并做出调整。额外的优势是，操作员可以通过数据链路监控人工智能漫游车的进度，并在必要时进行覆盖或调整。地面、空中或海上，这就是无人操作员收集数据的基本做法。在开阔空间，有操作员和GPS的访问权限，这种操作是理想的，并且导致了地理空间数据收集的更高效。
- en: Some different approaches can be used to gather data from the unexplored catacomb
    in Egypt. A simple rover could be built that operates like first-generation robotic
    vacuum cleaners. These vacuums would bounce into an object, turn a set number
    of degrees, and continue vacuuming the house. This created a random pattern of
    cleaning an uncleaned area. Large sections of rooms could be missed if the robot
    wandered into an adjacent room. This form of operation is inefficient. In the
    catacombs, this robot would not be able to return to the starting point. Thus,
    all of the collected data would still be in the catacomb and of no use to researchers.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用一些不同的方法来收集埃及未探索的地下墓穴中的数据。可以建造一个简单的漫游车，其运行方式类似于第一代机器人吸尘器。这些吸尘器会撞到物体，转一个固定的角度，然后继续吸尘房间。这会在未清洁的区域创建一个随机的清洁模式。如果机器人进入相邻的房间，可能会错过房间的大片区域。这种操作方式效率低下。在地下墓穴中，这个机器人无法返回到起始点。因此，所有收集到的数据仍然在地下墓穴中，对研究人员没有用处。
- en: The better approach is to use current terrestrial rovers. This rover would have
    the ability to use GPS to locate itself at a starting point. Couple that with
    real-time kinematics (RTK), and the rover would be able to locate itself to mere
    centimeters. An RTK system uses a fixed base station and a roving station. Both
    of these receive GPS or GNSS signals, and the base station calculates a correction
    that is sent to the roving RTK station to update its position. The issue here
    is that we are operating in a cave, where signal degradation or blocking would
    not permit the corrections to be received by the rover. In addition, being underground,
    the roving RTK station would not receive a GPS or GNSS signal.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的方法是使用当前的地面漫游车。这个漫游车将能够使用GPS确定其在起始点的位置。结合实时运动学（RTK），漫游车将能够将自己定位到厘米级别。RTK系统使用一个固定基站和一个移动基站。这两个基站都接收GPS或GNSS信号，基站计算出校正并将其发送到移动RTK基站以更新其位置。这里的问题是我们在洞穴中运行，信号衰减或阻塞不会允许校正被漫游车接收。此外，由于地下，移动RTK基站不会接收到GPS或GNSS信号。
- en: The last approach that could be utilized is a tethered rover. This system allows
    for an operator to manually pilot the rover. This system will still requires the
    use of onboard sensors to spot objects. The main issue here is that the tether
    would need to be very long and could get caught on obstacles. Having a long tether
    could lead to the loss of the system inside the catacombs. There are benefits
    of this system, such as that the tether could be powered, providing indefinite
    operation of the rover.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一种可能利用的方法是系绳漫游车。这个系统允许操作员手动驾驶漫游车。这个系统仍然需要使用机载传感器来检测物体。这里的主要问题是绳索需要非常长，可能会被障碍物挂住。长绳索可能会导致地下墓穴内部系统的丢失。这个系统的优点是，绳索可以供电，为漫游车提供无限期的运行。
- en: Needless to say, none of these approaches will work very well. Thus, the need
    for a fully autonomous, AI-driven rover that incorporates geospatial guidance
    and data logging into its operation.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 不言而喻，这些方法中的任何一个都不会非常有效。因此，需要一个完全自主、由人工智能驱动的漫游车，该漫游车将地理空间指导和数据记录纳入其操作中。
- en: Why Does the AI Rover Need to Know Where It Is?
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么人工智能漫游车需要知道自己的位置？
- en: Our AI rover is operating in an *almost* entirely unknown environment. There
    is one location that the rover will know when it is powered up. That is the starting
    location. This starting location has many different names associated with it.
    Start point, null point, return home point, home location, etc. Having a known
    location to start from assists the rover in applying the datum to the overall
    operation. A datum is a frame of reference for measurements that all the systems
    onboard the rover will use to navigate, gather, and export data collected. A datum
    includes the coordinate system and projection used in the form of metadata.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的人工智能漫游车在一个几乎完全未知的环境中运行。有一个位置，当漫游车启动时它会知道。那就是起始位置。这个起始位置与许多不同的名称相关联。起点、零点、返回点、家位置等。有一个已知的起始位置有助于漫游车将数据应用于整体操作。数据是一个参考框架，用于测量，所有漫游车上的系统都将使用它来导航、收集和导出收集到的数据。数据包括坐标系统和投影的元数据。
- en: Once the AI rover leaves the starting point, the unknown is encountered. The
    different tunnels, cave-in locations, large rocks, human-made objects, even the
    composition of the ground the rover is traversing is unknown. Humans programming
    the rover will be able to make assumptions based on other catacombs in the area.
    However, these are just assumptions. The rover will need to be able to sense the
    world around it. These sensors come in many forms, such as ultrasonic ranging,
    light detection and ranging (LiDAR), and stereoscopic vision systems.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦人工智能漫游车离开起点，就会遇到未知情况。不同的隧道、坍塌位置、大岩石、人造物体，甚至漫游车正在穿越的地面成分都是未知的。编程漫游车的人类将能够根据该地区的其他地下墓穴做出假设。然而，这些只是假设。漫游车需要能够感知其周围的世界。这些传感器有多种形式，例如超声波测距、光探测与测距（激光雷达）和立体视觉系统。
- en: Ultrasonic sensors are a form of echolocation, similar to what bats and whales
    use to navigate. These sensors send out sound waves that humans cannot hear. This
    wave strikes an object, reflecting some of that energy back to the source. This
    reflection is then what is used to calculate the distance from the object.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 超声波传感器是一种回声定位形式，类似于蝙蝠和鲸鱼用来导航的方式。这些传感器发出人类听不到的声波。这个波撞击一个物体，反射部分能量回到源头。然后，这个反射被用来计算从物体到源头的距离。
- en: LiDAR and RADAR are similar means of active remote sensing. The difference between
    these sensors is what portion of the electromagnetic spectrum these sensors actively
    transmit. LiDAR uses light, and RADAR uses radio waves. Both of these use the
    time-of-flight concept to calculate the distance to the obstacle. Many passes
    of these returns can be used to create a point cloud. The drawback to these sensors
    is that they generate a significant amount of data. This will require additional
    data transfer and storage for further analysis. However, if just used for navigation,
    there is no need for extra storage.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 激光雷达和雷达是类似的活动遥感手段。这些传感器之间的区别在于它们主动传输电磁谱的哪一部分。激光雷达使用光，雷达使用无线电波。这两种都使用飞行时间概念来计算到障碍物的距离。可以使用多次这些返回值来创建点云。这些传感器的缺点是它们会产生大量的数据。这将需要额外的数据传输和存储以进行进一步分析。然而，如果仅用于导航，则不需要额外的存储。
- en: Stereoscopic vision systems are the robotic version of human eyes. Humans have
    taught computers to “see.” These sensors incorporate two electro-optical sensors
    that are a known distance apart. Then, they use the parallax-error concept to
    calculate the distance between the rover and the obstacle. This principle is precisely
    how humans process depth perception.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 立体视觉系统是机器人版的眼睛。人类已经教会计算机“看”。这些传感器集成了两个已知距离的电子光学传感器。然后，它们使用视差误差概念来计算漫游车和障碍物之间的距离。这个原理正是人类处理深度感知的方式。
- en: 'These sensors will sense obstacles and generate raw geospatial data. Geospatial
    data combines two pieces of information: the object’s location as it applies to
    the datum, and an attribute of the object. The geospatial data is then sent to
    the AI to make a decision in regard to the object. If it is a rock, then which
    way should the rover turn to avoid it? Suppose it is two different tunnels; which
    tunnel will it continue down? These are immediate decisions that the rover will
    need to make. However, the AI accepting this raw data and making decisions is
    just one part of the system''s knowing where it currently is. The AI rover will
    also need to store the raw geospatial data and create a detailed map of the locations
    of obstacles. This data is then used to make the most efficient return to the
    home route. The added benefit is that this map and additional data can then be
    downloaded from the rover for archeologists to use in their study of the catacombs.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这些传感器将感知障碍物并生成原始的地理空间数据。地理空间数据结合了两部分信息：物体相对于基准点的位置以及物体的属性。然后，这些地理空间数据被发送到人工智能以对物体做出决策。如果是岩石，那么漫游车应该转向哪个方向以避开它？假设是两个不同的隧道；它将沿着哪个隧道继续前进？这些都是漫游车需要立即做出的决定。然而，人工智能接受这些原始数据并做出决策只是系统知道其当前位置的一部分。人工智能漫游车还需要存储原始地理空间数据并创建障碍物位置的详细地图。然后，这些数据被用来制定最有效的返回路线。额外的优势是，这张地图和附加数据可以从漫游车下载，供考古学家在其对地下墓穴的研究中使用。
- en: How Does GIS Help Our Land-based Rover?
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 地理信息系统如何帮助我们的地面漫游车？
- en: At its core, a geographical information system (GIS) is software and hardware
    that takes data in and allows it to be processed, visualized, analyzed, and published.
    The GIS software that is loaded into the AI rover will take the raw geospatial
    data from the sensors and Robotic Operating System (ROS). This data is then processed
    into useful information that the AI can use for navigation and the creation of
    maps of the catacombs that researchers can use. GIS allows for the creation of
    maps and the ability to analyze or query the data to answer questions we might
    have. Heights and distances are some of the information that can be gathered via
    GIS. GIS is cyclical in nature. The more data we can feed the software, the better
    the products and answers it will produce. Thus, the rover will constantly be providing
    information to the software, and it, in turn, will create maps that the AI rover
    can use for navigation.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，地理信息系统（GIS）是一种软件和硬件，它能够接收数据并进行处理、可视化、分析和发布。加载到AI漫游车中的GIS软件将接收来自传感器和机器人操作系统（ROS）的原始地理空间数据。然后，这些数据被处理成AI可以用于导航和创建研究人员可以使用的地牢地图的有用信息。GIS允许创建地图，并能够分析或查询数据以回答我们可能有的问题。高度和距离是可以通过GIS收集的一些信息。GIS本质上是循环的。我们能够提供给软件的数据越多，它产生的产品和答案就越好。因此，漫游车将不断向软件提供信息，而软件反过来将创建AI漫游车可用于导航的地图。
- en: Which GIS Software Package Do We Use, and Can It Be Used with an ROS-based Rover?
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们使用哪种GIS软件包，并且它是否可以与基于ROS的漫游车一起使用？
- en: Many GIS software packages can be utilized with the AI rover. You may have heard
    of some of them, such as Google Earth or ArcGIS. The software that you will load
    into the rover is QGIS. QGIS is open-source GIS software that has been around
    since 2002\. This software was chosen due to its easy integration into ROS to
    access live data generated by the sensors. This is a vital function, as the sensors
    are going to be feeding QGIS live data. QGIS is plugin based and can run on a
    variety of different platforms, such as Linux, Ubuntu, Windows, and MacOS.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 许多GIS软件包都可以与AI漫游车一起使用。你可能听说过一些，比如谷歌地球或ArcGIS。你将加载到漫游车中的软件是QGIS。QGIS是一种自2002年以来存在的开源GIS软件。选择这款软件是因为它易于集成到ROS中，以便访问由传感器生成的实时数据。这是一个至关重要的功能，因为传感器将向QGIS提供实时数据。QGIS基于插件，可以在多种不同的平台上运行，如Linux、Ubuntu、Windows和MacOS。
- en: Can GIS Be Embedded Within Our AI-Enabled Rover?
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GIS是否可以嵌入到我们的AI增强型漫游车中？
- en: The short answer to this question is yes, it most certainly can! There are quite
    a few options available or custom-coded to work with the rover. However, simplicity
    and cost are key here. Using open-sourced products like QGIS allows one to embed
    GIS into the rover. As QGIS has many plug-in options, we will employ one of these
    in the AI rover. It is called QGIS-ROS. This simple plug-in connects ROS to QGIS
    and requires no coding skills. Simply load the plug-in into ROS. Once the plug-in
    is loaded, then ROS has access to powerful GIS software.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对这个问题的简短回答是肯定的，它绝对可以！有相当多的选项可供选择或定制，以与漫游车一起使用。然而，简单性和成本是这里的关键。使用像QGIS这样的开源产品可以将GIS嵌入到漫游车中。由于QGIS有许多插件选项，我们将在AI漫游车中使用其中之一。它被称为QGIS-ROS。这个简单的插件将ROS连接到QGIS，不需要编程技能。只需将插件加载到ROS中。一旦插件加载，ROS就可以访问强大的GIS软件。
- en: Summary
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We live in a spatial world, with objects having a geographical location that
    can be mapped, analyzed, processed, and published. However, a common frame of
    reference is needed. This is the fundamental principle behind geomatics. Using
    geomatics’ tools will allow our rover to operate in the unknown. The AI rover
    needs to track its location and gather data that can be used for further analysis
    in GIS software. The use of open-source products like QGIS means we can complete
    the mission cost-effectively. Having the AI rover’s ROS at its core integrated
    via the QGIS plug-in means the data is already formatted and can be easily analyzed
    after the mission has been completed.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们生活在一个空间世界中，物体具有可以绘制、分析、处理和发布的地理位置。然而，需要一个共同的参考框架。这是地理测量的基本原则。使用地理测量工具将允许我们的漫游车在未知环境中运行。AI漫游车需要跟踪其位置并收集可用于在GIS软件中进行进一步分析的数据。使用像QGIS这样的开源产品意味着我们可以以成本效益的方式完成任务。AI漫游车的ROS核心通过QGIS插件进行集成，这意味着数据已经格式化，任务完成后可以轻松分析。
- en: Extra Credit
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 额外加分
- en: 'Watch the following video regarding QGIS integration in ROS: [`https://vimeo.com/293539252`](https://vimeo.com/293539252)'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 观看以下关于QGIS在ROS中集成的视频：[https://vimeo.com/293539252](https://vimeo.com/293539252)
- en: QGIS is open source; download it and use the tutorials and videos to understand
    the interface and the operation of the software.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: QGIS 是开源软件；下载它，并使用指南和视频来了解软件的界面和操作。
- en: '[`http://www.qgis.org`](http://www.qgis.org)'
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[`http://www.qgis.org`](http://www.qgis.org)'
- en: 'Manual: [`https://docs.qgis.org/3.10/en/docs/training_manual/index.html`](https://docs.qgis.org/3.10/en/docs/training_manual/index.html)'
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 手册：[`https://docs.qgis.org/3.10/en/docs/training_manual/index.html`](https://docs.qgis.org/3.10/en/docs/training_manual/index.html)
- en: 'Tutorials/training: [`https://training.datapolitan.com/qgis-training/Introduction_to_GIS_Fundamentals/#1`](https://training.datapolitan.com/qgis-training/Introduction_to_GIS_Fundamentals/%25231)'
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指南/培训：[`https://training.datapolitan.com/qgis-training/Introduction_to_GIS_Fundamentals/#1`](https://training.datapolitan.com/qgis-training/Introduction_to_GIS_Fundamentals/%25231)
- en: 'Download the QGIS-ROS plug-in from GitHub: [`https://www.Github.com/locusrobitics/qgis_ros`](https://www.github.com/locusrobitics/qgis_ros)'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 GitHub 下载 QGIS-ROS 插件：[`https://www.Github.com/locusrobitics/qgis_ros`](https://www.github.com/locusrobitics/qgis_ros)
- en: If you have found GIS exciting and would like to learn more, contact your local
    community college, college, or online college and take an introductory class.
    There are many options for careers that one could specialize in.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你觉得地理信息系统（GIS）很有趣并想了解更多，请联系你当地的社区学院、大学或在线大学，并参加入门课程。有很多职业方向可以选择专攻。
