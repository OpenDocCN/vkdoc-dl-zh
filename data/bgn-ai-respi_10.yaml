  type: TYPE_PRE
  zh: '[PRE1]'
- en: Figure [10-2](#Fig2) shows an interactive Python session where I generated several
    populations.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-2](#Fig2) 展示了一个交互式 Python 会话，其中我生成了几个种群。
