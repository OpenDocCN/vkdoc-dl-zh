  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 交互式 Python 会话种群生成
- en: 'The next step in this process is to create a function that measures how well
    a particular individual performs in meeting the stated objective (i.e., integer
    lists values summing to a target value). This function is called a fitness function.
    Note that the fitness function requires the individual function to have been previously
    entered. The following is a code segment implementation for the fitness function:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程的下一步是创建一个函数来衡量特定个体在满足既定目标（即整数列表值求和到目标值）方面的表现如何。这个函数被称为适应度函数。请注意，适应度函数需要先输入个体函数。以下是一个适应度函数的代码段实现：
- en: '[PRE2]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Figure [10-3](#Fig3) shows an interactive Python session where I tested several
    individuals against a constant target value.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-3](#Fig3) 展示了一个交互式 Python 会话，其中我测试了几个个体与一个恒定目标值。
- en: '![A436848_1_En_10_Fig3_HTML.jpg](A436848_1_En_10_Fig3_HTML.jpg)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig3_HTML.jpg](A436848_1_En_10_Fig3_HTML.jpg)'
- en: Figure 10-3.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-3.
- en: Interactive Python session fitness tests
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 交互式 Python 会话适应度测试
- en: This particular fitness function is much simpler than similar fitness tests
    that I have demonstrated in past chapters. In this one, only the absolute value
    of the difference between the summed elements contained in an individual list
    and a target value is calculated. The best case would be a 0.0 value, which I
    will shortly demonstrate.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这个特定的适应度函数比我在过去章节中展示的类似适应度测试要简单得多。在这个例子中，只计算个体列表中包含的元素与目标值之间的差的绝对值。最佳情况是 0.0
    值，我将很快演示。
- en: 'The only missing element in the structure is how to change or evolve the population
    to meet the objective. Only by the purest luck would an initial solution also
    be an optimal solution. There must be a strategy stated to properly implement
    an evolutionary function. The following is the strategy set forth for this structure
    :'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 结构中唯一缺少的元素是如何改变或进化种群以满足目标。只有最纯粹的运气，初始解决方案才会是一个最优解决方案。必须有一个策略来正确实现进化函数。以下是为这个结构提出的策略：
- en: Take 20% of the top performers (elitism rate) from a prior population and include
    them in a new one.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从先前种群中选取表现最好的 20%（精英率）并包含在新种群中。
- en: Breed approximately 75% of the new population as children.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大约繁殖新种群中的 75% 作为子代。
- en: Take the first length/2 elements from a father and the last length/2 elements
    from a mother to form a child.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从父亲那里选取长度的一半元素，从母亲那里选取长度的一半元素来形成子代。
- en: It is forbidden to have a father and a mother as the same individual.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 父亲和母亲不能是同一个个体。
- en: Randomly select 5% from the population.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从种群中随机选择 5%。
- en: Mutate 1% of the new population.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 突变新种群中的 1%。
- en: This strategy is by no means a standard one, or even a very comprehensive one,
    but it will suffice for this problem and it is fairly representative of those
    used for similar problems.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略绝对不是标准的，甚至也不是非常全面的，但对于这个问题来说足够了，并且它相当典型地代表了用于类似问题的策略。
- en: Figure [10-4](#Fig4) is an interactive Python session that shows how children
    are formed in this strategy.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-4](#Fig4) 是一个交互式 Python 会话，展示了在这个策略中子代是如何形成的。
- en: '![A436848_1_En_10_Fig4_HTML.jpg](A436848_1_En_10_Fig4_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig4_HTML.jpg](A436848_1_En_10_Fig4_HTML.jpg)'
- en: Figure 10-4.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-4.
- en: Forming children for a new population
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 为新种群形成子代
- en: 'The mutating part of the strategy is a bit more complex, which I show, in part,
    with the next code segment before trying to explain it:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 策略中的突变部分稍微复杂一些，我在尝试解释之前，部分展示了下一个代码段：
- en: '[PRE3]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The `chance_to_mutate` variable is set to 0.01, representing a 1% chance for
    mutation, which is very low as I noted earlier. The statement `for i in population:`
    iterates through the entire population and causes a mutation only when the random
    number generator is less than .01, which is not very often. The actual individual
    chosen to be mutated is accomplished by the `place_to_mutate = randint(0, len(i))`
    statement, which is not likely the individual that happened to be iterated upon
    at the time the random number was less than .01\. Finally, the actual mutation
    is done by this statement: `i[place_to_mutate] = randint(min(i), max(i))`. The
    integer values in the selected individual are randomly generated based upon the
    population’s `min` and `max` values.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '`chance_to_mutate` 变量设置为 0.01，代表 1% 的突变机会，正如我之前提到的，这非常低。语句 `for i in population:`
    遍历整个种群，并且只有在随机数生成器小于 .01 时才会发生突变，这并不常见。实际被选中的突变个体是通过 `place_to_mutate = randint(0,
    len(i))` 语句实现的，这不太可能是随机数小于 .01 时正在迭代的个体。最后，实际的突变是通过这个语句完成的：`i[place_to_mutate]
    = randint(min(i), max(i))`。所选个体的整数值是基于种群的最小值和最大值随机生成的。'
- en: The whole strategy design, which includes a mix of selecting the best-performing
    individuals, breeding children from all portions of the population, and the occasional
    mutations is geared toward finding the global maximum and avoiding local maximums.
    This is precisely the same thought process that was going on in the gradient descent
    algorithm for ANNs, where the goal was to locate a global minimum and avoid local
    minimums. You can look at Figure 8-15 to visualize the process for locating the
    global maximum or highest peak instead of the deepest valley, representing the
    global minimum.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 整个策略设计，包括选择最佳表现个体、从种群的所有部分繁殖子代以及偶尔的突变，旨在找到全局最大值并避免局部最大值。这正是 ANNs 的梯度下降算法中正在进行的思考过程，其目标是找到全局最小值并避免局部最小值。你可以查看图
    8-15 来可视化寻找全局最大值或最高峰的过程，而不是最深的山谷，代表全局最小值。
- en: There is much more to the `evolve` function than what was shown. The remaining
    code is shown next in the complete script listing.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '`evolve` 函数的内容远不止展示的这些。剩余的代码将在完整的脚本列表中展示。'
- en: 'There is one more function to explain before the complete script is shown.
    This function is named `grade` and it calculates an overall fitness measure for
    a whole population. The Python built-in `reduce` function sums the fitness scores
    for each individual and averages the sum by the population size. The following
    code implements the grade function :'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在展示完整脚本之前，还有一个函数需要解释。这个函数名为 `grade`，它计算整个种群的整体适应度度量。Python 内置的 `reduce` 函数将每个个体的适应度得分相加，并按种群大小平均。以下代码实现了
    `grade` 函数：
- en: '[PRE4]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This last function listing concludes my discussion on all the functions that
    compose the Python script. The following is a complete listing of the final script,
    along with instructions on how to run the script within an interactive Python
    session. Note that I did modify the instructions to display the first generation
    number that met the target and the final solution itself. The population in the
    example is equal to 100 and each individual has six elements with values ranging
    between 0 and 100.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这个最后的功能列表总结了我对构成 Python 脚本的所有功能的讨论。以下是对最终脚本的完整列表，以及如何在交互式 Python 会话中运行脚本的说明。请注意，我修改了说明，以显示满足目标的第一代数字以及最终解决方案本身。示例中的种群数量为
    100，每个个体有六个元素，其值介于 0 到 100 之间。
- en: '[PRE5]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Figure [10-5](#Fig5) shows an interactive session in which I entered all the
    statements shown in the instructions portion of the script comments.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-5](#Fig5) 展示了一个交互式会话，我在脚本注释部分的说明部分输入了所有显示的语句。
- en: '![A436848_1_En_10_Fig5_HTML.jpg](A436848_1_En_10_Fig5_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig5_HTML.jpg](A436848_1_En_10_Fig5_HTML.jpg)'
- en: Figure 10-5.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-5。
- en: Interactive Python session running the script
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 运行脚本的交互式 Python 会话
- en: You should be able to see in the screenshot that a solution was found after
    only seven generations had evolved. The solution was `[72, 68, 67, 64, 75, 25]`,
    which does sum to the target value of 371\. The script does not stop after the
    first successful solution is found, but continues to evolve and mutate, slightly
    degrading and then improving until it has run through its preset cycle number.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该能在屏幕截图上看到，在经过仅七代进化后找到了解决方案。解决方案是 `[72, 68, 67, 64, 75, 25]`，这些数字的总和正好是目标值
    371。脚本在找到第一个成功解决方案后不会停止，而是继续进化并变异，略微退化然后改善，直到完成预设的周期数。
- en: A portion of the history of the fitness numbers associated with each generation
    is shown in Figure [10-6](#Fig6).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 每一代关联的适应度数值的历史部分在图 [10-6](#Fig6) 中显示。
- en: '![A436848_1_En_10_Fig6_HTML.jpg](A436848_1_En_10_Fig6_HTML.jpg)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig6_HTML.jpg](A436848_1_En_10_Fig6_HTML.jpg)'
- en: Figure 10-6.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-6。
- en: Fitness history list
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 适应度历史列表
- en: In Figure [10-6](#Fig6), I annotated where generation 7 has a 0.0 fitness value
    for each of its individuals. Overall, this genetic programming approach is very
    efficient, especially for the relatively simple objective of determining a target
    sum given a list of six randomly generated integer numbers.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [10-6](#Fig6) 中，我标注了第 7 代每个个体的适应度值为 0.0。总的来说，这种遗传编程方法非常高效，特别是对于相对简单的目标，即给定六个随机生成的整数数字确定目标总和。
- en: The next demonstration is a slight variant from Conway’s Game of Life, which
    is a classic project incorporating genetic programming with artificial life (alife)
    that breed and die according to a set of conditions based on their proximity to
    each other, which I explain later.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个演示是康威生命游戏的一个轻微变体，这是一个经典项目，它将遗传编程与人工生命（alife）结合在一起，根据它们彼此之间的条件进行繁殖和死亡，我稍后会解释。
- en: 'Demo 10-2: Conway’s Game of Life'
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示 10-2：康威生命游戏
- en: 'The Game of Life, or as it is commonly known, Life, is a cellular automaton
    project created by British mathematician John Conway in 1970\. The game starts
    with an initial condition, but it needs no further user input to play to its completion.
    This modus operandi is called a zero-player game, which means that the automatons—or
    cells, as I shall refer to them from now on—evolve on their own according to the
    following set of rules or conditions :'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 生命游戏，或如人们通常所知，生命，是由英国数学家约翰·康威在 1970 年创建的一个细胞自动机项目。游戏从初始条件开始，但不需要进一步的用户输入即可完成游戏。这种操作模式被称为零玩家游戏，这意味着自动机——或者，从现在起我将它们称为细胞——根据以下规则或条件自行进化：
- en: Any live cell with fewer than two live neighbors dies, as if caused by underpopulation.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任何少于两个活邻居的活细胞会死亡，就像因为人口不足一样。
- en: Any live cell with two or three live neighbors lives to the next generation.
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任何有两个或三个活邻居的活细胞会活到下一代。
- en: Any live cell with more than three live neighbors dies, as if by overpopulation.
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任何多于三个活邻居的活细胞会死亡，就像因为人口过剩一样。
- en: Any dead cell with exactly three live neighbors becomes a live cell, as if by
    reproduction.
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任何恰好有三个活邻居的死亡细胞会变成活细胞，就像通过繁殖一样。
- en: The board field, or universe, for this game is theoretically an infinite, orthogonal
    set of grid squares where a cell can occupy a grid in either an alive or a dead
    state. Alive is synonymous with populated and dead is synonymous with unpopulated.
    Each cell has a maximum of eight neighbors, except for the edge cells in our real-world,
    practical grid system, where an infinite grid is not possible.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 该游戏的面板字段或宇宙在理论上是一个无限的正交网格方阵，其中细胞可以以活或死的状态占据网格。活与被占用同义，死与未被占用同义。每个细胞最多有八个邻居，除了在我们现实世界的实际网格系统中，边缘细胞，在那里不可能有无限网格。
- en: The grid is “seeded” with an initial placement of cells, which can be randomly
    or deterministically placed. The cellular rules are then immediately applied,
    causing births and deaths to happen simultaneously. This application is known
    as time tick in game terminology. A new generation is thus formed and the rules
    are immediately reapplied. Ultimately, the game settles into an equilibrium state,
    where cells cycle between two stable cellular configurations, they roam about
    forever, or they all die.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 该网格通过初始放置的细胞进行“播种”，这些细胞可以是随机或确定性地放置的。然后立即应用细胞规则，导致出生和死亡同时发生。在游戏术语中，这被称为时间滴答。因此形成了一个新的一代，规则立即重新应用。最终，游戏达到一个平衡状态，其中细胞在两种稳定的细胞配置之间循环，它们永远漫游，或者它们全部死亡。
- en: From a historical perspective, Conway was very much interested in Professor
    John von Neumann’s attempts at creating a computing machine that could replicate
    itself. von Neumann eventually succeeded by describing a mathematical model based
    on a rectangular grid governed by a very complex set of rules. The Conway game
    was a big simplification of von Neumann’s concepts. The game was published in
    the October 1970 issue of Scientific American in Martin Gardener’s “Mathematical
    Games” column. It instantly became a huge success and generated much interest
    from fellow AI researchers and enthusiastic readers.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 从历史角度来看，康威对约翰·冯·诺伊曼教授尝试创建能够自我复制的计算机器非常感兴趣。冯·诺伊曼最终通过描述一个基于矩形网格的数学模型并遵循一个非常复杂的规则集而成功。康威游戏是对冯·诺伊曼概念的极大简化。该游戏发表在1970年10月的《科学美国人》杂志马丁·加德纳的“数学游戏”专栏中。它立刻取得了巨大成功，并引起了同行人工智能研究人员和热情读者的极大兴趣。
- en: The game can also be extended to the point that it is comparable to the universal
    Turing machine, first proposed by Alan Turning in the 1940s (explained in an earlier
    chapter).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 该游戏也可以扩展到与1940年代由艾伦·图灵首次提出的通用图灵机相当的程度（在前面章节中解释）。
- en: The game has another important influence on AI in that it likely kick-started
    the mathematical field of study known as cellular automata . The game simulates
    the birth and death of a colony of organisms in a surprising close relationship
    to real-life processes occurring in nature. This game has led directly to many
    other similar simulation games modeling nature’s own processes. These simulations
    have been applied in computer science, biology, physics, biochemistry, economics,
    mathematics, and many others.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 该游戏对人工智能的另一个重要影响是，它可能启动了被称为细胞自动机的数学研究领域。该游戏模拟了一个生物群体的出生和死亡，这与自然界中发生的真实过程有着惊人的密切关系。这个游戏直接导致了其他许多类似的模拟游戏，这些游戏模拟了自然界本身的过程。这些模拟在计算机科学、生物学、物理学、生物化学、经济学、数学等领域得到了应用。
- en: I demonstrate Conway’s Game of Life using a neat Raspberry Pi accessory board
    known as a Sense HAT. Figure [10-7](#Fig7) shows a Sense HAT board. The HAT name
    represents a line of accessory boards known as Hardware Attached on Top (HAT)
    boards, which feature a standardized format that allows them to be directly plugged
    into the 40-pin GPIO header and mechanically fastened to the Raspberry Pi 2 and
    3 model boards.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用一个名为Sense HAT的整洁的树莓派附件板来演示康威生命游戏。图[10-7](#Fig7)展示了Sense HAT板。HAT名称代表一系列称为Hardware
    Attached on Top（HAT）的附件板，它们具有标准化的格式，可以直接插入40针GPIO引脚头，并机械固定在树莓派2和3型号的底板上。
- en: '![A436848_1_En_10_Fig7_HTML.jpg](A436848_1_En_10_Fig7_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig7_HTML.jpg](A436848_1_En_10_Fig7_HTML.jpg)'
- en: Figure 10-7.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-7。
- en: Sense HAT board
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 感知HAT板
- en: Every HAT board supports an autoconfiguration system that allows automatic GPIO
    and driver setup. This automatic configuration is achieved using two dedicated
    pins on the 40-pin GPIO header that are reserved for an I2C eeprom. This eeprom
    holds the board manufacturer’s information, GPIO setup, and a device tree fragment,
    which is a description of the attached hardware, which in turn allows the Linux
    OS to automatically load any required drivers.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 每个 HAT 板都支持一个自动配置系统，该系统允许自动 GPIO 和驱动程序设置。这种自动配置是通过使用 40 引脚 GPIO 头上的两个专用引脚来实现的，这些引脚是为
    I2C eeprom 保留的。这个 eeprom 存储了板制造商的信息、GPIO 设置和设备树片段，这是一个描述附加硬件的描述，反过来又允许 Linux 操作系统自动加载任何所需的驱动程序。
- en: 'The Sense HAT board has an 8 × 8 RGB LED array, which provides a very nice
    grid display for all the cellular automatons. In addition, there is a powerful
    Python library that provides a good deal of functionality for the LED array and
    for a variety of onboard sensors , which include the following:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: Sense HAT 板上有一个 8 × 8 RGB LED 阵列，为所有细胞自动机提供了一个非常不错的网格显示。此外，还有一个强大的 Python 库，为
    LED 阵列和各种板载传感器提供了大量功能，包括以下内容：
- en: Gyroscope
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 惯性仪
- en: Accelerometer
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加速度计
- en: Magnetometer
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 磁力计
- en: Temperature
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 温度
- en: Barometric pressure
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 气压
- en: Humidity
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 湿度
- en: There is also a five-way position joystick on the board to support applications
    that need that type of user control. I do not use any of the sensors or the joystick
    for the Game of Life application, just the 8 × 8 LED array.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 板上还有一个五向位置摇杆，以支持需要此类用户控制的应用程序。我在“生命游戏”应用程序中并没有使用任何传感器或摇杆，只使用了 8 × 8 LED 阵列。
- en: Sense HAT Hardware Installation
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Sense HAT 硬件安装
- en: First, ensure that the Raspberry Pi is completely powered down. The Sense HAT
    is designed to mount on top of a Raspberry Pi. It comes with a 40-pin GPIO male
    pin extension header that you must first plug into the female 40-pin header on
    the Raspberry Pi. The Sense HAT is then mounted on top of the Raspberry Pi using
    the 40 male pins as a guide. These pins should simply push through the 40-pin
    female header on the Sense board. All that’s left is to attach the supplied stand-offs,
    which provide firm support between the Raspberry Pi and the Sense HAT. Figure
    [10-8](#Fig8) shows a mounted Sense HAT on a Raspberry Pi.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，确保 Raspberry Pi 完全关闭电源。Sense HAT 设计用于安装在 Raspberry Pi 顶部。它附带一个 40 引脚 GPIO
    雄性引脚扩展头，您必须首先将其插入 Raspberry Pi 上的雌性 40 引脚头。然后，使用 40 个雄性引脚作为指南，将 Sense HAT 安装在
    Raspberry Pi 顶部。这些引脚应该简单地推过 Sense 板上的 40 引脚雌性头。剩下的只是安装提供的支架，这些支架在 Raspberry Pi
    和 Sense HAT 之间提供坚固的支撑。图 [10-8](#Fig8) 显示了安装在 Raspberry Pi 上的 Sense HAT。
- en: '![A436848_1_En_10_Fig8_HTML.jpg](A436848_1_En_10_Fig8_HTML.jpg)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig8_HTML.jpg](A436848_1_En_10_Fig8_HTML.jpg)'
- en: Figure 10-8.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-8。
- en: Sense HAT mounted onto a Raspberry Pi
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: Sense HAT 安装在 Raspberry Pi 上
- en: There is one more item that you should know. The Raspberry Pi and Sense HAT
    require a power supply capable of providing 2.5A at 5V. Failing to use a sufficiently
    powerful power supply will likely cause strange behavior, such as the Linux OS
    failing to recognize the Sense HAT, which I unfortunately confirmed as a fact.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 您还应该知道一件事。Raspberry Pi 和 Sense HAT 需要一个能够提供 2.5A 5V 的电源。未能使用足够强大的电源可能会引起奇怪的行为，例如
    Linux 操作系统无法识别 Sense HAT，这不幸地被我证实是一个事实。
- en: Sense HAT Software Installation
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Sense HAT 软件安装
- en: 'The Python library supporting the Sense HAT must be loaded prior to running
    any of the scripts that will run the Life game. First, ensure that the Raspberry
    Pi is connected to the Internet, and then enter the following commands to load
    the software:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行任何将运行生命游戏的脚本之前，必须先加载支持 Sense HAT 的 Python 库。首先，确保 Raspberry Pi 连接到互联网，然后输入以下命令来加载软件：
- en: '[PRE6]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'You want to run the following test to ensure that the Sense HAT is working
    properly with the newly installed software. Enter the following in an interactive
    Python session:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要运行以下测试以确保 Sense HAT 与新安装的软件正常工作。在交互式 Python 会话中输入以下内容：
- en: '[PRE7]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: If all went well with the installation, you show see the `Hello World!` message
    scrolling across the LED array. If you don’t see it, I would recheck that the
    Sense HAT is securely fastened to the Raspberry Pi and that all 40 pins go through
    their respective socket holes. It very well might be that you inadvertently bent
    one of the pins such that it is has been forced out of the way. If that’s the
    case, just carefully straighten it and reseat all the pins.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 如果安装一切顺利，你应该能看到“Hello World!”信息在LED阵列上滚动。如果你没有看到，我建议你重新检查Sense HAT是否牢固地固定在Raspberry
    Pi上，以及所有40个引脚是否都通过了各自的插座孔。很可能你不小心弯曲了一个引脚，使得它被迫偏离了位置。如果是这种情况，只需小心地将其弄直并重新安装所有引脚。
- en: Once the software checks out, you are ready to run a Python version of the Game
    of Life on this combination of Sense HAT/Raspberry Pi. I now turn the discussion
    to the game software.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦软件检出，你就可以在这个Sense HAT/Raspberry Pi组合上运行生命游戏的Python版本了。我现在转向游戏软件的讨论。
- en: 'Game of Life: Python Version'
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生命游戏：Python版本
- en: I begin this section by giving credit to Mr. Swee Meng Ng, a very talented Malaysian
    developer who posted much of the code I used in this project on GitHub.com. Swee
    goes by the username sweemeng on GitHub. He has a blog at [`www.nomadiccodemonkey.com`](http://www.nomadiccodemonkey.com)
    . Take a look at it if you want an appreciation for the code development efforts
    that are ongoing in that part of the world.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这个部分的开头要感谢Swee Meng Ng先生，他是一位非常有才华的马来西亚开发者，在GitHub.com上发布了我在这个项目中使用的很大一部分代码。Swee在GitHub上的用户名是sweemeng。他有一个博客在[http://www.nomadiccodemonkey.com](http://www.nomadiccodemonkey.com)。如果你想了解那个地区正在进行的代码开发工作，可以看看它。
- en: 'You should first load the following Python scripts from [`https://github.com/sweemeng/sweemengs-game-of-life.git`](https://github.com/sweemeng/sweemengs-game-of-life.git)
    into your home directory:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该首先从[https://github.com/sweemeng/sweemengs-game-of-life.git](https://github.com/sweemeng/sweemengs-game-of-life.git)将以下Python脚本加载到你的主目录中：
- en: genelab.ppy
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: genelab.ppy
- en: designer.py
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: designer.py
- en: gameoflife.py
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: gameoflife.py
- en: genelab.py is the first script that I’ll discuss. It is the main one in this
    application. By main, I mean it incorporates the starting point, initialization,
    generation creation, and mutation, and finally, it enforces the behavioral rules.
    However, this script needs two helper scripts to work properly. These helper scripts
    are named designer.py and gameoflife.py, which I discuss shortly. I have added
    my own comments to Swee Meng’s scripts to help relate portions of it to concepts
    that have already been discussed, and hopefully, to clarify the purpose of the
    code segments.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: genelab.py 是我将要讨论的第一个脚本。它是这个应用程序中的主要脚本。通过主要，我的意思是它包含了起点、初始化、生成创建和变异，最后强制执行行为规则。然而，这个脚本需要两个辅助脚本才能正常工作。这些辅助脚本分别命名为
    designer.py 和 gameoflife.py，我将在稍后讨论。我为Swee Meng的脚本添加了自己的注释，以帮助将其中的一部分与已经讨论过的概念联系起来，并希望澄清代码段的目的。
- en: '[PRE8]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'The first helper script is designer.py. The code listing follows with the addition
    of my own comments:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个辅助脚本是 designer.py。以下是带有我自己的注释的代码列表：
- en: '[PRE9]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'The second helper script is gameoflife.py. There is only a small portion of
    this script that is actually used as a helper for the main script. I have included
    it all for the sake of completeness and to provide you with the code, in case
    you want to run a single-generation Game of Life, which I will explain shortly.
    The complete code listing follows with my own comments added:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个辅助脚本是 gameoflife.py。这个脚本中只有一小部分实际上用作主脚本的辅助。我包括它是为了完整性，并为你提供代码，以防你想运行单一代生命游戏，我将在稍后解释。以下是带有我自己的注释的完整代码列表：
- en: '[PRE10]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Test Run
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试运行
- en: 'First, ensure that the genelab.py , designer.py, and gameoflife.py scripts
    are in the pi home directory before running this command:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，在运行此命令之前，请确保 genelab.py、designer.py 和 gameoflife.py 脚本位于pi主目录中：
- en: '[PRE11]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The Raspberry takes a moment to load everything. You should begin to see the
    cells appear on the Sense HAT LED array, as well as status messages on the console
    screen. Figure [10-9](#Fig9) is a photograph of the LED array while my script
    was running.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: Raspberry Pi需要一点时间来加载所有内容。你应该开始看到细胞出现在Sense HAT LED阵列上，以及控制台屏幕上的状态信息。图 [10-9](#Fig9)
    是我的脚本运行时的LED阵列的照片。
- en: '![A436848_1_En_10_Fig9_HTML.jpg](A436848_1_En_10_Fig9_HTML.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig9_HTML.jpg](A436848_1_En_10_Fig9_HTML.jpg)'
- en: Figure 10-9.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-9。
- en: Sense HAT LED array with the Game of Life running
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 当Game of Life运行时，Sense HAT LED阵列
- en: Figure [10-10](#Fig10) shows the console display while the game was running.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [10-10](#Fig10) 展示了游戏运行时的控制台显示。
- en: '![A436848_1_En_10_Fig10_HTML.jpg](A436848_1_En_10_Fig10_HTML.jpg)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig10_HTML.jpg](A436848_1_En_10_Fig10_HTML.jpg)'
- en: Figure 10-10.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-10。
- en: Console display with the Game of Life running
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 运行生命游戏的控制台显示
- en: Single Generation of the Game of Life
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生命游戏单代
- en: It is also entirely possible to experiment with only a single generation of
    the Game of Life. This script simply adheres to the rules for the cell neighbors
    that were previously specified, with no cell or gene mutations allowed. The following
    script is named main.py. It is available on the same GitHub website as the previous
    scripts.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 也完全可以只实验生命游戏的一代。这个脚本仅仅遵循之前指定的细胞邻居规则，不允许细胞或基因突变。以下脚本命名为main.py。它可以在与之前脚本相同的GitHub网站上找到。
- en: '[PRE12]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Enter the following command to run this script:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 运行以下命令来运行此脚本：
- en: '[PRE13]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'The initial cell configuration is set by this statement:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 初始细胞配置由以下语句设置：
- en: '[PRE14]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: You can try another configuration by uncommenting the prior `cells` array, and
    then comment out this one. I did that very action and then ran the script. I observed
    an unusual display, which I will not describe. I will leave it for you to discover.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过取消注释之前的`cells`数组来尝试另一种配置，然后注释掉这个配置。我做了这个动作，然后运行了脚本。我观察到了一个不寻常的显示，这里就不描述了。我将留给您去发现。
- en: I want to caution that what I am about to describe can become quite addictive.
    It is testing the consequences of new initial starting patterns. There are more
    than a few AI researchers who have dedicated their careers to the study of cellular
    automata, which includes researching the fascinating evolving patterns from the
    Game of Life.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我想提醒您，我即将描述的内容可能会变得相当上瘾。这是在测试新的初始起始模式的后果。有不止几位AI研究人员将他们的职业生涯奉献给了细胞自动机的学习，这包括研究生命游戏中的迷人演变模式。
- en: Figure [10-11](#Fig11) illustrates some starting configurations that you may
    wish to try. The companion cell configuration array values are shown next to each
    of the patterns.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图[10-11](#Fig11)展示了您可能希望尝试的一些起始配置。伴随的细胞配置数组值显示在每个模式旁边。
- en: '![A436848_1_En_10_Fig11_HTML.jpg](A436848_1_En_10_Fig11_HTML.jpg)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig11_HTML.jpg](A436848_1_En_10_Fig11_HTML.jpg)'
- en: Figure 10-11.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-11。
- en: Example Game of Life starting patterns
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 生命游戏起始模式示例
- en: Two of the patterns immediately disappear (die), one goes into a bi-stable state,
    and the fourth pattern enters a stable state. I tested each pattern and confirmed
    it acted as shown.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 两种模式立即消失（死亡），一种进入双稳态，第四种模式进入稳定状态。我测试了每种模式，并确认它们的行为如预期所示。
- en: Figure [10-12](#Fig12) shows other initial patterns that you can experiment
    with to see how they evolve according to the rules set. The companion cell array
    values are shown next to each pattern.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图[10-12](#Fig12)展示了您可以实验的其他初始模式，以观察它们根据设定的规则如何演变。伴随的细胞数组值显示在每个模式旁边。
- en: '![A436848_1_En_10_Fig12_HTML.jpg](A436848_1_En_10_Fig12_HTML.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig12_HTML.jpg](A436848_1_En_10_Fig12_HTML.jpg)'
- en: Figure 10-12.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-12。
- en: Additional starting patterns
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 其他起始模式
- en: There are a series of patterns that are dynamic, which means that they constantly
    move across the grid and repeat their patterns. Figure [10-13](#Fig13) shows the
    glider that moves around the grid and repeats its pattern every fourth generation.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 有一系列动态模式，这意味着它们会不断在网格上移动并重复其模式。图[10-13](#Fig13)展示了在网格上移动并在每四代重复其模式的滑翔模式。
- en: '![A436848_1_En_10_Fig13_HTML.jpg](A436848_1_En_10_Fig13_HTML.jpg)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig13_HTML.jpg](A436848_1_En_10_Fig13_HTML.jpg)'
- en: Figure 10-13.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-13。
- en: Glider pattern
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 滑翔模式
- en: A similar dynamic pattern is the lightweight spaceship, which is shown in Figure
    [10-14](#Fig14). It moves across the grid too.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 类似的动态模式是轻量级飞船，如图[10-14](#Fig14)所示。它也在网格上移动。
- en: '![A436848_1_En_10_Fig14_HTML.jpg](A436848_1_En_10_Fig14_HTML.jpg)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig14_HTML.jpg](A436848_1_En_10_Fig14_HTML.jpg)'
- en: Figure 10-14.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-14。
- en: Lightweight spaceship pattern
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 轻量级飞船模式
- en: Conway discovered several patterns that took many generations to finally evolve
    and become both predictable and periodic. Incidentally, he made these discoveries
    without the aid of a computer. He called these patterns Methuselahs, after a man
    who was described in the [Hebrew Bible](https://en.wikipedia.org/wiki/Hebrew_Bible)
    to have lived to the age of 969 years. The first of these long-lived patterns
    is named F-pentomino, which is shown in Figure [10-15](#Fig15). It becomes stable
    after 1101 generations.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 康威发现了几个需要许多代才能最终进化并变得可预测和周期性的模式。顺便说一句，他没有使用计算机的帮助就做出了这些发现。他把这些模式称为Methuselahs，这个名字来自《希伯来圣经》中描述的一个活了969岁的人。这些长寿模式中的第一个被称为F-pentomino，如图[10-15](#Fig15)所示。它在1101代后变得稳定。
- en: '![A436848_1_En_10_Fig15_HTML.jpg](A436848_1_En_10_Fig15_HTML.jpg)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig15_HTML.jpg](A436848_1_En_10_Fig15_HTML.jpg)'
- en: Figure 10-15.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-15。
- en: F-pentomino pattern
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: F-pentomino模式
- en: The Acorn pattern shown in Figure [10-16](#Fig16) is another example of a Methuselah
    that becomes stable and predictable after 5206 generations.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图[10-16](#Fig16)中所示的Acorn模式是Methuselah的一个例子，它在经过5206代后变得稳定且可预测。
- en: '![A436848_1_En_10_Fig16_HTML.jpg](A436848_1_En_10_Fig16_HTML.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_10_Fig16_HTML.jpg](A436848_1_En_10_Fig16_HTML.jpg)'
- en: Figure 10-16.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-16。
- en: Acorn pattern
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: Acorn模式
- en: Readers who wish to experiment with more patterns can go to Alan Hensel’s webpage
    at `radicaleye.com/lifepage/picgloss/picgloss.html`, where he has compiled a fairly
    large list of other common patterns.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 想要实验更多模式的读者可以访问Alan Hensel的网页`radicaleye.com/lifepage/picgloss/picgloss.html`，在那里他整理了一个相当大的其他常见模式列表。
- en: This completes the initial foray into cellular automata using Conway’s Game
    of Life as the tool. You should now be empowered to further experiment with this
    tool to gain more experience and confidence in this powerful AI topic. I also
    highly recommend Dr. Stephen Wolfram’s book A New Kind of Science (Wolfram Media,
    2002), in which he examines the entire field of cellular automata using the Mathematica
    application, which he created. Incidentally, the Mathematica application is now
    freely provided with the latest Raspian distributions available from `raspberrypi.org`.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了使用康威生命游戏作为工具的细胞自动机的初步探索。你现在应该能够利用这个工具进行更多实验，以获得更多经验和在这个强大的AI主题上的信心。我还强烈推荐斯蒂芬·沃尔夫拉姆博士的著作《一种新的科学》（Wolfram
    Media，2002年），在这本书中，他使用他创建的Mathematica应用程序来审视整个细胞自动机领域。顺便说一句，Mathematica应用程序现在可以免费从`raspberrypi.org`提供的最新Raspian发行版中获得。
- en: Summary
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter was concerned with evolutionary computing. I began the chapter
    with a story relating how evolution and mutation were integral parts of EC.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了进化计算。我以一个故事开始了本章，讲述了进化和变异是如何成为EC不可或缺的部分的。
- en: The first demonstration showed how evolutionary programming could be used to
    find solutions to fairly simple problems using both evolution and mutation techniques.
    The solution was first calculated manually and then automatically by a Python
    script.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次演示展示了如何使用进化编程结合进化和变异技术来解决相对简单的问题。解决方案最初是通过手工计算得出，然后通过一个Python脚本自动计算。
- en: The second demonstration introduced the EC subtopic of genetic algorithms and
    genetic programming. I used a Python version of Conway’s Game of Life as the means
    to explain and demonstrate these concepts. This section also introduced the concept
    of cellular automata, which is central to the game.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 第二次演示介绍了遗传算法和遗传编程的EC子主题。我使用康威生命游戏的Python版本作为解释和演示这些概念的手段。本节还介绍了细胞自动机的概念，这是游戏的核心。
- en: 'There were two game versions shown: one that used genetic evolution and mutation,
    and another that was more deterministic in that you could specify the starting
    patterns. The latter version was further used to examine a variety of cellular
    patterns that generated some unusual behaviors.'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 展示了两种游戏版本：一种使用遗传进化和变异，另一种更确定，你可以指定起始模式。后者进一步用于检查产生一些异常行为的各种细胞模式。
- en: A Sense HAT accessory board was used with a Raspberry Pi 3 to display the Game
    of Life simulations.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Raspberry Pi 3和Sense HAT附件板来显示生命游戏模拟。
