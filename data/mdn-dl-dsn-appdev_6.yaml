- en: 6. Successful Neural Network Architecture Design
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 成功的神经网络架构设计
- en: '*Design is as much a matter of finding problems as it is solving them.*'
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*设计既是寻找问题也是解决问题的过程。*'
- en: ''
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Bryan Lawson, Author and Architect
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ——布莱恩·劳森，作者和建筑师
- en: The previous chapter, on meta-optimization, discussed the automation of neural
    network design, including automated design of neural network architectures. It
    may seem odd to follow such a chapter on the automation of neural network architectures
    with a chapter on successful (implicitly, manual) neural network architecture
    design, but the truth is that deep learning will not reach a point anytime soon
    (or at all) where the state of design could possibly dismiss the need to possess
    an understanding of key principles and concepts in neural network architecture
    design. You’ve seen, firstly, that Neural Architecture Search – despite making
    rapid advancements – is still limited in many ways by computational accessibility
    and reach in the problem domain. Moreover, Neural Architecture Search algorithms
    themselves need to make implicit architectural design decisions to make the search
    space more feasible to search, which human NAS designers need to understand and
    encode. The design of architectures simply cannot be wholly automated away.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 上一章关于元优化讨论了神经网络设计的自动化，包括神经网络架构的自动化设计。在自动化神经网络架构设计的章节之后紧接着讨论成功的（隐含的，手动）神经网络架构设计可能看起来有些奇怪，但事实是深度学习不会很快（或根本不会）达到一个设计状态，可以完全摒弃对神经网络架构设计中的关键原则和概念的理解。首先，你已经看到，尽管神经架构搜索（NAS）取得了快速进展，但它仍然在许多方面受到计算可访问性和问题域范围的限制。此外，神经架构搜索算法本身需要做出隐含的架构设计决策，以便使搜索空间更易于搜索，这需要人类NAS设计师理解和编码。架构的设计根本不能完全自动化。
- en: The success of transfer learning is earlier and stronger evidence for the proposition
    that the design of neural network architectures is a study that need not be studied
    by the average deep learning engineer. After all, if the pretrained model libraries
    built into TensorFlow and PyTorch don’t satisfy the needs of your problem, platforms
    like the TensorFlow model zoo, GitHub, and pypi host a massive quantity of easily
    accessible models that can be transferred, slightly adapted with minimal architectural
    modifications to fit the data shapes and objectives of your problem, and fine-tuned
    on your particular dataset.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习的成功是早期且强有力的证据，表明神经网络架构的设计是一项研究，普通深度学习工程师不必进行研究。毕竟，如果TensorFlow和PyTorch中内置的预训练模型库不能满足你问题的需求，那么像TensorFlow模型库、GitHub和pypi这样的平台托管了大量的易于访问的模型，这些模型可以转移，通过最小的架构修改稍作调整以适应你问题的数据形状和目标，并在你的特定数据集上进行微调。
- en: This is partially true – the availability of openly shared model architectures
    and weights has brought about a decreased need to design large architectures from
    scratch. However, in practice, it’s more likely than not that model architectures
    you select don’t completely align with the context of your problem. Unless an
    architecture was crafted particularly for your problem domain (and even if it
    is), usually there is a need for more significant architectural modifications
    (Figure [6-1](#Fig1)).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分是正确的——公开共享的模型架构和权重的可用性减少了从头开始设计大型架构的需求。然而，在实践中，你选择的模型架构很可能不完全符合你问题的上下文。除非架构是专门为你的问题域设计的（即使是这样），通常还需要进行更重大的架构修改（见图
    [6-1](#Fig1)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig1_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig1_HTML.jpg)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig1_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig1_HTML.jpg)'
- en: Figure 6-1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-1
- en: Architectures often still need significant modifications to adapt to your particular
    problem domain
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 架构通常仍然需要重大修改以适应你特定的问题域
- en: The process of making these more significant modifications to adapt the architecture
    toward success in your problem domain is a continual one; when designing your
    network, you should repeatedly experiment with the architecture and make architectural
    adaptations in response to the feedback signals of previous experiments and problems
    that emerge.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对架构进行这些重大修改以适应你问题域中的成功是一个持续的过程；在设计你的网络时，你应该反复试验架构，并根据先前实验和出现的问题的反馈信号进行架构调整。
- en: Both constructing successful modifications and successfully integrating them
    into the general model architecture require a knowledge of successful architecture-building
    patterns and techniques. This chapter will discuss three key ideas in neural network
    architecture construction – nonlinear and parallel representation, cell-based
    design, and network scaling. With knowledge of these concepts, you will not only
    be able to successfully modify general architectures but also to analytically
    deconstruct and understand architectures and to construct successful model architectures
    from scratch – a tool whose value extends not only into the construction of network
    architectures but cutting-edge fields like NAS.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 构建成功的修改并将其成功集成到通用模型架构中需要了解成功的架构构建模式和技巧。本章将讨论神经网络架构构建中的三个关键思想——非线性和平行表示、基于单元的设计和网络扩展。了解这些概念后，你不仅能够成功修改通用架构，还能够分析性地分解和理解架构，并从头开始构建成功的模型架构——这种工具的价值不仅限于网络架构的构建，还扩展到如NAS等前沿领域。
- en: 'In order to accomplish these goals, we’re going to need to use Keras in a more
    complex fashion. As the neural network architectures we seek to implement become
    more intricate, there is an increasing ambiguity of implementation – that is,
    there are many “correct answers.” In order to navigate this ambiguity of implementation
    more efficiently, we will begin to *compartmentalize*, *automate*, and *parametrize*
    the defining of network architectures:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这些目标，我们需要更复杂地使用Keras。随着我们寻求实现的神经网络架构变得更加复杂，实现的模糊性越来越大——也就是说，有许多“正确答案”。为了更有效地导航这种实现的模糊性，我们将开始*模块化*、*自动化*和*参数化*网络架构的定义：
- en: '*Compartmentalization* : This concept was introduced in Chapter [3](516104_1_En_3_Chapter.xhtml)
    on autoencoders, in which large models were defined as a set of linked sub-models.
    While we will not be defining models for each component, we will need to define
    functions that automatically create new components of networks for us.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*模块化*：这个概念在第三章[3](516104_1_En_3_Chapter.xhtml)“自编码器”中引入，其中大型模型被定义为一系列相互连接的子模型。虽然我们不会为每个组件定义模型，但我们需要定义能够自动为我们创建网络新组件的函数。'
- en: '*Automation* : We will define methods of building neural networks that can
    build more segments of the architecture than we explicitly define in the code,
    allowing us to scale the network more easily and to develop complex topological
    patterns.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*自动化*：我们将定义构建神经网络的方法，这些方法可以构建比我们在代码中明确定义的更多架构部分，使我们能够更容易地扩展网络并开发复杂的拓扑模式。'
- en: '*Parametrization* : Networks that explicitly define key architectural parameters
    like the width and depth are not robust nor scalable. In order to compartmentalize
    and automate neural network design, we will need to define parameters relative
    to other parameters rather than as absolute, static values.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*参数化*：明确定义关键架构参数（如宽度和深度）的网络不够稳健也不可扩展。为了模块化和自动化神经网络设计，我们需要定义相对于其他参数的参数，而不是作为绝对、静态的值。'
- en: 'You’ll find that the content discussed in this chapter may feel more abstracted
    than that of previous chapters. This is part of the process of developing more
    complex architectures and a deeper feel for the dynamics of neural networks: rather
    than seeing an architecture as merely a collection of layers arranged in a certain
    format that somewhat arbitrarily and magically form a successful prediction function,
    you begin to identify and use motifs, residuals, parallel branches, cardinality,
    cells, scaling factors, and other architectural patterns and tools. This eye for
    design will be invaluable in the development of more professional, successful,
    and universal network architecture designs.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你会发现本章讨论的内容可能比前几章更抽象。这是开发更复杂架构和更深入感受神经网络动态过程的一部分：而不是将架构仅仅视为按某种格式排列的层集合，这些层以某种任意和神奇的方式形成一个成功的预测函数，你开始识别和使用模式、残差、并行分支、基数、单元、缩放因子和其他架构模式和工具。这种设计视角在开发更专业、成功和通用的网络架构设计中将非常有价值。
- en: Nonlinear and Parallel Representation
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 非线性和平行表示
- en: The realization that purely linear neural network architecture topologies perform
    well but not well enough drives nonlinearity in the topology of – more or less
    – every successful modern neural network design. Linearity in the topology of
    a neural network becomes a burden when we want to scale it to obtain greater modeling
    power.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 仅仅线性神经网络架构拓扑结构表现良好但并不足够好的认识，推动了——或多或少——每个成功的现代神经网络设计中拓扑的非线性。当我们想要将其扩展以获得更大的建模能力时，神经网络拓扑中的线性就变成了负担。
- en: A good conceptual model for understanding the success and principles of nonlinear
    architecture topology design is to think of each layer as its own “thinker” engaged
    in a larger dialogue – one part of a large, connected network. Passing an input
    into the network is like presenting this set of thinkers with an unanswered question
    to consider. Each thinker sheds their unique light on the input, making some sort
    of transformation to it – reframing the question or adding some progress in answering
    it, perhaps – before passing the fruits of their consideration onto the next thinker.
    You want to design an arrangement of these thinkers – that is, where certain thinkers
    get and pass on information – such that the output of the dialogue (the answer
    to your input question) takes advantage of each of these thinkers’ perspectives
    as much as possible.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 理解非线性架构拓扑设计成功和原则的良好概念模型是，将每一层视为一个参与更大对话的“思维者”——大型连接网络的一部分。将输入传递到网络中就像向这些思维者呈现一个未回答的问题供他们考虑。每个思维者都会以他们独特的方式照亮输入，对其进行某种形式的转换——可能是重新定义问题或在其回答中添加一些进步，然后将他们思考的结果传递给下一个思维者。你希望设计这些思维者的排列——即某些思维者获取和传递信息——使得对话的输出（即对输入问题的回答）尽可能多地利用每个思维者的观点。
- en: 'Let’s consider how a hypothetical arranged network of thinkers would approach
    the age-old question, “What is the meaning of life?” (Figure [6-2](#Fig2)). The
    first thinker reframes the question of meaning as a matter of value and focuses
    on those that possess life – living beings – as the subjects of the question,
    in turn asking: “What do living beings value most in their life?” The next thinker
    interprets this question in an anthropocentric sense as relating to how *humans*
    value life. The last thinker answers that humans value happiness the most, and
    the output of this network is the common answer of “happiness.”'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个假设性的思维者网络如何处理古老的问题，“生命的意义是什么？”（图[6-2](#Fig2)）。第一个思维者将意义的问题重新定义为价值问题，并关注那些拥有生命——生物——作为问题的主体，进而问道：“生物在其生活中最重视什么？”下一个思维者从人类中心主义的角度解释这个问题，将其与人类如何重视生命相关联。最后一个思维者回答人类最重视幸福，这个网络的输出是共同的答案“幸福”。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig2_HTML.png](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig2_HTML.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig2_HTML.png](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig2_HTML.png)'
- en: Figure 6-2
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-2
- en: Hypothetical dialogue of a linearly arranged chain of thinkers – an answer to
    the age-old question, “What is the meaning of life?”
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 假设性对话：线性排列的思维者链——对古老问题“生命的意义是什么？”的回答
- en: Because of the linear topology of this arrangement of thinkers, each thinker
    can only think through the information given to them by the previous thinker.
    All thinkers after the first thinker don’t have direct access to the original
    input question; the third thinker, for instance, is forced to answer the second
    thinker’s interpretation on the first thinker’s interpretation on the original
    question. While increasing the depth of the network can be incredibly powerful,
    it can also lead to this problem we see before us that later “thinkers” or layers
    are progressively detached from the original context of the input.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些思维者的线性拓扑结构，每个思维者只能通过前一个思维者提供的信息进行思考。所有在第一个思维者之后的思维者都无法直接访问原始输入问题；例如，第三个思维者被迫回答第二个思维者对第一个思维者对原始问题的解释。虽然增加网络的深度可以非常强大，但它也可能导致我们面前看到的问题，即后来的“思维者”或层逐渐脱离输入的原始上下文。
- en: By adding nonlinearity to our arrangement of thinkers, the network is able to
    generate more complexity of representation by more directly connecting “thinkers”
    with the developments of multiple thinkers at various locations down the “chain”
    of dialogue (Figure [6-3](#Fig3)). In this example nonlinear arrangement of thinkers,
    we add one additional connection from the first thinker to the third thinker such
    that the third thinker takes in the ideas of both the first and the second thinker.
    Rather than responding to only the interpretation of the second thinker, it is
    able to consider the developments and ideas of multiple thinkers.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将非线性添加到我们的思维者排列中，网络能够通过更直接地将“思维者”与对话“链”中各个位置的多个思维者的进展相连接，从而生成更复杂的表示。在这个思维者的非线性排列示例中，我们从第一个思维者添加了一个额外的连接到第三个思维者，使得第三个思维者能够吸收第一个和第二个思维者的想法。它不仅仅是对第二个思维者的解释做出反应，而是能够考虑多个思维者的进展和想法。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig3_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig3_HTML.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig3_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig3_HTML.jpg)'
- en: Figure 6-3
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-3
- en: Adding a nonlinearity in the arrangement of thinkers significantly changes the
    output of the dialogue
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在思维者的排列中添加非线性，显著改变了对话的输出
- en: 'In this example, the third thinker generalizes the developments of the first
    and second thinkers – “What do living beings value most in their life?” and “What
    do humans value most in their life?” – between a purely biological perspective
    on the value of life and another more embedded in the humanities. The third thinker
    responds: “Forms of reproduction – new life and ideas,” referring to the role
    of reproduction both in biological evolution and in the reproduction of ideas
    across individuals, generations, and societies of human civilization. To summarize
    the third thinker’s ideas, the output of the network is thus “procreation.”'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例中，第三个思维者概括了第一个和第二个思维者的进展——“生物体在其生活中最重视什么？”和“人类在其生活中最重视什么？”——在纯粹从生命的价值角度和更深入的人文视角之间。第三个思维者回答：“繁殖形式——新的生命和思想”，这指的是繁殖在生物进化以及人类文明中个体、代际和社会的思想传播中的作用。为了总结第三个思维者的想法，因此网络的输出是“繁殖”。
- en: With the addition of one connection from the first thinker to the third thinker,
    the output of the network has changed from “happiness” – a simpler, more instinctive
    answer – to the concept of “procreation,” a far deeper and more profound response.
    The key difference here is the element of merging different perspectives and ideas
    in consideration.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 通过从第一个思维者到第三个思维者添加一个连接，网络的输出已经从“幸福”——一个更简单、更本能的回答——转变为“繁殖”的概念，这是一个更深层次、更深刻的回应。这里的关键区别在于考虑中融合不同观点和想法的元素。
- en: Most people would agree that more, not less, dialogue is conducive to the emergence
    of great ideas and insights. Similarly, think of each connection as a “one-way
    conversation.” When we add more connections between thinkers, we add more conversations
    into our network of thinkers. With sufficient number and nonlinearity connections,
    our network will burst into a flurry of activity, discourse, and dialogue, performing
    better than a linearly arranged network ever could.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都会同意，更多的对话而不是更少的对话有利于伟大思想和洞察力的出现。同样，将每个连接视为一个“单向对话”。当我们增加思维者之间的更多连接时，我们就在我们的思维者网络中增加了更多的对话。有了足够数量和非线性连接，我们的网络将爆发出一阵活动、讨论和对话，其表现将优于线性排列的网络。
- en: Residual Connections
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 残差连接
- en: Residual connections are the first step toward nonlinearity – these are simple
    connections placed between nonadjacent layers. They’re often presented as “skipping”
    over a layer or multiple layers, which is why they are also often referred to
    as “skip connections” (Figure [6-4](#Fig4)).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 残差连接是非线性的第一步——这些是在非相邻层之间放置的简单连接。它们通常被表示为“跳过”一个或多个层，这就是为什么它们也经常被称为“跳过连接”（图 [6-4](#Fig4)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig4_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig4_HTML.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig4_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig4_HTML.jpg)'
- en: Figure 6-4
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-4
- en: Residual connection
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 残差连接
- en: Note that because the Keras Functional API cannot define multiple layers as
    the input to another layer, in implementation the connections are first merged
    through a method like adding or concatenation. The merged components are then
    passed into the next layer (Figure [6-5](#Fig5)). This is the implicit assumption
    of all residual connection diagrams.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，由于 Keras 功能 API 不能将多个层定义为另一层的输入，在实现中，连接首先通过添加或连接等方法合并。然后，合并的组件被传递到下一层（见图
    [6-5](#Fig5)）。这是所有残差连接图示的隐含假设。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig5_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig5_HTML.jpg)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig5_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig5_HTML.jpg)'
- en: Figure 6-5
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-5
- en: Technically correct residual connection with merge layer
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 技术上正确的合并层残差连接
- en: Although residual connections are incredibly versatile tools, there are generally
    two methods of residual connection usage, based on the ResNet and DenseNet architectures
    that pioneered their respective usages of residual connections. “ResNet-style”
    residual connections employ a series of short residual connections that are repeated
    routinely throughout the network (Figure [6-6](#Fig6)).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管残差连接是极其通用的工具，但根据各自开创了残差连接使用的 ResNet 和 DenseNet 架构，通常有两种残差连接的使用方法。所谓的“ResNet
    风格”的残差连接在整个网络中采用一系列短残差连接，这些连接被常规地重复使用（见图 [6-6](#Fig6)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig6_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig6_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig6_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig6_HTML.jpg)'
- en: Figure 6-6
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-6
- en: ResNet-style usage of residual connections
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet 风格的残差连接使用
- en: “DenseNet-style” residual connections, on the other hand, place residual connections
    between valid layers (i.e., layers designated as open to having residual connections
    attached, also known as “anchor points” or “anchor layers”) (Figure [6-7](#Fig7)).
    Because – as one might imagine – this sort of usage of residual connections leads
    to a high number of residual connections, seldom do DenseNet-style architectures
    treat all layers as residual connections. In this style, both long and short residual
    connections are used to provide information pathways across sections of the architecture.
    Because each anchor point is connected to each anchor point before it, it is informed
    by various stages of the network’s processing and feature extraction.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，“DenseNet 风格”的残差连接将残差连接放置在有效层之间（即，被指定为可以附加残差连接的层，也称为“锚点”或“锚层”）（见图 [6-7](#Fig7)）。由于这种残差连接的使用方式——正如人们可以想象的那样——会导致大量残差连接，DenseNet
    风格的架构很少将所有层都视为残差连接。在这种风格中，长残差连接和短残差连接都被用来在架构的不同部分之间提供信息路径。因为每个锚点都与之前的每个锚点相连，所以它被网络处理和特征提取的各个阶段所告知。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig7_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig7_HTML.jpg)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig7_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig7_HTML.jpg)'
- en: Figure 6-7
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-7
- en: DenseNet-style usage of residual connections
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: “DenseNet 风格”的残差连接使用
- en: This representation of residual connections (Figure [6-4](#Fig4)) is probably
    the most convenient interpretation of what a residual connection is for the purposes
    of implementation. It visualizes residual connections as nonlinearities added
    upon a “main sequence” of layers – a linear “backbone” upon which residual connections
    are added. In the Keras Functional API, it’s easiest to understand a residual
    connection as “skipping” over a “main sequence” of layers. In general, implementing
    nonlinearities is best performed with this concept of a linear backbone in mind,
    because code is written in a linear format that can be difficult to translate
    nonlinearities to.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这种残差连接的表示（见图 [6-4](#Fig4)）可能是对残差连接实现目的的最方便的解释。它将残差连接可视化为主序列层（即线性“骨干”层）上添加的非线性。在
    Keras 功能 API 中，理解残差连接作为“跳过”主序列层是最容易的。一般来说，在考虑到线性骨干的概念下实现非线性是最为合适的，因为代码是以线性格式编写的，这可能会使非线性难以转换。
- en: However, there are other architectural interpretations of what a residual connection
    is that may be conceptually more aligned with the general class of nonlinearities
    in neural network architectures. Rather than relying upon a linear backbone, you
    can interpret a residual connection as splitting the layer before it into two
    branches, which each process the previous layer in their own unique ways. One
    branch (Layer 1 to Layer 2 to Layer 3 in Figure [6-8](#Fig8)) processes the output
    of the previous layer with a specialized function, whereas the other branch (Layer
    1 to Identity to Layer 3) processes the output of the layer with the identity
    function – that is, it simply allows the output of the previous layer to pass
    through, the “simplest” form of processing (Figure [6-8](#Fig8)).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于什么是残差连接，还有其他架构上的解释，这些解释在概念上可能与神经网络架构中的一般非线性类更一致。而不是依赖于线性骨干，你可以将残差连接理解为将其前面的层分成两个分支，每个分支以它们独特的方式处理前一层的输出。一个分支（图[6-8](#Fig8)中的层1到层2到层3）使用专用函数处理前一层的输出，而另一个分支（层1到恒等函数到层3）使用恒等函数处理层的输出——也就是说，它只是允许前一层的输出通过，这是“最简单”的处理形式（图[6-8](#Fig8)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig8_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig8_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig8_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig8_HTML.jpg)'
- en: Figure 6-8
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-8
- en: Alternative interpretation of residual connection as a branching operation
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 将残差连接作为分支操作的另一种解释
- en: This method of conceptually understanding residual connections more easily allows
    you to categorize them as a sub-class of general nonlinear architectures, which
    can be understood as a series of branching structures (Figure [6-9](#Fig9)). We’ll
    see how this interpretation helps later in our exploration of parallel branches
    and cardinality.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这种概念上理解残差连接的方法更容易让你将它们分类为一般非线性架构的子类，这可以理解为一系列分支结构（图[6-9](#Fig9)）。我们将在探索并行分支和基数时看到这种解释如何有所帮助。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig9_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig9_HTML.jpg)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig9_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig9_HTML.jpg)'
- en: Figure 6-9
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-9
- en: Generalized nonlinearity form
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 广义非线性形式
- en: 'Residual connections are often presented as a technical justification for the
    *vanishing gradient problem* (Figure [6-10](#Fig10)), which shares many characteristics
    to the previously discussed problem of a linear arrangement of thinkers: in order
    to access some layer, we need to travel through several other layers first, diluting
    the information signal. In the vanishing gradient problem, the backpropagation
    signal within very deep neural networks used to update the weights gets progressively
    weaker such that the front layers are barely utilized at all.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 残差连接通常被用作*梯度消失问题*（图[6-10](#Fig10)）的技术理由，这个问题与之前讨论的线性排列问题有许多相似之处：为了访问某些层，我们需要先通过几个其他层，从而稀释信息信号。在梯度消失问题中，用于更新权重的非常深神经网络中的反向传播信号会逐渐变弱，以至于前层几乎未被利用。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig10_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig10_HTML.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig10_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig10_HTML.jpg)'
- en: Figure 6-10
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-10
- en: Vanishing gradient problem
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度消失问题
- en: With residual connections, however, the backpropagation signal travels through
    fewer average layers to reach some particular layer’s weights for updating. This
    enables a stronger backpropagation signal that is better able to make use of the
    entire model architecture.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，使用残差连接，反向传播信号通过较少的平均层到达特定层的权重以进行更新。这使得反向传播信号更强，能够更好地利用整个模型架构。
- en: There are other interpretations of residual connections too. Like the random
    forest algorithm is constructed of many smaller decision tree models trained on
    part of the dataset, a neural network with a sufficient number of residual connections
    can be thought to be an “ensemble” of smaller sequential models built with a fewer
    number of layers (Figure [6-11](#Fig11)).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对于残差连接也有其他的解释。例如，随机森林算法由许多在数据集的一部分上训练的小决策树模型组成，一个具有足够数量残差连接的神经网络可以被视为由较少层数构建的较小序列模型的“集成”（如图[6-11](#Fig11)所示）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig11_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig11_HTML.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig11_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig11_HTML.jpg)'
- en: Figure 6-11
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-11
- en: Deconstructing a DenseNet-style network into a series of linear topologies
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 将 DenseNet 风格的网络分解为一系列线性拓扑
- en: Residual connections can also be thought of as a “failsafe” for poor performing
    layers. If we add a residual connection from layer A to layer C (assuming layer
    A is connected to layer B, which is connected to layer C), the network can “choose”
    to disregard layer B by learning near-zero weights for connections from A to B
    and from B to C while information is channeled directly from layer A to C via
    a residual connection. In practice, however, residual connections act more as
    an additional representation of the data for consideration than as failsafe mechanisms.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 残差连接也可以被视为性能不佳层的“安全网”。如果我们从层 A 到层 C 添加一个残差连接（假设层 A 连接到层 B，层 B 再连接到层 C），网络可以“选择”忽略层
    B，通过学习接近零的权重来从 A 到 B 和从 B 到 C 的连接，同时信息通过残差连接直接从层 A 传输到层 C。然而，在实践中，残差连接更多地充当了数据的额外表示，用于考虑，而不是作为安全网机制。
- en: Implementing individual residual connections is quite simple with our knowledge
    of the Functional API. We’ll use the first presented interpretation of the residual
    connection architecture, in which a residual connection acts as a “skipping mechanism”
    between nonadjacent layers in a linear architecture backbone. For simplicity,
    let’s define this linear architecture backbone as a series of Dense layers (Listing
    [6-1](#PC1), Figure [6-12](#Fig12)).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 利用我们对于功能 API 的知识，实现单个残差连接相当简单。我们将使用第一个提出的残差连接架构的解释，其中残差连接在线性架构骨干的非相邻层之间充当“跳过机制”。为了简化，让我们将这个线性架构骨干定义为一系列
    Dense 层（清单 [6-1](#PC1)，图 [6-12](#Fig12)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig12_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig12_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig12_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig12_HTML.jpg)'
- en: Figure 6-12
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-12
- en: Architecture of a sample linear backbone model
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 样本线性骨干模型的架构
- en: '[PRE0]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s say that we want to add a residual connection from `layer1` to `layer3`.
    In order to do this, we need to merge `layer1` with whatever current layer is
    the input to `layer3` (this is `layer2`). The result of the merging is then passed
    as the input to `layer3` (Listing [6-2](#PC2), Figure [6-13](#Fig13)).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要从 `layer1` 到 `layer3` 添加一个残差连接。为了做到这一点，我们需要将 `layer1` 与当前是 `layer3` 输入的任何层合并（这是
    `layer2`）。合并的结果随后作为 `layer3` 的输入传递（清单 [6-2](#PC2)，图 [6-13](#Fig13)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig13_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig13_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig13_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig13_HTML.jpg)'
- en: Figure 6-13
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-13
- en: Architecture of a linear backbone with a residual connection skipping over a
    processing layer, `dense_1`
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 跳过处理层 `dense_1` 的线性骨干架构
- en: '[PRE1]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: However, this method of manually creating residual connections by explicitly
    defining merging and input flows is inefficient and not scalable (i.e., it becomes
    too unorganized and difficult if you wanted to define dozens or hundreds of residual
    connections). Let’s create a function, `make_rc()` (Listing [6-3](#PC3)), that
    takes in a connection split layer (this is the layer that “splits” – there are
    two connections stemming from it) and a connection joining head (this is the layer
    before the layer in which the residual connection and the “linear main sequence”
    join together) and outputs a merged version of those two layers that can be used
    as an input to the next layer (Figure [6-14](#Fig14)). We’ll see how automating
    the creation of residual connections will be incredibly helpful soon when we attempt
    to construct more elaborate ResNet- and DensNet-style residual connections.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，通过显式定义合并和输入流来手动创建残差连接的方法效率低下，且不具有可扩展性（即，如果你想要定义数十个或数百个残差连接，它会变得过于无序且难以管理）。让我们创建一个函数，`make_rc()`（清单
    [6-3](#PC3)），它接受一个连接分割层（这是“分割”的层，有两个连接从中产生）和一个连接合并头（这是残差连接和“线性主序列”合并之前的层）作为输入，并输出这两个层的合并版本，该版本可以用作下一层的输入（图
    [6-14](#Fig14)）。当我们尝试构建更复杂的 ResNet 和 DensNet 风格残差连接时，我们将很快看到自动化创建残差连接将非常有帮助。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig14_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig14_HTML.jpg)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig14_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig14_HTML.jpg)'
- en: Figure 6-14
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-14
- en: Terminology for certain layers’ relationship to one another in the automation
    of building residual connections
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在自动化构建残差连接时，某些层之间关系的术语
- en: We can also add another parameter, `merge_method`, which allows the function
    user to specify which method to use to merge the connection split layer and the
    connection joining head. The parameter takes in a string, which is mapped to the
    corresponding merging layer via a dictionary.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以添加另一个参数，`merge_method`，它允许函数用户指定用于合并连接分割层和连接合并头的具体方法。该参数接受一个字符串，通过字典映射到相应的合并层。
- en: '[PRE2]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We can thus build a residual connection quite easily simply by passing in the
    function `make_rc` with the appropriate parameters as an input to the layer we
    want to receive the merged result (Listing [6-4](#PC4)).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以通过将适当的参数作为输入传递给`make_rc`函数，并将其作为接收合并结果的层的输入，非常容易地构建一个残差连接（见列表[6-4](#PC4)）。
- en: '[PRE3]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We can automate the usage of this function to create a ResNet-style architecture
    in which blocks of layers with short residual connections are repeated several
    times (Figure [6-15](#Fig15)). In order to automate the construction of the architecture,
    we will use the placeholder variables `x`, `x1`, and `x2`. We will build `x1`
    from `x` and `x2` from `x1` in sequences and merge `x` with `x2` to build the
    residual connection (Listing [6-5](#PC5)).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过自动化使用此函数来创建一个ResNet风格的架构，其中包含具有短残差连接的层块重复多次（图[6-15](#Fig15)）。为了自动化架构的构建，我们将使用占位符变量`x`、`x1`和`x2`。我们将按顺序构建`x1`从`x`和`x2`从`x1`，并将`x`与`x2`合并以构建残差连接（见列表[6-5](#PC5)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig15_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig15_HTML.jpg)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig15_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig15_HTML.jpg)'
- en: Figure 6-15
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-15
- en: Automating the construction of residual connections by constructing in entire
    build iterations/blocks
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在整个构建迭代/块中构建残差连接来自动化构建过程
- en: Tip
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: It can be conceptually difficult to automate the building of these nonlinear
    topologies. Drawing a diagram and labeling with which template variables allows
    you to implement complex residual connection patterns more easily.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在概念上自动化构建这些非线性拓扑可能比较困难。绘制图表并使用模板变量进行标注可以使你更轻松地实现复杂的残差连接模式。
- en: '[PRE4]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Since at the end of the building iterations `x` is the last connected layer,
    we connect `x` to the output layer and aggregate the architecture into a model
    (Listing [6-6](#PC6), Figure [6-16](#Fig16)).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在构建迭代结束时`x`是最后一个连接层，我们将`x`连接到输出层，并将架构聚合为模型（见列表[6-6](#PC6)，图[6-16](#Fig16)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig16_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig16_HTML.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig16_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig16_HTML.jpg)'
- en: Figure 6-16
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-16
- en: Automated ResNet-style usage of residual connections
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化ResNet风格的残差连接使用
- en: '[PRE5]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: A DenseNet residual connection pattern (Figure [6-17](#Fig17)), in which every
    “anchor point” is connected to every other “anchor point,” requires some more
    planning . (Note that for the sake of ease, we will build residual connections
    between every Dense layer rather than building additional un-connected layers.
    We’ll discuss residual connections for cell-based architectures in the next section.)
    We’ll keep a list of previous layers `x`. Every building step, we add a new layer
    `x[i]` that is connected to the merging of every previous layer. Note that the
    layer `x[i-1]` is the direct connection and the connection between `x[i-2]`, `x[i-3]`,
    … and `x[i]` is a residual connection.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 一个DenseNet风格的残差连接模式（图[6-17](#Fig17)），其中每个“锚点”都与其他“锚点”相连，这需要更多的规划。（请注意，为了简化，我们将构建每个Dense层之间的残差连接，而不是构建额外的未连接层。我们将在下一节讨论基于细胞的架构的残差连接。）我们将保留一个先前层的列表`x`。在每一步构建中，我们添加一个新的层`x[i]`，该层与每个先前层的合并相连。请注意，层`x[i-1]`是直接连接，而`x[i-2]`、`x[i-3]`……与`x[i]`之间的连接是残差连接。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig17_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig17_HTML.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig17_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig17_HTML.jpg)'
- en: Figure 6-17
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-17
- en: Conceptual diagram of automating the construction of DenseNet-style usage of
    residual connections
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化构建DenseNet风格残差连接使用的概念图
- en: The first step is to adjust the `make_rc` function to take in a *list* of layers
    to join rather than just two. This is because the DenseNet architecture is built
    such that many residual connections connect to the same layer. In addition to
    taking in the list of layers, we’re going to specify that if the number of layers
    to join is 1 (i.e., connecting `x[0]` to `x[1]` with no residual connections),
    we simply return the one element in the `join_layers` list – that is, if there
    is only one item in a list of layers to merge, we “merge” the layer with an “empty”
    layer (Listing [6-7](#PC7)).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是调整 `make_rc` 函数，使其接收一个要连接的 *层列表* 而不仅仅是两个。这是因为 DenseNet 架构是构建得许多残差连接连接到同一层。除了接收层列表外，我们还将指定如果连接的层数为
    1（即，没有残差连接地将 `x[0]` 连接到 `x[1]`），我们只需返回 `join_layers` 列表中的一个元素——也就是说，如果合并层的列表中只有一个项目，我们将该层与一个“空”层“合并”（见列表
    [6-7](#PC7)）。
- en: '[PRE6]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We can begin by defining an initial layer `x` and a list of created layers `layers`.
    After creating the initial layer, we loop through the remaining layers to be added
    by redefining the template variable `x` as a Dense layer that takes in a merged
    version of all the other currently created layers (Listing [6-8](#PC8), Figure
    [6-18](#Fig18)). Afterward, we append `x` to `layers` such that the next created
    layer will take in this just created layer.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从定义一个初始层 `x` 和一个已创建的层列表 `layers` 开始。在创建初始层之后，我们通过重新定义模板变量 `x` 为一个接收所有其他已创建层的合并版本的
    Dense 层来循环添加剩余的层。然后，我们将 `x` 添加到 `layers` 中，这样下一个创建的层将接收这个刚刚创建的层（见列表 [6-8](#PC8)，图
    [6-18](#Fig18)）。之后，我们将 `x` 添加到 `layers` 中，以便下一个创建的层将接收这个刚刚创建的层。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig18_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig18_HTML.jpg)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig18_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig18_HTML.jpg)'
- en: Figure 6-18
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-18
- en: Keras visualization of DenseNet-style residual connections
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: Keras对 DenseNet 风格残差连接的可视化
- en: '[PRE7]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This is a great example of how using predefined functions, storage, and built-in
    scalability in combination with one another allows for a quick and efficient building
    of complex topologies.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很好的例子，说明了如何通过结合使用预定义函数、存储和内置可伸缩性来快速高效地构建复杂拓扑。
- en: As you can see, when we begin to build more complex network designs, the Keras
    plotting utility starts to struggle to produce an architecture visualization that
    is visually consistent with our conceptual understanding of the topology. Regardless,
    visualization still serves as a sanity check tool to ensure that your automation
    of complex residual connection relationships is functioning.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，当我们开始构建更复杂的网络设计时，Keras的可视化工具开始力不从心，难以产生与我们对拓扑概念理解相一致的建筑可视化。尽管如此，可视化仍然是一个理智检查工具，以确保你的复杂残差连接关系的自动化运行正常。
- en: Branching and Cardinality
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分支和集合度
- en: The concept of cardinality is the core framework of nonlinearity and a generalization
    of residual connections. While the *width* of a network section refers to the
    number of neurons in the corresponding layer(s), the cardinality of a network
    architecture refers to the number of “branches” (also known as parallel towers)
    in a nonlinear space at a certain location in a neural network architecture.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 集合度（cardinality）的概念是非线性的核心框架，也是残差连接的泛化。一个网络部分（network section）的宽度指的是相应层（层组）中的神经元数量，而网络架构的集合度指的是在神经网络架构的某个位置的非线性空间中的“分支”（也称为并行塔）的数量。
- en: Cardinality is most clear in *parallel branches* – an architectural design in
    which a layer is “split” into multiple layers, each of which are processed linearly
    and eventually merged back together. The cardinality of a segment of a network
    employing parallel branches is simply the number of branches (Figure [6-19](#Fig19)).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 集合度在 *并行分支* 中最为明显——这是一种将层“分割”成多个层，每个层都线性处理，最终合并回一起的架构设计。采用并行分支的网络部分的集合度简单地就是分支的数量（见图
    [6-19](#Fig19)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig19_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig19_HTML.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig19_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig19_HTML.jpg)'
- en: Figure 6-19
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-19
- en: A sample component of a neural network architecture with a cardinality of two.
    The numbering of the layers is arbitrary
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具有两个集合度的神经网络架构的示例组件。层的编号是任意的
- en: As mentioned prior in the section on residual connections, one can generalize
    residual connections as a simple branching mechanism with a cardinality of two,
    in which one branch is the series of layers the residual connection “skips over”
    and the other branch is the identity function.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如前文在残差连接章节中所述，可以将残差连接泛化为一个具有两个基数的基本分支机制，其中一个分支是残差连接“跳过”的层序列，另一个分支是恒等函数。
- en: Note that, depending on the specific topology, the cardinality of a section
    of a network is more or less ambiguous. For instance, some topologies may build
    branches within sub-branches and join together certain sub-branches in complex
    ways (e.g., Figure [6-20](#Fig20)). Here, the specific cardinality of the network
    is not relevant; what *is* relevant is that information is being modeled in a
    nonlinear fashion that encourages multiplicity of representation (the general
    concept of cardinality) and thus greater complexity and modeling power.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，需要注意的是，网络某一部分的基数可能或多或少是模糊的。例如，某些拓扑可能在子分支内构建分支，并以复杂的方式将某些子分支连接在一起（例如，图 [6-20](#Fig20)）。在这里，网络的具体基数并不重要；重要的是信息正在以非线性方式建模，这鼓励了表示的多样性（基数的一般概念）以及更大的复杂性和建模能力。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig20_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig20_HTML.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig20_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig20_HTML.jpg)'
- en: Figure 6-20
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-20
- en: An architectural component of a neural network that demonstrates more extreme
    nonlinearity (i.e., branching and merging)
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的一个架构组件，它展示了更极端的非线性（即，分支和合并）
- en: It should be noted, though, that nonlinearities should not be built arbitrarily.
    It can be easy to get away with building complex nonlinear topologies for the
    sake of nonlinearity, but you should have some idea of what purpose the topology
    serves to enable. Likewise, a key component of the network design is not just
    the architecture within which layers reside but which layers and parameters are
    chosen to fit within the nonlinear architecture. For instance, you may allocate
    different branches to use different kernel sizes or to perform different operations
    to encourage multiplicity of representation. See the case study in the next section
    on cell-based design for an example on good purposeful design of more complex
    nonlinearities, the Inception cell.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，需要注意的是，非线性不应随意构建。为了非线性的目的而构建复杂的非线性拓扑可能很容易，但你应该对拓扑所服务的目的有所了解。同样，网络设计的关键组成部分不仅仅是层所在的架构，还包括选择哪些层和参数以适应非线性架构。例如，你可以分配不同的分支使用不同的核大小或执行不同的操作，以鼓励表示的多样性。参见下一节关于基于细胞的设计的案例研究，以了解更复杂非线性（例如，Inception单元）的良好目的性设计的例子。
- en: The logic of branch representations and cardinality in architectural designs
    is very similar to that of residual connections. This sort of representation is
    the natural architectural development as a generalization of the residual connection
    – rather than passing the information flowing through the residual connection
    (i.e., doing the “skipping”) through an identity function, it can be processed
    separate from other components of the network.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 架构设计中的分支表示和基数逻辑与残差连接非常相似。这种表示是残差连接泛化后的自然架构发展——而不是通过恒等函数传递通过残差连接的信息（即，“跳过”操作），它可以与其他网络组件分开处理。
- en: In our analogy of a network as a linked set of thinkers engaged in a dialogue
    whose net output is dependent on their arrangement, branch representations allow
    not only for thinkers to consider multiple perspectives but for entire “schools
    of thought” to emerge in conversation with one another (Figure [6-21](#Fig21)).
    Branches process information separately (i.e., in parallel), allowing different
    modes of feature extraction to become “mature” (fully formed by several layers
    of processing) before they are merged with other branches for consideration.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们将网络比作一组参与对话的思考者，其净输出取决于他们排列的类比中，分支表示不仅允许思考者考虑多个视角，而且还能在相互对话中产生整个“思想学派”（图
    [6-21](#Fig21)）。分支分别处理信息（即，并行），允许不同的特征提取模式在与其他分支合并考虑之前“成熟”（由几层处理完全形成）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig21_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig21_HTML.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig21_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig21_HTML.jpg)'
- en: Figure 6-21
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-21
- en: Parallel branches as conceptually organizing “thinkers” into “schools of thought”
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 并行分支作为概念上组织“思想家”为“思想学派”
- en: Let’s begin by creating a multi-branch nonlinear topology explicitly/manually
    (Listing [6-9](#PC9)). We will create two branches that span from a layer; each
    branch, which holds a particular representation of the data, is processed independently
    and merged later (Figure [6-22](#Fig22)).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从显式/手动创建一个多分支非线性拓扑开始（列表[6-9](#PC9)）。我们将创建两个从层开始的分支；每个分支，它持有数据的一个特定表示，将独立处理并在之后合并（图[6-22](#Fig22)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig22_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig22_HTML.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig22_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig22_HTML.jpg)'
- en: Figure 6-22
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-22
- en: Architecture of building parallel branches
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 构建并行分支的架构
- en: '[PRE8]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'To automate the building of multiple branches, we consider two dimensions:
    the number of layers in each branch and the number of parallel branches (Listing
    [6-10](#PC10)). We can accomplish this in an organized fashion with two functions
    – `build_branch()`, which takes in an input layer to start a branch from and outputs
    the last layer in the branch, and `build_branches()`, which takes in a layer to
    split into several branches (using the `build_branch()` function). We can define
    the building of a branch simply as a series of linearly connected Dense layers,
    although branches can also be built as a nonlinear topology too.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 为了自动化构建多个分支，我们考虑两个维度：每个分支的层数和并行分支的数量（列表[6-10](#PC10)）。我们可以通过两个函数以有组织的方式完成这项工作——`build_branch()`，它接受一个输入层以开始分支，并输出分支中的最后一层，以及`build_branches()`，它接受一个要分割成几个分支的层（使用`build_branch()`函数）。我们可以简单地将分支的构建定义为一系列线性连接的密集层，尽管分支也可以构建为非线性拓扑。
- en: '[PRE9]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: In order to split a layer into a series of parallel branches, we use `build_branch`
    from that starting layer a certain number of times (this number being the cardinality,
    which is passed as an argument into the `build_branches` function). The `build_branch`
    function outputs the last layer of the branch, which we append to a list of branch
    last layers, `outputs`. After all the branches are built, we merge the outputs
    together via adding (rather than concatenating in this case, which would yield
    in a very large concatenated vector) and return the output of merging (Listing
    [6-11](#PC11)).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将一层分割成一系列并行分支，我们使用从起始层开始的`build_branch`函数多次（这个数字是基数，作为参数传递给`build_branches`函数）。`build_branch`函数输出分支的最后一层，我们将它追加到分支最后一层的列表`outputs`中。在所有分支构建完成后，我们通过添加（而不是在这种情况下连接，这将产生一个非常大的连接向量）将输出合并在一起，并返回合并后的输出（列表[6-11](#PC11)）。
- en: '[PRE10]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Building an entire series of parallel branches within a neural network architecture
    is now incredibly simple (Listing [6-12](#PC12), Figure [6-23](#Fig23)).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在神经网络架构中构建一系列并行分支现在变得极其简单（列表[6-12](#PC12)，图[6-23](#Fig23)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig23_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig23_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig23_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig23_HTML.jpg)'
- en: Figure 6-23
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-23
- en: Automation of building arbitrarily sized parallel branches
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化构建任意大小的并行分支
- en: '[PRE11]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This sort of method is used by the ResNeXt architecture, which employs parallel
    branches as a generalization and “next step” from residual connections.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法被ResNeXt架构所采用，该架构将并行分支作为从残差连接的泛化和“下一步”。
- en: 'Case Study: U-Net'
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究：U-Net
- en: The goal of *semantic* *segmentation* is to segment, or separate, various items
    within an image into various classes. Semantic segmentation can be used to identify
    items in a picture, like cars, people, and buildings in a picture of the city.
    The difference between semantic segmentation and a task like image recognition
    is that semantic segmentation is an *image-to-image* task, whereas image recognition
    is an *image-to-vector* task. Image recognition tells you if an object is present
    in the image or not; semantic segmentation tells you where the object is located
    in the image by marking each pixel as part of the corresponding class or not.
    The output of semantic segmentation is called the *segmentation map* .
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 语义分割的目标是将图像中的各种项目分割或分离成不同的类别。语义分割可用于识别图片中的项目，例如城市图片中的汽车、人和建筑物。语义分割与图像识别等任务的区别在于，语义分割是一个**图像到图像**的任务，而图像识别是一个**图像到向量**的任务。图像识别告诉你图像中是否存在某个对象；语义分割通过标记每个像素是否属于相应的类别来告诉你对象在图像中的位置。语义分割的输出被称为**分割图**。
- en: Semantic segmentation has many applications in biology, which can be used to
    automate the identification of cells, organs, neuron links, and other biological
    entities (Figure [6-24](#Fig24)). As such, much of research into semantic segmentation
    architectures has been developed with these biological applications in mind.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 语义分割在生物学中有许多应用，可用于自动化识别细胞、器官、神经元连接和其他生物实体（图[6-24](#Fig24)）。因此，许多关于语义分割架构的研究都是基于这些生物应用而开发的。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig24_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig24_HTML.jpg)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig24_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig24_HTML.jpg)'
- en: Figure 6-24
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-24
- en: 'Left: input image to a segmentation model. Right: example segmentation of cells
    in the image. Taken from the U-Net paper by Ronneberger et al.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 左侧：分割模型的输入图像。右侧：图像中细胞的分割示例。图片来自Ronneberger等人撰写的U-Net论文。
- en: Olaf Ronneberger, Philipp Fischer, and Thomas Brox proposed the *U-Net* *architecture*
    in 2015,^([1](#Fn1)) which has since become a pillar of semantic segmentation
    development (Figure [6-25](#Fig25)). The linear backbone component of the U-Net
    architecture acts like an autoencoder – it successively reduces the dimension
    of the image until it reaches some minimum representation size, upon which the
    dimension of the image is successively increased via upsampling and up-convolutions.
    The U-Net architecture employs very large residual connections that connect large
    parts of the network together, connecting the first block of layers to the last
    block, the second block to the second-to-last block, etc. When the residual connections
    are arranged to be parallel to one another in an architectural diagram, the linear
    backbone is forced into a “U” shape, hence its name.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: Olaf Ronneberger、Philipp Fischer和Thomas Brox于2015年提出了**U-Net**架构^([1](#Fn1))，该架构自那时起已成为语义分割发展的支柱（图[6-25](#Fig25)）。U-Net架构的线性骨干组件类似于自编码器
    – 它依次降低图像的维度，直到达到某个最小表示大小，然后通过上采样和上卷积依次增加图像的维度。U-Net架构采用非常大的残差连接，这些连接将网络的大部分连接在一起，将第一块层连接到最后一块层，第二块层连接到倒数第二块层，等等。当残差连接在架构图中排列成相互平行时，线性骨干被迫形成“U”形状，因此得名。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig25_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig25_HTML.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig25_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig25_HTML.jpg)'
- en: Figure 6-25
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-25
- en: U-Net architecture. Taken from the U-Net paper by Ronneberger et al.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: U-Net架构。图片来自Ronneberger等人撰写的U-Net论文。
- en: The left side of the architecture is termed the *contracting path* ; it develops
    successively smaller representations of the data. On the other hand, the right
    side is termed the *expansive path* , which successively increases the representation
    of the data. Residual connections allow the network to incorporate previously
    processed representations into the expansion of the representation size. This
    architecture allows both for *localization* (focus on a local region of the data
    input) and the use of broader *context* (information from farther, nonlocal regions
    of the image that still provide useful data).
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 架构的左侧被称为 *收缩路径*；它逐步发展出数据的小型表示。另一方面，右侧被称为 *扩张路径*，它逐步增加数据表示的大小。残差连接允许网络将先前处理过的表示纳入表示大小的扩展中。这种架构允许同时进行
    *定位*（关注数据输入的局部区域）和利用更广泛的 *上下文*（来自更远、非局部区域的图像信息，这些信息仍然提供有用的数据）。
- en: The resulting U-Net architecture performed significantly better than other architectures
    at its time on various biological segmentation challenges (Table [6-1](#Tab1)).
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的 U-Net 架构在当时的各种生物分割挑战中，其表现显著优于其他架构（见表 [6-1](#Tab1)）。
- en: Table 6-1
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 表 6-1
- en: Performance of U-Net against other segmentation models at the time on two key
    datasets in the ISBI cell tracking challenge 2015\. Results are measured in IOU
    (Intersection Over Union), a segmentation metric measuring how much of the predicted
    and true segmented regions overlap. A higher IOU is better. U-Net beats other
    methods at the time by a large margin in IOU
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在 2015 年 ISBI 细胞追踪挑战的两个关键数据集上，U-Net 与其他分割模型的表现。结果以 IOU（交集与并集）衡量，这是一个分割指标，衡量预测和真实分割区域重叠的程度。IOU
    越高越好。U-Net 在 IOU 方面以很大的优势击败了当时的方法。
- en: '| Model | PhC-U373 Dataset | DIC-HeLa Dataset |'
  id: totrans-157
  prefs: []
  type: TYPE_TB
  zh: '| 模型 | PhC-U373 数据集 | DIC-HeLa 数据集 |'
- en: '| --- | --- | --- |'
  id: totrans-158
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| IMCB-SG (2014) | 0.2669 | 0.2935 |'
  id: totrans-159
  prefs: []
  type: TYPE_TB
  zh: '| IMCB-SG (2014) | 0.2669 | 0.2935 |'
- en: '| KTH-SE (2014) | 0.7953 | 0.4607 |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
  zh: '| KTH-SE (2014) | 0.7953 | 0.4607 |'
- en: '| HOUS-US (2014) | 0.5323 | – |'
  id: totrans-161
  prefs: []
  type: TYPE_TB
  zh: '| HOUS-US (2014) | 0.5323 | – |'
- en: '| Second Best (2015) | 0.83 | 0.46 |'
  id: totrans-162
  prefs: []
  type: TYPE_TB
  zh: '| 第二名 (2015) | 0.83 | 0.46 |'
- en: '| U-Net (2015) | 0.9203 | 0.7756 |'
  id: totrans-163
  prefs: []
  type: TYPE_TB
  zh: '| U-Net (2015) | 0.9203 | 0.7756 |'
- en: While the U-Net architecture is technically adaptable to all image sizes because
    it is built using only convolution-type layers that do not require a fixed input,
    the original implementation by Ronneberger et al. requires significant planning
    with respect to the shape of information as it passes through the network. Because
    the proposed U-Net architecture does not use padding, the spatial resolution is
    successively reduced and increased divisively (by max pooling) and additively
    (by convolutions). This means that residual connections must include a cropping
    function in order to properly merge earlier representations with later representations
    that have a smaller spatial size. Moreover, the input shape must be carefully
    planned to have a certain input size, which will not match the output.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 U-Net 架构在技术上适用于所有图像大小，因为它仅使用不需要固定输入的卷积层构建，但 Ronneberger 等人最初实现时，需要就信息通过网络时的形状进行大量规划。因为所提出的
    U-Net 架构不使用填充，空间分辨率会逐步减少和增加（通过最大池化）和累加（通过卷积）。这意味着残差连接必须包括裁剪功能，以便正确合并早期表示和具有较小空间大小的后期表示。此外，输入形状必须仔细规划，以具有特定的输入大小，这将不匹配输出。
- en: Thus, in our implementation of the U-Net architecture, we will slightly adapt
    the convolutional layers to use padding such that merging and keeping track of
    data shapes is simpler. While implementing U-Net is relatively simple, it’s important
    to keep track of variables. We will name our layers with appropriate variable
    names such that they can be used in the `make_rc()` function earlier discussed
    to be part of a residual connection.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在我们对 U-Net 架构的实现中，我们将略微调整卷积层以使用填充，从而使合并和跟踪数据形状变得简单。虽然实现 U-Net 相对简单，但跟踪变量很重要。我们将使用适当的变量名来命名我们的层，以便它们可以在之前讨论的
    `make_rc()` 函数中使用，作为残差连接的一部分。
- en: Building the contracting path (Listing [6-13](#PC13)) is quite simple; in this
    case, we implement one convolution before every pooling reduction, although you
    can add more. We use three pooling reductions; conv4 is the “bottleneck” of the
    autoencoder, carrying the data with the smallest spatial representation size.
    Note that we increase the number of filters in each convolutional layer to accommodate
    for reductions in resolution to avoid actually building a representative bottleneck,
    which would be counteractive to the goals of this model.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 构建收缩路径（列表 [6-13](#PC13)）相当简单；在这种情况下，我们在每个池化减少之前实现一个卷积，尽管您可以添加更多。我们使用三个池化减少；conv4
    是自动编码器的“瓶颈”，携带具有最小空间表示尺寸的数据。请注意，我们增加每个卷积层的滤波器数量，以适应分辨率减少，避免实际构建一个代表性的瓶颈，这将与该模型的目标相悖。
- en: '[PRE12]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Building the expanding path (Listing [6-14](#PC14)) requires some more caution.
    We begin by upsampling the last layer, `conv4`, such that it has the same spatial
    dimension as the `conv3` layer. We apply another convolution after upsampling
    to process the result, as well as to ensure that `upsamp4` has the same depth
    (i.e., number of channels) as `upsamp3`. They can then be merged together via
    adding to preserve the depth.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 构建扩展路径（列表 [6-14](#PC14)）需要更多的谨慎。我们首先对最后一层，`conv4`进行上采样，使其具有与`conv3`层相同的空间维度。在上采样后，我们应用另一个卷积来处理结果，并确保`upsamp4`具有与`upsamp3`相同的深度（即通道数）。然后，它们可以通过添加来合并以保留深度。
- en: '[PRE13]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: We can likewise build the remainder of the expanding path (Listing [6-15](#PC15)).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们可以构建扩展路径的其余部分（列表 [6-15](#PC15)）。
- en: '[PRE14]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: To ensure that the input data and the output of the U-Net architecture have
    the same number of channels, we add a convolution layer with (1,1) that doesn’t
    change the spatial dimension but collapses the number of channels to the standard
    three used in almost all image data (Listing [6-16](#PC16)).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保输入数据和 U-Net 架构的输出具有相同的通道数，我们添加了一个 (1,1) 的卷积层，它不会改变空间维度，但将通道数折叠到几乎所有图像数据中使用的标准三个通道（列表
    [6-16](#PC16)）。
- en: '[PRE15]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: As mentioned earlier, you can change the input shape and the code will produce
    a valid result, as long as the spatial dimensions of the input are divisible by
    2\. You can plot the model with plot_model to reveal the architectural namesake
    of the model (Figure [6-26](#Fig26)).
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，您可以更改输入形状，只要输入的空间维度是 2 的倍数，代码就会产生有效结果。您可以使用 plot_model 来绘制模型，以揭示模型的建筑名称（见图
    [6-26](#Fig26)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig26_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig26_HTML.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig26_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig26_HTML.jpg)'
- en: Figure 6-26
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-26
- en: U-Net-style architecture implementation in Keras. Can you see the “U”?
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: Keras 中的 U-Net 风格架构实现。您能看到“U”吗？
- en: Block/Cell Design
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 区块/单元设计
- en: Recall the network of thinkers used to introduce the concept of nonlinearity.
    With the addition of a nonlinearity, thinkers were able to consider perspectives
    from multiple stages of development and processing and therefore expand their
    worldview to produce more insightful outputs.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下用于介绍非线性概念的思考者网络。通过添加非线性，思考者能够考虑来自多个发展阶段和处理的观点，从而扩展他们的世界观，产生更有洞察力的输出。
- en: Profound intellectual work is best achieved via conversation between *multiple
    thinkers* rather than the processing capability of one individual thinker (Figure
    [6-27](#Fig27)). Thus, it makes sense to consider the key intellectual unit of
    thinking as a *structured arrangement of thinkers* rather than just one individual
    thinker. These “cells” are the new unit objects, which can be stacked together
    like “super-layers” in a similar way that we stacked individual thinkers before
    – we can stack these cells of thinkers linearly, in branches, add residual connections,
    etc. By replacing the base unit of information processing with a more powerful
    unit, we systematically increase the modeling power of the entire system.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 深刻的智力工作最好是通过多个思考者之间的对话来完成，而不是单个思考者的处理能力（见图 [6-27](#Fig27)）。因此，将思考的关键智力单元视为一个**结构化的思考者安排**，而不是仅仅一个个体思考者是有意义的。这些“单元”是新的单元对象，可以像之前堆叠单个思考者一样堆叠在一起——我们可以线性地堆叠这些思考者单元，在分支中堆叠，添加残留连接等。通过用更强大的单元替换信息处理的基本单元，我们系统地提高了整个系统的建模能力。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig27_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig27_HTML.jpg)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig27_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig27_HTML.jpg)'
- en: Figure 6-27
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-27
- en: Arrangement of thinkers into cells
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 将思想家排列成单元格
- en: Likewise, by arranging neural network layers into cells, we form a new unit
    with which we can manipulate architecturally – the cell, which contains more processing
    capability than a single layer. A cell can be thought of as a “mini-network.”
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，通过将神经网络层排列成单元格，我们形成了一个新的单元，我们可以用它来操作架构——单元格，它比单个层具有更多的处理能力。单元格可以被视为一个“微型网络”。
- en: In a block/cell-based design, a neural network consists of several repeating
    “cells,” each of which contains a preset arrangement of layers (Figure [6-28](#Fig28)).
    Cells have shown to be a simple and effective way to increase the depth of a network.
    These cells form “motifs,” which are recurring themes or patterns in the arrangement
    of certain layers. Like many observed phenomena in deep learning, cell-based design
    has parallels in neuroscience – neural circuits have been observed to assemble
    into repeated motif patterns. Cell-based designs allow for established and standardized
    extraction of features; the top performing neural network architectures include
    a high number of well-designed cell-based neural network architectures.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于块/单元格的设计中，神经网络由几个重复的“单元格”组成，每个单元格都包含预设的层排列（见图 [6-28](#Fig28)）。单元格已被证明是增加网络深度的一种简单而有效的方法。这些单元格形成“模式”，即在某些层排列中的重复主题或模式。像深度学习中观察到的许多现象一样，基于单元格的设计在神经科学中也有相似之处——观察到的神经网络电路会组装成重复的模式。基于单元格的设计允许进行建立和标准化的特征提取；表现最好的神经网络架构包括大量精心设计的基于单元格的神经网络架构。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig28_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig28_HTML.jpg)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig28_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig28_HTML.jpg)'
- en: Figure 6-28
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-28
- en: Usage of cell-based design
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 基于单元格设计的用法
- en: From a design standpoint, cells reduce the search space a neural network designer
    is confronted with. (You may recall that this is the justification given for a
    NASNet-style search space for cell architectures discussed in Chapter [5](516104_1_En_5_Chapter.xhtml).)
    The designer is able to exercise fine-tuned control over the architecture of the
    cell, which is stacked repeatedly, therefore amplifying the effect of changes
    to the architecture. Contrast this with making a change to one layer in a non-cell-based
    network – it is unlikely that making one change would be significant enough to
    yield meaningfully different results (provided there exist other similar layers).
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 从设计角度来看，单元格减少了神经网络设计者面临的设计空间。 (您可能还记得，这是在第 [5](516104_1_En_5_Chapter.xhtml)
    章节中讨论的用于单元格架构的 NASNet 风格搜索空间的合理性。) 设计者能够对单元格的架构进行精细控制，该架构被反复堆叠，因此放大了架构变化的影响。与此相对比的是，在非基于单元格的网络中更改一个层——做出一个改变不太可能足够显著，以至于会产生有意义的差异（假设存在其他类似的层）。
- en: 'There are two key factors to consider in cell-based design: the architecture
    of the cell itself and the stacking method. This section will discuss methods
    of stacking across sequential and nonlinear cell design.'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于单元格的设计中，有两个关键因素需要考虑：单元格本身的架构和堆叠方法。本节将讨论跨顺序和非线性单元格设计的堆叠方法。
- en: Sequential Cell Design
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 顺序单元格设计
- en: Sequential cell designs are – as implied by the name – cell architectures that
    follow a sequential, or linear, topology. While sequential cell designs have not
    generally performed as well as nonlinear cell designs, they can be useful as a
    beginning location to illustrate key concepts that will be used in nonlinear cell
    designs.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 顺序单元格设计——正如其名称所暗示的——是遵循顺序或线性拓扑的单元格架构。虽然顺序单元格设计通常不如非线性单元格设计表现得好，但它们可以作为说明非线性单元格设计中将要用到的关键概念的起点。
- en: We’ll begin with building a *static dense cell* – a cell whose primary processing
    layer is the fully connected layer and that does not change its layers to adapt
    to the input shape (Listing [6-17](#PC17)). Using the same logic as previously
    established, a function is defined to take in an input layer upon which the cell
    will be built. The last layer of the cell is then returned to be the input to
    the next cell (or to the output layer).
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从构建一个**静态密集单元格**开始——一个主要处理层是全连接层且不改变其层以适应输入形状的单元格（见代码列表 [6-17](#PC17)）。使用之前建立的相同逻辑，定义了一个函数，该函数接受一个输入层，单元格将在此基础上构建。然后，单元格的最后一层被返回作为下一个单元格（或输出层）的输入。
- en: '[PRE16]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: These cells can then be repeatedly stacked by iteratively passing the output
    of the previously constructed cell as the input to the next cell (Listing [6-18](#PC18)).
    This combination of cell design and stacking – linear cell design stacked in a
    linear fashion – is perhaps the simplest cell-based architectural design (Figure
    [6-29](#Fig29)).
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 这些细胞可以通过迭代地将先前构建的细胞输出作为下一个细胞的输入来反复堆叠（见列表[6-18](#PC18)）。这种细胞设计和堆叠的组合——线性细胞设计以线性方式堆叠——可能是最简单的基于细胞的架构设计（见图[6-29](#Fig29)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig30_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig30_HTML.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig30_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig30_HTML.jpg)'
- en: Figure 6-30
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-30
- en: Visualization of architecture stacking convolutional and dense cells
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 架构堆叠卷积和密集细胞的可视化
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig29_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig29_HTML.jpg)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig29_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig29_HTML.jpg)'
- en: Figure 6-29
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-29
- en: Visualization of cell-based design architecture
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 基于细胞的架构设计可视化
- en: '[PRE17]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Note that while we are building a cell-based architecture, we’re not using *compartmentalized
    design* (introduced in Chapter [3](516104_1_En_3_Chapter.xhtml) on autoencoders).
    That is, while conceptually we understand that the model is built in terms of
    repeated block segments, we do not build that into the actual implementation of
    the model by defining each cell as a separate model. In this case, there is no
    need for compartmentalized design since we do not need to access the output of
    any one particular cell. Moreover, defining builder functions should serve as
    a sufficient code-level conceptual organization of how the network is constructed.
    The primary burden of using compartmentalized design with cell-based structures
    is the need to keep track of the input shape of the previous cell’s output in
    an automated fashion, which is required when defining separate models. However,
    implementing compartmentalized design will make Keras’ architecture visualizations
    more consistent with our conceptual understanding of cell-based models by visualizing
    cells rather than the entire sequence of layers.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，当我们构建基于细胞的架构时，我们并没有使用*模块化设计*（在第[3](516104_1_En_3_Chapter.xhtml)章关于自编码器中介绍）。也就是说，虽然从概念上我们理解模型是按照重复的块段构建的，但我们并没有通过将每个细胞定义为单独的模型来实现这一点。在这种情况下，由于我们不需要访问任何特定细胞的输出，因此不需要模块化设计。此外，定义构建函数应该足以在代码级别上组织网络构建的概念。使用模块化设计在基于细胞的结构中的主要负担是需要以自动化的方式跟踪前一个细胞输出的输入形状，这在定义单独的模型时是必需的。然而，实现模块化设计将通过可视化细胞而不是整个层序列，使Keras的架构可视化与我们对基于细胞模型的概念理解更加一致。
- en: We can similarly create a static convolutional cell by using the standard sequence
    of a series of convolutional layers followed by a pooling layer, with batch normalization
    and dropout for good measure (Listing [6-19](#PC19)).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过使用一系列卷积层后跟一个池化层，并添加批量归一化和dropout来创建一个静态的卷积细胞（见列表[6-19](#PC19)）。
- en: '[PRE18]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: We can combine the convolutional and dense cells together (Listing [6-20](#PC20),
    Figure [6-30](#Fig30)). After the convolutional component is completed, we use
    Global Average Pooling 2D (the Flatten layer also works) to collapse the image-based
    information flow into a vector-like shape that is processable by the fully connected
    component.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将卷积细胞和密集细胞结合起来（见列表[6-20](#PC20)，图[6-30](#Fig30)）。在卷积组件完成后，我们使用2D全局平均池化（展开层也适用）将基于图像的信息流折叠成一个向量形状，该形状可以由全连接组件处理。
- en: '[PRE19]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Note that static dense and static convolutional cells have different effects
    on the data input shapes they are applied to. Static dense cells always output
    the same data output shape, since the user specifies the number of nodes the input
    will be projected to when defining a Dense layer in Keras. On the other hand,
    static convolutional cells output different data output shapes, depending on which
    data input shapes they received. (This is discussed in more detail in Chapter
    [2](516104_1_En_2_Chapter.xhtml) on transfer learning.) Because different primary
    layer types in cell designs can yield different impacts on the data shape, it
    is general convention not to build static cells.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，静态密集和静态卷积细胞对它们应用到的数据输入形状有不同的影响。静态密集细胞始终输出相同的数据输出形状，因为当在 Keras 中定义 Dense 层时，用户指定了输入将被投影到的节点数。另一方面，静态卷积细胞根据它们接收到的数据输入形状输出不同的数据输出形状。（这将在第
    [2](516104_1_En_2_Chapter.xhtml) 章节中更详细地讨论，该章节讨论了迁移学习。）由于细胞设计中不同的主要层类型可以对数据形状产生不同的影响，因此通常的惯例是不构建静态细胞。
- en: Instead, cells are generally built by their effect on the output shape, such
    that they can more easily be stacked together. This is especially helpful in nonlinear
    stacking patterns, in which cell outputs must match to be merged in a valid fashion.
    Generally, cells can be categorized as reduction cells or normal cells. Normal
    cells keep the output shape the same shape as the input shape, whereas reduction
    cells decrease the output shape from the input shape. Many modern architectures
    employ multiple designs for normal and reduction cells that are stacked repeatedly
    throughout the model.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，细胞通常是通过它们对输出形状的影响来构建的，这样它们可以更容易地堆叠在一起。这在非线性堆叠模式中特别有用，在这种模式中，细胞输出必须匹配才能以有效的方式合并。通常，细胞可以分为减少细胞或正常细胞。正常细胞保持输出形状与输入形状相同，而减少细胞将输出形状从输入形状减小。许多现代架构在模型中反复堆叠使用多个正常和减少细胞的多种设计。
- en: In order to build these shape-based cells (Listing [6-21](#PC21)), we will need
    an additional parameter to keep track of – the input shape. For a network dealing
    with tabular data, we are concerned only with the width of the input layer. In
    a normal cell, the output is the same width as the input; we define a reduction
    cell to reduce the size of the input by half, although you can adopt different
    designs, depending on your problem type. Each cell-building function returns the
    output layer of the cell, in addition to the width of the output layer. This information
    will be employed in building the next cell.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建这些基于形状的细胞（清单 [6-21](#PC21)），我们需要一个额外的参数来跟踪——输入形状。对于一个处理表格数据的网络，我们只关心输入层的宽度。在正常细胞中，输出宽度与输入相同；我们定义减少细胞以将输入大小减半，尽管你可以根据你的问题类型采用不同的设计。每个细胞构建函数返回细胞输出层的宽度，以及输出层的宽度。这些信息将被用于构建下一个细胞。
- en: '[PRE20]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: We can simply sequentially stack these two cells together in an alternating
    pattern (Listing [6-22](#PC22), Figure [6-31](#Fig31)). We use the holder variables
    `cell_out` and `w` to keep track of the output of a cell and the corresponding
    width. Each cell-building function either keeps the shape `w` the same or modifies
    it to reflect changes in the shape of the output layer of the cell. This information
    is, as mentioned before, passed into the following cell-building functions.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以简单地以交替模式依次堆叠这两个细胞（清单 [6-22](#PC22)，图 [6-31](#Fig31)）。我们使用持有变量 `cell_out`
    和 `w` 来跟踪细胞的输出和相应的宽度。每个细胞构建函数要么保持形状 `w` 不变，要么修改它以反映细胞输出层形状的变化。正如之前提到的，这些信息将被传递到下一个细胞构建函数。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig31_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig31_HTML.jpg)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig31_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig31_HTML.jpg)'
- en: Figure 6-31
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-31
- en: Architecture of alternating stacks of cells
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 细胞交替堆叠的架构
- en: '[PRE21]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Building convolutional normal and reduction cells is similar, but we need to
    keep track of three shape elements rather than one. Like in the context of autoencoders
    and other shape-sensitive contexts, it’s best to use `padding='same'` to keep
    the input and output shapes the same.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 构建卷积正常和减少细胞类似，但我们需要跟踪三个形状元素而不是一个。就像在自动编码器和其他形状敏感的上下文中一样，最好使用 `padding='same'`
    来保持输入和输出形状相同。
- en: The normal cell uses two convolutional cells with `'same'` padding (Listing
    [6-23](#PC23)). You can also use a pooling layer with `padding='same'` if you’d
    like to use pooling in a normal cell. Note that the depth of the input is passed
    as the number of filters in the convolutional layers to preserve the input shape.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 正常单元使用两个带有`'same'`填充的卷积单元（列表[6-23](#PC23)）。如果你想在正常单元中使用池化，也可以使用带有`padding='same'`的池化层。请注意，输入的深度作为卷积层的过滤器数量传递，以保留输入形状。
- en: '[PRE22]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: The reduction cell (Listing [6-24](#PC24)) also uses two convolutional cells
    with `'same'` padding, but a pooling layer is added, which reduces the height
    and width by half. We return the new shape, which halves the height and width.
    The ceiling operation is performed on the result, in the case that the input shape
    height or width is odd and the result of division is not an integer. If you use
    a different padding mode for max pooling, you’ll need to correspondingly adjust
    how the new shape is calculated.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 减少单元（列表[6-24](#PC24)）也使用两个带有`'same'`填充的卷积单元，但增加了一个池化层，将高度和宽度减半。我们返回新的形状，将高度和宽度减半。如果输入形状的高度或宽度是奇数，并且除法的结果不是整数，则执行向上取整操作。如果你使用不同的填充模式进行最大池化，你需要相应地调整新形状的计算方式。
- en: '[PRE23]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: These two cells can then be stacked in a linear arrangement, as previously demonstrated.
    Alternatively, these cells can be stacked in a nonlinear format. To do this, we’ll
    use the methods and ideas developed from the nonlinear and parallel representation
    section.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个单元可以像之前演示的那样线性堆叠。或者，这些单元可以以非线性格式堆叠。为此，我们将使用从非线性和平行表示部分发展出来的方法和想法。
- en: To merge the outputs of two cells together, they need to have the same shape.
    Thanks to shape-based design, we can arrange normal and reduction cells accordingly
    to form valid merge operations. For instance, we can draw a residual connection
    from a normal cell “over” another normal cell, merge the two connections, and
    pass the merged result into a reduction cell as displayed in Figure [6-32](#Fig32).
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 要合并两个单元的输出，它们需要具有相同的形状。多亏了基于形状的设计，我们可以相应地安排正常和减少单元以形成有效的合并操作。例如，我们可以从一个正常单元“跨越”另一个正常单元绘制残差连接，合并这两个连接，并将合并后的结果传递到如图[6-32](#Fig32)所示的减少单元中。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig32_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig32_HTML.jpg)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig32_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig32_HTML.jpg)'
- en: Figure 6-32
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-32
- en: Nonlinear stacking of cells
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 单元非线性堆叠
- en: However, reduction cells form “borders” that cannot be transgressed by connections
    (unless you use reshaping mechanisms), because the input shapes on the two sides
    of the reduction cell do not match (Figure [6-33](#Fig33)).
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，减少单元形成“边界”，连接无法跨越（除非你使用重塑机制），因为减少单元两边的输入形状不匹配（图[6-33](#Fig33)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig33_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig33_HTML.jpg)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig33_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig33_HTML.jpg)'
- en: Figure 6-33
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-33
- en: Demonstration of residual connection usage across cells
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 单元间残差连接使用演示
- en: We can build nonlinear cell-stacking architectures in a very similar way as
    we built nonlinearities and parallel representations among layers in a network
    architecture. We will use the `make_rc` function defined in the previous section
    to merge the outputs of `norm_1` and `norm_2` and pass the merged result as the
    input of a reduction cell (Listing [6-25](#PC25), Figure [6-34](#Fig34)). The
    shape is defined after the input with a depth of 64 such that convolutional layers
    process the data with 64 filters (rather than 3). If desired, you can manipulate
    reduction cells to also change the image depth. Note that the merging operation
    we use in this case is adding rather than concatenation. The output shape of adding
    is the same as the input shape of any one of the inputs, whereas depth-wise concatenation
    changes the shape. This can be accommodated but requires ensuring the shape is
    correspondingly updated.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以以非常类似的方式构建非线性细胞堆叠架构，就像我们在网络架构中构建非线性性和层之间的并行表示一样。我们将使用上一节中定义的`make_rc`函数来合并`norm_1`和`norm_2`的输出，并将合并后的结果作为减少单元的输入（列表[6-25](#PC25)，图[6-34](#Fig34)）。形状在输入之后定义，深度为64，这样卷积层就可以使用64个过滤器处理数据（而不是3个）。如果需要，你可以操作减少单元来改变图像深度。请注意，我们在这个情况下使用的合并操作是加法而不是连接。加法的输出形状与任何一个输入的输入形状相同，而深度连接会改变形状。这可以适应，但需要确保形状相应地更新。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig34_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig34_HTML.jpg)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig34_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig34_HTML.jpg)'
- en: Figure 6-34
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-34
- en: Residual connections across normal cells
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 正常细胞之间的残差连接
- en: '[PRE24]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Cells can similarly be stacked in DenseNet style and with parallel branches
    for more complex representation. If you’re using linear cell designs, it’s recommended
    to use nonlinear stacking methods to add nonlinearity into the general network
    topology.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 细胞可以类似地以 DenseNet 风格堆叠，并具有并行分支以实现更复杂的表示。如果你使用线性细胞设计，建议使用非线性堆叠方法向网络拓扑结构中添加非线性。
- en: Nonlinear Cell Design
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非线性细胞设计
- en: Nonlinear cell designs have only one input and output, but use nonlinear topologies
    to develop multiple parallel representations and processing mechanisms, which
    are combined into an output. Nonlinear cell designs are generally more successful
    (and hence more popular) because they allow for the construction of more powerful
    cells.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 非线性细胞设计只有一个输入和一个输出，但使用非线性拓扑结构来开发多个并行表示和处理机制，这些机制被组合成一个输出。非线性细胞设计通常更成功（因此更受欢迎），因为它们允许构建更强大的细胞。
- en: Building nonlinear cell designs is relatively simple with knowledge of nonlinear
    representation and sequential cell design. The design of nonlinear cells closely
    follows the previous discussion on nonlinear and parallel representation. Nonlinear
    cells form organized, highly efficient feature extraction modules that can be
    chained together to successively process information in a powerful, easily scalable
    manner.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 在了解非线性表示和顺序细胞设计的基础上，构建非线性细胞设计相对简单。非线性细胞的设计紧密遵循之前关于非线性和并行表示的讨论。非线性细胞形成有组织的、高度有效的特征提取模块，可以串联在一起，以强大、易于扩展的方式连续处理信息。
- en: Branch-based design is especially powerful in the design of nonlinear cell architectures.
    It is able to effectively extract and merge different parallel representations
    of data in one compact, stackable cell.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 基于分支的设计在非线性细胞架构的设计中特别强大。它能够在一个紧凑、可堆叠的细胞中有效地提取和合并数据的不同并行表示。
- en: Let’s build a normal cell for image data that keeps the spatial dimensions and
    depth of the data constant (Listing [6-26](#PC26), Figure [6-35](#Fig35)). Like
    previous designs, it will take in both the input layer to attach the cell to,
    as well as the shape of the data. The depth of the image will be extracted from
    the shape and used as the depth throughout the cell. By using appropriate padding,
    the spatial dimensions of the data remain unchanged too. Three branches each extract
    and process features in parallel with different filter sizes; these representations
    are then merged via concatenation (depth-wise, meaning that they are “stacked
    together”). This merging produces data of shape (*h*, *w*, *d* · 3), as we are
    stacking together the outputs of three branches; to ensure that the output shape
    is identical to the input shape, we add another convolutional layer with filter
    `(1, 1)` to collapse the number of channels from *d* · 3 to *d*.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个用于图像数据的正常细胞，保持数据的空间维度和深度不变（见代码清单 [6-26](#PC26)，图 [6-35](#Fig35)）。像之前的设计一样，它将接受输入层以连接细胞，以及数据的形状。图像的深度将从形状中提取并用于整个细胞。通过使用适当的填充，数据的空间维度也保持不变。三个分支分别以不同的滤波器大小并行提取和处理特征；然后通过连接（深度方向，意味着它们是“堆叠在一起”）合并这些表示。这种合并产生形状为
    (*h*, *w*, *d* · 3) 的数据，因为我们正在堆叠三个分支的输出；为了确保输出形状与输入形状相同，我们添加了一个具有滤波器 `(1, 1)`
    的另一个卷积层，将通道数从 *d* · 3 减少到 *d*。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig35_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig35_HTML.jpg)'
  id: totrans-242
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig35_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig35_HTML.jpg)'
- en: Figure 6-35
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-35
- en: Hypothetical architecture of nonlinear normal cell
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 非线性正常细胞的假设架构
- en: '[PRE25]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: We can similarly build a reduction cell by building multiple branches that reduce
    the spatial dimension of the input (Listing [6-27](#PC27), Figure [6-36](#Fig36)).
    In this case, one branch performs a convolution with stride `(2, 2)` – halving
    the spatial dimension. Another uses a standard max pooling reduction. Both are
    followed by a convolution layer with filter `(1,1)` that separately process the
    output before they are merged together via depth-wise concatenation. When the
    two are concatenated, the depth is doubled. This is fine in this case; since we
    want to compensate for decreases in resolution with corresponding increase in
    quantity of filters, there is no need to decrease the number of filters after
    concatenation as performed in the design of the normal cell. Correspondingly,
    we place a convolutional layer with filter `(1,1)` to further process the results
    of concatenation and use that layer as the output. The new shape of the data is
    correspondingly calculated and passed as a second output to the cell-building
    function.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过构建多个分支来构建一个减少细胞，这些分支减少了输入的空间维度（清单[6-27](#PC27)，图[6-36](#Fig36)）。在这种情况下，一个分支执行步长为`(2,
    2)`的卷积操作——减半空间维度。另一个使用标准的最大池化减少。两者之后都跟着一个具有`(1,1)`滤波器的卷积层，分别处理合并之前的输出。当两者合并时，深度加倍。在这种情况下这是可以的；因为我们想通过增加滤波器的数量来补偿分辨率降低，因此在合并后不需要像正常细胞设计中那样减少滤波器的数量。相应地，我们放置一个具有`(1,1)`滤波器的卷积层来进一步处理合并的结果，并将该层用作输出。相应地计算新的数据形状并将其作为第二个输出传递给细胞构建函数。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig36_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig36_HTML.jpg)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig36_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig36_HTML.jpg)'
- en: Figure 6-36
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-36
- en: Hypothetical architecture of a nonlinear reduction cell
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 非线性减少细胞的假设架构
- en: '[PRE26]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: These two cells (and any other additional designs for normal or reduction cells)
    can be stacked linearly. Because nonlinearly designed cells contain sufficient
    nonlinearity, there is less of a need to be aggressive in nonlinear stacking.
    Stacking nonlinear cells sequentially is a tried-and-true formula. One concern
    that could arise with linear stacking arises if you are stacking so many cells
    together that the depth of the network poses problems for cross-network information
    flow. Using residual connections across cells can help to address this problem.
    In the case study for this section, on the famed InceptionV3 model, we will explore
    a concrete example of successful nonlinear cell-based architectural design.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个细胞（以及为正常或减少细胞设计的任何其他附加设计）可以线性堆叠。由于非线性设计的细胞包含足够的非线性，因此在非线性堆叠中不需要过于激进。按顺序堆叠非线性细胞是一个经过验证的公式。在线性堆叠中可能出现的一个问题是，如果你堆叠了如此多的细胞，以至于网络的深度对跨网络信息流造成问题。使用跨细胞残差连接可以帮助解决这个问题。在本节的案例研究中，我们将探讨著名的InceptionV3模型，并探索基于非线性细胞架构设计的具体实例。
- en: 'Case Study: InceptionV3'
  id: totrans-252
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究：InceptionV3
- en: The famous InceptionV3 architecture , part of the Inception family of models
    that has become a pillar of image recognition, was proposed by Christian Szegedy,
    Vincent Vanhoucke, Sergey Ioffe, Jonathon Shlens, and Zbigniew Wojna in the 2015
    paper “Rethinking the Inception Architecture for Computer Vision.”^([2](#Fn2))
    The InceptionV3 architecture, in many ways, laid out the key principles of convolutional
    neural network design for the following years to come. The aspect most relevant
    for this context is its cell-based design.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 著名的InceptionV3架构，作为Inception模型系列的一部分，已经成为图像识别的支柱，由Christian Szegedy、Vincent
    Vanhoucke、Sergey Ioffe、Jonathon Shlens和Zbigniew Wojna在2015年的论文“Rethinking the
    Inception Architecture for Computer Vision.”中提出。在许多方面，InceptionV3架构为未来几年的卷积神经网络设计奠定了关键原则。与此背景最相关的是其基于细胞的架构设计。
- en: The InceptionV3 model attempted to improve upon the designs of the previous
    InceptionV2 and original Inception models. The original Inception model consisted
    of a series of repeated cells (referred to in the paper as “modules”) that followed
    a multi-branch nonlinear architecture (Figure [6-37](#Fig37)). Four branches stem
    from the input to the module; two branches consist of a 1x1 convolution followed
    by a larger convolution, one branch is defined as a pooling operation followed
    by a 1x1 convolution, and another is just a 1x1 convolution. Padding is provided
    on all operations in these modules such that the size of the filters is kept the
    same such that the results of the parallel branch representations can be concatenated
    depth-wise back together.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: InceptionV3模型试图在之前的InceptionV2和原始Inception模型的设计上取得进步。原始Inception模型由一系列重复的细胞（在论文中称为“模块”）组成，这些细胞遵循多分支非线性架构（见图[6-37](#Fig37)）。四个分支从模块的输入开始；两个分支由一个1x1卷积后跟一个更大的卷积组成，一个分支定义为池化操作后跟一个1x1卷积，另一个分支只是一个1x1卷积。在这些模块的所有操作中提供填充，以保持滤波器的大小不变，这样并行分支表示的结果就可以在深度方向上拼接回一起。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig37_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig37_HTML.jpg)'
  id: totrans-255
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig37_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig37_HTML.jpg)'
- en: Figure 6-37
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-37
- en: 'Left: original Inception cell. Right: one of the InceptionV3 cell architectures'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 左：原始Inception细胞。右：InceptionV3细胞架构之一
- en: 'A key architectural change in the InceptionV3 module designs is the *factorization*
    of large filter sizes like 5x5 into a combination of smaller filter sizes. For
    instance, the effect of a 5x5 filter can be “factored” into a series of two 3x3
    filters; a 5x5 filter applied on a feature map (with no padding) yields the same
    output shape as two 3x3 filters: `(w-4, h-4, d)`. Similarly, a 7x7 filter can
    be “factored” into three 3x3 filters. Szegedy et al. note that this factorization
    does not decrease representative power while promoting faster learning. This module
    will be termed the *symmetric factorization module* , although in implementation
    within the context of the InceptionV3 architecture it is referred to as *Module
    A* .'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: InceptionV3模块设计中一个关键的架构变化是将大型滤波器尺寸，如5x5，分解为更小的滤波器尺寸的组合。例如，5x5滤波器的影响可以被“分解”为一系列两个3x3滤波器；在特征图上应用5x5滤波器（没有填充）会产生与两个3x3滤波器相同的输出形状：(w-4,
    h-4, d)。同样，7x7滤波器可以被“分解”为三个3x3滤波器。Szegedy等人指出，这种分解不会降低表示能力，同时促进了更快的学习。这个模块将被称为**对称分解模块**，尽管在InceptionV3架构的实现中，它被称为**模块A**。
- en: In fact, even 3x3 and 2x2 filters can be factorized into sequences of convolutions
    with smaller filter sizes. An *n* by *n* convolution can be represented as a 1
    by *n* convolution followed by an *n* by 1 convolution (or vice versa). Convolutions
    with kernel height and widths that are different lengths are known as *asymmetric
    convolutions* and can be valuable fine-grained feature detectors (Figure [6-38](#Fig38)).
    In the InceptionV3 module architecture, *n* was chosen to be 7\. This module will
    be termed the *asymmetric factorization module* (also known as *Module B* ). Szegedy
    et al. find that this module performs poorly on early layers but works well on
    medium-sized feature maps; it is correspondingly placed after symmetric factorization
    modules in the InceptionV3 cell stack.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，3x3和2x2滤波器也可以分解为更小滤波器尺寸的卷积序列。一个n x n的卷积可以表示为一个1 x n卷积后跟一个n x 1卷积（或反之）。具有不同长度的核高度和宽度的卷积被称为**非对称卷积**，并且可以作为有价值的细粒度特征检测器（见图[6-38](#Fig38)）。在InceptionV3模块架构中，n被选为7。这个模块将被称为**非对称分解模块**（也称为**模块B**）。Szegedy等人发现，这个模块在早期层表现不佳，但在中等大小的特征图上表现良好；因此，它相应地放置在InceptionV3细胞堆栈中的对称分解模块之后。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig38_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig38_HTML.jpg)'
  id: totrans-260
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig38_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig38_HTML.jpg)'
- en: Figure 6-38
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-38
- en: Factorizing n by n filters as operations of smaller filters
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 将n x n滤波器分解为较小滤波器的操作
- en: For extremely *coarse* (i.e., small-sized) inputs, a different module with *expanded
    filter bank outputs* is used. This model architecture encourages the development
    of high-dimensional representations by using a tree-like topology – the two left
    branches in the symmetric factorization module are further “split” into “child
    nodes,” which are concatenated along with the outputs of the other branches at
    the end of the filter (Figure [6-39](#Fig39)). This type of module is placed at
    the end of the InceptionV3 architecture to handle feature maps when they have
    become small spatially. This module will be termed the *expanded filter bank module*
    (or *Module C* ).
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 对于极其**粗糙**（即尺寸小的）输入，使用具有**扩展滤波器银行输出**的不同模块。这种模型架构通过使用树状拓扑结构来鼓励发展高维表示 - 对称分解模块中的两个左侧分支进一步“分裂”成“子节点”，这些子节点与滤波器末端的输出一起在滤波器末尾进行连接（图[6-39](#Fig39)）。这种类型的模块放置在InceptionV3架构的末尾，以处理当特征图在空间上变得很小时的情况。这个模块将被称为**扩展滤波器银行模块**（或**模块C**）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig39_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig39_HTML.jpg)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig39_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig39_HTML.jpg)'
- en: Figure 6-39
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-39
- en: Expanded filter bank cell – blocks within the cell are further expanded by branching
    into other filter sizes
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展的滤波器银行单元 - 单元内的块通过分支到其他滤波器大小进一步扩展。
- en: Another reduction-style Inception module is designed to efficiently reduce the
    size of the filters (Figure [6-40](#Fig40)). The reduction-style module uses three
    parallel branches; two use convolutions with a stride of 2 and the other uses
    a pooling operation. These three branches produce the same output shapes, which
    can be concatenated depth-wise. Note that Inception modules are designed such
    that a decrease in size is correspondingly counteracted with an increase in the
    number of filters.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个设计为高效减少滤波器尺寸的减少式Inception模块（图[6-40](#Fig40)）。减少式模块使用三个并行分支；其中两个使用步长为2的卷积，另一个使用池化操作。这三个分支产生相同的输出形状，可以在深度上进行连接。请注意，Inception模块被设计成当尺寸减少时，滤波器数量相应增加。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig40_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig40_HTML.jpg)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig40_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig40_HTML.jpg)'
- en: Figure 6-40
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-40
- en: Design of a reduction cell
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 减少单元的设计
- en: 'The InceptionV3 architecture is formed by stacking these module types in a
    linear fashion, ordered such that each module is placed in a location where it
    will receive a feature map input shape that it succeeds in processing. The following
    sequence of modules is used:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: InceptionV3架构是通过以线性方式堆叠这些模块类型形成的，按顺序排列，使得每个模块都放置在一个它将接收特征图输入形状并成功处理的位置。使用的模块序列如下：
- en: A series of convolutional and pooling layers to perform initial feature extraction
    (these are not part of any module).
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一系列卷积和池化层用于执行初始特征提取（这些不属于任何模块）。
- en: Three repeats of the symmetric convolution module/Module A.
  id: totrans-273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对称卷积模块/模块A的重复三次。
- en: Reduction module.
  id: totrans-274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 减少模块。
- en: Four repeats of the asymmetric convolution module/Module B.
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 非对称卷积模块/模块B的重复四次。
- en: Reduction module.
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 减少模块。
- en: Two repeats of the expanded filter bank module/Module C.
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 扩展滤波器银行模块/模块C的重复两次。
- en: Pooling, dense layer, and softmax output.
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 池化、密集层和softmax输出。
- en: 'Another often unnoticed but important feature of the Inception family of architectures
    is the 1x1 convolution, which is present in every Inception cell design, often
    as the most frequently occurring element in the architecture. As discussed in
    previous chapters, using convolutions with kernel size (1,1) is convenient in
    terms of building architectures like autoencoders when there is a need to collapse
    the number of channels. In terms of model performance, though, 1x1 convolutions
    serve a key purpose in the Inception architecture: computing cheap filter reductions
    before expensive, larger kernels are applied to feature map representations. For
    instance, suppose at some location in the architecture 256 filters are passed
    into a 1x1 convolutional layer; the 1x1 convolutional layer can reduce the number
    of filters to 64 or even 16 by learning the optional combination of values for
    each pixel from all 256 filters. Because the 1x1 kernel does not incorporate any
    spatial information (i.e., it doesn’t take into account pixels next to one another),
    it is cheap to compute. Moreover, it isolates the most important features for
    the following larger (and thus more expensive) convolution operations that incorporate
    spatial information.'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: Inception 架构系列的一个重要但常被忽视的特征是 1x1 卷积，它在每个 Inception 单元设计中都存在，通常是架构中最常出现的元素。正如前几章所讨论的，当需要减少通道数时，使用大小为
    (1,1) 的卷积在构建如自编码器等架构时很方便。然而，在模型性能方面，1x1 卷积在 Inception 架构中发挥着关键作用：在应用昂贵的大尺寸卷积核到特征图表示之前，计算廉价的滤波器减少。例如，假设在架构的某个位置有
    256 个滤波器通过一个 1x1 卷积层；1x1 卷积层可以通过学习每个像素从所有 256 个滤波器中可选的值组合来将滤波器数量减少到 64 或甚至 16。由于
    1x1 卷积核不包含任何空间信息（即，它不考虑相邻的像素），因此计算成本低。此外，它隔离了后续更大（因此更昂贵）的卷积操作中最重要的特征，这些操作包含空间信息。
- en: Via well-designed module architectures and purposefully planned arrangement
    of modules, the InceptionV3 architecture performed very well in that year’s ILSVRC
    (ImageNet competition) and has become a staple in image recognition architectures
    (Tables [6-2](#Tab2) and [6-3](#Tab3)).
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 通过精心设计的模块架构和有目的地规划的模块排列，InceptionV3 架构在那年的 ILSVRC（ImageNet 竞赛）中表现出色，并已成为图像识别架构中的主流（见表
    [6-2](#Tab2) 和 [6-3](#Tab3)）。
- en: Table 6-3
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 表 6-3
- en: Performance of an ensemble of InceptionV3 architectures compared against ensembles
    of other architecture models
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他架构模型集成相比，InceptionV3 架构集成的性能
