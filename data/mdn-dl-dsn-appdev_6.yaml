- en: The full InceptionV3 architecture is available at `keras.applications.InceptionV3`
    with available ImageNet weights for transfer learning or just as a powerful architecture
    (used with random weight initialization) for image recognition and modeling.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 全部 InceptionV3 架构可在 `keras.applications.InceptionV3` 找到，其中包含可用于迁移学习或仅作为强大架构（使用随机权重初始化）的
    ImageNet 权重，用于图像识别和建模。
- en: Building an InceptionV3 module itself is pretty simple, and because the design
    of each cell is relatively small, there is no need to automate its construction.
    We can build four branches in parallel to one another, which are concatenated.
    Note that we specify `strides=(1,1)` in addition to `padding='same'` in the max
    pooling layer to keep the input and output layers the same. If we only specify
    the latter, the strides argument is set to the entered pool size. These cells
    can then be stacked alongside other cells in a sequential format to form an InceptionV3-style
    architecture (Listing [6-28](#PC28), Figure [6-41](#Fig41)).
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 构建一个 InceptionV3 模块本身相当简单，并且由于每个单元的设计相对较小，因此无需自动化其构建。我们可以并行构建四个分支，这些分支是连接在一起的。请注意，我们在最大池化层中除了指定
    `padding='same'` 之外，还指定了 `strides=(1,1)` 以保持输入和输出层相同。如果我们只指定后者，则 strides 参数将设置为输入池的大小。然后，这些单元可以以顺序格式与其他单元堆叠，形成一个
    InceptionV3 风格的架构（见列表 [6-28](#PC28)，图 [6-41](#Fig41)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig41_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig41_HTML.jpg)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig41_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig41_HTML.jpg)'
- en: Figure 6-41
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-41
- en: Visualization of a Keras InceptionV3 cell
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: Keras InceptionV3 单元的可视化
- en: '[PRE27]'
  id: totrans-304
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Besides getting to work with large neural network architectures directly, another
    benefit of implementing these sorts of architectures from scratch is customizability.
    You can insert your own cell designs, add nonlinearities across cells (which InceptionV3
    does not implement by default), or increase or decrease how many cells you stack
    to adjust the network depth. Moreover, cell-based structures are incredibly simple
    and quick to implement, so this comes at little cost.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 除了能够直接处理大型神经网络架构之外，从零开始实现这些架构的另一个好处是可定制性。你可以插入自己的单元设计，在单元之间添加非线性（InceptionV3
    默认不实现），或者增加或减少堆叠的单元数量以调整网络深度。此外，基于单元的结构非常简单且易于实现，因此这几乎不会带来任何成本。
- en: Neural Network Scaling
  id: totrans-306
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 神经网络缩放
- en: Successful neural network architectures are generally not built to be static
    in their size. Through some mechanism, these network architectures are *scalable*
    to different sets of problems. In the previous chapter, for instance, we explored
    how NASNet-style Neural Architecture Search design allowed for the development
    of successful cell architectures that could be scaled by stacking different lengths
    and combinations of the discovered cells. Indeed, a large advantage to cell-based
    design is inherent scalability. In this section, we’ll discuss scaling principles
    that are applicable to all sorts of architectures – both cell-based and not.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的神经网络架构通常不是为固定尺寸而构建的。通过某种机制，这些网络架构可以 *缩放* 到不同的问题集。例如，在前一章中，我们探讨了 NASNet 风格的神经网络架构搜索设计如何允许开发出可以通过堆叠不同长度和组合的发现单元进行缩放的成功的单元架构。确实，基于单元的设计的一个大优势是其固有的可缩放性。在本节中，我们将讨论适用于所有类型架构的缩放原则——无论是基于单元的还是不是基于单元的。
- en: The fundamental idea of scaling is that a network’s “character” can be retained
    while the actual size of a network is scaled to be smaller or larger (Figure [6-42](#Fig42)).
    Think of RV model airplanes – flyable airplanes that are only a few feet large
    in any dimension. They capture the spirit of what an airplane is by retaining
    its design and general function but use fewer resources by decreasing the size
    of each component. Of course, because they use fewer resources, they are less
    equipped for certain situations that true airplanes could withstand, like heavy
    gusts of wind, but this is a necessary sacrifice for scaling.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 扩缩的基本思想是，在将网络的实际尺寸缩放到更小或更大的同时，可以保留网络的“特征”（图 [6-42](#Fig42)）。想象一下 RV 模型飞机——任何尺寸只有几英尺大的可飞飞机。通过保留其设计和一般功能，它们捕捉到了飞机的本质，但通过减小每个组件的尺寸来使用更少的资源。当然，由于它们使用了更少的资源，它们在应对某些情况（如强烈的风暴）方面不如真正的飞机，但这是缩放所必需的牺牲。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig42_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig42_HTML.jpg)'
  id: totrans-309
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig42_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig42_HTML.jpg)'
- en: Figure 6-42
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-42
- en: Scaling a model to different sizes
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 将模型扩展到不同尺寸
- en: There are generally two dimensions that can be scaled – the width (i.e., the
    number of nodes, filters, etc. in each layer) and length (i.e., the number of
    layers) in the network. These two dimensions are easily defined in linear topologies
    but are more ambiguous in nonlinear topologies. To make scaling simple, there
    are generally two paths to deal with nonlinearity. If the nonlinearity is simple
    enough that there is an easily identifiable linear backbone (e.g., residual connection-based
    architectures or simple branch architectures), the linear backbone itself is scaled.
    If the nonlinearity is too complex, arrange it into cells that can be linearly
    stacked together and scaled depth-wise. We’ll discuss these ideas more in detail.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 通常有两个维度可以缩放——网络的宽度（即每层的节点数、滤波器等）和长度（即层数）。这两个维度在线性拓扑中容易定义，但在非线性拓扑中则更加模糊。为了简化缩放，通常有两种处理非线性的路径。如果非线性的复杂程度足够简单，以至于有一个容易识别的线性主干（例如，基于残差连接的架构或简单的分支架构），则线性主干本身进行缩放。如果非线性的复杂程度太高，则将其安排成可以线性堆叠和深度缩放的细胞。我们将在更详细地讨论这些想法。
- en: 'Say, you have a neural network architecture on your hands – perhaps you’ve
    gotten it from a model repository or designed one yourself. Let’s consider three
    general scenarios in which scaling can help:'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你手头有一个神经网络架构——可能是从模型存储库中获取的，或者是你自己设计的。让我们考虑三种一般场景，在这些场景中缩放可以帮助：
- en: You find that it yields insufficiently high performance on your dataset, even
    when trained until fruition. You suspect that the maximum predictive capacity
    of the model is not enough to model your dataset.
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你发现它在你的数据集上表现不足，即使训练到完全成熟。你怀疑模型的最高预测能力不足以模拟你的数据集。
- en: You find that the model performs fine as is, but you want to decrease its size
    to make it more portable in a systematic way without damaging the key attributes
    that contribute to the model’s performance.
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你发现模型本身表现良好，但你想以系统化的方式减小其大小，使其更便携，同时不损害对模型性能有贡献的关键属性。
- en: You find that the model performs well as is, but you want to open-source the
    model for usage by the community or would like to employ it in some other context
    in which it will be applied to a diverse array of problem domains.
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你发现模型本身表现良好，但你想开源模型供社区使用，或者希望在其他某些环境中使用它，这些环境中它将被应用于各种问题领域。
- en: The principles of neural network scaling provide the key concepts to increase
    or decrease the size of your neural network in a systematic and structured fashion.
    After you have a candidate model architecture built, incorporating scalability
    into its design makes it more accessible across all sorts of problems.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络缩放的原则提供了增加或减少你神经网络大小的关键概念，以系统化和结构化的方式。在你构建了一个候选模型架构之后，将其设计中的可扩展性纳入考虑，使其能够适用于各种问题。
- en: Input Shape Adaptable Design
  id: totrans-318
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输入形状可适应设计
- en: One method of scaling is to adapt the neural network to the input shape size.
    This is a direct method of scaling the architecture in relation to the complexity
    of the dataset, in which the relative resolution of the input shape is used to
    approximate the level of predictive power that needs to be allocated to process
    it adequately. Of course, it is not always true that the size of the input shape
    is indicative of the dataset’s complexity to model. The primary idea of input
    shape adaptable design is that a larger input shape indicates more complexity
    and therefore requires more predictive power *relative* to a smaller input (the
    opposite relationship being true as well). Thus, a successful input shape adaptable
    design is able to modify the network in accordance to chances in the input shape.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放的一种方法是将神经网络适应输入形状大小。这是一种直接的方法，根据数据集的复杂性缩放架构，其中使用输入形状的相对分辨率来近似处理它所需分配的预测能力水平。当然，输入形状的大小并不总是指示数据集的复杂性。输入形状可适应设计的主要思想是，较大的输入形状表示更复杂的结构，因此相对于较小的输入需要更多的预测能力（反之亦然）。因此，一个成功的输入形状可适应设计能够根据输入形状的变化来修改网络。
- en: This sort of scaling is a practical one, given that input shape is a key vital
    component of using and transferring model architectures (i.e., if it is not correctly
    set up, the code will not run). It allows you to directly build model architectures
    that respond to different resolutions, sizes, vocabulary lengths, etc. with correspondingly
    more or less predictive resource allocation.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 这种缩放方式是实用的，因为输入形状是使用和迁移模型架构的关键重要组成部分（即，如果设置不正确，代码将无法运行）。它允许你直接构建能够响应不同分辨率、大小、词汇长度等，并相应地分配更多或更少预测资源的模型架构。
- en: The simplest adaptation to the input shape is not to modify the architecture
    at all, but to modify the shape of the input via a resizing layer (Listing [6-29](#PC29)).
    In Keras syntax, a `None` in a dimension of the input shape parameter indicates
    that the network accepts an arbitrary value for that dimension.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 对输入形状的最简单适应方式不是修改架构本身，而是通过调整形状层（列表[6-29](#PC29)）来修改输入的形状。在Keras语法中，输入形状参数的维度中的`None`表示网络接受该维度的任意值。
- en: '[PRE28]'
  id: totrans-322
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: This sort of resizing design has the benefit of *portability* in deployment;
    it’s easy to make valid predictions by passing in an image (or some other data
    form with appropriate code modifications) of any size into the network without
    any preprocessing. However, it doesn’t quite count as *scaling* in that computational
    resources are not being allocated to adapt to the input shape. If we pass an image
    with a very high resolution – (1024, 1024, 3), for instance – into the network,
    it will lose a tremendous level of information by naïvely resizing to a certain
    height or width.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 这种调整大小设计在部署时具有*便携性*的好处；通过传递任何大小的图像（或经过适当代码修改的其他数据形式）到网络中，无需任何预处理即可轻松做出有效预测。然而，这并不完全算作*缩放*，因为计算资源并没有分配来适应输入形状。如果我们向网络传递一个具有非常高分辨率的图像——例如（1024,
    1024, 3）——它将通过天真地调整到某个高度或宽度而丢失大量的信息。
- en: Let’s consider a simple example of a fully connected network whose depth is
    fixed, but whose widths are open to be adjusted. It hypothetically contains layers
    that transform the input width from 32 to 21 to 14 to 10 to 10 to 5 to 1 (output)
    across five layers. We need to identify a scalable pattern – an *architectural
    policy* that can be generalized. In this case, each width is approximately two-thirds
    the width of the previous width. We can implement this recursive architectural
    policy by defining five layer widths based on this generalized policy and storing
    it in a list of layer widths (Listing [6-30](#PC30)).
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个简单的例子，这是一个深度固定的全连接网络，但其宽度可以调整。它假设包含将输入宽度从32变为21、14、10、10、5到1（输出）的层。我们需要识别一个可扩展的模式——一个可以推广的*架构策略*。在这种情况下，每个宽度大约是前一个宽度的三分之二。我们可以通过定义基于这种通用策略的五个层宽度并存储在层宽度列表中来实现这种递归的架构策略（列表[6-30](#PC30)）。
- en: '[PRE29]'
  id: totrans-325
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: We can apply this to the construction of our simple neural network (Listing
    [6-31](#PC31)).
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这种方法应用于构建我们的简单神经网络（列表[6-31](#PC31)）。
- en: '[PRE30]'
  id: totrans-327
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: This model, albeit simple, is now capable of being transferred to datasets of
    different input sizes.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这个模型很简单，但现在它能够转移到不同输入大小的数据集上。
- en: We can similarly apply these ideas to convolutional neural networks. Note that
    convolutional layers can accept arbitrarily sized inputs, but nevertheless we
    can change the number of filters used in each layer by finding and applying generalized
    rules in the existing architecture to be scaled. In convolutional neural networks,
    we want to expand the number of filters to compensate for decreases in image resolution.
    Thus, the number of filters should increase over time relative to the original
    input shape to perform this resource compensation properly.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这些想法类似地应用于卷积神经网络。请注意，卷积层可以接受任意大小的输入，但我们仍然可以通过在现有架构中找到并应用通用的规则来改变每一层使用的过滤器数量。在卷积神经网络中，我们希望增加过滤器的数量来补偿图像分辨率的降低。因此，过滤器的数量应该随着时间的推移相对于原始输入形状增加，以正确执行这种资源补偿。
- en: We can define the number of filters we want the first convolutional layer and
    the last convolutional layer to have as dependent on the resolution of the input
    shape (Listing [6-32](#PC32)). In this case, we define it the number of filters
    as ![$$ {2}^{round\left({\mathit{\log}}_2w\right)-4} $$](../images/516104_1_En_6_Chapter/516104_1_En_6_Chapter_TeX_IEq1.png),
    where *w* is the original width (the expression is purposely left in unsimplified
    form). Thus, a 128x128 image would begin with 8 filters, whereas a 256x256 image
    would begin with 16 filters. The number of filters a network has is scaled up
    or down relative to the size of the input image. We define the number of filters
    the last convolutional layer has simply to be 2³ = 8 times the number of original
    filters.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将我们想要的第一卷积层和最后一卷积层的过滤器数量定义为输入形状的分辨率相关（见列表[6-32](#PC32)）。在这种情况下，我们将其定义为`2^round(log2(w)-4)`，其中*w*是原始宽度（表达式有意保持未简化形式）。因此，128x128的图像将开始于8个过滤器，而256x256的图像将开始于16个过滤器。网络拥有的过滤器数量相对于输入图像的大小进行缩放。我们简单地定义最后一卷积层的过滤器数量为2³ = 8倍原始过滤器数量。
- en: '[PRE31]'
  id: totrans-331
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Our goal is to progress from the starting number of filters to the ending number
    of filters throughout the ten layers we define our network depth to be. In order
    to do this, we divide the number of layers into four segments. To go from one
    segment to the next, we multiply the number of filters by 2\. We determine when
    to move to the next segment by measuring what fraction of the layers have been
    accounted for (Listing [6-33](#PC33)).
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是从起始过滤器数量到结束过滤器数量，在整个我们定义的网络深度中逐步推进。为了做到这一点，我们将层数分为四个部分。要从一部分转到下一部分，我们将过滤器数量乘以2。我们通过测量已经占用的层分数来确定何时移动到下一部分（见列表[6-33](#PC33)）。
- en: '[PRE32]'
  id: totrans-333
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The sequence of filters for a (128,128,3) image, according to this method, is
    [8, 8, 8, 16, 16, 32, 32, 32, 64, 64]. The sequence of filters for a (256,256,3)
    image is [16, 16, 16, 32, 32, 64, 64, 64, 128, 128]. Note that we don’t define
    the architectural policy in this case recursively.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这种方法，对于(128,128,3)图像的过滤器序列是[8, 8, 8, 16, 16, 32, 32, 32, 64, 64]。对于(256,256,3)图像的过滤器序列是[16,
    16, 16, 32, 32, 64, 64, 64, 128, 128]。注意，在这种情况下，我们没有递归地定义架构策略。
- en: By determining which segment to enter by measuring *progress* rather than the
    deterministic layer (i.e., if the current layer is past Layer 3), this script
    is also scalable across *depth*. By adjusting the `num_layers` parameter, you
    can “shrink” or “stretch” this sequence across any desired depth. Because higher
    resolutions generally warrant longer depths, you can also generalize the `num_layers`
    parameter as a function of the input resolution, like `num_layers = round(np.log2(128)*3)`.
    Note that in this case we are using the logarithm to prevent the scaling algorithm
    from constructing networks with depths that are too high in response to high-resolution
    inputs. The list and length of filters can then be used to automatically construct
    a neural network architecture scaled appropriately depending on the image.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 通过测量*进度*而不是确定性层（即，如果当前层已经超过第3层），此脚本也可以在*深度*上扩展。通过调整`num_layers`参数，你可以“缩小”或“拉伸”这个序列到任何所需的深度。因为高分辨率通常需要更长的深度，所以你也可以将`num_layers`参数概括为输入分辨率的函数，如`num_layers
    = round(np.log2(128)*3)`。注意，在这种情况下，我们使用对数来防止缩放算法对高分辨率输入构建深度过高的网络。然后可以使用过滤器的列表和长度来自动构建一个根据图像适当缩放的神经网络架构。
- en: 'Note that these operations should be fitted *after* you have obtained a model
    to scale in the first place. We can generalize this process of scaling into three
    steps:'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这些操作应该在首先获得一个要缩放的模型之后进行。我们可以将这个过程概括为三个步骤：
- en: Identify architectural patterns that can be generalizable for scaling, like
    the depth of the network or how the width of layers changes across the length
    of the network.
  id: totrans-337
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别可以用于缩放的通用架构模式，如网络的深度或层宽度在网络的长度上的变化。
- en: Generalize the architecture pattern into an *architectural policy* that is scalable
    across the scaled dimension.
  id: totrans-338
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将架构模式概括为一个*架构策略*，该策略可以在缩放维度上扩展。
- en: Use the architectural policy to generate concrete elements of the network architecture
    in response to the input shape (or other determinants of scaling).
  id: totrans-339
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用架构策略根据输入形状（或缩放的其它决定因素）生成网络架构的具体元素。
- en: Adaptation to input shapes is most relevant for architectures like autoencoders,
    in which the input shape is a key influence throughout the architecture. We’ll
    combine cell-based design and knowledge of autoencoders discussed in Chapter [3](516104_1_En_3_Chapter.xhtml)
    to create a *scalable* autoencoder whose length and filter sizes can automatically
    be scaled to whatever input size it is being applied to.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 对输入形状的适应对于像自编码器这样的架构最为相关，其中输入形状是整个架构中的关键影响因素。我们将结合基于单元的设计和第 [3](516104_1_En_3_Chapter.xhtml)
    章中讨论的自编码器知识，创建一个 *可扩展* 的自编码器，其长度和滤波器大小可以自动缩放到应用到的任何输入大小。
- en: To make the process of building easier, let’s define an “encoder cell” and a
    “decoder cell” (Listing [6-34](#PC34)). These are not the encoder and decoder
    *sub-models* or components but rather represent cells that can be stacked together
    to form the encoder and decoder. The encoder cell attaches two convolutional layers
    and a max pooling layer to whatever layer is passed into the cell-building function,
    whereas the decoder cell attaches the “inverse” – an upsampling layer followed
    by two transpose convolutional layers. Both return the output/last layer of the
    cell, which can be used as the input to the following cell. Note that these two
    cells halve and double the resolution of image inputs, respectively.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使构建过程更容易，让我们定义一个“编码器单元”和一个“解码器单元”（见代码清单 [6-34](#PC34)）。这些不是编码器和解码器 *子模型* 或组件，而是代表可以堆叠在一起形成编码器和解码器的单元。编码器单元将两个卷积层和一个最大池化层附加到传递给单元构建函数的任何层，而解码器单元附加“逆”操作——一个上采样层后跟两个转置卷积层。两者都返回单元的输出/最后一层，这可以用作下一个单元的输入。请注意，这两个单元分别将图像输入的分辨率减半和加倍。
- en: '[PRE33]'
  id: totrans-342
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'We will begin with three key variables: `i` will represent the power with which
    2 is raised to in determining how many filters the first and last convolutional
    layer should have (`i=4` indicates that 2⁴ = 16 filters will be used); `w`, `h`,
    and `d` will be used to hold the width, height, and depth of the input shape;
    and `curr_shape` will be used to track the shape of data as it is passed through
    the network (Listing [6-35](#PC35)).'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从三个关键变量开始：`i` 将表示用于确定第一和最后一层卷积层应有多少个滤波器的2的幂（`i=4` 表示将使用2⁴ = 16个滤波器）；`w`、`h`
    和 `d` 将用于存储输入形状的宽度、高度和深度；而 `curr_shape` 将用于跟踪数据在网络中传递时的形状（见代码清单 [6-35](#PC35)）。
- en: '[PRE34]'
  id: totrans-344
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'We must consider the two key dimensions of scale: width and depth.'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须考虑两个关键的尺度维度：宽度和深度。
- en: The number of filters in a block will be doubled if the resolution is halved,
    and it will be halved if the resolution is doubled. This sort of relationship
    ensures approximate *representation equilibrium* throughout the network – we do
    not create representation bottlenecks that are too severe, a principle of network
    design outlined by Szegedy et al. in the Inception architecture (see case study
    for section on cell-based design). Assume that this network is used for a purpose
    like pretraining or denoising in which bottlenecks can be built less liberally
    in size (in other contexts, we would *want* to build more severe representation
    bottlenecks). We can keep track of this relationship by increasing `i` by 1 after
    an encoder cell is attached and decreasing it by 1 after a decoder cell is attached.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 如果分辨率减半，则一个块中的滤波器数量将加倍；如果分辨率加倍，则滤波器数量将减半。这种关系确保了整个网络中近似的 *表示平衡* – 我们不会创建过于严重的表示瓶颈，这是
    Szegedy 等人在 Inception 架构中概述的网络设计原则。假设这个网络用于预训练或去噪等目的，在这些目的中，瓶颈可以更自由地构建（在其他上下文中，我们
    *希望* 构建更严重的表示瓶颈）。我们可以在编码器单元附加后通过增加 `i` 1，在解码器单元附加后通过减少 `i` 1 来跟踪这种关系。
- en: In this example, we will build our neural network not with a certain pre-specified
    depth, but with whatever depth is necessary to obtain a certain bottleneck size.
    That is, we will continue stacking encoder blocks until the data shape is equal
    to (or falls below) a certain desired bottleneck size. At this point, we will
    stack *decoder* blocks to progressively increase the size of the data until it
    reaches its original size.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将构建我们的神经网络，而不是使用特定的预指定深度，而是使用必要的任何深度以获得一定的瓶颈大小。也就是说，我们将继续堆叠编码器块，直到数据形状等于（或低于）一定的期望瓶颈大小。在此之后，我们将堆叠
    *解码器* 块，逐步增加数据的大小，直到它达到原始大小。
- en: We can construct the input layer and the first encoder cell (Listing [6-36](#PC36)).
    We update the current shape of the data appropriately by halving after an encoder
    cell is added. Moreover, we increase `i` such that the following encoder cell
    uses two times as many filters. An infinite loop continues stacking encoder cells
    until the output shape of the cell (i.e., the potential bottleneck) is equal to
    or less than 16 neurons (the desired cell).
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以构建输入层和第一个编码器单元（见[6-36](#PC36)）。在添加编码器单元后，我们通过减半来适当地更新数据的当前形状。此外，我们增加`i`，使得下一个编码器单元使用两倍的过滤器。一个无限循环继续堆叠编码器单元，直到单元的输出形状（即潜在瓶颈）等于或小于16个神经元（所需的单元）。
- en: '[PRE35]'
  id: totrans-349
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: After the encoder is built, we can correspondingly build the decoder, which
    repeatedly stacks decoder cells and decreases `i` such that the following cell
    uses half as many filters (Listing [6-37](#PC37)). While you could continue to
    keep track of the shape and break when the current shape was equal to the original
    shape, another approach that uses less code is to take advantage of our usage
    of `i` and treating `i=4` as an indication that we have reached the initial state.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 在编码器构建完成后，我们可以相应地构建解码器，解码器反复堆叠解码器单元并减少`i`，使得下一个单元使用一半数量的过滤器（见[6-37](#PC37)）。虽然你可以继续跟踪形状并在当前形状等于原始形状时停止，但另一种使用更少代码的方法是利用我们对`i`的使用，并将`i=4`视为达到初始状态的一个指示。
- en: '[PRE36]'
  id: totrans-351
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: The complete model can be aggregated as `ae = keras.models.Model(inputs=inp,
    outputs=x)`. This simple autoencoder design – using two convolutions followed
    by a pooling operation – has been scaled to be capable of modeling any input size
    resolution (as long as it is a power of 2, since pooling makes approximations
    that are not captured in upsampling if the side length is not cleanly divisible
    by the pooling factor – see Chapter [3](516104_1_En_3_Chapter.xhtml) for more
    on this). Scaling a model to be adaptable to different input sizes can require
    more work, as we’ve seen, but it makes your model more accessible and agile in
    experimentation and deployment.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的模型可以聚合为 `ae = keras.models.Model(inputs=inp, outputs=x)`。这种简单的自动编码器设计——使用两个卷积操作后跟一个池化操作——已经扩展到能够模拟任何输入大小分辨率（只要它是2的幂，因为池化会做出近似，而这些近似在反池化中不会被捕捉到，如果边长不能被池化因子干净地整除——有关更多信息，请参阅第[3](516104_1_En_3_Chapter.xhtml)章）。将模型扩展以适应不同的输入大小可能需要更多的工作，正如我们所看到的，但这使得你的模型在实验和部署中更加灵活和可访问。
- en: Parametrization of Network Dimensions
  id: totrans-353
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网络维度参数化
- en: 'In the earlier section, we focused on scaling oriented toward a necessity-level
    parameter: the input shape of a model. In this section, we will discuss broad
    parametrization of network dimensions. Adapting the network architecture to the
    input shape requires us to generalize the model architecture and thus formulate
    implicit and explicit architectural policies that may or may not be successful.
    The goal here is rather to *parametrize* the dimensions of the network for the
    purposes both of adaptation to different problems and also for *experimentation*.'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们关注的是针对必要级参数的扩展：模型的输入形状。在本节中，我们将讨论网络维度的广泛参数化。将网络架构适应输入形状需要我们泛化模型架构，从而制定可能成功或可能不成功的隐式和显式架构策略。这里的目的是为了*参数化*网络维度，以便适应不同的问题和进行*实验*。
- en: As discussed in the introduction to this chapter, seldom will one round of model
    building suffice for deployment. By parameterizing the dimensions of a network
    architecture, we are able to experiment with different scales and sizes more easily
    and quickly for a network to optimally fit a dataset.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 如本章引言所述，通常一轮模型构建不足以满足部署需求。通过参数化网络架构的维度，我们能够更轻松、更快速地尝试不同的规模和大小，以便网络能够最佳地适应数据集。
- en: The key difference between parametrizing a model for the sake of experimentation
    and inherent scalability and parametrizing a model to adapt to the input shape
    is that the factors determining parametrization are user-specified, not dependent
    on the input shape. Rather than programming architectural policies (e.g., the
    pattern with which the width of a network expands from the input shape), we use
    *multiplying coefficients*. These are parameters that the user specifies that
    are multiplied to the current dimensions of the network. A multiplying coefficient
    smaller than 1 will shrink that dimension, whereas a multiplying coefficient larger
    than 1 will expand that dimension.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 将模型参数化以进行实验和内在可扩展性以及将模型参数化以适应输入形状之间的关键区别在于，决定参数化的因素是用户指定的，而不是依赖于输入形状。我们不是编程架构策略（例如，网络宽度从输入形状扩展的图案），而是使用*乘数系数*。这些是用户指定的参数，它们与网络的当前维度相乘。小于1的乘数系数会缩小该维度，而大于1的乘数系数会扩大该维度。
- en: Consider this simple sequential model architecture , which processes a 64-dimensional
    input through four fully connected layers and an output (Listing [6-38](#PC38)).
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这个简单的顺序模型架构，它通过四个全连接层和一个输出处理64维输入（见列表[6-38](#PC38)）。
- en: '[PRE37]'
  id: totrans-358
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Let’s parametrize the width by multiplying the number of nodes in each layer
    by some width coefficient (Listing [6-39](#PC39)). Because the result may be a
    fraction, we round the result of the scaling.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过将每个层的节点数乘以某个宽度系数来参数化宽度（见列表[6-39](#PC39)）。因为结果可能是一个分数，所以我们四舍五入缩放的结果。
- en: '[PRE38]'
  id: totrans-360
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'Parametrizing the depth is a little bit more tricky, because we need to manipulate
    actual layer objects, rather than parameters within a fixed set of layers. A successful
    systematic approach is to identify key blocks of the architecture consisting of
    multiple similar layers that can be stretched or shrunk by a depth coefficient
    (Listing [6-40](#PC40)). In our simple model, there are two easily identifiable
    blocks: one block directly after the input and before the batch normalization
    consisting of two layers with 32 nodes and another block after the batch normalization
    layer consisting of another two layers with 16 nodes. By default, these two blocks
    consist of one type of layer with a default quantity of 2\. We can parametrize
    the network, therefore, by multiplying this quantity by the depth coefficient.
    Like with the width, we perform rounding in the case of noninteger results.'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 参数化深度稍微有点复杂，因为我们需要操作实际的层对象，而不是固定层集内的参数。一种成功的方法是识别由多个相似层组成的架构的关键块，这些层可以通过深度系数进行拉伸或收缩（见列表[6-40](#PC40)）。在我们的简单模型中，有两个容易识别的块：一个位于输入之后和批量归一化之前，由两个具有32个节点的层组成，另一个位于批量归一化层之后，由另外两个具有16个节点的层组成。默认情况下，这两个块由一种类型的层组成，数量为2。因此，我们可以通过将这个数量乘以深度系数来参数化网络。与宽度一样，在非整数结果的情况下，我们进行四舍五入。
- en: '[PRE39]'
  id: totrans-362
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: In this case, we pass `2` into `d()` because 2 is the default number of layers
    in our model architecture. Note additionally that we are not scaling the *entire*
    depth of the network; we are leaving layers like batch normalization alone regardless
    of the depth coefficient, for instance. Depth-wise scaling should be applied appropriately
    to processing layers, not to layers like batch normalization or dropout that only
    shift or regularize the data flow.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个情况下，我们将`2`传递给`d()`函数，因为2是我们模型架构中默认的层数。此外，请注意，我们并不是对网络的*整个深度*进行缩放；例如，我们保留像批量归一化这样的层，不依赖于深度系数。深度缩放应该适当地应用于处理层，而不是像批量归一化或dropout这样的层，这些层只改变或正则化数据流。
- en: The user can now adjust `width_coef` and `depth_coef` for quick experimentation
    and portability. The method by which you *optimize* the parametrization of network
    dimensions is up to you. One method that is likely to be successful is to use
    Bayesian optimization via Hyperopt or Hyperas to tune the width and depth scaling
    factors `width_coef` and `depth_coef`. Alternatively, one can look toward a recently
    growing body of research around general best practices for scaling , like the
    *compound scaling method* introduced in the successful EfficientNet architecture
    of models. We’ll explore this method in the case study for this section.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 用户现在可以调整`width_coef`和`depth_coef`以进行快速实验和便携性。您如何**优化**网络维度参数化取决于您。一种可能成功的方法是使用Hyperopt或Hyperas通过贝叶斯优化来调整宽度缩放因子`width_coef`和深度缩放因子`depth_coef`。或者，人们可以转向最近日益增长的研究领域，这些研究领域围绕缩放的一般最佳实践，如成功EfficientNet架构中引入的**复合缩放方法**。我们将在本节的案例研究中探讨这种方法。
- en: This logic applies to architectures with nonlinearity, as long as a clear backbone
    is identifiable (Listing [6-41](#PC41)). Consider, for instance, the code used
    for building DenseNet-style residual connections (Listing [6-8](#PC8)). We can
    scale network depth and width from their original “default” dimension values using
    our `d` and `w` functions, for instance.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 这种逻辑适用于具有非线性的架构，只要可以识别出一个清晰的骨干（见列表[6-41](#PC41)）。例如，考虑用于构建DenseNet风格残差连接的代码（见列表[6-8](#PC8)）。我们可以使用我们的`d`和`w`函数从它们的原始“默认”维度值扩展网络深度和宽度。
- en: '[PRE40]'
  id: totrans-366
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Similarly, you can parametrize the dimensions of nonlinear architectures without
    a nonlinear backbone that are simple, like parallel branches. If an architecture
    is too nonlinear to use a block-based approach toward scaling the depth dimension
    as introduced earlier, another method is to group these highly nonlinear topologies
    into blocks that can be scaled by stacking different quantities of blocks together.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，您可以对没有非线性主干、简单如并行分支的非线性架构的维度进行参数化。如果一个架构过于非线性，无法使用前面介绍的分块方法来扩展深度维度，另一种方法是将这些高度非线性的拓扑结构分组为可以堆叠不同数量块进行扩展的块。
- en: By parameterizing network dimensions, you enable yourself and others to experiment
    and adapt the network architecture more quickly and easily, leading to improved
    performance on the problem.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 通过参数化网络维度，您可以让自己和他人能够更快、更轻松地实验和调整网络架构，从而在解决问题上提高性能。
- en: 'Case Study: EfficientNet'
  id: totrans-369
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究：EfficientNet
- en: Convolutional neural networks have historically been scaled relatively arbitrarily,
    along the two previously discussed dimensions – height and width – as well as
    (recently) resolution. “Arbitrary” scaling entails adjusting these dimensions
    of a network without much of a justification for how the adjusting is performed;
    there is ambiguity in how large to scale dimensions. The “larger is better” paradigm
    that gripped much of earlier development in convolutional neural network designs
    is reaching a limit in its competitiveness against other approaches that focus
    more on developing efficient mechanisms and designs. Thus, there is a need for
    a *systematic method of scaling neural network architectures across several dimensions*
    for the highest expected success (Figure [6-43](#Fig43)).
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络在历史上相对任意地进行了缩放，沿着之前讨论的两个维度——高度和宽度，以及（最近）分辨率。这种“任意”缩放意味着调整网络维度时没有太多关于调整如何进行的理由；在确定缩放维度的大小方面存在模糊性。在卷积神经网络设计中占据主导地位的“越大越好”范式，在与其他更注重开发高效机制和设计的方案竞争时正达到其竞争力的极限。因此，需要一种**系统方法**来跨多个维度缩放神经网络架构，以实现最高的预期成功（见图[6-43](#Fig43)）。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig43_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig43_HTML.jpg)'
  id: totrans-371
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig43_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig43_HTML.jpg)'
- en: Figure 6-43
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-43
- en: Dimensions of a neural network that can be scaled, compared with the compound
    scaling method
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 与复合缩放方法相比，可以缩放的神经网络维度
- en: 'Mingxing Tan and Quoc V. Le propose the *compound scaling method* in their
    paper “EfficientNet: Rethinking Model Scaling for Convolutional Neural Networks.”^([3](#Fn3))
    The compound scaling method is a simple but successful scaling method in which
    each dimension is scaled by a constant ratio.'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: Mingxing Tan和Quoc V. Le在他们发表的论文“EfficientNet：重新思考卷积神经网络模型缩放”中提出了**复合缩放方法**。[3](#Fn3)
    复合缩放方法是一种简单但成功的缩放方法，其中每个维度都按一个常数比例进行缩放。
- en: A set of fixed scaling constants is used to uniform scale the width, depth,
    and resolution used by a neural network architecture. These constants – *α*, *β*, *γ*
    – are scaled by a compound coefficient, *ϕ*, such that the depth is *d* = *α*^(*ϕ*),
    the width is *w* = *β*^(*ϕ*), and the resolution is *r* = *γ*^(*ϕ*). *ϕ* is defined
    by the user, depending on how many computational resources/predictive power they
    are willing to allocate toward a particular problem.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 使用一组固定的缩放常数来统一缩放神经网络架构使用的宽度、深度和分辨率。这些常数 – *α*, *β*, *γ* – 通过一个复合系数 *ϕ* 进行缩放，使得深度为
    *d* = *α*^(*ϕ*)，宽度为 *w* = *β*^(*ϕ*)，分辨率是 *r* = *γ*^(*ϕ*)。*ϕ* 由用户定义，取决于他们愿意为特定问题分配多少计算资源/预测能力。
- en: 'The values of the constants can be found through a small grid search, in which
    *ϕ* is set to 1 and the set of parameters that yield the best accuracy is selected.
    This is both feasible and successful given the small search space. Two constraints
    on the constants are imposed:'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 常数的值可以通过一个小网格搜索找到，其中 *ϕ* 设置为 1，并选择产生最佳准确率的参数集。由于搜索空间较小，这既可行又成功。对常数施加了两个约束：
- en: '*α* ≥ 1, *β* ≥ 1, *γ* ≥ 1: This ensures that the constants do not decrease
    in value when they are raised to the power of the compound coefficient *ϕ*, such
    that a larger compound coefficient value yields in a larger depth, width, and
    resolution size.'
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*α* ≥ 1, *β* ≥ 1, *γ* ≥ 1：这确保了当这些常数被复合系数 *ϕ* 升幂时，它们的值不会减小，从而较大的复合系数值会产生更大的深度、宽度和分辨率大小。'
- en: '*α* · *β*² · *γ*² ≈ 2: The FLOPS (floating point operations per second) of
    a series of convolution operations is proportional to the depth, the width squared,
    and the resolution squared. This is because depth operates linearly by stacking
    more layers, whereas the width and the resolution act upon two dimensional filter
    representations. To ensure computational interpretability, this constraint ensures
    that any value of *ϕ* will raise the total number of FLOPS by approximately (*α* · *β*² · *γ*²)^(*ϕ*) = 2^(*ϕ*).'
  id: totrans-378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*α* · *β*² · *γ*² ≈ 2：一系列卷积操作的 FLOPS（每秒浮点运算数）与深度、宽度的平方和分辨率的平方成正比。这是因为深度通过堆叠更多层进行线性操作，而宽度和分辨率作用于二维滤波器表示。为了确保计算可解释性，此约束确保任何
    *ϕ* 值都将总 FLOPS 数提升到大约 (*α* · *β*² · *γ*²)^(*ϕ*) = 2^(*ϕ*)。'
- en: Using this method of scaling is very successful in application to previously
    successful architectures like MobileNet and ResNet (Table [6-4](#Tab4)). Through
    the compound scaling method, we are able to expand the size and computational
    power of the network in a structured and non-arbitrary way that optimizes the
    resulting performance of the scaled model.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种方法进行缩放在应用于之前成功的架构（如 MobileNet 和 ResNet）时非常成功（见表 [6-4](#Tab4)）。通过复合缩放方法，我们能够以结构化和非任意的方式扩展网络的大小和计算能力，从而优化缩放模型的最终性能。
- en: Table 6-4
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
