- en: Tan and Le propose explanations for the success of compound scaling that are
    similar to our previous intuition developed when adapting the architecture of
    a neural network based on the input size. By intuition, when the input image is
    larger, all dimensions – not just one – need to be correspondingly increased to
    accommodate the increase in information. Greater depth is required to process
    the increased layers of complexity, and greater width is needed to capture the
    greater quantity of information. Tan and Le’s work is novel in expressing the
    relationship between the network dimensions quantitatively.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: Tan 和 Le 提出了关于复合缩放成功原因的解释，这与我们在根据输入大小调整神经网络架构时发展出的先验直觉相似。直观上，当输入图像较大时，所有维度——而不仅仅是单个维度——都需要相应增加以适应信息量的增加。处理增加的复杂层需要更深的深度，而捕获更多信息量则需要更宽的宽度。Tan
    和 Le 的工作在定量表达网络维度之间的关系方面是新颖的。
- en: Tan and Le’s paper proposes the *EfficientNet* family of models, which is a
    family of differently sized models built from the compound scaling method. There
    are eight models in the EfficientNet family – EfficientNetB0, EfficientNetB1,
    …, to EfficientNetB7, ordered from smallest to largest. The EfficientNetB0 architecture
    was discovered via Neural Architecture Search. In order to ensure that the derived
    model optimized both performance and FLOPS, the objective of the search was not
    merely to maximize the accuracy but to maximize a combination of performance and
    the FLOPS. The resulting architecture is then scaled using different values of
    *ϕ* to form the other seven EfficientNet models.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: Tan 和 Le 的论文提出了 *EfficientNet* 模型系列，这是一个由复合缩放方法构建的不同尺寸的模型系列。EfficientNet 系列中有八个模型——EfficientNetB0,
    EfficientNetB1, …, 到 EfficientNetB7，按从小到大的顺序排列。EfficientNetB0 架构是通过神经架构搜索发现的。为了确保导出的模型在性能和
    FLOPS 方面都得到优化，搜索的目标不仅仅是最大化准确率，而是最大化性能和 FLOPS 的组合。然后使用不同的 *ϕ* 值对结果架构进行缩放，以形成其他七个
    EfficientNet 模型。
- en: Note
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The actual open-sourced EfficientNet models are slightly adapted from their
    pure scaled versions. As you may imagine, compound scaling is a successful but
    still approximate method, as is to be expected with most scaling techniques –
    these are generalizations across ranges of architecture sizes. To truly maximize
    performance, some fine-tuning of the architecture is still needed afterward. The
    publicly available versions of the EfficientNet model family contain some additional
    architectural changes after scaling via compound scaling to further improve performance.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 实际开源的 EfficientNet 模型略微调整了它们的纯缩放版本。正如你可能想象的那样，复合缩放是一个成功但仍然近似的方法，正如大多数缩放技术所预期的那样——这些是在架构大小范围内的泛化。为了真正最大化性能，在缩放后仍需要对架构进行一些微调。EfficientNet
    模型系列的公开版本在复合缩放后包含了一些额外的架构更改，以进一步提高性能。
- en: The EfficientNet family of models impressively obtains higher performance on
    benchmark datasets like ImageNet, CIFAR-100, Flowers, and others than similarly
    sized models – both manually designed and NAS-discovered architectures (Figure
    [6-44](#Fig44)). While the core EfficientNetB0 model was created as a product
    of Neural Architecture Search, the remaining members of the EfficientNet family
    are constructed via scaling.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: EfficientNet 模型系列在 ImageNet、CIFAR-100、Flowers 等基准数据集上取得了比同样大小的模型——无论是人工设计还是
    NAS 发现的架构——更高的性能——（图 [6-44](#Fig44)）。虽然核心的 EfficientNetB0 模型是作为神经架构搜索的产品创建的，但
    EfficientNet 系列的其他成员是通过缩放构建的。
- en: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig44_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig44_HTML.jpg)'
  id: totrans-403
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_6_Chapter/516104_1_En_6_Fig44_HTML.jpg](../images/516104_1_En_6_Chapter/516104_1_En_6_Fig44_HTML.jpg)'
- en: Figure 6-44
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-44
- en: Plot of various EfficientNet models against other important model architectures
    in number of parameters and ImageNet top 1 accuracy
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 不同大小的 EfficientNet 模型与其他重要模型架构在参数数量和 ImageNet Top 1 准确率上的对比图
- en: The EfficientNet model family is available in Keras applications at `keras.applications.EfficientNetBx`
    (substituting `x` for any number from 0 to 7). The EfficientNet implementation
    in Keras applications ranges from 29 MB (B0) to 256 MB (B7) in size and from 5,330,571
    parameters (B0) to 66,658,687 parameters (B7). Note that the input shapes for
    different members of the EfficientNet family are different. EfficientNetB0 expects
    images of spatial dimension (224, 224); B4 expects (380, 380); B7 expects (600,
    600). You can find this information in the expected input shape listed in Keras/TensorFlow
    applications documentation.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: EfficientNet 模型家族在 Keras 应用程序中可用，位于 `keras.applications.EfficientNetBx`（将 `x`
    替换为从 0 到 7 的任何数字）。Keras 应用程序中的 EfficientNet 实现的大小从 29 MB（B0）到 256 MB（B7）不等，参数数量从
    5,330,571（B0）到 66,658,687（B7）不等。请注意，EfficientNet 家族不同成员的输入形状不同。EfficientNetB0
    预期图像的空间维度为（224，224）；B4 预期（380，380）；B7 预期（600，600）。你可以在 Keras/TensorFlow 应用程序文档中找到预期的输入形状信息。
- en: Looking at the EfficientNet source code in Keras is a valuable way to get a
    feel for how scaling is implemented on a professional level. It is available at
    [`https://github.com/keras-team/keras-applications/blob/master/keras_applications/efficientnet.py`](https://github.com/keras-team/keras-applications/blob/master/keras_applications/efficientnet.py).
    Because this implementation is written for one of the most widely used deep learning
    libraries, much of the relevant code is used to generalize/parametrize the model
    for accessibility across various platforms and purposes. Nevertheless, its general
    structure of organization can be emulated for your deep learning purposes and
    designs.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Keras 中查看 EfficientNet 的源代码是一种非常有价值的方法，可以让你感受到在专业水平上如何实现缩放。源代码可在[https://github.com/keras-team/keras-applications/blob/master/keras_applications/efficientnet.py](https://github.com/keras-team/keras-applications/blob/master/keras_applications/efficientnet.py)找到。因为这个实现是为最广泛使用的深度学习库之一编写的，所以大部分相关代码都是用来泛化/参数化模型，以便在各种平台和目的上使用。尽管如此，其组织结构的通用模式可以模仿用于你的深度学习目的和设计。
- en: 'The EfficientNet implementation in Keras consists of three key types of functions:'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: Keras 中的 EfficientNet 实现包括三种关键类型的函数：
- en: '`block()`, which builds a standard EfficientNet-style block given a long list
    of parameters, including the dropout rate, the number of incoming filters, the
    number of outgoing filters, etc. `expand_ratio` and `se_ratio` parameters refer
    to the “severity” or “intensity” of the *expansion phase* and the *squeeze and
    excitation phase*, which (roughly speaking) increase and decrease the representation
    size of the data.'
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`block()`，它根据一系列参数构建一个标准的 EfficientNet 风格的块，包括 dropout 率、输入滤波器数量、输出滤波器数量等。`expand_ratio`
    和 `se_ratio` 参数指的是“扩展阶段”和“压缩和激励阶段”的“严重性”或“强度”，这些阶段（大致来说）增加和减少数据的表示大小。'
- en: '`EfficientNet()`, which constructs an EfficientNet model given two key parameters
    – the `width_coefficient` and the `depth_coefficient`. Additional parameters include
    the dropout rate and the depth divisor (a unit used for the width of a network).'
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`EfficientNet()`，它根据两个关键参数——`width_coefficient`（宽度系数）和`depth_coefficient`（深度系数）——构建一个
    EfficientNet 模型。其他参数包括 dropout 率和深度除数（用于网络宽度的一个单位）。'
- en: '`EfficientNetBx()`, which simply calls the `EfficientNet()` architecture construction
    function with certain parameters appropriate to the EfficientNet structure being
    called. For instance, the `EfficientNetB4()` function returns the `EfficientNet()`
    function with a width coefficient of 1.4 and a depth coefficient of 1.8\. The
    “unscaled” EfficientNetB0 model uses a width coefficient and depth coefficient
    of 1.'
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`EfficientNetBx()`，它只是用适当的参数调用 `EfficientNet()` 架构构建函数，这些参数适用于被调用的 EfficientNet
    结构。例如，`EfficientNetB4()` 函数返回宽度系数为 1.4、深度系数为 1.8 的 `EfficientNet()` 函数。未缩放的 EfficientNetB0
    模型使用宽度系数和深度系数为 1。'
- en: The key `EfficientNet()` function defines two functions within itself, `round_filters`
    and `round_repeats`, which take in the “default” number of filters and number
    of repeats and scale them appropriately depending on the provided width coefficient
    and depth coefficient.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的 `EfficientNet()` 函数在其内部定义了两个函数，`round_filters` 和 `round_repeats`，它们接受“默认”的滤波器数量和重复次数，并根据提供的宽度系数和深度系数适当地进行缩放。
- en: The `round_filters` function (Listing [6-42](#PC42)) takes in the default number
    of filters and returns the new number of filters after scaling. The equation for
    the new number of filters *f*[*n*] is given roughly by ![$$ {f}_n=\mathit{\max}\left(d,
    round\left(\frac{w\times {f}_o+\frac{d}{2}}{d}\right)\cdotp d\right) $$](../images/516104_1_En_6_Chapter/516104_1_En_6_Chapter_TeX_IEq2.png),
    where *d* is the depth divisor, *w* is the width scaling coefficient, and *f*[*o*]
    is the original number of filters. The number of new filters can never be shrunk
    below the value of the divisor because of the *max*(…) mechanism. The expression
    on the right simply multiplies the original number of filters by the width scaling
    coefficient and then applies the *depth divisor* to it. The depth divisor can
    be thought of as the bin size in quantization from Chapter [5](516104_1_En_5_Chapter.xhtml);
    it is the basic unit that a parameter is scaled in terms of. The default divisor
    for EfficientNet is 8, meaning that the width is represented in multiples of 8\.
    This sort of “quantization” can be easily done via the ![$$ round\left(\frac{a}{d}\right)\cdotp
    d $$](../images/516104_1_En_6_Chapter/516104_1_En_6_Chapter_TeX_IEq3.png) (integer
    division is performed in Python by `a//d`). This implementation adds ![$$ \frac{d}{2}
    $$](../images/516104_1_En_6_Chapter/516104_1_En_6_Chapter_TeX_IEq4.png) to “balance”
    the scaled number of filters before “quantization”/“rounding.”
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: '`round_filters` 函数（见代码清单 [6-42](#PC42)）接收默认的过滤器数量，并返回缩放后的新过滤器数量。新过滤器数量 *f*[*n*]
    的公式大致为 ![$$ {f}_n=\mathit{\max}\left(d, round\left(\frac{w\times {f}_o+\frac{d}{2}}{d}\right)\cdotp
    d\right) $$](../images/516104_1_En_6_Chapter/516104_1_En_6_Chapter_TeX_IEq2.png)，其中
    *d* 是深度除数，*w* 是宽度缩放系数，而 *f*[*o*] 是原始过滤器数量。由于 *max*(…) 机制，新过滤器数量永远不会低于除数值。右侧的表达式简单地将原始过滤器数量乘以宽度缩放系数，然后应用
    *深度除数*。深度除数可以被视为第 [5](516104_1_En_5_Chapter.xhtml) 章中量化的“桶大小”；它是参数缩放的基本单位。EfficientNet
    的默认除数为 8，这意味着宽度以 8 的倍数表示。这种“量化”可以通过 ![$$ round\left(\frac{a}{d}\right)\cdotp d
    $$](../images/516104_1_En_6_Chapter/516104_1_En_6_Chapter_TeX_IEq3.png)（Python
    中通过 `a//d` 执行整数除法）轻松完成。这种实现通过添加 ![$$ \frac{d}{2} $$](../images/516104_1_En_6_Chapter/516104_1_En_6_Chapter_TeX_IEq4.png)
    来“平衡”缩放后的过滤器数量，在“量化”/“四舍五入”之前。'
- en: '[PRE41]'
  id: totrans-414
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: The depth scaling method is simpler; the default number of block repeats is
    multiplied by the depth coefficient, with the ceiling function applied for a resulting
    noninteger scaled depth (Listing [6-43](#PC43)).
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 深度缩放方法更简单；默认的块重复次数乘以深度系数，并应用上限函数以得到非整数的缩放深度（见代码清单 [6-43](#PC43)）。
- en: '[PRE42]'
  id: totrans-416
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: These functions are used in the building of the parametrized EfficientNet base
    model, allowing for easy scaling.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 这些函数用于构建参数化的 EfficientNet 基础模型，从而实现易于缩放。
- en: Key Points
  id: totrans-418
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: 'In this chapter, we discussed three key themes in successful neural network
    architecture design: nonlinear and parallel representation, cell-based design,
    and architecture scaling:'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了成功神经网络架构设计中的三个关键主题：非线性和平行表示、基于单元格的设计和架构缩放：
- en: There are three key concepts in efficient and advanced implementation of complex
    architectures – compartmentalization, automation, and parametrization.
  id: totrans-420
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在复杂架构的高效和高级实现中，有三个关键概念——模块化、自动化和参数化。
- en: Nonlinear and parallel representations allow layers to pass information signals
    across various components of the architecture without being restricted by having
    to pass through many other components. This allows for the network to process
    information in a way that considers more perspectives and representations.
  id: totrans-421
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非线性和平行表示允许层在架构的各个组件之间传递信息信号，而不会因为必须通过许多其他组件而受到限制。这允许网络以考虑更多视角和表示的方式处理信息。
- en: Residual connections are connections that “skip” or “jump” over other layers.
    ResNet-style residual connections are used repeatedly to jump over small stacks
    of layers. DenseNet-style residual connections, on the other hand, place residual
    connections between every pair of anchor points, allowing information to traverse
    both longer and shorter distances through the network. Residual connections are
    one method of addressing the vanishing gradient problem. These can be implemented
    quite simply through the Functional API by merging the “root” of the residual
    connection with the input to the “end” of the residual connection.
  id: totrans-422
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 残差连接是一种“跳过”或“跳跃”其他层的连接。ResNet风格的残差连接被反复用来跳过小堆叠的层。另一方面，DenseNet风格的残差连接在每对锚点之间放置残差连接，使得信息可以通过网络跨越更长的和更短的距离。残差连接是解决梯度消失问题的一种方法。这些可以通过通过功能API简单地通过合并残差连接的“根”与残差连接“末端”的输入来实现。
- en: Branching structures and cardinality are generalizations of residual connections
    into broader nonlinearities. While width measures how wide one layer is (e.g.,
    number of nodes or filters), *cardinality* measures how many layers wide – and
    therefore how many parallel representations exist and are being processed – the
    network is at some point.
  id: totrans-423
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分支结构和基数是残差连接向更广泛非线性的一般化。虽然宽度衡量一个层有多宽（例如，节点或滤波器的数量），*基数*衡量网络在某个点有多宽——因此有多少并行表示存在并被处理——。
- en: Blocks/cell design consists of arranging layers into packaged topologies that
    function as cells which can be stacked upon one another to form a cell-based architecture.
    By arranging layers into cells and manipulating cells rather than layers, we replace
    the base unit of architectural construction – the layer – with a more powerful
    one, consisting of an agglomeration of layers. Cells can be thought of as “mini-networks”
    that can take on a variety of internal topologies, linear or nonlinear. In implementation,
    block/cell design can be implemented by constructing a function which takes in
    a layer to build the cell on and outputs the last layer of the cell (upon which
    another cell or other processing layers can be stacked).
  id: totrans-424
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 块/单元设计包括将层排列成包装拓扑，这些拓扑作为细胞使用，可以堆叠在一起形成基于细胞的架构。通过将层排列成细胞并操作细胞而不是层，我们用更强大的一个——由层聚集而成的——替换了建筑构造的基本单元——层。细胞可以被看作是“微型网络”，可以采用各种内部拓扑，线性或非线性。在实现上，块/单元设计可以通过构建一个函数来实现，该函数接受一个层来构建细胞，并输出细胞的最后一层（其他细胞或其他处理层可以堆叠在其上）。
- en: Neural network scaling allows network architectures to be scaled for different
    datasets, problems, and experimentation. You can use scaling to adapt the architecture
    width and dimension to the input shape by identifying patterns in the neural network
    architecture and generalizing into an *architectural policy*. You can also scale
    architectures by parameterizing the width and the depth; these can be optimized
    via a method like Bayesian optimization or by a manual scaling policy like compound
    scaling.
  id: totrans-425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经网络扩展允许网络架构针对不同的数据集、问题和实验进行扩展。你可以通过识别神经网络架构中的模式并将它们推广到*架构策略*中来调整架构的宽度和维度以适应输入形状。你还可以通过参数化宽度和深度来扩展架构；这些可以通过贝叶斯优化或手动扩展策略（如复合扩展）来优化。
- en: In the next chapter, we will use the tools we’ve built across these multiple
    chapters to discuss deep learning problem-solving methods.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将使用我们在多个章节中构建的工具来讨论深度学习问题解决方法。
