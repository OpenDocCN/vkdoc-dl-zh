- en: Summary
  id: totrans-341
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: GANs have tremendous potential to be used in AI for creativity, music, and the
    arts. Since it was first proposed in 2014, GANs innovations are happening at a
    breathtaking pace. This chapter described how GANs can be applied to various use
    cases. We showed the use of the generator and the discriminator in the GAN architecture,
    and how they are used.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: GANs（生成对抗网络）在人工智能领域的创意、音乐和艺术应用方面具有巨大的潜力。自从2014年首次提出以来，GANs的创新以惊人的速度发生。本章描述了GANs可以应用于各种用例。我们展示了GAN架构中生成器和判别器的使用，以及它们是如何被使用的。
- en: Next, we discussed how CycleGAN works, and showed how it can be used for translation
    of objects from one domain to another. In the code example given in this chapter,
    we focus on how to train and test a novel type of GAN, called CycleGAN.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们讨论了CycleGAN的工作原理，并展示了它如何用于将一个领域的对象翻译到另一个领域。在本章给出的代码示例中，我们专注于如何训练和测试一种新型GAN，称为CycleGAN。
- en: All the code in this chapter is run on a Linux DLVM, available on Azure. More
    details on choices for training AI models (e.g., GANs), such as the computing
    environments and how to do training at scale, are discussed in the next chapter.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中的所有代码都是在Azure上可用的Linux DLVM上运行的。关于训练AI模型（例如GANs）的选择的更多细节（例如计算环境和如何进行大规模训练）将在下一章中讨论。
