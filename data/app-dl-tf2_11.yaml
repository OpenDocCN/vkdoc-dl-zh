  - PREF_UL
  type: TYPE_NORMAL
  zh: Radford, Alec, Luke Metz, and Soumith Chintala. “无监督表示学习与深度卷积生成对抗网络.” arXiv预印本
    arXiv:1511.06434 (2015).
- en: Mirza, Mehdi, and Simon Osindero. “Conditional generative adversarial nets.”
    arXiv preprint arXiv:1411.1784 (2014).
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mirza, Mehdi, and Simon Osindero. “条件生成对抗网络.” arXiv预印本 arXiv:1411.1784 (2014).
- en: Conclusion
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The goal of this chapter was not to go into details about advanced GAN architectures,
    but to give you an initial understanding of how adversarial learning works. There
    are many advanced architectures and topics about GANs that we cannot cover in
    this book, since that would go well beyond the skill level of the average reader.
    But with this chapter, I hope I have given you an initial understanding of how
    GANs work and how easy it is to implement them in Keras.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的目标不是深入探讨高级GAN架构，而是让你对对抗学习的工作原理有一个初步的了解。由于这会远远超出普通读者的技能水平，因此在这本书中我们无法涵盖许多关于GAN的高级架构和主题。但通过本章，我希望我已经让你对GAN的工作原理以及如何在Keras中实现它们有一个初步的了解。
