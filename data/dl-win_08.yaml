- en: 8. Starting, Stopping, and Resuming Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 8. 开始、停止和恢复学习
- en: 'As you have probably learned by now, training deep learning models can take
    long times: hours and maybe days, based on how complex the model and how large
    your dataset.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 如您现在可能已经学到的，训练深度学习模型可能需要很长时间：数小时甚至数天，这取决于模型的复杂程度以及您的数据集大小。
- en: Sometimes it may not be practical to perform the training in one session.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，在一个会话中完成训练可能并不实际。
- en: Power failures, machine becoming unresponsive, OS errors, unplanned reboots,
    or Windows updates may lead you to lose hours if not days of effort.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 电力故障、机器无响应、操作系统错误、计划外的重启或Windows更新可能会导致您丢失数小时甚至数天的努力。
- en: How can we mitigate that risk?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何减轻这种风险？
- en: One way is to increase the speed of the model training.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 一种方法是提高模型训练的速度。
- en: Using Multithreading to Increase the Training Speed
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用多线程提高训练速度
- en: When we used the data generators with the `model.fit()` function for training,
    by default we were working on a single-threaded mode for the preparation of the
    data batches. Basically, in this mode, only a single CPU thread is preparing and
    queuing the batches of data to be sent to the model for training. By default the
    queue size is set to 10, which may result in the GPU having to wait for more batches
    to be queued.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们使用`model.fit()`函数进行训练时，默认情况下我们是在单线程模式下准备数据批次。基本上，在这种模式下，只有一个CPU线程在准备和排队要发送给模型进行训练的数据批次。默认队列大小设置为10，这可能会导致GPU必须等待更多的批次排队。
- en: While this single-threaded batch preparation mode provides more predictable
    behavior and is easier to debug, most of the time it slows down the training process.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这种单线程批量准备模式提供了更可预测的行为并且更容易调试，但大多数时候它会减慢训练过程。
- en: This is why the `model.fit()` functions support a multithreaded mode. We can
    enable it by using the `workers` parameter to specify the number of worker threads
    to use, as well as increasing the `max_queue_size` parameters to increase the
    number of batches that are queued.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么`model.fit()`函数支持多线程模式。我们可以通过使用`workers`参数来指定要使用的工线程数量，以及通过增加`max_queue_size`参数来增加排队批次的数量。
- en: Let us see how much of a speed increase we can achieve by tweaking these parameters.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看通过调整这些参数，我们能实现多大的速度提升。
- en: 'We’ll begin with our bird classification system using the InceptionV3 model
    from the last chapter, and add few code lines to measure the time taken for training.
    We will import the time package for this:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用上一章中提到的InceptionV3模型开始我们的鸟类分类系统，并添加一些代码行来测量训练所需的时间。为此，我们将导入time包：
- en: '[PRE0]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We will mark the start time at the beginning of the script just after we defined
    the utility functions:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在脚本定义了实用函数之后标记开始时间：
- en: '[PRE1]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'At the very end of the script we will mark the end time, and calculate the
    time it took for the training:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在脚本的最后，我们将标记结束时间，并计算训练所需的时间：
- en: '[PRE2]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Let us see how much time it takes to run the training (both with bottleneck
    features and fine-tuning) on our InceptionV3 model in the single-threaded batch
    mode (Figure [8-1](#Fig1)).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看在单线程批量模式下（图[8-1](#Fig1)）运行训练（包括瓶颈特征和微调）需要多少时间。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig1_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig1_HTML.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig1_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig1_HTML.jpg)'
- en: Figure 8-1
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-1
- en: Time taken for training in single-threaded batch mode
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 单线程批量模式下的训练时间
- en: It is taking around 1,101 seconds (or 18 minutes 21 seconds) for the full training.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 完整训练大约需要1,101秒（或18分钟21秒）。
- en: Now let us see whether we can improve it using multithreading.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看是否可以通过多线程来提高它。
- en: 'For both of our `model.fit()` functions , we will add two more parameters:
    `workers` and `max_queue_size`:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的两个`model.fit()`函数，我们将添加两个额外的参数：`workers`和`max_queue_size`：
- en: '[PRE3]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The `workers` parameter defines how many CPU threads are working in parallel
    to generate the data batches. The default is 1, so here we have increased it to
    8.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '`workers`参数定义了有多少CPU线程并行工作以生成数据批次。默认值为1，因此在这里我们将它增加到8。'
- en: The `max_queue_size` parameters defines how many batches are kept ready in the
    queue until consumed by the training. The default is 10, and here we have increased
    it to 15.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '`max_queue_size`参数定义了在消耗之前队列中保持多少批次准备就绪。默认值为10，在这里我们将它增加到15。'
- en: Let us see how these parameter values affect our training time (Figure [8-2](#Fig2)).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这些参数值如何影响我们的训练时间（图[8-2](#Fig2)）。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig2_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig2_HTML.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig2_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig2_HTML.jpg)'
- en: Figure 8-2
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-2
- en: Time taken for training in multithreaded batch mode
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 多线程批量模式下的训练时间
- en: The training time is now decreased to 364 seconds, or just over 6 minutes and
    3 seconds. That is about a 300% improvement in the training time.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 训练时间现在缩短到364秒，即6分多3秒。这大约是训练时间的300%提升。
- en: However, there are few things that you should keep in mind when using this method.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在使用此方法时，有一些事情你应该记住。
- en: First, the actual increase in speed you will get will depend on the model structure,
    as well as the dataset you are using.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你将获得的速度实际增加将取决于模型结构以及你使用的数据集。
- en: Secondly, when allocating the number of workers, you should think about the
    number of threads your CPU supports in parallel. Setting the number of workers
    to a value too high might lock up or freeze your machine. A good rule of thumb
    to follow on Windows is to set the number of workers few numbers below the maximum
    thread count of the CPU. For example, if your CPU supports 12 threads, keep the
    number of workers at 8\. This would allow the OS, background tasks, and the other
    tasks of the training to run without locking up.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，在分配工作线程数量时，你应该考虑你的CPU支持的并行线程数。将工作线程数设置得过高可能会导致机器锁定或冻结。在Windows上，一个很好的经验法则是将工作线程数设置为CPU最大线程数以下几个数字。例如，如果你的CPU支持12个线程，则将工作线程数保持在8个。这将允许操作系统、后台任务和训练的其他任务运行而不会锁定。
- en: And lastly, in rare situations, you may experience nonstandard behaviors in
    training. This can be either due to bugs in the version you are using, or in the
    Windows build of that version. If you are experiencing problems, try disabling
    the multithreading first before changing anything else in the model.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在罕见情况下，你可能会在训练中遇到非标准行为。这可能是由于你使用的版本中的错误，或者是该版本的Windows构建中的错误。如果你遇到问题，首先尝试禁用多线程，然后再更改模型中的其他任何内容。
- en: Note
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'In some Windows builds of TensorFlow 2.x you may experience an error message
    such as “tensorflow/core/kernels/data/generator_dataset_op.cc:103] Error occurred
    when finalizing GeneratorDataset iterator: Cancelled: Operation was cancelled”
    when running training with multithreading (Figure [8-3](#Fig3)). This can be safely
    ignored and will hopefully be fixed in future builds.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow 2.x的一些Windows构建中，当使用多线程运行训练时，你可能会遇到类似于“tensorflow/core/kernels/data/generator_dataset_op.cc:103]
    错误发生在最终化GeneratorDataset迭代器时：已取消：操作已取消”的错误消息（图[8-3](#Fig3)）。这可以安全地忽略，并有望在未来构建中得到修复。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig3_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig3_HTML.jpg)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig3_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig3_HTML.jpg)'
- en: Figure 8-3
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-3
- en: Error message with multithreading
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 多线程错误消息
- en: Using Model Checkpoints
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用模型检查点
- en: Looking back at our original problem—mitigating potential interruptions to the
    training—we can see that speeding up the training process solves only part of
    the problem. Even with the speed-up provided by multithreading, interruptions
    can still happen and you may lose your progress.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾我们的原始问题——减轻训练中断的可能性——我们可以看到，加快训练过程只能解决部分问题。即使有多线程提供的加速，中断仍然可能发生，你可能会丢失进度。
- en: 'This is where the concept of model checkpoints comes in: saving the state of
    your model at certain points in the training process so that you can resume or
    recover the model as at that point later.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是模型检查点概念的作用：在训练过程中的某些点上保存模型的状态，以便你可以在稍后恢复或恢复到那个点的模型。
- en: We talked about how to save the entire model, including its weights, compilation,
    and optimizer status, to a file using the `model.save()` function .
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论了如何使用`model.save()`函数将整个模型（包括其权重、编译器和优化器状态）保存到文件中。
- en: Model checkpoints works with the same principle.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 模型检查点的工作原理与此相同。
- en: But rather than having to save the model manually, you can ask the TensorFlow/Keras
    framework to save them for you.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 但你不必手动保存模型，你可以要求TensorFlow/Keras框架为你保存它们。
- en: In TensorFlow/Keras, the training process supports callback functions. Callbacks
    allow you to execute functions at certain stages in the training. There are several
    built-in callbacks in TensorFlow/Keras, while also allowing you to define custom
    callbacks.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow/Keras中，训练过程支持回调函数。回调函数允许你在训练的特定阶段执行函数。TensorFlow/Keras中包含几个内置的回调函数，同时也允许你定义自定义回调。
- en: One of these built-in callbacks is ModelCheckpoint.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这些内置回调之一是 ModelCheckpoint。
- en: The ModelCheckpoint callback class allows you to automatically save your model
    being trained at a given frequency or after a given condition. For example, you
    can tell ModelCheckpoint to save the model after each training epoch, or after
    every 5 epochs, or save only if the validation accuracy increases, and so on.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: ModelCheckpoint 回调类允许您以给定的频率或条件自动保存正在训练的模型。例如，您可以告诉 ModelCheckpoint 在每个训练 epoch
    后保存模型，或者在每 5 个 epoch 后保存，或者仅在验证准确率提高时保存，等等。
- en: 'The parameters of ModelCheckpoint are as follows:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: ModelCheckpoint 的参数如下：
- en: '[PRE4]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**checkpoint_filepath:** the file path to save the checkpoint. This can take
    some parameters from the training epoch as formatting options, so that you can
    inject those values into the filename. We will discuss these options later.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**checkpoint_filepath:** 保存检查点的文件路径。这可以接受一些来自训练 epoch 的参数作为格式化选项，这样您就可以将这些值注入到文件名中。我们将在稍后讨论这些选项。'
- en: '**monitor:** what training parameter to monitor if save_best_only is set to
    true.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**monitor:** 如果将 `save_best_only` 设置为 true，则要监控哪个训练参数。'
- en: '**verbose:** the verbosity level, 0 or 1.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**verbose:** 详细的输出级别，0 或 1。'
- en: '**save_best_only:** whether to only save the checkpoint if the parameter being
    monitored (specified by the monitor parameter) improves.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**save_best_only:** 是否仅在监控的参数（由 monitor 参数指定）改进时保存检查点。'
- en: '**save_weights_only:** whether to just save the weights (similar to `model.save_weights()`),
    or the entire model (similar to `model.save()`).'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**save_weights_only:** 是否仅保存权重（类似于 `model.save_weights()`），还是整个模型（类似于 `model.save()`）。'
- en: '**mode:** how to monitor the improvement in the parameter being monitored.
    For example, if monitor is val_acc the mode should be max; if it is val_loss,
    the mode should be min. If the mode is set to auto, it will try to derive the
    mode using the name of the parameter being monitored.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**mode:** 如何监控被监控参数的改进。例如，如果 monitor 是 val_acc，则模式应该是 max；如果它是 val_loss，则模式应该是
    min。如果模式设置为 auto，它将尝试使用被监控参数的名称推导模式。'
- en: '**save_freq:** at what point the checkpoint should be saved. If set to epoch,
    the checkpoint would be saved after each epoch. If set to a number, the checkpoint
    would be saved every time that many epochs pass.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**save_freq:** 在何时保存检查点。如果设置为 epoch，则在每个 epoch 后保存检查点。如果设置为数字，则在每个那么多 epoch
    后保存检查点。'
- en: Note
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: On TensorFlow v2.1 or before, use the period parameter instead of save_freq.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TensorFlow v2.1 或之前版本中，使用 period 参数而不是 save_freq。
- en: Let us add model checkpoints to our bird classification model. We will add a
    new directory, checkpoints/training, to save the checkpoints. (And potentially
    a checkpoints/finetune directory, to save the checkpoints in fine-tuning).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在我们的鸟类分类模型中添加模型检查点。我们将添加一个新的目录，checkpoints/training，以保存检查点。（并且可能添加 checkpoints/finetune
    目录，以保存微调中的检查点）。
- en: 'We will get a copy of our InceptionV3 fine-tuning code like before, and name
    it `bird_classify_inceptionV3_checkpoint.py`. We will add the import to the ModelCheckpoint
    callback in it. We will also make a change to the `model.compile()` call, from
    `metrics=[''accuracy'']` to `metrics=[''acc'']`. This is important to align with
    some naming conventions that we will be using with ModelCheckpoints:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将获取与之前相同的 InceptionV3 微调代码副本，并将其命名为 `bird_classify_inceptionV3_checkpoint.py`。我们将在其中添加对
    ModelCheckpoint 回调的导入。我们还将对 `model.compile()` 调用进行更改，从 `metrics=['accuracy']`
    更改为 `metrics=['acc']`。这对于与 ModelCheckpoints 一起使用的某些命名约定非常重要：
- en: '[PRE5]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Note
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'When specifying `metrics=[''accuracy'']`, the accuracy metrices will be reported
    as accuracy and val_accuracy. When specifying them as `metrics=[''acc'']` they
    will be reported as acc and val_acc, which is the naming convention expected by
    many of the callback functions. Make sure you also update the `graph_training_history()`
    function to update all references of accuracy to acc, and val_accuracy to val_acc.
    If not updated, you may receive errors such as “KeyError: ''acc.”'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '当指定 `metrics=[''accuracy'']` 时，准确率指标将报告为 accuracy 和 val_accuracy。当指定为 `metrics=[''acc'']`
    时，它们将报告为 acc 和 val_acc，这是许多回调函数所期望的命名约定。请确保您还更新了 `graph_training_history()` 函数，以更新所有关于准确率的引用到
    acc，以及 val_accuracy 到 val_acc。如果不更新，您可能会收到类似于“KeyError: ''acc''”的错误。'
- en: Here, we have specified the checkpoint to be saved at each epoch. We are not
    monitoring any parameters.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们已指定在每个 epoch 保存检查点。我们没有监控任何参数。
- en: Since we have specified the file name pattern as model-{epoch:02d}-{val_acc:.2f}-{val_loss:.2f}.h5,
    the epoch number, validation accuracy values, and validation loss values will
    be injected into the file name being saved (Figure [8-4](#Fig4)). For example,
    the filename model-01-0.80-12.06.h5 would indicate that the epoch was 01, validation
    accuracy was 0.80, and validation loss was 12.06\. These values allow you to easily
    select the best checkpoints just by checking the file name.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已指定文件名模式为model-{epoch:02d}-{val_acc:.2f}-{val_loss:.2f}.h5，epoch编号、验证准确率值和验证损失值将被注入到保存的文件名中（图[8-4](#Fig4)）。例如，文件名model-01-0.80-12.06.h5将表示epoch为01，验证准确率为0.80，验证损失为12.06。这些值允许您仅通过检查文件名就轻松选择最佳检查点。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig4_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig4_HTML.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig4_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig4_HTML.jpg)'
- en: Figure 8-4
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-4
- en: Model checkpoints being saved at each epoch
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个epoch保存模型检查点
- en: While there may be situations where you would need to save every training epoch
    (such as when training generative adversarial networks, where we cannot rely on
    the accuracy metrics directly to identify model improvements), in most cases,
    it is best to only save the checkpoint if the training improves.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然可能存在需要保存每个训练epoch的情况（例如在训练生成对抗网络时，我们不能直接依赖准确率指标来识别模型改进），但在大多数情况下，最好只在训练改进时保存检查点。
- en: 'Let us now update our code to only save the checkpoints when the validation
    loss improves (when validation loss minimizes):'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们更新我们的代码，仅在验证损失改进（即验证损失最小化）时保存检查点：
- en: '[PRE6]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Here, we are setting the save_best_only parameter to True, and setting the monitor
    to val_loss and the mode to min to only save the checkpoint if validation loss
    gets lower than the previous epoch (Figure [8-5](#Fig5)).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将save_best_only参数设置为True，并将monitor设置为val_loss，mode设置为min，以仅当验证损失低于前一个epoch时保存检查点（图[8-5](#Fig5)）。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig5_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig5_HTML.jpg)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig5_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig5_HTML.jpg)'
- en: Figure 8-5
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-5
- en: Saving only the best checkpoints
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 只保存最佳检查点
- en: This will reduce the number of checkpoint files being saved, making it easier
    to pick out the best states of the model.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这将减少保存的检查点文件数量，使得挑选出模型的最佳状态变得更加容易。
- en: 'Based on the requirement of your model, you can do the same for any of the
    other matrices of the model: acc, loss, val_acc, val_loss.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您模型的需求，您可以对模型中的任何其他矩阵（如acc、loss、val_acc、val_loss）执行相同的操作。
- en: Now let us imagine that your model training was interrupted, but you have some
    model checkpoints saved. How can you restart your training from one of those checkpoints?
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们假设您的模型训练被中断了，但您已经保存了一些模型检查点。您如何从这些检查点之一重新启动训练？
- en: As an example, let us say that we have the following checkpoints saved (Figure
    [8-6](#Fig6)) and our training was interrupted sometime after epoch 33.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设我们保存了以下检查点（图[8-6](#Fig6)），并且我们的训练在epoch 33之后某时中断。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig6_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig6_HTML.jpg)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig6_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig6_HTML.jpg)'
- en: Figure 8-6
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-6
- en: Saved checkpoints
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 已保存的检查点
- en: Let us start a new code file that will allow us to continue the training from
    a checkpoint. We will name it `bird_classify_continue_from_checkpoint.py`.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始一个新的代码文件，它将允许我们从检查点继续训练。我们将将其命名为`bird_classify_continue_from_checkpoint.py`。
- en: 'We will start by importing the packages. These will be the same imports as
    we did before:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先导入所需的包。这些包将与之前导入的相同：
- en: '[PRE7]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'We will then define our usual utility functions:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们定义我们通常的实用函数：
- en: '[PRE8]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'We will then add a new function that will return the epoch number of a given
    checkpoint:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将添加一个新的函数，该函数将返回给定检查点的epoch编号：
- en: '[PRE9]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Our training parameters will be as same as before:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的训练参数将与之前相同：
- en: '[PRE10]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Then we define the checkpoint to load and get the epoch number of it using
    the function we defined earlier:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们定义要加载的检查点以及使用我们之前定义的函数获取其epoch编号：
- en: '[PRE11]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Our data generators and parameters will be defined exactly as same as the initial
    training script:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的数据生成器和参数将完全与初始训练脚本相同：
- en: '[PRE12]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Then we use the `load_model()` function to load the checkpoint. Once loaded
    it will be our model:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们使用`load_model()`函数加载检查点。一旦加载，它将成为我们的模型：
- en: '[PRE13]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'The checkpoint definitions will be same as before:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 检查点定义将与之前相同：
- en: '[PRE14]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'In the `model.fit()` function we add an additional parameter `initial_epoch`
    with the value we derived earlier to specify from which epoch to start the training
    from:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在`model.fit()`函数中，我们添加了一个额外的参数`initial_epoch`，其值为我们之前推导出的值，以指定从哪个epoch开始训练：
- en: '[PRE15]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'The remaining steps of the training will remain same:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 训练的剩余步骤将保持不变：
- en: '[PRE16]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Running this code, we will see that the training now starts at epoch 34 (Figure
    [8-7](#Fig7)).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此代码，我们将看到训练现在从第34个epoch开始（图[8-7](#Fig7)）。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig7_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig7_HTML.jpg)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig7_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig7_HTML.jpg)'
- en: Figure 8-7
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-7
- en: Training continuing from a checkpoint
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 从检查点继续训练
- en: With model checkpoints, we can be sure that hours or days of our effort in training
    a model will not be lost in an event of a failure.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 使用模型检查点，我们可以确保在训练模型时，即使发生故障，我们数小时或数天的努力也不会丢失。
- en: Knowing When to Stop Training
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 知道何时停止训练
- en: In all the previous models we trained, we specified the number of epochs to
    train as a fixed number. We used a number that have worked well in similar models
    in the past.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前训练的所有模型中，我们都将训练的epoch数指定为一个固定的数字。我们使用了一个在过去类似模型中效果良好的数字。
- en: But how do we determine the best number of epochs to train a model?
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们如何确定训练模型的最佳epoch数呢？
- en: Training too much may lead to overfitting. But training too little would not
    give you the best results. We need to find the best point at which to stop the
    training for optimal results.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 过度训练可能会导致过拟合。但训练不足则不会给出最佳结果。我们需要找到最佳停止点以获得最佳结果。
- en: One way we can determine that is to train for different number of epochs and
    comparing the results. But with deep learning models, each training session can
    take hours, if not days. Therefore, it may not be practical always to run several
    training sessions to determine the best.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以确定这一点的一种方法是对不同数量的epoch进行训练并比较结果。但深度学习模型，每次训练会花费数小时，甚至数天。因此，始终运行多个训练会话以确定最佳点可能并不实用。
- en: But what if there is a way to automatically stop the training when it reaches
    an optimal point?
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果有一种方法可以在达到最佳点时自动停止训练会怎样呢？
- en: This is where model early stopping comes in. EarlyStopping is another one of
    the built-in callbacks in TensorFlow/Keras which can be used with `model.fit()`
    functions .
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是模型早期停止发挥作用的地方。EarlyStopping是TensorFlow/Keras内置的回调之一，可以与`model.fit()`函数一起使用。
- en: The way EarlyStopping works, similar to the way the metric monitoring in model
    checkpointing worked, is to keep monitoring a given metric and stop the training
    if it does not improve for a given number of epochs.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: EarlyStopping的工作方式与模型检查点中的指标监控方式类似，即持续监控一个给定的指标，如果该指标在给定数量的epoch内没有改善，则停止训练。
- en: When implementing early stopping it is also best to implement model checkpointing.
    When early stopping stops the training at a point, you can use the saved checkpoints
    to get the model at its best point.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现早期停止时，最好也实现模型检查点。当早期停止在某个点停止训练时，可以使用保存的检查点来获取模型的最佳点。
- en: 'The parameters for EarlyStopping is as follows:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: EarlyStopping的参数如下：
- en: '**monitor:** what metric to monitor, like in model checkpointing.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**monitor:** 要监控的指标，如模型检查点中一样。'
- en: '**min_delta:** the minimum change in the monitored metric that will be considered
    as an improvement.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**min_delta:** 被认为是改进的监控指标的最低变化量。'
- en: '**patience:** how many epochs to wait for an improvement before stopping the
    training.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**patience:** 在停止训练之前等待改进的epoch数。'
- en: '**verbose:** the verbosity level'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**verbose:** 详细的程度'
- en: '**mode:** min, max, or auto, as with model checkpoints.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**mode:** 与模型检查点一样，为min、max或auto。'
- en: '**baseline:** what the baseline is for the training. The training will stop
    if it does not improve over this baseline.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**baseline:** 训练的基准是什么。如果训练没有超过这个基准，则训练将停止。'
- en: '**restore_best_weights:** whether to restore the model back to its bast point
    based on the parameter being monitored. If you set this to False, then the model
    will use the weights from the last step that was completed before stopping, which
    may or may not be the best.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**restore_best_weights:** 是否根据监控的参数将模型恢复到最佳点。如果您将其设置为False，则模型将使用停止前的最后一步完成的权重，这可能是也可能不是最佳权重。'
- en: '[PRE17]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Let us add early stopping to our model. We will take a copy of our code from
    `bird_classify_inceptionV3_checkpoint.py` and name it `bird_classify_inceptionV3_early_stopping.py`.
    We will then make the following modifications to it:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们给我们的模型添加提前终止功能。我们将从 `bird_classify_inceptionV3_checkpoint.py` 复制我们的代码，并将其命名为
    `bird_classify_inceptionV3_early_stopping.py`。然后，我们将对其进行以下修改：
- en: '[PRE18]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Here, we are specifying EarlyStopping to monitor the validation accuracy, and
    stop the training if it does not improve for three consecutive epochs. We also
    specify that once stopped it should restore the model to the last best state (which
    would be three epochs before in this case).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们指定 EarlyStopping 来监控验证准确率，如果连续三个时代没有改进，则停止训练。我们还指定一旦停止，应将模型恢复到最后最佳状态（在这种情况下将是三个时代之前）。
- en: When running the model with these configurations, you will see that the training
    will automatically stop when the training is not improving the model (Figure [8-8](#Fig8)).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用这些配置运行模型时，你会看到当训练没有改进模型时，训练将自动停止（见图 [8-8](#Fig8)）。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig8_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig8_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig8_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig8_HTML.jpg)'
- en: Figure 8-8
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-8
- en: Early stopping the model training
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 提前终止模型训练
- en: Building a Robust Training Script
  id: totrans-136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建鲁棒的训练脚本
- en: With model checkpoints, we were able to recover our model training state in
    case of an interruption. With early stopping we were able to automatically stop
    the training of a model at the right point in training.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 通过模型检查点，我们能够在训练中断的情况下恢复模型训练状态。通过提前终止，我们能够在训练的正确点自动停止模型的训练。
- en: Now let us see how we can combine those to build a robust training script—one
    that you can stop and start any time without losing your progress.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看如何将这些结合起来构建一个鲁棒的训练脚本——一个你可以随时停止和开始而不会丢失进度的脚本。
- en: 'When building a robust training script, we will need to consider the following:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建鲁棒的训练脚本时，我们需要考虑以下因素：
- en: 'Training of our module consists of two steps: training the initial model, and
    fine-tuning the model.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们模块的训练包括两个步骤：训练初始模型和微调模型。
- en: For each of those steps, we will need to determine whether that step has been
    completed already, and run the remaining step.
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于这些步骤中的每一个，我们需要确定该步骤是否已经完成，并运行剩余的步骤。
- en: For each step that needs to run, we will need to determine where the last training
    stopped, and continue from that epoch.
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于需要运行的每个步骤，我们需要确定上次训练停止的位置，并从那个时代起继续。
- en: When training we need to save checkpoints, so that training of that step can
    be resumed later from those points.
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练时，我们需要保存检查点，以便可以从这些点稍后恢复该步骤的训练。
- en: With these in mind, let us build our robust training script.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些，让我们构建我们的鲁棒训练脚本。
- en: 'We will name our new code file `bird_classify_robust_training.py`, and start
    by importing the packages:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将命名我们的新代码文件为 `bird_classify_robust_training.py`，并首先导入所需的包：
- en: '[PRE19]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Then we will add our utility function definitions. What is new here is that
    our `graph_training_history()` function now take two extra parameters to save
    the figure to a file rather than displaying it:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将添加我们的实用函数定义。这里的新特点是我们的 `graph_training_history()` 函数现在接受两个额外的参数，将图形保存到文件而不是显示它：
- en: '[PRE20]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'We then check for the existence of the saved model files to determine which
    step of the training (initial training or fine-tuning) needs to run:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们检查保存的模型文件是否存在，以确定训练的哪个步骤（初始训练或微调）需要运行：
- en: '[PRE21]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'For each of the steps that need running, we then determine which checkpoint
    to start from:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 对于需要运行的每个步骤，我们接下来确定从哪个检查点开始：
- en: '[PRE22]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Then, our data generators and training parameters are defined as usual:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们的数据生成器和训练参数按照常规定义：
- en: '[PRE23]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Based on the conditions we checked earlier, we either start training from beginning,
    start from a checkpoint if checkpoints are already there, or skip the training
    step if the trained model file is already there:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们之前检查的条件，我们可能从头开始训练，如果已经存在检查点，则从检查点开始，或者如果已经存在训练好的模型文件，则跳过训练步骤：
- en: '[PRE24]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'We will then do the same for our fine-tuning step:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将对微调步骤做同样的处理：
- en: '[PRE25]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: This script now allows you to resume from any step in the training process (Figures
    [8-9](#Fig9) and [8-10](#Fig10)).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本现在允许你在训练过程中的任何步骤恢复（见图 [8-9](#Fig9) 和 [8-10](#Fig10)）。
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig10_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig10_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig10_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig10_HTML.jpg)'
- en: Figure 8-10
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-10
- en: Skipping the already completed training step, and continuing from a fine-tuning
    checkpoint
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 跳过已完成的训练步骤，并从微调检查点继续
- en: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig9_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig9_HTML.jpg)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_8_Chapter/502073_1_En_8_Fig9_HTML.jpg](../images/502073_1_En_8_Chapter/502073_1_En_8_Fig9_HTML.jpg)'
- en: Figure 8-9
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-9
- en: Resuming the training step from a checkpoint
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 从检查点恢复训练步骤
- en: With a training script such as this, you can start, stop, and resume training
    at any time without fear of losing your progress due to an interruption.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这样的训练脚本，您可以随时开始、停止和恢复训练，无需担心因中断而丢失进度。
