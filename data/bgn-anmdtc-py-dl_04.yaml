  type: TYPE_NORMAL
  zh: 图 4-73
- en: Evaluating the predictions on the testing split
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 评估测试分割的预测
- en: The output should look like Figure [4-74](#Fig74).
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应该类似于图 [4-74](#Fig74)。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig74_HTML.png)'
  id: totrans-491
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig74_HTML.png)'
- en: A set of program codes in Python displays the following output. Line 1\. Precision
    colon 0.9709897610921502\. Line 2\. Recall colon 1.0\. Line 3\. F 1-Measure colon
    0.9852813852813853.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 一组 Python 程序代码显示以下输出。行 1\. 精确度：0.9709897610921502。行 2\. 召回率：1.0。行 3\. F 1-Measure：0.9852813852813853。
- en: Figure 4-74
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-74
- en: The calculated metrics based on the predictions on the test split
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 基于测试分割预测计算出的指标
- en: As we can see in Figure [4-74](#Fig74), the performance is much improved over
    the untuned model. Also, the F1-measure is really good at 0.985! This is a very
    strong predictor, as not only did it get every anomaly correct, but its positive
    predictive power (precision) is 0.971, so there are not a lot of false positives.
    Let’s evaluate the confusion matrix. Refer to Figure [4-75](#Fig75).
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [4-74](#Fig74) 所示，性能比未调整的模型有了很大提高。此外，F1 测量值非常好，达到了 0.985！这是一个非常强大的预测器，因为它不仅正确地识别了每个异常，而且其阳性预测力（精确度）为
    0.971，所以假阳性并不多。让我们评估混淆矩阵。参见图 [4-75](#Fig75)。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig75_HTML.png)'
  id: totrans-496
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig75_HTML.png)'
