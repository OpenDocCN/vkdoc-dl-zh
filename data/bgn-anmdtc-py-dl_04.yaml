  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 一组 Python 程序代码。它使用 S V M 算法评估代码，并打印出 y 测试值和预测值的精确度、召回率和 f 1 分数。
- en: Figure 4-73
  id: totrans-488
