- en: Traditional Machine Learning Algorithms
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 传统机器学习算法
- en: “Traditional” machine learning algorithms are non-neural network architectures
    like k-nearest neighbors, support vector machines, random forests, decision trees,
    and so on. These models are still quite popular, especially in forms such as XGBoost
    (gradient boosted trees), which remain quite competitive with neural networks
    on structured, tabular data. Other traditional popular algorithms that remain
    in use include clustering algorithms and trees. Though deep learning models may
    receive the spotlight, traditional machine learning algorithms have not fallen
    out of favor and still have good uses, especially in the cases we discussed in
    Chapter [3](483137_2_En_3_Chapter.xhtml).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: “传统”机器学习算法是非神经网络架构，如 k 近邻、支持向量机、随机森林、决策树等。这些模型仍然相当流行，尤其是在 XGBoost（梯度提升树）等形式中，它们在结构化、表格数据上与神经网络保持相当竞争力。其他仍在使用的传统流行算法包括聚类算法和树。尽管深度学习模型可能受到关注，但传统机器学习算法并未过时，并且仍有很好的用途，尤其是在第
    [3](483137_2_En_3_Chapter.xhtml) 章讨论的案例中。
- en: In particular, we are going to cover the Isolation Forest, One-Class Support
    Vector Machine (OC-SVM) and how we can perform anomaly detection with them.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 特别是，我们将介绍隔离森林、单类支持向量机（OC-SVM）以及如何使用它们进行异常检测。
- en: Isolation Forest
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隔离森林
- en: '**Isolation Forest** is an unsupervised learning algorithm that attempts to
    discover the underlying structure of the dataset and isolate outliers. It is a
    collection of individual tree structures that recursively partition the dataset
    according to its attributes. In each iteration of the process, a random feature
    is selected, and the data is split based on a randomly chosen value between the
    minimum and maximum of the chosen feature.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**隔离森林**是一种无监督学习算法，它试图发现数据集的潜在结构并隔离异常值。它是一组单个树结构，根据其属性递归地划分数据集。在过程的每次迭代中，都会选择一个随机特征，并根据所选特征的随机选择值进行数据划分。'
- en: This process is repeated until the entire dataset is partitioned, forming an
    individual tree in the forest. Anomalies generally form much shorter paths from
    the root than normal data points since they are much more easily isolated. We
    can find the anomaly score by using a function of the data point involving the
    average path length, which is something scikit-learn provides with its implementation
    of Isolation Forest.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程会重复进行，直到整个数据集被划分，形成森林中的单个树。异常值通常比正常数据点从根节点到路径的长度要短得多，因为它们更容易被隔离。我们可以通过使用涉及平均路径长度的数据点函数来找到异常分数，这是scikit-learn通过其隔离森林的实现提供的。
- en: Example of an Isolation Forest
  id: totrans-18
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 隔离森林示例
- en: 'To understand better what an Isolation Forest does, let’s look at an imaginary
    scenario. At a large lake, an irresponsible fish breeder has bred and released
    a mutated version of a native fish species. The following aspects differentiate
    the mutant species from the native species:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解隔离森林的作用，让我们来看一个假设场景。在一个大湖中，一个不负责任的鱼养殖者繁殖并释放了一种本地鱼类物种的突变版本。以下方面区分了突变物种与本地物种：
- en: Longer average length
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 较长的平均长度
- en: Larger average circumference
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 较大的平均周长
- en: Longer tail fin in proportion to its body length
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尾鳍长度与身体长度的比例更长
- en: This gives us three measurements we can take for each fish to distinguish the
    invasive, mutant species from the native species. This is akin to having three
    columns per data point in the X dataset.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这为我们提供了三个可以针对每条鱼采取的测量值，以区分入侵、突变物种与本地物种。这类似于在X数据集中每个数据点有三个列。
- en: For a visual representation of how the native and mutant species differ in this
    scenario, Figure [4-1](#Fig1) depicts what an average specimen of the native fish
    looks like and Figure [4-2](#Fig2) depicts what an average specimen of the mutant
    fish looks like.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为了直观地展示在这个场景中本地和突变物种的差异，图[4-1](#Fig1)展示了本地鱼的平均标本外观，图[4-2](#Fig2)展示了突变鱼的平均标本外观。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig2_HTML.jpg)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片2](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig2_HTML.jpg)'
- en: A sketch of an invasive fish.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 入侵鱼的草图。
- en: Figure 4-2
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-2
- en: Example of average invasive fish species
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 平均入侵鱼类物种示例
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig1_HTML.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片1](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig1_HTML.jpg)'
- en: A sketch of a native fish.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 本地鱼类的草图。
- en: Figure 4-1
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-1
- en: Example of average native fish species
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 平均本地鱼类物种示例
- en: 'As you can see, on average, the invasive species has a larger circumference,
    a longer body, and a longer tailfin. However, all of these measurements fall on
    a distribution, and quite a bit of overlap exists between the two species: some
    native fish are larger than average for the native species, and some invasive
    fish are smaller than average for the mutant species. This overlap makes it hard
    to immediately tell if a fish is invasive or native.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，平均而言，入侵物种的周长更大，身体更长，尾鳍更长。然而，所有这些测量值都落在分布上，两种物种之间有很大的重叠：一些本地鱼比本地物种的平均值要大，而一些入侵鱼比突变物种的平均值要小。这种重叠使得很难立即判断一条鱼是入侵的还是本地的。
- en: Ecologists working for a local government agency have become concerned that
    the infestation of the mutant species threatens the survival of native species
    in the lake. The ecologists have decided to conduct a survey of the fish populations
    to investigate the extent of the infiltration, and have hired a group of fishermen
    to assist them. Inspired by statistical methodology, the ecologists have asked
    the fishermen to catch 1,000 fish in the lake. The ecologists have also trained
    the fishermen to classify the fish as a native species (normal) or an invasive
    species (anomaly) based on the measurement of girth, overall length, and tail
    fin length. Based on the results of their findings, the ecologists can create
    a rough estimate of the distribution of invasive species to normal species in
    the lake overall.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在为当地政府机构工作的生态学家们开始担忧，这种突变物种的侵扰威胁到了湖中本地物种的生存。生态学家们决定对鱼类种群进行一次调查，以调查入侵程度的范围，并雇佣了一群渔民来协助他们。受到统计方法的启发，生态学家们要求渔民在湖中捕获1,000条鱼。生态学家们还培训了渔民，根据鱼围、总长度和尾鳍长度的测量，将鱼分类为本地物种（正常）或入侵物种（异常）。基于他们的发现结果，生态学家可以大致估计湖中入侵物种与本地物种的整体分布。
- en: 'On to the evaluations, the fishermen have agreed to the following process and
    will repeat this for a random split of several hundred fish out of the total 1,000:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是评估过程，渔民们同意以下流程，并将对总共1,000条鱼中的随机几百条进行重复操作：
- en: Each fisherman selects a random subset of features, and the data is partitioned
    using randomly chosen values between the minimum and maximum of each selected
    feature. Some may emphasize the length and circumference, while others look at
    length and tailfin length, etc.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每位渔民选择一组随机特征子集，并使用每个选定特征的最小值和最大值之间的随机值对数据进行分区。有些人可能会强调长度和周长，而其他人则会关注长度和尾鳍长度等。
- en: Each fisherman uses their intuition to separate fish that immediately seem anomalous.
    Some fish are harder to classify, requiring more careful scrutiny.
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每位渔民利用他们的直觉来分离那些立即看起来异常的鱼。有些鱼难以分类，需要更仔细的审查。
- en: 'Once each fisherman has evaluated all the fish they have been allocated, they
    average their criteria and generate scores for every one of the 1,000 fish. Each
    score represents how easily that fish was able to be separated from the other
    fish using the process in step 1\. For example, a very large fish among a pile
    of smaller fish would be easily partitioned into its own side by size alone: Based
    on these scores, a threshold can be set, and the fish can be evaluated as a normal
    or anomalous fish depending on the threshold.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦每位渔民评估了分配给他们的所有鱼，他们会平均他们的标准，并为每一条1,000条鱼生成分数。每个分数代表该鱼在使用步骤1中的过程时，与其他鱼分离的难易程度。例如，在一堆较小的鱼中，一条非常大的鱼仅凭体型就能轻松地被分到一边：基于这些分数，可以设置一个阈值，并根据阈值将鱼评估为正常或异常鱼。
- en: In this example, each individual fisherman represents one isolation tree in
    the Isolation Forest. Given a random subset of the data, each tree attempts to
    randomly partition this by some randomly chosen subset of features. This is akin
    to each fisherman looking at one or two aspects of each fish in a small subset
    of the total 1,000 and trying to separate them out from each other. For example,
    a really large fish would clearly be put in a pile away from the rest, while the
    rest may need to be more carefully measured and sorted by size. The harder the
    fish are to separate from one another in their sample, the deeper the tree (and
    the longer the path length).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，每位渔民代表Isolation Forest中的一个隔离树。给定数据的一个随机子集，每棵树尝试通过随机选择的特征子集随机分区。这类似于每位渔民在总共1,000条鱼的小子集中查看每条鱼的一个或两个方面，并尝试将它们彼此分离。例如，一条非常大的鱼显然会被放在远离其他鱼的堆里，而其余的鱼可能需要更仔细地测量和按大小排序。在样本中，鱼越难分离，树（以及路径长度）就越深。
- en: Once the trees have been formed, they come together to form a forest (ensemble).
    When the fishermen come together to assign each fish an anomaly score, each fisherman
    submits their own score based on their own criteria that they learned given their
    random batch. These anomaly scores are then averaged together to present a final
    anomaly score for each fish. In an Isolation Forest, each tree submits an anomaly
    score, which is derived as a function of the path length.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当树木形成后，它们聚集在一起形成一个森林（集成）。当渔民聚集起来为每条鱼分配异常分数时，每个渔民根据自己的标准提交自己的分数，这些标准是基于他们随机批次学到的。然后，这些异常分数被平均在一起，以呈现每条鱼的最终异常分数。在隔离森林中，每棵树提交一个异常分数，该分数是路径长度的函数。
- en: The easier the sample is to separate from the other data, the shorter the path
    length. The individual scores are averaged together to present an anomaly score
    that is effectively the average path length. If all of the trees found it easy
    to isolate a data point, its average path length and anomaly score will be low,
    thus making it likely to be an anomaly.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 样本越容易与其他数据分离，路径长度就越短。个人分数被平均在一起，以呈现一个异常分数，这实际上是平均路径长度。如果所有找到的树都容易隔离数据点，其平均路径长度和异常分数将很低，因此它很可能是异常值。
- en: And so, for the fishermen, they individually create their own separation criteria,
    and as a group submit their final anomaly scores for each fish they caught. This
    is how the Isolation Forest operates.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于渔民来说，他们各自创建自己的分离标准，作为一个团队提交他们捕获的每条鱼的最终异常分数。这就是隔离森林的工作方式。
- en: However, this is not a perfect system; as previously discussed, due to the overlap
    of smaller than average mutant fish and larger than average native fish, some
    invasive fish will be misidentified as native fish, and some native fish will
    be misidentified as invasive fish. These cases, respectively, represent false
    negatives and false positives.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不是一个完美的系统；正如之前讨论的，由于平均大小突变鱼和平均大小本地鱼的交叉重叠，一些入侵鱼可能会被错误地识别为本地鱼，而一些本地鱼可能会被错误地识别为入侵鱼。这些情况分别代表假阴性和假阳性。
- en: Anomaly Detection with an Isolation Forest
  id: totrans-44
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用隔离森林进行异常检测
- en: Let’s dive right in and apply an Isolation Forest to a dataset. Once again,
    the Jupyter notebook for this section is available at the GitHub URL provided
    at the beginning of this chapter.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们直接深入应用隔离森林算法到一个数据集。同样，本节所用的Jupyter笔记本可以在本章开头提供的GitHub URL中找到。
- en: We will use the KDDCUP 1999 dataset, which contains an extensive amount of data
    representing a wide range of intrusion attacks. To simplify things, we will narrow
    the scope to only data related to HTTP attacks.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用KDDCUP 1999数据集，它包含大量数据，代表广泛的入侵攻击。为了简化问题，我们将范围缩小到仅与HTTP攻击相关的数据。
- en: You can find the dataset at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/kddcup.data.gz`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/kddcup.data.gz).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/kddcup.data.gz](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/kddcup.data.gz)找到数据集。
- en: Download the kddcup.data.gz file and extract it. You should see a file named
    kddcup.data.corrected.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 下载kddcup.data.gz文件并解压它。您应该会看到一个名为kddcup.data.corrected的文件。
- en: Let’s get started with the imports. Execute the code shown in Figure [4-3](#Fig3).
    See Chapter [2](483137_2_En_2_Chapter.xhtml) for a description of the imported
    packages.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从导入开始。执行图[4-3](#Fig3)中所示的代码。参见第[2](483137_2_En_2_Chapter.xhtml)章对导入包的描述。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig3_HTML.png)'
  id: totrans-50
  prefs: []
