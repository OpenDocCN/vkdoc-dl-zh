- en: Once this ends, rerun the code in Figure [4-68](#Fig68). This time, the best
    result is with `nu` = 0.0002, with 0.9607 F1-score. Now that we have found the
    optimal `nu` setting (any more grid searches would yield diminishing results),
    let’s stick with these settings and train the model.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦完成，重新运行图 [4-68](#Fig68) 中的代码。这次，最佳结果是 `nu` = 0.0002，F1 分数为 0.9607。现在我们已经找到了最佳的
    `nu` 设置（任何更多的网格搜索都会产生递减的结果），让我们坚持这些设置并训练模型。
- en: Evaluation and Summary
  id: totrans-479
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 评估和总结
- en: Let’s now find out how our model performs on the test set. Before that, we must
    train it with our full training split by executing the code in Figure [4-72](#Fig72).
    Be aware that when you increase or change the data size, you might need to retune
    your hyperparameters. In our case, we had to increase `gamma` from 0.00001 to
    0.005.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看我们的模型在测试集上的表现。在此之前，我们必须通过执行图 [4-72](#Fig72) 中的代码来用我们的完整训练集对其进行训练。请注意，当你增加或更改数据量时，你可能需要重新调整你的超参数。在我们的例子中，我们必须将
    `gamma` 从 0.00001 增加到 0.005。
