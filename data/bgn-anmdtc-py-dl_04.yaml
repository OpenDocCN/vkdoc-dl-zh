- en: Creating a copy of `df` (so that we have a restore point if needed) and saving
    the label column of the correlation matrix as its own variable
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 创建`df`的副本（以便在需要时有一个恢复点）并将相关矩阵的标签列保存为其自己的变量
- en: 'We want to keep only the columns that have at least a 0.2 magnitude correlation
    with label. In other words, if it is at least weakly linearly correlated, we want
    to include those variables only. The following list provides a general rule of
    thumb to follow in terms of magnitude:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只想保留与标签至少有0.2幅度相关性的列。换句话说，如果它是至少弱线性相关的，我们只想包括那些变量。以下列表提供了一个关于幅度的通用规则：
- en: '**0.0 correlation**: No linear correlation'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.0相关性**：没有线性相关性'
- en: '**0.2 to 0.4**: Weak linear correlation'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.2到0.4**：弱线性相关性'
- en: '**0.4 to 0.6**: Moderate linear correlation'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.4到0.6**：中等线性相关性'
- en: '**0.6 to 0.8**: Strong linear correlation'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.6到0.8**：强线性相关性'
- en: '**0.8 to 1.0**: Very strong linear correlation'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.8到1.0**：非常强的线性相关性'
- en: '**1.0 correlation**: Perfect linear correlation, like the relation y = mx,
    where m is a positive coefficient and all the points lie on a straight line'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1.0相关性**：完美的线性相关性，如y = mx的关系，其中m是一个正系数，所有点都位于一条直线上'
- en: Correlation can also be negative. Positive correlation means as y increases,
    x also increases. Negative correlation means as y increases, x decreases. An example
    of –1.0 correlation is the relation y = mx, where m is a negative coefficient.
    The points all lie on a straight line.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性也可以是负的。正相关意味着当y增加时，x也增加。负相关意味着当y增加时，x减少。-1.0相关性的一个例子是y = mx的关系，其中m是一个负系数。所有点都位于一条直线上。
- en: We picked 0.2 as the threshold since practically no linear correlation exists
    below that point. Ultimately, this is another hyperparameter to tune and experiment
    with to see how this affects the end performance.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们选择0.2作为阈值，因为实际上在该点以下几乎没有线性相关性。最终，这又是一个需要调整和实验的超参数，以查看它如何影响最终性能。
- en: Run the code in Figure [4-13](#Fig13). Feel free to explore `label_corr` in
    its entirety.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 运行图[4-13](#Fig13)中的代码。您可以自由探索`label_corr`的全部内容。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig13_HTML.png)'
