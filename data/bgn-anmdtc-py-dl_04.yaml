    open parenthesis, confusion underscore matrix, open parenthesis, y underscore
    test comma preds, double close parenthesis, dot, plot, open parenthesis, close
    parenthesis.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 一组 Python 程序代码显示以下内容。混淆矩阵显示，开括号，混淆下划线矩阵，开括号，y 测试下划线，preds，双闭括号，点，plot，开括号，闭括号。
- en: Figure 4-75
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-75
- en: Code to plot and visualize the confusion matrix
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制和可视化混淆矩阵的代码
- en: Figure [4-76](#Fig76) shows the output.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-76](#Fig76) 展示了输出结果。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig76_HTML.jpg)'
  id: totrans-501
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig76_HTML.jpg)'
- en: A 2-cross-2 confusion matrix of the true label versus the predicted label. A
    scale of color gradients ranges from 0 to 80000\. Row 1 reads 92878 and 17\. Row
    2 reads 0 and 569\. Element 92878 is lightly shaded, while the others are vivid.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 真实标签与预测标签的 2-交叉-2 混淆矩阵。颜色渐变的比例从 0 到 80000。第一行读作 92878 和 17。第二行读作 0 和 569。元素
    92878 轻微着色，而其他元素则色彩鲜明。
- en: Figure 4-76
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-76
- en: The resulting confusion matrix from the predictions on the test set. There are
    no false negatives, and very few false positives. This is a very strong result
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试集上的预测结果所得到的混淆矩阵。没有假阴性，并且假阳性非常少。这是一个非常强的结果。
- en: You now should have a good understanding of how to implement your own OC-SVM
    algorithm using scikit-learn, tune it with a holdout-validation and grid search
    strategy, and use the discovered hyperparameter settings to create a strong anomaly
    detector.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在应该很好地理解了如何使用 scikit-learn 实现自己的 OC-SVM 算法，使用保留验证和网格搜索策略进行调整，并使用发现的超参数设置来创建一个强大的异常检测器。
- en: Like the Isolation Forest model, the OC-SVM model does have some pros and cons
    that you should consider before you use it in practice.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 与隔离森林模型类似，OC-SVM 模型在使用前确实有一些优缺点需要您考虑。
- en: '**Pros:**'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: '**优点：**'
- en: '**High-dimensional data**: The OC-SVM is able to handle higher-dimensional
    data due to its use of the kernel trick, which maps data into higher dimensions
    anyway. That being said, it is not immune to the “curse of dimensionality,” where
    you require much more data in higher dimensions to fill out the space adequately
    for the model to correctly capture a good decision boundary.'
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高维数据**：由于使用了核技巧，OC-SVM 能够处理高维数据，因为数据无论如何都会被映射到更高维。但话虽如此，它并不是对“维度诅咒”免疫的，在更高维中，您需要更多的数据来充分填充空间，以便模型能够正确地捕捉到一个好的决策边界。'
- en: '**Unsupervised**: The OC-SVM can be trained in an unsupervised manner. However,
    if you do have partial labeling, you can use the model in a semi-supervised manner
    like we did in this section.'
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无监督学习**：OC-SVM 可以以无监督的方式进行训练。然而，如果您确实有部分标签，您可以使用半监督方式，就像我们在本节中所做的那样。'
- en: '**Nonlinear decision boundaries**: Thanks to kernels like the RBF, the OC-SVM
    can model nonlinear decision boundaries, as the data is able to first be mapped
    into a nonlinear, hyperdimensional space before being linearly separated. Back
    in the original space, the resulting decision boundary becomes nonlinear.'
  id: totrans-510
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非线性决策边界**：多亏了像 RBF 这样的核函数，OC-SVM 可以建模非线性决策边界，因为数据首先被映射到一个非线性、高维空间，然后再进行线性分离。在原始空间中，得到的决策边界就变成了非线性。'
- en: '**Cons:**'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: '**缺点：**'
- en: '**Sensitive to hyperparameters**: As we experienced, the OC-SVM is very hyperparameter
    dependent and quite sensitive to these settings. When you increase the number
    of training samples, the hyperparameter settings may require retuning. However,
    once it does get going, it’s very good.'
  id: totrans-512
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对超参数敏感**：正如我们所经历的，OC-SVM 非常依赖于超参数，对这些设置的敏感度很高。当您增加训练样本的数量时，可能需要重新调整超参数设置。然而，一旦它开始运行，它就非常好。'
- en: '**Noisy data**: When the data is noisy, resulting in a bit of an overlap between
    normal (but noisy) data points and anomalies, the decision boundary becomes hard
    to model. In these cases, the model will be forced to isolate the noisy normal
    instances just to target the anomalies.'
  id: totrans-513
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**噪声数据**：当数据有噪声时，导致正常（但噪声）数据点和异常之间有重叠，决策边界就难以建模。在这些情况下，模型将被迫隔离噪声的正常实例，以针对异常。'
- en: '**Poor scaling**: The OC-SVM scales quite poorly as the data size increases.
    There are some ways to get around this, such as by using a kernel mapper to transform
    the data via an RBF kernel separately, and then using a linear, stochastic gradient
    descent solver-based SVM (available in sklearn) to arrive at an approximate solution
    more quickly.'
  id: totrans-514
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**扩展性差**：随着数据量的增加，OC-SVM 的扩展性相当差。有一些方法可以绕过这个问题，例如通过使用核映射器使用 RBF 内核分别转换数据，然后使用基于线性、随机梯度下降求解器的
    SVM（在 sklearn 中可用）来更快地得到一个近似解。'
- en: That being said, the OC-SVM is still a very strong algorithm and a great tool
    to keep in your toolbox. Versions of the OC-SVM, such as the SGD OC-SVM, can offer
    you alternatives that approximate a similar solution if you are struggling with
    scaling, but eventually there is still an upper limit for how much data you can
    train on. So, as long as you properly tune your model and follow the data and
    any domain knowledge that might help with hyperparameter tuning, the OC-SVM can
    achieve excellent results depending on the exact nature of the data.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，OC-SVM 仍然是一个非常强大的算法，是你工具箱中的一大法宝。OC-SVM 的版本，如 SGD OC-SVM，可以提供近似类似解决方案的替代方案，如果你在扩展性方面遇到困难，但最终你仍然有一个上限，即你可以训练多少数据。因此，只要你能正确调整你的模型，并遵循数据以及任何可能帮助调整超参数的领域知识，OC-SVM
    可以根据数据的具体性质实现出色的结果。
- en: Summary
  id: totrans-516
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Having completed this chapter, you now have practiced the fundamental machine
    learning workflow of data loading, processing, splitting, training, hyperparameter
    tuning, and evaluation. This same workflow will hold for nearly any kind of machine
    learning or deep learning modeling task. Beyond that, hopefully you have seen
    the power that the Isolation Forest and OC-SVM models can offer in terms of anomaly
    detection, as with the right hyperparameters, they can achieve impressive results.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 完成这一章后，你现在已经练习了基本机器学习工作流程，包括数据加载、处理、拆分、训练、超参数调整和评估。这个相同的流程几乎适用于任何类型的机器学习或深度学习建模任务。除此之外，希望你已经看到了隔离森林和
    OC-SVM 模型在异常检测方面的强大功能，因为只要设置正确的超参数，它们可以取得令人印象深刻的成果。
- en: In Chapter [5](483137_2_En_5_Chapter.xhtml), you will be formally introduced
    to what deep learning is and explore an assortment of techniques to help tune
    the models for maximizing generalization to new data.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [5](483137_2_En_5_Chapter.xhtml) 章，你将正式了解深度学习的概念，并探索一系列技术来帮助调整模型，以最大化对新数据的泛化。
