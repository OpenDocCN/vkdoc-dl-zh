  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要注意的是，数据集非常不平衡，并且按比例异常数据点非常少。其次要注意的是，这些是分类标签。我们需要将它们编码为数字格式。为此，我们可以简单地给正常数据点分配0，给异常数据点分配1，因为我们的唯一目标是区分异常点和正常点。图[4-8](#Fig8)显示了执行此操作的代码。
