- en: Figure 4-70
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-70
- en: Running a broad search over the parameter `nu` from 0.001 to 0.009
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 在 0.001 到 0.009 的参数 `nu` 上进行广泛搜索
- en: Rerun Figure [4-68](#Fig68). You will find that `nu` = 0.001 gave the best result
    at F1-score. Let’s narrow the range of `nu` some more and run a finer grid search
    to see if we can improve our performance further. Run the code in Figure [4-71](#Fig71).
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 重新运行图 [4-68](#Fig68)。你会发现 `nu` = 0.001 在 F1 分数上给出了最佳结果。让我们进一步缩小 `nu` 的范围，进行更精细的网格搜索，看看我们是否能进一步提高性能。运行图
