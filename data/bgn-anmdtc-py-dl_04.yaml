  type: TYPE_NORMAL
  zh: 一组 Python 程序代码。它将 gamma 的值恢复到 0.005，并使用 S V M 算法拟合增加的样本数量。
- en: Figure 4-72
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-72
- en: With the optimal hyperparameter settings, train on the training subsplit
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 使用最佳超参数设置，在训练子集上训练
- en: Now we can evaluate on our test data. Execute Figure [4-73](#Fig73).
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以对我们的测试数据进行评估。执行图 [4-73](#Fig73)。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig73_HTML.png)'
  id: totrans-486
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig73_HTML.png)'
