- en: 'Since the OC-SVM in our example will be training only on normal data (in a
    semi-supervised setting due to the partial labeling), we need to split the training
    data into two parts: one comprised of only normal data, intended for training,
    and another part comprised of normal and anomalous data, intended for testing.'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的示例中的 OC-SVM 将仅对正常数据进行训练（由于部分标记，这是一个半监督设置），我们需要将训练数据分成两部分：一部分仅包含正常数据，用于训练；另一部分包含正常和异常数据，用于测试。
- en: To do that, we will define a function with the code shown in Figure [4-58](#Fig58)
    to help us with this.
