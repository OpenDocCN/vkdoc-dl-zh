  zh: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig71_HTML.png)'
- en: A set of program codes in Python. It performs the experimental search for nu
    values within a finer range, fixes the n estimators to train all the cores using
    the S V M algorithm, and returns the validation results of the x train and the
    y train.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 一组 Python 程序代码。它在更精细的范围内对 nu 值进行实验搜索，将 n 估计器固定为使用 S V M 算法训练所有核心，并返回 x 训练和 y
    训练的验证结果。
- en: Figure 4-71
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
