- en: The output shapes of the train, val, and test sets
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 训练集、验证集和测试集的输出形状
- en: Training
  id: totrans-143
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 训练
- en: Finally, we can get started with the Isolation Forest modeling task. Run Figure
    [4-19](#Fig19) to instantiate our model.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以开始隔离森林建模任务。运行图[4-19](#Fig19)以实例化我们的模型。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig19_HTML.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig19_HTML.png)'
- en: A set of program codes in Python. It implements the isolation forest algorithm
    with stock parameters and calls the random state value 42.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它实现了具有股票参数的隔离森林算法，并调用随机状态值42。
- en: Figure 4-19
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-19
- en: With default parameters, instantiating an Isolation Forest model
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 使用默认参数，实例化一个隔离森林模型
- en: The code in Figure [4-20](#Fig20) trains on the training data and generates
    anomaly scores from the training data.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-20](#Fig20) 中的代码在训练数据上训练并从训练数据生成异常分数。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig20_HTML.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig20_HTML.png)'
- en: A set of program codes in Python. It trains the training data and generates
    anomaly scores from the training data using the isolation forest decision function.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它使用隔离森林决策函数在训练数据上训练并生成异常分数。
- en: Figure 4-20
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-20
- en: Training the model and predicting anomaly scores
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型并预测异常分数。
- en: We can visualize the anomaly scores and get an idea of the distribution of average
    path lengths. Remember, the Isolation *Forest* contains many individual trees
    that each have a specific path length, which is why we are averaging them all.
    We should see a left skew, meaning the tail is long to the left of the graph,
    while most of the data is distributed toward the right. Figure [4-21](#Fig21)
    shows how to plot this.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以可视化异常分数并了解平均路径长度的分布情况。记住，隔离 *森林* 包含许多单独的树，每棵树都有特定的路径长度，这就是为什么我们要对所有路径长度进行平均。我们应该看到一个左偏斜，意味着图表左侧的尾部很长，而大部分数据都分布在右侧。图
    [4-21](#Fig21) 展示了如何绘制这个图表。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig21_HTML.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig21_HTML.png)'
- en: A set of program codes in Python. It defines the codes to plot the histogram
    of anomaly scores by labeling the x-axis as Average Path Lengths and the y-axis
    as the Number of Data Points.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它定义了绘制异常分数直方图的代码，将x轴标记为平均路径长度，y轴标记为数据点数量。
- en: Figure 4-21
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-21
- en: Code to plot a histogram of the anomaly scores, derived from average path lengths
    of each sample in the data
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 代码用于绘制异常分数的直方图，该分数来自数据中每个样本的平均路径长度。
- en: The output should look like the graph shown in Figure [4-22](#Fig22).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应类似于图 [4-22](#Fig22) 所示的图表。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig22_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig22_HTML.jpg)'
- en: A histogram of the number of data points versus average path lengths. It plots
    exponentially increasing trends with the highest value at (0.18, 100000). Data
    is approximated.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 数据点数量与平均路径长度的直方图。它绘制了指数增长的趋势，最高值在(0.18, 100000)。数据是近似的。
- en: Figure 4-22
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-22
- en: A histogram showing the average path lengths (anomaly scores). Since most of
    the data is normal, there should be a left skew as we see in the graph. The little
    clump of outliers far to the left are obvious anomalies
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 显示平均路径长度（异常分数）的直方图。由于大部分数据是正常的，我们应该看到一个左偏斜，正如我们在图表中看到的那样。远在左侧的小簇异常很明显。
- en: Given what we see in the graph, let’s manually set a threshold. The idea is
    that any anomaly score below this threshold is counted as an anomaly, while any
    anomaly score above this threshold is counted as a normal point.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们在图表中看到的情况，让我们手动设置一个阈值。想法是，任何低于此阈值的异常分数都被计为异常，而任何高于此阈值的异常分数都被计为正常点。
- en: Run the code in Figure [4-23](#Fig23) to do this, as well as check the precision,
    recall, and F1-score of the resulting predictions. The negative path lengths are
    a result of the specific scoring algorithm used by Scikit-Learn’s implementation
    of the Isolation Forest. Negative scores represent anomalies, and positive scores
    represent normal points. As we can clearly see a small clump of outliers to the
    left of –0.3, we will set a threshold of –0.3 based on this observation. Will
    this be enough to capture our anomalies? This is a tunable hyperparameter. Feel
    free to adjust it and notice the resulting change in performance.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 运行图 [4-23](#Fig23) 中的代码来完成此操作，以及检查结果的预测的精确度、召回率和F1分数。负路径长度是Scikit-Learn的隔离森林实现所使用的特定评分算法的结果。负分数表示异常，正分数表示正常点。正如我们清楚地看到，在-0.3左侧有一个小的异常簇，我们将根据这个观察结果设置阈值为-0.3。这足以捕获我们的异常吗？这是一个可调整的超参数。请随意调整它并注意性能的相应变化。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig23_HTML.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig23_HTML.png)'
- en: A set of program codes in Python. It sets the threshold, anomalies, precision,
    recall, and f 1 and prints the precision, recall, and f 1 measure.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它设置阈值、异常、精确度、召回率和F1，并打印精确度、召回率和F1度量。
- en: Figure 4-23
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-23
- en: Setting the threshold and predicting anomalies based on what side of the threshold
    each score falls under. Then displaying the precision, recall, and F1-measure
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 根据每个分数落在阈值哪一侧来设置阈值并预测异常。然后显示精确度、召回率和F1度量。
- en: The precision, recall, and F1-measure are chosen because they help paint a clear
    picture of how the model does with respect to predicting anomalies. We want to
    maximize both precision (the model’s anomaly prediction success rate) and the
    recall (the model’s true anomaly capture rate). Only when both are maximized do
    we have a proper anomaly detector. The output of executing the code in Figure
    [4-23](#Fig23) is shown in Figure [4-24](#Fig24).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 精确度、召回率和F1度量被选中，因为它们有助于清晰地描绘模型在预测异常方面的表现。我们希望最大化精确度（模型的异常预测成功率）和召回率（模型的真正异常捕获率）。只有当两者都最大化时，我们才有一个合适的异常检测器。执行图[4-23](#Fig23)中的代码的输出显示在图[4-24](#Fig24)中。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig24_HTML.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig24_HTML.png)'
- en: A set of program codes in Python displays the following. Line 1\. Precision
    colon 1.0\. Line 2\. Recall colon 0.4050179211469534\. Line 3\. F 1 Measure colon
    0.576530612244898.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码显示以下内容。行1：精确度为1.0。行2：召回率为0.4050179211469534。行3：F1度量值为0.576530612244898。
- en: Figure 4-24
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-24
- en: The model’s predictive performance is poor, as indicated by the recall and F1-measure
    being so low. This is a bad anomaly detector
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的预测性能很差，如召回率和F1度量值很低所示。这是一个糟糕的异常检测器
- en: Looking at Figure [4-24](#Fig24), the precision is 1.0\. This means that we
    certainly did isolate the anomalies by picking our threshold, except it is clearly
    not enough, as we only captured ~40% of the anomalies.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 观察图[4-24](#Fig24)，精确度为1.0。这意味着我们确实通过选择阈值隔离了异常值，但显然还不够，因为我们只捕获了大约40%的异常值。
- en: This does not mean that the Isolation Forest model is bad, but rather that we
    now have to embark upon the hyperparameter tuning process to better fit the isolation
    model to our specific dataset and use case.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着Isolation Forest模型不好，而是我们现在必须开始超参数调整过程，以便更好地将隔离模型拟合到我们的特定数据集和用例。
- en: Hyperparameter Tuning
  id: totrans-177
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 超参数调整
- en: Isolation Forest depends quite heavily on the hyperparameter settings, which
    must be tailored to your specific dataset. It’s not like a deep neural network
    that mostly learns by itself; most of the work with these traditional machine
    learning algorithms is getting the hyperparameter tuning just right.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: Isolation Forest 依赖于超参数设置，这些设置必须根据您的特定数据集进行调整。它不像深度神经网络那样主要依靠自身学习；使用这些传统机器学习算法的大部分工作都是确保超参数调整恰到好处。
- en: 'With the Isolation Forest, the following are the hyperparameters of interest
    to tune:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Isolation Forest时，以下是需要调整的超参数：
- en: '`max_samples`: How many samples to use to train each tree in the forest'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`max_samples`：用于训练森林中每棵树的样本数量'
- en: '`max_features`: How many features per data point to use to train each tree
    in the forest'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`max_features`：每个数据点用于训练森林中每棵树的特征数量'
- en: '`n_estimators`: How many trees should comprise the forest'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`n_estimators`：森林中应包含多少棵树'
- en: There is also a feature, **contamination**, that tells the Isolation Forest
    what proportion of the data is contaminated by anomalies. But for this, we can
    calculate the proportion of anomalies from our training set and pass it in directly.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一个功能，**contamination**，它告诉Isolation Forest有多少比例的数据被异常值污染。但对于这一点，我们可以从我们的训练集中计算异常值的比例，并直接传递它。
- en: As for the method of hyperparameter tuning, we will use holdout validation combined
    with grid search. Holdout validation, given a sufficient data size, is good for
    getting ballpark estimates of what direction to move in with respect to hyperparameter
    adjustments. Holdout validation does a good job of massively boosting predictive
    capability. However, if you want to be experimentally thoroughly sound and robust,
    K-fold cross-validation is the way to go if you can afford the computational expenses
    or if your validation data size is not sufficient enough.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 至于超参数调整的方法，我们将使用保留验证结合网格搜索。保留验证，在数据量足够的情况下，有助于获得关于超参数调整方向的大致估计。保留验证在大幅提升预测能力方面做得很好。然而，如果您想要实验上完全可靠且稳健，如果您能承担计算成本或者验证数据量不足，K折交叉验证是最佳选择。
- en: With that being said, let’s calculate the `contamination` parameter first, as
    shown in Figure [4-25](#Fig25).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，让我们首先计算`contamination`参数，如图[4-25](#Fig25)所示。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig25_HTML.png)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig25_HTML.png)'
- en: A set of program codes in Python. It estimates the proportion of anomalies about
    0.0065 and 0.006 from the y train and the length of the y train.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 一组用Python编写的程序代码。它估计y train中异常的大约0.0065和0.006的比例以及y train的长度。
- en: Figure 4-25
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-25
- en: Calculating the proportion of anomalies in the training dataset
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 计算训练数据集中异常的比例。
- en: The output should be around 0.00658, which we can round up to 0.0066\. Now,
    let’s define one single experimental run as a function to make our code more modular.
    Refer to Figure [4-26](#Fig26).
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应约为0.00658，我们可以将其四舍五入到0.0066。现在，让我们定义一个单独的实验运行为一个函数，使我们的代码更加模块化。参见图[4-26](#Fig26)。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig26_HTML.png)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![图4-26](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig26_HTML.png)'
- en: A set of program codes in Python. It uses the isolation forest instance, x,
    and y data, train, evaluate, and return the results. It uses the stock Logistic
    Regression model to predict the labels of precision, recall, and F 1 score.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一组用Python编写的程序代码。它使用隔离森林实例、x和y数据、train、evaluate并返回结果。它使用股票逻辑回归模型来预测精确度、召回率和F1分数的标签。
- en: Figure 4-26
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-26
- en: Code to perform one experimental trial given an Isolation Forest model and the
    x and y data. The precision, recall, and F1-measure metrics are calculated and
    returned as a dictionary
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 给定Isolation Forest模型和x和y数据时执行一个实验试验的代码。计算并返回精确度、召回率和F1度量指标。
- en: Notice that we are using a logistic regression model to predict the anomaly
    scores. This is to avoid manual tuning of the threshold and to get a model to
    find this threshold by itself. The logistic regression model takes in the input
    features and essentially serves as a threshold function, where if the threshold
    is passed, the output is 1, otherwise it is 0\. The intention here is to have
    the model learn the threshold automatically and use that learned threshold to
    predict anomaly labels for future data.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们正在使用逻辑回归模型来预测异常分数。这是为了避免手动调整阈值，并让模型自己找到这个阈值。逻辑回归模型接受输入特征，本质上充当一个阈值函数，如果阈值被通过，输出为1，否则为0。这里的目的是让模型自动学习阈值，并使用学到的阈值来预测未来数据的异常标签。
- en: Now let’s start by tuning the `max_samples` parameter. We don’t really know
    where to start, so let’s begin with powers of two covering 256 and going up to
    4096\. Make sure to read the documentation to find out the ballpark you should
    start in when conducting your grid search. You don’t want to be so far off that
    movement in any direction doesn’t give you much gain.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们首先调整`max_samples`参数。我们不知道从哪里开始，所以让我们从覆盖256并向上到4096的2的幂开始。确保阅读文档以了解在进行网格搜索时应从哪个大致范围开始。你不想偏离太远，以至于任何方向的变化都不会给你带来很大的收益。
- en: Execute the code in Figure [4-27](#Fig27). It may take a bit of time.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 执行图[4-27](#Fig27)中的代码。可能需要一些时间。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig27_HTML.png)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![图4-27](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig27_HTML.png)'
- en: A set of program codes in Python. It performs the experimental search for max
    samples and fixes the n estimators to be quicker by calling the isolation forest,
    x, and y values.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 一组用Python编写的程序代码。它执行最大样本的实验搜索，并通过调用隔离森林、x和y值来固定n估计器以加快速度。
