  prefs: []
  type: TYPE_NORMAL
  zh: 一组 Python 程序代码显示了以下输出。行 1\. 精确度：0.974349839686498。行 2\. 召回率：0.9802867383512545。行
    3\. F 1 测量值：0.9773092728247273。
- en: Figure 4-37
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-37
- en: That is a pretty good performance on the training data. Let’s see if this same
    performance holds for the test data
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在训练数据上相当不错的性能。让我们看看这种相同的性能是否也适用于测试数据
- en: This is good performance, but the predictions are made on the data it trained
    on. All we know at this point is that the model can at least fit to the training
    data. But will it generalize to new samples? Figure [4-38](#Fig38) contains the
    code to predict on the test data.
  id: totrans-262
