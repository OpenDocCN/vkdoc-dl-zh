  type: TYPE_NORMAL
  zh: 在测试分割上F1分数大幅下降
- en: As we can see in Figure [4-65](#Fig65), the model most definitely overfit to
    the training data. Though its recall is perfect, its precision is terrible, indicating
    that the model went scorched earth and that the decision boundary is not optimal.
    More specifically, the decision boundary is such that it is allowing too many
    normal data points to cross to the wrong side of the boundary. This problem was
    not apparent in the training set, but it is in the test set.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [4-65](#Fig65) 所示，模型明显过度拟合了训练数据。尽管其召回率完美，但精确度极差，表明模型采取了极端策略，决策边界不是最优的。更具体地说，决策边界允许太多正常数据点穿过边界到错误的一侧。这个问题在训练集中并不明显，但在测试集中却很突出。
- en: 'This is fine and to be expected. We still have yet to employ hyperparameter
    tuning. In particular, the most important hyperparameters to tune are as follows:'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 这很正常，也是可以预料的。我们还没有使用超参数调整。特别是，需要调整的最重要超参数如下：
- en: '`gamma`: This parameter is used in the radial basis function (RBF) kernel function.
    It determines the radius of influence that points have on each other, with smaller
    gamma translating to larger radii. We want the radius of influence to be such
    that it is not overfitting but is generalized enough to reliably pick up anomalies
    in new data. This requires careful tuning of the gamma parameter. If gamma is
    too large, then the SVM will try and fit the training data more closely, which
    might lead to overfitting. This makes `gamma` an important parameter to tune.'
  id: totrans-444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`gamma`：此参数用于径向基函数（RBF）核函数。它决定了点对点之间的影响半径，较小的gamma对应较大的半径。我们希望影响半径足够大，以便不过度拟合，同时足够泛化，以便可靠地在新数据中检测到异常。这需要对gamma参数进行仔细调整。如果gamma太大，那么支持向量机（SVM）将尝试更紧密地拟合训练数据，这可能导致过度拟合。这使得`gamma`成为一个重要的调整参数。'
- en: '`nu`: This is an upper bound on the fraction of training errors allowed and
    a lower bound on the fraction of support vectors. It is a more sensitive hyperparameter
    than `gamma` and can influence the output behavior of the model quite a bit, so
    it is very important to tune this value according to your dataset. You may also
    need to retune this even if your training data size changes. A very small `nu`
    value places a stricter requirement on how many training errors are allowed, while
    a larger `nu` value allows for more training errors to slip through when training
    the model.'
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`nu`：这是允许的训练错误的分数上限和支撑向量的分数下限。它是一个比 `gamma` 更敏感的超参数，可以相当大地影响模型的输出行为，因此根据你的数据集调整这个值非常重要。即使你的训练数据大小发生变化，你也可能需要重新调整这个值。一个非常小的
    `nu` 值对允许的训练错误数量提出了更严格的要求，而较大的 `nu` 值在训练模型时允许更多的训练错误通过。'
- en: Hyperparameter Tuning
  id: totrans-446
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 超参数调整
