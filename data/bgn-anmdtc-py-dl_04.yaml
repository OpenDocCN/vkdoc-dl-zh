    forest, x, and y values, and returns the validation results.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 一组 Python 程序代码。它通过更窄的范围调整最大特征值，将 n 估计器固定以加快速度，使用隔离森林、x 和 y 值训练所有核心，并返回验证结果。
- en: Figure 4-34
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-34
- en: Trying a much narrower range of 0.55 to 0.70 with 0.01 intervals for `max_features`
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试 `max_features` 的 0.55 到 0.70 的更窄范围，以 0.01 间隔
- en: Once done, execute the code in Figure [4-28](#Fig28) again. You should see that
    0.55 through 0.61 are the same values of approximately 0.9722, after which the
    scores drop. Let’s just pick `max_features` = 0.55 and tune the final hyperparameter,
    `n_estimators`. The reason we chose `max_features` = 0.55 is just to pick the
    smallest hyperparameter setting that still netted us the most performance. There
    is a principle called Occam’s razor which, when applied to machine learning, is
    where performance being equal, picking the simpler machine learning model is likely
    to be better.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后，再次执行图 [4-28](#Fig28) 中的代码。你应该会看到 0.55 到 0.61 的值与大约 0.9722 的值相同，之后的分数下降。让我们就选择
    `max_features` = 0.55 并调整最终的超参数 `n_estimators`。我们选择 `max_features` = 0.55 的原因只是选择最小的超参数设置，同时仍然获得了最多的性能。有一个原则叫做奥卡姆剃刀，当应用于机器学习时，意味着性能相等，选择更简单的机器学习模型可能是更好的选择。
- en: This choice is consistent with the Occam’s razor principle, which, when applied
    to machine learning models with relatively equal performance, means that the simplest
    machine learning model is likely the best choice. Picking a smaller ratio of random
    features to isolate by and still getting the same performance means it might be
    better to keep things simpler and pick the lowest value of `max_features` given
    the best performance. It’s not a hard-and-fast rule, though.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这个选择与奥卡姆剃刀原则一致，当应用于性能相对相等的机器学习模型时，意味着最简单的机器学习模型可能是最佳选择。选择一个较小的随机特征比率以隔离，同时仍然获得相同性能，可能意味着最好是保持简单，并选择
    `max_features` 的最低值以获得最佳性能。但这并不是一个不可更改的规则。
