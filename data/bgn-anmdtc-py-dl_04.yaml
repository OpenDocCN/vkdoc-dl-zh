- en: Using the anomaly scores generated on the test data, and the logistic regression
    model trained to recognize anomalies given the training data, we make predictions
    and calculate metrics
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 使用在测试数据上生成的异常分数，以及用训练数据训练来识别异常的逻辑回归模型，我们进行预测并计算指标
- en: You should see output like that shown in Figure [4-39](#Fig39).
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到图 [4-39](#Fig39) 中所示的那种输出。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig39_HTML.png)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig39_HTML.png)'
- en: A set of program codes in Python displays the following output. Line 1\. Precision
    colon 0.9722703639514731\. Line 2\. Recall colon 0.9859402460456942\. Line 3\.
    F 1 Measure colon 0.9790575916230367.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 一组 Python 程序代码显示了以下输出。行 1\. 精确度：0.9722703639514731。行 2\. 召回率：0.9859402460456942。行
    3\. F 1 测量值：0.9790575916230367。
- en: Figure 4-39
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-39
- en: This is a very strong performance, as we got an F1-score of 0.979
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常强的性能，因为我们得到了 0.979 的 F1 分数
- en: 'This is great performance. While we are at it, let’s also check the `roc_auc_score`
    by running the following:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常好的性能。当我们在做这件事的时候，让我们也检查一下 `roc_auc_score`，通过运行以下代码：
- en: '[PRE0]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The output result should be a score of 0.9928\. With an AUC score that high,
    and an F1-measure of 0.979, we have a strong anomaly detector. We can also check
    the confusion matrix. Execute the code in Figure [4-40](#Fig40).
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 输出结果应该是一个 0.9928 的分数。有了这么高的 AUC 分数和 0.979 的 F1 测量值，我们有一个强大的异常检测器。我们还可以检查混淆矩阵。执行图
    [4-40](#Fig40) 中的代码。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig40_HTML.png)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig40_HTML.png)'
- en: A set of program codes in Python. It creates a confusion matrix by using the
    y test and predicted values and displays the matrix.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 一组 Python 程序代码。它通过使用测试和预测的 y 值创建混淆矩阵，并显示该矩阵。
- en: Figure 4-40
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-40
- en: Creating a confusion matrix and using scikit-learn’s built-in functionality
    to display it
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 创建混淆矩阵并使用 scikit-learn 内置功能显示它
- en: You should see something like Figure [4-41](#Fig41).
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该看到类似图 [4-41](#Fig41) 的内容。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig41_HTML.jpg)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig41_HTML.jpg)'
- en: A 2-cross-2 confusion matrix of the true label versus the predicted label. A
    scale of color gradients ranges from 0 to 80000\. Row 1 reads 92879 and 16\. Row
    2 reads 8 and 561\. Element 92879 is lightly shaded while the others are vivid.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 真实标签与预测标签的 2x2 混淆矩阵。颜色渐变的比例从 0 到 80000。第 1 行读取 92879 和 16。第 2 行读取 8 和 561。元素
    92879 轻微着色，而其他元素则鲜艳。
- en: Figure 4-41
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-41
- en: The results are quite good, with 8 false negatives out of 569 anomalies, and
    16 false positives out of almost 93,000 normal points
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 结果相当好，569 个异常中有 8 个假阴性，以及近 93,000 个正常点中有 16 个假阳性
- en: Hopefully, you now understand how to implement your own Isolation Forest algorithm
    using scikit-learn, tune it with a holdout-validation and grid search strategy,
    and use the discovered hyperparameter settings to create a solid anomaly detector.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您现在理解了如何使用 scikit-learn 实现自己的 Isolation Forest 算法，使用保留验证和网格搜索策略进行调整，并使用发现的超参数设置来创建一个可靠的异常检测器。
- en: The Isolation Forest model does have some pros and cons that you should consider
    before you use it in practice.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际使用之前，Isolation Forest 模型确实有一些优缺点，您应该考虑。
- en: '**Pros:**'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: '**优点：**'
- en: '**High-dimensional data**: The Isolation Forest can efficiently sample and
    handle high-dimensional data. The typical “curse of dimensionality” (higher dimension
    data requiring more data samples for models to learn the task) does not apply
    as strongly here and only lets the Isolation Forest isolate samples more easily.'
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高维数据**：Isolation Forest 可以高效地采样和处理高维数据。典型的“维度诅咒”（高维数据需要更多的数据样本以便模型学习任务）在这里并不那么强烈，并且只让
    Isolation Forest 更容易地隔离样本。'
- en: '**Scalability**: The Isolation Forest can scale up to much higher data sizes
    due to its efficient implementation.'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：由于高效的实现，Isolation Forest 可以扩展到更大的数据规模。'
- en: '**Anomaly scoring**: The Isolation Forest clearly gives you anomaly scores
    per sample, allowing you to interpret why a data point might be an anomaly vs.
    a normal data point as well as how strong of an anomaly a data point may be.'
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常评分**：Isolation Forest 明确地为每个样本提供异常评分，让您能够解释为什么一个数据点可能是异常数据点而不是正常数据点，以及数据点可能是一个多强的异常。'
- en: '**Cons:**'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: '**缺点：**'
- en: '**Sensitive to hyperparameters**: As you saw earlier, the model is very sensitive
    to what kind of hyperparameters you set. That being said, once tuned, the model
    gets up to par.'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对超参数敏感**：如您之前所见，模型对您设置的哪种超参数非常敏感。但话虽如此，一旦调整，模型就能达到标准。'
- en: '**Dense points**: When points are really close to each other, it may require
    more splits (and thus higher path lengths) to part the data. This higher path
    length may incorrectly imply that an anomaly that was difficult to separate is
    actually a normal point, when it is not.'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**密集点**：当点彼此非常接近时，可能需要更多的分割（因此路径长度更高）来分离数据。这种更高的路径长度可能会错误地暗示一个难以分离的异常实际上是一个正常点，而它并不是。'
- en: '**Imbalanced dataset**: The parameter `contamination` must be set to help the
    Isolation Forest understand how many anomalies to expect.'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不平衡数据集**：参数 `contamination` 必须设置以帮助 Isolation Forest 理解期望多少异常。'
- en: '**Interpretability**: Though the anomaly scores are provided, it is hard to
    understand how a point is decided to be an anomaly or a normal point because of
    how many trees there are in the forest, how many partitions they’ve had to make,
    and so on.'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**：尽管提供了异常评分，但由于森林中有多少树、它们必须进行多少分割等因素，很难理解一个点是如何被决定为异常点或正常点的。'
- en: All that being said, the Isolation Forest is a fantastic algorithm if you have
    large data sizes, high-dimensional data, and are willing to sit through the hyperparameter
    tuning process and carefully guide parameter selection.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，如果您有大量数据、高维数据，并且愿意坐下来进行超参数调整过程并仔细引导参数选择，Isolation Forest 是一个出色的算法。
- en: One-Class Support Vector Machine
  id: totrans-296
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一类支持向量机
- en: The **One Class Support Vector Machine (OC-SVM)** is a modified support vector
    machine model that is well-suited for novelty detection (an example of **semi-supervised
    anomaly detection**). The idea is that the model trains on normal data and is
    used to detect anomalies when new data is presented to it. While the OC-SVM might
    seem best suited to semi-supervised anomaly detection, since training on only
    one class means it’s still “partially labeled” when considering the entire dataset,
    it can also be used for unsupervised anomaly detection, where you pass all the
    data, get it to learn an optimal boundary, and predict anomalies that way by what
    lies outside the boundary.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: '**单类支持向量机（OC-SVM）**是一种修改过的支持向量机模型，非常适合新颖性检测（**半监督异常检测**的一个例子）。其思路是模型在正常数据上训练，并在新数据呈现时用于检测异常。虽然OC-SVM可能最适合半监督异常检测，因为只在一个类别上训练意味着在考虑整个数据集时它仍然是“部分标记”的，但它也可以用于无监督异常检测，其中你传递所有数据，让它学习一个最优边界，并通过边界之外的内容来预测异常。'
- en: We will perform semi-supervised anomaly detection on the same KDDCUP 1999 dataset
    used in the Isolation Forest example.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在与Isolation Forest示例中使用的相同KDDCUP 1999数据集上执行半监督异常检测。
- en: How Does OC-SVM Work?
  id: totrans-299
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: OC-SVM是如何工作的？
- en: Before we dive into the code, let’s explore what a support vector machine is,
    and what makes the OC-SVM different. First, let’s visualize some data on a 2D
    plane, as shown in Figure [4-42](#Fig42).
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入代码之前，让我们先了解一下什么是支持向量机，以及OC-SVM的独特之处。首先，让我们在二维平面上可视化一些数据，如图[4-42](#Fig42)所示。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig42_HTML.jpg)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig42_HTML.jpg)'
- en: A two-dimensional plane has two clusters of data points. The cluster near the
    origin is darkly shaded while the cluster at the right is lightly shaded.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 一个二维平面有两个数据点簇。靠近原点的簇被深色阴影覆盖，而右边的簇被浅色阴影覆盖。
- en: Figure 4-42
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-42
- en: Points in the 2D space that group up in two clusters
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 2D空间中成群的两簇点
- en: Our goal is to separate the data clumps into two different regions. We can do
    this by simply drawing a line between the two data clusters, as shown in Figure
    [4-43](#Fig43).
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目的是将数据簇分开成两个不同的区域。我们可以通过简单地在这两个数据簇之间画一条线来实现，如图[4-43](#Fig43)所示。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig43_HTML.jpg)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig43_HTML.jpg)'
- en: A two-dimensional plane has two clusters of data points. The cluster near the
    origin is darkly shaded while the cluster at the right is lightly shaded. A bright
    slanting arrow separates the clusters.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 一个二维平面有两个数据点簇。靠近原点的簇被深色阴影覆盖，而右边的簇被浅色阴影覆盖。一个明亮的斜箭头将簇分开。
- en: Figure 4-43
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-43
- en: Drawing a line to separate the data clusters into two regions
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制一条线将数据簇分为两个区域
- en: When you think about it, there are many ways to draw this line. From a modeling
    perspective, our goal is to generalize to new data, the distribution of which
    is similar but can be different to the training data. With the line drawn as appears
    in Figure [4-43](#Fig43), what happens if we get a point that’s still within its
    region of space but falls on the wrong side of the line?
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 当你这么想的时候，有很多种方法可以画出这条线。从建模的角度来看，我们的目标是推广到新的数据，其分布与训练数据相似，但可能不同。如图[4-43](#Fig43)中所示，如果我们得到一个仍然在其空间区域内但落在线错误一侧的点会发生什么？
- en: There is a better way to draw the line and understand it in terms of what are
    called **support vectors**. They are the whole reason why this model is called
    a support vector machine, and it’s because these support vectors are very influential
    in determining the decision boundary.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种更好的方法来绘制这条线，并从所谓的**支持向量**的角度来理解它。它们正是这个模型被称为支持向量机的原因，因为这些支持向量在确定决策边界方面具有非常大的影响力。
- en: Figure [4-44](#Fig44) depicts what support vectors look like, and what are they
    exactly? Refer to Figure [4-44](#Fig44).
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-44](#Fig44)展示了支持向量的样子，它们究竟是什么？请参考图[4-44](#Fig44)。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig44_HTML.jpg)'
  id: totrans-313
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig44_HTML.jpg)'
- en: A two-dimensional plane has two clusters of data points. The cluster near the
    origin is darkly shaded while the cluster at the right is lightly shaded. A bright
    slanting arrow separates the clusters with dashed boundaries on both sides creating
    a hyperplane.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 一个二维平面有两个数据点簇。靠近原点的簇被深色阴影覆盖，而右边的簇被浅色阴影覆盖。一个明亮的斜箭头将簇分开，两侧有虚线边界，形成一个超平面。
- en: Figure 4-44
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-44
- en: The same line except with support vectors plotted as well
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的线，但这次还绘制了支持向量
- en: A **support vector** is a vector parallel to the hyperplane (the line drawn
    in the middle) that acts as the decision boundary, containing a point that is
    closest to the hyperplane, and helps establish a margin for the decision boundary.
    The **hyperplane** is some kind of subspace that is one dimension less than the
    space it lives in. In the current example, the hyperplane is a line because there
    are only two dimensions. In 3D space, the hyperplane would be a plane. In four
    dimensions and beyond, it is just called a “hyperplane.”
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: '**支持向量**是与超平面（中间画出的线）平行的向量，充当决策边界，包含一个离超平面最近的点，并帮助建立决策边界的间隔。**超平面**是它所在空间中维度少一的一种子空间。在当前示例中，超平面是一条线，因为只有两个维度。在三维空间中，超平面将是一个平面。在四维及以上，它就被称为“超平面”。'
- en: As shown in Figure [4-44](#Fig44), some space exits between the hyperplane and
    the support vectors themselves. This is the **margin**, and it is a space that
    is kept for the sake of accommodating future data points that should belong in
    their correct regions but stray a bit too far from their distribution. The larger
    the margin, the more leeway you have in accommodating these straggler data points,
    allowing you to avoid misclassification.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [4-44](#Fig44) 所示，超平面和支持向量本身之间存在一些空间。这是**间隔**，是为了容纳未来数据点而保留的空间，这些数据点应该属于它们正确的区域，但偏离了它们的分布。间隔越大，你就有更多的余地来容纳这些散点数据，从而避免误分类。
- en: A more optimal hyperplane margin is shown in Figure [4-45](#Fig45).
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-45](#Fig45) 展示了一个更优的超平面间隔。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig45_HTML.jpg)'
  id: totrans-320
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig45_HTML.jpg)'
- en: A two-dimensional plane has two clusters of data points. The cluster near the
    origin is darkly shaded while the cluster at the right is lightly shaded. A bright
    arrow slanting towards the left separates the clusters with dashed boundaries
    on both sides creating a hyperplane.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 在二维平面上有两个数据点簇。靠近原点的簇用深色阴影表示，而右侧的簇用浅色阴影表示。一个向左倾斜的明亮箭头将簇分开，两侧用虚线边界创建超平面。
- en: Figure 4-45
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-45
- en: The same data distribution with a more optimal hyperplane and margin thanks
    to new support vectors
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 由于新的支持向量，具有更优超平面和间隔的相同数据分布
- en: With how the hyperplane is drawn, the points which their respective support
    vectors pass through are the closest to the hyperplane. This is a more optimal
    solution for a hyperplane since the margin for the hyperplane is much larger than
    in the previous example shown in Figure [4-44](#Fig44).
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 根据超平面的绘制方式，其各自支持向量通过的点离超平面最近。这是超平面的一个更优解，因为超平面的间隔比图 [4-44](#Fig44) 中先前示例中的间隔大得多。
- en: However, realistically, you will see data distributions that are more like the
    data distribution shown in Figure [4-46](#Fig46).
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在现实中，你将看到的数据分布更类似于图 [4-46](#Fig46) 中所示的数据分布。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig46_HTML.jpg)'
  id: totrans-326
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig46_HTML.jpg)'
- en: A two-dimensional plane has two clusters of data points. The cluster near the
    origin is darkly shaded with 2 light shades while the cluster at the right is
    lightly shaded with 2 dark shades. A bright arrow slanting towards the left separates
    the clusters.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 在二维平面上有两个数据点簇。靠近原点的簇用两种浅色调深色阴影表示，而右侧的簇用两种深色调浅色阴影表示。一个向左倾斜的明亮箭头将簇分开。
- en: Figure 4-46
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-46
- en: A more realistic, noisy data distribution
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 更真实、有噪声的数据分布
- en: As you can see, there are still two distinct regions where the supermajority
    of points belong to a certain class. However, some straggler points of the opposite
    class appear in each of these regions. In this case, the hyperplane drawn in Figure
    [4-46](#Fig46) is good because it generalizes to new data well. Figure [4-47](#Fig47)
    presents an alternative possible solution.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，仍然有两个明显的区域，其中绝大多数点属于某一类。然而，在这些区域中，每个区域都出现了来自对立类的一些散点。在这种情况下，图 [4-46](#Fig46)
    中画出的超平面是好的，因为它很好地推广到新的数据。图 [4-47](#Fig47) 展示了另一种可能的解决方案。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig47_HTML.jpg)'
  id: totrans-331
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig47_HTML.jpg)'
- en: A two-dimensional plane has two clusters of data points. The cluster near the
    origin is darkly shaded while the cluster at the right is lightly shaded. A bright
    zig-zag arrow towards the left separates the clusters separating the darkly shaded
    data points from the right cluster.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 一个二维平面有两个数据点簇。靠近原点的簇用深色阴影表示，而右侧的簇用浅色阴影表示。一个明亮的之字形箭头向左分开这两个簇，将深色阴影的数据点簇与右侧的簇分开。
- en: Figure 4-47
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-47
- en: Example of overfitting to the data
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 对数据过拟合的例子
- en: As you can see, we have massively overfit to the data. It has perfect classification
    performance on this training data, but when generalizing to new data, it will
    likely perform markedly worse.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们对数据进行了大规模的过拟合。它在训练数据上具有完美的分类性能，但当推广到新数据时，它可能会明显表现得更差。
- en: The reason the decision boundary is nonlinear here is because support vector
    machines can transform the data and map it into a different space. In this space,
    the data may be linearly separable, allowing for a hyperplane to be drawn in this
    new space. When mapped back to the original space, the decision boundary looks
    nonlinear.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 决策边界在这里是非线性的原因是因为支持向量机可以转换数据并将其映射到不同的空间。在这个空间中，数据可能是线性可分的，允许在这个新空间中绘制一个超平面。当映射回原始空间时，决策边界看起来是非线性的。
- en: Figure [4-48](#Fig48) shows an example of how the data distribution itself may
    not have a straightforward solution in the current space it exists in.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-48](#Fig48)展示了数据分布本身在当前空间中可能没有直接解决方案的例子。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig48_HTML.jpg)'
  id: totrans-338
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig48_HTML.jpg)'
- en: A two-dimensional plane has two clusters of data points in spherical formats.
    The darkly shaded cluster is at the center surrounded by the lightly shaded cluster.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 一个二维平面有两个数据点簇，以球形格式呈现。深色阴影的簇位于中心，周围是浅色阴影的簇。
- en: Figure 4-48
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-48
- en: Data distribution that still has clear regions of space where the same class
    exists within it, but it is not straightforward how to achieve that separation
    of regions with a linear model
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分布仍然有清晰的空间区域，其中同一类别的数据存在于其中，但用线性模型实现这种区域分离并不直接。
- en: We cannot draw a line through this data and achieve any good performance. This
    illustrates the point made earlier about mapping this data into a different space.
    Assume we used a mathematical function to transform the 2D (x, y) coordinates
    into 3D space. After applying this transformation, we would see something like
    Figure [4-49](#Fig49) in the new space.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 我们无法通过这条数据画线并实现任何良好的性能。这说明了之前提到的将数据映射到不同空间的观点。假设我们使用一个数学函数将2D（x，y）坐标转换到3D空间。应用这种转换后，我们会在新空间中看到类似图[4-49](#Fig49)的内容。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig49_HTML.jpg)'
  id: totrans-343
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig49_HTML.jpg)'
- en: A three-dimensional plane has two clusters of data points in the X plane. The
    darkly-shaded cluster is along the X Y plane and the light-shaded cluster is on
    the X Z plane.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 一个三维平面在X平面上有两个数据点簇。深色阴影的簇沿着X Y平面，浅色阴影的簇位于X Z平面上。
- en: Figure 4-49
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-49
- en: In this new space, we can see that the data is now linearly separable
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个新空间中，我们可以看到数据现在是线性可分的。
- en: Now, there is a clear separation between the two classes, and we can go ahead
    with separating the data points into two regions, as shown in Figure [4-50](#Fig50).
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，两个类别之间有明显的分离，我们可以继续将数据点分成两个区域，如图[4-50](#Fig50)所示。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig50_HTML.png)'
  id: totrans-348
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig50_HTML.png)'
- en: A three-dimensional plane has two clusters of data points in the X plane. The
    darkly-shaded cluster is along the X Y plane and the light-shaded cluster is on
    the X Z plane. A solid sheet plane separates the clusters.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 一个三维平面在X平面上有两个数据点簇。深色阴影的簇沿着X Y平面，浅色阴影的簇位于X Z平面上。一个实心平面将这两个簇分开。
- en: Figure 4-50
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-50
- en: We were able to plot a hyperplane to separate the two regions in this higher-dimensional
    space
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能够在这个高维空间中绘制一个超平面来分离两个区域。
- en: When we go back to the 2D space, our decision boundary looks like Figure [4-51](#Fig51).
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们回到二维空间时，我们的决策边界看起来像图[4-51](#Fig51)。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig51_HTML.jpg)'
  id: totrans-353
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig51_HTML.jpg)'
- en: A two-dimensional plane has two clusters of data points in spherical formats.
    The darkly shaded cluster is at the center, surrounded by a solid ring. The lightly
    shaded cluster surrounds the ring.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 一个二维平面上有两个以球形格式排列的数据点簇。深色阴影的簇位于中心，周围环绕着一个实心环。浅色阴影的簇环绕着这个环。
- en: Figure 4-51
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-51
- en: Going back to the original space, our originally linear decision boundary is
    now nonlinear
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 回到原始空间，我们原本的线性决策边界现在是非线性的
- en: What we just did was use a **kernel** to transform the data into another dimension
    where there is a clear distinction between the classes of data. This mapping of
    data is called a **kernel trick**. There are different types of kernels, including
    the **linear kernel** that we saw in the earlier examples. Other types of kernels
    include **polynomial kernels**, which map the data to some nth dimension using
    a polynomial function, and **exponential kernels**, which map the data according
    to an exponential function.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚才所做的是使用**核函数**将数据转换到另一个维度，在这个维度中，数据类别之间有明显的区分。这种数据映射称为**核技巧**。有不同类型的核，包括我们在早期示例中看到的**线性核**。其他类型的核包括**多项式核**，它使用多项式函数将数据映射到某个n维，以及**指数核**，它根据指数函数映射数据。
- en: Finally, the margin is the distance of separation between the closest data point
    from each class and the hyperplane. As discussed earlier, an **ideal margin**,
    or **max margin**, involves the maximum separation of support vectors from the
    hyperplane. A **bad margin** or **suboptimal margin** would have the hyperplane
    too close to one class or have the distance not be as far as it can be to the
    hyperplane for each point or support vector.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，边缘是每个类别的最近数据点到超平面的距离。如前所述，一个**理想边缘**或**最大边缘**涉及支持向量与超平面之间的最大分离。一个**不良边缘**或**次优边缘**会使超平面过于接近一个类别，或者每个点或支持向量到超平面的距离没有尽可能远。
- en: Now that you know how an SVM operates, what’s so different about the OC-SVM?
    Figure [4-52](#Fig52) illustrates the difference. The SVM and OC-SVM are quite
    similar but differ in terms of the exact task they perform.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经知道了SVM是如何工作的，OC-SVM有什么不同呢？图[4-52](#Fig52)展示了这种差异。SVM和OC-SVM非常相似，但在它们执行的确切任务上有所不同。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig52_HTML.jpg)'
  id: totrans-360
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig52_HTML.jpg)'
- en: A 2 D plane has two clusters of data points. The lightly shaded points are new
    normal observations. The grey-shaded points are training observations. A solid
    ring encloses the clusters. The darkly shaded data points of new anomalous observations
    are scattered randomly around the ring.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 一个二维平面有两个数据点簇。浅色阴影的点是新正常观察点。灰色阴影的点是训练观察点。一个实心环包围着这些簇。新异常观察点的深色数据点随机地散布在环周围。
- en: Figure 4-52
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-52
- en: An example of prediction task on an OC-SVM including the decision boundary
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: OC-SVM上的预测任务示例，包括决策边界
- en: The OC-SVM’s job is to find a hyperplane that maximally includes as many datapoints
    as possible on one side of it. There is a certain maximum training error that
    is set as a hyperparameter, so the hyperplane must accommodate as many datapoints
    on one side as possible while also adhering to the maximum training error allowed
    and intentionally forcing some points to lie on the other side of the hyperplane.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: OC-SVM的任务是找到一个超平面，尽可能多地包含其一侧尽可能多的数据点。设置了一个最大训练误差作为超参数，因此超平面必须尽可能多地包含一侧的数据点，同时也要遵守允许的最大训练误差，并故意将一些点放在超平面的另一侧。
- en: The trick is to find a balance between hyperparameters so that the OC-SVM maximally
    contains as many data points as possible while setting the decision boundary in
    a place where anomalies would clearly fall outside of it. As you will find out
    shortly, it is a very delicate balance to achieve.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 关键是找到一个超参数之间的平衡，使得OC-SVM尽可能包含尽可能多的数据点，同时将决策边界设置在异常值明显位于其外的位置。正如你很快就会发现的，这是一个非常微妙的平衡。
- en: As for the kernel, the OC-SVM commonly uses what is called a **radial basis
    function (RBF)**, which is a specific type of function mapping that allows the
    SVM to form nonlinear decision boundaries.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 至于核函数，OC-SVM通常使用所谓的**径向基函数（RBF**），这是一种特定的函数映射，允许SVM形成非线性决策边界。
- en: Anomaly Detection with OC-SVM
  id: totrans-367
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用OC-SVM进行异常检测
- en: 'Once again, we will be using the KDDCUP 1999 dataset. Follow along with the
    Jupyter notebook available at: [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%204%20Traditional%20Machine%20Learning%20Algorithms/chapter4_ocsvm.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%204%20Traditional%20Machine%20Learning%20Algorithms/chapter4_ocsvm.ipynb).'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们将使用KDDCUP 1999数据集。请按照以下Jupyter笔记本进行操作：[`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%204%20Traditional%20Machine%20Learning%20Algorithms/chapter4_ocsvm.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%204%20Traditional%20Machine%20Learning%20Algorithms/chapter4_ocsvm.ipynb)。
- en: Since we covered how to obtain the data in the “Isolation Forest” section, refer
    to that section if you need to redownload the data.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们在“隔离森林”部分已经介绍了如何获取数据，如果需要重新下载数据，请参考该部分。
- en: Let’s get right into it by executing the import statements, shown in Figure
    [4-53](#Fig53).
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过执行图[4-53](#Fig53)中所示的导入语句来直接进入正题。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig53_HTML.png)'
  id: totrans-371
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig53_HTML.png)'
- en: A set of program codes in Python. It imports n p, p d, p l t, train test split,
    Label Encoder, Standard Scaler, One Class S V M, precision score, recall score,
    f 1 score, confusion matrix, and Confusion Matrix Display.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它导入n p, p d, p l t, 训练测试分割，标签编码器，标准缩放器，单类SVM，精确度分数，召回率分数，f 1分数，混淆矩阵，以及混淆矩阵显示。
- en: Figure 4-53
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-53
- en: Import statements for the OC-SVM anomaly detection task
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: OC-SVM异常检测任务的导入语句
- en: Data Preparation
  id: totrans-375
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据准备
- en: As in the “Isolation Forest” section, to load the dataframe and define all the
    columns, execute the code shown in Figure [4-54](#Fig54).
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 如“隔离森林”部分所述，要加载数据框并定义所有列，请执行图[4-54](#Fig54)中所示的代码。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig54_HTML.png)'
  id: totrans-377
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig54_HTML.png)'
- en: A set of program codes in Python. It defines all the columns to load the data
    frame from the K D D C U P data file.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它定义了所有列，以从K D D C U P数据文件加载数据框。
- en: Figure 4-54
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-54
- en: Defining the columns for the KDDCUP dataset so we can import and reference them
    properly
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 定义KDDCUP数据集的列，以便我们可以正确导入和引用它们
- en: The next few steps are straightforward and repeat what we performed for the
    Isolation Forest. Execute the code in Figure [4-55](#Fig55).
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的几个步骤很简单，重复我们在“隔离森林”部分所做的工作。执行图[4-55](#Fig55)中的代码。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig55_HTML.png)'
  id: totrans-382
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig55_HTML.png)'
- en: A set of program codes in Python. It filters the h t t p attacks and labels
    the normal as 0 and others as 1, and it is treated as an anomaly.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它过滤了http攻击，并将正常情况标记为0，其他情况标记为1，并被视为异常。
- en: Figure 4-55
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-55
- en: Selecting only HTTP data and numerically encoding the label column
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 仅选择HTTP数据并对标签列进行数值编码
- en: Next, we’ll encode the categorical columns. We will also normalize our numerical
    columns. This is a *very important step* for SVMs as they are very sensitive to
    data scale! Execute the code shown in Figure [4-56](#Fig56).
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将对分类列进行编码。我们还将对数值列进行归一化。这对于SVM来说是一个*非常重要的步骤*，因为它们对数据规模非常敏感！请执行图[4-56](#Fig56)中所示的代码。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig56_HTML.png)'
  id: totrans-387
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig56_HTML.png)'
- en: A set of program codes in Python. It calls the data types for columns and encodes
    if the data type is the same as the object, or else the column is the same as
    the label, and encodes the map.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它调用列的数据类型，如果数据类型与对象相同，则进行编码，否则列与标签相同，并编码映射。
- en: Figure 4-56
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-56
- en: Applying LabelEncoder and StandardScalar where appropriate
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 在适当的位置应用LabelEncoder和StandardScalar
- en: Next, execute the code in Figure [4-57](#Fig57) to derive the training columns
    and create our training, testing, and validation splits.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，执行图[4-57](#Fig57)中的代码以推导出训练列并创建我们的训练、测试和验证分割。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig57_HTML.png)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig57_HTML.png)'
- en: A set of program codes in Python. It checks the variables with the highest correlation,
    that is the label, filters out the null entry or is not weakly correlated, conducts
    a train test split, additional split of the training dataset to create a validation
    split, and prints the shapes.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它检查最高相关性的变量，即标签，过滤掉空值或不是弱相关性的，进行训练测试分割，对训练数据集进行额外的分割以创建验证分割，并打印形状。
- en: Figure 4-57
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-57
- en: Creating the train-test-validation splits and printing the output shape
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 创建训练-测试-验证分割并打印输出形状
- en: Once you have executed Figure [4-57](#Fig57), you should see output like that
    shown earlier in Figure [4-18](#Fig18).
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 执行图 [4-57](#Fig57) 后，你应该会看到图 [4-18](#Fig18) 中之前显示的输出。
- en: Training
  id: totrans-397
  prefs:
  - PREF_H4
