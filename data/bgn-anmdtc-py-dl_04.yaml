- en: A set of program codes in Python. It runs the code by filtering out anything
    that has a null entry or is not weakly correlated.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它通过过滤掉任何包含空值或不是弱相关性的内容来运行代码。
- en: Figure 4-13
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-13
- en: Filtering out columns with null entries or no linear correlation. We also index
    t`rain_cols[:-1]` to remove label as its own correlation
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤掉包含空值或无线性相关性的列。我们还索引`t`rain_cols[:-1]`以移除标签作为其自身的相关性
- en: As a result of the correlation pruning, we have gone from 42 total columns to
    just 13, reducing the computational complexity of training our models as there’s
    much less data to ingest for the model. You should see output like that shown
    in Figure [4-14](#Fig14).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 由于相关性修剪，我们从42个总列减少到只有13个，从而降低了我们模型训练的计算复杂度，因为模型需要摄入的数据量大大减少。您应该看到图[4-14](#Fig14)中显示的输出。
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig14_HTML.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig14_HTML.png)'
- en: A set of program codes in Python. It reduces the computational complexity of
    the training models by reducing the correlational columns.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 一组Python程序代码。它通过减少相关列来降低训练模型的计算复杂度。
- en: Figure 4-14
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-14
- en: Output of running the code in Figure [4-13](#Fig13). These are the columns with
    at least a weak linear correlation with ‘label’
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 运行图[4-13](#Fig13)中的代码的输出。这些是与‘label’至少有弱线性相关性的列
- en: You can check the correlations for yourself by doing `label_corr[train_cols]`.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过执行`label_corr[train_cols]`来自己检查相关性。
