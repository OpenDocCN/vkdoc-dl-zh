    分数。
- en: We can try another round of hyperparameter tuning and see if a narrower range
    nets us more gains. Let’s search from 0.55 to 0.70 with a 0.01 interval. Run the
    code in Figure [4-34](#Fig34).
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以尝试另一轮超参数调整，看看更窄的范围是否能给我们带来更多收益。让我们以 0.55 到 0.70 的 0.01 间隔进行搜索。运行图 [4-34](#Fig34)
