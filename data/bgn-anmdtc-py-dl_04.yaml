- en: Once done, rerun Figure [4-28](#Fig28) to observe the results. It seems that
    `n_estimators` = 10 actually gives us the best F1-score, 0.9799, which is the
    strongest performance we have seen thus far. And so, with as little as ten estimators
    in the forest, the Isolation Forest is able to predict anomalies quite well on
    the validation set. Let’s keep all these hyperparameter settings, train on the
    training data, and evaluate on the test data and see what performance we get.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后，重新运行图 [4-28](#Fig28) 以观察结果。看起来 `n_estimators` = 10 实际上给我们带来了最佳的 F1 分数，0.9799，这是我们迄今为止看到的最强性能。因此，森林中仅有十个估计量，Isolation
    Forest 就能在验证集上很好地预测异常。让我们保留所有这些超参数设置，在训练数据上训练，并在测试数据上评估，看看我们得到什么样的性能。
- en: Evaluation and Summary
