- en: Once done, rerun the code in Figure [4-28](#Fig28). You should notice that the
    parameter setting of 950 had the best F1-score by far at 0.963\. We can keep going
    with the hyperparameter tuning or accept the values we are seeing. After some
    point, we will see diminishing gains, so keep that in mind in the future. From
    our results, it seems that the setting of 950 actually performed the best somehow,
    so we will use this setting as we go forward with tuning the other hyperparameters.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后，重新运行图[4-28](#Fig28)中的代码。你应该注意到参数设置950的F1分数迄今为止最高，达到了0.963。我们可以继续进行超参数调整，或者接受我们看到的值。在某个点上，我们将看到收益递减，所以记住这一点。从我们的结果来看，设置950实际上在某些方面表现最好，因此我们将使用这个设置来继续调整其他超参数。
- en: Next, we will tune `max_features`. Execute the code in Figure [4-33](#Fig33).
