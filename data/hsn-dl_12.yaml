- en: 12. Introduction to Generative Models
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 12. 生成模型简介
- en: Introduction
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: Since we have reached the end of our journey, let us contemplate what we were
    expecting when we started. The goal was to be able to develop models that can
    do image- and sequence-related tasks efficiently and effectively. We now know
    that DL models can help us classify images and text. Chapter [6](611710_1_En_6_Chapter.xhtml)
    to Chapter [10](611710_1_En_10_Chapter.xhtml) of this book focus on the convolutional
    and sequential models that help us accomplish such tasks. We also learned to develop
    models that can accomplish slightly complex tasks like next character generation
    and encoding of an image. Let us now focus on more complex tasks and explore the
    fundamentals of generative models. Generative models not only help us carry out
    supervised and unsupervised learning tasks, studied so far, but also help us generate
    new data from a particular distribution. One of the glaring examples of generative
    models is ChatGPT, which has disrupted the field. It is based on transformers.
    This chapter introduces transformers. But before diving into transformers, let
    us have a basic idea of Hopfield Networks and Boltzmann Machines.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经到达了旅程的终点，让我们思考一下我们开始时期待的是什么。目标是能够开发出能够高效有效地完成图像和序列相关任务的模型。我们现在知道，深度学习模型可以帮助我们分类图像和文本。本书的第[6](611710_1_En_6_Chapter.xhtml)章到第[10](611710_1_En_10_Chapter.xhtml)章专注于卷积和序列模型，这些模型帮助我们完成这些任务。我们还学会了开发能够完成稍微复杂一些的任务的模型，比如下一个字符生成和图像编码。现在让我们关注更复杂一些的任务，并探索生成模型的基本原理。生成模型不仅帮助我们执行迄今为止研究的监督学习和无监督学习任务，而且帮助我们从一个特定的分布中生成新的数据。生成模型的一个明显例子是ChatGPT，它颠覆了该领域。它是基于转换器的。本章介绍了转换器。但在深入探讨转换器之前，让我们先对霍普菲尔德网络和玻尔兹曼机有一个基本的了解。
- en: Hopfield Networks
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 霍普菲尔德网络
- en: If you hear the song “Turn! Turn! Turn!”, what comes to your mind? Perhaps The
    Byrds, the band, or Forrest Gump or the first eight verses of the third chapter
    of the biblical Book of Ecclesiastes? In your lifetime you must have heard a lot
    of songs. In spite of that, on hearing a few lines of a famous song, the whole
    song, the image associated with it, and the source come to your mind. Being a
    computer science student, what do you think goes in our brain that helps us associate
    the few lines with the complete description or perhaps the partial one? Is it
    the database of all the songs that is created in our mind followed by some type
    of search that associates a pattern with a particular song? Perhaps the answer
    is a no!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当你听到歌曲“Turn! Turn! Turn!”时，你脑海中会浮现什么？可能是乐队The Byrds，或者《阿甘正传》或者圣经《传道书》第三章的前八节？在你的生命中，你一定听过很多歌曲。尽管如此，当你听到一首著名歌曲的几行歌词时，整首歌、与之相关的图像和来源都会浮现在你的脑海中。作为一个计算机科学学生，你认为我们的大脑中有什么东西帮助我们将这些几行歌词与完整的描述或部分描述联系起来？是我们心中创建的所有歌曲数据库，随后进行某种类型的搜索，将一个模式与特定的歌曲关联起来吗？也许答案是否定的！
- en: These search strategies cannot work and produce answers in microseconds, so
    what exactly happens? The answer lies in the ability of a particular object to
    attain the state of minimum energy, that is, pure physics. The computational model
    that implements this strategy was given by John Hopfield in 1982\. His idea was
    based on the strategy followed by proteins to attain a stable structure, one that
    minimizes their energy. This model is referred to as the ***Hopfield Network***.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这些搜索策略无法在微秒内工作并产生答案，那么究竟发生了什么？答案在于特定物体达到最低能量状态的能力，即纯粹物理学。1982年，约翰·霍普菲尔德提出了实现这一策略的计算模型。他的想法基于蛋白质达到稳定结构时所遵循的策略，这种结构最小化了它们的能量。这个模型被称为***霍普菲尔德网络***。
- en: Assume that we store a pattern consisting of {*x*[1], *x*[2], *x*[3]. . *x*[*n*]}.
    Also, assume that each of these *x*[*i*]s can either be +1 or -1\. The interaction
    between them can be depicted by a graph having *x*[*i*]s as the vertices and *w*[*ij*]
    as the weight between patterns *x*[*i*] and *x*[*j*]. To keep things simple, let
    us assume that the graph so formed is a unidirectional graph. For example, consider
    the graph shown in Figure [12-1](#Fig1) having three vertices *x*[1], *x*[2],
    and *x*[3] and weights *w*[12], *w*[32], and *w*[31].
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们存储一个由{*x*[1]，*x*[2]，*x*[3]... *x*[*n*]}组成的模式。也假设这些*x*[i]s可以是+1或-1。它们之间的相互作用可以通过一个图来表示，其中*x*[i]s是顶点，*w*[ij]是模式*x*[i]和*x*[j]之间的权重。为了简化问题，让我们假设形成的图是一个单向图。例如，考虑图[12-1](#Fig1)中所示的三顶点*x*[1]，*x*[2]和*x*[3]以及权重*w*[12]，*w*[32]和*w*[31]。
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig1_HTML.jpg)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig1_HTML.jpg)'
- en: Figure 12-1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-1
- en: A Hopfield Network consisting of patterns *x*[1], *x*[2], *x*[3]
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 由模式 *x*[1]，*x*[2]，*x*[3] 组成的霍普菲尔德网络
- en: Note that, in this network, if *w*[*ij*] is greater than 0, then the connection
    between them is considered as exhibitory; likewise, if the weights between them
    are less than 0, then it is considered as inhibitory.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在这个网络中，如果 *w*[*ij*] 大于 0，则它们之间的连接被认为是兴奋性的；同样，如果它们之间的权重小于 0，则被认为是抑制性的。
- en: To begin with, let us consider only two patterns *x*[1] and *x*[2], both of
    which either can be +1 or -1\. Then Table [12-1](#Tab1) shows the sign of weights
    between them.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们考虑只有两种模式 *x*[1] 和 *x*[2]，它们都可以是 +1 或 -1。然后表 [12-1](#Tab1) 显示了它们之间权重的符号。
- en: Table 12-1
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 表 12-1
- en: Finding Weights When the Values of *x*[1]s Are Given
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当给定 *x*[1] 的值时寻找权重
- en: '| ***x***[**1**] | ***x***[**2**] | ***w***[**12**] |'
  id: totrans-14
  prefs: []
  type: TYPE_TB
  zh: '| ***x***[**1**] | ***x***[**2**] | ***w***[**12**] |'
- en: '| --- | --- | --- |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| +1 | +1 | >0 |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| +1 | +1 | >0 |'
- en: '| +1 | -1 | <0 |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| +1 | -1 | <0 |'
- en: '| -1 | +1 | <0 |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
  zh: '| -1 | +1 | <0 |'
- en: '| -1 | -1 | >0 |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
  zh: '| -1 | -1 | >0 |'
- en: 'This means that if both *x*[*i*] and *x*[*j*] have the same sign, then the
    weight is positive; else, the weight is negative. Does this remind of you anything?
    This is Hebb’s rule:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着如果 *x*[*i*] 和 *x*[*j*] 有相同的符号，则权重为正；否则，权重为负。这让你想起了什么？这是赫布规则：
- en: '*“Neurons that wire together fire together”*'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“神经元之间连接在一起就会一起放电”*'
- en: 'This leads us to a factor that is to be maximized if the whole configuration
    is to become stable, which is ∑*w*[*ij*]*x*[*i*]*x*[*j*]. This means that the
    following quantity needs to be minimized:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了一个因子，如果整个配置要变得稳定，则需要最大化这个因子，即 ∑*w*[*ij*]*x*[*i*]*x*[*j*]。这意味着以下数量需要最小化：
- en: '![$$ Energy=-\sum {w}_{ij}{x}_i{x}_j $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equa.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![能量公式](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equa.png)'
- en: This may be referred to as energy. The Hopfield Network aims to minimize this
    energy. In order to achieve a stable configuration on giving a particular pattern,
    we need to find out the values of *x*[*i*] and *x*[*j*] to make the configuration
    stable and the corresponding weights. For finding out the values of *x*[*i*]s
    and the weights, the following strategy may be applied (Figure [12-2](#Fig2)).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以被称为能量。霍普菲尔德网络旨在最小化这种能量。为了在给出特定模式时达到稳定的配置，我们需要找出 *x*[*i*] 和 *x*[*j*] 的值，以使配置稳定并得到相应的权重。为了找出
    *x*[*i*]s 和权重的值，可以应用以下策略（图 [12-2](#Fig2)）。
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig2_HTML.jpg)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig2_HTML.jpg)'
- en: Figure 12-2
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-2
- en: Finding the updated values of *x*[*i*]
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找 *x*[*i*] 的更新值
- en: 'Task 1: Finding the values of *x*[*i*]s'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 任务 1：寻找 *x*[*i*]s 的值
- en: Find *S*[*i*] =  ∑ *x*[*j*]*w*[*ij*]
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 求 *S*[*i*] = ∑ *x*[*j*]*w*[*ij*]
- en: If *S*[*i*] > 0 then set *x*[*i*] = 1; else, set *x*[*i*] =  − 1.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *S*[*i*] > 0 则将 *x*[*i*] 设置为 1；否则，设置为 -1。
- en: Repeat the process for all *x*[*i*]s, and continue repeating till a stable state
    is reached.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对所有 *x*[*i*]s 重复此过程，并继续重复，直到达到稳定状态。
- en: 'Task 2: Finding weights'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 任务 2：寻找权重
- en: For a given pattern *y*[*i*], set *w*[*ij*] = *y*[*i*]*y*[*j*].
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于给定的模式 *y*[*i*]，将 *w*[*ij*] 设置为 *y*[*i*]*y*[*j*]。
- en: As we need to minimize − ∑ *w*[*ij*]*y*[*i*]*y*[*j*] and the minimum value is
    attained at *w*[*ij*] = *y*[*i*]*y*[*j*]
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于我们需要最小化 − ∑ *w*[*ij*]*y*[*i*]*y*[*j*]，并且最小值在 *w*[*ij*] = *y*[*i*]*y*[*j*]
    时达到
- en: This way the new weights can be found. The readers interested in derivation
    may refer to the references given at the end of the chapter. Let us now have a
    look at a machine that can model binary data.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这样就可以找到新的权重。对推导感兴趣的读者可以参考章节末尾给出的参考文献。现在让我们看看一个可以模拟二进制数据的机器。
- en: Boltzmann Machines
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 霍普菲尔德机
- en: 'Assume that you are working in a control room of a factory and all the buttons
    there can only be in one of the two states: on or off (0 or 1). The control room’s
    configuration can be defined in terms of the state of each of these buttons. It
    is important to find out if the configuration is problematic, as something can
    seriously go wrong in such cases. Let us formally state the problem:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你在一个工厂的控制室工作，那里的所有按钮只能处于两种状态之一：开启或关闭（0 或 1）。控制室的配置可以用每个按钮的状态来定义。找出配置是否有问题很重要，因为在这些情况下可能会出现严重的问题。让我们正式陈述这个问题：
- en: Given a set of binary variables {*x*[1], *x*[2], …*x*[*m*]}, we need to find
    out if a vector of length m depicting the state of each of these variables presents
    a condition of anomaly.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一组二元变量 {*x*[1], *x*[2], …*x*[*m*]}，我们需要找出表示这些变量状态的长度为 m 的向量是否表示异常条件。
- en: So we need to develop a machine that is able to model the binary data. One of
    the ways of doing so is to use a Boltzmann Machine (BM). A Boltzmann Machine can
    model binary data [2]. Using this machine, we can find if a given vector belongs
    to a particular distribution. Likewise, if you develop a few such machines, you
    can, with the help of Bayes’ theorem, find if the vector came from a particular
    distribution. These machines, when modeled on a normal state, can also help us
    find out about unusual behavior.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要开发一个能够模拟二进制数据的机器。这样做的一种方法就是使用玻尔兹曼机（BM）。玻尔兹曼机可以模拟二进制数据 [2]。使用这台机器，我们可以找到给定向量是否属于特定分布。同样，如果你开发几个这样的机器，借助贝叶斯定理，你可以找到向量是否来自特定分布。这些机器在正常状态下建模时，也可以帮助我们找出异常行为。
- en: Let’s consider a scenario wherein we need to generate data from a binary distribution.
    To be able to do so, we need to find the latent variables, followed by developing
    a network with hidden states and visible states. We first use the prior distribution
    and choose the hidden states and then find the visible state from the conditional
    distribution. However, Boltzmann Machines do not work in this way. In these machines,
    the energy of the joint configuration is proportional to the probability P(v,
    h), where *v* is the visible state and *h* is the hidden state.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个场景，其中我们需要从二进制分布中生成数据。为了做到这一点，我们需要找到潜在变量，然后开发一个具有隐藏状态和可见状态的神经网络。我们首先使用先验分布并选择隐藏状态，然后从条件分布中找到可见状态。然而，玻尔兹曼机并不是这样工作的。在这些机器中，联合配置的能量与概率
    P(v, h) 成正比，其中 *v* 是可见状态，*h* 是隐藏状态。
- en: The probability of a visible state here is
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这里可见状态的概率是
- en: '![$$ P(v)={\sum}_hP(h)\times P\left(v/h\right) $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equb.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P(v)={\sum}_hP(h)\times P\left(v/h\right) $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equb.png)'
- en: As per Reference [[1](#CR1)], the energy*E*(*v*, *h*) is given by the formula
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 根据参考文献 [[1](#CR1)]，能量*E*(*v*, *h*)由以下公式给出
- en: '![$$ E\left(v,h\right)=-\left({\sum}_i{v}_i{b}_i+{\sum}_j{h}_j{b}_j+{\sum}_{i,j}{h}_i{h}_j{w}_{ij}+{\sum}_{i,j}{v}_i{v}_j{w}_{ij}+{\sum}_{i,j}{v}_i{h}_j{w}_{ij}\right)
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equc.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![$$ E\left(v,h\right)=-\left({\sum}_i{v}_i{b}_i+{\sum}_j{h}_j{b}_j+{\sum}_{i,j}{h}_i{h}_j{w}_{ij}+{\sum}_{i,j}{v}_i{v}_j{w}_{ij}+{\sum}_{i,j}{v}_i{h}_j{w}_{ij}\right)
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equc.png)'
- en: 'The value of *P*(*v*) can be calculated using the following formula:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '*P*(*v*)的值可以使用以下公式计算：'
- en: '![$$ P\left(v,h\right)={e}^{-E\left(v,h\right)}/{\sum}_{x,y}{e}^{-E\left(x,y\right)}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equd.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left(v,h\right)={e}^{-E\left(v,h\right)}/{\sum}_{x,y}{e}^{-E\left(x,y\right)}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equd.png)'
- en: 'And finally, *P*(*v*) can be calculated using the following formula:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，*P*(*v*)可以使用以下公式进行计算：
- en: '![$$ P(v)={\sum}_h{e}^{-E\left(v,h\right)}/{\sum}_{x,y}{e}^{-E\left(x,y\right)}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Eque.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P(v)={\sum}_h{e}^{-E\left(v,h\right)}/{\sum}_{x,y}{e}^{-E\left(x,y\right)}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Eque.png)'
- en: To understand how probability distribution of various visible states is derived
    in a Boltzmann Machine, consider the following example that follows.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解玻尔兹曼机中各种可见状态的概率分布是如何推导出来的，请考虑以下示例。
- en: In Figure [12-3](#Fig3) we have three hidden states and three visible states.
    The weight between h[1] and h[2] is 2; that between h[1] and v[1] is 3; that between
    h[2] and v[2] is -1; that between h[2] and h[3] is 1; and that between h[3] and
    v[3] is 2\. To find the probabilities of various states, the following steps must
    be followed.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [12-3](#Fig3) 中，我们有三个隐藏状态和三个可见状态。h[1] 和 h[2] 之间的权重是 2；h[1] 和 v[1] 之间的权重是
    3；h[2] 和 v[2] 之间的权重是 -1；h[2] 和 h[3] 之间的权重是 1；h[3] 和 v[3] 之间的权重是 2。为了找到各种状态的概率，必须遵循以下步骤。
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig3_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig3_HTML.jpg)'
- en: Figure 12-3
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-3
- en: An example of a Boltzmann Machine
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 玻尔兹曼机的一个例子
- en: 'Step 1: We enlist all possible permutations of binary variable (h[1] h[2] h[3]),
    which are eight values. Note that (v[1] v[2] v[3]) can also have eight values,
    and thus we have 64 combinations in total (Table [12-2](#Tab2)).'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：我们列出二进制变量 (h[1] h[2] h[3]) 的所有可能的排列，共有八个值。请注意，(v[1] v[2] v[3]) 也可以有八个值，因此我们总共有64种组合（表
    [12-2](#Tab2)）。
- en: Table 12-2
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 表 12-2
- en: Sum of the Possible Combinations for Visible and Hidden States
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 可见和隐藏状态的组合总和
- en: '| v[1] v[2] v[3] | h[1] h[2] h[3] |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| v[1] v[2] v[3] | h[1] h[2] h[3] |'
- en: '| --- | --- |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| 000 | 000 |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 000 | 000 |'
- en: '| 001 | 000 |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| 001 | 000 |'
- en: '| 010 | 000 |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 010 | 000 |'
- en: '| 011 | 000 |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 011 | 000 |'
- en: '| 100 | 000 |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| 100 | 000 |'
- en: '| 101 | 000 |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| 101 | 000 |'
- en: '| 110 | 000 |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| 110 | 000 |'
- en: '| 111 | 000 |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| 111 | 000 |'
- en: '| 000 | 001 |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| 000 | 001 |'
- en: '| … | … |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| … | … |'
- en: '| 111 | 111 |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '| 111 | 111 |'
- en: 'Step 2: This is followed by calculating E for each of the 64 combinations obtained.
    For instance, take the case when (v[1] v[2] v[3]) are (1 1 0) and (h[1] h[2] h[3])
    are (0 1 0), respectively.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：接下来，我们计算64种组合中每种组合的E。例如，考虑 (v[1] v[2] v[3]) 分别是 (1 1 0) 和 (h[1] h[2] h[3])
    分别是 (0 1 0) 的情况。
- en: Assume that the values of v[1], v[2], and v[3] are 1,1, and 0 and those of h[1],
    h[2], and h[3] are 0, 1, and 0.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 v[1]、v[2] 和 v[3] 的值分别是 1、1 和 0，而 h[1]、h[2] 和 h[3] 的值分别是 0、1 和 0。
- en: For the sake of simplicity, assume all the biases are 0 so ∑*w*[*i*]*b*[*i*]
    and ∑*h*[*k*]*b*[*k*] become 0\. Hence, we are left with ∑*v*[*i*]*h*[*k*]*w*[*ik*]
    and ∑*h*[*k*]*h*[*l*]*w*[*kl*]. Note that, visible states, that is, (v[1] v[2]
    v[3]), are not connected with each other (Figure [12-4](#Fig4)).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化，假设所有偏差都是0，因此 ∑*w*[*i*]*b*[*i*] 和 ∑*h*[*k*]*b*[*k*] 变为0。因此，我们只剩下 ∑*v*[*i*]*h*[*k*]*w*[*ik*]
    和 ∑*h*[*k*]*h*[*l*]*w*[*kl*]。请注意，可见状态，即 (v[1] v[2] v[3])，彼此之间没有连接（图 [12-4](#Fig4)）。
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig4_HTML.jpg)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig4_HTML.jpg)'
- en: Figure 12-4
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-4
- en: Boltzmann Machine along with the state inputs
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 玻尔兹曼机及其状态输入
- en: To calculate ∑*v*[*i*]*h*[*k*]*w*[*ik*] *and* ∑ *h*[*k*]*h*[*l*]*w*[*kl*], we
    get
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 要计算 ∑*v*[*i*]*h*[*k*]*w*[*ik*] 和 ∑ *h*[*k*]*h*[*l*]*w*[*kl*]，我们得到
- en: '![$$ ={v}_1{h}_1{w}_{11}+{v}_2{h}_2{w}_{22}+{v}_3{h}_3{w}_{33}+{h}_1{h}_2{w}_{12}+{h}_2{h}_3{w}_{23}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equf.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![$$ ={v}_1{h}_1{w}_{11}+{v}_2{h}_2{w}_{22}+{v}_3{h}_3{w}_{33}+{h}_1{h}_2{w}_{12}+{h}_2{h}_3{w}_{23}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equf.png)'
- en: = 0 + (-1) + 0 + 0+ 0
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: = 0 + (-1) + 0 + 0 + 0
- en: = -1
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: = -1
- en: Since -E = -1 so *e*^(−*E*) = *e*^(−1).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 -E = -1，所以 *e*^(−*E*) = *e*^(−1)。
- en: As another example, consider another case when (v[1] v[2] v[3]) are (1 1 1)
    and (h[1] h[2] h[3]) are (1 1 1), respectively. Assume that the values of v[1],
    v[2], and v[3] are 1,1, and 1 and those of h[1], h[2], and h[3] are 1, 1, and
    1.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 作为另一个例子，考虑另一种情况，当 (v[1] v[2] v[3]) 分别是 (1 1 1) 和 (h[1] h[2] h[3]) 分别是 (1 1 1)
    时。假设 v[1]、v[2] 和 v[3] 的值分别是 1、1 和 1，而 h[1]、h[2] 和 h[3] 的值分别是 1、1 和 1。
- en: On calculating ∑*v*[*i*]*h*[*k*]*w*[*ik*] *and* ∑ *h*[*k*]*h*[*l*]*w*[*kl*]
    , we get
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算 ∑*v*[*i*]*h*[*k*]*w*[*ik*] 和 ∑ *h*[*k*]*h*[*l*]*w*[*kl*] 时，我们得到
- en: '![$$ ={v}_1{h}_1{w}_{11}+{v}_2{h}_2{w}_{22}+{v}_3{h}_3{w}_{33}+{h}_1{h}_2{w}_{12}+{h}_2{h}_3{w}_{23}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equg.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![$$ ={v}_1{h}_1{w}_{11}+{v}_2{h}_2{w}_{22}+{v}_3{h}_3{w}_{33}+{h}_1{h}_2{w}_{12}+{h}_2{h}_3{w}_{23}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equg.png)'
- en: = 3 + (-1) + 2 + 2 + 1
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: = 3 + (-1) + 2 + 2 + 1
- en: = 7
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: = 7
- en: We now know -E = -7, so *e*^(−*E*) = *e*⁷.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在知道 -E = -7，所以 *e*^(−*E*) = *e*⁷。
- en: This way we can calculate the value of all *e*^(−*E*) for all the combinations
    mentioned above and find the sum. Now, we divide each *e*^(−*E*) with the sum
    calculated above to get the probability of each combination.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这样我们可以计算所有 *e*^(−*E*) 的值，对于上述所有组合，并找到总和。现在，我们将每个 *e*^(−*E*) 除以上述计算出的总和，以得到每个组合的概率。
- en: Now, consider a situation wherein you have a lot of visible and hidden states.
    In such cases enumerating all the possible combinations and then finding out the
    probability of all the visible states becomes computationally difficult. To handle
    this problem, Boltzmann Machines were proposed.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，考虑一个你有很多可见和隐藏状态的情况。在这种情况下，枚举所有可能的组合，然后找出所有可见状态的概率变得计算上很困难。为了处理这个问题，提出了玻尔兹曼机。
- en: Boltzmann Machines (BMs) and Restricted Boltzmann Machines (RBMs) are both types
    of stochastic Neural Networks, but they have significant differences in their
    structures and applications.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 玻尔兹曼机（BMs）和限制玻尔兹曼机（RBMs）都是随机神经网络的一种，但它们在结构和应用上存在显著差异。
- en: The Boltzmann Machines are fully connected networks. The Restricted Boltzmann
    Machine has a bipartite graph structure. The former are computationally demanding,
    whereas the learning in the latter is simple and is done through Contrastive Divergence
    (CD). The Boltzmann Machines are generally used for solving optimization problems,
    whereas the latter is used for feature learning and dimensionality reduction.
    The latter is practical and it is easy to train with larger datasets. Having seen
    the basis of Hopfield and Boltzmann machines, let us now move to transformers.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 霍尔兹曼机是完全连接的网络。受限的霍尔兹曼机具有二分图结构。前者计算量需求大，而后者的学习简单，通过对比散度（CD）完成。霍尔兹曼机通常用于解决优化问题，而后者用于特征学习和降维。后者实用，并且容易用更大的数据集进行训练。在了解了霍普菲尔德和霍尔兹曼机的基础之后，我们现在转向Transformer。
- en: A Gentle Introduction to Transformers
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Transformer的温和介绍
- en: This section is based on an original research paper called “Attention is all
    you need” by Vaswani et al. and its explanation on the New York University website
    by Chinmay Hegde.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 本节基于Vaswani等人撰写的原始研究论文“Attention is all you need”及其在纽约大学网站上的解释，由Chinmay Hegde撰写。
- en: The Large Language Models (LLMs) have become extremely popular for the past
    few years, particularly with the advent of ChatGPT. These models can perform various
    tasks like
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）在过去的几年里变得极其流行，尤其是随着ChatGPT的出现。这些模型可以执行各种任务，例如
- en: Summarization of text
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本摘要
- en: Generating new text
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成新文本
- en: Correcting the existing ones
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 修正现有的
- en: Translation (to some extent)
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 翻译（在一定程度上）
- en: In this book, we have already studied Recurrent Neural Networks (RNNs), which
    can deal with sequences. We have already seen applications like Sentiment Analysis,
    Named Entity Recognition, generating the next character, etc. using RNNs and their
    variants. However, RNNs do not perform well on tasks like language translation.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我们已经学习了循环神经网络（RNNs），它可以处理序列。我们已经看到了使用RNN及其变体进行情感分析、命名实体识别、生成下一个字符等应用。然而，RNN在语言翻译等任务上表现不佳。
- en: Assume that you aim to develop an application that converts English to Marathi.
    Your application takes an input sentence in English and generates a sentence in
    Marathi. For example, if the input sentence is
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你旨在开发一个将英语转换为马拉地语的应用程序。你的应用程序接受一个英语输入句子并生成一个马拉地语句子。例如，如果输入句子是
- en: “I eat rice”
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: “我吃米饭”
- en: then the output sentence should be
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 那么输出句子应该是
- en: “मी भातखातो”
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: “我吃米饭”
- en: 'Note that the second word in the source language is “eat,” whereas it is equivalent
    to the third position in the target sentence. This is called misalignment, and
    RNNs do not handle this problem gracefully. Likewise, consider another sentence:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，源语言中的第二个单词是“eat”，而在目标句子中它相当于第三个位置。这被称为错位，RNN无法优雅地处理这个问题。同样，考虑另一个句子：
- en: “I am a good boy”
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: “我是一个好男孩”
- en: then the corresponding sentence in Marathi will be
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 那么对应的马拉地语句子将是
- en: “मी चांगला मुलगा आहे”
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: “我是一个好男孩”
- en: Note that the sentence in the source language contains five words, whereas the
    target sentence has four words. In such cases, the number of words in the source
    language may not be the same as in the target language. In machine translation
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，源语言中的句子包含五个单词，而目标句子有四个单词。在这种情况下，源语言中的单词数量可能不等于目标语言中的单词数量。在机器翻译中
- en: The number of words in the source language may not be the same as in the target
    language for a particular sentence.
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 源语言中某个句子的单词数量可能不等于目标语言中的单词数量。
- en: There can be misalignment.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可能存在错位。
- en: To solve this problem, the following approaches can be employed. Instead of
    creating a word-level RNN, we can make a sentence-level RNN. However, this approach
    would not work well because, for a given combination of words, there can be many
    sentences, and the model might not understand the context and placement accurately.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，可以采用以下方法。我们不是创建一个词级RNN，而是创建一个句子级RNN。然而，这种方法可能不会很好地工作，因为对于给定的单词组合，可能有多个句子，模型可能无法准确理解上下文和位置。
- en: The second option is to create an encoder`–`decoder-type architecture, as explained
    in Chapter [9](611710_1_En_9_Chapter.xhtml) on RNN. Here, we will focus on another
    solution to this problem, which forms the basis of modern-day ChatGPT.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种选择是创建一个编码器-解码器类型的架构，如第[9](611710_1_En_9_Chapter.xhtml)章中解释的RNN。在这里，我们将关注另一种解决这个问题的方法，这是现代ChatGPT的基础。
- en: An Introduction to Self-Attention
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自注意力介绍
- en: Assume that we have a sentence(X) consisting of some words (x[i]) each having
    dimension (d). The output will be a sentence Y consisting of y[i], also a d-dimensional
    vector. The sentence contains the set *y*[1], *y*[2], *y*[3], …, *y*[*n*] such
    that
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个句子(X)，由一些单词(x[i])组成，每个单词的维度为(d)。输出将是一个句子Y，由y[i]组成，也是一个d维向量。该句子包含集合*y*[1]，*y*[2]，*y*[3]，…，*y*[*n*]，使得
- en: '![$$ {y}_i={\sum}_{j=1}^n{x}_j{w}_{ij} $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equh.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![ $ {y}_i={\sum}_{j=1}^n{x}_j{w}_{ij} $](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equh.png)'
- en: where w[ij] is the weight corresponding to i^(th) vector in the output and the
    j^(th) vector in the input. Also, w[ij] is row normalized. Here, the initial weights
    are chosen as
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 其中w[ij]是输出中第i个向量与输入中第j个向量对应的权重。此外，w[ij]是行归一化的。在这里，初始权重被选为
- en: '![$$ {w}_{ij}={x}_i^T\cdotp {x}_j $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equi.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![ $ {w}_{ij}={x}_i^T\cdotp {x}_j $](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equi.png)'
- en: 'and then we apply the softmax function to find W[ij]:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们应用softmax函数来找到W[ij]：
- en: '![$$ {W}_{ij}=\frac{e^{w_{ij}}}{\sum_{k=1}^n{e}^{w_{ik}}} $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equj.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![ $ {W}_{ij}=\frac{e^{w_{ij}}}{\sum_{k=1}^n{e}^{w_{ik}}} $](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equj.png)'
- en: 'In such models, a single input is generally mapped to a set of outputs. This
    model is capable of considering all the units of the input. Note that the embeddings
    of each word can be learned by some conventional method or a Neural Network. This
    model is capable of handling many of the issues stated above; however, some issues
    are still to be addressed (Figure [12-5](#Fig5)):'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在此类模型中，单个输入通常被映射到一组输出。该模型能够考虑输入的所有单元。请注意，每个单词的嵌入可以通过某种传统方法或神经网络学习。该模型能够处理上述许多问题；然而，还有一些问题需要解决（图[12-5](#Fig5)）：
- en: 'In such type of model, the system input, say x[i,] is multiplied with all the
    other vectors to build the sequence of weights:'
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在此类模型中，系统输入，例如x[i,]，与所有其他向量相乘以构建权重的序列：
- en: '![$$ {w}_{i1}={x}_i\cdotp {x}_1{w}_{i2}={x}_i\cdotp {x}_2\dots {w}_{ij}={x}_i\cdotp
    {x}_j $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equk.png)'
  id: totrans-121
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![ $ {w}_{i1}={x}_i\cdotp {x}_1{w}_{i2}={x}_i\cdotp {x}_2\dots {w}_{ij}={x}_i\cdotp
    {x}_j $](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equk.png)'
- en: This role is called “Query.”
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这个角色被称为“查询”。
- en: It is then compared with every other point to get the weight of the output
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后将其与每个其他点进行比较以获得输出的权重
- en: '![$$ {w}_{ji}={x}_1^T\cdotp {x}_i $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equl.png)'
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![ $ {w}_{ji}={x}_1^T\cdotp {x}_i $](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equl.png)'
- en: '![$$ {w}_{ji}={x}_2^T\cdotp {x}_i\dots {w}_{ji}={x}_j^T\cdotp {x}_i $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equm.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![ $ {w}_{ji}={x}_2^T\cdotp {x}_i\dots {w}_{ji}={x}_j^T\cdotp {x}_i $](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equm.png)'
- en: used for finding y[i]. This role is called “Key.”
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 用于找到y[i]。这个角色被称为“键”。
- en: Then the outputs *y*[1], *y*[2], *y*[3], …, *y*[*n*] are synthesized. This role
    is called “Value.”
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后将输出*y*[1]，*y*[2]，*y*[3]，…，*y*[*n*]综合起来。这个角色被称为“值”。
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig5_HTML.jpg)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig5_HTML.jpg)'
- en: Figure 12-5
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-5
- en: Components of self-attention
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 自注意力的组成部分
- en: '![$$ {Q}_i={W}_q\times {X}_i{K}_i={W}_k\times {X}_i{V}_i={W}_v\times {X}_i{w}_{ij}=\frac{Q_i^T\times
    {K}_j}{\sqrt{d}}{W}_{ij}= Softmax\left({w}_{ij}\right)=\frac{e^{w_{ij}}}{\sum_{k=1}^n{e}^{w_{ik}}}{y}_i={\sum}_{j=1}^n{W}_{ij}\times
    {V}_j $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equn.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![ $ {Q}_i={W}_q\times {X}_i{K}_i={W}_k\times {X}_i{V}_i={W}_v\times {X}_i{w}_{ij}=\frac{Q_i^T\times
    {K}_j}{\sqrt{d}}{W}_{ij}= Softmax\left({w}_{ij}\right)=\frac{e^{w_{ij}}}{\sum_{k=1}^n{e}^{w_{ik}}}{y}_i={\sum}_{j=1}^n{W}_{ij}\times
    {V}_j $](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equn.png)'
- en: In addition to the above, we can also use multi-head self-attention. Interested
    readers may refer to the references given at the end of this chapter for understanding
    multi-head self-attention.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 除了上述内容，我们还可以使用多头自注意力。感兴趣的读者可以参考本章末尾提供的参考文献，以了解多头自注意力的相关知识。
- en: The Transformer
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Transformer
- en: A transformer consists of a self-attention block followed by a layer of normalization,
    then a Multi-layer Perceptron (MLP), and then another self-attention block as
    shown in Figure [12-6](#Fig6).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer由一个自注意力块、一个归一化层、一个多层感知器(MLP)和一个额外的自注意力块组成，如图[12-6](#Fig6)所示。
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig6_HTML.jpg)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig6_HTML.jpg)'
- en: Figure 12-6
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-6
- en: Transformer architecture
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer架构
- en: 'Transformers have many advantages:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer具有许多优点：
- en: We can easily club multiple transformers together.
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们可以轻松地将多个 Transformers 组合在一起。
- en: They use a fully feed-forward architecture for parallelization.
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们使用完全前馈架构进行并行化。
- en: They support standard backpropagation for training.
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们支持标准的反向传播进行训练。
- en: Transformers are highly scalable.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Transformers 具有高度的扩展性。
- en: They handle variable-length sequences efficiently.
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们高效地处理变长序列。
- en: Conclusion
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'This chapter covers three important models: Hopfield Networks, Boltzmann Machines,
    and the self-attention mechanism. These models are the basis of generative models
    and modern pattern recognition techniques. Each topic is introduced with examples.
    For the readers looking for a more in-depth information, references are provided
    at the end of the chapter. In addition to the above, it is worth noting that self-attention
    mechanisms and transformers are the technologies behind ChatGPT.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了三个重要的模型：Hopfield 网络、Boltzmann 机和自注意力机制。这些模型是生成模型和现代模式识别技术的基础。每个主题都通过示例进行介绍。对于寻求更深入信息的读者，章节末尾提供了参考文献。除了上述内容，值得注意的是，自注意力机制和
    Transformers 是 ChatGPT 背后的技术。
- en: Exercise
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: Multiple-Choice Questions
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多项选择题
- en: What is the most important structural difference between Boltzmann Machines
    (BMs) and Restricted Boltzmann Machines (RBMs)?
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Boltzmann 机（BMs）和受限 Boltzmann 机（RBMs）之间最重要的结构差异是什么？
- en: BMs have connections only between visible and hidden layers, while RBMs are
    fully connected.
  id: totrans-149
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Boltzmann 机只在可见层和隐藏层之间有连接，而 RBM 是完全连接的。
- en: BMs are fully connected, while RBMs have connections only between visible and
    hidden layers.
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Boltzmann 机是完全连接的，而 RBM 只有在可见层和隐藏层之间有连接。
- en: BMs have no hidden layers, while RBMs have hidden layers.
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Boltzmann 机没有隐藏层，而 RBM 有隐藏层。
- en: BMs use supervised learning, while RBMs use unsupervised learning.
  id: totrans-152
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Boltzmann 机使用监督学习，而 RBM 使用无监督学习。
- en: Which learning algorithm is commonly used to train Restricted Boltzmann Machines
    (RBMs)?
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 常用于训练受限 Boltzmann 机（RBMs）的学习算法是什么？
- en: Stochastic gradient descent
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随机梯度下降
- en: Backpropagation
  id: totrans-155
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反向传播
- en: Contrastive Divergence
  id: totrans-156
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对比散度
- en: Gradient Boosting
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 梯度提升
- en: In terms of complexity and training, how do Boltzmann Machines (BMs) compare
    with Restricted Boltzmann Machines (RBMs)?
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在复杂性和训练方面，Boltzmann 机（BMs）与受限 Boltzmann 机（RBMs）如何比较？
- en: BMs are simpler and faster to train compared with RBMs.
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与 RBM 相比，Boltzmann 机更简单且更容易训练。
- en: BMs and RBMs have the same complexity and training speed.
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Boltzmann 机和 RBM 具有相同的复杂性和训练速度。
- en: BMs are more complex and harder to train compared with RBMs.
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与 RBM 相比，Boltzmann 机更复杂且更难训练。
- en: RBMs are more complex and harder to train compared with BMs.
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与 Boltzmann 机相比，RBMs 更复杂且更难训练。
- en: Which of the following is a common application of Restricted Boltzmann Machines
    (RBMs)?
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪项是受限 Boltzmann 机（RBMs）的常见应用？
- en: Solving optimization problems
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决优化问题
- en: Feature learning and dimensionality reduction
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 特征学习和降维
- en: Image classification
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分类
- en: Natural language processing
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自然语言处理
- en: What type of network is a Hopfield Network?
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Hopfield 网络是哪种类型的网络？
- en: Feed-Forward Neural Network
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前馈神经网络
- en: Recurrent Neural Network
  id: totrans-170
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 循环神经网络
- en: Convolutional Neural Network
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 卷积神经网络
- en: Generative Adversarial Network
  id: totrans-172
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成对抗网络
- en: In a Hopfield Network, what kind of values do the neurons typically hold?
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Hopfield 网络中，神经元通常持有哪种类型的值？
- en: Continuous values between 0 and 1
  id: totrans-174
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 介于 0 和 1 之间的连续值
- en: Continuous values between -1 and 1
  id: totrans-175
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 介于 -1 和 1 之间的连续值
- en: Binary values (0 or 1)
  id: totrans-176
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 二进制值（0 或 1）
- en: Binary values (-1 or 1)
  id: totrans-177
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 二进制值（-1 或 1）
- en: What is a primary application of Hopfield Networks?
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Hopfield 网络的主要应用是什么？
- en: Supervised learning
  id: totrans-179
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 监督学习
- en: Image classification
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分类
- en: Pattern recognition and associative memory
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模式识别和关联记忆
- en: Natural language processing
  id: totrans-182
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自然语言处理
- en: Which of the following happens with the energy function of a Hopfield Network?
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪个是 Hopfield 网络的能量函数发生的情况？
- en: It increases as the network stabilizes.
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当网络稳定时，它增加。
- en: It decreases as the network stabilizes.
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当网络稳定时，它减少。
- en: It remains constant as the network stabilizes.
  id: totrans-186
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当网络稳定时，它保持不变。
- en: It is not defined for Hopfield Networks.
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 Hopfield 网络，这个定义是不适用的。
- en: What is the most important purpose of the self-attention mechanism in Neural
    Networks?
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在神经网络中，自注意力机制最重要的目的是什么？
- en: To reduce the dimensionality of the input data
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了降低输入数据的维度
- en: To allow the network to focus on different parts of the input sequence when
    processing each element
  id: totrans-190
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了使网络在处理每个元素时能够关注输入序列的不同部分
- en: To improve the computational efficiency of the network
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提高网络的计算效率
- en: To enable the network to perform unsupervised learning
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使网络能够执行无监督学习
- en: In the self-attention mechanism, what are the three main components that are
    derived from the input vectors?
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在自注意力机制中，从输入向量中派生出的三个主要组件是什么？
- en: Inputs, hidden states, and outputs
  id: totrans-194
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入、隐藏状态和输出
- en: Weights, biases, and activations
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 权重、偏置和激活
- en: Queries, keys, and values
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查询、键和值
- en: Layers, nodes, and edges
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 层、节点和边
- en: Theory
  id: totrans-198
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论
- en: Explain the terms key, value, and query vis-à-vis the self-attention mechanism.
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释与自注意力机制相关的术语键、值和查询。
- en: Explain how a Boltzmann Machine can be used to complete a given partial image.
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释如何使用玻尔兹曼机来完成给定的部分图像。
- en: Explain the idea of a Hopfield Network. Explain any three applications of such
    networks.
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释霍普菲尔德网络的理念。解释此类网络的三种应用。
- en: Explain the structure of transformers.
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释transformers的结构。
