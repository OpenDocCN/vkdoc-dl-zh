- en: '*For my mother Fang and my father Quinn*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '*献给我的母亲方女士和我的父亲奎恩先生*'
- en: Introduction
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Deep learning is almost universally regarded as falling under the field of computer
    science, with some intersections in statistics and mathematics broadly, like most
    computer science disciplines. Thus, upon first impression, it may be perceived
    to be a strict, exacting science – a rigid process of adjusting architectures
    and methods in a rote fashion to squeeze out a few more percentage points of accuracy
    on some dataset. While this is arguably a necessary component and period of deep
    learning’s trajectory of growth and development, if embraced too wholeheartedly,
    it becomes damaging. Such a perspective is lethal toward innovation in deep learning,
    for many – and, possibly, most – of the major advances in deep learning were and
    are not derived through a strict, rigorous scientific process of adjusting but
    rather through wild and free ideas.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习几乎普遍被认为是属于计算机科学领域，与统计学和数学有广泛的交叉，就像大多数计算机科学学科一样。因此，第一印象可能会觉得它是一门严格、精确的科学——一种机械地调整架构和方法的过程，以在某个数据集上挤出几个百分点的准确率。虽然这可能是深度学习增长和发展轨迹中一个必要的组成部分和时期，但如果过于全盘接受，就会造成损害。这种观点对深度学习的创新是致命的，因为许多——可能是大多数——深度学习的主要进步都不是通过严格的、严谨的科学过程调整得来的，而是通过狂野和自由的想法。
- en: Deep learning, as will be further explicated in this book, has always been somewhat
    of an experiment-first explanation-after field. That is, the success of a method
    is almost always explained in fuller detail after the method itself has been empirically
    observed to be successful. The method itself usually emerges from a hunch or intuition
    developed through a long series of experimentation and revision rather than a
    carefully constructed system in which a strong and rational explanation for a
    method’s success precedes its empirical success. This is not, of course, to suggest
    that to make strides in deep learning one must be *messy*; it is only to propose
    that deep learning is a study in a stage guided primarily by the spirit of freedom
    in thought and experimentation.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 正如本书将进一步阐述的，深度学习一直是一种实验先行、解释在后的领域。也就是说，一个方法的成功几乎总是在该方法本身被经验观察为成功之后以更详细的方式解释。该方法本身通常是从一系列实验和修订中发展出来的直觉或预感中产生的，而不是一个精心构建的系统，其中对方法成功的有力且合理的解释先于其实验成功。当然，这并不是说要在深度学习上取得进展就必须是“混乱”的；这只是为了提出深度学习是一种主要受思想自由和实验精神指导的阶段研究。
- en: Part of a different but seemingly more popular perspective of deep learning
    as rigid and more or less a continuation of the “find the best model” paradigm
    within machine learning, undoubtedly, arises from an immense focus on validation
    metrics that was spurred in the relatively early development of more advanced
    and powerful deep learning architectures and methods in the early to middle 2010s
    and the continuation of this spirit in popular deep learning competitions and
    competition platforms.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习作为不同但似乎更受欢迎的观点的一部分，即深度学习是刚性的，并且更多或更少地是机器学习“找到最佳模型”范式的延续，无疑源于对验证指标的大量关注，这种关注是在2010年代初到中期更高级和强大的深度学习架构和方法相对早期的发展中激发的，并且在流行的深度学习竞赛和竞赛平台上继续这种精神。
- en: Beyond this phase, though, deep learning is often presented in a way that encourages
    this problematic perspective. Books, courses, online articles, and other mediums
    explain deep learning through a series of concrete examples, packaging their primary
    value as lying within the implementation of said examples. Concrete examples are
    important and come at little cost in a digital-based field, which is likely why
    they have become so prized in the computer science context.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在这个阶段之后，深度学习往往以一种鼓励这种问题性观点的方式呈现。书籍、课程、在线文章和其他媒介通过一系列具体示例来解释深度学习，将它们的主要价值包装在所述示例的实施中。具体示例在基于数字的领域中非常重要，成本也很低，这可能是为什么它们在计算机科学领域变得如此珍贵。
- en: The trouble here is that the focus is often too narrowly placed upon specific
    examples rather than broader concepts. It is very much reflective of the “give
    a man a fish and you feed him for a day, teach him how to fish and you feed him
    for his lifetime” aphorism. Rather than feeding single fish to readers, teaching
    motion and freedom – the act of fishing for new ideas and applications – must
    be a key component in the presentation of deep learning. Examples and implementations
    that are shown should be anchor points that guide broader conceptual understandings
    rather than being the sole occupants of the reader’s understanding.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的问题是，关注点往往过于狭窄地放在具体示例上，而不是更广泛的概念上。这非常符合“给一个人一条鱼，你就能养活他一天，教他如何捕鱼，你就能养活他一生”的谚语。与其给读者提供单独的鱼，不如教授运动和自由——寻找新想法和应用的行为——必须是在深度学习展示中的关键组成部分。所展示的示例和实现应该是引导更广泛概念理解的锚点，而不是读者理解的唯一组成部分。
- en: Think of this in relation to the overfitting paradigm introduced early to machine
    learning practitioners. If a simple curve fitting model places too high a weight
    on passing through each point in its dataset, it models the data perfectly but
    fails to model the underlying phenomena – the *concept* – that the data represents.
    This is overfitting. The model is thus prone to difficulty generalizing the ideas
    that the data represents, failing to be useful in new applications and contexts.
    Many of the measures used in classical machine learning as well as deep learning
    seek to maximize the model’s performance with respect to modeling the *concepts*
    underlying the data rather than the data in and of itself. Likewise, the presentation
    of deep learning will inevitably be heavily tied to specific examples and developments,
    but should not consist *just* of these specific examples, for someone who has
    learned deep learning this way will likely have difficulty using deep learning
    in a context outside the narrow range that they learned those examples in. Moreover,
    they will find it challenging to innovate new ideas and approaches – a skill incredibly
    valuable in such a quickly evolving field.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 将这个问题与早期介绍给机器学习从业者的过拟合范式联系起来思考。如果一个简单的曲线拟合模型对其数据集中的每个点赋予过高的权重，那么它完美地模拟了数据，但未能模拟数据所代表的潜在现象——即*概念*。这就是过拟合。因此，该模型容易难以泛化数据所代表的思想，无法在新应用和环境中发挥作用。在经典机器学习和深度学习中使用的许多度量标准都试图最大化模型在模拟数据背后的*概念*方面的性能，而不是数据本身。同样，深度学习的介绍不可避免地会与特定例子和发展紧密相关，但不应该只包含这些特定例子，因为以这种方式学习深度学习的人可能会发现难以在比他们学习这些例子时更狭窄的范围内使用深度学习。此外，他们可能会发现创新新思想和方法的挑战——这是一项在如此快速发展的领域中极具价值的技能。
- en: The goal of this book is to take a step toward this concept-prioritizing vision
    of deep learning communication, to communicate the *ideas* of deep learning *design*,
    rather than to develop the reader’s knowledge of deep learning in a manner consisting
    only of specific architectures and methods with no understanding of how to generalize
    and find innovative freedom within deep learning.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书的目标是朝着优先考虑概念的深度学习沟通愿景迈出一步，传达深度学习*设计*的*思想*，而不是仅仅通过具体架构和方法来发展读者的深度学习知识，而不理解如何在深度学习中泛化和找到创新自由。
- en: 'Make no mistake – this goal does not mean that this book is lacking in examples
    or implementation. The first chapter, “A Deep Dive into Keras,” is dedicated entirely
    toward developing a deep understanding of Keras, the deep learning library we
    will use to realize concepts as implementations and applications. The remainder
    of the book is organized generally in an intuition/theory-first, implementation-second
    bipartite structure; the concept is introduced first with examples, analogy, and
    necessary instruments of theory and intuition, followed by a walk-through of code
    implementations and variations. Additionally, each of the six chapters following
    the first contains three case studies, each of which covers a deep learning paper
    from recent deep learning research in a perspective relevant to the chapter’s
    topic, some of which contain code walk-throughs. The objective of the case studies
    is multifold: to explore the diversity of topics explored in current deep learning
    research, to provide empirical evidence on the success of certain methods, and
    to provide examples of deep learning innovations that push the boundaries and
    correspondingly advance the field’s state.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要误解——这个目标并不意味着这本书缺乏例子或实现。第一章“深入Keras”完全致力于发展对Keras的深入理解，Keras是我们将用来实现概念为实现和应用深度学习库。本书的其余部分大致组织成一个直觉/理论优先，实现第二的二元结构；首先通过例子、类比和必要的理论工具和直觉介绍概念，然后是代码实现的概述。此外，随后的六个章节中的每一个都包含三个案例研究，每个案例研究都涵盖了一个与章节主题相关的最近深度学习研究中的深度学习论文，其中一些包含代码概述。案例研究的目标是多方面的：探索当前深度学习研究中探索的主题多样性，提供关于某些方法成功性的经验证据，并提供推动边界和相应推进该领域状态的深度学习创新示例。
- en: The six chapters following the first each cover an important set of concepts
    in modern deep learning. It is important to note that these chapters assume a
    basic knowledge of neural network operation (feed-forward, gradient descent, standard,
    and convolutional layers) and general machine learning principles. The chapters
    successively build upon these foundations to explore transfer learning and self-supervised
    learning in Chapter [2](516104_1_En_2_Chapter.xhtml), “Pretraining Strategies
    and Transfer Learning”; autoencoders in Chapter [3](516104_1_En_3_Chapter.xhtml),
    “The Versatility of Autoencoders”; model compression in Chapter [4](516104_1_En_4_Chapter.xhtml),
    “Model Compression for Practical Deployment”; Bayesian optimization and Neural
    Architecture Search in Chapter [5](516104_1_En_5_Chapter.xhtml), “Automating Model
    Design with Meta-optimization”; modern architecture design in Chapter [6](516104_1_En_6_Chapter.xhtml),
    “Successful Neural Network Architecture Design”; and problem-solving in Chapter
    [7](516104_1_En_7_Chapter.xhtml), “Reframing Difficult Deep Learning Problems.”
    Readers, especially those familiar with other deep learning resources, will find
    that these chapters contain many undiscussed topics in other books and tutorials,
    including self-supervised learning; model compression methods like pruning, quantization,
    and weight clustering; and Neural Architecture Search methods. Broadly, the book
    attempts a novel approach at communicating both core and boundary-pushing aspects
    of deep learning in a light that emphasizes intuition, variation, and generalization
    across concepts and methods.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一章节之后，接下来的六章每章都涵盖了现代深度学习中的重要概念集合。重要的是要注意，这些章节假设读者具备神经网络操作（前馈、梯度下降、标准层和卷积层）和一般机器学习原理的基本知识。这些章节依次在这些基础上构建，以探讨第[2](516104_1_En_2_Chapter.xhtml)章“预训练策略和迁移学习”中的迁移学习和自监督学习；第[3](516104_1_En_3_Chapter.xhtml)章“自编码器的多功能性”中的自编码器；第[4](516104_1_En_4_Chapter.xhtml)章“模型压缩以实现实际部署”中的模型压缩；第[5](516104_1_En_5_Chapter.xhtml)章“使用元优化自动化模型设计”中的贝叶斯优化和神经架构搜索；第[6](516104_1_En_6_Chapter.xhtml)章“成功的神经网络架构设计”中的现代架构设计；以及第[7](516104_1_En_7_Chapter.xhtml)章“重新审视困难的深度学习问题”中的问题解决。读者，尤其是那些熟悉其他深度学习资源的读者，会发现这些章节包含了其他书籍和教程中未讨论的许多主题，包括自监督学习；如剪枝、量化和权重聚类等模型压缩方法；以及神经架构搜索方法。总体而言，本书试图以强调直观性、概念和方法之间的变化和泛化的方式，新颖地传达深度学习的核心和前沿方面。
- en: The hope is that this book not only gives the reader a strong, deep understanding
    of the topics explored in each chapter but also intellectual freedom to propose
    and pursue new deep learning ideas addressing the great expanse of difficult problems
    we face today and will face tomorrow.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这本书不仅能给读者带来对每一章探讨主题的深入、全面的理解，还能赋予他们提出和追求新的深度学习想法的智力自由，这些想法旨在解决我们今天和明天面临的广阔而复杂的问题。
- en: Acknowledgments
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: This book could not have been developed and published without the direct and
    indirect help of so many. I want to express my thanks to Celestin Suresh John,
    who first made me aware of this opportunity; Aditee Mirashi, the coordinating
    editor who was always there to assist me and provide help to my countless inquiries;
    Jim Markham, the development editor, and Manohar Swamynathan, the technical reviewer,
    both of whom provided helping suggestions and comments in revision; and the editing
    team broadly that made writing this book such a wonderful experience. I also would
    like to thank the authors and coauthors of the over 20 deep learning papers used
    in this book as case studies for their cooperation and help.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 没有这么多直接和间接的帮助，这本书是无法开发和出版的。我要感谢Celestin Suresh John，是他首先让我意识到这个机会；Aditee Mirashi，这位协调编辑始终在那里协助我，并对我无数的询问提供帮助；Jim
    Markham，这位发展编辑，以及Manohar Swamynathan，这位技术审稿人，他们在修订过程中提供了有益的建议和评论；以及编辑团队，他们使撰写这本书成为一次美妙的经历。我还要感谢本书中用作案例研究的20多篇深度学习论文的作者和合著者，感谢他们的合作和帮助。
- en: Throughout writing the book, my family has always been there for me – my father
    Quinn, my mother Fang, and my brother Aiden. It was my father’s early work in
    neural networks and support that spurred much of my initial interest in deep learning,
    and my family has been incredibly welcoming of conversation and discussion on
    the subject and for emotional support more generally. I also want to appreciate
    Andy Wang, who has been my go-to person for deep learning ideas, chatting, and
    project collaboration, and my friends – Krishna, Mark, Ayush, and Vivek – for
    their unwavering support, friendship, and encouragement.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本书的过程中，我的家人始终支持着我——我的父亲Quinn，我的母亲Fang，以及我的兄弟Aiden。正是我父亲在神经网络和支持方面的早期工作激发了我对深度学习的最初兴趣，我的家人在讨论这一主题以及提供情感支持方面都表现得非常开放。我还想感谢Andy
    Wang，他一直是我在深度学习理念、聊天和项目合作方面的首选人选，以及我的朋友们——Krishna、Mark、Ayush和Vivek——他们给予了我坚定不移的支持、友谊和鼓励。
- en: Lastly, I would like to thank the Robinson Center – a truly wonderful accelerator
    for intellectual development – and the amazing faculty and staff there that exposed
    me to new and profound ideas and perspectives of thinking in my formative years.
    Their involvement, I believe, has made me an improved thinker and communicator
    of knowledge, technical and otherwise.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我想感谢Robinson中心——一个真正优秀的智力发展加速器——以及那里的出色教职员工，他们在我的成长岁月里向我展示了新的、深刻的思维方式和观点。我相信，他们的参与使我在知识和技术方面都成为了一个更好的思考者和知识传播者。
