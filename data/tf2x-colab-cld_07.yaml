  type: TYPE_PRE
  zh: '[PRE54]'
- en: Create the Input Pipeline
  id: totrans-240
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建输入管道
- en: Build the input pipeline by scaling images and slicing them into TensorFlow
    consumable pieces. Continue by shuffling (where appropriate), batching, and prefetching.
  id: totrans-241
  prefs: []
