  zh: 红色标题表示错误分类。
- en: Build a CNN with Keras Data
  id: totrans-225
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Keras数据构建CNN
- en: Although loading data as a TFDS is recommended, Keras is very popular in industry.
    So let’s build a model from *keras.datasets*.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然推荐以TFDS的形式加载数据，但Keras在工业界非常受欢迎。所以让我们从*keras.datasets*构建一个模型。
- en: 'Load train and test data:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 加载训练和测试数据：
- en: '[PRE50]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Verify data shapes:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 验证数据形状：
- en: '[PRE51]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Create class label names:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 创建类标签名称：
- en: '[PRE52]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
