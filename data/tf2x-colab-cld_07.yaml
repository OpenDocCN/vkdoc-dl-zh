  id: totrans-219
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建自定义函数
- en: Build a function to display results as shown in Listing [7-14](#PC49).
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 构建一个函数来显示结果，如列表[7-14](#PC49)所示。
- en: '[PRE48]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: 'Invoke the function:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE49]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Titles in red indicate misclassifications.
  id: totrans-224
  prefs: []
