  type: TYPE_NORMAL
  zh: scikit-learn的*load_sample_image*方法允许我们使用两个彩色图像进行练习 - *china.jpg*和*flower.jpg*。该方法加载单个样本图像的numpy数组，并将其作为高度、宽度和颜色组成的3D
    numpy数组返回。
