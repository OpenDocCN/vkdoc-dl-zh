  id: totrans-187
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Through experimentation, we found that the *Nadam* optimizer performed the
    best:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实验，我们发现*Nadam*优化器表现最佳：
- en: '[PRE37]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Train the Model
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Train the model for ten epochs:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型10个周期：
- en: '[PRE38]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Although our model is not state of the art, we do much better than we did with
    a feedforward net.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们的模型不是最先进的，但比使用前馈网络要好得多。
- en: Generalize on Test Data
  id: totrans-194
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在测试数据上归纳
- en: 'Generalize:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 归纳：
- en: '[PRE39]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Visualize Training Performance
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化训练性能
- en: Listing [7-11](#PC41) visualizes training.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[7-11](#PC41)可视化训练。
- en: '[PRE40]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Predict Labels for Test Images
  id: totrans-200
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测测试图像的标签
- en: 'Predict on *test_cf* data:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在*test_cf*数据上预测：
- en: '[PRE41]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Wrap the *predict* method with the *argmax* method to get predicted labels directly
    rather than generating probability arrays.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 将*predict*方法与*argmax*方法包装起来，以直接获取预测标签而不是生成概率数组。
- en: 'Get predictions by class number:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 通过类别编号获取预测：
- en: '[PRE42]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Get predictions by label:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 通过标签获取预测：
- en: '[PRE43]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Get the first five predictions:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 获取前五个预测：
- en: '[PRE44]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: 'Convert label numbers to label names:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 将标签数字转换为标签名称：
- en: '[PRE45]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Get the first five actual labels as shown in Listing [7-12](#PC47).
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[7-12](#PC47)所示，获取前五个实际标签。
- en: '[PRE46]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Get the first batch of images. Since we set batch size at 128, we get the first
    128 images. Slice the first five images from the batch. Convert to label names.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 获取第一批图像。由于我们设置了批大小为128，我们得到前128个图像。从批中切出前五个图像。转换为标签名称。
- en: Compare *pred_labels* to *actual_labels* to get an idea of prediction performance.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 将*pred_labels*与*actual_labels*比较，以了解预测性能。
- en: Build a Prediction Plot
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
