- en: CNN Architecture
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CNN 架构
- en: Like a feedforward neural network, a CNN consists of multiple layers. However,
    the convolutional layer and pooling layer make it unique. Like other neural networks,
    it also has a ReLU (rectified linear unit) layer and a fully connected layer.
    The ReLU layer in *any* neural net acts as an activation function ensuring nonlinearity
    as the data moves through each layer of the network. Without ReLU activation,
    the data being fed into each layer would lose the dimensionality that we want
    it to maintain. That is, we would lose the integrity of the original data as it
    moves through the network. The fully connected layer allows a CNN to perform classification
    on the data.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 与前馈神经网络一样，CNN 由多个层组成。然而，卷积层和池化层使其独特。像其他神经网络一样，它也有一个 ReLU（修正线性单元）层和一个全连接层。任何神经网络中的
    ReLU 层都充当激活函数，确保数据通过网络的每一层时保持非线性。如果没有 ReLU 激活，输入到每一层的数据将失去我们希望其保持的维度。也就是说，当数据通过网络时，我们将失去原始数据的完整性。全连接层允许
    CNN 对数据进行分类。
- en: As noted earlier, the most important building block of a CNN is the convolutional
    layer. Neurons in the first convolutional layer are connected to every single
    pixel in the input image, but only to pixels in their receptive fields, that is,
    only to pixels close to them. A convolutional layer works by placing a filter
    (or convolutional kernel) over an array of image pixels. The filtering process
    creates a *convolved feature map*, which is the output of a convolutional layer.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，卷积神经网络（CNN）最重要的构建块是卷积层。第一层的神经元与输入图像中的每个像素相连，但仅限于它们的感觉域，即仅限于它们附近的像素。卷积层通过在图像像素数组上放置一个滤波器（或卷积核）来工作。滤波过程创建了一个*卷积特征图*，这是卷积层的输出。
- en: A *feature map* is created by projecting input features from our data to hidden
    units to form new features to feed to the next layer. A *hidden unit* corresponds
    to the output of a single filter at a single particular x/y offset in the input
    volume. Simply, a hidden unit is the value at a particular x,y,z coordinate in
    the output volume.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '*特征图*是通过将输入特征投影到隐藏单元以形成新特征并馈送到下一层而创建的。*隐藏单元*对应于输入体积中单个特定x/y偏移处的单个滤波器的输出。简单地说，隐藏单元是输出体积中特定x,y,z坐标的值。'
- en: Once we have a convolved feature map, we move to the pooling layer. The *pooling
    layer* subsamples a particular feature map. Subsampling shrinks the size of the
    input image to reduce computational load, memory usage, and the number of parameters.
    Reducing the number of parameters that the network needs to process also limits
    the risk of overfitting. The output of the pooling layer is a *pooled feature
    map*.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了卷积特征图，我们就转向池化层。*池化层*对特定特征图进行子采样。子采样缩小了输入图像的大小，以减少计算负载、内存使用和参数数量。减少网络需要处理的参数数量也限制了过拟合的风险。池化层的输出是一个*池化特征图*。
- en: We can pool feature maps in two ways. *Max pooling* takes the maximum input
    of a particular convolved feature map. *Average pooling* takes the average input
    of a particular convolved feature map.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过两种方式对特征图进行池化。*最大池化*取特定卷积特征图的最大输入。*平均池化*取特定卷积特征图的平均输入。
- en: The process of creating pooled feature maps results in feature extraction that
    enables the network to build up a picture of the image data. With a picture of
    the image data, the network moves into the fully connected layer to perform classification.
    As we did with feedforward nets, we flatten the data for consumption by the fully
    connected layer because it can only process linear data.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 创建池化特征图的过程导致特征提取，这使得网络能够构建图像数据的图像。有了图像数据的图像，网络进入全连接层进行分类。正如我们在前馈网络中所做的那样，我们展平数据以便全连接层消费，因为它只能处理线性数据。
- en: Conceptually, a CNN is pretty complex as you can tell from our discussion. But
    implementing a CNN in TensorFlow is pretty straightforward. Each input image is
    typically represented as a 3D tensor of shape *height*, *width*, and *channels*.
    When classifying a 3D color image, we feed CNN image data in three channels, namely,
    *red*, *green*, and *blue*. Color images are typically referred to as *RGB* images.
    A batch (e.g., mini-batch) is represented as a 4D tensor of shape *batch size*,
    *height*, *width*, and *channels*.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们的讨论中可以看出，从概念上讲，CNN相当复杂。但在TensorFlow中实现CNN相当直接。每个输入图像通常表示为一个形状为*高度*、*宽度*和*通道数*的3D张量。在分类3D彩色图像时，我们通过CNN图像数据的三通道，即*红色*、*绿色*和*蓝色*。彩色图像通常被称为*RGB*图像。一个批次（例如，小批量）表示为一个形状为*批次大小*、*高度*、*宽度*和*通道数*的4D张量。
