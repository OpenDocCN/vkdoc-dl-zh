  id: totrans-233
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建用于存储训练和测试样本的变量
- en: Create variables to hold train and test data as shown in Listing [7-15](#PC54).
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如列表[7-15](#PC54)所示的存储训练和测试数据的变量。
- en: '[PRE53]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Display Sample Images
  id: totrans-236
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示样本图像
- en: It’s always a good idea to display some images. In this case, we display 30
    images from the training dataset. Visualization allows us to verify that images
    and labels correspond. That is, a frog image is labeled as a frog and so on.
  id: totrans-237
  prefs: []
