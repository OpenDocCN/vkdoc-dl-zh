- en: Begin by taking 20 samples from the test set as shown in Listing [7-13](#PC48).
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，从测试集中取出20个样本，如列表[7-13](#PC48)所示。
- en: '[PRE47]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
