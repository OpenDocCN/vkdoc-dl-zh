- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Scaling worked because pixel intensity is between 0 and 1.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放成功，因为像素强度介于 0 和 1 之间。
- en: Display Scaled Images
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 显示缩放后的图片
- en: 'Plot scaled images:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制缩放后的图片：
- en: '[PRE4]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Scaling doesn’t impact the images, which makes sense because scaling modifies
    pixel intensity proportionally. That is, each pixel number is converted proportionally
    to a number between 0 and 1.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放不会影响图片，这是有道理的，因为缩放按比例修改像素强度。也就是说，每个像素值按比例转换为介于 0 和 1 之间的数值。
