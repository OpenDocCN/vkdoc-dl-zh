  prefs: []
  type: TYPE_IMG
  zh: '![../images/501128_1_En_7_Chapter/501128_1_En_7_Figa_HTML.jpg](../images/501128_1_En_7_Chapter/501128_1_En_7_Figa_HTML.jpg)![../images/501128_1_En_7_Chapter/501128_1_En_7_Figb_HTML.jpg](../images/501128_1_En_7_Chapter/501128_1_En_7_Figb_HTML.jpg)'
- en: Mount Google Drive
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 挂载 Google Drive
- en: 'Mount Colab to Google Drive:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 将 Colab 挂载到 Google Drive：
- en: '[PRE5]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Click the URL, choose a Google account, click *Allow*, copy the authorization
    code and paste it into Colab in the textbox *Enter your authorization code:*,
    and press the *Enter* key on your keyboard.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 点击 URL，选择一个 Google 账户，点击 *允许*，复制授权代码并将其粘贴到 Colab 中的文本框 *输入您的授权代码:*，然后按键盘上的 *Enter*
    键。
- en: Copy Images to Google Drive
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将图片复制到 Google Drive
- en: Before executing the code in this section, be sure that you have the *fish.jpg*
    and *happy_moon.jpg* images in the *Colab Notebooks* directory on your Google
    Drive!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在执行本节中的代码之前，请确保您在 Google Drive 的 *Colab 笔记本* 目录中已有 *fish.jpg* 和 *happy_moon.jpg*
    图片！
- en: Check your Google Drive account to verify the proper path. We saved the images
    to the Colab Notebooks directory, which is recommended. If you save them somewhere
    else, you must change the paths accordingly.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 检查您的 Google Drive 账户以验证正确的路径。我们已将图片保存到 Colab 笔记本目录中，这是推荐的。如果您将它们保存在其他地方，您必须相应地更改路径。
- en: Listing [7-3](#PC7) loads the images to the Colab environment, scales the images,
    and displays them.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [7-3](#PC7) 将图片加载到 Colab 环境中，缩放图片并显示它们。
- en: '[PRE6]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Verify that new images were scaled properly:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 确认新图片已正确缩放：
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: All is well so far.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止一切顺利。
- en: Check Image Shapes
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检查图片形状
- en: For machine learning applications, images must be of the *same* shape.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 对于机器学习应用，图片必须是 *相同* 的形状。
- en: 'Let’s explore image shapes:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索图片形状：
- en: '[PRE8]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Uh-oh! Shapes are not the same! What do we do?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀！形状不相同！我们该怎么办？
- en: Resize Images
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调整图片大小
- en: 'Let’s resize the fish and moon images to equalize shapes:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将鱼和月亮图片调整大小以使形状相等：
- en: '[PRE9]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Now, all four images have size of (427, 640, 3).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，所有四张图片的大小为 (427, 640, 3)。
- en: 'Plot the resized images:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制调整大小后的图片：
- en: '[PRE10]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Success! We resized the new images to correspond to the original ones.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 成功！我们已经将新图片的大小调整为与原始图片相匹配。
- en: Create a Batch of Images
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建图片批次
- en: 'Create a batch with all four images:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 创建包含所有四张图片的批次：
- en: '[PRE11]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Now, we have a batch of *four* 427 `×` 640 color images. RGB color is indicated
    by the 3 dimension.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们有一批 *四* 张 427 `×` 640 的彩色图片。RGB 颜色由 3 个维度表示。
- en: Create Filters
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建过滤器
- en: Let’s create two simple 7 `×` 7 filters. We want our first filter to have a
    vertical white line in the middle and our second to have a horizontal white line
    in the middle. *Filters* are used to extract features from images during the process
    of convolution. Typically, filters are referred to as *convolutional kernels*.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建两个简单的 7 `×` 7 过滤器。我们希望我们的第一个过滤器中间有一条垂直白线，而第二个过滤器中间有一条水平白线。*过滤器* 用于在卷积过程中从图像中提取特征。通常，过滤器被称为
    *卷积核*。
- en: 'Create the filters:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 创建过滤器：
- en: '[PRE12]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The *zeros* method returns a given shape and type filled with zeros. Since variable
    *ck* is filled with zeros, all of its pixels are black. Remember that pixel image
    values are integers that range from 0 (black) to 255 (white).
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '*zeros* 方法返回一个给定形状和类型且填充为零的数组。由于变量 *ck* 被填充为零，其所有像素都是黑色。记住，像素图像值是介于 0（黑色）到
    255（白色）之间的整数。'
- en: So *ck* is a 4D tensor that contains *two* 7 `×` 7 convolutional kernels with
    three channels. The filters must have three channels to match the color images
    in the batch of images we created.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，*ck* 是一个包含 *两个* 7 `×` 7 卷积核且具有三个通道的 4D 张量。过滤器必须具有三个通道，以匹配我们创建的图像批次的彩色图像。
- en: 'Add a vertical white line and horizontal white line:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 添加一条垂直白线和一条水平白线：
- en: '[PRE13]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The code changes the intensity of select pixels to get a vertical white line
    and a horizontal white line.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 代码将选定像素的强度改变以获得一条垂直的白线和一条水平的白线。
- en: Plot Convolutional Kernels
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 绘制卷积核
- en: Listing [7-4](#PC15) plots the two convolutional kernels we just created.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [7-4](#PC15) 绘制了我们刚刚创建的两个卷积核。
- en: '[PRE14]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We see that the vertical and horizontal white lines (or convolutional kernels)
    are in position. So we have successfully created two simple convolutional kernels.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到垂直和水平白线（或卷积核）处于正确的位置。因此，我们已经成功创建了两个简单的卷积核。
- en: Apply a 2D Convolutional Layer
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用 2D 卷积层
- en: 'Apply a 2D convolutional layer to the batch of images:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 将 2D 卷积层应用于图像批次：
- en: '[PRE15]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The *tf.nn.conv2d* method computes a 2D convolution given 4D input and convolutional
    kernel tensors. We set strides equal to *1*. A **stride** is the number of pixels
    we shift the convolutional kernels over the input matrix during training. With
    strides of 1, we move the convolutional kernels one pixel at a time. We set padding
    to *SAME*. **Padding** is the number of pixels added to an image when it is being
    processed by the CNN. For example, if padding is set to zero, every pixel value
    that is added will be of value zero. Padding set to SAME means that we use zero
    padding.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '*tf.nn.conv2d* 方法计算给定 4D 输入和卷积核张量的 2D 卷积。我们将步长设置为 *1*。**步长** 是我们在训练过程中将卷积核在输入矩阵上移动的像素数。步长为
    1 时，我们一次移动一个像素。我们将填充设置为 *SAME*。**填充** 是在 CNN 处理图像时添加到图像中的像素数。例如，如果填充设置为零，则添加的每个像素值都将为零。将填充设置为
    SAME 意味着我们将使用零填充。'
- en: After applying the convolutional layer, the variable *outputs* contains the
    feature maps based on our images. Since each convolutional kernel creates a feature
    map (and we have two convolutional kernels), each image has two feature maps.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用卷积层之后，变量 *outputs* 包含基于我们图像的特征图。由于每个卷积核创建一个特征图（并且我们有两个卷积核），每个图像都有两个特征图。
- en: Visualize Feature Maps
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可视化特征图
- en: Visualize the feature maps we just created as shown in Listing [7-5](#PC17).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [7-5](#PC17) 所示，可视化我们刚刚创建的特征图。
- en: '[PRE16]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Since we have two convolutional kernels and four images, the convolutional layer
    produces eight feature maps. Just multiply 2 by 4! So we have two feature maps
    for each image. Wow! With two simple convolutional kernels, we were able to extract
    excellent facsimiles of our batch of images by applying a single convolutional
    layer.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们有两个卷积核和四个图像，卷积层产生了八个特征图。只需将 2 乘以 4！因此，每个图像有两个特征图。哇！通过应用单个卷积层，我们能够使用两个简单的卷积核提取出我们图像批次的优秀复制品。
- en: CNN with Trainable Filters
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有可训练过滤器的 CNN
- en: We just *manually* defined two convolutional kernels. But, in a real CNN, we
    typically define convolutional kernels as trainable variables so the neural net
    can learn the convolutional kernels that work best.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚 *手动* 定义了两个卷积核。但在一个真实的 CNN 中，我们通常将卷积核定义为可训练变量，以便神经网络可以学习到最佳的卷积核。
- en: 'Create a simple model that lets the network decide the best convolutional kernels:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个简单的模型，让网络决定最佳的卷积核：
- en: '[PRE17]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: We create a *Conv2D* layer with 32 convolutional kernels. Each convolutional
    kernel is a 3 `×` 3 tensor indicated by *kernel_size*. We use strides of *1* both
    horizontally and vertically. Padding is *SAME*. Finally, we apply *relu* activation
    to the output.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建了一个带有32个卷积核的*Conv2D*层。每个卷积核是一个由*kernel_size*指定的3 `×` 3张量。我们在水平和垂直方向上使用步长*1*。填充为*SAME*。最后，我们对输出应用*relu*激活函数。
- en: Convolutional layers have quite a few hyperparameters including number of filters
    (or convolutional kernels), height and width of convolutional kernels, strides,
    padding type, and activation type. To get the best performance, we can tune the
    hyperparameters. But tuning is an advanced topic that we believe is not appropriate
    for an introductory book. Instead, we provide fundamental examples that you can
    practice to develop practical skills.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积层有相当多的超参数，包括过滤器数量（或卷积核）、卷积核的高度和宽度、步长、填充类型和激活类型。为了获得最佳性能，我们可以调整超参数。但调整是一个高级主题，我们认为它不适合入门书籍。相反，我们提供了一些基本示例，您可以练习以培养实际技能。
- en: Building a CNN
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建一个CNN
- en: Although a CNN is a sequential neural net, it does differ from a feedforward
    sequential neural net in two important ways. First, it has a convolutional base
    that is not fully connected. Second, it has a pooling layer to reduce the sample
    size of feature maps created by each convolutional layer. We still use a fully
    connected layer for classification.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然CNN是一个顺序神经网络，但它与前馈顺序神经网络在两个重要方面有所不同。首先，它有一个不是完全连接的卷积基。其次，它有一个池化层，用于减少每个卷积层创建的特征图样本大小。我们仍然使用全连接层进行分类。
- en: We begin this experiment by loading a dataset of color images. We continue by
    preparing the data for TensorFlow consumption. We then build and test a CNN model.
    The dataset we use is *cifar10*. We previously modeled this dataset with a feedforward
    model, but our results were horrible. So we want to show you how much better a
    CNN works with complex color images.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过加载彩色图像数据集开始这个实验。然后我们准备数据以供TensorFlow使用。然后我们构建并测试一个CNN模型。我们使用的数据集是*cifar10*。我们之前使用前馈模型建模了这个数据集，但我们的结果很糟糕。因此，我们想向您展示CNN在复杂彩色图像上的表现有多好。
- en: Load Data
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载数据
- en: 'The recommended way to load cifar10 is as a TFDS:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 加载cifar10的推荐方式是作为TFDS：
- en: '[PRE18]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Load train and test sets:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 加载训练集和测试集：
- en: '[PRE19]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Since we already have *info* from the train set, we don’t need it again for
    the test set.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经有训练集的*info*信息，因此不需要再次为测试集使用它。
- en: 'Verify tensors:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 验证张量：
- en: '[PRE20]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Train and test shapes are 32 `×` 32 `×` 3\. So each image is a 32 `×` 32 three-channel
    image. The *3* dimension informs the model that images are RGB color.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 训练集和测试集的形状为32 `×` 32 `×` 3。因此，每张图像是一个32 `×` 32的三通道图像。*3*维度通知模型图像是RGB颜色。
- en: Display Information About the Dataset
  id: totrans-125
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示数据集信息
- en: 'The *info* object displays information about the data:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '*info*对象显示有关数据的信息：'
- en: '[PRE21]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: We see the name, description, homepage, and shapes and datatypes of feature
    images and labels. We also see that the dataset has 60,000 images with train and
    test splits of 50,000 and 10,000, respectively.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到特征图像和标签的名称、描述、主页以及特征图像和标签的形状和数据类型。我们还看到该数据集有60,000张图像，训练集和测试集分别为50,000和10,000。
- en: Extract Class Labels
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提取类别标签
- en: 'Extract some useful information from the *info* object:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 从*info*对象中提取一些有用的信息：
- en: '[PRE22]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Display Samples
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示样本
- en: 'The *show_examples* method shows a few examples:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '*show_examples*方法显示几个示例：'
- en: '[PRE23]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Build a Custom Function to Display Samples
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建一个用于显示样本的自定义函数
- en: Listing [7-6](#PC25) is a function that displays samples.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[7-6](#PC25)是一个显示样本的函数。
- en: '[PRE24]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The function retrieves images and label names. It then displays the image with
    its label name and index. The index is the class label as a number.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数检索图像和标签名称。然后显示带有其标签名称和索引的图像。索引是作为数字的类别标签。
- en: 'Invoke the function:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 调用该函数：
- en: '[PRE25]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Change the color by adjusting *indx* between 0 and 5\. Change the number of
    samples displayed by adjusting *samples*. Peruse the following URL to learn more
    about colormaps: [`https://matplotlib.org/3.1.0/tutorials/colors/colormaps.html`](https://matplotlib.org/3.1.0/tutorials/colors/colormaps.html).'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 通过调整*indx*在0到5之间改变颜色。通过调整*samples*改变显示的样本数量。查看以下URL了解更多关于colormaps的信息：[`https://matplotlib.org/3.1.0/tutorials/colors/colormaps.html`](https://matplotlib.org/3.1.0/tutorials/colors/colormaps.html)。
- en: Build a Custom Function to Display a Grid of Examples
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建一个用于显示示例网格的自定义函数
- en: Begin by taking 30 examples from the train set as shown in Listing [7-7](#PC27).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 首先从训练集中选取30个示例，如列表[7-7](#PC27)所示。
- en: '[PRE26]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: To enable image plotting, we remove (or squeeze) the 3 dimension from the image
    matrix.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 为了启用图像绘制，我们从图像矩阵中移除（或压缩）3个维度。
- en: Build the function as shown in Listing [7-8](#PC28).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表 [7-8](#PC28) 所示构建函数。
- en: '[PRE27]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Invoke the function:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE28]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Voilà!
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 哇哦！
- en: Pinpoint Metadata
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确定元数据
- en: 'Leverage the info object to pinpoint metadata:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 利用info对象确定元数据：
- en: '[PRE29]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Build the Input Pipeline
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: Build the input pipeline as shown in Listing [7-9](#PC31).
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表 [7-9](#PC31) 所示构建输入管道。
- en: '[PRE30]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: We build the input pipeline by shuffling train data, batching, scaling, caching,
    and prefetching. We scale images by mapping with a lambda function. Adding the
    *cache* method increases performance on a TFDS because data is read and written
    only once rather than during each epoch. Adding the *prefetch* method is a good
    idea because it adds efficiency to the batching process. That is, while our training
    algorithm is working on one batch, TensorFlow is working on the dataset in parallel
    to get the next batch ready. So prefetch can dramatically improve training performance.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过打乱训练数据、分批、缩放、缓存和预取来构建输入管道。我们通过lambda函数映射来缩放图像。添加*cache*方法可以增加TFDS上的性能，因为数据只读一次而不是在每个epoch期间读取。添加*prefetch*方法是一个好主意，因为它增加了批处理过程的效率。也就是说，当我们的训练算法在一个批次上工作时，TensorFlow并行地在数据集上工作，以准备好下一个批次。因此，预取可以显著提高训练性能。
- en: 'Verify that train and test sets are created correctly:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 确认训练集和测试集已正确创建：
- en: '[PRE31]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Create the Model
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建模型
- en: Begin with a relatively robust CNN model because it is the only way to get decent
    performance from complex color images. Don’t be daunted by the number of layers!
    Remember that a CNN has a convolutional base and fully connected network. So we
    can think of a CNN in two parts. First, we build the convolutional base that includes
    one or more convolutional layers and pooling layers. Pooling layers are included
    to subsample the feature maps outputted from convolutional layers to reduce computational
    expense. Next, we build a fully connected layer for classification.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个相对稳健的CNN模型开始，因为这是从复杂彩色图像中获得良好性能的唯一方法。不要被层数吓倒！记住，CNN有一个卷积基础和全连接网络。因此，我们可以将CNN视为两部分。首先，我们构建卷积基础，包括一个或多个卷积层和池化层。池化层包括在内，以从卷积层输出的特征图中下采样，以减少计算开销。接下来，我们构建一个用于分类的全连接层。
- en: 'Create the model by following these steps:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤创建模型：
- en: Import libraries.
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入库。
- en: Clear previous models.
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清除之前的模型。
- en: Create the model.
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建模型。
- en: 'Import libraries:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE32]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Clear previous models and plant a seed:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 清除之前的模型并设置随机种子：
- en: '[PRE33]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Create the model as shown in Listing [7-10](#PC35).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表 [7-10](#PC35) 所示创建模型。
- en: '[PRE34]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The first layer is the convolutional base, which uses 32 convolutional kernels
    and kernel size of 3 `×` 3\. We use *relu* activation, *same* padding, and strides
    of *1*. We also set shape at 32 `×` 32 `×` 3 to match the 32 `×` 32-pixel images.
    Since images are in color, we include the 3 value at the end. Next, we include
    a max pooling layer of size 2 (so it divides each spatial dimension by a factor
    of 2) to subsample the feature maps from the first convolutional layer. We then
    repeat the same structure twice, but increase the number of convolutional kernels
    to 64\. It is common practice to double the number of convolutional kernels after
    each pooling layer.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层是卷积基础，它使用32个卷积核和3 `×` 3的核大小。我们使用*relu*激活、*same*填充和*1*步长。我们还设置形状为32 `×` 32
    `×` 3以匹配32 `×` 32像素的图像。由于图像是彩色的，我们在末尾包含3个值。接下来，我们包含一个大小为2的最大池化层（因此它将每个空间维度除以2），以从第一个卷积层中下采样特征图。然后我们重复相同的结构两次，但将卷积核的数量增加到64。在池化层之后加倍卷积核的数量是一种常见的做法。
- en: We continue with the fully connected network, which flattens its inputs because
    a dense network expects a 1D array of features for each instance. We need to add
    the fully connected layer to enable classification of our ten labels. We continue
    with a dense layer of 64 neurons. We add dropout to reduce overfitting. The final
    dense layer accepts ten inputs to match the number of labels. It uses *softmax*
    activation.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我们继续使用全连接网络，因为它将输入展平，因为密集网络期望每个实例的特征为1D数组。我们需要添加全连接层以实现对十个标签的分类。我们继续使用64个神经元的密集层。我们添加dropout以减少过拟合。最终的密集层接受十个输入以匹配标签数量。它使用*softmax*激活。
- en: Model Summary
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Inspect the model:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE35]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: '**Parameters** are the number of learnable weights during training. The convolutional
    layer is where the CNN begins to learn. But calculating parameters for a CNN is
    more complex than a feedforward network.'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '**参数**是训练期间可学习的权重数量。卷积层是CNN开始学习的地方。但计算CNN的参数比前馈网络更复杂。'
- en: The first layer is a convolutional layer with 32 neurons acting on the data.
    Filter size is 3 `×` 3\. So we have a 3 `×` 3 `×` 32 filter since our input has
    32 dimensions (or neurons) for a total of 288\. Multiply 288 `by` 3 to account
    for the 3D RGB color images for a total of 864\. Add 32 neurons at this layer
    to get a total of 896 parameters.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层是一个有32个神经元的卷积层，作用于数据。过滤器大小是3 `×` 3。因此，我们有一个3 `×` 3 `×` 32的过滤器，因为我们的输入有32个维度（或神经元），总共288个。将288
    `×` 3相乘以考虑3D RGB彩色图像，总共864个。在此层添加32个神经元，总共得到896个参数。
- en: There are no parameters to learn at the pooling layers. So we have 0 parameters.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 池化层没有可学习的参数。因此，我们有0个参数。
- en: The second convolutional layer has 64 neurons acting on the data. Filter size
    is 3 `×` 3\. So we have a 3 `×` 3 `×` 64 filter since we have 64 dimensions for
    a total of 576\. Multiply 32 neurons from the previous convolutional layer by
    576 to get a total of 18,432\. Add 64 neurons at this layer to get a total of
    18,496 parameters.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个卷积层有64个神经元作用于数据。过滤器大小是3 `×` 3。因此，我们有一个3 `×` 3 `×` 64的过滤器，因为我们有64个维度，总共576个。将前一个卷积层的32个神经元乘以576，总共得到18,432个。在此层添加64个神经元，总共得到18,496个参数。
- en: The third convolutional layer has 64 neurons acting on the data. Filter size
    is 3 `×` 3\. So we have a 3 `×` 3 `×` 64 filter since we have 64 dimensions for
    a total of 576\. Multiply 64 neurons from the previous convolutional layer by
    576 to get a total of 36,864\. Add 64 neurons at this layer to get a total of
    36,928 parameters.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个卷积层有64个神经元作用于数据。过滤器大小是3 `×` 3。因此，我们有一个3 `×` 3 `×` 64的过滤器，因为我们有64个维度，总共576个。将前一个卷积层的64个神经元乘以576，总共得到36,864个。在此层添加64个神经元，总共得到36,928个参数。
- en: The fully connected dense layer is calculated as before. We get 262,144 by multiplying
    4,096 neurons at this layer by 64 neurons from the previous layer. Add 64 neurons
    at this layer to get a total of 262,208 parameters.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 完全连接的密集层计算如前所述。我们通过将此层的4096个神经元乘以前层的64个神经元得到262,144。在此层添加64个神经元，总共得到262,208个参数。
- en: The output layer has 650 parameters by multiplying 64 neurons from the previous
    layer by 10 at this layer and adding 10 neurons at this layer. Whew!
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 输出层有650个参数，通过将前一层64个神经元乘以10并在此层添加10个神经元来计算。哇！
- en: Model Layers
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型层
- en: 'Inspect model layers:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型层：
- en: '[PRE36]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
