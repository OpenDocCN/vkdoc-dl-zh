- en: Summary
  id: totrans-368
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: This chapter looked at the model-free approach to reinforcement learning. It
    started by estimating the state value using the Monte Carlo approach. It explained
    the “first visit” and “every visit” approaches. It then looked at the bias and
    variance tradeoff in general and specifically in the context of the MC approaches.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了强化学习的无模型方法。它首先使用蒙特卡洛方法估计状态值。它解释了“首次访问”和“每次访问”方法。然后，它探讨了一般情况下的偏差和方差权衡，以及在蒙特卡洛方法的具体背景下。
- en: With the foundation of MC estimation in place, the chapter looked at MC control
    methods connecting it with the GPI framework for policy improvement that was introduced
    in Chapter [3](502835_2_En_3_Chapter.xhtml). You saw how GPI could be applied
    by swapping the estimation step of the approach from DP-based to an MC-based approach.
    The chapter looked in detail at the exploration-exploitation dilemma that needs
    to be balanced, especially in the model-free world where the transition probabilities
    are not known.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 在 MC 估计的基础上，本章探讨了 MC 控制方法，将其与第 [3](502835_2_En_3_Chapter.xhtml) 章中引入的 GPI 框架相结合，以改进策略。你看到了如何通过将方法中的估计步骤从基于
    DP 的方法更改为基于 MC 的方法来应用 GPI。本章详细探讨了需要平衡的探索-利用困境，特别是在无模型世界中，过渡概率是未知的。
- en: I then briefly talked about the off-policy approach in the context of the MC
    methods. And in this context, you learned about importance sampling where the
    policy to collect samples is called behavior policy and the policy being optimized
    is the target policy. Importance sampling allows the return from one only to be
    cast in the context of another policy.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我简要介绍了 MC 方法中的离策略方法。在这种情况下，你学习了重要性采样，其中收集样本的策略被称为行为策略，而正在优化的策略是目标策略。重要性采样允许将一个策略的回报仅放在另一个策略的背景下进行评估。
- en: TD was the next approach the chapter investigated with respect to model-free
    learning. It started off by establishing the basics of TD learning, starting with
    TD-based value estimation. This was followed by a deep dive into SARSA, an on-policy
    TD control method. The chapter then investigated Q-learning, a powerful off-policy
    TD learning approach, and some of its variants like expected SARSA.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: TD 是本章在无模型学习方面探讨的下一个方法。它从建立 TD 学习的基础开始，首先是基于 TD 的价值估计。随后深入探讨了 SARSA，这是一种基于策略的
    TD 控制方法。接着，本章研究了 Q-learning，这是一种强大的离策略 TD 学习方法，以及它的一些变体，如期望 SARSA。
- en: In the context of TD learning, I also introduced the concept of state approximation
    to convert continuous state spaces into approximate discrete state values. The
    concept of state approximation will form the bulk of the next chapter and will
    allow you to combine deep learning with reinforcement learning.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TD 学习的背景下，我还介绍了状态近似的概念，将连续状态空间转换为近似的离散状态值。状态近似的概念将成为下一章的主要内容，并允许你将深度学习与强化学习相结合。
- en: Before concluding the chapter, you finally looked at n-step returns, eligibility
    traces, and TD(*λ*) as ways to combine TD and MC into a single framework.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 在结束本章之前，你最终探讨了 n 步回报、资格痕迹和 TD(*λ*)作为将 TD 和 MC 结合到单一框架中的方法。
