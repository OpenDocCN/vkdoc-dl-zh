- en: 3. TensorFlow Datasets
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. TensorFlow数据集
- en: We introduce TensorFlow Datasets by discussing and demonstrating their many
    facets with code examples. Although TensorFlow Datasets are not ML models, we
    include this chapter because we use them in many of the chapters in this book.
    These datasets are created by the TensorFlow team to provide a diverse set of
    data for practicing ML experiments.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过讨论和演示它们的许多方面以及代码示例来介绍TensorFlow数据集。尽管TensorFlow数据集不是ML模型，但我们包括这一章，因为我们在这本书的许多章节中都使用了它们。这些数据集是由TensorFlow团队创建的，以提供用于实践ML实验的多种数据集。
- en: When we began working with TensorFlow, we were unfamiliar with the mechanics
    of TensorFlow Datasets. We worked mainly with NumPy data. So we had to spend quite
    a bit of time becoming familiar with them. We believe that this chapter should
    help you navigate these datasets with ease. If you already have experience with
    TensorFlow Datasets, you may not need to work through the examples in this chapter.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们开始使用TensorFlow时，我们对TensorFlow数据集的机制不熟悉。我们主要使用NumPy数据。因此，我们不得不花相当多的时间来熟悉它们。我们相信这一章应该能帮助你轻松地导航这些数据集。如果你已经对TensorFlow数据集有经验，你可能不需要在本章中通过示例进行操作。
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 各章节的Notebooks位于以下URL：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[深度学习模型](https://github.com/paperd/deep-learning-models)'
- en: An Introduction to TensorFlow Datasets
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow数据集简介
- en: TensorFlow Datasets (TFDSs) provide a collection of datasets that are ready
    to use with TensorFlow or other machine language frameworks (e.g., Jax, Apache
    Spark, Accord.NET). All TFDSs are exposed as tf.data.Datasets, which allows us
    to easily build high-performance input pipelines with the tf.data API. It is also
    very easy to download and prepare TFDSs deterministically, which makes them dataset
    builders. A **dataset builder** is an object that leverages a set of methods to
    prepare data for consumption by a ML model.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow数据集（TFDSs）提供了一组可用于TensorFlow或其他机器学习框架（例如Jax、Apache Spark、Accord.NET）的数据集。所有TFDSs都作为tf.data.Datasets暴露，这使得我们能够使用tf.data
    API轻松构建高性能的输入管道。它们也非常容易确定性地下载和准备TFDSs，这使得它们成为数据集构建者。**数据集构建者**是一个利用一组方法来准备数据供ML模型消费的对象。
- en: Don’t confuse TFDSs with tf.data. The tf.data API allows us to build efficient
    data pipelines. TFDSs are a high-level wrapper around tf.data.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 不要将TFDSs与tf.data混淆。tf.data API允许我们构建高效的数据管道。TFDSs是tf.data的高级包装器。
- en: For an excellent overview of TFDSs, peruse
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取TFDSs的精彩概述，请查阅
- en: '[`www.tensorflow.org/datasets/overview`](http://www.tensorflow.org/datasets/overview)'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '[TensorFlow数据集概览](http://www.tensorflow.org/datasets/overview)'
- en: Import the TensorFlow Library
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入TensorFlow库
- en: 'Import the library and alias it as **tf**:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库并将其别名为**tf**：
- en: '[PRE0]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: GPU Hardware Accelerator
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPU硬件加速器
- en: 'For convenience, we repeat the instructions to enable the GPU:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了方便，我们重复说明如何启用GPU：
- en: Click *Runtime* in the top-left menu.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右上角菜单中点击*运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择*更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从*硬件加速器*下拉菜单中选择*GPU*。
- en: Click *Save*.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击*保存*。
- en: 'Verify that the GPU is active:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 验证GPU是否处于活动状态：
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If ‘/device:GPU:0’ is displayed, the GPU is active. If ‘..’ is displayed, the
    regular CPU is active.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果显示“/device:GPU:0”，则GPU处于活动状态。如果显示“..”，则常规CPU处于活动状态。
- en: Note
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: If you get the error **NAME ‘TF’ IS NOT DEFINED**, re-execute the code to import
    the TensorFlow library!
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如果出现错误**NAME ‘TF’ IS NOT DEFINED**，请重新执行代码以导入TensorFlow库！
- en: Available Datasets
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可用数据集
- en: 'All dataset builders are a subclass of the tfds.core.DatasetBuilder class.
    So each TFDS object is defined as a tfds.core.DatasetBuilder object. To get the
    list of available TFDS builders, use tfds.list_builders():'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 所有数据集构建者都是tfds.core.DatasetBuilder类的子类。因此，每个TFDS对象都定义为tfds.core.DatasetBuilder对象。要获取可用TFDS构建器的列表，请使用tfds.list_builders()：
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Let’s see how many are currently available:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看目前有多少可用：
- en: '[PRE3]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Wow! There are a lot of TFDSs available for deep learning practice!
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！有很多TFDSs（TensorFlow数据集）可供深度学习实践！
- en: To find out more about TFDSs, peruse
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多关于TFDSs的信息，请查阅
- en: '[`www.tensorflow.org/datasets/catalog/overview`](http://www.tensorflow.org/datasets/catalog/overview)'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '[TensorFlow数据集目录概览](http://www.tensorflow.org/datasets/catalog/overview)'
- en: Load a Dataset
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加载数据集
- en: All builders include a *tfds.core.DatasetInfo* object, which contains a dataset’s
    metadata. Metadata is accessed through either the *tfds.load* API or *tfds.core.DatasetBuilder*
    API. The tfds.load API is a thin wrapper around tfds.core.DatasetBuilder. So it
    is much easier to use. From our research, it is the preferred method to download
    a TFDS. We get the same output using either API.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 所有构建器都包含一个 *tfds.core.DatasetInfo* 对象，它包含数据集的元数据。元数据通过 *tfds.load* API 或 *tfds.core.DatasetBuilder*
    API 访问。tfds.load API 是 tfds.core.DatasetBuilder 的一个薄包装器。因此，它更容易使用。根据我们的研究，它是下载TFDS的首选方法。我们使用任何API都可以得到相同的结果。
- en: 'Load a dataset with tfds.load:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 tfds.load 加载数据集：
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The tfds.load API downloads the data and saves it as TFRecord files. It then
    loads the TFRecord files and creates a tf.data.Dataset. The *TFRecord format*
    is a simple format for storing a sequence of binary records. So the variable *ds*
    contains a tf.data.Dataset consisting of MNIST data. The data is shuffled, the
    meta dataset is returned, and the dataset is retrieved from the Google Cloud Service
    (GCS). The *MNIST* database is a large database of handwritten digits that is
    widely used for training and testing in the field of ML.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: tfds.load API 下载数据并将其保存为TFRecord文件。然后它加载TFRecord文件并创建一个 tf.data.Dataset。*TFRecord格式*
    是一种用于存储一系列二进制记录的简单格式。因此，变量 *ds* 包含一个由MNIST数据组成的 tf.data.Dataset。数据被打乱，返回元数据集，并从Google
    Cloud Service (GCS)检索数据集。*MNIST* 数据库是一个包含手写数字的大型数据库，在机器学习领域的训练和测试中广泛使用。
- en: Common arguments available to the tfds.load API include
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: tfds.load API 可用的常见参数包括
- en: '*split* – Splits data (e.g., ‘train’, [‘train’, ‘test’], ‘train[80%:]’, etc.).'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*split* – 分割数据（例如，‘train’，[‘train’，‘test’]，‘train[80%:]’，等等）。'
- en: '*shuffle_files* – Controls whether to shuffle the files between each epoch
    (TFDSs store big datasets in multiple smaller files).'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*shuffle_files* – 控制是否在每个epoch之间打乱文件（TFDSs将大数据集存储在多个较小的文件中）。'
- en: '*as_supervised* – If True, tf.data.Dataset has a two-tuple structure (input,
    label). If False, tf.data.Dataset has a dictionary structure.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*as_supervised* – 如果为True，tf.data.Dataset具有一个二元组结构（输入，标签）。如果为False，tf.data.Dataset具有字典结构。'
- en: '*data_dir* – Location where the dataset is saved (defaults to ~/tensorflow_datasets/).'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*data_dir* – 数据集保存的位置（默认为 ~/tensorflow_datasets/）。'
- en: '*with_info=True* – Returns the tfds.core.DatasetInfo containing dataset metadata.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*with_info=True* – 返回包含数据集元数据的 tfds.core.DatasetInfo。'
- en: '*download=False* – Disables download.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*download=False* – 禁用下载。'
- en: The *try_gcs* argument is not listed in the documentation. It tells the loader
    to retrieve the dataset from the GCS.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '*try_gcs* 参数在文档中未列出。它告诉加载器从GCS检索数据集。'
- en: TFDS Metadata
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TFDS 元数据
- en: 'To access all metadata, just display the contents of the *info* object:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问所有元数据，只需显示 *info* 对象的内容：
- en: '[PRE5]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: From the metadata, we see that MNIST contains 60,000 28 × 28 feature images
    for training and 10,000 28 × 28 feature images for testing. Both training and
    test sets have corresponding scalar labels.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 从元数据中，我们看到MNIST包含60,000个28 × 28的训练特征图像和10,000个28 × 28的测试特征图像。训练集和测试集都有相应的标量标签。
- en: Iterate Over a Dataset
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 遍历数据集
- en: As a Dictionary
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 作为字典
- en: 'By default, a tf.data.Dataset contains a dictionary of tf.Tensors. Let’s look
    at an example from the dataset:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，一个 tf.data.Dataset 包含一个 tf.Tensors 的字典。让我们看看数据集中的一个示例：
- en: '[PRE6]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Use *take()* to get *n* examples from a tf.data.Dataset. In this case, we take
    one example. The example is in the form *{''image'': tf.Tensor, ''label'': tf.Tensor}*.
    Simply, each example contains an image tensor and a label tensor. The image tensor
    is a 28 × 28 matrix, and the label tensor is a scalar.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '使用 *take()* 从 tf.data.Dataset 获取 *n* 个示例。在这种情况下，我们获取一个示例。示例的形式为 *{''image'':
    tf.Tensor, ''label'': tf.Tensor}*。简单来说，每个示例包含一个图像张量和标签张量。图像张量是一个28 × 28的矩阵，标签张量是一个标量。'
- en: Image data are datatype tf.uint8, which are 8-bit unsigned integers. A *uint8*
    datatype contains whole numbers that range from 0 to 255\. As with all unsigned
    numbers, the values must be nonnegative. Uint8s are mostly used in graphics. As
    a note, colors (pixels that represent colors) are always nonnegative.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图像数据的数据类型为tf.uint8，是8位无符号整数。一个 *uint8* 数据类型包含从0到255的整数。与所有无符号数一样，值必须为非负。Uint8s主要用于图形。作为备注，颜色（代表颜色的像素）总是非负的。
- en: Label data are datatype tf.int64, which are 64-bit signed integers. A *int64*
    datatype contains signed integers that range from negative 9,223,372,036,854,775,808
    through positive 9,223,372,036,854,775,807.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 标签数据的数据类型为tf.int64，是64位有符号整数。一个 *int64* 数据类型包含从负9,223,372,036,854,775,808到正9,223,372,036,854,775,807的带符号整数。
- en: 'Display information about the example:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 显示示例信息：
- en: '[PRE7]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: A loop is needed to extract image and label information from the dataset.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 需要一个循环来从数据集中提取图像和标签信息。
- en: As Tuples
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 作为元组
- en: 'By using *as_supervised=True*, a tf.data.Dataset contains tuples of features
    and labels:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *as_supervised=True*，tf.data.Dataset 包含特征和标签的元组：
- en: '[PRE8]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: In the iterate statement, simply include variables to hold features and labels.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在迭代语句中，只需包含用于存储特征和标签的变量。
- en: As NumPy Arrays
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 作为 NumPy 数组
- en: 'The *tfds.as_numpy()* function converts a tf.data.Dataset to an iterable of
    NumPy arrays:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '*tfds.as_numpy()* 函数将 tf.data.Dataset 转换为 NumPy 数组的可迭代对象：'
- en: '[PRE9]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: We load training data as feature image tuples. We then take one example and
    convert it to a NumPy array.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将训练数据作为特征图像元组加载。然后，我们取一个示例并将其转换为 NumPy 数组。
- en: 'Conveniently, we can load the entire dataset as NumPy arrays (if memory permits):'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 方便的是，我们可以将整个数据集作为 NumPy 数组加载（如果内存允许）：
- en: '[PRE10]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: By using *batch_size=-1*, the full dataset is loaded in a single batch. The
    batch is then converted to NumPy arrays.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *batch_size=-1*，可以将整个数据集一次性加载到一个批次中。然后，该批次被转换为 NumPy 数组。
- en: Note
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Be careful that your dataset can fit in memory and that all examples have the
    same shape before training.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在训练之前，确保你的数据集可以放入内存，并且所有示例都具有相同的形状。
- en: 'Since the dataset consists of NumPy arrays, we can inspect it with normal Python
    operations. Get the number of examples:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据集由 NumPy 数组组成，我们可以使用常规的 Python 操作来检查它。获取示例数量：
- en: '[PRE11]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: As expected, there are 60,000 feature image tuples in the training set.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，训练集中有 60,000 个特征图像元组。
- en: 'Inspect the first example:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 检查第一个示例：
- en: '[PRE12]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The image tensor has a shape of 28 × 28 × 1\. The “1” dimension means that the
    image is grayscale. The label is a scalar that represents the class of the image.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 图像张量的形状为 28 × 28 × 1。这里的“1”维度表示图像是灰度的。标签是一个标量，表示图像的类别。
- en: 'Inspect a few examples:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 检查几个示例：
- en: '[PRE13]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Tip
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: If you prefer working with NumPy arrays rather than tf.Tensor objects, load
    the dataset in a single batch if memory permits.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更喜欢使用 NumPy 数组而不是 tf.Tensor 对象，如果内存允许，可以一次性将数据集加载到一个批次中。
- en: Visualization
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可视化
- en: We can conveniently visualize images from a TFDS object.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以方便地可视化 TFDS 对象中的图像。
- en: tfds.as_dataframe
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: tfds.as_dataframe
- en: 'One way to visualize image data is to convert tf.data.Dataset objects to pandas.DataFrame
    objects. Load the dataset, take four examples, and display:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一种可视化图像数据的方法是将 tf.data.Dataset 对象转换为 pandas.DataFrame 对象。加载数据集，取四个示例，并显示：
- en: '[PRE14]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We loaded the dataset with its metadata (*with_info=True*) to enable display.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用带有元数据（*with_info=True*）的方式加载数据集，以便进行显示。
- en: Take Examples
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 取示例
- en: 'We can also visualize examples taken from the dataset. Take four examples,
    squeeze out the “1” dimension from each tensor, and add the squeezed tensors to
    an array. We need to squeeze out the “1” dimension because the *imshow()* function
    expects a two-dimensional matrix as input:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以可视化数据集中的示例。取四个示例，从每个张量中挤压出“1”维度，并将挤压后的张量添加到数组中。我们需要挤压出“1”维度，因为 *imshow()*
    函数期望输入一个二维矩阵：
- en: '[PRE15]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Visualize the images as shown in Listing [3-1](#PC17).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [3-1](#PC17) 所示，将图像可视化。
- en: '[PRE16]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: tfds.show_examples
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: tfds.show_examples
- en: 'Another way to visualize images is to use *show_examples()*:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种可视化图像的方法是使用 *show_examples()*：
- en: '[PRE17]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Note
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Only image datasets are supported with show_examples.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: show_examples 只支持图像数据集。
- en: Several images are neatly displayed. Underneath each image is the label name
    as a string and as an integer in parentheses. For example, the image of 4 has
    4(4) underneath it because its label is “4” as a string and (4) as an integer.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 几张图像整齐地显示出来。在每张图像下方是标签名称作为字符串和作为括号中的整数。例如，标签为 4 的图像下方有 4(4)，因为其标签是字符串“4”和整数（4）。
- en: Load Fashion-MNIST
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加载 Fashion-MNIST
- en: Load Fashion-MNIST as a TFDS object. *Fashion-MNIST* is a dataset of Zalando’s
    article images consisting of a training set of 60,000 examples and a test set
    of 10,000 examples. Zalando is an online fashion company that leverages artificial
    intelligence (AI) to improve the customer experience. The dataset is intended
    to serve as a direct drop-in replacement of the original MNIST dataset for benchmarking
    ML algorithms. The original MNIST dataset is being phased out as a practice dataset
    because it is so easy to achieve stellar performance from a very simple neural
    network. Fashion-MNIST is recommended because it is much more challenging.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 将 Fashion-MNIST 作为 TFDS 对象加载。*Fashion-MNIST* 是由 Zalando 的商品图片组成的数据库，包括 60,000
    个示例的训练集和 10,000 个示例的测试集。Zalando 是一家在线时尚公司，利用人工智能 (AI) 来提升客户体验。该数据库旨在作为原始 MNIST
    数据集的直接替换，用于基准测试机器学习算法。由于原始 MNIST 数据集非常容易通过一个非常简单的神经网络获得出色的性能，因此正在逐步淘汰作为实践数据集。推荐使用
    Fashion-MNIST，因为它更具挑战性。
- en: 'Load the dataset:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 加载数据集：
- en: '[PRE18]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: We load only training data. Metadata is available in the *info* object. We also
    shuffle the dataset to ensure that each data point creates an *independent change*
    on the model without being biased by the same points before them. By setting *as_supervised=True*,
    the returned tf.data.Dataset has a two-tuple structure represented as (input,
    label). By setting *try_gcs=True*, the dataset is streamed directly from the Google
    Cloud Service (GCS).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只加载训练数据。元数据在 *info* 对象中可用。我们还对数据集进行洗牌，以确保每个数据点对模型的影响是独立的，不会受到之前相同点的偏差。通过设置
    *as_supervised=True*，返回的 tf.data.Dataset 有一个表示为 (input, label) 的二元结构。通过设置 *try_gcs=True*，数据集直接从
    Google Cloud Service (GCS) 流式传输。
- en: 'Inspect an example:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 检查一个示例：
- en: '[PRE19]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: The tf.Tensor is composed of an image and a label. Image shape is 28 × 28 ×
    1\. The “1” dimension means that the image is grayscale. The label is a scalar
    value that represents the class of the image.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: tf.Tensor 由图像和标签组成。图像形状是 28 × 28 × 1。其中“1”维度表示图像是灰度的。标签是一个表示图像类别的标量值。
- en: Metadata
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 元数据
- en: 'Inspect the dataset:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 检查数据集：
- en: '[PRE20]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: As expected, images in the dataset are 28 × 28 × 1 tensors and labels are scalars.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，数据集中的图像是 28 × 28 × 1 的张量，标签是标量。
- en: 'Display the metadata:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 显示元数据：
- en: '[PRE21]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: We see a lot of information about the dataset. A very important one is how the
    data is split. Conveniently, Fashion-MNIST data is already split into training
    and test sets. So we don’t have to manually split the dataset!
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到关于数据集的大量信息。其中非常重要的一点是数据的分割方式。方便的是，Fashion-MNIST 数据已经分割成训练集和测试集。因此，我们不需要手动分割数据集！
- en: 'Access the tfds.features.FeatureDict:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 访问 tfds.features.FeatureDict：
- en: '[PRE22]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: The features dictionary contains information about images and labels. Such information
    is commonly referred to as metadata. The following code snippets provide metadata.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 特征字典包含有关图像和标签的信息。此类信息通常被称为元数据。以下代码片段提供了元数据。
- en: 'Get the number of classes:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 获取类别数量：
- en: '[PRE23]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: So we have ten class labels. We place the number of classes in a variable for
    use in the model.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有十个类别标签。我们将类别数量放入变量中，以便在模型中使用。
- en: 'Get class names:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 获取类别名称：
- en: '[PRE24]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: We see the names of each class label. Placing class labels in a variable is
    useful for visualization.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到每个类别标签的名称。将类别标签放入变量中有助于可视化。
- en: 'Get shape information:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 获取形状信息：
- en: '[PRE25]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: We see shape and datatypes of the features.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到特征的形状和数据类型。
- en: Display Split Information
  id: totrans-126
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 显示分割信息
- en: 'Access tfds.core.SplitDict:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 访问 tfds.core.SplitDict：
- en: '[PRE26]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Get available splits:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 获取可用分割：
- en: '[PRE27]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Get available information on the train split:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 获取训练分割的可用信息：
- en: '[PRE28]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Visualize
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化
- en: It’s a good idea to visualize a dataset before moving forward! Before any deep
    learning experiment, we explore the metadata and visualize examples to get an
    idea of what we are going to be working with before conducting any analysis. The
    idea is to *get to know your data*!
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续前进之前可视化数据集是个好主意！在进行任何深度学习实验之前，我们探索元数据并可视化示例，以便在进行分析之前了解我们将要处理的内容。目的是要 *了解你的数据*！
- en: 'Show some examples:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 显示一些示例：
- en: '[PRE29]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Underneath each image is the label name as a string and as an integer in parentheses.
    For example, the image of a coat has Coat(4) underneath it because its label is
    “Coat” as a string and (4) as an integer.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 每张图像下方是标签名称作为字符串和括号中的整数。例如，外套的图像下方有 Coat(4)，因为其标签是字符串“Coat”和整数（4）。
- en: 'Show examples from a dataframe:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 从数据框中显示示例：
- en: '[PRE30]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Take some examples and visualize:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 取一些示例并可视化：
- en: '[PRE31]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Visualize the images as shown in Listing [3-2](#PC33).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [3-2](#PC33) 所示，可视化图像。
- en: '[PRE32]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Slicing API
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Slicing API
- en: All builder datasets expose various data subsets defined as splits (e.g., [train,
    test]). When constructing a tf.data.Dataset, we can specify which split(s) we
    wish to slice. We can also retrieve slice(s) of split(s) as well as combinations
    of those. In this section, we provide some examples on how to split and slice
    a TFDS. It is a good idea to know how to manually split a dataset into training
    and test sets in case you come across data that is not presplit. It is also a
    good idea to know how to slice a data split (e.g., train, test).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 所有构建数据集都公开了各种数据子集，这些子集定义为分割（例如，[train, test]）。当构建一个tf.data.Dataset时，我们可以指定我们希望切片的分割。我们还可以检索分割的切片以及那些分割的组合。在本节中，我们提供了一些关于如何分割和切片TFDS的示例。如果你遇到未预先分割的数据，了解如何手动将数据集分割为训练集和测试集是一个好主意。同样，了解如何切片数据分割（例如，train，test）也是一个好主意。
- en: Slicing Instructions
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 切片说明
- en: We specify slicing instructions in the tfds.load objects that we create. Instructions
    are provided either as strings or with the ReadInstruction API. Strings are more
    compact and readable for simple cases, while the ReadInstruction API provides
    more options and might be easier to use with variable slicing parameters. Loading
    data as strings means that the dataset is a Python string. Loading data as a ReadInstruction
    object means that the dataset is a Python object.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在创建的tfds.load对象中指定切片说明。说明可以是字符串或使用ReadInstruction API提供。对于简单情况，字符串更紧凑且可读，而ReadInstruction
    API提供更多选项，并且可能更容易与可变切片参数一起使用。将数据作为字符串加载意味着数据集是一个Python字符串。将数据作为ReadInstruction对象加载意味着数据集是一个Python对象。
- en: Note
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Due to the shards being read in parallel, order isn't guaranteed to be consistent
    between sub-splits. So reading test[0:100] followed by test[100:200] may yield
    examples in a different order than reading test[:200].
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 由于分片是并行读取的，子分片之间的顺序可能不一致。因此，先读取test[0:100]，然后读取test[100:200]，可能得到的示例顺序与先读取test[:200]的顺序不同。
- en: Instructions as Strings
  id: totrans-150
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 指令作为字符串
- en: 'Let’s work through some tfds.load examples:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一些tfds.load示例来操作：
- en: 'Load the full train set:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 加载完整的训练集：
- en: '[PRE33]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: In this case, we load (or slice) the train split from Fashion-MNIST. So slice
    is just another word for load in this context.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们加载（或切片）了Fashion-MNIST的train分割。所以在这个上下文中，切片只是加载的另一种说法。
- en: 'Load the full “train” split and full “test” split as two distinct datasets:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 将“train”分割和“test”分割作为两个不同的数据集加载：
- en: '[PRE34]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'Load the full “train” and “test” splits interleaved together:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 将“train”和“test”分割交错加载：
- en: '[PRE35]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'Load the slice from record 100 (included) to record 200 (excluded) from the
    “train” split:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 从“train”分割中加载记录100（包含）到记录200（不包含）的切片：
- en: '[PRE36]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: In this case, we load a slice from the train set. So slice has a different meaning
    than load in this context.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们从训练集中加载一个切片。所以在这个上下文中，切片与加载有不同的含义。
- en: 'Load the slice of the first 25% from the “train” split:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 加载“train”分割的前25%的切片：
- en: '[PRE37]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'Load the slice from the first 10% of “train” to the last 80% of “train”:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 加载“train”的前10%到“train”的最后80%的切片：
- en: '[PRE38]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Perform tenfold cross-validation as shown in Listing [3-3](#PC40).
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [3-3](#PC40) 所示，执行十倍交叉验证。
- en: '[PRE39]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: '**Cross-validation** is a technique to evaluate predictive models by partitioning
    the original sample into a training set to train the model and a test set to evaluate
    it. *Tenfold cross-validation* is a common implementation of the technique.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '**交叉验证**是一种通过将原始样本划分为训练集和测试集来评估预测模型的技巧。*十倍交叉验证*是该技术的常见实现。'
- en: The cross-validation procedure begins by randomly shuffling the dataset. The
    next step is to split the dataset into *k* groups. For each k group, take the
    group as a holdout or test dataset. Take the remaining groups as a training dataset.
    Continue as normal by fitting a model on the training set and evaluating it on
    the test set. Each observation in the data sample is assigned to an individual
    group and must stay in that group for the duration of the procedure. So each sample
    is given the opportunity to be used in the holdout set *1* time and used to train
    the model *k – 1* times.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉验证过程首先通过随机打乱数据集开始。下一步是将数据集划分为*k*组。对于每个*k*组，将该组作为保留或测试数据集。将剩余的组作为训练数据集。通过在训练集上拟合模型并在测试集上评估它来继续正常操作。数据样本中的每个观察值被分配给一个单独的组，并且在整个过程中必须保持在那个组中。因此，每个样本有*1*次机会被用于保留集，并且有*k
    – 1*次用于训练模型。
- en: 'For our tenfold cross-validation, here is some documentation:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的十倍交叉验证，以下是一些文档说明：
- en: '* Validation datasets are 10%:'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*验证数据集为10%：'
- en: '[0%:10%], [10%:20%], …, [90%:100%]'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[0%:10%], [10%:20%], …, [90%:100%]'
- en: '* Training datasets are the complementary 90%:'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 训练数据集是补足的90%：'
- en: '[10%:100%] (for a corresponding validation set of [0%:10%])'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[10%:100%]（对应验证集为[0%:10%]）'
- en: '[0%:10%] + [20%:100%] (for a validation set of [10%:20%])'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[0%:10%] + [20%:100%]（验证集为[10%:20%]）'
- en: '[0%:90%] (for a validation set of [90%:100%]).'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[0%:90%]（验证集为[90%:100%]）。'
- en: Instructions with the ReadInstruction API
  id: totrans-177
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用ReadInstruction API的说明
- en: 'We show the equivalent instructions with the ReadInstruction API starting with
    loading the full train set:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从加载完整的训练集开始，使用ReadInstruction API展示了等效的说明：
- en: '[PRE40]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: The same data is loaded, but into an object rather than a string.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 加载相同的数据，但作为一个对象而不是字符串。
- en: 'Load the full “train” split and full “test” split as two distinct datasets:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 将完整的“train”分割和完整的“test”分割作为两个不同的数据集加载：
- en: '[PRE41]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'Load the full “train” and “test” splits interleaved together:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 将完整的“train”和“test”分割交错加载：
- en: '[PRE42]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Load the slice from record 100 (included) to record 200 (excluded) of the “train”
    split:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 加载“train”分割中第100条（包含）到第200条（不包含）的切片：
- en: '[PRE43]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Load the slice of the first 25% of the “train” split:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 加载“train”分割前25%的切片：
- en: '[PRE44]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: 'Load the slice from the first 10% of train to the last 80% of train:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 加载从训练集前10%到后80%的切片：
- en: '[PRE45]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Perform tenfold cross-validation as shown in Listing [3-4](#PC47).
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[3-4](#PC47)所示，执行十折交叉验证。
- en: '[PRE46]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: 'For our tenfold cross-validation, here is some documentation:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的十折交叉验证，以下是一些文档说明：
- en: '* Validation datasets are each going to be 10%: [0%:10%], [10%:20%], …, [90%:100%].'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 验证数据集将各为10%：[0%:10%]，[10%:20%]，…，[90%:100%]。'
- en: '* Training datasets are each going to be the complementary 90%:'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 训练数据集将各为补足的90%：'
- en: '[10%:100%] (for a corresponding validation set of [0%:10%])'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[10%:100%]（对应验证集为[0%:10%]）'
- en: '[0%:10%] + [20%:100%] (for a validation set of [10%:20%])'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[0%:10%] + [20%:100%]（验证集为[10%:20%]）'
- en: '[0%:90%] (for a validation set of [90%:100%])'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[0%:90%]（验证集为[90%:100%]）'
- en: Performance Tips
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性能技巧
- en: 'This section is intended for those interested in learning more about improving
    TensorFlow performance. We show three tips, but there are many more. To delve
    deeper, peruse the following URLs:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 本节旨在为那些对提高TensorFlow性能感兴趣的人提供更多信息。我们展示了三个技巧，但还有很多。要深入了解，请查阅以下URL：
- en: '[`www.tensorflow.org/guide/data_performance`](http://www.tensorflow.org/guide/data_performance)'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/guide/data_performance`](http://www.tensorflow.org/guide/data_performance)'
- en: '[`www.tensorflow.org/datasets/performances`](https://www.tensorflow.org/datasets/performances)'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/datasets/performances`](https://www.tensorflow.org/datasets/performances)'
- en: Auto-caching
  id: totrans-203
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动缓存
- en: 'By default, TFDSs auto-cache datasets that satisfy the following constraints:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，TFDS自动缓存满足以下约束的数据集：
- en: '* Total dataset size (all splits) is defined and < 250 MB.'
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 总数据集大小（所有分割）已定义且小于250 MB。'
- en: '* shuffle_files is disabled or only a single shard is read.'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* shuffle_files被禁用或只读取单个分片。'
- en: So don’t fiddle with auto-caching unless you want to change the default.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，除非你想更改默认设置，否则不要随意调整自动缓存。
- en: Benchmark Datasets
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基准数据集
- en: Use *tfds.core.benchmark(ds)* to benchmark any tf.data.Dataset object.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 使用*tfds.core.benchmark(ds)*对任何tf.data.Dataset对象进行基准测试。
- en: 'We can load and preprocess a dataset in one step:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在一步中加载和预处理数据集：
- en: '[PRE47]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Notice that we just grab one batch from the dataset.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们只是从数据集中抓取了一个批次。
- en: 'Benchmark the dataset:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 对数据集进行基准测试：
- en: '[PRE48]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Be sure to initialize the *batch_size* parameter to the same value!
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 确保将*batch_size*参数初始化为相同的值！
- en: 'Run the benchmark again:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 再次运行基准测试：
- en: '[PRE49]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: The second iteration benchmark is much faster due to auto-caching!
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 第二次迭代基准测试由于自动缓存而变得更快！
- en: Reloading a TFDS Object
  id: totrans-219
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新加载TFDS对象
- en: The first time we load a TFDS object, it takes quite a bit of time especially
    if the dataset is large. The next time we load a TFDS object, it is much faster
    because it is already in memory! If you want to see this in action, create a new
    notebook and load the Fashion-MNIST TFDS object. Load it a second time and notice
    that it takes very little time.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次加载TFDS对象时，特别是如果数据集很大，需要相当多的时间。下次加载TFDS对象时，它会更快，因为它已经在内存中！如果你想看到这个效果，创建一个新的笔记本并加载Fashion-MNIST
    TFDS对象。再次加载它，并注意它花费的时间非常少。
- en: Load Fashion-MNIST as a Single Tensor
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将Fashion-MNIST作为单个张量加载
- en: We don’t have to load a TFDS as a TensorFlow tensor. We can load it as a NumPy
    tf.Tensor if the dataset fits in memory. The recommended way is to load the full
    dataset as a single tensor (or NumPy array). It is possible to do this by setting
    *batch_size=-1* to batch all examples as a single tf.Tensor.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不必将TFDS作为TensorFlow张量加载。如果数据集适合内存，我们可以将其作为NumPy tf.Tensor加载。推荐的方法是将整个数据集作为一个单独的张量（或NumPy数组）加载。这可以通过将*batch_size=-1*设置为将所有示例作为一个tf.Tensor批处理来实现。
- en: 'Load the full dataset as a single tf.Tensor and convert it to a NumPy array:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 将整个数据集作为单个tf.Tensor加载并转换为NumPy数组：
- en: '[PRE50]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: Note
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: To be able to manipulate a tf.Tensor like a NumPy array, load it as a TFDS as
    a single tensor.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 要像NumPy数组一样操作tf.Tensor，将其作为单个张量加载为TFDS。
- en: 'Display shapes:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 显示形状：
- en: '[PRE51]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Train data images have shape (60000, 28, 28, 1) and labels have shape (60000,).
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据图像的形状为(60000, 28, 28, 1)，标签的形状为(60000,)。
- en: Ready Data for TensorFlow Consumption
  id: totrans-230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备数据以供TensorFlow使用
- en: 'Scale feature images and convert data to tf.data.Dataset objects:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放特征图像并将数据转换为tf.data.Dataset对象：
- en: '[PRE52]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: Since the single tensor is a NumPy tensor, we can scale images simply by dividing
    by 255.0 as we would with a NumPy array.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 由于单个张量是NumPy张量，我们可以通过除以255.0来简单地缩放图像，就像处理NumPy数组一样。
- en: Build the Input Pipeline
  id: totrans-234
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Set parameters and build the input pipeline for train and test data:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 设置参数并构建训练和测试数据的输入管道：
- en: '[PRE53]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Batch size and shuffle size are set based on trial and error experimentation.
    We recommend that you try different batch sizes (e.g., 32, 64) to see their impacts
    on learning performance. Shuffle size doesn’t seem to impact learning performance
    as much as batch size. So we recommend that you keep this constant in your experiments.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 批量大小和洗牌大小基于试验和错误实验设置。我们建议您尝试不同的批量大小（例如，32, 64）以观察它们对学习性能的影响。洗牌大小似乎对学习性能的影响没有批量大小那么大。因此，我们建议您在实验中保持此值不变。
- en: Build the Model
  id: totrans-238
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Get the input shape for the model:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 获取模型的输入形状：
- en: '[PRE54]'
  id: totrans-240
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: 'Import requisite libraries:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 导入所需的库：
- en: '[PRE55]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: 'Clear previous models and generate a seed for reproducibility:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 清除之前的模型并为可重复性生成一个种子：
- en: '[PRE56]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: 'Create the model:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE57]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: Compile and Train the Model
  id: totrans-247
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile with SparseCategoricalCrossentropy(from_logits=True):'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SparseCategoricalCrossentropy(from_logits=True)进行编译：
- en: '[PRE58]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: The *from_logits=True* attribute informs the loss function that the output values
    generated by the model are not normalized. That is, the softmax function has not
    been applied to the output layer neurons to produce a probability distribution.
    Unless otherwise specified, softmax activation is automatically applied to the
    output values. But we explicitly indicate that no activation be applied.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: '*from_logits=True* 属性通知损失函数，模型生成的输出值未经归一化。也就是说，softmax函数尚未应用于输出层神经元以产生概率分布。除非另有说明，否则softmax激活会自动应用于输出值。但我们将明确表示不应用激活。'
- en: 'Train the model:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE59]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: Load Beans as a tf.data.Dataset
  id: totrans-253
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将豆子加载为tf.data.Dataset
- en: Let’s load a different dataset as a tf.data.Dataset object rather than as a
    single tf.Tensor as we did with Fashion-MNIST. Unless you prefer working with
    NumPy tensors, this is the preferred way to work with a TFDS. We strongly believe
    that working with various TFDS examples helps you better understand how to work
    with this type of data. The beans dataset is a good one because it doesn’t contain
    that many examples and there are only three classes.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们加载一个不同的数据集作为tf.data.Dataset对象，而不是像处理Fashion-MNIST那样作为单个tf.Tensor。除非您更喜欢使用NumPy张量，否则这是处理TFDS的首选方式。我们坚信，使用各种TFDS示例可以帮助您更好地理解如何处理此类数据。豆子数据集是一个很好的例子，因为它包含的示例并不多，而且只有三个类别。
- en: '*Beans* is a dataset containing images of beans taken in the field using smartphone
    cameras. It consists of three classes. Two are disease classes and the other is
    a healthy class. Diseases depicted are angular leaf spot and bean rust. Data was
    annotated by experts from the National Crops Resources Research Institute (NaCRRI)
    in Uganda and collected by the Makerere AI research lab.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: '*Beans* 是一个包含使用智能手机相机在田间拍摄的豆子图像的数据集。它由三个类别组成。其中两个是疾病类别，另一个是健康类别。描述的疾病是角斑病和豆锈。数据由乌干达国家作物资源研究学院（NaCRRI）的专家标注，并由
    Makerere AI 研究实验室收集。'
- en: Examples are presplit into test, training, and validation sets. The test and
    training sets contain 128 and 1,034 examples, respectively. The validation set
    contains 133 examples. Of course, you can manually split the dataset differently
    if you wish.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 示例预先分为测试、训练和验证集。测试集包含128个示例，训练集包含1,034个示例。验证集包含133个示例。当然，如果您愿意，可以手动以不同的方式分割数据集。
- en: 'Load the dataset:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 加载数据集：
- en: '[PRE60]'
  id: totrans-258
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: 'Inspect the data:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 检查数据：
- en: '[PRE61]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: We see that examples are split into test, training, and validation sets containing
    500 × 500 × 3 feature images. So we don’t have to split the data ourselves.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到示例被分为包含500 × 500 × 3特征图像的测试、训练和验证集。因此，我们不需要自己分割数据。
- en: For deep learning experiments, datasets are typically split into training and
    test sets. In industry, it is recommended to split data into training, validation,
    and test sets. Typically, training data is for learning, validation data is for
    tuning, and test data is for generalizability. But, we can use test data for tuning
    and validation data for generalizability.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 对于深度学习实验，数据集通常分为训练集和测试集。在工业界，建议将数据分为训练集、验证集和测试集。通常，训练数据用于学习，验证数据用于调整，测试数据用于泛化。但是，我们可以使用测试数据进行调整，使用验证数据进行泛化。
- en: Splitting data into three sets is superior for industrial purposes because the
    test set has never been touched by the learning model. So it can be used more
    confidently for generalizability. Professional data scientists are proficient
    at tuning models from the validation set. Most online tutorials use only the training
    and test splits because the focus is on learning rather than application in industry.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据分为三个集合对于工业用途来说更优越，因为测试集从未被学习模型接触过。因此，它可以更自信地用于泛化。专业数据科学家擅长从验证集中调整模型。大多数在线教程只使用训练集和测试集拆分，因为重点是学习而不是在工业中的应用。
- en: Metadata
  id: totrans-264
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 元数据
- en: 'Inspect the info object:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 检查 info 对象：
- en: '[PRE62]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: 'Inspect shapes:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 检查形状：
- en: '[PRE63]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: 'Inspect splits:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 检查拆分：
- en: '[PRE64]'
  id: totrans-270
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: 'From metadata, we can get class labels and number of classes:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 从元数据中，我们可以获取类别标签和类别数量：
- en: '[PRE65]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: Visualize
  id: totrans-273
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化
- en: We can visualize a TFDS in several ways.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过几种方式可视化 TFDS。
- en: 'Display examples with the show_examples method:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 show_examples 方法显示示例：
- en: '[PRE66]'
  id: totrans-276
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: A TFDS includes a method to display a few examples. Labels are displayed with
    the class name as a string and numerical value underneath the image.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: TFDS 包含一个方法来显示一些示例。标签以字符串形式显示类别名称，并在图像下方显示数值。
- en: 'We can also display examples as a dataframe:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以将示例显示为数据框：
- en: '[PRE67]'
  id: totrans-279
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: 'Finally, we can display examples manually. Begin by building a grid to display
    multiple examples. Continue by selecting images from the train set:'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以手动显示示例。首先构建一个网格来显示多个示例。然后从训练集中选择图像：
- en: '[PRE68]'
  id: totrans-281
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Create a function to display the grid of examples as shown in Listing [3-5](#PC70).
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来显示如列表[3-5](#PC70)中所示的示例网格。
- en: '[PRE69]'
  id: totrans-283
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: 'Plot the grid:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制网格：
- en: '[PRE70]'
  id: totrans-285
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: Display the first healthy bean as shown in Listing [3-6](#PC72).
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 显示如列表[3-6](#PC72)中所示的第一颗健康豆。
- en: '[PRE71]'
  id: totrans-287
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: Check Shapes
  id: totrans-288
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查形状
- en: 'Although we know that images are all the same shape from the metadata, check
    manually:'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们知道从元数据中图像都是相同的形状，但请手动检查：
- en: '[PRE72]'
  id: totrans-290
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: Just like it is a good idea to visualize examples, it is a good idea to manually
    inspect the shape of a few examples. We display five examples. Just change the
    number (parameter value) in the take method to vary the number of examples.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 正如可视化示例是一个好主意一样，手动检查几个示例的形状也是一个好主意。我们显示五个示例。只需更改 take 方法中的数字（参数值）来改变示例的数量。
- en: Reformat Images
  id: totrans-292
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新格式化图像
- en: We don’t have to resize images because they are all the same shape. However,
    the images are pretty large. To improve training performance, we resize images
    to a smaller size.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不必调整图像的大小，因为它们都是相同的形状。然而，图像相当大。为了提高训练性能，我们将图像调整到更小的尺寸。
- en: 'Create a function to resize and scale images:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个调整和缩放图像的函数：
- en: '[PRE73]'
  id: totrans-295
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: We resize images to the same shape because the learning model expects images
    of the same size. We encourage you to experiment with image size, but don’t make
    the images too big because larger images consume more memory.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将图像调整到相同的形状，因为学习模型期望图像具有相同的大小。我们鼓励您尝试不同的图像大小，但不要使图像太大，因为较大的图像会消耗更多内存。
- en: Configure Dataset for Performance
  id: totrans-297
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置数据集以优化性能
- en: It’s good practice to use buffered prefetching and caching to improve I/O performance.
    So we apply both techniques when building the input pipeline.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 使用缓冲预取和缓存来提高I/O性能是一种良好的实践。因此，我们在构建输入管道时应用了这两种技术。
- en: Prefetching overlaps the preprocessing and model execution of a training step.
    While the model is executing training step *s*, the input pipeline is reading
    the data for step *s+1*. Doing so reduces the step time to the maximum (as opposed
    to the sum) of the training process and the time it takes to extract the data.
    Apply the *tf.data.Dataset.prefetch* transformation to overlap data preprocessing
    and model execution during training.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 预取与训练步骤的预处理和模型执行重叠。当模型执行训练步骤 *s* 时，输入管道正在读取步骤 *s+1* 的数据。这样做可以将步骤时间减少到训练过程和提取数据所需时间的最大值（而不是总和）。在训练期间应用
    *tf.data.Dataset.prefetch* 转换来重叠数据预处理和模型执行。
- en: The *tf.data.Dataset.cache* transformation caches a dataset in memory or on
    local storage. Using this transformation saves some operations (like file opening
    and data reading) from being executed during each epoch. Specifically, the tf.data.Dataset.cache
    transformation keeps images in memory after they’re loaded off disk during the
    first epoch. As a result, the dataset doesn’t become a bottleneck during training.
    If the dataset is too large to fit into memory, use this operation to create a
    performant on-disk cache.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: '*tf.data.Dataset.cache*转换将数据集缓存在内存或本地存储中。使用此转换可以节省一些操作（如文件打开和数据读取）在每次epoch期间执行。具体来说，tf.data.Dataset.cache转换在第一次epoch将图像从磁盘加载到内存后，将图像保留在内存中。因此，数据集在训练期间不会成为瓶颈。如果数据集太大而无法放入内存，请使用此操作创建一个高效的磁盘缓存。'
- en: 'Build the input pipeline:'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 构建输入管道：
- en: '[PRE74]'
  id: totrans-302
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: Build the Model
  id: totrans-303
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Get input shape:'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 获取输入形状：
- en: '[PRE75]'
  id: totrans-305
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: Input shape is TensorShape([224, 224, 3]) as expected. We now have the input
    shape as a variable to use in the learning model.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 输入形状是TensorShape([224, 224, 3])，正如预期的那样。我们现在有了输入形状作为变量，可以在学习模型中使用。
- en: 'Import libraries not already in memory:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 导入内存中尚未存在的库：
- en: '[PRE76]'
  id: totrans-308
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: 'Clear models and generate a seed:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 清除模型并生成种子：
- en: '[PRE77]'
  id: totrans-310
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: Create a multilayered CNN as shown in Listing [3-7](#PC79).
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个多层CNN，如列表[3-7](#PC79)所示。
- en: '[PRE78]'
  id: totrans-312
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: Since feedforward networks perform poorly with large images, we need a CNN.
    The model includes four convolutional layers for two-dimensional spatial data.
    A **convolution** is the simple application of a filter to an input (an image
    in our case) that results in an activation. Repeated application of the same filter
    to an input results in a map of activations called a feature map. A *feature map*
    indicates the locations and strength of a detected feature in an input such as
    an image.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 由于前馈网络在处理大图像时表现不佳，我们需要一个卷积神经网络（CNN）。该模型包括四个卷积层用于二维空间数据。**卷积**是将过滤器简单应用于输入（在我们的情况下是图像），从而产生激活。对同一过滤器重复应用于输入会产生一个称为特征图的激活图。*特征图*表示在输入（如图像）中检测到的特征的位置和强度。
- en: Each convolutional layer is a MaxPooling2D layer that performs a max pooling
    operation for 2D spatial data. **Max pooling** down-samples the input representation
    from a convolutional layer by taking the maximum value over the window defined
    by the pool size for each dimension along the features axis. The window is shifted
    by strides in each dimension.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 每个卷积层都是一个MaxPooling2D层，它对二维空间数据执行最大池化操作。**最大池化**通过在每个特征轴上每个维度定义的池大小窗口中取最大值，从卷积层中下采样输入表示。窗口在每个维度上通过步长移动。
- en: '**Pooling** involves selecting a pooling operation like a filter to be applied
    to feature maps. The size of the pooling operation or filter is smaller than the
    size of the feature map. Specifically, it is almost always 2 × 2 pixels applied
    with a stride of 2 pixels. A **stride** is the number of pixels shifted over the
    input matrix (or image). When the stride is 1, we move the filters 1 pixel at
    a time. When the stride is 2, we move the filters 2 pixels at a time and so on.'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: '**池化**涉及选择一个池化操作（如过滤器）应用于特征图。池化操作或过滤器的大小小于特征图的大小。具体来说，它几乎总是应用2 × 2像素的步长为2像素。**步长**是在输入矩阵（或图像）上移动的像素数。当步长为1时，我们每次移动过滤器1像素。当步长为2时，我们每次移动过滤器2像素，依此类推。'
- en: Compile and Train the Model
  id: totrans-316
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译并训练模型
- en: 'Compile with SparseCategoricalCrossentropy(from_logits=True):'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SparseCategoricalCrossentropy(from_logits=True)进行编译：
- en: '[PRE79]'
  id: totrans-318
  prefs: []
  type: TYPE_PRE
  zh: '[PRE79]'
- en: We use this loss function because activation in the output layer of our model
    is ‘sigmoid’. We use this activation because it works well with the dataset. Experiment
    with different activation functions.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用这个损失函数是因为我们模型的输出层激活是‘sigmoid’。我们使用这种激活是因为它与数据集配合得很好。尝试不同的激活函数。
- en: 'Train the model:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE80]'
  id: totrans-321
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: Predict
  id: totrans-322
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测
- en: 'Since we used test data for tuning, make predictions based on the *validation
    dataset* (because it has never been seen by the model). Build an input pipeline
    for the validation set to ready it for predictions:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们使用了测试数据来调整，因此基于*验证数据集*进行预测（因为它从未被模型看到过）。为验证集构建输入管道，以便为预测做好准备：
- en: '[PRE81]'
  id: totrans-324
  prefs: []
  type: TYPE_PRE
  zh: '[PRE81]'
- en: 'Make predictions:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 进行预测：
- en: '[PRE82]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: The variable contains predictions for each example. Each prediction is an array
    containing ten predictions. So we need an additional step to get the actual prediction.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 该变量包含每个示例的预测。每个预测都是一个包含十个预测的数组。因此，我们需要额外的步骤来获取实际的预测。
- en: 'Get the actual prediction for the first example:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 获取第一个示例的实际预测：
- en: '[PRE83]'
  id: totrans-329
  prefs: []
  type: TYPE_PRE
  zh: '[PRE83]'
- en: Use the tf.math.argmax API to get the actual prediction from the prediction
    array.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 tf.math.argmax API 从预测数组中获取实际预测。
- en: Get multiple predictions as shown in Listing [3-8](#PC85).
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [3-8](#PC85) 所示，获取多个预测结果。
- en: '[PRE84]'
  id: totrans-332
  prefs: []
  type: TYPE_PRE
  zh: '[PRE84]'
- en: We get eight predictions. Change the range parameter value to get as many or
    few as you wish.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 我们获得了八个预测。通过更改范围参数值，可以得到你想要的任意多个或更少的预测。
- en: 'Get an idea of model accuracy:'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 了解模型准确度：
- en: '[PRE85]'
  id: totrans-335
  prefs: []
  type: TYPE_PRE
  zh: '[PRE85]'
- en: For the first eight predictions, we see how well the model performed. We can
    get overall accuracy by taking the entire validation set and computing the average.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 对于前八个预测，我们看到了模型的表现如何。我们可以通过取整个验证集并计算平均值来获得整体准确率。
- en: Summary
  id: totrans-337
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We learned through examples how to work with TFDSs. We also trained on Fashion-MNIST
    and beans data for practice with TFDSs.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 通过示例，我们学习了如何使用 TFDSs。我们还使用 Fashion-MNIST 和豆类数据进行了练习，以熟悉 TFDSs。
