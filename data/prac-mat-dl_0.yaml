- en: '**8.4**'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.4**'
- en: '**Mapping Sentences to Numbers**'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: '**将句子映射到数字**'
- en: '**8.4.1 Problem**'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.4.1 问题**'
- en: We want to map words in sentences to unique numbers.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望将句子中的单词映射到唯一的数字。
- en: '**8.4.2 Solution**'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.4.2 解决方案**'
- en: Write a MATLAB function to search through text and assign a unique number to
    each word.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个MATLAB函数，用于搜索文本并为每个单词分配一个唯一的数字。
- en: This approach will have problems with homonyms.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法将会有同音异义词的问题。
