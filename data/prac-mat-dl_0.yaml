- en: '**9.5**'
  id: totrans-3192
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.5**'
- en: '**Building the Camera Model**'
  id: totrans-3193
  prefs: []
  type: TYPE_NORMAL
  zh: '**构建相机模型**'
- en: '**9.5.1 Problem**'
  id: totrans-3194
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.5.1 问题**'
- en: We want to build a camera model for our deep learning system. We want a model
    that emulates the function of a drone-mounted camera. Ultimately, we will use
    this camera model as part of a terrain-based navigation system, and we’ll apply
    deep learning techniques to do terrain navigation.
  id: totrans-3195
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望为我们的深度学习系统构建一个相机模型。我们希望这个模型能够模拟无人机搭载相机的功能。最终，我们将使用这个相机模型作为地形导航系统的一部分，并应用深度学习技术进行地形导航。
- en: '**9.5.2 Solution**'
  id: totrans-3196
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.5.2 解决方案**'
- en: We will model a pinhole camera and create a high-altitude aircraft. A pinhole
    camera is a lowest-order approximation to a real optical system. We’ll then build
    the simulation and demonstrate the camera.
  id: totrans-3197
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将模拟一个针孔相机并创建一个高空飞机。针孔相机是真实光学系统的最低阶近似。然后我们将构建模拟并展示相机。
- en: '188'
  id: totrans-3198
  prefs: []
  type: TYPE_NORMAL
  zh: '188'
