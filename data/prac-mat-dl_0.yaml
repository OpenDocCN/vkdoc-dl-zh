- en: '**8.6**'
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.6**'
- en: '**Training and Testing**'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: '**训练和测试**'
- en: '**8.6.1 Problem**'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.6.1 问题**'
- en: We want to build a deep learning system to complete sentences. The idea is that
    the full database of correct and incorrect sentences provides enough information
    for the neural net to determine which word is the correct word for the sentence.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望构建一个深度学习系统来完成句子。想法是完整的正确和错误句子数据库为神经网络提供了足够的信息来确定句子中哪个单词是正确的。
- en: '**8.6.2 Solution**'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.6.2 解决方案**'
- en: Write a MATLAB script to implement an LSTM to classify the sentences as correct
    or incorrect.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个MATLAB脚本来实现一个LSTM以将句子分类为正确或错误。
- en: The LSTM will be trained with complete sentences. No information about the words,
    such as whether a word is noun, verb, or adjective, nor of any grammatical structure
    will be used.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM将使用完整的句子进行训练。不会使用关于单词的信息，例如一个单词是否是名词、动词或形容词，也不会使用任何语法结构的信息。
