- en: CHAPTER 8
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 第八章
- en: COMPLETING SENTENCES
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 完成句子
- en: '**8.6.3 How It Works**'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.6.3 它是如何工作的**'
- en: We will produce the simplest possible design. It will read in sentences, classified
    as correct or incorrect, and attempt to determine if new sentences are correct
    or incorrect just from the learned patterns. This is a very simple and crude approach.
    We aren’t taking advantage of our knowledge of grammar, word types (verb, noun,
    etc.), or context to help with the predictions.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将产生最简单的可能设计。它将读取句子，分类为正确或错误，并尝试仅从学习到的模式中确定新句子是否正确或错误。这是一个非常简单且粗略的方法。我们没有利用我们对语法、词性（动词、名词等）或上下文的知识来帮助预测。
- en: Language modeling is a huge field, and we are not using any results from that
    body of work. Of course, applications of all of the rules of grammar don’t necessarily
    ensure success; otherwise, there would be more 800s on the SAT verbal tests. We’ll
    show two different sets of layers. The first will produce a good fit, and the
    second will overfit.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型是一个巨大的领域，我们没有使用该领域的工作成果。当然，应用所有语法规则并不一定保证成功；否则，SAT语言测试中会有更多的800分。我们将展示两组不同的层。第一组将产生良好的拟合，第二组将过拟合。
- en: We use the same code as the previous recipe to make sure the sequences are valid.
    We use a clear all so that the sentences are always the same.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用与上一个菜谱相同的代码来确保序列有效。我们使用clear all以确保句子始终相同。
