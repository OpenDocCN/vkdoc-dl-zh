- en: '**9.5.3 How It Works**'
  id: totrans-3206
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.5.3 工作原理**'
- en: We’ve already created an aircraft simulation in Recipe [9.2\.](#p187) The addition
    will be the terrain model and the camera model. A pinhole camera is shown in Figure
    [9.8\.](#p203) A pinhole camera has an infinite depth of field, and the images
    are rectilinear.
  id: totrans-3207
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经在菜谱 [9.2\.](#p187) 中创建了一个飞机模拟。新增的内容将是地形模型和相机模型。针孔相机在图 [9.8\.](#p203) 中展示。针孔相机具有无限深的景深，图像是直线的。
- en: A point *P* ( *x, y, z*) is mapped to the imaging plane by the relationships
    *f x*
  id: totrans-3208
  prefs: []
  type: TYPE_NORMAL
  zh: 点 *P* ( *x, y, z*) 通过关系 *f x* 被映射到成像平面上
- en: '*u* = *h*'
  id: totrans-3209
  prefs: []
  type: TYPE_NORMAL
  zh: '*u* = *h*'
- en: (9.15)
  id: totrans-3210
  prefs: []
  type: TYPE_NORMAL
  zh: (9.15)
- en: '*f y*'
  id: totrans-3211
  prefs: []
  type: TYPE_NORMAL
  zh: '*f y*'
- en: '*v* = *h*'
  id: totrans-3212
  prefs: []
  type: TYPE_NORMAL
  zh: '*v* = *h*'
- en: (9.16)
  id: totrans-3213
  prefs: []
  type: TYPE_NORMAL
  zh: (9.16)
- en: where *u* and *v* are coordinates in the focal plane, *f* is the focal length,
    and *h* is the distance from the pinhole to the point along the axis normal to
    the focal plane. This assumes that the *z*-axis of the coordinate frame *x, y,
    z* is aligned with the boresight of the camera. The angle that is seen by the
    imaging chip is
  id: totrans-3214
  prefs: []
  type: TYPE_NORMAL
  zh: 其中*u*和*v*是焦平面内的坐标，*f*是焦距，*h*是从针孔到焦平面法线方向的点的距离。这假设坐标系的*z*轴与相机的瞄准线对齐。成像芯片看到的角是
- en: '*w*'
  id: totrans-3215
  prefs: []
  type: TYPE_NORMAL
  zh: '*w*'
- en: '*θ* = tan *−* 1 2 *f*'
  id: totrans-3216
  prefs: []
  type: TYPE_NORMAL
  zh: '*θ* = tan *−* 1/2 *f*'
- en: (9.17)
  id: totrans-3217
  prefs: []
  type: TYPE_NORMAL
  zh: (9.17)
- en: where *f* is the focal length. The shorter the focal length, the larger the
    image. The pinhole camera does not have any depth of field, but that is unimportant
    for this far-field imaging problem.
  id: totrans-3218
  prefs: []
  type: TYPE_NORMAL
  zh: 其中*f*是焦距。焦距越短，图像越大。针孔相机没有景深，但对于这个远场成像问题来说并不重要。
- en: The field of view of a pinhole camera is limited only by the sensing element.
    Most cameras have lenses, and the images are not perfect across the imaging array.
    This presents practical problems that need to be solved in real machine vision
    systems.
  id: totrans-3219
  prefs: []
  type: TYPE_NORMAL
  zh: 针孔相机的视场仅受传感元件的限制。大多数相机都有镜头，图像在整个成像阵列上并不完美。这给实际机器视觉系统带来了需要解决的问题。
- en: We want our camera to see 16 pixels by 16 pixels from the terrain image in Figure
    [9.7](#p202). We will assume a flight altitude of 10 km. Figure [9.9](#p204) gives
    the dimensions.
  id: totrans-3220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望我们的相机能够从图[9.7](#p202)中的地形图像中看到16像素x16像素。我们将假设飞行高度为10公里。图[9.9](#p204)给出了尺寸。
- en: We are not simulating a particular camera. Instead, our camera model is producing
    16 by 16 pixel maps given an input of a position. The output is a data structure
    with the *x* and *y* **Figure 9.8:** *Pinhole camera.*
  id: totrans-3221
  prefs: []
  type: TYPE_NORMAL
  zh: 我们并不是在模拟特定的相机。相反，我们的相机模型根据一个位置输入生成16x16像素的地图。输出是一个包含*x*和*y*的数据结构，**图9.8**：*针孔相机*。
