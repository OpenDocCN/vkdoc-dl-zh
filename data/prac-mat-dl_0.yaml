- en: '**Figure 9.2:** *Aircraft model showing lift, drag, and gravity.*'
  id: totrans-1892
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 9.2：** *显示升力、阻力和重力的飞机模型。*'
- en: where *v* is the true airspeed, *T* is the thrust, *L* is the lift, *g* is the
    acceleration of gravity, *γ* is the air-relative flight path angle, *ψ* is the
    air-relative heading (measured clockwise from North), *φ*
  id: totrans-1893
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *v* 是真实空速，*T* 是推力，*L* 是升力，*g* 是重力加速度，*γ* 是空气相对飞行路径角，*ψ* 是空气相对航向（从北开始顺时针测量），*φ*
- en: is the bank angle, *x* and *y* are the East and North positions, respectively,
    and *h* is the altitude.
  id: totrans-1894
  prefs: []
  type: TYPE_NORMAL
  zh: 是偏航角，*x* 和 *y* 分别是东向和北向位置，*h* 是高度。
- en: The mass is the total of dry mass and fuel mass. The terms *{fv, fγ, fψ}* represent
    additional forces due to modeling uncertainty, and the terms *{Wx, Wy, Wh}* are
    wind speed components.
  id: totrans-1895
  prefs: []
  type: TYPE_NORMAL
  zh: 质量是干重和燃料重的总和。术语 *{fv, fγ, fψ}* 代表由于建模不确定性产生的附加力，而术语 *{Wx, Wy, Wh}* 是风速分量。
- en: If the vertical wind speed is zero, then *γ* = 0 produces level flight. *α*,
    *φ*, and *T* are the controls.
  id: totrans-1896
  prefs: []
  type: TYPE_NORMAL
  zh: 如果垂直风速为零，则 *γ* = 0 产生平飞。*α*、*φ* 和 *T* 是控制。
- en: Figure [9.2](#p189) shows the longitudinal symbols for the aircraft. *γ* is
    the angle between the velocity vector and local horizontal. *α* is the angle of
    attack which is between the nose of the aircraft and the velocity vector. The
    wings may be oriented, or have airfoils, that give lift at zero angles of attack.
    Drag is opposite velocity and lift is perpendicular to drag. Lift must balance
    gravity and any downward component of drag; otherwise, the aircraft will descend.
  id: totrans-1897
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9.2](#p189) 展示了飞机的纵向符号。*γ* 是速度矢量和局部水平之间的角度。*α* 是攻角，即飞机机头和速度矢量之间的角度。机翼可以定向，或者有提供升力的空气foil，在零攻角时也能产生升力。阻力与速度相反，升力与阻力垂直。升力必须平衡重力以及任何向下的阻力分量；否则，飞机将下降。
- en: We are using a very simple aerodynamic model. The lift coefficient is defined
    as *cL* = *cL α*
  id: totrans-1898
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在使用一个非常简单的空气动力学模型。升力系数定义为 *cL* = *cL α*
- en: '*α*'
