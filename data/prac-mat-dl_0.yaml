- en: The layers were designed to get a well-fitted training. As the training plot
    shows, the validation error is the same as the training error. Because we have
    access to full sequences at prediction time, we use a bidirectional LSTM layer
    in the network. A bidirectional LSTM layer learns from the full sequence at each
    step. We use three BiLSTM layers with fully connected layers and dropouts in between.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 层的设计是为了获得良好的训练效果。如图所示，验证误差与训练误差相同。因为我们可以在预测时访问完整的序列，所以我们使用网络中的双向LSTM层。双向LSTM层在每个步骤中都从完整的序列中学习。我们使用三个BiLSTM层，层间有全连接层和dropout。
