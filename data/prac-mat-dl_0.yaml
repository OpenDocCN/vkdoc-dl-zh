- en: CHAPTER 9
  id: totrans-1952
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章
- en: TERRAIN-BASED NAVIGATION
  id: totrans-1953
  prefs: []
  type: TYPE_NORMAL
  zh: 基于地形的导航
- en: The dynamic pressure, the pressure due to the motion of the aircraft, is 1
  id: totrans-1954
  prefs: []
  type: TYPE_NORMAL
  zh: 动压，由于飞机运动产生的压力，是 1
- en: '*q* = *ρv* 2'
  id: totrans-1955
  prefs: []
  type: TYPE_NORMAL
  zh: '*q* = *ρv* 2'
- en: '2'
  id: totrans-1956
  prefs: []
  type: TYPE_NORMAL
  zh: '2'
- en: (9.10)
  id: totrans-1957
  prefs: []
  type: TYPE_NORMAL
  zh: (9.10)
- en: where *v* is the speed and *ρ* is the atmospheric density. This is the pressure
    on your hand if you stick it out of the window of a moving car. The lift and drag
    forces are *L* = *qcLs*
  id: totrans-1958
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *v* 是速度，*ρ* 是大气密度。这是如果你将手伸出移动汽车的车窗时手上的压力。升力和阻力是 *L* = *qcLs*
- en: (9.11)
  id: totrans-1959
  prefs: []
  type: TYPE_NORMAL
  zh: (9.11)
- en: '*D* = *qcDs*'
  id: totrans-1960
  prefs: []
  type: TYPE_NORMAL
  zh: '*D* = *qcDs*'
- en: (9.12)
  id: totrans-1961
  prefs: []
  type: TYPE_NORMAL
  zh: (9.12)
- en: where *s* is the wetted area. The wetted area is the surface of the aircraft
    that produces lift and drag. We make it the same for lift and drag, but in a real
    aircraft some parts of the aircraft cause drag (like the nose) but don’t produce
    any lift. In essence, we assume the aircraft is all wing.
  id: totrans-1962
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *s* 是湿面积。湿面积是产生升力和阻力的飞机表面。我们将其设置为升力和阻力相同，但在真实飞机中，一些飞机部分（如机头）会产生阻力但不会产生任何升力。本质上，我们假设飞机全部是机翼。
- en: We create a right-hand-side function for the model. This will be called by the
    numerical integration function. The following has the dynamical model.
  id: totrans-1963
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为模型创建一个右手边函数。这将由数值积分函数调用。以下有动力学模型。
