- en: '**8.5**'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.5**'
- en: '**Converting the Sentences**'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: '**转换句子**'
- en: '**8.5.1 Problem**'
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.5.1 问题**'
- en: We want to convert the sentences to numeric sequences.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望将句子转换为数字序列。
- en: '**8.5.2 Solution**'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.5.2 解决方案**'
- en: Write a MATLAB script to take each sentence in our database, add the words,
    and create a sequence. Each sentence is classified as correct or incorrect.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个 MATLAB 脚本来读取数据库中的每个句子，添加单词，并创建一个序列。每个句子都被分类为正确或错误。
- en: '**8.5.3 How It Works**'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.5.3 如何工作**'
- en: The script reads in the database. It creates a numeric dictionary for all of
    the sentences and then converts them to numbers. The numeric data is then saved
    to a mat-file for easy access later. This first part of the script creates 5200
    sentences. Each sentence is classified as correct or incorrect. Note how we initialize
    a string array.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本读取数据库。它为所有句子创建一个数字字典，然后将它们转换为数字。然后将数字数据保存到 mat 文件中，以便以后方便访问。脚本的第一部分创建了 5200
    个句子。每个句子都被分类为正确或错误。注意我们如何初始化一个字符串数组。
