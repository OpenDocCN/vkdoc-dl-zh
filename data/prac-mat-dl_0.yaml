- en: '**9.4.3 How It Works**'
  id: totrans-3107
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.4.3 工作原理**'
- en: The preceding terrain code would work well for an orbiting satellite, but not
    so well for a drone.
  id: totrans-3108
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的地形代码对于轨道卫星来说效果很好，但对于无人机来说则不太理想。
- en: Per FAA regulations, the maximum altitude for small unmanned aircraft is 400
    feet or about 122
  id: totrans-3109
  prefs: []
  type: TYPE_NORMAL
  zh: 根据美国联邦航空管理局（FAA）的规定，小型无人机的最大飞行高度为400英尺或约122米
- en: meters. A satellite in a low Earth orbit (LEO) typically has an altitude of
    300–500 km. Thus, drones are typically about 2500–4000 times closer to the surface
    than a satellite! We take the code and specialize it to read in just four images.
    It is much simpler than CreateTerrain and is less flexible. If you want to change
    it, you will need to change the code in the file.
  id: totrans-3110
  prefs: []
  type: TYPE_NORMAL
  zh: 米。低地球轨道（LEO）中的卫星通常高度为300-500公里。因此，无人机通常比卫星更接近地面约2500-4000倍！我们取代码并专门化以只读取四张图像。它比CreateTerrain简单得多，而且灵活性较低。如果您想修改它，您需要修改文件中的代码。
