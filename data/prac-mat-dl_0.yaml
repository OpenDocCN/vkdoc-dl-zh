- en: '**9.6.2 Solution**'
  id: totrans-3533
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.6.2 解决方案**'
- en: Create a function to draw the image and plot the trajectory on top.
  id: totrans-3534
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来绘制图像并在其上方绘制轨迹。
- en: '**9.6.3 How It Works**'
  id: totrans-3535
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.6.3 工作原理**'
- en: We write a function that reads in an image and plots the trajectory on top.
    We scale the image using image. The *x*-dimension is set and the *y*-dimension
    is scaled to match.
  id: totrans-3536
  prefs: []
  type: TYPE_NORMAL
  zh: 我们编写一个函数，读取图像并在其上方绘制轨迹。我们使用 image 函数缩放图像。*x* 维度被设置，而 *y* 维度被缩放以匹配。
