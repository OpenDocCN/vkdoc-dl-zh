- en: Figure [8.2](#p185) shows training. As the training progresses, the validation
    loss continues. Because it is higher than the training loss, we see that we are
    overfitting, that is, we have too many neurons. Our training accuracy is over
    73%. The training loss continues to improve, and the validation accuracy gets
    worse. The accuracy is worse than the case with the good fitting.
  id: totrans-1816
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2 [8.2](#p185)显示了训练过程。随着训练的进行，验证损失持续。因为它高于训练损失，所以我们看到我们过拟合了，也就是说，我们有很多神经元。我们的训练准确率超过73%。训练损失持续改善，而验证准确率变差。准确率比拟合良好的情况更差。
- en: However, this network will classify sentences as correct, instead of just declaring
    them all wrong and getting the default 80% accuracy. In that way, it is an improvement
    though you still wouldn’t want to use it as an SAT aid.
  id: totrans-1817
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这个网络将句子分类为正确，而不是简单地声明它们全部错误并得到默认的80%准确率。尽管如此，这仍然是一种改进，但你仍然不想将其用作SAT辅助工具。
