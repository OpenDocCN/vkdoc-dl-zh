- en: CHAPTER 8
  id: totrans-1347
  prefs: []
  type: TYPE_NORMAL
  zh: CHAPTER 8
- en: COMPLETING SENTENCES
  id: totrans-1348
  prefs: []
  type: TYPE_NORMAL
  zh: COMPLETING SENTENCES
- en: Our second neural net has a different structure. We have two BiLSTM layers without
    the fully connected layer in between. Both biLSTM have the same number of hidden
    units. This was found after trying many different combinations.
  id: totrans-1349
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的第二个神经网络结构不同。我们有两个BiLSTM层，中间没有全连接层。两个BiLSTM层具有相同数量的隐藏单元。这是在尝试了许多不同的组合后发现的。
- en: The training code follows. We convert the classes, 0 and 1, to a categorical
    variable.
  id: totrans-1350
  prefs: []
  type: TYPE_NORMAL
  zh: 训练代码如下。我们将类别0和1转换为分类变量。
