- en: rho = 1.225***exp**(-0.0817*hˆ1.15);
  id: totrans-2091
  prefs: []
  type: TYPE_NORMAL
  zh: rho = 1.225***exp**(-0.0817*hˆ1.15);
- en: We want to maintain a force balance so that the speed of the aircraft is constant
    and the aircraft does not change its flight path angle. For example, in level
    flight the aircraft would not ascend or descend. We need to control the aircraft
    in level flight so that the velocity stays constant and *γ* = 0 for any *φ*. The
    relevant equations are 0 = *T* cos *α − D*
  id: totrans-2092
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望保持力平衡，以便飞机的速度保持恒定，飞机不改变其飞行路径角度。例如，在平飞时，飞机不会上升或下降。我们需要控制飞机在平飞中，使速度保持恒定，*γ*
    = 0 对于任何 *φ*。相关方程是 0 = *T* cos *α − D*
- en: (9.13)
  id: totrans-2093
  prefs: []
  type: TYPE_NORMAL
  zh: (9.13)
- en: 0 = ( *L* + *T* sin *α*) cos *φ − mg*
  id: totrans-2094
  prefs: []
  type: TYPE_NORMAL
  zh: 0 = ( *L* + *T* sin *α*) cos *φ − mg*
- en: (9.14)
  id: totrans-2095
  prefs: []
  type: TYPE_NORMAL
  zh: (9.14)
- en: We need to find *T* and *α* given *φ*.
  id: totrans-2096
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要根据 *φ* 找到 *T* 和 *α*。
- en: A simple way is to use fminsearch. It will call RHSPointMassAircraft and numerically
    find controls that, for a given *ψ*, *h* and *v* have zero time derivatives. The
    following code finds the equilibrium angle of attack and thrust. RHS is called
    by fminsearch. It returns a scalar cost that is a quadratic of the acceleration
    (time derivative of velocity) and a derivative of the flight path angle. Our initial
    guess is a value of thrust that balances the drag. Even with an angle of attack
    guess of zero, it converges with the default set of parameters opt =
  id: totrans-2097
  prefs: []
  type: TYPE_NORMAL
  zh: 一种简单的方法是使用 fminsearch。它将调用 RHSPointMassAircraft 并数值地找到控制量，对于给定的 *ψ*，*h* 和 *v*，使时间导数为零。以下代码找到平衡攻角和推力。RHS
    由 fminsearch 调用。它返回一个标量成本，它是加速度（速度的时间导数）和飞行路径角度的导数的二次函数。我们的初始猜测是平衡阻力的推力值。即使攻角猜测为零，它也会使用默认参数集
    opt =
- en: optimset(’fminsearch’).
  id: totrans-2098
  prefs: []
  type: TYPE_NORMAL
  zh: optimset(’fminsearch’).
