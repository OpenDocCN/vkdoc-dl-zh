- en: CHAPTER 9
  id: totrans-2618
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章
- en: TERRAIN-BASED NAVIGATION
  id: totrans-2619
  prefs: []
  type: TYPE_NORMAL
  zh: 基于地形导航
- en: '**9.3**'
  id: totrans-2620
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.3**'
- en: '**Generating Terrain**'
  id: totrans-2621
  prefs: []
  type: TYPE_NORMAL
  zh: '**生成地形**'
- en: '**9.3.1 Problem**'
  id: totrans-2622
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.3.1 问题**'
- en: We want to create an artificial terrain model from a set of terrain “tiles.”
    A tile is a segment of terrain from a bigger picture, much like bathroom tiles
    make up a bathroom wall, unless, of course, you have the modern fiberglass shower.
  id: totrans-2623
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望从一组地形“瓦片”中创建一个人工地形模型。瓦片是从更大图片中截取的地形片段，就像浴室瓷砖组成浴室墙壁一样，除非，当然，你有一个现代的玻璃纤维淋浴间。
- en: '**9.3.2 Solution**'
  id: totrans-2624
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.3.2 解答**'
- en: Find images of terrain and tile them together. There are many sources of terrain
    tiles. Google Earth is one.
  id: totrans-2625
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找地形图像并将它们拼接在一起。有许多地形瓦片来源。谷歌地球是其中之一。
- en: '**9.3.3 How It Works**'
  id: totrans-2626
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.3.3 工作原理**'
- en: We start by compiling a database of terrain tiles. We have them in the folder
    terrain in our MATLAB package. A segment of the terrain folder is shown in Figure
    [9.5](#p196). This is just one way to get terrain tiles. There are online sources
    for downloading tiles. Also, many flight simulator games have extensive terrain
    libraries. The name of the folder is latitude longitude.
  id: totrans-2627
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先编译一个地形瓦片数据库。我们在 MATLAB 软件包的 terrain 文件夹中拥有它们。地形文件夹的一部分如图 [9.5](#p196) 所示。这只是获取地形瓦片的一种方式。还有在线资源可以下载瓦片。此外，许多飞行模拟器游戏都有广泛的地面库。文件夹的名称是纬度经度。
- en: For example, -10-10 is *−* 10 degrees latitude and *−* 10 degrees longitude.
    Our database only extends to *±* 60 degrees latitude. The first block creates
    a list of the folders in terrain. An important thing with this code is that your
    script needs to be in the correct directory. We don’t do any fancy directory searching.
  id: totrans-2628
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，-10-10是*−* 10度纬度和*−* 10度经度。我们的数据库只扩展到*±* 60度纬度。第一个代码块创建了一个地形文件夹列表。这个代码的一个重要特点是，你的脚本需要位于正确的目录中。我们不做任何复杂的目录搜索。
- en: '**Figure 9.5:** *A segment of the terrain folder.*'
  id: totrans-2629
  prefs: []
  type: TYPE_NORMAL
  zh: '**图9.5：** *地形文件夹的一段。*'
