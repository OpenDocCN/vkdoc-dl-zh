- en: CHAPTER 8
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 第八章
- en: COMPLETING SENTENCES
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: COMPLETING SENTENCES
- en: '**8.3**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.3**'
- en: '**Creating a Numeric Dictionary**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**创建数字字典**'
- en: '**8.3.1 Problem**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.3.1 问题**'
- en: We want to create a numeric dictionary to speed neural net training. This eliminates
    the need for string matching during the training process. Expressing a sentence
    as a numeric sequence as opposed to a sequence of character arrays (words) essentially
    gives us a more efficient way to represent the sentence. This will become useful
    later when we perform machine learning over a database of sentences to learn valid
    and invalid sequences.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望创建一个数字字典以加快神经网络训练的速度。这消除了在训练过程中进行字符串匹配的需要。将句子表示为数字序列，而不是字符数组（单词）的序列，本质上为我们提供了一种更有效的方式来表示句子。这将在我们稍后对句子数据库执行机器学习以学习有效和无效序列时变得有用。
- en: '**8.3.2 Solution**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.3.2 解决方案**'
- en: Write a MATLAB function to search through text and find unique words.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个MATLAB函数来搜索文本并找到唯一的单词。
- en: '**8.3.3 How It Works**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.3.3 工作原理**'
- en: The function removes punctuation using erase in the following lines of code.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数使用erase在以下代码行中移除标点符号。
