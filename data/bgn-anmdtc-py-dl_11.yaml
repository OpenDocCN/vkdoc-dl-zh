- en: An illustration of a smart home with ten different smart devices connected to
    a mobile device.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 展示了一个智能家居的插图，其中连接了十个不同的智能设备到移动设备。
- en: Figure 11-17
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-17
- en: Smart home with a depiction of all connected smart devices
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 展示所有连接的智能设备的智能家居
- en: Retail
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 零售
- en: The retail industry uses anomaly detection algorithms for various use cases,
    such as to detect anomalies in the efficiency of the supply chain in terms of
    distribution of goods and services. Also interesting are the returns that happen
    all the time from customers because returned goods are tricky sometimes and it
    costs less to sell them in a clearance sale than to restock.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 零售业使用异常检测算法用于各种用例，例如检测商品和服务分销效率中的异常。同样有趣的是，顾客经常发生的退货，因为有时退货商品很棘手，以清仓销售的方式出售它们比重新进货成本低。
- en: Looking at customer sales is also critical both in terms of revenue generated
    by sales and in terms of planning future products and sales strategies, especially
    when it comes to targeting consumers better. If incoming sales do not match up
    with predicted sales (by modeling normal sales data, which may or may not be accounting
    for an upward growth trend), then it is important to know so that product orders
    can be adjusted to avoid over- or undersupply.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 从客户销售的角度来看，在收入生成和规划未来产品和销售策略方面都至关重要，尤其是在针对消费者方面。如果实际销售与预测销售（通过建模正常销售数据，这些数据可能或可能没有考虑到上升趋势）不匹配，那么了解这一点很重要，以便可以调整产品订单以避免供过于求或供不应求。
- en: Figure [11-18](#Fig18) show the historical sales figures of a product.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-18](#Fig18) 显示了产品的历史销售数据。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig18_HTML.jpg)'
  id: totrans-170
  prefs: []
  type: TYPE_IMG
