  zh: 展示了 oleum 储存和 Alpine 储存经过多个阶段，到混合罐，再到锅炉，然后移动到粉末储存，在那里它与过硼酸钠结合，然后到包装。光谱功率与波长的图有两条正常曲线和一条波动曲线。
