- en: Manufacturing
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 制造业
- en: Anomaly detection is also being used heavily in manufacturing sector. Specifically,
    since most of the manufacturing nowadays involves robots and a lot of automation,
    anomaly detection can be used to detect malfunctions or impending failure of parts
    of the manufacturing system.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测在制造业中也得到了广泛的应用。具体来说，由于现在大多数制造业都涉及机器人和大量自动化，异常检测可以用来检测制造系统各部分的故障或即将发生的故障。
- en: In the manufacturing industry, because of all the automation that is happening,
    there is a lot of emphasis on various kinds of sensors and other types of metrics
    being collected in real time or near real time. This data can be used to build
    a sophisticated anomaly detection model to try to detect if there is any impending
    problem that will be seen very soon in the plant or the manufacturing cycle.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在制造业，由于正在发生的所有自动化，对各种类型的传感器和其他实时或近实时收集的指标非常重视。这些数据可以用来构建一个复杂的异常检测模型，试图检测工厂或制造周期中是否即将出现任何问题。
- en: Another example of how anomaly detection can be used is the case of oil and
    natural gas platforms. An oil and natural gas platform typically has thousands
    of components all interconnected in various ways to make the plant functional.
    All these components can be monitored using sensors that do specific measurements
    of the various parameters of the components to which the sensors are attached.
    All these sensors can be part of an Internet of Things (IoT) platform. Collecting
    all the sensor output from all the thousands of sensors that are attached to the
    thousands of components over a long period of time makes it possible to train
    sophisticated anomaly detection models such as autoencoders, LSTMs, TCNs, and
    transformers.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测可以应用的另一个例子是石油和天然气平台的案例。一个石油和天然气平台通常有数千个组件，它们以各种方式相互连接，使工厂能够运行。所有这些组件都可以通过传感器进行监控，这些传感器对传感器所连接的组件的各种参数进行特定测量。所有这些传感器都可以是物联网（IoT）平台的一部分。收集所有数千个传感器在数千个组件上附着的传感器在长时间内的所有传感器输出，使得训练复杂的异常检测模型，如自动编码器、LSTMs、TCNs
    和变压器成为可能。
- en: Figure [11-16](#Fig16) shows a manufacturing plant with sensor readings
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-16](#Fig16) 展示了一个带有传感器读数的制造厂。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig16_HTML.png)'
