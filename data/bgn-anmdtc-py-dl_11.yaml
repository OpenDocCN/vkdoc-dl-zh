- en: Historical sales figures of a product
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 产品的历史销售数据
- en: Implementation of Deep Learning–Based Anomaly Detection
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于深度学习的异常检测实施
- en: 'Given all the use cases in all the different industries, a small sampling of
    which were presented in the previous sections, the key steps in establishing an
    anomaly detection practice in your organization or business are as follows:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到所有不同行业中的所有用例，其中一些在上一节中已介绍，在你的组织或业务中建立异常检测实践的关键步骤如下：
- en: Identifying business use case and getting aligned on the expectations
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定业务用例并就期望达成一致
- en: Defining what data is available and understanding data and the nature of the
    data itself
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义可用的数据以及理解数据和数据本身的性质
- en: Establishing the processes to consume the data in order to process it
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立消耗数据以进行处理的过程
- en: Establishing the type of models to use
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定要使用的模型类型
- en: Discussing strategy of how the models will be used and executed
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论模型的使用和执行策略
- en: Investigating the results and feedback analysis as it effects the business
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调查结果和反馈分析对其业务的影响
- en: Operationalizing the model used in the day-to-day activity of the business
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在日常业务活动中实施所使用的模型
- en: In particular, the focus should be on how the models are built and what type
    of models to use. The type of anomaly detection algorithm used affects pretty
    much everything that you are trying to get out of an anomaly detection strategy.
    This in turn depends on the type of data available, as well as whether the data
    is already labeled or identified. One of the factors that affects the decision
    as to what type of anomaly detection will work best for the specific use case
    is whether it is a point anomaly, a contextual anomaly, or a collective anomaly.
    Another important factor is whether the data is an instantaneous snapshot at some
    point in time or continuously evolving or ever changing real-time time-series
    data. Also important is whether the specific features or attributes of the data
    are categorical or numerical, nominal, ordinal, binary, discrete, or continuous.
    It is also very important to know if the data is being labeled already or if some
    sort of a hint is provided as to what this data is, since it could steer you in
    the direction of supervised, semi-supervised, or unsupervised algorithms.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其应该关注模型的构建方式和要使用哪种类型的模型。所使用的异常检测算法类型几乎影响你从异常检测策略中试图获得的一切。这反过来又取决于可用的数据类型，以及数据是否已经标记或识别。影响决定哪种类型的异常检测最适合特定用例的一个因素是它是否是点异常、上下文异常还是集体异常。另一个重要因素是数据是否是某个时间点的瞬时快照，或者是持续演变或不断变化的实时时间序列数据。数据的具体特征或属性是分类的或数值的、名义的、有序的、二元的、离散的还是连续的也非常重要。了解数据是否已经标记，或者是否提供了某种关于数据是什么的提示也很重要，因为这可能会引导你选择监督、半监督或无监督算法。
- en: 'Although the technologies and algorithms are available to be used, there are
    several key challenges to implementing an anomaly detection approach based on
    deep learning:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有技术和算法可供使用，但基于深度学习的异常检测方法实施中存在几个关键挑战：
- en: Integrating AI into existing processes and systems is difficult.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将人工智能集成到现有流程和系统中是困难的。
- en: The technologies and the expertise needed are expensive.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所需的技术和专业知识成本高昂。
- en: Leadership needs to be educated on what AI can and cannot do.
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 领导层需要了解人工智能能做什么和不能做什么。
- en: AI algorithms are not natively intelligent; rather, they learn by analyzing
    “good” data.
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能算法并非天生智能；相反，它们通过分析“优质”数据来学习。
- en: There is a need for change in “culture,” especially in large companies, who
    might be hesitant to adopt newer technologies or spend the resources needed to
    experiment, develop and integrate anomaly detection models using deep learning.
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在“文化”方面需要改变，尤其是在大型公司中，它们可能对采用新技术或投入实验、开发和集成深度学习异常检测模型所需的资源持谨慎态度。
- en: Future Trends
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来趋势
- en: 'The field of anomaly detection is developing at a rapid pace thanks to the
    rapid progress of deep learning technology. Furthermore, the world shows no signs
    of stopping in terms of interconnecting everything possible. The rate and scope
    of data collection and storage are higher than ever before, and deep learning
    models are becoming far more capable than ever before. Here are some state-of-the-art
    trends for anomaly detection:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 由于深度学习技术的快速发展，异常检测领域正在迅速发展。此外，世界在将所有可能的事物相互连接方面似乎没有停止的迹象。数据收集和存储的速度和范围比以往任何时候都要高，深度学习模型的能力也在以前所未有的速度增长。以下是异常检测的一些最先进趋势：
- en: '**Multimodal** **anomaly detection**: Anomaly detection algorithms are being
    trained on multiple data source types simultaneously, such as training on images
    and text data, training on audio-visual data, training on human posture and voice,
    and so on. A good example in finance is using the combination of stock price values,
    news sentiment, and online discussion to train anomaly detection algorithms for
    price fluctuations. The idea is that the model could gain a deeper, richer understanding
    of what normal price fluctuations look like. For example, assume that bad news
    comes out about a top company. Immediately, the stock price might drop due to
    user panic. The model can learn to understand that this is normal behavior based
    on the extra insights it gains from training on news articles, adding another
    layer of predictive capability. When deviations from the predictions occur, they
    are sure to be true, unexpected anomalies.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多模态** **异常检测**：异常检测算法正在同时训练多种数据源类型，例如在图像和文本数据上训练，在视听数据上训练，在人体姿态和声音上训练，等等。在金融领域的一个好例子是使用股价、新闻情绪和在线讨论的组合来训练异常检测算法以预测价格波动。其理念是模型可以更深入、更丰富地理解正常价格波动的样子。例如，假设一家顶级公司传出坏消息。立即，股价可能会因用户恐慌而下跌。模型可以学会理解这是正常行为，基于从新闻文章训练中获得的额外见解，增加了一层预测能力。当预测出现偏差时，它们一定是真实、意外的异常。'
- en: '**Edge computing**: Processing power continually grows. Some smartphones nowadays
    are more powerful than computers from a decade ago. There are already deep learning
    models that can be run on mobile devices. Anomaly detection might then take place
    in real time at the source itself. Examples could be **malware detection** (by
    identifying unusual app behavior), **user detection** (the phone can detect who
    is using it by analyzing various behavioral and usage patterns and personalize
    the experience), **health monitoring** (for people who hook up a medical device
    to their phone, the phone can continuously monitor health signals and detect possible
    abnormalities), **decentralized content recommendation**, and so on.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**边缘计算**：处理能力持续增长。如今的一些智能手机比十年前的电脑还要强大。已经有可以在移动设备上运行的深度学习模型。异常检测可能就会在源头本身实时进行。例如，可以是**恶意软件检测**（通过识别异常的应用行为），**用户检测**（手机可以通过分析各种行为和用法模式来检测谁在使用它，并个性化体验），**健康监测**（对于将医疗设备连接到手机的人，手机可以持续监测健康信号并检测可能的异常），**去中心化内容推荐**，等等。'
- en: Mobile phones are extremely common and are getting more and more powerful. Edge
    computing might become more prevalent, especially as computing costs get higher
    and data privacy concerns regarding centralized data collection increase. It might
    also be possible to see advanced algorithms like sequence modeling algorithms
    be trained on mobile devices too, allowing for personalized time-series forecasting
    for spending habits, budgeting, device usage, and so on that allow for detection
    of anomalies. For example, warning the user for using the phone way more than
    usual, or warning the user that they are spending far more than usual.
  id: totrans-194
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 手机极其普遍，并且变得越来越强大。随着计算成本的增加和数据隐私对集中式数据收集的担忧加剧，边缘计算可能会更加普遍。也可能看到像序列建模算法这样的高级算法在移动设备上训练，从而允许进行个性化的时间序列预测，例如消费习惯、预算、设备使用等，这有助于检测异常。例如，警告用户使用手机远超平常，或者警告用户他们花费远超平常。
- en: '**Few/zero-shot** **anomaly detection**: Some of the anomaly detection algorithms
    presented in this book are quite data hungry, such as the GAN and the transformer.
    However, what if algorithms could learn to detect anomalies with very little data,
    via few-shot or zero-shot learning? This is an ongoing field of research in deep
    learning and anomaly detection.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**少样本/零样本** **异常检测**：本书中介绍的一些异常检测算法相当“数据饥渴”，例如GAN和transformer。然而，如果算法能够通过少样本或零样本学习学会用很少的数据检测异常呢？这是深度学习和异常检测领域的一个持续研究课题。'
- en: '**Large language models (****LLMs)** **for anomaly detection**: LLMs can be
    tuned for a wide variety of language modeling tasks, such as summarizing works,
    generating text, coding, or discovering other patterns in text. As LLMs get more
    and more powerful, so does their potential to detect anomalies.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大型语言模型（LLMs）** **用于异常检测**：LLMs可以调整以执行各种语言建模任务，例如总结作品、生成文本、编码或发现文本中的其他模式。随着LLMs变得越来越强大，它们检测异常的潜力也在增加。'
- en: Examples include automated and intelligent content moderation (word filters
    tend to be a scorched-earth method, with high recall but terrible precision and
    harming more than they help), fake user review detection, and even a coding bug
    detector. Nearly every NLP task is now possible to perform at a superhuman level
    thanks to the power and scalability of LLMs. Although they are lacking in some
    aspects (such as logical reasoning), LLMs are sure to make tremendous progress
    in the coming years. If it’s not LLMs that dominate the language modeling space,
    a new type of model will succeed it.
  id: totrans-197
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例子包括自动和智能内容审核（词过滤器往往是一种极端的方法，具有高召回率但糟糕的精确度，并且弊大于利）、虚假用户评论检测，甚至编码错误检测器。几乎每个NLP任务现在都可以在超人类水平上执行，这得益于LLMs的强大功能和可扩展性。尽管它们在某些方面（如逻辑推理）存在不足，但LLMs在未来几年内肯定会在这些方面取得巨大进步。如果不是LLMs主导语言建模空间，那么一种新的模型类型将取而代之。
- en: '**Generative AI**: Deepfakes are getting extremely good and are almost in the
    realm of indistinguishability, at least to most human eyes. We need tools that
    detect deepfakes, in terms of both speech and video, so that we can protect people
    and their identities and fight misinformation. Unfortunately, this is an arms
    race that may eventually result in the generator winning, because once you get
    to the point where the generator perfectly replicates reality or at least becomes
    impossible to detect by a discriminator without too many false positives as in,
    the discriminator cannot detect generated deepfakes anymore without flagging too
    many real images. That being said, that is still a theoretical possibility and
    it’s not certain how easily achievable it is, so there is still some hope for
    now.'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成式AI**：深度伪造变得越来越逼真，几乎到了难以区分的程度，至少对大多数人类来说是这样。我们需要检测深度伪造的工具，无论是语音还是视频，这样我们才能保护人们及其身份，并对抗虚假信息。不幸的是，这可能会演变成一场军备竞赛，最终可能导致生成器获胜，因为一旦生成器完美地复制了现实，或者至少变得难以被鉴别器检测到（即，没有太多误报的情况下），鉴别器就无法再检测生成的深度伪造，而不会标记太多真实图像。话虽如此，这仍然是一个理论上的可能性，而且并不确定它有多容易实现，所以现在还有一些希望。'
- en: Another potential use case is the detection of copyrighted art styles in AI-generated
    art. A point of recent debate and legal action is that the data used to train
    some of the AI art generator models was obtained without the permission of the
    creators. Basically, these AI art generators are creating art using the style
    of the original creators and it is being distributed. While it’s too late now
    and there is no going back, at least these art pieces can be detected for potential
    legal action to take place.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个潜在的应用场景是检测AI生成艺术中的版权艺术风格。最近的一个争议和法律行动的焦点是，用于训练某些AI艺术生成模型的数据是在未经创作者许可的情况下获得的。基本上，这些AI艺术生成器正在使用原始创作者的风格创作艺术，并且正在分发。虽然现在为时已晚，无法回头，但至少这些艺术作品可以被检测出来，以便采取可能的法律行动。
- en: It is important to keep in mind that speculation on the future is almost always
    a fool’s gambit. There are some scenarios that are more likely than the others
    to occur, but the future is always uncertain. For all we know, someone might discover
    a new class of deep learning algorithms that that eclipses all cutting-edge models.
    Current modeling techniques may still be state-of-the-art for a while longer.
    Regardless, deep learning and the field of anomaly detection are continually evolving
    at an ever-increasing pace, and it is exciting to see these developments as they
    happen.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 需要牢记的是，对未来进行推测几乎总是徒劳之举。有些情景发生的可能性比其他情景更大，但未来总是不确定的。据我们所知，有人可能会发现一类新的深度学习算法，它将超越所有尖端模型。当前的建模技术可能在未来一段时间内仍然是尖端技术。无论如何，深度学习和异常检测领域正以不断加快的速度持续发展，看到这些发展过程是非常令人兴奋的。
- en: Summary
  id: totrans-201
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter discussed practical use cases of anomaly detection in the business
    landscape. You have seen how anomaly detection can be used to address real-life
    problems in many businesses. As mentioned in the chapter introduction, every business
    and use case is different, and we cannot copy and paste code and build a successful
    model to detect anomalies in any dataset, so this chapter covered many use cases
    to give you an idea of the possibilities and concepts behind the thought process.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了在商业环境中异常检测的实际应用案例。您已经看到异常检测如何被用来解决许多商业中的实际问题。正如章节引言中提到的，每个业务和用例都是不同的，我们无法复制粘贴代码并构建一个在任意数据集中检测异常的成功模型，因此本章涵盖了多个用例，以给您一个关于可能性以及思维过程背后概念的想法。
- en: Remember that this is an evolving field with continuous inventions of new algorithms
    and enhancements to the current algorithms, which means that in the future the
    algorithms will not look the same. Just a few years ago, the RNN was the best
    algorithm for time Series, but it was succeeded by the GRU and the LSTM (Chapter
    [8](483137_2_En_8_Chapter.xhtml)) as well as the TCN in some cases (Chapter [9](483137_2_En_9_Chapter.xhtml)).
    And in recent years, the transformer (Chapter [10](483137_2_En_10_Chapter.xhtml))
    has far outclassed LSTMs in various NLP tasks. Who knows what the future might
    hold? Even autoencoders have changed quite a bit; the traditional autoencoders
    have evolved into variational autoencoders (Chapter [6](483137_2_En_6_Chapter.xhtml)).
    The restricted Boltzmann machine, which was covered in the previous edition of
    this book, is no longer used much.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 记住这是一个不断发展的领域，新的算法不断被发明，现有算法也在不断改进，这意味着未来的算法将不会看起来一样。就在几年前，RNN 是时间序列的最佳算法，但随后被
    GRU 和 LSTM（第 [8](483137_2_En_8_Chapter.xhtml) 章）以及在某些情况下 TCN（第 [9](483137_2_En_9_Chapter.xhtml)
    章）所取代。而在近年来，transformer（第 [10](483137_2_En_10_Chapter.xhtml) 章）在各个自然语言处理任务中远远超过了
    LSTM。谁知道未来会怎样呢？甚至自动编码器也发生了很大的变化；传统的自动编码器已经演变成了变分自动编码器（第 [6](483137_2_En_6_Chapter.xhtml)
    章）。在前一版本书中提到的受限玻尔兹曼机，现在已很少被使用了。
