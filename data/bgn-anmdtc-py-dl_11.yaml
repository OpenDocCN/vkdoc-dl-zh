- en: 11. Practical Use Cases and Future Trends of Anomaly Detection
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 异常检测的实际用例和未来趋势
- en: In this chapter, you will learn about how anomaly detection can be used in several
    industry verticals. You will explore how anomaly detection techniques can be used
    to address practical use cases and address real-life problems in the business
    landscape. Every business and use case is different, and we cannot simply copy
    and paste code and build a successful model to detect anomalies in any dataset,
    so this chapter covers many use cases to give you an idea of the possibilities
    and concepts behind the thought process.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将了解异常检测如何在多个行业垂直领域中使用。你将探索如何使用异常检测技术来解决实际用例，并解决商业领域的现实问题。每个企业和用例都是不同的，我们无法简单地复制粘贴代码并在任何数据集中构建一个成功的模型来检测异常，因此本章涵盖了多个用例，以给你一个关于可能性以及思维过程背后的概念的想法。
