- en: Anomaly Detection
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 异常检测
- en: Anomaly detection involves finding patterns that do not adhere to what is considered
    as normal or expected behavior. Businesses could lose millions of dollars due
    to abnormal events. Consumers can also lose millions of dollars. In fact, there
    are many situations every day where people’s lives are at risk and where their
    property is at risk. If your bank account gets cleaned out, that’s a problem.
    If your water line breaks, flooding your basement, that’s a problem. If all flights
    at an airport get delayed due to a technical glitch in the traffic control system,
    that’s a problem. If you have a health issue that is misdiagnosed or not diagnosed
    at all, that’s a very big problem that directly impacts your well-being.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测涉及寻找不符合被认为是正常或预期行为模式的模式。企业可能会因为异常事件而损失数百万美元。消费者也可能损失数百万美元。事实上，每天都有许多情况，人们的生活和财产处于危险之中。如果你的银行账户被清空，那是个问题。如果你的水管破裂，导致地下室被淹，那也是个问题。如果机场的所有航班因为交通控制系统中的技术故障而延误，那也是个问题。如果你有一个被误诊或根本未诊断的健康问题，那是一个非常严重的问题，它直接影响到你的健康。
- en: Figure [11-1](#Fig1) shows an example of an anomaly, a smiling rainbow-colored
    fish in a school of frowning blue fish.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-1](#Fig1) 展示了一个异常的例子，一群皱眉的蓝色鱼中有一条微笑的彩虹色鱼。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig1_HTML.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig1_HTML.jpg)'
- en: An illustration features 9 fish arranged in 3 rows and 3 columns, with a smiling
    and rainbow-colored fish at the center.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图展示了9条鱼，排列成3行3列，中心是一条微笑着、彩虹色的鱼。
- en: Figure 11-1
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-1
- en: An anomalous rainbow-colored smiling fish among a group of frowning blue fish
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在一群皱眉的蓝色鱼中，有一条异常的彩虹色微笑的鱼
- en: In business use cases, everything is centered on data, and in this context anomaly
    detection is the identification of abnormal data points, events, or observations
    that raise suspicion because they differ significantly from the data perceived
    as normal or typical. Many types of such anomalies can impact the business operations
    or bottom line significantly, which is why anomaly detection is gaining a lot
    of traction in the industry and many businesses are investing heavily in technologies
    that can help them identify abnormal behavior before it is too late. Such proactive
    anomaly detection is becoming more and more visible, and new technologies developed
    as part of the AI revolution are helping to detect anomalies faster and in ways
    never possible before.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业用例中，一切都是以数据为中心，在这个背景下，异常检测就是识别异常数据点、事件或观察结果，因为这些结果与被认为是正常或典型数据有显著差异，引起了怀疑。许多这样的异常类型可能会对商业运营或底线产生重大影响，这就是为什么异常检测在行业中越来越受欢迎，许多企业都在大量投资于可以帮助他们在事情变得太晚之前识别异常行为的技术。这种主动的异常检测越来越明显，作为人工智能革命的一部分开发的新技术正在帮助更快地检测异常，以及以前从未可能的方式。
- en: Figure [11-2](#Fig2) is an example of the daily number of cars that cross the
    Golden Gate Bridge in San Francisco.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-2](#Fig2) 是旧金山金门大桥每天通过的汽车数量的一个例子。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig2_HTML.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig2_HTML.jpg)'
- en: A graph of cars crossing the Golden Gate Bridge versus month from January to
    July. The graph has a fluctuating curve with a peak between May and June.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 从一月到七月穿越金门大桥的汽车数量与月份的图表。图表有一个在五月和六月之间的波动曲线。
- en: Figure 11-2
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-2
- en: Daily count of cars crossing the Golden Gate Bridge over time. The anomalous
    spike in the data is highlighted
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 随时间推移穿越金门大桥的汽车每日计数。数据中的异常峰值被突出显示
- en: The kind of anomaly detection that could potentially help some arbitrary business
    avoid losses due to anomalies depends very much on the type of data that is collected
    as part of business operations as well as the assortment of techniques and algorithms
    used as part of the strategy to perform anomaly detection.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 能够帮助某些任意业务避免因异常而造成损失的类型检测，很大程度上取决于作为业务运营一部分收集的数据类型以及作为执行异常检测策略一部分使用的各种技术和算法。
- en: There is also a strong importance for real-time anomaly detector models that
    operate on streams of incoming data. The sooner anomalies are caught, the better,
    since the potential damage can be lessened if they are dealt with as quickly as
    possible. It would be great if anomalies could be foreseen before they even occur,
    but by this point, they no longer become anomalies but rather an expected pattern.
    By nature, anomalies are unpredictable and unforeseen.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于在流入数据流上运行的实时异常检测器模型，其重要性也非常强。异常越早被发现，越好，因为如果它们能尽快处理，潜在的损害就可以减少。如果能在异常发生之前预见它们，那将是极好的，但到了这个阶段，它们就不再是异常，而是一种预期的模式。本质上，异常是不可预测和无法预见的。
- en: Timeliness in anomaly detection is key in many sectors. For example, in the
    banking sector, the quicker banking fraud is detected, the sooner the customer’s
    assets can be protected. In the manufacturing sector, consider the example of
    a high-speed production facility that manufactures screws. Batches are sampled
    and tested for quality assurance, and if the number of faulty samples detected
    is higher than some threshold, the entire manufactured batch might be discarded.
    Delays may be costly, so identifying manufacturing anomalies in real time is important
    to minimize disruption to the productivity of the factory.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在异常检测中，及时性在许多行业中至关重要。例如，在银行业，银行欺诈越早被发现，客户的资产就能越早得到保护。在制造业，考虑一下高速生产螺丝的生产设施。批次会被抽样并测试以确保质量，如果检测到的故障样本数量超过某个阈值，整个生产批次可能会被丢弃。延迟可能会造成损失，因此实时识别制造异常对于最小化对工厂生产力的干扰至关重要。
- en: These are examples from just two sectors. Real-time anomaly detection is applied
    across practically every sector that we will cover in this chapter. With any use
    case involving real-time anomaly detection, the emphasis is on minimizing damages,
    since anomalies will inevitably arise.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是两个行业的例子。实时异常检测几乎应用于我们将在本章中涵盖的每个行业。对于涉及实时异常检测的任何用例，重点都是最小化损害，因为异常不可避免地会出现。
- en: Real-World Use Cases of Anomaly Detection
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 异常检测的实时用例
- en: We will look at several industry verticals and businesses and how anomaly detection
    can be used.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '我们将探讨几个行业垂直领域和企业，以及如何使用异常检测。 '
- en: Telecom
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 电信
- en: In the telecom sector, some of the use cases for anomaly detection are to detect
    roaming abuse, revenue fraud, and service disruptions.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在电信行业，异常检测的一些用例包括检测漫游滥用、收入欺诈和服务中断。
- en: What is **roaming abuse**? Roaming refers to the ability to use mobile services
    like calling and texting outside of your coverage area. Roaming abuse refers to
    the fraudulent use of roaming services without the intention to pay for them.
    So how do we detect **roaming abuse** in telecom sector? By looking at the location
    of the cellular devices, we can categorize the kind of behavior at any particular
    moment of the cellular device as normal or abnormal. This will help us to detect
    the cellular devices usage at that period of time. By looking at all the other
    information we know in general about roaming activity, we could also detect how
    this cellular device is being used and whether there is any roaming abuse taking
    place.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是 **漫游滥用**？ 漫游是指在没有支付意图的情况下，在覆盖区域之外使用移动服务（如通话和短信）的能力。漫游滥用是指欺诈性地使用漫游服务，而没有支付意图。那么我们如何在电信行业中检测
    **漫游滥用**？ 通过查看蜂窝设备的位置，我们可以将任何特定时刻的蜂窝设备行为分类为正常或异常。这将帮助我们检测该时间段内蜂窝设备的使用情况。通过查看我们普遍了解的其他漫游活动信息，我们还可以检测该蜂窝设备的使用情况，以及是否存在任何漫游滥用行为。
- en: More specifically, with respect to roaming abuse detection, we can model time-series
    location data to detect abnormal travel patterns. Since these are sequences, we
    can model them using LSTMs, TCNs, or transformers. One application is to model
    what normal roaming history looks like for a person and then use the model to
    detect breaks in roaming patterns. This is a good example of semi-supervised anomaly
    detection. In a similar vein, autoencoders may be implemented as well, keeping
    in mind that the encoder and decoder portions of the autoencoder can be sequence
    models themselves like an LSTM. The idea is to flag anomalies by reconstruction
    loss.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说，关于漫游滥用检测，我们可以对时间序列位置数据进行建模，以检测异常的旅行模式。由于这些是序列，我们可以使用 LSTM、TCN 或变压器来建模它们。一个应用是模拟一个人的正常漫游历史，然后使用该模型来检测漫游模式的断裂。这是一个半监督异常检测的好例子。在类似的情况下，也可以实现自动编码器，需要注意的是，自动编码器的编码器和解码器部分本身也可以是序列模型，例如
    LSTM。想法是通过重建损失来标记异常。
- en: Figure [11-3](#Fig3) shows how roaming works for your phone as you travel around
    the world.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-3](#Fig3) 展示了您在全球旅行时手机漫游的工作方式。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig3_HTML.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig3_HTML.jpg)'
- en: An illustration of a global network connecting various locations across countries,
    with a nearby cell phone highlighting the interconnectedness.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 一个连接各国不同位置的全球网络的插图，其中一个附近的手机突出了相互关联性。
- en: Figure 11-3
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-3
- en: Roaming. Cell phone location history can be tracked throughout one’s travels.
    Any time the cell phone connects to a cell network, connects to Wi-Fi, etc., location
    can be tracked
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 漫游。手机的位置历史可以在旅行过程中进行追踪。每次手机连接到蜂窝网络、连接到 Wi-Fi 等，位置都可以被追踪。
- en: '**Service disruption** is another very high-impact use case for anomaly detection.
    Cellular devices are connected to cellular providers’ networks via cell towers,
    which are located all over the place. Your cell phone connects to the nearest
    tower to participate in the cellular network. In case of events involving large
    crowds, such as a concert or a football game, the cellular towers that typically
    perform quite well become heavily overloaded, causing serious service disruptions
    and very bad customer experience for the duration of the overload.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**服务中断** 是异常检测的另一个非常具有影响力的用例。蜂窝设备通过位于各处的蜂窝塔连接到蜂窝提供商的网络。您的手机连接到最近的塔以参与蜂窝网络。在涉及大量人群的事件中，例如音乐会或足球比赛，通常表现良好的蜂窝塔会变得严重过载，导致严重的服务中断，并在过载期间给客户带来非常糟糕的体验。'
- en: Figure [11-4](#Fig4) shows service disruption of cell phone service in several
    areas in the northwestern United States.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-4](#Fig4) 展示了美国西北部几个地区的手机服务中断情况。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig4_HTML.jpg)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig4_HTML.jpg)'
- en: A map of Northwestern coastal areas of the United States highlights four areas
    with cell phone services disruption.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 美国西北沿海地区的地图突出了四个手机服务中断的区域。
- en: Figure 11-4
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-4
- en: Cell phone service disruptions. The darker zone in the middle indicates a higher
    frequency of service disruption
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 手机服务中断。中间较暗的区域表示服务中断频率较高
- en: If we know the various metrics of the cell phone towers and the associated devices
    at some period of time and for a long duration, along with any kind of information
    we have on the typical nature of activity around the towers in terms of whether
    concerts or games occurred in the vicinity or some major event is being expected
    in the vicinity of the cellular towers, then we can use time Series as a basis
    of how we represent all such activity and can subsequently use TCN, LSTM, or transformer
    algorithms to detect anomalies pertaining to the major events because they have
    a temporal dependency. This information can be helpful to evaluate how these services
    are being used and how effective the service is for particular cell phone towers.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们知道在某个时间段和长时间内手机基站及其相关设备的各种指标，以及我们关于基站周围典型活动性质的信息（例如，附近是否发生了音乐会或比赛，或者附近是否预期发生重大事件），那么我们可以使用时间序列作为表示所有此类活动的基础，并随后使用TCN、LSTM或transformer算法来检测与重大事件相关的异常，因为这些事件具有时间依赖性。这些信息可以帮助评估这些服务是如何被使用的，以及这些服务对特定手机基站的有效性如何。
- en: The cell phone companies now have a way of understanding whether certain hours
    need to be upgraded or more towers need to be built. For instance, if major office
    buildings are being built near a particular tower, by using data on the time Series
    of all the towers owned by the cellular network, it is possible to detect the
    anomalies in other parts of the network and apply the principles to the tower
    that is going to be impacted by the newly constructed office buildings (which
    would add thousands of cell phone connections and could cause overloading on the
    tower and affect how the tower will be used in the near future).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，手机公司有了一种了解是否需要升级某些时段或建造更多基站的方法。例如，如果一座大型办公楼正在特定基站的附近建造，通过使用蜂窝网络拥有的所有基站的时间序列数据，可以检测到网络其他部分的异常，并将这些原则应用于即将受到新建办公楼影响的基站（这将增加数千个手机连接，可能导致基站过载并影响基站在未来一段时间内的使用）。
- en: Banking
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 银行
- en: In the banking sector, some of the use cases for anomaly detection are to flag
    abnormally high transactions, fraudulent activity, phishing attacks, etc. Credit
    cards are used by almost everyone in the world, and typically every individual
    has a certain pattern of using their credit card that is different from everyone
    else’s pattern of use. This pattern creates an implicit profile of the individual
    using the credit card in terms of where they use it, when they use it, why they
    use it, and what they use it for. Every credit card company has such information
    about the credit card usage of a very large number of consumers, so they can use
    anomaly detection to detect when a specific credit card transaction might be fraudulent.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在银行业务中，异常检测的一些用例包括标记异常高的交易、欺诈活动、钓鱼攻击等。信用卡几乎被世界上每个人使用，通常每个人使用信用卡的模式都与其他人不同。这种模式为使用信用卡的个人创建了一个隐含的档案，包括他们在哪里使用、何时使用、为什么使用以及他们使用信用卡的目的。每个信用卡公司都有大量消费者信用卡使用信息，因此他们可以使用异常检测来检测特定信用卡交易是否可能存在欺诈。
- en: Autoencoders are very useful in such an anomaly detection use case. With such
    a case, we could take all the credit card transactions by individual consumers
    and capture and convert the features into numerical features such that we could
    assign certain scores to every credit card based on various factors along with
    a kind of indicator whether the transaction could be normal or abnormal. Then,
    using autoencoders, we could build an anomaly detection model that can quickly
    determine whether a specific transaction is normal or abnormal given everything
    that we know about all the other transactions of a customer. The autoencoder does
    not need to be extremely complicated. It can be built with just a couple of hidden
    layers for the encoder and couple of hidden layers for the decoder and still have
    pretty decent detection of abnormal activity (otherwise known as fraudulent activity)
    on the credit cards.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 自编码器在异常检测这类用例中非常有用。在这种情况下，我们可以收集个人消费者的所有信用卡交易，并将这些特征转换为数值特征，以便我们可以根据各种因素以及一个指示器（交易是正常还是异常）为每张信用卡分配一定的分数。然后，使用自编码器，我们可以构建一个异常检测模型，该模型可以快速确定特定交易是正常还是异常，前提是我们知道客户所有其他交易的详细信息。自编码器不需要非常复杂。它只需要为编码器构建几个隐藏层，为解码器构建几个隐藏层，仍然可以相当不错地检测信用卡上的异常活动（也称为欺诈活动）。
- en: Similarly, we can use generative adversarial networks (GANs) to model what normal
    transaction history looks like for consumers and use the discriminator to flag
    anomalies. Here, the generator aims to generate synthetic data that is reminiscent
    of the normal transaction data distribution, and the discriminator learns to predict
    any abnormal-looking data point as fake. Fraudulent transactions would be labeled
    as fake.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们可以使用生成对抗网络（GANs）来模拟消费者正常的交易历史，并使用判别器来标记异常。在这里，生成器旨在生成类似于正常交易数据分布的合成数据，判别器学习预测任何看起来异常的数据点为假。欺诈交易会被标记为假。
- en: Transaction history also has a temporal component to it. Transactions tend to
    exhibit patterns over time. For example, seasonal spending is a common pattern
    that often involves a higher volume of spending than might be usual for the consumer.
    A time-series model would learn these types of consumer-specific transactional
    patterns. For example, perhaps they are always a big birthday spender. Then, should
    any transactional patterns appear that deviate from the norm, these models would
    immediately pick it up and flag them as anomalies.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 交易历史也有时间成分。交易往往会随着时间的推移表现出模式。例如，季节性支出是一种常见的模式，通常涉及比消费者通常可能更高的支出量。时间序列模型会学习这些特定消费者的交易模式。例如，他们可能总是大额的生日支出者。然后，如果出现任何偏离常规的交易模式，这些模型会立即捕捉到并标记为异常。
- en: Figure [11-5](#Fig5) is a depiction of credit card fraud.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-5](#Fig5) 是信用卡欺诈的描述。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig5_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig5_HTML.jpg)'
- en: An illustration portrays a thief in black attire and a mask partially emerging
    from a laptop screen, gesturing towards credit cards.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图描绘了一个身穿黑色服装和面具的盗贼，部分从笔记本电脑屏幕中露出，指向信用卡。
- en: Figure 11-5
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-5
- en: Depiction of credit card fraud, where credit card details are obtained by someone
    (like a hacker) so they can make fraudulent purchases
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 描述信用卡欺诈，其中信用卡详细信息被某人（如黑客）获取，以便他们可以进行欺诈性购买
- en: Environmental
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环境
- en: When it comes to environmental aspects, anomaly detection has several applicable
    use cases. Whether it is deforestation or melting of glaciers, air quality or
    water quality, anomaly detection can help to identify abnormal activities.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到环境方面时，异常检测有几个适用的用例。无论是森林砍伐还是冰川融化，空气质量还是水质，异常检测都有助于识别异常活动。
- en: Figure [11-6](#Fig6) is a photo of deforestation.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-6](#Fig6) 是一张森林砍伐的照片。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig6_HTML.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig6_HTML.jpg)'
- en: A photo of scorched and abandoned trees with a distant backdrop of untouched
    greenery.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 一张被烧焦和废弃的树木的照片，背景是未被触及的绿色植被。
- en: Figure 11-6
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-6
- en: 'Mass deforestation is harmful to the environment, especially in the Amazon
    Rainforest. (Source: commons.wikimedia.org)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 大规模森林砍伐对环境有害，尤其是在亚马逊雨林中。（来源：commons.wikimedia.org）
- en: Let’s look at an example of an air quality index. An air quality index provides
    some kind of measurement of breathable air quality, which can be measured by using
    various sensors placed at various locations in the region that is being monitored.
    These sensors measure and send periodic data to a centralized system that collects
    data from all the sensors. This data becomes a time Series, with each measurement
    consisting of several attributes or features. With each point in time having a
    certain number of features, which can then be input into a neural network such
    as an autoencoder, we can build an anomaly detector. Of course, we could use an
    LSTM, TCN, or transformer to do the same.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个空气质量指数的例子。空气质量指数提供了一种对可呼吸空气质量的某种测量，这可以通过在监测区域内的不同位置放置各种传感器来实现。这些传感器测量并发送周期性数据到一个集中式系统，该系统收集来自所有传感器的数据。这些数据成为时间序列，每个测量值由几个属性或特征组成。由于每个时间点都有一定数量的特征，这些特征可以输入到自动编码器等神经网络中，我们可以构建一个异常检测器。当然，我们也可以使用LSTM、TCN或transformer来完成同样的任务。
- en: Figure [11-7](#Fig7) shows the air quality index in Seoul in 2015.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-7](#Fig7) 展示了2015年首尔的空气质量指数。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig7_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig7_HTML.jpg)'
- en: A graph of P M 2.5 air quality index in Seoul in a year. The air quality in
    the majority of the months remains unhealthy.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 首尔一年中PM 2.5空气质量指数的图表。大多数月份的空气质量都处于不健康状态。
- en: Figure 11-7
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-7
- en: 'Air quality index. Green indicates good quality, while yellow is moderate quality.
    Orange presents some issues for sensitive groups (like those with allergies),
    while red is unhealthy. Anything above red, like purple, is hazardous and very
    unhealthy. (Source: commons.wikimedia.org)'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 空气质量指数。绿色表示良好质量，而黄色表示中等质量。橙色对敏感群体（如过敏人群）存在一些问题，而红色表示不健康。任何高于红色的，如紫色，都是危险的，非常不健康。（来源：commons.wikimedia.org）
- en: Another environmental use case for anomaly detection is monitoring of air temperatures
    throughout the year. Since global temperatures are continuing to trend upward
    on average, it is helpful to train time-series algorithms on historical data,
    evaluate them on a daily basis, and have anomalous temperatures be flagged as
    a result of deviating significantly from what was predicted. These anomalies can
    then be collected and further studied, revealing specific trends or serving to
    be automatically compared to climate change forecasting models to find out how
    bad the warming is progressing in reality vs. what was predicted.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个环境用例是全年监测空气温度。由于全球平均气温持续上升，使用历史数据训练时间序列算法，每天进行评估，并将异常温度标记为与预测值显著偏离的结果，这很有帮助。然后可以收集这些异常并进行进一步研究，揭示特定的趋势或用于自动与气候变化预测模型进行比较，以了解现实中的变暖进展有多严重，与预测相比如何。
- en: Satellite imagery is another domain where anomaly detection algorithms may be
    used. Detecting abnormal events such as water level drops in lakes, deforestation
    in the Amazon, wildfires, and so on can all be modeled using various deep learning
    models. As images are the primary medium of data, convolutional neural networks
    are utilized quite heavily.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 卫星图像是另一个可能使用异常检测算法的领域。检测异常事件，如湖泊水位下降、亚马逊森林砍伐、野火等等，都可以使用各种深度学习模型进行建模。由于图像是数据的主要媒介，因此卷积神经网络被大量使用。
- en: CNNs can perform feature extraction to output vector embeddings that are efficient
    representations of the original image. These embeddings can be fed into autoencoders
    or GANs to determine if anomalous events are happening in the imagery in an unsupervised
    manner, allowing it to be scaled up easily as there is no labeling required.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络可以执行特征提取，输出原始图像的有效表示向量嵌入。这些嵌入可以被输入到自动编码器或GAN中，以无监督的方式确定图像中是否发生了异常事件，这使得它很容易扩展，因为不需要进行标记。
- en: Health Care
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 医疗保健
- en: Health care is one of the domains that can benefit a lot from anomaly detection,
    whether it is to prevent fraud, detect cancer or chronic illness, improve ambulatory
    services, etc.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 医疗保健是那些可以从异常检测中受益很大的领域之一，无论是为了预防欺诈、检测癌症或慢性疾病、改善门诊服务等等。
- en: One of the biggest use cases for anomaly detection in health care is to detect
    cancer from various diagnostic reports even before any significant symptoms might
    indicate the presence of cancer. This is extremely important given the serious
    consequences of cancer for any person. Some of the techniques in anomaly detection
    that can be used in this context involve convolutional neural networks combined
    with autoencoders.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在医疗保健中，异常检测的最大用例之一是在出现任何显著症状可能表明癌症存在之前，从各种诊断报告中检测癌症。鉴于癌症对任何人的严重后果，这一点非常重要。在此背景下，可以使用的异常检测技术包括卷积神经网络与自编码器的结合。
- en: CNNs use the concept of dimensionality reduction to reduce the large number
    of features/pixels with colors into much lower dimensionality points using the
    neural network layers. By combining this CNN with autoencoders, we can use autoencoders
    to look at images such as MRI images, mammograms, and other images from diagnostic
    technologies in the health care industry.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络（CNNs）使用降维的概念，通过神经网络层将大量的特征/像素（具有颜色）降低到更低的维度点。通过将这种CNN与自编码器结合，我们可以使用自编码器来查看如MRI图像、乳腺X光片和医疗保健行业中诊断技术产生的其他图像。
- en: Figure [11-8](#Fig8) shows a set of images from a CT scan.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-8](#Fig8) 显示了一组来自CT扫描的图像。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig8_HTML.jpg)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig8_HTML.jpg)'
- en: 24 C T scan images of the head in 4 rows and 6 columns.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 24张头部CT扫描图像，分为4行6列。
- en: Figure 11-8
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-8
- en: 'CT scan images of someone’s head. (Source: commons.wikimedia.org)'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 某人头部CT扫描图像。（来源：commons.wikimedia.org）
- en: Let’s look at another use case of detecting abnormal health conditions of residents
    of a particular neighborhood. Typically, a local hospital serves residents of
    a specific neighborhood. The local hospital collects and stores various kinds
    of health metrics from all the residents in the neighborhood that visit the hospital.
    Some of the metrics are blood test results, lipid profiles, glycemic values, blood
    pressure readings, ECG results, etc. When combined with demographic data such
    as age, sex, health conditions, etc., this health data can be used to build a
    sophisticated AI-based anomaly detection model.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看另一个用例，即检测特定社区居民的健康状况异常。通常，当地医院为特定社区的居民提供服务。当地医院收集并存储了所有访问医院的社区居民的各类健康指标，包括血液检测结果、血脂谱、血糖值、血压读数、心电图结果等。当与年龄、性别、健康状况等人口统计数据结合时，这些健康数据可以用来构建一个复杂的基于AI的异常检测模型。
- en: Figure [11-9](#Fig9) shows different health issues observed by looking at ECG
    results.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-9](#Fig9) 显示了通过查看心电图结果观察到的不同健康问题。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig9_HTML.jpg)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig9_HTML.jpg)'
- en: 5 E C G results with fluctuating curves for second-degree block, atrial fibrillation,
    ventricular tachycardia, ventricular fibrillation, and third-degree block.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 5个心电图结果，曲线波动表示二度阻滞、心房颤动、室性心动过速、室性纤维颤动和三度阻滞。
- en: Figure 11-9
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-9
- en: 'ECG results measuring someone’s heart. (Source: commons.wikimedia.org)'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 测量某人心脏的心电图结果。（来源：commons.wikimedia.org）
- en: There are a lot of different use cases in health care for which different anomaly
    detection algorithms can be used to implement preventative measures. Just about
    any of the models that we have covered throughout this book (and beyond) can be
    applied in the health care setting due to the sheer diversity of data available.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在医疗保健领域，有许多不同的用例，可以使用不同的异常检测算法来实施预防措施。几乎我们在这本书（以及更广泛的内容）中提到的任何模型都可以应用于医疗保健环境，因为可用的数据种类繁多。
- en: Transportation
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交通
- en: In the transportation sector, anomaly detection can be used to ensure proper
    functioning of the roadways and vehicles. By collecting different types of events
    from all the sensors that are operational on the roadways, such as toll booths,
    traffic lights, security cameras, and GPS signals, we could build an anomaly detection
    engine that detects abnormal traffic patterns.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在交通领域，异常检测可以用来确保道路和车辆的正常运行。通过收集道路上所有运行中的传感器（如收费站、交通信号灯、安全摄像头和GPS信号）的不同类型的事件，我们可以构建一个异常检测引擎，该引擎可以检测异常的交通模式。
- en: Anomaly detection can also be used to look at times in schedules of public transportation
    and the related traffic conditions in this similar area of transportation. We
    could also look for abnormal activity in terms of fuel consumption, number of
    passengers the public transportation is supporting, seasonal trends, etc.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测还可以用来观察公共交通时刻表中的时间以及该类似交通区域的相关交通状况。我们还可以寻找关于燃料消耗、公共交通所支持的乘客数量、季节性趋势等方面的异常活动。
- en: Furthermore, traffic simulations can be created to depict various people as
    they move throughout space and time via location sampling on a regular time-series
    interval. Sequence-based anomaly detection methods can be run to detect anomalies
    in both real life and in simulations by training on normal traffic pattern data
    for these individuals. The higher-fidelity the simulation, the better and more
    accurate the anomaly detection on real-life data. One such possibility is to combine
    anomaly detection algorithms and these high-fidelity simulations to allow for
    planning road constructions to detect if traffic jams still occur in a variety
    of situations.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，可以通过在常规时间序列间隔上进行位置采样，创建交通模拟来描绘人们在空间和时间中的移动。可以通过对这些个人的正常交通模式数据进行训练，运行基于序列的异常检测方法来检测现实生活和模拟中的异常。模拟的保真度越高，对现实生活数据的异常检测就越准确。一种可能性是将异常检测算法与这些高保真模拟相结合，以便在规划道路建设时检测是否在各种情况下仍然会发生交通拥堵。
- en: Figure [11-10](#Fig10) show an image of a traffic jam due to peak time unexpected
    traffic.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-10](#Fig10) 展示了由于高峰时间意外交通导致的交通拥堵的图像。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig10_HTML.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig10_HTML.jpg)'
- en: A photo of vehicles queued in traffic on a highway.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 一张高速公路上车辆排队等待的照片。
- en: Figure 11-10
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-10
- en: Traffic jam
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 交通拥堵
- en: Social Media
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 社交媒体
- en: In social media platforms such as Twitter, Facebook, and Instagram, anomaly
    detection can be used to detect hacked accounts spamming everyone, false advertisements,
    fake reviews, etc. Billions of people use social media platforms extensively,
    so the amount of activity on social media platforms is extremely high and is ever
    growing. To ensure the privacy and quality user experience of the individuals
    who are using the social media platforms, social media companies use many techniques
    to enhance the capabilities of their systems. They use anomaly detection to examine
    the activity of every individual for normal and abnormal behavior.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在像Twitter、Facebook和Instagram这样的社交媒体平台上，异常检测可以用来检测黑客账户向所有人发送垃圾邮件、虚假广告、虚假评论等。数十亿人广泛使用社交媒体平台，因此社交媒体平台上的活动量极高，并且一直在增长。为了确保使用社交媒体平台的个人的隐私和优质用户体验，社交媒体公司使用许多技术来增强其系统的能力。他们使用异常检测来检查每个个体的正常和异常行为。
- en: Similarly, any advertising platforms ads, any personalized friend recommendations,
    any news articles that the individual might have been interested in such as elections,
    can all be processed for abnormal or anomalous activity. It would be a great use
    case for anomaly detection if anomaly detection could detect troll activity on
    your tweets, propagandized bots, fake news, and so on. Anomaly detection can also
    be used to detect if your account has been taken over, because all of a sudden
    your account might be posting immense amount of tweets, pause tweets and commence,
    or troll other accounts and spamming everyone else.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，任何广告平台的广告、任何个性化的朋友推荐、任何个人可能感兴趣的新闻文章，如选举等，都可以进行处理以检测异常或异常活动。如果异常检测能够检测到推文中的网络水军活动、宣传机器人、假新闻等，这将是一个很好的用例。异常检测还可以用来检测您的账户是否被接管，因为您的账户可能会突然发布大量推文、暂停推文然后继续，或者骚扰其他账户并垃圾邮件其他人。
- en: User engagement levels can also be modeled, allowing for the automation of identification
    of trends simply by monitoring what content seems to be drawing the most attention
    in an abstracted, generalized manner. Once this anomalous content is discovered,
    it can be further boosted by recommendation algorithms to attract even more user
    engagement (thus boost profits earned from targeted advertising), or addressed
    and hidden if it is something deemed to violate community policies.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 用户参与度水平也可以进行建模，通过以抽象、概括的方式监控似乎吸引最多关注的内容，可以自动化识别趋势。一旦发现这种异常内容，可以通过推荐算法进一步推广，以吸引更多的用户参与（从而提高从定向广告中获得的利润），或者如果它被认为违反社区政策，则可以解决并隐藏。
- en: Figure [11-11](#Fig11) shows a fake news article posted on Facebook.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-11](#Fig11) 显示了一篇发布在 Facebook 上的虚假新闻文章。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig11_HTML.jpg)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig11_HTML.jpg)'
- en: A screenshot of a news article titled, Facebook Admits Fake News Algorithm,
    with a photo of Mark Zuckerberg at the bottom.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 一篇标题为“Facebook 承认虚假新闻算法”，底部有马克·扎克伯格照片的新闻截图。
- en: Figure 11-11
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-11
- en: Fake news article about Facebook
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 关于 Facebook 的虚假新闻文章
- en: Finance and Insurance
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 金融和保险
- en: In the finance and insurance industries, anomaly detection can be used to detect
    fraudulent claims, fraudulent transactions, fraudulent travel expenses, the risk
    associated with a specific policy or individual, etc. The finance and insurance
    industries depend on the ability to target the right consumers and take the right
    amount of risk when dealing with finance and insurance. For instance, if they
    already know that a specific area is prone to forest fires or earthquakes or very
    frequent flooding, the insurance company which is insuring your home needs to
    have all the tools that they can get their hands on to quantify the amount of
    risk involved when writing the policy for the home homeowner insurance.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融和保险行业，异常检测可以用来检测欺诈索赔、欺诈交易、欺诈旅行费用、与特定政策或个人相关的风险等。金融和保险行业依赖于在处理金融和保险时能够针对正确的消费者并承担适当的风险的能力。例如，如果他们已经知道某个地区容易发生森林火灾或地震或非常频繁的洪水，那么为你的房屋提供保险的保险公司需要拥有他们能得到的所有工具来量化在为房屋所有者保险撰写保单时涉及的风险量。
- en: An example use of anomaly detection in finance is to detect wire fraud where
    a large amount of money is transferred in and out of the country using several
    different accounts—activity that is extremely difficult for humans to detect manually,
    considering the massive volume of transactions that take place every minute. AI
    techniques can be trained on very large amounts of data to detect very new and
    innovative ways to commit wire fraud, detection this is beyond the capabilities
    of any human or many of the statistical techniques that have been in place for
    decades.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融领域使用异常检测的一个例子是检测跨境大额资金转移的欺诈行为，使用多个不同的账户进行——考虑到每分钟发生的交易量巨大，这种活动对人类来说手动检测极其困难。AI
    技术可以在大量数据上训练，以检测非常新颖和创新的跨境欺诈方式，这种检测超出了任何人类或许多已经存在数十年的统计技术的能力。
- en: Deep learning does help solve this very big problem of difficult anomaly detection
    in the financial and insurance industries due to the sheer size of data and the
    number of variables involved. With the advent of graphical processing units (GPUs),
    deep learning is now helping address many of the hard-to-crack use cases. Anomaly
    detection and deep learning can be used together to serve the needs of the finance
    and insurance industries.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习确实有助于解决金融和保险行业在异常检测方面这个非常大的难题，这主要是因为数据量巨大以及涉及的变量数量众多。随着图形处理单元（GPU）的出现，深度学习现在正在帮助解决许多难以破解的应用案例。异常检测和深度学习可以结合起来，以满足金融和保险行业的需求。
- en: Figure [11-12](#Fig12) shows reported mortgage loan frauds over time. The anomaly
    here is the sudden drop in reported loan frauds from what was projected.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-12](#Fig12) 显示了随时间变化的抵押贷款欺诈报告。这里的异常是报告的贷款欺诈数量突然下降，与预测的相比。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig12_HTML.jpg)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig12_HTML.jpg)'
- en: A stacked bar graph of actual and projected mortgage loan fraud reported numbers
    from the years 1996 to 2006\. The reported numbers increased with the year with
    1,318 in 1996 to 21,279 in 2006.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 从 1996 年到 2006 年实际和预测的抵押贷款欺诈报告数量的堆叠条形图。报告的数字随着年份的增加而增加，从 1996 年的 1,318 增加到 2006
    年的 21,279。
- en: Figure 11-12
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-12
- en: Graph of mortgage loan reported frauds over time
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 抵押贷款欺诈报告随时间变化的图表
- en: Cybersecurity
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网络安全
- en: Another use case for anomaly detection is in cybersecurity or networking. In
    fact, one of the very first use cases for anomaly detection, decades ago, was
    the use of statistical models to try to detect any intrusion attempts into networks.
    As an example, anomaly detection is used to detect the very prevalent denial of
    service (DoS) attack. When a DoS attack is launched against a company’s website
    or portal to disrupt service to customers, the attackers typically mobilize a
    large number of machines to run simultaneous connections and random useless transactions
    against the website or portal (a common target is some kind of a payment service
    for customers). As a result of this attack, the portal is not responsive to the
    customers, eventually leading to very poor customer experience and potentially
    loss of their business.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测的另一个用例是在网络安全或网络中。事实上，几十年前，异常检测的第一个用例之一就是使用统计模型尝试检测网络中的任何入侵尝试。例如，异常检测用于检测非常普遍的拒绝服务（DoS）攻击。当针对公司网站或门户发起DoS攻击以干扰客户服务时，攻击者通常会动员大量机器同时对网站或门户进行并发连接和随机无用的交易（一个常见的目标是某种客户支付服务）。这种攻击的结果是门户无法响应用户，最终导致非常差的客户体验，并可能导致他们失去业务。
- en: By training an anomaly detection system on data that has been collected for
    a long period of time, the system can detect the anomalous activity. This data
    is comprised of the typical use behavior, patterns in payment, how many users
    are active, how much the payment is at this particular time, as well as seasonal
    behaviors and other trends that exist for the payment portal exist for the payment
    portal, such as paying all the bills on the first of every month or doing all
    the shopping at the end of the month. When a DOS attack is suddenly launched against
    a company’s payment portal, an anomaly detection algorithm can quicky detect such
    activity and notify the infrastructure or operational teams who can take corrective
    action such as setting up different firewall rules or better routing rules that
    attempt to block the bad actors from launching the attack or prolonging their
    attack against the portal.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在收集了很长时间的数据上训练异常检测系统，系统可以检测到异常活动。这些数据包括典型的使用行为、支付模式、活跃用户数量、特定时间的支付金额，以及支付门户存在的季节性行为和其他趋势，例如每月第一天支付所有账单或在月底进行所有购物。当突然对公司的支付门户发起DoS攻击时，异常检测算法可以快速检测此类活动，并通知基础设施或运营团队，他们可以采取纠正措施，例如设置不同的防火墙规则或更好的路由规则，以尝试阻止恶意行为者发起攻击或延长对门户的攻击。
- en: Figure [11-13](#Fig13) shows an example of anomaly monitoring network flows.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-13](#Fig13)显示了异常监控网络流量的一个示例。
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig13_HTML.jpg)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig13_HTML.jpg)'
- en: A network flow graph from September 15 to 18 shows a fluctuating curve, reaching
    its peak before September 15 and experiencing another surgeon on September 16.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 9月15日至18日的网络流量图显示曲线波动，在9月15日之前达到峰值，并在9月16日经历另一次高峰。
- en: Figure 11-13
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-13
- en: Example anomaly monitoring network flows. The spikes are very high volumes of
    network flow, which can be considered as anomalies
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 示例异常监控网络流量。峰值表示网络流量非常高，这可以被认为是异常。
- en: Another example would be when hackers are trying to get into the system given
    that they were somehow able to set up a Trojan to get into the network in the
    first place. Typically, detecting this anomalous activity is a process that involves
    a lot of scanning, such as port or IP scanning, to see what machines exist in
    the network when the services are being run. Suppose the machines are running
    SSH and telnet, the latter of which is easier to crack. The hacker can try to
    launch several different types of attacks that exploit the vulnerabilities of
    the telnet or asset service. Eventually, if one of the targeted machines responds,
    the hacker can get into the system and continue the penetration of the internal
    network until they accomplish what they came for.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子是当黑客试图进入系统，因为他们设法设置了一个特洛伊木马以最初进入网络。通常，检测这种异常活动是一个涉及大量扫描的过程，例如端口或IP扫描，以查看在服务运行时网络中存在哪些机器。假设机器正在运行SSH和telnet，后者更容易破解。黑客可以尝试发起多种不同类型的攻击，利用telnet或资产服务的漏洞。最终，如果目标机器之一响应，黑客就可以进入系统，并继续渗透内部网络，直到他们完成他们想要达成的目标。
- en: Typically, networks have a pattern of usage—there are database servers with
    consistent read/write patterns, web servers with some traffic patterns, payroll
    systems, QA systems, end user-facing systems, and so on that all have some kind
    of expected usage pattern. It is usually well known expected behavior that is
    seen are for a long period of time in spite of the fact that there is a definitely
    a lot of change that is observed and expected over a long period of time as to
    how the machines are used how the networks are used in which machine talks to
    which other machine over what service and so on and so forth.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，网络有一定的使用模式——有具有一致读写模式的数据库服务器，有某些流量模式的Web服务器，有工资系统，QA系统，面向最终用户的面向系统等等，所有这些都有某种预期的使用模式。尽管在长时间内观察和预期机器的使用方式、网络的使用方式以及机器通过什么服务与其他机器通信等方面肯定会有很多变化，但通常在长时间内观察到的预期行为是众所周知的。
- en: Anomaly detection can be used to detect if a specific port or service on a specific
    machine or machines is being connected to or transacted with at an abnormal rate,
    indicating some type of intrusion activity is taking place. This is extremely
    valuable information to the operations team, who can quickly pull in the cybersecurity
    experts and try to drill down into what is going on and take preventive or proactive
    action rather than simply reacting after the damage is done. This type of anomaly
    detection could be the difference between the business staying afloat and the
    business getting shut down (at least temporarily). There have been instances where
    a single cybersecurity intrusion has almost bankrupted a business, costing hundreds
    of millions of dollars in damages. This is the reason why the cybersecurity domain
    is very interested in deep learning, and all the use cases which could be involving
    deep learning anomaly detection are some of the top use cases in the cyber security
    and networking space in this day and age.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测可以用来检测特定机器或机器上的特定端口或服务是否以异常速率连接或交易，这表明正在进行某种入侵活动。这对运维团队来说是非常有价值的信息，他们可以迅速召集网络安全专家，试图深入了解正在发生的事情，并采取预防或主动措施，而不是在损害发生后简单地做出反应。这种类型的异常检测可能是企业保持运营和关闭（至少暂时关闭）之间的区别。曾经有过单次网络安全入侵几乎使企业破产的例子，造成数亿美元损失。这就是为什么网络安全领域对深度学习非常感兴趣，所有可能涉及深度学习异常检测的用例都是当今网络安全和网络空间中的顶级用例。
- en: Figure [11-14](#Fig14) shows an anomaly in the number of TCP connections on
    different service ports
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-14](#Fig14)显示了不同服务端口上TCP连接数量的异常情况
- en: '![](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig14_HTML.jpg)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_11_Chapter/483137_2_En_11_Fig14_HTML.jpg)'
- en: A graph of the percentage of T C P connections over service ports from year
    2006 to 2019\. The graph has 3 fluctuating curves, with their peak point between
    the years 2016 and 2017.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 从2006年到2019年服务端口上TCP连接百分比的图表。图表有3条波动曲线，其峰值在2016年至2017年之间。
- en: Figure 11-14
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-14
- en: TCP connections over service ports
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 服务端口上的TCP连接
- en: Not all the use cases in cybersecurity or networking are defensive in nature.
    We can also leverage anomaly detection to determine whether we need to upgrade
    systems, whether current systems are able to sustain the traffic for now and in
    the future, whether any node capacity planning needs to take place to bring everything
    back to normal, and so on. This is again very important for operations team to
    understand if there are trends which have not been foreseen a year ago that are
    now affecting the normal to abnormal behavior of the network. The sooner we know
    the better, so that we can start proactively planning to deal with this issue.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在网络安全或网络领域，并非所有用例都具有防御性质。我们还可以利用异常检测来确定是否需要升级系统，当前系统是否能够维持现在的流量并在未来维持，是否需要进行任何节点容量规划以使一切恢复正常，等等。这对于运维团队来说非常重要，因为他们需要了解一年前未曾预见而现在影响网络正常到异常行为的趋势。我们越早知道越好，这样我们就可以开始积极规划来处理这个问题。
- en: Video Surveillance
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 视频监控
- en: Another domain where anomaly detection is becoming extremely important is video
    surveillance. Nowadays, it is very common to see security cameras and video surveillance
    systems located in many places, such as in businesses, local schools, local parks,
    downtown streets, and houses. The point is, video surveillance is here to stay,
    especially given all the new technological advancements in smart apps and smartphones.
    In fact, we should expect much more video surveillance in the future.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测在视频监控领域也变得极其重要。如今，在许多地方，如商业场所、当地学校、当地公园、市中心街道和住宅中，都可以看到安全摄像头和视频监控系统。重点是，视频监控将一直存在，尤其是在智能应用程序和智能手机的所有新技术进步的背景下。事实上，我们应该期待未来有更多的视频监控。
- en: In the very near future, we will see a lot more smart cars and self-driving
    cars, which depend on continuous processing of video using real-time analysis
    and detect various objects. At the same time, they can also detect any kind of
    anomaly. In a strictly security video surveillance sense, anomaly detection can
    be used to detect what is the normal for this specific camera which is looking
    at your backyard and when a specific anomaly is detected because of some kind
    of motion that is happening within the vicinity of the house. For example, some
    kind of animal or even an intruder is walking on the lawn.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在不久的将来，我们将看到更多智能汽车和自动驾驶汽车，它们依赖于使用实时分析和持续处理视频来检测各种物体。同时，它们还可以检测任何类型的异常。在严格的安全视频监控意义上，异常检测可以用来检测这个特定摄像头所观察的后院中的正常情况，以及当由于房屋附近发生的某种运动而检测到特定异常时。例如，某种动物或甚至入侵者正在草坪上行走。
- en: Your home security system is able to see that this is not normal. In order for
    the cameras to do this effectively, the manufacturers train very sophisticated
    machine learning models to assess the video signals in real time. The feed coming
    from the cameras is determined as normal or abnormal. For example, if you are
    driving in a self-driving car on the interstate, video of the car will clearly
    indicate what is normal right now according to how the road should look, where
    the signs should be, where the trees should be, and where the next car should
    be. Using anomaly detection, the self-driving cars can avoid any abnormalities
    happening on the path and then take corrective action before anything adverse
    can happen.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 您的家庭安全系统能够发现这并不正常。为了使摄像头能够有效地做到这一点，制造商训练了非常复杂的机器学习模型来实时评估视频信号。来自摄像头的输入被确定为正常或异常。例如，如果您在州际公路上驾驶自动驾驶汽车，汽车的视频将清楚地表明根据道路应该看起来如何，标志应该在何处，树木应该在何处，下一辆车应该在何处，目前是正常的。使用异常检测，自动驾驶汽车可以避免路径上发生的任何异常，并在任何不利事件发生之前采取纠正措施。
- en: Figure [11-15](#Fig15) shows an object-detecting video surveillance system.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
