- en: Smart Home
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 智能家居
- en: Anomaly detection is also into smart home systems. Smart homes have lots of
    integrated components, such as smart thermostats, refrigerators, and interconnected
    devices, that can talk to each other. For example, Amazon Alexa can talk to your
    smart lights, which use smart bulbs. All these components can communicate with
    your smartphone via apps on your smartphone. Even thermostats are interconnected.
    So, how can we use anomaly detection in this use case? A simple example would
    be to monitor how you set your thermostat for the optimal temperature during all
    weather conditions and follow some sort of recommendation or recommended behavior.
    Because thermostats are personalized to some extent in every household, a very
    good deep learning algorithm could continuously look for all the usages for the
    thermostats across all the houses, including yours, and then be able to detect
    how you use it normally when you use it. Detectable anomalies could be something
    like a sudden rise / dip in temperatures, which could indicate that the AC or
    heater is not functioning. Nowadays, fridges have computer interfaces running
    on them and even come with usage monitoring capabilities. One example of anomaly
    detection would be your fridge reminding you to go grocery shopping since you
    didn’t restock in a couple weeks - a definite anomaly if you do so weekly.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测也应用于智能家居系统。智能家居拥有许多集成组件，例如智能恒温器、冰箱和互联设备，它们可以相互通信。例如，亚马逊Alexa可以与你的智能灯泡通信，这些灯泡使用智能灯泡。所有这些组件都可以通过智能手机上的应用程序与你的智能手机通信。甚至恒温器也是互联的。那么，我们如何在用例中使用异常检测呢？一个简单的例子就是监控你在所有天气条件下如何设置恒温器以达到最佳温度，并遵循某种推荐或建议的行为。因为恒温器在每户家庭中都有一定程度的个性化，一个非常好的深度学习算法可以持续寻找所有房屋中恒温器的使用情况，包括你的，然后能够检测到你正常使用时的使用方式。可检测的异常可能包括温度的突然上升/下降，这可能表明空调或加热器不工作。如今，冰箱上运行着计算机接口，甚至带有使用监控功能。异常检测的一个例子就是你的冰箱提醒你去购物，因为你已经两三周没有补货了——如果你每周这样做，这绝对是一个异常。
- en: Figure [11-17](#Fig17) show an illustration of a smart home.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-17](#Fig17) 展示了一个智能家居的插图。
