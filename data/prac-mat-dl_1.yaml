- en: Compare Figure [10.8](#p234) with Figure [10.5\.](#p229) The red is the prediction.
    The prediction reproduces the trend of the stock. It gives you an idea of how
    it might perform. The neural network cannot predict the exact stock history but
    does recreate the overall performance that is expected.
  id: totrans-2471
  prefs: []
  type: TYPE_NORMAL
  zh: 将图 [10.8](#p234) 与图 [10.5\.](#p229) 进行比较。红色表示预测结果。预测结果再现了股票的趋势。这让你对它的表现有一个大致的了解。神经网络不能预测确切的股票历史，但它确实再现了预期的整体表现。
