  type: TYPE_NORMAL
  zh: '19'
- en: d
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: d
- en: = EquilibriumControls( x, d );
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: = EquilibriumControls( x, d );
