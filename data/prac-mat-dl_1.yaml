- en: CHAPTER 11
  id: totrans-2900
  prefs: []
  type: TYPE_NORMAL
  zh: 第十一章
- en: IMAGE CLASSIFICATION
  id: totrans-2901
  prefs: []
  type: TYPE_NORMAL
  zh: 图像分类
- en: For fun, and to learn more about this network, we print out the categories that
    had the next highest scores, sorted from high to low. The categories are stored
    in the last layer of the net in its Classes.
  id: totrans-2902
  prefs: []
  type: TYPE_NORMAL
  zh: 为了娱乐和学习更多关于这个网络的信息，我们打印出得分次之的类别，从高到低排序。这些类别存储在网络最后一层的Classes中。
- en: '***AlexNetTest.m***'
  id: totrans-2903
  prefs: []
  type: TYPE_NORMAL
  zh: '***AlexNetTest.m***'
- en: '35'
  id: totrans-2904
  prefs: []
  type: TYPE_NORMAL
  zh: '35'
- en: '% What other categories are similar?'
  id: totrans-2905
  prefs: []
  type: TYPE_NORMAL
  zh: '% 其他哪些类别相似？'
- en: '36'
  id: totrans-2906
  prefs: []
  type: TYPE_NORMAL
  zh: '36'
- en: '**disp**(''Categories with highest scores for Peppers:'')'
  id: totrans-2907
  prefs: []
  type: TYPE_NORMAL
  zh: '**disp**(''Peppers的最高分类别：'')'
- en: '37'
  id: totrans-2908
  prefs: []
  type: TYPE_NORMAL
  zh: '37'
- en: kPos = **find**(scorePeppers>0.01);
  id: totrans-2909
  prefs: []
  type: TYPE_NORMAL
  zh: kPos = **find**(scorePeppers>0.01);
- en: '38'
  id: totrans-2910
  prefs: []
  type: TYPE_NORMAL
  zh: '38'
- en: '[vals,kSort] = **sort**(scorePeppers(kPos),''descend'');'
  id: totrans-2911
  prefs: []
  type: TYPE_NORMAL
  zh: '[vals,kSort] = **sort**(scorePeppers(kPos),''descend'');'
- en: '39'
  id: totrans-2912
  prefs: []
  type: TYPE_NORMAL
  zh: '39'
- en: '**for** k = 1:**length**(kSort)'
  id: totrans-2913
  prefs: []
  type: TYPE_NORMAL
  zh: '**for** k = 1:**length**(kSort)'
- en: '40'
  id: totrans-2914
  prefs: []
  type: TYPE_NORMAL
  zh: '40'
- en: '**fprintf**(''%13s:\t%g\n'',net.Layers(**end**).Classes(kPos(kSort(k))),vals(k)'
  id: totrans-2915
  prefs: []
  type: TYPE_NORMAL
  zh: '**fprintf**(''%13s:\t%g\n'',net.Layers(**end**).Classes(kPos(kSort(k))),vals(k)'
- en: );
  id: totrans-2916
  prefs: []
  type: TYPE_NORMAL
  zh: );
- en: '41'
  id: totrans-2917
  prefs: []
  type: TYPE_NORMAL
  zh: '41'
- en: '**end**'
  id: totrans-2918
  prefs: []
  type: TYPE_NORMAL
  zh: '**end**'
- en: The results show that the net was considering all fruits and vegetables. The
    Granny Smith had the next highest score, followed by cucumber, while the fig and
    lemon had much smaller scores. This makes sense since Granny Smiths and cucumbers
    are also usually green.
  id: totrans-2919
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示，网络正在考虑所有水果和蔬菜。Granny Smith的得分次之，其次是黄瓜，而无花果和柠檬的得分要小得多。这很合理，因为Granny Smith和无花果通常也是绿色的。
