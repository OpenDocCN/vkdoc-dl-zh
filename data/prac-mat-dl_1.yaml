- en: The view is set to look along the *y*-axis which is the axis of rotation for
    the ellipse. The function Cone draws the cone. line draws the axis of rotation
    that is along the short axis.
  id: totrans-3405
  prefs: []
  type: TYPE_NORMAL
  zh: 视图设置为沿着 *y*-轴，这是椭圆的旋转轴。Cone 函数绘制了圆锥。line 绘制了沿着短轴的旋转轴。
- en: The solution that is used to draw the conic sections is derived in the last
    section of this chapter. The orbit may be elliptical, with an eccentricity less
    than one, parabolic with an eccentricity equal to one, or hyperbolic with an eccentricity
    greater than one. Figure [12.2](#p248) shows the geometry of an elliptical orbit.
    This is a planar orbit in which the orbital motion is two-dimensional.
  id: totrans-3406
  prefs: []
  type: TYPE_NORMAL
  zh: 用于绘制圆锥曲线的解在本书的最后一节推导得出。轨道可能是椭圆形的，离心率小于一，抛物线，离心率等于一，或双曲线，离心率大于一。图 [12.2](#p248)
    展示了椭圆形轨道的几何形状。这是一个平面轨道，其中轨道运动是二维的。
