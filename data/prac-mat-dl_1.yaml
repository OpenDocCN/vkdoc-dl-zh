  prefs: []
  type: TYPE_NORMAL
  zh: 股票预测
- en: learning does. Remember, this is a simple model of stock prices. Both *σ* and
    *r* could also be functions of time or random variables by themselves. Of course,
    there are other stock models too! The idea here is that deep learning creates
    its internal model without a need to be told about the model underlying the observed
    data.
  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: 学习所做的。记住，这是一个简单的股票价格模型。*σ*和*r*也可以是时间或随机变量的函数。当然，还有其他的股票模型！这里的想法是，深度学习在没有被告知观察数据背后的模型的情况下创建其内部模型。
- en: The function PlotStock.m plots the stock price. Notice that we format the *y*
    tick labels ourselves to get rid of the exponential format that MATLAB would normally
    employ. gca returns the current axes handle.
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: The function PlotStock.m plots the stock price. Notice that we format the *y*
    tick labels ourselves to get rid of the exponential format that MATLAB would normally
    employ. gca returns the current axes handle.
