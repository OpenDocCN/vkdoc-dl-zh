- en: We have an image layer to read in each image. We next convolve them with filters.
    The weights of the filters are determined during the learning. We normalize the
    outputs and pass through the ReLU activation function. Pooling compresses the
    data. Padding sets the output size equal to the input size. As seen by the layers
    printout, no padding is needed since the images are all the same size. The first
    layer has eight 3 by 3 pixel filters. The second layer has 32 3 by 3 pixel filters.
    The final set of layers is used to classify the images. As noted in the previous
    section, each image has a unique “class” which is associated with its location.
    We use a constant learning rate. The batch size is smaller than the default.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一个图像层来读取每个图像。接下来，我们使用过滤器对它们进行卷积。过滤器的权重在训练过程中确定。我们规范化输出并通过ReLU激活函数。池化压缩数据。填充设置输出大小等于输入大小。从层的打印输出中可以看出，不需要填充，因为所有图像都是相同的大小。第一层有八个3x3像素的过滤器。第二层有32个3x3像素的过滤器。最后一组层用于对图像进行分类。正如前一小节所述，每个图像都有一个独特的“类别”，它与它的位置相关联。我们使用恒定的学习率。批处理大小小于默认值。
- en: Figure [9.14](#p215) shows some of the images. Figure [9.15](#p216) shows the
    training window. It can categorize the images after seven epochs. The difference
    between the two adjacent images is only 16 pixels. It isn’t a lot of data, but
    the neural net can categorize each image with 100%
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9.14](#p215) 展示了一些图像。图 [9.15](#p216) 展示了训练窗口。它可以在七个epoch后对图像进行分类。相邻图像之间的差异仅为16像素。数据量不是很大，但神经网络可以以100%的准确率对每个图像进行分类。
- en: accuracy.
  id: totrans-799
