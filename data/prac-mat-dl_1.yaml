- en: The GoogLeNet score arrays for Cat.png and Box.png are shown in Figure [11.4\.](#p244)
    The box scores are visibly spread all over the place. This reinforces that the
    choice of “iPod” is less certain than the pepper or cat. This shows that even
    highly trained networks are not necessarily reliable if the input strays too far
    from the test set.
  id: totrans-3146
  prefs: []
  type: TYPE_NORMAL
  zh: GoogLeNet对Cat.png和Box.png的得分数组如图[11.4]所示。盒子得分在图中分布广泛。这再次证实了“iPod”的选择不如辣椒或猫那么确定。这表明，即使是非常训练有素的网络，如果输入与测试集相差太远，也不一定是可靠的。
