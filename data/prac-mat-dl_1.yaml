  prefs: []
  type: TYPE_NORMAL
  zh: 第十章
- en: STOCK PREDICTION
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 股票预测
- en: The results are shown in Figure [10.1](#p224). They look like a real stock.
    Changing the drift or volatility will change the overall shape. For example, if
    you set the volatility, *σ* = 0, you get the very nice stock shown with the red
    line. Increasing *r* makes the stock grow faster. This gives us the general rule
    that we want high *r* and low *σ*. See Figure [10.2](#p224).
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示在图 [10.1](#p224)。它们看起来像真实的股票。改变漂移或波动性将改变整体形状。例如，如果您将波动性设置为*σ* = 0，您将得到红色线条显示的非常漂亮的股票。增加*r*会使股票增长更快。这给我们一个一般规则，我们希望*r*高而*σ*低。见图
    [10.2](#p224)。
- en: Our model is based on two coefficients. We could make a stock-picking algorithm
    by just fitting stock price curves and computing *r* and *σ*. However, we want
    to see how well deep 22000
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的模式基于两个系数。我们可以通过仅拟合股票价格曲线并计算*r*和*σ*来制作一个股票选择算法。然而，我们想看看深度学习如何做到这一点。22000
