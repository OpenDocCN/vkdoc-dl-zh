  type: TYPE_NORMAL
  zh: 第十一章
- en: IMAGE CLASSIFICATION
  id: totrans-3019
  prefs: []
  type: TYPE_NORMAL
  zh: 图像分类
- en: '**11.3**'
  id: totrans-3020
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.3**'
- en: '**Using GoogLeNet**'
  id: totrans-3021
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用 GoogLeNet**'
- en: '**11.3.1 Problem**'
  id: totrans-3022
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.3.1 问题**'
- en: Now let’s compare these results to GoogLeNet. GoogLeNet is a pretrained model
    that has also been trained on a subset of the ImageNet database which is used
    in the ImageNet Large-Scale Visual Recognition Challenge (ILSVRC). The model is
    trained on more than a million images, has 144 layers (a lot more than the AlexNet),
    and can classify images into 1000 object categories.
  id: totrans-3023
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将这些结果与 GoogLeNet 进行比较。GoogLeNet 是一个预训练模型，它也在 ImageNet 大规模视觉识别挑战（ILSVRC）中使用的
    ImageNet 数据库的子集上进行了训练。该模型在超过一百万张图像上进行了训练，有 144 层（比 AlexNet 多得多），并且可以将图像分类到 1000
    个对象类别中。
- en: '**11.3.2 Solution**'
  id: totrans-3024
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.3.2 解决方案**'
- en: Install GoogLeNet from the Add-On Explorer (try running it from the command
    line to get an install link). Load some images and test using classify.
  id: totrans-3025
  prefs: []
  type: TYPE_NORMAL
  zh: 从附加组件探索器中安装 GoogLeNet（尝试从命令行运行以获取安装链接）。加载一些图像并使用 classify 进行测试。
- en: '**11.3.3 How It Works**'
  id: totrans-3026
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.3.3 它是如何工作的**'
- en: First, we load the pretrained network as in the previous recipe.
  id: totrans-3027
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们像上一个配方中那样加载预训练网络。
