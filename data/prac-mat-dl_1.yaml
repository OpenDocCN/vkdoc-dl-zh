  type: TYPE_NORMAL
  zh: 第十章
- en: STOCK PREDICTION
  id: totrans-2035
  prefs: []
  type: TYPE_NORMAL
  zh: 股票预测
- en: '**10.4**'
  id: totrans-2036
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.4**'
- en: '**Training and Testing**'
  id: totrans-2037
  prefs: []
  type: TYPE_NORMAL
  zh: '**训练和测试**'
- en: '**10.4.1 Problem**'
  id: totrans-2038
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.4.1 问题**'
- en: We want to build a deep learning system to predict the performance of a stock.
    This can be applied to the stock market created earlier to predict the performance
    of a portfolio.
  id: totrans-2039
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望构建一个深度学习系统来预测股票的表现。这可以应用于之前创建的股票市场，以预测投资组合的表现。
- en: '**10.4.2 Solution**'
  id: totrans-2040
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.4.2 Solution**'
- en: The history of a stock is a time series. We will use a Long Short-Term Memory
    (LSTM) network to predict the future performance of the stock based on past data.
    Past performance is not necessarily indicative of future results. All investments
    carry some amount of risk. You are encouraged to consult with a certified financial
    planner before making any investment decisions.
  id: totrans-2041
  prefs: []
  type: TYPE_NORMAL
  zh: 股票的历史是一组时间序列。我们将使用长短期记忆（LSTM）网络根据历史数据预测股票的未来表现。过去的表现并不一定预示着未来的结果。所有投资都存在一定的风险。在做出任何投资决策之前，我们鼓励您咨询认证的财务规划师。
- en: This utilizes the Deep Learning Toolbox’s lstmLayer layer. We will use part
    of the time series to test the results.
  id: totrans-2042
  prefs: []
  type: TYPE_NORMAL
  zh: 这利用了Deep Learning Toolbox的lstmLayer层。我们将使用部分时间序列来测试结果。
- en: '**10.4.3 How It Works**'
  id: totrans-2043
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.4.3 工作原理**'
- en: An LSTM layer learns long-term dependencies between time steps in a time series.
    It automatically deweights past data. LSTMs have replaced recursive neural nets
    (RNNs) in many applications.
  id: totrans-2044
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM层学习时间序列中时间步之间的长期依赖关系。它自动降低过去数据的重要性。在许多应用中，LSTM已经取代了递归神经网络（RNN）。
- en: The script StockMarketNeuralNet.m implements the neural network. The first part
    creates a market with a single stock. We set the random number generator to its
    default value, rng(’default’), so that every time you run the script, you will
    get the same result. If you remove this line, you will get different results each
    time. The neural network training data is the time sequence, and the time sequence
    is shifted by a one-time step.
  id: totrans-2045
  prefs: []
  type: TYPE_NORMAL
  zh: StockMarketNeuralNet.m脚本实现了神经网络。第一部分创建了一个包含单一股票的市场。我们将随机数生成器设置为默认值，rng('default')，这样每次运行脚本时都会得到相同的结果。如果您删除这一行，每次运行都会得到不同的结果。神经网络训练数据是时间序列，时间序列通过一次步长进行平移。
