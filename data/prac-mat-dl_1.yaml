- en: ORBIT DETERMINATION
  id: totrans-3474
  prefs: []
  type: TYPE_NORMAL
  zh: ORBIT DETERMINATION
- en: Each representation uses six independent variables to describe the orbit, plus
    *μ*. Both are shown in Figure [12.3](#p250).
  id: totrans-3475
  prefs: []
  type: TYPE_NORMAL
  zh: 每种表示法都使用六个独立变量来描述轨道，加上 *μ*。两者都在图 [12.3](#p250) 中显示。
- en: 'The Keplerian elements are defined as follows: Two elements define the elliptical
    orbit.'
  id: totrans-3476
  prefs: []
  type: TYPE_NORMAL
  zh: 开普勒元素的定义如下：两个元素定义椭圆轨道。
- en: The size of the orbit is determined by the semi-major axis *a*, which is the
    average of the perigee radius and apogee radius. The size and shape of the orbit
    are defined by the eccentricity, *e*.
  id: totrans-3477
  prefs: []
  type: TYPE_NORMAL
  zh: 轨道的大小由半长轴 *a* 决定，它是近地点半径和远地点半径的平均值。轨道的大小和形状由偏心率，*e* 定义。
- en: Two elements define the orbital plane. Ω is the longitude which is the right
    ascension of the ascending node, or the angle from the +xECI axis of the reference
    frame to the line where the orbit plane intersects the *xy*-plane. *i* is the
    inclination and is the angle between the xECIyECI-plane and the orbit plane. *ω*
    is the argument of perigee and is the angle in the orbit plane between the ascending
    node line and perigee (where the orbit is closest to the center of the central
    body). *ν* is the true anomaly and is the angle between the perigee and the spacecraft.
  id: totrans-3478
  prefs: []
  type: TYPE_NORMAL
  zh: 两个元素定义轨道平面。Ω 是经度，即升交点的赤经，或参考系中 +xECI 轴到轨道平面与 *xy*-平面相交线的角度。*i* 是倾角，是 xECIyECI
    平面与轨道平面之间的角度。*ω* 是近地点角距，是轨道平面内升交点线与近地点（轨道最接近中心天体处）之间的角度。*ν* 是真近点角，是近地点与航天器之间的角度。
- en: The mean anomaly *M* may be used in the element set instead of *ν*. *M* or *ν*
    tells us where the spacecraft is in its orbit. To summarize, the Keplerian elements
    are
  id: totrans-3479
  prefs: []
  type: TYPE_NORMAL
  zh: 平均偏差 *M* 可以用来代替 *ν*。*M* 或 *ν* 告诉我们航天器在其轨道上的位置。总之，开普勒元素是
