- en: We also test this net on the images of the cat and box. The image size for this
    network is 224 *×* 224\. The categories for the cat are the same, with the addition
    of a lynx, and note that the tabby score is significantly lower than for AlexNet.
  id: totrans-3118
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还在猫和盒子的图像上测试了这个网络。这个网络图像的大小是224 *×* 224。猫的类别相同，增加了猞猁，并且请注意，暹罗猫的得分显著低于AlexNet。
- en: 'Categories with highest scores for Cat:'
