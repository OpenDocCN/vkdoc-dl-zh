- en: The selected label is *tabby*. The net can recognize that the photo is of a
    cat, as the other highest scored categories are also kinds of cats. Although what
    a tiger cat might be, as distinguished from a tabby, we can’t say. . .
  id: totrans-2964
  prefs: []
  type: TYPE_NORMAL
  zh: 选定的标签是*虎斑猫*。网络可以识别出照片是一只猫，因为其他得分最高的类别也都是猫的种类。尽管我们可以区分虎斑猫和虎猫，但我们不能说……
- en: The metal box proves the biggest challenge to the net. The category scores above
    0.05 are shown in the following, and the images with their label are shown in
    Figure [11.3\.](#p241)
  id: totrans-2965
  prefs: []
  type: TYPE_NORMAL
  zh: 金属箱对网络来说是最具挑战性的。得分高于0.05的类别如下所示，带有标签的图像显示在图[11.3](#p241)中。
