- en: STOCK PREDICTION
  id: totrans-2105
  prefs: []
  type: TYPE_NORMAL
  zh: 股票预测
- en: The stock price is shown in Figure [10.5\.](#p229) We divide the outputs into
    training and testing data, using the first 80% of the data for training. We normalize
    the data which can produce better results when data has a large range. For simplicity
    in this example, we use the same data for validation and testing, although in
    a production system these should be different.
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: 股票价格显示在图 [10.5](#p229) 中。我们将输出数据分为训练数据和测试数据，使用数据的前80%进行训练。当数据范围较大时，对数据进行归一化可以产生更好的结果。为了简化本例，我们使用相同的数据进行验证和测试，尽管在生产系统中这些应该是不同的。
- en: '***StockMarketNeuralNet.m***'
