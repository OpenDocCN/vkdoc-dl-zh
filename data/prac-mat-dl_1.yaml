- en: '**9.7**'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.7**'
- en: '**Creating the Training Images**'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '**创建训练图像**'
- en: '**9.7.1 Problem**'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.7.1 问题**'
- en: We want to create training images for our terrain model.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望为我们的地形模型创建训练图像。
- en: '**9.7.2 Solution**'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.7.2 解决方案**'
- en: We build a script to read in the 64 by 64 bit image and create training images.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 我们编写了一个脚本，用于读取64x64位图像并创建训练图像。
- en: '**9.7.3 How It Works**'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.7.3 工作原理**'
- en: We first create a 64-bit version of our terrain, using any image processing
    app. We’ve already done that, and it is saved as TerrainClose64.jpg. The following
    script reads in the image and generates training images by displacing the index
    one pixel at a time. We save the images in the folder TerrainImages. We also create
    labels. Each image is a different label. For each terrain snippet, we create nN
    copies with noise. Thus, there will be nN images with the label l. We add noise
    with the code
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先使用任何图像处理应用程序创建我们地形的64位版本。我们已经完成了这项工作，并将其保存为TerrainClose64.jpg。以下脚本读取图像并通过逐像素移动索引生成训练图像。我们将图像保存在TerrainImages文件夹中。我们还创建了标签。每个图像都是不同的标签。对于每个地形片段，我们创建nN个带噪声的副本。因此，将有nN个带有标签l的图像。我们使用以下代码添加噪声
- en: uint8(floor(sig*rand(nBits,nBits,3)))
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: uint8(floor(sig*rand(nBits,nBits,3)))
