  prefs: []
  type: TYPE_NORMAL
  zh: 第十章
- en: STOCK PREDICTION
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: 股票预测
- en: '*S* is the stock price. *W* ( *t*) is a Brownian, random walk, process. *t*
    is the time, and *dt* is the time differential. *r* is the drift, and *σ* is the
    volatility of the stock market. Both range from zero to one. It could also be
    written in differential equation form as'
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: '*S* 是股票价格。*W* ( *t*) 是布朗运动，随机游走过程。*t* 是时间，*dt* 是时间微分。*r* 是漂移，*σ* 是股市的波动性。两者范围均为零到一。也可以用微分方程形式表示为'
- en: '*dS* ='
  id: totrans-1586
  prefs: []
  type: TYPE_NORMAL
  zh: '*dS* ='
- en: '*dW* ( *t*)'
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: '*dW* ( *t*)'
- en: '*r* + *σ*'
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: '*r* + *σ*'
- en: '*S*'
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: '*S*'
- en: (10.2)
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: (10.2)
- en: '*dt*'
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: '*dt*'
- en: '*dt*'
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: '*dt*'
- en: The solution is
  id: totrans-1593
  prefs: []
  type: TYPE_NORMAL
  zh: 解是
- en: '*S*( *t*) = *S*(0) *e*[( *r−* 12 *σ* 2) *t*+ *σW* ( *t*)]'
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: '*S*( *t*) = *S*(0) *e*[( *r−* 12 *σ* 2) *t*+ *σW* ( *t*)]'
- en: (10.3)
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: (10.3)
- en: The following shows the code used to generate the stock trends. We use cumsum
    to sum the random numbers for the random walk. We use a Gaussian or normal distribution
    produced by randn to create the random numbers. The function can create multiple
    stocks.
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码显示了生成股票趋势所使用的代码。我们使用cumsum对随机游走中的随机数进行求和。我们使用由randn产生的高斯或正态分布来创建随机数。该函数可以创建多个股票。
