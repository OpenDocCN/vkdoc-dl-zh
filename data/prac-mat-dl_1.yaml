- en: We can also grab random images from the Internet. The site [picsum.photos](2091
    2773 a 2091 2773 a) calls itself the
  id: totrans-3194
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以从互联网上抓取随机图像。网站[picsum.photos](2091 2773 a 2091 2773 a)自称提供“Lorem Ipsum”样式的照片，并且每次调用URL时都会提供一张随机照片。例如：
- en: '“Lorem Ipsum” for photos and provides a random photo with every call to the
    URL. Consider, for example:'
  id: totrans-3195
  prefs: []
  type: TYPE_NORMAL
  zh: “Lorem Ipsum”用于照片，并且每次调用URL时都会提供一张随机照片。例如：
- en: '>> I = **imread**(''https://picsum.photos/224/224'');'
  id: totrans-3196
  prefs: []
  type: TYPE_NORMAL
  zh: '>> I = **imread**(''https://picsum.photos/224/224'');'
- en: '>> **figure**, **imshow**(I);'
  id: totrans-3197
  prefs: []
  type: TYPE_NORMAL
  zh: '>> **figure**, **imshow**(I);'
- en: '>> **title**(classify(net,I))'
  id: totrans-3198
  prefs: []
  type: TYPE_NORMAL
  zh: '>> **title**(classify(net,I))'
- en: We got some interesting results using this website. It produces good results
    for some landscape photos, but other times see objects that are not there. Figure
    [11.5](#p245) shows four examples.
  id: totrans-3199
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用这个网站得到了一些有趣的结果。对于一些风景照片，它产生了很好的结果，但有时也会看到不存在的物体。图[11.5](#p245)显示了四个例子。
- en: An overexposed image of a sunset over a train yard is identified as a “volcano.”
    Two landscapes are appropriately labeled as “lakeside” and “seashore.” However,
    in the last image, a person on a bench gazing at a beach or desert landscape is
    inexplicably identified as “geyser.” This may have to do with the shape of the
    sky or clouds.
  id: totrans-3200
  prefs: []
  type: TYPE_NORMAL
  zh: 一张火车场日落过度曝光的图像被识别为“火山”。两个景观被适当地标记为“湖边”和“海边”。然而，在最后一张图像中，一个坐在长椅上凝视海滩或沙漠景观的人不可思议地被识别为“间歇泉”。这可能与其天空或云的形状有关。
- en: These nets are **not** trained on people; however, it can be interesting to
    test them on images of people. We tested GoogLeNet on our author headshots, Figure
    [11.6\.](#p245) In both cases, it identified our clothing fairly accurately!
  id: totrans-3201
  prefs: []
  type: TYPE_NORMAL
  zh: 这些网络没有在人类身上进行训练；然而，测试它们在人类图像上可能很有趣。我们在我们的作者头像上测试了GoogLeNet，如图[11.6](#p245)所示。在两种情况下，它都相当准确地识别了我们的服装！
