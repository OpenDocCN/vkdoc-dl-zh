- en: Results for the bilstm layer and two lstm layers are shown in Figure [10.9](#p235)
    and Figure [10.10\.](#p236) All produce acceptable models. The bilstm looks like
    it predicts the trends better.
  id: totrans-2494
  prefs: []
  type: TYPE_NORMAL
  zh: 双向长短期记忆层和两个长短期记忆层的结果分别显示在图 [10.9](#p235) 和图 [10.10\.](#p236) 中。所有这些都产生了可接受的模型。双向长短期记忆层看起来在预测趋势方面表现更好。
- en: This chapter demonstrated that an LSTM can produce an internal model that replicates
    the behavior of a system from just observations of the process. In this case,
    we had a model, but in many systems, a model does not exist or has considerable
    uncertainty in its form. For this reason, neural nets can be a powerful tool when
    working with dynamical systems. We haven’t tried this with real stocks.
  id: totrans-2495
  prefs: []
  type: TYPE_NORMAL
  zh: 本章展示了 LSTM 可以产生一个内部模型，该模型仅通过观察过程的行为来复制系统的行为。在这种情况下，我们有一个模型，但在许多系统中，模型可能不存在或其形式存在相当大的不确定性。因此，当与动态系统一起工作时，神经网络可以成为一个强大的工具。我们还没有尝试用真实的股票进行这项实验。
