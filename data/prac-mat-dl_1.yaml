- en: Figure [9.16](#p219) shows the trajectory and the camera view. We simulate one
    full circle.
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 图[9.16](#p219)显示了轨迹和相机视图。我们模拟了一整圈。
- en: The identified terrain segment and the path, based on the neural network location,
    are shown in Figure [9.17](#p220). The neural net classifies the terrain it is
    seeing. The location of each image is read out and used to plot the trajectory.
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 根据神经网络定位，图[9.17](#p220)显示了识别的地形段和路径。神经网络对它所看到的地面进行分类。读取每个图像的位置并用于绘制轨迹。
- en: The 2D trajectory is shown in Figure [9.18](#p221) for a circular path. We make
    sure we are in the regions where each image is a pixel change. On the edges, there
    is one image border. If we were in that region, the resolution would be below.
    The trajectory from the images is reasonably close to the actual trajectory. Better
    results would require higher resolution. In practice, the measured positions would
    be inputs to a Kalman filter [42] that modeled the aircraft dynamics, given earlier
    in this chapter. An input to the Kalman filter could be a 3-axis accelerometer
    (see Chapter 7). This would smooth the trajectory and improve accuracy.
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[9.18](#p221)中显示了圆形路径的二维轨迹。我们确保我们处于每个图像都代表一个像素变化的区域。在边缘，有一个图像边界。如果我们处于那个区域，分辨率会低于。从图像得到的轨迹与实际轨迹相当接近。更好的结果需要更高的分辨率。在实践中，测量的位置将作为输入输入到卡尔曼滤波器[42]，该滤波器在本章中之前建模了飞机动力学。卡尔曼滤波器的输入可以是三轴加速度计（见第7章）。这将平滑轨迹并提高精度。
