- en: CHAPTER 10
  id: totrans-1867
  prefs: []
  type: TYPE_NORMAL
  zh: 第十章
- en: STOCK PREDICTION
  id: totrans-1868
  prefs: []
  type: TYPE_NORMAL
  zh: 股票预测
- en: '**10.3.2 Solution**'
  id: totrans-1869
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.3.2 解决方案**'
- en: Use the stock price function to create 100 stocks with randomly chosen parameters.
  id: totrans-1870
  prefs: []
  type: TYPE_NORMAL
  zh: Use the stock price function to create 100 stocks with randomly chosen parameters.
- en: '**10.3.3 How It Works**'
  id: totrans-1871
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.3.3 工作原理**'
- en: We write a function that randomly picks stock starting prices, volatility, and
    drift. It also creates random three-letter stock names. We use a half-normal distribution
    for the stock prices. This code generates the random market. We limit the drift
    to between 0 and 0.5\. This creates more stocks (for small markets) that go down.
  id: totrans-1872
  prefs: []
  type: TYPE_NORMAL
  zh: 我们编写了一个函数，该函数随机选择股票的起始价格、波动性和漂移。它还创建了随机的三位股票名称。我们使用半正态分布来表示股票价格。此代码生成随机市场。我们将漂移限制在0到0.5之间。这创建了更多（对于小型市场）向下走的股票。
