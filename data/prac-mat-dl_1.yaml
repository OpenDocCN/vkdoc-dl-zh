- en: '**CHAPTER 11**'
  id: totrans-2561
  prefs: []
  type: TYPE_NORMAL
  zh: '**第11章**'
- en: '**Image Classification**'
  id: totrans-2562
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像分类**'
- en: '**11.1**'
  id: totrans-2563
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.1**'
- en: '**Introduction**'
  id: totrans-2564
  prefs: []
  type: TYPE_NORMAL
  zh: '**简介**'
- en: Image classification can be done with pretrained networks. MATLAB makes it easy
    to access and use these networks. This chapter shows you two examples. First,
    we will use AlexNet, then GoogLeNet.
  id: totrans-2565
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用预训练网络进行图像分类。MATLAB使得访问和使用这些网络变得容易。本章展示了两个示例。首先，我们将使用AlexNet，然后是GoogLeNet。
- en: '**11.2**'
  id: totrans-2566
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.2**'
- en: '**Using AlexNet**'
  id: totrans-2567
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用AlexNet**'
- en: '**11.2.1 Problem**'
  id: totrans-2568
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.2.1 问题**'
- en: We want to use the pretrained network AlexNet for image classification.
  id: totrans-2569
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想使用预训练网络AlexNet进行图像分类。
- en: '**11.2.2 Solution**'
  id: totrans-2570
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.2.2 解决方案**'
- en: Depending on your version of MATLAB, install AlexNet from the Add-On Explorer
    or download the support package for GoogLeNet. Load some images and test. These
    are classification networks, so we will use classify to run them.
  id: totrans-2571
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的MATLAB版本，从Add-On Explorer安装AlexNet或下载GoogLeNet的支持包。加载一些图像并测试。这些是分类网络，因此我们将使用classify来运行它们。
- en: '**11.2.3 How It Works**'
  id: totrans-2572
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.2.3 它是如何工作的**'
- en: First, we need to download the support packages with the Add-On Explorer. If
    you attempt to run alexnet or googlenet without having them installed, you will
    get a link directly to the package in the Add-On Explorer. You will need your
    MathWorks password.
  id: totrans-2573
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要使用Add-On Explorer下载支持包。如果你尝试在没有安装它们的情况下运行alexnet或googlenet，你将直接在Add-On
    Explorer中获取到包的链接。你需要你的MathWorks密码。
- en: AlexNet is a pretrained convolutional neural network (CNN) that has been trained
    on approximately 1.2 million images from the ImageNet Dataset [(http://image-net.org/](2146
    3602 a 2146 3602 a)
  id: totrans-2574
  prefs: []
  type: TYPE_NORMAL
  zh: 'AlexNet是一个在ImageNet数据集（[http://image-net.org/](2146 3602 a 2146 3602 a)）上大约训练了120万张图像的预训练卷积神经网络（CNN）。 '
- en: '[index).](http://image-net.org/index) The model has 25 layers and can classify
    images into 1000 object categories. It can be used for all sorts of object classification.
    However, if an object was not in the training set, it won’t be able to identify
    the object. If a banana was in the training set, you could expect the CNN to correctly
    identify a new picture of a banana. But if you gave it a picture of a plantain,
    and plantain was NOT in the CNN, then it might not find a match or, more likely,
    it might incorrectly classify it like a banana.'
  id: totrans-2575
  prefs: []
  type: TYPE_NORMAL
  zh: '[索引).](http://image-net.org/index) 该模型有25层，可以将图像分类到1000个对象类别。它可以用于各种对象分类。然而，如果对象不在训练集中，它将无法识别该对象。如果香蕉在训练集中，你可以期望CNN正确识别一张香蕉的新图片。但如果你给它一张芭蕉的图片，而芭蕉不在CNN中，那么它可能找不到匹配项，或者更有可能的是，它可能会错误地将它分类为香蕉。'
