- en: While the deep learning system will analyze all of the pixels in the image,
    it is interesting to see how the mean values of the pixel colors vary across an
    image. This is shown in Figure [9.12\.](#p209)
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: While the deep learning system will analyze all of the pixels in the image,
    it is interesting to see how the mean values of the pixel colors vary across an
    image. This is shown in Figure [9.12\.](#p209)
- en: The *x*-axis is the image number, going by rows of constant y. As can be seen,
    there is considerable variation even in nearby images. This indicates that there
    is sufficient information in each image for our deep learning system to be able
    to find locations. It also shows that it might be possible just to use mean values
    to identify the location. Remember that each image varies from the previous by
    only 16 pixels.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 横轴是图像编号，按y值恒定的行排列。如所见，即使是相邻的图像也存在相当大的变化。这表明每个图像中都有足够的信息，使我们的深度学习系统能够找到位置。它还表明，可能只需要使用平均值来识别位置。记住，每个图像与上一个图像的差异仅为16像素。
