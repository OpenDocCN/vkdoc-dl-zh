  prefs: []
  type: TYPE_NORMAL
  zh: 轨道确定
- en: satellite follows a conic section path about the primary body’s center of mass.
    A conic section is a curve that fits on a cone, as shown in Figure [12.1\.](#p247)
    Two conics, a circle, and an ellipse are drawn. Hyperbolas and parabolas are also
    conic sections, but we will only look at elliptical orbits in this chapter.
  id: totrans-3278
  prefs: []
  type: TYPE_NORMAL
  zh: 卫星围绕主天体的质心遵循圆锥曲线路径。圆锥曲线是适合在圆锥上的曲线，如图[12.1](#p247)所示。绘制了两个圆锥曲线、一个圆和一个椭圆。双曲线和抛物线也是圆锥曲线，但本章我们将只研究椭圆轨道。
- en: The code that draws this picture is in the following script. It calls two functions,
    Cone and ConicSectionEllipse. r0 and h are only needed to draw the cone. The algorithm
    only cares about theta, the half cone angle.
  id: totrans-3279
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制此图的代码位于以下脚本中。它调用了两个函数，Cone和ConicSectionEllipse。r0和h仅用于绘制圆锥。算法只关注theta，即半圆锥角。
