  prefs: []
  type: TYPE_NORMAL
  zh: '16'
- en: v
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: v
- en: = 120;
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: = 120;
- en: '17'
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: '17'
- en: d.phi = **atan**(vˆ2/(r*d.g));
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: d.phi = **atan**(vˆ2/(r*d.g));
- en: '18'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
