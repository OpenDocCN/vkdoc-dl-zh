  type: TYPE_NORMAL
  zh: 第 12 章
- en: ORBIT DETERMINATION
  id: totrans-3430
  prefs: []
  type: TYPE_NORMAL
  zh: 轨道确定
- en: where *ra* is the apoapsis (apogee for the Earth) radius, or point furthest
    from the central planet, and *rp* is the periapsis radius (perigee for the Earth),
    or closest point to the planet. The eccentricity, *e*, of the orbit is
  id: totrans-3431
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *ra* 是远地点（地球的远地点）半径，或最远离中心行星的点，*rp* 是近地点半径（地球的近地点），或最接近行星的点。轨道的离心率 *e* 是
- en: '*r*'
  id: totrans-3432
  prefs: []
  type: TYPE_NORMAL
  zh: '*r*'
- en: '*e* = *a − rp*'
  id: totrans-3433
  prefs: []
  type: TYPE_NORMAL
  zh: '*e* = *a − rp*'
- en: '*r*'
  id: totrans-3434
  prefs: []
  type: TYPE_NORMAL
  zh: '*r*'
- en: (12.2)
  id: totrans-3435
  prefs: []
  type: TYPE_NORMAL
  zh: (12.2)
- en: '*a* + *rp*'
  id: totrans-3436
  prefs: []
  type: TYPE_NORMAL
  zh: '*a* + *rp*'
- en: When *ra* = *rp*, the orbit is circular and *e* = 0\. This formula is not meaningful
    for parabolic or hyperbolic orbits. Figure [12.2](#p248) shows three angular measurements,
    *M* mean anomaly, *E*
  id: totrans-3437
  prefs: []
  type: TYPE_NORMAL
  zh: 当 *ra* = *rp* 时，轨道是圆形的，*e* = 0。这个公式对抛物线或双曲线轨道没有意义。图 [12.2](#p248) 展示了三个角度测量值，*M*
    平均近点角，*E*
- en: 'eccentric anomaly, and *ν* true anomaly. All are measured from periapsis. The
    mean anomaly is related to the mean orbit rate *n* through a simple function of
    time: *M* = *M* 0 + *n*( *t − t* 0)'
  id: totrans-3438
  prefs: []
  type: TYPE_NORMAL
  zh: 离心率，和 *ν* 真近点角。所有这些都是从近地点测量的。平均近点角通过时间的简单函数与平均轨道速率 *n* 相关：*M* = *M* 0 + *n*(
    *t − t* 0)
- en: (12.3)
  id: totrans-3439
  prefs: []
  type: TYPE_NORMAL
  zh: (12.3)
- en: 'The eccentric anomaly is the angle to the current position as projected onto
    the ellipse’s cir-cumscribing circle, drawn in blue. It is related to the mean
    anomaly by Kepler’s equation: *M* = *E − e* sin *E*'
  id: totrans-3440
  prefs: []
  type: TYPE_NORMAL
  zh: 离心率是当前位置投影到椭圆的周长圆上的角度，用蓝色绘制。它与平均近点角通过开普勒方程相关：*M* = *E − e* sin *E*
- en: (12.4)
  id: totrans-3441
  prefs: []
  type: TYPE_NORMAL
  zh: (12.4)
- en: 'This equation needs to be solved numerically in general, but for small values
    of *e*, *e <* 0 *.* 1, this approximation can be used:'
  id: totrans-3442
  prefs: []
  type: TYPE_NORMAL
  zh: 这个方程通常需要数值求解，但对于小的 *e* 值，*e <* 0 *.* 1，可以使用这个近似：
- en: '1'
  id: totrans-3443
  prefs: []
  type: TYPE_NORMAL
  zh: '1'
- en: '*E ≈ M* + *e* sin *M* + *e* 2 sin 2 *M*'
  id: totrans-3444
  prefs: []
  type: TYPE_NORMAL
  zh: '*E ≈ M* + *e* sin *M* + *e* 2 sin 2 *M*'
- en: '2'
  id: totrans-3445
  prefs: []
  type: TYPE_NORMAL
  zh: '2'
- en: (12.5)
  id: totrans-3446
  prefs: []
  type: TYPE_NORMAL
  zh: (12.5)
- en: This is because apoapsis is not well defined for very small *e*. Higher-order
    formulas can also be found. The true anomaly is related to the eccentric anomaly
    through the equation
  id: totrans-3447
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为对于非常小的 *e*，远地点没有很好地定义。也可以找到更高阶的公式。真近点角通过以下方程与离心率相关
- en: '*ν*'
  id: totrans-3448
  prefs: []
  type: TYPE_NORMAL
  zh: '*ν*'
- en: 1 + *e*
  id: totrans-3449
  prefs: []
  type: TYPE_NORMAL
  zh: 1 + *e*
- en: '*E*'
  id: totrans-3450
  prefs: []
  type: TYPE_NORMAL
  zh: '*E*'
- en: tan =
  id: totrans-3451
  prefs: []
  type: TYPE_NORMAL
  zh: tan =
- en: tan
  id: totrans-3452
  prefs: []
  type: TYPE_NORMAL
  zh: tan
- en: '2'
  id: totrans-3453
  prefs: []
  type: TYPE_NORMAL
  zh: '2'
- en: 1 *− e*
  id: totrans-3454
  prefs: []
  type: TYPE_NORMAL
  zh: 1 *− e*
- en: '2'
  id: totrans-3455
  prefs: []
  type: TYPE_NORMAL
  zh: '2'
- en: (12.6)
  id: totrans-3456
  prefs: []
  type: TYPE_NORMAL
  zh: (12.6)
- en: Finally, the orbit radius is
  id: totrans-3457
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，轨道半径是
- en: '*a*(1 *− e*)(1 + *e*)'
  id: totrans-3458
  prefs: []
  type: TYPE_NORMAL
  zh: '*a*(1 *− e*)(1 + *e*)'
- en: '*r* ='
  id: totrans-3459
  prefs: []
  type: TYPE_NORMAL
  zh: '*r* ='
- en: 1 + *e* cos *ν*
  id: totrans-3460
  prefs: []
  type: TYPE_NORMAL
  zh: 1 + *e* cos *ν*
- en: (12.7)
  id: totrans-3461
  prefs: []
  type: TYPE_NORMAL
  zh: (12.7)
- en: If *e >* 1 in this equation, *r* will go to *∞*, as is expected for parabolic
    or hyperbolic orbits.
  id: totrans-3462
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这个方程中的 *e >* 1，*r* 将趋向于 *∞*，正如抛物线或双曲线轨道所预期的那样。
- en: Seven parameters are necessary to define an orbit of a spacecraft about a spherically
    sym-metric body. One is the gravitational parameter, generally denoted by the
    symbol *μ*. The gravitational parameter is
  id: totrans-3463
  prefs: []
  type: TYPE_NORMAL
  zh: 定义绕球形对称体运行的航天器轨道需要七个参数。其中一个参数是引力参数，通常用符号 *μ* 表示。引力参数是
- en: '*μ* = *G*( *m* 1 + *m* 2)'
  id: totrans-3464
  prefs: []
  type: TYPE_NORMAL
  zh: '*μ* = *G*( *m* 1 + *m* 2)'
- en: (12.8)
  id: totrans-3465
  prefs: []
  type: TYPE_NORMAL
  zh: (12.8)
- en: where *m* 1 is the mass central body and *m* 2 is the mass of the orbiting body.
    *G* is the gravitational constant with units of m3/kg/s2\. For the Earth, *G*
    = 6 *.* 6774 *×* 10 *−* 11 m3/kg/s2\. *μ* for the Earth is 3.98600436 *×* 108
    m3/s2\. There are many ways of representing the other six elements. The two most
    popular sets are position and velocity ( *r* and *v*) vectors and Keplerian orbital
    elements.
  id: totrans-3466
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *m* 1 是中心天体的质量，*m* 2 是轨道天体的质量。*G* 是引力常数，单位为 m3/kg/s2。对于地球，*G* = 6 *.* 6774
    *×* 10 *−* 11 m3/kg/s2。地球的 *μ* 是 3.98600436 *×* 108 m3/s2。表示其他六个元素的方法有很多。最流行的两种集合是位置和速度（
    *r* 和 *v*）向量以及开普勒轨道元素。
- en: '238'
  id: totrans-3467
