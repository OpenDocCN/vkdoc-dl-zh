- en: '**9.9**'
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.9**'
- en: '**Simulation**'
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: '**模拟**'
- en: '**9.9.1 Problem**'
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.9.1 问题**'
- en: We want to test our deep learning algorithm using our terrain model.
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想使用我们的地形模型来测试我们的深度学习算法。
- en: '**9.9.2 Solution**'
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.9.2 解决方案**'
- en: We build a simulation using the trained neural net.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用训练好的神经网络构建一个模拟。
- en: '**9.9.3 How It Works**'
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.9.3 工作原理**'
- en: We reproduce the simulation from the previous section and remove some unneeded
    output so that we can focus on the neural net. We read in the trained neural net.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 我们重现了上一节的模拟，并删除了一些不必要的输出，以便我们可以专注于神经网络。我们读取训练好的神经网络。
- en: '***AircraftNNSim.m***'
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: '***AircraftNNSim.m***'
- en: '10'
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: '10'
- en: '%% Load the neural net'
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: '%% 加载神经网络'
- en: '11'
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: '11'
- en: nN
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: nN
- en: = **load**('TerrainNet');
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: = **load**('TerrainNet');
- en: '12'
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: '12'
- en: rI
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: rI
- en: = **load**('Loc');
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: = **load**('Loc');
- en: The neural net classifies the image obtained by the camera. We convert the category
    into an integer using int32\. The subplot displays the image the neural net identifies
    as matching the camera image and the camera image. The simulation loop stops if
    your altitude, x(6), is less than 1\.
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络将相机获取的图像进行分类。我们使用int32将类别转换为整数。子图显示神经网络识别为与相机图像匹配的图像和相机图像。如果您的海拔，x(6)，小于1，则模拟循环停止。
- en: '14'
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: '14'
- en: '%% Start by finding the equilibrium controls'
