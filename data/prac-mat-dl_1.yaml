- en: 'As before, the image is correctly identified as having a bell pepper, and the
    score is similar to AlexNet. However, the remaining categories are a little different.
    In this case, the cucumber and, for some reason, a maraca scored higher than a
    Granny Smith. Maracas are also round and oblong. The highest categories are as
    follows:'
  id: totrans-3108
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，图像被正确识别为甜椒，得分与AlexNet相似。然而，剩余的类别略有不同。在这种情况下，黄瓜和某种原因，马拉卡得分高于Granny Smith。马拉卡也是圆形和长形的。最高得分类别如下：
- en: 'Categories with highest scores for Peppers:'
