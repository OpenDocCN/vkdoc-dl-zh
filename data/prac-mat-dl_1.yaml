- en: since the noise must be uint8 like the image. You’ll get an error if you don’t
    convert to uint8\. You can also select different strides, that is, moving the
    images more than one pixel.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 由于噪声必须与图像一样是uint8类型。如果您不将其转换为uint8，您将得到错误。您还可以选择不同的步长，即移动图像超过一个像素。
- en: The first code sets up the image processing. We choose 16-bit images because
    (after the next step of training) there is enough information in each image to
    classify each one. We tried 8 bits but it didn’t converge.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: The first code sets up the image processing. We choose 16-bit images because
    (after the next step of training) there is enough information in each image to
    classify each one. We tried 8 bits but it didn’t converge.
