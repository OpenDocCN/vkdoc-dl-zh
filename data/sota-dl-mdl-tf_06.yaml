- en: 6. Simple Transfer Learning with TensorFlow Hub
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 使用TensorFlow Hub的简单迁移学习
- en: '**Transfer learning** is the process of creating new learning models by fine-tuning
    previously trained neural networks. Instead of training a network from scratch,
    we download a pre-trained open source learning model and fine-tune it for our
    own purpose. A *pre-trained model* is one that is created by someone else to solve
    a similar problem. We can use one of these instead of building our own model.
    A big advantage is that a pre-trained model has been crafted by experts, so we
    can be confident that it performs at a high level (in most cases). Another advantage
    is that we don’t have to have a lot of data to use a pre-trained model.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**迁移学习**是通过微调先前训练好的神经网络来创建新的学习模型的过程。我们不是从头开始训练网络，而是下载一个预训练的开源学习模型，并针对我们的目的对其进行微调。一个**预训练模型**是由其他人创建来解决类似问题的。我们可以使用这些模型之一，而不是构建自己的模型。一个很大的优势是，预训练模型是由专家精心制作的，因此我们可以有信心它在大多数情况下表现得很出色。另一个优势是，我们不需要大量数据就可以使用预训练模型。'
- en: In transfer learning, a machine exploits the knowledge gained from a previous
    task to improve generalization about another. For example, in training a classifier
    to predict whether an image contains food, we can use the knowledge it gained
    during training to recognize drinks. So transfer learning can save time, provides
    better neural network performance in most cases, and doesn’t require a lot of
    data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在迁移学习中，机器利用从先前任务中获得的知识来提高对另一个任务的泛化能力。例如，在训练一个分类器来预测图像是否包含食物时，我们可以使用它在训练期间获得的知识来识别饮料。因此，迁移学习可以节省时间，在大多数情况下提供更好的神经网络性能，并且不需要大量数据。
- en: '*TensorFlow Hub* is a repository of trained machine learning models that are
    easily integrated into deep learning experiments. We demonstrate simple transfer
    learning with TensorFlow Hub code examples.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*TensorFlow Hub*是一个存储库，其中包含易于集成到深度学习实验中的训练好的机器学习模型。我们通过TensorFlow Hub的代码示例演示简单的迁移学习。'
- en: Image classification models can have millions of parameters. Training them from
    scratch requires a lot of labeled training data and a lot of computing power.
    With transfer learning, we don’t have to train from scratch! We can take a piece
    of a model that has already been trained on a related task and reuse it in a new
    model. Since we use the weights from a pre-trained model, training time is drastically
    reduced! So we don’t have to train a gigantic neural net because it’s already
    been trained! And training time is reduced because we use the pre-trained model
    on our dataset.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图像分类模型可能有数百万个参数。从头开始训练它们需要大量的标记训练数据和大量的计算能力。使用迁移学习，我们不必从头开始训练！我们可以取一个已经在相关任务上训练好的模型的一部分，并在新的模型中重用它。由于我们使用了预训练模型的权重，训练时间大大减少！因此，我们不必训练一个巨大的神经网络，因为它已经被训练过了！而且，由于我们在数据集上使用了预训练模型，训练时间也减少了。
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 章节的笔记本位于以下URL：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/paperd/deep-learning-models](https://github.com/paperd/deep-learning-models)'
- en: Pre-trained Models for Transfer Learning
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迁移学习的预训练模型
- en: If we don’t have enough training data, it is often a good idea to reuse the
    lower layers of a pre-trained model. Reusing lower layers of a pre-trained model
    is commonly referred to as transfer learning. We only train with the lower layers
    and leave the others frozen. *Lower layers* refer to the general (or problem-independent)
    features of a model. The higher layers refer to specific (or problem-dependent)
    features of a model. The final layers of a pre-trained model are also referred
    to as the final layers.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们没有足够的训练数据，通常重用预训练模型的底层是一个好主意。重用预训练模型的底层通常被称为迁移学习。我们只训练底层，而将其他层冻结。**底层**指的是模型的一般（或问题无关）特征。高层指的是模型的具体（或问题相关）特征。预训练模型的最后几层也被称为最终层。
- en: The idea is to create new deep learning models by fine-tuning previously trained
    ones for our own purpose. Simply, import the trained weights of a pre-trained
    model and change the final layer (or several layers) of the model. We then retrain
    those layers on our own dataset. We save training time and get respectable performance.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，就是通过微调先前训练的模型来创建新的深度学习模型，以适应我们的目的。简单地导入预训练模型的训练权重，并更改模型的最后层（或几层）。然后，我们在自己的数据集上重新训练这些层。我们节省了训练时间，并获得了可接受的性能。
- en: We demonstrate how to use pre-trained models with examples. We begin with an
    experiment using MobileNet-v2 and end with an experiment using Inception-v3\.
    Each pre-trained model is explained in its corresponding sections of the chapter.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过示例演示如何使用预训练模型。我们从使用MobileNet-v2的实验开始，以使用Inception-v3的实验结束。每个预训练模型都在章节的相应部分中进行了解释。
