- en: TensorFlow Hub
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow Hub
- en: We model flowers data with pre-trained TensorFlow SavedModels from TensorFlow
    Hub for image feature extraction. A *SavedModel* is a directory containing serialized
    signatures and the state needed to run them including variable values and vocabularies.
    *TensorFlow Hub* is a repository of pre-trained TensorFlow models. The pre-trained
    models were trained on very large and general datasets.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用来自TensorFlow Hub的预训练TensorFlow SavedModels对花朵数据进行建模，以进行图像特征提取。*SavedModel*是一个包含序列化签名和运行它们所需的状态的目录，包括变量值和词汇表。*TensorFlow
    Hub*是一个预训练的TensorFlow模型的存储库。这些预训练模型是在非常大的通用数据集上训练的。
- en: For more information on TensorFlow Hub, peruse
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 关于TensorFlow Hub的更多信息，请参阅
- en: '[`https://tfhub.dev/`](https://tfhub.dev/)'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '[`https://tfhub.dev/`](https://tfhub.dev/)'
- en: For tutorials on TensorFlow Hub, peruse
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 关于TensorFlow Hub的教程，请参阅
- en: '[`www.tensorflow.org/hub/tutorials`](http://www.tensorflow.org/hub/tutorials)'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/hub/tutorials`](http://www.tensorflow.org/hub/tutorials)'
- en: We use two pre-trained TensorFlow Hub models for transfer learning. We begin
    with the MobileNet-v2 pre-trained model. We then use the Inception-v3 pre-trained
    model and compare results between the two.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用两个预训练的TensorFlow Hub模型进行迁移学习。我们首先使用MobileNet-v2预训练模型。然后使用Inception-v3预训练模型，并比较两者的结果。
- en: MobileNet-v2
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MobileNet-v2
- en: '*MobileNet-v2* is a convolutional neural network that is 53 layers deep. The
    pre-trained version of the network is trained on 1.4 million images and 1,000
    classes of web images from the ImageNet database. The model operates on 224 ×
    224 pixel images. The default training batch size is 1024, which means that each
    iteration operates on 1024 of those images.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '*MobileNet-v2*是一个53层的卷积神经网络。网络的预训练版本在ImageNet数据库中的140万张图像和1000个网络图像类别上进行了训练。该模型在224
    × 224像素的图像上运行。默认的训练批量大小为1024，这意味着每次迭代都会处理1024张这样的图像。'
- en: The *ImageNet project* is a large visual database designed for use in visual
    object recognition software research. More than 14 million images have been hand-annotated
    by the project to indicate what objects are pictured.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '*ImageNet项目*是一个大型视觉数据库，旨在用于视觉对象识别软件研究。项目手动标注了1400多万张图像，以指示图片中的对象。'
- en: Flowers MobileNet-v2 Experiment
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 花朵MobileNet-v2实验
- en: The first experiment uses the MobileNet-v2 pre-trained model to classify flowers.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个实验使用MobileNet-v2预训练模型对花朵进行分类。
- en: Load Flowers as a TFDS Object
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将Flowers作为TFDS对象加载
- en: 'Load the TFDS object with a 75% split for the training set, 15% split for the
    validation set, and 10% split for the test set:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 加载TFDS对象，将训练集分为75%，验证集分为15%，测试集分为10%：
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Explore Metadata
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索元数据
- en: 'Display general information with the info object:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 使用info对象显示一般信息：
- en: '[PRE3]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Display the number of examples in the data splits:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 显示数据分割中的示例数量：
- en: '[PRE4]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We like to display this information for each experiment just to make sure that
    we are splitting the data as intended.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢在每个实验中显示这些信息，只是为了确保我们按预期分割数据。
- en: Manually calculate the number of examples in the data splits as shown in Listing
    [6-1](#PC6).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 手动计算数据分割中的示例数量，如列表[6-1](#PC6)所示。
- en: '[PRE5]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The code in Listing [6-1](#PC6) is optional. We just want to show you how to
    manually check sizes of the learning sets.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[6-1](#PC6)中的代码是可选的。我们只是想展示如何手动检查学习集的大小。
- en: 'Get labels and number of classes:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 获取标签和类别数量：
- en: '[PRE6]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Display Images and Shapes
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示图像和形状
- en: 'Display some images from the dataset:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 显示数据集的一些图像：
- en: '[PRE7]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Display image shapes:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 显示图像形状：
- en: '[PRE8]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Images in the flowers dataset are not all the same size. So we must resize images
    to a standard size to make them consumable by TensorFlow models.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 花卉数据集中的图像大小并不相同。因此，我们必须将图像调整到标准大小，以便它们可以被TensorFlow模型消费。
- en: Build the Input Pipeline
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Create a function to reformat images:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个重新格式化图像的函数：
- en: '[PRE9]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The function resizes and scales an image. The resolution expected by MobileNet-v2
    is (224, 224). The function takes an “image” and a “label” as arguments and returns
    the new “image” and corresponding “label” in the desired form.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 函数调整图像大小并缩放。MobileNet-v2期望的分辨率是（224，224）。该函数接受“图像”和“标签”作为参数，并返回所需形式的新的“图像”和相应的“标签”。
- en: 'Map the function to training, validation, and test examples. And apply other
    transformations:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 将函数映射到训练、验证和测试示例，并应用其他转换：
- en: '[PRE10]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Fortuitously, we found that the batch size of 367 worked extremely well! We
    tried the default batch size of 1024 and displayed labels based on this batch
    size. Surprisingly, we got an error that said something like *our index was out
    of bounds for a size of 367*. So we changed the batch size to 367 and noticed
    that the model performed better in terms of increased validation accuracy than
    with the batch size of 1024\. Moreover, training time was reduced.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 意外的是，我们发现367的批量大小效果非常好！我们尝试了默认的1024批量大小，并基于这个批量大小显示标签。令人惊讶的是，我们得到了一个错误信息，类似于*我们的索引超出了367的大小范围*。因此，我们将批量大小更改为367，并注意到与1024的批量大小相比，模型在验证准确率提高方面表现更好。此外，训练时间也有所减少。
- en: Create a Feature Vector
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建特征向量
- en: A **feature** is an individual measurable property or characteristic of a phenomenon
    being observed. A **feature vector** is a vector containing multiple elements
    about an object. A feature is represented by a feature vector. Combining feature
    vectors together creates a feature space. A **feature space** is the vector space
    associated with feature vectors. A feature may represent just a single pixel or
    an entire image. In our case, a feature represents an entire image depicted by
    a feature vector of pixels.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**特征**是观察到的现象的个别可测量属性或特征。**特征向量**是一个包含关于对象多个元素的向量。特征由特征向量表示。将特征向量组合在一起创建特征空间。**特征空间**是与特征向量关联的向量空间。一个特征可能只代表一个像素或整个图像。在我们的情况下，特征由像素的特征向量表示的整个图像。'
- en: '**Feature** **extraction** is the process of gleaning a subset of the initial
    features from a dataset. The extracted features are expected to contain relevant
    information from the input data. The goal of feature extraction is to perform
    a desired task by using a reduced representation (or subset) instead of the complete
    initial data. Choosing informative, discriminating, and independent features is
    a crucial step for effective algorithms in pattern recognition, classification,
    and regression.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**特征提取**是从数据集中提取初始特征子集的过程。提取的特征应包含来自输入数据的相关信息。特征提取的目的是通过使用减少的表示（或子集）而不是完整的数据来执行所需的任务。选择信息丰富、有区分性和独立的特征是模式识别、分类和回归中有效算法的关键步骤。'
- en: 'Create a feature extractor with the pre-trained model:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 使用预训练模型创建特征提取器：
- en: '[PRE11]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Create a feature extractor using the MobileNet-v2 feature vector model. The
    feature extractor is the partial model from TensorFlow Hub (without the final
    classification layer).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 使用MobileNet-v2特征向量模型创建特征提取器。特征提取器是来自TensorFlow Hub的部分模型（没有最终的分类层）。
- en: Freeze the Pre-trained Model
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 冻结预训练模型
- en: 'Freeze the variables in the feature extractor layer so that training only modifies
    the final classifier layer:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在特征提取器层中冻结变量，以便训练只修改最终的分类层：
- en: '[PRE12]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The result of not freezing the pre-trained layers destroys the information they
    contain during future training rounds.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不冻结预训练层，那么在未来的训练轮次中会破坏它们所包含的信息。
- en: Create a Classification Head
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建分类头
- en: Create a classification head to leverage the pre-trained model for the dataset.
    The classification head consists of a simple sequential model that includes the
    pre-trained model and the new classification layer.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个分类头，利用预训练模型对数据集进行分类。分类头由一个简单的顺序模型组成，包括预训练模型和新的分类层。
- en: 'Import libraries:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE13]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Clear and seed:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置随机种子：
- en: '[PRE14]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Create the classification head:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 创建分类头：
- en: '[PRE15]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: A *classification head* is just a container that holds the pre-trained model
    and any additions that we might wish to add. Notice that the first layer of the
    model we just created is the feature extractor. Also notice that the model is
    **extremely** simple because we leverage the pre-trained weights from MobileNet-v2!
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '*分类头*只是一个容器，它包含预训练模型以及我们可能希望添加的任何内容。请注意，我们刚刚创建的模型的第一层是特征提取器。也请注意，由于我们利用了MobileNet-v2的预训练权重，所以模型**极其**简单！'
- en: Note
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: For our experiment, the classification head is the new model we create that
    contains the pre-trained model (in this case the pre-trained model is a feature
    extractor), a Dropout layer (to reduce overfitting), and a Dense layer (to enable
    classification). To implement a pre-trained model, a mechanism is required, and
    it is referred to as a classification head.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的实验，分类头是我们创建的新模型，它包含预训练模型（在这种情况下是特征提取器）、一个Dropout层（用于减少过拟合）和一个Dense层（用于实现分类）。要实现预训练模型，需要一个机制，这被称为分类头。
- en: Compile and Train the Model
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile :'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE16]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Train:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE17]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Although our model is very simple with no tuning, we get pretty good accuracy
    with just six epochs because MobileNet-v2 was carefully designed over a long time
    by experts and then trained on the massive ImageNet dataset. Also, training time
    is very reasonable.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们的模型非常简单，没有调整，但我们仅用六个epoch就获得了相当好的准确率，因为MobileNet-v2是由专家经过长时间精心设计的，并在庞大的ImageNet数据集上进行了训练。此外，训练时间非常合理。
- en: Note
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: With a very large model like MobileNet-v2, training time would be significant
    if we didn’t use its pre-trained weights.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 使用像MobileNet-v2这样的大型模型，如果我们不使用其预训练的权重，训练时间将会非常显著。
- en: Visualize Performance
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化性能
- en: Plot validation accuracy and loss as shown in Listing [6-2](#PC19).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[6-2](#PC19)所示绘制验证准确率和损失：
- en: '[PRE18]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: We find it amazing that we can get respectable results from a pre-trained model
    on a dataset upon which it wasn’t trained.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现，从它没有训练过的数据集上从预训练模型中获得可尊敬的结果非常令人惊讶。
- en: Make Predictions from Test Data
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从测试数据中做出预测
- en: We predict on test data because the model has **never** seen it!
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在测试数据上做出预测，因为模型**从未**见过它！
- en: 'Predict on test data:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试数据上做出预测：
- en: '[PRE19]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Display class labels:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 显示类标签：
- en: '[PRE20]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Inspect the First Prediction
  id: totrans-103
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 检查第一个预测
- en: We inspect a prediction (or inference) from the dataset to show you the raw
    values returned from the *predict* method. Since inference is the main goal of
    classification learning, we find it valuable to show you what is happening underneath
    the hood (so to speak).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们检查数据集中的一个预测（或推理）以向您展示*predict*方法返回的原始值。由于推理是分类学习的主要目标，我们认为展示底层发生的事情（换句话说）非常有价值。
- en: 'Get the first prediction array:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 获取第一个预测数组：
- en: '[PRE21]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The returned array is the raw prediction.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 返回的数组是原始预测。
- en: 'Use the *np.argmax()* function to get the prediction, which is the value with
    the highest probability from the prediction array for the first image:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 使用*np.argmax()*函数获取预测，这是预测数组中第一个图像的最高概率值：
- en: '[PRE22]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Convert the label to its class name:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 将标签转换为其类名：
- en: '[PRE23]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Get the labels from the first batch:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 从第一个批次获取标签：
- en: '[PRE24]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The number of labels matches the batch size.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 标签的数量与批大小匹配。
- en: 'Get the first label:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 获取第一个标签：
- en: '[PRE25]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: The prediction was correct if the first label matches the prediction for the
    first image!
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果第一个标签与第一个图像的预测相匹配，则预测是正确的！
- en: Inspect the First Batch of Predictions
  id: totrans-118
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 检查预测的第一个批次
- en: 'Alternatively, we can convert *test_batches* to an iterator:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们可以将*test_batches*转换为迭代器：
- en: '[PRE26]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Get the first batch from the iterator, convert images and labels to NumPy, and
    display the first label.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 从迭代器中获取第一个批次，将图像和标签转换为NumPy，并显示第一个标签。
- en: 'Display labels from the first batch:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 显示第一个批次的标签：
- en: '[PRE27]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Convert the batch of labels to named labels:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 将标签批次转换为命名标签：
- en: '[PRE28]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Get predictions from the first batch:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 从第一个批次获取预测：
- en: '[PRE29]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'Convert predictions to named predictions:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 将预测转换为命名预测：
- en: '[PRE30]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Plot Predictions
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绘制预测
- en: The visualization shows actual images from the first test batch. If the prediction
    is correct, the title is blue. If not, the title is red. If the prediction is
    incorrect, the prediction is displayed along with the actual label in parentheses.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化显示了第一个测试批次中的实际图像。如果预测正确，标题是蓝色。如果不正确，标题是红色。如果预测不正确，预测将显示在括号内的实际标签旁边。
- en: Display the predictions as shown in Listing [6-3](#PC32).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[6-3](#PC32)所示显示预测：
- en: '[PRE31]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Flowers Inception-v3 Experiment
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 花卉Inception-v3实验
- en: For the second experiment, we use the Inception-v3 pre-trained model to classify
    flowers. *Inception-v3* is a 48-layer-deep convolutional neural network used for
    image recognition that has been shown to attain greater than 78.1% accuracy on
    the ImageNet dataset. The pre-trained model operates on 299 × 299 images. Default
    training batch size is 1024, which means that each iteration operates on 1024
    of those images.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第二个实验，我们使用 Inception-v3 预训练模型来分类花朵。*Inception-v3* 是一个用于图像识别的 48 层深度卷积神经网络，已经在
    ImageNet 数据集上显示出超过 78.1% 的准确率。预训练模型在 299 × 299 的图像上运行。默认训练批次大小为 1024，这意味着每次迭代都会处理
    1024 张这样的图像。
- en: For an advanced guide to Inception-v3 on Cloud TPU, peruse
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 有关 Cloud TPU 上 Inception-v3 的高级指南，请参阅
- en: '[`https://cloud.google.com/tpu/docs/inception-v3-advanced`](https://cloud.google.com/tpu/docs/inception-v3-advanced)'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://cloud.google.com/tpu/docs/inception-v3-advanced](https://cloud.google.com/tpu/docs/inception-v3-advanced)'
- en: Build the Input Pipeline
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建 Input Pipeline
- en: 'Recreate the function to reformat images:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 重新创建函数以重新格式化图像：
- en: '[PRE32]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The function resizes and scales an image. The resolution expected by Inception-v3
    is (299, 299). The function takes an “image” and a “label” as arguments and returns
    the new “image” and corresponding “label” in the desired form.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数调整图像大小并缩放。Inception-v3 预期分辨率为 (299, 299)。该函数接受“图像”和“标签”作为参数，并返回所需形式的新的“图像”和相应的“标签”。
- en: 'Build the input pipeline for Inception-v3:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 构建 Inception-v3 的输入管道：
- en: '[PRE33]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Map the function to training, validation, and test examples. And apply other
    transformations.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 将函数映射到训练、验证和测试示例，并应用其他转换。
- en: 'Create a feature extractor:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 创建特征提取器：
- en: '[PRE34]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'Freeze the pre-trained model:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 冻结预训练模型：
- en: '[PRE35]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Build the Model
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Clear and seed:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 清除并设置随机种子：
- en: '[PRE36]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'Create the model:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE37]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: We just substitute the Inception-v3 feature extractor to get its pre-trained
    weights!
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只需替换 Inception-v3 特征提取器以获取其预训练权重！
- en: Compile and Train
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练
- en: 'Compile :'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE38]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'Train:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE39]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Visualize Performance
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化性能
- en: Visualize training loss and accuracy as shown in Listing [6-4](#PC41).
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [6-4](#PC41) 所示，可视化训练损失和准确率。
- en: '[PRE40]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Note
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We are not really concerned about comparing model performance between Inception
    and MobileNet because results are always going to be tied to the data that you
    want to model. That is, one might work better on one dataset but not as well on
    another. This is why we show you how to implement both models.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我们并不真正关心比较 Inception 和 MobileNet 之间的模型性能，因为结果总是与你要建模的数据相关。也就是说，一个模型可能在某个数据集上表现更好，但在另一个数据集上则不那么好。这就是为什么我们展示了如何实现这两个模型。
- en: Predictions
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测
- en: 'Make predictions:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 进行预测：
- en: '[PRE41]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'Get a batch of predictions and convert them to named predictions:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 获取一批预测并将它们转换为命名预测：
- en: '[PRE42]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Grab the first batch of images and labels from the test set:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 从测试集中获取第一批图像和标签：
- en: '[PRE43]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Convert the labels to named labels:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 将标签转换为命名标签：
- en: '[PRE44]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Plot Model Predictions
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绘制模型预测
- en: Create a plot function as shown in Listing [6-5](#PC46).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如列表 [6-5](#PC46) 所示的绘图函数。
- en: '[PRE45]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Wrap plotting logic in a function.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 将绘图逻辑封装在函数中。
- en: 'Invoke the function:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE46]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Summary
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The performance of MobileNet-v2 and Inception-v3 was quite similar with the
    flowers dataset. Both models showed no overfitting. Accuracy for both models was
    above 80%. Of course, we only trained for six epochs. But we can’t predict how
    well a pre-trained model works on a given dataset. The idea of pre-trained models
    is to save you time and energy. And this is why there are so many available pre-trained
    models. We speculate that there are going to be many new models created in the
    near future.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: MobileNet-v2 和 Inception-v3 在花朵数据集上的性能相当相似，两者都没有出现过拟合。两个模型的准确率都超过了 80%。当然，我们只训练了六个周期。但我们无法预测预训练模型在给定数据集上的表现如何。预训练模型的想法是节省你的时间和精力。这也是为什么有这么多可用的预训练模型。我们推测在不久的将来将会创建许多新的模型。
