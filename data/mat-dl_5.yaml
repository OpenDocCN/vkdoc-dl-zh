- en: 5. Deep Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 深度学习
- en: It’s time for Deep Learning . You don’t need to be nervous though. As Deep Learning
    is still an extension of the neural network, most of what you previously read
    is applicable. Therefore, you don’t have many additional concepts to learn.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习时代到来了。尽管如此，你不必紧张。因为深度学习仍然是神经网络的扩展，你之前读到的很多东西都是适用的。因此，你不需要学习很多额外的概念。
- en: Briefly, Deep Learning is a Machine Learning technique that employs the deep
    neural network. As you know, the deep neural network is the multi-layer neural
    network that contains two or more hidden layers. Although this may be disappointingly
    simple, this is the true essence of Deep Learning. Figure [5-1](#Fig1) illustrates
    the concept of Deep Learning and its relationship to Machine Learning.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，深度学习是一种机器学习技术，它使用深度神经网络。正如你所知，深度神经网络是包含两个或更多隐藏层的多层神经网络。尽管这听起来可能令人失望地简单，但这正是深度学习的真正本质。图
    [5-1](#Fig1) 阐述了深度学习的概念及其与机器学习的关系。
- en: '![A448947_1_En_5_Fig1_HTML.gif](A448947_1_En_5_Fig1_HTML.gif)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_5_Fig1_HTML.gif](A448947_1_En_5_Fig1_HTML.gif)'
- en: Figure 5-1.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-1.
- en: The concept of Deep Learning and its relationship to Machine Learning
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习的概念及其与机器学习的关系
- en: The deep neural network lies in the place of the final product of Machine Learning,
    and the learning rule becomes the algorithm that generates the model (the deep
    neural network) from the training data.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 深度神经网络位于机器学习的最终产品位置，学习规则变成了从训练数据生成模型（深度神经网络）的算法。
- en: Now, knowing that Deep Learning is just the use of a deeper (more hidden layers)
    neural network, you may ask, “What makes Deep Learning so attractive? Has anyone
    ever thought of making the neural network’s layers even deeper?” In order to answer
    these questions, we need to look into the history of the neural network.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，了解到深度学习只是使用更深（更多隐藏层）的神经网络后，你可能想知道，“是什么让深度学习如此吸引人？有没有人想过让神经网络的层更深？”为了回答这些问题，我们需要回顾神经网络的历史。
- en: It did not take very long for the single-layer neural network, the first generation
    of the neural network, to reveal its fundamental limitations when solving the
    practical problems that Machine Learning faced.[¹](#Fn1) The researchers already
    knew that the multi-layer neural network would be the next breakthrough. However,
    it took approximately 30 years until another layer was added to the single-layer
    neural network. It may not be easy to understand why it took so long for just
    one additional layer. It was because the proper learning rule for the multi-layer
    neural network was not found. Since the training is the only way for the neural
    network to store the information, the untrainable neural network is useless.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 单层神经网络，神经网络的第一代，在解决机器学习面临的实际问题时很快揭示了其基本局限性。[¹](#Fn1) 研究人员已经知道多层神经网络将是下一个突破。然而，直到大约30年后，单层神经网络才增加了另一层。可能很难理解为什么仅仅增加一层需要这么长时间。这是因为没有找到多层神经网络的适当学习规则。由于训练是神经网络存储信息的唯一方式，无法训练的神经网络是没有用的。
- en: The problem of training of the multi-layer neural network was finally solved
    in 1986 when the back-propagation algorithm was introduced. The neural network
    was on stage again. However, it was soon met with another problem. Its performance
    on practical problems did not meet expectations. Of course, there were various
    attempts to overcome the limitations, including the addition of hidden layers
    and addition of nodes in the hidden layer. However, none of them worked. Many
    of them yielded even poorer performances. As the neural network has a very simple
    architecture and concept, there was nothing much to do that could improve it.
    Finally, the neural network was sentenced to having no possibility of improvement
    and it was forgotten.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 多层神经网络的训练问题最终在1986年得到了解决，当时引入了反向传播算法。神经网络再次登台。然而，它很快又遇到了另一个问题。它在实际问题上的表现没有达到预期。当然，人们尝试了各种方法来克服这些限制，包括增加隐藏层和隐藏层中的节点。然而，这些方法都没有奏效。其中许多甚至导致了更差的表现。由于神经网络具有非常简单的设计和概念，没有太多可以改进的地方。最终，神经网络被认为没有改进的可能，并被遗忘了。
- en: It remained forgotten for about 20 years until the mid-2000s when Deep Learning
    was introduced, opening a new door. It took a while for the deep hidden layer
    to yield sufficient performance because of the difficulties in training the deep
    neural network. Anyway, the current technologies in Deep Learning yield dazzling
    levels of performance, which outsmarts the other Machine Learning techniques as
    well as other neural networks, and prevail in the studies of Artificial Intelligence.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 直到2000年代中期深度学习被引入，这个问题大约被遗忘了20年，打开了一扇新的大门。由于训练深层神经网络困难重重，深层隐藏层需要一段时间才能产生足够的性能。无论如何，当前深度学习的技术在性能上令人眼花缭乱，不仅优于其他机器学习技术，也优于其他神经网络，在人工智能的研究中占据主导地位。
- en: In summary, the reason the multi-layer neural network took 30 years to solve
    the problems of the single-layer neural network was the lack of the learning rule,
    which was eventually solved by the back-propagation algorithm. In contrast, the
    reason another 20 years passed until the introduction of deep neural network-based
    Deep Learning was the poor performance. The back-propagation training with the
    additional hidden layers often resulted in poorer performance. Deep Learning provided
    a solution to this problem.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，多层神经网络花了30年才解决单层神经网络的问题，是因为缺乏学习规则，这个问题最终通过反向传播算法得到了解决。相比之下，直到深度神经网络和深度学习引入的20年后，另一个20年的原因是性能不佳。添加额外隐藏层的反向传播训练通常会导致性能下降。深度学习为解决这个问题提供了解决方案。
- en: Improvement of the Deep Neural Network
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度神经网络改进
- en: Despite its outstanding achievements, Deep Learning actually does not have any
    critical technologies to present. The innovation of Deep Learning is a result
    of many small technical improvements. This section briefly introduces why the
    deep neural network yielded poor performance and how Deep Learning overcame this
    problem.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管深度学习取得了卓越的成就，但实际上并没有任何关键的技术可以展示。深度学习的创新是许多小技术改进的结果。本节简要介绍为什么深度神经网络性能不佳以及深度学习是如何克服这个问题的。
- en: 'The reason that the neural network with deeper layers yielded poorer performance
    was that the network was not properly trained. The back-propagation algorithm
    experiences the following three primary difficulties in the training process of
    the deep neural network:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 深层神经网络性能不佳的原因是网络没有得到适当的训练。反向传播算法在深层神经网络的训练过程中遇到以下三个主要困难：
- en: Vanishing gradient
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 梯度消失
- en: Overfitting
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过度拟合
- en: Computational load
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算负载
- en: Vanishing Gradient
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 梯度消失
- en: The gradient in this context can be thought as a similar concept to the delta
    of the back-propagation algorithm. The vanishing gradient in the training process
    with the back-propagation algorithm occurs when the output error is more likely
    to fail to reach the farther nodes. The back-propagation algorithm trains the
    neural network as it propagates the output error backward to the hidden layers.
    However, as the error hardly reaches the first hidden layer, the weight cannot
    be adjusted. Therefore, the hidden layers that are close to the input layer are
    not properly trained. There is no point of adding hidden layers if they cannot
    be trained (see Figure [5-2](#Fig2)).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，梯度可以被视为与反向传播算法中的delta类似的概念。在使用反向传播算法的训练过程中，当输出误差更可能无法达到更远的节点时，会出现梯度消失现象。反向传播算法通过将输出误差向后传播到隐藏层来训练神经网络。然而，由于误差几乎无法达到第一隐藏层，权重无法调整。因此，靠近输入层的隐藏层没有得到适当的训练。如果它们无法得到训练，添加隐藏层就没有意义（见图[5-2](#Fig2)）。
- en: '![A448947_1_En_5_Fig2_HTML.jpg](A448947_1_En_5_Fig2_HTML.jpg)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_5_Fig2_HTML.jpg](A448947_1_En_5_Fig2_HTML.jpg)'
- en: Figure 5-2.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-2。
- en: The vanishing gradient
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度消失
- en: 'The representative solution to the vanishing gradient is the use of the Rectified
    Linear Unit (`ReLU`) function as the activation function. It is known to better
    transmit the error than the sigmoid function. The `ReLU` function is defined as
    follows:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度消失的代表性解决方案是使用修正线性单元（`ReLU`）函数作为激活函数。众所周知，它比sigmoid函数更好地传递误差。`ReLU`函数的定义如下：
- en: '![$$ \begin{array}{c}\varphi (x)\kern0.5em =\left\{\begin{array}{c}\hfill x\kern0.5em
    ,\kern1em x>0\hfill \\ {}\hfill 0\kern0.5em ,\kern1em x\le 0\hfill \end{array}\right.\\
    {}= \max \left(0,\kern0.5em x\right)\end{array} $$](A448947_1_En_5_Chapter_Equa.gif)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \begin{array}{c}\varphi (x)\kern0.5em =\left\{\begin{array}{c}\hfill x\kern0.5em
    ,\kern1em x>0\hfill \\ {}\hfill 0\kern0.5em ,\kern1em x\le 0\hfill \end{array}\right.\\
    {}= \max \left(0,\kern0.5em x\right)\end{array} $$](A448947_1_En_5_Chapter_Equa.gif)'
- en: Figure [5-3](#Fig3) depicts the `ReLU` function. It produces zero for negative
    inputs and conveys the input for positive inputs.[²](#Fn2) Its implementation
    is extremely easy as well.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-3](#Fig3)展示了`ReLU`函数。对于负输入，它产生零；对于正输入，它传递输入。[²](#Fn2)它的实现也非常简单。
- en: '![A448947_1_En_5_Fig3_HTML.jpg](A448947_1_En_5_Fig3_HTML.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_5_Fig3_HTML.jpg](A448947_1_En_5_Fig3_HTML.jpg)'
- en: Figure 5-3.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-3。
- en: The ReLU function
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: ReLU函数
- en: The sigmoid function limits the node’s outputs to the unity regardless of the
    input’s magnitude. In contrast, the `ReLU` function does not exert such limits.
    Isn’t it interesting that such a simple change resulted in a drastic improvement
    of the learning performance of the deep neural network?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: sigmoid函数将节点的输出限制为1，无论输入的大小如何。相比之下，ReLU函数没有这样的限制。这样一个简单的变化却导致了深度神经网络学习性能的显著提升，这不是很有趣吗？
- en: 'Another element that we need for the back-propagation algorithm is the derivative
    of the `ReLU` function. By the definition of the `ReLU` function, its derivative
    is given as:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要用于反向传播算法的ReLU函数的导数。根据ReLU函数的定义，其导数如下：
- en: '![$$ {\varphi}^{\prime }(x)\kern0.5em =\left\{\begin{array}{c}\hfill 1\kern0.5em
    ,\kern1em x>0\hfill \\ {}\hfill 0\kern0.5em ,\kern1em x\le 0\hfill \end{array}\right.
    $$](A448947_1_En_5_Chapter_Equb.gif)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\varphi}^{\prime }(x)\kern0.5em =\left\{\begin{array}{c}\hfill 1\kern0.5em
    ,\kern1em x>0\hfill \\ {}\hfill 0\kern0.5em ,\kern1em x\le 0\hfill \end{array}\right.
    $$](A448947_1_En_5_Chapter_Equb.gif)'
- en: In addition, the cross entropy-driven learning rules may improve the performance,
    as addressed in Chapter [3](A448947_1_En_3_Chapter.html). Furthermore, the advanced
    gradient descent[³](#Fn3), which is a numerical method that better achieves the
    optimum value, is also beneficial for the training of the deep neural network
    .
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如第[3](A448947_1_En_3_Chapter.html)章所述，由交叉熵驱动的学习规则也可能提高性能。此外，高级梯度下降[³](#Fn3)，这是一种更好的实现最优值的数值方法，对深度神经网络的训练也有益。
- en: Overfitting
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 过拟合
- en: The reason that the deep neural network is especially vulnerable to overfitting
    is that the model becomes more complicated as it includes more hidden layers,
    and hence more weight. As addressed in Chapter [1](A448947_1_En_1_Chapter.html),
    a complicated model is more vulnerable to overfitting. Here is the dilemma—deepening
    the layers for higher performance drives the neural network to face the challenge
    of Machine Learning.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 深度神经网络特别容易过拟合的原因是，随着包含更多隐藏层和更多权重，模型变得更加复杂。正如第[1](A448947_1_En_1_Chapter.html)章所述，复杂的模型更容易过拟合。这里有一个困境——为了提高性能而加深层，驱使神经网络面临机器学习的挑战。
- en: The most representative solution is the dropout, which trains only some of the
    randomly selected nodes rather than the entire network. It is very effective,
    while its implementation is not very complex. Figure [5-4](#Fig4) explains the
    concept of the dropout. Some nodes are randomly selected at a certain percentage
    and their outputs are set to be zero to deactivate the nodes.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 最具代表性的解决方案是dropout，它只训练随机选择的节点而不是整个网络。这种方法非常有效，而其实现并不复杂。图[5-4](#Fig4)解释了dropout的概念。在某个百分比下随机选择一些节点，并将它们的输出设置为零以禁用这些节点。
- en: '![A448947_1_En_5_Fig4_HTML.jpg](A448947_1_En_5_Fig4_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_5_Fig4_HTML.jpg](A448947_1_En_5_Fig4_HTML.jpg)'
- en: Figure 5-4.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-4。
- en: Dropout is where some nodes are randomly selected and their outputs are set
    to zero to deactivate the nodes
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout是指随机选择一些节点，并将它们的输出设置为零以禁用这些节点。
- en: The dropout effectively prevents overfitting as it continuously alters the nodes
    and weights in the training process. The adequate percentages of the dropout are
    approximately 50% and 25% for hidden and input layers, respectively.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout通过在训练过程中持续改变节点和权重，有效地防止了过拟合。dropout的适当百分比分别为隐藏层和输入层的50%和25%。
- en: Another prevailing method used to prevent overfitting is adding regularization
    terms, which provide the magnitude of the weights, to the cost function. This
    method works as it simplifies the neural network’ architecture as much as possible,
    and hence reduces the possible onset of overfitting. Chapter [3](A448947_1_En_3_Chapter.html)
    explains this aspect. Furthermore, the use of massive training data is also very
    helpful as the potential bias due to particular data is reduced.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种常用的防止过拟合的方法是在损失函数中添加正则化项，这些项提供了权重的幅度。这种方法之所以有效，是因为它尽可能地简化了神经网络的结构，从而减少了过拟合的可能发生。第[3](A448947_1_En_3_Chapter.html)章解释了这一点。此外，使用大量训练数据也非常有帮助，因为它减少了特定数据可能带来的偏差。
- en: Computational Load
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算负载
- en: The last challenge is the time required to complete the training . The number
    of weights increases geometrically with the number of hidden layers, thus requiring
    more training data. This ultimately requires more calculations to be made. The
    more computations the neural network performs, the longer the training takes.
    This problem is a serious concern in the practical development of the neural network.
    If a deep neural network requires a month to train, it can only be modified 20
    times a year. A useful research study is hardly possible in this situation. This
    trouble has been relieved to a considerable extent by the introduction of high-performance
    hardware, such as GPU, and algorithms, such as batch normalization.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的挑战是完成训练所需的时间。随着隐藏层数量的增加，权重的数量呈几何级数增长，因此需要更多的训练数据。这最终需要更多的计算。神经网络执行的计算越多，训练所需的时间就越长。这个问题在神经网络的实际开发中是一个严重的问题。如果一个深度神经网络需要一个月的时间来训练，那么一年中只能修改
    20 次。在这种情况下，进行有用的研究几乎是不可能的。通过引入高性能硬件，如 GPU，以及算法，如批量归一化，这个问题在很大程度上得到了缓解。
- en: The minor improvements that this section introduced are the drivers that has
    made Deep Learning the hero of Machine Learning. The three primary research areas
    of Machine Learning are usually said to be the image recognition, speech recognition,
    and natural language processing. Each of these areas had been separately studied
    with specifically suitable techniques. However, Deep Learning currently outperforms
    all the techniques of all three areas.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 本节介绍的一些小改进是使深度学习成为机器学习英雄的驱动因素。通常认为机器学习的三个主要研究领域是图像识别、语音识别和自然语言处理。这些领域都曾分别使用特定适合的技术进行研究。然而，深度学习目前在这三个领域的所有技术中都表现出色。
- en: 'Example: ReLU and Dropout'
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：ReLU 和 Dropout
- en: This section implements the `ReLU` activation function and dropout, the representative
    techniques of Deep Learning. It reuses the example of the digit classification
    from Chapter [4](A448947_1_En_4_Chapter.html). The training data is the same five-by-five
    square images.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 本节通过示例实现了 `ReLU` 激活函数和 dropout，这是深度学习的代表性技术。它重用了第 [4](A448947_1_En_4_Chapter.html)
    章的数字分类示例。训练数据是相同的五乘五方形图像。
- en: '![A448947_1_En_5_Fig5_HTML.jpg](A448947_1_En_5_Fig5_HTML.jpg)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_5_Fig5_HTML.jpg](A448947_1_En_5_Fig5_HTML.jpg)'
- en: Figure 5-5.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-5。
- en: Training data in five-by-five square images
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 五乘五方形图像中的训练数据
- en: Consider the deep neural network with the three hidden layers, as shown in Figure
    [5-6](#Fig6). Each hidden layer contains 20 nodes. The network has 25 input nodes
    for the matrix input and five output nodes for the five classes. The output nodes
    employ the softmax activation function.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑具有三个隐藏层的深度神经网络，如图 [5-6](#Fig6) 所示。每个隐藏层包含 20 个节点。该网络有 25 个输入节点用于矩阵输入，以及五个输出节点用于五个类别。输出节点使用
    softmax 激活函数。
- en: '![A448947_1_En_5_Fig6_HTML.jpg](A448947_1_En_5_Fig6_HTML.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_5_Fig6_HTML.jpg](A448947_1_En_5_Fig6_HTML.jpg)'
- en: Figure 5-6.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-6。
- en: The deep neural network with three hidden layers
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 具有三个隐藏层的深度神经网络
- en: ReLU Function
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ReLU 函数
- en: This section introduces the `ReLU` function via the example. The function `DeepReLU`
    trains the given deep neural network using the back-propagation algorithm. It
    takes the weights of the network and training data and returns the trained weights.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 本节通过示例介绍了 `ReLU` 函数。函数 `DeepReLU` 使用反向传播算法训练给定的深度神经网络。它接受网络的权重和训练数据，并返回训练后的权重。
- en: '[PRE0]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: where `W1`, `W2`, `W3`, and `W4` are weight matrices of `input-hidden1`, `hidden1-hidden2`,
    `hidden2-hidden3`, and `hidden3-output` layers, respectively. `X` and `D` are
    input and correct output matrices of the training data. The following listing
    shows the `DeepReLU.m` file, which implements the `DeepReLU` function.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `W1`、`W2`、`W3` 和 `W4` 分别是 `input-hidden1`、`hidden1-hidden2`、`hidden2-hidden3`
    和 `hidden3-output` 层的权重矩阵。`X` 和 `D` 是训练数据的输入和正确输出矩阵。以下列表显示了实现 `DeepReLU` 函数的 `DeepReLU.m`
    文件。
- en: '[PRE1]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This code imports the training data , calculates the weight updates (`dW1`,
    `dW2`, `dW3`, and `dW4`) using the delta rule, and adjusts the weight of the neural
    network. So far, the process is identical to the previous training codes. It only
    differs in that the hidden nodes employ the function `ReLU`, in place of sigmoid.
    Of course, the use of a different activation function yields a change in its derivative
    as well.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码导入训练数据，使用delta规则计算权重更新（`dW1`、`dW2`、`dW3`和`dW4`），并调整神经网络的权重。到目前为止，这个过程与之前的训练代码相同。它只不同之处在于隐藏节点使用的是函数`ReLU`，而不是sigmoid。当然，使用不同的激活函数也会导致其导数的变化。
- en: Now, let’s look into the function `ReLU` that the function `DeepReLU` calls.
    The listing of the function `ReLU` shown here is implemented in the `ReLU.m` file.
    As this is just a definition, further discussion is omitted.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看函数`DeepReLU`调用的函数`ReLU`。这里展示的`ReLU`函数列表是在`ReLU.m`文件中实现的。由于这只是一个定义，所以省略了进一步的讨论。
- en: '[PRE2]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Consider the back-propagation algorithm portion, which adjusts the weights using
    the back-propagation algorithm. The following listing shows the extract of the
    delta calculation from the `DeepReLU.m` file. This process starts from the delta
    of the output node, calculates the error of the hidden node, and uses it for the
    next error. It repeats the same steps through `delta3`, `delta2`, and `delta1`.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到反向传播算法部分，它使用反向传播算法调整权重。以下列表展示了从`DeepReLU.m`文件中提取的delta计算部分。这个过程从输出节点的delta开始，计算隐藏节点的误差，并用于下一个误差。它通过`delta3`、`delta2`和`delta1`重复相同的步骤。
- en: '[PRE3]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Something noticeable from the code is the derivative of the function `ReLU`.
    For example, in the calculation of the delta of the third hidden layer, `delta3`,
    the derivative of the ReLU function is coded as follows:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 从代码中可以注意到函数`ReLU`的导数。例如，在计算第三隐藏层`delta3`的delta时，ReLU函数的导数被编码如下：
- en: '[PRE4]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Let’s see how this line becomes the derivative of the `ReLU` function. MATLAB
    returns a unity and zero if the expressions in the brackets are `true` and `false`,
    respectively. Therefore, this line becomes `1 if v3 > 0` and `0` otherwise. The
    same result is produced as the definition of the derivative of the `ReLU` function
    shown here:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这一行是如何成为ReLU函数的导数的。MATLAB在括号内的表达式为`true`时返回1，为`false`时返回0。因此，这一行变为`v3 >
    0时为1`，否则为`0`。这与这里展示的ReLU函数导数的定义产生相同的结果：
- en: '![$$ {\varphi}^{\prime }(x)\kern0.5em =\left\{\begin{array}{c}\hfill 1\kern0.5em
    ,\kern1em x>0\hfill \\ {}\hfill 0\kern0.5em ,\kern1em x\le 0\hfill \end{array}\right.
    $$](A448947_1_En_5_Chapter_Equc.gif)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![φ′(x) = {1, x>0; 0, x≤0}](A448947_1_En_5_Chapter_Equc.gif)'
- en: The following listing shows the `TestDeepReLU.m` file, which tests the `DeepReLU`
    function . This program calls the `DeepReLU` function and trains the network 10,000
    times. It enters the training data into the trained network and displays the output.
    We verify the adequacy of the training by comparing the output and correct output.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表展示了`TestDeepReLU.m`文件，该文件测试了`DeepReLU`函数。这个程序调用`DeepReLU`函数并训练网络10,000次。它将训练数据输入到训练好的网络中并显示输出。我们通过比较输出和正确输出来验证训练的充分性。
- en: '[PRE5]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: As this code is also almost identical to the previous test programs, a detailed
    explanation is omitted. This code occasionally fails to train properly and yields
    wrong outputs, which has never happened with the sigmoid activation function.
    The sensitivity of the `ReLU` function to the initial weight values seems to cause
    this anomaly.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 由于此代码几乎与之前的测试程序相同，所以省略了详细说明。此代码偶尔无法正确训练并产生错误输出，而sigmoid激活函数从未出现过这种情况。`ReLU`函数对初始权重值的敏感性似乎导致了这种异常。
- en: Dropout
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Dropout
- en: This section presents the code that implements the dropout . We use the sigmoid
    activation function for the hidden nodes. This code is mainly used to see how
    the dropout is coded, as the training data may be too simple for us to perceive
    the actual improvement of overfitting.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 本节展示了实现dropout的代码。我们为隐藏节点使用sigmoid激活函数。此代码主要用于查看dropout是如何编码的，因为训练数据可能过于简单，以至于我们无法感知过度拟合的实际改进。
- en: The function `DeepDropout` trains the example neural network using the back-propagation
    algorithm. It takes the neural network’s weights and training data and returns
    the trained weights.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 函数`DeepDropout`使用反向传播算法训练示例神经网络。它接受神经网络的权重和训练数据，并返回训练后的权重。
- en: '[PRE6]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: where the notation of the variables is the same as that of the function `DeepReLU`
    of the previous section. The following listing shows the `DeepDropout.m` file,
    which implements the `DeepDropout` function.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 变量的表示法与上一节中函数 `DeepReLU` 的表示法相同。以下列表显示了 `DeepDropout.m` 文件，该文件实现了 `DeepDropout`
    函数。
- en: '[PRE7]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'This code imports the training data, calculates the weight updates (`dW1`,
    `dW2`, `dW3`, and `dW4`) using the delta rule, and adjusts the weight of the neural
    network. This process is identical to that of the previous training codes. It
    differs from the previous ones in that once the output is calculated from the
    Sigmoid activation function of the hidden node, the `Dropout` function modifies
    the final output of the node. For example, the output of the first hidden layer
    is calculated as:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码导入训练数据，使用 delta 规则计算权重更新（`dW1`、`dW2`、`dW3` 和 `dW4`），并调整神经网络的权重。这个过程与之前的训练代码相同。它不同于之前的代码之处在于，一旦从隐藏节点的
    Sigmoid 激活函数计算出输出，`Dropout` 函数就会修改节点的最终输出。例如，第一隐藏层的输出计算如下：
- en: '[PRE8]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Executing these lines switches the outputs from 20% of the first hidden nodes
    to 0; it drops out 20% of the first hidden nodes.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 执行这些行将第一个隐藏节点的输出从 20% 切换到 0；它丢弃了第一个隐藏节点的 20%。
- en: Here are the details of the implementation of the function `Dropout`. It takes
    the output vector and dropout ratio and returns the new vector that will be multiplied
    to the output vector.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是函数 `Dropout` 的实现细节。它接受输出向量和丢弃率，并返回将乘以输出向量的新向量。
- en: '[PRE9]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'where `y` is the output vector and `ratio` is the ratio of the dropout of the
    output vector. The return vector `ym` of the function `Dropout` has the same dimensions
    as `y`. `ym` contains zeros for as many elements as the `ratio` and ![$$ 1/\left(1-
    ratio\right) $$](A448947_1_En_5_Chapter_IEq1.gif) for the other elements. Consider
    the following example:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `y` 是输出向量，`ratio` 是输出向量的丢弃率。函数 `Dropout` 的返回向量 `ym` 与 `y` 具有相同的维度。`ym` 包含与
    `ratio` 相同数量的零，其余元素为 ![$$ 1/\left(1- ratio\right) $$](A448947_1_En_5_Chapter_IEq1.gif)。考虑以下示例：
- en: '[PRE10]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The function `Dropout` implements the dropout . Executing this code will display
    the results shown in Figure [5-7](#Fig7).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `Dropout` 实现了丢弃。执行此代码将显示图 [5-7](#Fig7) 中所示的结果。
- en: '![A448947_1_En_5_Fig7_HTML.gif](A448947_1_En_5_Fig7_HTML.gif)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_5_Fig7_HTML.gif](A448947_1_En_5_Fig7_HTML.gif)'
- en: Figure 5-7.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-7。
- en: The dropout function in action
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout 函数的实际应用
- en: 'The vector `ym` has three elements: half (0.5) of the six elements of the vector
    `y1`, which are filled with zeroes, and the others are filled with ![$$ 1/\left(1-0.5\right)
    $$](A448947_1_En_5_Chapter_IEq2.gif), which equals `2`. When this `ym` is multiplied
    to the original vector `y1`, the revised `y1` has zeros by the specified ratio.
    In other words, `y1` drops out the specified portion of the elements.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 向量 `ym` 有三个元素：向量 `y1` 的六个元素的一半（0.5），用零填充，其余的用 ![$$ 1/\left(1-0.5\right) $$](A448947_1_En_5_Chapter_IEq2.gif)
    填充，等于 `2`。当这个 `ym` 乘以原始向量 `y1` 时，修改后的 `y1` 按指定比例有零。换句话说，`y1` 丢弃了指定部分元素。
- en: The reason that we multiply the other element by ![$$ 1/\left(1- ratio\right)
    $$](A448947_1_En_5_Chapter_IEq3.gif) is to compensate for the loss of output due
    to the dropped elements. In the previous example, once half of the vector `y1`
    has been dropped out, the magnitude of the layer’s output significantly diminishes.
    Therefore, the outputs of the survived nodes are amplified by the proper proportion.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将其他元素乘以 ![$$ 1/\left(1- ratio\right) $$](A448947_1_En_5_Chapter_IEq3.gif)
    的原因是补偿由于丢弃元素而导致的输出损失。在先前的例子中，一旦向量 `y1` 的一半被丢弃，该层的输出幅度显著减小。因此，存活节点的输出通过适当的比例放大。
- en: 'The function `Dropout` is implemented in the `Dropout.m file` :'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `Dropout` 在 `Dropout.m 文件` 中实现：
- en: '[PRE11]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The explanation is long, but the code itself is very simple. The code prepares
    the zero matrix `ym`, of which the dimension is the same as that of `y`. It calculates
    the number of survivors, `num`, based on the given dropout ratio, `ratio`, and
    randomly selects the survivors from `ym`. Specifically, it selects the indices
    of the elements of `ym`. This is done by the `randperm` portion of the code. Now
    that the code has the indices of the non-zero elements, put ![$$ 1/\left(1- ratio\right)
    $$](A448947_1_En_5_Chapter_IEq4.gif) into those elements. The other elements are
    already filled with zeros, as the vector `ym` has been a zero matrix from the
    beginning.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 解释虽然长，但代码本身非常简单。代码准备了一个与 `y` 维度相同的零矩阵 `ym`。它根据给定的丢弃率 `ratio` 计算生存者数量 `num`，并从
    `ym` 中随机选择生存者。具体来说，它选择 `ym` 元素的索引。这是通过代码中的 `randperm` 部分完成的。现在代码已经拥有了非零元素的索引，将这些元素中的
    ![$$ 1/\left(1- ratio\right) $$](A448947_1_En_5_Chapter_IEq4.gif) 放入。其他元素已经填充为零，因为从开始
    `ym` 向量就是一个零矩阵。
- en: The following listing shows the `TestDeepDropout.m` file, which tests the `DeepDropout`
    function. This program calls `DeepDropout` and trains the neural network 20,000
    times. It enters the training data into the trained network and displays the output.
    We verify the adequacy of the training by comparing the output and correct output.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表展示了测试 `DeepDropout` 函数的 `TestDeepDropout.m` 文件。该程序调用 `DeepDropout` 并训练神经网络
    20,000 次。它将训练数据输入到训练好的网络中，并显示输出。我们通过比较输出和正确输出来验证训练的充分性。
- en: '[PRE12]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This code is almost identical to the other test codes . The only difference
    is that it calls the `DeepDropout` function when it calculates the output of the
    trained network. Further explanation is omitted.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码几乎与其它测试代码相同。唯一的区别在于，它在计算训练网络的输出时调用了 `DeepDropout` 函数。进一步的解释被省略。
- en: Summary
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'This chapter covered the following topics:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: Deep Learning can be simply defined as a Machine Learning technique that employs
    the deep neural network.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习可以简单地定义为一种采用深度神经网络的机器学习技术。
- en: The previous neural networks had a problem where the deeper (more) hidden layers
    were harder to train and degraded the performance. Deep Learning solved this problem.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之前的神经网络存在一个问题，即越深（更多）的隐藏层越难训练，并且会降低性能。深度学习解决了这个问题。
- en: The outstanding achievements of Deep Learning were not made by a critical technique
    but rather are due to many minor improvements.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习的杰出成就并非由关键技术所创造，而是由于许多小的改进。
- en: 'The poor performance of the deep neural network is due to the failure of proper
    training. There are three major showstoppers: the vanishing gradient, overfitting,
    and computational load.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度神经网络性能不佳是由于训练不当造成的。有三个主要障碍：梯度消失、过拟合和计算负担。
- en: The vanishing gradient problem is greatly improved by employing the `ReLU` activation
    function and the cross entropy-driven learning rule. Use of the advanced gradient
    descent method is also beneficial.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过采用 `ReLU` 激活函数和由交叉熵驱动的学习规则，大大改善了梯度消失问题。使用高级梯度下降法也有益。
- en: The deep neural network is more vulnerable to overfitting . Deep Learning solves
    this problem using the dropout or regularization.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度神经网络更容易过拟合。深度学习通过丢弃法或正则化来解决此问题。
- en: The significant training time is required due to the heavy calculations. This
    is relieved to a large extent by the GPU and various algorithms.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于计算量大，需要显著的训练时间。这在很大程度上得到了 GPU 和各种算法的缓解。
- en: Footnotes[1](#Fn1_source)
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 脚注[1](#Fn1_source)
- en: As addressed in Chapter [2](A448947_1_En_2_Chapter.html), the single-layer neural
    network can solve only linearly separable problems.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如第 [2](A448947_1_En_2_Chapter.html) 章所述，单层神经网络只能解决线性可分问题。
- en: '[2](#Fn2_source)'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '[2](#Fn2_source)'
- en: It earned its name as its behavior is similar to that of the rectifier, an electrical
    element that converts the alternating current into direct current as it cuts out
    negative voltage.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 它之所以得名，是因为其行为类似于整流器，这是一种将交流电转换为直流电的电气元件，它在切断负电压时起作用。
