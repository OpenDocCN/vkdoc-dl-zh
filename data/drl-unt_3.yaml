- en: 3. Setting Up ML Agents Toolkit
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 设置ML智能体工具包
- en: We have seen in the previous chapters how states, actions, and rewards play
    a crucial role in driving an agent to reach its goal in a reinforcement learning
    (RL) environment. Now that we are familiar with the fundamentals of generic state-based
    RL, we will move ahead with the installation of all the libraries, frameworks,
    and extensions related to the usage of Unity ML agents as well as to further progress
    in the later modules of deep learning. Before we dive into the installation, let
    us try to understand the ML agents package made by Unity. Since its inception
    in 2017, the Unity ML Agents Toolkit has provided researchers, developers, and
    game programmers with a plethora of resources in the field of deep RL. The ML
    Agents Toolkit was initially created with the vision to assist researchers and
    developers in transforming games and simulations created with the help of Unity
    Editor into deep learning environments where the agents can be trained using state-of-the-art
    (SOTA) deep RL algorithms, evolutionary and genetic strategies, and other deep
    learning methods (involving computer vision, synthetic data generation) through
    a simplified Python API. With the latest release of package version 1.0 (at the
    time of writing this book), there have been huge advancements in the development
    of the Toolkit in terms of streamlining the C# SDK, Python API linking, robust
    compatibility with Tensorflow library, and huge advancements in areas of curriculum
    learning, self- and adversarial play, generative adversarial imitation learning,
    and pre-existing deep learning algorithms (Proximal Policy Optimization-PPO, Soft
    Actor Critic-SAC). There have been significant modifications of the core library
    that use the open AI Gym environment as a wrapper. The Unity ML Agents Toolkit
    version 1.0 has stable communicators linking Unity (C#) and the Python API (deep
    learning) and has provided game developers with the flexibility of writing deep
    learning agents and simulating their own aritificial intelligence (AI) in their
    games. Researchers, who are interested in modifying the core algorithms for their
    use-cases, are also provided with a flexible Gym wrapper environment, which provides
    a template for writing their own deep learning algorithms. All of these can be
    done with the simple usage of the Unity Engine, Unity ML Toolkit, Jupyter Notebook,
    and Tensorflow framework. Now that we understand the scope and possibilities of
    Unity ML Agents, we will discuss the entire process of installing all the necessary
    libraries and frameworks in this chapter. The different agents in the Unity ML
    Agents Toolkit are presented in Figure [3-1](#Fig1).
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们已经看到状态、动作和奖励在驱动智能体在强化学习（RL）环境中达到目标中起着至关重要的作用。现在，我们已经熟悉了基于通用状态的RL基础，我们将继续进行所有相关库、框架和扩展的安装，这些扩展与Unity
    ML智能体的使用以及后续模块中的深度学习进展有关。在我们深入安装之前，让我们先了解一下Unity制作的ML智能体包。自2017年成立以来，Unity ML
    Agents Toolkit为研究人员、开发人员和游戏程序员提供了大量关于深度强化学习（deep RL）领域的资源。ML智能体工具包最初是为了帮助研究人员和开发者将使用Unity编辑器创建的游戏和模拟转换为深度学习环境，在这些环境中，智能体可以使用最先进的（SOTA）深度强化学习算法、进化遗传策略以及其他深度学习方法（涉及计算机视觉、合成数据生成）通过简化的Python
    API进行训练。随着本书记载时的最新版本1.0（包）的发布，在简化C# SDK、Python API链接、与Tensorflow库的稳健兼容性以及课程学习、自我和对抗游戏、生成对抗模仿学习和现有深度学习算法（近端策略优化-PPO、软演员评论-SAC）等领域取得了巨大进步。核心库的核心库进行了重大修改，使用开放AI
    Gym环境作为包装器。Unity ML Agents Toolkit版本1.0具有稳定的通信器，将Unity（C#）和Python API（深度学习）连接起来，并为游戏开发者提供了编写深度学习智能体和模拟他们游戏中自己的人工智能（AI）的灵活性。对修改核心算法以适应其用例感兴趣的研究人员也提供了一种灵活的Gym包装器环境，该环境为编写他们自己的深度学习算法提供了一个模板。所有这些都可以通过简单的Unity引擎、Unity
    ML工具包、Jupyter笔记本和Tensorflow框架的使用来完成。现在，我们已经了解了Unity ML智能体的范围和可能性，我们将在本章中讨论安装所有必要库和框架的整个过程。Unity
    ML Agents Toolkit中的不同智能体在图[3-1](#Fig1)中展示。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig1_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig1_HTML.jpg)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig1_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig1_HTML.jpg)'
- en: Figure 3-1
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-1
- en: The Unity ML Agents Toolkit version 1.0.0
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents Toolkit版本1.0.0
- en: Overview of the Unity ML Agents Toolkit
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Unity ML Agents Toolkit概述
- en: 'By now we have Unity already installed in our system (any version greater than
    2018.3) and have had an overview of the MonoBehaviour C# environment. Before we
    dive into the installation guides, let us understand the ML Agents Toolkit components.
    The ML Agents Toolkit is a software development kit (SDK) that links the C# scripts
    made with Unity Engine with the Gym wrapper so that we can train our agents in
    deep learning algorithms. Therefore there are two fundamental aspects of the SDK:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经在系统中安装了 Unity（任何大于 2018.3 的版本）并概述了 MonoBehaviour C# 环境。在我们深入安装指南之前，让我们了解
    ML Agents Toolkit 的组件。ML Agents Toolkit 是一个软件开发工具包（SDK），它将使用 Unity 引擎制作的 C# 脚本与
    Gym 包装器链接起来，以便我们可以在深度学习算法中训练我们的代理。因此，SDK 有两个基本方面：
- en: '**The Unity Engine C# scripting**: This is the fundamental part of Unity that
    we have been using. Later we will see how we can include Tensorflow neural networks
    and train our model with just C# scripts for our games.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Unity 引擎 C# 脚本**：这是我们一直在使用的 Unity 的基础部分。稍后我们将看到如何仅使用 C# 脚本将 Tensorflow 神经网络包含进来，并使用我们的游戏来训练模型。'
- en: '**The OpenAI Gym Wrapper Python API**: This part is the communicator and the
    interface between the Unity Engine and the OpenAI environment. This module helps
    us to convert the Unity Game Scene into a deep RL environment where we can use
    our own implementations of algorithms or use baselines provided by OpenAI to train
    our agents in the scene.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI Gym 包装器 Python API**：这部分是 Unity 引擎和 OpenAI 环境之间的通信者和接口。此模块帮助我们将 Unity
    游戏场景转换为深度强化学习环境，在那里我们可以使用我们自己的算法实现或使用 OpenAI 提供的基线来训练场景中的代理。'
- en: These are the main parts of the Unity ML Agents Toolkit, which enables us to
    create games in Unity and transform them into deep learning environments with
    the help of a Gym wrapper where we can apply our RL algorithms. Figure [3-2](#Fig2)
    shows the components of the ML Agents Toolkit.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是 Unity ML Agents Toolkit 的主要部分，它使我们能够使用 Unity 创建游戏，并在 Gym 包装器的帮助下将它们转换为深度学习环境，在那里我们可以应用我们的强化学习算法。图
    [3-2](#Fig2) 展示了 ML Agents Toolkit 的组件。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig2_HTML.png](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig2_HTML.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig2_HTML.png](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig2_HTML.png)'
- en: Figure 3-2
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-2
- en: Components of the Unity ML Agents Toolkit
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents Toolkit 的组件
- en: 'Now that we have an overview of the Unity ML Agents Toolkit, we can realize
    the importance of the Gym environment with which we played in the first chapter
    and analyzed the CartPole environment. In this section, we would install the prerequisites
    required for the ML agents to work seamlessly with our games. Since there are
    several instability issues between different versions of ML agents and Tensorflow
    frameworks, we will stick to a standard stable release of both of these. We have
    previously installed the Anaconda environment, which included installations of
    Jupyter Notebook, Spyder IDE, and the Python Console along with others. This will
    greatly help us in creating our models later and linking our scene with the Gym
    environment. We have previously installed Tensorflow version 1.7 using the following
    code in the Anaconda prompt:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经对 Unity ML Agents Toolkit 有了一个概述，我们可以意识到我们在第一章中使用的 Gym 环境的重要性，并分析了 CartPole
    环境。在本节中，我们将安装 ML 代理与我们的游戏无缝工作所需的先决条件。由于不同版本的 ML 代理和 Tensorflow 框架之间存在几个不稳定性问题，我们将坚持使用这两个的标准稳定版本。我们之前已经使用
    Anaconda 环境安装了 Jupyter Notebook、Spyder IDE 和 Python 控制台等，这将在我们稍后创建模型和将场景与 Gym
    环境链接时提供很大帮助。我们之前在 Anaconda 提示符中使用以下代码安装了 Tensorflow 版本 1.7：
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We had also installed TensorBoard for our visualization of model training with
    the command:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还使用以下命令安装了 TensorBoard，用于可视化模型训练：
- en: '[PRE1]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Installing Baselines and Training A Deep Q-Network
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装 Baselines 和训练深度 Q 网络
- en: 'The next step is to build our environment for Gym, which we will be using extensively
    in the later chapters. If we want to simulate our Gym in Colab or Jupyter Notebook,
    we have to install the Gym environment, which can be done using:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是构建我们的 Gym 环境，我们将在后续章节中广泛使用它。如果我们想在 Colab 或 Jupyter Notebook 中模拟我们的 Gym，我们必须安装
    Gym 环境，可以使用以下方法完成：
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Now let us try to build our previously created CartPole environment (in Chapter
    [1](502041_1_En_1_Chapter.xhtml)), but now we will be using the OpenAI Baselines
    library for training our model. The OpenAI Baselines library is an open source
    library created by OpenAI that contains the SOTA deep reinforcement learning algorithms
    applied on Atari games, robotics, and even games on Unity. Since we are familiar
    with the Q-learning algorithm (in Chapter [1](502041_1_En_1_Chapter.xhtml)), we
    will just use the Deep Q-Learning algorithm provided by Baselines on the CartPole
    Environment in a lucid manner. Deep Q Learning is an off policy deep learning
    implementation of Q-Learning algorithm over discrete/continuous spaces rather
    than only discrete states. It is recommended to try this out in Google Colab Notebook
    since we will be using a different version of tensorflow, which is stable with
    Baselines. First let us install the baselines from github in the Colab using the
    command:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们尝试构建我们之前创建的CartPole环境（在第[1](502041_1_En_1_Chapter.xhtml)章中），但现在我们将使用OpenAI
    Baselines库来训练我们的模型。OpenAI Baselines库是由OpenAI创建的开源库，其中包含应用于Atari游戏、机器人和甚至Unity游戏中的SOTA深度强化学习算法。由于我们熟悉Q-learning算法（在第[1](502041_1_En_1_Chapter.xhtml)章中），我们只需以清晰的方式使用Baselines提供的Deep
    Q-Learning算法在CartPole环境中即可。深度Q学习是Q-Learning算法在离散/连续空间上的离策略深度学习实现，而不是仅限于离散状态。建议在Google
    Colab Notebook中尝试此操作，因为我们将使用与Baselines兼容的Tensorflow的不同版本。首先，让我们使用以下命令在Colab中安装从GitHub上的baselines：
- en: '[PRE3]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now we will use this library to write a very simple deep Q-learning Model for
    the CartPole. This is just to test that our installation is correctly done and
    all the other libraries, such as Tensorflow, are compatible. We don't need to
    get into the details of the model just yet, since we will be exploring it in further
    chapters and hence this implementation will only use the SOTA deep Q algorithm
    implemented by OpenAI with only hyperparameters.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将使用这个库来编写一个非常简单的深度Q学习模型用于CartPole。这只是为了测试我们的安装是否正确完成，以及所有其他库，如Tensorflow，都是兼容的。我们目前不需要深入了解模型细节，因为我们将在后续章节中进一步探讨，因此这个实现将仅使用OpenAI实现的SOTA深度Q算法，并仅使用超参数。
- en: 'As before, we will import Baselines, Gym, and Tensorflow for our implementation:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们将导入Baselines、Gym和Tensorflow以实现我们的功能：
- en: '[PRE4]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'deepq is the deep Q-learning implementation of OpenAI. With the installed version
    of Tensorflow, if issues arise due to “tf.contrib.layers:” incompatibility, we
    have to upgrade our Tensorflow version to a stable release of 1.14\. However,
    this Baselines library is incompatible with Tensorflow version 2.0, as there are
    no “tf.contrib.layers” in that version. Now that we have complete stable libraries,
    we can simulate the CartPole environment using the following line:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: deepq是OpenAI的深度Q学习实现。如果由于“tf.contrib.layers”不兼容而出现问题，我们必须将我们的Tensorflow版本升级到1.14的稳定版本。然而，这个Baselines库与Tensorflow
    2.0版本不兼容，因为那个版本中没有“tf.contrib.layers”。现在我们有了完整的稳定库，我们可以使用以下行来模拟CartPole环境：
- en: '[PRE5]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This is the first step to set up our RL environment with actions, spaces, and
    rewards (Chapter [1](502041_1_En_1_Chapter.xhtml)). The next few lines contain
    the deep Q-network, which is created by OpenAI as the SOTA. Although there is
    no need to understand the implications and inner functionality of the model at
    this stage, we will go over the hyperparameters that are involved in creating
    the model.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这是设置我们的RL环境（包括动作、空间和奖励）的第一步（第[1](502041_1_En_1_Chapter.xhtml)章）。接下来的几行包含由OpenAI创建的SOTA深度Q网络。虽然在这个阶段不需要理解模型的含义和内部功能，但我们将回顾创建模型所涉及的超参数。
- en: '[PRE6]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We use the “deepq.learn” command from the Baselines library. The following are
    the hyperparameters associated with this model.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用Baselines库中的“deepq.learn”命令。以下是与该模型相关的超参数。
- en: '“env”: This is the CartPole environment we created in the previous step.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “env”：这是我们之前步骤中创建的CartPole环境。
- en: '“network”: This is the type of neural network architecture the model will use.
    Based on the different aspects, the network can be “mlp,” which signifies Multi-Layered
    Perception Model; “lstm,” which is Long Short-Term Memory Model; or ”cnn,” which
    signifies Convolution Neural Network Model. There are other neural network architectures
    that are present, and we will cover all these in the deep RL chapter.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “network”：这是模型将使用的神经网络架构类型。根据不同的方面，网络可以是“mlp”，表示多层感知模型；也可以是“lstm”，表示长短期记忆模型；或者是“cnn”，表示卷积神经网络模型。还有其他神经网络架构存在，我们将在深度强化学习章节中介绍所有这些。
- en: '“lr”: This signifies the learning rate, which is used in generic ML for proper
    global convergence of the optimization function.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “lr”：这表示学习率，在通用的机器学习中用于优化函数的适当全局收敛。
- en: '“total_timesteps”: the number of iterations we want to simulate the environment'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “total_timesteps”：我们想要模拟环境的迭代次数
- en: '“buffer_size”: the size limit of the memory buffer for recording previous states,
    actions, and rewards'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “buffer_size”：记录先前状态、动作和奖励的内存缓冲区的大小限制
- en: '“exploration_fraction”: the fraction of the timesteps; the model will try to
    explore new states'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “exploration_fraction”：时间步长的比例；模型将尝试探索新的状态
- en: '“exploration_final_eps”: exploration fraction for the final episode'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “exploration_final_eps”：最终剧集的探索比例
- en: '“print_freq”: the frequency of printing the model logs on the screen'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “print_freq”：在屏幕上打印模型日志的频率
- en: 'This is an overview of the deep Q model designed by OpenAI, which we are using
    to train the CartPole. We will be using variants of this model for our Unity games
    later. That is pretty much all that is required for simulating the environment
    and training the CartPole. Once this is done, we can be assured that the Baselines
    library has been properly imported in our system. Alternatively we can also test
    the installation by simply using the Python terminal or Anaconda prompt and typing:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 OpenAI 设计的深度 Q 模型的概述，我们正在使用它来训练 CartPole。我们将在我们的 Unity 游戏中使用这个模型的变体。这基本上就是模拟环境和训练
    CartPole 所需要的一切。一旦完成，我们可以确信 Baselines 库已经正确导入到我们的系统中。或者，我们也可以通过简单地使用 Python 终端或
    Anaconda 提示符并输入以下命令来测试安装：
- en: '[PRE7]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Once this is run, we will see the model is running in the Anaconda prompt environment
    and logs are getting captured in the user data (AppData in Windows), as shown
    in Figure [3-3](#Fig3).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦运行，我们将在 Anaconda 提示符环境中看到模型正在运行，日志被捕获在用户数据（Windows 中的 AppData）中，如图 [3-3](#Fig3)
    所示。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig3_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig3_HTML.jpg)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig3_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig3_HTML.jpg)'
- en: Figure 3-3
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-3
- en: Training deep Q algorithm from Baseline for CartPole
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 从 Baseline 为 CartPole 训练深度 Q 算法
- en: We have completely installed all the associated deep RL libraries and frameworks,
    including Tensorflow, TensorBoard, Anaconda environment, Gym, Baselines, Keras,
    and Unity Engine. For the next section we will go into the depths of installation
    of the ML Agents Toolkit in Unity and address the major errors and stability issues
    of the library, including compatibility with the deep learning frameworks of Python.
    For this session we will be using version 2018.4 of Unity, although it will work
    in later versions of Unity (2019 and 2020).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经完全安装了所有相关的深度强化学习库和框架，包括 Tensorflow、TensorBoard、Anaconda 环境、Gym、Baselines、Keras
    和 Unity 引擎。在下一节中，我们将深入探讨 Unity 中 ML Agents 工具包的安装，并解决库的主要错误和不稳定问题，包括与 Python 深度学习框架的兼容性。在这个会话中，我们将使用
    Unity 的 2018.4 版本，尽管它也适用于 Unity 的后续版本（2019 和 2020）。
- en: Installing Unity ML Agents Toolkit
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装 Unity ML Agents 工具包
- en: The Unity ML Agents Toolkit is the official toolkit for deep learning in Unity.
    There are several steps to install the library on our system. The official Github
    page of the open source repository of Unity ML Agents can be found at [`https://github.com/Unity-Technologies/ml-agents`](https://github.com/Unity-Technologies/ml-agents).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 工具包是 Unity 中深度学习的官方工具包。在我们的系统上安装库需要几个步骤。Unity ML Agents 的开源存储库的官方
    GitHub 页面可以在[https://github.com/Unity-Technologies/ml-agents](https://github.com/Unity-Technologies/ml-agents)找到。
- en: This is the official repository of Unity ML Agents; let us see the details that
    are present on the Github page. On scrolling toward the “Readme” section, there
    are several details mentioned regarding the versions of the ML agents, the different
    built-in trained Unity Environments inside the repository (15+ in number), built-in
    support for proximal policy operation (PPO) and soft actor critic (SAC) algorithms
    and the cross-functional flexibility of the SDK. If we head over to the releases
    page, given by the link [`https://github.com/Unity-Technologies/ml-agents/releases`](https://github.com/Unity-Technologies/ml-agents/releases),
    we will see all the releases of the Unity ML Agents Toolkit. Each release version
    has package version details, major and minor changes, bug fixes, and source files
    attached at the bottom. Since we are working with version 1.0, the following versions
    of Python API, Gym wrapper, Unity C# SDK, and other version details are mentioned.
    Figure [3-4](#Fig4) shows the Github page of Unity ML Agents Release 1.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 Unity ML Agents 的官方仓库；让我们看看 Github 页面上存在的详细信息。在滚动到“Readme”部分时，提到了有关 ML 代理版本、仓库内内置的不同训练
    Unity 环境（数量超过 15 个）、内置对近端策略操作（PPO）和软演员评论（SAC）算法的支持以及 SDK 的跨功能灵活性的一些细节。如果我们点击到发布页面，由链接[`https://github.com/Unity-Technologies/ml-agents/releases`](https://github.com/Unity-Technologies/ml-agents/releases)提供，我们将看到
    Unity ML Agents 工具包的所有发布版本。每个发布版本都有包版本详情、主要和次要更改、错误修复以及底部附加的源文件。由于我们正在使用版本 1.0，以下列出了
    Python API、Gym 包装器、Unity C# SDK 和其他版本详情。图 [3-4](#Fig4) 显示了 Unity ML Agents 版本
    1 的 Github 页面。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig4_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig4_HTML.jpg)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig4_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig4_HTML.jpg)'
- en: Figure 3-4
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-4
- en: Unity ML Agents Release 1
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 版本 1
- en: There are two source files in “zip” and “tar.gz” format inside the assets, as
    shown in Figure [3-5](#Fig5). This contains the precompiled binary of the version
    1 release of Unity ML Agents. The simplest way to get the ML Agents Toolkit in
    our local machine is to download that particular version of the Unity ML Agents
    Toolkit. Once downloaded, we can extract to a suitable location in our directory.
    There are several other ways to download as well, and we can use git commands
    from the Windows command line or Anaconda prompt to download the associated branch
    of ML agents.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在 assets 文件夹内有两个“zip”和“tar.gz”格式的源文件，如图 [3-5](#Fig5) 所示。这包含了 Unity ML Agents
    版本 1 的预编译二进制文件。将 ML Agents 工具包安装到本地机器的最简单方法就是下载该特定版本的 Unity ML Agents 工具包。下载后，我们可以将其解压到目录中的合适位置。还有其他几种下载方式，我们可以使用
    Windows 命令行或 Anaconda 提示符中的 git 命令来下载相关的 ML 代理分支。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig5_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig5_HTML.jpg)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig5_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig5_HTML.jpg)'
- en: Figure 3-5
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-5
- en: Unity ML Agents version 1.0 source codes in zip format
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 版本 1.0 的 zip 格式源代码
- en: '[PRE8]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Cloning the Github Unity ML Agents Repository
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 克隆 Github Unity ML Agents 仓库
- en: Now that we have downloaded the official Unity ML Agents Repository from Github,
    either by using “git clone” or by manually downloading the source zip file, we
    have to make further modifications before we can use it. It is recommended not
    to clone the “master” branch of the ML Agents Repository; rather we can clone
    the “release_1” branch like the one shown in Figure [3-6](#Fig6).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经从 Github 下载了官方的 Unity ML Agents 仓库，无论是通过使用“git clone”还是手动下载源 zip 文件，在使用它之前，我们都需要进行进一步的修改。建议不要克隆
    ML Agents 仓库的“master”分支；相反，我们可以克隆如图 [3-6](#Fig6) 所示的“release_1”分支。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig6_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig6_HTML.jpg)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig6_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig6_HTML.jpg)'
- en: Figure 3-6
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-6
- en: Cloning the Unity ML Agents Release_1” branch on Github
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Github 上克隆“Unity ML Agents Release_1”分支
- en: After we have downloaded and extracted the Unity ML Agents, we can create a
    new Unity project with the 3D template. To use the Unity ML Agents in this project,
    simply drag the Unity ML Agents extracted repository into the assets panel of
    the Unity Project. This will enable the Unity Engine to install all the dependencies,
    libraries, and frameworks, such as barracuda (the neural network link framework
    for Unity) provided by the ML Agents package.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们下载并解压Unity ML代理后，我们可以使用3D模板创建一个新的Unity项目。要在此项目中使用Unity ML代理，只需将提取的Unity ML代理存储库拖放到Unity项目的资产面板中。这将使Unity引擎安装所有依赖项、库和框架，例如ML代理包提供的barracuda（Unity的神经网络链接框架）。
- en: Exploring the Unity ML Agents Examples
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索Unity ML代理示例
- en: We can get a glimpse of the all the built-in Unity game templates present in
    the ML Agents folder when we can navigate to
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们导航到
- en: '**Projects ➤ Assets ➤ ML-Agents ➤ Examples**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**项目 ➤ 资产 ➤ ML-Agents ➤ 示例**'
- en: Inside this folder, we have all the AI-trained game environments made with Unity
    ML Agents and that have pretrained deep RL algorithms like PPO and SAC. In older
    versions of ML Agents, in place of the “Projects” folder, there may be folders
    like “unity ml-agents” or “unity.” As of now, we will concern ourselves with the
    contents of the Examples folder. Let us open the 3D Ball environment game made
    with Unity ML Agents. The environment is shown in Figure [3-7](#Fig7).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个文件夹中，我们拥有所有使用Unity ML代理制作的AI训练游戏环境和预训练的深度强化学习算法，如PPO和SAC。在ML代理的旧版本中，代替“项目”文件夹，可能有“unity
    ml-agents”或“unity”等文件夹。到目前为止，我们将关注“示例”文件夹的内容。让我们打开使用Unity ML代理制作的3D球环境游戏。环境如图[3-7](#Fig7)所示。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig7_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig7_HTML.jpg)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig7_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig7_HTML.jpg)'
- en: Figure 3-7
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-7
- en: 3D ball environment Unity ML agents
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 3D球环境Unity ML代理
- en: In this environment, we see 12 blue cubes balancing the little balls on the
    top of them. These blue cubes are the agents in the scene, and if the ball drops
    off from the “head” of the agents, a negative reward is given to the agent. So
    the agent has to continue balancing the balls on its head as long as possible
    to collect rewards and maximize its goal. This is the first example of the Unity
    ML Agents Toolkit that is trained with the help of PPO, a deep RL algorithm, which
    we will discuss later. As we can see from our concept from previous chapters,
    the agent is the blue cube, and the reward is balancing the ball (sphere) on its
    head.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个环境中，我们看到12个蓝色立方体在它们的顶部平衡着小球。这些蓝色立方体是场景中的代理，如果球从代理的“头部”掉落，代理将获得负奖励。因此，代理必须尽可能长时间地在其头部平衡球以收集奖励并最大化其目标。这是使用PPO（一种深度强化学习算法）辅助训练的Unity
    ML代理工具包的第一个示例，我们将在后面讨论。从我们之前章节的概念中可以看出，代理是蓝色立方体，奖励是平衡头上的球（球体）。
- en: '**States**: The observation space for this environment can be divided into
    two parts: stable and unstable. When the agent balances the ball, it is a stable
    space, whereas when the agent loses balance of the ball, it becomes an unstable
    space. Either the ball is on the head or it isn’t.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**状态**：此环境的观察空间可以分为两部分：稳定和不稳定。当代理平衡球时，它处于稳定空间，而当代理失去球的平衡时，它变为不稳定空间。要么球在头上，要么不在。'
- en: '**Actions**: Each blue agent cube is free to rotate along x and z axes to balance
    the sphere on itself. Each ball has six degrees of motion along the x, y, and
    z axes. All of these fall into the action space for the environment. The cubes
    are fixed in their position and cannot undergo translational motion'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动作**：每个蓝色代理立方体可以自由沿x和z轴旋转以平衡球体。每个球体沿x、y和z轴有六个运动度。所有这些都属于环境的动作空间。立方体固定在其位置，不能进行平移运动。'
- en: '**Rewards**: The agent is rewarded for each timestep it balances the ball.
    The rewards are negative when the ball falls off from the “head” of the agent.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**奖励**：代理在每次平衡球时都会获得奖励。当球从代理的“头部”掉落时，奖励为负。'
- en: We will explore in depth when we try to build and train our own models using
    this environment. But for now, we can play around with other environments made
    with Unity ML Agents and try to identify the states, actions, and rewards for
    each environment. Here is another one named “basic,” shown in Figure [3-8](#Fig8),
    where the agent has a choice to go to a bigger reward (shown by the big “green”
    ball) or the smaller reward (small “green” ball). This is a very simple game simulation
    using deep RL and Unity Engine, where the agent will try to maximize its reward
    by going toward the bigger sphere. Although initially the agent may go to either
    one of them, and as training progresses it finds that the bigger one has greater
    rewards, it will go in the direction of maximization of rewards. As an exercise
    we can try to identify the states, actions, and rewards spaces for this agent
    and environment. Once we are done playing around with built-in Unity games with
    ML Agents, let us try to understand other possible alternatives to install Unity
    ML Agents through the Unity Editor.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们尝试使用此环境构建和训练自己的模型时，我们将深入探讨。但到目前为止，我们可以尝试使用 Unity ML Agents 制作的其它环境，并尝试识别每个环境的状况、动作和奖励。这里还有一个名为“basic”的示例，如图
    [3-8](#Fig8) 所示，其中代理可以选择前往更大的奖励（由大“绿色”球表示）或较小的奖励（小“绿色”球）。这是一个使用深度强化学习和 Unity 引擎的非常简单的游戏模拟，其中代理将尝试通过向更大的球体移动来最大化其奖励。虽然最初代理可能前往任何一个，但随着训练的进行，它会发现较大的球体有更高的奖励，它将朝着最大化奖励的方向前进。作为练习，我们可以尝试识别这个代理和环境的状况、动作和奖励空间。一旦我们玩腻了内置的
    Unity 游戏和 ML 代理，让我们尝试理解通过 Unity 编辑器安装 Unity ML Agents 的其他可能替代方案。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig8_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig8_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig8_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig8_HTML.jpg)'
- en: Figure 3-8
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-8
- en: Basic environment in Unity ML agents
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 中的基本环境
- en: Let us open Unity, and as mentioned we have to drag in the ML Agents package
    we downloaded before. Then we will navigate to the Assets folder, and inside that
    the ML Agents folder contains all the environments we just viewed along with scripts
    and neural network models. Let us try to see an alternative way to install ML
    agents in our Unity Engine.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们打开 Unity，正如之前提到的，我们必须拖入之前下载的 ML Agents 包。然后我们将导航到“Assets”文件夹，在该文件夹中，ML Agents
    文件夹包含我们刚刚查看的所有环境以及脚本和神经网络模型。让我们尝试看看在 Unity 引擎中安装 ML 代理的另一种方法。
- en: Local Installation of Unity ML Agents
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Unity ML Agents 的本地安装
- en: Now we will locally install the Unity ML Agents. This is helpful when you do
    not require all the contents of the source repository except the essential ones,
    like the behavior scripts (brain), academy, and deep learning algorithms with
    the sample example scenes. Navigate to the Windows Tab and select the Packages
    option. The Packages Window contains all the packages that are currently present
    in that particular Unity project. These are “JSON” files that contain different
    packages, like Unity Ads, Physics, HRDP, and many more. A preview is shown in
    Figure [3-9](#Fig9).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将在本地安装 Unity ML Agents。当你不需要源仓库的所有内容，只包括必要的部分，如行为脚本（大脑）、学院和带有示例场景的深度学习算法时，这很有帮助。导航到“Windows”标签页并选择“Packages”选项。该“Packages”窗口包含在该特定
    Unity 项目中当前存在的所有包。这些是包含不同包的“JSON”文件，如 Unity Ads、Physics、HRDP 等。图 [3-9](#Fig9)
    展示了预览。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig9_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig9_HTML.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig9_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig9_HTML.jpg)'
- en: Figure 3-9
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-9
- en: Package option in Window Tab of Unity Editor
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: Unity 编辑器窗口标签页中的“Package”选项
- en: The next step is to add the ML Agents Package that we downloaded (or cloned).
    This will install all the package details, including Barracuda, Python API, and
    certain C# scripts (namely, Behaviour scripts or Brains) without which ML Agents
    will not work. Since we have to add the package from our ML Agents installation
    directory, we select the “+” icon below to add it. We get an option “Add Package
    From Disk,” and we have to click this to open a Windows pop-up. The next step
    is to navigate and select which package we want to include in the project. In
    my case, I am using the 2018.4 version of Unity, so the UI may differ for other
    later versions, but the steps remain the same. Figure [3-10](#Fig10) shows the
    Package Manager Window.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是添加我们下载的（或克隆的）ML Agents 包。这将安装所有包详情，包括 Barracuda、Python API 和某些 C# 脚本（即行为脚本或大脑），没有这些脚本
    ML Agents 将无法工作。由于我们必须从我们的 ML Agents 安装目录添加包，所以我们选择下面的“+”图标来添加它。我们得到一个选项“从磁盘添加包”，我们必须点击这个选项来打开一个
    Windows 弹出窗口。下一步是导航并选择我们想要包含在项目中的包。在我的情况下，我使用的是 Unity 2018.4 版本，因此对于其他较新版本，UI
    可能会有所不同，但步骤仍然是相同的。图 [3-10](#Fig10) 显示了包管理器窗口。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig10_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig10_HTML.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig10_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig10_HTML.jpg)'
- en: Figure 3-10
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-10
- en: Option to add ML Agents package from disk
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 从磁盘添加 ML Agents 包的选项
- en: 'Next we have to navigate to our downloaded ML Agents folder and go to ”com.unity.ml-agents”
    folder. This folder contains a JSON file named as “package.json,” the contents
    of which are as follows:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们必须导航到我们下载的 ML Agents 文件夹，并进入“com.unity.ml-agents”文件夹。此文件夹包含一个名为“package.json”的
    JSON 文件，其内容如下：
- en: '[PRE9]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The package file contains the details of the versions of ML Agents as well as
    the current version of Unity we are using, along with the Barracuda package version.
    The Barracuda package is extremely important, as it is a lightweight package for
    neural networks in Unity, which enables us to run pretrained Tensorflow networks
    in our Unity games. Once we select this JSON package for import into Unity, we
    have to wait for some time until Unity completes building the dependencies and
    adding the necessary scripts for the ML Agents to work.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 包文件包含 ML Agents 的版本详情以及我们正在使用的 Unity 当前版本，以及 Barracuda 包版本。Barracuda 包非常重要，因为它是一个
    Unity 中神经网络的轻量级包，使我们能够在 Unity 游戏中运行预训练的 Tensorflow 网络。一旦我们选择此 JSON 包导入 Unity，我们就需要等待一段时间，直到
    Unity 完成构建依赖项并添加 ML Agents 运作所需的必要脚本。
- en: Installing ML Agents from Python Package Index
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从 Python 包索引安装 ML Agents
- en: 'We can also install ML Agents from the Python Package Index (PyPI) site. This
    also allows downloading and installing any dependencies that may not have been
    installed previously. If errors and issues persist while downloading or installing
    ML Agents, this will help to remove those errors. This installation guide also
    aims to resolve issues if we have different versions of previously downloaded
    additional libraries such as Tensorflow or Pytorch, or Gym/Baselines. The command
    for installation is pretty simple and can be written from either command prompt
    or Anaconda prompt:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以从 Python 包索引（PyPI）网站安装 ML Agents。这也允许下载和安装可能之前未安装的任何依赖项。如果在下载或安装 ML Agents
    时持续出现错误和问题，这将有助于解决这些错误。此安装指南还旨在解决我们可能下载的不同版本的先前下载的附加库（如 Tensorflow 或 Pytorch，或
    Gym/Baselines）的问题。安装命令相当简单，可以从命令提示符或 Anaconda 提示符中编写：
- en: '[PRE10]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This downloads all the related libraries and provides logs as to which versions
    are getting downloaded. This does not download or clone from the Github repository
    but rather from the ML Agents PyPI page mentioned in the link [`https://pypi.org/project/mlagents/`](https://pypi.org/project/mlagents/).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 此操作将下载所有相关库，并提供日志以显示正在下载哪些版本。这不会从 Github 仓库下载或克隆，而是从链接中提到的 ML Agents PyPI 页面下载，即[`https://pypi.org/project/mlagents/`](https://pypi.org/project/mlagents/).
- en: 'After the installation is completed in the Anaconda prompt, we can check by
    running the following command:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Anaconda 提示符中完成安装后，我们可以通过运行以下命令来检查：
- en: '[PRE11]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: On running this command, all the related commands and information related to
    installed ML Agents would be displayed on the screen. Previously there used to
    be a Unity Logo along with the display; however, the newer versions have deprecated
    the logo in the “–help” command. The logo will be seen when we train ML Agents
    via Anaconda prompt later in this chapter. This installation would also install
    all the details mentioned in the “setup.py” file. The PyPI page may get updated
    with newer versions of ML Agents as time progresses, and running the aforementioned
    command ensures installation of the latest release. Figure [3-11](#Fig11) shows
    the mentioned steps.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此命令后，屏幕上会显示所有与已安装的ML Agents相关的命令和信息。之前曾经显示过Unity标志；然而，新版本已经废弃了“--help”命令中的标志。在本书稍后通过Anaconda提示符训练ML
    Agents时，我们将看到该标志。此安装还会安装“setup.py”文件中提到的所有详细信息。随着时间的推移，PyPI页面可能会更新为ML Agents的新版本，运行上述命令确保安装最新版本。图[3-11](#Fig11)显示了提到的步骤。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig11_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig11_HTML.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig11_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig11_HTML.jpg)'
- en: Figure 3-11
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-11
- en: Running “mlagents-learn --help” command in Anaconda prompt
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在Anaconda提示符中运行“mlagents-learn --help”命令
- en: Now we have successfully completed the installation of ML Agents with all the
    peripherals. Now let us try to understand how installation in a containerized
    environment, such as a virtual machine environment, can be done.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经成功完成了ML Agents及其所有外围设备的安装。现在让我们尝试了解如何在容器化环境中，例如虚拟机环境中，进行安装。
- en: Installation in Virtual Environments
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在虚拟环境中安装
- en: A virtual environment is a separate environment containing a root directory
    with its own set of libraries and frameworks that do not affect any other parts
    of the local system. It is a containerized environment, which has its own version
    of Python that may differ from the base or the locally installed Python. Working
    in a virtual environment is extremely helpful, as whenever any errors or crashes
    take place in the virtual environment, then other environments and local settings
    or libraries are not affected. While working in a production environment focused
    on game development with ML Agents, the virtual environment has two important
    aspects that make it helpful for development teams.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟环境是一个包含根目录的独立环境，其中包含一组自己的库和框架，不会影响本地系统的其他部分。它是一个容器化环境，拥有自己的Python版本，可能与基本版本或本地安装的Python不同。在虚拟环境中工作非常有帮助，因为当虚拟环境中发生任何错误或崩溃时，其他环境和本地设置或库不会受到影响。在专注于使用ML
    Agents进行游戏开发的生产环境中，虚拟环境有两个重要的方面，使其对开发团队有帮助。
- en: '**Easy dependency management:** Dependencies related to separate modules of
    Python can be managed easily without having to worry about crashing or making
    unwanted changes to the entire product.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**易于依赖管理**:** 可以轻松管理与Python的各个模块相关的依赖项，无需担心整个产品崩溃或进行不希望的改变。'
- en: '**Robust CI/CD pipeline** **:** CI/CD stands for continuous integration/continuous
    development, which generally refers to the production pipeline from development,
    building, testing, and analysis. With containerized environment, Agile methodologies
    can be implemented (based on sprints of development), which will definitely help
    in product growth.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**健壮的CI/CD管道** **:** CI/CD代表持续集成/持续开发，通常指的是从开发、构建、测试和分析的生产管道。在容器化环境中，可以实施敏捷方法（基于开发冲刺），这无疑将有助于产品增长。'
- en: 'For this particular case, we have to start with installation of the pip module,
    as it may not be present in the virtual environment. This can be downloaded and
    installed using the following command:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个特定案例，我们必须从安装pip模块开始，因为它可能不在虚拟环境中。这可以通过以下命令下载和安装：
- en: '[PRE12]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The next step is to run the “get-pip.py” module by using:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是运行“get-pip.py”模块，使用以下命令：
- en: '[PRE13]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Next, we check for the version of installed pip:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们检查已安装pip的版本：
- en: '[PRE14]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'The next step is to create our own virtual environment using the following
    command in Anaconda prompt:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是使用以下命令在Anaconda提示符中创建我们自己的虚拟环境：
- en: '[PRE15]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'For activating the environment, the following command is used:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 激活环境时，使用以下命令：
- en: '[PRE16]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: That is all we have to do to set up our own virtual environment in Anaconda
    prompt. The next steps for installation of ML Agents are similar to the previous
    section using the pip command. The only difference here is that in this case,
    we are running the ML Agents installation in a containerized environment rather
    than locally, and for all the steps of model training, we can use the functions
    of ML Agents in this virtual environment only. If ML Agents is not installed anywhere
    else, then these commands or functions of ML Agents will not run unless it is
    in the associated virtual environment. We can also deactivate our virtual environment
    and reactivate, which is similar to using the activate command.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们需要在 Anaconda 命令提示符中设置自己的虚拟环境所需做的全部工作。安装 ML Agents 的下一步与上一节使用 pip 命令类似。这里唯一的区别是，在这种情况下，我们是在容器化环境中运行
    ML Agents 的安装，而不是本地运行，并且对于模型训练的所有步骤，我们只能使用这个虚拟环境中的 ML Agents 的功能。如果 ML Agents
    没有安装在其他任何地方，那么除非它在相关的虚拟环境中，否则这些命令或 ML Agents 的功能将不会运行。我们还可以停用我们的虚拟环境，然后重新激活，这与使用
    activate 命令类似。
- en: Advanced Local Installation for Modifying the ML Agents Environment
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用于修改 ML Agents 环境的高级本地安装
- en: There is another aspect of installation of the “mlagents_envs” package that
    is required when we want to modify our training environments. Although this step
    is not compulsory, we should be able to install these modules separately as well.
    There are two ways to install the environments of the ML Agents.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们想要修改我们的训练环境时，“mlagents_envs”包的安装还有一个方面是必需的。尽管这一步不是强制性的，但我们应该能够单独安装这些模块。安装
    ML Agents 的环境有两种方法。
- en: '**Installation from PyPI:** The PyPI contains releases for the “mlagents_envs”
    package, which can be found in the link [`https://pypi.org/project/mlagents-envs/`](https://pypi.org/project/mlagents-envs/).'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从 PyPI 安装：**PyPI 包含“mlagents_envs”包的发布版本，可以在以下链接中找到：[`https://pypi.org/project/mlagents-envs/`](https://pypi.org/project/mlagents-envs/)。'
- en: 'The installation is done using the pip command:'
  id: totrans-119
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 安装是通过 pip 命令完成的：
- en: '**Installation from ML Agents package:** For installing the environment from
    our cloned repository of ML Agents, we have to navigate to the root directory
    of the cloned repository in Anaconda prompt and then type:'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从 ML Agents 包安装：**要从我们克隆的 ML Agents 仓库安装环境，我们必须在 Anaconda 命令提示符中导航到克隆仓库的根目录，然后输入：'
- en: '[PRE17]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '[PRE18]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Installing them from the ML Agents cloned package has some prerequisites. The
    “-e” makes changes to all the dependencies of the ML Agents. If we are not using
    the pip command to install the environments, then we first have to install the
    “mlagetns-envs” before we install “mlagents.” This is because mlagents depends
    on the “mlagents-envs” for its functionality. If we do it in the reverse order,
    then while we are installing “mlagents,” the default mlagents-envs will be installed
    from PyPI.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 从 ML Agents 克隆包安装有一些先决条件。“-e”会更改 ML Agents 的所有依赖项。如果我们不是使用 pip 命令安装环境，那么在安装“mlagents”之前，我们首先必须安装“mlagents-envs”。这是因为
    mlagents 依赖于“mlagents-envs”来实现其功能。如果我们以相反的顺序执行，那么当我们安装“mlagents”时，默认的 mlagents-envs
    将会从 PyPI 安装。
- en: This completes the entire installation process and also provides the different
    ways to install ML Agents. In the next section, we will take a look at the various
    components of this ML Agents package and how to link this with Python and Jupyter
    Notebooks.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了整个安装过程，也提供了安装 ML Agents 的不同方法。在下一节中，我们将查看 ML Agents 包的各个组件，以及如何将其与 Python
    和 Jupyter 笔记本链接。
- en: 'Configuring Components of ML Agents: Brain and Academy'
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置 ML Agents 的组件：大脑和学院
- en: 'In this section, we will have an overview of the different components of the
    ML Agents package and try to understand the changes made in ML Agents from the
    previous and current version. The ML Agents package has three main parts that
    will be used for our deep learning:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将概述 ML Agents 包的不同组件，并尝试理解从上一个版本到当前版本 ML Agents 中所做的更改。ML Agents 包有三个主要部分，我们将使用它们进行深度学习：
- en: '**mlagents**: This part contains the main source algorithms for deep RL for
    training our agents in Unity environments.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**mlagents**：这部分包含用于在 Unity 环境中训练我们的代理的深度强化学习的主要源算法。'
- en: '**mlagents_envs**: This is essentially the Python API connecting the mlagents
    with the environment. Therefore, it is important to remember that Unity ML Agents
    relies on ML Agents environments.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**mlagents_envs**：这实际上是连接 mlagents 和环境的 Python API。因此，重要的是要记住，Unity ML Agents
    依赖于 ML Agents 环境。'
- en: '**gym_unity**: The wrapper over OpenAI’s Gym environment that is used to convert
    our Unity Game Scenes into trainable deep learning environments'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**gym_unity**：OpenAI的Gym环境的包装器，用于将我们的Unity游戏场景转换为可训练的深度学习环境'
- en: We can get into the details of each of the aforementioned folder structures
    and get to know each individual component, but without loss of generality, the
    mlagents folder will be extremely important to us for understanding the core PPO
    and SAC algorithmic implementation made by Unity and also how we can modify it.
    If we go to **mlagents ➤ trainers** folder, we can see several algorithms are
    present. Needless to say, this is the most important aspect, which we will be
    venturing later in the book. In the **mlagents-envs** folder, the most important
    part of the Python API linking is done by the **communicator_objects** folder.
    This particularly contains all the information related to connecting the local
    server to port 5004 while training ML Agents and also forms a bridge between the
    Tensorflow, Tensorboard, and C# Unity. Similarly, the **gym_unity** folder contains
    all the Unity environments and test folders that are converted to Gym environments
    during training of the RL Unity environment.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以深入了解上述文件夹结构的细节，了解每个单独的组件，但为了不失一般性，mlagents文件夹对于我们理解Unity所做的核心PPO和SAC算法实现以及如何修改它将极为重要。如果我们进入**mlagents
    ➤ trainers**文件夹，我们可以看到存在几个算法。不用说，这是最重要的方面，我们将在本书后面的章节中进行探讨。在**mlagents-envs**文件夹中，最重要的Python
    API链接是通过**communicator_objects**文件夹完成的。这个文件夹特别包含了与训练ML Agents时连接本地服务器到端口5004相关的所有信息，并且形成了Tensorflow、Tensorboard和C#
    Unity之间的桥梁。同样，**gym_unity**文件夹包含了所有在训练RL Unity环境时转换为Gym环境的Unity环境和测试文件夹。
- en: 'Now that we have installed and set up our ML Agents and had a brief overview
    of the three main parts, we will dive into the fundamental architecture of the
    ML Agents. This architecture pattern was initially released as a visualization
    of how the ML Agents works and has changed considerably in recent years. However
    fundamentally, though the architecture has been revamped into a more robust one,
    the core functionality runs on the baseline architecture: brain–academy architecture.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经安装并设置了ML Agents，并对三个主要部分有了简要的了解，我们将深入探讨ML Agents的基本架构。这种架构模式最初作为ML Agents工作原理的可视化发布，近年来已经发生了相当大的变化。然而，从根本上讲，尽管架构已经改造成了一个更稳健的版本，但核心功能仍然运行在基线架构：大脑-学院架构。
- en: Brain-Academy Architecture
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 大脑-学院架构
- en: The fundamental concept regarding the initial build of ML Agents was to have
    agents that were controlled with the help of neural networks generally referred
    to as the brain of the agent. The academy was analogous to the environment, controlling
    the training of the brain as well as communicating with online models while running
    the agent or the simulation. Fundamentally, the brain architecture can be broadly
    classified as described here.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 关于ML Agents初始构建的基本概念是拥有由神经网络控制的智能体，这些神经网络通常被称为智能体的“大脑”。学院相当于环境，控制大脑的训练并在运行智能体或模拟时与在线模型进行通信。从根本上讲，大脑架构可以广泛地分为以下几种。
- en: '**Internal brain** **:** This type of brain architecture contains pretrained
    models that have been trained using various deep learning algorithms. The internal
    brain does not require runtime communication with the Python API for training,
    as it already has been trained on a pre-existing set of observation-action space.
    All the example projects under Unity ML Agents have internal brain (pretrained
    network) associated with them.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部大脑** **:** 这种类型的大脑架构包含使用各种深度学习算法训练的预训练模型。内部大脑在训练过程中不需要与Python API进行运行时通信，因为它已经在现有的观察-动作空间上进行了训练。在Unity
    ML Agents下的所有示例项目都关联有内部大脑（预训练网络）。'
- en: '**Heuristic brain** **:** This type of brain normally does not contain any
    neural network model; rather, it contains a heuristic one. We discussed in Chapter
    [2](502041_1_En_2_Chapter.xhtml) regarding heuristic pathfinding algorithms involving
    A*. These algorithms are included in this brain. Instead of using gradient descent-based
    deep learning, heuristic brains focus more on dynamic programming and state-based
    learning.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**启发式大脑** **:** 这种类型的大脑通常不包含任何神经网络模型；相反，它包含一个启发式模型。我们在第[2](502041_1_En_2_Chapter.xhtml)章中讨论了涉及A*的启发式路径查找算法。这些算法包含在这个大脑中。启发式大脑不像基于梯度下降的深度学习那样，更侧重于动态规划和基于状态的学习，而不是使用梯度下降的深度学习。'
- en: '**External brain** **:** The external brain is another brain that uses deep
    learning algorithms; however, this is used during training the agent in the Unity
    scene. The communicator object plays a significant role in communicating with
    the port 5004, where we train our model in Tensorflow. The external brain is used
    for training the agents in runtime through the communicator and the Python API.
    These trained models are then used as internal brains when passed as productionized
    and pretrained models for the agents.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外部大脑:** 外部大脑是另一个使用深度学习算法的大脑；然而，这用于在 Unity 场景中训练智能体。通信对象在通过端口 5004 与我们使用 Tensorflow
    训练的模型进行通信时发挥着重要作用。外部大脑通过通信器和 Python API 用于在运行时通过通信器训练智能体。这些训练好的模型随后作为内部大脑使用，当作为生产化和预训练模型传递给智能体时。'
- en: The brain-academy architecture is shown in Figure [3-12](#Fig12).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-12 显示了大脑-学院架构。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig12_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig12_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig12_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig12_HTML.jpg)'
- en: Figure 3-12
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-12
- en: Brain–academy architecture for Unity ML agents
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML 智能体的脑-学院架构
- en: '**Academy:** The Academy controls the collection of brains in the Environment
    and has access to the runtime environment. The scope of the environment that is
    controlled by the academy includes:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '**学院:** 学院控制环境中的大脑集合，并有权访问运行时环境。学院控制的环境范围包括：'
- en: '**Unity Engine configuration:** This includes the speed, frames per second
    rate, and render pipeline associated with a particular game that is getting trained
    or running in Inference Mode.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Unity 引擎配置:** 这包括与特定游戏相关的速度、每秒帧数和渲染管线，该游戏正在接受训练或在推理模式下运行。'
- en: '**Episode length:** This controls the episode length of the RL agent in the
    Unity GamePlay environment.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**剧集长度:** 这控制了 Unity GamePlay 环境中 RL 智能体的剧集长度。'
- en: '**FrameSkip:** The number of Unity Engine sites to skip between each agent
    to make a new decision. This essentially factors out the number of frames that
    are not rendered, while the policy is getting updated in the training phase of
    the agent.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**帧跳过:** 在每个智能体之间跳过的 Unity 引擎站点数，以做出新的决策。这实际上排除了在智能体的训练阶段更新策略时未渲染的帧数。'
- en: This is the central architecture model of the ML Agents that was present before
    the release of version 1.0\. In the new release, the brain component (C# script)
    has been deprecated, and these are replaced with certain scripts that control
    the brain and the decision-making process of the agent .
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 ML Agents 在版本 1.0 发布之前存在的中央架构模型。在新版本中，大脑组件（C# 脚本）已被弃用，并已被某些控制大脑和智能体决策过程的脚本所取代。
- en: Behavior and Decision Scripts in Unity ML Agents Version 1.0
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Unity ML Agents 版本 1.0 中的行为和决策脚本
- en: 'The most important scripts that control the brain and the decision-making process
    are:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 控制大脑和决策过程的最重要的脚本包括：
- en: '**Behavior parameters C# script**'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行为参数 C# 脚本**'
- en: '**Decision requester C# script**'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**决策请求器 C# 脚本**'
- en: '**Model overrider C# script**'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型覆盖器 C# 脚本**'
- en: It is important to understand that in Unity ML Agents, there are sensors that
    are present to record any observation-action space in the environment. With the
    help of sensors, the agent will come to know about the different parts of the
    RL environment. These sensors are essentially rays (physics rays) that were used
    in our previous chapters to denote the position of an agent in the environment
    and also to check the distance between the agent and the reward.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要理解，在 Unity ML Agents 中，存在用于记录环境中任何观察-动作空间的传感器。借助传感器，智能体将了解 RL 环境的不同部分。这些传感器本质上是我们之前章节中使用的射线（物理射线），用来表示智能体在环境中的位置，并检查智能体与奖励之间的距离。
- en: 'To understand these changes, let us open the 3D Ball environment in Unity,
    and inside the 3D Ball Prefab, we will see two models: “Ball” and “Agent.” The
    “Ball” prefab is the small sphere that the “Agent” prefab has to balance on its
    “head.”'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解这些变化，让我们在 Unity 中打开 3D 球环境，并在 3D 球预制件内部，我们将看到两个模型：“球”和“智能体”。“球”预制件是“智能体”预制件必须在其“头部”上平衡的小球。
- en: If we open the “Agent” prefab in the Inspector Window, we will see the different
    components and scripts associated with this prefab. Some of the details are generic,
    like transforms and box Cclliders; the other details require our attention. We
    can see that there are “Behavior Parameters,” ”Decision Requester,” and “Model
    Overrider” C# scripts associated with this agent. There is also a “Ball 3D Agent”
    C# script attached as well, which we will see in a later section in this chapter.
    As mentioned, let us try to briefly understand these three different C# scripts.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在检查器窗口中打开“Agent”预制件，我们将看到与该预制件关联的不同组件和脚本。其中一些细节是通用的，如变换和盒子碰撞体；其他细节需要我们注意。我们可以看到与该智能体关联的“行为参数”、“决策请求者”和“模型覆盖者”C#
    脚本。还有一个“球体 3D 智能体”C# 脚本附加在此，我们将在本章后面的部分中看到。正如之前提到的，让我们简要了解这三个不同的 C# 脚本。
- en: '**Behavior parameters script** **:** The previous concept of brain architecture
    that had different types such as: internal, external, and heuristic are present
    in this script. The main purpose of this script is to determine whether the agent
    will run in Inference Mode (internal brain), in Heuristic Mode(heuristic brain),
    or in External Mode (external brain). This is shown in Figure [3-13](#Fig13).'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行为参数脚本**：此脚本中存在之前大脑架构的不同类型，例如：内部、外部和启发式。此脚本的主要目的是确定智能体是否将在推理模式（内部大脑）中运行，在启发式模式（启发式大脑）中运行，还是在外部模式（外部大脑）中运行。这如图
    [3-13](#Fig13) 所示。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig13_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig13_HTML.jpg)'
  id: totrans-155
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig13_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig13_HTML.jpg)'
- en: Figure 3-13
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 3-13
- en: Behavior parameter, decision requester, and model overrider scripts in the Inspector
    Window of “Agent” prefab in Unity
  id: totrans-157
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Unity 中“Agent”预制件的检查器窗口中的行为参数、决策请求者和模型覆盖者脚本
- en: It also controls the use of sensors, determines whether to use child sensors,
    and determines at a particular time-step which agent is searched for in a multi-agent
    training environment. We will explore more about this script in the next chapter
    when we will be considering the brain architecture in depth. For the time being,
    we can see that there are two important aspects inside this tab in the Inspector
    Window.
  id: totrans-158
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 它还控制传感器的使用，确定是否使用子传感器，并在特定时间步确定在多智能体训练环境中搜索哪个智能体。我们将在下一章中更深入地探讨这个脚本，那时我们将考虑大脑架构。目前，我们可以看到检查器窗口中的这个标签页有两个重要方面。
- en: '**Model:** This contains the neural network model that is required during Inference
    Mode or during actual gameplay. This is the trained Tensorflow model that is placed
    in the internal brain. We can also select different pretrained models that are
    present in our scenes. This also contains the Inference Device—that is whether
    we want to run the model in CPU or GPU, as shown in Figure [3-14](#Fig14).'
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型**：这包含在推理模式或实际游戏过程中所需的神经网络模型。这是放置在内部大脑中的训练好的 Tensorflow 模型。我们还可以选择场景中存在的不同预训练模型。这还包括推理设备——即我们是否想在
    CPU 或 GPU 上运行模型，如图 [3-14](#Fig14) 所示。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig14_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig14_HTML.jpg)'
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig14_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig14_HTML.jpg)'
- en: Figure 3-14
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 3-14
- en: Choosing the Neural Network model for the behavior parameters script
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 为行为参数脚本选择神经网络模型
- en: '**Behavior type** **:** This controls the type of “Brain” we would want to
    use—internal, heuristic, or external. Depending on the behavior type, the agent
    tries to follow that particular policy for reward maximization. Fundamentally
    this can be thought of as the “Brain” architecture. It should be noted that in
    case there are no pretrained models for the internal brain to work upon, during
    the training stage of our model we will be using the external brain. Later this
    trained external brain can be stored in Unity and later used as the internal brain.
    The heuristic brain should be present if we don''t want to use deep RL algorithms
    for our agents. Figure [3-15](#Fig15). represents the behaviors.'
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行为类型**：这控制我们想要使用的“大脑”类型——内部、启发式或外部。根据行为类型，智能体将尝试遵循特定策略以实现奖励最大化。从根本上讲，这可以被视为“大脑”架构。需要注意的是，如果没有为内部大脑训练的预训练模型，在模型训练阶段，我们将使用外部大脑。稍后，这个训练好的外部大脑可以存储在
    Unity 中，并稍后用作内部大脑。如果我们不想为智能体使用深度强化学习算法，则应存在启发式大脑。图 [3-15](#Fig15) 表示行为。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig15_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig15_HTML.jpg)'
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig15_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig15_HTML.jpg)'
- en: Figure 3-15
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 3-15
- en: Behavior types in the Inspector Window controlling brains
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 控制大脑的检查器窗口中的行为类型
- en: There are several other attributes as well, and we will discuss all of these
    in depth in the next chapter. For now, it is important to understand the importance
    of behavior parameters as the fundamental brain of the ML Agents.
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 还有其他几个属性，我们将在下一章深入讨论这些内容。现在，理解行为参数作为机器学习智能体基本大脑的重要性是很重要的。
- en: '**Decision requester script** **:** This script is associated with the decision-making
    process of the agent over its action space. This script also contains the frequency
    at which the decision is taken by the agent according to a particular policy and
    also moderates whether the agent can take actions in between decisions. This is
    related to the academy of the Brain-Academy Architecture Model, as it controls
    the decision-making process in academy steps. Again we will explore this further
    in the next chapter. It also contains variables such as “Decision Period,” which
    defaults to 5, denoting the frequency of taking decisions and “Take Actions Between”
    (Boolean) variable, which allows the agent to take actions between decisions if
    checked.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**决策请求脚本** **:** 该脚本与智能体在其动作空间中的决策过程相关联。该脚本还包含智能体根据特定策略采取决策的频率，并调节智能体是否可以在决策之间采取行动。这与大脑-学院架构模型相关，因为它控制学院步骤中的决策过程。我们将在下一章进一步探讨这一点。它还包含诸如“决策周期”之类的变量，默认值为
    5，表示采取决策的频率，以及“决策之间采取行动”（布尔）变量，如果选中，允许智能体在决策之间采取行动。'
- en: '**Model overrider script** **:** This is used to override an existing Neural
    Network model during the inference stage. This also contains details of how long
    the episodes should run and is generally recommended for each agent having one
    behavior parameters (1:1 ratio). It also helps in running the neural network for
    a time-step denoted by “maxSteps” to check for failure in the model. This can
    also be considered to be a part of the academy of the brain–academy architecture.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型覆盖脚本** **:** 该脚本用于在推理阶段覆盖现有的神经网络模型。它还包含有关剧集运行时长的详细信息，通常建议每个智能体有一个行为参数（1:1
    比率）。它还有助于运行神经网络，以“maxSteps”表示的时间步长来检查模型中的失败。这也可以被视为大脑学院架构的一部分。'
- en: We have now had a brief overview of the most fundamental and important concepts
    of the brain–academy architecture and the changes in the new version, with the
    introduction of behavior parameters, decision requester, and model overrider scripts.
    There are other scripts that also deal with ray-based sensors that are important
    for the brain to make decisions, and we will cover these as we go in the depths
    of the entire process of creating a game with Unity ML Agents. Diagrammatically,
    the architectural relationship between the new version and the brain-academy can
    be presented in the manner shown in Figure [3-16](#Fig16).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在已经简要概述了大脑-学院架构的最基本和最重要的概念以及新版本中的变化，包括行为参数、决策请求脚本和模型覆盖脚本的引入。还有其他脚本也处理基于射线的传感器，这对于大脑做出决策非常重要，我们将在使用
    Unity ML Agents 创建游戏的全过程中逐步介绍这些内容。从图 [3-16](#Fig16) 可以直观地展示新版本与大脑-学院之间的架构关系。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig16_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig16_HTML.jpg)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig16_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig16_HTML.jpg)'
- en: Figure 3-16
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-16
- en: Relationship between the new and old architectures
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 新旧架构之间的关系
- en: Linking Unity ML Agents with Tensorflow
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 Unity ML Agents 与 Tensorflow 链接
- en: This section would mostly rely on linking the ML Agents Neural Network Model
    with Tensorflow, the deep learning framework that we will be using throughout.
    The link between the Unity C# ML Agents SDK code and the deep learning algorithms
    in Python is done with the help of the communicator object that we studied briefly
    at the start of this chapter. However, it is interesting to note that during training,
    we can use the implementations of the PPO and SAC algorithms provided by Unity
    in a very simplified manner through the Anaconda prompt environment. Inside the
    “trainers” folder in “mlagents” (discussed previously), we saw the different implementations
    of algorithms. However, currently we need to only understand how to refer these
    ML models with the prebuilt Unity ML Agents environments. For this, we require
    the “config” folder inside the ML Agents cloned repository. This contains several
    files with the extension “yaml.” Essentially these are files that contain the
    hyperparameters required when we are training a neural network model in Tensorflow.
    But before training, let us understand something about Barracuda, the Unity Inference
    Engine.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 本节主要依赖于将ML Agents神经网络模型与Tensorflow链接，这是我们将在整个过程中使用的深度学习框架。Unity C# ML Agents
    SDK代码与Python中的深度学习算法之间的链接是通过我们在本章开头简要研究过的通信对象实现的。然而，值得注意的是，在训练过程中，我们可以通过Anaconda提示环境以非常简化的方式使用Unity提供的PPO和SAC算法的实现。在“mlagents”中的“trainers”文件夹（之前讨论过）中，我们看到了算法的不同实现。然而，目前我们只需要了解如何使用预构建的Unity
    ML Agents环境来引用这些ML模型。为此，我们需要ML Agents克隆仓库中的“config”文件夹。它包含几个扩展名为“yaml”的文件。本质上，这些文件包含我们在Tensorflow中训练神经网络模型时所需的超参数。但在训练之前，让我们了解一下Barracuda，Unity推理引擎。
- en: 'Barracuda: Unity Inference Engine'
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 'Barracuda: Unity推理引擎'
- en: The Unity ML Agents Toolkit is used for running pretrained neural network models
    using the Inference Mode (internal brain), as mentioned previously. This is done
    with the help of the Unity Inference Engine or Barracuda. This is a lightweight
    library that assists in converting neural network models (from Tensorflow) to
    serialized files with the extension “.nn.” The Inference Engine is compatible
    with both C# Mono as well as Intermediate Language To C++ (ILCPP2). The ILCPP2
    is a scripting backend that runs on C++ and is greatly helpful for reducing the
    size of the game; it works by performing bytecode stripping of the .NET DLL files
    from C# and produces a native binary file that is lightweight and faster. This
    choice is also present when we select the build settings for building our games.
    The Inference Engine supports two different formats, as described here.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents Toolkit用于使用推理模式（内部大脑）运行预训练的神经网络模型，如前所述。这是通过Unity推理引擎或Barracuda实现的。这是一个轻量级的库，它帮助将神经网络模型（从Tensorflow）转换为扩展名为“.nn”的序列化文件。推理引擎与C#
    Mono以及中间语言到C++（ILCPP2）兼容。ILCPP2是一个在C++上运行的脚本后端，对于减少游戏大小非常有帮助；它通过从C#的.NET DLL文件中执行字节码剥离来工作，并生成一个轻量级且快速的本地二进制文件。当我们选择构建设置来构建我们的游戏时，这个选择也是可用的。推理引擎支持两种不同的格式，如这里所述。
- en: '**Barracuda**: The “.nn” file format containing the trained neural network
    models. This is done by the “tensorflow_to_barracuda.py” Python script. We will
    be taking a look at this in the next chapters as well when we try to understand
    serialization of the neural network model.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Barracuda**: 包含训练好的神经网络模型的“.nn”文件格式。这是通过“tensorflow_to_barracuda.py”Python脚本完成的。我们将在下一章中再次探讨这一点，当我们尝试理解神经网络模型的序列化时。'
- en: '**ONNX**: This is “onnx” file format, which is an industry standard open format
    for cross-functional neural network model support produced by the “tf2onnx package.”'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ONNX**: 这是一种“onnx”文件格式，它是由“tf2onnx package”生产的跨功能神经网络模型支持的行业标准开放格式。'
- en: The Inference Engine can be seen inside the behavior parameters script. We saw
    that under the “Model” section there is an inference device attribute where we
    can select CPU or GPU. This enables the Inference Engine to run on the device.
    Unless we are using Resnet or VGG16 (Computer Vision models), we should be alright
    using CPU as our Inference Engine device. Figure [3-17](#Fig17) shows the inference
    devices.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 推理引擎可以在行为参数脚本中看到。我们注意到在“模型”部分有一个推理设备属性，我们可以选择CPU或GPU。这使得推理引擎能够在设备上运行。除非我们使用Resnet或VGG16（计算机视觉模型），否则我们应该可以使用CPU作为我们的推理引擎设备。图[3-17](#Fig17)展示了推理设备。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig17_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig17_HTML.jpg)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig17_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig17_HTML.jpg)'
- en: Figure 3-17
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-17
- en: The Inference device (CPU/GPU) for the Inference Engine to run
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 推理引擎的推理设备（CPU/GPU）
- en: Now that we have an idea how Tensorflow-trained networks are stored in Unity
    through Barracuda, we can train a prebuilt model using the 3D Balls example.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了如何通过 Barracuda 在 Unity 中存储 TensorFlow 训练的网络，我们可以使用 3D 球示例来训练预构建的模型。
- en: Training 3D Ball Environment with Unity ML Agents
  id: totrans-185
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 Unity ML Agents 训练 3D 球环境
- en: Let us navigate to the “config” folder in the repository and look inside its
    contents. We will be using the “trainer_config.yaml” file to train our model through
    Anaconda prompt. There are other several yaml files, like “gail_config.yaml” and
    “sac_trainer_config.yaml”. However, for us, we will be using the “trainer_config.yaml”
    default file, which relies on the PPO algorithm for training. Let us take a look
    inside the “yaml” file.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们导航到存储库中的“config”文件夹，查看其内容。我们将使用“trainer_config.yaml”文件通过 Anaconda 提示符来训练我们的模型。还有其他几个
    yaml 文件，如“gail_config.yaml”和“sac_trainer_config.yaml”。然而，对我们来说，我们将使用“trainer_config.yaml”默认文件，它依赖于
    PPO 算法进行训练。让我们看一下“yaml”文件的内容。
- en: 'On opening, we see a list of parameters (hyperparameters) that are used to
    train our neural network. For now let us think of these hyperparameters as certain
    attributes that will help in the training process. We have a default set of hyperparameters,
    which looks like the following:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 打开时，我们看到一系列用于训练我们的神经网络的参数（超参数）。目前让我们将这些超参数视为某些属性，这些属性将有助于训练过程。我们有一组默认的超参数，如下所示：
- en: '[PRE19]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'As we see, there are several parameters like the “trainer: ppo,” which signifies
    that the PPO model is used for this environment. Also we have several attributes,
    like memory size, max steps, number of epochs, batch size, and so on. All these
    have their own significance, which we will look at in depth in “Deep Learning”
    chapter. It is safe to assume that the training environment is governed with the
    help of these hyperparameters that specify what algorithm to use, the states and
    rewards, the memory size for holding the information of the observation space,
    how long the training will continue, and the time gap between the actions the
    agent chooses. This “default” module is used for training any environment where
    it is not specified which hyperparameters upon which to train. But in our case,
    we will be using the 3D Ball hyperparameter set, which looks like this:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '如我们所见，有几个参数，如“trainer: ppo”，这表示在这个环境中使用了 PPO 模型。我们还有几个属性，如内存大小、最大步数、epoch 数、批处理大小等。所有这些都有其自身的意义，我们将在“深度学习”章节中深入探讨。可以安全地假设，训练环境是通过这些超参数来管理的，这些超参数指定了使用哪种算法、状态和奖励、存储观察空间信息的内存大小、训练将持续多长时间，以及代理选择动作之间的时间间隔。这个“默认”模块用于训练任何未指定基于哪些超参数进行训练的环境。但在我们的情况下，我们将使用
    3D 球超参数集，如下所示：'
- en: '[PRE20]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'In this case, we have a smaller set of hyperparameters compared to this one.
    We have the batch size, which controls the size of the batch for the training,
    and the buffer size, which contains the size of the replay buffer or memory. The
    “lambd” and ”beta” are hyperparameters that govern the learning rate. Additionally
    we have another set of hyperparameters for the 3D Ball Hard environment, as shown
    here:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们相比这个例子有更少的一组超参数。我们有批处理大小，它控制训练批次的尺寸，以及缓冲区大小，它包含重放缓冲区或内存的大小。“lambd”和“beta”是控制学习率的超参数。此外，我们还有一组用于
    3D 球困难环境的超参数，如下所示：
- en: '[PRE21]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Therefore, for now we briefly have an idea of the hyperparameters contained
    inside the “trainer_config.yaml” file. Now let us open the Anaconda prompt environment,
    and then inside the Prompt, we have to navigate to the directory containing the
    “trainer_config.yaml” file. After that we have to type the command:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，目前我们简要地了解到了“trainer_config.yaml”文件中包含的超参数。现在让我们打开 Anaconda 提示符环境，然后在提示符中，我们需要导航到包含“trainer_config.yaml”文件的目录。之后，我们必须输入以下命令：
- en: '[PRE22]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'The “trainer_config.yaml” is the yaml file that we mentioned before. This lets
    ML Agents know that we want to use the “3D Ball” module from the “trainer_config.yaml”
    file. The run-ID signifies the name of the new model that we are training. Generally
    the syntax for training can be written as:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: “trainer_config.yaml”是我们之前提到的 yaml 文件。这使 ML Agents 知道我们想要使用“trainer_config.yaml”文件中的“3D
    Ball”模块。run-ID 表示我们正在训练的新模型的名称。通常，训练的语法可以写成如下：
- en: '[PRE23]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'The –train command is optional in the new version and can be omitted as well.
    Now we are using the hyperparameters mentioned in the “trainer_config.yaml,” but
    we know that there are other yaml files as well that contain a different training
    algorithm and different set of hyperparameters. For instance, if we are to train
    it with the help of the “sac_trainer_config.yaml” file, then the syntax would
    have been :'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 在新版本中，`-train` 命令是可选的，也可以省略。现在我们正在使用“trainer_config.yaml”中提到的超参数，但我们知道还有其他 yaml
    文件，它们包含不同的训练算法和不同的超参数集。例如，如果我们使用“sac_trainer_config.yaml”文件来训练它，那么语法将是：
- en: '[PRE24]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'If we are in the “config” folder to run our command, then it can be simplified
    as:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在“config”文件夹中运行我们的命令，那么它可以简化为：
- en: '[PRE25]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Once done, we will see that Unity ML Agents starts connecting to the Python
    API through port 5004 and then uses the Tensorflow library to start the training
    process.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦完成，我们将看到 Unity ML Agents 开始通过端口 5004 连接到 Python API，然后使用 Tensorflow 库开始训练过程。
- en: After some time there will be an option that shows up in the Anaconda Prompt
    Window, noting that the 3D Ball environment has to be played in Unity Editor for
    external training to take place. If the Unity Editor environment is not in play
    mode then, the API times out, and the training is not done. Therefore, we need
    to go to Editor ➤ Project Settings ➤ Player. Inside the Player section, we have
    to go to the “Resolution and Presentation” section and check the “Run In Background”
    option. This will enable the Unity Engine Editor to run while we are training
    the model in the Anaconda Prompt Window, as shown in Figure [3-18](#Fig18).
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 经过一段时间，Anaconda Prompt 窗口中将出现一个选项，指出必须使用 Unity Editor 播放 3D Ball 环境才能进行外部训练。如果
    Unity Editor 环境不在播放模式，则 API 会超时，训练不会完成。因此，我们需要转到编辑器 ➤ 项目设置 ➤ 玩家。在玩家部分中，我们必须转到“分辨率和显示”部分并勾选“在后台运行”选项。这将使
    Unity 引擎编辑器在我们通过 Anaconda Prompt 窗口训练模型时运行，如图 [3-18](#Fig18) 所示。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig18_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig18_HTML.jpg)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig18_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig18_HTML.jpg)'
- en: Figure 3-18
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-18
- en: Configuring Player (run in background) in project settings
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在项目设置中配置玩家（在后台运行）
- en: If we start our training process, it should appear something like Figure [3-19](#Fig19),
    plus this time there is a Unity logo to be displayed, as shown in Figure [3-19](#Fig19).
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们开始训练过程，它应该看起来像图 [3-19](#Fig19)，这次还有一个 Unity 标志要显示，如图 [3-19](#Fig19) 所示。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig19_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig19_HTML.jpg)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig19_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig19_HTML.jpg)'
- en: Figure 3-19
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-19
- en: Running “mlagents-learn” command to train 3D Ball Unity agent
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 使用“mlagents-learn”命令训练 3D Ball Unity 代理
- en: Once the training starts, we will see the version of “mlagents,” ”mlagents-envs,”
    Python Communicator API, and Tensorflow. We will be prompted with the option to
    click Play in the Unity Editor scene to start the training process for external
    brain. This would look like the image shown in Figure [3-20](#Fig20).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦开始训练，我们将看到“mlagents”、“mlagents-envs”、Python Communicator API 和 Tensorflow
    的版本。在 Unity 编辑器场景中，我们将被提示点击“播放”以启动外部大脑的训练过程。这看起来就像图 [3-20](#Fig20) 中所示。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig20_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig20_HTML.jpg)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig20_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig20_HTML.jpg)'
- en: Figure 3-20
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-20
- en: 3D Ball environment training with PPO deep learning algorithm in Unity ML agents
    and Tensorflow
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Unity ML Agents 和 Tensorflow 中使用 PPO 深度学习算法对 3D Ball 环境进行训练
- en: We will see that the agents try to balance the balls or spheres on their heads,
    and in many cases during the initial stages, the balls fall off their heads during
    training. This credits a negative reward to the agent, and as learning progresses
    we will gradually see the agents learning to balance the balls. Moreover, we have
    the hyperparameters displayed on the screen that are received from the “trainer_config.yaml”
    file. A preview of the training process is shown in Figure [3-21](#Fig21).
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 我们会看到代理试图在头上平衡球或球体，在训练的初始阶段，球体在许多情况下会从头上掉下来。这会给代理一个负奖励，随着学习的进展，我们将逐渐看到代理学会平衡球。此外，我们在屏幕上显示了从“trainer_config.yaml”文件接收到的超参数。训练过程的预览如图[3-21](#Fig21)所示。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig21_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig21_HTML.jpg)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig21_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig21_HTML.jpg)'
- en: Figure 3-21
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-21
- en: Hyperparameters, rewards, and steps in the training process
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程中的超参数、奖励和步数
- en: We now see that the agent learns gradually, and the logs in the Anaconda prompt
    also reveal the mean or average rewards and standard deviation of the rewards
    for every 12,000 steps, which is mentioned as a hyperparameter. If we let this
    train for a long time (let’s say an hour, on average), we will see the rewards
    gradually increasing as the agent becomes more adept to balance the ball on it.
    Now let’s visualize this learning in TensorBoard.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以看到代理逐渐学习，Anaconda提示符中的日志也揭示了每12,000步的平均奖励和标准差，这被提及为一个超参数。如果我们让这个训练长时间进行（比如说平均一个小时），我们会看到奖励随着代理越来越擅长平衡球而逐渐增加。现在让我们在TensorBoard中可视化这个学习过程。
- en: Visualization with TensorBoard
  id: totrans-219
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用TensorBoard进行可视化
- en: 'We know that TensorBoard is a visualization tool and have installed the same
    in Chapter [1](502041_1_En_1_Chapter.xhtml), when we were trying out deep Q-learning
    in the CartPole environment. Now in this section, we will link the training that
    is happening in the Anaconda prompt with Unity ML Agents with Tensorboard for
    proper visualization of the rewards and other details. For this we have to open
    another Anaconda prompt terminal and navigate to the “config” folder like before
    in the ML Agents repository. Inside the folder, there is a “summaries” folder
    that holds the TensorBoard visualization statistics for the particular model being
    trained. The command for starting and linking with TensorBoard is:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道TensorBoard是一个可视化工具，并在第[1](502041_1_En_1_Chapter.xhtml)章中安装了它，当时我们在CartPole环境中尝试深度Q-learning。现在在这一节中，我们将使用TensorBoard将Anaconda提示符中的训练与Unity
    ML Agents连接起来，以便正确地可视化奖励和其他细节。为此，我们必须打开另一个Anaconda提示符终端，并像之前在ML Agents仓库中一样导航到“config”文件夹。在文件夹内部，有一个“summaries”文件夹，它包含了正在训练的特定模型的TensorBoard可视化统计数据。启动并连接到TensorBoard的命令是：
- en: '[PRE26]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Once this is done, we will have a message in Anaconda prompt showing the port
    number 6006 and also the http details to visualize. By default, TensorBoard operates
    from port 6006, and the link is of type http://<device-name>:6006, where device
    –name is the name of the computer system we are working on. This would be something
    like the image shown in Figure [3-22](#Fig22).
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 完成这些后，Anaconda提示符将显示端口号6006以及用于可视化的http详细信息。默认情况下，TensorBoard从端口6006运行，链接类型为http://<device-name>:6006，其中device-name是我们正在工作的计算机系统的名称。这就像图[3-22](#Fig22)中所示的那样。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig22_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig22_HTML.jpg)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig22_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig22_HTML.jpg)'
- en: Figure 3-22
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-22
- en: Launching TensorBoard for Unity ML Agents
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 启动Unity ML Agents的TensorBoard
- en: The TensorBoard visualization shows the rewards and the steps completed in a
    particular epoch along with the loss of the deep learning algorithm (PPO). This
    is an interactive visualization tool, and as time progresses, we would see the
    values of the rewards increase. We will be exploring each of the TensorBoard modules
    separately, but in a nutshell, this dashboard provides an interactive view of
    the loss rate, the accuracy, rewards collected, mean rewards, standard deviation
    of the rewards, as well as the steps. This will be beneficial for us when we build
    our own agents in Unity and train them using ML Agents in the future chapters.
    The dashboard is presented in Figure [3-23](#Fig23).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: TensorBoard可视化显示了特定周期内完成的奖励和步骤，以及深度学习算法（PPO）的损失。这是一个交互式可视化工具，随着时间的推移，我们会看到奖励值的增加。我们将分别探索TensorBoard的每个模块，但简而言之，这个仪表板提供了损失率、准确率、收集到的奖励、平均奖励、奖励的标准差以及步骤的交互式视图。这将在我们未来章节中构建自己的代理并在Unity中使用ML
    Agents进行训练时对我们有益。仪表板如图[3-23](#Fig23)所示。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig23_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig23_HTML.jpg)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig23_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig23_HTML.jpg)'
- en: Figure 3-23
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-23
- en: The TensorBoard dashboard during training of the 3D Ball environment
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在3D球环境训练过程中的TensorBoard仪表板
- en: So we have now seen how to link Tensorflow to train our ML Agents in Unity and
    also how to link TensorBoard for interactive visualization during the training
    process. We can close the training whenever we like by stopping the Play mode
    in Unity.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在已经看到了如何将Tensorflow链接到Unity中训练我们的机器学习代理，以及如何将TensorBoard链接到训练过程中的交互式可视化。我们可以随时通过在Unity中停止播放模式来关闭训练。
- en: Editor
  id: totrans-231
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 编辑器
- en: Now if we want to visualize the trained new model (named “new3DBall” ) in the
    scene, we can navigate to the behavior parameters script in the “Agent” prefab,
    and in the place of “Model,” we can select the (“new3DBall”) model. We can then
    see, on playing in the Editor, that Unity Engine is now using the Unity Inference
    Engine and feeding the agent with the new trained model (Inference Mode). This
    is how a trained external brain is converted into an internal brain that can be
    used inside the Unity Editor. This brain is trained on PPO using the OpenAI Gym
    wrapper in Unity’s environments to provide an actual AI agent that can balance
    the sphere. We can go ahead and also create a Unity executable simulation game
    with this trained neural network model by clicking on the Build Option after configuring
    the Build Settings from he Menu. On placing the newly trained model inside the
    “Model” section of the “Behavior Parameters” script, we should see something like
    that shown in Figure [3-24](#Fig24).
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 现在如果我们想在场景中可视化训练好的新模型（命名为“new3DBall”），我们可以导航到“Agent”预制件中的行为参数脚本，在“模型”的位置，我们可以选择（“new3DBall”）模型。然后，在编辑器中播放时，我们可以看到Unity引擎现在正在使用Unity
    Inference Engine，并给代理提供新的训练模型（推理模式）。这就是如何将训练的外部大脑转换为可以在Unity编辑器内部使用的内部大脑。这个大脑是在Unity环境中使用OpenAI
    Gym包装器在PPO上训练的，以提供一个能够平衡球体的实际AI代理。我们可以继续创建一个使用这个训练好的神经网络模型的Unity可执行模拟游戏，通过在配置完构建设置后点击菜单中的构建选项。将新训练的模型放置在“行为参数”脚本的“模型”部分中，我们应该会看到如图[3-24](#Fig24)所示的内容。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig24_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig24_HTML.jpg)'
  id: totrans-233
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig24_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig24_HTML.jpg)'
- en: Figure 3-24
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-24
- en: Using a trained neural network as an internal brain for the 3D Ball agent
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练好的神经网络作为3D球代理的内部大脑
- en: By now, we have an idea of the scope of Unity ML Agents and have also trained
    a new neural network model with the help of ML Agents and Tensorflow and published
    a new simulation game based on the PPO algorithm of deep RL. In the further chapters,
    we will go into the depths of each of these separate modules of deep learning
    algorithms and also create simulations and games using the Unity ML Agents. We
    will also see how to harness the power of the Baselines Model of OpenAI to train
    our new games in Unity with the help of ML Agents and Python API. In the next
    section, we will play around with some of the sample examples of Unity scenes
    and get to know the diversity of the environments.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经了解了 Unity ML Agents 的范围，并借助 ML Agents 和 Tensorflow 训练了一个新的神经网络模型，并基于深度强化学习的
    PPO 算法发布了一款新的模拟游戏。在接下来的章节中，我们将深入探讨这些深度学习算法的各个独立模块，并使用 Unity ML Agents 创建模拟和游戏。我们还将了解如何利用
    OpenAI 的 Baselines 模型，在 Unity 中借助 ML Agents 和 Python API 训练我们的新游戏。在下一节中，我们将尝试一些
    Unity 场景的示例，并了解环境的多样性。
- en: Playing Around with Unity ML Agents Examples
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 尝试 Unity ML Agents 示例
- en: We have already seen the “3D Balls” environment and the “Basic” environment.
    Now let us have a brief overview of the other environments that are present inside
    the ML Agents Example folder. For each environment, we will have an overview of
    the agents, rewards, goals, and adversaries as well as the type of brain and Sensors
    used. One important thing to note is that in each of these environments we will
    notice the vector action space and whether it is discrete or continuous. This
    will help us to understand the diversity of the environments and also the complexity
    of training each agent. We will be discussing 15 additional environments, so that
    for now we can train them by using the lessons learned from the previous section.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到了“3D 球”环境和“基本”环境。现在让我们简要概述一下 ML Agents 示例文件夹中存在的其他环境。对于每个环境，我们将概述代理、奖励、目标和对手，以及使用的脑和传感器类型。需要注意的是，在这些环境中的每一个，我们都会注意到向量动作空间，以及它是离散的还是连续的。这将帮助我们理解环境的多样性以及训练每个代理的复杂性。我们将讨论
    15 个额外的环境，因此现在我们可以通过使用上一节学到的知识来训练它们。
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig25_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig25_HTML.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig25_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig25_HTML.jpg)'
- en: Figure 3-25
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-25
- en: Bouncer environment Unity ML Agents
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 中的 Bouncer 环境
- en: '**Bouncer environment** **:** In this Unity environment, shown in Figure [3-25](#Fig25),
    the blue agent has to “jump” or “bounce” to reach the green target, which is at
    an elevated position from the ground. The agent is rewarded for each correct jump.
    Here we have the behavior parameters script, and it contains the bouncer neural
    network pretrained model. The vector observation-action space is continuous in
    this case, which is suitable for deep learning algorithms. For training in this
    environment using PPO or SAC (or ghost/GAIL), the process is very similar, as
    we have to run the “mlagents-learn” command in Anaconda prompt and pass the location
    of the “yaml” file for training.'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Bouncer 环境** **：** 在这个 Unity 环境中，如图 [3-25](#Fig25) 所示，蓝色代理必须“跳跃”或“弹跳”以到达位于地面以上位置的绿色目标。每次正确跳跃，代理都会获得奖励。这里我们有行为参数脚本，其中包含预训练的
    bouncer 神经网络模型。在这种情况下，向量观察-动作空间是连续的，这适合深度学习算法。使用 PPO 或 SAC（或 ghost/GAIL）在此环境中进行训练的过程非常相似，我们必须在
    Anaconda 提示符中运行“mlagents-learn”命令，并传递训练“yaml”文件的路径。'
- en: '[PRE27]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig26_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig26_HTML.jpg)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig26_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig26_HTML.jpg)'
- en: Figure 3-26
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-26
- en: Crawler environment in Unity ML Agents
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 中的 Crawler 环境
- en: '**Crawler environment** **:** In this environment, shown in Figure [3-26](#Fig26),
    the crawler is a collection of joints. It resembles an insect that tries to find
    the green target (food). The crawler is rewarded for each correct finding; additionally,
    there are two variants: static and dynamic platforms. The crawler is a very complicated
    prefab, as the rewards here are driven by the motion and vector direction of the
    joints of the crawler system. While this may be intimidating at first to understand,
    we will be using this for training our Puppo, which also has a joint-based system.
    The vector space is continuous, and the details of the behavior parameters are
    also shown. The joint system comprises the joints in the legs of the agent, which
    helps it to move. The direction of the vector and the joint rotation play an important
    aspect in deciding the reward, as the nearer the crawler gets to the food, the
    greater the chances of getting rewarded. However, we can train this agent as well
    using our knowledge of the “mlagents-learn” command and can observe the way the
    crawler moves toward its target.'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**爬虫环境** **:** 在这个环境中，如图 [3-26](#Fig26) 所示，爬虫是由一系列关节组成的集合。它类似于一只试图找到绿色目标（食物）的昆虫。爬虫每次找到正确的目标都会得到奖励；此外，还有两种变体：静态和动态平台。爬虫是一个非常复杂的预制件，因为这里的奖励是由爬虫系统的关节的运动和向量方向驱动的。虽然一开始理解起来可能有些令人畏惧，但我们将使用这个环境来训练我们的Puppo，它也是一个基于关节的系统。向量空间是连续的，行为参数的详细信息也显示了出来。关节系统由代理腿部的关节组成，这有助于它移动。向量的方向和关节的旋转在决定奖励方面起着重要作用，因为爬虫离食物越近，获得奖励的机会就越大。然而，我们也可以使用我们对“mlagents-learn”命令的了解来训练这个代理，并观察爬虫向其目标移动的方式。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig27_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig27_HTML.jpg)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig27_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig27_HTML.jpg)'
- en: Figure 3-27
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-27
- en: GridWorld environment Unity ML Agents
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents的GridWorld环境
- en: '**Food collector environment** **:** This is a different kind of a search environment,
    where the agent has to collect food (green target cubes) in a minefield filled
    with different prefabs and objects. This is shown in Figure [3-27](#Fig27). Here
    we can see a pink line that is effectively an extended sensor ray with which the
    agent It is important to note that in this case, the vector observation space
    is discrete, and to transform it into a deep learning model, this has to be converted
    into a multi-discrete vector space. Additionally, this can be trained in Unity
    ML Agents using the “mlagents-learn” command.'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**食物收集环境** **:** 这是一个不同类型的搜索环境，其中代理必须在布满不同预制件和物体的雷区中收集食物（绿色目标立方体）。如图 [3-27](#Fig27)
    所示。在这里，我们可以看到一个粉红色的线，它实际上是一个扩展的传感器射线，代理通过它进行观察。需要注意的是，在这种情况下，向量观察空间是离散的，为了将其转换为深度学习模型，这需要转换为一个多离散向量空间。此外，这也可以使用Unity
    ML Agents中的“mlagents-learn”命令进行训练。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig28_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig28_HTML.jpg)'
  id: totrans-252
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig28_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig28_HTML.jpg)'
- en: Figure 3-28
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-28
- en: GridWorld environment Unity ML Agents
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents的GridWorld环境
- en: '**GridWorld environment** **:** This is an advanced environment, as it comprises
    computer vision and deep RL, shown in Figure [3-28](#Fig28). Here the agent is
    the “0” sign (blue-colored), whose goal is to reach toward the “+”(green sign).
    In this case we will be using Resnet, a SOTA computer vision model made with different
    Convolution Neural Networks. In addition to the behavior parameters script, we
    also have a camera sensor component script attached to the agent. This uses the
    compressed visual information in terms of pixels for Resnet deep network to train.
    Then the outcome of the computer vision model is passed on as the decisions used
    by the behavior script to navigate the agent (“0”) toward the “+” green sign.
    Here, too, the vector space is discrete, and the model can be trained using the
    “mlagents-learn” command. This is an interesting environment, and we will use
    this when we try to understand computer vision models in deep RL.'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GridWorld环境** **:** 这是一个高级环境，因为它包含了计算机视觉和深度强化学习，如图[3-28](#Fig28)所示。在这里，智能体是“0”标志（蓝色），其目标是朝向“+”标志（绿色）。在这种情况下，我们将使用Resnet，这是一个由不同的卷积神经网络构建的SOTA计算机视觉模型。除了行为参数脚本外，我们还附加了一个摄像头传感器组件脚本到智能体上。它使用像素形式的压缩视觉信息来训练Resnet深度网络。然后，计算机视觉模型的结果被传递给行为脚本，用于导航智能体（“0”）朝向“+”绿色标志。在这里，向量空间也是离散的，可以使用“mlagents-learn”命令来训练模型。这是一个有趣的环境，当我们试图理解深度强化学习中的计算机视觉模型时，我们将使用这个环境。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig29_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig29_HTML.jpg)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig29_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig29_HTML.jpg)'
- en: Figure 3-29
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-29
- en: Hallway environment Unity ML agents
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 走廊环境Unity ML智能体
- en: '**Hallway environment** **:** The Hallway environment is another unique environment
    where the blue agent has to navigate itself toward either the “X” or the “0” poles.
    There is a block in the center where, in each turn, a unique symbol (either “X”
    or “0” ) is shown. The agent has to remember what symbol was shown by the central
    block and should navigate itself automatically to the pole having the similar
    sign. If “X” is shown in the central block, the agent will go to the “X” pole
    and vice versa. It can be stated here that in this case, the agent should heavily
    rely on memory-based networks to store visual information regarding the symbol
    shown on the central block. Here, there are two variants, and one of them requires
    computer vision models, such as Resnet. However, there are certain other networks
    such as LSTM and recurrent neural networks (RNNs), that can be used to add more
    memory to the agent. We will be discussing this in more detail in the chapter
    on deep RL. In this case, we have a discrete vector observation space in the behavior
    parameters that can be trained by using the “mlagents-train” command and specifying
    the nature of the algorithm and the “yaml” file. Figure [3-29](#Fig29) shows a
    preview of the environment.'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**走廊环境** **:** 走廊环境是另一个独特的环境，其中蓝色智能体必须导航自己朝向“X”或“0”柱子。在中心有一个方块，在每个回合中，都会显示一个独特的符号（“X”或“0”）。智能体必须记住中心方块显示的符号，并自动导航到具有相似符号的柱子。如果中心方块显示“X”，智能体将前往“X”柱子，反之亦然。可以在这里说，在这种情况下，智能体应该严重依赖基于记忆的网络来存储关于中心方块上显示的符号的视觉信息。在这里，有两种变体，其中之一需要计算机视觉模型，如Resnet。然而，还有一些其他网络，如LSTM和循环神经网络（RNNs），可以用来给智能体添加更多记忆。我们将在深度强化学习章节中更详细地讨论这个问题。在这种情况下，行为参数中有一个离散的向量观察空间，可以使用“mlagents-train”命令进行训练，并指定算法的性质和“yaml”文件。图[3-29](#Fig29)显示了环境的预览。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig30_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig30_HTML.jpg)'
  id: totrans-260
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig30_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig30_HTML.jpg)'
- en: Figure 3-30
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-30
- en: PushBlock environment Unity ML Agents
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: PushBlock环境Unity ML Agents
- en: '**PushBlock environment** **:** This is a simple environment where the blue
    agent has to push the larger block toward the green checkpost. This is done by
    using sensor rays that collide with a collider and check whether the object in
    sight is the bigger cube, and then it pushes it toward the goal. Here also, the
    vector space is discrete, and we can train the model, as shown in Figure [3-30](#Fig30).'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PushBlock环境** **:** 这是一个简单的环境，其中蓝色智能体必须将较大的方块推向绿色的检查站。这是通过使用传感器射线与碰撞体碰撞并检查视线中的物体是否是更大的立方体来完成的，然后将其推向目标。在这里，向量空间也是离散的，我们可以像图[3-30](#Fig30)所示那样训练模型。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig31_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig31_HTML.jpg)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig31_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig31_HTML.jpg)'
- en: Figure 3-31
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-31
- en: Pyramid environment Unity ML Agents
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 金字塔环境 Unity ML Agents
- en: '**Pyramids environment** **:** This is a two-step, reward-based environment
    where the agent has to first target a “switch” placed inside an obstacle-laden
    environment. Once the agent reaches the switch, a new target emerges, which is
    in the shape of a pyramid. The agent then has to search for the pyramid. This
    is a simple twofold reward-validation environment, and we will be exploring it
    further in later chapters. Here, too, the vector space is discrete. This is presented
    in Figure [3-31](#Fig31).'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金字塔环境** **:** 这是一个基于奖励的两步环境，其中代理首先需要在充满障碍物的环境中定位一个“开关”。一旦代理到达开关，就会出现一个新的目标，即金字塔形状。然后代理必须寻找金字塔。这是一个简单的双层奖励验证环境，我们将在后面的章节中进一步探讨。在这里，向量空间也是离散的。这如图[3-31](#Fig31)所示。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig32_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig32_HTML.jpg)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig32_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig32_HTML.jpg)'
- en: Figure 3-32
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-32
- en: Reacher environment Unity ML Agents
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 接近者环境 Unity ML Agents
- en: '**Reacher environment** **:** This is a rather challenging environment where
    the agent has to control robotic arms with the goal of keeping the ends of the
    arms within the green sphere, as shown in Figure [3-32](#Fig32). This is a deep
    RL problem that requires advanced learning algorithms so as to control the direction
    of motion of the arms. The 20 robotic arms in the environment are controlled by
    a single agent with a continuous vector space of actions. Later we will exclusively
    use this particular environment when we will learn about off policy deep deterministic
    policy gradients (DDPGs) and other advanced algorithms. However, for the time
    being, we can train this Reacher agent with the Unity ML Agents PPO algorithm
    and hyperparameters from the “trainer_config.yaml” file.'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接近者环境** **:** 这是一个相当具有挑战性的环境，其中代理必须控制机械臂，目标是保持机械臂的末端在绿色球体内部，如图[3-32](#Fig32)所示。这是一个深度强化学习问题，需要高级学习算法来控制机械臂的运动方向。环境中的20个机械臂由一个代理控制，具有连续的动作向量空间。稍后我们将专门使用这个特定的环境来学习关于离策略深度确定性策略梯度（DDPGs）和其他高级算法。然而，目前我们可以使用Unity
    ML Agents PPO算法和“trainer_config.yaml”文件中的超参数来训练这个接近者代理。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig33_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig33_HTML.jpg)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig33_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig33_HTML.jpg)'
- en: Figure 3-33
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-33
- en: Soccer environment Unity ML Agents
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 足球环境 Unity ML Agents
- en: '**Soccer environment** **:** This is a very popular and interesting environment
    that is extensively used in most of the games such as FIFA (Electronic Arts) and
    Google Dopamine Football playground. This is shown in Figure [3-33](#Fig33). This
    is actually a zero-sum game where adversarial teams have to play against each
    other to score a goal. This can be modeled into a football game where the goal
    scored by one team will negatively affect the other team. The rewards are provided
    to the winning teams, and negative rewards are provided to the teams that are
    unable to score the goal—the teams being the purple and blue agents. This will
    be used when we learn about adversarial self-play algorithms in RL, which operate
    on policies similar to mini-max (two-person, 0 sum) and alpha beta pruning algorithms.
    The space here is discrete, and here, too, we have sensor rays that are used to
    determine the location of the soccer ball (football) and the goal.'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**足球环境** **:** 这是一个非常流行且有趣的环境，在大多数游戏如FIFA（艺电）和Google Dopamine足球游乐场中被广泛使用。这如图[3-33](#Fig33)所示。这实际上是一个零和游戏，其中对抗性团队必须相互对抗以得分。这可以被建模成一个足球游戏，其中一队的得分将负面地影响另一队。奖励提供给获胜的队伍，而负奖励提供给无法得分的队伍——即紫色和蓝色代理。这将在我们学习关于RL中的对抗性自我博弈算法时使用，这些算法在策略上类似于最小-最大（两人，零和）和alpha-beta剪枝算法。这里的空间是离散的，而且在这里，我们也有用于确定足球（足球）和球门位置的传感器射线。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig34_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig34_HTML.jpg)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig34_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig34_HTML.jpg)'
- en: Figure 3-34
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-34
- en: Tennis environment Unity ML Agents
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 网球环境 Unity ML Agents
- en: '**Tennis environment** **:** This is a classic environment where two agents
    play a game of tennis, which is along similar lines to the game of soccer, as
    shown in Figure [3-34](#Fig34). Here we will see that if any of the agents miss
    hitting the tennis ball, negative rewards are credited. There are two different
    algorithmic paradigms that can be used here. Imitation learning with adversarial
    networks can help the agent to learn by a robust behavioral cloning policy. Again,
    we can use curriculum learning, which implies increasing the challenges step by
    step for a particular agent (continuous vector space).'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**网球环境** **:** 这是一个经典的智能体游戏环境，其中两个智能体进行网球比赛，这与足球游戏类似，如图 [3-34](#Fig34) 所示。在这里，我们将看到如果任何智能体未能击中网球，将获得负奖励。这里可以使用两种不同的算法范式。具有对抗网络的模仿学习可以帮助智能体通过稳健的行为克隆策略进行学习。再次，我们可以使用课程学习，这意味着逐步增加特定智能体的挑战（连续向量空间）。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig35_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig35_HTML.jpg)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig35_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig35_HTML.jpg)'
- en: Figure 3-35
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-35
- en: Walker environment Unity ML Agents
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 行走环境 Unity ML Agents
- en: '**Walker environment** **:** This is similar to the crawler environment, and
    the agent is a humanoid robot made up of a system of joints. However, unlike searching
    for targets, the main goal here is for the humanoid agent to walk with the help
    of its joints. This is also a complex challenge that relies on the joint-based
    system. Without loss of generality, the agent uses the direction vector of its
    joints to move forward and balance itself, collecting rewards for every time-step
    it is able to do so. Since all joint-based systems rely heavily on advanced deep
    RL techniques, the vector space is continuous. The environment is shown in Figure
    [3-35](#Fig35).'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行走环境** **:** 这与爬行动物环境类似，智能体是由关节系统组成的人形机器人。然而，与寻找目标不同，这里的主要目标是人形智能体在关节的帮助下行走。这也是一个复杂的挑战，依赖于基于关节的系统。不失一般性，智能体使用其关节的方向向量前进并保持平衡，每次成功做到这一点都会获得奖励。由于所有基于关节的系统都严重依赖于高级深度强化学习技术，因此向量空间是连续的。环境如图
    [3-35](#Fig35) 所示。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig36_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig36_HTML.jpg)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig36_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig36_HTML.jpg)'
- en: Figure 3-36
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-36
- en: WallJump environment Unity ML Agents
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 墙跳环境 Unity ML Agents
- en: '**WallJump environment** **:** Similar to the PushBlock and Pyramid environments,
    the agent here has to jump over the wall to reach the target (green position),
    shown in Figure [3-36](#Fig36). This is a simple environment using sensor rays
    with continuous vector space observations. The agent is rewarded for every successful
    jump over the bigger cube (“wall”).'
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**墙跳环境** **:** 与 PushBlock 和金字塔环境类似，这里的智能体必须跳过墙壁才能到达目标（绿色位置），如图 [3-36](#Fig36)
    所示。这是一个使用传感器射线和连续向量空间观察的简单环境。智能体每次成功跳过更大的立方体（“墙壁”）都会获得奖励。'
- en: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig37_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig37_HTML.jpg)'
  id: totrans-288
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_3_Chapter/502041_1_En_3_Fig37_HTML.jpg](../images/502041_1_En_3_Chapter/502041_1_En_3_Fig37_HTML.jpg)'
- en: Figure 3-37
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-37
- en: Worm environment Unity ML Agents
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 蠕虫环境 Unity ML Agents
- en: '**Worm environment** **:** Similar to crawler, this joint-based agent resembles
    a worm that has to find green target cubes (food). It uses the similar policies
    of joint rotation and directions to calculate rewards and requires deep learning
    algorithms to train. Figure [3-37](#Fig37) shows a preview of the environment.'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**蠕虫环境** **:** 与爬行动物类似，这个基于关节的智能体类似于蠕虫，需要找到绿色的目标立方体（食物）。它使用类似的联合旋转和方向策略来计算奖励，并需要深度学习算法进行训练。图
    [3-37](#Fig37) 展示了环境的预览。'
- en: 'These are the various environments that are present inside the ML Agents Example
    folder. Needless to say, all these environments are very distinct and diverse
    in terms of observation-action space, rewards, environments, and adversaries.
    There are certain key points to note here:'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是 ML Agents 示例文件夹内存在的各种环境。不用说，这些环境在观察-动作空间、奖励、环境和对手方面都非常独特且多样化。以下是一些需要注意的关键点：
- en: With our current understanding of training ML Agents, we can train all the environments
    by using the “mlagents-learn” command and specifying the “yaml” file we would
    like to use as hyperparameters for the training. We can also visualize each of
    the training agents in TensorBoard.
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据我们对训练ML Agents的理解，我们可以通过使用“mlagents-learn”命令并指定我们希望用作训练超参数的“yaml”文件来训练所有环境。我们还可以在TensorBoard中可视化每个训练智能体。
- en: There are certain environments, such as crawler, walker, and worm, that rely
    on a joint-based physics system, and in these cases, deep RL algorithms such as
    DDPG, TRPO, PPO, and AC can be used over continuous vector observation space.
    These will be taken up separately in later chapters of advanced deep RL. The training
    here relies on the joint dynamics and vector directions.
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 某些环境，如crawler、walker和worm，依赖于基于关节的物理系统，在这些情况下，可以使用DDPG、TRPO、PPO和AC等深度强化学习算法在连续向量观察空间中进行。这些内容将在高级深度强化学习的后续章节中分别介绍。这里的训练依赖于关节动力学和向量方向。
- en: Competitive environments such as soccer and tennis rely heavily on minimax strategy
    or zero-sum game with deep RL. With that, in the case of tennis, we will also
    investigate how adversarial imitation learning can help the agent as well as explain
    the core concepts of curriculum learning.
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 竞争环境，如足球和网球，高度依赖于最小化策略或深度强化学习中的零和游戏。因此，在网球的情况下，我们还将研究对抗性模仿学习如何帮助智能体，并解释课程学习的基本概念。
- en: Standard environments, such as Bounce, PushBlock, WallJump, pyramid, and food
    collector, rely on ray-based sensor data as information of the observation space
    of vectors and then use the external brain and RL algorithms to train. This will
    be used as a starting point to create deep RL games in Unity ML Agents.
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准环境，例如Bounce、PushBlock、WallJump、金字塔和食物收集者，依赖于基于射线的传感器数据作为向量观察空间的信息，然后使用外部大脑和强化学习算法进行训练。这将成为在Unity
    ML Agents中创建深度强化学习游戏的一个起点。
- en: Computer vision and memory-based environments like GridWorld and hallway are
    very interesting, as these environments use Resnet models and deep convolution
    layers for retrieval of pixel information using the Unity camera. Then these are
    passed as continuous vector space observations to the brain or behavior scripts
    to make decisions. We also saw how LSTM-based memory networks play a significant
    role in the hallway environment and will be seeing it in later chapters.
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算机视觉和基于记忆的环境，如GridWorld和hallway，非常有趣，因为这些环境使用Resnet模型和深度卷积层通过Unity相机检索像素信息。然后这些信息作为连续向量空间观察传递给大脑或行为脚本以做出决策。我们还看到了基于LSTM的记忆网络在hallway环境中的重要作用，并在后续章节中会看到这一点。
- en: Summary
  id: totrans-298
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'With this we come to the end of this chapter, which mainly revolved around
    installing Unity ML Agents and other libraries and also providing a brief overview
    of the architecture of ML Agents, model training, and linking with the Tensorflow
    framework. To summarize:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 由此，我们来到了这一章的结尾，本章主要围绕安装Unity ML Agents和其他库，以及简要概述ML Agents的架构、模型训练和与Tensorflow框架的连接。总结如下：
- en: We installed Unity ML Agents from the Github repository as well as through the
    command line. We also had a glimpse of the “releases” link on Unity ML Agents.
    Installation from the Unity Package Manager was done, and we came to know about
    the importance of the “package.json” file.
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们从GitHub仓库以及通过命令行安装了Unity ML Agents，并且也瞥了一眼Unity ML Agents上的“发布”链接。通过Unity包管理器完成了安装，并了解了“package.json”文件的重要性。
- en: We then locally installed Unity ML Agents from PyPI as well as created virtual
    environments for robust CI/CD pipelines. Advanced installation was also conducted
    with the help of pip commands for “mlagents-envs.”
  id: totrans-301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，我们从PyPI本地安装了Unity ML Agents，并创建了用于健壮CI/CD管道的虚拟环境。还通过pip命令对“mlagents-envs”进行了高级安装。
- en: We understood the entire architecture of the fundamental components of ML Agents
    and how Unity C# SDK is linked to the Python API for deep learning models. We
    also installed Baselines from OpenAI and trained a deep Q-network. This will be
    helpful when we incorporate Baseline models in the Deep Reinforcement Learning
    chapter.
  id: totrans-302
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们理解了ML Agents的基本组件的整个架构以及Unity C# SDK如何与深度学习模型的Python API相连接。我们还安装了来自OpenAI的Baselines并训练了一个深度Q网络。这将在我们将Baseline模型纳入深度强化学习章节时有所帮助。
- en: The brain–academy architecture was visualized in depth with information regarding
    internal, heuristic, and external brains. The combination of brain and other hyperparameters
    are placed inside the academy, which also contains communicator objects. The communicator
    is responsible for linking ML Agents with the Python API for external training.
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们深入可视化了大脑-学院架构，其中包含了关于内部、启发式和外部大脑的信息。大脑和其他超参数的组合放置在学院内部，学院还包含通信对象。通信对象负责将ML
    Agents与外部训练的Python API连接起来。
- en: We saw the new architecture design of ML Agents version 1.0 having behavior
    parameters, decision requester, and model overrider scripts. We understood the
    behavior parameters to be analogous to the brain of the agents and the other two
    scripts as part of the academy.
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们看到了ML Agents 1.0版本的新架构设计，包括行为参数、决策请求器和模型覆盖脚本。我们将行为参数理解为代理的大脑，而其他两个脚本则是学院的一部分。
- en: Next we linked Tensorflow (port:5004) and TensorBoard (port:6006) with Unity
    ML Agents and trained the 3D Balls environment using the PPO algorithm. We used
    the “mlagents-learn” command and specified the “trainer_config.yaml” file, which
    contained the hyperparameters for training. We also saw the contents of the “yaml”
    file. We then linked TensorBoard with ML Agents to have a visualization of the
    rewards, loss, mean rewards, and time-steps of the training process.
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，我们将Tensorflow（端口：5004）和TensorBoard（端口：6006）与Unity ML Agents连接起来，并使用PPO算法训练了3D球环境。我们使用了“mlagents-learn”命令，并指定了“trainer_config.yaml”文件，其中包含了训练的超参数。我们还查看了“yaml”文件的内容。然后，我们将TensorBoard与ML
    Agents连接起来，以便可视化训练过程中的奖励、损失、平均奖励和时间步。
- en: After training, we then used the trained model as the Inference Model (internal
    brain) for the 3D Ball agent and played the scene in the Unity Editor. We created
    a simulation game with the trained model using the build option.
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练完成后，我们将训练好的模型作为推理模型（内部大脑）用于3D球代理，并在Unity编辑器中播放场景。我们使用构建选项使用训练好的模型创建了一个模拟游戏。
- en: In the last section, we saw the 15 different environments apart from “Basic”
    and “3D Ball” environments. Each environment was distinct and had its own behavior
    parameters and brains. We came to know curriculum learning, computer vision models
    as well as memory-based models in deep RL. We will look into each of these in
    the next chapters based on the topics.
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在最后一节中，我们看到了除了“基本”和“3D球”环境之外的15个不同环境。每个环境都是独特的，都有自己的行为参数和大脑。我们了解了课程学习、计算机视觉模型以及基于记忆的模型在深度强化学习中的应用。我们将根据这些主题在下一章中逐一探讨这些内容。
- en: With that, we come to the end of this chapter. In the next chapter we will be
    learning about the brain architecture in more details and will also create a simulation
    game with the same.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这些，我们就结束了这一章。在下一章中，我们将更详细地学习大脑架构，并使用相同的架构创建一个模拟游戏。
