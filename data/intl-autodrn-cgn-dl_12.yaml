- en: Summary
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: We have now reviewed the basic concepts to allow one to port a ROS1 system with
    a cognitive deep learning system to a rover platform. The Raspberry Pi 4 module
    will help us explore any environment (Egyptian catacombs) with genuine autonomy.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在已经回顾了基本概念，以便将一个带有认知深度学习系统的ROS1系统移植到无人车平台。树莓派4模块将帮助我们以真正的自主性探索任何环境（如埃及地下墓穴）。
- en: Review Exercises
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 复习练习
- en: 'Exercise 12.1: What differences are there between ROS1 and ROS2?'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 练习12.1：ROS1和ROS2之间有什么区别？
- en: 'Exercise 12.2: What would you need to do to make a legacy application from
    ROS1 work on ROS2?'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 练习12.2：为了使ROS1的遗留应用程序在ROS2上工作，你需要做什么？
- en: 'Exercise 12.3: Please look up experimental algorithmics on the internet and
    tell us how we can use them to optimize ROS applications on the Raspberry Pi 4?'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 练习12.3：请在互联网上查找实验算法学，并告诉我们我们如何使用它们来优化树莓派4上的ROS应用程序？
- en: 'Exercise 12.4: Are command-line tools in ROS2 a good inclusion? Please explain.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 练习12.4：ROS2中的命令行工具是否是一个好的包含？请解释。
