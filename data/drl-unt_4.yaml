- en: 4. Understanding brain agents and academy
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 理解大脑智能体和学院
- en: The brain architecture is an important aspect of the ML Agents Toolkit. In the
    previous chapter, we installed the ML Agents Toolkit and also learned briefly
    about this architecture. Internally the ML Agents Toolkit uses three different
    kinds of brains, with the addition of a player brain that is controlled by the
    user. We concern ourselves with understanding the inner workings of certain scripts
    in the ML Agents package, which uses the neural networks trained in Tensorflow
    in Unity Agents. Since we have tried to get a glimpse of deep Q-learning as the
    only deep RL algorithm as of now, we can also use this algorithm to train the
    brain of the agent. Whereas in Unity ML Agents, the default algorithm for the
    internal brain is proximal policy operation (PPO), which is robust and has a comfortable
    balance between ease of implementation, sample tuning, and complexity, we will
    explore different algorithms that will be used as the brain for the agent. In
    this section, we will have a deep insight into the brain architecture and all
    the associated C# scripts associated with it, including the different aspects
    of model training and hyperparameter tuning. We will be building games using ML
    Agents in Unity.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑架构是 ML Agents 工具包的一个重要方面。在前一章中，我们安装了 ML Agents 工具包，并简要了解了这一架构。内部，ML Agents
    工具包使用三种不同类型的大脑，并增加了由用户控制的玩家大脑。我们关注理解 ML Agents 包中某些脚本的内部工作原理，这些脚本使用在 Unity Agents
    中训练的 Tensorflow 神经网络。由于我们试图了解深度 Q-learning 作为目前唯一的深度强化学习算法，我们也可以使用此算法来训练智能体的大脑。而在
    Unity ML Agents 中，内部大脑的默认算法是近端策略优化（PPO），它稳健且在实现简便、样本调整和复杂性之间有舒适的平衡，我们将探索将被用作智能体大脑的不同算法。在本节中，我们将深入了解大脑架构及其所有相关的
    C# 脚本，包括模型训练和超参数调整的不同方面。我们将使用 Unity 中的 ML Agents 构建游戏。
- en: Before we dive into the associated scripts, let us recap certain aspects from
    the previous chapter where we emphasized the brain-academy architecture. Since
    the brain is primarily of three types—internal, heuristic, and external—we will
    concentrate mostly on certain aspects of the internal brain, which uses the Barracuda
    Inference Engine, and the xternal brain, which uses a communicator object to train
    the agent in real-time in Tensorflow. We mentioned the usage of certain scripts
    such as behavior parameters, which we will be exploring in-depth in this chapter.
    We would also look into how the engine configures itself when it is not connected
    to Python API via port 5004 for external training. The most important aspects
    of the brain architecture, in terms of C# scripts, are found in the Runtime folder
    under the “com.unity.ml-agents” package. The building blocks of the entire brain
    architecture, which uses several policies, relies on Inference Engine, sensors,
    communicators, demonstrators, and model loaders. Each of these parts constitute
    a separate functionality for the brain, such as the Inference Engine, which helps
    to run trained Tensorflow models in Unity. Since all these components are C# scripts,
    the brain architecture can be visualized as shown in Figure [4-1](#Fig1).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入相关脚本之前，让我们回顾一下前一章中的一些方面，我们在那里强调了大脑-学院架构。由于大脑主要分为三种类型——内部、启发式和外部——我们将主要关注内部大脑的某些方面，它使用
    Barracuda 推理引擎，以及外部大脑，它使用通信对象在 Tensorflow 中实时训练智能体。我们提到了某些脚本的用法，例如行为参数，我们将在本章中深入探讨。我们还将研究当引擎未通过端口
    5004 连接到 Python API 进行外部训练时，它是如何配置自己的。从 C# 脚本的角度来看，大脑架构最重要的方面可以在“com.unity.ml-agents”包下的“Runtime”文件夹中找到。整个大脑架构的构建块，它使用多个策略，依赖于推理引擎、传感器、通信器、演示者和模型加载器。这些部分的每一个都构成了大脑的一个独立功能，例如推理引擎，它有助于在
    Unity 中运行训练好的 Tensorflow 模型。由于所有这些组件都是 C# 脚本，大脑架构可以如图 [4-1](#Fig1) 所示进行可视化。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig1_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig1_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig1_HTML.jpg)'
- en: Figure 4-1
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-1
- en: Parts of the brain architecture in Unity ML Agents
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 中大脑架构的部分
- en: The sensors are the most important aspects of the brain architecture, as it
    controls the observation space required by the agent to make its decision and
    choose its action. The sensors are physics rays, which collect information in
    the form of discrete and continuous vectors, and these are used in the model training
    part. The sensor data is then used by the policies that control the deep RL algorithms,
    like PPO and (soft actor critic) SAC, of Unity ML Agents. The policies along with
    the communicator are associated with the external brain. The external brain is
    trained in Tensorflow in run-time, like we trained our model in the last chapter.
    The demonstrations are a different set of algorithms that rely on imitation learning
    and behavioral cloning, and these too rely on sensor data. Through the communicator,
    the demonstrations can be trained as a sampled heuristic/external brain, which
    implements the family of imitation learning. Then we have the Inference Engine,
    which is used for the pretrained models. The Inference Engine receives the trained
    vector of observations/actions space. This is then used as the internal brain.
    The Inference Engine also has a choice to use sensor data processed using the
    deep RL algorithms in the policies as well as the observed data from the pretrained
    models. This final neural network model that is stored can be used for real-time
    game play in Unity. Now that we understand the important aspects of the brain,
    let us get into the details of its implementation as well as the communication
    with different Python APIs.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 传感器是大脑架构中最重要的方面，因为它控制着智能体进行决策和选择行动所需观察的空间。传感器是物理射线，以离散和连续向量的形式收集信息，并在模型训练部分中使用。传感器数据随后被控制深度强化学习算法（如PPO和（软演员评论家）SAC）的策略所使用，这些算法属于Unity
    ML Agents。策略与通信者相关联，并与外部大脑相连。外部大脑在Tensorflow中运行时进行训练，就像我们在上一章中训练我们的模型一样。演示是一组不同的算法，这些算法依赖于模仿学习和行为克隆，它们也依赖于传感器数据。通过通信者，演示可以训练为采样的启发式/外部大脑，这实现了模仿学习的一组方法。然后我们有推理引擎，它用于预训练模型。推理引擎接收训练好的观察/行动空间向量。这随后用作内部大脑。推理引擎还有一个选择，即使用策略中通过深度强化学习算法处理的传感器数据以及来自预训练模型的观察数据。这个存储的最终神经网络模型可以用于Unity中的实时游戏。现在我们了解了大脑的重要方面，让我们深入了解其实现细节以及与不同Python
    API的通信。
- en: Understanding the Architecture of the Brain
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解大脑架构
- en: 'To understand the different aspects of the brain architecture, we will try
    to understand the C# scripts associated with it. Since the sensors play a significant
    part in collecting observations for the agent, we will be discussing the different
    types of sensors that we can use in our scenes. The sensors are physics rays and
    are used for collecting observations when they collide with another GameObject
    in the scene. These control the distribution of the observation space, whether
    it will be discrete or continuous. We will explore the different types of sensors
    used for getting the observations required for the ML Agents training phase. This
    sensor data is then encoded to produce a tensor, such as one-hot encoding technique,
    and then passed on to deep learning layers for different policies. Inside the
    sensors folder, there are several types of sensors that are used by ML Agents:
    camera sensor, ray sensor, ray perception 2D sensor, and many others. Each sensor
    type has unique attributes, and we will be exploring all of these in this section.
    Then we will be looking into the policies that contain the training algorithms
    for deep RL. This will also contain the fundamental script of the brain architecture
    that we studied briefly in the Chapter [3](502041_1_En_3_Chapter.xhtml), the behavior
    parameters C# script. We will also be exploring the inference module in-depth
    to understand how Barracuda performs inference for the Internal brain during running
    of the pretrained model.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解大脑架构的不同方面，我们将尝试理解与之相关的 C# 脚本。由于传感器在收集智能体观察数据方面起着重要作用，我们将讨论我们可以在场景中使用的不同类型的传感器。传感器是物理光线，当它们与场景中的另一个
    GameObject 发生碰撞时用于收集观察数据。这些传感器控制观察空间的分布，决定它将是离散的还是连续的。我们将探讨用于获取 ML Agents 训练阶段所需观察的不同类型的传感器。然后，这些传感器数据将被编码以生成张量，例如使用
    one-hot 编码技术，然后传递给用于不同策略的深度学习层。在传感器文件夹中，有几种传感器类型被 ML Agents 使用：摄像头传感器、光线传感器、2D
    光线感知传感器，以及许多其他传感器。每种传感器类型都有独特的属性，我们将在本节中探讨所有这些属性。然后，我们将研究包含深度强化学习训练算法的策略。这还将包含我们在第
    [3](502041_1_En_3_Chapter.xhtml) 章节中简要研究的大脑架构的基本脚本，即行为参数 C# 脚本。我们还将深入探讨推理模块，以了解
    Barracuda 在预训练模型运行期间如何对内部大脑进行推理。
- en: Sensors
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传感器
- en: Sensors are the most important aspects in the entire ML Agents Toolkit package.
    This contains the observation space and controls the distribution of the space.
    Depending on these observations, the agent has to choose a policy and perform
    an action. These sensors are essentially ray sensors from the Physics Engine of
    Unity and collect information upon colliding with a tagged prefab. First we will
    look into the ISensor.cs script, as it contains the main methods that will be
    used by ray sensors as well as camera sensors. We will then look into some of
    the different sensor variants that are present in this folder. Essentially the
    pipeline of using sensors for collection of observations can be visualized as
    shown in Figure [4-2](#Fig2).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 传感器是整个 ML Agents 工具包中最重要的方面。这包含观察空间并控制空间的分布。根据这些观察结果，智能体必须选择策略并执行动作。这些传感器本质上是从
    Unity 物理引擎中的光线传感器，在碰撞到标记的预制体时收集信息。首先，我们将查看 ISensor.cs 脚本，因为它包含将被光线传感器和摄像头传感器使用的主要方法。然后，我们将查看这个文件夹中存在的一些不同传感器变体。本质上，使用传感器收集观察数据的流程可以如图
    [4-2](#Fig2) 所示进行可视化。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig2_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig2_HTML.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig2_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig2_HTML.png)'
- en: Figure 4-2
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-2
- en: Sensors in Unity ML Agents
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 中的传感器
- en: '**ISensor:** The ISensor is an interface containing all the function declarations
    that are to be used for the different sensors in ML Agents. It contains functions
    that affect the camera sensor by changing the data type of the visual observations
    as well as the ray sensors by modifying the type of ray casts (2D or 3D). The
    ISensor script starts with an enum that defines the possibilities of storing visual
    information collected from camera sensors, whether it will be in the form of float
    arrays or in PNG format (binary format).'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**ISensor:** ISensor 是一个接口，包含用于 ML Agents 中不同传感器的所有函数声明。它包含影响摄像头传感器的函数，通过改变视觉观察数据的数据类型以及通过修改光线投射类型（2D
    或 3D）来影响光线传感器。ISensor 脚本以一个枚举开始，定义了从摄像头传感器收集的视觉信息的存储可能性，它可以是浮点数组的形式，也可以是 PNG 格式（二进制格式）。'
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The next segment has a method, “GetObservationShape,” which controls the size
    of the observation space that will be used in RayPerceptionSensor script. As an
    example, in the case of ray sensors, if the sensor is observing the velocity vector
    of a RigidBody then its dimensions will be of size 3 (x, y, and z axes). However,
    in the case of a camera sensor, if an RGB pixel image is used, then the observation
    space would be 5 (height, width, and three channels for RGB). The latter will
    be discussed in detail how when we discuss how convolution neural networks (Conv2D)
    will be helpful in training these sampled images from the camera sensor. It also
    has a method, “Write,” which writes the observations to the output container (array).
    The “GetCompressedObservation” method is useful for compressing the output array
    of results when the dimensions or the size of the output is considerably large.
    Apart from these, there are also “Update” and “Reset” methods, which specify the
    internal states of the sensor. The “Update” method updates the sensors at each
    decision taken by the agent, while the “Reset” method is triggered at the end
    of each episode of the agent. There are also “GetCompressionType” and “GetName”
    methods, which control the compression type and provide a deterministic sorted
    order of the sensors across all the agents, respectively .
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分有一个名为“GetObservationShape”的方法，它控制了RayPerceptionSensor脚本中将使用的观察空间的大小。例如，在光线传感器的情况下，如果传感器正在观察刚体的速度向量，那么其维度大小将是3（x、y和z轴）。然而，在相机传感器的情况下，如果使用RGB像素图像，那么观察空间将是5（高度、宽度和RGB的三个通道）。关于后者，我们将在讨论卷积神经网络（Conv2D）如何帮助训练从相机传感器中采样的图像时进行详细讨论。它还有一个名为“Write”的方法，用于将观察写入输出容器（数组）。当输出维度或大小相当大时，“GetCompressedObservation”方法对于压缩结果数组的输出非常有用。除此之外，还有“Update”和“Reset”方法，它们指定了传感器的内部状态。“Update”方法在代理每次做出决策时更新传感器，而“Reset”方法在代理的每个回合结束时触发。还有“GetCompressionType”和“GetName”方法，分别控制压缩类型并提供所有代理中传感器的确定性排序顺序。
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'It also contains helper functions inside the “SensorExtensions” class, which
    provides the number of elements in ISensor’s observation space. This involves
    multiplying the shape elements of each input observation space as provided here:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 它还包含在“SensorExtensions”类中的辅助函数，该类提供了ISensor观察空间中的元素数量。这涉及到将每个输入观察空间的形状元素相乘，如下所示：
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: That completes the ISensor interface script. and we will explore how this script
    is being used in camera and ray sensors for creating the observation space of
    the agent. Let us understand the ray sensors, and then we will explore the camera
    sensors .
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了ISensor接口脚本。接下来，我们将探讨这个脚本如何在相机和光线传感器中被使用，以创建代理的观察空间。让我们先了解光线传感器，然后我们将探讨相机传感器。
- en: Ray Sensors
  id: totrans-21
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 光线传感器
- en: '**RayPerceptionSensor** **:** The first sensor that is important in the context
    of ML Agents is the RayPerceptionsensor.cs script, which is present inside the
    Runtime folder under “com.unity.ml-agents” package. This sensor essentially controls
    the dimensions 2D or 3D, in which the rays will be cast. This is done by the following
    lines:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**RayPerceptionSensor** **:** 在机器学习代理的上下文中，第一个重要的传感器是RayPerceptionsensor.cs脚本，该脚本位于“com.unity.ml-agents”包下的Runtime文件夹中。这个传感器本质上控制着光线将被投射的2D或3D维度。这是通过以下几行代码实现的：'
- en: '[PRE3]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '“RayPerceptionCastType ” contains the type of the cast ray. The next part contains
    a data structure (struct) that contains the details that are contained inside
    “RayPerceptionInput” sensor. It contains details such as ray length, collision
    detection, offset, radius of cast, layer mask, angles, cast type, and transform.
    The layer mask is an important attribute, as it allows the ray to pass through
    certain layers to detect objects that are present in other layers. The offset
    allows the ray to be cast at a distance of a few units from the source. The collision
    detection attribute is used for checking whether the ray sensor has collided with
    the tagged object. The angle controls the direction of the rays, and generally
    90 degrees is considered as the “forward” direction with respect to the object.
    The cast type is from the “RayPerceptionCastType” enum, which controls whether
    it is 2D or 3D. The transform signifies the positional transform of the object
    from which the ray is triggered: the agent. The cast radius determines the radius
    for spherical raycast, and generally if 0 or less value is provided, it signifies
    normal rays.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: “RayPerceptionCastType”包含射线的类型。下一部分包含一个数据结构（struct），其中包含“RayPerceptionInput”传感器内部的详细信息。它包含诸如射线长度、碰撞检测、偏移、射线投射半径、层掩码、角度、投射类型和变换等详细信息。层掩码是一个重要的属性，因为它允许射线穿过某些层来检测其他层中存在的对象。偏移允许射线从源点几单位距离处发射。碰撞检测属性用于检查射线传感器是否与标记的对象发生碰撞。角度控制射线的方向，通常90度被认为是相对于对象的“前方”方向。投射类型来自“RayPerceptionCastType”枚举，它控制是否是2D或3D。变换表示从触发射线的对象的位置变换：代理。投射半径决定了球形射线投射的半径，通常如果提供0或更小的值，表示正常射线。
- en: '[PRE4]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'There are certain methods inside this class, such as the “OutputSize” method,
    that control the size of the sensors. This size forms the size of the observation
    space, which is required by the behavior parameters script. This is presented
    as:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个类中，有一些方法，如“OutputSize”方法，控制传感器的大小。这个大小形成了观察空间的大小，这是行为参数脚本所必需的。这表示为：
- en: '[PRE5]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: where the “DetectableTags.Count” controls the number of tagged GameObjects in
    the scene that the ray sensor from the agent can detect. The “Angle.Count” attribute
    returns the number of the different angles of the sensor rays that are fired from
    the agent.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，“DetectableTags.Count”控制场景中标记的GameObject的数量，该数量可以被代理的射线传感器检测到。“Angle.Count”属性返回从代理发射的传感器射线的不同角度的数量。
- en: We will next understand other methods, such as “PolarToCartesian3D” and “PolarToCartesian2D.”
    These methods are useful for converting the ray transforms from polar coordinates
    in the Unity scene to Cartesian coordinates. Essentially this transforms the rays
    from local space to world space. The world space coordinates are then used for
    analyzing which detectable GameObjects the sensor rays hit. This can be done by
    using sine and cosine transforms of the transform positions. Diagrammatically
    this is shown in Figure [4-3](#Fig3).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将了解其他方法，例如“PolarToCartesian3D”和“PolarToCartesian2D”。这些方法将Unity场景中极坐标的射线转换转换为笛卡尔坐标。本质上，这把射线从局部空间转换到世界空间。然后使用世界空间坐标来分析传感器射线击中的可检测GameObject。这可以通过使用变换位置的正弦和余弦变换来完成。图示见[图4-3](#Fig3)。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig3_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig3_HTML.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig3_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig3_HTML.png)'
- en: Figure 4-3
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-3
- en: Polar to Cartesian conversion of an n-D ray
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: n维射线的极坐标到笛卡尔坐标转换
- en: The “radius” signifies the ray length in polar coordinates. The concerned axes
    here in Unity are the x and z axes. For our reference, we consider the x axis
    as the horizontal plane and z axis as the vertical one. This is represented by
    the axes in the circle at 90 degrees apart. If the angle of the sensor ray is
    “A” with respect to the x axis, then the corresponding ray length along the x
    axis is “radius*cos(A),” and along the vertical z axis “radius*sin(A).” Now let
    us explore the 2D ray conversion in the “PolarToCartesian2D” method. This is very
    important, as we will be using angles to specify the gap between the rays in our
    scene.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: “半径”在极坐标中表示射线长度。在Unity中，相关的轴是x轴和z轴。为了便于参考，我们将x轴视为水平面，z轴视为垂直面。这由圆圈中90度间隔的轴表示。如果传感器射线的角度“A”相对于x轴，那么沿x轴的对应射线长度是“radius*cos(A)”，沿垂直的z轴是“radius*sin(A)”。现在让我们探索“PolarToCartesian2D”方法中的2D射线转换。这非常重要，因为我们将在场景中使用角度来指定射线之间的间隔。
- en: '[PRE6]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'In the case of 2D ray sensor conversion, we consider mutually perpendicular
    x and y axes. If we compare this with our previous diagram, the x axis is the
    horizontal line, and the y is the vertical line. The angle is converted to radians
    for sin and cosine angle calculation. Similarly if we look into the 3D counterpart:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在2D射线传感器转换的情况下，我们考虑相互垂直的x和y轴。如果我们将其与之前的图进行比较，x轴是水平线，y轴是垂直线。角度被转换为弧度，用于正弦和余弦角度计算。类似地，如果我们查看3D的对应部分：
- en: '[PRE7]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: In this case we have x-z as the mutually perpendicular axes, with y axis as
    0\. This is the part that we will be using in our scenes. For the next part, we
    have the “RayExtents” method, which controls the coordinates of the hitpoint of
    the sensor rays. This also estimates the distance from the ray source to the ray
    sensor and uses the polar to coordinate conversion to do this computation. Also
    here, we have the cases that decide if the ray is in 2D or in 3D.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们以x-z轴作为相互垂直的轴，y轴为0。这是我们将在场景中使用的部分。对于下一部分，我们有“RayExtents”方法，它控制传感器射线的击中点坐标。这还估计了射线源到射线传感器之间的距离，并使用极坐标转换来完成此计算。此外，这里还有决定射线是在2D还是3D中的情况。
- en: '[PRE8]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The next part contains the class “RayPerceptionOutput,” which controls the different
    outcomes if the sensor ray has hit a tagged object. Inside this class, there is
    a struct “RayOutput” that contains several attributes such as “HasHit,” ”HitTaggedObject,”
    ”HitTagIndex,” and “HitFraction.” These contain the details about whether the
    sensor ray has hit the concerned object, the tag of the hit object, the index
    of the object’s tag in the DetectableTags in the list (-1 if anything else was
    hit or nothing was specified), and the normalized distance to hit the object,
    respectively.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 下一部分包含名为“RayPerceptionOutput”的类，它控制传感器射线击中标记对象时的不同结果。在这个类中，有一个名为“RayOutput”的结构体，它包含多个属性，如“HasHit”、“HitTaggedObject”、“HitTagIndex”和“HitFraction”。这些属性包含有关传感器射线是否击中相关对象、击中对象的标签、对象标签在列表DetectableTags中的索引（如果击中其他任何内容或未指定，则为-1），以及击中对象的归一化距离的详细信息。
- en: '[PRE9]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'The “ToFloatArray” method writes the ray output information to a subset of
    the float array. The list contains the observation data, which can be the following:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: “ToFloatArray”方法将射线输出信息写入浮点数数组的子集。该列表包含观测数据，可以是以下内容：
- en: One-hot encoding data for the detectable tags. If “DetectableTags.Length” equals
    “n,” the first n elements of the list will be a one-hot-encoding of the detectable
    tag that was hit or 0 if nothing was hit.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可检测标签的一热编码数据。如果“DetectableTags.Length”等于“n”，则列表的前n个元素将是被击中的可检测标签的一热编码，如果没有击中，则为0。
- en: “numDetectableTags” will be set to 1 if the sensor ray missed everything or
    0 if it hit something (either “detectable” or not).
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “numDetectableTags”将在传感器射线错过所有内容时设置为1，或者在它击中某些内容（无论是“可检测”的还是不是）时设置为0。
- en: “numDetectableTags + 1” signifies the normalized distance if the object was
    hit or 1.0 if nothing was hit.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “numDetectableTags + 1”表示如果物体被击中，则为归一化距离，如果没有击中，则为1.0。
- en: There is also a float buffer array that controls the size of the output buffer,
    given by (numDetectableTags+2) * RayOutputs.Length.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 还有一个控制输出缓冲区大小的浮点缓冲区数组，大小为(numDetectableTags+2) * RayOutputs.Length。
- en: '[PRE10]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: There is an internal class called “DebugDisplayInfo” that is used for debugging
    the attributes of the drawn sensor ray on the screen and also shows the frame
    rates. It also displays the information whenever the ray hits any detectable tag
    and is used by the “RayPerceptionsensorComponent.”
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 存在一个名为“DebugDisplayInfo”的内部类，用于在屏幕上调试绘制的传感器射线的属性，并显示帧率。它还在射线击中任何可检测标签时显示信息，并由“RayPerceptionsensorComponent”使用。
- en: '[PRE11]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The next part is the implementation of the ray sensors, which inherits from
    the ISensor component. There are instantiated objects of “RayPerceptionInput”
    class and “DebugDisplayInfo” class. The public function RayPerceptionSensor sets
    the objects of the classes with initialized values and assigns sensor ray inputs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 下一部分是射线传感器的实现，它继承自ISensor组件。这里实例化了“RayPerceptionInput”类和“DebugDisplayInfo”类的对象。公共函数RayPerceptionSensor使用初始化值设置类的对象，并分配传感器射线输入。
- en: '[PRE12]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The “SetNumObservations” method details the sizes of the observation array for
    the sensors. The “SetRayPerceptionInput” method checks whether the number of detectable
    tags, and the sensor rays are modified at runtime. It also checks if the size
    of the “RayPerceptionInput” array is the same as the “rayInput” array. This signifies
    that all the shapes related to sensor ray arrays are consistent and not modified
    at runtime.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: “SetNumObservations”方法详细说明了传感器观察数组的尺寸。“SetRayPerceptionInput”方法检查在运行时是否修改了可检测标签的数量和传感器射线。它还检查“RayPerceptionInput”数组的尺寸是否与“rayInput”数组相同。这表明与传感器射线数组相关的所有形状都是一致的，并且在运行时没有修改。
- en: '[PRE13]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The next part writes the observations by collecting information from the collision
    of the sensor ray with the detectable objects. First it collects the information
    regarding the number of sensor rays fired from the agent and the detectable tags
    in the scene. If there is an inconsistency in the shape of the associated sensor
    arrays, it resets the information and resizes the buffer. Then it uses the “PerceiveSingleRay”
    method to trigger the casting of the ray and write the information to the buffer.
    The output of the cast is then written to the “rayOutput” array, which is an object
    of the “RayPerceptionOutput” class. It also returns the observation array length.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 下一部分通过收集传感器射线与可检测对象的碰撞信息来写入观察结果。首先它收集有关从代理发射的传感器射线和场景中的可检测标签数量的信息。如果关联的传感器数组形状不一致，它将重置信息并调整缓冲区大小。然后它使用“PerceiveSingleRay”方法触发射线的投射并将信息写入缓冲区。投射的输出随后写入“rayOutput”数组，该数组是“RayPerceptionOutput”类的一个对象。它还返回观察数组长度。
- en: '[PRE14]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We then address the “PerceiveSingleRay” static method . It takes an object of
    the “RayPerceptionInput” class, “rayIndex,” which is the index of the particular
    ray in the ray array, and the DebugDisplayInfo object. It then assigns the variables
    such as ray length, cast radius, extents, start and end position, and direction
    of the ray. However, if the scale is not the same as the scale used in Unity,
    then the absolute value of the “rayDirection” variable will be different from
    “rayLength.” There are also attributes that can transform the ray length for different
    cast lengths and hit fraction and also scale up or down the sphere or circle radius
    of the cast rays. There are also provisions to avoid division with 0 in case the
    unscaled ray length is 0.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来处理“PerceiveSingleRay”静态方法。该方法接受一个“RayPerceptionInput”类的对象，即“rayIndex”，它是射线数组中特定射线的索引，以及DebugDisplayInfo对象。然后它分配变量，如射线长度、投射半径、范围、起始和结束位置以及射线的方向。然而，如果比例与Unity中使用的比例不同，则“rayDirection”变量的绝对值将与“rayLength”不同。还有一些属性可以转换不同投射长度的射线长度，以及调整投射射线的球体或圆半径。还有预防措施以避免在未缩放的射线长度为0时进行除法。
- en: '[PRE15]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The next portion of the code segment checks whether the cast of the ray input
    ID of type 2D or 3D. It then checks if the cast radius is greater than 0, which
    signifies whether it will be a spherical cast or a ray cast. Then it uses the
    “Physics.RayCast” or “Physics.SphereCast” accordingly to fire the rays. It then
    checks whether the scaled ray length is 0 and also has checks to avoid division
    by 0.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 代码段的下一段检查射线输入ID的类型是2D还是3D。然后它检查投射半径是否大于0，这表示它将是一个球形投射还是射线投射。然后它根据情况使用“Physics.RayCast”或“Physics.SphereCast”来发射射线。然后它检查缩放后的射线长度是否为0，并且有检查以避免除以0。
- en: '[PRE16]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: After it has hit the target detectable tags, it uses the “CompareTag” method
    and assigns the “HitTagIndex” with the proper index of the hit target. It also
    computes the hit fraction and other attributes of the RayPerceptionOutput object.
    Once it has hit a detectable object, the loop breaks. Finally it assigns the worldStart,
    worldEnd, rayOuput, and castRadius variables with the computed values and returns
    the output ray to the “Write” method.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在击中目标可检测标签后，它使用“CompareTag”方法并将“HitTagIndex”分配给击中目标的正确索引。它还计算RayPerceptionOutput对象的击中分数和其他属性。一旦击中一个可检测对象，循环就会中断。最后，它将worldStart、worldEnd、rayOuput和castRadius变量分配给计算值，并将输出射线返回到“Write”方法。
- en: '[PRE17]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: However, the “Write” method also uses the “Perceive” method to call the “PerceoveSingleRay”
    method. This “Perceive” method takes the ray input array and the angles associated
    with the rays as input and passes them to the “PerceiveSingleRay” method to get
    the array of ray outputs and detectable tags. Then it is passed to the “Write”
    method to be written as the observation space.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，“Write” 方法也使用 “Perceive” 方法来调用 “PerceoveSingleRay” 方法。这个 “Perceive” 方法接收射线输入数组和与射线相关的角度作为输入，并将它们传递给
    “PerceiveSingleRay” 方法以获取射线输出数组和可检测标签。然后，它被传递给 “Write” 方法以作为观察空间写入。
- en: '[PRE18]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: That completes the RayPerceptionsensor script, and it is the most important
    script that controls the rays being fired by the agent to get the observations
    of the detectable tags. The workflow of the RayPerceptionsensor script is shown
    in Figure [4-4](#Fig4).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这就完成了 RayPerceptionsensor 脚本，它是控制代理发射的射线以获取可检测标签观察的最重要脚本。RayPerceptionsensor
    脚本的工作流程如图 [4-4](#Fig4) 所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig4_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig4_HTML.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig4_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig4_HTML.jpg)'
- en: Figure 4-4
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-4
- en: “RayPerceptionSensor” script workflow
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: “RayPerceptionSensor” 脚本工作流程
- en: There are variants of this script used for 2D ray perception as well as for
    3D ray perception, which we will look into.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本有用于 2D 射线感知和 3D 射线感知的变体，我们将在后面探讨。
- en: '**RayPerceptionSensorComponent2D** **:** This script is used for adding the
    2D ray perception sensor component to an agent in a scene. It also declares the
    cast type as 2D and uses the “Physics.2D” module to cast the rays. Though it uses
    the RayPerceptionSensorComponentBase.cs script for its properties, the latter
    uses RayPerceptionSensor script internally. So all the functionalities like drawing
    spherical/ray casts along with perception of a single ray are done with the help
    of the RayPerceptionSensor script, which we discussed in the previous section.
    This script particularly declares that the type of the ray cast is 2D and can
    be added as a component in the Inspector Window against a particular agent.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**RayPerceptionSensorComponent2D** **:** 此脚本用于将 2D 射线感知传感器组件添加到场景中的代理。它还声明了类型为
    2D 的投射类型，并使用 “Physics.2D” 模块进行投射。尽管它使用 RayPerceptionSensorComponentBase.cs 脚本来声明其属性，但后者内部使用
    RayPerceptionSensor 脚本。因此，所有像绘制球形/射线投射以及感知单个射线这样的功能都是通过 RayPerceptionSensor 脚本完成的，我们已在上一节中讨论过。此脚本特别声明射线投射的类型为
    2D，并可以作为组件添加到特定代理的检查器窗口中。'
- en: '[PRE19]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '**RayPerceptionSensorComponent3D** **:** This is similar to the 2D component,
    except that here 3D cast type is used for the rays. Initially there is an offset
    provided to the start and end positions of the ray, as mentioned in the “StartVerticalOffset”
    and “EndVerticalOffset” methods. This script inherits from the “RayPerceptionSensorComponentBase”
    script. The offset declarations are declared as follows:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**RayPerceptionSensorComponent3D** **:** 这与 2D 组件类似，但这里使用 3D 投射类型进行射线投射。最初，射线起始位置和结束位置提供了偏移量，如
    “StartVerticalOffset” 和 “EndVerticalOffset” 方法中所述。此脚本从 “RayPerceptionSensorComponentBase”
    脚本继承。偏移声明如下：'
- en: '[PRE20]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: The next code segment contains the type of the cast and assigns the values for
    the StartVerticalOffset and EndVerticalOffset variables .
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个代码段包含类型转换，并为 StartVerticalOffset 和 EndVerticalOffset 变量赋值。
- en: '[PRE21]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '**SensorComponent** **:** This is a variant of the ISensor script, which is
    for the Unity Editor. For simplicity, a particular ISensor implementation should
    have a corresponding SensorComponent to build it. Internally it calls the different
    methods of the “ISensor” script, which is triggered when the agent starts to create
    ray sensors or camera sensors. The methods—“GetObservationShape” and ”isVisual”—involve
    getting the observation shape of the sensor vector, checking whether the sensor
    type is visual (has five parameters) or a 3D vectorized attribute (example: velocity/position
    of RigidBody, which has three parameters,) respectively. The method “isVector”
    controls whether the output shape of the observation is vectorized or not (discrete
    or continuous).'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**SensorComponent** **:** 这是 ISensor 脚本的变体，用于 Unity 编辑器。为了简单起见，特定的 ISensor
    实现应该有一个相应的 SensorComponent 来构建它。内部它调用 “ISensor” 脚本的不同方法，当代理开始创建射线传感器或摄像头传感器时被触发。方法
    “GetObservationShape” 和 “isVisual” 分别用于获取传感器向量的观察形状，检查传感器类型是否为视觉（具有五个参数）或 3D 向量化属性（例如
    RigidBody 的速度/位置，具有三个参数）。方法 “isVector” 控制观察输出的形状是否向量化（离散或连续）。'
- en: '[PRE22]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '**RayPerceptionSensorComponentBase** **:** This script internally uses the
    functionality of the RayPerceptionSensor script and inherits from the SensorComponent
    script. This script is called when we assign a “RayPerceptionSensorComponent2D”
    or RayPerceptionSensorComponent3D component to our agent in the scene. It has
    the name of the sensor, which defaults to “RayPerceptionSensor.”'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**RayPerceptionSensorComponentBase** **:** 此脚本内部使用 RayPerceptionSensor 脚本的功能，并继承自
    SensorComponent 脚本。当我们在场景中将“RayPerceptionSensorComponent2D”或 RayPerceptionSensorComponent3D
    组件分配给我们的代理时，会调用此脚本。它具有传感器的名称，默认为“RayPerceptionSensor”。'
- en: '[PRE23]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: There are certain important attributes of this script that controls the sphere
    cast radius, ray length, and angles. It defaults to an angle of 70 degrees between
    the rays fired from the agent; greater than 90 degrees would allow the rays to
    go behind the object and at 90 degrees would be strictly restricted to left and
    right. The default sphere cast radius is 0.5 float units, and the default ray
    length is 20 float units. It controls the number of rays fired per direction and
    defaults to three (left, right, and center). It lists the detectable tags that
    the sensor rays can detect and the layer mask that signifies which layers the
    ray can pass through.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本有一些重要的属性，控制球体投射半径、射线长度和角度。默认情况下，从代理发射的射线之间的角度为 70 度；大于 90 度将允许射线穿过物体，而 90
    度将严格限制为左右。默认的球体投射半径为 0.5 浮点单位，默认的射线长度为 20 浮点单位。它控制每个方向发射的射线数量，默认为三个（左、右和中心）。它列出了传感器射线可以检测到的可检测标签以及表示射线可以穿透哪些层的层掩码。
- en: '[PRE24]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: It also contains observation stacks, which signifies how many observations we
    would want to stack and pass it to the neural network (defaults to 1, signifying
    that no previous observations would be used for neural network training). It has
    other attributes, such as ray hit color, miss color, ray cast type (2D/3D), and
    start and end offset positions (inherited from the SensorComponent script). All
    of these components are editable in the Inspector Window when we will be assigning
    our RayPerceptionSensorComponent3D component/script to our agent in Unity in a
    later section.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 它还包含观察堆栈，表示我们希望堆叠多少个观察结果并将其传递给神经网络（默认为 1，表示不会使用之前的观察结果进行神经网络训练）。它还具有其他属性，例如射线击中颜色、未击中颜色、射线投射类型（2D/3D）以及起始和结束偏移位置（从
    SensorComponent 脚本继承）。当我们将在 Unity 中将 RayPerceptionSensorComponent3D 组件/脚本分配给我们的代理时，所有这些组件都可以在检查器窗口中编辑。
- en: '[PRE25]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: The “CreateSensor” method overrides the “ISensor” script and initializes the
    sensor by using the methods in the “RayPerceptionSensor” script. It also stacks
    the observations if a value greater than 1 is used.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: “CreateSensor”方法覆盖了“ISensor”脚本，并使用“RayPerceptionSensor”脚本中的方法初始化传感器。如果使用大于 1
    的值，它还会堆叠观察结果。
- en: '[PRE26]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The next code segment contains the GetRayAngles float array method, which returns
    the angles of the sensor rays and the number of rays in each direction. The angular
    range between each ray is in arithmetic progression with a spacing of “delta.”
    The delta variable is calculated by dividing the maximum ray angle with the value
    of the number of rays in each direction. Then it interpolates the rays in the
    form of { 90, 90 - delta, 90 + delta, 90 - 2*delta, 90 + 2*delta }.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个代码段包含了 GetRayAngles float 数组方法，该方法返回传感器射线的角度和每个方向上的射线数量。每条射线之间的角度范围以“delta”为间隔呈算术级数。delta
    变量是通过将最大射线角度除以每个方向上的射线数量来计算的。然后它以 { 90, 90 - delta, 90 + delta, 90 - 2*delta,
    90 + 2*delta } 的形式插值射线。
- en: '[PRE27]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: The next segment is GetObservationShape, which also overrides the same method
    from the “RayPerceptionSensor” and governs the number of detectable tags and number
    of rays, stack size of observations, and observation size.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分是 GetObservationShape，它也覆盖了来自“RayPerceptionSensor”的相同方法，并控制可检测的标签数量、射线数量、观察的堆栈大小和观察大小。
- en: '[PRE28]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: In the last section of the segment, the “GetRayPerceptionInput” method is overridden
    and all the variables are assigned according to the “RayPerceptionInput” struct
    (structure), which we discussed before.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在段落的最后部分，重写了“GetRayPerceptionInput”方法，并将所有变量分配给之前讨论过的“RayPerceptionInput”结构（结构）。
- en: '[PRE29]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: The “OnDrawGizmosSelectedMethod” script takes the input ray and calls the “PerceiveSingleRay”
    function from “RayPerceptionSensor” script for each of the rays along different
    directions. Depending on whether the rays are null or not , the color of the rays
    are displayed. Older observations are displayed in a lighter shade so as to de-emphasize
    the current training episode.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: “OnDrawGizmosSelectedMethod”脚本接受输入射线，并对沿不同方向的每个射线调用“RayPerceptionSensor”脚本中的“PerceiveSingleRay”函数。根据射线是否为空，显示射线的颜色。较旧的观察结果以较浅的色调显示，以减少当前训练阶段的强调。
- en: '[PRE30]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: The “DrawRaycastGizmos” method uses the DisplayDebugInfo variable (from RayPerceptionSensor
    script) to debug the variables such as offset positions, ray direction, hit fraction,
    and hit radius. Figure [4-5](#Fig5) shows Ray Sensors using “RayPerceptionSensorComponent3D”
    in “FindingBlock-PPO” Unity scene, which we will study in a later section in this
    chapter.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: “DrawRaycastGizmos”方法使用来自RayPerceptionSensor脚本的DisplayDebugInfo变量（变量如偏移位置、射线方向、击中分数和击中半径）进行调试。图[4-5](#Fig5)展示了在“FindingBlock-PPO”Unity场景中使用“RayPerceptionSensorComponent3D”的射线传感器，我们将在本章后面的部分中研究。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig5_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig5_HTML.jpg)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig5_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig5_HTML.jpg)'
- en: Figure 4-5
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-5
- en: Ray perception sensor 3D in Unity using sensor rays
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: Unity中使用传感器射线进行3D射线感知
- en: This completes the fundamental aspects of the ray sensors. There are associated
    scripts, such as VectorSensor and StackingSensor.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了射线传感器的基本方面。有一些相关的脚本，例如VectorSensor和StackingSensor。
- en: '**VectorSensor** **:** This script is a vector implementation of the ray sensors.
    It has different variants of “AddObservation,” a method overloading technique.
    This is useful when the observation size can be a transform (Vector3/Vector2),
    quaternion(x, y, z, w), Boolean, or an int. This will be used when we write our
    own agent script. If the expected observation space size is not consistent with
    the received observation space size during training, then it shows a warning.
    It truncates the observations if excessive observations are received and pads
    with 0 if lesser observations than expected are received.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**VectorSensor** **:** 此脚本是射线传感器的向量实现。它有“AddObservation”的不同变体，这是一种方法重载技术。当观察大小可以是转换（Vector3/Vector2）、四元数（x,
    y, z, w）、布尔值或整数时，这很有用。这将在我们编写自己的代理脚本时使用。如果在训练期间预期的观察空间大小与接收到的观察空间大小不一致，则会显示警告。如果接收到的观察结果过多，则截断观察结果；如果接收到的观察结果少于预期，则用0填充。'
- en: '[PRE31]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: '**StackingSensor** **:** This sensor is used for temporal stacking of the observations,
    and consecutive observations are stored in an array (1D) from left to right. The
    details of this particular sensor are cross-functional and are used in the deep
    RL algorithms, which require memory.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**StackingSensor** **:** 该传感器用于观察的时间堆叠，连续观察结果从左到右存储在数组（1D）中。这个特定传感器的细节是跨功能的，并用于需要记忆的深度强化学习算法。'
- en: This completes the entire class of ray sensors. The agent uses the “RayPerceptionSensorComponent2D”
    or “RayPerceptionSensorComponent3D” in Unity. This script in turn calls the RayPerceptionSensorComponentBase
    script, which implements the SensorComponent script. The latter is an implementation
    of the ISensor script for the Unity Editor. The RayPerceptionSensorComponentBase
    script is displayed on the Inspector Window controlling the observations, rays,
    and their attributes. This script internally calls the “RayPerceptionSensor” script,
    which contains the structures “RayPerceptionInput” and “RayPerceptionOutput.”
    This is one of the most important parts of the brain, which is used for collecting
    observations from sensor rays. Figure [4-6](#Fig6) shows this architecture.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了整个射线传感器类别。代理在Unity中使用“RayPerceptionSensorComponent2D”或“RayPerceptionSensorComponent3D”。此脚本反过来调用RayPerceptionSensorComponentBase脚本，该脚本实现了SensorComponent脚本。后者是Unity编辑器中ISensor脚本的一个实现。RayPerceptionSensorComponentBase脚本在检查器窗口中显示，用于控制观察、射线及其属性。此脚本内部调用“RayPerceptionSensor”脚本，其中包含“RayPerceptionInput”和“RayPerceptionOutput”结构。这是大脑中最重要的部分之一，用于从传感器射线收集观察结果。图[4-6](#Fig6)展示了这个架构。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig6_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig6_HTML.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig6_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig6_HTML.png)'
- en: Figure 4-6
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-6
- en: Ray sensor scripts in Unity ML Agents
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents中的射线传感器脚本
- en: Camera Sensor
  id: totrans-104
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 摄像头传感器
- en: In this section we will also explore the camera sensor, which is controlled
    by the CameraSensorComponent and CameraSensor scripts.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们还将探讨由CameraSensorComponent和CameraSensor脚本控制的摄像头传感器。
- en: '**CameraSensorComponent** **:** This script also inherits from the SensorComponent
    script like ray sensors and controls the different attributes of a visual observation
    space. Since environments like GridWorld rely on visual observations in a compressed
    form (PNG), which is then passed into deep learning computer vision algorithms,
    this script is used for assigning the height, width, compression, and the vectorized
    distribution of the input observation space. The script is assigned to an agent
    that controls the visual observation with the help of a camera present in the
    Unity scene. It assigns the camera as the default visual observation too. The
    width and height of the generated image is also an attribute that defaults to
    84 units.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**CameraSensorComponent** **:** 此脚本同样继承自SensorComponent脚本，如射线传感器，并控制视觉观察空间的各项属性。由于像GridWorld这样的环境依赖于压缩形式的视觉观察（PNG），然后将其传递给深度学习计算机视觉算法，因此此脚本用于分配输入观察空间的高度、宽度、压缩和向量分布。该脚本被分配给一个通过Unity场景中的摄像头来控制视觉观察的智能体。它还将摄像头设置为默认的视觉观察。生成的图像的宽度和高度也是一个默认为84个单位的属性。'
- en: '[PRE32]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The script also has attributes that control whether the images are received
    in RGB (three channels) or in grayscale (one channel) format. It also contains
    the compression type of the image defaulting to “PNG.” This camera sensor object
    can then be used for collecting visual information (visual sensor). This object
    is of type ISensor, which governs all the sensors in the Unity ML Agents.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 该脚本还具有控制图像是否以RGB（三个通道）或灰度（一个通道）格式接收的属性。它还包含默认为“PNG”的图像压缩类型。此摄像头传感器对象可用于收集视觉信息（视觉传感器）。此对象是ISensor类型，它控制Unity
    ML Agents中的所有传感器。
- en: '[PRE33]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: It also has overridden the method “GetObservationShape,” like in the case of
    ray sensor, which returns the observation vector (container), whose shape is controlled
    by the height, width, and the channels of the image (RGB/grayscale). It also has
    another method “UpdateSensor,” which assigns the name of the camera sensor and
    the compression type (none/PNG).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 它还覆盖了“GetObservationShape”方法，类似于射线传感器的情况，该方法返回观察向量（容器），其形状由图像的高度、宽度和通道（RGB/灰度）控制。它还有一个名为“UpdateSensor”的方法，用于分配摄像头传感器的名称和压缩类型（无/PNG）。
- en: '[PRE34]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: '**CameraSensor:** This inherits from the ISensor script and overrides its methods.
    The basic functionality of this script is to wrap a camera object to generate
    visual observations for the agent. It has the attributes that are present in the
    CameraSensorComponent script such as height, width, grayscale, name shape, and
    compression type and has associated functions to assign them. The “GetCompressedObservation”
    method encodes the image in PNG binary format.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**CameraSensor:** 此脚本继承自ISensor脚本并覆盖了其方法。此脚本的基本功能是将摄像头对象包装起来，为智能体生成视觉观察。它具有与CameraSensorComponent脚本中相同的属性，如高度、宽度、灰度、名称形状和压缩类型，并具有相关函数来分配它们。
    “GetCompressedObservation”方法以PNG二进制格式编码图像。'
- en: '[PRE35]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: The important methods include the override “Write” method, “ObservationToTexture”
    method. The latter is important because the camera captures the image presented
    on a render texture (Texture 2D). This function assigns the variables with the
    Texture 2D properties such as the width, height, and texture format (RGB24) and
    also controls the transform of the camera and its depth of view. This script can
    also help in rendering to offscreen texture, which is useful when training Resnet
    model in CPU. For each timestamp, the image is captured and activated so that
    it can be processed by the neural network. After it is processed, the RenderTexture
    variable is released, and a new image is assigned to it for the next time step.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的方法包括覆盖的“Write”方法和“ObservationToTexture”方法。后者很重要，因为摄像头捕获的是渲染纹理（Texture 2D）上显示的图像。此函数将具有Texture
    2D属性（如宽度、高度和纹理格式RGB24）的变量分配给，并控制摄像头的变换和其视场深度。此脚本还可以帮助渲染到离屏纹理，这在CPU上训练Resnet模型时很有用。对于每个时间戳，都会捕获并激活图像，以便它可以被神经网络处理。处理完毕后，RenderTexture变量被释放，并为下一个时间步分配一个新的图像。
- en: '[PRE36]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'The “Write” method then calls this “ObservationToTexture” method to the observation
    space of the agent. However, in this case, the observation space is written over
    a Tensor (which we will discuss in next chapter), which can be assumed as a dense
    matrix suitable for performing deep learning algorithmic computations. Once the
    visual information from the observation space is processed by the network running
    on the external brain, the associated texture is destroyed. The script does this
    with the help of the following lines:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: “Write”方法随后将此“ObservationToTexture”方法调用到代理的观察空间。然而，在这种情况下，观察空间是在一个张量（我们将在下一章讨论）上写入的，可以假设为一个适合执行深度学习算法计算的密集矩阵。一旦外部大脑上运行的神经网络处理了观察空间中的视觉信息，相关的纹理就会被销毁。脚本通过以下行来完成这项工作：
- en: '[PRE37]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'The “GenerateShape” method returns the shape of the image and its associated
    channels: one for grayscale, three for RGB.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: “GenerateShape”方法返回图像的形状及其相关通道：一个用于灰度，三个用于RGB。
- en: '[PRE38]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: In the GridWorld environment, there is a use of the camera sensor component.
    These two important scripts control the visual observation input from the camera
    and pass this information to the neural network for training. This is shown in
    Figure [4-7](#Fig7).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在GridWorld环境中，使用了相机传感器组件。这两个重要的脚本控制来自相机的视觉观察输入，并将此信息传递给神经网络进行训练。这如图[4-7](#Fig7)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig7_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig7_HTML.jpg)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig7_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig7_HTML.jpg)'
- en: Figure 4-7
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-7
- en: Camera sensor in GridWorld
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: GridWorld中的相机传感器
- en: 'There is another class called as “RenderTextureSensor ,” which contains the
    initialization of the functions and methods used in the CameraSensor script, such
    as creating Texture 2D format and assigning the height, width, channels, name,
    and compression for training. The sensor part controls the centralized observation
    space of the agent and provides all the details for the agent to take its next
    decision base on the runtime policy. We have explored the two distinct variants
    of sensors in depth: the ray sensors and the camera sensors. The important conclusion
    is that both these sensors inherit from “ISensor” and “SensorComponent” script
    at the lower level and have their own individual functionality. In contrast to
    the ray sensors workflow, the camera sensor workflow can be visualized as shown
    in Figure [4-8](#Fig8).'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 另有一个名为“RenderTextureSensor”的类，其中包含在CameraSensor脚本中使用的函数和方法初始化，例如创建Texture 2D格式并分配高度、宽度、通道、名称和压缩以进行训练。传感器部分控制代理的集中式观察空间，并为代理提供所有基于运行时政策的决策细节。我们已经深入探讨了两种不同的传感器变体：射线传感器和相机传感器。重要的结论是，这两种传感器在较低级别都继承自“ISensor”和“SensorComponent”脚本，并且具有各自的功能。与射线传感器工作流程相比，相机传感器工作流程可以如图[4-8](#Fig8)所示进行可视化。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig8_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig8_HTML.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig8_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig8_HTML.png)'
- en: Figure 4-8
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-8
- en: Camera sensor workflow in Unity ML Agents
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents中的相机传感器工作流程
- en: Policies
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 政策
- en: In this section, we will explore the policies that the agent follows while taking
    decisions. We will explore the BehaviorParameters script, which we mentioned briefly
    in the last chapter, and we will get to know how this script relates to the sensor
    components to get the observation space for the agent. The BarracudaPolicy script
    provides information related to the Inference Engine policy while running the
    internal brain. The HeuristicPolicy script is involved in making heuristic policies
    when no specific brain (Internal/External) is applied on the agent.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨代理在做出决策时遵循的政策。我们将探讨在上一章中简要提到的BehaviorParameters脚本，并了解这个脚本如何与传感器组件相关联，以获取代理的观察空间。BarracudaPolicy脚本在运行内部大脑时提供有关推理引擎政策的详细信息。HeuristicPolicy脚本在未对代理应用特定大脑（内部/外部）时参与制定启发式政策。
- en: '**BehaviorParameters:** As mentioned in the last chapter , this script is associated
    with the decision-making process of the agent after receiving the observation
    from the sensors. The agent has a choice to choose its decision as default, internal,
    or heuristic. If the default policy is chosen, the script tries to attain the
    current policy. This can be a pretrained policy running in the Inference Engine
    or a heuristic policy. If no pretrained model is present (no inference) and heuristic
    policy is not implemented, this default policy is used for real-time training
    of the neural network with Tensorflow (external brain). The default policy uses
    the remote process for decision making: (real-time training). If external brain
    training is not present, it will use the Inference Engine (internal brain), and
    if no model is provided it defaults to heuristic policy.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**行为参数**：如上一章所述，此脚本与代理在接收到传感器观察后的决策过程相关联。代理可以选择将其决策作为默认、内部或启发式。如果选择默认策略，脚本尝试获取当前策略。这可能是在推理引擎中运行的预训练策略或启发式策略。如果没有预训练模型（没有推理）且未实现启发式策略，则使用此默认策略使用Tensorflow（外部大脑）实时训练神经网络。默认策略使用远程进程进行决策：实时训练。如果不存在外部大脑训练，它将使用推理引擎（内部大脑），如果没有提供模型，则默认为启发式策略。'
- en: '[PRE39]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: The next code segment implements the policies at runtime and also generates
    the agent’s policy objects. This script uses the BrainParameters script, which
    has attributes such as observation size, stacked observations, vector action size,
    and discrete or continuous distribution of observations. The segment also contains
    a neural network model variable that is used if internal policy is chosen for
    inference. It also has attributes that specify the inference device, such as CPU
    or GPU, on which the pretrained model will run during game play in Unity.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个代码段在运行时实现策略，并生成代理的策略对象。此脚本使用BrainParameters脚本，该脚本具有观察大小、堆叠观察、向量动作大小和观察的离散或连续分布等属性。该段还包含一个神经网络模型变量，如果选择内部策略进行推理时使用。它还具有指定预训练模型将在Unity游戏中的游戏玩法期间运行的推理设备（如CPU或GPU）的属性。
- en: '[PRE40]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: It also controls the behavior type, the name of the behavior, and Boolean variable,
    which controls whether child sensors would be used and also assigns a team ID
    for the behavior, which is represented as “FullyQualifiedBehaviorName.” The child
    sensors signify the sensors attached to the children GameObjects of the agent.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 它还控制行为类型、行为名称和布尔变量，该布尔变量控制是否使用子传感器，并为行为分配一个团队ID，表示为“FullyQualifiedBehaviorName”。子传感器表示附加到代理的子GameObject的传感器。
- en: '[PRE41]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: The next method is “GeneratePolicy,” which is of type “IPolicy.” It takes arguments
    as the brain parameters and the behavior type. Based on the type of the behavior,
    a switch case is applied. If “HeuristicOnly” type is chosen, then it draws its
    behavior from the “HeuristicPolicy” (which we will discuss). If “InferenceOnly”
    policy is used, then there is a check to make sure that a valid pretrained model
    is available for inference through Barracuda. If not, then a warning is provided
    to change the behavior type. If a pretrained model is present, then it is passed
    to “BarracudaPolicy” script to run the inference.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个方法是“GeneratePolicy”，它属于“IPolicy”类型。它接受大脑参数和行为类型作为参数。根据行为类型，应用一个switch case。如果选择“HeuristicOnly”类型，则从“HeuristicPolicy”（我们将在后面讨论）中抽取其行为。如果使用“InferenceOnly”策略，则检查是否有一个有效的预训练模型可以通过Barracuda进行推理。如果没有，则提供警告以更改行为类型。如果存在预训练模型，则将其传递给“BarracudaPolicy”脚本来运行推理。
- en: '[PRE42]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Then we have the “Default” policy, which initially checks whether the communicator
    is on. This implies the port 5004 is connected for real-time Python training of
    the model using Tensorflow. This is the external brain training taking place.
    In the event of the port being not connected, the policy checks for an available
    valid pretrained model for “Inference” policy. Otherwise it defaults to “Heuristic”
    policy.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们有“Default”策略，它最初检查通信器是否开启。这意味着端口5004已连接，用于使用Tensorflow进行模型的实时Python训练。这是外部大脑训练。如果端口未连接，策略将检查是否有可用于“推理”策略的有效预训练模型。否则，它默认为“启发式”策略。
- en: '[PRE43]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: The last method of this script “UpdateAgentPolicy” updates the policy of the
    agent if the agent is not null.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本的最后一个方法“UpdateAgentPolicy”在代理不为空的情况下更新代理的策略。
- en: '[PRE44]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: This BehaviorParameter script uses certain adjoining scripts such as BrainParameters,
    BarracudaPolicy, “HeuristicPolicy,” and ”IPolicy” scripts, which are fundamental
    for its functionality. In the next sections of this chapter, using the Unity Editor,
    we will assign a “BehaviorParameters” script to the agent.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 此 BehaviorParameter 脚本使用某些相邻脚本，例如 BrainParameters、BarracudaPolicy、“HeuristicPolicy”
    和 “IPolicy” 脚本，这些脚本对其功能至关重要。在本章的下一节中，我们将使用 Unity 编辑器将“BehaviorParameters”脚本分配给智能体。
- en: If we open any scene in the DeepLearning Assets folder and navigate to any agent
    in the scene, we will see the behavior parameters script attached to it. For instance,
    in this case the “BehaviorParameter” script for “Hallway” is shown in Figure [4-9](#Fig9).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们打开 DeepLearning Assets 文件夹中的任何场景，并导航到场景中的任何智能体，我们将看到附加在其上的行为参数脚本。例如，在此情况下，Hallway
    的“BehaviorParameter”脚本如图 [4-9](#Fig9) 所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig9_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig9_HTML.jpg)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig9_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig9_HTML.jpg)'
- en: Figure 4-9
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-9
- en: BehaviorParameters script in the Hallway scene
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: Hallway 场景中的 BehaviorParameters 脚本
- en: Some of the parameters such as VectorObservation and VectorAction are derived
    from the BrainParameters script, and we can see variables such as Model (controls
    the neural network model), Inference Device (CPU/GPU), Behavior Type (HeuristicOnly,
    InferenceOnly, Default), Team ID, and Boolean Use Child Sensors, which we discussed
    in this script.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 一些参数，如 VectorObservation 和 VectorAction，是从 BrainParameters 脚本派生出来的，我们可以看到诸如
    Model（控制神经网络模型）、Inference Device（CPU/GPU）、Behavior Type（HeuristicOnly、InferenceOnly、Default）、Team
    ID 和 Boolean Use Child Sensors（我们在此脚本中讨论的）等变量。
- en: '**BrainParameters** **:** This controls the observation input and output spaces.
    It determines whether the action space is discrete or continuous inside the “BrainParameter”
    class, and it holds data related to the size of the vector observation space (defaults
    to 1). It also has attributes such as “stacked vectors,” which refers to the concatenation
    of observations across different frames to be used for training.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '**BrainParameters** **:** 这控制观测输入和输出空间。它确定“BrainParameter”类内部动作空间是离散的还是连续的，并持有与向量观测空间大小相关的数据（默认为
    1）。它还有诸如“stacked vectors”之类的属性，指的是用于训练的跨不同帧的观测值的连接。'
- en: '[PRE45]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: The “VectorActionSize” variable defines the size of the action space. If the
    space is continuous, the size is simply defined as the size of the vector. For
    discrete action spaces, the size depends on the branching of the action space.
    It also has “VectorActionDescriptions,” which describe the action space and “VectorActionSpaceType,”
    which is continuous or discrete .
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: “VectorActionSize”变量定义动作空间的大小。如果是连续空间，大小简单地定义为向量的长度。对于离散动作空间，大小取决于动作空间的分支。它还有“VectorActionDescriptions”，描述动作空间，“VectorActionSpaceType”，表示连续或离散。
- en: '[PRE46]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: The “NumActions” returns the number of actions inside the vector action space.
    If it is discrete, the length of the “VectorActionSize” array is returned (depending
    on branching factor). For continuous spaces, the value at the first index of the
    “VectorActionSize” array is returned as the observations are stacked.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: “NumActions” 返回向量动作空间内的动作数量。如果是离散的，则返回“VectorActionSize”数组长度（取决于分支因子）。对于连续空间，返回“VectorActionSize”数组第一个索引的值，因为观测值是堆叠的。
- en: '[PRE47]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: The last method in this script, Clone, initializes the BrainParameter object
    with the values discussed in this context. These attributes are then passed into
    the BehaviorParameters script , which appears on the Editor.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本中的最后一个方法 Clone，使用在此上下文中讨论的值初始化 BrainParameter 对象。然后，将这些属性传递到出现在编辑器上的 BehaviorParameters
    脚本中。
- en: '[PRE48]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: '**BarracudaPolicy** **:** This is used for the Inference Engine for running
    a pretrained neural network in Unity. Internally this script uses the “ModelRunner”
    class. The first stage of this script contains the enum for the different types
    of “Inference Device,” which is CPU or GPU (0 or 1, respectively.) The “BarracudaPolicy”
    inherits from the “IPolicy” interface. It contains attributes such as the agent
    ID and the list of sensor shapes. The “ModelRunner” script is used across all
    the policies that have the similar deep learning model and the same inference
    device.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**BarracudaPolicy** **:** 这用于 Unity 中的推理引擎，以运行预训练的神经网络。内部此脚本使用“ModelRunner”类。此脚本的第一阶段包含不同类型“推理设备”的枚举，即
    CPU 或 GPU（分别为 0 或 1）。“BarracudaPolicy”从“IPolicy”接口继承。它包含诸如智能体 ID 和传感器形状列表等属性。用于所有具有类似深度学习模型和相同推理设备的策略的“ModelRunner”脚本。'
- en: '[PRE49]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: This script also has a method BarracudaPolicy, which takes as arguments the
    attributes from the BrainParameters class, the neural network model to be used,
    and the inference device to run the model. This method uses the “GetOrCreateModel”
    method from the Academy class, which implies that if the model has been used previously
    for inference, it will continue using that. In the event that no pretrained model
    has been used for that agent before, it will get the built model assigned from
    the assets folder .
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本还有一个名为BarracudaPolicy的方法，它接受来自BrainParameters类的属性、要使用的神经网络模型以及运行模型的推理设备作为参数。此方法使用Academy类的“GetOrCreateModel”方法，这意味着如果模型之前已用于推理，它将继续使用该模型。如果在此之前没有为该代理使用预训练模型，它将从资产文件夹获取分配的构建模型。
- en: '[PRE50]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: It contains a “RequestDecision” method that makes decisions for the agent based
    on the trained model. It takes as input the list of sensors (ray/camera) and has
    an associated episode ID for each stage of the decision-making process.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 它包含一个“RequestDecision”方法，根据训练模型为代理做出决策。它接受传感器列表（ray/camera）作为输入，并为决策过程的每个阶段关联一个相关的事件ID。
- en: '[PRE51]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: The “DecideAction” method uses the “GetAction” method from the ModelRunner script
    to allow the agent to take corresponding action against a particular decision.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: “DecideAction”方法使用ModelRunner脚本的“GetAction”方法，允许代理针对特定决策采取相应的行动。
- en: '[PRE52]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: '**HeuristicPolicy** **:** This is used when neither Default nor InferenceOnly
    options are provided in the BehaviorParameters script. This is a rather hard-coded
    implementation of the heuristic policies, which makes the agent take action each
    time the “RequestDecision” method is called. It does not use the BrainParameters
    script attributes and uses the input list of sensors from the agent directly to
    make its decisions. The methods that are important in this context are “RequestDecision”
    method, which takes the list of sensors as input, and the “DecideAction” method,
    which takes the previous decision made by the policy.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '**启发式策略** **:** 当在BehaviorParameters脚本中既没有提供Default也没有提供InferenceOnly选项时使用此策略。这是一个相当硬编码的启发式策略实现，使得代理每次调用“RequestDecision”方法时都会采取行动。它不使用BrainParameters脚本属性，并直接使用代理的输入传感器列表来做出决策。在此上下文中重要的方法是“RequestDecision”方法，它接受传感器列表作为输入，以及“DecideAction”方法，它接受策略之前做出的决策。'
- en: '[PRE53]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: The StepSensors function uses the ISensor.GetCompressedObservation, which makes
    the sensor usage consistent between training and inference. If no compression
    is used , then the observation space data from the sensors is used (written to
    ObservationWriter class); otherwise, it is passed as compressed data.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: StepSensors功能使用ISensor.GetCompressedObservation，这使得传感器在训练和推理过程中的使用保持一致。如果没有使用压缩，则使用传感器观察空间数据（写入ObservationWriter类）；否则，以压缩数据的形式传递。
- en: '[PRE54]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: '**IPolicy** **:** This interface is used across all the policy scripts we studied,
    as it is connected to a single agent. It provides the methods that are required
    by other policy scripts described in this section, to provide decisions that the
    agent can take. It has two unique declarations: the “RequestDecision” method,
    which signals the brain that the agent needs to make a decision based on the policy
    on which it is running, and the “DecideAction” method, which implies that the
    decision has to be taken at that particular time step this method is called.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '**IPolicy** **:** 此接口在我们研究的所有策略脚本中使用，因为它连接到单个代理。它提供了本节中描述的其他策略脚本所需的方法，以提供代理可以采取的决策。它有两个独特的声明：一个是“RequestDecision”方法，它向大脑发出信号，表示代理需要根据其正在运行的策略做出决策，另一个是“DecideAction”方法，它意味着必须在调用此方法的时间步长做出决策。'
- en: '[PRE55]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: The brain is expected to update its decisions once the “DecideAction” method
    is called.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 当调用“DecideAction”方法时，大脑预计会更新其决策。
- en: That completes the policies section, which involves the decision-making steps
    of the agent. This part takes as input the sensor data and acts as an interface
    for the different types of brain—internal, external, and heuristic—to work upon
    and provides the decisions to the agent. This is the C# part of the brain that
    internally links with the deep learning networks in Tensorflow (which we will
    discuss in the Chapter [5](502041_1_En_5_Chapter.xhtml)). The entire policy architecture
    can be summarized in Figure [4-10](#Fig10).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了策略部分，它涉及到代理的决策步骤。这部分以传感器数据为输入，作为不同类型大脑（内部、外部和启发式）的工作接口，并为代理提供决策。这是大脑的C#部分，它内部与Tensorflow中的深度学习网络连接（我们将在第[5](502041_1_En_5_Chapter.xhtml)章中讨论）。整个策略架构可以总结在图[4-10](#Fig10)中。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig10_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig10_HTML.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig10_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig10_HTML.png)'
- en: Figure 4-10
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-10
- en: Sensor-Policy architecture in the brain of agents
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 代理大脑中的传感器-策略架构
- en: 'By now we have a good understanding of the two major parts of the brain : sensors
    and policies. This is, however, restricted only to the C# layer of the ML Agents
    software development kit (SDK). The other important parts of the brain include
    the inference, communicators, and demonstrations. Of these the inference module
    is related to the Barracuda Engine and procedure of using Tensorflow pretrained
    model on stacked observation data. The demonstrators are an important aspect of
    the imitation learning set of algorithms. These two will be briefly discussed
    here since they have more to do with the Python side of ML Agents. The communicators
    is an interesting module that deals with how the connection takes place between
    the policy and Tensorflow/Python API.'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经对大脑的两个主要部分有了很好的理解：传感器和政策。然而，这仅限于ML Agents软件开发工具包（SDK）的C#层。大脑的其他重要部分包括推理、通信和演示。在这些部分中，推理模块与Barracuda引擎和Tensorflow预训练模型在堆叠观察数据上的使用过程相关。演示者是模仿学习算法集的一个重要方面。这两个方面将在这里简要讨论，因为它们与ML
    Agents的Python方面有更多关联。通信者是一个有趣的模块，它处理策略与Tensorflow/Python API之间的连接方式。
- en: Inference
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推理
- en: This part is used for the Inference Engine for running the pretrained models
    in Unity. Essentially this deals with the compressed Tensor data that has been
    received as an output from the Tensorflow training. The Barracuda policy that
    we learned about previously uses this module to link the observations and action
    spaces and provides the decisions during gameplay. There are certain important
    aspects of this module, such as the “ModelRunner” script and ”BarracudaModelParamLoader”
    script. The associated scripts that deal with the Tensor-processed data are TensorApplier,
    TensorGenerator, TensorProxy, and the TensorNames script. We will be learning
    about some of the aspects of this module—namely, the ModelRunner script—to understand
    how the Barracuda policy uses this script to make decisions.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这个部分用于Unity中运行预训练模型的推理引擎。本质上，它处理从Tensorflow训练中接收到的压缩张量数据。我们之前提到的Barracuda策略使用这个模块来连接观察和动作空间，并在游戏过程中提供决策。这个模块有一些重要的方面，例如“ModelRunner”脚本和“BarracudaModelParamLoader”脚本。处理张量处理数据的关联脚本包括TensorApplier、TensorGenerator、TensorProxy和TensorNames脚本。我们将学习这个模块的一些方面——特别是ModelRunner脚本——以了解Barracuda策略如何使用这个脚本做出决策。
- en: '**ModelRunner** **:** The attributes of this script include the agent information,
    sensors, and dictionary containing the last action performed by the agent. It
    also contains properties like the neural network model, which is to be used for
    inference, inference device, inference inputs and outputs, and validation of the
    sensor shape. The “ModelRunner” method uses the parameters from the “BrainParameter”
    script and also has a “TensorAllocator” attribute for intermediate caching of
    the Tensor result of each episode of training. It then loads the model to be used
    by using the ModelLoader.Load syntax and assigns it as a Barracuda model. In the
    event of no model being present for inference, a null value is assigned.'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '**模型运行器** **:** 此脚本的属性包括代理信息、传感器以及包含代理执行的最后一个动作的字典。它还包括诸如用于推理的神经网络模型、推理设备、推理输入和输出以及传感器形状验证等属性。“ModelRunner”方法使用“BrainParameter”脚本中的参数，并具有“TensorAllocator”属性，用于缓存每个训练周期的
    Tensor 结果。然后，它使用 ModelLoader.Load 语法加载要使用的模型，并将其分配为 Barracuda 模型。如果没有模型用于推理，则分配一个空值。'
- en: '[PRE56]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: The next part involves abstracting the inference inputs from the loaded Barracuda
    model with the help of BarracudaModelParamLoader.GetInputTensors command. Likewise,
    the inference outputs are also received from the Barracuda model. However, for
    running the inference, there are certain other attributes such as TensorGenerator
    and TensorApplier classes, which are required. The TensorGenerator is actually
    a dictionary, mapping between the Tensor Names and the generators. Generators
    can be considered as specialized functions that can help to analyze large data
    sets by passing it as an iterator. Instead of loading the entire data set during
    training or during use of a pretrained model, the generator helps to partition
    the data according to a function that allows better data inflow for processing.
    We will understand the use of a generator in depth when we study convolution neural
    networks in the next chapter. For the time being, it is safe to assume that the
    “TensorGenerator” class is a mapping that allows a proper data flow pipeline for
    inference. Similarly, the TensorApplier is a mapping between output Tensor names
    and the methods that will use that particular output Tensor. It also stores the
    model information and actions and updates the memory (buffer) of the agent.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分涉及使用 BarracudaModelParamLoader.GetInputTensors 命令从加载的 Barracuda 模型中提取推理输入。同样，推理输出也来自
    Barracuda 模型。然而，为了运行推理，还需要某些其他属性，例如 TensorGenerator 和 TensorApplier 类。TensorGenerator
    实际上是一个字典，它将 Tensor 名称与生成器进行映射。生成器可以被视为专门的功能，通过将其作为迭代器传递，可以帮助分析大型数据集。在训练期间或使用预训练模型时，而不是加载整个数据集，生成器有助于根据允许更好数据流入处理的功能来划分数据。当我们学习下一章中的卷积神经网络时，我们将深入了解生成器的使用。目前，可以安全地假设“TensorGenerator”类是一个映射，它允许为推理提供适当的数据流管道。同样，TensorApplier
    是输出 Tensor 名称与将使用该特定输出 Tensor 的方法之间的映射。它还存储模型信息和操作，并更新代理的内存（缓冲区）。
- en: '[PRE57]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: The PrepareBarracudaInputs initializes the inference inputs from Barracuda and
    also creates a mapping in a dictionary between the names and the inference inputs.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: PrepareBarracudaInputs 初始化来自 Barracuda 的推理输入，并在字典中创建名称与推理输入之间的映射。
- en: The FetchBarracudaOutputs fetches the output depending on a particular “name”
    provided. This is important to get the correctly mapped inference input associated
    with a particular name so that it can be processed.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: FetchBarracudaOutputs 根据提供的特定“名称”获取输出。这对于获取与特定名称正确映射的推理输入非常重要，以便进行处理。
- en: '[PRE58]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: The PutObservations validates the shape of the sensor and associates an episode
    ID with each episode such that the decisions taken by the agent are in a sorted
    manner. If the agent reaches the goal by following the Inference Engine model,
    then the last action is removed from the dictionary, as no further steps should
    be taken for that episode.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: PutObservations 验证传感器的形状，并将一个 episode ID 与每个 episode 关联，以便代理所做的决策是有序的。如果代理通过遵循推理引擎模型达到目标，则从字典中删除最后一个动作，因为对于该
    episode 不应采取进一步步骤。
- en: '[PRE59]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: The “DecideBatch” method actually runs the pretrained model in batches in Inference
    Engine. The current batch size is checked and passed through the generator function
    in “TensorGenerator” script to produce a Tensor that can be passed as information
    to the agent. As mentioned the generator allows the data to be passed in the form
    of sequentially partitioned and processed data in batches rather than passing
    the entire data. This improves performance and also can assist if a large amount
    of memory is taken up while passing the processed data. The “BeginSample” method
    associates the sampled Tensor names with the inference input. The input tensors
    are then fed to the Inference Engine using the “GenerateTensor” method. This method
    is the initial pipeline for batch processing, which involves passing the Tensor
    data to the Inference Engine using the generator function.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: “DecideBatch” 方法实际上在推理引擎中以批量方式运行预训练模型。它检查当前批量大小，并通过“TensorGenerator”脚本中的生成函数传递，以产生可以传递给代理的信息的
    Tensor。如前所述，生成器允许以顺序划分和处理的批量数据形式传递数据，而不是传递整个数据。这提高了性能，并在传递处理后的数据时占用大量内存的情况下提供帮助。“BeginSample”
    方法将样本 Tensor 名称与推理输入关联起来。然后，使用“GenerateTensor”方法将输入张量馈送到推理引擎。此方法是批量处理的初始流程，涉及使用生成函数将
    Tensor 数据传递给推理引擎。
- en: '[PRE60]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: The next stage involves preparing the Barracuda inference inputs corresponding
    to the prepared Tensor data. Here the TensorGenerator script becomes useful, which
    contains a mapping between the Tensor names (data) and the inference inputs.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个阶段涉及准备与已准备的 Tensor 数据对应的 Barracuda 推理输入。在这里，TensorGenerator 脚本变得很有用，它包含 Tensor
    名称（数据）与推理输入之间的映射。
- en: '[PRE61]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: Then the Barracuda/Inference Engine executes the model. For this it uses the
    WorkerFactory class internally to execute the model. The m_Engine variable uses
    the inference inputs and assigns a particular action in a time-step to be performed
    by the agent, such as 3D motion. This, in turn, returns the output of the executed
    model, in the form of memories, actions, and decisions taken by the agent. Here
    the TensorApplier script becomes useful; it controls the mapping between the associated
    inference output and the memories and actions taken by the agent.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，Barracuda/推理引擎执行模型。为此，它内部使用 WorkerFactory 类来执行模型。m_Engine 变量使用推理输入，并为代理分配一个特定的时间步动作，例如
    3D 运动。这反过来又返回执行模型的输出，以内存、动作和代理采取的决定的形式。在这里，TensorApplier 脚本变得很有用；它控制关联的推理输出与代理采取的内存和动作之间的映射。
- en: '[PRE62]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: The method “HasModel” checks whether a valid pretrained model is present for
    inference along with an associated inference device. The method “GetAction” retrieves
    the last action taken by the agent in a sorted order of the decisions vector.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: “HasModel” 方法检查是否存在用于推理的有效预训练模型以及相关的推理设备。方法“GetAction”检索代理在决策向量排序中采取的最后一个动作。
- en: To summarize this particular script is associated with using the inference mode
    for the agent. The pipeline involves acquiring the processed data from the pretrained
    model, partitioning it into Tensor data according to a generator function for
    smoother batch processing, passing this Tensor data along with its Tensor name
    as inference input to the Barracuda Engine (“TensorGenerator”), executing the
    model, extracting the results in the form of memory, assuming actions taken by
    the agent in an inference output format, associating the inference output with
    the results of each episode with the help of TensorApplier, and extracting the
    latest output for the next episode. This continues as long as the agent has reached
    the goal in inference training or the episode is terminated. This can be illustrated
    in Figure [4-11](#Fig11).
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这个特定的脚本与使用代理的推理模式相关。该流程包括从预训练模型获取处理后的数据，根据生成函数将其划分为 Tensor 数据以实现更平滑的批量处理，将此
    Tensor 数据及其 Tensor 名称作为推理输入传递给 Barracuda 引擎（“TensorGenerator”），执行模型，以内存形式提取结果，假设代理在推理输出格式中采取的动作，借助
    TensorApplier 将推理输出与每个场景的结果关联起来，并提取下一个场景的最新输出。只要代理在推理训练中达到目标或场景被终止，这个过程就会继续。这可以通过图
    [4-11](#Fig11) 来说明。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig11_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig11_HTML.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig11_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig11_HTML.png)'
- en: Figure 4-11
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-11
- en: Inference module workflow in ML Agents brain
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: ML Agents 脑中的推理模块工作流程
- en: The other scripts associated with this inference module include those mentioned
    here.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 与此推理模块关联的其他脚本包括此处提到的那些。
- en: '**TensorGenerator** **:** This script, as mentioned earlier, maintains a mapping
    between the Tensor name and the generator function for batch processing of the
    preprocessed data. This is important because in ML Agents, we will look into a
    variety of models using both discrete/multi-discrete and continuous observation
    spaces. Depending on the nature of the Tensor pretrained data, the generator function
    is different for each model. There can be different generators that can be used
    for this case, such as for batch processing, sequence length, or recurrent input
    (used in recurrent neural network):'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '**TensorGenerator** **:** 如前所述，此脚本维护了张量名称与批量处理预处理数据的生成函数之间的映射。这很重要，因为在机器学习智能体中，我们将研究使用离散/多离散和连续观察空间的多种模型。根据预训练数据的Tensor性质，每个模型的生成函数是不同的。在这种情况下可能有不同的生成器，例如用于批量处理、序列长度或循环输入（用于循环神经网络）：'
- en: '[PRE63]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: For instance, if we use a model which uses visual observation data (ConvD NN
    model), then we use the VisualObservationInputGenerator and if we use vectorized
    models (discrete/continuous) we have the VectorObservationGenerator. Based on
    the type of the deep RL algorithm used and the associated neural network model,
    the generators are different. However, without loss of generality, this script
    is associated with a smooth batch processing of data for the Inference Engine
    module to work upon.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我们使用一个使用视觉观察数据的模型（ConvD NN模型），那么我们就使用VisualObservationInputGenerator；如果我们使用向量化模型（离散/连续），我们就有VectorObservationGenerator。根据使用的深度强化学习算法类型和相关神经网络模型，生成器是不同的。然而，为了不失一般性，此脚本与用于推理引擎模块工作的数据平滑批量处理相关联。
- en: '[PRE64]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: Along with this, Barracuda also has its own generator function associated with
    the Inference Model that can be used.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Barracuda还与其推理模型关联自己的生成函数，可以用于此。
- en: '**TensorApplier** **:** This script is a mapping of the Tensor output with
    the memory and actions of the agent. Depending on the type of distribution—continuous
    or discrete—the mapping is different. For continuous action space, ContinuousActionOutputApplier
    is used, while DiscreteActionOutputApplier is used for discrete spaces. It also
    updates the memory with execution of each episode of the agent and uses the BarracudaMemoryOutputApplier
    method to hold the memory contents of each episode. The script also updates the
    agent based on the actions taken by it.'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '**TensorApplier** **:** 此脚本是将张量输出与智能体的内存和动作进行映射。根据分布类型——连续或离散——映射是不同的。对于连续动作空间，使用ContinuousActionOutputApplier，而对于离散空间则使用DiscreteActionOutputApplier。它还通过执行智能体的每个回合来更新内存，并使用BarracudaMemoryOutputApplier方法来保存每个回合的内存内容。脚本还根据智能体采取的动作来更新智能体。'
- en: Demonstrations
  id: totrans-205
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 演示
- en: Another fundamental part of the brain that involves imitation learning through
    heuristic policy and records the user’s gameplay for training the agent is the
    demonstrations module. This module does not require neural network training or
    Inference Engine to allow the agent to make decisions. Rather this is a separate
    module that is devoted to making the agent learn by imitating human control. The
    most important script that we will be exploring in this section is the DemonstrationRecorder
    script.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑的另一个基本部分涉及通过启发式策略进行模仿学习并记录用户游戏玩法以训练智能体的演示模块。此模块不需要神经网络训练或推理引擎来允许智能体做出决策。相反，这是一个独立的模块，致力于通过模仿人类控制来使智能体学习。在本节中，我们将探讨的最重要脚本将是DemonstrationRecorder脚本。
- en: '**DemonstrationRecorder** **:** In order to record demonstrations from an agent
    by heuristic control, we have to add this script to the agent. When the “Record”
    option is checked during the gameplay, the demonstrations are recorded in a .demo
    file located in the assets folder. This particular demo file contains the details
    of the demonstrations of executing the imitation learning algorithm, which may
    take a few minutes to many hours based on the complexity of the environment. Figure
    [4-12](#Fig12) shows the demonstration file in 3D Ball environment in Unity.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: '**DemonstrationRecorder** **:** 为了通过启发式控制从智能体记录演示，我们必须将此脚本添加到智能体中。当在游戏过程中勾选“记录”选项时，演示将被记录在位于资产文件夹中的.demo文件中。这个特定的演示文件包含了执行模仿学习算法的演示细节，根据环境的复杂度，可能需要几分钟到几个小时。图[4-12](#Fig12)显示了Unity中的3D球环境中的演示文件。'
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig12_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig12_HTML.jpg)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig12_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig12_HTML.jpg)'
- en: Figure 4-12
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-12
- en: Sample demonstration file (.demo) in Unity
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: Unity中的示例演示文件(.demo)
- en: This script has certain attributes, such as the demonstrator name, the maximum
    length of the name, extension type of the file (.demo), and the default storage
    directory (Assets/Demonstrations).
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本具有某些属性，例如演示者名称、名称的最大长度、文件的扩展类型（.demo）以及默认存储目录（Assets/Demonstrations）。
- en: '[PRE65]'
  id: totrans-212
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: On initialization, rather during lazy initialization, the behavior parameters
    of the agent are taken as inputs and an associated file path and file name is
    provided for the demonstration file.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在初始化时，而不是在懒加载期间，将代理的行为参数作为输入，并为演示文件提供关联的文件路径和文件名。
- en: '[PRE66]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: The “SanitizeName” method removes all characters, with the exception of alphanumeric
    characters, from the demonstration name. It can be considered analogous to regular
    expressions used for removing the characters.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: “SanitizeName”方法从演示名称中移除所有字符，除了字母数字字符。它可以被认为是用于移除字符的正则表达式的类似物。
- en: '[PRE67]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: The MakeDemonstrationFilePath is important for saving the demonstration file
    after the observations are complete. It uses a timestamp to save the demonstrations
    files. After the training episode is over, the “AddDemonstratorWriterToAgent”
    method is called. It calls the behavior parameters of the agent and associates
    the trained observation file (.demo) file with it. The agent then runs this trained
    demonstrations file and uses imitation learning. The important part is that during
    the recording phase (training phase of imitation learning), the behavior parameter
    type can be set to HeuristicOnly, since in this case there are no associated internal/external
    brain to choose from. This heuristic brain runs on the HeuristicPolicy, which
    we discussed in the policy section of the brain. However, another modification
    can be using a player brain, that can record the actions through the user's gameplay.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: MakeDemonstrationFilePath对于在观察完成后保存演示文件非常重要。它使用时间戳来保存演示文件。在训练阶段结束后，会调用“AddDemonstratorWriterToAgent”方法。该方法调用代理的行为参数，并将训练观察文件（.demo）与它关联。然后代理运行这个训练好的演示文件，并使用模仿学习。重要的是，在记录阶段（模仿学习的训练阶段），行为参数类型可以设置为HeuristicOnly，因为在这种情况下，没有关联的内部/外部大脑可供选择。这个启发式大脑在HeuristicPolicy上运行，这是我们之前在脑部策略部分讨论过的。然而，另一种修改可以使用玩家大脑，它可以通过用户的游戏操作记录动作。
- en: '[PRE68]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: This concludes the demonstrations part and the associated script, which are
    very important to understand. The related scripts will be discussed separately
    when we will explore generative adversarial imitation learning (GAIL) in depth
    in later chapters. The workflow of imitation learning can be viewed, as shown
    in Figure [4-13](#Fig13).
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这就结束了演示部分及其相关脚本，这些内容非常重要，需要理解。当我们将在后面的章节中深入探讨生成对抗模仿学习（GAIL）时，将单独讨论相关的脚本。模仿学习的工作流程可以查看，如图[4-13](#Fig13)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig13_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig13_HTML.png)'
  id: totrans-220
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig13_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig13_HTML.png)'
- en: Figure 4-13
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-13
- en: Demonstrations module for imitation learning in brain
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 脑部中用于模仿学习的演示模块
- en: Communicators
  id: totrans-223
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通信器
- en: The communicators module is associated with linking the brain with the Python
    API. Since this module is important for real–time training, it can be considered
    to be a part of the academy. Since this module controls the linkage between the
    C# and Python API for training, we will look into the ICommunicator script.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 通信器模块与将大脑与Python API链接相关联。由于此模块对于实时训练非常重要，它可以被认为是学院的一部分。由于此模块控制C#和Python API之间的链接，我们将查看ICommunicator脚本。
- en: '**ICommunicator:** The ICommunicator script contains the important attributes,
    such as the port number, for connecting to Python, the Unity Package Version,
    Unity Communication Version, name, and the RL capabilities of the C# framework.'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**ICommunicator:** ICommunicator脚本包含重要的属性，例如连接到Python的端口号、Unity包版本、Unity通信版本、名称以及C#框架的RL能力。'
- en: '[PRE69]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: These contain the important structures such as UnityRLParameters, which contain
    the Boolean variable isTraining, which checks if the port (5004) is used by the
    external brain for running the Tensorflow model.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 这些包含重要的结构，如UnityRLParameters，它包含布尔变量isTraining，用于检查端口（5004）是否被外部大脑用于运行Tensorflow模型。
- en: '[PRE70]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: The “QuitCommandHandler” and “ResetCommandHandler” quits and resets the events
    and parameter updates sent by the communicator. The script also handles the “UnityRLInputParameters”
    updates from the communicator.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: “QuitCommandHandler”和“ResetCommandHandler”终止并重置通信器发送的事件和参数更新。该脚本还处理来自通信器的“UnityRLInputParameters”更新。
- en: '[PRE71]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: 'The next part is important because in communicators there are two types: Unity
    communicator and external communicator. The flow of information (packets) between
    the two communicators is purely sequential. An initialization message packet is
    exchanged between the two communicators once a connection is established. This
    is analogous to the handshaking technique in computer networks. As a convention,
    the Unity input is a message from external to Unity and Unity output is a message
    from Unity to external. Message packets are sent sequentially one after another
    for each information exchange, except for the first time where the external communicator
    sends two messages for establishing the connection. The structure of the message
    can be presented as follows:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分很重要，因为在通信器中有两种类型：Unity通信器和外部通信器。两个通信器之间的信息（包）流是纯顺序的。一旦建立连接，两个通信器之间就会交换一个初始化消息包。这类似于计算机网络中的握手技术。按照惯例，Unity输入是从外部到Unity的消息，Unity输出是从Unity到外部的消息。消息包按顺序依次发送，每个信息交换都发送一个，除了第一次，外部通信器发送两个消息以建立连接。消息的结构可以表示如下：
- en: '[PRE72]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: 'The “ICommunicator” interface contains all the declarations of the previous
    functions such as quit/reset the command received. It also sends the academy parameters
    through the communicator using the “Initialize” method:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: “ICommunicator”接口包含之前函数的所有声明，如退出/重置接收到的命令。它还通过“Initialize”方法使用通信器发送学院参数：
- en: '[PRE73]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: 'The “SubscribeBrain” puts a new brain for communication:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: “SubscribeBrain”为通信添加了一个新的大脑：
- en: '[PRE74]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: The PutObservation sends the observations to the agent at each time step of
    external training through communicators. The DecideBatch signals the ICommunicator
    that the agents are ready to receive the action, and if the communicator has not
    received an action for its agents, then it needs to get an action at this point.
    The “GetActions” method gets the agent actions based on the batching procedure(key).
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: PutObservation在每次外部训练的时间步通过通信器将观察结果发送给代理。DecideBatch向ICommunicator发出信号，表示代理已准备好接收动作，如果通信器尚未为其代理接收动作，则它需要在此点获取动作。“GetActions”方法根据批处理程序（键）获取代理动作。
- en: '[PRE75]'
  id: totrans-238
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: There are other scripts associated with the communicator, such as the rpccommunicator
    and UnityRLCapabilities script, which internally implements this Icommunicator
    interface. The most important functionalities of the communicators involve exchange
    of message packets between the Unity brain and the external communicator via port
    number 5004.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 与通信器相关联的其他脚本包括rpccommunicator和UnityRLCapabilities脚本，它们内部实现了这个Icommunicator接口。通信器最重要的功能涉及通过端口号5004在Unity大脑和外部通信器之间交换消息包。
- en: 'This concludes the in-depth analysis of the five main parts of the brain architecture:
    sensors, policies, communicators, inference/Barracuda, and demonstrations. Associated
    folders that are present in the brain architecture include “Editor” and Grpc.
    The Editor folder contains scripts that inherit/implement the four major parts
    of the brain for display in the Editor. The Grpc is a routing protocol that is
    used as a part of the communicator. In the next section, we will understand the
    academy architecture, which involves three major scripts: Agent, Academy, and
    DecisionRequester. These control and coordinate the training activities of the
    agent and its relationship with the environment.'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了对大脑架构五个主要部分的深入分析：传感器、策略、通信器、推理/鳄鱼和演示。存在于大脑架构中的相关文件夹包括“编辑器”和Grpc。编辑器文件夹包含继承/实现大脑四个主要部分的脚本，以便在编辑器中显示。Grpc是一个路由协议，作为通信器的一部分使用。在下一节中，我们将了解学院架构，它涉及三个主要脚本：Agent、Academy和DecisionRequester。这些脚本控制和协调代理的训练活动及其与环境的关系。
- en: Understanding the Academy and Agent
  id: totrans-241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解学院和代理
- en: Now that we have an idea of the brain architecture, we can understand the different
    aspects of the academy, which works in sync with the brain. The academy can be
    considered to be part of the RL environment in Unity, which is responsible for
    controlling the training, episodes, epochs, and the environment variables for
    the agent brain. Accordingly the academy, agent, communicator, and Python API
    are the four major peripherals of the brain that assist the brain with its decision-making
    process. We studied the communicator object in the previous section, and here
    we will see how the academy is also related to the communicator. We will study
    the Academy script, which is associated with the academy architecture. In the
    later sections we will be looking at the “Agent” script and the DecisionRequester
    script.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了大脑架构，我们可以理解学院的不同方面，它与大脑同步工作。学院可以被认为是Unity中RL环境的一部分，负责控制训练、剧集、时代和代理大脑的环境变量。因此，学院、代理、通信者和Python
    API是大脑的四个主要外围设备，帮助大脑进行决策过程。我们在上一节研究了通信者对象，在这里我们将看到学院如何也与通信者相关。我们将研究与学院架构相关的学院脚本。在后面的章节中，我们将查看“Agent”脚本和DecisionRequester脚本。
- en: '**Academy:** The academy, along with the learning brain, is part of the environment,
    while the communicator is used for exchanging message packets between the former
    and the Python API. In the “FixedUpdate” method, the “Academy.Instance.EnvironmentStep()”
    method is called, which is used for setting up the environment for each episode
    of training.'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '**学院**：学院，连同学习大脑，是环境的一部分，而通信者用于在之前和Python API之间交换消息包。在“FixedUpdate”方法中，调用“Academy.Instance.EnvironmentStep()”方法，用于为每个训练剧集设置环境。'
- en: '[PRE76]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: The academy class is a singleton design pattern. The instance is initialized
    the first time it is accessed. After it is initialized, the academy attempts to
    connect to the Python API through the external communicator. In the event that
    no port is available or no message packets are exchanged between the external
    communicator and academy, the external brain will not function. In this case,
    the academy defaults the environment to run in Inference Mode or in Heuristic
    Mode. The communicator interaction is very important, as it interacts directly
    between the Python API and the academy. The script contains some important attributes
    such as the API version, which has to be compatible with the “UnityEnvironment.API_VERSION,”
    the package version, the training port (5004), and the flag for signaling the
    training port (“—mlagents-port”).
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 学院类是一个单例设计模式。实例在第一次访问时初始化。初始化后，学院尝试通过外部通信者连接到Python API。如果没有任何端口可用或外部通信者和学院之间没有交换消息包，外部大脑将无法工作。在这种情况下，学院将默认环境设置为推理模式或启发式模式。通信者交互非常重要，因为它直接在Python
    API和学院之间进行交互。脚本包含一些重要属性，例如API版本，它必须与“UnityEnvironment.API_VERSION”兼容，包版本，训练端口（5004）以及用于指示训练端口的标志（“—mlagents-port”）。
- en: '[PRE77]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: The academy script then follows a lazy initialization procedure, and once initialized,
    the connection remains open for message exchange between the communicator and
    the academy. It then checks whether the communicator is on by using the Boolean
    variable IsCommunicatorOn.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 学院脚本随后遵循懒惰初始化过程，一旦初始化完成，连接将保持开启状态，以便在通信者和学院之间进行消息交换。然后，它使用布尔变量IsCommunicatorOn检查通信者是否开启。
- en: '[PRE78]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: It controls the number of episodes completed, the total episode count of the
    training phase, the total steps completed in a single episode, and the total steps
    completed during the entire simulation. It uses the “ModelRunner” class (discussed),
    to store the neural network model trained in run-time for inference. It also has
    a random seed value for the inference to work.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 它控制完成剧集的数量、训练阶段的总剧集数、单个剧集内完成的总步数以及整个模拟期间完成的总步数。它使用“ModelRunner”类（已讨论），在运行时存储训练好的神经网络模型以进行推理。它还有一个用于推理的随机种子值。
- en: '[PRE79]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE79]'
- en: The important aspect of the academy class is that in the event of a multi-agent
    environment, it maintains a synchronization in communication. This implies that
    the agents perform their steps in a consistent manner and an agent has to act
    based on a particular decision before another agent can request a decision. It
    also has variables such as DecideAction, AgentIncrementStep, and Destroy methods
    to control this synchronization. It controls the reset, action, pre-step, and
    other decisions taken by the agent.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 学院类的重要方面在于，在多智能体环境中，它保持通信的同步。这意味着智能体以一致的方式执行步骤，并且一个智能体在另一个智能体请求决策之前必须基于特定决策采取行动。它还具有诸如DecideAction、AgentIncrementStep和Destroy方法等变量来控制这种同步。它控制智能体的重置、动作、预步骤和其他决策。
- en: '[PRE80]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: It then initializes the agent (“Academy” method) to make sure at least a valid
    agent is present in the scene. The “EnableAutomaticStepping” involves the use
    of “Academy/.EnvironmentStep” method to control the actions and decisions taken
    by the agent and also the environment for training. It is present in a Fixed Update
    method, as it is called for each frame for the agent to take an action, and attaches
    the “AcademyFixedUpdateStepper” component to the agent for this task.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，它初始化智能体（“Academy” 方法）以确保场景中至少有一个有效的智能体存在。“EnableAutomaticStepping” 涉及使用“Academy/.EnvironmentStep”
    方法来控制智能体和训练环境采取的动作和决策。它存在于固定更新方法中，因为它在每一帧都会被调用以使智能体采取行动，并将“AcademyFixedUpdateStepper”
    组件附加到智能体上以执行此任务。
- en: '[PRE81]'
  id: totrans-254
  prefs: []
  type: TYPE_PRE
  zh: '[PRE81]'
- en: The “DisableAutomaticStepping” method is used for manually controlling the academy
    training steps rather than updating it at each frame. Contrary to the Fixed Update
    method, to utilize academy training, we have to manually set the stepping using
    the “Academy.EnvironmentStep” method. It is not recommended generally to disable
    the automatic update for best performance measures during online training with
    academy.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: “DisableAutomaticStepping” 方法用于手动控制学院训练步骤，而不是在每一帧更新它。与固定更新方法相反，为了利用学院训练，我们必须手动使用“Academy.EnvironmentStep”方法来设置步骤。在在线训练中使用学院时，通常不建议禁用自动更新以获得最佳性能指标。
- en: '[PRE82]'
  id: totrans-256
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: The “AutomaticSteppingEnabled” is used for automatic stepping during academy
    training. It chooses between the “DisableAutomaticStepping” and “EnableAutomaticStepping”
    depending on fixed updates are present in the training phase. The next method,
    “ReadPortFromArgs,” reads the port and the associated flag for training. The “EnvironmentParameters”
    are very important in this context as, if curriculum learning (which will be discussed
    later) is used, then the values of the parameters generated from the training
    process can be passed to the academy.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: “AutomaticSteppingEnabled” 用于在学院训练期间自动执行步骤。它根据训练阶段是否存在固定更新在“DisableAutomaticStepping”
    和“EnableAutomaticStepping” 之间进行选择。下一个方法“ReadPortFromArgs” 读取端口和相关的训练标志。“EnvironmentParameters”
    在此上下文中非常重要，因为如果使用课程学习（稍后讨论），则可以从训练过程中生成的参数值传递给学院。
- en: '[PRE83]'
  id: totrans-258
  prefs: []
  type: TYPE_PRE
  zh: '[PRE83]'
- en: The “StatsRecorder” method records the statistics of a particular academy being
    trained in Unity. The “InitializeEnvironment” method is used for initializing
    the environment and registering the side channels (part of communicators) for
    information exchange. The side channels will be particularly useful when we see
    how to pass information between the Jupyter Notebook and Unity when training a
    model. It allows us to register the observation and action space and has certain
    attributes to control the simulated training. The next step involves starting
    the port and establishing the connection with the external communicator (“rpcCommunicator”).
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: “StatsRecorder” 方法用于记录在Unity中训练的特定学院统计数据。“InitializeEnvironment” 方法用于初始化环境和注册用于信息交换的侧通道（通信器的一部分）。当我们在训练模型时看到如何在Jupyter
    Notebook和Unity之间传递信息时，侧通道将特别有用。它允许我们注册观察和动作空间，并具有某些属性来控制模拟训练。下一步是启动端口并建立与外部通信器的连接（“rpcCommunicator”）。
- en: '[PRE84]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE84]'
- en: If the communicator is not connected, a new attempt to start the link between
    the UnityRLParameters and the communicator is started. Based on the outcome, if
    the communicator fails to respond due to no Python process being in the training
    state, then the academy defaults to “Inference” mode of learning. It also issues
    a warning stating that in the event of not being able to connect with the trainer
    on port 5004, with the current “API_VERSION,” the academy forces the brain to
    use the inference module and its associated policies.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 如果通信者未连接，将启动一个新的尝试，在UnityRLParameters和通信者之间建立连接。根据结果，如果通信者由于没有Python进程处于训练状态而无法响应，则学院默认进入“推理”模式进行学习。它还发出警告，说明如果无法通过端口5004连接到训练者，并且当前“API_VERSION”的情况下，学院将强制大脑使用推理模块及其相关策略。
- en: '[PRE85]'
  id: totrans-262
  prefs: []
  type: TYPE_PRE
  zh: '[PRE85]'
- en: The next few code segments are related to recording the different statistics
    of the training environment, such as episodes, number of episodes, resetting the
    environment, steps completed in a particular episode, and others. Another interesting
    aspect is that the Academy script uses the “GetOrCreateModel” method from the
    ModelRunner class, which we talked about in the inference module of the brain.
    This is required because in case the communicator is not connected, the academy
    resorts to the inference module, which runs on the Barracuda Engine and uses the
    ModelRunner script. Internally as we have studied, this script uses the BrainParameters
    script to make the decisions depending on the pretrained neural network, inference
    policy, and the inference device. The “Dispose” method disposes the connection
    if the training is completed by closing the communication and side channels with
    the communicator. Once the training/inference is completed, the academy resets
    itself, so that when we would want to train again using the internal or the external
    brain, it should connect with the inference or communicator module, respectively.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的几个代码段与记录训练环境的各种统计数据有关，例如集数、集数数量、重置环境、特定集中的完成步骤，以及其他数据。另一个有趣的方面是，学院脚本使用来自ModelRunner类的“GetOrCreateModel”方法，我们之前在推理模块中讨论过。这是必要的，因为如果通信者未连接，学院将回退到推理模块，该模块在Barracuda引擎上运行并使用ModelRunner脚本。正如我们所研究的，该脚本使用BrainParameters脚本根据预训练神经网络、推理策略和推理设备做出决策。“Dispose”方法在通过关闭与通信者的通信和侧通道完成训练后释放连接。一旦训练/推理完成，学院会重置自己，这样当我们想要再次使用内部或外部大脑进行训练时，它应该分别连接到推理或通信模块。
- en: The entire workflow of the academy involves controlling the package versions,
    port number, API compatibility with Python along with controlling the episodes
    and steps in an episode during training. It also plays an important role in connecting
    the communicator with the brain for real-time training and also provides selection
    between the enable or disable environment steps option. It also controls the choice
    of brain to run the model based on whether the communicator sends a feedback message
    packet ensuring connection establishment. If connection is made, the online training
    procedure is triggered, which trains the external brain of the agent with Tensorflow
    through the Python API. If connection is not made, then the inference model is
    assigned to the brain. To conclude, this architecture controls all the environmental
    attributes required by the brain to train its policies. This is shown in Figure
    [4-14](#Fig14).
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 学院的整体工作流程涉及控制软件包版本、端口号、与Python的API兼容性，以及在训练过程中控制一集的各个步骤。它还在连接通信者与大脑以进行实时训练中扮演着重要角色，并提供启用或禁用环境步骤选项的选择。它还根据通信者是否发送反馈消息包以确保连接建立来控制大脑运行模型的选择。如果建立了连接，则触发在线训练程序，该程序通过Python
    API使用Tensorflow训练代理的外部大脑。如果没有建立连接，则将推理模型分配给大脑。总之，该架构控制了大脑训练其策略所需的所有环境属性。这如图[4-14](#Fig14)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig14_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig14_HTML.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig14_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig14_HTML.png)'
- en: Figure 4-14
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-14
- en: Academy layer linked with the brain in ML Agents
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 与ML Agents中的大脑相连的学院层
- en: '**Agent:** Since this script is particularly large, we will look into the important
    aspects of it. As mentioned, the agent uses the brain–academy architecture to
    make its decisions and corresponding actions. It has certain parameters that control
    the action space, whether continuous or discrete. For discrete spaces, the DiscreteActionMasks
    Boolean array controls the decision branches the agent will not take. It has the
    rewards, maximum steps reached in a training simulation period, and a corresponding
    episode ID. The AgentActions struct contains the float array vectorActions. As
    mentioned before, the agent receives the observation inputs through the sensor
    layer of the brain (ray/sphere/camera) and passes it to the different policies
    present in the policy layer of the brain to make corresponding decisions. Based
    on the availability of the communicator and the associated port, the academy decides
    whether to train the agent on external policy (real-time Tensorflow training)
    or in inference policy. The academy then passes this information to the BehaviorParameters
    script of the brain with an associated behavior type (default, inference only,
    heuristic only). There are also certain important variables that control the cumulative
    reward, completed episodes, step count, agent information, request decision, and
    request action. It also contains observation sensors and a list of sensors present
    in the agent prefab for the sensor module of the brain. For imitation learning,
    it also contains the DemonstrationWriters variable for writing the observations(heuristic
    policy) in the .demo file, which we studied in the “demonstrations” module of
    the brain.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理**：由于这个脚本特别大，我们将探讨其重要方面。正如所述，代理使用大脑-学院架构来做出决策和相应的动作。它有一些参数来控制动作空间，无论是连续的还是离散的。对于离散空间，DiscreteActionMasks布尔数组控制代理不会采取的决策分支。它包含奖励、训练模拟期间达到的最大步数以及相应的剧集ID。AgentActions结构体包含float数组vectorActions。如前所述，代理通过大脑（射线/球体/相机）的传感器层接收观察输入，并将其传递给大脑策略层中存在的不同策略，以做出相应的决策。根据通信者和相关端口的可用性，学院决定是在外部策略（实时Tensorflow训练）还是在推理策略上训练代理。学院然后将此信息传递给大脑的BehaviorParameters脚本，并附带一个相关的行为类型（默认，仅推理，仅启发式）。还有一些重要的变量控制累积奖励、完成的剧集、步数、代理信息、请求决策和请求动作。它还包含观察传感器和大脑代理预制件中存在的传感器列表，用于大脑的传感器模块。对于模仿学习，它还包含DemonstrationWriters变量，用于在.demo文件中写入观察（启发式策略），这是我们在大脑的“演示”模块中研究的。 '
- en: The “OnBeforeSerialize” and “OnAfterDeserialize” methods are used for serialization
    of the agent parameters (decisions, steps, max steps, actions). The “LazyInitialize”
    method initializes the agent with the associated episode ID, agent information,
    policy (from the policies module of brain, BehaviorParameters), and sensors. It
    also initializes step increments in each episode of training (AgentIncrementStep),
    the decision that is to be taken by the agent (DecideAction), the action step
    of the agent (AgentAct), the agent send state (AgentSendState), and AgentForceReset,
    which resets the agent parameters. The methods ResetData, Initialize, and InitializeSensors
    are important for the workflow of the agent.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: “OnBeforeSerialize”和“OnAfterDeserialize”方法用于代理参数（决策、步骤、最大步骤、动作）的序列化。 “LazyInitialize”方法使用相关的剧集ID、代理信息、策略（来自大脑的策略模块，BehaviorParameters）和传感器初始化代理。它还在每个训练剧集（AgentIncrementStep）中初始化步骤增量，确定代理将要采取的决策（DecideAction），代理的动作步骤（AgentAct），代理发送状态（AgentSendState），以及AgentForceReset，该操作重置代理参数。ResetData、Initialize和InitializeSensors方法对于代理的工作流程非常重要。
- en: '[PRE86]'
  id: totrans-270
  prefs: []
  type: TYPE_PRE
  zh: '[PRE86]'
- en: The “DoneReason” enum contains details such as DoneCalled, MaxStepReached, and
    Disabled, which signals the agent that the goal is reached or the training has
    stopped, the maximum steps that the agent reached, and whether the agent is disabled.
    The next important method is “NotifyAgentDone ,” which marks the agent as done;
    this implies that the agent has reached a goal or the training has been terminated.
    This contains the rewards attained by the agent, the episode ID of the completed
    episode, and also collects decisions with the “CollectObservations” method. Since
    we mentioned that the last action is taken up by the agent in the successive training
    step, this is achieved by the “m_Brain?.RequestDecision” method. After the decision
    taken by the agent, the sensors are reset using the “ResetSensors” method. Now
    along with inference and external training, we also have demonstrators that rely
    on heuristic control. For that the agent selects the decision based on the contents
    of the “.demo” file and also writes the new set of rewards and actions through
    the “Record” method. For each episode, the rewards are calculated along with the
    decisions, and at the end of the episode, the array containing the details of
    that particular episode is cleared. The rewards are set to 0, and the request
    decision/request action variables are set to false. This method actually signals
    the agent to write the observations once the goal is reached by following a particular
    policy.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: “DoneReason”枚举包含诸如DoneCalled、MaxStepReached和Disabled等详细信息，这些信息向代理发出信号，表明目标已达成或训练已停止，代理达到的最大步数，以及代理是否被禁用。下一个重要的方法是“NotifyAgentDone”，该方法将代理标记为完成；这表示代理已达成目标或训练已被终止。此方法包含代理获得的奖励，完成剧集的剧集ID，并使用“CollectObservations”方法收集决策。由于我们提到最后一步是由代理在连续的训练步骤中采取的，这是通过“m_Brain?.RequestDecision”方法实现的。在代理做出决策后，使用“ResetSensors”方法重置传感器。现在，除了推理和外部训练之外，我们还有依赖于启发式控制的演示者。为此，代理根据“.demo”文件的内容选择决策，并通过“Record”方法记录新的奖励和动作集。对于每个剧集，奖励与决策一起计算，并在剧集结束时，清除包含该特定剧集详细信息的数组。奖励被设置为0，请求决策/请求动作变量被设置为false。此方法实际上在代理通过遵循特定策略达成目标后，向代理发出写入观察的信号。
- en: '[PRE87]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE87]'
- en: The “SetModel” method is similar to BehaviorParameters, which decides which
    model to use based on inference, external training model, or heuristic policy.
    The “ReloadPolicy” method reloads the current policy that the agent is using at
    the start of a particular episode. The “SetReward” method offers an implementation
    of the rewards attained by the agent during training. It is important to note
    that the rewards are used only during external brain training state in RL and
    not in inference mode. This method replaces any rewards added to the agent during
    the current training time step.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: “SetModel”方法类似于BehaviorParameters，它根据推理、外部训练模型或启发式策略决定使用哪个模型。 “ReloadPolicy”方法在特定剧集开始时重新加载代理正在使用的当前策略。
    “SetReward”方法提供了代理在训练期间获得的奖励的实现。重要的是要注意，奖励仅在RL的外部大脑训练状态下使用，而不是在推理模式下使用。此方法替换了在当前训练时间步中添加到代理的任何奖励。
- en: '[PRE88]'
  id: totrans-274
  prefs: []
  type: TYPE_PRE
  zh: '[PRE88]'
- en: The “GetCumulativeReward” method is used to get the cumulative rewards for the
    episode. The “UpdateRewardStates” method is used to update the rewards based on
    the policy used by the agent and depends on the BehaviorType. The “RequestAction”
    method is used to repeat the previous action taken by the agent according to the
    decision (latest) from its policies. In many cases a new decision may not be requested—for
    example, an agent may use the previous decision to translate along an axis. Here
    the agent uses the “RequestAction” method to stay on its course, the decision
    is called when the agent wants to change its course or its velocity/acceleration/force.
    The “ResetData” method resets the brain parameters, the observation/action spaces,
    and the vectors (discrete/continuous). Inside the “Initialize” method, there is
    a heuristic method that uses the “Input.GetAxis” to maneuver the agent along different
    axes. This is more or less a use-controlled heuristic policy that is used in case
    the demonstrations policy (imitation learning) is triggered by the brain.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: “GetCumulativeReward”方法用于获取该场景的累积奖励。 “UpdateRewardStates”方法用于根据智能体使用的策略和BehaviorType更新奖励。
    “RequestAction”方法用于根据智能体策略的最新决策（最新决策）重复之前采取的动作。在许多情况下，可能不会请求新的决策——例如，智能体可能使用之前的决策来沿一个轴进行平移。在这里，智能体使用“RequestAction”方法保持其航向，当智能体想要改变其航向或其速度/加速度/力时，会调用决策。
    “ResetData”方法重置大脑参数、观察/动作空间和向量（离散/连续）。在“Initialize”方法内部，有一个使用“Input.GetAxis”来操纵智能体沿不同轴移动的启发式方法。这基本上是一个使用控制的启发式策略，在演示策略（模仿学习）由大脑触发时使用。
- en: '[PRE89]'
  id: totrans-276
  prefs: []
  type: TYPE_PRE
  zh: '[PRE89]'
- en: The “IntializeSensors” method relies on the sensor module of the brain and uses
    its methods such as acquiring the child sensors of the agent, controlling the
    stacked observations of vectors (VectorSensor and BrainParameter scripts)and other
    attributes. This method is like an interface that signals the sensor module of
    the brain to record the observations in the vector container(float array). The
    SendInfoToBrain sends the sensor information taken by the agent to the brain,
    which can then work on this data. As mentioned, this information is passed to
    the policies module of the brain. Here the academy plays a role—if the communicator
    is connected, external real-time training policy is taken up and the agent is
    trained using that policy. If not, the information is sent to the inference module
    of the brain, where the Barracuda Engine runs an associated pretrained neural
    network model. The “RequestDecision” method (discussed) then uses these observations
    from sensors and the policy of the brain to let the agent make a particular decision
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: “IntializeSensors”方法依赖于大脑的传感器模块，并使用其方法，例如获取智能体的子传感器、控制向量的堆叠观察（VectorSensor和BrainParameter脚本）和其他属性。此方法类似于一个接口，向大脑的传感器模块发出信号，记录在向量容器（float数组）中的观察结果。SendInfoToBrain将智能体采集的传感器信息发送到大脑，大脑可以处理这些数据。如前所述，这些信息传递到大脑的策略模块。在这里，学院扮演了一个角色——如果通信器连接，则采用外部实时训练策略，并使用该策略训练智能体。如果没有，则信息发送到大脑的推理模块，其中Barracuda引擎运行相关的预训练神经网络模型。“RequestDecision”方法（已讨论）然后使用来自传感器的这些观察结果和大脑的策略，让智能体做出特定的决策。
- en: '[PRE90]'
  id: totrans-278
  prefs: []
  type: TYPE_PRE
  zh: '[PRE90]'
- en: The other methods, “GetAction” and ”ScaleAction,” are used by the agent to convert
    those decisions taken into actions. The “CollectDiscreteActionMasks()” method
    is used to mask certain discrete actions, which the agent will not perform. Lastly,
    the “OnActionReceived” method signifies the actions taken by the agent based on
    the decision policy. For continuous cases, a float array is returned and this
    should be clamped to increase stability in training, and for discrete cases, the
    action space consists of the branches (e.g., input up arrow key signifies agent
    moving forward and vice versa).
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 其他方法，“GetAction”和“ScaleAction”，由智能体用于将那些决策转换为动作。“CollectDiscreteActionMasks()”方法用于屏蔽某些离散动作，智能体将不会执行这些动作。最后，“OnActionReceived”方法表示智能体根据决策策略采取的动作。对于连续情况，返回一个浮点数组，并且应该将其夹紧以增加训练的稳定性；对于离散情况，动作空间由分支组成（例如，向上箭头键表示智能体向前移动，反之亦然）。
- en: To summarize, the agent script relies on the brain and academy to choose its
    decision and accordingly takes its action and gets rewards. The initialization
    stage includes assigning the values of brain parameters, agent parameters and
    setting up the reward functions for the environment. The agent attains the input
    information from the sensor module of the brain and passes it to the brain for
    processing. The academy then confirms whether to use external brain or internal
    brain, depending on the connection established by the communicator module. Based
    on that, respective policies are applied to the agent to make its decisions. The
    decision aspect invokes the agent to take actions. The results of the actions
    can be either a credit of positive or negative reward for the agent. Depending
    on whether the goal is reached or the rewards are attained, this process of requesting
    sensor information and processing it with the policies and providing actions continues.
    At the end of each episode, the agent is reset and all the agent parameters are
    reset.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，代理脚本依赖于大脑和学院来选择其决策，并据此采取行动并获得奖励。初始化阶段包括分配大脑参数、代理参数的值，以及为环境设置奖励函数。代理从大脑的传感器模块获取输入信息，并将其传递给大脑进行处理。学院随后根据通信模块建立的连接确认是否使用外部大脑或内部大脑。基于此，相应的策略被应用于代理以使其做出决策。决策方面会调用代理采取行动。行动的结果可以是代理获得正或负奖励的信用。根据是否达到目标或获得奖励，这个过程会继续请求传感器信息，并使用策略进行处理，然后提供行动。在每个场景结束时，代理会被重置，所有代理参数也会重置。
- en: The last script that we will discuss is the “DecisionRequester” script.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要讨论的最后一个脚本是“DecisionRequester”脚本。
- en: '**DecisionRequester** **:** This script automatically requests decisions for
    an agent. This is a script that is required to be attached to an agent in our
    scene. It controls the frequency at which the agent will request the decisions,
    in units of academy time-steps. For instance, a value of 5 implies that the agent
    will request the decision after 5 academy time-steps. It controls the choice about
    whether the agent will take actions between decisions in academy time-steps, such
    as the example mentioned in the “agent” script. It also initializes the agent
    class.'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: '**DecisionRequester** **:** 此脚本会自动为代理请求决策。这是我们场景中需要附加到代理上的脚本。它控制代理请求决策的频率，以学院时间步为单位。例如，值为5表示代理将在5个学院时间步之后请求决策。它控制代理在学院时间步之间是否采取行动的选择，例如在“agent”脚本中提到的示例。它还初始化代理类。'
- en: '[PRE91]'
  id: totrans-283
  prefs: []
  type: TYPE_PRE
  zh: '[PRE91]'
- en: The method “MakeRequests” uses the decisions from the academy to inform the
    agent about whether or not it should request a decision or take actions between
    decisions.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 方法“MakeRequests”使用来自学院的决策来通知代理是否应该在决策之间请求决策或采取行动。
- en: '[PRE92]'
  id: totrans-285
  prefs: []
  type: TYPE_PRE
  zh: '[PRE92]'
- en: That completes the entire architecture of the brain, academy, and agent in depth.
    We now have a fair understanding about the different scripts in the brain/academy
    section and have also studied the interactions between them. The link between
    the different parts of the brain, academy, and agent can be illustrated as shown
    in Figure [4-15](#Fig15).
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 这样就完成了大脑、学院和代理的整个架构的深入探讨。我们现在对大脑/学院部分的不同脚本有了相当的了解，并且也研究了它们之间的交互。大脑、学院和代理不同部分之间的联系可以如图[4-15](#Fig15)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig15_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig15_HTML.png)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig15_HTML.png](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig15_HTML.png)'
- en: Figure 4-15
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-15
- en: Brain academy architecture linked with agent
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 与代理相连的大脑学院架构
- en: There are certain scripts that require knowledge of deep learning in this module
    and will be discussed later, especially the ModelOverrider script. In the next
    section, with this knowledge, we will build a small deep learning agent in Unity
    and train it with Unity ML Agents.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 在本模块中，某些脚本需要具备深度学习知识，将在稍后讨论，特别是ModelOverrider脚本。在下一节中，我们将利用这些知识在Unity中构建一个小型深度学习代理，并使用Unity
    ML Agents对其进行训练。
- en: Training an ML Agent with a Single Brain
  id: totrans-291
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用单个大脑训练ML代理
- en: In this section, we will create a simple agent whose task is to find the target
    object present in the scene. Only this time we will be using our own agent script
    implementation to train it with Unity ML Agents. For this, we have to navigate
    to the Assets folder under the DeepLearning folder and navigate to FindingBlock-PPO
    folder. We have to open up the findingblock Unity scene file. In this scene, the
    blue agent has to locate the green target with the help of ML Agents and sensors.
    It is surrounded in a bounding box platform. A sample preview of the scene looks
    similar to Figure [4-16](#Fig16).
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将创建一个简单的智能体，其任务是找到场景中存在的目标对象。这一次，我们将使用我们自己的智能体脚本实现来使用 Unity ML Agents
    进行训练。为此，我们必须导航到 DeepLearning 文件夹下的 Assets 文件夹，并导航到 FindingBlock-PPO 文件夹。我们必须打开
    findingblock Unity 场景文件。在这个场景中，蓝色智能体必须在 ML Agents 和传感器的帮助下定位绿色目标。它被包围在一个边界框平台上。场景的样本预览看起来类似于图
    [4-16](#Fig16)。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig16_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig16_HTML.jpg)'
  id: totrans-293
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig16_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig16_HTML.jpg)'
- en: Figure 4-16
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-16
- en: Finding block scene in Unity ML Agents
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: Unity ML Agents 中的寻找方块场景
- en: Attach Behavior Parameters Script
  id: totrans-296
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 附加行为参数脚本
- en: '**Behavior Parameters** **:** Now in this case, since we have to use external
    brain for training our agent in ML Agents, the first objective is to attach all
    the necessary components to the blue agent. For this the most important part is
    to associate a brain for the agent, and in this case we will attach the “BehaviorParameters”
    script to the blue agent. Now as we have mentioned, this controls all the vector
    observations, stacked vectors, the action space, inference device, and child sensors.
    For our case, we will keep most of the details with the default values except
    the space size of the vector observation. This is because in our case, the agent
    can move along x and z axes. For each axis, the agent can move in the positive
    and negative direction—hence the possible space of observation is two along a
    single axis. For both x and z axes, the total vector observation space becomes
    2*2, which is 4\. We know internally there is a float array that is present in
    the vector observations section, numbered from 0 to 3.'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: '**行为参数** **:** 在这个案例中，由于我们必须使用外部大脑在 ML Agents 中训练我们的智能体，首要目标是把所有必要的组件附加到蓝色智能体上。为此，最重要的部分是为智能体关联一个大脑，在这种情况下，我们将“BehaviorParameters”脚本附加到蓝色智能体上。正如我们之前提到的，这控制了所有向量观察、堆叠向量、动作空间、推理设备和子传感器。在我们的案例中，我们将保留大部分细节使用默认值，除了向量观察的空间大小。这是因为在我们的案例中，智能体可以在
    x 和 z 轴上移动。对于每个轴，智能体可以朝正负方向移动——因此观察的可能空间是一个轴上的两个。对于 x 和 z 轴，总的向量观察空间变为 2*2，即 4。我们知道在向量观察部分内部有一个浮点数组，编号从
    0 到 3。'
- en: '**Ray Perception Sensor Component 3D** : We will attach this script, as it
    is associated with the Sensors module of the brain and is used for collecting
    observations in the scene. We will keep most of the default values as it is, such
    as angles, rays in each direction, ray length, and so forth, or we can change
    them accordingly. We have to define the detectable tags that the agent has to
    observe. In this case, the agent should only observe the target and the wall boundary
    of the platform; and those detectable tags are mentioned accordingly. Figure [4-17](#Fig17)
    shows this setup in Unity.'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: '**三维射线感知传感器组件** : 我们将附加此脚本，因为它与大脑的传感器模块相关联，并用于收集场景中的观察数据。我们将保留大部分默认值，例如角度、每个方向上的射线、射线长度等，或者我们可以相应地更改它们。我们必须定义智能体必须观察的可检测标签。在这种情况下，智能体应该只观察目标和平台墙壁边界；相应的可检测标签已列出。图
    [4-17](#Fig17) 显示了在 Unity 中的此设置。'
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig17_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig17_HTML.jpg)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig17_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig17_HTML.jpg)'
- en: Figure 4-17
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-17
- en: RayPerceptionSensorComponent3D script attached to agent
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 将 RayPerceptionSensorComponent3D 脚本附加到智能体
- en: '**Decision Requester** **:** This script is also attached to the agent, as
    it helps in the decision-making process, as discussed before. We will keep the
    default values here.'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: '**决策请求器** **:** 这个脚本也附加到智能体上，因为它有助于决策过程，如前所述。我们将保留这里的默认值。'
- en: '**Model Overrider** **:** We have to attach this script to override our training
    model in run-time or during Inference. We will study this script in the next chapter.'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: '**模型覆盖器** **:** 我们必须将此脚本附加到在运行时或推理期间覆盖我们的训练模型。我们将在下一章研究此脚本。'
- en: That was all the associated scripts we had to attach to associate a brain to
    the agent. Now we have to write our own script to handle the agent and also design
    a reward function for our RL problem.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是我们将要附加到将大脑与智能体关联的所有相关脚本。现在我们必须编写自己的脚本以处理智能体，并且还要为我们的强化学习问题设计一个奖励函数。
- en: Writing Agent Script
  id: totrans-305
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编写智能体脚本
- en: 'For this context, we will open the findingblockAgent script. Since in this
    script we will be using dependencies from the ML Agents framework, we have to
    include some libraries, particularly the Unity.MLAgents and Unity.MlAgents.Sensors:'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 在此上下文中，我们将打开findingblockAgent脚本。由于在这个脚本中我们将使用来自ML Agents框架的依赖项，我们必须包含一些库，特别是Unity.MLAgents和Unity.MlAgents.Sensors：
- en: '[PRE93]'
  id: totrans-307
  prefs: []
  type: TYPE_PRE
  zh: '[PRE93]'
- en: Now this script inherits from the Agent script that we discussed in the previous
    section, which implies that we can now modify all the different attributes of
    the Agent script (episodes, rewards, decisions, actions) according to our needs.
    We will initialize the GameObjects, such as agents and targets, in the scene and
    also associate Rigidbodies to them so that we can apply a Force on the agent along
    the direction of its motion. Along with these, we also have variables for controlling
    the texture color of the platform. This is because once the agent reaches the
    goal, we want the platform to be lit in green color.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 现在这个脚本继承自我们在上一节中讨论的Agent脚本，这意味着我们现在可以根据我们的需求修改Agent脚本的所有不同属性（阶段、奖励、决策、动作）。我们将在场景中初始化GameObject，例如智能体和目标，并将刚体关联到它们上，这样我们就可以在智能体的运动方向上对其施加力。除此之外，我们还有控制平台纹理颜色的变量。这是因为一旦智能体达到目标，我们希望平台被绿色照亮。
- en: '[PRE94]'
  id: totrans-309
  prefs: []
  type: TYPE_PRE
  zh: '[PRE94]'
- en: Now there are certain override methods that we will use in our script. The first
    overridden method is Initialize. In this method, we will initialize the agent,
    target, and the platform
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将在脚本中使用某些重写的方法。第一个重写的方法是Initialize。在这个方法中，我们将初始化智能体、目标和平台。
- en: '[PRE95]'
  id: totrans-311
  prefs: []
  type: TYPE_PRE
  zh: '[PRE95]'
- en: The next overridden method is “CollectObservations,” which takes as input the
    sensors from the “VectorSensor” class. Since, in our case, we will be using ray
    sensors module of the brain, the Boolean variable “vectorObs” results in true.
    The “sensor.AddObservation” method collects the sensor information in the form
    of a float vector.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个重写的函数是“CollectObservations”，它接受来自“VectorSensor”类的传感器作为输入。由于在我们的案例中，我们将使用大脑的射线传感器模块，布尔变量“vectorObs”结果为true。
    “sensor.AddObservation”方法以浮点向量的形式收集传感器信息。
- en: '[PRE96]'
  id: totrans-313
  prefs: []
  type: TYPE_PRE
  zh: '[PRE96]'
- en: Since, we also require a default heuristic policy for our brain, we override
    the Heuristic method. This is a straightforward heuristic implementation where
    we use the W, A, S, and D keys to control our agent. For this we use the “Input.GetKey”
    method from Unity, and fill in the “actionOut” float array(contains the action
    spaces).
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们还需要为我们的大脑提供一个默认的启发式策略，我们重写了Heuristic方法。这是一个简单的启发式实现，我们使用W、A、S和D键来控制我们的智能体。为此，我们使用Unity的“Input.GetKey”方法，并填写“actionOut”浮点数组（包含动作空间）。
- en: '[PRE97]'
  id: totrans-315
  prefs: []
  type: TYPE_PRE
  zh: '[PRE97]'
- en: The next overridden method is MoveAgent script that controls the motion of the
    agent. Since we are using the discrete action space, the agent can take decisions
    based on branching. As mentioned, the agent can move along both directions in
    the x and z planes, and for each action the agent takes, a force is applied to
    it. This helps the agent to move along the direction, rotation proposed by the
    action vector.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个重写的函数是控制智能体运动的MoveAgent脚本。由于我们使用的是离散动作空间，智能体可以根据分支做出决策。如前所述，智能体可以在x和z平面的两个方向上移动，并且对于智能体采取的每个动作，都会对其施加一个力。这有助于智能体沿着动作向量提出的方向和旋转移动。
- en: '[PRE98]'
  id: totrans-317
  prefs: []
  type: TYPE_PRE
  zh: '[PRE98]'
- en: The next overridden method is “OnActionReceived,” which is used to credit the
    agent with rewards based on whether the agent has reached the target in that episode
    of training or not. Correspondingly, we call the “MoveAgent” method here for each
    step of the episode. The “AddReward” method adds the rewards. We can also use
    “SetRewards” to replace the rewards received with a single reward that the agent
    will receive on reaching the target.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个重写的函数是“OnActionReceived”，它根据智能体是否在该训练阶段达到了目标来给智能体分配奖励。相应地，我们在每个阶段的每一步都调用“MoveAgent”方法。
    “AddReward”方法添加奖励。我们还可以使用“SetRewards”用一个智能体达到目标时将收到的单个奖励来替换收到的奖励。
- en: '[PRE99]'
  id: totrans-319
  prefs: []
  type: TYPE_PRE
  zh: '[PRE99]'
- en: The last overridden method is “OnEpisodeBegin,” and as the name suggests, this
    controls the events that are required at the start of a particular training episode.
    This calls the reset() method, which is used to set the position of the target
    and the blue agent to a random start position within the platform. If in any case
    the blue agent goes below the surface of the platform, the “EndEpisode” method
    is signaled. This instructs the ML Agents architecture to start the next episode
    of training.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个覆盖方法是“OnEpisodeBegin”，正如其名称所暗示的，它控制特定训练场景开始时所需的事件。它调用reset()方法，该方法用于将目标位置和蓝色代理设置在平台内的一个随机起始位置。如果在任何情况下蓝色代理低于平台表面，则发出“EndEpisode”方法信号。这指示ML
    Agents架构开始下一个训练场景。
- en: '[PRE100]'
  id: totrans-321
  prefs: []
  type: TYPE_PRE
  zh: '[PRE100]'
- en: Those are all the overridden methods that are required in any traditional sensor(ray
    sensor)-based ML Agents agent in Unity. There are associated functions such as
    “OnCollisionEnter,” which checks if the agent has reached the green target and
    uses the “SetReward” method to set the agent rewards or if it has collided with
    the wall in which case the SetReward method credits a negative reward to simulate
    punishment.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是在Unity中任何基于传统传感器（射线传感器）的ML Agents代理中所需的所有覆盖方法。这些方法有关联的函数，例如“OnCollisionEnter”，它检查代理是否到达了绿色目标，并使用“SetReward”方法设置代理奖励，或者如果代理与墙壁发生碰撞，在这种情况下，SetReward方法会给予一个负奖励以模拟惩罚。
- en: '[PRE101]'
  id: totrans-323
  prefs: []
  type: TYPE_PRE
  zh: '[PRE101]'
- en: The reset method resets the agent by choosing any angle in range (0-360 degrees)
    for its direction and a random transform location along the x and z axes. Similarly
    the green target is also initialized at a random transform position at the start
    of each episode.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 重置方法通过选择（0-360度）范围内的任意角度来设置其方向，并在x和z轴上随机选择一个变换位置来重置代理。同样，绿色目标在每个场景开始时也会随机初始化到一个变换位置。
- en: '[PRE102]'
  id: totrans-325
  prefs: []
  type: TYPE_PRE
  zh: '[PRE102]'
- en: The “Lightupground” Enumerator lights up the platform surface by changing the
    material of the ground renderer to green, which asserts that the agent has reached
    the green target.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: “Lightupground”枚举器通过将地面渲染器的材质更改为绿色来点亮平台表面，这表明代理已经到达了绿色目标。
- en: '[PRE103]'
  id: totrans-327
  prefs: []
  type: TYPE_PRE
  zh: '[PRE103]'
- en: That concludes the findingblockAgent script, which is required for our blue
    agent to reach the green target or to find it. We will attach this script to the
    blue agent, and now we have to train this agent in Tensorflow and Unity ML Agents.
    To summarize we just have to override certain methods of the “Agent” script to
    make our own RL environment and agent in it. This is the ease of creation of a
    simulated RL environment which leverages the deep learning algorithms of Unity
    ML agents and the OpenAI Gym wrapper.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 这就完成了寻找块代理脚本，这是我们的蓝色代理到达绿色目标或找到它所必需的。我们将把这个脚本附加到蓝色代理上，现在我们必须在Tensorflow和Unity
    ML Agents中训练这个代理。总结一下，我们只需覆盖“Agent”脚本中的某些方法来创建我们自己的强化学习环境及其中的代理。这是利用Unity ML代理的深度学习算法和OpenAI
    Gym包装器创建模拟强化学习环境的便利性。
- en: Training Our Agent
  id: totrans-329
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练我们的代理
- en: By now, we are familiar with training agent using the default PPO algorithm
    implemented in Unity ML Agents. So we will open our Anaconda prompt and type the
    mlagents learn command. We will use the “trainer_config.yaml” file (like in the
    last chapter), and since we have not created any hyperparameters particular to
    this “FindingBlock-PPO” Unity scene, we will use the default hyperparameter set
    present in the “yaml” file.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经熟悉了使用Unity ML Agents中实现的默认PPO算法来训练代理。因此，我们将打开我们的Anaconda提示符并输入mlagents
    learn命令。我们将使用“trainer_config.yaml”文件（如上一章所述），因为我们尚未为这个“FindingBlock-PPO”Unity场景创建任何特定的超参数，我们将使用“yaml”文件中存在的默认超参数集。
- en: '[PRE104]'
  id: totrans-331
  prefs: []
  type: TYPE_PRE
  zh: '[PRE104]'
- en: On writing this command, we will see the Unity logo with the Tensorflow API
    version, Unity package version, and Python API version. When prompted, we have
    to click the Play button in the Unity Editor to start the training process, as
    shown in Figure [4-18](#Fig18).
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 在编写此命令时，我们将看到带有Tensorflow API版本、Unity包版本和Python API版本的Unity标志。当提示时，我们必须在Unity编辑器中点击播放按钮以开始训练过程，如图[4-18](#Fig18)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig18_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig18_HTML.jpg)'
  id: totrans-333
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig18_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig18_HTML.jpg)'
- en: Figure 4-18
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-18
- en: Training “FindingBlockAgent” with Tensorflow (external brain)
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Tensorflow（外部大脑）训练“FindingBlockAgent”
- en: 'We will also see the list of the default hyperparameters and the outcome of
    each training episode. Now we internally can connect that the academy exchanges
    information packets with the communicator (port: 5004) to allow the training process.
    We can also connect with how the external brain is now training with the default
    policy of the “BehaviorParameters” script attached to the agent, as shown in Figure
    [4-19](#Fig19).'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将看到默认超参数的列表以及每个训练阶段的输出。现在我们可以内部连接，学院通过通信器（端口：5004）交换信息包以允许训练过程。我们还可以连接外部大脑现在如何使用附加到智能体的“BehaviorParameters”脚本的默认策略进行训练，如图[4-19](#Fig19)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig19_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig19_HTML.jpg)'
  id: totrans-337
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig19_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig19_HTML.jpg)'
- en: Figure 4-19
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-19
- en: Training episodes with PPO algorithm in ML Agents
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 使用PPO算法在ML Agents中的训练阶段
- en: During training, we can also move over to the Scene View to see how the ray
    sensors are detecting the tagged objects in the scene, as shown in Figure [4-20](#Fig20).
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，我们还可以切换到场景视图，查看射线传感器如何检测场景中的标记对象，如图[4-20](#Fig20)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig20_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig20_HTML.jpg)'
  id: totrans-341
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig20_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig20_HTML.jpg)'
- en: Figure 4-20
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-20
- en: Ray sensors detecting tags during Tensorflow training
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: Tensorflow训练期间检测标记的射线传感器
- en: Visualize with TensorBoard
  id: totrans-344
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用TensorBoard进行可视化
- en: 'Now we will visualize this learning in TensorBoard. We have already explored
    how to do that in the previous chapter. We have to navigate to the “config” folder
    of ML Agents and then we have to type the command:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将使用TensorBoard可视化这个学习过程。我们已经在上一章中探讨了如何做到这一点。我们必须导航到ML Agents的“config”文件夹，然后我们必须输入以下命令：
- en: '[PRE105]'
  id: totrans-346
  prefs: []
  type: TYPE_PRE
  zh: '[PRE105]'
- en: This lets TensorBoard know that the logs and details of the training phase will
    be recorded in the “summaries” folder. Connection is made on port 6006 and a corresponding
    “http” address is provided which contains the device name of our system. When
    we open Tensorboard we will see the environment cumulative rewards and the episode
    length, as shown in Figure [4-21](#Fig21).
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 这让TensorBoard知道训练阶段的日志和细节将被记录在“summaries”文件夹中。连接在端口6006上，提供了一个包含我们系统设备名称的相应“http”地址。当我们打开Tensorboard时，我们将看到环境的累积奖励和阶段长度，如图[4-21](#Fig21)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig21_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig21_HTML.jpg)'
  id: totrans-348
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig21_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig21_HTML.jpg)'
- en: Figure 4-21
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-21
- en: Environment parameters with TensorBoard
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: TensorBoard中的环境参数
- en: We will also visualize the loss, policy entropy, policy extrinsic reward, and
    value estimate details that are an important metric for learning, as shown in
    Figure [4-22](#Fig22).
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将可视化损失、策略熵、策略外部奖励和价值估计细节，这些都是学习的重要指标，如图[4-22](#Fig22)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig22_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig22_HTML.jpg)'
  id: totrans-352
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig22_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig22_HTML.jpg)'
- en: Figure 4-22
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-22
- en: Policy parameters with TensorBoard
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: TensorBoard中的策略参数
- en: Running in Inference Mode
  id: totrans-355
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在推理模式下运行
- en: We have built and trained our agent in Unity ML Agents. Now we have to use this
    trained model in Inference Mode. We can attach this model to the NNModel part
    of the “BehaviorParameters” script and select the inference device where we want
    to run. Finally, we can build this Unity scene with the trained model placed in
    agent as the internal brain (for inference) and watch the simulation, as shown
    in Figure [4-23](#Fig23).
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经在Unity ML Agents中构建并训练了我们的智能体。现在我们必须在推理模式下使用这个训练好的模型。我们可以将此模型附加到“BehaviorParameters”脚本的NNModel部分，并选择我们想要运行推理的设备。最后，我们可以构建这个Unity场景，将训练好的模型作为智能体的内部大脑（用于推理）放置其中，并观察模拟，如图[4-23](#Fig23)所示。
- en: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig23_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig23_HTML.jpg)'
  id: totrans-357
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_4_Chapter/502041_1_En_4_Fig23_HTML.jpg](../images/502041_1_En_4_Chapter/502041_1_En_4_Fig23_HTML.jpg)'
- en: Figure 4-23
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-23
- en: Finding block agent simulation using ML Agents
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ML Agents寻找方块智能体模拟
- en: Generic Hyperparameters
  id: totrans-360
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通用超参数
- en: 'Since we used the default hyperparameters for our training according to the
    “trainer_config.yaml” file, we can play around with those hyperparameters accordingly
    to have a better outcome. The default set of hyperparameters can be presented
    as :'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们根据“trainer_config.yaml”文件使用了默认的超参数进行训练，因此我们可以相应地调整这些超参数以获得更好的结果。默认的超参数集可以表示为：
- en: '[PRE106]'
  id: totrans-362
  prefs: []
  type: TYPE_PRE
  zh: '[PRE106]'
- en: This signifies that PPO algorithm is used as the deep RL algorithm (we will
    study this in the next chapter). We can control the epochs, episodes, and other
    attributes. If we are facing performance issues related to the system memory,
    we can change the batch size attribute. Changing the hidden units, learning rate
    can also help in faster convergence to a global minima. If we set the “use_recurrent”
    attribute to true, then we will be using a recurrent neural network for holding
    information inside the agent’s memory. We can increase the memory size attribute
    and also check the corresponding performance. However, for best practices, it
    is regarded that a hidden layer depth of around 128 with a batch size of 512 can
    perform fairly well in most of the use-cases. However, based on complex environments,
    these can be changed as well. We can play around with these hyperparameters and
    visualize it on TensorBoard. The implications associated with changing these parameters
    will be discussed in more depth in the next chapter.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着PPO算法被用作深度强化学习算法（我们将在下一章学习）。我们可以控制epoch、episode和其他属性。如果我们面临与系统内存相关的性能问题，我们可以更改批处理大小属性。更改隐藏单元和学习率也可以帮助更快地收敛到全局最小值。如果我们将“use_recurrent”属性设置为true，那么我们将使用循环神经网络在代理的内存中保持信息。我们可以增加内存大小属性并检查相应的性能。然而，根据最佳实践，大约128个隐藏层深度和512个批处理大小在大多数用例中可以表现相当好。然而，根据复杂环境，这些也可以相应地更改。我们可以对这些超参数进行调整，并在TensorBoard上可视化。这些参数更改的相关影响将在下一章中更深入地讨论。
- en: Summary
  id: totrans-364
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'We are at the end of this chapter, which details the entire architecture of
    the ML Agents in depth. Certain key takeaways from this chapter include:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经到达了本章的结尾，本章详细介绍了ML代理的整个架构。本章的一些关键要点包括：
- en: We learned about the fundamental architecture of the brain in ML Agents. We
    studied about the different types of sensors for collecting information as well
    as the policies required to train those observations. We then learned about the
    inference module of the brain, which uses the Barracuda Engine. The demonstrations
    module, which is important for imitation learning was understood. Lastly we visited
    the communicators, which are also a part of the academy framework controlling
    the real-time Python API training process.
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们了解了ML代理的大脑基本架构。我们研究了用于收集信息的不同类型传感器以及训练这些观察结果所需的政策。然后我们学习了大脑的推理模块，该模块使用Barracuda引擎。我们理解了对于模仿学习很重要的演示模块。最后，我们参观了通信者，它们也是学院框架的一部分，控制着实时Python
    API训练过程。
- en: The next part revolved around understanding the academy architecture, where
    we saw how environment parameters are controlled by the academy. Based on the
    communicators’ response, the academy chooses the type of brain (inference, external,
    heuristic) for the agent.
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一个部分围绕理解学院架构展开，我们看到了环境参数是如何由学院控制的。根据通信者的响应，学院为代理选择大脑的类型（推理、外部、启发式）。
- en: We explored the Agent script, which we have also used for training our own “FindingBlock”
    agent. We understood how the agent links itself with the brain and the academy
    and takes actions based on the decisions provided by them. We observed the distinction
    between the discrete and continuous action spaces.
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们探索了代理脚本，这是我们用于训练自己的“FindingBlock”代理的脚本。我们了解了代理如何将自己与大脑和学院链接起来，并根据它们提供的决策采取行动。我们观察了离散动作空间和连续动作空间之间的区别。
- en: The Decision Requester script was explored, which controlled the agents’ decision-making
    process. We also went in depth on the Behavior Parameters script, which is a fundamental
    part of the brain.
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索了决策请求器脚本，该脚本控制代理的决策过程。我们还深入研究了行为参数脚本，这是大脑的基本部分。
- en: In the next phase we create a simulation based on the PPO algorithm where an
    agent has to find a target in a constrained environment. We used RayPerceptionsensorComponent3D,
    behavior parameters, decision requester, and model overrider scripts to set up
    the brain-academy architecture for our agent. We then wrote the overridable method
    of the Agent script to create our own reward functions, observations, and action
    spaces.
  id: totrans-370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在下一阶段，我们创建了一个基于PPO算法的模拟，其中智能体需要在受限环境中找到目标。我们使用了RayPerceptionsensorComponent3D、行为参数、决策请求器和模型覆盖脚本，为我们的智能体设置了大脑-学院架构。然后，我们编写了智能体脚本的覆盖方法，以创建我们自己的奖励函数、观察和动作空间。
- en: We trained our agent using the mlagents-learn command, which we explored in
    the last chapter, and visualized the ray sensors, rewards, actions in real-time
    external training through Python API.
  id: totrans-371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们使用mlagents-learn命令训练了我们的智能体，这在上一章中我们已经探讨过，并通过Python API实时可视化外部训练中的射线传感器、奖励和动作。
- en: Visualization was done in Tensorboard regarding the policy rewards, cumulative
    rewards, and loss and then we used the trained brain for inference and built a
    Unity executable file containing the agent with the trained internal brain.
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在Tensorboard中进行了可视化，涉及策略奖励、累积奖励和损失，然后我们使用训练好的大脑进行推理，并构建了一个包含训练后内部大脑的Unity可执行文件。
- en: Lastly we briefly studied the default hyperparameters present in the “trainer_config.yaml”
    file. We will be discussing how changing a hyperparameter can affect the learning
    process in the next chapters.
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们简要研究了“trainer_config.yaml”文件中存在的默认超参数。我们将在下一章讨论如何更改超参数可能会影响学习过程。
- en: With that we come to the end of this chapter. In the next chapter, we will learn
    about the different deep RL algorithms made in Unity ML agents as well as create
    our own deep learning models using the Gym Wrapper. We will look into the Python
    side of the ML Agents and also create vision-based neural networks for our agents.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这些，我们就结束了这一章。在下一章中，我们将了解Unity ML智能体中制作的不同的深度强化学习算法，以及如何使用Gym Wrapper创建我们自己的深度学习模型。我们还将探讨ML
    Agents的Python方面，并为我们的智能体创建基于视觉的神经网络。
