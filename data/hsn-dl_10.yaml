- en: Application-Based Questions
  id: totrans-201
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用型问题
- en: 'Write a program to generate text using a character-based Recurrent Neural Network
    (RNN). You will use a dataset of Shakespeare''s writing from Andrej Karpathy''s
    article, "The Unreasonable Effectiveness of Recurrent Neural Networks." The goal
    is to train a model that can predict the next character in a sequence of characters
    from this data. You can use the trained model to generate longer sequences of
    text by predicting one character at a time. The dataset can be found at this link:
    [Kaggle Shakespeare Text Generation with RNN](https://www.kaggle.com/code/rahulharlalka/skakespeare-text-generation-with-rnn).'
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写一个程序，使用基于字符的循环神经网络（RNN）生成文本。你将使用Andrej Karpathy的文章《循环神经网络的不合理有效性》中的莎士比亚写作数据集。目标是训练一个模型，可以预测来自这些数据的字符序列中的下一个字符。你可以使用训练好的模型通过逐个字符预测来生成更长的文本序列。数据集可以在以下链接找到：[Kaggle
    Shakespeare Text Generation with RNN](https://www.kaggle.com/code/rahulharlalka/skakespeare-text-generation-with-rnn)。
- en: 'In the above question, analyze the effect of the following on the performance
    of the model:'
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在上述问题中，分析以下因素对模型性能的影响：
- en: Number of layers
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 层数数量
- en: Number of units in the embedding layer
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 嵌入层中的单元数量
- en: Use of RNN, Bi-RNN, GRU, and LSTM
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用RNN、Bi-RNN、GRU和LSTM
- en: Optimizers
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优化器
- en: Now develop a next word generation model (instead of the next character generation
    model) and assess if the model performs better now.
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在开发一个下一个单词生成模型（而不是下一个字符生成模型），并评估模型是否表现更好。
