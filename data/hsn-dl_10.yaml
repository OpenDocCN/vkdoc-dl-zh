- en: Let us have a look at the use of LSTM and GRU models in sentiment classification.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 LSTM 和 GRU 模型在情感分类中的应用。
- en: Sentiment Classification
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情感分类
- en: Refer to Listing [9-1](611710_1_En_9_Chapter.xhtml#PC1) of the previous chapter
    that classifies the given sentences into positive or negative sentiments. The
    four different RNN models were created and evaluated on the IMDB movie review
    sentiment dataset. This dataset contains 50,000 movie reviews, evenly split into
    positive and negative sentiments. The dataset was preprocessed by removing stop
    words, tokenizing, and padding the reviews. The following Listing [10-2](#PC2)
    implements eight different models using ***Keras*** for sentiment classification.
    These models employed different architectures of LSTM and GRU and their bidirectional
    variants. Each model consisted of an embedding layer, followed by recurrent layers
    and a dense layer with sigmoid activation. The variation of accuracy and loss
    with the number of epochs is shown in figures from Figure [10-12](#Fig12) to Figure
    [10-19](#Fig19).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 参考上一章的列表 [9-1](611710_1_En_9_Chapter.xhtml#PC1)，该列表将给定的句子分类为正面或负面情感。创建了四个不同的
    RNN 模型，并在 IMDB 电影评论情感数据集上进行了评估。该数据集包含 50,000 篇电影评论，正面和负面情感均匀分布。数据集通过去除停用词、分词和填充评论进行了预处理。以下列表
    [10-2](#PC2) 使用 ***Keras*** 实现了八个不同的模型用于情感分类。这些模型采用了不同的 LSTM 和 GRU 架构及其双向变体。每个模型由一个嵌入层、递归层和一个具有
    sigmoid 激活的密集层组成。随着训练轮数的增加，准确率和损失的变化在图 10-12 到图 10-19 的图中显示。
