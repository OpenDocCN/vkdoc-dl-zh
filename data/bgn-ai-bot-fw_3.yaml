- en: Implementing Wit.ai with Facebook
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Facebook中实现Wit.ai
- en: You’ve gone through the process of creating a simple app that uses some of the
    features of Wit.ai. In this section, you’ll implement Wit.ai with Facebook. The
    Facebook API is available at `developers.facebook.com`. You will create a chatbot
    for the official Facebook page, or any Facebook page. This chatbot will add to
    Facebook Messenger. You will have to set up webhooks accordingly. To get webhooks
    working, you need to set up ngrock.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 您已经完成了创建一个使用Wit.ai一些功能的简单应用的过程。在本节中，您将实现Wit.ai与Facebook的结合。Facebook API可在`developers.facebook.com`找到。您将为官方Facebook页面或任何Facebook页面创建一个聊天机器人。这个聊天机器人将添加到Facebook
    Messenger中。您需要相应地设置webhooks。为了使webhooks正常工作，您需要设置ngrock。
- en: First, create a new app as you’ve done before. This time, name it Test1, as
    shown in Figure [3-20](#Fig20).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，创建一个新的应用，就像您之前做的那样。这次，将其命名为Test1，如图[3-20](#Fig20)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig20_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig20_HTML.jpg)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig20_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig20_HTML.jpg)'
- en: Figure 3-20
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-20
- en: Adding a new name
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 添加新的名称
- en: Now head back to the Facebook for Developers site at [`https://developers.facebook.com/`](https://developers.facebook.com/)
    . You need to use your Facebook credentials to log in. The page looks Figure [3-21](#Fig21).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 现在回到Facebook开发者网站[https://developers.facebook.com/](https://developers.facebook.com/)。您需要使用您的Facebook凭据登录。页面如图[3-21](#Fig21)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig21_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig21_HTML.jpg)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig21_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig21_HTML.jpg)'
- en: Figure 3-21
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-21
- en: The Facebook for Developers page
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: Facebook开发者页面
- en: Now you need to create a new app. Click the My Apps option at the top right
    to access the drop-down menu for creating a new app, as shown in Figure [3-22](#Fig22).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您需要创建一个新的应用。点击右上角的“我的应用”选项，以访问创建新应用的下拉菜单，如图[3-22](#Fig22)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig22_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig22_HTML.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig22_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig22_HTML.jpg)'
- en: Figure 3-22
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-22
- en: Adding a new app
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 添加新的应用
- en: Name it *SampleApp* and add a product to it by clicking the Add a Product button,
    as shown in Figure [3-23](#Fig23).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 命名为*SampleApp*，并通过点击“添加产品”按钮添加一个产品，如图[3-23](#Fig23)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig23_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig23_HTML.jpg)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig23_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig23_HTML.jpg)'
- en: Figure 3-23
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-23
- en: Adding a sample app
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 添加一个示例应用
- en: For a product, you need to add a messenger , shown in Figure [3-24](#Fig24).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个产品，您需要添加一个消息传递者，如图 [3-24](#Fig24) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig24_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig24_HTML.jpg)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig24_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig24_HTML.jpg)'
- en: Figure 3-24
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-24
- en: Selecting the Messenger option
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 选择“消息传递者”选项
- en: Click the Set Up button in the Messenger option. You will be using Wit.ai’s
    natural language processing (NLP) rather than Facebook’s (which is very basic),
    although both of them work perfectly together. Now you have to set up a page with
    the app name created; xxxxxx, as shown in Figure [3-25](#Fig25). Your goal is
    to create a chatbot for the official Facebook page.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在“消息传递者”选项中点击“设置”按钮。您将使用 Wit.ai 的自然语言处理 (NLP) 而不是 Facebook 的（这非常基础），尽管它们两者可以完美地一起工作。现在您必须设置一个带有创建的应用名称的页面；xxxxxx，如图
    [3-25](#Fig25) 所示。您的目标是创建一个官方 Facebook 页面的聊天机器人。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig25_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig25_HTML.jpg)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig25_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig25_HTML.jpg)'
- en: Figure 3-25
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-25
- en: Selecting a web page in Facebook
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Facebook 中选择网页
- en: The site will ask for authentication, and then the token will be created. Now
    you need to quickly set up webhooks. Click the Setup Webhooks button, shown in
    Figure [3-26](#Fig26).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 网站将要求进行身份验证，然后创建令牌。现在您需要快速设置 Webhooks。点击图 [3-26](#Fig26) 所示的“设置 Webhooks”按钮。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig26_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig26_HTML.jpg)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig26_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig26_HTML.jpg)'
- en: Figure 3-26
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-26
- en: Setting up Webhooks
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 设置 Webhooks
- en: Clicking this option opens a page for assigning details. Before using webhooks,
    you need to configure ngrock. Go to the ngrock site at [`https://ngrok.com/`](https://ngrok.com/)
    , shown in Figure [3-27](#Fig27).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 点击此选项将打开一个分配详细信息的页面。在使用 Webhooks 之前，您需要配置 ngrock。转到图 [3-27](#Fig27) 所示的 ngrock
    网站 `https://ngrok.com/`。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig27_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig27_HTML.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig27_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig27_HTML.jpg)'
- en: Figure 3-27
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-27
- en: The ngrok site
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: ngrock 网站
- en: Download ngrock by clicking the Downloading Ngrok link to access the download
    options, shown in Figure [3-28](#Fig28).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击“下载 Ngrok”链接来下载 ngrock，访问图 [3-28](#Fig28) 所示的下载选项。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig28_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig28_HTML.jpg)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig28_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig28_HTML.jpg)'
- en: Figure 3-28
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-28
- en: Downloading ngrok for Windows
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 为 Windows 下载 ngrock
- en: 'After downloading ngrock, launch `ngrok.exe` from the command prompt. You have
    to open the command prompt and head to the localhost page. At my end, the localhost
    was 4040\. Key in the following details at the command prompt:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 下载 ngrock 后，从命令提示符中启动 `ngrok.exe`。您必须打开命令提示符并转到本地主机页面。在我的端，本地主机是 4040。在命令提示符中输入以下详细信息：
- en: '[PRE0]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: If web server that is ngrock is up, you will see the window in Figure [3-29](#Fig29).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 ngrock 的网络服务器正在运行，您将看到图 [3-29](#Fig29) 所示的窗口。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig29_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig29_HTML.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig29_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig29_HTML.jpg)'
- en: Figure 3-29
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-29
- en: The ngrok status
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: ngrock 的状态
- en: Let’s head to the localhost page, shown in Figure [3-30](#Fig30), at [`http://7c9cc892.ngrok.io/inspect/http`](http://7c9cc892.ngrok.io/inspect/http)
    *.*
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们转到图 [3-30](#Fig30) 所示的本地主机页面，网址为 `http://7c9cc892.ngrok.io/inspect/http`
    *.*
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig30_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig30_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig30_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig30_HTML.jpg)'
- en: Figure 3-30
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-30
- en: The inspect page as reflected that carries the information of the localhost
    page
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 检查页面反映了本地主机页面的信息
- en: When the page is up, you can see the statistics in the command-prompt window,
    as shown in Figure [3-31](#Fig31).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 当页面启动时，您可以在命令提示符窗口中看到统计信息，如图 [3-31](#Fig31) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig31_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig31_HTML.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig31_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig31_HTML.jpg)'
- en: Figure 3-31
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-31
- en: You have set up the ngrok environment
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 您已设置好 ngrok 环境
- en: Deploying the Wit.ai bot is easy after you’ve set up the ngrok environment as
    well as the webhook’s natural language processing section. Next you will work
    with Dialogflow to create a complete bot that’s deployable to the Web.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置好 ngrok 环境以及 webhook 的自然语言处理部分之后，部署 Wit.ai 机器人变得简单。接下来，你将使用 Dialogflow 创建一个可以部署到
    Web 的完整机器人。
- en: Working with Dialogflow
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与 Dialogflow 合作
- en: In this section, you’ll use Dialogflow (formerly Api.ai) to create a bot. First
    you’ll access the web console through your Google account. Then you’ll create
    a Pizza bot. Finally, you’ll use Small Talk to xxxxx and then link the bot to
    a Google project. A small talk is a way to access prebuilt API for doing the conversation
    in a proper manner.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将使用 Dialogflow（以前称为 Api.ai）创建一个机器人。首先，你将通过你的 Google 账户访问网络控制台。然后你将创建一个披萨机器人。最后，你将使用
    Small Talk 来进行交互，并将机器人链接到一个 Google 项目。小对话是一种访问预构建 API 以正确进行对话的方式。
- en: Let’s start now.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们开始吧。
- en: Accessing Dialogflow
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 访问 Dialogflow
- en: This section introduces you to Dialogflow and gets you logged in via your Google
    account.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将介绍 Dialogflow 并通过你的 Google 账户帮助你登录。
- en: Head to the Dialogflow web site at [`https://dialogflow.com/`](https://dialogflow.com/)
    *.*
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 访问 Dialogflow 网站 [https://dialogflow.com/](https://dialogflow.com/) *.*
- en: The Dialogflow web site for creating chatbots is shown in Figure [3-32](#Fig32).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 创建聊天机器人的 Dialogflow 网站如图 [3-32](#Fig32) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig32_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig32_HTML.jpg)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig32_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig32_HTML.jpg)'
- en: Figure 3-32
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-32
- en: The Dialogflow web site
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: Dialogflow 网站
- en: From this Dialogflow page, you can either sign up for free or, if you already
    have an account, you can to the console. If you have a Google account, you need
    to verify it and log in, as shown in Figure [3-33](#Fig33).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个 Dialogflow 页面，你可以免费注册，或者如果你已经有了账户，你可以进入控制台。如果你有 Google 账户，你需要验证它并登录，如图 [3-33](#Fig33)
    所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig33_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig33_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig33_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig33_HTML.jpg)'
- en: Figure 3-33
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-33
- en: Logging in using a Google account
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Google 账户登录
- en: Allow the access , as shown in Figure [3-34](#Fig34).
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 允许访问，如图 [3-34](#Fig34) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig34_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig34_HTML.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig34_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig34_HTML.jpg)'
- en: Figure 3-34
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-34
- en: Allow Dialogflow to access Goggle Assistant
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 允许 Dialogflow 访问 Goggle Assistant
- en: The next page is a Welcome screen . The apps in Dialogflow are known as *agents*.
    You will have to create one by clicking Create Agent, as shown in Figure [3-35](#Fig35).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 下一页是一个欢迎屏幕。Dialogflow 中的应用程序被称为 *代理*。你将需要通过点击创建代理，如图 [3-35](#Fig35) 所示来创建一个。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig35_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig35_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig35_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig35_HTML.jpg)'
- en: Figure 3-35
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-35
- en: The Dialogflow welcome page after loogging in
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后的 Dialogflow 欢迎页面
- en: Creating the Pizza Bot
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建披萨机器人
- en: In this section, you will use Dialogflow to create a simple pizza bot. Name
    it PizzaBot, as shown in Figure [3-36](#Fig36).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将使用 Dialogflow 创建一个简单的披萨机器人。命名为 PizzaBot，如图 [3-36](#Fig36) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig36_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig36_HTML.jpg)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig36_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig36_HTML.jpg)'
- en: Figure 3-36
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-36
- en: Creating a pizza bot
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 创建披萨机器人
- en: Now you need to figure out what you need to do with the app.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你需要弄清楚你需要用这个应用程序做什么。
- en: Using Small Talk
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 Small Talk
- en: You will be using Small Talk for the bot’s interactions. You’ll use Small Talk
    for interactions like Hi, Hello, and so forth. Then you’ll allow users to order
    the pizza. Dialogflow has this wonderful built-in API that does all the small
    talk for us. You just need to enable it, as shown in Figure [3-37](#Fig37).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 你将为机器人的交互使用 Small Talk。你将使用 Small Talk 进行类似 Hi、Hello 等交互。然后你将允许用户订购披萨。Dialogflow
    有一个很棒的内置 API，可以为我们完成所有的小对话。你只需要像图 [3-37](#Fig37) 所示那样启用它。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig37_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig37_HTML.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig37_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig37_HTML.png)'
- en: Figure 3-37
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-37
- en: Enabling Small Talk prebuilt agents. The user selects the small talk option
    so that we are importing the basic way the communication occurs.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 启用Small Talk预构建代理。用户选择Small Talk选项，以便我们导入基本的沟通方式。
- en: You then import Small Talk accordingly.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 然后相应地导入Small Talk。
- en: Linking to a Google Project
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 链接到Google项目
- en: In this section, you’ll see how to integrate your bot with a Google project.
    You can link to a Google Project or create a new one, as shown in Figure [3-38](#Fig38).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将了解如何将您的机器人集成到Google项目中。您可以链接到Google项目或创建一个新的项目，如图[3-38](#Fig38)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig38_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig38_HTML.jpg)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig38_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig38_HTML.jpg)'
- en: Figure 3-38
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-38
- en: Linking to a Google project
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 链接到一个Google项目
- en: After linking to a Google project or naming a new one, enable Small Talk for
    the PizzaBot app, as shown in Figure [3-39](#Fig39). Small Talk will help us immensely.
    Small Talk has all the basic conversation flows for us and makes us easier to
    communicate.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在链接到Google项目或命名一个新的项目之后，为PizzaBot应用程序启用Small Talk，如图[3-39](#Fig39)所示。Small Talk将极大地帮助我们。Small
    Talk为我们提供了所有基本的对话流程，并使我们更容易进行沟通。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig39_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig39_HTML.jpg)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig39_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig39_HTML.jpg)'
- en: Figure 3-39
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-39
- en: Enabling Small Talk and saving it
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 启用Small Talk并保存
- en: In the next step, you need to create a new entity for the app.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一步中，您需要为应用程序创建一个新的实体。
- en: Adding an Intent
  id: totrans-185
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加一个意图
- en: Now you will create an intent. now one of the thongs user might think of as
    parameter being hungry. So you will add an intent named Hungry. We will to create
    a new intent, as shown in Figure [3-40](#Fig40).
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您将创建一个意图。现在用户可能会想到的一个参数是饥饿。所以您将添加一个名为Hungry的意图。我们将创建一个新的意图，如图[3-40](#Fig40)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig40_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig40_HTML.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig40_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig40_HTML.jpg)'
- en: Figure 3-40
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-40
- en: Creating a new intent. We would be creating a new intent for the chatbot.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个新的意图。我们将为聊天机器人创建一个新的意图。
- en: You then add training parameters or examples, as shown in Figure [3-41](#Fig41).
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 然后添加训练参数或示例，如图[3-41](#Fig41)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig41_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig41_HTML.png)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig41_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig41_HTML.png)'
- en: Figure 3-41
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-41
- en: Adding parameters
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 添加参数
- en: You’ve created a simple flow for the bot. Now you will work on creating new
    entities for the it.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 您已为机器人创建了一个简单的流程。现在您将为它创建新的实体。
- en: Creating a New Entity
  id: totrans-195
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建一个新的实体
- en: In this section, you will work on constructing the bot while creating new entities.
    Click the Entities option and then click Create Entity, as shown in Figure [3-42](#Fig42).
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将在创建新实体的同时构建机器人。点击“实体”选项，然后点击“创建实体”，如图[3-42](#Fig42)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig42_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig42_HTML.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig42_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig42_HTML.png)'
- en: Figure 3-42
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-42
- en: Selecting the Entities option
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 选择“实体”选项
- en: This creates a field for you with the required details. For pizzas, the entity
    will be Topping, as shown in Figure [3-43](#Fig43).
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这为您创建了一个包含所需详细信息的字段。对于披萨，实体将是Topping，如图[3-43](#Fig43)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig43_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig43_HTML.jpg)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig43_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig43_HTML.jpg)'
- en: Figure 3-43
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-43
- en: Declare an entity called Topping
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 声明一个名为Topping的实体
- en: 'You will add four toppings for this example:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 您将为这个示例添加四个配料：
- en: Onions
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 洋葱
- en: Mushroom
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蘑菇
- en: Peperoni
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 辣椒
- en: Pineapple
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 菠萝
- en: Now save the Topping parameters .. The bot UI will then look like Figure [3-44](#Fig44).
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 现在保存Topping参数..然后机器人UI将看起来如图[3-44](#Fig44)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig44_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig44_HTML.jpg)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig44_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig44_HTML.jpg)'
- en: Figure 3-44
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-44
- en: The Topping options
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: Topping选项
- en: Deploying the Bot
  id: totrans-213
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 部署机器人
- en: You have already imported the Small Talk agent. Now you’ll import a new agent.
    Let’s name the agent Questionbot. The more agents we add it becomes easier for
    the conversational flow. You create a Questionbot and now you will try to use
    prebuilt agents in it, as shown in Figure [3-45](#Fig45).
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经导入了Small Talk代理。现在你将导入一个新的代理。让我们将代理命名为Questionbot。添加的代理越多，对话流程就越容易。你创建了一个Questionbot，现在你将尝试在其中使用预构建的代理，如图[3-45](#Fig45)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig45_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig45_HTML.jpg)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig45_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig45_HTML.jpg)'
- en: Figure 3-45
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-45
- en: Adding prebuilt agents
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 添加预构建的代理
- en: You will have to select all the intents available so the bot flow will be perfect;
    see Figure [3-46](#Fig46).
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须选择所有可用的意图，以便机器人流程完美；见图[3-46](#Fig46)。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig46_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig46_HTML.jpg)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig46_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig46_HTML.jpg)'
- en: Figure 3-46
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-46
- en: The Small Talk agent
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: Small Talk代理
- en: Then you need to copy the intents by clicking to put a check mark on the copy-related
    entities and naming the destination agent (in this case, it is Questionbot). Next,
    click Start, as shown in Figure [3-47](#Fig47).
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你需要通过点击来复制意图，在复制相关实体上放置勾选标记，并命名目标代理（在这种情况下，它是Questionbot）。然后点击开始，如图[3-47](#Fig47)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig47_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig47_HTML.jpg)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig47_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig47_HTML.jpg)'
- en: Figure 3-47
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-47
- en: Copying related entities
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 复制相关实体
- en: If you now go to the Questionbot, you will see the intents and all of the content
    in the bot. Try *are you a bot* as a parameter, as shown in Figure [3-48](#Fig48).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你现在访问Questionbot，你会看到所有的意图和机器人中的所有内容。尝试将*are you a bot*作为参数，如图[3-48](#Fig48)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig48_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig48_HTML.jpg)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig48_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig48_HTML.jpg)'
- en: Figure 3-48
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-48
- en: You ask a question, and the bot answers
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 你提出一个问题，机器人就会回答
- en: Integration with Web Instance
  id: totrans-230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与Web实例集成
- en: In this section, you will work toward getting the integration for the Web. We
    will now try to integrate the app to certain platform let’s try in Web Demo.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将致力于实现Web的集成。我们现在将尝试将应用集成到某些平台，让我们在Web演示中尝试。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig49_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig49_HTML.jpg)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig49_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig49_HTML.jpg)'
- en: Figure 3-49
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-49
- en: Selecting the Web Demo integration option. We are integrating the bot to enable
    the web version for conversation.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 选择Web演示集成选项。我们正在将机器人集成以启用网页版对话。
- en: Toggle the slider to right to test the link, as shown in Figure [3-50](#Fig50).
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 将滑块向右移动以测试链接，如图[3-50](#Fig50)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig50_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig50_HTML.jpg)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig50_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig50_HTML.jpg)'
- en: Figure 3-50
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-50
- en: Testing the link
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 测试链接
- en: Integrate the web link for the bot by using an iframe in an HTML page so the
    bot works accordingly, shown in Figure [3-51](#Fig51).
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在HTML页面中使用iframe来集成机器人的Web链接，以便机器人按预期工作，如图[3-51](#Fig51)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig51_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig51_HTML.jpg)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig51_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig51_HTML.jpg)'
- en: Figure 3-51
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-51
- en: Integrating the web link for the bot
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 为机器人集成Web链接
- en: Conclusion
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, you worked on two bot frameworks and learned how they work.
    You created a complete deployable bot by using Dialogflow and saw its result.
    This chapter provided simple examples and integrations as well as use cases for
    bots.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你处理了两个机器人框架，并了解了它们的工作原理。你使用Dialogflow创建了一个完整的可部署机器人，并看到了其结果。本章提供了简单的示例、集成以及机器人的用例。
