- en: After creating the intent, the bot page looks like Figure [3-19](#Fig19).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 创建意图后，机器人页面看起来如图[3-19](#Fig19)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig19_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig19_HTML.jpg)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig19_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig19_HTML.jpg)'
