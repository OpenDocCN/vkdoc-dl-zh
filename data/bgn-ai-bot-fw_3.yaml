- en: 3. Wit.ai and Dialogflow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. Wit.ai 和 Dialogflow
- en: This chapter covers the basics of [Wit.​ai](https://wit.ai/) and [Dialogflow](https://dialogflow.com/),
    two chatbot interfaces from Google that provide helpful capabilities. You’ll start
    by exploring a simple bot flow using Wit.ai, and then move on to Dialogflow to
    create a full-fledged bot to deploy to the Web.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了 Google 提供的两个聊天机器人界面 [Wit.ai](https://wit.ai/) 和 [Dialogflow](https://dialogflow.com/)
    的基础知识，这两个界面提供了有用的功能。您将首先使用 Wit.ai 探索一个简单的机器人流程，然后转向 Dialogflow 创建一个完整的机器人以部署到
    Web 上。
- en: Getting Started with Wit.ai
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始使用 Wit.ai
- en: '*Wit.ai* is a web-based IDE for creating bots. To launch Wit.ai, you have to
    go to [`https://wit.ai/`](https://wit.ai/) .'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*Wit.ai* 是一个基于网络的 IDE，用于创建机器人。要启动 Wit.ai，您必须访问 [https://wit.ai/](https://wit.ai/)
    。'
- en: In this section, you’ll work on creating a new app and then you’ll add intent
    to it. Next, you’ll add text and keywords to modify the bot. Later in this chapter,
    you’ll implement the Dialogflow tools to implement the bot.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将创建一个新应用，然后向其中添加意图。接下来，您将添加文本和关键词来修改机器人。在本章的后面部分，您将实现 Dialogflow 工具以部署机器人。
- en: Creating a New App
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建新应用
- en: In this section, you will work on creating your first app. From the Wit.ai web
    site, click Quick Start, as shown in Figure [3-1](#Fig1).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将创建您的第一个应用。从 Wit.ai 网站，点击快速开始，如图 [3-1](#Fig1) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig1_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig1_HTML.jpg)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig1_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig1_HTML.jpg)'
- en: Figure 3-1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-1
- en: Choosing the Quick Start option to create an app
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 选择快速开始选项创建应用
- en: This opens a page that presents options to create the first app by using either
    GitHub or Facebook, as shown in Figure [3-2](#Fig2).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这将打开一个页面，展示使用 GitHub 或 Facebook 创建第一个应用的选项，如图 [3-2](#Fig2) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig2_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig2_HTML.jpg)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig2_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig2_HTML.jpg)'
- en: Figure 3-2
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-2
- en: Logging in using GitHub
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 GitHub 登录
- en: After you log in, you’ll have the option to create your new app , as shown in
    Figure [3-3](#Fig3).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，您将可以选择创建您的新应用，如图 [3-3](#Fig3) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig3_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig3_HTML.jpg)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig3_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig3_HTML.jpg)'
- en: Figure 3-3
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-3
- en: Creating a new app
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 创建新应用
- en: Let’s create a simple app. You’ll name the app *TestStories*. In the app description
    section , type *Demo*. Select the Private option for the app data. Then click
    the Create App button, shown in Figure [3-4](#Fig4).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个简单的应用。您可以将应用命名为 *TestStories*。在应用描述部分，输入 *Demo*。为应用数据选择私有选项。然后点击创建应用按钮，如图
    [3-4](#Fig4) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig4_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig4_HTML.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig4_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig4_HTML.jpg)'
- en: Figure 3-4
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-4
- en: Setting the details for your new app
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 设置您新应用的详细信息
- en: Adding Intent
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加意图
- en: Clicking the Create App button opens the next page, which presents the Stories
    option. Following that, you head to the Understanding option; this page is shown
    in Figure [3-5](#Fig5).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 点击创建应用按钮将打开下一页，该页面提供了“故事”选项。随后，您将转到“理解”选项；此页面如图 [3-5](#Fig5) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig5_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig5_HTML.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig5_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig5_HTML.jpg)'
- en: Figure 3-5
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-5
- en: The Understanding options at the Wit.ai site
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 理解 Wit.ai 网站上的选项
- en: Let’s work through the new app with a pizza example.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个披萨的例子来创建新应用。
- en: In the User Says text box, type *I want some cheese pizza*, as shown in Figure
    [3-6](#Fig6).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在“用户说”文本框中，输入*I want some cheese pizza*，如图 [3-6](#Fig6) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig6_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig6_HTML.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig6_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig6_HTML.jpg)'
- en: Figure 3-6
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-6
- en: Adding details we are working towards ordering pizza so we are constructing
    the way to start the conversation
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 添加我们正在努力订购披萨的详细信息，因此我们正在构建开始对话的方式
- en: Now you’re ready to create an intent. You add the value for the intent as pizza,
    as shown in Figure [3-7](#Fig7).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您已准备好创建一个意图。您将意图的值添加为 pizza，如图 [3-7](#Fig7) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig7_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig7_HTML.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig7_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig7_HTML.jpg)'
- en: Figure 3-7
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-7
- en: Creating a new intent. An intent is needed in here so that while conversation
    it is able to find the right order for communication.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个新的意图。在这里需要一个意图，以便在对话中能够找到正确的通信顺序。
- en: You add a pizza option with cheese and finally click the Validate button , as
    shown in Figure [3-8](#Fig8).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你添加了一个带有奶酪的披萨选项，然后点击验证按钮，如图 [3-8](#Fig8) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig8_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig8_HTML.jpg)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig8_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig8_HTML.jpg)'
- en: Figure 3-8
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-8
- en: Creating an intent and then validating it. We are creating different intent
    so that we are giving an option to choose for the user which type of pizza they
    want to have.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个意图并验证它。我们正在创建不同的意图，以便用户可以选择他们想要哪种类型的披萨。
- en: After validating that is creation of the entities option, you have two entities
    created now, highlighted in Figure [3-9](#Fig9).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在验证了创建实体选项之后，现在你有两个实体被创建，如图 [3-9](#Fig9) 所示被突出显示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig9_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig9_HTML.jpg)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig9_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig9_HTML.jpg)'
- en: Figure 3-9
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-9
- en: The app shows two intents
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序显示了两个意图
- en: Adding Text and Keywords
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加文本和关键词
- en: Let’s work on modifying the bot. We will work now on creating the flow of the
    chatbot so the user is able to order different kind of pizzas.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们修改这个机器人。我们现在将创建聊天机器人的流程，以便用户能够订购不同类型的披萨。
- en: In this section, you’ll try to add a sentence. Figure [3-10](#Fig10) shows how
    to add a sentence for recognition.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将尝试添加一个句子。图 [3-10](#Fig10) 展示了如何添加一个用于识别的句子。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig10_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig10_HTML.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig10_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig10_HTML.jpg)'
- en: Figure 3-10
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-10
- en: The app is trying to understand a sentence. Here we are working on how a chatbot
    will be able to discover what user is typing so that the sentence that is created
    is understandable to the bot.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序正在尝试理解一个句子。在这里，我们正在研究聊天机器人如何能够发现用户正在输入的内容，以便创建的句子对机器人来说是可理解的。
- en: Next, click Validate. Now you need to select an entity. Choose Pizza and click
    the arrow associated with it (see Figure [3-11](#Fig11)).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，点击验证。现在你需要选择一个实体。选择披萨并点击与之相关的箭头（见图 [3-11](#Fig11)）。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig11_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig11_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig11_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig11_HTML.jpg)'
- en: Figure 3-11
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-11
- en: Select an entity and the arrow associated with it
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个实体及其相关的箭头
- en: When you click the Pizza arrow , you head to the page that has keywords and
    synonyms, as shown in Figure [3-12](#Fig12).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当你点击披萨箭头时，你会进入包含关键词和同义词的页面，如图 [3-12](#Fig12) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig12_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig12_HTML.jpg)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig12_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig12_HTML.jpg)'
- en: Figure 3-12
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-12
- en: Page for adding a new keyword
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 添加新关键词的页面
- en: Here you’ll add new keywords. The results are shown in Figure [3-13](#Fig13).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你将添加新关键词。结果如图 [3-13](#Fig13) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig13_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig13_HTML.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig13_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig13_HTML.jpg)'
- en: Figure 3-13
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-13
- en: Added keywords so that we are exactly creating the ways different type of pizzas
    are ordered
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 添加关键词，以便我们精确地创建不同类型披萨的订购方式
- en: Now click the Understanding option in order to train the bot to recognize the
    new keywords that you added. It is visible at the bottom.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在点击理解选项，以训练机器人识别你添加的新关键词。它位于底部。
- en: Let’s start with pepperoni pizza . For understanding the flow of the intent
    for pepperoni pizza, type in *I want a pepperoni pizza*, we are showing how the
    bot can be made to order a specific pizza as shown in Figure [3-14](#Fig14). Then
    click Validate.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从辣味披萨开始。为了理解辣味披萨的意图流程，输入 *我想吃辣味披萨*，我们展示了如何使机器人能够按照图 [3-14](#Fig14) 所示订购特定的披萨。然后点击验证。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig14_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig14_HTML.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig14_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig14_HTML.jpg)'
- en: Figure 3-14
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-14
- en: Adding the pepperoni pizza option
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 添加辣味披萨选项
- en: Now you’ll add veggie pizza, as shown in Figure [3-15](#Fig15).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你将添加蔬菜披萨，如图 [3-15](#Fig15) 所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig15_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig15_HTML.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig15_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig15_HTML.jpg)'
- en: Figure 3-15
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-15
- en: Adding veggie pizza option
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 添加素食披萨选项
- en: Let’s now add a Large pizza option . For that, you need to make some changes,
    shown in Figure [3-16](#Fig16).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在添加一个大型披萨选项。为此，您需要进行一些更改，如图[3-16](#Fig16)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig16_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig16_HTML.jpg)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig16_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig16_HTML.jpg)'
- en: Figure 3-16
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-16
- en: You need to change the pizza option
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要更改披萨选项
- en: Delete the Pizza option , because you want to work on the size of the pizza.
    Click the cross option to delete the pizza value, as shown in Figure [3-17](#Fig17).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 删除披萨选项，因为你想要调整披萨的大小。点击交叉选项来删除披萨值，如图[3-17](#Fig17)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig17_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig17_HTML.jpg)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig17_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig17_HTML.jpg)'
- en: Figure 3-17
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-17
- en: Deleting the pizza option
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 删除披萨选项
- en: Creating a New Entity
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建新实体
- en: In this section, you’ll create an entity named *pizzaSize*, shown in Figure
    [3-18](#Fig18).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将创建一个名为*pizzaSize*的实体，如图[3-18](#Fig18)所示。
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig18_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig18_HTML.jpg)'
  id: totrans-81
  prefs: []
