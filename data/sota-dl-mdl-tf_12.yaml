  zh: 创建风格转换模型
- en: Create a function for the Style Transform Model as shown in Listing [12-8](#PC65).
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如清单[12-8](#PC65)所示的风格转换模型函数。
- en: '[PRE64]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: The function creates a Style Transform Model that applies a style bottleneck
    vector to a content image to create a pastiche. The function accepts a style bottleneck
    vector and a processed content image. It then loads the style transform path into
    the interpreter object (tf.lite.Interpreter). The interpreter uses the style_transform_path
    to create a tflite transform style. Input to the interpreter model is then set.
    The function continues by setting the processed content image and style bottleneck
    vector for the interpreter. The function ends by returning the transformed content
    image.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 函数创建一个风格变换模型，该模型将风格瓶颈向量应用于内容图像以创建拼贴。该函数接受风格瓶颈向量和处理过的内容图像。然后它将风格变换路径加载到解释器对象（tf.lite.Interpreter）中。解释器使用style_transform_path创建tflite变换风格。然后设置解释器模型的输入。函数继续设置处理过的内容图像和风格瓶颈向量。函数通过返回变换后的内容图像结束。
