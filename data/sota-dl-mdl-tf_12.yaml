  type: TYPE_NORMAL
  zh: 预处理图像
- en: Since both images are PIL images, we convert them to tensors so they are consumable
    by the pre-trained model. The recommended size for the style reference image is
    256 × 256 because this is the size expected by the pre-trained style transfer
    network we use for this experiment. The content image can be any size.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 由于两个图像都是 PIL 图像，我们将它们转换为张量，以便它们可以被预训练模型消费。风格参考图像的推荐大小是 256 × 256，因为这是我们用于此实验的预训练风格迁移网络所期望的大小。内容图像可以是任何大小。
- en: 'Convert the style reference image to a NumPy array and scale it:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 将风格参考图像转换为 NumPy 数组并缩放：
- en: '[PRE10]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Resize the style reference image to what is expected by the style transfer
    network:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 将风格参考图像调整到风格迁移网络所期望的大小：
- en: '[PRE11]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Voilà. The style reference image is ready to be consumed by the style transfer
    network.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！风格参考图像已准备好被风格迁移网络消费。
- en: 'Convert the content image to a NumPy array and scale it:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 将内容图像转换为 NumPy 数组并缩放：
- en: '[PRE12]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Since the content image can be any size, it is now ready to be consumed by the
    style transfer network.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 由于内容图像可以是任何大小，它现在已准备好被风格迁移网络消费。
- en: Display Processed Images
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示处理后的图像
- en: 'Create a display function:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个显示函数：
- en: '[PRE13]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Display the processed style reference image:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 显示处理后的风格参考图像：
- en: '[PRE14]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Display the processed content image:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 显示处理后的内容图像：
- en: '[PRE15]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Prepare Image Batches
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备图像批次
- en: Although the processed content and style reference images are consumable by
    the style transfer network, it expects each image as a separate batch. So each
    batch must be a 4D tensor with shape *[batch_size, image_height, image_width,
    3]*. Since content and style reference images are currently 3D tensors with shapes
    *[image_height, image_width, 3]*, we add a batch dimension of “1” to satisfy the
    requirement. The network also requires images as TensorFlow tensors. So we convert
    them to TensorFlow tensors.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然处理后的内容和风格参考图像可以被风格迁移网络消费，但它期望每个图像作为一个单独的批次。因此，每个批次必须是一个形状为 *[batch_size, image_height,
    image_width, 3]* 的 4D 张量。由于内容和风格参考图像目前是形状为 *[image_height, image_width, 3]* 的
    3D 张量，我们添加一个“1”的批处理维度以满足要求。网络还要求图像为 TensorFlow 张量。因此，我们将它们转换为 TensorFlow 张量。
- en: Input and output values of the images are expected to be in the range [0, 1].
    We already satisfied this requirement by scaling both images. Shapes of content
    and style reference images don't have to match. So we are fine in that regard.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 输入和输出图像的值预期在范围 [0, 1] 内。我们已经通过缩放两个图像来满足这一要求。内容和风格参考图像的形状不必匹配。所以在这一点上我们没问题。
- en: Note
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The pastiche (output image) shape is adapted from the content image shape.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 拼贴画（输出图像）的形状是从内容图像的形状中适配的。
- en: 'Add the batch dimension to both images:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 为两个图像添加批处理维度：
- en: '[PRE16]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Convert NumPy images to TensorFlow tensors:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 将 NumPy 图像转换为 TensorFlow 张量：
- en: '[PRE17]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Load the Model
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载模型
- en: As stated earlier, we use the *arbitrary-image-stylization-v1-256* network to
    create a pastiche. Earlier NST models are limited to a pre-selected handful of
    styles because a separate neural network must be trained for each style image.
    Arbitrary style transfer mitigates this limitation by including a style network
    and transformer network.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们使用 *arbitrary-image-stylization-v1-256* 网络来创建拼贴画。早期的 NST 模型受限于预先选择的少数几种风格，因为必须为每种风格图像训练一个单独的神经网络。任意风格迁移通过包括风格网络和转换网络来减轻这种限制。
- en: The *style network* learns how to break down an image into a 100-dimensional
    vector (or style bottleneck vector) that represents its style. The *transformer
    network* learns how to produce the final stylized image from the style bottleneck
    vector and original content image. Arbitrary style networks are state-of-the-art
    (as of this writing) because they are faster than original NST networks and more
    flexible than fast style transfer networks.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '*风格网络*学习如何将图像分解成一个100维向量（或风格瓶颈向量），它代表了其风格。*转换网络*学习如何从风格瓶颈向量和原始内容图像生成最终的风格化图像。任意风格网络（截至本文写作时）是当前最先进的，因为它们比原始NST网络更快，比快速风格迁移网络更灵活。'
- en: 'Load the pre-trained ANAS network:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 加载预训练的ANAS网络：
- en: '[PRE18]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Build the hub module from a pre-trained ANAS network.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 从预训练的ANAS网络构建hub模块。
- en: Feed the Model
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提供模型：
- en: 'Demonstrate arbitrary style transfer:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 展示任意风格迁移：
- en: '[PRE19]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: The signature of the hub module accepts the processed content image and the
    processed style reference image to create a pastiche by learning how to blend
    the two tensors. A *signature* is the procedural syntax required to train a model.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: hub模块的签名接受处理后的内容图像和处理后的风格参考图像，通过学习如何混合两个张量来创建Pastiche。*签名*是训练模型所需的程序语法。
- en: Training is fast with the GPU! But training the hub module signature with a
    CPU takes some time.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 使用GPU进行训练速度快！但使用CPU训练hub模块签名需要一些时间。
- en: Explore the Pastiche
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索Pastiche
- en: 'Explore image shapes:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 探索图像形状：
- en: '[PRE20]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Convert the pastiche to NumPy for easy exploration. The shape is not exactly
    the same as the content image, but very close.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 将Pastiche转换为NumPy以方便探索。形状与内容图像不完全相同，但非常接近。
- en: 'Explore a slice from the stylized image tensor:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 从风格化图像张量中探索一个切片：
- en: '[PRE21]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The pastiche has the same pixel characteristics as the content and style reference
    images.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: Pastiche具有与内容和风格参考图像相同的像素特征。
- en: 'Extract matrix components:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 提取矩阵组件：
- en: '[PRE22]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: The pastiche array is a 3D matrix consisting of 184 rows, 280 columns, and 3
    channels.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Pastiche数组是一个由184行、280列和3个通道组成的3D矩阵。
- en: 'Get the number of pixels in the matrix:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 获取矩阵中的像素数：
- en: '[PRE23]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Each RGB channel has 51,520 pixels. **RGB** refers to three hues of light (red,
    green, and blue) that can be mixed together to create different colors. Combining
    red, green, and blue lights is the standard method for producing color images
    on screens such as TVs, computer monitors, and smartphones. The *RGB color model*
    is an additive model because the three light beams of color are added together
    (light spectra wavelength by light spectra wavelength) to create the final color
    spectrum.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 每个RGB通道有51,520个像素。**RGB**指的是三种光（红色、绿色和蓝色）的组合，可以混合成不同的颜色。将红、绿、蓝光混合是生产电视、计算机显示器和智能手机等屏幕上彩色图像的标准方法。*RGB颜色模型*是一个加色模型，因为三种颜色的光束（光光谱波长与光光谱波长）相加，以创建最终的颜色光谱。
- en: 'Check if RGB channel pixels are scaled:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 检查RGB通道像素是否缩放：
- en: '[PRE24]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The algorithms check if the pixels in each channel are less than one. We display
    the length of each algorithmically modified channel to see if they contain the
    expected number of pixels. So far everything checks out.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 算法检查每个通道中的像素是否小于1。我们显示每个算法修改后的通道的长度，以查看它们是否包含预期的像素数量。到目前为止，一切检查正常。
- en: 'Since all truth table values aren’t displayed, we need one more step to verify
    that scaling worked as expected:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 由于没有显示所有真值表值，我们需要额外一步来验证缩放是否按预期工作：
- en: '[PRE25]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: The *all()* function returns True if all items in an iterable are true; otherwise,
    it returns False. So all pixels are scaled. An **iterable** is an object that
    can be iterated over. A Python list is an example of an iterable.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '*all()*函数如果可迭代中的所有项目都为真，则返回True；否则，返回False。所以所有像素都缩放了。一个可迭代的对象是一个可以迭代的对象。Python列表就是一个可迭代的例子。'
- en: 'But we can check if all matrix pixels are scaled in *one* step:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们可以检查所有矩阵像素是否在*一步*中缩放：
- en: '[PRE26]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Note
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: We demonstrate the multistep process to provide a glimpse under the hood of
    the stylized image.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我们展示了多步骤过程，以一瞥风格图像的内部机制。
