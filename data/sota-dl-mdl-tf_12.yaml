- en: TensorFlow Lite Experiment
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow Lite 实验
- en: '*TensorFlow Lite* is an open source deep learning framework to run TensorFlow
    models on-device. **On-Device Portals** (ODPs) allow mobile phone users to easily
    browse, purchase, and use mobile content and services. An ODP platform enables
    operators to provide a consistent and branded on-device experience across a large
    portfolio of services. TensorFlow Lite provides an ODP platform to experiment
    with and deploy deep learning experiments on their phone.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '*TensorFlow Lite* 是一个开源深度学习框架，用于在设备上运行 TensorFlow 模型。**设备门户** (ODPs) 允许手机用户轻松浏览、购买和使用移动内容和服务。ODP
    平台使运营商能够在大量服务中提供一致且品牌化的设备体验。TensorFlow Lite 为实验和部署深度学习实验提供了 ODP 平台。'
- en: To get started with TensorFlow Lite on your device, peruse
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 要在您的设备上开始使用 TensorFlow Lite，请参阅
- en: '[`www.tensorflow.org/lite/examples`](http://www.tensorflow.org/lite/examples)'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '[www.tensorflow.org/lite/examples](http://www.tensorflow.org/lite/examples)'
- en: For an excellent TensorFlow Lite style transfer example, peruse
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个优秀的 TensorFlow Lite 风格迁移示例，请参阅
- en: '[`www.tensorflow.org/lite/examples/style_transfer/overview`](http://www.tensorflow.org/lite/examples/style_transfer/overview)'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '[www.tensorflow.org/lite/examples/style_transfer/overview](http://www.tensorflow.org/lite/examples/style_transfer/overview)'
- en: But TensorFlow Lite does not have to be deployed on-device. It can be run on
    a PC. We run this experiment in a Colab notebook on a PC for three reasons. First,
    we know that our PC has enough RAM to run full-fledged TensorFlow experiments.
    So we won’t have any issues running a TensorFlow Lite experiment! It is also nice
    to have an actual keyboard and a large screen. Second, we don’t know what type
    of on-device you use (e.g., Android, iOS, etc.). Third, TensorFlow Lite modules
    are pre-installed in Colab!
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 但 TensorFlow Lite 不必在设备上部署。它可以在 PC 上运行。我们出于三个原因在 PC 上的 Colab 笔记本中运行此实验。首先，我们知道我们的
    PC 有足够的 RAM 来运行完整的 TensorFlow 实验。因此，我们不会在运行 TensorFlow Lite 实验时遇到任何问题！拥有实际的键盘和大屏幕也很不错。其次，我们不知道你使用的是哪种类型的设备（例如，Android、iOS
    等）。第三，TensorFlow Lite 模块已在 Colab 中预先安装！
- en: If you want to develop on-device, we definitely recommend TensorFlow Lite because
    it is optimized to run on a variety of devices including mobile phones, embedded
    Linux devices, and microcontrollers. So TensorFlow Lite has better on-device performance
    and a smaller binary file size than TensorFlow.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想在设备上开发，我们强烈推荐 TensorFlow Lite，因为它针对各种设备进行了优化，包括手机、嵌入式 Linux 设备和微控制器。因此，TensorFlow
    Lite 比TensorFlow 在设备上具有更好的性能和更小的二进制文件大小。
- en: Architecture for a Pre-trained TensorFlow Lite Model
  id: totrans-199
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预训练 TensorFlow Lite 模型的架构
- en: Content images are exactly the same as what we already worked with in the first
    experiment. As in the first experiment, style images are transformed (or bottlenecked)
    into *100-dimensional style bottleneck vectors* before being fed into the style
    transform model. But unlike the first experiment, we manually manipulate the style
    image into a consumable form by the model.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 内容图像与我们已经在第一个实验中处理过的图像完全相同。与第一个实验一样，风格图像在输入到风格转换模型之前被转换（或瓶颈化）为*100维度的风格瓶颈向量*。但与第一个实验不同，我们手动将风格图像转换为模型可消费的形式。
- en: The TensorFlow Lite artistic style transfer model consists of two submodels
    – Style Prediction Model and Style Transform Model. The *Style Prediction Model*
    is a pre-trained MobileNet-v2-based neural network that takes an input style reference
    image and transforms it into a 100-dimensional style bottleneck vector. The *Style
    Transform Model* is a neural network that applies a style bottleneck vector to
    a content image to create a pastiche.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow Lite艺术风格迁移模型由两个子模型组成——风格预测模型和风格转换模型。*风格预测模型*是一个基于预训练的MobileNet-v2神经网络，它接受一个输入风格参考图像并将其转换为100维度的风格瓶颈向量。*风格转换模型*是一个神经网络，它将风格瓶颈向量应用于内容图像以创建一幅拼贴画。
