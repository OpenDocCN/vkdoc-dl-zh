- en: 12. Fast Style Transfer
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 12. 快速风格迁移
- en: '**Neural style transfer (NST)** is a computer vision technique that takes two
    images – a content image and a style reference image – and blends them together
    so that the resulting output image retains the core elements of the content image
    but appears to be painted in the style of the style reference image. The output
    image from a NST network is called a pastiche. A **pastiche** is a work of visual
    art, literature, theater or music that imitates the style (or character) of the
    work of one or more other artists. Unlike a parody, a pastiche celebrates rather
    than mocks the work it imitates.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**神经风格迁移（NST）**是一种计算机视觉技术，它将两张图像——内容图像和风格参考图像——混合在一起，使得生成的输出图像保留了内容图像的核心元素，但看起来像是用风格参考图像的风格绘制的。NST网络的输出图像被称为混合体。**混合体**是一种视觉艺术、文学、戏剧或音乐作品，它模仿一位或多位其他艺术家的风格（或人物）。与讽刺作品不同，混合体赞美而不是嘲笑它所模仿的作品。'
- en: In many applications of NST, the content image is a photograph, and the style
    reference image is a painting. But this is not a requirement. The wonder of NST
    is that we can take an artwork by a famous painter and blend it so the output
    image looks like the content image painted in the reference image style. So we
    can train NST networks to automatically create new artistic renderings!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在NST的许多应用中，内容图像是一张照片，风格参考图像是一幅画。但这不是必需的。NST的奇妙之处在于我们可以将著名画家的作品混合，使得输出图像看起来像是用参考图像的风格绘制的。因此，我们可以训练NST网络自动创建新的艺术表现！
- en: Note
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The terms network and model are interchangeable in the data science vernacular
    (at least when working with neural network models).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学术语中，网络和模型是可以互换的（至少在处理神经网络模型时是这样）。
- en: The technique is implemented by optimizing the output image to match the content
    statistics of the content image and the style statistics of the style reference
    image. Statistics are extracted from the images using a convolutional network.
    The idea is to train the network to match a base input image with the content
    and style reference images. NST transforms the base input image by minimizing
    the content and style reference distances (or losses) with back-propagation to
    create an image that matches the content of the content image and the style of
    the style reference image.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 该技术通过优化输出图像以匹配内容图像的内容统计和风格参考图像的风格统计来实现。统计信息是通过卷积网络从图像中提取的。想法是训练网络以匹配基本输入图像与内容和风格参考图像。NST通过反向传播最小化内容和风格参考距离（或损失），从而创建一个与内容图像的内容相匹配且具有风格参考图像风格的图像。
- en: To extract the content and style representations into a pastiche, the neural
    net includes intermediate layers. Intermediate layers represent feature maps that
    become increasingly higher-ordered as we go deeper into the network to define
    the representation of content and style from the respective images. During training,
    the network tries to match the base input image to the corresponding style and
    content target representations at the intermediate layers.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将内容和风格表示提取成混合体，神经网络包括中间层。中间层代表特征图，随着我们深入网络，这些特征图的阶数越来越高，从而定义了从各自图像中提取的内容和风格表示。在训练过程中，网络试图将基本输入图像与中间层中相应的风格和内容目标表示相匹配。
- en: For a network to perform image classification, it must understand the image.
    So it takes a raw image as input pixels and builds an internal representation
    through transformations that turn raw image pixels into a complex understanding
    of the features present within the image. The *intermediate layers* of the network
    perform the transformations that allow the model to extract meaningful features
    from the raw input pixels of the images. So the intermediate layers are able to
    describe the content and style of input images with precision.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使网络执行图像分类，它必须理解图像。因此，它以原始图像作为输入像素，并通过将原始图像像素转换为对图像中存在的特征复杂理解的一系列变换来构建内部表示。网络的*中间层*执行允许模型从图像的原始输入像素中提取有意义的特征的变换。因此，中间层能够精确地描述输入图像的内容和风格。
- en: Despite amazing results, NST operates at a slow pace because it treats the task
    as an optimization problem with hundreds or even thousands of iterations to perform
    style transfer on just a single image! To tackle this inefficiency, deep learning
    researchers developed a technique referred to as fast (neural) style transfer.
    **Fast style transfer** uses deep neural networks, but trains a standalone model
    to transform an image in a *single* feedforward pass! So trained fast style transfer
    models can stylize any image with just one iteration (or epoch) through the network
    instead of hundreds or thousands.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管取得了惊人的成果，但NST由于将其视为一个需要数百次甚至数千次迭代来对单张图像进行风格迁移的优化问题，因此运行速度较慢！为了解决这种低效性，深度学习研究人员开发了一种称为快速（神经网络）风格迁移的技术。**快速风格迁移**使用深度神经网络，但训练一个独立的模型，通过单次前馈传递来转换图像！因此，训练好的快速风格迁移模型只需通过网络进行一次（或一个周期）迭代即可对任何图像进行风格化，而不是数百或数千次。
- en: Why Is Style Transfer Important?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么风格迁移很重要？
- en: Not everyone is a born artist. But with recent advances in technologies like
    style transfer, almost anyone can enjoy the pleasure that comes along with creating
    and sharing an artistic masterpiece.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每个人都是天生的艺术家。但随着风格迁移等技术的最新进展，几乎任何人都可以享受到创作和分享艺术杰作带来的乐趣。
- en: With the transformative power of style transfer, artists can easily lend their
    creative aesthetic to others. People without inherent artistic ability can create
    new and innovative representations of artistic styles to live alongside original
    masterpieces. So style transfer empowers people to cultivate their own creativity!
    Creative transformations may lead to new artistic representations that may never
    have otherwise been created.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 风格迁移的变革力量使得艺术家可以轻松地将自己的创意美学赋予他人。没有天生艺术能力的人也能创造出与原创杰作并驾齐驱的新颖和创新的艺术风格。因此，风格迁移赋予了人们培养自己创造力的能力！创意的转换可能导致新的艺术表现，这些表现可能在其他情况下永远不会被创造出来。
- en: Arbitrary Neural Artistic Stylization
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 任意神经网络艺术风格化
- en: Although fast style transfer networks are fast, they are limited to a preselected
    handful of styles because a separate neural network must be trained for each style
    image. *Arbitrary Neural Artistic Stylization* (ANAS) mitigates this limitation
    by using a style network and transformer network. The *style network* learns how
    to break down an image into a 100-dimensional vector (or style vector) that represents
    its style. The *transformer network* learns how to produce the final stylized
    image from the style vector and original content image.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管快速风格迁移网络速度快，但它们仅限于预先选定的少数几种风格，因为必须为每种风格图像训练一个独立的神经网络。*任意神经网络艺术风格化*（ANAS）通过使用风格网络和转换网络来减轻这种限制。*风格网络*学习如何将图像分解成一个代表其风格的100维向量（或风格向量）。*转换网络*学习如何从风格向量和原始内容图像中生成最终的风格化图像。
- en: Note
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Style vectors are also referred to as style bottleneck vectors.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 风格向量也被称为风格瓶颈向量。
- en: ANAS networks are the latest incarnation of fast style networks. ANAS are considered
    better than NST and fast style transfer because they enable arbitrary style transfer
    in real time. So they are faster than NST and more flexible than fast style transfer
    because they automatically adapt to arbitrary new styles.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: ANAS网络是快速风格网络的最新版本。ANAS被认为比NST和快速风格迁移更好，因为它们能够实现实时任意风格迁移。因此，它们比NST更快，比快速风格迁移更灵活，因为它们可以自动适应任意新的风格。
- en: ANAS adds an *adaptive instance normalization* (AdaIN) layer that aligns the
    mean and variance of the content features with those of the style features. ANAS
    achieves speeds comparable to the fastest existing approaches without the restriction
    of a predefined set of styles. ANAS also allows flexible user controls such as
    content-style trade-off, style interpolation, and color and spatial controls with
    only a single feedforward neural network pass!
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: ANAS增加了一个*自适应实例归一化*（AdaIN）层，该层将内容特征的平均值和方差与风格特征的平均值和方差对齐。ANAS在不限制预定义风格集的情况下，实现了与现有最快方法相当的速度。ANAS还允许灵活的用户控制，如内容-风格权衡、风格插值以及仅通过单次前馈神经网络传递进行颜色和空间控制！
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 章节的笔记本位于以下网址：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/paperd/deep-learning-models](https://github.com/paperd/deep-learning-models)'
- en: Since ANAS is the fastest and best implementation of NST, we demonstrate it
    with an end-to-end code experiment. We include a second ANAS experiment using
    a pre-trained transfer model from the TensorFlow Lite module.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 ANAS 是 NST 最快和最好的实现，我们通过端到端代码实验来展示它。我们还包括一个使用 TensorFlow Lite 模块中的预训练迁移模型的第二个
    ANAS 实验。
- en: '**TensorFlow Lite** is a set of tools to help developers run TensorFlow models
    on mobile, embedded, and IoT (Internet of Things) devices. It enables on-device
    ML inference with low latency and a small binary size. An **IoT** device is one
    that has a sensor attached to it and can transmit data from one object to another
    or to people with the help of the Internet. *Low latency* describes a computer
    network that is optimized to process a very high volume of data messages with
    minimal delay (or latency). Such networks are designed to support operations that
    require near-real-time access to rapidly changing data.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**TensorFlow Lite** 是一套工具，帮助开发者将 TensorFlow 模型在移动、嵌入式和物联网 (IoT) 设备上运行。它允许在设备上以低延迟和小二进制大小进行机器学习推理。**IoT**
    设备是连接了传感器并能通过互联网将数据从一个对象传输到另一个对象或传输给人们的设备。*低延迟* 描述的是一个优化以处理非常高的数据消息量并具有最小延迟（或延迟）的计算机网络。此类网络旨在支持需要近乎实时访问快速变化数据的操作。'
