    a number of factory functions including those to load images from files and create
    new images.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '*gridspec* 模块指定了子图放置的网格几何形状。设置网格的行数和列数是必需的。*TensorFlow Hub* 是一个预训练机器学习模型的存储库，只需几行代码即可在任何地方调整和部署。*Image*
    模块用于表示 Python 图像库 (PIL) 图像。*PIL* 模块提供了一些工厂函数，包括从文件加载图像和创建新图像的函数。'
