- en: We feed the cropped style image into the Style Prediction Model to create a
    style bottleneck vector. We then feed the cropped content image and newly created
    style bottleneck vector into the Style Transform Model to create a pastiche.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将裁剪的风格图像输入到风格预测模型中，以创建风格瓶颈向量。然后，我们将裁剪的内容图像和新建的风格瓶颈向量输入到风格转换模型中，以创建一幅拼贴画。
- en: Create the Style Prediction Model
  id: totrans-225
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建风格预测模型
- en: Create a function for the Style Prediction Model as shown in Listing [12-7](#PC62).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如清单[12-7](#PC62)所示的风格预测模型函数。
- en: '[PRE61]'
  id: totrans-227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: The function creates a Style Prediction Model to run style prediction on the
    cropped style image (*style_lite*). The function accepts a processed style reference
    image. It then loads the style prediction path into the interpreter object (*tf.lite.Interpreter*).
    The interpreter is a TensorFlow Lite pre-trained MobileNet-v2-based neural network.
    The interpreter uses the style_predict_path to create a tflite predicted style.
    Input to the interpreter model is then set. The function continues by calculating
    the style bottleneck. The function ends by using the bottleneck calculation and
    the tflite predicted style to transform the style image into a 100-dimensional
    style bottleneck vector. Simply, the function accepts a style reference image
    and transforms it into a 100-dimensional style bottleneck vector.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数创建一个风格预测模型，用于在裁剪的风格图像（*style_lite*）上运行风格预测。该函数接受一个处理过的风格参考图像。然后，它将风格预测路径加载到解释器对象（*tf.lite.Interpreter*）中。解释器是一个基于TensorFlow
    Lite预训练的MobileNet-v2神经网络。解释器使用style_predict_path创建一个tflite预测风格。然后设置解释器模型的输入。该函数继续通过计算风格瓶颈。该函数通过使用瓶颈计算和tflite预测风格将风格图像转换为100维度的风格瓶颈向量。简单来说，该函数接受一个风格参考图像并将其转换为100维度的风格瓶颈向量。
- en: 'Set the style prediction path:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 设置风格预测路径：
- en: '[PRE62]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
