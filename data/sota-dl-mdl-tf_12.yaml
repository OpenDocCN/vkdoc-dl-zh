- en: Cropping is one of the most basic data augmentation processes for images. The
    idea is to remove unwanted or irrelevant noise from the periphery of an image,
    change its aspect ratio or improve its overall composition.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 裁剪是图像最基本的数据增强过程之一。其想法是从图像的边缘移除不需要或不相关的噪声，改变其长宽比或改善其整体构图。
