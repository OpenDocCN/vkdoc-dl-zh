  zh: 风格混合
- en: By blending the style of the content image into the stylized output, we make
    the pastiche look more like the content image.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将内容图像的风格混合到风格化输出中，我们使拼贴看起来更像内容图像。
