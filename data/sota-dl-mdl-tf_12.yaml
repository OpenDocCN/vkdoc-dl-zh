- en: Blend the Style Bottleneck Vectors
  id: totrans-254
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 混合风格瓶颈向量
- en: Blend the style bottleneck vector with the content-style bottleneck vector (*style_bottleneck_content*).
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 将风格瓶颈向量与内容-风格瓶颈向量（*style_bottleneck_content*）混合。
- en: 'Define the content blending ratio (between 0 and 1):'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 定义内容混合比例（介于0和1之间）：
- en: '[PRE71]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: The range of blending the content image into the pastiche is from 0% to 100%.
    To extract no style from the content image, assign 0%. Zero percent means that
    the blended pastiche is the same as the pastiche. To extract all of the style
    from the content image, assign 100%. We set the blending ratio to 50% to extract
    half of the style from the content image.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 将内容图像混合到拼贴中的范围是从0%到100%。为了从内容图像中提取无风格，分配0%。零百分比意味着混合拼贴与拼贴相同。为了从内容图像中提取所有风格，分配100%。我们将混合比例设置为50%以从内容图像中提取一半的风格。
- en: 'Get a blended style bottleneck vector from the style bottleneck and content-style
    bottleneck vectors:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 从风格瓶颈和内容-风格瓶颈向量中获取混合的风格瓶颈向量：
