- en: Summary
  id: totrans-273
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The first experiment demonstrates an ANAS implementation of NST with an end-to-end
    code experiment. The second experiment demonstrates an ANAS implementation of
    NST with a pre-trained transfer model from the TensorFlow Lite module.
  id: totrans-274
