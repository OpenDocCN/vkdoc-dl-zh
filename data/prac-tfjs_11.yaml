  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 tfjs-vis 生成的模型摘要
- en: '[PRE4]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Or you can visualize the distribution of a tensor’s values (Figure [11-2](#Fig2))
    with
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，您可以使用以下方式可视化张量值的分布（图 [11-2](#Fig2)）。
- en: '![../images/494424_1_En_11_Chapter/494424_1_En_11_Fig2_HTML.jpg](../images/494424_1_En_11_Chapter/494424_1_En_11_Fig2_HTML.jpg)'
  id: totrans-26
