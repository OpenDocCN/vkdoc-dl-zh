- en: 1. What Is Deep Learning?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 什么是深度学习？
- en: We live in the era of artificial intelligence (AI).
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们生活在人工智能（AI）的时代。
- en: We may be born a little too late to explore earth, and born too early to explore
    the universe. Yet we may be here just in time to witness the rise of AI.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能出生得有点晚，无法探索地球，又太早了，无法探索宇宙。然而，我们可能正好赶上了人工智能的兴起。
- en: And we can help build that future.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以帮助构建那个未来。
- en: Innovation in the field of AI is happening daily, from smart consumer devices
    to AI personal assistants to self-driving cars. The technology giants—Google,
    Facebook, Amazon, Microsoft, Apple, IBM, and AI-specialized organizations like
    DeepMind and OpenAI—strive to build AI technologies in a variety of fields that
    solve problems and improve the quality of life.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能领域的创新每天都在发生，从智能消费设备到人工智能个人助理再到自动驾驶汽车。技术巨头——谷歌、Facebook、亚马逊、微软、苹果、IBM，以及像DeepMind和OpenAI这样的专注于人工智能的组织——都在努力在各个领域构建人工智能技术，以解决问题并提高生活质量。
- en: Deep learning is the latest iteration of AI. Although the concept itself has
    been around for many years, deep learning has become popular during the past few
    years due to the remarkable breakthroughs it continues to achieve. What was science
    fiction a decade ago is now becoming a reality.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习是人工智能的最新迭代。尽管这个概念本身已经存在很多年了，但由于它不断取得的显著突破，深度学习在过去几年中变得流行起来。十年前还是科幻的东西，现在正成为现实。
- en: Thanks to deep learning, AI technologies are increasingly becoming a part of
    our household. Today, most of our consumer devices and services have some sort
    of AI built into them. Maybe it is time you joined the revolution. You too can
    start contributing to this AI drive.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了深度学习，人工智能技术正日益成为我们家庭生活的一部分。如今，我们的大多数消费设备和服务都内置了某种人工智能。也许现在是时候加入这场革命了。你也可以开始为这场人工智能的驱动贡献力量。
- en: But first, we need to make sure that we understand what deep learning is.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，我们需要确保我们理解深度学习是什么。
- en: Defining Deep Learning
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义深度学习
- en: Whether you are coming from a traditional AI background or just starting in
    the AI field, you might be wondering what the terms “artificial intelligence,”
    “machine learning,” and “deep learning” mean, as well as the other terminology
    surrounding it (Figure [1-1](#Fig1)).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是来自传统的人工智能背景，还是刚开始进入人工智能领域，你可能会想知道“人工智能”、“机器学习”、“深度学习”等术语的含义，以及与之相关的其他术语（见图[1-1](#Fig1)）。
- en: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig1_HTML.jpg](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig1_HTML.jpg)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig1_HTML.jpg](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig1_HTML.jpg)'
- en: Figure 1-1
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1
- en: The deep learning confusion
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习的困惑
- en: With the term “deep learning” becoming a buzzword, and becoming a part of some
    consumer technologies as well, it may be hard to figure out what each of these
    terms mean and how they relate to each other. You might be trying to figure out
    whether these three terms can be used interchangeably, and where each of them
    came from.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 随着“深度学习”一词成为热门词汇，并成为一些消费技术的一部分，可能很难弄清楚这些术语各自意味着什么，以及它们是如何相互关联的。你可能正在试图弄清楚这三个术语是否可以互换使用，以及它们各自的来源。
- en: These are common questions that come to all of us when we are beginning the
    deep learning journey. Let us see how we can answer them.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们开始深度学习之旅时，这些问题是我们所有人都会遇到的常见问题。让我们看看我们如何回答这些问题。
- en: '*Deep learning* is a subset of machine learning that deals with hierarchical
    feature learning.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '*深度学习* 是机器学习的一个子集，它处理层次特征学习。'
- en: '*Machine learning* is an approach to artificial intelligence that aims at providing
    machines with the ability to learn without explicitly programming them.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '*机器学习* 是一种人工智能方法，旨在使机器能够在没有明确编程的情况下学习。'
- en: As for artificial intelligence, we should probably start from the beginning.
    It all started with the idea of *intelligent machines*.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能来说，我们可能需要从最基本的概念开始。一切始于*智能机器*的想法。
- en: Intelligent Machines
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能机器
- en: The concept of intelligent machines is the idea that machines can be built with
    parallel (or greater) intelligence of a human being, giving them the capacity
    to perform tasks that require human intelligence.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 智能机器的概念是指可以构建出与人类平行（或更高）的智能的机器，赋予它们执行需要人类智能的任务的能力。
- en: Human beings have been obsessed with this idea since ancient times, and written
    records of it can be traced back to the 1300s (from the works of Ramon Llull,
    1232–1315). By the seventeenth century, Gottfried Leibniz expanded on this idea
    with his *calculus ratiocinator*—a theoretical universal logical calculation framework.
    By the nineteenth century, the concept of *formal reasoning* had begun, with the
    introduction of concepts such as *propositional logic* by George Boole and *predicate
    calculus* by Gottlob Frege.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 人类自古以来就着迷于这个想法，其书面记录可以追溯到13世纪（来自拉蒙·卢尔的作品，1232-1315年）。到17世纪，戈特弗里德·莱布尼茨通过他的**演算术**——一个理论上的通用逻辑计算框架——扩展了这个想法。到19世纪，随着乔治·布尔提出的**命题逻辑**和戈特洛布·弗雷格提出的**谓词演算**等概念的引入，**形式推理**的概念已经开始。
- en: However, there was no formal research concept for AI until the Dartmouth Conference
    in 1956.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，直到1956年的达特茅斯会议，人工智能还没有一个正式的研究概念。
- en: Artificial Intelligence
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能
- en: In June 1956, many experts in the field—scientists and mathematicians—came together
    at Dartmouth College in New Hampshire. This conference, titled “The Dartmouth
    Summer Research Project on Artificial Intelligence,” was the starting point of
    the formal research field of artificial intelligence. The Logic Theorist, developed
    by Allen Newell, Herbert A. Simon, and Cliff Shaw, now considered to be the first
    artificial intelligence program, was also presented in the Dartmouth conference.
    The Logic Theorist was meant to mimic the logical problem solving of a human and
    was able to prove 38 out of the first 52 theorems in *Principia Mathematica* (a
    book on principles of mathematics written by Alfred North Whitehead and Bertrand
    Russell).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 1956年6月，许多领域的专家——科学家和数学家——聚集在纽约州汉普郡的达特茅斯学院。这次会议，名为“达特茅斯夏季人工智能研究项目”，是人工智能正式研究领域的起点。艾伦·纽厄尔、赫伯特·A·西蒙和克利夫·肖开发的逻辑理论家，现在被认为是第一个人工智能程序，也在达特茅斯会议上展出。逻辑理论家的目的是模仿人类的逻辑问题解决能力，并能证明《数学原理》中前52个定理中的38个（由阿尔弗雷德·诺思·怀特海德和伯特兰·罗素撰写的关于数学原理的书籍）。
- en: By the 1960s, AI research was in full swing. It had funding from the US Department
    of Defense, more and more AI research labs were being established, and researchers
    were optimistic. Herbert A. Simon had predicted in 1965 that “machines will be
    capable, within twenty years, of doing any work a man can do.”^([1](#Fn1))
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 到了20世纪60年代，人工智能研究已经全面展开。它得到了美国国防部的资助，越来越多的AI研究实验室被建立，研究人员们充满乐观。Herbert A. Simon在1965年预测，“机器将在二十年内能够完成任何人类能够完成的工作。”^([1](#Fn1))
- en: But AI did not progress quite that fast.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 但人工智能的发展并没有那么快。
- en: 'Around the late 1990s and early 2000s, researchers identified a problem in
    their approach to AI: to artificially create a machine with intelligence, *one
    needed to first understand how intelligence worked*.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪90年代末和21世纪初，研究人员在他们对人工智能的方法中识别出一个问题：为了人工创造一个具有智能的机器，**首先需要理解智能是如何工作的**。
- en: Even today, we do not have a complete definition of what we call “intelligence.”
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在今天，我们也没有一个完整的定义来描述我们所说的“智能”。
- en: 'To tackle the problem, researchers decided to work from the ground up: rather
    than trying to build intelligence, they investigated building a system that could
    grow an intelligence on its own.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，研究人员决定从基础做起：与其试图构建智能，他们决定研究如何构建一个能够自主增长智能的系统。
- en: This idea created the new subfield of AI called *machine* *learning*.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法催生了人工智能领域的新分支，即**机器学习**。
- en: Machine Learning
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习
- en: Machine learning is a subset of artificial intelligence and aims at providing
    machines the ability to learn without explicit programming. The idea is that such
    machines (or computer programs), once built, will be able to evolve and adapt
    when they are exposed to new data.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习是人工智能的一个子集，旨在为机器提供无需明确编程就能学习的能力。其理念是，这样的机器（或计算机程序），一旦构建完成，将能够在接触到新数据时进化并适应。
- en: The main idea behind machine learning is the ability of a learner to generalize
    from experience. The learner (or the program), once given a set of training samples,
    must be able to build a generalized model upon them, which would allow it to decide
    upon new cases with sufficient accuracy.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习背后的主要思想是学习者从经验中归纳的能力。一旦给定了训练样本集，学习者（或程序）必须能够基于这些样本构建一个泛化模型，这将允许它以足够的准确性对新案例做出决定。
- en: 'Based on this approach, there are three learning methods for machine learning
    systems:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这种方法，机器学习系统有三种学习方式：
- en: '**Supervised learning:** The system is given a set of labeled cases (a training
    set), based on which it is asked to create a generalized model that can act on
    unseen cases.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监督学习**：系统被给予一组标记的案例（一个训练集），基于这些案例，它被要求创建一个可以作用于未见案例的通用模型。'
- en: '**Unsupervised learning:** The system is given a set of unlabeled cases and
    asked to find a pattern in them. This is ideal for discovering hidden patterns.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无监督学习**：系统被给予一组未标记的案例，并要求在其中找到模式。这对于发现隐藏模式是理想的。'
- en: '**Reinforcement learning:** The system is asked to take any action and is given
    a reward, or a penalty based on how appropriate that action is to the given situation.
    The system must learn which actions yield the most rewards in given situations
    over time.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强化学习**：系统被要求采取任何行动，并根据该行动对给定情况的适宜性给予奖励或惩罚。系统必须学习在给定情况下哪些行动能带来最多的奖励。'
- en: With these techniques, the field of machine learning flourished. They were particularly
    successful in the areas of computer vision and text analysis. Over the years,
    many models have been introduced as means of implementing machine learning techniques,
    such as artificial neural networks (models inspired by how neurons of the brain
    works), decision trees (models that use tree-like structures to model decisions
    and outcomes), regression models (models that use statistical methods to map input
    and output variables), and so on.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技术使得机器学习领域蓬勃发展。它们在计算机视觉和文本分析等领域特别成功。多年来，许多模型被引入作为实现机器学习技术的手段，例如人工神经网络（受大脑神经元工作方式启发的模型）、决策树（使用树状结构来模拟决策和结果的模型）、回归模型（使用统计方法来映射输入和输出变量的模型）等等。
- en: 'Around 2010, a few things happened that influenced machine learning research:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 大约在2010年，发生了一些影响机器学习研究的事件：
- en: Computing power became more available, and evaluating more complex models became
    easier.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算能力变得更加可用，评估更复杂的模型变得更加容易。
- en: Data processing and storage became cheaper. More data became available for consumption.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据处理和存储变得更加便宜。更多的数据可供消费。
- en: Our understanding of how the natural brain works increased, allowing us to model
    new machine learning algorithms around them.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们对自然大脑如何工作的理解增加了，这使我们能够围绕它们建模新的机器学习算法。
- en: These breakthroughs propelled us into a new area of machine learning called
    *deep learning*.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这些突破推动我们进入了一个新的机器学习领域，称为*深度学习*。
- en: Deep Learning
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习
- en: Deep learning is a subset of machine learning that focuses on an area of algorithms
    inspired by our understanding of how the brain works to obtain knowledge.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习是机器学习的一个子集，它专注于一个受我们对大脑工作方式理解启发的算法领域，以获取知识。
- en: It is also referred to as *deep structured learning* or *hierarchical learning*.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 它也被称为*深度结构学习*或*层次学习*。
- en: Deep learning builds upon the idea of artificial neural networks and scales
    it up, to be able to consume large amounts of data by deepening the networks in
    a specific way. Through a deeper network, a deep learning model has the capability
    of extracting features from raw data and “learn” about those features little by
    little in each layer, building up to a higher-level knowledge of the data. This
    technique is called *hierarchical* *feature* *learning*, and it allows such systems
    to automatically learn complex features through multiple levels of abstraction
    with minimal human intervention.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习建立在人工神经网络的理念之上，并通过以特定方式加深网络来扩展其规模，以便能够通过深度学习处理大量数据。通过更深的网络，深度学习模型能够从原始数据中提取特征，并在每一层逐渐“学习”这些特征，最终建立起对数据的高级理解。这种技术被称为*层次化*
    *特征* *学习*，它允许系统通过多层次的抽象自动学习复杂特征，而人类干预最小化。
- en: 'Following are some definitions of deep learning from some pioneering work in
    the field:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些关于深度学习的定义，这些定义来自该领域的开创性工作：
- en: '*A sub-field within machine learning that is based on algorithms for learning
    multiple levels of representation to model complex relationships among data. Higher-level
    features and concepts are thus defined in terms of lower-level ones, and such
    a hierarchy of features is called a deep architecture*.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '*机器学习的一个子领域，它基于学习多级表示的算法来模拟数据之间的复杂关系。因此，高级特征和概念是以低级特征来定义的，这样的特征层次结构被称为深度架构*。'
- en: '—*Deep Learning: Methods and Applications*^([2](#Fn2))'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: —*深度学习：方法和应用*^([2](#Fn2))
- en: '*The hierarchy of concepts allows the computer to learn complicated concepts
    by building them out of simpler ones. If we draw a graph showing how these concepts
    are built on top of each other, the graph is deep, with many layers. For this
    reason, we call this approach to AI, deep learning.*'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '*概念层次结构允许计算机通过构建更简单的概念来学习复杂的概念。如果我们绘制一个图来展示这些概念是如何相互构建的，那么这个图是深层次的，有多个层次。因此，我们将这种方法称为深度学习。*'
- en: —*Deep Learning*^([3](#Fn3))
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: —*深度学习*^([3](#Fn3))
- en: One of the most distinct characteristics of deep learning—and one that made
    it quite popular and practical—is that it scales well; that is, the more data
    given to it, the better it performs. Unlike many older machine learning algorithms
    that have an upper bound to the amount of data they can ingest—often called a
    *plateau* *in performance* (Figure [1-2](#Fig2))—deep learning models have no
    such limitations (theoretically), and they may be able to go beyond what humans
    can comprehend. This is evident with modern deep-learning-based image processing
    systems that are able to outperform humans.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习最显著的特点之一，也是使其非常受欢迎和实用的原因之一，是它具有良好的可扩展性；也就是说，给予它的数据越多，它的表现就越好。与许多旧的机器学习算法不同，这些算法对它们可以摄入的数据量有一个上限——通常称为*性能平台期*（图[1-2](#Fig2)）——深度学习模型没有这样的限制（理论上），并且它们可能能够超越人类所能理解的范围。这一点在现代基于深度学习的图像处理系统中表现得尤为明显，这些系统能够超越人类。
- en: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig2_HTML.png](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig2_HTML.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig2_HTML.png](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig2_HTML.png)'
- en: Figure 1-2
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-2
- en: The lack of plateau in performance in deep learning
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习中性能缺乏平台期
- en: Convolutional Neural Networks
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 卷积神经网络
- en: Convolutional neural networks (CNNs) are a prime example of deep learning. They
    were inspired by how the neurons are arranged in the visual cortex (the area of
    the brain which processes visual input). Here, not all neurons are connected to
    all the inputs from the visual field. Instead, the visual field is “tiled” with
    groups of neurons (called receptive fields) that partially overlap each other.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络（CNNs）是深度学习的一个主要例子。它们受到视觉皮层（大脑处理视觉输入的区域）中神经元排列方式的启发。在这里，并非所有神经元都与视觉场的所有输入相连。相反，视觉场被“铺砌”成由神经元群（称为感受野）组成的区域，这些区域部分重叠。
- en: CNNs work in a similar way. They process their input in overlapping blocks of
    the input using mathematical convolution operators, which approximates how a receptive
    field works (Figure [1-3](#Fig3)).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: CNNs以类似的方式工作。它们使用数学卷积算子处理输入的重叠块，这近似了感受野的工作方式（图[1-3](#Fig3)）。
- en: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig3_HTML.jpg](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig3_HTML.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig3_HTML.jpg](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig3_HTML.jpg)'
- en: Figure 1-3
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-3
- en: A convolutional neural network
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 一个卷积神经网络
- en: The first convolution layer uses a set of convolution filters to identify a
    set of low-level features from the input image. These identified low-level features
    are then pooled (from the pooling layers) and provided as input to the next convolution
    layer, which uses another set of convolution filter to identify a set of higher-level
    features from the lower-level features identified earlier. This continues for
    several layers, where each convolution layer uses the inputs from the previous
    layer to identify higher-level features than the previous layer. Finally, the
    output of the last convolution layer is passed on to a set of fully connected
    layers for the final classification.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层卷积使用一组卷积滤波器从输入图像中识别一组低级特征。这些识别出的低级特征随后被池化（来自池化层）并作为输入提供给下一层卷积，该层使用另一组卷积滤波器从先前识别的低级特征中识别一组更高级的特征。这个过程持续进行几层，每一层卷积都使用前一层输入来识别比前一层更高级的特征。最后，最后一层卷积的输出传递到一组全连接层进行最终分类。
- en: How Deep?
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多深？
- en: 'Once you grasp the capabilities of deep learning, there is one question that
    usually surfaces: If we say that deeper and more complex models give deep learning
    models the capabilities to surpass even human capabilities, then *how deep a machine
    learning model should be to be considered a* *deep* *learning model?*'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你掌握了深度学习的功能，通常会出现一个问题：如果我们说更深、更复杂的模型赋予了深度学习模型超越人类能力的能力，那么*一个机器学习模型应该有多深才能被认为是深度学习模型*？
- en: It turns out that there is no clear response to this question. What we need
    to do instead is to look at deep learning from a different angle to understand
    it better. Let us take a step back and see how a deep learning model works—for
    example, with CNNs.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，对于这个问题并没有明确的回答。我们真正需要做的是从不同的角度来审视深度学习，以便更好地理解它。让我们退一步，看看深度学习模型是如何工作的——例如，使用卷积神经网络（CNNs）。
- en: As mentioned earlier, the convolution filters of a CNN attempts to identify
    lower-level features first and use those identified features to identify higher-level
    features gradually through multiple steps.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，CNN的卷积滤波器试图首先识别低级特征，并使用这些识别出的特征通过多个步骤逐步识别高级特征。
- en: This is the hierarchical feature learning we talked about earlier, and it is
    the key to understanding deep learning and what differentiates it from traditional
    machine learning algorithms (Figure [1-4](#Fig4)).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们之前提到的层次化特征学习，它是理解深度学习的关键，也是它与传统机器学习算法区别开来的地方（图[1-4](#Fig4)）。
- en: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig4_HTML.jpg](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig4_HTML.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig4_HTML.jpg](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig4_HTML.jpg)'
- en: Figure 1-4
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-4
- en: Hierarchical feature learning
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 层次化特征学习
- en: A deep learning model (such as a CNN) does not try to understand the entire
    problem at once; that is, it does not try to grasp all the features of the input
    at once, as traditional algorithms tried to do. What it does look at is the input,
    piece by piece, so that it can derive from its lower-level patterns/features.
    It then uses these lower-level features to gradually identify higher-level features,
    through many layers, hierarchically. This allows deep learning models to learn
    complicated patterns, by gradually building them up from simpler ones. This also
    allows deep learning models to comprehend the world better, and they not only
    see the features but also see the hierarchy of how those features are built upon
    each layer.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一个深度学习模型（如CNN）不会试图一次性理解整个问题；也就是说，它不会试图一次性把握所有输入的特征，就像传统算法试图做的那样。它所关注的是逐步地、逐个地查看输入，以便从中推导出其低级模式/特征。然后，它使用这些低级特征通过许多层，层次化地逐步识别高级特征。这使得深度学习模型能够通过逐步构建更简单的模式来学习复杂的模式。这也使得深度学习模型能够更好地理解世界，它们不仅看到特征，还能看到这些特征是如何在每一层上构建的层次结构。
- en: Of course, having to learn features hierarchically means that the model must
    have many layers in it. This means that such a model will be “deep.”
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，必须层次化地学习特征意味着模型必须包含许多层。这意味着这样的模型将会是“深”的。
- en: 'That brings us back to our original question: it is not that deep models are
    deep learning, but rather that to achieve hierarchical learning, the models need
    to be deep. The deepness is a by-product of implementing hierarchical feature
    learning.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这又把我们带回了我们最初的问题：深度模型之所以是深度学习，并不是因为它们深度，而是因为要实现层次化学习，模型必须是深层的。深度是实施层次化特征学习的副产品。
- en: So how do we identify whether a model is a deep learning model or not?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何确定一个模型是否是深度学习模型呢？
- en: Simply put, if the model uses hierarchical feature learning—identifying lower
    level features first, and then building upon them to identify higher-level features
    (e.g., by using convolution filters)—then it is a deep learning model. If not,
    then no matter how many layers your model has, it is not considered a deep learning
    model. This means that a neural network with 100 fully connected layers (and only
    fully connected layers) would not be a deep learning model, but a network with
    a handful of convolutional layers would be.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，如果一个模型使用层次化特征学习——首先识别低级特征，然后在此基础上构建以识别高级特征（例如，通过使用卷积滤波器）——那么它就是一个深度学习模型。如果不是这样，那么无论你的模型有多少层，它都不被视为深度学习模型。这意味着一个有100个全连接层的神经网络（并且只有全连接层）不会是一个深度学习模型，但一个只有少量卷积层的网络则会。
- en: Is Deep Learning Just CNNs?
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习仅仅是CNNs吗？
- en: When we talk about deep learning, we talk about CNNs a lot. You might be wondering
    whether deep learning is only CNNs.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈论深度学习时，我们经常提到CNNs。你可能想知道深度学习是否仅仅是CNNs。
- en: The answer is no.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 答案是否定的。
- en: 'The following models, among others, are considered deep learning:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下模型中，以及其他模型，被认为是深度学习：
- en: Convolutional Neural Networks
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积神经网络
- en: Deep Boltzmann Machine
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度玻尔兹曼机
- en: Deep Belief Networks
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度信念网络
- en: Stacked Autoencoders
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 堆叠自编码器
- en: Generative Adversarial Networks (GANs)
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成对抗网络（GANs）
- en: Transformers
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转换器
- en: We take CNNs as examples for deep learning more often because they are easier
    to understand. As they were based on how biological vision works, it is easier
    to visualize and apply how they are based on the cognitive workflow of vision.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们更经常以CNN（卷积神经网络）为例来讲解深度学习，因为它们更容易理解。由于它们基于生物视觉的工作原理，因此更容易可视化和应用它们如何基于视觉的认知工作流程。
- en: But we should keep in mind that CNNs are not the whole picture of deep learning.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们应该记住，CNN并不是深度学习的全部。
- en: Why Computer Vision?
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么是计算机视觉？
- en: Looking at the history of deep learning and some recent achievements of it,^([4](#Fn4))
    you will notice that most of the projects it has been applied to deal with computer
    vision. Even the ImageNet competitions focus on visual recognition.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾深度学习的历史和一些最近取得的成就，^([4](#Fn4))你会注意到，它所应用的大多数项目都涉及计算机视觉。即使是ImageNet竞赛也专注于视觉识别。
- en: Why is that? Does deep learning only work on computer vision?
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么会这样？深度学习是否只适用于计算机视觉？
- en: Not really.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 并非如此。
- en: Vision—understanding and giving meaning to visual inputs—is something humans
    are exceptionally good at. The ability to understand one’s surroundings is considered
    a sign of intelligence. So when it comes to building intelligent machines, vision
    is one of the core capabilities that we wish an intelligent machine to possess.
    It is also easy to validate, as we can easily compare it with the ability of a
    human.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉——理解和赋予视觉输入意义——是人类特别擅长的。理解周围环境的能力被认为是智能的标志。因此，当谈到构建智能机器时，视觉是我们希望智能机器拥有的核心能力之一。它也易于验证，因为我们可以轻松地将其与人类的能力进行比较。
- en: Therefore, exploring vision capabilities has become a core area in deep learning
    research.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，探索视觉能力已成为深度学习研究的一个核心领域。
- en: The achievements deep learning gathers in the vision field may shape how we
    approach other fields as well. Thanks to the capability of transfer learning (which
    we will discuss in a later chapter), deep learning can apply knowledge gained
    from one domain to another domain. While typically this capability is used to
    apply knowledge from one vision model to another, it is speculated (and there
    is much ongoing research) how the knowledge from a model trained on visual input
    may apply in a nonvisual context.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习在视觉领域取得的成就也可能影响我们如何进入其他领域。多亏了迁移学习的能力（我们将在下一章讨论），深度学习可以将一个领域获得的知识应用到另一个领域。虽然通常这种能力用于将一个视觉模型的知识应用到另一个模型，但有人推测（并且有许多正在进行的研究），在视觉输入上训练的模型的知识可能在非视觉环境中得到应用。
- en: How Does It All Come Together?
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 所有这一切是如何结合在一起的？
- en: 'Returning to our original questions: *How do the areas of artificial intelligence,
    machine learning, and deep learning relate to each other?*'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 回到我们最初的问题：*人工智能、机器学习和深度学习领域之间是如何相互关联的？*
- en: Simply put, machine learning is a subset (an approach) of artificial intelligence,
    and deep learning is a subset of machine learning, all working toward the common
    goal of creating an intelligent machine (Figure [1-5](#Fig5)).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，机器学习是人工智能的一个子集（一种方法），而深度学习是机器学习的一个子集，所有这些都在朝着创造一个智能机器的共同目标努力（见图[1-5](#Fig5)）。
- en: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig5_HTML.png](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig5_HTML.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig5_HTML.png](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig5_HTML.png)'
- en: Figure 1-5
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-5
- en: How artificial intelligence, machine learning, and deep learning relate to one
    other
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能、机器学习和深度学习之间的关系
- en: See Figure [1-6](#Fig6) for a quick look back at how deep learning, machine
    learning, and artificial intelligence evolved through the years.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 见图[1-6](#Fig6)快速回顾深度学习、机器学习和人工智能是如何随着时间演变的。
- en: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig6_HTML.jpg](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig6_HTML.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig6_HTML.jpg](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig6_HTML.jpg)'
- en: Figure 1-6
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-6
- en: The evolution of deep learning
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习的演变
- en: With its initiation in the early 2010s, deep learning kept on achieving groundbreaking
    results, with accuracies that were thought not to be possible earlier in tasks
    that were previously thought to be only possible to perform by humans, such as
    image recognition, language processing, and speech recognition. Shown in Figure
    [1-7](#Fig7) are a few of the noteworthy deep learning milestones in image recognition
    over the past decade.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习在2010年代初起步，持续取得突破性成果，其准确率在之前被认为不可能应用于仅由人类完成的任务中，如图像识别、语言处理和语音识别。图[1-7](#Fig7)展示了过去十年中图像识别领域的一些值得注意的深度学习里程碑。
- en: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig7_HTML.png](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig7_HTML.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_1_Chapter/502073_1_En_1_Fig7_HTML.png](../images/502073_1_En_1_Chapter/502073_1_En_1_Fig7_HTML.png)'
- en: Figure 1-7
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-7
- en: Deep learning model accuracy over the years
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习模型准确率逐年变化
- en: You can learn more about these specific models and their importance to deep
    learning in Appendix 1.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在附录1中了解更多关于这些特定模型及其对深度学习重要性的信息。
- en: 'With the capabilities demonstrated and the success achieved by deep learning,
    we may be a step closer to the ultimate goal of artificial intelligence: building
    a machine with human (or greater) level intelligence.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 通过深度学习展现的能力和取得的成就，我们可能已经迈出了接近人工智能最终目标的一步：构建具有人类（或更高）水平智能的机器。
- en: Is an Artificial Intelligence Possible?
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能是否可能？
- en: Despite everything AI has already achieved, there still exists some skepticism
    out there as to whether true AI (also referred to as artificial general intelligence)
    is possible.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人工智能已经取得了如此多的成就，但关于真正的人工智能（也称为通用人工智能）是否可能，仍然存在一些怀疑。
- en: One of the reasons for these skepticisms is due to a misunderstanding of the
    term “artificial intelligence.” This has caused doubts in the approach AI is taking
    toward its goals.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这些怀疑的原因之一是对“人工智能”这一术语的误解。这导致了人们对人工智能实现目标的方法产生了怀疑。
- en: The term “artificial intelligence” is an unfortunate mis-term, which has led
    to many misinterpretations. When the Dartmouth conference of 1956 named the new
    research field as artificial intelligence, they had good intentions for that name.
    But, as always, intentions are not preserved nor are they obvious.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: “人工智能”这一术语是一个不幸的误称，它导致了众多误解。当1956年的达特茅斯会议将这一新的研究领域命名为人工智能时，他们对此名称有着良好的意图。但正如往常一样，意图并未得到保留，也不明显。
- en: The common misconception—by taking the name literally—is that AI aims to build
    “intelligence” artificially. However, in reality, the term “artificial intelligence”
    was and was always meant to be “artificial” + “Intelligence,” meaning that it
    was meant to *bridge* artificial and intelligence. The goal of AI is to observe
    and understand “intelligent” behavior inherently found in natural constructs (human
    or otherwise) and attempt to build the intelligent behavior into artificial constructs.
    These artificial constructs could be computer programs, machines/robots, algorithms,
    or theoretical frameworks.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 人们普遍的误解——字面理解这一名称——是人工智能的目标是人为地构建“智能”。然而，实际上，“人工智能”这一术语原本和始终意味着“人工”+“智能”，意味着它的目的是*连接*人工和智能。人工智能的目标是观察和理解自然构造（人类或其他）中固有的“智能”行为，并尝试将其构建到人工构造中。这些人工构造可以是计算机程序、机器/机器人、算法或理论框架。
- en: This concept is what has brought us models such as neural networks and genetic
    algorithms, among many others. If you look closely at these models, it becomes
    apparent that they are all applying modified versions of natural intelligence
    concepts on top of artificial constructs.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 正是这个概念带给我们诸如神经网络和遗传算法等模型。如果你仔细观察这些模型，就会很明显，它们都是在人工构造上应用了自然智能概念的修改版本。
- en: The ultimate goal of AI was—and is—to build a machine with a human or greater
    level of intelligence. (Note that a “machine” is a subjective term here, which
    can mean any artificial construct.) We do not want to reinvent “intelligence”
    for it. We just need to adapt the character and concept of natural intelligence
    to the artificial constructs we build.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的最终目标——现在仍然是——构建一个具有人类或更高水平的智能的机器。（请注意，这里的“机器”是一个主观的术语，可以指任何人工构造。）我们并不想重新发明“智能”。我们只需要将自然智能的特征和概念适应到我们构建的人工构造中。
- en: We do not build intelligence artificially. We build machines inspired by nature.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我们并不是人为地构建智能。我们构建的是受自然界启发的机器。
