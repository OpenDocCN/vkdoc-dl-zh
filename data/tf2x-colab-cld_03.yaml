- en: 'Create the model:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE60]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: We *must* get the input shape correct. For CIFAR-10, input shape is (32, 32,
    3)!
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 我们*必须*获取输入形状正确。对于 CIFAR-10，输入形状是 (32, 32, 3)！
- en: 'Inspect the model:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE61]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: The first layer accepts and flattens 32 `×` 32 color images. So we get output
    shape (None, 3072). *None* is the first parameter because TensorFlow models can
    accept any batch size. We get the second parameter *3072* by multiplying 32 by
    32 by 3\. Each image has 1,024 pixels, which is the result of multiplying 32 by
    32\. Since each image is in color, we multiply 1,024 by 3 to get 3,072 neurons.
    The number of parameters is 0 because this is the first layer.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层接受并展平32 `×` 32彩色图像。因此我们得到输出形状（None, 3072）。*None* 是第一个参数，因为TensorFlow模型可以接受任何批量大小。我们通过将32乘以32乘以3得到第二个参数
    *3072*。每张图像有1,024像素，这是将32乘以32的结果。由于每张图像都是彩色的，我们将1,024乘以3得到3,072个神经元。参数数量为0，因为这是第一层。
- en: The second layer output shape is (None, 512) since we have 512 neurons. The
    number of parameters is *1573376*. We get 1572864 by multiplying 3,072 neurons
    from the first layer by 512 neurons in this layer. We then add 512 neurons from
    this layer to get 1,573,376.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层的输出形状是（None, 512），因为我们有512个神经元。参数数量是 *1573376*。我们通过将第一层的3,072个神经元乘以本层的512个神经元得到1,572,864。然后我们再加上本层的512个神经元，得到1,573,376。
- en: The third layer output shape is (None, 10) since we have ten classes. We get
    *5130* by multiplying 10 by 512 neurons from the second layer and adding 10 neurons
    from this layer.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层的输出形状是（None, 10），因为我们有十个类别。我们通过将10乘以第二层的512个神经元，并加上本层的10个神经元得到 *5130*。
