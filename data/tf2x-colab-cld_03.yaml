- en: 3. Working with TensorFlow Data
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 与 TensorFlow 数据一起工作
- en: We introduce TensorFlow datasets (TFDS). We discuss many facets of a TFDS with
    code examples. We continue with a complete TFDS modeling example.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍了 TensorFlow 数据集（TFDS）。我们通过代码示例讨论了 TFDS 的许多方面。我们继续使用完整的 TFDS 模型示例。
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 各章节的笔记本位于以下 URL：[`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow)。
- en: '*TFDS* is a collection of datasets ready to use with TensorFlow. Like all TensorFlow
    consumable datasets, TFDS are exposed as tf.data.Datasets, which allows us to
    create easy-to-use, high-performance input pipelines.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*TFDS* 是一个包含可用于 TensorFlow 的数据集的集合。像所有 TensorFlow 可消费数据集一样，TFDS 以 tf.data.Datasets
    的形式暴露，这使得我们可以创建易于使用、高性能的输入管道。'
- en: 'Enable the GPU (if not already enabled):'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 启用 GPU（如果尚未启用）：
- en: Click *Runtime* in the top-left menu.
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右上角菜单中点击 *运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择 *更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 *硬件加速器* 下拉菜单中选择 *GPU*。
- en: Click *SAVE*.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *保存*。
- en: 'Test if GPU is active:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 测试 GPU 是否激活：
- en: '[PRE0]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Import the *tensorflow* library. If ‘/device:GPU:0’ is displayed, the GPU is
    active. If ‘..’ is displayed, the regular CPU is active.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 *tensorflow* 库。如果显示 ‘/device:GPU:0’，则 GPU 已激活。如果显示 ‘..’，则常规 CPU 已激活。
- en: TensorFlow Datasets (TFDS)
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 数据集（TFDS）
- en: 'The following URLs provide more information about TFDS:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 以下 URL 提供了更多关于 TFDS 的信息：
- en: '[`www.tensorflow.org/datasets`](http://www.tensorflow.org/datasets)'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/datasets`](http://www.tensorflow.org/datasets)'
- en: '[`www.tensorflow.org/datasets/overview`](http://www.tensorflow.org/datasets/overview)'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/datasets/overview`](http://www.tensorflow.org/datasets/overview)'
- en: '[`www.tensorflow.org/datasets/catalog/overview`](http://www.tensorflow.org/datasets/catalog/overview)'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/datasets/catalog/overview`](http://www.tensorflow.org/datasets/catalog/overview)'
- en: Start with the first URL as it introduces TFDS. The second URL demonstrates
    how to display a list of all TFDS and additional technical information. The third
    URL shows how TFDS are categorized.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 从介绍 TFDS 的第一个 URL 开始。第二个 URL 展示了如何显示所有 TFDS 的列表和额外的技术信息。第三个 URL 展示了 TFDS 的分类。
- en: Colab Abends
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Colab 出错
- en: 'When we run Google Colab for a long time (several hours) without pause or load
    large datasets into memory and process said data, it may crash (or abend). When
    this happens, you have two choices that we know of:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们长时间（数小时）运行 Google Colab 而不停歇或加载大量数据集到内存中并处理这些数据时，它可能会崩溃（或中断）。当这种情况发生时，我们知道有两种选择：
- en: Restart all runtimes.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新启动所有运行时。
- en: Close the program and restart it from scratch.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关闭程序并从头开始重新启动。
- en: Available TFDS
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可用 TFDS
- en: 'Let’s begin by displaying a list of available TFDS:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从显示可用的 TFDS 列表开始：
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Begin by importing the *tfds* module. Use the *list_builders()* method to display.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 首先导入 *tfds* 模块。使用 *list_builders()* 方法显示。
- en: 'Find out how many TFDS are in the tensorflow_datasets container:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 查找 tensorflow_datasets 容器中有多少 TFDS：
- en: '[PRE2]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Wow! There are 244 datasets (as of this writing) we can use to practice TensorFlow.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！我们可以使用 244 个数据集（截至本文写作时）来练习 TensorFlow。
- en: 'Peruse the following URL for a really nice tutorial on TFDS:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 查阅以下 URL，了解关于 TFDS 的精彩教程：
- en: '[`https://colab.research.google.com/github/tensorflow/datasets/blob/master/docs/overview.ipynb`](https://colab.research.google.com/github/tensorflow/datasets/blob/master/docs/overview.ipynb)'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '[`https://colab.research.google.com/github/tensorflow/datasets/blob/master/docs/overview.ipynb`](https://colab.research.google.com/github/tensorflow/datasets/blob/master/docs/overview.ipynb)'
- en: Load a TFDS
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加载 TFDS
- en: We can load a TFDS with one line of code! In the tutorial on the TFDS website,
    it states that we must install *tensorflow-datasets*. But, in Google Colab, we
    don’t have to do this.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用一行代码加载一个 TFDS！在 TFDS 网站上的教程中，它指出我们必须安装 *tensorflow-datasets*。但在 Google
    Colab 中，我们不必这样做。
- en: Tip
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: 'If you are working in an environment other than Google Colab, you can install
    the tfds module by running the following code snippet: `!pip install tensorflow-datasets`'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在 Google Colab 以外的环境中工作，可以通过运行以下代码片段安装 tfds 模块：`!pip install tensorflow-datasets`
- en: 'Import the tfds module:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 tfds 模块：
- en: '[PRE3]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Load training data directly with tfds.load:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 tfds.load 直接加载训练数据：
- en: '[PRE4]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The **tfds.load** function loads the named dataset into a tf.data.Dataset. We
    add the *info* element to enable display of useful metadata about the dataset.
    **Metadata** is a set of data that describes and gives information about other
    data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**tfds.load** 函数将命名数据集加载到 tf.data.Dataset 中。我们添加 *info* 元素以启用显示有关数据集的有用元数据。**元数据**是一组描述和提供其他数据信息的数据。'
- en: 'Load test data directly:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 直接加载测试数据：
- en: '[PRE5]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We loaded the MNIST train and test dataset from the TFDS container. The **MNIST**
    database (Modified National Institute of Standards and Technology database) is
    a large database of handwritten digits that is *commonly* used for training various
    image processing systems. The database is also *widely* used for training and
    testing in the field of machine learning. The database consists of a set of 60,000
    training examples and 10,000 test examples. We included the *info* element, which
    provides detailed information about the dataset.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从 TFDS 容器中加载了 MNIST 训练和测试数据集。**MNIST** 数据库（修改后的国家标准与技术研究院数据库）是一个包含手写数字的大型数据库，通常用于训练各种图像处理系统。该数据库也广泛用于机器学习领域的训练和测试。数据库由
    60,000 个训练示例和 10,000 个测试示例组成。我们包含了 *info* 元素，它提供了有关数据集的详细信息。
- en: Note
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: In machine learning vernacular, a data element is typically described as either
    an example or sample. The word example is used interchangeably with sample.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习的术语中，数据元素通常描述为示例或样本。单词 example 可以与 sample 互换使用。
- en: Although feedforward neural nets don’t tend to perform well on images, MNIST
    is an exception because it is heavily preprocessed and the images are small. That
    is, MNIST images are roughly of the same small size, centered in the middle of
    the image space, and vertically oriented.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管前馈神经网络通常在图像上表现不佳，但 MNIST 是一个例外，因为它经过了大量的预处理，并且图像很小。也就是说，MNIST 图像大致为相同的小尺寸，位于图像空间的中心，并且垂直排列。
- en: Extract Useful Information
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提取有用信息
- en: The info element includes methods that allow us to extract specific information
    about a dataset.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: info 元素包括允许我们提取有关数据集特定信息的方法。
- en: Listing [3-1](#PC7) extracts information about the classes.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [3-1](#PC7) 提取有关类别的信息。
- en: '[PRE6]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We just extracted the number of classes and class labels with the *features*
    method.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚使用 *features* 方法提取了类别数量和类别标签。
- en: Inspect the TFDS
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检查 TFDS
- en: 'We have two ways to inspect an element:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有两种检查元素的方法：
- en: Print the element.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打印元素。
- en: Print the element with the *element_spec* method.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 *element_spec* 方法打印元素。
- en: 'Print elements:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 打印元素：
- en: '[PRE7]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Print elements with element_spec:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 element_spec 打印元素：
- en: '[PRE8]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Either way, the output is very similar. Tensor shapes are (28, 28, 1). So training
    and test data consists of 28 `×` 28 images. The 1 value means that images are
    displayed in grayscale. Image data (the feature set) is composed of tf.uint8 data,
    and label (or target) data is composed of tf.int64 data.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 无论哪种方式，输出都非常相似。张量形状为 (28, 28, 1)。因此，训练和测试数据由 28 `×` 28 的图像组成。1 的值表示图像以灰度显示。图像数据（特征集）由
    tf.uint8 数据组成，而标签（或目标）数据由 tf.int64 数据组成。
- en: A *grayscale* image is one where the value of each pixel is a single sample
    representing only an amount of light. That is, it carries only intensity information.
    Grayscale images are composed exclusively of shades of gray. The contrast of an
    image ranges from black at the weakest intensity to white at the strongest.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 *灰度* 图像是指每个像素的值是一个单独的样本，只表示光量。也就是说，它只携带强度信息。灰度图像仅由灰色阴影组成。图像的对比度范围从最弱强度的黑色到最强强度的白色。
- en: 'We can also display training examples from a TFDS with one line of code:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以用一行代码显示 TFDS 的训练示例：
- en: '[PRE9]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The *show_examples* method displays sample images from a tf.data.Dataset.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '*show_examples* 方法显示 tf.data.Dataset 中的样本图像。'
- en: Feature Dictionaries
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 特征字典
- en: All TFDS contain *feature dictionaries* that map feature names to tensor values.
    By default, tfds.load returns a *dictionary* of tf.Tensors. A **tf.Tensor** represents
    a rectangular array of data in TensorFlow.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 所有 TFDS 都包含将特征名称映射到张量值的 *特征字典*。默认情况下，tfds.load 返回一个 tf.Tensors 的 *字典*。一个 **tf.Tensor**
    代表 TensorFlow 中的数据矩形数组。
- en: 'A typical dataset, like MNIST, has two keys: *image* and *label*. Let’s inspect
    *one* sample with take(1). The number we feed into the *take* function renders
    the number of samples we receive from the dataset.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 一个典型的数据集，如 MNIST，有两个键：*image* 和 *label*。让我们使用 take(1) 检查一个 *样本*。我们输入到 *take*
    函数中的数字表示我们从数据集中接收到的样本数量。
- en: 'Take one sample from the train dataset and display its keys:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 从训练数据集中取一个样本并显示其键：
- en: '[PRE10]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'We see the two keys as expected. The image key references the images in the
    dataset. The label key references the labels in the dataset. The formal dictionary
    structure is represented as *{‘image’: tf.Tensor, ‘label’: tf.Tensor}*.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '我们看到了预期的两个键。image 键引用数据集中的图像。label 键引用数据集中的标签。正式的字典结构表示为 *{‘image’: tf.Tensor,
    ‘label’: tf.Tensor}*。'
- en: 'Now that we know the keys, we can easily display the feature shape and target
    value from the first train sample:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了键，我们可以轻松地显示第一个训练样本的特征形状和目标值：
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The shape of the first feature sample is (28, 28, 1), and the value of the first
    label is 4\. We used the *numpy()* method to convert the target tensor to a scalar
    value. Since any dataset consumed by a machine learning algorithm *must* have
    the **same shape**, we get the shape of a dataset from a single sample!
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 第一特征样本的形状是（28, 28, 1），第一个标签的值是4。我们使用了 *numpy()* 方法将目标张量转换为标量值。由于任何由机器学习算法消耗的数据集
    *必须* 具有相同的形状，所以我们从单个样本中获取数据集的形状！
- en: 'Let’s get nine examples from the train set:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从训练集中获取九个示例：
- en: '[PRE12]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: We see [4, 1, 0, 7, 8, 1, 2, 7, 1], which matches the labels from *show_examples*
    in the previous section.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到 [4, 1, 0, 7, 8, 1, 2, 7, 1]，这与上一节中 *show_examples* 的标签相匹配。
- en: 'By using the *as_supervised=True* parameter with tfds.load, we get a tuple
    of (feature, label) instead of a dictionary:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 tfds.load 的 *as_supervised=True* 参数，我们得到一个（特征，标签）元组而不是一个字典：
- en: '[PRE13]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The sample is in the form (image, label).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 样本的形式是（图像，标签）。
- en: 'We can also get a *numpy* tuple of (feature, label):'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以得到一个 *numpy* 元组（特征，标签）：
- en: '[PRE14]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We use *tfds.as_numpy* to convert tf.Tensor to np.array and tf.data.Dataset
    to Generator[np.array].
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 *tfds.as_numpy* 将 tf.Tensor 转换为 np.array，并将 tf.data.Dataset 转换为 Generator[np.array]。
- en: 'Finally, we can get a *batched* tf.Tensor:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以得到一个 *批处理* 的 tf.Tensor：
- en: '[PRE15]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: By using *batch_size=-1*, we can load the full dataset in a single batch. We
    see numpy tensor (60000, 28, 28, 1), which means training data contains 60,000
    28 `×` 28 grayscale images.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 *batch_size=-1*，我们可以一次性加载整个数据集。我们看到 numpy 张量（60000, 28, 28, 1），这意味着训练数据包含60,000个28
    `×` 28的灰度图像。
- en: In summary, *tfds.load* returns a dictionary by default, a tuple with *as_supervised=True*
    of tf.Tensor, or a np.array with *tfds.as_numpy*. Be careful that your dataset
    can fit in memory and that all examples have the same shape.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，*tfds.load* 默认返回一个字典，一个带有 *as_supervised=True* 的 tf.Tensor 元组，或者一个带有 *tfds.as_numpy*
    的 np.array。请注意，您的数据集可以适应内存，并且所有示例都具有相同的形状。
- en: Build the Input Pipeline
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Scale, shuffle, batch, and prefetch train data:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放、洗牌、批处理和预取训练数据：
- en: '[PRE16]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '**Prefetching** improves model performance because it adds efficiency to the
    batching process. While our training algorithm is working on one batch, TensorFlow
    is working on the dataset in parallel to get the next batch ready.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**预取** 提高模型性能，因为它增加了批处理过程的效率。当我们的训练算法在一个批次上工作时，TensorFlow 正在并行地处理数据集以准备好下一个批次。'
- en: 'Scale, batch, and prefetch test data:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放、批处理和预取测试数据：
- en: '[PRE17]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Use the test set we loaded earlier in the chapter. We don’t shuffle test data
    because it is considered new data.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 使用本章中加载的测试集。我们不洗牌测试数据，因为它被认为是新数据。
- en: 'Inspect the tensors:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE18]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: As expected, feature shapes are (None, 28, 28, 1). The first dimension is *None*,
    which indicates that batch size can be any value.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，特征形状为（None, 28, 28, 1）。第一个维度是 *None*，表示批量大小可以是任何值。
- en: Build the Model
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Import libraries:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE19]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Create the model:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE20]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: The model has an input layer, a dense hidden layer, and a dense output layer.
    The input layer flattens images for processing in the next layer. The hidden layer
    accepts data into 512 neurons. The output layer accepts data from the hidden layer
    into ten neurons that represent the ten digit classes.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型有一个输入层、一个密集隐藏层和一个密集输出层。输入层将图像展平以便在下一层进行处理。隐藏层接受数据到512个神经元。输出层接受来自隐藏层的数据到十个神经元，这些神经元代表十个数字类别。
- en: Model Summary
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Display a summary of the model:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 显示模型的摘要：
- en: '[PRE21]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The first layer accepts 28 `×` 28 grayscale images. So we get output shape (None,
    784). *None* is the first parameter because TensorFlow models can accept any batch
    size. We get the second parameter *784* by multiplying 28 by 28 by 1\. So each
    image has 784 pixels. The number of parameters is 0 because the first layer doesn’t
    act on the data.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层接受28 `×` 28的灰度图像。因此我们得到输出形状（None, 784）。*None* 是第一个参数，因为 TensorFlow 模型可以接受任何批量大小。我们通过将28乘以28乘以1得到第二个参数
    *784*。因此，每张图像有784个像素。参数数量为0，因为第一层不对数据进行操作。
- en: The second layer output shape is (None, 512) since we have 512 neurons. The
    number of trainable parameters is *401920*. We get 401408 by multiplying 784 neurons
    from the first layer by 512 neurons in this layer. We then add 512 neurons from
    this layer to get 401920.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层输出形状是（None, 512），因为我们有512个神经元。可训练参数的数量是 *401920*。我们通过将第一层的784个神经元乘以本层的512个神经元得到401408，然后再加上本层的512个神经元得到401920。
- en: The third layer output shape is (None, 10) since we have ten classes. We get
    *5130* by multiplying 10 by 512 neurons from the second layer and adding 10 neurons
    from this layer.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层输出形状是 (None, 10)，因为我们有十个类别。通过将第二层的 512 个神经元乘以 10 并加上本层的 10 个神经元，我们得到 *5130*。
- en: Compile and Train the Model
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile the model with optimizer, loss, and metrics parameters:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 使用优化器、损失和度量参数编译模型：
- en: '[PRE22]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Train the model:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE23]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: We train the model for three epochs. That is, we pass data three times through
    the model. We validate the model with test data. We get pretty good results with
    not much overfitting with just three epochs!
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对模型进行了三个epoch的训练。也就是说，我们三次将数据通过模型。我们用测试数据验证模型。仅用三个epoch就得到了相当好的结果，几乎没有过度拟合！
- en: Generalize on Test Data
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在测试数据上泛化
- en: 'It’s always a good idea to evaluate based on test data:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 基于测试数据进行评估总是一个好主意：
- en: '[PRE24]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
