  type: TYPE_NORMAL
  zh: 可视化性能
- en: 'Get the training record into a variable:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练记录放入变量中：
- en: '[PRE25]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Listing [3-2](#PC27) plots accuracy and loss for the model.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [3-2](#PC27) 绘制了模型的准确率和损失。
- en: '[PRE26]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The visualization shows that our model fits data pretty well because train and
    test accuracy are very well aligned!
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化显示，我们的模型拟合数据相当好，因为训练和测试准确率非常一致！
- en: DatasetBuilder (tfds.builder)
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DatasetBuilder (tfds.builder)
- en: Since tfds.load is really just a thin convenience wrapper around DatasetBuilder,
    we can build an input pipeline with the MNIST dataset directly with tfds.builder.
    **DatasetBuilder** is an abstract base class for all datasets. That is, every
    TensorFlow dataset is exposed as a DatasetBuilder.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 tfds.load 实际上只是 DatasetBuilder 的一层便利包装，我们可以直接使用 tfds.builder 构建一个输入管道，使用
    MNIST 数据集。**DatasetBuilder** 是所有数据集的抽象基类。也就是说，每个 TensorFlow 数据集都作为 DatasetBuilder
    公开。
- en: 'DatasetBuilder performs several duties for TensorFlow datasets:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: DatasetBuilder 为 TensorFlow 数据集执行多项任务：
- en: Where to download data from and how to extract it and write it to a standard
    format with *DatasetBuilder.download_and_prepare*
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 *DatasetBuilder.download_and_prepare* 下载数据、提取数据并将其写入标准格式的位置和方式
- en: How to load data from disk with *DatasetBuilder.as_dataset*
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用 *DatasetBuilder.as_dataset* 从磁盘加载数据
- en: All information about data including names, types, feature shapes, number of
    records in each train and test split, and source URLs with *DatasetBuilder.info*
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有关于数据的信息，包括名称、类型、特征形状、每个训练和测试分割中的记录数以及源 URL，都可以通过 *DatasetBuilder.info* 获取
- en: Ability to directly instantiate any DatasetBuilder with *tfds.builder*
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以使用 *tfds.builder* 直接实例化任何 DatasetBuilder
- en: Unlike tfds.load, however, we have to manually fetch the DatasetBuilder by name,
    call *download_and_prepare()*, and *call as_dataset()*. The advantage of *tfds.builder*
    is that it allows more control over the loading process should we need it.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，与 tfds.load 不同，我们必须手动通过名称获取 DatasetBuilder，调用 *download_and_prepare()* 和
    *call as_dataset()*。*tfds.builder* 的优势在于，如果需要，它允许我们更多地控制加载过程。
- en: Listing [3-3](#PC28) shows how to load MNIST with tfds.builder.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [3-3](#PC28) 展示了如何使用 tfds.builder 加载 MNIST。
