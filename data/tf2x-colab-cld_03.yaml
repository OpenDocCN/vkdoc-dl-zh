  type: TYPE_PRE
  zh: '[PRE63]'
- en: Accuracy below 50% is not good. Our model performed very poorly because feedforward
    neural networks are not designed to work well with image data.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 准确率低于50%是不好的。我们的模型表现非常糟糕，因为前馈神经网络并不是设计来很好地处理图像数据的。
- en: Our goal was to show you how to load and model a TFDS. We introduce models that
    work well with image data in a later chapter.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是向您展示如何加载和建模一个TFDS。我们将在后面的章节中介绍适用于图像数据的模型。
