- en: To generate the images, specify the number of rows and columns in the generated
    images (their product being the number of features), the width of sample images
    generated (just samples and informative plots; the actual data can be collected
    in raw form), the maximum number of steps before IGTD algorithm termination, the
    number of validation steps to run through to determine convergence, the distance
    method used to determine the similarity/distance between features, the distance
    method used to compute distance between pixels, the metric used to determine error
    between *Q* and *R* (squared or absolute), and the directory to store the data
    results in.
