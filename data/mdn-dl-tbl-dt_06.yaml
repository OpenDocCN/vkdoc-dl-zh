    because there is no possibility that all outputs are less than zero (unless the
    network is behaving very oddly or is using a bizarre activation function). The
    three relevant pooling regions in the previous example are
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们应用最大池化，零填充或多或少是不相关的，因为它总是该区域中最小的值。填充方法是一种作弊技巧，以获得分数大小的池化区域（如果使用最大池化），因为所有输出都小于零的可能性不存在（除非网络行为非常异常或使用奇特的激活函数）。前一个示例中的三个相关池化区域是
- en: '![$$ \left[1\ 1\ 1\ 1\kern0.5em ----\kern0.5em ----\kern0.5em ----\kern0.5em
    \right],\left[----\kern0.5em 1-1-\kern0.5em ----\kern0.5em ----\kern0.5em \right],\left[----\kern0.5em
    ----\kern0.5em 1\ 1--\kern0.5em ----\kern0.5em \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equz.png)'
  id: totrans-321
  prefs: []
