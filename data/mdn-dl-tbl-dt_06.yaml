  zh: '![$$ \left[1\ 1\ 1\ 1\kern0.5em ----\kern0.5em ----\kern0.5em ----\kern0.5em
    \right],\left[----\kern0.5em 1-1-\kern0.5em ----\kern0.5em ----\kern0.5em \right],\left[----\kern0.5em
    ----\kern0.5em 1\ 1--\kern0.5em ----\kern0.5em \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equz.png)'
- en: Let’s apply pooling again, using both mean (Listing [4-34](#PC34), Figure [4-35](#Fig35))
    and max pooling (Listing [4-35](#PC35), Figure [4-36](#Fig36)).
  id: totrans-322
