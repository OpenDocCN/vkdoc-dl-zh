- en: By intuition, when the input image is larger, all dimensions – not just one
    – need to be correspondingly increased to accommodate the increase in information.
    Greater depth is required to process the increased layers of complexity, and greater
    width is needed to capture the greater quantity of information. Tan and Le’s work
    is novel in quantitatively expressing the relationship between the scaling of
    network dimensions.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 从直观上看，当输入图像更大时，所有维度——而不仅仅是单个维度——都需要相应增加以适应信息量的增加。处理增加的复杂层需要更深的深度，而捕获更多信息量则需要更宽的宽度。Tan和Le的工作在定量表达网络维度缩放之间的关系方面是新颖的。
- en: Tan and Le’s paper proposes the *EfficientNet* family of models, which is a
    family of differently sized models built from the compound scaling method. There
    are eight models in the EfficientNet family – EfficientNetB0, EfficientNetB1,
    ..., to EfficientNetB7, ordered from smallest to largest. The EfficientNetB0 architecture
    was discovered via Neural Architecture Search, a subfield beyond the scope of
    this book in which the optimal architecture of a neural network is derived via
    a “meta” or “controller” machine learning model. (We do, however, briefly talk
    about Neural Architecture Search in Chapter [10](525591_1_En_10_Chapter.xhtml).)
    In order to ensure that the derived model optimized both performance and FLOPS,
    the objective of the search was not merely to maximize the accuracy, but to maximize
    a combination of performance and the FLOPS. The resulting architecture was then
    scaled using different scaling values to form the other seven EfficientNet models.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: Tan和Le的论文提出了*EfficientNet*模型系列，这是一个通过复合缩放方法构建的不同尺寸模型的系列。EfficientNet系列中有八个模型——EfficientNetB0、EfficientNetB1、...到EfficientNetB7，按从小到大的顺序排列。EfficientNetB0架构是通过神经架构搜索发现的，这是本书范围之外的子领域，其中神经网络的最佳架构是通过“元”或“控制器”机器学习模型推导出来的。（然而，我们在第[10](525591_1_En_10_Chapter.xhtml)章中简要讨论了神经架构搜索。）为了确保推导出的模型在性能和FLOPS方面都得到优化，搜索的目标不仅仅是最大化准确率，而是最大化性能和FLOPS的组合。然后使用不同的缩放值对结果架构进行缩放，形成其他七个EfficientNet模型。
- en: Note
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The actual open source EfficientNet models are slightly different from the models
    obtained by “pure” compound scaling. As you may imagine, compound scaling is a
    successful but approximate method, as is to be expected with most scaling techniques.
    To maximize performance more fully, some fine-tuning of the architecture is still
    needed afterward. The publicly available versions of the EfficientNet model family
    in Keras applications contain some additional architectural changes after scaling
    via compound scaling to further improve performance.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 实际的开源EfficientNet模型与通过“纯”复合缩放获得的模型略有不同。正如你可能想象的那样，复合缩放是一种成功但近似的方 法，正如大多数缩放技术所预期的那样。为了更全面地最大化性能，在缩放后仍需要对架构进行一些微调。在Keras应用中公开可用的EfficientNet模型系列在复合缩放后包含了一些额外的架构更改，以进一步提高性能。
- en: The EfficientNet family of models impressively obtains higher performance on
    benchmark datasets like ImageNet, CIFAR-100, Flowers, and others than similarly
    sized models – both manually designed and NAS-discovered architectures (Figure
    [4-56](#Fig56)). While the core EfficientNetB0 model was created as a product
    of Neural Architecture Search, the remaining members of the EfficientNet family
    were constructed via the relatively simple compound scaling paradigm.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: EfficientNet模型系列在ImageNet、CIFAR-100、Flowers等基准数据集上，相较于同样大小的模型（无论是人工设计的还是通过NAS发现的架构）取得了令人印象深刻的更高性能（如图[4-56](#Fig56)）。虽然EfficientNetB0核心模型是通过神经架构搜索创建的，但EfficientNet系列的其他成员是通过相对简单的复合缩放范式构建的。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig56_HTML.jpg)'
  id: totrans-532
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig56_HTML.jpg)'
- en: Line graph of Efficient and other Nets depicts an increase in imagenet top-1
    accuracy in percentage, with an increase in the number of parameters in millions.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: Efficient和其它Nets的折线图显示了随着参数数量（以百万为单位）的增加，ImageNet Top-1准确率百分比的增加。
- en: Figure 4-56
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-56
- en: Plot of various EfficientNet models against other important model architectures
    in number of parameters and ImageNet Top-1 accuracy. From Tan and Le
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 不同EfficientNet模型与其他重要模型架构在参数数量和ImageNet Top-1准确率上的对比图。来自Tan和Le
- en: The EfficientNet model family is available in Keras applications at `keras.applications.EfficientNetBx`
    (substituting `x` for any number from 0 to 7). The EfficientNet implementation
    in Keras applications ranges from 29 MB (B0) to 256 MB (B7) in size and from 5,330,571
    parameters (B0) to 66,658,687 parameters (B7). Note that the desired input shape
    for different members of the EfficientNet family is different. EfficientNetB0
    expects images of spatial dimension (224,224); B4 expects (380,380); B7 expects
    (600,600). Note that these are recommendations for input size – you could use
    an EfficientNetB0 model on a 600-by-600 image if you deemed it necessary. You
    can find the full list of the desired input shapes listed in the Keras/TensorFlow
    application documentation.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: EfficientNet模型家族在Keras应用中可用，地址为`keras.applications.EfficientNetBx`（将`x`替换为从0到7的任何数字）。Keras应用中的EfficientNet实现大小从29
    MB（B0）到256 MB（B7），参数数量从5,330,571个（B0）到66,658,687个（B7）。请注意，EfficientNet家族不同成员所需的输入形状不同。EfficientNetB0期望图像的空间维度为（224,224）；B4期望（380,380）；B7期望（600,600）。请注意，这些是输入尺寸的建议——如果您认为有必要，您可以使用EfficientNetB0模型处理600x600的图像。您可以在Keras/TensorFlow应用文档中找到所需输入形状的完整列表。
- en: Multimodal Image and Tabular Models
  id: totrans-537
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多模态图像和表格模型
- en: In this section, we’ll explore an application of convolutional neural networks
    to *multimodal models*, which consider both image and tabular data to produce
    a prediction. “Multimodal” refers to many (*multi*-) data forms (*-modal*). Image-based
    multimodal models can be applied to datasets in which images are associated with
    individual rows in a tabular/structured dataset. (In the next chapter, we’ll see
    another application of sequential multimodal models, which process both a sequence
    – like text – and tabular data to produce a jointly informed output).
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨卷积神经网络在*多模态模型*中的应用，这些模型考虑图像和表格数据以生成预测。“多模态”指的是多种（*multi*）数据形式（*-modal*）。基于图像的多模态模型可以应用于图像与表格/结构化数据集的行相关联的数据集。（在下一章中，我们将看到序列多模态模型的另一种应用，这些模型处理序列——如文本——和表格数据以生成联合信息输出）。
- en: Multimodal applications are particularly interesting, because – at least in
    principle – they somewhat reflect how humans perceive the world. Rather than making
    a judgment or decision based on only one modality of input, we consider a variety
    of data input types and combine them to form more robust and well-informed conclusions.
    Rephrased, we do not process different input modalities (e.g., sight, hearing,
    touch, etc.) independently but rather jointly.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态应用特别有趣，因为——至少在原则上——它们在一定程度上反映了人类感知世界的方式。我们不是仅基于单一输入模态做出判断或决策，而是考虑多种数据输入类型并将它们结合起来，以形成更稳健和更全面的信息结论。换句话说，我们不是独立处理不同的输入模态（例如，视觉、听觉、触觉等），而是联合处理。
- en: These sorts of models must be *multi-head*; that is, they take in more than
    one input. Each of these inputs is processed independently and molded into the
    “universal neural network computation form” (i.e., a vector). An image input head
    would be processed using convolutional layers (convolutions, pooling layers, etc.)
    and cast into a vector either through flattening or global pooling. A standard
    tabular/vector input head is already in vector form, but it can be further processed
    with a series of fully connected layers to extract and amplify relevant features.
    Once all the images have been processed and cast into vector form, we can apply
    merging techniques like concatenation, adding, or multiplying. This has the effect
    of aggregating the combined observations from all the input heads. The aggregation
    can then be processed through a series of fully connected layers into an output.
    This generalized blueprint structure for a multimodal model is visualized in Figure
    [4-57](#Fig57).
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 这些类型的模型必须是*多头*；也就是说，它们接受多个输入。这些输入中的每一个都是独立处理的，并塑造成“通用神经网络计算形式”（即向量）。图像输入头将使用卷积层（卷积、池化层等）进行处理，并通过展平或全局池化将其转换为向量。标准的表格/向量输入头已经是向量形式，但它可以通过一系列全连接层进一步处理以提取和增强相关特征。一旦所有图像都经过处理并转换为向量形式，我们就可以应用合并技术，如连接、相加或相乘。这具有从所有输入头汇总观察结果的效果。然后，聚合可以通过一系列全连接层处理成输出。这种多模态模型的通用蓝图结构在图[4-57](#Fig57)中进行了可视化。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig57_HTML.png)'
  id: totrans-541
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig57_HTML.png)'
- en: 'A flowchart reads: Input modality A and input modality B; separate extraction;
    aggregation; and output.'
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图读取：输入模态A和输入模态B；分别提取；聚合；然后输出。
- en: Figure 4-57
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-57
- en: General structure of a multimodal model
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态模型的一般结构
- en: In this sort of network design, the different data modalities are first independently
    processed to extract relevant features and express the information in vector representation;
    afterward, these representations are combined and jointly considered to produce
    an output. Following this, we’ll show how we can build more advanced network topologies
    to capture more complex knowledge flows.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种网络设计中，不同的数据模态首先独立处理以提取相关特征，并以向量表示形式表达信息；之后，这些表示形式被组合并联合考虑以产生输出。接下来，我们将展示如何构建更高级的网络拓扑结构以捕捉更复杂的知识流。
- en: Multimodal models are a powerful extension of convolutional neural network techniques.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态模型是卷积神经网络技术的强大扩展。
- en: We will be building a multimodal model to predict house prices given both tabular
    and image data. This will be done using the SoCal House Prices and Images dataset
    on Kaggle, assembled and maintained by Kaggle user ted8080.^([6](#Fn6)) The dataset
    comprises a .csv file storing tabular data; each row represents a house with its
    street, the city it is located in, the number of bedrooms it has, the number of
    baths it has, the square footage, the house price, and an image identifier. Each
    image identifier is associated with an image in the image directory; the image
    corresponding to the row with image ID 0 is titled “0.jpg,” the image corresponding
    to image ID 123 is “123.jpg,” and so on (Figure [4-58](#Fig58)).
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将构建一个多模态模型来预测房价，该模型将使用Kaggle上的SoCal房价和图像数据集，由Kaggle用户ted8080汇编和维护。[6](#Fn6)该数据集包含一个.csv文件，存储表格数据；每一行代表一栋房屋，包括其街道、所在城市、卧室数量、浴室数量、面积、房价和一个图像标识符。每个图像标识符都与图像目录中的一个图像相关联；对应于图像ID为0的行的图像标题为“0.jpg”，对应于图像ID为123的图像标题为“123.jpg”，依此类推（图[4-58](#Fig58)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig58_HTML.png)'
  id: totrans-548
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig58_HTML.png)'
- en: Photos of two individual houses. A table depicts image i d, street, citi, n
    citi, bed, bath, square feet, and price details of five different houses.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 两座独立房屋的照片。一张表格描述了五座不同房屋的图像ID、街道、城市、城市数量、卧室数量、浴室数量、面积和价格详情。
- en: Figure 4-58
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-58
- en: Visual exploration of the SoCal House Prices dataset
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: SoCal房价数据集的视觉探索
- en: We will begin from a baseline (i.e., poorly performing approach) and demonstrate
    the process of moving toward a better model.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从基线（即表现不佳的方法）开始，展示向更优模型过渡的过程。
- en: 'In a baseline approach, we may consider the following multimodal model arrangement:
    we feed the image identified by the `image_id` column into the image head, feed
    the `[''n_citi'', ''bed'', ''bath'', ''sqft'']` columns into the tabular head,
    and use the `''price''` column as the desired target value.'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 在基线方法中，我们可能考虑以下多模态模型排列：将`image_id`列标识的图像输入到图像头部，将`['n_citi', 'bed', 'bath',
    'sqft']`列输入到表格头部，并使用`'price'`列作为期望的目标值。
- en: 'In order to manage the data, we will use a TensorFlow Sequence dataset. Refer
    back to Chapter [2](525591_1_En_2_Chapter.xhtml) for introductory information
    on how TensorFlow Sequence datasets are constructed and used by the model. Simply
    put, it allows us to define a data flow any way we like – as long as we give it
    the inputs and the desired targets when the model requests them. This gives us
    a lot of flexibility and makes life generally easier: we don’t need to chase down
    TensorFlow exceptions or warnings trying to load the entire dataset up front into
    a TensorFlow dataset. This comes at the cost of potential slight inefficiency
    (caused by reloading the data when it is requested), but it’s a decision we’ll
    make in this case for ease of implementation.'
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 为了管理数据，我们将使用TensorFlow序列数据集。请参考第[2](525591_1_En_2_Chapter.xhtml)章，了解TensorFlow序列数据集的构建和模型使用的基础信息。简单来说，它允许我们以任何我们喜欢的方式定义数据流——只要我们在模型请求时提供输入和期望的目标值。这为我们提供了很大的灵活性，并使生活变得更加容易：我们不需要追查TensorFlow异常或警告，试图将整个数据集提前加载到TensorFlow数据集中。这可能会带来轻微的低效（由请求时重新加载数据引起），但在这个案例中，我们将为了易于实现而做出这个决定。
- en: 'Our multimodal dataset will contain three sets of internal data: an array of
    image IDs, a DataFrame containing relevant features, and an array of target house
    prices. We will store training and validation indices that indicate which indices
    in each of these internal datasets correspond to the training set and which correspond
    to the validation set. When the model requests data by making a `.__getitem__(index)`
    call, we execute the following steps:'
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的多模态数据集将包含三组内部数据：图像ID数组、包含相关特征的DataFrame和目标房价数组。我们将存储训练和验证索引，这些索引指示每个内部数据集中哪些索引对应于训练集，哪些对应于验证集。当模型通过执行`.__getitem__(index)`调用请求数据时，我们将执行以下步骤：
- en: Identify a batch interval of indices from the training set to use.
  id: totrans-556
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定从训练集中使用的索引批次间隔。
- en: Load the images using IDs from the selected indices.
  id: totrans-557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用所选索引的ID加载图像。
- en: Obtain the tabular features from the selected indices.
  id: totrans-558
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从所选索引中获取表格特征。
- en: Obtain the target from the selected indices.
  id: totrans-559
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从所选索引中获取目标。
- en: Bundle the image and tabular feature inputs together into a list.
  id: totrans-560
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将图像和表格特征输入捆绑在一起形成一个列表。
- en: Return the bundled inputs and the target.
  id: totrans-561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 返回捆绑的输入和目标。
- en: The Keras model will then read, process, and utilize the given dataset (Figure
    [4-59](#Fig59)).
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 然后Keras模型将读取、处理并利用给定的数据集（图[4-59](#Fig59)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig59_HTML.png)'
  id: totrans-563
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig59_HTML.png)'
- en: A flowchart for multimodal dataset depicts image paths and data frame of internal
    data leading to x and y of get item, which in turn leads to model.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态数据集的流程图描述了图像路径和内部数据的数据帧，这些数据帧导致获取项目中的x和y，进而导致模型。
- en: Figure 4-59
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-59
- en: Structure of our TensorFlow Sequence multimodal dataset
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 我们TensorFlow Sequence多模态数据集的结构
- en: Although we are using this dataset for our specific multimodal house price modeling
    task, it can be used for any dataset in which there are associated image-tabular
    pairs used to predict a regression or classification output. One implementation
    of this dataset is presented in Listing [4-44](#PC44).
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们使用这个数据集来完成我们的特定多模态房价建模任务，但它可以用于任何有相关图像-表格对用于预测回归或分类输出的数据集。该数据集的一个实现如列表[4-44](#PC44)所示。
- en: '[PRE43]'
  id: totrans-568
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: Note that the dataset takes in a parameter `target_scale` that determines what
    constant to divide the target by. We do this to reduce the scale of the output
    from individual dollars to thousands of dollars. Although neural networks can
    theoretically work with outputs of any scale, typically regression targets should
    be kept close to 0 for faster training, especially in which the scaling process
    does not eliminate any crucial precision. We don’t expect our model to accurately
    model house prices down to the dollar because many other factors not captured
    by the model inputs influence the final pricing of a house property. In this case,
    such a scaling is reasonable.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，该数据集接受一个参数`target_scale`，该参数确定要除以的常数。我们这样做是为了将输出从单个美元的规模减少到千美元的规模。虽然理论上神经网络可以处理任何规模的输出，但通常回归目标应保持在接近0的位置，以便更快地训练，尤其是在缩放过程中不会消除任何关键精度的情况下。我们不期望我们的模型能够精确地模拟房价到美元，因为许多其他因素不受模型输入的影响，它们会影响房屋财产的最终定价。在这种情况下，这种缩放是合理的。
- en: Listing [4-45](#PC45) demonstrates the instantiation of the multimodal dataset
    object, which provides custom parameters for our house prices dataset.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[4-45](#PC45)演示了多模态数据集对象的实例化，它为我们的房价数据集提供了自定义参数。
- en: '[PRE44]'
  id: totrans-571
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: To verify that we have implemented data feeding process correctly, we can call
    `x, y = data.__getitem__(0)` to test the data feeding pattern. Recall that `x`
    is a two-element list bundling the image and tabular inputs together; we have
    `x[0].shape` as `(8, 400, 400, 3)` and `x[1].shape` as `(8, 418)`. The target
    shape `y.shape` is `(8,)`. Our dataset behaves as expected.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 为了验证我们已经正确实现了数据馈送过程，我们可以调用`x, y = data.__getitem__(0)`来测试数据馈送模式。回想一下，`x`是一个包含图像和表格输入的两个元素列表；我们有`x[0].shape`为`(8,
    400, 400, 3)`和`x[1].shape`为`(8, 418)`。目标形状`y.shape`是`(8,)`。我们的数据集表现如预期。
- en: Now, we can design the neural network. At a high level, the model must have
    two heads to take in the two modalities – image and tabular – with independent
    processing, followed by a merger and joint processing into a single-node output
    with a rectified linear unit output.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以设计神经网络。从高层次来看，模型必须有两个头部来接收两种模态——图像和表格——进行独立处理，然后合并并联合处理到一个节点输出，该输出具有修正线性单元输出。
- en: Note
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'For regression problems, it is generally convention to use a linear output
    activation, but in this particular domain no target value will be negative. Therefore,
    using a rectified linear unit is functionally the same, with the additional benefit
    of imposing a reasonable bound. If you wanted, you could also use a rectified
    linear unit with both the standard lower bound at *y* = 0 and at *y* = *α*, where
    *α* is some value set using domain knowledge representing the maximum possible
    output. This can be implemented by defining a custom ReLU object: `crelu = lambda
    x: keras.backend.relu(x, max_value = alpha)`. Another alternative choice is to
    use a sigmoid multiplied by *α* (and perhaps horizontally stretched *σ*(*αx*)
    as opposed to the standard sigmoid function *σ*(*x*)) such that the upper bound
    is *y* = *α*.'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: '对于回归问题，通常的惯例是使用线性输出激活函数，但在这个特定领域，没有目标值会是负数。因此，使用修正线性单元在功能上是相同的，并且还有额外的优点，即施加一个合理的界限。如果你想的话，你也可以使用具有标准下限*y*
    = 0和*y* = *α*的修正线性单元，其中*α*是使用领域知识设置的一些值，代表可能的最大输出。这可以通过定义一个自定义ReLU对象来实现：`crelu
    = lambda x: keras.backend.relu(x, max_value = alpha)`。另一个替代选择是使用乘以*α*的sigmoid函数（也许与标准sigmoid函数*σ*(*x*)相比，水平拉伸*σ*(*αx*)），这样上限就是*y*
    = *α*。'
- en: Note that the tabular dataset does not contain many features – a few dozen and
    less than a dozen if you considered all the features created by the one-hot expansion
    of the `n_citi` column as only one feature. Thus, a few fully connected layers
    with a small number of nodes per layer should suffice. In this particular implementation,
    we apply three dense layers with 16 nodes each.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，表格数据集不包含许多特征——如果将`n_citi`列通过独热编码创建的所有特征视为一个特征，那么只有几十个特征，甚至不到十个。因此，只需要几个具有少量节点的全连接层就足够了。在这个特定的实现中，我们应用了三个具有16个节点的密集层。
- en: The convolutional head, on the other hand, requires more intensive processing.
    We can build a repeating nonlinear block-style design, in which different branches
    process the input with convolutions of varying kernel sizes, followed by a merging
    and a pooling. As the spatial dimensionality is reduced with max pooling, we increase
    the number of filters. After several iterations of this simple nonlinear topology,
    we flatten the output and use three dense layers to squeeze the extracted feature
    maps into a 16-element vector. The 16-element vectors from the image input and
    the tabular input are then merged via concatenation and further processed into
    a single one-node prediction output. The full architecture is implemented in Listing
    [4-46](#PC46) and visualized in Figure [4-60](#Fig60). Note that this architecture
    follows the standard components of a multimodal model in Figure [4-59](#Fig59)
    (refer to the previous figure).
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，卷积头需要更密集的处理。我们可以构建一个重复的非线性块式设计，其中不同的分支使用不同核大小的卷积处理输入，然后进行合并和池化。由于最大池化减少了空间维度，我们增加了滤波器的数量。经过几次这种简单的非线性拓扑迭代后，我们将输出展平，并使用三个密集层将提取的特征图压缩成一个16元素的向量。然后，通过连接将来自图像输入和表格输入的16元素向量合并，并进一步处理成一个单节点预测输出。完整的架构在列表[4-46](#PC46)中实现，并在图[4-60](#Fig60)中可视化。请注意，这个架构遵循图[4-59](#Fig59)中多模态模型的标准组件（参见图[4-59](#Fig59)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig60_HTML.png)'
  id: totrans-578
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig60_HTML.png)'
- en: Flowchart depicts None comma values in the input and output of input 1 of input
    layer, conv 2 d, add, max pooling 2 d, flatten, dense, and concatenate.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图描述了输入层1、卷积2D、添加、最大池化2D、展平、密集和连接操作中的无逗号值。
- en: Figure 4-60
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-60
- en: Keras visualization of the custom multimodal architecture built in Listing [4-46](#PC46)
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[4-46](#PC46)中构建的自定义多模态架构的Keras可视化
- en: '[PRE45]'
  id: totrans-582
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: This particular custom model has 123,937 parameters – which isn’t bad. As one
    may expect, the bulk of these parameters come from processing the high-dimensionality
    image input. We can compile and fit the model with standard hyperparameters (Listing
    [4-47](#PC47), Figure [4-61](#Fig61)).
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 这个特定的自定义模型有123,937个参数——这并不坏。正如预期的那样，这些参数的大部分来自处理高维度的图像输入。我们可以使用标准的超参数编译和拟合模型（列表[4-47](#PC47)，图[4-61](#Fig61)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig61_HTML.png)'
  id: totrans-584
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig61_HTML.png)'
- en: A line graph plots loss from 8.2 to 9.6 versus epochs from 0 to 100\. The line
    for Train is highly fluctuating throughout.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 一条线图显示了从8.2到9.6的损失与从0到100个epoch的关系。训练的线在整个过程中波动很大。
- en: Figure 4-61
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-61
- en: Training history of our first multimodal modeling attempt
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 我们第一次多模态建模尝试的训练历史
- en: '[PRE46]'
  id: totrans-588
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: The model performance is very poor. Throughout the 100 epochs of training, the
    model has improved the training loss only marginally and exhibited incredibly
    volatile behavior. This volatility and lack of any progress are a sign that our
    model is simply not equipped to solve the problem at all.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 模型性能非常差。在整个 100 个训练周期中，模型仅略微提高了训练损失，并表现出极其不稳定的行为。这种波动性和没有任何进展是信号，表明我们的模型根本无法解决该问题。
- en: 'We can make two improvements to our model:'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以对我们的模型进行两项改进：
- en: '*Use a better image processing component*. Earlier in this chapter, we discussed
    various “base model” successful architectures that are easily accessible via Keras
    applications or other platforms. Researchers have spent a tremendous amount of
    effort to develop a wide range of successful model architectures – instead of
    attempting to build our own, we can simply use a “prebuilt” architecture. We will
    replace our custom convolutional component with an EfficientNet model, which has
    proven a generally robust, high-performing architecture across a wide domain of
    problems.'
  id: totrans-591
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用更好的图像处理组件*。在本章早期，我们讨论了各种“基础模型”成功架构，这些架构可以通过 Keras 应用或其他平台轻松访问。研究人员投入了巨大的努力来开发一系列成功的模型架构——而不是试图构建自己的，我们可以简单地使用“预构建”的架构。我们将用
    EfficientNet 模型替换我们的自定义卷积组件，该模型已被证明是一个在广泛问题领域内普遍稳健、性能高的架构。'
- en: '*Explicitly structure the desired data interpretation*. Despite theoretical
    universal approximation properties, neural networks cannot successfully model
    anything thrown at them in practice. Sometimes, we can nudge the model in the
    right direction by building an interpretation of the data or part of the data
    directly into the design of the model or the system. In this case, we observe
    that the `n_citi` feature contains incredibly valuable data – the city a house
    is in is probably one of the most reliable predictors of house price – but the
    standard one-hot expansion form may not be conducive to meaningfully utilizing
    this data. We can use the *embedding* mechanism to more explicitly communicate
    how to interpret and make use of the city feature data.'
  id: totrans-592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*明确地构建所需的数据解释*。尽管有理论上的通用逼近属性，但在实践中，神经网络无法成功模拟任何向其投掷的东西。有时，我们可以通过将数据或数据的一部分的解释直接构建到模型或系统的设计中来，来引导模型向正确的方向前进。在这种情况下，我们观察到
    `n_citi` 特征包含极其有价值的数据——房子所在的城市可能是房价最可靠的预测因素之一——但标准的独热扩展形式可能不利于有意义地利用这些数据。我们可以使用
    *嵌入* 机制来更明确地传达如何解释和利用城市特征数据。'
- en: 'Recall the embedding mechanism discussed in Chapter [3](525591_1_En_3_Chapter.xhtml).
    An embedding takes in a certain token – for instance, a specific word or symbol
    – and maps it to a set of learned features or attributes. This is treated like
    a standard parametrized layer (the features associated with each token are optimized)
    (Figure [4-62](#Fig62)). We can use this logic to reflect how we want the neural
    network to interpret and make use of the city data: for each city, we want the
    embedding to learn a particular set of optimally useful attributes. Although we
    don’t care how the network derives the associated features or what they represent,
    we do want the network to interpret the city feature that way; using the embedding
    mechanism accomplishes our goal.'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下在第 [3](525591_1_En_3_Chapter.xhtml) 章节中讨论的嵌入机制。嵌入机制接收一个特定的标记——例如，一个特定的单词或符号——并将其映射到一组学习到的特征或属性。这被处理为一个标准的参数化层（与每个标记关联的特征被优化）（图
    [4-62](#Fig62)）。我们可以使用这个逻辑来反映我们希望神经网络如何解释和利用城市数据：对于每个城市，我们希望嵌入学习一组最优的有用属性。尽管我们不在乎网络如何推导出相关的特征或它们代表什么，但我们确实希望网络以这种方式解释城市特征；使用嵌入机制实现了我们的目标。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig62_HTML.png)'
  id: totrans-594
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig62_HTML.png)'
- en: 'Table depicts token, F1, F2, and F3 values, as follows. 1: 0.63, 2.93; negative
    3.45\. 2: 0.98; negative 5.47; negative 2.69\. 3: 1.23; 4.32; negative 1.90\.
    n: Negative 0.02; 0.03; 0.52.'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 表格展示了标记、F1、F2 和 F3 的值，如下所示。1：0.63，2.93；负值 3.45。2：0.98；负值 5.47；负值 2.69。3：1.23；4.32；负值
    1.90。n：负值 0.02；0.03；0.52。
- en: Figure 4-62
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-62
- en: Visualization of embedding. Note that when implementing embeddings in Keras,
    the first token should start from 0 – you may receive errors if otherwise
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入的可视化。请注意，在 Keras 中实现嵌入时，第一个标记应从 0 开始——如果否则，你可能会收到错误。
- en: 'Let’s begin by rewriting the dataset class for our second attempt at modeling.
    Because we want to use embeddings to process the specific city that a house is
    in, we need *three heads*: an image head that accepts an image input, a tabular
    head that accepts a tabular input, and an embedding head that accepts a single
    integer representing the city of the sample (i.e., the `n_citi` column). As such,
    our dataset needs to bundle together three inputs (Figure [4-63](#Fig63)).'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从重写数据集类开始，这是我们对建模的第二次尝试。因为我们想使用嵌入来处理房屋所在的具体城市，我们需要*三个头*：一个接受图像输入的图像头，一个接受表格输入的表格头，以及一个接受表示样本城市（即`n_citi`列）的单个整数的嵌入头。因此，我们的数据集需要捆绑三个输入（图[4-63](#Fig63)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig63_HTML.png)'
  id: totrans-599
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig63_HTML.png)'
- en: Flowchart for multimodal dataset depicts image paths, city data, and data frame
    of internal data leading to x and y of get item, which in turn leads to model.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态数据集的流程图描述了图像路径、城市数据和内部数据的数据帧，这些数据导致get item的x和y，进而导致模型。
- en: Figure 4-63
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-63
- en: Structure of our updated multimodal dataset
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 我们更新后的多模态数据集结构
- en: The modified dataset is implemented in Listing [4-48](#PC48).
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 修改后的数据集在列表[4-48](#PC48)中实现。
- en: '[PRE47]'
  id: totrans-604
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: We also need to adjust our model (Listing [4-49](#PC49)). Firstly, instead of
    building a custom convolutional (sub)network to process the image head, we can
    use the EfficientNetB1 model, which is the second smallest architecture in a family
    of eight. Using the functional API, models in Keras can be treated like layers;
    to “link” them with other layers, we use the syntax `after_layer = buildModel(params)(prev_layer)`.
    Secondly, we construct an additional embedding head that takes in a single integer
    representing one of 415 cities (here, 415 is the “vocabulary size”) and maps it
    to a vector with eight elements. The result of embedding is concatenated with
    the results of image and tabular input processing. Then the result is passed through
    several dense layers into a single-node regression output.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要调整我们的模型（列表[4-49](#PC49)）。首先，我们不再构建一个定制的卷积（子）网络来处理图像头，而是可以使用EfficientNetB1模型，这是八个系列中第二小的架构。使用功能API，Keras中的模型可以像层一样处理；为了“连接”它们与其他层，我们使用语法`after_layer
    = buildModel(params)(prev_layer)`。其次，我们构建了一个额外的嵌入头，它接受一个表示415个城市之一（在这里，415是“词汇量”）的单个整数，并将其映射到具有八个元素的向量。嵌入的结果与图像和表格输入处理的结果连接起来。然后，结果通过几个密集层传递到一个单节点回归输出。
- en: '[PRE48]'
  id: totrans-606
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Our three-head model is visualized in Figure [4-64](#Fig64).
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的三头模型在图[4-64](#Fig64)中进行了可视化。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig64_HTML.png)'
  id: totrans-608
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig64_HTML.png)'
- en: Flowchart of None comma values in the input and output of input layer, dense,
    efficient net b1, embedding, reshape, and concatenate.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 输入层、密集层、EfficientNetB1、嵌入、重塑和拼接的输入和输出中的无逗号值的流程图。
- en: Figure 4-64
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-64
- en: Keras’s visual representation of our redesigned three-head network
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: Keras对我们重新设计的三头网络的视觉表示
- en: This model has 6,538,081 trainable parameters, the majority of these parameters
    coming from the EfficientNetB1 model. When training this updated model on the
    updated dataset (Figure [4-65](#Fig65)), we obtain significantly improved performance.
    After almost 60 epochs of training, the model converges to a Mean Squared Error
    of 83584 and a Mean Absolute Error of 192 – a significant improvement over the
    previous model’s performance. Recall that our target is in units of thousands
    of dollars, which means that the model is, on average, $192k off on the house
    price estimation. While this is certainly not incredible performance, it is understandable
    given the many other house pricing factors not included in this multimodal model.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 此模型有6,538,081个可训练参数，其中大多数参数来自EfficientNetB1模型。当在更新的数据集（图[4-65](#Fig65)）上训练此更新后的模型时，我们获得了显著改进的性能。经过近60个epoch的训练后，模型收敛到均方误差83584和均方绝对误差192
    – 比先前模型的性能有显著改进。回想一下，我们的目标是千美元单位，这意味着模型在房价估计上平均偏离192k。虽然这当然不是令人难以置信的性能，但考虑到这个多模态模型中没有包含的许多其他房价因素，这是可以理解的。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig65_HTML.png)'
  id: totrans-613
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig65_HTML.png)'
- en: Line graph plots loss from 100,000 to 350,000 versus epochs from 0 to 60\. Line
    for Train drops from 350,000 to 100,000 initially and then remains constant at
    about 70,000.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图显示了从100,000到350,000的损失与从0到60个epoch的关系。训练线的损失最初从350,000下降到100,000，然后保持在约70,000。
- en: Figure 4-65
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-65
- en: Training performance of the updated three-head model
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 更新后的三头模型的训练性能
- en: If we replace the EfficientNetB1 model with the larger and more powerful EfficientNetB3
    model (Listing [4-50](#PC50)), we can obtain even better performance (Figure [4-66](#Fig66)).
    The expanded model has 10,725,225 parameters and converges to a 38739.26 MSE and
    124.4208 MAE.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将EfficientNetB1模型替换为更大、更强大的EfficientNetB3模型（列表[4-50](#PC50)），我们可以获得更好的性能（图[4-66](#Fig66)）。扩展模型有10,725,225个参数，收敛到38739.26
    MSE和124.4208 MAE。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig66_HTML.png)'
  id: totrans-618
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig66_HTML.png)'
- en: Line graph plots loss from 50,000 to 300,000 versus epochs from 0 to 60\. Line
    for Train drops from 300,000 to 50,000 initially and then remains constant at
    about 30,000.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图从50,000到300,000显示损失，与从0到60的时期数进行比较。训练线的损失最初从300,000下降到50,000，然后保持在约30,000。
- en: Figure 4-66
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-66
- en: Training history for the three-head model using EfficientNetB3 instead of EfficientNetB1
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 使用EfficientNetB3而不是EfficientNetB1训练的三头模型的历史记录
- en: '[PRE49]'
  id: totrans-622
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Still, there are many areas for system improvement, like optimizing the exact
    nonlinear architecture, the dimensionality of the input, the image processing
    architecture (e.g., trying out NASNet, ResNet, or another design), the training
    meta-parameters, and so on. Improvement of this model is left as an open exercise
    for you.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，系统改进还有很多领域，例如优化精确的非线性架构、输入维度、图像处理架构（例如尝试NASNet、ResNet或另一种设计）、训练元参数等。这个模型的改进留给你作为一个开放练习。
- en: 1D Convolutions for Tabular Data
  id: totrans-624
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 表格数据的一维卷积
- en: We’ve done a lot of work setting up the usage of convolutional neural networks
    for image data, both for pure image datasets and multimodal datasets with images
    and an associated tabular/structured data component. Now, we’ll demonstrate the
    usage of convolutions directly on tabular datasets.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经做了很多工作来设置卷积神经网络在图像数据上的使用，无论是纯图像数据集还是包含图像和相关表格/结构化数据组件的多模态数据集。现在，我们将直接在表格数据集上展示卷积的使用。
- en: The most “natural” application of convolutions to tabular data is a *one-dimensional
    convolution*. Images have two spatial dimensions (ignoring the depth/color channel),
    so we can apply two-dimensional convolutions across them. Standard tabular data,
    on the other hand, has one “spatial dimension,” so we can apply a one-dimensional
    convolution.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积在表格数据上的最“自然”应用是**一维卷积**。图像有两个空间维度（忽略深度/颜色通道），因此我们可以对它们应用二维卷积。另一方面，标准表格数据只有一个“空间维度”，因此我们可以应用一维卷积。
- en: One-dimensional convolutions operate by the same logic as two-dimensional convolutions,
    except with a one-dimensional kernel that slides along the axis rather than a
    two-dimensional kernel sliding along two spatial axes.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 一维卷积按照与二维卷积相同的逻辑操作，只是使用一维核在轴上滑动，而不是二维核在两个空间轴上滑动。
- en: 'Consider a hypothetical kernel *k* with length 3:'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个假设的长度为3的核 *k*：
- en: '![$$ k=\left[1,\kern0.5em 3,\kern0.5em -1\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equab.png)'
  id: totrans-629
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equab.png)'
- en: 'We will attempt to apply *k* to a “single row of data,” or a one-dimensional
    matrix/vector *i*:'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将尝试将 *k* 应用到“单行数据”或一维矩阵/向量 *i*：
- en: '![$$ i=\left[1,\kern0.5em 5,\kern0.5em 6,\kern0.5em 3,\kern0.5em 9,\kern0.5em
    2,\kern0.5em 3,\kern0.5em 8,\kern0.5em 20,\kern0.5em 3\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equac.png)'
  id: totrans-631
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equac.png)'
- en: 'The feature *i* contains ten features; we can fit *feature size* − *kernel
    size* + 1 = 10 − 3 + 1 = 8 convolutions, meaning the resulting convolved feature
    *R* contains eight elements:'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 特征 *i* 包含十个特征；我们可以拟合 *特征大小* - *核大小* + 1 = 10 - 3 + 1 = 8 个卷积，这意味着结果卷积特征 *R*
    包含八个元素：
- en: '![$$ R=\left[?,?,?,?,?,?,?,?\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equad.png)'
  id: totrans-633
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equad.png)'
- en: 'To determine the value of the first element of *R*, we apply the convolution
    kernel *k* to the first set of contiguous values along the feature *i* (bolded):'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 要确定矩阵 *R* 的第一个元素的值，我们将卷积核 *k* 应用到特征 *i*（粗体）上的第一个连续值集：
- en: '![$$ i=\left[1,\kern0.5em 5,\kern0.5em 6,\kern0.5em 3,\kern0.5em 9,\kern0.5em
    2,\kern0.5em 3,\kern0.5em 8,\kern0.5em 20,\kern0.5em 3\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equae.png)'
  id: totrans-635
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equae.png)'
- en: 'Applying the kernel to these three elements yields the output 1 · 1 + 3 · 5 + (−1) · 6 = 1 + 15 − 6 = 10\.
    The first value of *R* is thus 10:'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 将核应用于这三个元素得到输出1·1+3·5+（-1）·6=1+15-6=10。因此，*R*的第一个值是10：
- en: '![$$ R=\left[10,?,?,?,?,?,?,?\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equaf.png)'
  id: totrans-637
  prefs: []
  type: TYPE_IMG
  zh: '![$$ R=\left[10,?,?,?,?,?,?,?\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equaf.png)'
- en: 'We can find the second value of *R* by applying the same kernel to the second
    set of contiguous values along the feature (bolded):'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过将相同的核应用于特征上的第二组连续值来找到*R*的第二个值（加粗）：
- en: '![$$ i=\left[1,\kern0.5em 5,\kern0.5em 6,\kern0.5em 3,\kern0.5em 9,\kern0.5em
    2,\kern0.5em 3,\kern0.5em 8,\kern0.5em 20,\kern0.5em 3\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equag.png)'
  id: totrans-639
  prefs: []
  type: TYPE_IMG
  zh: '![$$ i=\left[1,\kern0.5em 5,\kern0.5em 6,\kern0.5em 3,\kern0.5em 9,\kern0.5em
    2,\kern0.5em 3,\kern0.5em 8,\kern0.5em 20,\kern0.5em 3\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equag.png)'
- en: 'This yields 1 · 5 + 3 · 6 + (−1) · 3 = 5 + 18 − 3 = 20\. The second value of
    *R* is thus 20:'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 这得到1·5+3·6+（-1）·3=5+18-3=20。因此，*R*的第二个值是20：
- en: '![$$ R=\left[10,20,?,?,?,?,?,?\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equah.png)'
  id: totrans-641
  prefs: []
  type: TYPE_IMG
  zh: '![$$ R=\left[10,20,?,?,?,?,?,?\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equah.png)'
- en: 'The remainder of the convolved matrix can be filled out by continuing this
    procedure. One-dimensional convolutions serve a similar purpose to two-dimensional
    convolutions: they can act as “filters” that amplify or dim the presence of certain
    attributes or characteristics in the data, depending on the kernel values.'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 通过继续此程序，可以填充卷积矩阵的其余部分。一维卷积与二维卷积具有类似的作用：它们可以作为“滤波器”，根据核值放大或减弱数据中某些属性或特征的存在。
- en: Neural networks can learn the optimal kernel values for a one-dimensional convolutional
    neural network for a certain task.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络可以学习一维卷积神经网络在特定任务中的最佳核值。
- en: 'To demonstrate this, let’s consider a sequence modeling task: given sequentially
    sampled points [*f*(*x*[1]), *f*(*x*[2]), ..., *f*(*x*[*n*])] where *x*[*n*] − *x*[*n* − 1] = *x*[*n* − 1] − *x*[*n* − 2]
    (i.e., the inputs to the function are equally spaced) from a noisy function *f*,
    the one-dimensional convolutional neural network must classify *f* as either being
    a linear, quadratic, or cyclic function.'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示这一点，让我们考虑一个序列建模任务：给定从有噪声的函数*f*中按顺序采样的点[*f*(*x*[1]), *f*(*x*[2]), ..., *f*(*x*[*n*])]，其中*x*[*n*]−*x*[*n*−1]=*x*[*n*−1]−*x*[*n*−2]（即函数的输入是等间距的），一维卷积神经网络必须将*f*分类为线性、二次或周期函数。
- en: Listing [4-51](#PC51) generates such a dataset, given `numElements` (the value
    of *n*, determining how many points are sampled from *f*) and `numTriSamples`
    (the number of times a sample for each of the three classes is generated). `baseRange`
    represents the set *x*; it is equally spaced from −5 to 5 with `numElements` elements.
    Each time we generate a linear, quadratic, or cyclic function, we choose random
    parameters (for instance, {*a*, *b*, *c*, *d*} in *a sin sin* (*bx* − *c*) + *d*
    for a cyclic function). The limits of the uniform random distribution have been
    chosen such that the functions generally occupy the same rectangular region such
    that the class of a function ideally cannot be predicted by how high it is.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[4-51](#PC51)生成了这样一个数据集，给定`numElements`（*n*的值，决定从*f*中采样多少个点）和`numTriSamples`（为三个类别中的每个样本生成的次数）。`baseRange`代表集合*x*；它从-5到5均匀分布，有`numElements`个元素。每次我们生成线性、二次或周期函数时，我们选择随机参数（例如，周期函数*a
    sin sin*（*bx*−*c*）+*d*中的{*a*, *b*, *c*, *d*}）。均匀随机分布的极限已被选择，使得函数通常占据相同的矩形区域，这样函数的类别理想情况下不能通过其高度来预测。
- en: '[PRE50]'
  id: totrans-646
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: Additionally, note that we add random noise to make the problem more interesting.
    In this case, we add normally distributed noise with mean 0 and standard deviation
    1 to `x`.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，请注意我们添加随机噪声以使问题更有趣。在这种情况下，我们将均值为0、标准差为1的正态分布噪声添加到`x`上。
- en: We need to split the dataset into training and validation datasets to evaluate
    genuine model performance (Listing [4-52](#PC52)).
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估真实模型性能，我们需要将数据集分为训练集和验证集（列表[4-52](#PC52)）。
- en: '[PRE51]'
  id: totrans-649
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Figure [4-67](#Fig67) displays three samples from each class. While there is
    moderate noise, the overall trajectory of each function is clearly identifiable.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-67](#Fig67)显示了每个类别的三个样本。虽然存在适度噪声，但每个函数的整体轨迹仍然可以清楚地识别。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig67_HTML.png)'
  id: totrans-651
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig67_HTML.png)'
- en: A multi-line graph plots negative 4 to 4 on the x-axis and negative 20 to 20
    on the y-axis. Three pairs of wavy lines depict an increase, decrease, or fluctuation.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 多行图在x轴上绘制从-4到4，在y轴上绘制从-20到20。三对波浪线描绘了增加、减少或波动。
- en: Figure 4-67
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-67
- en: Three sampled functions from each class in our custom dataset – linear, quadratic,
    and cyclic
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的自定义数据集中每个类别的三个采样函数——线性、二次和周期性
- en: We can construct a simple model that employs one-dimensional convolutions and
    one-dimensional pooling layers to process the inputs (Listing [4-53](#PC53)).
    In Keras, one-dimensional convolutions are instantiated via `L.Conv1D(...)`. Note
    that while the input is a single vector with shape (*a*), we need to reshape it
    into shape (*a*, 1) to apply one-dimensional convolutions for the same reason
    that a grayscale image of shape (*a*, *b*) needs to be reshaped into shape (*a*,
    *b*, 1) to be processed using two-dimensional convolutions. After three iterations
    of a convolution-convolution-pooling block, the input is flattened back to one
    spatial dimension and processed with two more full connected layers to an output
    of shape 3 (such that each class is associated with a probability). Because this
    is a multiclass problem in which all output probabilities should sum to 1, we
    use a softmax activation output.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以构建一个简单的模型，该模型使用一维卷积和一维池化层来处理输入（见列表[4-53](#PC53)）。在Keras中，一维卷积通过`L.Conv1D(...)`实例化。请注意，虽然输入是一个形状为(*a*)的单个向量，但我们需要将其重塑为形状(*a*,
    1)以应用一维卷积，这与形状为(*a*, *b*)的灰度图像需要重塑为形状(*a*, *b*, 1)以使用二维卷积的原因相同。经过三次卷积-卷积-池化块的迭代后，输入被展平回一个空间维度，并通过两个额外的全连接层处理，输出形状为3（这样每个类别都与一个概率相关联）。因为这是一个多类问题，所有输出概率的总和应该为1，所以我们使用softmax激活输出。
- en: '[PRE52]'
  id: totrans-656
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: We can compile and train the model using standard meta-parameters (Listing [4-54](#PC54),
    Figure [4-68](#Fig68)).
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用标准的元参数编译和训练模型（见列表[4-54](#PC54)和图[4-68](#Fig68)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig68_HTML.png)'
  id: totrans-658
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig68_HTML.png)'
- en: Two-line graphs plot loss and accuracy versus epochs. Train and validation show
    drastic and slight decrease for loss and similar increase for accuracy.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 双行图绘制损失和准确率随epoch的变化。训练和验证损失急剧下降，准确率略有上升。
- en: Figure 4-68
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-68
- en: Loss and accuracy of the 1D CNN model’s performance on the function identification
    task
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 1D CNN模型在函数识别任务上的损失和准确率
- en: '[PRE53]'
  id: totrans-662
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: 'The model obtains good performance very quickly: 0.0098 training loss, 0.9971
    training accuracy, 0.0215 validation loss, and 0.9908 validation accuracy. Let’s
    make the problem more difficult by increasing the standard deviation of noise
    from 1 to 2\. Now, the dataset looks like the following (Figure [4-69](#Fig69)).'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 模型很快就能获得良好的性能：0.0098的训练损失，0.9971的训练准确率，0.0215的验证损失，和0.9908的验证准确率。现在，让我们通过将噪声的标准差从1增加到2来使问题更难。现在，数据集看起来如下（见图[4-69](#Fig69)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig69_HTML.png)'
  id: totrans-664
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig69_HTML.png)'
- en: A multi-line graph plots negative 4 to 4 on the x-axis and negative 20 to 20
    on the y-axis. Three pairs of wavy lines depict an increase, decrease, or fluctuation.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 多行图在x轴上绘制从-4到4，在y轴上绘制从-20到20。三对波浪线描绘了增加、减少或波动。
- en: Figure 4-69
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-69
- en: Three sampled functions from each class in our custom dataset, with an increased
    noise standard deviation of 2
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的自定义数据集中每个类别的三个采样函数，噪声标准差增加到2
- en: After two epochs, the model reaches 0.0140 validation loss and 0.9958 validation
    accuracy – functionally equal to (and, in fact, slightly better than) the performance
    on a dataset with noise drawn from a distribution with standard deviation 1.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 经过两个epoch后，模型达到了0.0140的验证损失和0.9958的验证准确率——功能上等同于（实际上略优于）从标准差为1的分布中抽取噪声的数据集上的性能。
- en: Let’s increase the noise even more, to a standard deviation of 3 (Figure [4-70](#Fig70)).
    The neural network obtains 0.0934 validation loss and 0.9717 validation accuracy,
    which is a relative significant decrease in performance – but still isn’t bad.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进一步增加噪声，标准差达到3（见图[4-70](#Fig70)）。神经网络获得了0.0934的验证损失和0.9717的验证准确率，性能相对显著下降——但仍然不错。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig70_HTML.png)'
  id: totrans-670
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig70_HTML.png)'
- en: A multi-line graph plots negative 4 to 4 on the x-axis and negative 20 to 20
    on the y-axis. Three pairs of wavy lines depict an increase, decrease, or fluctuation.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 一个多行图在x轴上从-4到4，在y轴上从-20到20。三对波浪线描绘了增加、减少或波动。
- en: Figure 4-70
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-70
- en: Three sampled functions from each class in our custom dataset, with an increased
    noise standard deviation of 3
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们自定义数据集的每个类别中采样了三个函数，噪声标准差增加了3
- en: When we increase the noise standard deviation to 10, the dataset becomes quite
    tricky to separate (Figure [4-71](#Fig71)) – but the model still does reasonably
    well (Figure [4-72](#Fig72)), scoring a validation loss of 0.2230 and a validation
    accuracy of 0.9300.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将噪声标准差增加到10时，数据集变得相当难以分离（见图[4-71](#Fig71)）——但模型仍然表现相当不错（见图[4-72](#Fig72)），验证损失为0.2230，验证准确率为0.9300。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig72_HTML.png)'
  id: totrans-675
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig72_HTML.png)'
- en: Two-line graphs plot accuracy and loss versus epochs. Train and validation show
    drastic and slight increase for accuracy and similar decrease for loss.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 双行图显示了准确率和损失与历元的关系。训练和验证在准确率上都有显著和轻微的增加，而在损失上则相似地减少。
- en: Figure 4-72
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-72
- en: Accuracy and validation performance for a 1D CNN on a noisy version of the function
    identification synthetic dataset
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 在函数识别合成数据集的噪声版本上，1D CNN的准确率和验证性能
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig71_HTML.png)'
  id: totrans-679
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig71_HTML.png)'
- en: A multi-line graph plots negative 4 to 4 on x-axis and negative 40 to 20 on
    y-axis. Three pairs of lines depict overlapping, high frequency waves.
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 一个多行图在x轴上从-4到4，在y轴上从-40到20。三对线条描绘了重叠的高频波。
- en: Figure 4-71
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-71
- en: Three sampled functions from each class in our custom dataset, with an increased
    noise standard deviation of 10
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们自定义数据集的每个类别中采样了三个函数，噪声标准差增加了10
- en: 'The main idea of these experiments is this: we were able to build a robust
    and powerful signal processing model using a simple neural network comprising
    of one-dimensional convolutions and pooling operations. To further improve the
    network’s modeling power, you could add more sophisticated convolutional structures,
    like residual connections and other topological nonlinearities.'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 这些实验的主要思想是这样的：我们能够使用一个简单的神经网络构建一个稳健且强大的信号处理模型，该神经网络由一维卷积和池化操作组成。为了进一步提高网络建模能力，你可以添加更复杂的卷积结构，如残差连接和其他拓扑非线性。
- en: Note that you can use one-dimensional convolutions to process data like audio
    signals or time series in their raw or natural form. For instance, consider one-dimensional
    convolutions to perform speaker diarization – categorizing which speaker is speaking
    at some point in a time series. We can do this by processing an input signal with
    one-dimensional convolutions, “flattening” into one vector, and using dense layers
    to form the learned features into an output vector (a very similar pattern to
    two-dimensional CNNs). If you have a dataset in which signals are associated with
    tabular data, you can build multimodal models as discussed in the previous section,
    but with one-dimensional convolutional heads rather than two-dimensional ones.
    (We’ll see an example of applying convolutions, in addition to recurrent layers,
    to model audio signals in the next chapter.)
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，你可以使用一维卷积来处理像音频信号或时间序列这样的数据，它们以原始或自然的形式存在。例如，考虑使用一维卷积进行说话人分割——在时间序列的某个时刻分类哪个说话人在说话。我们可以通过使用一维卷积处理输入信号，将其“展平”成一个向量，并使用密集层将学习到的特征形成输出向量（这与二维CNN非常相似的模式）。如果你有一个与表格数据关联的信号数据集，你可以构建多模态模型，如前节所述，但使用一维卷积头而不是二维卷积头。（我们将在下一章中看到一个将卷积应用于模型音频信号的例子，除了循环层之外。）
- en: 'However, we’re unlikely to get success by directly applying a one-dimensional
    convolutional neural network to *tabular data*. Our example task and all natural
    applications of one-dimensional CNNs like audio and time series contain an essential
    attribute: they are ordered along a sequential axis. That is, there is a clear
    relationship between *x*[*i*] and *x*[*i* + 1]. Tabular datasets generally contain
    independent features that are not linked to each other in order. There is no reason
    one column should necessarily be placed “before,” “after,” or “next to” another
    – these relational concepts don’t apply to tabular data.'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们直接将一维卷积神经网络应用于**表格数据**不太可能取得成功。我们的示例任务以及一维CNN的自然应用，如音频和时间序列，都包含一个基本属性：它们沿着一个序列轴是有序的。也就是说，存在一个明确的*x*[*i*]和*x*[*i* + 1]之间的关系。表格数据集通常包含相互独立的特征，这些特征在顺序上并不相互关联。没有理由认为某一列必须“在”另一列“之前”、“之后”或“旁边”——这些关系概念不适用于表格数据。
- en: 'We can give this attribute a name: *contiguous semantics*. *Contiguous* means
    “next to” or “adjacent” (e.g. a contiguous block of memory), and *semantics* refers
    to the “meaning” or “concept” implied by a symbolic or syntactic representation.
    If a feature or dataset possesses contiguous semantics, then it makes sense to
    apply one-dimensional convolutions directly on the dataset (Figure [4-73](#Fig73)).'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以给这个属性起个名字：**连续语义**。**连续**意味着“相邻”或“相邻的”（例如，一个连续的内存块），而**语义**指的是由符号或句法表示所暗示的“含义”或“概念”。如果一个特征或数据集具有连续语义，那么直接在数据集上应用一维卷积是有意义的（图[4-73](#Fig73)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig73_HTML.png)'
  id: totrans-687
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig73_HTML.png)'
- en: Flowchart of tabular data, 1 D convolution kernel, and convolved result for
    number of bathrooms, number of bedrooms, number of stories, year built, and by
    the water.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 表格数据、1D卷积核和卷积结果的流程图，包括浴室数量、卧室数量、楼层数、建造年份和靠近水域。
- en: Figure 4-73
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-73
- en: Example demonstration of applying an operation requiring contiguous semantics
    (a convolution) to a dataset that does not possess contiguous semantics and the
    bizarre result we get by trying to do so
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 将需要连续语义的操作（例如卷积）应用于不具有连续语义的数据集的示例演示，以及我们尝试这样做时得到的奇特结果
- en: 'We can attempt to get around this problem using a clever trick: *soft ordering*.
    Even though each sample *x* contains unordered columns, we can imagine that some
    *ordered representation q* exists containing the same information as *x*; that
    is, it “rearranges” and “molds” the semantics (information content, meaning) of
    the raw unordered feature into a contiguous semantics. This is not necessarily
    hard to believe: we deform and reform data spaces into possessing new attributes
    often in machine learning (e.g., different distances, different dimensionalities,
    different modalities, different statistical properties) while retaining their
    “information content.”'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以尝试使用一个巧妙的技巧来解决这个问题：**软排序**。尽管每个样本*x*包含无序的列，但我们可以想象存在一个包含与*x*相同信息的**有序表示*q*；也就是说，它“重新排列”和“塑造”了原始无序特征的语义（信息内容，含义），使其成为一个连续的语义。这并不一定难以相信：在机器学习中，我们经常将数据空间变形和重塑，以具有新的属性（例如，不同的距离、不同的维度、不同的模态、不同的统计属性），同时保留它们的“信息内容”。
- en: It’s difficult for us to imagine or design a transformation from *x* to *q*,
    but if *q* exists – which we argue it does – then the mapping *x* → *q* should
    exist too. We can task a neural network, which has been proven to be a theoretical
    “universal function approximator,” to learn this mapping for us by extracting
    and rearranging our tabular data in an ordered sequence optimally readable by
    a one-dimensional convolution (Figure [4-74](#Fig74)).
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 我们难以想象或设计一个从*x*到*q*的转换，但如果*q*存在——我们认为是存在的——那么*x* → *q*的映射也应该存在。我们可以让一个神经网络，已被证明是理论上的“通用函数逼近器”，通过提取和重新排列我们的表格数据，以一个有序序列的形式，最优地读取一维卷积（图[4-74](#Fig74)），来学习这个映射。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig74_HTML.png)'
  id: totrans-693
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig74_HTML.png)'
- en: C N N model for tabular data depicts a network of unordered representation x,
    ordered representation q, mapper N N and 1D C N N model leading to predictions.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 表格数据的CNN模型描述了一个无序表示*x*、有序表示*q*、映射器NN和1D CNN模型，这些模型导致预测。
- en: Figure 4-74
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-74
- en: Blueprint for applying 1D CNNs to tabular data using soft ordering
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 使用软排序将1D CNN应用于表格数据的蓝图
- en: A simple approach is to introduce a fully connected component, or an *encoding
    component*, *before* convolutions. The hope is that the fully connected component
    learns the mapping from raw input data *x* to optimal ordered representation *q*,
    which is then further processed in convolutional fashion by the remainder of the
    network.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 一种简单的方法是在卷积之前引入一个全连接组件，或称为*编码组件*。希望全连接组件能够从原始输入数据*x*学习到最优排序表示*q*，然后由网络的其他部分进一步以卷积方式处理。
- en: Thus, in practice, the “mapper NN” and the 1D CNN model can be merged into one
    single neural network process, in which the output of the mapping component directly
    feeds into the input of the 1D CNN model.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在实践中，“映射NN”和1D CNN模型可以合并成一个单一的神经网络过程，其中映射组件的输出直接馈入1D CNN模型的输入。
- en: This concept emerged from a Kaggle competition, popularized by the user “tmp”
    for using this approach in the second place solution for the Harvard Laboratory
    for Innovation Science Mechanisms of Action Prediction competition. As tmp writes
    on a forum post^([7](#Fn7)) outlining their solution
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 这个概念起源于一个Kaggle比赛，由用户“tmp”在哈佛实验室创新科学机制动作预测竞赛的第二名解决方案中使用这种方法而流行起来。正如tmp在一个论坛帖子^([7](#Fn7))中概述他们的解决方案时写道
- en: Using such a structure in tabular data is based on the idea that [a] CNN structure
    performs well in feature extraction, but it is rarely used in tabular data because
    the correct features ordering is unknown. A simple idea is to reshape the data
    directly into a multi-channel image format, and the correct sorting can be learned
    by using FC layer through back-propagation.
  id: totrans-700
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在表格数据中使用这种结构基于以下想法：[a] CNN结构在特征提取方面表现良好，但由于正确的特征排序未知，它很少在表格数据中使用。一个简单的想法是将数据直接重塑为多通道图像格式，并通过使用FC层通过反向传播来学习正确的排序。
- en: Let’s take the architecture used for our previous function classification task
    and slightly modify it to include a soft ordering component (Listing [4-55](#PC55)).
    A simple example of such a component would be a series of dense layers.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们拿我们之前用于函数分类任务的架构，并稍作修改以包括一个软排序组件（见清单[4-55](#PC55)）。这样一个组件的简单例子就是一系列密集层。
- en: '[PRE54]'
  id: totrans-702
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: Let’s apply this on a sample tabular dataset. The University of California Irvine
    Forest Cover dataset – one of many well-established benchmark datasets available
    in the University of California Irvine dataset repository – contains tree observations
    from several areas of the Roosevelt National Forest. This dataset contains several
    dozen features and over half a million measurements, making it a good dataset
    to apply neural networks to.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在一个样本表格数据集上应用这个方法。加州大学欧文分校的Forest Cover数据集——这是加州大学欧文分校数据仓库中许多已建立的基准数据集之一——包含了罗斯福国家公园几个地区的树木观测数据。这个数据集包含了几十个特征和超过五十万次的测量，使其成为应用神经网络的好数据集。
- en: 'The dataset features are shown in the following. The objective is to predict
    the cover type of the region given measurements:'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的表格显示了数据集的特征。目标是根据测量值预测区域的覆盖类型：
- en: '[PRE55]'
  id: totrans-705
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: When we instantiate the previously discussed architecture on this dataset by
    customizing the number of input nodes to match the number of features in the dataset,
    we obtain the following model (Listing [4-56](#PC57)).
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将之前讨论的架构应用于这个数据集，并通过自定义输入节点数量以匹配数据集中的特征数量时，我们得到了以下模型（见清单[4-56](#PC57)）。
- en: '[PRE56]'
  id: totrans-707
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: The model can be trained with standard meta-parameters on the dataset (which
    has been loaded into `X_train` and `y_train` datasets) (Listing [4-57](#PC58)).
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型可以使用标准元参数在数据集上训练（该数据集已加载到`X_train`和`y_train`数据集中）（见清单[4-57](#PC58)）。
- en: '[PRE57]'
  id: totrans-709
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: The model converges to a train loss slightly under 0.2 and obtains a validation
    accuracy of 0.90 (Figure [4-75](#Fig75)).
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 模型收敛到一个略低于0.2的训练损失，并获得了0.90的验证准确率（见图[4-75](#Fig75)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig75_HTML.png)'
  id: totrans-711
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig75_HTML.png)'
- en: A line graph plots loss from 0.2 to 0.8 versus epochs from 0 to 100\. Lines
    for train and validation drop from 0.8 to 0.2 approximately.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 一条线图显示了从0.2到0.8的损失与从0到100个epoch的关系。训练和验证的线条从0.8下降到大约0.2。
- en: Figure 4-75
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-75
- en: Performance history of the initial soft ordering 1D CNN model on the Forest
    Cover dataset
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 初始软排序1D CNN模型在Forest Cover数据集上的性能历史
- en: 'While this is reasonable performance, it’s not great – we can very easily obtain
    comparable or higher performance using purely fully connected networks or traditional
    machine learning applications. We can try building a more sophisticated neural
    network structure (implemented in Listing [4-58](#PC59)). The key architectural
    components are as follows:'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这个性能是合理的，但并不出色——我们可以非常容易地通过纯全连接网络或传统的机器学习应用获得相当或更高的性能。我们可以尝试构建一个更复杂的神经网络结构（在列表
    [4-58](#PC59) 中实现）。关键架构组件如下：
- en: '*Soft ordering expansion*: Instead of merely transforming one vector to another
    (as in the previous architecture), we develop multiple “vector feature maps” during
    the soft ordering component. This can be thought of as the number of depth-wise
    channels in an image.'
  id: totrans-716
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*软排序扩展*：与之前架构中仅将一个向量转换为另一个向量不同，我们在软排序组件中开发多个“向量特征图”。这可以被视为图像中深度通道的数量。'
- en: '*Nonlinear convolutional cells*: Three difference branches with different kernel
    sizes are applied to the input before merging and pooling.'
  id: totrans-717
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*非线性卷积单元*：在合并和池化之前，应用了三个不同核大小的差异分支到输入。'
- en: '*Use of the SELU activation*: Instead of using the standard ReLU activation
    function, we allow for the alternative SELU activation. Recall the SELU function
    discussed in Chapter [3](525591_1_En_3_Chapter.xhtml).'
  id: totrans-718
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用 SELU 激活函数*：我们允许使用替代的 SELU 激活函数，而不是使用标准的 ReLU 激活函数。回想一下第 [3](525591_1_En_3_Chapter.xhtml)
    章中讨论的 SELU 函数。'
- en: '[PRE58]'
  id: totrans-719
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: This model uses 487,879 parameters (Figure [4-76](#Fig76)).
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 此模型使用了 487,879 个参数（图 [4-76](#Fig76)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig76_HTML.png)'
  id: totrans-721
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig76_HTML.png)'
- en: Flowchart of None comma values in the input and output of input 1 of input layer,
    dense, reshape, conv 1 d, add, average pooling 1 d, and flatten.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 输入层输入 1 的输入和输出中的 None comma 值流程图，包括 dense、reshape、conv 1 d、add、average pooling
    1 d 和 flatten。
- en: Figure 4-76
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-76
- en: Keras’s architecture visualization of our updated soft ordering 1D CNN
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: Keras 对我们更新的软排序 1D CNN 架构的可视化
- en: This adapted architecture performs better, obtaining near 96% validation accuracy
    on the dataset – which is a great result given only two architectural attempts
    and relatively simple training techniques (Figure [4-77](#Fig77)).
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 这种改进的架构表现更佳，在数据集上获得了近 96% 的验证准确率——考虑到只有两次架构尝试和相对简单的训练技术，这是一个非常好的结果（图 [4-77](#Fig77)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig77_HTML.png)'
  id: totrans-726
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig77_HTML.png)'
- en: Two-line graphs plot accuracy and loss versus epochs. Lines for train and validation
    show drastic increase for accuracy and similar decrease for loss.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 双线图绘制了准确率和损失与训练轮数的关系。训练和验证的线条显示准确率急剧增加，损失相似地减少。
- en: Figure 4-77
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-77
- en: Performance history (accuracy and loss) of our updated soft ordering 1D CNN
    design on the Forest Cover dataset
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 我们更新的软排序 1D CNN 设计在 Forest Cover 数据集上的性能历史（准确率和损失）
- en: There are several areas in which you could attempt to improve the model. You
    may notice that there are two one-hot encoded columns in the dataset that can
    be processed via a multi-head embedding approach discussed in the “Multimodal
    Image and Tabular Models” section, in which each possible unique value is associated
    with a set of learned embeddings/features. Another path of inquiry is the exploration
    of more complex training procedures, like learning rate adjustment and choosing
    another optimizer. It also may be fruitful to experiment with the specific size
    or scale of the architecture. This last inquiry can be pursued using meta-optimization,
    which is discussed in Chapter [6](525591_1_En_6_Chapter.xhtml) on advanced neural
    network methods.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 在几个方面，你可以尝试改进模型。你可能注意到数据集中有两个可以经过“多模态图像和表格模型”部分中讨论的多头嵌入方法处理的 one-hot 编码列。在该方法中，每个可能的唯一值都与一组学习的嵌入/特征相关联。另一个研究方向是探索更复杂的训练过程，如学习率调整和选择另一个优化器。尝试架构的具体大小或规模也可能是有益的。最后一个研究方向可以使用元优化来实现，这在第
    [6](525591_1_En_6_Chapter.xhtml) 章关于高级神经网络方法中进行了讨论。
- en: For additional reading on applications of one-dimensional convolutional neural
    networks, see “Flow-based malware detection using convolutional neural network”^([8](#Fn8))
    by Minsoo Yeo et al. (2018), who apply a one-dimensional CNN directly to cybersecurity
    domain tabular data, and the Kaggle user tmp’s forum post^([9](#Fn9)) on the second
    place solution to the Laboratory for Innovation Science at Harvard’s Mechanisms
    of Action Prediction competition, which uses a one-dimensional CNN in addition
    to a TabNet model^([10](#Fn10)) and a conventional DNN. Out of the entire ensemble,
    the 1D CNN is given the highest weight (65% of the output).
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 关于一维卷积神经网络应用的进一步阅读，请参阅 Minsoo Yeo 等人于 2018 年发表的“基于流的恶意软件检测使用卷积神经网络”^([8](#Fn8))，他们将一维
    CNN 直接应用于网络安全领域的表格数据，以及 Kaggle 用户 tmp 的论坛帖子^([9](#Fn9))，该帖子讨论了哈佛大学创新科学实验室的机制预测竞赛的第二名解决方案，该方案除了
    TabNet 模型^([10](#Fn10)) 和传统 DNN 外，还使用了一维 CNN。在整个集成中，1D CNN 被赋予了最高的权重（输出中的 65%）。
- en: 2D Convolutions for Tabular Data
  id: totrans-732
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 表格数据的二维卷积
- en: We saw in the previous section that one-dimensional convolutions made sense
    for a certain type of data – data with sequential or ordered features, that is
    – and how neural networks can be used to learn both the convolutions and the mapping
    from unordered to ordered data (i.e., satisfying the prerequisite for convolutions).
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们看到了一维卷积对于某种类型的数据是有意义的——具有顺序或有序特征的数据，即——以及神经网络如何被用来学习卷积以及从无序到有序数据的映射（即满足卷积的先决条件）。
- en: 'Using a similar logic, we can identify the data prerequisite for feasibly applying
    two-dimensional convolutions: the input must be of shape (*width*, *height*, *depth*),
    and pixels must have a spatial relationship to one another. If this latter requirement
    is not met, then applying convolutions doesn’t make sense. Convolutions group
    together neighboring pixels, so any input to a standard two-dimensional convolution
    should be arranged such that a spatial relationship between values exists.'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 使用类似的逻辑，我们可以确定可行地应用二维卷积的数据先决条件：输入必须具有形状(*width*, *height*, *depth*)，像素必须彼此具有空间关系。如果这个后者的要求没有得到满足，那么应用卷积就没有意义。卷积将邻近的像素组合在一起，因此标准二维卷积的任何输入都应该以某种方式排列，使得值之间存在空间关系。
- en: 'Just like we *could* directly pass an unordered tabular dataset into a series
    of one-dimensional convolutions, we *could* pass an unordered tabular dataset
    reshaped into form (*width*, *height*, *depth*) through a series of two-dimensional
    convolutions:'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们*可以*直接将无序的表格数据集传递给一系列一维卷积一样，我们*可以*将重塑为形式(*width*, *height*, *depth*)的无序表格数据集传递给一系列二维卷积：
- en: '![$$ \left[a,b,c,d,e,f,g,h,i\right]\to \left[a\ b\ c\ d\ e\ f\ g\ h\ i\ \right]
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equai.png)'
  id: totrans-736
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left[a,b,c,d,e,f,g,h,i\right]\to \left[a\ b\ c\ d\ e\ f\ g\ h\ i\ \right]
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equai.png)'
- en: 'However, it’s not going to work well because this raw dataset doesn’t fulfill
    the data prerequisite for two-dimensional convolutions: there is no contiguous
    semantics; the same data could be reshaped/expressed in a completely different
    ordering like such:'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不奏效，因为这个原始数据集并不满足二维卷积的数据先决条件：没有连续的语义；相同的数据可以重新排列/表达为完全不同的顺序，如下所示：
- en: '![$$ \left[a,b,c,d,e,f,g,h,i\right]\to \left[b\ g\ a\ d\ h\ e\ c\ f\ i\ \right]
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equaj.png)'
  id: totrans-738
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left[a,b,c,d,e,f,g,h,i\right]\to \left[b\ g\ a\ d\ h\ e\ c\ f\ i\ \right]
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equaj.png)'
- en: This sort of arbitrariness of contiguous organization indicates that data does
    not possess contiguous semantics in its raw form.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 这种连续组织的不确定性表明，数据在其原始形式中不具有连续的语义。
- en: However, we can *imagine* that for every raw tabular input *x*, there exists
    an image representation *p* that contains the same information but has the crucial
    property of *contiguous semantics* – that is, each data point (pixel) is somehow
    related to spatially neighboring data points (adjacent pixels). As previously
    asserted, if both *x* and *p* exist, then there must be some mapping *x* → *p*
    that we can task the neural network to discover and approximate.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们可以*想象*，对于每个原始的表格输入*x*，都存在一个包含相同信息但具有关键属性*连续语义*的图像表示*p*——也就是说，每个数据点（像素）以某种方式与空间邻近的数据点（相邻像素）相关。正如之前所断言的，如果*x*和*p*都存在，那么就必须存在某种映射*x* → *p*，我们可以要求神经网络发现并近似。
- en: Many successful and sophisticated convolutional neural network architectures
    exist that take an input in image form. Some of these have been discussed previously
    in this chapter, like Inception and EfficientNet. When we obtain another neural
    “subnetwork” that can learn the crucial mapping *x* → *p*, we can train the CNN
    architecture directly on the “image representation” *p* (Figure [4-78](#Fig78)).
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 存在许多成功且复杂的卷积神经网络架构，它们以图像形式接受输入。其中一些在本章中已讨论过，如Inception和EfficientNet。当我们获得另一个可以学习关键映射
    *x* → *p* 的神经“子网络”时，我们可以在“图像表示” *p* 上直接训练CNN架构（图 [4-78](#Fig78)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig78_HTML.png)'
  id: totrans-742
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig78_HTML.png)'
- en: C N N model for tabular data depicts a network of unordered 1-D representation
    x, ordered 2-D representation p, mapper N N and 2D-C N N model leading to predictions.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 表格数据的CNN模型描述了一个无序的1-D表示x、有序的2-D表示p、映射器NN和2D-CNN模型，最终用于预测。
- en: Figure 4-78
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-78
- en: Blueprint for applying standard two-dimensional CNNs to tabular data using a
    “mapper” from unordered 1D representation to ordered 2D representation
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 使用“mapper”从无序1D表示到有序2D表示应用标准二维CNN于表格数据的蓝图
- en: Like in the previous section, we can use “vanilla soft ordering” simply by stacking
    several fully connected layers together, reshaping the produced vector into an
    image form, and passing the formed image into a standard convolutional neural
    network (Listing [4-59](#PC60)).
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 与上一节类似，我们可以通过简单地堆叠几个全连接层来使用“vanilla soft ordering”，将生成的向量重塑成图像形式，然后将形成的图像传递给标准的卷积神经网络（代码列表
    [4-59](#PC60)）。
- en: '[PRE59]'
  id: totrans-747
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: However, in many cases it’s difficult to learn the crucial mapping from unordered
    representation *x* to ordered representation *p*, especially when *p* is two-dimensional
    (although it’s generally easy to set up and thus worth a try). The task may be
    too complex to feasibly learn with the “vanilla” soft ordering approach. In these
    cases, it may be more successful to use human-guided machine learning mappings
    from *x* → *p* – that is, mappings that employ machine learning techniques like
    Principal Component Analysis within a human-built pipeline/framework but do not
    use generic fully connected layers to approximate the mapping.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在许多情况下，学习从无序表示 *x* 到有序表示 *p* 的关键映射可能很困难，尤其是当 *p* 是二维的时候（尽管通常很容易设置，因此值得一试）。这项任务可能过于复杂，无法使用“vanilla”软排序方法有效地学习。在这些情况下，使用从
    *x* → *p* 的人类引导机器学习映射可能更成功——即，在人类构建的管道/框架中使用机器学习技术（如主成分分析）进行映射，但不使用通用的全连接层来近似映射。
- en: 'We will cover two papers that propose similar novel methods to transform tabular
    data into an image for the application of conventional convolutional neural networks:
    DeepInsight and IGTD (Image Generation for Tabular Data). These are not the only
    works in the space; for additional reading, consult the following works as examples:'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将介绍两篇提出类似新颖方法将表格数据转换为图像以应用于传统卷积神经网络的论文：DeepInsight 和 IGTD（表格数据图像生成）。这些并不是该领域唯一的成果；对于更多阅读材料，请参考以下作品作为示例：
- en: Bazgir, O., Zhang, R., Dhruba, S.R., Rahman, R., Ghosh, S., & Pal, R. (2020).
    Representation of features as images with neighborhood dependencies for compatibility
    with convolutional neural networks. *Nature Communications, 11*.
  id: totrans-750
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bazgir, O., Zhang, R., Dhruba, S.R., Rahman, R., Ghosh, S., & Pal, R. (2020).
    Representation of features as images with neighborhood dependencies for compatibility
    with convolutional neural networks. *《自然通讯》第11卷*.
- en: 'Ma, S., & Zhang, Z. (2018). OmicsMapNet: Transforming omics data to take advantage
    of Deep Convolutional Neural Network for discovery. *ArXiv, abs/1804.05283*.'
  id: totrans-751
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Ma, S., & Zhang, Z. (2018). OmicsMapNet: Transforming omics data to take advantage
    of Deep Convolutional Neural Network for discovery. *《ArXiv》abs/1804.05283*.'
- en: Moreover, it should be noted that work in this space tends to be almost always
    applied to medical, biological, or physics problems, because convolutions really
    only make sense on homogenous-scale, standardized features – like hundreds of
    gene features. This does not necessarily bar application to other contexts, but
    note that such applications may require the artificial insertion of a reordering
    component (like several dense layers) before convolutions to help support automatic
    transformation into said per-pixel homogeneity.
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，值得注意的是，该领域的工作几乎总是应用于医学、生物学或物理学问题，因为卷积仅在同质尺度、标准化的特征上才有意义——例如数百个基因特征。这并不一定阻止其在其他上下文中的应用，但请注意，此类应用可能需要在卷积之前人工插入重新排序组件（如几个密集层）以帮助支持自动转换为所述每像素同质性。
- en: DeepInsight
  id: totrans-753
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: DeepInsight
- en: 'Alok Sharma, Edwin Vans, Daichi Schigemizu, Keith A. Boroevich, and Tatsuhiko
    Tsunoda describe such an *x* → *p* mapping in the 2019 paper “DeepInsight: A methodology
    to transform a non-image data to an image for convolution neural network architecture.”^([11](#Fn11))
    The DeepInsight method is a pipeline to transform structured/tabular data (this
    does not necessarily exclude sequential or text-based data, as long as it is framed
    in a structured data format) into image form data, which a standard convolutional
    neural network can be trained on.'
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: Alok Sharma、Edwin Vans、Daichi Schigemizu、Keith A. Boroevich和Tatsuhiko Tsunoda在2019年的论文“DeepInsight：一种将非图像数据转换为卷积神经网络架构图像的方法”中描述了这样的*x* → *p*映射^([11](#Fn11))。DeepInsight方法是一个将结构化/表格数据（这并不一定排除序列或基于文本的数据，只要它是以结构化数据格式呈现的）转换为图像形式数据的管道，这种数据可以用于训练标准的卷积神经网络。
- en: The first step of DeepInsight is to acquire a feature matrix that is used to
    map individual features in structured data to spatial coordinates in the corresponding
    image. This feature density matrix is used as a “template” to generate individual
    images for each individual vector. Each feature is associated with a pixel in
    the “template” matrix. This is essentially learning the optimal “coordinate” correspondence
    to a feature in the structured dataset.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight的第一步是获取一个特征矩阵，用于将结构化数据中的单个特征映射到相应图像中的空间坐标。这个特征密度矩阵被用作“模板”，以生成每个向量的单个图像。每个特征都与“模板”矩阵中的一个像素相关联。这本质上是在学习结构化数据集中特征的最佳“坐标”对应关系。
- en: 'Consider the following example optimal translation of nine features into a
    4 × 4 template matrix. This scheme will produce 4 × 4 “images”:'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下将九个特征最优转换为4×4模板矩阵的示例。此方案将产生4×4“图像”：
- en: '![$$ \left[a\ b\ c\ d\ e\ f\ g\ h\ i\ \right]\to \left[a--c\kern0.5em b\ h-e\kern0.5em
    d\ e-f\kern0.5em i\ g--\kern0.5em \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equak.png)'
  id: totrans-757
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left[a\ b\ c\ d\ e\ f\ g\ h\ i\ \right]\to \left[a--c\kern0.5em b\ h-e\kern0.5em
    d\ e-f\kern0.5em i\ g--\kern0.5em \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equak.png)'
- en: This association is performed via a clever trick in which the data is *transposed*
    and used in dimensionality reduction via methods like kernel-PCA or t-distributed
    Stochastic Neighbor Embedding (t-SNE) (recall from Chapter [2](525591_1_En_2_Chapter.xhtml)).
    Traditionally, in a dataset of *n* samples and *d* features, dimensionality reduction
    to two spatial dimensions yields a dataset of *n* samples and two features. However,
    if we apply dimensionality reduction to the *transpose* of such a dataset – that
    is, we treat each of the *d* features as a sample and each of the *n* samples
    as a feature – this yields a reduced dataset with *d* samples and two features.
    Thus, each of the *d* features has been mapped to a two-dimensional point in the
    “template” matrix.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 这种关联是通过一种巧妙的方法实现的，即通过数据转置并使用核PCA或t分布随机邻域嵌入（t-SNE）等方法进行降维（回忆第[2](525591_1_En_2_Chapter.xhtml)章）。传统上，在包含*n*个样本和*d*个特征的样本集中，降维到两个空间维度会产生一个包含*n*个样本和两个特征的样本集。然而，如果我们对这样一个数据集的转置应用降维——也就是说，我们将每个*d*个特征视为一个样本，每个*n*个样本视为一个特征——这将产生一个包含*d*个样本和两个特征的降维数据集。因此，每个*d*个特征都被映射到“模板”矩阵中的二维点上。
- en: Using a transformation method like kernel-PCA and t-SNE that preserves local
    relationships, we can map features that behave similarly to one another to physically
    closer locations in the feature matrix (Figure [4-79](#Fig79)). This allows similar
    features in the generated images to be processed more efficiently by convolutions.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 使用像核PCA和t-SNE这样的保持局部关系的变换方法，我们可以将行为相似的特征映射到特征矩阵中物理上更近的位置（图[4-79](#Fig79)）。这使得生成的图像中的相似特征可以通过卷积更有效地处理。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig79_HTML.png)'
  id: totrans-760
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig79_HTML.png)'
- en: An image of the conversion of x feature vector having features or gene expression
    values of g1 to g-d to M feature matrix of g3, g1, g-d, g6, and g7.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 一个将具有g1到g-d特征或基因表达值的x特征向量转换为g3、g1、g-d、g6和g7的M特征矩阵的转换图像。
- en: Figure 4-79
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-79
- en: Visualization of mapping features in a tabular dataset to pixel coordinates
    in an ordered 2D representation (the template matrix) using the DeepInsight method.
    From Sharma et al.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DeepInsight方法将表格数据集中的特征映射到有序2D表示（模板矩阵）中的像素坐标的可视化。来自Sharma等人。
- en: Once the “template” feature matrix has been established, we can create an image
    for an input vector by establishing a point in the image corresponding to the
    location allocated for that specific feature (Figure [4-80](#Fig80)). (You can
    observe from this that DeepInsight is designed for high-dimensional data; a high
    number of features are needed to populate the image since each point in the image
    is one feature.) In order to prevent redundancy in image representation, the Convex
    Hull Algorithm is utilized to select the smallest rectangle consisting of all
    the data, cropping out unnecessary blank sides. The data is correspondingly rotated,
    and the space is mapped into pixel, image-based format, which can then be passed
    through a standard convolutional neural network.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立了“模板”特征矩阵，我们就可以通过在图像中为该特定特征分配的位置建立点来为输入向量创建一个图像（见图[4-80](#Fig80)）。（你可以从这个图中观察到DeepInsight是为高维数据设计的；需要大量的特征来填充图像，因为图像中的每个点都是一个特征。）为了防止图像表示中的冗余，使用了凸包算法来选择包含所有数据的最小矩形，裁剪掉不必要的空白边缘。数据相应地旋转，并将空间映射到基于像素的图像格式，然后可以通过标准的卷积神经网络传递。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig80_HTML.png)'
  id: totrans-765
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig80_HTML.png)'
- en: 'Flowchart reads: Features or gene expression values g1 to g-d; scatter plot
    of sample space; convex hull algorithm; scatter plot of smallest rectangle consisting
    all data; rotation; framing and mapping in pixels; pixel coordinates.'
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图说明：特征或基因表达值g1到g-d；样本空间的散点图；凸包算法；包含所有数据的最大矩形散点图；旋转；像素坐标中的框架和映射。
- en: Figure 4-80
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-80
- en: 'The DeepInsight pipeline: mapping vectors to pixel coordinates. From the DeepInsight
    paper (see footnote #2). From Sharma et al.'
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight管道：将向量映射到像素坐标。来自DeepInsight论文（见脚注#2）。来自Sharma等人。
- en: 'The resulting DeepInsight pipeline performs very well on both genetic datasets,
    which the model was originally designed for, and other high-dimensional data contexts.
    Sharma et al. evaluate the method on five benchmark datasets: RNA-seq, a biological
    RNA sequence dataset from the NIH TCGA dataset; a subset from the TIMIT corpus,
    a speech dataset; the Relathe dataset, derived from news documents; the Madelon
    dataset, which is a synthetically constructed binary classification problem; and
    ringnorm-DELVE, another synthetically constructed binary classification problem.
    These five datasets represent a wide array of problem contexts and data spaces;
    the DeepInsight method performs much better than other algorithms that have become
    successful staple methods in modeling structured/tabular datasets (Table [4-4](#Tab4)).
    See Figure [4-81](#Fig81) for a visualization on how DeepInsight generates meaningful
    visual representations across these datasets.'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示，DeepInsight管道在遗传数据集上表现良好，这些数据集是模型最初设计的，并且在其他高维数据环境中也表现良好。Sharma等人对五个基准数据集进行了方法评估：RNA-seq，来自NIH
    TCGA数据集的生物RNA序列数据集；TIMIT语料库的子集，一个语音数据集；Relathe数据集，来自新闻文档；Madelon数据集，这是一个合成的二元分类问题；以及ringnorm-DELVE，另一个合成的二元分类问题。这五个数据集代表了一系列的问题环境和数据空间；DeepInsight方法的表现优于其他已成为建模结构化/表格数据集成功标准方法的算法（表[4-4](#Tab4)）。见图[4-81](#Fig81)以了解DeepInsight如何在这些数据集中生成有意义的可视化表示。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig81_HTML.jpg)'
  id: totrans-770
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig81_HTML.jpg)'
- en: Images compare the results of mapping and filtering of the scatter plots for
    cancer samples 1 and 2, text samples 1 and 2, and vowel samples 1 and 2.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 图像比较了癌症样本1和2、文本样本1和2以及元音样本1和2的散点图映射和过滤的结果。
- en: Figure 4-81
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-81
- en: Visualization of image patterns mapped by DeepInsight. Differences in samples
    from Cancer, Text, and Vowel datasets are shown as the small patches in the middle
    columns. These differences are extracted by convolutional filters to perform more
    effective classification than another method. From Sharma et al.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight映射的图像模式可视化。癌症、文本和元音数据集样本之间的差异显示在中间列的小块中。这些差异通过卷积滤波器提取，以实现比另一种方法更有效的分类。来自Sharma等人。
- en: Table 4-4
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 表4-4
- en: Performance of DeepInsight against other common methods for structured data
    with various datasets. From Sharma et al
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight与其他常见结构化数据方法的性能对比，使用各种数据集。来自Sharma等人。
- en: '| Dataset | Decision Tree | AdaBoost | Random Forest | DeepInsight |'
  id: totrans-776
  prefs: []
  type: TYPE_TB
  zh: '| 数据集 | 决策树 | AdaBoost | 随机森林 | DeepInsight |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-777
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- |'
- en: '| RNA-seq | 85% | 84% | 96% | 99% |'
  id: totrans-778
  prefs: []
  type: TYPE_TB
  zh: '| RNA-seq | 85% | 84% | 96% | 99% |'
- en: '| Vowels | 75% | 45% | 90% | 97% |'
  id: totrans-779
  prefs: []
  type: TYPE_TB
  zh: '| Vowels | 75% | 45% | 90% | 97% |'
- en: '| Text | 87% | 85% | 90% | 92% |'
  id: totrans-780
  prefs: []
  type: TYPE_TB
  zh: '| Text | 87% | 85% | 90% | 92% |'
- en: '| Madelon | 65% | 60% | 62% | 88% |'
  id: totrans-781
  prefs: []
  type: TYPE_TB
  zh: '| Madelon | 65% | 60% | 62% | 88% |'
- en: '| Ringnorm-DELVE | 90% | 93% | 94% | 98% |'
  id: totrans-782
  prefs: []
  type: TYPE_TB
  zh: '| Ringnorm-DELVE | 90% | 93% | 94% | 98% |'
- en: 'We can reflect on key advantages of DeepInsight:'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以反思DeepInsight的关键优势：
- en: CNNs (theoretically and generally in practice) do not require any additional
    feature extraction techniques, which are often used for structured data. They
    automatically derive advanced and information-rich features from the raw input
    data without need for preprocessing via a series of convolutions and pooling.
    The nonlinear architecture of the model used to process the image aids in the
    development of advanced, rich representations.
  id: totrans-784
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CNNs（在理论上以及在实践中通常）不需要任何额外的特征提取技术，这些技术通常用于结构化数据。它们通过一系列卷积和池化自动从原始输入数据中推导出高级且信息丰富的特征，无需预处理。用于处理图像的模型的非线性架构有助于开发高级且丰富的表示。
- en: Convolutions process image data locally in a restricted subarea. This allows
    for greater network depth with a relatively small quantity of parameters, which
    spurs healthy network understanding and generalization. Such performance would
    be more difficult if using a fully connected network, in which building more depth
    to increase modeling power leads to a faster increase in parameters, risking overfitting,
    which neural networks trained on structured data are especially prone to.
  id: totrans-785
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积在局部子区域内处理图像数据。这允许网络具有更大的深度，同时参数量相对较小，这促进了网络的健康理解和泛化。如果使用全连接网络，这种性能会更难实现，因为增加模型的深度以增强建模能力会导致参数的快速增加，从而增加过拟合的风险，而基于结构化数据训练的神经网络尤其容易过拟合。
- en: The unique structure of the CNN allows it to run very efficiently, given recent
    hardware advancements like GPU utilization.
  id: totrans-786
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CNN的独特结构允许它在利用最近的硬件进步（如GPU利用）的情况下非常高效地运行。
- en: CNNs and the DeepInsight pipeline broadly are much more customizable/optimizable
    than standard algorithms like tree-based methods that have traditionally shown
    success in modeling structured data. Besides adjusting hyperparameters like the
    model architecture, the vector-to-template matrix mapping, and the learning rate,
    among countless others, one can also easily use image augmentation methods to
    generate “new” image data. Such data augmentation is difficult to accomplish with
    tabular data because the structured format does not contain an inherent robustness
    due to the low dimensionality of its representation space relative to images;
    that is, while rotating an image should not affect the phenomenon it represents,
    altering structured data likely will.
  id: totrans-787
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CNNs和DeepInsight管道在可定制性和可优化性方面比传统的基于树的算法（这些算法在建模结构化数据方面传统上取得了成功）要强得多。除了调整模型架构、向量到模板矩阵映射和学习率等超参数之外，还可以轻松使用图像增强方法来生成“新”图像数据。这种数据增强在表格数据中难以实现，因为与图像相比，其表示空间的低维性不包含固有的鲁棒性；也就是说，旋转图像不应影响其代表的现象，而改变结构化数据可能会。
- en: In practice, DeepInsight should be a contributing member in an ensemble of other
    decision-making models. Combining the locality-specific nature of DeepInsight
    with the more global approach of other modeling methods will likely yield a more
    informed predictive ensemble.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，DeepInsight应该是其他决策模型集合中的一个贡献成员。将DeepInsight的局部特性与其他建模方法的更全局方法相结合，可能会产生一个更明智的预测集合。
- en: Sharma et al. have provided prepackaged code to use DeepInsight in Python, which
    can be installed from the GitHub repository (Listing [4-60](#PC61)).
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: Sharma等人提供了预包装的代码，用于在Python中使用DeepInsight，该代码可以从GitHub仓库（列表[4-60](#PC61)）中安装。
- en: '[PRE60]'
  id: totrans-790
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: The dataset we will use is the Mice Protein Expression dataset from the infamous
    University of California Irvine Machine Learning Repository, which is a classification
    dataset with 1080 instances and 80 features modeling the expression of 77 proteins
    in the cerebral cortex of mice exposed to contextual fear conditioning. A cleaned
    version of the dataset is available in the source code for this book to be downloaded.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用的数据集是来自臭名昭著的加州大学欧文分校机器学习库的“小鼠蛋白质表达数据集”，这是一个包含1080个实例和80个特征的分类数据集，用于模拟受到情境恐惧条件刺激的小鼠大脑皮层中77种蛋白质的表达。该数据集的清洗版本可在本书的源代码中下载。
- en: Assuming that the data has been loaded as a Pandas DataFrame in the variable
    `data`, the first step is to separate into training and testing datasets, a standard
    procedure in machine learning (Listing [4-61](#PC62)). We’ll also need to convert
    the labels to one-hot format, which in their original organization are integers
    corresponding to a class. This can be accomplished easily using `keras.util`’s
    `to_categorical` function.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 假设数据已作为 Pandas DataFrame 载入变量 `data`，第一步是将数据分为训练集和测试集，这是机器学习中的标准程序（列表 [4-61](#PC62)）。我们还需要将标签转换为
    one-hot 格式，在它们的原始组织结构中是表示类别的整数。这可以通过使用 `keras.util` 的 `to_categorical` 函数轻松完成。
- en: '[PRE61]'
  id: totrans-793
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: We will need to use the `LogScaler` object from the DeepInsight library to scale
    the data between 0 and 1 using the L2 norm (Listing [4-62](#PC63)). We transform
    both the training dataset and the testing dataset, fitting the scaler on the training
    dataset only. All new data used for prediction by the DeepInsight model should
    pass through this scaler first.
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要使用 DeepInsight 库中的 `LogScaler` 对象来使用 L2 范数将数据缩放到 0 到 1 之间（列表 [4-62](#PC63)）。我们转换训练集和测试集，仅在训练集上拟合缩放器。所有用于
    DeepInsight 模型预测的新数据都应该首先通过这个缩放器。
- en: '[PRE62]'
  id: totrans-795
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: The `ImageTransformer` object performs the image transformation by first generating
    the “template” matrix via a dimensionality reduction method passed into `feature_extractor`,
    which accepts either `'tsne'`, `'pca'`, or `'kpca'`. This method is used to determine
    a mapping of features in the input vector to an image of `pixels` dimensions.
    We can instantiate an ImageTransformer with the kernel-PCA dimensionality reduction
    method to generate 32-by-32 images (`feature_extractor='kpca', pixels=32`) (Listing
    [4-63](#PC64)).
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: '`ImageTransformer` 对象通过首先通过传递给 `feature_extractor` 的降维方法生成“模板”矩阵来执行图像转换，`feature_extractor`
    接受 `''tsne''`、`''pca''` 或 `''kpca''`。此方法用于确定输入向量中特征到 `pixels` 维度图像的映射。我们可以使用核主成分分析（kernel-PCA）降维方法实例化一个
    ImageTransformer 来生成 32x32 的图像（`feature_extractor=''kpca'', pixels=32`）（列表 [4-63](#PC64)）。'
- en: '[PRE63]'
  id: totrans-797
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: Kernel-PCA is used rather than t-SNE because of the relatively low dimensionality
    and quantity of the data. PCA is not employed because its linearity limits the
    nuance it captures. An image length of 32 pixels is chosen as a balance between
    making the generated images too sparse (too high an image length) and too small
    (too small an image length) to meaningfully and accurately represent spatial relationships
    between features. As image size decreases, the conception of distance in the DeepInsight
    pipeline – that is, the placement of features as pixels farther or closer to one
    another dependent on their similarity – becomes more approximated to the point
    of being arbitrary.
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据相对低维和数量较少，我们使用核-PCA 而不是 t-SNE。由于 PCA 的线性限制其捕捉的细微差别，因此没有使用 PCA。选择 32 像素的图像长度是为了在生成的图像过于稀疏（图像长度过高）和过于小（图像长度过低）以有意义和准确地表示特征之间的空间关系之间取得平衡。随着图像大小的减小，DeepInsight
    管道中距离的概念——即根据它们的相似性将特征放置得更远或更近作为像素——变得更加近似，以至于变得任意。
- en: We can visualize the generated images of the ImageTransformer easily using `matplotlib.pyplot.imshow()`
    to get a feel for how the dimensionality reduction method and image size influence
    the arrangement of the features and the likelihood of success (Figure [4-82](#Fig82)).
    The differences between images are subtle, but the distinguishing factors are
    identified and amplified by a series of convolutional operations. Note that the
    32-by-32-pixel space allows for a clustering of similar features and for less
    related features to be distanced farther away in a corner.
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用 `matplotlib.pyplot.imshow()` 函数轻松可视化 ImageTransformer 生成的图像，以了解降维方法和图像大小如何影响特征排列和成功的可能性（图
    [4-82](#Fig82)）。图像之间的差异微妙，但通过一系列卷积操作识别并放大了区分因素。请注意，32x32像素的空间允许相似特征进行聚类，并将不太相关的特征在角落处距离得更远。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig82_HTML.jpg)'
  id: totrans-800
  prefs: []
  type: TYPE_IMG
  zh: '![图 4-82](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig82_HTML.jpg)'
- en: Four images with different patterns obtained from a specific, non-image dataset.
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 从特定的非图像数据集中获取的具有不同模式的四幅图像。
- en: Figure 4-82
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-82
- en: Four example images generated from our Mice Protein Expression dataset using
    the DeepInsight method
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 DeepInsight 方法从我们的 Mice Protein Expression 数据集中生成的四个示例图像
- en: 'We’ll build an architecture in a similar style to the two-branch cell design
    used in the DeepInsight paper, with three key adaptations: Inception v3–style
    factorization/expansion of filters, dropout in cells, and a longer fully connected
    component (Listing [4-64](#PC65), Figure [4-83](#Fig83)). These aid to develop
    more specific filters with smaller areas to better parse densely packed features,
    further aid generalization by preventing overfitting, and better process derived
    features, respectively. One branch processes images with a kernel of size (2,2),
    and the other uses a kernel of size (5,5) (with additional factorization, e.g.,
    5 × 1 and 1 × 5).'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将构建一个类似于DeepInsight论文中使用的双分支细胞设计的架构，并进行三个关键改进：Inception v3风格的滤波器分解/扩展、细胞中的dropout以及更长的全连接组件（列表[4-64](#PC65)，图[4-83](#Fig83)）。这些改进有助于开发具有较小区域的更具体滤波器，以更好地解析密集特征，通过防止过拟合进一步帮助泛化，并更好地处理派生特征。一个分支使用大小为(2,2)的核处理图像，另一个分支使用大小为(5,5)的核（例如，额外的分解，如5×1和1×5）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig83_HTML.png)'
  id: totrans-805
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig83_HTML.png)'
- en: Flowchart of None comma values in input-output of input 5 of input layer, conv
    2 d, batch normalization, activation, max pooling, dropout, concatenate, global
    average pooling 2 d, and dense.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 输入层5的输入输出中无逗号值的流程图，包括卷积2D、批量归一化、激活、最大池化、dropout、连接、全局平均池化2D和密集层。
- en: Figure 4-83
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-83
- en: Visualization of the DeepInsight model architecture
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight模型架构的可视化
- en: '[PRE64]'
  id: totrans-809
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: The model, when compiled and trained on the data for several dozen epochs, yields
    almost perfect training accuracy *and* validation accuracy (Listing [4-65](#PC66)).
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 当在数据上编译和训练数十个epoch后，该模型几乎达到完美的训练准确率和验证准确率（列表[4-65](#PC66)）。
- en: '[PRE65]'
  id: totrans-811
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: DeepInsight can also be modified in other ways. Because DeepInsight tends to
    produce sparse mappings – that is, most pixels in the image are empty and not
    associated with features – one recently proposed technique that has shown to be
    exceptionally successful is to blur the images after they have been generated.^([12](#Fn12))
    This can help enhance the effects of localization by precomputing interactions/interpolations
    between adjacent pixels and helps spread the “influence” of filled pixels to nearby
    empty pixels.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight也可以通过其他方式进行修改。因为DeepInsight倾向于产生稀疏映射——也就是说，图像中的大多数像素都是空的，并且没有与特征相关联——最近提出的一种技术显示特别成功，即在生成图像后对其进行模糊处理.^([12](#Fn12))
    这可以通过预先计算相邻像素之间的交互/插值来增强定位效果，并有助于将填充像素的“影响”传播到附近的空像素。
- en: DeepInsight has successfully been applied to many other domains and is one example
    of a successful *x* → *q* 1D unordered to 2D ordered mapping.
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: DeepInsight已成功应用于许多其他领域，是成功将*x* → *q* 1D无序映射到2D有序映射的一个例子。
- en: IGTD (Image Generation for Tabular Data)
  id: totrans-814
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: IGTD（表格数据的图像生成）
- en: Introduced by Yitan Zhu, Thomas Brettin, Fangfang Xia, Alexander Partin, Maulik
    Shukla, Hyunseung Yoo, Yvonne A. Evrard, James H. Doroshow, and Rick L.Stevens
    in the paper “Converting tabular data into images for deep learning with convolutional
    neural networks,”^([13](#Fn13)) the IGTD (Image Generation for Tabular Data) is
    another method to transform standard tabular data into image form.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 由Yitan Zhu、Thomas Brettin、Fangfang Xia、Alexander Partin、Maulik Shukla、Hyunseung
    Yoo、Yvonne A. Evrard、James H. Doroshow和Rick L.Stevens在论文“使用卷积神经网络将表格数据转换为图像进行深度学习”中提出，IGTD（表格数据的图像生成）是将标准表格数据转换为图像形式的另一种方法.^([13](#Fn13))。
- en: The IGTD paper was written after the DeepInsight paper. The authors argue that
    the primary advantage of IGTD over the DeepInsight method is decreased sparsity
    (i.e., improved compactness); a large number of pixels are left blank in images
    generated by DeepInsight and may be comparatively inefficient to train.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: IGTD论文是在DeepInsight论文之后撰写的。作者认为，IGTD相对于DeepInsight方法的主要优势是降低了稀疏度（即提高了紧凑性）；DeepInsight生成的图像中留有许多空白像素，可能相对效率较低。
- en: Let *c* represent the number of columns in a dataset and *X* represent the dataset
    matrix. Our objective is to transform each of the *c* features in *X* into an
    image we will denote *I*, which is of shape *n* × *n* (we will assume it is square
    for simplification here, but the method also generalizes to rectangular images).
    To ensure feature density, we want every feature to be mapped to a pixel and every
    pixel to a feature – there are no redundant pixels. As such, *n*² = *c*; the number
    of pixels in the image is equivalent to the number of features.^([14](#Fn14))
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 让 *c* 代表数据集中的列数，*X* 代表数据集矩阵。我们的目标是把 *X* 中的每个 *c* 个特征转换成我们将表示为 *I* 的图像，其形状为 *n*
    × *n*（我们将假设它是正方形以简化，但该方法也推广到矩形图像）。为了确保特征密度，我们希望每个特征都映射到一个像素，每个像素都映射到一个特征 – 没有冗余像素。因此，*n*² = *c*；图像中的像素数等于特征数.^([14](#Fn14))
- en: We can generate a matrix of shape *c* × *c* denoted *R*. *R*[*i*, *j*] – that
    is, the *i*th row and *j*th column of *R* – is the Euclidean distance between
    the *i*th and *j*th features of the dataset *X*. (Other distance metrics can also
    be used; the point is to measure the similarity between feature pairs.) This structure
    systematically organizes the similarity between every feature pair. Figure [4-84](#Fig84)
    visualizes such a matrix on a 2,500-feature (*c* = 2500) gene expression dataset.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以生成一个形状为 *c* × *c* 的矩阵，记为 *R*。*R*[*i*, *j*] – 即 *R* 的第 *i* 行和第 *j* 列 – 是数据集
    *X* 中第 *i* 个和第 *j* 个特征的欧几里得距离。（也可以使用其他距离度量；关键是测量特征对之间的相似性。）这种结构系统地组织了每对特征之间的相似性。图
    [4-84](#Fig84) 在一个 2,500 个特征 (*c* = 2500) 的基因表达数据集上可视化了这样的矩阵。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig84_HTML.png)'
  id: totrans-819
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig84_HTML.png)'
- en: R matrix with 0 to 2,000 along the x and y axes.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: '*R* 矩阵的 x 轴和 y 轴从 0 到 2,000。'
- en: Figure 4-84
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-84
- en: Visualization of the *R* matrix. From Zhu et al.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: '*R* 矩阵的可视化。来自朱等人。'
- en: Let *Q* also be a matrix of shape *c* × *c*. This represents the pairwise spatial
    distance between each pixel of *I* – all *n*² = *c* of them. The distance between
    the pixel at (3, 9) and the pixel at (6, 13) is ![$$ \sqrt{3^2+{4}^2}=5 $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq5.png).
    The main diagonal of *Q* is all zeros, since this represents the distance between
    a pixel and itself.
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 让 *Q* 也是一个形状为 *c* × *c* 的矩阵。这表示 *I* 中每个像素之间的成对空间距离 – 所有 *n*² = *c* 个像素。像素 (3,
    9) 和像素 (6, 13) 之间的距离是 ![$$ \sqrt{3^2+{4}^2}=5 $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq5.png)。*Q*
    的主对角线全为零，因为这表示像素与其自身的距离。
- en: Figure [4-85](#Fig85) demonstrates such a matrix on the same 2,500-feature gene
    expression dataset. Since *n* = 50, we observe a “mosaic” pattern in which small
    50-by-50 tiles are repeated (50 times in each dimension) due to the end-to-end
    concatenation/flattening of the pixels in *I*. The bottom-left and top-right corners
    are darkest, indicating that the 2,500th feature (which occupies the pixel at
    location (50,50)) is farthest from the 1st feature (which occupies the pixel at
    location (1,1)).
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-85](#Fig85) 在相同的 2,500 个特征基因表达数据集上展示了这样的矩阵。由于 *n* = 50，我们观察到一种“马赛克”模式，其中小的
    50×50 块重复（每个维度重复 50 次），这是由于 *I* 中像素的端到端连接/展平。左下角和右上角最暗，表明第 2,500 个特征（占据位置 (50,50)
    的像素）与第 1 个特征（占据位置 (1,1) 的像素）相距最远。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig85_HTML.jpg)'
  id: totrans-825
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig85_HTML.jpg)'
- en: Q matrix with 0 to 2,000 along the x and y axes.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: '*Q* 矩阵的 x 轴和 y 轴从 0 到 2,000。'
- en: Figure 4-85
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-85
- en: Visualization of the *Q* matrix. From Zhu et al.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: '*Q* 矩阵的可视化。来自朱等人。'
- en: 'Here is the clever part of the IGTD paradigm: we want to map the dataset to
    the image, so we find a way to directly map *R* – which contains the pairwise
    feature distances computed from the dataset – to *Q*, which contains the pairwise
    distances computed from the image.'
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 IGTD 范式中的巧妙之处：我们希望将数据集映射到图像上，所以我们找到了一种方法，直接将包含从数据集中计算出的成对特征距离的 *R* 映射到包含从图像中计算出的成对距离的
    *Q*。
- en: To do so, we rearrange the columns in *R*. The initial ordering of the columns
    was arbitrary, but we can arrange it such that the pairwise distances of the columns
    match the pairwise distances of the pixels. That is, we *calibrate the columns
    with the pixels such that more similar features are mapped to spatially closer
    pixels*.
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们重新排列 *R* 中的列。列的初始排序是任意的，但我们可以将其排列得使得列的成对距离与像素的成对距离相匹配。也就是说，我们*校准列与像素，使得更相似的特征映射到空间上更接近的像素*。
- en: 'We guide this process by attempting to minimize the error between a rearrangement
    of *R* and the pairwise pixel difference matrix *Q* for some distance metric (L1
    or L2) diff(*a*, *b*):'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过尝试最小化 *R* 的重新排列与某些距离度量（L1 或 L2）的成对像素差异矩阵 *Q* 之间的误差来引导这个过程。
- en: '![$$ err\left(R,Q\right)={\sum}_{i=1}c{\sum}_{j=1} cdiff\left( Ri,j, Qi,j\right)
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equal.png)'
  id: totrans-832
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equal.png)'
- en: 'For practical computation purposes, we only need to compute the difference
    between the bottom-left 90-degree “half-triangles” of *R* and *Q*, since both
    matrices are symmetrical across the major diagonal:'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 对于实际计算目的，我们只需要计算 *R* 和 *Q* 的左下角 90 度“半三角形”之间的差异，因为这两个矩阵在主对角线上是对称的：
- en: '![$$ err\left(R,Q\right)={\sum}_{i=2}^c{\sum}_{j=1}^{i-1} diff\left({R}_{i,j},{Q}_{i,j}\right)
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equam.png)'
  id: totrans-834
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equam.png)'
- en: Indeed, after optimally arranging the columns of *R* to minimize the error function,
    the resulting matrix appears very similar visually to *Q* (Figure [4-86](#Fig86)).
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，在将 *R* 的列优化排列以最小化误差函数后，得到的矩阵在视觉上与 *Q*（图 [4-86](#Fig86)）非常相似。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig86_HTML.jpg)'
  id: totrans-836
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig86_HTML.jpg)'
- en: Trans positioned R matrix with 0 to 2,000 along the x and y axes.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 沿 x 和 y 轴从 0 到 2,000 的 Trans positioned R 矩阵。
- en: Figure 4-86
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-86
- en: Visualization of the *R* matrix after rearrangement. From Zhu et al
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 重新排列后的 *R* 矩阵的可视化。来自 Zhu 等人
- en: Note that this calibration between *R* and *Q* has mapped every feature in the
    dataset *X* (from *R*) to every pixel in the image *I* (from *Q*).
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这种在 *R* 和 *Q* 之间的校准已经将数据集 *X*（来自 *R*）中的每个特征映射到图像 *I*（来自 *Q*）中的每个像素。
- en: The algorithm runs for several iterations and attempts different swap operations
    to minimize the error. The algorithm will not be described here but is viewable
    in the original paper.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 算法运行多次迭代，尝试不同的交换操作以最小化误差。算法的描述将不会在此处描述，但可以在原始论文中查看。
- en: This can be tricky to grasp, especially in high dimensions and symbolic abstraction.
    Let us demonstrate this logic on a small scale using a sample nine-feature dataset
    (Figure [4-87](#Fig87)).
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 这在高度维度和符号抽象中可能难以理解。让我们通过使用一个包含 9 个特征的样本数据集（图 [4-87](#Fig87)）来展示这个逻辑。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig87_HTML.png)'
  id: totrans-843
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig87_HTML.png)'
- en: 'The table of 3 sets of values for a, b, c, d, e, f, g, h, and i, as follows:
    1, 0, 3, 2, 5, 0, 4, 1, and 2\. 0, 4, 5, 5, 2, 4, 9, 1, and 1\. 4, 3, 2, 4, 5,
    5, 5, 2, and 3.'
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: a, b, c, d, e, f, g, h, 和 i 的 3 组值表，如下：1, 0, 3, 2, 5, 0, 4, 1, 和 2。0, 4, 5,
    5, 2, 4, 9, 1, 和 1。4, 3, 2, 4, 5, 5, 5, 2, 和 3。
- en: Figure 4-87
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-87
- en: A sample dataset
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 一个样本数据集
- en: If we compute the distance between each of these features, we get the following
    pairwise distance matrix ***Q*** (Figure [4-88](#Fig88)).
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们计算这些特征之间的距离，我们得到以下成对距离矩阵 ***Q***（图 [4-88](#Fig88)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig88_HTML.png)'
  id: totrans-848
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig88_HTML.png)'
- en: A 9 by 9 matrix of a, b, c, d, e, f, g, h, and i depicts a value of 0 diagonally;
    values in other cells range between 1 and 10.
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由 a, b, c, d, e, f, g, h, 和 i 组成的 9x9 矩阵在主对角线上显示值为 0；其他单元格中的值介于 1 和 10 之间。
- en: Figure 4-88
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-88
- en: The pairwise feature distance matrix calculated across features using Euclidean
    distance
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 使用欧几里得距离计算特征间的成对特征距离矩阵
- en: Since *c* = 9, we have *n* = 3; we will have a 3 × 3 image. We can compute the
    pairwise pixel distances between each of the pixels to produce *R* (Figure [4-89](#Fig89)).
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 *c* = 9，我们得到 *n* = 3；我们将有一个 3x3 的图像。我们可以计算每个像素之间的成对像素距离以生成 *R*（图 [4-89](#Fig89)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig89_HTML.png)'
  id: totrans-853
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig89_HTML.png)'
- en: A 9 by 9 matrix of (1,1), (1,2), (1,3), (2,1), (2,2), (2,3), (3,1), (3,2), and
    (3,3) depicts a value of 0 diagonally; values in other cells range between 1 and
    3.
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由 (1,1), (1,2), (1,3), (2,1), (2,2), (2,3), (3,1), (3,2), 和 (3,3) 组成的 9x9
    矩阵在主对角线上显示值为 0；其他单元格中的值介于 1 和 3 之间。
- en: Figure 4-89
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-89
- en: The pairwise feature distance matrix calculated across pixels using Euclidean
    distance
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 使用欧几里得距离计算像素间的成对特征距离矩阵
- en: Now, we want to map *Q* to *R* by repeatedly swapping different features and
    finding the configuration that minimizes the difference between the two matrices.
    Figures [4-90](#Fig90) and [4-91](#Fig91) demonstrate how we might swap features
    `d` and `g`.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们希望通过反复交换不同的特征并找到最小化两个矩阵之间差异的配置来将 *Q* 映射到 *R*。图 [4-90](#Fig90) 和 [4-91](#Fig91)
    展示了如何交换特征 `d` 和 `g`。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig91_HTML.png)'
  id: totrans-858
  prefs: []
  type: TYPE_IMG
