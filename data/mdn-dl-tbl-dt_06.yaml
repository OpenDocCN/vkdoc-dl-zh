  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 将8x8均匀模糊核应用于图[4-7](#Fig7)中“图像”的结果
- en: '[PRE14]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Another operation is the sharpening effect, which makes edges and values contrast
    more sharply with one another (Listing [4-16](#PC16), Figure [4-12](#Fig12)).
    The kernel weights the center pixel very highly and the surrounding neighbors
    lowly; this has the effect of increasing the difference between adjacent pixels
    in the convolved feature:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个操作是锐化效果，它使边缘和值之间的对比更加鲜明（代码列表[4-16](#PC16)，图[4-12](#Fig12)）。核对中心像素赋予很高的权重，对周围的邻居赋予很低的权重；这会使得卷积特征中相邻像素之间的差异增加：
- en: '![$$ sharpening\ kernel=\left[0-1\ 0-1\ 5-1\ 0-1\ 0\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equq.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equq.png)'
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig12_HTML.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig12_HTML.png)'
- en: A heatmap of 0 to 9 on x and y axes and negative 2 to 3 vertical grayscale has
    a white plus sign of high values on a gradient background of low values.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在x和y轴上从0到9，以及从-2到3的垂直灰度上，有一个白色加号表示高值，背景是低值渐变。
- en: Figure 4-12
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-12
- en: Result of applying a convolution with the 3-by-3 sharpening kernel to the “image”
    in Figure [4-7](#Fig7)
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 将3x3锐化核应用于图[4-7](#Fig7)中“图像”的结果
- en: '[PRE15]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: There are many other kernels that can accomplish a wide variety of effects on
    image matrices. It’s a good exercise to play around with your own custom kernels
    and view the resulting convolved image.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多其他核可以完成对图像矩阵的广泛效果。自己尝试自定义核并查看卷积图像的结果是一个很好的练习。
- en: Consider the following ***pixel-by-pixel*** image of a dog, derived as such
    (Listing [4-17](#PC17), Figure [4-13](#Fig13)).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下***逐像素***的狗图像，如下所示（代码[4-17](#PC17)，图[4-13](#Fig13)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig13_HTML.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig13_HTML.png)'
- en: A black-and-white photo of a dog playing at the beach.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 一张海滩上玩耍的狗的黑白照片。
- en: Figure 4-13
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-13
- en: Sample image of a dog
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 狗的样本图像
- en: '[PRE16]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Let’s modify our `applyKernel` function to display the convolved matrix as an
    image rather than as a heatmap (Listing [4-18](#PC18)).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们修改我们的`applyKernel`函数，将卷积矩阵显示为图像而不是热图（代码[4-18](#PC18)）。
- en: '[PRE17]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Applying a 3-by-3 blurring kernel discussed before results in the following
    image (Listing [4-19](#PC19), Figure [4-14](#Fig14)).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 应用之前讨论过的3x3模糊核的结果如下（代码[4-19](#PC19)，图[4-14](#Fig14)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig14_HTML.jpg)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig14_HTML.jpg)'
- en: A black-and-white, unclear image of a dog.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 一张黑白、模糊的狗的图像。
- en: Figure 4-14
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-14
- en: Result of incorrectly applying a convolution with a 3-by-3 uniform blurring
    kernel to the sample dog image in Figure [4-13](#Fig13)
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 将3x3均匀模糊核错误地应用于图[4-13](#Fig13)中的样本狗图像的结果
- en: '[PRE18]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: That’s odd! What happened here?
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这很奇怪！这里发生了什么？
- en: Let’s plot the distribution of pixel values across the image (Listing [4-20](#PC20),
    Figure [4-15](#Fig15)).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制图像中像素值的分布（代码[4-20](#PC20)，图[4-15](#Fig15)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig15_HTML.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig15_HTML.png)'
- en: A bar graph of counts from 0 to 140,000 versus pixel values from 0 to 255\.
    A single bar of count 140,000 is at 255.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 一个从0到140,000的计数条形图，与从0到255的像素值相对应。一个计数值为140,000的条形在255处。
- en: Figure 4-15
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-15
- en: Distribution of pixel values after incorrectly applying a convolution with a
    3-by-3 uniform blurring kernel to the sample dog image in Figure [4-13](#Fig13)
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 将3x3均匀模糊核错误地应用于图[4-13](#Fig13)中的样本狗图像后的像素值分布
- en: '[PRE19]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: It seems that almost all the values in the image have been pushed up to 255\.
    This is because convolving the feature has the effect of changing the domain of
    possible values. If all nine values in a convolution region have value 255, then
    the convolved result is 255 ⋅ 9 = 2295 – which is way out of the valid domain
    for unsigned int-8 image pixel values. In these cases, `cv2.filter2D` caps the
    maximum value as 255\. In fact, the convolved result for any region with average
    value larger than 255/9 will be capped at 255.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来图像中的几乎所有值都被推到了255。这是因为卷积特征的效果是改变可能值的域。如果一个卷积区域的九个值都是255，那么卷积结果就是255×9=2295，这远远超出了无符号int-8图像像素值的有效域。在这些情况下，`cv2.filter2D`将最大值限制为255。实际上，任何平均值大于255/9的区域，其卷积结果都将被限制在255。
- en: Thus, we need to modify the kernel such that the domain of values in the convolved
    result does not extend beyond the original domain. We can solve this problem by
    defining the blur kernel as
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要修改核，使得卷积结果的值域不超出原始域。我们可以通过定义模糊核来解决此问题
- en: '![$$ 3\times 3\  uniform\ blurring\ kernel=\left[1/9\ 1/9\ 1/9\ 1/9\ 1/9\ 1/9\
    1/9\ 1/9\ 1/9\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equr.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![$$ 3\times 3\  uniform\ blurring\ kernel=\left[1/9\ 1/9\ 1/9\ 1/9\ 1/9\ 1/9\
    1/9\ 1/9\ 1/9\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equr.png)'
- en: Let *M* represent the maximum pixel value (in this context it is 255). The maximum
    result of applying this kernel across even a region in which all pixels are populated
    with *M*s is ![$$ 9\cdot \left(\frac{1}{9}\cdot M\right)=M $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq1.png).
    Thus, we preserve the scale of pixel values.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 用*M*表示最大像素值（在此上下文中为255）。即使在所有像素都填充了*M*的区域中，应用此核的最大结果为 ![$$ 9\cdot \left(\frac{1}{9}\cdot
    M\right)=M $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq1.png)。因此，我们保留了像素值的比例。
- en: After applying this modified kernel, we see that the resulting convolved distribution
    is very similar to that of the original distribution and remains within a valid
    range (Figures [4-16](#Fig16) and [4-17](#Fig17)).
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 应用此修改后的核后，我们看到得到的卷积分布与原始分布非常相似，并且保持在有效范围内（图[4-16](#Fig16)和[4-17](#Fig17)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig17_HTML.png)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig17_HTML.png)'
- en: A bar graph of count from 0 to 5,000 versus pixel values from 0 to 248\. Count
    is under 1000 from 0 to 220, and from 1000 to 5000 from 220 to 248.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 一个从0到5000的计数柱状图，与从0到248的像素值相对应。计数在0到220之间低于1000，从220到248之间从1000到5000。
- en: Figure 4-17
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-17
- en: Distribution of pixel values after correctly applying a convolution with a 3-by-3
    uniform blurring kernel to the sample dog image in Figure [4-13](#Fig13)
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 正确应用3×3均匀模糊核于图[4-13](#Fig13)中样本狗图像后的像素值分布
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig16_HTML.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig16_HTML.png)'
- en: A bar graph of count from 0 to 5,000 versus pixel values from 0 to 248\. Count
    is under 1000 from 0 to 220, and from 1000 to 5000 from 220 to 248.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 一个从0到5000的计数柱状图，与从0到248的像素值相对应。计数在0到220之间低于1000，从220到248之间从1000到5000。
- en: Figure 4-16
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-16
- en: Original distribution of pixel values from the sample dog image in Figure [4-13](#Fig13)
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-13](#Fig13)中样本狗图像的原始像素值分布
- en: The resulting image is slightly blurred and displays properly, as desired (Figure
    [4-18](#Fig18)).
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 结果图像略微模糊且显示正确，符合预期（图[4-18](#Fig18)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig18_HTML.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig18_HTML.png)'
- en: A slightly blurred, black-and-white photo of a dog playing at the beach.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 一张沙滩上玩耍的狗的略微模糊的黑白照片。
- en: Figure 4-18
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-18
- en: Result of correctly applying a convolution with a 3-by-3 uniform blurring kernel
    to the sample dog image in Figure [4-13](#Fig13)
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 将3×3均匀模糊核正确应用于图[4-13](#Fig13)中样本狗图像的结果
- en: Applying an 8-by-8 blurring kernel, defined as an 8 × 8 matrix filled with the
    value 1/64, yields an even more blurred image (Figure [4-19](#Fig19)).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 应用8×8模糊核，定义为填充值为1/64的8×8矩阵，得到更模糊的图像（图[4-19](#Fig19)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig19_HTML.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig19_HTML.png)'
- en: A considerably blurred, black-and-white photo of a dog playing at the beach.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 一张沙滩上玩耍的狗的相当模糊的黑白照片。
- en: Figure 4-19
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-19
- en: Result of correctly applying a convolution with an 8-by-8 uniform blurring kernel
    to the sample dog image in Figure [4-13](#Fig13)
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 将8×8均匀模糊核正确应用于图[4-13](#Fig13)中样本狗图像的结果
- en: Similarly, applying the sharpening kernel has the following effect (Figure [4-20](#Fig20)).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，应用锐化核会产生以下效果（图[4-20](#Fig20)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig20_HTML.png)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig20_HTML.png)'
- en: A sharpened, black-and-white photo of a dog playing at the beach.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 沙滩上玩耍的狗的锐化黑白照片。
- en: Figure 4-20
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-20
- en: Result of correctly applying a convolution with a 3-by-3 sharpening kernel to
    the sample dog image in Figure [4-13](#Fig13)
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 将3×3锐化核正确应用于图[4-13](#Fig13)中样本狗图像的结果
- en: Convolutions can be constructed to extract meaningful features from images and
    matrices. For instance, it may be helpful to blur an image in order to minimize
    the distance between adjacent pixels to minimize variance in the image and perform
    general, broad analyses of the image minimally affected by noisy variation. Alternatively,
    sharpening may assist with amplification of important features and edges that
    act as landmarks and features for the content of the image.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积可以构建来从图像和矩阵中提取有意义的特征。例如，模糊图像可能有助于最小化相邻像素之间的距离，从而最小化图像中的方差，并执行受噪声变化最小影响的图像的一般、广泛的分析。或者，锐化可能有助于放大重要的特征和边缘，这些特征和边缘作为图像内容的标志和特征。
- en: The fundamental idea of a *convolutional neural network* (CNN) is similar to
    that of a standard feed-forward fully connected neural network introduced previously
    in Chapter [3](525591_1_En_3_Chapter.xhtml). Standard artificial neural networks
    can demonstrate sophisticated behavior by arranging large quantities of a simple
    extractive unit – the perceptron. By providing the architecture/arrangement of
    parameters, the network can learn the optimal values to extract desirable information
    to perform the intended task. Similarly, CNNs can model image data quite well
    by stacking convolution operations upon each other; the neural network learns
    the values of each of the kernels in the convolutions to extract the optimal features
    from the image. Optimization is still performed via gradient descent.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '*卷积神经网络* (CNN) 的基本思想与之前在第[3](525591_1_En_3_Chapter.xhtml)章中介绍的标准前馈全连接神经网络类似。标准的人工神经网络可以通过安排大量简单的提取单元——感知器——来展示复杂的行为。通过提供参数的架构/排列，网络可以学习提取所需信息的最佳值以执行预期任务。同样，CNN可以通过堆叠卷积操作来很好地模拟图像数据；神经网络学习卷积中每个核的值，以从图像中提取最佳特征。优化仍然通过梯度下降进行。'
- en: 'A *convolutional layer* is a collection of convolutions, like a fully connected
    layer is a collection of perceptrons. There are a few important attributes of
    a convolutional layer that define its specific implementation:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '*卷积层* 是一系列卷积的组合，就像全连接层是一系列感知器的组合。卷积层有几个重要的属性，这些属性定义了其特定的实现方式：'
- en: '*The number of filters, n*: This is the number of “convolution operations”
    that exist in the layer. The network will learn *n* different kernels for this
    layer.'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*过滤器数量，n*：这是层中存在的“卷积操作”的数量。网络将学习该层的*n*个不同的核。'
- en: '*The kernel shape* (*a, b*): This defines how large the learned kernel will
    be.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*核形状* (*a, b*)：这定义了学习到的核的大小。'
- en: '*Input or valid padding*: This determines whether padding is used or not. If
    input padding is used, then any incoming matrices will be padded such that the
    resulting convolved matrices have the same shape as the incoming matrices before
    padding. Otherwise, no padding will be applied, and the convolved matrix will
    have shape (*x* – *a* + 1, *y* – *b* + 1), where (*x*, *y*) is the shape of the
    original matrix.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输入或有效填充*：这确定是否使用填充。如果使用输入填充，则任何传入的矩阵都将填充，使得结果卷积矩阵的形状与填充前的传入矩阵相同。否则，将不应用填充，卷积矩阵的形状将为(*x*
    – *a* + 1, *y* – *b* + 1)，其中(*x*, *y*)是原始矩阵的形状。'
- en: A layer must learn one filter per connection between each feature map in the
    previous layer and each feature map in the current layer. For instance, if layer
    A produces 8 feature maps (because it has 8 filters) and layer B produces 16 feature
    maps (because it has 16 filters), layer B learns 8 × 16 = 128 filters. If all
    the filters are 3-by-3 matrices, then layer B uses 128 × (3 × 3) = 1152 parameters.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 一层必须在每个前一层和当前层的每个特征图之间的连接上学习一个过滤器。例如，如果层A生成了8个特征图（因为它有8个过滤器）并且层B生成了16个特征图（因为它有16个过滤器），那么层B学习8
    × 16 = 128个过滤器。如果所有过滤器都是3-by-3的矩阵，那么层B将使用128 × (3 × 3) = 1152个参数。
- en: Let’s start building a simple convolutional neural network using the sequential
    syntax for simplicity. (We’ll use the functional API in more complex situations
    when using the sequential API becomes difficult or impossible.) We will build
    a convolutional neural network that processes 28-by-28 images from the MNIST dataset
    and classifies them into one of ten digits.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以简单的顺序语法开始构建一个简单的卷积神经网络。 (当使用顺序API变得困难或不可能时，我们将使用功能API来处理更复杂的情况。) 我们将构建一个处理MNIST数据集中的28-by-28图像的卷积神经网络，并将它们分类为十个数字之一。
- en: 'We begin with an input layer (Listing [4-21](#PC21)). All image data must have
    three specified spatial dimensions: width, height, and depth. Grayscale images
    have a depth of 1, whereas color images generally have a depth of 3 (where depth-wise
    layers correspond to red, green, and blue). In this case, our input data has shape
    (28, 28, 1).'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从输入层开始（见列表[4-21](#PC21)）。所有图像数据都必须有三个指定的空间维度：宽度、高度和深度。灰度图像的深度为1，而彩色图像通常具有深度为3（其中深度层对应于红色、绿色和蓝色）。在这种情况下，我们的输入数据形状为(28,
    28, 1)。
- en: '[PRE20]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: After the input, we should add convolutional layers to process the image (Listing
    [4-22](#PC22)). In Keras, convolutional layers can be instantiated via `keras.layers.Conv2D(num_filters,
    kernel_size = (a, b), activation = 'activation_name', padding = 'padding_type')`.
    The default activation is linear (i.e., *y* = *x*, applies no nonlinearity to
    the data), and the default padding type is valid.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入之后，我们应该添加卷积层来处理图像（见列表[4-22](#PC22)）。在Keras中，可以通过`keras.layers.Conv2D(num_filters,
    kernel_size = (a, b), activation = 'activation_name', padding = 'padding_type')`实例化卷积层。默认激活函数是线性（即y
    = x，不对数据进行非线性转换），默认填充类型是valid。
- en: '[PRE21]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'It’s worth understanding how each layer changes the shape of the input:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 值得理解每一层如何改变输入的形状：
- en: The original input layer takes in data of shape (28, 28, 1).
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 原始输入层接收形状为（28, 28, 1）的数据。
- en: The first convolutional layer uses 8 filters and applies a 5-by-5 kernel, yielding
    an output of shape (24, 24, 8).
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一卷积层使用8个过滤器并应用一个5x5的核，得到形状为（24, 24, 8）的输出。
- en: The second convolutional layer uses 8 filters and applies a 3-by-3 kernel, yielding
    an output of shape (22, 22, 8).
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第二卷积层使用8个过滤器并应用一个3x3的核，得到形状为（22, 22, 8）的输出。
- en: The third convolutional layer uses 16 filters and applies a 5-by-5 kernel, yielding
    an output of shape (20, 20, 16).
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第三卷积层使用16个过滤器并应用一个5x5的核，得到形状为（20, 20, 16）的输出。
- en: The fourth convolutional layer uses 16 filters and applies a 1-by-1 kernel,
    yielding an output of shape (19, 19, 16).
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第四卷积层使用16个过滤器并应用一个1x1的核，得到形状为（19, 19, 16）的输出。
- en: To confirm this, we can plot the model to understand how each layer transforms
    the shape of incoming data with `keras.utils.plot_model(model, show_shapes=True)`
    (Figure [4-21](#Fig21)).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确认这一点，我们可以通过`keras.utils.plot_model(model, show_shapes=True)`（图[4-21](#Fig21)）绘制模型来理解每个层如何转换输入数据的形状。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig21_HTML.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig21_HTML.png)'
- en: Flowchart of architecture model for the listings 4 - 21 and 4 -22.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 列表4-21和4-22的架构模型流程图。
- en: Figure 4-21
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-21
- en: Visual representation of the model architecture defined in Listings [4-21](#PC21)
    and [4-22](#PC22)
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[4-21](#PC21)和[4-22](#PC22)中定义的模型架构的可视表示
- en: Moreover, we can see that the convolutions require very few parameters (Listing
    [4-23](#PC23)).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们可以看到卷积操作需要的参数非常少（见列表[4-23](#PC23)）。
- en: '[PRE22]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: However, our model isn’t done! The objective of the classification task is to
    map an input image of shape (28, 28, 1) to an output vector of length 10\. No
    matter how many convolutional layers we add, we’re always going to have data arranged
    along three spatial dimensions. We need a method to force the data from three
    spatial dimensions to just one.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们的模型还没有完成！分类任务的目标是将形状为（28, 28, 1）的输入图像映射到长度为10的输出向量。无论我们添加多少卷积层，我们始终会沿着三个空间维度排列数据。我们需要一种方法来强制将三维空间的数据压缩到一维。
- en: 'Flattening might be the most obvious method to map data with three spatial
    dimensions to one: we simply unpack individual elements in the higher-dimensional
    arrangement and lay them out along a one-dimensional axis. This is similar to
    standard reshaping operations, like `arr.reshape` in NumPy: all values are retained,
    just arranged in a different format.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 展平可能是将具有三个空间维度的数据映射到一维的最明显方法：我们只需将高维排列中的单个元素展开并沿一维轴排列。这与NumPy中的标准重塑操作类似，如`arr.reshape`：所有值都保留，只是以不同的格式排列。
- en: Let’s add a flattening layer, followed by a series of fully connected layers
    that eventually map to the desired ten-class output (Listing [4-24](#PC24)).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们添加一个展平层，然后是一系列全连接层，最终映射到所需的十个类别输出（见列表[4-24](#PC24)）。
- en: '[PRE23]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Now, the network architecture properly maps the input to the desired output
    shape (Figure [4-22](#Fig22)).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，网络架构正确地将输入映射到所需的输出形状（图[4-22](#Fig22)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig22_HTML.png)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig22_HTML.png)'
- en: Flowchart has None, values in input and output of input 1 colon InputLayer,
    conv2d 1 to 3 colon Conv2D, flatten colon Flatten, dense 1 to 2 colon Dense.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图没有None，输入和输出中的输入1的值是InputLayer，conv2d 1到3是Conv2D，flatten是Flatten，dense 1到2是Dense。
- en: Figure 4-22
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-22
- en: Visual representation of the model architecture defined in Listings [4-21](#PC21),
    [4-22](#PC22), and [4-24](#PC24)
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[4-21](#PC21)、[4-22](#PC22)和[4-24](#PC24)中定义的模型架构的可视表示
- en: Our finalized network has a few hundred thousand parameters, about half the
    number of parameters in our previous network architecture design using only fully
    connected layers.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最终的网络有几十万个参数，大约是我们之前仅使用全连接层进行网络架构设计时参数数量的一半。
- en: When we scale the image size to 200-by-200 while using the same architecture,
    the number of model parameters used is 18,682,002 – compare this with the 1,066,706,102
    parameters used in the previously discussed hypothetical 200-by-200 image fully-connected
    network.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将图像大小缩放到200x200，同时使用相同的架构时，使用的模型参数数量为18,682,002——与之前讨论的假设的200x200图像全连接网络使用的1,066,706,102个参数相比。
- en: Note
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The parameter count for the convolutional neural network, you’ll probably notice,
    isn’t great. The parameter count especially balloons at the flattening layer.
    We’ll explore another family of layers used in convolutional neural networks,
    *pooling layers*, which help us address this problem and further improve the parameter
    scaling of a convolutional neural network.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会注意到，卷积神经网络的参数数量并不多。特别是在展平层，参数数量会急剧增加。我们将探讨卷积神经网络中使用的另一组层，即*池化层*，这些层有助于我们解决这个问题，并进一步改善卷积神经网络的参数缩放。
- en: For convenience of reference, the part of the convolutional neural network before
    conversion from three spatial dimensions to one spatial dimension is generally
    called the “convolutional component” and the part afterward the “fully connected
    component.” Another name is the “bottom” and “top,” respectively – which can be
    confusing because the last part of the model (the fully connected component) is
    referred to as the “top.”
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 为了方便参考，将卷积神经网络从三维空间转换为一维空间之前的部分通常称为“卷积组件”，之后的部分称为“全连接组件”。另一个名称分别是“底部”和“顶部”——这可能会造成混淆，因为模型的最后部分（全连接组件）被称为“顶部”。
- en: The convolutional component can be thought of as serving an *extractive* role
    by identifying and amplifying the most relevant/important qualities of the input.
    In contrast, the fully connected component performs an *aggregative*/*compiling*/*interpretive*
    role by processing all the extracted features and interpreting how they relate
    to the output.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积组件可以通过识别和增强输入的最相关/重要特性来被视为起到一种*提取*作用。相比之下，全连接组件通过处理所有提取的特征并解释它们如何与输出相关来执行*聚合*/*编译*/*解释*作用。
- en: For instance, the convolutional component of our example network built for MNIST
    data might detect and amplify corners, like the top-left part of a “5” or the
    left and top part of a “4.” The fully connected component might be able to aggregate
    the various detected corner properties and interpret them as support for belonging
    to a certain class. If there are many sharp corners, the image could be a “4”
    or “5.” If there are a low number of sharp corners, the image could be “1,” “2,”
    “3,” or “7.” If there are no sharp corners, the image could be a “0,” “6,” “8,”
    or “9.” Combining this information with other extracted features allows the fully
    connected component to pin down exactly which digit the image is.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们为MNIST数据构建的示例网络的卷积组件可能会检测并增强角点，如“5”的左上角或“4”的左上角。全连接组件可能能够聚合检测到的各种角点属性，并将它们解释为属于某一类别的支持。如果有许多尖锐的角点，图像可能是“4”或“5”。如果尖锐角点的数量较少，图像可能是“1”、“2”、“3”或“7”。如果没有尖锐角点，图像可能是“0”、“6”、“8”或“9”。将此信息与其他提取的特征结合起来，允许全连接组件精确地确定图像是哪个数字。
- en: Let’s compile and train the model, using familiar syntax (Listing [4-25](#PC25)).
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用熟悉的语法编译和训练模型（见列表[4-25](#PC25)）。
- en: '[PRE24]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The model very quickly obtains good training and validation performance (Listing
    [4-26](#PC26), Figure [4-23](#Fig23)).
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 模型很快就能获得良好的训练和验证性能（见列表[4-26](#PC26)，图[4-23](#Fig23)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig23_HTML.png)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![图4-23](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig23_HTML.png)'
- en: Two line graphs plot loss and accuracy versus epoch. Train and validation show
    drastic and slight decrease for loss and similar increase for accuracy.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 两条线图显示了损失和准确率随迭代次数的变化。训练和验证的损失急剧下降，准确率略有上升。
- en: Figure 4-23
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-23
- en: Loss and accuracy history of the previously defined convolutional neural network
    architecture as it trains on the MNIST dataset for 20 epochs
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 在MNIST数据集上训练20次迭代之前定义的卷积神经网络架构的损失和准确率历史记录
- en: '[PRE25]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: To gain a better idea of what the convolutional neural network is really doing
    in terms of spatially extracting features, let us pass an input image through
    only the *first convolutional layer* of the trained network. This allows us to
    visually identify what types of transformations the network has learned as being
    optimal for classification.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解卷积神经网络在空间提取特征方面的实际操作，让我们仅通过训练网络的**第一卷积层**来传递一个输入图像。这使我们能够直观地识别网络学习到的、对分类最优化的一些变换类型。
- en: In order to “peek” into the input-output flow of a layer within the network,
    we can create a new model constructed from the same layer objects as in the original
    network. This allows us to isolate the weights within that specific layer (Listing
    [4-27](#PC27)).
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 为了“窥视”网络中某一层的输入输出流，我们可以创建一个由原始网络中相同层对象构成的新模型。这使我们能够隔离该特定层中的权重（见列表 [4-27](#PC27)）。
- en: '[PRE26]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: We can use `peek.predict` to get the result after passing in a sample input.
    Recall that the first layer maps the input of shape (28, 28, 1) to an output of
    shape (24, 24, 8) – meaning that the first layer outputs 8 feature maps of shape
    (24, 24). We can visualize a sample input and a sample of the feature map outputs
    from the first layer (Listing [4-28](#PC28), Figure [4-24](#Fig24)).
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用`peek.predict`来获取传递样本输入后的结果。回想一下，第一层将形状为 (28, 28, 1) 的输入映射到形状为 (24, 24,
    8) 的输出——这意味着第一层输出 8 个形状为 (24, 24) 的特征图。我们可以可视化一个样本输入和第一层的特征图输出样本（见列表 [4-28](#PC28)，图
    [4-24](#Fig24)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig24_HTML.png)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig24_HTML.png)'
- en: An 8 by 8 set of 64 images has a handwritten digit from 0 to 9 in each cell.
    The degree of blurring increases from left to right.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 8x8 的 64 个图像集合，每个单元格中都有一个从 0 到 9 的手写数字。模糊程度从左到右逐渐增加。
- en: Figure 4-24
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-24
- en: Representing the effect of the learned first-layer convolution kernels (all
    columns except the left one) on an input image (left column)
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 表示学习到的第一层卷积核（除最左边列外的所有列）对输入图像（最左边列）的影响
- en: '[PRE27]'
  id: totrans-238
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'The left column contains the original input image to the layer; each of the
    images to the right displays one feature map output. You can begin to observe
    various transformations performed just by the first layer: inversion, shifting,
    edge detection, corner detection, and line detection, to name a few.'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 左列包含输入到层的原始图像；右侧的每张图像显示一个特征图输出。仅通过第一层，你就可以开始观察到各种变换：反转、平移、边缘检测、角点检测和线检测等，仅举几例。
- en: We can modify the `peek` model to include the second layer and view the feature
    maps obtained by passing an input through both the first and second layers (Listing
    [4-29](#PC29), Figure [4-25](#Fig25)).
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以修改`peek`模型以包括第二层，并查看通过第一层和第二层传递输入所获得的特征图（见列表 [4-29](#PC29)，图 [4-25](#Fig25)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig25_HTML.png)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig25_HTML.png)'
- en: An 8 by 8 set of 64 images has a handwritten digit from 0 to 9 in each cell.
    The degree of blurring increases from left to right.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 8x8 的 64 个图像集合，每个单元格中都有一个从 0 到 9 的手写数字。模糊程度从左到右逐渐增加。
- en: Figure 4-25
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-25
- en: Representing the effect of the learned first- and second-layer convolution kernels
    (all columns except the left one) on an input image (left column)
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 表示学习到的第一层和第二层卷积核（除最左边列外的所有列）对输入图像（最左边列）的影响
- en: '[PRE28]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'The second layer is able to capture more specific components of each digit.
    If you look closely, you can see that each feature map “looks for” increasingly
    specialized features. The first displayed feature map (second column from the
    left in Figure [4-26](#Fig26)), for instance, appears to “look for” horizontal
    lines in digits: there are three horizontal lines for the digit 3, two for the
    digit 2, two for the digit 5, etc. The outputs of the third layer become more
    difficult to interpret due to increasing distance from the input.'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层能够捕捉到每个数字的更具体成分。如果你仔细观察，你会看到每个特征图“寻找”越来越专业的特征。例如，图 [4-26](#Fig26) 中从左数第二列显示的特征图似乎“寻找”数字中的水平线：数字
    3 有三条水平线，数字 2 有两条，数字 5 也有两条等。由于与输入的距离越来越远，第三层的输出变得难以解释。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig26_HTML.png)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig26_HTML.png)'
- en: An 8 by 8 set of 64 images has a handwritten digit from 0 to 9 in each cell.
    The degree of blurring increases from left to right.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 8x8 的 64 个图像集合，每个单元格中都有一个从 0 到 9 的手写数字。模糊程度从左到右逐渐增加。
- en: Figure 4-26
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-26
- en: Representing the effect of the learned first-, second-, and third-layer convolution
    kernels (all columns except the left one) on an input image (left column)
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 表示第一、第二和第三层卷积核（除左列外的所有列）对输入图像的影响（左列）
- en: The fourth layer is the last convolutional layer before the outputs are flattened
    and passed into the fully connected component (Figure [4-27](#Fig27)).
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 第四层是输出展平并传递到全连接组件之前的最后一个卷积层（见图[4-27](#Fig27)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig27_HTML.png)'
  id: totrans-252
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig27_HTML.png)'
- en: An 8 by 8 set of 64 images has a handwritten digit from 0 to 9 in each cell.
    The degree of blurring increases from left to right.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 一个8x8的图像集包含64个图像，每个单元格中都有一个从0到9的手写数字。模糊程度从左到右逐渐增加。
- en: Figure 4-27
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-27
- en: Representing the effect of the learned first- through fourth-layer convolution
    kernels (all columns except the left one) on an input image (left column)
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 表示第一层到第四层卷积核（除左列外的所有列）对输入图像的影响（左列）
- en: The Pooling Operation
  id: totrans-256
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 池化操作
- en: Convolutions are incredibly helpful – they allow neural networks to extract
    features from images in a systematic, low-parameter, and effective manner. However,
    they’re relatively insignificant with respect to changing the shape of the image.
    We might refer to this as the “information compression factor” – the convolution
    doesn’t do much “squeezing.” As explored before, performing a convolution with
    kernel size *n* on an image of shape (*a, a*) produces an output of shape (*a
    – n + 1, a – n + 1*) – this is quite marginal for standard single-digit sizes
    of *n*.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积非常有帮助——它们允许神经网络以系统化、低参数和有效的方式从图像中提取特征。然而，它们在改变图像形状方面相对不显著。我们可能称之为“信息压缩因子”——卷积并没有做很多“压缩”。如前所述，对形状为(*a,
    a*)的图像执行大小为*n*的卷积会产生形状为(*a – n + 1, a – n + 1*)的输出——这对于标准单数字大小的*n*来说相当小。
- en: Because of the convolution’s relatively low information compression factor,
    the fully connected component after the flattening layer has to process a very
    large number of parameters. The number of parameters was forgivable for a small-resolution
    dataset like MNIST, but is unfeasible for larger (and more practical) datasets
    and applications.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 由于卷积相对较低的信息压缩因子，在展平层之后的全连接组件必须处理一个非常大的参数数量。对于像MNIST这样的小分辨率数据集，参数数量是可以接受的，但对于更大（且更实用）的数据集和应用来说，这是不可行的。
- en: Let’s use the same architecture as in the previous section and explore how the
    number of parameters (which can be accessed via `model.count_params()`) scales
    for a wide range of image sizes (Listing [4-30](#PC30), Figure [4-28](#Fig28)).
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用与上一节相同的架构，并探讨参数数量（可以通过`model.count_params()`访问）如何随着广泛图像尺寸的变化而变化（列表[4-30](#PC30)，图[4-28](#Fig28)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig28_HTML.png)'
  id: totrans-260
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig28_HTML.png)'
- en: A line graph for gradual increase of parameters from 0.0 to 3.3, with an increase
    in image size of one spatial dimension from 0 to 800.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 一条从0.0增加到3.3的线性图，表示图像尺寸在0到800的空间维度上逐渐增加的参数增加。
- en: Figure 4-28
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-28
- en: Demonstrating the parametrization scaling of a convolutional neural network
    as the image input dimension increases
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 随着图像输入维度的增加，演示卷积神经网络的参数化缩放
- en: '[PRE29]'
  id: totrans-264
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: The parameter count scales much better than a fully connected network, but still
    is quite poor. A 300-by-300 image input requires almost 50,000,000 parameters;
    a 600-by-600 image input requires almost 175,000,000 parameters; an 800-by-800
    image input requires over 800,000,000 parameters.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 参数数量与全连接网络的缩放比例要好得多，但仍然相当差。300x300的图像输入需要近5000万个参数；600x600的图像输入需要近1.75亿个参数；800x800的图像输入需要超过8亿个参数。
- en: We need a way to address this problem. You’ll notice that the main source of
    parameters is in the fully connected component after flattening, because convolutions
    don’t reduce the feature map representation size sufficiently quickly. We can
    simplify the problem of building a network with a feasible number of parameters
    as a problem of building a network that efficiently reduces the feature map size.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一种方法来解决这一问题。你会注意到参数的主要来源是在展平层之后的全连接组件，因为卷积没有足够快地减少特征图表示的大小。我们可以将构建具有可行参数数量的网络的问题简化为构建一个能够有效减少特征图大小的网络的问题。
- en: How can we address this? A convolution is the only current operation we have
    in our toolbelt to reduce the dimensionality of an image with a feasible number
    of parameters. Let’s build an architecture-defining program that just keeps on
    stacking convolutional layers until the feature maps collectively contain 2048
    elements or less (Listing [4-31](#PC31), Figure [4-29](#Fig29)). We keep track
    of one spatial dimension of the feature map size (we only need to keep track of
    one rather than both because we assume feature maps are square) and calculate
    the representation size as *s*² ⋅ 16, where *s* is the feature map size and 16
    is derived from the number of feature maps.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何解决这个问题？卷积是我们工具箱中唯一当前的操作，可以以合理的参数数量减少图像的维度。让我们构建一个架构定义程序，不断堆叠卷积层，直到特征图总共包含2048个元素或更少（列表[4-31](#PC31)，图[4-29](#Fig29)）。我们跟踪特征图大小的空间维度（我们只需要跟踪一个，而不是两个，因为我们假设特征图是正方形的）并计算表示大小为*s*²⋅16，其中*s*是特征图大小，16是从特征图数量推导出来的。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig29_HTML.png)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig29_HTML.png)'
- en: A line graph for steady increase of parameters from 0.2 to 0.95, with an increase
    in image size of one spatial dimension from 0 to 800.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 参数从0.2到0.95的稳定增长线图，图像尺寸在空间维度上从0到800的增加。
- en: Figure 4-29
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-29
- en: Demonstrating the parametrization scaling of a specialized “self-extending”
    convolutional neural network design as the image input dimension increases
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 随着图像输入维度的增加，展示一个专门的“自扩展”卷积神经网络设计的参数化缩放。
- en: '[PRE30]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'This technique scales better: it is linear rather than exponential, resulting
    in parameter counts two orders of magnitude less than the previous convolutional
    neural network design.'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术缩放得更好：它是线性的而不是指数的，导致参数数量比之前的卷积神经网络设计少两个数量级。
- en: 'However, we run into another problem: as the image size increases, the *length*
    of the network increases significantly as well. Look at the length of the architecture
    just for a 75-by-75 image input, for instance (Figure [4-30](#Fig30)).'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们遇到了另一个问题：随着图像尺寸的增加，网络的*长度*也显著增加。例如，看看仅针对75x75图像输入的架构长度（图[4-30](#Fig30)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig30_HTML.png)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig30_HTML.png)'
- en: A lengthy flowchart of None comma values in the input and output of input layer,
    dense, conv 2 d, flatten, and so on.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 输入层、密集层、卷积2D、扁平化等输入和输出中的无逗号值的长流程图。
- en: Figure 4-30
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-30
- en: The (very long) generated architecture just for a 75-by-75-pixel input image
    using the “self-extending” convolutional neural network design
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 仅使用“自扩展”卷积神经网络设计，为75x75像素输入图像生成的（非常长）架构。
- en: While this is a *valid* and *feasible* neural network, it’s not a good design.
    Having so many layers stacked together like this causes problems for signal propagation
    throughout the network and – most importantly – isn’t necessary nor effective.
    It’s the most manual, brute-force approach.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这是一个*有效*且*可行*的神经网络，但它不是一个好的设计。这样堆叠这么多层会导致整个网络中的信号传播出现问题，而且——最重要的是——既不必要也不有效。这是最手动、最蛮力的方法。
- en: We can replace the return in previous code plotting the scaling of parameter
    counts by image size instead with the number of parameters (given by `len(model.layers)`)
    to view how the layer count by this method scales with the image size (Figure
    [4-31](#Fig31)).
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将之前代码中返回的参数计数缩放图替换为图像尺寸（由`len(model.layers)`给出）的参数数量，以查看这种方法中层数如何随图像尺寸缩放（图[4-31](#Fig31)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig31_HTML.png)'
  id: totrans-281
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig31_HTML.png)'
- en: A line graph of linear increase of layers from 0 to 400, with an increase in
    image size of one spatial dimension from 0 to 800.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 层次从0到400的线性增长线图，图像尺寸在空间维度上从0到800的增加。
- en: Figure 4-31
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-31
- en: The layer requirement scaling of the “self-extending” convolutional neural network
    architecture design as the image dimension increases
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 随着图像维度的增加，“自扩展”卷积神经网络架构设计的层需求缩放。
- en: 'In order to reduce the dimensionality of the image more effectively (and correspondingly
    improve parameter count scaling), we need to use a more efficient mechanism: pooling.
    To apply pooling to a matrix *i* with size (*a*, *b*), we divide *i* into non-overlapping
    blocks of shape (*a*, *b*), aggregate all values in each block, and fill in the
    aggregated values into a pooled matrix *j* corresponding to the locations of those
    blocks. For instance, consider pooling on the following matrix with a pooling
    shape of (2, 2):'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更有效地降低图像的维度（并相应地提高参数数量缩放），我们需要使用更有效的机制：池化。为了将池化应用于大小为(*a*, *b*)的矩阵*i*，我们将*i*划分为形状为(*a*,
    *b*)的非重叠块，聚合每个块中的所有值，并将聚合值填充到与这些块位置相对应的池化矩阵*j*中。例如，考虑以下矩阵的(2, 2)池化：
- en: '![$$ i=\left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em
    4\kern0.5em 7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equs.png)'
  id: totrans-286
  prefs: []
  type: TYPE_IMG
  zh: '![$$ i=\left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em
    4\kern0.5em 7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equs.png)'
- en: There are four non-overlapping blocks of shape (2, 2) in *i*. The pooled matrix
    *j* has shape ![$$ \left(\frac{4}{2},\frac{4}{2}\right)=\left(2,2\right) $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq2.png).
    Generally, for a matrix of shape (*m*, *n*) and a pooling size of (*a*, *b*),
    the resulting pooled matrix has shape ![$$ \left(\frac{m}{a},\frac{n}{b}\right)
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq3.png).
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 在*i*中有四个形状为(2, 2)的非重叠块。池化矩阵*j*的形状为 ![$$ \left(\frac{4}{2},\frac{4}{2}\right)=\left(2,2\right)
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq2.png)。一般来说，对于一个形状为(*m*,
    *n*)的矩阵和一个池化大小为(*a*, *b*)，得到的池化矩阵的形状为 ![$$ \left(\frac{m}{a},\frac{n}{b}\right)
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq3.png)。
- en: '![$$ j=\left[????\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equt.png)'
  id: totrans-288
  prefs: []
  type: TYPE_IMG
  zh: '![$$ j=\left[????\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equt.png)'
- en: 'Let’s fill in the upper-left corner of *j*. Because we are using pooling with
    shape (2, 2), this corresponds to the following bolded subregion of *i*:'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们填充*j*的左上角。因为我们使用的是(2, 2)的池化，这对应于*i*中的以下粗体子区域：
- en: '![$$ i=\left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em
    4\kern0.5em 7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equu.png)'
  id: totrans-290
  prefs: []
  type: TYPE_IMG
  zh: '![$$ i=\left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em
    4\kern0.5em 7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equu.png)'
- en: 'To keep things simple, we will employ max pooling instead of average pooling.
    The maximum value in the bolded subregion is 6\. We can fill this into the corresponding
    element slot in *j*:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持简单，我们将使用最大池化而不是平均池化。粗体子区域中的最大值是6。我们可以将其填充到*j*中对应的元素槽位：
- en: '![$$ j=\left[6???\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equv.png)'
  id: totrans-292
  prefs: []
  type: TYPE_IMG
  zh: '![$$ j=\left[6???\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equv.png)'
- en: 'We can fill in the remaining elements in a similar fashion:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用类似的方式填充剩余的元素：
- en: '![$$ j=\left[6\ 8\ 14\ 16\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equw.png)'
  id: totrans-294
  prefs: []
  type: TYPE_IMG
  zh: '![$$ j=\left[6\ 8\ 14\ 16\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equw.png)'
- en: Similarly to convolutions, the resulting pooled matrix reflects the “gist” or
    “main ideas” from the raw matrix. However, there is a key difference between convolutions
    and pooling that can only be realized with a higher-dimensional matrix.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 与卷积类似，得到的池化矩阵反映了原始矩阵的“大意”或“主要思想”。然而，卷积和池化之间存在一个关键区别，只有通过更高维度的矩阵才能实现。
- en: Let’s return to the previous “image” we created in Listing [4-10](#PC10), a
    plus sign on top of a gradient background (Figure [4-32](#Fig32)).
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到在列表[4-10](#PC10)中创建的“图像”，一个在渐变背景上的加号（图[4-32](#Fig32)）。
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig32_HTML.png)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig32_HTML.png)'
- en: A heatmap of 0 to 9 on the x and y axes and 0 to 1 in vertical grayscale has
    a white plus sign of value 1 on a gradient background of values less than 1.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 在x轴和y轴上为0到9，在垂直灰度上为0到1的热图有一个值为1的白色加号，背景值小于1。
