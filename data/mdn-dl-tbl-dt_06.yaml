  zh: '| 基准 ResNet50 | 4.1B | 76.0% |'
- en: '| Scale ResNet50 by depth (d=4) | 16.2B | 76.0% |'
  id: totrans-523
  prefs: []
  type: TYPE_TB
  zh: '| 通过深度 (d=4) 缩放 ResNet50 | 16.2B | 76.0% |'
- en: '| Scale ResNet50 by width (w=2) | 14.7B | 77.7% |'
  id: totrans-524
  prefs: []
  type: TYPE_TB
  zh: '| 通过宽度 (w=2) 缩放 ResNet50 | 14.7B | 77.7% |'
- en: '| Scale ResNet50 by resolution (r=2) | 16.4B | 77.5% |'
  id: totrans-525
  prefs: []
  type: TYPE_TB
  zh: '| 通过分辨率（r=2）缩放ResNet50 | 16.4B | 77.5% |'
- en: '| **Scale ResNet50 by compound scaling** | **16.7B** | **78.8%** |'
  id: totrans-526
