- en: Key Points
  id: totrans-915
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: In this chapter, we discussed the theory and implementation of convolutional
    neural networks and how to apply them to tabular datasets.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了卷积神经网络的理论和实现，以及如何将它们应用于表格数据集。
- en: Convolutions consist of a set of kernels that “sweep” across the spatial axes
    of the image, extracting and amplifying relevant features. In convolutional neural
    networks, the convolutional/extractive component learns the optimal kernels to
    identify visual information, while the fully connected/interpretative component
    learns how to arrange and understand the extracted features in relation to the
    prediction task.
  id: totrans-917
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积由一组“扫过”图像空间轴的核组成，提取并增强相关特征。在卷积神经网络中，卷积/提取组件学习最优核以识别视觉信息，而全连接/解释组件学习如何根据预测任务安排和理解提取的特征。
- en: 'In terms of parametrization, the rough relationship is true: *pooling and global
    pooling* < *pooling and no global pooling* < *convolutional* < *only FC*. Using
    both pooling and global pooling in a convolutional neural network design yields
    the optimal parametrization scaling as input size increases.'
  id: totrans-918
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在参数化方面，粗略的关系是正确的：*池化和全局池化* < *池化和无全局池化* < *卷积* < *只有全连接*。在卷积神经网络设计中同时使用池化和全局池化，随着输入大小的增加，可以获得最佳的参数化缩放。
- en: Base or foundation models can be directly used for training or as compartmentalized
    submodels in larger overarching models.
  id: totrans-919
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础或基础模型可以直接用于训练，或作为更大整体模型中的模块化子模型。
- en: The ResNet architecture extensively uses residual connections, which skip over
    certain layers. The DenseNet architecture uses a denser arrangement of residual
    connections.
  id: totrans-920
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ResNet架构广泛使用残差连接，跳过某些层。DenseNet架构使用更密集的残差连接排列。
- en: The Inception v3 model uses a cell-based structure with an emphasis on optimizing
    filter sizes and the highly nonlinear arrangement of layers within cell designs.
  id: totrans-921
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Inception v3模型使用基于单元格的结构，重点在于优化滤波器大小和单元格设计中层的高度非线性排列。
- en: The EfficientNet model was designed to scale a NAS-optimized “small model” across
    all dimensions of the network (width, height, depth) uniformly.
  id: totrans-922
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: EfficientNet模型被设计为在网络的各个维度（宽度、高度、深度）上均匀地扩展NAS优化的“小型模型”。
- en: Multimodal models that can process image and tabular inputs together have two
    heads. The image head is processed using convolutions and outputted into a vector
    that can be combined with the processed tabular input to produce a jointly informed
    output.
  id: totrans-923
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够同时处理图像和表格输入的多模态模型有两个头部。图像头部通过卷积处理，输出为向量，可以与处理过的表格输入结合，以产生一个联合信息输出。
- en: Applying one-dimensional convolutions directly to tabular data is possible but
    unlikely to work because tabular data generally does not possess contiguous semantics.
    We can add a soft ordering component before the one-dimensional convolutional
    component to learn the optimal mapping from unordered to ordered representation.
  id: totrans-924
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将一维卷积直接应用于表格数据是可能的，但不太可能成功，因为表格数据通常不具有连续的语义。我们可以在一维卷积组件之前添加一个软排序组件，以学习从无序到有序表示的最优映射。
- en: While soft ordering techniques may suffice for two-dimensional convolutions
    (in which the input is processed using dense layers and reshaped into image form),
    the complexity of image data makes this sort of approach generally unsuccessful.
    The DeepInsight and IGTD methods are both human-designed, machine learning–assisted
    mappings from tabular to image data that work successfully in a wide array of
    problems. Both methods aim to map features to images in a way that places similar
    features spatially closer together.
  id: totrans-925
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然软排序技术对于二维卷积（其中输入通过密集层处理并重塑为图像形式）可能足够，但图像数据的复杂性使得这种方法通常不成功。DeepInsight和IGTD方法都是人为设计的、机器学习辅助的从表格到图像数据的映射，在广泛的问题中成功工作。这两种方法都旨在以将相似特征在空间上更靠近的方式将特征映射到图像上。
- en: In the next chapter, we’ll take a similar approach to understanding the application
    of specialized neural network structures designed for non-tabular inputs to tabular
    inputs with recurrent layers.
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将采用类似的方法来理解专门为非表格输入设计的神经网络结构在具有循环层的表格输入中的应用。
