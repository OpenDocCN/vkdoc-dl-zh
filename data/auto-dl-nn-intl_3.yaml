- en: Pipeline cells
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 管道单元格
- en: 'The pipeline has five cells. Each cell can be filled with some value from the
    corresponding operator space. The cell can be empty if `none` value is selected.
    For example, the following pipeline might be selected: `Selector3` → `none` →
    `Transformer1` → `none` → `Classifier2`, which is equal to `Selector3` → `Transformer1`
    → `Classifier2`. This search space definition is huge and challenging to construct
    manually, so we will add a special class in Listing [3-19](#PC73) that will create
    an operator search space definition according to the NNI specification.'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 管道有五个单元格。每个单元格可以填充对应算子空间中的某个值。如果选择`none`值，单元格可以是空的。例如，以下管道可能被选中：`Selector3`
    → `none` → `Transformer1` → `none` → `Classifier2`，这等于`Selector3` → `Transformer1`
    → `Classifier2`。这个搜索空间定义非常庞大且难以手动构建，因此我们将在列表[3-19](#PC73)中添加一个特殊类，该类将根据NNI规范创建算子搜索空间定义。
- en: '[PRE71]'
  id: totrans-535
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: Each cell has an operator type that can be filled by `selector`, `transformer`,
    and `classifier`. The `operator_search_space` method creates a search space for
    each cell type.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 每个单元格都有一个可以由`selector`、`transformer`和`classifier`填充的算子类型。`operator_search_space`方法为每个单元格类型创建一个搜索空间。
- en: '[PRE72]'
  id: totrans-537
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: 'Next, we define a method `build` that constructs a search space of all cells
    according to the NNI specification:'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义一个`build`方法，该方法根据NNI规范构建所有单元格的搜索空间：
- en: '[PRE73]'
  id: totrans-539
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: 'Even though the search space definition is quite large, we can print it out:'
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管搜索空间定义相当大，但我们仍然可以将其打印出来：
- en: '[PRE74]'
  id: totrans-541
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: We will use dynamic search space construction to launch the experiment in embedded
    mode, although this technique can also be applied to build a static JSON file.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用动态搜索空间构建来在嵌入式模式下启动实验，尽管这项技术也可以用于构建静态JSON文件。
- en: Model
  id: totrans-543
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型
- en: So, what do we have by now? We have an operator space and a search space. Let’s
    now implement a model that converts the pipeline configuration into a real machine
    learning classifier. Listing [3-20](#PC77) introduces `MlPipelineClassifier`.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，到目前为止我们有什么呢？我们有一个算子空间和一个搜索空间。现在让我们实现一个将管道配置转换为实际机器学习分类器的模型。列表[3-20](#PC77)介绍了`MlPipelineClassifier`。
- en: 'Importing modules:'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 导入模块：
- en: '[PRE75]'
  id: totrans-546
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: 'Model receives pipeline configuration and converts it to the actual Scikit-learn
    pipeline:'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 模型接收管道配置并将其转换为实际的Scikit-learn管道：
- en: '[PRE76]'
  id: totrans-548
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: 'Model training method:'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 模型训练方法：
- en: '[PRE77]'
  id: totrans-550
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: 'Computing the accuracy:'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 计算准确率：
- en: '[PRE78]'
  id: totrans-552
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: 'Since the model is ready, let’s try to initialize it using the sample pipeline
    parameter and apply it to the classification problem:'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 由于模型已经准备好了，让我们尝试使用样本管道参数来初始化它，并将其应用于分类问题：
- en: '[PRE79]'
  id: totrans-554
  prefs: []
  type: TYPE_PRE
  zh: '[PRE79]'
- en: The model demonstrates **64%** accuracy. This is definitely not the result we
    expect, so let’s use the HPO techniques to construct a better-performance model.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 模型展示了**64%**的准确率。这绝对不是我们预期的结果，因此让我们使用HPO技术构建一个性能更好的模型。
- en: Tuner
  id: totrans-556
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调优器
- en: 'Now everything is ready to start the experiment. But I would like to focus
    on the search space that we use. The trial parameter is a sequence of operators,
    which may contain empty operators, that is, `S3(p3)` → `none` → `T1(p1)` → `none`
    → `C2(p2)`. But at the same time, the following parameter exists too: `S3(p3)`
    → `none` → `none` → `T1(p1)` → `C2(p2)`. They are different parameters in the
    search space but generate the same classifier model:'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 现在一切准备就绪，可以开始实验了。但我希望关注我们使用的搜索空间。试验参数是一系列算子，可能包含空算子，即`S3(p3)` → `none` → `T1(p1)`
    → `none` → `C2(p2)`。但与此同时，还存在以下参数：`S3(p3)` → `none` → `none` → `T1(p1)` → `C2(p2)`。它们是搜索空间中的不同参数，但生成相同的分类器模型：
- en: '`S3(p3)` → `none` → `T1(p1)` → `none` → `C2(p2)`'
  id: totrans-558
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`S3(p3)` → `none` → `T1(p1)` → `none` → `C2(p2)`'
- en: '`S3(p3)` → `none` → `none` → `T1(p1)` → `C2(p2)`'
  id: totrans-559
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`S3(p3)` → `none` → `none` → `T1(p1)` → `C2(p2)`'
- en: '`S3(p3)` → `T1(p1)` → `C2(p2).`'
  id: totrans-560
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`S3(p3)` → `T1(p1)` → `C2(p2)`。'
- en: Keep in mind that the same two identical operators with different parameters
    are not equal, that is, `SelectFwe(alpha=0)` is not equal to `SelectFwe(alpha=0.05)`.
    Let’s customize Tuner by forbidding it to create parameters that will generate
    equivalent models concerning the parameters already tried, that is, if we already
    tried parameter `P`[`1`] = `SelectPercentile(percentile = 2)` → `none` → `Normalizer(norm='l1')`
    → `none` → `DecisionTreeClassifier(max_depth=8)`, then parameter `P`[`2`] = `SelectPercentile(percentile
    = 2)` → `none` → `none` → `Normalizer(norm='l1')` → `DecisionTreeClassifier(max_depth=8)`
    will not be passed to Experiment, because the model generated by `P`[`2`] equals
    to the model generated by `P`[`1`]. Let’s create `EvolutionShrinkTuner`, which
    inherits `EvolutionTuner` and tracks all executed pipelines forbidding passing
    the equal ones to the Experiment. We can see `EvolutionShrinkTuner` implementation
    in Listing [3-21](#PC82).
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，具有不同参数的两个相同操作符并不相等，即`SelectFwe(alpha=0)`不等于`SelectFwe(alpha=0.05)`。让我们通过禁止它创建与已尝试的参数相关的等效模型来定制Tuner，即如果我们已经尝试了参数`P`[`1`]
    = `SelectPercentile(percentile = 2)` → `none` → `Normalizer(norm='l1')` → `none`
    → `DecisionTreeClassifier(max_depth=8)`，那么参数`P`[`2`] = `SelectPercentile(percentile
    = 2)` → `none` → `none` → `Normalizer(norm='l1')` → `DecisionTreeClassifier(max_depth=8)`将不会被传递到实验中，因为`P`[`2`]生成的模型等于`P`[`1`]生成的模型。让我们创建`EvolutionShrinkTuner`，它继承自`EvolutionTuner`并跟踪所有已执行的管道，禁止传递相等的管道到实验中。我们可以在列表[3-21](#PC82)中看到`EvolutionShrinkTuner`的实现。
- en: '[PRE80]'
  id: totrans-562
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: 'We define registry property that will track all created pipelines:'
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义了一个注册属性，它将跟踪所有创建的管道：
- en: '[PRE81]'
  id: totrans-564
  prefs: []
  type: TYPE_PRE
  zh: '[PRE81]'
- en: If the `super().generate_parameters` method of the parent `EvolutionTuner` object
    returns a parameter that has already been tried, then the `super().generate_parameters`
    method is called again until a unique parameter is generated. Because `EvolutionTuner`
    has random behavior, `super().generate_parameters` can be expected to return different
    parameters on subsequent calls.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 如果父`EvolutionTuner`对象的`super().generate_parameters`方法返回一个已经尝试过的参数，那么将再次调用`super().generate_parameters`方法，直到生成一个唯一的参数。因为`EvolutionTuner`具有随机行为，所以`super().generate_parameters`在后续调用中可以期望返回不同的参数。
- en: '[PRE82]'
  id: totrans-566
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: 'The following `is_valid` method converts the parameter to the canonical form
    by removing `none` operators and checks if it has already been tried: if it has,
    then returns `False`; if not, then saves it and returns `True`.'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 以下`is_valid`方法通过删除`none`操作符将参数转换为规范形式，并检查它是否已经被尝试：如果是，则返回`False`；如果不是，则保存它并返回`True`。
- en: '[PRE83]'
  id: totrans-568
  prefs: []
  type: TYPE_PRE
  zh: '[PRE83]'
- en: This simple technique introduces the concept of equivalence between the elements
    of the search space and can significantly shrink the search space.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 这种简单技术引入了搜索空间元素之间的等价概念，并且可以显著缩小搜索空间。
- en: Experiment
  id: totrans-570
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验
- en: And now, we are finally ready to launch an experiment to find the optimal functional
    pipeline for solving the AutoML problem. The trial script in Listing [3-22](#PC86)
    initializes the model, prepares datasets, trains the model, tests it, and returns
    model accuracy to NNI Experiment.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们终于准备好启动一个实验来寻找解决AutoML问题的最佳功能管道。列表[3-22](#PC86)中的试验脚本初始化模型，准备数据集，训练模型，测试它，并将模型准确率返回给NNI实验。
- en: '(Full code is provided in the corresponding file: *ch3/ml_pipeline/trial.py*.)'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: （完整的代码在相应的文件中提供：*ch3/ml_pipeline/trial.py*。）
