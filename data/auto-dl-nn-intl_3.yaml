- en: Some benchmarks can last several days or even weeks. Therefore, it is always
    more convenient to borrow the results obtained and published after research. In
    many cases, you can execute a mini-research yourself, which will help determine
    the characteristics of the search space structure. In any case, understanding
    the deep learning model optimization problem and principles of the Search Tuner
    is very helpful in choosing the right strategy for solving the HPO problem.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 一些基准可能需要持续几天甚至几周。因此，总是更方便地借用研究后获得并发布的结果。在许多情况下，你可以执行一个迷你研究，这将有助于确定搜索空间结构的特点。在任何情况下，理解深度学习模型优化问题和搜索调优器的原理，对于选择解决HPO问题的正确策略非常有帮助。
- en: Custom Tuner
  id: totrans-315
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自定义Tuner
- en: Built-in tuners are suitable for most tasks. But there are situations when you
    need to add some custom logic to improve the quality of the HPO Experiment. Indeed,
    sometimes, we may know specific properties of the search space that the built-in
    tuner does not take into account. Also, the developer can implement their original
    idea and test it on real problems. For such cases, NNI allows you to implement
    a Custom Tuner. Custom Tuner can be used in an experiment and shared with other
    developers.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 内置的tuner适用于大多数任务。但有时你需要添加一些自定义逻辑来提高HPO实验的质量。实际上，有时我们可能知道搜索空间的具体属性，而内置的tuner没有考虑到。此外，开发者可以实施他们自己的原始想法，并在实际问题上进行测试。对于这种情况，NNI允许你实现自定义Tuner。自定义Tuner可以在实验中使用，并与其他开发者共享。
- en: Tuner Internals
  id: totrans-317
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Tuner 内部
- en: 'Each Tuner class should inherit `nni.tuner.Tuner` and implement the following
    methods: `__init__`, `update_search_space`, `generate_parameters`, `receive_trial_result`.
    Any Tuner can be implemented based on the self-describing sample presented in
    Listing [3-9](#PC29).'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: '每个Tuner类都应该继承 `nni.tuner.Tuner` 并实现以下方法：`__init__`, `update_search_space`,
    `generate_parameters`, `receive_trial_result`。任何Tuner都可以基于示例列表 [3-9](#PC29) 中的自描述样本实现。 '
- en: '[PRE27]'
  id: totrans-319
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Tuner interacts with Experiment the following way:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: Tuner与Experiment的交互方式如下：
- en: Experiment calls `update_search_space` at the startup.
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实验在启动时调用 `update_search_space`。
- en: Experiment requests search space parameters for Trial calling `generate_parameters`.
  id: totrans-322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实验请求通过调用 `generate_parameters` 来搜索空间参数。
- en: Experiment returns Trial results to Tuner calling `recieve_trial_result.`
  id: totrans-323
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实验将Trial结果返回给调用 `recieve_trial_result` 的Tuner。
- en: (Steps 2 and 3 are repeated until `max_trial_number` is reached or Experiment
    is stopped.)
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: （步骤2和3会重复进行，直到达到 `max_trial_number` 或实验停止。）
- en: Figure [3-25](#Fig25) shows Tuner–Experiment interaction as a sequence diagram.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-25](#Fig25) 展示了Tuner–Experiment交互作为序列图。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig25_HTML.jpg)'
  id: totrans-326
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig25_HTML.jpg)'
- en: Figure 3-25
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-25
- en: Tuner–Experiment sequence diagram
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: Tuner–Experiment 序列图
- en: 'Custom Tuner is integrated into the experiment using the following config:'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义Tuner通过以下配置集成到实验中：
- en: '[PRE28]'
  id: totrans-330
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Or it can be integrated into Python embedded experiment as follows:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 或者它可以集成到Python嵌入式实验中，如下所示：
- en: '[PRE29]'
  id: totrans-332
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: New Evolution Custom Tuner
  id: totrans-333
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新的进化自定义Tuner
- en: 'Let’s try to develop our Сustom Tuner. This Tuner will be based on the evolutionary
    concepts we examined exploring the Evolution Tuner. We’ll call it `NewEvolutionTuner`.
    `NewEvolutionTuner` will initialize the population and act according to the following
    algorithm:'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试开发我们的自定义调谐器。这个调谐器将基于我们在探索进化调谐器时考察的进化概念。我们将称之为 `NewEvolutionTuner`。`NewEvolutionTuner`
    将初始化种群并按照以下算法操作：
- en: 'Take the best individual: X[best]'
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 取出最佳个体：X[best]
- en: 'Mutate the best individual in a random way: *mutate*(X[best]) → Y'
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以随机方式突变最佳个体：*mutate*(X[best]) → Y
- en: 'Replace the worst individual in the population X[worst] with a mutant of the
    best individual Y: X[worst] ← Y'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将种群中最差的个体 X[worst] 替换为最佳个体的突变体 Y：X[worst] ← Y
- en: 'Figure [3-26](#Fig26) demonstrates the search approach of `NewEvolutionTuner`:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-26](#Fig26) 展示了 `NewEvolutionTuner` 的搜索方法：
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig26_HTML.png)'
  id: totrans-339
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig26_HTML.png)'
- en: Figure 3-26
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-26
- en: New Evolution Tuner
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 新进化调谐器
- en: '`NewEvolutionTuner` implements a greedy “hill-climbing” approach. The Tuner
    takes the best individual (the highest one) and mutates it (hoping that the new
    individual will climb higher). Listing [3-10](#PC32) use `NewEvolutionTuner` to
    find the maxima of Ackley’s function.'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: '`NewEvolutionTuner` 实现了一种贪婪的“爬山”方法。调谐器取最佳个体（最高的一个）并对其进行突变（希望新的个体会爬得更高）。列表 [3-10](#PC32)
    使用 `NewEvolutionTuner` 寻找 Ackley 函数的最大值。'
- en: '[PRE30]'
  id: totrans-343
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'And here is Ackley’s function visualization:'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 Ackley 函数的可视化：
- en: '[PRE31]'
  id: totrans-345
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: We can see in Figure [3-27](#Fig27) the surface of Ackley’s function. It has
    one highest hill and several smaller hills nearby.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在图 [3-27](#Fig27) 中看到 Ackley 函数的表面。它有一个最高的山丘和附近几个较小的山丘。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig27_HTML.jpg)'
  id: totrans-347
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig27_HTML.jpg)'
- en: Figure 3-27
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-27
- en: Ackley’s function
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: Ackley 函数
- en: Before we check how `NewEvolutionTuner` solves the problem of finding the maxima
    of Ackley’s function, we need to implement it in Listing [3-11](#PC34).
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们检查 `NewEvolutionTuner` 如何解决寻找 Ackley 函数最大值的问题之前，我们需要在列表 [3-11](#PC34) 中实现它。
- en: 'Importing necessary modules:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 导入必要的模块：
- en: '[PRE32]'
  id: totrans-352
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Population consists of individuals. Each individual has DNA that represents
    a search space parameter. Also, individual has a result field that contains Trial
    result. New Evolution individual has the following properties:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 种群由个体组成。每个个体都有代表搜索空间参数的 DNA。此外，个体还有一个包含试验结果的字段。新进化个体具有以下属性：
- en: '`x`: Search space *x* coordinate'
  id: totrans-354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`x`: 搜索空间 *x* 坐标'
- en: '`y`: Search space *y* coordinate'
  id: totrans-355
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`y`: 搜索空间 *y* 坐标'
- en: '`param_id`: Trial number'
  id: totrans-356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`param_id`: 试验编号'
- en: '`result`: Trial result'
  id: totrans-357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`result`: 试验结果'
- en: '[PRE33]'
  id: totrans-358
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'Population class is a wrapper that manipulates all individuals as a whole:'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 种群类是一个包装器，它将所有个体作为一个整体进行操作：
- en: '[PRE34]'
  id: totrans-360
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'All individuals are stored in `individuals` property:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 所有个体都存储在 `individuals` 属性中：
- en: '[PRE35]'
  id: totrans-362
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'Then, we need to add a method that will return an individual by its `param_id`:'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们需要添加一个方法，通过 `param_id` 返回一个个体：
- en: '[PRE36]'
  id: totrans-364
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'At the start of the experiment, the Tuner will create *N* individuals who will
    not have a trial number. We will call these individuals virgins. `get_first_virgin`
    method returns the first virgin found in population:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 在实验开始时，Tuner 将创建 *N* 个个体，这些个体将没有试验编号。我们将这些个体称为处女。`get_first_virgin` 方法返回种群中找到的第一个处女：
- en: '[PRE37]'
  id: totrans-366
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'The following method – `get_population_with_result` – returns all individuals
    that already received a trial result:'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 以下方法 `get_population_with_result` 返回所有已经收到试验结果的个体：
- en: '[PRE38]'
  id: totrans-368
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'The next method returns the best individual from the whole population, that
    is, an individual that has the highest `result`:'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个方法返回整个种群中最好的个体，即具有最高 `result` 的个体：
- en: '[PRE39]'
  id: totrans-370
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: 'And here, we come to our primary evolution method `replace_worst`, which will
    develop the population:'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们来到我们的主要进化方法 `replace_worst`，它将发展种群：
- en: We take the best individual from the population.
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们从种群中取出最好的个体。
- en: Mutate the best individual.
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 突变最佳个体。
- en: Add the mutant of the best individual to the population instead of the worst
    one.
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将最佳个体的突变体添加到种群中，而不是最差的个体。
- en: '[PRE40]'
  id: totrans-375
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: 'We can start implementing the tuner after defining the `Individual` and `Population`
    classes:'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义了 `Individual` 和 `Population` 类之后，我们可以开始实现调谐器：
- en: '[PRE41]'
  id: totrans-377
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'The Tuner has two parameters, `optimize_mode` and `population size`:'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 调谐器有两个参数，`optimize_mode` 和 `population size`：
- en: '[PRE42]'
  id: totrans-379
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Next, Tuner initializes properties related to the search space it is working
    with:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，Tuner 初始化与它正在处理的搜索空间相关的属性：
- en: '[PRE43]'
  id: totrans-381
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'When the Tuner starts, the `update_search_space` method is invoked. It generates
    the Population of Random Individuals:'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 当调谐器启动时，会调用 `update_search_space` 方法。它生成随机个体的种群：
- en: '[PRE44]'
  id: totrans-383
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Experiment calls `generate_parameters` method to get new parameters for the
    subsequent Trial. Initially, we have a set of individuals generated at the startup
    and not passed to the Tuner (virgins). We take virgins and pass them to Tuner
    one by one. When no virgins are left, we are generating new individuals.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 实验调用 `generate_parameters` 方法为后续的试验获取新的参数。最初，我们在启动时生成了一组个体，并且没有传递给调谐器（virgins）。我们逐个将
    virgins 传递给调谐器。当没有 virgins 时，我们开始生成新的个体。
- en: '[PRE45]'
  id: totrans-385
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: 'When the Experiment returns the Trial’s result, we save it to an individual
    object:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 当实验返回试验结果时，我们将其保存到单个对象中：
- en: '[PRE46]'
  id: totrans-387
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Well, our `NewEvolutionTuner` is ready for action! We can launch the experiment
    using the following config file shown in Listing [3-12](#PC49).
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，我们的 `NewEvolutionTuner` 已经准备就绪！我们可以使用以下配置文件启动实验，该文件在列表 [3-12](#PC49) 中显示。
- en: '[PRE47]'
  id: totrans-389
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: The experiment with custom `NewEvolutionTuner` can also be run in Python embedded
    mode as it is implemented in Listing [3-13](#PC50).
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自定义 `NewEvolutionTuner` 的实验也可以在 Python 嵌入模式下运行，因为它在列表 [3-13](#PC50) 中实现。
- en: '(Full code is provided in the corresponding file: *ch3/tuners/custom_tuner/run_experiment.py*.)'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: （完整代码在相应的文件中提供：*ch3/tuners/custom_tuner/run_experiment.py*。）
- en: '[PRE48]'
  id: totrans-392
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: 'Let’s launch the Experiment and analyze its results:'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们启动实验并分析其结果：
- en: '[PRE49]'
  id: totrans-394
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Figure [3-28](#Fig28) shows the locations visited by the `NewEvolutionTuner`
    population. We see that the population has found the global function’s maxima
    and began to explore it.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-28](#Fig28) 展示了 `NewEvolutionTuner` 种群访问过的位置。我们看到种群已经找到了全局函数的最大值并开始探索它。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig28_HTML.jpg)'
  id: totrans-396
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig28_HTML.jpg)'
- en: Figure 3-28
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-28
- en: Locations visited by population of NewEvolutionTuner
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: NewEvolutionTuner 种群访问过的位置
- en: Trial Metric panel in Figure [3-29](#Fig29) demonstrates the “hill-climbing”
    approach in action. The main problem with this approach is that it quickly finds
    a local maxima and stops exploring other search space areas.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-29](#Fig29) 中的“Trial Metric”面板展示了“爬山法”的实际应用。这种方法的主要问题是它很快就能找到一个局部最大值并停止探索其他搜索空间区域。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig29_HTML.jpg)'
  id: totrans-400
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig29_HTML.jpg)'
- en: Figure 3-29
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-29
- en: Trial Metric panel
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 试验指标面板
- en: Of course, developing a custom Tuner is not always an easy task. Still, the
    ability to implement your search algorithm and integrate it into the HPO process
    can greatly increase the experiment results. In this section, we have provided
    an example of how you can do this. If necessary, you can implement your ideas
    based on the illustration given in this section.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，开发自定义调谐器并不总是容易的任务。然而，能够实现你的搜索算法并将其集成到 HPO 过程中可以极大地提高实验结果。在本节中，我们提供了一个示例，说明你可以如何做到这一点。如果需要，你可以根据本节中给出的说明实现你的想法。
- en: Early Stopping
  id: totrans-404
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提前终止
- en: Some parameters in the search space produce very low Trial results. And this
    is normal because the Tuner may not always know in advance which areas of the
    search space to explore and which not to explore. Tuner often tries parameters
    that give very low results. The Trial itself is expensive because a lot of time
    is spent on it. For example, training a neural network with a complex architecture
    on a large dataset can take hours. And it would be helpful not to spend a lot
    of time on trials that show poor results in their execution. NNI uses Early Stopping
    algorithms to solve that issue. Early Stopping algorithms analyze the intermediate
    trial results and compare them with the intermediate results of other trials.
    If the algorithm decides that the intermediate results of the current Trial are
    too low, then it stops the Trial so as not to waste time on it.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索空间中的一些参数会产生非常低的试验结果。这是正常的，因为调谐器可能并不总是事先知道应该探索搜索空间的哪些区域以及哪些不应该探索。调谐器经常尝试那些给出非常低结果的参数。试验本身是昂贵的，因为它花费了大量的时间。例如，在大型数据集上用复杂架构训练神经网络可能需要数小时。因此，对于执行结果不佳的试验，不花费大量时间是很有帮助的。NNI
    使用提前终止算法来解决这个问题。提前终止算法分析中间试验结果，并将它们与其他试验的中间结果进行比较。如果算法决定当前试验的中间结果太低，那么它将停止试验，以避免在该试验上浪费时间。
- en: Figure [3-30](#Fig30) explains Early Stopping approach. Trial 3 early stopped
    at step N because intermediate results of this Trial were significantly worse
    than the other trials’ intermediate results at step N.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-30](#Fig30) 解释了早停方法。试验 3 在步骤 N 时提前停止，因为该试验在步骤 N 的中间结果显著劣于其他试验在步骤 N 的中间结果。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig30_HTML.png)'
  id: totrans-407
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig30_HTML.png)'
- en: Figure 3-30
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-30
- en: HPO Early Stopping
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: HPO 早停
- en: The deep learning training algorithms also have Early Stop policies. Training
    Early Stopping policу stops model training when the model starts to degrade or
    there is no improvement for a long time. Do not confuse Training Early Stopping
    with HPO Early Stopping. They are not related in any way. Indeed, take a look
    at Figure [3-31](#Fig31). Training progress is good, and there is no reason to
    stop the training. But if we compare the training process with other trials, it
    is apparent that it is much worse, and the HPO Early Stopping algorithm can stop
    this Trial.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习训练算法也有早停策略。训练早停策略在模型开始恶化或长时间没有改进时停止模型训练。不要将训练早停与 HPO 早停混淆。它们在本质上没有任何关联。实际上，看看图
    [3-31](#Fig31)。训练进度良好，没有停止训练的理由。但如果我们将训练过程与其他试验进行比较，很明显它要差得多，HPO 早停算法可以停止这个试验。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig31_HTML.png)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig31_HTML.png)'
- en: Figure 3-31
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-31
- en: HPO Early Stopping vs. Training Early Stopping
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: HPO 早停与训练早停对比
- en: And Figure [3-32](#Fig32) demonstrates the opposite situation. The training
    process begins to degrade, and the Training Early Stopping algorithm terminates
    the training process. In contrast, the HPO Early Stopping algorithm may consider
    the current Trail very promising because its intermediate results are significantly
    superior compared to other trials.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 而图 [3-32](#Fig32) 展示了相反的情况。训练过程开始恶化，训练早停算法终止了训练过程。相比之下，HPO 早停算法可能会认为当前的试验非常有希望，因为其中间结果与其他试验相比显著优越。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig32_HTML.png)'
  id: totrans-415
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig32_HTML.png)'
- en: Figure 3-32
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-32
- en: HPO Early Stopping vs. Training Early Stopping
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: HPO 早停与训练早停对比
- en: Please keep in mind designing a deep learning model and the HPO Experiment that
    Training Early Stopping and HPO Early Stopping are not correlated.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，在设计深度学习模型和 HPO 实验时，训练早停和 HPO 早停是不相关的。
- en: Median Stop
  id: totrans-419
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 中值停止
- en: Median Stop is a straightforward, early stopping rule that stops a pending Trial
    after step N if the Trial’s best objective value by step N is strictly worse than
    the median value of the running averages of all completed trials’ objectives reported
    up to step N.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 中值停止是一种简单直接的早停规则，如果在步骤 N 时试验的最佳目标值严格劣于截至步骤 N 的所有已完成试验目标值的运行平均值的中位数，则停止步骤 N 后的待定试验。
- en: 'Median Stop algorithm can be implemented in Experiment with the following experiment
    configuration:'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 中值停止算法可以通过以下实验配置在实验中实现：
- en: '[PRE50]'
  id: totrans-422
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Let’s look at a synthetic problem to see the Median Stop algorithm in action.
    Say, we have the following identity function, f: x → x, with the training progress
    containing 100 epochs (steps) and expressed by the following rule: ![$$ \frac{x}{10}\
    \sqrt{epoch} $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq5.png)
    + *r,* where *r* is a random variable on (-1, 1)*.* We can characterize the function
    f as an identity function with parabolic training progress. Listing [3-14](#PC53)
    contains the implementation of function f.'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: '让我们通过一个合成问题来看一下中值停止算法的实际应用。比如说，我们有一个以下恒等函数，f: x → x，训练进度包含 100 个时期（步骤），以下规则表示：![$$
    \frac{x}{10}\ \sqrt{epoch} $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq5.png)
    + *r*，其中 *r* 是 (-1, 1) 上的随机变量.* 我们可以将函数 f 描述为具有抛物线训练进度的恒等函数。列表 [3-14](#PC53) 包含了函数
    f 的实现。'
- en: '[PRE51]'
  id: totrans-424
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Let’s visualize the training process of the following set of functions: f(0),
    f(10), f(20), ..., f(100).'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们可视化以下函数集的训练过程：f(0)，f(10)，f(20)，...，f(100)。
- en: '[PRE52]'
  id: totrans-426
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: Figure [3-33](#Fig33) shows various training curves. This plot illustrates that
    the lower training curves are unpromising. Unpromising training can be stopped
    in advance according to the Early Stopping algorithm.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-33](#Fig33) 展示了各种训练曲线。此图说明，较低的训练曲线前景不佳。根据早停算法，可以提前停止前景不佳的训练。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig33_HTML.jpg)'
  id: totrans-428
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig33_HTML.jpg)'
- en: Figure 3-33
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-33
- en: Parabolic training
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 抛物线训练
- en: Let’s launch an experiment that will use the Median Stop algorithm. The trial
    script is defined in Listing [3-15](#PC55).
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们启动一个将使用中值停止算法的实验。试验脚本定义在列表 [3-15](#PC55) 中。
- en: 'Trial header with imported modules:'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 带有导入模块的试验标题：
- en: '[PRE53]'
  id: totrans-433
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: 'Executing Trial:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 执行试验：
- en: '[PRE54]'
  id: totrans-435
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: Listing [3-16](#PC57) defines the Experiment with Median Stop algorithm.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [3-16](#PC57) 定义了使用中值停止算法的实验。
- en: '[PRE55]'
  id: totrans-437
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: 'Now we are ready to run the Experiment:'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们准备运行实验：
- en: '[PRE56]'
  id: totrans-439
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: After the experiment is completed, we can observe in Figure [3-34](#Fig34) that
    many trials have the `EARLY_STOPPED` status, as expected.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 实验完成后，我们可以在图 [3-34](#Fig34) 中观察到许多试验具有 `EARLY_STOPPED` 状态，正如预期的那样。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig34_HTML.jpg)'
  id: totrans-441
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig34_HTML.jpg)'
- en: Figure 3-34
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-34
- en: Trials detail panel
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 试验详情面板
- en: Curve Fitting
  id: totrans-444
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 曲线拟合
- en: Curve Fitting Assessor is an LPA (learning, predicting, assessing) algorithm
    that stops a pending Trial at step *N* if the prediction of the final epoch’s
    performance is worse than the best final performance in the trial history. Curve
    Fitting Assessor makes a prediction about the final result of the Trial’s training
    and compares it with the completed ones. This algorithm treats the Early Stopping
    task as a time series forecasting problem. If the training prediction is pessimistic,
    then the algorithm stops the trial. Figure [3-35](#Fig35) explains the Curve Fitting
    Early Stopping approach.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 曲线拟合评估器是一个 LPA（学习、预测、评估）算法，如果最终epoch的性能预测比试验历史中最佳最终性能差，则会在步骤 *N* 停止挂起的试验。曲线拟合评估器对试验训练的最终结果进行预测，并将其与已完成的结果进行比较。此算法将早期停止任务视为时间序列预测问题。如果训练预测悲观，则算法停止试验。图
    [3-35](#Fig35) 解释了曲线拟合早期停止方法。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig35_HTML.png)'
  id: totrans-446
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig35_HTML.png)'
- en: Figure 3-35
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-35
- en: Curve Fitting prediction
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 曲线拟合预测
- en: 'Curve Fitting algorithm can be implemented in Experiment with the following
    experiment configuration:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 曲线拟合算法可以通过以下实验配置在实验中实现：
- en: '[PRE57]'
  id: totrans-450
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: We will not study the principles of the Curve Fitting Early Stopping algorithm
    in this book. You can refer to the official documentation ([`https://nni.readthedocs.io/en/v2.7/reference/hpo.html#nni.algorithms.hpo.curvefitting_assessor.CurvefittingAssessor`](https://nni.readthedocs.io/en/v2.7/reference/hpo.html%2523nni.algorithms.hpo.curvefitting_assessor.CurvefittingAssessor))
    or review a paper dedicated to “Speeding up Automatic Hyperparameter Optimization
    of Deep Neural Networks by Extrapolation of Learning Curves” ([`https://ml.informatik.uni-freiburg.de/wp-content/uploads/papers/15-IJCAI-Extrapolation_of_Learning_Curves.pdf`](https://ml.informatik.uni-freiburg.de/wp-content/uploads/papers/15-IJCAI-Extrapolation_of_Learning_Curves.pdf)).
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 本书不会研究曲线拟合早期停止算法的原理。您可以参考官方文档([`https://nni.readthedocs.io/en/v2.7/reference/hpo.html#nni.algorithms.hpo.curvefitting_assessor.CurvefittingAssessor`](https://nni.readthedocs.io/en/v2.7/reference/hpo.html%2523nni.algorithms.hpo.curvefitting_assessor.CurvefittingAssessor))或回顾一篇关于“通过学习曲线外推加速深度神经网络自动超参数优化”的论文([`https://ml.informatik.uni-freiburg.de/wp-content/uploads/papers/15-IJCAI-Extrapolation_of_Learning_Curves.pdf`](https://ml.informatik.uni-freiburg.de/wp-content/uploads/papers/15-IJCAI-Extrapolation_of_Learning_Curves.pdf))。
- en: Risk to Stop a Good Trial
  id: totrans-452
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 停止良好试验的风险
- en: The Early Stopping algorithm can significantly speed up the completion of an
    experiment and save computational resources. But there is always a risk of stopping
    a good trial too early, which would probably mean rejecting very good parameters
    in the search space. Look at Figure [3-36](#Fig36), early stopped trial could
    show good performance.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 早期停止算法可以显著加快实验的完成速度并节省计算资源。但总是存在过早停止良好试验的风险，这可能会意味着在搜索空间中拒绝非常好的参数。看看图 [3-36](#Fig36)，早期停止的试验可能会表现出良好的性能。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig36_HTML.png)'
  id: totrans-454
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig36_HTML.png)'
- en: Figure 3-36
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-36
- en: Good trial early stopped
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 早期停止的良好试验
- en: However, there is a very tiny chance of stopping a trial that can give good
    results too early. Usually, the training curves of deep learning models behave
    similarly, so if the trials’ intermediate results were significantly worse than
    those of other trials, you probably should not expect anything good, but complete
    the trial and move on to the next one.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有极小的机会在试验结果良好之前过早地停止试验。通常，深度学习模型的训练曲线表现相似，所以如果试验的中间结果明显比其他试验差，你可能不应该期望有任何好的结果，但应该完成试验并继续下一个试验。
- en: Searching for Optimal Functional Pipeline and Classical AutoML
  id: totrans-458
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 搜索最优功能管道和经典AutoML
- en: 'Libraries: Scikit-learn'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 库：Scikit-learn
- en: Let’s go back to the problem we studied in the “From LeNet to AlexNet” section
    of Chapter [2](526245_1_En_2_Chapter.xhtml). In this task, we built a functional
    pipeline that would optimally solve the image classification problem. Indeed,
    each layer of deep learning is a particular functional operator, and we tried
    to find the best pipeline of these operators using the HPO approach. Figure [3-37](#Fig37)
    presents neural network architecture as a functional pipeline.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到第 [2](526245_1_En_2_Chapter.xhtml) 章的“从LeNet到AlexNet”部分中我们研究的问题。在这个任务中，我们构建了一个功能管道，以最优地解决图像分类问题。确实，深度学习的每一层都是一个特定的功能算子，我们试图使用HPO方法找到这些算子的最佳管道。图
    [3-37](#Fig37) 展示了作为功能管道的神经网络架构。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig37_HTML.jpg)'
  id: totrans-461
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig37_HTML.jpg)'
- en: Figure 3-37
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-37
- en: Neural network architecture as functional pipeline
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 作为功能管道的神经网络架构
- en: Let’s convert the problem into a more strict mathematical language. We need
    to find a model *M* that consists of compositions of functions *F*[*i*] ∈ {*F*}
    and maximizes the value *L*(*M*, *D*), where *L* evaluates the performance of
    model *M* on dataset *D*. *Figure* [*3-38*](#Fig38) *formulates the optimal functional
    pipeline problem:*
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将问题转化为更严格的数学语言。我们需要找到一个模型 *M*，它由函数 *F*[*i*] ∈ {*F*} 的组合构成，并最大化值 *L*(*M*,
    *D*)，其中 *L* 评估模型 *M* 在数据集 *D* 上的性能。*图* [*3-38*](#Fig38) *定义了最优功能管道问题：*
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig38_HTML.jpg)'
  id: totrans-465
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig38_HTML.jpg)'
- en: Figure 3-38
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-38
- en: Optimal functional pipeline problem
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 最优功能管道问题
- en: Let’s study how this problem can be solved with NNI. As an example, I want to
    use the classic AutoML task, which searches for the optimal pipeline of classical
    shallow machine learning methods to solve a supervised learning problem. In this
    section, I would like to pay tribute to classical machine learning, which increasingly
    gives way to deep learning. This approach can be applied to any problem of searching
    the optimal functional pipeline.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们研究如何使用 NNI 解决这个问题。作为一个例子，我想使用经典的 AutoML 任务，它搜索解决监督学习问题的经典浅层机器学习方法的最佳管道。在本节中，我想向经典机器学习致敬，它越来越多地让位于深度学习。这种方法可以应用于任何搜索最优功能管道的问题。
- en: Problem
  id: totrans-469
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题
- en: 'Let’s examine binary classification problem with Gamma Telescope Dataset ([`https://archive.ics.uci.edu/ml/datasets/magic+gamma+telescope`](https://archive.ics.uci.edu/ml/datasets/magic%252Bgamma%252Btelescope)).
    This dataset contains data of signals received by the telescope. The task is to
    discriminate signals caused by primary **gammas** (signal) from the images of
    **hadronic** showers initiated by cosmic rays in the upper atmosphere (background).
    This dataset contains 19020 instances and the following columns:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考察使用伽马望远镜数据集（[`https://archive.ics.uci.edu/ml/datasets/magic+gamma+telescope`](https://archive.ics.uci.edu/ml/datasets/magic%252Bgamma%252Btelescope)）的二元分类问题。此数据集包含望远镜接收到的信号数据。任务是区分由初级
    **伽马**（信号）引起的信号与由宇宙射线在上层大气中引发的 **强子** 淋漓（背景）图像。此数据集包含 19020 个实例和以下列：
- en: '`fLength`: Type: real. Major axis of ellipse (mm)'
  id: totrans-471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fLength`: 类型：实数。椭圆的主轴（毫米）'
- en: '`fWidth`: Type: real. Minor axis of ellipse (mm])'
  id: totrans-472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fWidth`: 类型：实数。椭圆的副轴（毫米）'
- en: '`fSize`: Type: real. 10-log of sum of content of all pixels (photons)'
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fSize`: 类型：实数。所有像素（光子）内容总和的10对数'
- en: '`fConc`: Type: real. Ratio of sum of two highest pixels over `fSize` (ratio)'
  id: totrans-474
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fConc`: 类型：实数。两个最高像素总和与`fSize`的比值（比率）'
- en: '`fConc1`: Type: real. Ratio of highest pixel over `fSize` (ratio)'
  id: totrans-475
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fConc1`: 类型：实数。最高像素与`fSize`的比值（比率）'
- en: '`fAsym`: Type: real. Distance from highest pixel to center, projected onto
    major axis (mm)'
  id: totrans-476
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fAsym`: 类型：实数。最高像素到中心的距离，投影到主轴上（毫米）'
- en: '`fM3Long`: Type: real. Third root of third moment along major axis (mm)'
  id: totrans-477
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fM3Long`: 类型：实数。沿主轴第三矩的立方根（毫米）'
- en: '`fM3Trans`: Type: real. Third root of third moment along minor axis (mm)'
  id: totrans-478
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fM3Trans`: 类型：实数。沿副轴第三矩的立方根（毫米）'
- en: '`fAlpha`: Type: real. Angle of major axis with vector to origin (deg)'
  id: totrans-479
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fAlpha`: 类型：实数。主轴与原点向量的角度（度）'
- en: '`fDist`: Type: real. Distance from origin to center of ellipse (mm)'
  id: totrans-480
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`fDist`: 类型：实数。原点到椭圆中心的距离（毫米）'
- en: '`class`: Values: `''g''`, `''h''`. Gamma (signal), Hadron (background). g =
    gamma (signal): 12332\. h = hadron (background): 6688'
  id: totrans-481
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`class`: 值：`''g''`，`''h''`。伽马（信号），强子（背景）。g = 伽马（信号）：12332。h = 强子（背景）：6688'
- en: Perhaps the reader understands something in these physical data, but I do not
