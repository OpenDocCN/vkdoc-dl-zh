- en: Operators
  id: totrans-499
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 操作符
- en: 'Now let’s define the functions that will make up the functional pipeline. We
    will call them Operators in the machine learning context. Machine learning operators
    for a classification problem can be separated into three types:'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们定义将构成功能管道的函数。在机器学习环境中，我们将它们称为操作符。对于分类问题，机器学习操作符可以分为三种类型：
- en: '**Selectors**: Choose the most significant features (columns) from the dataset,
    removing dependent features. Usually reduces the input size. The selected features
    remain unchanged.'
  id: totrans-501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择器**：从数据集中选择最显著的特征（列），移除相关特征。通常可以减少输入大小。选定的特征保持不变。'
- en: '**Transformers**: Convert input according to some mathematical function without
    changing the input size.'
  id: totrans-502
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转换器**：根据某些数学函数转换输入，而不改变输入大小。'
- en: '**Classifiers**: Solve the classification problem itself.'
  id: totrans-503
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分类器**：解决分类问题本身。'
- en: 'Figure [3-39](#Fig39) shows a machine learning pipeline: selector, transformer,
    and classifier.'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-39](#Fig39)显示了机器学习管道：选择器、转换器和分类器。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig39_HTML.jpg)'
