- en: Note
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Not all built-in NNI tuners support random seed setting. Hence, the experiments
    are not reproducible. Therefore, the results you get on your local machine may
    differ from those shown in this chapter. However, the general behavior of tuners
    remains the same on all machines, so the results of the same tuner on the same
    search space are similar.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有内置的 NNI 调谐器都支持随机种子设置。因此，实验不可重复。因此，您在本地机器上获得的结果可能与本章中显示的结果不同。然而，所有机器上调谐器的一般行为保持不变，因此相同调谐器在相同搜索空间中的结果相似。
- en: We can consider the Evolution Tuner as a directed random search. It is slightly
    better than random search but still has many problems due to the too random nature
    of this algorithm. Evolution Tuner usually requires many trials but is usually
    selected due to its simplicity.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将进化调谐器视为一个有向随机搜索。它比随机搜索略好，但由于该算法过于随机的本质，仍然存在许多问题。进化调谐器通常需要多次试验，但由于其简单性通常被选中。
- en: Anneal Tuner
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 热处理调谐器
- en: Anneal Tuner is based on the Simulated Annealing algorithm. Simulated Annealing
    is a method for solving optimization problems. The algorithm models the physical
    process of heating a material and slowly lowering the temperature to decrease
    defects, thus minimizing the system energy. Annealing Tuner uses randomness as
    part of the search process like Evolution Tuner.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 热处理调谐器基于模拟退火算法。模拟退火是一种解决优化问题的方法。该算法模拟了加热材料并缓慢降低温度以减少缺陷的物理过程，从而最小化系统能量。热处理调谐器像进化调谐器一样将随机性作为搜索过程的一部分。
- en: 'The annealing algorithm consists of the following steps:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 热处理算法包括以下步骤：
- en: 1. The annealing algorithm selects a random element X in the search space, and
    the f(X) value is calculated.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 热处理算法在搜索空间中随机选择一个元素 X，并计算 f(X) 的值。
- en: 2. The algorithm performs a random mutation on element X producing X’ element
    from the search space.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 算法对搜索空间中的元素 X 进行随机变异，产生 X’ 元素。
- en: If X is a real value, then X’ can be calculated as X’ = X + ΔX, where ΔX is
    a random variable. Next, we compare f(X’) and f(X).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 X 是实数，则 X’ 可以计算为 X’ = X + ΔX，其中 ΔX 是一个随机变量。接下来，我们比较 f(X’）和 f(X)。
- en: 3a. If f(X’) < f(X), then the mutation is considered as negative.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 3a. 如果 f(X’）< f(X)，则认为变异是负的。
- en: 3b. If f(X’) ≥ f(X), then the mutation is considered as positive and X value
    is updated by X’.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 3b. 如果 f(X’）≥ f(X)，则认为变异是正的，并通过 X’ 更新 X 的值。
- en: '4. If the mutation is negative, then the algorithm calculates the following
    values:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 如果变异是负的，则算法计算以下值：
- en: '*r*: Uniform random value on (0, 1).'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*r*: 在 (0, 1) 上的均匀随机值。'
- en: 'Δ: f(X) - f(X’).'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Δ: f(X) - f(X’）。'
- en: '*σ* is standard deviation of all explored values during the search: f(X[1]),
    ..., f(X[n]) multiplied by degradation ratio *c*^(*i*), where *c* is the positive
    value lower than 1 and *i* is the number of iteration, σ = *c*^(*i*) *std*([f(X[1]),
    …, f(X[n])]).'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*σ* 是搜索过程中所有探索值的标准差：f(X[1])，…，f(X[n]) 乘以退化率 *c*^(*i*)，其中 *c* 是小于 1 的正数，*i*
    是迭代次数，σ = *c*^(*i*) *std*([f(X[1])，…，f(X[n])])。'
- en: Next, we compare *r* and ![$$ {e}^{\frac{\Delta  }{\sigma }} $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq1.png),
    where *e* is the exponential.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们比较 *r* 和 ![$$ {e}^{\frac{\Delta  }{\sigma }} $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq1.png)，其中
    *e* 是指数。
- en: '5a. If *r* < ![$$ {e}^{\frac{\Delta  }{\sigma }} $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq2.png),
    then the algorithm degrades from X to X’: X ← X’. This is done hoping that it
    will be possible to reach a new peak in the next iteration and the transition
    to X’ is only an intermediate step. We can consider this as an exploration step
    that explores an area near X in the search space.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 5a. 如果 *r* < ![$$ {e}^{\frac{\Delta  }{\sigma }} $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq2.png)，则算法从
    X 退化到 X’：X ← X’。这是希望在下一次迭代中能够达到一个新的峰值，而向 X’ 的转换只是一个中间步骤。我们可以将其视为一个探索步骤，该步骤在搜索空间中探索
    X 附近的区域。
- en: 5b. If *r* > ![$$ {e}^{\frac{\Delta  }{\sigma }} $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq3.png),
    then the algorithm doesn’t update X.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 5b. 如果 *r* > ![$$ {e}^{\frac{\Delta  }{\sigma }} $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq3.png)，则算法不更新
    X。
- en: The closer f(X) is to f(X’), the more likely an exploration step would be taken.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: f(X) 越接近 f(X’)，探索步骤被采取的可能性就越大。
- en: Steps from 2 to 5 are repeated *n* times. Figure [3-8](#Fig8) demonstrates the
    annealing algorithm flow.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 从 2 到 5 的步骤重复 *n* 次。图 [3-8](#Fig8) 展示了退火算法流程。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig8_HTML.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig8_HTML.png)'
- en: Figure 3-8
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-8
- en: Annealing algorithm flow
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 退火算法流程
- en: The essence of the annealing algorithm is to get to the “hills” of the surface
    of the black-box function *f* and study the area of this “hill.” In some cases,
    the algorithm may descend from “hills” hoping to climb to a higher one. The disadvantage
    of this algorithm is that it cannot cover large distances between different “hills”
    of the surface of the function f. Figure [3-9](#Fig9) demonstrates the annealing
    algorithm in action.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 退火算法的本质是到达黑盒函数 *f* 的表面“山丘”并研究这个“山丘”的区域。在某些情况下，算法可能会从“山丘”下降，希望爬到更高的一个。这个算法的缺点是它不能覆盖函数
    f 表面不同“山丘”之间的大距离。图 [3-9](#Fig9) 展示了退火算法的实际操作。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig9_HTML.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig9_HTML.png)'
- en: Figure 3-9
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-9
- en: Annealing algorithm in action
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 退火算法实际操作
- en: 'Here is an example of Anneal Tuner configuration:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 Anneal Tuner 配置的一个示例：
- en: '[PRE17]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Anneal Tuner supports all search space types: `choice`, `choice(nested)`, `randint`,
    `uniform`, `quniform`, `loguniform`, `qloguniform`, `normal`, `qnormal`, `lognormal`,
    and `qlognormal`.'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: Anneal Tuner 支持所有搜索空间类型：`choice`，`choice(nested)`，`randint`，`uniform`，`quniform`，`loguniform`，`qloguniform`，`normal`，`qnormal`，`lognormal`
    和 `qlognormal`。
- en: Listing [3-5](#PC20) illustrates another black-box function `holder_function`,
    based on Holder’s function. We will use it for testing Anneal Tuner performance.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [3-5](#PC20) 展示了基于 Holder 函数的另一个黑盒函数 `holder_function`，我们将用它来测试 Anneal Tuner
    的性能。
- en: '[PRE18]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '`holder_function` can be plotted the following way:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '`holder_function` 可以以下方式绘制：'
- en: '[PRE19]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Figure [3-10](#Fig10) shows the surface of `holder_function` function. This
    surface is much more challenging to explore. It has many hills that are evenly
    spaced on the surface. The highest peaks are in the left corners.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-10](#Fig10) 显示了 `holder_function` 函数的表面。这个表面更具挑战性，表面上有许多均匀分布的“山丘”。最高的峰值在左角。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig10_HTML.jpg)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig10_HTML.jpg)'
- en: Figure 3-10
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-10
- en: Holder’s function
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: Holder 函数
- en: Let’s examine how Anneal Tuner performs optimizing `holder_function` in Listing
    [3-6](#PC22).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查 Anneal Tuner 在列表 [3-6](#PC22) 中如何优化 `holder_function`。
- en: '(Full code is provided in the corresponding file: *ch3/tuners/anneal_tuner/run_experiment.py*.)'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: （完整代码在相应的文件中提供：*ch3/tuners/anneal_tuner/run_experiment.py*。）
- en: 'Picking the Anneal Tuner for the Experiment:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 选择实验的 Anneal Tuner：
- en: '[PRE20]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: After the experiment is completed, we can analyze the progress of the search
    for Anneal Tuner.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 实验完成后，我们可以分析 Anneal Tuner 的搜索进度。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig11_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig11_HTML.jpg)'
- en: Figure 3-11
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-11
- en: 'Anneal Tuner. Generation: 1'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: Anneal Tuner. 生成：1
- en: In Figure [3-11](#Fig11), we can see that Anneal Tuner is starting to study
    the “hills” in the lower-left corner.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [3-11](#Fig11) 中，我们可以看到 Anneal Tuner 正在开始研究左下角的“山丘”。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig12_HTML.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig12_HTML.jpg)'
- en: Figure 3-12
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-12
- en: 'Anneal Tuner. Generation: 2'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: Anneal Tuner. 生成：2
- en: Figure [3-12](#Fig12) demonstrates that the second generation of trials is completely
    focused on the two “hills” in the lower-left corner.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-12](#Fig12) 展示了第二代试验完全集中在左下角的两个“山丘”上。
- en: And as we can see in Figure [3-13](#Fig13), Anneal Tuner is completely concentrated
    on exploring only one “hill.” Anneal Tuner found a local maxima but could not
    find global maxima at the bottom of the left corner, close to the solution Anneal
    Tuner found.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们在图 [3-13](#Fig13) 中所见，热处理调谐器完全专注于探索仅一个“山丘”。热处理调谐器找到了局部最大值，但无法在左下角底部找到全局最大值，接近热处理调谐器找到的解。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig13_HTML.jpg)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig13_HTML.jpg)'
- en: Figure 3-13
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-13
- en: 'Anneal Tuner. Generation: 4'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 热处理调谐器。生成：4
- en: Anneal Tuner and Evolution Tuner are variants of directed random search. They
    are intuitive and straightforward, but they may not always explore the search
    space effectively. Let’s study more advanced tuners based on the Bayesian optimization
    approach.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 热处理调谐器和进化调谐器是定向随机搜索的变体。它们直观且简单，但它们可能并不总是有效地探索搜索空间。让我们研究更多基于贝叶斯优化方法的先进调谐器。
- en: Sequential Model-Based Optimization Tuners
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 序列模型优化调谐器
- en: 'In this section, we will examine tuners that are based on Sequential Model-Based
    Optimization (SMBO). SMBO is a formulation of the Bayesian Optimization approach.
    SMBO implements the following technique: building a probability model p(y|x) of
    the black-box function *f* and use it to pick the most promising elements in the
    search space to evaluate in the black-box function *f*.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将考察基于序列模型优化（SMBO）的调谐器。SMBO 是贝叶斯优化方法的一种表述。SMBO 实现了以下技术：构建黑盒函数 *f* 的概率模型
    p(y|x)，并使用它来挑选搜索空间中最有希望的元素以评估黑盒函数 *f*。
- en: 'Examine the SMBO method in action. Say we have some trial results we obtained:
    (x[1], f(x[1])), (x[2], f(x[2]), (x[3], f(x[3])), as is shown in Figure [3-14](#Fig14).'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 检查 SMBO 方法在实际操作中的表现。假设我们有一些获得的试验结果：(x[1], f(x[1])), (x[2], f(x[2])), (x[3],
    f(x[3])), 如图 [3-14](#Fig14) 所示。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig14_HTML.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig14_HTML.png)'
- en: Figure 3-14
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-14
- en: Trial results
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 试验结果
- en: 'The next step is to create a probability function p(y|x) based on the data:
    (x[1], f(x[1])), (x[2], f(x[2]), (x[3], f(x[3])). p(y|x) is called a “surrogate”
    for the objective (or black-box) function. The surrogate function determines the
    probability distribution of the objective (or black-box) function for any element
    x[i] in the search space. This means that for any x[*i*], we can say that with
    a *p* probability, the value f(x[*i*]) = y[*i*] lies in the (a, b) interval. This
    concept is demonstrated in Figure [3-15](#Fig15).'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是根据数据创建一个概率函数 p(y|x)：(x[1], f(x[1])), (x[2], f(x[2])), (x[3], f(x[3])). p(y|x)
    被称为目标（或黑盒）函数的“代理”。代理函数确定了目标（或黑盒）函数在搜索空间中任何元素 x[i] 的概率分布。这意味着对于任何 x[*i*]，我们可以说以
    *p* 的概率，值 f(x[*i*]) = y[*i*] 落在 (a, b) 区间内。这一概念在图 [3-15](#Fig15) 中得到了演示。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig15_HTML.png)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig15_HTML.png)'
- en: Figure 3-15
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-15
- en: Probability distributions for x[i] and x[j]
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: x[i] 和 x[j] 的概率分布
- en: 'Having surrogate function p(x|y), we can extrapolate it on the whole search
    space. Figure [3-16](#Fig16) gives a visual description of the surrogate model:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有代理函数 p(x|y)，我们可以在整个搜索空间上外推它。图 [3-16](#Fig16) 给出了代理模型的视觉描述：
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig16_HTML.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig16_HTML.png)'
- en: Figure 3-16
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-16
- en: 'Surrogate model for three trials: (x[1], f(x[1])), (x[2], f(x[2])), (x[3],
    f(x[3]))'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 三次试验的代理模型：(x[1], f(x[1])), (x[2], f(x[2])), (x[3], f(x[3]))
- en: Red dashed line shows the actual black-box function.
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 红色虚线表示实际的黑盒函数。
- en: Black solid line shows the expected mean of the surrogate function p(y|x).
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黑色实线表示代理函数 p(y|x) 的期望均值。
- en: Purple dashed line shows the variance of the surrogate function p(y|x).
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 紫色虚线表示代理函数 p(y|x) 的方差。
- en: 'Based on the constructed surrogate model, the SMBO algorithm makes its prediction
    regarding the potential maxima of the black-box function. The next goal of the
    algorithm is to find a higher value of the black-box function than the current
    maximum value f(x[2]). The following trial parameters are determined using the
    Expected Improvement function:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 基于构建的代理模型，SMBO 算法对其黑盒函数的潜在最大值做出预测。算法的下一个目标是找到比当前最大值 f(x[2]) 更高的黑盒函数值。以下试验参数是使用期望改进函数确定的：
- en: EI[y*](x) = ![$$ {\int}_{-\infty}^{+\infty}\max \left({y}^{\ast }-y,0\right)p\left(y|x\right)\  dy
    $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq4.png)
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: EI[y*](x) = ![$$ {\int}_{-\infty}^{+\infty}\max \left({y}^{\ast }-y,0\right)p\left(y|x\right)\  dy
    $$](../images/526245_1_En_3_Chapter/526245_1_En_3_Chapter_TeX_IEq4.png)
- en: If we assume that f(x[*2*]) = y[2], then SMBO will choose x[4] as the next trial
    parameter if the EI[y2](x) will be maximum with x[4]. Figure [3-17](#Fig17) illustrates
    the next trial selection by SMBO algorithm.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们假设 f(x[*2*]) = y[2]，那么 SMBO 将选择 x[4] 作为下一个试验参数，如果 EI[y2](x) 在 x[4] 时达到最大值。图
    [3-17](#Fig17) 说明了 SMBO 算法选择的下一个试验。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig17_HTML.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig17_HTML.png)'
- en: Figure 3-17
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-17
- en: Expected Improvement
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 预期改进
- en: 'After selecting the x[*4*] as the next trial value, we evaluate f(x[*4*]) and
    rebuild the surrogate model concerning the new data: *(x*[*1*]*, f(x*[*1*]*)),
    (x*[*2*]*, f(x*[*2*]*)), (x*[*3*]*, f(x*[*3*]*)), (x*[*4*]*, f(x*[*4*]*))* as
    shown in Figure [3-18](#Fig18).'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择 x[*4*] 作为下一个试验值后，我们评估 f(x[*4*]) 并根据新的数据重建代理模型：*(x*[*1*]*, f(x*[*1*]*)),
    (x*[*2*]*, f(x*[*2*]*)), (x*[*3*]*, f(x*[*3*]*)), (x*[*4*]*, f(x*[*4*]*)))*，如图
    [3-18](#Fig18) 所示。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig18_HTML.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig18_HTML.png)'
- en: Figure 3-18
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-18
- en: 'Surrogate model for four trials: (x[1], f(x[1])), (x[2], f(x[2])), (x[3], f(x[3])),
    (x[4], f(x[4]))'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 四个试验的代理模型：(x[1], f(x[1])), (x[2], f(x[2])), (x[3], f(x[3])), (x[4], f(x[4]))
- en: SMBO aims to converge the surrogate model to the objective function with more
    data, which these approaches do by continually updating the surrogate probability
    model after each objective function evaluation. SMBO Tuners are efficient because
    they choose the next parameters in an informed way.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: SMBO 旨在通过更多数据使代理模型收敛到目标函数，这些方法通过在每次目标函数评估后不断更新代理概率模型来实现。SMBO 调谐器效率高，因为它们以信息化的方式选择下一个参数。
- en: 'SMBO Tuner performs the following steps in a cycle until the maximum number
    of trials is reached:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: SMBO 调谐器在一个周期内执行以下步骤，直到达到试验的最大数量：
- en: Construct surrogate model based on surrogate probability p(y|x).
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于代理概率 p(y|x) 构建代理模型。
- en: Determine next trial parameter x using the Estimated Improvement function.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用估计改进函数确定下一个试验参数 x。
- en: Evaluate black-box function f(x).
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估黑盒函数 f(x)。
- en: Append *(x, f(x))* pair to historical dataset.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 *(x, f(x))* 对添加到历史数据集中。
- en: 'This is the framework for all SMBO Tuners. The only difference between them
    is the p(y|x) function definition. Different SMBO Tuners have different approaches
    to estimating the probability function p(y|x) based on a historical dataset. This
    chapter will cover the following SMBO Tuners: Tree-Structured Parzen Estimator
    Tuner and Gaussian Process Tuner.'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这是所有 SMBO 调谐器的框架。它们之间的唯一区别是 p(y|x) 函数的定义。不同的 SMBO 调谐器根据历史数据集采用不同的方法来估计概率函数 p(y|x)。本章将介绍以下
    SMBO 调谐器：树结构帕累托估计器调谐器和高斯过程调谐器。
- en: Tree-Structured Parzen Estimator Tuner
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 树结构帕累托估计器调谐器
- en: 'The Tree-Structured Parzen Estimator Tuner (TPE) description may take one or
    several separate chapters. In this section, we will describe the main idea behind
    the use of this Tuner:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 树结构帕累托估计器调谐器 (TPE) 的描述可能需要一或几个独立的章节。在本节中，我们将描述使用此调谐器背后的主要思想：
- en: In the beginning, TPE Tuner performs *N* random trials while exploring the search
    space.
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在探索搜索空间的过程中，TPE 调谐器最初进行 *N* 次随机试验。
- en: Next, the Tuner sorts the executed trials by their values ​​and divides them
    into “good” and “bad” groups based on some quantile - γ. The first group, “good”
    group, contains trials that gave the best results and the “bad” one, all other
    trials.
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，调谐器根据某些分位数 - γ 对执行试验进行排序，并将它们分为“良好”组和“不良”组。第一个组，“良好”组，包含给出最佳结果的试验，而“不良”组包含所有其他试验。
- en: Figure [3-19](#Fig19) depicts the TPE model after the first two steps.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-19](#Fig19) 描述了经过前两个步骤后的 TPE 模型。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig19_HTML.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig19_HTML.png)'
- en: Figure 3-19
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-19
- en: TPE Tuner. “Good” and “bad” separation
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: TPE 调谐器。“良好”和“不良”分离
- en: Densities *l*(x) and *g*(x) are calculated using Parzen Estimators (also known
    as kernel density estimators) for “bad” and “good” groups, respectively. Parzen
    Estimators are a simple average of kernels centered on existing data points.
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用帕累托估计器（也称为核密度估计器）分别计算“不良”和“良好”组的密度 *l*(x) 和 *g*(x)。帕累托估计器是现有数据点中心核的平均值。
- en: After, the TPE tuner generates *n* random candidates according to the *g*(x)
    density function. Each of these candidates is sorted by *g*(x)/*l*(x) ratio, and
    the first one is picked as the next trial. This means that the TPE tuner allows
    the selection of random candidates in an area where “good” trials are more common.
    At the same time, all candidates are sorted according to *g*(x)/*l*(x), which
    means that a candidate with a high density of good trials and a low density of
    bad trials will be selected. This approach strikes a good balance between exploration
    and exploitation.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 之后，TPE调优器根据*g*(x)密度函数生成*n*个随机候选者。这些候选者根据*g*(x)/*l*(x)比率排序，第一个被选为下一个试验。这意味着TPE调优器允许在“好”试验更常见的区域选择随机候选者。同时，所有候选者都根据*g*(x)/*l*(x)排序，这意味着具有高密度“好”试验和低密度“坏”试验的候选者将被选中。这种方法在探索和利用之间取得了良好的平衡。
- en: Figure [3-20](#Fig20) illustrates the algorithm of selecting the next trial
    parameter.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-20](#Fig20)说明了选择下一个试验参数的算法。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig20_HTML.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig20_HTML.png)'
- en: Figure 3-20
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-20
- en: TPE Tuner. Next candidate selection
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: TPE调优器。下一个候选选择
- en: Repeat steps 2–5 until maximum number of trials is reached.
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复步骤2-5，直到达到最大试验次数。
- en: 'Here is an example of TPE Tuner configuration:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是TPE调优器配置的一个示例：
- en: '[PRE21]'
  id: totrans-201
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'The following is the description of TPE Tuner parameters:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 以下为TPE调优器的参数描述：
- en: '`tpe_args.constant_liar_type`:'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tpe_args.constant_liar_type`:'
- en: '**Type**: `''best'' | ''worst'' | ''mean'' | null`'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**：`''best'' | ''worst'' | ''mean'' | null`'
- en: '**Default**: `''best''`'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**：`''best''`'
- en: TPE algorithm itself does not support parallel tuning. This parameter specifies
    how to optimize for `trial_concurrency` > 1\. In general, `best` suit for small
    trial number and `worst` suit for large trial number.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: TPE算法本身不支持并行调优。此参数指定如何优化`trial_concurrency` > 1。一般来说，对于试验数量少的情况适用`best`，对于试验数量多的情况适用`worst`。
- en: '`tpe_args.n_startup_jobs`:'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tpe_args.n_startup_jobs`:'
- en: '**Type**: `int`'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**：`int`'
- en: '**Default**`: 20`'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**：`20`'
- en: The first *N* random trials are generated for warming up in Step 1\. If the
    search space is large, this value should be increased.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步生成前*N*个随机试验用于预热。如果搜索空间很大，这个值应该增加。
- en: '`tpe_args.n_ei_candidates`:'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tpe_args.n_ei_candidates`:'
- en: '**Type**: `int`'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**：`int`'
- en: '**Default**: `24`'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**：`24`'
- en: '*n* random candidates generated in Step 4.'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步生成的*n*个随机候选者。
- en: '`tpe_args.linear_forgetting`:'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tpe_args.linear_forgetting`:'
- en: '**Type**: `int`'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**：`int`'
- en: '**Default**: `25`'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**：`25`'
- en: TPE lowers the weights of old trials. This parameter controls how many iterations
    it takes for a trial to start decay.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: TPE降低旧试验的权重。此参数控制试验开始衰减所需的迭代次数。
- en: '`tpe_args.prior_weight`:'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tpe_args.prior_weight`:'
- en: '**Type**: `float`'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**：`float`'
- en: '**Default**: `1.0`'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**：`1.0`'
- en: Determines the weight of trial configuration in the history trial configurations.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 确定历史试验配置中试验配置的权重。
- en: '`tpe_args.gamma`:'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tpe_args.gamma`:'
- en: '**Type**: `float`'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**：`float`'
- en: '**Default**: `0.25`'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**：`0.25`'
- en: Controls how many trials are considered “good.” Represents γ parameter from
    Step 2.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 控制多少个试验被认为是“好”的。代表步骤2中的γ参数。
- en: Note
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: TPE Tuner configuration parameters mentioned above are only valid from NNI version
    2.6\. They will not work on previous versions.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 上述TPE调优器配置参数仅适用于NNI版本2.6。它们在之前的版本中不会工作。
- en: 'TPE Tuner supports all search space types: `choice`, `choice(nested)`, `randint`,
    `uniform`, `quniform`, `loguniform`, `qloguniform`, `normal`, `qnormal`, `lognormal`,
    and `qlognormal`.'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: TPE调优器支持所有搜索空间类型：`choice`，`choice(nested)`，`randint`，`uniform`，`quniform`，`loguniform`，`qloguniform`，`normal`，`qnormal`，`lognormal`，和`qlognormal`。
- en: We can see from Listing [3-7](#PC24) how TPE Tuner performs optimizing `holder_function`.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从列表[3-7](#PC24)中看到TPE调优器是如何优化`holder_function`的。
- en: '(Full code is provided in the corresponding file: *ch3/tuners/tpe_tuner/run_experiment.py*.)'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: （完整代码在相应的文件中提供：*ch3/tuners/tpe_tuner/run_experiment.py*。）
- en: 'Setting the TPE Tuner for the Experiment:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 为实验设置TPE调优器：
- en: '[PRE22]'
  id: totrans-233
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: After the experiment is completed, we can analyze the progress of the search
    for TPE Tuner.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 实验完成后，我们可以分析TPE调优器的搜索进度。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig21_HTML.jpg)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig21_HTML.jpg)'
- en: Figure 3-21
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-21
- en: 'TPE Tuner. Generation: 1'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: TPE调优器。生成：1
- en: 'Figure [3-21](#Fig21) shows that the distribution of points is more like a
    random scattering, which makes sense because, in the tuner setup, we specified
    `''n_startup_jobs'': 20`, which means that the first 20 trials will be completely
    random.'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: '图 [3-21](#Fig21) 显示，点的分布更像是随机散布，这在调谐器设置中是有意义的，因为我们指定了 `''n_startup_jobs'':
    20`，这意味着前 20 次试验将是完全随机的。'
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig22_HTML.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig22_HTML.jpg)'
- en: Figure 3-22
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-22
- en: TPE Tuner. Last generation
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: TPE Tuner. 上一个生成
- en: But as we see in Figure [3-22](#Fig22), the TPE Tuner finds the global maxima
    of `holder_function`, thanks to a probabilistic exploration model.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 但正如我们在图 [3-22](#Fig22) 中看到的那样，TPE Tuner 由于概率探索模型，找到了 `holder_function` 的全局最大值。
- en: The TPE Tuner is intuitively clear, based on a solid probability ground, and
    has a good balance between exploration and exploitation policy. Another nice feature
    is that it supports `choice(nested)` search type, which can be critical in some
    research.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: TPE Tuner 直观易懂，基于坚实的概率基础，并且在探索和利用策略之间取得了良好的平衡。另一个优点是它支持 `choice(nested)` 搜索类型，这在某些研究中可能至关重要。
- en: Gaussian Process Tuner
  id: totrans-244
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高斯过程 Tuner
- en: 'Gaussian Process (GP) Tuner is another SMBO Tuner based on Multivariate Normal
    Distribution. This tuner is similar to the TPE Tuner but uses a Gaussian distribution
    to build the p(y|x) surrogate. A full description of this method lies outside
    of this book, but the reader can learn how this method works here:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯过程 (GP) Tuner 是基于多元正态分布的另一种 SMBO Tuner。此 Tuner 与 TPE Tuner 类似，但使用高斯分布来构建 p(y|x)
    代理。此方法的完整描述超出了本书的范围，但读者可以在此处了解此方法的工作原理：
- en: '“Using Gaussian Processes to Optimize Expensive Functions”: [`https://citeseerx.ist.psu.edu/viewdoc/download?doi=10.1.1.139.9315&rep=rep1&type=pdf`](https://citeseerx.ist.psu.edu/viewdoc/download%253Fdoi%253D10.1.1.139.9315%2526rep%253Drep1%2526type%253Dpdf)'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “使用高斯过程优化昂贵函数”：[`https://citeseerx.ist.psu.edu/viewdoc/download?doi=10.1.1.139.9315&rep=rep1&type=pdf`](https://citeseerx.ist.psu.edu/viewdoc/download%253Fdoi%253D10.1.1.139.9315%2526rep%253Drep1%2526type%253Dpdf)
- en: '“Gaussian Processes and Bayesian Optimization”: [`www.cs.cornell.edu/courses/cs4787/2019sp/notes/lecture16.pdf`](http://www.cs.cornell.edu/courses/cs4787/2019sp/notes/lecture16.pdf)'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “高斯过程与贝叶斯优化”：[`www.cs.cornell.edu/courses/cs4787/2019sp/notes/lecture16.pdf`](http://www.cs.cornell.edu/courses/cs4787/2019sp/notes/lecture16.pdf)
- en: 'Here is an example of GP Tuner configuration:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 GP Tuner 配置的示例：
- en: '[PRE23]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'The following is the description of GP Tuner parameters:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是对 GP Tuner 参数的描述：
- en: '`utility`:'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`utility`:'
- en: '**Type**: `''ei'' | ''ucb'' | ''poi''`'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `''ei'' | ''ucb'' | ''poi''`'
- en: '**Default**: `''ei''`'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `''ei''`'
- en: The utility functions `ei`, `ucb`, and `poi` correspond to Expected Improvement,
    Upper Confidence Bound, and Probability of Improvement, respectively.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 效用函数 `ei`、`ucb` 和 `poi` 分别对应期望改进、上置信界和改进概率。
- en: '`kappa`:'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kappa`:'
- en: '**Type**: `float`'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `float`'
- en: '**Default**: `5`'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `5`'
- en: Used by the `ucb` utility function. The bigger the `kappa` is, the more exploratory
    the tuner will be.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 由 `ucb` 效用函数使用。`kappa` 越大，Tuner 的探索性越强。
- en: '`xi`:'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`xi`:'
- en: '**Type**: `float`'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `float`'
- en: '**Default**: `0`'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `0`'
- en: Used by the `ei` and `poi` utility functions. The bigger the `xi` is, the more
    exploratory the tuner will be.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 由 `ei` 和 `poi` 效用函数使用。`xi` 越大，Tuner 的探索性越强。
- en: '`nu`:'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`nu`:'
- en: '**Type**: `float`'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `float`'
- en: '**Default**: `2.5`'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `2.5`'
- en: Sets the Matern kernel. The smaller the nu is, the less smooth the approximated
    function will be.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 设置 Matern 内核。nu 越小，近似函数越不光滑。
- en: '`alpha`:'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`alpha`:'
- en: '**Type**: `float`'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `float`'
- en: '**Default**: `1e-6`'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `1e-6`'
- en: Sets the Gaussian Process Regressor. Larger values correspond to an increased
    noise level in the observations.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 设置高斯过程回归器。较大的值对应于观察中的增加噪声水平。
- en: '`cold_start_num`:'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cold_start_num`:'
- en: '**Type**: `int`'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `int`'
- en: '**Default**: `10`'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `10`'
- en: Number of random explorations to perform before the Gaussian Process.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 在高斯过程之前执行的随机探索次数。
- en: '`selection_num_warm_up`:'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`selection_num_warm_up`:'
- en: '**Type**: `int`'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `int`'
- en: '**Default**: `1e5`'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `1e5`'
- en: Number of random points to evaluate when getting the point which maximizes the
    acquisition function.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 获取最大化获取函数的点时评估的随机点数。
- en: '`selection_num_starting_points`:'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`selection_num_starting_points`:'
- en: '**Type**: `int`'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '**类型**: `int`'
- en: '**Default**: `250`'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: '**默认值**: `250`'
- en: Number of times to run L-BFGS-B from a random starting point after the warm-up.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 在预热之后从随机起点运行 L-BFGS-B 的次数。
- en: 'GP Tuner supports the following search space types: `choice`, `randint`, `uniform`,
    `quniform`, `loguniform`, and `qloguniform`.'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: GP Tuner 支持以下搜索空间类型：`choice`、`randint`、`uniform`、`quniform`、`loguniform` 和 `qloguniform`。
- en: GP Tuner suffers a lot from parallelization issues. If you run an experiment
    in concurrency mode (i.e., `trial_concurrency` > 1), multiple processes simultaneously
    decide on their next trial candidate based on the same historical data. Therefore,
    different processes are testing the same parameters at the same time. This is
    a big problem with all SMBO tuners. But TPE Tuner can get around this problem
    with the Constant Liar technique, while for GP Tuner, this problem remains serious.
    In Figure [3-23](#Fig23), we can see the Trial Metric panel for GP Tuner with
    `trial_concurrency = 8`. It shows that GP Tuner contains chunks of the same trials,
    which does not speed up the process of exploring the search space in any way.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: GP Tuner在并行化问题上遭受了很多困扰。如果你以并发模式（即`trial_concurrency` > 1）运行实验，多个进程会同时根据相同的历史数据决定它们的下一个试验候选者。因此，不同的进程会在同一时间测试相同的参数。这是所有SMBO调谐器的一个大问题。但是，TPE
    Tuner可以通过常数谎言技术绕过这个问题，而对于GP Tuner，这个问题仍然非常严重。在图[3-23](#Fig23)中，我们可以看到`trial_concurrency
    = 8`时的GP Tuner的试验指标面板。它显示GP Tuner包含相同试验的块，这并不能以任何方式加快探索搜索空间的过程。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig23_HTML.jpg)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig23_HTML.jpg)'
- en: Figure 3-23
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-23
- en: GP Tuner. Concurrency issue
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: GP Tuner. 并发问题
- en: Listing [3-8](#PC26) implements GP Tuner for `holder_function` optimization
    task.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[3-8](#PC26)实现了`holder_function`优化任务的GP Tuner。
- en: '(Full code is provided in the corresponding file: *ch3/tuners/gp_tuner/run_experiment.py*.)'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: （完整的代码在相应的文件中提供：*ch3/tuners/gp_tuner/run_experiment.py*。）
- en: 'Disabling concurrency:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 禁用并发：
- en: '[PRE24]'
  id: totrans-291
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Setting the GP Tuner for the Experiment:'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 设置实验的GP Tuner：
- en: '[PRE25]'
  id: totrans-293
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: GP Tuner shows excellent results. Figure [3-24](#Fig24) shows the coordinates
    of all trials during the experiment. GP Tuner found both global maxima and evenly
    explored the entire search space.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: GP Tuner表现出色。图[3-24](#Fig24)显示了实验期间所有试验的坐标。GP Tuner找到了全局最大值，并且均匀地探索了整个搜索空间。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig24_HTML.jpg)'
  id: totrans-295
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig24_HTML.jpg)'
- en: Figure 3-24
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-24
- en: GP Tuner. Holder’s black-box function optimization
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: GP Tuner. Holder的黑色盒函数优化
- en: GP Tuner suggests taking search space elements to find a suitable solution in
    a small number of black-box function evaluations. GP Tuner carries about the surrogate
    model instead of the black-box function itself, using the conjugate gradient method
    to find the highest expected improvement candidates. GP Tuner shows good exploratory
    behavior in testing out areas that seem promising under the current surrogate
    model.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: GP Tuner建议通过搜索空间元素在少量黑盒函数评估中找到合适的解决方案。GP Tuner关注的是代理模型而不是黑盒函数本身，使用共轭梯度法找到最高期望改进的候选者。GP
    Tuner在测试当前代理模型下看似有希望的领域时表现出良好的探索行为。
- en: Which Tuner to Choose?
  id: totrans-299
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择哪个调谐器？
- en: 'In this section, we’ve put a lot of effort into learning about the different
    tuners, and the fair question might be: *Hey, so which tuner should I choose?*
    And the answer to this question is disappointing: according to the **No Free Lunch
    Theorem**, which we already considered in Chapter [1](526245_1_En_1_Chapter.xhtml),
    ***there is no search algorithm (Tuner) that would have any advantages over other
    Tuners for an arbitrary search space***. Indeed, for an arbitrary search space,
    the expectation of the TPE Tuner does not exceed the Random Tuner expectation.
    So why do we need any Tuners at all if all of them are equal to Random Tuner on
    an arbitrary search space?!'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们投入了大量精力来了解不同的调谐器，一个公平的问题可能是：*嘿，所以我应该选择哪个调谐器呢？* 对于这个问题，答案是令人失望的：根据**无免费午餐定理**，我们在第[1](526245_1_En_1_Chapter.xhtml)章中已经考虑过，***没有搜索算法（调谐器）会在任意搜索空间上比其他调谐器有优势***。确实，对于任意搜索空间，TPE
    Tuner的期望值并不超过随机调谐器的期望值。那么，如果所有调谐器在任意搜索空间上都与随机调谐器相等，我们为什么还需要任何调谐器呢？！
- en: 'And the answer is as follows: search spaces have a specific structure and dependencies
    that allow certain Tuners to outperform others for many kinds of problems. Therefore,
    if we know that we are optimizing a model for an image classification problem,
    this can give us some insight into the search space structure. Consequently, we
    can choose a Tuner that is more likely to show good results than others.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 答案如下：搜索空间具有特定的结构和依赖关系，这使得某些调谐器在许多类型的问题上优于其他调谐器。因此，如果我们知道我们正在为图像分类问题优化模型，这可以让我们对搜索空间结构有所了解。因此，我们可以选择一个更有可能比其他调谐器显示出好结果的调谐器。
- en: 'There is a separate area of ​​research in which scientists arrange battles
    of search algorithms to determine the best one for a particular class of problems.
    Scientists use benchmarks to estimate the characteristics of the search algorithm.
    The benchmark algorithm evaluates the search algorithm several times for different
    search spaces. For example, the benchmark pseudo-code might look like this:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个独立的研究领域，科学家们通过安排搜索算法的较量来确定特定问题类别的最佳算法。科学家们使用基准来估计搜索算法的特性。基准算法会对不同搜索空间进行多次搜索算法评估。例如，基准伪代码可能看起来像这样：
- en: '[PRE26]'
  id: totrans-303
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: In Table [3-1](#Tab1), I provide a sample benchmark result obtained using NNI
    [`https://nni.readthedocs.io/en/v2.7/hpo/hpo_benchmark_stats.html`](https://nni.readthedocs.io/en/v2.7/hpo/hpo_benchmark_stats.html).
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 在表 [3-1](#Tab1) 中，我提供了使用NNI获得的样本基准结果，请参阅[https://nni.readthedocs.io/en/v2.7/hpo/hpo_benchmark_stats.html](https://nni.readthedocs.io/en/v2.7/hpo/hpo_benchmark_stats.html)。
- en: Table 3-1
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3-1
- en: Average rankings for classification tasks
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 分类任务的平均排名
- en: '| Tuner Name | Average Ranking |'
  id: totrans-307
  prefs: []
  type: TYPE_TB
  zh: '| Tuner 名称 | 平均排名 |'
- en: '| --- | --- |'
  id: totrans-308
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| GP Tuner | 4.00 |'
  id: totrans-309
  prefs: []
  type: TYPE_TB
  zh: '| GP Tuner | 4.00 |'
- en: '| Evolution | 4.22 |'
  id: totrans-310
  prefs: []
  type: TYPE_TB
  zh: '| 进化 | 4.22 |'
- en: '| Anneal | 4.39 |'
  id: totrans-311
  prefs: []
  type: TYPE_TB
  zh: '| 退火 | 4.39 |'
- en: '| TPE | 4.67 |'
  id: totrans-312
  prefs: []
  type: TYPE_TB
  zh: '| TPE | 4.67 |'
- en: '| Random | 5.33 |'
  id: totrans-313
  prefs: []
  type: TYPE_TB
