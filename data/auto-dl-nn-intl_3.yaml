  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [3-6](#Fig6) 中，我们看到大多数个体已经处于红色区域，这意味着种群正在平稳地向函数的最高值移动。图 [3-7](#Fig7) 中显示的最后一代至少有一个个体位于红色区域的顶部。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig7_HTML.jpg)'
