- en: 'The best Trial demonstrates **0.89143** accuracy and has the following parameters:'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳试验展示了**0.89143**的准确率，并具有以下参数：
- en: '[PRE91]'
  id: totrans-592
  prefs: []
  type: TYPE_PRE
  zh: '[PRE91]'
- en: 'The best Trial can be converted to the functional pipeline:'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳试验可以转换为功能管道：
- en: '[PRE92]'
  id: totrans-594
  prefs: []
  type: TYPE_PRE
  zh: '[PRE92]'
- en: 'In fact, the classifier we have built shows very good results, which are close
    to optimal. The best classifier for this model performs with the following accuracy:
    `0.898` (“Multi-Task Architecture with Attention for Imaging Atmospheric Cherenkov
    Telescope Data Analysis,” [`www.scitepress.org/Papers/2021/102974/102974.pdf`](http://www.scitepress.org/Papers/2021/102974/102974.pdf)).
    We have just built the custom AutoML toolkit based on NNI. This approach can also
    be applied to any functional pipeline optimization. Similarly, you can automatically
    design deep learning models with a sequential layer layout. Indeed, operator space
    can consist of deep learning layers, and the model can be a neural network based
    on the sequence of layers pipeline. Of course, we could dive deeper into applying
    this approach to Neural Architecture Search, but it has significant drawbacks,
    which we will discuss in the next section.'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我们构建的分类器显示出非常好的结果，接近最优。对于这个模型的最佳分类器具有以下准确度：`0.898`（《用于成像大气切伦科夫望远镜数据分析的多任务架构与注意力机制》，[www.scitepress.org/Papers/2021/102974/102974.pdf](http://www.scitepress.org/Papers/2021/102974/102974.pdf))。我们刚刚基于NNI构建了定制的AutoML工具包。这种方法也可以应用于任何功能管道优化。同样，你可以自动设计具有顺序层布局的深度学习模型。确实，操作空间可以由深度学习层组成，模型可以是一个基于层序列管道的神经网络。当然，我们可以更深入地探讨将这种方法应用于神经网络架构搜索，但它有显著的缺点，我们将在下一节讨论。
- en: Limits of HPO Applying to Neural Architecture Search
  id: totrans-596
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将HPO应用于神经网络架构搜索的局限性
- en: The approach described in this section can be successfully applied to the search
    for neural network architectures but with a significant limitation. Using HPO
    techniques described in this section, we can only get an architecture with a sequential
    layer stack, that is, an architecture in which each layer connects to another
    one sequentially. This is a significant limitation since many modern neural network
    architectures use multiple connections between their layers, as shown in Figure
    [3-42](#Fig42).
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 本节中描述的方法可以成功应用于神经网络架构的搜索，但有一个显著的局限性。使用本节中描述的HPO技术，我们只能得到一个具有顺序层堆叠的架构，即每个层按顺序连接到另一个层的架构。这是一个显著的局限性，因为许多现代神经网络架构在其层之间使用多个连接，如图[3-42](#Fig42)所示。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig42_HTML.png)'
  id: totrans-598
  prefs: []
  type: TYPE_IMG
  zh: '![图3-42](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig42_HTML.png)'
- en: Figure 3-42
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-42
- en: Multi-connected neural network
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 多连接神经网络
- en: We need some different and special techniques to search for efficient neural
    network architectures. And we will begin to explore them in the next chapter.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一些不同且特殊的技巧来搜索高效的神经网络架构。我们将在下一章开始探索它们。
- en: Hyperparameters for Hyperparameter Optimization
  id: totrans-602
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 超参数优化中的超参数
- en: When we talked about automated deep learning, we mentioned that AutoDL solves
    the problem of finding optimal architectures and hyperparameters. But each AutoDL
    technique has many parameters on its own! For example, we need to define the search
    space, a maximum number of trials, find a suitable Tuner, define Tuner parameters,
    etc. It turns out that the problem that solves the hyperparameter selection problem
    itself has even more hyperparameters! What is the point of using the HPO approach
    and other AutoDL methods then? This is a fair question. The answer is that even
    a poorly configured HPO Experiment produces a significantly better model than
    a model with a poorly configured architecture or hyperparameters. We can never
    be sure in advance what the best settings for an AutoDL method are. However, we
    can be confident that the AutoDL method will surely produce a model close to the
    optimal one and significantly better than the one we would build manually.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈论自动深度学习时，我们提到AutoDL解决了寻找最佳架构和超参数的问题。但每个AutoDL技术本身都有许多参数！例如，我们需要定义搜索空间、最大尝试次数、找到一个合适的Tuner、定义Tuner参数等。结果发现，解决超参数选择问题的本身甚至有更多的超参数！那么使用HPO方法和其他AutoDL方法的意义在哪里呢？这是一个合理的问题。答案是，即使配置不佳的HPO实验也能产生比配置不佳的架构或超参数的模型显著更好的模型。我们永远无法提前确定AutoDL方法的最佳设置。然而，我们可以确信，AutoDL方法肯定会产生一个接近最优的模型，并且比我们手动构建的模型要好得多。
- en: Summary
  id: totrans-604
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 摘要
- en: 'This chapter has taken a deep dive into Tuner internals and various black-box
    function optimization algorithms. Understanding the principles of Tuners’ behavior
    and their practical application can remarkably improve the design of NNI experiments
    and HPO results. In the next chapter, we’ll move on to the most exciting and interesting
    part of our book: Neural Architecture Search. We will study the latest techniques
    to find the optimal design of neural networks for a specific task.'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 本章深入探讨了调谐器内部结构和各种黑盒函数优化算法。理解调谐器行为的原则及其实际应用可以显著提升 NNI 实验设计和 HPO 结果的设计。在下一章中，我们将继续探讨我们书籍中最激动人心和有趣的部分：神经架构搜索。我们将研究寻找特定任务中神经网络最优设计的最新技术。
