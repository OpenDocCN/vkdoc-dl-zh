- en: 3. Hyperparameter Optimization Under Shell
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 在Shell下进行超参数优化
- en: In the previous chapter, we saw that simple HPO techniques could produce very
    impressive results. Hyperparameter Optimization not only optimizes a specific
    model for a dataset but can even construct new architectures. But the fact is
    that we have used an elementary set of tools for HPO tasks so far. Indeed, up
    to this point, we have only used the primitive Random Search Tuner and Grid Search
    Tuner. We learned from the previous chapter that search spaces could contain millions
    and hundreds of millions of parameters. And if we had unlimited time, we could
    always use the Grid Search Tuner. But unfortunately, this approach is not applicable
    in reality. We need Tuners that strike a good balance between speed and quality
    in finding the best hyperparameters. Another helpful technique is Early Stopping
    algorithms. Early Stopping algorithms analyze the model training process based
    on intermediate results and decide whether to continue training or stop it to
    save time.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们看到了简单的 HPO 技术可以产生非常令人印象深刻的结果。超参数优化不仅优化了数据集的特定模型，甚至可以构建新的架构。但事实是，到目前为止，我们一直使用的是一组基本的工具进行
    HPO 任务。确实，到目前为止，我们只使用了原始的随机搜索调谐器和网格搜索调谐器。我们从上一章了解到，搜索空间可能包含数百万甚至数十亿个参数。如果我们有无限的时间，我们总是可以使用网格搜索调谐器。但不幸的是，这种方法在现实中并不适用。我们需要在寻找最佳超参数的速度和质量之间取得良好平衡的调谐器。另一种有用的技术是早期停止算法。早期停止算法基于中间结果分析模型训练过程，并决定是否继续训练或停止以节省时间。
- en: This chapter will study various HPO Tuners and tell about their basic features.
    We will explore the use of Early Stopping algorithms that speed up the experiment
    stopping trials with an unpromising training process. And also, consider creating
    a custom HPO Tuner for a particular task. This chapter will greatly enhance the
    practical application of the Hyperparameter Optimization approach.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将研究各种 HPO 调谐器，并介绍它们的基本特性。我们将探讨使用早期停止算法来加速具有无望训练过程的实验停止试验。此外，考虑为特定任务创建自定义 HPO
    调谐器。本章将极大地增强超参数优化方法的实际应用。
- en: Tuners
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调谐器
- en: We begin this chapter by examining the various HPO Tuners. As you remember,
    Tuner receives metrics from Trial after evaluating a particular search space parameter.
    Based on the existing result history of all completed Trials, Tuner decides which
    hyperparameter configuration to test next. The main task of the Tuner is to find
    the best hyperparameters as quickly as possible. The choice of a suitable tuner
    can significantly improve the result of an experiment. Let’s take a closer look
    at how Random Search Tuner and Grid Search Tuner act.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从考察各种超参数优化（HPO）调谐器开始本章。正如你记得的那样，调谐器在评估特定搜索空间参数后从试验中接收指标。基于所有已完成试验的现有结果历史，调谐器决定下一个要测试的超参数配置。调谐器的主要任务是尽可能快地找到最佳超参数。选择合适的调谐器可以显著提高实验结果。让我们更详细地看看随机搜索调谐器和网格搜索调谐器是如何工作的。
- en: Consider a two-variable black-box function which is expressed in Listing [3-1](#PC1).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个用列表 [3-1](#PC1) 表达的两个变量黑盒函数。
- en: '[PRE0]'
  id: totrans-6
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'I deliberately do not give an analytical formula for this function. `black_box_f1`
    is just a black-box function, and we know nothing about its internal logic. In
    real life, black-box functions have the following properties:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我故意没有给出这个函数的解析公式。`black_box_f1` 只是一个黑盒函数，我们对它的内部逻辑一无所知。在现实生活中，黑盒函数具有以下特性：
- en: They are not continuous
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们不是连续的
- en: They have random noise
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们有随机噪声
- en: 'All black-box functions that we will examine in this chapter will satisfy these
    properties. But anyway, we can cheat a little and plot this function:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本章我们将考察的所有黑盒函数都将满足这些特性。但无论如何，我们可以稍微作弊一下，绘制这个函数：
- en: '[PRE1]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Figure [3-1](#Fig1) shows that the red area is where the black-box function
    `black_box_f1` reaches its maximum values.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-1](#Fig1) 显示了红色区域是黑盒函数 `black_box_f1` 达到最大值的地方。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig1_HTML.jpg)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig1_HTML.jpg)'
- en: Figure 3-1
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-1
- en: Black-box function plot
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒函数绘图
- en: Note
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: In this chapter, we will examine only problems of finding the maxima of the
    black-box function ***f***. The problem of finding the maxima of the function
    f is equivalent to the problem of finding the minima of the function -***f***.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将仅考察寻找黑盒函数 ***f*** 的最大值的问题。寻找函数 f 的最大值问题等价于寻找函数 -***f*** 的最小值问题。
- en: 'Of course, it would be great to be able to visualize a black-box function before
    research, but there are two main problems here:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，在研究之前能够可视化黑盒函数将是非常好的，但这里有两个主要问题：
- en: Most of the black-box functions have a large number of variables.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数黑盒函数都有大量的变量。
- en: Calculating one function value with specific parameters can take minutes and
    even hours.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用特定参数计算一个函数值可能需要几分钟甚至几小时。
- en: Therefore, of course, the choice of a Tuner has great importance. Let’s take
    a look at how Random Search Tuner explores the `black_box_f1` function. We are
    implementing an embedded experiment to visualize the trial parameters that the
    tuner has selected during the experiment in Listing [3-2](#PC3).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当然，选择调优器非常重要。让我们看看随机搜索调优器是如何探索`black_box_f1`函数的。我们正在实施一个嵌入式实验，以可视化在列表[3-2](#PC3)中实验期间调优器选择的试验参数。
- en: 'We import necessary modules:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们导入必要的模块：
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The search space for `black_box_f1` contains all integer pairs in [-10, 10]
    × [-10, 10]. There are 441 elements in the search space.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '`black_box_f1`的搜索空间包含[-10, 10] × [-10, 10]中的所有整数对。搜索空间中有441个元素。'
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The experiment will have 100 trials:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 实验将有100次试验：
- en: '[PRE4]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We pick Random Search Tuner
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们选择随机搜索调优器
- en: '[PRE5]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'and start the experiment:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 并开始实验：
- en: '[PRE6]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Next, we define the main event loop:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义主要事件循环：
- en: '[PRE7]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'When the experiment is finished, we display all the trials that were created
    during the experiment:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 当实验完成后，我们显示实验期间创建的所有试验：
- en: '[PRE8]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Let’s examine all the trials that Random Search Tuner generated during the experiment
    in Listing [3-2](#PC3).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查在列表[3-2](#PC3)中实验期间随机搜索调优器生成的所有试验。
- en: Figure [3-2](#Fig2) shows that the trials generated by Random Search Tuner are
    simple random dots scattering. In some cases, the dot (trial) may successfully
    fall into the area of maximum values, but in many cases, the area of maximum values
    ​​remains unexplored properly.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-2](#Fig2)显示了随机搜索调优器生成的试验是简单的随机点散布。在某些情况下，点（试验）可能成功地落入最大值区域，但在许多情况下，最大值区域仍未得到适当的探索。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig2_HTML.jpg)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig2_HTML.jpg)'
- en: Figure 3-2
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-2
- en: Random Search Tuner Trials
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 随机搜索调优器试验
- en: Let’s now look at the trials that the Grid Search Tuner generates by exploring
    the `black_box_f1` function in Listing [3-3](#PC10).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看网格搜索调优器通过探索列表[3-3](#PC10)中的`black_box_f1`函数生成的试验。
- en: '[PRE9]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'The Grid Search experiment looks much like the Random Search experiment in
    Listing [3-2](#PC3). We only use Grid Search Tuner here:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索实验在列表[3-2](#PC3)中看起来与随机搜索实验非常相似。这里我们只使用网格搜索调优器：
- en: Figure [3-3](#Fig3) demonstrates the trials generated by the Grid Search Tuner.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-3](#Fig3)展示了网格搜索调优器生成的试验。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig3_HTML.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig3_HTML.jpg)'
- en: Figure 3-3
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-3
- en: Grid Search Tuner Trials
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索调优器试验
- en: We see that the Grid Search Tuner simply iterates through all the values ​​in
    the search space in a particular order. This approach can be helpful when dealing
    with a small search space when it is possible to iterate over all the values ​​in
    the search space. Otherwise, the trials generated by Grid Search Tuner may not
    even get close to the area of maximum values ​​of the black-box function.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到网格搜索调优器只是以特定顺序遍历搜索空间中的所有值。当可能遍历搜索空间中的所有值时，这种方法对于处理小搜索空间是有帮助的。否则，网格搜索调优器生成的试验可能甚至无法接近黑盒函数的最大值区域。
- en: The main problem with Random and Grid tuners is that they don’t interact with
    their trial results in any way. They do not have any “memory” that would allow
    them to highlight promising areas in the search space and concentrate their search
    on them. We will now begin to study tuners that have “memory” and which can explore
    the search space more efficiently.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 随机和网格调优器的主要问题在于它们以任何方式都不与它们的试验结果交互。它们没有任何“记忆”，这会允许它们突出搜索空间中的有希望的区域，并将搜索集中在这些区域上。我们现在将开始研究具有“记忆”并能更有效地探索搜索空间的调优器。
- en: Evolution Tuner
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进化调优器
- en: 'Evolution Tuner search is based on the principles of natural evolution. It
    implements two fundamental principles of evolution: selection and mutation. Evolution
    Tuner initializes a population of a specific size. Each population individual
    represents a particular set of parameters in the search space. Each individual
    has a fitness property that indicates the Trial result. We say that individual
    `A` is better than individual `B`:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 进化调谐器的搜索基于自然进化的原理。它实现了进化的两个基本原理：选择和变异。进化调谐器初始化一个特定大小的种群。每个种群个体代表搜索空间中特定的一组参数。每个个体都有一个表示试验结果的适应度属性。我们说个体
    `A` 比个体 `B` 更好：
- en: If `A.fitness` > `B.fitness` when the Tuner runs in maximization mode
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当调谐器在最大化模式下运行时，如果 `A.fitness` > `B.fitness`
- en: If `A.fitness` < `B.fitness` when the Tuner runs in minimization mode
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当调谐器在最小化模式下运行时，如果 `A.fitness` < `B.fitness`
- en: Evolution Tuner takes the best individual from a random pair of individuals
    and mutates it randomly by replacing the value of its parameter with another value
    from the search space. After that, the mutated individual replaces the original
    one, and the process is repeated again. Figure [3-4](#Fig4) illustrates this search
    principle.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 进化调谐器从随机配对的个体中选取最佳个体，并通过随机替换其参数值来对其进行随机变异。之后，变异个体替换原始个体，然后重复此过程。图 [3-4](#Fig4)
    展示了这一搜索原理。
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig4_HTML.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig4_HTML.png)'
- en: Figure 3-4
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-4
- en: Evolution Tuner
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 进化调谐器
- en: One of the big problems with Evolution Tuner is that mutation doesn’t always
    improve an individual’s fitness. Mutation operation only executes a random change
    in parameter values, and usually, mutation degrades an individual’s performance.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 进化调谐器的一个大问题在于变异并不总是能提高个体的适应度。变异操作仅执行参数值的随机变化，通常变异会降低个体的性能。
- en: Note
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The experienced reader may notice that evolutionary algorithms based on the
    principles of natural selection have another key method – *crossover*. But many
    studies show that most evolutionary problems can be solved without the *crossover*
    operation. This implementation of Evolution Tuner does not contain *crossover*
    operation.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 经验丰富的读者可能会注意到，基于自然选择原理的进化算法还有一个关键方法——*交叉*。但许多研究表明，大多数进化问题可以在没有 *交叉* 操作的情况下解决。这个进化调谐器的实现不包含
    *交叉* 操作。
- en: 'Here is an example of Evolution Tuner configuration:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是进化调谐器配置的一个示例：
- en: '[PRE10]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Evolution Tuner supports all search space types: `choice`, `choice(nested)`,
    `randint`, `uniform`, `quniform`, `loguniform`, `qloguniform`, `normal`, `qnormal`,
    `lognormal`, and `qlognormal`.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 进化调谐器支持所有搜索空间类型：`choice`、`choice(nested)`、`randint`、`uniform`、`quniform`、`loguniform`、`qloguniform`、`normal`、`qnormal`、`lognormal`
    和 `qlognormal`。
- en: Let’s take a look at Evolution Tuner in action optimizing `black_box_f1` function
    in Listing [3-4](#PC13).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看进化调谐器在实际中优化列表 [3-4](#PC13) 中的 `black_box_f1` 函数的情况。
- en: '(Full code is provided in the corresponding file: *ch3/tuners/evolution_tuner/run_experiment.py*.)'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: （完整代码在相应的文件中提供：*ch3/tuners/evolution_tuner/run_experiment.py*。）
- en: 'Setting population size:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 设置种群大小：
- en: '[PRE11]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Picking the Evolution Tuner for the Experiment:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 选择实验中的进化调谐器：
- en: '[PRE12]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Unlike Grid Search Tuner and Random Search Tuner, an Evolution Tuner has “memory.”
    That is why it is more attractive to analyze the search process progress. We will
    show the history of the allocation of trial parameters in the search space by
    generations:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 与网格搜索调谐器和随机搜索调谐器不同，进化调谐器有“记忆”。这就是为什么它更有吸引力，可以分析搜索过程进度。我们将通过代数展示搜索空间中试验参数分配的历史：
- en: '**1st generation**: From 1st trial to 25th trial'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第 1 代**：从第 1 次试验到第 25 次试验'
- en: '**2nd generation**: From 26th trial to 50th trial'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第 2 代**：从第 26 次试验到第 50 次试验'
- en: '**3rd generation**: From 51st trial to 75th trial'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第 3 代**：从第 51 次试验到第 75 次试验'
- en: '**4th generation**: From 76th trial to 100th trial'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第 4 代**：从第 76 次试验到第 100 次试验'
- en: 'This approach will allow us to observe the search progress in action:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法将使我们能够观察搜索进度：
- en: '[PRE13]'
