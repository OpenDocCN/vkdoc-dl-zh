  type: TYPE_IMG
  zh: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig50_HTML.png)'
- en: A line graph of value versus date-time indicates the time series of value from
    April 1 to 15, 2014, with a uniform fluctuating waveform. The wave extends between
    20 and 85\. The waves are dense at the crests and the troughs.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 值与日期时间的折线图表示了从2014年4月1日到15日的值的时间序列，具有均匀的波动波形。波的幅度在20到85之间。波峰和波谷处的波密集。
- en: Figure 8-42
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-42
- en: A graph showing anomalies
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 显示异常的图表
- en: Since this dataset has no noise or anomalies and is a normal time-series dataset,
    there are no real anomalies see the following explanation of the datapoints in
    red. You will also find that the model has fit quite well, as the predictions
    align closely with the actual data.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个数据集没有噪声或异常值，是一个正常的时间序列数据集，因此没有真正的异常值。以下是对红色数据点的解释。你也会发现模型拟合得相当好，因为预测与实际数据非常吻合。
- en: You will notice that there are displayed red points in Figure [8-42](#Fig50).
    As in the previous example, this is a result of the thresholding, which assumes
    that the highest reconstruction errors are likely anomalies. If the dataset is
    normal, then it’ll be forced to pick these highest points as anomalies even though
    they are not.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 你会注意到在图[8-42](#Fig50)中显示了红色点。与前面的例子一样，这是由于阈值处理的结果，它假设最高的重建误差很可能是异常值。如果数据集是正常的，那么它将被迫选择这些最高点作为异常值，即使它们并不是。
- en: art_daily_jumpsdown.csv
  id: totrans-374
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: art_daily_jumpsdown.csv
