- en: '[PRE6]'
  id: totrans-285
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Now you can use the predicted dataset and the test dataset to compute the difference
    as diff, which is then passed through vector norms. Calculating the length or
    magnitude of vectors is often required directly as a regularization method in
    machine learning. Then you can sort the scores/diffs and use a cutoff value to
    pick the threshold. This obviously can change as per the parameters you choose,
    particularly the cutoff value, which is 0.999 in Figure [8-33](#Fig38). The figure
    also shows the code to compute the threshold.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可以使用预测数据集和测试数据集来计算差值，记为diff，然后将其通过向量范数传递。计算向量的长度或大小通常在机器学习中直接作为正则化方法使用。然后，您可以对分数/差值进行排序，并使用截止值来选择阈值。这显然可以根据您选择的参数而变化，尤其是截止值，如图[8-33](#Fig38)所示，其值为0.999。该图还显示了计算阈值的代码。
