- en: Ordinarily, there should not be any anomalies in this dataset. The red “anomalies”
    you see in Figure [8-40](#Fig48) are the result of the way we compute what an
    anomaly is. Since we find the 0.999 score and set that as the maximum threshold
    for a normal point, naturally we will have 0.001% of the data being defined as
    anomalies. In a sense, we are forcing these red anomalies to be anomalies.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这个数据集中不应该有任何异常值。你在图[8-40](#Fig48)中看到的红色“异常值”是我们计算异常值的方式的结果。由于我们找到了0.999的分数并将其设置为正常点的最大阈值，因此自然会有0.001%的数据被定义为异常值。从某种意义上说，我们正在迫使这些红色异常值成为异常值。
