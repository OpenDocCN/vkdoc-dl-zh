- en: If you play around with some of the parameters you used, such as number of time_steps,
    threshold cutoffs, epochs of the neural network, batch size, and hidden layer,
    you will see different results.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你调整了一些参数，例如时间步数、阈值截止值、神经网络的周期、批量大小和隐藏层，你会看到不同的结果。
- en: A good way to improve the detection is to curate good normal data, use identified
    anomalies, and put it in the mix to have a way to tune the parameters until you
    get good matches on the identified anomalies.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 提高检测的一种好方法是整理好的正常数据，使用已识别的异常，并将其混合在一起，以便调整参数直到在已识别的异常上获得良好的匹配。
- en: Examples of Time Series
  id: totrans-343
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 时间序列示例
- en: In all of the examples presented in this section, we use the same notebook but
    switch which dataset we load by using the “i=0” parameter. All hyperparameters
    are kept the same, though you are free to experiment. For each dataset, we will
    build an LSTM model and check whether or not there are anomalies.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中展示的所有示例中，我们使用相同的笔记本，但通过使用“i=0”参数来切换加载数据集。所有超参数都保持不变，尽管你可以自由实验。对于每个数据集，我们将构建一个LSTM模型并检查是否存在异常。
