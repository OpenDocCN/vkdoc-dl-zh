- en: Summary
  id: totrans-462
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed recurrent neural networks and long short-term
    memory models. We also looked at LSTMs as a means to detect anomalies. We also
    walked through several different examples of time-series data with different anomalies
    and showed how to start detecting anomalies. In the Chapter [9](483137_2_En_9_Chapter.xhtml),
    we will look at another method of performing time-series anomaly detection with
    the temporal convolutional network.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了循环神经网络和长短期记忆模型。我们还探讨了将 LSTM 作为检测异常的手段。我们还通过几个不同异常的时间序列数据示例，展示了如何开始检测异常。在第
    [9](483137_2_En_9_Chapter.xhtml) 章中，我们将探讨使用时间卷积网络进行时间序列异常检测的另一种方法。
