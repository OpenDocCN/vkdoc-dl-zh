  zh: 观察值与日期时间的图形表示了值的时序。它具有密集的波动波形，在最高和最低峰值处有几个点。这些点包括2014年9月的30000个点，2014年11月的40000个点，2015年1月的30000个点，以及2015年2月的0个点。数据是估计的。
