  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 值与日期时间的线图表示从2014年4月1日到14日的值的时间序列，具有均匀的矩形波形。它介于20到80之间。在谷底处的脉冲宽度大于在峰值处。
- en: Figure 8-45
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-45
- en: A graph showing the time Series
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 展示时间序列的图表
- en: Let’s add the anomaly column to the original dataframe and prepare a new dataframe.
    Using visualization, you can plot the new time Series now. As shown below, the
    time Series shows the datetime vs. value column. Figure [8-46](#Fig56) shows the
    anomalies.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将异常列添加到原始数据框中，并准备一个新的数据框。使用可视化，你现在可以绘制新的时间序列。如下所示，时间序列显示了日期时间与值列。图[8-46](#Fig56)显示了异常。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig56_HTML.jpg)'
  id: totrans-409
