  zh: 此数据集没有噪声或异常，是一个正常的时间序列数据集。如图[8-45](#Fig55)所示，时间序列在不同的时间戳上有值。使用可视化，你现在可以绘制时间序列。为此工作，您将转换时间戳为日期时间，并删除时间戳列。如下所示，时间序列显示了日期时间与值列。
