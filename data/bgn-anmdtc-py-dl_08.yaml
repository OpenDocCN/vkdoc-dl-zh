  id: totrans-377
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig51_HTML.jpg)'
- en: A line graph of value versus date-time indicates the time series of value from
    April 1 to 14, 2014, with a fluctuating waveform. The wave extends between 20
    and 85\. The waves are dense at the crests and the troughs. The amplitudes are
    uniform, except for (11.5, 40).
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 值与日期时间的折线图显示了从2014年4月1日到14日的值的时间序列，波形波动。波的幅度在20到85之间。波峰和波谷处的波密集。振幅均匀，除了（11.5，40）。
- en: Figure 8-43
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-43
- en: A graph showing the time Series
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 展示时间序列的图表
- en: Let’s add the anomaly column to the original dataframe and prepare a new dataframe.
    Using visualization, you can plot the new time Series now. As shown below, the
    time Series shows the datetime vs. the value column. Normal data points are shown
    in green and anomalies are shown in red. Figure [8-44a](#Fig52) shows the generated
    graph depicting anomalies.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在原始数据框中添加异常列并准备一个新的数据框。使用可视化，你现在可以绘制新的时间序列。如下所示，时间序列显示了日期时间与值列的关系。正常数据点以绿色显示，异常点以红色显示。图[8-44a](#Fig52)显示了生成的表示异常的图表。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig52_HTML.jpg)'
  id: totrans-382
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig52_HTML.jpg)'
- en: A line graph of value versus date-time indicates the time series of value from
    April 1 to 15, 2014, with a fluctuating waveform. The wave extends between 20
    and 85\. The waves are dense at the crests and the troughs. The amplitudes are
    uniform, except for (11.5, 40).
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 值与日期时间的折线图显示了从2014年4月1日到15日的值的时间序列，波形波动。波的幅度在20到85之间。波峰和波谷处的波密集。振幅均匀，除了（11.5，40）。
- en: Figure 8-44a
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-44a
- en: A graph showing the detected anomalies
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 展示检测到的异常的图表
- en: The anomaly here is supposed to be the spike occurring shortly after April 11,
    since it did not fire as strongly as every other spike. However, with the current
    way the model is making predictions (given the past 15 time steps, predict the
    16^(th) time step), it does not seem to have achieved a high enough prediction
    error to have registered as a top 0.1% error.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的异常应该是4月11日之后不久发生的尖峰，因为它没有像其他尖峰那样强烈地触发。然而，根据模型当前的预测方式（给定过去15个时间步，预测第16个时间步），它似乎没有达到足够高的预测误差，以注册为前0.1%的错误。
- en: Observing the predictions, as shown in Figure [8-44b](#Fig53), we can see that
    the network certainly fails to predict the correct values for this particular
    anomalous spike.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 观察预测结果，如图[8-44b](#Fig53)所示，我们可以看到网络显然未能预测出这个特定异常尖峰的正确值。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig53_HTML.jpg)'
  id: totrans-388
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig53_HTML.jpg)'
- en: A line graph of value versus date-time indicates the time series of value from
    April 1 to 14, 2014, with a fluctuating waveform and overlapping waves. The waves
    extend between 0 and 1\. The waves are dense at the crests and the troughs. The
    amplitudes are uniform, except for (3000, 0.35).
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 值与日期时间的折线图显示了从2014年4月1日到14日的值的时间序列，波形波动和重叠的波。波的幅度在0到1之间。波峰和波谷处的波密集。振幅均匀，除了（3000，0.35）。
- en: Figure 8-44b
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-44b
- en: The model’s training data (blue), total sequence (green), and predicted sequence
    (red). The prediction for the spike is not good, so we should expect that the
    error here is higher than usual
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的训练数据（蓝色）、总序列（绿色）和预测序列（红色）。对于尖峰的预测并不好，因此我们应该预期这里的错误率比平常要高
- en: Looking at Figure [8-44b](#Fig53), we would expect to see a higher than usual
    prediction error. However, looking at the actual prediction errors for each point
    (Figure [8-44c](#Fig54)), we can see that there indeed was a higher than usual
    reconstruction loss for this anomalous spike. However, there is a lot of noise
    stemming from the network’s conservative predictions, as it does not seem to model
    the individual spikes but rather the general trend of the spikes.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 观察图[8-44b](#Fig53)，我们预计会看到比平常更高的预测误差。然而，查看每个点的实际预测误差（图[8-44c](#Fig54)），我们可以看到，对于这个异常尖峰，确实存在比平常更高的重建损失。然而，由于网络保守的预测，存在大量的噪声，因为它似乎不是建模单个尖峰，而是尖峰的一般趋势。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig54_HTML.jpg)'
  id: totrans-393
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig54_HTML.jpg)'
- en: A scatterplot of error versus data consists of circular plots labeled normal
    that are dense at the bottom and a horizontal line labeled threshold at around
    0.75\. The cross plots above the threshold indicate the anomaly.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 错误与数据散点图由标记为正常的圆形图组成，这些图在底部密集，并在大约0.75处有一个标记为阈值的水平线。高于阈值的交叉图表示异常。
- en: Figure 8-44c
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-44c
- en: Plotting the prediction errors as well as the threshold. The anomalous spike’s
    errors can be spotted around the 3000 tick on the x axis. While the error is higher
    than usual, there is far too much noise with errors much greater that result in
    them being picked up as anomalies
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制预测误差以及阈值。异常尖峰的误差可以在x轴的3000刻度处找到。虽然误差高于正常值，但噪声太多，误差太大，导致它们被识别为异常。
- en: 'You can try several different strategies to try and mitigate the loss, such
    as the following (among others):'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以尝试几种不同的策略来尝试减轻损失，如下所示（以及其他策略）：
- en: Increasing the number of training epochs
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增加训练轮数
- en: Increasing the number of time steps
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增加时间步数
- en: Increasing the model capacity by having more neurons or more layers
  id: totrans-400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过增加神经元或更多层来增加模型容量
- en: These strategies can also be used in conjunction with one another to produce
    a more powerful LSTM network. Assuming we can properly fit the model closely,
    we can expect to see the anomalous spike itself become the top 0.01% reconstruction
    error.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 这些策略也可以相互结合使用，以产生更强大的LSTM网络。假设我们可以正确地拟合模型，我们可以期望看到异常尖峰本身成为前0.01%的重建误差。
- en: art_daily_perfect_square_wave.csv
  id: totrans-402
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: art_daily_perfect_square_wave.csv
