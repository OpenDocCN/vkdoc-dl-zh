- en: Sequences and Time Series Analysis
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 序列和时间序列分析
- en: A **time Series** is a Series of data points indexed in time order. Most commonly,
    a time Series is a sequence taken at successive equally spaced points in time.
    Thus, it is a sequence of discrete-time data. Examples of time Series are ECG
    data, weather sensors, and stock prices.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间序列**是一系列按时间顺序索引的数据点。最常见的是，时间序列是在时间上连续等间距的点上的序列。因此，它是一系列离散时间数据。时间序列的例子包括ECG数据、天气传感器和股价。'
- en: Figure [8-1](#Fig1) shows an example of a time Series.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-1](#Fig1)展示了时间序列的一个示例。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig1_HTML.jpg)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig1_HTML.jpg)'
- en: A line graph of value versus date-time indicates the time series with fluctuation.
    The highest value is 39000 in November and the lowest value is 0 in January 2015\.
    Values are estimated.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 值与日期时间的折线图表示具有波动的时序。最高值在2015年11月为39000，最低值在2015年1月为0。值是估算的。
- en: Figure 8-1
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-1
- en: A time-series dataset depicting total taxi pickup count over all taxis in New
    York City across time
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 描述纽约市所有出租车在一段时间内总接单数的时序数据集
- en: Figure [8-2](#Fig2) shows the monthly values for the Atlantic Multi-decadal
    Oscillation (AMO) index for a 157-year time period (AMO measures the variability
    of sea surface temperatures in the North Atlantic Ocean).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-2](#Fig2)展示了大西洋多年代振荡（AMO）指数在157年时间段内的月度值（AMO衡量北大西洋海表温度的变化）。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig2_HTML.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig2_HTML.jpg)'
- en: A graph of A M O departure versus year, indicates the monthly values for the
    Atlantic Multi-decadal Oscillation index from 1856 to 2013\. It has a fluctuating
    sinusoidal waveform with positive and negative cycles.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: A M O（北大西洋多年代振荡）的出发年份图表，显示了从1856年到2013年的月度值。它有一个波动正弦波形，具有正负周期。
- en: Figure 8-2
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-2
- en: Monthly values of the AMO index across time
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 随时间变化的AMO指数的月度值
- en: Figure [8-3](#Fig3) shows a chart of the BP stock price for a 20-year time period.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-3](#Fig3)显示了20年期间BP股票价格的图表。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig3_HTML.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig3_HTML.png)'
- en: A line graph indicates the B P stock price per share in U S dollars on the N
    Y S E from 1979 to 1999\. It has two curves. The fluctuating wave with peaks indicates
    the closing price with the highest on February 1, 1996\. The slightly increasing
    curve with fluctuation is for adjusted closing price.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一条线图显示了从1979年到1999年在纽约证券交易所（NYSE）的B P股票每股美元价格。它有两个曲线。带有峰值的波动波形表示收盘价，其中1996年2月1日的收盘价最高。略有上升且波动的曲线是调整后的收盘价。
- en: Figure 8-3
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-3
- en: BP stock closing price per share across 20 years
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 20年间的BP股票收盘价每股
- en: '**Time Series analysis**, then, refers to the analysis of change in trends
    of data over a period of time. Time Series analysis comprises methods for analyzing
    time-series data in order to extract meaningful statistics and other characteristics
    of the data and has a variety of applications. One such application is the prediction
    of the future value of an item based on its past values. Future stock price prediction
    is probably the best example of such an application.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间序列分析**，因此，是指对一段时间内数据趋势变化的分析。时间序列分析包括分析时间序列数据的方法，以提取数据的统计和其他特征，并且有各种应用。其中一种应用是基于过去值预测物品的未来价值。未来股票价格预测可能是此类应用的最好例子。'
- en: Another very important use case is the ability to detect anomalies. By analyzing
    and learning the time Series in terms of being able to understand the trends and
    changes seen from historical data, we can detect abnormal or anomalous data points
    in the time Series. Figure [8-4](#Fig4) is a time Series with anomalies. It shows
    the normal data in green and possible anomalies in red.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个非常重要的用例是检测异常的能力。通过分析和学习时间序列，从历史数据中理解趋势和变化，我们可以检测时间序列中的异常或异常数据点。图[8-4](#Fig4)是一个包含异常的时间序列。它用绿色表示正常数据，用红色表示可能异常的数据。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig4_HTML.jpg)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig4_HTML.jpg)'
- en: A graph of observation versus date-time indicates the time series from July
    2013 to June 2014\. It has a fluctuating wave with the highest peak of around
    87 between December 2013 and January 2014\. The vertical plots lie along the peaks
    and dips.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 观察值与日期时间的图表显示了从2013年7月到2014年6月的时间序列。它在2013年12月到2014年1月之间有一个大约87的最高峰的波动波形。垂直图沿着峰值和谷值分布。
- en: Figure 8-4
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-4
- en: Time Series with anomalies. The green line represents the data in its entirety,
    whether it is normal or anomalous. The red points plotted on top of the green
    line represent anomaly predictions. These are points along the time Series that
    have been predicted by some method to be anomalous. They tend to occur on the
    highest and lowest peaks along the time Series, since unexpectedly high- or low-magnitude
    values could be anomalous
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 包含异常的时间序列。绿色线代表整体数据，无论是正常还是异常。绿色线上方绘制的红色点代表异常预测。这些是某些方法预测为异常的时间序列中的点。它们往往出现在时间序列的最高和最低峰值处，因为意外的高或低幅值可能是异常的。
- en: What Is an RNN?
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是RNN？
- en: You have seen several types of neural networks throughout the book, so you know
    that the high-level representation of neural networks looks like Figure [8-5](#Fig5).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你在书中已经看到了几种类型的神经网络，所以你知道神经网络的较高层次表示看起来像图[8-5](#Fig5)。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig5_HTML.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig5_HTML.png)'
- en: A horizontal flow diagram. The input is passed to the neural network to generate
    the output.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 水平流程图。输入传递到神经网络以生成输出。
- en: Figure 8-5
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-5
- en: A high-level representation of neural networks
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的较高层次表示
- en: Clearly, the neural network processes input and produces output, and this works
    on many types of input data with varying features. However, a critical piece to
    notice is that this neural network has no notion of the time of the occurrence
    of the event (input), only that input has come in. So, what happens with events
    (input) that come in as a stream over long periods of time? How can the neural
    network shown in Figure [8-5](#Fig5) handle trending in events, seasonality in
    events, and so on? How can it learn from the past and apply it to the present
    and future? Recurrent neural networks try to address this by incrementally building
    neural networks, taking signals from a previous timestamp into the current network.
    Figure [8-6](#Fig6) depicts an RNN.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，神经网络处理输入并产生输出，并且它可以在具有不同特征的各种输入数据上工作。然而，一个需要注意的关键点是，这个神经网络没有事件（输入）发生时间的概念，只知道输入已经到来。那么，对于长时间内作为流进入的事件（输入）会发生什么？图
    [8-5](#Fig5) 中所示的神经网络如何处理事件的趋势、事件的季节性等问题？它如何从过去学习并将其应用于现在和未来？循环神经网络通过逐步构建神经网络，将来自先前时间戳的信号引入当前网络来尝试解决这个问题。图
    [8-6](#Fig6) 描述了一个 RNN。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig6_HTML.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图 8-6](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig6_HTML.png)'
- en: A flow diagram of the recurrent neural network consists of inputs T 1 to T n
    and outputs T 1 to T n. The recurrent neural networks are connected from top to
    bottom.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络的流程图包括输入 T 1 到 T n 和输出 T 1 到 T n。循环神经网络从上到下连接。
- en: Figure 8-6
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-6
- en: A recurrent neural network
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络
- en: You can see that an RNN is a neural network with multiple layers or stages.
    Each stage represents a time, T; the RNN at T+1 will consider the RNN at time
    T as one of the signals. Each stage passes its output to the next stage. The hidden
    state, which is passed from one stage to the next, is the key for the RNN to work
    so well, and this hidden state is analogous to some sort of memory retention.
    An RNN layer (or stage) acts as an encoder as it processes the input sequence
    and returns its own internal state. This state serves as the input of the decoder
    in the next stage, which is trained to predict the next point of the target sequence,
    given previous points of the target sequence. Specifically, it is trained to turn
    the target sequences into the same sequences but offset by one timestep in the
    future.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，RNN 是一个具有多个层或阶段的神经网络。每个阶段代表一个时间，T；T+1 时的 RNN 将 T 时的 RNN 视为一个信号。每个阶段将其输出传递给下一个阶段。从阶段传递到下一个阶段的隐藏状态是
    RNN 工作得如此之好的关键，这个隐藏状态类似于某种记忆保持。RNN 层（或阶段）作为编码器，在处理输入序列并返回其自身内部状态时起作用。这个状态作为下一阶段解码器的输入，该解码器被训练来预测目标序列的下一个点，给定目标序列的先前点。具体来说，它被训练将目标序列转换为相同的序列，但未来一个时间步长偏移。
- en: Backpropagation is used when training an RNN, as in other neural networks, but
    in RNNs there is also a time dimension. In backpropagation, we take the derivative
    (gradient) of the loss with respect to each of the parameters. Using this information
    (loss), we can then shift the parameters in the opposite direction with a goal
    to minimize the loss. We have a loss at each timestep since we are moving through
    time and we can sum the losses across time to get the loss at each timestep. This
    is the same as summation of gradients across time.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练 RNN 时，使用反向传播，就像在其他神经网络中一样，但在 RNN 中还有一个时间维度。在反向传播中，我们计算损失相对于每个参数的导数（梯度）。使用这些信息（损失），我们可以将参数向相反方向移动，目标是最小化损失。由于我们在时间上移动，我们可以在每个时间步长都有一个损失，我们可以将时间上的损失相加以得到每个时间步长的损失。这等同于时间上梯度的求和。
- en: The problem with preceding RNNs constructed from regular neural network nodes
    is that as we try to model dependencies between sequence values that are separated
    by a significant number of other values, the gradients of timestep T depend on
    gradients at T-1’s gradients then depend on T-2’s gradients, and so on. This leads
    to the earliest gradient’s contribution getting smaller and smaller as we move
    along the timesteps where the chain of gradients gets longer and longer. This
    is what is known as the *vanishing gradient problem*. This means the gradients
    of those earlier layers will become smaller and smaller and therefore the network
    won’t learn long-term dependencies. The RNN becomes biased as a result, only dealing
    with short-term data points. LSTM networks are a way of solving this problem with
    RNNs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 由常规神经网络节点构成的先前RNN的问题在于，当我们试图模拟由大量其他值分隔的序列值之间的依赖关系时，时间步T的梯度依赖于T-1的梯度，T-1的梯度又依赖于T-2的梯度，依此类推。这导致最早梯度对贡献越来越小，因为我们沿着时间步移动，梯度链变得越来越长。这就是所谓的梯度消失问题。这意味着那些早期层的梯度会越来越小，因此网络无法学习长期依赖。RNN因此变得有偏见，只能处理短期数据点。LSTM网络是解决RNN中这个问题的方法之一。
- en: What Is an LSTM?
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是LSTM？
- en: An LSTM network is a type of recurrent neural network. As discussed in the previous
    section, an RNN is a neural network that attempts to model time- or sequence-dependent
    behavior, such as language, stock prices, weather sensors, and so on. This is
    performed by feeding back the output of a neural network layer at time T to the
    input of the same network layer at time T+1\. LSTM builds on top of the RNN, adding
    a memory component meant to help propagate the information learned at a time T
    to the future T+1, T+2, and so on. The main idea is that LSTM can forget irrelevant
    parts of previous state while selectively updating state and then outputting certain
    parts of the state that are relevant to the future. How does this solve the vanishing
    gradient problem in RNNs? Well, now we are discarding some part of the state,
    updating some part of the state, and propagating forward some part of the state
    so that we no longer have a long chain of backpropagation as seen in RNNs. Thus,
    LSTMs are much more efficient than typical RNNs.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM网络是一种循环神经网络。正如前文所述，RNN是一种试图模拟时间或序列相关行为的神经网络，例如语言、股票价格、天气传感器等。这是通过将时间T时刻神经网络层的输出反馈到时间T+1时刻同一网络层的输入来实现的。LSTM在RNN的基础上进行了扩展，增加了一个记忆组件，旨在帮助将时间T时刻学习到的信息传播到未来的T+1、T+2等时刻。主要思想是LSTM可以在选择性更新状态的同时，忘记之前状态中的不相关部分，然后输出与未来相关的状态部分。这如何解决RNN中的梯度消失问题呢？好吧，现在我们正在丢弃状态的一部分，更新状态的一部分，并向前传播状态的一部分，这样我们就不再像在RNN中那样有一个长长的反向传播链。因此，LSTMs比典型的RNNs要高效得多。
- en: Figure [8-7](#Fig7) depicts an RNN with tanh activation.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-7](#Fig7)展示了带有tanh激活的RNN。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig7_HTML.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig7_HTML.png)'
- en: A flow diagram. The input from stage T and hidden state from stage T minus 1
    leads to tangent h of the recurrent neural network that leads to the hidden state
    from stage T.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图。来自阶段T的输入和来自阶段T-1的隐藏状态导致循环神经网络的切线h，进而导致阶段T的隐藏状态。
- en: Figure 8-7
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-7
- en: An RNN with tanh activation, a commonly used activation function for RNNs
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 带有tanh激活的RNN，这是RNN中常用的激活函数
- en: The tanh function is called an **activation function**. (For a primer on activation
    functions, refer to Chapter [5](483137_2_En_5_Chapter.xhtml).) There are several
    types of activation functions that help in applying nonlinear transformations
    on the inputs at every node in the neural network. Figure [8-8](#Fig8) shows common
    activation functions.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: tanh函数被称为**激活函数**。（关于激活函数的入门，请参阅第[5](483137_2_En_5_Chapter.xhtml)章。）有几种类型的激活函数有助于在神经网络中每个节点上应用非线性变换。图[8-8](#Fig8)显示了常见的激活函数。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig8_HTML.jpg)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig8_HTML.jpg)'
- en: 3 line graphs. 1, Sigmoid output versus X values, has an increasing S-shaped
    curve between (negative 5, 0) and (5, 1). 2, Tangent h output versus X values,
    has an increasing S curve between (negative 5, negative 1) and (5, 1). 3, ReLU
    output has a line through (negative 5, 0), (0, 0), and (5, 5). Data are estimated.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 3条线图。1，Sigmoid输出与X值的关系，在（负5，0）和（5，1）之间呈增加的S形曲线。2，切线h输出与X值的关系，在（负5，负1）和（5，1）之间呈增加的S曲线。3，ReLU输出通过（负5，0），（0，0）和（5，5）的直线。数据已估计。
- en: Figure 8-8
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-8
- en: Common activation functions
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 常见激活函数
- en: The key idea behind activation functions is to add nonlinearity to the data
    to align better with real-world problems and real-world data. In Figure [8-9](#Fig9),
    the left graph shows linearity and the right graph shows nonlinearity.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数背后的关键思想是为数据添加非线性，以便更好地与现实世界问题和现实世界数据对齐。在图[8-9](#Fig9)中，左图显示线性，右图显示非线性。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig9_HTML.jpg)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig9_HTML.jpg)'
- en: 2 scatterplots with two types of plots. The left graph of linearity has circular
    plots on the left and star plots on the right, separated by a diagonal line. The
    right graph of nonlinearity has an irregular circle of circular plots surrounded
    by star plots.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 两个散点图，有两种类型的图形。左图线性图左侧有圆形图，右侧有星形图，由对角线分开。非线性图的右图有一个不规则圆形的圆形图，周围环绕着星形图。
- en: Figure 8-9
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-9
- en: Linear and nonlinear data plots
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 线性和非线性数据图
- en: Clearly, there is no linear equation to handle the nonlinearity, so we need
    an activation function to deal with this property. The different activation functions
    are listed at [https://​www.​tensorflow.​org/​api_​docs/​python/​tf/​keras/​activations](https://www.tensorflow.org/api_docs/python/tf/keras/activations).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，没有线性方程可以处理非线性，因此我们需要一个激活函数来处理这个特性。不同的激活函数列在[https://www.tensorflow.org/api_docs/python/tf/keras/activations](https://www.tensorflow.org/api_docs/python/tf/keras/activations)。
- en: In time-series data, the data is spread over a period of time, not some instantaneous
    set such as seen in Chapter [4](483137_2_En_4_Chapter.xhtml) autoencoders, for
    example. So, not only it is important to look at the instantaneous data at some
    time T, it is also important for older historical data to the left of this point
    to be propagated through the steps in time. Since we need the signals from historical
    data points to survive for a long period of time, we need an activation function
    that can sustain information for a longer range before going to zero. tanh is
    the ideal activation function for the purpose and is graphed as shown in Figure
    [8-10](#Fig10).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在时间序列数据中，数据分布在一段时间内，而不是像第[4](483137_2_En_4_Chapter.xhtml)章中自动编码器所看到的那种瞬时集合。因此，不仅需要查看某个时间T的瞬时数据，而且还需要将这个点左侧的较老历史数据通过时间步骤传播。由于我们需要历史数据点的信号在很长时间内保持存活，我们需要一个可以在接近零之前维持信息更长时间的激活函数。tanh是此目的的理想激活函数，如图[8-10](#Fig10)所示。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig10_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig10_HTML.jpg)'
- en: A line graph of tangent h output versus X values, has an increasing S-shaped
    curve that extends between (negative 5, negative 1) and (5, 1). The title reads,
    tangent h curve. The values are approximate.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 正切h输出与X值的线图，有一个在（负5，负1）和（5，1）之间延伸的S形曲线。标题为“正切h曲线”。数值是近似的。
- en: Figure 8-10
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig10_HTML.jpg)'
- en: tanh activation
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: tanh激活
- en: We also need sigmoid (another activation function) as a way to either remember
    or forget the information. A sigmoid activation function is shown in Figure [8-11](#Fig11).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要sigmoid（另一种激活函数）作为记住或忘记信息的方式。sigmoid激活函数如图[8-11](#Fig11)所示。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig11_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig11_HTML.jpg)'
- en: A line graph of sigmoid output versus X values, has an increasing S-shaped curve
    that extends between (negative 5, 0) and (5, 1). The title reads, sigmoid curve.
    The values are approximate.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: sigmoid输出与X值的线图，有一个在（负5，0）和（5，1）之间延伸的S形曲线。标题为“sigmoid曲线”。数值是近似的。
- en: Figure 8-11
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig11_HTML.jpg)'
- en: A sigmoid activation function
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 一个sigmoid激活函数
- en: Conventional RNNs have a tendency to remember everything, including unnecessary
    inputs, which results in an inability to learn from long sequences. By contrast,
    LSTMs selectively remember important inputs, which allows them to handle both
    short-term and long-term dependencies. LSTMs do this by releasing information
    between the hidden state and the cell state using three important gates. A common
    LSTM unit is composed of a cell, an input gate, an output gate, and a forget gate.
    The cell remembers values over arbitrary time intervals, and the three gates regulate
    the flow of information into and out of the cell.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 传统循环神经网络（RNN）倾向于记住所有东西，包括不必要的输入，这导致它们无法从长序列中学习。相比之下，长短期记忆网络（LSTMs）会选择性地记住重要的输入，这使得它们能够处理短期和长期依赖。LSTMs通过使用三个重要的门在隐藏状态和细胞状态之间释放信息来实现这一点。一个常见的LSTM单元由一个细胞、一个输入门、一个输出门和一个遗忘门组成。细胞在任意时间间隔内记住值，而三个门调节信息流入和流出细胞的信息流。
- en: A more detailed LSTM architecture is shown in Figure [8-12](#Fig12). The key
    functions used are the tanh and sigmoid activation functions. F[t] is the forget
    gate, I[t] is the input gate, and O[t] is the output gate.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 更详细的 LSTM 架构如图 [8-12](#Fig12) 所示。使用的关键函数是 tanh 和 sigmoid 激活函数。F[t] 是遗忘门，I[t]
    是输入门，O[t] 是输出门。
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig12_HTML.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig12_HTML.jpg)'
- en: An architecture of the long short-term memory model includes c subscript t minus
    1, h subscript t minus 1, L S T M unit, and c subscript t + 1, h subscript t +
    1\. The inputs are x subscript t minus 1, x subscript t, and x subscript t+ 1\.
    The outputs are o subscript t minus 1, o t, and o t + 1.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 长短期记忆模型的结构包括 c 下标 t 减 1，h 下标 t 减 1，LSTM 单元，和 c 下标 t 加 1，h 下标 t 加 1。输入是 x 下标
    t 减 1，x 下标 t，和 x 下标 t 加 1。输出是 o 下标 t 减 1，o t，和 o t 加 1。
- en: Figure 8-12
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-12
- en: 'A detailed LSTM network (Source: [https://​commons.​wikimedia.​org/​wiki/​File:​Long_​Short-Term_​Memory.​svg](https://commons.wikimedia.org/wiki/File:Long_Short-Term_Memory.svg))'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一个详细的 LSTM 网络图（来源：[https://commons.wikimedia.org/wiki/File:Long_Short-Term_Memory.svg](https://commons.wikimedia.org/wiki/File:Long_Short-Term_Memory.svg)）
- en: A forget gate is the first part of the LSTM stage and it decides how much information
    from a prior stage should be remembered or forgotten. This is accomplished by
    passing the previous hidden state hT-1 and current input xT through a sigmoid
    function.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 遗忘门是 LSTM 阶段的第一部分，它决定了从前一个阶段应该记住或忘记多少信息。这是通过将前一个隐藏状态 hT-1 和当前输入 xT 通过 sigmoid
    函数传递来实现的。
- en: The input gate helps decide how much information to pass to the current stage
    by using the sigmoid function and also a tanh function.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 输入门通过使用 sigmoid 函数和 tanh 函数帮助决定传递到当前阶段的信息量。
- en: The output gate controls how much information will be retained by the hidden
    state of this stage and passed on to the next stage. Again, the current state
    passes through the tanh function.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 输出门控制隐藏状态将保留多少信息并传递到下一个阶段。同样，当前状态通过 tanh 函数传递。
- en: 'Just for information, the compact forms of the equations for the forward pass
    of an LSTM unit with a forget gate are as follows, where the initial values are
    c0 = 0 and h0 = 0, and the subscript indexes the time step:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 仅作信息参考，以下是一个带有遗忘门的 LSTM 单元前向传递方程的紧凑形式，其中初始值是 c0 = 0 和 h0 = 0，下标表示时间步：
- en: '![$$ {F}_t=\sigma \left({W}_f\bullet \left[{h}_{t-1},{x}_t\right]+{b}_f\right)
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equa.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {F}_t=\sigma \left({W}_f\bullet \left[{h}_{t-1},{x}_t\right]+{b}_f\right)
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equa.png)'
- en: '![$$ {I}_t=\sigma \left({W}_i\bullet \left[{h}_{t-1},{x}_t\right]+{b}_i\right)
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equb.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {I}_t=\sigma \left({W}_i\bullet \left[{h}_{t-1},{x}_t\right]+{b}_i\right)
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equb.png)'
- en: '![$$ {\overset{\sim }{C}}_t=\mathit{\tanh}\left({W}_C\bullet \left[{h}_{t-1},{x}_t\right]+{b}_C\right)
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equc.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\overset{\sim }{C}}_t=\mathit{\tanh}\left({W}_C\bullet \left[{h}_{t-1},{x}_t\right]+{b}_C\right)
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equc.png)'
- en: '![$$ {C}_t={F}_t\ast {C}_{t-1}+{I}_t\ast {\overset{\sim }{C}}_t $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equd.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {C}_t={F}_t\ast {C}_{t-1}+{I}_t\ast {\overset{\sim }{C}}_t $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equd.png)'
- en: '![$$ {O}_t=\sigma \left({W}_o\bullet \left[{h}_{t-1},{x}_t\right]+{b}_o\right)
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Eque.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {O}_t=\sigma \left({W}_o\bullet \left[{h}_{t-1},{x}_t\right]+{b}_o\right)
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Eque.png)'
- en: '![$$ {h}_t={O}_t\ast \mathit{\tanh}\left({C}_t\right) $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equf.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {h}_t={O}_t\ast \mathit{\tanh}\left({C}_t\right) $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_Equf.png)'
- en: Here, F[t], I[t], O[t], and C[t] correspond to their counterparts in Figure
    [8-12](#Fig12). ![$$ {\overset{\sim }{C}}_t $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_IEq1.png)is
    the output of the tanh gate.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，F[t]，I[t]，O[t]，和 C[t] 分别对应图 [8-12](#Fig12) 中的对应部分。![$$ {\overset{\sim }{C}}_t
    $$](../images/483137_2_En_8_Chapter/483137_2_En_8_Chapter_TeX_IEq1.png)是 tanh
    门的输出。
- en: 'The following list summarizes all the variables:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表总结了所有变量：
- en: 'X[t]: Input vector to the LSTM unit.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: X[t]：LSTM 单元的输入向量。
- en: 'F[t]: The forget gate’s activation vector.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: F[t]：遗忘门的激活向量。
- en: 'I[t]: The input/update gate’s activation vector.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: I[t]：输入/更新门的激活向量。
- en: 'O[t]: The output gate’s activation vector.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: O[t]：输出门的激活向量。
- en: 'h[t]: The hidden state vector, also known as the output vector of the entire
    LSTM unit.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: h[t]：隐藏状态向量，也称为整个 LSTM 单元的输出向量。
- en: 'c[t]: The cell state/context vector.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: c[t]：细胞状态/上下文向量。
- en: 'W, b: The weight matrix and bias vector. Each W matrix and b vector combo with
    their unique subscript represents a set of learnable parameters that must be learned
    during training.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: W, b：权重矩阵和偏置向量。每个 W 矩阵和 b 向量组合及其独特的下标代表一组必须在训练期间学习的可学习参数。
- en: As for *σ*, this is the sigmoid activation function.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 *σ*，这是 sigmoid 激活函数。
- en: LSTM for Anomaly Detection
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用于异常检测的 LSTM
- en: This section presents LSTM implementations for some use cases using time-series
    data as examples. A few different time-series datasets are available to use to
    try to detect anomalies using LSTM. All of them have a timestamp and a value that
    can easily be plotted in Python.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 本节介绍了使用时间序列数据作为示例的一些用例的 LSTM 实现。有几个不同的时间序列数据集可供使用，以尝试使用 LSTM 检测异常。它们都有时间戳和可以轻松在
    Python 中绘制的值。
- en: The basic idea is to train an LSTM on the normal sequence of time-series data.
    In this case, the first half of the sequence will be our training set, and the
    second half of the sequence will be the testing set. We will process the dataset
    into a rolling window of T time steps, where the first T-1 time steps will be
    passed into the LSTM so it predicts the T^(th) time step’s value.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 基本想法是在正常的时间序列数据序列上训练一个 LSTM。在这种情况下，序列的前半部分将是我们训练集，序列的后半部分将是测试集。我们将数据集处理成 T 个时间步长的滚动窗口，其中前
    T-1 个时间步长将被传递到 LSTM 中，以预测第 T 个时间步长的值。
- en: Then, we will use the LSTM to predict the sequence over the entire time-series
    sequence, including both the train and testing splits. When predicting each point,
    we will calculate the loss between the LSTM’s predicted output and the actual,
    true output using mean absolute error. To predict anomalies, we will set a threshold
    for prediction error that, if crossed, means an automatic anomaly label.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将使用 LSTM 预测整个时间序列序列，包括训练和测试分割。在预测每个点时，我们将使用平均绝对误差计算 LSTM 的预测输出和实际真实输出之间的损失。为了预测异常，我们将设置预测误差阈值，如果超过此阈值，则表示自动标记为异常。我们使用
    95% 分位数的训练误差，或最高 5% 的误差。
- en: This threshold will be set using the top n^(th) percent training prediction
    error. This boundary will then be applied to the rest of the testing data, and
    this time, any prediction error higher than this boundary will be counted as an
    anomaly. We use the 95^(th) percentile training error, or top 5% error.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 此阈值将使用 top n^(th) 百分比训练预测误差来设置。然后，将此边界应用于其余的测试数据，这次，任何高于此边界的预测误差都将被计为异常。我们使用
    95^(th) 分位数的训练误差，或最高 5% 的误差。
- en: The reasoning for training only on the first half of the sequence is to teach
    the model what normal time-series values look like before we predict on the latter
    half with anomalies. The idea is that the predicted value will not match the anomaly,
    producing a higher error and being flagged as an anomaly. Since no labels are
    required for anomaly detection, this is an unsupervised learning task. This general
    formula is what we will apply over several different time-series datasets to perform
    anomaly detection in an unsupervised manner.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 只在序列的前半部分进行训练的理由是，在我们用异常值预测后半部分之前，让模型了解正常时间序列值的样子。想法是预测值不会与异常值匹配，产生更高的误差，并被标记为异常。由于异常检测不需要标签，这是一个无监督学习任务。这个通用公式是我们将在几个不同的时间序列数据集上应用，以无监督方式执行异常检测。
