- en: 2. Build Your First Neural Network with Google Colab
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 使用Google Colab构建您的第一个神经网络
- en: We work through a complete deep learning example with Python’s TensorFlow 2.x
    library in the Google Colab cloud service. We also demonstrate how to link your
    Google Drive with the Colab cloud service.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在Google Colab云服务中，使用Python的TensorFlow 2.x库，通过一个完整的深度学习示例进行操作。我们还演示了如何将您的Google
    Drive与Colab云服务链接起来。
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 章节的笔记本位于以下URL：[`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow)。
- en: 'Building a competent neural network with TensorFlow 2.x is relatively easy.
    Data science professionals follow a few steps:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TensorFlow 2.x构建一个有能力的神经网络相对容易。数据科学专业人士遵循以下步骤：
- en: Get raw data.
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取原始数据。
- en: Explore and preprocess raw data.
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索并预处理原始数据。
- en: Split raw data into train-test sets.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将原始数据分割成训练-测试集。
- en: Create a tf.data.Dataset.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个tf.data.Dataset。
- en: Prepare the input pipeline.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准备输入管道。
- en: Create and train a neural network model.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建并训练一个神经网络模型。
- en: Data scientists want raw data because it is untouched. They want to clean, munge,
    and sculpt raw data to chisel out meaning for their specific problem at hand.
    If data is already processed, much of its meaning may already be lost. It is always
    a good idea to explore data to get a sense of what it looks like before attempting
    to preprocess. Once data is cleansed and wrangled, it is split into train-test
    sets.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家想要原始数据，因为它未经触碰。他们想要清理、整理和雕塑原始数据，以从他们的具体问题中提炼出意义。如果数据已经过处理，其中很大一部分意义可能已经丢失。在尝试预处理之前探索数据，以了解其外观总是一个好主意。一旦数据被清洗和整理，它就被分割成训练-测试集。
- en: We create a tf.data.Dataset for TensorFlow consumption. Once in the proper form,
    we prepare the input pipeline. During preparation, further data cleansing and
    wrangling may be necessary. We then create and train a neural network model with
    input pipeline data.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建一个tf.data.Dataset以供TensorFlow使用。一旦数据处于适当的形式，我们就准备输入管道。在准备过程中，可能需要进行进一步的数据清洗和整理。然后，我们使用输入管道数据创建和训练一个神经网络模型。
- en: Although reality requires all of these steps, we focus on data modeling with
    TensorFlow 2.x as it possesses a steep learning curve for the novice. So we begin
    with a simple, preprocessed dataset to free learners from the burden of data preprocessing
    and other associated tasks.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然现实需要所有这些步骤，但我们专注于使用TensorFlow 2.x进行数据建模，因为它对于新手来说学习曲线很陡峭。因此，我们从简单的预处理数据集开始，以减轻学习者数据预处理和其他相关任务的负担。
- en: GPU Hardware Accelerator
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPU硬件加速器
- en: 'To vastly speed up processing, we can use the Google *Colab GPU*. However,
    we must enable the GPU in each newly created notebook:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了大大加快处理速度，我们可以使用Google *Colab GPU*。但是，我们必须在每个新创建的笔记本中启用GPU：
- en: Click *Runtime* in the top-left menu.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左上角菜单中点击*运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择*更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从**硬件加速器**下拉菜单中选择**GPU**。
- en: Click *SAVE*.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击*保存*。
- en: 'The free GPU has usage limits. Consult the following URL to find out more:
    [`https://research.google.com/colaboratory/faq.html#resource-limits`](https://research.google.com/colaboratory/faq.html%2523resource-limits)*.*'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 免费GPU有使用限制。请参考以下URL了解更多信息：[`https://research.google.com/colaboratory/faq.html#resource-limits`](https://research.google.com/colaboratory/faq.html%2523resource-limits)*.*
- en: 'Test if GPU is active:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 测试GPU是否激活：
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Import the *tensorflow* library. If '/device:GPU:0' is displayed, the GPU is
    active. If '..' is displayed, the regular CPU is active.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 导入*tensorflow*库。如果显示'/device:GPU:0'，则GPU已激活。如果显示'..'，则常规CPU已激活。
- en: The load_digits Dataset
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: load_digits数据集
- en: The *load_digits* dataset is part of the scikit-learn library, which is a free
    software machine learning library for the *Python* programming language. The library
    features various classification, regression, and clustering algorithms that are
    easy to use and manipulate.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '*load_digits*数据集是scikit-learn库的一部分，这是一个为*Python*编程语言提供的免费软件机器学习库。该库具有各种易于使用和操作的分类、回归和聚类算法。'
- en: The load_digits dataset is heavily preprocessed, so we don’t have to worry about
    cleaning or wrangling. It consists of 1,797 8 `×` 8–pixel images. Each image is
    a 64-pixel matrix that represents a handwritten digit from 0 to 9\. We get 64
    pixels by multiplying 8 by 8\. A **pixel** is an integer with a value between
    0 and 255 used to represent image data. The load_digits dataset is commonly used
    for training machine learning systems to recognize images of handwritten digits
    through algorithmic *classification*.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '`load_digits`数据集经过大量预处理，所以我们不必担心清理或整理。它由1,797个8 `×` 8像素图像组成。每个图像是一个64像素的矩阵，代表从0到9的手写数字。我们通过8乘以8得到64像素。**像素**是一个介于0到255之间的整数值，用于表示图像数据。`load_digits`数据集通常用于训练机器学习系统通过算法*分类*识别手写数字图像。'
- en: The *images* container in load_digits holds image data of handwritten digits.
    The *data* container holds flattened feature vectors. A **feature vector** is
    an n-dimensional vector of numerical features that represent some object. In our
    case, a feature vector of 64 pixels represents an image of a handwritten digit.
    The flattening step is needed to prepare image data for input into fully connected
    neural network layers. Feature vectors have a length of 64 because each 8 `×`
    8 image is flattened by multiplying 8 rows and 8 columns of pixels. The *target*
    container holds target values, and the *target_names* container holds target names.
    The *DESCR* container holds descriptions of the dataset.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '`load_digits`中的`images`容器包含手写数字的图像数据。`data`容器包含展平的特征向量。**特征向量**是一个n维数值特征向量，代表某个对象。在我们的情况下，64像素的特征向量代表一个手写数字的图像。展平步骤是准备图像数据以输入到全连接神经网络层所需的。特征向量的长度为64，因为每个8
    `×` 8图像通过乘以8行和8列的像素进行展平。`target`容器包含目标值，而`target_names`容器包含目标名称。`DESCR`容器包含数据集的描述。'
- en: Explore the Dataset
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索数据集
- en: 'Load the dataset:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 加载数据集：
- en: '[PRE1]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If you haven’t already done so, import the *tensorflow* library. Also, import
    the dataset from the *sklearn* library. Get the data and display its keys.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有这样做，请导入*tensorflow*库。同时，从*sklearn*库中导入数据集。获取数据并显示其键。
- en: 'Create variables to hold data, images, targets, and target names:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 创建变量来存储数据、图像、目标和目标名称：
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Listing [2-1](#PC4) displays basic information about the dataset.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[2-1](#PC4)显示了数据集的基本信息。
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The data container is a 2D tensor with 1,797 flattened vectors of 64-pixel elements.
    The images container is a 3D tensor with 1,797 8 `×` 8 matrices. The images container
    holds the original un-flattened images. The targets container is a 1D tensor with
    1,797 target values between 0 and 9\. The target_names container holds classification
    labels 0–9\. So, classification is based on 10 classes represented by digits between
    0 and 9.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 数据容器是一个包含1,797个64像素元素展平向量的二维张量。图像容器是一个包含1,797个8 `×` 8矩阵的三维张量。图像容器包含原始未展平的图像。目标容器是一个包含1,797个介于0到9之间的目标值的1D张量。目标名称容器包含分类标签0–9。因此，分类基于由0到9之间的数字表示的10个类别。
- en: 'Let’s visualize the first data element:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们可视化第一个数据元素：
- en: '[PRE4]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '*We* see that the image is zero, but computers can’t *see* as we do. However,
    we can train them to understand that the digit is zero.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '*我们*看到图像值为零，但计算机不能像我们一样“看到”。然而，我们可以训练它们理解这个数字是零。'
- en: 'Display the target value (or label) and the feature image (8 `×` 8 matrix)
    of the first image:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 显示第一个图像的目标值（或标签）和特征图像（8 `×` 8矩阵）：
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The computer recognizes the first label as 0\. And it associates the first image
    matrix with that label. With images and their associated labels, we can train
    a computer to distinguish between digit images.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机将第一个标签识别为0。并且它将第一个图像矩阵与该标签关联。有了图像及其关联的标签，我们可以训练计算机区分数字图像。
- en: Image Matrix
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 图像矩阵
- en: 'A closer inspection of the image matrix is key to training:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细检查图像矩阵对于训练至关重要：
- en: Numbers in the matrix represent grayscale intensity.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 矩阵中的数字代表灰度强度。
- en: Every 0 represents *white space*.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个零代表*空白空间*。
- en: Higher numbers represent darker shades of *gray* to *black*.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 较大的数字代表从*灰色*到*黑色*的较深阴影。
- en: A *grayscale* image is one where the value of each pixel is a single sample
    representing only an amount of light. That is, it only carries intensity information.
    Grayscale images are composed exclusively of shades of gray. The contrast of an
    image ranges from black at the weakest intensity to white at the strongest.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 灰度图像是一种每个像素的值都是一个单独的样本，仅表示光量的图像。也就是说，它只携带强度信息。灰度图像仅由灰色阴影组成。图像的对比度从最弱强度的黑色到最强强度的白色。
- en: The lower the number, the lighter the gray (with zero being white). The higher
    the number, the darker shade of gray (with high numbers approaching black). So
    a computer is able to understand the shape of a digit with grayscale intensity
    matrix mapping.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 数字越低，灰色越浅（零为白色）。数字越高，灰色越深（高数值接近黑色）。因此，计算机能够通过灰度强度矩阵映射来理解数字的形状。
- en: Split Data into Train-Test Sets
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将数据分割成训练-测试集
- en: We split a dataset to find a good fitting model with training data and generalize
    the model to new data with test data. With the load_digits dataset, we can use
    image data directly or reshape the flattened data. Let’s reshape flattened data.
    This is a good exercise because you may have to reshape a dataset in the future.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将数据集分割开来，以找到适合的训练数据模型，并用测试数据将模型推广到新数据。对于 load_digits 数据集，我们可以直接使用图像数据或重塑展平后的数据。让我们来重塑展平数据。这是一个很好的练习，因为你可能在未来需要重塑数据集。
- en: 'Create variables to hold input dimensions:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 创建变量以保存输入维度：
- en: '[PRE6]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Reshape feature data:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 重新塑形特征数据：
- en: '[PRE7]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The new feature dataset is (1797, 8, 8), which is what we want.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 新的特征数据集是 (1797, 8, 8)，这正是我们想要的。
- en: 'Establish the target dataset:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 建立目标数据集：
- en: '[PRE8]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The target dataset is (1797,).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 目标数据集是 (1797,).
- en: 'Now that we have the feature dataset and associated targets, we are ready to
    split:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了特征数据集和相关的目标，我们准备分割：
- en: '[PRE9]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Import the *train_test_split* method. Split data into train and test sets. Two-thirds
    of the dataset is for training, and one-third is for testing. Random state is
    set for reproducibility of results. That is, results are consistent. We use this
    split for the modeling example.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 *train_test_split* 方法。将数据分割成训练集和测试集。三分之二的数据集用于训练，三分之一用于测试。随机状态设置为结果的再现性。也就是说，结果是可重复的。我们使用这个分割作为建模示例。
- en: Alternatively, we can use images directly as shown in Listing [2-2](#PC11).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们可以直接使用如图 [2-2](#PC11) 所示的图像。
- en: '[PRE10]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Build the Input Pipeline
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'A TensorFlow input pipeline expects feature data as float32 or float64 and
    label data as int32 or int64:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 输入管道期望特征数据为 float32 或 float64，标签数据为 int32 或 int64：
- en: '[PRE11]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Feature data is float64 and label data is int64.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 特征数据是 float64，标签数据是 int64。
- en: Feature data with a large spread of values may incite error in a neural network,
    which makes the learning process unstable. Scaling mitigates this problem. Scaling
    may also speed up calculations in an algorithm. *Feature scaling* is a technique
    to scale the range of feature data.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 具有广泛值范围的特征数据可能会在神经网络中引起错误，这会使学习过程不稳定。缩放可以减轻这个问题。缩放还可能加快算法中的计算速度。*特征缩放*是一种缩放特征数据范围的技术。
- en: 'Scale train and test feature data:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 规模化训练和测试特征数据：
- en: '[PRE12]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: We scale feature images by dividing them by 255\. Image pixels are stored as
    integer numbers in the range 0–255, which is the range that a single 8-bit byte
    can hold. The division ensures that input pixels are scaled between 0.0 and 1.0.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过除以 255 来缩放特征图像。图像像素以 0–255 范围内的整数形式存储，这是单个 8 位字节可以容纳的范围。这种除法确保输入像素的缩放在 0.0
    和 1.0 之间。
- en: 'Create data objects for TensorFlow consumption:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 TensorFlow 消费的数据对象：
- en: '[PRE13]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Let’s see what our tensors look like:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们的张量看起来像什么：
- en: '[PRE14]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We see that both train and test tensors consist of 8 `×` 8 float64 images and
    int64 scalar target values.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，训练和测试张量都由 8 `×` 8 的 float64 图像和 int64 标量目标值组成。
- en: Explore TensorFlow Data
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索 TensorFlow 数据
- en: Let’s explore what is actually inside the TensorFlow dataset we just created.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索我们刚刚创建的 TensorFlow 数据集中的实际内容。
- en: 'Display a slice from the *first* feature image and its target from the train
    set:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练集中的第一个特征图像的切片及其目标：
- en: '[PRE15]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: We display the first slice from the first image for brevity. We also display
    the first target. The *take* method grabs samples from a TensorFlow dataset. In
    this case, we grabbed only the first sample, but we can take *n* elements.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简洁起见，我们显示第一张图像的第一部分。我们还显示了第一个目标。*take* 方法从 TensorFlow 数据集中抓取样本。在这种情况下，我们只抓取了第一个样本，但我们可以抓取
    *n* 个元素。
- en: 'Let’s grab the first two labels from the test set:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从测试集中抓取前两个标签：
- en: '[PRE16]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Now, we build the input pipeline.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们构建输入管道。
- en: Shuffle Data
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 打乱数据
- en: Before we discuss data shuffling, we need to understand a few concepts. An **epoch**
    is one cycle through the full training set. Training a neural network typically
    requires more than a few epochs. A **batch** of data is a group of training samples.
    Deep learning models don’t process an entire dataset at once. They break data
    into small batches.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们讨论数据洗牌之前，我们需要了解一些概念。**epoch**是指一次遍历整个训练集。训练神经网络通常需要多个epoch。**batch**是一组训练样本。深度学习模型不会一次性处理整个数据集。它们将数据分成小批次。
- en: Shuffling data after each epoch ensures that we won’t be *stuck* with too many
    bad batches. How does this work? Shuffling reduces model variance, which produces
    more generalized results and reduces overfitting. **Overfitting** is when a model
    trains data too well. Overfitting happens when a model learns detail and noise
    in the training data so well that it negatively impacts performance of the model
    with new data.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 每个epoch后洗牌数据可以确保我们不会因为太多不良批次而陷入困境。这是怎么工作的呢？洗牌可以减少模型方差，从而产生更通用的结果并减少过拟合。**过拟合**是指模型训练数据过于完美。当模型学会了训练数据中的细节和噪声，以至于对新数据的模型性能产生负面影响时，就会发生过拟合。
- en: Shuffling ensures that each data point creates an *independent* change on the
    model without being biased by preceding data points. That is, it ensures that
    training data fed to the model contains all flavors of the data.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 洗牌确保每个数据点对模型产生独立的变化，而不会被先前数据点所偏倚。也就是说，它确保提供给模型训练的数据包含所有类型的数据。
- en: A great metaphor is *shuffling a deck of cards*. We shuffle a deck of cards
    before playing a card game because we want to make sure that each player has the
    same chance of getting a specific card as another player. Just as shuffling a
    deck of cards removes bias, so does shuffling data before each epoch when training
    a neural network.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 一个很好的隐喻是**洗牌一副牌**。我们在玩牌游戏之前洗牌，是为了确保每个玩家有相同的机会得到一张特定的牌，就像洗牌一副牌可以消除偏见一样，在训练神经网络之前在每个epoch前洗牌数据也是如此。
- en: Continue Pipeline Construction
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 继续构建流水线
- en: We need to shuffle and batch our TensorFlow consumable train data. We only batch
    test data. It doesn’t need to be shuffled because it is new data. Once we set
    batch and buffer sizes, we are ready to shuffle and batch.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要对TensorFlow可消费的训练数据进行洗牌和分批处理。我们只对测试数据进行分批。因为它代表的是新数据，所以不需要洗牌。一旦我们设置了批量和缓冲区大小，我们就可以准备洗牌和分批了。
- en: 'Set batch and buffer sizes:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 设置批量和缓冲区大小：
- en: '[PRE17]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Tweaking batch and buffer sizes can increase performance. We *arbitrarily* set
    batch size to 64 and shuffle buffer size to 100\. You can try different values
    to see how results are impacted. We suggest making buffer size relatively large,
    or shuffling won’t be very effective.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 调整批量和缓冲区大小可以提高性能。我们**任意地**将批量大小设置为64，将洗牌缓冲区大小设置为100。你可以尝试不同的值，看看结果如何受到影响。我们建议缓冲区大小相对较大，否则洗牌将不会非常有效。
- en: 'It is a good idea to give the new datasets their own names:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 给新数据集起自己的名字是个好主意：
- en: '[PRE18]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Notice that we only shuffle training data. The reason is because test data is
    supposed to represent data that our model has not seen. That is, test data is
    supposed to represent new data. Once we run the shuffle method on training data,
    the model *automatically* shuffles the data before each epoch!
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们只洗牌训练数据。原因是测试数据应该代表我们的模型尚未见过的数据。也就是说，测试数据应该代表新数据。一旦我们对训练数据运行洗牌方法，模型就会在每次epoch之前**自动**洗牌数据！
- en: 'Let’s explore our new datasets:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索我们的新数据集：
- en: '[PRE19]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Shapes are (None, 8, 8). We get *None* as an extra dimension. What happened?
    This extra dimension is added because TensorFlow models can accommodate any batch
    size!
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 形状是（None, 8, 8）。我们得到*None*作为额外的维度。发生了什么？这个额外维度是添加的，因为TensorFlow模型可以适应任何批量大小！
- en: Feedforward Neural Networks
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前馈神经网络
- en: A feedforward model is the simplest type of network. A **feedforward** neural
    network is one where information only travels forward in the network. Data moves
    from the input nodes through the hidden nodes (if any) and to the output nodes.
    There are no cycles or loops in the network.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 前馈模型是网络中最简单的类型。**前馈**神经网络是指信息只在网络中向前传播的网络。数据从输入节点通过（如果有）隐藏节点移动到输出节点。网络中没有循环或回路。
- en: The layers are *fully connected*, which means that each layer is fully connected
    to the next one. Fully connected layers connect every node (or neuron) in the
    previous layer with every node in the successive layer. That is, each neuron in
    a *layer* receives an input from all neurons present in the *previous* layer.
    Fully connected layers are typically referred to as *densely connected*.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 层是**全连接**的，这意味着每一层都与下一层完全连接。全连接层将前一层的每个节点（或神经元）与后续层的每个节点连接起来。也就是说，一个**层**中的每个神经元都会从**前一**层中的所有神经元接收输入。全连接层通常被称为**密集连接**。
- en: Number of Layers
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 层数数量
- en: Typically, *more layers increase model performance*. But more layers require
    more computing resources. When we don’t have much training data, a simple network
    with few layers tends to perform as good as or better than a complex network with
    many layers.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，**更多的层可以提高模型性能**。但更多的层需要更多的计算资源。当我们没有太多训练数据时，一个简单且层数较少的网络往往表现得和复杂的多层网络一样好，甚至更好。
- en: It is a good idea to start with a simple network when exploring a new dataset.
    We also suggest drawing a small random sample on the dataset and training it with
    the simple network to get an idea of its potential performance. Following this
    suggestion saves time and computing resources upfront. And we get acquainted with
    the dataset. If the simple model doesn’t train well on the small sample, we can
    get more data and/or try to find out why we got poor performance before moving
    to a more complex model.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索新的数据集时，从简单的网络开始是一个好主意。我们还建议在数据集上绘制一个小随机样本，并用简单的网络对其进行训练，以了解其潜在的性能。遵循这一建议可以节省前期的时间和计算资源。我们还熟悉了数据集。如果简单模型在小样本上训练不好，我们可以在转向更复杂的模型之前获取更多数据或尝试找出我们表现不佳的原因。
- en: Our Model
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们的模型
- en: The first model we build contains an input layer, a hidden layer, and an output
    layer. The first layer in a neural network is *always* an input layer to inform
    the model of the shape of incoming data.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建的第一个模型包含一个输入层、一个隐藏层和一个输出层。神经网络中的第一层**总是**是输入层，以告知模型输入数据的形状。
- en: The first layer of our model is a Flatten layer. **Flattening** is the process
    of converting data into 1D arrays. When training a fully connected network, input
    layer data should always be either 1D vectors or 2D matrices.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们模型的第一层是一个**Flatten**层。**Flattening**是将数据转换为1D数组的进程。在训练全连接网络时，输入层数据应该是1D向量或2D矩阵。
- en: The *Flatten* layer reshapes each tensor into a shape that is equal to the number
    of elements contained in the tensor not including the batch dimension. This layer
    has no parameters. Since this is the *input* layer, we specify *input_shape* as
    *(8, 8)* to inform the model that each feature image is represented by an 8 `×`
    8 matrix.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**Flatten**层将每个张量重塑为与张量中包含的元素数量相等的形状，不包括批量维度。这个层没有参数。由于这是**输入层**，我们指定**input_shape**为**(8,
    8**)来告知模型每个特征图像由一个8 `×` 8的矩阵表示。'
- en: The second layer is a densely connected *hidden* layer. The *Dense* layer adds
    the fully connected layer to the neural network. It contains 256 neurons (or nodes)
    and uses the *relu* activation function.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层是一个密集连接的**隐藏层**。**Dense**层将全连接层添加到神经网络中。它包含256个神经元（或节点）并使用**relu**激活函数。
- en: The final layer is the *output* layer. It is also a densely connected layer
    that contains ten neurons and uses the *softmax* activation function. The output
    layer must always contain the same number of neurons as the number of classes.
    Since we are classifying digits 0–9, we have ten classes.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一层是**输出层**。它也是一个密集连接层，包含十个神经元并使用**softmax**激活函数。输出层必须始终包含与类别数量相同的神经元数量。由于我们正在对0-9的数字进行分类，我们有十个类别。
- en: An **activation function** defines the output of a node given an input or set
    of inputs. It is an algorithm that activates each node in a neural net.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**激活函数**定义了给定输入或一组输入的节点的输出。它是一个激活神经网络中每个节点的算法。'
- en: '**ReLu** (or rectified linear unit) is a piecewise linear function that outputs
    input values directly if positive or zero if negative. It is the default activation
    function for many networks because it facilitates easier training and often achieves
    better performance than other activation functions.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**ReLu**（或修正线性单元）是一个分段线性函数，如果输入为正或零则直接输出输入值，如果输入为负则输出零。由于它便于训练并且通常比其他激活函数有更好的性能，因此它是许多网络的默认激活函数。'
- en: '**Softmax** output is large if the score is large or small if the score is
    small. It is frequently used in classification problems where classes are mutually
    exclusive. In this case, each image can be one and only one digit.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '**Softmax** 输出值大如果分数高，小如果分数低。它常用于分类问题，其中类别是互斥的。在这种情况下，每个图像可以是一个且仅是一个数字。'
- en: 'Let’s begin by defining the input shape:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先定义输入形状：
- en: '[PRE20]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Take the first sample from the train dataset and retrieve its shape. Since the
    Flatten layer needs the shape of each image, we slice this portion.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 从训练数据集中取第一个样本并检索其形状。由于 Flatten 层需要每个图像的形状，我们切片这部分。
- en: 'Import libraries to build layers:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库以构建层：
- en: '[PRE21]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Build the model:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 构建模型：
- en: '[PRE22]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Model Summary
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型摘要
- en: The **summary** method displays the characteristics of a model. It shows layers,
    output shapes, and parameters.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**summary** 方法显示模型的特征。它显示层、输出形状和参数。'
- en: 'Let’s try the method:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试这种方法：
- en: '[PRE23]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The layers, output shapes, and parameters are displayed. The model begins with
    a Flatten layer with output shape (None, 64) and 0 parameters. Batch size can
    be any number, so *None* is shown. The first layer accepts the input shape of
    the data, but doesn’t act on the data in any way. So, each input tensor is a 64-element
    vector and there are 0 trainable parameters. Remember that each layer receives
    output from the previous layer.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 层、输出形状和参数被显示。模型从输出形状为 (None, 64) 且没有参数的 Flatten 层开始。批处理大小可以是任何数字，所以显示 *None*。第一层接受数据的输入形状，但以任何方式都不作用于数据。因此，每个输入张量是一个
    64 元素的向量，并且有 0 个可训练参数。记住，每个层都接收前一层的输出。
- en: The first Dense hidden layer receives tensors from the previous layer into 256
    neurons at this layer. The output shape is (None, 256) because this layer has
    256 neurons. Trainable parameters are determined by multiplying neurons at this
    layer by neurons from the previous layer and adding neurons at this layer to the
    result. So, this layer has 16,640 parameters because it inputs 64 neurons from
    the previous layer that are passed to 256 neurons. Multiply 64 by 256 to get 16,
    384\. But we still have to account for the 256 neurons in this layer. So add 16,384
    to 256 to get 16,640 parameters!
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个 Dense 隐藏层接收来自前一层的张量，并在这一层有 256 个神经元。输出形状是 (None, 256)，因为这一层有 256 个神经元。可训练参数是通过将这一层的神经元乘以前一层的神经元，并将这一层的神经元加到结果上来确定的。因此，这一层有
    16,640 个参数，因为它从前一层的 64 个神经元输入，这些神经元被传递到 256 个神经元。将 64 乘以 256 得到 16,384。但我们仍然需要考虑这一层的
    256 个神经元。所以将 16,384 加到 256 上得到 16,640 个参数！
- en: The output layer receives tensors from the hidden layer into ten neurons at
    this layer. The output shape is (None, 10) because this layer has 10 neurons.
    The previous hidden layer has 256 neurons. Multiply 10 by 256 to get 2,560 parameters.
    But we have ten neurons at this layer. So add 2,560 to 10 to get 2,570 parameters.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 输出层接收来自隐藏层的张量，并在这一层有十个神经元。输出形状是 (None, 10)，因为这一层有 10 个神经元。前一隐藏层有 256 个神经元。将
    10 乘以 256 得到 2,560 个参数。但我们这一层有十个神经元。所以将 2,560 加到 10 上得到 2,570 个参数。
- en: Compile the Model
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编译模型
- en: The **compile** method configures the model for training. We set the optimizer,
    loss function, and metrics. The **loss function** (or objective function) is the
    quantity minimized during training. It represents a measure of success. The **optimizer**
    finds parameters that minimize the given loss function.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**compile** 方法配置模型以进行训练。我们设置了优化器、损失函数和指标。**损失函数**（或目标函数）是在训练过程中最小化的量。它代表成功的度量。**优化器**找到最小化给定损失函数的参数。'
- en: We use the Adam optimizer. *Adam* is an adaptive learning rate method that computes
    learning rates for different parameters. Adam is great because it *automatically*
    adapts learning rate for optimum training performance.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 Adam 优化器。*Adam* 是一种自适应学习率方法，它为不同的参数计算学习率。Adam 很好，因为它可以*自动*调整学习率以实现最佳的训练性能。
- en: We use the *sparse_categorical_crossentropy* loss function because our targets
    are integers that are mutually exclusive. That is, a digit can only be one of
    the ten digits.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 *sparse_categorical_crossentropy* 损失函数，因为我们的目标是互斥的整数。也就是说，一个数字只能是十个数字中的一个。
- en: 'Compile the model:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 编译模型：
- en: '[PRE24]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: We use the *Adam* optimizer because it performs well. We tried other optimizer
    options, but this one worked pretty well for this case, and it automatically adapts
    learning rate.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 *Adam* 优化器，因为它表现良好。我们尝试了其他优化器选项，但这个在这个情况下工作得相当好，并且它可以自动调整学习率。
- en: 'Peruse the following URL to see the available optimizers:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 查看以下 URL 以查看可用的优化器：
- en: '[`www.tensorflow.org/api_docs/python/tf/keras/optimizers`](http://www.tensorflow.org/api_docs/python/tf/keras/optimizers)'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '[TensorFlow API 文档 - Keras 优化器](http://www.tensorflow.org/api_docs/python/tf/keras/optimizers)'
- en: Train the Model
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练模型
- en: Since train_ds and test_ds are composed of both images and labels, we include
    them as parameters to the *fit* method for training. We run the model for 60 epochs,
    which means that we pass the data to the model 60 times. We train with train_ds
    and validate with test_ds.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 train_ds 和 test_ds 由图像和标签组成，我们将它们作为 *fit* 方法的参数包括在内以进行训练。我们运行模型 60 个周期，这意味着我们将数据传递给模型
    60 次。我们使用 train_ds 进行训练，使用 test_ds 进行验证。
- en: 'Train the model:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE25]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Our training accuracy is close to 97%. And test accuracy is close to 95%. Our
    model is overfitting a bit because test accuracy is lower than train accuracy.
    Due to randomization effects, your results may differ slightly.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的训练准确率接近 97%。测试准确率接近 95%。我们的模型有点过拟合，因为测试准确率低于训练准确率。由于随机化效应，你的结果可能会有所不同。
- en: 'It is always a good idea to evaluate the model for generalization purposes:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 总是评估模型以进行泛化是一个好主意：
- en: '[PRE26]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: So our model *generalizes* at about 95% with new data.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们的模型在新数据上的泛化能力约为 95%。
- en: Model History
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型历史
- en: The fit method automatically keeps a record of the loss and metric values during
    training. This is why we assigned training to variable *history* . The *history.history*
    object is a dictionary that contains the training record.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: fit 方法在训练过程中自动记录损失和指标值。这就是为什么我们将训练分配给变量 *history*。*history.history* 对象是一个字典，其中包含训练记录。
- en: 'Assign the training record to a variable:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练记录分配给一个变量：
- en: '[PRE27]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Display a list of the keys in the dictionary:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 显示字典中的键列表：
- en: '[PRE28]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: We use the loss, accuracy, val_loss, and val_accuracy keys to refer to the training
    metrics.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 loss、accuracy、val_loss 和 val_accuracy 键来引用训练指标。
- en: 'Get the length of the dictionary so we can reference the final metric values:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 获取字典的长度，以便我们可以引用最终的指标值：
- en: '[PRE29]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Subtract 1 from the length because Python list indexing starts at 0.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 减去 1 从长度，因为 Python 列表索引从 0 开始。
- en: Listing [2-3](#PC31) shows the final metric values.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-3](#PC31) 显示了最终的指标值。
- en: '[PRE30]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Since we have the training metrics, we can plot the training and validation
    loss as well as the training and validation accuracy as shown in Listing [2-4](#PC32).
    Validation loss and accuracy are based on test data because it is new to the model.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们有训练指标，我们可以绘制训练和验证损失以及训练和验证准确率，如列表 [2-4](#PC32) 所示。验证损失和准确率基于测试数据，因为它们对模型来说是新的。
- en: '[PRE31]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Import matplotlib.pyplot to enable plotting. Accuracy and loss metrics are saved
    in variables. The remainder of the code uses plotting methods to display the results.
    From the visualization, we see the training process. We recommend plotting training
    loss and accuracy with every neural network training exercise.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 matplotlib.pyplot 以启用绘图。准确性和损失指标保存在变量中。代码的其余部分使用绘图方法来显示结果。从可视化中，我们可以看到训练过程。我们建议在每个神经网络训练练习中绘制训练损失和准确率。
- en: The visualization verifies that our model is overfitting because training accuracy
    is higher than validation (or test) accuracy. Of course, the overfitting is not
    drastic. The visualization also shows where training and validation metrics converge
    or diverge. To generalize so that a model works with new data, training and test
    accuracy should be as closely aligned as possible.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化验证我们的模型正在过拟合，因为训练准确率高于验证（或测试）准确率。当然，过拟合并不剧烈。可视化还显示了训练和验证指标何时收敛或发散。为了使模型能够处理新数据，训练和测试准确率应尽可能接近。
- en: Predictions
  id: totrans-163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预测
- en: Deep learning leverages algorithms to automatically model and find patterns
    in data with the goal of predicting target outputs or responses. If we can predict
    from new data, we can gain insights to help decision making.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习利用算法自动对数据进行建模并找到数据中的模式，目标是预测目标输出或响应。如果我们能从新数据中预测，我们可以获得帮助决策的见解。
- en: 'One way to make predictions is with the *predict* method on the test data:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 一种进行预测的方法是在测试数据上使用 *predict* 方法：
- en: '[PRE32]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The *predictions* variable holds all of the predictions based on *test_ds*.
    Each prediction is represented by an array of values that provide a set of probabilities.
    The number of values in the array is based on the number of target classes. So
    each array holds ten values. The value in an array with the highest probability
    is the predicted digit.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '*predictions* 变量包含基于 *test_ds* 的所有预测。每个预测由一个值数组表示，该数组提供一组概率。数组中的值数基于目标类别的数量。因此，每个数组包含十个值。数组中概率最高的值是预测的数字。'
- en: 'Let’s look at the first prediction (at index 0):'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看第一个预测（索引0）：
- en: '[PRE33]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'It’s difficult to identify the highest probability from float numbers, so let’s
    make it easier to see:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 从浮点数中识别最高概率很困难，所以让我们让它更容易看到：
- en: '[PRE34]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The array value with the highest probability is the prediction. Each array position
    represents a digit between 0 and 9\. So position one is for digit 0, position
    two is for digit 1, and so on.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 数组中概率最高的值是预测值。每个数组位置代表一个介于0到9之间的数字。所以位置一代表数字0，位置二代表数字1，以此类推。
- en: 'Use the following algorithm to elicit confidence in the first prediction:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下算法来获取第一个预测的置信度：
- en: '[PRE35]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: So we are very confident that our prediction ws correct.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们非常确信我们的预测是正确的。
- en: 'With this algorithm, we predict the digit based on the first image in the test
    dataset:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此算法，我们根据测试数据集的第一张图片预测数字：
- en: '[PRE36]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Displayed is the predicted digit based on the first image in the test dataset.
    Was the prediction correct?
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 显示的是基于测试数据集第一张图片的预测数字。预测正确吗？
- en: 'Display the first label from the test dataset:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 显示测试数据集的第一个标签：
- en: '[PRE37]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: If the predicted digit is the same as the actual label, the prediction is correct!
    Since results may vary, we cannot be sure what digit was predicted.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果预测的数字与实际标签相同，则预测正确！由于结果可能不同，我们无法确定预测了哪个数字。
- en: Let’s make predictions based on the first five images in the test dataset.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们基于测试数据集中的前五张图片进行预测。
- en: Listing [2-5](#PC39) displays the first five predictions from test data and
    then displays the confidence we have in each prediction.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-5](#PC39) 显示了测试数据的前五个预测以及我们对每个预测的置信度。
- en: '[PRE38]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: We can also compare our first five predictions against the actual target values
    to see how well our model performed.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以将我们的前五个预测与实际的目标值进行比较，以查看我们的模型表现如何。
- en: Listing [2-6](#PC40) displays the predicted digit, actual digit, confidence
    in the prediction, and actual image for the first five data elements from the
    test dataset.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-6](#PC40) 展示了测试数据集中前五个数据元素的预测数字、实际数字、预测的置信度和实际图像。
- en: '[PRE39]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Get an Image
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 获取图片
- en: 'To get an image for this book, just follow these simple steps:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取本书的图片，只需遵循以下简单步骤：
- en: 'Go to the GitHub URL for this book: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow)*.*'
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往本书的GitHub网址：[`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow)*.*
- en: Locate the image you want to download and click it.
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定位要下载的图片并点击它。
- en: Click the *Download* button.
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *下载* 按钮。
- en: Right-click anywhere inside the image.
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在图片内部任意位置右键点击。
- en: Click *Save image as…*.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *另存为…*。
- en: Save the image on your computer.
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在电脑上保存图片。
- en: Drag and drop the image to your Google Drive *Colab Notebooks* folder.
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将图片拖放到你的Google Drive *Colab Notebooks* 文件夹。
- en: For this lesson, go to the book URL, click *chapter2*, click *figures*, click
    *Figure0201.png*, click the *Download* button, right-click inside the image, click
    *Save image as…*, and save the image on your computer. Drag and drop the image
    to your Google Drive *Colab Notebooks* folder.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 对于本课，前往本书的URL，点击 *chapter2*，点击 *figures*，点击 *Figure0201.png*，点击 *下载* 按钮，在图片内部右键点击，点击
    *另存为…*，并在电脑上保存图片。将图片拖放到你的Google Drive *Colab Notebooks* 文件夹。
- en: '![../images/501128_1_En_2_Chapter/501128_1_En_2_Figa_HTML.jpg](../images/501128_1_En_2_Chapter/501128_1_En_2_Figa_HTML.jpg)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![../images/501128_1_En_2_Chapter/501128_1_En_2_Figa_HTML.jpg](../images/501128_1_En_2_Chapter/501128_1_En_2_Figa_HTML.jpg)'
- en: Mount Google Drive to Display an Image
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 挂载Google Drive以显示图片
- en: 'We know that Colab notebooks are saved to Google Drive. But we can also load
    images and other data from Google Drive into a Colab notebook. If you don’t have
    a Google email account, create one. Just follow three simple steps:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道Colab笔记本是保存在Google Drive上的。但我们也可以将图片和其他数据从Google Drive加载到Colab笔记本中。如果你没有Google邮箱账户，创建一个。只需遵循三个简单步骤：
- en: Install the *Pillow* module (if necessary).
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 *Pillow* 模块（如果需要）。
- en: Mount Google Drive.
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 挂载Google Drive。
- en: Point to the image and show it.
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指向图片并显示它。
- en: 'The Pillow library should already be installed, but you can install it as so:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: Pillow库应该已经安装，但你可以这样安装：
- en: '[PRE40]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: The *!* symbol enables us to invoke shell commands like installing a Python
    module in the notebook.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '*!* 符号使我们能够在笔记本中调用shell命令，例如安装Python模块。'
- en: 'Run the code cell to begin the mounting process:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 运行代码单元以开始挂载过程：
- en: '[PRE41]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: To continue mounting, click the URL link, choose the Google account you wish
    to use, click the *Allow* button, copy the authorization code, paste it in the
    *Enter your authorization code:* textbox, and press the *Enter* key on your keyboard.
    It sounds like a lot of work, but it is actually really easy. The drive is mounted
    to *gdrive/My Drive/Colab Notebooks*.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 要继续挂载，点击 URL 链接，选择你希望使用的 Google 账户，点击 *允许* 按钮，复制授权代码，将其粘贴到 *输入你的授权代码:* 文本框中，然后按下键盘上的
    *Enter* 键。听起来像是一件很麻烦的事情，但实际上非常简单。驱动器挂载到 *gdrive/My Drive/Colab Notebooks*。
- en: Now, be sure you have the image on *Google Drive*. The image is included on
    our GitHub site for the book. You just have to save it to your computer and drag
    it into a Google Drive directory. Of course, you can use any image that you wish.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，请确保你在 *Google Drive* 上有这张图像。图像包含在我们的 GitHub 网站上的书中。你只需将其保存到你的电脑上，然后将其拖入 Google
    Drive 目录。当然，你也可以使用任何你想要的图像。
- en: We saved the image into the *Colab Notebooks* directory. You can save it anywhere
    you wish, but be sure to point to it correctly.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将图像保存到 *Colab Notebooks* 目录中。你可以保存到任何你希望的地方，但确保正确指向它。
- en: Listing [2-7](#PC43) creates the path to the image and displays the image.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-7](#PC43) 创建了图像的路径并显示了图像。
- en: '[PRE42]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: The image name is *Figure0201.png*. We import *Image* from the *PIL* library.
    Python expects PIL when accessing the Pillow module. We also import *matplotlib.pyplot*,
    which is a module in the Python plotting library *matplotlib*. We open the image
    and display it in the Colab notebook.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图像名称为 *Figure0201.png*。我们从 *PIL* 库中导入 *Image*。当访问 Pillow 模块时，Python 期望 PIL。我们还导入了
    *matplotlib.pyplot*，它是 Python 绘图库 *matplotlib* 中的一个模块。我们打开图像并在 Colab 笔记本中显示它。
