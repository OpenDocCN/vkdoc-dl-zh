    The encoder-decoder architecture is a common way of handling sequence-to-sequence
    problems.


    ## BERT


    `BERT` (Bidirectional Encoder Representations from Transformers) is the new paradigm
    in NLP. It is getting widely adopted in sequence-to-sequence modelling tasks as
    well as in classifiers. `BERT` is a pretrained model. It was released by Google
    in 2018 and has been found to outperform in various NLP challenges since then.
    The commercial use of `BERT` is also catching up. Many organizations are fine-tuning
    their context-specific use cases in NLP using the base `BERT` model.


    ## Language Models and Fine-Tuning


    Like the imagenet moment of image processing, `BERT` is the turning point in NLP.
    In text mining problems we are always limited by the training dataset. Add to
    it the complexity of language, where words have similar meanings, the usage of
    words in various contexts, mixing words from different languages in the same sentences,
    etc. To address these problems (sparsity of data and complexity of language),
    two concepts have evolved over the last few years: language models and fine tuning.
    Language models are very useful. They capture the semantic meanings of a language.
    You learned about `word2vec` in the last chapter, where the meanings of the words
    are captured using pretrained models. `BERT` is also a powerful language model
    where the meaning of a word is captured along with its context. To quote a familiar
    example, `BERT` can differentiate the word "bank" between the two sentences "She
    went to the bank to deposit money." and "Coconuts grow well in the river bank
    where the soil is rich." `BERT` helps us to capture the disambiguation of the
    same word, "bank," based on the words preceding and succeeding it. Please note
    that in `word2vec` models, they are not distinguishable.


    Image classifications have been primarily using fine-tuning methods for some time
    now. NLP has started adopting fine tuning of late. Basically a large corpus of
    text data is pretrained using neural networks on a large sample with millions
    of training datasets. This trained neural network, along with its weights, are
    open sourced. A NLP scientist can now use this pretrained model for their downstream
    tasks like classification, summarization, etc. for a specific context. They can
    retrain the context-specific models with new data but initialize with the weights
    relevant to the pretrained models. `BERT` is a language model pretrained and available
    for fine tuning for downstream NLP tasks. Let''s see an example using `BERT` for
    the classification of a credit card company''s dataset into multiple intents.


    ## Overview of BERT


    `BERT` architecture on the outset is built on transformers. `BERT` is also bidirectional.
    The words take contexts from words preceding and succeeding in the sentences.
    Before you go further, you need to understand transformers. In the sentence "The
    animal didn''t cross the road because it was afraid," the word "it" refers to
    the animal. In the sentence "The animal didn''t cross the road because it was
    narrow," the word "it" refers to the road. (Example from [https://ai.googleblog.com/2017/08/transformer-novel-neural-network.html](https://ai.googleblog.com/2017/08/transformer-novel-neural-network.html)).
    As you can see, the surrounding words determine the meaning of the word. This
    brings up the concept of attention, which is at the core of the transformers.'
