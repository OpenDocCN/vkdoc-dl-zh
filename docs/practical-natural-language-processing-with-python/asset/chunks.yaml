    \ use record instead of\n        #listen\n        audio = r.record(source)\n \
    \       abc = r.recognize_google(audio, show_all=show_all)\n        return abc\n\
    ```\n\nThe function takes two arguments. One is the file itself. The other is\
    \ the speech recognition’s flag called `show_all`. If this is `False`, then the\
    \ Google API returns the most probable speech-to-text recognition. The output\
    \ is shown in Listing 2-37.\n\n**Listing 2-37.**\n\n```\naf1 = \"sample_audio.wav\"\
    \nspeech_to_text(af1, False)\n'I am calling for reversal of enquiry and my account\
