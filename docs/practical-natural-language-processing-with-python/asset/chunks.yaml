    \ Jaccard 系数。当命中次数低于某个阈值时，将该分数视为无效。这是因为很大一部分命中次数可能纯属偶然。由于这是网络搜索，我们将阈值设定在数百万级别。此方法基于论文《使用网络搜索引擎测量词语间的语义相似度》，论文地址为\
    \ [`www2007.org/papers/paper632.pdf`](http://www2007.org/papers/paper632.pdf)。\n\
    5.  比较分数并标记情感极性。\n\n第 3 章 在线评论中的自然语言处理\n\n让我们开始吧。参见清单 3-21。\n\n***清单 3-21.***\n\
    \n```\nimport requests\nimport numpy as np\n\nsearch_url = \"https://api.cognitive.microsoft.com/bing/v7.0/search\"\
    \nheaders = {\"Ocp-Apim-Subscription-Key\": \"your-key\"}\n```\n\n在清单 3-22 中，`get_total`\
    \ 函数用于获取给定查询的总词数，`get_query_word` 函数通过将感兴趣单词与正面和负面锚词组合来准备查询。\n\n***清单 3-22.***\n\
    \n```\ndef get_total(query_word):\n    params = {\"q\": query_word, \"textDecorations\"\
    : True, \"textFormat\": \"HTML\"}\n    response = requests.get(search_url, headers=headers,\
    \ params=params)\n    response.raise_for_status()\n    search_results = response.json()\n\
    \    return search_results['webPages']['totalEstimatedMatches']\n\ndef get_query_word(str1,\
    \ gword, bword):\n    str_base = gword\n    str_base1 = bword\n    query_word_pos\
    \ = str1 + \"+\" + str_base\n    query_word_neg = str1 + \"+\" + str_base1\n \
    \   return query_word_pos, query_word_neg\n```\n\n在清单 3-23 中，`get_pmi` 和 `get_jaccard`\
    \ 函数根据图 3-10. 中描述的公式，为所有输入参数计算逐点互信息分数和 Jaccard 分数。如果命中次数不足，则将其标记为“na”。\n\n第 3\
    \ 章 在线评论中的自然语言处理\n\n***清单 3-23.***\n\n```\ndef get_pmi(hits_good, hits_bad, hits_total,\
    \ sr_results_pos_int, sr_results_neg_int, str1_tot):\n    pos_score = \"na\"\n\
    \    neg_score = \"na\"\n    if(sr_results_pos_int >= 1000000):\n        pos_score\
    \ = np.log((hits_total * sr_results_pos_int) / (hits_good * str1_tot))\n    if(sr_results_neg_int\
    \ >= 1000000):\n        neg_score = np.log((hits_total * sr_results_neg_int) /\
    \ (str1_tot * hits_bad))\n    return pos_score, neg_score\n\ndef get_jaccard(hits_good,\
    \ hits_bad, sr_results_pos_int, sr_results_neg_int, str1_tot):\n    pos_score\
    \ = \"na\"\n    neg_score = \"na\"\n    if(sr_results_pos_int >= 1000000):\n \
    \       pos_score = sr_results_pos_int / (((str1_tot + hits_good) - sr_results_pos_int))\n\
    \    if(sr_results_neg_int >= 1000000):\n        neg_score = sr_results_neg_int\
    \ / (((str1_tot + hits_bad) - sr_results_neg_int))\n    return pos_score, neg_score\n\
    ```\n\n现在，你需要定义锚词以及你想要分析的感兴趣单词。\n"
