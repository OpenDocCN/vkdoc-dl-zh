- fmt: "# Chapter 2 NLP in Customer Service\n\nProducts can have various variations.\
    \ For instance, a refrigerator can be called a fridge or by a brand name like\
    \ Samsung or a model name like 687L or sometimes a brand name with capacity like\
    \ Samsung 200 L. Extracting products for retail or ecommerce is very complex given\
    \ the number of possibilities of products out there and the possible ways of referencing\
    \ them. You will see this in detail in Chapter 3. For some of the other domains,\
    \ like telco or BFSI, the variation in products is not large and hence they can\
    \ be handled with simple lookups. Figure 2-18 shows a chart you could analyze\
    \ and get insights based on conversion rates and volume. It shows top products\
    \ with the conversion rates of the products.\n\n**Figure 2-18.** Top products\
    \ and conversion rates\n\n## Reasons for Non-Purchase\n\nYou can also mine the\
    \ chats for objections raised by customers about buying the product. Normally\
    \ a good classifier trained on objections can do well. Here, locating the issue\
    \ line is the key. Not every line in the chat will have an objection from the\
    \ customer. Sometimes agents are also prompted to ask leading questions to customers\
    \ to state their objections. The reasons for non-purchase are also collected as\
    \ part of the final agent dispositions. The top reasons why customers generally\
    \ do not buy are price, incompatibility of product, installation, return policy,\
    \ shipping cost, better deal with a competitor, and wanting to consult others\
    \ before making a purchase decision. These high-level reasons are similar across\
    \ different companies, so you can use the same predictive model (or even heuristic\
    \ rules) for different organizations.\n\n## Survey Comments Analysis\n\nSurveys\
    \ are collected at the end of a chat to understand the customer experience. This\
    \ dataset proves very rich in trying to understand the customer’s perception about\
    \ the agent or product or even reasons for non-purchase. A set of heuristics or\
    \ a supervised model is applied to mine survey comments. This corpus is also a\
    \ good indicator of emotions or sentiments of the user. Chat conversations generally\
    \ tend to be neutral whereas the survey comments can clearly indicate the sentiment\
    \ of a customer. You will look at sentiment mining in detail in the next chapter.\n\
    \n## Mining Voice Transcripts\n\nSo far you have explored text mining in customer\
    \ service in detail. However, the bulk of data is still produced in call centers\
