    ## 识别问题行


    在上面的例子中，提供的数据是单行句子。然而，在对话中，存在整个对话语料库。将整个对话语料库标记为某个意图是很困难的。信噪比相当低，因此通常你会先尝试识别对话中可能包含问题行的部分，然后仅对这些句子进行意图挖掘。这可以显著提高信噪比。你还可以构建另一个监督学习模型来定位对话中的哪些行包含客户的问题。客户问题通常出现在“聊天”的前几行，或者会跟在诸如“请问有什么可以帮助您”这样的问题之后。参见表
