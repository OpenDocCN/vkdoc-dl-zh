    \ 价格\n\n![Image 38](index-121_1.jpg)\n\n11. 电池\n12. 收音机\n13. 摄像头\n14. 键盘\n15.\
    \ 应用\n16. 保修\n17. 保证\n18. 通话质量\n19. 存储\n\n`attr_cat.csv` 是映射文件。映射文件的快速预览如表 [3-6](#index_split_001.html#p121)\
    \ 所示。\n\n***表 3-6.** 映射文件快速预览*\n\n你还可以从 `str_sel_list` 获取名词的顶部列表。这可用于调整类别属性的映射列表。任何出现在顶部词汇但不在映射文件中的名词都应被包含。请参见[列表\
    \ 3-56](#index_split_001.html#p122) 和图 [3-19](#index_split_001.html#p122)。\n\n\
    ![Image 39](index-122_1.jpg)\n\n***列表 3-56.***\n\n### 获取顶部词汇\n\n```python\nfrom\
    \ collections import Counter\n\nstr_sel_list_all = ' '.join(str_sel_list)\nstr_sel_list_all\
    \ = str_sel_list_all.replace('.','')\nstr_sel_list_all_list = Counter(str_sel_list_all.split())\n\
    str_sel_list_all_list.most_common()\n```\n\n***图 3-19.***\n\n### 步骤 4：将每条评论映射到属性\n\
    \n设置好映射文件后，你将迭代地将每条评论映射到一个属性。请参见[列表 3-57](#index_split_001.html#p122)。\n\n***列表\
    \ 3-57.***\n\n```python\nattr_cats = pd.read_csv(\"attr_cat.csv\")\nattrs_all\
    \ = []\n\nfor index,row in t3.iterrows():\n    ext1 = row[\"all_attrs_ext\"]\n\
    \    attr_list = []\n    for index1,row1 in attr_cats.iterrows():\n        wrd\
    \ = row1[\"words\"]\n        cat = row1[\"cat\"]\n        if(ext1.find(wrd)>=0):\n\
    \            attr_list.append(cat)\n    attr_list = list(set(attr_list))\n   \
    \ attr_str = ' '.join(attr_list)\n    attrs_all.append(attr_str)\n```\n\n数据框中的\
    \ `attrs_all` 列包含提取出的属性。\n\n### 步骤 5：分析品牌\n\n现在你将分析不同品牌在不同类别中的表现。为此，你选择了顶级品牌。你还会将评分分类为\
    \ `pol_tag`。4 分和 5 分的高评分将被分类为正面，1 分和 2 分的低评分为负面，3 分为中性。请参见[列表 3-58](#index_split_001.html#p123)。\n\
    \n***列表 3-58.*** 评分分类\n\n```python\nt3[\"attrs\"] = attrs_all\nt3[\"pol_tag\"\
    ] = \"neu\"\nt3.loc[t3.Rating>=4,\"pol_tag\"] = \"pos\"\nt3.loc[t3.Rating<=2,\"\
