- fmt: "# 文本排版\n\nThere can be different types of rules, such as `And`, `Not`, `And\
    \ with three words`, and so on. The set of rules are joined by an “or” condition.\
    \ Tools like QDA Miner, Clarabridge, and SPSS can be used to write and execute\
    \ powerful rules. Rules can also contain grammatical constructs of a sentence\
    \ like nouns, adverbs, and so on. In Listing 2-7, Listing 2-8, and Figure 2-4,\
    \ you write your own text mining rule engine using Python.\n\nThe rules file contains\
    \ two sets of rules. One is for a single word being present. If it is present,\
    \ the sentence gets assigned to that category. For example, if the word “baggage”\
    \ is present, it gets assigned to the category. The other type of rule is an “and”\
    \ of two words separated by a window. Based on general practice, it is found that\
    \ a wide variety of topics can be covered by a single word or a two-word match.\
    \ For example, the rule “`check` and `in` separated (window) by less than two\
    \ words” can capture a sentence like “check me in.” The column “window” in the\
    \ rules file with a value of -1 means the window is not applicable. Also note\
