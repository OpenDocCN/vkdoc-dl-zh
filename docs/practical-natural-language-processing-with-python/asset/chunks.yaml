    ## Observation 3


    A negation word is the negative of a given word. It can be positive or negative.
    "Did not like" is a negation instance. Since your lexicons contain only a single
    word, if you do not take care of negation words you could tag the sentence with
    the wrong polarity. Similar to the booster word approach, you will identify a
    set of negative words and cross-reference them with a negative and positive set
    to see if there is an occurrence of negation in the sentence. If there is an occurrence,
    you will subtract the score from that polarity. Let''s say you have five positive
    hits and two negation hits. You will subtract the scores of 5 and 3.


    You can also give a higher weight to negation than the positive hits. See Table
    [3-3](#index_split_001.html#p85).


    **Table 3-3.**


    | Summary | full_txt | pos_set | neg_set |

    |---------|----------|---------|---------|

    | Not just a | not just a pepper flavor i was really excited to have a | {excited,
    well} | {bad} |

    | | pepper flavor blend of peppercorns however since there is allspice mixed in
    with these it really throws the flavor off of well all of my dishes you can taste
    the pepper yet you also taste a earthy kind of pungent bite as well i even tried
    picking through the peppercorns and removing the allspice it was too late the
    flavor is still mixed in there <shrug> too bad | | |

    | Not Odor Free | not odor free as advertised when i began purchasing these....
    | {appreciate, free, improves, odor, crazy, satisfied} | {unfortunate, bully,
    smell} |


    ## Observation 4


    Exclamation marks are another significant token through which you can understand
    the user''s emotion. Exclamation marks on their own do not convey a positive or
    a negative emotion. They only accentuate the underlying emotion. For instance
    "Bad!" and "Delicious!" are followed by exclamation marks but one stands for a
    negative experience and the other stands for positive experience. See Table [3-4](#index_split_001.html#p86).


    **Table 3-4.** *Exclamation Marks*


    | Summary | full_txt | pos_set | neg_set |

    |---------|----------|---------|---------|

    | the only nut thin | the only nut thin flavor that is dairy-free! my favorite
    flavor because it is also dairy free and even though they are not as strongly
