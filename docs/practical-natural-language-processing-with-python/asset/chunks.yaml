    \        print(i, \"pmi neutral\")\n\n    if (jc_score[0] == \"na\") or (jc_score[1]\
    \ == \"na\"):\n        print(i, \"jc indeterminate\")\n    elif (jc_score[0] >\
    \ jc_score[1]):\n        print(i, \"jc pos\")\n    elif (jc_score[0] < pmi_score[1]):\n\
    \        print(i, \"jc neg\")\n    else:\n        print(i, \"jc neutral\")\n```\n\
    \n输出如[清单 3-26](#index_split_001.html#p103)所示。部分输出，例如“average”，显示为正面，因为你没有定义中性状态。你可以添加一个条件：如果正面和负面之间的差异在某个阈值内，则该词将被视为中性。\n\
