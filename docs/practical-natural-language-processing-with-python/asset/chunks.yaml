    \nChapter 4 NLP in Banking, Financial Services, and Insurance (BFSI)\n\n## Step\
    \ 7: Getting a negative corpus\n\nGiven that you are dealing with a news corpus\
    \ and you may see a mix of organization and non-organization words, you can use\
    \ a public dataset to remove celebrities, politicians, or names of places like\
    \ Chennai, Mumbai, etc. You can use Wikidata for the same. [Wikidata (www.wikidata.org/wiki/Wikidata:Main_Page)](http://www.wikidata.org/wiki/Wikidata:Main_Page)\
    \ is an open source project that stores underlying information from wiki projects\
    \ in a RDF format. The Resource Description Framework is the data model of the\
    \ semantic web and you can use SPARQL to query data stored in RDF. You use SPARQL\
    \ on the Wikidata corpus to get a list of non-organization entities.\n\nSo use\
    \ SPARQL to get the following lists from Wikidata:\n\n- **Celebrities of India**:\
    \ Famous personalities of India are retrieved through the query in Listing [4-64.](#index_split_002.html#p176)\n\
    \n***Listing 4-64.***\n\n```sparql\nSELECT ?item ?itemLabel WHERE { ?item wdt:P31\
    \ wd:Q5; wdt:P27 wd:Q668;\nSERVICE wikibase:label { bd:serviceParam wikibase:language\
    \ \"en\". } }\n```\n\n- **Places in India**: Cities, states, towns, and countries\
    \ of the world (Listing [4-65).](#index_split_002.html#p176)\n\n***Listing 4-65.***\n\
    \n```sparql\nSELECT ?city ?cityLabel ?state WHERE {\n{?city (wdt:P31/(wdt:P279*))\
    \ wd:Q3957}\nUNION\n{?city (wdt:P31/(wdt:P279*)) wd:Q515}\nUNION\n{?city (wdt:P31/(wdt:P279*))\
    \ wd:Q149621}\nUNION\n{?city (wdt:P31/(wdt:P279*)) wd:Q13390680 }\n?city wdt:P17\
    \ wd:Q668\nSERVICE wikibase:label { bd:serviceParam wikibase:language \"[AUTO_LANGUAGE],en\"\
    . }\n}\n```\n\n- Political positions like prime minister, chief minister, etc.\
    \ (Listing [4-66](#index_split_002.html#p177))\n\nChapter 4 NLP in Banking, Financial\
    \ Services, and Insurance (BFSI)\n\n***Listing 4-66.***\n\n```sparql\nSELECT ?postion\
    \ ?positionLabel WHERE {\n{?position (wdt:P31/(wdt:P279*)) wd:Q4164871;\nwdt:P1001\
    \ ?juris.\n?juris wdt:P31 wd:Q13390680.}\nUNION\n{\n?position wdt:P31 wd:Q294414.\n\
    ?position wdt:P17 wd:Q668.}\nUNION\n{\n?position wdt:P31 wd:Q4164871.\n?position\
    \ wdt:P17 wd:Q668.\n}\nSERVICE wikibase:label { bd:serviceParam wikibase:language\
    \ \"[AUTO_LANGUAGE],en\". }\n}\n```\n\n## Step 8: Validate the 22K dataset\n\n\
    After obtaining the lists from step 7, you now proceed to validate the 22K dataset\
    \ in step 6. You compare the set of files you have and eliminate common words\
    \ using a cosine similarity. The detailed process is described in the following\
    \ steps.\n\n### Step 8.1: Read your `only_ner_tagged.csv` in another notebook\n\
    \nProcess the data into two lists, one with spaces and one without spaces. See\
