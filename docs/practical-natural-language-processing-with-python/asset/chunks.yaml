    wiki_positions.head()\n```\n\n***Figure 4-17.***\n\n### Step 8.3: Process the\
    \ columns and combine the files into a single dataframe\n\nYou then create non-duplicate\
    \ lists with and without spaces. See Listings [4-72 and](#index_split_002.html#p179)\
    \ [4-73](#index_split_002.html#p180).\n\n***Listing 4-72.***\n\n```python\nwiki_names.columns\
    \ = [\"url\", \"itemLabel\"]\nwiki_places.columns = [\"url\", \"itemLabel\"]\n\
    wiki_positions.columns = [\"url\", \"itemLabel1\"]\n```\n\nChapter 4 NLP in Banking,\
    \ Financial Services, and Insurance (BFSI)\n\n```python\n# processing words like\
    \ \"of Gujarat\", \"of Delhi\" to arrive at better similarity\nwiki_positions[\"\
    itemLabel\"] = wiki_positions[\"itemLabel1\"].str.replace('of [a-zA-Z\\s]+', '')\n\
    wiki_names = wiki_names.drop_duplicates([\"itemLabel\"])\nwiki_places = wiki_places.drop_duplicates([\"\
    itemLabel\"])\nwiki_positions = wiki_positions.drop_duplicates([\"itemLabel\"\
    ])\nwiki_all = pd.concat([wiki_names, wiki_places, wiki_positions], axis=0)\n\
    ```\n\n***Listing 4-73.***\n\n```python\nwiki_all[\"itemLabel1\"] = wiki_all[\"\
    itemLabel\"].str.lower()\nitem_list_space = pd.Series(wiki_all[\"itemLabel1\"\
    ].unique())\nwiki_all[\"itemLabel2\"] = wiki_all[\"itemLabel1\"].str.replace(\"\
    \ \", \"\")\nitem_list = pd.Series(item_list_space).str.replace(\" \", \"\")\n\
    ```\n\n### Step 8.4: Vectorize the lists\n\nThe lists with spaces get vectorized\
    \ using a word vectorizer (`ner_list`, `item_list`). The lists without spaces\
    \ get vectorized as a character vectorizer (`ner_list_space`, `item_list_space`).\
    \ You then concatenate the outputs into two single arrays: one for your shortlisted\
    \ named entities and the other for the Wikidata corpus. See Listings [4-74 and](#index_split_002.html#p180)\
    \ [4-75](#index_split_002.html#p181).\n\n***Listing 4-74.***\n\n```python\nfrom\
    \ sklearn.feature_extraction.text import TfidfVectorizer\n\nvectorizer = TfidfVectorizer(analyzer='char',\
    \ ngram_range=(4, 6), min_df=0.0001)\nner_vect_char = vectorizer.fit_transform(ner_list)\n\
    wiki_vect_char = vectorizer.transform(item_list)\n\nvectorizer1 = TfidfVectorizer(analyzer='word',\
    \ ngram_range=(1, 1), min_df=0.0001)\nner_vect_word = vectorizer1.fit_transform(ner_list_space)\n\
    wiki_vect_word = vectorizer1.transform(item_list_space)\n```\n\n![Image 58](index-181_1.png)\n\
    \nChapter 4 NLP in Banking, Financial Services, and Insurance (BFSI)\n\n***Listing\
    \ 4-75.***\n\n```python\nfrom scipy.sparse import hstack\n\nner_vect = hstack([ner_vect_char,\
    \ ner_vect_word])\nwiki_vect = hstack([wiki_vect_char, wiki_vect_word])\n```\n\
    \n### Step 8.5: Cosine similarity\n\nNow for the cosine similarity of `ner_vect`\
    \ and `wiki_vect`. See Listing [4-76.](#index_split_002.html#p181)\n\n***Listing\
    \ 4-76.***\n\n```python\nfrom sklearn.metrics.pairwise import cosine_similarity\n\
    \nsim_vec = cosine_similarity(ner_vect, wiki_vect, dense_output=False)\n```\n\n\
    ### Step 8.6: Consider it a match if the cosine similarity is greater than 0.6\n\
    \nSince you have a sparse matrix, you convert that to a coordinate format (coo).\
    \ Coo formats store data in three arrays: one for row, column, and data. See Listing\
    \ [4-77](#index_split_002.html#p181) and Figure [4-18](#index_split_002.html#p181).\n\
    \n***Listing 4-77.***\n\n```python\ncondition = (sim_vec >= .6)\ncoo = condition.tocoo()\n\
    \ndf_matches = pd.DataFrame(columns=[\"wiki_match_label\", \"ner_match_label\"\
    ])\nwiki_match_label = [item_list[i] for i in coo.col]\nner_match_label = [ner_list[i]\
    \ for i in coo.row]\n\ndf_matches[\"wiki_match_label\"] = wiki_match_label\ndf_matches[\"\
    ner_match_label\"] = ner_match_label\ndf_matches.head()\n```\n\n***Figure 4-18.***\n\
    \n![Image 59](index-182_1.png)\n\nChapter 4 NLP in Banking, Financial Services,\
    \ and Insurance (BFSI)\n\n### Step 8.4 (continued): Match with the original dataset\n\
    \nGet the non-matched entities as your final filtered organization entities. See\
