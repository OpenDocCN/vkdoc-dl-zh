- fmt: '**yes. that is correct. I just received email saying my service price was
    going up**


    **to $70/month but on your web site, it’s only $30\. What’s the deal with that?**


    **agent**


    **Thank you for the information Mrs. Sara.**


    **agent**


    **I’m sorry to hear about the increase, our billing department can verify on the**


    **changes of the prices.**


    **customer**


    **who do I need to talk to?**


    **agent**


    **I will provide you the billing department number. Sorry**


    **customer**


    **thank you**


    **Agent**


    **The number for Billing is: XXXXXXXX, they are open Monday - Friday: 8:00 a.m.
    -**


    **6:00 p.m. ET. Saturday/Sunday/Holidays: Closed**


    **Customer**


    **ok thanks. good bye**


    A lot of information can be cleanly taken from the above corpus. The user name,
    their problem, the fact that the user is responsive to emails, the user is also
    sensitive to price, the user’s sentiment, the courtesy of the agent, the outcome
    of the chat, the resolution provided by the agent, and the different departments
    of Best Telco.


    ## Chapter 1 types of Data


    Also, note how the data is laid out: it’s free flow text from the customer. But
    the chat agent plays a critical role in directing the chat. The initial lines
    talk about the issue, then the agent presents a resolution, and then towards the
    end of the chat a final answer is received along with the customer expressing
    their sentiment (in this case, positive).


    The same interaction can happen over a voice call where a customer service representative
    and a user interact to solve the issue faced by the customer. Almost all characteristics
    are the same between voice calls and chat data, except in a voice call the original
    data is an audio file, which is transcribed to text first and then mined using
    text mining. At the end of the customer call, the customer service representative
    jots down the summary of the call. Referred to as “agent call notes,” these notes
    are also mined to analyze voice calls.


    ### SMS Data


    SMS is the best way to reach 35% of the world. SMS as a channel has one of the
    highest open rates (number of people who open the SMS message to number of people
    who received the SMS message): 5X over email open rates (https://blog.rebrandly.com/12-sms-text-message-marketing-statistics).
    On average, a person in the US receives 33 messages a day (www.textrequest.com/blog/how-many-texts-people-send-per-day/).
    Many app companies access customers’ SMS messages and mine the data to improve
    user experiences. For instance, apps like `ReadItToMe` read any SMS messages received
    by users while they are driving. `Truecaller` reads the SMS messages and classifies
    them into spam and non-spam. `Walnut` provides a view of users’ spending based
    on the SMS messages they have received. Just by looking at only transactional
    SMS data, much user information can be extracted: user’s income, their spending,
    type of spending, preference for online shopping, etc. The data source is more
    structured if we are only analyzing business messages. See Figure [1-4.](#index_split_000.html#p21)


    ![Image 6](index-21_1.jpg)


    **Figure 1-4.** A screenshot from the Walnut (https://capitalfloat.com/walnut/)
    app


    Businesses follow a template and are more structured. Take the following SMS as
    an example. The noise in this dataset is much less. Clear information is presented
    in a clear style. Although different credit card companies can present different
    styles of information, it is still easier to extract information as compared to
    free-flow customer text.


    ```

    Mini Statement for Card ******1884.Total due Rs. 4813.70\. Minimum due

    Rs.240.69\. Payment due on 07-SEP-19\. Refer to your statement for more

    details.

    ```


    ### Content Data'
