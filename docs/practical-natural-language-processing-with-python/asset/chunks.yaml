    \ aNd iNSuraNCe (BFSi)\n\n**Other Use Cases of NLP in Banking, Financial**\n\n\
    **Services, and Insurance**\n\nThe banking, financial services, and insurance\
    \ industries collect a lot of structured data from customers. For large banks,\
    \ the data collected per user can run into hundreds of\n\nthousands of columns.\
    \ Hence, even if NLP is used, it is used as a few of the variables in the model.\
    \ The key sources of NLP data could include customer care (voice and text), sales\
    \ representative notes, relationship manager notes, customer transaction notes,\
    \ survey\n\nfeedback, and recent external data (social media and news corpus data).\
    \ In the case of insurance, claims notes get processed. Using this data, NLP is\
    \ used to identify fraud, risk, attrition, targeting for marketing campaigns,\
    \ sales malpractices, claims process, recommendation of investment, portfolio\
    \ management, etc.\n\n**SMS Data**\n\nAnother source of text data that has become\
    \ widely used with financial institutions is user SMS data. There are personal\
    \ financial management companies that mine user SMS data\n\nand get the state\
    \ of a user’s need and financial health. A user’s SMS data (to be used with user\
    \ consent) offers rich information of that user’s shopping and financial preferences.\n\
    \n**Natural Language Generation in Banks**\n\nAutomated insight generation is\
    \ an upcoming field that has seen adoption by investment companies and financial\
    \ organizations that do a lot of report crunching. Given a bunch of graphs and\
    \ charts, we can generate a meaningful automated narrative out of them using\n\
    \nsome of the natural language generation techniques. Virtual assistants are now\
    \ occupying center stage in financial institutions. Using historic customer support\
    \ data, we can develop conversation agents that can understand and respond appropriately\
