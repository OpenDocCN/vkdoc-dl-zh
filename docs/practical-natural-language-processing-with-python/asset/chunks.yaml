    \ Banking, Financial Services, and Insurance (BFSI)\n\nYou can see a lot of organizations\
    \ in this list. There are 115 unique words if you apply a filter of count >= 10.\
    \ Listing [4-81](#index_split_002.html#p183) is a script that identifies the percentage\
    \ of English words in every row here. Typical organization names will have less\
    \ English words and more of \"names\" like words. You are using a library named\
    \ [enchant (https://pypi.org/project/pyenchant/)](https://pypi.org/project/pyenchant/)\
    \ for this purpose. This will further help you deep dive in the next step. Also,\
    \ see Listing [4-81.](#index_split_002.html#p183)\n\n***Listing 4-80.***\n\n```python\n\
    shrt_words = pd.DataFrame(t3.loc[t3.ner_match_label.isna() == True, \"ner_words1\"\
    ].value_counts()).reset_index()\nshrt_words.columns = [\"words\", \"count\"]\n\
    ```\n\n***Listing 4-81.***\n\n```python\nword_checks = enchant.Dict(\"en_US\"\
    )\n\ndef chk_eng(word):\n    tot_flag = 0\n    for i in word.split():\n      \
    \  flag = word_checks.check(i)\n        if(flag == True):\n            tot_flag\
    \ = tot_flag + 1\n    return tot_flag\n\nshrt_words[\"eng_ind\"] = shrt_words[\"\
    words\"].apply(chk_eng)\nshrt_words[\"word_cnt\"] = (shrt_words[\"words\"].str.count(\"\
    \ \")) + 1\nshrt_words[\"percent\"] = shrt_words[\"eng_ind\"] / shrt_words[\"\
    word_cnt\"]\nshrt_words.to_clipboard()\n```\n\n### Step 8.5: Getting back to where\
    \ you started\n\nThe bank is interested in monitoring organizations that are mentioned\
