    institution, they have been one of the early adopters of big data. A lot of machine
    learning use cases in the banking, financial services, and insurance industries
    (BFSI) have been using structured data like transactional history or CRM history.
    However, over the last few years there has been an increasing tendency to use
    text data to mainstream underwriting and risk or fraud detecting.


    **NLP in Fraud**


    One of the challenges in banking, especially commercial lending, is to understand
    the


    risks of organizations. When the transaction history of the entities is not available
    or not sufficient, financial institutions can look at publicly available data
    like news or online blogs to understand any mention of the entities. There are
    companies that supply such data


