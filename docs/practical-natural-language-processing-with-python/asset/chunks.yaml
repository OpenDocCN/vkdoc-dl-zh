    ***Listing 2-17.*** The Vectorizer Method


    ```

    from sklearn.feature_extraction.text import TfidfVectorizer


    tfidf_vectorizer = TfidfVectorizer(min_df=0.0,analyzer=u''word'',ngram_range=(1,
    1),stop_words=None)


