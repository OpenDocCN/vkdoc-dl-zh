    # 客户服务中的自然语言处理


    ## 用于客户服务代表的共情语句


    有关共情语句的示例，请参考[客户服务代表共情语句](http://www.customerservicemanager.com/empathy-statements-for-customer-service-representatives/)。同样，与领域专家合作，你也可以为其他属性构建词汇表。你可以采用类似于前面描述的启发式流程，对对话中客服人员的每个句子进行分类，然后得出一个总体评分来建模`NPS`。表
    2-9 展示了一个客服行为标注的小示例。


    当你尝试挖掘文本以对各个维度进行评分时，应仅对客服人员的对话行进行评分，而非客户的行。如果文本语料库是电子邮件，你可以定位发件人标签，并仅挖掘那些行。


    ## 第二章 客户服务中的自然语言处理


    ***表 2-9.** 客服行为标注*


    | **说话人** | **句子** | **共情能力** | **胜任能力** | **保证能力** |

    | --- | --- | --- | --- | --- |

    | Diane | 感谢您联系 Bright Smiles 牙科诊所。 | 0 | | |

    | | 我是 Diane。您好，有什么可以帮您的吗？ | | | |

    | aaron | 我收到了一封来自 Groupon 的邮件，关于你们 99 美元的牙齿美白服务。 | 0 | | |

    | Diane | 感谢您对 Bright Smiles 的兴趣。 | | | |

    | | 我们的 Groupon 广告反响非常好。我们可以预约一个时间吗？ | | | |

    | aaron | 这个流程通常需要多长时间？ | | | |

