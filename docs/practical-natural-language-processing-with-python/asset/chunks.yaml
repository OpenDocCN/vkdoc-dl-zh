    So you have a bunch of sentences as dependent variables. The first step is to
    convert


    them into tokens or units of analysis. Tokens can be words, sentences, or characters.
    Let’s get the tokens for the corpus. See Listing [2-11 t](#index_split_000.html#p43)o
    understand ways to tokenize sentences.


    ***Listing 2-11.*** Tokens


    from nltk.tokenize import word_tokenize


    str1 = "What a great show!"


    str1.split()


    [''What'', ''a'', ''great'', ''show!'']


    from nltk.tokenize import word_tokenize


    word_tokenize(str1)


    [''What'', ''a'', ''great'', ''show'', ''!'']


    Chapter 2 NLp iN CuStoMer ServiCe


    As you can see, the simplest way to break sentences into words is to use the split


    function. However, split does not accommodate special characters whereas word_


    tokenize from NLTK does take care of special characters. Sentences can be split
    by using the sent_tokenize function shown in Listing [2-12.](#index_split_000.html#p44)


    ***Listing 2-12.*** Splitting Sentences


    sentences = "I am feeling great! It was a great show"


    from nltk.tokenize import sent_tokenize


    sent_tokenize(sentences)


    [''I am feeling great!'', ''It was a great show'']


    Sometimes you may also want to analyze words in a certain order. For example,


    “check in” means something together and the value of that is lost if it analyzed
    as “check”


    and “in.” In order to retain as much meaning as possible while converting sentences
    to word tokens, you also want to retain the order. So instead of having single
    word tokens, you can have two- or three-term tokens. They are referred as bigrams
    and trigrams. See Listin[g 2-13.](#index_split_000.html#p44)


    ***Listing 2-13.*** Bigrams and Trigrams


    import nltk


    text = "I want to check in asap"


    bigram_list = list(nltk.bigrams(text.split()))


    ['' ''.join(i) for i in bigram_list]


    [''I want'', ''want to'', ''to check'', ''check in'', ''in asap'']


    Now that you know about tokenization, let’s apply it to your corpus and split
    it into


    words.


    **Term-Document Matrix**


    Let’s now apply word tokenization to the list of sentences you have and get the
    output.


    The output will then feed into the machine learning model as the dependent variables.


    Your objective is to convert the text you have here to numbers. The simplest approach
    is to use the “bag-of-words” approach. Here you get the list of words or tokens
    in a corpus 32


    Chapter 2 NLp iN CuStoMer ServiCe


    and treat them like features in a data mining problem. Now you get a matrix of
    size N*M


    where N is the number of documents (length of the dataframe) and M is the unique


    number of tokens in the corpus. As a start, the cells can be a presence or an
    absence of words. Use the code in Listin[g 2-14](#index_split_000.html#p45) to
    do this and see the results in Figure [2-7](#index_split_000.html#p45).


    ***Listing 2-14.*** The Bag-of-Words Approach


    def tokenize(sent1):


    return word_tokenize(sent1)


    df = pd.read_csv(''airline_dataset.csv'',low_memory=False,encoding = ''latin1'')


    df["line"]=df["line"].str.lower().str.lstrip().str.rstrip()


    ###tokenize all rows


    df["token_words"] = df["line"].apply(tokenize)


    df.head()


    **token_words**


    Index


    **line**


    **class**


    when can i web


    [when, can, i, web, check-in, ?]


    **0**


    check-in?


    check in


    [want, to, check, in]


    **1**


    want to check in


    check in


    [please, check, me, in]


    **2**


    please check me in check in


    [check, in]


    **3**


    check in


    check in


    ***Figure 2-7.** Bag-of-words output*'
  trans: "\n# 排版后的文本\n\n将在下一节中详细讨论。为了进一步提高准确性，你需要打印出错误并修改规则。\n\n## 使用机器学习的监督学习\n\n\
    规则方法的一个问题是它非常繁琐，而且你可能过度拟合当前数据，以至于无法知道新数据集的准确性。随着类别数量的增加，规则会变得更加复杂。你可以使用机器学习模型来学习模式，并用新模型对新数据集进行评分。机器学习从历史数据中学习数据中的模式。在你的案例中，你拥有手动标记的数据。还记得你之前为了改进模型而遵循的流程吗？你打印出与手动标签相比的错误，然后分析错误来源以修正规则。监督学习遵循类似的方法。它首先预测一个输出，然后根据与手动标记数据对比时发现的错误不断修正输出，直到错误最小化。你将在下文详细了解文本挖掘的监督过程。\n\
    \n## 获取手动标记数据\n\n在航空公司数据集中，手动标记的数据恰好是因变量类别。手动标记（也称为注释）是一项耗时的活动。然而，这一过程的成本效益被认为是值得的。有一些在线注释公司（如\
    \ Mechanical Turks）提供标记服务。有时，组织会建立一个带有质量控制流程的注释团队，以支持大规模注释。有多种工具可用于注释。例如 `GATE\
    \ (https://gate.ac.uk/)`、`LightTag (www.lighttag.io/)` 和 `TagTog (www.tagtog.net/)`。`GATE`\
    \ 是一个开源文本挖掘工具，具有多种注释功能。图 2-6 展示了 `GATE` 的一个屏幕示例。注释者会高亮文本中的特定部分，然后注释该高亮主题/词语的内容。\n\
    \n![图片 13](img/index-42_1.jpg)\n\n**图 2-6.** GATE 界面\n\n然而，Microsoft Excel 或任何基于\
    \ Excel 的工具（如 Google 表格）也可以帮助解决注释问题。本书中的大多数注释都是通过基于 Excel 的平台完成的，包括你正在探索的当前案例研究。一旦句子或词语被标记，就必须进行彻底的质量检查。手动标记的准确率应达到\
    \ 90% 以上。当然，这可能会根据语料库而变化。作为质量检查的一部分，主管会检查注释者所做的标签。或者，可以通过让多个注释者标记语料库来提高标记准确率。为了在标记过程中获得正确的质量，数据科学家需要确保完成以下任务：\n\
    \n**明确定义本体**：本体是分类树。在你的案例中，它是主题列表。它们必须互斥且完全穷尽。这是实现高标记准确率，从而获得高机器学习模型准确率的重要步骤。\n\
    \n**提供示例**：数据科学家的职责还包括为每个类别提供示例。\n\n**类别间的冲突**：有时两个句子可能看起来属于不同的类别。在这种情况下，应明确定义冲突解决方案。考虑这个查询：“我在登录时遇到问题。我想支付账单。”如果有两个类别，即登录和支付，那么这个查询应该被标记为什么？\n\
    \n一旦你获得了标记数据，下一步就是构建一个能够学习底层数据模式的预测模型。给定一个新句子，它应该能够预测其主题。这组底层模式被称为预测模型。监督学习中的任何预测模型都有两个组成部分：因变量和自变量。在你的案例中，因变量是标签，自变量是句子。然而，机器学习模型不能接受词语作为输入。因此，词语/句子必须转换为数字。将词语转换为数字的第一步称为分词。\n\
    \n## 词语分词\n\n所以你有一组句子作为因变量。第一步是将它们转换为标记或分析单元。标记可以是词语、句子或字符。让我们为语料库获取标记。请参阅清单 2-11\
    \ 了解分词句子的方法。\n\n**清单 2-11.** 标记\n\n```\nfrom nltk.tokenize import word_tokenize\n\
    \nstr1 = \"What a great show!\"\nstr1.split()\n['What', 'a', 'great', 'show!']\n\
    \nfrom nltk.tokenize import word_tokenize\nword_tokenize(str1)\n['What', 'a',\
    \ 'great', 'show', '!']\n```\n\n如你所见，将句子分解为词语的最简单方法是使用 `split` 函数。然而，`split` 不能处理特殊字符，而来自\
    \ `NLTK` 的 `word_tokenize` 可以处理特殊字符。句子可以使用清单 2-12 中所示的 `sent_tokenize` 函数进行拆分。\n\
    \n**清单 2-12.** 拆分句子\n\n```\nsentences = \"I am feeling great! It was a great show\"\
    \nfrom nltk.tokenize import sent_tokenize\nsent_tokenize(sentences)\n['I am feeling\
    \ great!', 'It was a great show']\n```\n\n有时你可能还想按特定顺序分析词语。例如，“check in” 是一个整体，如果将其分析为\
    \ “check” 和 “in”，其价值就会丢失。为了在将句子转换为词语标记时尽可能保留含义，你还需要保留顺序。因此，你可以使用两个或三个词的标记，而不是单个词的标记。它们被称为二元组和三元组。请参阅清单\
    \ 2-13。\n\n**清单 2-13.** 二元组和三元组\n\n```\nimport nltk\ntext = \"I want to check\
    \ in asap\"\nbigram_list = list(nltk.bigrams(text.split()))\n[' '.join(i) for\
    \ i in bigram_list]\n['I want', 'want to', 'to check', 'check in', 'in asap']\n\
    ```\n\n现在你了解了分词，让我们将其应用于你的语料库并将其拆分为词语。\n\n## 词项-文档矩阵\n\n现在让我们对你拥有的句子列表应用词语分词并获取输出。该输出将作为因变量输入到机器学习模型中。你的目标是将你这里的文本转换为数字。最简单的方法是使用“词袋”方法。在这里，你获取语料库中的词语或标记列表，并将它们视为数据挖掘问题中的特征。现在你得到一个大小为\
    \ `N*M` 的矩阵，其中 `N` 是文档数量（数据框的长度），`M` 是语料库中唯一标记的数量。开始时，单元格可以表示词语的存在或不存在。使用清单 2-14\
    \ 中的代码执行此操作，并在图 2-7 中查看结果。\n\n**清单 2-14.** 词袋方法\n\n```\ndef tokenize(sent1):\n\
    \    return word_tokenize(sent1)\n\ndf = pd.read_csv('airline_dataset.csv', low_memory=False,\
    \ encoding='latin1')\ndf[\"line\"] = df[\"line\"].str.lower().str.lstrip().str.rstrip()\n\
    \n### tokenize all rows\ndf[\"token_words\"] = df[\"line\"].apply(tokenize)\n\
    df.head()\n```\n\n| 索引 | 行内容 | 类别 | 分词结果 |\n|-------|------|-------|-------------|\n\
    | 0 | when can i web check-in? | check in | [when, can, i, web, check-in, ?] |\n\
    | 1 | want to check in | check in | [want, to, check, in] |\n| 2 | please check\
    \ me in | check in | [please, check, me, in] |\n| 3 | check in | check in | [check,\
    \ in] |\n\n**图 2-7.** 词袋输出\n"
- fmt: "# The data in Figure 2-7 is the output with tokens generated for all the documents\
    \ in the corpus. Now see Listing 2-15, Listing 2-16, and Figure 2-8.\n\n![Image\
    \ 14](index-46_1.png)\n\n## Chapter 2 NLP in Customer Service\n\n### Listing 2-15\n\
    \n```\n###get unique list of words\n\nlist_all = []\n\nfor i in df[\"token_words\"\
    ]:\n\nlist_all = list_all + i\n\nlist_words = list(set(list_all))\n\nlist_words[0:5]\n\
    \n['check', 'do', '20th', 'hello', 'monday']\n\n###initialize array for rows=length\
    \ of dataframe and columns = unique words.\n\narr1 = np.zeros([len(df),len(list_words)])\n\
    \n###Loop through the dataframe and mark presence of words in a sentence as 1\n\
    \nfor i,row in df.iterrows():\n\ntoken_words = row[\"token_words\"]\n\nfor j in\
    \ token_words:\n\nif (j in list_words):\n\nk = list_words.index(j)\n\narr1[i][k]\
    \ = 1\n\n###Check if we got it right\n\nget_non_zero = np.where(arr1[0]==1)\n\n\
    list_index = list(get_non_zero[0])\n\n[list_words[i] for i in list_index]\n\n\
    ['can', 'when', 'web', 'i']\n```\n\n### Figure 2-8. The term-document matrix\n\
    \n## Chapter 2 NLP in Customer Service\n\n### Listing 2-16\n\n```\ndf_mat = pd.DataFrame(arr1)\n\
    \ndf_mat.columns = list_words\n\ndf_mat.head()\n```\n\nFigure 2-8 is a quick visualization\
    \ of the matrix you created. This is called the **term-document** matrix. Remember\
    \ that you filled the cells with 0 or 1 representing the presence or absence of\
    \ a word in a sentence. You can also mark the cells as the frequency of words\
    \ in the sentence. Also, in the above example, note that you generated 232 features\
    \ for a corpus size of 398 documents. Hence, you see plenty of zeros in the above\
    \ matrix. One way to make the matrix dense and make it suitable for a machine\
    \ learning model is to simply drop words that don’t add any meaning to the sentences.\n\
    \nIn an earlier exercise, you learned about stop words (and, not, the, a). Dropping\
    \ these words from the features list will reduce the size of the matrix.\n\nAnother\
    \ way to reduce the importance of redundant features is by an inverted weighing\
    \ of the values of frequent words in the corpus. So when you fill the values in\
    \ the cells, you want to “punish” the words that are present in all documents.\
    \ You do this mathematically using the **TF-IDF** formula. TF-IDF computes term\
    \ frequency and inverse document frequency. This statistic for a given word indicates\
    \ how important it is as compared to other words in the corpus. The word that\
    \ appears in fewer documents will have a higher TF-IDF score and the word that\
    \ appears in all documents will have a lower TF-IDF score.\n\n1. `TF` (term frequency)\
    \ in this formula represents the number of times a word (token or feature) appears\
    \ in a document normalized by the number of words in the document.\n\n   `TF(t)\
    \ = (Number of times term t appears in a document) / (Total number of terms in\
    \ the document).`\n\n2. `IDF` (inverse document frequency) represents the number\
    \ of times the given word occurs in a corpus.\n\n   `IDF(t) = log_e(Total number\
    \ of documents / Number of documents with term t in it).`\n\n3. The final value\
    \ is obtained by multiplying `TF` and `IDF`.\n\n## Chapter 2 NLP in Customer Service\n\
    \nLet’s consider a corpus of 1000 documents. Assume that the frequencies of the\
    \ words “this” and “language” in the corpus are respectively 500 and 50. This\
    \ is to say the word “this” appears in 500 documents and the word “language” appears\
    \ in 50 documents. The `IDF` for “this” is `log(1000/500)`, which is 0.3010299957,\
    \ and the `IDF` for “language” is `log(1000/50)`, which is 1.301029996.\n\nConsider\
    \ the two documents in Table 2-5 and calculate the TF-IDF for the words “this”\
    \ and “language” in them.\n\n### Table 2-5. Calculating the TF-IDF\n\n| Sentence\
    \ | TF-this | TF-language | IDF-this | IDF-language | TF-IDF this | TF-IDF language\
    \ |\n|----------|---------|-------------|----------|--------------|-------------|-----------------|\n\
    | this is a great piece written. this will be remembered | 0.2 | | 0.301 | 1.301\
    \ | 0.060 | 0.000 |\n| language models are very popular | | 0.2 | 0.301 | 1.301\
    \ | 0.000 | 0.260 |\n\nSo going back to your use case, you will compute the TF-IDF\
    \ for every feature in"
