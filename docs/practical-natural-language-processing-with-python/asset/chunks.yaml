    ## Identifying Issue Lines


    In the example above, the data provided were single-line sentences. However, in
    a conversation there is a whole corpus of dialogue. Tagging the entire dialog
    corpus to an intent is difficult. The signal-to-noise ratio is pretty low, so
    in general you try to identify portions of dialog first that could contain the
    issue lines and then mine only those sentences for the intent. This improves the
    signal-to-noise ratio significantly. You can also build another supervised learning
    model to locate which of the lines in the dialog contain the issues of the customers.
    The customer issue typically is in the first few lines of the “chat” or it would
    follow a question like “how may I help you”. See Table 2-6.


