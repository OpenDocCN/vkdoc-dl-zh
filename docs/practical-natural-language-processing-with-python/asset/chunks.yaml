  trans: "\n# 第 5 章：虚拟助手中的自然语言处理\n\n接下来，你需要替换特殊字符，并使用句子分隔符 `sep_sent` 来分割机器人语句。这将帮助你模板化每条机器人语句，并随后从解码器中生成这些模板。请参见代码清单\
    \ 5-29。\n\n```\nt4[\"corrected_bot1\"] = t4[\"corrected_bot\"].str.replace('\\\
    xa0','')\nt4[\"corrected_bot1\"] = t4[\"corrected_bot1\"].str.replace('[^a-z0-9\\\
    s\\.\\?]+','')\nt4[\"corrected_bot1\"] = t4[\"corrected_bot1\"].str.replace('[0-9]{1,3}','\
    \ short_num ')\nt4[\"corrected_bot1\"] = t4[\"corrected_bot1\"].str.replace('[0-9]{4,}','\
    \ long_num ')\nt4[\"corrected_bot1\"] = t4[\"corrected_bot1\"].str.replace('(\\\
    .\\s){1,3}',' sep_sent ')\nt4[\"corrected_bot1\"] = t4[\"corrected_bot1\"].str.replace('(\\\
    .){1,3}',' sep_sent ')\nt4[\"corrected_bot1\"] = t4[\"corrected_bot1\"].str.replace('\\\
    ?',' sep_sent ')\nt4[\"corrected_bot1\"] = t4[\"corrected_bot1\"].str.replace('(sep_sent\
    \ )+',' sep_sent ')\n```\n\n替换客户语句中的特殊字符是为了降低数据的稀疏性。例如，考虑两个句子：\"Is this correct...\"\
    \ 和 \"Is this correct\"。在这两种情况下，单词 \"correct\" 是相同的，只是前者有三个点，后者没有。在进行分词时，你需要确保这两个单词被同等对待。请参见代码清单\
