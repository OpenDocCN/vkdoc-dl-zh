    ### Method 3 – Approach 2


    Since you are generating the embeddings for the supervised problem of classifying
    a given word as an organization or not, you can use embeddings better. You can
    directly train a neural network and learn the embeddings as part of the training
    process. You can make use of `Keras` to learn the word embeddings as a layer in
    the supervised model (word embeddings approach 2). `Keras` is an open source neural
    network library in Python ([https://keras.io/](https://keras.io/)). Figures [4-6
    and 4-7](#index_split_002.html#p154) explain the two approaches of using embeddings
    in a supervised model.


    ![Image 46](index-154_1.png)


    ![Image 47](index-154_2.png)


    **Figure 4-6.** Word embeddings approach 1


    **Figure 4-7.** Word embeddings using approach 2


    ![Image 48](index-155_1.jpg)


    As explained in Figure [4-7](#index_split_002.html#p154), for word embeddings
    using approach 2, in order to train a classifier for NER, you need to look at
    a dataset where word-level tags are available. You will use the Kaggle dataset
    in Table [4-1](#index_split_001.html#p138) for the same. Once you train the model,
    you will apply the model to your news corpus dataset.


    The `Keras` "embedding layer" learns the embedding vector as a process of training
    itself. Unlike the `word2vec` approach, there is no concept of window size here.
    You first need to label your categorical features, mention the embedding size
    for each of the categorical variables, flatten it, and then connect to dense layers.
    The architecture of the network is represented in Figure [4-8](#index_split_002.html#p155).


    **Figure 4-8.** Categorical embeddings


    The input variable here is the set of categorical variables. Then you have an
    embedding layer that embeds the categorical values into N dimensions and then
    you flatten and connect to a dense layer and treat the classifier as a classic
    binary cross-entropy model.


    You now start implementing the same. See Listings [4-28 and 4-29](#index_split_002.html#p156).


