    `TfidfVectorizer` 对象有几个重要参数，用于降低矩阵的稀疏性（列数）：


    - `mindf` 是一个词应出现的最小文档数。

    - `Stop_words` 是一个选项，用于指定是否提供停用词。


    `analyzer` 可以是词或字符，具体取决于你想要的词元类型。对于当前问题，你希望使用词作为词元。


    `ngram_range` 的选项提供了任意长度的 n-gram（二元组、三元组等）。例如，通过使用 `ngram_range(2,3)`，你可以获得从二元组到三元组的词元范围。


    一旦你获得了一个向量化器对象，就可以将其拟合到语料库上，并得到一个稀疏矩阵。然后可以将稀疏矩阵转换为稠密矩阵。命令 `tfidf_vectorizer.vocabulary`
    列出了向量化器生成的词元集合。如你所见，其中包含一堆数字和日期，它们可能不会为分析增加太多价值，但如果将它们归一化为实体（如日期、月份等），则可以带来很大价值。你将在下一节学习数据归一化。


    ## 数据归一化


    数据归一化通常包括使用正则表达式对日期、时间和金额进行泛化处理。例如，你可以将所有日期格式归为一个词，如“Dates”。类似地，所有支付或收到的金额都可以替换为“Money”一词。你还可以对相似的词进行重新标记。例如，在你的案例中，“Baggage”和“Luggage”含义相同，因此可以将它们替换为同一个词。


    归一化有助于实现两件事：使数据变得稠密，并为任何未见过的变体准备数据。例如，考虑句子“My flight is on Sunday and I want to
    check in.”如果你基于前一个句子构建模型，那么当出现一个新句子“My flight is on Friday and I want to check
    in”时，模型可能表现不佳。因此，你可以将任何此类词（此处为星期几）替换为一个通用名称（此处为“Dayofweek”），以泛化模型并使其更健壮。


    ## 替换特定模式


    以下是几个示例，展示正则表达式如何帮助预处理句子。如果你不熟悉正则表达式，我建议你快速学习一个正则表达式教程，以熟悉其语法。参见清单 2-18。


