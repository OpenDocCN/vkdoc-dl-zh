- fmt: "# Chapter 2: NLP in Customer Service\n\n`failure`, `complaints` about a high\
    \ bill, `return` queries, etc. The simplest and quickest way to understand intents\
    \ in a corpus is through word clouds. However, intents are typically deeper, and\
    \ for actionable insights, you want to get an accurate category mapped to each\
    \ chat or voice interaction. Intents are typically mined in practice through rules\
    \ or through supervised algorithms. Let’s look at each of the processes in detail.\
    \ We would be looking at a dataset that contains set of questions asked by customers\
    \ in the airline industry.\n\nLet’s explore this data before you proceed any further.\
    \ See [Listing 2-1](#index_split_000.html#p31) and [Figure 2-1](#index_split_000.html#p32).\n\
    \n***Listing 2-1.*** The Dataset\n\n```\nimport pandas as pd\n\ndf = pd.read_csv(\"\
    airline_dataset.csv\",encoding ='latin1')\ndf.head()\n```\n\n![Image 8](index-32_1.jpg)\n\
    \nChapter 2: NLP in Customer Service\n\n```\ndf[\"class\"].value_counts()\n\n\
    login       105\nother        79\nbaggage      76\ncheck in     61\ngreetings\
    \    45\ncancel       16\nthanks       16\n```\n\n***Figure 2-1.** The dataset*\n\
    \nAs you can see in [Figure 2-1](#index_split_000.html#p32), this dataset has\
    \ two columns, one containing the sentences and the other the category to which\
    \ the sentence belongs. The category comes from labelling the data manually. You\
    \ can see that there are seven categories in all, including “other,” which is\
    \ a catch-all category; any sentence that can’t be categorized as any of the six\
    \ categories is marked as `other`.\n\n## Top Words to Understand Intents\n\nGiven\
    \ a corpus of sentences, you can understand the top intents by extracting the\
    \ most frequent words in the corpus. Let’s use the `NLTK` package for getting\
    \ the top key words.\n\n`FreqDist` in `NLTK` provides the top distribution of\
    \ words in a group of words. You first need to convert the panda series of sentences\
    \ to a concatenated string of words. In [Listing 2-2](#index_split_000.html#p33),\
    \ you use the method `get_str_list` to do the same. Once you have that in said\
    \ format, you word tokenize through `NLTK` and give it to the `FreqDist` package\
    \ ([Listing 2-3](#index_split_000.html#p33)).\n\nChapter 2: NLP in Customer Service\n\
    \n***Listing 2-2.***\n\n```\ndef get_str_list(ser):\n    str_all = ' '.join(list(ser))\n\
    \    return str_all\n\ndf[\"line\"] = df[\"line\"].str.lower()\ndf[\"line\"] =\
    \ df[\"line\"].str.lstrip().str.rstrip()\nstr_all = get_str_list(df[\"line\"].str.lower())\n\
    words = nltk.tokenize.word_tokenize(str_all)\nfdist = FreqDist(words)\nfdist.most_common()\n\
    \n[('in', 76),\n ('is', 36),\n ('baggage', 33),\n ('what', 32),\n ('check', 30),\n\
    \ ('checkin', 30),\n ('login', 30),\n ('allowance', 29),\n ('to', 28),\n ('i',\
    \ 27),\n ('hi', 26),\n ('the', 25),\n ('my', 22),\n ('luggage', 20),\n```\n\n\
    ***Listing 2-3.***\n\n```\nimport nltk\nfrom nltk.probability import FreqDist\n\
    \ndef remove_stop_words(words,st):\n    new_list = []\n    st = set(st)\n    for\
    \ i in words:\n        if(i not in st):\n            new_list.append(i)\n    return\
    \ new_list\n\nlist_all1 = remove_stop_words(words,st)\n##we did not word_tokenize\
    \ as the returned object is already in a list form\nfdist = FreqDist(list_all1)\n\
    fdist.most_common()\n\n[('baggage', 33),\n ('check', 30),\n ('checkin', 30),\n\
    \ ('login', 30),\n ('allowance', 29),\n ('hi', 26),\n ('luggage', 20),\n ('pwd',\
    \ 18),\n ('free', 17),\n ('username', 15),\n```\n\nAs you can see in [Listing\
    \ 2-2](#index_split_000.html#p33), a lot of not so useful words like “in,” “is,”\
    \ and “what” are coming out as the top frequency words. These words are commonly\
    \ used in all sentences, so you can’t use them to make out any meaningful intents.\
    \ Such words are called “stop words.” A list of stop words is generally available\
    \ on the Internet. You can also edit these stop words depending on your purposes.\
    \ In order to avoid this problem we write the next code snippet in [Listing 2-3](#index_split_000.html#p33).\
    \ Next, you will import a package named `stop_words`. The `get_stop_words` method\
    \ plus the language specified lists all the stop words. Your task is to remove\
    \ the stop words from the given corpus and clean up the text. Once done, you’ll\
    \ again apply the `FreqDist` method and check the output."
