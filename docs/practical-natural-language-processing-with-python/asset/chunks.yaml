    awesome jc indeterminate\ntiresome pmi indeterminate\ntiresome jc indeterminate\n\
    angry pmi neg\nangry jc neg\nfurious pmi neg\nfurious jc neg\n```\n\n你也可以使用其他语料库，例如维基百科或新闻语料库。你可以尝试不同的锚点词组合以及其他一些范围限定词（在你的例子中是单词“reviews”）以获得更好的结果。\n\
    \n## 第3章 在线评论中的自然语言处理\n\n### 情感分析库\n\n也有一些标准库可用于进行情感分析。它们提供开箱即用的情感分析，因此必须适当使用。如果它适合手头的问题，那么你就有了一个快速且稳健的解决方案。你也可以将其与他们使用的算法/方法结合使用，或作为独立解决方案使用。`Vader`（情感感知词典和情感推理器）是一个进行情感分析并提供带有权重的词极性的`Python`库。原始研究论文题为“Vader:\
    \ A parsimonious rule-based model for sentiment analysis of social media text”，可在[https://www.aaai.org/ocs/index.php/ICWSM/ICWSM14/paper/viewPaper/8109](https://www.aaai.org/ocs/index.php/ICWSM/ICWSM14/paper/viewPaper/8109)找到。从根本上说，`Vader`从成熟的词典以及社交媒体语料库中获取了一组词汇。每个词都由一组人员按照群体智慧的方法提供极性分数，以得出最终的词典及其权重。[清单\
