  trans: '

    数字内容在我们的生活中无处不在。在线新闻文章、博客、视频、社交媒体和电子书是我们每天消费的主要内容类型。


    根据[`cmo.adobe.com/articles/2019/2/5-consumer-trends-that-are-shaping-digital-content-consumption.html`](https://cmo.adobe.com/articles/2019/2/5-consumer-trends-that-are-shaping-digital-content-consumption.html)的数据，消费者平均每天花费
    8.8 小时消费数字内容。以下是数据科学家在使用文本挖掘时需要解决的关键问题：


    - 内容聚类（相似内容分组）

    - 内容分类

    - 实体识别

    - 分析用户对内容的评价

    - 内容推荐


    其他关键数据，例如用户对内容本身的反馈，则更具结构性：点赞数、分享数、点击量、停留时长等。通过将用户偏好数据与内容数据相结合，我们可以深入了解用户的偏好信息，包括生活方式、人生阶段、爱好、兴趣和收入水平。


    ## IVR 语音数据


    IVR 是交互式语音应答的缩写。IVR 是一种帮助用户在语音通话中导航各种菜单选项的系统。根据[www.marketsandmarkets.com/Market-Reports/interactive-voice-response-market-33851149.html](http://www.marketsandmarkets.com/Market-Reports/interactive-voice-response-market-33851149.html?gclid=Cj0KCQjwh8jrBRDQARIsAH7BsXfkISk9rnRcUPrjpBP6qC_a3-xBFCaNzEVz4FANz5y__ZXbN7yA9ZoaAkovEALw_wcB)的预测，到
    2023 年，IVR 市场规模预计将达到 55 亿美元。基于自然语言的 IVR 是一种先进的 IVR 系统，它通过类似机器人的界面帮助客户找到问题的解决方案。图
    1-5 展示了一个对话记录示例。


    **IVR 机器人**：您好，欢迎致电 XYZ 银行。请问有什么可以帮您？您可以说“查询余额”或“我的卡刷不了”等。


    **用户**：你好，我在一家零售店，我的卡用不了。


    **IVR 机器人**：为了验证身份，请提供您的卡号。


    **用户**：XXXXXXXX


    **IVR 机器人**：感谢您的验证。由于长期未使用，您的卡已被停用。请问需要我为您激活这张卡吗？


    **用户**：好的，请激活。


    **IVR 机器人**：您的卡现已激活。您可以继续交易了。


    **用户**：谢谢，太好了。


    ***图 1-5.** IVR 对话记录示例*


    IVR 语音通常比较简短。用户知道自己在和机器人对话，因此倾向于使用短句。由于这些语音内容非常直接，除了用户当前面临的问题外，我们无法了解用户的其他属性或偏好。与您之前看到的其他示例相比，这是一种结构性强得多的文本。


    ## 数据中的有用信息


    在详细描述了不同类型的数据及其应用之后，图 1-6 展示了一张图表，描绘了每种数据源的有用信息价值以及数据提取的难易程度。有用信息价值是指从数据中提取出的、对组织有用的用户信息。数据提取的难易程度则涉及处理文本语料库本身的性质。


    ***图 1-6.** 用户信息价值与提取难易程度对比*

