    \ are greater than zero. If so, you further check if `positive` is greater or\
    \ `negative` is greater. Accordingly, you label the final tags as `positive` or\
    \ `negative`. If this is not the case, then you check for an intensity indicator,\
    \ which in your case is the exclamation mark. The presence of the exclamation\
    \ is a strength indicator and you know it should be either `positive` or `negative`.\n\
    \nI have marked those cases as `positive` (they could be decided as `negative`\
    \ as well, depending on accuracy and the dataset at hand). The rest are marked\
    \ as `neutral`. In cases where there are no `positive` or `negative` hits, you\
    \ again check for an exclamation mark and tag it as `positive` or `neutral`.\n\
    \n## Chapter 3 NLP in Online Reviews\n\n### Implementing the Observations\n\n\
    #### Preprocessing\n\nYou will now start implementing the observations in Python.\
    \ As a first step, you want to do some preprocessing. This is especially useful\
    \ for handling two-word negations. The idea is to replace bigrams like `\"did\
    \ not\"` and `\"would not\"` with a single word like `\"didn't\"` and `\"wouldn't\"\
    `. So the methods you adopted for finding and replacing continue to work even\
    \ when you are actually looking for two-word combinations. First, you define the\
    \ bigram words that need to be replaced and then replace them with a single word,\
