    ## 语料库特征


    利用语料库的文本和摘要，您可以使用 TF-IDF 向量化器创建词袋特征。由于您想创建一个通用的情感分析模块，您只从语料库中选择与情感或情绪相关的词汇。这是一个重要的步骤，因为使用所有词汇（在您的情况下，如宠物食品名称、糖果名称等）可能会使模型学习到将产品与其相关情感关联起来的模式。您将创建两组词汇特征：仅包含形容词和仅包含停用词。请注意，在第
    2 章的分类示例中，您剔除了停用词。在这里，您将仅使用停用词作为特征集。


    然后，您将合并这两组特征，并以 `score_bkt` 作为因变量来训练一个神经网络，调整类别权重，以得到一个能够在所有级别上进行良好分类的最佳模型。您在此处使用的是
