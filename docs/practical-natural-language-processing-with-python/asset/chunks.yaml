    ## Other word2vec Libraries


    Another popular library for word2vec is `fasttext`. This is a library released
    by Facebook. The primary difference is that the input vector being considered
    is a set of ngrams of the word.


    For example, `transform` gets broken down into `tra`, `ran`, `ans`, etc. This
    helps the word2vec model to provide vector representation for most words because
    they will be broken down into ngrams and their weights recombined to give a final
    output. You will see an example.


    You will use your preprocessed column `h1_stop` `t1` dataset example. You will
    replace all numbers and remove all words with a length of three from the column.
    See Listing 4-23.


    **Listing 4-23.**


    ```

    t1["h1_stop"] = t1["h1_stop"].str.replace(''[0-9]+'',''numbrepl'')

    t1["h1_stop"] = t1["h1_stop"].str.replace(''[^a-z\s]+'','''')

    list2=[]

    for i in t1["h1_stop"]:

    list1 = i.split()

    str1 = ""

    for j in list1:

    if(len(j)>=3):

    str1 = str1 + " " + j

    list2.append(str1)

    t1["h1_proc"] = list2

    ```


