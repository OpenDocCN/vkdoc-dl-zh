- fmt: "# Types of Data\n\nComputers naturally. It is a shift from the era when humans\
    \ had to “learn” to use computers to computers being trained to understand humans.\
    \ It is a branch of artificial intelligence (`AI`) that deals with language. The\
    \ field dates back to the 1950s when a lot of research was undertaken in the machine\
    \ translation area. Alan Turing predicted that by the early 2000s computers would\
    \ be able to flawlessly understand and respond in natural language that you won’t\
    \ be able to distinguish between humans and computers. We are far from that benchmark\
    \ in the field of `NLP`. However, some argue that this may not even be the right\
    \ lens to measure achievements in the field. Be that as it may, `NLP` is central\
    \ to the success of many businesses. It is very difficult to imagine life without\
    \ Google search, Alexa, YouTube recommendations, and so on. `NLP` has become ubiquitous\
    \ today.\n\nIn order to understand this branch of `AI` better, let’s start with\
    \ the fundamentals. Fundamental to any data science field is data. Hence understanding\
    \ text data and various forms of it is at the heart of performing natural language\
    \ processing. Let’s start with some of the most familiar daily sources of text\
    \ data, from the angle of commercial usage:\n\n- Search\n- Reviews\n- Social media\
    \ posts/blogs\n- Chat data (business-to-consumer and consumer-to-consumer)\n-\
    \ SMS data\n- Content data (news/videos/books)\n- IVR utterance data\n\n© Mathangi\
    \ Sri 2021  \nM. Sri, *Practical Natural Language Processing with Python*, [https://doi.org/10.1007/978-1-4842-6246-7_1](https://doi.org/10.1007/978-1-4842-6246-7_1#DOI)\n\
    \n## Search\n\nSearch is one of the most widely used data sources from a customer\
    \ angle. All search engine searches, whether a universal search engine or a search\
    \ inside a website or an app, use at the core indexing, retrieval, and relevance-ranking\
    \ algorithms. Search, also referred to as a query, is typically made up of short\
    \ sentences of two or three words. Search engine results are approximate and they\
    \ don’t necessarily need to be bang on with their results. For a query, multiple\
    \ options are always presented as results. This user interface transfers the onus\
    \ of finding the answer back to the user. Recount the number of times you have\
    \ modified your query because you were not satisfied with the result. It’s unlikely\
    \ that you blamed the performance of the engine. You focused your attention on\
    \ modifying your query.\n\n## Reviews\n\nReviews are possibly the most widely\
    \ analyzed data. Since this data is available openly or is easy to extract with\
    \ web crawling, many organizations use this data. Reviews are very free flowing\
    \ in nature and are very unstructured. Review mining is core to e-commerce companies\
    \ like Amazon, Flipkart, eBay, and so on. Review sites like IMDB and Tripadvisor\
    \ also have reviews data at their core. There are other organizations/vendors\
    \ that provide insights on reviews collected by these companies. Figure [1-1](#index_split_000.html#p15)\
    \ shows sample review data from [www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)\
    \ [dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)\
    \ [r=TGGMS83TD4VZW7KQQBF3.](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)\n\
    \n### Sample Amazon Review\n\n**Amit**  \nTOP 500 REVIEWER  \n*3.0 out of 5 stars*\
    \  \nGood speaker, Bad software  \n20 October 2018  \nColour: GreyConfiguration:\
    \ Echo Dot (single pack)Verified Purchase\n\nThis is very good hardware and speaker.\
    \ However very much handicapped by amazon on software front. It can not understand\
    \ your commands 70-80 percentage times and very limited to amazon music and saavn.\
    \ However you can not use any of good music apps like wynk, gaana, youtube etc.\
    \ Also natural language processing is supported in google products but not in\
    \ this echo. For example when you say-\n\n1) where is agra - it gives you correct\
    \ answer.\n2) continue with next query like how to reach there ?\n\nThen for 2nd\
    \ query it doesn't know what to do.. This is just an example but most of the times\
    \ you will find this issue there. Then you can not connect with other populer\
    \ music etc apps. Have to rely on what amazon thinks os good for you. Amazon music\
    \ has very limited music base. So looking forward to get more access and integration\
    \ with alexa however not have much hope since its already such an old platform\
    \ that they would have given support if there were any such plans.\n\n***Figure\
    \ 1-1.** Sample Amazon review*\n\nNote that the above review highlights the features\
    \ that are important to the user: the scope of the product (music), the search\
    \ efficiency, the speaker, and its sentiment. But we also get to know something\
    \ about the user, such as the apps they care about. We could also profile the\
    \ user on how objective or subjective they are.\n\nAs a quick, fun exercise, look\
    \ at the long review from [Amazon](https://www.amazon.in/Bosch-WAK24268IN-Fully-automatic-Front-loading-Washing/product-reviews/B00OT9D4SS)\
    \ in Figure [1-2](#index_split_000.html#p16) and list the information you can\
    \ extract from the review in the following categories: product features, sentiment,\
    \ about the user, user sentiment, and whether the user is a purchaser.\n\n###\
    \ Sample Amazon Review (Long)\n\n**DANNEL**  \nTOP 500 REVIEWER  \n*4.0 out of\
    \ 5 stars*  \nBrilliant Machine - Updated 26/06/2018 - 24 Months Review!  \n15\
    \ June 2016  \nVerified Purchase\n\nThis is my first front loader. I've used it\
    \ for a while and I can tell you this is awesome! It is super silent and the vibrations\
    \ are very minimal if not hard to noce. It has all the washing modes a front loader\
    \ can have. In case you are curious, the Monsoon mode is used for washing rain\
    \ soaked clothes that smell. I parcularly liked the Drum Clean mode. It makes\
    \ it a bit easier to maintain the machine. The size is just right. The grey color\
    \ looks great! The quality of the machine is superb!\n\nUsing a trolley will allow\
    \ you to move this machine whenever you need to clean the floor area of the machine\
    \ or to make adjustments to the machine when issues come up. Besides it protects\
    \ the machine from external water leakages. But it is important to use a quality\
    \ stand for this purpose or else you risk damaging the machine through excessive\
    \ vibraons! Do note that Bosch doesn't recommend a stand as it will void the warranty.\
    \ If you have voltage problems, it's a must to install a stabilizer or spike guard.\
    \ Installing a water filter is important as some parcles may enter the machine\
    \ making it difficult to maintain it. Always use a tap connecon that has a water\
    \ pressure up to 8 liters per minute. The rubber seal on the entrance needs to\
    \ be wiped clean to prevent mold formaons. If necessary, use white vinegar to\
    \ clean the seal as it is helpful in removing odor and mold formaons. Keep the\
    \ door open for a few hours once the washing is done. This allows the moisture\
    \ to dry within the drum. Finally, follow your manufacturer's instrucons on the\
    \ machine's usage and maintenance. This will lengthen the life of your machine."
  raw: 'computers naturally. It is a shift from the era when humans had to “learn”
    to use


    computers to computers being trained to understand humans. It is a branch of artificial
    intelligence (AI) that deals with language. The field dates back to the 1950s
    when a lot of research was undertaken in the machine translation area. Alan Turing
    predicted that by the early 2000s computers would be able to flawlessly understand
    and respond in natural language that you won’t be able to distinguish between
    humans and computers. We are


    far from that benchmark in the field of NLP. However, some argue that this may
    not even be the right lens to measure achievements in the field. Be that as it
    may, NLP is central to the success of many businesses. It is very difficult to
    imagine life without Google search, Alexa, YouTube recommendations, and so on.
    NLP has become ubiquitous today.


    In order to understand this branch of AI better, let’s start with the fundamentals.


    Fundamental to any data science field is data. Hence understanding text data and


    various forms of it is at the heart of performing natural language processing.
    Let’s start with some of the most familiar daily sources of text data, from the
    angle of commercial usage:


    • Search


    • Reviews


    • Social media posts/blogs


    • Chat data (business-to-consumer and consumer-to-consumer)


    • SMS data


    • Content data (news/videos/books)


    • IVR utterance data


    © Mathangi Sri 2021


    M. Sri, *Practical Natural Language Processing with Python*, [https://doi.org/10.1007/978-1-4842-6246-7_1](https://doi.org/10.1007/978-1-4842-6246-7_1#DOI)


    Chapter 1 types of Data


    **Search**


    Search is one of the most widely used data sources from a customer angle. All
    search


    engine searches, whether a universal search engine or a search inside a website
    or an


    app, use at the core indexing, retrieval, and relevance-ranking algorithms. Search,
    also referred to as a query, is typically made up of short sentences of two or
    three words.


    Search engine results are approximate and they don’t necessarily need to be bang
    on


    with their results. For a query, multiple options are always presented as results.
    This user interface transfers the onus of finding the answer back to the user.
    Recount the number of times you have modified your query because you were not
    satisfied with the result. It’s unlikely that you blamed the performance of the
    engine. You focused your attention on


    modifying your query.


    **Reviews**


    Reviews are possibly the most widely analyzed data. Since this data is available
    openly or is easy to extract with web crawling, many organizations use this data.
    Reviews


    are very free flowing in nature and are very unstructured. Review mining is core
    to


    e-commerce companies like Amazon, Flipkart, eBay, and so on. Review sites like
    IMDB


    and Tripadvisor also have reviews data at their core. There are other organizations/


    vendors that provide insights on reviews collected by these companies. Figur[e
    1-1](#index_split_000.html#p15)


    shows sample review data from [www.amazon.in/dp/B0792KTHKK/ref=gw-hero- PC-](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)


    [dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)


    [r=TGGMS83TD4VZW7KQQBF3.](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)


    Chapter 1 types of Data


    Amit


    TOP 500 REVIEWER


    *3.0 out of 5 stars*


    Good speaker, Bad software


    20 October 2018


    Colour: GreyConfiguration: Echo Dot (single pack)Verified Purchase


    This is very good hardware and speaker. However very much handicapped by amazon
    on


    software front. It can not understand your commands 70-80 percentage times and
    very


    limited to amazon music and saavn. However you can not use any of good music apps
    like wynk, gaana, youtube etc.


    Also natural language processing is supported in google products but not in this
    echo.


    For example when you say-


    1) where is agra - it gives you correct answer.


    2) continue with next query like how to reach there ?


    Then for 2nd query it doesn''t know what to do..


    This is just an example but most of the times you will find this issue there.


    Then you can not connect with other populer music etc apps. Have to rely on what


    amazon thinks os good for you.


    Amazon music has very limited music base.


    So looking forward to get more access and integration with alexa however not have
    much hope since its already such an old platform that they would have given support
    if there were any such plans.


    ***Figure 1-1.** Sample Amazon review*


    Note that the above review highlights the features that are important to the user:


    the scope of the product (music), the search efficiency, the speaker, and its
    sentiment.


    But we also get to know something about the user, such as the apps they care about.
    We could also profile the user on how objective or subjective they are.


    As a quick, fun exercise, look at the long review fr[om Amazon](https://www.amazon.in/Bosch-WAK24268IN-Fully-automatic-Front-loading-Washing/product-reviews/B00OT9D4SS)
    in Figure [1-2 and](#index_split_000.html#p16)


    list the information you can extract from the review in the following categories:


    product features, sentiment, about the user, user sentiment, and whether the user
    is a purchaser.


    Chapter 1 types of Data


    DANNEL


    TOP 500 REVIEWER


    *4.0 out of 5 stars*


    Brilliant Machine - Updated 26/06/2018 - 24 Months Review!


    15 June 2016


    Verified Purchase


    This is my first front loader. I''ve used it for a while and I can tell you this
    is awesome! It is super silent and the vibrations are very minimal if not hard
    to noce. It has all the washing modes a front loader can have. In case you are
    curious, the Monsoon mode is used for washing rain soaked clothes that smell.
    I parcularly liked the Drum Clean mode. It makes it a bit easier to maintain the
    machine. The size is just right. The grey color looks great! The quality of the
    machine is superb!


    Using a trolley will allow you to move this machine whenever you need to clean
    the floor area of the machine or to make adjustments to the machine when issues
    come up. Besides it protects the machine from external water leakages. But it
    is important to use a quality stand for this purpose or else you risk damaging
    the machine through excessive vibraons! Do note that Bosch doesn''t recommend
    a stand as it will void the warranty. If you have voltage problems, it''s a must
    to install a stabilizer or spike guard. Installing a water filter is important
    as some parcles may enter the machine making it difficult to maintain it. Always
    use a tap connecon that has a water pressure up to 8 liters per minute. The rubber
    seal on the entrance needs to be wiped clean to prevent mold formaons. If necessary,
    use white vinegar to clean the seal as it is helpful in removing odor and mold
    formaons. Keep the door open for a few hours once the washing is done. This allows
    the moisture to dry within the drum. Finally, follow your manufacturer''s instrucons
    on the machine''s usage and maintenance. This will lengthen the life of your machine.'
  trans: "\n# 数据类型\n\n计算机自然如此。这是一个从人类必须“学习”使用计算机，转变为计算机被训练去理解人类的时代。它是人工智能（`AI`）中处理语言的一个分支。该领域可追溯到\
    \ 20 世纪 50 年代，当时在机器翻译领域开展了大量研究。艾伦·图灵曾预测，到 21 世纪初，计算机将能够完美地理解自然语言并用其做出回应，以至于你无法区分人类和计算机。在`NLP`领域，我们距离这一基准还很远。然而，有些人认为，这甚至可能不是衡量该领域成就的正确视角。无论如何，`NLP`对许多企业的成功至关重要。很难想象没有谷歌搜索、Alexa、YouTube\
    \ 推荐等的生活。如今，`NLP`已无处不在。\n\n为了更好地理解`AI`的这一分支，让我们从基础开始。任何数据科学领域的基础都是数据。因此，理解文本数据及其各种形式是执行自然语言处理的核心。让我们从商业用途的角度，从一些最熟悉的日常文本数据来源开始：\n\
    \n- 搜索\n- 评论\n- 社交媒体帖子/博客\n- 聊天数据（企业对消费者和消费者对消费者）\n- 短信数据\n- 内容数据（新闻/视频/书籍）\n\
    - IVR 语音数据\n\n© Mathangi Sri 2021  \nM. Sri, *实用 Python 自然语言处理*, [`doi.org/10.1007/978-1-4842-6246-7_1`](https://doi.org/10.1007/978-1-4842-6246-7_1#DOI)\n\
    \n## 搜索\n\n从客户角度来看，搜索是最广泛使用的数据来源之一。所有搜索引擎的搜索，无论是通用搜索引擎还是网站或应用内部的搜索，其核心都使用索引、检索和相关性排序算法。搜索（也称为查询）通常由两三个单词的短句组成。搜索引擎的结果是近似匹配的，它们不一定需要完全精确。对于一个查询，总是会呈现多个选项作为结果。这种用户界面将寻找答案的责任转移回用户身上。回想一下，你有多少次因为对结果不满意而修改了查询？你不太可能去责怪搜索引擎的性能，而是专注于修改你的查询。\n\
    \n## 评论\n\n评论可能是被分析得最广泛的数据。由于这些数据公开可用，或者通过网页爬取很容易提取，许多组织都在使用这些数据。评论本质上是自由流动的，且非常非结构化。评论挖掘是亚马逊、Flipkart、eBay\
    \ 等电商公司的核心业务。像 IMDB 和 Tripadvisor 这样的评论网站，其核心也是评论数据。还有其他组织/供应商提供对这些公司收集的评论的洞察。图\
    \ 1-1 展示了来自[www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)\
    \ [dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)\
    \ [r=TGGMS83TD4VZW7KQQBF3.](http://www.amazon.in/dp/B0792KTHKK/ref=gw-hero-PC-dot-news-sketch?pf_rd_p=865a7afb-79a5-499b-82de-731a580ea265&pf_rd_r=TGGMS83TD4VZW7KQQBF3)\
    \ 的示例评论数据。\n\n### 亚马逊评论示例\n\n**Amit**  \nTOP 500 REVIEWER  \n*3.0 out of 5 stars*\
    \  \n好音箱，差软件  \n2018 年 10 月 20 日  \n颜色：灰色配置：Echo Dot（单件装）已确认购买\n\n这是非常好的硬件和音箱。然而，在软件方面受到亚马逊的极大限制。它\
    \ 70-80%的时间无法理解你的指令，并且非常局限于亚马逊音乐和 Saavn。但你无法使用任何好的音乐应用，如 Wynk、Gaana、YouTube 等。此外，谷歌产品支持自然语言处理，但这款\
    \ Echo 不支持。例如，当你说——\n\n1) 阿格拉在哪里——它给出了正确答案。\n2) 接着问下一个查询，比如怎么去那里？\n\n那么对于第二个查询，它不知道该怎么办……这只是一个例子，但大多数时候你会发现这个问题。然后你无法连接其他流行的音乐等应用。只能依赖亚马逊认为对你好的东西。亚马逊音乐的音乐库非常有限。所以期待能获得更多对\
    \ Alexa 的访问和集成，但对此不抱太大希望，因为既然它已经是一个如此老的平台，如果有任何此类计划，他们早就提供支持了。\n\n***图 1-1.**\
    \ 亚马逊评论示例*\n\n请注意，上述评论突出了对用户重要的功能：产品的范围（音乐）、搜索效率、音箱及其情感倾向。但我们也了解到一些关于用户的信息，比如他们关心的应用。我们还可以根据用户是客观还是主观来对其进行画像。\n\
    \n作为一个快速有趣的练习，请查看图 1-2 中来自[亚马逊](https://www.amazon.in/Bosch-WAK24268IN-Fully-automatic-Front-loading-Washing/product-reviews/B00OT9D4SS)的长篇评论，并列出你可以从评论中提取的信息，分类如下：产品特性、情感倾向、关于用户、用户情感倾向，以及用户是否为购买者。\n\
    \n### 亚马逊评论示例（长篇）\n\n**DANNEL**  \nTOP 500 REVIEWER  \n*4.0 out of 5 stars*  \n\
    出色的机器 - 更新于 2018 年 6 月 26 日 - 24 个月回顾！  \n2016 年 6 月 15 日  \n已确认购买\n\n这是我的第一台前置式洗衣机。我用了一段时间，可以告诉你这太棒了！它超级安静，振动非常小，几乎难以察觉。它拥有前置式洗衣机应有的所有洗涤模式。如果你好奇的话，季风模式用于清洗被雨淋湿而有异味的衣物。我特别喜欢滚筒清洁模式。它让维护机器变得更容易一些。尺寸刚刚好。灰色外观看起来很棒！机器质量一流！\n\
    \n使用推车可以让你在需要清洁机器底部区域或出现问题时调整机器时移动它。此外，它还能保护机器免受外部漏水的影响。但为此使用一个质量好的支架很重要，否则你可能会因过度振动而损坏机器！请注意，博世不推荐使用支架，因为这会使得保修失效。如果你有电压问题，必须安装稳压器或电涌保护器。安装一个水过滤器很重要，因为一些颗粒可能会进入机器，使其难以维护。始终使用水压达到每分钟\
    \ 8 升的水龙头连接。入口处的橡胶密封圈需要擦拭干净以防止霉菌形成。如有必要，使用白醋清洁密封圈，因为它有助于去除异味和霉菌。洗涤完成后，让门打开几个小时。这可以让滚筒内的湿气干燥。最后，遵循制造商关于机器使用和维护的说明。这将延长你机器的使用寿命。\n"
- fmt: "经过大量研究，我发现总体而言，包括博世在内的所有前置式洗衣机所使用的技术并不完美。事实上，美国有多起针对前置式洗衣机制造商的诉讼，指控其继续使用这种不完善的技术，因为这并未让消费者的生活变得更轻松。现在你可能会想，这到底是怎么回事！这一切都关乎维护！许多问题都是由制造缺陷引起的。这些前置式洗衣机容易滋生霉菌，而且有些人甚至报告了滚筒生锈等问题！业主方面的不当维护也会导致这些问题。请注意，粗暴或不当操作机器控制面板（按钮和旋钮）可能会损坏印刷电路板（`PCB`）。在印度，电涌和低电压是导致大多数用户遭遇`PCB`烧毁的最主要原因。更换`PCB`非常昂贵（在印度费用高达10,000卢比！）。这维护成本实在太高了！关键在于，如果出现滚筒问题，购买一台新机器比维修现有机器更便宜！我想说的是，你必须在维护方面非常小心。\n\
    \n***图 1-2.** 从这篇评论中提取一些数据。*\n\n## 社交媒体帖子/博客\n\n社交媒体帖子和博客与评论一样，被广泛研究、提取和分析。推文和其他微博内容简短，因此看似易于提取。然而，根据用例的不同，推文可能包含大量噪音。根据我的经验，平均每100条推文中只有1条包含关于某个感兴趣概念的有用信息。在使用Twitter数据分析品牌情感时尤其如此。在这篇关于情感分析的研究论文中，在针对特定主题收集推文后，发现只有20%的英文推文和10%的土耳其文推文是有用的：\n\
    \n[www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-Approach-to-the-Syrian-Refugee-Crisis.pdf](http://www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-Approach-to-the-Syrian-Refugee-Crisis.pdf)\n\
    \n因此，在推文语料库中寻找正确的推文是成功挖掘Twitter或Facebook帖子的关键。让我们以[https://twitter.com/explore](https://twitter.com/explore)为例：\n\
    \n> 夜晚的圣克鲁斯海滨栈道和海洋  \n> 我花了一些时间才把设置调对。.....  \n> 相机：`pixel 3`  \n> 设置：`raw`，1...https://t.co/XJfDq4WCuu\
    \  \n> `@Google` `@madebygoogle` 你们能给我提供即将推出的`Pixel 4XL`用于我的像素IG吗？只是想保持...https://t.co/LxBHIRkGG1\
    \  \n> 中国繁华的城市和乡村是智能手机相机测试的完美场所。我将`#HuaweiP30Pro`与...https://t.co/Cm79GQJnBT 进行了对比\
    \  \n> `#sun` `#sunrise` `#morningsky` `#glow` `#rooftop` `#silohuette` `madebygoogle`\
    \ `google`"
  raw: 'Aer a lot of research, I''ve found that in general, the technology used in
    all front loaders including Bosch isn''t perfect. In fact, several cases are pending
    against front load machine manufacturers in the U.S. for connuing to use this
    imperfect technology as this has not made consumer''s life easier. Now you might
    wonder what this is all about! It''s all about maintenance! There are many issues
    that are caused by manufacturing defects. These front loaders get mold formaon
    easily plus some people have even reported drum issues like rusng! Improper maintenance
    on the part of the owners will also lead to these issues. Beware that the Printed
    Circuit Board (PCB) can be damaged by rough or improper handling of the machine''s
    controls (Buons & Dial). Power spikes and low voltages in India are the biggest
    reasons why majority of the owners are affected by burnt PCBs. Replacing the PCB
    is very expensive (Costs Rs. 10,000 in India!). This is seriously high maintenance!
    The deal breaker is that it is cheaper to buy a new machine instead of repairing
    the exisng machine (in case of a drum issue)! What I am trying to say is that
    you must be very careful on the maintenance aspect.


    ***Figure 1-2.** Extract some data from this review.*


    **Social Media Posts/Blogs**


    Social media posts and blogs are widely researched, extracted, and analyzed, like


    reviews. Tweets and other microblogs are short and hence could seem easily extractable.


    However, tweets, depending on use cases, can carry a lot of noise. From my experience,
    on average only 1 out of every 100 tweets contains useful information on a given
    concept of interest. This is especially true in cases of analyzing sentiments
    for brands using Twitter data. In this research paper on sentiment analysis, only
    20% of tweets in English 4


    Chapter 1 types of Data


    and 10% of tweets in Turkish were found to be useful after collecting tweets for
    the topic:


    [www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_](http://www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-Approach-to-the-Syrian-Refugee-Crisis.pdf)


    [Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/](http://www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-Approach-to-the-Syrian-Refugee-Crisis.pdf)


    [links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-](http://www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-Approach-to-the-Syrian-Refugee-Crisis.pdf)


    [Approach- to-the-Syrian-Refugee-Crisis.pdf](http://www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-Approach-to-the-Syrian-Refugee-Crisis.pdf).
