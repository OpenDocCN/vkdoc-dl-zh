    ## Overall Score


    You will compute four overall scores: positive hits on the `full_txt`, negative
    hits on the `full_txt`, positive hits on `Summary`, negative hits on `Summary`.
    You then combine them to get a final score as described in Figure [3-5](#index_split_001.html#p86).


    ```

    Positive Score = number of positive hits + number of booster positive hits + number
    of exclamation positive hits - 2 * negation (positive) hits

    Negative Score = number of negative hits + number of booster negative hits + number
    of exclamation negative hits - 2 * negation (negative) hits

    ```


    **Figure 3-5.** *Score equations*


    You apply the formula in Figure [3-5](#index_split_001.html#p86) for both `full_txt`
    and `Summary` and then use the formula in Figure [3-6](#index_split_001.html#p86)
    to get positive and negative scores.


    ```

    Score positive = Score positive for full text + 1.5 * score positive for summary

    Score negative = Score negative for full text + 1.5 * score negative for summary

    ```


    **Figure 3-6.** *Equations for positive and negative scores*


    You now compare all four scores and get a final tag based on the flowchart in
    Figure [3-7](#index_split_001.html#p87).


    ```

    Start

    Get positive and negative scores

    pos > 0 or neg > 0

    YES

    neg > pos

    YES -> Tag Negative

    No

    pos > neg

    Yes -> Tag Positive

    No

    No

    contains "!"

    Yes -> Tag Positive

    No

    Tag Neutral

    ```


    **Figure 3-7.** *Flowchart for the final tag*'
