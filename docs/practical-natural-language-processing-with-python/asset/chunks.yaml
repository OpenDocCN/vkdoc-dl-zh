    # Google Pixel 3 相关推文分析


    `googlepixel` #pixel #pixel3 #pixel3photos...https://t.co/vbScNVPjfy


    RT @kwekubour: 轻松精致，@acynam x Pixel 3


    激活这些超值#优惠#，即可用$299 购买#Google #Pixel3#，用$399 购买#Pixel3XL#https://t.co/ydbadB5lAn
    来自 @HotHardware


    我于 2019 年 1 月 26 日购买了`pixel 3`，开始出现通话中断问题，并且日益严重。我不知道...https://t.co/1LTw9EdYzp


    正如你在本例中所见，这里展示了 Pixel 3 的示例推文，内容涵盖优惠活动、手机评测、手机拍摄的惊艳照片、有人在等待 Pixel 4 等等。事实上，如果你想了解与
    Pixel 3 相关的评价或情感倾向，8 条推文中只有 1 条是相关的。


    一条微博的数据可能包含关于某个主题的丰富信息。在上述 Pixel 3 的例子中，你可以发现以下内容：最受欢迎或最不受欢迎的功能、地理位置对该主题的影响、随时间变化的认知、广告的影响、对
    Pixel 3 广告的看法，以及哪些类型的用户喜欢或不喜欢该产品。推特可以被挖掘为各种事件的“领先指标”，例如，如果某家公司有重大新闻，是否可以预测其股价。这篇研究论文在[www.sciencedirect.com/science/](http://www.sciencedirect.com/science/article/pii/S2405918817300247)[article/pii/S2405918817300247](http://www.sciencedirect.com/science/article/pii/S2405918817300247)中描述了如何利用推特数据来关联英国富时指数（FTSE
    Index，即伦敦证券交易所市值最高的 100 家公司组成的指数）在英国地方选举前后及期间的 5 次波动。


    ## 聊天数据


    ### 个人聊天


    个人聊天是 WhatsApp 聊天、Facebook 或任何其他即时通讯服务的经典日常语料。它们无疑是了解用户行为（尤其是在亲友圈中）最丰富的信息来源之一。这些聊天内容充满了大量需要剔除的噪音，就像你在推特数据中看到的那样。只有一小部分语料与提取有用的商业信息相关。这种商业有用信息的出现率并不高。也就是说，它的信噪比很低。这篇论文在[www.aaai.org/ocs/index.php/ICWSM/ICWSM18/](http://www.aaai.org/ocs/index.php/ICWSM/ICWSM18/paper/view/17865/17043)[paper/view/17865/17043](http://www.aaai.org/ocs/index.php/ICWSM/ICWSM18/paper/view/17865/17043)中研究了来自各种
    WhatsApp 聊天的公开提交数据。


    图 1-3 展示了该论文分析的 WhatsApp 群组的词云。


    ***图 1-3.** WhatsApp 词云*


    此外，即时通讯应用的数据隐私准则可能不允许出于商业目的挖掘个人聊天记录。某些个人聊天功能允许企业与用户互动，我将在下一节中介绍这部分内容。


    ### 商业聊天与语音通话数据


    商业聊天，也称为在线聊天，是消费者在网站或应用上与商家进行的对话。用户通常会联系聊天客服，咨询他们在使用产品或服务时遇到的问题。他们也可能会在做出购买决定之前讨论产品。商业聊天包含相当丰富的信息，尤其是在用户的商业偏好方面。请看以下聊天示例：


    ```

    system

    感谢您选择最佳电信公司。客服代表将很快与您联系。


    system

    您现在正在与‘Max’聊天


    customer

    你好，Max


    agent

    感谢您联系最佳电信公司。我叫 Max。


    agent

    您好，我看到我正在与 Sara 女士聊天，您提供了 XXXXXXX 作为您账户关联的号码。请问正确吗？


    customer

    ```

