  trans: "\n# 第 4 章 银行业、金融服务与保险业（BFSI）中的自然语言处理\n\n在本练习中，你将使用来自 Kaggle 的数据集（[www.kaggle.com/sunnysai12345/news-summary](http://www.kaggle.com/sunnysai12345/news-summary)）。该数据集中的新闻文章是从多家报纸抓取而来，而新闻摘要则来自移动应用公司\
