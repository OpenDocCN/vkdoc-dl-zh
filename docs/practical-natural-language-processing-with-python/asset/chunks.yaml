    ## 第二章 客户服务中的自然语言处理


    如果你已经将句子语料库标注到不同的客服绩效维度，那么你也可以构建一个监督学习算法来将句子分类到不同的类别。


    ## 销售对话洞察


    到目前为止，你看到的示例和分析都是针对服务场景的，其中客服人员回答客户问题，而不是销售东西。在销售对话中，你需要理解两件重要的事情：客户来购买什么产品，以及他们为什么购买（或者更重要的是，为什么他们没有购买）。


    ## 销售对话中的热门产品


    你可以使用命名实体识别技术（你将在后续章节中看到）进行产品提取，或者使用基于查找的方法来提取产品提及。表[2-10](#index_split_000.html#p68)展示了一些示例句子。


    ***表 2-10.** 示例句子*


    | 句子 |

    | --- |

    | 想买 LED 电视 |

    | 想买三星 LED |

    | LED 电视什么价格 |

    | 想买冰箱 |

    | 需要冰箱方面的帮助 |

    | 需要冰箱方面的帮助 |

    | 有哪些三星手机可用 |

    | S340 是否缺货 |


