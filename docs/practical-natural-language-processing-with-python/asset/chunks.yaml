    \n你使用 `fp_qns` 数据集来为正确的意图获取正确的响应。首先，当向机器人发送一个新句子时，你对其进行预处理，然后将其转换为序列并填充到 `maxlen`。接着你进行预测，并从\
    \ `fp_qns` 数据集中找出正确的响应。例如，请参见清单 5-14 和 5-15 以及图 5-14。\n\n**清单 5-14.**\n\n```\n\
    def pred_new_text(txt1):\n    print (\"customer_text:\", txt1)\n    newdf = pd.DataFrame([txt1])\n\
