    \ 27, 1506))\n```\n\n数组现在是三维的。请注意，到目前为止你只定义了输入。现在必须定义输出。模型的输出是时间步为 t+1 的解码器。你希望根据上一个词预测下一个词。参见清单\
    \ 5-46。\n\n**清单 5-46.**\n\n```python\nimport numpy as np\nfrom scipy.ndimage.interpolation\
    \ import shift\n\nde_target3 = np.roll(de_tr3, -1, axis=1)\nde_target3[:, -1,\
    \ :] = 0\n```\n\n在清单 5-47 中保存编码器和解码器令牌的数量以定义模型输入。\n\n**清单 5-47.**\n\n```python\n\
    num_encoder_tokens = en_tr3.shape[2]\nnum_decoder_tokens = de_tr3.shape[2]\n```\n\
    \n在采用教师强制（teacher forcing）的编码器-解码器架构中，训练和推理步骤存在差异。代码源自 [`blog.keras.io/a-ten-minute-introduction-to-sequence-to-sequence-learning-in-keras.html`](https://blog.keras.io/a-ten-minute-introduction-to-sequence-to-sequence-learning-in-keras.html)\
    \ 上的这篇文章。首先，你将看到训练步骤。这里你为编码器输入（客户文本）的每一步定义一个包含 100 个隐藏节点的 LSTM。你保留编码器的最终细胞状态和隐藏状态，并丢弃每个\
    \ LSTM 细胞的输出。解码器接收来自机器人文本的输入，并使用编码器输出的初始状态进行初始化。由于编码器有 100 个隐藏节点，解码器也有 100 个隐藏节点。每个细胞的解码器输出被传递到一个全连接层。网络使用解码器输入的时间调整滞后进行训练。基本上，t-1\
