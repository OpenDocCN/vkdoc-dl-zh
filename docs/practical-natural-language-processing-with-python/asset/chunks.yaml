    ## 其他 word2vec 库


    另一个流行的 word2vec 库是 `fasttext`。这是由 Facebook 发布的一个库。主要区别在于，所考虑的输入向量是单词的一组 n-gram。


    例如，`transform` 会被分解为 `tra`、`ran`、`ans` 等。这有助于 word2vec 模型为大多数单词提供向量表示，因为它们会被分解成
    n-gram，然后重新组合其权重以给出最终输出。你将看到一个示例。


    你将使用预处理后的列 `h1_stop` 的 `t1` 数据集示例。你将替换所有数字，并从该列中移除所有长度小于 3 的单词。参见清单 4-23。


    **清单 4-23.**


    ```

    t1["h1_stop"] = t1["h1_stop"].str.replace(''[0-9]+'',''numbrepl'')

    t1["h1_stop"] = t1["h1_stop"].str.replace(''[^a-z\s]+'','''')

    list2=[]

    for i in t1["h1_stop"]:

    list1 = i.split()

    str1 = ""

    for j in list1:

    if(len(j)>=3):

    str1 = str1 + " " + j

    list2.append(str1)

    t1["h1_proc"] = list2

    ```


    现在，你从 `h1_proc` 列中提取单词标记。你使用了 `word_punctuation_tokenizer` 来对单词进行分词。与 NLTK 的 `tokenize`
    函数相比，标点分词器会将标点符号视为独立的标记。

