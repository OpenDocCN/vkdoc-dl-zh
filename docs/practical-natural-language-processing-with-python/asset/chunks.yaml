    \ >= 4]\nt2[\"ner_words1\"] = t2[\"ner_words\"].str.lower()\nt2[\"ner_words2\"\
    ] = t2[\"ner_words1\"].str.replace(\" \", \"\")\nner_list_space = t2[\"ner_words1\"\
