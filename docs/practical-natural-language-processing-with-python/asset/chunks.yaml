    Chapter 3 NLP in Online Reviews


    ## Approach 3: Machine-Learning Based Approach (Neural Network)


    Since you have the final rating provided by the user, you can try fitting a supervised
    model. One way to do a supervised model in your case is to use all of the text
    from the `Summary` and `Text` columns as features, `score_bkt` as the target variable,
    and fit a machine learning model. The one issue with this approach is that the
    model could get biased by the product names or a product category that had a higher
    or a lower rating. The other way is to use the lexical features you created earlier
    as features in the model. Table 3-5 shows the intermediary variables you created
    in the lexical-based approach. You will add few more variables to this and build
    your model.


    ***Table 3-5.** Intermediary Variables*


    | Lexical features | Variable meaning |

    | --- | --- |

    | `sent_len` | Length of the text |

    | `pos_score` | Positive score by the lexical method |

    | `neg_score` | Negative score by the lexical method |

    | `neg_num_pos_count` | Number of negative words near positive words |

    | `neg_num_neg_count` | Number of negative words near positive words |

    | `boost_num_pos_count` | Number of booster words near positive words |

    | `boost_num_neg_count` | Number of booster words near negative words |

    | `neg_num_neg_count_sum` | Number of negative words near positive words in summary
    |

    | `boost_num_pos_count_sum` | Number of negative words near positive words in
    summary |

    | `boost_num_neg_count_sum` | Number of booster words near positive words in summary
    |

    | `excl_num_pos_count` | Number of exclamation marks near positive words |

    | `excl_num_neg_count` | Number of exclamation marks near negative words |

    | `excl_num_pos_count_sum` | Number of exclamation marks near positive words in
    summary |

    | `excl_num_neg_count_sum` | Number of exclamation marks near negative words in
    summary |


    Chapter 3 NLP in Online Reviews


    ## Corpus Features


    With the text and summary of the corpus, you can create bag-of-words features
    using the TF-IDF vectorizer. Since you want to create a generic sentiment analysis
    module, you select only words that are relevant to emotions or sentiments words
    from the corpus. This is an important step since using all of the words (in your
    case, pet food names, candy names, etc.) could bias the model to learn patterns
    that associate product and their associated sentiment. You will create two sets
    of word features: containing only adjectives and containing only stop words. Please
    note in your classification example in Chapter 2 you eliminated stop words. Here
    you will use stop words as the only features set.


    You will then combine these two features sets and with `score_bkt` as the dependent
    variable you will train a neural network, adjusting for class weights to get the
    best possible model that provides a good classification across all levels. You
    are using NLTK version 3.4.3 here, as mentioned in Table 3-7. See Listing 3-29
    and Listing 3-30.


