- fmt: '# About the Technical Reviewer


    **Manohar Swamynathan** is a data science practitioner and an avid programmer,
    with over 14+ years of experience in various data science-related areas, including
    data warehousing, business intelligence, analytical tool development, ad-hoc analysis,
    predictive modeling, data science product development, consulting, formulating
    strategy, and executing analytics programming. His career has covered the life
    cycle of data across different domains such as US mortgage banking, retail/e-commerce,
    insurance, and industrial IoT. He’s also involved in the technical review of books
    about data science using Python and R. He has a bachelor’s degree with a specialization
    in physics, mathematics, and computers, and a Master’s degree in project management.
    He’s currently living in Bengaluru, the silicon valley of India.


    # Acknowledgments


    I want to thank my husband, Satish. I brainstormed with him several times during
    the course of this book on the technical and business use cases. I also want to
    thank the team at Apress for providing adequate reviews and guidance on the content.
    I learned all the concepts on the job, so I thank all the people with whom I have
    had the privilege to work with and learn from.


    # Introduction


    I am fortunate to have had the exposure and opportunity to solve complex NLP problems
    that benefited various businesses across geographies. This book comes from my
    learnings and hence it is a practitioner view of solving text problems. Solving
    NLP problems involves a certain combination of creativity and technical knowledge.
    Sometimes the best deep learning methods do not solve a problem as well as simple
    solutions do. I am always reminded of Occam’s razor, which states that when there
    are alternatives available, the simplest one possibly solves the problem best.


    In my opinion, the answer to any problem lies in the data. This is why the first
    chapter talks about text data. I cover different types of text data and the information
    that can be extracted from this data. Chapters [2](#index_split_000.html#p25),
    [3](#index_split_001.html#p76), [4](#index_split_001.html#p131), and [5](#index_split_002.html#p194)
    focus on different industries and the common text mining problems faced in these
    domains. As I cover the use cases in these chapters, I also cover the corresponding
    text mining concepts along with the relevant code and Python libraries. Chapter
    [2](#index_split_000.html#p25) takes a quick view of the customer service industry
    with a deep dive into the conversation corpus. It highlights the various types
    of information that can be extracted from the conversation corpus along with detailed
    code. I also cover bag of words, vectorization, the rules-based approach, and
    supervised learning methods in great detail. Chapter [3](#index_split_001.html#p76)
    focuses on a very popular text mining use case: review mining. I delve into sentiment
    analysis and the various facets of opinion mining. I cover sentiment analysis
    using unsupervised and supervised techniques. I introduce neural networks for
    sentiment analysis in this chapter. Chapter [4](#index_split_001.html#p131) provides
    an overview of techniques used in the banking and financial services industries.
    Traditionally, banking uses structured data to drive decisions. Of late, text
    use cases are being explored in this arena and I talk about one in detail. I explore
    named entity recognizers in detail in this chapter using unsupervised techniques
    and embedding based neural networks. Chapter [5](#index_split_002.html#p194) is
    dedicated to virtual assistants. I explore techniques to build bots using state-of-the-art
    neural network architectures. This chapter also introduces natural language generation
    concepts.


    # CHAPTER 1


    ## Types of Data


    Natural language processing (NLP) is a field that helps humans communicate with'
