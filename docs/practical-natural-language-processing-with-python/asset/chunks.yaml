- fmt: "# Word Embeddings in NLP\n\nSearch engines. When users search, for instance,\
    \ for domestic animals, they expect results on cats, dogs, etc. Observe that the\
    \ words are not lexically similar but they are absolutely related. Word embeddings\
    \ help associate words to context.\n\n## Chapter 4: NLP in Banking, Financial\
    \ Services, and Insurance (BFSI)\n\nThe intuition behind word embeddings is that\
    \ you can learn the context of the word by the words surrounding it. For example,\
    \ in Figure 4-3 all the highlighted words appear in a similar context of learning.\
    \ The words surrounding a given word give it its meaning. Hence from a large corpus,\
    \ by comparing words surrounding a given word we can arrive at the semantics of\
    \ the word.\n\n- I love to **read** about new technology.\n- I like to **understand**\
    \ new things.\n- I like to **study** science.\n- She likes to **learn** about\
    \ machine learning.\n\n***Figure 4-3.** Example sentences for word embedding*\n\
    \nAround 2013, neural networks were used to learn the embeddings of words. Using\
    \ a technique called `word2vec`, you could represent a single word into N dimensions.\
    \ Once you get a word represented in N dimensions, you can arrive at the cosine\
    \ similarity of the dimensions to understand the similarity between the words.\
    \ There are also pretrained libraries available to get the dimensions for each\
    \ word. Let's see an example from `Spacy`. See Listing 4-12.\n\n***Listing 4-12.**\
    \ Spacy*\n\n```\nnlp = spacy.load(\"en_core_web_sm\")\ndoc = nlp(\"This is to\
    \ explain parts of speech in Spacy\")\nfor i in doc:\n    print(i.text, i.vector)\n\
    ```\n\n**This** `[-2.2498417 -3.3314195 -5.568074 3.67963 -4.612324 -0.48435217\
    \ 0.27712554 -0.77937424 -0.8964542 -1.0418985 -0.7162781 2.076798 -3.6910486\
    \ 2.2700787 -3.4369807 -1.8229328 0.1314069 0.22531027 5.15489 -0.49419683 1.0052757\
    \ -1.8017105 2.1641645 2.0517178 -2.1288662 3.7649343 -0.66652143 -2.9879086 0.05217028\
    \ 4.8123035 4.051547 0.98279643 -2.6945567 -3.4998686 -1.7214956 -0.61138093 1.4845726\
    \ 2.335553 -3.3347645 -0.62267256 -2.6027427 0.5974684 -4.0274143 3.0827138 -2.8701754\
    \ -2.8391452 6.236176 2.1810527 3.2634978 -3.845146 -1.7427144 1.1416728 -3.019658\
    \ -0.505347 -0.564788 0.8908412 -1.5224171 -0.8401189 -2.4254866 2.3174202 -4.468281\
    \ -2.662314 -0.29495603 3.1088934 -0.69663733 -1.3601663 3.0072615 -5.8090506\
    \ -1.2156953 -2.2680192 1.2263682 -2.620054 4.355402 1.1643956 1.2154089 1.1792964\
    \ -0.9964176 1.4115602 0.2106615 -3.0647554 -5.1766944 2.7233424 -0.36179888 -0.58938277\
    \ 3.1080005 8.0415535 8.250744 -1.0494225 -2.9932828 2.1838582 3.6895149 1.9469192\
    \ -0.7207756 6.1474023 2.4041312 1.5213318]`\n\nThe output in Listing 4-12 is\
    \ a vector representation of the word *This*. `Spacy` trained a `word2vec` model\
    \ to arrive at 300 long dimensions for each word. Similarities between the words\
    \ are the similarity between the dimensions of the respective words. Now let's\
    \ take the example of the words *learn*, *read*, and *understand*. In order to\
    \ contrast the similarities, you will also take the context vector of the word\
    \ *run*. You are experimenting with another `Spacy` model, `en_core_web_md`. First,\
    \ download the model and then use it in your script. See Listings 4-13 and 4-14.\n\
    \n***Listing 4-13.** Downloading Spacy*\n\n```\n!python -m spacy download en_core_web_md\n\
    ```\n\n***Listing 4-14.** Using Spacy*\n\n```\nimport spacy\n\nnlp = spacy.load(\"\
    en_core_web_md\")\n\ndoc1 = nlp(u'learn')\ndoc2 = nlp(u'read')\ndoc3 = nlp(u'understand')\n\
    doc4 = nlp(u'run')\n\nfor i in [doc1, doc2, doc3, doc4]:\n    for j in [doc1,\
    \ doc2, doc3, doc4]:\n        if ((i.vector_norm > 0) & (j.vector_norm > 0)):\n\
    \            print(i, j, i.has_vector, j.has_vector, i.similarity(j))\n```\n\n\
    Output:\n```\nlearn learn True True 1.0\nlearn read True True 0.47037032349231994\n\
    learn understand True True 0.7617364524642122\nlearn run True True 0.32249343409210124\n\
    read learn True True 0.47037032349231994\nread read True True 1.0\nread understand\
    \ True True 0.5366261494062171\nread run True True 0.2904269408366301\nunderstand\
    \ learn True True 0.7617364524642122\nunderstand read True True 0.5366261494062171\n\
    understand understand True True 1.0\nunderstand run True True 0.32817161669079264\n\
