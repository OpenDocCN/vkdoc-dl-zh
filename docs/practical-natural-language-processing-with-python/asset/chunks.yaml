- fmt: "# CHAPTER 2\n\n## NLP in Customer Service\n\nCustomer service is a multi-billion\
    \ dollar industry. The cost of bad customer experience is estimated to be a trillion\
    \ dollars globally (https://blog.hubspot.com/service/customer-service-stats).\
    \ Customer service has its early origins in the form of call centers in the 1960s.\
    \ The need for customer service grew, and today customer support has become a\
    \ sizeable portion of any consumer organization. Customers can contact organizations\
    \ in a multi-modal way, through the Web, apps, voice, `IVR`, or calls. In this\
    \ chapter, we will look at the core problems that `NLP` solves in human-assisted\
    \ customer service via chats and calls.\n\nLet’s look at the data structures in\
    \ the customer service industry by each of the service channels from which text\
    \ data is collected.\n\n### Voice Calls\n\nCustomers call into contact centers\
    \ and a customer support agent from the company answers the customers’ queries.\
    \ At the end of the call, the agent notes down the nature of the call, any tickets\
    \ the agent had raised, and the resolution. The agent may also fill out some forms\
    \ that pertain to the call. Table 2-1 shows sample data.\n\n© Mathangi Sri 2021\
    \  \nM. Sri, *Practical Natural Language Processing with Python*, https://doi.org/10.1007/978-1-4842-6246-7_2\n\
    \n***Table 2-1.** Example of Call Data*\n\n| **Call id** | **Call start** | **Call\
    \ end** | **Agent call notes** | **Call transferred** | **Agent name** | **Customer\
    \ survey rating** | **Customer survey comments** |\n| --- | --- | --- | --- |\
    \ --- | --- | --- | --- |\n| 424798 | 11/12/2019 1:09:38 | 11/12/2019 1:18:38\
    \ | customer asked about high bills. explained. | No | Sam | | customer fine |\n\
    | 450237 | 11/26/2019 8:58:58 | 11/26/2019 9:13:58 | waiver fee. escalated | No\
    \ | Kiran | | |\n| 794029 | 4/26/2019 8:23:52 | 4/26/2019 8:34:52 | payment link\
    \ sent | No | Karthik | 3 | call disconnects.. agent helpful |\n| 249311 | 12/8/2019\
    \ 10:50:14 | 12/8/2019 11:02:14 | xferred to superv | Yes | Megha | | |\n\nWe\
    \ analyze the agent call notes and customer survey comments. This gets then pivoted\
    \ with other structured data to derive insights about the calls.\n\n### Chats\n\
    \nCustomers can chat with customer support on the e-commerce web page or on mobile\
    \ apps. You saw an example of a chat transcript in the last chapter. As with calls,\
    \ the agents are made to fill an “agent disposition form” at the end of an interaction.\
    \ The agent disposition forms in chats are slightly longer as compared to voice\
    \ calls. The agents can multitask and hence are expected to fill in details about\
    \ the chats so we get line-level text data along with time stamps. A small example\
    \ of this data is shown in Table 2-2.\n\n***Table 2-2.** Example of Chat Data*\n\
    \n| **Speaker** | **Line text** | **Time stamp** |\n| --- | --- | --- |\n| system\
    \ | Thank you for choosing Best Telco. A representative will be with you shortly.\
    \ | 5:44:44 |\n| system | You are now chatting with Max. | 5:44:57 |\n| customer\
    \ | Himax | 5:45:03 |\n| agent | Thank you for contacting Best Telco. My name\
    \ is Max. | 5:45:14 |\n| agent | Hello, I see that I’m chatting with Mrs. Sara\
    \ and you’ve provided XXXXXXX as the number associated with your account. Is that\
    \ correct? | 5:45:26 |\n| customer | yes. that is correct. I just received email\
    \ saying my service price was going up to$70/monthbut on your web site, it's only$30.\
    \ What's the deal with that? | 5:45:39 |\n\nThis data is often analyzed with the\
    \ following other data:\n\n- Metadata of chats, like average handle time, chats\
    \ that got transferred to another agent, web page where the chat happened\n- Metadata\
    \ of agents, such as agent’s tenure and pervious performance history\n- Agent\
    \ disposition data (as filled in by the agent), such as reason for the user’s\
    \ chat, resolved or unresolved, tickets raised, etc.\n- User data such as user\
    \ preferences, history of user behavior data, history of user contact, etc."
