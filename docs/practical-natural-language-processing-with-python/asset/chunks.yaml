    \ `t+1` 时刻的单词。重复此过程，直到遇到结束标记。请记住，你是在机器人句子模板上训练的，而不是在实际句子上。因此，你得到的是模板 ID 作为输出。然后，使用清单\
    \ 5-61 将模板 ID 转换为所需的单词。\n\n**清单 5-61.**\n\n```\ndef rev_dict(req_word):\n    str1\
    \ = \"\"\n    for k, v in df_sents.items():\n        if (df_sents[k] == [req_word]):\n\
    \            str1 = k\n    return str1\n\nfrom keras.preprocessing.sequence import\
    \ pad_sequences\nfrom keras.utils import to_categorical\nimport numpy as np\n\n\
    def get_op(text1, shp):\n    st_pos = 0\n    input_seq = conv_sent(text1, shp)\n\
    \    states_value = encoder_model.predict(input_seq)\n    target_seq = np.zeros((1,\
    \ 1, num_decoder_tokens))\n    str_all = \"\"\n    # 用起始词填充目标序列的第一个词。\n    target_seq[0,\
    \ 0, st_pos] = 1\n    for i in range(0, 10):\n        decoded_sentence = ''\n\
    \        output_tokens, h, c = decoder_model.predict([target_seq] + states_value)\n\
    \        sampled_token_index = np.argmax(output_tokens[0, -1, :])\n        sampled_char\
    \ = tokenizer1.sequences_to_texts([[sampled_token_index]])\n        str1 = rev_dict(sampled_char[0])\n\
    \        str_all = str_all + \"\\n\" + str1\n        if (sampled_char[0] == 'end'):\n\
    \            break\n        else:\n            decoded_sentence += sampled_char[0]\n\
    \        target_seq = np.zeros((1, 1, num_decoder_tokens))\n        target_seq[0,\
    \ 0, sampled_token_index] = 1.\n        # 初始化状态值\n        states_value = [h, c]\n\
    \    return str_all\n```\n\n你可以在此处检查输出。参见清单 5-62、5-63 和 5-64。\n\n**清单 5-62.**\n\
    \n```\ntext1 = \"54c\"\nget_op(text1, num_encoder_tokens)\n'\\n placename going\
    \ to placename transportation center \\n short_numshort_num n short_num where\
    \ are you leaving from \\n'\n```\n\n**清单 5-63.**\n\n```\ntext1 = \"next bus to\
    \ boulevard\"\nget_op(text1, shp)\n'\\n did i get that placename okay where would\
    \ you like to leave from \\n if you placename to leave from placename and bausman\
    \ say yes or press short_num otherwise say no or press short_num \\n'\n```\n\n\
    **清单 5-64.**\n\n```\ntext1 = \"Do you have bus to downtown in the morning\"\n\
    get_op(text1, shp)\n'\\n when would you like to travel \\n'\n```\n\n你似乎有了一个不错的开端。可以通过以下方法来改进回复：\n\
    \n1.  你需要用合适的地名替换答案，并给出更有意义的回答。\n2.  你是在单个输入上训练的。但这是一个对话，因此你需要基于 `n-1` 的回复和问题来训练模型，以获取下一个回复。\n\
    3.  部分转录内容不准确。如果能剔除这些内容，并用更干净的语料库训练模型，效果会更好。\n4.  你可以使用嵌入（预训练的或在模型训练期间训练的）作为 LSTM\
    \ 的输入。\n5.  你可以调整超参数，例如学习率或学习算法。\n6.  你可以使用堆叠的 LSTM 层（第一组 LSTM 为第二组 LSTM 提供输入）。\n\
    7.  你可以使用双向 LSTM。稍后你将看到一个双向 LSTM 的示例。\n8.  你可以使用像 BERT 这样的高级架构。\n\n## 双向 LSTM\n\
    \n以句子“She was playing tennis.”为例。单词“playing”的上下文从“tennis”中更容易看出。为了在给定上下文中找到单词，不仅单词之前的词（过去词）很重要，单词之后的词（未来词）也同样重要。\n\
    \n因此，你用一个前向序列和一个后向序列来训练模型。这是来自 [`colah.github.io/posts/2015-09-NN-Types-FP/`](http://colah.github.io/posts/2015-09-NN-Types-FP/)\
    \ 的架构。这两个 LSTM 的输出可以拼接或求和。参见图 5-20。\n\n![Image 81](img/index-237_1.jpg)\n\n**图\
    \ 5-20.** 双向 LSTM\n\n让我们来看一个使用双向 LSTM 解决当前问题的小型实现。在这里，输出被拼接并传递给解码器。\n\n### 编码器\n\
    \n双向 LSTM 有额外的前向和后向隐藏状态输出（`forward_h`、`forward_c`、`backward_h` 和 `backward_c`）。然后它们被拼接（隐藏状态拼接在一起，细胞状态拼接在一起）以得到最终的编码器状态。\n\
    \n### 解码器\n\n与之前的情况一样，解码器有一个单向 LSTM。然而，其隐藏单元的数量等于编码器双向 LSTM 拼接后的隐藏单元数量。在你的例子中（清单\
    \ 5-65），编码器 LSTM 各有 100 个单元，解码器有 200 个单元。\n\n**清单 5-65.**\n\n```\nfrom keras.layers\
    \ import LSTM, Bidirectional, Input, Concatenate\nfrom keras.models import Model\n\
    from keras.layers import Input, LSTM, Dense\n\nn_units = 100\nn_input = num_encoder_tokens\n\
    n_output = num_decoder_tokens\n\n# 编码器\nencoder_inputs = Input(shape=(None, n_input))\n\
    encoder = Bidirectional(LSTM(n_units, return_state=True))\nencoder_outputs, forward_h,\
    \ forward_c, backward_h, backward_c = encoder(encoder_inputs)\nstate_h = Concatenate()([forward_h,\
    \ backward_h])\nstate_c = Concatenate()([forward_c, backward_c])\nencoder_states\
    \ = [state_h, state_c]\n\n# 解码器\ndecoder_inputs = Input(shape=(None, n_output))\n\
    decoder_lstm = LSTM(n_units*2, return_sequences=True, return_state=True)\ndecoder_outputs,\
    \ _, _ = decoder_lstm(decoder_inputs, initial_state=encoder_states)\ndecoder_dense\
    \ = Dense(n_output, activation='softmax')\ndecoder_outputs = decoder_dense(decoder_outputs)\n\
    \nmodel = Model([encoder_inputs, decoder_inputs], decoder_outputs)\n\n# 定义推理编码器\n\
    encoder_model = Model(encoder_inputs, encoder_states)\n```\n"
