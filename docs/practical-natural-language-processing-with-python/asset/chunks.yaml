    The intuition behind word embeddings is that you can learn the context of the
    word by


    the words surrounding it. For example, in Figure [4-3 all the hi](#index_split_002.html#p141)ghlighted
    words appear in a similar context of learning. The words surrounding a given word
    give it its meaning. Hence from a large corpus, by comparing words surrounding
    a given word we can arrive at the


    semantics of the word.


    I love to **read** about new technology.


    I like to **understand** new things.


    I like to **study** science.


    She likes to **learn** about machine learning.


    ***Figure 4-3.** Example sentences for word embedding*


