    The `Z1` here is a vector of length 64. Similarly, you get a vector of length
    64 for all the words. I explained the case of single-head attention. In case of
    multi-head, you initialize multiple sets of `Q`, `K`, `V` matrices for each word
    embedding (by initializing multiple sets of `W_Q`, `W_K`, `W_V`). A quick illustration
    is shown in Figure [5-23](#index_split_003.html#p244).


    ***Figure 5-23.** Multi-head attention*


    You get multiple `Z` outputs (let’s say you have four attention heads) and then
    you have a `4*64` matrix at each head. All of them get concatenated with one another,
    the number of rows being 4 (the sentence and vocab have only 4 words) and the
    columns being the dimension of `Q`, `K`, `V` vectors, which is 64 multiplied by
    the number of heads (in your case it''s 4). This matrix further gets multiplied
    by a weight matrix to produce the output of the layer. The output of the transformer
    is the number of words * 64 in this case.


