- fmt: "# 排版后的文本\n\nwill be covered in detail in the next section. In order to improve\
    \ the accuracy further, you need to print out the errors and modify the rules.\n\
    \n## Supervised Learning Using Machine Learning\n\nOne of the issues with the\
    \ rules method is that it’s very cumbersome and you may also overfit to the current\
    \ data so much that you may not know the accuracy of a new dataset. Rules get\
    \ even more complicated as the number of classes increases. You can use machine\
    \ learning models to learn the patterns and score the new dataset with a new model.\
    \ Machine learning learns the pattern in the data from historic data. In your\
    \ case, you have manually labelled data. Remember the process that you followed\
    \ earlier in order to improve the model? You printed out the errors as compared\
    \ to the manual labels and then you analyzed the source of the error to correct\
    \ the rules. Supervised learning follows a similar approach. It initially predicts\
    \ an output and then keeps correcting the output with the errors it sees in comparison\
    \ with manually labelled data until the errors are minimized. You will see the\
    \ supervised process of text mining in detail below.\n\n## Getting Manually Labelled\
    \ Data\n\nIn the airline dataset, the manually labelled data happens to be the\
    \ dependent variable class. Manual labelling, also referred as annotations, is\
    \ a time-consuming activity. However, the cost-benefit of this process is found\
    \ to be worth the effort. There are online annotation companies (such as Mechanical\
    \ Turks) that provide labelling services. Sometimes an organization will build\
    \ a team of annotators with quality control processes for supporting large-scale\
    \ annotations. There are various tools available for annotations. Examples include\
    \ `GATE (https://gate.ac.uk/)`, `LightTag (www.lighttag.io/)`, and `TagTog (www.tagtog.net/)`.\
    \ `GATE` is an open source text mining tool that has various annotation features.\
    \ Figure [2-6](#index_split_000.html#p42) shows an example of a screen from `GATE`.\
    \ Annotators highlight a certain portion in the text and then annotate what the\
    \ highlighted topic/word is about.\n\n![Image 13](index-42_1.jpg)\n\n**Figure\
    \ 2-6.** A GATE screen\n\nHowever, Microsoft Excel or any Excel-based tool like\
    \ Google spreadsheets can also help with an annotation problem. Most of the annotations\
    \ in this book are done through Excel-based platforms including the current case\
    \ study that you are exploring. Once the sentences or words are labelled, a thorough\
    \ quality check has to be carried out. Manual labelling accuracies are supposed\
    \ to be in the high 90% range. This can, of course, change depending on the corpus.\
    \ As part of quality checks, a supervisor checks the labels done by an annotator.\
    \ Alternately, labelling accuracies can be increased by getting the corpus labelled\
    \ by multiple annotators. To get the right quality in the labelling process, the\
    \ following tasks need to be ensured by the data scientist:\n\n**Define ontology\
    \ clearly**: Ontology is the classification tree. In your case, it is the list\
    \ of topics. They have to be mutually exclusive and collectively exhaustive. This\
    \ is an important step to achieving high labelling accuracies and hence a high\
    \ accuracy from the machine learning models.\n\n**Provide examples**: It is also\
    \ the job of the data scientist to provide examples of each category.\n\n**Conflict\
    \ between categories**: Sometimes two sentences may seem to belong to different\
    \ categories. In that case, a clear definition of conflict resolution should be\
    \ defined. Consider this query: “I am having problems while logging in. I wanted\
    \ to pay the bill.” If there are two categories, Login and Payment, what should\
    \ this query be labelled?\n\nOnce you get the labelled data, the next step is\
    \ to build a predictive model that can learn patterns in the underlying data.\
    \ Given a new sentence, it should be able to predict the topic for the same. The\
    \ set of underlying patterns is referred to as a predictive model. Any predictive\
    \ model in supervised learning has two components: dependent variables and independent\
    \ variables. In your case, the dependent variables are the labels and the independent\
    \ variables are the sentences. However, a machine learning model cannot accept\
    \ words as inputs. So the words/sentences have to be converted to numbers. The\
    \ first step in converting a word to numbers is called tokenization.\n\n## Word\
    \ Tokenization\n\nSo you have a bunch of sentences as dependent variables. The\
    \ first step is to convert them into tokens or units of analysis. Tokens can be\
    \ words, sentences, or characters. Let’s get the tokens for the corpus. See Listing\
    \ [2-11](#index_split_000.html#p43) to understand ways to tokenize sentences.\n\
    \n**Listing 2-11.** Tokens\n\n```\nfrom nltk.tokenize import word_tokenize\n\n\
    str1 = \"What a great show!\"\nstr1.split()\n['What', 'a', 'great', 'show!']\n\
    \nfrom nltk.tokenize import word_tokenize\nword_tokenize(str1)\n['What', 'a',\
    \ 'great', 'show', '!']\n```\n\nAs you can see, the simplest way to break sentences\
    \ into words is to use the `split` function. However, `split` does not accommodate\
    \ special characters whereas `word_tokenize` from `NLTK` does take care of special\
    \ characters. Sentences can be split by using the `sent_tokenize` function shown\
    \ in Listing [2-12](#index_split_000.html#p44).\n\n**Listing 2-12.** Splitting\
    \ Sentences\n\n```\nsentences = \"I am feeling great! It was a great show\"\n\
    from nltk.tokenize import sent_tokenize\nsent_tokenize(sentences)\n['I am feeling\
    \ great!', 'It was a great show']\n```\n\nSometimes you may also want to analyze\
    \ words in a certain order. For example, “check in” means something together and\
    \ the value of that is lost if it analyzed as “check” and “in.” In order to retain\
    \ as much meaning as possible while converting sentences to word tokens, you also\
    \ want to retain the order. So instead of having single word tokens, you can have\
    \ two- or three-term tokens. They are referred as bigrams and trigrams. See Listing\
    \ [2-13](#index_split_000.html#p44).\n\n**Listing 2-13.** Bigrams and Trigrams\n\
    \n```\nimport nltk\ntext = \"I want to check in asap\"\nbigram_list = list(nltk.bigrams(text.split()))\n\
    [' '.join(i) for i in bigram_list]\n['I want', 'want to', 'to check', 'check in',\
    \ 'in asap']\n```\n\nNow that you know about tokenization, let’s apply it to your\
    \ corpus and split it into words.\n\n## Term-Document Matrix\n\nLet’s now apply\
    \ word tokenization to the list of sentences you have and get the output. The\
    \ output will then feed into the machine learning model as the dependent variables.\
    \ Your objective is to convert the text you have here to numbers. The simplest\
    \ approach is to use the “bag-of-words” approach. Here you get the list of words\
    \ or tokens in a corpus and treat them like features in a data mining problem.\
    \ Now you get a matrix of size `N*M` where `N` is the number of documents (length\
    \ of the dataframe) and `M` is the unique number of tokens in the corpus. As a\
    \ start, the cells can be a presence or an absence of words. Use the code in Listing\
    \ [2-14](#index_split_000.html#p45) to do this and see the results in Figure [2-7](#index_split_000.html#p45).\n\
    \n**Listing 2-14.** The Bag-of-Words Approach\n\n```\ndef tokenize(sent1):\n \
    \   return word_tokenize(sent1)\n\ndf = pd.read_csv('airline_dataset.csv', low_memory=False,\
    \ encoding='latin1')\ndf[\"line\"] = df[\"line\"].str.lower().str.lstrip().str.rstrip()\n\
    \n### tokenize all rows\ndf[\"token_words\"] = df[\"line\"].apply(tokenize)\n\
    df.head()\n```\n\n| Index | line | class | token_words |\n|-------|------|-------|-------------|\n\
    | 0 | when can i web check-in? | check in | [when, can, i, web, check-in, ?] |\n\
    | 1 | want to check in | check in | [want, to, check, in] |\n| 2 | please check\
    \ me in | check in | [please, check, me, in] |\n| 3 | check in | check in | [check,\
    \ in] |\n\n**Figure 2-7.** Bag-of-words output"
