    `googlepixel` #pixel #pixel3 #pixel3photos...https://t.co/vbScNVPjfy


    RT @kwekubour: With The Effortlessly Fine, @acynam x Pixel 3


    Get A #Google #Pixel3 For $299, #Pixel3XL For $399 With Activation In These Smoking
    Hot #Dealshttps://t.co/ydbadB5lAn via @HotHardware


    I purchased `pixel 3` on January 26 2019 i started facing call drops issue and
    it is increasing day by day.i dont kn...https://t.co/1LTw9EdYzp


    As you can see in this example, which displays sample tweets for Pixel 3, the
    content spans deals, reviews of the phone, amazing shots taken from the phone,
    someone awaiting the Pixel 4, and so on. In fact, if you want to understand the
    review or sentiment associated with Pixel 3, only 1 out of the 8 tweets is relevant.


    A microblog’s data can contain power-packed information about a topic. In the
    above example of Pixel 3, you can find the following: the most liked or disliked
    features, the influence of location on the topic, the perception change over time,
    the impact of advertisements, the perception of advertisements for Pixel 3, and
    what kind of users like or dislike the product. Twitter can be mined as a “leading
    indicator” for various events, such as if a stock price of a particular company
    can be predicted if there is significant news about the company. The research
    paper at [www.sciencedirect.com/science/](http://www.sciencedirect.com/science/article/pii/S2405918817300247)[article/pii/S2405918817300247](http://www.sciencedirect.com/science/article/pii/S2405918817300247)
    describes how Twitter data was used to correlate the 5 movements of the FTSE Index
    (Financial Times Stock Exchange Index, an index of the 100 most capitalized companies
    on the London Stock Exchange) before, during, and after local elections in the
    United Kingdom.


    ## Chat Data


    ### Personal Chats


    Personal chats are the classic everyday corpus of WhatsApp chat or Facebook or
    any other messenger service. They are definitely one of the richest sources of
    information to understand user behavior, more in the friends-and-family circle.
    They are filled with a lot of noise that needs to be weeded out, like you saw
    with the Twitter data. Only a small portion of the corpus is relevant for extracting
    useful commercial information. The incidence rate of this commercially useful
    information is not very high. That is to say, it has a low signal-to-noise ratio.
    The paper at [www.aaai.org/ocs/index.php/ICWSM/ICWSM18/](http://www.aaai.org/ocs/index.php/ICWSM/ICWSM18/paper/view/17865/17043)[paper/view/17865/17043
    s](http://www.aaai.org/ocs/index.php/ICWSM/ICWSM18/paper/view/17865/17043)tudied
    openly submitted data from various WhatsApp chats.


    Figure 1-3 shows a word cloud of the WhatsApp groups analyzed by the paper.


    ***Figure 1-3.** WhatsApp word cloud*


    Also the data privacy guidelines of messenger apps may not permit mining personal
    chats for commercial purposes. Some of the personal chats have functionality where
    a business can interact with the user, and I will cover that as part of the next
    section.


    ### Business Chats and Voice Call Data


    Business chats, also referred to as live chats, are conversations that consumers
    have with a business on their website or app. Typically users reach out to chat
    agents about the issue they face in using a product or service. They may also
    discuss the product before making a purchase decision. Business chats are fairly
    rich in information, more so on the commercial preferences of the user. Look at
    the following example of a chat:


    ```

    system

    Thank you for choosing Best Telco. A representative will be with you shortly.


    system

    You are now chatting with ‘Max’


    customer

    hi max


    agent

    Thank you for contacting Best Telco. My name is Max.


    agent

    Hello, I see that I’m chatting with Mrs. Sara and you’ve provided XXXXXXX as the
    number associated with your account. Is that correct?


    customer

    ```'
