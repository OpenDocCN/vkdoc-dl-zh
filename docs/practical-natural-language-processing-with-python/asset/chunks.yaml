    \n## 通过高频词理解意图\n\n给定一个句子语料库，你可以通过提取语料库中最频繁出现的词来理解主要意图。让我们使用`NLTK`包来获取高频关键词。\n\n\
    `NLTK`中的`FreqDist`提供了词组中词的分布情况。你首先需要将 pandas 系列的句子转换为一个拼接后的字符串。在代码清单 2-2 中，你使用`get_str_list`方法来实现这一点。一旦得到所需格式的字符串，你就可以通过`NLTK`进行分词，并将其交给`FreqDist`包（代码清单\
    \ 2-3）。\n\n第 2 章：客户服务中的自然语言处理\n\n***代码清单 2-2.***\n\n```\ndef get_str_list(ser):\n\
