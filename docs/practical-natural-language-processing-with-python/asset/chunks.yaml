  trans: "\n经过大量研究，我发现总体而言，包括博世在内的所有前置式洗衣机所使用的技术并不完美。事实上，美国有多起针对前置式洗衣机制造商的诉讼，指控其继续使用这种不完善的技术，因为这并未让消费者的生活变得更轻松。现在你可能会想，这到底是怎么回事！这一切都关乎维护！许多问题都是由制造缺陷引起的。这些前置式洗衣机容易滋生霉菌，而且有些人甚至报告了滚筒生锈等问题！业主方面的不当维护也会导致这些问题。请注意，粗暴或不当操作机器控制面板（按钮和旋钮）可能会损坏印刷电路板（`PCB`）。在印度，电涌和低电压是导致大多数用户遭遇`PCB`烧毁的最主要原因。更换`PCB`非常昂贵（在印度费用高达\
    \ 10,000 卢比！）。这维护成本实在太高了！关键在于，如果出现滚筒问题，购买一台新机器比维修现有机器更便宜！我想说的是，你必须在维护方面非常小心。\n\
    \n***图 1-2.** 从这篇评论中提取一些数据。*\n\n## 社交媒体帖子/博客\n\n社交媒体帖子和博客与评论一样，被广泛研究、提取和分析。推文和其他微博内容简短，因此看似易于提取。然而，根据用例的不同，推文可能包含大量噪音。根据我的经验，平均每\
    \ 100 条推文中只有 1 条包含关于某个感兴趣概念的有用信息。在使用 Twitter 数据分析品牌情感时尤其如此。在这篇关于情感分析的研究论文中，在针对特定主题收集推文后，发现只有\
    \ 20%的英文推文和 10%的土耳其文推文是有用的：\n\n[www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-Approach-to-the-Syrian-Refugee-Crisis.pdf](http://www.researchgate.net/profile/Serkan_Ayvaz/publication/320577176_Sentiment_Analysis_on_Twitter_A_Text_Mining_Approach_to_the_Syrian_Refugee_Crisis/links/5ec83c79299bf1c09ad59fb4/Sentiment-Analysis-on-Twitter-A-Text-Mining-Approach-to-the-Syrian-Refugee-Crisis.pdf)\n\
    \n因此，在推文语料库中寻找正确的推文是成功挖掘 Twitter 或 Facebook 帖子的关键。让我们以[`twitter.com/explore`](https://twitter.com/explore)为例：\n\
