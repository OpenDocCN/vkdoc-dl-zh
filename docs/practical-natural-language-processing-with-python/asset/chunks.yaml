    ![Image 75](index-212_1.png)\n\nChapter 5 NLP in Virtual Assistants\n\n**Figure\
    \ 5-14.**\n\n## Approach 2 - The Generating Responses Approach\n\nThe previous\
    \ approach is restrictive and custom-made for a business process. You need to\
    \ be able to classify intents and then match them to the next response. This is\
    \ very important for the success of the last approach. Let's assume a case in\
    \ which you are provided with a large corpus of conversations between a customer\
    \ and a customer service agent. Instead of creating a training sample to map the\
    \ intent and then to the response, you could directly use the conversation corpus\
    \ to train for question-answer pairs. A very popular architecture called encoder-decoder\
    \ is commonly used to train a conversational corpus.\n\n### Encoder-Decoder Architecture\n\
    \nAt the heart of the encoder-decoder architecture are LSTMs that take text sequence\
    \ data as input and provide sequence data as output. Fundamentally you are encoding\
    \ the sentences of the question using a set of LSTMs and another set of LSTMs\
    \ to decode the response. The architecture is shown in Figure [5-15](#index_split_003.html#p213).\n\
    \n![Image 76](index-213_1.jpg)\n\nChapter 5 NLP in Virtual Assistants\n\n**Figure\
    \ 5-15.** Encoder-decoder architecture\n\n*Source: Sequence to Sequence Learning\
    \ with Neural Networks, Ilya Sutskever and Oriol Vinyals and Quoc V. Le, 2014*\n\
    \nEach rectangle box represents a LSTM unit that takes in sequence-based input.\
    \ As the name implies, the architecture consists of two units: the encoder and\
    \ decoder.\n\n- **Encoder**: It takes in the input data of questions into the\
    \ LSTM units and outputs an encoder vector. The encoder vector consists of hidden\
    \ vectors and outputs cell states of dimensions equal to the hidden dimensions.\n\
    - **Decoder**: The decoder gets initialized with the initial encoder states. The\
    \ decoder input is first appended with Start- and End-of-sentence (EOS) tokens\
    \ at the beginning and the end, respectively. The architecture uses a technique\
    \ known as \"teacher forcing.\" During training, the actual values of the decoder\
    \ are fed into the LSTMs instead of the output from the last step. During inference,\
    \ the previous timestep output is used to get the output from the decoder. In\
    \ the architecture in Figure [5-15,](#index_split_003.html#p213) the decoder inputs\
    \ have shifted one."
