  trans: "\n# 第 3 章 在线评论中的自然语言处理\n\n产品中的每一项特征。有时评论者会大量描述他们的生活方式以及他们发现的产品使用场景。这可以提供关于产品市场契合度或产品价值主张等方面的洞察。这些信息日后可用于产品的品牌传播。我们还能发现某个品类中的机会或空白，从而通过“客户之声”来创造新产品，甚至开启新业务。\n\
    \n## 情感分析\n\n`情感`是从评论中提取的第一个也是最常见的属性。`情感`被定义为用户在给定语料库中表达的感受或情绪。这通常表现为正面或负面情感。但情感还有其他维度，比如愤怒、愉悦、沮丧等。另一个维度可以衡量文本语料库的客观性或主观性。图\
    \ 3-1 展示了一些示例。\n\n© Mathangi Sri 2021  \nM. Sri, *实用 Python 自然语言处理*, [`doi.org/10.1007/978-1-4842-6246-7_3`](https://doi.org/10.1007/978-1-4842-6246-7_3#DOI)\n\
    \n![图片 24](img/index-77_1.png)\n\n**图 3-1.** 情感\n\n## 情绪挖掘\n\n`情感分析`是分析更深层情感感受的简化版本。情绪在心理学领域已有深入研究。在某些产品评论挖掘用例中，我们可以超越情感分析，进入更深层的情绪挖掘。一个著名的情绪理论模型是普拉奇克的情绪之轮（图\
    \ 3-2）。情绪之轮的核心包含八种基本情绪：喜悦、悲伤、愤怒、恐惧、信任、厌恶、惊讶和期待。当向外轮移动时，强度减弱；向核心移动时，强度增强。轮中的白色区域是两种情绪的组合。即使你不打算挖掘整个情绪之轮，挖掘这八种基本情绪也能揭示大量关于用户偏好的信息。如需进一步阅读，请访问“面向计算文学研究的情感与情绪分析综述”，网址为\
