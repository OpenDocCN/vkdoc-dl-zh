- fmt: 'There is a proliferation of digital content in our lives. Online news articles,
    blogs, videos, social media, and online books are key types of content that we
    consume every day.


    On average, a consumer spends 8.8 hours consuming content digitally, per [https://cmo.adobe.com/articles/2019/2/5-consumer-trends-that-are-shaping-digital-content-consumption.html](https://cmo.adobe.com/articles/2019/2/5-consumer-trends-that-are-shaping-digital-content-consumption.html).
    The following are the key problems data scientists need to solve to use text mining:


    - Content clustering (grouping similar)

    - Content classification

    - Entity recognition

    - Analyzing user reviews on content

    - Content recommendation


    The other key data, like a user’s feedback on the content itself, is more structured:
    number of likes, shares, clicks, time spent, and so on. By combining the user
    preference data with the content data, we can understand a lot of information
    about the preference of the user, including lifestyle, life stage, hobbies, interests,
    and income level.


    ## IVR Utterance Data


    IVR is interactive voice response. IVR is the system that helps you navigate various
    menu options in a voice call. IVR is estimated to be a $5.5 BN market by 2023,
    per [www.marketsandmarkets.com/Market-Reports/interactive-voice-response-market-33851149.html](http://www.marketsandmarkets.com/Market-Reports/interactive-voice-response-market-33851149.html?gclid=Cj0KCQjwh8jrBRDQARIsAH7BsXfkISk9rnRcUPrjpBP6qC_a3-xBFCaNzEVz4FANz5y__ZXbN7yA9ZoaAkovEALw_wcB).
    Natural language-based IVR is an advanced system of IVR where a bot-like interface
    helps a customer find a solution to their issue or problem. An example of a transcript
    is shown in Figure [1-5](#index_split_000.html#p23).


    **IVR BOT**: Hi welcome to XYZ bank. How can I help you?. You can say things like
    what is my balance, my card did not go through.


    **User**: Hey there I am at a retail store and my card is not working.


    **IVR BOT**: For verification provide me your card number please.


    **User**: XXXXXXXX


    **IVR BOT**: Thanks for the verification. Due to long inactivity your card has
    been deactivated. Can I go ahead and activate your card.


    **User**: Yes, please.


    **IVR BOT**: Your card is active now. You can go ahead with your transactons.


    **User**: Thanks. That’s cool.


    ***Figure 1-5.** Example IVR transcript*


    IVR utterances are typically short. The user knows they are talking to a bot,
    so they tend to keep the sentences short. Since the utterances are really to the
    point, we do not get to know other attributes or preferences of the user other
    than the problem they are facing. It is a much more structured text than the other
    examples you have seen so far.


    ## Useful Information from Data


    Having described in detail the different types of data and their applications,
    Figure [1-6](#index_split_000.html#p24) shows a chart that plots the useful information
    value of each data source and the ease of extracting the data. The useful information
    value is the value that can be extracted about a user from the data that is useful
    to an organization. The ease of extracting data is about dealing with the nature
    of the text corpus itself.


    ***Figure 1-6.** User information value vs. ease of extraction*'
