  trans: "\n# 第 2 章：客户服务中的自然语言处理\n\n`failure`（故障）、关于高额账单的`complaints`（投诉）、`return`（退货）查询等。理解语料库中意图最简单快捷的方法是通过词云。然而，意图通常更为深层，为了获得可操作的洞察，你需要为每次聊天或语音交互映射一个准确的类别。在实践中，意图通常通过规则或监督算法来挖掘。让我们详细看看每个过程。我们将研究一个包含航空业客户所提问题的数据集。\n\
