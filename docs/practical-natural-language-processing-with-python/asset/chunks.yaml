    - **使用语义倾向性确定极性**：另一种方法是利用网络或任何其他外部来源来确定当前词语的极性。例如，您可以查看单词“delight”与单词“good”共同出现的页面点击量。您还可以查看单词“delight”与单词“bad”共同出现的页面点击量。通过比较结果，您可以判断单词“delight”应具有正面还是负面极性。以下方法来自论文《赞还是踩？：语义倾向性在无监督评论分类中的应用》（[`dl.acm.org/doi/10.3115/1073083.1073153`](https://dl.acm.org/doi/10.3115/1073083.1073153)）。已知的正面词（例如“good”）与给定词典之间的相似度是基于点互信息以及杰卡德指数来衡量的。公式如图
