    Chapter 2 NLp iN CuStoMer ServiCe


    **Acoustic Model**


    The first step is to get the data from the audio files along with the corresponding
    labels.


    There are a lot of open source datasets to get this step started. Once you have
    the files, you convert the .wav file into numbers using digital signal processing
    techniques. Some standard practices are to convert them using the MFCC or Spectrogram
    approach.


    **Language Model**


    After you do this, you have an array of numbers and corresponding labels. You
    can


    then train a neural network model to classify a given set of arrays to the words
    it could possibly contain. In the case of scoring a new audio file, the file is
    first segmented into smaller audio chunks and then each of the chunks is recognized
    as a word using the


    speech recognition model. Once you have the set of words recognized, converting
    them


    to a meaningful and most probable sentence or a phrase is the job of a language
    model.


    There are cases where the acoustic model is trained on detecting a letter of a
    word. The language model gets the most probable word.


    The language model is based on the probability of words occurring together. There


    can be a pure frequency-based approach or there can be a recurrent neural network-


    based sequence to sequence the model used to correct the sentences coming out
    of the


    acoustic model. Listin[gs 2-39 and 2-40](#index_split_001.html#p72) show an example
    of building a language model using bigrams and probability distribution. They
    use a few lines from Wikipedia on


    natural language processing.


