    \ ('my', 22),\n ('luggage', 20),\n```\n\n***代码清单 2-3.***\n\n```\nimport nltk\n\
    from nltk.probability import FreqDist\n\ndef remove_stop_words(words,st):\n  \
    \  new_list = []\n    st = set(st)\n    for i in words:\n        if(i not in st):\n\
