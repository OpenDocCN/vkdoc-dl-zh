  trans: "\n# 第 2 章\n\n## 客户服务中的自然语言处理\n\n客户服务是一个价值数十亿美元的行业。据估计，糟糕的客户体验在全球范围内造成的损失高达一万亿美元（https://blog.hubspot.com/service/customer-service-stats）。客户服务最早可追溯到\
    \ 20 世纪 60 年代以呼叫中心形式出现的雏形。随着客户服务需求的增长，如今客户支持已成为任何消费类组织的重要组成部分。客户可以通过网络、应用程序、语音、`IVR`或电话等多种方式联系组织。在本章中，我们将探讨`NLP`在通过聊天和电话提供人工辅助客户服务时所解决的核心问题。\n\
    \n让我们通过各个服务渠道收集的文本数据，来看看客户服务行业的数据结构。\n\n### 语音通话\n\n客户致电联络中心，由公司的客户支持代理解答客户疑问。通话结束时，代理会记录通话性质、已创建的任何工单以及解决方案。代理还可能填写一些与通话相关的表格。表\
    \ 2-1 展示了示例数据。\n\n© Mathangi Sri 2021  \nM. Sri, *基于 Python 的实用自然语言处理*, https://doi.org/10.1007/978-1-4842-6246-7_2\n\
    \n***表 2-1.** 通话数据示例*\n\n| **通话 ID** | **通话开始时间** | **通话结束时间** | **代理通话备注** |\
    \ **是否转接** | **代理姓名** | **客户调查评分** | **客户调查评论** |\n| --- | --- | --- | --- | ---\
    \ | --- | --- | --- |\n| 424798 | 2019/11/12 1:09:38 | 2019/11/12 1:18:38 | 客户询问账单过高问题，已解释。\
    \ | 否 | Sam | | 客户表示满意 |\n| 450237 | 2019/11/26 8:58:58 | 2019/11/26 9:13:58 |\
    \ 费用减免，已升级处理。 | 否 | Kiran | | |\n| 794029 | 2019/4/26 8:23:52 | 2019/4/26 8:34:52\
    \ | 已发送付款链接 | 否 | Karthik | 3 | 通话中断.. 代理有帮助 |\n| 249311 | 2019/12/8 10:50:14\
    \ | 2019/12/8 11:02:14 | 已转接至主管 | 是 | Megha | | |\n\n我们分析代理的通话备注和客户调查评论。然后，这些数据会与其他结构化数据结合，以得出关于通话的洞察。\n\
    \n### 聊天\n\n客户可以在电子商务网页或移动应用程序上与客户支持进行聊天。上一章中您看到了一个聊天记录的示例。与通话类似，代理在交互结束时需要填写“代理处置表”。与语音通话相比，聊天中的代理处置表稍长一些。代理可以同时处理多项任务，因此需要填写聊天的详细信息，这样我们就能获得带有时间戳的逐行文本数据。表\
    \ 2-2 展示了此类数据的一个小示例。\n\n***表 2-2.** 聊天数据示例*\n\n| **发言者** | **行文本** | **时间戳** |\n\
    | --- | --- | --- |\n| 系统 | 感谢您选择最佳电信公司。客服代表将很快与您联系。 | 5:44:44 |\n| 系统 | 您现在正在与\
    \ Max 聊天。 | 5:44:57 |\n| 客户 | 你好 Max | 5:45:03 |\n| 代理 | 感谢您联系最佳电信公司。我叫 Max。 |\
    \ 5:45:14 |\n| 代理 | 您好，我看到我正在与 Sara 女士聊天，您提供了 XXXXXXX 作为您账户关联的号码。请问是否正确？ | 5:45:26\
    \ |\n| 客户 | 是的，正确。我刚收到一封邮件，说我的服务价格要涨到每月 70 美元，但在你们网站上，却只有 30 美元。这是怎么回事？ | 5:45:39\
    \ |\n\n这些数据通常与以下其他数据一起分析：\n\n- 聊天的元数据，例如平均处理时长、转接给其他代理的聊天、发生聊天的网页\n- 代理的元数据，例如代理的任职年限和过往绩效记录\n\
    - 代理处置数据（由代理填写），例如用户聊天原因、是否已解决、已创建的工单等\n- 用户数据，例如用户偏好、用户行为历史记录、用户联系历史记录等\n"
