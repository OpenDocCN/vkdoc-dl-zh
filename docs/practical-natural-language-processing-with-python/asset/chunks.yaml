    ## Approach 2: Rules-Based Approach


    The next method is to improve the performance of the lexicon-based approach by
    adding rules. Rules are based on language patterns and the structure of the data.
    In order to identify the rules, you first investigate the errors by comparing
    the predicted sentiment and the actual tags. See Listing 3-9.


