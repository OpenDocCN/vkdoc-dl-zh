  trans: "\n# 图 2-7 中的数据是语料库中所有文档生成的词元输出结果。现在请参阅代码清单 2-15、代码清单 2-16 以及图 2-8。\n\n![图\
    \ 14](img/index-46_1.png)\n\n## 第 2 章 客户服务中的自然语言处理\n\n### 代码清单 2-15\n\n```\n###获取唯一词列表\n\
    \nlist_all = []\n\nfor i in df[\"token_words\"]:\n\nlist_all = list_all + i\n\n\
    list_words = list(set(list_all))\n\nlist_words[0:5]\n\n['check', 'do', '20th',\
    \ 'hello', 'monday']\n\n###初始化数组：行数=数据框长度，列数=唯一词数量\n\narr1 = np.zeros([len(df),len(list_words)])\n\
    \n###遍历数据框，将句子中出现的词标记为 1\n\nfor i,row in df.iterrows():\n\ntoken_words = row[\"\
    token_words\"]\n\nfor j in token_words:\n\nif (j in list_words):\n\nk = list_words.index(j)\n\
    \narr1[i][k] = 1\n\n###验证结果是否正确\n\nget_non_zero = np.where(arr1[0]==1)\n\nlist_index\
    \ = list(get_non_zero[0])\n\n[list_words[i] for i in list_index]\n\n['can', 'when',\
    \ 'web', 'i']\n```\n\n### 图 2-8 词项-文档矩阵\n\n## 第 2 章 客户服务中的自然语言处理\n\n### 代码清单 2-16\n\
    \n```\ndf_mat = pd.DataFrame(arr1)\n\ndf_mat.columns = list_words\n\ndf_mat.head()\n\
    ```\n\n图 2-8 是你创建的矩阵的快速可视化结果。这被称为**词项-文档**矩阵。请注意，我们用 0 或 1 填充单元格，分别表示某个词在句子中出现或不出现。你也可以将单元格标记为词在句子中的频率。此外，在上述示例中，请注意你为包含\
    \ 398 个文档的语料库生成了 232 个特征。因此，你会在上述矩阵中看到大量零值。使矩阵稠密化并使其适用于机器学习模型的一种方法是直接删除那些对句子不添加任何意义的词。\n\
    \n在之前的练习中，你了解了停用词（and、not、the、a）。从特征列表中删除这些词将减小矩阵的规模。\n\n另一种降低冗余特征重要性的方法是对语料库中高频词的值进行反向加权。因此，在填充单元格的值时，你需要“惩罚”那些出现在所有文档中的词。你可以通过**TF-IDF**公式在数学上实现这一点。TF-IDF\
    \ 计算词频和逆文档频率。对于给定词，该统计量表示它相对于语料库中其他词的重要性。出现在较少文档中的词将具有较高的 TF-IDF 分数，而出现在所有文档中的词将具有较低的\
    \ TF-IDF 分数。\n\n1.  `TF`（词频）在此公式中表示一个词（词元或特征）在文档中出现的次数，除以文档中的总词数。\n\n    `TF(t)\
    \ = (词项 t 在文档中出现的次数) / (文档中的总词项数)`\n\n2.  `IDF`（逆文档频率）表示给定词在语料库中出现的文档数量。\n\n \
    \   `IDF(t) = log_e(文档总数 / 包含词项 t 的文档数)`\n\n3.  最终值通过将`TF`和`IDF`相乘得到。\n\n## 第\
    \ 2 章 客户服务中的自然语言处理\n\n假设有一个包含 1000 个文档的语料库。假设词“this”和“language”在语料库中的出现频率分别为 500\
    \ 和 50。也就是说，词“this”出现在 500 个文档中，词“language”出现在 50 个文档中。“this”的`IDF`为`log(1000/500)`，即\
    \ 0.3010299957；“language”的`IDF`为`log(1000/50)`，即 1.301029996。\n\n考虑表 2-5 中的两个文档，并计算其中词“this”和“language”的\
    \ TF-IDF 值。\n\n### 表 2-5 计算 TF-IDF\n\n| 句子 | TF-this | TF-language | IDF-this\
    \ | IDF-language | TF-IDF this | TF-IDF language |\n|----------|---------|-------------|----------|--------------|-------------|-----------------|\n\
    | this is a great piece written. this will be remembered | 0.2 | | 0.301 | 1.301\
    \ | 0.060 | 0.000 |\n| language models are very popular | | 0.2 | 0.301 | 1.301\
    \ | 0.000 | 0.260 |\n\n现在回到你的用例，你将计算每个特征的 TF-IDF 值。\n"
