    # 第 3 章：在线评论中的自然语言处理


    ## 观察 3


    否定词是某个词语的否定形式。它可以是肯定或否定的。"不喜欢"就是一个否定实例。由于你的词典只包含单个词语，如果不处理否定词，你可能会给句子打上错误的情感极性标签。与增强词方法类似，你需要识别一组否定词，并与肯定和否定集合进行交叉引用，以检查句子中是否存在否定情况。如果存在否定情况，你需要从该极性中减去分数。假设你有五个肯定命中词和两个否定命中词。你将减去
    5 和 3 的分数。


    你也可以给否定词赋予比肯定命中词更高的权重。参见表 3-3。


    **表 3-3.**


    | 摘要 | 完整文本 | 肯定集合 | 否定集合 |

    |---------|----------|---------|---------|

    | 不仅仅是 | 不仅仅是胡椒味，我真的很兴奋能尝到 | {兴奋, 好} | {差} |

    | | 胡椒味的混合胡椒粒，但由于其中混入了多香果，这真的破坏了我所有菜肴的味道，你能尝到胡椒味，但也能尝到一种土腥味的辛辣刺激。我甚至尝试挑出胡椒粒并去除多香果，但为时已晚，味道已经混进去了
    <耸肩> 太可惜了 | | |

    | 并非无味 | 并非广告所说的无味，当我开始购买这些时.... | {欣赏, 免费, 改善, 气味, 疯狂, 满意} | {不幸, 霸凌, 气味} |


    ## 观察 4


    感叹号是另一个重要的标记，通过它你可以理解用户的情绪。感叹号本身并不传达正面或负面情绪。它们只是强化了潜在的情绪。例如"难吃！"和"美味！"后面都跟着感叹号，但一个代表负面体验，另一个代表正面体验。参见表
    3-4。


    **表 3-4.** *感叹号*


    | 摘要 | 完整文本 | 肯定集合 | 否定集合 |

    |---------|----------|---------|---------|

    | 唯一坚果薄片 | 唯一不含乳制品的坚果薄片口味！我最喜欢的口味，因为它也不含乳制品，虽然味道不那么浓郁，但搭配鹰嘴豆泥非常美味！这是我最喜欢的无麸质零食
    | {免费, 最喜欢, 美味} | { } |

    | 太爱了！！！！！！ | 太爱了！！！！！！自从我被诊断出乳糜泻以来，它就成了... | {爱, 享受, 感谢} | { } |


    ## 总体得分


    你需要计算四个总体得分：`完整文本`的肯定命中数、`完整文本`的否定命中数、`摘要`的肯定命中数、`摘要`的否定命中数。然后按照图 3-5 所述，将它们组合起来得到最终分数。


    ```

    肯定得分 = 肯定命中数 + 增强肯定命中数 + 感叹号肯定命中数 - 2 * 否定（肯定）命中数

    否定得分 = 否定命中数 + 增强否定命中数 + 感叹号否定命中数 - 2 * 否定（否定）命中数

    ```


    **图 3-5.** *得分公式*


    你对`完整文本`和`摘要`都应用图 3-5 中的公式，然后使用图 3-6 中的公式得到肯定和否定得分。


    ```

    肯定得分 = 完整文本的肯定得分 + 1.5 * 摘要的肯定得分

    否定得分 = 完整文本的否定得分 + 1.5 * 摘要的否定得分

    ```


    **图 3-6.** *肯定和否定得分公式*


    现在你比较所有四个得分，并根据图 3-7 中的流程图得到最终标签。


    ```

    开始

    获取肯定和否定得分

    肯定 > 0 或 否定 > 0

    是

    否定 > 肯定

    是 -> 标签为否定

    否

    肯定 > 否定

    是 -> 标签为肯定

    否

    否

    包含 "!"

    是 -> 标签为肯定

    否

    标签为中性

    ```


    **图 3-7.** *最终标签流程图*

