    - **用户属性**：这些是用户特征，如用户会员等级、年龄、平均消费、生命周期价值等。这些属性通常以结构化数据的形式存在于某些数据库中。如果不可用，可以从当前交互或用户历史交互中提取。建议记录这些变量，因为它们有助于更好地理解问题。例如，如果发现新客户的
    NPS 较低，则说明存在重大问题，可能会影响组织的增长。要从交互数据中提取某些属性，可以采用基于规则的方法。


    - **交易属性**：这些是定义意图背后具体交易的特征。例如，如果是预订查询，则包括出发地、目的地、预算和人数。如果是取消，则可能包括路线、支付方式或取消费用。这些属性会严重影响解决率，从而影响
    NPS。


    - **交互属性**：这些是当前交互的特征，例如客户消息数、客服消息数、聊天处理时间（聊天结束时间减去开始时间）、客户平均响应时间、客服平均响应时间（客服总响应时间除以响应次数）、聊天的整体情感、提供的解决方案数量、问题是否解决以及升级（如有，例如升级到主管或其他部门）。

    '
- fmt: '### Agent Attributes


    **Agent attributes:** These are the characteristics of the support agent who handles
    the interaction, such as if they are courteous and polite in the conversation
    and if they are knowledgeable about the product. There are a couple of ways to
    extract these attributes: by a quality specialist who can rate these interactions
    in different dimensions, or by extracting from text. Since it''s not scalable
    to rate these interactions by a quality specialist, a text mining approach is
    the best way to solve this problem.


    Let''s see some examples from Customer Thermometer ([www.customerthermometer.com/customer-service/excellent-customer-service-phrases/](http://www.customerthermometer.com/customer-service/excellent-customer-service-phrases/)):


    1. I am sorry to hear that you feel this way [Mr. X/Ms. X].

    2. Your feedback is enormously valuable to us, so we greatly appreciate you taking
    the time to call [Mr. X/Ms. X].

    3. I''d like to call you back to give you an update. When would be the best time
    to reach you?

    4. I completely understand how you feel [Mr. X/Ms. X].

    5. I fully appreciate the inconvenience this has caused you [Mr. X/Ms. X].

    6. Thank you for your understanding [Mr. X/Ms. X]. We are doing everything we
    can to resolve your problem quickly.


    The above sentences express courtesy, as opposed to sentences like "We won''t
    be able to do anything here," "Sorry it can''t be helped," and "This is how we
    work."


    Commonly, variables that define the service quality are used to explain customer
    support agent behavior. (For more information, see the article titled "Applying
    The Technology Acceptance And Service Quality Models To Live Customer Support
    Chat For E-Commerce Websites" at [www.researchgate.net/publication/289170615_Applying_The_Technology_Acceptance_And_Service_Quality_Models_To_Live_Customer_Support_Chat_For_E-Commerce_Websites](http://www.researchgate.net/publication/289170615_Applying_The_Technology_Acceptance_And_Service_Quality_Models_To_Live_Customer_Support_Chat_For_E-Commerce_Websites).
    Also see Table [2-8](#index_split_000.html#p65).)


    ### Chapter 2: NLP in Customer Service


    **Table 2-8.** Dimensions and Customer Support


    | Dimension | How it applies to customer support |

    | --- | --- |

    | Reliability | Customer support agents being reliable with responses |

    | Responsiveness | How fast questions get answered |

    | Assurance | Can they assure if the issues will be answered |

    | Empathy | Can they show empathy towards a customer''s concerns |

    | Tangibles | Widgets used, the look and feel of the chat window itself |


    The paper titled "A human capital predictive model for agent performance in contact
    centres" ([www.researchgate.net/publication/262612058_A_human_capital_predictive_model_for_agent_performance_in_contact_centres](http://www.researchgate.net/publication/262612058_A_human_capital_predictive_model_for_agent_performance_in_contact_centres))
    also describes the different dimensions to measure agent performance. Added to
    the above list could be agent''s knowledge/competence, their motivation to solve
    the problem, and so on.


    You can take a rules-based approach to solve these problems or use online lexicons
    for mining some of the behavior attributes. As an example, see "Empathy Statements
    for Customer Service Representatives" ([www.customerservicemanager.com/empathy-statements-for-customer-service-representatives/](http://www.customerservicemanager.com/empathy-statements-for-customer-service-representatives/)).'
