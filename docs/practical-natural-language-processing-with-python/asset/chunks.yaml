    \ 5**\n\n**NLP in Virtual Assistants**\n\nVirtual assistants are intelligent systems\
    \ that respond to user queries. They can also hold conversations with users. We\
    \ can trace the origin of virtual assistants to the 1950s when the Turing test\
    \ was used to distinguish human conversations from machine\n\nconversations. NLP\
    \ has undergone remarkable changes since then, especially in the last decade or\
    \ so. Natural Language generation techniques where in a machine synthesis\n\n\
    responses are prevalent in many organizations today. The chapters so far in this\
    \ book\n\nhave been dealing with NLU, or natural language understanding. You saw\
    \ various ways\n\nof extracting intents, sentiments, etc. In NLG, machine learning\
    \ algorithms are used to generate sentences. You will explore an example of natural\
    \ language generation for a\n\nbot in this chapter.\n\n**Types of Bots**\n\nBots\
    \ are classified into two main categories: general purpose and goal-oriented.\
    \ General purpose bots are meant for fun or non-specific goals. Siri is a general\
    \ purpose bot. You can ask simple questions like “How are you?” and “What’s the\
    \ weather?” and you can\n\nwatch the bot give fun-filled answers. Here, the users\
    \ do not have a goal in mind except to strike up a conversation. An example from\
    \ the Curie bot which is a general purpose\n\nbot ([https://intentico.ai/) is\
    \ sho](https://intentico.ai/)wn in Figure [5-1](#index_split_002.html#p195).\n\
    \n© Mathangi Sri 2021\n\nM. Sri, *Practical Natural Language Processing with Python*,\
    \ [https://doi.org/10.1007/978-1-4842-6246-7_5](https://doi.org/10.1007/978-1-4842-6246-7_5#DOI)\n\
    \n![Image 62](index-195_1.jpg)\n\nCHapter 5 NLp IN VIrtuaL aSSIStaNtS\n\n***Figure\
    \ 5-1.** Talking to Curie*\n\nGoal-oriented bots tackle very specific questions\
    \ and are expected to provide very\n\nprecise answers like checking flight status\
    \ or getting options for hotel booking. An\n\nexample is given in Table [5-1](#index_split_002.html#p195).\n\
    \n***Table 5-1.** A Goal-Oriented Bot*\n\n**Bot**\n\nHow can I help you?\n\n**Customer**\n\
    \nWant to book a table for 2\n\n**Bot**\n\nSure. Which location are you looking\
    \ at?\n\n**Customer**\n\nI stay in east of avenue street and hence looking for\
    \ places close by\n\n( *continued*)\n\nCHapter 5 NLp IN VIrtuaL aSSIStaNtS\n\n\
    ***Table 5-1.*** ( *continued*)\n\n**Bot**\n\nWhich cuisine would you prefer?\n\
    \n**Customer**\n\nFine Dine Indian restaurant\n\n**Bot**\n\nGreat to know that.\
    \ I can book table for two at punjabi Frill at 8pM this evening.\n\n**Customer**\n\
    \nperfect\n\n**Bot**\n\nHave a great day. It’s a pleasure to serve you.\n\nThe\
    \ answers by the bot have to be precise and should solve the customer’s problem.\n\
    \nAny deviation from this behavior by the bot would lead to a very bad user experience.\n\
    \nWe would be seeing in this chapter, 2 methods to train bots. One is a very classic\n\
    \napproach and is more customized for business use cases and the other one is\
    \ more\n\nfocused on generating a conversational corpus. At the end of this chapter,\
    \ you will use Bidirectional Encoder Representations from Transformers (BERT)\
    \ language models\n\nfrom Google for the classic approach. A list of packages\
    \ used is provided in Ta[ble 5-6 at](#index_split_003.html#p251)\n\nthe end of\
    \ the chapter.\n\n**The Classic Approach**\n\nConsider an organization that is\
    \ already running chat- or voice-based customer service.\n\n(We generally use\
    \ this scenario as a starting point.) We divide this corpus into intents.\n\n\
    For each intent, we identify the workflow that needs to be followed by the bot:\
    \ the next set of questions, integration with the IT systems, or any other steps\
    \ to handle the intent well. You will see an example herewith.\n\nI have created\
    \ a sample dataset of questions that people commonly ask customer\n\nservice at\
    \ a credit card company. The intent here identifies which workflow the bot\n\n\
    should follow. For demo purposes, I have come up with the next question following\n\
    \nthe intent. You will build a simple classifier using long short-term memory\
    \ architecture (LSTM) followed by a regular neural network. Before you delve into\
    \ LSTM, let’s have a\n\nquick look at the data. See Listing [5-1](#index_split_002.html#p197)\
    \ and Figur[e 5-2.](#index_split_002.html#p197)\n\n![Image 63](index-197_1.png)\n\
    \nCHapter 5 NLp IN VIrtuaL aSSIStaNtS\n\n***Listing 5-1.*** The Data\n\nimport\
    \ pandas as pd\n\nt1 = pd.read_csv(\"bank4.csv\",encoding = 'latin1')\n\nt1.head()\n\
    \n***Figure 5-2.** The data*\n\nThe Final intent column is the intent of the user.\
    \ Each intent has a distinct\n\nworkflow. In this example, you will show the next\
    \ question following an intent. See\n\nListin[g 5-2 and F](#index_split_002.html#p197)igure\
    \ [5-3](#index_split_002.html#p198).\n\n***Listing 5-2.***\n\nt1[\"Final intent\"\
    ].value_counts()\n\n![Image 64](index-198_1.png)\n\n![Image 65](index-198_2.jpg)\n\
    \nCHapter 5 NLp IN VIrtuaL aSSIStaNtS\n\n***Figure 5-3.***\n\nThe idea is that\
    \ once the user’s intent is recognized, the bot will ask the next set of guiding\
    \ questions to resolve the user query. A sample of a workflow for a “reset PIN”\
    \ is given in Figur[e 5-4.](#index_split_002.html#p198)\n\n***Figure 5-4.** Workflow\
    \ of classic approach*\n\nFor each of the intents, you have the next response\
    \ to represent the beginning of the\n\nworkflow to illustrate the concept. See\
    \ Listing [5-3](#index_split_002.html#p198) and Figur[e 5-5.](#index_split_002.html#p199)\n\
    \n***Listing 5-3.***\n\nfp_qns = pd.read_csv('follow_up_qns_v1.csv')\n\nfp_qns.head()\n\
    \n![Image 66](index-199_1.png)\n\nCHapter 5 NLp IN VIrtuaL aSSIStaNtS\n\n***Figure\
    \ 5-5.***\n\nYou will now do some regex preprocessing followed by a train and\
    \ test split. You do\n\nthe following set of operations using regex:\n\n1\\. Replacing\
    \ special characters like \\r and \\n with a space\n\n2\\. Replacing weblinks\
    \ with a word that indicates that they are\n\nURLs. Whenever you replace entities\
    \ such as these, you add _pp.\n\nHence weblinks get replaced with a token named\
