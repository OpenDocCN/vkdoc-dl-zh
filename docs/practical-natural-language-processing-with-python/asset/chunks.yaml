- fmt: "# Chapter 4 NLP in Banking, Financial Services, and Insurance (BFSI)\n\nYou\
    \ will be using a dataset from Kaggle ([www.kaggle.com/sunnysai12345/news-summary](http://www.kaggle.com/sunnysai12345/news-summary))\
    \ for this exercise. The news articles in this dataset have been scraped from\
    \ various newspapers. The summary for the news articles have been scraped from\
    \ a mobile app company InShorts. Your objective here is to identify mentions of\
    \ company names and the sentiment associated with the mentions. See Listing 4-1\
    \ and Figure 4-1. Please note that all packages used in this chapter are listed\
    \ in Table 4-6.\n\n© Mathangi Sri 2021  \nM. Sri, *Practical Natural Language\
    \ Processing with Python*, [https://doi.org/10.1007/978-1-4842-6246-7_4](https://doi.org/10.1007/978-1-4842-6246-7_4#DOI)\n\
    \n![Image 43](index-132_1.png)\n\n***Listing 4-1.*** Importing the Sample Dataset\n\
    \n```\nimport pandas as pd\nimport nltk\n\nt1 = pd.read_csv(\"news_summary.csv\"\
    , encoding=\"latin1\")\nt1.head()\n```\n\n***Figure 4-1.*** Sample dataset from\
    \ Kaggle\n\nThe columns that are of importance here are `headlines`, `text` (this\
    \ is the summary), and `ctext` (the full text). You will try to extract organizations\
    \ from any of these three columns. In order to do so, you will concatenate all\
    \ the columns into a single column. See Listing 4-2.\n\n***Listing 4-2.*** Concatenating\
    \ Columns\n\n```\nt1[\"imp_col\"] = t1[\"headlines\"] + \" \" + t1[\"text\"] +\
    \ \" \" + t1[\"ctext\"]\n```\n\nYou want to extract the named entities of the\
    \ given text. Recall from the last chapter that named entities are any person,\
    \ place, organization, etc. mentioned in a text corpus. In your case, you are\
    \ interested in extracting organization names from the text corpus.\n\n## Method\
    \ 1: Using Existing Libraries\n\nYou can use existing libraries to extract named\
    \ entities. Listing 4-3 is an example of using the NLTK library for extracting\
    \ named entities.\n\n***Listing 4-3.*** The NLTK Library\n\n### Example of NER\n\
    \n```\nsent = \"I work at Apple and before I used to work at Walmart\"\ntkn =\
    \ nltk.word_tokenize(sent)\nne_tree = nltk.ne_chunk(nltk.pos_tag(tkn))\nprint(ne_tree)\n\
    ```\n\n```\n(S\n  I/PRP\n  work/VBP\n  at/IN\n  (ORGANIZATION Apple/NNP)\n  and/CC\n\
    \  before/IN\n  I/PRP\n  used/VBD\n  to/TO\n  work/VB\n  at/IN\n  (ORGANIZATION\
    \ Walmart/NNP))\n```\n\nYou can apply the library to a sample of sentences and\
    \ check if it is efficient and able to capture all of the names. The returned\
    \ Named Entity tree is parsed by the function `get_chunk`. You retrieve all words\
    \ that are labelled as \"organization.\" See Listings 4-4 and 4-5.\n\n***Listing\
    \ 4-4.***\n\n```\nsamp_sents = t1.loc[0:10, \"imp_col\"]\n\ndef get_chunk(ne_tree):\n\
    \    org_list = []\n    for chunk in ne_tree:\n        if hasattr(chunk, 'label'):\n\
    \            str1 = chunk.label()\n            if(str1.find(\"ORG\") >= 0):\n\
