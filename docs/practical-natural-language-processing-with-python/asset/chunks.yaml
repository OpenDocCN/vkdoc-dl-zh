- fmt: "Each of the nodes is a one hot vector and this is a large output to predict\
    \ if the vocabulary sizes are large. In order to circumvent the problem, a technique\
    \ called negative sampling is used. Instead of looking at the problem as a multi-class\
    \ classifier, the input word and the context words are treated as inputs and the\
    \ output is whether the word combination is probable or not. This converts the\
    \ problem to a binary classifier. Along with probable sets of words together,\
    \ improbable sets are chosen from the corpus and they are labelled as the negative\
    \ set (the co-occurring words as the positive set). The negative set is chosen\
    \ from a separate probability distribution. Details can be found at [https://papers.nips.cc/paper/5021-distributed-representations-of-words-and-phrases-and-their-compositionality.pdf](https://papers.nips.cc/paper/5021-distributed-representations-of-words-and-phrases-and-their-compositionality.pdf).\n\
    \nYou will use your initial corpus of the news dataset `t1` and train a `word2vec`\
    \ using the `gensim` library. Before you apply the `gensim` library to your corpus,\
    \ you need to preprocess the documents. You will remove stop words from the corpus\
    \ and “stem” the words. Stemming is a process of bringing words back to their\
    \ root forms and hence similar words can be normalized. You will need to install\
    \ the `gensim` package using `pip install`. See Listings [4-15 and 4-16.](#index_split_002.html#p147)\n\
    \n**Listing 4-15.** Installing `gensim`\n\n```\n!pip install gensim\n```\n\n**Listing\
    \ 4-16.** Using `gensim`\n\n```\nfrom gensim.parsing.porter import PorterStemmer\n\
    p = PorterStemmer()\np.stem_documents([\"He was dining\", \"We dined yesterday\"\
    ])\n['he wa dine', 'we dine yesterdai']\n```\n\nThe words *dining* and *dine*\
    \ got replaced with the same word, *dine*, in the Listing [4-16](#index_split_002.html#p147)\
    \ example. This can help normalize words to their roots. You will continue with\
    \ your preprocessing steps. You first remove stop words with the `pandas` string\
    \ replace method and the `stop_words` library. This is followed by stemming the\
    \ words. Before you proceed, you must first install the `stop_words` library using\
    \ `pip install`. See Listings [4-17 and 4-18.](#index_split_002.html#p147)\n\n\
    **Listing 4-17.** Installing `stop_words`\n\n```\n!pip install stop_words\n```\n\
    \n**Listing 4-18.**\n\n```\nimport stop_words\neng_words = stop_words.get_stop_words('en')\n\
    for i in eng_words:\n    if(len(i)>1):\n        wrd_repl = r\"\\b\" + i + r\"\\\
    b\"\n        t1[\"h1_stop\"] = t1[\"h1_stop\"].str.replace(wrd_repl,\"\")\nt1[\"\
    h2_stop\"] = pd.Series(p.stem_documents(t1[\"h1_stop\"]))\n```\n\n`Word2Vec` in\
    \ `gensim` takes list of list words as input. You convert the headlines column\
    \ into a list of lists. It’s better to use `ctext` as it contains a huge corpus\
