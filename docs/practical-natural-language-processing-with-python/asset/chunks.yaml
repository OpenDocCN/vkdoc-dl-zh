    ## Top CSAT Drivers


    Customer satisfaction is a survey that users answer at the end of a customer service
    interaction, generally on a scale of 1 to 5. Plotting CSAT responses by topics
    mined gives an idea of which intents customers are satisfied or dissatisfied with.
    In the airline dataset example, you classify customers as satisfied if they give
    a rating of 4 and 5. A score of 1 to 3 means the customers are considered to be
    dissatisfied. You classify the `csat_fnl` score based on this logic. You first
    cross-tab the intent and satisfaction class (satisfied, dissatisfied). See Listing
    2-33 and Figure 2-15.


    **Listing 2-33.**


    ```

    df["sat"] = 1

    df.loc[df.csat_fnl <= 3, "sat"] = 0


    ct = pd.crosstab(df["class"], df["sat"], normalize=''index'')

    ct = ct.reset_index()

    ct_cols = ct.columns

    ct_cols1 = [ct_cols[0], "dissat", "sat"]

    ct.columns = ct_cols1

    ct["label"] = ct["class"]

    ct

    ```


    ![Image 20](index-60_1.png)


