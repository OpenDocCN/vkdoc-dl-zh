  \n第 5 章 虚拟助手中的 NLP\n\n**图 5-14.**\n\n## 方法 2 - 生成响应方法\n\n前一种方法具有局限性，且是为特定业务流程定制的。你需要能够对意图进行分类，然后将它们与下一个响应进行匹配。这对于前一种方法的成功至关重要。假设你拥有一个包含客户与客服人员之间大量对话语料库的案例。与其创建训练样本来映射意图再到响应，不如直接使用对话语料库来训练问答对。一种非常流行的架构称为编码器-解码器，通常用于训练对话语料库。\n\
  \n### 编码器-解码器架构\n\n编码器-解码器架构的核心是 LSTM，它接收文本序列数据作为输入，并提供序列数据作为输出。从根本上说，你使用一组 LSTM\
  \ 对问题的句子进行编码，并使用另一组 LSTM 来解码响应。该架构如图 5-15 所示。\n\n![Image 76](img/index-213_1.jpg)\n\
  \n第 5 章 虚拟助手中的 NLP\n\n**图 5-15.** 编码器-解码器架构\n\n*来源：Sequence to Sequence Learning\
  \ with Neural Networks, Ilya Sutskever and Oriol Vinyals and Quoc V. Le, 2014*\n\
  \n每个矩形框代表一个接收基于序列输入的 LSTM 单元。顾名思义，该架构由两个单元组成：编码器和解码器。\n\n- **编码器**：它将问题的输入数据输入到\
  \ LSTM 单元，并输出一个编码器向量。编码器向量由隐藏向量和输出单元状态组成，其维度等于隐藏维度。\n- **解码器**：解码器使用初始编码器状态进行初始化。解码器输入首先在开头和结尾分别附加句子起始（Start-of-sentence）和句子结束（End-of-sentence，EOS）标记。该架构使用一种称为“教师强制”的技术。在训练期间，解码器的实际值被输入到\
  \ LSTM 中，而不是上一步的输出。在推理期间，使用上一个时间步的输出从解码器获取输出。在图 5-15 的架构中，解码器输入已偏移了一位。\n\n\n\n"
