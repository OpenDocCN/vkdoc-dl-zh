  \ > 0) & (j.vector_norm > 0)):\n            print(i, j, i.has_vector, j.has_vector,\
  \ i.similarity(j))\n```\n\n输出：\n```\nlearn learn True True 1.0\nlearn read True\
  \ True 0.47037032349231994\nlearn understand True True 0.7617364524642122\nlearn\
