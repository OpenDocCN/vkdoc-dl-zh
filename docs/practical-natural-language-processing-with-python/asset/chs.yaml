  run run True True 1.0\n```\n\n如你所见，*learn* 和 *understand* 之间的相似性远强于 *run* 和 *understand*\
  \ 之间的相似性。\n\n## Word2Vec\n\n`Word2Vec` 是一种创建词嵌入的技术。在这里，你将窗口大小内的词作为“自变量”来预测目标词。对于句子“I\
  \ like to read about technology”，其输入和输出数据如表 4-3 所示。\n\n***表 4-3.***\n\n| 输入 | 输出\
  \ |\n|-------|--------|\n| i | Like |\n| Like | i |\n| Like | to |\n| to | Like\
  \ |\n| to | i |\n| read | to |\n| read | about |\n| about | read |\n| about | technology\
  \ |\n| technology | about |\n\n训练一个浅层的单层 softmax 模型，隐藏层的权重矩阵提供了词的维度。关于如何训练 `word2vec`\
  \ 的详细解释，请参见 [www.analyticsvidhya.com/blog/2017/06/word-embeddings-count-word2veec/](http://www.analyticsvidhya.com/blog/2017/06/word-embeddings-count-word2veec/)。`word2vec`\
  \ 的架构如图 4-4 和图 4-5 所示。\n\n### CBOW\n\n在 CBOW 中，句子中的每个词都成为目标词。输入词是窗口大小内围绕它的词。下面的示例窗口大小为\
  \ 2。CBOW 的架构如图 4-4 所示。\n\n![Image 44](img/index-145_1.png)\n\n***图 4-4.***\n\n`w(t-1)`\
  \ 和 `w(t+1)` 是独热编码向量。每个向量的大小等于词汇表的大小。输出向量也是如此，其长度与词汇表相同。用绿色编码的中心层（隐藏层）包含权重矩阵。你可以对每个输入向量对应的权重矩阵进行平均或求和。\n\
  \n构建 `word2vec` 的另一种方法是将 CBOW 方法颠倒过来，得到跳字模型。在这里，你假设句子中的一个词应该能够预测其周围的词。表 4-4 提供了一个窗口大小为\
  \ 2 的输入和输出表示示例。\n\n***表 4-4.***\n\n| 输入 | 输出词 _t-2 | 输出词 _t-1 | 输出词 _t+1 | 输出词 _t+2\
  \ |\n|-------|-----------------|-----------------|-----------------|-----------------|\n\
  | i | like | to | | |\n| like | i | to | read | |\n| to | i | like | read | about\
  \ |\n| read | like | to | about | technology |\n| about | to | read | technology\
  \ | |\n| technology | about | read | | |\n\n![Image 45](img/index-146_1.jpg)\n\n\
  相应的网络架构如图 4-5 所示。\n\n***图 4-5.***\n\n在这种情况下，隐藏层或词向量的维度是 3。因此，你输入句子中的一个词，并训练模型来预测句子周围的词。在图\
  \ 4-5 中，\n\n\n\n每个节点都是一个独热向量，当词汇量很大时，预测这个输出会非常庞大。为了解决这个问题，采用了一种称为负采样的技术。该方法不再将问题视为多类分类器，而是将输入词和上下文词作为输入，输出则是判断该词组合是否可能成立。这便将问题转化为了一个二分类器。除了可能的词组合外，还会从语料库中选取不可能的词组合，并将其标记为负样本集（共现词作为正样本集）。负样本集是从一个独立的概率分布中选取的。详细信息可参见\
  \ [`papers.nips.cc/paper/5021-distributed-representations-of-words-and-phrases-and-their-compositionality.pdf`](https://papers.nips.cc/paper/5021-distributed-representations-of-words-and-phrases-and-their-compositionality.pdf)。\n\
  \n你将使用新闻数据集的初始语料库 `t1`，并利用 `gensim` 库训练一个 `word2vec` 模型。在将 `gensim` 库应用于语料库之前，你需要对文档进行预处理。你需要从语料库中移除停用词，并对单词进行“词干提取”。词干提取是将单词还原为其词根形式的过程，从而可以将相似的单词归一化。你需要使用\
  \ `pip install` 安装 `gensim` 包。参见清单 4-15 和 4-16。\n\n**清单 4-15.** 安装 `gensim`\n\n\
