  \ 合并列\n\n```\nt1[\"imp_col\"] = t1[\"headlines\"] + \" \" + t1[\"text\"] + \" \"\
  \ + t1[\"ctext\"]\n```\n\n你需要提取给定文本中的命名实体。回顾上一章，命名实体是指文本语料中提及的任何人物、地点、组织等。在本例中，你感兴趣的是从文本语料中提取组织名称。\n\
  \n## 方法一：使用现有库\n\n你可以使用现有库来提取命名实体。代码清单 4-3 展示了使用 NLTK 库提取命名实体的示例。\n\n***代码清单 4-3.***\
  \ NLTK 库\n\n### 命名实体识别示例\n\n```\nsent = \"I work at Apple and before I used to work\
  \ at Walmart\"\ntkn = nltk.word_tokenize(sent)\nne_tree = nltk.ne_chunk(nltk.pos_tag(tkn))\n\
  print(ne_tree)\n```\n\n```\n(S\n  I/PRP\n  work/VBP\n  at/IN\n  (ORGANIZATION Apple/NNP)\n\
  \  and/CC\n  before/IN\n  I/PRP\n  used/VBD\n  to/TO\n  work/VB\n  at/IN\n  (ORGANIZATION\
  \ Walmart/NNP))\n```\n\n你可以将该库应用于一个句子样本，检查其效率以及是否能捕获所有名称。返回的命名实体树由函数 `get_chunk`\
  \ 解析。你需要检索所有标记为“organization”的词语。请参见代码清单 4-4 和 4-5。\n\n***代码清单 4-4.***\n\n```\n\
  samp_sents = t1.loc[0:10, \"imp_col\"]\n\ndef get_chunk(ne_tree):\n    org_list\
  \ = []\n    for chunk in ne_tree:\n        if hasattr(chunk, 'label'):\n       \
  \     str1 = chunk.label()\n            if(str1.find(\"ORG\") >= 0):\n         \
  \       str2 = ' '.join(c[0] for c in chunk)\n                org_list.append(str2)\n\
  \    return org_list\n```\n\n***代码清单 4-5.***\n\n```\norg_list_all = []\nfor i in\
  \ samp_sents:\n    tkn = nltk.word_tokenize(i)\n    ne_tree = nltk.ne_chunk(nltk.pos_tag(tkn))\n\
  \    org_list = get_chunk(ne_tree)\n    org_list_all.append(org_list)\n\norg_list_all\n\
  ```\n\n让我们检查 `org_list_all`，看看组织名称是否被捕获。代码清单 4-6 展示了一个示例。\n\n***代码清单 4-6.***\n\n\
  ```\n[['Diu',\n  'Administration of Union',\n  'Daman',\n  'Daman',\n  'UT',\n \
