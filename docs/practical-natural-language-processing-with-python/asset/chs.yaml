- "# 第 2 章 客户服务中的自然语言处理\n\n产品可能存在多种变体。例如，冰箱可以被称为 fridge，也可以用品牌名如三星、型号名如 687L 来指代，有时还会用品牌加容量的方式如三星\
  \ 200L。鉴于市场上产品种类繁多且引用方式多样，为零售或电商提取产品信息非常复杂。你将在第 3 章详细了解这一点。对于电信或银行、金融服务与保险等其他领域，产品变体不多，因此可以通过简单的查找来处理。图\
  \ 2-18 展示了一个图表，你可以根据转化率和数量进行分析并获得洞察。它显示了转化率最高的产品。\n\n**图 2-18.** 热门产品及转化率\n\n##\
  \ 未购买原因\n\n你还可以挖掘聊天记录中客户对购买产品提出的异议。通常，一个针对异议训练的良好分类器可以很好地完成这项工作。在这里，定位问题所在行是关键。并非聊天中的每一行都包含客户的异议。有时，客服人员也会被提示向客户提出引导性问题，以让他们陈述异议。未购买的原因也会作为最终客服处理结果的一部分被收集。客户通常不购买的主要原因包括价格、产品不兼容、安装问题、退货政策、运费、竞争对手提供更优惠的交易，以及在做出购买决定前想咨询他人。这些高层次原因在不同公司之间是相似的，因此你可以为不同组织使用相同的预测模型（甚至启发式规则）。\n\
  \n## 调查评论分析\n\n在聊天结束时收集调查问卷，以了解客户体验。这个数据集在试图理解客户对客服或产品的看法，甚至未购买原因方面非常丰富。会应用一组启发式规则或监督模型来挖掘调查评论。这个语料库也是用户情绪或情感的良好指标。聊天对话通常趋于中性，而调查评论可以清晰地表明客户的情感。你将在下一章详细探讨情感挖掘。\n\
  \n## 挖掘语音转录文本\n\n到目前为止，你已经详细探讨了客户服务中的文本挖掘。然而，大部分数据仍然以通话录音的形式在呼叫中心产生。一旦你将语音转换为文本，就可以应用你的文本技术。你将使用来自\
  \ `https://pypi.org/project/SpeechRecognition/` 的语音识别包，并利用 Google API 将语音转换为文本。你可以使用清单\
  \ 2-35 中的代码通过 `pip install` 安装该包。\n\n**清单 2-35.** 安装包\n\n```\n!pip install SpeechRecognition\n\
  ```\n\n你以 `.wav` 文件作为输入，并使用 Google API 来获取转录的句子。参见清单 2-36。\n\n**清单 2-36.** 转录句子\n\
  \n```\nimport speech_recognition as sr\n\nr = sr.Recognizer()\n\ndef speech_to_text(af,\
  \ show_all):\n    #playsound(af)\n    with sr.AudioFile(af) as source:\n       \
  \ #读取音频文件。这里我们使用 record 而不是\n        #listen\n        audio = r.record(source)\n\
  \        abc = r.recognize_google(audio, show_all=show_all)\n        return abc\n\
