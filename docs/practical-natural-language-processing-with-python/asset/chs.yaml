- '# 第 3 章 在线评论中的自然语言处理


  ### 情感分析库


  也有一些标准库可用于进行情感分析。它们提供开箱即用的情感分析，因此必须适当使用。如果它适合手头的问题，那么你就有了一个快速且稳健的解决方案。你也可以将其与他们使用的算法/方法结合使用，或作为独立解决方案使用。`Vader`（情感感知词典和情感推理器）是一个进行情感分析并提供带有权重的词极性的`Python`库。原始研究论文题为“Vader:
  A parsimonious rule-based model for sentiment analysis of social media text”，可在[`www.aaai.org/ocs/index.php/ICWSM/ICWSM14/paper/viewPaper/8109`](https://www.aaai.org/ocs/index.php/ICWSM/ICWSM14/paper/viewPaper/8109)找到。从根本上说，`Vader`从成熟的词典以及社交媒体语料库中获取了一组词汇。每个词都由一组人员按照群体智慧的方法提供极性分数，以得出最终的词典及其权重。清单
  3-27 展示了如何使用`pip install`安装`Vader`库。




