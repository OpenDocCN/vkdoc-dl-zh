  \ 6.1474023 2.4041312 1.5213318]`\n\n代码清单 4-12 中的输出是单词 *This* 的向量表示。`Spacy` 训练了一个\
  \ `word2vec` 模型，为每个词生成了 300 维的向量。词之间的相似性就是各自词向量维度之间的相似性。现在，我们以单词 *learn*、*read*\
  \ 和 *understand* 为例。为了对比相似性，我们还将引入单词 *run* 的上下文向量。你将使用另一个 `Spacy` 模型 `en_core_web_md`\
  \ 进行实验。首先，下载该模型，然后在脚本中使用它。参见代码清单 4-13 和 4-14。\n\n***代码清单 4-13.** 下载 Spacy*\n\n```\n\
  !python -m spacy download en_core_web_md\n```\n\n***代码清单 4-14.** 使用 Spacy*\n\n```\n\
  import spacy\n\nnlp = spacy.load(\"en_core_web_md\")\n\ndoc1 = nlp(u'learn')\ndoc2\
  \ = nlp(u'read')\ndoc3 = nlp(u'understand')\ndoc4 = nlp(u'run')\n\nfor i in [doc1,\
