  ```\n\n### 步骤 8.6：如果余弦相似度大于 0.6，则视为匹配\n\n由于你有一个稀疏矩阵，你将其转换为坐标格式（coo）。Coo 格式将数据存储在三个数组中：一个用于行，一个用于列，一个用于数据。参见清单\
