  \ 系数。当命中次数低于某个阈值时，将该分数视为无效。这是因为很大一部分命中次数可能纯属偶然。由于这是网络搜索，我们将阈值设定在数百万级别。此方法基于论文《使用网络搜索引擎测量词语间的语义相似度》，论文地址为\
  \ [`www2007.org/papers/paper632.pdf`](http://www2007.org/papers/paper632.pdf)。\n\
