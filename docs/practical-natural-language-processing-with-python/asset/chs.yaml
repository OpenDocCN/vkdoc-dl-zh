  \n- **大小写**：大写单词表示强烈的情感，类似于感叹号。有时大写单词本身就是情感词，或者它们可能紧邻情感词，例如“EXTREMELY happy”或“EXTREMELY\
  \ angry with the product”。您需要相应地识别大写单词并调整分数。\n\n![图片 28](img/index-98_1.png)\n\n\
  ![图片 29](img/index-98_2.png)\n\n- **情感词典**：您可以尝试使用不同的情感词典。还有一些词典为不同的情感词提供了权重。论文《基于词典的极端观点搜索方法》（[`journals.plos.org/plosone/article?id=10.1371/journal.pone.0197816`](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0197816)）描述了一种从现有在线评分中生成词典的方法。其思路是利用给定评论中带有评分的词语作为词典来源，然后对所有评论中的这些评分进行归一化处理，从而得到一个带有权重标度的词典。该词典随后可用于任何分类目的。\n\
  \n- **使用语义倾向性确定极性**：另一种方法是利用网络或任何其他外部来源来确定当前词语的极性。例如，您可以查看单词“delight”与单词“good”共同出现的页面点击量。您还可以查看单词“delight”与单词“bad”共同出现的页面点击量。通过比较结果，您可以判断单词“delight”应具有正面还是负面极性。以下方法来自论文《赞还是踩？：语义倾向性在无监督评论分类中的应用》（[`dl.acm.org/doi/10.3115/1073083.1073153`](https://dl.acm.org/doi/10.3115/1073083.1073153)）。已知的正面词（例如“good”）与给定词典之间的相似度是基于点互信息以及杰卡德指数来衡量的。公式如图\
  \ 3-9 和图 3-10 所示。\n\n**图 3-9.**\n\n**图 3-10.**\n\n这里 `P(Word1)` 或 `P(Word2)` 指的是该词在网络搜索引擎中的点击量。`P(Word1\
  \ & Word2)` 指的是在同一查询中，单词 1 和单词 2 共同出现的点击量。代码清单 3-21 和 3-22 演示了针对几个词语的方法。您可以通过网络搜索结果，获取给定词语与\n\
