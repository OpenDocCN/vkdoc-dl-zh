  \ 'IGIMS',\n  'Marital',\n  'Indira Gandhi Institute',\n  'Medical Sciences',\n\
  \  'IGIMS',\n  'All India Institute',\n  'Medical Sciences',\n  'HT Photo']]\n```\n\
  \n如你所见，NLTK 在从新闻语料中检索组织名称方面表现尚可。\n\n## 方法二：提取名词短语\n\n另一种检索组织名称的方法是从语料中提取名词短语。\n\n\
  \n\n组织或任何其他“命名实体”都是名词或名词短语。你会看到比上一个示例中多得多的名称，因为并非所有名词都是组织名称。你将在练习中使用一个名为 `Spacy`\
  \ 的库。[`spacy.io/`](https://spacy.io/) 是一个开源的自然语言工具包。`Spacy` 可以帮助完成许多自然语言处理功能，包括词性标注和命名实体识别。你将深入探究\
