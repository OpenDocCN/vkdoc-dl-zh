  是 -> 标签为肯定

  否

  否

  包含 "!"

  是 -> 标签为肯定

  否

  标签为中性

  ```


  **图 3-7.** *最终标签流程图*




  根据流程图，你首先检查正面或负面分数是否大于零。如果是，则进一步检查 `positive` 是否更大，还是 `negative` 更大。据此，你将最终标签标记为
  `positive` 或 `negative`。如果不是这种情况，则检查强度指示符，在你的场景中就是感叹号。感叹号的存在是一个强度指标，你知道它应该是 `positive`
  或 `negative`。


  我已将这些情况标记为 `positive`（根据准确率和手头的数据集，它们也可能被判定为 `negative`）。其余情况则标记为 `neutral`。在没有
