  `Z1 = S11*V1 + ... + S14*V4`


  这里的 `Z1` 是一个长度为 64 的向量。同理，对于所有词，你都会得到一个长度为 64 的向量。我解释的是单头注意力的情况。在多头的场景下，你需要为每个词嵌入初始化多组
  `Q`、`K`、`V` 矩阵（通过初始化多组 `W_Q`、`W_K`、`W_V`）。图 5-23 给出了一个快速示意。


  ***图 5-23.** 多头注意力*


  你会得到多个 `Z` 输出（假设有四个注意力头），然后在每个头上得到一个 `4*64` 的矩阵。所有这些矩阵会相互拼接，行数为 4（句子和词汇表只有 4 个词），列数为
  `Q`、`K`、`V` 向量的维度，即 64 乘以头的数量（本例中为 4）。这个矩阵进一步与一个权重矩阵相乘，以生成该层的输出。在本例中，Transformer
  的输出维度为词数乘以 64。


