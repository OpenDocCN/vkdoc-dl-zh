- '# 第 1 章 数据类型


  另外，请注意数据的呈现方式：这是客户的自由文本。但聊天客服在引导对话方面起着关键作用。开头几行讨论了问题，然后客服提出了解决方案，在聊天接近尾声时，给出了最终答复，同时客户也表达了他们的情绪（在此案例中是积极的）。


  同样的互动也可能发生在语音通话中，由客服代表和用户互动来解决客户遇到的问题。语音通话和聊天数据几乎在所有特征上都相同，唯一的区别在于，语音通话的原始数据是音频文件，需要先转录为文本，然后再通过文本挖掘进行分析。在客户通话结束时，客服代表会记下通话摘要。这些被称为“客服通话记录”的笔记也会被挖掘出来，用于分析语音通话。


  ## 短信数据


  短信是触达全球 35%人口的最佳方式。作为沟通渠道，短信拥有最高的打开率（打开短信的人数与收到短信的人数之比）：是电子邮件打开率的 5 倍（https://blog.rebrandly.com/12-sms-text-message-marketing-statistics）。美国人平均每天收到
  33 条短信（www.textrequest.com/blog/how-many-texts-people-send-per-day/）。许多应用程序公司会访问客户的短信并挖掘数据以改善用户体验。例如，像`ReadItToMe`这样的应用可以在用户开车时朗读他们收到的任何短信。`Truecaller`会读取短信并将其分类为垃圾短信和非垃圾短信。`Walnut`则根据用户收到的短信提供其消费视图。仅通过分析交易类短信数据，就可以提取出大量用户信息：用户的收入、支出、支出类型、网购偏好等。如果我们只分析商业短信，数据源会更加结构化。见图
  1-4。


  ![图 6](img/index-21_1.jpg)


  **图 1-4.** Walnut (https://capitalfloat.com/walnut/) 应用的截图


  商业短信遵循模板，结构更清晰。以下面的短信为例。这类数据集中的噪音要少得多。清晰的信息以清晰的风格呈现。尽管不同的信用卡公司可能呈现不同的信息风格，但与自由文本的客户消息相比，提取信息仍然更容易。


