  \n## 方法 3：训练你自己的模型\n\n方法 1 和方法 2 基于使用预训练模型的库。另一种方法是训练你自己的模型来检测命名实体。命名实体模型背后的概念是，可以根据单词周围的单词以及单词本身来预测该单词的实体类型。我以\n\
