  \ 优化后的词云\n\n如`Figure 2-3, y`所示，你得到了一个移除了搭配词的词云，并且可以看到问候词的重要性也降低了。上述两种方法可以估算出主要主题。然而，它们无法确定给定句子的主题。它们也无法像手动标记过程那样提供主题的频率分布。\n\
  \n## 分类主题的规则\n\n挖掘主题的另一种方法是编写规则并对句子进行分类。这是一种常用的方法，在无法训练机器学习模型时采用。规则的形式为：*如果一个句子包含`word1`和`word2`，那么它可能属于某个主题*。\n\
  \n\n\n## 文本排版\n\n规则可以有不同类型，例如 `And`、`Not`、`And with three words` 等。这些规则集通过“或”条件连接。像\
  \ QDA Miner、Clarabridge 和 SPSS 这类工具可用于编写和执行强大的规则。规则还可以包含句子的语法结构，如名词、副词等。在代码清单 2-7、代码清单\
  \ 2-8 和图 2-4 中，你将使用 Python 编写自己的文本挖掘规则引擎。\n\n规则文件包含两组规则。一组用于判断单个单词是否存在。如果存在，则该句子被分配到该类别。例如，如果单词“baggage”存在，则句子被分配到该类别。另一类规则是两个单词通过一个窗口间隔的“与”规则。根据一般实践，发现单个单词或两个单词的匹配可以覆盖广泛的主题。例如，规则“`check`\
  \ 和 `in` 间隔（窗口）少于两个单词”可以捕获像“check me in”这样的句子。规则文件中“window”列的值为 -1 表示窗口不适用。另请注意，任何规则命中都足以将句子映射到类别。从这个角度来看，所有规则彼此之间都是“或”的关系。\n\
  \n### 代码清单 2-7. 文本挖掘规则\n\n```python\nimport pandas as pd\nimport re\nfrom sklearn.metrics\
  \ import accuracy_score\n\ndf = pd.read_csv(\"airline_dataset.csv\", encoding='latin1')\n\
  rules = pd.read_csv(\"rules_airline.csv\")\n\ndef rule_eval(sent, word1, word2,\
  \ class1, type1, window):\n    class_fnl = \"\"\n    if (type1 == \"single\"):\n\
  \        if (sent.find(word1) >= 0):\n            class_fnl = class1\n        else:\n\
  \            class_fnl = \"\"\n    elif (type1 == \"double\"):\n        if ((sent.find(word1)\
  \ >= 0) & (sent.find(word2) >= 0)):\n            if (window == -1):\n          \
  \      class_fnl = class1\n            else:\n                find_text = word1\
  \ + \".*\" + word2\n                list1 = re.findall(find_text, sent)\n      \
  \          for i in list1:\n                    window_size = i.count(' ') - 1\n\
  \                    if (window_size <= window):\n                        class_fnl\
  \ = class1\n                        break\n                else:\n             \
  \       class_fnl = \"\"\n    return class_fnl\n```\n\n### 代码清单 2-8.\n\n```python\n\
  rules.head()\n```\n\n### 图 2-4. 文本挖掘规则输出\n\n函数 `rule_eval` 接收句子和规则参数，并评估是否存在命中。如果存在命中，它会为句子分配相应的类别。对于“double”类型的规则，会使用形式为\
  \ `word1.* word2` 的正则表达式。这是为了计算两个匹配单词之间的单词数量。如果该数量低于指定的窗口值，则视为命中。请参见代码清单 2-9 和图\
  \ 2-5。\n\n### 代码清单 2-9.\n\n```python\ndf[\"line\"] = df[\"line\"].str.lower().str.lstrip().str.rstrip()\n\
  topics_list = []\nfor i, row in df.iterrows():\n    sent = row[\"line\"]\n    for\
  \ j, row1 in rules.iterrows():\n        word1 = row1[\"word\"]\n        word2 =\
  \ row1[\"word2\"]\n        class1 = row1[\"class\"]\n        type1 = row1[\"type\"\
  ]\n        window = row1[\"window\"]\n        class1 = rule_eval(sent, word1, word2,\
  \ class1, type1, window)\n        if (class1 != \"\"):\n            break\n    topics_list.append(class1)\n\
  df[\"topics\"] = topics_list\ndf.loc[df.topics == \"\", \"topics\"] = \"other\"\n\
  df.head()\n```\n\n### 图 2-5. 分配主题\n\n一旦将规则分配的主题添加到数据集中，你就可以比较手动标记的类别和从规则中提取的类别。现在，你将通过比较手动标签（`class`）和规则分配的主题（`topics`）来衡量此练习的准确性。你通过使用\
  \ `scikit-learn` 中的 `accuracy` 方法来实现这一点。请参见代码清单 2-10。\n\n### 代码清单 2-10. Scikit Learn\
  \ 中的准确率方法\n\n```python\naccuracy_score(df[\"class\"], df[\"topics\"], normalize=True,\
  \ sample_weight=None)\n```\n\n```\n0.7814070351758794\n```\n\n你通过一些快速规则获得了 78% 的准确率。然而，这个数字需要使用其他指标（如\
  \ F 分数、混淆矩阵等）进行基准测试。\n\n\n\n## 排版后的文本\n\n将在下一节中详细讨论。为了进一步提高准确性，你需要打印出错误并修改规则。\n\n\
  ## 使用机器学习的监督学习\n\n规则方法的一个问题是它非常繁琐，而且你可能过度拟合当前数据，以至于无法知道新数据集的准确性。随着类别数量的增加，规则会变得更加复杂。你可以使用机器学习模型来学习模式，并用新模型对新数据集进行评分。机器学习从历史数据中学习数据中的模式。在你的案例中，你拥有手动标记的数据。还记得你之前为了改进模型而遵循的流程吗？你打印出与手动标签相比的错误，然后分析错误来源以修正规则。监督学习遵循类似的方法。它首先预测一个输出，然后根据与手动标记数据对比时发现的错误不断修正输出，直到错误最小化。你将在下文详细了解文本挖掘的监督过程。\n\
  \n## 获取手动标记数据\n\n在航空公司数据集中，手动标记的数据恰好是因变量类别。手动标记（也称为注释）是一项耗时的活动。然而，这一过程的成本效益被认为是值得的。有一些在线注释公司（如\
  \ Mechanical Turks）提供标记服务。有时，组织会建立一个带有质量控制流程的注释团队，以支持大规模注释。有多种工具可用于注释。例如 `GATE (https://gate.ac.uk/)`、`LightTag\
  \ (www.lighttag.io/)` 和 `TagTog (www.tagtog.net/)`。`GATE` 是一个开源文本挖掘工具，具有多种注释功能。图\
  \ 2-6 展示了 `GATE` 的一个屏幕示例。注释者会高亮文本中的特定部分，然后注释该高亮主题/词语的内容。\n\n![图片 13](img/index-42_1.jpg)\n\
  \n**图 2-6.** GATE 界面\n\n然而，Microsoft Excel 或任何基于 Excel 的工具（如 Google 表格）也可以帮助解决注释问题。本书中的大多数注释都是通过基于\
  \ Excel 的平台完成的，包括你正在探索的当前案例研究。一旦句子或词语被标记，就必须进行彻底的质量检查。手动标记的准确率应达到 90% 以上。当然，这可能会根据语料库而变化。作为质量检查的一部分，主管会检查注释者所做的标签。或者，可以通过让多个注释者标记语料库来提高标记准确率。为了在标记过程中获得正确的质量，数据科学家需要确保完成以下任务：\n\
  \n**明确定义本体**：本体是分类树。在你的案例中，它是主题列表。它们必须互斥且完全穷尽。这是实现高标记准确率，从而获得高机器学习模型准确率的重要步骤。\n\n\
  **提供示例**：数据科学家的职责还包括为每个类别提供示例。\n\n**类别间的冲突**：有时两个句子可能看起来属于不同的类别。在这种情况下，应明确定义冲突解决方案。考虑这个查询：“我在登录时遇到问题。我想支付账单。”如果有两个类别，即登录和支付，那么这个查询应该被标记为什么？\n\
  \n一旦你获得了标记数据，下一步就是构建一个能够学习底层数据模式的预测模型。给定一个新句子，它应该能够预测其主题。这组底层模式被称为预测模型。监督学习中的任何预测模型都有两个组成部分：因变量和自变量。在你的案例中，因变量是标签，自变量是句子。然而，机器学习模型不能接受词语作为输入。因此，词语/句子必须转换为数字。将词语转换为数字的第一步称为分词。\n\
  \n## 词语分词\n\n所以你有一组句子作为因变量。第一步是将它们转换为标记或分析单元。标记可以是词语、句子或字符。让我们为语料库获取标记。请参阅清单 2-11\
  \ 了解分词句子的方法。\n\n**清单 2-11.** 标记\n\n```\nfrom nltk.tokenize import word_tokenize\n\
  \nstr1 = \"What a great show!\"\nstr1.split()\n['What', 'a', 'great', 'show!']\n\
  \nfrom nltk.tokenize import word_tokenize\nword_tokenize(str1)\n['What', 'a', 'great',\
  \ 'show', '!']\n```\n\n如你所见，将句子分解为词语的最简单方法是使用 `split` 函数。然而，`split` 不能处理特殊字符，而来自\
  \ `NLTK` 的 `word_tokenize` 可以处理特殊字符。句子可以使用清单 2-12 中所示的 `sent_tokenize` 函数进行拆分。\n\
  \n**清单 2-12.** 拆分句子\n\n```\nsentences = \"I am feeling great! It was a great show\"\
  \nfrom nltk.tokenize import sent_tokenize\nsent_tokenize(sentences)\n['I am feeling\
  \ great!', 'It was a great show']\n```\n\n有时你可能还想按特定顺序分析词语。例如，“check in” 是一个整体，如果将其分析为\
  \ “check” 和 “in”，其价值就会丢失。为了在将句子转换为词语标记时尽可能保留含义，你还需要保留顺序。因此，你可以使用两个或三个词的标记，而不是单个词的标记。它们被称为二元组和三元组。请参阅清单\
  \ 2-13。\n\n**清单 2-13.** 二元组和三元组\n\n```\nimport nltk\ntext = \"I want to check in\
  \ asap\"\nbigram_list = list(nltk.bigrams(text.split()))\n[' '.join(i) for i in\
  \ bigram_list]\n['I want', 'want to', 'to check', 'check in', 'in asap']\n```\n\n\
  现在你了解了分词，让我们将其应用于你的语料库并将其拆分为词语。\n\n## 词项-文档矩阵\n\n现在让我们对你拥有的句子列表应用词语分词并获取输出。该输出将作为因变量输入到机器学习模型中。你的目标是将你这里的文本转换为数字。最简单的方法是使用“词袋”方法。在这里，你获取语料库中的词语或标记列表，并将它们视为数据挖掘问题中的特征。现在你得到一个大小为\
  \ `N*M` 的矩阵，其中 `N` 是文档数量（数据框的长度），`M` 是语料库中唯一标记的数量。开始时，单元格可以表示词语的存在或不存在。使用清单 2-14\
  \ 中的代码执行此操作，并在图 2-7 中查看结果。\n\n**清单 2-14.** 词袋方法\n\n```\ndef tokenize(sent1):\n \
  \   return word_tokenize(sent1)\n\ndf = pd.read_csv('airline_dataset.csv', low_memory=False,\
  \ encoding='latin1')\ndf[\"line\"] = df[\"line\"].str.lower().str.lstrip().str.rstrip()\n\
  \n### tokenize all rows\ndf[\"token_words\"] = df[\"line\"].apply(tokenize)\ndf.head()\n\
  ```\n\n| 索引 | 行内容 | 类别 | 分词结果 |\n|-------|------|-------|-------------|\n| 0 | when\
  \ can i web check-in? | check in | [when, can, i, web, check-in, ?] |\n| 1 | want\
  \ to check in | check in | [want, to, check, in] |\n| 2 | please check me in | check\
  \ in | [please, check, me, in] |\n| 3 | check in | check in | [check, in] |\n\n\
  **图 2-7.** 词袋输出\n\n\n\n## 图 2-7 中的数据是语料库中所有文档生成的词元输出结果。现在请参阅代码清单 2-15、代码清单 2-16\
  \ 以及图 2-8。\n\n![图 14](img/index-46_1.png)\n\n"
