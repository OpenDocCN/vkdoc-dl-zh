- '# 词


  ### Q 向量、K 向量、V 向量、Q·K


  ### Softmax、Softmax * 求和


  ### 值


  #### 思考过程


  | Q1 | K1 | V1 | Q1·K1/8 = S11 | S11*V1 |

  |---|---|---|---|---|

  | | K2 | V2 | Q1·K2/8 = S12 | S12*V2 |

  | | K3 | V3 | Q1·K3/8 = S13 | S13*V3 |

