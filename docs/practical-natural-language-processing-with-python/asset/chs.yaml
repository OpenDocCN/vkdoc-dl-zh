  ```\n\n将 `show_all` 设置为 `False`，Google API 会返回所有识别结果，并附带\n\n\n\n`confidence level`作为一个字典。如果你希望获取最可能的输出，这会很有用。现在请参阅清单\
  \ 2-38。\n\n***清单 2-38.***\n\n`speech_to_text(af1,True)`\n\n```\n{'alternative':\
  \ [{'transcript': 'I am calling for reversal of\nenquiry and my account number is\
