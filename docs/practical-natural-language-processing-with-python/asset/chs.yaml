  ![图片 3](img/index-9_1.jpg)


  **关于作者**


  **玛坦吉·斯里**是印度著名的数据科学领军人物。她在直观客户体验、室内定位和用户画像领域拥有 11 项已授权专利和 20 多项已公开专利。她在构建世界级数据科学解决方案和产品方面拥有超过
  16 年的可靠业绩。她精通机器学习、文本挖掘和 NLP 技术及工具。她曾在花旗银行、汇丰银行、通用电气等大型企业以及`247.ai`、PhonePe 和 Gojek
  等科技初创公司组建数据科学团队。她为初创公司、企业和风险投资公司提供数据科学战略和路线图方面的咨询。她是多所顶尖学府机器学习领域的活跃贡献者。




  '
- '# 关于技术审校者


  **马诺哈尔·斯瓦米纳坦**是一名数据科学实践者与资深程序员，在数据仓库、商业智能、分析工具开发、专项分析、预测建模、数据科学产品开发、咨询、战略制定及分析编程等数据科学相关领域拥有超过
  14 年的经验。他的职业生涯覆盖了美国抵押贷款银行、零售/电商、保险及工业物联网等不同领域的数据全生命周期。他还参与了使用 Python 和 R 的数据科学相关书籍的技术审校工作。他拥有物理学、数学和计算机专业的学士学位，以及项目管理硕士学位。目前居住在印度硅谷——班加罗尔。


