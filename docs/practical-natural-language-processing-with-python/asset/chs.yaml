  import matplotlib.pyplot as plt\n\nplt.bar(x_axis_lab, y_axis_lab)\nplt.ylabel('Counts')\n\
  plt.xlabel('Categories')\nplt.show()\n```\n\n![图片 19](img/index-59_1.png)\n\n**图\
  \ 2-14.** 绘制数值\n\n## 热门 CSAT 驱动因素\n\n客户满意度是用户在客服互动结束时回答的一项调查，通常采用 1 到 5 分的评分标准。通过挖掘出的主题来绘制\
  \ CSAT 响应，可以了解客户对哪些意图满意或不满意。在航空公司数据集的例子中，如果客户给出 4 分或 5 分，则将其归类为满意。1 到 3 分则意味着客户被认为不满意。你根据这个逻辑对\
  \ `csat_fnl` 分数进行分类。首先，你对意图和满意度类别（满意、不满意）进行交叉制表。参见清单 2-33 和图 2-15。\n\n**清单 2-33.**\n\
  \n```\ndf[\"sat\"] = 1\ndf.loc[df.csat_fnl <= 3, \"sat\"] = 0\n\nct = pd.crosstab(df[\"\
  class\"], df[\"sat\"], normalize='index')\nct = ct.reset_index()\nct_cols = ct.columns\n\
  ct_cols1 = [ct_cols[0], \"dissat\", \"sat\"]\nct.columns = ct_cols1\nct[\"label\"\
  ] = ct[\"class\"]\nct\n```\n\n![图片 20](img/index-60_1.png)\n\n**图 2-15.**\n\n现在你绘制一个包含满意和不满意情况的堆叠条形图。你将意图百分比分布作为次坐标轴。在\
  \ `matplotlib` 包中，你创建子图以显示两个 y 轴。首先，你使用 `bottom` 参数为满意/不满意创建堆叠条形图。`dissat` 变量堆叠在\
  \ `sat` 变量之上。参见清单 2-34。\n\n**清单 2-34.**\n\n```\nct_sat = ct[\"sat\"]\nct_dissat\
  \ = ct[\"dissat\"]\nind = ct[\"label\"]\n\nfig, ax = plt.subplots()\np1 = ax.bar(ind,\
  \ ct_sat)\np2 = ax.bar(ind, ct_dissat, bottom=ct_sat)\nax.set_xlabel('Categories')\n\
  ax.set_ylabel('Sat/Dissat percentage')\nax2 = ax.twinx()\n```\n\n\n\n## 使用次坐标轴绘制不同\
  \ Y 轴的图表\n\n`ax2.plot(ind, y_per_axis_lab, color=\"blue\", marker=\"o\")`\n\n`ax2.set_ylabel('意图百分比')`\n\
  \n`plt.show()`\n\n`ax.twinx()` 函数帮助你创建次 Y 轴。`ax2.plot` 函数中的变量 `y_per_axis_lab` 包含了意图的百分比分布，如图所示。最终图表如图\
  \ 2-16 所示。\n\n![Image 21](img/index-61_1.png)\n\n![Image 22](img/index-61_2.jpg)\n\
  \n**图 2-16.**\n\n类似的图表可以针对 CSAT、聊天整体处理时间、解决率等指标绘制，然后可以从中得出可操作的分析结论。\n\n## 主要 NPS\
  \ 驱动因素\n\n在继续本节之前，先简要说明 NPS。主要 NPS 驱动因素即净推荐值。在交互结束时，客户会被问到他们向朋友/亲戚推荐某个产品/服务的可能性，评分范围为\
  \ 1 到 10。评分为 8-10 的客户被视为推荐者，1-4 为贬损者，5-7 为中立者。NPS 的计算公式如下：\n\n上一节中的图表展示了用户问题或意图与\
  \ CSAT 的相关性。同样的分析也可以针对 NPS 进行。在某些情况下，你可能希望更深入地了解导致 CSAT 或 NPS 差异的因素。例如，NPS 可能是意图、解决方案、客服礼貌程度、产品属性、用户变量等的函数。表\
  \ 2-7 展示了一个 NPS 样本数据集。\n\n**表 2-7.** NPS 样本数据\n\n| 用户 ID | 意图 | AHT | 出发地 | 目的地\
  \ | 预算 | 家庭人数 | 客户类型 | 过去联系客服次数 | 是否解决 | 是否转接电话 | NPS 分数 |\n|---------|--------|-----|--------|-------------|--------|-------------|------------------|----------------------------------------|----------|------------------|-----------|\n\
  |         | 预订   |     | ATL    | FLL         | Na     | Na          | 金卡      \
  \       |                                        | 是       | 否               | s\
  \         |\n|         | 值机   |     | ATL    | LG          | Na     | Na       \
  \   | 新客户           |                                        | 是       | 否     \
  \          | s         |\n|         | 登录   |     | Na     | LAX         | Na   \
  \  | Na          | 新客户           |                                        | 是  \
  \     | 否               | s         |\n|         | 行李   |     | DEN    | Na    \
  \      | Na     | Na          | 银卡             |                               \
  \         | 是       | 否               | s         |\n|         | 登录   |     | Na\
  \     | Na          | Na     | Na          | 银卡             |                  \
  \                      | 否       | 是               | s         |\n\n这里的思路是理解 NPS\
  \ 的主要驱动因素。通过回归模型来识别 NPS 的主要驱动因素，从而得出按优先级排序的行动项。数学上可以表示为：\n\n`NPS = f(用户属性, 交易属性,\
  \ 交互属性, 客服属性)`\n\n下面我将详细讨论每个属性：\n\n- **用户属性**：这些是用户特征，如用户会员等级、年龄、平均消费、生命周期价值等。这些属性通常以结构化数据的形式存在于某些数据库中。如果不可用，可以从当前交互或用户历史交互中提取。建议记录这些变量，因为它们有助于更好地理解问题。例如，如果发现新客户的\
  \ NPS 较低，则说明存在重大问题，可能会影响组织的增长。要从交互数据中提取某些属性，可以采用基于规则的方法。\n\n- **交易属性**：这些是定义意图背后具体交易的特征。例如，如果是预订查询，则包括出发地、目的地、预算和人数。如果是取消，则可能包括路线、支付方式或取消费用。这些属性会严重影响解决率，从而影响\
  \ NPS。\n\n- **交互属性**：这些是当前交互的特征，例如客户消息数、客服消息数、聊天处理时间（聊天结束时间减去开始时间）、客户平均响应时间、客服平均响应时间（客服总响应时间除以响应次数）、聊天的整体情感、提供的解决方案数量、问题是否解决以及升级（如有，例如升级到主管或其他部门）。\n\
  \n\n\n### 客服人员属性\n\n**客服人员属性：** 这些是处理交互的客服人员的特征，例如他们在对话中是否礼貌得体，以及是否熟悉产品。提取这些属性有几种方法：由质检专员从不同维度对这些交互进行评分，或者通过文本提取。由于由质检专员评分的方式难以规模化，因此文本挖掘方法是解决此问题的最佳途径。\n\
  \n让我们看看来自 Customer Thermometer（[www.customerthermometer.com/customer-service/excellent-customer-service-phrases/](http://www.customerthermometer.com/customer-service/excellent-customer-service-phrases/)）的一些示例：\n\
  \n1.  很抱歉听到您有这种感受，[X 先生/X 女士]。\n2.  您的反馈对我们极其宝贵，我们非常感谢您抽出时间致电，[X 先生/X 女士]。\n3. \
  \ 我想给您回电告知最新进展。什么时间联系您最方便？\n4.  我完全理解您的感受，[X 先生/X 女士]。\n5.  我充分理解这给您带来的不便，[X 先生/X\
  \ 女士]。\n6.  感谢您的理解，[X 先生/X 女士]。我们正竭尽全力快速解决您的问题。\n\n以上句子表达了礼貌，而像“我们在这里什么也做不了”、“抱歉，这没办法”和“我们就是这么工作的”这类句子则不然。\n\
  \n通常，定义服务质量的变量被用来解释客服人员的行为。（更多信息，请参阅题为“Applying The Technology Acceptance And Service\
  \ Quality Models To Live Customer Support Chat For E-Commerce Websites”的文章，网址为 [www.researchgate.net/publication/289170615_Applying_The_Technology_Acceptance_And_Service_Quality_Models_To_Live_Customer_Support_Chat_For_E-Commerce_Websites](http://www.researchgate.net/publication/289170615_Applying_The_Technology_Acceptance_And_Service_Quality_Models_To_Live_Customer_Support_Chat_For_E-Commerce_Websites)。另请参见表\
  \ 2-8。）\n\n### 第 2 章：客户服务中的自然语言处理\n\n**表 2-8.** 维度与客户支持\n\n| 维度 | 如何应用于客户支持 |\n\
  | --- | --- |\n| 可靠性 | 客服人员回复的可靠性 |\n| 响应性 | 问题得到解答的速度 |\n| 保证性 | 他们能否保证问题得到解决 |\n\
  | 同理心 | 他们能否对客户的担忧表现出同理心 |\n| 有形性 | 所使用的界面组件、聊天窗口的外观和感觉 |\n\n题为“A human capital\
  \ predictive model for agent performance in contact centres”（[www.researchgate.net/publication/262612058_A_human_capital_predictive_model_for_agent_performance_in_contact_centres](http://www.researchgate.net/publication/262612058_A_human_capital_predictive_model_for_agent_performance_in_contact_centres)）的论文也描述了衡量客服人员绩效的不同维度。在上述列表之外，还可以加上客服人员的知识/能力、他们解决问题的积极性等。\n\
  \n你可以采用基于规则的方法来解决这些问题，或者使用在线词典来挖掘某些行为属性。例如，请参阅“Empathy Statements for Customer Service\
  \ Representatives”（[www.customerservicemanager.com/empathy-statements-for-customer-service-representatives/](http://www.customerservicemanager.com/empathy-statements-for-customer-service-representatives/)）。\n\
