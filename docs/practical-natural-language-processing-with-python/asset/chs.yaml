  ## 总体得分


  你需要计算四个总体得分：`完整文本`的肯定命中数、`完整文本`的否定命中数、`摘要`的肯定命中数、`摘要`的否定命中数。然后按照图 3-5 所述，将它们组合起来得到最终分数。


  ```

  肯定得分 = 肯定命中数 + 增强肯定命中数 + 感叹号肯定命中数 - 2 * 否定（肯定）命中数

  否定得分 = 否定命中数 + 增强否定命中数 + 感叹号否定命中数 - 2 * 否定（否定）命中数

  ```


  **图 3-5.** *得分公式*


  你对`完整文本`和`摘要`都应用图 3-5 中的公式，然后使用图 3-6 中的公式得到肯定和否定得分。


  ```

  肯定得分 = 完整文本的肯定得分 + 1.5 * 摘要的肯定得分

  否定得分 = 完整文本的否定得分 + 1.5 * 摘要的否定得分

  ```


