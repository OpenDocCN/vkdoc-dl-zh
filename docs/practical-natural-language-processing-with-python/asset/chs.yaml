  每个编码器都是一个 Transformer。输入的词被转换为词嵌入，并使用前面描述的注意力机制，输出 `词汇表大小 * 隐藏状态`（嵌入的数量）。然后将其传递给一个分类器。在预训练数据时，输入句子中有些词会被“掩码”，分类器通过训练来识别被掩码的词。BERT
  base 有 12 层（Transformer/编码器块）、12 个注意力头和 768 个隐藏单元，而 BERT large 有 24 层（Transformer/编码器块）、16
  个注意力头和 1024 个隐藏单元。


