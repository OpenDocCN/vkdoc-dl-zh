  \n## 将词嵌入应用于监督学习\n\n回到构建自定义 NER 分类器的起点，你需要一个稠密向量空间来表示表格中的单词，以便输入到算法中。在监督方法中使用词嵌入有两种方式。\n\
  \n### 方法 3 – 方法 1\n\n你可以使用由 Gensim 生成的每个词的嵌入向量，并将其用于监督模型（词嵌入方法 1）。为了在你的模型中使用这个 200\
  \ 维的向量，你可以将其作为 200 个特征列，或者对这个向量进行求和或聚合。\n\n\n\n取平均值。另一种方法是将单词的 tf-idf 向量值与向量值的总和或平均值相乘。\n\
  \n### 方法 3 – 方法 2\n\n由于你正在为监督学习问题（将给定单词分类为组织名称或非组织名称）生成嵌入，因此你可以更好地利用嵌入。你可以直接训练一个神经网络，并在训练过程中学习嵌入。你可以利用\
  \ `Keras` 在监督模型中作为一层来学习词嵌入（词嵌入方法 2）。`Keras` 是一个用 Python 编写的开源神经网络库（[`keras.io/`](https://keras.io/)）。图\
  \ 4-6 和 4-7 解释了在监督模型中使用嵌入的两种方法。\n\n![Image 46](img/index-154_1.png)\n\n![Image 47](img/index-154_2.png)\n\
  \n**图 4-6.** 词嵌入方法 1\n\n**图 4-7.** 使用词嵌入方法 2\n\n![Image 48](img/index-155_1.jpg)\n\
  \n如图 4-7 所述，对于使用方法 2 的词嵌入，为了训练一个用于命名实体识别的分类器，你需要查看一个包含词级标签的数据集。你将使用表 4-1 中的 Kaggle\
  \ 数据集。训练完模型后，你将把该模型应用于你的新闻语料数据集。\n\n`Keras` 的“嵌入层”将学习嵌入向量作为自身训练过程的一部分。与 `word2vec`\
  \ 方法不同，这里没有窗口大小的概念。你首先需要标记你的分类特征，指定每个分类变量的嵌入大小，将其展平，然后连接到全连接层。网络的架构如图 4-8 所示。\n\n\
  **图 4-8.** 分类嵌入\n\n这里的输入变量是一组分类变量。然后你有一个嵌入层，将分类值嵌入到 N 维空间中，接着将其展平并连接到一个全连接层，并将分类器视为经典的二元交叉熵模型。\n\
