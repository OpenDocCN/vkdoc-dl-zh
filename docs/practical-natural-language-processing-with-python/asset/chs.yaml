  ### 观察 3


  否定词是某个词语的否定形式。它可以是肯定或否定的。"不喜欢"就是一个否定实例。由于你的词典只包含单个词语，如果不处理否定词，你可能会给句子打上错误的情感极性标签。与增强词方法类似，你需要识别一组否定词，并与肯定和否定集合进行交叉引用，以检查句子中是否存在否定情况。如果存在否定情况，你需要从该极性中减去分数。假设你有五个肯定命中词和两个否定命中词。你将减去
  5 和 3 的分数。


  你也可以给否定词赋予比肯定命中词更高的权重。参见表 3-3。


