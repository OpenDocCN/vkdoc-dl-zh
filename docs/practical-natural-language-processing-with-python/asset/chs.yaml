  \n## 识别问题行\n\n在上面的例子中，提供的数据是单行句子。然而，在对话中，存在整个对话语料库。将整个对话语料库标记为某个意图是很困难的。信噪比相当低，因此通常你会先尝试识别对话中可能包含问题行的部分，然后仅对这些句子进行意图挖掘。这可以显著提高信噪比。你还可以构建另一个监督学习模型来定位对话中的哪些行包含客户的问题。客户问题通常出现在“聊天”的前几行，或者会跟在诸如“请问有什么可以帮助您”这样的问题之后。参见表\
  \ 2-6。\n\n**第 2 章 客户服务中的 NLP**\n\n**表 2-6.** 问题行\n\n**系统**\n\n**感谢您选择 Best Telco。客服代表将很快与您联系。**\n\
  \n**系统**\n\n**您现在正在与 Max 聊天。**\n\n**客户 Himax**\n\n**客服**\n\n\n\n**感谢您联系 Best Telco。我是\
  \ Max。**\n\n**客服**\n\n**您好，我看到我正在与 Sara 女士聊天，您提供了 `XXXXXXX` 作为您账户关联的号码，对吗？**\n\n\
  **客户 是的，没错。我刚收到一封邮件，说我的服务费要涨到 `$70/month`，但在你们网站上，它只要 `$30`。这是怎么回事？**\n\n正如你在上面的例子中所见，客户陈述问题的行是客户的第二行，紧跟在用户的问候语之后。在邮件中，它可能是客户邮件线程的起始行。因此，定位并寻找问题行能带来更好的结果。\n\
  \n在深入探讨了通过监督和无监督机制进行的意图挖掘和主题建模之后，你现在将看到一些经典的客服分析，其中这些意图构成了核心基础。这就像先做好披萨的饼底，然后再撒上不同的配料。一旦你掌握了客服对话的意图，就可以进行以下分析。\n\
  \n## 热门客户查询\n\n查询的频率分布可以快速洞察热门话题以及客户通常联系的原因。在下面的例子中，你将使用航空公司的数据集。你将创建一个包含标签频率分布的数据框。请注意，航空公司数据集中有一个名为\
  \ `CSAT` 的额外列。这是用户提供的 CSAT 评分。在绘图时，你将使用 `matplotlib` 库。参见清单 2-30 和图 2-12。\n\n![图片\
  \ 17](img/index-57_1.png)\n\n**清单 2-30.**\n\n```\nimport pandas as pd\nimport numpy\
  \ as np\nimport matplotlib.pyplot as plt\n\ndf = pd.read_csv('airline_dataset_csat.csv',\
  \ low_memory=False, encoding='latin1')\ndf.head()\n```\n\n**图 2-12.**\n\n现在你将获取频率分布，并用绝对值绘制热门查询。参见清单\
  \ 2-31 和图 2-13。\n\n**清单 2-31.**\n\n```\nfreq1 = pd.DataFrame(df[\"class\"].value_counts()).reset_index()\n\
  freq1.columns = [\"class\", \"counts\"]\nfreq1[\"percent_count\"] = freq1[\"counts\"\
  ] / freq1[\"counts\"].sum()\nfreq1\n```\n\n![图片 18](img/index-58_1.png)\n\n**图 2-13.**\n\
  \n现在你使用 `matplotlib` 中的 `pyplot` 来绘制这些值。`pyplot.bar()` 接受 X 和 Y 值来构建条形图。参见清单 2-32\
