- fmt: '### CCAI Architecture


    The cornerstone in a CCAI architecture built by the telephony providers is `Dialogflow
    CX`. `Dialogflow` provides automated interaction with the user and contains automatic
    speech recognition (ASR) and Text to Speech with humanlike phone models.


    It gives customers 24/7 access to immediate conversational self-service.


    ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig1_HTML.jpg](images/506047_1_En_1_Chapter/506047_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Architecture overview of Contact Center AI by Google Cloud


    As seen in Figure [1-1](#506047_1_En_1_Chapter.xhtml#Fig1), the Contact Center
    AI product includes additional Google Cloud components: `Agent Assist` and `Contact
    Center AI Insights`.


    `Agent Assist` empowers human agents with continuous support during their calls
    by identifying intent and providing real-time, step-by-step assistance.


    Now imagine you have a virtual agent picking up the phone; however, it does not
    know what to answer to the customer (e.g., because it wasn’t trained with training
    phrases on that topic). CCAI can connect you to a live agent through agent hand-over,
    but in the background still listen in to provide suggestions (or fill in forms)
    on the screen to the live agent to speed up the call time.


    `Contact Center AI Insights` uses Natural Language Processing to identify call
    drivers and sentiment that helps contact center managers learn about customer
    interactions to improve call outcomes. It enables Contact Center management teams
    to hear what customers are saying. Based on that, they can make data-driven business
    decisions and increase operational efficiency.


    The CCAI architecture is built on top of existing telephony hardware provided
    by the telephony partners.


    ## About Google Cloud Speech Technology


    ### Cloud Speech-to-Text API


    The `Speech-to-Text API` (STT) is a Google Cloud automatic speech recognition
    (ASR) API which enables the recognition and translation of spoken language into
    text through an API (via REST or gRPC calls and client-side libraries).


    Google has over 20 years of experience in speech technology. The first patent
    dated from 2003, back then Google launched over 40 voice languages for the Google
    search engine, to search by using your voice.


    In 2012, Google started to use deep neural networks, which was also the start
    of the speech models used for the Google Assistant. Besides the Google Assistant
    and Search, Google uses speech recognition in various other Google products: `Dialogflow`,
    the caption feature in `Google Meet`, `Android Speech`, `YouTube TV` subtitles,
    and `Video AI`, just to name a few.


    The `STT API` started in 2017 and is part of Google Cloud. With the support of
    over 73 languages in more than 125 variants, it can transcribe speech, and it
    can auto detect a language. It also adds punctuation and speaker diarization (separating
    different speakers), and by the time of writing it can even run on-premise. `STT`
    is one of Google’s most popular Cloud products. You would think that `Speech-to-Text`
    is most used in voice bot scenarios, but in fact customers are using `STT` for
    all kinds of things, like generating subtitles in videos or live meetings, phone
    call monitoring, retrieving transcripts from audio files, or building voice commands
    in applications.


    ASR through the `Cloud Speech-to-Text API` from Google Cloud is a key piece in
    the Contact Center AI solution, where it will take a caller’s spoken voice and
    convert it into text, so it can detect the intention with `Dialogflow` or collect
    analytics for CCAI Insights.


    Note


    The `Cloud Speech-to-Text API` is part of the Google Cloud terms and conditions.
    This means Google cannot and will not use your voice data to train the Speech
    models for someone else’s usage. Therefore, you don’t have to worry that competitors
    using the same `STT API` will get access to your business data.


    Browsers like Chrome or operating systems like Android might have built-in Speech
    recognizers as well; however, businesses prefer to choose the `Cloud Speech-to-Text`
    solution because of the enterprise terms and conditions or additional `STT` features
    such as running the Speech models on-premise in your own data center. On top of
    that, it has been trained with different datasets.


    ### Cloud Text-to-Speech API


    Google Cloud’s `Text-to-Speech` (TTS) generates speech from text. It’s like a
    Speech synthesizer. By the time of writing, there are over 90 different voices
    to choose from.


    Google Cloud’s `TTS` allows developers to create natural-sounding, synthetic human
    speech as playable audio; it’s like a voice synthesizer. You can use the audio
    data files you create using `TTS` to power your applications or augment media
    like videos or audio recordings.


    `TTS` converts text or Speech Synthesis Markup Language (SSML) input into audio
    data like MP3 or LINEAR16 (the encoding used in WAV files).


    ### WaveNet


    In the past, we had standard Machine Learning models for generating voices. They
    sounded very robotic. Mainly because of the Google Assistant, we’ve created more
    advanced models: `WaveNet` models.


    It synthesizes speech with more humanlike emphasis and inflection on syllables,
    phonemes, and words. When a virtual agent’s voice sounds like a robot, users will
    treat the virtual agent as a robot and, therefore, ask dumb questions in a “computer”
    style, like “video game releases PS5” instead of “What are the latest video games
    which came out on PlayStation 5 this month?”.


    With `WaveNet` Machine Learning TTS models, Google can capture a person’s voice
    in a short time rather than having an actor for weeks or months in a studio and
    generate new “voices” from it by learning the sound waves.


    ### Custom Voice


    With the `Google Cloud Text-to-Speech API`, and built-in speech synthesis in `Dialogflow`,
    there are many generated voices to choose from. However, at Google Cloud, we heard
    many requests from enterprise users who want to use their own custom unique voices
    in their conversations.


    For example, to use their brand actor’s voice on Google Assistant or contact centers.
    That process is usually also costly because you would need to rent an actor and
    have them in the studio for weeks to record every phrase.


    With Machine Learning, Google can now generate custom voices. It’s possible to
    record your own voice (or from an actor), for 30min, by reading a certain voice
    script. It will generate the voice for you.


    The technology Google is using under the hood is called `Tacotron 2`. It makes
    use of sequence-to-sequence learning (Seq2Seq). This makes it possible to convert
    training models from one domain to sequences in another domain. (For example,
    through `Seq2Seq`, `Dialogflow` has multilinual support to so many different languages,
    because it’s easy to roll out to new languages.)


    Note in Figure [1-2](#506047_1_En_1_Chapter.xhtml#Fig2), Google uses a sequence-to-sequence
    model optimized for TTS to map a sequence of letters to a series of features that
    encode the audio. These features, an 80-dimensional audio spectrogram with frames
    computed every 12.5 milliseconds, capture the pronunciation of words and various
    subtleties of human speech, including volume, speed, and intonation. Finally,
    these features are converted to a 24 kHz waveform using a `WaveNet`-like architecture.


    It’s almost impossible to differentiate the original voice actors’ voice compared
    to the generated voice.


    ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig2_HTML.jpg](images/506047_1_En_1_Chapter/506047_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    A detailed look at `Tacotron 2`’s model architecture. The lower half of the image
    describes the sequence-to-sequence model that maps a sequence of letters to a
    spectrogram'
  raw: '### CCAI Architecture


    The cornerstone in a CCAI architecture built by the telephony providers is Dialogflow
    CX. Dialogflow provides automated interaction with the user and contains automatic
    speech recognition (ASR) and Text to Speech with humanlike phone models.


    It gives customers 24/7 access to immediate conversational self-service.


    ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig1_HTML.jpg](images/506047_1_En_1_Chapter/506047_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Architecture overview of Contact Center AI by Google Cloud


    As seen in Figure [1-1](#506047_1_En_1_Chapter.xhtml#Fig1), the Contact Center
    AI product includes additional Google Cloud components: **Agent Assist** and **Contact
    Center AI Insights**.


    **Agent Assist** empowers human agents with continuous support during their calls
    by identifying intent and providing real-time, step-by-step assistance.


    Now imagine you have a virtual agent picking up the phone; however, it does not
    know what to answer to the customer (e.g., because it wasn’t trained with training
    phrases on that topic). CCAI can connect you to a live agent through agent hand-over,
    but in the background still listen in to provide suggestions (or fill in forms)
    on the screen to the live agent to speed up the call time.


    **Contact Center AI Insights** uses Natural Language Processing to identify call
    drivers and sentiment that helps contact center managers learn about customer
    interactions to improve call outcomes. It enables Contact Center management teams
    to hear what customers are saying. Based on that, they can make data-driven business
    decisions and increase operational efficiency.


    The CCAI architecture is built on top of existing telephony hardware provided
    by the telephony partners.


    ## About Google Cloud Speech Technology


    ### Cloud Speech-to-Text API


    The **Speech-to-Text API** (STT) is a Google Cloud **automatic speech recognition
    (ASR)** **API** which enables the recognition and translation of spoken language
    into text through an API (via REST or gRPC calls and client-side libraries).


    Google has over 20 years of experience in speech technology. The first patent
    dated from 2003, back then Google launched over 40 voice languages for the Google
    search engine, to search by using your voice.


    In 2012, Google started to use deep neural networks, which was also the start
    of the speech models used for the Google Assistant. Besides the Google Assistant
    and Search, Google uses speech recognition in various other Google products: Dialogflow,
    the caption feature in Google Meet, Android Speech, YouTube TV subtitles, and
    Video AI, just to name a few.


    The STT API started in 2017 and is part of Google Cloud. With the support of over
    73 languages in more than 125 variants, it can transcribe speech, and it can auto
    detect a language. It also adds punctuation and speaker diarization (separating
    different speakers), and by the time of writing it can even run on-premise. STT
    is one of Google’s most popular Cloud products. You would think that Speech-to-Text
    is most used in voice bot scenarios, but in fact customers are using STT for all
    kinds of things, like generating subtitles in videos or live meetings, phone call
    monitoring, retrieving transcripts from audio files, or building voice commands
    in applications.


    ASR through the Cloud Speech-to-Text API from Google Cloud is a key piece in the
    Contact Center AI solution, where it will take a caller’s spoken voice and convert
    it into text, so it can detect the intention with Dialogflow or collect analytics
    for CCAI Insights.


    Note


    The Cloud Speech-to-Text API is part of the Google Cloud terms and conditions.
    This means Google cannot and will not use your voice data to train the Speech
    models for someone else’s usage. Therefore, you don’t have to worry that competitors
    using the same STT API will get access to your business data.


    Browsers like Chrome or operating systems like Android might have built-in Speech
    recognizers as well; however, businesses prefer to choose the Cloud Speech-to-Text
    solution because of the enterprise terms and conditions or additional STT features
    such as running the Speech models on-premise in your own data center. On top of
    that, it has been trained with different datasets.


    ### Cloud Text-to-Speech API


    Google Cloud’s **Text-to-Speech** (TTS) generates speech from text. It’s like
    a Speech synthesizer. By the time of writing, there are over 90 different voices
    to choose from.


    Google Cloud’s TTS allows developers to create natural-sounding, synthetic human
    speech as playable audio; it’s like a voice synthesizer. You can use the audio
    data files you create using TTS to power your applications or augment media like
    videos or audio recordings.


    TTS converts text or Speech Synthesis Markup Language (SSML) input into audio
    data like MP3 or LINEAR16 (the encoding used in WAV files).


    ### WaveNet


    In the past, we had standard Machine Learning models for generating voices. They
    sounded very robotic. Mainly because of the Google Assistant, we’ve created more
    advanced models: WaveNet models.


    It synthesizes speech with more humanlike emphasis and inflection on syllables,
    phonemes, and words. When a virtual agent’s voice sounds like a robot, users will
    treat the virtual agent as a robot and, therefore, ask dumb questions in a “computer”
    style, like “video game releases PS5” instead of “What are the latest video games
    which came out on PlayStation 5 this month?”.


    With WaveNet Machine Learning TTS models, Google can capture a person’s voice
    in a short time rather than having an actor for weeks or months in a studio and
    generate new “voices” from it by learning the sound waves.


    ### Custom Voice


    With the Google Cloud Text-to-Speech API, and built-in speech synthesis in Dialogflow,
    there are many generated voices to choose from. However, at Google Cloud, we heard
    many requests from enterprise users who want to use their own custom unique voices
    in their conversations.


    For example, to use their brand actor’s voice on Google Assistant or contact centers.
    That process is usually also costly because you would need to rent an actor and
    have them in the studio for weeks to record every phrase.


    With Machine Learning, Google can now generate custom voices. It’s possible to
    record your own voice (or from an actor), for 30min, by reading a certain voice
    script. It will generate the voice for you.


    The technology Google is using under the hood is called **Tacotron 2** . It makes
    use of sequence-to-sequence learning (Seq2Seq). This makes it possible to convert
    training models from one domain to sequences in another domain. (For example,
    through Seq2Seq, Dialogflow has multilinual support to so many different languages,
    because it’s easy to roll out to new languages.)


    Note in Figure [1-2](#506047_1_En_1_Chapter.xhtml#Fig2), Google uses a sequence-to-sequence
    model optimized for TTS to map a sequence of letters to a series of features that
    encode the audio. These features, an 80-dimensional audio spectrogram with frames
    computed every 12.5 milliseconds, capture the pronunciation of words and various
    subtleties of human speech, including volume, speed, and intonation. Finally,
    these features are converted to a 24 kHz waveform using a WaveNet-like architecture.


    It’s almost impossible to differentiate the original voice actors’ voice compared
    to the generated voice.


    ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig2_HTML.jpg](images/506047_1_En_1_Chapter/506047_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    A detailed look at Tacotron 2’s model architecture. The lower half of the image
    describes the sequence-to-sequence model that maps a sequence of letters to a
    spectrogram'
  trans: '

    ### CCAI 架构


    电话服务提供商构建的 CCAI 架构的基石是 `Dialogflow CX`。`Dialogflow` 提供与用户的自动化交互，并包含自动语音识别 (ASR)
    和具有逼真人声模型的文本转语音功能。


    它让客户能够全天候 24/7 获得即时对话式自助服务。


    ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig1_HTML.jpg](img/506047_1_En_1_Fig1_HTML.jpg)


    图 1-1


    Google Cloud 的 Contact Center AI 架构概览


    如图 1-1 所示，Contact Center AI 产品包含额外的 Google Cloud 组件：`Agent Assist` 和 `Contact
    Center AI Insights`。


    `Agent Assist` 通过识别意图并提供实时的、逐步的协助，在通话过程中为人工客服提供持续支持。


    现在想象一下，您有一个虚拟客服接听电话；然而，它不知道如何回答客户（例如，因为它没有针对该主题的训练短语进行训练）。CCAI 可以通过客服转接将您连接到在线人工客服，但在后台仍会监听，以便在屏幕上向人工客服提供建议（或填写表单），从而缩短通话时间。


    `Contact Center AI Insights` 使用自然语言处理来识别通话驱动因素和情绪，帮助联络中心管理者了解客户互动情况，以改善通话结果。它使联络中心管理团队能够听到客户在说什么。基于此，他们可以做出数据驱动的业务决策并提高运营效率。


    CCAI 架构构建在由电话合作伙伴提供的现有电话硬件之上。


    ## 关于 Google Cloud 语音技术


    ### Cloud Speech-to-Text API


    `Speech-to-Text API` (STT) 是一个 Google Cloud 自动语音识别 (ASR) API，它能够通过 API（通过 REST
    或 gRPC 调用以及客户端库）识别口语并将其转录为文本。


    Google 在语音技术方面拥有超过 20 年的经验。第一项专利可追溯到 2003 年，当时 Google 为 Google 搜索引擎推出了超过 40 种语音语言，以便通过语音进行搜索。


    2012 年，Google 开始使用深度神经网络，这也是用于 Google Assistant 的语音模型的起点。除了 Google Assistant 和搜索，Google
    还在其他各种 Google 产品中使用语音识别：`Dialogflow`、`Google Meet` 中的字幕功能、`Android Speech`、`YouTube
    TV` 字幕和 `Video AI`，仅举几例。


    `STT API` 始于 2017 年，是 Google Cloud 的一部分。它支持超过 73 种语言的 125 多种变体，可以转录语音，并且可以自动检测语言。它还添加了标点符号和说话人分离（区分不同的说话人），并且在撰写本文时，它甚至可以在本地运行。`STT`
    是 Google 最受欢迎的云产品之一。您可能会认为 `Speech-to-Text` 最常用于语音机器人场景，但实际上，客户将 `STT` 用于各种用途，例如生成视频或实时会议的字幕、电话通话监控、从音频文件中获取转录文本，或在应用程序中构建语音命令。


    通过 Google Cloud 的 `Cloud Speech-to-Text API` 实现的 ASR 是 Contact Center AI 解决方案中的关键部分，它将获取呼叫者的语音并将其转换为文本，以便通过
    `Dialogflow` 检测意图或为 CCAI Insights 收集分析数据。


    注意


    `Cloud Speech-to-Text API` 受 Google Cloud 条款和条件约束。这意味着 Google 不能也不会使用您的语音数据来为其他人的使用训练语音模型。因此，您不必担心使用相同
    `STT API` 的竞争对手会访问您的业务数据。


    像 Chrome 这样的浏览器或像 Android 这样的操作系统可能也有内置的语音识别器；然而，企业更倾向于选择 `Cloud Speech-to-Text`
    解决方案，因为其企业级条款和条件或额外的 `STT` 功能，例如在您自己的数据中心本地运行语音模型。除此之外，它还使用不同的数据集进行了训练。


    ### Cloud Text-to-Speech API


    Google Cloud 的 `Text-to-Speech` (TTS) 从文本生成语音。它就像一个语音合成器。在撰写本文时，有超过 90 种不同的声音可供选择。


    Google Cloud 的 `TTS` 允许开发者创建听起来自然的合成人类语音，作为可播放的音频；它就像一个语音合成器。您可以使用通过 `TTS` 创建的音频数据文件来驱动您的应用程序或增强媒体，例如视频或音频录制。


    `TTS` 将文本或语音合成标记语言 (SSML) 输入转换为音频数据，例如 MP3 或 LINEAR16（WAV 文件中使用的编码）。


    ### WaveNet


    过去，我们有用于生成语音的标准机器学习模型。它们听起来非常机械。主要是由于 Google Assistant，我们创建了更先进的模型：`WaveNet` 模型。


    它合成语音时，在音节、音素和单词上具有更逼真的强调和语调变化。当虚拟客服的声音听起来像机器人时，用户会将虚拟客服视为机器人，因此会以“计算机”风格提出愚蠢的问题，例如“视频游戏发布
    PS5”，而不是“这个月 PlayStation 5 上发布了哪些最新的视频游戏？”。


    借助 `WaveNet` 机器学习 TTS 模型，Google 可以在短时间内捕捉一个人的声音，而无需让演员在录音室里待上数周或数月，并通过学习声波从中生成新的“声音”。


    ### 自定义语音


    通过 `Google Cloud Text-to-Speech API` 和 `Dialogflow` 中内置的语音合成，有许多生成的声音可供选择。然而，在
    Google Cloud，我们听到了许多企业用户的请求，他们希望在对话中使用自己独特的自定义声音。


    例如，在 Google Assistant 或联络中心使用其品牌演员的声音。这个过程通常也很昂贵，因为您需要租用一名演员，并让他们在录音室里待上数周来录制每一个短语。


    借助机器学习，Google 现在可以生成自定义语音。可以通过阅读特定的语音脚本，录制您自己的声音（或演员的声音）30 分钟。它将为您生成语音。


    Google 在底层使用的技术称为 `Tacotron 2`。它利用了序列到序列学习 (Seq2Seq)。这使得将训练模型从一个领域转换到另一个领域的序列成为可能。（例如，通过
    `Seq2Seq`，`Dialogflow` 能够支持多种语言的多语言支持，因为很容易推广到新语言。）


    注意在图 1-2 中，Google 使用了一个针对 TTS 优化的序列到序列模型，将字母序列映射到一系列编码音频的特征。这些特征是一个 80 维的音频频谱图，其帧每
    12.5 毫秒计算一次，捕捉了单词的发音以及人类语音的各种细微差别，包括音量、速度和语调。最后，这些特征使用类似 `WaveNet` 的架构转换为 24 kHz
    的波形。


    几乎不可能区分原始配音演员的声音与生成的声音。


    ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig2_HTML.jpg](img/506047_1_En_1_Fig2_HTML.jpg)


    图 1-2


    `Tacotron 2` 模型架构的详细视图。图像的下半部分描述了将字母序列映射到频谱图的序列到序列模型

    '
- fmt: '# Other Google Conversational AI Products


    Google is betting heavily on Conversational AI technology. Chatbots and Conversational
    AI are the top priority for Google as well as for Google Cloud.


    Where the previous section explained the Conversational AI products in Google
    Cloud, here are other Conversational AI products, researches, and tools at Google
    you might have heard of.


    ## Google Assistant


    The Google Assistant is the AI of Google, just as `Siri` is the AI for Apple,
    and `Alexa` the AI for Amazon.


    The Google Assistant initially debuted in May 2016 as part of Google’s messaging
    app `Allo` and its voice-activated speaker `Google Home`. After a period of exclusivity
    on Google Pixel smartphones, it began to be deployed on other Android devices
    in February 2017, including third-party smartphones and `Wear OS` (formerly known
    as `Android Wear`), and was released as a stand-alone app on the iOS operating
    system in May 2017.


    As of summer 2020, the Google Assistant is available on more than 1 billion devices
    and is available in more than 80 countries; it now helps more than 500 million
    people every month to get things done across smart speakers and smart displays,
    phones, TVs, cars, and more.


    When you have used the Google Assistant before, you know that you can ask the
    Google Assistant anything. This could be a question, such as “Hey Google, who
    is the king of the Netherlands?” (It will tell you it’s Willem-Alexander.) Follow
    up questions. “Who is his wife?” (It knows the context of Willem-Alexander; his
    wife is Maxima.) You can integrate it with IoT, home automation if you have Assistant-supported
    devices such as smart light bulbs, thermostats, Android TVs, and so on (“Hey Google,
    turn on the TV,” “Turn up the heat,” “Play Song 2 on Spotify,” etc.). You can
    also ask questions that are particular to your brand, let’s say buying a product
    from a particular store (e.g., “Buy Tony Hawk Pro Skater 2.”); then you will make
    use of the app ecosystem of the Google Assistant. In the previous example, buying
    a video game is not a native Google Assistant task, as it depends on a store,
    location, and in-stock. This could only work from the context of a third-party
    “app” (within the Google Assistant ecosystem, these are called `Actions`).


    It means that you will have to deploy your actions to the Google Assistant—similar
    to how Android, iOS, Windows, or MacOS work with opening applications. But instead
    of tapping/clicking an app icon, you can invoke your actions by asking the Google
    Assistant to open or talk to your brand: “Hey Google, talk to Lee Boonstra’s video
    game store.” At that moment, you will hear a voice change. It switches from the
    native Google Assistant experience to the voice and dialogues of your app.


    ## Actions on Google


    In December 2016, Google launched `Actions on Google`, a developer platform for
    the Google Assistant. `Actions on Google` allows third-party developers to build
    actions (apps) for Google Assistant that provide extended functionality on top
    of the native Google Assistant. There are over one million Actions in the Actions
    directory which is like an app store for `Actions on Google`, except that you
    don’t download Actions. You just invoke them by talking to it. You can do this
    by using the wake word, such as “Hey Google, talk to my `<appname>`.”


    > **Tip**

    >

    > Fun fact, 90% of the Actions are built with Dialogflow because of Google’s direct
    integration. With Dialogflow, it’s really easy to bring your conversation to the
    Google Assistant; it’s just a flip of a switch. See Chapter [7](#506047_1_En_7_Chapter.xhtml)
    of this book.


    ### Actions Builder


    The `Actions on Google` platform comes with an SDK, visual components, extensive
    documentation, and an additional tool for building Actions: `Actions Builder`.


    With both Dialogflow and `Actions Builder`, you can build conversations for the
    Google Assistant. The main reason for choosing Dialogflow Essentials over `Actions
    Builder` is because Dialogflow ES is part of Google Cloud and comes with enterprise
    terms and conditions, SLAs, and support. When you want to build multichannel virtual
    agents (bots that support Google Assistant and/or social media chatbots), then
    Dialogflow Essentials is the tool you want to pick. Dialogflow ES has direct integration
    with the `Actions on Google` framework. Dialogflow is a mature tool, largely used
    by the community.


    `Actions Builder` works best for simple use cases that let users get things done
    quickly. It has consumer terms and conditions.


    ## AdLingo


    `AdLingo` is part of Area 120 by Google (incubator program) and allows brands
    to acquire customers by turning ads into AI-powered personalized conversations
    at scale. How? `AdLingo` ads enable brands to embed their virtual agent in a display
    ad to reach potential customers at scale and where they are looking for information.
    In other words, with the help of `AdLingo`, you can turn your Dialogflow agent
    into an ad. Instead of having your customers visit your website, you can have
    a much larger reach by displaying the conversational ad on other (external) websites!


    ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig3_HTML.jpg](images/506047_1_En_1_Chapter/506047_1_En_1_Fig3_HTML.jpg)


    **Figure 1-3** With `AdLingo`, you can turn your display ads into chatbots, to
    start conversations with potential customers without them visiting your website
    first


    ## Chatbase


    `Chatbase` is a cross-platform plug-and-play service that helps chatbot developers
    accelerate finding product-market fit by providing key bot metrics and workflows
    for fixing bots. It unlocks insights from data to create the right AI-powered
    conversational experiences for customer service. You can use `Chatbase` through
    their portal, but you can also use it through Dialogflow, as it’s partly integrated.


    ## Duplex


    You might have seen the `Duplex` video during Google IO 2018 (voice robots making
    appointments with hairdressers). The video went viral. It has over 4M views and
    over 29K likes by the time of writing. It’s a project by Google which allows certain
    users to make a restaurant reservation by phone. However, instead of the user
    speaking directly to the restaurant employee, Google Duplex, with the help of
    Google Assistant, speaks for the user. It does this with an AI-based but human-sounding
    voice.'
