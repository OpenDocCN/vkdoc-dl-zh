    \n# Building Chatbots with Templates\n\nThere are a few tools that can help to\
    \ build an agent quickly; these are like template components. There are out-of-the-box\
    \ agents that you can enable (prebuilt agents); there is the ability to enable\
    \ small talk to allow a casual conversation. And it’s possible to import FAQs\
    \ from a (private) CSV or public website, with the knowledge base feature. This\
    \ chapter will cover all of these.\n\n## Creating Prebuilt Agents\n\nA **prebuilt\
    \ agent** typically consists of example intents with parameters and entities configured.\
    \ It will be configured for various languages, so that makes it very interesting.\
    \ It won’t contain fulfillment webhook logic since this requires a Cloud Function\
    \ or a back-end. But it can be useful to quickly kickstart a project with some\
    \ examples in various languages!\n\nAs you can see in Figure 4-1, when you click\
    \ **Prebuilt Agents** in the Dialogflow ES menu, you will get an overview of all\
    \ prebuilt agents. It’s like a marketplace! There are over 40 prebuilt agents\
    \ to choose from. There are prebuilt agents such as a Currency Converter, Banking,\
    \ Food Delivery, Flights, and so on.\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig1_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1: An overview of all prebuilt agents\n\nWhen you click a prebuilt\
    \ agent, you can request details, which will show up the sample intents within\
    \ a pop-up screen (Figure 4-2).\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig2_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2: An example of a prebuilt agent\n\nHover over the prebuilt agent\
    \ you want to use and click **Import**.\n\nChoose to **create a new Dialogflow\
    \ Project** and click **OK**.\n\n> **Note:** You can’t add prebuilt agents to\
    \ existing Dialogflow agents. If you want those intents, you could export/import\
    \ the intents from the Settings screen.\n\nOnce an agent has been imported, you\
    \ might need to go to the **Settings** screen to add a service account to the\
    \ project. You will be prompted if this is required.\n\nOnce your agent is imported,\
    \ you will have a new agent added to your Dialogflow projects, and you can refine\
    \ and add new intents on top of what’s already there."
