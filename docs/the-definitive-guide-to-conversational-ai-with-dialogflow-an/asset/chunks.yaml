    3.  这是用于意图检测的 Dialogflow SDK 方法。它返回一个 promise，该 promise 将在获取到 fulfillment 数据后被解析：


    ```

    sessionPath = sessionClient.sessionPath(projectId, sessionId);

    ```


    ```

    await sessionClient.detectIntent(request);

    ```


    图 11-2 展示了其效果。


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig2_HTML.jpg](img/506047_1_En_11_Fig2_HTML.jpg)


    **图 11-2** 在网页浏览器中运行的自定义聊天集成


    要运行本书 GitHub 仓库中的这个示例，你需要 `cd` 进入 `back-end` 文件夹。


    然后，安装所需的库：


    ```

    npm install

    ```


    启动 Node 应用：


    ```

    npm --PROJECT_ID=[your-google-cloud-project-id] run start

    ```


    在浏览器中访问 `http://localhost:3000`。


    ## 欢迎消息


    我经常从实现自己集成的用户那里收到一个常见问题：如何确保我的聊天机器人在打开聊天时向用户打招呼？这并不难；我们可以向 Dialogflow 触发事件，并且我们会在
    Socket.IO 与客户端建立正确连接后（这发生在页面加载完成后）立即执行此操作。请注意清单 11-4。


    在 `index.html` 的 connect 监听器中添加：


    ```

    socketio.emit(''welcome'');

    ```


    然后，在你的后端 `app.js` 中，在 connect 监听器内，我们将监听从 UI 发送的欢迎消息。


    ```

    client.on(''welcome'', async function() {

    const welcomeResults = await detectIntentByEventName(''welcome'');

    client.emit(''returnResults'', welcomeResults);

    });

    ```


    **清单 11-4** 监听欢迎消息


    清单 11-5 中的下一个新函数与清单 11-3 中的 `detectIntent` 调用非常相似，但我们将使用**事件名称**，而不是传递文本查询输入。


    ```

    async function detectIntentByEventName(eventName){

    request.queryInput.event =  {

    languageCode: languageCode,

    name: eventName

    };

    const responses = await sessionClient.detectIntent(request);

    //移除事件，这样欢迎事件就不会再次被触发

    delete request.queryInput.event;

    return responses;

    }

    ```


    **清单 11-5** 通过事件名称检测意图


    使用哪个事件名称？欢迎事件，因为我们的欢迎意图附加了该事件，你可以在图 11-3 中看到。


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig3_HTML.jpg](img/506047_1_En_11_Fig3_HTML.jpg)


    **图 11-3** Dialogflow 中的欢迎事件


    ## 在聊天机器人集成中创建富响应


    当你想在实现中使用富响应消息时，你需要手动构建这些消息。这是合理的，因为你控制着 UI。


    让我们在集成中构建一些富响应消息。


    ### 超链接组件、谷歌地图和图片组件


    首先，创建一个带有训练短语（如“你有网址吗？”）的新意图。


    你不需要指定文本响应。相反，你将创建一个新的**自定义负载**，它使用我们自定义的 JSON，如图 11-4 所示：


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig4_HTML.jpg](img/506047_1_En_11_Fig4_HTML.jpg)


    **图 11-4** 自定义超链接富消息的自定义负载


    ```

    {

    "web": {

    "type": "hyperlink",

    "text": "查看我的网站",

    "link": "http://www.leeboonstra.com"

    }

    }

    ```


    在你的后端集成中，运行 `detectIntent` 方法后，你需要遍历 `queryResult.fulfillmentMessages` 数组。它应该包含一个对象，其
    `message` 设置为**负载**。


    ```

    fulfillmentMessages: Array(1)

    0:

    message: "payload"

    payload:

    fields:

    platform: {stringValue: "custom-web", kind: "stringValue"}

    web: {structValue: {...}, kind: "structValue"}

    __proto__: Object

    __proto__: Object

    platform: "PLATFORM_UNSPECIFIED"

    __proto__: Object

    length: 1

    __proto__: Array(0)

    fulfillmentText: ""

    ```


    > **提示：** 你是否注意到负载对象有些奇怪？它并不包含你在 Dialogflow 控制台中输入的相同 JSON 对象。这是因为 Google gRPC
    API 使用了协议缓冲区（`google.protobuf.Struct`）。协议缓冲区是 Google 用于序列化结构化数据的语言无关、平台无关、可扩展的机制。你需要将
    protobuf 转换为 JSON。在我为此示例提供的 GitHub 中，我包含了一个简单的转换脚本。


    你的后端代码应将结果返回给 UI。你的客户端 JavaScript 将遍历所有结果，并使用自定义样式在屏幕上呈现结果。图 11-5 展示了其效果。


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig5_HTML.jpg](img/506047_1_En_11_Fig5_HTML.jpg)


    **图 11-5** 支持富消息的自定义集成示例


    ### 实现


    让我们看看超链接、谷歌地图和图片的富消息的完整实现。我们已经看到了一个超链接自定义负载的示例；清单 11-6 展示了一些图片和谷歌地图的示例。


    ```

    {

    "web": {

    "type": "image",

    "alt": "Lee Boonstra",

    "src": "https://www.leeboonstra.com/images/profile.jpg"

    }

    }

    {

    "web": {

    "link": "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2437.7995043017927!2d4.869772751476948!3d52.33778327968087!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c60a05af168f5b%3A0x3e5bfe6e0b2ce441!2sGoogle+Amsterdam!5e0!3m2!1sen!2snl!4v1520965060384",

    "type": "map"

    }

    }

    ```


    **清单 11-6** Dialogflow 控制台中的自定义负载


    在 `detectIntent` promise 之后，你可以立即调用一个名为 `getRichContent()` 的新方法，该方法将已解析的 promise
    响应传递给它。


    ```

    const responses = await sessionClient.detectIntent(request);

    let data = getRichContent(responses);

    return data;

    ```


    `getRichContent` 方法如下所示；请参见清单 11-7。


    ```

    function getRichContent(responses){

    const result = responses[0].queryResult;

    let messages = [];

    if(result.fulfillmentMessages.length > 0) {

    for (let index = 0; index < result.fulfillmentMessages.length; index++) {

    const msg = result.fulfillmentMessages[index];

    if (msg.payload){

    let data = structJson.structProtoToJson(msg.payload);

    messages.push(data.web);

    } else {

    messages.push(msg.text.text);

    }

    }

    return messages;

    }

    }

    ```


    **清单 11-7** `getRichContent` 方法从 protobuf 中获取对象


    它首先检查 `fulfillmentMessages` 是否包含一个至少有一个元素的数组。可能存在多个 fulfillment 消息，例如，一条文本消息和两条富消息，因此我们需要遍历它们。如果消息包含自定义负载，我们需要获取数据并将
    protobuf 转换为 JSON。否则，我们可以将文本版本添加到新的消息数组中。这个数组将被发送到 UI。从技术上讲，你也可以在此处创建 HTML 标记，但在前端执行此操作会更好，这样你的前端
    UI 代码就能与后端代码很好地解耦。


    我使用这个小型转换器脚本来处理协议缓冲区。我可以从 JSON 转换为 Struct，或者从 Struct 转换为 JSON。你可以在本书的 GitHub 仓库中找到这个脚本。我们需要的最后一个函数是：`structProtoToJson(data.web)`。


    不要忘记在你的 `app.js` 后端代码顶部包含该文件：


    ```

    const structJson = require(''../back-end/structToJson'');

    ```


    以下是我们将在 UI 中使用的代码。一旦通过 Socket.IO 接收到数据，我的 `index.html` 将包含以下代码块。请查看清单 11-8。

    '
- fmt: '```javascript

    socketio.on(''returnResults'', function (data) {

    console.log(data);

    //d) If there are queryResults then dynamically

    // create list items to append to the messages list.

    for (let index = 0; index < data.queryResult.queryResults.length; index++) {

    const e = data.queryResult.queryResults[index];

    if (e.type == ''hyperlink'') {

    var balloon = document.createElement("li");

    balloon.className = ''balloon agent'';

    balloon.innerHTML = `<a href="${e.link}" target="_blank">${e.text}</a>`;

    console.log(`${e.text}`);

    messages.appendChild(balloon);

    } else if (e.type == ''map'') {

    var balloon = document.createElement("li");

    balloon.className = ''balloon agent'';

    balloon.innerHTML = `<iframe src="${e.map}" width="400" height="300"></iframe>`;

    messages.appendChild(balloon);

    } else if (e.type == ''image'') {

    var balloon = document.createElement("li");

    balloon.className = ''balloon agent'';

    balloon.innerHTML = `<img src="${e.src}" alt="${e.alt}">`;

    messages.appendChild(balloon);

    } else {

    var balloon = document.createElement("li");

    balloon.className = ''balloon agent'';

    balloon.innerHTML = e;

    messages.appendChild(balloon);

    }

    }

    });

    ```

    *Listing 11-8* Looping through the results to find the custom payload type and
    displaying it right on the screen


    It checks the messaging types. If the type is a hyperlink, then we will create
    an anchor tag with the link and the link text provided by the custom payload in
    the Dialogflow console. If the type is an image, you will create an image tag
    with an image src and alt tag, provided by the custom payload in the Dialogflow
    console. And when it’s a map, then it will use an iframe with a Google Maps URL
    which was provided by the custom payload in the Dialogflow console. The possibilities
    are endless. If you want to create custom cards, it will probably contain some
    div elements, but with custom stylesheet code to make it look nice.


    ## Using Markdown Syntax and Conditional Templates in Your Dialogflow Responses


    When working with large teams, the UX designer or copywriter often maintains the
    Dialogflow console conversation. They want to have control over the text’s styling,
    without using HTML markup in the text, for example, to highlight certain words
    or to display hyperlinks. When you are building your own custom integration, integrating
    supporting markdown is actually very easy.


    Just make sure your UI `index.html` includes a markdown library such as `Marked`.


    Your intent responses can now contain markdown syntax, such as seen in Figure
    [11-6](#506047_1_En_11_Chapter.xhtml#Fig6):


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig6_HTML.jpg](images/506047_1_En_11_Chapter/506047_1_En_11_Fig6_HTML.jpg)


    *Figure 11-6* Using markdown text in the Dialogflow response text fields


    ```

    **Lee**  is a *Conversational AI Developer Advocate* at Google. In this role,
    she is focusing on *Dialogflow*, *Contact Center AI* & *Speech* technology. Here''s
    her  [website](https://www.leeboonstra.com)

    ```


    Figure [11-7](#506047_1_En_11_Chapter.xhtml#Fig7) shows how this will render to
    the screen.


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig7_HTML.jpg](images/506047_1_En_11_Chapter/506047_1_En_11_Fig7_HTML.jpg)


    *Figure 11-7* The custom integration can handle markdown after importing the Marked
    library


    ## Branching the Conversation


    Besides markdown, it is also possible to use templates and conditional branching
    from within the Dialogflow Console. Think `Jinja` (for Python or Java developers),
    `Smarty` (PHP), or `Jade`/`Pug`, `Handlebars`, and `Mustache` (for JavaScript
    developers). Here’s an example with the `Pug.js` library (formerly known as Jade).
    It works really well.


    The trick here is to make use of the **custom payload** response setting and use
    of a templating library, so you can provide readable templates and variables that
    can be injected. Note Listing [11-9](#506047_1_En_11_Chapter.xhtml#PC27).


    ```

    { "custom":

    {

    "locals": {

    "username": "$username"

    },

    "pug": [ "if username\n", " | Hello $username\n", "else\n", " | Hello stranger"
    ]

    }

    }

    ```

    *Listing 11-9* Example of branching in the Dialogflow console, as a custom payload


    The training phrase which belongs to this example is


    ```

    My name is: Lee

    ```


    The values of the `locals` object are the parameter values that were passed in
    as a username. In the pug object, I wrote a multiline string template with an
    if-else branch. When using Pug, the line indenting is essential. Pay attention
    to the newline `\n` code and the `|` for using plain text.


    My integration back-end code will need to include the pub library:


    ```

    const pug = require(''pug'');

    ```


    A custom function that can get the template from the custom payload to compile
    it with the passed in variables. See Listing [11-10](#506047_1_En_11_Chapter.xhtml#PC30).


    ```

    function templateHelper(payload) {

    var str = payload.custom.pug;

    if(Array.isArray(payload.custom.pug)) {

    str = payload.custom.pug.join("");

    };

    var fn = pug.compile(str);

    var text = fn(payload.custom.locals);

    return text;

    }

    ```

