    # 为什么有些聊天机器人会失败？


    听起来像小狗狗和冰淇淋一样美好？由于聊天机器人的漫长历史，客户往往对它们印象不佳。失败的聊天机器人比比皆是。


    导致聊天机器人无法提供愉悦用户体验的十大主要原因：


    - 大多数聊天机器人仍采用老式的决策树逻辑构建。具备语言处理和自然语言处理/机器学习能力的机器人并不常见。

    - 同样，由于这种老式的构建方式，它们通常只能维持几个对话气泡的上下文信息，最终会忘记用户在提出最新问题之前所说的内容。

    - 除了记住单次会话的上下文，聊天机器人往往也无法跨会话保持记忆。例如，你第二天登录聊天机器人，之前的会话记录就消失了。

    - 有些机器人没有明确说明它能执行哪些任务。机器人需要澄清你正在与虚拟代理而非真人对话。理想情况下，它们应该事先说明能回答哪类问题，以便你引导对话方向。

    - 很多机器人解决的是不相关的用例。当聊天机器人创建者忽略分析数据，也不从其他渠道洞察最常见问题时，这种情况就会发生。

    - 有些聊天机器人缺乏个性化。

    - 在孤立环境中创建聊天机器人（不与其他系统连接）可能对企业和客户都造成严重伤害。你的客户会将你视为一个“整体公司”，他们无法理解为什么聊天机器人无法获取公司理应拥有的背景信息。

    - 机器人就像人类顾问一样，需要通过从反馈中学习和接受正确训练来不断改进。创建者常常忘记这些环节，因此机器人会随着时间的推移而变得不那么相关。

    - 能出色完成一件事的机器人，比那些样样稀松的机器人更有帮助。

    - 很少有聊天机器人具备升级工作流，能在机器人无法提供帮助时让真人接管对话。一旦交接，用户不应重复与聊天机器人讨论过的内容，而应向员工提供对话记录。


    如果我能在这个列表上再补充一个原因，我会说：每个聊天机器人渠道糟糕的用户体验（UX）设计可能会让用户感到痛苦。你的虚拟代理应该出现在客户所在的渠道上。如果是网站，你可以展示表格、链接和视频。然而，当对话仅限语音时，例如在联络中心，你显然不能将带有超链接、表格和图片的网站文本直接复制到语音助手的输出中。


    # 机器学习简单解释


    想想看，你是如何学会第一门语言的？我敢打赌，你的父母或老师并没有递给你一本字典，让你从头到尾读完。等你翻到最后一页，你就成了，比如说，英语大师。不！我们是通过例子学习的。


    这是一辆汽车，它在高速公路上行驶；它有四个轮子和一个方向盘。那边那辆，是自行车。它有两个轮子，你需要踩踏板。当你见过许多汽车和自行车后，你就能区分它们了。万一你搞错了，比如你以为看到了一辆汽车，但实际上是一辆卡车，别人会告诉你错了，卡车比汽车更大，或者卡车有更多轮子。


    对于计算机来说，原理非常相似。数据科学家编写一个模型，然后我们输入海量数据，直到某个时刻，计算机开始识别模式。例如，你会上传大量汽车和自行车的照片，每张照片都带有标签。当计算机出错时，我们会教它正确的标签是什么，或者可能需要上传更多数据。就像人类随着年龄增长变得更聪明一样，通过机器学习，计算机随着看到更多相关数据而变得越来越智能。


    机器学习是**人工智能**（AI）的一个子领域。AI 是构建更智能计算机的过程。这是一个自计算机诞生之初就存在的概念。程序员在代码中创建条件性的 `if`
    和 `else` 语句，告诉计算机在特定条件下该做什么，否则应该执行什么操作。作为开发者，我自己深知编程有多难。我们开发者总是会写出 bug。*没错，你也会*。总会有新的需求让你的条件判断失效。你仍然需要开发者来维护代码。


    机器学习是让计算机自我学习的过程。由于通过机器学习，计算机通过观察更多例子而变得更聪明。这实际上是让机器变聪明的一种比编程更有效的方式。


    使用机器学习的计算机程序在预测方面可能比人类更出色，但其表现取决于提供给它的数据质量。这是因为计算机能在短时间内记住并处理海量数据。这就是为什么机器学习已被应用于所有行业——医疗领域用于预测癌症，零售领域用于推荐商品，金融领域用于检测欺诈，以及每个使用自然语言理解（NLU）聊天机器人的公司。


    ## 自然语言处理


    与机器学习一样，**自然语言处理（NLP）** 是 AI 的一个子集。它处理的是自然语言（我们人类所说的语言）与 AI 之间的关系。它是 AI 的一个分支，使计算机能够理解、解释和操作人类语言。NLP
    可以理解非结构化数据，比如口语，而不是像 SQL 表行这样的结构化数据。NLP 关注的是如何编程让计算机处理大量自然语言数据（例如聊天机器人对话），通过自动化使其变得高效且富有成效。NLP
    算法通常基于机器学习算法。NLP 无需手动编写大量规则，而是可以依赖机器学习，通过分析一组示例来自动学习。


    NLP 通常指代诸如**语音识别**（用于理解口语或音频文件）和**自然语言理解（NLU）**（用于识别大量书面文本，例如进行实体或情感分析——在聊天机器人场景中，用于分类和匹配意图）等工具。NLP
    的另一个子集是**自然语言生成（NLG）**。NLG 是一个将结构化数据转换为自然语言的软件过程，例如生成报告或聊天机器人对话。


    # 聊天机器人与人工智能


    现代世界的聊天机器人或智能助手，核心就是 AI。


    我们来看看 Google Nest Mini，谷歌的智能音箱。它实际上不过是一个连接互联网的带麦克风的音箱，用于访问谷歌的 AI——Google Assistant。


    你对它说话。不知何故，Google Assistant 能听到你的语音并将其转换为文字。这是一个称为**语音转文字**（STT）的机器学习模型。Google
    Assistant 能理解所说的内容，即理解转换后的文字。这是一个称为**自然语言理解**的机器学习模型。Google Assistant 将你的文字匹配到特定的脚本流程，我们称之为**意图匹配**或**意图分类**。基于训练示例，我们可以匹配用户的真实意图。最后，当它找到答案时，会通过文本合成器为你朗读出来。这是一个**文字转语音**的机器学习模型（TTS），一种使用
    WaveNet 模型、能发出逼真人声的合成器。

    '
- fmt: '# Machine Learning and Google


    Google has invested heavily in Artificial Intelligence (AI) and Machine Learning.
    Google is a data company and has a mission—to organize the world’s information
    and make it universally accessible.


    Google uses Machine Learning algorithms in every Google product. Think about the
    spam filter in Gmail (classifying spam vs. non-spam), video recommendations on
    YouTube, Google Translate to translate text in other languages, relevance in Google
    search results, the Google Assistant, and so on. It’s so commonly used. We take
    it for granted. This also means that every Google engineer gets trained in Machine
    Learning.


    Google uses Machine Learning on absolutely massive data, and that requires robust
    infrastructure. For example, it is finding roads from satellite imagery, predicting
    click-through rate for the ad’s auction, and so on. Yes, you could train a Machine
    Learning model on your laptop. Then, handling massive amounts of data would require
    you to keep your computer up and running for weeks or months. It requires lots
    of data storage, and it requires lots of computing power. That is why Google has
    lots of data centers all over the world, large buildings full of racks with computers,
    which can process data in parallel. You don’t need to wait for weeks or months;
    the more machines you add, the faster the training time. With cloud technology,
    this could be done in minutes.


    Google is also known for the framework `TensorFlow`. It’s a famous Machine Learning
    (Python) framework for creating ML models, used by many data scientists and data
    engineers. It’s one of the most popular open source projects on GitHub. It’s created
    by Jeff Dean, who works for Google. And even though the framework is open source,
    and developers and companies all over the world make contributions, Google has
    a large dedicated team working on improving the codebase.


    ## About Google Cloud


    Google Cloud (formerly known as Google Cloud Platform/GCP) is Google’s public
    cloud provider for computing resources for deploying, building, and operating
    applications—to deliver storage, compute, and services from data centers all over
    the world on fast and secure Google infrastructure. It’s Google, but it doesn’t
    mean that your data is Google’s. Google Cloud is the commercial pay-per-use enterprise
    offering of Google. As written in the signed Google Cloud terms and conditions,
    you are the data owner. Google could process your data but can’t and won’t use
    it for themselves.


    When you are building a chatbot, typically this doesn’t mean that you only use
    a conversational AI tool `Dialogflow`. Just like building a website, you will
    likely need more resources. Think about a place to host your chatbot, store your
    data in a data warehouse or database, and you might want to use additional Machine
    Learning models to detect the contents of a PDF or the sentiment of a text.


    By the time of writing, Google Cloud has over 200 products. There are products
    for computing, storage, networking, data analytics, and Machine Learning for developers,
    for example, Machine Learning APIs for recognizing images (`Vision AI`), videos
    (`Video AI`), texts (`Natural Language API`), languages (`Translate API`), and
    audio (`Speech-to-Text`/`Text-to-Speech API`). Finally, there are Machine Learning
    tools for data scientists to train your models and identity and security tools.
    It’s like Lego. By stacking all these resources on top of each other, you will
    build a product.


    ### Open Source


    Google believes in transparency, by making software and building developer communities.
    Google has over 280k of commits on the open source development platform GitHub,
    with project contributions that are over 15k since 2016. These include popular
    Google open source projects such as Android, Chromium, V8 JavaScript Engine, WebKit,
    Angular, TensorFlow, Kubernetes, Istio, and Go language. I’m sure you probably
    recognize a few. Besides these products that were born at Google, Google also
    contributes to other popular open source projects and standards. Think about HTML5,
    Linux Kernel, Python language, MySQL, GCC (GNU Compiler Collection), Spinnaker,
    and so on. Google wrote lots of industry research white papers, which inspire
    communities and other big software products, for example, MapReduce which was
    later used to create Hadoop.


    Many of these great open source Google products started at Google in the late
    1990s/early 2000s. While many individuals or companies were thinking of building
    a simple web page, Google already had to maintain the most extensive and busiest
    website in the world (the Google search engine), which also needed to be scalable.
    The products that Google engineers created for solving high maintainability/scalable
    problems later became the groundwork for open source software. For example, the
    internal Borg container orchestration system became Kubernetes in the open source
    world.


    And what works in the open source world, Google brought that back to the enterprise
    world by running these products in Google Cloud.'
