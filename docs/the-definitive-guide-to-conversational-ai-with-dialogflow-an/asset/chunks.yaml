    : \"Lee Boonstra\",\n\"engines\": {\n\"node\": \"8\"\n},\n\"scripts\": {\n\"start\"\
    : \"firebase serve --only functions:dialogflowFirebaseFulfillment\",\n\"deploy\"\
    : \"firebase deploy --only functions:dialogflowFirebaseFulfillment\"\n},\n\"dependencies\"\
    : {\n\"actions-on-google\": \"^2.12.0\",\n\"firebase-admin\": \"^5.13.1\",\n\"\
    firebase-functions\": \"^2.0.2\"\n}\n}\nListing 10-9\nThe package.json of a Dialogflow\
    \ fulfillment without using the dialogflow-fulfillment library\n```\n\nAs you\
    \ will notice, I am not using\nany Dialogflow npm packages. Instead, I handle\
    \ the request myself with\nmy custom `handleRequest` method,\nwhich uses a JavaScript\
    \ map to retrieve the function name to execute\nbased on the matched intent name\
    \ (which was returned in the request from\nDialogflow).\nThe `yourFunctionHandler`\n\
    method implements a custom payload, which takes the correct JSON format\nof what’s\
    \ needed for a card. (You can find these formats in the\nDialogflow documentation.)\n\
    \nOnce I have formatted the JSON, I can send this back to the agent, with\n\n\
    ```\nresponse.json(webhookResponse);\n```\n\nBuilding Fulfillments Webhook\n\n\
    Instead of using the inline editor, you can also choose to run your\nfulfillment\
    \ code elsewhere, as long as it runs over HTTPS. This is where\nyou will need\
    \ the webhook option for. See Figure [10-10](#506047_1_En_10_Chapter.xhtml#Fig10).\n\
    \n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig10_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10\nA simple architecture of how fulfillment works with webhook code\n\
    \nWhere to Run My Back-End Code?\nIt’s entirely up to you where you want to run\
    \ your fulfillment code.\nThe previous section discusses the inline\neditor, which\
    \ runs your code under the hood in\n**Firebase**, serverless cloud functions.\
    \ It’s built-in,\nand it’s easy to use.\nFor compliance reasons, you might want\
    \ to run your code elsewhere,\nfor example, **on-premise** (in-house, where you\
    \ maintain\nyour infrastructure) or in Google Cloud.\n\nTip\n\nSince enterprises\
    \ are using the pay-as-you-go edition of Dialogflow\nEssentials, they accepted\
    \ the Google Cloud terms and conditions. Your\ncode and data will be safe and\
    \ secure, and you are the data owner. You\nwill automatically get access to all\
    \ the various computing/serving code\noptions within Google Cloud. Since everything\
    \ within Google Cloud uses\nthe Google backbone undersea cable, this connection\
    \ can transmit 60\nterabytes of data per second. It’s about 10 million times faster\
    \ than\nyour home broadband connection on a good day. Since Dialogflow is a\n\
    Google Cloud solution and one of the computing options, this is the\nfastest way\
    \ of running your code.\n\nHere are the options within Google Cloud you can use\
    \ for your\nwebhooks.\n\nCloud Functions\nCloud\nFunctions lets you automatically\
    \ run back-end code in response to\nevents triggered by Google Cloud/Firebase/Google\
    \ Assistant features and\nHTTPS requests.\nOut of the box, Cloud Functions serves\
    \ your code over HTTPS. Running\nover an HTTPS connection requires a valid and\
    \ trusted SSL certificate.\nCloud Functions will set up out-of-the-box valid,\
    \ secure, and trusted\ncertificates.\n\nCaution\n\nFunctions are stateless, and\
    \ the execution environment is often\ninitialized from scratch, which is called\
    \ a cold start. Cold starts can\ntake significant amounts of time to complete.\
    \ Also, Cloud Function\nexecution time is limited by the timeout duration, which\
    \ you can specify\nat function deployment time. By default, a function times out\
    \ after 1\nminute, but you can extend this period up to 9 minutes. When function\n\
    execution exceeds the timeout, an error status is immediately returned\nto the\
    \ caller. This makes Cloud Functions not always the right solution,\nespecially\
    \ when you have to connect to multiple databases and services\nto fetch information\
    \ from.\n\nApp Engine (Flexible Environment)\nGoogle App\nEngine  is\na cloud\
    \ computing platform as a service for developing and hosting web\napplications\
    \ in Google-managed data centers. Applications are sandboxed\nand run across multiple\
    \ servers. There are various environments to\nchoose from, supporting your favorite\
    \ coding languages. It has no server\nmanagement, which makes it easy for developers\
    \ to bring their code into\nproduction. Out of the box, App Engine serves your\
    \ code over HTTPS.\nRunning over an HTTPS connection requires a valid and trusted\
    \ SSL\ncertificate. App Engine will set up out-of-the-box valid, secure, and\n\
    trusted certificates.\n\nCloud Run\nDevelop and deploy highly scalable containerized\
    \ applications on a\nfully managed serverless platform. You can write\ncode your\
    \ way using your favorite languages (Go, Python, Java, Ruby,\nNode.js, and more).\
    \ Cloud Run will abstract away all infrastructure\nmanagement for a simple developer\
    \ experience. It’s also very portable as\nit builds containers using the open\
    \ standard Knative. This means you can\nrun the containers anywhere you want (Google\
    \ Cloud, other Cloud,\non-premise). Out of the box, Cloud Run serves your code\
    \ over HTTPS.\nCloud Run will set up valid, out of the box, secure, and trusted\n\
    certificates.\nThis chapter will show an example using webhook code on Cloud\n\
    Run.\n\nCaution\n\nCloud Run runs containers, so for each release you have to\
    \ build a\ncontainer and push it to Google Cloud. Unlike App Engine Flexible\n\
    Environment, Cloud Run only runs when requests come in, so you don’t pay\nfor\
    \ time spent idling, but this also means you have to deal with cold\nstarts.\n\
    \nKubernetes Engine\nGoogle Kubernetes\nEngine (GKE)\n is a secured and fully\
    \ managed Kubernetes service, which means\nyou don’t need to worry about setting\
    \ up and maintaining Kubernetes on\nan infrastructure.\n\nTip\n\nIt’s possible\
    \ to build stateful applications with GKE that save data\nto persistent disk storage\
    \ for use by the server, by clients, and by\nother applications. An example of\
    \ a stateful application is a database\nor key-value store to which data is saved\
    \ and retrieved by other\napplications. You won’t have to worry about cold starts\
    \ or event-driven\ntimeouts. But you will need to set up the server yourself.\
    \ In order to\nrun GKE over HTTPS, you will need to connect a domain name and\
    \ attach a\nvalid certificate.\n\nCompute Engine\nCompute Engine\nlets you create\
    \ and run virtual machines on Google’s infrastructure.\n\nCaution\n\nWith VMs,\
    \ you will need to set up and maintain everything (like the\nweb server) yourself.\
    \ In order to run over HTTPS, you will need to\nconnect a domain name and attach\
    \ a valid certificate.\n\nThis chapter will show an example using webhook code\
    \ on Compute\nEngine to show you how to set up secure certificates.\n\nEnable\
    \ Webhooks\n\nYou will have to provide a **URL** to your fulfillment service on\n\
    the **Dialogflow Fulfillment** page, as seen in Figure\n[10-11](#506047_1_En_10_Chapter.xhtml#Fig11).\n\
    \n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig11_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig11_HTML.jpg)\n\
    \nFigure 10-11\nWebhook settings\n\nYour webhook service must meet the following\
    \ requirements:\n\n*   It must handle HTTPS requests. HTTP is not supported. Serverless\n\
    \    computing solutions such as Cloud Run, Cloud Functions, and App Engine\n\
    \    will come out of the box with a URL that runs over HTTPS.\n\n*   The webhook\
    \ service can be behind basic auth or header\n    authentication.\n\n*   It must\
    \ handle POST requests with a JSON\n    **WebhookRequest** body.\n\n*   It must\
    \ respond to WebhookRequest requests with a JSON\n    **WebhookResponse** body.\n\
    \nCloud Function Implementation\nRunning your code from Google Cloud Functions\
    \ is very similar to the\ninline editor. Under the hood, it even makes use\nof\
    \ the same technology, as the inline editor is using Firebase\nFunctions, and\
    \ under the hood, Firebase Functions are Google Cloud\nFunctions. The main difference\
    \ is that Google Cloud will provide you a\nURL, which you can add to the webhook\
    \ section in the Dialogflow\nFulfillment page.\n\nThere are a few other benefits\
    \ to using Cloud Functions over the inline\neditor. This is why many enterprises\
    \ make use of the Cloud Functions\ninstead of the Dialogflow built-in editor:\n\
    \n*   Cloud Functions can be written in more languages than just\n    Node.js\
    \ such as Python, Go, or Java.\n\n*   Cloud Functions will be maintained in the\
    \ same Google Cloud\n    project as your Dialogflow project.\n\n*   Cloud Functions\
    \ are part of Google Cloud, using the same terms\n    and conditions, and are\
    \ committed to compliances.\n\n*   Cloud Functions have integrated monitoring,\
    \ logging, and\n    debugging capability in Google Cloud.\n\n*   You can secure\
    \ Cloud Functions with identity-based or\n    network-based access control.\n\n\
    *   Cloud Functions network settings enable you to control network\n    ingress\
    \ and egress to and from individual functions.\n\n*   Cloud Functions is regional,\
    \ which means the infrastructure that\n    runs your Cloud Function is located\
    \ in a specific region and is managed\n    by Google to be redundantly available\
    \ across all the zones within that\n    region.\n\nListing [10-10](#506047_1_En_10_Chapter.xhtml#PC12)\
    \ shows an\nexample of the code.\n\n```\n// Dialogflow Fulfillment Code\nexports.helloWorld\
    \ = function helloWorld (request, response) {\n// get the Dialogflow request\n\
    // do something\n// return to the agent\nres.send(`Hello from Cloud Functions!`);\n\
    };\nListing 10-10\nThe implementation of a Cloud Function\n```\n\nA Cloud Run,\
    \ App Engine, Compute Engine,\nGKE, or on-premise implementation could make use\
    \ of the Express.js\nframework. It’s a Node.js web application server framework,\
    \ which is\nspecifically designed for building single-page, multipage, and hybrid\n\
    web applications.\n\nExpress Implementation (with Cloud Run)\nUsing an implementation\
    \ on the\nNode.js Express framework can have several advantages over Cloud\nFunctions\
    \ (or Dialogflow inline editor). The main benefit will be that\nyour code can\
    \ be much more organized. Especially when you have a large\ncodebase or are working\
    \ with a large team of developers, you would\ninstead pick this solution.\n\n\
    Here’s an implementation solution on Cloud Run. With Cloud Run, you will\nmake\
    \ use of the following benefits:\n\n*   Write code your way using your favorite\
    \ languages (Go, Python,\n    Java, Ruby, Node.js, and more).\n\n*   Cloud Run\
    \ takes any container image and pairs great with the\n    container ecosystem:\
    \ Cloud Build, Artifact Registry, Docker. This also\n    means you could set up\
    \ CI/CD pipelines.\n\n*   A simple command-line and user interface to quickly\
    \ deploy and\n    manage your services.\n\n*   No infrastructure to manage: once\
    \ deployed, Cloud Run manages\n    your services so you can sleep well.\n\n* \
    \  Cloud Run automatically scales up or down from zero to N\n    depending on\
    \ traffic.\n\n*   Cloud Run services are regional, which means the infrastructure\n\
    \    that runs your Cloud Run app is located in a specific region and is\n   \
    \ managed by Google to be redundantly available across all the zones\n    within\
    \ that region. It can be automatically replicated across multiple\n    zones.\n\
    \n*   Out-of-the-box integration with Cloud Monitoring, Cloud Logging,\n    and\
    \ Error Reporting to ensure an application’s health.\n\n*   Container instances\
    \ run in a secure sandbox isolated from other\n    resources.\n\nListing [10-11](#506047_1_En_10_Chapter.xhtml#Par124)\
    \ shows an\nexample of running a Dialogflow\nfulfillment as a Node.js Express\
    \ implementation on Cloud Run. You will\nsee that the implementation is similar\
    \ to the inline editor\nimplementation of the previous section, except that the\
    \ implementation\nof Express is a little different.\n***Listing 10-11.*** Example\
    \ of a Dialogflow\nfulfillment running as a Node.js Express application on Cloud\
    \ Run.\nIndex.js\n`'use strict';`\n`const express = require('express');`\n`const\
    \ bodyParser = require('body-parser');`\n`const basicAuth = require('express-basic-auth');`\n\
    `const { WebhookClient, Card, Suggestion } = require('dialogflow-fulfillment');`\n\
    `process.env.DEBUG = 'dialogflow:debug'; // enables lib debugging statements`\n\
    `// Dialogflow Fulfillment Code`\n`function welcome(agent) {`\n``agent.add(`Welcome\
    \ to my agent!`);``\n`}`\n`function fallback(agent) {`\n``agent.add(`I didn't\
    \ understand`);``\n``agent.add(`I'm sorry, can you try again?`);``\n`}`\n`function\
    \ yourFunctionHandler(agent) {`\n``agent.add(`Ok. Buying product:`);``\n`console.log(agent.parameters);`\n\
    `agent.add(new Card({`\n`title: agent.parameters.producttype,`\n`imageUrl: 'https://dummyimage.com/300x200/000/fff',`\n\
    ``text: `This is the body text of a card.  You can even use line\\n  breaks and\
    \ emoji!`` ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fige_HTML.gif](images/506047_1_En_10_Chapter/506047_1_En_10_Fige_HTML.gif),\n\
    `buttonText: 'This is a button',`\n`buttonUrl: 'https://console.dialogflow.com/'`\n\
    `})`\n`);`\n``agent.add(new Suggestion(`Quick Reply`));``\n``agent.add(new Suggestion(`Suggestion`));``\n\
    `agent.context.set({ name: 'gamestore-picked', lifespan: 2, parameters: { gameStore:\
    \ 'DialogflowGameStore' }});`\n`}`\n`// Express Code`\n`const app = express().use(bodyParser.json());`\n\
    `// Basic Authentication`\n`app.use(basicAuth({`\n`users: { 'admin': 'supersecret'\
    \ }`\n`}));`\n`app.use(function(req, res, next) {`\n`if (!req.headers['x-auth'])\
    \ {`\n`return res.status(403).json({ error: 'No auth headers sent!' });`\n`}`\n\
    `next();`\n`});`\n`app.post('/fulfillment', (request, response) => {`\n`const\
    \ agent = new WebhookClient({ request, response });`\n`console.log('Dialogflow\
    \ Request headers: ' + JSON.stringify(request.headers));`\n`console.log('Dialogflow\
    \ Request body: ' + JSON.stringify(request.body));`\n`// Run the proper function\
    \ handler based on the matched Dialogflow intent name`\n`let intentMap = new Map();`\n\
    `intentMap.set('Default Welcome Intent', welcome);`\n`intentMap.set('Default Fallback\
    \ Intent', fallback);`\n`intentMap.set('Buy product regex', yourFunctionHandler);`\n\
    `agent.handleRequest(intentMap);`\n`});`\n`app.get('/', (req, res) => {`\n``res.send(`OK`);``\n\
    `});`\n`const port = process.env.PORT || 8080;`\n`app.listen(port, () => {`\n\
    `console.log('Dialogflow Fulfillment listening on port', port);`\n`});`\n\nThis\
    \ **index.js** uses the **package.json** as\nshown in Listing [10-12](#506047_1_En_10_Chapter.xhtml#PC14)\
    \ to load the\nnpm packages.\n\n```\n{\n\"name\": \"dialogflow-fulfillment\",\n\
    \"description\": \"This is the default fulfillment for a Dialogflow agents using\
    \ Cloud Run\",\n\"version\": \"0.0.1\",\n\"private\": true,\n\"license\": \"Apache\
    \ Version 2.0\",\n\"author\": \"Lee Boonstra\",\n\"engines\": {\n\"node\": \"\
    8\"\n},\n\"scripts\": {\n\"start\": \"node index.js\",\n\"build\": \"gcloud builds\
    \ submit --tag gcr.io/dialogflowcookbook/dialogflow\",\n\"deploy\": \"gcloud run\
    \ deploy --image gcr.io/dialogflowcookbook/dialogflow --platform managed\"\n},\n\
    \"dependencies\": {\n\"@google-cloud/dialogflow\": \"^2.0.0\",\n\"actions-on-google\"\
    : \"^2.5.0\",\n\"body-parser\": \"^1.19.0\",\n\"dialogflow-fulfillment\": \"^0.6.1\"\
    ,\n\"express\": \"^4.17.1\",\n\"express-basic-auth\": \"^1.2.0\"\n}\n}\nListing\
    \ 10-12\nThe required packages in package.json\n```\n\nYou will need to include\
    \ a Dockerfile to build a\ncontainer; see Listing [10-13](#506047_1_En_10_Chapter.xhtml#PC15).\n\
    \n```"
  trans: "\n# 将您的智能体与 Dialogflow Messenger 集成\n\nDialogflow Messenger 集成是一个更高级的小部件，您可以将其放置在网站中，用于连接您的\
    \ Dialogflow 智能体。它仅适用于文本聊天。该组件的外观和风格是可定制的。虽然一些企业更倾向于自己构建 Web 集成（例如，以便连接到更多系统），但许多企业喜欢\
    \ Dialogflow Messenger 组件，因为它是与您的网站或 Web 应用集成的简单快捷方式。\n\n在 Dialogflow 控制台中，点击\
    \ **集成** 菜单。\n\n点击集成选项：**Dialogflow Messenger**。\n\n将出现一个弹出窗口（图 6-11），其中显示一个（JavaScript）代码片段，您可以将其复制并粘贴到您的网站中。\n\
    \n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig11_HTML.jpg](img/506047_1_En_6_Fig11_HTML.jpg)\n\
    \n图 6-11 Dialogflow Messenger 实现\n\n当您点击弹出窗口中的 **立即尝试** 按钮时，您将看到实现的效果。它会在屏幕底部显示一个弹出按钮（图\
    \ 6-12，带有在 Dialogflow 设置中设置的头像）。\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig12_HTML.jpg](img/506047_1_En_6_Fig12_HTML.jpg)\n\
    \n图 6-12 Dialogflow Messenger 弹出按钮\n\n此按钮将打开一个聊天弹出窗口（图 6-13），它实际上是一个 Web 组件（`df-messenger`）。\n\
    \n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig13_HTML.jpg](img/506047_1_En_6_Fig13_HTML.jpg)\n\
    \n图 6-13 Dialogflow Messenger Web 组件\n\n清单 6-3 显示了可以在您的网站上实现的 JavaScript 代码。将您之前复制的嵌入代码粘贴到您网站的一个网页中。`<script>`\
    \ 和 `<df-messenger>` HTML 元素应位于您网页的 `<body>` 元素内。\n\n```\n清单 6-3\nDialogflow Messenger\
    \ 实现示例，Web 组件\n```\n\n为了支持响应式布局，还需将以下内容添加到您的页面：\n\n```\n可以通过在 `df-messenger` 组件中设置\
    \ `expand=\"true\"` 来展开 Web 组件，而无需点击按钮。\n您还可以在加载网页时保持初始语音气泡关闭，通过设置 `wait-open=\"\
    true\"`。\n```\n\nDialogflow Messenger 组件不支持语音。此外，它只能支持一种语言。但是，您可以使用一个 *超级智能体*\
    \ 并创建多个不同语言的子智能体。\n\n## 更改聊天机器人组件的外观和风格\n\nDialogflow Web 组件提供了广泛的设置来覆盖您聊天机器人的样式。您只需在\
    \ `<df-messenger>` 组件上方添加一个样式标签，并包含您选择的 CSS 变量，如清单 6-4 所示。\n\n```\ndf-messenger\
    \ {\n--df-messenger-bot-message: #282828;\n--df-messenger-button-titlebar-color:\
    \ #ff9000;\n--df-messenger-button-titlebar-font-color: #ffffff;\n--df-messenger-chat-background-color:\
    \ #121212;\n--df-messenger-font-color: white;\n--df-messenger-send-icon: #878fac;\n\
    --df-messenger-user-message: #535353;\n--df-messenger-input-font-color: #000;\n\
    --df-messenger-input-placeholder-font-color: #cccccc;\n--df-minimized-chat-close-icon-color:\
    \ #ff9000;\n}\n\n清单 6-4\nDialogflow Messenger Web 组件的样式\n```\n\n图 6-14 显示了这些样式设置在浏览器中渲染聊天机器人后的效果。\n\
    \n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig14_HTML.jpg](img/506047_1_En_6_Fig14_HTML.jpg)\n\
    \n图 6-14 具有自定义样式的 Dialogflow Messenger\n\n## 富消息支持\n\n您可以通过在 Dialogflow 的意图中的\
    \ **默认自定义负载** 框中添加代码来添加富消息响应，如图 6-15 所示。\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig15_HTML.jpg](img/506047_1_En_6_Fig15_HTML.jpg)\n\
    \n图 6-15 Dialogflow Messenger 自定义负载\n\n支持的富消息包括信息**响应**、**图片**、**列表**（如图 6-16\
    \ 所示）、**手风琴**（可展开的框）、**按钮**和**建议芯片**。请注意可以包含数组的 `richContent` 字段。您可以在 Dialogflow\
    \ 文档中找到实现示例。\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig16_HTML.jpg](img/506047_1_En_6_Fig16_HTML.jpg)\n\
    \n图 6-16 Dialogflow Messenger 自定义负载示例\n\n还有可用的 JavaScript 事件触发器，例如，用于渲染更多自定义富消息或使链接可点击。这些事件的事件目标是\
    \ `df-messenger` 元素（参见清单 6-5）或 `window` 全局变量。\n\n要为 `df-messenger` 元素添加事件监听器，请添加以下\
    \ JavaScript 代码，其中 `eventType` 是清单 6-5 中描述的事件名称之一。\n\n```\nconst dfMessenger =\
    \ document.querySelector('df-messenger');\ndfMessenger.addEventListener('eventType',\
    \ function (event) {\n// 处理事件\n...\n});\n清单 6-5\nDialogflow Messenger 在 Web 组件上创建事件监听器\n\
    ```\n\n要为 `window` 添加事件监听器，请添加以下 JavaScript 代码（清单 6-6），其中 `eventType` 是描述的事件名称之一。\n\
    \n```\nwindow.addEventListener('eventType', function (event) {\n// 处理事件\n...\n\
    });\n清单 6-6\nDialogflow Messenger 在 window 元素上创建事件监听器\n```\n\n## 总结\n\n本章描述了一些开箱即用的（基于文本的）集成，这些集成解决了以下任务：\n\
    \n* 您希望通过 Hangouts 集成将您的聊天机器人部署到 Google Chat。\n* 您希望通过 Web 演示快速将您的聊天机器人部署到网站。\n\
    * 您希望通过 Dialogflow Messenger 快速将您的聊天机器人部署到网站并更改其外观和风格。\n\n本书的源代码可通过本书的产品页面在 GitHub\
    \ 上获取，网址为 [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4)。请查看\
    \ `deploying-integrations-webcomponent` 和 `_dialogflow-agent`（**Buy_Console intent**）文件夹。\n\
    \n## 延伸阅读\n\n* 允许机器人的 Google Workspace 文档\n  [`https://support.google.com/a/answer/7651360`](https://support.google.com/a/answer/7651360)\n\
    * 关于 Google Chat 的 Dialogflow 文档\n  [`https://cloud.google.com/dialogflow/es/docs/integrations/hangouts`](https://cloud.google.com/dialogflow/es/docs/integrations/hangouts)\n\
    * 关于 Google Chat API 的 Google 文档\n  [`https://developers.google.com/hangouts/chat`](https://developers.google.com/hangouts/chat)\
    \ 和 [`https://developers.google.com/hangouts/chat/how-tos/bots-publish`](https://developers.google.com/hangouts/chat/how-tos/bots-publish)\n\
    * Google Chat 卡片文档\n  [`https://developers.google.com/hangouts/chat/reference/message-formats/cards`](https://developers.google.com/hangouts/chat/reference/message-formats/cards)\n\
    * 关于集成的 Dialogflow 文档\n  [`https://cloud.google.com/dialogflow/es/docs/quick/integration`](https://cloud.google.com/dialogflow/es/docs/quick/integration)\n\
    * 关于 Dialogflow Messenger 的 Dialogflow 文档\n  [`https://cloud.google.com/dialogflow/es/docs/integrations/dialogflow-messenger`](https://cloud.google.com/dialogflow/es/docs/integrations/dialogflow-messenger)\n\
    * 关于 Web 组件的更多信息\n  [`https://developers.google.com/web/fundamentals/web-components/shadowdom`](https://developers.google.com/web/fundamentals/web-components/shadowdom)\n\
    \n# 7. 构建语音智能体\n\n让我们讨论一下语音机器人。通常，当我们想到语音聊天机器人时，我们会想到智能助手，例如 Google Assistant、Alexa\
    \ 或 Siri。但实际上，还有另一个著名的商业案例可以使用虚拟智能体——联络中心和电话线路中的机器人。\n\n由于 **Google Assistant**\
    \ 和 Dialogflow 都是 Google 产品，因此将语音机器人部署到 Google Assistant 如此简单，您不会感到惊讶。\n\n**Dialogflow\
    \ 电话网关** 功能为您的智能体提供了电话接口。这对于创建绑定到服务号码的入站简单交互式语音响应非常有用，例如电话预订系统或简单的信息热线。\n\n拨打该电话号码的用户将连接到\
    \ Dialogflow 语音智能体。通过语音转文本 (STT) 和文本转语音 (TTS) 技术，可以使用类似人类的声音非常自然地处理对话。\n\nGoogle\
    \ Cloud 有一个名为 **Contact Center AI** 的解决方案。这是一个用于电话联络中心的现成解决方案，它利用人工智能来自动化对话并实时帮助人工座席。无需机器学习专业知识，因为\
    \ Contact Center AI 将通过知名的电话合作伙伴（例如 Genesys、Avaya、Mitel、Twilio、Cisco、Five9 等）交付和启用。它使用了流行的\
    \ Google Cloud 组件，包括 Dialogflow、语音转文本和文本转语音。\n\n本章将涵盖所有这些内容，包括如何改进您的语音机器人。\n\n\
    ## 为类似 Google Assistant 的虚拟助手构建语音 AI\n\n让我们从一个易于构建的语音 AI 解决方案开始，为 Google Assistant\
    \ 构建一个语音 AI。两者都是 Google 产品，并且在使用 Dialogflow 时是开箱即用的集成。使其工作只需启用服务并为两个服务使用相同的 Google\
    \ 用户帐户。一旦启用，您的 Dialogflow 智能体就可以作为一项操作（Google Assistant 应用）供 Google Assistant\
    \ 使用。最终用户可以通过他们的唤醒词来调用该操作：*嘿 Google，与 <操作名称> 对话。* 在底层，它将打开您的 Dialogflow 智能体，让\
    \ Google Assistant 处理语音转文本和文本转语音。Dialogflow 将用于自然语言理解、意图匹配、实体识别和内容管理。参见图 7-1 中的图表。\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig1_HTML.jpg](img/506047_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1 用户与 Google Assistant 交互，通过 Google 上的操作，Google Assistant 连接到 Dialogflow\
    \ 智能体。这一切都是开箱即用的\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig2_HTML.jpg](img/506047_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2 设置 Google Assistant 集成\n\n1. 首先，点击 **集成** ➤ **Google Assistant** ➤ **集成设置**。这将打开一个弹出窗口；参见图\
    \ 7-2。点击 **测试** 按钮。这将打开 Google 上的操作控制台 ([`https://console.actions.google.com/`](https://console.actions.google.com/))。请注意；您使用与\
    \ Dialogflow 相同的 Google 帐户登录到 Google 上的操作。如果这给您带来问题（通常是由于拥有多个 Google 帐户），请注销所有帐户，然后尝试重新登录。\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig3_HTML.jpg](img/506047_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3 当您初次使用 Google 上的操作时，您必须填写此表单\n\n2. 当您初次使用 Google 上的操作时，您需要填写一个表单以同意服务条款（参见图\
    \ 7-3）。\n\n3. 现在您进入了模拟器。确保模拟器设置为英语（美国），选择一个设备（例如，手机），然后点击 **与我的测试应用对话**。\n\n*该操作将使用基本的\
    \ Dialogflow 默认意图向您打招呼。这意味着与 Google 上的操作的集成设置成功了！参见图 7-4。*\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig4_HTML.jpg](img/506047_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4 您的 Dialogflow 智能体在 Google 上的操作模拟器中运行 ([`https://console.actions.google.com`](https://console.actions.google.com))\n\
    \n### 富消息\n\n当您为 Google Assistant 构建操作时，您可能希望使用 Google 上的操作提供的特定富消息。一旦您在 Dialogflow\
    \ 中设置了 Google Assistant 集成，您会注意到您的意图响应块中有一个新选项卡（图 7-5）。\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig5_HTML.jpg](img/506047_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5 自定义 Google Assistant 响应\n\n如果它不存在，您可以通过点击 **+** 选项卡轻松地将此选项卡添加到您的响应块中。\n\
    \nGoogle Assistant 选项卡中有三个主要设置：\n\n1. 您可以选择不覆盖 *DEFAULT* 选项卡。例如，如果默认文本响应与 Google\
    \ Assistant 文本响应相同，您可能希望启用第一个开关。\n2. **添加响应** 按钮，用于向您的智能体添加富消息（自定义负载）。\n3. 一个开关，用于在对话结束时设置意图。在\
    \ Google Assistant 上，这意味着您正在离开您操作的范围。例如，您可以创建一个再见意图并启用此开关。\n\n当您点击 **添加响应**（图\
    \ 7-6）按钮时，您可以在以下自定义负载响应之间进行选择：\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig6_HTML.jpg](img/506047_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6 点击添加响应按钮以显示弹出窗口，用于在各种自定义 Google Assistant 响应之间进行选择\n\n* **简单响应**：简单响应在视觉上采用聊天气泡的形式，并使用文本转语音\
    \ (TTS) 或语音合成标记语言 (SSML) 来生成声音。\n* **基本卡片**：基本卡片主要用于显示目的。它们设计得简洁明了，用于向用户呈现关键（或摘要）信息，并允许用户选择了解更多信息（使用网页链接）。\n\
    * **列表**：单选列表向用户呈现多个项目的垂直列表，并选择一个项目。从列表中选择一个项目会生成一个包含列表项标题的用户查询（聊天气泡）。\n* **建议芯片**：使用建议芯片来继续或转变对话；它们看起来像小按钮。\n\
    * **轮播卡片和浏览轮播卡片**：轮播是一种富响应，允许用户垂直滚动并在集合中选择一个磁贴。Dialogflow 有两种不同的轮播配置：轮播和浏览轮播。\n\
    * **链接建议**：链接到外部网站。\n* **媒体内容**：媒体响应允许您的操作播放音频内容，其播放时长超过 SSML 的 240 秒限制。\n* **表格卡片**：表格卡片允许您在响应中显示表格数据（例如，体育排名、选举结果和航班）。您可以定义助手需要在您的表格卡片中显示的列和行（最多各\
    \ 3 个）。您还可以指定额外的列和行及其优先级。表格与垂直列表不同，因为表格显示静态数据并且不可交互，就像列表元素一样。\n* **自定义负载**：您可以按照\
    \ Google 上的操作期望的格式编写 JSON，例如，当您希望在卡片中包含更多按钮或部分时。\n\n### 履行和 Webhook\n\n对于开发者来说，Google\
    \ 上的操作有自己的客户端库；它在 Node 包管理器 (NPM) 中以 `actions-on-google-nodejs` 的名称提供。\n\n该客户端库使得为\
    \ Google Assistant 创建操作变得容易，并支持 Dialogflow、Actions SDK 和 Smart Home 履行。您可以将代码部署在自己的服务器上，或使用\
    \ Dialogflow 内联编辑器。有关履行和 Webhook 的更多信息，请参见第 10 章。清单 7-1 显示了一个 Google 上的操作 Webhook\
    \ 示例：\n\n```\nconst {\ndialogflow,\nImage\n} = require('actions-on-google')\n\
    // 创建一个应用实例\nconst app = dialogflow();\n// 为 Dialogflow 意图注册处理程序\napp.intent('Default\
    \ Welcome Intent', conv => {\nconv.ask('嗨，最近怎么样？')\nconv.ask(`这是一张猫的图片`)\nconv.ask(new\
    \ Image({\nurl: 'https://developers.google.com/web/fundamentals/accessibility/semantics-builtin/imgs/160204193356-01-cat-500.jpg',\n\
    alt: '一只猫',\n}));\n});\n// Dialogflow 中名为 `Goodbye` 的意图，用于关闭操作\napp.intent('Goodbye',\
    \ conv => {\nconv.close('回头见！')\n});\napp.intent('Default Fallback Intent', conv\
    \ => {\nconv.ask(`我没听明白。你能告诉我点别的吗？`)\n});\n清单 7-1\nGoogle 上的操作 Webhook 示例\n```\n\
    \n在这段示例代码中，您可以看到 Dialogflow 将从 `actions-on-google` 库中加载。一旦您有了一个 Dialogflow 应用实例，您就可以注册监听\
    \ Dialogflow 中调用的意图的处理程序。\n\n使用 `conv()` 对象，您可以返回内容。这可以是文本，它将被合成为语音，但它也可以包含丰富的\
    \ UI 响应，例如图片、基本卡片、列表等。\n\n`actions-on-google` 库包含更多函数和辅助类，例如，用于请求位置、用户信息、帐户登录、检测屏幕等。\n\
    \n### 通过显式和隐式调用在 Google Assistant 上调用您的操作\n\n当用户通过名称告诉 Google Assistant 使用您的操作时，就会发生**显式**调用，例如\
    \ *嘿 Google，与*（触发短语）→ *<我的操作名称>*（开发者指定的调用名称）→ *做 x y z*（开发者指定的调用短语）。参见图 7-7。可选地，用户可以在其调用的末尾包含一个调用短语，该短语将直接带他们到他们请求的功能。\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig7_HTML.jpg](img/506047_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7 Google Assistant 显式调用\n\n也可以选择一个或多个**隐式调用**意图。这是用户无需指定应用名称即可调用您的应用的方式。例如，如果您的应用可以定位附近的音乐会，用户可以这样说：“*好的，Google，我想找找附近的音乐会。*”\
    \ Google Assistant 会尝试将用户的请求与适当的履行（例如操作、搜索结果或移动应用）进行匹配，然后向用户呈现推荐。为了找到匹配的操作，Google\
    \ 使用信号，例如用户告诉 Assistant 执行类似于您配置的某个意图的调用短语的操作，或者当用户处于您的操作可能适用的上下文中时。\n\n此交互过程如下：\n\
    \n1. 用户要求 Assistant 执行一项任务。\n2. 推荐算法确定您的操作可以完成用户的任务。\n3. Assistant 向用户推荐您的操作。\n\
    \n要设置显式和隐式意图，请点击 Dialogflow 中的 **集成** ➤ **Google Assistant** ➤ **集成设置** 链接（图 7-8）。并在两个发现下拉菜单中选择意图。\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig8_HTML.jpg](img/506047_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8 在 Dialogflow 中设置调用\n\n### 通过 Google 上的操作提交操作\n\nGoogle 有一个框架，包括 UI 工具包、SDK、模拟器和用于将您的操作部署到\
    \ Google Assistant 的工具。它被称为 ***Actions on Google***。\n\n您可以使用 [`https://console.actions.google.com/`](https://console.actions.google.com/)\
    \ 打开操作控制台。当您在 Dialogflow、Google 上的操作和您的 Google Assistant 设备上使用相同的 Gmail/Google\
    \ 帐户登录时，您就可以在物理设备上开箱即用地测试您的应用程序。\n\n在提交您的操作进行审批之前，我们建议您浏览一份发布前检查清单。使用检查清单可以捕获我们在审批过程中看到的许多问题，并提高您的项目获得批准的机会。每次您在提交后更新操作包时，都必须经过另一个审批周期。\n\
    \n> **提示**\n> 使用 Dialogflow ES，可以创建智能体的不同版本，以便在提交操作之前创建 Dialogflow 智能体的不可变版本。这种方法使您能够创建\
    \ Dialogflow 智能体的多个版本，将它们发布到不同的环境，并在必要时回滚到以前的版本。\n\n您可以从 Google 上的操作控制台的 **部署**\
    \ 选项卡内部署您的操作。\n\n### 使用 Actions SDK 构建操作\n\nGoogle Assistant 上可用的所有操作中，百分之九十实际上是用\
    \ Dialogflow 构建的。这背后的原因很简单；两者都是 Google 产品，通过 Dialogflow 集成选项卡发布操作非常容易。您为什么要选择不同的方式呢？\n\
    \n还有另一种部署操作的方式，那就是通过 Actions SDK。这要复杂得多，因为您必须自己构建集成，但这样做有一些优点。您可能不希望让 Google 上的操作直接与\
    \ Dialogflow 对话，而是让 Google 上的操作连接到您自己的后端层，而后端层再连接到 Dialogflow；参见图 7-9。\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig9_HTML.jpg](img/506047_1_En_7_Fig9_HTML.jpg)\n\
    \n图 7-9 Google 上的操作连接到您的代码库，您的代码库连接到 Dialogflow 智能体以进行意图检测\n\n正在构建支持多个渠道的大型客户体验平台的企业可能希望使用\
    \ Dialogflow 作为 NLU 意图检测层，该层将在单一位置编写和维护；所有渠道，包括 Google 上的操作，都将作为中间件。该中间件的唯一目的是捕获用户输入（键入的文本或转录为文本的语音音频），发送响应文本或音频，并以正确的格式呈现。例如，您合成的语音不应包含任何超链接，并且您可能还想支持\
    \ Google Assistant UI 小部件，例如卡片。架构将如图 7-10 所示。\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig10_HTML.jpg](img/506047_1_En_7_Fig10_HTML.jpg)\n\
    \n图 7-10 Google 上的操作连接到您的代码库，该代码库有一个用于处理 Actions SDK 并返回 SSML 或 Assistant 视图的中间件层，并且它有一个连接到\
    \ Dialogflow 智能体以进行意图匹配的脚本。其他渠道可以重用最后一部分\n\n> **提示**\n> 如果您使用的是 Dialogflow CX\
    \ 而不是 Dialogflow Essentials，那么在撰写本文时，Actions SDK 解决方案是将您的对话带到 Google Assistant\
    \ 的唯一方法。\n\n通过使用 Actions SDK，您需要自带 NLU/意图检测。当您选择 Dialogflow（Essentials 或 CX）时，您将受益于快速的\
    \ Google 骨干网连接，因为 Google 上的操作和 Dialogflow 都是使用 Google 网络的 Google 产品，当然还有同样为 Google\
    \ Assistant 提供支持的 Google 出色的 NLU。\n\n### 使用 Actions SDK 解决方案\n\n为了构建此集成，您需要使用\
    \ Actions SDK npm 库和 Dialogflow API。清单 7-2 将向您展示如何构建此集成的示例。\n\n1. 导入库。\n2. 创建一个\
    \ Google Assistant 应用实例。\n3. 为 Actions SDK 意图注册处理程序。\n4. 当操作启动时，将触发 `actions.intent.MAIN`。我们将通过传入事件名称\
    \ \"`WELCOME`\" 来获取默认欢迎意图。\n5. 让 Google Assistant 说出 `fulfillmentText`。\n6. 我们将使用\
    \ `actions.intent.TEXT` 作为捕获所有传入用户输入（由 Google Assistant 语音转文本转录的口语文本或书面文本）的通用意图，并在\
    \ Dialogflow 中进行文本意图检测。\n7. 要创建 Dialogflow 会话客户端和会话路径，我们需要一个唯一 ID 和 Dialogflow\
    \ 项目 ID。步骤 7 到 9，Dialogflow SDK 的使用，将在第 10、11 和 12 章中进一步解释。\n8. 这是将使用文本对象或事件对象形成的请求。\n\
    9. 现在我们调用 `sessionClient` 的 `detectIntent` 方法，并传入请求。它将返回一个 promise；一旦 promise\
    \ 完成，它将返回响应（履行文本）。\n\n```\n// 1)\nconst { actionssdk } = require('actions-on-google');\n\
    const dialogflow = require('@google-cloud/dialogflow');\nconst uuid = require('uuid');\n\
    // 2)\nconst app = actionssdk();\n// 3)\napp.intent('actions.intent.MAIN', async\
    \ (conv) => {\n// 4)\nvar queryInput = {\nevent: {\nname: 'WELCOME',\nlanguageCode:\
    \ 'en'\n}\n};\nvar response = await dialogflowDetection(queryInput);\n// 5)\n\
    conv.ask(response.response.queryResult.fulfillmentText);\n})\napp.intent('actions.intent.TEXT',\
    \ (conv, input) => {\n// 6)\nvar queryInput = {\ntext: {\ntext: input,\nlanguageCode:\
    \ 'en'\n}\n};\nvar response = await dialogflowDetection(queryInput);\nconv.ask(response.queryResult.fulfillmentText);\n\
    });\nasync function dialogflowDetection(){\n// 7)\nconst sessionId = uuid.v4();\n\
    const sessionClient = new dialogflow.SessionsClient();\nconst sessionPath = sessionClient.projectAgentSessionPath(projectId,\
    \ sessionId);\n// 8)\nconst request = {\nsession: this.sessionPath,\nqueryInput:\
    \ qInput,\nqueryParams: null\n};\n// 9)\nconst [response] = await this.sessionClient.detectIntent(request);\n\
    return response;\n}\n清单 7-2\n代码实现\n```\n\nActions SDK 需要一个 *操作包文件* (`action.json`)，它是一种\
    \ JSON 清单文件，描述要“监听”的意图，并告诉 Google Assistant 一旦触发此类意图该做什么。参见清单 7-3。\n\n```\n{\n\
    \"actions\": [\n{\n\"description\": \"默认欢迎意图\",\n\"name\": \"MAIN\",\n\"fulfillment\"\
    : {\n\"conversationName\": \"welcome\"\n},\n\"intent\": {\n\"name\": \"actions.intent.MAIN\"\
    ,\n\"trigger\": {\n\"queryPatterns\":[\"与 CCAIDemo 对话\"]\n}\n}\n},\n{\n\"description\"\
    : \"Dialogflow 意图\",\n\"name\": \"TEXT\",\n\"fulfillment\": {\n\"conversationName\"\
    : \"dialogflow_intent\"\n},\n\"intent\": {\n\"name\": \"actions.intent.TEXT\"\
    ,\n}\n}\n],\n\"conversations\": {\n\"welcome\": {\n\"name\": \"welcome\",\n\"\
    url\": \"https://www.leeboonstra.dev/webhook/\"\n},\n\"dialogflow_intent\": {\n\
    \"name\": \"dialogflow_intent\",\n\"url\": \"https://www.leeboonstra.dev/webhook/\"\
    \n}\n},\n\"locale\": \"en\"\n}\n清单 7-3\naction.json 文件将意图映射到履行\n```\n\n每个 Actions\
    \ 项目都必须有一个欢迎意图，作为用户开始对话的入口点。当用户通过说出其名称（例如，“嘿 Google，与视频游戏智能体对话”）显式调用操作时，会触发欢迎意图。此欢迎意图使用\
    \ `actions.intent.MAIN` 意图名称标识。\n\n您可以在操作包中创建其他条目，其中包含您自己定义的意图。但是，对于 Dialogflow\
    \ 项目，您将需要 `actions.intent.TEXT` 意图，它将像一个通用捕获器一样工作。所有口头或键入的输入都作为 `actions.intent.TEXT`\
    \ 意图发送。请注意清单 7-2 中的第 6 点以及清单 7-3 中的 `actions.intent.TEXT` 块。您可以简单地获取原始文本并将其转发到您的履行服务器。从那里，您可以使用\
    \ Dialogflow 处理文本并构建响应以发送回 Google 上的操作。\n\n您可以忽略关于 Actions SDK 的其他几乎所有内容。但是，还有其他不错的功能，例如触发器。这允许用户通过说出操作名称和意图来调用特定功能（例如，“嘿\
    \ Google，与 ExampleAction 对话以查找一些鞋子”）。\n\n在下一个清单，清单 7-4 中，请注意 `trigger` 块。`queryPatterns`\
    \ 作为一个语音适应列表，带有提示，用于偏置语音转文本模型，以确保参数块中标记的正确参数被发送到您的 NLU 检测层。如果没有这些提示，STT 模型可能会听到类似“买一些蓝色运动鞋”而不是“买一些蓝色绒面革鞋”的内容。您的\
    \ NLU 层将无法理解“运动鞋”。\n\n```\n{\n\"description\": \"直接访问\",\n\"name\": \"BUY\",\n\
    \"fulfillment\": {\n\"conversationName\": \"ExampleAction\"\n},\n\"intent\": {\n\
    \"name\": \"com.example.ExampleAction.BUY\",\n\"parameters\": [\n{\n\"name\":\
    \ \"color\",\n\"type\": \"org.schema.type.Color\"\n}\n],\n\"trigger\": {\n\"queryPatterns\"\
    : [\n\"找一些 $org.schema.type.Color:color 运动鞋\",\n\"买一些蓝色绒面革鞋\",\n\"买跑鞋\"\n]\n}\n\
    }\n}\n清单 7-4\n在 action.json 文件中偏置 STT 模型\n```\n\n`conversations` 块充当路由器；它需要访问公共\
    \ HTTPS URL 以检索履行。您的后端履行接收来自 Assistant 的请求，处理请求并做出响应。您可以将此后端代码托管在任何您想要的地方——本地或\
    \ Google Cloud 中。第 10 章将讨论各种计算解决方案，只要您监听 POST 请求即可。\n\n如果您使用 express 构建后端服务器，您的\
    \ POST 路由将如下所示：\n\n```\nvar assistant = actionssdk();\nexpressApp.post('/webhook/',\
    \ assistant);\n```\n\n如果您想在本地运行它，您将需要一个像 **ngrok** 这样的工具来创建一个安全隧道。这是因为 Google\
    \ Assistant 在云端工作，Dialogflow 也是如此。您的履行需要通过 HTTPS 上的非本地 URL 可用。第 10 章将更详细地讨论 ngrok。\n\
    \nGoogle 上的操作还提供了一个名为 **gactions** 的命令行工具。使用命令 `gactions init`，您可以生成样板代码，类似于清单\
    \ 7-3。\n\n### 部署您的操作\n\n要上传您的操作包，您将需要 `gactions` 命令行工具并运行以下命令，将 `PACKAGE_FILE`\
    \ 和 `PROJECT_ID` 替换为您的项目的相关值：\n\n```\ngactions update --action_package PACKAGE_FILE\
    \ --project PROJECT_ID\n```\n\n## 使用电话网关构建呼叫机器人\n\nDialogflow ES 电话网关是为电话设置入站语音智能体的简单方法。您将获得一个免费电话号码；当您拨打该号码时，Dialogflow\
    \ 智能体将与您通话。用例更适用于简单的电话机器人（如预订系统）或测试目的。如果您想将机器人集成到您的 IVR/联络中心中，或者已经拥有现有的联络中心（电话合作伙伴），那么通过\
    \ Contact Center AI（如下一节所述）启用 Dialogflow 对您来说将是更好的解决方案。\n\n当您使用 Dialogflow 试用版时，您将无法访问免费电话号码。并且您将获得有限的配额，例如每分钟总通话分钟数为\
    \ 3 分钟，每天 30 分钟通话，每月 500 分钟通话，并且电话号码仅保留 30 天。企业级套餐将包括每分钟 100 分钟通话。换句话说，Dialogflow\
    \ 试用版非常适合测试电话网关，但您需要迁移到付费的企业级套餐才能在生产环境中使用它。当您在通话过程中遇到忙音或通话中断时，这意味着您已超出配额。\n\n\
    让我们启用电话网关。\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig11_HTML.jpg](img/506047_1_En_7_Fig11_HTML.jpg)\n\
    \n图 7-11 在设置面板中启用 Beta 功能和 API\n\n1. 在撰写本文时，此功能处于 Beta 阶段。如果您在设置面板中找不到语音选项卡，您需要先启用\
    \ Beta 功能（参见图 7-11）。这可以在 **设置** ➤ **常规** 选项卡中找到。\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig12_HTML.jpg](img/506047_1_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12 启用\n"
