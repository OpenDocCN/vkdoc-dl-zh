- fmt: '# Session Id


    A `session id` is handy for finding all transcripts of a certain session, to read
    the full conversation transcript and to figure out the total of unique users.


    Bot building tools like Dialogflow will maintain a session path per chat session.
    This chat session path is bound to your agent account (so no one else can snoop
    in), and it’s unique as it contains a uuid.


    ```javascript

    const sessionId = uuid.v4();

    const sessionClient = new df.SessionsClient();

    const sessionPath = sessionClient.sessionPath(projectId, sessionId);

    ```


    When you use BigQuery, you should collect every incoming user utterance with its
    session id. Once you know a particular session id, you can retrieve the full chat
    transcript with every other data field that was stored. The SQL query for retrieving
    the session would look like this:


    ```sql

    SELECT * FROM `chat_msg_table` WHERE SESSION_ID = ''projects/myagent/agent/sessions/db33b345-663c-4867-8021-fecd50c5e8b1''
    ORDER BY DATETIME

    ```


    Return everything from the chat messages table where the session id equals some
    string, and it will be ordered on the date and time, so the first message of the
    session will be displayed first.


    # Date/Timestamp


    You will need a `date/timestamp` for finding all transcripts based on a certain
    time and to calculate the full session length.


    You can set your own `date/timestamp` before storing the object in BigQuery. Make
    sure it takes the format the way how your data warehouse expects it:


    ```javascript

    const timestamp = new Date().getTime()/1000;

    ```


    Each date and timestamp should be stored together with a session id and its other
    metrics into BigQuery. With that, you can easily run a SQL query which will return
    everything from the chat messages table where the datetime is between August 1
    and August 10, ordered descending by datetime, so the newest comes first:


    ```sql

    SELECT * FROM `chat_msg_table` WHERE DATETIME > ''2020-08-01 10:00:00'' AND POSTED
    < ''2020-08-10 00:00:00'' ORDER BY DATETIME DESC

    ```


    # Sentiment Score


    You can use a sentiment score for finding all transcripts based on a particular
    sentiment. For example, you might be interested in the most “negative” chat transcripts
    of the week to figure out why your customers are upset.


    Tools like Dialogflow can have sentiment enabled for certain languages. However,
    when you want to use the sentiment analysis of unsupported languages such as “Dutch,”
    you will have to translate your user utterances first.


    This is something you could do with the following tools:


    - Cloud Translate

    - Cloud Natural Language


    ```javascript

    const sentiment_score: queryTextSentiment.score;

    const sentiment_magnitude: queryTextSentiment.magnitude;

    ```


    The `score` of a document’s sentiment indicates the overall emotion of a document.
    The `magnitude` of a document’s sentiment indicates how much emotional content
    is present within the document, and this value is often proportional to the length
    of the document.


    Each sentiment score should be stored together with a session id and its other
    metrics in the data warehouse. With that, you can easily run a SQL query which
    will return everything from the chat messages table where the sentiment score
    is negative (below 0), and it will be ordered on the sentiment score, ascending
    from worst to best:


    ```sql

    SELECT * FROM `chat_msg_table` WHERE SENTIMENT_SCORE < 0 ORDER BY SENTIMENT_SCORE
    ASC

    ```


    ## Tip


    How should you work with sarcasm? As a matter of fact, sarcasm is even for a human
    sometimes hard to understand. However, we do have tools in Google Cloud to build
    a model with a custom sentiment. Think about a user utterance like “Yay! The game
    Beyond Good and Evil is delayed again! Great work!” The built-in sentiment of
    Google Cloud will probably detect that this is very positive because of the words
    “Yay!” and “Great Work!”. Maybe it will be even a 90% (0.9) sentiment score.


    However, we want to classify this as very negative because we are talking here
    about delayed games, which isn’t fun, so we would expect a negative sentiment
    score. It’s good to know that you can train your own sentiment models with AutoML
    Natural Language in Google Cloud. It has a feature: sentiment analysis. The model
    inspects a document and identifies the prevailing emotional opinion within it,
    especially to determine a writer’s attitude as positive, negative, or neutral.


    # Language and Keyword


    You can use a dialogue `language` for finding all transcripts for a certain language.
    For example, you might be interested in finding a transcript based on its language.
    Maybe you want to combine this with a certain `keyword`.


    In Dialogflow, you can retrieve the `languageCode` in the `queryResult` from a
    `detectIntentResponse`:


    ```javascript

    queryResult.languageCode

    ```


    You don’t need to store separate keywords; you can retrieve this from the user
    utterance. Later in this section, we will discuss topic mining. With this technique,
    you can store keywords in a separate BigQuery column.


    Each language metric should be stored together with a session id, the user utterance,
    and other metrics in the data warehouse. With that, you can easily run a SQL query
    which will return everything from the chat messages table where the language code
    equals “NL,” and the word you are looking for is “fraud.”


    ```sql

    SELECT * FROM `chat_msg_table` WHERE LANGUAGE = "en-us" AND USER_UTTERANCE LIKE
    ''%my keyword%''

    ```


    # Platform


    You can use a `platform` setting for finding all the transcripts for a certain
    platform. For example, you might be interested in finding the latest conversations
    on the Google Assistant.


    You will have to set the platform metric yourself based on the implementation
    you are using. Certain implementations can have their own settings, such as the
    Google Assistant that has configs per device surface: Surface Capabilities.


    When you build your own web interface with a chat integrated, you will need to
    set the platform name yourself.


    ```javascript

    const platform = ''web'';

    ```


    Each platform metric should be stored together with a session id and its other
    metrics into BigQuery. With that, you can easily run a SQL query which will return
    everything from the chat messages table where the platform equals to “web”:


    ```sql

    SELECT * FROM `chat_msg_table` WHERE PLATFORM = "web"

    ```


    # Intent Detection


    When Dialogflow detects your intent, it can contain various valuable information,
    which you would like to store in your data warehouse as well. For example, this
    will help you to figure out in a transcript if the bot returned a wrong answer.


    The following data points you might want to store: `detected intent name`, `confidence
    threshold` (the confidence level Dialogflow based its intent match on), if it’s
    a `fallback`, and if it’s the `end of the interaction` (to detect if it’s the
    end of the flow).


    In Dialogflow, you can retrieve the detected intent name in the `queryResult.intent`
    from a `detectIntentResponse`:


    ```javascript

    queryResult.intent.displayName

    ```


    In Dialogflow, you can retrieve a boolean value if it’s a fallback in the `queryResult.intent`
    from a `detectIntentResponse`:


    ```javascript

    queryResult.intent.isFallback

    ```


    In Dialogflow, you can retrieve a boolean value if it’s the end of the interaction
    in the `queryResult.intent` from a `detectIntentResponse`:


    ```javascript

    queryResult.intent.endInteraction

    ```


    In Dialogflow, you can retrieve the confidence threshold in the `queryResult`
    from a `detectIntentResponse`.'
