  trans: "\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig17_HTML.jpg](img/506047_1_En_13_Fig17_HTML.jpg)\n\
    \n**图 13-17** Chatbase 漏斗\n\n## Google 操作分析\n\n例如，当你为 Google 助理构建语音机器人时，你也可以监控一些指标。登录你的\
    \ Google 操作控制台。一个额外的好处是，你甚至可以将这些指标导出到 BigQuery，以便在更长时间内捕获这些数据。\n\n点击**分析** ➤ **使用情况**。\n\
    \n**使用情况**页面（图 13-18）显示了三个图表，它们与你的操作随时间变化的使用数据相关。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig18_HTML.jpg](img/506047_1_En_13_Fig18_HTML.jpg)\n\
    \n**图 13-18** Google 操作使用情况\n\n它还可以显示**用户留存**（图 13-19）。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig19_HTML.jpg](img/506047_1_En_13_Fig19_HTML.jpg)\n\
    \n**图 13-19** Google 操作用户留存\n\nGoogle 操作可以向你展示的另一个额外好处（因为它也了解你的 Google 助理集成的洞察）是**健康信息**（图\
    \ 13-20）。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig20_HTML.jpg](img/506047_1_En_13_Fig20_HTML.jpg)\n\
    \n**图 13-20** Google 操作健康信息\n\n- **错误**：你的操作云端点在给定日期返回的错误数量。如果错误数量很大，你可能需要查看日志以确定是什么导致你的端点崩溃或出现意外行为。\n\
    - **操作延迟**：你的操作端点的延迟。如果延迟非常高或经常出现峰值，你的用户在与你的操作交互时可能会遇到延迟。\n- **用户感知延迟**：用户每次请求你的操作时所感受到的延迟。此指标说明了用户在与你的操作交互时的体验。\n\
    \n点击**分析** ➤ **发现**。\n\n发现页面显示了一个表格，列出了哪些短语导致 Google 推荐你的操作（图 13-21）。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig21_HTML.jpg](img/506047_1_En_13_Fig21_HTML.jpg)\n\
    \n**图 13-21** Google 操作分析发现\n\n发现表格中的列如下：\n\n- **调用**：导致 Google 推荐你的操作的用户查询。除了实际的用户查询外，此列表还包括以下值：\n\
    \  - `BUILT_IN_INTENT`：此条目表示你的操作是通过内置意图调用的。\n  - `AUTO_MATCHED_BY_GOOGLE`：此条目表示使用了隐式调用。\n\
    \  - `ACTION_LINK`：此条目表示你的操作是通过操作链接调用的。\n- **意图**：用户查询匹配到的意图。\n- **展示次数**：此短语导致\
    \ Google 推荐你的操作的次数。\n- **选择次数**：用户在 Google 推荐后调用你的操作的次数。此数字不能超过此短语的展示次数。\n- **选择率**：导致选择的展示次数的百分比。低百分比表示许多用户选择为此特定查询使用其他操作，而高百分比则表示你的操作在此查询中很受欢迎。\n\
    \n## 捕获聊天机器人模型健康指标以测试底层 NLU 模型质量\n\n对话指标和聊天漏斗指标侧重于从最终用户收集数据以监控和改善体验，而机器人模型指标则侧重于机器人构建过程，并可能使用测试验证数据（基于实时数据）来提高底层\
    \ NLU 模型的质量。\n\n像 Dialogflow 这样的现代聊天机器人/虚拟助手构建工具利用了机器学习。对于每个虚拟代理，作为 UX 设计师（代理建模者）或开发人员，你可以定义许多意图。**意图**对用户的意图进行分类。你组合的意图可以处理完整的对话。这将训练一个底层的机器学习模型。\n\
    \n当最终用户在聊天机器人或虚拟助手中输入或说出某些内容时，我们称之为**用户表达**或**话语**。Dialogflow 根据内置的 NLU（自然语言理解）以及底层机器学习模型所训练的示例短语，将表达与机器人构建器中匹配度最高的意图进行匹配。匹配意图也称为**意图分类**或**意图匹配**。\n\
    \n一旦你构建了虚拟代理，最重要的问题就出现了：你的虚拟代理在底层使用的机器学习模型有多好？\n\n你可以使用一系列指标来测试虚拟代理的质量。\n\n通常，在使用测试数据时，UX\
    \ 设计师或内容作者会创建一个验证数据集。他们通过将其作为用户短语输入来训练 Dialogflow 代理模型。为了创建无偏见的测试数据集，请使用来自聊天/联络中心/虚拟助手的日志，并将其与用于训练模型的意图训练短语分开。当用户数据包含敏感的\
    \ PII 数据时，你应该对其进行匿名化或脱敏处理。\n\n如你所见，这些是测试底层机器学习模型的绝佳指标。一旦你将所有这些变量存储在数据仓库中，就可以轻松创建仪表板来预览这些洞察。开发人员可以创建单元测试，将验证数据作为用户话语传入，并针对机器人构建器\
    \ API（在 Dialogflow 中，这将是 `detectIntent()` 方法）进行测试。检测到的意图和置信度分数可以与你的验证数据集进行评估。\n\
    \n### 真正例——正确匹配的意图\n\n真正例是指聊天机器人正确检测到正确（正）意图的结果。例如，当你的虚拟代理有一个名为“薪资意图”的意图，并且它使用训练短语进行训练：\n\
    \n“我的工资到账了吗？”\n\n而用户的话语是\n\n“我收到工资了吗？”\n\nDialogflow 应检测到以下意图：“薪资意图”。\n\n我可以编写一个单元测试，类似于你在软件工程中编写单元测试的方式。我可以针对之前的场景创建测试数据，用户话语为：“我的工资，什么时候能收到？”我期望它是薪资意图。你可以使用\
    \ Dialogflow API，Dialogflow 也会检测到薪资意图。所以这是一个真正例。匹配是正确的。\n\n你可以将其存储在 BigQuery 中，这样每次通过\
    \ Dialogflow API 对你的代理进行更改时，都可以重新运行该场景。你需要收集的数据字段包括“用户话语”、“预期意图名称”、“检测到的意图名称”和“结果”，即\
    \ TP。\n"
- fmt: '# True Negative—An Unsupported Request


    A **true negative** is an outcome where the chatbot correctly mapped the user
    utterance to a fallback. Unsupported request errors occur when users ask questions
    that your bot wasn’t designed for to answer. But instead of returning a wrong
    answer or a system error, it returns a friendly fallback message.


    For example, when your virtual agent has an intent called `Global fallback`, which
    gets active every time an intent could not be matched. I could create test data
    on the preceding scenario with a user utterance: `Can I buy casino tokens?` This
    is a banking chatbot, not a Casino chatbot. I expect it to be the `Global fallback`
    intent, and Dialogflow returned the `Global fallback` intent. So this is a true
    negative. It behaves exactly how it was designed.


    You could store a test case like the previous one in your data warehouse, so you
    can rerun the scenario each time when you make changes to your agent against the
    Dialogflow API. Data fields which you would need to collect are `User Utterance`,
    `Expected Intent Name`, `Detected Intent Name`, and the `Result`, which is `TN`.


    # False Positive—A Misunderstood Request


    A **false positive** is an outcome where the chatbot matches the wrong intent.
    It should have been a different intent or, in case it didn’t exist, a fallback
    intent, but it misunderstood the user utterance so the result is wrong. Misunderstood
    request errors occur when your bot cannot determine the correct user intent. This
    error can be caused by your bot not considering the question’s context or answering
    a slightly different question than the one being asked.


    For example, when your virtual agent has an intent called `Block credit card`,
    and it was trained with a training phrase: `I want to block my credit card.` Your
    virtual agent has another intent called `Renew credit card`, and it was trained
    with the training phrase: `I want to renew my credit card.` I could create test
    data on the preceding scenario with a user utterance: `My account is blocked,
    can I get a new credit card?` I expect it to be the `Renew credit card` intent;
    however, Dialogflow detected the `Block credit card` intent. So this is a false
    positive. There was a match, but it’s the wrong one!


    You could store a test case like the previous one in BigQuery, so you can rerun
    the scenario each time when you make changes to your agent against the Dialogflow
    API. Data fields which you would need to collect are `User Utterance`, `Expected
    Intent Name`, `Detected Intent Name`, and the `Result`, which is `FP`.


    # False Negative—A Missed Request


    A **false negative** is an outcome where the intent exists, but the chatbot didn’t
    detect it, and therefore a fallback was triggered. Missed request errors occur
    when your bot already has a certain intent built but fails to recognize alternative
    phrasing or terminology.


    For example, when your virtual agent has an intent called `Block credit card`,
    and it was trained with a training phrase: `I want to block my credit card.` I
    could create test data on the preceding scenario with a user utterance: `Stop
    the credit card right now.` I expect it to be the `Block credit card` intent;
    however, the virtual agent detected a fallback intent. So this is a false negative.
    The intent is there, but it couldn’t match it.


    You could store a test case like the previous one in BigQuery, so you can rerun
    the scenario each time when you make changes to your agent against the Dialogflow
    API. Data fields which you would need to collect are `User Utterance`, `Expected
    Intent Name`, `Detected Intent Name`, and the `Result`, which is `FN`.


    # True Positive Rate


    **True Positive Rate (TPR** or **recall)** is a sensitivity ratio to determine
    if intents are too narrowly defined and missed requests. When it’s above 0.5,
    it can be considered good.


    - `TPR = total TPs / (total TPs + total FNs)`


    # False Positive Rate


    **False Positive Rate (FPS** or **Fallout)** is a false alarm ratio. The false
    positive rate is calculated as the ratio between the number of negative events
    where the chatbot matched the wrong intent (false positives) and the total number
    of actual negative events (regardless of classification).


    - `FPR = total FPs / (total FPs + total TNs)`


    You could store a test case like the previous one in BigQuery, so you can rerun
    the scenario each time when you make changes to your agent. You would need to
    request the total `TP`, `FP`, `FN`, and `TN` from your data warehouse. And you
    would store the `TPR` and `FPR` so you will be able to retrieve this later in
    your reports.


    # ROC Curve


    An **ROC (Receiver Operating Characteristic) Curve** is a graphical representation
    which tells us how good the model is for distinguishing the given intents in terms
    of the detected probability. Using this info, you can decide how you want to set
    the confidence thresholds of your Dialogflow agent to define the classification
    score required for an intent match.


    You’ll need to calculate the **True Positive Rate** and **False Positive Rate**
    in order to plot this in the graph. You would do this based on various Dialogflow
    ML Settings thresholds.


    For instance, we have set in Dialogflow the confidence threshold to 0.80, which
    maps the user utterances into two options match or no intent match. We assume
    that any probability greater than or equal to 0.80 would be an intent match, else
    a fallback.


    The **ROC Curve** plots two parameters:


    - True Positive Rate (recall/sensitivity ratio)

    - False Positive Rate (fallout/false alarm ratio)


    The blue diagonal line in Figure [13-22](#506047_1_En_13_Chapter.xhtml#Fig22)
    reflects random guessing of 0.5 area under the curve. This means the virtual agents
    have half of the expected intents correct. In general, the goal is to maximize
    sensitivity and false alarm. In other words, the steeper the ROC (yellow) line,
    the better.


    ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig22_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig22_HTML.jpg)


    Figure 13-22 ROC Curve


    # Accuracy


    **Accuracy** is a ratio of correctly predicted observations to the total observations—the
    ratio of all the correct handled intents. You can calculate it the following way:


    - `total correct = total TPs + total TNs`

    - `total incorrect = total FPs + total Fns`

    - `accuracy = correct / correct + incorrect`


    You could store a test case like the previous one in your data warehouse, so you
    can rerun the scenario each time when you make changes to your agent. You would
    need to request the total `TP`, `TN`, `FP`, and `FN` from BigQuery. And you would
    store the `accuracy` so you will be able to retrieve this later in your reports.


    # Precision


    **Precision** is a ratio of positive prediction values to determine if there are
    problems with false positives/**misunderstood requests**. The higher the precision,
    the lower the FP rate.


    - `precision = total TPs / (total TPs + total FPs)`


    You could store a test case like the previous one in BigQuery, so you can rerun
    the scenario each time when you make changes to your agent. You would need to
    request the total `TP` and `FP` from your data warehouse. And you would store
    the `precision` so you will be able to retrieve this later in your reports.


    # F1 Score


    The **f1 score** is the weighted average score of precision and TPR.


    Therefore, this score takes both false positives and false negatives into account.
    Intuitively, it is not as easy to understand as accuracy, but F1 is usually more
    useful than accuracy, especially if you have an uneven class distribution. Accuracy
    works best if false positives and false negatives have similar costs. If the cost
    of false positives and false negatives is very different, it’s better to look
    at precision and TPR.


    - `F1 Score = 2*(TPR * Precision) / (TPR + Precision)`'
