    In your client-side app, you will need to make sure you are loading `socket.io`
    and `socket.io-stream` again. Socket.IO is a real-time, bidirectional event-based
    communication library. One of the transports that it uses is WebSockets, but it
    also provides other transports (XHR/JSONP), not just as a fallback but also for
    situations where WebSockets aren’t supported/required/wanted.


