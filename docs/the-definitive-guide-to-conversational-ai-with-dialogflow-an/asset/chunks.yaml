  trans: '

    # 文本聊天机器人的历史


    英国计算机科学家艾伦·图灵提出了图灵测试，旨在判断机器能否思考。图灵测试是一种对话测试（或模仿游戏），用于衡量机器在对话中的智能水平。该测试要求机器与人类作为对话伙伴进行竞争。人类评判员通过电脑键盘和屏幕与两者互动。如果
    30%的评判员无法可靠地区分机器与人类，则视为机器通过了测试。


    最早能够尝试图灵测试的聊天机器人之一是`ELIZA`。1964 年至 1966 年间，麻省理工学院（MIT）的约瑟夫·魏泽鲍姆创建了一个`自然语言处理`（NLP）计算机程序。在底层，`ELIZA`本身会检查文本中的关键词，对这些关键词赋予数值，并将输入转换为输出。`ELIZA`包含一个名为`DOCTOR`的脚本，该脚本模拟了罗杰斯式心理访谈中心理治疗师的回应，主要是对用户所说的话进行重新措辞。


    聊天机器人`PARRY`于 1972 年由斯坦福大学的精神病学家肯尼斯·科尔比编写。如果说`ELIZA`是罗杰斯式治疗师的模拟，那么`PARRY`则试图模拟一个患有偏执型精神分裂症的人。它被描述为“有态度的`ELIZA`”。该程序基于概念、感知和信念，实现了一个粗略的人类精神分裂症行为模型。它还展示了一种对话策略，因此比`ELIZA`更为先进。


    `ELIZA`和`PARRY`依赖简单的技巧来模仿人类。聊天机器人`ALICE`（全称是人工语言互联网计算机实体）由理查德·华莱士在 20 世纪 90 年代末编写。`ELIZA`启发了`ALICE`，但`ALICE`通过使用一个包含对话语句的硬编码数据库来区分自己。例如，当你向`ALICE`输入内容时，它会检查短语及其关键词以匹配这个数据库。


    另一个名为`Jabberwacky`的聊天机器人并未使用静态数据库，它由英国程序员罗洛·卡彭特于 1997 年创建，会记录所有人对它说过的话，并尝试重复使用那些与用户输入相匹配的语句。这两个聊天机器人都不具备长期记忆，因此它们只对最后一句输入做出回应。


    尽管聊天机器人自计算机诞生以来就一直在发展，但它们直到最近才成为主流。这完全与`机器学习`和`自然语言理解`有关。


    使用老式聊天机器人时，你必须仔细措辞。任何语法或拼写错误，或者只是换一种说法，都会导致聊天机器人不知道如何回答。事实上，表达同一件事有无数种方式。一个用条件`if-else`语句编程的聊天机器人需要不断维护，并且仍然容易出错。


    一个基于机器学习构建的聊天机器人，准确地说，是一个能够理解文本（自然语言理解）的聊天机器人，可以理解你的问题并检索出特定的答案。无论你拼写错误还是换种说法，它都能应对。


    在过去几年里，由于谷歌、苹果、微软、亚马逊、Facebook 和 IBM 等公司的大力投入，以及它们在人工智能、机器学习、语音对话、云计算和开发者工具方面的投资，对话式
    AI 已经站稳了脚跟！


    如今，聊天机器人就是像谷歌助手这样的虚拟助手，可以通过许多组织的应用程序、网站和即时通讯平台访问。


    你可能随身携带着你的虚拟助手，因为它们被集成在安卓设备（谷歌助手）和 iPhone/iPad（Siri）中。或者，你家里可能安装了像 Google Home、Google
    Nest Mini、Google Nest Hub 或 Amazon Echo（Alexa）这样的语音激活音箱。像谷歌助手、Siri 或 Alexa 这样的智能对话界面也是由机器学习驱动的。


    聊天机器人不仅在消费市场流行。在商业领域，它们同样炙手可热。所谓的企业助手，就是模仿客户服务代表或业务流程的公司聊天机器人。它们可以部署在内部渠道上，如网络应用程序、Slack
    或 Skype。它们可以帮助 IT 部门或服务台提交工单、从各种常见问题数据库中查找信息、替代客户服务、订购产品或实现员工间的知识共享。此外，联络中心（无论是通过网络聊天还是电话语音聊天）中的聊天机器人也能大幅削减企业成本。机器人可以接听电话，回答最常见的问题，从而减少通话和等待时间。


    聊天机器人可以部署在面向公众的渠道上，如 Facebook、WhatsApp、网站、应用程序或短信。有品牌互动聊天机器人和客户服务聊天机器人，它们可以提供建议或回答最常被问到的问题，例如`荷兰皇家航空`的虚拟助手。它包含了常见问题的答案。尤其是在疫情期间，大量与
    COVID-19 相关的问题涌入。`荷兰皇家航空`的虚拟助手是一个面向公众的、基于文本的聊天机器人，可通过 WhatsApp 使用。


    还有销售部门的机器人，它们可以通过回答最常见的问题或处理重复性工作/电话来提供帮助；因此，机器人解决方案具有很高的可扩展性。这对于特定行业非常有意义。例如，对于一家医疗保险公司来说，每年的最后一个月会非常繁忙，因为那是个人可以更换医疗保健提供商的月份。对于零售商或旅行社来说，节假日月份会非常繁忙。


    客户服务聊天机器人的一个例子是`ING 银行`的`Marie`机器人。当你的银行卡出现问题时，它可以通过 Facebook Messenger 为你提供帮助（对话式银行服务）。这个聊天机器人最初是
    ING 的一个实验，旨在测试他们能将这项技术推进到何种程度。如今，聊天机器人已遍布他们的所有内部系统（网络聊天、应用程序和电话）。

    '
- fmt: '# Why Do Some Chatbots Fail?


    Sounds all like puppies and ice cream? Because of the long history of chatbots,
    customers often don’t have a high impression of chatbots. There are a lot of chatbots
    that fail.


    There are ten main drivers why chatbots fail to deliver delightful user experiences:


    - Most chatbots are built on decision-tree logic, the old-school way. Bots with
    linguistic and Natural Language Processing/Machine Learning capabilities are not
    very common.

    - Also, because of this old-school way of building bots, they usually can’t hold
    contextual information for longer than a few chat bubbles and will end up losing
    track of what the user was saying before they posed the most recent question.

    - Besides remembering contexts within a session, often chatbots weren’t built
    to keep memory of multiple sessions. For example, you log in to the chatbot the
    next day. Your previous session is gone.

    - For some bots, it’s not clear what tasks it can do. Bots need to clarify that
    you are talking with a virtual agent, not a human. And ideally, they should explain
    up front what type of questions they can answer; you can steer the conversation.

    - There are a lot of bots that are solving unrelated use cases. This happens when
    chatbot creators ignore analytics and won’t look into the insights of other channels
    for the most frequently asked questions.

    - There are chatbots that are not personal.

    - Creating a chatbot in a silo (that doesn’t connect to other systems) can be
    pretty harmful to both businesses and customers. Your customers will see you as
    a “one-company”; they won’t understand that a chatbot can’t get access to your
    background information while the company should have it.

    - A bot just like a human advisor improves over time by learning from feedback
    and getting the right training. These provisions are often forgotten by creators,
    and hence the bot can become less relevant over time.

    - Bots that do one thing very well are more helpful than bots that do many things
    poorly.

    - Very few chatbots have an escalation workflow in place to let a human take over
    the conversation when the bot is unable to help. Once there is a hand-over, the
    user shouldn’t repeat the discussion they had with the chatbot. Instead, a transcript
    should be presented to the employee.


    If I can add one additional driver to this list, I would say that poor user experience
    (UX) design per chatbot channel could be painful for a user. Your virtual agent
    should be available on the channels where your customers are. If this is a website,
    you can show tables, links, and videos. Still, when the conversation is voice
    only, for example, in a contact center, you obviously can’t copy your website
    text with hyperlinks, tables, and images to the voice assistant’s output.


    # Machine Learning Simply Explained


    Think about it. How did you learn your first language? I bet your parents or teachers
    did not hand you a dictionary and told you to read this book from A to Z. By the
    time that you reach the last page, and you are a master in, let’s say, the English
    language. No! We learned through examples.


    This is a car, and it drives on the highway; it has four wheels and a steering
    wheel. That over there, that’s a bicycle. It has two wheels, and you peddle. By
    the time you have seen many cars and many bikes, you would distinguish one from
    another. And in case you were wrong, for example, you thought you saw a car, but
    it was actually a truck, you were told that you were wrong and that a truck is
    even bigger than a car or a truck has more wheels.


    For computers, it works quite similarly. Data scientists program a model, and
    then we pass in a massive amount of data until, at some point, a computer starts
    to recognize patterns. For example, you will upload lots of car and bike photos,
    where every photo is labeled. When the computer is wrong, we teach it what the
    label should be, or we might need to upload more data. Just where humans become
    smarter when aging, with machine learning a computer becomes more intelligent
    over time by seeing more relevant data.


    Machine Learning is a term that falls under **Artificial Intelligence** (AI).
    AI is the process of building smarter computers. It’s a concept that has existed
    since the beginning of computers. Programmers create conditional `if` and `else`
    statements in code to tell a computer what happens under specific criteria, or
    else it should fall back. As a developer myself, I know how hard programming can
    be. We developers always write bugs. *Yeah, you do too*. There are always new
    requirements which let your conditions break. You still need a developer to maintain
    the code.


    Machine Learning is the process of making a computer learn by itself. Since with
    Machine Learning, the computer becomes smarter by seeing more examples. It’s actually
    a more effective way of making machines smarter than programming a smart machine.


    Computer programs that use Machine Learning can be better at making predictions
    than humans but are only as good as the data that was given to them. This is because
    computers can remember and process massive amounts of data in a short time. That
    is why Machine Learning has been used in all industries—in healthcare to predict
    cancer, in retail to predict recommendations, in finance to detect fraud, and
    at every company that uses Natural Language Understanding (NLU) chatbots.


    ## Natural Language Processing


    Like Machine Learning, **Natural Language Processing (NLP)** is a subset of AI.
    It deals with the relationship between natural language, what we as humans speak,
    and AI. It’s the branch of AI that enables computers to understand, interpret,
    and manipulate human language. NLP can make sense of unstructured data, like a
    spoken language, instead of structured data like SQL table rows and so on. NLP
    focuses on how we can program computers to process large amounts of natural language
    data, such as a chatbot conversation, in such a way that it becomes efficient
    and productive by automating it. NLP algorithms are typically based on Machine
    Learning algorithms. Instead of hand-coding large sets of rules, NLP can rely
    on Machine Learning to automatically learn by analyzing a set of examples.


    NLP often refers to tools such as **speech recognition** for understanding spoken
    voice or audio files and **Natural Language Understanding (NLU)** for recognizing
    large amounts of written text, for example, to get entity or sentiment analysis—in
    the case of chatbots, to classify and match intents. Another subset of NLP is
    **Natural Language Generation (NLG)** . NLG is a software process to transform
    structured data into natural languages, such as generating reports or chatbot
    conversations.


    # Chatbots and Artificial Intelligence


    The chatbot or smart assistant of the modern world is all about AI.


    Let’s look at the Google Nest Mini, the smart speaker of Google, which is actually
    nothing more than a speaker with a microphone connected to the Internet to get
    access to the Google Assistant, the AI of Google.


    You talk to it. Somehow, the Google Assistant can listen to your spoken text and
    transform it to written text. That’s a Machine Learning model called **Speech-to-Text**
    (STT). The Google Assistant can understand what was said. So it understands the
    written text. That’s a Machine Learning model called **Natural Language Understanding**.
    The Google Assistant matches your text to a particular scripted flow, which we
    call **Intent Matching** or **Intent Classification**. Based on training examples,
    we can match the real intention of the user. Finally, when it finds an answer,
    it speaks it out for you through a text synthesizer. That’s a **Text-to-Speech**
    Machine Learning model (TTS), a synthesizer that uses WaveNet models with voices
    that sound humanlike.'
