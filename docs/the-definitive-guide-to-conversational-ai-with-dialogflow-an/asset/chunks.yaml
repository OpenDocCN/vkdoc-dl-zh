    **Figure 12-4** The user streams their voice from the client app to the server
    application connected to Dialogflow. Once Dialogflow matches the intent, the result
    audio stream will be sent back to the client app, to be played in the browser


    Now, it''s time to focus on the last part, ensuring we are getting an audio buffer
    as a detected result from Dialogflow, streaming it back to the client via Socket.IO
    and making sure it will autoplay.


    Dialogflow can also return `AudioBuffer`s once it detects the intent. You would
    only need to specify an `outputAudioConfig` in the Dialogflow `DetectIntentRequest`,
    to also get an `AudioBuffer` as part of the response:


    ```

    outputAudioConfig: {

    audioEncoding: `OUTPUT_AUDIO_ENCODING_LINEAR_16`,

    },

    ```


    The response for a detect intent request is a `DetectIntentResponse` type. Normally,
    when you detect intents with text contents, it populates the `fulfillmentMessages`
    field in the `queryResult`. But when you provide spoken audio as contents, the
    `DetectIntentResponse.outputAudio` field is populated with audio based on the
    values of default platform text responses found in the `DetectIntentResponse.queryResult.fulfillmentMessages`
    field. If multiple default text responses exist, they will be concatenated when
    generating audio. If no default platform text responses exist, the generated audio
    content will be empty.


