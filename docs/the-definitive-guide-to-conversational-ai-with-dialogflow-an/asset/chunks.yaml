    ## Set Up mTLS


    First, make sure that in Dialogflow, you are pointing to your new VM from the
    **fulfillments** screen.


    Run the following two commands to download the root CA which will be used by Dialogflow.
    This will add `GTS101.crt` and `GSR2.crt` to the local file, `ca-crt.pem`:


    ```

    curl https://pki.goog/gsr2/GTS1O1.crt | openssl x509 -inform der >> ca-crt.pem

    curl https://pki.goog/gsr2/GSR2.crt | openssl x509 -inform der >> ca-crt.pem

    ```


    These settings in `/etc/apache2/sites-available/000-default-le-ssl.conf` are specific
    for setting up mTLS:


    ```

    SSLVerifyClient require

    SSLVerifyDepth 2

    SSLCACertificateFile "/var/www/projects/ca-crt.pem"

    ```


    And this is the access control, which will make sure that only Dialogflow.com
    can call the fulfillment webhook:


    ```

    Require all denied

    ```


    Now you can test it. We will only let Dialogflow with a certificate CN: `*.dialogflow.com`
    go through to access the fulfillment. When the CA of Dialogflow is not the same
    as the CA we expect it to be, the Dialogflow fulfillment status will be `UNKNOWN`.


    The Apache `error.log` shows (`tail error.log`):


    ```

    [Fri Jun 26 11:45:54.732961 2020] [authz_core:error] [pid 10152:tid 139735259326208]
    [client 64.233.172.238:36290] AH01630: client denied by server configuration:
    proxy:http://localhost:3000/fulfillment

    ```


    Else, it will go through. You could test it in the Dialogflow simulator. I’ve
    used intent **Buy product regex** with a user utterance: *Buy ms12345678* to display
    results. (Don’t believe it? Flip the `!=` to `==` in the access control: `000-default-le-ssl.conf`
    to something else than `*.dialogflow.com`.)


    Figure [10-23](#506047_1_En_10_Chapter.xhtml#Fig23) shows a screenshot of how
    the Dialogflow CA certificate looks like.


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig23_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig23_HTML.jpg)


    **Figure 10-23** The Dialogflow CA certificate


    ## Summary


    This chapter contains information about fulfillments. You will learn the following
    tasks:


    *   You want to fetch data from a web service and write your fulfillment code
    in the built-in editor.

    *   You want to fetch data from a web service and write your fulfillment code
    within your own (cloud) environment, such as Cloud Run.

    *   You want to fetch data from a web service, but your Dialogflow agent has multilingual
    support, so how can you organize your webhook?

    *   You want to fetch data from a local data source for testing purposes with
    `ngrok`.

    *   You want to ensure that traffic to and from Dialogflow is secure by using
    authentication via basic authentication, authentication headers, and mutual TLS.


    On top of this, you have seen code snippets to implement fulfillment via:


    *   The npm `dialogflow-fulfillment` package

    *   The Actions on Google package

    *   Manually without using any library


    The intents that I have been using for this chapter are:


    *   `Buy product regex`

    *   `Default Welcome Intent`

    *   `Default Fallback Intent`

    *   `Get_Price`

    *   `Get_Delivery_Date`

    *   `Get_Total_Number`


    In case you want to build this example, the source code for this book is available
    on GitHub via the book’s product page, located at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/ISBN).
    Look into the `webhook-fulfillment-lib`, `webhook-aog`, `webhook-manual`, `webhook-cloudrun`,
    `webhook-localized`, `secure-auth`, and `secure-compute-mtls` folders.


    ## Further Reading


    *   Dialogflow documentation on fulfillment in general: [`https://cloud.google.com/dialogflow/es/docs/fulfillment-webhook`](https://cloud.google.com/dialogflow/es/docs/fulfillment-webhook)

    *   Google Cloud documentation on using Cloud Functions: [`https://cloud.google.com/functions/docs/quickstarts`](https://cloud.google.com/functions/docs/quickstarts)

    *   Google Cloud documentation on using Cloud Run'
