    \n8. Creating a Multilingual\nChatbot\n\nDialogflow supports many languages; it\
    \ is possible to create\nmultilingual chatbots. When you create a Dialogflow agent,\
    \ you have to\npick your default language, for example, English. Afterward, you\
    \ can add\nother languages.\nThis chapter will give you an overview of the languages\
    \ that\nDialogflow Essentials support. It will show you how to build a\nmultilingual\
    \ virtual agent. It will explain how an export looks like for\na multilingual\
    \ bot and how you can programmatically detect languages\nthrough the Dialogflow\
    \ API. This chapter will end with using a\ntranslation service to translate your\
    \ bot answers on the fly\nautomatically.\n\nAgent Languages\n\nThere are two categories\
    \ of languages:\n\n*   **Root languages**: These are languages like\n    *English\
    \ (en)* that do not specify a locale.\n\n*   **Locale-specific languages**: These\
    \ are languages\n    like *English-US (en-US)* that specify a locale as a specific\n\
    \    region or country.\n\nYou should primarily design your agent for root language\
    \ multi-language\nand only customize for locale-specific languages as needed.\
    \ Figures\n[8-1](#506047_1_En_8_Chapter.xhtml#Fig1) and [8-2](#506047_1_En_8_Chapter.xhtml#Fig2)\
    \ will show you\nthe languages which are supported by the time of writing.\n\n\
    ![../images/506047_1_En_8_Chapter/506047_1_En_8_Fig2_HTML.jpg](images/506047_1_En_8_Chapter/506047_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2\nOverview of all the languages and supported features that are\n\
    available in Dialogflow Essentials (part 2) \n\n![../images/506047_1_En_8_Chapter/506047_1_En_8_Fig1_HTML.jpg](images/506047_1_En_8_Chapter/506047_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1\nOverview of all the languages and supported features that are\n\
    available in Dialogflow Essentials (part 1) \n\nNote\n\nAs a best practice, you\
    \ should complete your agent in the default\nlanguage before adding additional\
    \ languages.\n\nBuilding a Multi-language Agent\n\nTo add a language, click the\
    \ **+** button next to the\nexisting languages\n(bullets, see Figure [8-3](#506047_1_En_8_Chapter.xhtml#Fig3)).\
    \ This takes you\nto the **Languages** tab of agent settings. Alternatively,\n\
    you can go to the **Dialogflow Settings** panel and choose\nthe Languages tab.\n\
    \n![../images/506047_1_En_8_Chapter/506047_1_En_8_Fig3_HTML.jpg](images/506047_1_En_8_Chapter/506047_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3\nThe language bullets to switch agent language\n\nChoose a language\n\
    from the **Select Additional Language** dropdown menu. (You\ncan scroll with your\
    \ mouse through over 20 different languages; see\nFigure [8-4](#506047_1_En_8_Chapter.xhtml#Fig4).)\n\
    \n![../images/506047_1_En_8_Chapter/506047_1_En_8_Fig4_HTML.jpg](images/506047_1_En_8_Chapter/506047_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4\nChoosing\nlanguages\n\nClick **Save** .\nYou can switch between\
    \ languages by clicking the **blue and\ngrey language bullets** under the agent\
    \ name.\nThe Dialogflow agent will share all its settings, but what’s unique\n\
    to a language are the **Intent training phrases**,\n**Intent Responses**, and\
    \ **Entity entries**.\nThose you will need to localize to make your multilingual\
    \ agent\nwork.\nYou can use the simulator by selecting\nthe language of choice\
    \ before testing your conversations.\n\nIt depends on the integration of choice,\
    \ how languages are supported and\npresented to the user, for example:\n\n*  \
    \ When building a bot for **Google\n    Assistant** , Actions on Google will take\
    \ the Dialogflow\n    language and can deploy the Assistant action in a certain\
    \ language for a\n    defined region.\n\n*   The built-in **Web Demo** integration\
    \ only\n    supports English, so no multilingual agents, but the built-in\n  \
    \  **Dialogflow Messenger** web integration does support\n    multilingual agents,\
    \ as long as you set the HTML element `language-code` while\n    integrating the\
    \ snippet to your website. With server-side coding, for\n    example, you could\
    \ build a switch that presents the chatbot in the\n    correct language based\
    \ on a button click or IP address.\n\n*   When you build your own custom integration,\
    \ for\n    a website or mobile app, you will have to detect the intent, through\
    \ the\n    SDK. The `detectIntent` calls\n    take a language code as a parameter\
    \ as part of the `TextInput QueryInput`\n    object. You will see an example later\
    \ in this chapter.\n\nNote\n\nDo not mix training phrases with different languages\
    \ in the same\nagent, like in the following example. You will likely damage the\
    \ Machine\nLearning model by doing so.\n**User: I want to buy an Xbox series X\
    \ (English)**\nAgent: How many controllers do you need?\n**User: mujhe 2 kantrolar\
    \ chaahie (Hindi)**\nAgent: Ok, I will order an Xbox series X with two controllers.\n\
    \nExporting a Multi-language Dialogflow ES Agent\n\nWhen you export a Dialogflow\
    \ agent via the\nsettings panel (Figure [8-5](#506047_1_En_8_Chapter.xhtml#Fig5)),\
    \ you will\nretrieve a zip file. This zip file will contain intents and entity\
    \ JSON\nfiles.\n\n![../images/506047_1_En_8_Chapter/506047_1_En_8_Fig5_HTML.jpg](images/506047_1_En_8_Chapter/506047_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5\nExporting the zip to preview language files in your editor\n\nFor\
    \ intents, the intent settings, as well as the responses, are in\nthe *x_Intent.json*\
    \ file.\n\nThe training phrases for each particular language are in the\n*x_Intent_usersays_<languagecode>.json*\
    \ file.\n\n*   *intents/Default Welcome Intent.json*\n\n*   *intents/Default Welcome\
    \ Intent_usersays_en.json*\n\n*   *intents/Default Welcome Intent_usersays_nl.json*\n\
    \nFor entities, the entity settings are in the entity JSON file. The keys\nand\
    \ values of an entry in their particular language are in the\n*x_entries_<languagecode>.json*\
    \ file.\n\n*   *entities/product_color.json*\n\n*   *entities/products_color_entries_en.json*\n\
    \n*   *entities/products_color_entries_nl.json*\n\nTip\n\nWhen you are handy with\
    \ a code editor and are comfortable reading\nJSON files, it might save you some\
    \ time to translate Dialogflow agents\nvia a coding editor.\n\nDetecting Multi-language\
    \ Intents via the SDK\n\nIn case you want to build your conversational AI in a\
    \ custom web\nintegration (see Chapter [11](#506047_1_En_11_Chapter.xhtml)), it’s\
    \ good to know that you can\nset the `languageCode`\nfield  in the\n`detectIntent`\n\
    call, when defining the text input within a `queryInput`:\n\n```\nconst responses\
    \ = await sessionClient.detectIntent({\nqueryInput: {\ntext: {\n// The query to\
    \ send to the dialogflow agent\ntext: 'hello',\n// The language used by the client\
    \ (en-US)\nlanguageCode: 'en-US',\n},\n},\n}\n});\n```\n\nWhen Dialogflow receives\
    \ a `detectIntent` request\nand a language wasn’t passed in, Dialogflow handles\
    \ the request using\nthe default language.\n\nWhen Dialogflow receives a `detectIntent`\
    \ request\nthat does not supply a language supported by the agent, the following\n\
    rules apply:\n\n*   When a request supplies a locale-specific language that the\
    \ agent\n    does not support, but the agent’s associated root language is supported,\n\
    \    Dialogflow handles the request using the root language.\n\n*   System entity\
    \ extraction is an exception to the previous rule.\n    System entity extraction\
    \ uses the supplied locale-specific language, even if the\n    agent does not\
    \ support the locale-specific language.\n\nWorking with the Translation Service\n\
    \nSuppose you want to use a different language in Dialogflow than the\nsupported\
    \ Dialogflow languages. In that case,\nit might be possible to manually build\
    \ a solution that translates every\nincoming user utterance to a base language\
    \ before detecting the intent\nwith Dialogflow. This typically works in not too\
    \ difficult dialogues,\nassuming that the translated user utterances will be somehow\
    \ similar to\nthe training phrases the intent was trained on. The responses could\
    \ be\ntranslated by you directly in the Dialogflow console or maybe come from\n\
    a database through a fulfillment.\n\n![../images/506047_1_En_8_Chapter/506047_1_En_8_Fig6_HTML.jpg](images/506047_1_En_8_Chapter/506047_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6\nThe architecture of a real-time language service\n\nTo build a solution\
    \ like this (see the architecture in Figure [8-6](#506047_1_En_8_Chapter.xhtml#Fig6)),\
    \ you will need\nto create a custom integration. See Chapter [11](#506047_1_En_11_Chapter.xhtml)\
    \ to read more about this topic. In case you are\ninterested in building and optimizing\
    \ your webhooks for multi-language\nsupport, have a look at Chapter [10](#506047_1_En_10_Chapter.xhtml).\n\
    \nSummary\nThis chapter shares all the information on building a chatbot that\n\
    supports multiple languages. We have examined the file structure of a\nmulti-language\
    \ agent export, how to detect multi-language intents with\nthe SDK, and how you\
    \ can integrate this with a translate service.\n\nFurther Reading\n\n*   Dialogflow\
    \ documentation on multilingual chatbots\n\n    [`https://cloud.google.com/dialogflow/es/docs/agents-multilingual`](https://cloud.google.com/dialogflow/es/docs/agents-multilingual)\n\
    \n*   Dialogflow supported languages\n\n    [`https://cloud.google.com/dialogflow/es/docs/reference/language`](https://cloud.google.com/dialogflow/es/docs/reference/language)\n\
    \n9. Orchestrate Multiple Sub-chatbots\nfrom One Chat Interface\n\nWhen you are\
    \ building a chatbot with Dialogflow, you might notice\nthat at some moment, you\
    \ will reach the point that your chatbot performs\nless and becomes hard to maintain.\
    \ If you have 1500 intents in one\nagent, likely you will have intents with training\
    \ phrases that are quite\nsimilar to each other. The way you can solve this is\
    \ in the Dialogflow\nsettings panel, the **ML Settings** tab, to change the\n\
    Machine Learning threshold for the confidence score. If the returned\nvalue is\
    \ less than the threshold value, then a fallback intent will be\ntriggered, or\
    \ if there are no fallback intents defined, no intent will\nbe activated. This\
    \ might solve your problem for then, but what if your\nagent has more than 2000\
    \ intents?\nAnd how would you maintain that, especially when working with large\n\
    teams?\nImagine you would work for a large enterprise, such as a bank. The\nchatbot\
    \ needs to address Bank Accounts, Mortgages, and General Banking\nquestions. When\
    \ you add all these intents to one Dialogflow agent, you\nwill likely have intents\
    \ colliding with each other. In fact, at a\ntraditional bank, people work in teams.\
    \ There is a team working on\nchatbots for Bank Accounts vs. Mortgages and so\
    \ on. These teams don’t\nknow about the existence of each other’s Dialogflow intents.\n\
    **Data\ngovernance**  is essential. The mega-agent feature could\nsolve these\
    \ problems because each team can work on their own chatbot.\nThis means rapid\
    \ changes without breaking the training phrases from\nother teams, better debugging,\
    \ version control, and agent reviews. But\nfor the end user, it looks like one\
    \ single chatbot which can address\nmany features through one interface.\nAs with\
    \ all Dialogflow agents, you can only create only one agent per\nGoogle Cloud\
    \ project, so each sub-agent and the mega-agent will be\nassociated with its own\
    \ Google Cloud project. The small talk feature\nwon’t work, but you can include\
    \ Knowledge Base Articles per sub-agent. A\nmega-agent can have at most ten sub-agents.\
    \ Each Dialogflow agent can\nhave 2000 intents. So this will give you a maximum\
    \ of 20k intents.\n\nCreating a Mega-Agent\nThe mega-agent feature allows you\
    \ to connect various sub-Dialogflow\nagents to one single Dialogflow agent connected\
    \ to your integration\nchannels, so your users can interact with one chatbot interface\
    \ instead\nof many.\n\nImagine you are a media retailer (see\nFigure [9-1](#506047_1_En_9_Chapter.xhtml#Fig1)).\
    \ Your shop\nsells video games and movies. The chatbot users can ask questions\
    \ about\nvideo games that will be answered by the video games chatbot or about\n\
    movies, which will be answered by a movie chatbot.\n\n![../images/506047_1_En_9_Chapter/506047_1_En_9_Fig1_HTML.jpg](images/506047_1_En_9_Chapter/506047_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\nAn architectural overview of how a mega-agent works\n\nTo set up\
    \ the\nmega-agent feature, you will need to have (or create) “normal”\nDialogflow\
    \ agents first, which later will become a sub-agent.\n\n![../images/506047_1_En_9_Chapter/506047_1_En_9_Fig2_HTML.jpg](images/506047_1_En_9_Chapter/506047_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\nSetting up a mega-agent\n\n1.  **Create a new agent** from the dropdown\
    \ menu under the\n    logo. (See Figure [9-2](#506047_1_En_9_Chapter.xhtml#Fig2).)\n\
    \n    You will give the new agent a name such as\n    *mega-agent-media-retailer*\
    \ and then flip the switch, **Set\n    as mega-agent**, then hit **save**.\n\n\
    ![../images/506047_1_En_9_Chapter/506047_1_En_9_Fig4_HTML.jpg](images/506047_1_En_9_Chapter/506047_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4\nDefining the sub-agents\n\n1.  After you have created the mega-agent,\
    \ you will see a new menu item,\n    *Sub Agents*, in your Dialogflow menu. Additionally,\
    \ if\n    your mega-agent name doesn’t take too many characters, you will see\
    \ the\n    word “MEGA” next to the agent name. (Notice Figure [9-3](#506047_1_En_9_Chapter.xhtml#Fig3).)\n\
    \n    ![../images/506047_1_En_9_Chapter/506047_1_En_9_Fig3_HTML.jpg](images/506047_1_En_9_Chapter/506047_1_En_9_Fig3_HTML.jpg)\n\
    \n    Figure 9-3\n\n    How a mega-agent is shown in the menu\n\n    When it’s\
    \ your first time setting up the mega-agent, you will need to\n    assign the\
    \ sub-agents. Click No sub-agents yet. **Add the first\n    one**.\n\n    You\
    \ will get in a new screen (Figure [9-4](#506047_1_En_9_Chapter.xhtml#Fig4)),\
    \ and you can\n    start to select other agents (from Google Cloud\n    projects)\
    \ that are available to your Dialogflow user account (Google\n    identity). While\
    \ doing so, you can also see the **Google Cloud\n    project name**, select the\
    \ **Dialogflow\n    environment**, or **include/exclude the knowledge base\n \
    \   feature**. Hit **save**.\n\n1.  The mega-agent will need to get access to\
    \ each sub-agent, and we can\n    do this via the *IAM roles page* in the Google\
    \ Cloud Console (Figure [9-5](#506047_1_En_9_Chapter.xhtml#Fig5)) by adding the\n\
    \    service account email address to each sub-agent. Here’s how we do\n    this.\n\
    \n    While in Dialogflow, make sure the mega-agent is still active. Click\n \
    \   the **settings cog**  icon next to the\n    mega-agent name, which will open\
    \ the settings panel. When you scroll\n    down in the **General** tab, you will\
    \ see the project ID,\n    which you can click. This will open the Google Cloud\
    \ console. Navigate\n    to the **IAM & Admin** ➤ **Service\n    Accounts** page.\n\
    \n    Copy or make a notation of the mega-agent service account address, for\n\
    \    example:\n\n    ```\n    dialogflow-@mega-agent-media-retailer-.iam.gserviceaccount.com\n\
    \    ```\n\n    ![../images/506047_1_En_9_Chapter/506047_1_En_9_Fig5_HTML.jpg](images/506047_1_En_9_Chapter/506047_1_En_9_Fig5_HTML.jpg)\n\
    \n    Figure 9-5\n\n    Find the mega-agent service account address in the Google\
    \ Cloud console\n\n    For what’s worth, this project will need to have the Dialogflow\
    \ API\n    enabled. If it’s correct, it’s already enabled by default, but it’s\n\
    \    better to double-check this. First, you select the project in the blue\n\
    \    top bar (Figure [9-6](#506047_1_En_9_Chapter.xhtml#Fig6)) and use the\n \
    \   search form to search for *Dialogflow API*\n    . When you see the blue *Disable\
    \ API link*, you will know\n    it’s enabled.\n\n    ![../images/506047_1_En_9_Chapter/506047_1_En_9_Fig6_HTML.jpg](images/506047_1_En_9_Chapter/506047_1_En_9_Fig6_HTML.jpg)\n\
    \n    Figure 9-6\n\n    Make sure the Dialogflow API is enabled\n\n2.  We will\
    \ repeat step 4 for each sub-agent by clicking the Project ID\n    in Dialogflow\
    \ to open the Google Cloud console for the sub-agent\n    projects. But now, we\
    \ will navigate to the **IAM &\n    Admin** ➤ **IAM** page.\n\n    Click the **Add**\
    \ button at the top.\n\n    In the next slide-out screen, you can **paste the\
    \ service account\n    email address** (from step 4, see Figure [9-7](#506047_1_En_9_Chapter.xhtml#Fig7))\
    \ as a member. As\n    a role, use the filter to search for **Dialogflow API\n\
    \    Client** .\n    (*Project Owner, Project Editor, or Dialogflow Admin* roles\
    \ would\n    work as well, but for security reasons, it’s always best to give\
    \ the\n    least/absolute necessary permissions to your service accounts.)\n\n\
    \    ![../images/506047_1_En_9_Chapter/506047_1_En_9_Fig7_HTML.jpg](images/506047_1_En_9_Chapter/506047_1_En_9_Fig7_HTML.jpg)\n\
    \n    Figure 9-7\n\n    We add the mega-agent’s service account address to each\
    \ sub-agent’s\n    IAM settings, with the Dialogflow API Client role\n\n    Repeat\
    \ this step for each sub-agent and hit\n    **Save**.\n\n3.  From here, you can\
    \ test your mega-agent in the Dialogflow simulator.\n    However, if you want\
    \ to integrate this into a real application, you will\n    likely need to download\
    \ the service account to your local drive. (See\n    Chapter [10](#506047_1_En_10_Chapter.xhtml).)\n\
    \n    To test the mega-agent feature in Dialogflow,\n    make sure you are still\
    \ in the mega-agent project. You can start typing\n    questions in the simulator\
    \ like\n\n    *   “What’s your favorite videogame?” It will return the response\n\
    \        from the video games sub-agent.\n\n    *   “What movies are out on DVD?”\
    \ It would return an answer from the\n        movies sub-agent.\n\nTip\n\nIf you\
    \ want to use the mega-agent feature while working with\nintegrations such as\
    \ the Google Assistant, you will need to add the IAM\nrole Dialogflow Service\
    \ Agent to the Service Account of each agent (mega\nand subs).\n\nUsing the SDK\n\
    When you detect an intent via the SDK, you would make a\n`detectIntent`\ncall\
    \ and use the mega-agent’s project ID. Dialogflow will consider all\nof the sub-agents,\
    \ and the best response from the sub-agents is\nreturned.\n\nHowever, it’s also\
    \ possible to specify one or more sub-agents for a\ndetect intent request by setting\
    \ the subAgents field of QueryParameters.\n\n```\n{\n\"queryInput\": {\n\"text\"\
    : {\n\"text\": \"How can I open a new bank account?\",\n\"languageCode\": \"en-US\"\
    \n}\n},\n\"queryParams\": {\n\"subAgents\": [\n{\"project\": \"projects/dialogflow-mortgages\"\
    },\n{\"project\": \"projects/dialogflow-bankaccounts\"}\n]\n}\n}\n```\n\nHow Billing\
    \ Works\nThe pricing is\nbased on the number of intents used to fulfill a user\
    \ request. If a\nrequest explicitly specifies sub-agents, this is the sum of all\
    \ intents\nfor the supplied sub-agents. If a request does not specify sub-agents,\n\
    this is the sum of all intents for the mega-agent’s sub-agents. Thus,\nwhen any\
    \ request is made with the potential for any one of N intents as\na match, all\
    \ N intents need to be examined. Dialogflow has to search\nthrough all N of those\
    \ intents, so when N is large, the price will be\nincreased.\n\nSummary\nThis\
    \ chapter contains information about mega-agents. Imagine you are\nworking in\
    \ a large team, and you want to orchestrate multiple chatbots\nthrough one chatbot\
    \ interface. With the mega-agent feature, you can\ncreate sub-agents and link\
    \ them all together. This is great for data\ngovernance, but also you can 10x\
    \ your intent limit.\nThe source code is available on GitHub via the book’s product\
    \ page,\nlocated at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4).\n\
    \nThe agents that I have been using for these examples are\n\n*   _mega-agent-media-retailer\n\
    \n*   _sub-agent: movies\n\n*   sub-agent: dialogflowcookbook (videogames)\n \
    \   (_dialogflow-agent)\n\nFurther Reading\n\n*   Dialogflow documentation on\
    \ mega-agents\n\n    [`https://cloud.google.com/dialogflow/es/docs/agents-mega`](https://cloud.google.com/dialogflow/es/docs/agents-mega)\n\
    \n10. Creating Fulfillment\nWebhooks\n\nFulfillment typically means that you are\
    \ connecting your conversation\nto a web service. Companies often have web services\
    \ and APIs to display\ncontent on websites in place already. In that case, although\
    \ the\nmajority of the work (like connecting to databases, security and\nbusiness\
    \ rules, etc.) has been done before, you will still need to work\non an additional\
    \ code that takes care of routing (to all your web\nservices), and the conversational\
    \ part, how you return your dialogue\nback to the user.\nThis chapter will explain\
    \ how fulfillment webhook work in Dialogflow Essentials.\nIt will show you how\
    \ to write your own webhook with the\nactions-on-google npm package and the dialogflow\
    \ npm package and how to\nwrite webhooks without using a package at all. It will\
    \ discuss the\nvarious places where to run code, as a cloud function via the inline\n\
    editor, as a container on Cloud Run or your own server with Express or\nlocally.\
    \ This chapter will also discuss how to build multilingual\nwebhooks and how to\
    \ secure your webhook code. It will contain lots of\ncode examples to help you\
    \ getting started.\n\nAn Introduction to Fulfillment Webhooks\n\nLet’s look into\
    \ the following example; imagine I am building a banking\nagent for voice. Let’s\
    \ say it’s a Google Assistant action,\nbut it was linked to a user account. I\
    \ could ask my agent:\n\n1.  “Has my salary been deposited today?”\n\n2.  Dialogflow\
    \ matches the “salary intent.”\n\n3.  I could fetch the bank account number from\
    \ my employer from my user\n    account, and the date of today’s entity could\
    \ be extracted by Dialogflow\n    from the user utterance.\n\n4.  Fulfillment\
    \ is enabled for the intent in Dialogflow. (Because\n    Dialogflow doesn’t transfer\
    \ money, no web services of a bank do.)\n\n5.  A web request from Dialogflow to\
    \ the webhook/back-end code is made.\n\n6.  Now we will do something with the\
    \ request data.\n\n    1.  We will fetch the intent name, parameters, and context\
    \ from the\n        request.\n\n    2.  We will route another request to an existing\
    \ banking web service for\n        retrieving the account balance.\n\n    3. \
    \ That web service returns code, maybe JSON data like\n\n        ```\n       \
    \ {\n        \"status\": \"ok\",\n        \"bankaccount: \"IBAN1234567890\",\n\
    \        \"datetime\": \"1593080084\",\n        \"amount\": \"3000\",\n      \
    \  \"currency\": \"USD\"\n        }\n        ```\n\n    We can’t return this JSON\
    \ feed to the user as this is not how you\n    would have a conversation with\
    \ your users. This is computer language,\n    and also the date-time object is\
    \ a timestamp instead of an\n    understandable date.\n\n    Instead, you would\
    \ like to answer your users, maybe even in a Google\n    Assistant rich message\
    \ card:\n\n    “It looks like 3000 dollars has been transferred today at 3 PM.”\n\
    \n    So you will need a code that translates web service responses to a\n   \
    \ human-understandable conversation.\n\n7.  The webhook sends the response to\
    \ the agent, so users can see and\n    hear this.\n\nYou can see the preceding\
    \ example flow exactly in Figure [10-1](#506047_1_En_10_Chapter.xhtml#Fig1). In\
    \ step 6,\nthis is the additional work as seen in the webhook column. You will\
    \ need\na conversational UX designer to write the dialogue for the replies. You\n\
    will need a developer who works in the webhook back-end code; to fetch\nthe incoming\
    \ request, call the underlying web services to translate\ncomputer responses to\
    \ meaningful dialogues, and then return it to the\nagent.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig1_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1\nA diagram that explains how Dialogflow fulfillment\nworks. For\
    \ simplicity of this Dialogflow, I have simplified the previous\ndiagram. Theoretically,\
    \ there should be a layer between the Dialogflow\nand webhook, which is your own\
    \ custom implementation of the integration\n(which likely also includes security);\
    \ that’s the part that does the\ndetectIntent calls. See Chapter [11](#506047_1_En_11_Chapter.xhtml)\
    \ for more information\n\nNote\n\nThe webhook response must occur within 5 seconds.\
    \ For Google\nAssistant actions, the response time can be extended to 10 seconds.\n\
    Also, the webhook response must be less than or equal to 64KiB in size.\nIf these\
    \ limitations are not fulfilled, then the webhook request will\ntime out and give\
    \ the error “Webhook call failed. Error:\nDEADLINE_EXCEEDED”, which you can see\
    \ in the Fulfillment status.\n\nThere are various ways how you can execute a fulfillment\
    \ with\nDialogflow:\n\n*   Firebase Functions via the inline editor\n\n*   Fulfillment\
    \ webhook\n\n    *   Cloud Functions\n\n    *   Google Cloud computing solutions\
    \ such as App Engine, Cloud Run,\n        Compute Engine, or GKE\n\n    *   On-premise\
    \ hosting\n\n    *   Locally\n\nBuilding a Fulfillment with the Built-in Editor\n\
    \nFor simple webhook testing and implementation, you can use the inline\neditor.\
    \ Under the hood, it makes use of serverless Cloud Functions for\nFirebase; see\
    \ Figure [10-2](#506047_1_En_10_Chapter.xhtml#Fig2).\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig2_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2\nA simple diagram that explains how Dialogflow fulfillment works\
    \ for\nthe inline editor\n\nCloud Functions\nfor Firebase is a serverless framework\
    \ that lets you automatically run\nback-end code in response to events triggered\
    \ by Firebase features and\nHTTPS requests. Your JavaScript or TypeScript code\
    \ is stored in Google’s\ncloud and runs in a managed environment. There’s no need\
    \ to manage and\nscale your own servers.\n\nNote\n\nWhen your web services are\
    \ a little more advanced or care about the\nregion where your code is hosted,\
    \ you likely won’t use the inline\neditor. Instead, you will enable the webhook\
    \ switch, so you can specify\nyour own web services URL.\n\nEnable Fulfillment\n\
    \nYou will have to enable dynamic fulfillment on the\nintent level. While you\
    \ are on the intent page, you can enable\nfulfillment via the switches as seen\
    \ in Figure [10-3](#506047_1_En_10_Chapter.xhtml#Fig3).\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig3_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3\nEnable fulfillment in Dialogflow for each intent\n\nThe enable\
    \ webhook call for this intent enables dynamic\nfulfillment.\nThe second switch\
    \ will enable webhooks for **slot\nfilling**. When an intent is matched at runtime,\
    \ the Dialogflow\nagent continues collecting information from the end user until\
    \ the end\nuser has provided data for each of the required parameters. This process\n\
    is called slot filling. By default, Dialogflow does not send a\nfulfillment webhook\
    \ request until it has collected all the data needed\nfrom the end user before\
    \ posting it to the webhook back end when\nparameters are marked as required.\
    \ (This means the agent will ask\nfollow-up questions before calling the fulfillment\
    \ back-end code.)\nDialogflow will go through all the required parameters in the\
    \ provided\norder.\nHowever, when the webhook call for slot filling switch is\
    \ enabled,\nDialogflow sends a fulfillment webhook request for each conversational\n\
    turn during slot filling. You might want to use this when you have a\nlarge conversation,\
    \ and you want to store all the answers for each\nquestion each turn-taking turn.\
    \ A technique you might be familiar with\nfrom websites that present large forms\
    \ or shopping carts is they store\nevery form field or step before submitting\
    \ the total form (last\npage).\n\nThe next step is to tell Dialogflow where to\
    \ post the data to. The\nwebhook back-end code can be written in the editor, or\
    \ you can provide\none URL to a web service where Dialogflow will post. To use\
    \ the editor,\nmake sure the **enable inline editor switch** is enabled.\nSee\
    \ Figure [10-4](#506047_1_En_10_Chapter.xhtml#Fig4).\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig4_HTML.png](images/506047_1_En_10_Chapter/506047_1_En_10_Fig4_HTML.png)\n\
    \nFigure 10-4\nThe inline editor in Dialogflow\n\nUsing the dialogflow-fulfillment\
    \ Package\nBy default, the editor contains some example code. It will make use\n\
    of the **dialogflow-fulfillment** npm library. See the\n**package.json** file\
    \ in Listing [10-1](#506047_1_En_10_Chapter.xhtml#PC2).\n\nCaution\n\nThe **dialogflow-fulfillment**\
    \ library is no longer\nmaintained. It doesn’t mean that it will be removed; it\
    \ will work, but\nyou won’t see any updates to the library. It should only be\
    \ used when\nusing the inline editor. Later in this chapter, I will also show\
    \ you how\nyou can build a fulfillment without the dialogflow-fulfillment\nlibrary.\n\
    \n```\n{\n\"name\": \"dialogflowFirebaseFulfillment\",\n\"description\": \"This\
    \ is the default fulfillment for a Dialogflow agent using Cloud Functions for\
    \ Firebase\",\n\"version\": \"0.0.1\",\n\"private\": true,\n\"license\": \"Apache\
    \ Version 2.0\",\n\"author\": \"Lee Boonstra\",\n\"engines\": {\n\"node\": \"\
    8\"\n},\n\"scripts\": {\n\"start\": \"firebase serve --only functions:dialogflowFirebaseFulfillment\"\
    ,\n\"deploy\": \"firebase deploy --only functions:dialogflowFirebaseFulfillment\"\
    \n},\n\"dependencies\": {\n\"actions-on-google\": \"^2.12.0\",\n\"firebase-admin\"\
    : \"^5.13.1\",\n\"firebase-functions\": \"^2.0.2\",\n\"dialogflow-fulfillment\"\
    : \"^0.6.1\"\n}\n}\nListing 10-1\nDialogflow fulfillment in the editor, package.json\n\
    ```\n\nFirebase HTTPS functions start with the following code implementation\n\
    (see Listing [10-2](#506047_1_En_10_Chapter.xhtml#PC3)) to fetch data\nfrom the\
    \ request.\n\n```\nconst functions = require('firebase-functions');\nexports.helloWorld\
    \ = functions.https.onRequest((request, response) => {\nresponse.send(\"Hello\
    \ from Firebase!\");\n});\nListing 10-2\nA cloud function in Firebase\n```\n\n\
    Under the hood, this Node.js script makes use of the Node.js web\nframework Express.\
    \ The request parameter will give you information such\nas parameters from the\
    \ request.body. With the response parameter, you\ncan return the results (back\
    \ to Dialogflow.)\nWhen Firebase Functions are used in combination with the\n\
    dialogflow-fulfillment package, your Dialogflow code could look like the\n**index.js**\
    \ file of Listing [10-3](#506047_1_En_10_Chapter.xhtml#Par41). This example\n\
    has an intent map for three intents: the `default welcome`,\n`default fallback`,\
    \ and the `buy product regex`. It\nwill show a response that’s provided by the\
    \ fulfillment code. The\nwelcome message and fallback will show a simple message,\
    \ where the buy\nproduct regex intent will show you a rich message—a card component.\n\
    ***Listing 10-3.*** Dialogflow fulfillment in the\neditor\n`'use strict';`\n`const\
    \ functions = require('firebase-functions');`\n`const { WebhookClient, Card, Suggestion\
    \ } = require('dialogflow-fulfillment');`\n`process.env.DEBUG = 'dialogflow:debug';\
    \ // enables lib debugging statements`\n`exports.dialogflowFirebaseFulfillment\
    \ = functions.https.onRequest((request, response) => {`\n`const agent = new WebhookClient({\
    \ request, response });`\n`console.log('Dialogflow Request headers: ' + JSON.stringify(request.headers));`\n\
    `console.log('Dialogflow Request body: ' + JSON.stringify(request.body));`\n`function\
    \ welcome(agent) {`\n``agent.add(`Welcome to my agent!`);``\n`}`\n`function fallback(agent)\
    \ {`\n``agent.add(`I didn't understand`);``\n``agent.add(`I'm sorry, can you try\
    \ again?`);``\n`}`\n`function yourFunctionHandler(agent) {`\n``agent.add(`Ok.\
    \ Buying product:`);``\n`console.log(agent.parameters);`\n`agent.add(new Card({`\n\
    `title: agent.parameters.producttype,`\n`imageUrl: 'https://dummyimage.com/300x200/000/fff',`\n\
    ``text: `This is the body text of a card.  You can even use line\\n  breaks and\
    \ emoji!`` ![../images/506047_1_En_10_Chapter/506047_1_En_10_Figa_HTML.gif](images/506047_1_En_10_Chapter/506047_1_En_10_Figa_HTML.gif),\n\
    `buttonText: 'This is a button',`\n`buttonUrl: 'https://console.dialogflow.com/'`\n\
    `})`\n`);`\n``agent.add(new Suggestion(`Quick Reply`));``\n``agent.add(new Suggestion(`Suggestion`));``\n\
    `agent.context.set({ name: 'gamestore-picked', lifespan: 2, parameters: { gameStore:\
    \ 'DialogflowGameStore' }});`\n`}`\n`// Run the proper function handler based\
    \ on the matched Dialogflow intent name`\n`let intentMap = new Map();`\n`intentMap.set('Default\
    \ Welcome Intent', welcome);`\n`intentMap.set('Default Fallback Intent', fallback);`\n\
    `intentMap.set('Buy product regex', yourFunctionHandler);`\n`agent.handleRequest(intentMap);`\n\
    `});`\n\nThe **dialogflow-fulfillment** package does these main\nthings:\n\n*\
    \   It wraps code around the request/responses to make the syntax of\n    getting\
    \ and returning a matched intent (with parameters and responses)\n    easier.\n\
    \n    For example, **agent.add()** returns responses to\n    Dialogflow, one by\
    \ one. Or you could build a JavaScript intent map and\n    use **agent.handleRequest()**\
    \ to switch between the various\n    intents. For example, Dialogflow detected\
    \ the ‘Buy product regex’ intent\n    as a match (it has the highest confidence\
    \ level). The request object in\n    the Cloud Function contains this detected\
    \ intent. If the strings in the\n    intent map contain the same string as the\
    \ matched intent name (the name\n    you used to create an intent in the Dialogflow\
    \ UI), then it will invoke\n    a function (in this case, yourFunctionHandler).\
    \ That custom function\n    will use **agent.add()** to return messages to your\
    \ chatbot\n    implementation, such as the web UI. You could get parameters or\
    \ contexts\n    from the **agent** parameter too.\n\n*   It wraps code around\
    \ the various Dialogflow custom payloads for\n    Dialogflow and other integrations\
    \ (such as the Google Assistant) to\n    implement those more quickly. Look into\
    \ the `yourFunctionHandler`\n    function. To display a rich message with a Dialogflow\
    \ card, you don’t\n    have to write a long JSON payload; instead, you can use\
    \ the\n    **Card()** class.\n\nOnce you finish writing your code in the cloud\
    \ function, you can\nclick **deploy**. It will take a few minutes for Dialogflow\n\
    to reach Firebase and build a serverless container under the hood, which\nwill\
    \ be reachable via public HTTPS.\n\nCaution\n\nThe inline editor uses the **firebase-admin**\n\
    dependencies under the hood. The **dialogflow-fulfillment**\nlibrary uses the\
    \ **actions-on-google** under the hood. You\nwill have to list `\"actions-on-google\"\
    `\nand `\"firebase-admin\"` in\nthe **package.json** dependencies to deploy a\
    \ cloud\nfunction with the inline editor; else, you will receive a build\nerror.\n\
    \nDiagnostic Info\n\nRequests that will be sent to the webhook can be viewed with\
    \ the\n**Diagnostic Info** button at the bottom of the page. It\nwill open a window\
    \ as seen in Figure [10-5](#506047_1_En_10_Chapter.xhtml#Fig5), which will\nshow\
    \ you the fulfillment request.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig5_HTML.png](images/506047_1_En_10_Chapter/506047_1_En_10_Fig5_HTML.png)\n\
    \nFigure 10-5\nDiagnostic info ➤ Fulfillment request, which will be sent to the\n\
    Dialogflow API\n\nThe fulfillment response tab as seen in Figure [10-6](#506047_1_En_10_Chapter.xhtml#Fig6)\
    \ will show you\nthe response returned from the webhook (server).\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig6_HTML.png](images/506047_1_En_10_Chapter/506047_1_En_10_Fig6_HTML.png)\n\
    \nFigure 10-6\nDiagnostic info ➤ Fulfillment response from the Dialogflow API\n\
    \nThe fulfillment status can tell you if\nthe webhook execution was successful\
    \ or not; see Figure [10-7](#506047_1_En_10_Chapter.xhtml#Fig7).\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig7_HTML.png](images/506047_1_En_10_Chapter/506047_1_En_10_Fig7_HTML.png)\n\
    \nFigure 10-7\nDiagnostic info ➤ Fulfillment status returned by the Dialogflow\n\
    API\n\nFirebase Logs\nSince the inline editor uses Cloud Functions within Firebase,\
    \ you can\nget access to the logs via Firebase. This is handy\nfor debugging when\
    \ things go wrong.\n\nJust open Firebase ([`https://console.firebase.google.com/`](https://console.firebase.google.com/))\n\
    and click **Functions** ➤ **Logging**. Figure\n[10-8](#506047_1_En_10_Chapter.xhtml#Fig8)\
    \ will show you\nhow the logs screen in Firebase will look like.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig8_HTML.png](images/506047_1_En_10_Chapter/506047_1_En_10_Fig8_HTML.png)\n\
    \nFigure 10-8\nThe Firebase logs can show you the log information of your Dialogflow\n\
    fulfillment from the editor\n\nNote\n\nThe inline editor in Dialogflow makes use\
    \ of Firebase Functions (Free\nSpark plan).\nAccording to the Firebase Pricing,\
    \ Outbound Network connections for\nFirebase Cloud Functions are supported with\
    \ the Blaze plan. Network\nEgress is free for the first 5GB. Afterward, you will\
    \ pay $0.12 per GB.\nThis means you will need a payment method by upgrading the\
    \ Firebase\nplan, and you will have to pay for requesting other external web\n\
    services from within the Cloud Function.\n\nBesides writing JavaScript fulfillment\
    \ code by the\n**dialogflow-fulfillment npm** package, there are other\nways how\
    \ you can write fulfillment code with JavaScript. As a matter of\nfact, you can\
    \ write any fulfillment in the language you like, but this\nbook uses JavaScript\
    \ for all of the examples.\nFor example, you could write JavaScript fulfillments\
    \ with the Actions\non Google npm package ([`https://www.npmjs.com/package/actions-on-google`](https://www.npmjs.com/package/actions-on-google)).\n\
    You could use this if you are building fulfillment for the Google\nAssistant.\n\
    It’s also possible to manually create a webhook without any npm\npackage at all.\
    \ You would need to fetch the matched intent name,\nparameters, and context from\
    \ the incoming webhook requests, manually\nbuild custom payloads, and return them\
    \ to the agent.\n\nUsing Actions on Google for Building Dialogflow\nFulfillment\n\
    \nLet’s look into an example using the\nActions on Google package; it will do\
    \ the exact same thing as the code\nexample in Listing [10-2](#506047_1_En_10_Chapter.xhtml#PC3).\
    \ Since Actions\non Google is an npm package, you will need a\n**package.json**\
    \ as shown in Listing [10-4](#506047_1_En_10_Chapter.xhtml#PC5).\n\n```\n{\n\"\
    name\": \"dialogflowFirebaseFulfillment\",\n\"description\": \"This is the default\
    \ fulfillment for a Dialogflow agents using Cloud Functions for Firebase\",\n\"\
    version\": \"0.0.1\",\n\"private\": true,\n\"license\": \"Apache Version 2.0\"\
    ,\n\"author\": \"Lee Boonstra\",\n\"engines\": {\n\"node\": \"8\"\n},\n\"scripts\"\
    : {\n\"start\": \"firebase serve --only functions:dialogflowFirebaseFulfillment\"\
    ,\n\"deploy\": \"firebase deploy --only functions:dialogflowFirebaseFulfillment\"\
    \n},\n\"dependencies\": {\n\"actions-on-google\": \"^2.12.0\",\n\"firebase-admin\"\
    : \"^5.13.1\",\n\"firebase-functions\": \"^2.0.2\"\n}\n}\nListing 10-4\nActions\
    \ on Google package.json\n```\n\nThe **index.js** of Listing [10-5](#506047_1_En_10_Chapter.xhtml#Par61)\
    \ contains the\nimplementation code.\n***Listing 10-5.*** Actions on Google index.js\n\
    `'use strict';`\n`const {`\n`dialogflow,`\n`BasicCard,`\n`Button,`\n`Image,`\n\
    `Suggestions`\n`} = require('actions-on-google');`\n`const functions = require('firebase-functions');`\n\
    `process.env.DEBUG = 'dialogflow:debug'; // enables lib debugging statements`\n\
    `function welcome(conv) {`\n`console.log('Dialogflow Request headers: ' + JSON.stringify(conv.headers));`\n\
    `console.log('Dialogflow Request body: ' + JSON.stringify(conv.body));`\n``conv.ask(`Welcome\
    \ to my agent!`);``\n`}`\n`function fallback(conv) {`\n`console.log('Dialogflow\
    \ Request headers: ' + JSON.stringify(conv.headers));`\n`console.log('Dialogflow\
    \ Request body: ' + JSON.stringify(conv.body));`\n``conv.ask(`I didn't understand`);``\n\
    ``conv.ask(`I'm sorry, can you try again?`);``\n`}`\n`function yourFunctionHandler(conv,\
    \ parameters) {`\n``conv.ask(`Ok. Buying product:`);``\n`console.log(parameters);`\n\
    `conv.ask(new BasicCard({`\n`title: parameters.producttype,`\n`image: new Image({`\n\
    `url: 'https://dummyimage.com/300x200/000/fff',`\n`alt: 'Image alternate text',`\n\
    `}),`\n``text: `This is the body text of a card.  You can even use line\\n  breaks\
    \ and emoji!`` ![../images/506047_1_En_10_Chapter/506047_1_En_10_Figb_HTML.gif](images/506047_1_En_10_Chapter/506047_1_En_10_Figb_HTML.gif),\n\
    `buttons: new Button({`\n`title: 'This is a button',`\n`url: 'https://assistant.google.com/',`\n\
    `})`\n`}));`\n``conv.ask(new Suggestions(`Quick Reply`));``\n``conv.ask(new Suggestions(`Suggestion`));``\n\
    `conv.contexts.set({ name: 'gamestore-picked', lifespan: 2, parameters: { gameStore:\
    \ 'DialogflowGameStore' }});`\n`}`\n`const app = dialogflow();`\n`// Run the proper\
    \ function handler based on the matched Dialogflow intent name`\n`app.intent('Default\
    \ Welcome Intent', welcome);`\n`app.intent('Default Fallback Intent', fallback);`\n\
    `app.intent('Buy product regex', yourFunctionHandler);`\n`` // Intent in Dialogflow\
    \ called `Goodbye` ``\n`app.intent('Goodbye', conv => {`\n`conv.close('See you\
