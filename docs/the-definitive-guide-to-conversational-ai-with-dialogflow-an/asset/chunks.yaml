    Click the integration: **Web Demo**.


    This will show a pop-up; see Figure [6-8](#506047_1_En_6_Chapter.xhtml#Fig8).


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig8_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Web Demo iframe implementation to copy


    The pop-up will show the iframe code (Listing [6-2](#506047_1_En_6_Chapter.xhtml#PC2))
    to include in your website. You can click the link to test the chatbot in the
    browser. When you are ready, you can implement the iframe code on a website.


    ```


    Listing 6-2

    Iframe example

    ```


    Typically, web developers put this in a website pop-up which can be opened from
    a button on the bottom of a website. Figure [6-9](#506047_1_En_6_Chapter.xhtml#Fig9)
    shows how the chatbot on your website looks like.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig9_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Web Demo example


    You can customize the top logo and the description underneath the name of your
