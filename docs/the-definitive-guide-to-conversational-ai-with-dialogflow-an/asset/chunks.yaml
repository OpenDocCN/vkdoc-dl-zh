  raw: "You could store a test case like the previous one in BigQuery, so you\ncan\
    \ rerun the scenario each time when you make changes to your agent.\nYou would\
    \ need to request the total recall and precision from your data\nwarehouse. And\
    \ you would store the **f1 score** so you will\nbe able to retrieve this later\
    \ in your reports.\n\nConfusion Matrix\nIn the field of machine learning, a **confusion\n\
    matrix** \n, also known as an error matrix, is a specific table layout that\n\
    allows visualization of the performance of an algorithm (in our case,\nthe underlying\
    \ machine learning model for the virtual agent). Each row\nof the matrix represents\
    \ the expected intents, while each column\nrepresents the actual matched intent\
    \ by the Dialogflow API.\nThe name stems from the fact that it makes it easy to\
    \ see if the\nagent is confusing two classes (commonly mislabeling one as\nanother).\n\
    When you have lots of test cases, you could render all the scores in\none big\
    \ matrix.\n\nAs you can see in Figure [13-23](#506047_1_En_13_Chapter.xhtml#Fig23),\
    \ each intent\ncontains the sum of all the TPs. This should give you a diagonal\n\
    (orange) line from the top to the bottom. The red squares are the sum of\nall\
    \ the FPs; for example, in the following matrix, you can see that\nthere’s a test\
    \ case (user utterance) which is expected to be matched to\nthe intent, *get_price*,\
    \ but that got matched to the\n*collect_current_playing_game* intent.\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig23_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig23_HTML.jpg)\n\
    \nFigure 13-23\nConfusion matrix in action\n\nSummary\n\nThis chapter contains\
    \ information about collecting and monitoring agent\ninsights and analytics. It\
    \ is divided into the following categories:\n\n*   Conversation-related metrics\n\
    \nWhat did your users say, when, and where? You can capture\n    conversation-related\
    \ metrics and store them in a data warehouse like\n    BigQuery.\n\n*   Customer\
    \ rating metrics\n\nWhat did your users think of your brand? How can you collect\
    \ ratings\n    with Dialogflow?\n\n*   Chat session and funnel metrics\n\nThe\
    \ paths that your users took to engage with your agent. How to\n    monitor chat\
    \ sessions and funnel metrics with Dialogflow and\n    Chatbase.\n\n*   Bot model\
    \ health metrics\n\nHow to capture chatbot model health metrics for testing the\n\
    \    underlying machine learning model quality in order to tweak the\n    Dialogflow\
    \ machine learning threshold.\n\nIn case you want to build this example, the source\
    \ code for this book\nis available on GitHub via the book’s product page, located\
    \ at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4).\n\
    Look into the **advanced-agent-insights** folder.\n\nFurther Reading\n\n*   Dialogflow\
    \ documentation on History\n\n[`https://cloud.google.com/dialogflow/es/docs/history`](https://cloud.google.com/dialogflow/es/docs/history)\n\
    \n*   Dialogflow documentation on Analytics\n\n[`https://cloud.google.com/dialogflow/es/docs/analytics`](https://cloud.google.com/dialogflow/es/docs/analytics)\n\
    \n*   Dialogflow documentation on training agents\n\n[`https://cloud.google.com/dialogflow/es/docs/training`](https://cloud.google.com/dialogflow/es/docs/training)\n\
    \n*   Google Cloud documentation on BigQuery\n\n[`https://cloud.google.com/bigquery/docs`](https://cloud.google.com/bigquery/docs)\n\
    \n*   Google Cloud documentation on Pub/Sub\n\n[`https://cloud.google.com/pubsub/docs/`](https://cloud.google.com/pubsub/docs/)\n\
    \n*   Google Cloud documentation on Cloud Functions\n\n[`https://cloud.google.com/functions/docs/`](https://cloud.google.com/functions/docs/)\n\
    \n*   Languages that support built-in sentiment analysis\n\n[`https://cloud.google.com/dialogflow/es/docs/reference/language`](https://cloud.google.com/dialogflow/es/docs/reference/language)\n\
    \n*   A real-world approach example of a chatbot integrated into a\n    website\n\
    \n[`https://github.com/savelee/kube-django-ng`](https://github.com/savelee/kube-django-ng)\n\
    \n*   Dialogflow documentation on sentiment analysis in Dialogflow"
  trans: "\n你可以将类似上述的测试用例存储在 `BigQuery` 中，这样每次对智能体进行更改时，都可以重新运行该场景。你需要从数据仓库中请求总召回率和精确率。同时，你还需要存储\
    \ `f1 score`，以便日后在报告中检索这些数据。\n\n## 混淆矩阵\n\n在机器学习领域，`混淆矩阵`（也称为误差矩阵）是一种特定的表格布局，用于可视化算法的性能（在我们的案例中，即虚拟智能体底层机器学习模型的性能）。矩阵的每一行代表预期的意图，而每一列代表\
    \ `Dialogflow API` 实际匹配到的意图。其名称源于它能直观地显示智能体是否混淆了两个类别（即经常将一个类别错误地标记为另一个类别）。当你拥有大量测试用例时，可以将所有分数呈现在一个大型矩阵中。\n\
    \n如图 13-23 所示，每个意图都包含所有 TP 的总和。这应该会形成一条从顶部到底部的对角线（橙色）。红色方块是所有 FP 的总和；例如，在下方的矩阵中，你可以看到一个测试用例（用户话语）预期应匹配到\
    \ `get_price` 意图，但实际上却匹配到了 `collect_current_playing_game` 意图。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig23_HTML.jpg](img/506047_1_En_13_Fig23_HTML.jpg)\n\
    \n**图 13-23** 混淆矩阵示例\n\n## 总结\n\n本章包含关于收集和监控智能体洞察与分析的信息。内容分为以下几类：\n\n- **对话相关指标**\
    \  \n  用户说了什么、何时说的、在哪里说的？你可以捕获对话相关指标，并将其存储在像 `BigQuery` 这样的数据仓库中。\n\n- **客户评分指标**\
    \  \n  用户对你的品牌有何看法？如何通过 `Dialogflow` 收集评分？\n\n- **聊天会话与漏斗指标**  \n  用户与你的智能体交互所走的路径。如何通过\
    \ `Dialogflow` 和 `Chatbase` 监控聊天会话与漏斗指标？\n\n- **机器人模型健康指标**  \n  如何捕获聊天机器人模型健康指标，以测试底层机器学习模型的质量，从而调整\
    \ `Dialogflow` 机器学习阈值。\n\n如果你想构建这个示例，本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4)。请查看\
    \ `advanced-agent-insights` 文件夹。\n\n## 延伸阅读\n\n- Dialogflow 关于历史记录的文档  \n  [`https://cloud.google.com/dialogflow/es/docs/history`](https://cloud.google.com/dialogflow/es/docs/history)\n\
    \n- Dialogflow 关于分析的文档  \n  [`https://cloud.google.com/dialogflow/es/docs/analytics`](https://cloud.google.com/dialogflow/es/docs/analytics)\n\
    \n- Dialogflow 关于训练智能体的文档  \n  [`https://cloud.google.com/dialogflow/es/docs/training`](https://cloud.google.com/dialogflow/es/docs/training)\n\
    \n- Google Cloud 关于 BigQuery 的文档  \n  [`https://cloud.google.com/bigquery/docs`](https://cloud.google.com/bigquery/docs)\n\
    \n- Google Cloud 关于 Pub/Sub 的文档  \n  [`https://cloud.google.com/pubsub/docs/`](https://cloud.google.com/pubsub/docs/)\n\
    \n- Google Cloud 关于 Cloud Functions 的文档  \n  [`https://cloud.google.com/functions/docs/`](https://cloud.google.com/functions/docs/)\n\
    \n- 支持内置情感分析的语言  \n  [`https://cloud.google.com/dialogflow/es/docs/reference/language`](https://cloud.google.com/dialogflow/es/docs/reference/language)\n\
    \n- 一个集成到网站中的聊天机器人的实际应用示例  \n  [`https://github.com/savelee/kube-django-ng`](https://github.com/savelee/kube-django-ng)\n\
    \n- Dialogflow 关于情感分析的文档\n"
