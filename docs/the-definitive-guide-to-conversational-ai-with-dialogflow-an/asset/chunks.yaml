  trans: "\n# 启用闲聊模块\n\n**闲聊**是对您自定义意图的绝佳补充，尽管它们的工作方式与手动意图略有不同。通过意图，您可以提供训练短语，这意味着您可以训练聊天机器人以不同方式回答问题时也能正确回应。闲聊和常见问题知识库连接器（请参阅本章后续内容）不提供添加训练短语的选项。它们使用\
    \ Dialogflow 的自然语言理解来理解用户的问题。通常，这效果不错；例如，当您说“哈哈，你太搞笑了”时，闲聊句子“你真有趣”也会得到回应。但是，当您问“你存在吗？”时，它不会给出“你是真实的吗？”的答案。\n\
    \n即使您没有在闲聊自定义页面上提供答案，它也会使用现成的答案。自定义基本上意味着您覆盖了 Dialogflow 标准的闲聊答案。\n\n**注意**\n\n\
    尽管在聊天机器人中创建类似人类的对话（作为自定义意图的补充）非常棒，但您必须小心处理特定的闲聊短语，例如确认短语，如“是”、“否”和“取消”。这些短语可能会得到“好的！”这样的回应，但它们不会执行现成的代码，也不会让对话继续下去。它们确实会设置一个\
    \ POST 动作，例如 `smalltalk.confirmation.yes`，因此您需要在您的实现代码或 webhook 中监听这些意图。\n\n人们经常对一个问题回答“是”或“否”，而答案本身并不期望“是”或“否”。闲聊答案很可能不是用户所期望的。在这种情况下，每个提供后续问题或上下文的意图也必须提供适当的回退，这一点非常重要。\n\
    \n在撰写本文时，闲聊仅支持英语（`en`）、俄语（`ru`）、法语（`fr`）和意大利语（`it`），并且不适用于超级代理。\n\n**注意**\n\n\
    根据 **Actions on Google** 政策，完全启用闲聊会导致您的操作被拒绝。\n\n要为您的 Dialogflow 代理启用闲聊，您可以点击菜单项：**闲聊**。在闲聊设置页面上，您会找到一个开关来切换**启用**开关。这将启用所有闲聊主题。\n\
    \n点击您想要修改回复文本的主题之一。例如，点击**关于代理**；这将展开**问题**（用于匹配用户话语）和文本回复**答案**对。（见图 4-3。）\n\n\
    ![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig3_HTML.png](img/506047_1_En_4_Fig3_HTML.png)\n\
    \n图 4-3\n\n启用闲聊模块\n\n点击**保存**。\n\n## 创建常见问题知识库\n\n**知识库**代表您提供给 Dialogflow ES\
    \ 的知识文档集合。知识文档可以是常见问题或文本块。\n\n**知识连接器**补充了已定义的意图。使用知识连接器的代理通常也会使用已定义的意图。与闲聊类似，知识连接器提供的回复精度和控制能力不如意图。它使用\
    \ Dialogflow 的自然语言理解来理解用户的问题。通常，这效果不错，但有时，特别是当您以非常不同的方式提问时，它可能找不到答案。您应该定义意图来处理复杂的用户请求，并让知识连接器处理简单的请求。\n\
    \n首先，点击代理标题旁边的齿轮图标，打开**设置屏幕**。\n\n向下滚动到**测试版功能**，并翻转开关：**启用测试版功能和 API**。（见图 4-4。）点击**保存**。\n\
    \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig4_HTML.jpg](img/506047_1_En_4_Fig4_HTML.jpg)\n\
    \n图 4-4\n\n为了使用知识库连接器，您需要从设置 ➤ 常规屏幕启用测试版功能和 API\n\n点击**知识**菜单。\n\n在顶部栏中，您可以点击**创建知识库**按钮，开始添加您的第一个知识库（图\
    \ 4-5）。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig5_HTML.jpg](img/506047_1_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5\n\n创建知识库\n\n为知识库命名，例如*电子游戏常见问题*，然后点击**保存**。\n\n一个知识库可以包含多个文档。点击链接**创建第一个**（图\
    \ 4-6）。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig6_HTML.jpg](img/506047_1_En_4_Fig6_HTML.jpg)\n\
    \n图 4-6\n\n创建知识文档\n\n在弹出的屏幕中（图 4-7），您可以添加以下信息：\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig7_HTML.jpg](img/506047_1_En_4_Fig7_HTML.jpg)\n\
    \n图 4-7\n\n文档设置弹出屏幕\n\n*   您可以给文档命名，例如*内部电子游戏常见问题*或*来自 IGN.com 的公共电子游戏常见问题*。\n\
    *   您可以选择知识类型：\n    *   **常见问题**：带答案的问题\n    *   **扩展问答**：让 Dialogflow 基于文章/文本块理解问题\n\
    *   MIME 类型：\n    *   `text/html`：如果您想从公共网站导入常见问题。\n    *   `text/csv`（CSV 文件）：这可以是数据库导出文件。\n\
    *   作为数据源，您可以选择以下之一：\n    *   **云存储上的文件**：用于存储在 Google Cloud Storage 中的私有 CSV\
    \ 文件（安全）。\n    *   **URL**：要从中导入常见问题的公共网站 URL。\n    *   **从计算机上传文件**：从您的磁盘上传私有\
    \ CSV 文件。\n*   有一个**启用自动重新加载**复选框，允许 Dialogflow 自动重新加载公共网站常见问题，以确保您获取到新增或更改的常见问题。\n\
    \n当您按下**创建**按钮时，Dialogflow 将开始爬取/导入问题和答案对。完成后，您将在知识库文档概览中看到该文档。（见图 4-8。）在此视图中，可以删除或添加更多文档。\n\
    \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig8_HTML.jpg](img/506047_1_En_4_Fig8_HTML.jpg)\n\
    \n图 4-8\n\n知识文档概览\n\n此时，您还没有完成。您需要告诉 Dialogflow 它应该返回什么答案。点击**添加回复**链接。它会预先为您填充一个答案\
    \ `$Knowledge.Answer[1]`，这意味着置信度最高的第一个答案（图 4-9）。\n"
- fmt: "![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig9_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig9_HTML.jpg)\n\
    \n**Figure 4-9** Fine-tune the knowledge base document responses\n\nBut you might\
    \ want to fine-tune the answers for different channel integrations (e.g., to return\
    \ the response on the Google Assistant in a card). And you might want to end with\
    \ a question to keep the conversation going/steer the conversation. Then hit **Save**.\n\
    \nBy default, a knowledge base is configured with a default text response populated\
    \ with the best matching knowledge answer: `$Knowledge.Answer[1]`. But knowledge\
    \ responses may contain multiple answers, and you can reference these answers\
    \ in your configured responses. The index for `$Knowledge.Question` and `$Knowledge.Answer`\
    \ starts at `1`, so increase this index when adding more responses.\n\nWhen defining\
    \ responses, you should consider these points:\n\n- If the number of defined responses\
    \ is greater than the number N of knowledge connector response matches, only N\
    \ responses will be returned.\n- Given that the accuracy could be lower than matching\
    \ explicitly defined intents, we recommend returning three or more responses to\
    \ your users when possible.\n\nOnce you are ready with importing all the Questions\
    \ and Answers, you can test the knowledge connector in the Dialogflow simulator\
    \ (Figure [4-10](#506047_1_En_4_Chapter.xhtml#Fig10)).\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig10_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig10_HTML.jpg)\n\
    \n**Figure 4-10** Test the knowledge base in the simulator\n\nDialogflow Trial\
    \ and Enterprise Essentials allow a maximum of 10MB as total document size, 1000\
    \ requests per month and 100 requests per day. When you choose the Dialogflow\
    \ Enterprise Plus tier, this all will be unlimited.\n\nBack on the knowledge base\
    \ page (when you click **Knowledge** in the Dialogflow menu), you will notice\
    \ an adjustment slider (Figure [4-11](#506047_1_En_4_Chapter.xhtml#Fig11)). When\
    \ an end user expression also matches an intent, you can specify how strongly\
    \ you prefer knowledge base results. Adjust the slider from weaker (preference\
    \ given to intent) to stronger (preference given to knowledge).\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig11_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig11_HTML.jpg)\n\
    \n**Figure 4-11** Adjusting the weakness of the knowledge base\n\n## Best Practices\n\
    \nFor best results, here are a couple of best practices.\n\nIn general:\n\n- CSV\
    \ files must use commas as delimiters.\n- The ML Settings Confidence score is\
    \ not calibrated between FAQs and Knowledge Base Articles, so if you use both\
    \ FAQs and Knowledge Base Articles, the best result may not always be the highest.\n\
    - Dialogflow removes HTML tags from content when creating responses. Because of\
    \ this, it’s best to avoid HTML tags and use plain text when possible.\n- Google\
    \ Assistant responses have a 640-character limit per chat bubble, so long answers\
    \ are truncated when integrating with Google Assistant.\n- The maximum document\
    \ size is 50MB.\n- When using Cloud Storage files, you should either use public\
    \ URIs or private URIs that your user account or service account has access to.\n\
    \n**Note** In the past, I have seen a few of my public knowledge base FAQs from\
    \ (my own) web pages failing. By reverse-engineering the Google implementation,\
    \ I’ve figured out that the public FAQ website will need to allow Google robots.\
    \ You should add the public FAQ website to the Google Search engine via the Google\
    \ Search Console, and have been crawled by the search indexer, so it exists in\
    \ the search index. Therefore, websites like `https://pages.github.com` won’t\
    \ work.\n\nSpecific to FAQ:\n\n- Your CSV file must have the questions in the\
    \ first column and the answers in the second. Also, it should not contain a header.\n\
    - Use CSV whenever possible, because CSV is parsed most accurately.\n- Public\
    \ HTML content with a single QA pair is not supported.\n- The number of QA pairs\
    \ in one document should not exceed 2000.\n- Duplicate questions with different\
    \ answers are not supported.\n- If possible, use valid HTML5 markup for Q&As and\
    \ base it on the FAQPage schema.org notation.\n\nSpecific to Extractive QA:\n\n\
    - Content with dense text works best. Avoid content with many single sentence\
    \ paragraphs.\n- Tables and lists are not supported.\n- The number of paragraphs\
    \ in one document should not exceed 2000.\n- If an article is long (> 1000 words),\
    \ try to break it down into multiple, smaller articles. If the article covers\
    \ multiple issues, it can be broken into shorter articles covering the individual\
    \ issues. If the article only covers one issue, then focus the article on the\
    \ issue description and keep the issue resolution short.\n- Ideally, only the\
    \ core content of an article should be provided (issue description and resolution).\
    \ Additional content like author name, modification history, related links, and\
    \ ads are not important.\n\n**Note** Extractive QA is, at the time of writing,\
    \ experimental. It is based on similar technologies that have been tried and tested\
    \ at Google in products like Search and Assistant.\n\n### Convert Knowledge Base\
    \ Questions to Intents\n\nIt is possible to convert a knowledge base question\
    \ to an intent, allowing you to provide more training phrases. When you click\
    \ the **View Detail** link in the knowledge base document overview, you will see\
    \ all the Questions and Answers which are imported.\n\nFrom this screen, you can\
    \ disable individual questions. It’s also possible to manually reload the questions\
    \ and answers. It’s also the place where you can select an individual question\
    \ and convert it to a real intent. (See Figure [4-12](#506047_1_En_4_Chapter.xhtml#Fig12).)\n\
    \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig12_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig12_HTML.jpg)\n\
    \n**Figure 4-12** Overview of all the imported FAQs\n\n## Summary\n\nThis chapter\
    \ gave you all the information on building Dialogflow agents from templates and\
    \ knowledge bases to build a Dialogflow agent without creating intents quickly.\
    \ This chapter addresses the following tasks:\n\n- You want to create a quick\
    \ Dialogflow agent imported from a Dialogflow template solution to use as a base\
    \ by using prebuilt agents.\n- You want to enable a casual conversation in your\
    \ Dialogflow agent with small talk.\n- You want to add additional FAQs to your\
    \ Dialogflow agent by importing a private CSV or importing FAQs from a public\
    \ website with the Knowledge Base Connector.\n\n## Further Reading\n\n- Dialogflow\
    \ documentation on prebuilt agents\n  `https://cloud.google.com/dialogflow/es/docs/agents-prebuilt`\n\
    - Dialogflow documentation on Small Talk\n  `https://cloud.google.com/dialogflow/es/docs/agents-small-talk`\n\
    - Dialogflow documentation on knowledge bases\n  `https://cloud.google.com/dialogflow/es/docs/how/knowledge-bases`\n\
    - Google Webmasters Tool\n  `https://www.google.com/intl/en/webmasters`"
