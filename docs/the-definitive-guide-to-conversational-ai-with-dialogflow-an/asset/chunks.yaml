    In a real-world application, you will fetch the context parameters through the
    SDK in fulfillment code.


    In fact, if we look into the previous scenario, it’s possible that a user would
    start the video game console intent first. So the first game played hasn’t been
    set in the context yet. When you work with the SDK in fulfillment code, then you
    could check if the context for first-game-chosen has been set, and if so, your
    response answer will be different.


    If you want to fetch the context via the SDK, you can get this from a Sessions
    type **detectIntent** call. It will contain a field, `queryResult.outputContexts`,
    which will provide a list of all active contexts.


    Sometimes, you might want to set the context on runtime from your fulfillment
    code instead of designing context in the intents from the Dialogflow Console.
    For example, maybe you want to capture a device location while the user interacts
    with your (live) agent. You would just make a detectIntent request call and specify
    `queryParams.context` as an object.


    Listing [3-4](#506047_1_En_3_Chapter.xhtml#PC8) shows how the JSON for a `detectIntent`
    request would look like.


    ```

    POST https://dialogflow.googleapis.com/v2/{session=projects/*/agent/sessions/*}:detectIntent

    {

    "queryInput": {

    "text": {

    "languageCode": "en-US",

    "text": "I would like to add pizza to my shopping cart."

    }

    },

    "queryParams": {

    "contexts": [

    {

    "name": "projects/project-id/agent/sessions/session-id/contexts/product-chosen",

    "lifespanCount": 5,

    "parameters": {

    "product": "Pizza",

    "device-location" "@52.3377871,4.8698096,17z"

    }

    }

    ]

    }

    }

    Listing 3-4

    An example of a detectIntent POST request

    ```


    However, it is possible to point to context parameters in the Dialogflow Console
    as hardcoded response texts. The notation is like this: **#context-name.$parameter-name**.
    If the parameter is given in the last answer (instead of the context), you can
    refer to it with the dollar notation: **$parameter-name**.


    For example, here’s a youtube video walkthrough of **#fav-game-chosen.$fav-game**
    level: **$level**.


    ## Testing in the Simulator


    You can have a conversation with your Dialogflow agent by speaking or typing messages
    in the Dialogflow simulator any time (Figure [3-16](#506047_1_En_3_Chapter.xhtml#Fig16)).
    This is a useful tool to test that your agent behaves as expected.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig16_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Testing in the simulator


    The Dialogflow simulator can be found on the right side of the screen.


    At the top, you can start writing your user utterances, or you can speak it in.
    It has built-in browser microphone integration. To use this, first-time users
    will need to allow the microphone permissions pop-up when Dialogflow is loaded.


    The user says section returns the results of the built-in Dialogflow Speech to
    Text model captured when using the microphone function. Else, it repeats the written
    text query.


    Once an intent was matched, the default response block will show the response
    from Dialogflow or returned from the fulfillment.


    There is an integrations dropdown; should you have Google Assistant or any other
    integration enabled, you will see the output from those channels. (This might
    differ, depending on how you entered this in the intent response.)


    When Text to Speech is enabled (in the **Settings** ➤ **Speech** tab), certain
    languages can have an automatic audio response; it synthesizes the response text.
    You can press the play button to hear the audio voice. The audio voice is tweakable
    in the Speech tab as well, should you want to listen to a different voice or at
    a different pace.


    Further down, you will see the matched intent, with a link to open the Dialogflow
    intent page, in case you want to edit this.


    Below this, there’s a block with action and parameters. Through entity extraction,
    the values collected will be sent as key-value pairs to a back end if fulfillment
    is enabled. When extracting entities, you typically would work with fulfillments.


    That’s also why there is a **Diagnostic Info** button. When you hit this button,
    you will get a raw API JSON response (Figure [3-17](#506047_1_En_3_Chapter.xhtml#Fig17)).
    This could be good for testing/debugging; this is what your back-end code should
    expect when it’s integrated with the Dialogflow SDK.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig17_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    A preview of the Diagnostic info ➤ API RAW response


    ## Summary


    This chapter gave you all the information on the concepts of Dialogflow Essentials.


    It addresses the following tasks:


    *   You want to add conversation parts to your Dialogflow agent to train the Dialogflow
    model by using intents.


    *   You want to create custom predefined variable objects (entities).


    *   You want to extract variable objects from a conversation by using predefined
    entities.


    *   You want to allow turn-taking and keep context in a conversation.


    *   You want to test to see if your Dialogflow agent is properly working.


    In case you want to build this example, the source code for this book is available
    on GitHub via the book’s product page, located at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4).
    Look into the _dialogflow-agent folder.


    The intents that I have been using for the intent examples are


    *   Collect_Current_Playing_Game


    *   Collect_Fav_Game


    *   Collect_Fav_Multiplayer_Game


    The intents that I have been using for the entity examples are


    *   Get_Release_Games


    *   Get_Favorite_FPS_Games


    *   Buy_Console


    The intents that I have been using for the context examples are


    *   GetWalkthrough-Context-FollowUp


    *   MyFirstGame-SetContext


    *   MyFirstGame-Console-GetContext'
  trans: '

    ### 通过 SDK 保持上下文


    在实际应用中，你会在实现代码中通过 SDK 获取上下文参数。


    事实上，回顾之前的场景，用户可能会先触发“游戏主机”意图。因此，第一个玩的游戏尚未在上下文中设置。当你在实现代码中使用 SDK 时，可以检查 `first-game-chosen`
    的上下文是否已设置，如果已设置，你的回复内容将会有所不同。


    如果你想通过 SDK 获取上下文，可以从 Sessions 类型的 `detectIntent` 调用中获取。它会包含一个字段 `queryResult.outputContexts`，该字段会提供所有活跃上下文的列表。


    有时，你可能希望从实现代码中在运行时设置上下文，而不是在 Dialogflow 控制台中设计意图的上下文。例如，当用户与你的（实时）代理交互时，你可能想捕获设备位置。你只需发起一个
    `detectIntent` 请求调用，并将 `queryParams.context` 指定为一个对象即可。


    清单 3-4 展示了 `detectIntent` 请求的 JSON 格式。


    ```

    POST https://dialogflow.googleapis.com/v2/{session=projects/*/agent/sessions/*}:detectIntent

    {

    "queryInput": {

    "text": {

    "languageCode": "en-US",

    "text": "我想把披萨加入购物车。"

    }

    },

    "queryParams": {

    "contexts": [

    {

    "name": "projects/project-id/agent/sessions/session-id/contexts/product-chosen",

    "lifespanCount": 5,

    "parameters": {

    "product": "Pizza",

    "device-location" "@52.3377871,4.8698096,17z"

    }

    }

    ]

    }

    }

    ```


    清单 3-4 — `detectIntent` POST 请求示例


    然而，也可以在 Dialogflow 控制台中将上下文参数指向为硬编码的回复文本。其表示法如下：`#context-name.$parameter-name`。如果参数是在上一条回复中给出的（而非上下文中），你可以使用美元符号表示法来引用它：`$parameter-name`。


    例如，这里有一个关于 `#fav-game-chosen.$fav-game` 级别的 YouTube 视频演示：`$level`。


    ### 在模拟器中测试


    你可以随时在 Dialogflow 模拟器中通过语音或输入文本与你的 Dialogflow 代理进行对话（图 3-16）。这是一个测试代理是否按预期运行的有用工具。


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig16_HTML.jpg](img/506047_1_En_3_Fig16_HTML.jpg)


    图 3-16 — 在模拟器中测试


    Dialogflow 模拟器位于屏幕右侧。


    在顶部，你可以开始输入用户语句，或者通过语音输入。它内置了浏览器麦克风集成功能。首次使用时，当 Dialogflow 加载时，你需要允许麦克风权限弹出窗口。


    “用户说”部分会返回使用麦克风功能时捕获的内置 Dialogflow 语音转文本模型的结果。否则，它会重复输入的文本查询。


    一旦匹配到意图，“默认回复”模块将显示来自 Dialogflow 的回复或从实现代码返回的回复。


    有一个“集成”下拉菜单；如果你启用了 Google Assistant 或任何其他集成，你将看到来自这些渠道的输出。（根据你在意图回复中的输入方式，这可能会有所不同。）


    当文本转语音启用时（在**设置** ➤ **语音**选项卡中），某些语言可以自动生成音频回复；它会合成回复文本。你可以按播放按钮收听语音。如果你希望收听不同的语音或不同的语速，也可以在“语音”选项卡中调整语音。


    再往下，你会看到匹配的意图，并带有一个打开 Dialogflow 意图页面的链接，方便你进行编辑。


    在此之下，有一个包含“操作”和“参数”的模块。通过实体提取，如果启用了实现功能，收集到的值将作为键值对发送到后端。提取实体时，通常需要与实现功能配合使用。


    这也是为什么有一个**诊断信息**按钮。点击此按钮，你将获得原始的 API JSON 响应（图 3-17）。这对于测试/调试很有用；当你的后端代码与 Dialogflow
    SDK 集成时，它应该期望收到这样的响应。


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig17_HTML.jpg](img/506047_1_En_3_Fig17_HTML.jpg)


    图 3-17 — 诊断信息 ➤ API 原始响应预览


    ### 总结


    本章为你提供了关于 Dialogflow Essentials 概念的所有信息。


    它涵盖了以下任务：


    *   你想为 Dialogflow 代理添加对话部分，通过使用意图来训练 Dialogflow 模型。

    *   你想创建自定义的预定义变量对象（实体）。

    *   你想通过使用预定义实体从对话中提取变量对象。

    *   你想在对话中实现话轮转换并保持上下文。

    *   你想测试你的 Dialogflow 代理是否正常工作。


    如果你想构建这个示例，本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4)。请查看
    `_dialogflow-agent` 文件夹。


    我在意图示例中使用的意图有：


    *   `Collect_Current_Playing_Game`

    *   `Collect_Fav_Game`

    *   `Collect_Fav_Multiplayer_Game`


    我在实体示例中使用的意图有：


    *   `Get_Release_Games`

    *   `Get_Favorite_FPS_Games`

    *   `Buy_Console`


    我在上下文示例中使用的意图有：


    *   `GetWalkthrough-Context-FollowUp`

    *   `MyFirstGame-SetContext`

    *   `MyFirstGame-Console-GetContext`

    '
