- fmt: '6.  `insertInBQ()`方法运行BigQuery方法`table.insert()`，该方法会在后台启动一个任务，将一行数据插入数据仓库。


    7.  `exports.subscribe = (data, context) => {}`是Pub/Sub订阅方法，用于监听传入的消息。它从缓冲区中获取数据，并准备一个可插入BigQuery的对象。


    8.  最后一部分是调用`detectPIIData`函数，并将回调链式连接到`insertInBQ`方法。


    回顾图[13-1](#506047_1_En_13_Chapter.xhtml#Fig1)所示的架构，我们需要一个与Dialogflow SDK集成的后端脚本。在代码清单[13-3](#506047_1_En_13_Chapter.xhtml#PC18)中，你将看到完整的后端脚本：`app.js`。


    ```javascript

    //1)

