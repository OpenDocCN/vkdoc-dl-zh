    There is an easier way to enter all the entity entries. When you click the three
    bullets next to the save button (the options button), it allows you to switch
    to Raw mode. Here, you can enter the entries in JSON or CSV format. Listing [3-1](#506047_1_En_3_Chapter.xhtml#PC1)
    shows a code example in JSON.


    ```

