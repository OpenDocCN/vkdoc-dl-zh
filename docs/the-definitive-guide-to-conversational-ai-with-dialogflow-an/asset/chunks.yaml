  trans: "\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig1_HTML.jpg](img/506047_1_En_11_Fig1_HTML.jpg)\n\
    \n**图 11-1**  \n自定义集成的架构。从 UI 实现到与 Dialogflow SDK 通信的后端应用程序\n\n- 集成的 UI 实现（前端）通常包含一个用于显示响应的\
    \ `textarea` 字段和一个用于输入话语的输入字段。\n- 集成的后端实现，集成了 Dialogflow SDK，用于：\n  - 会话管理\n \
    \ - 身份验证\n  - 意图检测（`detectIntent`）\n  - 返回响应\n  - 在实现的 UI 中呈现富响应。\n\n您的用户与您的集成\
    \ UI（例如，您的网站前端）进行对话。UI 将输入的聊天机器人消息（或传入的音频流）传递给后端集成。后端集成与 Dialogflow SDK 通信。Dialogflow\
    \ 将答案返回给后端代码，后端代码再将其发送回 UI，以便 UI 在屏幕上显示聊天机器人的响应。采用这种方法的另一个优点是，它也不会将您的服务帐户（身份验证密钥）暴露给前端，这是您应该避免的，因为黑客可以轻松读取并使用您的密钥。\n\
    \n## 在您的网站前端实现自定义聊天机器人，设置\n\n要实现自定义集成，例如在网站上，您需要确保已启用 Dialogflow API：\n\n```\n\
    gcloud services enable dialogflow.googleapis.com\n```\n\n它还需要您将 Dialogflow 集成服务帐户下载到硬盘，并将其分配给\
    \ `GOOGLE_APPLICATION_CREDENTIALS` 环境变量。\n\n之后，您需要确保已通过命令行工具登录到正确的项目：\n\n```\n\
    gcloud init\n```\n\n如果您不执行这些步骤，将会收到以下错误：\n\n```\n(node:95119) UnhandledPromiseRejectionWarning:\n\
    Error: 7 PERMISSION_DENIED: IAM permission 'dialogflow.sessions.detectIntent'\
    \ on 'projects/project-id/agent' denied.\n```\n\n有关如何配置 Dialogflow 项目的更多信息，请参阅第\
    \ 1 章。\n\n## UI 实现\n\n清单 11-1 展示了一个包含 Dialogflow 聊天机器人 UI 的 HTML 页面示例。在实际应用中，您可能希望使用诸如\
    \ Angular 之类的客户端框架，但为了保持此演示的简洁性，我们让它保持良好且紧凑。\n\n```\n<!DOCTYPE html>\n<html>\n\
    <head>\n    <title>自定义网页聊天</title>\n    <script src=\"/socket.io/socket.io.js\"\
    ></script>\n    <link rel=\"stylesheet\" type=\"text/css\" href=\"style.css\"\
    >\n</head>\n<body>\n    <h1>自定义网页聊天</h1>\n    <form id=\"chatForm\">\n       \
    \ <ul id=\"messages\"></ul>\n        <input type=\"text\" id=\"queryText\" placeholder=\"\
    输入您的消息...\">\n        <button id=\"submit\">发送</button>\n    </form>\n    <script>\n\
    \        //a) 加载 socket io\n        const socketio = io();\n        //b) 一旦 socket.io\
    \ 与服务器应用程序建立连接，\n        // 执行此代码块\n        const socket = socketio.on('connect',\
    \ function() {\n            console.log('connected');\n            //c) 当服务器响应\
    \ fulfillment 时运行此代码块\n            socketio.on('returnResults', function (data)\
    \ {\n                var objDiv = document.getElementById(\"ca\");\n         \
    \       console.log(data);\n                //d) 如果有 queryResults，则动态\n      \
    \          // 创建列表项以追加到消息列表。\n                if(data[0].queryResult){\n     \
    \               var agent = document.createElement(\"li\");\n                \
    \    agent.className = 'balloon agent';\n                    agent.innerHTML =\
    \ data[0].queryResult.fulfillmentText;\n                    messages.appendChild(agent);\n\
    \                    objDiv.scrollTop = objDiv.scrollHeight;\n               \
    \ }\n            });\n            //欢迎\n            socketio.emit('welcome');\n\
    \        });\n        //e) 创建指向其他 HTML 元素的指针\n        const textarea = document.getElementById('textarea');\n\
    \        const textInput = document.getElementById('queryText');\n        const\
    \ submitBtn = document.getElementById('submit');\n        const messages = document.getElementById('messages');\n\
    \        //f) 在提交用户话语时，\n        // 创建列表项以追加到消息列表。\n        submitBtn.onclick\
    \ = function(e) {\n            e.preventDefault();\n            socketio.emit('message',\
    \ textInput.value);\n            var user = document.createElement(\"li\");\n\
    \            user.className = 'balloon user';\n            user.innerHTML = textInput.value;\n\
    \            messages.appendChild(user);\n            textInput.value = \"\";\n\
    \        }\n    </script>\n</body>\n</html>\n```\n\n**清单 11-1**  \n一个 HTML 聊天机器人\
