- fmt: '### Advanced Custom Entities


    By default, entity matching requires an exact match for one of the entity entries.
    In case your customers misspell the entity, for example, they type `PayStation
    4` instead of `PlayStation 4`, it’s clear that a typo was made. **Fuzzy matching**
    allows you to identify non-exact matches of your entity. Just select the `Fuzzy
    Matching` checkbox, and save the entity type.


    With the `allow automated expansion` checkbox, you enable Dialogflow to extract
    other parameters than what’s been specified in the custom entity. If we use the
    same `video-game-platform` entity, you can see that we don’t define an entity
    entry for “GBA / Gameboy Advanced.” With automated expansion enabled, it takes
    the exact user input, and it will be used as the `video-game-platform` parameter.


    It’s also possible to create lists and composite entities. A **list entity** can
    be compared with the select box (select dropdown) in HTML. You can pick one or
    multiple from a list of values. For example, I could create an entity `FirstPersonShooter
    Games`, with the values:


    - `Call of Duty`

    - `PUBG`

    - `Fortnite`

    - `Battlefront`

    - `Doom`


    As can be seen in Figure [3-7](#506047_1_En_3_Chapter.xhtml#Fig7), let’s say I
    would tell the chatbot: “My favorite games are `Call of Duty`, `Fortnite`, and
    `PUBG`.” The parameter that got the extracted values (which will be sent to the
    back end) will look like an array:


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig7_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig7_HTML.jpg)


    **Figure 3-7** Creating list custom entities. Note the value in the simulator;
    it’s an array of values!


    ```

    fps_games = ["Call of Duty", "Fortnite","PUBG"]

    ```


    A **composite entity** is a more advanced object; the composite entity can be
    composed using other entities. Let’s say I have an entity called `@product`, which
    is composed of other custom entities:


    ```

    @platform @product_edition @product_color

    ```


    As can be seen in Figure [3-8](#506047_1_En_3_Chapter.xhtml#Fig8), let’s say I
    would ask the chatbot: “I would like to buy a `PlayStation 4 Pro Black edition`.”
    The parameter that got the extracted values (which will be sent to the back end)
    will now look like a JSON object:


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig8_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig8_HTML.jpg)


    **Figure 3-8** Creating composite entities, note the value in the simulator, which
    is an object!


    ```

    product = {

    platform: "Playstation 4",

    product_color: "Black",

    product_edition: "Pro"

    }

    ```


    To create composite entities, you will have to disable the synonyms checkbox,
    and then you can start referring to other entities by using the `@` notation.


    The last more advanced feature is regular expressions in entities.


    Some entities need to match patterns rather than specific terms—for example, national
    identification numbers, IDs, product numbers, license plates, and so on. With
    **regexp entities**, you can provide regular expressions for matching.


    It uses Google’s RE2 engine, a software library for regular expressions via a
    finite-state machine. [A](https://en.wikipedia.org/wiki/Finite-state_machine)
    [**finite-state machine**](https://en.wikipedia.org/wiki/Finite-state_machine)
    [(](https://en.wikipedia.org/wiki/Finite-state_machine) [**FSM**](https://en.wikipedia.org/wiki/Finite-state_machine))
    is a mathematical model of computation. It is an abstract machine that can be
    in exactly one of a finite number of [*states*](https://en.wikipedia.org/wiki/Finite-state_machine)
    at any given time. Therefore, it works a bit differently compared to other regular
    expression engines. You can find a link to the syntax in the See also section.


    You will have to **enable the regex** checkbox; it will automatically disable
    synonyms, and you can start writing regular expressions as entry values (see Figure
    [3-9](#506047_1_En_3_Chapter.xhtml#Fig9)), such as:


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig9_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig9_HTML.jpg)


    **Figure 3-9** Creating regex entities


    - Fixed word, `Sony`, `Nintendo`, or `MS`

    - Digits

    - Repeat the last, eight times


    ```

    (MS|Nintendo|Sony)\d{8} would catch: MS12345678

    ```


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4).


    The entities that I have been using for these examples are:


    - `@fps_games`

    - `@platform`

    - `@product`

    - `@products_color`

    - `@products_edition`

    - `@producttype`


    ## Creating Intents with Entities in Training Phrases


    Typically, when you want to create new intents, and those intents need to extract
    your predefined custom entities, you would make sure that the entities have been
    created first.


    Then, in your intent training phrases, you can start feeding it examples. Dialogflow
    will automatically annotate the variable objects based on what’s declared in your
    entities.


    When Dialogflow starts marking certain words in the training phrases (Figure [3-10](#506047_1_En_3_Chapter.xhtml#Fig10)),
    you will know that the extraction worked. Else, you can select words from the
    training phrases and start marking them yourself by pointing them to the correct
    entities from the pop-up box.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig10_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig10_HTML.jpg)


    **Figure 3-10** Hover over a word in the training phrase, and assign a custom
    or system entity to it


    Marked entities should be assigned to parameters. This is what you will receive
    on a back-end system when you would enable fulfillment. In the Dialogflow simulator,
    you can click the `Diagnostic Info` button once you fire a text query.


    This will show you a RAW API JSON response as seen in Listing [3-3](#506047_1_En_3_Chapter.xhtml#PC7).


    ```

    {

    "responseId": "5c1ccce4-6445-42fc-be98-fa37f726d633-0f0e27e1",

    "queryResult": {

    "queryText": "What are the latest releases for Switch?",

    "parameters": {

    "platform": [

    "switch"

    ]

    },

    "allRequiredParamsPresent": true,

    "fulfillmentMessages": [

    {

    "text": {

    "text": [

    ""

    ]

    }

    }

    ],

    "intent": {

    "name": "projects/dialogflowcookbook/agent/intents/188fe06c-e630-494a-8fff-961d0d73866e",

    "displayName": "Get_Release_Games"

    },

    "intentDetectionConfidence": 1,

    "languageCode": "en"

    }

    }

    ```


    **Listing 3-3** RAW API JSON response, note the `parameters` section


    Assigning parameters usually happens automatically, after the annotation of the
    entity in the training phrase, but if it didn’t work, you could tweak the following.
    See Table [3-1](#506047_1_En_3_Chapter.xhtml#Tab1) which describes all the entity
    settings.


    **Table 3-1** Entity settings


    | Setting Name | Description |

    | --- | --- |

    | `action name` | You can specify an action name, which will be shown in the (`queryResult`)
    API response. |

    | `is required` checkbox | If the entity is required for the conversation to be
    finished, this box will need to be checked. |

    | `parameter name` | The parameter key shows how it will be shown in the API response.
    |

    | `entity name` | The entity that it was mapped to. This could be a system entity.
    |

    | `value` | The extraction value for the entity from the user utterance. |

    | `is list` checkbox | If this is a list entity, you will need to enable this
    checkbox to get an array as a parameter. |

    | `prompt` | When the required checkbox is checked, you can enter a follow-up
    question to ask for the missing required parameter. |'
  raw: '### Advanced Custom Entities


    By default, entity matching requires an exact match for one of the entity entries.
    In case your customers misspell the entity, for example, they type PayStation
    4 instead of PlayStation 4, it’s clear that a typo was made. **Fuzzy matching**
    allows you to identify non-exact matches of your entity. Just select the *Fuzzy
    Matching checkbox*, and save the entity type.


    With the **allow automated expansion** checkbox, you enable Dialogflow to extract
    other parameters than what’s been specified in the custom entity. If we use the
    same *video-game-platform* entity, you can see that we don’t define an entity
    entry for “GBA / Gameboy Advanced.” With automated expansion enabled, it takes
    the exact user input, and it will be used as the *video-game-platform* parameter.


    It’s also possible to create lists and composite entities. A **list entity** can
    be compared with the select box (select dropdown) in HTML. You can pick one or
    multiple from a list of values. For example, I could create an entity FirstPersonShooter
    Games, with the values:


    *   *Call of Duty*


    *   *PUBG*


    *   *Fortnite*


    *   *Battlefront*


    *   *Doom*


    As can be seen in Figure [3-7](#506047_1_En_3_Chapter.xhtml#Fig7), let’s say I
    would tell the chatbot: “My favorite games are Call of Duty, Fortnite, and PUBG.”
    The parameter that got the extracted values (which will be sent to the back end)
    will look like an array:


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig7_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Creating list custom entities. Note the value in the simulator; it’s an array
    of values!


    ```

    fps_games = ["Call of Duty", "Fortnite","PUBG"]

    ```


    A **composite entity** is a more advanced object; the composite entity can be
    composed using other entities. Let’s say I have an entity called **@product**,
    which is composed of other custom entities:


    ```

    @platform @product_edition @product_color

    ```


    As can be seen in Figure [3-8](#506047_1_En_3_Chapter.xhtml#Fig8), let’s say I
    would ask the chatbot: “I would like to buy a PlayStation 4 Pro Black edition.”
    The parameter that got the extracted values (which will be sent to the back end)
    will now look like a JSON object:


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig8_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Creating composite entities, note the value in the simulator, which is an object!


    ```

    product = {

    platform: "Playstation 4",

    product_color: "Black",

    product_edition: "Pro"

    }

    ```


    To create composite entities, you will have to disable the synonyms checkbox,
    and then you can start referring to other entities by using the @ notation.


    The last more advanced feature is regular expressions in entities.


    Some entities need to match patterns rather than specific terms—for example, national
    identification numbers, IDs, product numbers, license plates, and so on. With
    **regexp entities**, you can provide regular expressions for matching.


    It uses Google’s RE2 engine, a software library for regular expressions via a
    finite-state machine. [A](https://en.wikipedia.org/wiki/Finite-state_machine)
    [**finite-state machine**](https://en.wikipedia.org/wiki/Finite-state_machine)
    [(](https://en.wikipedia.org/wiki/Finite-state_machine) [**FSM**](https://en.wikipedia.org/wiki/Finite-state_machine))
    is a mathematical model of computation. It is an abstract machine that can be
    in exactly one of a finite number of [*states*](https://en.wikipedia.org/wiki/Finite-state_machine)
    at any given time. Therefore, it works a bit differently compared to other regular
    expression engines. You can find a link to the syntax in the See also section.


    You will have to **enable the regex** checkbox; it will automatically disable
    synonyms, and you can start writing regular expressions as entry values (see Figure
    [3-9](#506047_1_En_3_Chapter.xhtml#Fig9)), such as


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig9_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Creating regex entities


    *   Fixed word, Sony, Nintendo, or MS


    *   Digits


    *   Repeat the last, eight times


    ```

    (MS|Nintendo|Sony)\d{8} would catch: MS12345678

    ```


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4).


    The entities that I have been using for these examples are


    *   @fps_games


    *   @platform


    *   @product


    *   @products_color


    *   @products_edition


    *   @producttype


    ## Creating Intents with Entities in Training Phrases


    Typically, when you want to create new intents, and those intents need to extract
