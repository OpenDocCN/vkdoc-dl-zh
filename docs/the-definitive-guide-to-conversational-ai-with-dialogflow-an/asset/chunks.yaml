    ## Implementing a Dialogflow Voice Agent in Your Website or App Using the SDK


    When COVID-19 started in 2019, many businesses realized that customers are not
    keen on touching public keyboards and touch interfaces, sources that easily spread
    bacteria. For example, people started to prefer contactless payments in stores
    and not touch self-service kiosk devices which you can find at airports, railway
    stations, or shops. Therefore, it’s a great solution to build voice AI in your
    hardware devices and applications.


    This chapter is not about the Google Assistant. It’s about integrating your Dialogflow
    voice agent in a website or app. Doing so takes a couple of steps, which is divided
    across the sections of this chapter:


    - Building the client-side app and UX, which allows you to use a microphone

    - Building the back-end app which allows you to use the Google Cloud machine learning
    APIs for understanding the spoken voice and returning synthesized voice

    - Playing generated audio streams in your (browser) app


    But before we continue, let’s pay attention to why you should not pick the Google
    Assistant for this particular use case.


    ### Reasons for Not Picking Google Assistant


    I often speak with customers, and their wish is to include the Google Assistant
    in their business web apps. Unless you are a manufacturer for TV setup boxes or
    headphones, I always answer: “Is this really what you want? Or do you mean you
    want to extend your own app with a conversational AI?”


    Suppose you have one or more of the following requirements. In that case, you
    probably want to make direct use of the Google Cloud Speech and Dialogflow APIs,
    instead of packing your voice AI as an action in the Google Assistant or wrapping
    the open source Google Assistant SDK in your own app.


    Reasons for not picking the Google Assistant over building your own voice AI:


    - This application shouldn’t be publicly available.

    - This application doesn’t need to be available on the Google Assistant/Nest Home.

    - You don’t want to start your app with the wake words: “Hey Google, talk to <my
    app>.”

    - The application doesn’t need to answer native Google Assistant questions, such
    as “what’s the weather in Amsterdam.”

    - The application has specific technical requirements, such as having the microphone
    open longer than 30 seconds.

    - The application can only use the enterprise Google Cloud terms and conditions
    instead of combining it with the Google Assistant’s consumer terms and conditions.


    Compared to the Google Assistant, by extending your apps with a conversational
    AI manually with the preceding tools, you no longer are part of the Google Assistant
    ecosystem. That ecosystem is excellent if you are building consumer or campaign
    apps (voice actions) that everyone can find by invoking it through the `<Hey Google,
    talk to my app>` invocation. But when you are an enterprise, that whole ecosystem
    might be overkill. Figure 12-1 will show you the Google Assistant ecosystem; as
    seen in the picture, the ecosystem contains millions of actions, which need to
    be invoked. If you want to extend your custom AI with voice, the Google Assistant
    ecosystem might be an overkill.


    ![../images/506047_1_En_12_Chapter/506047_1_En_12_Fig1_HTML.jpg](images/506047_1_En_12_Chapter/506047_1_En_12_Fig1_HTML.jpg)


    **Figure 12-1** The Google Assistant ecosystem could be an overkill


    Are you convinced that you want to extend your own (mobile) web app by integrating
    voice AI capabilities? This chapter explains on implementing voice streaming from
    a web application to Speech-to-Text, Dialogflow, and Text-to-Speech.'
