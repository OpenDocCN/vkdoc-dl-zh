  trans: "\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig9_HTML.jpg](img/506047_1_En_4_Fig9_HTML.jpg)\n\
    \n**图 4-9** 微调知识库文档的响应\n\n但你可能希望针对不同的渠道集成来微调答案（例如，在 Google Assistant 中以卡片形式返回响应）。并且你可能希望以一个问题结尾，以保持对话的延续或引导对话方向。然后点击**保存**。\n\
    \n默认情况下，知识库会配置一个默认文本响应，其中填充了最佳匹配的知识答案：`$Knowledge.Answer[1]`。但知识响应可能包含多个答案，你可以在配置的响应中引用这些答案。`$Knowledge.Question`\
    \ 和 `$Knowledge.Answer` 的索引从 `1` 开始，因此在添加更多响应时，请增加此索引。\n\n在定义响应时，应考虑以下几点：\n\n\
    - 如果定义的响应数量大于知识连接器匹配的响应数量 N，则只会返回 N 个响应。\n- 鉴于其准确性可能低于匹配明确定义的意图，我们建议在可能的情况下向用户返回三个或更多响应。\n\
    \n当你准备好导入所有问答后，可以在 Dialogflow 模拟器中测试知识连接器（图 4-10）。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig10_HTML.jpg](img/506047_1_En_4_Fig10_HTML.jpg)\n\
    \n**图 4-10** 在模拟器中测试知识库\n\nDialogflow Trial 和 Enterprise Essentials 版本允许文档总大小最大为\
    \ 10MB，每月 1000 次请求，每天 100 次请求。当你选择 Dialogflow Enterprise Plus 层级时，所有这些限制都将解除。\n\
    \n回到知识库页面（当你在 Dialogflow 菜单中点击**知识**时），你会注意到一个调整滑块（图 4-11）。当最终用户的表述也与某个意图匹配时，你可以指定对知识库结果的偏好程度。将滑块从较弱（偏好意图）调整到较强（偏好知识）。\n\
    \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig11_HTML.jpg](img/506047_1_En_4_Fig11_HTML.jpg)\n\
    \n**图 4-11** 调整知识库的权重\n\n## 最佳实践\n\n为获得最佳效果，以下是一些最佳实践。\n\n总体而言：\n\n- CSV 文件必须使用逗号作为分隔符。\n\
    - 机器学习设置的置信度分数在常见问题解答和知识库文章之间未经校准，因此如果你同时使用常见问题解答和知识库文章，最佳结果不一定总是得分最高的。\n- Dialogflow\
    \ 在创建响应时会从内容中移除 HTML 标签。因此，最好避免使用 HTML 标签，并尽可能使用纯文本。\n- Google Assistant 的每个聊天气泡有\
    \ 640 个字符的限制，因此与 Google Assistant 集成时，长答案会被截断。\n- 最大文档大小为 50MB。\n- 使用 Cloud Storage\
    \ 文件时，应使用公共 URI 或你的用户账户或服务账户有权访问的私有 URI。\n\n**注意** 过去，我曾看到一些来自（我自己的）网页的公共知识库常见问题解答失败。通过对\
    \ Google 实现进行逆向工程，我发现公共常见问题解答网站需要允许 Google 机器人访问。你应该通过 Google Search Console 将公共常见问题解答网站添加到\
    \ Google 搜索引擎，并让搜索索引器抓取它，使其存在于搜索索引中。因此，像 `https://pages.github.com` 这样的网站将无法工作。\n\
    \n特定于常见问题解答：\n\n- 你的 CSV 文件必须将问题放在第一列，答案放在第二列。此外，它不应包含标题行。\n- 尽可能使用 CSV，因为 CSV\
    \ 的解析最准确。\n- 不支持包含单个问答对的公共 HTML 内容。\n- 一个文档中的问答对数量不应超过 2000 个。\n- 不支持具有不同答案的重复问题。\n\
    - 如果可能，请为问答使用有效的 HTML5 标记，并基于 FAQPage schema.org 表示法。\n\n特定于抽取式问答：\n\n- 内容密集的文本效果最佳。避免使用包含许多单句段落的内容。\n\
    - 不支持表格和列表。\n- 一个文档中的段落数不应超过 2000 个。\n- 如果文章较长（超过 1000 字），请尝试将其拆分为多个较短的文章。如果文章涵盖多个问题，可以将其拆分为涵盖各个问题的较短文章。如果文章只涵盖一个问题，则将重点放在问题描述上，并保持问题解决方案简短。\n\
    - 理想情况下，只应提供文章的核心内容（问题描述和解决方案）。其他内容如作者姓名、修改历史、相关链接和广告并不重要。\n\n**注意** 在撰写本文时，抽取式问答仍处于实验阶段。它基于已在\
    \ Google 的搜索和 Assistant 等产品中尝试和测试过的类似技术。\n\n### 将知识库问题转换为意图\n\n可以将知识库问题转换为意图，从而允许你提供更多训练短语。当你在知识库文档概览中点击**查看详情**链接时，你将看到所有已导入的问答。\n\
    \n在此屏幕上，你可以禁用单个问题。也可以手动重新加载问题和答案。同样在此处，你可以选择单个问题并将其转换为真正的意图。（参见图 4-12。）\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig12_HTML.jpg](img/506047_1_En_4_Fig12_HTML.jpg)\n\
    \n**图 4-12** 所有已导入常见问题解答的概览\n\n## 总结\n\n本章为你提供了从模板和知识库构建 Dialogflow 智能体的所有信息，以便无需创建意图即可快速构建\
    \ Dialogflow 智能体。本章涉及以下任务：\n\n- 你想通过使用预构建智能体，从 Dialogflow 模板解决方案导入来快速创建一个 Dialogflow\
    \ 智能体作为基础。\n- 你想在 Dialogflow 智能体中启用闲聊功能。\n- 你想通过导入私有 CSV 或使用知识库连接器从公共网站导入常见问题解答，为你的\
    \ Dialogflow 智能体添加额外的常见问题解答。\n\n## 延伸阅读\n\n- Dialogflow 关于预构建智能体的文档\n  `https://cloud.google.com/dialogflow/es/docs/agents-prebuilt`\n\
    - Dialogflow 关于闲聊的文档\n  `https://cloud.google.com/dialogflow/es/docs/agents-small-talk`\n\
    - Dialogflow 关于知识库的文档\n  `https://cloud.google.com/dialogflow/es/docs/how/knowledge-bases`\n\
    - Google 站长工具\n  `https://www.google.com/intl/en/webmasters`\n"
- fmt: '# 5. Bot Management


    Dialogflow not only provides great tools for writing conversations and bot building
    but it also provides features for bot management. `Agent Validation` and `Agent
    Training` are such features. It makes life much easier for conversational designers
    who are building complex bots in an enterprise environment.


    `Agent Validation` reviews your agent out of the box, and with `Agent Training`
    your agent can learn new knowledge during conversations. Although the intent training
    is fixed beforehand, you can influence the intent classification score by up-
    and downvoting or reassigning intents to previously captured user utterances.


    This chapter will show you how to enable validation and understand the validation
    results and how to influence your bot model based on user data.


    ## Agent Validation


    When you build a chatbot that becomes a little bit more advanced, you will easily
    end up with lots of intents and entities. Maybe, you are even working with a team
    within your Dialogflow project—various UX designers working on multiple intents.
    Where people work, mistakes are made. This can become a problem when you are training
    your Dialogflow model.


    Common mistakes that can be made in Dialogflow are:


    - No or not enough training phrases in an intent.

    - The intent has training phrases that are too similar to each other or other
    intents’ training phrases.

    - Variations of entities are not used enough in training phrases.

    - Text is annotated within some training phrases but not in others.

    - No negative examples for the fallback intents.


    What’s good to know is that Dialogflow has an automatic validation feature built
    in the Dialogflow console and API, which can validate on those common mistakes.
    The results are available whenever the agent training is completed.


    Click the menu on **Validation**. The agent validation feature is, by default,
    enabled. Should you not find it, you can enable the `Agent Validation` toggle
    setting in the **Settings** ➤ **ML Settings** tab.


    Once you click `Validation` in the Dialogflow menu (and the agent has been trained),
    you will see the results of the validation (as shown in Figure [5-1](#506047_1_En_5_Chapter.xhtml#Fig1)).


    ![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig1_HTML.jpg](images/506047_1_En_5_Chapter/506047_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Out-of-the-box validation


    ### Understanding Validation Results


    The validation results are available automatically whenever agent training is
    performed and completed. You can access the results of the validation from either
    the Dialogflow Console or the API.


    The validation results provide a list of warnings and errors that you should correct
    to improve your agent’s quality and performance. It can find issues on the (global)
    agent level, in intents, or entities. If your agent has info or warnings, you
    can choose to ignore them and launch your agent.


    It’s for informational purposes only, but you would rob yourself of agent quality
    by not using this feature; basically, this is a Dialogflow Agent Review out of
    the box, for free!


    Issues can represent various levels of severity. Only **Info**, **Warning**, and
    **Error** messages are shown on the Validation screen. The settings **Critical**
    and **Unspecified** are available in the SDK (or on the specific intent/entity
    pages). They are all described in Table [5-1](#506047_1_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    The various severity levels


    | Level | Description |

    | --- | --- |

    | INFO | The agent doesn’t follow the best practice. |

    | WARNING | The agent might not behave as expected. |

    | ERROR | The agent may experience partial failures. |

    | CRITICAL | The agent may completely fail. |

    | SEVERITY UNSPECIFIED | Not specified. This value should never be used. |


    Figure [5-2](#506047_1_En_5_Chapter.xhtml#Fig2) shows some validation examples.


    ![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig2_HTML.jpg](images/506047_1_En_5_Chapter/506047_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Validation examples


    In this example, I am highlighting the following criteria:


    - The `Give_Your_Name` intent shows a warning that I will need to add more training
    phrases with diverse examples to improve the NLU model.

    - The `MyFirstGame-Console-GetContext` contains an entity, `Dreamcast`, and `SNES`,
    which hasn’t been defined in the `@product` custom entity. Besides this, it also
    needs more training phrases.


    The previous examples were examples of warnings, which you could ignore. But when
    you have errors, it’s better to fix these right away.


    Note


    At most, 5000 issues are shown at a time. If you have over 5000 problems, you
    may not see a count reduction until less than 5000 remain.


    Besides the validation screen, when you visit either the intents list or the entities
    list pages, any intents or entities with validation errors show an error outline
    indicator (a `!` icon) next to the name.


    When you visit a page for a specific intent or entity with validation errors,
    an error outline indicator is shown near the Save button.


    Clicking this indicator shows a list of errors for the intent or entity. By default,
    only errors with a severity of **CRITICAL** or **ERROR** are shown.


    ### Validation via the SDK


    It’s also possible to run the validation from your code through the SDK (`ValidationResult`).
    This might be handy if you are building your own CI/CD pipelines, and before bringing
    your agent to production, you might want to run the agent validation first.


    Here’s an example of how you could implement this for Node.js.


    The `ValidationResult` response could look like Listing [5-1](#506047_1_En_5_Chapter.xhtml#PC1).


    ```

    {

    "validationErrors": [

    {

    "severity": "ERROR",

    "entries": [

    "projects/my-project/agent/intents/58b44b2d-4967-4a81-b017-12623dcd5d28/parameters/bf6fdf55-b862-4101-b5b1-36f1423629d0"

    ],

    "errorMessage": "Parameter ''test'' has an empty value."

    },

    {

    "severity": "WARNING",

    "entries": [

    "projects/my-project/agent/intents/271e3808-3c91-4e6b-89e8-47951abcec8d"

    ],

    "errorMessage": "Intent ''app.current.update'' does not have enough unique training
    phrases. Consider adding more different examples."

    },

    {

    "severity": "ERROR",

    "entries": [

    "projects/my-project/agent/intents/26e64b1b-eaa7-4ce2-be46-631a501fccbe/trainingPhrases/a650375e-083c-4bb5-9794-ba9453e51282",

    "projects/my-project/agent/intents/58b44b2d-4967-4a81-b017-12623dcd5d28/trainingPhrases/1d947780-22d3-4f80-8d7a-3f86efbf0be3"

    ],

    "errorMessage": "Multiple intents share training phrases which are too similar:\n
    — Intent ''app.notifications.open'': training phrase ''open all notifications
    settings''\n — Intent ''app.current.notifications.open'': training phrase ''open
    notifications settings''"

    }

    ]}

    Listing 5-1

    The implementation of a Cloud Function

    ```


    As you have seen, Dialogflow provides an out-of-the-box agent review and validation
    feature. It’s enabled by default, and you can access it via the Dialogflow console
    or through the API.


    This will give you an overview of errors and warnings, which you should fix to
    improve your agent quality.


    When a large number of issues are found, you should consider fixing the issues
    in small batches, based on similarity. It might be that fixing one issue may solve
    similar issues after you retrain the agent. So, now you know. Before bringing
    your chatbots to production, always check the validation page!'
