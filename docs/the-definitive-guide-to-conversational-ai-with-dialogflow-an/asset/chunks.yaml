  trans: "\n# 流失率/流失节点\n\n当最终用户未能完成流程时，您需要找出他们在哪个环节流失（**流失节点**）以及流失用户所占的百分比（**流失率**）。这能为您提供关于虚拟客服的一些信息。是回答问题的方向有误，还是虚拟客服未能正确接收传入的问题？这需要进一步调查！\n\
    \n# 需监控的特定渠道指标\n\n以下指标特定于您所集成的渠道。例如，当您将聊天机器人接入 Google Assistant 时，Google Assistant\
    \ 操作系统能准确了解您打开该操作的频率以及打开前的操作。对于网站而言，当用户在 Google 搜索引擎中搜索您的页面后与您的聊天机器人互动时，这类信息可以从\
    \ Google Search Console 中获取。\n\n# 用户留存\n\n**留存**是指让您的用户养成使用您产品的习惯。因此，在这个阶段我们称他们为**用户**。如果您能留住他们，就意味着他们确实在频繁使用您的产品。用户留存信息可以在\
    \ Google Analytics、Google Search Console 或 Actions on Google 控制台中找到。\n\n> **注意**\
    \  \n> 当您想尝试语音交互并为您的品牌开发 Google Assistant 操作时，请考虑用户留存。可以想象，处理保险理赔的语音操作，其使用频率远低于零售商用于将杂货添加到购物车的\
    \ Google Assistant 操作。您使用杂货店操作的频率会高得多。\n\n# 端点健康状态\n\n例如，当您集成 Web 服务或数据库来获取信息，但服务器返回错误或响应速度极慢时，这可能会导致您的虚拟客服崩溃，或至少带来不佳的用户体验。端点健康信息可以在您的网站日志中找到；当您的聊天机器人部署在\
    \ Google Cloud 中时，可以在 Cloud Logging（原 Stackdriver）中找到；当您的智能客服运行在 Google Assistant\
    \ 上时，可以在 Actions on Google 控制台中找到。\n\n# 发现渠道\n\n您的用户是如何找到您的智能客服的？他们又是如何到达的？针对\
    \ Google Assistant，您可能想了解用户是如何发现您的 Action 并调用它的。当用户说出与您的 Action 相关的短语时，即使没有明确指定\
    \ Action 的调用名称，Google 有时也会推荐用户尝试您的 Action。对于网站上的聊天机器人，您感兴趣的信息是哪些网站链接到了您的网站，以及您的用户使用了哪些搜索查询。这些信息可以在\
    \ Google Analytics 或 Google Search Console 中找到。\n\n# Dialogflow 内置分析\n\nDialogflow\
    \ 可以直接从“分析”选项卡提供指标。点击 **旧版** ➤ **探索**。此页面显示使用情况和 NLU 数据的洞察信息。**会话**（图 13-11）代表用户每次与您的智能客服互动。无论是完整对话还是不完整对话（用户停止响应），都会被记录并计入与会话相关的指标。\n\
    \n这将显示最近的总会话数。您可以按“昨天”、“过去 7 天”或“过去 30 天”进行筛选。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig11_HTML.jpg](img/506047_1_En_13_Fig11_HTML.jpg)\n\
    \n**图 13-11** Dialogflow 内置分析\n\n**意图概览**将显示最常用意图的概览。它会显示意图名称、匹配到该意图的会话数、所有会话中该意图被使用的总次数，以及退出百分比，该百分比显示用户在特定意图中离开对话的会话比例（取自匹配到同一意图的总会话数）。\n\
    \n向下滚动，您将看到会话流程（图 13-12）。您可以点击每个意图来展开其后续意图。\n\n您可以将光标悬停在意图名称（蓝色框）上，查看以下信息：\n\n\
    ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig12_HTML.jpg](img/506047_1_En_13_Fig12_HTML.jpg)\n\
    \n**图 13-12** Dialogflow 内置分析，会话流程\n\n- 意图名称\n- 匹配到该意图的用户百分比\n- 匹配到该意图的请求数\n-\
    \ 处于该意图时的流失率\n\n**历史记录**页面（图 13-13）显示了您的智能客服所参与对话的简化版本。您可以点击某个事件或用户表述，查看按时间顺序排列的对话记录。\n\
    \n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig13_HTML.jpg](img/506047_1_En_13_Fig13_HTML.jpg)\n\
    \n**图 13-13** Dialogflow 历史记录文本\n\n您可以点击智能客服回复的选项菜单（图 13-14）。这将允许您跳转到 **Cloud\
    \ Logging** 以在 Google Cloud 控制台中进行高级日志记录，或直接浏览到该意图（这在需要修复问题时非常方便）。或者，您也可以查看原始\
    \ API 响应。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig14_HTML.png](img/506047_1_En_13_Fig14_HTML.png)\n\
    \n**图 13-14** Dialogflow 历史记录文本，跳转到意图\n\n> **注意**  \n> 历史记录页面仅显示默认回复。其他回复，如富媒体消息或\
    \ Actions on Google 的简单回复，则不可见。请看上面的截图。“你的网址是什么？”触发了自定义负载，因此日志中不可见。如果您也想捕获这些内容，则必须手动构建日志记录解决方案，例如使用\
    \ BigQuery。\n\n# 使用 Chatbase 监控指标\n\n或者，您也可以使用 Google 工具 **Chatbase**（图 13-15）来监控会话和漏斗；它会提供更详细的概览，除了“昨天”、“过去\
    \ 7 天”或“过去 30 天”的筛选条件外，还可以按“今天”或“本季度至今”进行筛选。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig15_HTML.png](img/506047_1_En_13_Fig15_HTML.png)\n\
    \n**图 13-15** Chatbase 中的分析\n\n事实上，Dialogflow 底层使用了 Chatbase。**留存队列**模块将显示用户随时间变化的留存情况。\n\
    \n使用 **会话流程** 标签页查看会话流程（图 13-16）；与在 Dialogflow 中一样，您可以向下钻取以查看每个意图的详细信息：\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig16_HTML.jpg](img/506047_1_En_13_Fig16_HTML.jpg)\n\
    \n**图 13-16** Chatbase 中的会话流程\n\n- 意图名称\n- 匹配到该意图的用户百分比\n- 匹配到该意图的请求数\n- 处于该意图时的流失率\n\
    \nChatbase 有一个漏斗报告工具，它提供了一种通过创建最多包含六个后续意图的自定义工作流来跟踪客户成功的方法。点击 **漏斗** 标签页（图 13-17）。您可以创建一个新的漏斗来记录意图并将其分配到轮次步骤中。创建漏斗后，您将获得更好的漏斗可视化效果，包括流失率以及**完成率**。\n"
- fmt: "![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig17_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig17_HTML.jpg)\n\
    \n**Figure 13-17** Chatbase funnels\n\n## Analytics on Actions on Google\n\nWhen\
    \ you are building a voice bot, for example, for the Google Assistant, you can\
    \ also monitor some metrics. Log in to your Actions on Google console. A nice\
    \ extra is that you can even export these metrics to BigQuery so you can capture\
    \ these for a more extended period of time.\n\nClick **Analytics** ➤ **Usage**.\n\
    \nThe **Usage** page (Figure [13-18](#506047_1_En_13_Chapter.xhtml#Fig18)) displays\
    \ three graphs, which pertain to the usage data of your Action over time.\n\n\
    ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig18_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig18_HTML.jpg)\n\
    \n**Figure 13-18** Actions on Google usage\n\nAnd it can also show you the **user\
    \ retention** (Figure [13-19](#506047_1_En_13_Chapter.xhtml#Fig19)).\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig19_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig19_HTML.jpg)\n\
    \n**Figure 13-19** Actions on Google user retention\n\nA nice extra which Actions\
    \ on Google can show you (because it also knows the insights of your Google Assistant\
    \ integration) is **health information** (Figure [13-20](#506047_1_En_13_Chapter.xhtml#Fig20)).\n\
    \n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig20_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig20_HTML.jpg)\n\
    \n**Figure 13-20** Actions on Google health information\n\n- **Errors**: The number\
    \ of errors your Action’s cloud endpoint returned on a given day. If you have\
    \ a large number of errors, you may want to look at your logs to identify what\
    \ is causing your endpoint to crash or behave unexpectedly.\n- **Actions latency**:\
    \ The latency of your Action’s endpoint. If latency is very high or regularly\
    \ spikes, your users may be experiencing delays while interacting with your Action.\n\
    - **Experienced latency by user**: The latency felt by a user on each request\
    \ to your Action. This metric illustrates what users experience when interacting\
    \ with your Action.\n\nClick **Analytics** ➤ **Discovery**.\n\nThe discovery page\
    \ displays a table of which phrases led to Google recommending your Action (Figure\
    \ [13-21](#506047_1_En_13_Chapter.xhtml#Fig21)).\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig21_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig21_HTML.jpg)\n\
    \n**Figure 13-21** Actions on Google analytics discovery\n\nThe columns in the\
    \ discovery table are as follows:\n\n- **Invocation**: The user query that led\
    \ to Google recommending your Action. Aside from the actual user queries, this\
    \ list includes the following values:\n  - `BUILT_IN_INTENT`: This listing indicates\
    \ your Action was invoked through a built-in intent.\n  - `AUTO_MATCHED_BY_GOOGLE`:\
    \ This listing indicates when implicit invocation was used.\n  - `ACTION_LINK`:\
    \ This listing indicates when your Action was invoked through an Action link.\n\
    - **Intent**: The intent the user’s query matched.\n- **Impression**: The number\
    \ of times this phrase led to Google recommending your Action.\n- **Selection**:\
    \ The number of times a user invoked your Action after Google recommended it.\
    \ This number cannot exceed the number of impressions this phrase has.\n- **Selection\
    \ rate**: The percentage of impressions that led to a selection. A low percent\
    \ rate indicates that many users opt to use other Actions for this particular\
    \ query, whereas a high rate suggests that your Action is popular for this query.\n\
    \n## Capturing Chatbot Model Health Metrics for Testing the Underlying NLU Model\
    \ Quality\n\nWhere conversation metrics and chat funnel metrics focus on collecting\
    \ the data from your end user to monitor and improve the experience, bot model\
    \ metrics focus on the bot building process and might use test validation data\
    \ (based on live data) to improve the quality of the underlying NLU model.\n\n\
    Modern chatbot/virtual assistant builder tools like Dialogflow make use of machine\
    \ learning. For each virtual agent, you, as a UX designer (agent modeler) or developer,\
    \ may define many intents. An **intent** categorizes a user’s intention. Your\
    \ combined intents can handle a complete conversation. This will train an underlying\
    \ machine learning model.\n\nWhen an end user writes or says something in a chatbot\
    \ or virtual assistant, we call this a **user expression** or **utterance**. Dialogflow\
    \ matches the expression to the best-matched intent in your bot builder based\
    \ on built-in NLU (Natural Language Understanding) and the training phrases (examples)\
    \ where the underlying machine learning model was trained on. Matching an intent\
    \ is also known as **intent classification** or **intent matching**.\n\nOnce you\
    \ have built your virtual agent, the most important question arises: how good\
    \ is your machine learning model that your virtual agent uses under the hood?\n\
    \nThere are a bunch of metrics you can use to test the quality of your virtual\
    \ agent.\n\nTypically, when working with test data, UX designers or content writers\
    \ would create a validation dataset. They use this to train the Dialogflow agent\
    \ model by entering it as user phrases. To create test datasets that aren’t biased,\
    \ use logs from chats/contact centers/virtual assistants and separate them from\
    \ the intent training phrases used to train the model on. When user data contains\
    \ sensitive PII data, you should anonymize or mask it.\n\nAs you have seen, these\
    \ are great metrics to test your underlying machine learning model with. Once\
    \ you store all these variables in a data warehouse, you can easily create dashboards\
    \ to preview these insights. Developers could create unit tests that pass in the\
    \ validation data as user utterances and test it against the bot builder API (in\
    \ Dialogflow, this will be the `detectIntent()` method). The detected intent and\
    \ the confidence score can be evaluated with your validation dataset.\n\n### True\
    \ Positive—A Correctly Matched Intent\n\nA true positive is an outcome where the\
    \ chatbot correctly detects the right (positive) intent. For example, when your\
    \ virtual agent has an intent called “Salary Intent” and it was trained with a\
    \ training phrase:\n\n“Did my salary come in?”\n\nAnd the user utterance is\n\n\
    “Have I received my salary?”\n\nDialogflow should detect the following Intent:\
    \ “Salary Intent.”\n\nI could write a unit test similar to how you would write\
    \ unit tests in software engineering. I could create test data on the previous\
    \ scenario with a user utterance: “My salary, when will I receive it?” I expect\
    \ it to be the Salary Intent. You can use the Dialogflow API, and Dialogflow would\
    \ detect the Salary Intent too. So this is a true positive. The match was correct.\n\
    \nYou could store this in BigQuery, so you can rerun the scenario each time when\
    \ you make changes to your agent against the Dialogflow API. Data fields which\
    \ you would need to collect are “User Utterance,” “Expected Intent Name,” “Detected\
    \ Intent Name,” and the “Result,” which is TP."
