- fmt: "# Two Techniques for Integrating Dialogflow in a Flutter Application\n\nThere\
    \ are two techniques for integrating a Dialogflow agent into a Flutter app. Both\
    \ solutions will come with pros and cons, and it’s up to you to figure out which\
    \ solution fits best for your business.\n\nThe first solution is the most obvious\
    \ one: using a Dialogflow package, integrating the Dialogflow SDK directly into\
    \ your (mobile app) client. The other solution would be to incorporate the Dialogflow\
    \ SDK in a back-end server application and let your (mobile app) client talk to\
    \ the back end over HTTP(s).\n\nBy building it directly into Flutter, you will\
    \ only need to write the codebase once. As an enterprise, you will either have\
    \ your Dart/Flutter experience in house, or you hire a freelancer or agency to\
    \ build the app for you. With Flutter 2, you can even support desktop and web\
    \ applications instead of just Android and iOS apps. However, you will need to\
    \ develop a solution to serve and store Google Cloud’s service accounts and API\
    \ keys in a secure way.\n\n## Caution\n\nStoring the service account in a client\
    \ asset folder (or even in a secure key client keychain) can be dangerous if it’s\
    \ not handled well. First of all, you will need to be very careful with your service\
    \ accounts. Which read and access rights will you give your components? When you\
    \ give admin rights to Google Cloud’s compute engine, you can imagine that attackers\
    \ could hack and decompile your app. When they get access to your compute engine,\
    \ they could drive you into costs by, for example, mining Bitcoins for them. Now,\
    \ even when you don’t give compute access rights to your Google Cloud service\
    \ accounts, you still won’t expose your keys. Even though for Dialogflow, it only\
    \ gives you access to your chatbot within your project, it might be possible for\
    \ attackers to read PII data from the chat history if your end users were sharing\
    \ PII data in the chat. That can be a huge problem.\n\nOn top of that, it’s not\
    \ so easy to change service account keys in applications, as you don’t want the\
    \ app to stop working for current users. So how can you serve service accounts\
    \ and keys secure in mobile clients? By, for example, building a mechanism to\
    \ rotate (a second set of) keys. Like working with JSON Web Tokens (JWT), an Internet\
    \ proposed standard for creating data with optional signature and optional encryption\
    \ whose payload holds JSON that asserts some number of claims. The tokens are\
    \ signed either using a private secret or a public/private key. Or you can run\
    \ parts of your integration on a server.\n\n## Integrating the Dialogflow SDK\
    \ in a Back-End/Server Application\n\nIntegrating the Dialogflow SDK in a back-end/server\
    \ application requires you to write application code in another programming language.\
    \ For enterprises, this typically means that you would have to deal with another\
    \ team or agency of developers, and you will have to work together. This solution\
    \ will also mean that you will need to pay for server computing costs, as you\
    \ will need to host your codebase somewhere. The advantage here is that you won’t\
    \ expose your service accounts to the client, making this solution very safe.\n\
    \nAnother significant advantage in taking this approach is when you want to build\
    \ a chat/voice platform that needs to support various integration channels. For\
    \ creating multichannel or omnichannel experiences, this is the right approach\
    \ to go, as you only need to maintain the Dialogflow integration in one place,\
    \ treating every integration as its own channel. If you want, you could even build\
    \ it that way that you can switch between Dialogflow Essentials and Dialogflow\
    \ CX agents. Let’s have a look at both solutions.\n\n## Integrating the Dialogflow\
    \ SDK Directly into Your Flutter App\n\nWhen you search on `pub.dev` for Dialogflow,\
    \ you will find many open source Dialogflow Flutter packages, including mine:\
    \ `dialogflow_grpc`. The Dialogflow gRPC package makes use of the gRPC library\
    \ for Dialogflow. Only with the gRPC library is it possible to do streaming, should\
    \ you want to make use of the built-in Dialogflow Speech to Text and Text to Speech\
    \ capabilities. For what’s worth, the underlying gRPC API is also faster than\
    \ the REST API, which is often used for integrating Dialogflow with Dart and Flutter.\n\
    \nFor demo purposes, we will include the Google Cloud service account in an assets\
    \ folder. As we know by now, for production apps, you will have to come up with\
    \ a more secure strategy.\n\nEdit the `pubspec.yaml` file with the `dialogflow_grpc`\
    \ dependency. And point to your service account (e.g., `assets/credentials.json`),\
    \ as seen in Listing [11-12](#506047_1_En_11_Chapter.xhtml#PC32).\n\n```\ndependencies:\n\
    \  dialogflow_grpc: any\n```"
  raw: 'Two Techniques for Integrating Dialogflow in a

    Flutter Application

    There are two techniques for

    integrating a Dialogflow agent into a Flutter app. Both solutions will

    come with pros and cons, and it’s up to you to figure out which solution

    fits best for your business.

    The first solution is the most obvious one: using a Dialogflow

    package, integrating the Dialogflow SDK directly into your (mobile app)

    client. The other solution would be to incorporate the Dialogflow SDK in

    a back-end server application and let your (mobile app) client talk to

    the back end over HTTP(s).

    By building it directly into Flutter, you will only need to write the

    codebase once. As an enterprise, you will either have your Dart/Flutter

    experience in house, or you hire a freelancer or agency to build the app

    for you. With Flutter 2, you can even support desktop and web

    applications instead of just Android and iOS apps. However, you will

    need to develop a solution to serve and store Google Cloud’s service

    accounts and API keys in a secure way.


    Caution


    Storing the service account in a client asset folder (or even in a

    secure key client keychain) can be dangerous if it’s not handled well.

    First of all, you will need to be very careful with your service

    accounts. Which read and access rights will you give your components?

    When you give admin rights to Google Cloud’s compute engine, you can

    imagine that attackers could hack and decompile your app. When they get

    access to your compute engine, they could drive you into costs by, for

    example, mining Bitcoins for them. Now, even when you don’t give compute

    access rights to your Google Cloud service accounts, you still won’t

    expose your keys. Even though for Dialogflow, it only gives you access

    to your chatbot within your project, it might be possible for attackers

    to read PII data from the chat history if your end users were sharing

    PII data in the chat. That can be a huge problem.

    On top of that, it’s not so easy to change service account keys in

    applications, as you don’t want the app to stop working for current

    users. So how can you serve service accounts and keys secure in mobile

    clients? By, for example, building a mechanism to rotate (a second set

    of) keys. Like working with JSON Web Tokens (JWT),

    an Internet proposed standard for creating data with optional signature

    and optional encryption whose payload holds JSON that asserts some

    number of claims. The tokens are signed either using a private secret or

    a public/private key. Or you can run parts of your integration on a

    server.


    Integrating the Dialogflow SDK in a

    back-end/server application requires you to write application code in

    another programming language. For enterprises, this typically means that

    you would have to deal with another team or agency of developers, and

    you will have to work together. This solution will also mean that you

    will need to pay for server computing costs, as you will need to host

    your codebase somewhere. The advantage here is that you won’t expose

    your service accounts to the client, making this solution very safe.

    Another significant advantage in taking this approach is when you

    want to build a chat/voice platform that needs to support various

    integration channels. For creating multichannel or omnichannel

    experiences, this is the right approach to go, as you only need to

    maintain the Dialogflow integration in one place, treating every

    integration as its own channel. If you want, you could even build it

    that way that you can switch between Dialogflow Essentials and

    Dialogflow CX agents. Let’s have a look at both solutions.


    Integrating the Dialogflow SDK Directly into Your

    Flutter App

    When you search on pub.dev for Dialogflow, you will find many open

    source Dialogflow Flutter packages, including

    mine: **dialogflow_grpc**. The Dialogflow gRPC package

    makes use of the gRPC library for Dialogflow. Only with the gRPC library is it

    possible to do streaming, should you want to make use of the built-in

    Dialogflow Speech to Text and Text to Speech capabilities. For what’s

    worth, the underlying gRPC API is also faster than the REST API, which

    is often used for integrating Dialogflow with Dart and Flutter.

    For demo purposes, we will include the Google Cloud service

    account in an assets folder. As we know by now, for production apps, you

    will have to come up with a more secure strategy.


    Edit the **pubspec.yaml** file with the

    **dialogflow_grpc** dependency. And point to your service

    account (e.g., assets/credentials.json), as seen in Listing [11-12](#506047_1_En_11_Chapter.xhtml#PC32).


    ```

    dependencies:

    dialogflow_grpc: any'
  trans: "\n# 在 Flutter 应用中集成 Dialogflow 的两种技术\n\n在 Flutter 应用中集成 Dialogflow 智能体有两种技术方案。两种方案各有利弊，需要您自行判断哪种方案最适合您的业务。\n\
    \n第一种方案最为直接：使用 Dialogflow 包，将 Dialogflow SDK 直接集成到您的（移动应用）客户端中。另一种方案则是将 Dialogflow\
    \ SDK 集成到后端服务器应用中，然后让您的（移动应用）客户端通过 HTTP(s) 与后端通信。\n\n通过直接集成到 Flutter 中，您只需编写一次代码库。作为企业，您要么拥有内部的\
    \ Dart/Flutter 开发经验，要么聘请自由职业者或代理机构为您构建应用。借助 Flutter 2，您甚至可以支持桌面和 Web 应用，而不仅仅是\
    \ Android 和 iOS 应用。然而，您需要开发一种解决方案，以安全的方式提供和存储 Google Cloud 的服务账号和 API 密钥。\n\n\
    ## 注意事项\n\n如果处理不当，将服务账号存储在客户端资源文件夹（甚至存储在安全的密钥客户端钥匙串中）可能会很危险。首先，您需要非常小心地管理您的服务账号。您将授予您的组件哪些读取和访问权限？当您授予\
    \ Google Cloud 计算引擎管理员权限时，可以想象攻击者可能会破解并反编译您的应用。一旦他们获得对您计算引擎的访问权限，他们可能会通过例如挖矿等方式让您承担高昂的成本。即使您没有授予\
    \ Google Cloud 服务账号计算访问权限，您仍然不应暴露您的密钥。尽管对于 Dialogflow 来说，它只允许您访问项目内的聊天机器人，但如果您的最终用户在聊天中共享了个人身份信息（PII），攻击者仍有可能从聊天历史记录中读取这些数据。这可能是一个巨大的问题。\n\
    \n除此之外，在应用中更改服务账号密钥并不容易，因为您不希望当前用户的应用停止工作。那么，如何在移动客户端中安全地提供服务账号和密钥呢？例如，可以构建一种密钥轮换（第二组密钥）机制。比如使用\
    \ JSON Web 令牌（JWT），这是一种互联网提议的标准，用于创建带有可选签名和可选加密的数据，其有效载荷包含断言某些声明的 JSON。令牌使用私有密钥或公钥/私钥对进行签名。或者，您也可以在服务器上运行部分集成。\n\
    \n## 在后端/服务器应用中集成 Dialogflow SDK\n\n在后端/服务器应用中集成 Dialogflow SDK 需要您用另一种编程语言编写应用代码。对于企业而言，这通常意味着您需要与另一个开发团队或代理机构合作，并且必须协同工作。这种方案还意味着您需要支付服务器计算成本，因为您需要将代码库托管在某个地方。其优势在于，您不会将服务账号暴露给客户端，从而使该方案非常安全。\n\
    \n采用这种方法的另一个显著优势是，当您想要构建一个需要支持多种集成渠道的聊天/语音平台时。对于创建多渠道或全渠道体验，这是正确的做法，因为您只需在一个地方维护\
    \ Dialogflow 集成，将每个集成视为其自己的渠道。如果您愿意，甚至可以构建成能够在 Dialogflow Essentials 和 Dialogflow\
    \ CX 智能体之间切换的方式。让我们来看看这两种方案。\n\n## 将 Dialogflow SDK 直接集成到您的 Flutter 应用中\n\n当您在\
    \ `pub.dev` 上搜索 Dialogflow 时，您会发现许多开源的 Dialogflow Flutter 包，包括我自己的：`dialogflow_grpc`。Dialogflow\
    \ gRPC 包利用了 Dialogflow 的 gRPC 库。只有使用 gRPC 库才能实现流式传输，如果您想利用 Dialogflow 内置的语音转文本和文本转语音功能的话。值得一提的是，底层的\
    \ gRPC API 也比通常用于将 Dialogflow 与 Dart 和 Flutter 集成的 REST API 更快。\n\n出于演示目的，我们将\
    \ Google Cloud 服务账号包含在资源文件夹中。正如我们现在所知，对于生产环境的应用，您必须制定更安全的策略。\n\n使用 `dialogflow_grpc`\
    \ 依赖项编辑 `pubspec.yaml` 文件。并指向您的服务账号（例如 `assets/credentials.json`），如清单 11-12 所示。\n\
    \n```\ndependencies:\n  dialogflow_grpc: any\n```\n"
- fmt: "# The following section is specific to Flutter.\n\n```\nflutter:\n  uses-material-design:\
    \ true\n  assets:\n    - assets/credentials.json\n```\n\nListing 11-12  \n`pubspec.yaml`\n\
    \nImport this package in your code. Load your service account, and create a `DialogflowGrpc`\
    \ instance; see Listing [11-13](#506047_1_En_11_Chapter.xhtml#PC33).\n\n```\n\
    import 'package:dialogflow_grpc/v2beta1.dart';\nimport 'package:dialogflow_grpc/generated/google/cloud/dialogflow/v2beta1/session.pb.dart';\n\
    import 'package:dialogflow_grpc/dialogflow_auth.dart';\n\nfinal serviceAccount\
    \ = ServiceAccount.fromString(\n  '${(await rootBundle.loadString('assets/credentials.json'))}');\n\
    DialogflowGrpc dialogflow = DialogflowGrpc.viaServiceAccount(serviceAccount);\n\
    ```\n\nListing 11-13  \nLoading the service account\n\nWith the following line\
    \ of code, you can detect an intent based on text input:\n\n```\nvar data = await\
    \ dialogflow.detectIntent(text, 'en-US');\nprint(data.queryResult.fulfillmentText);\n\
    ```\n\nListing [11-14](#506047_1_En_11_Chapter.xhtml#PC35) shows you how you can\
    \ detect an intent based on an audio stream. Integrating audio streaming requires\
    \ working with a microphone component in your Flutter app. Typically, `pub.dev`\
    \ will have various open source microphone components available. Keep in mind\
    \ that Flutter microphone libraries are wrappers around native hardware components.\
    \ Thus, the implementations might differ across devices (Android, iOS, Web, macOS,\
    \ or Windows).\n\n1. You can create a speech recognition bias list to give certain\
    \ words a boost. This makes sense for the times that your speech model does not\
    \ seem to understand you. (See Chapter [7](#506047_1_En_7_Chapter.xhtml) for more\
    \ details on speech adaptation.)\n\n2. This is where you annotate your audio config,\
    \ and it depends on the hardware of the device you are using. For example, your\
    \ phone could make use of `AUDIO_ENCODING_LINEAR_16` encoding and 16000 hertz.\
    \ You will also need to specify the language you are listening for and if you\
    \ want to detect the single utterance. By default (which is set to `false`), recognition\
    \ does not cease until the client closes the stream. If `true`, the recognizer\
    \ will detect a single spoken utterance in the input audio. Lastly, you want to\
    \ specify the bias list.\n\n3. Make the `streamingDetectIntent` call, with the\
    \ specified `InputConfig` and the audio stream. Such an audio stream you can get\
    \ from a microphone component.\n\n```\n// 1)\nvar biasList = SpeechContextV2Beta1(\n\
    \  phrases: [\n    'Dialogflow CX',\n    'Dialogflow Essentials',\n    'Action\
    \ Builder',\n    'HIPAA'\n  ],\n  boost: 20.0\n);\n\n// 2)\nvar config = InputConfigV2beta1(\n\
    \  encoding: 'AUDIO_ENCODING_LINEAR_16',\n  languageCode: 'en-US',\n  sampleRateHertz:\
    \ 16000,\n  singleUtterance: false,\n  speechContexts: [biasList]\n);\n\n// 3)\n\
    final responseStream = dialogflow.streamingDetectIntent(config, _audioStream);\n\
    responseStream.listen((data) {\n  print(data);\n});\n```\n\nListing 11-14  \n\
    Streaming audio to Dialogflow\n\nThe next chapter will talk in more detail about\
    \ streaming audio to Dialogflow.\n\nFigure [11-9](#506047_1_En_11_Chapter.xhtml#Fig9)\
    \ shows an example of a Flutter app with Flutter UI components, which integrates\
    \ the Dialogflow gRPC package in your application. The Flutter gRPC package comes\
    \ with a full working demo of an audio streaming app for mobile devices.\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig9_HTML.jpg](images/506047_1_En_11_Chapter/506047_1_En_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9  \nA demo app integrating the Dialogflow gRPC package in a Flutter\
    \ UI app\n\n## A Flutter App That Communicates with a Back-End Dialogflow SDK\
    \ App\n\nWhen you are building a bot platform that needs to support multiple channels\
    \ (or an omnichannel experience, where chat messages can travel through the various\
    \ integrations), it could make more sense to build an architecture like shown\
    \ in Figure [11-10](#506047_1_En_11_Chapter.xhtml#Fig10).\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig10_HTML.jpg](images/506047_1_En_11_Chapter/506047_1_En_11_Fig10_HTML.jpg)"
