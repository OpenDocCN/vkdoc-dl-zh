- fmt: "# Drop-Off Rate/Drop-Off Place\n\nWhen your end users did not complete the\
    \ flow, then you are interested in figuring out where they dropped out (**drop-off\
    \ place**) and a percentage of end user users that dropped out (**drop-off rate**).\
    \ This could give you some information on your virtual agent. Are you answering\
    \ questions wrong, or does the virtual agent not accept incoming questions correctly?\
    \ This needs some investigation!\n\n# Channel-Specific Metrics to Monitor\n\n\
    The following metrics are specific to the channels you are integrating with. For\
    \ example, when you bring your chatbot to the Google Assistant, the Google Assistant\
    \ operating system knows exactly how often you opened the action and what you\
    \ did before opening the action. For a website, this type of information could,\
    \ for example, be retrieved from the Google Search Console when people interact\
    \ with your chatbot after first searching for your page in the Google search engine.\n\
    \n# User Retention\n\n**Retention** is the act of getting your members to use\
    \ your product so that it becomes habitual. That’s why we call them **users**\
    \ at this stage. If you retain them, then they are literally using your product\
    \ often. User retention information can be found in Google Analytics, Google Search\
    \ Console, or the Actions on Google console.\n\n> **Note**  \n> When you want\
    \ to experiment with voice and develop a Google Assistant action for your brand,\
    \ think of user retention. You can imagine a voice action that handles an insurance\
    \ claim won’t be used as often compared to a Google Assistant action for a retailer,\
    \ which can add groceries to a shopping cart. You would use the grocery store\
    \ action much more often.\n\n# Endpoint Health\n\nFor example, when you integrate\
    \ with a web service or database to fetch information and the server returns an\
    \ error or is very slow in returning the information, this might crash your virtual\
    \ agent or at least give a not-so-lovely user experience. Endpoint health information\
    \ can be found in your website logs; when your chatbot is deployed in Google Cloud,\
    \ you can find it in Cloud Logging (previously known as Stackdriver); when your\
    \ agent runs on the Google Assistant, you can find it in the Actions on Google\
    \ console.\n\n# Discovery\n\nHow did your users found your agent and how did they\
    \ get there? Specific to the Google Assistant, you might be interested in figuring\
    \ out how your users discovered your Action and how they invoked it. When users\
    \ say a phrase related to your Action, Google will sometimes recommend that the\
    \ user try your Action, even if the user did not explicitly specify your Action’s\
    \ invocation name. For chatbots on websites, the information you are interested\
    \ in is which websites link to yours. And which search queries did your users\
    \ use. This information can be found in Google Analytics or the Google Search\
    \ Console.\n\n# Dialogflow Built-in Analytics\n\nDialogflow can give you the metrics\
    \ from the Analytics tab out of the box. Click **Legacy** ➤ **Explore**. This\
    \ page shows insights on usage and NLU data. **Sessions** (Figure [13-11](#506047_1_En_13_Chapter.xhtml#Fig11))\
    \ represent each time a user interacts with your agent. Both complete and incomplete\
    \ (where users just stopped responding) conversations are logged and count toward\
    \ session-related metrics.\n\nThis will show you the last total of sessions. You\
    \ can filter for “yesterday,” “last 7 days,” or “last 30 days.”\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig11_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig11_HTML.jpg)\n\
    \n**Figure 13-11** Built-in Dialogflow analytics\n\nThe **intents overview** will\
    \ show you an overview of the most used intents. It will display the intent name,\
    \ the number of sessions in which the intent was matched, a count of the total\
    \ times the intent was used from all sessions, and an exit percentage, which will\
    \ show you a percentage of the sessions where the user left the conversation while\
    \ being in a specific intent (taken from the total number of sessions where the\
    \ same intent was matched).\n\nWhen you scroll down, you will see the session\
    \ flow (Figure [13-12](#506047_1_En_13_Chapter.xhtml#Fig12)). You can click each\
    \ intent to unfold the intents, which would follow up.\n\nYou can hover with your\
    \ cursor over the intent names (blue boxes) to see the following information:\n\
    \n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig12_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig12_HTML.jpg)\n\
    \n**Figure 13-12** Built-in Dialogflow analytics, session flow\n\n- The intent\
    \ name\n- The percentage of all users that matched the intent\n- The number of\
    \ requests the intent was matched to\n- The drop-off rate while being on this\
    \ intent\n\nThe **History** page (Figure [13-13](#506047_1_En_13_Chapter.xhtml#Fig13))\
    \ shows a simplified version of the conversations your agent has engaged in. You\
    \ can click an event or user utterance to see a chronological transcript log.\n\
    \n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig13_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig13_HTML.jpg)\n\
    \n**Figure 13-13** Dialogflow History transcripts\n\nYou can click the options\
    \ menu of an agent response (Figure [13-14](#506047_1_En_13_Chapter.xhtml#Fig14)).\
    \ This will allow you to go to **Cloud Logging** for advanced logging in the Google\
    \ Cloud console or directly browse to the intent (this is handy for when you need\
    \ to fix something). Or you can see the Raw API response.\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig14_HTML.png](images/506047_1_En_13_Chapter/506047_1_En_13_Fig14_HTML.png)\n\
    \n**Figure 13-14** Dialogflow History transcript, go to intent\n\n> **Note** \
    \ \n> Only default responses are shown on the History page. Other responses, like\
    \ rich messages or Actions on Google Simple Responses, aren’t visible. Have a\
    \ look at the previous screenshot. What’s your URL triggered a custom payload\
    \ and therefore isn’t visible in the log. If you want to capture these things\
    \ as well, you will have to manually build a logging solution, for example, with\
    \ BigQuery.\n\n# Monitoring Metrics with Chatbase\n\nAlternatively, you can also\
    \ monitor the session and funnel from the Google tool: **Chatbase** (Figure [13-15](#506047_1_En_13_Chapter.xhtml#Fig15));\
    \ it will give you a bit more detailed overview, and besides filters for “yesterday,”\
    \ “last 7 days,” or “last 30 days,” it can also filter on “today” or the “quarter\
    \ to date.”\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig15_HTML.png](images/506047_1_En_13_Chapter/506047_1_En_13_Fig15_HTML.png)\n\
    \n**Figure 13-15** Analytics in Chatbase\n\nAs a matter of fact, Dialogflow uses\
    \ Chatbase under the hood. The **Retention Cohorts** block will show you the user\
    \ retention over time.\n\nUse the **Session Flow** tab to see the Session Flow\
    \ (Figure [13-16](#506047_1_En_13_Chapter.xhtml#Fig16)); just like in Dialogflow,\
    \ you can drill down to see each intent with\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig16_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig16_HTML.jpg)\n\
    \n**Figure 13-16** Session flow in Chatbase\n\n- The intent name\n- The percentage\
    \ of all users that matched the intent\n- The number of requests the intent was\
    \ matched to\n- The drop-off rate while being on this intent\n\nChatbase has a\
    \ funnel reporting tool, which offers a way to track customer success by creating\
    \ your own custom workflows for up to six follow-up intents. Click the **Funnels**\
    \ tab (Figure [13-17](#506047_1_En_13_Chapter.xhtml#Fig17)). You can create a\
    \ new funnel to record and assign intents to turn-taking steps. Once you have\
    \ created a funnel, you get a better visualization of the funnel, the drop-off\
    \ rate, and also a **completion rate**."
