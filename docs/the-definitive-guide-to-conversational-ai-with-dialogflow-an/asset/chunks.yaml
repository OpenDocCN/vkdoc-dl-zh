    Introduction


    To some people, writing a book can feel a lot like the process of childbirth.
    To others, their written book can feel like it’s their baby. I wrote this book
    while I was six months pregnant from my firstborn, baby Rebel. Because of COVID-19,
    the Netherlands just went in lockdown, and I had to cancel all my Google work
    trips. With so much extra time, and since I can’t sit still, I had to share my
    Conversational AI knowledge with the world and put it on paper. And yes, it was
    a process, but I put a lot of love into it! So this book release is my announcement!


    > —Lee Boonstra (Senior Developer Advocate, Conversational AI @ Google)


    ## Who This Book Is For


    This book is written for everyone (practitioners) interested in building chatbots
    for the Web, social media, voice assistants, or contact centers, using Google’s
    Conversational AI/Cloud technology. Whether you are a UX designer/linguist, a
    web/conversational bot engineer, chatbot architect, back-end developer, a project
    manager, or a business decision-maker, that is, CTO or Chief Innovation Officer,
    this book is for you.


    Some topics target engineers. I will share some code and explain what it does.
    Most of my code examples are written in JavaScript for Node.js. When you rather
    program in a different language, my examples will be apparent to understand (and
    rewrite) to a language of choice.


    In the sections, I have added advanced tips and tricks, like answers to questions
    that I have heard while working with various (enterprise) Dialogflow customers.


    I promise, even if you have been using Dialogflow before, you will likely still
    learn new things!


    ## What You’ll Learn


    While reading this book, readers will learn the following:


    *   What’s Dialogflow, Dialogflow Essentials, Dialogflow CX, and how machine learning
    is used


    *   How to create Dialogflow projects for individuals and enterprise usage


    *   Dialogflow Essentials concepts like intents, entities, custom entities, system
    entities, composites, and how to track context


    *   How to build bots quickly using prebuilt agents, small talk modules, and FAQ
    knowledge bases


    *   How Dialogflow can give an out-of-the-box agent review


    *   How to deploy text conversational UIs for web and social media channels


    *   How to build voice agents for voice assistants and phone gateways/contact
    centers


    *   How to build multilingual chatbots


    *   How to orchestrate many (sub-)chatbots to build a bigger conversational platform


    *   How to use chatbot analytics, and how to test the quality of your Dialogflow
    agent


    *   How Dialogflow CX fits in, what’s different in Dialogflow CX, and new Dialogflow
    CX concepts


    These topics are targeted more at developers and engineers and contain more advanced
    use cases:


    *   Learn how to create fulfillment to connect to a web service in various ways


    *   Learn how to run back-end code from a local/development machine


    *   Learn how to secure your chatbots


    *   Learn how to integrate your chatbots in a website or native mobile (Flutter)
    app by creating your own custom integrations


    *   Learn how to create an omnichannel bot platform architecture


    *   Learn how to create rich responses in custom integrations


    *   Learn how to stream your voice UIs in IoT voice applications


    *   Learn using your own data warehouse for advanced chatbot analytics


    Note


    Trying out the more advanced examples might require pay as you use Google Cloud
    resources. When you are new to Google Cloud, you can create a free Google Cloud
    account, which comes with 300 dollars of credits. These credits should be more
    than enough for playing around with these examples. Many of the Google Cloud products
    have a free usage tier ( [`https://cloud.google.com/free`](https://cloud.google.com/free)
    ).


    ## Downloading the Code


    The example code from each chapter is available as a zip file at the book’s website,
    [`www.leeboonstra.dev`](http://www.leeboonstra.dev) , and [`www.apress.com/ISBN`](https://www.apress.com/ISBN)
    . It will point to a source code repository for Apress books on GitHub, where
    my code can be continuously updated.


    Acknowledgments


    This book would not have been possible without the help of some amazing people.
    Therefore, I would like to thank


    *   Celestin Suresh John (Acquisitions Editor), Matthew Moodie (Development Editor),
    and Aditee Mirashi (Coordinating Editor) from Apress, without your help this book
    couldn’t go into production. Thank you so much for your hard work.


    There are a lot of folks within Google that helped me in the background while
    writing this book. I’m very grateful for your support, help, and ideas.


    *   In particular, I would like to thank Contact Center AI Specialist, Akash Parmar,
    and Engineering Director, Antonio Gulli. Thank you for reading this book and doing
    the technical reviews! Very much appreciated!


    *   Thank you for your support and ideas for this book: Dialogflow Product Manager,
    Shantanu Misra; Conversational AI Incubator Manager (and co-founder API.ai), Pavel
    Sirotin; Developer Advocacy Manager, Dave Elliot; Customer Engineer, Wouter Roosenburg;
    Product Marketing Manager, Surbhi Agarwal; Head of Product AI, Antony Passemard;
    and VP of Engineering, Andrew Moore.


    *   Also a big thank you to the internal Contact Center AI and Dialogflow Champions
    community!


    Lastly, I would like to express my gratitude to


    *   Lucienne de Boer, Customer Experience Product Owner at KLM Royal Dutch Airlines,
    for sharing the Dialogflow use case and enterprise learnings


    *   Pieter Goderis, Global Lead NLP at ING Bank, for sharing the Dialogflow use
    case and enterprise learnings


    *   Carla Verwijmeren, Voice Consultant at Smartvoices, for proofreading the book
