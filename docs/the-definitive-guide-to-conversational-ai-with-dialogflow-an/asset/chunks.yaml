    \n*   Guide to detect intents with audio\n\n[`https://cloud.google.com/dialogflow/es/docs/how/detect-intent-tts`](https://cloud.google.com/dialogflow/es/docs/how/detect-intent-tts)\n\
    \n*   Documentation on AudioBufferSourceNode\n\n[`https://developer.mozilla.org/en-US/docs/Web/API/AudioBufferSourceNode`](https://developer.mozilla.org/en-US/docs/Web/API/AudioBufferSourceNode)\n\
    \n13. Collecting and Monitoring\nConversational Analytics\n\nI think we have all\
    \ experienced it before. You are talking to a\nvirtual assistant or typing into\
    \ a chatbot, and the virtual agent\ndoesn’t understand what you mean. It asks\
    \ you to repeat yourself, it\nreturns a fallback, or worse it gives you the wrong\
    \ answer! That’s a\nlousy customer experience. When this happens too much, you\
    \ risk the\nchance that your visitors are not coming back; “that bot doesn’t work.”\n\
    As a matter of fact, often the chat or voice bot did work, but it was\ntaught\
    \ to answer different types of questions.\nOf course, with good conversation UX\
    \ design, you could have steered\nyour dialogues to a successful outcome. For\
    \ example, when you start the\nvirtual agent, it shouldn’t just show you a welcome\
    \ greeting. It should\nalso tell you what it can do for you. So likely, your visitors\
    \ will ask\nthe right types of questions.\nYou are building a chatbot or virtual\
    \ assistant. How will it benefit\nyour visitors? What problem will it solve? As\
    \ a brand or business,\nyou’ll likely have this data. Is this your first attempt\
    \ at building a\nvirtual agent? Then look into your data from other channels so\
    \ that you\ncan understand your customers better. Do you have a contact center\
    \ and\ndo you have audio recordings? Do you monitor social media? Incoming\nemail?\
    \ What’s the most common question people ask? What topic is\npopular? What are\
    \ people complaining about?\nWhen building voice and chatbots, it’s essential\
    \ to go into\nproduction as fast as possible but capture analytics. Too often,\
    \ I hear\ncustomers saying: “Chatbot insights that’s on our road map for version\n\
    two. We want to perfect the conversations first.” It shouldn’t be that\nway. Bot\
    \ analytics isn’t a “nice to have” feature to display in a\ndashboard; they are\
    \ essential for improving your customer\nexperience.\nDon’t spend a year perfecting\
    \ conversations, while you can learn the\nmost from your existing (live) traffic.\
    \ Even if you go live with only a\nfew main topics and directly monitor the incoming\
    \ questions, you can\ngrow your chatbot over time and make it much smarter. You\
    \ can implement\nother essential topics based on the number of occurrences. This\
    \ way, you\ncan learn how your customers think of your brand and how you can better\n\
    your virtual agent over time.\nMany businesses are already familiar with capturing\
    \ analytics. They\nrely on web analytics\ndata, such as click rates, page views,\
    \ and session lengths, to\ngain customer behavior insights, typically gathered\
    \ with tools such as\nGoogle Analytics.\nThis is why conversational analytics\
    \ is much more powerful than web\nanalytics. No longer will the emphasis be on\
    \ how users react to what is\npresented to them, but rather what “intent” they\
    \ convey through natural\nlanguage. In fact, the market predicts that conversational\
    \ analytics\nwill grow from $4.2 billion in 2019 to $15.7 billion in 2024!\nThere\
    \ are four types of metrics you might want to monitor or\ncapture.\n\nConversation-Related\
    \ Metrics\nConversation-related metrics will give you answers on questions like\n\
    what has been said by your end users, when, and where (on what\nplatform). For\
    \ this, you would need a way to store all your\nconversations. A data warehouse\
    \ like BigQuery is a great way\nto collect all your chat transcripts.\nA data\n\
    warehouse is a system used for reporting and data analysis. Think\nabout a database,\
    \ but much more extensive, where you can connect many\nsources to. You can store\
    \ all structured data you like in your data\nwarehouse. Think about website data,\
    \ website logs, login data,\nadvertising data, and your Dialogflow chatbot conversations.\
    \ The more\ndata you have, the better you can understand your customers.\n\nCustomer\
    \ Rating Metrics\nMany businesses use NPS, CES, and CSAT ratings as research methods\
    \ to\nfind out their customers’ loyalty by asking simple questions. You can\n\
    implement this in your agent.\n\nChat Session and Funnel Metrics\nYou can use\
    \ Dialogflow or Chatbase to get the flow of the session,\nwhich will show you\
    \ a chat funnel. It visually summarizes the\nconversational paths your end users\
    \ have taken when engaging with your\nagent.\n\nBot Model Health Metrics\nWhen\
    \ working with Dialogflow, it will use machine learning to\nunderstand the user\
    \ utterances and match this to an intent (intent\nclassification). With bot model\
    \ metrics, it will be possible to\ncalculate the quality of the underlying machine\
    \ learning model of your\nagent.\n\nCapturing Conversation-Related Metrics to\
    \ Store in\nBigQuery\nTools like Dialogflow have their own built-in Analytics.\
    \ You can\nbrowse through simple analytics by providing a date-time. However,\
    \ you\nmight want to build your own custom repository in a data warehouse to\n\
    collect a powerful analytics system. An example of a data warehouse is\nBigQuery.\
    \ Maybe you are already using it for your Ads data.\n\nBigQuery\nBigQuery  is\
    \ a fully managed,\nserverless data warehouse that enables scalable analysis over\
    \ petabytes\nof data. It is a serverless Software as a Service\n(SaaS) that supports\
    \ querying using ANSI SQL.\n\nUsing BigQuery analytics over the built-in Dialogflow\
    \ Analytics has a\ncouple of advantages, which matter a lot to enterprises that\
    \ have to\ndeal with compliances (such as the GDPR). When you store your chatbot\n\
    conversations in BigQuery, you can\n\n*   Choose where the data is located\n\n\
    *   Choose how long the data is being stored\n\n*   Create a backup of your conversational\
    \ data\n\n*   Remove sensitive PII data from your dataset before storage (e.g.,\n\
    \    according to the GDPR, you can’t store PII data)\n\n*   Create many more\
    \ data points (e.g., chat translations, user\n    sentiment)\n\n*   Combine your\
    \ chatbot conversations with other valuable\n    data\n\nNote\n\nIn case you are\
    \ choosing this solution because of compliance reasons,\nyou will likely also\
    \ want to turn off your data logging in the\nDialogflow settings panel.\nThis\
    \ would also mean that you will not see any data on analytics and\nhistory tabs\
    \ in the Dialogflow console.\n\nWhy is it a benefit to combine your chatbot analytics\
    \ with other\ndata? Because you\ncan create omnichannel experiences and insights\
    \ with this. Imagine a\nuser visiting your banking website. The user was logged\
    \ in, and the user\nis browsing through banking web pages about mortgages. A week\
    \ later, the\nuser returns to the website and starts a chat with the banking chatbot.\n\
    (It could even be a voice agent via a phone call.) The user explains\nthat he\
    \ has fraudulent transactions, and the chatbot offers to block\nthose. Before\
    \ the conversation is over, the chatbot provides a mortgage\ndeal. Since the chat\
    \ data plus the website advertising data has been\nstored in the same data warehouse,\
    \ it was easy to make this link.\n\nCapture Points\nLet’s look in a few capture\
    \ points, which will make it helpful to\ngather insights from bot conversations.\
    \ We can use these metrics to\nquery our datasets on."
