  trans: "\n# 为开发者配置 Dialogflow\n\n您是一名开发者，并且希望获得开发者访问权限。\n\n选择 **IAM 与管理** ➤ **服务账号**。您将看到一个服务账号的电子邮件地址，如图\
    \ 2-26 所示。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig26_HTML.png](img/506047_1_En_2_Fig26_HTML.png)\n\
    \n图 2-26\n\nGoogle Cloud 控制台中的服务账号\n\n如果您尚未下载此服务账号的服务账号密钥，请下载，并将 `GOOGLE_APPLICATION_CREDENTIALS`\
    \ 环境变量设置为其路径。您可以通过点击 **操作** 列中的选项按钮并选择 **创建密钥** 来下载服务账号 JSON 密钥。在弹出的窗口中，您可以选择\
    \ **JSON** 并点击 **创建**。（见图 2-27。）\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig27_HTML.png](img/506047_1_En_2_Fig27_HTML.png)\n\
    \n图 2-27\n\n从服务账号创建私钥\n\n它会将 JSON 文件下载到您的磁盘，您需要将其分配给一个名为 `GOOGLE_APPLICATION_CREDENTIALS`\
    \ 的环境变量。\n\n将密钥分配给环境变量 `GOOGLE_APPLICATION_CREDENTIALS`。\n\n对于 Linux/MacOS 环境：\n\
    \n```\nexport GOOGLE_APPLICATION_CREDENTIALS=/path/to/service_account.json\n```\n\
    \n对于 Windows 环境：\n\n```\nset GOOGLE_APPLICATION_CREDENTIALS=c:\\path\\to\\service_account.json\n\
    ```\n\n## 总结\n\n本章涉及以下任务：\n\n*   您希望开始使用 Dialogflow 并设置一个 Dialogflow 试用版代理。\n\
    *   您为企业工作，希望创建一个符合合规性要求的安全虚拟代理；您可以创建一个 Dialogflow Essentials 按量付费代理。\n*   您已创建了一个\
    \ Dialogflow 项目，现在希望对其进行配置。\n*   您是一名开发者，并且希望获得开发者访问权限。\n\n如果您想构建此示例，本书的源代码可通过本书的产品页面在\
    \ GitHub 上获取，网址为 [`www.apress.com/ISBN`](http://www.apress.com/ISBN)。请查找 `dialogflow-agent`\
    \ 文件夹。\n\n## 延伸阅读\n\n*   比较 Dialogflow 版本\n    [`https://cloud.google.com/dialogflow/docs/editions`](https://cloud.google.com/dialogflow/docs/editions)\n\
    *   Firebase 条款与条件\n    [`https://firebase.google.com/terms/`](https://firebase.google.com/terms/)\n\
    *   Dialogflow Enterprise/Google Cloud 条款与条件\n    [`https://cloud.google.com/terms/`](https://cloud.google.com/terms/)\n\
    *   Dialogflow 层级与定价\n    [`https://cloud.google.com/dialogflow/pricing#es-agent`](https://cloud.google.com/dialogflow/pricing%2523es-agent)\n\
    *   Dialogflow 层级与配额\n    [`https://cloud.google.com/dialogflow/quotas`](https://cloud.google.com/dialogflow/quotas)\n\
    *   关于在 BigQuery 中存储 Dialogflow 数据的博文\n    [`https://cloud.google.com/blog/products/ai-machine-learning/simple-blueprint-for-building-ai-powered-customer-service-on-gcp`](https://cloud.google.com/blog/products/ai-machine-learning/simple-blueprint-for-building-ai-powered-customer-service-on-gcp)\n\
    *   Google Cloud 中的目录同步\n    [`https://tools.google.com/dlpage/dirsync/`](https://tools.google.com/dlpage/dirsync/)\n\
    *   Google Cloud IAM\n    [`https://cloud.google.com/resource-manager/docs/access-control-org`](https://cloud.google.com/resource-manager/docs/access-control-org)\n\
    *   Dialogflow 访问控制\n    [`https://cloud.google.com/dialogflow/es/docs/access-control`](https://cloud.google.com/dialogflow/es/docs/access-control)\n\
    *   请求更高配额\n    [`https://console.cloud.google.com/apis/api/dialogflow.googleapis.com/quotas`](https://console.cloud.google.com/apis/api/dialogflow.googleapis.com/quotas%253F_ga%253D2.114957573.345776091.1589188956-1503905642.1588942477)\n\
    *   VPC 服务控制\n    [`https://cloud.google.com/vpc-service-controls/docs/service-perimeters`](https://cloud.google.com/vpc-service-controls/docs/service-perimeters)\n\
    *   服务账号\n    [`https://cloud.google.com/docs/authentication#service_accounts`](https://cloud.google.com/docs/authentication%2523service_accounts)\n\
    *   以服务账号身份进行身份验证\n    [`https://cloud.google.com/docs/authentication/production`](https://cloud.google.com/docs/authentication/production)\n\
    *   数据日志记录\n    [`https://cloud.google.com/dialogflow/es/docs/data-logging`](https://cloud.google.com/dialogflow/es/docs/data-logging)\n\
    \n# 3. Dialogflow Essentials 概念\n\n开发者或 UX 设计师可以通过 Dialogflow Web 控制台训练 Dialogflow\
    \ Essentials 代理（机器学习模型）。它基于意图。一个意图对最终用户在单次对话轮次中的意图进行分类。您的 Dialogflow 代理将包含许多意图。每个意图都包含训练短语、上下文和响应。\n\
    \n本章将深入探讨训练 Dialogflow Essentials 代理的细节。它将涵盖意图如何工作以及如何创建意图。它讨论了实体和上下文的使用。在本章末尾，您将在\
    \ Dialogflow 模拟器中测试您的代理。\n\n## 深入理解意图\n\n例如，图 3-1 显示了购买视频游戏机的意图页面。\n\n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig1_HTML.jpg](img/506047_1_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1\n\n使用训练短语创建意图\n\n当代理使用给定的带标签的训练短语数据集进行训练后，Dialogflow 可以理解人类对话的含义。\n\n\
    当用户通过书面文本或语音（用户表述）与聊天机器人通信时，Dialogflow 将进行意图分类。由于 NLP 引擎（会持续改进），用户表述的书写方式不同或包含拼写/语法错误都没有关系。它会理解所询问的内容，并通过检查添加到\
    \ Dialogflow 代理中的所有意图来进行匹配。一旦匹配到意图，它将返回意图的履行/响应。\n\nDialogflow 不会像 AlphaZero*\
    \ 这样的目标驱动型 AI 那样进行自我学习。Google 不会披露底层技术（如 NLP 或语音转文本引擎）的所有实现细节（秘诀），仅仅是因为它们可能会快速变化，并导致文档过时。\n\
    \n** 了解更多关于 AlphaZero 的信息，* [`https://en.wikipedia.org/wiki/AlphaZero`](https://en.wikipedia.org/wiki/AlphaZero)\n"
- fmt: "### Setting Up Intents\n\nAn `intent` is a messaging object that describes\
    \ an action. When you visualize a conversation as a part of a tree diagram (Figure\
    \ [3-2](#506047_1_En_3_Chapter.xhtml#Fig2)), all the tree branches are (follow-up)\
    \ intents.\n\n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig2_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2 Visualize a conversation as a tree diagram. Each node is an intent.\n\
    \nLet’s log in to the Dialogflow Essentials console. Open in your browser: [`https://dialogflow.cloud.google.com/`](https://dialogflow.cloud.google.com/).\n\
    \nYou can create new intents when you click the `Intents` menu item and then the\
    \ `Create New Intent` button. This will open the intents screen (Figure [3-3](#506047_1_En_3_Chapter.xhtml#Fig3)).\
    \ You will need to specify an intent name, training phrases, and responses.\n\n\
    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig3_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3 Creating a new intent.\n\n**Tip**  \nDialogflow Essentials doesn’t\
    \ have a folder system for intents. Thus, you will need to be creative with the\
    \ way you name intents. I’ve seen companies giving intents numerical ids in ranges,\
    \ which likely map to fulfillments in databases. I’ve also seen companies naming\
    \ intents to group them better: `UseCase.MainCategory.SubCategory` like: `webshop.console.order`\
    \ and `webshop.videogame.cancelorder`. In the end, you should decide for yourself\
    \ what works best. If it’s a small agent, a structure like this probably doesn’t\
    \ matter, but be aware that your agent eventually will scale.\n\nLet’s build a\
    \ cool chatbot that can help by providing video game information such as upcoming\
    \ game releases. It should also be possible to have a conversation with the chatbot\
    \ about video games. If you would have a conversation in real life with a friend\
    \ about this topic, what would it look like? Probably something like this:\n\n\
    > *Me: What video games are you currently playing?*  \n> *Friend: Oh, on the Nintendo\
    \ Switch, I play Animal Crossing, and on the PlayStation, I am currently playing\
    \ the latest Star Wars game. How about you?*  \n> *Me: I’m playing Call of Duty.*\
    \  \n> *Me: What’s your favorite video game?*  \n> *Friend: My favorite games\
    \ are Heavy Rain and Beyond to Souls. I enjoyed the Uncharted series too.*  \n\
    > *Me: Heavy Rain? Isn’t that this boring, quick-time adventure?*  \n> *Friend:\
    \ I love single-player games the most. My favorite games are games with a story.\
    \ The stories of those games are great.*  \n> *Me: Oh. For which system did it\
    \ come out?*  \n> *Friend: PlayStation 3 and 4.*  \n> *Me: I like multiplayer\
    \ games more. What’s your favorite multiplayer game?*  \n> *Friend: I sometimes\
    \ play Call of Duty. But I am not that great at it. I think I enjoy Heart Stone\
    \ on the iPad more.*\n\nWhen we analyze this conversation, you can clearly see\
    \ that there are three conversation topics:\n\n- Collect user’s info on current\
    \ playing game\n- Collect user’s favorite overall game\n- Collect user’s favorite\
    \ multiplayer game\n\nWhen we would take this conversation and train it in Dialogflow,\
    \ those three training topics are the intents.\n\nAn `intent` categorizes a user’s\
    \ intention. For each Dialogflow agent, you, as a UX designer (agent modeler)\
    \ or developer, may define many intents, where your combined intents can handle\
    \ a complete conversation. By defining intents, an underlying machine learning\
    \ model will be trained.\n\nWhen an end user writes or says something in a chatbot,\
    \ referred to as a `user expression` or `utterance`, Dialogflow matches the expression\
    \ to your Dialogflow agent’s best intent based on the training phrases and the\
    \ built-in NLP, the under the hood Dialogflow machine learning model was trained\
    \ on. Matching an intent is also known as `intent classification` or `intent matching`.\
    \ The matched intent can return a response, gather parameters (`entity extraction`),\
    \ or trigger webhook code (`fulfillment`) (e.g., to fetch data from a database).\n\
    \nAn intent in Dialogflow contains the following:\n\n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig4_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4 Training phrases of an intent.\n\n- **Context**: Using contexts,\
    \ you can control a conversation’s flow when turn-taking, for example, based on\
    \ our example conversation. At some point, the friend (or chatbot) will mention\
    \ his favorite video game. A follow-up question has been asked: “On what system\
    \ did it come out?” It refers to the favorite video game that was mentioned before.\
    \ We will discuss setting contexts later in this chapter.\n\n- **Training phrases**:\
    \ See Figure [3-4](#506047_1_En_3_Chapter.xhtml#Fig4). This is the dataset you\
    \ are using to train each individual intent. When a user says something, it will\
    \ be matched against these training phrases. It doesn’t matter if the user utterance\
    \ is spelled differently or told differently. When set up correctly, the Dialogflow\
    \ Natural Language Understanding (NLU) will likely understand what’s meant and\
    \ can figure out which intent has the match.\n\n**Tip**  \nWhen you provide training\
    \ phrases, a good practice is to have at least 15 to 20 different examples, depending\
    \ on your intent’s complexity. Do not make these phrases too similar.\n\nSuppose\
    \ we would create the *Collect user’s info on current playing game* intent in\
    \ Dialogflow. The training phrases could be:\n\n- *What video games are you currently\
    \ playing?*\n- *Which game are you playing now?*\n- *Which games are you playing\
    \ lately?*\n- *Are you playing any video games lately? Which ones?*\n- *What are\
    \ you playing right now?*\n- *What’s your latest game purchase?*\n- *What’s the\
    \ most recent game you played?*\n\n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig5_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5 An intent can have an event to get invoked.\n\n- **Events**: (See\
    \ Figure [3-5](#506047_1_En_3_Chapter.xhtml#Fig5).) Intents are typically triggered\
    \ when a user expression matches an intent training phrase. However, you can also\
    \ trigger intents using events, a mechanism to trigger code after a certain feature\
    \ or action, for example, a `platform event` such as the `Google Assistant Welcome`\
    \ event, which will be triggered when the Google Assistant action is launched,\
    \ or a `custom welcome event` when your web chatbot starts the Dialogflow agent\
    \ on a page load.\n\n**Tip**  \nSome Dialogflow Essentials users use custom events\
    \ to make intents reusable. Dialogflow Essentials doesn’t come with a feature\
    \ to reuse intents. If you think of a conversation as a tree diagram, then there\
    \ will be tree branches (like login flows or yes/no flows) which come back on\
    \ certain moments of a conversation. You could manually support this when working\
    \ with events. In fulfillment code implementations, you would fire custom events\
    \ by setting the `followupEventInput` field of the `WebhookResponse`. You can\
    \ optionally set the `followupEventInput.parameters` field to provide parameters\
    \ to the intent. Dialogflow intents can be configured to listen to these events\
    \ before returning a response.\n\n- **Action**: This feature makes the most sense\
    \ for developers who work with the Dialogflow SDK. In the Dialogflow console,\
    \ you can define an action name for each intent. Dialogflow provides the action\
    \ name to your implementation that integrates the Dialogflow agent through the\
    \ SDK when an intent is matched.\n\nFor example, if we create a new intent to\
    \ fetch game releases of a particular month, the video game results aren’t hardcoded\
    \ in the Dialogflow interface. Instead, developers would call a web service with\
    \ a database that will filter and return video game results. In Dialogflow, I\
    \ could set the action name to `fetch_videogames`, which could (depending on your\
    \ fulfillment implementation) trigger a function in your codebase."
  raw: '### Setting Up Intents


    An **intent** is a messaging object that describes an action. When you visualize
    a conversation as a part of a tree diagram (Figure [3-2](#506047_1_En_3_Chapter.xhtml#Fig2)),
    all the tree branches are (follow-up) intents.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig2_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Visualize a conversation as a tree diagram. Each node is an intent


    Let’s log in to the Dialogflow Essentials console. Open in your browser: [`https://dialogflow.cloud.google.com/`](https://dialogflow.cloud.google.com/).


    You can create new intents when you click the *Intents* menu item and then the
    **Create New Intent** button. This will open the intents screen (Figure [3-3](#506047_1_En_3_Chapter.xhtml#Fig3)).
    You will need to specify an intent name, training phrases, and responses.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig3_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Creating a new intent


    Tip


    Dialogflow Essentials doesn’t have a folder system for intents. Thus, you will
    need to be creative with the way you name intents. I’ve seen companies giving
    intents numerical ids in ranges, which likely map to fulfillments in databases.
    I’ve also seen companies naming intents to group them better:


    *UseCase.MainCategory.SubCategory* like: `webshop.console.order` and `webshop.videogame.cancelorder`.


    In the end, you should decide for yourself what works best. If it’s a small agent,
    a structure like this probably doesn’t matter, but be aware that your agent eventually
    will scale.


    Let’s build a cool chatbot that can help by providing video game information such
    as upcoming game releases. It should also be possible to have a conversation with
    the chatbot about video games. If you would have a conversation in real life with
    a friend about this topic, what would it look like? Probably something like this:


    > *Me: What video games are you currently playing?*


    > *Friend: Oh, on the Nintendo Switch, I play Animal Crossing, and on the PlayStation,
    I am currently playing the latest Star Wars game. How about you?*


    > *Me: I’m playing Call of Duty.*


    > *Me: What’s your favorite video game?*


    > *Friend: My favorite games are Heavy Rain and Beyond to Souls. I enjoyed the
    Uncharted series too.*


    > *Me: Heavy Rain? Isn’t that this boring, quick-time adventure?*


    > *Friend: I love single-player games the most. My favorite games are games with
    a story. The stories of those games are great.*


    > *Me: Oh. For which system did it come out?*


    > *Friend: PlayStation 3 and 4.*


    > *Me: I like multiplayer games more. What’s your favorite multiplayer game?*


    > *Friend: I sometimes play Call of Duty. But I am not that great at it. I think
    I enjoy Heart Stone on the iPad more.*


    When we analyze this conversation, you can clearly see that there are three conversation
    topics:


    *   Collect user’s info on current playing game


    *   Collect user’s favorite overall game


    *   Collect user’s favorite multiplayer game


    When we would take this conversation and train it in Dialogflow, those three training
    topics are the intents.


    An **intent** categorizes a user’s intention. For each Dialogflow agent, you,
    as a UX designer (agent modeler) or developer, may define many intents, where
    your combined intents can handle a complete conversation. By defining intents,
    an underlying machine learning model will be trained.


    When an end user writes or says something in a chatbot, referred to as a **user
    expression** or **utterance**, Dialogflow matches the expression to your Dialogflow
    agent’s best intent based on the training phrases and the built-in NLP, the under
    the hood Dialogflow machine learning model was trained on. Matching an intent
    is also known as **intent classification** or **intent matching** . The matched
    intent can return a response, gather parameters (**entity extraction**), or trigger
    webhook code (**fulfillment**) (e.g., to fetch data from a database).


    An intent in Dialogflow contains the following:


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig4_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Training phrases of an intent


    *   **Context**: Using contexts, you can control a conversation’s flow when turn-taking,
    for example, based on our example conversation. At some point, the friend (or
    chatbot) will mention his favorite video game. A follow-up question has been asked:
    “On what system did it come out?” It refers to the favorite video game that was
    mentioned before. We will discuss setting contexts later in this chapter.


    *   **Training phrases**: See Figure [3-4](#506047_1_En_3_Chapter.xhtml#Fig4).
    This is the dataset you are using to train each individual intent. When a user
    says something, it will be matched against these training phrases. It doesn’t
    matter if the user utterance is spelled differently or told differently. When
    set up correctly, the Dialogflow Natural Language Understanding (NLU) will likely
    understand what’s meant and can figure out which intent has the match.


    Tip


    When you provide training phrases, a good practice is to have at least 15 to 20
    different examples, depending on your intent’s complexity. Do not make these phrases
    too similar.


    Suppose we would create the *Collect user’s info on current playing game* intent
    in Dialogflow. The training phrases could be


    *   *What video games are you currently playing?*


    *   *Which game are you playing now?*


    *   *Which games are you playing lately?*


    *   *Are you playing any video games lately? Which ones?*


    *   *What are you playing right now?*


    *   *What’s your latest game purchase?*


    *   *What’s the most recent game you played?*


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig5_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    An intent can have an event to get invoked


    *   **Events**: *(See* *Figure* [*3-5*](#506047_1_En_3_Chapter.xhtml#Fig5)*.)*
    Intents are typically triggered when a user expression matches an intent training
    phrase. However, you can also trigger intents using events, a mechanism to trigger
    code after a certain feature or action, for example, a **platform event** such
    as the **Google Assistant Welcome** event, which will be triggered when the Google
    Assistant action is launched, or a **custom welcome event** when your web chatbot
    starts the Dialogflow agent on a page load.


    **Tip** Some Dialogflow Essentials users use custom events to make intents reusable.
    Dialogflow Essentials doesn’t come with a feature to reuse intents. If you think
    of a conversation as a tree diagram, then there will be tree branches (like login
    flows or yes/no flows) which come back on certain moments of a conversation. You
    could manually support this when working with events. In fulfillment code implementations,
    you would fire custom events by setting the `followupEventInput` field of the
    WebhookResponse. You can optionally set the `followupEventInput.parameters` field
    to provide parameters to the intent. Dialogflow intents can be configured to listen
    to these events before returning a response.


    *   **Action**: This feature makes the most sense for developers who work with
    the Dialogflow SDK. In the Dialogflow console, you can define an action name for
    each intent. Dialogflow provides the action name to your implementation that integrates
    the Dialogflow agent through the SDK when an intent is matched.


    For example, if we create a new intent to fetch game releases of a particular
    month, the video game results aren’t hardcoded in the Dialogflow interface. Instead,
    developers would call a web service with a database that will filter and return
    video game results. In Dialogflow, I could set the action name to *fetch_videogames*,
    which could (depending on your fulfillment implementation) trigger a function
    in your codebase.'
  trans: "\n### 设置意图\n\n`intent`（意图）是一个描述操作的消息对象。当你将对话可视化为树状图的一部分（图 3-2）时，所有树的分支都是（后续）意图。\n\
    \n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig2_HTML.jpg](img/506047_1_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2 将对话可视化为树状图。每个节点都是一个意图。\n\n让我们登录 Dialogflow Essentials 控制台。在浏览器中打开：[`https://dialogflow.cloud.google.com/`](https://dialogflow.cloud.google.com/)。\n\
    \n当你点击 `Intents` 菜单项，然后点击 `Create New Intent` 按钮时，可以创建新的意图。这将打开意图界面（图 3-3）。你需要指定意图名称、训练短语和响应。\n\
    \n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig3_HTML.jpg](img/506047_1_En_3_Fig3_HTML.jpg)\n\
    \n图 3-3 创建一个新意图。\n\n**提示**  \nDialogflow Essentials 没有用于意图的文件夹系统。因此，你需要在命名意图时发挥创意。我见过一些公司给意图分配数字\
    \ ID 范围，这很可能映射到数据库中的实现逻辑。我也见过一些公司通过命名意图来更好地分组：`UseCase.MainCategory.SubCategory`，例如：`webshop.console.order`\
    \ 和 `webshop.videogame.cancelorder`。最终，你应该自行决定哪种方式最有效。如果是一个小型代理，这样的结构可能无关紧要，但要注意你的代理最终会扩展。\n\
    \n让我们构建一个很酷的聊天机器人，它可以提供诸如即将发布的游戏等视频游戏信息。同时，也应该能够与聊天机器人就视频游戏进行对话。如果你在现实生活中与朋友就这个话题进行对话，会是什么样子？大概是这样：\n\
    \n> *我：你最近在玩什么电子游戏？*  \n> *朋友：哦，在任天堂 Switch 上，我玩《动物森友会》，在 PlayStation 上，我最近在玩最新的《星球大战》游戏。你呢？*\
    \  \n> *我：我在玩《使命召唤》。*  \n> *我：你最喜欢的电子游戏是什么？*  \n> *朋友：我最喜欢的游戏是《暴雨》和《超凡双生》。我也很喜欢《神秘海域》系列。*\
    \  \n> *我：《暴雨》？不就是那个无聊的快速反应事件冒险游戏吗？*  \n> *朋友：我最喜欢单人游戏。我最喜欢的游戏是有故事的游戏。那些游戏的故事很棒。*\
    \  \n> *我：哦。它是在哪个平台上发行的？*  \n> *朋友：PlayStation 3 和 4。*  \n> *我：我更喜欢多人游戏。你最喜欢的多人游戏是什么？*\
    \  \n> *朋友：我偶尔玩《使命召唤》。但我玩得不太好。我觉得我更喜欢在 iPad 上玩《炉石传说》。*\n\n当我们分析这段对话时，可以清楚地看到有三个对话主题：\n\
    \n- 收集用户当前正在玩的游戏信息\n- 收集用户最喜欢的整体游戏\n- 收集用户最喜欢的多人游戏\n\n如果我们把这段对话拿到 Dialogflow 中进行训练，那么这三个训练主题就是意图。\n\
    \n`intent`（意图）对用户的意图进行分类。对于每个 Dialogflow 代理，作为用户体验设计师（代理建模者）或开发者的你，可以定义许多意图，这些意图组合起来可以处理完整的对话。通过定义意图，底层的机器学习模型将得到训练。\n\
    \n当最终用户在聊天机器人中写下或说出某些内容（称为 `user expression` 或 `utterance`）时，Dialogflow 会根据训练短语和内置的\
    \ NLP（即 Dialogflow 机器学习模型训练的基础）将表达式与你的 Dialogflow 代理的最佳意图进行匹配。匹配意图也称为 `intent\
    \ classification`（意图分类）或 `intent matching`（意图匹配）。匹配到的意图可以返回响应、收集参数（`entity extraction`，实体提取）或触发\
    \ webhook 代码（`fulfillment`，实现逻辑）（例如，从数据库获取数据）。\n\nDialogflow 中的意图包含以下内容：\n\n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig4_HTML.jpg](img/506047_1_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4 意图的训练短语。\n\n- **上下文**：使用上下文，你可以在轮换发言时控制对话流程，例如，基于我们示例中的对话。在某个时刻，朋友（或聊天机器人）会提到他最喜欢的电子游戏。随后问了一个后续问题：“它是在哪个平台上发行的？”这指的是之前提到的最喜欢的电子游戏。我们将在本章后面讨论设置上下文。\n\
    \n- **训练短语**：见图 3-4。这是你用来训练每个单独意图的数据集。当用户说出某些内容时，它将与这些训练短语进行匹配。用户话语的拼写或表达方式不同并不重要。如果设置正确，Dialogflow\
    \ 自然语言理解（NLU）很可能会理解其含义，并能够找出匹配的意图。\n\n**提示**  \n在提供训练短语时，一个好的做法是至少提供 15 到 20 个不同的示例，具体取决于意图的复杂程度。不要使这些短语过于相似。\n\
    \n假设我们要在 Dialogflow 中创建“收集用户当前正在玩的游戏信息”意图。训练短语可以是：\n\n- *你最近在玩什么电子游戏？*\n- *你现在在玩哪个游戏？*\n\
    - *你最近在玩哪些游戏？*\n- *你最近在玩电子游戏吗？哪些？*\n- *你现在在玩什么？*\n- *你最近买了什么游戏？*\n- *你最近玩过的游戏是什么？*\n\
    \n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig5_HTML.jpg](img/506047_1_En_3_Fig5_HTML.jpg)\n\
    \n图 3-5 意图可以通过事件被调用。\n\n- **事件**：（见图 3-5。）意图通常是在用户表达式与意图训练短语匹配时触发的。但是，你也可以使用事件来触发意图，这是一种在特定功能或操作后触发代码的机制，例如，`platform\
    \ event`（平台事件），如 `Google Assistant Welcome` 事件，该事件会在 Google Assistant 操作启动时触发；或者\
    \ `custom welcome event`（自定义欢迎事件），当你的网页聊天机器人在页面加载时启动 Dialogflow 代理时触发。\n\n**提示**\
    \  \n一些 Dialogflow Essentials 用户使用自定义事件来使意图可重用。Dialogflow Essentials 本身不具备重用意图的功能。如果你将对话视为树状图，那么会有一些树分支（如登录流程或“是/否”流程）在对话的某些时刻重复出现。在使用事件时，你可以手动支持这一点。在实现逻辑代码实现中，你可以通过设置\
    \ `WebhookResponse` 的 `followupEventInput` 字段来触发自定义事件。你还可以选择设置 `followupEventInput.parameters`\
    \ 字段来向意图提供参数。Dialogflow 意图可以配置为在返回响应之前监听这些事件。\n\n- **操作**：此功能对于使用 Dialogflow SDK\
    \ 的开发者最有意义。在 Dialogflow 控制台中，你可以为每个意图定义一个操作名称。当意图被匹配时，Dialogflow 会将操作名称提供给通过 SDK\
    \ 集成 Dialogflow 代理的实现。\n\n例如，如果我们创建一个新意图来获取特定月份的游戏发布信息，视频游戏结果不会硬编码在 Dialogflow\
    \ 界面中。相反，开发者会调用一个带有数据库的 Web 服务，该服务将过滤并返回视频游戏结果。在 Dialogflow 中，我可以将操作名称设置为 `fetch_videogames`，这可以（取决于你的实现逻辑实现）触发你代码库中的一个函数。\n"
- fmt: '# Parameters, Responses, and Fulfillment


    - **Parameters**: When an intent is matched at runtime, Dialogflow provides the
    extracted values from the user expression as *parameters*, which could be sent
    to a fulfillment code/back-end code. We will discuss the parameters more in the
    next section.


    - **Responses**: You define text, speech, or visual responses to return to the
    end user. These may provide the end user with answers, ask the end user for more
    information, or terminate the conversation.


    In our example, the chatbot''s response could be: *Oh, on the Nintendo Switch,
    I play Animal Crossing, and on the PlayStation, I am currently playing the latest
    Star Wars game.*


    It''s possible to specify multiple different responses. Dialogflow will alternate
    through the response selection, so your answer could be unique each time. An alternative
    response would be: *I bought the Death Stranding game recently, but I haven''t
    started it yet.*


    Responses can also have a **custom payload**. Some platforms support a custom
    payload response to handle nonstandard, advanced responses. These custom payloads
    are supplied in a JSON format defined in the platform''s documentation. You would
    use this to create rich cards, for example. Depending on the integrations you
    have enabled for Dialogflow, you will see different response tabs for entering
    custom payloads.


    And responses have an **end of the conversation switch**. You can specify if the
    response is the end of the conversation. It will stop the conversation. For example,
    on specific platforms, like the Google Assistant, it will close the action (app).


    - **Fulfillment switches**: When the answer for this conversation isn''t hardcoded
    in Dialogflow, but it comes out of a different system, you should mark *enable
    webhook call for this intent*. When an intent is matched at runtime, the Dialogflow
    agent continues collecting parameters from the user until the user has provided
    data for each of the required parameters. This process is called slot filling.
    By default, Dialogflow does not send a fulfillment webhook request until it has
    collected all required data from the user. Dialogflow sends a fulfillment webhook
    request for each conversational turn during slot filling if a webhook for slot
    filling is enabled.


    In the fulfillment screen, you can set up the webhook. We will discuss fulfillment
    in detail in Chapter [10](#506047_1_En_10_Chapter.xhtml).


    When you start a new Dialogflow project, you will always get two predefined intents:
    a *welcome intent*, which will be triggered when you start the conversation, and
    a global *fallback intent* that will be activated when Dialogflow cannot find
    an intent match at all.


    A Dialogflow agent can handle 2k different intents. If you need more intents,
    you might want to look into the mega-agent feature; see Chapter [9](#506047_1_En_9_Chapter.xhtml).
    Each intent can have 2k maximum training phrases per language, or 100k in total
    per Dialogflow agent per language.


    ## Entities in Depth


    An **entity** is a (variable) messaging object to take action on. It''s like a
    parameter that collects a value for a particular key.


    In Dialogflow, you can create **custom entities**, or you can make use of **system
    entities**. Custom entities can be created in the Dialogflow agent. Dialogflow
    recognizes system entities such as names of the month, currencies, and country
    names out of the box.


    ### Creating Custom Entities


    To create custom entities, in the menu bar, click *Entities* ➤ *Create Entity*.
    (See Figure [3-6](#506047_1_En_3_Chapter.xhtml#Fig6).)


    On this screen, you can give your entity a name and a list of possible values.
    The first value of an entry will be used for sending to a back end; all the other
    value options (the synonyms) will be used to recognize the entry. You can use
    the tab key to create more synonyms.


    After creating the custom entity, don''t forget to press the *Save* button.


    Our chatbot doesn''t contain that much advanced logic yet. After completing the
    previous recipe, your chatbot only can have a simple conversation with you. Imagine
    that you would also be able to request the latest release dates for a particular
    game console, like:


    "Which games were released for **PlayStation 5** this month?"


    PlayStation 5 is a variable part. I could ask PlayStation 5, Xbox Series X, Nintendo
    Switch, or Windows to return me different results. PlayStation 5 is a custom entity.
    In fact, if I would connect this conversation to a web service, it would send
    a parameter to filter the responses on to a back-end system, for example:


    - `platform = PS5`


    For Dialogflow to understand that PlayStation 5 is an entity, we would need to
    create an entity `platform` containing all the possible options.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig6_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Creating custom entities


    There is an easier way to enter all the entity entries. When you click the three
    bullets next to the save button (the options button), it allows you to switch
    to Raw mode. Here, you can enter the entries in JSON or CSV format. Listing [3-1](#506047_1_En_3_Chapter.xhtml#PC1)
    shows a code example in JSON.


    ```

    JSON:

    [

    {

    "value": "xbox-series-x",

    "synonyms": [

    "xbox-series-x",

    "Xbox Series X",

    "newest xbox",

    "next gen xbox",

    "Microsoft Xbox Series X"

    ]

    },

    {

    "value": "playstation-5",

    "synonyms": [

    "playstation-5",

    "PS5",

    "Next gen PlayStation",

    "newest PlayStation",

    "Sony Playstation 5"

    ]

    },

    {

    "value": "xboxone",

    "synonyms": [

    "xboxone",

    "Xbone",

    "Xbox1",

    "Microsoft Xbox One"

    ]

    },

    {

    "value": "ps4--1",

    "synonyms": [

    "ps4--1",

    "Playstation 4",

    "PS4",

    "Sony Playstation 4"

    ]

    },

    {

    "value": "win",

    "synonyms": [

    "win",

    "PC",

    "Microsoft PC",

    "Windows"

    ]

    },

    {

    "value": "switch",

    "synonyms": [

    "switch",

    "Nintendo Switch"

    ]

    },

    {

    "value": "new-nintendo-3ds",

    "synonyms": [

    "new-nintendo-3ds",

    "N3DS",

    "3DS",

    "Nintendo 3DS",

    "New Nintendo 3DS"

    ]

    }

    ]

    Listing 3-1

    Example entities in JSON format

    ```


    Listing [3-2](#506047_1_En_3_Chapter.xhtml#PC2) shows a code example in CSV format.


    ```

    "xbox-series-x","xbox-series-x","Xbox Series X","newest xbox","next gen xbox","Microsoft
    Xbox Series X"

    "playstation-5","playstation-5","PS5","Next gen playstation","newest playstation","Sony
    Playstation 5"

    "xboxone","xboxone","Xbone","Xbox1","Microsoft Xbox one"

    "ps4--1","ps4--1","Playstation 4","PS4","Sony Playstation 4"

    "win","win","PC","Microsoft PC","Windows"

    "switch","switch","Nintendo Switch"

    "new-nintendo-3ds","new-nintendo-3ds","N3DS","3DS","Nintendo 3DS","New Nintendo
    3DS"

    Listing 3-2

    Example entities in CSV format

    ```


    It''s also possible to import or export entities from the Entities screen. Click
    the option (three bullets) button next to the Create Entity button. Click **Upload
    Entity** and select to upload a JSON or CSV file which contains the entities.
    For uploading files, it needs to conform to the following rules:


    - Each entry corresponds to a new line.

    - The reference value and synonyms should be separated by commas.

    - Each reference value and synonym should be enclosed in double quotes.

    - The reference value should be at the beginning of the line.

    - Include the reference value twice if you want it to be matched by the entity.


    Programmatically, it''s possible to add entities too. This makes sense if you
    have an extensive list of entities that needs to be automatically imported from
    a database.


    The Dialogflow API method `projects.agent.entityTypes.batchUpdate` could do this.


    A Dialogflow agent can handle 250 different custom entities. If you need more
    entities, you might want to look into the mega-agent feature; see Chapter [8](#506047_1_En_8_Chapter.xhtml).
    Each entity can have 30K different entries, 200 synonyms per entity entry. A Dialogflow
    agent has a maximum of 1M entity values and synonyms.'
  raw: '*   **Parameters**: When an intent is matched at runtime, Dialogflow provides
    the extracted values from the user expression as *parameters*, which could be
    sent to a fulfillment code/back-end code. We will discuss the parameters more
    in the next section.


    *   **Responses**: You define text, speech, or visual responses to return to the
    end user. These may provide the end user with answers, ask the end user for more
    information, or terminate the conversation.


    In our example, the chatbot’s response could be: *Oh, on the Nintendo Switch,
    I play Animal Crossing, and on the PlayStation, I am currently playing the latest
    Star Wars game.*


    It’s possible to specify multiple different responses. Dialogflow will alternate
    through the response selection, so your answer could be unique each time. An alternative
    response would be: *I bought the Death Stranding game recently, but I haven’t
    started it yet.*


    Responses can also have a **custom payload**. Some platforms support a custom
    payload response to handle nonstandard, advanced responses. These custom payloads
    are supplied in a JSON format defined in the platform’s documentation. You would
    use this to create rich cards, for example. Depending on the integrations you
    have enabled for Dialogflow, you will see different response tabs for entering
    custom payloads.


    And responses have an **end of the conversation switch**. You can specify if the
    response is the end of the conversation. It will stop the conversation. For example,
    on specific platforms, like the Google Assistant, it will close the action (app).


    *   **Fulfillment switches**: When the answer for this conversation isn’t hardcoded
    in Dialogflow, but it comes out of a different system, you should mark *enable
    webhook call for this intent*. When an intent is matched at runtime, the Dialogflow
    agent continues collecting parameters from the user until the user has provided
    data for each of the required parameters. This process is called slot filling.
    By default, Dialogflow does not send a fulfillment webhook request until it has
    collected all required data from the user. Dialogflow sends a fulfillment webhook
    request for each conversational turn during slot filling if a webhook for slot
    filling is enabled.


    In the fulfillment screen, you can set up the webhook. We will discuss fulfillment
    in detail in Chapter [10](#506047_1_En_10_Chapter.xhtml).


    When you start a new Dialogflow project, you will always get two predefined intents:
    a *welcome intent*, which will be triggered when you start the conversation, and
    a global *fallback intent* that will be activated when Dialogflow cannot find
    an intent match at all.


    A Dialogflow agent can handle 2k different intents. If you need more intents,
    you might want to look into the mega-agent feature; see Chapter [9](#506047_1_En_9_Chapter.xhtml).
    Each intent can have 2k maximum training phrases per language, or 100k in total
    per Dialogflow agent per language.


    ## Entities in Depth


    An **entity** is a (variable) messaging object to take action on. It’s like a
    parameter that collects a value for a particular key.


    In Dialogflow, you can create **custom entities** , or you can make use of **system
    entities**. Custom entities can be created in the Dialogflow agent. Dialogflow
    recognizes system entities such as names of the month, currencies, and country
    names out of the box.


    ### Creating Custom Entities


    To create custom entities, in the menu bar, click *Entities* ➤ *Create Entity*.
    (See Figure [3-6](#506047_1_En_3_Chapter.xhtml#Fig6).)


    On this screen, you can give your entity a name and a list of possible values.
    The first value of an entry will be used for sending to a back end; all the other
    value options (the synonyms) will be used to recognize the entry. You can use
    the tab key to create more synonyms.


    After creating the custom entity, don’t forget to press the *Save* button.


    Our chatbot doesn’t contain that much advanced logic yet. After completing the
    previous recipe, your chatbot only can have a simple conversation with you. Imagine
    that you would also be able to request the latest release dates for a particular
    game console, like:


    “Which games were released for **PlayStation 5** this month?”


    PlayStation 5 is a variable part. I could ask PlayStation 5, Xbox Series X, Nintendo
    Switch, or Windows to return me different results. PlayStation 5 is a custom entity.
    In fact, if I would connect this conversation to a web service, it would send
    a parameter to filter the responses on to a back-end system, for example:


    *   *platform = PS5*


    For Dialogflow to understand that PlayStation 5 is an entity, we would need to
    create an entity “platform” containing all the possible options.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig6_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


