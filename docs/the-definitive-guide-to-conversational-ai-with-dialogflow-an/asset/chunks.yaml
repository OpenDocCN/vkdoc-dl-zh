  trans: "\n### Meena 与 LaMDA\n\n`Meena` 是一个拥有 26 亿参数的端到端训练神经对话模型。它由谷歌创建，旨在更好地处理各种对话主题，以开发一个并非专精于某一领域、但仍能就用户想要的几乎任何话题进行聊天的聊天机器人。除了是一个引人入胜的研究问题外，这样的对话代理还能带来许多有趣的应用，例如进一步人性化计算机交互、改进外语练习，以及创造更具亲和力的互动电影和视频游戏角色。\n\
    \n然而，当前的开放域聊天机器人有一个关键缺陷——它们常常前言不搭后语。它们有时会说一些与之前对话内容不一致的话，或者缺乏常识和对世界的基本认知。此外，聊天机器人给出的回复往往不针对当前语境。例如，“我不知道”是对任何问题都合理的回答，但它并不具体。\n\
    \n`Meena` 能够进行比现有最先进的聊天机器人更合理、更具体的对话。\n\n`Meena` 模型在 341GB 的文本上进行了训练，这些文本从公共领域的社交媒体对话中筛选而来。与现有的最先进生成模型相比，`Meena`\
    \ 的模型容量是其 1.7 倍，并且训练数据量是其 8.5 倍。\n\n在撰写本文时，除了合理性之外，谷歌还关注其他属性，如个性以及处理模型中的事实核查、安全性和偏见问题，这在向公众开放\
    \ `Meena` 之前是非常必要的。\n\n`Meena` 为 `LaMDA`（对话应用语言模型）奠定了基础，该模型于 2021 年 5 月在 Google\
    \ I/O 大会上推出。`LaMDA` 是开放域的，这意味着它被设计用于就任何话题进行对话。它通过对话进行训练，通过观察单个词语以及整个句子和段落，理清它们之间的关系，并把握全局，以尝试预测接下来会说什么以及它应该如何回应，从而模仿更自然的对话方式。这样，它就能以一种在整个对话语境中（而不仅仅是最后说出的短语）真正有意义的方式进行回应。\n\
    \n## 总结\n\n本章为你提供了关于聊天机器人及其历史、谷歌云、人工智能、机器学习、自然语言处理、`Dialogflow Essentials`、`Dialogflow\
    \ CX`、`语音转文本`、`文本转语音`和`联络中心 AI` 的所有背景信息。\n\n在最后一节中，我们讨论了其他谷歌对话式 AI 项目和工具。其中包括\
    \ `Google Assistant`、`Actions on Google`（谷歌的虚拟助手和开发平台）、`AdLingo`（将广告转化为虚拟代理）、`Chatbase`（洞察分析）、`Duplex`（还记得那个给理发店打电话的机器人吧）和\
    \ `Meena`（合理的对话模型）。\n\n既然你已经了解了一些背景信息，是时候开始构建我们自己的 `Dialogflow` 代理了！\n\n## 延伸阅读\n\
    \n*   更多关于谷歌云的信息\n    [`https://cloud.google.com`](https://cloud.google.com)\n\
    *   包含所有谷歌云产品和描述的速查表\n    [`http://4words.dev/`](http://4words.dev/)\n*   谷歌的开源项目\n\
    \    [`https://opensource.google/`](https://opensource.google/)\n*   更多关于 `Dialogflow`\
    \ 的信息\n    [`https://cloud.google.com/dialogflow`](https://cloud.google.com/dialogflow)\n\
    *   更多关于 `TensorFlow` 的信息\n    [`https://www.tensorflow.org/`](https://www.tensorflow.org/)\n\
    *   更多关于 `BERT` 的信息\n    [`https://github.com/google-research/bert`](https://github.com/google-research/bert)\n\
    *   更多关于 `联络中心 AI` 的信息\n    [`https://cloud.google.com/solutions/contact-center`](https://cloud.google.com/solutions/contact-center)\n\
    *   了解更多关于 DeepMind 的 `WaveNet`\n    [`https://deepmind.com/blog/article/wavenet-generative-model-raw-audio`](https://deepmind.com/blog/article/wavenet-generative-model-raw-audio)\n\
    *   了解更多关于 `Tacotron2` 的信息\n    [`https://ai.googleblog.com/2017/12/tacotron-2-generating-human-like-speech.html`](https://ai.googleblog.com/2017/12/tacotron-2-generating-human-like-speech.html)\n\
    *   更多关于 `Chatbase` 的信息\n    [`https://chatbase.com/`](https://chatbase.com/)\n\
    *   更多关于 `Meena` 的信息\n    [`https://ai.googleblog.com/2020/01/towards-conversational-agent-that-can.html`](https://ai.googleblog.com/2020/01/towards-conversational-agent-that-can.html)\n\
    *   更多关于 `LaMDA` 的信息\n    [`https://blog.google/technology/ai/lamda/`](https://blog.google/technology/ai/lamda/)\n\
    *   更多关于 `Actions on Google` 的信息\n    [`https://developers.google.com/assistant`](https://developers.google.com/assistant)\n\
    *   更多关于 `Actions Builder` 的信息\n    [`https://developers.google.com/assistant/conversational`](https://developers.google.com/assistant/conversational)\n\
    *   走红的 `Duplex` 视频\n    [`https://www.youtube.com/watch?v=D5VN56jQMWM`](https://www.youtube.com/watch%253Fv%253DD5VN56jQMWM)\n\
    *   更多关于 `Tacotron2` 的信息\n    [`https://google.github.io/tacotron/publications/tacotron2/index.html`](https://google.github.io/tacotron/publications/tacotron2/index.html)\n\
    \n# 2. Dialogflow Essentials 入门\n\n`Dialogflow Essentials` 是可用于构建对话式用户界面的工具。它提供试用版和按需付费版。在本章中，你将学习如何使用\
    \ `Dialogflow Essentials` 设置你的第一个 `Dialogflow` 代理。\n\n这包括：代理及其数据存储的位置、日志记录、监控、用户角色和配额。它深入讨论了所有可能的设置。在本章末尾，开发者可以学习如何设置\
    \ `Dialogflow` 以进行 API 访问。\n"
- fmt: '# Dialogflow Essentials Editions


    `Dialogflow Essentials` pay-as-you-go edition is the enterprise tier of `Dialogflow`
    and is part of `Google Cloud`. The pay-as-you-go edition is targeted at organizations
    that need enterprise-grade service. `Dialogflow Essentials` pay as you go has
    coverage against the most important global compliance & regulation standards (e.g.,
    `GDPR`), and provides an `SLA`, support packages, and `Google Cloud` Terms of
    Services. On top of this, it has a higher quota limit and voice interaction and
    is fully integrated with `Google Cloud`, making it easy to consume other Cloud
    services to build a full advanced solution. (Think of additional machine learning
    APIs such as `Translation`, masking sensitive user data (`GDPR`) with the `DLP
    API`, sentiment detection with the `NLP API`, `Cloud Functions` fulfillment, `BigQuery`
    data warehouse for analytics, etc.)


    The no-charge `Dialogflow` trial is not part of `Google Cloud`.


    Just like other free Google tools, `Dialogflow` free version is part of the no-charge
    Google consumer terms. This means, like in the case of `Gmail`, that your data
    can be used to improve products, machine learning model training, or advertising.


    Where is the `Dialogflow` data processed? You can choose this while creating a
    project. Part of `Google Cloud` also means the best latency. When you are connected
    to `Google Cloud`, you will use the `Google Cloud` cables under the ocean. Therefore,
    your connection will be much faster and will be secure.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig1_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    `Dialogflow` location dropdown


    As seen in Figure [2-1](#506047_1_En_2_Chapter.xhtml#Fig1), by default, the `PII`
    data (like chat history, analytics, and logs) are stored in the global `Dialogflow`
    servers. Before you create a new `Dialogflow` agent, you can choose a location
    for your `Dialogflow` project. At the time of writing this, you can choose between
    the US, Asia (Japan), Australia (Sydney), and the UK (London), and you can find
    this setting in the dropdown next to the `Dialogflow` logo. After selecting the
    region, you will switch to a new `Dialogflow` environment where you can create
    a new agent.


    **Note**


    The regions Australia, Asia, and the UK don’t offer all the same features as for
    the USA (Global). For example, region Asia is missing beta features such as the
    `FAQ` knowledge base, and it doesn’t come with prebuilt agents, small talk, and
    out-of-the-box integrations. The last one seems essential, but you can build integrations
    manually as described in Chapter [10](#506047_1_En_10_Chapter.xhtml).


    Besides, you can turn the storage of data off in the `Dialogflow` settings screen;
    see Figure [2-2](#506047_1_En_2_Chapter.xhtml#Fig2). Click the cogwheel icon right
    under the `Dialogflow` logo. Once the data is turned off, no `PII` data will be
    stored. Especially for European countries that deal with the `GDPR`, this might
    be interesting.


    **Note**


    Since Brexit happened, the United Kingdom is not part of the European Union anymore.
    This means according to the `General Data Protection Regulation (GDPR)` compliance
    that storing logs and history data into the UK region isn’t compliant. The best
    solution is to create your agent in the global region (to get access to all the
    features), but turn off all logs in `Dialogflow`. Instead, you can store the chat
    history in `Google Cloud BigQuery` where you can choose Europe as a region. This
    approach is explained in Chapter [13](#506047_1_En_13_Chapter.xhtml).


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig2_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Log Settings in the settings panel


    However, I do advise that you still capture the analytics of your chatbot. You
    could easily do this by building an additional layer that pushes incoming messages
    from the `Dialogflow SDK` directly to `Google Cloud BigQuery`. `BigQuery` is part
    of `Google Cloud`, and Europe can be chosen for data storage. Other `Google Cloud`
    resources allow you to store data in a data center of a particular country. (For
    example, `Google Cloud Storage` can store the data in a data center in the Netherlands).


    ## Creating a Dialogflow Trial Agent


    `Dialogflow` is a `Software as a Service (SaaS)` solution; it runs in your browser.


    Let’s create an example agent.


    Open [`https://dialogflow.cloud.google.com/`](https://dialogflow.cloud.google.com/).


    Sign in with a Google identity. For consumers, this can be a `Gmail` address,
    and for organizations this can be a `Google Cloud Identity` or `Google Workspace`
    entity tied to your own domain.


    If you have used `Dialogflow` before, you will automatically log in to an active
    `Dialogflow` project.


    If it’s your first time logging in to `Dialogflow`, it might be that you see a
    pop-up (see Figure [2-3](#506047_1_En_2_Chapter.xhtml#Fig3)). You will need to
    agree to the `Dialogflow` trial terms and conditions, with additional `Firebase`
    terms and conditions. The last one will be used when using the no-charge cloud
    services, such as the inline fulfillment editor, which under the hood uses a no-charge
    `Firebase` cloud function.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig3_HTML.png](images/506047_1_En_2_Chapter/506047_1_En_2_Fig3_HTML.png)


    Figure 2-3


    First-time users can accept the consumer terms of service


    In case you are planning to build voice bots in your browser or with `Google Assistant`,
    make sure you have enabled **Web & App Activity**. You can access this settings
    page from [`http://myaccount.google.com/activitycontrols`](http://myaccount.google.com/activitycontrols)
    (see Figure [2-4](#506047_1_En_2_Chapter.xhtml#Fig4)).


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig4_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Web & App Activity in your Google profile


    Next, click the **Create Agent** button.


    To create another new project, click the dropdown (under the `Dialogflow` logo,
    see Figure [2-5](#506047_1_En_2_Chapter.xhtml#Fig5)). It will show you a list
    of active `Dialogflow` projects, wherein at the bottom, there will be the menu
    option: **Create Agent**.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig5_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    You can select `Dialogflow` agents with the dropdown


    In the create agent screen (see Figure [2-6](#506047_1_En_2_Chapter.xhtml#Fig6)),
    you will need to


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig6_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Creating a new agent in `Dialogflow Essentials`


    *   Set a `Dialogflow` *project name*

    *   Set a *default language* (additional languages can be added in later steps)

    *   Set a *default time zone* (when conversations are mapped to date/time objects,
    it will use the default time zone)


    Optionally, you could point to an existing `Google Cloud` project. When you leave
    it empty, `Dialogflow` will create an underlying project in `Google Cloud` for
    you.


    Do not enable the **Mega Agent** switch. We will discuss this feature in Chapter
    [9](#506047_1_En_9_Chapter.xhtml) to orchestrate multiple sub-chatbots. For now,
    leave it off.


    Click **Create**, and `Dialogflow` will create a new `Dialogflow` standard (no
    charge) project for you.'
