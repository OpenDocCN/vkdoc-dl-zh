- fmt: '# About Dialogflow


    Now, let’s talk more about AI for conversational. In September 2016, Google acquired
    the company called `API.ai`. `API.ai` (previously known as the company `Speaktoit`)
    released an end-to-end development suite for building conversational interfaces
    for websites, mobile applications, popular messaging/social media platforms, IoT,
    voice devices, and contact centers. In October 2017, the platform got a new name:
    `Dialogflow`. `Dialogflow` is making use of Artificial Intelligence subsets: Natural
    Language Understanding, speech recognition, and Named Entity Recognition (`NER`,
    for extracting values out of text) to recognize the intent, entities, and context
    of what a user says, allowing your conversational UI to provide highly efficient
    and accurate responses.


    Companies of all sizes are using `Dialogflow`. Use cases are:


    - Internal business-to-employee chatbots

    - Public-facing chatbots for connecting businesses to customers like customer
    service or sales departments

    - Chatbots which control IoT devices (home entertainment, auto, self-service kiosks,
    etc.)

    - Robots in contact centers for inbound and outbound calls


    Customers of `Dialogflow` include Giorgio Armani, Mercedes, Comcast, The Wall
    Street Journal, KLM Royal Dutch Airlines, EasyJet, ING Bank, Marks & Spencer,
    Ahold, and so on.


    At the moment of writing (June 2021), `Dialogflow` has over 1.7 million users.
    The reason why `Dialogflow` is so popular in the chatbot community is because:


    - `Dialogflow` is powered by state-of-the-art Machine Learning. Google is a recognized
    world leader in Artificial Intelligence, and `Dialogflow` benefits from Google’s
    assets and capabilities in ML, NLU, and search. Apart from the built-in Machine
    Learning models, it’s also possible to train your agents yourself to make your
    conversational UI smarter over time.

    - With `Dialogflow`, you can separate your conversation from code. Since `Dialogflow`
    provides a Cloud web UI, you can separate your dialogues and entities from application/agent
    code. This makes your conversational UI more scalable; you don’t need a developer
    to make or deploy changes.

    - With `Dialogflow`, you can build chatbots faster than coding chatbots through
    a set of (Python) scripts. Besides the web UI, you can also build faster conversational
    UIs by enabling the prebuilt agents (templates) and Small Talk intents (to give
    your agent more personality), all with one single mouse click.

    - Advanced fulfillment options and multichannel integrations. `Dialogflow` has
    over 32 channel integrations and SDKs. Therefore, you can easily integrate your
    agent with your on-premise environments as well as cloud environments to consume
    data from services. With the built-in multichannel integrations, you can quickly
    deploy your agent to the various built-in channels (social media channels like
    Twitter, Facebook Messenger, Skype, or Slack; voice-activated assistants such
    as the Google Assistant; phone or SMS services. Or you can deploy it to your website
    or apps by making use of the SDK through `gRPC`, `REST`, or client-side libraries
    for `Java`, `Node.js`, `Python`, `Go`, `PHP`, `Ruby`, or `C#`).

    - Since `Dialogflow` is available through Google Cloud, it has the Google Cloud
    Terms of Services, SLA, and support packages. Being part of Google Cloud means
    excellent reliability, low latency, easy integration with over 200 Google Cloud
    services, such as data analytics services and tools (like `BigQuery`, `Dataprep`,
    or `Pub/Sub`); Machine Learning APIs (like sentiment detection, translation, speech-to-text
    transcription, text-to-speech synthesizer, data loss prevention for masking sensitive
    data, Vision AI like OCR detection on images) or cloud environments such as `Cloud
    Functions`, `Kubernetes`, `Compute VMs`, `Cloud Run`, or `App Engine`. Google
    Cloud services can be controlled with a powerful identity access management, error/debugging,
    logging, and monitoring.

    - Powerful analytics. Use data analytics to monitor bot health and also better
    understand its interactions with users. `Chatbase`, a Google Cloud service that
    helps builders analyze and optimize bots more quickly, is complementary to `Dialogflow`.
    Using them in combination helps builders create world-class bots and then continually
    track and optimize them using `Chatbase`. All `Dialogflow` users get an automated
    set of basic `Chatbase` analytics directly from their console.

    - Speech/voice integration besides text interfaces. `Dialogflow` also has speech
    recognition and Text to Speech integrated—handy for IoT devices or out-of-the-box
    integration with IVR telephony partners.

    - Multilingual bot support. Over 20 languages are supported in `Dialogflow`.


    ## Dialogflow Essentials and Dialogflow CX


    The original `Dialogflow` tool recently had a name change; it’s now called `Dialogflow
    Essentials` (`Dialogflow ES`) to make room for a new Google Cloud Conversational
    AI tool: `Dialogflow Customer Experience` (`Dialogflow CX`).


    `Dialogflow CX` will be an alternative development suite for building conversational
    UIs and will exist next to `Dialogflow ES`. Google will continue to support `Dialogflow
    ES`, as we have a huge user base. To understand why Google created another bot
    builder, let’s first understand how `Dialogflow ES` works at a high level.


    ### How Dialogflow Essentials Works


    An intent in `Dialogflow ES` categorizes a user’s intention. For each `Dialogflow
    ES` agent, you can define many intents, where your combined intents can handle
    a complete conversation. Each intent can contain parameters and responses.


    Matching an intent is also known as `intent classification` or `intent matching`.
    (The next chapter will go into details about these concepts.) Once an intent is
    matched, it can return a response, gather parameters (entity extraction), or trigger
    webhook code (fulfillment), for example, to fetch data from a database. `Dialogflow
    ES` can keep track of a context, and just like a human, while turn-taking, `Dialogflow
    ES` can remember the context in a second and third turn. This is how it can keep
    track of previous user utterances. This is the main concept in `Dialogflow ES`.


    ### How the Industry Is Changing Its Complexity


    Large enterprises have been using `Dialogflow ES` over the past years. Here’s
    an observation I see at Google. At the beginning (2016), most conversational AIs
    were simple chatbots (voice assistant bots, FAQ bots, etc.), for web or voice
    bots, like the Google Assistant. It typically uses one or two turn-taking turns.
    For example, “Hey Google, what’s currently playing on ABC?”—“*The Bachelor* started
    at 8 p.m., an episode you have never seen before!”


    As we all know, building conversational UIs is an ongoing process. When you capture
    the right chatbot insights, you will see what your customers are asking for. When
    you continue to build conversations on top of an existing agent, that bot becomes
    more complex over the years.


    So conversation **complexity** is one observation. The other perception I made
    is that **businesses want to be where their customers are**. And thus, their chatbots
    will need to connect to more channels to create omnichannel experiences. Instead
    of building a single chatbot, companies now want to develop complete conversational
    platforms fed by a data lake and automate processes with RPA. Think of complex
    use cases such as replacing your customer care or HR department with robots. Having
    overloaded call centers and employees burned out by undervalued monotonous tasks,
    automation through chatbots and virtual (voice) agents can trim huge business
    costs. Through conversational AI in contact centers, businesses can reduce call
    time and on-hold time and offer 24/7 availability while improving our processes
    by capturing analytics.'
