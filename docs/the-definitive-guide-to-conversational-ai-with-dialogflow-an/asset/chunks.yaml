  trans: '

    # 为企业创建 Dialogflow 智能体


    当您为企业工作，并希望创建一个安全且符合合规要求的 Dialogflow 智能体时，您可以像以前一样创建一个 Dialogflow 项目。但是，您需要将项目升级到（付费的）企业版。之后，您还需要在
    Google Cloud 项目中启用 Dialogflow API。


    首先，导航至 [`http://console.cloud.google.com`](http://console.cloud.google.com)。使用
    Google 身份登录。对于个人用户，这可以是 Gmail 地址；对于组织，这可以是绑定到您自己域名的 Google Cloud Identity 或 Google
    Workspace 实体。


    首次使用 Google Cloud 的用户需要接受 Google Cloud 条款和条件页面，同时设置原籍国（见图 2-7）。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig7_HTML.jpg](img/506047_1_En_2_Fig7_HTML.jpg)


    图 2-7


    接受 Google Cloud 条款和条件


    当您首次使用 Google Cloud 时，需要提供一个结算账户。Google Cloud 按使用量付费，即使它提供免费额度（对于构建聊天机器人来说绰绰有余），您也必须指定一种付款方式，例如信用卡。这将保护
    Google Cloud 免受机器人滥用免费账户的影响。在左侧菜单中，您可以选择**结算** ➤ **创建账户**。您需要指定结算账户名称、组织名称和国家（货币将与之关联）。在下一个屏幕上，您可以输入付款地址和付款方式详细信息。


    登录 Google Cloud 控制台并拥有有效的结算账户后，您需要创建一个项目。点击蓝色顶部栏中 Google Cloud 徽标旁边的**选择项目**按钮。（见图
    2-8。）


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig8_HTML.jpg](img/506047_1_En_2_Fig8_HTML.jpg)


    图 2-8


    Google Cloud 控制台中的 Google Cloud 项目选择器


    在弹出的窗口中，点击**新建项目**，如图 2-9 所示。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig9_HTML.jpg](img/506047_1_En_2_Fig9_HTML.jpg)


    图 2-9


    在 Google Cloud 控制台中创建一个新的 Google Cloud 项目


    在创建项目页面中，您需要：


    -   设置一个*项目名称*。

    -   选择一个*结算账户*。此结算账户将用于对该项目进行计费。


    点击**创建**。


    下一步，让我们在另一个浏览器标签页中打开 Dialogflow 控制台：


    [`http://console.dialogflow.com`](http://console.dialogflow.com)


    步骤将与上一节类似。但是，现在您可以在创建智能体页面中导入您新创建的 Google Cloud 项目。


    点击**创建**。


    最后一步是将您的 Dialogflow 套餐从试用版升级到企业版。在菜单中，点击**升级**按钮（见图 2-10）。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig10_HTML.jpg](img/506047_1_En_2_Fig10_HTML.jpg)


    图 2-10


    升级到 Dialogflow 按需付费


    您将看到一个类似图 2-11 的弹出窗口，您可以选择一个套餐。有两个套餐可供选择：*试用版*和*基础版*。这两个套餐的主要区别在于，*基础版*套餐提供企业级功能，例如
    Google Cloud 条款和条件、SLA、支持以及更高的配额。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig11_HTML.jpg](img/506047_1_En_2_Fig11_HTML.jpg)


    图 2-11


    选择 Dialogflow 版本


    选择基础版套餐，即表示您同意 Google Cloud（企业版）条款和条件。


    设置企业版套餐后，您将在菜单中看到企业版套餐已为您的项目激活（注意图 2-12），并且您可以随时更改。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig12_HTML.jpg](img/506047_1_En_2_Fig12_HTML.jpg)


    图 2-12


    注意 Dialogflow 菜单中已选定的套餐


    ## 配额


    除了云条款和条件、SLA 和支持之外，许多客户使用企业版的另一个原因是更高的调用配额。每次您与 Dialogflow 交互时，用户话语都将被视为一次 API/Dialogflow
    智能体调用。试用版 Dialogflow 有 API 调用上限。试用版每分钟最多可进行 180 次文本聊天机器人调用，而企业版每分钟可进行 600 次请求。Google
    Cloud 有关于所有配额的文档，并且配额通常可以增加。要申请更高的配额，请在配额编辑表单中点击**申请更高配额**，以提交**Dialogflow 配额增加请求**（[`https://console.cloud.google.com/apis/api/dialogflow.googleapis.com/quotas`](https://console.cloud.google.com/apis/api/dialogflow.googleapis.com/quotas%253F_ga%253D2.114957573.345776091.1589188956-1503905642.1588942477)）。


    ## 用户角色与监控


    由于您使用的是 Google Cloud，企业可以通过 **Cloud Logging** 创建和查看自定义审计报告、日志记录和调试。


    企业管理员可以通过 Cloud IAM 从 Google Cloud 控制台邀请和注册聊天机器人用户。可以设置用户和组权限，或设置安全和控制策略。他们还可以使用目录同步（例如
    **Active Directory 同步**）来导入和注册公司用户。这可以通过 Cloud Directory Sync 和 Directory API
    使用 Webhook 完成。


    假设您与其他 Google Cloud 资源（如 Cloud Functions 或其他机器学习 API）进行了集成，并且您不想授予应用程序完整的项目访问权限。在这种情况下，您必须在
    Google Cloud IAM 控制台中分配 Dialogflow API 角色（**管理员**、**客户端**或**读取者**）。当您在 Google
    Cloud 控制台中选择 **IAM 与管理**，并查找 Dialogflow 使用的服务账户时，可以找到此配置。（有关名称，请参阅 Dialogflow
    中的设置面板。）


    > **注意：** 开发者应避免同时处理同一个智能体。多个用户使用单个 Dialogflow 智能体在同时保存和训练智能体时可能会导致冲突。


    Dialogflow 控制台向创建智能体的用户提供**所有者/管理员**角色。如果您想更改所有者/管理员、为一个智能体添加多个所有者/管理员，或移除一个智能体的所有者/管理员，您同样需要
    Google Cloud 控制台中的 IAM 与管理功能。


    ### 使用 VPC 服务控制


    VPC 服务控制可以帮助您降低 Dialogflow 数据泄露的风险。您可以创建一个服务边界，这是一种组织级方法，用于保护您在项目中指定的资源和数据。您可以保护智能体数据以及意图检测请求和响应。创建服务边界时，请将
    Dialogflow（`dialogflow.googleapis.com`）作为受保护服务包含在内。

    '
- fmt: "### Using Developer Features\n\nWhen developers want to use Dialogflow by\
    \ using the SDKs, you will need to enable the Dialogflow API from the cloud console.\
    \ It’s possible to enable this via the Google Cloud console by clicking this link:\
    \ [`https://console.cloud.google.com/flows/enableapi?apiid=dialogflow.googleapis.com`](https://console.cloud.google.com/flows/enableapi%253Fapiid%253Ddialogflow.googleapis.com)—or\
    \ by using the Google Cloud command-line tools (`gcloud`), they can answer the\
    \ following command:\n\n```\ngcloud services enable dialogflow.googleapis.com\n\
    ```\n\nThere are multiple authentication options, but it is recommended that you\
    \ use service accounts for authentication and access control. A service account\
    \ provides credentials for applications, as opposed to end users. Projects own\
    \ service accounts, and you can create many service accounts for a project. For\
    \ more information, see Service accounts.\n\n## Configuring Your Dialogflow Project\n\
    \nClick the cogwheel icon right under the Dialogflow logo to enter the settings\
    \ page.\n\nOn this page, you can add additional languages, tweak the ML settings,\
    \ share the project with others, or create multiple environments.\n\nLet’s have\
    \ a look through all these settings.\n\n### General\n\nAs you can see in Figure\
    \ [2-13](#506047_1_En_2_Chapter.xhtml#Fig13), in the general tab, the following\
    \ settings are available:\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig13_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13\n\nDialogflow settings panel\n\n*   **Description**: Description\
    \ of the agent.\n\n*   **Default Time Zone**: Default time zone for the agent.\n\
    \n*   **Google Project**\n    *   **Project ID**: Google Cloud project linked\
    \ to the agent\n\n    *   **Service Account**: Service account used by Dialogflow\
    \ for system integration\n\n    *   **Trial or Pay as you Go**\n\n*   **Beta Features**:\
    \ Toggle to enable beta features for the agent.\n\n*   **Log Settings**\n    *\
    \   **Log interactions to Dialogflow**: You will be able to use the History and\
    \ Training features in Dialogflow.\n\n    *   **Log interactions to Google Cloud**:\
    \ This option is only available if **Log interactions to Dialogflow** is enabled.\
    \ Disabling Dialogflow’s logging will also disable this setting. It will make\
    \ use of logging features in Google Cloud (previously known as Stackdriver).\n\
    \n*   **Delete Agent**: Completely deletes the agent and cannot be undone. If\
    \ the agent is shared with other users, those users must be removed from the agent\
    \ before you can delete it.\n\n### Languages\n\nThe languages tab is where you\
    \ can add additional languages to your agent. As seen in Figure [2-14](#506047_1_En_2_Chapter.xhtml#Fig14),\
    \ Dialogflow Essentials supports 21 agent languages; you can pick multiple from\
    \ the pop-up.\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig14_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14\n\nSelect Dialogflow languages\n\n### ML Settings\n\nThe Dialogflow\
    \ Essentials main concept is **Intent Classification**. (Chapter [3](#506047_1_En_3_Chapter.xhtml)\
    \ will go into details on how this works.) Training phrases will be labeled with\
    \ an intent name by a conversational designer. Once a chatbot is in production,\
    \ the underlying Dialogflow machine learning model can match a user utterance\
    \ with the defined intent based on the training phrases the model was trained\
    \ on. Sometimes, various intents contain similar training phrases. One intent\
    \ might be more relevant than the other intent. Especially when your agent grows,\
    \ and more intents will be added to your agent, it can happen that the wrong intents\
    \ got matched. The generic solution to this problem would be to change the **ML\
    \ Classification Threshold**. The threshold value is like a confidence score.\
    \ If the returned value is less than the threshold value, then a fallback intent\
    \ will be triggered, or if there are no fallback intents defined, no intent will\
    \ be triggered.\n\nYou can find the ML Classification Threshold in the settings\
    \ section under the **ML Settings** tab; see Figure [2-15](#506047_1_En_2_Chapter.xhtml#Fig15).\n\
    \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig15_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig15_HTML.jpg)\n\
    \nFigure 2-15\n\nML Classification Threshold, a confidence score\n\nYou can find\
    \ the confidence level in your RAW API response; notice the following line in\
    \ Figure [2-16](#506047_1_En_2_Chapter.xhtml#Fig16):\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig16_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig16_HTML.jpg)\n\
    \nFigure 2-16\n\nWhen you click the Diagnostic Info button in the simulator, you\
    \ can see the RAW API response, with the `intentDetectionConfidence`\n\n```\n\"\
    intentDetectionConfidence\": 0.7057321,\n```\n\nSometimes, you don’t want to fix\
    \ the ML confidence level on the agent level but the intent level. Maybe because\
    \ certain intents are exceptional, it’s possible to change the priority per intent.\
    \ You can give the intent a higher or lower priority. It’s even possible to ignore\
    \ specific intents, maybe because you are still working on it.\n\nThe way how\
    \ you can do this is by selecting the intent from the intent screen.\n\nAt the\
    \ top of your intent screen, you can click the blue dot. This will show a little\
    \ pop-up; look into Figure [2-17](#506047_1_En_2_Chapter.xhtml#Fig17) to find\
    \ this feature.\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig17_HTML.png](images/506047_1_En_2_Chapter/506047_1_En_2_Fig17_HTML.png)\n\
    \nFigure 2-17\n\nEach intent can have individual priorities to improve the intent\
    \ detection\n\n#### Automatic Spell Correction\n\nIf this is enabled and user\
    \ input has a spelling or grammar mistake, an intent will be matched as though\
    \ it was written correctly (based on its training phrases and used entities).\
    \ The detect intent response will contain the corrected user input. This also\
    \ applies to matches involving both system and custom entities. For example, “I\
    \ want to buy purchase an Swtch.” It will figure out the right intent and write\
    \ down the correct parameter, which will be “Switch.”\n\nSpell correction is available\
    \ for all languages supported by Dialogflow.\n\nNote\n\nIf the misspelled and\
    \ corrected user input matches different intents, the intent matching the misspelled\
    \ user input is selected.\n\nSpell correction can’t correct ASR (automatic speech\
    \ recognition) errors, so we don’t recommend enabling it for agents using ASR\
    \ inputs. Auto Speech Adaptation might help; see Chapter [7](#506047_1_En_7_Chapter.xhtml).\
    \ But neither of these features works with Actions on Google since Actions on\
    \ Google uses its own Speech-to-Text/Text-to-Speech layer.\n\nCorrected input\
    \ can match the wrong intent. You can fix this by adding commonly mismatched phrases\
    \ to negative examples.\n\nSpell correction increases the agent’s response time\
    \ slightly.\n\n#### Automatic Training\n\nBy default, the underlying machine learning\
    \ model will be updated automatically when intents or entities have been added\
    \ or edited. You can disable or enable automatic agent training. A use case for\
    \ this is, for example, when you want to test how well your machine learning model\
    \ performs. In Chapter [13](#506047_1_En_13_Chapter.xhtml), machine learning model\
    \ health will be discussed.\n\n#### Agent Validation\n\nBy default, Dialogflow\
    \ will run an agent review of your agent each time you make changes to your agent.\
    \ As seen in Figure [2-18](#506047_1_En_2_Chapter.xhtml#Fig18), you can disable\
    \ or enable agent validation in the settings section; see Chapter [5](#506047_1_En_5_Chapter.xhtml)\
    \ for more information.\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig18_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig18_HTML.jpg)\n\
    \nFigure 2-18\n\nEnable agent validation"
