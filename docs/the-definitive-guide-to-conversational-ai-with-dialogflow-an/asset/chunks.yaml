    \ to topic: ${topicChatbotMessages}`);\n} catch(error) {\nconsole.log(error)\n\
    }\n}\n}\nmodule.exports = analytics = new Analytics();\nListing 13-4\nanalytics.js\n\
    ```\n\nTo test if we collected all the data the correct way, we can test this\
