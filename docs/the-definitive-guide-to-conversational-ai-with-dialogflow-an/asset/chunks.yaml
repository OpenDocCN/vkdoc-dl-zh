  trans: "\n### 使用开发者功能\n\n当开发者希望通过 SDK 使用 Dialogflow 时，需要先从云控制台启用 Dialogflow API。可以通过点击此链接\
    \ [`https://console.cloud.google.com/flows/enableapi?apiid=dialogflow.googleapis.com`](https://console.cloud.google.com/flows/enableapi%253Fapiid%253Ddialogflow.googleapis.com)\
    \ 在 Google Cloud 控制台中启用，或者使用 Google Cloud 命令行工具 (`gcloud`) 执行以下命令：\n\n```\ngcloud\
    \ services enable dialogflow.googleapis.com\n```\n\n有多种身份验证选项，但建议使用服务账号进行身份验证和访问控制。服务账号为应用程序（而非最终用户）提供凭据。项目拥有服务账号，您可以为单个项目创建多个服务账号。有关更多信息，请参阅服务账号。\n\
    \n## 配置您的 Dialogflow 项目\n\n点击 Dialogflow 徽标正下方的齿轮图标，进入设置页面。\n\n在此页面上，您可以添加其他语言、调整机器学习设置、与其他人共享项目或创建多个环境。\n\
    \n让我们逐一查看所有这些设置。\n\n### 常规\n\n如图 2-13 所示，在“常规”选项卡中，提供以下设置：\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig13_HTML.jpg](img/506047_1_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13\n\nDialogflow 设置面板\n\n*   **描述**：智能体的描述。\n\n*   **默认时区**：智能体的默认时区。\n\n\
    *   **Google 项目**\n    *   **项目 ID**：与智能体关联的 Google Cloud 项目\n\n    *   **服务账号**：Dialogflow\
    \ 用于系统集成的服务账号\n\n    *   **试用版或按量付费**\n\n*   **Beta 功能**：切换以启用智能体的 Beta 功能。\n\n\
    *   **日志设置**\n    *   **将交互记录到 Dialogflow**：您将能够使用 Dialogflow 中的“历史记录”和“训练”功能。\n\
    \n    *   **将交互记录到 Google Cloud**：仅当启用了**将交互记录到 Dialogflow** 时，此选项才可用。禁用 Dialogflow\
    \ 的日志记录也会禁用此设置。它将使用 Google Cloud（以前称为 Stackdriver）中的日志记录功能。\n\n*   **删除智能体**：完全删除智能体，且无法撤销。如果智能体已与其他用户共享，则必须先移除这些用户，然后才能删除智能体。\n\
    \n### 语言\n\n“语言”选项卡是您可以为智能体添加其他语言的地方。如图 2-14 所示，Dialogflow Essentials 支持 21 种智能体语言；您可以从弹出窗口中选择多种语言。\n\
    \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig14_HTML.jpg](img/506047_1_En_2_Fig14_HTML.jpg)\n\
    \n图 2-14\n\n选择 Dialogflow 语言\n\n### 机器学习设置\n\nDialogflow Essentials 的核心概念是**意图分类**。（第\
    \ 3 章将详细介绍其工作原理。）对话设计师会将训练短语标记上意图名称。一旦聊天机器人投入生产，底层的 Dialogflow 机器学习模型就可以根据其训练过的训练短语，将用户话语与定义的意图进行匹配。有时，不同的意图包含相似的训练短语。一个意图可能比另一个意图更相关。特别是当您的智能体不断增长，并且会向智能体添加更多意图时，可能会发生匹配到错误意图的情况。解决此问题的通用方法是更改**机器学习分类阈值**。阈值就像一个置信度分数。如果返回值小于阈值，则会触发回退意图，或者如果没有定义回退意图，则不会触发任何意图。\n\
    \n您可以在**机器学习设置**选项卡下的设置部分找到机器学习分类阈值；见图 2-15。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig15_HTML.jpg](img/506047_1_En_2_Fig15_HTML.jpg)\n\
    \n图 2-15\n\n机器学习分类阈值，一个置信度分数\n\n您可以在原始 API 响应中找到置信度级别；请注意图 2-16 中的以下行：\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig16_HTML.jpg](img/506047_1_En_2_Fig16_HTML.jpg)\n\
    \n图 2-16\n\n当您在模拟器中点击“诊断信息”按钮时，可以看到原始 API 响应，其中包含 `intentDetectionConfidence`\n\
    \n```\n\"intentDetectionConfidence\": 0.7057321,\n```\n\n有时，您可能不想在智能体级别而是在意图级别调整机器学习置信度。可能是因为某些意图比较特殊，所以可以更改每个意图的优先级。您可以给意图设置更高或更低的优先级。甚至可以忽略特定的意图，可能是因为您仍在处理它。\n\
    \n操作方法是从意图屏幕中选择该意图。\n\n在意图屏幕的顶部，您可以点击蓝色圆点。这将显示一个小弹出窗口；请查看图 2-17 以找到此功能。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig17_HTML.png](img/506047_1_En_2_Fig17_HTML.png)\n\
    \n图 2-17\n\n每个意图都可以有单独的优先级，以改进意图检测\n\n#### 自动拼写纠正\n\n如果启用此功能，并且用户输入存在拼写或语法错误，则意图将按照书写正确的方式（基于其训练短语和使用的实体）进行匹配。检测意图的响应将包含更正后的用户输入。这也适用于涉及系统和自定义实体的匹配。例如，“我想买一个\
    \ Swtch。”它将找出正确的意图并写下正确的参数，即“Switch”。\n\n拼写纠正适用于 Dialogflow 支持的所有语言。\n\n注意\n\n\
    如果拼写错误和更正后的用户输入匹配不同的意图，则选择匹配拼写错误用户输入的意图。\n\n拼写纠正无法纠正 ASR（自动语音识别）错误，因此我们不建议为使用\
    \ ASR 输入的智能体启用此功能。自动语音适应可能会有所帮助；请参阅第 7 章。但这两个功能都不能与 Google 上的操作一起使用，因为 Google\
    \ 上的操作使用自己的语音转文本/文本转语音层。\n\n更正后的输入可能匹配错误的意图。您可以通过将常见的不匹配短语添加到负面示例中来修复此问题。\n\n\
    拼写纠正会略微增加智能体的响应时间。\n\n#### 自动训练\n\n默认情况下，当添加或编辑意图或实体时，底层的机器学习模型会自动更新。您可以禁用或启用智能体的自动训练。例如，当您想测试机器学习模型的性能时，可以使用此功能。在第\
    \ 13 章中，将讨论机器学习模型的健康状况。\n\n#### 智能体验证\n\n默认情况下，每次您对智能体进行更改时，Dialogflow 都会对您的智能体运行一次智能体审查。如图\
    \ 2-18 所示，您可以在设置部分禁用或启用智能体验证；更多信息请参阅第 5 章。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig18_HTML.jpg](img/506047_1_En_2_Fig18_HTML.jpg)\n\
    \n图 2-18\n\n启用智能体验证\n"
- fmt: '### Export and Import


    注意图 2-19；在此选项卡中，您可以导入和导出代理。**导出**意味着您将创建代理的备份。它将返回一个 zip 文件，其中包含所有意图和实体的 JSON
    文件。


    通过**从 Zip 恢复**，您可以用新版本替换当前代理版本。旧版本中的所有意图和实体都将被删除。还有**从 Zip 导入**，它会上传新的意图和实体，而不会删除当前的。同名的意图和实体将被较新版本替换。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig19_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig19_HTML.jpg)


    图 2-19 导出和导入


    ### Environments


    如图 [2-20](#506047_1_En_2_Chapter.xhtml#Fig20) 所示，要访问环境设置，请单击 **Environments**
    选项卡。您可以创建代理的多个版本并将其发布到不同的环境。当您编辑代理时，您正在编辑草稿代理。在任何时候，您都可以将草稿代理保存为代理版本，这是代理的不可变快照。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig20_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig20_HTML.jpg)


    图 2-20 将版本发布到环境


    当您保存草稿代理时，它会被发布到默认环境。当您创建代理版本时，您可以将其发布到自定义环境。您可以创建各种自定义环境，例如测试、开发、生产等。并且通过选项菜单，也可以回滚到以前的版本。


    ### Speech


    要访问语音设置，请单击 **Speech** 选项卡。


    这些包含语音识别设置（**语音转文本**）和语音合成（**文本转语音**）设置。


    #### Improve Speech Recognition Quality


    在此部分中，您可以找到语音识别模型的设置。它在底层使用了 Google Cloud Speech-to-Text 模型。有两个可用的切换开关。


    ##### Enable Enhanced Speech Models and Data Logging


    通过启用语音模型和数据记录，您同意数据记录协议的条款和条件（该协议修订了管理客户使用 Google Cloud 服务的协议）。启用数据记录将改善您的语音转文本功能。


    ##### Enable Auto Speech Adaptation


    为了偏置您的语音转文本模型，确保它理解您如何训练您的代理，您可以启用自动语音自适应。有关更多信息，请参见第 [7](#506047_1_En_7_Chapter.xhtml)
    章“提高语音转文本质量”部分。


    #### Text to Speech


    在此部分中，您可以找到**文本转语音**合成器的设置，以调整语音和音频输出。


    ##### Enable Automatic Text to Speech


    自动将所有对话中的默认文本响应转换为语音。您将同时获得文本版本和音频字符串。您可以在模拟器中测试此功能（见图 [2-21](#506047_1_En_2_Chapter.xhtml#Fig21)）；启用此设置后，您将看到一个带有音频播放器的小部件。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig21_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig21_HTML.jpg)


    图 2-21 模拟器中的文本转语音


    ##### Voice Configuration


    注意图 [2-22](#506047_1_En_2_Chapter.xhtml#Fig22)；使用以下设置在 V2 API 和电话集成中配置代理的合成语音：


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig22_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig22_HTML.jpg)


    图 2-22 语音配置


    *   **Agent Language**：选择语音合成的默认语言。

    *   **Voice**：选择语音合成模型。

    *   **Speaking Rate**：调整语音语速。

    *   **Pitch**：调整语音音调。

    *   **Volume Gain**：调整音频音量增益。

    *   **Audio Effects Profile**：选择要应用于合成语音的音频效果配置文件。语音音频针对与所选配置文件关联的设备（例如，耳机、大型扬声器、电话通话）进行了优化。


    有关调整文本转语音的更多信息，请参见第 [7](#506047_1_En_7_Chapter.xhtml) 章的 SSML 部分。


    注意


    所有这些设置都不包括 Actions on Google。因为 Google Assistant 使用其自身的语音转文本和文本转语音模型。


    ### Share


    注意图 [2-23](#506047_1_En_2_Chapter.xhtml#Fig23)；**Share** 选项卡允许您与其他人共享您的 Dialogflow
    代理。您可以添加一个电子邮件地址，并指定此用户的角色，可以是 **Reviewer** 或 **Developer**。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig23_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig23_HTML.jpg)


    图 2-23 共享设置。别忘了点击保存！


    Dialogflow 中的开发者角色映射到 Google Cloud Console 中的 IAM 角色：**Project** ➤ **Editor**。它授予需要对所有
    Google Cloud 和 Dialogflow 资源具有编辑权限的项目编辑者：


    *   使用 Cloud Console 或 API 对所有云项目资源的编辑权限

    *   对 Dialogflow Console 的编辑权限以编辑代理

    *   可以使用 API 检测意图

    *   查看 IAM 原始角色定义


    Dialogflow 中的**审查者**角色映射到 Google Cloud Console 中的 IAM 角色：**Project** ➤ **Viewer**。它授予需要对所有
    Google Cloud 和 Dialogflow 资源具有读取权限的项目查看者：


    *   使用 Cloud Console 或 API 对所有云项目资源的读取权限

    *   对 Dialogflow Console 的读取权限

    *   不能使用 API 检测意图


    按下 **Add** 按钮，不要忘记点击 **Save** 按钮。


    ### Advanced


    在撰写本文时，在 **Advanced** 选项卡（图 [2-24](#506047_1_En_2_Chapter.xhtml#Fig24)）中，只有一个设置可以控制：**Sentiment
    Analysis**。您可以为支持的语言启用情感分析。启用情感分析将在意图检测时返回一个分数和一个量级。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig24_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig24_HTML.jpg)


    图 2-24 启用情感分析


    情感检测的**分数**表示用户话语的整体情感。情感检测的**量级**表示用户话语中存在的情感内容量，该值通常与用户话语的长度成正比。


    您可以在模拟器中测试它（图 [2-25](#506047_1_En_2_Chapter.xhtml#Fig25)）。尝试输入“Thank you for helping
    me.”。它会返回一个介于 0 和 +1 之间的正面查询分数。接下来，在模拟器中输入“That didn’t work at all.”。您现在将看到一个介于
    –1 和 0 之间的负面分数。


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig25_HTML.png](images/506047_1_En_2_Chapter/506047_1_En_2_Fig25_HTML.png)


    图 2-25 当用户说一些积极的话时，API 响应将产生积极的情感


    有关情感的更多信息，请查看第 [13](#506047_1_En_13_Chapter.xhtml) 章中的情感分析部分。


    注意


    每个 Google Cloud 项目只能有一个 Dialogflow 代理。如果您的 Dialogflow 代理需要测试和开发版本，您可以使用 Dialogflow
    中的 **versions** 功能。或者，您可以创建更多的 Google Cloud 项目，一个用于测试代理，一个用于开发代理。'
  raw: '### Export and Import


    Note Figure 2-19; in this tab, you can import and export agents. **Export** means
    you will create a backup of the agent. It will return a zip file, which contains
    JSON files of all the intents and entities.


    With **Restore from Zip**, you can replace the current agent version with a new
    one. All the intents and entities in the older version will be deleted. There
    is also **Import from Zip**, which uploads new intents and entities without deleting
    the current ones. Intents and entities with the same name will be replaced with
    the more recent version.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig19_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig19_HTML.jpg)


    Figure 2-19


    Export and Import


    ### Environments


    As seen in Figure [2-20](#506047_1_En_2_Chapter.xhtml#Fig20), to access the environment
    settings, click the **Environments** tab. You can create multiple versions of
    your agent and publish them to separate environments. When you edit an agent,
    you are editing the draft agent. At any point, you can save the draft agent as
    an agent version, which is an immutable snapshot of your agent.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig20_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig20_HTML.jpg)


    Figure 2-20


    Publish a version to an environment


    When you save the draft agent, it is published to the default environment. When
    you create agent versions, you can publish them to custom environments. You can
    create a variety of custom environments such as testing, development, production,
    and so on. And via the options menu, it’s also possible to revert to previous
    versions.


    ### Speech


    To access the speech settings, click the **Speech** tab.


    These contain the speech recognition settings (**Speech to Text**) and speech
    synthesis (**Text to Speech**) settings.


    #### Improve Speech Recognition Quality


    In this section, you can find settings for the speech recognition model. It’s
    making use of the Google Cloud Speech-to-Text model under the hood. There are
    two toggle switches available.


    ##### Enable Enhanced Speech Models and Data Logging


    By enabling speech models and data logging , you agree to the terms and conditions
    of the data logging agreement (which amends the agreement governing the customer’s
    use of Google Cloud services). Enabling data logging will improve your Speech-to-Text.


    ##### Enable Auto Speech Adaptation


    To bias your Speech to Text model, to make sure it understands how you trained
    your agent, you can enable Auto Speech Adaptation. See Chapter [7](#506047_1_En_7_Chapter.xhtml),
    “Improving Speech to Text Quality” section, for more information.


    #### Text to Speech


    In this section, you can find the settings for the **Text to Speech** synthesizer
    to tweak the voices and audio output.


    ##### Enable Automatic Text to Speech


    Automatically convert default text responses to speech in all conversations. You
    will get both the text version and the audio string. You can test this in the
    simulator (see Figure [2-21](#506047_1_En_2_Chapter.xhtml#Fig21)); after enabling
    this setting, you will see a little widget with an audio player.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig21_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig21_HTML.jpg)


    Figure 2-21


    Text to Speech in the simulator


    ##### Voice Configuration


    Note Figure [2-22](#506047_1_En_2_Chapter.xhtml#Fig22); configure your agent’s
    synthesized voice in the V2 API and Telephony integration with the following settings:


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig22_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig22_HTML.jpg)


    Figure 2-22


    Voice configuration


    *   **Agent Language**: Choose the default language for voice synthesis.


    *   **Voice**: Choose a voice synthesis model.


    *   **Speaking Rate**: Adjust the voice speaking rate.


    *   **Pitch**: Adjust the voice pitch.


    *   **Volume Gain**: Adjust the audio volume gain.


    *   **Audio Effects Profile**: Select audio effects profiles you want to be applied
    to the synthesized voice. Speech audio is optimized for the devices associated
    with the selected profiles (e.g., headphones, large speakers, phone calls).


    For more information on tweaking the Text to Speech, see Chapter [7](#506047_1_En_7_Chapter.xhtml),
    the SSML section.


    Note


    All of these settings won’t include Actions on Google. As the Google Assistant
    uses, it’s on Speech to Text and Text to Speech models.


    ### Share


    Note Figure [2-23](#506047_1_En_2_Chapter.xhtml#Fig23); the **Share** tab allows
    you to share your Dialogflow agent with others. You can add an email address,
    and you will specify the role of this user, either **Reviewer** or **Developer**.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig23_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig23_HTML.jpg)


    Figure 2-23


    Share settings. Don’t forget to hit Save!


    The developer role in Dialogflow maps to an IAM role in the Google Cloud Console:
    **Project** ➤ **Editor**. It grants to project editors that need edit access to
    all Google Cloud and Dialogflow resources:


    *   Edit access to all Cloud project resources using Cloud Console or APIs


    *   Edit access to Dialogflow Console to edit agents


    *   Can detect intent using an API


    *   See IAM primitive role definitions


    The **review** role in Dialogflow maps to an IAM role in the Google Cloud Console:
    **Project** ➤ **Viewer**. It grants to project viewers that need read access to
    all Google Cloud and Dialogflow resources:


    *   Read access to all Cloud project resources using Cloud Console or APIs


    *   Read access to Dialogflow Console


    *   Cannot detect intent using an API


    Press **Add** and don’t forget to hit the **Save** button.


    ### Advanced


    At the time of writing, in the **Advanced** tab (Figure [2-24](#506047_1_En_2_Chapter.xhtml#Fig24)),
    there is only one setting to control: **Sentiment Analysis**. You can enable sentiment
    analysis for supported languages. Enabling sentiment analysis will return a score
    and a magnitude with your intent detections.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig24_HTML.jpg](images/506047_1_En_2_Chapter/506047_1_En_2_Fig24_HTML.jpg)


    Figure 2-24


    Enable sentiment analysis


    The **score** of a sentiment detection indicates the overall emotion of the user
    utterance. The **magnitude** of a sentiment detection indicates how much emotional
    content is present within the user utterance, and this value is often proportional
    to the length of the user’s utterance.


    You can test it in the simulator (Figure [2-25](#506047_1_En_2_Chapter.xhtml#Fig25)).
    Try typing “Thank you for helping me.” It returns a positive query score between
    0 and +1\. Next, type “That didn’t work at all.” in the simulator. You will now
    see a negative score between –1 and 0 show up.


    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig25_HTML.png](images/506047_1_En_2_Chapter/506047_1_En_2_Fig25_HTML.png)


    Figure 2-25


    When a user says something positive, the API response will yield a positive sentiment


    For more information on sentiment, check out the sentiment analysis section in
    Chapter [13](#506047_1_En_13_Chapter.xhtml).


    Note


    Each Google Cloud project can have only one Dialogflow agent. In case your Dialogflow
    agent needs a test and development version, you can make use of the **versions**
    feature in Dialogflow. Or you could create more Google Cloud projects, one for
    the test agent and one for the development agent.'
