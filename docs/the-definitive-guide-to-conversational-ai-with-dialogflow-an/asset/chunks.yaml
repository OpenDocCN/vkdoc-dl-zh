    Note


    When you copy and paste the examples of the reference guide to the custom payload
    box in Dialogflow, you will need to be aware of the following:


    *   The first key can’t be called `cards`, but it has to be named hangouts.


    *   The `hangouts` key points to an object, not an array (of cards).


    *   Make sure the editor doesn’t contain any linting errors.


    *   And you can’t test the results in the Dialogflow simulator; you will have
