    **users** at this stage. If you retain them, then they are\nliterally using your\
    \ product often.\nUser retention information can be found in Google Analytics,\
    \ Google\nSearch Console, or the Actions on Google console.\n\nNote\n\nWhen you\
    \ want to experiment with voice and develop a Google Assistant\naction for your\
