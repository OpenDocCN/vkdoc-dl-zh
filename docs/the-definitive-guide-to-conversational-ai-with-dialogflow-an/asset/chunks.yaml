  trans: "\n# 使用内置训练功能改进 Dialogflow 机器学习模型\n\nDialogflow 提供了一种训练工具，可用于改进您的 Dialogflow\
    \ 机器学习模型。您可以对匹配的意图进行点赞、点踩或更改。Dialogflow 会根据之前见过的数据进行匹配，从而在下一次更好地处理对话。\n\n在 Dialogflow\
    \ 菜单中选择 **训练** 菜单项。\n\n打开该工具时（见图 5-3），它会按时间倒序显示对话历史记录（最新的发言排在最前面）。\n\n![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig3_HTML.jpg](img/506047_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3\n\nDialogflow 内置训练\n\n它将展示用户发言、请求次数（对话中的对话轮次）、未找到匹配的次数、对话发生的日期以及一个刷新按钮（当您对类似内容的训练过程进行覆写时，将使用此按钮）。\n\
    \n当您点击对话列表中的某一行时，它会在训练视图中打开该对话，如图 5-4 所示。训练视图显示一系列对话轮次，并提供将此数据添加到训练数据的控件。\n\n\
    ![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig4_HTML.jpg](img/506047_1_En_5_Fig4_HTML.jpg)\n\
    \n图 5-4\n\nDialogflow 内置训练，改进检测\n\n在这里，您可以执行以下操作：\n\n*   您可以更改意图（或者，如果未匹配到意图，则分配一个意图），以便下次它知道该选择哪个意图。\n\
    *   您可以对意图匹配进行点赞，教导 Dialogflow 模型检测到的意图是正确的。\n*   您可以对意图匹配进行点踩，教导 Dialogflow 模型检测到的意图是错误的。\n\
    *   您可以删除数据。可能是因为它是虚假数据，您不希望用它来训练模型。\n*   您可以选择用户发言并标注特定词语，例如，当用户发言为：*我想订购最新的星球大战：前线游戏。*\
    \ 您可以选择名称 *星球大战：前线*，并教导 Dialogflow 它实际上是实体 `@fps_games`。\n\n您可以在智能体开发期间、在智能体发布或进行更改之前使用训练工具。在生产环境之后使用该工具来检查真实对话是否按预期进行也非常有用。\n\
    \n使用屏幕右上角的上传按钮，您可以将对话作为纯文本文件上传。一个 `.txt` 文件应每行包含一个用户发言短语（以换行符分隔）。可以上传多个（最多 10\
    \ 个）`.txt` 文件，或者您可以上传一个包含 `.txt` 文件的 zip 压缩包，只要其大小不超过 3MB。\n\n请求不会发送到 `detect\
    \ intent` API。因此，不会激活任何上下文，也不会匹配任何意图。理想情况下，文件应仅包含可用作训练短语的数据。最终用户表达式的顺序并不重要。\n\n\
    您应该上传什么样的数据？考虑对话日志；也许您有人与人之间的聊天日志，或者来自电子邮件、论坛或常见问题解答的在线客户支持对话，基本上所有与聊天机器人相关的内容。也许您正在跟踪社交媒体（如\
    \ Twitter）以了解人们在问什么。或者，您可能有联络中心的音频录音，可以通过 Google Cloud 中的 `Speech-to-Text` API\
    \ 将其转换为文本。但是，请尽量避免长篇的、非对话式的用户发言。并尽量避免最终用户未说过的内容（例如，人工客服的回复）。\n\n> **注意**\n> 训练工具使用智能体历史数据来加载对话，因此必须在设置面板中启用日志记录。默认情况下此功能是启用的，但与欧洲的银行和保险公司等受监管公司合作时，可能需要禁用此功能。\n\
    \n训练工具仅显示最终用户表达式。要查看客服和最终用户双方的对话数据，请参阅更完整的智能体历史记录。\n\n## 总结\n\n本章解释了如何通过验证您的智能体来审查您的\
    \ Dialogflow ES 智能体配置（例如意图和实体）。借助这个开箱即用的功能，您可以监控智能体的质量。我们还探讨了如何通过 SDK 运行验证；如果您正在构建自己的\
    \ CI/CD 管道，这可能会很方便。\n\n本章的最后一部分解释了您的 Dialogflow 智能体如何持续从用户数据中学习，以及如何改进底层的机器学习模型。训练工具用于审查您的智能体与最终用户的对话，并改进您的训练数据。\n\
    \n## 延伸阅读\n\n*   Dialogflow 关于智能体验证的文档\n    [`https://cloud.google.com/dialogflow/es/docs/agents-validation`](https://cloud.google.com/dialogflow/es/docs/agents-validation)\n\
    *   Dialogflow 关于最佳设计实践的文档\n    [`https://cloud.google.com/dialogflow/es/docs/agents-design`](https://cloud.google.com/dialogflow/es/docs/agents-design)\n\
    *   SDK 中的验证结果对象\n    [`https://cloud.google.com/dialogflow/docs/reference/rpc/google.cloud.dialogflow.v2beta1#google.cloud.dialogflow.v2beta1.ValidationResult`](https://cloud.google.com/dialogflow/docs/reference/rpc/google.cloud.dialogflow.v2beta1%2523google.cloud.dialogflow.v2beta1.ValidationResult)\n\
    *   Dialogflow 训练工具\n    [`https://cloud.google.com/dialogflow/es/docs/training`](https://cloud.google.com/dialogflow/es/docs/training)\n\
    \n# 6. 将聊天机器人部署到网页和社交媒体渠道\n\nDialogflow ES 提供了许多开箱即用的集成。您可以启用这些集成，将您的智能体部署到（多个）渠道。本章将重点介绍以下（基于文本的）集成。\n\
    \n**Dialogflow Hangouts 集成** 允许您创建文本聊天机器人，并将其集成到 Google Chat（原 Google Hangouts）中，可用于一对一聊天以及聊天室中的机器人。此集成仅适用于\
    \ Google Workspace（原 G Suite）用户，并且 Google Workspace 管理员必须允许用户从 Google Workspace\
    \ 管理面板安装机器人（[`https://admin.google.com/`](https://admin.google.com/)）。\n\n**网页演示实现**\
    \ 是一个简单的网页实现，允许您通过键盘甚至浏览器麦克风进行聊天。这是在您的网站上实现聊天机器人的一种快速简便的方法，或者您可以将其包含在静态 HTML 网站或网站生成器（如\
    \ Google Sites）中。但是，此解决方案不允许您更改聊天机器人的外观和风格。它也不会响应自定义富媒体消息，例如 Google 地图、超链接或富卡片。如果您需要这些功能，最好实现\
    \ Dialogflow Messenger 小部件（请参阅本章最后一节）。如果您是开发人员或团队中有开发人员，请在您的网站上实现高级网页聊天（请参阅第 11\
    \ 章）。\n\n**Dialogflow Messenger** 集成为您的智能体提供了一个可自定义的聊天对话框，可以通过 Web 组件嵌入到您的网站中。聊天对话框实现为一个可由最终用户打开和关闭的对话框窗口。打开时，聊天对话框会显示在屏幕右下角您的内容之上。\n"
- fmt: '# Integrating Your Agent with Google Chat


    Google Chat is Google’s communication software, part of Google Workspace, built
    for teams. It’s similar to Slack along with group messaging functions that allows
    Google Drive content sharing.


    In the Dialogflow console, click the menu on **Integrations**.


    Click the integration: **Hangouts Chat**.


    Select **everyone in your domain** to ensure everyone within your Google Workspace
    domain can access the chatbot. (Optionally, select the agent environment.) Click
    **Start**.


    Next, click the **Configure Bot Details** button; it will navigate to the Google
    Cloud Console (`https://console.cloud.google.com`) as seen in Figure 6-1. (Make
    sure you are logged in with the same Gmail/Google account as with Dialogflow.)


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig1_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** Google Chat/Hangouts API settings


    If correct, everything is filled in already, but you could change the fields.
    Table 6-1 shows an overview of all the settings.


    **Table 6-1** Google Chat settings


    | Setting | Description |

    | --- | --- |

    | Bot name | The name that your users will see when interacting with the chatbot.
    |

    | Avatar URL | An HTTPS URL pointing to a square image (PNG or JPEG), at least
    128x128, which will appear as the avatar for your chatbot. |

    | Description | A description of the chatbot''s functionality. |

    | Functionality | The way how you want to interact with the chatbot: – Add to
    the room – Message: Direct messaging the chatbot |

    | Connection Settings | The endpoint for the chatbot. Since we are using Dialogflow,
    select **Dialogflow**. |

    | Permissions | Permissions who can install your chatbot; everyone in your domain
    or specific people/groups within your domain. |


    Click **Save**. You can close the Google Cloud Console.


    ## Enabling Your Agent in the Google Chat


    From the chat interface (`https://chat.google.com`), you can click the **+** button
    next to the Bots header to add bots to your conversation. See Figure 6-2.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig2_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2** Adding bots in Google Chat


    You will see a catalog as seen in Figure 6-3, and from there, you can search for
    the Dialogflow chatbot you have created. The **Add** button will show a small
    pop-up to choose an interaction style. You can add the chatbot to the room with
    **Add to room** or you can choose **Message**.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig3_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3** Google Chatbot catalog


    A *bot as a message* means that you are talking directly to the bot; there is
    no chat room required. Add the bot as a message, and notice in Figure 6-4, when
    double-clicking the bot name which is presented in the left menu, you will start
    a conversation.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig4_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig4_HTML.jpg)


    **Figure 6-4** With the message interaction, you don’t need a chat room; you can
    directly talk to the bot


    When you add the *bot to the room*, you can talk to every user in the chat room,
    but when you dedicate the message to the bot, you will use the `@` notation, such
    as `@dialogflowcookbook`. See Figure 6-5.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig5_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig5_HTML.jpg)


    **Figure 6-5** Talking to a bot in a Google Chat room by using the `@` notation


    ## Rich Messages Support


    To send Google Chat messages other than text responses, you can use a *custom
    payload* from the **Hangouts Responses tab** in the Dialogflow console for a particular
    intent. You will first need to add Hangouts as an integration response, which
    you can do by hitting the `+` tab in the responses section of an intent, and then
    you can click the **Add Responses** button, which you can see in Figure 6-6.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig6_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig6_HTML.jpg)


    **Figure 6-6** Select Add Responses ➤ Custom Payload to enable rich messages in
    the Hangouts integration tab of an intent


    Hangouts Custom Payload allows you to create more advanced message types, such
    as cards. One card can have one or many sections. Each section could have a header.
    You can look into the **Hangouts message formats cards reference guide** from
    the Google Chat documentation to see some of the combinations you can create with
    this. However, using custom payloads means that you will have to provide the JSON
    format. You can find an example in Listing 6-1.


    ```

    {

    "hangouts": {

    "header": {

    "title": "Ordering a console",

    "subtitle": "Some Video Games Store",

    "imageUrl": "https://lh3.googleusercontent.com/v8c6Jn1Aa7s6YO-5Qy6hM4yQ5K4onxgjYD0fzxpOKA7m1Z_0rqOJcXuncd17_W7CeqOcL6d6RfTAAUr1OuHl8uk=rw"

    },

    "sections": [{

    "widgets": [{

    "keyValue": {

    "icon": "TRAIN",

    "topLabel": "Order No.",

    "content": "12345"

    }

    },

    {

    "keyValue": {

    "topLabel": "Status",

    "content": "In Delivery"

    }

    }]

    },

    {

    "header": "Location",

    "widgets": [{

    "image": {

    "imageUrl": "https://dummyimage.com/600x400/000/fff"

    }

    }]

    },

    {

    "header": "Buttons - i could leave the header out",

    "widgets": [{

    "buttons": [{

    "textButton": {

    "text": "OPEN ORDER",

    "onClick": {

    "openLink": {

    "url": "https://example.com/orders/..."

    }

    }

    }

    }]

    }]

    }]

    }

    }

    ```


    **Listing 6-1** Google Chat custom payload


    **Note:** When you copy and paste the examples of the reference guide to the custom
    payload box in Dialogflow, you will need to be aware of the following:


    * The first key can’t be called `cards`, but it has to be named `hangouts`.

    * The `hangouts` key points to an object, not an array (of cards).

    * Make sure the editor doesn’t contain any linting errors.

    * And you can’t test the results in the Dialogflow simulator; you will have to
    test it directly in Hangouts Chat.


    ## More Text-Based/Open Source Integration Options


    Dialogflow also supports integrations with **Slack**, **Telegram**, **Line**,
    **Facebook Messenger**, **Facebook Workplace**, **Kik**, **Skype**, **Twitter**,
    **Viber**, **Spark**, and **Twilio**. For what’s worth, the integration with Slack
    is somewhat similar to Google Chat as the applications are quite similar.


    In Figure 6-7, you will see an overview of all the text-based/open source integrations.
    Google has been adding new integrations all the time.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig7_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig7_HTML.jpg)


    **Figure 6-7** Overview of text-based integrations'
  raw: '## Integrating Your Agent with Google Chat


    Google Chat is Google’s communication software, part of Google Workspace, built
    for teams. It’s similar to Slack along with group messaging functions that allows
    Google Drive content sharing.


    In the Dialogflow console, click the menu on **Integrations**.


    Click the integration: **Hangouts Chat**.


    Select **everyone in your domain** to ensure everyone within your Google Workspace
    domain can access the chatbot. (Optionally, select the agent environment.) Click
    **Start**.


    Next, click the **Configure Bot Details** button; it will navigate to the Google
    Cloud Console ([`https://console.cloud.google.com`](https://console.cloud.google.com))
    as seen in Figure [6-1](#506047_1_En_6_Chapter.xhtml#Fig1). (Make sure you are
    logged in with the same Gmail/Google account as with Dialogflow.)


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig1_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Google Chat/Hangouts API settings


    If correct, everything is filled in already, but you could change the fields.
    Table [6-1](#506047_1_En_6_Chapter.xhtml#Tab1) shows an overview of all the settings.


    Table 6-1


    Google Chat settings


    | Setting | Description |

    | --- | --- |

    | Bot name | The name that your users will see when interacting with the chatbot.
    |

    | Avatar URL | An HTTPS URL pointing to a square image (PNG or JPEG), at least
    128x128, which will appear as the avatar for your chatbot. |

    | Description | A description of the chatbot''s functionality. |

    | Functionality | The way how you want to interact with the chatbot:− Add to the
    room− Message: Direct messaging the chatbot |

    | Connection Settings | The endpoint for the chatbot. Since we are using Dialogflow,
    select **Dialogflow**. |

    | Permissions | Permissions who can install your chatbot; everyone in your domain
    or specific people/groups within your domain. |


    Click **Save**. You can close the Google Cloud Console.


    ### Enabling Your Agent in the Google Chat


    From the chat interface ([`https://chat.google.com`](https://chat.google.com)),
    you can click the **+** button next to the Bots header to add bots to your conversation.
    See Figure [6-2](#506047_1_En_6_Chapter.xhtml#Fig2).


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig2_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Adding bots in Google Chat


    You will see a catalog as seen in Figure [6-3](#506047_1_En_6_Chapter.xhtml#Fig3),
    and from there, you can search for the Dialogflow chatbot you have created. The
    **Add** button will show a small pop-up to choose an interaction style. You can
    add the chatbot to the room with **Add to room** or you can choose **Message**.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig3_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Google Chatbot catalog


    A *bot as a message* means that you are talking directly to the bot; there is
    no chat room required. Add the bot as a message, and notice in Figure [6-4](#506047_1_En_6_Chapter.xhtml#Fig4),
    when double-clicking the bot name which is presented in the left menu, you will
    start a conversation.


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig4_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    With the message interaction, you don’t need a chat room; you can directly talk
    to the bot


    When you add the *bot to the room*, you can talk to every user in the chat room,
    but when you dedicate the message to the bot, you will use the @ notation, such
    as *@dialogflowcookbook*. See Figure [6-5](#506047_1_En_6_Chapter.xhtml#Fig5).


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig5_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Talking to a bot in a Google Chat room by using the @ notation


    ### Rich Messages Support


    To send Google Chat messages other than text responses, you can use a *custom
    payload* from the **Hangouts Responses tab** in the Dialogflow console for a particular
    intent. You will first need to add Hangouts as an integration response, which
    you can do by hitting the + tab in the responses section of an intent, and then
    you can click the **Add Responses** button, which you can see in Figure [6-6](#506047_1_En_6_Chapter.xhtml#Fig6).


    ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig6_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Select Add Responses ➤ Custom Payload to enable rich messages in the Hangouts
    integration tab of an intent


    Hangouts Custom Payload allows you to create more advanced message types, such
