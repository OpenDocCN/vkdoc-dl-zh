- fmt: "# Improve the Dialogflow Machine Learning Model with Built-in Training\n\n\
    Dialogflow has a training tool, which you can use to improve your Dialogflow machine\
    \ learning model. You can up- and downvote or change the matched intent. Dialogflow\
    \ matches based on the data it has seen before, so it knows how to handle the\
    \ conversation better next time.\n\nSelect the **Training** menu item in the Dialogflow\
    \ menu.\n\nWhen you open the tool (see Figure [5-3](#506047_1_En_5_Chapter.xhtml#Fig3)),\
    \ it shows the conversation history in reverse chronological order (latest utterance\
    \ first).\n\n![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig3_HTML.jpg](images/506047_1_En_5_Chapter/506047_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\n\nDialogflow built-in training\n\nIt will showcase the user utterance,\
    \ the number of requests (conversational turns in the conversation), the number\
    \ of times for which no match was found, the date when the conversation happened,\
    \ and a refresh button (you will use this when you overrule the training processes\
    \ for content like this).\n\nWhen you click a row in the conversation list, it\
    \ opens the conversation in a training view as seen in Figure [5-4](#506047_1_En_5_Chapter.xhtml#Fig4).\
    \ The training view shows a list of conversational turns and provides controls\
    \ to add this data to your training data.\n\n![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig4_HTML.jpg](images/506047_1_En_5_Chapter/506047_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\n\nDialogflow built-in training, improve the detection\n\nThis is\
    \ the place where you can do the following:\n\n*   You can change the intent (or\
    \ if no intent was matched, assign an intent), so next time it knows which intent\
    \ to choose instead.\n*   You can upvote the intent match, teaching the Dialogflow\
    \ model that the detected intent was the correct one.\n*   You can downvote the\
    \ intent match, teaching the Dialogflow model that the detected intent was the\
    \ wrong one.\n*   You can remove the data. Maybe because it was bogus data, and\
    \ you don’t want to train your model with it.\n*   You can select the user utterance\
    \ and annotate certain words, for example, when you have a user utterance: *I\
    \ want to order the latest Star Wars Battlefront game.* You could select the name\
    \ *Star Wars Battlefront* and teach Dialogflow that it’s actually the entity `@fps_games`.\n\
    \nYou can use the training tool during agent development before your agent is\
    \ released or made changes. It’s also great to use the tool after production to\
    \ examine if real conversations are behaving as expected.\n\nWith the upload button\
    \ in the top-right corner of the screen, you can upload conversations as plain\
    \ text files. One `.txt` file should have every user utterance phrase per line\
    \ (delimited by newlines). It’s possible to upload multiple (up to 10) `.txt`\
    \ files, or you can upload a zip archive with `.txt` files, as long as it doesn’t\
    \ exceed 3MB.\n\nRequests are not sent to the `detect intent` API. Therefore,\
    \ no contexts are activated, and no intents are matched. Ideally, files should\
    \ only include data that is useful as training phrases. The order of the end user\
    \ expressions is not important.\n\nWhat kind of data should you upload? Think\
    \ of conversation logs; maybe you have human-to-human chat logs or online customer\
    \ support conversations with questions from an email, forum, or FAQ, basically\
    \ everything relevant for the chatbot. Maybe you are tracking social media, such\
    \ as Twitter, to see what people are asking. Or maybe you have contact center\
    \ audio recordings, which you can convert to text via the `Speech-to-Text` API\
    \ in Google Cloud. However, try to avoid long-form, nonconversational user utterances.\
    \ And try to avoid things that haven’t been said by end users (e.g., responses\
    \ of human agents).\n\n> **Note**\n> The training tool uses agent history data\
    \ to load conversations, so logging must be enabled in the settings panel. This\
    \ is enabled by default, but working with regulated companies such as banks and\
    \ insurances in Europe might want to disable this feature.\n\nThe training tool\
    \ only shows end user expressions. To view both agent and end user conversation\
    \ data, see the more complete agent history.\n\n## Summary\n\nThis chapter explains\
    \ how you can review your Dialogflow ES agent configuration (such as intents and\
    \ entities) by validating your agent. With this out-of-the-box feature, you can\
    \ monitor your agent quality. We have also looked into how you can run validation\
    \ via the SDK; this might be handy, in case you are building your own CI/CD pipelines.\n\
    \nThe last section of this chapter explains how your Dialogflow agent can continually\
    \ learn from user data and how you can improve the underlying machine learning\
    \ model. The training tool is used to review conversations your agent has had\
    \ with end users and to improve your training data.\n\n## Further Reading\n\n\
    *   Dialogflow documentation on Agent Validation\n    [`https://cloud.google.com/dialogflow/es/docs/agents-validation`](https://cloud.google.com/dialogflow/es/docs/agents-validation)\n\
    *   Dialogflow documentation on best design practices\n    [`https://cloud.google.com/dialogflow/es/docs/agents-design`](https://cloud.google.com/dialogflow/es/docs/agents-design)\n\
    *   Validation result object in the SDK\n    [`https://cloud.google.com/dialogflow/docs/reference/rpc/google.cloud.dialogflow.v2beta1#google.cloud.dialogflow.v2beta1.ValidationResult`](https://cloud.google.com/dialogflow/docs/reference/rpc/google.cloud.dialogflow.v2beta1%2523google.cloud.dialogflow.v2beta1.ValidationResult)\n\
    *   Dialogflow training tool\n    [`https://cloud.google.com/dialogflow/es/docs/training`](https://cloud.google.com/dialogflow/es/docs/training)\n\
    \n# 6. Deploying Your Chatbot to Web and Social Media Channels\n\nThere are lots\
    \ of out-of-the-box integrations available in Dialogflow ES. You can enable these\
    \ to bring your agents to (multiple) channels. This chapter will highlight the\
    \ following (text-based) integrations.\n\nThe **Dialogflow Hangouts integration**\
    \ lets you create text chatbots you can include in Google Chat (formerly known\
    \ as Google Hangouts), for one-on-one chats as well as chatbots in chat rooms.\
    \ This integration is only available to Google Workspace (formerly known as G\
    \ Suite) users, and a Google Workspace admin must allow users to install bots\
    \ from the Google Workspace admin panel ([`https://admin.google.com/`](https://admin.google.com/)).\n\
    \nThe **web demo implementation** is a simple web implementation that allows you\
    \ to use the chat via your keyboard and even via a browser microphone. It’s a\
    \ quick and easy way to implement a chatbot on your website, or you could include\
    \ static HTML websites or site generators (such as Google Sites). However, this\
    \ solution doesn’t allow you to change the look and feel of the chatbot. It also\
    \ won’t respond with custom rich messages such as Google Maps, hyperlinks, or\
    \ rich cards. If that’s what you want, you are better off by implementing the\
    \ Dialogflow Messenger widget (see the last section of this chapter). If you are\
    \ a developer or have a developer in your team, implement an advanced web chat\
    \ on your site (see Chapter [11](#506047_1_En_11_Chapter.xhtml)).\n\nThe **Dialogflow\
    \ Messenger** integration provides a customizable chat dialog for your agent that\
    \ could be embedded in your website via a web component. The chat dialog is implemented\
    \ as a dialog window that can be opened and closed by your end user. When opened,\
    \ the chat dialog appears above your content on the lower-right side of the screen."
  raw: "## Improve the Dialogflow Machine Learning Model with Built-in Training\n\n\
