- fmt: "### Meena & LaMDA\n\n`Meena` is a 2.6 billion parameter end-to-end trained\
    \ neural conversational model. It’s created by Google to handle a wide variety\
    \ of conversational topics better to develop a chatbot that is not specialized\
    \ but can still chat about virtually anything a user wants. Besides being a fascinating\
    \ research problem, such a conversational agent could lead to many interesting\
    \ applications, such as further humanizing computer interactions, improving foreign\
    \ language practice, and making relatable, interactive movie and video game characters.\n\
    \nHowever, current open-domain chatbots have a critical flaw—they often don’t\
    \ make sense. They sometimes say things inconsistent with what has been said so\
    \ far or lack common sense and basic knowledge about the world. Moreover, chatbots\
    \ often give responses that are not specific to the current context. For example,\
    \ “I don’t know” is a sensible response to any question, but it’s not specific.\n\
    \n`Meena` can conduct conversations that are more sensible and specific than existing\
    \ state-of-the-art chatbots.\n\nThe `Meena` model is trained on 341GB of text,\
    \ filtered from public domain social media conversations. Compared to an existing\
    \ state-of-the-art generative model, `Meena` has 1.7x greater model capacity and\
    \ was trained on 8.5x more data.\n\nAt the time of writing, besides sensibleness,\
    \ Google focuses on other attributes such as personality and tackling fact-checking,\
    \ safety, and bias in models, which is very much needed before making `Meena`\
    \ available to the public.\n\n`Meena` sets the base for `LaMDA` (Language Model\
    \ for Dialogue Applications), which was introduced at Google I/O in May 2021.\
    \ `LaMDA` is open domain, which means it is designed to converse on any topic.\
    \ It was trained on dialogue to mimic a more natural way of conversing by looking\
    \ at individual words and whole sentences and paragraphs, working out their relationships,\
    \ and grasping the bigger picture to try and predict what will be said next and\
    \ what its response should be. That way, it can respond in a way that actually\
    \ makes sense in terms of the whole conversation, not just the last phrase uttered.\n\
    \n## Summary\n\nThis chapter gave you all the background information on chatbots\
    \ and the history of chatbots, Google Cloud, AI, Machine Learning, Natural Language\
    \ Processing, `Dialogflow Essentials`, `Dialogflow CX`, `Speech-to-Text`, `Text-to-Speech`,\
    \ and `Contact Center AI`.\n\nIn the last section, we talked about other Google\
    \ conversational AI projects and tools. That includes the `Google Assistant`,\
    \ `Actions on Google` (Google’s virtual assistant and development platform), `AdLingo`\
    \ (turning ads into virtual agents), `Chatbase` (insights), `Duplex` (remember\
    \ robots calling hairdressers), and `Meena` (sensible conversational model).\n\
    \nNow that you know some background information, it’s time to start building our\
    \ own `Dialogflow` agents!\n\n## Further Reading\n\n*   More about Google Cloud\n\
    \    [`https://cloud.google.com`](https://cloud.google.com)\n*   A cheatsheet\
    \ with all Google Cloud products and descriptions\n    [`http://4words.dev/`](http://4words.dev/)\n\
    *   Open Source at Google\n    [`https://opensource.google/`](https://opensource.google/)\n\
    *   More about `Dialogflow`\n    [`https://cloud.google.com/dialogflow`](https://cloud.google.com/dialogflow)\n\
    *   More on `TensorFlow`\n    [`https://www.tensorflow.org/`](https://www.tensorflow.org/)\n\
    *   More on `BERT`\n    [`https://github.com/google-research/bert`](https://github.com/google-research/bert)\n\
    *   More on `Contact Center AI`\n    [`https://cloud.google.com/solutions/contact-center`](https://cloud.google.com/solutions/contact-center)\n\
    *   Learn more about DeepMind’s `WaveNet`\n    [`https://deepmind.com/blog/article/wavenet-generative-model-raw-audio`](https://deepmind.com/blog/article/wavenet-generative-model-raw-audio)\n\
    *   Learn more about `Tacotron2`\n    [`https://ai.googleblog.com/2017/12/tacotron-2-generating-human-like-speech.html`](https://ai.googleblog.com/2017/12/tacotron-2-generating-human-like-speech.html)\n\
    *   More on `Chatbase`\n    [`https://chatbase.com/`](https://chatbase.com/)\n\
    *   More on `Meena`\n    [`https://ai.googleblog.com/2020/01/towards-conversational-agent-that-can.html`](https://ai.googleblog.com/2020/01/towards-conversational-agent-that-can.html)\n\
    *   More information on `LaMDA`\n    [`https://blog.google/technology/ai/lamda/`](https://blog.google/technology/ai/lamda/)\n\
    *   More on `Actions on Google`\n    [`https://developers.google.com/assistant`](https://developers.google.com/assistant)\n\
    *   More on `Actions Builder`\n    [`https://developers.google.com/assistant/conversational`](https://developers.google.com/assistant/conversational)\n\
    *   `Duplex` video which went viral\n    [`https://www.youtube.com/watch?v=D5VN56jQMWM`](https://www.youtube.com/watch%253Fv%253DD5VN56jQMWM)\n\
    *   More on `Tacotron2`\n    [`https://google.github.io/tacotron/publications/tacotron2/index.html`](https://google.github.io/tacotron/publications/tacotron2/index.html)\n\
    \n# 2. Getting Started with Dialogflow Essentials\n\n`Dialogflow Essentials` is\
    \ the tool you can use to build conversational UIs. It comes as a trial and a\
    \ pay-as-you-go edition. In this chapter, you will learn how to set up your first\
    \ `Dialogflow` agent with `Dialogflow Essentials`.\n\nThis includes: the location\
    \ of your agent and its data storage, logging, monitoring, user roles, and quotas.\
    \ It discusses in-depth information on all the possible settings. At the end of\
    \ the chapter, developers can learn how to set up `Dialogflow` for API access."
