    \ of requests the intent was matched to\n\n*   The drop-off rate while being on\
    \ this intent\n\nThe **History** page (Figure [13-13](#506047_1_En_13_Chapter.xhtml#Fig13))\
    \ shows a\nsimplified version of the conversations your agent has engaged in.\
    \ You\ncan click an event or user utterance to see a chronological transcript\n\
    log.\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig13_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig13_HTML.jpg)\n\
