    where the same intent was matched).\nWhen you scroll down, you will see the session\
    \ flow (Figure\n[13-12](#506047_1_En_13_Chapter.xhtml#Fig12)). You can\nclick\
    \ each intent to unfold the intents, which would follow up.\n\nYou can hover with\
