    \nFigure 13-11\nBuilt-in Dialogflow analytics\n\nThe **intents\noverview**  will\
    \ show you an overview of the most used\nintents. It will display the intent name,\
    \ the number of sessions in\nwhich the intent was matched, a count of the total\
    \ times the intent was\nused from all sessions, and an exit percentage, which\
    \ will show you a\npercentage of the sessions where the user left the conversation\
