- fmt: '# Keeping Context


    A **context** represents additional information included with user input or with
    an intent returned by the Dialogflow API.


    There are two ways how you can set the context, with follow-up questions or by
    setting manually input and output.


    Dialogflow can remember the context. For example, let’s think of this flow:


    > “Let’s talk more about favorite games.”

    > > “What is your favorite game?”

    > “It’s Call of Duty Modern Warfare.”

    > > “Oh, I played that one. Are you stuck in the game? Need any help?”

    > “Do you know a good walkthrough for level 4 of this game?”

    > > “Here’s a youtube video walkthrough of Call of Duty Modern Warfare level 4.”


    In the previous scenario, “talking about favorite games,” the context is steered
    through follow-up questions. The conversation takes various turns; these are automated
    as a follow-up response to questions (from Dialogflow or your fulfillment code).
    It will continue the conversation.


    Like a human, Dialogflow can remember that in the second and third turn-taking
    turns, “the game” refers to *Call of Duty Modern Warfare*. It can keep track of
    previous user utterances. In other words, contexts are helpful for differentiating
    user input, which may be vague. Contexts can also be set through additional details
    from your application, such as user setting and preferences, previous user input
    where the user is in your application, geographic location, and so on.


    It’s also possible to set contexts for other conversation intents without steering
    the conversation. You can park parameters in contexts for a later moment. This
    is where manually setting input and output is for. Think of this scenario:


    > “The very first game I played is Doom.”

    > > “Ah, yeah, I played that game as well.”

    > ... (In the meantime, maybe other types of questions have been asked.)

    > “The very first video game console that I bought was the Dreamcast.”

    > > “Is that where you played Doom on?”


    It’s possible to have max. five input contexts per intent and a maximum of thirty
    output contexts per intent since multiple output contexts can be applied to an
    intent. When an intent is matched, any output contexts used to the intent become
    active.


    ## Setting Up Follow-Up Intents


    To set up follow-up intents is pretty straightforward. You will start by creating
    a new intent. You will need to make sure that your response will end with another
    question to keep the conversation going. Click **Save**.


    Go back to the intents overview page.


    Hover with your mouse over the previously created (new) intent. (See Figure [3-11](#506047_1_En_3_Chapter.xhtml#Fig11).)


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig11_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig11_HTML.jpg)


    Figure 3-11 Setting up the following intents


    A hyperlink, **Add follow-up Intent**, will show up.


    When you click the **add follow-up intent** link, a pop-up will appear (Figure
    [3-12](#506047_1_En_3_Chapter.xhtml#Fig12)) with all the follow-up intent options.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig12_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig12_HTML.jpg)


    Figure 3-12 Using predefined follow-up intents


    Click **custom**.


    You will see that a new child intent was created, nested under your first intent.
    (See Figure [3-13](#506047_1_En_3_Chapter.xhtml#Fig13).)


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig13_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig13_HTML.jpg)


    Figure 3-13 Nesting of follow-up intents


    You can click the child’s intent and continue by providing training phrases and
    responses (and nest even deeper by using the same procedure).


    When opening these child intents, you will notice that the input and output contexts
    are automatically set with predefined names and default lifespan count numbers.
    (See Figure [3-14](#506047_1_En_3_Chapter.xhtml#Fig14).)


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig14_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig14_HTML.jpg)


    Figure 3-14 Predefined context in follow-up intents


    The input context in the parent is always empty. The child intents use the input
    context to provide the previous (parent) intent. The output context can be the
    last intent if the conversation has no output contexts (see Figure [3-14](#506047_1_En_3_Chapter.xhtml#Fig14)).


    There are different types of predefined follow-up questions to choose from. The
    advance of using a predefined follow-up is that it comes with training phrases,
    out of the box with all the supported Dialogflow languages. Table [3-2](#506047_1_En_3_Chapter.xhtml#Tab2)
    shows an overview of the various follow-up intents.


    Table 3-2 Predefined follow-up intents


    | Follow-Up | Description |

    | --- | --- |

    | custom | Write in your custom expressions. |

    | fallback | Fallback if no other expression is triggered. |

    | yes | Common expressions to capture an affirmative response. |

    | no | Common expressions to capture a negative response. |

    | later | Common expressions to do something later. |

    | cancel | Common expressions to cancel an action or exit. |

    | more | Common expressions to get more information or manage lists. |


    ## Manually Setting Input and Output in “Normal” Intents


    Instead of using follow-up intents, you can also specify input and output yourself
    in “normal” intents.


    Create a new intent if this intent needs to keep a user parameter in the context
    for later usage. You can specify a name in the **output**.


    When you create another new intent, which needs to do something with the stored
    context, you will need to specify the same content name as before, but now in
    the **input**.


    Input contexts in an intent have a primary function: they restrict this intent
    from being triggered when the context is not active.


    **Note** If you apply more than one input context per intent, they work with the
    AND logic. This means both contexts should be active if you want this intent to
    be triggered.


    ## Lifespan


    Contexts aren’t forever active in a chat session; they exist in certain **lifespan**
    criteria:


    *   Contexts expire when an intent is matched, and the context was retrieved.

    *   After the number of `DetectIntent` requests specified by the `lifespan_count`
    parameter.

    *   After 20 minutes and no intents are matched for a `DetectIntent` request.


    The default lifespan is five conversational turns for normal intents where manually
    input and output are set. The default lifespan for follow-up intents is two conversational
    turns. You can override the defaults by selecting the lifespan number (Figure
    [3-15](#506047_1_En_3_Chapter.xhtml#Fig15)) and typing a new lifespan count number.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig15_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig15_HTML.jpg)


    Figure 3-15 The lifespan number


    When you quit the chat session, your context will be lost. If you want to save
    this somehow for your user’s next visit, you will need back-end fulfillment code,
    which gets and sets the context through the SDK and stores this, for example,
    in a database. This typically works when working with user logins.


    **Note** There are some best practices for naming contexts:


    *   Use alphanumeric names (like `mycontext1`).

    *   Use `-` or `_` instead of spaces (`my_context1`/`my-context1`).

    *   Names are not case sensitive (`myContext123` and `mycontext123` are considered
    equivalent).

    *   All context names are lowercase when using the API (`mycontext123`).'
  raw: '## Keeping Context


    A **context** represents additional information included with user input or with
    an intent returned by the Dialogflow API.


    **There are two ways how you can set the context,** with follow-up questions or
    by setting manually input and output.


    Dialogflow can remember the context. For example, let’s think of this flow:


    > “Let’s talk more about favorite games.”


    > > “What is your favorite game?”


    > “It’s Call of Duty Modern Warfare.”


    > > “Oh, I played that one. Are you stuck in the game? Need any help?”


    > “Do you know a good walkthrough for level 4 of this game?”


    > > “Here’s a youtube video walkthrough of Call of Duty Modern Warfare level 4.”


    In the previous scenario, “talking about favorite games,” the context is steered
    through follow-up questions. The conversation takes various turns; these are automated
    as a follow-up response to questions (from Dialogflow or your fulfillment code).
    It will continue the conversation.


    Like a human, Dialogflow can remember that in the second and third turn-taking
    turns, “the game” refers to *Call of Duty Modern Warfare*. It can keep track of
    previous user utterances. In other words, contexts are helpful for differentiating
    user input, which may be vague. Contexts can also be set through additional details
    from your application, such as user setting and preferences, previous user input
    where the user is in your application, geographic location, and so on.


    It’s also possible to set contexts for other conversation intents without steering
    the conversation. You can park parameters in contexts for a later moment. This
    is where manually setting input and output is for. Think of this scenario:


    > “The very first game I played is Doom.”


    > > “Ah, yeah, I played that game as well.”


    > ... (In the meantime, maybe other types of questions have been asked.)


    > “The very first video game console that I bought was the Dreamcast.”


    > > “Is that where you played Doom on?”


    It’s possible to have max. Five input contexts per intent and a maximum of thirty
    output contexts per intent since multiple output contexts can be applied to an
    intent. When an intent is matched, any output contexts used to the intent become
    active.


    ### Setting Up Follow-Up Intents


    To set up follow-up intents is pretty straightforward. You will start by creating
    a **new intent**. You will need to make sure that your response will end with
    **another question** to keep the conversation going. Click **Save**.


    Go back to the intents overview page.


    Hover with your mouse over the previously created (new) intent. (See Figure [3-11](#506047_1_En_3_Chapter.xhtml#Fig11).)


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig11_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Setting up the following intents


    A hyperlink, **Add follow-up Intent**, will show up.


    When you click the **add** **follow-up intent** link, a pop-up will appear (Figure
    [3-12](#506047_1_En_3_Chapter.xhtml#Fig12)) with all the follow-up intent options.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig12_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Using predefined follow-up intents


    Click **custom**.


    You will see that a new child intent was created, nested under your first intent.
    (See Figure [3-13](#506047_1_En_3_Chapter.xhtml#Fig13).)


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig13_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Nesting of follow-up intents


    You can click the child’s intent and continue by providing training phrases and
    responses (and nest even deeper by using the same procedure).


    When opening these child intents, you will notice that the input and output contexts
    are automatically set with predefined names and default lifespan count numbers.
    (See Figure [3-14](#506047_1_En_3_Chapter.xhtml#Fig14).)


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig14_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig14_HTML.jpg)


    Figure 3-14


    Predefined context in follow-up intents


    The input context in the parent is always empty. The child intents use the input
    context to provide the previous (parent) intent. The output context can be the
    last intent if the conversation has no output contexts (see Figure [3-14](#506047_1_En_3_Chapter.xhtml#Fig14)).


    There are different types of predefined follow-up questions to choose from. The
    advance of using a predefined follow-up is that it comes with training phrases,
    out of the box with all the supported Dialogflow languages. Table [3-2](#506047_1_En_3_Chapter.xhtml#Tab2)
    shows an overview of the various follow-up intents.


    Table 3-2


    Predefined follow-up intents


    | Follow-Up | Description |

    | --- | --- |

    | custom | Write in your custom expressions. |

    | fallback | Fallback if no other expression is triggered. |

    | yes | Common expressions to capture an affirmative response. |

    | no | Common expressions to capture a negative response. |

    | later | Common expressions to do something later. |

    | cancel | Common expressions to cancel an action or exit. |

    | more | Common expressions to get more information or manage lists. |


    ### Manually Setting Input and Output in “Normal” Intents


    Instead of using follow-up intents, you can also specify input and output yourself
    in “normal” intents.


    Create a new intent if this intent needs to keep a user parameter in the context
    for later usage. You can specify a name in the **output**.


    When you create another new intent, which needs to do something with the stored
    context, you will need to specify the same content name as before, but now in
    the **input**.


    Input contexts in an intent have a primary function: they restrict this intent
    from being triggered when the context is not active.


    **Note** If you apply more than one input context per intent, they work with the
    AND logic. This means both contexts should be active if you want this intent to
    be triggered.


    ### Lifespan


    Contexts aren’t forever active in a chat session; they exist in certain **lifespan**
    criteria:


    *   Contexts expire when an intent is matched, and the context was retrieved.


    *   After the number of `DetectIntent` requests specified by the `lifespan_count`
    parameter.


    *   After 20 minutes and no intents are matched for a **DetectIntent** request.


    The default lifespan is five conversational turns for normal intents where manually
    input and output are set. The default lifespan for follow-up intents is two conversational
    turns. You can override the defaults by selecting the lifespan number (Figure
    [3-15](#506047_1_En_3_Chapter.xhtml#Fig15)) and typing a new lifespan count number.


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig15_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    The lifespan number


    When you quit the chat session, your context will be lost. If you want to save
    this somehow for your user’s next visit, you will need back-end fulfillment code,
    which gets and sets the context through the SDK and stores this, for example,
    in a database. This typically works when working with user logins.


    Note


    There are some best practices for naming contexts:


    *   Use alphanumeric names (like mycontext1).


    *   Use - or _ instead of spaces (my_context1/my-context1).


    *   Names are not case sensitive (myContext123 and mycontext123 are considered
    equivalent).


    *   All context names are lowercase when using the API (mycontext123).'
