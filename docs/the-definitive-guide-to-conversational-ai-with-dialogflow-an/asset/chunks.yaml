    \n*   关于如何构建 SelfServiceKiosk 的博客文章\n\n    [`https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47`](https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47)\n\
    \n*   SelfServiceKiosk 演示代码库\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts)\n\
    \n*   关于如何构建 SelfServiceKiosk 的博客文章\n\n    [`https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47`](https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47)\n\
    \n*   Self Service Kiosk 演示代码库\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts)\n\
    \n*   可用于本章的`package.json`文件示例\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/package.json`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/package.json)\n\
    \n*   体验并测试 Service Kiosk 演示\n\n    [`http://selfservicedesk.appspot.com/`](http://selfservicedesk.appspot.com/)\n\
    \n*   Dialogflow npm 包\n\n    [`https://www.npmjs.com/package/dialogflow`](https://www.npmjs.com/package/dialogflow)\n\
    \n*   SimpleServer 示例\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/simpleserver.js`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/simpleserver.js)\n\
    \n*   客户端示例\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/tree/master/examples`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/tree/master/examples)\n\
    \n*   AudioConfig 文档\n\n    [`https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.InputAudioConfig`](https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.InputAudioConfig)\n\
    \n*   DetectIntentResponse 文档\n\n    [`https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.DetectIntentResponse`](https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.DetectIntentResponse)\n\
    \n*   StreamingDetectResponse 文档\n\n    [`https://cloud.google.com/speech-to-text/docs/reference/rpc/google.cloud.speech.v1#google.cloud.speech.v1.StreamingRecognizeResponse`](https://cloud.google.com/speech-to-text/docs/reference/rpc/google.cloud.speech.v1#google.cloud.speech.v1.StreamingRecognizeResponse)\n\
    \n*   Dialogflow 中 DetectIntentRequest 的文档"
  raw: "Once the client is connected to the server, I can start listening to an\n\
    event that was fired from the server. In my case, this is the\n*'results'* event.\
    \ It will run once the data from the server side\nis retrieved in the browser.\
    \ This will call my custom\n**playOutput** method, which I will\nshow later.\n\
    \n```\nconst socketio = io();\nconst socket = socketio.on('connect', function()\
    \ {});\nsocketio.on('results', function (data) {\nconsole.log(data);\nplayOutput(data);\n\
    });\nListing 12-10\nOnce the results are sent back to the client, play the audio\n\
    ```\n\nListing [12-11](#506047_1_En_12_Chapter.xhtml#PC17), shows the\ncode for\
    \ playing the output in your browser from your device speakers.\n\n1.  Here’s\
    \ the **playOutput** function, which takes the\n    **arrayBuffer** that I retrieved\
    \ from the back-end code.\n    Here, I can create a new **AudioContext** object.\
    \ The `AudioContext`\n    interface represents an audio-processing graph built\
    \ from audio modules\n    linked together, represented by an **AudioNode**. An\
    \ audio\n    context controls both the creation of audio nodes it contains and\
    \ the\n    execution of the audio processing or decoding.\n\n2.  Now, let’s create\
    \ an audio source for Web Audio API from an `ArrayBuffer`. The\n    decoded `AudioBuffer`\
    \ is\n    resampled to the AudioContext’s sampling rate, then passed to a\n  \
    \  callback.\n\n3.  A user agent could block autoplay, hence why I run `audioContext.resume`\n\
    \    as a trick first. Afterward, create a new **AudioBufferSourceNode**\n   \
    \  to connect to the audioContext destination, which is, in our\n    case, the\
    \ device speakers. The buffer property of the `AudioBufferSourceNode`\n    interface\
    \ provides the ability to play back audio using an AudioBuffer\n    as the source\
    \ of the sound data. Finally, let’s play the audio.\n\n```\n// 1)\nfunction playOutput(arrayBuffer){\n\
    let audioContext = new AudioContext();\nlet outputSource;\ntry {\nif(arrayBuffer.byteLength\
    \ > 0){\n// 2)\naudioContext.decodeAudioData(arrayBuffer,\nfunction(buffer){\n\
    // 3)\naudioContext.resume();\noutputSource = audioContext.createBufferSource();\n\
    outputSource.connect(audioContext.destination);\noutputSource.buffer = buffer;\n\
    outputSource.start(0);\n},\nfunction(){\nconsole.log(arguments);\n});\n}\n} catch(e)\
    \ {\nconsole.log(e);\n}\n}\nListing 12-11\nHow to play the audio stream in a browser\n\
    ```\n\nCaution\n\nBe aware of using Dialogflow detectIntent on streaming audio.\
    \ When\nyou use simple `detectIntent` calls\nwithout streaming, you stop the microphone,\
    \ and you will play the TTS\naudio buffer. However, when you do streaming, you\
    \ keep your microphone\nopen. You don’t want to end up in an endless loop, where\
    \ the speech\nsynthesizer records new streams based on the TTS response through\
    \ your\nmicrophone. :-)\nThe `AudioBufferSourceNode`\nhas an onended event handler,\
    \ which will run once the `AudioBufferSourceNode`\nstopped playing the audio.\
    \ In case you want to solve the preceding\nproblem, you could set a boolean flag,\
    \ isPlaying, which should block the\nrecorder from sending the stream to the back\
    \ end when it’s set to\ntrue.\n\nCongratulations! By reading this chapter, you\
    \ now know how to build\nan end-to-end solution for streaming audio from a microphone\
    \ to a server\nand stream and play the audio results back in the browser!\n\n\
    Summary\nThis chapter contains information about building your own custom\nvoice\
    \ AI in your website or app vs. using a virtual assistant, such as\nthe Google\
    \ Assistant.\n\nIt addresses the following tasks:\n\n*   You want to create a\
    \ voice AI in your own website or app by\n    streaming audio from a browser microphone\
    \ to a web server.\n\n*   You want to integrate a voice AI in your own web server\
    \ and\n    detect intents on an audio stream received from the browser\n    microphone.\n\
    \n*   You want to incorporate a voice AI in your own website and play\n    the\
    \ audio results in your browser.\n\nThe full working example which belongs to\
    \ the sections in the book\ncan be found here:\n[`https://github.com/dialogflow/selfservicekiosk-audio-streaming`](https://github.com/dialogflow/selfservicekiosk-audio-streaming)\n\
    You can run the demo and play with it via this URL:\n[`http://selfservicedesk.appspot.com/`](http://selfservicedesk.appspot.com/)\n\
    \nFurther Reading\n\n*   RecordRTC library\n\n[`https://github.com/muaz-khan/RecordRTC`](https://github.com/muaz-khan/RecordRTC)\n\
    \n*   Socket.IO library\n\n[`https://www.npmjs.com/package/socket.io`](https://www.npmjs.com/package/socket.io)\n\
    \n*   Socket.io-Stream module\n\n[`https://www.npmjs.com/package/socket.io-stream`](https://www.npmjs.com/package/socket.io-stream)\n\
    \n*   My blog post on how to build a SelfServiceKiosk\n\n[`https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47`](https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47)\n\
    \n*   SelfServiceKiosk demo codebase\n\n[`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts)\n\
    \n*   My blog post on how to build a SelfServiceKiosk\n\n[`https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47`](https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47)\n\
    \n*   Self Service Kiosk demo codebase\n\n[`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts)\n\
    \n*   Example of the package.json file, which could be used for this\n    chapter\n\
    \n[`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/package.json`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/package.json)\n\
    \n*   Play around and test with the Service Kiosk demo\n\n[`http://selfservicedesk.appspot.com/`](http://selfservicedesk.appspot.com/)\n\
    \n*   Dialogflow npm package\n\n[`https://www.npmjs.com/package/dialogflow`](https://www.npmjs.com/package/dialogflow)\n\
    \n*   SimpleServer example\n\n[`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/simpleserver.js`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/simpleserver.js)\n\
    \n*   Client-side examples\n\n[`https://github.com/dialogflow/selfservicekiosk-audio-streaming/tree/master/examples`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/tree/master/examples)\n\
    \n*   Documentation on AudioConfig\n\n[`https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.InputAudioConfig`](https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2%2523google.cloud.dialogflow.v2.InputAudioConfig)\n\
    \n*   Documentation on DetectIntentResponse\n\n[`https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.DetectIntentResponse`](https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2%2523google.cloud.dialogflow.v2.DetectIntentResponse)\n\
    \n*   Documentation on StreamingDetectResponse\n\n[`https://cloud.google.com/speech-to-text/docs/reference/rpc/google.cloud.speech.v1#google.cloud.speech.v1.StreamingRecognizeResponse`](https://cloud.google.com/speech-to-text/docs/reference/rpc/google.cloud.speech.v1%2523google.cloud.speech.v1.StreamingRecognizeResponse)\n\
    \n*   Documentation on DetectIntentRequest in Dialogflow"
  trans: "\n一旦客户端连接到服务器，就可以开始监听服务器触发的事件。在本例中，该事件是`'results'`事件。当浏览器从服务器端检索到数据后，该事件将触发。这将调用自定义的`playOutput`方法，稍后将展示该方法。\n\
    \n```javascript\nconst socketio = io();\nconst socket = socketio.on('connect',\
    \ function() {});\nsocketio.on('results', function (data) {\n  console.log(data);\n\
    \  playOutput(data);\n});\n// 清单 12-10：当结果发送回客户端后，播放音频\n```\n\n清单 12-11 展示了在浏览器中通过设备扬声器播放输出的代码。\n\
    \n1.  这是`playOutput`函数，它接收从后端代码获取的`arrayBuffer`。在这里，可以创建一个新的`AudioContext`对象。`AudioContext`接口表示一个由音频模块链接而成的音频处理图，由`AudioNode`表示。音频上下文控制着它所包含的音频节点的创建以及音频处理或解码的执行。\n\
    \n2.  现在，让我们从`ArrayBuffer`为 Web Audio API 创建一个音频源。解码后的`AudioBuffer`会被重新采样到`AudioContext`的采样率，然后传递给回调函数。\n\
    \n3.  用户代理可能会阻止自动播放，因此首先运行`audioContext.resume`作为技巧。之后，创建一个新的`AudioBufferSourceNode`连接到`audioContext`的目标，在本例中即设备扬声器。`AudioBufferSourceNode`接口的`buffer`属性提供了使用`AudioBuffer`作为声音数据源来回放音频的能力。最后，播放音频。\n\
    \n```javascript\n// 1)\nfunction playOutput(arrayBuffer){\n  let audioContext\
    \ = new AudioContext();\n  let outputSource;\n  try {\n    if(arrayBuffer.byteLength\
    \ > 0){\n      // 2)\n      audioContext.decodeAudioData(arrayBuffer,\n      \
    \  function(buffer){\n          // 3)\n          audioContext.resume();\n    \
    \      outputSource = audioContext.createBufferSource();\n          outputSource.connect(audioContext.destination);\n\
    \          outputSource.buffer = buffer;\n          outputSource.start(0);\n \
    \       },\n        function(){\n          console.log(arguments);\n        });\n\
    \    }\n  } catch(e) {\n    console.log(e);\n  }\n}\n// 清单 12-11：如何在浏览器中播放音频流\n\
    ```\n\n> **注意**\n>\n> 请注意在流式音频上使用 Dialogflow 的`detectIntent`。当使用非流式的简单`detectIntent`调用时，会停止麦克风，并播放\
    \ TTS 音频缓冲区。然而，当进行流式处理时，麦克风保持开启状态。你不希望陷入无限循环，即语音合成器根据通过麦克风的 TTS 响应录制新的流。:-)\n\n\
    `AudioBufferSourceNode`有一个`onended`事件处理程序，当`AudioBufferSourceNode`停止播放音频时，该处理程序将运行。如果你想解决上述问题，可以设置一个布尔标志`isPlaying`，当它设置为`true`时，应阻止录音器向后端发送流。\n\
    \n恭喜！通过阅读本章，你现在知道了如何构建一个端到端的解决方案，用于将麦克风的音频流式传输到服务器，并在浏览器中流式传输和播放音频结果！\n\n## 总结\n\
    \n本章包含关于在你的网站或应用中构建自定义语音 AI 与使用虚拟助手（如 Google Assistant）的信息。\n\n它涉及以下任务：\n\n* \
    \  你想通过将浏览器麦克风的音频流式传输到 Web 服务器，在自己的网站或应用中创建语音 AI。\n*   你想在自己的 Web 服务器中集成语音 AI，并检测从浏览器麦克风接收到的音频流中的意图。\n\
    *   你想在自己的网站中集成语音 AI，并在浏览器中播放音频结果。\n\n本书各章节对应的完整工作示例可在此处找到：\n[`https://github.com/dialogflow/selfservicekiosk-audio-streaming`](https://github.com/dialogflow/selfservicekiosk-audio-streaming)\n\
    你可以通过此 URL 运行演示并进行体验：\n[`http://selfservicedesk.appspot.com/`](http://selfservicedesk.appspot.com/)\n\
    \n## 延伸阅读\n\n*   RecordRTC 库\n\n    [`https://github.com/muaz-khan/RecordRTC`](https://github.com/muaz-khan/RecordRTC)\n\
    \n*   Socket.IO 库\n\n    [`https://www.npmjs.com/package/socket.io`](https://www.npmjs.com/package/socket.io)\n\
    \n*   Socket.io-Stream 模块\n\n    [`https://www.npmjs.com/package/socket.io-stream`](https://www.npmjs.com/package/socket.io-stream)\n\
    \n*   关于如何构建 SelfServiceKiosk 的博客文章\n\n    [`https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47`](https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47)\n\
    \n*   SelfServiceKiosk 演示代码库\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts)\n\
    \n*   关于如何构建 SelfServiceKiosk 的博客文章\n\n    [`https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47`](https://medium.com/google-cloud/building-your-own-conversational-voice-ai-with-dialogflow-speech-to-text-in-web-apps-part-i-b92770bd8b47)\n\
    \n*   Self Service Kiosk 演示代码库\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/client/src/app/microphone/microphone.component.ts)\n\
    \n*   可用于本章的`package.json`文件示例\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/package.json`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/package.json)\n\
    \n*   体验并测试 Service Kiosk 演示\n\n    [`http://selfservicedesk.appspot.com/`](http://selfservicedesk.appspot.com/)\n\
    \n*   Dialogflow npm 包\n\n    [`https://www.npmjs.com/package/dialogflow`](https://www.npmjs.com/package/dialogflow)\n\
    \n*   SimpleServer 示例\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/simpleserver.js`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/blob/master/examples/simpleserver.js)\n\
    \n*   客户端示例\n\n    [`https://github.com/dialogflow/selfservicekiosk-audio-streaming/tree/master/examples`](https://github.com/dialogflow/selfservicekiosk-audio-streaming/tree/master/examples)\n\
    \n*   AudioConfig 文档\n\n    [`https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.InputAudioConfig`](https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.InputAudioConfig)\n\
    \n*   DetectIntentResponse 文档\n\n    [`https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.DetectIntentResponse`](https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#google.cloud.dialogflow.v2.DetectIntentResponse)\n\
    \n*   StreamingDetectResponse 文档\n\n    [`https://cloud.google.com/speech-to-text/docs/reference/rpc/google.cloud.speech.v1#google.cloud.speech.v1.StreamingRecognizeResponse`](https://cloud.google.com/speech-to-text/docs/reference/rpc/google.cloud.speech.v1#google.cloud.speech.v1.StreamingRecognizeResponse)\n\
    \n*   Dialogflow 中 DetectIntentRequest 的文档\n"
- fmt: "# 收集与监控对话分析\n\n- [`https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#detectintentrequest`](https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2%2523detectintentrequest)\n\
    \  - Guide to detect intents with audio\n- [`https://cloud.google.com/dialogflow/es/docs/how/detect-intent-tts`](https://cloud.google.com/dialogflow/es/docs/how/detect-intent-tts)\n\
    \  - Documentation on `AudioBufferSourceNode`\n- [`https://developer.mozilla.org/en-US/docs/Web/API/AudioBufferSourceNode`](https://developer.mozilla.org/en-US/docs/Web/API/AudioBufferSourceNode)\n\
    \n## 13. 收集与监控对话分析\n\n我想我们都曾经历过这样的场景：当你与虚拟助手对话或在聊天机器人中输入内容时，虚拟代理无法理解你的意思。它会要求你重复，返回一个回退响应，甚至更糟——给出错误答案！这是一种糟糕的客户体验。当这种情况频繁发生时，你的访客可能不会再回来；“那个机器人不管用。”事实上，聊天或语音机器人通常是可以正常工作的，但它被训练去回答不同类型的问题。\n\
    \n当然，通过良好的对话用户体验设计，你可以引导对话走向成功的结果。例如，当虚拟代理启动时，它不应只显示欢迎问候语，还应告知用户它能做什么。这样，你的访客很可能会提出正确类型的问题。\n\
    \n你正在构建一个聊天机器人或虚拟助手。它将如何使你的访客受益？它能解决什么问题？作为品牌或企业，你很可能拥有这些数据。这是你首次尝试构建虚拟代理吗？那么请查看来自其他渠道的数据，以便更好地了解你的客户。你有联络中心并拥有录音吗？你监控社交媒体吗？有收到的电子邮件吗？人们最常问的问题是什么？什么话题受欢迎？人们在抱怨什么？\n\
    \n在构建语音和聊天机器人时，尽快投入生产并捕获分析数据至关重要。我经常听到客户说：“聊天机器人洞察功能在我们的第二版路线图上。我们想先完善对话。”不应该是这样的。机器人分析并非仪表盘中展示的“锦上添花”功能；它们对于改善客户体验至关重要。\n\
    \n不要花一年时间完善对话，而你可以从现有的（实时）流量中学到最多。即使你只上线几个主要话题并直接监控收到的提问，你也可以随着时间的推移扩展聊天机器人并使其更加智能。你可以根据问题出现的频率来实现其他重要话题。这样，你可以了解客户如何看待你的品牌，以及如何随着时间的推移改进你的虚拟代理。\n\
    \n许多企业已经熟悉捕获分析数据。他们依赖网络分析数据（如点击率、页面浏览量和会话时长）来获取客户行为洞察，通常使用`Google Analytics`等工具收集。\n\
    \n这就是对话分析比网络分析更强大的原因。重点将不再是用户如何对呈现给他们的内容做出反应，而是他们通过自然语言传达了何种“意图”。事实上，市场预测对话分析将从2019年的42亿美元增长到2024年的157亿美元！\n\
    \n你可能希望监控或捕获四类指标。\n\n### 对话相关指标\n\n对话相关指标将回答诸如最终用户说了什么、何时说、在哪里（在什么平台上）说等问题。为此，你需要一种存储所有对话的方法。像`BigQuery`这样的数据仓库是收集所有聊天记录的好方法。\n\
    \n数据仓库是用于报告和数据分析的系统。可以将其视为一个数据库，但功能更强大，可以连接许多数据源。你可以在数据仓库中存储所有喜欢的结构化数据，例如网站数据、网站日志、登录数据、广告数据以及你的`Dialogflow`聊天机器人对话。数据越多，你就越能了解你的客户。\n\
    \n### 客户评分指标\n\n许多企业使用`NPS`、`CES`和`CSAT`评分作为研究方法，通过询问简单问题来了解客户的忠诚度。你可以在你的代理中实现这一点。\n\
    \n### 聊天会话与漏斗指标\n\n你可以使用`Dialogflow`或`Chatbase`获取会话流程，这将显示一个聊天漏斗。它直观地总结了最终用户在与你的代理交互时所采取的对话路径。\n\
    \n### 机器人模型健康指标\n\n使用`Dialogflow`时，它将利用机器学习来理解用户话语并将其匹配到意图（意图分类）。通过机器人模型指标，可以计算代理底层机器学习模型的质量。\n\
    \n## 捕获对话相关指标并存储在`BigQuery`中\n\n像`Dialogflow`这样的工具拥有自己的内置分析功能。你可以通过提供日期时间来浏览简单的分析数据。然而，你可能希望在自己的数据仓库中构建自定义存储库，以收集强大的分析系统。`BigQuery`就是一个数据仓库的例子。也许你已经在将其用于广告数据。\n\
    \n### `BigQuery`\n\n`BigQuery`是一个完全托管、无服务器的数据仓库，能够对PB级数据进行可扩展的分析。它是一个无服务器的软件即服务（`SaaS`），支持使用`ANSI\
    \ SQL`进行查询。\n\n使用`BigQuery`分析而非`Dialogflow`内置分析有几个优势，这对于需要处理合规性（如`GDPR`）的企业来说非常重要。当你在`BigQuery`中存储聊天机器人对话时，你可以：\n\
    \n- 选择数据存储的位置\n- 选择数据存储的时间长度\n- 创建对话数据的备份\n- 在存储前从数据集中移除敏感的`PII`数据（例如，根据`GDPR`，你不能存储`PII`数据）\n\
    - 创建更多数据点（例如，聊天翻译、用户情感）\n- 将你的聊天机器人对话与其他有价值的数据结合\n\n> **注意**：如果你因合规原因选择此解决方案，你可能还需要在`Dialogflow`设置面板中关闭数据日志记录。这也意味着你将无法在`Dialogflow`控制台的“分析”和“历史记录”标签页中看到任何数据。\n\
    \n为什么将聊天机器人分析与其他数据结合是有益的？因为你可以借此创建全渠道体验和洞察。想象一下，一位用户访问你的银行网站。用户已登录，正在浏览关于抵押贷款的银行网页。一周后，用户返回网站并与银行聊天机器人开始对话（甚至可能通过电话与语音代理交谈）。用户解释他有欺诈交易，聊天机器人提供阻止这些交易的帮助。在对话结束前，聊天机器人还提供了一个抵押贷款优惠。由于聊天数据以及网站广告数据都存储在同一个数据仓库中，建立这种关联变得很容易。\n\
    \n### 捕获点\n\n让我们来看几个捕获点，它们有助于从机器人对话中收集洞察。我们可以使用这些指标来查询我们的数据集。"
