- fmt: "# Dialogflow vs. Text-to-Speech API vs. Speech-to-Text API\n\nAlthough many\
    \ of us will use Dialogflow with text input, for web or social media chatbots,\
    \ it is also possible to do intent matching with your voice as audio input. It\
    \ can even return spoken text (TTS) as an audio result.\n\nDialogflow speech detection\
    \ and output will overlap with Google Cloud Speech-to-Text API (`STT`) and Google\
    \ Cloud Text-to-Speech (`TTS`). The API calls look similar, and that is because\
    \ Dialogflow is making use of Google Cloud Speech-to-Text under the hood.\n\n\
    However, those services are different, and they have been used in separate use\
    \ cases. For example, Dialogflow is used in conversations when you are expecting\
    \ answers/results, while Google Cloud Text-to-Speech is often used for transcribing\
    \ purposes. (Think of generating subtitles or taking notes.)\n\n## Speech-to-Text\
    \ API\n\nGoogle Cloud `Speech-to-Text (STT)` transcribes spoken words to written\
    \ text. This is great for when you want to generate subtitles in a video, generate\
    \ text transcripts from meetings, and so on. You could also combine it with Dialogflow\
    \ chatbots (detect intent from text transcripts) to synthesize the chatbot answers.\
    \ However, `STT` doesn’t do intent detection as Dialogflow does. `STT` is very\
    \ powerful, as the API call response will return the written transcript with the\
    \ highest confidence score, and it will return an array with alternative transcript\
    \ options.\n\n> **Note**\n> \n> The Speech-to-Text `StreamingDetectIntent` incoming\
    \ audio streams are billed in 15 seconds intervals. After 15 seconds, the speech\
    \ recognizer will time out if there is silence. Ideally, if there is a silence,\
    \ it should not wait the whole 15 seconds.\n\n## Text-to-Speech API\n\nWith Google\
    \ Cloud `Text-to-Speech (TTS)`, you can send a text or SSML (text with voice markup)\
    \ input, and it will return audio bytes, which you can use to create an mp3 file\
    \ or directly stream to an audio player (in your browser).\n\nBy now, you have\
    \ seen how to build a web application that streams audio from a microphone on\
    \ your local device through your browser to a back-end application, and fetches\
    \ results from Dialogflow, and displays it in the user interface. It would be\
    \ even nicer when the browser could play the audio streams. This is what the next\
    \ chapter is all about!\n\n## Build the Back End\n\nSince my example application\
    \ uses Node.js and npm, I will need to download external Node libraries. The npm\
    \ package which is essential for this chapter is called `dialogflow`. And it will\
    \ be used to interact with Dialogflow and do intent matching (on speech).\n\n\
    For demo purposes, I won’t discuss how to set up a Node.js application with an\
    \ Express server. But as a reference, you can look into my `simple server code`,\
    \ which has been used for the simple `client-side examples`, and you can also\
    \ look into the code of the `Airport Self Service Kiosk` end-to-end example. The\
    \ links can be found in the “Further Reading” section of this chapter.\n\nWhen\
    \ you browse through these code listings, you will be able to see the Express\
    \ server. They all communicate via Socket.IO like Listing [12-5](#506047_1_En_12_Chapter.xhtml#PC5).\n\
    \n1.  With Socket.IO instantiated, I can listen to the `connect emit`. As soon\
    \ as a Socket.IO client connects to the server, this code will execute.\n\n2.\
    \  When connected to a socket, and the `message` event was fired by the client,\
    \ execute this code. It will retrieve the data which was set when stopping the\
    \ WebRTC recorder. To recall from my previous chapter, I have created an object\
    \ with a child object, which contains the mime-type (`audio/webm`) and the `audioDataURL`,\
    \ which is the Base64 string containing the audio recording. Let’s take that Base64\
    \ string and convert it to a Node.js file Buffer.\n\n3.  With that `fileBuffer`,\
    \ I could call my custom Dialogflow `DetectIntent` implementation, which will\
    \ be explained later in this chapter.\n\n```javascript\nconst results = await\
    \ detectIntent(fileBuffer);\nclient.emit('results', results);\n```\n\nIt will\
    \ be an asynchronous call and return a promise with the results. These results\
    \ will be sent to the client-side app. The client could listen to the socket emit\
    \ like this:\n\n```javascript\nsocketio.on('results', function (data) {\n    console.log(data);\n\
    });\n```\n\n4.  Here’s an example of a second event fired by the client, in this\
    \ case, a streaming event. Now, I will retrieve the data when the WebRTC recorder\
    \ streams chunks of audio data in the `ondataavailable` listener. Note that the\
    \ client socket is wrapped with `socket.io-stream` for streaming binary data transfers.\n\
    \nI am retrieving the audio chunks, plus additional data, such as the stream name\
    \ (a string). This can be used to store a temporary audio file on the server,\
    \ in which I can pipe the incoming audio stream. It’s used as a holder to activate\
    \ my custom Dialogflow implementation.\n\n5.  Like the `DetectIntentStreaming`\
    \ implementation, explained later in this chapter:\n\n```javascript\ndetectIntentStream(stream,\
    \ function(results){\n    client.emit('results', results);\n});\n```\n\nIn this\
    \ call, I pass in the stream and a callback function to execute once the results\
    \ are in. These results will be sent to the client-side app.\n\nThe client could\
    \ listen to the socket emit like this:\n\n```javascript\nsocketio.on('results',\
    \ function (data) {\n    console.log(data);\n});\n```\n\n```javascript\n//1\n\
    io.on('connect', (client) => {\n    //2\n    client.on('message', async function(data)\
    \ {\n        const dataURL = data.audio.dataURL.split(',').pop();\n        let\
    \ fileBuffer = Buffer.from(dataURL, 'base64');\n        //3 ...\n    });\n   \
    \ // 4\n    ss(client).on('stream', function(stream, data) {\n        const filename\
    \ = path.basename(data.name);\n        stream.pipe(fs.createWriteStream(filename));\n\
    \        //5 ...\n    });\n});\n```\n\n*Listing 12-5* Using Socket.IO for sending\
    \ audio streams from the front end to the back end\n\n## API Calls to Dialogflow\n\
    \nI will use the Dialogflow Node.js client SDK to manually detect the intent,\
    \ based on finished audio buffers and incoming audio streams.\n\n```javascript\n\
    const df = require('dialogflow');\n```\n\nLet’s first prepare the client and the\
    \ request. Later, I can modify the request by adding the audio input:\n\n```javascript\n\
    // 1)\nsessionId = uuid.v4();\n// 2)\nsessionClient = new df.SessionsClient();\n\
    sessionPath = sessionClient.sessionPath(projectId, sessionId);\n// 3)\nrequest\
    \ = {\n    session: sessionPath,\n    queryInput: {\n        // 4)\n        audioConfig:\
    \ {\n            sampleRateHertz: sampleRateHertz,\n            encoding: encoding,\n\
    \            languageCode: languageCode\n        },\n        singleUtterance:\
    \ singleUtterance\n    }\n}\n```\n\n*Listing 12-6* Prepare the speech request\n\
    \n1.  Dialogflow will need a session ID. Let’s use UUID to generate a random [`https://www.ietf.org/rfc/rfc4122.txt`](https://www.ietf.org/rfc/rfc4122.txt)\
    \ RFC4122 id, in a format like `1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed`.\n\n2. \
    \ Afterward, let’s create a Dialogflow session path. The session path can be created\
    \ from a Dialogflow Session Client object. It needs a session ID to make Dialogflow\
    \ session unique. And it needs the Google Cloud project id, which points to a\
    \ Google Cloud project with a working Dialogflow agent.\n\n3.  Let’s already set\
    \ up a request object, which will be used for each Dialogflow API call. In case\
    \ this request is used when streaming audio, this request will be used as the\
    \ initial request. This means it first connects to the SDK without the audio stream,\
    \ but prepares the API with audio configurations it can use. Afterward, the chunks\
    \ of audio will stream in. It needs to have a `sessionPath` (which now will point\
    \ to a client session and a particular Dialogflow agent). Even without the audio\
    \ input, I can already set up the `queryInput`."
  raw: "Dialogflow vs. Text-to-Speech API vs. Speech-to-Text\nAPI\nAlthough many of\
    \ us will use Dialogflow with text input, for web or\nsocial media chatbots, it\
    \ is also possible to do intent matching with\nyour voice as audio input. It can\
    \ even return spoken text (TTS) as an\naudio result.\nDialogflow speech detection\
    \ and output will overlap with Google Cloud\nSpeech-to-Text API (STT)\n  and\n\
    Google Cloud Text-to-Speech\n(TTS) .\nThe API calls look similar, and that is\
    \ because Dialogflow is making use\nof Google Cloud Speech-to-Text under the hood.\n\
    However, those services are different, and they have been used in\nseparate use\
    \ cases. For example, Dialogflow is used in conversations\nwhen you are expecting\
    \ answers/results, while Google Cloud\nText-to-Speech is often used for transcribing\
    \ purposes. (Think of\ngenerating subtitles or taking notes.)\n\nSpeech-to-Text\
    \ API\nGoogle Cloud **Speech-to-Text\n(STT)** \n transcribes spoken words to written\
    \ text. This is great for when\nyou want to generate subtitles in a video, generate\
    \ text transcripts\nfrom meetings, and so on. You could also combine it with Dialogflow\n\
    chatbots (detect intent from text transcripts) to synthesize the chatbot\nanswers.\
    \ However, STT doesn’t do intent detection as Dialogflow does.\nSTT is very powerful,\
    \ as the API call response will return the written\ntranscript with the highest\
    \ confidence score, and it will return an\narray with alternative transcript options.\n\
    \nNote\n\nThe Speech-to-Text `StreamingDetectIntent`\nincoming audio streams are\
    \ billed in 15 seconds intervals. After 15\nseconds, the speech recognizer will\
    \ time out if there is silence.\nIdeally, if there is a silence, it should not\
    \ wait the whole 15\nseconds.\n\nText-to-Speech API\nWith Google Cloud **Text-to-Speech\n\
    (TTS)** \n, you can send a text or SSML (text with voice markup) input, and\n\
    it will return audio bytes, which you can use to create an mp3 file or\ndirectly\
    \ stream to an audio player (in your browser).\nBy now, you have seen how to build\
    \ a web application that streams\naudio from a microphone on your local device\
    \ through your browser to a\nback-end application, and fetches results from Dialogflow\
    \ , and displays it in\nthe user interface. It would be even nicer when the browser\
    \ could play\nthe audio streams. This is what the next chapter is all about!\n\
    \nBuild the Back End\nSince my example application uses Node.js and npm, I will\
    \ need to\ndownload external Node\nlibraries. The npm package which is essential\
    \ for this chapter is\ncalled **dialogflow**. And it will be used to interact\
    \ with\nDialogflow and do intent matching (on speech).\nFor demo purposes, I won’t\
    \ discuss how to set up a Node.js\napplication with an Express server. But as\
    \ a reference, you can look\ninto my **simple server code**, which has been used\
    \ for the\nsimple **client-side\nexamples** , and you can also look into the code\
    \ of the\n**Airport Self Service Kiosk** end-to-end example. The\nlinks can be\
    \ found in the “Further Reading” section of this chapter.\n\nWhen you browse through\
    \ these code listings, you will be able to see the\nExpress server. They all communicate\
    \ via Socket.IO like Listing\n[12-5](#506047_1_En_12_Chapter.xhtml#PC5).\n\n1.\
    \  With Socket.IO instantiated, I can listen to the **connect\n    emit**. As\
    \ soon as a Socket.IO client connects to the server,\n    this code will execute.\n\
    \n2.  When connected to a socket, and the ‘message’ event was fired by the\n \
    \   client, execute this code. It will retrieve the data which was set when\n\
    \    stopping the WebRTC recorder. To recall from my previous chapter, I have\n\
    \    created an object with a child object, which contains the mime-type\n   \
    \ (**audio/webm**) and the **audioDataURL**,\n    which is the Base64 string containing\
    \ the audio recording. Let’s take\n    that Base64 string and convert it to a\
    \ Node.js file Buffer.\n\n3.  With that **fileBuffer**, I could call my custom\
    \ Dialogflow\n    DetectIntent implementation, which will be explained later in\
    \ this\n    chapter.\n\n```\n    const results = await detectIntent(fileBuffer);\n\
    \    client.emit('results', results);\n    ```\n\nIt will be an asynchronous call\
    \ and return a promise with the results.\n    These results will be sent to the\
    \ client-side app. The client could\n    listen to the socket emit like this:\n\
    \n```\n    socketio.on('results', function (data) {\n    console.log(data);\n\
    \    });\n    ```\n\n4.  Here’s an example of a second event fired by the client,\
    \ in this\n    case, a streaming event. Now, I will retrieve the data when the\
    \ WebRTC\n    recorder streams chunks of audio data in the\n    **ondataavailable**\
    \ listener. Note that the client socket\n    is wrapped with **socket.io-stream**\
    \ for streaming binary\n    data transfers.\n\nI am retrieving the audio chunks,\
    \ plus additional\n    data, such as the stream name (a string). This can be used\
    \ to store a\n    temporary audio file on the server, in which I can pipe the\
    \ incoming\n    audio stream. It’s used as a holder to activate my custom Dialogflow\n\
    \    implementation.\n\n5.  Like the DetectIntentStreaming implementation, explained\
    \ later in this\n    chapter:\n\n```\n    detectIntentStream(stream, function(results){\n\
    \    client.emit('results', results);\n    });\n    ```\n\nIn this call, I pass\
    \ in the stream and a callback function to execute\n    once the results are in.\
    \ These results will be sent to the client-side\n    app.\n\nThe client could\
    \ listen to the socket emit like this:\n\n```\n    socketio.on('results', function\
    \ (data) {\n    console.log(data);\n    });\n    ```\n\n```\n//1\nio.on('connect',\
    \ (client) => {\n//2\nclient.on('message', async function(data) {\nconst dataURL\
    \ = data.audio.dataURL.split(',').pop();\nlet fileBuffer = Buffer.from(dataURL,\
    \ 'base64');\n//3 ...\n});\n// 4\nss(client).on('stream', function(stream, data)\
    \ {\nconst filename = path.basename(data.name);\nstream.pipe(fs.createWriteStream(filename));\n\
    //5 ...\n});\n});\nListing 12-5\nUsing Socket.IO for sending audio streams from\
    \ the front end to the back end\n```\n\nAPI Calls to Dialogflow\n\nI will use\
    \ the\nDialogflow Node.js client SDK to manually detect the intent, based on\n\
    finished audio buffers and incoming audio streams.\n\n```\nconst df = require('dialogflow');\n\
    ```\n\nLet’s first prepare the client and the request. Later, I can modify the\n\
    request by adding the audio input:\n\n```\n// 1)\nsessionId = uuid.v4();\n// 2)\n\
    sessionClient = new df.SessionsClient();\nsessionPath = sessionClient.sessionPath(projectId,\
    \ sessionId);\n// 3)\nrequest = {\nsession: sessionPath,\nqueryInput: {\n// 4)\n\
    audioConfig: {\nsampleRateHertz: sampleRateHertz,\nencoding: encoding,\nlanguageCode:\
    \ languageCode\n},\nsingleUtterance: singleUtterance\n}\n}\nListing 12-6\nPrepare\
    \ the speech request\n```\n\n1.  Dialogflow will need a session ID. Let’s use\
    \ UUID to generate a\n    random [`https://www.ietf.org/rfc/rfc4122.txt`](https://www.ietf.org/rfc/rfc4122.txt)\n\
    \    RFC4122 id, in a format like ‘1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed’.\n\n\
    2.  Afterward, let’s create a Dialogflow\n    session path. The session path can\
    \ be created from a Dialogflow Session\n    Client object. It needs a session\
    \ ID to make Dialogflow session unique.\n    And it needs the Google Cloud project\
    \ id, which points to a Google Cloud\n    project with a working Dialogflow agent.\n\
    \n3.  Let’s already set up a request object, which will be used for each\n   \
    \ Dialogflow API call. In case this request is used when streaming audio,\n  \
    \  this request will be used as the initial request. This means it first\n   \
    \ connects to the SDK without the audio stream, but prepares the API with\n  \
    \  audio configurations it can use. Afterward, the chunks of audio will\n    stream\
    \ in. It needs to have a sessionPath (which now will point to a\n    client session\
    \ and a particular Dialogflow agent). Even without the\n    audio input, I can\
    \ already set up the **queryInput**."
  trans: "\n# Dialogflow 与 Text-to-Speech API 及 Speech-to-Text API 对比\n\n虽然我们许多人会通过文本输入来使用\
    \ Dialogflow，用于网页或社交媒体聊天机器人，但也可以使用语音作为音频输入来进行意图匹配。它甚至可以将口语文本（TTS）作为音频结果返回。\n\n\
    Dialogflow 的语音检测和输出功能与 Google Cloud Speech-to-Text API（`STT`）和 Google Cloud Text-to-Speech（`TTS`）存在重叠。API\
    \ 调用看起来相似，这是因为 Dialogflow 在底层使用了 Google Cloud Speech-to-Text。\n\n然而，这些服务是不同的，并且被用于不同的场景。例如，Dialogflow\
    \ 用于需要获取答案/结果的对话场景，而 Google Cloud Text-to-Speech 通常用于转录目的。（想想生成字幕或做笔记。）\n\n##\
    \ Speech-to-Text API\n\nGoogle Cloud `Speech-to-Text (STT)` 将口语转换为书面文本。当你想要生成视频字幕、从会议中生成文本记录等场景时，这非常有用。你也可以将其与\
    \ Dialogflow 聊天机器人结合使用（从文本记录中检测意图），以合成聊天机器人的回答。然而，`STT` 不像 Dialogflow 那样进行意图检测。`STT`\
    \ 非常强大，其 API 调用响应会返回置信度最高的书面转录文本，并返回一个包含备选转录选项的数组。\n\n> **注意**\n>\n> Speech-to-Text\
    \ 的 `StreamingDetectIntent` 传入音频流按 15 秒间隔计费。如果静音持续 15 秒，语音识别器将超时。理想情况下，如果出现静音，不应等待整整\
    \ 15 秒。\n\n## Text-to-Speech API\n\n使用 Google Cloud `Text-to-Speech (TTS)`，你可以发送文本或\
    \ SSML（带语音标记的文本）输入，它将返回音频字节，你可以用这些字节创建 mp3 文件或直接流式传输到音频播放器（在你的浏览器中）。\n\n到目前为止，你已经了解了如何构建一个\
    \ Web 应用程序，该应用程序将本地设备麦克风的音频通过浏览器流式传输到后端应用程序，从 Dialogflow 获取结果，并在用户界面中显示。如果浏览器能够播放音频流，那就更好了。这正是下一章要讲的内容！\n\
    \n## 构建后端\n\n由于我的示例应用程序使用了 Node.js 和 npm，我需要下载外部的 Node 库。本章必不可少的 npm 包叫做 `dialogflow`。它将用于与\
    \ Dialogflow 交互并进行（语音）意图匹配。\n\n出于演示目的，我不会讨论如何设置带有 Express 服务器的 Node.js 应用程序。但作为参考，你可以查看我的\
    \ `简单服务器代码`，该代码已用于简单的 `客户端示例`，你也可以查看 `机场自助服务亭` 端到端示例的代码。相关链接可以在本章的“延伸阅读”部分找到。\n\
    \n当你浏览这些代码清单时，你将能够看到 Express 服务器。它们都通过 Socket.IO 进行通信，如清单 12-5 所示。\n\n1.  实例化\
    \ Socket.IO 后，我可以监听 `connect emit`。一旦 Socket.IO 客户端连接到服务器，此代码将执行。\n\n2.  当连接到套接字，并且客户端触发了\
    \ `message` 事件时，执行此代码。它将检索停止 WebRTC 记录器时设置的数据。回顾上一章，我创建了一个包含子对象的对象，该子对象包含 MIME\
    \ 类型（`audio/webm`）和 `audioDataURL`，后者是包含音频录制的 Base64 字符串。让我们获取该 Base64 字符串并将其转换为\
    \ Node.js 文件 Buffer。\n\n3.  有了这个 `fileBuffer`，我可以调用自定义的 Dialogflow `DetectIntent`\
    \ 实现，这将在本章后面解释。\n\n```javascript\nconst results = await detectIntent(fileBuffer);\n\
    client.emit('results', results);\n```\n\n这将是一个异步调用，并返回一个包含结果的 Promise。这些结果将被发送到客户端应用程序。客户端可以像这样监听套接字发射：\n\
    \n```javascript\nsocketio.on('results', function (data) {\n    console.log(data);\n\
    });\n```\n\n4.  这是客户端触发的第二个事件的示例，在本例中是一个流式事件。现在，我将在 WebRTC 记录器在 `ondataavailable`\
    \ 监听器中流式传输音频数据块时检索数据。请注意，客户端套接字被包装了 `socket.io-stream` 以进行二进制数据传输。\n\n我正在检索音频块以及附加数据，例如流名称（一个字符串）。这可用于在服务器上存储临时音频文件，我可以将传入的音频流通过管道传输到该文件中。它被用作一个容器来激活我的自定义\
    \ Dialogflow 实现。\n\n5.  就像本章后面解释的 `DetectIntentStreaming` 实现一样：\n\n```javascript\n\
    detectIntentStream(stream, function(results){\n    client.emit('results', results);\n\
    });\n```\n\n在此调用中，我传入流和一个回调函数，该函数在结果返回时执行。这些结果将被发送到客户端应用程序。\n\n客户端可以像这样监听套接字发射：\n\
    \n```javascript\nsocketio.on('results', function (data) {\n    console.log(data);\n\
    });\n```\n\n```javascript\n//1\nio.on('connect', (client) => {\n    //2\n    client.on('message',\
    \ async function(data) {\n        const dataURL = data.audio.dataURL.split(',').pop();\n\
    \        let fileBuffer = Buffer.from(dataURL, 'base64');\n        //3 ...\n \
    \   });\n    // 4\n    ss(client).on('stream', function(stream, data) {\n    \
    \    const filename = path.basename(data.name);\n        stream.pipe(fs.createWriteStream(filename));\n\
    \        //5 ...\n    });\n});\n```\n\n*清单 12-5* 使用 Socket.IO 将音频流从前端发送到后端\n\n\
    ## 对 Dialogflow 的 API 调用\n\n我将使用 Dialogflow Node.js 客户端 SDK，基于完成的音频缓冲区和传入的音频流手动检测意图。\n\
    \n```javascript\nconst df = require('dialogflow');\n```\n\n让我们首先准备客户端和请求。稍后，我可以通过添加音频输入来修改请求：\n\
    \n```javascript\n// 1)\nsessionId = uuid.v4();\n// 2)\nsessionClient = new df.SessionsClient();\n\
    sessionPath = sessionClient.sessionPath(projectId, sessionId);\n// 3)\nrequest\
    \ = {\n    session: sessionPath,\n    queryInput: {\n        // 4)\n        audioConfig:\
    \ {\n            sampleRateHertz: sampleRateHertz,\n            encoding: encoding,\n\
    \            languageCode: languageCode\n        },\n        singleUtterance:\
    \ singleUtterance\n    }\n}\n```\n\n*清单 12-6* 准备语音请求\n\n1.  Dialogflow 需要一个会话\
    \ ID。让我们使用 UUID 生成一个随机的 [`https://www.ietf.org/rfc/rfc4122.txt`](https://www.ietf.org/rfc/rfc4122.txt)\
    \ RFC4122 ID，格式如 `1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed`。\n\n2.  之后，让我们创建一个 Dialogflow\
    \ 会话路径。会话路径可以从 Dialogflow 会话客户端对象创建。它需要一个会话 ID 来使 Dialogflow 会话唯一。它还需要 Google\
    \ Cloud 项目 ID，该 ID 指向一个包含可用 Dialogflow 代理的 Google Cloud 项目。\n\n3.  让我们先设置一个请求对象，该对象将用于每次\
    \ Dialogflow API 调用。如果此请求用于流式音频，则此请求将用作初始请求。这意味着它首先在没有音频流的情况下连接到 SDK，但使用它可以使用的音频配置来准备\
    \ API。之后，音频块将流式传入。它需要有一个 `sessionPath`（现在将指向一个客户端会话和一个特定的 Dialogflow 代理）。即使没有音频输入，我也可以先设置好\
    \ `queryInput`。\n"
- fmt: '4.  Since this application works with speech, I will need to set the `audioConfig`
    object. The `audioConfig` object requires a sample rate hertz (this number has
    to be the same as the `desiredSampleRateHertz` from your client-side code). It
    requires a `languageCode` that contains the spoken text''s language, and it should
    be a language set in Dialogflow. It will need to have an encoding, which also
    needs to be the same as the encoding used in the client. In my Self Service Kiosk
    code demos, I am using the configurations from the `.env` file.


    Now let’s have a look into both calls, `DetectIntent` and `StreamingDetectIntent`.


    ## `DetectIntent`


    After Dialogflow detected the intent, the back-end app receives the intent match
    results after all audio has been sent and processed. I’m creating an asynchronous
    function, which takes the `AudioBuffer` and adds it to the request. Next, I’m
    calling `detectIntent`, by passing in the request. It returns a promise, which
    will be chainable.


    ```

    async function detectIntent(audio){

    request.inputAudio = audio;

    const responses = await sessionClient.detectIntent(request);

    return responses;

    };

    Listing 12-7

    Using Socket.IO for sending audio streams from the front end to the back end

    ```


    This will return a `DetectIntentResponse`. It contains a `queryResult`. In case
    you passed in the `DetectIntentRequest` an output audio config, you will be able
    to retrieve audio data bytes generated based on the values of the default platform
    text responses found in the `queryResult.fulfillmentMessages` field. If multiple
    default text responses exist, they will be concatenated when generating audio.
    If no default platform text responses exist, the generated audio content will
    be empty.


    ## `StreamingDetectIntent`


    The `StreamingDetectIntent` performs bidirectional streaming intent detection:
    receive results while sending audio. This method is only available via the gRPC
    API (not REST).


    1.  I’m creating an asynchronous function, which takes the `AudioBuffer` and adds
    it to the request, and the name of the callback function will execute with the
    results once the API fetches the results.

    2.  Execute the `streamingDetectIntent()` call.

    3.  There’s an `on(''data'')` event listener, which executes once audio chunks
    are streamed in. You could create some conditional logic here; if there’s a `data.recognitionResult`
    in the response, then the intermediate transcript is recognized. Otherwise, likely
    the intent has been detected (or a fallback intent was triggered, in case there
    wasn’t a match). I’m returning the results by executing the callback function.

    4.  You could also listen to `error` events when something went wrong with the
    request. Or you could listen to `end` events when streaming to Dialogflow stopped.

    5.  How this works is that we will let the Dialogflow API know that there will
    be a `streamingDetectIntent` call with all the `queryInput` and `audioConfigs`
    that can be retrieved from the requests. Afterward, all the other messages that
    will come in will contain the audio stream via `inputAudio`.

    6.  Let’s use a small node module called `pump`, which pipes the streams together
    and destroys all of them if one closes.

    7.  Here, I will transform the stream, so the request will now also contain `inputAudio`
    with the `audioBuffer` streaming in.


    ```

    // 1)

    async function detectIntentStream(audio, cb) {

    // 2)

    const stream = sessionClient.streamingDetectIntent()

    .on(''data'', function(data){

    // 3)

    if (data.recognitionResult) {

    console.log(

    `Intermediate transcript:

    ${data.recognitionResult.transcript}`

    );

    } else {

    console.log(`Detected intent:`);

    cb(data);

    }

    })

    // 4)

    .on(''error'', (e) => {

    console.log(e);

    })

    .on(''end'', () => {

    console.log(''on end'');

    });

    // 5)

    stream.write(request);

    // 6)

    await pump(

    audio,

    // 7)

    new Transform({

    objectMode: true,

    transform: (obj, _, next) => {

    next(null, { inputAudio: obj, outputAudioConfig: {

    audioEncoding: `OUTPUT_AUDIO_ENCODING_LINEAR_16`

    } });

    }

    }),

    stream

    );

    };

    Listing 12-8

    Detecting the intent based on an audio stream

    ```


    This will return a `StreamingIntentResponse`. It contains a `queryResult`. In
    case you passed in the `StreamingDetectIntentRequest` and output audio config,
    you will be able to retrieve audio data bytes generated based on the values of
    the default platform text responses found in the `queryResult.fulfillmentMessages`
    field. If multiple default text responses exist, they will be concatenated when
    generating audio. If no default platform text responses exist, the generated audio
    content will be empty.


    ## Retrieving Audio Results from Dialogflow and Playing It in Your Browser


    When you make a Text to Speech call, either with the Google Cloud Text-to-Speech
    API or using the built-in speech return from Dialogflow, it will return audio
    byte data. Both Cloud TTS and Dialogflow can be called from server-side code.
    To stream and play this in a browser, you could make use of WebSockets. Once the
    `AudioBuffer` (`ArrayBuffer` in the browser’s JavaScript code) is returned to
    the client, it can be played by using WebRTC methods.


    Figure [12-4](#506047_1_En_12_Chapter.xhtml#Fig4) is an example of a browser flow
    by using Dialogflow. In this example, a user speaks in the microphone (similar
    to the preceding examples), but Dialogflow returns an `AudioBuffer` as the result.


