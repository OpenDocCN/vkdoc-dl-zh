    # 使用官方轻量级 Node.js 12 镜像。


    # https://hub.docker.com/_/node

    FROM node:12-slim


    # 创建并切换到应用目录。

    WORKDIR /usr/src/app


    # 将应用程序依赖清单复制到容器镜像中。


