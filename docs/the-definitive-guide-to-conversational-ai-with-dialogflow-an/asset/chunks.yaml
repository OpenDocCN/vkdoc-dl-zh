    `// outputContext won't work if you dont set the full session path .`\n`exports.dialogflowFirebaseFulfillment\
    \ = functions.https.onRequest((request, response) => {`\n`let intentMap = new\
    \ Map();`\n`intentMap.set('Default Welcome Intent', welcome);`\n`intentMap.set('Default\
    \ Fallback Intent', fallback);`\n`intentMap.set('Buy product regex', yourFunctionHandler);`\n\
    `let webhookResponse = handleRequest(intentMap, request);`\n`console.log(webhookResponse);`\n\
    `response.json(webhookResponse);`\n`});`\n\nThis example uses a package.json as\
    \ shown in Listing [10-9](#506047_1_En_10_Chapter.xhtml#PC10).\n\n```\n{\n\"name\"\
    : \"dialogflowFirebaseFulfillment\",\n\"description\": \"This is the default fulfillment\
    \ for a Dialogflow agents using Cloud Functions for Firebase\",\n\"version\":\
