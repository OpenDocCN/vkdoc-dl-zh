    Now let''s modify the Apache configuration:


    ```

    sudo nano /etc/apache2/sites-available/000-default-le-ssl.conf

    ```


    Use the following `000-default-le-ssl.conf` this will use the following configuration
    for Apache. Use the following contents of Listing 10-22.'
  raw: "# Run the web service on container startup.\nCMD [ \"npm\", \"start\" ]\n\
    Listing 10-13\nDockerfile that belongs to this example to run the container in\
    \ Cloud Run\n```\n\nThe **.dockerignore** file (Listing [10-14](#506047_1_En_10_Chapter.xhtml#PC16))\
    \ makes sure\nthat specific files won’t be copied to the image. For example, the\
    \ **node_modules**\n folder will be generated from the package.json file, no need\
    \ to\ncopy all these large files over.\n\n```\nDockerfile\nREADME.md\nnode_modules\n\
    npm-debug.log\nListing 10-14\nDocker ignore file\n```\n\nWith the following command-line\
    \ commands, I can deploy the Cloud Run\ncontainer.\n\nFirst, enable the container\
    \ registry API:\n\n```\ngcloud services enable containerregistry.googleapis.com\n\
    ```\n\nLog in on gcloud:\n\n```\ngcloud init\n```\n\nBuild the container, and\
    \ give the image a tag name:\n\n```\ngcloud builds submit --tag gcr.io/PROJECT_ID/dialogflow\n\
    ```\n\nDeploy the container using the image tag name (use the managed platform,\n\
    not Anthos):\n\n```\ngcloud run deploy --image gcr.io/PROJECT_ID/dialogflow --platform\
    \ managed\n```\n\nThis will walk you through a wizard. You can choose a region.\
    \ Allow\nunauthenticated invocations to make the URL public available. Once you\n\
    are done, it will create an HTTPS URL for your fulfillment. This is the\nURL you\
    \ can add to the Webhook URL field in the Dialogflow console:\n**https://<myapp>.a.run.app**\n\
    \nListing [10-15](#506047_1_En_10_Chapter.xhtml#PC21) shows an\nexample of the\
    \ code.\n\n```\nconst express = require('express');\nconst bodyParser = require('body-parser');\n\
    // Dialogflow Fulfillment Code\nconst expressApp = express().use(bodyParser.json())\n\
    expressApp.post('/fulfillment', (request, response) => {\n// Agent intent map\n\
    });\nexpressApp.get('/', (req, res) => {\n// get the Dialogflow request\n// do\
    \ something\n// return to the agent\nres.send(`Hello from Google Cloud!`);\n});\n\
    const port = process.env.PORT || 8080;\nexpressApp.listen(port, () => {\nconsole.log('Dialogflow\
    \ Fulfillment listening on port', port);\n});\nListing 10-15\nDialogflow fulfillment\
    \ with Express\n```\n\nGoogle Cloud Logging\n\nWhen making use of Google Cloud\
    \ products, logging comes\nout of the box. See Figure [10-12](#506047_1_En_10_Chapter.xhtml#Fig12).\n\
    \n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig12_HTML.png](images/506047_1_En_10_Chapter/506047_1_En_10_Fig12_HTML.png)\n\
    \nFigure 10-12\nFulfillment webhook logs in the Google Cloud Console (previously\n\
    known as Stackdriver)\n\nBuilding Multilingual Fulfillment Webhook\n\nWhen working\
    \ with different languages, you will likely work with other\nnumber formats, foreign\
    \ currencies, or date/time strings. More tools will come in\nhandy:\n\n*   **moment.js**:\
    \ To parse, validate, manipulate, and\n    display dates and times in JavaScript.\n\
    \n*   **numeral.js**: A JavaScript library for formatting\n    and manipulating\
    \ numbers.\n\nWhen your webhook back end is a Node.js back end, there are\nremarkable\
    \ frameworks available that can help you better organize your\ncode and localize\
    \ your strings.\n\nThis tool will help you:\n\n*   **i18n**: Lightweight, simple\
    \ translation module\n    with dynamic JSON storage. Supports plain vanilla Node.js\
    \ apps.\n\nDialogflow will send a language code (such as “en” for English or “nl”\n\
    for Dutch), with each query result:\n\n```\nrequest.body.queryResult.languageCode;\n\
    ```\n\nYou will use this to initialize the i18n library. Then you can refer to\n\
    these multi-language text strings by using the following calls:\n\n```\ni18n.__(KEY)\n\
    ```\n\nAll the text-based strings can be stored in JSON files, such as\n\n*  \
    \ *locales/en-US.json*\n\n*   *locales/nl-NL.json*\n\nThe contents will look like\
    \ this:\n\n```\nen-US.json\n{\n\"WELCOME_BASIC\": \"Hi, I am the virtual video\
    \ game chat agent. I can talk with you about video games or tell you which latest\
    \ games have been released. What would you like to know from me?\"\n}\nnl-NL.json\n\
    {\n\"WELCOME_BASIC\": \"Hoi, ik ben de virtual video game chat agent. Ik kan over\
    \ video games praten en ik kan je vertellen welke games net uit zijn. Wat wil\
    \ je weten?\"\n}\n```\n\nTip\n\nSince i18n uses JSON files to store language strings,\
    \ you could store\nthese JSON files together with your code and deploy your webhook\
    \ in the\ncloud with, for example, Cloud Run. If you rather use the inline editor\n\
    or Cloud Functions, you will likely want to store the JSON files in\nGoogle Cloud\
    \ Storage.\n\ni18n Code Example\nLet’s look into a full code example on implementing\
    \ a multilingual\nwebhook, deployed with Cloud Run.\n\nThe **package.json** file\
    \ will contain these additional\ndependencies:\n\n```\n\"i18n\": \"^0.10.0\",\n\
    \"moment\": \"^2.27.0\",\n\"numeral\": \"^2.0.6\"\n```\n\nThe localized JSON files\
    \ will look like Listing [10-16](#506047_1_En_10_Chapter.xhtml#PC26). Notice that\n\
    certain strings can contain variables (%s).\n\n```\nlocales/en-US.json\n{\n\"\
    WELCOME_BASIC\": \"Hi, I am the virtual video game chat agent. I can talk with\
    \ you about video games or tell you which latest games have been released. What\
    \ would you like to know from me?\",\n\"DELIVERY_DATE\": \"The date is %s.\",\n\
    \"PRICE\": \"It costs %s.\",\n\"TOTAL_AMOUNT\": \"The total is: %s.\",\n\"FALLBACK\"\
    : \"Oops, something went wrong. Would you like to try again?\"\n}\nlocales/nl-NL.json\n\
    {\n\"WELCOME_BASIC\": \"Hoi, ik ben de virtual video game chat agent. Ik kan over\
    \ video games praten en ik kan je vertellen welke games net uit zijn. Wat wil\
    \ je weten?\",\n\"DELIVERY_DATE\": \"De datum is %s.\",\n\"PRICE\": \"Het kost\
    \ %s.\",\n\"TOTAL_AMOUNT\": \"Het totaal is: %s.\",\n\"FALLBACK\": \"Oeps, er\
    \ ging iets mis. Kun je het opnieuw proberen?\"\n}\nListing 10-16\nYou can create\
    \ locale JSON files to use within your webhook code\n```\n\nListing [10-17](#506047_1_En_10_Chapter.xhtml#PC27)\
    \ shows how you\nset up your webhook code in order to make use of those JSON language\n\
    files.\n\n1.  First, we will require the i18n library to handle multilingual\n\
    \    support. We will need to configure it to explain which locales we are\n \
    \   using, where they are located, and which locale will be the default.\n\n2.\
    \  Next, we will require moment.js for date and time objects.\n\n3.  By default,\
    \ it works for the English language. All the other locales\n    will need to be\
    \ required separately.\n\n4.  Then we require numeral.js to handle currencies\
    \ and numbers. To make\n    it work with other locales, we will have to register\
    \ the locales and\n    provide the options. For example, in European notation,\
    \ the decimal\n    delimiter is a “.” instead of a “,”.\n\n5.  Here, we assign\
    \ the i18n keys to the response outputs. The i18n\n    framework will find the\
    \ value (the correct translated text string) in\n    the locale file.\n\n6.  We\
    \ will retrieve the languageCode from the Dialogflow queryResult\n    object.\
    \ As you have seen, i18n uses ISO language codes, conforming to\n    the ISO 639-1\
    \ standard, complete with two-letter country codes where\n    relevant, like (“nl-NL”\
    \ or “en-US”), so will need to create that\n    mapping.\n\n7.  These are the\
    \ intents which will make use of multilingual\n    responses.\n\n```\n'use strict';\n\
    const express = require('express');\nconst bodyParser = require('body-parser');\n\
    const { WebhookClient} = require('dialogflow-fulfillment');\n//1\nconst i18n =\
    \ require('i18n');\ni18n.configure({\nlocales: ['en-US', 'nl-NL'],\ndirectory:\
    \ __dirname + '/locales',\ndefaultLocale: 'en-US'\n});\n//2\nconst moment = require('moment');\n\
    require('moment/locale/nl');\n//3\nconst numeral = require('numeral');\nnumeral.register('locale',\
    \ 'nl', {\ndelimiters: {\nthousands: ',',\ndecimal: '.'\n},\nabbreviations: {\n\
    thousand: 'k',\nmillion: 'm',\nbillion: 'b',\ntrillion: 't'\n},\nordinal: function\
    \ (number) {\nvar b = number % 10;\nreturn (~~ (number % 100 / 10) === 1) ? 'th'\
    \ :\n(b === 1) ? 'st' :\n(b === 2) ? 'nd' :\n(b === 3) ? 'rd' : 'th';\n},\ncurrency:\
    \ {\nsymbol: '€'\n}\n});\nprocess.env.DEBUG = 'dialogflow:debug'; // enables lib\
    \ debugging statements\n//4\nfunction welcome(agent) {\nagent.add(i18n.__('WELCOME_BASIC'));\n\
    }\nfunction fallback(agent) {\nagent.add(i18n.__('FALLBACK_BASIC'));\n}\nfunction\
    \ getPrice(agent) {\nagent.add(i18n.__('PRICE', numeral(399).format('($0,0)')));\n\
    }\nfunction getDeliveryDate(agent) {\nagent.add(i18n.__('DELIVERY_DATE', moment().format('LL')));\n\
    }\nfunction getTotalNumber(agent) {\nagent.add(i18n.__('TOTAL_AMOUNT', numeral(1000).format('0,0')));\n\
    }\n// Express Code\nconst app = express().use(bodyParser.json());\napp.post('/fulfillment',\
    \ (request, response) => {\nconst agent = new WebhookClient({ request, response\
    \ });\nconsole.log('Dialogflow Request headers: ' + JSON.stringify(request.headers));\n\
    console.log('Dialogflow Request body: ' + JSON.stringify(request.body));\n//5\n\
    var lang = request.body.queryResult.languageCode;\nvar langCode;\nif(lang ===\
    \ \"nl\") langCode = \"nl-NL\";\nif(lang === \"en\") langCode = \"en-US\";\ni18n.setLocale(langCode);\n\
    moment.locale(lang);\nnumeral.locale(lang);\n//6\nlet intentMap = new Map();\n\
    intentMap.set('Default Welcome Intent', welcome);\nintentMap.set('Default Fallback\
    \ Intent', fallback);\nintentMap.set('Get_Price', getPrice);\nintentMap.set('Get_Delivery_Date',\
    \ getDeliveryDate);\nintentMap.set('Get_Total_Number', getTotalNumber);\nagent.handleRequest(intentMap);\n\
    });\napp.get('/', (req, res) => {\nres.send(`OK`);\n});\nconst port = process.env.PORT\
    \ || 8080;\napp.listen(port, () => {\nconsole.log('Dialogflow Fulfillment listening\
    \ on port', port);\n});\nListing 10-17\nDialogflow fulfillment multilingual webhook\
    \ code using the i18n library\n```\n\nFigures [10-13](#506047_1_En_10_Chapter.xhtml#Fig13)\
    \ and [10-14](#506047_1_En_10_Chapter.xhtml#Fig14) will show\nhow the result looks\
    \ like in the simulator. Figure [10-13](#506047_1_En_10_Chapter.xhtml#Fig13) will\
    \ show\nthe example in English. Note also the valuta sign.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig13_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig13_HTML.jpg)\n\
    \nFigure 10-13\nTesting multilingual bots that make use of fulfillments, English\n\
    language\n\nFigure [10-14](#506047_1_En_10_Chapter.xhtml#Fig14) will show\nthe\
    \ example in Dutch. Note also the valuta sign.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig14_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig14_HTML.jpg)\n\
    \nFigure 10-14\nTesting multilingual bots that make use of fulfillments, Dutch\n\
    language\n\nUsing Local Webhooks\nRunning your fulfillment locally can be handy\
    \ during development, as\nyou don’t need to deploy your solution. We can use the\
    \ tool **ngrok** \nfor this. You can download it from npm.\n\nFigure [10-15](#506047_1_En_10_Chapter.xhtml#Fig15)\
    \ shows how it\nworks. The user interacts with the Dialogflow agent. Once Dialogflow\n\
    will need to fetch fulfillment, it will connect to ngrok.io to execute\nyour local\
    \ webhook code.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig15_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig15_HTML.jpg)\n\
    \nFigure 10-15\nTesting fulfillment locally with ngrok.io\n\nNgrok\nNgrok allows\n\
    you to expose a web server running on your local machine to the\nInternet. Just\
    \ tell ngrok what port your web server is listening on. If\nyou don’t know what\
    \ port your web server is listening on, it’s probably\nport 80, the default for\
    \ HTTP.\n\nYou can run the following command from your local fulfillment webhook\n\
    code folder in the command line to expose your webhook:\n\n```\nngrok http 80\n\
    ```\n\nWhen you start ngrok, it will display the public URL of your tunnel and\n\
    other status and metrics information about connections made over your\ntunnel:\n\
    \n```\nTunnel Status                 online\nVersion                       2.0/2.0\n\
    Web Interface                 http://127.0.0.1:4040\nForwarding              \
    \      http://92832de0.ngrok.io -> localhost:80\nForwarding                  \
    \  https://92832de0.ngrok.io -> localhost:80\nConnections                  ttl\
    \     opn     rt1     rt5     p50     p90\n0       0      0.00    0.00    0.00\
    \    0.00\n```\n\nThe generated forwarding **HTTPS URL** is what you will\nneed\
    \ to type into your Webhook section in the Dialogflow Fulfillment\npage; see Figure\
    \ [10-16](#506047_1_En_10_Chapter.xhtml#Fig16).\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig16_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig16_HTML.jpg)\n\
    \nFigure 10-16\nWebhooks with ngrok\n\nWhen you run the ngrok command from your\
    \ local app code folder, it\nconnects to the ngrok cloud service,\nwhich accepts\
    \ traffic on a public address and relays that traffic\nthrough to the ngrok process\
    \ running on your machine and then on to the\nlocal address you specified.\n\n\
    Tip\n\nOn the ngrok free plan, ngrok’s URLs are randomly generated and\ntemporary.\
    \ If you want to use the same URL every time, you need to\nupgrade to a paid plan\
    \ to use the subdomain option for a stable URL with\nHTTP or TLS tunnels and the\
    \ remote-addr option for a stable address with\nTCP tunnels.\n\nTesting Your Fulfillment\
    \ Without Dialogflow and\nngrok\nIt’s also possible to test your webhook code\
    \ without connecting to\nDialogflow and without using ngrok. This makes sense\n\
    if you just want to test your local code, which can be handy while\nwriting the\
    \ code. We can do this by posting stub JSON files to your\nwebhook (pretending\
    \ that it’s Dialogflow).\nIn the Dialogflow console, click **Fulfillments** ➤\n\
    **Diagnostic Info**.\nCopy and paste the contents of the Fulfillment request tab.\n\
    Store this in a local file: **stub.json**.\nThis JSON code is unique to your agent\
    \ as it includes session ids,\nproject names, and intent and response ids unique\
    \ to your agent.\n\nOnce you have the stub.json file, you can make a **Curl**\n\
    POST call from your command line, which uses the stub file as a POST\nmessage:\n\
    \n```\ncurl -X POST -H \"Content-Type: application/json\" -d @stub.json http://localhost:8080/fulfillment\n\
    ```\n\nThis will execute your local code.\n\nSecuring Webhooks\n\nIt’s possible\
    \ to secure your fulfillment webhook so that only you or\nyour Dialogflow agent\
    \ is authorized to make requests. The following\nmechanisms for authentication\
    \ are supported:\n\n*   Basic authentication with login and password\n\n*   Authentication\
    \ with authentication headers\n\n*   Mutual TLS authentication\n\nNote\n\nDialogflow\
    \ is a conversational tool for NLP, intent matching, and\nparameter slot filling.\
    \ It does not come with a CMS and therefore it\nwon’t have a user login system\
    \ or OAuth implementation.\n\nBasic Authentication\nBasic access authentication\
    \ is a method for an HTTP user agent (such\nas a web browser) to provide a user\
    \ and password when making a request.\nIn basic HTTP authentication, a request\
    \ contains a header field with the\nfollowing format: `Authorization: Basic <credentials>`,\
    \ where credentials are the Base64 encoding of\nID and password joined by a single\
    \ colon.\nIt provides no\nconfidentiality protection for the transmitted credentials.\
    \ They are\nmerely encoded with Base64 in transit but not encrypted or hashed\
    \ in any\nway. Therefore, basic authentication is typically used in conjunction\n\
    with HTTPS to provide confidentiality. Luckily, both happen out of the\nbox with\
    \ Dialogflow. Dialogflow webhooks only allow HTTPS URLs.\n\nYou can set up **Basic\
    \ Auth** in the Dialogflow Fulfillment\npage; see Figure [10-17](#506047_1_En_10_Chapter.xhtml#Fig17).\
    \ Besides the\nURL, you will have to specify the user id and the password.\n\n\
    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig17_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig17_HTML.jpg)\n\
    \nFigure 10-17\nA secure webhook in Dialogflow\n\nUsing the Basic Auth options\
    \ in Dialogflow\nalso requires you to handle the access controls in your fulfillment\n\
    webhook. Let’s assume you have built a back end with Node.js and\nExpress. Express\
    \ has a basic auth middleware plugin. The middleware will\ncheck incoming requests\
    \ for a basic auth (Authorization) header, parse\nit, and check if the credentials\
    \ are legit. If a request is not\nauthorized, it will respond with HTTP 401 and\
    \ a configurable body\n(default empty).\n\nIn Listing [10-18](#506047_1_En_10_Chapter.xhtml#PC31),\
    \ the\nmiddleware will check incoming requests to match the credentials\n**admin:supersecret**,\
    \ which were passed into the\nDialogflow Webhook, Basic Auth fields.\n\n```\n\
    const app = require('express')()\nconst basicAuth = require('express-basic-auth')\n\
    app.use(basicAuth({\nusers: { 'admin': 'supersecret' }\n}));\nListing 10-18\n\
    Basic authentication in your webhook\n```\n\nAuthentication with Authentication\
    \ Headers\nHTTP provides a general framework for access\ncontrol and authentication.\
    \ The most common HTTP authentication is based\non the “Basic Auth” schema, as\
    \ you have seen in the previous section.\nBut there are other schemes as well,\
    \ such as Bearer JWT Tokens or\nDigest .\nDialogflow allows you to specify your\
    \ own custom headers, which you can\nuse for authentication or, for example, to\
    \ set character encoding.\nYou can set up custom **headers** on the Dialogflow\n\
    Fulfillment page. Besides the URL, you will have to specify the header\nkey and\
    \ value.\n\nListing [10-19](#506047_1_En_10_Chapter.xhtml#PC32) shows an\nexample\
    \ of checking if a header is present in the fulfillment webhook\ncode. A custom\
    \ header with the key **x-auth** and the value\n**true** has been set in the Dialogflow\
    \ console. This code\nchecks if this header is present; if not, it sends a 403\
    \ HTTP error,\nwhich means that the webhook code understands the request but refuses\
    \ to\nauthorize it.\n\n```\napp.use(function(req, res, next) {\nif (!req.headers['x-auth'])\
    \ {\nreturn res.status(403).json({ error: 'No auth headers sent!'});\n}\nnext();\n\
    });\nListing 10-19\nHeader authentication in your webhook\n```\n\nFigure [10-18](#506047_1_En_10_Chapter.xhtml#Fig18)\
    \ shows how to\nconfigure the Dialogflow webhook in order to work with the code\
    \ of\nListing [10-19](#506047_1_En_10_Chapter.xhtml#PC32). Note the\n**x-auth**\
    \ header.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig18_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig18_HTML.jpg)\n\
    \nFigure 10-18\nA secure webhook with headers\n\nTip\n\nIf you want to work with\
    \ Bearer JWT tokens, you might wonder how to\nset the headers, since the JWT token\
    \ should change all the time.\nTypically, the headers look like Authorization\
    \ - Token\ntoken=’yourtokenhere.\nTo set these in the Dialogflow console won’t\
    \ make much sense. You\nwould likely want to do this programmatically. With the\
    \ Dialogflow SDK,\nit is possible to call the updateFulfillment method, which\
    \ allows you to\npass in a Fulfillment with a GenericWebservice.\nHow would you\
    \ receive a new JWT token/redirect? Maybe by putting your\nchatbot integration\
    \ behind a web login? It also means that your code\nimplementation will need to\
    \ check the JWT tokens and provide JWT tokens\nsince Dialogflow won’t do this.\n\
    \nMutual TLS Authentication\nThe network traffic initiated by Dialogflow for webhook\
    \ requests is\nsent on a public network. To ensure that traffic is both secure\
    \ and\ntrusted in both directions, Dialogflow optionally supports Mutual TLS\n\
    authentication (mTLS). With mTLS, both the client (Dialogflow) and the\nserver\
    \ (your webhook server) present a certificate during a TLS\nhandshake, which mutually\
    \ proves identity.\nYou won’t need to configure mTLS in the Dialogflow console,\
    \ but you\nwill have to do this on the fulfillment webhook server. Typically,\
    \ you\nwon’t configure this in your Node.js app code since Node.js apps in\nproduction\
    \ will always be behind a server such as Apache, NGINX, or\nmaybe a cloud load\
    \ balancer. That’s the place where you will configure\nyour server, and when a\
    \ TLS handshake proves mutually, then forward the\nrequest to your Node.js app\
    \ code on a different port (on HTTP).\n\nThe configuration\nwill have the following\
    \ requirements:\n\n*   Your app code will need a valid secure SSL certificate.\n\
    \n*   You will need to download the root CA that Dialogflow is\n    using.\n\n\
    Valid Secure SSL Certificate\n\nWeb pages and apps which run over HTTPS require\
    \ a valid SSL\ncertificate. There are two ways how you can get these for free,\
    \ but\nthere are some caveats:\n\n*   You can generate self-signed certificate\
    \ requests with\n    **OpenSSL**; however, the CA won’t be trusted. You could\n\
    \    add the certificate to your browser or OS certificates keychain store,\n\
    \    but everyone using this public IP will have to take these steps. It’s\n \
    \   possible to sign your certificate by a trusted authority such as\n    GlobalSign;\
    \ this will cost money. Dialogflow mTLS won’t work without a\n    trusted CA.\n\
    \n*   Use a tool like **Let’s Encrypt**. It can generate\n    trusted certificates\
    \ with trusted CAs for free; however, you will need\n    to connect a domain to\
    \ your public IP.\n\nFigure [10-19](#506047_1_En_10_Chapter.xhtml#Fig19) shows\
    \ how it\nlooks like if your SSL certificate is secure.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig19_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig19_HTML.jpg)\n\
    \nFigure 10-19\nA secure website with an SSL certificate \n\nRoot CA\n\nRun the\
    \ following two commands on your\ncommand line to download the root CA which will\
    \ be used by Dialogflow.\nThis will add GTS101.crt and GSR2.crt to the local file:\n\
    **ca-crt.pem**:\n\n```\ncurl https://pki.goog/gsr2/GTS1O1.crt | openssl x509 -inform\
    \ der >> ca-crt.pem\ncurl https://pki.goog/gsr2/GSR2.crt | openssl x509 -inform\
    \ der >> ca-crt.pem\n```\n\nHere’s an example\non how to enable mTLS for Apache2\\\
    . These settings belong in the\n**ssl.conf**:\n\n```\nSSLVerifyClient require\n\
    SSLVerifyDepth 2\nSSLCACertificateFile \"ca-crt.pem\"\n```\n\nAnd this is the\
    \ access control, which will make sure that only [Dialogflow.​com](http://dialogflow.com)\
    \ can call the\nfulfillment webhook:\n\n```\nRequire all denied\n\n```\n\nHTTPS\
    \ Authentication Setup with Apache\n\nInstead of setting up HTTP authentication\
    \ in\nyour (Node.js) app code, you will fix this on the server side. To\npassword-protect\
    \ a directory on an Apache server, you will need a\n**.htaccess** and a **.htpasswd**\
    \ file. The\n**.htaccess** file typically looks like this:\n\n```\nAuthType Basic\
    \ AuthName \"Access to the staging site\"\nAuthUserFile /path/to/.htpasswd Require\
    \ valid-user\n```\n\nThe **.htaccess** file references a\n**.htpasswd** file in\
    \ which each line consists of a\nusername and a password separated by a colon\
    \ (“:”). You cannot see the\nactual passwords as they are encrypted (md5 in this\
    \ case). Note that you\ncan name your .htpasswd file differently if you like,\
    \ but keep in mind\nthis file shouldn’t be accessible to anyone. (Apache is usually\n\
    configured to prevent access to .ht* files).\n\nFor example:\n\n```\nadmin:$apr1$ZjTqBB3f$IF9gdYAGlMrs2fuINjHsz.\n\
    ```\n\nA Full Example for Setting Up Mutual TLS\nAuthentication\nHTTPS is the\
    \ secured version of HTTP (HyperText Transfer Protocol ). HTTP is the\nprotocol\
    \ used by your browser and web servers to communicate and\nexchange information.\
    \ When that exchange of data is encrypted with\nSSL/TLS, then we call it HTTPS.\
    \ The “S” stands for Secure.\nAnytime you use a web browser to connect to a secure\
    \ site\n(https://something), you’re using Transport Layer Security\n(TLS) .\n\
    TLS is the successor to SSL, and it’s an excellent standard with many\nfeatures.\
    \ TLS guarantees the server’s identity to the client and\nprovides a two-way encrypted\
    \ channel between the server and the\nclient.\nBut for a webhook application such\
    \ as Dialogflow, that’s not enough\nsince your application is the server, and\
    \ you want to confirm the\nclient’s identity, Dialogflow. What’s the solution?\n\
    Mutual TLS to the rescue! It’s an optional feature for TLS. It\nenables the server\
    \ to authenticate the identity of the client.\nDeployed Cloud Run apps (HTTPS\
    \ or gRPC) and serverless cloud\nfunctions will provide a valid “server cert”\
    \ trusted by root CA stores.\nCloud Run and Cloud Functions don’t support bring-your-own\
    \ cert. Cloud\nRun’s **.run.app* URLs provide their own valid TLS server\ncert.\n\
    Suppose mTLS authentication is required for your webhook. In that\ncase, you may\
    \ want to consider one of the following Google Cloud\nsolutions: Compute Engine\
    \ (VMs), Google Kubernetes Engine (Containers),\nor Cloud Run on Anthos (Cloud\
    \ Run container on GKE with Istio).\nHere’s how to set up a Dialogflow fulfillment\
    \ VM on Compute Engine\nwith mTLS enabled.\n\nCreate a Node.js VM on Compute Engine\n\
    Create a Node.js VM with the following steps:\nFrom the Cloud Console menu, select\
    \ **Marketplace**.\n\nChoose **Node.js by Google Click to deploy image (VM)**\n\
    (see Figure [10-20](#506047_1_En_10_Chapter.xhtml#Fig20)).\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig20_HTML.png](images/506047_1_En_10_Chapter/506047_1_En_10_Fig20_HTML.png)\n\
    \nFigure 10-20\nNode.js Compute VM in Google Cloud\n\nSelect a region. Make sure\
    \ HTTP and HTTPS is checked.\nFrom the Cloud Console menu, select **VPC Network**\
    \ ➤\n**Firewall** ➤ **Create a new firewall rule**\n(see Figure [10-21](#506047_1_En_10_Chapter.xhtml#Fig21)).\n\
    Targets: **All instances in network**\nSource IP ranges: **0.0.0.0/0**\nSpecified\
    \ ports: **tcp > 3000**\n\nClick **Create**.\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig21_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig21_HTML.jpg)\n\
    \nFigure 10-21\nOpening up a firewall for port 3000\n\nAttach a Domain Name to\
    \ Your VM\nFrom the Cloud Console menu, select **VPC Networks** ➤\n**External\
    \ IP addresses**.\nYou should see your new VM instance. We will now reserve a\
    \ static IP\naddress so we can bind this later to a domain.\nSet the type from\
    \ Ephemeral to **Static**.\nThis will reserve a static IP address, which means\
    \ that you won’t\nlose your current IP address after rebooting your VM. Make a\
    \ note of\nthis address.\nTo make this tutorial work, you will need a valid SSL\
    \ certificate\nprovided by a valid Certificate Authority. If not, Chrome and likely\n\
    other applications, like Dialogflow, will block your website; once your\nwebsite\
    \ is blocked, Dialogflow can’t reach your fulfillment URL, even\nwhen it’s available\
    \ on HTTPS.\nWe will use Certbot with Let’s Encrypt, a free tool to get a free\n\
    valid SSL certificate. However, you will need a domain name that you can\nattach\
    \ to it. If you instead attach the certificate to an IP address,\nyou could create\
    \ a self-signed certificate via OpenSSL; however, you\nwill still need a valid\
    \ Certificate Authority, which you will likely\nneed to order. So instead we will\
    \ go with the domain option.\nYou can buy a domain via [`https://domains.google.com/`](https://domains.google.com/).\n\
    \nI’ve used the following settings, within my domain registrar,\nmtls.conv.dev,\
    \ to create the subdomain mtls:\n\n Mtls |\n A |\n 1h |\n <external compute IP\
    \ address> |\n\nOnce this is linked, we will go back to the Google Cloud console.\n\
    From the Cloud Console menu, select **Compute Engine**\nand **SSH** into the newly\
    \ created VM.\n\nOnce you are logged in, run this command on the command line\
    \ to install\nCertbot:\n\n```\nsudo apt-get install certbot python-certbot-apache\n\
    ```\n\nRun this command to get a certificate and have Certbot edit your Apache\n\
    configuration automatically to serve it, turning on HTTPS access in a\nsingle\
    \ step:\n\n```\nsudo certbot --apache\n```\n\nRestart the Apache server:\n\n```\n\
    sudo /etc/init.d/apache2 restart\n```\n\nNow open a new browser tab, and test\
    \ out your domain name. It should\nbring you to the default Apache setup (see\
    \ Figure [10-22](#506047_1_En_10_Chapter.xhtml#Fig22)).\n\n![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig22_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig22_HTML.jpg)\n\
    \nFigure 10-22\nRunning the Apache secure\n\nSet Up Your Node Application\n\n\
    With the infrastructure all set up, let’s write the application code. As\nseen\
    \ earlier in this chapter, we will create a Node.js Express\nimplementation, just\
    \ like we did before.\n\n```\nsudo mkdir /var/www/projects\nsudo chown $USER /var/www/projects\n\
    cd /var/www/projects\nnano index.js\n```\n\nUse the following contents of Listing\
    \ [10-20](#506047_1_En_10_Chapter.xhtml#Par242):\n***Listing 10-20.*** Setting\
