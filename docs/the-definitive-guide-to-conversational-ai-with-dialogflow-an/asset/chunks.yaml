    ## Using Local Webhooks


    Running your fulfillment locally can be handy during development, as you don''t
    need to deploy your solution. We can use the tool `ngrok` for this. You can download
    it from npm.


    Figure 10-15 shows how it works. The user interacts with the Dialogflow agent.
    Once Dialogflow will need to fetch fulfillment, it will connect to `ngrok.io`
    to execute your local webhook code.


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig15_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig15_HTML.jpg)


    Figure 10-15: Testing fulfillment locally with `ngrok.io`


    ### Ngrok


    `Ngrok` allows you to expose a web server running on your local machine to the
    Internet. Just tell `ngrok` what port your web server is listening on. If you
    don''t know what port your web server is listening on, it''s probably port 80,
    the default for HTTP.


    You can run the following command from your local fulfillment webhook code folder
    in the command line to expose your webhook:


    ```

    ngrok http 80

    ```


    When you start `ngrok`, it will display the public URL of your tunnel and other
    status and metrics information about connections made over your tunnel:


    ```

    Tunnel Status                 online

    Version                       2.0/2.0

    Web Interface                 http://127.0.0.1:4040

    Forwarding                    http://92832de0.ngrok.io -> localhost:80

    Forwarding                    https://92832de0.ngrok.io -> localhost:80

    Connections                  ttl     opn     rt1     rt5     p50     p90

    0       0      0.00    0.00    0.00    0.00

    ```


    The generated forwarding **HTTPS URL** is what you will need to type into your
    Webhook section in the Dialogflow Fulfillment page; see Figure 10-16.


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig16_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig16_HTML.jpg)


    Figure 10-16: Webhooks with `ngrok`


    When you run the `ngrok` command from your local app code folder, it connects
    to the `ngrok` cloud service, which accepts traffic on a public address and relays
    that traffic through to the `ngrok` process running on your machine and then on
    to the local address you specified.


    **Tip:** On the `ngrok` free plan, `ngrok`''s URLs are randomly generated and
    temporary. If you want to use the same URL every time, you need to upgrade to
    a paid plan to use the subdomain option for a stable URL with HTTP or TLS tunnels
    and the remote-addr option for a stable address with TCP tunnels.


    ## Testing Your Fulfillment Without Dialogflow and ngrok


    It''s also possible to test your webhook code without connecting to Dialogflow
    and without using `ngrok`. This makes sense if you just want to test your local
    code, which can be handy while writing the code. We can do this by posting stub
    JSON files to your webhook (pretending that it''s Dialogflow).


    In the Dialogflow console, click **Fulfillments** ➤ **Diagnostic Info**. Copy
    and paste the contents of the Fulfillment request tab. Store this in a local file:
    `stub.json`. This JSON code is unique to your agent as it includes session ids,
    project names, and intent and response ids unique to your agent.


    Once you have the `stub.json` file, you can make a **Curl** POST call from your
    command line, which uses the stub file as a POST message:


    ```

    curl -X POST -H "Content-Type: application/json" -d @stub.json http://localhost:8080/fulfillment

    ```


    This will execute your local code.


    ## Securing Webhooks


    It''s possible to secure your fulfillment webhook so that only you or your Dialogflow
    agent is authorized to make requests. The following mechanisms for authentication
    are supported:


    - Basic authentication with login and password

    - Authentication with authentication headers

    - Mutual TLS authentication


    **Note:** Dialogflow is a conversational tool for NLP, intent matching, and parameter
    slot filling. It does not come with a CMS and therefore it won''t have a user
    login system or OAuth implementation.


    ### Basic Authentication


    Basic access authentication is a method for an HTTP user agent (such as a web
    browser) to provide a user and password when making a request. In basic HTTP authentication,
    a request contains a header field with the following format: `Authorization: Basic
    <credentials>`, where credentials are the Base64 encoding of ID and password joined
    by a single colon.


    It provides no confidentiality protection for the transmitted credentials. They
    are merely encoded with Base64 in transit but not encrypted or hashed in any way.
    Therefore, basic authentication is typically used in conjunction with HTTPS to
    provide confidentiality. Luckily, both happen out of the box with Dialogflow.
    Dialogflow webhooks only allow HTTPS URLs.


    You can set up **Basic Auth** in the Dialogflow Fulfillment page; see Figure 10-17.
    Besides the URL, you will have to specify the user id and the password.


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig17_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig17_HTML.jpg)


    Figure 10-17: A secure webhook in Dialogflow


    Using the Basic Auth options in Dialogflow also requires you to handle the access
    controls in your fulfillment webhook. Let''s assume you have built a back end
    with Node.js and Express. Express has a basic auth middleware plugin. The middleware
    will check incoming requests for a basic auth (Authorization) header, parse it,
    and check if the credentials are legit. If a request is not authorized, it will
    respond with HTTP 401 and a configurable body (default empty).


    In Listing 10-18, the middleware will check incoming requests to match the credentials
    `admin:supersecret`, which were passed into the Dialogflow Webhook, Basic Auth
    fields.


    ```

    const app = require(''express'')()

    const basicAuth = require(''express-basic-auth'')

    app.use(basicAuth({

    users: { ''admin'': ''supersecret'' }

    }));

    ```


    Listing 10-18: Basic authentication in your webhook


    ### Authentication with Authentication Headers


    HTTP provides a general framework for access control and authentication. The most
    common HTTP authentication is based on the "Basic Auth" schema, as you have seen
    in the previous section. But there are other schemes as well, such as Bearer JWT
    Tokens or Digest. Dialogflow allows you to specify your own custom headers, which
    you can use for authentication or, for example, to set character encoding.


    You can set up custom **headers** on the Dialogflow Fulfillment page. Besides
    the URL, you will have to specify the header key and value.


    Listing 10-19 shows an example of checking if a header is present in the fulfillment
    webhook code. A custom header with the key `x-auth` and the value `true` has been
    set in the Dialogflow console. This code checks if this header is present; if
    not, it sends a 403 HTTP error, which means that the webhook code understands
    the request but refuses to authorize it.


    ```

    app.use(function(req, res, next) {

    if (!req.headers[''x-auth'']) {

    return res.status(403).json({ error: ''No auth headers sent!''});

    }

    next();

    });

    ```


    Listing 10-19: Header authentication in your webhook


    Figure 10-18 shows how to configure the Dialogflow webhook in order to work with
    the code of Listing 10-19. Note the `x-auth` header.


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig18_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig18_HTML.jpg)


    Figure 10-18: A secure webhook with headers


    **Tip:** If you want to work with Bearer JWT tokens, you might wonder how to set
    the headers, since the JWT token should change all the time. Typically, the headers
    look like `Authorization - Token token=''yourtokenhere''`. To set these in the
    Dialogflow console won''t make much sense. You would likely want to do this programmatically.
    With the Dialogflow SDK, it is possible to call the `updateFulfillment` method,
    which allows you to pass in a Fulfillment with a `GenericWebservice`. How would
    you receive a new JWT token/redirect? Maybe by putting your chatbot integration
    behind a web login? It also means that your code implementation will need to check
    the JWT tokens and provide JWT tokens since Dialogflow won''t do this.


    ### Mutual TLS Authentication


    The network traffic initiated by Dialogflow for webhook requests is sent on a
    public network. To ensure that traffic is both secure and trusted in both directions,
    Dialogflow optionally supports Mutual TLS authentication (mTLS). With mTLS, both
    the client (Dialogflow) and the server (your webhook server) present a certificate
    during a TLS handshake, which mutually proves identity.


    You won''t need to configure mTLS in the Dialogflow console, but you will have
    to do this on the fulfillment webhook server. Typically, you won''t configure
    this in your Node.js app code since Node.js apps in production will always be
    behind a server such as Apache, NGINX, or maybe a cloud load balancer. That''s
    the place where you will configure your server, and when a TLS handshake proves
    mutually, then forward the request to your Node.js app code on a different port
    (on HTTP).


    The configuration will have the following requirements:


    - Your app code will need a valid secure SSL certificate.

    - You will need to download the root CA that Dialogflow is using.


    #### Valid Secure SSL Certificate


    Web pages and apps which run over HTTPS require a valid SSL certificate. There
    are two ways how you can get these for free, but there are some caveats:


    - You can generate self-signed certificate requests with **OpenSSL**; however,
    the CA won''t be trusted. You could add the certificate to your browser or OS
    certificates keychain store, but everyone using this public IP will have to take
    these steps. It''s possible to sign your certificate by a trusted authority such
    as GlobalSign; this will cost money. Dialogflow mTLS won''t work without a trusted
    CA.

    - Use a tool like **Let''s Encrypt**. It can generate trusted certificates with
    trusted CAs for free; however, you will need to connect a domain to your public
    IP.


    Figure 10-19 shows how it looks like if your SSL certificate is secure.


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig19_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig19_HTML.jpg)


    Figure 10-19: A secure website with an SSL certificate


    #### Root CA


    Run the following two commands on your command line to download the root CA which
    will be used by Dialogflow. This will add `GTS101.crt` and `GSR2.crt` to the local
    file: `ca-crt.pem`:


    ```

    curl https://pki.goog/gsr2/GTS1O1.crt | openssl x509 -inform der >> ca-crt.pem

    curl https://pki.goog/gsr2/GSR2.crt | openssl x509 -inform der >> ca-crt.pem

    ```


    Here''s an example on how to enable mTLS for Apache2. These settings belong in
    the `ssl.conf`:


    ```

    SSLVerifyClient require

    SSLVerifyDepth 2

    SSLCACertificateFile "ca-crt.pem"

    ```


    And this is the access control, which will make sure that only `Dialogflow.com`
    can call the fulfillment webhook:


    ```

    Require all denied

    ```


    ### HTTPS Authentication Setup with Apache


    Instead of setting up HTTP authentication in your (Node.js) app code, you will
    fix this on the server side. To password-protect a directory on an Apache server,
    you will need a `.htaccess` and a `.htpasswd` file. The `.htaccess` file typically
    looks like this:


    ```

    AuthType Basic AuthName "Access to the staging site"

    AuthUserFile /path/to/.htpasswd Require valid-user

    ```


    The `.htaccess` file references a `.htpasswd` file in which each line consists
    of a username and a password separated by a colon (":"). You cannot see the actual
    passwords as they are encrypted (md5 in this case). Note that you can name your
    `.htpasswd` file differently if you like, but keep in mind this file shouldn''t
    be accessible to anyone. (Apache is usually configured to prevent access to .ht*
    files).


    For example:


    ```

    admin:$apr1$ZjTqBB3f$IF9gdYAGlMrs2fuINjHsz.

    ```


    ### A Full Example for Setting Up Mutual TLS Authentication


    HTTPS is the secured version of HTTP (HyperText Transfer Protocol). HTTP is the
    protocol used by your browser and web servers to communicate and exchange information.
    When that exchange of data is encrypted with SSL/TLS, then we call it HTTPS. The
    "S" stands for Secure.


    Anytime you use a web browser to connect to a secure site (`https://something`),
    you''re using Transport Layer Security (TLS). TLS is the successor to SSL, and
    it''s an excellent standard with many features. TLS guarantees the server''s identity
    to the client and provides a two-way encrypted channel between the server and
    the client.


    But for a webhook application such as Dialogflow, that''s not enough since your
    application is the server, and you want to confirm the client''s identity, Dialogflow.
    What''s the solution? Mutual TLS to the rescue! It''s an optional feature for
    TLS. It enables the server to authenticate the identity of the client.


    Deployed Cloud Run apps (HTTPS or gRPC) and serverless cloud functions will provide
    a valid "server cert" trusted by root CA stores. Cloud Run and Cloud Functions
    don''t support bring-your-own cert. Cloud Run''s `.run.app` URLs provide their
    own valid TLS server cert.


    Suppose mTLS authentication is required for your webhook. In that case, you may
    want to consider one of the following Google Cloud solutions: Compute Engine (VMs),
    Google Kubernetes Engine (Containers), or Cloud Run on Anthos (Cloud Run container
    on GKE with Istio).


    Here''s how to set up a Dialogflow fulfillment VM on Compute Engine with mTLS
    enabled.


    #### Create a Node.js VM on Compute Engine


    Create a Node.js VM with the following steps:


    From the Cloud Console menu, select **Marketplace**. Choose **Node.js by Google
    Click to deploy image (VM)** (see Figure 10-20).


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig20_HTML.png](images/506047_1_En_10_Chapter/506047_1_En_10_Fig20_HTML.png)


    Figure 10-20: Node.js Compute VM in Google Cloud


    Select a region. Make sure HTTP and HTTPS is checked.


    From the Cloud Console menu, select **VPC Network** ➤ **Firewall** ➤ **Create
    a new firewall rule** (see Figure 10-21).


    - Targets: **All instances in network**

    - Source IP ranges: **0.0.0.0/0**

    - Specified ports: **tcp > 3000**


    Click **Create**.


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig21_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig21_HTML.jpg)


    Figure 10-21: Opening up a firewall for port 3000


    #### Attach a Domain Name to Your VM


    From the Cloud Console menu, select **VPC Networks** ➤ **External IP addresses**.
    You should see your new VM instance. We will now reserve a static IP address so
    we can bind this later to a domain.


    Set the type from Ephemeral to **Static**. This will reserve a static IP address,
    which means that you won''t lose your current IP address after rebooting your
    VM. Make a note of this address.


    To make this tutorial work, you will need a valid SSL certificate provided by
    a valid Certificate Authority. If not, Chrome and likely other applications, like
    Dialogflow, will block your website; once your website is blocked, Dialogflow
    can''t reach your fulfillment URL, even when it''s available on HTTPS.


    We will use Certbot with Let''s Encrypt, a free tool to get a free valid SSL certificate.
    However, you will need a domain name that you can attach to it. If you instead
    attach the certificate to an IP address, you could create a self-signed certificate
    via OpenSSL; however, you will still need a valid Certificate Authority, which
    you will likely need to order. So instead we will go with the domain option.


    You can buy a domain via `https://domains.google.com/`.


    I''ve used the following settings, within my domain registrar, `mtls.conv.dev`,
    to create the subdomain `mtls`:


    | Mtls | A | 1h | <external compute IP address> |


    Once this is linked, we will go back to the Google Cloud console. From the Cloud
    Console menu, select **Compute Engine** and **SSH** into the newly created VM.


    Once you are logged in, run this command on the command line to install Certbot:


    ```

    sudo apt-get install certbot python-certbot-apache

    ```


    Run this command to get a certificate and have Certbot edit your Apache configuration
    automatically to serve it, turning on HTTPS access in a single step:


    ```

    sudo certbot --apache

    ```


    Restart the Apache server:


    ```

    sudo /etc/init.d/apache2 restart

    ```


    Now open a new browser tab, and test out your domain name. It should bring you
    to the default Apache setup (see Figure 10-22).


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig22_HTML.jpg](images/506047_1_En_10_Chapter/506047_1_En_10_Fig22_HTML.jpg)


    Figure 10-22: Running the Apache secure


