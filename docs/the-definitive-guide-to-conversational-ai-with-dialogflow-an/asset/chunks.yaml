    4.  由于此应用处理语音，我需要设置 `audioConfig` 对象。`audioConfig` 对象需要指定采样率赫兹（此数值必须与客户端代码中的 `desiredSampleRateHertz`
    一致）。它还需要一个 `languageCode`，用于指定语音文本的语言，且该语言必须在 Dialogflow 中已设置。此外，还需要指定编码方式，该编码也必须与客户端使用的编码一致。在我的自助服务终端代码演示中，我使用的是来自
    `.env` 文件的配置。


    现在，让我们来看看 `DetectIntent` 和 `StreamingDetectIntent` 这两个调用。


    ## `DetectIntent`


    在 Dialogflow 检测到意图后，后端应用会在所有音频发送并处理完毕后收到意图匹配结果。我创建了一个异步函数，该函数接收 `AudioBuffer`
    并将其添加到请求中。接着，我通过传入请求来调用 `detectIntent`。它会返回一个 promise，该 promise 支持链式调用。


    ```

    async function detectIntent(audio){

    request.inputAudio = audio;

    const responses = await sessionClient.detectIntent(request);

    return responses;

    };

    清单 12-7

    使用 Socket.IO 将音频流从前端发送到后端

    ```


    这将返回一个 `DetectIntentResponse`。它包含一个 `queryResult`。如果你在 `DetectIntentRequest` 中传入了输出音频配置，你将能够检索到根据
    `queryResult.fulfillmentMessages` 字段中的默认平台文本响应值生成的音频数据字节。如果存在多个默认文本响应，生成音频时会将它们拼接起来。如果没有默认平台文本响应，则生成的音频内容将为空。


    ## `StreamingDetectIntent`


    `StreamingDetectIntent` 执行双向流式意图检测：在发送音频的同时接收结果。此方法仅通过 gRPC API（而非 REST）可用。


    1.  我创建了一个异步函数，该函数接收 `AudioBuffer` 并将其添加到请求中，回调函数的名称将在 API 获取结果后执行。

    2.  执行 `streamingDetectIntent()` 调用。

    3.  有一个 `on(''data'')` 事件监听器，在音频块流入时执行。你可以在此处创建一些条件逻辑；如果响应中存在 `data.recognitionResult`，则识别出中间转录文本。否则，很可能已检测到意图（或者，如果没有匹配项，则触发了回退意图）。我通过执行回调函数来返回结果。

    4.  当请求出现问题时，你还可以监听 `error` 事件。或者，当流向 Dialogflow 的流停止时，你可以监听 `end` 事件。

    5.  其工作原理是，我们将告知 Dialogflow API 将有一个 `streamingDetectIntent` 调用，其中包含可从请求中检索到的所有
    `queryInput` 和 `audioConfigs`。之后，所有传入的其他消息将通过 `inputAudio` 包含音频流。

    6.  让我们使用一个名为 `pump` 的小型 node 模块，它将流管道连接在一起，并在其中一个流关闭时销毁所有流。

    7.  在这里，我将对流进行转换，以便请求现在也包含带有 `audioBuffer` 流的 `inputAudio`。


    ```

    // 1)

    async function detectIntentStream(audio, cb) {

    // 2)

    const stream = sessionClient.streamingDetectIntent()

    .on(''data'', function(data){

    // 3)

    if (data.recognitionResult) {

    console.log(

    `中间转录文本:

    ${data.recognitionResult.transcript}`

    );

    } else {

    console.log(`检测到意图:`);

    cb(data);

    }

    })

    // 4)

    .on(''error'', (e) => {

    console.log(e);

    })

    .on(''end'', () => {

    console.log(''流结束'');

    });

    // 5)

    stream.write(request);

    // 6)

    await pump(

    audio,

    // 7)

    new Transform({

    objectMode: true,

    transform: (obj, _, next) => {

    next(null, { inputAudio: obj, outputAudioConfig: {

    audioEncoding: `OUTPUT_AUDIO_ENCODING_LINEAR_16`

    } });

    }

    }),

    stream

    );

    };

    清单 12-8

    基于音频流检测意图

    ```


    这将返回一个 `StreamingIntentResponse`。它包含一个 `queryResult`。如果你在 `StreamingDetectIntentRequest`
    中传入了输出音频配置，你将能够检索到根据 `queryResult.fulfillmentMessages` 字段中的默认平台文本响应值生成的音频数据字节。如果存在多个默认文本响应，生成音频时会将它们拼接起来。如果没有默认平台文本响应，则生成的音频内容将为空。


    ## 从 Dialogflow 检索音频结果并在浏览器中播放


    当你进行文本转语音调用时，无论是使用 Google Cloud Text-to-Speech API 还是 Dialogflow 内置的语音返回功能，它都会返回音频字节数据。Cloud
    TTS 和 Dialogflow 都可以从服务器端代码调用。为了在浏览器中流式传输并播放这些音频，你可以使用 WebSockets。一旦 `AudioBuffer`（在浏览器的
    JavaScript 代码中为 `ArrayBuffer`）返回给客户端，就可以使用 WebRTC 方法进行播放。


    图 12-4 是一个使用 Dialogflow 的浏览器流程示例。在此示例中，用户对着麦克风说话（类似于前面的示例），但 Dialogflow 返回一个 `AudioBuffer`
    作为结果。


    ![../images/506047_1_En_12_Chapter/506047_1_En_12_Fig4_HTML.jpg](img/506047_1_En_12_Fig4_HTML.jpg)


    **图 12-4** 用户将语音从客户端应用流式传输到连接到 Dialogflow 的服务器应用。一旦 Dialogflow 匹配到意图，结果音频流将被发送回客户端应用，以便在浏览器中播放


    现在，是时候关注最后一部分了：确保我们从 Dialogflow 获取到作为检测结果的音频缓冲区，通过 Socket.IO 将其流式传输回客户端，并确保它能自动播放。


    Dialogflow 在检测到意图后也可以返回 `AudioBuffer`。你只需要在 Dialogflow 的 `DetectIntentRequest`
    中指定一个 `outputAudioConfig`，即可在响应中同时获得一个 `AudioBuffer`：


    ```

    outputAudioConfig: {

    audioEncoding: `OUTPUT_AUDIO_ENCODING_LINEAR_16`,

    },

    ```


    检测意图请求的响应类型是 `DetectIntentResponse`。通常，当你使用文本内容检测意图时，它会填充 `queryResult` 中的 `fulfillmentMessages`
    字段。但是，当你提供语音音频作为内容时，`DetectIntentResponse.outputAudio` 字段会根据 `DetectIntentResponse.queryResult.fulfillmentMessages`
    字段中的默认平台文本响应值填充音频。如果存在多个默认文本响应，生成音频时会将它们拼接起来。如果没有默认平台文本响应，则生成的音频内容将为空。


    ## 用于播放音频的客户端代码


    在你的客户端应用中，你需要确保再次加载 `socket.io` 和 `socket.io-stream`。Socket.IO 是一个实时的、基于双向事件的通信库。它使用的传输方式之一是
    WebSockets，但它也提供其他传输方式（XHR/JSONP），不仅作为回退方案，也适用于不支持/不需要/不想要 WebSockets 的情况。


    你可以从 CDN 加载它。


    ```

    清单 12-9

    从 CDN 加载 Socket.IO

    ```

