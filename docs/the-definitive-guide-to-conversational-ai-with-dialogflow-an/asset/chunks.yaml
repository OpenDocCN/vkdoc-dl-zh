    \  `https://cloud.google.com/dialogflow/es/docs/contexts-overview`\n- Dialogflow\
    \ 输入与输出上下文相关文档\n  `https://cloud.google.com/dialogflow/es/docs/contexts-input-output`\n\
    - Dialogflow 后续意图相关文档\n  `https://cloud.google.com/dialogflow/es/docs/contexts-follow-up-intents`\n\
    \  `https://cloud.google.com/dialogflow/es/docs/reference/follow-up-intent-expressions`\n\
    - SDK 中设置与获取上下文的文档\n  `https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2beta1#google.cloud.dialogflow.v2beta1.Contexts`\n\
    \n# 使用模板构建聊天机器人\n\n有一些工具可以帮助快速构建智能体；它们类似于模板组件。有一些开箱即用的智能体可供启用（预构建智能体）；还可以启用闲聊功能，以支持非正式对话。此外，还可以通过知识库功能，从（私有）CSV\
    \ 文件或公共网站导入常见问题解答。本章将涵盖所有这些内容。\n\n## 创建预构建智能体\n\n一个**预构建智能体**通常包含已配置好参数和实体的示例意图。它会针对多种语言进行配置，因此非常实用。它不包含\
    \ fulfillment webhook 逻辑，因为这需要 Cloud Function 或后端支持。但它对于快速启动一个包含多种语言示例的项目非常有用！\n\
    \n如图 4-1 所示，当你在 Dialogflow ES 菜单中点击**预构建智能体**时，你将看到所有预构建智能体的概览。这就像一个市场！有超过 40\
    \ 个预构建智能体可供选择。例如货币转换器、银行、食品配送、航班等预构建智能体。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig1_HTML.jpg](img/506047_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1：所有预构建智能体的概览\n\n当你点击一个预构建智能体时，可以请求查看详情，详情会以弹出窗口的形式显示示例意图（图 4-2）。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig2_HTML.jpg](img/506047_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2：一个预构建智能体的示例\n\n将鼠标悬停在你想使用的预构建智能体上，然后点击**导入**。\n\n选择**创建一个新的 Dialogflow\
    \ 项目**，然后点击**确定**。\n\n> **注意：** 你不能将预构建智能体添加到现有的 Dialogflow 智能体中。如果你想要那些意图，可以从设置界面导出/导入意图。\n\
    \n导入智能体后，你可能需要进入**设置**界面，为项目添加一个服务账号。如果需要，系统会提示你。\n\n一旦你的智能体导入完成，你的 Dialogflow\
    \ 项目中就会新增一个智能体，你可以在现有内容的基础上进行优化并添加新的意图。\n"
- fmt: "# Enabling Small Talk Modules\n\n**Small Talk** is an excellent addition to\
    \ your own intents, although they do work a little differently than manual intents.\
    \ With intents, you can provide training phrases, which means you can train your\
    \ chatbot to answer questions even when they are asked in a different way. Small\
    \ Talk and FAQ Knowledge Base Connectors (see further in this chapter) don’t provide\
    \ you with the option to provide training phrases. It uses the Natural Language\
    \ Understanding from Dialogflow to understand what was asked. Typically, this\
    \ works fine; for example, the small talk sentence “You are funny” will also be\
    \ answered when you say: “Haha, you are hilarious.” But when you ask “Do you exist?”,\
    \ it won’t give you the answer to “Are you real?”.\n\nEven when you don’t provide\
    \ answers on the Small Talk customization page, it will use out-of-the-box answers.\
    \ Customization basically means you are overruling the standard Dialogflow small\
    \ talk answers.\n\n**Caution**\n\nAlthough it’s very nice to create a humanlike\
    \ conversation in the chatbot additional to your own intents, you will have to\
    \ be careful with specific small talk phrases, for example, confirmation phrases\
    \ such as “Yes,” “No,” and “Cancel.” These can answer like “Good!”, but they don’t\
    \ execute code out of the box and don’t keep the conversation going. They do set\
    \ a POST action, such as `smalltalk.confirmation.yes`, so it’s up to you to listen\
    \ in your fulfillment code or webhook to these intents.\n\nPeople often answer\
    \ “Yes” or “No” to a question, while the answer didn’t expect a Yes or No. A small\
    \ talk answer is likely not what the user expects. In that case, it’s very important\
    \ that each intent that provides follow-up questions or contexts also provide\
    \ a proper fallback.\n\nAt the time of writing this, small talk is only supported\
    \ for English (`en`), Russian (`ru`), French (`fr`), and Italian (`it`), and it\
    \ won’t work for mega agents.\n\n**Note**\n\nBased on the **Actions on Google**\
    \ policy, enabling Small Talk in its entirety will cause your action to be rejected.\n\
    \nTo enable small talk for your Dialogflow agent, you can click the menu item:\
    \ **Small Talk**. On the Small Talk settings page, you will find a switch to toggle\
    \ the **Enable** switch. This will enable all the small talk topics.\n\nClick\
    \ one of the topics you want to modify the response text for. For example, click\
    \ **About agent**; this will unfold the **question** to be matched with a user\
    \ utterance and the text response **answer** pairs. (See Figure [4-3](#506047_1_En_4_Chapter.xhtml#Fig3).)\n\
    \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig3_HTML.png](images/506047_1_En_4_Chapter/506047_1_En_4_Fig3_HTML.png)\n\
    \nFigure 4-3\n\nEnabling the small talk module\n\nClick **Save**.\n\n## Creating\
    \ an FAQ Knowledge Base\n\nA **knowledge base** represents a collection of knowledge\
    \ documents that you provide to Dialogflow ES. A knowledge document could be an\
    \ FAQ or a text block.\n\n**Knowledge connectors** complement defined intents.\
    \ It is common for an agent using knowledge connectors also to use defined intents.\
    \ Knowledge connectors offer less response precision and control than intents\
    \ similar to Small Talk. It uses the Natural Language Understanding from Dialogflow\
    \ to understand what was asked. Typically, this works fine, but sometimes, especially\
    \ when you are asking questions in a very different way, it won’t find the answer.\
    \ You should define your intents to handle complex user requests and let knowledge\
    \ connectors handle simple requests.\n\nFirst, click the cogwheel next to the\
    \ agent title to open the **Settings screen**.\n\nScroll down to **Beta Features**\
    \ and flip the switch: **Enable beta features and APIs**. (See Figure [4-4](#506047_1_En_4_Chapter.xhtml#Fig4).)\
    \ Click **Save**.\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig4_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4\n\nIn order to use the Knowledge Base Connector, you will have to\
    \ enable the beta features and APIs from the Settings ➤ General screen\n\nClick\
    \ the menu on **Knowledge**.\n\nIn the top bar, you can click the **Create Knowledge\
    \ Base** button, to start adding your first knowledge base (Figure [4-5](#506047_1_En_4_Chapter.xhtml#Fig5)).\n\
    \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig5_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5\n\nCreating a knowledge base\n\nGive the knowledge base a name, for\
    \ example, *Video Games FAQs*, and click **Save**.\n\nA knowledge base can contain\
    \ multiple documents. Click the link **Create the first one** (Figure [4-6](#506047_1_En_4_Chapter.xhtml#Fig6)).\n\
    \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig6_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6\n\nCreating knowledge documents\n\nIn the pop-up screen (Figure [4-7](#506047_1_En_4_Chapter.xhtml#Fig7)),\
    \ you can add the following information:\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig7_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7\n\nThe document settings pop-up screen\n\n*   You can give the document\
    \ a name, for example, *Internal VideoGames FAQs* or *Public VideoGame FAQs from\
    \ IGN.com*.\n*   You can select a knowledge type:\n    *   **FAQ**: A question\
    \ with an answer\n    *   **Extensive Question Answering**: Let Dialogflow understand\
    \ the question based on an article/text block\n*   Mime type:\n    *   `text/html`:\
    \ In case you want to import FAQs from a public website.\n    *   `text/csv` (CSV\
    \ files): This could be a database export.\n*   As a data source, you can choose\
    \ between the following:\n    *   **File on Cloud Storage**: This is meant for\
    \ private CSV files (secure) stored in Google Cloud Storage.\n    *   **URL**:\
    \ The URL to a public website to import FAQs from.\n    *   **Upload file from\
    \ a computer**: To upload a private CSV file from your disk.\n*   There’s an **Enable\
    \ Auto Reload** checkbox that allows Dialogflow to automatically reload the public\
    \ website FAQs to ensure you are fetching FAQs that are new or changed.\n\nWhen\
    \ you press the **Create** button, Dialogflow will start crawling/importing the\
    \ Questions and Answer pairs. When it’s done, you will see the document in the\
    \ knowledge base documents overview. (See Figure [4-8](#506047_1_En_4_Chapter.xhtml#Fig8).)\
    \ In this view, it’s possible to delete or add more documents.\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig8_HTML.jpg](images/506047_1_En_4_Chapter/506047_1_En_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8\n\nOverview of knowledge documents\n\nAt this moment, you are not\
    \ done yet. You will need to tell Dialogflow what answer it should return. Click\
    \ the **Add Response** link. It will already prefill an answer for you, `$Knowledge.Answer[1]`,\
    \ which means the first answer with the highest confidence level (Figure [4-9](#506047_1_En_4_Chapter.xhtml#Fig9))."
