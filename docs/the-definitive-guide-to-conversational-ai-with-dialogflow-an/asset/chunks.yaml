    ## 11. 使用 Dialogflow SDK 创建自定义集成\n\n在上一章中，我们介绍了 webhook；它们在意图匹配后执行意图以返回动态代码。你可以使用\
    \ Dialogflow 实现库来执行此操作，或者直接从发布的 Dialogflow 请求中检索结果。它执行你自己的（后端）代码。在 Dialogflow\
    \ 集成完成意图检测后，你无需手动调用 `detectIntent` 方法。\n\nDialogflow 还提供了一个 SDK，当你想要构建自己的集成，而不是使用\
    \ Dialogflow 中现成的集成时，这会非常方便。例如，在你自己的移动应用中、自己的硬件上实现聊天机器人，并将其集成到你自己的网站中。这意味着你将需要手动调用/提供以下步骤（参见图\
    \ 11-1）："
- fmt: "![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig1_HTML.jpg](images/506047_1_En_11_Chapter/506047_1_En_11_Fig1_HTML.jpg)\n\
    \n**Figure 11-1**  \nThe architecture of a custom integration. From a UI implementation\
    \ to a back-end app that communicates with the Dialogflow SDK\n\n- UI implementation\
    \ for the integration (front end) typically includes a `textarea` field to display\
    \ responses and an input field to enter utterances.\n- Implementation back end\
    \ which integrates the Dialogflow SDK for:\n  - Session management\n  - Authentication\n\
    \  - Intent detection (`detectIntent`)\n  - Returning responses\n  - Rich responses\
    \ in the UI of the implementation.\n\nYour user talks to the UI of your integration\
    \ (e.g., your website front end). The UI passes the typed chatbot messages (or\
    \ incoming audio streams) to the back-end integration. The back-end integration\
    \ talks to the Dialogflow SDK. Dialogflow returns answers to the back-end code,\
    \ and the back-end code sends it back to the UI so that the UI can display the\
    \ chatbot responses on the screen. An additional advantage of taking this approach\
    \ is that it also won’t expose your service account (authentication keys) to the\
    \ front end, which is what you should not want, as hackers could easily read and\
    \ use your keys.\n\n## Implementing a Custom Chatbot in Your Website Front End,\
    \ Setup\n\nTo implement a custom integration, for example, on a website, you will\
    \ need to make sure you have the Dialogflow API enabled:\n\n```\ngcloud services\
    \ enable dialogflow.googleapis.com\n```\n\nIt also requires you to download the\
    \ Dialogflow Integrations service account to your hard disk and assign it to the\
    \ `GOOGLE_APPLICATION_CREDENTIALS` environment variable.\n\nAfterward, you will\
    \ need to make sure you are logged in with the command-line tools to the right\
    \ project:\n\n```\ngcloud init\n```\n\nWhen you don’t take these steps, you will\
    \ get this error:\n\n```\n(node:95119) UnhandledPromiseRejectionWarning:\nError:\
    \ 7 PERMISSION_DENIED: IAM permission 'dialogflow.sessions.detectIntent' on 'projects/project-id/agent'\
    \ denied.\n```\n\nReview Chapter [1](#506047_1_En_1_Chapter.xhtml) on how to configure\
    \ your Dialogflow project for more information.\n\n## UI Implementation\n\nListing\
    \ [11-1](#506047_1_En_11_Chapter.xhtml#PC4) shows an example of an HTML page that\
    \ includes a Dialogflow chatbot UI. In the real world, you probably might want\
    \ to use a client-side framework such as Angular, but to keep this demo simple,\
    \ let’s keep it nice and compact.\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n  \
    \  <title>Custom Web Chat</title>\n    <script src=\"/socket.io/socket.io.js\"\
    ></script>\n    <link rel=\"stylesheet\" type=\"text/css\" href=\"style.css\"\
    >\n</head>\n<body>\n    <h1>Custom Web Chat</h1>\n    <form id=\"chatForm\">\n\
    \        <ul id=\"messages\"></ul>\n        <input type=\"text\" id=\"queryText\"\
    \ placeholder=\"Type your message...\">\n        <button id=\"submit\">Send</button>\n\
    \    </form>\n    <script>\n        //a) Load socket io\n        const socketio\
    \ = io();\n        //b) Once socket.io made a connection with a server app,\n\
    \        // execute this block\n        const socket = socketio.on('connect',\
    \ function() {\n            console.log('connected');\n            //c) Run this\
    \ block when the server responds with a fulfillment\n            socketio.on('returnResults',\
    \ function (data) {\n                var objDiv = document.getElementById(\"ca\"\
    );\n                console.log(data);\n                //d) If there are queryResults\
    \ then dynamically\n                // create list items to append to the messages\
    \ list.\n                if(data[0].queryResult){\n                    var agent\
    \ = document.createElement(\"li\");\n                    agent.className = 'balloon\
    \ agent';\n                    agent.innerHTML = data[0].queryResult.fulfillmentText;\n\
    \                    messages.appendChild(agent);\n                    objDiv.scrollTop\
    \ = objDiv.scrollHeight;\n                }\n            });\n            //welcome\n\
    \            socketio.emit('welcome');\n        });\n        //e) Create some\
    \ pointers to other HTML elements\n        const textarea = document.getElementById('textarea');\n\
    \        const textInput = document.getElementById('queryText');\n        const\
    \ submitBtn = document.getElementById('submit');\n        const messages = document.getElementById('messages');\n\
    \        //f) On submit of a user utterance,\n        // create list items to\
    \ append to the messages list.\n        submitBtn.onclick = function(e) {\n  \
    \          e.preventDefault();\n            socketio.emit('message', textInput.value);\n\
    \            var user = document.createElement(\"li\");\n            user.className\
    \ = 'balloon user';\n            user.innerHTML = textInput.value;\n         \
    \   messages.appendChild(user);\n            textInput.value = \"\";\n       \
    \ }\n    </script>\n</body>\n</html>\n```\n\n**Listing 11-1**  \nAn example of\
    \ a chatbot UI in HTML\n\nThere are a couple of crucial points to notice when\
    \ viewing this code:\n\n1.  In the header, I am loading a JavaScript file from\
    \ a CDN: `socket.io.js`. Socket.IO enables real-time, bidirectional, and event-based\
    \ communication. It works on every platform, browser, or device, focusing equally\
    \ on reliability and speed.\n2.  The stylesheet, `style.css`, will load some lovely\
    \ styles to make the user and agent text look like text balloons.\n3.  In the\
    \ body of the HTML document, I am creating a form element. This form element will\
    \ contain a list of chatbot messages. These are user messages and Dialogflow agent\
    \ messages.\n4.  The form also contains an input text field with a submit button;\
    \ this allows the user to type questions to the chatbot.\n5.  Now there’s some\
    \ client-side JavaScript to run:\n    1.  First, load the Socket.IO JavaScript\
    \ object.\n    2.  Once Socket.IO made a connection with a server app, execute\
    \ this block of code.\n    3.  Run this block when the server responds with a\
    \ fulfillment.\n    4.  If there are `queryResults`, then dynamically create list\
    \ items to append to the messages list.\n    5.  Create some pointers to other\
    \ HTML elements.\n    6.  On submit of a user utterance, create list items to\
    \ append to the messages list.\n\n## Back-End Implementation\n\nNow let’s move\
    \ on to the back-end code. It’s a Node.js Express application.\n\nFor this project,\
    \ we will make use of the npm libraries in Listing [11-2](#506047_1_En_11_Chapter.xhtml#PC5).\n\
    \n```\n{\n    \"name\": \"dialogflow-custom-integration\",\n    \"version\": \"\
    1.0.0\",\n    \"author\": \"Lee Boonstra\",\n    \"license\": \"Apache-2.0\",\n\
    \    \"description\": \"Custom Web integration with the Dialogflow SDK\",\n  \
    \  \"engines\": {\n        \"node\": \">=10.9.0 <=12.18.3\"\n    },\n    \"scripts\"\
    : {\n        \"start\": \"node app.js\"\n    },\n    \"private\": true,\n    \"\
    dependencies\": {\n        \"cors\": \"^2.8.5\",\n        \"dialogflow\": \"^0.14.1\"\
    ,\n        \"dotenv\": \"^8.2.0\",\n        \"express\": \"^4.17.1\",\n      \
    \  \"socket.io\": \"^2.3.0\",\n        \"uuid\": \"^3.3.3\"\n    }\n}\n```\n\n\
    **Listing 11-2**  \nBack-end `package.json`, containing all the libraries\n\n\
    Here’s the code which will run the chatbot back-end integration.\n\n1.  These\
    \ system variables can be set from the command line with"
