- fmt: "Figure [12-2](#506047_1_En_12_Chapter.xhtml#Fig2) will show you how the architecture\
    \ of this voice integration will look like.\n\n![../images/506047_1_En_12_Chapter/506047_1_En_12_Fig2_HTML.jpg](images/506047_1_En_12_Chapter/506047_1_En_12_Fig2_HTML.jpg)\n\
    \n**Figure 12-2** The user will speak via a microphone in a browser web application.\
    \ This front-end web application will bring the stream to a back-end server which\
    \ will make calls to Dialogflow, Speech-to-Text, and Text-to-Speech.\n\n## Building\
    \ a Client-Side Web Application That Streams Audio from a Browser Microphone to\
    \ a Server\n\nYou will use the `getUserMedia()` WebRTC JavaScript method in your\
    \ browser to capture microphone audio streams. To make sure it works across all\
    \ modern browsers, you could use a library like `RecordRTC`. `RecordRTC` is a\
    \ WebRTC JavaScript library for audio/video as well as screen activity recording.\
    \ It supports Chrome, Firefox, Opera, Android, and Microsoft Edge. Platforms:\
    \ Linux, Mac, and Windows.\n\n> **Note:** When running your application on iOS\
    \ devices, you might run into various problems. First of all, iOS doesn’t support\
    \ the JavaScript `getUserMedia` and WebRTC methods in any other mobile browser\
    \ than Safari. You could show a pop-up warning when it’s opened on an iOS browser\
    \ other than mobile Safari. To use the `getUserMedia()` WebRTC method, you will\
    \ need to allow the permissions pop-up, which only shows up once running from\
    \ HTTPS. One crucial limitation remains on iOS: Web Audio is effectively muted\
    \ until user activation. To play and record audio in iOS, it requires user interaction\
    \ (such as touch start).\n\nOnce we capture the audio, we will need to send the\
    \ stream to a back-end server. So the back-end server can integrate with the Google\
    \ APIs such as Dialogflow. To do this, you can make use of WebSockets or a library\
    \ like `Socket.IO`. `Socket.IO` enables real-time bidirectional event-based communication.\
    \ For binary stream transfers through `Socket.IO`, I am using the `Socket.io-Stream`\
    \ module.\n\n### Build the Front End\n\nFirst, your client-side app/HTML page\
    \ will at least need a button (or two) to stop and start the browser microphone.\
    \ Note Listing [12-1](#506047_1_En_12_Chapter.xhtml#PC1). You could also show\
    \ a text area field for demo purposes, which later can show the returned text\
    \ results.\n\n```\nStart Recording\nStop Recording\n```\n\n**Listing 12-1** The\
    \ HTML elements needed for building a custom voice AI\n\nMake sure you will load\
    \ the `RecordRTC` and `Socket.IO` libraries on your page.\n\nThen you will need\
    \ a piece of JavaScript that can take care of the microphone recording and stream\
    \ the audio object to a back-end server.\n\n1.  First, I will create some pointers\
    \ to the start and stop buttons.\n2.  Next, I am instantiating `Socket.IO`, and\
    \ I am opening a connection.\n3.  I’ve created two event listeners for starting\
    \ and stopping the recording. The start button `onclick` event will disable the\
    \ start button, so you can’t press the button twice and therefore record audio\
    \ twice.\n4.  `navigator.getUserMedia()` is an important part of the code. It’s\
    \ part of a set of WebRTC APIs which provides the means to access the user’s local\
    \ camera/microphone stream. In our case, we only use the microphone (`audio: true`).\
    \ This gives us access to the stream.\n5.  Now, I am making use of the library\
    \ `RecordRTC`. I could have chosen to write this part of the code by myself. But\
    \ `RecordRTC` solves a lot of complicated stuff, such as converting buffers (from\
    \ Float32 to Int16), cross-browser support, and so on.\n6.  `RecordRTC` takes\
    \ two arguments. The first argument is the `MediaStream` from the `getUserMedia()`\
    \ call. The second argument is a configuration object with settings to optimize\
    \ the stream. There are a couple of necessary settings that I am making, which\
    \ should be in line with your settings, later in the server-side code (documentation\
    \ for `InputAudioConfig` in Dialogflow or `RecognitionConfig` in STT):\n    *\
    \   The mime-type is set to `audio/webm`—which would be a right setting when using\
    \ `AUDIO_ENCODING_LINEAR_16` or `LINEAR16` as an `AudioEncoding` config in Dialogflow\
    \ or STT.\n    *   The `sampleRate` is the input sampling frequency in hertz.\
    \ I am resampling it to 16000Hz (`desiredSampleRate`), so the size of the messages\
    \ over the network will be smaller and match the sample hertz setting in my Dialogflow\
    \ or STT calls.\n    *   Also, Dialogflow and STT require mono sound, which means\
    \ I should set the `numberOfAudioChannels` to 1. `RecorderType StereoAudioRecorder`\
    \ allows me to change the number of audio channels from 2 to 1.\n\n```\n//1)\n\
    const startRecording = document.getElementById('start-recording');\nconst stopRecording\
    \ = document.getElementById('stop-recording');\nlet recordAudio;\n//2)\nconst\
    \ socketio = io();\nconst socket = socketio.on('connect', function() {\nstartRecording.disabled\
    \ = false;\n});\n//3)\nstartRecording.onclick = function() {\nstartRecording.disabled\
    \ = true;\n//4)\nnavigator.getUserMedia({\naudio: true\n}, function(stream) {\n\
    //5)\nrecordAudio = RecordRTC(stream, {\ntype: 'audio',\n//6)\nmimeType: 'audio/webm',\n\
