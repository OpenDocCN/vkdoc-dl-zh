  trans: '

    # 参数、响应与实现


    - **参数**：当意图在运行时被匹配时，Dialogflow 会从用户表述中提取值作为*参数*，这些参数可发送至实现代码/后端代码。我们将在下一节详细讨论参数。


    - **响应**：你可以定义返回给最终用户的文本、语音或视觉响应。这些响应可以为最终用户提供答案、向最终用户询问更多信息，或终止对话。


    在我们的示例中，聊天机器人的响应可能是：*哦，在任天堂 Switch 上，我玩《动物森友会》，而在 PlayStation 上，我目前正在玩最新的《星球大战》游戏。*


    可以指定多个不同的响应。Dialogflow 会轮流选择响应，因此你的回答每次都可能不同。另一种响应可以是：*我最近买了《死亡搁浅》游戏，但还没开始玩。*


    响应还可以包含**自定义负载**。某些平台支持自定义负载响应，以处理非标准的高级响应。这些自定义负载以平台文档中定义的 JSON 格式提供。例如，你可以用此创建富卡片。根据你为
    Dialogflow 启用的集成，你会看到不同的响应选项卡用于输入自定义负载。


    响应还有一个**对话结束开关**。你可以指定该响应是否为对话的结束。它将停止对话。例如，在特定平台（如 Google Assistant）上，它会关闭该操作（应用）。


    - **实现开关**：当此对话的答案未在 Dialogflow 中硬编码，而是来自其他系统时，应标记*为此意图启用 webhook 调用*。当意图在运行时被匹配时，Dialogflow
    代理会持续从用户处收集参数，直到用户为所有必需参数提供了数据。此过程称为槽位填充。默认情况下，Dialogflow 在收集完所有必需数据之前不会发送实现 webhook
    请求。如果为槽位填充启用了 webhook，则在槽位填充期间，Dialogflow 会为每次对话轮次发送实现 webhook 请求。


    在实现界面中，你可以设置 webhook。我们将在第 10 章详细讨论实现。


    当你启动一个新的 Dialogflow 项目时，你总会获得两个预定义的意图：一个*欢迎意图*，在开始对话时触发；以及一个全局*回退意图*，当 Dialogflow
    完全无法匹配任何意图时激活。


    一个 Dialogflow 代理可以处理 2k 个不同的意图。如果你需要更多意图，可以考虑使用超级代理功能；参见第 9 章。每个意图每种语言最多可以有 2k
    个训练短语，或每个 Dialogflow 代理每种语言总计最多 100k 个。


    ## 深入理解实体


    **实体**是一个（可变的）消息对象，用于执行操作。它就像一个参数，为特定键收集值。


    在 Dialogflow 中，你可以创建**自定义实体**，或使用**系统实体**。自定义实体可以在 Dialogflow 代理中创建。Dialogflow
    开箱即用地识别系统实体，例如月份名称、货币和国家名称。


    ### 创建自定义实体


    要创建自定义实体，在菜单栏中点击*实体* ➤ *创建实体*。（见图 3-6。）


    在此界面上，你可以为实体命名并列出可能的值。条目的第一个值将用于发送到后端；所有其他值选项（同义词）将用于识别该条目。你可以使用 Tab 键创建更多同义词。


    创建自定义实体后，别忘了点击*保存*按钮。


    我们的聊天机器人目前还没有包含那么多高级逻辑。完成之前的步骤后，你的聊天机器人只能与你进行简单的对话。想象一下，你还可以查询特定游戏机的最新发布日期，例如：


    "这个月有哪些游戏在 **PlayStation 5** 上发布？"


    PlayStation 5 是一个可变部分。我可以询问 PlayStation 5、Xbox Series X、Nintendo Switch 或 Windows，以返回不同的结果。PlayStation
    5 是一个自定义实体。事实上，如果我将此对话连接到 web 服务，它会发送一个参数来过滤响应到后端系统，例如：


    - `platform = PS5`


    为了让 Dialogflow 理解 PlayStation 5 是一个实体，我们需要创建一个包含所有可能选项的实体 `platform`。


    ![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig6_HTML.jpg](img/506047_1_En_3_Fig6_HTML.jpg)


    图 3-6


    创建自定义实体


    有一种更简单的方法来输入所有实体条目。点击保存按钮旁边的三个点（选项按钮），它允许你切换到原始模式。在这里，你可以以 JSON 或 CSV 格式输入条目。清单
    3-1 展示了 JSON 格式的代码示例。


    ```

    JSON:

    [

    {

    "value": "xbox-series-x",

    "synonyms": [

    "xbox-series-x",

    "Xbox Series X",

    "newest xbox",

    "next gen xbox",

    "Microsoft Xbox Series X"

    ]

    },

    {

    "value": "playstation-5",

    "synonyms": [

    "playstation-5",

    "PS5",

    "Next gen PlayStation",

    "newest PlayStation",

    "Sony Playstation 5"

    ]

    },

    {

    "value": "xboxone",

    "synonyms": [

    "xboxone",

    "Xbone",

    "Xbox1",

    "Microsoft Xbox One"

    ]

    },

    {

    "value": "ps4--1",

    "synonyms": [

    "ps4--1",

    "Playstation 4",

    "PS4",

    "Sony Playstation 4"

    ]

    },

    {

    "value": "win",

    "synonyms": [

    "win",

    "PC",

    "Microsoft PC",

    "Windows"

    ]

    },

    {

    "value": "switch",

    "synonyms": [

    "switch",

    "Nintendo Switch"

    ]

    },

    {

    "value": "new-nintendo-3ds",

    "synonyms": [

    "new-nintendo-3ds",

    "N3DS",

    "3DS",

    "Nintendo 3DS",

    "New Nintendo 3DS"

    ]

    }

    ]

    清单 3-1

    JSON 格式的实体示例

    ```


    清单 3-2 展示了 CSV 格式的代码示例。


    ```

    "xbox-series-x","xbox-series-x","Xbox Series X","newest xbox","next gen xbox","Microsoft
    Xbox Series X"

    "playstation-5","playstation-5","PS5","Next gen playstation","newest playstation","Sony
    Playstation 5"

    "xboxone","xboxone","Xbone","Xbox1","Microsoft Xbox one"

    "ps4--1","ps4--1","Playstation 4","PS4","Sony Playstation 4"

    "win","win","PC","Microsoft PC","Windows"

    "switch","switch","Nintendo Switch"

    "new-nintendo-3ds","new-nintendo-3ds","N3DS","3DS","Nintendo 3DS","New Nintendo
    3DS"

    清单 3-2

    CSV 格式的实体示例

    ```


    也可以从实体界面导入或导出实体。点击创建实体按钮旁边的选项（三个点）按钮。点击**上传实体**，选择上传包含实体的 JSON 或 CSV 文件。上传文件需要符合以下规则：


    - 每个条目对应一行。

    - 参考值和同义词之间用逗号分隔。

    - 每个参考值和同义词应使用双引号括起来。

    - 参考值应位于行首。

    - 如果希望参考值被实体匹配，请将其包含两次。


    通过编程方式也可以添加实体。如果你有一个需要从数据库自动导入的庞大实体列表，这将非常有用。


    Dialogflow API 方法 `projects.agent.entityTypes.batchUpdate` 可以实现此功能。


    一个 Dialogflow 代理可以处理 250 个不同的自定义实体。如果你需要更多实体，可以考虑使用超级代理功能；参见第 8 章。每个实体可以有 30K
    个不同的条目，每个实体条目有 200 个同义词。一个 Dialogflow 代理最多有 100 万个实体值和同义词。

