    ## Welcome Message


    A common question that I get all the time from people implementing their own integrations
    is: how can I make sure my chatbot greets the user when opening the chat? It’s
    not so difficult; we can fire events to Dialogflow, and we will do this as soon
    as Socket.IO has a proper connection with a client (which happens after the page
    is loaded). Note Listing [11-4](#506047_1_En_11_Chapter.xhtml#PC16).


    Add to the `index.html` within the connect listener:


    ```

    socketio.emit(''welcome'');

    ```


    Then in your back-end `app.js`, within the connect listener, we will listen to
    welcome messages sent from the UI.


    ```

    client.on(''welcome'', async function() {

    const welcomeResults = await detectIntentByEventName(''welcome'');

    client.emit(''returnResults'', welcomeResults);

    });

    ```


    **Listing 11-4** Listening to a welcome message


    The next new function in Listing [11-5](#506047_1_En_11_Chapter.xhtml#PC17) works
    quite similar to the `detectIntent` call from Listing [11-3](#506047_1_En_11_Chapter.xhtml#PC6),
    but instead of passing in text query input, we will use an **event name**.


    ```

    async function detectIntentByEventName(eventName){

    request.queryInput.event =  {

    languageCode: languageCode,

    name: eventName

    };

    const responses = await sessionClient.detectIntent(request);

    //remove the event, so the welcome event wont be triggered again

    delete request.queryInput.event;

    return responses;

    }

    ```


    **Listing 11-5** Detecting an intent by event name


    Which event name? The welcome event, as our welcome intent has that event attached
    to it, which you can see in Figure [11-3](#506047_1_En_11_Chapter.xhtml#Fig3).


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig3_HTML.jpg](images/506047_1_En_11_Chapter/506047_1_En_11_Fig3_HTML.jpg)


    **Figure 11-3** The Welcome event in Dialogflow


    ## Creating Rich Responses in Your Chatbot Integration


    When you want to use rich response messages in your implementation, you will have
    to build these manually. This makes sense, as you control the UI.


    Let’s build a few rich response messages in our integration.


    ### A Hyperlink Component, a Google Map, and an Image Component


    First, create a new intent with training phrases like "Do you have a web address?"


    You don’t need to specify a text response. Instead, you will create a new **custom
    payload**, which uses our custom JSON as seen in Figure [11-4](#506047_1_En_11_Chapter.xhtml#Fig4):


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig4_HTML.jpg](images/506047_1_En_11_Chapter/506047_1_En_11_Fig4_HTML.jpg)


    **Figure 11-4** The custom payload for a custom hyperlink rich message


    ```

    {

    "web": {

    "type": "hyperlink",

    "text": "Check My Website",

    "link": "http://www.leeboonstra.com"

    }

    }

    ```


    In your back-end integration, after running the `detectIntent` method, you would
    need to loop through the `queryResult.fulfillmentMessages` array. It should contain
    an object with the `message` set to the **payload**.


    ```

    fulfillmentMessages: Array(1)

    0:

    message: "payload"

    payload:

    fields:

    platform: {stringValue: "custom-web", kind: "stringValue"}

    web: {structValue: {...}, kind: "structValue"}

    __proto__: Object

    __proto__: Object

    platform: "PLATFORM_UNSPECIFIED"

    __proto__: Object

    length: 1

    __proto__: Array(0)

    fulfillmentText: ""

    ```


    > **Tip:** Did you notice that there is something weird with the payload object?
    It’s not holding the same JSON object as what you have entered in the Dialogflow
    console. That’s because the Google gRPC API uses protocol buffers (`google.protobuf.Struct`).
    Protocol buffers are Google’s language-neutral, platform-neutral, extensible mechanism
    for serializing structured data. You would need to convert the protobuf to JSON.
    In my GitHub for this example, I’ve included a simple converter script.


    Your back-end code should return the results to the UI. Your client-side JavaScript
    will loop through all the results and present the results on the screen with custom
    styling. Figure [11-5](#506047_1_En_11_Chapter.xhtml#Fig5) shows how it will look.


    ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig5_HTML.jpg](images/506047_1_En_11_Chapter/506047_1_En_11_Fig5_HTML.jpg)


    **Figure 11-5** Example of a custom integration with rich messages support


    ### Implementation


    Let’s look at a full implementation of rich messages for hyperlinks, Google Maps,
    and images. We have seen an example of a hyperlink custom payload already; Listing
    [11-6](#506047_1_En_11_Chapter.xhtml#PC20) shows some examples of an image and
    a Google Map.


    ```

    {

    "web": {

    "type": "image",

    "alt": "Lee Boonstra",

    "src": "https://www.leeboonstra.com/images/profile.jpg"

    }

    }

    {

    "web": {

    "link": "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2437.7995043017927!2d4.869772751476948!3d52.33778327968087!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c60a05af168f5b%3A0x3e5bfe6e0b2ce441!2sGoogle+Amsterdam!5e0!3m2!1sen!2snl!4v1520965060384",

    "type": "map"

    }

    }

    ```


    **Listing 11-6** A custom payload in the Dialogflow console


    Right after the `detectIntent` promise, you can call a new method called `getRichContent()`
    which passes the resolved promise responses into it.


    ```

    const responses = await sessionClient.detectIntent(request);

    let data = getRichContent(responses);

    return data;

    ```


    The `getRichContent` method looks like this; see Listing [11-7](#506047_1_En_11_Chapter.xhtml#PC22).


    ```

    function getRichContent(responses){

    const result = responses[0].queryResult;

    let messages = [];

    if(result.fulfillmentMessages.length > 0) {

    for (let index = 0; index < result.fulfillmentMessages.length; index++) {

    const msg = result.fulfillmentMessages[index];

    if (msg.payload){

    let data = structJson.structProtoToJson(msg.payload);

    messages.push(data.web);

    } else {

    messages.push(msg.text.text);

    }

    }

    return messages;

    }

    }

    ```


    **Listing 11-7** The `getRichContent` method gets the object from the protobuf


    It first checks if the `fulfillmentMessages` contains an Array that has at least
    one element. It’s possible to have multiple fulfillment messages, for example,
    a text message and two rich messages, so we will have to loop through these. If
    the message contains a custom payload, we will need to get the data and convert
    the protobuf to JSON. Else, we can add the text version to the new messages array.
    This array will be sent to the UI. Technically, you could also create the HTML
