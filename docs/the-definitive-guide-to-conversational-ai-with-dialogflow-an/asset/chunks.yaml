    \nNote the differences between the **dialogflow-fulfillment**\nnpm package\n(Listing\
    \ [10-3](#506047_1_En_10_Chapter.xhtml#PC3)  vs. [10-5](#506047_1_En_10_Chapter.xhtml#Par61))\
    \ and the\n**actions on google** npm package of Listing [10-5](#506047_1_En_10_Chapter.xhtml#Par61):\n\
    \n*   **conv** is an instance of type\n    DialogflowConversation.\n\n*   **app**\
    \ is an instance of type\n    DialogflowApp.\n\n*   **app** accepts options of\
    \ type\n    DialogflowOptions.\n\n*   **conv.ask** sends a text string to the\
    \ device. The\n    Google Assistant synthesizer will speak this sentence out.\
    \ On a device\n    with a screen, you will also see a text balloon, including\
    \ this\n    text.\n\n*   **parameters**: These can be received as a second\n \
    \   argument in the function.\n\n*   **contexts**: You can get and set context\
    \ from the\n    conv.contexts object. (Notice the “s” after context.)\n\n*   **conv.close**:\
    \ This will close the action and\n    return to the native Google Assistant scope.\n\
    \nBesides this, the formatting for Cards and other rich messages is all\naccording\
    \ to the Actions on Google spec.\n\nTip\n\nWhen building actions for the Google\
    \ Assistant, it’s best to use the\nGoogle Assistant simulator to test the experience\
    \ ([`https://console.actions.google.com/`](https://console.actions.google.com/)).\n\
    \nHere’s how the fulfillment response of an Actions on Google action looks\nlike\
