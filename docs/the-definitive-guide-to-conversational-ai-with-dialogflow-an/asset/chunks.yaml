    ## Building an Integration to Run a Dialogflow Agent in a Native Mobile Android
    or iOS App with Flutter


    The past sections showed you how to integrate Dialogflow in your website or web
    application by creating a front-end UI and a back-end server. If you would make
    this website mobile-friendly, then it could run on a mobile device. However, maybe
    you are interested in integrating a Dialogflow agent in a native mobile app. This
    is where Google’s technology, Flutter, comes in.


    `Flutter` is an open source UI software development kit created by Google. It
    is used to develop applications for Android, iOS, Linux, Mac, Windows, and the
    Web from a single (Dart code) codebase. With Flutter, you can develop apps fast
    as it can hot-reload changes while saving your code. Flutter ships with a rich
    set of customizable widgets to create native end user experiences with native
    performance, as it gets compiled to native ARM machine code using Dart’s native
    compilers. Like `npm` for Node.js, Dart and Flutter have their own package manager,
    `pub.dev` package management, allowing you to download prebuilt Flutter packages
    and integrate this in your app.'
