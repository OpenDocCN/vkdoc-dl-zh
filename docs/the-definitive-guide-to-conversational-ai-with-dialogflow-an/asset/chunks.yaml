    ## Solutions


    In this section, I will present three popular solutions for collecting metrics.


    ### Building a Platform for Capturing Conversation-Related Metrics and Redacting
    Sensitive Information


    To build a solution for capturing conversation-related metrics, you will need
    to make use of the following Google Cloud services:


    - `Dialogflow Essentials` (pay-as-you-go tier)

    - `BigQuery`

    - `Pub/Sub` (messaging channel)

    - `DLP API` (to redact the information before storing the data)

    - `Cloud Functions` (code which will be triggered on events)


    Let''s have a look into an architecture as shown in Figure 13-1.


    When a customer writes text into the chatbot or talks to a voice agent, the `Dialogflow`
    agent matches the answer (with the `detectIntent` method). This includes the information
    such as the user utterance, the `Dialogflow` response, the matched intent, and
    so on, but more critical also the session id. In real time, we can push the data
    to a messaging channel (`Pub/Sub`), so other software pieces can register and
    listen to incoming data (via an event-based `Cloud Function`).


    ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig1_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig1_HTML.jpg)


    **Figure 13-1** Using an architecture with `Pub/Sub` to create a data pipeline
    (part 1)


    The cloud function has a subscription on the `Pub/Sub` channel. Note Figure 13-2;
    every time a message comes in, the message will be passed to the `DLP API` to
    remove sensitive information before storing the data in `BigQuery`.


    ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig2_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig2_HTML.jpg)


    **Figure 13-2** Using an architecture with `Pub/Sub` to create a data pipeline
    (part 2)


    Once it''s stored in `BigQuery`, you can run queries to get, for example, the
    top 10 user utterances that returned in a fallback or where the user sentiment
    was negative. You could also run a query to figure out which intent was the most
    popular. Or, in case you have a session id, you can query to retrieve the full
    chat transcript.


    First, we will need to enable the following APIs. We can do this from the command
    line:


    ```

    gcloud services enable bigquery-json.googleapis.com \

    cloudfunctions.googleapis.com \

    dlp.googleapis.com

    ```


    Afterward, we will need to make sure that we have the right permissions. We will
    run a script that can create datasets and tables in `BigQuery`; we will need to
    modify the user permissions in the **IAM & Admin** panel. Go to the **IAM** page.
    Find the `Dialogflow` Service Account, which is used by `Dialogflow`. (You can
    find the service account (email address) on the **Dialogflow** ➤ **Settings**
    ➤ **General page**.) On the IAM page, edit the service account which `Dialogflow`
    is using (see Figure 13-3).


    Give your service account the following permissions:


    ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig3_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig3_HTML.jpg)


    **Figure 13-3** Assigning the correct roles to your IAM account


    - `BigQuery Data Owner`

    - `BigQuery Job User`

    - `Pub/Sub Admin`


    Then, we will need to create the `Cloud Function`, which will listen to the messaging
    channel. Click **Cloud Functions** ➤ **Create Function**.


    Specify the following settings; instead of `[project_id]`, use your own Google
    Cloud project id, as seen in Figure 13-4.


    ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig4_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig4_HTML.jpg)


    **Figure 13-4** Preparing the `Cloud Function` in the data pipeline


    - Name: `chatanalytics`

    - Memory allocated: `256MB`

    - Trigger: `Cloud Pub/Sub`

    - Pub/Sub topic: `projects/[project_id]/topics/chatbotanalytics`

    - Function to execute: `subscribe`


    Click the environment variables tab to add the following environment variable
    (see Figure 13-5):


    ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig5_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig5_HTML.jpg)


    **Figure 13-5** Set the environment variables in the `Cloud Function`


    - Environment variables: `GCLOUD_PROJECT - [project_id]`


    Listing 13-1 shows the contents for the `package.json` to import `BigQuery` and
    the `DLP` libraries.


    ```

    {

    "name": "chatanalytics",

    "version": "1.0.2",

    "dependencies": {

    "@google-cloud/bigquery": "^5.0.0",

    "@google-cloud/dlp": "^1.2.0"

    }

    }

    ```


    **Listing 13-1** `package.json`


    The `Cloud Function` `index.js` code will look like Listing 13-2.


    ```

    //1)

    const { BigQuery } = require(''@google-cloud/bigquery'');

    const DLP = require(''@google-cloud/dlp'');

    //2)

    const projectId = process.env.GCLOUD_PROJECT;

    const bqDataSetName = ''chatanalytics''

    const bqTableName = ''chatmessages'';

    const bq = new BigQuery();

    const dlp = new DLP.DlpServiceClient();

    // Make use of a dataset called: chatanalytics

    const dataset = bq.dataset(bqDataSetName);

    // Make use of a BigQuery table called: chatmessages

    const table = dataset.table(bqTableName);

    //3)

    var detectPIIData = async function(text, callback) {

    // The minimum likelihood required before returning a match

    const minLikelihood = ''LIKELIHOOD_UNSPECIFIED'';

    //4)

    // The infoTypes of information to match

    const infoTypes = [

    {name: ''PERSON_NAME''},

    {name: ''FIRST_NAME''},

    {name: ''LAST_NAME''},

    {name: ''MALE_NAME''},

    {name: ''FEMALE_NAME''},

    {name: ''IBAN_CODE''},

    {name: ''IP_ADDRESS''},

    {name: ''LOCATION''},

    {name: ''SWIFT_CODE''},

    {name: ''PASSPORT''},

    {name: ''PHONE_NUMBER''},

    {name: ''NETHERLANDS_BSN_NUMBER''},

    {name: ''NETHERLANDS_PASSPORT''}

