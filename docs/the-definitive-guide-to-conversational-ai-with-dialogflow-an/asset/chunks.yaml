  trans: "\n# 以下内容专门针对 Flutter。\n\n```\nflutter:\n  uses-material-design: true\n \
    \ assets:\n    - assets/credentials.json\n```\n\n清单 11-12  \n`pubspec.yaml`\n\n\
    在你的代码中导入此包。加载你的服务账号，并创建一个 `DialogflowGrpc` 实例；参见清单 11-13。\n\n```\nimport 'package:dialogflow_grpc/v2beta1.dart';\n\
    import 'package:dialogflow_grpc/generated/google/cloud/dialogflow/v2beta1/session.pb.dart';\n\
    import 'package:dialogflow_grpc/dialogflow_auth.dart';\n\nfinal serviceAccount\
    \ = ServiceAccount.fromString(\n  '${(await rootBundle.loadString('assets/credentials.json'))}');\n\
    DialogflowGrpc dialogflow = DialogflowGrpc.viaServiceAccount(serviceAccount);\n\
    ```\n\n清单 11-13  \n加载服务账号\n\n通过下面这行代码，你可以基于文本输入检测意图：\n\n```\nvar data = await\
    \ dialogflow.detectIntent(text, 'en-US');\nprint(data.queryResult.fulfillmentText);\n\
    ```\n\n清单 11-14 展示了如何基于音频流检测意图。集成音频流需要在你的 Flutter 应用中配合麦克风组件使用。通常，`pub.dev` 上会有各种可用的开源麦克风组件。请记住，Flutter\
    \ 的麦克风库是对原生硬件组件的封装。因此，不同设备（Android、iOS、Web、macOS 或 Windows）上的实现可能会有所差异。\n\n1.\
    \  你可以创建一个语音识别偏置列表，以提升某些词语的识别权重。当你的语音模型似乎无法理解你时，这很有用。（有关语音适配的更多详细信息，请参见第 7 章。）\n\
    \n2.  在此处注释你的音频配置，这取决于你所使用设备的硬件。例如，你的手机可能使用 `AUDIO_ENCODING_LINEAR_16` 编码和 16000\
    \ 赫兹。你还需要指定你正在监听的语种，以及是否要检测单次话语。默认情况下（设置为 `false`），识别不会停止，直到客户端关闭流。如果设置为 `true`，识别器将检测输入音频中的单次口语话语。最后，你需要指定偏置列表。\n\
    \n3.  使用指定的 `InputConfig` 和音频流调用 `streamingDetectIntent`。你可以从麦克风组件获取这样的音频流。\n\n\
    ```\n// 1)\nvar biasList = SpeechContextV2Beta1(\n  phrases: [\n    'Dialogflow\
    \ CX',\n    'Dialogflow Essentials',\n    'Action Builder',\n    'HIPAA'\n  ],\n\
    \  boost: 20.0\n);\n\n// 2)\nvar config = InputConfigV2beta1(\n  encoding: 'AUDIO_ENCODING_LINEAR_16',\n\
    \  languageCode: 'en-US',\n  sampleRateHertz: 16000,\n  singleUtterance: false,\n\
    \  speechContexts: [biasList]\n);\n\n// 3)\nfinal responseStream = dialogflow.streamingDetectIntent(config,\
    \ _audioStream);\nresponseStream.listen((data) {\n  print(data);\n});\n```\n\n\
    清单 11-14  \n将音频流式传输到 Dialogflow\n\n下一章将更详细地讨论将音频流式传输到 Dialogflow。\n\n图 11-9 展示了一个包含\
    \ Flutter UI 组件的 Flutter 应用示例，该应用在你的应用程序中集成了 Dialogflow gRPC 包。Flutter gRPC 包附带了一个完整的、适用于移动设备的音频流应用工作演示。\n\
    \n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig9_HTML.jpg](img/506047_1_En_11_Fig9_HTML.jpg)\n\
    \n图 11-9  \n一个在 Flutter UI 应用中集成了 Dialogflow gRPC 包的演示应用\n\n## 一个与后端 Dialogflow\
    \ SDK 应用通信的 Flutter 应用\n\n当你构建一个需要支持多个渠道（或全渠道体验，即聊天消息可以在各种集成中传输）的机器人平台时，构建如图 11-10\
    \ 所示的架构可能更有意义。\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig10_HTML.jpg](img/506047_1_En_11_Fig10_HTML.jpg)\n"
- fmt: "### Figure 11-10\nAn example architecture for building a bot platform that\
    \ supports multiple channels\n\nAs you can see in the previous architecture, this\
    \ solution contains various integration channels, such as the mobile app, Google\
    \ Assistant, Angular web app, phone, and WhatsApp. These channels all talk to\
    \ the same back-end server. The back-end server exists as a server component.\
    \ For example, in a `Node.js` application, the server could use the `Express`\
    \ npm library. The Google Assistant could `POST` against `https://www.example.com/app/googleassistant`;\
    \ the Flutter app could `POST` to `https://www.example.com/app/mobile`; and so\
    \ on. The server can route all the incoming (Ajax) messages to the channel middleman.\
    \ This middleware takes care of integrating the various SDKs. For example, the\
    \ Google Assistant middleware will integrate with Actions on Google, the phone\
    \ and WhatsApp middleware will integrate with Twilio, the Angular website and\
    \ the Flutter app will create the views to return manually. All these integration\
    \ middleware layers will connect to the code that integrates with the Dialogflow\
    \ SDK, as seen in this chapter’s first section. The advantage is that you only\
    \ need to set up Dialogflow in one place. This part talks to the Dialogflow agent.\
    \ It should not contain any rich messages, UI components, or SSML texts, just\
    \ plain NLU and intent detection. When building an architecture like this, don’t\
    \ forget to create an analytics data pipeline architecture. Chapter [13](#506047_1_En_13_Chapter.xhtml)\
    \ describes how to do this.\n\n### Summary\n\nThis chapter contains information\
    \ about building your own integrations. You will learn the following tasks:\n\n\
    - You want to create a chatbot on your own website by using the Dialogflow SDK\
    \ and WebSockets.\n- You want to integrate rich responses such as cards, images,\
    \ hyperlinks, or Google Maps in your custom web chat integration.\n- You want\
    \ to use markdown syntax in your chatbot integration and do branching.\n- You\
    \ want to integrate the Dialogflow SDK in a mobile app with Flutter to build native\
    \ Android, iOS, Windows, MacOS, or web chat apps.\n- You want to build a multichannel\
    \ bot platform by building a back-end integration.\n\nIn case you want to build\
    \ this example, the source code for this book is available on GitHub via the book’s\
    \ product page, located at `www.apress.com/978-1-4842-7013-4`. Look into the `custom-integration-web`,\
    \ `custom-integration-markdown`, and `custom-integration-rich-messages` folders.\n\
    \n### Further Reading\n\n- Dialogflow SDK method for detecting an Intent  \n \
    \ `https://cloud.google.com/dialogflow/es/docs/reference/rest/v2/projects.agent.sessions/detectIntent`\n\
    \n- Dialogflow SDK on QueryInput looks like  \n  `https://cloud.google.com/dialogflow/es/docs/reference/rest/v2/QueryInput`\n\
    \n- A real-world approach example of a chatbot integrated into a website  \n \
    \ `https://github.com/savelee/kube-django-ng`\n\n- SDK documentation on QueryResults\
    \  \n  `https://cloud.google.com/dialogflow/es/docs/reference/rest/v2/DetectIntentResponse#queryresult`\n\
    \n- More information on protocol buffers  \n  `https://developers.google.com/protocol-buffers`\n\
    \n- MarkedJS library for allowing markdown syntax in your custom web integration\
