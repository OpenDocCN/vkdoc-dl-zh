    \ the network will be smaller and match\n        the sample hertz setting in my\
    \ Dialogflow or STT calls.\n\n*   Also, Dialogflow and STT require mono sound,\
    \ which means I should\n        set the `numberOfAudioChannels`\n        to 1\\\
    . `RecorderType StereoAudioRecorder` allows me to change the number of audio\n\
    \        channels from 2 to 1.\n\n```\n//1)\nconst startRecording = document.getElementById('start-recording');\n\
    const stopRecording = document.getElementById('stop-recording');\nlet recordAudio;\n\
