- fmt: '# The History of Text Chatbots


    Alan Turing, a British computer scientist, developed the Turing Test to figure
    out if machines can think. The Turing Test is a conversational test (or imitation
    game) to measure the machine’s intelligence level in dialogues. The test involves
    having the machine compete with a human as a conversation partner. Human judges
    would interact with both using a computer keyboard and screen. If 30% of the judges
    can’t reliably distinguish the machine from the human, the machine was considered
    to pass the test.


    One of the first chatbots that was capable of attempting the Turing Test was chatbot
    `ELIZA`. A `Natural Language Processing` (NLP) computer program was created from
    1964 to 1966 by Joseph Weizenbaum at the Massachusetts Institute of Technology
    (MIT). Under the hood, `ELIZA` itself examined the text for keywords, applied
    values to said keywords, and transformed the input into an output. `ELIZA` contained
    a script called `DOCTOR`, which provided a parody of a psychotherapist’s responses
    in a Rogerian psychiatric interview, mostly rephrasing what the user said.


    Chatbot `PARRY` was written in 1972 by psychiatrist Kenneth Colby at Stanford
    University. While `ELIZA` was a Rogerian therapist simulation, `PARRY` attempted
    to simulate a person with paranoid schizophrenia. It’s described as `ELIZA with
    attitude`. The program implemented a rough model of a person’s behavior with schizophrenia
    based on concepts, perceptions, and beliefs. It also demonstrated a conversational
    strategy and therefore was more advanced than `ELIZA`.


    `ELIZA` and `PARRY` rely on simple tricks to appear like a human. Chatbot `ALICE`
    (which stands for Artificial Linguistic Internet Computer Entity) was written
    in the late 1990s by Richard Wallace. `ELIZA` inspired `ALICE`, but it differentiates
    itself by using a hardcoded database including conversation utterances. For example,
    it would check the phrase and its keywords for matching this database when you
    would type to `ALICE`.


    Rather than using a static database, another chatbot called `Jabberwacky`, created
    in 1997 by British programmer Rollo Carpenter, keeps track of everything people
    have said to it and tries to reuse those statements matching them to the user’s
    input. Neither of these chatbots has long-term memory, so they respond only to
    the last sentence written.


    Although chatbots have been under development since the existence of computers,
    they did not become as mainstream as recently. It has everything to do with `Machine
    Learning` and `Natural Language Understanding`.


    With old-school chatbots, you had to phrase your sentences carefully. Every grammar
    or spelling mistake, or if you would just say things differently, would result
    in a chatbot that didn’t know what to answer. The fact is there are many different
    ways to say something. A chatbot that has been programmed with conditional `if-else`
    statements needs to be maintained and is still error-prone.


    A chatbot built with Machine Learning, to be precise, a chatbot that can understand
    text (Natural Language Understanding), could understand and retrieve a particular
    answer for your question. No matter if you spell it wrong or say things differently.


    Over the last few years, due to the serious efforts by companies like Google,
    Apple, Microsoft, Amazon, Facebook, and IBM, and their investments in AI, machine
    learning, voice conversations, cloud computing, and developer tools, conversational
    AIs are here to stay!


    Today, chatbots are virtual assistants such as the Google Assistant and are accessible
    via many organizations’ apps, websites, and instant messaging platforms.


    You likely carry your virtual assistant with you since they are implemented in
    Android devices (Google Assistant) and iPhones/iPads (Siri). Or you have a voice-activated
    speaker such as Google Home, Google Nest Mini, Google Nest Hub, or Amazon Echo
    (Alexa) installed in your home. Smart conversational UIs like Google Assistant,
    Siri, or Alexa are also powered by machine learning.


    Chatbots are not only popular in the consumer market. Also, in the business world,
    they are hot. So-called enterprise assistants are company chatbots that are modeled
    after customer service representatives or business processes. They can be deployed
    internally on channels such as web applications, Slack, or Skype. They can help,
    for example, IT departments or helpdesks to file tickets, look up information
    from various FAQ databases, replacements for customer care, order products, or
    share knowledge across employees. Also, chatbots in contact centers (whether through
    web chat or voice chat via the phone) could trim enormous business costs. Robots
    can pick up the phone, answer the most common questions, and reduce call and waiting
    times.


    Chatbots can be deployed for the public on channels such as Facebook, WhatsApp,
    websites, apps, or SMS. There are brand engagement chatbots and customer care
    chatbots that can offer advice or answer the most frequently asked questions,
    such as the `KLM Royal Dutch Airlines` virtual assistant. It contains answers
    to frequently asked questions. Especially during the Corona time, lots of COVID-19-related
    questions came in. The `KLM Royal Dutch Airlines` virtual assistant is a public-facing
    text-based chatbot available through WhatsApp.


    There are sales department bots who can help by answering most frequently asked
    questions or dealing with repetitive work/calls; therefore, a bot solution is
    very scalable. It makes a lot of sense for specific industries. For example, for
    a healthcare insurance company, the last months of the year will be hectic since
    that’s the month that individuals can change their healthcare provider. For a
    retailer or travel agency, the holiday months will be hectic.


    An example of a customer care chatbot is chatbot `Marie` from the `ING bank`,
    who can help you through Facebook Messenger when you have problems with your bank
    card (conversational banking). This chatbot started as an experiment for ING to
    test how far they could push the technology. Right now, chatbots are in all of
    their internal systems (web chat, apps, and call).'
  raw: '## The History of Text Chatbots


    Alan Turing, a British computer scientist, developed the Turing Test to figure
    out if **machines can think**. The Turing Test is a conversational test (or imitation
    game) to measure the machine’s intelligence level in dialogues. The test involves
    having the machine compete with a human as a conversation partner. Human judges
    would interact with both using a computer keyboard and screen. If 30% of the judges
    can’t reliably distinguish the machine from the human, the machine was considered
    to pass the test.


    One of the first chatbots that was capable of attempting the Turing Test was chatbot
    **ELIZA**. A **Natural Language Processing** (NLP) computer program was created
    from 1964 to 1966 by Joseph Weizenbaum at the Massachusetts Institute of Technology
    (MIT). Under the hood, ELIZA itself examined the text for keywords, applied values
    to said keywords, and transformed the input into an output. ELIZA contained a
    script called **DOCTOR**, which provided a parody of a psychotherapist’s responses
    in a Rogerian psychiatric interview, mostly rephrasing what the user said.


    Chatbot **PARRY** was written in 1972 by psychiatrist Kenneth Colby at Stanford
    University. While ELIZA was a Rogerian therapist simulation, PARRY attempted to
    simulate a person with paranoid schizophrenia. It’s described as *ELIZA with attitude*.
    The program implemented a rough model of a person’s behavior with schizophrenia
    based on concepts, perceptions, and beliefs. It also demonstrated a conversational
    strategy and therefore was more advanced than ELIZA.


    ELIZA and PARRY rely on simple tricks to appear like a human. Chatbot **ALICE**
    (which stands for Artificial Linguistic Internet Computer Entity) was written
    in the late 1990s by Richard Wallace. ELIZA inspired ALICE, but it differentiates
    itself by using a hardcoded database including conversation utterances. For example,
    it would check the phrase and its keywords for matching this database when you
    would type to ALICE.


    Rather than using a static database, another chatbot called **Jabberwacky** ,
    created in 1997 by British programmer Rollo Carpenter, keeps track of everything
    people have said to it and tries to reuse those statements matching them to the
    user’s input. Neither of these chatbots has long-term memory, so they respond
    only to the last sentence written.


