    ## Building Multilingual Fulfillment Webhook


    When working with different languages, you will likely work with other number
    formats, foreign currencies, or date/time strings. More tools will come in handy:


    - `moment.js`: To parse, validate, manipulate, and display dates and times in
    JavaScript.

    - `numeral.js`: A JavaScript library for formatting and manipulating numbers.


    When your webhook back end is a Node.js back end, there are remarkable frameworks
    available that can help you better organize your code and localize your strings.


    This tool will help you:


    - `i18n`: Lightweight, simple translation module with dynamic JSON storage. Supports
    plain vanilla Node.js apps.


    Dialogflow will send a language code (such as "en" for English or "nl" for Dutch),
    with each query result:


    ```

    request.body.queryResult.languageCode;

    ```


    You will use this to initialize the `i18n` library. Then you can refer to these
    multi-language text strings by using the following calls:


    ```

    i18n.__(KEY)

    ```


    All the text-based strings can be stored in JSON files, such as:


    - `locales/en-US.json`

    - `locales/nl-NL.json`


    The contents will look like this:


    ```

    en-US.json

    {

    "WELCOME_BASIC": "Hi, I am the virtual video game chat agent. I can talk with
    you about video games or tell you which latest games have been released. What
    would you like to know from me?"

    }

    nl-NL.json

    {

    "WELCOME_BASIC": "Hoi, ik ben de virtual video game chat agent. Ik kan over video
    games praten en ik kan je vertellen welke games net uit zijn. Wat wil je weten?"

    }

    ```


    **Tip:** Since `i18n` uses JSON files to store language strings, you could store
    these JSON files together with your code and deploy your webhook in the cloud
    with, for example, Cloud Run. If you rather use the inline editor or Cloud Functions,
    you will likely want to store the JSON files in Google Cloud Storage.


    ### i18n Code Example


    Let''s look into a full code example on implementing a multilingual webhook, deployed
    with Cloud Run.


    The `package.json` file will contain these additional dependencies:


    ```

    "i18n": "^0.10.0",

    "moment": "^2.27.0",

    "numeral": "^2.0.6"

    ```


    The localized JSON files will look like Listing 10-16. Notice that certain strings
    can contain variables (`%s`).


    ```

    locales/en-US.json

    {

    "WELCOME_BASIC": "Hi, I am the virtual video game chat agent. I can talk with
    you about video games or tell you which latest games have been released. What
    would you like to know from me?",

    "DELIVERY_DATE": "The date is %s.",

    "PRICE": "It costs %s.",

    "TOTAL_AMOUNT": "The total is: %s.",

    "FALLBACK": "Oops, something went wrong. Would you like to try again?"

    }

    locales/nl-NL.json

    {

    "WELCOME_BASIC": "Hoi, ik ben de virtual video game chat agent. Ik kan over video
    games praten en ik kan je vertellen welke games net uit zijn. Wat wil je weten?",

    "DELIVERY_DATE": "De datum is %s.",

    "PRICE": "Het kost %s.",

    "TOTAL_AMOUNT": "Het totaal is: %s.",

    "FALLBACK": "Oeps, er ging iets mis. Kun je het opnieuw proberen?"

    }

    ```


    Listing 10-16: You can create locale JSON files to use within your webhook code


    Listing 10-17 shows how you set up your webhook code in order to make use of those
    JSON language files.


    1. First, we will require the `i18n` library to handle multilingual support. We
    will need to configure it to explain which locales we are using, where they are
    located, and which locale will be the default.

    2. Next, we will require `moment.js` for date and time objects.

    3. By default, it works for the English language. All the other locales will need
    to be required separately.

    4. Then we require `numeral.js` to handle currencies and numbers. To make it work
    with other locales, we will have to register the locales and provide the options.
    For example, in European notation, the decimal delimiter is a "." instead of a
    ",".

    5. Here, we assign the `i18n` keys to the response outputs. The `i18n` framework
    will find the value (the correct translated text string) in the locale file.

    6. We will retrieve the `languageCode` from the Dialogflow `queryResult` object.
    As you have seen, `i18n` uses ISO language codes, conforming to the ISO 639-1
    standard, complete with two-letter country codes where relevant, like ("nl-NL"
    or "en-US"), so will need to create that mapping.

    7. These are the intents which will make use of multilingual responses.


    ```

    ''use strict'';

    const express = require(''express'');

    const bodyParser = require(''body-parser'');

    const { WebhookClient} = require(''dialogflow-fulfillment'');

    //1

    const i18n = require(''i18n'');

    i18n.configure({

    locales: [''en-US'', ''nl-NL''],

    directory: __dirname + ''/locales'',

    defaultLocale: ''en-US''

    });

    //2

    const moment = require(''moment'');

    require(''moment/locale/nl'');

    //3

    const numeral = require(''numeral'');

    numeral.register(''locale'', ''nl'', {

    delimiters: {

    thousands: '','',

    decimal: ''.''

    },

    abbreviations: {

    thousand: ''k'',

    million: ''m'',

    billion: ''b'',

    trillion: ''t''

    },

    ordinal: function (number) {

    var b = number % 10;

    return (~~ (number % 100 / 10) === 1) ? ''th'' :

    (b === 1) ? ''st'' :

    (b === 2) ? ''nd'' :

    (b === 3) ? ''rd'' : ''th'';

    },

    currency: {

    symbol: ''€''

    }

    });

    process.env.DEBUG = ''dialogflow:debug''; // enables lib debugging statements

    //4

    function welcome(agent) {

    agent.add(i18n.__(''WELCOME_BASIC''));

    }

    function fallback(agent) {

    agent.add(i18n.__(''FALLBACK_BASIC''));

    }

    function getPrice(agent) {

    agent.add(i18n.__(''PRICE'', numeral(399).format(''($0,0)'')));

    }

    function getDeliveryDate(agent) {

    agent.add(i18n.__(''DELIVERY_DATE'', moment().format(''LL'')));

    }

    function getTotalNumber(agent) {

    agent.add(i18n.__(''TOTAL_AMOUNT'', numeral(1000).format(''0,0'')));

    }

    // Express Code

    const app = express().use(bodyParser.json());

    app.post(''/fulfillment'', (request, response) => {

    const agent = new WebhookClient({ request, response });

    console.log(''Dialogflow Request headers: '' + JSON.stringify(request.headers));

    console.log(''Dialogflow Request body: '' + JSON.stringify(request.body));

    //5

    var lang = request.body.queryResult.languageCode;

    var langCode;

    if(lang === "nl") langCode = "nl-NL";

    if(lang === "en") langCode = "en-US";

    i18n.setLocale(langCode);

    moment.locale(lang);

    numeral.locale(lang);

    //6

    let intentMap = new Map();

    intentMap.set(''Default Welcome Intent'', welcome);

    intentMap.set(''Default Fallback Intent'', fallback);

    intentMap.set(''Get_Price'', getPrice);

    intentMap.set(''Get_Delivery_Date'', getDeliveryDate);

    intentMap.set(''Get_Total_Number'', getTotalNumber);

    agent.handleRequest(intentMap);

    });

    app.get(''/'', (req, res) => {

    res.send(`OK`);

    });

    const port = process.env.PORT || 8080;

    app.listen(port, () => {

    console.log(''Dialogflow Fulfillment listening on port'', port);

    });

    ```


    Listing 10-17: Dialogflow fulfillment multilingual webhook code using the `i18n`
    library


