    # 1. Introduction to Conversational AI


    A chatbot is a user interface designed to simulate conversation with human users
    online. The word is a combination of the word **chat** (a conversation) and **robot**.


    Conversational user interfaces like chatbots or voice-activated conversational
    UIs (like Siri, Google Assistant, or Alexa, but also robots in phone conversations)
    are trendy nowadays. Ten years ago, everyone wanted to build mobile apps; now
    it’s the time everyone made or is working on conversational user interfaces.


    What’s so unique about chatbots, and why are they popular now? The first chatbots
    actually already appeared with the launch of personal computers. Let’s dive into
    some history and go way back to 1950.'
