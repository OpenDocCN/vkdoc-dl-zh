- fmt: "# Integrating Your Agent with a Dialogflow Messenger\n\nThe Dialogflow Messenger\
    \ integration is a more advanced widget you can place in your website, which connects\
    \ to your Dialogflow agent. It only works for text chats. The look and feel of\
    \ this component is customizable. Although some enterprises prefer to build their\
    \ web integration themselves (e.g., so they can connect to more systems), many\
    \ businesses like the Dialogflow Messenger component as it's an easy and fast\
    \ way to integrate with your website or web app.\n\nIn the Dialogflow console,\
    \ click the menu on **Integrations**.\n\nClick the integration: **Dialogflow Messenger**.\n\
    \nA pop-up will appear (Figure [6-11](#506047_1_En_6_Chapter.xhtml#Fig11)), which\
    \ will show a (JavaScript) code snippet, which you can copy and paste into your\
    \ website.\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig11_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11 Dialogflow Messenger implementation\n\nWhen you click the **Try\
    \ it now** button in the pop-up, you will see how the implementation looks like.\
    \ It will show a pop-up button on the bottom of the screen (Figure [6-12](#506047_1_En_6_Chapter.xhtml#Fig12),\
    \ with the avatar that has been set in the Settings of Dialogflow).\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig12_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12 Dialogflow Messenger pop-up button\n\nThis button will open a chat\
    \ pop-up (Figure [6-13](#506047_1_En_6_Chapter.xhtml#Fig13)), which actually is\
    \ a web component (`df-messenger`).\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig13_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13 Dialogflow Messenger web component\n\nListing [6-3](#506047_1_En_6_Chapter.xhtml#PC3)\
    \ shows the JavaScript code which can be implemented on your website. Paste the\
    \ embed code you copied earlier in a web page on your website. The `<script>`\
    \ and `<df-messenger>` HTML elements should be in the `<body>` element of your\
    \ web page.\n\n```\nListing 6-3\nDialogflow Messenger implementation example,\
    \ web component\n```\n\nTo allow for responsive layouts, also add the following\
    \ to your page:\n\n```\nIt is possible to expand the web component without clicking\
    \ the\nbutton with the setting `expand=\"true\"` in the\n`df-messenger`\ncomponent.\n\
    You can also keep the initial speech bubble closed when you load a\nweb page,\
    \ with `wait-open=\"true\"`.\n```\n\nThe Dialogflow Messenger component won't\
    \ support voice. Also, it can only support one language. However, you can use\
    \ a *mega agent* and create multiple sub-agents in different languages.\n\n##\
    \ Changing the Look and Feel of the Chatbot Component\n\nThe Dialogflow web component\
    \ provides a wide range of settings to override styles in your chatbot. You will\
    \ just need to add a style tag above the `<df-messenger>` component, and you can\
    \ include the CSS variables of choice, as shown in Listing [6-4](#506047_1_En_6_Chapter.xhtml#PC5).\n\
    \n```\ndf-messenger {\n--df-messenger-bot-message: #282828;\n--df-messenger-button-titlebar-color:\
    \ #ff9000;\n--df-messenger-button-titlebar-font-color: #ffffff;\n--df-messenger-chat-background-color:\
    \ #121212;\n--df-messenger-font-color: white;\n--df-messenger-send-icon: #878fac;\n\
    --df-messenger-user-message: #535353;\n--df-messenger-input-font-color: #000;\n\
    --df-messenger-input-placeholder-font-color: #cccccc;\n--df-minimized-chat-close-icon-color:\
    \ #ff9000;\n}\n\nListing 6-4\nDialogflow Messenger styles of the web component\n\
    ```\n\nFigure [6-14](#506047_1_En_6_Chapter.xhtml#Fig14) shows how these style\
    \ settings will look like once the chatbot is rendered in the browser.\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig14_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig14_HTML.jpg)\n\
    \nFigure 6-14 Dialogflow Messenger with custom styling\n\n## Rich Messages Support\n\
    \nYou can add rich messages responses by adding code to the **Default custom payload**\
    \ box in the Intent in Dialogflow, as shown in Figure [6-15](#506047_1_En_6_Chapter.xhtml#Fig15).\n\
    \n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig15_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig15_HTML.jpg)\n\
    \nFigure 6-15 Dialogflow Messenger custom payload\n\nThe rich messages that are\
    \ supported are Info **Responses**, **Images**, **Lists** (as seen in Figure [6-16](#506047_1_En_6_Chapter.xhtml#Fig16)),\
    \ **Accordions** (boxes that can expand), **Buttons**, and **Suggestion Chips**.\
    \ Note the `richContent` field that can hold arrays. You can find the implementation\
    \ examples in the Dialogflow documentation.\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig16_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig16_HTML.jpg)\n\
    \nFigure 6-16 Dialogflow Messenger custom payload example\n\nThere are also JavaScript\
    \ event triggers available, for example, to render more custom rich messages or\
    \ to make links clickable. The event target for these events is either the `df-messenger`\
    \ element (see Listing [6-5](#506047_1_En_6_Chapter.xhtml#PC6)) or the `window`\
    \ global variable.\n\nTo add an event listener for the `df-messenger` element,\
    \ add the following JavaScript code, where `eventType` is one of the event names\
    \ described in Listing [6-5](#506047_1_En_6_Chapter.xhtml#PC6).\n\n```\nconst\
    \ dfMessenger = document.querySelector('df-messenger');\ndfMessenger.addEventListener('eventType',\
    \ function (event) {\n// Handle event\n...\n});\nListing 6-5\nDialogflow Messenger\
    \ creating event listeners on the web component\n```\n\nTo add an event listener\
    \ for `window`, add the following JavaScript code (Listing [6-6](#506047_1_En_6_Chapter.xhtml#PC7)),\
    \ where `eventType` is one of the event names described.\n\n```\nwindow.addEventListener('eventType',\
    \ function (event) {\n// Handle event\n...\n});\nListing 6-6\nDialogflow Messenger\
    \ creating event listeners on the window element\n```\n\n## Summary\n\nThis chapter\
    \ describes some out-of-the-box (text-based) integrations that address the following\
    \ tasks:\n\n* You want to deploy your chatbot to Google Chat with the Hangouts\
    \ integration.\n* You want to quickly deploy your chatbot to a website with the\
    \ web demo.\n* You want to quickly deploy your chatbot to a website and change\
    \ the look and feel with Dialogflow Messenger.\n\nThe source code for this book\
    \ is available on GitHub via the book's product page, located at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4).\
    \ Look into the `deploying-integrations-webcomponent` and `_dialogflow-agent`\
    \ (**Buy_Console intent**) folders.\n\n## Further Reading\n\n* Google Workspace\
    \ documentation for allowing bots\n  [`https://support.google.com/a/answer/7651360`](https://support.google.com/a/answer/7651360)\n\
    * Dialogflow documentation on Google Chat\n  [`https://cloud.google.com/dialogflow/es/docs/integrations/hangouts`](https://cloud.google.com/dialogflow/es/docs/integrations/hangouts)\n\
    * Google documentation on Google Chat API\n  [`https://developers.google.com/hangouts/chat`](https://developers.google.com/hangouts/chat)\
    \ and [`https://developers.google.com/hangouts/chat/how-tos/bots-publish`](https://developers.google.com/hangouts/chat/how-tos/bots-publish)\n\
    * Google Chat card documentation\n  [`https://developers.google.com/hangouts/chat/reference/message-formats/cards`](https://developers.google.com/hangouts/chat/reference/message-formats/cards)\n\
    * Dialogflow documentation on integrations\n  [`https://cloud.google.com/dialogflow/es/docs/quick/integration`](https://cloud.google.com/dialogflow/es/docs/quick/integration)\n\
    * Dialogflow documentation on Dialogflow Messenger\n  [`https://cloud.google.com/dialogflow/es/docs/integrations/dialogflow-messenger`](https://cloud.google.com/dialogflow/es/docs/integrations/dialogflow-messenger)\n\
    * More information on web components\n  [`https://developers.google.com/web/fundamentals/web-components/shadowdom`](https://developers.google.com/web/fundamentals/web-components/shadowdom)\n\
    \n# 7. Building Voice Agents\n\nLet's discuss voice bots. Typically, when we think\
    \ of chatbots for voice, we would think of smart assistants, such as the Google\
    \ Assistant, Alexa, or Siri. But there's actually another famous business case\
    \ where you can use virtual agents for—bots in contact centers and telephony lines.\n\
    \nSince **Google Assistant** and Dialogflow are both Google products, you wouldn't\
    \ be surprised that deploying voice bots to the Google Assistant is so easy.\n\
    \nThe **Dialogflow Phone Gateway** feature provides a telephone interface to your\
    \ agent. This is great for creating inbound simple interactive voice responses\
    \ tied to a service number, such as telephone reservation systems or simple information\
    \ lines.\n\nUsers who call the phone number will be connected to the Dialogflow\
    \ voice agent. A conversation can be handled very naturally through Speech to\
    \ Text (STT) and Text to Speech (TTS) with humanlike voices.\n\nGoogle Cloud has\
    \ a solution called **Contact Center AI**. This is an out-of-the-box solution\
    \ for telephony contact centers to use artificial intelligence to automate conversations\
    \ and help live assistants in real time. No machine learning expertise is required\
    \ since Contact Center AI will be delivered and enabled through well-known telephony\
    \ partners, such as Genesys, Avaya, Mitel, Twilio, Cisco, Five9, and more. It's\
    \ using popular Google Cloud components, including Dialogflow, Speech-to-Text,\
    \ and Text-to-Speech.\n\nThis chapter will include all of this, including how\
    \ to improve your voice bots.\n\n## Building a Voice AI for a Virtual Assistant\
    \ Like the Google Assistant\n\nLet's start with an easy-to-build Voice AI solution,\
    \ building a Voice AI for the Google Assistant. Both are Google products, and\
    \ it's integrated out of the box when using Dialogflow. Getting this to work is\
    \ just a matter of enabling the service and using the same Google user account\
    \ for both services. Once it's enabled, your Dialogflow agent is available to\
    \ the Google Assistant as an action (Google Assistant app). End users can invoke\
    \ the action through their wake word: *Hey Google, talk to <action-name>.* Under\
    \ the hood, it will open your Dialogflow agent, letting the Google Assistant deal\
    \ with the Speech to Text and Text to Speech. Dialogflow will be used for Natural\
    \ Language Understanding, intent matching, entity recognition, and content management.\
    \ See the diagram in Figure [7-1](#506047_1_En_7_Chapter.xhtml#Fig1).\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig1_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1 The user interacts with the Google Assistant, and through Actions\
    \ on Google, the Google Assistant connects to the Dialogflow agent. It all works\
    \ out of the box\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig2_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2 Set up Google Assistant integration\n\n1. First, click **Integrations**\
    \ ➤ **Google Assistant** ➤ **Integration Settings**. This will open a pop-up;\
    \ see Figure [7-2](#506047_1_En_7_Chapter.xhtml#Fig2). Click the **Test** button.\
    \ This will open the Actions on Google console ([`https://console.actions.google.com/`](https://console.actions.google.com/)).\
    \ Pay attention; you are logged in on Actions on Google with the same Google account\
    \ as Dialogflow. If this gives you problems, often due to having multiple Google\
    \ accounts, log out on all accounts, and try to log back in.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig3_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3 When you are new to Actions on Google, you have to fill out this\
    \ form\n\n2. When you are new to Actions on Google, you will need to go through\
    \ a form to agree on the services (see Figure [7-3](#506047_1_En_7_Chapter.xhtml#Fig3)).\n\
    \n3. Now you are in the simulator. Make sure the simulator is set to English (United\
    \ States), select a device (e.g., phone), and click **Talk to my test-app**.\n\
    \n*The action will greet you with the basic Dialogflow default intent. That means\
    \ that setting up the integration with Actions on Google worked! See Figure [7-4](#506047_1_En_7_Chapter.xhtml#Fig4).*\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig4_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4 Your Dialogflow agent in action, in the Actions on Google simulator\
    \ ([`https://console.actions.google.com`](https://console.actions.google.com))\n\
    \n### Rich Messages\n\nWhen you are building actions for the Google Assistant,\
    \ you might want to use the particular rich messages that Actions on Google offers.\
    \ Once you have set up the Google Assistant integration in Dialogflow, you will\
    \ notice that there's a new tab in the response block of your intents (Figure\
    \ [7-5](#506047_1_En_7_Chapter.xhtml#Fig5)).\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig5_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5 Custom Google Assistant responses\n\nWhen it's not there, you can\
    \ easily add this tab to your response block by clicking the **+** tab.\n\nThere\
    \ are three main settings in the Google Assistant tab:\n\n1. You can choose not\
    \ to override the *DEFAULT* tab. For example, if the default text response is\
    \ the same as the Google Assistant text response, you might want to enable the\
    \ first switch.\n2. The **Add Responses** button to add rich messages (custom\
    \ payloads) to your agent.\n3. A switch to set the intent at the end of the conversation.\
    \ On Google Assistant, it means that you are leaving the scope of your action.\
    \ For example, you could create a Goodbye intent and have this switch enabled.\n\
    \nWhen you click the **Add Responses** (Figure [7-6](#506047_1_En_7_Chapter.xhtml#Fig6))\
    \ button, you can choose between the following custom payload responses:\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig6_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6 Click the Add Responses button to show a pop-up for selecting between\
    \ the various custom Google Assistant responses\n\n* **Simple Response**: Simple\
    \ responses take the form of a chat bubble visually and use Text to Speech (TTS)\
    \ or Speech Synthesis Markup Language (SSML) for sound.\n* **Basic Card**: Use\
    \ basic cards mainly for display purposes. They are designed to be concise, to\
    \ present key (or summary) information to users, and allow users to learn more\
    \ if they choose (using a weblink).\n* **List**: The single-select list presents\
    \ the user with a vertical list of multiple items and selects a single one. Selecting\
    \ an item from the list generates a user query (chat bubble) containing the list\
    \ item's title.\n* **Suggestion Chips**: Use suggestion chips to continue or pivot\
    \ the conversation; they look like little buttons.\n* **Carousel Card and Browse\
    \ Carousel Card**: A carousel is a rich response that allows users to scroll vertically\
    \ and select a tile in a collection. Dialogflow has two different configurations\
    \ for carousels, Carousel and Browse Carousel.\n* **Link out suggestion**: Link\
    \ to an external website.\n* **Media Content**: Media responses let your Actions\
    \ play audio content with a playback duration longer than the 240-second limit\
    \ of SSML.\n* **Table Card**: Table cards allow you to display tabular data in\
    \ your response (e.g., sports standings, election results, and flights). You can\
    \ define columns and rows (up to 3 each) that the Assistant is required to show\
    \ in your table card. You can also specify additional columns and rows along with\
    \ their prioritization. Tables are different from vertical lists because tables\
    \ display static data and are not interactable, like list elements.\n* **Custom\
    \ Payload**: You can write your JSON in the format how Actions on Google expects\
    \ it, for example, when you want more buttons or sections in a card.\n\n### Fulfillment\
    \ and Webhooks\n\nFor developers, Actions on Google has its own client library;\
    \ it's available in Node Package Manager (NPM) under the name `actions-on-google-nodejs`.\n\
    \nThis client library makes it easy to create Actions for the Google Assistant\
    \ and supports Dialogflow, Actions SDK, and Smart Home fulfillment. You can deploy\
    \ the code on your own server or use the Dialogflow inline editor. For more information\
    \ on fulfillments and webhooks, see Chapter [10](#506047_1_En_10_Chapter.xhtml).\
    \ Listing [7-1](#506047_1_En_7_Chapter.xhtml#PC1) shows an example of an Actions\
    \ on Google webhook:\n\n```\nconst {\ndialogflow,\nImage\n} = require('actions-on-google')\n\
    // Create an app instance\nconst app = dialogflow();\n// Register handlers for\
    \ Dialogflow intents\napp.intent('Default Welcome Intent', conv => {\nconv.ask('Hi,\
    \ how is it going?')\nconv.ask(`Here's a picture of a cat`)\nconv.ask(new Image({\n\
    url: 'https://developers.google.com/web/fundamentals/accessibility/semantics-builtin/imgs/160204193356-01-cat-500.jpg',\n\
    alt: 'A cat',\n}));\n});\n// Intent in Dialogflow called `Goodbye` which closes\
    \ the action\napp.intent('Goodbye', conv => {\nconv.close('See you later!')\n\
    });\napp.intent('Default Fallback Intent', conv => {\nconv.ask(`I didn't understand.\
    \ Can you tell me something else?`)\n});\nListing 7-1\nActions on Google webhook\
    \ example\n```\n\nIn this sample piece of code, you see that Dialogflow will be\
    \ loaded from the `actions-on-google` library. Once you have a Dialogflow app\
    \ instance, you can register handlers that listen to intents invoked in Dialogflow.\n\
    \nWith the `conv()` object, you can return content. This can be text, which will\
    \ be synthesized to speech, but it also can contain rich UI responses, such as\
    \ Images, Basic Cards, Lists, and so on.\n\nThe `actions-on-google` library contains\
    \ many more functions and helper classes, for example, to request a location,\
    \ user information, account login, detecting a screen, and so on.\n\n### Invoke\
    \ Your Action on the Google Assistant with Explicit and Implicit Invocation\n\n\
    **Explicit** invocation occurs when a user tells the Google Assistant to use your\
    \ Action by name, such as *Hey Google, talk to* (trigger phrase) → *<my-action-name>*\
    \ (invocation name specified by the developer) → *to do x y z* (invocation phrase\
    \ specified by the developer). See Figure [7-7](#506047_1_En_7_Chapter.xhtml#Fig7).\
    \ Optionally, the user can include an invocation phrase at the end of their invocation\
    \ that will take them directly to the function they're requesting.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig7_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7 Google Assistant Explicit invocations\n\nIt's also possible to choose\
    \ one or more **Implicit invocation** intents. This is how users can invoke your\
    \ app without specifying its name. For example, if your app can locate nearby\
    \ concerts, users can say, \"*Ok, Google, I want to find concerts around me.*\"\
    \ The Google Assistant attempts to match the user's request to a proper fulfillment,\
    \ such as an Action, search result, or mobile app, then presents recommendations\
    \ to the user. To find matching Actions, Google uses signals such as users telling\
    \ the Assistant to do something similar to an invocation phrase for one of your\
    \ configured intents or when the user is in a context where your Action would\
    \ be appropriate.\n\nThis interaction occurs as follows:\n\n1. A user asks the\
    \ Assistant to perform a task.\n2. The recommendation algorithm determines that\
    \ your Action can complete the user's task.\n3. The Assistant recommends your\
    \ Action to the user.\n\nTo set up Explicit and Implicit intents, click Dialogflow\
    \ on the **Integrations** ➤ **Google Assistant** ➤ **Integration Settings** link\
    \ (Figure [7-8](#506047_1_En_7_Chapter.xhtml#Fig8)). And select the intents in\
    \ both discovery dropdowns.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig8_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8 Setting up invocations in Dialogflow\n\n### Submitting an Action\
    \ via Actions on Google\n\nGoogle has a framework that includes a UI toolkit,\
    \ SDK, a simulator, and tools to deploy your actions to the Google Assistant.\
    \ It's called ***Actions on Google***.\n\nYou can open the Actions Console with\
    \ [`https://console.actions.google.com/`](https://console.actions.google.com/).\
    \ When you are logged in on the same Gmail/Google account in Dialogflow, Actions\
    \ on Google, and your Google Assistant device, then it's possible to test your\
    \ application on a physical device, out of the box.\n\nBefore submitting your\
    \ Action for approval, we recommend you go through a prelaunch checklist. Using\
    \ a checklist catches many of the issues we see during the approval process and\
    \ improves your project's chances of approval. Every subsequent time you update\
    \ the Action package after submission, it must go through another approval cycle.\n\
    \n> **Tip**\n> With Dialogflow ES, it is possible to create different versions\
    \ of your agent to create an immutable version of your Dialogflow agent before\
    \ Action submission. This approach gives you the ability to create multiple versions\
    \ of your Dialogflow agent, publish them to separate environments, and roll back\
    \ to previous versions if necessary.\n\nYou can deploy your action from within\
    \ the **Deploy** tab of the Actions on Google console.\n\n### Building an Action\
    \ with the Actions SDK\n\nNinety percent of all the actions that are available\
    \ on the Google Assistant are actually built with Dialogflow. The reasoning behind\
    \ this is simple; both are Google products, and publishing an action through the\
    \ Dialogflow integration tab is so easy. Why would you choose a different way?\n\
    \nThere is another way to deploy your actions, and that's through the Actions\
    \ SDK. It's a lot more complicated as you have to build the integration yourself,\
    \ but there are some advantages to doing so. Instead of letting Actions on Google\
    \ talk to Dialogflow out of the box, you might want to let Actions on Google connect\
    \ to your own back-end layer where the back-end layer connects to Dialogflow;\
    \ see Figure [7-9](#506047_1_En_7_Chapter.xhtml#Fig9).\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig9_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9 Actions on Google connects to your codebase, and your codebase connects\
    \ to the Dialogflow agent to do intent detection\n\nEnterprises that are building\
    \ large customer experience platforms that support many platforms as channels\
    \ might want to use Dialogflow as the NLU intent detection layer, which will be\
    \ written and maintained in one place; all the channels, including Actions on\
    \ Google, will be middleware. The only purpose of that middleware is to capture\
    \ the user input (typed text or spoken audio transcribed to text), send the response\
    \ text or audio, and present it in the right format. For example, your synthesized\
    \ voice should not contain any hyperlinks, and maybe you also want to support\
    \ Google Assistant UI widgets, like cards. The architecture would look like Figure\
    \ [7-10](#506047_1_En_7_Chapter.xhtml#Fig10).\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig10_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig10_HTML.jpg)\n\
    \nFigure 7-10 Actions on Google connects to your codebase which has a middleware\
    \ layer for handling the Actions SDK and returning SSML or Assistant views, and\
    \ it has a script that connects to the Dialogflow agent to do intent matching.\
    \ Other channels can reuse this last part\n\n> **Tip**\n> In case you are using\
    \ Dialogflow CX instead of Dialogflow Essentials, the Actions SDK solution is,\
    \ by the time of writing this, the only way to bring your conversations to the\
    \ Google Assistant.\n\nBy using the Actions SDK, you will need to bring your own\
    \ NLU/intent detection. When you pick Dialogflow (Essentials or CX), you benefit\
    \ from the fast Google backbone connection, as both Actions on Google and Dialogflow\
    \ are Google products using Google networks, and of course Google's great NLU\
    \ which also powers the Google Assistant.\n\n### Using the Actions SDK Solution\n\
    \nIn order to build this integration, you will need to make use of the Actions\
    \ SDK npm library and the Dialogflow API. Listing [7-2](#506047_1_En_7_Chapter.xhtml#PC2)\
    \ will show you an example of how to build this.\n\n1. Import the libraries.\n\
    2. Create a Google Assistant app instance.\n3. Register handlers for Actions SDK\
    \ intents.\n4. `actions.intent.MAIN` will be triggered when the Action is started.\
    \ We will fetch the Default Welcome Intent by passing in the event name \"`WELCOME`\"\
    .\n5. Let the Google Assistant speak out the `fulfillmentText`.\n6. We will use\
    \ the `actions.intent.TEXT` as a catch-all to pass every incoming user input (spoken\
    \ text, transcribed by the Google Assistant Speech to Text, or written text) as\
    \ text intent detection in Dialogflow.\n7. To create a Dialogflow Session Client\
    \ and a Session Path, we will need a unique ID and the Dialogflow Project ID.\
    \ Steps 7 to 9, the Dialogflow SDK usage, will be further explained in Chapters\
    \ [10](#506047_1_En_10_Chapter.xhtml), [11](#506047_1_En_11_Chapter.xhtml), and\
    \ [12](#506047_1_En_12_Chapter.xhtml).\n8. This is the request which will be formed\
    \ with either a text object or an event object.\n9. Now we call the `detectIntent`\
    \ method from the `sessionClient`, and we pass in the request. It will return\
    \ a promise; once the promise is fulfilled, it returns the response (fulfillment\
    \ text).\n\n```\n// 1)\nconst { actionssdk } = require('actions-on-google');\n\
    const dialogflow = require('@google-cloud/dialogflow');\nconst uuid = require('uuid');\n\
    // 2)\nconst app = actionssdk();\n// 3)\napp.intent('actions.intent.MAIN', async\
    \ (conv) => {\n// 4)\nvar queryInput = {\nevent: {\nname: 'WELCOME',\nlanguageCode:\
    \ 'en'\n}\n};\nvar response = await dialogflowDetection(queryInput);\n// 5)\n\
    conv.ask(response.response.queryResult.fulfillmentText);\n})\napp.intent('actions.intent.TEXT',\
    \ (conv, input) => {\n// 6)\nvar queryInput = {\ntext: {\ntext: input,\nlanguageCode:\
    \ 'en'\n}\n};\nvar response = await dialogflowDetection(queryInput);\nconv.ask(response.queryResult.fulfillmentText);\n\
    });\nasync function dialogflowDetection(){\n// 7)\nconst sessionId = uuid.v4();\n\
    const sessionClient = new dialogflow.SessionsClient();\nconst sessionPath = sessionClient.projectAgentSessionPath(projectId,\
    \ sessionId);\n// 8)\nconst request = {\nsession: this.sessionPath,\nqueryInput:\
    \ qInput,\nqueryParams: null\n};\n// 9)\nconst [response] = await this.sessionClient.detectIntent(request);\n\
    return response;\n}\nListing 7-2\nCode implementation\n```\n\nThe Actions SDK\
    \ requires an *action package file* (`action.json`), which is a kind of a JSON\
    \ manifest file, describing the intents to \"listen\" to and telling the Google\
    \ Assistant what to do once such intent is triggered. See Listing [7-3](#506047_1_En_7_Chapter.xhtml#PC3).\n\
    \n```\n{\n\"actions\": [\n{\n\"description\": \"Default Welcome Intent\",\n\"\
    name\": \"MAIN\",\n\"fulfillment\": {\n\"conversationName\": \"welcome\"\n},\n\
    \"intent\": {\n\"name\": \"actions.intent.MAIN\",\n\"trigger\": {\n\"queryPatterns\"\
    :[\"talk to CCAIDemo\"]\n}\n}\n},\n{\n\"description\": \"Dialogflow Intents\"\
    ,\n\"name\": \"TEXT\",\n\"fulfillment\": {\n\"conversationName\": \"dialogflow_intent\"\
    \n},\n\"intent\": {\n\"name\": \"actions.intent.TEXT\",\n}\n}\n],\n\"conversations\"\
    : {\n\"welcome\": {\n\"name\": \"welcome\",\n\"url\": \"https://www.leeboonstra.dev/webhook/\"\
    \n},\n\"dialogflow_intent\": {\n\"name\": \"dialogflow_intent\",\n\"url\": \"\
    https://www.leeboonstra.dev/webhook/\"\n}\n},\n\"locale\": \"en\"\n}\nListing\
    \ 7-3\nThe action.json file maps intents to fulfillment\n```\n\nEvery Actions\
    \ project must have a welcome intent that acts as an entry point for users to\
    \ start conversations. The welcome intent is triggered when users explicitly invoke\
    \ an Action by uttering its name (e.g., \"Hey Google, talk to the video game agent\"\
    ). This welcome intent is identified with the `actions.intent.MAIN` intent name.\n\
    \nYou can create additional entries in your Action package with intents that you\
    \ define yourself. However, for Dialogflow projects, you will need the `actions.intent.TEXT`\
    \ intent, which will work like a catch-all. All spoken or typed inputs are sent\
    \ as `actions.intent.TEXT` intents. Notice bullet 6, in Listing [7-2](#506047_1_En_7_Chapter.xhtml#PC2),\
    \ and the `actions.intent.TEXT` block in Listing [7-3](#506047_1_En_7_Chapter.xhtml#PC3).\
    \ You can simply grab the raw text and forward it along to your fulfillment server.\
    \ From there, you can process the text with Dialogflow and build a response to\
    \ send back to Actions on Google.\n\nYou can pretty much ignore everything else\
    \ about the Actions SDK. However, there are other nice features, such as triggers.\
    \ This allows users to invoke specific functionality by saying an Action name\
    \ along with an intent (e.g., \"Hey Google, talk to ExampleAction to find some\
    \ shoes\").\n\nIn the next listing, Listing [7-4](#506047_1_En_7_Chapter.xhtml#PC4),\
    \ note the `trigger` block. The `queryPatterns` works as a speech adaptation list\
    \ with hints to bias the Speech to Text model in order to make sure the correct\
    \ parameters marked in the parameter block are sent to your NLU detection layer.\
    \ Without these hints, the STT model could hear something like \"buy some blue\
    \ sweat shoes\" instead of \"buy some blue suede shoes.\" Your NLU layer won't\
    \ understand \"sweat shoes.\"\n\n```\n{\n\"description\": \"Direct access\",\n\
    \"name\": \"BUY\",\n\"fulfillment\": {\n\"conversationName\": \"ExampleAction\"\
    \n},\n\"intent\": {\n\"name\": \"com.example.ExampleAction.BUY\",\n\"parameters\"\
    : [\n{\n\"name\": \"color\",\n\"type\": \"org.schema.type.Color\"\n}\n],\n\"trigger\"\
    : {\n\"queryPatterns\": [\n\"find some $org.schema.type.Color:color sneakers\"\
    ,\n\"buy some blue suede shoes\",\n\"get running shoes\"\n]\n}\n}\n}\nListing\
    \ 7-4\nBias the STT model in the action.json file\n```\n\nThe `conversations`\
    \ block works as a router; it will need access to public HTTPS URLs for retrieving\
    \ the fulfillments. Your back-end fulfillment receives requests from the Assistant,\
    \ processes the request, and responds. You can host this back-end code wherever\
    \ you want to—on-premise or within Google Cloud. Chapter [10](#506047_1_En_10_Chapter.xhtml)\
    \ will discuss the various computing solutions as long as you listen for POST\
    \ requests.\n\nIn case you build a back-end server with express, your POST route\
    \ will look like this:\n\n```\nvar assistant = actionssdk();\nexpressApp.post('/webhook/',\
    \ assistant);\n```\n\nIn case you want to run it locally, you will need a tool\
    \ like **ngrok** to create a secure tunnel. This is because the Google Assistant\
    \ works in the Cloud, and so is Dialogflow. Your fulfillment needs to be available\
    \ via a nonlocal URL on HTTPS. Chapter [10](#506047_1_En_10_Chapter.xhtml) discusses\
    \ ngrok in more detail.\n\nActions on Google also offers a command-line tool called\
    \ **gactions**. With the command `gactions init`, you can generate boilerplate\
    \ code, similar to Listing [7-3](#506047_1_En_7_Chapter.xhtml#PC3).\n\n### Deploying\
    \ Your Action\n\nTo upload your Action package, you will need the `gactions` command-line\
    \ tool and run the following command, replacing `PACKAGE_FILE` and `PROJECT_ID`\
    \ with the relevant values for your project:\n\n```\ngactions update --action_package\
    \ PACKAGE_FILE --project PROJECT_ID\n```\n\n## Building a Callbot with a Phone\
    \ Gateway\n\nThe Dialogflow ES Phone Gateway is an easy way to set up an inbound\
    \ voice agent for telephony. You will get a toll-free number; when you call that\
    \ number, the Dialogflow agent will talk to you. The use case would be more for\
    \ simple phone bots (like a reservation system) or testing purposes. In case you\
    \ want to integrate robots in your IVR/contact center or already have an existing\
    \ contact center (telephony partner), enabling Dialogflow via Contact Center AI\
    \ (as described in the next section) would be a better solution for you.\n\nWhen\
    \ you use the Dialogflow trial version, you won't have access to a toll-free number.\
    \ And you will get limited quotas, such as 3 total phone minutes per minute, 30\
    \ phone minutes per day, 500 phone minutes per month, and the phone number will\
    \ be reserved for only 30 days. The enterprise tiers will include 100 call minutes\
    \ per minute. In other words, the Dialogflow trial is excellent for testing the\
    \ Phone Gateway, but you would like to move to a paid enterprise tier to have\
    \ it working in production. When you receive a busy signal or call drops during\
    \ phone calls, it will mean that you have exceeded your quota.\n\nLet's enable\
    \ the phone gateway.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig11_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig11_HTML.jpg)\n\
    \nFigure 7-11 Enable beta features and APIs in the settings panel\n\n1. At the\
    \ time of writing, this feature is beta. In case you can't find the speech tab\
    \ in the settings panel, you will need to enable the beta features first (see\
    \ Figure [7-11](#506047_1_En_7_Chapter.xhtml#Fig11)). This can be found in the\
    \ **Settings** ➤ **General** tab.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig12_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig12_HTML.jpg)\n\
    \nFigure 7-12 Enable"
  raw: "## Integrating Your Agent with a Dialogflow Messenger\n\nThe Dialogflow Messenger\
    \ integration is a more advanced widget you can place in your website, which connects\
    \ to your Dialogflow agent. It only works for text chats. The look and feel of\
    \ this component is customizable, although some enterprises prefer to build their\
    \ web integration themselves (e.g., so they can connect to more systems), many\
    \ businesses like the Dialogflow Messenger component as it’s an easy and fast\
    \ way to integrate with your website or web app.\n\nIn the Dialogflow console,\
    \ click the menu on **Integrations**.\n\nClick the integration: **Dialogflow Messenger**.\n\
    \nA pop-up will appear (Figure [6-11](#506047_1_En_6_Chapter.xhtml#Fig11)), which\
    \ will show a (JavaScript) code snippet, which you can copy and paste into your\
    \ website.\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig11_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11\n\nDialogflow Messenger implementation\n\nWhen you click the **Try\
    \ it now** button in the pop-up, you will see how the implementation looks like.\
    \ It will show a pop-up button on the bottom of the screen (Figure [6-12](#506047_1_En_6_Chapter.xhtml#Fig12),\
    \ with the avatar that has been set in the Settings of Dialogflow).\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig12_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12\n\nDialogflow Messenger pop-up button\n\nThis button will open a\
    \ chat pop-up (Figure [6-13](#506047_1_En_6_Chapter.xhtml#Fig13)), which actually\
    \ is a web component (`df-messenger`).\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig13_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13\n\nDialogflow Messenger web component\n\nListing [6-3](#506047_1_En_6_Chapter.xhtml#PC3)\
    \ shows the JavaScript code which can be implemented on your website. Paste the\
    \ embed code you copied earlier in a web page on your website. The `<script>`\
    \ and `<df-messenger>` HTML elements should be in the `<body>` element of your\
    \ web page.\n\n```\n\nListing 6-3\nDialogflow Messenger implementation example,\
    \ web component\n```\n\nTo allow for responsive layouts, also add the following\
    \ to your page:\n\n```\nIt is possible to expand the web component without clicking\
    \ the\nbutton with the setting `expand=\"true\"` in the\n`df-messenger`\ncomponent.\n\
    You can also keep the initial speech bubble closed when you load a\nweb page,\
    \ with wait-open=“true”.\nThe Dialogflow Messenger component won’t support\nvoice.\
    \ Also, it can only support one language. However, you can use a\n*mega agent*\
    \ and create multiple sub-agents in different\nlanguages.\n\nChanging the Look\
    \ and Feel of the Chatbot\nComponent\n\nThe Dialogflow web component provides\
    \ a\nwide range of settings to override styles in your chatbot. You will just\n\
    need to add a style tag above the `<df-messenger>`\ncomponent, and you can include\
    \ the CSS variables of choice, as shown in\nListing [6-4](#506047_1_En_6_Chapter.xhtml#PC5).\n\
    \n```\ndf-messenger {\n--df-messenger-bot-message: #282828;\n--df-messenger-button-titlebar-color:\
    \ #ff9000;\n--df-messenger-button-titlebar-font-color: #ffffff;\n--df-messenger-chat-background-color:\
    \ #121212;\n--df-messenger-font-color: white;\n--df-messenger-send-icon: #878fac;\n\
    --df-messenger-user-message: #535353;\n--df-messenger-input-font-color: #000;\n\
    --df-messenger-input-placeholder-font-color: #cccccc;\n--df-minimized-chat-close-icon-color:\
    \ #ff9000;\n}\n\nListing 6-4\nDialogflow Messenger styles of the web component\n\
    ```\n\nFigure [6-14](#506047_1_En_6_Chapter.xhtml#Fig14) shows how\nthese style\
    \ settings will look like once the chatbot is rendered in the\nbrowser.\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig14_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig14_HTML.jpg)\n\
    \nFigure 6-14\nDialogflow Messenger with custom styling\n\nRich Messages Support\n\
    \nYou can add rich messages responses by\nadding code to the **Default custom\
    \ payload** box in the\nIntent in Dialogflow, as shown in Figure [6-15](#506047_1_En_6_Chapter.xhtml#Fig15).\n\
    \n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig15_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig15_HTML.jpg)\n\
    \nFigure 6-15\nDialogflow Messenger custom payload\n\nThe rich messages that are\
    \ supported are Info\n**Responses**, **Images**,\n**Lists** (as seen in Figure\
    \ [6-16](#506047_1_En_6_Chapter.xhtml#Fig16)),\n**Accordions** (boxes that can\
    \ expand),\n**Buttons**, and **Suggestion Chips**. Note\nthe `richContent`\nfield\
    \ that can hold arrays. You can find the implementation examples in\nthe Dialogflow\
    \ documentation.\n\n![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig16_HTML.jpg](images/506047_1_En_6_Chapter/506047_1_En_6_Fig16_HTML.jpg)\n\
    \nFigure 6-16\nDialogflow Messenger custom payload example\n\nThere are also JavaScript\
    \ event triggers available, for example, to\nrender more custom rich messages\
    \ or to make links clickable.\nThe event target for these events is either the\
    \ `df-messenger` element\n(see Listing [6-5](#506047_1_En_6_Chapter.xhtml#PC6))\
    \ or the `window` global\nvariable.\n\nTo add an event listener for the df-messenger\
    \ element, add the following\nJavaScript code, where eventType is one of the event\
    \ names described in\nListing [6-5](#506047_1_En_6_Chapter.xhtml#PC6).\n\n```\n\
    const dfMessenger = document.querySelector('df-messenger');\ndfMessenger.addEventListener('eventType',\
    \ function (event) {\n// Handle event\n...\n});\nListing 6-5\nDialogflow Messenger\
    \ creating event listeners on the web component\n```\n\nTo add an event listener\
    \ for window, add the following JavaScript code\n(Listing [6-6](#506047_1_En_6_Chapter.xhtml#PC7)),\
    \ where `eventType` is one of\nthe event names described.\n\n```\nwindow.addEventListener('eventType',\
    \ function (event) {\n// Handle event\n...\n});\nListing 6-6\nDialogflow Messenger\
    \ creating event listeners on the window element\n```\n\nSummary\n\nThis chapter\
    \ describes some out-of-the-box (text-based) integrations\nthat address the following\
    \ tasks:\n\n*   You want to deploy your chatbot to Google Chat with the Hangouts\n\
    \    integration.\n\n*   You want to quickly deploy your chatbot to a website\
    \ with the web\n    demo.\n\n*   You want to quickly deploy your chatbot to a\
    \ website and change\n    the look and feel with Dialogflow Messenger.\n\nThe\
    \ source code for this book is available on GitHub via the book’s\nproduct page,\
    \ located at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4).\n\
    Look into the deploying-integrations-webcomponent and _dialogflow-agent\n(**Buy_Console\
    \ intent**) folders.\n\nFurther Reading\n\n*   Google Workspace documentation\
    \ for allowing bots\n\n    [`https://support.google.com/a/answer/7651360`](https://support.google.com/a/answer/7651360)\n\
    \n*   Dialogflow documentation on Google Chat\n\n    [`https://cloud.google.com/dialogflow/es/docs/integrations/hangouts`](https://cloud.google.com/dialogflow/es/docs/integrations/hangouts)\n\
    \n*   Google documentation on Google Chat API\n\n    [`https://developers.google.com/hangouts/chat`](https://developers.google.com/hangouts/chat)\n\
    \    and [`https://developers.google.com/hangouts/chat/how-tos/bots-publish`](https://developers.google.com/hangouts/chat/how-tos/bots-publish)\n\
    \n*   Google Chat card documentation\n\n    [`https://developers.google.com/hangouts/chat/reference/message-formats/cards`](https://developers.google.com/hangouts/chat/reference/message-formats/cards)\n\
    \n*   Dialogflow documentation on integrations\n\n    [`https://cloud.google.com/dialogflow/es/docs/quick/integration`](https://cloud.google.com/dialogflow/es/docs/quick/integration)\n\
    \n*   Dialogflow documentation on Dialogflow Messenger\n\n    [`https://cloud.google.com/dialogflow/es/docs/integrations/dialogflow-messenger`](https://cloud.google.com/dialogflow/es/docs/integrations/dialogflow-messenger)\n\
    \n*   More information on web components\n\n    [`https://developers.google.com/web/fundamentals/web-components/shadowdom`](https://developers.google.com/web/fundamentals/web-components/shadowdom)\n\
    \n7. Building Voice Agents\n\nLet’s discuss voice bots. Typically, when we think\
    \ of chatbots for\nvoice, we would think of smart assistants, such as the Google\
    \ Assistant,\nAlexa, or Siri. But there’s actually another famous business case\
    \ where\nyou can use virtual agents for—bots in contact centers and telephony\n\
    lines.\nSince **Google\nAssistant**  and Dialogflow are both Google products,\
    \ you\nwouldn’t be surprised that deploying voice bots to the Google Assistant\n\
    is so easy.\nThe **Dialogflow\nPhone Gateway**  feature provides a telephone interface\
    \ to\nyour agent. This is great for creating inbound simple interactive voice\n\
    responses tied to a service number, such as telephone reservation\nsystems or\
    \ simple information lines.\nUsers who call the phone number will be connected\
    \ to the Dialogflow\nvoice agent. A conversation can be handled very naturally\
    \ through Speech to Text (STT) and\nText to Speech\n(TTS) with humanlike voices.\n\
    Google Cloud has a solution called **Contact Center\nAI** . This is an out-of-the-box\
    \ solution for telephony\ncontact centers to use artificial intelligence to automate\
    \ conversations\nand help live assistants in real time. No machine learning expertise\
    \ is\nrequired since Contact Center AI will be delivered and enabled through\n\
    well-known telephony partners, such as Genesys, Avaya, Mitel, Twilio,\nCisco,\
    \ Five9, and more. It’s using popular Google Cloud components,\nincluding Dialogflow,\
    \ Speech-to-Text, and Text-to-Speech.\nThis chapter will include all of this,\
    \ including how to improve your\nvoice bots.\n\nBuilding a Voice AI for a Virtual\
    \ Assistant Like the\nGoogle Assistant\n\nLet’s start with an easy-to-build Voice\
    \ AI solution, building a Voice AI\nfor the Google Assistant. Both are Google\
    \ products, and it’s integrated\nout of the box when using Dialogflow. Getting\
    \ this to work is just a\nmatter of enabling the service and using the same Google\
    \ user account\nfor both services. Once it’s enabled, your Dialogflow agent is\
    \ available\nto the Google Assistant as an action (Google Assistant app). End\
    \ users\ncan invoke the action through their wake word: *Hey Google, talk to\n\
    <action-name>.* Under the hood, it will open your Dialogflow\nagent, letting the\
    \ Google Assistant deal with the Speech to Text and\nText to Speech. Dialogflow\
    \ will be used for Natural Language\nUnderstanding, intent matching, entity recognition,\
    \ and content\nmanagement. See the diagram in Figure [7-1](#506047_1_En_7_Chapter.xhtml#Fig1).\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig1_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\nThe user interacts with the Google Assistant, and through Actions\
    \ on\nGoogle, the Google Assistant connects to the Dialogflow agent. It all\n\
    works out of the box\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig2_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\nSet up Google Assistant integration\n\n1.  First, click **Integrations**\
    \ ➤ **Google\n    Assistant** ➤ **Integration Settings**. This will\n    open\
    \ a pop-up; see Figure [7-2](#506047_1_En_7_Chapter.xhtml#Fig2). Click the\n \
    \   **Test** button. This will open the Actions on Google\n    console ([`https://console.actions.google.com/`](https://console.actions.google.com/)).\n\
    \    Pay attention; you are logged in on Actions on Google with the same\n   \
    \ Google account as Dialogflow. If this gives you problems, often due to\n   \
    \ having multiple Google accounts, log out on all accounts, and try to log\n \
    \   back in.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig3_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\nWhen you are new to Actions on Google, you have to fill out this\n\
    form\n\n1.  When you are new to Actions on Google, you will need to go through\
    \ a\n    form to agree on the services (see Figure [7-3](#506047_1_En_7_Chapter.xhtml#Fig3)).\n\
    \n1.  Now you are in the simulator. Make sure the simulator is set to\n    English\
    \ (United States), select a device (e.g., phone), and click\n    **Talk to my\
    \ test-app**.\n\n*The action will greet you with the basic Dialogflow default\
    \ intent.\nThat means that setting up the integration with Actions on Google\n\
    worked! See* *Figure* [*7-4*](#506047_1_En_7_Chapter.xhtml#Fig4)*.*\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig4_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\nYour Dialogflow agent in action, in the Actions on\nGoogle simulator\
    \ ([*https://console.actions.google.com*](https://console.actions.google.com))\n\
    \nRich Messages\n\nWhen you are building actions for the Google\nAssistant, you\
    \ might want to use the particular rich messages that\nActions on Google offers.\
    \ Once you have set up the Google Assistant\nintegration in Dialogflow, you will\
    \ notice that there’s a new tab in the\nresponse block of your intents (Figure\
    \ [7-5](#506047_1_En_7_Chapter.xhtml#Fig5)).\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig5_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\nCustom Google Assistant responses\n\nWhen it’s not there, you can\
    \ easily add this tab to your response\nblock by clicking the **+** tab.\n\nThere\
    \ are three main settings in the Google Assistant tab:\n\n1.  You can choose not\
    \ to override the *DEFAULT* tab. For example,\n    if the default text response\
    \ is the same as the Google Assistant text\n    response, you might want to enable\
    \ the first switch.\n\n2.  The **Add Responses** button to add rich messages\n\
    \    (custom payloads) to your agent.\n\n3.  A switch to set the intent at the\
    \ end of the conversation. On Google\n    Assistant, it means that you are leaving\
    \ the scope of your action. For\n    example, you could create a Goodbye intent\
    \ and have this switch\n    enabled.\n\nWhen you click the **Add Responses** (Figure\
    \ [7-6](#506047_1_En_7_Chapter.xhtml#Fig6)) button, you can\nchoose between the\
    \ following custom payload responses:\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig6_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6\nClick the Add Responses button to show a pop-up for selecting between\n\
    the various custom Google Assistant responses\n\n*   **Simple Response**: Simple\
    \ responses take the form\n    of a chat bubble visually and use Text to Speech\
    \ (TTS) or\n    Speech Synthesis Markup\n    Language (SSML) for sound.\n\n* \
    \  **Basic Card**: Use basic cards mainly for display\n    purposes. They are\
    \ designed to be concise, to present key (or summary)\n    information to users,\
    \ and allow users to learn more if they choose\n    (using a weblink).\n\n*  \
    \ **List**: The single-select list presents the user\n    with a vertical list\
    \ of multiple items and selects a single one.\n    Selecting an item from the\
    \ list generates a user query (chat bubble)\n    containing the list item’s title.\n\
    \n*   **Suggestion Chips**: Use suggestion chips to\n    continue or pivot the\
    \ conversation; they look like little\n    buttons.\n\n*   **Carousel Card and\
    \ Browse Carousel Card**: A\n    carousel is a rich response that allows users\
    \ to scroll\n    vertically and select a tile in a collection. Dialogflow has\
    \ two\n    different configurations for carousels, Carousel and Browse\n    Carousel.\n\
    \n*   **Link out suggestion**: Link to an external\n    website.\n\n*   **Media\
    \ Content**: Media responses let your Actions\n    play audio content with a playback\
    \ duration longer than the 240-second\n    limit of SSML.\n\n*   **Table Card**:\
    \ Table cards allow you to display\n    tabular data in your response (e.g., sports\
    \ standings, election results,\n    and flights). You can define columns and rows\
    \ (up to 3 each) that the\n    Assistant is required to show in your table card.\
    \ You can also specify\n    additional columns and rows along with their prioritization.\
    \ Tables are\n    different from vertical lists because tables display static\
    \ data and are\n    not interactable, like list elements.\n\n*   **Custom Payload**:\
    \ You can write your JSON in the\n    format how Actions on Google expects it,\
    \ for example, when you want more\n    buttons or sections in a card.\n\nFulfillment\
    \ and Webhooks\nFor developers, Actions on Google has its own client library;\
    \ it’s\navailable in Node Package\nManager (NPM)\n under the name **actions-on-google-nodejs**.\n\
    \nThis client library makes it easy to create Actions for the Google\nAssistant\
    \ and supports Dialogflow, Actions SDK, and Smart Home\nfulfillment. You can deploy\
    \ the code on your own server or use the\nDialogflow inline editor. For more information\
    \ on fulfillments and\nwebhooks, see Chapter [10](#506047_1_En_10_Chapter.xhtml).\
    \ Listing [7-1](#506047_1_En_7_Chapter.xhtml#PC1) shows an example\nof an Actions\
    \ on Google webhook:\n\n```\nconst {\ndialogflow,\nImage\n} = require('actions-on-google')\n\
    // Create an app instance\nconst app = dialogflow();\n// Register handlers for\
    \ Dialogflow intents\napp.intent('Default Welcome Intent', conv => {\nconv.ask('Hi,\
    \ how is it going?')\nconv.ask(`Here's a picture of a cat`)\nconv.ask(new Image({\n\
    url: 'https://developers.google.com/web/fundamentals/accessibility/semantics-builtin/imgs/160204193356-01-cat-500.jpg',\n\
    alt: 'A cat',\n}));\n});\n// Intent in Dialogflow called `Goodbye` which closes\
    \ the action\napp.intent('Goodbye', conv => {\nconv.close('See you later!')\n\
    });\napp.intent('Default Fallback Intent', conv => {\nconv.ask(`I didn't understand.\
    \ Can you tell me something else?`)\n});\nListing 7-1\nActions on Google webhook\
    \ example\n```\n\nIn this sample piece of code, you see that Dialogflow will be\
    \ loaded\nfrom the actions-on-google library. Once you have a Dialogflow app\n\
    instance, you can register handlers that listen to intents invoked in\nDialogflow.\n\
    With the `conv()` object , you can return\ncontent. This can be text, which will\
    \ be synthesized to speech, but it\nalso can contain rich UI responses, such as\
    \ Images, Basic Cards, Lists,\nand so on.\nThe actions-on-google library contains\
    \ many more functions and helper\nclasses, for example, to request a location,\
    \ user information, account\nlogin, detecting a screen, and so on.\n\nInvoke Your\
    \ Action on the Google Assistant with\nExplicit and Implicit Invocation\n\n**Explicit**\
    \ invocation occurs when a user tells the Google\nAssistant to use\nyour Action\
    \ by name, such as *Hey Google, talk to* (trigger\nphrase) → *<my-action-name>*\
    \ (invocation name specified by\nthe developer) → *to do x y z* (invocation phrase\
    \ specified by\nthe developer). See Figure [7-7](#506047_1_En_7_Chapter.xhtml#Fig7).\
    \ Optionally, the\nuser can include an invocation phrase at the end of their invocation\n\
    that will take them directly to the function they’re requesting.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig7_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7\nGoogle Assistant Explicit invocations\n\nIt’s also possible to choose\
    \ one or more **Implicit\ninvocation** intents. This is how users can invoke your\
    \ app\nwithout specifying its name. For example, if your app can locate nearby\n\
    concerts, users can say, “*Ok, Google, I want to find concerts around\nme.*” The\
    \ Google Assistant attempts to match the user’s request to a\nproper fulfillment,\
    \ such as an Action, search result, or mobile app,\nthen presents recommendations\
    \ to the user. To find matching Actions,\nGoogle uses signals such as users telling\
    \ the Assistant to do something\nsimilar to an invocation phrase for one of your\
    \ configured intents or\nwhen the user is in a context where your Action would\
    \ be\nappropriate.\n\nThis interaction occurs as follows:\n\n1.  A user asks the\
    \ Assistant to perform a task.\n\n2.  The recommendation algorithm determines\
    \ that your Action can complete\n    the user’s task.\n\n3.  The Assistant recommends\
    \ your Action to the user.\n\nTo set up Explicit and Implicit intents, click Dialogflow\
    \ on the\n**Integrations** ➤ **Google Assistant** ➤\n**Integration Settings**\
    \ link (Figure [7-8](#506047_1_En_7_Chapter.xhtml#Fig8)). And select the\nintents\
    \ in both discovery dropdowns.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig8_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8\nSetting up invocations in Dialogflow\n\nSubmitting an Action via\
    \ Actions on Google\nGoogle has a framework that includes\na UI toolkit, SDK,\
    \ a simulator, and tools to deploy your actions to the\nGoogle Assistant. It’s\
    \ called ***Actions on\nGoogle***.\nYou can open the Actions Console with [`https://console.actions.google.com/`](https://console.actions.google.com/).\n\
    When you are logged in on the same Gmail/Google account in\nDialogflow, Actions\
    \ on Google, and your Google Assistant device, then\nit’s possible to test your\
    \ application on a physical device, out of the\nbox.\nBefore submitting your Action\
    \ for approval, we recommend you go\nthrough a prelaunch checklist. Using a checklist\
    \ catches many of the\nissues we see during the approval process and improves\
    \ your project’s\nchances of approval. Every subsequent time you update the Action\
    \ package\nafter submission, it must go through another approval cycle.\n\nTip\n\
    \nWith Dialogflow ES, it is possible to create different versions of\nyour agent\
    \ to create an immutable version of your Dialogflow agent\nbefore Action submission.\
    \ This approach gives you the ability to create\nmultiple versions of your Dialogflow\
    \ agent, publish them to separate\nenvironments, and roll back to previous versions\
    \ if necessary.\n\nYou can deploy your action from within the **Deploy**\ntab\
    \ of the Actions on Google console.\n\nBuilding an Action with the Actions SDK\n\
    Ninety percent of all the actions that are available on the Google\nAssistant\
    \ are actually built with Dialogflow. The reasoning behind this\nis simple; both\
    \ are Google products, and publishing an action through\nthe Dialogflow integration\
    \ tab is so easy. Why would you choose a\ndifferent way?\n\nThere is another\n\
    way to deploy your actions, and that’s through the Actions SDK. It’s a\nlot more\
    \ complicated as you have to build the integration yourself, but\nthere are some\
    \ advantages to doing so. Instead of letting Actions on\nGoogle talk to Dialogflow\
    \ out of the box, you might want to let Actions\non Google connect to your own\
    \ back-end layer where the back-end layer\nconnects to Dialogflow; see Figure\
    \ [7-9](#506047_1_En_7_Chapter.xhtml#Fig9).\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig9_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9\nActions on Google connects to your codebase, and your codebase\n\
    connects to the Dialogflow agent to do intent detection\n\nEnterprises that are\
    \ building large customer experience platforms that\nsupport many platforms as\
    \ channels might want to use Dialogflow as the\nNLU intent detection layer, which\
    \ will be written and maintained in one\nplace; all the channels, including Actions\
    \ on Google, will be\nmiddleware. The only purpose of that middleware is to capture\
    \ the user\ninput (typed text or spoken audio transcribed to text), send the\n\
    response text or audio, and present it in the right format. For example,\nyour\
    \ synthesized voice should not contain any hyperlinks, and maybe you\nalso want\
    \ to support Google Assistant UI widgets, like cards. The\narchitecture would\
    \ look like Figure [7-10](#506047_1_En_7_Chapter.xhtml#Fig10).\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig10_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig10_HTML.jpg)\n\
    \nFigure 7-10\nActions on Google connects to your\ncodebase which has a middleware\
    \ layer for handling the Actions sdk and\nreturning SSML or Assistant views, and\
    \ it has a script that connects to\nthe Dialogflow agent to do intent matching.\
    \ Other channels can reuse\nthis last part\n\nTip\n\nIn case you are using Dialogflow\
    \ CX instead of Dialogflow Essentials,\nthe Actions SDK solution is, by the time\
    \ of writing this, the only way\nto bring your conversations to the Google Assistant.\n\
    \nBy using the Actions SDK, you will need to bring your own NLU/intent\ndetection.\
    \ When you pick Dialogflow (Essentials or CX), you benefit from\nthe fast Google\
    \ backbone connection, as both Actions on Google and\nDialogflow are Google products\
    \ using Google networks, and of course\nGoogle’s great NLU which also powers the\
    \ Google Assistant.\n\nUsing the Actions SDK Solution\n\nIn order to build this\
    \ integration, you will\nneed to make use of the Actions SDK npm library and the\
    \ Dialogflow API.\nListing [7-2](#506047_1_En_7_Chapter.xhtml#PC2) will show you\
    \ an\nexample of how to build this.\n\n1.  Import the libraries.\n\n2.  Create\
    \ a Google Assistant app instance.\n\n3.  Register handlers for Actions SDK intents.\n\
    \n4.  `actions.intent.MAIN`\n    will be triggered when the Action is started.\
    \ We will fetch the Default\n    Welcome Intent by passing in the event name “`WELCOME`”.\n\
    \n5.  Let the Google Assistant speak out the fulfillmentText.\n\n6.  We will use\
    \ the `actions.intent.TEXT`\n    as a catch-all to pass every incoming user input\
    \ (spoken text,\n    transcribed by the Google Assistant Speech to Text, or written\
    \ text) as\n    text intent detection in Dialogflow.\n\n7.  To create a Dialogflow\
    \ Session Client and a Session Path, we will\n    need a unique ID and the Dialogflow\
    \ Project ID. Steps 7 to 9, the\n    Dialogflow SDK usage, will be further explained\
    \ in Chapters [10](#506047_1_En_10_Chapter.xhtml), [11](#506047_1_En_11_Chapter.xhtml),\
    \ and [12](#506047_1_En_12_Chapter.xhtml).\n\n8.  This is the request which will\
    \ be formed with either a text object or\n    an event object.\n\n9.  Now we call\
    \ the `detectIntent` method\n    from the `sessionClient`, and we\n    pass in\
    \ the request. It will return a promise; once the promise is\n    fulfilled, it\
    \ returns the response (fulfillment text).\n\n```\n// 1)\nconst { actionssdk }\
    \ = require('actions-on-google');\nconst dialogflow = require('@google-cloud/dialogflow');\n\
    const uuid = require('uuid');\n// 2)\nconst app = actionssdk();\n// 3)\napp.intent('actions.intent.MAIN',\
    \ async (conv) => {\n// 4)\nvar queryInput = {\nevent: {\nname: 'WELCOME',\nlanguageCode:\
    \ 'en'\n}\n};\nvar response = await dialogflowDetection(queryInput);\n// 5)\n\
    conv.ask(response.response.queryResult.fulfillmentText);\n})\napp.intent('actions.intent.TEXT',\
    \ (conv, input) => {\n// 6)\nvar queryInput = {\ntext: {\ntext: input,\nlanguageCode:\
    \ 'en'\n}\n};\nvar response = await dialogflowDetection(queryInput);\nconv.ask(response.queryResult.fulfillmentText);\n\
    });\nasync function dialogflowDetection(){\n// 7)\nconst sessionId = uuid.v4();\n\
    const sessionClient = new dialogflow.SessionsClient();\nconst sessionPath = sessionClient.projectAgentSessionPath(projectId,\
    \ sessionId);\n// 8)\nconst request = {\nsession: this.sessionPath,\nqueryInput:\
    \ qInput,\nqueryParams: null\n};\n// 9)\nconst [response] = await this.sessionClient.detectIntent(request);\n\
    return response;\n}\nListing 7-2\nCode implementation\n```\n\nThe Actions SDK\
    \ requires an *action package file* (action.json),\nwhich is a kind of a JSON\
    \ manifest file, describing the intents to\n“listen” to and telling the Google\
    \ Assistant what to do once such intent\nis triggered. See Listing [7-3](#506047_1_En_7_Chapter.xhtml#PC3).\n\
    \n```\n{\n\"actions\": [\n{\n\"description\": \"Default Welcome Intent\",\n\"\
    name\": \"MAIN\",\n\"fulfillment\": {\n\"conversationName\": \"welcome\"\n},\n\
    \"intent\": {\n\"name\": \"actions.intent.MAIN\",\n\"trigger\": {\n\"queryPatterns\"\
    :[\"talk to CCAIDemo\"]\n}\n}\n},\n{\n\"description\": \"Dialogflow Intents\"\
    ,\n\"name\": \"TEXT\",\n\"fulfillment\": {\n\"conversationName\": \"dialogflow_intent\"\
    \n},\n\"intent\": {\n\"name\": \"actions.intent.TEXT\",\n}\n}\n],\n\"conversations\"\
    : {\n\"welcome\": {\n\"name\": \"welcome\",\n\"url\": \"https://www.leeboonstra.dev/webhook/\"\
    \n},\n\"dialogflow_intent\": {\n\"name\": \"dialogflow_intent\",\n\"url\": \"\
    https://www.leeboonstra.dev/webhook/\"\n}\n},\n\"locale\": \"en\"\n}\nListing\
    \ 7-3\nThe action.json file maps intents to fulfillment\n```\n\nEvery Actions\
    \ project must have a welcome intent that acts as an\nentry point for users to\
    \ start conversations. The welcome intent is\ntriggered when users explicitly\
    \ invoke an Action by uttering its name\n(e.g., “Hey Google, talk to the video\
    \ game agent”). This welcome intent\nis identified with the `actions.intent.MAIN`\n\
    intent name.\nYou can create additional entries in your Action package with intents\n\
    that you define yourself. However, for Dialogflow projects, you will\nneed the\
    \ `actions.intent.TEXT`\nintent, which will work like a catch-all. All spoken\
    \ or typed inputs are\nsent as `actions.intent.TEXT`\nintents. Notice bullet 6,\
    \ in Listing [7-2](#506047_1_En_7_Chapter.xhtml#PC2), and the `actions.intent.TEXT`\n\
    block in Listing [7-3](#506047_1_En_7_Chapter.xhtml#PC3). You can simply\ngrab\
    \ the raw text and forward it along to your fulfillment server. From\nthere, you\
    \ can process the text with Dialogflow and build a response to\nsend back to Actions\
    \ on Google.\nYou can pretty much ignore everything else about the Actions SDK.\n\
    However, there are other nice features, such as triggers. This allows\nusers to\
    \ invoke specific functionality by saying an Action name along\nwith an intent\
    \ (e.g., “Hey Google, talk to ExampleAction to find some\nshoes”).\n\nIn the next\
    \ listing, Listing [7-4](#506047_1_En_7_Chapter.xhtml#PC4), note the `trigger`\
    \ block. The\n`queryPatterns`\nworks as a speech adaptation list with hints to\
    \ bias the Speech to Text\nmodel in order to make sure the correct parameters\
    \ marked in the\nparameter block are sent to your NLU detection layer. Without\
    \ these\nhints, the STT model could hear something like “buy\nsome blue sweat\
    \ shoes” instead of “buy some blue suede shoes.” Your NLU\nlayer won’t understand\
    \ “sweat shoes.”\n\n```\n{\n\"description\": \"Direct access\",\n\"name\": \"\
    BUY\",\n\"fulfillment\": {\n\"conversationName\": \"ExampleAction\"\n},\n\"intent\"\
    : {\n\"name\": \"com.example.ExampleAction.BUY\",\n\"parameters\": [\n{\n\"name\"\
    : \"color\",\n\"type\": \"org.schema.type.Color\"\n}\n],\n\"trigger\": {\n\"queryPatterns\"\
    : [\n\"find some $org.schema.type.Color:color sneakers\",\n\"buy some blue suede\
    \ shoes\",\n\"get running shoes\"\n]\n}\n}\n}\nListing 7-4\nBias the STT model\
    \ in the action.json file\n```\n\nThe `conversations` block\nworks as a router;\
    \ it will need access to public HTTPS URLs for\nretrieving the fulfillments. Your\
    \ back-end fulfillment receives requests\nfrom the Assistant, processes the request,\
    \ and responds. You can host\nthis back-end code wherever you want to—on-premise\
    \ or within Google\nCloud. Chapter [10](#506047_1_En_10_Chapter.xhtml) will discuss\
    \ the various\ncomputing solutions as long as you listen for POST requests.\n\n\
    In case you build a back-end server with express, your POST route will\nlook like\
    \ this:\n\n```\nvar assistant = actionssdk();\nexpressApp.post('/webhook/', assistant);\n\
    ```\n\nIn case you want to run it locally, you will need a tool like\n**ngrok**\
    \ to create a secure tunnel. This is because the\nGoogle Assistant works in the\
    \ Cloud, and so is Dialogflow. Your\nfulfillment needs to be available via a nonlocal\
    \ URL on HTTPS. Chapter\n[10](#506047_1_En_10_Chapter.xhtml) discusses ngrok in\
    \ more\ndetail.\nActions on Google also offers a command-line tool called\n**gactions**.\
    \ With the command `gactions init`, you\ncan generate boilerplate code, similar\
    \ to Listing [7-3](#506047_1_En_7_Chapter.xhtml#PC3).\n\nDeploying Your Action\n\
    \nTo upload your Action package, you will need\nthe gactions command-line tool\
    \ and run the following command, replacing\n`PACKAGE_FILE`\nand `PROJECT_ID`\n\
    with the relevant values for your project:\n\n```\ngactions update --action_package\
    \ PACKAGE_FILE --project PROJECT_ID\n```\n\nBuilding a Callbot with a Phone Gateway\n\
    The Dialogflow ES\nPhone Gateway is an easy way to set up an inbound voice agent\
    \ for\ntelephony. You will get a toll-free number; when you call that number,\n\
    the Dialogflow agent will talk to you. The use case would be more for\nsimple\
    \ phone bots (like a reservation system) or testing purposes. In\ncase you want\
    \ to integrate robots in your IVR/contact center or already\nhave an existing\
    \ contact center (telephony partner), enabling Dialogflow\nvia Contact Center\
    \ AI (as described in the next section) would be a\nbetter solution for you.\n\
    When you use the Dialogflow trial version, you won’t have access to a\ntoll-free\
    \ number. And you will get limited quotas, such as 3 total phone\nminutes per\
    \ minute, 30 phone minutes per day, 500 phone minutes per\nmonth, and the phone\
    \ number will be reserved for only 30 days. The\nenterprise tiers will include\
    \ 100 call minutes per minute. In other\nwords, the Dialogflow trial is excellent\
    \ for testing the Phone Gateway,\nbut you would like to move to a paid enterprise\
    \ tier to have it working\nin production. When you receive a busy signal or call\
    \ drops during phone\ncalls, it will mean that you have exceeded your quota.\n\
    \nLet’s enable the phone gateway.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig11_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig11_HTML.jpg)\n\
    \nFigure 7-11\nEnable beta features and APIs in the settings panel\n\n1.  At the\
    \ time of writing, this feature is beta. In case you can’t find\n    the speech\
    \ tab in the settings panel, you will need to enable the beta\n    features first\
    \ (see Figure [7-11](#506047_1_En_7_Chapter.xhtml#Fig11)). This can be\n    found\
    \ in the **Settings** ➤ **General**\n    tab.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig12_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig12_HTML.jpg)\n\
    \nFigure 7-12\nEnable the Dialogflow Phone Gateway\n\n1.  Click **Integrations**.\n\
    \n2.  Click **Telephony Phone Gateway** (Figure [7-12](#506047_1_En_7_Chapter.xhtml#Fig12)).\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig13_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig13_HTML.jpg)\n\
    \nFigure 7-13\nDialogflow Phone Gateway pop-up, pick a country and an area code\n\
    \n1.  A pop-up will appear; here’s where you can configure the telephony\n   \
    \ gateway (see Figure [7-13](#506047_1_En_7_Chapter.xhtml#Fig13)).\n\n1.  It’s\
    \ possible to select a **language** and a\n    **country code**.\n\nNote\n\nWhile\
    \ this feature is still in beta, the only languages and phone\nnumbers currently\
    \ supported for the telephony gateway integration are\nEnglish United States/Spanish\
    \ United States, +1 United States.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig14_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig14_HTML.jpg)\n\
    \nFigure 7-14\nDialogflow Phone Gateway pop-up, pick a number\n\n1.  Optionally,\
    \ you can specify an American **area code**,\n    such as 516, the area code for\
    \ New York. Once you start typing, a select\n    box will let you pick the area\
    \ codes. You can also request a phone\n    number with an 833 area code, which\
    \ is a toll-free number. Note that\n    toll-free numbers are priced higher.\n\
    \n2.  Click **Next**.\n\n3.  From here, you can choose from some preselected phone\
    \ numbers.\n\n    Currently, you can select a telephone number hosted by Google.\
    \ In the\n    future, you will also be able to port an existing telephone number.\n\
    \n4.  Click **Create** (Figure [7-14](#506047_1_En_7_Chapter.xhtml#Fig14)).\n\n\
    Now the telephone number is connected to your voice bot.\nAdditionally, you can\
    \ select an environment. You can now call the number\nand follow the voice prompts\
    \ provided by your Dialogflow intents. After\nthat, you will also see the call\
    \ history and analytics in the\n**History** and **Analytics** tabs.\n\nResponse\
    \ Messages for the Phone Gateway\n\nIn the Dialogflow console, you can\ncustomize\
    \ the voice responses to use rich (audio) response messages via\nthe responses\
    \ block in each intent. You can click the + button to enable\nthe Dialogflow Phone\
    \ Gateway. (See Figure [7-15](#506047_1_En_7_Chapter.xhtml#Fig15).)\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig15_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig15_HTML.jpg)\n\
    \nFigure 7-15\nDialogflow Phone Gateway, click the + to add custom responses\n\
    \nBy default, it uses the responses from the **Default**\ntab.\n\nWhen you click\
    \ the **Add Responses** button, there’s a\nchoice of three different rich messages.\
    \ Note Figure [7-16](#506047_1_En_7_Chapter.xhtml#Fig16).\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig16_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig16_HTML.jpg)\n\
    \nFigure 7-16\nDialogflow Phone Gateway custom responses\n\n*   **Play Audio**:\
    \ It’s possible to play a supplied\n    audio file. This audio file has to be\
    \ hosted in Google Cloud Storage.\n    You can enter the Google Cloud Storage\
    \ URI in this field, for example,\n    *gs://bucket/object*. The object must contain\
    \ a single channel\n    (mono) of linear PCM audio (2 bytes/sample) at 8kHz.\n\
    \n*   **Synthesize Speech**: Instead of using the text\n    from the Default tab,\
    \ you can enter the text in the Synthesize Speech\n    tab. Therefore, you can\
    \ return a different spoken voice than written\n    text. Sometimes, your spoken\
    \ dialogues might differ from written text.\n    You can also use this block to\
    \ write **SSML** (Speech\n    Synthesis Markup Language) in your responses. You\
    \ will read more in this\n    chapter about this feature to tweak the TTS voices\
    \ to make it sound more\n    natural.\n\n*   **Transfer Call**: It is possible\
    \ to transfer a call\n    to another (during the beta, American) phone number,\
    \ for example, to\n    have a human hand-over. When this response is filled in,\
    \ it will\n    transfer the call once the intent has been detected.\n\nFigure\
    \ [7-17](#506047_1_En_7_Chapter.xhtml#Fig17) shows how it\nwill look like once\
    \ you have them all enabled.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig17_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig17_HTML.jpg)\n\
    \nFigure 7-17\nDialogflow Phone Gateway custom response examples\n\nThere’s also\
    \ a switch in the Dialogflow Phone Gateway block to set\nthe intent at the end\
    \ of the conversation. Once the intent has been\ndetected, it can terminate the\
    \ call.\n\nBuilding Bots for Contact Centers with Contact\nCenter AI\nVarious\
    \ researches have been shown that chatbots can trim business\ncosts billions per\
    \ year. Contact centers are a huge cost\nitem, so there’s a lot to win in this\
    \ space.\nWhen customers’ call experience is pleasant, customers are willing to\n\
    pay the premium price, stay loyal to your service, and share good\nexperiences.\
    \ Customers expect great, flexible, and personal experiences.\n60% of the customers\
    \ want easier access to self-service solutions, 64%\nwish to receive real-time\
    \ assistance, and 75% prefer personal\ninteractions not necessary with humans\
    \ so the conversation could be with\na bot.*\n**Source: Zendesk, Statista, Strategy\
    \ Analytics, HBR, Ovum, CISCO\nVNI*\nHowever, the reality is that often when you\
    \ call a service number,\nyou will experience long waiting times, hold times,\
    \ unlimited call\ntransfers, IVRs challenging to navigate, availability, and inadequate\n\
    info. By automating these conversations, it’s possible to be 24/7\navailable,\
    \ have no more waiting or hold times, and provide homogeneous\nanswers.\n\nGoogle\
    \ Cloud Contact Center AI uses Artificial Intelligence to make the\nexperience\
    \ of calling a service number better. It’s better for the\ncustomer and better\
    \ for the agent. With Contact Center AI\n(CCAI), bots can understand and reply\
    \ to your questions\n(**Virtual Agent**) and can listen in and give on-screen\n\
    advice to the human agent (**Agent Assist**). Live agents\nwill always provide\
    \ the right answer to the question, and it can\nautomatically prefill forms. Businesses\
    \ can get analytics on these\nconversations via the **Insights** component. Figure\
    \ [7-18](#506047_1_En_7_Chapter.xhtml#Fig18) shows the\narchitecture.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig18_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig18_HTML.jpg)\n\
    \nFigure 7-18\nContact Center AI architecture\n\nNote Figure [7-19](#506047_1_En_7_Chapter.xhtml#Fig19)\
    \ and see how it\nworks:\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig19_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig19_HTML.jpg)\n\
    \nFigure 7-19\nContact Center AI architecture explained\n\n1.  Contact Center\
    \ AI integrates with your current telephone IVR system.\n    Users can call a\
    \ service number. Telephony partners such as Avaya,\n    Genesys, Cisco, Mitel,\
    \ and Twilio have implemented the Google Cloud\n    components for Speech-to-Text,\
    \ Text-to-Speech, and Dialogflow on top of\n    their own infrastructure to handle\
    \ the call. It uses special IVR\n    features such as **barge-in** (interrupt\
    \ the chatbot flow),\n    **silence detection** (how long we wait till we figure\
    \ out\n    nothing has been said), **DTMF tone recognition**  (parse tones to\n\
    \    numeric entities), and **async fulfillment** (allows for\n    long-running\
    \ operations on the customer back-end to extend the 5-second\n    fulfillment\
    \ response time).\n\n2.  A robot will pick up the telephone; it can understand\
    \ your speech,\n    even on phone quality (8kHz mono), with background noises\
    \ and\n    interruptions from each other.\n\n3.  It will detect the intents in\
    \ **Dialogflow**, query the\n    information from a knowledge base, or fetch the\
    \ data from systems\n    through (asynchronous) fulfillment **webhooks**.\n\n\
    4.  The responses will be spoken out via **Text-to-Speech**.\n    It uses WaveNet\
    \ models to make the voices sound humanlike.\n\n5.  When the bot doesn’t know\
    \ the right answer, it can hand over the\n    conversation to a live human agent.\
    \ The bot will still listen in to\n    provide suggestions on the screen. This\
    \ feature is called **Agent\n    Assist**; it will help agents to reduce call\
    \ and waiting\n    times.\n\n6.  This solution will show **transcripts**, agent\
    \ modeling,\n    and **analytics** so businesses can get insights and learn\n\
    \    from past conversations.\n\nIf this sounds interesting to you, either contact\
    \ your current\ntelephony provider or use the one-click telephony integrations\
    \ from\nDialogflow. Even when these are future plans, it’s already good to start\n\
    now. You can build multichannel chatbots that include all customer\njourneys (inbound\
    \ and outbound), telephony calls, hybrid chats, social\nmedia, or smart assistance.\n\
    \nEnabling Contact Center AI\nEnterprises with existing telephony/IVR hardware\
    \ can contact\ntelephony providers to enable Contact Center AI. It is possible\
    \ to hand\nover the Dialogflow project ID to use a current Dialogflow agent in\n\
    their contact center.\nEnterprises or companies new to this technology can either\
    \ contact an\nIVR provider of choice or use the **one-click telephony\nintegrations**\
    \ (Figure [7-20](#506047_1_En_7_Chapter.xhtml#Fig20)) available on\nthe Dialogflow\
    \ **integrations** page. This allows you to\nfollow the various wizards of **Avaya**,\n\
    **SignalWire**, **Voximplant**,\n**AudioCodes, Genesys Cloud,** or\n**Twilio**.\n\
    \nGoogle Cloud provides documentation to make use of the Agent Assistant\nand\
    \ Insights APIs in case you want to integrate these parts in your own\nemployee-facing\
    \ applications.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig20_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig20_HTML.jpg)\n\
    \nFigure 7-20\nVarious telephony integrations to choose from\n\nImproving Speech\
    \ to Text Quality\n\nWhen we talk about Speech\nMachine Learning models, Speech\
    \ to Text models have been trained\nby large datasets. Based on the audio examples\
    \ it heard before, it tries\nto match text phrases out of it. With that being\
    \ said, mishearing speech\nis not only hard for humans; it can be difficult for\
    \ machines as well.\nHowever, we can bias the machine learning model by providing\
    \ tips. In\nDialogflow, when building voice agents, it’s actually easy; you just\n\
    need to enable **the auto speech adaptation switch,** which\ncan be found in the\
    \ **Settings** ➤ **Speech**\ntab (Figure [7-21](#506047_1_En_7_Chapter.xhtml#Fig21)).\
    \ Intents and\n(marked) entities will be used as hints.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig21_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig21_HTML.jpg)\n\
    \nFigure 7-21\nSpeech settings\n\nAt the time of writing, this feature is beta.\
    \ In case you can’t find\nthe speech tab in the settings panel, you will need\
    \ to enable the beta\nfeatures first. This can be found in the **Settings** ➤\n\
    **General** tab.\nOnce you have enabled auto speech adaptation, you can build\
    \ your\nDialogflow voice agents in ways to take advantage of it. You can test\
    \ it\nin the simulator by using your microphone. If you are a developer, I\nwould\
    \ suggest using my Dialogflow speech recognition example because it\nwill give\
    \ you access to more debug information.\nFor best results, you’ll also want to\
    \ enable enhanced models: [`https://cloud.google.com/dialogflow/docs/data-logging`](https://cloud.google.com/dialogflow/docs/data-logging).\n\
    \nNote\n\nAuto speech adaptation does not work for Actions on Google (Google\n\
    Assistant). With the AoG framework, speech recognition is performed by\nActions\
    \ on Google before sending data to Dialogflow.\n\nThe following examples show\
    \ how speech recognition may be improved\nwith certain changes to your agent.\n\
    \nCustom Entities Hints\nIf you define entities for product or\nservice names\
    \ offered by your company, and the end user mentions these\nterms in an utterance,\
    \ they are more likely to be recognized. For\nexample, without Speech Adaptation\
    \ enabled and without having a custom\nentity for the rare video game console,\
    \ ***Ouya,***\nit would have understood “Oh yeah” instead of *Ouya*.\n\nSystem\
    \ Entities Hints\nThe previous example makes use of custom\nentities. But it will\
    \ work similarly with system entities such as\n**@sys.number**. Think about user\
    \ speech expressions when\nthe user says “two”; it may be recognized as “to,”\
    \ “too,” “2,” or “two.”\nAnd “for 4 to 5” could be understood as “425,” “four\
    \ four two five,” and\nso on. When the Speech Adaptation function is enabled,\
    \ the system\nentities will be used as hints.\n\nIntent Hints\nIf you define training\
    \ phrases with a phrase like “We are going to\nIbiza,” a similar-sounding user\
    \ utterance is reliably recognized as “We\nare going to Ibiza” and not “We are\
    \ going to eat pizza.”\n\nOverriding Speech Hints in Your Code\nYou can also tweak\
    \ the speech\nadaptation in your code. That’s handy when you are implementing\n\
    integrations through the API. Providing explicit\n**speech_contexts** in the\n\
    **inputAudioConfig** will override the implicit speech\ncontext hints generated\
    \ by auto speech adaptation for input audio\n(speech-to-text) configuration in\
    \ the Dialogflow Console. The\nspeechContexts takes an object with an array of\
    \ phrases[] containing\nwords and phrases that the speech recognizer should recognize\
    \ with a\nhigher likelihood.\n\nThe speechContexts object can also take an optional\
    \ boost (float)\nproperty. Boost for this context compared to other contexts:\n\
    \n*   If the boost is positive, Dialogflow will increase the\n    probability\
    \ that the phrases in this context are recognized over\n    similar-sounding phrases.\n\
    \n*   If the boost is unspecified or nonpositive, Dialogflow will not\n    apply\
    \ any boost.\n\nDialogflow recommends that you use boosts in the range (0, 20)\
    \ and\nthat you find a value that fits your use case with binary search.\n\nHere,\
    \ you can find an example. Consider the following chat flow:\n\n*   “When will\
    \ I get notified when the PlayStation 5 is in your\n    store?”\n\n*   > I can\
    \ send it to you by e-mail or text message.\n\n*   “Mail”\n\nTo make sure that\n\
    the agent understands “Mail” and not “Male” or “Nail,” I have provided\nspeechContexts\
    \ in the code of Listing [7-5](#506047_1_En_7_Chapter.xhtml#PC7).\n\n```\nconst\
    \ uuid = require('uuid');\nconst df = require('dialogflow').v2beta1;\nconst sessionId\
    \ = uuid.v4();\nconst sessionClient = new df.SessionsClient();\nconst sessionPath\
    \ = sessionClient.sessionPath(projectId, sessionId);\nlet request = {\nsession:\
    \ sessionPath,\nqueryInput: {\naudioConfig: {\nsampleRateHertz: 16000,\nencoding:\
    \ 'AUDIO_ENCODING_LINEAR_16',\nlanguageCode: 'en-US',\nspeechContexts: [\n{\n\
    phrases: [\n'mail',\n'email'\n],\nboost: 20.0\n}\n]\n},\nsingleUtterance: singleUtterance\n\
    }\n}\nrequest.inputAudio = audio;\nconst responses = await sessionClient.detectIntent(request);\n\
    Listing 7-5\nBiasing the speech model with the speechContexts\n```\n\nTip\n\n\
    What do I bias toward? You can favor the Dialogflow speech model for\nstrong context\
    \ or weak context examples.\nStrong context\nuse cases are, for example, when\
    \ voice is used in an IVR/telephony\nsystem to make sure certain expected “flows”\
    \ or common commands will\nwork.\nUser history or important named entities could\
    \ be fair use cases too.\nFor example, when the flow is asking for a phone number,\
    \ make sure your\nbias for numbers.\nWeak context use cases are use for misspellings.\
    \ You might want to\ncorrect, the not common but important named entities that\
    \ are often\nmisunderstood by the STT model.\n\nSpeech Adaptation will work for\
    \ all Dialogflow languages that support\nvoice.\n\nFine-Tuning the Text to Speech\
    \ Output of Voice Bots\nwith SSML\nThe Text to Speech (TTS) output of voice bots,\
    \ voice assistants, and\ncallbots (bots in contact centers) can be tweaked to\
    \ make it sound more\nnatural. We can use **SSML** for this, which stands for\n\
    **Speech Synthesis Markup Language**. It’s a markup\nlanguage, like HTML (HyperText\
    \ Markup\nLanguage) is for websites. In HTML, you would put all the markup\n*tags*\
    \ in the `<body>` tag of\nan HTML document; with SSML, you will put all specific\
    \ SSML tags for\nbuilding pauses or emphasis in the `<speak>`\ntag.\nSSML is an\
    \ XML-based markup language for speech synthesis\napplications. It is a recommendation\
    \ of the W3C’s voice browser working\ngroup.\nWhen you have **Automatic Text to\
    \ Speech enabled** in\nyour Dialogflow settings, you can start writing SSML tags\
    \ in your intent\nresponse tabs.\n\nIn Figure [7-22](#506047_1_En_7_Chapter.xhtml#Fig22),\
    \ you can see\nthe **Default** tab returning SSML as a response.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig22_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig22_HTML.jpg)\n\
    \nFigure 7-22\nWriting SSML code in the DEFAULT tab\n\nSome integrations such\
    \ as the **Dialogflow Phone Gateway**\nor the **Google Assistant** provide their\
    \ own response\nboxes to enter text and SSML versions of answers. You can see\
    \ how this\nworks for the Google Assistant in Figure [7-23](#506047_1_En_7_Chapter.xhtml#Fig23).\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig23_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23\nWriting SSML code in the Google Assistant tab by customizing the\n\
    audio output\n\nCaution\n\nBe aware of writing SSML code in the Default Responses\
    \ tab. Although\nthis works excellent for single-channel integrations, it might\
    \ not be\nideal for cross-channel agents where you will have to support text and\n\
    voice as both solutions. As then, the text version will include the SSML\ntags,\
    \ which will be somewhat odd.\nA better approach would be to use the Integration\
    \ Response tabs, such\nas the Google Assistant or Dialogflow Phone Gateway tabs,\
    \ to provide a\nspoken version of your answer when your implementation is not\
    \ available\nas an out-of-the-box integration. For example, you are integrating\
    \ voice\nin a website. You could also differentiate between the SSML and text\n\
    version through fulfillment code.\n\nUX Design for Voice Dialogues Matters!\n\
    Before I continue, let me tell\nyou a funny off-topic story. Every year, my friends\
    \ and I organize a\nbowling tournament. You can bring in other friends, so we\
    \ get a large\ngroup of people altogether. It’s a social event, but you can win\
    \ prizes.\nOne year, somebody brought in his friend, who showed up in a full\n\
    bowling outfit. He was wearing a professional bowling shirt, the gloves,\nand\
    \ he even brought in his own lucky bowling ball. We were all looking\nup to him;\
    \ “wow, he must be a professional bowling player!” However,\nonce all the games\
    \ were over and we announced the top winner, he wasn’t\nin the top 3\\. In fact,\
    \ he was holding one of the lowest places.\nSo the moral of my story: We can use\
    \ the top-notch tools of Google\nfor automating conversations, but if we don’t\
    \ write great dialogue that\nfits best with the belonging voice channel, you won’t\
    \ deliver your users\na good user experience. Unfortunately, when the user experience\
    \ isn’t\ngood enough, your users won’t come back.\n\nI am starting this section\
    \ with this topic because I have seen too many\nvoice chat implementations, where\
    \ chatbots initially built for the Web\n(text interface) are directly passed to\
    \ the Text to Speech output of\nGoogle, without rewriting the dialogue for its\
    \ channel. By taking this\napproach, here are some examples of things that can\
    \ happen:\n\n*   **Long stories when it’s the bot’s turn to talk**:\n    On a\
    \ screen, text can be long and contain multiple paragraphs. You can\n    skip\
    \ the parts that are not interesting to you. But hearing a bot\n    talking for\
    \ too long won’t make your users happy.\n\n*   **No follow-up questions**: It’s\
    \ great to include\n    FAQ knowledge base questions in your voice chats. Typically,\
    \ on web\n    interfaces, it ends by providing the answer to a question. On the\
    \ phone,\n    you’re used to asking and taking turns. “Is there anything else\
    \ I can\n    help you with?” It would be odd if the person on the other end suddenly\n\
    \    becomes quiet.\n\n*   **Hyperlinks, tables, images, abbreviations, and so\n\
    \    on**: On a screen, you can refer to an image or click a link. You\n    can’t\
    \ do this on a device without a screen.\n\n*   **Error codes**: It’s not a great\
    \ experience and\n    doesn’t make sense to hear Error 404\\. In conversations,\
    \ there are no\n    errors. Your users will raise their voice and repeat the same\
    \ answer,\n    which won’t work.\n\nSo with this in mind, let’s have a look at\
    \ best voice practices:\n\n*   Write compact dialogues that are easy to understand\
    \ for your\n    audience.\n\n*   Always end with a question to steer the conversation\
    \ and to get\n    the interactions going.\n\n*   Don’t use hyperlinks, tables,\
    \ images, abbreviations. You could\n    refer to a website when data is tabular,\
    \ return the best match, and ask\n    if the user wants to hear alternative options.\n\
    \n*   Don’t abbreviate words but mention the full naming.\n\n*   When something\
    \ goes wrong, it’s better to provide a fallback\n    dialogue that everyone understands.\
    \ Help users to be successful; steer\n    them to tell them precisely what you\
    \ would like to hear as an answer.\n    For example, if you provide options, don’t\
    \ ask “Would you like A or\n    B?”—because then a user could answer “yes.”\n\n\
    *   Instead, ask: “I have A, and I have B. Which one do you\n    prefer?”\n\n\
    *   Start with a welcome message, explain that you are a virtual\n    agent, and\
    \ explain the type of questions the virtual agent will address.\n    For example,\
    \ “Hey there, I am the virtual agent of video games dot com.\n    I can tell you\
    \ which game releases are upcoming, and you can purchase\n    video games. How\
    \ can I help?” And not: “Good morning, I am Lee. What\n    would you like to know?”\
    \ With the last example, you risk the chance that\n    your users are asking questions\
    \ that the virtual agent wasn’t trained\n    on. A user could ask: “Which cities\
    \ near me have arcade halls?” Your\n    chatbot will return a fallback answer.\
    \ The user could ask the question\n    differently, but it still won’t know the\
    \ answer. It will give an\n    impression that your chatbot doesn’t know anything.\
    \ It does; it just\n    doesn’t have that particular flow.\n\n*   It also means\
    \ that you would want to collect analytics on what\n    your users are asking\
    \ to implement those flows by providing that\n    training data. Your chatbot\
    \ will become smarter over time. That also\n    means that you can go to production\
    \ with your virtual agent as soon as\n    possible and continue improving the\
    \ experience by learning as long as\n    you set your boundaries.\n\n*   Create\
    \ a persona for your virtual agent. It’s the face where your\n    customers are\
    \ talking to. So you can think of the style, the gender, how\n    the voice will\
    \ sound, the tone of voice, what word and phrase choices\n    you use, and so\
    \ on. You can imagine a video game virtual agent might\n    target youth and young\
    \ adults. For the elderly, you might have a\n    different word choice or style.\n\
    \n*   Use SSML to change the intonation of\n    your sentences, so your voices\
    \ will sound more natural.\n\nText to Speech Voices\nDialogflow and the Google\
    \ Assistant use WaveNet\nvoices to make the voices sound humanlike and less like\
    \ robots.\nWhen building virtual agents for IoT, web pages, or contact centers,\n\
    there is a wide selection of custom voices available for you to pick\nfrom in\
    \ Dialogflow. When you build agents for the Google Assistant, it\nwill use the\
    \ Text to Speech synthesizer from the Google Assistant, and\ntherefore you will\
    \ have to choose the voices from within Actions on\nGoogle.\n\nAll the voices\
    \ differ by language, gender, and accent (for some\nlanguages). Some languages\
    \ have multiple voices to choose from. In\nDialogflow, you can configure the voice\
    \ by setting the agent language,\nvoice choice, speaking rate, pitch, and volume\
    \ gain from the\n**Settings** ➤ **Speech** tab. (See Figure\n[7-24](#506047_1_En_7_Chapter.xhtml#Fig24)).\n\
    \n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig24_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig24_HTML.jpg)\n\
    \nFigure 7-24\nVoice settings\n\nIt’s also possible to change the **audio effects\
    \ profile**\nas seen in Figure [7-25](#506047_1_En_7_Chapter.xhtml#Fig25). When\
    \ you\ndeploy your voice on a headphone or medium speaker, you might want to\n\
    have the best voice quality. On a handheld device, you could lower the\nquality.\
    \ That reduces the audio stream’s size, and it will be smaller,\nand thus it will\
    \ be faster to play.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig25_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig25_HTML.jpg)\n\
    \nFigure 7-25\nChanging the audio profiles\n\nOn the bottom of the **Settings**\
    \ ➤ **Speech**\ntab, there is an SSML text box (Figure [7-26](#506047_1_En_7_Chapter.xhtml#Fig26)),\
    \ which allows\nyou to test your\nSSML writing, so you can play around with the\
    \ tags and see if the sound\nis optimal.\n\n![../images/506047_1_En_7_Chapter/506047_1_En_7_Fig26_HTML.jpg](images/506047_1_En_7_Chapter/506047_1_En_7_Fig26_HTML.jpg)\n\
    \nFigure 7-26\nTrying out SSML in the speech editor\n\nControlling the Intonation\n\
    With SSML, you can give more structure or intonation to your\nsentences.\nThe\
    \ definition of **intonation**  is how your voice\npitch goes up and down as you\
    \ talk or recite something by singing it. An\nexample of intonation is the way\
    \ your voice raises in pitch at the end\nof a question. With intonation, you can\
    \ give sentences with different\nmeanings and emotions.\nYou will write all your\
    \ SSML tags in the parent `<speak>`\ntag.\nYou can cluster paragraphs and sentences\
    \ with `<p>` and `<s>` tags. By\nclustering those sentences, you can build in\
    \ more pauses. By grouping\nsentences with a paragraph, the pause will be a little\
    \ longer than\nbetween sentences.\nSpecific punctuation marks will also change\
    \ the intonation. For\nexample, a comma will create a little pause and raise the\
    \ intonation. A\nquestion mark will make sure that the sentence will sound more\
    \ like a\nquestion because it increases the intonation at the end.\nWith the `<break>`\
    \ tag,\nyou can control the time in seconds (s) or milliseconds (ms) of a pause\n\
    manually.\nThe `<say-as>`\nelement lets you indicate information about the type\
    \ of text construct\nwithin the element. You can make sure that words will be\
    \ pronounced as\n**cardinals**, **ordinals**,\n**characters**, **fractions**,\n\
    **units**, **telephone numbers**,\n**verbatims**, **dates,** and\n**times**. You\
    \ can even bleep out censored text.\n\nHere’s an example spoken as “Twelve thousand\
    \ three hundred forty five”\n(for US English) or “Twelve thousand three hundred\
    \ and forty five” (for\nUK English):\n\n```\n\n```\n\n`<sub>`\nindicates that\
    \ the text in the alias attribute value replaces the\ncontained text for pronunciation.\
    \ This is handy for abbreviations, but\nyou could also use it to “tweak” the pronunciation\
    \ if you feel that the\nTTS synthesizer doesn’t pronounce your word in a certain\
    \ language the\nright way.\n\n```\nW3C\n```\n\n`<prosody>` is\nused to customize\
    \ the **pitch**, **speaking\nrate**, and **volume** of the element’s text.\nThere\
    \ are also tags for playing audio files or controlling media with\nthe `<audio>`\
    \ and\n`<media>`\nelements. In contact centers, you can use these to play audio\
    \ recordings\nor music clips while waiting. Or you could use short audio sounds\
    \ as\nfeedback after collecting answers from your users.\n\nSummary\n\nThis chapter\
    \ gave a lot of information on building voice bots for smart\nassistants such\
    \ as the Google Assistant and building voice bots for\ntelephony systems. The\
    \ last sections of this chapter included ways on\nhow you can improve the Speech\
    \ to Text and the Text to Speech of voice\nbots:\n\n*   You want to build a conversation\
    \ for the Google\n    Assistant.\n\n*   You want to build a simple conversation\
    \ for a telephone with the\n    telephony gateway to create an inbound toll-free\
    \ number.\n\n*   You want to have AI in your contact centers to provide advanced\n\
    \    automated conversations with Contact Center AI.\n\n*   You want to improve\
    \ the Speech to Text quality for voice and\n    callbots.\n\n*   You want to make\
    \ your voice conversations Text to Speech output\n    to make it sound more natural.\n\
