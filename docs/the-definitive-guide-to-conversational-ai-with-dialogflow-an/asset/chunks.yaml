    # ServerName 指令用于设置服务器用于标识自身的请求方案、主机名和端口。这在创建重定向 URL 时使用。在虚拟主机的上下文中，ServerName
    指定了请求的 Host: 标头中必须出现的主机名，以匹配此虚拟主机。对于默认虚拟主机（此文件），此值并非决定性因素，因为它被用作最后的主机。但是，你必须为任何其他虚拟主机显式设置它。

    #ServerName www.example.com

    `ServerAdmin webmaster@localhost`

    #DocumentRoot /var/www/projects


    # 可用的日志级别：trace8, ..., trace1, debug, info, notice, warn,

    # error, crit, alert, emerg.

    # 也可以为特定模块配置日志级别，例如：

    `LogLevel info ssl:debug`

    `ErrorLog /var/www/projects/error.log`

    `CustomLog /var/www/projects/access.log combined`

    `ServerName mtls.conv.dev`

    `SSLCertificateFile /etc/letsencrypt/live/mtls.conv.dev/fullchain.pem`

    `SSLCertificateKeyFile /etc/letsencrypt/live/mtls.conv.dev/privkey.pem`

    `Include /etc/letsencrypt/options-ssl-apache.conf`

    `SSLVerifyClient require`

    `SSLVerifyDepth 2`

    `SSLCACertificateFile "/var/www/projects/ca-crt.pem"`


    # 访问控制，仅允许 dialogflow.com 连接到 fulfillment

    `Require all denied`


    # sudo a2enmod proxy

    # sudo a2enmod proxy_http

    `ProxyPass / http://localhost:3000/`

    `ProxyPassReverse / http://localhost:3000/`


    `清单 10-22`

    `设置 mTLS 000-default-le-ssl.conf`


    ## 设置 mTLS


    首先，确保在 Dialogflow 中，你已从 **fulfillments** 界面指向你的新虚拟机。


    运行以下两个命令来下载 Dialogflow 将使用的根 CA。这会将 `GTS101.crt` 和 `GSR2.crt` 添加到本地文件 `ca-crt.pem`
    中：


    ```

    curl https://pki.goog/gsr2/GTS1O1.crt | openssl x509 -inform der >> ca-crt.pem

    curl https://pki.goog/gsr2/GSR2.crt | openssl x509 -inform der >> ca-crt.pem

    ```


    `/etc/apache2/sites-available/000-default-le-ssl.conf` 中的这些设置是专门用于设置 mTLS 的：


    ```

    SSLVerifyClient require

    SSLVerifyDepth 2

    SSLCACertificateFile "/var/www/projects/ca-crt.pem"

    ```


    这是访问控制，它将确保只有 Dialogflow.com 可以调用 fulfillment webhook：


    ```

    Require all denied

    ```


    现在你可以测试它。我们将只允许证书 CN 为 `*.dialogflow.com` 的 Dialogflow 通过以访问 fulfillment。当 Dialogflow
    的 CA 与我们期望的 CA 不同时，Dialogflow fulfillment 状态将为 `UNKNOWN`。


    Apache 的 `error.log` 显示（`tail error.log`）：


    ```

    [Fri Jun 26 11:45:54.732961 2020] [authz_core:error] [pid 10152:tid 139735259326208]
    [client 64.233.172.238:36290] AH01630: client denied by server configuration:
    proxy:http://localhost:3000/fulfillment

    ```


    否则，它将通过。你可以在 Dialogflow 模拟器中测试它。我使用了意图 **Buy product regex**，并输入用户话语：*Buy ms12345678*
    来显示结果。（不相信？将访问控制 `000-default-le-ssl.conf` 中的 `!=` 改为 `==`，使其匹配除 `*.dialogflow.com`
    以外的内容。）


    图 10-23 展示了 Dialogflow CA 证书的截图。


    ![../images/506047_1_En_10_Chapter/506047_1_En_10_Fig23_HTML.jpg](img/506047_1_En_10_Fig23_HTML.jpg)


    **图 10-23** Dialogflow CA 证书


    ## 总结


    本章包含关于 fulfillment 的信息。你将学习以下任务：


    *   你想从 Web 服务获取数据，并在内置编辑器中编写 fulfillment 代码。

    *   你想从 Web 服务获取数据，并在你自己的（云）环境（如 Cloud Run）中编写 fulfillment 代码。

    *   你想从 Web 服务获取数据，但你的 Dialogflow 代理支持多语言，那么如何组织你的 webhook？

    *   你想使用 `ngrok` 从本地数据源获取数据进行测试。

    *   你想通过基本认证、认证标头和双向 TLS 来确保与 Dialogflow 之间流量的安全。


    除此之外，你还看到了通过以下方式实现 fulfillment 的代码片段：


    *   npm 包 `dialogflow-fulfillment`

    *   Actions on Google 包

    *   手动方式，不使用任何库


    我在本章中使用的意图是：


    *   `Buy product regex`

    *   `Default Welcome Intent`

    *   `Default Fallback Intent`

    *   `Get_Price`

    *   `Get_Delivery_Date`

    *   `Get_Total_Number`


    如果你想构建这个示例，本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/ISBN)。请查看
    `webhook-fulfillment-lib`、`webhook-aog`、`webhook-manual`、`webhook-cloudrun`、`webhook-localized`、`secure-auth`
    和 `secure-compute-mtls` 文件夹。


    ## 延伸阅读


    *   Dialogflow 关于 fulfillment 的通用文档：[`https://cloud.google.com/dialogflow/es/docs/fulfillment-webhook`](https://cloud.google.com/dialogflow/es/docs/fulfillment-webhook)

    *   Google Cloud 关于使用 Cloud Functions 的文档：[`https://cloud.google.com/functions/docs/quickstarts`](https://cloud.google.com/functions/docs/quickstarts)

    *   Google Cloud 关于使用 Cloud Run 的文档

