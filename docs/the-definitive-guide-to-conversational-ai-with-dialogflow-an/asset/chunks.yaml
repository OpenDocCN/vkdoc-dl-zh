- fmt: "You could store a test case like the previous one in `BigQuery`, so you can\
    \ rerun the scenario each time when you make changes to your agent. You would\
    \ need to request the total recall and precision from your data warehouse. And\
    \ you would store the `f1 score` so you will be able to retrieve this later in\
    \ your reports.\n\n## Confusion Matrix\n\nIn the field of machine learning, a\
    \ `confusion matrix`, also known as an error matrix, is a specific table layout\
    \ that allows visualization of the performance of an algorithm (in our case, the\
    \ underlying machine learning model for the virtual agent). Each row of the matrix\
    \ represents the expected intents, while each column represents the actual matched\
    \ intent by the `Dialogflow API`. The name stems from the fact that it makes it\
    \ easy to see if the agent is confusing two classes (commonly mislabeling one\
    \ as another). When you have lots of test cases, you could render all the scores\
    \ in one big matrix.\n\nAs you can see in Figure [13-23](#506047_1_En_13_Chapter.xhtml#Fig23),\
    \ each intent contains the sum of all the TPs. This should give you a diagonal\
    \ (orange) line from the top to the bottom. The red squares are the sum of all\
    \ the FPs; for example, in the following matrix, you can see that there’s a test\
    \ case (user utterance) which is expected to be matched to the intent `get_price`,\
    \ but that got matched to the `collect_current_playing_game` intent.\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig23_HTML.jpg](images/506047_1_En_13_Chapter/506047_1_En_13_Fig23_HTML.jpg)\n\
    \n**Figure 13-23** Confusion matrix in action\n\n## Summary\n\nThis chapter contains\
    \ information about collecting and monitoring agent insights and analytics. It\
    \ is divided into the following categories:\n\n- **Conversation-related metrics**\
    \  \n  What did your users say, when, and where? You can capture conversation-related\
    \ metrics and store them in a data warehouse like `BigQuery`.\n\n- **Customer\
    \ rating metrics**  \n  What did your users think of your brand? How can you collect\
    \ ratings with `Dialogflow`?\n\n- **Chat session and funnel metrics**  \n  The\
    \ paths that your users took to engage with your agent. How to monitor chat sessions\
    \ and funnel metrics with `Dialogflow` and `Chatbase`.\n\n- **Bot model health\
    \ metrics**  \n  How to capture chatbot model health metrics for testing the underlying\
    \ machine learning model quality in order to tweak the `Dialogflow` machine learning\
    \ threshold.\n\nIn case you want to build this example, the source code for this\
    \ book is available on GitHub via the book’s product page, located at [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4).\
    \ Look into the `advanced-agent-insights` folder.\n\n## Further Reading\n\n- Dialogflow\
    \ documentation on History  \n  [`https://cloud.google.com/dialogflow/es/docs/history`](https://cloud.google.com/dialogflow/es/docs/history)\n\
    \n- Dialogflow documentation on Analytics  \n  [`https://cloud.google.com/dialogflow/es/docs/analytics`](https://cloud.google.com/dialogflow/es/docs/analytics)\n\
    \n- Dialogflow documentation on training agents  \n  [`https://cloud.google.com/dialogflow/es/docs/training`](https://cloud.google.com/dialogflow/es/docs/training)\n\
    \n- Google Cloud documentation on BigQuery  \n  [`https://cloud.google.com/bigquery/docs`](https://cloud.google.com/bigquery/docs)\n\
    \n- Google Cloud documentation on Pub/Sub  \n  [`https://cloud.google.com/pubsub/docs/`](https://cloud.google.com/pubsub/docs/)\n\
    \n- Google Cloud documentation on Cloud Functions  \n  [`https://cloud.google.com/functions/docs/`](https://cloud.google.com/functions/docs/)\n\
