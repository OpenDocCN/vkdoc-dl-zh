- fmt: "# Configuring Your Dialogflow for Developers\n\nYou are a developer, and you\
    \ want to have developer access.\n\nSelect **IAM & Admin** ➤ **Service Accounts**.\
    \ You will see a service account email addresses, like Figure [2-26](#506047_1_En_2_Chapter.xhtml#Fig26).\n\
    \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig26_HTML.png](images/506047_1_En_2_Chapter/506047_1_En_2_Fig26_HTML.png)\n\
    \nFigure 2-26\n\nService accounts in the Google Cloud Console\n\nIf you have not\
    \ already, download a service account key for this service account, and set the\
    \ `GOOGLE_APPLICATION_CREDENTIALS` environment variable to its path. You can download\
    \ the service account JSON key by clicking the options button in the **actions**\
    \ column and selecting **Create key**. In the pop-up, you can choose **JSON**\
    \ and **Create**. (See Figure [2-27](#506047_1_En_2_Chapter.xhtml#Fig27).)\n\n\
    ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig27_HTML.png](images/506047_1_En_2_Chapter/506047_1_En_2_Fig27_HTML.png)\n\
    \nFigure 2-27\n\nCreate a private key from a service account\n\nIt will download\
    \ the JSON file to your disk, and you will need to assign this to an environment\
    \ variable called `GOOGLE_APPLICATION_CREDENTIALS`.\n\nAssign the key to environment\
    \ var `GOOGLE_APPLICATION_CREDENTIALS`.\n\nFor Linux/MacOS environments:\n\n```\n\
    export GOOGLE_APPLICATION_CREDENTIALS=/path/to/service_account.json\n```\n\nFor\
    \ Windows environments:\n\n```\nset GOOGLE_APPLICATION_CREDENTIALS=c:\\path\\\
    to\\service_account.json\n```\n\n## Summary\n\nThis chapter addresses the following\
    \ tasks:\n\n* You want to start with Dialogflow and set up a Dialogflow trial\
    \ agent.\n* You are working for an enterprise, and you want to create a secure\
    \ virtual agent committed to compliances; you can create a Dialogflow Essentials\
    \ pay-as-you-go agent.\n* You have created a Dialogflow project, and now you want\
    \ to configure it.\n* You are a developer, and you want to have developer access.\n\
    \nIn case you want to build this example, the source code for this book is available\
    \ on GitHub via the book’s product page, located at [`www.apress.com/ISBN`](http://www.apress.com/ISBN).\
    \ Look for the `dialogflow-agent` folder.\n\n## Further Reading\n\n* Compare Dialogflow\
    \ editions\n  [`https://cloud.google.com/dialogflow/docs/editions`](https://cloud.google.com/dialogflow/docs/editions)\n\
    * Firebase terms and conditions\n  [`https://firebase.google.com/terms/`](https://firebase.google.com/terms/)\n\
    * Dialogflow Enterprise/Google Cloud terms and conditions\n  [`https://cloud.google.com/terms/`](https://cloud.google.com/terms/)\n\
    * Dialogflow tiers and pricing\n  [`https://cloud.google.com/dialogflow/pricing#es-agent`](https://cloud.google.com/dialogflow/pricing%2523es-agent)\n\
    * Dialogflow tiers and quotas\n  [`https://cloud.google.com/dialogflow/quotas`](https://cloud.google.com/dialogflow/quotas)\n\
    * The blog post about storing Dialogflow data in BigQuery\n  [`https://cloud.google.com/blog/products/ai-machine-learning/simple-blueprint-for-building-ai-powered-customer-service-on-gcp`](https://cloud.google.com/blog/products/ai-machine-learning/simple-blueprint-for-building-ai-powered-customer-service-on-gcp)\n\
    * Directory Sync in Google Cloud\n  [`https://tools.google.com/dlpage/dirsync/`](https://tools.google.com/dlpage/dirsync/)\n\
    * Google Cloud IAM\n  [`https://cloud.google.com/resource-manager/docs/access-control-org`](https://cloud.google.com/resource-manager/docs/access-control-org)\n\
    * Dialogflow access control\n  [`https://cloud.google.com/dialogflow/es/docs/access-control`](https://cloud.google.com/dialogflow/es/docs/access-control)\n\
    * Request a higher quota\n  [`https://console.cloud.google.com/apis/api/dialogflow.googleapis.com/quotas`](https://console.cloud.google.com/apis/api/dialogflow.googleapis.com/quotas%253F_ga%253D2.114957573.345776091.1589188956-1503905642.1588942477)\n\
    * VPC service controls\n  [`https://cloud.google.com/vpc-service-controls/docs/service-perimeters`](https://cloud.google.com/vpc-service-controls/docs/service-perimeters)\n\
    * Service accounts\n  [`https://cloud.google.com/docs/authentication#service_accounts`](https://cloud.google.com/docs/authentication%2523service_accounts)\n\
    * Authenticating as a service account\n  [`https://cloud.google.com/docs/authentication/production`](https://cloud.google.com/docs/authentication/production)\n\
    * Data logging\n  [`https://cloud.google.com/dialogflow/es/docs/data-logging`](https://cloud.google.com/dialogflow/es/docs/data-logging)\n\
    \n# 3. Dialogflow Essentials Concepts\n\nDevelopers or UX designers can train\
    \ a Dialogflow Essentials agent (Machine Learning model) through the Dialogflow\
    \ Web console. It’s based on intents. An intent categorizes an end user’s intention\
    \ for one conversation turn. Your Dialogflow agent will contain many intents.\
    \ Each intent contains training phrases, contexts, and responses.\n\nThis chapter\
    \ will go into the details of training a Dialogflow Essentials agent. It will\
    \ cover how intents work and how you can create intents. It discusses entities\
    \ and working with contexts. At the end of the chapter, you will test your agent\
    \ in the Dialogflow simulator.\n\n## Intents in Depth\n\nAs an example, Figure\
    \ [3-1](#506047_1_En_3_Chapter.xhtml#Fig1) shows the intent page for buying a\
    \ video game console.\n\n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig1_HTML.jpg](images/506047_1_En_3_Chapter/506047_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nCreate an intent with training phrases\n\nDialogflow can interpret\
    \ human conversation’s meaning when an agent has been trained with a given labeled\
    \ dataset of training phrases.\n\nWhen a user communicates with the chatbot through\
    \ written text or spoken voice (user utterances), Dialogflow will do intent classification.\
    \ Because of the NLP engine (which gets continuous improvements over time), it\
    \ doesn’t matter if the user utterance is written differently or contains spelling/grammar\
    \ mistakes. It will understand what has been asked and match it by checking all\
    \ the intents added to the Dialogflow agent. Once there’s an intent match, it\
    \ will return the intent fulfillment/response.\n\nDialogflow does not self-learn\
    \ in the way that a goal-driven AI such as AlphaZero* does. Google does not disclose\
    \ all implementation details (secret sauce) of the underlying technologies such\
    \ as the NLP or Speech to Text engines, simply because they may change rapidly\
    \ and fall out of date with the documentation.\n\n** Read more about AlphaZero,*\
    \ [`https://en.wikipedia.org/wiki/AlphaZero`](https://en.wikipedia.org/wiki/AlphaZero)"
