  \ =  {\nlanguageCode: languageCode,\ntext: text\n};\nconsole.log(request);\n//15)\
  \ Dialogflow SDK 的意图检测方法。\n// 它返回一个 Promise，一旦完成数据到达，该 Promise 将被解析。\nconst responses\
  \ = await sessionClient.detectIntent(request);\nreturn responses;\n}\n//运行此代码。\n\
  setupDialogflow();\n```\n\n**清单 11-3** 与 Dialogflow SDK 通信的后端集成代码\n\n1.  加载此应用所需的所有库，最后几个是\
  \ Dialogflow 专用的。\n2.  创建一个 Express 应用。\n3.  设置 Express 并加载静态文件和 HTML 页面。\n4.  创建服务器并监听\
  \ `PORT` 变量。\n5.  Socket.IO 监听器，一旦客户端连接到服务器套接字，则执行此代码块。\n6.  当客户端发送 'message' 事件时，则执行此代码块。\n\
  7.  其中包含一个用于意图匹配的函数。\n8.  一旦结果返回，将其返回给客户端 UI。\n9.  Dialogflow 需要一个唯一的会话 ID：`--PROJECT_ID`、`--PORT`\
  \ 和 `--LANGUAGE`。\n10. Dialogflow 需要一个 Dialogflow 会话客户端，以使此会话对其用户唯一：`sessionId =\
  \ uuid.v4();`\n11. 从会话客户端创建一个会话路径，该路径是 `projectId` 和 `sessionId` 的组合。现在该会话将仅属于您的\
  \ Dialogflow 代理：`sessionClient = new df.SessionsClient();`\n12. 这些对象位于 Dialogflow\
  \ 请求中：\n    ```\n    request = {\n      session: sessionPath,\n      queryInput:\
  \ {\n        text: {\n          languageCode: languageCode\n        }\n      }\n\
  \    }\n    ```\n13. 从 UI 获取用户话语。\n\n\n\n3.  这是用于意图检测的 Dialogflow SDK 方法。它返回一个 promise，该\
  \ promise 将在获取到 fulfillment 数据后被解析：\n\n```\nsessionPath = sessionClient.sessionPath(projectId,\
  \ sessionId);\n```\n\n```\nawait sessionClient.detectIntent(request);\n```\n\n图\
  \ 11-2 展示了其效果。\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig2_HTML.jpg](img/506047_1_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2** 在网页浏览器中运行的自定义聊天集成\n\n要运行本书 GitHub 仓库中的这个示例，你需要 `cd` 进入 `back-end` 文件夹。\n\
  \n然后，安装所需的库：\n\n```\nnpm install\n```\n\n启动 Node 应用：\n\n```\nnpm --PROJECT_ID=[your-google-cloud-project-id]\
  \ run start\n```\n\n在浏览器中访问 `http://localhost:3000`。\n\n## 欢迎消息\n\n我经常从实现自己集成的用户那里收到一个常见问题：如何确保我的聊天机器人在打开聊天时向用户打招呼？这并不难；我们可以向\
  \ Dialogflow 触发事件，并且我们会在 Socket.IO 与客户端建立正确连接后（这发生在页面加载完成后）立即执行此操作。请注意清单 11-4。\n\
  \n在 `index.html` 的 connect 监听器中添加：\n\n```\nsocketio.emit('welcome');\n```\n\n然后，在你的后端\
  \ `app.js` 中，在 connect 监听器内，我们将监听从 UI 发送的欢迎消息。\n\n```\nclient.on('welcome', async\
  \ function() {\nconst welcomeResults = await detectIntentByEventName('welcome');\n\
  client.emit('returnResults', welcomeResults);\n});\n```\n\n**清单 11-4** 监听欢迎消息\n\n\
  清单 11-5 中的下一个新函数与清单 11-3 中的 `detectIntent` 调用非常相似，但我们将使用**事件名称**，而不是传递文本查询输入。\n\n\
  ```\nasync function detectIntentByEventName(eventName){\nrequest.queryInput.event\
  \ =  {\nlanguageCode: languageCode,\nname: eventName\n};\nconst responses = await\
  \ sessionClient.detectIntent(request);\n//移除事件，这样欢迎事件就不会再次被触发\ndelete request.queryInput.event;\n\
  return responses;\n}\n```\n\n**清单 11-5** 通过事件名称检测意图\n\n使用哪个事件名称？欢迎事件，因为我们的欢迎意图附加了该事件，你可以在图\
  \ 11-3 中看到。\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig3_HTML.jpg](img/506047_1_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3** Dialogflow 中的欢迎事件\n\n## 在聊天机器人集成中创建富响应\n\n当你想在实现中使用富响应消息时，你需要手动构建这些消息。这是合理的，因为你控制着\
  \ UI。\n\n让我们在集成中构建一些富响应消息。\n\n### 超链接组件、谷歌地图和图片组件\n\n首先，创建一个带有训练短语（如“你有网址吗？”）的新意图。\n\
  \n你不需要指定文本响应。相反，你将创建一个新的**自定义负载**，它使用我们自定义的 JSON，如图 11-4 所示：\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig4_HTML.jpg](img/506047_1_En_11_Fig4_HTML.jpg)\n\
  \n**图 11-4** 自定义超链接富消息的自定义负载\n\n```\n{\n\"web\": {\n\"type\": \"hyperlink\",\n\"\
  text\": \"查看我的网站\",\n\"link\": \"http://www.leeboonstra.com\"\n}\n}\n```\n\n在你的后端集成中，运行\
  \ `detectIntent` 方法后，你需要遍历 `queryResult.fulfillmentMessages` 数组。它应该包含一个对象，其 `message`\
  \ 设置为**负载**。\n\n```\nfulfillmentMessages: Array(1)\n0:\nmessage: \"payload\"\npayload:\n\
  fields:\nplatform: {stringValue: \"custom-web\", kind: \"stringValue\"}\nweb: {structValue:\
  \ {...}, kind: \"structValue\"}\n__proto__: Object\n__proto__: Object\nplatform:\
  \ \"PLATFORM_UNSPECIFIED\"\n__proto__: Object\nlength: 1\n__proto__: Array(0)\n\
  fulfillmentText: \"\"\n```\n\n> **提示：** 你是否注意到负载对象有些奇怪？它并不包含你在 Dialogflow 控制台中输入的相同\
  \ JSON 对象。这是因为 Google gRPC API 使用了协议缓冲区（`google.protobuf.Struct`）。协议缓冲区是 Google\
  \ 用于序列化结构化数据的语言无关、平台无关、可扩展的机制。你需要将 protobuf 转换为 JSON。在我为此示例提供的 GitHub 中，我包含了一个简单的转换脚本。\n\
  \n你的后端代码应将结果返回给 UI。你的客户端 JavaScript 将遍历所有结果，并使用自定义样式在屏幕上呈现结果。图 11-5 展示了其效果。\n\n\
  ![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig5_HTML.jpg](img/506047_1_En_11_Fig5_HTML.jpg)\n\
  \n**图 11-5** 支持富消息的自定义集成示例\n\n### 实现\n\n让我们看看超链接、谷歌地图和图片的富消息的完整实现。我们已经看到了一个超链接自定义负载的示例；清单\
  \ 11-6 展示了一些图片和谷歌地图的示例。\n\n```\n{\n\"web\": {\n\"type\": \"image\",\n\"alt\": \"\
  Lee Boonstra\",\n\"src\": \"https://www.leeboonstra.com/images/profile.jpg\"\n}\n\
  }\n{\n\"web\": {\n\"link\": \"https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2437.7995043017927!2d4.869772751476948!3d52.33778327968087!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c60a05af168f5b%3A0x3e5bfe6e0b2ce441!2sGoogle+Amsterdam!5e0!3m2!1sen!2snl!4v1520965060384\"\
  ,\n\"type\": \"map\"\n}\n}\n```\n\n**清单 11-6** Dialogflow 控制台中的自定义负载\n\n在 `detectIntent`\
  \ promise 之后，你可以立即调用一个名为 `getRichContent()` 的新方法，该方法将已解析的 promise 响应传递给它。\n\n```\n\
  const responses = await sessionClient.detectIntent(request);\nlet data = getRichContent(responses);\n\
  return data;\n```\n\n`getRichContent` 方法如下所示；请参见清单 11-7。\n\n```\nfunction getRichContent(responses){\n\
  const result = responses[0].queryResult;\nlet messages = [];\nif(result.fulfillmentMessages.length\
  \ > 0) {\nfor (let index = 0; index < result.fulfillmentMessages.length; index++)\
  \ {\nconst msg = result.fulfillmentMessages[index];\nif (msg.payload){\nlet data\
  \ = structJson.structProtoToJson(msg.payload);\nmessages.push(data.web);\n} else\
  \ {\nmessages.push(msg.text.text);\n}\n}\nreturn messages;\n}\n}\n```\n\n**清单 11-7**\
  \ `getRichContent` 方法从 protobuf 中获取对象\n\n它首先检查 `fulfillmentMessages` 是否包含一个至少有一个元素的数组。可能存在多个\
  \ fulfillment 消息，例如，一条文本消息和两条富消息，因此我们需要遍历它们。如果消息包含自定义负载，我们需要获取数据并将 protobuf 转换为\
  \ JSON。否则，我们可以将文本版本添加到新的消息数组中。这个数组将被发送到 UI。从技术上讲，你也可以在此处创建 HTML 标记，但在前端执行此操作会更好，这样你的前端\
  \ UI 代码就能与后端代码很好地解耦。\n\n我使用这个小型转换器脚本来处理协议缓冲区。我可以从 JSON 转换为 Struct，或者从 Struct 转换为\
  \ JSON。你可以在本书的 GitHub 仓库中找到这个脚本。我们需要的最后一个函数是：`structProtoToJson(data.web)`。\n\n\
  不要忘记在你的 `app.js` 后端代码顶部包含该文件：\n\n```\nconst structJson = require('../back-end/structToJson');\n\
  ```\n\n以下是我们将在 UI 中使用的代码。一旦通过 Socket.IO 接收到数据，我的 `index.html` 将包含以下代码块。请查看清单 11-8。\n\
  \n\n\n```javascript\nsocketio.on('returnResults', function (data) {\nconsole.log(data);\n\
  //d) 如果有查询结果，则动态\n// 创建列表项并追加到消息列表中。\nfor (let index = 0; index < data.queryResult.queryResults.length;\
  \ index++) {\nconst e = data.queryResult.queryResults[index];\nif (e.type == 'hyperlink')\
  \ {\nvar balloon = document.createElement(\"li\");\nballoon.className = 'balloon\
  \ agent';\nballoon.innerHTML = `<a href=\"${e.link}\" target=\"_blank\">${e.text}</a>`;\n\
  console.log(`${e.text}`);\nmessages.appendChild(balloon);\n} else if (e.type ==\
  \ 'map') {\nvar balloon = document.createElement(\"li\");\nballoon.className = 'balloon\
  \ agent';\nballoon.innerHTML = `<iframe src=\"${e.map}\" width=\"400\" height=\"\
  300\"></iframe>`;\nmessages.appendChild(balloon);\n} else if (e.type == 'image')\
  \ {\nvar balloon = document.createElement(\"li\");\nballoon.className = 'balloon\
  \ agent';\nballoon.innerHTML = `<img src=\"${e.src}\" alt=\"${e.alt}\">`;\nmessages.appendChild(balloon);\n\
  } else {\nvar balloon = document.createElement(\"li\");\nballoon.className = 'balloon\
  \ agent';\nballoon.innerHTML = e;\nmessages.appendChild(balloon);\n}\n}\n});\n```\n\
  *清单 11-8* 遍历结果以查找自定义负载类型，并直接在屏幕上显示\n\n它会检查消息类型。如果类型是超链接，则使用 Dialogflow 控制台中自定义负载提供的链接和链接文本创建一个锚点标签。如果类型是图片，则使用\
  \ Dialogflow 控制台中自定义负载提供的图片源和替代文本创建一个图片标签。如果是地图，则使用一个包含 Google 地图 URL 的 iframe，该\
  \ URL 由 Dialogflow 控制台中的自定义负载提供。可能性是无限的。如果你想创建自定义卡片，它可能包含一些 div 元素，但需要配合自定义样式表代码使其看起来美观。\n\
  \n## 在 Dialogflow 响应中使用 Markdown 语法和条件模板\n\n当与大型团队合作时，用户体验设计师或文案撰稿人通常负责维护 Dialogflow\
  \ 控制台对话。他们希望控制文本的样式，而不在文本中使用 HTML 标记，例如，突出显示某些单词或显示超链接。当你构建自己的自定义集成时，集成对 Markdown\
  \ 的支持实际上非常简单。\n\n只需确保你的 UI `index.html` 包含一个 Markdown 库，例如 `Marked`。\n\n现在，你的意图响应可以包含\
  \ Markdown 语法，如图 11-6 所示：\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig6_HTML.jpg](img/506047_1_En_11_Fig6_HTML.jpg)\n\
  \n*图 11-6* 在 Dialogflow 响应文本字段中使用 Markdown 文本\n\n```\n**Lee** 是 Google 的 *对话式 AI\
  \ 开发者倡导者*。在这个角色中，她专注于 *Dialogflow*、*Contact Center AI* 和 *Speech* 技术。这是她的 [网站](https://www.leeboonstra.com)\n\
  ```\n\n图 11-7 显示了这将如何在屏幕上呈现。\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig7_HTML.jpg](img/506047_1_En_11_Fig7_HTML.jpg)\n\
  \n*图 11-7* 导入 Marked 库后，自定义集成可以处理 Markdown\n\n## 对话分支\n\n除了 Markdown，还可以在 Dialogflow\
  \ 控制台中使用模板和条件分支。可以想到 `Jinja`（适用于 Python 或 Java 开发者）、`Smarty`（PHP）或 `Jade`/`Pug`、`Handlebars`\
  \ 和 `Mustache`（适用于 JavaScript 开发者）。这里有一个使用 `Pug.js` 库（以前称为 Jade）的示例。它运行得非常好。\n\n\
  这里的技巧是利用**自定义负载**响应设置并使用模板库，这样你就可以提供可读的模板和可注入的变量。请注意清单 11-9。\n\n```\n{ \"custom\"\
  :\n{\n\"locals\": {\n\"username\": \"$username\"\n},\n\"pug\": [ \"if username\\\
  n\", \" | Hello $username\\n\", \"else\\n\", \" | Hello stranger\" ]\n}\n}\n```\n\
  *清单 11-9* 在 Dialogflow 控制台中以自定义负载形式进行分支的示例\n\n属于此示例的训练短语是\n\n```\nMy name is: Lee\n\
  ```\n\n`locals` 对象的值是作为用户名传入的参数值。在 pug 对象中，我编写了一个包含 if-else 分支的多行字符串模板。使用 Pug 时，行缩进至关重要。请注意换行符\
  \ `\\n` 代码和用于纯文本的 `|`。\n\n我的集成后端代码需要包含 pug 库：\n\n```\nconst pug = require('pug');\n\
  ```\n\n一个自定义函数，可以从自定义负载中获取模板，并使用传入的变量进行编译。请参见清单 11-10。\n\n```\nfunction templateHelper(payload)\
  \ {\nvar str = payload.custom.pug;\nif(Array.isArray(payload.custom.pug)) {\nstr\
  \ = payload.custom.pug.join(\"\");\n};\nvar fn = pug.compile(str);\nvar text = fn(payload.custom.locals);\n\
  return text;\n}\n```\n*清单 11-10* 用于编译 Pug 的模板辅助函数\n\n检测到意图后，你只需要使用负载调用 `templateHelper`\
  \ 方法。请参见清单 11-11。\n\n```\nio.on('connect', (client) => {\nconsole.log(`Client connected\
  \ [id=${client.id}]`);\nclient.emit('server_setup', `Server connected [id=${client.id}]`);\n\
  client.on('message', async function(msg) {\nconst results = await detectIntent(msg);\n\
  var responseMsg = results[0].queryResult.fulfillmentText;\nvar payload = results[0].queryResult.fulfillmentMessages[0];\n\
  let data = structJson.structProtoToJson(payload.payload);\nconsole.log(data);\n\
  if (data && data.custom){\nclient.emit('returnResults', templateHelper(data));\n\
  } else {\nclient.emit('returnResults', responseMsg);\n}\n});\n});\n```\n*清单 11-11*\
  \ 调用 `templateHelper` 方法\n\n一旦收到消息，我们将像往常一样检测意图，但需要检查匹配的意图数据是否包含自定义负载。请注意，这是一个 protobuf，需要先转换为\
  \ JSON 对象。此脚本可以在本书附带的 GitHub 仓库中找到。基于此自定义负载，我们将调用 `templateHelper` 并传入负载数据。否则，我们将只返回\
  \ `fulfillmentText` 作为响应消息。结果见图 11-8。\n\n![../images/506047_1_En_11_Chapter/506047_1_En_11_Fig8_HTML.jpg](img/506047_1_En_11_Fig8_HTML.jpg)\n\
  \n*图 11-8* 通过 Dialogflow 控制台在自定义 UI 中进行对话分支\n\n## 使用 Flutter 构建集成以在原生移动 Android\
  \ 或 iOS 应用中运行 Dialogflow 代理\n\n前面的部分向你展示了如何通过创建前端 UI 和后端服务器，将 Dialogflow 集成到你的网站或\
  \ Web 应用程序中。如果你让这个网站对移动设备友好，那么它就可以在移动设备上运行。但是，你可能对将 Dialogflow 代理集成到原生移动应用中感兴趣。这就是\
  \ Google 的技术 Flutter 的用武之地。\n\n`Flutter` 是 Google 创建的一个开源 UI 软件开发工具包。它用于从单个（Dart\
  \ 代码）代码库为 Android、iOS、Linux、Mac、Windows 和 Web 开发应用程序。使用 Flutter，你可以快速开发应用，因为它可以在保存代码时热重载更改。Flutter\
  \ 附带了一组丰富的可定制小部件，可以创建具有原生性能的原生最终用户体验，因为它使用 Dart 的原生编译器编译为原生 ARM 机器代码。就像 Node.js\
  \ 的 `npm` 一样，Dart 和 Flutter 有自己的包管理器 `pub.dev` 包管理，允许你下载预构建的 Flutter 包并将其集成到你的应用中。\n\
  \n\n\n"
- "# 在 Flutter 应用中集成 Dialogflow 的两种技术\n\n在 Flutter 应用中集成 Dialogflow 智能体有两种技术方案。两种方案各有利弊，需要您自行判断哪种方案最适合您的业务。\n\
  \n第一种方案最为直接：使用 Dialogflow 包，将 Dialogflow SDK 直接集成到您的（移动应用）客户端中。另一种方案则是将 Dialogflow\
  \ SDK 集成到后端服务器应用中，然后让您的（移动应用）客户端通过 HTTP(s) 与后端通信。\n\n通过直接集成到 Flutter 中，您只需编写一次代码库。作为企业，您要么拥有内部的\
  \ Dart/Flutter 开发经验，要么聘请自由职业者或代理机构为您构建应用。借助 Flutter 2，您甚至可以支持桌面和 Web 应用，而不仅仅是 Android\
  \ 和 iOS 应用。然而，您需要开发一种解决方案，以安全的方式提供和存储 Google Cloud 的服务账号和 API 密钥。\n\n## 注意事项\n\n\
  如果处理不当，将服务账号存储在客户端资源文件夹（甚至存储在安全的密钥客户端钥匙串中）可能会很危险。首先，您需要非常小心地管理您的服务账号。您将授予您的组件哪些读取和访问权限？当您授予\
  \ Google Cloud 计算引擎管理员权限时，可以想象攻击者可能会破解并反编译您的应用。一旦他们获得对您计算引擎的访问权限，他们可能会通过例如挖矿等方式让您承担高昂的成本。即使您没有授予\
  \ Google Cloud 服务账号计算访问权限，您仍然不应暴露您的密钥。尽管对于 Dialogflow 来说，它只允许您访问项目内的聊天机器人，但如果您的最终用户在聊天中共享了个人身份信息（PII），攻击者仍有可能从聊天历史记录中读取这些数据。这可能是一个巨大的问题。\n\
  \n除此之外，在应用中更改服务账号密钥并不容易，因为您不希望当前用户的应用停止工作。那么，如何在移动客户端中安全地提供服务账号和密钥呢？例如，可以构建一种密钥轮换（第二组密钥）机制。比如使用\
  \ JSON Web 令牌（JWT），这是一种互联网提议的标准，用于创建带有可选签名和可选加密的数据，其有效载荷包含断言某些声明的 JSON。令牌使用私有密钥或公钥/私钥对进行签名。或者，您也可以在服务器上运行部分集成。\n\
  \n## 在后端/服务器应用中集成 Dialogflow SDK\n\n在后端/服务器应用中集成 Dialogflow SDK 需要您用另一种编程语言编写应用代码。对于企业而言，这通常意味着您需要与另一个开发团队或代理机构合作，并且必须协同工作。这种方案还意味着您需要支付服务器计算成本，因为您需要将代码库托管在某个地方。其优势在于，您不会将服务账号暴露给客户端，从而使该方案非常安全。\n\
  \n采用这种方法的另一个显著优势是，当您想要构建一个需要支持多种集成渠道的聊天/语音平台时。对于创建多渠道或全渠道体验，这是正确的做法，因为您只需在一个地方维护\
  \ Dialogflow 集成，将每个集成视为其自己的渠道。如果您愿意，甚至可以构建成能够在 Dialogflow Essentials 和 Dialogflow\
  \ CX 智能体之间切换的方式。让我们来看看这两种方案。\n\n## 将 Dialogflow SDK 直接集成到您的 Flutter 应用中\n\n当您在 `pub.dev`\
  \ 上搜索 Dialogflow 时，您会发现许多开源的 Dialogflow Flutter 包，包括我自己的：`dialogflow_grpc`。Dialogflow\
  \ gRPC 包利用了 Dialogflow 的 gRPC 库。只有使用 gRPC 库才能实现流式传输，如果您想利用 Dialogflow 内置的语音转文本和文本转语音功能的话。值得一提的是，底层的\
  \ gRPC API 也比通常用于将 Dialogflow 与 Dart 和 Flutter 集成的 REST API 更快。\n\n出于演示目的，我们将 Google\
  \ Cloud 服务账号包含在资源文件夹中。正如我们现在所知，对于生产环境的应用，您必须制定更安全的策略。\n\n使用 `dialogflow_grpc` 依赖项编辑\
  \ `pubspec.yaml` 文件。并指向您的服务账号（例如 `assets/credentials.json`），如清单 11-12 所示。\n\n```\n\
  dependencies:\n  dialogflow_grpc: any\n```\n\n\n\n"
