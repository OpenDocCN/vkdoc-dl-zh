  每个 Actions 项目都必须有一个欢迎意图，作为用户开始对话的入口点。当用户通过说出其名称（例如，“嘿 Google，与视频游戏智能体对话”）显式调用操作时，会触发欢迎意图。此欢迎意图使用
  `actions.intent.MAIN` 意图名称标识。


  您可以在操作包中创建其他条目，其中包含您自己定义的意图。但是，对于 Dialogflow 项目，您将需要 `actions.intent.TEXT` 意图，它将像一个通用捕获器一样工作。所有口头或键入的输入都作为
  `actions.intent.TEXT` 意图发送。请注意清单 7-2 中的第 6 点以及清单 7-3 中的 `actions.intent.TEXT` 块。您可以简单地获取原始文本并将其转发到您的履行服务器。从那里，您可以使用
  Dialogflow 处理文本并构建响应以发送回 Google 上的操作。


  您可以忽略关于 Actions SDK 的其他几乎所有内容。但是，还有其他不错的功能，例如触发器。这允许用户通过说出操作名称和意图来调用特定功能（例如，“嘿 Google，与
  ExampleAction 对话以查找一些鞋子”）。


  在下一个清单，清单 7-4 中，请注意 `trigger` 块。`queryPatterns` 作为一个语音适应列表，带有提示，用于偏置语音转文本模型，以确保参数块中标记的正确参数被发送到您的
  NLU 检测层。如果没有这些提示，STT 模型可能会听到类似“买一些蓝色运动鞋”而不是“买一些蓝色绒面革鞋”的内容。您的 NLU 层将无法理解“运动鞋”。


  ```

  {

  "description": "直接访问",

  "name": "BUY",

  "fulfillment": {

  "conversationName": "ExampleAction"

  },

  "intent": {

  "name": "com.example.ExampleAction.BUY",

  "parameters": [

  {

  "name": "color",

  "type": "org.schema.type.Color"

  }

  ],

  "trigger": {

  "queryPatterns": [

  "找一些 $org.schema.type.Color:color 运动鞋",

  "买一些蓝色绒面革鞋",

  "买跑鞋"

  ]

  }

  }

  }

