- '# 2. Dialogflow Essentials 入门


  `Dialogflow Essentials` 是可用于构建对话式用户界面的工具。它提供试用版和按需付费版。在本章中，你将学习如何使用 `Dialogflow
  Essentials` 设置你的第一个 `Dialogflow` 代理。


  这包括：代理及其数据存储的位置、日志记录、监控、用户角色和配额。它深入讨论了所有可能的设置。在本章末尾，开发者可以学习如何设置 `Dialogflow` 以进行
  API 访问。




  '
- '# Dialogflow Essentials 版本


  `Dialogflow Essentials` 按量付费版是 `Dialogflow` 的企业级服务层级，属于 `Google Cloud` 的一部分。该按量付费版面向需要企业级服务的组织。`Dialogflow
  Essentials` 按量付费版覆盖了最重要的全球合规与监管标准（例如 `GDPR`），并提供 `SLA`、支持包以及 `Google Cloud` 服务条款。除此之外，它拥有更高的配额限制和语音交互功能，并与
  `Google Cloud` 完全集成，便于使用其他云服务来构建完整的进阶解决方案。（例如，额外的机器学习 API，如 `Translation`、使用 `DLP
  API` 屏蔽敏感用户数据（`GDPR`）、使用 `NLP API` 进行情感检测、`Cloud Functions` 实现、用于分析的 `BigQuery`
  数据仓库等。）


  免费的 `Dialogflow` 试用版不属于 `Google Cloud`。


  与其他免费的 Google 工具一样，`Dialogflow` 免费版属于免费 Google 消费者条款的一部分。这意味着，就像 `Gmail` 一样，您的数据可能被用于改进产品、训练机器学习模型或投放广告。


  `Dialogflow` 数据在哪里处理？您可以在创建项目时进行选择。作为 `Google Cloud` 的一部分，也意味着最佳延迟。当您连接到 `Google
  Cloud` 时，您将使用海底的 `Google Cloud` 光缆。因此，您的连接将更快且更安全。


  ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig1_HTML.jpg](img/506047_1_En_2_Fig1_HTML.jpg)


  图 2-1


  `Dialogflow` 位置下拉菜单


  如图 2-1 所示，默认情况下，`PII` 数据（如聊天记录、分析数据和日志）存储在全局 `Dialogflow` 服务器中。在创建新的 `Dialogflow`
  代理之前，您可以为 `Dialogflow` 项目选择一个位置。在撰写本文时，您可以选择美国、亚洲（日本）、澳大利亚（悉尼）和英国（伦敦），您可以在 `Dialogflow`
  徽标旁边的下拉菜单中找到此设置。选择区域后，您将切换到一个新的 `Dialogflow` 环境，您可以在其中创建新代理。


  **注意**


  澳大利亚、亚洲和英国区域并非提供与美国（全球）相同的所有功能。例如，亚洲区域缺少测试版功能，如 `FAQ` 知识库，并且不附带预构建代理、闲聊和开箱即用的集成。最后一项看似必不可少，但您可以按照第
  10 章所述手动构建集成。


  此外，您可以在 `Dialogflow` 设置界面中关闭数据存储；参见图 2-2。点击 `Dialogflow` 徽标正下方的齿轮图标。一旦关闭数据存储，将不会存储任何
  `PII` 数据。这对于需要处理 `GDPR` 的欧洲国家尤其有用。


  **注意**


  自英国脱欧以来，英国已不再是欧盟的一部分。这意味着，根据《通用数据保护条例（`GDPR`）》的合规要求，将日志和历史数据存储在英国区域是不合规的。最佳解决方案是在全局区域创建您的代理（以访问所有功能），但在
  `Dialogflow` 中关闭所有日志。相反，您可以将聊天历史存储在 `Google Cloud BigQuery` 中，并选择欧洲作为区域。此方法在第 13
  章中有详细说明。


  ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig2_HTML.jpg](img/506047_1_En_2_Fig2_HTML.jpg)


  图 2-2


  设置面板中的日志设置


  不过，我建议您仍然捕获聊天机器人的分析数据。您可以通过构建一个额外的层，将来自 `Dialogflow SDK` 的传入消息直接推送到 `Google Cloud
  BigQuery` 来轻松实现这一点。`BigQuery` 是 `Google Cloud` 的一部分，并且可以选择欧洲进行数据存储。其他 `Google Cloud`
  资源允许您将数据存储在特定国家的数据中心。（例如，`Google Cloud Storage` 可以将数据存储在荷兰的数据中心。）


  ## 创建 Dialogflow 试用代理


  `Dialogflow` 是一种软件即服务（`SaaS`）解决方案；它在浏览器中运行。


  让我们创建一个示例代理。


  打开 [`https://dialogflow.cloud.google.com/`](https://dialogflow.cloud.google.com/)。


  使用 Google 身份登录。对于消费者，这可以是 `Gmail` 地址；对于组织，这可以是绑定到您自己域的 `Google Cloud Identity` 或
  `Google Workspace` 实体。


  如果您之前使用过 `Dialogflow`，您将自动登录到一个活跃的 `Dialogflow` 项目。


  如果您是第一次登录 `Dialogflow`，可能会看到一个弹出窗口（参见图 2-3）。您需要同意 `Dialogflow` 试用条款和条件，以及额外的 `Firebase`
  条款和条件。后者将在使用免费云服务时使用，例如内联实现编辑器，其底层使用免费的 `Firebase` 云函数。


  ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig3_HTML.png](img/506047_1_En_2_Fig3_HTML.png)


  图 2-3


  首次使用的用户可以接受消费者服务条款


  如果您计划在浏览器中或使用 `Google Assistant` 构建语音机器人，请确保已启用 **Web 和应用活动**。您可以从 [`http://myaccount.google.com/activitycontrols`](http://myaccount.google.com/activitycontrols)
  访问此设置页面（参见图 2-4）。


  ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig4_HTML.jpg](img/506047_1_En_2_Fig4_HTML.jpg)


  图 2-4


  Google 个人资料中的 Web 和应用活动


  接下来，点击 **创建代理** 按钮。


  要创建另一个新项目，请点击下拉菜单（位于 `Dialogflow` 徽标下方，参见图 2-5）。它将显示一个活跃的 `Dialogflow` 项目列表，在列表底部，会有菜单选项：**创建代理**。


  ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig5_HTML.jpg](img/506047_1_En_2_Fig5_HTML.jpg)


  图 2-5


  您可以使用下拉菜单选择 `Dialogflow` 代理


  在创建代理界面（参见图 2-6）中，您需要


  ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig6_HTML.jpg](img/506047_1_En_2_Fig6_HTML.jpg)


  图 2-6


  在 `Dialogflow Essentials` 中创建新代理


  *   设置一个 `Dialogflow` *项目名称*

  *   设置一个*默认语言*（后续步骤可以添加其他语言）

  *   设置一个*默认时区*（当对话映射到日期/时间对象时，将使用默认时区）


  可选地，您可以指向一个现有的 `Google Cloud` 项目。如果留空，`Dialogflow` 将为您在 `Google Cloud` 中创建一个底层项目。


  不要启用 **Mega Agent** 开关。我们将在第 9 章讨论如何使用此功能来编排多个子聊天机器人。现在，请保持其关闭状态。


  点击 **创建**，`Dialogflow` 将为您创建一个新的 `Dialogflow` 标准（免费）项目。




  '
- "# 为企业创建 Dialogflow 智能体\n\n当您为企业工作，并希望创建一个安全且符合合规要求的 Dialogflow 智能体时，您可以像以前一样创建一个\
  \ Dialogflow 项目。但是，您需要将项目升级到（付费的）企业版。之后，您还需要在 Google Cloud 项目中启用 Dialogflow API。\n\
  \n首先，导航至 [`http://console.cloud.google.com`](http://console.cloud.google.com)。使用\
  \ Google 身份登录。对于个人用户，这可以是 Gmail 地址；对于组织，这可以是绑定到您自己域名的 Google Cloud Identity 或 Google\
  \ Workspace 实体。\n\n首次使用 Google Cloud 的用户需要接受 Google Cloud 条款和条件页面，同时设置原籍国（见图 2-7）。\n\
  \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig7_HTML.jpg](img/506047_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7\n\n接受 Google Cloud 条款和条件\n\n当您首次使用 Google Cloud 时，需要提供一个结算账户。Google Cloud\
  \ 按使用量付费，即使它提供免费额度（对于构建聊天机器人来说绰绰有余），您也必须指定一种付款方式，例如信用卡。这将保护 Google Cloud 免受机器人滥用免费账户的影响。在左侧菜单中，您可以选择**结算**\
  \ ➤ **创建账户**。您需要指定结算账户名称、组织名称和国家（货币将与之关联）。在下一个屏幕上，您可以输入付款地址和付款方式详细信息。\n\n登录 Google\
  \ Cloud 控制台并拥有有效的结算账户后，您需要创建一个项目。点击蓝色顶部栏中 Google Cloud 徽标旁边的**选择项目**按钮。（见图 2-8。）\n\
  \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig8_HTML.jpg](img/506047_1_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8\n\nGoogle Cloud 控制台中的 Google Cloud 项目选择器\n\n在弹出的窗口中，点击**新建项目**，如图 2-9 所示。\n\
  \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig9_HTML.jpg](img/506047_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9\n\n在 Google Cloud 控制台中创建一个新的 Google Cloud 项目\n\n在创建项目页面中，您需要：\n\n-   设置一个*项目名称*。\n\
  -   选择一个*结算账户*。此结算账户将用于对该项目进行计费。\n\n点击**创建**。\n\n下一步，让我们在另一个浏览器标签页中打开 Dialogflow\
  \ 控制台：\n\n[`http://console.dialogflow.com`](http://console.dialogflow.com)\n\n步骤将与上一节类似。但是，现在您可以在创建智能体页面中导入您新创建的\
  \ Google Cloud 项目。\n\n点击**创建**。\n\n最后一步是将您的 Dialogflow 套餐从试用版升级到企业版。在菜单中，点击**升级**按钮（见图\
  \ 2-10）。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig10_HTML.jpg](img/506047_1_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10\n\n升级到 Dialogflow 按需付费\n\n您将看到一个类似图 2-11 的弹出窗口，您可以选择一个套餐。有两个套餐可供选择：*试用版*和*基础版*。这两个套餐的主要区别在于，*基础版*套餐提供企业级功能，例如\
  \ Google Cloud 条款和条件、SLA、支持以及更高的配额。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig11_HTML.jpg](img/506047_1_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11\n\n选择 Dialogflow 版本\n\n选择基础版套餐，即表示您同意 Google Cloud（企业版）条款和条件。\n\n设置企业版套餐后，您将在菜单中看到企业版套餐已为您的项目激活（注意图\
  \ 2-12），并且您可以随时更改。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig12_HTML.jpg](img/506047_1_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12\n\n注意 Dialogflow 菜单中已选定的套餐\n\n## 配额\n\n除了云条款和条件、SLA 和支持之外，许多客户使用企业版的另一个原因是更高的调用配额。每次您与\
  \ Dialogflow 交互时，用户话语都将被视为一次 API/Dialogflow 智能体调用。试用版 Dialogflow 有 API 调用上限。试用版每分钟最多可进行\
  \ 180 次文本聊天机器人调用，而企业版每分钟可进行 600 次请求。Google Cloud 有关于所有配额的文档，并且配额通常可以增加。要申请更高的配额，请在配额编辑表单中点击**申请更高配额**，以提交**Dialogflow\
  \ 配额增加请求**（[`https://console.cloud.google.com/apis/api/dialogflow.googleapis.com/quotas`](https://console.cloud.google.com/apis/api/dialogflow.googleapis.com/quotas%253F_ga%253D2.114957573.345776091.1589188956-1503905642.1588942477)）。\n\
  \n## 用户角色与监控\n\n由于您使用的是 Google Cloud，企业可以通过 **Cloud Logging** 创建和查看自定义审计报告、日志记录和调试。\n\
  \n企业管理员可以通过 Cloud IAM 从 Google Cloud 控制台邀请和注册聊天机器人用户。可以设置用户和组权限，或设置安全和控制策略。他们还可以使用目录同步（例如\
  \ **Active Directory 同步**）来导入和注册公司用户。这可以通过 Cloud Directory Sync 和 Directory API\
  \ 使用 Webhook 完成。\n\n假设您与其他 Google Cloud 资源（如 Cloud Functions 或其他机器学习 API）进行了集成，并且您不想授予应用程序完整的项目访问权限。在这种情况下，您必须在\
  \ Google Cloud IAM 控制台中分配 Dialogflow API 角色（**管理员**、**客户端**或**读取者**）。当您在 Google\
  \ Cloud 控制台中选择 **IAM 与管理**，并查找 Dialogflow 使用的服务账户时，可以找到此配置。（有关名称，请参阅 Dialogflow\
  \ 中的设置面板。）\n\n> **注意：** 开发者应避免同时处理同一个智能体。多个用户使用单个 Dialogflow 智能体在同时保存和训练智能体时可能会导致冲突。\n\
  \nDialogflow 控制台向创建智能体的用户提供**所有者/管理员**角色。如果您想更改所有者/管理员、为一个智能体添加多个所有者/管理员，或移除一个智能体的所有者/管理员，您同样需要\
  \ Google Cloud 控制台中的 IAM 与管理功能。\n\n### 使用 VPC 服务控制\n\nVPC 服务控制可以帮助您降低 Dialogflow\
  \ 数据泄露的风险。您可以创建一个服务边界，这是一种组织级方法，用于保护您在项目中指定的资源和数据。您可以保护智能体数据以及意图检测请求和响应。创建服务边界时，请将\
  \ Dialogflow（`dialogflow.googleapis.com`）作为受保护服务包含在内。\n\n\n\n### 使用开发者功能\n\n当开发者希望通过\
  \ SDK 使用 Dialogflow 时，需要先从云控制台启用 Dialogflow API。可以通过点击此链接 [`https://console.cloud.google.com/flows/enableapi?apiid=dialogflow.googleapis.com`](https://console.cloud.google.com/flows/enableapi%253Fapiid%253Ddialogflow.googleapis.com)\
  \ 在 Google Cloud 控制台中启用，或者使用 Google Cloud 命令行工具 (`gcloud`) 执行以下命令：\n\n```\ngcloud\
  \ services enable dialogflow.googleapis.com\n```\n\n有多种身份验证选项，但建议使用服务账号进行身份验证和访问控制。服务账号为应用程序（而非最终用户）提供凭据。项目拥有服务账号，您可以为单个项目创建多个服务账号。有关更多信息，请参阅服务账号。\n\
  \n## 配置您的 Dialogflow 项目\n\n点击 Dialogflow 徽标正下方的齿轮图标，进入设置页面。\n\n在此页面上，您可以添加其他语言、调整机器学习设置、与其他人共享项目或创建多个环境。\n\
  \n让我们逐一查看所有这些设置。\n\n### 常规\n\n如图 2-13 所示，在“常规”选项卡中，提供以下设置：\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig13_HTML.jpg](img/506047_1_En_2_Fig13_HTML.jpg)\n\
  \n图 2-13\n\nDialogflow 设置面板\n\n*   **描述**：智能体的描述。\n\n*   **默认时区**：智能体的默认时区。\n\n\
  *   **Google 项目**\n    *   **项目 ID**：与智能体关联的 Google Cloud 项目\n\n    *   **服务账号**：Dialogflow\
  \ 用于系统集成的服务账号\n\n    *   **试用版或按量付费**\n\n*   **Beta 功能**：切换以启用智能体的 Beta 功能。\n\n\
  *   **日志设置**\n    *   **将交互记录到 Dialogflow**：您将能够使用 Dialogflow 中的“历史记录”和“训练”功能。\n\
  \n    *   **将交互记录到 Google Cloud**：仅当启用了**将交互记录到 Dialogflow** 时，此选项才可用。禁用 Dialogflow\
  \ 的日志记录也会禁用此设置。它将使用 Google Cloud（以前称为 Stackdriver）中的日志记录功能。\n\n*   **删除智能体**：完全删除智能体，且无法撤销。如果智能体已与其他用户共享，则必须先移除这些用户，然后才能删除智能体。\n\
  \n### 语言\n\n“语言”选项卡是您可以为智能体添加其他语言的地方。如图 2-14 所示，Dialogflow Essentials 支持 21 种智能体语言；您可以从弹出窗口中选择多种语言。\n\
  \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig14_HTML.jpg](img/506047_1_En_2_Fig14_HTML.jpg)\n\
  \n图 2-14\n\n选择 Dialogflow 语言\n\n### 机器学习设置\n\nDialogflow Essentials 的核心概念是**意图分类**。（第\
  \ 3 章将详细介绍其工作原理。）对话设计师会将训练短语标记上意图名称。一旦聊天机器人投入生产，底层的 Dialogflow 机器学习模型就可以根据其训练过的训练短语，将用户话语与定义的意图进行匹配。有时，不同的意图包含相似的训练短语。一个意图可能比另一个意图更相关。特别是当您的智能体不断增长，并且会向智能体添加更多意图时，可能会发生匹配到错误意图的情况。解决此问题的通用方法是更改**机器学习分类阈值**。阈值就像一个置信度分数。如果返回值小于阈值，则会触发回退意图，或者如果没有定义回退意图，则不会触发任何意图。\n\
  \n您可以在**机器学习设置**选项卡下的设置部分找到机器学习分类阈值；见图 2-15。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig15_HTML.jpg](img/506047_1_En_2_Fig15_HTML.jpg)\n\
  \n图 2-15\n\n机器学习分类阈值，一个置信度分数\n\n您可以在原始 API 响应中找到置信度级别；请注意图 2-16 中的以下行：\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig16_HTML.jpg](img/506047_1_En_2_Fig16_HTML.jpg)\n\
  \n图 2-16\n\n当您在模拟器中点击“诊断信息”按钮时，可以看到原始 API 响应，其中包含 `intentDetectionConfidence`\n\n\
  ```\n\"intentDetectionConfidence\": 0.7057321,\n```\n\n有时，您可能不想在智能体级别而是在意图级别调整机器学习置信度。可能是因为某些意图比较特殊，所以可以更改每个意图的优先级。您可以给意图设置更高或更低的优先级。甚至可以忽略特定的意图，可能是因为您仍在处理它。\n\
  \n操作方法是从意图屏幕中选择该意图。\n\n在意图屏幕的顶部，您可以点击蓝色圆点。这将显示一个小弹出窗口；请查看图 2-17 以找到此功能。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig17_HTML.png](img/506047_1_En_2_Fig17_HTML.png)\n\
  \n图 2-17\n\n每个意图都可以有单独的优先级，以改进意图检测\n\n#### 自动拼写纠正\n\n如果启用此功能，并且用户输入存在拼写或语法错误，则意图将按照书写正确的方式（基于其训练短语和使用的实体）进行匹配。检测意图的响应将包含更正后的用户输入。这也适用于涉及系统和自定义实体的匹配。例如，“我想买一个\
  \ Swtch。”它将找出正确的意图并写下正确的参数，即“Switch”。\n\n拼写纠正适用于 Dialogflow 支持的所有语言。\n\n注意\n\n如果拼写错误和更正后的用户输入匹配不同的意图，则选择匹配拼写错误用户输入的意图。\n\
  \n拼写纠正无法纠正 ASR（自动语音识别）错误，因此我们不建议为使用 ASR 输入的智能体启用此功能。自动语音适应可能会有所帮助；请参阅第 7 章。但这两个功能都不能与\
  \ Google 上的操作一起使用，因为 Google 上的操作使用自己的语音转文本/文本转语音层。\n\n更正后的输入可能匹配错误的意图。您可以通过将常见的不匹配短语添加到负面示例中来修复此问题。\n\
  \n拼写纠正会略微增加智能体的响应时间。\n\n### 自动训练\n\n默认情况下，当添加或编辑意图或实体时，底层的机器学习模型会自动更新。您可以禁用或启用智能体的自动训练。例如，当您想测试机器学习模型的性能时，可以使用此功能。在第\
  \ 13 章中，将讨论机器学习模型的健康状况。\n\n### 智能体验证\n\n默认情况下，每次您对智能体进行更改时，Dialogflow 都会对您的智能体运行一次智能体审查。如图\
  \ 2-18 所示，您可以在设置部分禁用或启用智能体验证；更多信息请参阅第 5 章。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig18_HTML.jpg](img/506047_1_En_2_Fig18_HTML.jpg)\n\
  \n图 2-18\n\n启用智能体验证\n\n\n\n### 导出和导入\n\n注意图 2-19；在此选项卡中，您可以导入和导出代理。**导出**意味着您将创建代理的备份。它将返回一个\
  \ zip 文件，其中包含所有意图和实体的 JSON 文件。\n\n通过**从 Zip 恢复**，您可以用新版本替换当前代理版本。旧版本中的所有意图和实体都将被删除。还有**从\
  \ Zip 导入**，它会上传新的意图和实体，而不会删除当前的。同名的意图和实体将被较新版本替换。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig19_HTML.jpg](img/506047_1_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19 导出和导入\n\n### 环境\n\n如图 2-20 所示，要访问环境设置，请单击 **Environments** 选项卡。您可以创建代理的多个版本并将其发布到不同的环境。当您编辑代理时，您正在编辑草稿代理。在任何时候，您都可以将草稿代理保存为代理版本，这是代理的不可变快照。\n\
  \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig20_HTML.jpg](img/506047_1_En_2_Fig20_HTML.jpg)\n\
  \n图 2-20 将版本发布到环境\n\n当您保存草稿代理时，它会被发布到默认环境。当您创建代理版本时，您可以将其发布到自定义环境。您可以创建各种自定义环境，例如测试、开发、生产等。并且通过选项菜单，也可以回滚到以前的版本。\n\
  \n### 语音\n\n要访问语音设置，请单击 **Speech** 选项卡。\n\n这些包含语音识别设置（**语音转文本**）和语音合成（**文本转语音**）设置。\n\
  \n#### 提高语音识别质量\n\n在此部分中，您可以找到语音识别模型的设置。它在底层使用了 Google Cloud Speech-to-Text 模型。有两个可用的切换开关。\n\
  \n##### 启用增强语音模型和数据记录\n\n通过启用语音模型和数据记录，您同意数据记录协议的条款和条件（该协议修订了管理客户使用 Google Cloud\
  \ 服务的协议）。启用数据记录将改善您的语音转文本功能。\n\n##### 启用自动语音自适应\n\n为了偏置您的语音转文本模型，确保它理解您如何训练您的代理，您可以启用自动语音自适应。有关更多信息，请参见第\
  \ 7 章“提高语音转文本质量”部分。\n\n#### 文本转语音\n\n在此部分中，您可以找到**文本转语音**合成器的设置，以调整语音和音频输出。\n\n\
  ##### 启用自动文本转语音\n\n自动将所有对话中的默认文本响应转换为语音。您将同时获得文本版本和音频字符串。您可以在模拟器中测试此功能（见图 2-21）；启用此设置后，您将看到一个带有音频播放器的小部件。\n\
  \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig21_HTML.jpg](img/506047_1_En_2_Fig21_HTML.jpg)\n\
  \n图 2-21 模拟器中的文本转语音\n\n##### 语音配置\n\n注意图 2-22；使用以下设置在 V2 API 和电话集成中配置代理的合成语音：\n\n\
  ![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig22_HTML.jpg](img/506047_1_En_2_Fig22_HTML.jpg)\n\
  \n图 2-22 语音配置\n\n*   **Agent Language**：选择语音合成的默认语言。\n*   **Voice**：选择语音合成模型。\n\
  *   **Speaking Rate**：调整语音语速。\n*   **Pitch**：调整语音音调。\n*   **Volume Gain**：调整音频音量增益。\n\
  *   **Audio Effects Profile**：选择要应用于合成语音的音频效果配置文件。语音音频针对与所选配置文件关联的设备（例如，耳机、大型扬声器、电话通话）进行了优化。\n\
  \n有关调整文本转语音的更多信息，请参见第 7 章的 SSML 部分。\n\n注意\n\n所有这些设置都不包括 Actions on Google。因为 Google\
  \ Assistant 使用其自身的语音转文本和文本转语音模型。\n\n### 共享\n\n注意图 2-23；**Share** 选项卡允许您与其他人共享您的\
  \ Dialogflow 代理。您可以添加一个电子邮件地址，并指定此用户的角色，可以是 **Reviewer** 或 **Developer**。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig23_HTML.jpg](img/506047_1_En_2_Fig23_HTML.jpg)\n\
  \n图 2-23 共享设置。别忘了点击保存！\n\nDialogflow 中的开发者角色映射到 Google Cloud Console 中的 IAM 角色：**Project**\
  \ ➤ **Editor**。它授予需要对所有 Google Cloud 和 Dialogflow 资源具有编辑权限的项目编辑者：\n\n*   使用 Cloud\
  \ Console 或 API 对所有云项目资源的编辑权限\n*   对 Dialogflow Console 的编辑权限以编辑代理\n*   可以使用 API\
  \ 检测意图\n*   查看 IAM 原始角色定义\n\nDialogflow 中的**审查者**角色映射到 Google Cloud Console 中的 IAM\
  \ 角色：**Project** ➤ **Viewer**。它授予需要对所有 Google Cloud 和 Dialogflow 资源具有读取权限的项目查看者：\n\
  \n*   使用 Cloud Console 或 API 对所有云项目资源的读取权限\n*   对 Dialogflow Console 的读取权限\n*  \
  \ 不能使用 API 检测意图\n\n按下 **Add** 按钮，不要忘记点击 **Save** 按钮。\n\n### 高级\n\n在撰写本文时，在 **Advanced**\
  \ 选项卡（图 2-24）中，只有一个设置可以控制：**Sentiment Analysis**。您可以为支持的语言启用情感分析。启用情感分析将在意图检测时返回一个分数和一个量级。\n\
  \n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig24_HTML.jpg](img/506047_1_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24 启用情感分析\n\n情感检测的**分数**表示用户话语的整体情感。情感检测的**量级**表示用户话语中存在的情感内容量，该值通常与用户话语的长度成正比。\n\
  \n您可以在模拟器中测试它（图 2-25）。尝试输入“Thank you for helping me.”。它会返回一个介于 0 和 +1 之间的正面查询分数。接下来，在模拟器中输入“That\
  \ didn’t work at all.”。您现在将看到一个介于 –1 和 0 之间的负面分数。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig25_HTML.png](img/506047_1_En_2_Fig25_HTML.png)\n\
  \n图 2-25 当用户说一些积极的话时，API 响应将产生积极的情感\n\n有关情感的更多信息，请查看第 13 章中的情感分析部分。\n\n注意\n\n每个\
  \ Google Cloud 项目只能有一个 Dialogflow 代理。如果您的 Dialogflow 代理需要测试和开发版本，您可以使用 Dialogflow\
  \ 中的 **versions** 功能。或者，您可以创建更多的 Google Cloud 项目，一个用于测试代理，一个用于开发代理。\n\n\n\n"
- "# 为开发者配置 Dialogflow\n\n您是一名开发者，并且希望获得开发者访问权限。\n\n选择 **IAM 与管理** ➤ **服务账号**。您将看到一个服务账号的电子邮件地址，如图\
  \ 2-26 所示。\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig26_HTML.png](img/506047_1_En_2_Fig26_HTML.png)\n\
  \n图 2-26\n\nGoogle Cloud 控制台中的服务账号\n\n如果您尚未下载此服务账号的服务账号密钥，请下载，并将 `GOOGLE_APPLICATION_CREDENTIALS`\
  \ 环境变量设置为其路径。您可以通过点击 **操作** 列中的选项按钮并选择 **创建密钥** 来下载服务账号 JSON 密钥。在弹出的窗口中，您可以选择 **JSON**\
  \ 并点击 **创建**。（见图 2-27。）\n\n![../images/506047_1_En_2_Chapter/506047_1_En_2_Fig27_HTML.png](img/506047_1_En_2_Fig27_HTML.png)\n\
  \n图 2-27\n\n从服务账号创建私钥\n\n它会将 JSON 文件下载到您的磁盘，您需要将其分配给一个名为 `GOOGLE_APPLICATION_CREDENTIALS`\
  \ 的环境变量。\n\n将密钥分配给环境变量 `GOOGLE_APPLICATION_CREDENTIALS`。\n\n对于 Linux/MacOS 环境：\n\
  \n```\nexport GOOGLE_APPLICATION_CREDENTIALS=/path/to/service_account.json\n```\n\
