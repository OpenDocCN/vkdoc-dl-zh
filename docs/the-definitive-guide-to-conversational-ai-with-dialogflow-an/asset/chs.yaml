  \n\n\n### 图 11-10\n一个支持多渠道的机器人平台架构示例\n\n如前述架构所示，该方案包含多种集成渠道，例如移动应用、Google Assistant、Angular\
  \ Web 应用、电话和 WhatsApp。这些渠道均与同一个后端服务器通信。后端服务器以服务器组件的形式存在。例如，在 `Node.js` 应用中，服务器可使用\
  \ `Express` npm 库。Google Assistant 可向 `https://www.example.com/app/googleassistant`\
  \ 发送 `POST` 请求；Flutter 应用可向 `https://www.example.com/app/mobile` 发送 `POST` 请求；以此类推。服务器可将所有传入的（Ajax）消息路由至渠道中间件。该中间件负责集成各种\
  \ SDK。例如，Google Assistant 中间件将与 Actions on Google 集成，电话和 WhatsApp 中间件将与 Twilio 集成，Angular\
  \ 网站和 Flutter 应用将创建视图并手动返回。所有这些集成中间件层都将连接到与 Dialogflow SDK 集成的代码，如本章第一节所示。其优势在于，你只需在一个地方设置\
  \ Dialogflow。这部分负责与 Dialogflow Agent 通信。它不应包含任何富消息、UI 组件或 SSML 文本，仅包含纯 NLU 和意图检测。在构建此类架构时，别忘了创建分析数据管道架构。第\
  \ 13 章将介绍如何实现。\n\n## 总结\n\n本章包含关于构建自定义集成的信息。你将学习以下任务：\n\n-   你想通过使用 Dialogflow SDK\
