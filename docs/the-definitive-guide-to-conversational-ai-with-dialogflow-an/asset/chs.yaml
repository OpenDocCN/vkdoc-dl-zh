  : \"⁴.17.1\",\n        \"socket.io\": \"².3.0\",\n        \"uuid\": \"³.3.3\"\n\
  \    }\n}\n```\n\n**清单 11-2**  \n后端 `package.json`，包含所有库\n\n以下是运行聊天机器人后端集成的代码。\n\
  \n1.  这些系统变量可以通过命令行设置\n\n\n\n```javascript\n//1) 这些系统变量可以通过命令行设置，使用 --PROJECT_ID、--PORT\
  \ 和 --LANGUAGE\nconst projectId = process.env.npm_config_PROJECT_ID;\nconst port\
  \ = ( process.env.npm_config_PORT || 3000 );\nconst languageCode = (process.env.npm_config_LANGUAGE\
  \ || 'en-US');\n//2) 加载此应用所需的所有库\nconst socketIo = require('socket.io');\nconst\
  \ http = require('http');\nconst cors = require('cors');\nconst express = require('express');\n\
  const path = require('path');\n// 这些库是 Dialogflow 专用的\nconst uuid = require('uuid');\n\
  const df = require('dialogflow').v2beta1;\n//3) 创建一个 Express 应用\nconst app = express();\n\
  //4) 设置 Express，并加载静态文件和 HTML 页面\napp.use(cors());\napp.use(express.static(__dirname\
  \ + '/../ui/'));\napp.get('/', function(req, res) {\nres.sendFile(path.join(__dirname\
  \ + '/../ui/index.html'));\n});\n//5) 创建服务器并监听 PORT 变量\nserver = http.createServer(app);\n\
  io = socketIo(server);\nserver.listen(port, () => {\nconsole.log('正在端口 %s 上运行服务器',\
  \ port);\n});\n//6) Socket.IO 监听器，一旦客户端连接到服务器套接字，\n// 则执行此代码块。\nio.on('connect',\
  \ (client) => {\nconsole.log(`客户端已连接 [id=${client.id}]`);\nclient.emit('server_setup',\
  \ `服务器已连接 [id=${client.id}]`);\n//7) 当客户端发送 'message' 事件时，\n// 则执行此代码块\nclient.on('message',\
  \ async function(msg) {\n//console.log(msg);\n//8) 一个用于意图匹配的 Promise\nconst results\
  \ = await detectIntent(msg);\nconsole.log(results);\n//9) 将意图匹配后的 Dialogflow 结果返回给客户端\
  \ UI。\nclient.emit('returnResults', results);\n});\n});\n/**\n* 设置 Dialogflow 集成\n\
  */\nfunction setupDialogflow(){\n//10) Dialogflow 需要一个会话 ID\nsessionId = uuid.v4();\n\
  //11) Dialogflow 需要一个 DF 会话客户端\n// 这样每个 DF 会话都是唯一的\nsessionClient = new df.SessionsClient();\n\
