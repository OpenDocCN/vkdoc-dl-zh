- "# 启用闲聊模块\n\n**闲聊**是对您自定义意图的绝佳补充，尽管它们的工作方式与手动意图略有不同。通过意图，您可以提供训练短语，这意味着您可以训练聊天机器人以不同方式回答问题时也能正确回应。闲聊和常见问题知识库连接器（请参阅本章后续内容）不提供添加训练短语的选项。它们使用\
  \ Dialogflow 的自然语言理解来理解用户的问题。通常，这效果不错；例如，当您说“哈哈，你太搞笑了”时，闲聊句子“你真有趣”也会得到回应。但是，当您问“你存在吗？”时，它不会给出“你是真实的吗？”的答案。\n\
  \n即使您没有在闲聊自定义页面上提供答案，它也会使用现成的答案。自定义基本上意味着您覆盖了 Dialogflow 标准的闲聊答案。\n\n**注意**\n\n\
  尽管在聊天机器人中创建类似人类的对话（作为自定义意图的补充）非常棒，但您必须小心处理特定的闲聊短语，例如确认短语，如“是”、“否”和“取消”。这些短语可能会得到“好的！”这样的回应，但它们不会执行现成的代码，也不会让对话继续下去。它们确实会设置一个\
  \ POST 动作，例如 `smalltalk.confirmation.yes`，因此您需要在您的实现代码或 webhook 中监听这些意图。\n\n人们经常对一个问题回答“是”或“否”，而答案本身并不期望“是”或“否”。闲聊答案很可能不是用户所期望的。在这种情况下，每个提供后续问题或上下文的意图也必须提供适当的回退，这一点非常重要。\n\
  \n在撰写本文时，闲聊仅支持英语（`en`）、俄语（`ru`）、法语（`fr`）和意大利语（`it`），并且不适用于超级代理。\n\n**注意**\n\n根据\
  \ **Actions on Google** 政策，完全启用闲聊会导致您的操作被拒绝。\n\n要为您的 Dialogflow 代理启用闲聊，您可以点击菜单项：**闲聊**。在闲聊设置页面上，您会找到一个开关来切换**启用**开关。这将启用所有闲聊主题。\n\
  \n点击您想要修改回复文本的主题之一。例如，点击**关于代理**；这将展开**问题**（用于匹配用户话语）和文本回复**答案**对。（见图 4-3。）\n\n\
  ![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig3_HTML.png](img/506047_1_En_4_Fig3_HTML.png)\n\
  \n图 4-3\n\n启用闲聊模块\n\n点击**保存**。\n\n## 创建常见问题知识库\n\n**知识库**代表您提供给 Dialogflow ES 的知识文档集合。知识文档可以是常见问题或文本块。\n\
  \n**知识连接器**补充了已定义的意图。使用知识连接器的代理通常也会使用已定义的意图。与闲聊类似，知识连接器提供的回复精度和控制能力不如意图。它使用 Dialogflow\
  \ 的自然语言理解来理解用户的问题。通常，这效果不错，但有时，特别是当您以非常不同的方式提问时，它可能找不到答案。您应该定义意图来处理复杂的用户请求，并让知识连接器处理简单的请求。\n\
  \n首先，点击代理标题旁边的齿轮图标，打开**设置屏幕**。\n\n向下滚动到**测试版功能**，并翻转开关：**启用测试版功能和 API**。（见图 4-4。）点击**保存**。\n\
  \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig4_HTML.jpg](img/506047_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4\n\n为了使用知识库连接器，您需要从设置 ➤ 常规屏幕启用测试版功能和 API\n\n点击**知识**菜单。\n\n在顶部栏中，您可以点击**创建知识库**按钮，开始添加您的第一个知识库（图\
  \ 4-5）。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig5_HTML.jpg](img/506047_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\n创建知识库\n\n为知识库命名，例如*电子游戏常见问题*，然后点击**保存**。\n\n一个知识库可以包含多个文档。点击链接**创建第一个**（图\
  \ 4-6）。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig6_HTML.jpg](img/506047_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\n创建知识文档\n\n在弹出的屏幕中（图 4-7），您可以添加以下信息：\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig7_HTML.jpg](img/506047_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\n文档设置弹出屏幕\n\n*   您可以给文档命名，例如*内部电子游戏常见问题*或*来自 IGN.com 的公共电子游戏常见问题*。\n*\
  \   您可以选择知识类型：\n    *   **常见问题**：带答案的问题\n    *   **扩展问答**：让 Dialogflow 基于文章/文本块理解问题\n\
  *   MIME 类型：\n    *   `text/html`：如果您想从公共网站导入常见问题。\n    *   `text/csv`（CSV 文件）：这可以是数据库导出文件。\n\
  *   作为数据源，您可以选择以下之一：\n    *   **云存储上的文件**：用于存储在 Google Cloud Storage 中的私有 CSV 文件（安全）。\n\
  \    *   **URL**：要从中导入常见问题的公共网站 URL。\n    *   **从计算机上传文件**：从您的磁盘上传私有 CSV 文件。\n*\
  \   有一个**启用自动重新加载**复选框，允许 Dialogflow 自动重新加载公共网站常见问题，以确保您获取到新增或更改的常见问题。\n\n当您按下**创建**按钮时，Dialogflow\
  \ 将开始爬取/导入问题和答案对。完成后，您将在知识库文档概览中看到该文档。（见图 4-8。）在此视图中，可以删除或添加更多文档。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig8_HTML.jpg](img/506047_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8\n\n知识文档概览\n\n此时，您还没有完成。您需要告诉 Dialogflow 它应该返回什么答案。点击**添加回复**链接。它会预先为您填充一个答案\
  \ `$Knowledge.Answer[1]`，这意味着置信度最高的第一个答案（图 4-9）。\n\n\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig9_HTML.jpg](img/506047_1_En_4_Fig9_HTML.jpg)\n\
  \n**图 4-9** 微调知识库文档的响应\n\n但你可能希望针对不同的渠道集成来微调答案（例如，在 Google Assistant 中以卡片形式返回响应）。并且你可能希望以一个问题结尾，以保持对话的延续或引导对话方向。然后点击**保存**。\n\
  \n默认情况下，知识库会配置一个默认文本响应，其中填充了最佳匹配的知识答案：`$Knowledge.Answer[1]`。但知识响应可能包含多个答案，你可以在配置的响应中引用这些答案。`$Knowledge.Question`\
  \ 和 `$Knowledge.Answer` 的索引从 `1` 开始，因此在添加更多响应时，请增加此索引。\n\n在定义响应时，应考虑以下几点：\n\n- 如果定义的响应数量大于知识连接器匹配的响应数量\
  \ N，则只会返回 N 个响应。\n- 鉴于其准确性可能低于匹配明确定义的意图，我们建议在可能的情况下向用户返回三个或更多响应。\n\n当你准备好导入所有问答后，可以在\
  \ Dialogflow 模拟器中测试知识连接器（图 4-10）。\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig10_HTML.jpg](img/506047_1_En_4_Fig10_HTML.jpg)\n\
  \n**图 4-10** 在模拟器中测试知识库\n\nDialogflow Trial 和 Enterprise Essentials 版本允许文档总大小最大为\
  \ 10MB，每月 1000 次请求，每天 100 次请求。当你选择 Dialogflow Enterprise Plus 层级时，所有这些限制都将解除。\n\n\
  回到知识库页面（当你在 Dialogflow 菜单中点击**知识**时），你会注意到一个调整滑块（图 4-11）。当最终用户的表述也与某个意图匹配时，你可以指定对知识库结果的偏好程度。将滑块从较弱（偏好意图）调整到较强（偏好知识）。\n\
  \n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig11_HTML.jpg](img/506047_1_En_4_Fig11_HTML.jpg)\n\
  \n**图 4-11** 调整知识库的权重\n\n## 最佳实践\n\n为获得最佳效果，以下是一些最佳实践。\n\n总体而言：\n\n- CSV 文件必须使用逗号作为分隔符。\n\
  - 机器学习设置的置信度分数在常见问题解答和知识库文章之间未经校准，因此如果你同时使用常见问题解答和知识库文章，最佳结果不一定总是得分最高的。\n- Dialogflow\
  \ 在创建响应时会从内容中移除 HTML 标签。因此，最好避免使用 HTML 标签，并尽可能使用纯文本。\n- Google Assistant 的每个聊天气泡有\
  \ 640 个字符的限制，因此与 Google Assistant 集成时，长答案会被截断。\n- 最大文档大小为 50MB。\n- 使用 Cloud Storage\
  \ 文件时，应使用公共 URI 或你的用户账户或服务账户有权访问的私有 URI。\n\n**注意** 过去，我曾看到一些来自（我自己的）网页的公共知识库常见问题解答失败。通过对\
  \ Google 实现进行逆向工程，我发现公共常见问题解答网站需要允许 Google 机器人访问。你应该通过 Google Search Console 将公共常见问题解答网站添加到\
  \ Google 搜索引擎，并让搜索索引器抓取它，使其存在于搜索索引中。因此，像 `https://pages.github.com` 这样的网站将无法工作。\n\
  \n特定于常见问题解答：\n\n- 你的 CSV 文件必须将问题放在第一列，答案放在第二列。此外，它不应包含标题行。\n- 尽可能使用 CSV，因为 CSV 的解析最准确。\n\
  - 不支持包含单个问答对的公共 HTML 内容。\n- 一个文档中的问答对数量不应超过 2000 个。\n- 不支持具有不同答案的重复问题。\n- 如果可能，请为问答使用有效的\
  \ HTML5 标记，并基于 FAQPage schema.org 表示法。\n\n特定于抽取式问答：\n\n- 内容密集的文本效果最佳。避免使用包含许多单句段落的内容。\n\
  - 不支持表格和列表。\n- 一个文档中的段落数不应超过 2000 个。\n- 如果文章较长（超过 1000 字），请尝试将其拆分为多个较短的文章。如果文章涵盖多个问题，可以将其拆分为涵盖各个问题的较短文章。如果文章只涵盖一个问题，则将重点放在问题描述上，并保持问题解决方案简短。\n\
  - 理想情况下，只应提供文章的核心内容（问题描述和解决方案）。其他内容如作者姓名、修改历史、相关链接和广告并不重要。\n\n**注意** 在撰写本文时，抽取式问答仍处于实验阶段。它基于已在\
  \ Google 的搜索和 Assistant 等产品中尝试和测试过的类似技术。\n\n### 将知识库问题转换为意图\n\n可以将知识库问题转换为意图，从而允许你提供更多训练短语。当你在知识库文档概览中点击**查看详情**链接时，你将看到所有已导入的问答。\n\
  \n在此屏幕上，你可以禁用单个问题。也可以手动重新加载问题和答案。同样在此处，你可以选择单个问题并将其转换为真正的意图。（参见图 4-12。）\n\n![../images/506047_1_En_4_Chapter/506047_1_En_4_Fig12_HTML.jpg](img/506047_1_En_4_Fig12_HTML.jpg)\n\
  \n**图 4-12** 所有已导入常见问题解答的概览\n\n## 总结\n\n本章为你提供了从模板和知识库构建 Dialogflow 智能体的所有信息，以便无需创建意图即可快速构建\
  \ Dialogflow 智能体。本章涉及以下任务：\n\n- 你想通过使用预构建智能体，从 Dialogflow 模板解决方案导入来快速创建一个 Dialogflow\
  \ 智能体作为基础。\n- 你想在 Dialogflow 智能体中启用闲聊功能。\n- 你想通过导入私有 CSV 或使用知识库连接器从公共网站导入常见问题解答，为你的\
  \ Dialogflow 智能体添加额外的常见问题解答。\n\n## 延伸阅读\n\n- Dialogflow 关于预构建智能体的文档\n  `https://cloud.google.com/dialogflow/es/docs/agents-prebuilt`\n\
  - Dialogflow 关于闲聊的文档\n  `https://cloud.google.com/dialogflow/es/docs/agents-small-talk`\n\
  - Dialogflow 关于知识库的文档\n  `https://cloud.google.com/dialogflow/es/docs/how/knowledge-bases`\n\
  - Google 站长工具\n  `https://www.google.com/intl/en/webmasters`\n\n\n\n"
- '# 5. 机器人管理


  Dialogflow 不仅为对话编写和机器人构建提供了出色的工具，还提供了机器人管理功能。`Agent Validation`（智能体验证）和 `Agent Training`（智能体训练）就是这样的功能。它们让在企业环境中构建复杂机器人的对话设计师的工作变得轻松许多。


  `Agent Validation`（智能体验证）会开箱即用地审查你的智能体，而通过 `Agent Training`（智能体训练），你的智能体可以在对话过程中学习新知识。尽管意图训练是事先固定的，但你可以通过对先前捕获的用户表述进行点赞、点踩或重新分配意图，来影响意图分类的得分。


  本章将向你展示如何启用验证、理解验证结果，以及如何根据用户数据影响你的机器人模型。


  ### 智能体验证


  当你构建的聊天机器人变得稍微复杂一些时，你很容易就会拥有大量的意图和实体。也许，你甚至是在 Dialogflow 项目中与一个团队合作——多位 UX 设计师同时处理多个意图。只要有人工作，就难免会出错。当你在训练
  Dialogflow 模型时，这可能会成为一个问题。


  在 Dialogflow 中常见的错误包括：


  -   意图中没有或没有足够的训练短语。

  -   意图的训练短语彼此之间或与其他意图的训练短语过于相似。

  -   训练短语中没有充分利用实体的变体。

  -   文本在某些训练短语中被标注，但在其他训练短语中却没有。

  -   回退意图没有负面示例。


  好消息是，Dialogflow 在 Dialogflow 控制台和 API 中内置了一个自动验证功能，它可以针对这些常见错误进行验证。每当智能体训练完成时，结果即可用。


  点击 **Validation**（验证）菜单。智能体验证功能默认是启用的。如果你找不到它，可以在 **Settings**（设置）➤ **ML Settings**（机器学习设置）选项卡中启用
  `Agent Validation`（智能体验证）开关。


  一旦你在 Dialogflow 菜单中点击 `Validation`（验证）（并且智能体已经过训练），你就会看到验证结果（如图 5-1 所示）。


  ![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig1_HTML.jpg](img/506047_1_En_5_Fig1_HTML.jpg)


  图 5-1


  开箱即用的验证


  ### 理解验证结果


  每当智能体训练执行并完成后，验证结果会自动可用。你可以通过 Dialogflow 控制台或 API 访问验证结果。


  验证结果提供了一个你应该修正的警告和错误列表，以提高智能体的质量和性能。它可以在（全局）智能体级别、意图或实体中发现错误。如果你的智能体有信息或警告，你可以选择忽略它们并启动你的智能体。


  这仅供参考，但如果你不使用此功能，就会降低智能体的质量；基本上，这是 Dialogflow 智能体审查的开箱即用功能，而且是免费的！


  问题可能代表不同的严重级别。在验证屏幕上仅显示 **Info**（信息）、**Warning**（警告）和 **Error**（错误）消息。**Critical**（严重）和
  **Unspecified**（未指定）设置可在 SDK（或在特定的意图/实体页面上）中使用。它们都在表 5-1 中进行了描述。


  表 5-1


  各种严重级别


  | 级别 | 描述 |

  | --- | --- |

  | INFO | 智能体未遵循最佳实践。 |

  | WARNING | 智能体可能无法按预期运行。 |

  | ERROR | 智能体可能会遇到部分故障。 |

  | CRITICAL | 智能体可能会完全失败。 |

  | SEVERITY UNSPECIFIED | 未指定。此值不应被使用。 |


  图 5-2 展示了一些验证示例。


  ![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig2_HTML.jpg](img/506047_1_En_5_Fig2_HTML.jpg)


  图 5-2


  验证示例


  在这个例子中，我重点指出了以下标准：


  -   `Give_Your_Name` 意图显示了一个警告，我需要添加更多包含多样化示例的训练短语来改进 NLU 模型。

  -   `MyFirstGame-Console-GetContext` 包含一个实体 `Dreamcast` 和 `SNES`，但这两个实体尚未在 `@product`
  自定义实体中定义。除此之外，它还需要更多的训练短语。


  前面的例子是警告的例子，你可以忽略它们。但是当你有错误时，最好立即修复它们。


  注意


  每次最多显示 5000 个问题。如果你有超过 5000 个问题，在问题数量减少到 5000 以下之前，你可能看不到计数减少。


  除了验证屏幕，当你访问意图列表或实体列表页面时，任何带有验证错误的意图或实体都会在其名称旁边显示一个错误轮廓指示器（一个 `!` 图标）。


  当你访问一个带有验证错误的特定意图或实体的页面时，在“保存”按钮附近会显示一个错误轮廓指示器。


  点击此指示器会显示该意图或实体的错误列表。默认情况下，仅显示严重级别为 **CRITICAL**（严重）或 **ERROR**（错误）的错误。


  ### 通过 SDK 进行验证


  你也可以通过 SDK（`ValidationResult`）从代码中运行验证。如果你正在构建自己的 CI/CD 管道，并且在将智能体投入生产之前，你可能希望先运行智能体验证，这会很方便。


  以下是一个如何在 Node.js 中实现此功能的示例。


  `ValidationResult` 响应可能如清单 5-1 所示。


  ```

  {

  "validationErrors": [

  {

  "severity": "ERROR",

  "entries": [

  "projects/my-project/agent/intents/58b44b2d-4967-4a81-b017-12623dcd5d28/parameters/bf6fdf55-b862-4101-b5b1-36f1423629d0"

  ],

  "errorMessage": "参数 ''test'' 的值为空。"

  },

  {

  "severity": "WARNING",

  "entries": [

  "projects/my-project/agent/intents/271e3808-3c91-4e6b-89e8-47951abcec8d"

  ],

  "errorMessage": "意图 ''app.current.update'' 没有足够的唯一训练短语。请考虑添加更多不同的示例。"

  },

  {

  "severity": "ERROR",

  "entries": [

  "projects/my-project/agent/intents/26e64b1b-eaa7-4ce2-be46-631a501fccbe/trainingPhrases/a650375e-083c-4bb5-9794-ba9453e51282",

  "projects/my-project/agent/intents/58b44b2d-4967-4a81-b017-12623dcd5d28/trainingPhrases/1d947780-22d3-4f80-8d7a-3f86efbf0be3"

  ],

  "errorMessage": "多个意图共享过于相似的训练短语：\n — 意图 ''app.notifications.open''：训练短语 ''open
  all notifications settings''\n — 意图 ''app.current.notifications.open''：训练短语 ''open
  notifications settings''"

  }

  ]}

  清单 5-1

  云函数的实现

  ```


  如你所见，Dialogflow 提供了一个开箱即用的智能体审查和验证功能。它默认是启用的，你可以通过 Dialogflow 控制台或 API 访问它。


  这将为你提供错误和警告的概览，你应该修复这些问题以提高智能体的质量。


  当发现大量问题时，你应该考虑根据相似性，小批量地修复这些问题。修复一个问题后，重新训练智能体可能会解决类似的问题。所以，现在你知道了。在将你的聊天机器人投入生产之前，始终检查验证页面！




  '
- "# 使用内置训练功能改进 Dialogflow 机器学习模型\n\nDialogflow 提供了一种训练工具，可用于改进您的 Dialogflow 机器学习模型。您可以对匹配的意图进行点赞、点踩或更改。Dialogflow\
  \ 会根据之前见过的数据进行匹配，从而在下一次更好地处理对话。\n\n在 Dialogflow 菜单中选择 **训练** 菜单项。\n\n打开该工具时（见图 5-3），它会按时间倒序显示对话历史记录（最新的发言排在最前面）。\n\
  \n![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig3_HTML.jpg](img/506047_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\nDialogflow 内置训练\n\n它将展示用户发言、请求次数（对话中的对话轮次）、未找到匹配的次数、对话发生的日期以及一个刷新按钮（当您对类似内容的训练过程进行覆写时，将使用此按钮）。\n\
  \n当您点击对话列表中的某一行时，它会在训练视图中打开该对话，如图 5-4 所示。训练视图显示一系列对话轮次，并提供将此数据添加到训练数据的控件。\n\n![../images/506047_1_En_5_Chapter/506047_1_En_5_Fig4_HTML.jpg](img/506047_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\n\nDialogflow 内置训练，改进检测\n\n在这里，您可以执行以下操作：\n\n*   您可以更改意图（或者，如果未匹配到意图，则分配一个意图），以便下次它知道该选择哪个意图。\n\
  *   您可以对意图匹配进行点赞，教导 Dialogflow 模型检测到的意图是正确的。\n*   您可以对意图匹配进行点踩，教导 Dialogflow 模型检测到的意图是错误的。\n\
  *   您可以删除数据。可能是因为它是虚假数据，您不希望用它来训练模型。\n*   您可以选择用户发言并标注特定词语，例如，当用户发言为：*我想订购最新的星球大战：前线游戏。*\
  \ 您可以选择名称 *星球大战：前线*，并教导 Dialogflow 它实际上是实体 `@fps_games`。\n\n您可以在智能体开发期间、在智能体发布或进行更改之前使用训练工具。在生产环境之后使用该工具来检查真实对话是否按预期进行也非常有用。\n\
  \n使用屏幕右上角的上传按钮，您可以将对话作为纯文本文件上传。一个 `.txt` 文件应每行包含一个用户发言短语（以换行符分隔）。可以上传多个（最多 10 个）`.txt`\
  \ 文件，或者您可以上传一个包含 `.txt` 文件的 zip 压缩包，只要其大小不超过 3MB。\n\n请求不会发送到 `detect intent` API。因此，不会激活任何上下文，也不会匹配任何意图。理想情况下，文件应仅包含可用作训练短语的数据。最终用户表达式的顺序并不重要。\n\
  \n您应该上传什么样的数据？考虑对话日志；也许您有人与人之间的聊天日志，或者来自电子邮件、论坛或常见问题解答的在线客户支持对话，基本上所有与聊天机器人相关的内容。也许您正在跟踪社交媒体（如\
  \ Twitter）以了解人们在问什么。或者，您可能有联络中心的音频录音，可以通过 Google Cloud 中的 `Speech-to-Text` API 将其转换为文本。但是，请尽量避免长篇的、非对话式的用户发言。并尽量避免最终用户未说过的内容（例如，人工客服的回复）。\n\
  \n> **注意**\n> 训练工具使用智能体历史数据来加载对话，因此必须在设置面板中启用日志记录。默认情况下此功能是启用的，但与欧洲的银行和保险公司等受监管公司合作时，可能需要禁用此功能。\n\
  \n训练工具仅显示最终用户表达式。要查看客服和最终用户双方的对话数据，请参阅更完整的智能体历史记录。\n\n## 总结\n\n本章解释了如何通过验证您的智能体来审查您的\
  \ Dialogflow ES 智能体配置（例如意图和实体）。借助这个开箱即用的功能，您可以监控智能体的质量。我们还探讨了如何通过 SDK 运行验证；如果您正在构建自己的\
  \ CI/CD 管道，这可能会很方便。\n\n本章的最后一部分解释了您的 Dialogflow 智能体如何持续从用户数据中学习，以及如何改进底层的机器学习模型。训练工具用于审查您的智能体与最终用户的对话，并改进您的训练数据。\n\
  \n## 延伸阅读\n\n*   Dialogflow 关于智能体验证的文档\n    [`https://cloud.google.com/dialogflow/es/docs/agents-validation`](https://cloud.google.com/dialogflow/es/docs/agents-validation)\n\
  *   Dialogflow 关于最佳设计实践的文档\n    [`https://cloud.google.com/dialogflow/es/docs/agents-design`](https://cloud.google.com/dialogflow/es/docs/agents-design)\n\
  *   SDK 中的验证结果对象\n    [`https://cloud.google.com/dialogflow/docs/reference/rpc/google.cloud.dialogflow.v2beta1#google.cloud.dialogflow.v2beta1.ValidationResult`](https://cloud.google.com/dialogflow/docs/reference/rpc/google.cloud.dialogflow.v2beta1%2523google.cloud.dialogflow.v2beta1.ValidationResult)\n\
  *   Dialogflow 训练工具\n    [`https://cloud.google.com/dialogflow/es/docs/training`](https://cloud.google.com/dialogflow/es/docs/training)\n\
  \n"
- '# 6. 将聊天机器人部署到网页和社交媒体渠道


  Dialogflow ES 提供了许多开箱即用的集成。您可以启用这些集成，将您的智能体部署到（多个）渠道。本章将重点介绍以下（基于文本的）集成。


  **Dialogflow Hangouts 集成** 允许您创建文本聊天机器人，并将其集成到 Google Chat（原 Google Hangouts）中，可用于一对一聊天以及聊天室中的机器人。此集成仅适用于
  Google Workspace（原 G Suite）用户，并且 Google Workspace 管理员必须允许用户从 Google Workspace 管理面板安装机器人（[`https://admin.google.com/`](https://admin.google.com/)）。


  **网页演示实现** 是一个简单的网页实现，允许您通过键盘甚至浏览器麦克风进行聊天。这是在您的网站上实现聊天机器人的一种快速简便的方法，或者您可以将其包含在静态
  HTML 网站或网站生成器（如 Google Sites）中。但是，此解决方案不允许您更改聊天机器人的外观和风格。它也不会响应自定义富媒体消息，例如 Google
  地图、超链接或富卡片。如果您需要这些功能，最好实现 Dialogflow Messenger 小部件（请参阅本章最后一节）。如果您是开发人员或团队中有开发人员，请在您的网站上实现高级网页聊天（请参阅第
  11 章）。


  **Dialogflow Messenger** 集成为您的智能体提供了一个可自定义的聊天对话框，可以通过 Web 组件嵌入到您的网站中。聊天对话框实现为一个可由最终用户打开和关闭的对话框窗口。打开时，聊天对话框会显示在屏幕右下角您的内容之上。




  '
- '# 将您的智能体与 Google Chat 集成


  Google Chat 是 Google 的通信软件，属于 Google Workspace 的一部分，专为团队打造。它与 Slack 类似，具备群组消息功能，并支持共享
  Google Drive 内容。


  在 Dialogflow 控制台中，点击 **集成** 菜单。


  点击集成项：**Hangouts Chat**。


  选择 **您域内的所有人**，以确保您 Google Workspace 域内的所有用户都能访问该聊天机器人。（可选地，选择智能体环境。）点击 **开始**。


  接下来，点击 **配置机器人详细信息** 按钮；它将导航到 Google Cloud 控制台（`https://console.cloud.google.com`），如图
  6-1 所示。（请确保您使用与 Dialogflow 相同的 Gmail/Google 账号登录。）


  ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig1_HTML.jpg](img/506047_1_En_6_Fig1_HTML.jpg)


  **图 6-1** Google Chat/Hangouts API 设置


  如果一切正确，所有字段都已预先填好，但您可以修改这些字段。表 6-1 显示了所有设置的概览。


  **表 6-1** Google Chat 设置


  | 设置项 | 描述 |

  | --- | --- |

  | 机器人名称 | 用户与聊天机器人交互时看到的名称。 |

  | 头像 URL | 指向方形图片（PNG 或 JPEG 格式）的 HTTPS URL，图片至少为 128x128 像素，将显示为聊天机器人的头像。 |

  | 描述 | 对聊天机器人功能的描述。 |

  | 功能 | 您希望与聊天机器人交互的方式： – 添加到聊天室 – 消息：直接与聊天机器人发送消息 |

  | 连接设置 | 聊天机器人的端点。由于我们使用的是 Dialogflow，请选择 **Dialogflow**。 |

  | 权限 | 可以安装您聊天机器人的权限；可以是您域内的所有人，或域内的特定人员/群组。 |


  点击 **保存**。您可以关闭 Google Cloud 控制台。


  ## 在 Google Chat 中启用您的智能体


  在聊天界面（`https://chat.google.com`）中，您可以点击机器人标题旁边的 **+** 按钮，将机器人添加到您的对话中。参见图 6-2。


  ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig2_HTML.jpg](img/506047_1_En_6_Fig2_HTML.jpg)


  **图 6-2** 在 Google Chat 中添加机器人


  您将看到一个如图 6-3 所示的目录，从中您可以搜索您创建的 Dialogflow 聊天机器人。**添加** 按钮会弹出一个小的弹出窗口，供您选择交互方式。您可以通过
  **添加到聊天室** 将机器人添加到聊天室，或者选择 **消息**。


  ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig3_HTML.jpg](img/506047_1_En_6_Fig3_HTML.jpg)


  **图 6-3** Google 聊天机器人目录


  *作为消息的机器人* 意味着您直接与机器人对话；不需要聊天室。将机器人添加为消息，请注意在图 6-4 中，当双击左侧菜单中显示的机器人名称时，您将开始一次对话。


  ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig4_HTML.jpg](img/506047_1_En_6_Fig4_HTML.jpg)


  **图 6-4** 使用消息交互方式，您不需要聊天室；可以直接与机器人对话


  当您将*机器人添加到聊天室*时，您可以与聊天室中的每个用户交谈，但当您将消息专门发送给机器人时，您需要使用 `@` 符号，例如 `@dialogflowcookbook`。参见图
  6-5。


  ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig5_HTML.jpg](img/506047_1_En_6_Fig5_HTML.jpg)


  **图 6-5** 在 Google Chat 聊天室中使用 `@` 符号与机器人对话


  ### 富消息支持


  要发送文本回复之外的 Google Chat 消息，您可以在 Dialogflow 控制台中针对特定意图使用 **Hangouts 响应选项卡** 中的 *自定义负载*。您首先需要将
  Hangouts 添加为集成响应，可以通过点击意图响应部分的 `+` 选项卡，然后点击 **添加响应** 按钮来完成，如图 6-6 所示。


  ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig6_HTML.jpg](img/506047_1_En_6_Fig6_HTML.jpg)


  **图 6-6** 选择添加响应 ➤ 自定义负载，以在意图的 Hangouts 集成选项卡中启用富消息


  Hangouts 自定义负载允许您创建更高级的消息类型，例如卡片。一张卡片可以有一个或多个部分。每个部分可以有一个标题。您可以查阅 Google Chat 文档中的
  **Hangouts 消息格式卡片参考指南**，了解可以创建的各种组合。然而，使用自定义负载意味着您需要提供 JSON 格式。您可以在代码清单 6-1 中找到一个示例。


  ```

  {

  "hangouts": {

  "header": {

  "title": "订购游戏机",

  "subtitle": "某视频游戏商店",

  "imageUrl": "https://lh3.googleusercontent.com/v8c6Jn1Aa7s6YO-5Qy6hM4yQ5K4onxgjYD0fzxpOKA7m1Z_0rqOJcXuncd17_W7CeqOcL6d6RfTAAUr1OuHl8uk=rw"

  },

  "sections": [{

  "widgets": [{

  "keyValue": {

  "icon": "TRAIN",

  "topLabel": "订单号",

  "content": "12345"

  }

  },

  {

  "keyValue": {

  "topLabel": "状态",

  "content": "配送中"

  }

  }]

  },

  {

  "header": "位置",

  "widgets": [{

  "image": {

  "imageUrl": "https://dummyimage.com/600x400/000/fff"

  }

  }]

  },

  {

  "header": "按钮 - 我可以省略标题",

  "widgets": [{

  "buttons": [{

  "textButton": {

  "text": "打开订单",

  "onClick": {

  "openLink": {

  "url": "https://example.com/orders/..."

  }

  }

  }

  }]

  }]

  }]

  }

  }

  ```


  **代码清单 6-1** Google Chat 自定义负载


  **注意：** 当您将参考指南中的示例复制粘贴到 Dialogflow 的自定义负载框中时，需要注意以下几点：


  * 第一个键不能命名为 `cards`，而必须命名为 `hangouts`。

  * `hangouts` 键指向一个对象，而不是一个（卡片）数组。

  * 确保编辑器中不包含任何 lint 错误。

  * 您无法在 Dialogflow 模拟器中测试结果；您必须直接在 Hangouts Chat 中进行测试。


  ## 更多基于文本/开源集成选项


  Dialogflow 还支持与 **Slack**、**Telegram**、**Line**、**Facebook Messenger**、**Facebook
  Workplace**、**Kik**、**Skype**、**Twitter**、**Viber**、**Spark** 和 **Twilio** 的集成。值得一提的是，与
  Slack 的集成与 Google Chat 有些相似，因为这些应用程序非常类似。


  在图 6-7 中，您将看到所有基于文本/开源集成的概览。Google 一直在不断添加新的集成。


  ![../images/506047_1_En_6_Chapter/506047_1_En_6_Fig7_HTML.jpg](img/506047_1_En_6_Fig7_HTML.jpg)


  **图 6-7** 基于文本的集成概览




