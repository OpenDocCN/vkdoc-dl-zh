  当你构建一个聊天机器人时，通常这并不意味着你只使用一个对话式 AI 工具`Dialogflow`。就像构建一个网站一样，你可能需要更多资源。想想看：需要一个地方来托管你的聊天机器人，将数据存储在数据仓库或数据库中，并且你可能还想使用额外的机器学习模型来检测
  PDF 文件的内容或文本的情感倾向。


