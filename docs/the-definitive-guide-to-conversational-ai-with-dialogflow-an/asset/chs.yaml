  \n- 收集用户当前正在玩的游戏信息\n- 收集用户最喜欢的整体游戏\n- 收集用户最喜欢的多人游戏\n\n如果我们把这段对话拿到 Dialogflow 中进行训练，那么这三个训练主题就是意图。\n\
  \n`intent`（意图）对用户的意图进行分类。对于每个 Dialogflow 代理，作为用户体验设计师（代理建模者）或开发者的你，可以定义许多意图，这些意图组合起来可以处理完整的对话。通过定义意图，底层的机器学习模型将得到训练。\n\
