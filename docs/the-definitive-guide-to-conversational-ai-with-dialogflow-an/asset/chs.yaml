  `conversations` 块充当路由器；它需要访问公共 HTTPS URL 以检索履行。您的后端履行接收来自 Assistant 的请求，处理请求并做出响应。您可以将此后端代码托管在任何您想要的地方——本地或
  Google Cloud 中。第 10 章将讨论各种计算解决方案，只要您监听 POST 请求即可。


  如果您使用 express 构建后端服务器，您的 POST 路由将如下所示：


  ```

  var assistant = actionssdk();

  expressApp.post(''/webhook/'', assistant);

  ```


  如果您想在本地运行它，您将需要一个像 **ngrok** 这样的工具来创建一个安全隧道。这是因为 Google Assistant 在云端工作，Dialogflow
  也是如此。您的履行需要通过 HTTPS 上的非本地 URL 可用。第 10 章将更详细地讨论 ngrok。


  Google 上的操作还提供了一个名为 **gactions** 的命令行工具。使用命令 `gactions init`，您可以生成样板代码，类似于清单 7-3。


  ### 部署您的操作


  要上传您的操作包，您将需要 `gactions` 命令行工具并运行以下命令，将 `PACKAGE_FILE` 和 `PROJECT_ID` 替换为您的项目的相关值：


  ```

  gactions update --action_package PACKAGE_FILE --project PROJECT_ID

  ```


  ## 使用电话网关构建呼叫机器人


  Dialogflow ES 电话网关是为电话设置入站语音智能体的简单方法。您将获得一个免费电话号码；当您拨打该号码时，Dialogflow 智能体将与您通话。用例更适用于简单的电话机器人（如预订系统）或测试目的。如果您想将机器人集成到您的
  IVR/联络中心中，或者已经拥有现有的联络中心（电话合作伙伴），那么通过 Contact Center AI（如下一节所述）启用 Dialogflow 对您来说将是更好的解决方案。


  当您使用 Dialogflow 试用版时，您将无法访问免费电话号码。并且您将获得有限的配额，例如每分钟总通话分钟数为 3 分钟，每天 30 分钟通话，每月 500
  分钟通话，并且电话号码仅保留 30 天。企业级套餐将包括每分钟 100 分钟通话。换句话说，Dialogflow 试用版非常适合测试电话网关，但您需要迁移到付费的企业级套餐才能在生产环境中使用它。当您在通话过程中遇到忙音或通话中断时，这意味着您已超出配额。


