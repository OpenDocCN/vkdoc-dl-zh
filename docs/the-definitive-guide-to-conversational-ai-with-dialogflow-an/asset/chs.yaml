  \n让我们构建一个很酷的聊天机器人，它可以提供诸如即将发布的游戏等视频游戏信息。同时，也应该能够与聊天机器人就视频游戏进行对话。如果你在现实生活中与朋友就这个话题进行对话，会是什么样子？大概是这样：\n\
