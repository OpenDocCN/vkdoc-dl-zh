- "# 收集与监控对话分析\n\n- [`https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2#detectintentrequest`](https://cloud.google.com/dialogflow/es/docs/reference/rpc/google.cloud.dialogflow.v2%2523detectintentrequest)\n\
  \  - 使用音频检测意图的指南\n- [`https://cloud.google.com/dialogflow/es/docs/how/detect-intent-tts`](https://cloud.google.com/dialogflow/es/docs/how/detect-intent-tts)\n\
  \  - 关于 `AudioBufferSourceNode` 的文档\n- [`https://developer.mozilla.org/en-US/docs/Web/API/AudioBufferSourceNode`](https://developer.mozilla.org/en-US/docs/Web/API/AudioBufferSourceNode)\n\
  \n## 13. 收集与监控对话分析\n\n我想我们都曾经历过这样的场景：当你与虚拟助手对话或在聊天机器人中输入内容时，虚拟代理无法理解你的意思。它会要求你重复，返回一个回退响应，甚至更糟——给出错误答案！这是一种糟糕的客户体验。当这种情况频繁发生时，你的访客可能不会再回来；“那个机器人不管用。”事实上，聊天或语音机器人通常是可以正常工作的，但它被训练去回答不同类型的问题。\n\
  \n当然，通过良好的对话用户体验设计，你可以引导对话走向成功的结果。例如，当虚拟代理启动时，它不应只显示欢迎问候语，还应告知用户它能做什么。这样，你的访客很可能会提出正确类型的问题。\n\
  \n你正在构建一个聊天机器人或虚拟助手。它将如何使你的访客受益？它能解决什么问题？作为品牌或企业，你很可能拥有这些数据。这是你首次尝试构建虚拟代理吗？那么请查看来自其他渠道的数据，以便更好地了解你的客户。你有联络中心并拥有录音吗？你监控社交媒体吗？有收到的电子邮件吗？人们最常问的问题是什么？什么话题受欢迎？人们在抱怨什么？\n\
  \n在构建语音和聊天机器人时，尽快投入生产并捕获分析数据至关重要。我经常听到客户说：“聊天机器人洞察功能在我们的第二版路线图上。我们想先完善对话。”不应该是这样的。机器人分析并非仪表盘中展示的“锦上添花”功能；它们对于改善客户体验至关重要。\n\
  \n不要花一年时间完善对话，而你可以从现有的（实时）流量中学到最多。即使你只上线几个主要话题并直接监控收到的提问，你也可以随着时间的推移扩展聊天机器人并使其更加智能。你可以根据问题出现的频率来实现其他重要话题。这样，你可以了解客户如何看待你的品牌，以及如何随着时间的推移改进你的虚拟代理。\n\
  \n许多企业已经熟悉捕获分析数据。他们依赖网络分析数据（如点击率、页面浏览量和会话时长）来获取客户行为洞察，通常使用 `Google Analytics` 等工具收集。\n\
  \n这就是对话分析比网络分析更强大的原因。重点将不再是用户如何对呈现给他们的内容做出反应，而是他们通过自然语言传达了何种“意图”。事实上，市场预测对话分析将从\
  \ 2019 年的 42 亿美元增长到 2024 年的 157 亿美元！\n\n你可能希望监控或捕获四类指标。\n\n### 对话相关指标\n\n对话相关指标将回答诸如最终用户说了什么、何时说、在哪里（在什么平台上）说等问题。为此，你需要一种存储所有对话的方法。像\
  \ `BigQuery` 这样的数据仓库是收集所有聊天记录的好方法。\n\n数据仓库是用于报告和数据分析的系统。可以将其视为一个数据库，但功能更强大，可以连接许多数据源。你可以在数据仓库中存储所有喜欢的结构化数据，例如网站数据、网站日志、登录数据、广告数据以及你的\
  \ `Dialogflow` 聊天机器人对话。数据越多，你就越能了解你的客户。\n\n### 客户评分指标\n\n许多企业使用 `NPS`、`CES` 和 `CSAT`\
  \ 评分作为研究方法，通过询问简单问题来了解客户的忠诚度。你可以在你的代理中实现这一点。\n\n### 聊天会话与漏斗指标\n\n你可以使用 `Dialogflow`\
  \ 或 `Chatbase` 获取会话流程，这将显示一个聊天漏斗。它直观地总结了最终用户在与你的代理交互时所采取的对话路径。\n\n### 机器人模型健康指标\n\
  \n使用 `Dialogflow` 时，它将利用机器学习来理解用户话语并将其匹配到意图（意图分类）。通过机器人模型指标，可以计算代理底层机器学习模型的质量。\n\
  \n## 捕获对话相关指标并存储在 `BigQuery` 中\n\n像 `Dialogflow` 这样的工具拥有自己的内置分析功能。你可以通过提供日期时间来浏览简单的分析数据。然而，你可能希望在自己的数据仓库中构建自定义存储库，以收集强大的分析系统。`BigQuery`\
  \ 就是一个数据仓库的例子。也许你已经在将其用于广告数据。\n\n### `BigQuery`\n\n`BigQuery` 是一个完全托管、无服务器的数据仓库，能够对\
  \ PB 级数据进行可扩展的分析。它是一个无服务器的软件即服务（`SaaS`），支持使用 `ANSI SQL` 进行查询。\n\n使用 `BigQuery` 分析而非\
  \ `Dialogflow` 内置分析有几个优势，这对于需要处理合规性（如 `GDPR`）的企业来说非常重要。当你在 `BigQuery` 中存储聊天机器人对话时，你可以：\n\
  \n- 选择数据存储的位置\n- 选择数据存储的时间长度\n- 创建对话数据的备份\n- 在存储前从数据集中移除敏感的 `PII` 数据（例如，根据 `GDPR`，你不能存储\
  \ `PII` 数据）\n- 创建更多数据点（例如，聊天翻译、用户情感）\n- 将你的聊天机器人对话与其他有价值的数据结合\n\n> **注意**：如果你因合规原因选择此解决方案，你可能还需要在\
  \ `Dialogflow` 设置面板中关闭数据日志记录。这也意味着你将无法在 `Dialogflow` 控制台的“分析”和“历史记录”标签页中看到任何数据。\n\
  \n为什么将聊天机器人分析与其他数据结合是有益的？因为你可以借此创建全渠道体验和洞察。想象一下，一位用户访问你的银行网站。用户已登录，正在浏览关于抵押贷款的银行网页。一周后，用户返回网站并与银行聊天机器人开始对话（甚至可能通过电话与语音代理交谈）。用户解释他有欺诈交易，聊天机器人提供阻止这些交易的帮助。在对话结束前，聊天机器人还提供了一个抵押贷款优惠。由于聊天数据以及网站广告数据都存储在同一个数据仓库中，建立这种关联变得很容易。\n\
  \n### 捕获点\n\n让我们来看几个捕获点，它们有助于从机器人对话中收集洞察。我们可以使用这些指标来查询我们的数据集。\n\n\n\n"
- '# 会话 ID


  `会话 ID` 对于查找特定会话的所有记录、阅读完整对话记录以及计算独立用户总数非常有用。


  像 Dialogflow 这样的聊天机器人构建工具会为每个聊天会话维护一个会话路径。此聊天会话路径绑定到您的代理账户（因此其他人无法窥探），并且由于包含 uuid
  而具有唯一性。


  ```javascript

  const sessionId = uuid.v4();

  const sessionClient = new df.SessionsClient();

  const sessionPath = sessionClient.sessionPath(projectId, sessionId);

  ```


  当您使用 BigQuery 时，应收集每个传入的用户话语及其会话 ID。一旦您知道某个特定的会话 ID，就可以检索包含所有其他已存储数据字段的完整聊天记录。用于检索会话的
  SQL 查询如下所示：


  ```sql

  SELECT * FROM `chat_msg_table` WHERE SESSION_ID = ''projects/myagent/agent/sessions/db33b345-663c-4867-8021-fecd50c5e8b1''
  ORDER BY DATETIME

  ```


  从聊天消息表中返回会话 ID 等于某个字符串的所有内容，并按日期和时间排序，因此会话的第一条消息将首先显示。


  '
- '# 日期/时间戳


  您需要一个`日期/时间戳`来根据特定时间查找所有记录，并计算完整的会话时长。


  在将对象存储到 BigQuery 之前，您可以设置自己的`日期/时间戳`。确保其格式符合数据仓库的预期格式：


  ```javascript

  const timestamp = new Date().getTime()/1000;

  ```


  每个日期和时间戳应与会话 ID 及其他指标一起存储到 BigQuery 中。这样，您可以轻松运行一个 SQL 查询，该查询将返回聊天消息表中日期时间在 8 月
  1 日到 8 月 10 日之间的所有内容，并按日期时间降序排列，使最新的记录排在最前面：


  ```sql

  SELECT * FROM `chat_msg_table` WHERE DATETIME > ''2020-08-01 10:00:00'' AND POSTED
  < ''2020-08-10 00:00:00'' ORDER BY DATETIME DESC

  ```


  '
- '# 情感分数


  您可以使用情感分数来根据特定情感查找所有记录。例如，您可能对本周最“负面”的聊天记录感兴趣，以了解客户不满的原因。


  像 Dialogflow 这样的工具可以为某些语言启用情感分析。但是，当您想对“荷兰语”等不支持的语言使用情感分析时，您必须首先翻译用户的话语。


  您可以使用以下工具来实现这一点：


  - Cloud Translate

  - Cloud Natural Language


  ```javascript

  const sentiment_score: queryTextSentiment.score;

  const sentiment_magnitude: queryTextSentiment.magnitude;

  ```


  文档情感的`分数`表示文档的整体情绪。文档情感的`幅度`表示文档中存在的情感内容量，该值通常与文档长度成正比。


  每个情感分数应与会话 ID 及其他指标一起存储在数据仓库中。这样，您可以轻松运行一个 SQL 查询，该查询将返回聊天消息表中情感分数为负（低于 0）的所有内容，并按情感分数升序排列，从最差到最好：


  ```sql

  SELECT * FROM `chat_msg_table` WHERE SENTIMENT_SCORE < 0 ORDER BY SENTIMENT_SCORE
  ASC

  ```


  ## 提示


  如何处理讽刺？事实上，讽刺有时连人类都难以理解。不过，我们在 Google Cloud 中确实有工具可以使用自定义情感来构建模型。考虑一下这样的用户话语：“耶！《超越善恶》游戏又延期了！干得漂亮！”Google
  Cloud 的内置情感分析可能会因为“耶！”和“干得漂亮！”这些词而检测到这是非常积极的。甚至可能给出 90%（0.9）的情感分数。


  然而，我们希望将其归类为非常负面，因为这里讨论的是游戏延期，这并不有趣，所以我们期望得到一个负面的情感分数。了解您可以使用 Google Cloud 中的 AutoML
  Natural Language 训练自己的情感模型是很有用的。它有一个功能：情感分析。该模型检查文档并识别其中占主导地位的情感观点，特别是确定作者的态度是积极、消极还是中性。


  '
- '# 语言和关键词


  您可以使用对话`语言`来查找特定语言的所有记录。例如，您可能想根据语言查找记录。也许您还想将其与某个`关键词`结合使用。


  在 Dialogflow 中，您可以从 `detectIntentResponse` 的 `queryResult` 中检索 `languageCode`：


  ```javascript

  queryResult.languageCode

  ```


  您不需要单独存储关键词；您可以从用户话语中检索它们。在本节后面，我们将讨论主题挖掘。通过这种技术，您可以将关键词存储在单独的 BigQuery 列中。


  每个语言指标应与会话 ID、用户话语及其他指标一起存储在数据仓库中。这样，您可以轻松运行一个 SQL 查询，该查询将返回聊天消息表中语言代码等于“NL”且您要查找的词是“fraud”的所有内容。


  ```sql

  SELECT * FROM `chat_msg_table` WHERE LANGUAGE = "en-us" AND USER_UTTERANCE LIKE
  ''%my keyword%''

  ```


  '
- '# 平台


  您可以使用`平台`设置来查找特定平台的所有记录。例如，您可能想查找 Google Assistant 上的最新对话。


  您需要根据所使用的实现自行设置平台指标。某些实现可能有自己的设置，例如 Google Assistant 具有针对每个设备表面的配置：Surface Capabilities。


  当您使用集成了聊天的自定义 Web 界面时，您需要自行设置平台名称。


  ```javascript

  const platform = ''web'';

  ```


  每个平台指标应与会话 ID 及其他指标一起存储到 BigQuery 中。这样，您可以轻松运行一个 SQL 查询，该查询将返回聊天消息表中平台等于“web”的所有内容：


  ```sql

  SELECT * FROM `chat_msg_table` WHERE PLATFORM = "web"

  ```


  '
- "# 意图检测\n\n当 Dialogflow 检测到您的意图时，它可能包含各种有价值的信息，您也希望将这些信息存储在数据仓库中。例如，这将帮助您在记录中判断机器人是否返回了错误的答案。\n\
  \n您可能想要存储以下数据点：`检测到的意图名称`、`置信度阈值`（Dialogflow 进行意图匹配所依据的置信水平）、是否为`回退意图`，以及是否为`交互结束`（用于检测流程是否结束）。\n\
  \n在 Dialogflow 中，您可以从 `detectIntentResponse` 的 `queryResult.intent` 中检索检测到的意图名称：\n\
  \n```javascript\nqueryResult.intent.displayName\n```\n\n在 Dialogflow 中，您可以从 `detectIntentResponse`\
  \ 的 `queryResult.intent` 中检索一个布尔值，判断是否为回退意图：\n\n```javascript\nqueryResult.intent.isFallback\n\
  ```\n\n在 Dialogflow 中，您可以从 `detectIntentResponse` 的 `queryResult.intent` 中检索一个布尔值，判断是否为交互结束：\n\
  \n```javascript\nqueryResult.intent.endInteraction\n```\n\n在 Dialogflow 中，您可以从 `detectIntentResponse`\
  \ 的 `queryResult` 中检索置信度阈值。\n\n\n\n`queryResult.intentDetectionConfidence`\n\n##\
  \ 解决方案\n\n在本节中，我将介绍三种收集指标的流行解决方案。\n\n### 构建用于捕获对话相关指标并编辑敏感信息的平台\n\n要构建用于捕获对话相关指标的解决方案，您需要使用以下\
  \ Google Cloud 服务：\n\n- `Dialogflow Essentials`（按需付费层级）\n- `BigQuery`\n- `Pub/Sub`（消息传递通道）\n\
  - `DLP API`（用于在存储数据前编辑信息）\n- `Cloud Functions`（将在事件触发时执行的代码）\n\n让我们看一下如图 13-1 所示的架构。\n\
  \n当客户在聊天机器人中输入文本或与语音代理对话时，`Dialogflow` 代理会匹配答案（使用 `detectIntent` 方法）。这包括用户话语、`Dialogflow`\
  \ 响应、匹配的意图等信息，但更关键的是还包括会话 ID。我们可以实时将数据推送到消息传递通道（`Pub/Sub`），以便其他软件组件可以注册并监听传入的数据（通过基于事件的\
  \ `Cloud Function`）。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig1_HTML.jpg](img/506047_1_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** 使用 `Pub/Sub` 架构创建数据管道（第 1 部分）\n\n云函数订阅了 `Pub/Sub` 通道。请注意图 13-2；每当有消息传入时，该消息将被传递给\
  \ `DLP API`，以在将数据存储到 `BigQuery` 之前移除敏感信息。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig2_HTML.jpg](img/506047_1_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2** 使用 `Pub/Sub` 架构创建数据管道（第 2 部分）\n\n一旦数据存储在 `BigQuery` 中，您就可以运行查询来获取，例如，导致回退或用户情绪为负面的前\
  \ 10 条用户话语。您还可以运行查询来找出哪个意图最受欢迎。或者，如果您有会话 ID，则可以查询以检索完整的聊天记录。\n\n首先，我们需要启用以下 API。我们可以通过命令行执行此操作：\n\
  \n```\ngcloud services enable bigquery-json.googleapis.com \\\ncloudfunctions.googleapis.com\
  \ \\\ndlp.googleapis.com\n```\n\n之后，我们需要确保拥有正确的权限。我们将运行一个脚本，该脚本可以在 `BigQuery` 中创建数据集和表；我们需要在\
  \ **IAM & Admin** 面板中修改用户权限。转到 **IAM** 页面。找到 `Dialogflow` 使用的 `Dialogflow` 服务帐户。（您可以在\
  \ **Dialogflow** ➤ **设置** ➤ **常规页面**上找到服务帐户（电子邮件地址）。）在 IAM 页面上，编辑 `Dialogflow` 正在使用的服务帐户（见图\
  \ 13-3）。\n\n为您的服务帐户授予以下权限：\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig3_HTML.jpg](img/506047_1_En_13_Fig3_HTML.jpg)\n\
  \n**图 13-3** 为您的 IAM 帐户分配正确的角色\n\n- `BigQuery Data Owner`\n- `BigQuery Job User`\n\
  - `Pub/Sub Admin`\n\n然后，我们需要创建将监听消息传递通道的 `Cloud Function`。点击 **Cloud Functions**\
  \ ➤ **创建函数**。\n\n指定以下设置；将 `[project_id]` 替换为您自己的 Google Cloud 项目 ID，如图 13-4 所示。\n\
  \n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig4_HTML.jpg](img/506047_1_En_13_Fig4_HTML.jpg)\n\
  \n**图 13-4** 在数据管道中准备 `Cloud Function`\n\n- 名称：`chatanalytics`\n- 分配的内存：`256MB`\n\
  - 触发器：`Cloud Pub/Sub`\n- Pub/Sub 主题：`projects/[project_id]/topics/chatbotanalytics`\n\
  - 要执行的函数：`subscribe`\n\n点击环境变量选项卡以添加以下环境变量（见图 13-5）：\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig5_HTML.jpg](img/506047_1_En_13_Fig5_HTML.jpg)\n\
  \n**图 13-5** 在 `Cloud Function` 中设置环境变量\n\n- 环境变量：`GCLOUD_PROJECT - [project_id]`\n\
  \n清单 13-1 显示了用于导入 `BigQuery` 和 `DLP` 库的 `package.json` 内容。\n\n```\n{\n\"name\":\
  \ \"chatanalytics\",\n\"version\": \"1.0.2\",\n\"dependencies\": {\n\"@google-cloud/bigquery\"\
  : \"⁵.0.0\",\n\"@google-cloud/dlp\": \"¹.2.0\"\n}\n}\n```\n\n**清单 13-1** `package.json`\n\
  \n`Cloud Function` 的 `index.js` 代码将如清单 13-2 所示。\n\n```\n//1)\nconst { BigQuery }\
  \ = require('@google-cloud/bigquery');\nconst DLP = require('@google-cloud/dlp');\n\
  //2)\nconst projectId = process.env.GCLOUD_PROJECT;\nconst bqDataSetName = 'chatanalytics'\n\
  const bqTableName = 'chatmessages';\nconst bq = new BigQuery();\nconst dlp = new\
  \ DLP.DlpServiceClient();\n// 使用名为 chatanalytics 的数据集\nconst dataset = bq.dataset(bqDataSetName);\n\
  // 使用名为 chatmessages 的 BigQuery 表\nconst table = dataset.table(bqTableName);\n//3)\n\
  var detectPIIData = async function(text, callback) {\n// 返回匹配所需的最低可能性\nconst minLikelihood\
  \ = 'LIKELIHOOD_UNSPECIFIED';\n//4)\n// 要匹配的信息类型\nconst infoTypes = [\n{name: 'PERSON_NAME'},\n\
  {name: 'FIRST_NAME'},\n{name: 'LAST_NAME'},\n{name: 'MALE_NAME'},\n{name: 'FEMALE_NAME'},\n\
  {name: 'IBAN_CODE'},\n{name: 'IP_ADDRESS'},\n{name: 'LOCATION'},\n{name: 'SWIFT_CODE'},\n\
  {name: 'PASSPORT'},\n{name: 'PHONE_NUMBER'},\n{name: 'NETHERLANDS_BSN_NUMBER'},\n\
  {name: 'NETHERLANDS_PASSPORT'}\n];\n// 构建转换配置，用其信息类型替换敏感信息。\n// 例如，\"Her email is\
  \ xxx@example.com\" => \"Her email is [EMAIL_ADDRESS]\"\nconst replaceWithInfoTypeTransformation\
  \ = {\nprimitiveTransformation: {\nreplaceWithInfoTypeConfig: {},\n},\n};\n// 构建编辑请求\n\
  const request = {\nparent: dlp.projectPath(projectId),\nitem: {\nvalue: text,\n\
  },\ndeidentifyConfig: {\ninfoTypeTransformations: {\ntransformations: [replaceWithInfoTypeTransformation],\n\
  },\n},\ninspectConfig: {\nminLikelihood: minLikelihood,\ninfoTypes: infoTypes,\n\
  },\n};\n// 运行字符串编辑\ntry {\n//5)\nconst [response] = await dlp.deidentifyContent(request);\n\
  const resultString = response.item.value;\nconsole.log(`编辑后的文本: ${resultString}`);\n\
  if (resultString) {\ncallback(resultString);\n} else {\ncallback(text);\n}\n} catch\
  \ (err) {\nconsole.log(`deidentifyContent 中的错误: ${err.message || err}`);\ncallback(text);\n\
  }\n}\n//6)\n//在 BigQuery 中插入行\nvar insertInBq = function(row){\nconsole.log(row);\n\
  table.insert(row, function(err, apiResponse){\nif (!err) {\nconsole.log(\"[BIGQUERY]\
  \ - 已保存。\");\n} else {\nconsole.error(err);\n}\n});\n};\n//7)\nexports.subscribe\
  \ = (data, context) => {\nconst pubSubMessage = data;\nconst buffer = Buffer.from(pubSubMessage.data,\
  \ 'base64').toString();\nvar buf = JSON.parse(buffer);\nvar bqRow = {\nBOT_NAME:\
  \ buf.botName,\nPOSTED: (buf.posted/1000),\nINTENT_RESPONSE: buf.intentResponse.toString(),\n\
  INTENT_NAME: buf.intentName,\nIS_FALLBACK: buf.isFallback,\nIS_END_INTERACTION:\
  \ buf.isEndInteraction,\nCONFIDENCE: buf.confidence,\nPLATFORM: buf.platform,\n\
  SESSION: buf.session,\nSCORE: buf.score,\nMAGNITUDE: buf.magnitude\n};\n//8)\ndetectPIIData(buf.text,\
  \ function(formattedText) {\nbqRow['TEXT'] = formattedText;\ninsertInBq(bqRow);\n\
  });\n};\n```\n\n**清单 13-2** `index.js`\n\n这段代码执行以下操作：\n\n1.  导入 `BigQuery` 和 `DLP`\
  \ 库。\n2.  设置常量以指向数据集和表名。\n3.  `detectPIIData` 方法设置要查找的信息类型，例如护照号码、电话号码或人名。\n4. \
  \ 要查找的信息类型列表。\n5.  实际的 `DLP` 请求 `dlp.deidentifyContent(request)` 以开始编辑。\n\n\n\n\
  6.  `insertInBQ()`方法运行 BigQuery 方法`table.insert()`，该方法会在后台启动一个任务，将一行数据插入数据仓库。\n\n\
  7.  `exports.subscribe = (data, context) => {}`是 Pub/Sub 订阅方法，用于监听传入的消息。它从缓冲区中获取数据，并准备一个可插入\
  \ BigQuery 的对象。\n\n8.  最后一部分是调用`detectPIIData`函数，并将回调链式连接到`insertInBQ`方法。\n\n回顾图\
  \ 13-1 所示的架构，我们需要一个与 Dialogflow SDK 集成的后端脚本。在代码清单 13-3 中，你将看到完整的后端脚本：`app.js`。\n\
  \n```javascript\n//1)\nconst analytics = require('../back-end/analytics');\nconst\
  \ structJson = require('../back-end/structToJson');\nconst projectId = process.env.npm_config_PROJECT_ID;\n\
  const port = ( process.env.npm_config_PORT || 3000 );\nconst languageCode = (process.env.npm_config_LANGUAGE\
  \ || 'en-US');\nconst socketIo = require('socket.io');\nconst http = require('http');\n\
  const cors = require('cors');\nconst express = require('express');\nconst path =\
  \ require('path');\nconst uuid = require('uuid');\nconst df = require('dialogflow').v2beta1;\n\
  //2)\nconst sessionId = uuid.v4();\nconst app = express();\napp.use(cors());\napp.use(express.static(__dirname\
  \ + '/../ui/'));\napp.get('/', function(req, res) {\nres.sendFile(path.join(__dirname\
  \ + '/../ui/index.html'));\n});\nserver = http.createServer(app);\nio = socketIo(server);\n\
  server.listen(port, () => {\nconsole.log('Running server on port %s', port);\n});\n\
  io.on('connect', (client) => {\nconsole.log(`Client connected [id=${client.id}]`);\n\
  client.emit('server_setup', `Server connected [id=${client.id}]`);\nclient.on('welcome',\
  \ async function() {\nconst welcomeResults = await detectIntentByEventName('welcome');\n\
  client.emit('returnResults', welcomeResults);\n});\n//3)\nclient.on('message', async\
  \ function(msg) {\nconst results = await detectIntent(msg);\nconst result = results[0].queryResult;\n\
  const timestamp = new Date().getTime();\nconst platform = \"web\";\nconst botName\
  \ = \"agent\";\nvar messages = [];\nif(result.fulfillmentMessages.length > 0) {\n\
  for (let index = 0; index < result.fulfillmentMessages.length; index++) {\nconst\
  \ msg = result.fulfillmentMessages[index];\nif (msg.payload){\nlet data = structJson.structProtoToJson(msg.payload);\n\
  messages.push(data.web);\n} else {\nmessages.push(msg.text.text);\n}\n}\n}\nvar\
  \ obj = {\ntext: result['queryText'],\nposted: timestamp,\nplatform: platform,\n\
  botName: botName,\nintentResponse: messages,\nlanguage: result['languageCode'],\n\
  platforms: result['intent'].defaultResponsePlatforms,\nintentName: result['intent'].displayName,\n\
  isFallback: result['intent'].isFallback,\nisEndInteraction: result['intent'].endInteraction,\n\
  confidence: result['intentDetectionConfidence'],\nsession: sessionPath,\nscore:\
  \ result['sentimentAnalysisResult'].queryTextSentiment.score,\nmagnitude: result['sentimentAnalysisResult'].queryTextSentiment.magnitude\n\
  };\nconsole.log(obj);\ntry {\n//console.log(obj);\nconsole.log(analytics);\nanalytics.pushToChannel(obj);\n\
  } catch (error) {\nconsole.log(error)\n}\nclient.emit('returnResults', results);\n\
  });\n});\n/**\n* Setup Dialogflow Integration\n*/\nfunction setupDialogflow(){\n\
  sessionClient = new df.SessionsClient();\nsessionPath = sessionClient.sessionPath(projectId,\
  \ sessionId);\nrequest = {\nsession: sessionPath,\nqueryInput: {}\n}\n}\n/*\n* Dialogflow\
  \ Detect Intent based on Text\n* @param text - string\n* @return response promise\n\
  */\nasync function detectIntent(text){\nrequest.queryInput.text =  {\nlanguageCode:\
  \ languageCode,\ntext: text\n};\nconsole.log(request);\nconst responses = await\
  \ sessionClient.detectIntent(request);\nreturn responses;\n}\n/*\n* Dialogflow Detect\
  \ Intent based on an Event\n* @param eventName - string\n* @return response promise\n\
  */\nasync function detectIntentByEventName(eventName){\nrequest.queryInput.event\
  \ =  {\nlanguageCode: languageCode,\nname: eventName\n};\nconst responses = await\
  \ sessionClient.detectIntent(request);\n//remove the event, so the welcome event\
  \ wont be triggered again\ndelete request.queryInput.event;\nreturn responses;\n\
  }\n//Run this code.\nsetupDialogflow();\nListing 13-3\napp.js\n```\n\n让我解释一下代码清单\
  \ 13-3 的功能。首先，它引入了分析脚本（稍后我们会深入探讨）和一个用于将 protobuf 转换为 JSON 的转换器脚本。\n\n```javascript\n\
  //1)\nconst analytics = require('../back-end/analytics');\nconst structJson = require('../back-end/structToJson');\n\
  ```\n\n`sessionId`应为一个全局常量变量，它将从一个名为`uuid`的 npm 包中获取生成的唯一标识符：\n\n```javascript\n\
  //2)\nconst sessionId = uuid.v4();\n```\n\n神奇之处始于注释`//3`处的`client.on('message',\
  \ async function(msg) { })`监听器。\n\n这部分会遍历所有 Dialogflow 结果，并将其添加到一个新对象中，使云函数更容易收集数据。然后，它通过传入该对象来调用分析脚本：\n\
  \n```javascript\nanalytics.pushToChannel(obj);\n```\n\n我们使用的分析脚本可以在代码清单 13-4 中找到。该脚本会将对象写入\
  \ BigQuery。\n\n1.  首先，引入 BigQuery 和 Pub/Sub 库。\n2.  实例化 PubSub 和 BigQuery 对象。\n\
  3.  设置常量。这些名称应与`cloudfunctions/index.js`中设置的名称保持一致。\n4.  创建 BigQuery SQL 模式以存储所有数据。\n\
  5.  从这里开始定义自定义的 Analytics 类。\n6.  在构造函数中，我们将在首次启动此脚本时设置 BigQuery 和 PubSub。\n7. \
  \ `setupBigQuery`方法会创建数据集（如果不存在），并创建表（如果不存在）。它将采用预定义的 SQL 模式。\n8.  `setupPubSub`方法会创建一个\
  \ Pub/Sub 主题；云函数将订阅此主题。每当 Pub/Sub 有订阅（在我们的场景中即收到新的聊天消息）时，云函数就会运行。\n9.  `queryBQ(SQL)`方法会执行\
  \ BigQuery 查询。如果你正在构建自己的仪表板（例如，显示最消极的聊天机器人消息前十名），可能会用到此方法。本演示未使用自定义仪表板，而是直接在 BigQuery\
  \ 控制台中运行查询。此类仪表板可以在 Web 应用中构建，或使用 Google Data Studio 实现。\n10. `pushToChannel()`方法接收\
  \ Dialogflow 结果对象，并将其推送到 PubSub 订阅。我们已在`app.js`文件中调用了此方法。\n\n\n\n```javascript\n\
  //1)\nconst { BigQuery } = require('@google-cloud/bigquery');\nconst { PubSub }\
  \ = require('@google-cloud/pubsub');\n//2)\nconst pubsub = new PubSub({\nprojectId:\
  \ process.env.npm_config_PROJECT_ID\n});\nconst bigquery = new BigQuery({\nprojectId:\
  \ process.env.npm_config_PROJECT_ID\n});\n//3)\nconst id = process.env.npm_config_PROJECT_ID;\n\
  const dataLocation = 'US';\nconst datasetChatMessages = 'chatanalytics';\nconst\
  \ tableChatMessages = 'chatmessages';\nconst topicChatbotMessages = 'chatbotanalytics';\n\
  //4)\n// tslint:disable-next-line:no-suspicious-comment\nconst schemaChatMessages\
  \ = `BOT_NAME,TEXT,POSTED:TIMESTAMP,SCORE:FLOAT,\nMAGNITUDE:FLOAT,INTENT_RESPONSE,INTENT_NAME,CONFIDENCE:FLOAT,\n\
  IS_FALLBACK:BOOLEAN,IS_END_INTERACTION:BOOLEAN,PLATFORM,SESSION`;\n//5)\n/**\n*\
  \ 用于在 BigQuery 中存储聊天机器人分析数据的分析类。\n*/\nclass Analytics {\n//6)\nconstructor() {\n\
  this.setupBigQuery(datasetChatMessages,\ntableChatMessages, dataLocation, schemaChatMessages);\n\
  this.setupPubSub(topicChatbotMessages);\n}\n//7)\n/**\n* 如果数据集不存在，则创建一个。\n* 如果表不存在，则创建一个。\n\
  * @param {string} bqDataSetName BQ 数据集名称\n* @param {string} bqTableName BQ 表名称\n\
  * @param {string} bqLocation BQ 数据位置\n* @param {string} schema BQ 表模式\n*/\nsetupBigQuery(bqDataSetName,\
  \ bqTableName, bqLocation, schema) {\nconst dataset = bigquery.dataset(bqDataSetName);\n\
  const table = dataset.table(bqTableName);\ndataset.exists(function(err, exists)\
  \ {\nif (err) console.error('ERROR', err);\nif (!exists) {\ndataset.create({\nid:\
  \ bqDataSetName,\nlocation: bqLocation\n}).then(function() {\nconsole.log(\"dataset\
  \ created\");\n// 如果表不存在，我们就创建它。\n// 注意我们将传入的模式。\ntable.exists(function(err, exists)\
  \ {\nif (!exists) {\ntable.create({\nid: bqTableName,\nschema: schema\n}).then(function()\
  \ {\nconsole.log(\"table created\");\n});\n} else {\nconsole.error('ERROR', err);\n\
  }\n});\n});\n}\n});\ntable.exists(function(err, exists) {\nif (err) console.error('ERROR',\
  \ err);\nif (!exists) {\ntable.create({\nid: bqTableName,\nschema: schema\n}).then(function()\
  \ {\nconsole.log(\"table created\");\n});\n}\n});\n}\n//8)\n/**\n* 如果主题尚未创建，请创建。\n\
  * @param {string} topicName PubSub 主题名称\n*/\nsetupPubSub(topicName) {\nconst topic\
  \ = pubsub.topic(`projects/${id}/topics/${topicName}`);\ntopic.exists((err, exists)\
  \ => {\nif (err) console.error('ERROR', err);\nif (!exists) {\npubsub.createTopic(topicName).then(results\
  \ => {\nconsole.log(results);\nconsole.log(`Topic ${topicName} created.`);\n})\n\
  .catch(err => {\nconsole.error('ERROR:', err);\n});\n}\n});\n}\n//9)\n/**\n* 在 BigQuery\
  \ 中执行查询\n* @param {string} sql SQL 查询\n* @return {Promise}\n*/\nqueryBQ(sql) {\n\
  return new Promise(function(resolve, reject) {\nif (sql) {\nbigquery.query(sql).then(function(data)\
  \ {\nresolve(data);\n});\n} else {\nreject(\"ERROR: Missing SQL\");\n}\n});\n}\n\
  //10)\n/**\n* 推送到 PubSub 频道\n* @param {object} json JSON 对象\n* @return {Promise}\n\
  */\nasync pushToChannel(json) {\nconst topic = pubsub.topic(`projects/${id}/topics/${topicChatbotMessages}`);\n\
  let dataBuffer = Buffer.from(JSON.stringify(json), 'utf-8');\ntry {\nconst messageId\
  \ = await topic.publish(dataBuffer);\nconsole.log(`Message ${messageId} published\
  \ to topic: ${topicChatbotMessages}`);\n} catch(error) {\nconsole.log(error)\n}\n\
  }\n}\nmodule.exports = analytics = new Analytics();\n清单 13-4\nanalytics.js\n```\n\
  \n为了测试我们是否以正确的方式收集了所有数据，在网站中创建 UI 仪表板之前，我们可以先在 BigQuery 中自行测试。转到 BigQuery：[`https://console.cloud.google.com/bigquery`](https://console.cloud.google.com/bigquery)。点击（在资源下方）**项目**\
  \ ➤ **chatanalytics** ➤ **chatmessages**。点击**预览**，然后从某个预览行中复制一个会话 ID，稍后可在 SQL 查询中使用。\n\
  \n使用此查询来查询记录，并将 `[project_id]` 替换为你的 Google Cloud 项目 ID，将 `[session_id]` 替换为存储在\
  \ BigQuery 表中的会话 ID。请注意图 13-6。\n\n```\nSELECT * FROM `[project_id].chatanalytics.chatmessages`\
  \ WHERE SESSION='[session_id]' ORDER BY POSTED LIMIT\n```\n\n你可以在我的 GitHub 仓库中运行这些示例来体验一下。\n\
  \n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig6_HTML.png](img/506047_1_En_13_Fig6_HTML.png)\n\
  \n图 13-6 在 BigQuery 中捕获数据\n\n## 检测用户情感\n\n你可能希望检测情感，以判断用户与你的智能体交互体验是好是坏。\n\n要构建一个用于检测情感的解决方案，你需要以下\
  \ Google Cloud 服务：\n\n*   Dialogflow（按需付费层级）\n*   （可选）Cloud Translation API\n* \
  \  （可选）Cloud Natural Language API\n\n情感分析会检查用户输入，并将用户的态度判定为正面、负面或中性。在发出检测意图请求时，你可以指定执行情感分析，响应将包含情感分析值。当返回非常负面的情感时，或许可以考虑将不满意的用户转接给人工客服。\n\
  \n> **注意**  \n> 此功能目前仅适用于 Dialogflow Essentials 按需付费版本的用户。\n\n情感分析仅支持以下语言：\n\n*\
  \   中文（简体与繁体）\n*   英语\n*   法语\n*   德语\n*   意大利语\n*   日语\n*   韩语\n*   葡萄牙语\n*   西班牙语\n\
  \n在底层，Dialogflow 使用 Natural Language API 来执行此分析。\n\n要为所有查询启用情感分析：\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig7_HTML.png](img/506047_1_En_13_Fig7_HTML.png)\n\
  \n图 13-7 在 Dialogflow 中启用情感分析\n\n1.  点击智能体名称旁边的**设置**按钮。\n2.  选择**高级**选项卡（见图 13-7）。\n\
  3.  为当前查询打开**启用情感分析**开关。\n\n你可以通过 Dialogflow 模拟器与智能体交互并接收情感分析结果。输入“Thank you for\
  \ helping me.”\n\n查看模拟器底部的“情感”部分。它应该会显示一个正面情感分数 0.9，如图 13-8 所示。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig8_HTML.jpg](img/506047_1_En_13_Fig8_HTML.jpg)\n\
  \n图 13-8 模拟器中的正面情感分数\n\n接下来，在模拟器中输入“It didn’t work at all.”\n\n查看模拟器底部的“情感”部分。它应该会显示一个负面情感分数\
  \ –0.8，如图 13-9 所示。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig9_HTML.jpg](img/506047_1_En_13_Fig9_HTML.jpg)\n\
  \n图 13-9 模拟器中的负面情感分数\n\n如果你希望为聊天机器人提供情感分析，但 Dialogflow 不支持该特定语言的情感分析（实际上，该语言不受 Google\
  \ Cloud Natural Language API 支持），那么你可以通过并行调用 Translate API 来构建自定义解决方案，以使用 Google\
  \ Cloud NLP API 手动检测情感。这种方法对于需要支持比 Dialogflow 支持的语言更多的聊天机器人用例，或者对于记录用户使用多种语言对话的用例，也很有用。\n\
  \n尽管使用机器学习 API 提供的翻译服务可能返回并非 100% 正确翻译的结果，但对于情感分析而言，这种方法通常效果不错。是的，将消息翻译成另一种语言会丢失一些信息，但通常你仍然可以判断消息是正面的还是负面的。图\
  \ 13-10 展示了这种架构可能的样子。\n\n\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig10_HTML.jpg](img/506047_1_En_13_Fig10_HTML.jpg)\n\
  \n**图 13-10** 自定义情感检测架构\n\n## 主题挖掘\n\n另一种流行的解决方案是主题挖掘。其思路是从每次对话中收集通用的关键词/主题。例如，用户是在谈论“购买电子游戏”、“攻略”还是“发布日期”？一旦将其存储在\
  \ `BigQuery` 的单独列中，你就可以查询所有关于“购买电子游戏”且情感倾向积极的最新对话。\n\n要构建主题挖掘解决方案，你需要以下 Google Cloud\
  \ 服务：\n\n- `BigQuery`\n- `AutoML Natural Language`\n\nGoogle Cloud 有一个可用于主题挖掘的工具，名为\
  \ `AutoML Natural Language`。其工作原理是通过上传大量已标记的数据（例如，“购买电子游戏”、“攻略”、“发布日期”或“其他”）来训练你自己的自定义\
  \ NLP 模型。该工具会自行训练并返回一个机器学习模型，该模型可通过 API 调用。一旦此 API 准备就绪，你就可以请求获取主题，并将其与对话内容一同存储在\
  \ `BigQuery` 中。\n\n## 收集客户评分指标\n\n上一节可以回答你关于客户说了什么、何时说以及在哪说的所有问题。本节则聚焦于客户**认为**什么，即收集评分和意见。通常，你会通过调查问卷向最终用户询问这些信息。与其在客户与品牌互动后发送邮件，不如直接在聊天会话中提出这类问题。这样，你可能会收到更多回复（尽管答案可能更极端）。\n\
  \n> **注意**\n> 请注意，回复有时可能会有些偏差。通常，当你收集关于（虚拟）助手帮助效果的反馈时，人们也可能对解决方案感到不满。例如，当有人就前一天刚结束的折扣活动联系你的客服时，他可能会对与你的聊天（机器人）体验给出低分。这并不能说明聊天机器人的表现如何。此外，不满的人可能会给出更极端的评分，而对服务满意的人甚至可能不回复调查。这就是为什么使用机器学习工具收集情感分数可能比评分指标更有效的原因。\n\
  \n以下是你可以包含的三个指标。\n\n### 净推荐值 (NPS)\n\n净推荐值是一种用于计算客户忠诚度的管理评分。它基于对单一问题的回答来计算：*您向朋友或同事推荐我们公司/产品/服务的可能性有多大？*\
  \ 在结束 `Dialogflow` 中的流程/会话之前，你可以创建这个后续问题。该答案的评分通常基于 0 到 10 的等级。你可以将其存储在 `BigQuery`\
  \ 中。\n\n评分在 9 到 10 之间的回答者被称为**推荐者**，他们被认为更有可能表现出创造价值的行为，例如购买更多产品、保持更长的客户关系以及向其他潜在客户进行更积极的推荐。评分在\
  \ 0 到 6 之间的回答者被标记为**贬损者**，他们被认为不太可能表现出创造价值的行为。评分在 7 和 8 之间的回答者被标记为**被动者**，其行为介于推荐者和贬损者之间。NPS\
  \ 的计算方式如下：\n\n- **NPS = 推荐者百分比 – 贬损者百分比**\n\n结果不是百分比，而只是一个分数。例如，10% – 60% = –50\
  \ NPS。需要根据行业来判断该分数是高于还是低于平均水平。\n\n> **注意**\n> 在联络中心，通话结束后会发送一份调查问卷。问卷包含关于客户整体体验的问题。如果引入虚拟助手后\
  \ NPS 上升，仍然很难量化其影响，因为这是联络中心内实施的众多举措累积效应的结果。\n\n### 客户满意度 (CSAT)\n\n客户满意度评分 (CSAT)\
  \ 是衡量客户对品牌产品和服务满意度的基本指标。它通常基于客户在对话或工单解决后、结束 `Dialogflow` 会话前填写的一份简短调查问卷。该调查问卷形式多样，但其核心是要求客户按照从好/极好到差的等级来评价他们的体验。\n\
  \n例如，你可以问：“您如何评价与我们的互动体验？” 随后提供一个从 1 到 5 的等级，其中 1 表示非常差，5 表示非常好。CSAT 的计算方式如下：\n\n\
  - **CSAT = 投票为 4 或 5 的积极回复数量 / 总回复数量 × 100%**\n\nCSAT 与 NPS 不同，因为 CSAT 衡量的是客户对产品或服务的满意度，而\
  \ NPS 衡量的是客户对组织的忠诚度。\n\n### 客户努力度评分 (CES)\n\n客户努力度评分 (CES) 是一种衡量用户对产品或服务体验的客户服务指标。客户按照从“非常困难”到“非常容易”的七点等级来评价他们的体验。例如，在结束\
  \ `Dialogflow` 中的流程/会话之前，你可以创建这个后续问题：“在 1 到 7 的等级中，1 表示非常困难，7 表示非常容易，您购买这款电子游戏花费了多少精力？”\
  \ 你可以将该值存储在 `BigQuery` 中。\n\nCES 的计算方式如下：\n\n- **CES = 投票为 5、6 或 7 的用户总数 / 所有用户总数\
  \ × 100%**\n\n客户努力度评分没有明确的行业标准。然而，客户努力度评分是按数字等级记录的，因此较高的分数代表更好的用户体验。对于标准的七点等级，5\
  \ 分或以上的回复被认为是良好分数。\n\n## 使用 Dialogflow、Chatbase 或 Actions on Google 监控聊天会话和漏斗指标\n\
  \n**漏斗** 是最终用户在达成转化之前需要经历的一系列步骤。想想网店的漏斗。访客在购买产品之前需要经历几个步骤。他们必须访问网店、浏览所有产品、将产品加入购物车等等。谈到聊天机器人时，聊天漏斗可以是在结束流程或完整聊天会话之前的步骤/轮次。\n\
  \n**会话** 代表用户每次与你的助手交互。无论是完整对话还是不完整对话（用户停止回复），都会被记录并计入与会话相关的指标。\n\n**会话流程** 是一种可视化图表，映射了用户通过你的机器人的最常见旅程。\n\
  \n### 需要监控的指标\n\n以下是一些你可能想要监控的、特定于聊天漏斗和会话流程的指标。\n\n#### 总使用量\n\n有多少人使用了你的虚拟助手？\n\
  \n#### 匹配意图的用户百分比\n\n假设你是一家保险公司，在你的网站上有一个语音虚拟助手或聊天机器人。这个聊天机器人的主要功能是帮助填写申报表。它也可以回答关于保险公司的其他一般性问题。你可能会关注有多少人与你的虚拟助手互动，以及其中有多少人进入了“申报”会话流程并触发了正确的意图。\n\
  \n#### 完成率\n\n考虑前面保险公司的用例。你的用户进入了“申报”会话流程。你可能会想知道他们是否完成了整个流程。**完成率** 是指完成整个流程（包括所有后续问题）的最终用户的百分比。\n\
  \n\n\n"
- '# 流失率/流失节点


  当最终用户未能完成流程时，您需要找出他们在哪个环节流失（**流失节点**）以及流失用户所占的百分比（**流失率**）。这能为您提供关于虚拟客服的一些信息。是回答问题的方向有误，还是虚拟客服未能正确接收传入的问题？这需要进一步调查！


  '
- '# 需监控的特定渠道指标


  以下指标特定于您所集成的渠道。例如，当您将聊天机器人接入 Google Assistant 时，Google Assistant 操作系统能准确了解您打开该操作的频率以及打开前的操作。对于网站而言，当用户在
  Google 搜索引擎中搜索您的页面后与您的聊天机器人互动时，这类信息可以从 Google Search Console 中获取。


  '
- "# 用户留存\n\n**留存**是指让您的用户养成使用您产品的习惯。因此，在这个阶段我们称他们为**用户**。如果您能留住他们，就意味着他们确实在频繁使用您的产品。用户留存信息可以在\
  \ Google Analytics、Google Search Console 或 Actions on Google 控制台中找到。\n\n> **注意**\
  \  \n> 当您想尝试语音交互并为您的品牌开发 Google Assistant 操作时，请考虑用户留存。可以想象，处理保险理赔的语音操作，其使用频率远低于零售商用于将杂货添加到购物车的\
  \ Google Assistant 操作。您使用杂货店操作的频率会高得多。\n\n"
- '# 端点健康状态


  例如，当您集成 Web 服务或数据库来获取信息，但服务器返回错误或响应速度极慢时，这可能会导致您的虚拟客服崩溃，或至少带来不佳的用户体验。端点健康信息可以在您的网站日志中找到；当您的聊天机器人部署在
  Google Cloud 中时，可以在 Cloud Logging（原 Stackdriver）中找到；当您的智能客服运行在 Google Assistant
  上时，可以在 Actions on Google 控制台中找到。


  '
- '# 发现渠道


  您的用户是如何找到您的智能客服的？他们又是如何到达的？针对 Google Assistant，您可能想了解用户是如何发现您的 Action 并调用它的。当用户说出与您的
  Action 相关的短语时，即使没有明确指定 Action 的调用名称，Google 有时也会推荐用户尝试您的 Action。对于网站上的聊天机器人，您感兴趣的信息是哪些网站链接到了您的网站，以及您的用户使用了哪些搜索查询。这些信息可以在
  Google Analytics 或 Google Search Console 中找到。


  '
- "# Dialogflow 内置分析\n\nDialogflow 可以直接从“分析”选项卡提供指标。点击 **旧版** ➤ **探索**。此页面显示使用情况和\
  \ NLU 数据的洞察信息。**会话**（图 13-11）代表用户每次与您的智能客服互动。无论是完整对话还是不完整对话（用户停止响应），都会被记录并计入与会话相关的指标。\n\
  \n这将显示最近的总会话数。您可以按“昨天”、“过去 7 天”或“过去 30 天”进行筛选。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig11_HTML.jpg](img/506047_1_En_13_Fig11_HTML.jpg)\n\
  \n**图 13-11** Dialogflow 内置分析\n\n**意图概览**将显示最常用意图的概览。它会显示意图名称、匹配到该意图的会话数、所有会话中该意图被使用的总次数，以及退出百分比，该百分比显示用户在特定意图中离开对话的会话比例（取自匹配到同一意图的总会话数）。\n\
  \n向下滚动，您将看到会话流程（图 13-12）。您可以点击每个意图来展开其后续意图。\n\n您可以将光标悬停在意图名称（蓝色框）上，查看以下信息：\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig12_HTML.jpg](img/506047_1_En_13_Fig12_HTML.jpg)\n\
  \n**图 13-12** Dialogflow 内置分析，会话流程\n\n- 意图名称\n- 匹配到该意图的用户百分比\n- 匹配到该意图的请求数\n- 处于该意图时的流失率\n\
  \n**历史记录**页面（图 13-13）显示了您的智能客服所参与对话的简化版本。您可以点击某个事件或用户表述，查看按时间顺序排列的对话记录。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig13_HTML.jpg](img/506047_1_En_13_Fig13_HTML.jpg)\n\
  \n**图 13-13** Dialogflow 历史记录文本\n\n您可以点击智能客服回复的选项菜单（图 13-14）。这将允许您跳转到 **Cloud Logging**\
  \ 以在 Google Cloud 控制台中进行高级日志记录，或直接浏览到该意图（这在需要修复问题时非常方便）。或者，您也可以查看原始 API 响应。\n\n\
  ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig14_HTML.png](img/506047_1_En_13_Fig14_HTML.png)\n\
  \n**图 13-14** Dialogflow 历史记录文本，跳转到意图\n\n> **注意**  \n> 历史记录页面仅显示默认回复。其他回复，如富媒体消息或\
  \ Actions on Google 的简单回复，则不可见。请看上面的截图。“你的网址是什么？”触发了自定义负载，因此日志中不可见。如果您也想捕获这些内容，则必须手动构建日志记录解决方案，例如使用\
  \ BigQuery。\n\n"
- "# 使用 Chatbase 监控指标\n\n或者，您也可以使用 Google 工具 **Chatbase**（图 13-15）来监控会话和漏斗；它会提供更详细的概览，除了“昨天”、“过去\
  \ 7 天”或“过去 30 天”的筛选条件外，还可以按“今天”或“本季度至今”进行筛选。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig15_HTML.png](img/506047_1_En_13_Fig15_HTML.png)\n\
  \n**图 13-15** Chatbase 中的分析\n\n事实上，Dialogflow 底层使用了 Chatbase。**留存队列**模块将显示用户随时间变化的留存情况。\n\
  \n使用 **会话流程** 标签页查看会话流程（图 13-16）；与在 Dialogflow 中一样，您可以向下钻取以查看每个意图的详细信息：\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig16_HTML.jpg](img/506047_1_En_13_Fig16_HTML.jpg)\n\
  \n**图 13-16** Chatbase 中的会话流程\n\n- 意图名称\n- 匹配到该意图的用户百分比\n- 匹配到该意图的请求数\n- 处于该意图时的流失率\n\
  \nChatbase 有一个漏斗报告工具，它提供了一种通过创建最多包含六个后续意图的自定义工作流来跟踪客户成功的方法。点击 **漏斗** 标签页（图 13-17）。您可以创建一个新的漏斗来记录意图并将其分配到轮次步骤中。创建漏斗后，您将获得更好的漏斗可视化效果，包括流失率以及**完成率**。\n\
  \n\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig17_HTML.jpg](img/506047_1_En_13_Fig17_HTML.jpg)\n\
  \n**图 13-17** Chatbase 漏斗\n\n## Google 操作分析\n\n例如，当你为 Google 助理构建语音机器人时，你也可以监控一些指标。登录你的\
  \ Google 操作控制台。一个额外的好处是，你甚至可以将这些指标导出到 BigQuery，以便在更长时间内捕获这些数据。\n\n点击**分析** ➤ **使用情况**。\n\
  \n**使用情况**页面（图 13-18）显示了三个图表，它们与你的操作随时间变化的使用数据相关。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig18_HTML.jpg](img/506047_1_En_13_Fig18_HTML.jpg)\n\
  \n**图 13-18** Google 操作使用情况\n\n它还可以显示**用户留存**（图 13-19）。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig19_HTML.jpg](img/506047_1_En_13_Fig19_HTML.jpg)\n\
  \n**图 13-19** Google 操作用户留存\n\nGoogle 操作可以向你展示的另一个额外好处（因为它也了解你的 Google 助理集成的洞察）是**健康信息**（图\
  \ 13-20）。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig20_HTML.jpg](img/506047_1_En_13_Fig20_HTML.jpg)\n\
  \n**图 13-20** Google 操作健康信息\n\n- **错误**：你的操作云端点在给定日期返回的错误数量。如果错误数量很大，你可能需要查看日志以确定是什么导致你的端点崩溃或出现意外行为。\n\
  - **操作延迟**：你的操作端点的延迟。如果延迟非常高或经常出现峰值，你的用户在与你的操作交互时可能会遇到延迟。\n- **用户感知延迟**：用户每次请求你的操作时所感受到的延迟。此指标说明了用户在与你的操作交互时的体验。\n\
  \n点击**分析** ➤ **发现**。\n\n发现页面显示了一个表格，列出了哪些短语导致 Google 推荐你的操作（图 13-21）。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig21_HTML.jpg](img/506047_1_En_13_Fig21_HTML.jpg)\n\
  \n**图 13-21** Google 操作分析发现\n\n发现表格中的列如下：\n\n- **调用**：导致 Google 推荐你的操作的用户查询。除了实际的用户查询外，此列表还包括以下值：\n\
  \  - `BUILT_IN_INTENT`：此条目表示你的操作是通过内置意图调用的。\n  - `AUTO_MATCHED_BY_GOOGLE`：此条目表示使用了隐式调用。\n\
  \  - `ACTION_LINK`：此条目表示你的操作是通过操作链接调用的。\n- **意图**：用户查询匹配到的意图。\n- **展示次数**：此短语导致\
  \ Google 推荐你的操作的次数。\n- **选择次数**：用户在 Google 推荐后调用你的操作的次数。此数字不能超过此短语的展示次数。\n- **选择率**：导致选择的展示次数的百分比。低百分比表示许多用户选择为此特定查询使用其他操作，而高百分比则表示你的操作在此查询中很受欢迎。\n\
  \n## 捕获聊天机器人模型健康指标以测试底层 NLU 模型质量\n\n对话指标和聊天漏斗指标侧重于从最终用户收集数据以监控和改善体验，而机器人模型指标则侧重于机器人构建过程，并可能使用测试验证数据（基于实时数据）来提高底层\
  \ NLU 模型的质量。\n\n像 Dialogflow 这样的现代聊天机器人/虚拟助手构建工具利用了机器学习。对于每个虚拟代理，作为 UX 设计师（代理建模者）或开发人员，你可以定义许多意图。**意图**对用户的意图进行分类。你组合的意图可以处理完整的对话。这将训练一个底层的机器学习模型。\n\
  \n当最终用户在聊天机器人或虚拟助手中输入或说出某些内容时，我们称之为**用户表达**或**话语**。Dialogflow 根据内置的 NLU（自然语言理解）以及底层机器学习模型所训练的示例短语，将表达与机器人构建器中匹配度最高的意图进行匹配。匹配意图也称为**意图分类**或**意图匹配**。\n\
  \n一旦你构建了虚拟代理，最重要的问题就出现了：你的虚拟代理在底层使用的机器学习模型有多好？\n\n你可以使用一系列指标来测试虚拟代理的质量。\n\n通常，在使用测试数据时，UX\
  \ 设计师或内容作者会创建一个验证数据集。他们通过将其作为用户短语输入来训练 Dialogflow 代理模型。为了创建无偏见的测试数据集，请使用来自聊天/联络中心/虚拟助手的日志，并将其与用于训练模型的意图训练短语分开。当用户数据包含敏感的\
  \ PII 数据时，你应该对其进行匿名化或脱敏处理。\n\n如你所见，这些是测试底层机器学习模型的绝佳指标。一旦你将所有这些变量存储在数据仓库中，就可以轻松创建仪表板来预览这些洞察。开发人员可以创建单元测试，将验证数据作为用户话语传入，并针对机器人构建器\
  \ API（在 Dialogflow 中，这将是 `detectIntent()` 方法）进行测试。检测到的意图和置信度分数可以与你的验证数据集进行评估。\n\n\
  ### 真正例——正确匹配的意图\n\n真正例是指聊天机器人正确检测到正确（正）意图的结果。例如，当你的虚拟代理有一个名为“薪资意图”的意图，并且它使用训练短语进行训练：\n\
  \n“我的工资到账了吗？”\n\n而用户的话语是\n\n“我收到工资了吗？”\n\nDialogflow 应检测到以下意图：“薪资意图”。\n\n我可以编写一个单元测试，类似于你在软件工程中编写单元测试的方式。我可以针对之前的场景创建测试数据，用户话语为：“我的工资，什么时候能收到？”我期望它是薪资意图。你可以使用\
  \ Dialogflow API，Dialogflow 也会检测到薪资意图。所以这是一个真正例。匹配是正确的。\n\n你可以将其存储在 BigQuery 中，这样每次通过\
  \ Dialogflow API 对你的代理进行更改时，都可以重新运行该场景。你需要收集的数据字段包括“用户话语”、“预期意图名称”、“检测到的意图名称”和“结果”，即\
  \ TP。\n\n\n\n"
- '# 真负例——不支持的请求


  **真负例**是指聊天机器人正确地将用户话语映射到回退意图的结果。当用户提出机器人设计范围之外的问题时，就会发生不支持的请求错误。但机器人不会返回错误答案或系统错误，而是返回一条友好的回退消息。


  例如，当你的虚拟助手有一个名为`Global fallback`的意图，该意图在无法匹配任何意图时被激活。我可以针对上述场景创建测试数据，用户话语为：`Can
  I buy casino tokens?` 这是一个银行聊天机器人，而不是赌场聊天机器人。我期望它匹配`Global fallback`意图，而 Dialogflow
  也确实返回了`Global fallback`意图。因此，这是一个真负例。它的行为完全符合设计预期。


  你可以将类似上述的测试用例存储在你的数据仓库中，这样每次通过 Dialogflow API 对智能助手进行更改时，都可以重新运行该场景。你需要收集的数据字段包括`用户话语`、`预期意图名称`、`检测到的意图名称`以及`结果`，即`TN`。


  '
- '# 假正例——被误解的请求


  **假正例**是指聊天机器人匹配了错误意图的结果。它本应匹配另一个意图，或者如果该意图不存在，则应匹配回退意图，但由于它误解了用户话语，导致结果错误。当你的机器人无法确定正确的用户意图时，就会发生被误解的请求错误。这种错误可能是由于机器人未考虑问题的上下文，或者回答了与所提问题略有不同的问题所致。


  例如，当你的虚拟助手有一个名为`Block credit card`的意图，并且它使用训练短语`I want to block my credit card.`进行训练。你的虚拟助手还有另一个名为`Renew
  credit card`的意图，并使用训练短语`I want to renew my credit card.`进行训练。我可以针对上述场景创建测试数据，用户话语为：`My
  account is blocked, can I get a new credit card?` 我期望它匹配`Renew credit card`意图；然而，Dialogflow
  检测到了`Block credit card`意图。因此，这是一个假正例。虽然匹配了，但匹配的是错误的意图！


  你可以将类似上述的测试用例存储在 BigQuery 中，这样每次通过 Dialogflow API 对智能助手进行更改时，都可以重新运行该场景。你需要收集的数据字段包括`用户话语`、`预期意图名称`、`检测到的意图名称`以及`结果`，即`FP`。


  '
- '# 假负例——被遗漏的请求


  **假负例**是指意图存在，但聊天机器人未能检测到，从而触发了回退意图的结果。当你的机器人已构建了某个特定意图，但未能识别出替代的措辞或术语时，就会发生被遗漏的请求错误。


  例如，当你的虚拟助手有一个名为`Block credit card`的意图，并且它使用训练短语`I want to block my credit card.`进行训练。我可以针对上述场景创建测试数据，用户话语为：`Stop
  the credit card right now.` 我期望它匹配`Block credit card`意图；然而，虚拟助手检测到了回退意图。因此，这是一个假负例。意图是存在的，但未能匹配上。


  你可以将类似上述的测试用例存储在 BigQuery 中，这样每次通过 Dialogflow API 对智能助手进行更改时，都可以重新运行该场景。你需要收集的数据字段包括`用户话语`、`预期意图名称`、`检测到的意图名称`以及`结果`，即`FN`。


  '
- '# 真阳性率


  **真阳性率（TPR** 或**召回率）** 是一个敏感性比率，用于判断意图定义是否过于狭窄并导致请求被遗漏。当该值高于 0.5 时，可认为表现良好。


  - `TPR = 总 TP / (总 TP + 总 FN)`


  '
- '# 假阳性率


  **假阳性率（FPR** 或**误报率）** 是一个误报比率。假阳性率的计算方式是：聊天机器人匹配到错误意图的负例事件数量（假正例）与实际负例事件总数（无论分类如何）之间的比率。


  - `FPR = 总 FP / (总 FP + 总 TN)`


  你可以将类似上述的测试用例存储在 BigQuery 中，这样每次对智能助手进行更改时，都可以重新运行该场景。你需要从数据仓库中请求总的`TP`、`FP`、`FN`和`TN`。并且你需要存储`TPR`和`FPR`，以便日后在报告中检索这些数据。


  '
- '# ROC 曲线


  **ROC（接收者操作特征）曲线**是一种图形化表示，它告诉我们模型在根据检测概率区分给定意图方面的表现如何。利用这些信息，你可以决定如何设置 Dialogflow
  智能助手的置信度阈值，以定义意图匹配所需的分类分数。


  你需要计算**真阳性率**和**假阳性率**，以便在图表中绘制。你需要基于各种 Dialogflow ML 设置阈值来完成此操作。


  例如，我们在 Dialogflow 中将置信度阈值设置为 0.80，这将用户话语映射为两种选项：匹配意图或无意图匹配。我们假设任何大于或等于 0.80 的概率都视为意图匹配，否则视为回退。


  **ROC 曲线**绘制了两个参数：


  - 真阳性率（召回率/敏感性比率）

  - 假阳性率（误报率/误警比率）


  图 13-22 中的蓝色对角线反映了曲线下面积为 0.5 的随机猜测。这意味着虚拟助手正确识别了一半的预期意图。通常，目标是最大化敏感性和最小化误报。换句话说，ROC
  曲线（黄色线）越陡峭，效果越好。


  ![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig22_HTML.jpg](img/506047_1_En_13_Fig22_HTML.jpg)


  图 13-22 ROC 曲线


  '
- '# 准确率


  **准确率**是正确预测的观测值与总观测值的比率——即所有正确处理意图的比率。你可以通过以下方式计算：


  - `总正确数 = 总 TP + 总 TN`

  - `总错误数 = 总 FP + 总 FN`

  - `准确率 = 正确数 / (正确数 + 错误数)`


  你可以将类似上述的测试用例存储在你的数据仓库中，这样每次对智能助手进行更改时，都可以重新运行该场景。你需要从 BigQuery 中请求总的`TP`、`TN`、`FP`和`FN`。并且你需要存储`准确率`，以便日后在报告中检索这些数据。


  ## 精确率


  **精确率**是正预测值的比率，用于判断是否存在假正例/**被误解的请求**的问题。精确率越高，假阳性率越低。


  - `精确率 = 总 TP / (总 TP + 总 FP)`


  你可以将类似上述的测试用例存储在 BigQuery 中，这样每次对智能助手进行更改时，都可以重新运行该场景。你需要从数据仓库中请求总的`TP`和`FP`。并且你需要存储`精确率`，以便日后在报告中检索这些数据。


  '
- "# F1 分数\n\n**F1 分数**是精确率和 TPR 的加权平均分数。\n\n因此，该分数同时考虑了假正例和假负例。直观上，它不如准确率容易理解，但 F1\
  \ 通常比准确率更有用，尤其是在类别分布不均匀的情况下。当假正例和假负例的成本相似时，准确率效果最佳。如果假正例和假负例的成本差异很大，则最好关注精确率和 TPR。\n\
  \n- `F1 分数 = 2*(TPR * 精确率) / (TPR + 精确率)`\n\n\n\n你可以将类似上述的测试用例存储在 `BigQuery` 中，这样每次对智能体进行更改时，都可以重新运行该场景。你需要从数据仓库中请求总召回率和精确率。同时，你还需要存储\
  \ `f1 score`，以便日后在报告中检索这些数据。\n\n## 混淆矩阵\n\n在机器学习领域，`混淆矩阵`（也称为误差矩阵）是一种特定的表格布局，用于可视化算法的性能（在我们的案例中，即虚拟智能体底层机器学习模型的性能）。矩阵的每一行代表预期的意图，而每一列代表\
  \ `Dialogflow API` 实际匹配到的意图。其名称源于它能直观地显示智能体是否混淆了两个类别（即经常将一个类别错误地标记为另一个类别）。当你拥有大量测试用例时，可以将所有分数呈现在一个大型矩阵中。\n\
  \n如图 13-23 所示，每个意图都包含所有 TP 的总和。这应该会形成一条从顶部到底部的对角线（橙色）。红色方块是所有 FP 的总和；例如，在下方的矩阵中，你可以看到一个测试用例（用户话语）预期应匹配到\
  \ `get_price` 意图，但实际上却匹配到了 `collect_current_playing_game` 意图。\n\n![../images/506047_1_En_13_Chapter/506047_1_En_13_Fig23_HTML.jpg](img/506047_1_En_13_Fig23_HTML.jpg)\n\
  \n**图 13-23** 混淆矩阵示例\n\n## 总结\n\n本章包含关于收集和监控智能体洞察与分析的信息。内容分为以下几类：\n\n- **对话相关指标**\
  \  \n  用户说了什么、何时说的、在哪里说的？你可以捕获对话相关指标，并将其存储在像 `BigQuery` 这样的数据仓库中。\n\n- **客户评分指标**\
  \  \n  用户对你的品牌有何看法？如何通过 `Dialogflow` 收集评分？\n\n- **聊天会话与漏斗指标**  \n  用户与你的智能体交互所走的路径。如何通过\
  \ `Dialogflow` 和 `Chatbase` 监控聊天会话与漏斗指标？\n\n- **机器人模型健康指标**  \n  如何捕获聊天机器人模型健康指标，以测试底层机器学习模型的质量，从而调整\
  \ `Dialogflow` 机器学习阈值。\n\n如果你想构建这个示例，本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/978-1-4842-7013-4`](http://www.apress.com/978-1-4842-7013-4)。请查看\
  \ `advanced-agent-insights` 文件夹。\n\n## 延伸阅读\n\n- Dialogflow 关于历史记录的文档  \n  [`https://cloud.google.com/dialogflow/es/docs/history`](https://cloud.google.com/dialogflow/es/docs/history)\n\
