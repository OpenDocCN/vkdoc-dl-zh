- "# 3. Dialogflow Essentials 概念\n\n开发者或 UX 设计师可以通过 Dialogflow Web 控制台训练 Dialogflow\
  \ Essentials 代理（机器学习模型）。它基于意图。一个意图对最终用户在单次对话轮次中的意图进行分类。您的 Dialogflow 代理将包含许多意图。每个意图都包含训练短语、上下文和响应。\n\
  \n本章将深入探讨训练 Dialogflow Essentials 代理的细节。它将涵盖意图如何工作以及如何创建意图。它讨论了实体和上下文的使用。在本章末尾，您将在\
  \ Dialogflow 模拟器中测试您的代理。\n\n## 深入理解意图\n\n例如，图 3-1 显示了购买视频游戏机的意图页面。\n\n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig1_HTML.jpg](img/506047_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n\n使用训练短语创建意图\n\n当代理使用给定的带标签的训练短语数据集进行训练后，Dialogflow 可以理解人类对话的含义。\n\n当用户通过书面文本或语音（用户表述）与聊天机器人通信时，Dialogflow\
  \ 将进行意图分类。由于 NLP 引擎（会持续改进），用户表述的书写方式不同或包含拼写/语法错误都没有关系。它会理解所询问的内容，并通过检查添加到 Dialogflow\
  \ 代理中的所有意图来进行匹配。一旦匹配到意图，它将返回意图的履行/响应。\n\nDialogflow 不会像 AlphaZero* 这样的目标驱动型 AI 那样进行自我学习。Google\
  \ 不会披露底层技术（如 NLP 或语音转文本引擎）的所有实现细节（秘诀），仅仅是因为它们可能会快速变化，并导致文档过时。\n\n** 了解更多关于 AlphaZero\
  \ 的信息，* [`https://en.wikipedia.org/wiki/AlphaZero`](https://en.wikipedia.org/wiki/AlphaZero)\n\
  \n\n\n### 设置意图\n\n`intent`（意图）是一个描述操作的消息对象。当你将对话可视化为树状图的一部分（图 3-2）时，所有树的分支都是（后续）意图。\n\
  \n![../images/506047_1_En_3_Chapter/506047_1_En_3_Fig2_HTML.jpg](img/506047_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2 将对话可视化为树状图。每个节点都是一个意图。\n\n让我们登录 Dialogflow Essentials 控制台。在浏览器中打开：[`https://dialogflow.cloud.google.com/`](https://dialogflow.cloud.google.com/)。\n\
