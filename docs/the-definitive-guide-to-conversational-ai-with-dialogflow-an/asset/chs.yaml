- "# 将您的智能体与 Dialogflow Messenger 集成\n\nDialogflow Messenger 集成是一个更高级的小部件，您可以将其放置在网站中，用于连接您的\
  \ Dialogflow 智能体。它仅适用于文本聊天。该组件的外观和风格是可定制的。虽然一些企业更倾向于自己构建 Web 集成（例如，以便连接到更多系统），但许多企业喜欢\
  \ Dialogflow Messenger 组件，因为它是与您的网站或 Web 应用集成的简单快捷方式。\n\n在 Dialogflow 控制台中，点击 **集成**\
