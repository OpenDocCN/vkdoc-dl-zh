- '# 关于 Dialogflow


  现在，让我们进一步探讨对话式人工智能。2016 年 9 月，谷歌收购了一家名为 `API.ai` 的公司。`API.ai`（前身为 `Speaktoit` 公司）发布了一套端到端的开发套件，用于为网站、移动应用、主流消息/社交媒体平台、物联网、语音设备和联络中心构建对话界面。2017
  年 10 月，该平台更名为 `Dialogflow`。`Dialogflow` 利用了人工智能的子集：自然语言理解、语音识别和命名实体识别（`NER`，用于从文本中提取值），以识别用户话语的意图、实体和上下文，从而使您的对话式用户界面能够提供高效且准确的响应。


  各种规模的公司都在使用 `Dialogflow`。其用例包括：


  - 内部的企业对员工聊天机器人

  - 面向公众的聊天机器人，用于连接企业与客户，例如客服或销售部门

  - 控制物联网设备（家庭娱乐、汽车、自助服务终端等）的聊天机器人

  - 联络中心中用于处理呼入和呼出电话的机器人


  `Dialogflow` 的客户包括乔治·阿玛尼、梅赛德斯-奔驰、康卡斯特、《华尔街日报》、荷兰皇家航空、易捷航空、荷兰国际集团、玛莎百货、阿霍德等。


  在撰写本文时（2021 年 6 月），`Dialogflow` 拥有超过 170 万用户。`Dialogflow` 在聊天机器人社区如此受欢迎的原因在于：


  - `Dialogflow` 由最先进的机器学习技术驱动。谷歌是公认的人工智能领域全球领导者，`Dialogflow` 受益于谷歌在机器学习、自然语言理解和搜索方面的资产和能力。除了内置的机器学习模型外，您还可以自行训练您的智能体，使您的对话式用户界面随着时间的推移变得更加智能。

  - 使用 `Dialogflow`，您可以将对话与代码分离。由于 `Dialogflow` 提供了一个云端网页用户界面，您可以将对话和实体与应用程序/智能体代码分开。这使得您的对话式用户界面更具可扩展性；您无需开发人员即可进行更改或部署。

  - 使用 `Dialogflow`，您可以通过一系列（Python）脚本比编写代码更快地构建聊天机器人。除了网页用户界面，您还可以通过启用预构建智能体（模板）和闲聊意图（为您的智能体增添更多个性）来更快地构建对话式用户界面，所有这些只需单击一次鼠标即可完成。

  - 高级的履行选项和多渠道集成。`Dialogflow` 拥有超过 32 个渠道集成和软件开发工具包。因此，您可以轻松地将您的智能体与本地环境以及云环境集成，以消费来自服务的数据。借助内置的多渠道集成，您可以快速将智能体部署到各种内置渠道（如
  Twitter、Facebook Messenger、Skype 或 Slack 等社交媒体渠道；Google Assistant 等语音激活助手；电话或短信服务）。或者，您可以通过使用
  `gRPC`、`REST` 或适用于 `Java`、`Node.js`、`Python`、`Go`、`PHP`、`Ruby` 或 `C#` 的客户端库的软件开发工具包，将其部署到您的网站或应用程序。

  - 由于 `Dialogflow` 可通过 Google Cloud 使用，因此它遵循 Google Cloud 的服务条款、服务等级协议和支持包。作为 Google
  Cloud 的一部分，意味着卓越的可靠性、低延迟、与超过 200 项 Google Cloud 服务（如数据分析服务和工具（例如 `BigQuery`、`Dataprep`
  或 `Pub/Sub`））的轻松集成；机器学习 API（如情感检测、翻译、语音转文本转录、文本转语音合成、用于屏蔽敏感数据的数据丢失防护、用于图像光学字符识别检测的视觉
  AI）或云环境（如 `Cloud Functions`、`Kubernetes`、`Compute VMs`、`Cloud Run` 或 `App Engine`）。Google
  Cloud 服务可以通过强大的身份访问管理、错误/调试、日志记录和监控进行控制。

  - 强大的分析能力。使用数据分析来监控机器人健康状况，并更好地理解其与用户的交互。`Chatbase` 是一项 Google Cloud 服务，可帮助构建者更快地分析和优化机器人，它与
  `Dialogflow` 相辅相成。结合使用它们，可以帮助构建者创建世界一流的机器人，然后使用 `Chatbase` 持续跟踪和优化它们。所有 `Dialogflow`
  用户都可以直接从其控制台获得一组自动化的基本 `Chatbase` 分析数据。

  - 除文本界面外的语音/语音集成。`Dialogflow` 还集成了语音识别和文本转语音功能——这对于物联网设备或与交互式语音应答电话合作伙伴的开箱即用集成非常方便。

  - 多语言机器人支持。`Dialogflow` 支持超过 20 种语言。


  ## Dialogflow Essentials 和 Dialogflow CX


  最初的 `Dialogflow` 工具最近更名了；现在它被称为 `Dialogflow Essentials`（`Dialogflow ES`），以便为新的 Google
  Cloud 对话式人工智能工具 `Dialogflow Customer Experience`（`Dialogflow CX`）腾出空间。


  `Dialogflow CX` 将成为用于构建对话式用户界面的替代开发套件，并将与 `Dialogflow ES` 并存。谷歌将继续支持 `Dialogflow
  ES`，因为我们拥有庞大的用户群。为了理解谷歌为何创建另一个机器人构建器，我们首先需要从高层次了解 `Dialogflow ES` 的工作原理。


  ### Dialogflow Essentials 的工作原理


  `Dialogflow ES` 中的意图用于对用户的意图进行分类。对于每个 `Dialogflow ES` 智能体，您可以定义许多意图，这些意图组合起来可以处理完整的对话。每个意图都可以包含参数和响应。


  匹配意图也称为 `意图分类` 或 `意图匹配`。（下一章将详细介绍这些概念。）一旦匹配到意图，它可以返回响应、收集参数（实体提取）或触发 webhook 代码（履行），例如从数据库获取数据。`Dialogflow
  ES` 可以跟踪上下文，就像人类一样，在轮流对话中，`Dialogflow ES` 可以在第二轮和第三轮中记住上下文。这就是它能够跟踪先前用户话语的方式。这是
  `Dialogflow ES` 的主要概念。


  ### 行业复杂性如何变化


  大型企业过去几年一直在使用 `Dialogflow ES`。以下是我在谷歌观察到的一个现象。起初（2016 年），大多数对话式人工智能都是简单的聊天机器人（语音助手机器人、常见问题解答机器人等），用于网页或语音机器人，例如
  Google Assistant。它通常只涉及一到两轮的轮流对话。例如，“嘿 Google，ABC 现在在播什么？”——“*《单身汉》* 晚上 8 点开始，这一集你从未看过！”


  众所周知，构建对话式用户界面是一个持续的过程。当您获取到正确的聊天机器人洞察时，您会看到客户在询问什么。当您在现有智能体之上继续构建对话时，该机器人会随着时间的推移变得越来越复杂。


  因此，对话**复杂性**是一个观察结果。我注意到的另一个现象是，**企业希望出现在客户所在的地方**。因此，他们的聊天机器人需要连接到更多渠道，以创造全渠道体验。公司现在不再只是构建单个聊天机器人，而是希望开发由数据湖提供支持的完整对话平台，并使用机器人流程自动化实现流程自动化。想想那些复杂的用例，例如用机器人取代您的客户服务或人力资源部门。由于呼叫中心超负荷运转以及员工因被低估的单调任务而筋疲力尽，通过聊天机器人和虚拟（语音）智能体实现自动化可以大幅削减企业成本。通过联络中心中的对话式人工智能，企业可以减少通话时间和等待时间，提供全天候服务，同时通过捕获分析数据来改进我们的流程。




  '
- '# Dialogflow CX 的定位


  `Dialogflow Essentials` 因其简洁性而备受赞誉。你可以快速构建一个聊天机器人或语音机器人。这些通常是聊天和语音应用，用户只需用简短的语句匹配一个意图，并经过几次话轮转换即可，例如，一个零售聊天或语音应用，你可以说：“把牛奶加到我的购物清单上。”


  现在，想象一下你正在为一家杂货店的电话客服中心构建一个语音机器人。这次，顾客不再只说几个句子；相反，他们会讲述完整的故事：“是这样的，昨天，就在开门的时候，我和我四个月大的宝宝在某某商店买了牛奶。当我回到家，想把牛奶放进冰箱时，发现已经过了保质期。我打开纸盒，闻到一股怪味，但尝起来味道还行。”突然间，匹配意图就变得棘手多了。对于人类来说，理解其意图可能已经颇具挑战；对于人工智能来说，这也同样困难！因为我们是在谈论购买*牛奶*、*劣质产品*，还是*要求退款*？


  联络中心里的对话是**长时间运行**的（一旦你挂断电话，聊天会话就会结束）；对话内容庞大，可能包含许多话轮转换，我们需要记住上下文——并分支到数百种可能的结果。而且，我甚至还没提到处理多个说话者、打断、背景噪音等技术复杂性。


  为联络中心创建一个虚拟（语音）代理，或构建一个自动化机器人平台，其复杂程度远超`Dialogflow Essentials`的边界。诚然，如果你有一个庞大的开发团队，他们可以在`Dialogflow
  ES`之上量身定制解决方案，就像过去企业所做的那样。但这意味着你必须编写大量支持代码，而不是专注于设计对话。这时，`Dialogflow CX`就派上用场了。


  '
- '# Dialogflow CX 详解


  `Dialogflow CX` 使你的团队能够通过可视化机器人构建器、可复用的意图以及处理多轮对话的能力，加速创建企业级的对话体验。


  它允许你快速创建具有以下特点的代理：


  *   大型且复杂的流程。想象一下拥有数百或数千个意图的庞大代理实现。

  *   超过三次的话轮转换（保持上下文）以及对话在各种结果中相互分支。

  *   流程中可重复的对话部分（例如，登录功能、对问题回答是/否等）。

  *   理解长语句的意图和上下文。

  *   与团队协作处理大型实施项目。

  *   原生联络中心功能，例如`DTMF`、一键式电话合作伙伴集成、强插、人工坐席转接。

  *   需要支持多种语言和区域化（例如`GDPR`）的代理。

  *   具有各种结果和可重复部分的流程，例如报税。通常，这需要你填写大量表格，问题之间会相互跳转。如果你要为这个用例构建一个聊天机器人，`Dialogflow
  CX` 将非常合适，因为它具有可复用的流程、意图和答案分支。


  **注意**


  `Dialogflow CX` 对其`NLU`（自然语言理解）进行了升级。尽管`Dialogflow ES`因其出色的`NLU`结果而广受欢迎，但我们通过将`NLU`基于`BERT`语言模型，观察到了显著的质量提升。`BERT`代表来自变换器的双向编码器表示。它是一种基于深度学习的变换器机器学习技术，用于自然语言处理预训练，由谷歌开发。它允许系统自动从原始数据中发现特征检测或分类所需的表示。`BERT`也被用于谷歌搜索，以理解用户的搜索意图。


  `Dialogflow`引入了诸如`页面`和`流程`等新概念，用于创建可复用的流程和分支。除此之外，它还附带了一个可视化流程构建器，可以快速预览和理解对话流程。尽管本书侧重于`Dialogflow
  Essentials`的内容，但在本书的附录中，如果你希望开始使用`Dialogflow CX`，将会更详细地解释`页面`和`流程`。结合本书各章节讲解的材料，你将能够同时使用这两个产品。


  '
- '# Dialogflow Essentials 与 Dialogflow CX 对比


  `Dialogflow CX` 是一个独立的产品，将与`Dialogflow Essentials`共存。如果你是企业客户，正在构建一个大型复杂的聊天机器人平台或联络中心客户体验，并且数据区域化对你至关重要（由于`GDPR`），或者你的对话需要大量的话轮转换和对话分支，那么`Dialogflow
  CX`可能是适合你的工具。或者，当你希望选择一个更简单的工具，用于不太复杂的可视化代理，或者你确实想构建复杂的可视化代理，但又不介意亲自动手编写一些支持（后端）代码时，那么请使用`Dialogflow
  Essentials`。


  ## 关于联络中心 AI


  联络中心 AI（`CCAI`）是谷歌云的一项解决方案，用于在联络中心中实现具有类人交互（和语音）的虚拟代理。`Dialogflow Essentials`和`Dialogflow
  CX`是谷歌云的产品，而`CCAI`则是由电话服务提供商与谷歌云工程师共同构建的解决方案。因此，`CCAI`的市场推广是通过电话合作伙伴进行的。


  这些合作伙伴包括`Genesys`、`Avaya`、`Mitel`、`Cisco`、`Twilio`等。他们可以在现有的联络中心硬件上启用`CCAI`。


  成功使用`CCAI`的公司包括`Verizon`、`GoDaddy`和`Marks & Spencer`。


  **注意**


  为什么让机器人接听电话会很有趣？


  举个例子，想象一家健康保险公司。通过联络中心打来的大部分电话都是人们询问某些费用是否在承保范围内。例如，“看牙医的费用包含在我的套餐里吗？”这家健康保险公司有大量的呼入电话，例如在荷兰，尤其是在年底前后，因为那是合法更换健康保险公司的唯一时间段。


  客服热线非常繁忙，许多人会被置于等待状态。与其处理漫长的排队和等待时间，如果有一个语音机器人能接听电话并为你回答最常见的问题，那岂不是很好？这可以解放联络中心的人工坐席，让他们去回答更复杂或更私人的问题。


  我们在 2020 年也看到了类似的情况。谷歌帮助了许多受 COVID-19 影响的行业，如旅游业。旅行社和航空公司的联络中心无法处理电话负载，因为所有的旅行和航班都被取消了。人们被长时间等待，或者断线后被告知稍后再打。通过在联络中心启用`CCAI`来回答最常见的问题，企业能够释放线路压力，节省成本，并更好地帮助他们的客户。




  ### CCAI 架构


  电话服务提供商构建的 CCAI 架构的基石是 `Dialogflow CX`。`Dialogflow` 提供与用户的自动化交互，并包含自动语音识别 (ASR)
  和具有逼真人声模型的文本转语音功能。


  它让客户能够全天候 24/7 获得即时对话式自助服务。


  ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig1_HTML.jpg](img/506047_1_En_1_Fig1_HTML.jpg)


  图 1-1


  Google Cloud 的 Contact Center AI 架构概览


  如图 1-1 所示，Contact Center AI 产品包含额外的 Google Cloud 组件：`Agent Assist` 和 `Contact Center
  AI Insights`。


  `Agent Assist` 通过识别意图并提供实时的、逐步的协助，在通话过程中为人工客服提供持续支持。


  现在想象一下，您有一个虚拟客服接听电话；然而，它不知道如何回答客户（例如，因为它没有针对该主题的训练短语进行训练）。CCAI 可以通过客服转接将您连接到在线人工客服，但在后台仍会监听，以便在屏幕上向人工客服提供建议（或填写表单），从而缩短通话时间。


  `Contact Center AI Insights` 使用自然语言处理来识别通话驱动因素和情绪，帮助联络中心管理者了解客户互动情况，以改善通话结果。它使联络中心管理团队能够听到客户在说什么。基于此，他们可以做出数据驱动的业务决策并提高运营效率。


  CCAI 架构构建在由电话合作伙伴提供的现有电话硬件之上。


  ## 关于 Google Cloud 语音技术


  ### Cloud Speech-to-Text API


  `Speech-to-Text API` (STT) 是一个 Google Cloud 自动语音识别 (ASR) API，它能够通过 API（通过 REST 或
  gRPC 调用以及客户端库）识别口语并将其转录为文本。


  Google 在语音技术方面拥有超过 20 年的经验。第一项专利可追溯到 2003 年，当时 Google 为 Google 搜索引擎推出了超过 40 种语音语言，以便通过语音进行搜索。


  2012 年，Google 开始使用深度神经网络，这也是用于 Google Assistant 的语音模型的起点。除了 Google Assistant 和搜索，Google
  还在其他各种 Google 产品中使用语音识别：`Dialogflow`、`Google Meet` 中的字幕功能、`Android Speech`、`YouTube
  TV` 字幕和 `Video AI`，仅举几例。


  `STT API` 始于 2017 年，是 Google Cloud 的一部分。它支持超过 73 种语言的 125 多种变体，可以转录语音，并且可以自动检测语言。它还添加了标点符号和说话人分离（区分不同的说话人），并且在撰写本文时，它甚至可以在本地运行。`STT`
  是 Google 最受欢迎的云产品之一。您可能会认为 `Speech-to-Text` 最常用于语音机器人场景，但实际上，客户将 `STT` 用于各种用途，例如生成视频或实时会议的字幕、电话通话监控、从音频文件中获取转录文本，或在应用程序中构建语音命令。


  通过 Google Cloud 的 `Cloud Speech-to-Text API` 实现的 ASR 是 Contact Center AI 解决方案中的关键部分，它将获取呼叫者的语音并将其转换为文本，以便通过
  `Dialogflow` 检测意图或为 CCAI Insights 收集分析数据。


  注意


  `Cloud Speech-to-Text API` 受 Google Cloud 条款和条件约束。这意味着 Google 不能也不会使用您的语音数据来为其他人的使用训练语音模型。因此，您不必担心使用相同
  `STT API` 的竞争对手会访问您的业务数据。


  像 Chrome 这样的浏览器或像 Android 这样的操作系统可能也有内置的语音识别器；然而，企业更倾向于选择 `Cloud Speech-to-Text`
  解决方案，因为其企业级条款和条件或额外的 `STT` 功能，例如在您自己的数据中心本地运行语音模型。除此之外，它还使用不同的数据集进行了训练。


  ### Cloud Text-to-Speech API


  Google Cloud 的 `Text-to-Speech` (TTS) 从文本生成语音。它就像一个语音合成器。在撰写本文时，有超过 90 种不同的声音可供选择。


  Google Cloud 的 `TTS` 允许开发者创建听起来自然的合成人类语音，作为可播放的音频；它就像一个语音合成器。您可以使用通过 `TTS` 创建的音频数据文件来驱动您的应用程序或增强媒体，例如视频或音频录制。


  `TTS` 将文本或语音合成标记语言 (SSML) 输入转换为音频数据，例如 MP3 或 LINEAR16（WAV 文件中使用的编码）。


  ## WaveNet


  过去，我们有用于生成语音的标准机器学习模型。它们听起来非常机械。主要是由于 Google Assistant，我们创建了更先进的模型：`WaveNet` 模型。


  它合成语音时，在音节、音素和单词上具有更逼真的强调和语调变化。当虚拟客服的声音听起来像机器人时，用户会将虚拟客服视为机器人，因此会以“计算机”风格提出愚蠢的问题，例如“视频游戏发布
  PS5”，而不是“这个月 PlayStation 5 上发布了哪些最新的视频游戏？”。


  借助 `WaveNet` 机器学习 TTS 模型，Google 可以在短时间内捕捉一个人的声音，而无需让演员在录音室里待上数周或数月，并通过学习声波从中生成新的“声音”。


  ### 自定义语音


  通过 `Google Cloud Text-to-Speech API` 和 `Dialogflow` 中内置的语音合成，有许多生成的声音可供选择。然而，在 Google
  Cloud，我们听到了许多企业用户的请求，他们希望在对话中使用自己独特的自定义声音。


  例如，在 Google Assistant 或联络中心使用其品牌演员的声音。这个过程通常也很昂贵，因为您需要租用一名演员，并让他们在录音室里待上数周来录制每一个短语。


  借助机器学习，Google 现在可以生成自定义语音。可以通过阅读特定的语音脚本，录制您自己的声音（或演员的声音）30 分钟。它将为您生成语音。


  Google 在底层使用的技术称为 `Tacotron 2`。它利用了序列到序列学习 (Seq2Seq)。这使得将训练模型从一个领域转换到另一个领域的序列成为可能。（例如，通过
  `Seq2Seq`，`Dialogflow` 能够支持多种语言的多语言支持，因为很容易推广到新语言。）


  注意在图 1-2 中，Google 使用了一个针对 TTS 优化的序列到序列模型，将字母序列映射到一系列编码音频的特征。这些特征是一个 80 维的音频频谱图，其帧每
  12.5 毫秒计算一次，捕捉了单词的发音以及人类语音的各种细微差别，包括音量、速度和语调。最后，这些特征使用类似 `WaveNet` 的架构转换为 24 kHz
  的波形。


  几乎不可能区分原始配音演员的声音与生成的声音。


  ![../images/506047_1_En_1_Chapter/506047_1_En_1_Fig2_HTML.jpg](img/506047_1_En_1_Fig2_HTML.jpg)


  图 1-2


  `Tacotron 2` 模型架构的详细视图。图像的下半部分描述了将字母序列映射到频谱图的序列到序列模型




