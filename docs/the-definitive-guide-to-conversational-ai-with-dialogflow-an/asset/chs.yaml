  我在这些示例中使用的实体是：


  - `@fps_games`

  - `@platform`

  - `@product`

  - `@products_color`

  - `@products_edition`

  - `@producttype`


  ## 在训练语句中使用实体创建意图


  通常，当您想要创建新意图，并且这些意图需要提取您预定义的自定义实体时，您需要确保已首先创建这些实体。


  然后，在您的意图训练语句中，您可以开始提供示例。Dialogflow 将根据实体中声明的内容自动注释变量对象。


