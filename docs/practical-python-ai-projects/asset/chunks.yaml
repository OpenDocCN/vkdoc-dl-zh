  trans: "\n至此，我们有了一个模型！并非唯一的模型，而是一个模型：一个简单、清晰且精确的代数模型，它有解，并且能回答我们最初的问题。\n\n由于我们并非对实际应用毫无兴趣的纯理论家，下一步就是求解这个模型。正如本书中我们将对每个模型所做的那样，我们需要将上述数学表达式（(1.1)-(1.4)）转换成现有求解器能够理解的形式。\n\
    \n多年来，优化专家们开发了许多专门的建模语言和求解器。以下是一些较为知名的列表：\n\n*   **建模语言**\n    *   AMPL ( [`www.ampl.com`](http://www.ampl.com)\
    \ )\n    *   GAMS ( [`www.gams.com`](http://www.gams.com) )\n    *   GMPL ( [`http://en.wikibooks.org/wiki/GLPK/GMPL`](http://en.wikibooks.org/wiki/GLPK/GMPL)\
    \ (MathProg))\n    *   Minizinc ( [`www.minizinc.org/`](http://www.minizinc.org/)\
    \ )\n    *   OPL ( [`www-01.ibm.com/software/info/ilog/`](http://www-01.ibm.com/software/info/ilog/ilog/)\
    \ `)`\n    *   ZIMPL ( [`http://zimpl.zib.de/`](http://zimpl.zib.de/) )\n*   **求解器**\n\
    \    *   CBC ( [`www.coin-or.org/`](http://www.coin-or.org/) )\n    *   CLP (\
    \ [`www.coin-or.org/Clp/`](http://www.coin-or.org/Clp/) `)`\n    *   CPLEX ( [`www-01.ibm.com/software/info/ilog/`](http://www-01.ibm.com/software/info/ilog/)\
    \ )\n    *   ECLiPSe ( [`http://eclipseclp.org/`](http://eclipseclp.org/) )\n\
    \    *   Gecode ( [`www.gecode.org/`](http://www.gecode.org/) )\n    *   GLOP\
    \ ( [`https://developers.google.com/optimization/lp/glop`](https://developers.google.com/optimization/lp/glop)\
    \ )\n    *   GLPK ( [`www.gnu.org/software/glpk/`](http://www.gnu.org/software/glpk/)\
    \ `)`\n    *   Gurobi ( [`www.gurobi.com/`](http://www.gurobi.com/) `)`\n    *\
    \   SCIP ( [`http://scip.zib.de/`](http://scip.zib.de/) )\n\n我们应该区分建模语言（具有特定词汇和语法的形式化构造）和求解器（能够读取以特定语言表达的模型并输出解的软件包），尽管在某些情况下这种区分是模糊的。\n\
    \n作为建模者，你需要创建一个模型（使用语言 X），然后将其输入求解器（求解器 Y）。这之所以可行，是因为求解器 Y 知道如何解析语言 X，或者存在一个从语言\
    \ X 到求解器能理解的另一种语言（比如 Z）的转换器。多年来，这引起了许多烦恼（“什么？你的意思是，我必须重写我的模型才能用你的求解器？”）。\n\n更糟糕的是，这些语言和求解器并不等价。每种都有其优缺点和专长领域。在多年使用上述所有语言（以及更多）编写模型之后，我现在的偏好是避开专门的建模语言，转而使用通用编程语言，例如\
    \ Python，并配合一个能与多种求解器交互的库。在本书中，我将使用 Google 的运筹学工具（OR-Tools），这是一个结构非常清晰且易于使用的库。\n\
    \nOR-Tools 库功能全面。它提供了我所用过的最好的接口，用于访问多种线性和整数求解器（`MPSolver`）。它还有针对网络流问题的专用代码，以及一个非常高效的约束编程库。在本书中，我将只展示这个优化工具宝库中极小的一部分。\n\
    \n使用像 Python 这样的通用语言有很多优点，其中之一是我们既可以完成建模部分，也可以将模型集成到更大的应用程序中，比如一个网页或手机应用。我们还可以轻松地以清晰的格式呈现解。我们拥有一个完整语言的全部能力。诚然，专门的建模语言有时允许更简洁的模型表达。但根据我的经验，它们无一例外地会在某个时刻遇到瓶颈，迫使建模者编写笨拙的胶水代码来连接模型和应用程序的其他部分。此外，用\
    \ Python 编写 OR-Tools 模型可以是一种享受。整个共存模型如代码清单 1-1 所示。\n\n```\n1  from ortools.linear_solver\
    \ import pywraplp\n2  def solve_coexistence():\n3    t = 'Amphibian coexistence'\n\
    4    s = pywraplp.Solver(t,pywraplp.Solver.GLOP_LINEAR_PROGRAMMING)\n5    x =\
    \ [s.NumVar(0, 1000,'x[%i]' % i) for i in range(3)]\n6    pop = s.NumVar(0,3000,'pop')\n\
    7    s.Add(2*x[0] + x[1] + x[2] <= 1500)\n8    s.Add(x[0] + 3*x[1] + 2*x[2] <=\
    \ 3000)\n9    s.Add(x[0] + 2*x[1] + 3*x[2] <= 4000)\n10    s.Add(pop == x[0] +\
    \ x[1] + x[2])\n11    s.Maximize(pop)\n12    s.Solve()\n13    return pop.SolutionValue(),[e.SolutionValue()\
    \ for e in x]\n代码清单 1-1\n两栖动物共存模型\n```\n\n让我们来解析这段代码。第 1 行加载了 OR-Tools 中线性规划子集的\
    \ Python 封装。我们编写的每个模型都将以此方式开始。第 4 行使用 Google 自己的 GLOP 命名并创建了一个线性规划求解器（此后命名为 `s`）。OR-Tools\
    \ 库提供了与多种求解器的接口。切换到不同的求解器，例如 GNU 的 GLPK 或 Coin-or CLP，只需修改这一行即可。\n\n在第 5 行，我们创建了一个包含三个决策变量的一维数组\
    \ `x`，这些变量可以取 0 到 1000 之间的值。下界是一个物理约束，因为我们不能有负数的两栖动物。上界是问题陈述的一部分，因为生物学家不会在试管中放入超过\
    \ 1000 只的每种物种。可以将范围指定为 (−∞, +∞) 的任何连续子集，但根据一般经验，在变量声明时尽可能限制范围有助于求解器高效运行。调用 `NumVar`\
    \ 的第三个参数用作该变量显示时的名称，例如在调试模型时。我们很少用到这个功能，因为我们更倾向于编写无错误的模型。\n\n第 7 到 9 行的约束直接翻译自数学表达式\
    \ (1.1)-(1.3)。各项的顺序无关紧要。与某些限制性的建模语言不同，我们可以将第 7 行写成\n\n```\n1500>=x[0]+x[2]+x[1]\n\
    ```\n\n或\n\n```\nx[0]+x[1]+x[2]-1500<=0\n```\n\n或任何其他等价的代数表达式。\n\n在第 6 行，我们声明了一个辅助变量\
    \ `pop`。尽管建模语言中没有这种区分，但这并非决策变量，而是用于建模问题的辅助工具。我们在第 10 行使用了这个辅助变量，添加了一个不会以任何方式约束模型的等式。它只是将辅助变量\
    \ `pop` 定义为我们决策变量的总和。这使我们能够轻松地表达目标函数，并可能有助于显示解。\n\n目标函数在第 11 行，是对 (1.4) 的翻译。函数选择不出所料，要么是\
    \ `s.Maximize`，要么是 `s.Minimize`，参数是先前声明的变量的线性表达式。\n\n我们使用了\n\n```\ns.Maximize(pop)\n\
