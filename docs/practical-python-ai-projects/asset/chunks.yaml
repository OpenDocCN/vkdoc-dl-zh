    ### 7.4.2 Variations


    The variations on this model are multiple. Some of them affect the objective function
    (or, equivalently, are handled as soft constraints); some are hard constraints;
    some could be either.


    *   There could be a list of pairs (week, team, team) with the goal of having
    this specified match during that specified week.

    *   Instead of pushing intra-divisional matches towards the end, we could be asked
    to follow a specific pattern say Intra-Intra-Inter.

    *   We could be asked to spread out (or, bunch in) the multiple matches between
    pairs of teams.

    *   Instead of weeks, we could be asked to schedule on specific dates.

    *   We could add the concept of Home and Away games with the understanding that
    the number of Home games is fixed.

    *   There could also be a pattern of Home and Away games to follow. This might
    even be considered in the context of team cities with an eye towards a “reasonable”
    travel schedule. (What I am describing here is the addition of multiple TSP layers
    on top of an already difficult timetabling problem! Not for the faint of heart).


    ## 7.5 Puzzles


    There is a long tradition in constraint programming of solving puzzles , mainly
    because it is amusing, though it is also educational. Solving puzzles using integer
    programming is not tried as often, yet it can be as amusing and educational if
    sometimes more difficult. Let’s not be deterred by the difficulty. The tricks
    used in puzzles and the mental gymnastics used to model the problems can be used
    for “real” problems later.'
