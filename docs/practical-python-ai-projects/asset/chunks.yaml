    ```

    1  def get_new_pattern(l,w):

    2    s = newSolver(''Cuttingustockuslave'', True)

    3    n = len(l)

    4    a = [s.IntVar(0,100,") for i in range(n)]

    5    Cost = sum(l[i]*a[i] for i in range(n))

    6    s.Maximize(Cost)

    7    s.Add(sum(w[i]*a[i] for i in range(n)) <= 100)

    8    rc = s.Solve()

    9    return SolVal(a), ObjVal(s)

    ```

