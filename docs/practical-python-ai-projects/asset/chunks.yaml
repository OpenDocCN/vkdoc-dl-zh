    ### 4.4.2 Alternate Algorithms


    If the reader is aware of Dijkstra’s algorithm , he may wonder why we create a
    linear programming model for shortest paths, especially since a fast implementation
    of Dijstra’s algorithm might be faster. The answer is that in the real life of
    a modeler we rarely have to solve pure shortest paths (or pure anything, really).
    For the vast majority of situations outside of textbooks, the kernel of the problem
    might be a shortest path, but there are bound to be multiple additional considerations.
    And adding these considerations in the form of additional constraints to a basic
    shortest path linear program is often a simple matter. In contrast, trying to
    modify an implementation of Dijkstra (assuming that we even have access to the
    source code) might prove considerably more difficult, if at all possible.


    ### 4.4.3 Variations


    *   It may be that, instead of minimizing the sum of distances, we want to minimize
    their product. We cannot multiply variables with a linear solver, but we can slightly
    transform the problem by taking the logarithms of the distances and minimizing
    the sum of the logs.

    *   Alternatively, we might be interested in the longest path between start and
    end. In theory, this is unlikely to be solved by linear programming in all cases[⁷](#A457410_1_En_4_Chapter.html#Fn7)
    but the pathological cases that hinder the theory are few and may not apply to
    the problem at hand. Another way to view this is that there is a large class of
    networks where it is possible to find longest paths.


    The simplest transformation would be to change the minimization to a maximization
    . We can obtain a maximization by negating the distance matrix. But this will
    allow repeated nodes; worse, it may lead to an unbounded model (an infinite loop).
    The problem is that the “flow” could go around a cycle an infinite number of times.
    A partial solution is to add constraints to ensure that no more than one unit
    of flow goes into any node. This is a redundant constraint in the case of a minimization,
    but not in the case of a maximization. In this manner we get rid of the infinite
    loop and the repeated nodes. There still remains a problem: subtours. I will explain
    and handle this problem in Section 5.4 of Chapter [5](#A457410_1_En_5_Chapter.html).


    In the case of a cycle-free directed graph , then longest paths are easy to find.
    You saw it before a situation where these paths are of interest: in Section 2.3.1
    of Chapter [2](#A457410_1_En_2_Chapter.html) I discussed critical paths of project
    management . These are the sequence of tasks which, if delayed, will delay the
    whole project. Note that these paths are rarely unique, so that looking for a
    (or worse, the) longest path is misguided (for a simple example, see Tasks 1 and
    2 Figure `fig:process-example`). Let’s create a small function that will start
    from the optimal solution of our project management model and use our shortest
    paths model to extract critical paths. See Listing [4-5](#A457410_1_En_4_Chapter.html#Par116)
    for details.


    ```

    1   def critical_tasks(D,t):

    2     s = set([t[i]+D[i][1] \

    3            for i in range(len(t))]+[t[i] for i in range(len(t))])

    4     n,ix,start,end,times = len(s),0,min(s),max(s),{}

    5     for e in s:

    6       times[e]=ix

    7       ix += 1

    8     M = [[0 for _ in range(n)] for _ in range(n)]

    9     for i in range(len(t)):

    10       M[times[t[i]]][times[t[i]+D[i][1]]] = -D[i][1]

    11     rc,v,Path,Cost,Cumul = solve_model(M,times[start],times[end])

    12     T = [i for i in range(len(t)) \

    13         for time in Path if times[t[i]+D[i][1]] == time]

    14     return rc, T

    Listing 4-5

    Critical Tasks Extractor

    ```


    The first few lines create a set with all the tasks’ starting and ending times;
    they will become our network nodes once we rename them 0, … , n − 1\. At line
    9 we create our distance matrix by the negative of the duration of each task.
    There is an entry per task, from its starting to ending time.


    We then call our shortest path model, which in this case will find a longest path
    from earliest time to project completion time. Finally, we extract all the tasks
    that end on one of the nodes of the longest path. All these tasks are critical
    since they will stretch the already longest path if delayed.


