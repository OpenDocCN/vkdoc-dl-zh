    为了避免运行`n`[2]个实例，我们使用最优性原理，该原理指出，如果`P = (v[i+1], v[i+2], v[i+3], … , v[i+k])`是一条最短路径，那么`P`的每个子路径也都是最短路径。这在从第11行开始的循环中使用，以从给定的最短路径中提取所有中间路径。


    ```

