    这是优化者令人遗憾的缺乏想象力的命名传统的又一个例子。也许这可以解释这一点。我的博士导师半开玩笑地说：“如果你希望你的算法以你的名字命名，就不要给它们起有趣的名字。”言下之意是，如果一个人把他的算法命名为Alg-1和Alg-2或类似平淡无奇的名字，同事们将别无选择，只能称它们为Smith-star或Jones-revised。唉，这种对身后名的希望被SOS2和其他同类杂种的使用所否定。


