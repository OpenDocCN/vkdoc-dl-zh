- fmt: "#### 3.2.1.2 Constraints\n\nNow we need to express these deviations. We are\
    \ given a set of couples (`t¯[i]`, `f¯`) representing the measurement at time\
    \ `t¯[i]` of the putative function `f`. The deviation for a particular couple\
    \ is therefore:\n\n![$$ {e}_i=\\mid {a}_0+{a}_1\\overline{t_i}+{a}_2{\\overline{t_i}}^2+\\\
    dots +{a}_k{\\overline{t_i}}^k-\\overline{f_i}\\mid $$](A457410_1_En_3_Chapter_Equl.gif)\n\
    \nThat is, the deviation is the absolute value of the difference between the experimental\
    \ `f¯[i]` and the theoretical displacement `f(t¯[i])`, which is obtained by evaluating\
    \ the function at the time `t¯[i]`. Why the absolute value? Because the deviation\
    \ could be positive or negative and we care only about its magnitude.\n\nIn terms\
    \ of the inequalities, we intend to write that we would want a constraint of the\
    \ form `|f(t¯[i]) − f¯| <= e` but this is not linear. There are at least two different\
    \ ways to handle this situation. The one to use depends on what information we\
    \ want to extract from the model’s solution.\n\n1. **Double the inequalities and\
    \ bound the deviations.** Consider the definition of absolute value. `|a| = a`\
    \ if `a` is positive and `−a` if it is negative. This suggests therefore replacing\
    \ the inequality `|e[i]| <= e` by two inequalities:\n\n    ![$$ {\\displaystyle\
    \ \\begin{array}{l}\\mid f\\left({t}_i\\right)-\\overline{f_i}\\mid <=e,\\\\ {}\\\
    mid -f\\left({\\overline{t}}_i\\right)+\\overline{f_i}\\mid <=e.\\end{array}}\
    \ $$](A457410_1_En_3_Chapter_Equm.gif)\n\n    This is a workable approach.\n\n\
    2. **Double the variables and find each deviation.** Note that the “doubling the\
    \ inequalities” approach will not find the deviation at each point. We simply\
    \ have a bound of all deviations, a bound which we minimize. What if we want to\
    \ know each deviation, for instance, to minimize their sum?\n\nOne way to find\
    \ the value of each deviation is to introduce two non-negative variables for each\
    \ point (`t¯[i]`, `f¯[i]`). Let’s call them `u[i]` and `v[i]` and introduce the\
    \ following equality:\n\n![$$ f\\left({t}_i\\right)-{u}_i+{v}_i=\\overline{f_i}\
    \ $$](A457410_1_En_3_Chapter_Equ3.gif)\n\n(3.3)\n\nNotice that since the new variables\
    \ are non-negative, only one of them will be non-zero per equality. That one will\
    \ equal the deviation (i.e., the difference between the experimental point and\
    \ the theoretical point).\n\nThis “doubling the variables” approach is somewhat\
    \ more general. If we want to minimize the sum of deviations, we minimize the\
    \ sum of all `u[i]` and `v[i]`. If we want to minimize the maximum deviation,\
    \ we add the inequalities:\n\n![$$ {\\displaystyle \\begin{array}{l}{u}_i\\le\
    \ e,\\\\ {}{v}_i\\le e,\\end{array}} $$](A457410_1_En_3_Chapter_Equn.gif)\n\n\
    and minimize `e`.\n\n#### 3.2.1.3 Executable Model\n\nLet’s translate this into\
    \ an executable model seen in Listing [3-3](#A457410_1_En_3_Chapter.html#Par69).\
    \ Assume that we obtain the data in an array of tuples (`t¯[i]`, `f¯[i]`) named\
    \ `D`, along with the degree of the polynomial required and an indicator of the\
    \ distance to minimize (0 for the sum and 1 for the maximum).\n\n```\n1   def\
    \ solve_model(D,deg=1,objective=0):\n2     s,n = newSolver('Polynomialufitting'),len(D)\n\
    3     b = s.infinity()\n4     a = [s.NumVar(-b,b,'a[%i]' % i) for i in range(1+deg)]\n\
    5     u = [s.NumVar(0,b,'u[%i]' %  i) for i in range(n)]\n6     v = [s.NumVar(0,b,'v[%i]'\
    \ % i) for i in range(n)]\n7     e = s.NumVar(0,b,'e')\n8     for i in range(n):\n\
    9       s.Add(D[i][1]==u[i]-v[i]+sum(a[j]*D[i][0]**j \\\n10                  \
    \            for j in range(1+deg)))\n11     for i in range(n):\n12       s.Add(u[i]\
    \  <=  e)\n13       s.Add(v[i]  <=  e)\n14     if objective:\n15       Cost =\
    \ e\n16     else:\n17       Cost = sum(u[i]+v[i] for i in range(n))\n18     s.Minimize(Cost)\n\
    19     rc  = s.Solve()\n20     return  rc,ObjVal(s),SolVal(a)\nListing 3-3\nPolynomial\
    \ Curve Fitting Model (curve fit.py)\n```\n\nLine 4 defines the real decision\
    \ variables, the coefficients of the polynomial. Since we cannot easily set bounds\
    \ on the coefficients, we use infinity. Lines 5 and 6 define the deviations between\
    \ the data points and the corresponding theoretical values. This is used at line\
    \ 8, which corresponds to (3.3). Then we bound the deviations at line 11 by our\
    \ maximum error variable defined at line 7.\n\nThe last element is the choice\
    \ of objective function. The user can select to minimize the maximum deviation\
    \ at 15 or the sum of deviations at line 17. These are displayed in Table [3-9](#A457410_1_En_3_Chapter.html#Tab9)\
    \ under the headings, respectively, of `e[i]^(max)` and `e[i]^(sum)`.\n\n**Table\
    \ 3-9** Optimal Solution to Curve Fitting Problem\n\n| `t[i]` | `f[i]` | `f[sum](t[i])`\
    \ | `e[i]^(sum)` | `f[max](t[i])` | `e[i]^(max)` |\n| --- | --- | --- | --- |\
    \ --- | --- |\n| 0.1584 | 0.0946 | -0.4382 | 0.5328 | -12.4063 | 12.5008 |\n|\
    \ 0.8454 | 0.2689 | 0.3421 | 0.0731 | -8.3251 | 8.594 |\n| 2.1017 | 5.8285 | 5.8285\
    \ | 0.0 | 2.0924 | 3.7362 |\n| 3.1966 | 14.8898 | 14.8898 | 0.0 | 14.285 | 0.6047\
    \ |\n| 4.056 | 25.6134 | 24.7951 | 0.8184 | 25.8879 | 0.2744 |\n| 4.9931 | 38.3952\
    \ | 38.3952 | 0.0 | 40.5766 | 2.1814 |\n| 5.8574 | 43.5065 | 53.5269 | 10.0204\
    \ | 56.0073 | 12.5008 |\n| 7.1474 | 91.3715 | 80.7311 | 10.6403 | 82.3995 | 8.972\
    \ |\n| 8.1859 | 119.075 | 106.6547 | 12.4203 | 106.5742 | 12.5008 |\n| 9.0349\
    \ | 115.7737 | 130.5102 | 14.7365 | 128.2745 | 12.5008 |\n\nThe data points, along\
    \ with both solutions (one for minimizing the maximum deviation and one for minimizing\
    \ the sum of deviation), are displayed in Figure [3-5](#A457410_1_En_3_Chapter.html#Fig5).\n\
    \n![A457410_1_En_3_Fig5_HTML.jpg](A457410_1_En_3_Fig5_HTML.jpg)\n\n**Figure 3-5**\
    \ Data and fitted curves\n\n### 3.2.2 Variations\n\nThe example above is a special\
    \ case of a technique very useful in practice, the so-called handling of soft\
    \ constraints. Often we would like an equation to be satisfied but we know that\
    \ it is unlikely to be. Examples abound. Here is one: constructing a model of\
    \ a scheduling system to produce student schedules at school. In the intelligent\
    \ manner, we take all the student course choices and their days of availability\
    \ (I have to work Fridays, so no class then. Or, I work nights; I need day classes\
    \ only). From all of this data, we wish to construct schedules that work for all\
    \ students.\n\nUnfortunately, it is unlikely that a schedule accommodating all\
    \ requests is feasible. The best one can hope for is to satisfy as many students’\
    \ requests as possible. These become soft constraints and the technique is similar\
    \ to the one above: we introduce new variables (like the `u[i]` and `v[i]` above)\
    \ to measure the distance to the ideal (the number of students with unsatisfied\
    \ requests) and minimize the sum of these.\n\nSo, if we aim to satisfy, say:\n\
    \n`a[1]x[1] + a[2]x[2] + … + a[n]x[n] = b`.\n\nBut we know that this is unlikely,\
    \ so we change to:\n\n`a[1]x[i] + a[i]x[2] + … + a[n]x[n] + u − v = b`,\n\nwhere\
    \ `u` and `v` are non-negative. Then we add `(u + v)` to the objective function\
    \ (assuming this is a minimization problem).\n\nNote that we may need only one\
    \ of `u` and `v` if we already know that the left-hand side will always be either\
    \ too high or too low with respect to the right-hand side. We need both only when\
    \ it can deviate in both directions, as in our curve fitting example."
