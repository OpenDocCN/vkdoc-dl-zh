- fmt: '### 7.2.4 Maximax and Minimin


    To see an application of this trickery, recall that in Section 2.3.2.1 we left
    unsolved the problem of modeling the maximax,


    ![$$ \underset{x}{\max}\underset{i}{\max}\sum \limits_j{a}_{i,j}{x}_j+{b}_i $$](A457410_1_En_7_Chapter_Equq.gif)


    subject to some constraints or the equivalently pernicious minimin. The technique
    is to first transform each affine function into a constraint of the form


    ![$$ \sum \limits_j{a}_{i,j}{x}_j+{b}_i=z $$](A457410_1_En_7_Chapter_Equr.gif)


    We then transform each equality into a pair of inequalities, which we reify and
    to which we apply the disjunctive trick to enforce one of them. And finally we
    set the objective function to `max z`. (I did mention it was somewhat difficult
    to handle, but, with the routines we have developed in this section, it a matter
    of a few lines in Listing [7-14](#A457410_1_En_7_Chapter.html#Par101). As an example,
    we will solve the following,


    ![$$ \underset{x\in \left[2,5\right]}{\max}\max \left\{2x-3,-2x+12\right\}, $$](A457410_1_En_7_Chapter_Equs.gif)


    which, graphically, is represented by Figure [7-2](#A457410_1_En_7_Chapter.html#Fig2)
    where the two functions are displayed and the maximum is in a thicker line. Note
    that this is decidedly a non-convex objective. Note also that one could solve
    such a simple problem differently, but not that much more efficiently. For example,
    one might evaluate all functions on the vertices of the polyhedron. But in order
    to do that, one needs to find the vertices. To find those, one needs to either
    solve an exponential number of linear programs or an exponential number of linear
    system of equations. In the worst case, our approach can theoretically require
    as much work, but in practice, it never does.[⁷](#A457410_1_En_7_Chapter.html#Fn7)


    ![A457410_1_En_7_Fig2_HTML.jpg](A457410_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    `max{2x − 3, −2x + 12}` over the domain `[2, 5]`


    ```

    1  def maximax(s,a,x,b):

    2    n = len(a)

    3    d = [bounds_on_box(a[i],x,b[i]) for i in range(n)]

    4    zbound = [min(d[i][0] for i in range(n)), max(d[i][1] \

    5           for i in range(n))]

    6    z = s.NumVar(zbound[0],zbound[1],")

    7    delta = [reify(s,a[i]+[-1],x+[z],b[i],None,''=='') \

    8           for i in range(n)]

    9    k_out_of_n(s,1,delta)

    10    s.Maximize(z)

    11    return z,delta

    Listing 7-14

    How to Solve Maximax Problems (my or tools.py)

    ```


    The function `maximax` receives the solver `s` to which to add the maximax constraints,
    along with matrix `a` and arrays `x` and `b`, representing the `n` affine functions
    ![$$ \sum \limits_j{a}_{i,j}{x}_j+{b}_i $$](A457410_1_En_7_Chapter_IEq44.gif)
    for ![$$ i\in \left[0,n-1\right] $$](A457410_1_En_7_Chapter_IEq45.gif). We create
    the additional variable `z` which will become the objective to maximize. To set
    meaningful bounds on `z`, we use `bounds_on_box` to find the minima and maxima
    of all the affine functions on the domain of `x`. We use the minimum and maximum
    of those for our bounds.


    Each of these functions is then set equal to `z` and reified on a corresponding
    `delta[i]` so that ![$$ {\delta}_i=1\iff \sum \limits_j{a}_{i,j}{x}_j+{b}_i=z
    $$](A457410_1_En_7_Chapter_IEq46.gif). Finally, we force exactly one of the `delta[i]`
    to be one, or equivalently, one of the affine function constraints to be active.
    We set the objective and return both the objective and the array of indicators.
    This will provide the caller with all the necessary information at optimality.


    The solution to our small example is clearly `x = 2` with objective value `−2x
    + 12 = 8`. Indeed, running Listing [7-14](#A457410_1_En_7_Chapter.html#Par101)
    returns `8.0`, `[0, 1]` telling us that the second affine function is the active
    one.'
