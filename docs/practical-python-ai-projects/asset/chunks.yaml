    ### 6.3.2 Variations


    We have covered some variations by implementing optional parameters already. There
    are as many other variations as there are companies using staffing levels. The
    next step involves transforming this into a real scheduling model, assigning specific
    people to shifts. We will begin to tackle this later, but the reader is encouraged
    to ponder ways to implement true scheduling.


    ## 6.4 Job Shop Scheduling


    A rather difficult problem to solve is the following: consider set of jobs J to
    be performed on set of machines M. Each job requires some time on each of the
    machines to perform a specific task and has an order in which the tasks must be
    performed. You can think of building wooden toys. The wood needs to be cut to
    shape, then sanded, then primed, then painted, then covered in lacquer. Each of
    these tasks is accomplished by a different machine and requires a certain duration,
    which depends on the toy. The word “machine” here is used in a rather wide sense.
    It could indicate a highly trained worker at his station. It could be a robot.
    The idea is the same. Moreover, not all jobs need all machines. Some may require
    only a subset of the machines. The overall goal is to schedule time on each machine
    to do all tasks while minimizing the overall time used.


    The small example we will use to illustrate this model is given in Table [6-10](#A457410_1_En_6_Chapter.html#Tab10).


    Table 6-10


    Example of Job Shop Scheduling (for Each Job, the Machine and Duration of Tasks)


    | Job | Machine-Duration | Machine-Duration | Machine-Duration |

    | --- | --- | --- | --- |

    | J0 | 1-10 | 2-10 | 0-10 |

    | J1 | 1-5 | 0-8 | 2-5 |

    | J2 | 2-5 | 1-9 | 0-9 |

    | J3 | 0-6 | 2-9 | 1-5 |


    ### 6.4.1 Constructing a Model


    Since we are given the order of the tasks for each job, it is not part of the
    decision. The time at which a particular task is started for a given job on a
    given machine is what we seek. We will therefore use a decision variable indicating
    the starting time:


    ![$$ {x}_{ik}\in \left[0,\infty \right)\forall i\in J,\forall k\in M $$](A457410_1_En_6_Chapter_Equk.gif)


    We are not making the assumption that the durations are given as integers so that
    the decision variable is continuous.


    The first type of constraints puts a lower bound on the starting times. Consider,
    say, that job 7 must use machine 4 for 3 hours before it goes to machine 6, then
    the starting time is x [74] + 3 ≤ x [76]. In general, assuming that p [i] is the
    vector of order of machines of job i (a permutation of 0, 1, 2, … , M − 1) with
    duration vector d [i] , we are led to


    ![$$ {x}_{i{p}_{ik}}+{d}_{ik}\le {x}_{i{p}_{ik+1}}\forall i\in J,\forall k\in
    \left[0,\dots, |M|-2\right] $$](A457410_1_En_6_Chapter_Equl.gif)


    The difficulty in this problem stems from enforcing that, at any given time, there
    is at most one job per machine. It is acceptable for a machine to be idle, though
    we will try to minimize idleness. How can we enforce this constraint?


    One way is to introduce an additional variable that will indicate the relative
    order of jobs on a given machine. For instance,


    ![$$ {z}_{ijk}\in \left\{0,1\right\},\forall i,j,\in J,\forall k\in M, $$](A457410_1_En_6_Chapter_Equm.gif)


    with the interpretation that zijk = 1 if and only if job i precedes job j on machine
    k. Note that, as either job i precedes job j or vice-versa,


    ![$$ {z}_{ijk}=1\iff {z}_{jik}=0 $$](A457410_1_En_6_Chapter_Equn.gif)


    With this variable we can try to enforce our difficult condition. Consider again
    a simple example. Say that job 7 needs machine 2 for 3 hours and job 5 needs it
    for 4 hours. Then either x [72] + 3 ≤ x [52], indicating that job 5 cannot start
    until job 7 has ended on machine 2, or else that x [52] + 4 ≤ x [72] indicating
    the reverse temporal condition. This is a disjunction; we need one or the other
    of the constraints to hold.


    Using variables z [i   jk] this condition can be enforced by considering, for
    all jobs i, j and all machines k,


    ![$$ {\displaystyle \begin{array}{l}\kern4.25em {z}_{ij k}=1-{z}_{ji k}\\ {}{x}_{i{p}_{ik}}+{d}_{ik}-M{z}_{ij{p}_{ik}}\le
    {x}_{j{p}_{ik}}\\ {}{x}_{j{p}_{jk}}+{d}_{jk}-M{z}_{ji{p}_{jk}}\le {x}_{i{p}_{jk}}\end{array}}
    $$](A457410_1_En_6_Chapter_Equo.gif)


    for some large enough value M. Note that only one of the two z [i   jk] or z [i   jk]
    will be one. Hence exactly one of the two inequalities will constraining. The
    other will be vacuously satisfied.


    All that is left is to deal with the objective function. We want a schedule that
    will complete all jobs in the least amount of time. We could add a bound to the
    end of each job and minimize that bound. For instance,


    ![$$ {x}_{i{p}_{ik}}+{d}_{i{p}_{ik}}\le T\forall i\in J,\forall k\in \left[0,\dots,
    |M|-1\right] $$](A457410_1_En_6_Chapter_Equp.gif)


    with objective


    minT


    where T will be the completion time of the last task on the last machine.'
  trans: "\n#### 6.3.1.4 可执行模型\n\n该模型将接收一个时间与班次对应的 0-1 矩阵 `M`，与表 6-4 完全一致，同时还会接收一个被视为全职的班次数。如果问题中没有兼职人员，该数字将等于\
    \ `M` 的列数。最后一列表示每个时间间隔的最低需求。最后一行表示指定班次中一名工人的成本。\n\n为了使该模型更实用，可以为其提供一个数组 `Q`，该数组以班次为索引，表示每个班次的最少人数。还可以为其提供一个标量\
    \ `P`，表示必须工作的全职人员数量。最后，还可以提供一个标志 `no_part`，如果该标志为 `True`，则表示除非有全职人员在场，否则不会有兼职人员工作。\n\
    \n```\n1  def solve_model(M,nf,Q=None,P=None,no_part=False):\n2    s = newSolver('Staffing',\
    \ True)\n3    nbt,n = len(M)-1,len(M[0])-1\n4    B = sum(M[t][-1] for t in range(len(M)-1))\n\
    5    x = [s.IntVar(0,B,\") for i in range(n)]\n6    for t in range(nbt):\n7  \
    \    s.Add(sum([M[t][i] * x[i] for i in range(n)]) >= M[t][-1])\n8    if Q:\n\
    9      for i in range(n):\n10        s.Add(x[i]  >=  Q[i])\n11    if P:\n12  \
    \    s.Add(sum(x[i] for i in range(nf)) >= P)\n13    if no_part:\n14      for\
    \ t in range(nbt):\n15        s.Add(B*sum([M[t][i] * x[i] for i in range(nf)])\
    \ \\\n16             >= sum([M[t][i] * x[i] for i in range(nf,n)]))\n17    s.Minimize(sum(x[i]*M[-1][i]\
    \ for i in range(n)))\n18    rc  = s.Solve()\n19    return rc, ObjVal(s), SolVal(x)\n\
    Listing 6-4\n人员配置模型 (staffing.py)\n```\n\n在提取时间间隔数量、班次数量，并在第 4 行计算决策变量的一个界限后，我们将决策变量定义为一个非负整数。我们使用的界限显然是有效的，因为它是所有所需人员的总和。\n\
    \n我们在第 7 行实现了公式 (6.6) 的基本约束。然后，接下来的三个 `if` 语句实现了可选约束：最低全职人员数量、全职人员必须工作，以及若无全职人员则无兼职人员。\n\
    \n仅应用基本约束的结果如表 6-8 所示，而将 `no_part` 标志设置为 `True` 则得到表 6-9。请注意，在此示例中，工作总人数没有变化，但人员在各班次中的分布发生了变化，从而提高了总成本。\n\
    \n**表 6-9**  \n在“无全职则无兼职”约束下的最优解\n\n| $3225.47 | 班次 0 | 班次 1 | 班次 2 | 班次 3 | 班次\
    \ 4 | 班次 5 | 班次 6 |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| 人数:71\
    \ | 14 | 3 | 15 | 1 | 19 | 3 | 16 |\n\n**表 6-8**  \n基本人员配置水平问题的最优解\n\n| $3187.84\
    \ | 班次 0 | 班次 1 | 班次 2 | 班次 3 | 班次 4 | 班次 5 | 班次 6 |\n| --- | --- | --- | ---\
    \ | --- | --- | --- | --- |\n| 人数:71 | 15 | 2 | 15 | 0 | 20 | 2 | 17 |\n\n###\
    \ 6.3.2 变体\n\n我们已经通过实现可选参数涵盖了一些变体。还有众多其他变体，就像使用人员配置水平的公司一样多。下一步是将此模型转化为一个真正的排班模型，将具体人员分配到各个班次。我们将在后面开始解决这个问题，但鼓励读者思考实现真正排班的方法。\n\
    \n## 6.4 作业车间调度\n\n一个相当难解决的问题如下：考虑在一组机器 `M` 上执行一组作业 `J`。每个作业需要在每台机器上花费一些时间来执行特定任务，并且任务必须按特定顺序执行。你可以想象一下制作木制玩具的过程。木材需要切割成型，然后打磨，再上底漆，然后上色，最后涂清漆。这些任务中的每一个都由不同的机器完成，并且需要一定的持续时间，具体取决于玩具。这里的“机器”一词含义相当广泛。它可以指在其工位上的高技能工人，也可以指机器人。其理念是相同的。此外，并非所有作业都需要所有机器。有些可能只需要一部分机器。总体目标是在每台机器上安排时间以完成所有任务，同时最小化总耗时。\n\
    \n我们将用于说明此模型的小例子如表 6-10 所示。\n\n**表 6-10**  \n作业车间调度示例（每个作业的任务机器及持续时间）\n\n| 作业\
    \ | 机器-持续时间 | 机器-持续时间 | 机器-持续时间 |\n| --- | --- | --- | --- |\n| J0 | 1-10 | 2-10\
    \ | 0-10 |\n| J1 | 1-5 | 0-8 | 2-5 |\n| J2 | 2-5 | 1-9 | 0-9 |\n| J3 | 0-6 | 2-9\
    \ | 1-5 |\n\n### 6.4.1 构建模型\n\n由于我们已知每个作业的任务顺序，因此这并非决策的一部分。我们寻求的是在给定机器上为给定作业开始特定任务的时间。因此，我们将使用一个表示开始时间的决策变量：\n\
    \n`x_{ik} ∈ [0, ∞) ∀ i ∈ J, ∀ k ∈ M`\n\n我们并不假设持续时间是整数，因此决策变量是连续的。\n\n第一类约束对开始时间设置了下界。例如，假设作业\
    \ 7 必须在机器 4 上使用 3 小时，然后才能转到机器 6，那么开始时间满足 `x[74] + 3 ≤ x[76]`。一般来说，假设 `p[i]` 是作业\
    \ `i` 的机器顺序向量（0, 1, 2, …, `M − 1` 的一个排列），并带有持续时间向量 `d[i]`，我们得到：\n\n`x_{i p_{ik}}\
    \ + d_{ik} ≤ x_{i p_{ik+1}} ∀ i ∈ J, ∀ k ∈ [0, …, |M| − 2]`\n\n这个问题的难点在于强制规定在任何给定时间，每台机器上最多只能有一个作业。机器空闲是可以接受的，尽管我们会尽量最小化空闲时间。我们如何强制实施这个约束呢？\n\
    \n一种方法是引入一个额外的变量，该变量将指示作业在给定机器上的相对顺序。例如，\n\n`z_{ijk} ∈ {0, 1}, ∀ i, j ∈ J, ∀ k\
    \ ∈ M`\n\n其解释为：当且仅当作业 `i` 在机器 `k` 上先于作业 `j` 时，`z_{ijk} = 1`。请注意，由于要么作业 `i` 先于作业\
    \ `j`，要么反之，\n\n`z_{ijk} = 1 ⇔ z_{jik} = 0`\n\n利用这个变量，我们可以尝试强制实施这个困难的条件。再次考虑一个简单的例子。假设作业\
    \ 7 需要机器 2 工作 3 小时，而作业 5 需要它工作 4 小时。那么要么 `x[72] + 3 ≤ x[52]`，表示作业 5 必须等到作业 7 在机器\
    \ 2 上结束后才能开始，要么 `x[52] + 4 ≤ x[72]`，表示相反的时间条件。这是一个析取关系；我们需要满足其中一个约束。\n\n使用变量 `z[ijk]`，可以通过考虑所有作业\
    \ `i`、`j` 和所有机器 `k` 来强制实施此条件：\n\n```\nz_{ijk} = 1 - z_{jik}\nx_{i p_{ik}} + d_{ik}\
    \ - M z_{ij p_{ik}} ≤ x_{j p_{ik}}\nx_{j p_{jk}} + d_{jk} - M z_{ji p_{jk}} ≤\
    \ x_{i p_{jk}}\n```\n\n其中 `M` 是一个足够大的值。请注意，`z[ijk]` 或 `z[jik]` 中只有一个会为 1。因此，两个不等式中有且仅有一个具有约束力。另一个将自动满足。\n\
    \n剩下的就是处理目标函数。我们希望得到一个能在最短时间内完成所有作业的调度方案。我们可以为每个作业的结束时间添加一个界限，并最小化该界限。例如，\n\n\
    `x_{i p_{ik}} + d_{i p_{ik}} ≤ T ∀ i ∈ J, ∀ k ∈ [0, …, |M| − 1]`\n\n目标为\n\n`min\
    \ T`\n\n其中 `T` 将是最后一个机器上最后一个任务的完成时间。\n"
- fmt: '#### 6.4.1.1 Executable Model


    The executable code is seen in Listing [6-5](#A457410_1_En_6_Chapter.html#Par95).
    It assumes that the input is a list of tuples exactly as in Table [6-10](#A457410_1_En_6_Chapter.html#Tab10),
    indicating for each job the order of the machines needed with the duration of
    the task on each machine.


    ```

    1  def solve_model(D):

    2    s = newSolver(''JobuShopuScheduling'', True)

    3    nJ,nM   =   len(D),len(D[0])

    4    M = sum([D[i][k][1] for i in range(nJ) for k in range(nM)])

    5    x = [[s.NumVar(0,M,") for k in range(nM)] for i in range(nJ)]

    6    p = [[D[i][k][0] for k in range(nM)] for i in range(nJ)]

    7    d = [[D[i][k][1] for k in range(nM)] for i in range(nJ)]

    8    z = [[[s.IntVar(0,1,") for k in range(nM)] \

    9       for j in range(nJ)] for i in range(nJ)]

    10    T = s.NumVar(0,M,")

    11    for i in range(nJ):

    12      for k in range(nM):

    13        s.Add(x[i][p[i][k]] + d[i][k] <= T)

    14        for j in range(nJ):

    15          if i != j:

    16           s.Add(z[i][j][k]  ==  1-z[j][i][k])

    17           s.Add(x[i][p[i][k]] + d[i][k] - M*z[i][j][p[i][k]] \

    18               <= x[j][p[i][k]])

    19           s.Add(x[j][p[j][k]] + d[j][k] - M*z[j][i][p[j][k]] \

    20              <= x[i][p[j][k]])

    21      for k in range(nM-1):

    22        s.Add(x[i][p[i][k]] + d[i][k] <= x[i][p[i][k+1]])

    23    s.Minimize(T)

    24    rc = s.Solve()

    25    return rc,SolVal(T),SolVal(x)

    Listing 6-5

    Job Shop Scheduling Model (job shop.py)

    ```


    At line 4, we compute a value larger than the last possible end time by adding
    all durations of all tasks as if we had only one machine. This will be used to
    limit the domain of decision variables as well as bounding some constraints. Lines
    6 and 7 extract from the input tuples a vector of permutation of the machines
    and a vector of durations. This will allow us to write the code as closely as
    possible to the abstract mathematical description we used.


    The line 13 sets `T` as the upper bound on all the end times of all tasks. We
    will then minimize this `T` to obtain the shortest schedule. Line 22 is the translation
    of (6.4.1), enforcing that, for each job, the tasks are done in the order prescribed
    by the input tuples.


    Finally, the `if` block starting at line 15 is where the complex disjunction occurs.
    It enforces that, for every pair of tasks, one strictly precedes the other. It
    is possible to reduce the number of variables by half, but a good solver will
    do that automatically during a pre-processing phase.


    The result of our simple example is shown in Table [6-11](#A457410_1_En_6_Chapter.html#Tab11)
    and Figure [6-1](#A457410_1_En_6_Chapter.html#Fig1).


    **Table 6-11** Optimal Solution (S is Start Time; M is Machine; D is Duration)


    | | (S; M; D) | (S; M; D) | (S; M; D) |

    | --- | --- | --- | --- |

    | Job:0 | { 0.0; 1; 10 } | { 13.0; 2; 10 } | { 23.0; 0; 10 } |

    | Job:1 | { 10.0; 1; 5 } | { 15.0; 0; 8 } | { 23.0; 2; 5 } |

    | Job:2 | { 0.0; 2; 5 } | { 24.0; 1; 9 } | { 33.0; 0; 9 } |

    | Job:3 | { 0.0; 0; 6 } | { 28.0; 2; 9 } | { 37.0; 1; 5 } |


    ![A457410_1_En_6_Fig1_HTML.jpg](A457410_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** Graphical representation of schedule


    **Footnotes**


    [1](#A457410_1_En_6_Chapter.html#Fn1_source) Another questionable moniker. The
    variables are mixed, as some are continuous and other integral. Logic suggests
    that the name be mixed program (MP) or mixed continuous integer program (MCIP).


    [2](#A457410_1_En_6_Chapter.html#Fn2_source) Yes, more sadly unimaginative nomenclature.


    [3](#A457410_1_En_6_Chapter.html#Fn3_source) For the theoretically-minded, there
    are cases where multiplying the number of constraints is actually preferable as
