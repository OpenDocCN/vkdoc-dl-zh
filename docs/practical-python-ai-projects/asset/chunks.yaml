  trans: '

    ### 2.4.2.2 约束条件


    我们来处理连续性约束。我们需要为每种油和每个月（最后一个月除外）指定库存如何波动，因此：


    ![$$ {z}_{i,j}+{x}_{i,j}-{y}_{i,j}={z}_{i,j+1}\kern1.25em \ \kern0.28em \forall
    i\in O,\forall j\in M\backslash \left\{{n}_m\right\} $$](img/A457410_1_En_2_Chapter_Equ5.gif)


    (2.5)


    用文字表述，即月初持有的库存加上我们购买的库存减去我们混合的库存，构成了新的库存。


    每个月对总油量都有最小和最大存储容量限制，即：


    ![$$ {C}_{min}\le \sum \limits_i{z}_{i,j}\le {C}_{max}\kern1.25em \ \kern0.28em
    \forall j\in M $$](img/A457410_1_En_2_Chapter_Equaa.gif)


    接下来是混合约束，或者更确切地说是一组约束，因为我们需要针对一定数量的脂肪酸设定目标。为了便于公式化，我们先提取总产量：


    ![$$ {t}_j=\sum \limits_i\ {y}_{i,j}\kern1em \ \ \kern0.28em \forall j\in M $$](img/A457410_1_En_2_Chapter_Equab.gif)


    假设对于每种酸 `k ∈ A`，我们有一个目标范围 `[l[k], u[k]]`，并且每种油 `i ∈ O` 含有一定百分比 `p[i,k]` 的所需酸（表
    2-10）。由于每种酸的最终产品必须落在特定范围内，我们应该有两个约束：一个针对区间的下限，另一个针对上限。即：


    ![$$ \sum \limits_i\ {y}_{i,j}{p}_{i,k}\ge {l}_k{t}_j\kern4em \forall k\in A,\forall
    j\in M $$](img/A457410_1_En_2_Chapter_Equ6.gif)


    (2.6) 和


    ![$$ \sum \limits_i\ {y}_{i,j}{p}_{i,k}\le {u}_k{t}_j\kern4em \forall k\in A,\forall
    j\in M $$](img/A457410_1_En_2_Chapter_Equ7.gif)


    (2.7)


    这些约束可以不使用产量变量 `t[j]` 来编写，但那样会更繁琐且难以阅读。


    最后，我们需要满足需求。这很简单，假设每个月 `j` 的需求为 `D[j]`：


    ![$$ {t}_j\ge {D}_j\kern2em \forall j\in M $$](img/A457410_1_En_2_Chapter_Equac.gif)


    ### 2.4.2.3 目标函数


    我们已知目标是**最小化成本**，成本包括每个月变化的油品成本以及我们库存中持有的油品的固定存储成本。因此：


    ![$$ \sum \limits_i\sum \limits_j{x}_{i,j}{P}_{i,j}+\sum \limits_i\sum \limits_j{z}_{i,j}p
    $$](img/A457410_1_En_2_Chapter_Equad.gif)


    这种目标函数（固定成本加可变成本）在商业类问题中经常出现。在考虑为满足客户需求而选址设施时，你还会再次看到它。建造决策会产生固定成本，而服务不同客户则属于可变成本。


    ### 2.4.2.4 可执行模型


    现在，我们将此转化为可执行代码，如清单 2-6 所示。需要传入相当多的数据。假设数组 `Part` 如表 2-10 所示，`Target` 如表 2-11
    所示，`Cost` 如表 2-12 所示，`Inventory` 如表 2-13 所示，此外还有三个参数：以吨为单位的 `D`（需求），以美元每吨为单位的
    `SC`（存储成本），以及以吨为单位的 `SL`（库存持有量的最小值和最大值）。


    从第 5 行到第 11 行，我们声明变量，但只有前三个是真正的决策变量。所有其他变量都是人为引入的，要么是为了帮助我们陈述约束条件（第 8 行和第 11 行），要么是为了帮助我们显示结果解决方案的一些细节。它们不会以任何明显的方式影响求解器的运行时间，但会让我们的工作更轻松。


    在第 12 行，我们设置 `Hold` 变量，使其包含规划期开始时已知的库存量。


    从第 14 行开始的大循环将设置所有约束条件，因为每个月的约束结构相同，并且我们已经将变量声明为按月索引的数组。


    第 15 行设置人工变量 `Prod`，使其成为混合油的总和。这实际上不是一个约束，而是一个简化技巧。如果我们在模型中重复某些计算，就像这样：


    ```

    sum(Blnd[i][j] for i in range(nO)

    ```


    我们应该考虑引入一个人工变量。假设求解器性能不错，这不会增加任何成本，而且很可能有所帮助。编程（和建模）的原则之一是“不要重复自己”。


    我们紧接着在第 16 行使用这个 `Prod` 变量来确保满足需求。如果需求是一个标量，我们为每个月设置相同的值，但它也可以是一个按月索引的数组。


    从第 17 行开始的 `if` 代码实现了我们在方程 (2.5) 中描述的连续性要求。我们确保当月购买的量加上月初持有的量等于当月混合的量加上为下个月存储的量。条件判断是为了避免对超出规划期范围的月份设置约束。


    第 20 行和第 21 行确保了我们库存中油品的上下限。


    从第 22 行开始的循环首先定义了辅助变量 `Acid`，以简化接下来两行中陈述的混合约束的公式化，这两行对应于方程 (2.6) 和 (2.7)。`Acid`
    按脂肪酸 `k` 的序号和所考虑的月份 `j` 进行索引，其值是对所有油品中混合量乘以该油品中酸 `k` 的百分比进行求和。这个值除以总混合量，就是必须落在所需范围内的百分比。


    最后，从第 26 行开始的四行设置了人工变量，这些变量将保存每个时期的采购和持有成本，然后对它们求和以构建我们将要最小化的目标函数。

    '
- fmt: "```python\n1  def solve_model(Part,Target,Cost,Inventory,D,SC,SL):\n2    s\
    \ = newSolver('Multi-period soap blending problem')\n3    Oils= range(len(Part))\n\
    4    Periods, Acids = range(len(Cost[0])), range(len(Part[0]))\n5    Buy = [[s.NumVar(0,D,'')\
    \ for _ in Periods] for _ in Oils]\n6    Blnd = [[s.NumVar(0,D,'') for _ in Periods]\
    \ for _ in Oils]\n7    Hold = [[s.NumVar(0,D,'') for _ in Periods] for _ in Oils]\n\
    8    Prod = [s.NumVar(0,D,'') for _ in Periods]\n9    CostP= [s.NumVar(0,D*1000,'')\
    \ for _ in Periods]\n10    CostS= [s.NumVar(0,D*1000,'') for _ in Periods]\n11\
    \    Acid = [[s.NumVar(0,D*D,'') for _ in Periods] for _ in Acids]\n12    for\
    \ i in Oils:\n13      s.Add(Hold[i][0] == Inventory[i][0])\n14    for j in Periods:\n\
    15      s.Add(Prod[j] == sum(Blnd[i][j] for i in Oils))\n16      s.Add(Prod[j]\
    \ >= D)\n17      if j = SL[0])\n21      s.Add(sum(Hold[i][j] for i in Oils) =\
    \ Target[0][k] * Prod[j])\n25      s.Add(Acid[k][j] <= Target[1][k] * Prod[j])\n\
    26    s.Add(CostP[j] == sum(Buy[i][j] * Cost[i][j] for i in Oils))\n27    s.Add(CostS[j]\
    \ == sum(Hold[i][j] * SC for i in Oils))\n28  Cost_product = s.Sum(CostP[j] for\
    \ j in Periods)\n29  Cost_storage = s.Sum(CostS[j] for j in Periods)\n30  s.Minimize(Cost_product+Cost_storage)\n\
    31  rc = s.Solve()\n32  B,L,H,A = SolVal(Buy),SolVal(Blnd),SolVal(Hold),SolVal(Acid)\n\
