- fmt: 'We then call on the solver at line 12 to do its job. This is where all the
    computational work gets done, work that I will not describe. The interested reader
    can search for “simplex method” and “interior-point methods” to learn about the
    fascinating theory[^(11)](#A457410_1_En_1_Chapter.html#Fn11) behind the solution
    methods of linear optimization models. To understand the simplex method, one needs
    only high school algebra. To understand interior-point methods requires a somewhat
    more mathematical background.


    For some models, solvers may complete their work in a fraction of a second; for
    others, it may take hours. Moreover, not all solvers will have the same runtime
    behavior. Model A may run faster than model B on solver X while it may be exactly
    the reverse on solver Y. One more advantage of using the OR-Tools library is that
    we can try out another solver by changing one line.


    We should, if this code were meant for production and the problem nontrivial,
    check the return value to ensure that the solver found an optimal solution. It
    may have aborted because of a model error, or because it ran out of time or memory,
    or for some other reason. But for this simple first example, we will forgo good
    engineering practice in the name of simplicity of exposition.


    We return, on line 13, both the optimal objective function value held in variable
    `pop` and the optimal values of the decision variables (not all the associated
    object attributes carried by those variables).


    On more complex models, we may post-process the decision variables to return something
    simpler and more meaningful to the caller. You will see a good example of this
    when we solve the shortest path problem in Chapter [4](#A457410_1_En_4_Chapter.html),
    Section 4.4. The general approach I encourage is to create models that can be
    used without any knowledge of the internals of OR-Tools. The modeler is responsible
    for the creation of the model, but once the model is created and validated, it
    should leave the hands of its creator for those of the domain expert who originally
    formulated the problem.


    When the diligent reader executes Listing [1-2](#A457410_1_En_1_Chapter.html#Par108),
    she will observe a result similar to Table [1-3](#A457410_1_En_1_Chapter.html#Tab3).


    **Table 1-3** Solution to the Coexistence Problem


    | Specie | Count |

    | --- | --- |

    | Toads | 100.0 |

    | Salamanders | 300.0 |

    | Caecilians | 1000.0 |

    | Total | 1400.0 |


    ```

    1  from __future__ import print_function

    2  from coexistence import solve_coexistence

    3  pop,x=solve_coexistence()

    4  T=[[''Specie'', ''Count'']]

    5  for i in range(3):

    6    T.append([[''Toads'',''Salamanders'',''Caecilians''][i], x[i]])

    7  T.append([''Total'', pop])

    8  for e in T:

    9    print (e[0],e[1])

    Listing 1-2

    How to Execute the Coexistence Model

    ```


    Notice that you can look at the solution of Table [1-3](#A457410_1_En_1_Chapter.html#Tab3)
    and see that it does indeed satisfy the constraints. By substituting the solution
    into (1.1)-(1.3), we obtain


    | 2(100.0) + 300.0 + 1000.0 = 1500 | ≤ 1500, |

    | 100.0 + 3(300.0) + 2(1000.0) = 3000 | ≤ 3000, |

    | 100.0 + 2(300.0) + 3(1000.0) = 3700 | < 5000. |


    Notice that the first two inequalities are satisfied with equality. In the jargon
    of optimization, such inequalities are tight or active. The last one is said to
    be slack or inactive. In a certain sense, we could delete it from the problem
    and nothing would change. (The reader can try this and other modifications. The
    code is available in the additional material under the name `coexistence.py`).


    In summary, the steps to construct and run a model are the following and are shown
    in Figure [1-1](#A457410_1_En_1_Chapter.html#Fig1):


    ![A457410_1_En_1_Fig1_HTML.gif](A457410_1_En_1_Fig1_HTML.gif)


    **Figure 1-1** The steps to construct and run a model


    *   Formulate the question precisely.

    *   Define the decision variables by identifying what is required to answer the
    question.

    *   Possibly define auxiliary variables to help simplify the statements of constraints
    or of the objective function. They can also help in the analysis and the presentation
    of the solution.

    *   Translate each constraint into an algebraic equality or inequality involving
    directly the decision variables or indirectly through the auxiliary variables.

    *   Construct the objective function as some quantity that should be minimized
    or maximized.

    *   Run the model using an appropriate solver.

    *   Display the solution in an appropriate manner.

    *   Validate the results. Does the solution correctly satisfy the constraints?
    Is the solution meaningful and implementable? If so, declare that you are done;
    if not, consider the necessary modifications to the model.


    The rest of this book will construct models of increasing complexity, illustrating
    and expanding the points above.


