    \ |\n\n为了说明边界情况，我们设置一个边界 `x ≥ 310`，即一个区间的起点，并在表 3-3 中观察结果。请注意，在这种情况下，只有一个 `δ`\
    \ 非零，并且其权重设置为最大值 1。\n\n作为边界情况的最后一个示例，我们强制 `x ≥ 1`。结果如表 3-4 所示。\n\n**表 3-4**  \n\
    在 `x ≥ 1` 条件下凸分段目标函数的最优解\n\n| 区间 | 0 | 1 | 2 | 3 | 4 | 5 | 6 | 解 |\n| --- | ---\
