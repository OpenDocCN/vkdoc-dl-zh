- fmt: '#### 5.3.1.2 Constraints


    First, we need to establish a relationship between our `x[i,j]` and `y[j]` variables
    since we must have a given `y[j]` equal to one (truck `j` used) if `x[i,j]` is
    one for any `i`. Another way to view this is that we cannot put packages in a
    truck we do not use. You have seen this type of constraint before. Recall the
    diet problem of Section 2.1.2 in Chapter [2](#A457410_1_En_2_Chapter.html), where
    one of the constraints was “If food 2 is used, then we must have at least as much
    food 3 in the diet.”


    The general idea is to ensure that one variable is bounded by another or by a
    multiple of another. In this case, that trick suggests using


    ![$$ {x}_{i,j}\le {y}_i\forall i\in P,\forall j\in T $$](A457410_1_En_5_Chapter_Equ2.gif)


    (5.2)


    This does satisfy our relationship, although it may look rather wasteful to the
    reader. Indeed, we will prune this attempt shortly. Note coincidentally that we
    also need to bind the sum of the package weights in every certain truck. Assuming
    that package `i` has weight `w[i]` and truck `j` has capacity `W[j]`, we need


    ![$$ \sum \limits_{i\in P}{w}_i{x}_{i,j}\le {W}_j\forall j\in T $$](A457410_1_En_5_Chapter_Equ3.gif)


    (5.3)


    Here is the obvious question now, once we notice the explosion of similar constraints:
    “Is there a way to combine equations (5.2) and (5.3)?” Indeed there is:


    ![$$ \sum \limits_{i\in P}{w}_i{x}_{i,j}\le {W}_j{y}_j\forall j\in T $$](A457410_1_En_5_Chapter_Equ4.gif)


    (5.4)


    We can see that equation (5.4) subsumes both of (5.2) and (5.3). We have reduced
    the number of constraints from `|P||T| + |T|` to `|T|`, a non-trivial improvement.


    At this point, our model guarantees that


    * A truck is used if any package is loaded in it.

    * The sum of the package weights in a truck respects its capacity.


    Last, we ensure that each package finds its way to some truck:


    ![$$ \sum \limits_{i\in T}{x}_{i,j}=1\forall i\in P $$](A457410_1_En_5_Chapter_Equ5.gif)


    (5.5)


    #### 5.3.1.3 Objective


    The simplest objective is to minimize the number of trucks used, therefore


    ![$$ \min \kern0.125em \sum \limits_{j\in T}{y}_j $$](A457410_1_En_5_Chapter_Equi.gif)


    #### 5.3.1.4 Executable Model


    We will assume that the function receives array `D` containing a list of packages
    with their weights and the count of packages of each weight (we will call these
    weight classes), exactly as in Table [5-5](#A457410_1_En_5_Chapter.html#Tab5).
    It also receives a weight capacity for each truck in `W`. The third parameter,
    optional, will be explained after we solve our small example. Just note that its
    default value is `False` and in that case, a large set of, as yet unexplained,
    constraints are skipped (lines 17 to 27). See Listing [5-3](#A457410_1_En_5_Chapter.html#Par79).


    ```

    1  def solve_model(D,W,symmetry_break=False,knapsack=True):

    2    s = newSolver(''BinuPacking'',True)

    3    nbC,nbP = len(D),sum([P[0] for P in D])

    4    w = [e for sub in [[d[1]]*d[0] for d in D] for e in sub]

    5    nbT,nbTmin = bound_trucks(w,W)

    6    x = [[[s.IntVar(0,1,'''') for _ in range(nbT)] \

    7       for _ in range(d[0])] for d in D]

    8    y = [s.IntVar(0,1,'''') for _ in  range(nbT)]

    9    for k in range(nbT):

    10      sxk = sum(D[i][1]*x[i][j][k] \

    11              for i in range(nbC) for j in range(D[i][0]))

    12      s.Add(sxk = y[k+1])

    19      for i in range(nbC):

    20        for j in range(D[i][0]):

    21          for k in range(nbT):

    22            for jj in range(max(0,j-1),j):

    23              s.Add(sum(x[i][jj][kk] \

    24               for kk in range(k+1)) >= x[i][j][k])

    25            for jj in range(j+1,min(j+2,D[i][0])):

    26              s.Add(sum(x[i][jj][kk] \

    27                for kk in range(k,nbT))>=x[i][j][k])

    28    if knapsack:

    29      s.Add(sum(W*y[i] for i in range(nbT)) >= sum(w))

    30    s.Add(sum(y[k] for k in range(nbT)) >= nbTmin)

    31    s.Minimize(sum(y[k] for k in range(nbT)))

    32    rc = s.Solve()

    33    P2T=[[D[i][1], [k for j in range(D[i][0]) for k in range(nbT)

    34                 if SolVal(x[i][j][k])>0]] for i in range(nbC) ]

    35    T2P=[[k, [(i,j,D[i][1]) \

    36      for i in range(nbC) for j in range(D[i][0])\

    37            if SolVal(x[i][j][k])>0]] for k in range(nbT)]

    38    return rc,ObjVal(s),P2T,T2P

    Listing 5-3

    Bin Packing Model (bin_packing.py)

    ```


    At line 4 we construct an array of weights, one per package. This implicitly also
    assigns an ordinal to each package. The function `bound_trucks`, described in
    Listing [5-4](#A457410_1_En_5_Chapter.html#Par103), uses the weights of the packages
    and the capacity of each truck to quickly estimate an upper bound on the number
    of trucks. This function does not need to be brilliant, but a better bound tends
    to accelerate the solver.


    The two lines starting at 7 define our decision variables: one to assign packages
    to trucks, and one to select trucks. The package variable is a three-dimensional
    array. The first dimension indicates the weight class, the second is the ordinal
    within the class, and the third is the truck. So that if, for example, `x[2][3][5]`
    has value of 1, it will mean that package three of the weight class two is loaded
    onto truck five.


    The constraint at the loop on line 9 is a transcription of equation (5.4), our
    merged constraint to both force the truck selection variable and to limit the
    total package weight carried by a truck, modified to use the three-dimensional
    decision variables.


    The final constraint at line 15 is a transcription of equation (5.5) to ensure
    all packages find a truck.


    Ignore the lines starting at 16 and guarded by the `symmetry_break` parameter,
    for now.'
