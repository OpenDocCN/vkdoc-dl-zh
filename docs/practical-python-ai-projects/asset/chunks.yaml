    [6](#A457410_1_En_5_Chapter.html#Fn6_source)\n\nFor the theoretically minded,\
    \ this is a case of dual-degeneracy.\n\n[7](#A457410_1_En_5_Chapter.html#Fn7_source)\n\
    \nThe symmetry stems from visualizing the search tree and noticing that there\
    \ are multiple branches with exactly the same structure and value.\n\n[8](#A457410_1_En_5_Chapter.html#Fn8_source)\n\
    \nWhether the trace comes back to the origin is irrelevant from a complexity standpoint.\
    \ We can assume a distance zero between Vcc and Vee if need be.\n\n[9](#A457410_1_En_5_Chapter.html#Fn9_source)\n\
    \nSee [`www.math.uwaterloo.ca/tsp/concorde.html`](http://www.math.uwaterloo.ca/tsp/concorde.html)\
    \ for instance\n\n# 6. Classic Mixed Models\n\nThis section we will develop models\
    \ for problems requiring a mix of continuous and integral variables, as well as\
    \ a variety of constraints. Traditionally these models have been called mixed\
    \ integer programs (MIP).[¹](#A457410_1_En_6_Chapter.html#Fn1)\n\nI will cover\
    \ a few of the classical problems that require a combination of continuous and\
    \ discrete variables. The prototypical and simplest situation, exhibited by facility\
    \ location, is when we have continuous objects floating around a network, but\
    \ where the existence of the network nodes is subject to an optimizing decision.\
    \ At the other extreme, one of the hardest situations is the job shop scheduling\
    \ problem, where we want to construct a sequence of operations of various machines\
    \ subject to precedence constraints.\n\nThese mixed models vary greatly in difficulty.\
    \ There is practically no limit to the size of problems we can solve in the former\
    \ instance, yet problems of the latter type with a dozen elements will prove,\
