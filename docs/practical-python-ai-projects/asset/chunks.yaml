- fmt: '### 2.1.2 Variations


    There are a number of simple variations of this problem.


    - Instead of minimizing cost, we could be given a profit to maximize. We could
    also not have either the minima or the maxima in either the foods or nutrients.

    - It becomes more complex, and consequently interesting, when we have, in addition,
    requirements of the form “If food 2 is used, then we must have at least as much
    food 3 in the diet” or “Nutrient 3 must be included in at least twice the amount
    as nutrient 4.” Let’s consider some of these in detail. First, let’s try “If food
    2 is used, then food 3 must also be included in at least as many servings.” The
    following inequality ensures the required result: `f[3] >= f[2]`. Notice that
    food 3 could still be included when food 2 is not, but that does not violate the
    requirement. And if food 2 is included, then we will have at least as many servings
    of food 3. It should be clear that the requirement could have been stated in reverse
    as “No more food 2 than food 3.” The constraint is the same.

    - A requirement on the nutrients, “Nutrient 3 must be included in at least twice
    the amount as nutrient 4,” has a similar flavor but note that the amount of any
    given nutrient is spread among all food items. It may be fruitful to introduce
    auxiliary variables that will tally the nutrients, say `n[j]`. We then add to
    the model one equality per nutrient:


    ```

    n_j <= sum_i N_ij * f_i

    ```


    Note that these equations do not constrain the problem; their insertion is simply
    a helpful device to implement the requirement. We can now easily relate the nutrient
    content according to the new requirement as:


    ```

    n_3 >= 2 * n_4

    ```


    This we could have stated, had we not defined the variables `n[i]`, as:


    ```

    sum_i N_i3 * f_i >= 2 * sum_i N_i4 * f_i

    ```


    Defining the auxiliary variables `n[j]` seems clearer. Moreover, displaying the
    total of each nutrient at the end might help with the analysis or the presentation
    of the solution.


    - A similar requirement may occur to the reader, namely “If food (nutrient) 3
    is used then food (nutrient) 4 must not be (and vice versa).” This may look like
    a simple variation to the above but it is decidedly not simple. In fact, it forces
    the modeler to use a different modeling technique. You will see how to implement
    such requirements in later chapters (see, for instance, Section 7.2 in Chapter
    7). There are two valid approaches to modeling such requirements properly: integer
    programming and constraint programming. The reader is encouraged to spend some
    time trying to model such constraints to develop intuition into the difficulties.
    The key, and the reason that this is a beast of an entirely different ilk, is
    that the change is not uniquely quantitative (as much as, or twice the amount
    of) but is additionally qualitative: we transition between having an element and
    not having that element.


    ### 2.1.3 Structure of the Problems Under Consideration


    Problems with the structure of the diet problem are generally known as product
    mix problems. They can be presented in various ways but if they can be fitted
    into the abstract Table 2-2 they can all be handled in the manner described in
    this section. Of course, it may be that some of the columns or rows are missing
    (no cost, or no price, or no maximum demand, etc.). That only simplifies the model.


    **Table 2-2** Abstract Structure of Product Mix Problems


    |       |       | Components | Availabilities | Cost |

    |-------|-------|------------|----------------|------|

    |       |       | `C[1]` ... `C[n]` | Min | Max |      |

    |       | `P[1]` | 99 ... 99 | 99 | 99 | 99 |

    | Products | ... | ... ... ... | ... | ... | ... |

    |       | `P[m]` | 99 ... 99 | 99 | 99 | 99 |

    | Demands | Min | 99 ... 99 | 99 | 99 | 99 |

    |       | Max | 99 ... 99 | 99 | 99 | 99 |

    | Price |       | 99 ... 99 | 99 | 99 | 99 |


    The decision variable indicates the amount of product needed and the constraints
    indicate availabilities of the raw material or, equivalently, capacities of the
    processing units as well as demand bounds. The objectives are often profits to
    maximize or costs to minimize or, simply, quantity to produce.


    Here are a few instances to help the reader recognize the underlying structure.
    The reader is encouraged to marshal the problems into the format of Table 2-2
    by inventing numbers.


    - A factory is producing cement of various types. Each product is composed of
    the same elements, but in various quantities, and we have on hand a limited supply
    of each of these elements, each with a cost. To each final product is associated
    a profit. What is the best mix of product to produce to maximize profit?

    - A Florida-based fruit company produces orange drinks, juices, and concentrates
    for various markets. The raw materials for all products are oranges, sugar, water,
    and time in various quantities, some positive and some negative (producing orange
    drinks requires water; producing concentrates generates water). Given certain
    availabilities, how much can the company produce to maximize profit?

    - A toy manufacturer produces a number of different toys. Each is composed of
    a number of basic materials and, in addition, requires special processing (assembling,
    painting, boxing). The processing is done on specialized machines and has a duration.
    Since the manufacturer has limited supplies of materials and machines, which can
    only operate a certain number of hours per day, how many toys can be produced?

    - A fertilizer company named Bush, Rove and Company (BR & Co.) has two products:
    a high phosphate blend and a low phosphate blend. They are produced by mixing
    different raw materials in various quantities. The company can procure, from its
    own subsidiaries, at most some amount of each raw material per day at a fixed
    internal cost. This cost includes labor, power, depreciation, delivery, bribes,
    etc. In addition, the mixing process incurs a certain cost per ton for each product.
    Both products are sold to a wholesaler, Fox Inc., at a fixed price. Moreover,
    the wholesaler has agreed to buy all the production BR & Co. can produce. How
    much of each fertilizer should it produce?

    - Queequeg sells half-kilo bags of coffee in three blends, House, Special, and
    Gourmet, which sell at different prices per bag. Each blend is made up of Colombian,
    Cuban, and Kenyan coffee beans in various proportions. Queequeg has on hand some
    Colombian, Cuban, and Kenyan. How much of each blend should it bag to maximize
    revenues?'
