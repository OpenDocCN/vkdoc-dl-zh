    as in Listing [2-4](#A457410_1_En_2_Chapter.html#Par73). We will assume that the
    data are entered in two-dimensional arrays, exactly as in Tables [2-3](#A457410_1_En_2_Chapter.html#Tab3)
    and [2-4](#A457410_1_En_2_Chapter.html#Tab4), except for the first columns, added
    for reference only .


    ```

