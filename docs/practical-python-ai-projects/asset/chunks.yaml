    ![$$ \min \kern0.125em \sum \limits_{j\in K}j\ast {y}_j $$](A457410_1_En_7_Chapter_Equc.gif)


    But now our objective function value at optimality will not represent the number
    of rolls used, so we introduce an auxiliary variable, say t, and add


    ![$$ t=\sum \limits_j{y}_j $$](A457410_1_En_7_Chapter_Equd.gif)


    #### 7.1.1.3 Constraints


    We have two types of constraints. The first is to ensure that customer demands
    are satisfied. So, across all rolls used, we must verify that we cut enough rolls
    of the required order quantity, say b [i] ,


    ![$$ \sum \limits_{j\in K}{x}_{i,j}\ge {b}_i\forall i\in N $$](A457410_1_En_7_Chapter_Eque.gif)


    The second type of constraints is to make sure that the consumer rolls we cut
    off the product roll do not exceed the width of that large roll, or, assuming
    that order i has width w [i] , a percentage,


    ![$$ \sum \limits_{i\in N}{w}_i{x}_{i,j}\le 100\forall j\in K $$](A457410_1_En_7_Chapter_Equf.gif)


    But that is incomplete since we need to connect the x and y variables. No x [i,j]
    should be positive if the corresponding y [j] is zero. We could introduce a large
    number of constraints or, realizing that we have encountered this situation before,
    simply modify the last constraint to read


    ![$$ \sum \limits_{i\in N}{w}_i{x}_{i,j}\le 100{y}_j\forall j\in K $$](A457410_1_En_7_Chapter_Equg.gif)


    #### 7.1.1.4 Executable Model


    Let’s translate this into an executable model, as shown in Listing [7-1](#A457410_1_En_7_Chapter.html#Par18).
    It accepts a matrix D, exactly as in Table [7-1](#A457410_1_En_7_Chapter.html#Tab1).


    ```

    1  def solve_model(D):

    2    s,n = newSolver(''CuttinguStock'', True), len(D)

    3    k,b = bounds(D)

    4    y = [s.IntVar(0,1,") for i in range(k[1])]

    5    x = [[s.IntVar(0,b[i],") for j in range(k[1])] \

    6       for i in range(n)]

    7    w = [s.NumVar(0,100,") for j in range(k[1])]

    8    nb = s.IntVar(k[0],k[1],")

    9    for i in range(n):

    10      s.Add(sum(x[i][j] for j in range(k[1])) >= D[i][0])

    11    for j in range(k[1]):

    12      s.Add(sum(D[i][1]*x[i][j] for i in range(n)) = \

    16             sum(x[i][j+1] for i in range(n)))

    17    Cost = s.Sum((j+1)*y[j] for j in range(k[1]))

    18    s.Add(nb == s.Sum(y[j] for j in range(k[1])))

    19    s.Minimize(Cost)

    20    rc = s.Solve()

    21    rnb = SolVal(nb)

    22    return rc,rnb,rolls(rnb,SolVal(x),SolVal(w),D),SolVal(w)

    Listing 7-1

    Cutting Stock Model with Pattern Search (cutting_stock.py)

    ```


    At line 3 we call a routine bounds to find lower and upper bounds on the numbers
    of rolls we will require and on the number of rolls of each order that can fit
    in a roll. The upper bound on the number of rolls used on line 4 to create as
    many y as we could possibly need (and also on subsequent constraints related to
    each roll). The bound of the number of rolls of each type is used at the next
    line to establish the range for each x: on any given roll, we can have zero up
    to the number of elements that can fit or the number required by the customer,
    hence the min expression.


    Line 10 ensures that we satisfy every customer demand by summing over all rolls
    the elements of a given order. We could also have used an inequality here, namely
    ≥. The idea is that we may cut more than the customer demanded and then store
    these rolls in inventory, awaiting the next order. This sometimes makes sense,
    but is often better left out of the model. Once we have a solution that exactly
    satisfies customer demand, someone with an understanding of the situation and
    in possession of planning tools can decide how to best cut the leftover of the
    rolls. In either case, this will not change the total number of rolls used.


    Line 12 ensures that the consumer rolls cut off a roll do not add up to more than
    100% of the roll. And the next line, not a constraint, simply, computes the waste
    of each roll to help return a meaningful solution.


    The loop starting at 14 breaks the symmetry of multiple solutions that are equivalent
    for our purposes: any permutation of the rolls. These permutations, and there
    are K! of them, cause most solvers to spend an exorbitant time solving. With this
    constraint, we tell the solver to prefer those permutations with more cuts in
    roll j than in roll j + 1\. The reader is encouraged to solve a medium-sized problem
    with and without this symmetry-breaking constraint . I have seen problems take
    48 hours to solve without the constraint and 48 minutes with. Of course, for problems
    that are solved in seconds, the constraint will not help; it may even hinder.
    But who cares if a cutting stock instance solves in two or in three seconds? We
    care much more about the difference between two minutes and three hours, which
    is what this constraint is meant to address.


    We could use, for the objective function , the simple sum of the rolls used variable,
    y, and pre-process the unused rolls. But we used a little trick to make each additional
    roll more “expensive” by including an ordinal factor. This guarantees that if,
    say the number of rolls is estimated to be between 11 and 14 and we end up using
    12, they will be the first 12\. There will be no “holes.”'
