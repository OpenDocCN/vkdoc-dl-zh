- fmt: '#### 6.1.1.4 Executable Model


    The reader will recognize most of this model as it is identical to Listing [4-2](#A457410_1_En_4_Chapter.html#Par56).
    I will only highlight the differences.


    The solver receives, in addition to the distribution cost matrix `D`, which includes
    the demand and supply data, an array of fixed building costs, `F`.


    ```

    1  def solve_model(D,F):

    2    s = newSolver(''Facility_location_problem'', True)

    3    m,n = len(D)-1,len(D[0])-1

    4    B = sum(D[-1][j]*max(D[i][j] \

    5      for i in range(m)) for j in range(n))

    6    x = [[s.NumVar(0,D[i][-1],") for j in range(n)] \

    7       for i in range(m)]

    8    y = [s.IntVar(0,1,") for i in range(m)]

    9    Fcost, Dcost = s.NumVar(0,B,"),s.NumVar(0,B,")

    10    for i in range(m):

    11      s.Add(D[i][-1]*y[i] >= sum(x[i][j] for j in range(n)))

    12    for j in range(n):

    13      s.Add(D[-1][j] == sum(x[i][j] for i in range(m)))

    14    s.Add(sum(y[i]*F[i] for i in range(m)) == Fcost)

    15    s.Add(sum(x[i][j]*D[i][j] \

    16         for i in range(m) for j in range(n)) == Dcost)

    17    s.Minimize(Dcost + Fcost)

    18    rc  = s.Solve()

    19    return rc,ObjVal(s),SolVal(x),SolVal(y),\

    20         SolVal(Fcost),SolVal(Dcost)

    Listing 6-1

    Facility Location Model (facility_location.py)

    ```


    Line 11 links the decision to build a given plant to the amount transported from
    that plant. Note that if `y[i]` is zero, indicating that we do not build plant
    `i`, then the corresponding `x[i][..]` will all be zero, so that no product will
    flow out of that plant. In the other direction, if `y[i]` is one, then the product
    flowing out of the plant will never exceed its supply capacity `D[i][-1]`.


    The objective function at line 17 minimizes sum of the fixed building costs and
    the variable distribution costs.


    Finally, we return all the transported material as well as the decisions to build.
    The solution to this example appears in Table [6-3](#A457410_1_En_6_Chapter.html#Tab3)
    where it displays only the transport from the plants included in the building
    decision.


    **Table 6-3** Optimal Solution to the Facility Location


    |       | City 0 | City 1 | City 2 | City 3 | City 4 | City 5 | City 6 |

    |-------|--------|--------|--------|--------|--------|--------|--------|

    | Plant 2 |        | 1.0    |        |        |        |        | 634.0  |

    | Plant 4 |        |        | 472.0  |        |        | 51.0   |        |

    | Plant 5 |        | 235.0  |        |        | 441.0  |        |        |

    | Plant 6 | 553.0  |        |        |        | 63.0   |        |        |

    | Plant 7 |        | 356.0  |        |        |        | 247.0  |        |

    | Plant 8 |        |        |        | 495.0  |        | 139.0  |        |


    ### 6.1.2 Variations


    * The main variation has to do with capacities. It may be that the path between
    producers and consumers has a maximum capacity, say `c[i,j]`. This is trivially
    implemented by defining the variables with the appropriate domain, that is `0
    ≤ x[i,j] ≤ ci,j` or, in the executable, amend line 7 to read:


    ```

    x = [[s.NumVar(0,C[i][j],") for j in range(n)] for i in range(m)]

    ```


    In the case of a network with capacities, it may be worthwhile to revisit the
    big-M constraint used to set the building decision variable and prefer an alternative
    approach based on the capacity of the flow out of the plants.


    ## 6.2 Multi-Commodity Flow


    Previously discussed flow problems were easy integer problems because the integrality
    came for free. There was no need to declare variables as integers to get an integral
    optimal solution. But this is not the case when multiple commodities are carried
    by the same network; then we must explicitly specify all variables that must be
    integral.


    We can think of this problem as a series of transshipment problems overlaid on
    one network. Some nodes supply, some nodes demand, others can carry through, and
    there is more than one element to carry so that a node acting as a supplier for
    one element can be a consumer for another. As such, we will have a number of cost,
    demand, and supply data tables, as shown in Table [6-4](#A457410_1_En_6_Chapter.html#Tab4)
    for a small instance. The goal is, as in transshipment, to satisfy all demands.


    **Table 6-4** Example of Multi-Commodity Flow Cost Matrices


    | Comm 0 | N0  | N1  | N2  | N3  | N4  | Supply |

    |--------|-----|-----|-----|-----|-----|--------|

    | N0     |     | 20  | 23  | 23  | 24  | 532    |

    | N1     | 19  |     | 18  | 30  | 25  |        |

    | N2     |     |     |     | 13  | 19  |        |

    | N3     | 24  | 23  |     |     | 22  | 512    |

    | N4     | 23  | 10  |     |     |     |        |

    | Demand |     | 230 | 306 |     | 508 |        |


    | Comm 1 | N0  | N1  | N2  | N3  | N4  | Supply |

    |--------|-----|-----|-----|-----|-----|--------|

    | N0     |     | 23  | 29  | 14  | 15  | 533    |

    | N1     | 22  |     | 13  | 11  | 25  | 609    |

    | N2     | 20  | 20  |     | 13  | 11  | 634    |

    | N3     |     | 18  | 20  |     | 24  |        |

    | N4     |     |     | 11  | 22  |     |        |

    | Demand |     |     |     | 354 | 1422|        |


    | Comm 2 | N0  | N1  | N2  | N3  | N4  | Supply |

    |--------|-----|-----|-----|-----|-----|--------|

    | N0     |     | 30  | 17  | 19  | 30  |        |

    | N1     |     |     | 21  | 19  | 27  | 564    |

    | N2     |     |     |     | 29  | 27  | 588    |

    | N3     |     |     | 12  |     | 27  |        |

    | N4     | 27  | 15  |     | 16  |     |        |

    | Demand | 315 |     |     | 360 | 477 |        |


    ### 6.2.1 Constructing a Model


    The model will be described in stages.


    #### 6.2.1.1 Decision Variables


    As it simply is a set of transshipment problems on the same network, we need a
    decision variable per problem. So, if we assume `K` commodities, and a set of
    `N` nodes,


    ![$$ {x}_{k,i,j}\in \left[0,1,2,\dots \right]\forall i\in N,\forall j\in N,\forall
    k\in K $$](A457410_1_En_6_Chapter_Eque.gif)


    If variable `x[4,3,5]` is 6, it will mean to send 6 units of commodity 4 along
    arc `(3, 5)`.


    #### 6.2.1.2 Objective


    The objective is a simple generalization of the transshipment objective,


    ![$$ \min \sum \limits_k\sum \limits_i\sum \limits_j{C}_{k,i,j}{x}_{k,i,j} $$](A457410_1_En_6_Chapter_Equf.gif)


    where we now minimize the cost of shipping all commodities across the network.


    #### 6.2.1.3 Constraints


    The constraints are the generalized conservation of flow, taking care that they
    must all hold for each commodity separately:


    ![$$ \sum \limits_j{x}_{k,j,i}-\sum \limits_j{x}_{k,i,j}={D}_{k,i}-{S}_{k,i}\forall
    k\in K,i\in N $$](A457410_1_En_6_Chapter_Equ5.gif)


    (6.5)'
