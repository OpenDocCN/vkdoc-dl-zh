  trans: '

    ### 2.5.1 构建模型


    从代数角度看，一条直线是形如 `a[1] x[1] + a[2] x[2] = b` 的方程，其中 `a[1]`、`a[2]`、`a[0]` 为固定系数。或者，在
    `n` 维空间中，我们称之为超平面，其方程为：


    ![$$ \sum \limits_{i=1}^n{a}_i{x}_i={a}_0 $$](img/A457410_1_En_2_Chapter_Equae.gif)


    某个特定点 `x` 位于直线的某一侧意味着什么？这意味着要么 `a[1] x[1] + a[2] x[2] < a[0]`，要么 `a[1] x[1] +
    a[2] x[2] > a[0]`。这些严格不等式可以通过缩放来任意增大间隔。因此，我们可以将任务简化为寻找一个向量 `a`，使得对于 A 类中的每个点 `x′`，都有


    ![$$ \sum \limits_i{a}_i{x}_i^{\prime}\ge {a}_0+1 $$](img/A457410_1_En_2_Chapter_Equaf.gif)


    并且对于 B 类中的每个点 `x″`，都有


    ![$$ \sum \limits_i{a}_i{x}_i^{{\prime\prime}}\le {a}_0-1 $$](img/A457410_1_En_2_Chapter_IEq5.gif)


    让我们为每个数据点引入一个正变量，例如，对于 A 类的每个点引入 `y[i]′`，对于 B 类的每个点引入 `y[i]″`。现在，不等式 `∑[i] a[i]
    x[i] ≥ a[0] + 1` 可以通过要求以下条件来强制执行：


    ![$$ {y}^{\prime}\ge {a}_0+1-\sum \limits_i{a}_i{x}_i^{\prime } $$](img/A457410_1_En_2_Chapter_IEq6.gif)


    以及


    ![$$ {y}^{\prime}\ge 0 $$](img/A457410_1_En_2_Chapter_IEq7.gif)


    并将 `y′` 最小化为零。对于 B 类的点，代数运算是对称的。总而言之，我们得到了以下优化问题：


    ![$$ \min \sum \limits_{i\in A}\ {y}_i^{\prime }+\sum \limits_{i\in B}\ {y}_i^{{\prime\prime}
    } $$](img/A457410_1_En_2_Chapter_Equag.gif)


    ![$$ \mathrm{subject}\kern0.50em \mathrm{to}\kern0.50em {y}^{\prime}\ge {a}_0+1-\sum
    \limits_i{a}_i{x}_i^{\prime } $$](img/A457410_1_En_2_Chapter_IEq8.gif),


    ![$$ {y}^{{\prime\prime}}\ge \sum \limits_i{a}_i{x}_i^{{\prime\prime} }-{a}_0+1
    $$](img/A457410_1_En_2_Chapter_IEq9.gif),


    以及


    ![$$ {y}^{\prime },{y}^{{\prime\prime}}\ge 0 $$](img/A457410_1_En_2_Chapter_Equah.gif)


    该模型的一个特点是，如果最优目标值为零，我们就得到了一个能够正确将训练集分离为恶性细胞和良性细胞的超平面。但如果该值非零，则意味着该集合无法被超平面分离，因此需要更复杂的技术。


    ### 2.5.2 可执行模型


    让我们将其转换为清单 2-7 中所示的可执行模型。该模型接受两组具有任意数量特征的数据点，这些数据点由某位专家分类为 A 类和 B 类。在第 4 行和第 5
    行定义了 A 类和 B 类相对于超平面的潜在偏差后，我们在第 6 行定义了将保存超平面的变量。请注意，我们稍后需要这个超平面来对未知点进行分类。另请注意，系数可以被限制在包含零的任何区间内。只要区间包含零，就可以简单地缩放平面的所有系数，使其代数表达式位于我们选择的任何区间内。


    第 8 行和第 10 行的约束条件设置了每个点到超平面的偏移量，目标函数将尝试将其最小化为零。


    ```

    1  def solve_classification(A,B):

    2    n,ma,mb=len(A[0]),len(A),len(B)

    3    s = newSolver(''Classification'')

    4    ya = [s.NumVar(0,99,'''') for _ in range(ma)]

    5    yb = [s.NumVar(0,99,'''') for _ in range(mb)]

    6    a = [s.NumVar(-99,99,'''') for _ in range(n+1)]

    7    for i in range(ma):

    8      s.Add(ya[i] >= a[n]+1-s.Sum(a[j]*A[i][j] for j in range(n)))

    9    for i in range(mb):

    10      s.Add(yb[i] >= s.Sum(a[j]*B[i][j] for j in range(n))-a[n]+1 )

    11    Agap = s.Sum(ya[i] for i in range(ma))

    12    Bgap = s.Sum(yb[i] for i in range(mb))

    13    s.Minimize(Agap+Bgap)

    14    rc = s.Solve()

    15    return rc,ObjVal(s),SolVal(a)

    清单 2-7

    分类超平面的识别 (features.py)

    ```


    读者可能会对这个模型感到些许不适，原因至少部分如下：这是一个我们不关心最优值，只关心它是否为零的模型。决策变量（我们已经讨论过为什么这个说法如此不恰当）并没有做出任何决策。`y`
    变量集合除了表示一个点违反线性不等式的程度之外，没有真正的解释意义。最后，我们提取出的解中唯一的部分——超平面——尚未被使用。它只会在稍后的另一个程序中用于将新点分类为属于
    A 类或 B 类。通过这个模型，我们已经提升到了一个比以往任何时候都更高的抽象层面。


    #### 2.5.2.1 变体


    从这个模型出发，我们至少有三个方向可以探索。


    *   第一个方向是添加约束条件以提高返回超平面的质量。例如，我们可以要求它不仅分离两个集合，而且在某种意义上，与一个集合的距离与另一个集合的距离相等。如果训练集选择得当，这将确保我们后续将错误分类最小化。这被称为最大化间隔，我们将在后面的章节中讨论这个问题。

    *   第二个方向是研究当最优值不为零时该怎么办；也就是说，当两个集合无法被超平面分离时。它们可能可以被非线性曲线分离。这个问题很复杂，人们尝试过多种方法，但大多数方法都依赖于对数据的额外了解。我们不会对此进行讨论。

    *   最后一个改进是考虑多类分类。我们将在后面的章节中讨论这个问题。


    脚注


    1 我加上这个时间精度，以防在我身体熵值最大化很久之后，这段文字仍被阅读。


    2 为了鼓励读者进行实验，本书中的每个模型都可在附加材料（[`https://github.com/sgkruk/Apress-AI`](https://github.com/sgkruk/Apress-AI)）以及一个随机实例生成器中找到。


    3 主要是为了使代码适合页面，同时也为了隐藏 OR-Tools 库的一些冗长之处。作者选择了有意义但相当长的函数名，在我看来这是正确的选择。

