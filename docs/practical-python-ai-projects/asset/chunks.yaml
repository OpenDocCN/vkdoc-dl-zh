- fmt: "# 6.3 Staffing Level\n\nThis problem is often described by optimizers as a\
    \ staff scheduling problem. But that is a terrible misnomer as no schedule is\
    \ ever produced, only requirement levels. The true staff scheduling problem as\
    \ it is known to practitioners is orders of magnitude more complex. So we will\
    \ call this problem the staffing level problem.\n\nThe situation is the following:\
    \ we have a grid, indexed in one dimension by time intervals. This grid is most\
    \ commonly presented in either days (Monday, Tuesday) or hours (8AM, 9AM) but\
    \ could be in any valid time units. In the other dimension, we have what are usually\
    \ called shifts, units of a worker’s schedule (Monday to Friday, Tuesday to Sunday,\
    \ or 8AM to 4PM, 9AM to 5PM). Associated with each time interval we have staffing\
    \ needs (need 45 people on Monday or 62 people at noon). Finally, we also have\
    \ a cost associated to each shift. See Table [6-7](#A457410_1_En_6_Chapter.html#Tab7)\
    \ for an example.\n\n**Table 6-7** Staffing Requirement Matrix\n\n| | Shift 0\
    \ | Shift 1 | Shift 2 | Shift 3 | Shift 4 | Shift 5 | Shift 6 | Need |\n| ---\
    \ | --- | --- | --- | --- | --- | --- | --- | --- |\n| 00h | 1 | | | 1 | | | |\
    \ 15 |\n| 02h | 1 | | | | | 1 | | 17 |\n| 04h | 1 | | | | | 1 | | 16 |\n| 06h\
    \ | 1 | 1 | | | | | | 17 |\n| 08h | | 1 | | | | | 1 | 19 |\n| 10h | | 1 | | |\
    \ | | 1 | 18 |\n| 12h | | 1 | 1 | | | | | 11 |\n| 14h | | | 1 | | | | | 12 |\n\
    | 16h | | | 1 | | | | | 15 |\n| 18h | | | 1 | 1 | | | | 14 |\n| 20h | | | | 1\
    \ | 1 | | | 20 |\n| 22h | | | | 1 | 1 | | | 18 |\n| Cost | $69.37 | $67.03 | $64.55\
    \ | $72.06 | $29.24 | $21.67 | $24.52 | |\n\nNote that the example includes two\
    \ types of shifts: full-time (eight hours) and part time (four hours). The costs\
    \ and the number of hours per shift are different because typically full-time\
    \ workers are better paid than part-timers. The goal is to determine, at the least\
    \ total cost, how many people will work each shift, ensuring that the needs are\
    \ satisfied and also that the full-time workers get preferential treatment. This\
    \ preference can take on various forms. It can be as simple as “No part-timer\
    \ if there is no full-timer working” or “Every full-time shift must be staffed\
    \ by at least x people” or “We have a pool of x full-time staff who must work;\
    \ fill the rest of the needs with part-timers.” We will discuss some possible\
    \ variations on these constraints.\n\nNote that a solution to this problem determines\
    \ only the staffing level of each shift. This is not a schedule. The true schedule,\
    \ in the sense of which worker works which shift, is left to a further model,\
    \ which is a much more complicated one.\n\nThe reader should notice here a common\
    \ approach of optimizers for complex problems: decomposition. The staffing needs\
    \ shown in the last column of Table [6-7](#A457410_1_En_6_Chapter.html#Tab7) were\
    \ conceivably obtained by some model. The levels will be produced by the model\
    \ we are now creating. Finally, the proper schedules will be generated by yet\
    \ another model. This approach is unlikely to produce the overall optimal solution.\
    \ Yet it is used in all industries. The airlines are notorious for decomposing\
    \ problems. There are two reasons we approach complex problems this way: a good\
    \ reason and a bad one.\n\nThe good reason is that, often, attacking the whole\
    \ problem is not technologically feasible. We can write the whole problem model,\
    \ certainly, but no solver can find a solution before the solar system expires.\
    \ Another aspect of the same reason is that one part of the whole problem is best\
    \ modeled as an integer program while another is much simpler as a constraint\
    \ program. There are yet no entirely satisfying ways to write such hybrid models.[⁵](#A457410_1_En_6_Chapter.html#Fn5)\
    \ The second reason, the bad one, is that, even in cases where a more holistic\
    \ approach is feasible, there is massive inertia in organizations that would prevent\
    \ its implementation.[⁶](#A457410_1_En_6_Chapter.html#Fn6)\n\n### 6.3.1 Constructing\
    \ a Model\n\nThe model will be described in stages.\n\n#### 6.3.1.1 Decision Variables\n\
    \nWhat we need to decide in this problem is how many people need to work each\
    \ shift. Because of the distinction between full-time and part-time shifts, it\
    \ may be useful to distinguish between an employee working full time (FTE) and\
    \ an employee working part time (PTE). Hence, assuming `N[f]` and `N[p]` for the\
    \ sets of full-time and part-time shifts,\n\n```\nx_i ∈ [0,1,2,…] ∀ i ∈ N_f ∪\
    \ N_p =: N\n```\n\n#### 6.3.1.2 Objective\n\nThe objective is simple since we\
    \ have a cost per shift `C[i]`,\n\n```\nmin ∑_{i∈N} C_i x_i\n```\n\n#### 6.3.1.3\
    \ Constraints\n\nLet’s tackle the staffing needs by looking at a specific time\
    \ interval, say 0600h with a need of 17 people. If shift 0 covers from midnight\
    \ to 8AM, and shift 1 covers 6AM to 2PM, both of those shifts, and no other, must\
    \ together have at least 17 people to cover the 6AM need. Algebraically, it’s\n\
    \n```\nx_0 + x_1 ≥ 17\n```\n\nNow, in more general terms, consider a matrix `M[T×N]`\
    \ where `T` is the set of time intervals, with the structure of Table [6-7](#A457410_1_En_6_Chapter.html#Tab7)\
    \ (without the last row and column). What we need is for every time interval `t`,\
    \ the sum of the `x[i]` that covers `t` is at least the required `R[t]`. Algebraically,\
    \ it’s\n\n```\n∑_{i∈N} M_{t,i} x_i ≥ R_t ∀ t ∈ T\n```\n\n(6.6)\n\nThis is enough\
    \ for the simplest staffing level model. If there is no distinction between full\
    \ and part time, we are done. Let’s consider a few realistic constraints.\n\n\
    1. **Minimum full-time staff**: If we have a requirement that, for every full-time\
    \ shift `i`, there be at least `Q[i]` people working, we can add\n\n   ```\n \
    \  x_i ≥ Q_i ∀ i ∈ N_f\n   ```\n\n   Because of the structure of the shifts (full-time\
    \ shifts cover all time intervals), this constraint also satisfies a requirement\
    \ of the form “No PTE working if no FTE are working” (assuming that `Q_i > 0`,\
    \ of course).\n\n2. **FTE must work**: A possibly more realistic requirement is\
    \ that, given a pool of `P` of full-time employees (FTE), we require that they\
    \ all work. Only if the staffing requirements cannot be met should we involve\
    \ part-time staff. This is accomplished by\n\n   ```\n   ∑_{i∈N_f} x_i = P\n \
    \  ```\n\n   (6.7) This constraint will be infeasible unless the number of full-time\
    \ workers is below or at the staffing needs, of course.\n\n3. **No PTE if no FTE\
    \ present**: Consider a particular time interval, say 10AM to noon. Say it can\
    \ be staffed by full-time shift 1 and 2 and also by part-time shift 6. We want\
    \ to ensure that `x[6]` is zero unless either `x[1]` or `x[2]` is non-zero. As\
    \ a first attempt, let’s try\n\n   ```\n   x_1 + x_2 ≥ x_6\n   ```\n\n   (6.8)\
    \ This ensures that if there are no full-time staff in either full-time shift,\
    \ then there will be no part-time staff either. But it constrains the problem\
    \ more than necessary because it prevents the number of part-time staff to exceed\
    \ the full-time staff. What we need is to scale up the left-hand side of equation\
    \ (6.8) by some “large enough” constant. This is again an instance of the technique\
    \ optimizers call the big-M method. How large is large enough? The sum of the\
    \ required staff is surely enough and yet not so large as to cause numerical problem.\
    \ Therefore,\n\n   ```\n   ∑_{j∈T} R_j ∑_{i∈N_f} M_{t,i} x_i ≥ ∑_{i∈N_p} M_{t,i}\
    \ x_i ∀ t ∈ T\n   ```\n\n   (6.9) For each time interval, equation (6.8) sums,\
    \ on the left, the number of full-time workers, scaled up by a large constant.\
    \ On the right it sums the number of part-time workers."
