    has the structure of Table [2-1](#A457410_1_En_2_Chapter.html#Tab1) without the
    last column and row. Each row represents a food, except that the last two rows
    represent the minimum and maximum requirement of each nutrient, represented by
    the columns, with the last three representing the minimum, maximum, and the cost
    of each food serving.


    ```

    1  def solve_diet(N):

    2    s = newSolver(''Diet'')

    3    nbF,nbN = len(N)-2, len(N[0])-3

    4    FMin,FMax,FCost,NMin,NMax = nbN,nbN+1,nbN+2,nbF,nbF+1

    5    f = [s.NumVar(N[i][FMin], N[i][FMax],'''') for i in range(nbF)]

    6    for j in range(nbN):

    7      s.Add(N[NMin][j]<=s.Sum([f[i]*N[i][j] for i in range(nbF)]))

    8      s.Add(s.Sum([f[i]*N[i][j] for i in range(nbF)])<=N[NMax][j])

    9    s.Minimize(s.Sum([f[i]*N[i][FCost] for i in range(nbF)]))

    10    rc = s.Solve()

    11    return rc,ObjVal(s),SolVal(f)

    Listing 2-1

    Model for Minimal Cost Diet (diet problem.py)

    ```


    The model uses the `newSolver` function to simplify the expression of the code[³](#A457410_1_En_2_Chapter.html#Fn3)
    as the reader can see at Listing [2-2](#A457410_1_En_2_Chapter.html#Par28). These,
    and other simplifications, can be found in `my_or_tools.py`.


    ```

    from ortools.linear_solver import pywraplp

    def newSolver(name,integer=False):

    return pywraplp.Solver(name,\

    pywraplp.Solver.

    CBC_MIXED_INTEGER_PROGRAMMING \

    if integer else \

    pywraplp.Solver.GLOP_LINEAR_PROGRAMMING)

    Listing 2-2

    Utility Function to Create an Appropriate Solver Instance

    ```


    To help the expression of the model , lines 3-4 give meaningful names to the row
    and column indices that we will use. In line 5, we define the decision variables,
    one per food, each taking values in the range [l [i] , u [i] ] as in equation
    (2-1). It would be correct to give a range of [0, +∞) and then add constraints
    to enforce the bounds. The solver would still find the same solution, but it is
    simpler and good practice to limit as much as possible the range of decision variables.
    In complex models, it often dramatically improves the solution time.


    The two-line loop starting on line 6 establishes the range on each nutrient as
    in (2.1.1). Lines 9 and following create the objective function, solve the problem,
    and return three numbers: the status of the solver (it should be zero), the optimal
    value, and the optimal solution. The dual role of the functions `SolVal` and `ObjVal`
    (seen in Listing [2-3](#A457410_1_En_2_Chapter.html#Par31)) is to simplify the
    results returned to the caller and the code to read.


    ```

    def SolVal(x):

    if type(x) is not list:

    return 0 if x is None \

    else x if isinstance(x,(int,float)) \

    else x.SolutionValue() if x.Integer() is False \

    else int(x.SolutionValue())

    elif type(x) is list:

    return [SolVal(e) for e in x]

    def ObjVal(x):

    return x.Objective().Value()

    Listing 2-3

    Utility Functions to Extract Values from the OR-Tools Objects

    ```


    The results from executing this model are shown in the last row and column of
    Table [2-1](#A457410_1_En_2_Chapter.html#Tab1). The column indicates the number
    of servings of each food and the row indicates the amount of each nutrient that
    will be in the diet. The reader should notice that many of the food items and
    nutrient counts are at their minimum required values. This is expected of such
    a model since we are trying to minimize a linear cost function; the optimal solution
    should push towards the boundary of the constraints as much as possible.


    The reader can experiment with this model. It is included in the additional material
    as `diet problem.py`, along with a generator of random diet problems and a routine
    to display the solution in a table format similar to Table [2-1](#A457410_1_En_2_Chapter.html#Tab1).'
