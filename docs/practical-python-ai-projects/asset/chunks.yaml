  trans: '

    # 4.1 最大流


    网络相关问题通常具有一种结构，其中解的整数性可以“免费”得到保证。我们只需认识到问题属于这一特殊类别，然后欣然接受即可。本节的目标是识别并建模具有这种特殊结构的问题。


    最典型、最明显的例子是网络最大流问题，其中某种物质在具有容量的通道上从某些源点流向某些汇点，我们试图最大化流量。


    流动的物质不一定是实物，如水、石油甚至电力。它可以是流经光纤电缆网络的数据包。例如，假设你正试图确定可以从服务器向观众发送多少并发视频流。这恰好符合最大流问题的背景。


    为了抽象地考虑最简单的问题，我们假设一个如图 4-1 所示的网络，其中每条弧都有标注的容量，我们试图从标记为源点（-S）的节点向标记为汇点（-T）的节点发送尽可能多的流量。


    ![A457410_1_En_4_Fig1_HTML.jpg](img/A457410_1_En_4_Fig1_HTML.jpg)


    图 4-1 网络流问题实例的可视化表示


    ## 4.1.1 构建模型


    在这个问题中，我们需要决定的是从源点向汇点输送多少流量，以及通过网络的哪些弧进行输送。


    ## 4.1.2 决策变量


    回答这个问题最简单、最自然的方法是引入一个二维变量。第一个维度表示起始节点，第二个维度表示目标节点；变量的值将是流经这两点之间弧的物质数量，即


    ```

    x_{i,j} ∀ i ∈ N, ∀ j ∈ N

    ```


    例如，如果 `x[2,3] = 35`，则表示我们应该从节点 2 向节点 3 发送 35 个单位。


    ### 4.1.2.1 目标函数


    目标是最大化从源点流向汇点的流量。因此，无论是从源点（设为集合 S）流出的总和，还是进入汇点（设为集合 T）的总和，都可以作为目标。这给出了以下两个目标函数之一：


    ```

    max ∑_{i∈s} ∑_{j∈N} x_{i,j}

    ```


    或


    ```

    max ∑_{j∈T} ∑_{i∈N} x_{i,j}

    ```


    但是，由于我们允许多个源点，并且没有阻止一个源点向另一个源点发送流量以便进一步传输，因此我们应该小心地最大化从源点流出的“净”流量，即


    ```

    max ∑_{i∈S} (∑_{j∈N} x_{i,j} - ∑_{j∈N} x_{j,i})

    ```


    (4.1)


    相应地，进入汇点的净流量应该是显而易见的。³


    这个目标函数 (4.1) 足以得到一个可用的模型，但我们还需要考虑两个小麻烦：链式源点和循环。


    第一个有问题的情形如图 4-2 所示。很明显，由于进入汇点的弧的容量是 2，因此恰好会有两个单位流量通过。但这两个单位可能全部来自源点 N1-S，也可能一个来自
    N0-S，另一个来自 N1-S。


    ![A457410_1_En_4_Fig2_HTML.jpg](img/A457410_1_En_4_Fig2_HTML.jpg)


    图 4-2 有问题的源点链式结构


    第二个有问题的情形发生在存在涉及源点的循环时。那么，对于围绕该循环的任意流量 `f`，如果该流量不大于该循环上的容量，则存在另一个流量 `f + 1`，其目标函数值完全相同。以图
    4-3 为例。一个最优解可以通过中间节点从源点向汇点发送 10 个单位，或者从源点发送最多 20 个单位，其中最多有 10 个单位从中间节点流回源点。


    ![A457410_1_En_4_Fig3_HTML.jpg](img/A457410_1_En_4_Fig3_HTML.jpg)


    图 4-3 有问题的循环


    这两个例子说明了存在多个最优解，当然，它们的最优值完全相同。对于任何应用来说，这种大量的最优流不太可能是一个特性。它很可能被视为一个麻烦，尤其是当两个不同的求解器或同一求解器的两次不同运行返回两个不同的流时！我们如何确保求解器始终返回相同的流？


    我们可以决定，在所有最优流中，我们希望选择流入源点的流量尽可能小的那个。这是一个双重目标：最大化从源点流出的净流量，并最小化流入源点的流量。这种双重目标，或者更一般地说，多目标的想法，在实践中经常出现，并且通常出于与这里相同的原因：需要根据一个标准在多个最优解中确定根据次要标准最可取的那个。


    由于我们需要同时最大化一个目标并最小化另一个目标，我们需要另一个技巧：取反。


    ```

    max f(x) ⇔ min -f(x)

    ```


    我们总是可以将最小化问题替换为最大化问题，反之亦然。现在我们可以将两个目标相加：最大化如公式 (4.1) 所示的净流量，并最小化流入量，即最大化 `-∑_{i∈S}
    ∑_{j∈N} x_{j,i}`。简化后，它看起来像


    ```

    max ∑_{i∈S} (∑_{j∈N} x_{i,j} - 2^* ∑_{j∈N} x_{j,i})

    ```


    (4.2)


    在我们的链式示例中，我们将最大化 `x[0,1] + x[1,2] - 2^* x[0,1]`，即 `x[1,2] - x[0,1]`，这将强制所有流量都从
    N1-S 发出。在我们的循环示例中，这将得到 `x[0,1] + x[1,2] - x[1,0]`，这保证了没有流量流回源点，并且源点发出 10 个单位。


    ### 4.1.2.2 约束条件


    唯一的约束类型被称为流量守恒：对于既不是源点也不是汇点的每个节点，流入的流量必须等于流出的流量，即


    ```

    ∑_{j∈N} x_{i,j} = ∑_{j∈N} x_{j,i} ∀ i ∈ N \ {S ∪ T}

    ```


    (4.3)


    由于目标函数会强制流量从源点流出，或者等价地，流入汇点，因此流量守恒将负责将物质从源点输送到汇点。

    '
- fmt: "#### 4.1.2.3 Executable Model\n\nLet’s translate this into an executable model.\
    \ To make the model general enough to solve all problems of this type, we will\
    \ assume that the input is a two-dimensional array called `C`, indexed by nodes,\
    \ containing the capacity of the arc between two nodes. We will also assume arrays,\
    \ one of sources `S` and one of sinks `T`.\n\nTo allow some flexibility in the\
    \ choice of objective function and illustrate the occurrence of multiple optimal\
