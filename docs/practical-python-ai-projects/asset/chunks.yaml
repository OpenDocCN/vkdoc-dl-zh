- fmt: '### 7.5.4 Ladies and Tigers


    Raymond Smullyan in “The Lady or the Tiger”[^(15)](#A457410_1_En_7_Chapter.html#Fn15)
    presents a number of logic puzzles. One chapter culminates in the following:


    A prisoner is faced with nine doors, one of which he must open. Behind one door
    awaits a lady; behind the others, a tiger, if anything. One assumes that the prisoner
    prefers opening the lady’s door to an empty room, which is preferable to a tiger’s
    den. What turns this into a logic puzzle is that on each door is posted a logic
    statement (it can therefore be either true or false). Statements on rooms with
    tigers are false. The statement on the Lady’s room is true.


    - Door 1: The lady is in an odd-numbered room.

    - Door 2: This room is empty.

    - Door 3: Either sign 5 is right or sign 7 is wrong.

    - Door 4: Sign 1 is wrong.

    - Door 5: Either sign 2 or sign 4 is right.

    - Door 6: Sign 3 is wrong.

    - Door 7: The lady is not in room 1.

    - Door 8: This room contains a tiger and room 9 is empty.

    - Door 9: This room contains a tiger and sign 6 is wrong.


    Where is the lady?


    To know where the lady awaits, we may need to know where the tigers are. So a
    reasonable decision variable, given a set `R = {1, … , 9}` of rooms and a set
    `B = {1, 2, 3}` of beasts (say 1 for empty, 2 for lady, and 3 for tiger) would
    be


    ![$$ {r}_i\in B\forall i\in R $$](A457410_1_En_7_Chapter_Equam.gif)


    So that a lady in room 5 would be indicated by `r[5] = 2` and a tiger in room
    4 would be `r[4] = 3`. A statement about the lady being in an odd numbered room
    is easy to accommodate if we declare our variables using our `newIntVar` function.
    The associated array of indicator variables is the perfect tool. For the sake
    of presentation, let’s assume that for each `r[i]` variable we have an array `r[i,j]`
    of indicator variables for ![$$ j\in B $$](A457410_1_En_7_Chapter_IEq47.gif).


    Now for the logic part. We are given statements that can be true or false and
    their truth value influences the constraints. If we introduce a binary variable
    for each statement, then we can use our reify logic to associate the variable
    to each constraint. So let’s introduce


    ![$$ {s}_i\in \left\{0,1\right\}\forall i\in R, $$](A457410_1_En_7_Chapter_Equan.gif)


    so that `s[2] = 1` will mean that the statement on door 2 is true.


    The executable model is shown in Listing [7-29](#A457410_1_En_7_Chapter.html#Par256).
    We will decompose it one constraint at a time.


    ```

    1  def solve_lady_or_tiger():

    2    s = newSolver(''Ladyuorutiger'', True)

    3    Rooms = range(1,10)

    4    R = [None]+[newIntVar(s,0,2) for _ in Rooms]

    5    S = [None]+[s.IntVar(0,1,") for _ in Rooms]

    6    i_empty,i_lady,i_tiger = 1,2,3

    7    k_out_of_n(s,1,[R[i][i_lady] for i in Rooms])

    8    for i in Rooms:

    9      reify_force(s,[1],[R[i][i_tiger]],0,S[i],''='')

    11    v=[1]*5

    12    reify(s,v,[R[i][i_lady] for i in range(1,10,2)],1,S[1],''>='')

    13    reify(s,[1],[R[2][i_empty]],1,S[2],''>='')

    14    reify(s,[1,-1],[S[5],S[7]],0,S[3],''>='')

    15    reify(s,[1],[S[1]],0,S[4],''='')

    17    reify(s,[1],[S[3]],0,S[6],''='')

    20    reify(s,[1,-1],[R[9][i_tiger],S[6]],1,S[9],''>='')

    21    rc  = s.Solve()

    22    return rc,[SolVal(S[i]) for i in Rooms],\

    23      [SolVal(R[i]) for i in Rooms]

    Listing 7-29

    Lady or Tiger Model (puzzle.py)

    ```


    At line 3 we define the range of integers that identify each door. Since the problem
    is stated with rooms numbered from one, we will comply instead of renumbering
    from zero as we usually do. In order to index from one, we create the decision
    variables on the next two lines as arrays where the first element contains `None`.
    We then define, at line 6, some constants to access the indicator variables of
    each room.


    On line 7 we ensure that there is exactly one lady.


    All the other constraints involve a relation between a statement variable `S`
    and a logical statement, hence our `reify` functions will prove invaluable. The
    first one is that if a room contains a tiger, its statement is false. The statement
    “If room i contains a tiger then statement i is false.” is in the wrong direction
    for us. We could write a new function but is simpler to use the contra-positive
    and state “If statement i is true, there is no tiger behind door i.” This is an
    instance of a Boolean true enforcing a constraint, which line 9 implements.


    The next constraint is “A room with a lady has a true statement on its door.”
    and it is in the right direction for us: a satisfied constraint raising a Boolean,
    as implemented at line 10.


    “The lady is in an odd-numbered room.” is simple. We need to sum the `i_lady`
    indicator variables on odd doors and set them above one if and only if statement
    one is true. The indices of odd rooms is obtained by `range(1,10,2)` and the inequality


    ```

    R[1][i_lady]+R[3][i_lady]+R[5][i_lady]+R[7][i_lady]+R[9][i_lady]  >=  1

    ```


    is reified to `S[1]` at line 12.


    “This room is empty.” is a simple reification to `S[2]` of


    ```

    R[2][i_empty]  >=  1

    ```


    at line 13. The reader might wonder why not use equality instead of inequality.
    The reason is that we know, having written the constraint `reify`, that equalities
    are more complex, introducing more auxiliary constraints and or variables. If
    we are certain, as we are here, that an inequality is sufficient, it is preferable
    to use one.


    “Either sign 5 is right or sign 7 is wrong.” is a disjunction of binary variables
    with the minor difficulty that the second is negated. The transformation to an
    algebraic statement is mechanical if we know how to negate Booleans and implement
    disjunctions. We have seen the disjunctions often. Something like `x[1] ∨ … x[n]`
    gets implemented as ![$$ \sum \limits_i{x}_i\ge 1 $$](A457410_1_En_7_Chapter_IEq48.gif).
    The negation of `x[i]` is handled by replacing `x[i]` by `1 − x[i]`. Therefore,
    in our case we need


    ```

    S[5] + (1-S[7]) >= 1

    ```


    which simplifies to


    ```

    S[5] - S[7] >= 0

    ```


    reified to `S[3]` at line 14.


    “Sign 1 is wrong.” is `S[1]==0` reified to `S[4]` at line 15. “Sign 3 is wrong.”
    is handled identically at line 17.


    “Either sign 2 or sign 4 is right.” is a simple disjunction so the usual transformation
    to addition applies and is reified to `S[5]` at line 16.


    “The lady is not in room 1.” needs to reify to `S[7]` the constraint


    ```

    R[1][i_lady]  <=  0

    ```


    as at line 18.


    “This room contains a tiger and room 9 is empty.” is interesting. The substatements
    are


    ```

    R[8][i_tiger]  >=  1

    ```


    and


    ```

    R[9][i_empty]  >=  1

    ```


    The conjunction is handled by summing the right sides and the left sides to create


    ```

    R[8][i_tiger]  +  R[9][i_empty]  >=  2

    ```


    reified to `S[8]` at line 19.


    Finally, “This room contains a tiger and sign 6 is wrong.” contains


    ```

    R[9][i_tiger]  >=  1

    ```


    and


    ```

    S[6] <= 0

    ```


    We transform the latter into


    ```

    - S[6] >= 0

    ```


    And then sum the two form the conjunction, reified to `S[9]` at line 20.


    And we are done in the sense that we can find a solution, for instance the first
    solution of Table [7-21](#A457410_1_En_7_Chapter.html#Tab21). But are there additional
    solutions and if so, how to find them? In this case,[^(16)](#A457410_1_En_7_Chapter.html#Fn16)
    it is simple since our only real goal is to find the lady. Our first solution
    has the lady in room 1, so we can simply add a constraint preventing the lady
    from being in room 1, for instance


    ```

    s.Add(R[1][i_lady]  ==  0)

    ```


    We will get another solution of one exists or else the solver will indicate that
    the problem is infeasible. We can proceed thus until we exhaust all solutions
    if need be. The second solution of Table [7-21](#A457410_1_En_7_Chapter.html#Tab21)
    is one such additional solution. (Interestingly, this second solution is the unique
    solution if we add a constraint stating “Room 8 is not empty.”)


    **Table 7-21** Two Solutions to the Lady or Tiger Puzzle'
