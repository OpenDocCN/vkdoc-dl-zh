    ## 3.2 Curve Fitting


    A very common problem is to move from a set of data points to an analytic representation
    of the same data. Statisticians call this regression; applied mathematicians utter
    parameter estimation; and engineers speak of curve fitting. I prefer the last
    expression.[²](#A457410_1_En_3_Chapter.html#Fn2)


    Its most famous and simplest example is illustrated by the following: imagine
    that we know (or, conjecture, as Galileo was the first to do) that a falling body
    follows a curve of the form


    `f(t) = a[2] t² + a[1] t + a[0]`,


    where `t` represent time, but we do not know the appropriate values for `a[0]`,
    `a[1]`, and `a[2]`. We run an experiment where we collect the data in Table [3-8](#A457410_1_En_3_Chapter.html#Tab8).


    **Table 3-8** Example of Data to Fit on a Quadratic `f(t) = a[2] t² + a[1] t +
    a[1]`


    | `t[i]` | `f[i]` |

    | --- | --- |

    | 0.1584 | 0.0946 |

    | 0.8454 | 0.2689 |

    | 2.1017 | 5.8285 |

    | 3.1966 | 14.8898 |

    | 4.056 | 25.6134 |

    | 4.9931 | 38.3952 |

    | 5.8574 | 43.5065 |

    | 7.1474 | 91.3715 |

    | 8.1859 | 119.075 |

    | 9.0349 | 115.7737 |


    Since we need to identify the coefficients of our function (the `a[0]`, `a[1]`,
    …), we need somehow to minimize a distance from each possible curve to our data
    points. Statisticians are fond of using the Euclidean distance or equivalently,
    its square,


    ```

    min ∑_n ( f̄_i - f( t̄_i ) )²

    ```


    This Least-Squares approach dates from Carl Friedrich Gauss,[³](#A457410_1_En_3_Chapter.html#Fn3)
    who developed it to predict planetary motion. It often makes sense and is very
    easy to obtain by solving one system of linear equations, the so-called Normal
    Equations.


    Notwithstanding its popularity, the Euclidean distance is not the only valid distance
    to minimize. Another one is to use the absolute values of the deviations, as in


    ```

    min ∑_n | f̄_i - f( t̄_i ) |

    ```


    or even the largest of the absolute values of the deviations, as in


    ```

    min max_n | f̄_i - f( t̄_i ) |

    ```


    This latter approach is the most appropriate one when, for instance, we are dealing
    with tolerances; that is, when all errors must be within some maximal value. We
    will develop code that can choose, at runtime, between the latter two objective
    functions.


    ### 3.2.1 Constructing a Model


    We will describe this rather complex model in stages.


    #### 3.2.1.1 Objective Function


    Let’s assume, with some generality, that we are asked to identify a polynomial
    of degree `k` in the variable `t`. The coefficients `a[0]`, `a[1]`, … , `a[k]`
    are to be determined which minimize either the sum of deviations or the largest
    deviation between the data points and the polynomial.


    The first abstraction here is to think of all of these deviations as some functions,
    say `e[0]`, `e[2]`, … , `e[n]`, which we will determine later. In the case of
    the sum of deviations, the objective is simply


    ```

    min ∑_i e_i

    ```


    But for the second case, we need an objective that minimizes the maximum deviation:


    ```

    min max_n e_i

    ```


    This latter expression is clearly not a form that fits our framework of linear
    programs; we can have a `min` or a `max` but not both, and we must have one objective
    function, not a set of them.


    The abstract approach to use in cases like this is to move the objectives into
    the constraints. To illustrate, first we introduce a set of inequalities with
    a new variable, say `e`, representing the maximum deviation:


    ```

    e_i ≤ e ∀ i ∈ [1, n]

    ```


    Second, we state the objective as `min e`. Since `e` is an upper bound on all
    the deviations and we minimize it, we minimize the maximum deviation. Note that,
    at optimality, at least one of the inequalities will be binding, or else we clearly
    are not optimal, but most will likely be slack since their deviation will be smaller
    than the maximum deviation.'
