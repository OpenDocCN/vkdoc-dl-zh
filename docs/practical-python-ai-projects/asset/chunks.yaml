    \ will solve to illustrate. In addition to the distances, it includes the Cartesian\
    \ coordinates of the points. We will not use these coordinates in the model but\
    \ they are useful for visualizing the problem. The absence of a number in the\
    \ table indicates that there is no direct path between the two nodes.\n\nTable\
