    ### 6.1.2 变体


    *   主要的变体与容量有关。生产者和消费者之间的路径可能有一个最大容量，例如 `c[i,j]`。这可以通过定义具有适当定义域的变量来简单实现，即 `0 ≤
    x[i,j] ≤ ci,j`，或者在可执行模型中，将第 7 行修改为：


    ```

    x = [[s.NumVar(0,C[i][j],") for j in range(n)] for i in range(m)]

    ```


    对于具有容量的网络，重新审视用于设置建厂决策变量的大 M 约束可能是值得的，并倾向于采用基于工厂流出流量的替代方法。


    ## 6.2 多商品流


    之前讨论的流问题都是简单的整数问题，因为整数性是不劳而获的。无需将变量声明为整数即可获得整数最优解。但是，当同一网络承载多种商品时，情况并非如此；那么我们必须明确指定所有必须为整数的变量。


    我们可以将此问题视为叠加在一个网络上的系列转运问题。一些节点是供应节点，一些是需求节点，另一些可以中转，并且需要运输的不止一种元素，因此一个作为某种元素供应节点的节点可能是另一种元素的消费节点。因此，我们将拥有多个成本、需求和供应数据表，如表
    6-4 所示，这是一个小规模实例。目标与转运问题一样，是满足所有需求。


    **表 6-4** 多商品流成本矩阵示例


