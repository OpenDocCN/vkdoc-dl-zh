- fmt: '#### 5.1.1.4 Executable Model


    In Listing [5-1](#A457410_1_En_5_Chapter.html#Par27), we see the whole model.
    Let’s look at it carefully, highlighting the two major differences with all the
    previous models:


    - The solver instantiation

    - The decision variable declaration


    ```

    1  def solve_model(D,C=None):

    2    t = ’SetuCover’

    3    s = pywraplp.Solver.CBC_MIXED_INTEGER_PROGRAMMING

    4    s = pywraplp.Solver(t,s)

    5    nbSup = len(D)

    6    nbParts = max([e for d in D for e in d])+1

    7    S = [s.IntVar(0,1,”) for i in range(nbSup)]

    8    for j in range(nbParts):

    9      s.Add(1 0]

    14    Parts = [[i for i in range(nbSup) \

    15      if j in D[i] and SolVal(S[i])>0] for j in range(nbParts)]

    16    return rc,ObjVal(s),Suppliers,Parts

    Listing 5-1

    Set Cover Model (set cover.py)

    ```


    The function receives two-dimensional array `D` containing the part numbers supplied
    by each supplier, exactly as in Table [5-1](#A457410_1_En_5_Chapter.html#Tab1).
    The code also accepts cost array `C` in case there is a varying cost per supplier.
    It is optional and its absence indicates a pure set cover problem, one where we
    are concerned with minimizing the number of subsets chosen.


    Line 4 is different from all our previous models. It chooses a solver, in this
    case, CBC from the COIN-OR project ,[³](#A457410_1_En_5_Chapter.html#Fn3) which
    can handle discrete as well as continuous variables. This very small change on
    our part represents an order of magnitude change on the part of the solver. In
    fact, to solve an integer model, most solvers will internally solve a multitude
    of continuous models derived from ours. The algorithms are fascinating but beyond
    the scope of this book.[⁴](#A457410_1_En_5_Chapter.html#Fn4)


    For this first discrete model, we create the solver instance using the low-level
    OR-Tools routine `Solver`. From here onward, we will use our own `newSolver` in
    this manner:


    ```

    s = newSolver(''Name of problem'', True)

    ```


    The second parameter, which defaults to `False`, instantiates an integer solver
    if `True`. Internally we usually use CBC, but there are a number of possible integer
    solvers. (See Listing [7-31](#A457410_1_En_7_Chapter.html#Par299) in Chapter [7](#A457410_1_En_7_Chapter.html)
    for details.)


    Line 7 defines our binary variable (with the understanding that zero will mean
    “ignore supplier” and one will mean “pick supplier”). Up until now, all variables
    were defined with `NumVar`, which implies a floating point variable approximating
    a real number. With `IntVar` we are instructing the solver that a variable can
    only take on integral values. Since we give it a range of zero to one, it forces
    the variable to have only one of two values. Any range is possible with all solvers.


    The reader should experiment with this model by changing the `IntVar` to a `NumVar`
    and note that the variables will now take on values of zero, one-half, and one.[⁵](#A457410_1_En_5_Chapter.html#Fn5)
    What does it mean to have one-half of a supplier? Nothing, hence the integrality
    requirement.


    The loop at line 9 implements the cover constraints. It mimics to the letter the
    constraint (5.1), forcing the sum of suppliers of each part to be above one. Notice
    how easily we can extract subsets based on conditionals in Python.


    The cost function at Line 11 is either the number of supplier, as in a traditional
    set cover, or the total cost of choosing these suppliers if each one incurs a
    different cost. This is the purpose of the optional cost array `C`, indexed by
    supplier.


    Finally, after we solve it, we construct meaningful return values. It would be
    painful to the caller to receive the raw `S` variables. Most of them might be
    zero. In a real problem with thousands, maybe tens of thousands of parts and suppliers
    , the zeros are not interesting. So we return an array containing only the suppliers
    who should be offered a contract, along with a cross-reference of parts to suppliers.
    This way the user knows where to go for each part.


    For our example, the solution, absent a cost array, is displayed in Table [5-2](#A457410_1_En_5_Chapter.html#Tab2).
    The first line lists all retained suppliers, the next indicates who can supply
    (among those retained) each part. Note that each part is covered.


