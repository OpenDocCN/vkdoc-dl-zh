    ### 7.2.2 从 n 个变量中选取 k 个相邻的非零变量


    如果我们想推广用于非凸目标函数的非零相邻约束，将需要多层二元变量。让我们通过考虑一组变量 `x[i] ∈ [0, u[i]]` 来说明这一点，我们希望其中三个相邻的变量为非零。我们引入二元变量
    `λ[i]`、`δ[i]` 和 `γ[i]`，满足以下条件：


    | `x[0] ≤ λ[0] * u[0]` | `λ[0] ≤ δ[0]` | `δ[0] ≤ γ[0]` |

    | `x[1] ≤ λ[1] * u[1]` | `λ[1] ≤ δ[0] + δ[1]` | `δ[1] ≤ γ[0] + γ[1]` |

    | `x[2] ≤ λ[2] * u[2]` | `λ[2] ≤ δ[1] + δ[2]` | `δ[2] ≤ γ[1] + γ[2]` |

    | `x[3] ≤ λ[3] * u[3]` | `λ[3] ≤ δ[2] + δ[3]` | `δ[3] ≤ γ[2] + γ[3]` |

    | … |  |  |

    | `x[n-1] ≤ λ[n-1] * u[n-1]` | `λ[n-1] ≤ δ[n-2] + δ[n-1]` | `δ[n-1] ≤ γ[n-2]`
    |

    | `x[n] ≤ λ[n] * u[n]` | `λ[n] ≤ δ[n-1]` |  |

    | `∑ λ[i] = 3` | `∑ δ[i] = 2` | `∑ γ[i] = 1` |


    要理解这组约束的工作原理，请从 γ 反向读到 λ。只有一个 `γ[i]` 是非零的。这允许两个相邻的 `δ[i]` 为非零，进而允许三个相邻的 `λ[i]`
    为非零。这些最后的二元变量随后对应于将被允许为非零的三个相邻的 `x[i]`。代码清单 7-8 实现了一个漂亮的递归结构。我们允许调用者有一定的灵活性，可以接受选择的变量数为零或全部；虽然这通常没有意义，但可能有助于构建一个包含所有边界情况的循环。


    ```

