    ```

    1  def get_se(x,i,j,n):

    2    return [x[i+k % n][j+k % n] for k in range(n-i-j)]

    3  def get_ne(x,i,j,n):

    4    return [x[i-k % n][j+k % n] for k in range(i+1-j)]

