    ### 7.5.2 数独


    数独谜题如下：给定一个 9x9 的网格，部分格子已填入 1 到 9 的数字，需要填充剩余格子，使得：


    -   每一行都包含 1 到 9 的所有数字。

    -   每一列都包含 1 到 9 的所有数字。

    -   每一个 3x3 的不重叠子网格都包含 1 到 9 的所有数字。


    我们可以通过指定每个网格位置上的数字来表示一个解。因此，一个简单的决策变量是：


    ![$$ {x}_{i,j}\in \left\{1,\dots, 9\right\}\forall i\in \left[1,2,3\right]\forall
    j\in \left[1,2,3\right] $$](A457410_1_En_7_Chapter_Equal.gif)


    约束条件很有趣。每个约束的形式都是“给定一组九个位置，必须出现 1 到 9 的所有数字”。在约束编程中，这个需求由一个单一的函数调用处理，通常命名为 `all_different`。我们将为数独创建一个简化的等价约束，并在下一个谜题中对其进行改进。


    对于我们的每个变量 `x[i,j]`，我们将创建一个长度为 9 的二进制变量数组 `v[k]^(ij)`。每个变量都是值 `k` 的指示变量。因此我们添加约束：


    ![$$ {x}_{i,j}={v}_1^{ij}+2{v}_2^{ij}+3{v}_3^{ij}+\dots +8{v}_8^{ij}+9{v}_9^{ij}
    $$](img/A457410_1_En_7_Chapter_Equ13.gif)


    (7.14)


    然后，对于每个需要互不相同的变量集合 `S`，我们将确保相应指示变量之和为 1。


    这是一个可行性问题，因此不需要目标函数。让我们创建一个可执行的模型。我们利用之前定义的 `get_row` 和 `get_column`，并添加一个 `get_subgrid`。参见代码清单
    7-25。


    ```

    1  def get_subgrid(x,i,j):

    2    return [x[k][l] for k in range(i*3,i*3+3)\

    3                 for l in range(j*3,j*3+3)]

    4  def all_diff(s,x):

    5    for k in range(1,len(x[0])):

    6      s.Add(sum([e[k] for e in x]) <= 1)

    代码清单 7-25

    数独的一些辅助函数 (puzzle.py)

    ```


    代码清单 7-26 中实现的模型接受一个网格数据，其中包含数字或 `None`（表示需要填充）。大部分工作是在第 3 行到第 14 行的循环中创建一组清晰的决策变量：一个三维数组，前两个维度由网格位置索引。第三维的索引
    0 是我们的实际决策变量，保存网格将持有的值（无论是数据给定的还是求解过程得到的）；索引 1 到 9 的每个位置保存相应的指示变量。在创建变量时，我们在第
    9 行添加了方程 (7.14) 的值约束。


    变量声明之后，我们对每一行、每一列和每一个子网格调用 `all_diff` 函数。对于 1 到 9 范围内的每个值，这个函数是一个简单的 `k_out_of_n`
    约束。


    ```

    1  def solve_sudoku(G):

    2    s,n,x  =  newSolver(''Sudoku'',True),len(G),[]

    3    for i in range(n):

    4      row=[]

    5      for j in range(n):

    6        if G[i][j] == None:

    7         v=[s.IntVar(1,n+1,")]+[s.IntVar(0,1,")\

    8                            for _ in range(n)]

    9         s.Add(v[0] == sum(k*v[k] for k in range(1,n+1)))

    10        else:

    11         v=[G[i][j]]+[0 if k!=G[i][j] else 1\

    12                   for k in range(1,n+1)]

    13        row.append(v)

    14      x.append(row)

    15    for i in range(n):

    16      all_diff(s,get_row(x,i))

    17      all_diff(s,get_column(x,i))

    18    for i in range(3):

    19      for j in range(3):

    20        all_diff(s,get_subgrid(x,i,j))

    21    rc  = s.Solve()

    22    return rc,[[SolVal(x[i][j][0]) for j in range(n)]\

    23             for i in range(n)]

