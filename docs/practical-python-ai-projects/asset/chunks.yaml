    **表 4-3**  \n电力配送成本示例\n\n| 从/到 | 城市 0 | 城市 1 | 城市 2 | 城市 3 | 城市 4 | 城市 5 | 城市\
    \ 6 | 供应量 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 电厂 0 |\
    \ 23 |   | 19 | 25 | 14 |   | 22 | 551 |\n| 电厂 1 | 16 |   |   | 20 | 23 | 13 |\
    \ 23 | 689 |\n| 电厂 2 | 22 | 18 | 11 |   | 20 | 13 | 24 | 634 |\n| 需求量 | 288 |\
    \ 234 | 236 | 231 | 247 | 262 | 281 |   |\n\n需要回答的问题是：“应从每个发电厂向每个城市输送多少电力，才能在满足峰值需求的同时使成本最小化？”\n\
    \n### 4.2.1 构建模型\n\n在这个问题中，我们需要决定从每个发电厂向每个客户输送的电量。一个发电厂可能不向任何城市、向部分城市或向所有城市输送电力，我们需要一种方式来指明这一点。作为视觉辅助，请考虑图\
    \ 4-5 中所示的二分图⁵，其中发电厂是顶部节点，城市是底部节点，弧是电力线路，并标注了沿该特定输电线路输送电力的成本。\n\n![A457410_1_En_4_Fig5_HTML.jpg](img/A457410_1_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5**  \n需要图注\n\n#### 4.2.1.1 决策变量\n\n有了这个图像，问题的解决方案将是，对于每个发电厂-城市对，发电厂向城市输送的电量。最简单、最自然的方法是引入一个二维变量。第一个维度表示起点（发电厂集合\
    \ `P` 中的哪个发电厂），第二个维度表示终点（城市集合 `C` 中的哪个城市），即\n\n![$$ {x}_{i,j}\\forall i\\in P,\\\
    forall j\\in C $$](img/A457410_1_En_4_Chapter_Equc.gif)\n\n例如，如果 `x[2,3] = 35`，则表示我们应该从发电厂\
    \ 2 向城市 3 输送 35 千瓦时。\n\n这些多维变量（您将会看到很多）仅仅是每个发电厂-城市组合对应一个变量的简写符号。因此，如果我们有 3 个发电厂和\
    \ 4 个城市，我们实际上引入了 3 * 4 = 12 个决策变量。这在内存上有些浪费，因为并非每个发电厂和每个城市之间都存在路径，但如果这成为一个问题，您将看到如何避免这种浪费。\n"
- fmt: '### 4.2.1.2 Objective


    The objective is to minimize cost in dollars of delivery. For this we will need
    a parameter for the cost. Let’s assume `C[i,j]` indexed exactly as the decision
    variable. The objective will therefore be


    ![$$ \min \kern0.125em \sum \limits_i\sum \limits_j{C}_{i,j}{x}_{i,j} $$](A457410_1_En_4_Chapter_Equ4.gif)


    (4.4)


    ### 4.2.1.3 Constraints


    The constraints are of two types, closely related: supply and demand. To refer
    to them, we introduce the following parameters, `S[i]`, `i ∈ P` and `D[j]`, `j
    ∈ C`, indicating the supply possible from plant `i` and the demand required by
    city `j`.


    Each plant has a maximum production capacity. We need to respect this maximum.
    So for each plant, we must cap the sum of the power delivered from that plant
    by an availability constraint, as in


    ![$$ \sum \limits_j{x}_{i,j}\le {S}_i\forall i\in P $$](A457410_1_En_4_Chapter_Equd.gif)


    Notice the inequality: we are not forcing the amount delivered to be at capacity,
    but only to be at most the supply capacity.


    The city demands are similar except that they must be met. Therefore,


    ![$$ \sum \limits_i{x}_{i,j}={D}_j\forall j\in C $$](A457410_1_En_4_Chapter_Eque.gif)


    Here we have an equality constraint. If we make a modeling error and put an inequality,
    say `≤`, the optimal solution will be all zero. On the other hand, we could have
    a `≥`. In this case, it would change nothing to the solution since we are minimizing
    the total cost.


    ### 4.2.1.4 Executable Model


    Let’s translate this into an executable model. To make the model general enough
    to solve all problems of this type, we will assume that the costs, demands, and
    supply capacities are given in a two-dimensional array called `D` structured as
    in Table [4-3](#A457410_1_En_4_Chapter.html#Tab3), where a zero cost indicates
    that there are no power lines between that plant-city combination.


    In more general terms than “plants” and “cities,” we can view each row as representing
    a producer and each column a consumer, except that the last row represents the
    demand and the last column the supply. The “product” exchanged between producers
    and consumers can be anything, not only divisible quantities like kW-h or liters
    of water, but trucks, flowers, data packets, or people. The optimal solution will
    never contain fractions of people. See Listing [4-2](#A457410_1_En_4_Chapter.html#Par56).


    ```

    1   def solve_model(D):

    2     s = newSolver(''Mincostuflowuproblem'')

    3     m,n = len(D)-1,len(D[0])-1

    4     B = sum([D[-1][j] for j in range(n)])

    5     G = [[s.NumVar(0,B if D[i][j] else 0,") for j in range(n)] \

    6         for i in range(m)]

    7     for i in range(m):

    8       s.Add(D[i][-1] >= sum(G[i][j] for j in range(n)))

    9     for j in range(n):

    10       s.Add(D[-1][j] == sum(G[i][j] for i in range(m)))

    11     Cost=s.Sum(G[i][j]*D[i][j] for i in range(m)for j in range(n))

    12     s.Minimize(Cost)

    13     rc  = s.Solve()

    14     return rc,ObjVal(s),SolVal(G)

    Listing 4-2

    Power Distribution Model (mincost.py)

    ```


    Line 6 defines the two-dimensional variable where the first index specifies the
    producer and the second, the consumer. Since we know that if a particular producer-consumer
    pair has no channel between, the entry is zero, so we use this to collapse the
    range of the variable to zero. A good solver will use this information to eliminate
    these variables before doing any other work.


    Line 8 ensures that we supply no more than each plant can produce while line 10
    ensures that the peak demands are satisfied. The objective function at line 11
    computes the total cost and indicates that we should minimize that quantity.


    The output of the model is displayed in Table [4-4](#A457410_1_En_4_Chapter.html#Tab4).
    The reader can verify that the total column is below or at the maximum that each
    plant can produce, while the total row is exactly the required peak demand of
    each consumer.


    **Table 4-4** Optimal Solution to the Power Distribution Problem


    | From/To | City 0 | City 1 | City 2 | City 3 | City 4 | City 5 | City 6 | Total
    |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Plant 0 |   |   |   |   | 247 |   | 281 | 528 |

    | Plant 1 | 288 |   |   | 231 |   | 170 |   | 689 |

    | Plant 2 |   | 234 | 236 |   |   | 92 |   | 562 |

    | Total | 288 | 234 | 236 | 231 | 247 | 262 | 281 |   |


    Here is again the interesting phenomenon: all solutions are integers, yet we did
    not impose any integrality constraints.


    ### 4.2.2 Variations


    The simplest variation is to have capacities on the arcs. Then we need to insure
    that no flow goes above the capacity. Assuming we have the capacities in matrix
    `A`, this is simply a question of adding a constraint of the form


    ![$$ {x}_{i,j}\le {A}_{i,j}\forall i\in P,\forall j\in C $$](A457410_1_En_4_Chapter_Equf.gif)


    An interesting variation involves spreading the sources. To minimize risks, for
    instance, we might not want to satisfy more than some fraction of the demand from
    one source. Say we decide that no city’s demand may be satisfied at more than
    60 percent from a single source, we could add a constraint of the form


    ![$$ {x}_{i,j}\le 0.6{D}_j\forall i\in P,\forall j\in C $$](A457410_1_En_4_Chapter_Equg.gif)


    The reader is encouraged to add this constraint and note that the optimal value
    will not be as low as it is without the constraint. Moreover, the solution might
    not be integral anymore. This simple additional constraint destroys the property
    that guarantees integrality. We must declare the decision variable integral (with
    the consequent increase in complexity and solution time) to guarantee an integral
    solution.


    Instead of material that flows, the problem sometimes appears as an assignment
    question: given a set of workers with specific skills and hourly wages and a set
    of jobs, which worker do you assign to which job to minimize cost?


    For example, consider a consulting firm with three teams based in different cities
    as well as three customers at different sites. Since the cost of travel varies
    from team to customer site, we want to minimize total travel cost. In this case,
    the demand and supply are simply one since we want one team per customer site
    and one customer assigned to each team. See Table [4-5](#A457410_1_En_4_Chapter.html#Tab5).


    **Table 4-5** Caption Needed


    |   | Customer 0 | Customer 1 | Customer 2 | Supply |

    | --- | --- | --- | --- | --- |

    | Team 0 | 25 | 30 | 20 | 1 |

    | Team 1 | 20 | 15 | 35 | 1 |

    | Team 2 | 18 | 19 | 28 | 1 |

    | Demand | 1 | 1 | 1 |   |'
