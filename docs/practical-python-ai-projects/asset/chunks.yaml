    ### 7.2.3 Selecting k Constraints Out of n


    A related trick is to select a certain number of constraints to be satisfied (and
    allowing others to be violated). Let’s consider the case of one constraint, say


    ![$$ \sum \limits_i{a}_i{x}_i\le b, $$](A457410_1_En_7_Chapter_Equ3.gif)


    (7.3) where x is the decision variable. We may want to either raise an indicator
    variable if the constraint is satisfied or force the constraint if the indicator
    is raised:


    ![$$ \delta =1\Rightarrow \sum \limits_i{a}_i{x}_i\le b $$](A457410_1_En_7_Chapter_Equ4.gif)


    (7.4) or


    ![$$ \sum \limits_i{a}_i{x}_i\le b\Rightarrow \delta =1 $$](A457410_1_En_7_Chapter_Equ5.gif)


    (7.5)


    This technique of associating a binary variable to the state of a constraint is
    known as reifying a constraint.[⁶](#A457410_1_En_7_Chapter.html#Fn6)


    Let’s consider first the simpler equation (7.4). We need bounds


    ![$$ {\displaystyle \begin{array}{l}{u}_b:= \underset{x}{\max}\sum \limits_i{a}_i{x}_i-b,\\
    {}{l}_b:= \underset{x}{\min}\sum {a}_i{x}_i-b.\end{array}} $$](A457410_1_En_7_Chapter_Equl.gif)


    The bounds need not be exactly computed, although, as you will see, this is easily
    done. Any valid bound will work, with the usual caveat that in order to avoid
    numerical difficulties, one should not use introduce “large” numbers. Armed with
    these parameters , we can add the constraint.


    ![$$ {\displaystyle \sum {a}_i{x}_i\le b+{u}_b\left(1-\delta \right)} $$](A457410_1_En_7_Chapter_Equm.gif)


    If ![$$ \delta =0 $$](A457410_1_En_7_Chapter_IEq32.gif), then the constraint is
    vacuous over the domain of x. If, on the other hand, ![$$ \delta =1 $$](A457410_1_En_7_Chapter_IEq33.gif),
    then the constraint must hold.


    The other direction, equation (7.5), is neither as useful, nor as simple, but
    is an amusing exercise in translating logical expressions into algebraic ones.


    First, let’s formulate use the contrapositive of (7.5), namely


    ![$$ {\displaystyle \begin{array}{l}\delta =0\Rightarrow \sum \limits_i{a}_i{x}_i\nleqq
    b\kern0.50em \mathrm{or}\\ {}\delta =0\Rightarrow \sum \limits_i{a}_i{x}_i>b\end{array}}
    $$](A457410_1_En_7_Chapter_Equn.gif)


    In the case where a, b, and x are all integer variables , then the meaning of
    ![$$ \sum \limits_i{a}_i{x}_i>b $$](A457410_1_En_7_Chapter_IEq34.gif) is clear.
    It means ![$$ \sum \limits_i{a}_i{x}_i\ge b+1 $$](A457410_1_En_7_Chapter_IEq35.gif).
    The main difficulty occurswhen x is a continuous variable. Then we need to decide
    the meaning of > and it will be dependent on the problem we are modeling.


    We need to decree that some e violation of the inequality is enough. If x represents
    wavelengths of visible light in meters, the value of e might be in the order of
    10 ^(−9) . If x represent the money the US government spends on its military,
    then 105 might be fine. In any case, what we now want to implement is


    ![$$ \delta =0\Rightarrow \sum \limits_i{a}_i{x}_i\ge b+\varepsilon $$](A457410_1_En_7_Chapter_Equ6.gif)


    (7.6)


    Once the modeler has decreed ε, we add


    ![$$ {\displaystyle \sum {a}_i{x}_i\ge b}+{l}_b\delta +\varepsilon \left(1-\delta
    \right) $$](A457410_1_En_7_Chapter_Equ7.gif)


    (7.7)


    If ![$$ \delta =0 $$](A457410_1_En_7_Chapter_IEq36.gif), then this reduces to
    (7.6). If ![$$ \delta =1 $$](A457410_1_En_7_Chapter_IEq37.gif), then the lower
    bound comes into play and the constraint becomes vacuous. The case of “smaller
    than” is handled similarly or, even more easily, by multiplying everything by
    −1 and using the above. The case of equality is handled by transforming it into
    two inequalities.


    Armed with these equations, we can now select k constraint out of n, by creating
    one indicator variable δ [i] per constraint and using our previously defined `k_out_of_n`
