    # 7. Advanced Techniques


    In this chapter I cover some of the tricks optimizers have developed over the
    years to twist models and cajole solvers into providing solutions for problems
    that do not easily fit the Procrustean rules of mathematical optimization.


    Some of these techniques involve iteratively solving a sequence of partial models,
    converging to the solution we seek. Some involve the creative use of layers upon
    layers of decision variables, each abstracting an additional level of details.
    Some involve the inspection of an invalid model to gain insight into an improved
    one. All in all, it’s a mixed bag of jewels with little in common but the goal
    of solving more complex problems.


    I end with a series of puzzles that are rarely considered by classical optimizers
    but are the bread and butter of constraint programmers. To solve them, we build
    a small library of functions that proves invaluable in succinctly expressing these
    models, proving, I trust, that with the right tools and the right language, the
    expressive power of constraint programming can be carried over to integer programming.


    ## 7.1 Cutting Stock


    The cutting stock problem originated in the paper and textile industries. A typical
    mill produces paper in very large product rolls (large in length and in width),
    which are then cut to the width required by the customers. Let’s call the latter
    consumer rolls . For instance, tabloid printers want their paper in rolls 17 inches
    wide, while broadsheet printers want twice that width. These consumer rolls are
    cut to page size after printing. The cutting problem, for the paper producer,
    is to cut the large-width rolls to satisfy customer demands while minimizing waste.


    Table [7-1](#A457410_1_En_7_Chapter.html#Tab1) is a random instance of orders
    we will solve to illustrate the model. The first column is the number of consumer
    rolls in the order and the second column is the required width that has been pre-processed
    to be measured in percentage of the product roll width.


    Table 7-1


    Example of Cutting Stock Problem


    | Order | Nb rolls | % Width |

    | --- | --- | --- |

    | 0 | 6 | 25 |

    | 1 | 12 | 21 |

    | 2 | 7 | 26 |

    | 3 | 3 | 23 |

    | 4 | 8 | 33 |

    | 5 | 2 | 15 |

    | 6 | 2 | 34 |


    We want to minimize paper waste , which really means minimizing the total number
    of product rolls used. But, in order to do the cutting, we will need more information,
    namely given any product roll, how is it to be cut? Say we have a number of orders
    for 21% and for 36%, do we cut at 21%, 42%, 63%, and 99% with a waste of 1% or
    at 36%, 72%, and 93% for a waste of 7%? It may be that we need to cut half our
    rolls with the first pattern and half with the second to satisfy all demands.
    Which patterns to cut and how many rolls of a given pattern are the key problems.
    See Figure [7-1](#A457410_1_En_7_Chapter.html#Fig1).


    ![A457410_1_En_7_Fig1_HTML.jpg](A457410_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Which pattern do we use?


    ### 7.1.1 Constructing a Model


    Originally the problem was attacked by specifying various cutting patterns, sometimes
    statically, sometimes dynamically. This was more or less forced by the technology
    of the time. Things have changed; both processors and solvers are considerably
    faster. Moreover, a good modeler should try the simplest approach first and make
    it more complex if, and only if, it fails. With this in mind, we will leave to
    the solver the problem of deciding on the patterns.'
