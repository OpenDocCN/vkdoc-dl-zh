  trans: '

    ### 2.1.2 变体


    该问题存在若干简单变体。


    -   我们可能并非要最小化成本，而是给定一个利润需要最大化。也可能在食物或营养素中不存在最小值或最大值。

    -   当额外增加诸如“如果使用了食物 2，那么饮食中必须至少包含等量的食物 3”或“营养素 3 的摄入量必须至少是营养素 4 的两倍”这类要求时，问题会变得更加复杂，也因此更有趣。让我们详细探讨其中一些情况。首先，尝试“如果使用了食物
    2，那么食物 3 的份数也必须至少相等”。以下不等式可确保所需结果：`f[3] >= f[2]`。请注意，即使未使用食物 2，食物 3 仍可被包含，这并不违反要求。而如果使用了食物
    2，那么食物 3 的份数将至少与之相等。显然，该要求也可以反过来表述为“食物 2 的份数不得超过食物 3”。约束条件相同。

    -   对营养素的要求，例如“营养素 3 的摄入量必须至少是营养素 4 的两倍”，性质类似，但需注意，任何给定营养素的含量都分散在所有食物中。引入辅助变量来统计营养素含量可能会很有帮助，例如设`n[j]`。然后我们为每种营养素在模型中添加一个等式：


    ```

    n_j <= sum_i N_ij * f_i

    ```


    请注意，这些等式并不约束问题本身；它们的引入只是为了实现该要求而提供的一种便捷手段。现在，我们可以根据新要求轻松关联营养素含量，如下所示：


    ```

    n_3 >= 2 * n_4

    ```


    如果我们没有定义变量`n[i]`，则上述要求可以表述为：


    ```

    sum_i N_i3 * f_i >= 2 * sum_i N_i4 * f_i

    ```


    定义辅助变量`n[j]`似乎更清晰。此外，在最后显示每种营养素的总量可能有助于分析或呈现解决方案。


    -   读者可能会想到一个类似的要求，即“如果使用了食物（营养素）3，则不得使用食物（营养素）4（反之亦然）”。这看起来像是上述情况的简单变体，但实际上绝非简单。事实上，它迫使建模者使用不同的建模技术。你将在后续章节中了解如何实现此类要求（例如，参见第
    7 章第 7.2 节）。正确建模此类要求有两种有效方法：整数规划和约束规划。鼓励读者花些时间尝试对这些约束进行建模，以培养对其中难点的直觉。关键在于，这也是此类问题完全不同的原因所在：变化不仅仅是数量上的（如“与……一样多”或“是……的两倍”），还额外涉及性质上的变化：我们在“拥有某个元素”和“不拥有该元素”之间进行转换。


    ### 2.1.3 所考虑问题的结构


    具有饮食问题结构的问题通常被称为产品组合问题。它们可以以各种方式呈现，但如果能将其纳入抽象的**表 2-2** 中，则都可以按照本节所述的方法处理。当然，某些列或行可能缺失（没有成本、没有价格、没有最大需求等）。这只会简化模型。


    **表 2-2** 产品组合问题的抽象结构


    |       |       | 成分 | 可用量 | 成本 |

    |-------|-------|------------|----------------|------|

    |       |       | `C[1]` ... `C[n]` | 最小值 | 最大值 |      |

    |       | `P[1]` | 99 ... 99 | 99 | 99 | 99 |

    | 产品 | ... | ... ... ... | ... | ... | ... |

    |       | `P[m]` | 99 ... 99 | 99 | 99 | 99 |

    | 需求 | 最小值 | 99 ... 99 | 99 | 99 | 99 |

    |       | 最大值 | 99 ... 99 | 99 | 99 | 99 |

    | 价格 |       | 99 ... 99 | 99 | 99 | 99 |


    决策变量表示所需产品的数量，约束条件表示原材料的可用量，或加工单元的能力以及需求界限。目标通常是最大化利润、最小化成本，或者仅仅是确定生产数量。


    以下是一些实例，帮助读者识别其底层结构。鼓励读者通过自行设定数字，将这些问题整理成**表 2-2** 的格式。


    -   一家工厂生产多种类型的水泥。每种产品都由相同的元素组成，但数量不同，并且我们手头每种元素的供应量有限，且各有成本。每种最终产品都对应一个利润。为了最大化利润，最佳的产品组合是什么？

    -   一家总部位于佛罗里达州的果汁公司为不同市场生产橙汁饮料、果汁和浓缩汁。所有产品的原材料都是橙子、糖、水以及时间，数量各不相同，有些为正，有些为负（生产橙汁饮料需要水；生产浓缩汁会产生水）。在给定可用量的情况下，公司生产多少才能最大化利润？

    -   一家玩具制造商生产多种不同的玩具。每种玩具都由若干种基础材料组成，此外还需要特殊加工（组装、喷漆、包装）。加工在专用机器上进行，并且有持续时间。由于制造商的材料和机器供应有限，且机器每天只能运行一定小时数，那么可以生产多少玩具？

    -   一家名为布什、罗夫公司（BR & Co.）的化肥公司有两种产品：高磷混合肥和低磷混合肥。它们是通过混合不同数量的原材料制成的。公司可以从其子公司处每天以固定的内部成本采购最多一定数量的每种原材料。该成本包括劳动力、电力、折旧、运输、贿赂等。此外，混合过程每吨产品会产生一定的成本。两种产品都以固定价格出售给批发商福克斯公司。而且，批发商已同意购买
    BR & Co. 能够生产的所有产品。那么，每种肥料应该生产多少？

    -   奎奎格销售半公斤袋装的咖啡，有三种混合口味：家常、特调和美食，每袋售价不同。每种混合口味由不同比例的哥伦比亚、古巴和肯尼亚咖啡豆制成。奎奎格手头有一些哥伦比亚、古巴和肯尼亚咖啡豆。为了最大化收入，每种混合口味应该装袋多少？

    '
- fmt: "## 2.2 Blending\n\nA second type of problem that readily admits a linear model\
    \ is the blending problem. The classical example involves blending so-called raw\
    \ or crude gasolines to achieve various refined products with specified octane\
    \ value. For instance, let’s assume that we are given crude gasolines `R0, R1,\
    \ ... , Rn`, each with a certain octane rating, maximum availabilities in barrels,\
    \ and a cost in dollars per barrels, as shown in Table [2-3](#A457410_1_En_2_Chapter.html#Tab3).\n\
    \nTable 2-3  \nExample of Raw Gasolines for the Blending Problem\n\n| Gas | Octane\
    \ | Availability | Cost |\n| --- | --- | --- | --- |\n| R0 | 99 | 782 | 55.34\
    \ |\n| R1 | 94 | 894 | 54.12 |\n| R2 | 84 | 631 | 53.68 |\n| R3 | 92 | 648 | 57.03\
    \ |\n| R4 | 87 | 956 | 54.81 |\n| R5 | 97 | 647 | 56.25 |\n| R6 | 81 | 689 | 57.55\
    \ |\n| R7 | 96 | 609 | 58.21 |\n\nWe are also given demands for multiple types\
    \ of refined gasolines (think Bronze, Silver, and Gold) with their own octane\
    \ ratings. The demands are stated in minimum and maximum number of barrels along\
    \ with their selling prices, as shown in Table [2-4](#A457410_1_En_2_Chapter.html#Tab4).\n\
    \nTable 2-4  \nExample of Refined Gasolines for the Blending Problem\n\n| Gas\
    \ | Octane | Min. Demand | Max. Demand | Price |\n| --- | --- | --- | --- | ---\
    \ |\n| F0 | 88 | 415 | 11707 | 61.97 |\n| F1 | 94 | 199 | 7761 | 62.04 |\n| F2\
    \ | 90 | 479 | 12596 | 61.99 |\n\nWe create the three types by mixing the appropriate\
    \ raw gasolines together, assuming that the octane rating of a mix is a linear\
    \ function of the volumes mixed. This is a crucial assumption: if we mix half\
    \ and half of octane ratings 80 and 90, we get an octane rating of 85 because\n\
    \n```\n1/2 * 80 + 1/2 * 90 = 40 + 45 = 85\n```\n\nIf we mix 40% of octane 80 and\
    \ 60% of octane 90, we get\n\n```\n40/100 * 80 + 60/100 * 90 = 32 + 54 = 86\n\
    ```\n\nThis assumption is the key to the blending model.\n\nNotice that there\
    \ might be a number of ways to mix the raw gasolines together to get the required\
    \ ratings. Our task is to construct a model that will tell us exactly how to mix\
    \ the raw products to satisfy the demands and maximize the profits (understood\
    \ as the difference between the total selling price of the finished products and\
    \ the total cost of the raw gasolines).\n\n### 2.2.1 Constructing a Model\n\n\
    What is the question to answer? Let’s ask this question a number of times with\
    \ increasing precision. A first stab is “How much of each type of refined gas\
    \ to produce?” This is correct but is incomplete, since we need to know the composition\
    \ of each refined gas, how much of each crude goes into each mix. A second stab\
    \ is “How to mix the crude gas to produce the refined gas?” This is the right\
    \ question, but is not yet in the proper form for an algebraic model. Imagine\
    \ you are the manager of the refinery. On one side you have all these tanks filled\
    \ with crude gas, and on the other side all empty tanks that will contain the\
    \ refined gas. In between: miles of pipes with valves that you control. What you\
    \ really want to know is which valves to open and by how much to have exactly\
    \ the right mix. So the proper question is “How much of each crude gas goes into\
    \ each refined gas?”\n\nThe key difference between the mixing problems of the\
    \ preceding section and this blending problem is that previously we were told\
    \ the exact composition of the products in terms of the material (in each food,\
    \ the amount of each nutrient, for instance) while in the problem considered here,\
    \ the composition of each product is one of the answers sought.\n\nSince we need\
    \ to know how much of raw `i` goes into refined `j`, we are led to a two-dimensional\
    \ decision variable, say `G[ij]` where `i` is the index of the crude gas and `j`\
    \ is the index of the refined gas. For example, `G[51] = 250` will mean that there\
    \ are 250 barrels of crude 5 going into the mix of refined 1. We understand here\
    \ that the units will be barrels; it seems natural because the prices are per\
    \ barrels. We probably should also introduce auxiliary variables to help us model\
    \ and present the solution: the total of each crude gas (the sum of a row of `G`),\
    \ say `R[i]`, and the total of each refined gas (the sum of a column of `G`),\
    \ say `F[j]`. So we will have these non-constraining equations in the model:\n\
    \n```\nR_i = sum_j G_ij   ∀ i\n```\n\n(2.2) and\n\n```\nF_j = sum_i G_ij   ∀ j\n\
    ```\n\n(2.3)\n\nNote that, by construction, `sum_i R_i = sum_j F_j`. That is,\
    \ the total volume of crude used is equal to the total volume of refined products.\
    \ We need not enforce this, though we need it. We can think of this as a “continuity”\
    \ equation: it reflects that the refining process does not lose product along\
    \ the way. This idea of continuity is a useful modeling idea. It will reappear\
    \ in various guises throughout the models we develop.\n\nArmed with these variables,\
    \ we can now easily model the objective function. We are asked to maximize profits,\
    \ hence the difference between total sales (given price `p[j]` for refined gas\
    \ `j`) and costs (given cost `c[i]` for crude gas `i`),\n\n```\nmax sum_j F_j\
    \ * p_j - sum_i R_i * c_i\n```\n\nThe constraints come in multiple forms. The\
    \ easy ones are, as in the mixing problems, constraints on the availability of\
    \ each raw material. With our auxiliary variables, these are simple to express\
    \ and can be included in the range of the defined variables or in a constraint\n\
    \n```\n0 <= R_i <= u_i   ∀ i\n```\n\nThe constraints on the demand of refined\
    \ gas (minimum and/or maximum) are just as simple:\n\n```\na_j <= F_j <= b_j \
    \  ∀ i\n```\n\nNotice how our auxiliary variables help write down constraints.\
    \ Having only our decision variables, the constraints would have to be written\
    \ with respect to column and row sums."
  raw: '## 2.2 Blending


    A second type of problem that readily admits a linear model is the blending problem
    . The classical example involves blending so-called raw or crude gasolines to
    achieve various refined products with specified octane value. For instance, let’s
    assume that we are given crude gasolines `R0, R1, ... , Rn`, each with a certain
    octane rating, maximum availabilities in barrels, and a cost in dollars per barrels,
    as shown in Table [2-3](#A457410_1_En_2_Chapter.html#Tab3).


    Table 2-3


    Example of Raw Gasolines for the Blending Problem


    | Gas | Octane | Availability | Cost |

    | --- | --- | --- | --- |

    | R0 | 99 | 782 | 55.34 |

    | R1 | 94 | 894 | 54.12 |

    | R2 | 84 | 631 | 53.68 |

    | R3 | 92 | 648 | 57.03 |

    | R4 | 87 | 956 | 54.81 |

    | R5 | 97 | 647 | 56.25 |

    | R6 | 81 | 689 | 57.55 |

    | R7 | 96 | 609 | 58.21 |


    We are also given demands for multiple types of refined gasolines, (think Bronze,
    Silver, and Gold) with their own octane ratings. The demands are stated in minimum
    and maximum number of barrels along with their selling prices, as shown in Table
    [2-4](#A457410_1_En_2_Chapter.html#Tab4).


    Table 2-4


    Example of Refined Gasolines for the Blending Problem


    | Gas | Octane | Min. Demand | Max. Demand | Price |

    | --- | --- | --- | --- | --- |

    | F0 | 88 | 415 | 11707 | 61.97 |

    | F1 | 94 | 199 | 7761 | 62.04 |

    | F2 | 90 | 479 | 12596 | 61.99 |


    We create the three types by mixing the appropriate raw gasolines together, assuming
    that the octane rating of a mix is a linear function of the volumes mixed. This
    is a crucial assumption: if we mix half and half of octane ratings 80 and 90,
    we get an octane rating of 85 because


    ![$$ \frac{1}{2}80+\frac{1}{2}90=40+45=85 $$](A457410_1_En_2_Chapter_Equh.gif)


    If we mix 40% of octane 80 and 60% of octane 90, we get


    ![$$ \frac{40}{100}80+\frac{60}{100}90=32+54=86 $$](A457410_1_En_2_Chapter_Equi.gif)


    This assumption is the key to the blending model.


    Notice that there might be a number of ways to mix the raw gasolines together
    to get the required ratings. Our task is to construct a model that will tell us
    exactly how to mix the raw products to satisfy the demands and maximize the profits
    (understood as the difference between the total selling price of the finished
    products and the total cost of the raw gasolines).


    ### 2.2.1 Constructing a Model


    What is the question to answer? Let’s ask this question a number of times with
    increasing precision. A first stab is “How much of each type of refined gas to
    produce?” This is correct but is incomplete, since we need to know the composition
    of each refined gas, how much of each crude goes into each mix. A second stab
    is “How to mix the crude gas to produce the refined gas?” This is the right question,
    but is not yet in the proper form for an algebraic model . Imagine you are the
    manager of the refinery. On one side you have all these tanks filled with crude
    gas, and on the other side all empty tanks that will contain the refined gas.
    In between: miles of pipes with valves that you control. What you really want
    to know is which valves to open and by how much to have exactly the right mix.
    So the proper question is “How much of each crude gas goes into each refined gas?”


    The key difference between the mixing problems of the preceding section and this
    blending problem is that previously we were told the exact composition of the
    products in terms of the material (in each food, the amount of each nutrient,
    for instance) while in the problem considered here, the composition of each product
    is one of the answers sought.


    Since we need to know how much of raw i goes into refined j, we are led to a two-dimensional
    decision variable, say G [ij] where i is the index of the crude gas and j is the
    index of the refined gas. For example, G [51] = 250 will mean that there are 250
    barrels of crude 5 going into the mix of refined 1\. We understand here that the
    units will be barrels; it seems natural because the prices are per barrels. We
    probably should also introduce auxiliary variables to help us model and present
    the solution: the total of each crude gas (the sum of a row of G), say R [i] ,
    and the total of each refined gas (the sum of a column of G), say F [j] . So we
    will have these non-constraining equations in the model:


    ![$$ {R}_i=\sum \limits_j{G}_{ij}\kern1em \forall i $$](A457410_1_En_2_Chapter_Equ2.gif)


    (2.2) and


    ![$$ {F}_j=\sum \limits_i{G}_{ij}\kern1em \forall j $$](A457410_1_En_2_Chapter_Equ3.gif)


    (2.3)


    Note that, by construction , ∑ [i] R [i] = ∑ [j] F [j] . That is, the total volume
    of crude used is equal to the total volume of refined products. We need not enforce
    this, though we need it. We can think of this as a “continuity” equation : it
    reflects that the refining process does not lose product along the way. This idea
    of continuity is a useful modeling idea. It will reappear in various guises throughout
    the models we develop.


    Armed with these variables, we can now easily model the objective function. We
    are asked to maximize profits, hence the difference between total sales (given
    price p [j] for refined gas j) and costs (given cost c [i] for crude gas i),


    ![$$ \max \sum \limits_j{F}_j{p}_j-\sum \limits_i{R}_i{c}_i $$](A457410_1_En_2_Chapter_Equj.gif)


    The constraints come in multiple forms. The easy ones are, as in the mixing problems,
    constraints on the availability of each raw material. With our auxiliary variables,
    these are simple to express and can be included in the range of the defined variables
    or in a constraint


    ![$$ 0\le {R}_i\le {u}_i\kern1em \forall i $$](A457410_1_En_2_Chapter_Equk.gif)


    The constraints on the demand of refined gas (minimum and/or maximum) are just
    as simple:


    ![$$ {a}_j\le {F}_j\le {b}_j\kern1em \forall i $$](A457410_1_En_2_Chapter_Equl.gif)


    Notice how our auxiliary variables help write down constraints. Having only our
    decision variables, the constraints would have to be written with respect to column
    and row sums.'
  trans: "\n## 2.2 混合问题\n\n另一类易于用线性模型描述的问题是混合问题。经典案例涉及混合所谓的原油或粗汽油，以生产具有特定辛烷值的各种精炼产品。例如，假设我们有粗汽油\
    \ `R0, R1, ... , Rn`，每种都有特定的辛烷值、最大可用桶数以及每桶成本，如表 2-3 所示。\n\n表 2-3  \n混合问题中粗汽油示例\n\
    \n| 汽油 | 辛烷值 | 可用量 | 成本 |\n| --- | --- | --- | --- |\n| R0 | 99 | 782 | 55.34\
    \ |\n| R1 | 94 | 894 | 54.12 |\n| R2 | 84 | 631 | 53.68 |\n| R3 | 92 | 648 | 57.03\
    \ |\n| R4 | 87 | 956 | 54.81 |\n| R5 | 97 | 647 | 56.25 |\n| R6 | 81 | 689 | 57.55\
    \ |\n| R7 | 96 | 609 | 58.21 |\n\n我们还获得了多种精炼汽油（例如青铜级、银级和金级）的需求，每种都有各自的辛烷值。需求以最小和最大桶数以及销售价格的形式给出，如表\
    \ 2-4 所示。\n\n表 2-4  \n混合问题中精炼汽油示例\n\n| 汽油 | 辛烷值 | 最小需求 | 最大需求 | 价格 |\n| --- |\
    \ --- | --- | --- | --- |\n| F0 | 88 | 415 | 11707 | 61.97 |\n| F1 | 94 | 199\
    \ | 7761 | 62.04 |\n| F2 | 90 | 479 | 12596 | 61.99 |\n\n我们通过混合适当的粗汽油来生产这三种产品，假设混合物的辛烷值是混合体积的线性函数。这是一个关键假设：如果将辛烷值为\
    \ 80 和 90 的汽油各半混合，我们会得到辛烷值为 85 的混合物，因为\n\n```\n1/2 * 80 + 1/2 * 90 = 40 + 45 =\
    \ 85\n```\n\n如果将 40% 辛烷值为 80 的汽油与 60% 辛烷值为 90 的汽油混合，我们会得到\n\n```\n40/100 * 80\
    \ + 60/100 * 90 = 32 + 54 = 86\n```\n\n这个假设是混合模型的关键。\n\n请注意，可能存在多种混合粗汽油以达到所需辛烷值的方法。我们的任务是构建一个模型，该模型能精确告诉我们如何混合粗产品以满足需求并最大化利润（理解为成品总销售价格与粗汽油总成本之间的差额）。\n\
    \n### 2.2.1 构建模型\n\n要回答的问题是什么？让我们以越来越精确的方式多次提出这个问题。初步尝试是“每种精炼汽油各生产多少？”这虽然正确但不完整，因为我们需要知道每种精炼汽油的组成，即每种粗汽油在每种混合物中的用量。第二次尝试是“如何混合粗汽油以生产精炼汽油？”这是正确的问题，但尚未形成适合代数模型的形式。想象你是炼油厂的经理。一边是装满粗汽油的储罐，另一边是即将盛放精炼汽油的空罐。中间是数英里长的管道，上面有你控制的阀门。你真正想知道的是打开哪些阀门以及打开多少才能得到精确的混合物。因此，正确的问题是“每种粗汽油有多少进入每种精炼汽油？”\n\
    \n本节混合问题与前一节混合问题的关键区别在于：在前一节中，我们已知产品相对于原料的精确组成（例如，每种食物中每种营养素的含量）；而在此处考虑的问题中，每种产品的组成正是我们寻求的答案之一。\n\
    \n由于我们需要知道多少粗汽油 `i` 进入精炼汽油 `j`，我们引入一个二维决策变量，例如 `G[ij]`，其中 `i` 是粗汽油的索引，`j` 是精炼汽油的索引。例如，`G[51]\
    \ = 250` 表示有 250 桶粗汽油 5 进入精炼汽油 1 的混合物中。我们在此理解单位是桶；这似乎很自然，因为价格是按桶计算的。我们可能还应该引入辅助变量来帮助建模和呈现解决方案：每种粗汽油的总量（`G`\
    \ 矩阵中一行的和），例如 `R[i]`，以及每种精炼汽油的总量（`G` 矩阵中一列的和），例如 `F[j]`。因此，我们在模型中将有以下非约束性方程：\n\
    \n```\nR_i = sum_j G_ij   ∀ i\n```\n\n(2.2) 以及\n\n```\nF_j = sum_i G_ij   ∀ j\n\
    ```\n\n(2.3)\n\n注意，根据构造，`sum_i R_i = sum_j F_j`。也就是说，所用粗汽油的总体积等于精炼产品的总体积。我们不需要强制执行这一点，尽管我们需要它。我们可以将其视为一个“连续性”方程：它反映了精炼过程不会沿途损失产品。这种连续性的概念是一个有用的建模思路。它将在我们开发的模型中反复出现。\n\
    \n有了这些变量，我们现在可以轻松地对目标函数进行建模。我们的目标是最大化利润，即总销售额（给定精炼汽油 `j` 的价格 `p[j]`）与总成本（给定粗汽油\
    \ `i` 的成本 `c[i]`）之间的差额，\n\n```\nmax sum_j F_j * p_j - sum_i R_i * c_i\n```\n\n\
    约束条件有多种形式。简单的约束条件与混合问题中的类似，即每种原料的可用量限制。借助我们的辅助变量，这些约束很容易表达，并且可以包含在定义变量的范围或约束条件中\n\
    \n```\n0 <= R_i <= u_i   ∀ i\n```\n\n关于精炼汽油需求（最小和/或最大）的约束同样简单：\n\n```\na_j <=\
    \ F_j <= b_j   ∀ i\n```\n\n注意我们的辅助变量如何帮助编写约束条件。如果只有我们的决策变量，约束条件将不得不根据列和与行和来编写。\n"
- fmt: '该问题唯一的复杂之处在于辛烷值。关键在于线性假设。为了理解如何对辛烷值需求进行建模，让我们设想一个简单的情况：假设我们将800桶辛烷值为98的原油1与200桶辛烷值为90的原油2混合。最终的辛烷值是多少？由于我们总共有1,000桶精炼油：


    ![$$ \frac{800\times 98+200\times 90}{1000}=96.4 $$](A457410_1_En_2_Chapter_Equm.gif)


    因此，一般来说，我们需要混合中每种原油的比例乘以其辛烷值。假设`O[i]`为原油`i`的辛烷值，`o[j]`为精炼油`j`的辛烷值，这引出了：


    ![$$ \sum \limits_i{O}_i{G}_{ij}={F}_j{o}_j\kern1em \forall j $$](A457410_1_En_2_Chapter_Equ4.gif)


    (2.4)


    现在我们有了一个代数线性模型。让我们将其转换为可执行代码，如清单[2-4](#A457410_1_En_2_Chapter.html#Par73)所示。我们假设数据以二维数组的形式输入，与表[2-3](#A457410_1_En_2_Chapter.html#Tab3)和[2-4](#A457410_1_En_2_Chapter.html#Tab4)完全相同，但第一列除外，该列仅为参考而添加。


    ```

    1  def solve_gas(C, D):

    2    s = newSolver(''Gas blending problem'')

    3    nR,nF = len(C),len(D)

    4    Roc,Rmax,Rcost = 0,1,2

    5    Foc,Fmin,Fmax,Fprice = 0,1,2,3

    6    G = [[s.NumVar(0.0,10000,'''')

    7        for j in range(nF)] for i in range(nR)]

    8    R = [s.NumVar(0,C[i][Rmax],'''') for i in range(nR)]

    9    F = [s.NumVar(D[j][Fmin],D[j][Fmax],'''') for j in range(nF)]

    10    for i in range(nR):

    11      s.Add(R[i] == sum(G[i][j] for j in range(nF)))

    12    for j in range(nF):

    13      s.Add(F[j] == sum(G[i][j] for i in range(nR)))

    14    for j in range(nF):

    15      s.Add(F[j]*D[j][Foc] ==

    16          s.Sum([G[i][j]*C[i][Roc] for i in range(nR)]))

    17  Cost = s.Sum(R[i]*C[i][Rcost] for i in range(nR))

    18  Price = s.Sum(F[j]*D[j][Fprice] for j in range(nF))

    19  s.Maximize(Price - Cost)

    20  rc = s.Solve()

    21  return rc,ObjVal(s),SolVal(G)

    Listing 2-4

    Gasoline Blending Model (gas blend.py)

    ```


    在第3-5行，我们声明了一些常量以访问数据的相应行和列。每个变量的范围约束不是作为约束输入的，而是作为相应变量的范围输入的。方程(2.2)-(2.3)出现在从第10行开始的四行中。


    混合方程是在第14行的循环中创建的。请注意，由于目标是达到特定的辛烷值，我们可以将等式替换为不等式，表明精炼产品至少达到所需的辛烷值水平。这稍微放宽了问题，并允许在更大的空间上进行优化。例如，如果我们没有足够的低辛烷值原油汽油可用，则可能需要这样做。


    目标函数（从第17行开始的三行）最大化精炼产品的销售价格与所用原油成本之间的差值。


