  trans: '

    # 3. 隐式线性连续模型


    本章中，我们将对某些问题进行“暴力”改造，以揭示其内在结构。重点在于那些乍看之下并非连续线性类型，但通过一些创造性的调整却能转化为该形式的问题。关键在于确保原始问题与改造后问题之间存在一一对应关系，这样我们就能从改造后问题的解中还原出原始问题的解。


    以这种方式处理问题的主要原因是，连续线性求解器的速度已经变得非常快，能够处理包含数十万个变量和约束的模型。因此，如果一个问题能够以这种方式建模，那么可求解的实例规模实际上几乎没有限制。正如你稍后将看到的，更复杂的模型则并非如此。事实上，我们可以编写只有几十个变量的模型，但当前没有任何求解器能在合理时间内求解。


    本章遇到的主要障碍是各种类型的非线性，但有一个有利的限制条件：所考虑的函数必须是凸函数。凸函数¹是指位于其任何有效线性近似“上方”的函数。在一维情况下，从代数角度看，如果满足以下条件，则
    `f` 在点 `x0` 处是凸的：


    ![$$ f\kern0.125em \left({x}_0+h\right)\ge f\kern0.125em \left({x}_0\right)+{f}^{\prime}\kern0.125em
    \left({x}_0\right)h $$](img/A457410_1_En_3_Chapter_Equa.gif)


    从几何角度看，它看起来像图 3-1，其中展示了 `f(x) = x²` 在 `x[0] = 4` 处的一阶近似。凸性将成为攻克非线性的特洛伊木马。


    ![A457410_1_En_3_Fig1_HTML.jpg](img/A457410_1_En_3_Fig1_HTML.jpg)


    **图 3-1** 凸函数及其线性近似的典型示例


    ## 3.1 分段线性


    这里我们考虑分段线性函数。按照传统说法，它们是分段线性的。因此，我们迄今为止使用的线性规划求解器（`GLPK`、`GLOP`、`CLP`）无法直接处理它们，但通过我们编写少量代码，就能将它们转化为所有求解器都能处理的标准形式。这也是用
    Python 而非专用建模语言编写模型的一个很好的理由。


    作为第一个例子，为了说明技术本身而不引入可能掩盖本质的旁支问题，让我们考虑一个分段函数，其定义如下：


    ![$$ f\kern0.125em (x)=\Big\{{\displaystyle \begin{array}{l}{C}_1x\kern12.25em
    \ \ \kern0.28em \ \kern0.28em \ \kern0.125em \ \kern0.41em 0\le x\le {B}_1,\\
    {}{C}_1{B}_1+{C}_2\left(x-{B}_1\right)\kern6em \ \kern0.28em \ \kern0.67em {B}_1\le
    x\le {B}_2,\\ {}{C}_1{B}_1+{C}_2\kern0.125em \left({B}_2-{B}_1\right)+{C}_3\kern0.125em
    \left(x-{B}_2\right)\ \ {B}_2\le x\le {B}_3,\\ {}\dots \end{array}} $$](img/A457410_1_En_3_Chapter_Equ1.gif)


    (3.1)


    我们可以将这个函数视为一个运输成本函数，并附加了针对重量的惩罚项；也就是说，我们运输的产品越多，每单位的成本就越高。表 3-1（以及图 3-2）展示了这个简单函数的一个实例，其中前两列界定了数量范围（`B[i]`,
    `B[i+1]`），第三列是单位成本 `c[i]`。


    我们将通过最小化该函数并施加一个简单的数量上限来演示这种方法。


    **表 3-1** 分段函数示例


    | (起始值 | 结束值] | 单位成本 | (总成本 | 总成本] |

    | --- | --- | --- | --- | --- |

    | 0 | 148 | 24 | 0 | 3552 |

    | 148 | 310 | 28 | 3552 | 8088 |

    | 310 | 501 | 32 | 8088 | 14200 |

    | 501 | 617 | 34 | 14200 | 18144 |

    | 617 | 762 | 36 | 18144 | 23364 |

    | 762 | 959 | 40 | 23364 | 31244 |


    ### 3.1.1 构建模型


    在这个问题中，我们需要决定的仅仅是生产数量。我们可以定义一个决策变量，其取值范围从 0 到表中的最后一个数量，如下所示：


    ![$$ x\in \left[0,{B}_n\right] $$](A457410_1_En_3_Chapter_Equb.gif)


    ![A457410_1_En_3_Fig2_HTML.jpg](img/A457410_1_En_3_Fig2_HTML.jpg)


    **图 3-2** 分段凸成本函数


    但我们决定的这个数量会影响目标函数，因此我们需要知道最终落在哪个区间内，以及在该区间内的具体位置。这里有一个关键技巧：我们引入额外的变量，每个变量对应函数中的一个断点。假设我们有
    `n` 个区间，从概念上讲，我们将这些变量视为区间边界上的权重，用于指示我们在区间中的位置。我们希望最多只有两个连续的变量非零，且它们的和为 1。这将告诉我们
    `x` 的位置，从而得出目标函数值。


    ![$$ {\delta}_i\in \left[0,1\right]\forall i\in \left\{0,\dots, n\right\} $$](A457410_1_En_3_Chapter_Equc.gif)


    例如，如果 `δ[2] = 1/4` 且 `δ[3] = 3/4`，我们就知道位于第三个区间，并且已经走过了该区间的四分之一，同时 `x = δ[2] *
    B[2] + δ[3] * B[3]`。


    #### 3.1.1.1 约束条件


    我们将强制所有 `δ` 之和为 1，并且，由于问题的凸结构，最多只有两个相邻的 `δ` 非零。这将告诉我们位于哪个区间以及区间内的具体位置。为此，我们添加约束条件：


    ![$$ \sum \limits_i{\delta}_i=1 $$](img/A457410_1_En_3_Chapter_Equd.gif)


    我们通过以下方式推导出决策变量的值：


    ![$$ x=\sum \limits_i{\delta}_i{B}_i $$](img/A457410_1_En_3_Chapter_Equ2.gif)


    (3.2)


    请注意，这个 `x` 变量及其关联的约束在优化模型中不起作用。对于求解器而言，`δ` 才是真正的决策变量，而 `x` 仅仅是向原始问题语言的转换。这是关键所在。


    #### 3.1.1.2 目标函数


    目标函数在每个区间内是线性的；因此我们对所有区间求和：


    ![$$ \min \kern0.125em \sum \limits_{i=1}^n{\delta}_i\kern0.125em \sum \limits_{j=1}^i\left({B}_j-{B}_{j-1}\right)\times
    {C}_{j-1} $$](img/A457410_1_En_3_Chapter_Eque.gif)


    这里必须强调，这种转换技巧之所以有效，完全是因为该目标函数的结构。它是凸函数。如果它是凹函数，那么线性规划求解器就无法解决这个问题。你将在第 7 章（第 7.2
    节）中看到如何使用整数规划求解器来处理这种更困难的情况。

    '
- fmt: "### 3.1.1.3 Executable Model\n\nLet’s translate this into an executable model.\
    \ First, assume that the objective function is described by an array `D` of tuples\
    \ `(x, f(x))`. This allows us to consider any continuous piecewise linear function.\
    \ Assume that we are also given a lower bound `b` for the quantity to produce.\
    \ This problem is so simple that we know what the solution will be, namely, the\
    \ lower bound `b`. See Listing [3-1](#A457410_1_En_3_Chapter.html#Par18). But\
    \ this is meant to illustrate the technique used to solve a piecewise linear function\
    \ using a linear solver. In the next section, we will use this technique on a\
    \ more realistic problem.\n\n```\n1   def minimize_piecewise_linear_convex(Points,B):\n\
    2     s,n = newSolver(’Piecewise’),len(Points)\n3     x = s.NumVar(Points[0][0],Points[n-1][0],’x’)\n\
    4     l = [s.NumVar(0.0,1,’l[%i]’ % (i,)) for i in range(n)]\n5     s.Add(1 ==\
    \ sum(l[i] for i in range(n)))\n6     s.Add(x == sum(l[i]*Points[i][0] for i in\
    \ range(n)))\n7     s.Add(x >= B)\n8     Cost = s.Sum(l[i]*Points[i][1] for i\
    \ in range(n))\n9     s.Minimize(Cost)\n10     s.Solve()\n11     R = [l[i].SolutionValue()\
    \ for i in range(n)]\n12     return  R\nListing 3-1\nSimplest Example of Piecewise\
    \ Model (piecewise.py)\n```\n\nLine 4 defines our additional variables, one for\
    \ each breakpoint of the piecewise function. We force that the sum of those be\
    \ one at line 5. The definition of `x` at line 6 and its simple bound at 7 will\
    \ allow us to consider various interesting scenarios.\n\nThe objective function\
    \ is handled in a similar fashion to `x` at line 8. We solve and return the solution\
    \ in a table with all the appropriate information to understand what the solver\
    \ produced.\n\nWe will run this code with various bounds to illustrate the types\
    \ of solution produced. First, Table [3-2](#A457410_1_En_3_Chapter.html#Tab2)\
    \ shows a typical run with a solution within a bracket. We set a bound of `x ≥\
    \ 250`, which is exactly the value obtained.\n\nNote that only two `δ` are non-zero\
    \ and that\n\n`δ[1] × B[1] + δ[2] × B[2] = 0.37 × 148 + 0.63 × 310 = 250`,\n\n\
