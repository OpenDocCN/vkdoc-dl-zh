    所示。


    主模型如代码清单 7-24 所示。我们可以为大小为参数 `n` 的棋盘调用此模型。棋子可以是皇后、车和象，通过第二个参数 `Q`、`R` 或 `B` 指定。皇后和象的一个解如表
    7-18 所示。我们还在表 7-17 中展示了各种实例大小的运行时间，这些时间已归一化，使得 `n = 2` 的时间为 1。这些值仅供参考，因为它们依赖于求解器。尽管如此，它们表明所提出的模型不会遭受纯组合求解器可能遇到的指数爆炸问题。


