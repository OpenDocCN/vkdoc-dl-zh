    \  | A6 | 26.1 | 26.1 | 26.1 | 23.6 | 23.6 |\n    | 总计 | 100.0 | 100.0 | 100.0\
    \ | 100.0 | 100.0 |\n\n-   我们可能被要求最大化利润，而不是满足某些需求。在这种情况下，我们需要知道最终产品的价格，该价格当然可能每月变化。\n\
    -   库存水平可能以每种油品为单位来表述，而不是以总量形式。\n-   某些油品的脂肪酸含量可能存在不确定性。\n\n## 2.5 模式分类\n\n分类是目前软件最成功的应用之一，它承担了不久之前还属于人类智力特权的任务。例如，软件可以判断一封电子邮件是正常邮件还是垃圾邮件，判断活检细胞是恶性还是良性，以及判断公司是应该给你面试机会，还是让你的简历在云端巨大的比特桶里腐烂。\n\
    \n让我们来看一种最早用于数据二分类的有效技术。这个例子是人为构造的，因为我想通过画图来引导直觉，但我们编写的代码将适用于多种情况。\n\n假设我们正试图根据两个指标（面积和周长）来自动将细胞分类为恶性或良性。这些特征是通过显微镜下细胞图像的自动测量获得的。该过程从收集一批此类细胞开始，由专家将其分为两组。这些组构成了我们软件的所谓训练集。在我们“训练”好软件之后，我们将向它输入专家未曾见过的新数据，它将判断该细胞属于哪一组。也就是说，它将把细胞分类为恶性或良性。这个过程是真实的，并在世界各地的实验室中使用。我在此处做的主要简化是，实际应用中使用的特征远不止两个。\n\
    \n让我们以图 2-3 中绘制的细胞特征为例，其中 x 轴为周长，y 轴为半径。我们可以看到，这两个类别可以用一条直线分开。我们的任务是找到那条直线。当然，存在许多有效的直线，但作为初步尝试，任何能将两类分开的直线都可以。\n\
    \n![A457410_1_En_2_Fig3_HTML.jpg](img/A457410_1_En_2_Fig3_HTML.jpg)\n\n图 2-3 细胞数据与分离超平面\n"
- fmt: '### 2.5.1 Constructing a Model


    Algebraically, a line is an equation of the form `a[1] x[1] + a[2] x[2] = b` for
    some fixed coefficient `a[1]`, `a[2]`, `a[0]`. Or, in dimension `n`, we call it
    a hyperplane and it has an equation of


    ![$$ \sum \limits_{i=1}^n{a}_i{x}_i={a}_0 $$](A457410_1_En_2_Chapter_Equae.gif)


    What does it mean for a particular point `x` to be on one side or the other of
    the line? It means that either `a[1] x[1] + a[2] x[2] < a[0]` or `a[1] x[1] +
    a[2] x[2] > a[0]`. These strict inequalities can be scaled to increase the gap
    by any amount. We can therefore simplify our task to identifying a vector `a`
    such that, for every point `x′` in class A, we have


    ![$$ \sum \limits_i{a}_i{x}_i^{\prime}\ge {a}_0+1 $$](A457410_1_En_2_Chapter_Equaf.gif)


    and that, for every point `x″` in class B, we have


    ![$$ \sum \limits_i{a}_i{x}_i^{{\prime\prime}}\le {a}_0-1 $$](A457410_1_En_2_Chapter_IEq5.gif)


    Let’s introduce a positive variable for each of the data points, say `y[i]′` for
    each point of class A and `y[i]″` for each of class B. Now the inequality `∑[i]
    a[i] x[i] ≥ a[0] + 1` can be enforced by requiring


    ![$$ {y}^{\prime}\ge {a}_0+1-\sum \limits_i{a}_i{x}_i^{\prime } $$](A457410_1_En_2_Chapter_IEq6.gif)


    and


    ![$$ {y}^{\prime}\ge 0 $$](A457410_1_En_2_Chapter_IEq7.gif)


    and minimizing `y′` to zero. The algebra is symmetric for the points of class
    B. All in all, we are led to the following optimization problem:


    ![$$ \min \sum \limits_{i\in A}\ {y}_i^{\prime }+\sum \limits_{i\in B}\ {y}_i^{{\prime\prime}
    } $$](A457410_1_En_2_Chapter_Equag.gif)


    ![$$ \mathrm{subject}\kern0.50em \mathrm{to}\kern0.50em {y}^{\prime}\ge {a}_0+1-\sum
    \limits_i{a}_i{x}_i^{\prime } $$](A457410_1_En_2_Chapter_IEq8.gif),


    ![$$ {y}^{{\prime\prime}}\ge \sum \limits_i{a}_i{x}_i^{{\prime\prime} }-{a}_0+1
    $$](A457410_1_En_2_Chapter_IEq9.gif),


    and


    ![$$ {y}^{\prime },{y}^{{\prime\prime}}\ge 0 $$](A457410_1_En_2_Chapter_Equah.gif)


    One characteristic of this model is that if the optimal objective value is zero,
    we have a hyperplane correctly separating the training set into malignant cells
    and benign cells. But if the value is non-zero, it means that the set is not separable
    by a hyperplane and so more complex techniques are required.


    ### 2.5.2 Executable Model


    Let’s translate this into the executable model seen in Listing [2-7](#A457410_1_En_2_Chapter.html#Par167).
    It accepts two sets of data points with any number of features, classified by
    some expert into classes A and B. After defining the potential deviation from
    the hyperplane of sets A and B on lines 4 and 5, we define the variable that will
    hold the hyperplane on line 6. Note that we need this hyperplane later on, to
    do the classification of the unknown points. Note also that the coefficients could
    be restricted to be in any interval containing zero. It is simple to scale all
    coefficients of a plane to have its algebraic expression reside on whatever interval
    we choose, as long as it includes zero.


    The constraints at lines 8 and 10 set up the offset of each point to the hyperplane
    which the objective function will attempt to minimize to zero.


    ```

    1  def solve_classification(A,B):

    2    n,ma,mb=len(A[0]),len(A),len(B)

    3    s = newSolver(''Classification'')

    4    ya = [s.NumVar(0,99,'''') for _ in range(ma)]

    5    yb = [s.NumVar(0,99,'''') for _ in range(mb)]

    6    a = [s.NumVar(-99,99,'''') for _ in range(n+1)]

    7    for i in range(ma):

    8      s.Add(ya[i] >= a[n]+1-s.Sum(a[j]*A[i][j] for j in range(n)))

    9    for i in range(mb):

    10      s.Add(yb[i] >= s.Sum(a[j]*B[i][j] for j in range(n))-a[n]+1 )

    11    Agap = s.Sum(ya[i] for i in range(ma))

    12    Bgap = s.Sum(yb[i] for i in range(mb))

    13    s.Minimize(Agap+Bgap)

    14    rc = s.Solve()

    15    return rc,ObjVal(s),SolVal(a)

    Listing 2-7

    Identification of the Classifying Hyperplane (features.py)

    ```


    The reader might feel a little uncomfortable about this model and here is why,
    at least partly: This is a model where we do not care about the optimal value,
    but only whether it is zero or not. The decision variables (and we already discussed
    why this expression is such a misnomer) are not deciding anything. The set of
    `y` variables has no real interpretation other than it represents by how much
    a point violates a linear inequality. And finally, the only part of the solution
    we extract, the hyperplane, is not used yet. It will only be used later on, in
    a different program trying to classify a new point as belonging to class A or
    B. We have moved, with this model, to a higher abstract plane than ever before.


    #### 2.5.2.1 Variations


    There are at least three directions we can go from this model.


    *   The first is to add constraints to increase the quality of the returned hyperplane.
    For example, we could require that it not only separates the two sets, but that
    it is, in some sense, as far from one set as from the other. If the training set
    is well-chosen, this will ensure that we minimize erroneous classifications later
    on. This is known as maximizing the margin and we will tackle this problem in
    a later chapter.

    *   The second direction to pursue is what to do when the optimal value is not
    zero; that is, when the two sets are not separable by a hyperplane. They may be
    separable by a nonlinear curve. This question is complex and multiple approaches
    have been tried, but most rely on knowing something additional about the data.
    We will not consider it.

    *   The final improvement would be to consider classification into multiple classes.
    We will consider this in a later chapter.


    Footnotes


    [1](#A457410_1_En_2_Chapter.html#Fn1_source) I add this temporal precision on
    the odd chance that this text is still being read long after my body has maximized
    its entropy.


    [2](#A457410_1_En_2_Chapter.html#Fn2_source) To encourage the reader to experiment,
    every model in this book is available in the additional material ( [`https://github.com/sgkruk/Apress-AI`](https://github.com/sgkruk/Apress-AI)
    ), along with a random instance generator.


    [3](#A457410_1_En_2_Chapter.html#Fn3_source) Mostly to make the code fit a page,
    but also to hide some of the verbosity of the OR-Tools library. The authors chose,
    rightly in my opinion, meaningful but rather long names for their functions.'
