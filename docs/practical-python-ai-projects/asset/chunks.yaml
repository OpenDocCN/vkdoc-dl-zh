    ### 4.4.2 替代算法


    如果读者了解Dijkstra算法，他可能会疑惑为什么我们要为最短路径创建一个线性规划模型，尤其是因为Dijkstra算法的一个快速实现可能更快。答案是，在建模者的现实生活中，我们很少需要解决纯最短路径问题（或者实际上，纯任何问题）。在教科书之外的大多数情况下，问题的核心可能是一个最短路径，但必然会有许多额外的考虑。将这些考虑以附加约束的形式添加到基本的最短路径线性规划中通常是一件简单的事情。相比之下，尝试修改Dijkstra的实现（假设我们甚至能访问源代码）可能会困难得多，甚至可能根本不可能。


    ### 4.4.3 变体


    *   可能我们想要最小化距离的乘积，而不是距离的总和。我们不能用线性求解器对变量进行乘法运算，但我们可以通过对距离取对数并最小化对数的和来稍微转换问题。

    *   或者，我们可能对起点和终点之间的最长路径感兴趣。理论上，这不太可能在所有情况下都通过线性规划求解[⁷](#A457410_1_En_4_Chapter.html#Fn7)，但阻碍理论的病态情况很少，并且可能不适用于当前的问题。另一种看待这个问题的方式是，存在一大类网络，在其中可以找到最长路径。


    最简单的转换是将最小化改为最大化。我们可以通过取反距离矩阵来获得最大化。但这将允许重复节点；更糟糕的是，它可能导致一个无界模型（无限循环）。问题在于“流”可能无限次地绕着一个循环运行。一个部分解决方案是添加约束以确保没有超过一个单位的流进入任何节点。在最小化的情况下，这是一个冗余约束，但在最大化的情况下则不是。通过这种方式，我们消除了无限循环和重复节点。但仍然存在一个问题：子环路。我将在第5章的[5.4节](#A457410_1_En_5_Chapter.html)中解释并处理这个问题。


    在无环有向图的情况下，最长路径很容易找到。你之前见过这些路径有意义的情况：在第2章的[2.3.1节](#A457410_1_En_2_Chapter.html)中，我讨论了项目管理的关键路径。这些是一系列任务，如果它们被延迟，将会延迟整个项目。请注意，这些路径很少是唯一的，因此寻找一条（或者更糟，寻找“那条”）最长路径是错误的（关于一个简单的例子，请参见任务1和2以及图`fig:process-example`）。让我们创建一个小的函数，它将从我们的项目管理模型的最优解开始，并使用我们的最短路径模型来提取关键路径。详情请参见[清单4-5](#A457410_1_En_4_Chapter.html#Par116)。


    ```

    1   def critical_tasks(D,t):

    2     s = set([t[i]+D[i][1] \

    3            for i in range(len(t))]+[t[i] for i in range(len(t))])

    4     n,ix,start,end,times = len(s),0,min(s),max(s),{}

    5     for e in s:

    6       times[e]=ix

    7       ix += 1

    8     M = [[0 for _ in range(n)] for _ in range(n)]

    9     for i in range(len(t)):

    10       M[times[t[i]]][times[t[i]+D[i][1]]] = -D[i][1]

    11     rc,v,Path,Cost,Cumul = solve_model(M,times[start],times[end])

    12     T = [i for i in range(len(t)) \

    13         for time in Path if times[t[i]+D[i][1]] == time]

    14     return rc, T

    清单 4-5

    关键任务提取器

    ```


    前几行创建了一个包含所有任务开始和结束时间的集合；一旦我们将它们重命名为`0, …, n-1`，它们将成为我们的网络节点。在第9行，我们通过取每个任务持续时间的相反数来创建距离矩阵。每个任务都有一个条目，从其开始时间到结束时间。


    然后我们调用我们的最短路径模型，在这种情况下，它将找到从最早时间到项目完成时间的最长路径。最后，我们提取所有结束于最长路径某个节点上的任务。所有这些任务都是关键的，因为如果它们被延迟，将会延长已经是最长的路径。


