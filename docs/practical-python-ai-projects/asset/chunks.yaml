    ### 2.2.2 Variations


    While blending problems can be presented in various ways, they can all be handled
    in the manner above. The decision variables should be two-dimensional : the sum
    in one dimension and the other indicating total input material used and total
    output material produced. Finally, in addition to the capacity and demand constraints,
    there should be at least one blending constraint satisfying a linearity assumption.


    One interesting variation is that we might be asked to achieve more than one characteristic.
    For instance, in addition to an octane level, we might also be given a certain
    concentration of sulfur in each of the crude and asked to keep the refined gas
    below a certain sulfur threshold. In this case, the octane equation (2.4) will
    almost certainly need to be replaced by an inequality, ensuring a minimum octane
    level, and another similar inequality will ensure a maximum sulfur lever. Assuming
    S [i] as the sulfur level of crude i and s [j] as the sulfur level of refined
    j, we get


    ![$$ \sum \limits_i{O}_i{G}_{ij}\le {F}_j{o}_j\kern1em \forall j $$](A457410_1_En_2_Chapter_Equn.gif)


    and


    ![$$ \sum \limits_i{S}_i{G}_{ij}\ge {F}_j{s}_j\kern1em \forall j $$](A457410_1_En_2_Chapter_Equo.gif)


    The reason for the inequalities is that it is unlikely for the problem to have
    any feasible solution with exactly the specified octane and sulfur levels. The
    reader might try to modify Listing [2-4](#A457410_1_En_2_Chapter.html#Par73) to
    verify this.


    To help the reader recognize the underlying structure of blending problems, the
    following is an instance we will revisit soon, with additional complexities.


    A very popular ingredient in junk food is manufactured by refining and blending
    various oils together. The oils come in five flavors (O1 to O5) and measures of
    “hardness” as given in Table [2-6](#A457410_1_En_2_Chapter.html#Tab6), where cost
    is in dollars per tons and the hardness is measured in the appropriate unit.


    Table 2-6


    Caption Needed


    |   | O1 | O2 | O3 | O4 | O5 |

    | Cost | 110 | 120 | 130 | 110 | 115 |

    | Hardness | 8.8 | 6.1 | 2.0 | 4.2 | 5.0 |


    The oils O1 and O2 can be refined at production facility A, which has a capacity
    of 200 tons per month, while O3, O4, and O5 can be refined at production facility
    B, which has a capacity of 250 tons per month. There is no loss of weight during
    the refining process and you can ignore the cost of the process.


    The final product is obtained by mixing various amounts of the five oils. It has
    a hardness restriction. Measured in the same unit as given in the table, it must
    lie between 3 and 6 units. It is assumed that hardness blends linearly. That is,
    if we mix 10 tons of oil O1 with 20 tons of oil O2, the blend will have a hardness
    rating of


    ![$$ \left(10\times 8.8+20\times 6.1\right)/\left(10+20\right) $$](A457410_1_En_2_Chapter_Equp.gif)


    The final product sells for $150 per ton. How should the oils be refined and blended
    to maximize profit?'
