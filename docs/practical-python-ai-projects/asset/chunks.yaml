    代码清单 7-1

    带模式搜索的原料切割模型 (cutting_stock.py)

    ```


    在第 3 行，我们调用了一个名为 `bounds` 的例程，用于计算所需原料卷数的上下界，以及每卷原料中每种订单可容纳的单元数量上限。第 4 行使用原料卷数的上界来创建尽可能多的
    `y` 变量（以及后续与每卷原料相关的约束）。第 5 行使用每种订单的单元数量上限来设定每个 `x` 变量的范围：在任意给定的原料卷上，我们可以切割零到最多可容纳的单元数量或客户所需的数量，因此使用了
    `min` 表达式。


    第 10 行通过将所有原料卷上某个订单的单元数量相加，确保满足每个客户的需求。我们也可以在此处使用不等式，即 `≥`。这样做的思路是，我们可能切割出比客户需求更多的单元，然后将这些单元存入库存，等待下一个订单。这有时是合理的，但通常最好将其排除在模型之外。一旦我们得到一个恰好满足客户需求的解，了解实际情况并拥有规划工具的人员就可以决定如何最佳地利用原料卷的剩余部分。无论哪种情况，这都不会改变使用的原料总卷数。


    第 12 行确保从一卷原料上切割出的客户单元总宽度不超过该卷原料的 100%。而下一行并非约束，只是计算每卷原料的浪费量，以帮助返回一个有意义的解。


    从第 14 行开始的循环打破了多个等价解（即原料卷的任意排列）的对称性。这些排列共有 `K!` 种，会导致大多数求解器花费过长的求解时间。通过这个约束，我们告诉求解器优先选择那些第
    `j` 卷原料的切割数量多于第 `j + 1` 卷的排列。建议读者分别在有和没有这个对称性打破约束的情况下，求解一个中等规模的问题。我曾见过，没有这个约束时问题需要
    48 小时才能求解，而有这个约束时只需 48 分钟。当然，对于几秒钟就能求解的问题，这个约束不会有帮助，甚至可能拖慢速度。但谁会在意一个原料切割实例是两秒还是三秒求解呢？我们更关心的是两分钟和三小时之间的差异，这正是这个约束所要解决的问题。


    对于目标函数，我们可以简单地使用已用原料卷变量 `y` 的总和，并对未使用的原料卷进行预处理。但我们使用了一个小技巧，通过引入一个序数因子，使每一卷额外的原料变得更“昂贵”。这保证了，例如，如果估计原料卷数在
    11 到 14 之间，而我们最终使用了 12 卷，那么它们将是前 12 卷，不会出现“空缺”。

