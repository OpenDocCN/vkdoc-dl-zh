  trans: "\n### 1.2.2 关于符号的说明\n\n在本书中，我将描述代数模型。这些模型可以通过多种方式表示。我将使用两种方式。首先，我会用数学模式下的\
    \ T[E]X 排版，以常见的数学符号勾勒出每个模型。然后，我会用可执行的 Python 代码来表达完整、详细的模型。读者应该不难看出这两种表述形式之间的等价关系。表\
    \ 1-1 展示了一些等价关系。\n\n**表 1-1** 数学模式与 Python 模式下的表达式等价关系\n\n| 对象 | 数学模式 | Python\
    \ 模式 |\n| --- | --- | --- |\n| 标量变量 | X | `X` |\n| 向量 | v [i] | `v[i]` |\n| 矩阵\
    \ | M [ij] | `M[i][j]` |\n| 不等式 | x + y ≤ 10 | `x+y <= 10` |\n| 求和 | ![$$ \\sum\
    \ \\limits_{i=0}⁹\\ {x}_i $$](img/A457410_1_En_1_Chapter_IEq1.gif) | `sum(x[i]\
    \ for i in range(10))` |\n| 集合定义 | {i ² &#124; i ∈ [0, 1, . . ., 9]} | `[i**2\
    \ for i in range(10)]` |\n\n## 1.3 初试牛刀：两栖动物共存问题\n\n最简单的问题类似于我们在高中首次遇到的题目：令人头疼的文字应用题。它们在本质上是代数的；也就是说，它们可以使用初等线性代数的简单工具来构建模型，有时甚至可以直接求解。这里我们考虑这样一个问题，用以说明建模的方法并定义一些基本概念。\n\
    \n一位动物园生物学家计划将三种两栖动物（一只蟾蜍、一只蝾螈和一只蚓螈）放入一个水族箱中，它们将以三种不同的小型猎物为食：蠕虫、蟋蟀和苍蝇。每天会向水族箱中投放\
    \ 1,500 条蠕虫、3,000 只蟋蟀和 5,500 只苍蝇。每种两栖动物每天会消耗一定数量的猎物。表 1-2 总结了相关数据。\n\n**表 1-2**\
    \ 每种两栖动物消耗的猎物数量\n\n| 食物 | 蟾蜍 | 蝾螈 | 蚓螈 | 可用数量 |\n| --- | --- | --- | --- | ---\
    \ |\n| 蠕虫 | 2 | 1 | 1 | 1500 |\n| 蟋蟀 | 1 | 3 | 2 | 3000 |\n| 苍蝇 | 1 | 2 | 3 |\
    \ 5000 |\n\n生物学家想知道，假设食物是唯一的限制条件，在水族箱中最多可以共存多少只两栖动物（每种最多 1,000 只）。\n\n我们如何为这个问题建模？本书中的所有优化和可行性问题都采用三步法进行建模。随着我们遇到越来越复杂的问题，我们将对这个方法进行扩展，但这三个基本步骤始终是构建优秀模型的基石。\n\
    \n1.  **确定要回答的问题。** 这个问题的表述应该是一个精确的句子，涉及对一个或多个对象的计数或估值。在这个案例中，问题是每种两栖动物可以在水族箱中共存多少只？请注意，“有多少只两栖动物？”这个问法不够精确，因为我们关心的不是总数，而是每种动物的数量。提出一个精确的问题通常是最困难的部分。一旦我们有了这个精确的问题，我们就为每个要计数的对象分配一个变量。我们将使用\
    \ `x[0]`、`x[1]` 和 `x[2]`。这些变量传统上被称为**决策变量**。这个术语在我们的第一个例子中可能有些用词不当，但它反映了优化问题在物流领域的起源，在那里决策变量确实代表了建模者可以控制的数量，并映射到规划决策上。\n\
    \n2.  **确定所有需求并将其转化为约束条件。** 正如你将在本书中看到的，约束条件可以有多种形式。在这个简单的问题中，它们是代数的线性不等式。在将其转化为约束条件之前，最好先用精确的句子写下每个需求。对于共存问题，用文字表述的需求如下：\n\
    \    *   所有两栖动物总共消耗 1,500 条蠕虫。\n    *   所有两栖动物总共消耗 3,000 只蟋蟀。\n    *   所有两栖动物总共消耗\
    \ 5,000 只苍蝇。\n\n    请注意，以“……的数量”开头的陈述可能不够精确。在我们的简单案例中，没有指定单位，但可能存在。例如，消耗量可能以克为单位，而可用量却以千克为单位。这种情况经常发生，也是许多模型出错的原因。然而，即使我们的陈述看似精确，仍然存在一个需要考虑的歧义。指出歧义并澄清问题陈述，是优秀建模者的主要贡献之一。在这里，我们的意思是两栖动物将*恰好*消耗所述数量的食物，还是它们将*最多*消耗所述数量的食物？⁶\
    \ 我们将假设“最多”是需求的正确形式，这既因为它更有趣，也因为在某种意义上它包含了“等于”的问题。然后，我们将基于决策变量，把这些需求转化为代数约束。让我们考虑蠕虫。蟾蜍每天吃两条。蝾螈和蚓螈各吃一条。由于我们决定用\
    \ `x[0]` 表示蟾蜍数量，`x[1]` 表示蝾螈数量，`x[2]` 表示蚓螈数量，那么消耗的蠕虫总数将受以下不等式约束：\n\n    ```\n \
    \   2*x[0] + x[1] + x[2] <= 1500\n    ```\n\n    (1.1) 如果我们决定“等于”是合适的约束，我们会将不等式替换为等式。现在考虑蟋蟀。蟾蜍每天消耗一只，而蝾螈消耗三只，蚓螈消耗两只。它们总共将消耗\
    \ `x[0] + 3*x[1] + 2*x[2]`，我们得到约束条件：\n\n    ```\n    x[0] + 3*x[1] + 2*x[2] <=\
    \ 3000\n    ```\n\n    (1.2) 关于苍蝇的约束条件类似地得到：\n\n    ```\n    x[0] + 2*x[1] + 3*x[2]\
    \ <= 5000\n    ```\n\n    (1.3)\n\n3.  **确定要优化的目标。** 在优化问题中，目标是我们想要最大化（或最小化）的东西。在可行性问题中，没有目标，但实际上，大多数可行性问题都是表述不完整的优化问题。由于问题陈述是“每种两栖动物可以共存多少只？”，一种可能甚至很常见的理解是，我们想要两栖动物的最大数量。（最小数量是零，这是一个无趣的平凡解的例子。）就我们的决策变量而言，我们想要最大化总和，得到：\n\
    \n    ```\n    max x[0] + x[1] + x[2]\n    ```\n\n    (1.4)\n"
- fmt: "At this point we have a model! Not the model, but a model: a simple, clear,\
    \ and precise algebraic model that has a solution, one that answers our original\
    \ question.\n\nSince we are not mere theoreticians uninterested in practical applications,\
    \ our next step is to solve the model. As we will do for every model in this book,\
    \ we need to translate the mathematical expressions above ((1.1)-(1.4)) into a\
    \ form digestible by one of the many solvers available.\n\nOver the years, optimizers\
    \ have developed a number of specialized modeling languages and solvers. Here\
    \ is a short list of the better-known ones:\n\n*   Modeling languages\n    * \
    \  AMPL ( [`www.ampl.com`](http://www.ampl.com) )\n    *   GAMS ( [`www.gams.com`](http://www.gams.com)\
    \ )\n    *   GMPL ( [`http://en.wikibooks.org/wiki/GLPK/GMPL`](http://en.wikibooks.org/wiki/GLPK/GMPL)\
    \ (MathProg))\n    *   Minizinc ( [`www.minizinc.org/`](http://www.minizinc.org/)\
    \ )\n    *   OPL ( [`www-01.ibm.com/software/info/ilog/`](http://www-01.ibm.com/software/info/ilog/ilog/)\
    \ `)`\n    *   ZIMPL ( [`http://zimpl.zib.de/`](http://zimpl.zib.de/) )\n*   Solvers\n\
    \    *   CBC ( [`www.coin-or.org/`](http://www.coin-or.org/) )\n    *   CLP (\
    \ [`www.coin-or.org/Clp/`](http://www.coin-or.org/Clp/) `)`\n    *   CPLEX ( [`www-01.ibm.com/software/info/ilog/`](http://www-01.ibm.com/software/info/ilog/)\
    \ )\n    *   ECLiPSe ( [`http://eclipseclp.org/`](http://eclipseclp.org/) )\n\
    \    *   Gecode ( [`www.gecode.org/`](http://www.gecode.org/) )\n    *   GLOP\
    \ ( [`https://developers.google.com/optimization/lp/glop`](https://developers.google.com/optimization/lp/glop)\
    \ )\n    *   GLPK ( [`www.gnu.org/software/glpk/`](http://www.gnu.org/software/glpk/)\
    \ `)`\n    *   Gurobi ( [`www.gurobi.com/`](http://www.gurobi.com/) `)`\n    *\
    \   SCIP ( [`http://scip.zib.de/`](http://scip.zib.de/) )\n\nWe should maintain\
    \ a distinction between modeling languages, formal constructions with specific\
    \ vocabulary and grammars, and solvers, software packages that can read in models\
    \ expressed in certain languages and write out the solutions, although in some\
    \ cases this distinction is blurry.\n\nAs a modeler, one creates a model (in language\
    \ X) which is then fed to a solver (solver Y). This can happen because solver\
    \ Y knows how to parse language X or because there is a translator between language\
    \ X and another language, say Z, which the solver understands. This, over the\
    \ years, has been the cause of much irritation (“What? You mean that I have to\
    \ rewrite my model to use your solver?”).\n\nTo make matters worse, these languages\
    \ and solvers are not equivalent. Each has its strengths and weaknesses, its areas\
    \ of specialization. After years of writing models in all the languages above\
    \ and then some, my preference today is to eschew specialized languages and to\
    \ use a general-purpose programming language, for instance Python, along with\
    \ a library interfacing with multiple solvers. Throughout this book I will use\
    \ Google’s Operations Research Tools (OR-Tools), a very well-structured and easy-to-use\
    \ library.\n\nThe OR-Tools library is comprehensive. It offers the best interface\
    \ I have ever used to access multiple linear and integer solvers (`MPSolver`).\
    \ It also has special-purpose code for network flow problems as well as a very\
    \ effective constraint programming library. In this text, I will display only\
    \ a very small fraction of this cornucopia of optimization tools.\n\nOne of the\
    \ many advantages of using a general purpose language like Python is that we can\
    \ do the modeling part as well as the insertion of the models into a larger application,\
    \ maybe a web or a phone app. We can also easily present the solutions in a clear\
    \ format. We have all the power of a complete language at our disposal. True,\
    \ the specialized modeling languages sometimes allow more concise model expression.\
    \ But, in my experience, they all, at one point or another, hit a wall, forcing\
    \ the modeler to write kludgy glue to connect a model to the rest of the application.\
    \ Moreover, writing OR-Tools models in Python can be such a joy. The whole coexistence\
    \ model is shown at Listing 1-1.\n\n```\n1  from ortools.linear_solver import\
    \ pywraplp\n2  def solve_coexistence():\n3    t = 'Amphibian coexistence'\n4 \
    \   s = pywraplp.Solver(t,pywraplp.Solver.GLOP_LINEAR_PROGRAMMING)\n5    x = [s.NumVar(0,\
    \ 1000,'x[%i]' % i) for i in range(3)]\n6    pop = s.NumVar(0,3000,'pop')\n7 \
    \   s.Add(2*x[0] + x[1] + x[2] <= 1500)\n8    s.Add(x[0] + 3*x[1] + 2*x[2] <=\
    \ 3000)\n9    s.Add(x[0] + 2*x[1] + 3*x[2] <= 4000)\n10    s.Add(pop == x[0] +\
    \ x[1] + x[2])\n11    s.Maximize(pop)\n12    s.Solve()\n13    return pop.SolutionValue(),[e.SolutionValue()\
    \ for e in x]\nListing 1-1\nAmphibian Coexistence Model\n```\n\nLet’s deconstruct\
    \ the code. Line 1 loads the Python wrapper of the linear programming subset of\
    \ OR-Tools. Every model we write will start this way. Line 4 names and creates\
    \ a linear programming solver (hereafter named `s`) using Google’s own GLOP. The\
    \ OR-Tools library has interfaces to a number of solvers. Switching to a different\
    \ solver, say GNU’s GLPK or Coin-or CLP is a simple matter or modifying this line.\n\
    \nOn line 5, we create a one-dimensional array `x` of three decision variables\
    \ that can take on values between 0 and 1000. The lower bound is a physical constraint\
    \ since we cannot have a negative number of amphibians. The upper bound is part\
    \ of the problem statement as the biologist will not put more than 1,000 of each\
    \ species in the test tube. It is possible to state ranges as any contiguous subsets\
    \ of (−∞, +∞), but, as a general rule of thumb, restricting the range as much\
    \ as possible during variable declaration tends to help solvers run efficiently.\
    \ The third parameter of the call to `NumVar` is used as the name to print if\
    \ and when this variable is displayed, for instance, in debugging a model. We\
    \ will have little use for this feature as we prefer to write bug-free models.\n\
    \nThe constraints on lines 7 to 9 are direct translations of the mathematical\
    \ expressions (1.1)-(1.3). The order of the terms is irrelevant. In contrast to\
    \ some restrictive modeling languages, we could have written line 7 as\n\n```\n\
    1500>=x[0]+x[2]+x[1]\n```\n\nor\n\n```\nx[0]+x[1]+x[2]-1500<=0\n```\n\nor any\
    \ other equivalent algebraic expression.\n\nAt line 6, we declare an auxiliary\
    \ variable, `pop`. Though there is no such distinction in the modeling language,\
    \ this is not a decision variable but rather a helpful device to model the problem.\
    \ We use this auxiliary on line 10 where we add an equation that does not constrain\
    \ the model in any way. It simply defines the auxiliary variable `pop` to be the\
    \ sum of our decision variables. This allows us to express the objective easily\
    \ and, possibly, to help display the solution.\n\nThe objective function is on\
    \ line 11, a translation of (1.4). The function choices are, unsurprisingly, either\
    \ `s.Maximize` or `s.Minimize` with, for parameter, a linear expression in terms\
    \ of the variables declared previously.\n\nWe used\n\n```\ns.Maximize(pop)\n```\n\
    \nWe could have written\n\n```\ns.Maximize(x[0]+x[1]+x[2])\n```"
