- fmt: '### 2.3.2.1 Minimax Problems


    The technique we used for the project management can be used more generally whenever
    we face a minimax problem. This is a problem where we want to minimize the maximum
    of some set of functions. For example, let’s assume we want to find the optimal
    `x` for


    ![$$ \underset{x}{\min}\underset{i\in T}{\max}\sum \limits_j{a}_{i,j}{x}_j $$](A457410_1_En_2_Chapter_Equt.gif)


    This is handled by introducing a new variable, say `t`, along with the objective


    ![$$ \min \kern0.50em t $$](A457410_1_En_2_Chapter_Equu.gif)


    and the constraints


    ![$$ \sum \limits_j{a}_{i,j}{x}_j\le t\kern1.25em \ \kern0.28em \forall i\in T
    $$](A457410_1_En_2_Chapter_Equv.gif)


    The corresponding maximin problem is handled similarly. Note that the related
    maximax and minimin are considerably more difficult to handle. We will revisit
    those in a later section (see section 7.2.4 in Chapter [7](#A457410_1_En_7_Chapter.html)).


    ### 2.3.2.2 Absolute Value Problems


    Essentially the same approach can also be used for some non-linear functions,
    for instance, those involving absolute values. Say we seek the optimal `x` for


    ![$$ \underset{x}{\min}\mid \sum \limits_j{c}_j{x}_j\mid $$](A457410_1_En_2_Chapter_IEq4.gif)


    Since the absolute value function is defined as


    ![$$ \mid z\mid =\Big\{{\displaystyle \begin{array}{cc}z& z\ge 0\\ {}-z& z<0\end{array}}
    $$](A457410_1_En_2_Chapter_Equw.gif)


    we can use the same `min t` objective along with constraints


    ![$$ \sum \limits_j{c}_j{x}_j\le t\kern4em \forall i\in T $$](A457410_1_En_2_Chapter_Equx.gif)


    and


    ![$$ -\left(\sum \limits_j{c}_j{x}_j\right)\le t\kern4em \forall i\in T $$](A457410_1_En_2_Chapter_Equy.gif)


    I will illustrate some non-trivial applications of this technique in Section 3.2
    in Chapter [3](#A457410_1_En_3_Chapter.html).


    ## 2.4 Multi-Stage Models


    In life, decisions at one stage often influence decisions at a later stage. The
    same holds for more pedestrian situations. For instance, consider a warehouse:
    what it contains at the end of a month surely should influence what is ordered
    at the beginning of the following month.


    In a certain sense there is little that is new in these multi-stage models except
    that we have to be careful to properly set up the continuity from one stage to
    the next.


    To illustrate, let’s revisit the blending problem. To multiple targets, prices,
    and costs, we will add a planning horizon of many months. This will exemplify
    the stages. This problem will require all the tricks and techniques you have seen
    so far (and then some). It forms a comprehensive review of the current chapter.


    ### 2.4.1 Problem Instance


    Soap is manufactured by refining and blending various oils together. The oils
    come in various flavors (apricot, avocado, canola, coconut, etc.) and each oil
    contains multiple fatty acids (lauric, linoleic, oleic, etc.) in various proportions.
    For example, see Table [2-10](#A457410_1_En_2_Chapter.html#Tab10).


    **Table 2-10** Example of Oils (`Oi`) with Their Acid Content (`Aj`)


    |   | A0 | A1 | A2 | A3 | A4 | A5 | A6 |

    |---|----|----|----|----|----|----|----|

    | O0 | 36 | 20 | 33 | 6  | 4  |    | 1  |

    | O1 |    | 68 | 13 |    |    | 8  | 11 |

    | O2 |    | 6  |    | 66 | 16 | 5  | 7  |

    | O3 |    | 32 |    |    |    | 14 | 54 |

    | O4 |    |    | 49 | 3  | 39 | 7  | 2  |

    | O5 | 45 |    | 40 |    | 15 |    |    |

    | O6 |    |    |    |    |    | 28 | 72 |

    | O7 | 36 | 55 |    |    |    |    | 9  |

    | O8 | 12 | 48 | 34 |    | 4  | 2  |    |


    According to the properties of the soap one is creating (cleaning power, lather
    production, dryness of the skin, etc.) one targets the final proportions of the
    fatty acids to be in certain ranges by blending the oils appropriately. For instance,
    we will target our soap to have acid contents in the ranges of Table [2-11](#A457410_1_En_2_Chapter.html#Tab11).


    **Table 2-11** Fatty Acid Content Targets


    |   | A0   | A1   | A2   | A3  | A4  | A5  | A6   |

    |---|------|------|------|-----|-----|-----|------|

    | Min | 13.3 | 23.2 | 17.8 | 3.7 | 4.6 | 8.8 | 23.6 |

    | Max | 14.6 | 25.7 | 19.7 | 4.1 | 5.0 | 9.7 | 26.1 |


    Here is an additional twist, relative to periods. We will be planning for a certain
    number of months. Each oil may be purchased for immediate delivery or bought on
    the futures market for delivery in a later month. The price of each oil in each
    of the months is given in Table [2-12](#A457410_1_En_2_Chapter.html#Tab12) in
    dollars per ton.


    **Table 2-12** Cost of Oils in Dollars per Ton Over the Planning Horizon


    |   | Month 0 | Month 1 | Month 2 | Month 3 | Month 4 |

    |---|---------|---------|---------|---------|---------|

    | O0 | 118     | 128     | 182     | 182     | 192     |

    | O1 | 161     | 152     | 149     | 156     | 174     |

    | O2 | 129     | 191     | 118     | 198     | 147     |

    | O3 | 103     | 110     | 167     | 191     | 108     |

    | O4 | 102     | 133     | 179     | 119     | 140     |

    | O5 | 127     | 100     | 110     | 135     | 163     |

    | O6 | 171     | 166     | 191     | 159     | 164     |

    | O7 | 171     | 131     | 200     | 113     | 191     |

    | O8 | 147     | 123     | 135     | 156     | 116     |


    It is possible to store up to 1,000 tons of oil for later use (any combination
    of oils) but there is a holding cost of $5 per ton per month. Finally, we must
    satisfy a demand of 5,000 tons of soap per month. This demand drives the model.


    At the beginning of the planning horizon, we have some oils in inventory, as illustrated
    in Table [2-13](#A457410_1_En_2_Chapter.html#Tab13). How should the oils be refined
    and blended every month to minimize cost?


    **Table 2-13** Initial Inventory in Tons


    | Oil | Held |

    |-----|------|

    | O0  | 15   |

    | O1  | 52   |

    | O2  | 193  |

    | O3  | 152  |

    | O4  | 70   |

    | O5  | 141  |

    | O6  | 43   |

    | O7  | 25   |

    | O8  | 89   |


    ### 2.4.2 Constructing a Model


    #### 2.4.2.1 Decision Variables


    The question to answer is “How should the various oils be blended every month?”
    This means we need to identify how much of each oil goes into the final blend
    during each month. This is a good start but it is clearly not enough. For instance,
    we can blend from oil we buy and from oil we have in inventory.


    So we need to distinguish these two quantities. Moreover, we may decide to buy
    for storage (because the prices are about to go up) so we also need to know how
    much we can store. This suggests at least three decision variables for each oil
    (`O = {0, 1, 2, … , n[o]}` will be the set of oils), and for each month (`M =
    {0, 1, 2, … , n[m]}` is the set of months)


    | `x[i,j] ≥ 0 ∀i ∈ O, ∀j ∈ M` | Buy   |

    | `y[i,j] ≥ 0 ∀i ∈ O, ∀j ∈ M` | Blend |

    | `z[i,j] ≥ 0 ∀i ∈ O, ∀j ∈ M` | Hold  |


    The interpretation is `x[i,j]` will be the number of tons of oil `i` bought during
    month `j`; `y[i,j]` will be the number of tons blended into our soap; and `z[i,j]`
    is the number of tons held at the beginning of the month. Note that we have a
    choice here to have the variable represent the amount at the beginning or at the
    end of the period. Either is acceptable but it must be clear in the model which
    one is chosen because it affects the constraints. A typical mistake in a multi-period
    model is to have some constraints assume that a variable represents a quantity
    at the start of the period while some other constraints assume the end. The model
    may run, but the solution will be nonsensical. Since we are given quantities in
    storage at the beginning of the planning period, having a variable represent the
    quantity held at beginning means that we can easily initialize it with the given
    data.


    We probably will need to know how much soap we are producing each month. This
    is not, strictly speaking, essential to the problem as formulated, but it may
    make the presentation of the solution and maybe the formulation of some constraints
    much simpler. As usual, it helps to introduce auxiliary variables to clear up
    some statements. To tally the total production per month,


    ![$$ {t}_j\kern1.25em \ \kern0.28em \forall j\in M $$](A457410_1_En_2_Chapter_Equz.gif)'
