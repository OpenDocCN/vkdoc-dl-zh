  trans: '

    ### 2.3.2.1 极小化极大问题


    我们在项目管理中使用的技术，可以更普遍地应用于任何面临极小化极大问题（minimax problem）的场景。这类问题中，我们希望最小化一组函数中的最大值。例如，假设我们想找到满足下式的最优
    `x`：


    ![$$ \underset{x}{\min}\underset{i\in T}{\max}\sum \limits_j{a}_{i,j}{x}_j $$](img/A457410_1_En_2_Chapter_Equt.gif)


    这可以通过引入一个新变量（例如 `t`）以及目标函数


    ![$$ \min \kern0.50em t $$](img/A457410_1_En_2_Chapter_Equu.gif)


    和约束条件


    ![$$ \sum \limits_j{a}_{i,j}{x}_j\le t\kern1.25em \ \kern0.28em \forall i\in T
    $$](img/A457410_1_En_2_Chapter_Equv.gif)


    来处理。相应的极大化极小问题（maximin problem）也以类似方式处理。请注意，相关的极大化极大问题（maximax）和极小化极小问题（minimin）处理起来要困难得多。我们将在后续章节中重新讨论这些问题（参见第
    7 章第 7.2.4 节）。


    ### 2.3.2.2 绝对值问题


    本质上相同的方法也可用于某些非线性函数，例如涉及绝对值的函数。假设我们寻求满足下式的最优 `x`：


    ![$$ \underset{x}{\min}\mid \sum \limits_j{c}_j{x}_j\mid $$](img/A457410_1_En_2_Chapter_IEq4.gif)


    由于绝对值函数的定义为


    ![$$ \mid z\mid =\Big\{{\displaystyle \begin{array}{cc}z& z\ge 0\\ {}-z& z<0\end{array}}
    $$](img/A457410_1_En_2_Chapter_Equw.gif)


    我们可以使用相同的 `min t` 目标函数，并配合约束条件


    ![$$ \sum \limits_j{c}_j{x}_j\le t\kern4em \forall i\in T $$](img/A457410_1_En_2_Chapter_Equx.gif)


    和


    ![$$ -\left(\sum \limits_j{c}_j{x}_j\right)\le t\kern4em \forall i\in T $$](img/A457410_1_En_2_Chapter_Equy.gif)


    我将在第 3 章第 3.2 节中阐述该技术的一些重要应用。


    ## 2.4 多阶段模型


    在生活中，一个阶段的决策常常会影响后续阶段的决策。在更常见的情境中也是如此。例如，考虑一个仓库：月末的库存量无疑会影响下月初的订货量。


    从某种意义上说，这些多阶段模型并没有什么新内容，除了我们需要小心地建立从一个阶段到下一个阶段的连续性。


    为了说明这一点，让我们重新审视混合问题。针对多个目标、价格和成本，我们将增加一个跨越数月的规划周期。这将体现各个阶段。该问题将需要你迄今为止学到的所有技巧和技术（甚至更多）。它构成了对本章内容的全面回顾。


    ### 2.4.1 问题实例


    肥皂是通过精炼和混合各种油类制成的。这些油有各种类型（如杏油、鳄梨油、菜籽油、椰子油等），每种油都含有多种脂肪酸（如月桂酸、亚油酸、油酸等），且比例各不相同。例如，参见表
    2-10。


    **表 2-10** 油类 (`Oi`) 及其脂肪酸含量 (`Aj`) 示例


    |   | A0 | A1 | A2 | A3 | A4 | A5 | A6 |

    |---|----|----|----|----|----|----|----|

    | O0 | 36 | 20 | 33 | 6  | 4  |    | 1  |

    | O1 |    | 68 | 13 |    |    | 8  | 11 |

    | O2 |    | 6  |    | 66 | 16 | 5  | 7  |

    | O3 |    | 32 |    |    |    | 14 | 54 |

    | O4 |    |    | 49 | 3  | 39 | 7  | 2  |

    | O5 | 45 |    | 40 |    | 15 |    |    |

    | O6 |    |    |    |    |    | 28 | 72 |

    | O7 | 36 | 55 |    |    |    |    | 9  |

    | O8 | 12 | 48 | 34 |    | 4  | 2  |    |


    根据所生产肥皂的特性（清洁力、起泡性、对皮肤的干燥程度等），需要通过适当混合油类，使最终脂肪酸的比例落在特定范围内。例如，我们将目标肥皂的脂肪酸含量设定在表
    2-11 所示的范围内。


    **表 2-11** 脂肪酸含量目标


    |   | A0   | A1   | A2   | A3  | A4  | A5  | A6   |

    |---|------|------|------|-----|-----|-----|------|

    | 最小值 | 13.3 | 23.2 | 17.8 | 3.7 | 4.6 | 8.8 | 23.6 |

    | 最大值 | 14.6 | 25.7 | 19.7 | 4.1 | 5.0 | 9.7 | 26.1 |


    这里还有一个与时间段相关的额外复杂因素。我们将规划一定数量的月份。每种油可以立即购买，也可以在期货市场上购买以便在未来某个月份交货。每种油在每个月的价格（美元/吨）如表
    2-12 所示。


    **表 2-12** 规划周期内各油类成本（美元/吨）


    |   | 第 0 月 | 第 1 月 | 第 2 月 | 第 3 月 | 第 4 月 |

    |---|---------|---------|---------|---------|---------|

    | O0 | 118     | 128     | 182     | 182     | 192     |

    | O1 | 161     | 152     | 149     | 156     | 174     |

    | O2 | 129     | 191     | 118     | 198     | 147     |

    | O3 | 103     | 110     | 167     | 191     | 108     |

    | O4 | 102     | 133     | 179     | 119     | 140     |

    | O5 | 127     | 100     | 110     | 135     | 163     |

    | O6 | 171     | 166     | 191     | 159     | 164     |

    | O7 | 171     | 131     | 200     | 113     | 191     |

    | O8 | 147     | 123     | 135     | 156     | 116     |


    可以储存最多 1,000 吨油以备后用（可以是任意油类的组合），但每月每吨的持有成本为 5 美元。最后，我们必须满足每月 5,000 吨肥皂的需求。这个需求驱动着模型。


    在规划周期开始时，我们有一些库存油类，如表 2-13 所示。如何每月精炼和混合这些油类才能使成本最小化？


    **表 2-13** 初始库存（吨）


    | 油类 | 持有量 |

    |-----|------|

    | O0  | 15   |

    | O1  | 52   |

    | O2  | 193  |

    | O3  | 152  |

    | O4  | 70   |

    | O5  | 141  |

    | O6  | 43   |

    | O7  | 25   |

    | O8  | 89   |


    ### 2.4.2 构建模型


    #### 2.4.2.1 决策变量


    需要回答的问题是：“每个月应如何混合各种油类？”这意味着我们需要确定每个月有多少每种油进入最终混合物。这是一个好的开始，但显然还不够。例如，我们可以从购买的油和库存的油中进行混合。


    因此，我们需要区分这两个数量。此外，我们可能决定购买并储存（因为价格即将上涨），所以我们还需要知道可以储存多少。这为每种油（`O = {0, 1, 2, …
    , n[o]}` 表示油类集合）和每个月（`M = {0, 1, 2, … , n[m]}` 表示月份集合）提出了至少三个决策变量：


    | `x[i,j] ≥ 0 ∀i ∈ O, ∀j ∈ M` | 购买量   |

    | `y[i,j] ≥ 0 ∀i ∈ O, ∀j ∈ M` | 混合量 |

    | `z[i,j] ≥ 0 ∀i ∈ O, ∀j ∈ M` | 持有量  |


    其含义是：`x[i,j]` 表示在第 `j` 月购买的油 `i` 的吨数；`y[i,j]` 表示混合到肥皂中的吨数；`z[i,j]` 表示月初持有的吨数。请注意，我们在此可以选择让变量表示期初或期末的数量。两种选择都可以接受，但必须在模型中明确选择哪一种，因为它会影响约束条件。在多周期模型中，一个典型的错误是某些约束假设变量表示期初数量，而另一些约束假设表示期末数量。模型可能可以运行，但解将毫无意义。由于我们在规划期开始时已知库存量，让变量表示期初持有量意味着我们可以轻松地用给定数据对其进行初始化。


    我们可能还需要知道每月生产了多少肥皂。严格来说，这对于所阐述的问题并非必不可少，但它可能使解的呈现以及某些约束的表述变得简单得多。像往常一样，引入辅助变量有助于澄清一些表述。为了统计每月的总产量：


    ![$$ {t}_j\kern1.25em \ \kern0.28em \forall j\in M $$](img/A457410_1_En_2_Chapter_Equz.gif)

    '
- fmt: '### 2.4.2.2 Constraints


    Let’s tackle the continuity constraints. We need to specify for each oil and for
    each month (but the last) how the inventory fluctuates, so


    ![$$ {z}_{i,j}+{x}_{i,j}-{y}_{i,j}={z}_{i,j+1}\kern1.25em \ \kern0.28em \forall
    i\in O,\forall j\in M\backslash \left\{{n}_m\right\} $$](A457410_1_En_2_Chapter_Equ5.gif)


    (2.5)


    In words, this is what is held at the beginning of the month plus what we buy
    minus what we blend forms the new inventory.


    We have a minimum and a maximum storage capacity at each month of the total amount
    of oil, or


    ![$$ {C}_{min}\le \sum \limits_i{z}_{i,j}\le {C}_{max}\kern1.25em \ \kern0.28em
    \forall j\in M $$](A457410_1_En_2_Chapter_Equaa.gif)


    Now comes the blending constraint, or rather constraints, since we need to target
    a number of fatty acids. To help the formulation, let’s extract the total production,


    ![$$ {t}_j=\sum \limits_i\ {y}_{i,j}\kern1em \ \ \kern0.28em \forall j\in M $$](A457410_1_En_2_Chapter_Equab.gif)


    Let’s assume that for each acid `k ∈ A` we have a target range `[l[k], u[k]]`
    and that each oil `i ∈ O`, a percentage `p[i,k]` of the required acid (Table [2-10](#A457410_1_En_2_Chapter.html#Tab10)).
    Since the final product for each acid must fall in a certain range, we should
    have two constraints: one for the low end and one for the high end of the interval.
    That is,


    ![$$ \sum \limits_i\ {y}_{i,j}{p}_{i,k}\ge {l}_k{t}_j\kern4em \forall k\in A,\forall
    j\in M $$](A457410_1_En_2_Chapter_Equ6.gif)


    (2.6) and


    ![$$ \sum \limits_i\ {y}_{i,j}{p}_{i,k}\le {u}_k{t}_j\kern4em \forall k\in A,\forall
    j\in M $$](A457410_1_En_2_Chapter_Equ7.gif)


    (2.7)


    These constraints could be written without the production variables `t[j]` but
    would be more cumbersome and difficult to read.


    Finally, we need to satisfy demand. This is simple, assuming a demand of `D[j]`
    at each month `j`,


    ![$$ {t}_j\ge {D}_j\kern2em \forall j\in M $$](A457410_1_En_2_Chapter_Equac.gif)


    ### 2.4.2.3 Objective Function


    We are told that the objective is to minimize costs, comprised of the varying
    oil costs at each month plus the fixed storage cost of the oils we keep in inventory.
    Therefore,


    ![$$ \sum \limits_i\sum \limits_j{x}_{i,j}{P}_{i,j}+\sum \limits_i\sum \limits_j{z}_{i,j}p
    $$](A457410_1_En_2_Chapter_Equad.gif)


    This type of objective (fixed plus variable cost) appears regularly in business-type
    problems. You will see this again when considering facility location to service
    customer demands. The decision to build incurs a fixed cost. The servicing of
    the various customers is a variable cost.


    ### 2.4.2.4 Executable Model


    Let’s now translate this into executable code as shown in Listing [2-6](#A457410_1_En_2_Chapter.html#Par144).
    There is a fair amount of data to pass in. Let’s assume arrays `Part` as in Table
    [2-10](#A457410_1_En_2_Chapter.html#Tab10), `Target` as in Table [2-11](#A457410_1_En_2_Chapter.html#Tab11),
    `Cost` as in Table [2-12](#A457410_1_En_2_Chapter.html#Tab12), and `Inventory`
    as in Table [2-13](#A457410_1_En_2_Chapter.html#Tab13) in addition to three parameters:
    `D` in tons for the demand, `SC` in dollars per ton for the storage cost, and
    `SL` in tons for the minimum and maximum to hold in inventory.


    From line 5 to line 11 we declare variables but only the first three are true
    decision variables. All the others are artificially introduced either to help
    us state the constraints (for 8 and 11) or to help us display some details of
    the resulting solutions. They will not affect the running time of the solver in
    any appreciable manner but will make our life easier.


    At line 12 we set the `Hold` variable to contain what is known to be in the inventory
    at the start of the planning period.


    The large loop starting at line 14 will set all the constraints since they have
    the identical structure for each month and we have declared our variables to be
    arrays indexed by the month.


    Line 15 sets the artificial variable `Prod` to be the sum of the blended oils.
    This is not really a constraint, but rather a simplifying trick. If we repeat
    some calculations in a model as here,


    ```

    sum(Blnd[i][j] for i in range(nO)

    ```


    we should consider introducing an artificial variable. Assuming a decent solver,
    it will cost nothing and is likely to help. One of the principles of programming
    (and modeling) is “Do not repeat yourself.”


    We use this `Prod` variable immediately after, at line 16 to ensure that we satisfy
    the demand. If this demand is a scalar, we set it identically for each month,
    but it could be an array indexed by the month.


    The code starting with the `if` on line 17 implements the continuity requirement
    we described in equation (2.5). We ensure that what we buy and what we have on
    hand at the beginning of the month equals what we blend and what we store for
    the next month. The conditional is to avoid setting a constraint on a month past
    the planning horizon.


    Lines 20 and 21 ensure the bounds on the oils we keep in inventory.


    The loop starting at line 22 first defines our auxiliary `Acid` variable to ease
    the formulation of the blending constraints stated on the following two lines,
    which correspond to equations (2.6) and (2.7). `Acid`, indexed by the ordinal
    of the fatty acid `k` and of the month `j` under consideration, is summed over
    all oils of the quantity blended with the oil’s percentage of acid `k`. This quantity,
    divided by the total blended, will be the percentage that must fall within the
    required range.


    Finally, the four lines starting at 26 set the artificial variables that will
    hold the costs of purchasing and holding at each period and then sum them to construct
    the objective function which we will minimize.'
