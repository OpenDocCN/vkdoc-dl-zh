    We implement the basic constraint of equation (6.6) at line 7\. Then, the three
    following `if` statements implement the optional constraints of Minimum full-time
    staff, FTE must work, and No PTE if no FTE present.


    Results of the basic constraint only are shown in Table [6-8](#A457410_1_En_6_Chapter.html#Tab8)
    while setting the `no part` flag to `True` yields Table [6-9](#A457410_1_En_6_Chapter.html#Tab9).
