  raw: '#### 7.3.1.3 Objective


    The objective needs to maximize the preference weights of all the instructors.
    We will split the objective into three terms, one for the weights of instructor
    i on course c (wc [i,c] ), on preference set s (ws [i,s] ) and on preference pair
    p (wp [i,p] ).


    For the courses, this is simple. Assuming that the set of sections S is partitioned
    into subsets S [c] for the sections of course id c, then the contribution of the
    course preference weights is


    ![$$ WC=\sum \limits_{c\in C}\sum \limits_{i\in I}w{c}_{i,c}\sum \limits_{j\in
    {S}_c}{x}_{i,j} $$](A457410_1_En_7_Chapter_Equ8.gif)


    (7.8)


    The contribution of the set preference weights is also fairly straightforward.
    We need to sum over all the preference sets and all the instructors the product
    of the weight an instructor puts on a set with the sum over all sections of the
    indicator of set membership of that section and the indicator of assignment of
    that section to the instructor,


    ![$$ WR=\sum \limits_{s\in S}\sum \limits_{i\in I}w{s}_{i,s}\sum \limits_{j\in
    {R}_s}{x}_{i,j}, $$](A457410_1_En_7_Chapter_Equx.gif)


    where R [s] is the last column of Table [7-10](#A457410_1_En_7_Chapter.html#Tab10).


    Now for the more interesting weights, on pairs. Let’s look at a specific example.
    Say that pair id 4 indicates consecutive meetings and that it includes a pair
    of sections 2 and 5\. Also, instructor 13 has put a weight of -15 on such consecutive
    pairs. Then if we assign sections 2 and 5 to instructor 13, we need to add -15
    to the objective value . So we need an indicator for “Section 2 and 5 are assigned
    to instructor 13.” Let’s call this indicator z [13,4]. According to our model,
    we know that x [13,2] and x [13,5] will be one. How can we set z [13,4] if and
    only if both are one? By


    ![$$ {\displaystyle \begin{array}{c}{x}_{13,2}+{x}_{13,5}-1\le {z}_{13,4},\\ {}{z}_{13,4}\le
    {x}_{13,2},\\ {}{z}_{13,4}\le {x}_{13,5}.\end{array}} $$](A457410_1_En_7_Chapter_Equy.gif)


    The first inequality raises z when both x are one. The last two lower z to zero
    when either x is zero.


    Now, in all generality, we obtain, assuming sets of pairs P [p] as in the last
    column of Table [7-11](#A457410_1_En_7_Chapter.html#Tab11),


    ![$$ {x}_{i,{s}_1}+{x}_{i,{s}_2}-1\le {z}_{i,p}\ i\in I,\left({s}_1,{s}_2\right)\in
    {P}_p, $$](A457410_1_En_7_Chapter_Equ9.gif)


    (7.10)


    ![$$ {x}_{i,{s}_1}\ge {z}_{i,p}, $$](A457410_1_En_7_Chapter_Equ10.gif)


    (7.11)


    ![$$ {x}_{i,{s}_2}\ge {z}_{i,p}. $$](A457410_1_En_7_Chapter_Equ11.gif)


    (7.12)


    An alternative approach, using what we have previously developed in the section
    on non-convex tricks (Section 7.2), is to use the `reify` high-level constraint
    which will implement


    ![$$ {x}_{i,{s}_1}+{x}_{i,{s}_2}\ge 2\iff {z}_{i,p}=1 $$](A457410_1_En_7_Chapter_Equz.gif)


    We can now sum over all preference pairs and all instructors the product of the
    weight and the indicator,


    ![$$ WP=\sum \limits_p\sum \limits_i{z}_{i,p}w{p}_{i,p} $$](A457410_1_En_7_Chapter_Equ12.gif)


    (7.13)


    We now have the complete objective function as


    max WC + WS + WP.


    #### 7.3.1.4 Executable Model


    Let’s translate this into an executable model. See Listing [7-15](#A457410_1_En_7_Chapter.html#Par133).


    ```

    1  def solve_model(S,I,R,P):

    2    s = newSolver(''StaffuScheduling'',True)

    3    nbS,nbI,nbSets,nbPairs = len(S),len(I),len(R),len(P)

    4    nbC,nbT = S[-1][1]+1,1+max(e[2] for e in  S)

    5    x=[[s.IntVar(0,1,") for _ in range(nbS)] for _ in range(nbI)]

    6    z=[[[s.IntVar(0,1,") for _ in range(len(P[p][1]))] \

    7         for p in range(nbPairs)] for _ in range(nbI)]

    8    for j in range(nbS):

    9      k_out_of_n(s,1,[x[i][j] for i in range(nbI)],''= I[i][1][0])

    12      s.Add(sum(x[i][j] for j in range(nbS)) ='')

    26    WP = sum(z[i][p][k]*I[i][4][p] for i in range(nbI) \

    27            for p in range(nbPairs) for k in range(len(P[p][1])) \

    28            if I[i][4][p] !=  0)

    29    s.Maximize(WC+WR+WP)

    30    rc,xs = s.Solve(),ss_ret(x,z,nbI,nbSets,nbS,nbPairs,I,S,R,P)

    31    return  rc,SolVal(x),xs,ObjVal(s)

    Listing 7-15

    Staff Scheduling Model (staff_scheduling.py)

    ```


    The function `solve _model` receives in `S` the section data in the form of Table
    [7-8](#A457410_1_En_7_Chapter.html#Tab8); in `I` the instructor data in the form
    of Table [7-9](#A457410_1_En_7_Chapter.html#Tab9); in `R` the preference sets
    data in the form of Table [7-10](#A457410_1_En_7_Chapter.html#Tab10); and in `P`
    the preference pairs data in the form of Table [7-11](#A457410_1_En_7_Chapter.html#Tab11).


    The decision variable `x` on line 5 is declared as a two-dimensional array, indexed
    by section and instructor id. On the following line, the auxiliary variable `z`
    indexed by instructor id, preference pair id, and the ordinal of the pairs of
    sections within a preference pair will be one if we assign one of the pairs to
    the instructor.


    The loop on line 8 ensures that each section has at most one instructor. We are
    assuming here that there are more sections to teach than instructors to teach
    them. The subloop on the set of meeting times at 13 ensures that no instructor
    is required to be at two places at the same time.


    The loop on 10 is an availability constraint; it ensures that each instructor
    teaches as many courses as she is supposed to teach.


    At that point we have all we need to compute two of the objective terms: the weighted
    course preference at line 17 and the weighted set preference at line 19\. These
    correspond to equations (7.8) and (7.9).


    To implement equation (7.13) at line 28, we need to loop over all instructors
    , all sets of pairs, and all pairs (the triple loop at line 20), and reify pairs
    of sections assigned to an instructor. We do this if and only if the instructor
    used a non-zero weight on such pairs. There is no point in adding such complex
    constraints if the net effect on the objective function is zero.


    ```

    1  def ss_ret(x,z,nbI,nbSets,nbS,nbPairs,I,S,R,P):

    2     xs=[]

    3     for i in range(nbI):

    4       xs.append([i,[[j,(I[i][2][S[j][1]],\

    5         sum(I[i][3][r] for r in range(nbSets) if j in R[r][1]),

    6         sum(SolVal(z[i][p][k])*I[i][4][p]/2

    7             for p in range(nbPairs) for k in range(len(P[p][1]))

    8               if j in P[p][1][k]))] for j in range(nbS) \

    9               if SolVal(x[i][j])>0]])

    10     return xs

    Listing 7-16

    Staff Scheduling Meaningful Solution

    ```


    Finally, after we solve it, we massage the solution to return to the caller a
    meaningful answer constructed by Listing [7-16](#A457410_1_En_7_Chapter.html#Par140):
    a list, indexed by instructor, containing all of his assigned sections with, for
    verification purposes, the three weights that participated in this assignment
    as seen in Table [7-12](#A457410_1_En_7_Chapter.html#Tab12). The weight on preference
    pairs is split in two for the two sections that triggered this weight to participate
    in the optimal value. This is useful information for the user to lift the veil
    on the optimization model performance.[⁹](#A457410_1_En_7_Chapter.html#Fn9)


