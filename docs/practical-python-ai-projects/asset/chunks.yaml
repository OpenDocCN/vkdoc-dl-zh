    ![$$ \sum \limits_{i\in N}{w}_i{x}_{i,j}\le 100{y}_j\forall j\in K $$](img/A457410_1_En_7_Chapter_Equg.gif)


    #### 7.1.1.4 可执行模型


    让我们将其转化为一个可执行模型，如代码清单 7-1 所示。该模型接受一个矩阵 `D`，其格式与表 7-1 完全相同。


