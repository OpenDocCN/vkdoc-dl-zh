    \ 变体\n\n第一个变体是将分段方法应用于非线性优化。\n\n#### 3.1.2.1 通过线性近似进行非线性函数最小化\n\n由于我们可以求解具有分段线性函数的优化问题，因此可以使用这种方法，通过精度不断提高的分段线性函数来近似凸非线性函数。这里有一个例子。假设我们需要在区间\
    \ `[2, 8]` 上最小化非线性函数\n\n`f(x) = sin(x)e^x`\n\n我们可以轻松地将此函数分解为多个段，并在这些段上对函数值进行线性插值，如图\
