    | 8 | 68 | [0, 2, 8] |

    | 9 | 55 | [0, 3, 7, 9] |

    | 10 | 83 | [0, 3, 7, 9, 10] |

    | 11 | 99 | [0, 2, 5, 11] |

    | 12 | 89 | [0, 3, 7, 9, 10, 12] |

    | 2-Target | Cost | [Path] |

    | 0 | 79 | [2, 5, 0] |

    | 1 | 38 | [2, 1] |

    | 3 | 68 | [2, 5, 6, 3] |

    | 4 | 34 | [2, 4] |

    | 5 | 31 | [2, 5] |

    | 6 | 35 | [2, 5, 6] |

    | 7 | 58 | [2, 5, 7] |

    | 8 | 51 | [2, 8] |

    | 9 | 66 | [2, 5, 9] |

    | 10 | 88 | [2, 5, 10] |

    | 11 | 82 | [2, 5, 11] |

    | 12 | 94 | [2, 5, 10, 12] |


    ### 6.2.3 Instances


    An interesting application appears in fiber optics networks. Consider a set of
    sources where signals emanate and a set of sinks that these signals must reach
    and a set of transshipment nodes that only carry signals (possibly boosting them
    if needed). It is possible for multiple signals to share the same cables at the
    same time if they use different wavelengths. The number of available wavelengths
    is limited. What we have here is multiple transshipment problems overlaid. The
    objective is, in this case, to maximize the number of established connections.'
