- fmt: '### 7.3.2 Variations


    在不修改上述模型整体结构的情况下，可以进行多种变体和添加额外的约束。


    - 在一个典型的系里，并非所有教师都有资格教授所有课程。可以为每个“教师-课程”对附加一个“合格”布尔值，以防止某些分配。通过将该课程所有相应决策变量设为零，可以简单地实现这一点。

    - 系里可能有一项政策，强制要求一部分教师（例如，终身教授）每学期教授一门低年级课程，无论他们的个人偏好如何。这可以通过`k-out-of-n`类型的约束来实现。

    - 对于某些有大量分部的课程，系里可能希望至少有一位终身教授教授一个分部，而所有其他分部可以由兼职教师授课。同样，这也是一个`k-out-of-n`类型的约束，只是需要设置合适的集合。


    ## 7.4 体育赛程安排


    所谓体育赛程安排，我指的是为某个联赛构建比赛日程表。[^(10)](#A457410_1_En_7_Chapter.html#Fn10) 如果你不关心观赏性体育，也请继续读下去，因为这个问题很有趣，也非常困难，并且会引导我们进入一个迷人而复杂的领域——松弛收紧，这可以应用于其他复杂问题。


    以下是我们试图解决的通用问题：联赛有若干个分区，每个分区有一定数量的球队。联赛规定了在整个赛季中，每支球队必须与同分区以及不同分区的每支其他球队交锋的次数，以及每支球队每周最多可以进行的比赛场次。


    一个简单的实例如表[7-13](#A457410_1_En_7_Chapter.html#Tab13)所示。“Intra”参数是每支球队与同分区每支其他球队交锋的次数。“Inter”参数是与不同分区每支球队交锋的次数。“G/W”是每支球队每周的比赛场次，“Weeks”是赛季的周数。


    **表 7-13 体育赛程安排数据示例**


    | (Intra Inter G/W Weeks) | { 2; 1; 1; 19 } |

    | :--- | :--- |

    | 分区 0 球队 | { 0; 1; 2; 3; 4; 5; 6 } |

    | 分区 1 球队 | { 7; 8; 9; 10; 11; 12; 13 } |


    ### 7.4.1 构建模型


    我们将分阶段描述这个模型。


    #### 7.4.1.1 决策变量


    这个模型的最终结果是什么？是一种日历，一种能够显示例如在第5周，球队1和3、球队2和7等相互对阵的东西（并且，这是针对赛季的每一周）。我们如何编码这些信息？一种可能性是使用一个三维二进制变量`x[i,j,w]`，其中`i`和`j`是球队索引（`i
    < j`），`w`是周索引。其解释是，例如，如果`x[2,5,13]`为1，则表示球队2和5在第13周相遇。


    读者是否觉得这效率极低？确实如此！


    它的可取之处在于，某些约束将变得非常简单易表达。如果这个模型可行，我们就完成了。如果不行，我们可以再尝试其他方法。让我们沿着这个思路继续探索。


    #### 7.4.1.2 约束


    第一个约束是，每个分区的球队（例如`T[d]`）之间有一定数量（例如`n[A]`）的分区内比赛，即：


    ```

    ∑_w x[i,j,w] = n_A ∀ i ∈ T_d; ∀ j ∈ T_d; i < j; ∀ d ∈ D

    ```


    跨分区约束类似。对于比赛场次数`n[R]`：


    ```

    ∑_w x[i,j,w] = n_R ∀ i ∈ T_d; ∀ j ∈ T_e; ∀ d ∈ D; ∀ e ∈ D; d < e

    ```


    球队每周的比赛场次实际上是一个上限。想象一个简单的边界情况：一个分区有三支球队，每周一场比赛。其中一支球队不可能参赛。因此，我们需要一个不等式。对于比赛场次数`n[G]`：


    ```

    ∑_{i<j} x[i,j,w] + ∑_{j<i} x[j,i,w] ≤ n_G ∀ i ∈ T; ∀ w ∈ W

    ```


    注意这两个求和。由于我们固定了球队`i`，我们必须同时考虑与索引更大和更小的球队的比赛。


    #### 7.4.1.3 目标函数


    这个问题非常复杂，以至于仅仅找到可行解都很困难。此外，可能的目标函数很可能因联赛而异。为了说明起见，我们假设希望尽可能将分区内比赛推向赛程的末尾。越晚越好。


    考虑同一分区的两支球队`i`和`j`。如果他们在第`w`周相遇，那么变量`x[i,j,w]`将为1。我们如何根据“晚度”为其赋予权重？我们可以乘以`w`。这引出了以下目标函数：


    ```

    ∑_{w∈W} ∑_{d∈D} ∑_{i∈T_d} ∑_{j∈T_d | i<j} w * x[i,j,w]

    ```


    不幸的是，这个目标函数有时表现相当糟糕。就我们的目的而言，所有将分区内比赛安排在赛季末的解都是好的。没有理由偏爱最后一周胜过倒数第二周。因此，让我们做一些计算，算出分区内比赛所需的周数。对于`n[A]`场比赛、一个分区有`|T[d]|`支球队以及每周最多`n[G]`场比赛，我们得到需要`n[w]`周：


    ```

    n_w = (|T_d| * n_A) / n_G

    ```


    因此，如果我们将分区内比赛分配在最后`n[w]`周，并赋值为1，否则为0，我们就得到了目标函数：


    ```

    ∑_{w=|W|-n_w}^{|W|} ∑_{d∈D} ∑_{i∈T_d} ∑_{j∈T_d | i<j} x[i,j,w]

    ```


    这个目标函数通常表现要好得多。[^(11)](#A457410_1_En_7_Chapter.html#Fn11) 请注意，这种所需周数的计算并不总是正确的；它可能会有一周的偏差，但足以满足我们的目的。'
  raw: '### 7.3.2 Variations


    Without modifying the overall structure of the model above, a number of variations
    and additional constraints are possible.


    *   In a typical department, not all instructors are qualified to teach all courses.
    A “Qualified” Boolean could be attached to each Instructor-Course pair to prevent
    some assignments. This is simple to accommodate by setting to zero the corresponding
    decision variables for all the sections of the course.

    *   The department might have a policy whereby a subset of the instructors, say
    tenured professors, are forced to teach one lower-level course per semester, no
    matter what their preferences states. This would be implemented as a `k-out-of-n`
    type constraint.

    *   For certain courses with a large number of sections, the department might
    want at least one tenured professor teaching a section, while all other sections
    could be instructed by adjuncts. Again, this is a `k-out-of-n` type constraint,
    with the appropriate set.


    ## 7.4 Sports Timetabling


    By sports timetabling, I mean the construction of a schedule of games for a league.[^(10)](#A457410_1_En_7_Chapter.html#Fn10)
    If you do not care about spectator sports, read on anyway because the problem
    is interesting, very difficult, and leads us into the fascinating and complex
    area of relaxation tightening , which can be applied to other complex problems.


    Here is the generic problem we will try to solve: the league has a number of divisions,
    each with a certain number of teams. The league specifies the number of times
    during a complete season that each team must face each other team of the same
    division and of each other division as well as the maximum number of games in
    a week each team will play.


    For a simple instance, see Table [7-13](#A457410_1_En_7_Chapter.html#Tab13). The
    “Intra” parameter is the number of times each team faces each other team of the
    same division. The “Inter” is for each team of other divisions. “G/W” is the number
    of games per week of each team and “Weeks” is the number of weeks of the season.


    Table 7-13


    Example of Sports Timetabling Data


    | (Intra Inter G/W Weeks) | { 2; 1; 1; 19 } |

    | Division 0 teams | { 0; 1; 2; 3; 4; 5; 6 } |

    | Division 1 teams | { 7; 8; 9; 10; 11; 12; 13 } |


    ### 7.4.1 Constructing a Model


    We will describe the model in stages.


    #### 7.4.1.1 Decision Variables


    What is the end result of this model? A calendar of sorts, something that will
    display that on Week 5, for instance, Teams 1&3, Teams 2&7, etc. are facing each
    other (and this, for every week of the season). How can we encode this information?
    One possibility is for a three-dimensional binary variable x [i,j,w] where i and
    j are team indices (i < j) and w is a week index. The interpretation is, for example,
    if x [2,5,13] is one, then teams 2 and 5 meet during week 13.


    Does this strike the reader as profoundly inefficient? It is!


    It has the redeeming value that some of the constraints will be wonderfully simple
    to express. If this model works, we are done. If not, then we can try harder.
    Let’s pursue this avenue further.


    #### 7.4.1.2 Constraints


    The first constraint is that we have a fixed number (say n [A] ) of intra-division
    games between teams (say T [d] ) of each division, or


    ![$$ \sum \limits_w{x}_{i,j,w}={n}_A\forall i\in {T}_d;\forall j\in {T}_d;i<j;\forall
    d\in D $$](A457410_1_En_7_Chapter_Equaa.gif)


    The inter-division constraint is similar. For number of games n [R] ,


    ![$$ \sum \limits_w{x}_{i,j,w}={n}_R\forall i\in {T}_d;\forall j\in {T}_e;\forall
    d\in D;\forall e\in D;d<e $$](A457410_1_En_7_Chapter_Equab.gif)


    The number of games per week that a team plays is actually an upper bound. Imagine
    a simple boundary case of one division with three teams and one game per week.
    One of the teams cannot possibly play. Therefore, we need an inequality. For number
    of games n [G] ,


    ![$$ \sum \limits_{i<j}{x}_{i,j,w}+\sum \limits_{j<i}{x}_{j,i,w}\le {n}_G\forall
    i\in T;\forall w\in W $$](A457410_1_En_7_Chapter_Equac.gif)


    Notice the two sums. Since we fix team i, we must look at the games with teams
    with both larger and smaller ordinals.


    #### 7.4.1.3 Objective Function


    This problem is complex enough that even feasibility is difficult. Besides, the
    possible objective functions likely vary considerably with leagues. For the sake
    of illustration, let’s assume that we want, as much as possible, to push intra-divisional
    matches towards the end of the calendar. The later, the better.


    Let’s consider two teams of the same division, i and j. If they face each other
    during week w, then the variable x [i,j,w] will be one. How can we put a weight
    on this according to “lateness?” We could multiply by w. This leads us to the
    following objective,


    ![$$ \sum \limits_{w\in W}\kern0.50em \sum \limits_{dinD}\kern0.50em \sum \limits_{i\in
    {T}_d}\kern0.50em \sum \limits_{j\in {T}_d\mid i<j}w{x}_{i,j,w} $$](A457410_1_En_7_Chapter_Equad.gif)


    Unfortunately, this objective performs rather badly sometimes. For our purposes,
    all solutions that have intra-divisional games towards the end are good. There
    is no reason to favor the last week over the second-to-last week. So let’s do
    some calculations and compute the number of weeks required for intra-divisional
    games. For n [A] games and |T [d] | teams in a division and a maximum of n [G]
    games, we get that we need n [w] weeks,


    ![$$ {n}_w=\frac{\mid {T}_d\mid {n}_A}{n_G} $$](A457410_1_En_7_Chapter_Equae.gif)


    So if we assign one for intra-divisional games in the last n [w] weeks, and zero
    otherwise, we obtain the objective.


    ![$$ \sum \limits_{w=\mid W\mid -{n}_w}^{\mid W\mid}\sum \limits_{d\in D}\sum
    \limits_{i\in {T}_d}\sum \limits_{j\in {T}_d\mid i<j}{x}_{i,j,w}, $$](A457410_1_En_7_Chapter_Equaf.gif)


    which performs much better, usually.[^(11)](#A457410_1_En_7_Chapter.html#Fn11)
    Notice that this computation of the required number of weeks is not always correct
    ; it can be off by one but it serves our purposes.'
  trans: '

    ### 7.3.2 变体


    在不修改上述模型整体结构的情况下，可以进行多种变体和添加额外的约束。


    -   在一个典型的系里，并非所有教师都有资格教授所有课程。可以为每个“教师-课程”对附加一个“合格”布尔值，以防止某些分配。通过将该课程所有相应决策变量设为零，可以简单地实现这一点。

    -   系里可能有一项政策，强制要求一部分教师（例如，终身教授）每学期教授一门低年级课程，无论他们的个人偏好如何。这可以通过`k-out-of-n`类型的约束来实现。

    -   对于某些有大量分部的课程，系里可能希望至少有一位终身教授教授一个分部，而所有其他分部可以由兼职教师授课。同样，这也是一个`k-out-of-n`类型的约束，只是需要设置合适的集合。


    ## 7.4 体育赛程安排


    所谓体育赛程安排，我指的是为某个联赛构建比赛日程表。¹⁰ 如果你不关心观赏性体育，也请继续读下去，因为这个问题很有趣，也非常困难，并且会引导我们进入一个迷人而复杂的领域——松弛收紧，这可以应用于其他复杂问题。


    以下是我们试图解决的通用问题：联赛有若干个分区，每个分区有一定数量的球队。联赛规定了在整个赛季中，每支球队必须与同分区以及不同分区的每支其他球队交锋的次数，以及每支球队每周最多可以进行的比赛场次。


    一个简单的实例如表 7-13 所示。“Intra”参数是每支球队与同分区每支其他球队交锋的次数。“Inter”参数是与不同分区每支球队交锋的次数。“G/W”是每支球队每周的比赛场次，“Weeks”是赛季的周数。


    **表 7-13 体育赛程安排数据示例**


    | (Intra Inter G/W Weeks) | { 2; 1; 1; 19 } |

    | :--- | :--- |

    | 分区 0 球队 | { 0; 1; 2; 3; 4; 5; 6 } |

    | 分区 1 球队 | { 7; 8; 9; 10; 11; 12; 13 } |


    ### 7.4.1 构建模型


    我们将分阶段描述这个模型。


    #### 7.4.1.1 决策变量


    这个模型的最终结果是什么？是一种日历，一种能够显示例如在第 5 周，球队 1 和 3、球队 2 和 7 等相互对阵的东西（并且，这是针对赛季的每一周）。我们如何编码这些信息？一种可能性是使用一个三维二进制变量`x[i,j,w]`，其中`i`和`j`是球队索引（`i
    < j`），`w`是周索引。其解释是，例如，如果`x[2,5,13]`为 1，则表示球队 2 和 5 在第 13 周相遇。


    读者是否觉得这效率极低？确实如此！


    它的可取之处在于，某些约束将变得非常简单易表达。如果这个模型可行，我们就完成了。如果不行，我们可以再尝试其他方法。让我们沿着这个思路继续探索。


    #### 7.4.1.2 约束


    第一个约束是，每个分区的球队（例如`T[d]`）之间有一定数量（例如`n[A]`）的分区内比赛，即：


    ```

    ∑_w x[i,j,w] = n_A ∀ i ∈ T_d; ∀ j ∈ T_d; i < j; ∀ d ∈ D

    ```


    跨分区约束类似。对于比赛场次数`n[R]`：


    ```

    ∑_w x[i,j,w] = n_R ∀ i ∈ T_d; ∀ j ∈ T_e; ∀ d ∈ D; ∀ e ∈ D; d < e

    ```


    球队每周的比赛场次实际上是一个上限。想象一个简单的边界情况：一个分区有三支球队，每周一场比赛。其中一支球队不可能参赛。因此，我们需要一个不等式。对于比赛场次数`n[G]`：


    ```

    ∑_{i<j} x[i,j,w] + ∑_{j<i} x[j,i,w] ≤ n_G ∀ i ∈ T; ∀ w ∈ W

    ```


    注意这两个求和。由于我们固定了球队`i`，我们必须同时考虑与索引更大和更小的球队的比赛。


    #### 7.4.1.3 目标函数


    这个问题非常复杂，以至于仅仅找到可行解都很困难。此外，可能的目标函数很可能因联赛而异。为了说明起见，我们假设希望尽可能将分区内比赛推向赛程的末尾。越晚越好。


    考虑同一分区的两支球队`i`和`j`。如果他们在第`w`周相遇，那么变量`x[i,j,w]`将为 1。我们如何根据“晚度”为其赋予权重？我们可以乘以`w`。这引出了以下目标函数：


    ```

    ∑_{w∈W} ∑_{d∈D} ∑_{i∈T_d} ∑_{j∈T_d | i<j} w * x[i,j,w]

    ```


    不幸的是，这个目标函数有时表现相当糟糕。就我们的目的而言，所有将分区内比赛安排在赛季末的解都是好的。没有理由偏爱最后一周胜过倒数第二周。因此，让我们做一些计算，算出分区内比赛所需的周数。对于`n[A]`场比赛、一个分区有`|T[d]|`支球队以及每周最多`n[G]`场比赛，我们得到需要`n[w]`周：


    ```

    n_w = (|T_d| * n_A) / n_G

    ```


    因此，如果我们将分区内比赛分配在最后`n[w]`周，并赋值为 1，否则为 0，我们就得到了目标函数：


    ```

    ∑_{w=|W|-n_w}^{|W|} ∑_{d∈D} ∑_{i∈T_d} ∑_{j∈T_d | i<j} x[i,j,w]

    ```


    这个目标函数通常表现要好得多。¹¹ 请注意，这种所需周数的计算并不总是正确的；它可能会有一周的偏差，但足以满足我们的目的。

