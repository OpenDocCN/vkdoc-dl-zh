    ### 6.2.1 构建模型


    该模型将分阶段进行描述。


    #### 6.2.1.1 决策变量


    由于这仅仅是同一网络上的一组转运问题，因此每个问题需要一个决策变量。所以，假设有 `K` 种商品和一组 `N` 个节点，


    ![$$ {x}_{k,i,j}\in \left[0,1,2,\dots \right]\forall i\in N,\forall j\in N,\forall
    k\in K $$](A457410_1_En_6_Chapter_Eque.gif)


    如果变量 `x[4,3,5]` 为 6，则表示沿弧 `(3, 5)` 发送 6 个单位的商品 4。


    #### 6.2.1.2 目标函数


    目标函数是转运目标函数的简单推广，


    ![$$ \min \sum \limits_k\sum \limits_i\sum \limits_j{C}_{k,i,j}{x}_{k,i,j} $$](img/A457410_1_En_6_Chapter_Equf.gif)


    现在我们最小化在网络上运输所有商品的成本。


    #### 6.2.1.3 约束条件


    约束条件是广义的流量守恒，需要注意它们必须对每种商品分别成立：


    ![$$ \sum \limits_j{x}_{k,j,i}-\sum \limits_j{x}_{k,i,j}={D}_{k,i}-{S}_{k,i}\forall
    k\in K,i\in N $$](img/A457410_1_En_6_Chapter_Equ5.gif)


    (6.5)

