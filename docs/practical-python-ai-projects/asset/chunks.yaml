  trans: '

    ### 7.2.4 极大极大与极小极小


    为了了解这一技巧的应用，回顾一下，在第 2.3.2.1 节中，我们遗留了如何对极大极大问题进行建模的问题，


    ![$$ \underset{x}{\max}\underset{i}{\max}\sum \limits_j{a}_{i,j}{x}_j+{b}_i $$](img/A457410_1_En_7_Chapter_Equq.gif)


    该问题受某些约束条件限制，或者等价地，如何处理同样棘手的极小极小问题。其技巧是首先将每个仿射函数转化为如下形式的约束：


    ![$$ \sum \limits_j{a}_{i,j}{x}_j+{b}_i=z $$](img/A457410_1_En_7_Chapter_Equr.gif)


    然后，我们将每个等式转化为一对不等式，对这些不等式进行具体化，并应用析取技巧来强制执行其中一个。最后，我们将目标函数设置为 `max z`。（我确实提到过处理起来有些困难，但利用我们在本节中开发的例程，只需在清单
    7-14 中编写几行代码即可。作为示例，我们将求解以下问题：


    ![$$ \underset{x\in \left[2,5\right]}{\max}\max \left\{2x-3,-2x+12\right\}, $$](A457410_1_En_7_Chapter_Equs.gif)


    该问题在图形上由图 7-2 表示，其中显示了两个函数，最大值用较粗的线条表示。请注意，这显然是一个非凸目标函数。还要注意，人们可以用不同的方法求解这样一个简单的问题，但效率并不会高多少。例如，可以计算多面体所有顶点上的函数值。但要做到这一点，需要先找到这些顶点。而要找到这些顶点，要么需要求解指数数量的线性规划问题，要么需要求解指数数量的线性方程组。在最坏情况下，我们的方法在理论上可能需要同样多的工作量，但在实践中，它从未如此。⁷


    ![A457410_1_En_7_Fig2_HTML.jpg](img/A457410_1_En_7_Fig2_HTML.jpg)


    图 7-2


    在定义域 `[2, 5]` 上的 `max{2x − 3, −2x + 12}`


    ```

    1  def maximax(s,a,x,b):

    2    n = len(a)

    3    d = [bounds_on_box(a[i],x,b[i]) for i in range(n)]

    4    zbound = [min(d[i][0] for i in range(n)), max(d[i][1] \

    5           for i in range(n))]

    6    z = s.NumVar(zbound[0],zbound[1],")

    7    delta = [reify(s,a[i]+[-1],x+[z],b[i],None,''=='') \

    8           for i in range(n)]

    9    k_out_of_n(s,1,delta)

    10    s.Maximize(z)

    11    return z,delta

    清单 7-14

    如何求解极大极大问题 (my or tools.py)

    ```


    函数 `maximax` 接收求解器 `s`（用于添加极大极大约束），以及矩阵 `a` 和数组 `x`、`b`，它们表示 `n` 个仿射函数 ![$$ \sum
    \limits_j{a}_{i,j}{x}_j+{b}_i $$](img/A457410_1_En_7_Chapter_IEq44.gif)，其中 ![$$
    i\in \left[0,n-1\right] $$](A457410_1_En_7_Chapter_IEq45.gif)。我们创建额外的变量 `z`，它将作为要最大化的目标函数。为了给
    `z` 设置有意义的边界，我们使用 `bounds_on_box` 来查找 `x` 定义域上所有仿射函数的最小值和最大值。我们使用这些值中的最小值和最大值作为
    `z` 的边界。


    然后，将每个仿射函数设置为等于 `z`，并在相应的 `delta[i]` 上进行具体化，使得 ![$$ {\delta}_i=1\iff \sum \limits_j{a}_{i,j}{x}_j+{b}_i=z
    $$](img/A457410_1_En_7_Chapter_IEq46.gif)。最后，我们强制 `delta[i]` 中恰好有一个为 1，或者等价地，强制其中一个仿射函数约束被激活。我们设置目标函数，并返回目标函数和指示器数组。这将为调用者提供最优解时的所有必要信息。


    我们这个小例子的解显然是 `x = 2`，目标值为 `−2x + 12 = 8`。实际上，运行清单 7-14 会返回 `8.0` 和 `[0, 1]`，这告诉我们第二个仿射函数是被激活的那个。

