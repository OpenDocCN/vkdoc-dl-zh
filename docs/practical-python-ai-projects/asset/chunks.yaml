    \n这是一个典型示例。Solar-1138 公司拥有一组清洁发电厂，为多个城市供电。每个发电厂都有最大容量，因此只能提供有限数量的千瓦时（kW-h）。每个城市都有峰值需求，并且所有城市的峰值大致在同一时间出现。因此，峰值需求的总和就是发电厂需要满足的电量。将一千瓦时从发电厂输送到城市的成本因发电厂、城市、输送基础设施以及发电厂与城市之间的距离而异。该成本是通过考虑电力生产、发电厂及电力线路的维护而确定的。\n\
