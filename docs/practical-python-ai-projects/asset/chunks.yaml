- fmt: '#### 7.4.1.4 Executable Model


    Let’s translate this into an executable model. It will receive a list of divisions,
    each containing the teams of that division. It would be simpler if all divisions
    had the same number of teams, but that is never the case.


    It also accepts a list of parameters, the number of intra-divisional games, `nbIntra`;
    of inter-divisional games, `nbInter`; of games per week for a team, `nbPerWeek`
    (note that this has to be a maximum, not a strict constraint); and the number
    of weeks of the season, `nbWeeks`. See Listing [7-17](#A457410_1_En_7_Chapter.html#Par165).


    ```

    1  def solve_model(Teams,params):

    2    (nbIntra,nbInter,nbPerWeek,nbWeeks) = params

    3    nbTeams = sum([1 for sub in Teams for e in sub])

    4    nbDiv,Cal = len(Teams),[]

    5    s = newSolver(''Sportsuschedule'', True)

    6    x = [[[s.IntVar(0,1,") if i0] for w in range(nbWeeks)]

    33    return rc,ObjVal(s),Cal

    Listing 7-17

    Sports Timetabling Model (sports timetabling.py)

    ```


    Line 7 declares our decision variables. Note that this is a list of lists of lists.
    The first dimension is one less than the number of teams since we only will consider
    matches `i` vs `j` where `i < j`. The second dimension is the number of teams
    but note that half of the entries (below the diagonal) will never be used so we
    set them to `None`. The last dimension is the number of weeks.


    Line 9 starts a loop to set the number of intra-division games. We loop on each
    division, and then on every pair `(i, j)` of teams in the division, respecting
    the `i < j` condition to only use the upper triangle.


    Similarly for the loop starting at 14 where we loop on each division, then on
    every division with a larger ordinal, then for every pair of teams, each in one
    of the two divisions.


    Finally, after we solve it, we massage the solution to return to the caller a
    meaningful result: a list of matches, indexed by the week’s ordinal. For our small
    instance, a result is shown in Table [7-14](#A457410_1_En_7_Chapter.html#Tab14).


    **Table 7-14** Optimal Solution to the Sports Timetabling


    | Week | Matches |   |   |   |   |   |   |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 0 | 0 vs 12 | 1 vs 11 | 2 vs 7 | 3 vs 13 | 4 vs 9 | 5 vs 8 | 6 vs 10 |

    | 1 | 0 vs 9 | 1 vs 10 | 2 vs 13 | 3 vs 11 | 4 vs 8 | 5 vs 12 | 6 vs 7 |

    | 2 | 0 vs 11 | 1 vs 12 | 2 vs 8 | 3 vs 7 | 4 vs 13 | 5 vs 10 | 6 vs 9 |

    | 3 | 0 vs 13 | 1 vs 7 | 2 vs 10 | 3 vs 9 | 4 vs 12 | 5 vs 11 | 6 vs 8 |

    | 4 | 0 vs 8 | 1 vs 13 | 2 vs 9 | 3 vs 12 | 4 vs 10 | 5 vs 7 | 6 vs 11 |

    | 5 | 0 vs 2 | 1 vs 4 | 3 vs 5 | 6 vs 13 | 7 vs 12 | 8 vs 10 | 9 vs 11 |

    | 6 | 0 vs 3 | 1 vs 4 | 2 vs 6 | 5 vs 9 | 7 vs 13 | 8 vs 11 | 10 vs 12 |

    | 7 | 0 vs 4 | 1 vs 8 | 2 vs 3 | 5 vs 6 | 7 vs 13 | 9 vs 10 | 11 vs 12 |

    | 8 | 0 vs 1 | 2 vs 12 | 3 vs 6 | 4 vs 5 | 7 vs 8 | 9 vs 11 | 10 vs 13 |

    | 9 | 0 vs 5 | 1 vs 6 | 2 vs 4 | 3 vs 10 | 7 vs 11 | 8 vs 12 | 9 vs 13 |

    | 10 | 0 vs 6 | 1 vs 3 | 2 vs 5 | 4 vs 11 | 7 vs 10 | 8 vs 13 | 9 vs 12 |

    | 11 | 0 vs 1 | 2 vs 6 | 3 vs 4 | 5 vs 13 | 7 vs 11 | 8 vs 12 | 9 vs 10 |

    | 12 | 0 vs 2 | 1 vs 5 | 3 vs 8 | 4 vs 6 | 7 vs 9 | 10 vs 11 | 12 vs 13 |

    | 13 | 0 vs 6 | 1 vs 9 | 2 vs 3 | 4 vs 5 | 7 vs 12 | 8 vs 11 | 10 vs 13 |

    | 14 | 0 vs 5 | 1 vs 6 | 2 vs 11 | 3 vs 4 | 7 vs 10 | 8 vs 13 | 9 vs 12 |

    | 15 | 0 vs 4 | 1 vs 3 | 2 vs 5 | 6 vs 12 | 7 vs 9 | 8 vs 10 | 11 vs 13 |

    | 16 | 0 vs 7 | 1 vs 2 | 3 vs 5 | 4 vs 6 | 8 vs 9 | 10 vs 11 | 12 vs 13 |

    | 17 | 0 vs 3 | 1 vs 2 | 4 vs 7 | 5 vs 6 | 8 vs 9 | 10 vs 12 | 11 vs 13 |

    | 18 | 0 vs 10 | 1 vs 5 | 2 vs 4 | 3 vs 6 | 7 vs 8 | 9 vs 13 | 11 vs 12 |


    This approach works for smallish instances but will not scale very well as the
    reader can attest by trying larger instances. (Try something the size of a professional
    league and be prepared to wait a while for a solution.) The problem stems from
    the interaction between the model feasible solution space and the techniques used
    by integer programming solvers to find optimal solutions. Solvers typically work
    by fixing some of the variables in the model and then solving for the others by
    letting them take on a fractional solution: iterating multiple times. For our
    model, this relaxation is fairly weak. I will not go into the details of why,
    but you will see how to fix it, once you realize that the solvers are slow to
    solve. The key insight is that we can easily add more constraints.


    Here is an example. Imagine an instance with one game per week and consider three
    teams, say `i`, `j`, and `k`. If the decision variable is allowed to take on fractional
    values at some point during the execution, then for a given week `w` it could
    happen that the optimal solution satisfies the following:


    ```

    x_{i,j,w} = 1/2   x_{i,k,w} = 1/2   x_{j,k,w} = 1/2

    ```


    Note that this solution is allowed by the constraint that says “One game per week
    per team” since


    `x[i,j,w] + x[i,k,w] = 1`,


    `x[i,j,w] + x[j,k,w] = 1`,


    `x[i,k,w] + x[j,k,w] = 1`


    But we know that this is not a valid solution since the sum of the three variables
    must not exceed one. If `i` and `j` face each other, then `k` cannot face either
    of them; similarly for the pair `(i, k)` and for `(j, k)`. Therefore, knowing
    that there is only one game per week, we could add a constraint for every triple
    of team `i`, `j`, `k` for every week `w`,


    ```

    x_{i,j,w} + x_{i,k,w} + x_{j,k,w} <= 1

    ```


    Note that this constraint, if the variables are integers, is redundant. But it
    is a valid constraint nevertheless and it is useful for fractional values, which
    is happening internally in the solver. We can also consider tuples of four or
    even five teams, and number of games per week of two or three. See Table [7-15](#A457410_1_En_7_Chapter.html#Tab15)
    for the bounds given small numbers of teams and of games per week. Note that many
    of these bounds will never be violated by fractional solutions so they are not
    very useful for our purposes.


    **Table 7-15** Bounds on Small Sums of Tuples of Decision Variables


    | Nb of Teams | Nb of Games Per Week | Bound on Sum |

    | --- | --- | --- |

    | 3 | 1 | 1 |

    |   | 2 | 3 |

    | 4 | 1 | 2 |

    |   | 2 | 4 |

    |   | 3 | 6 |

    | 5 | 1 | 2 |

    |   | 2 | 5 |

    |   | 3 | 7 |

    |   | 4 | 9 |


    The number of those additional constraints grows fast. The approach will therefore
    add a considerable number of constraints to the model. If that causes solvers
    to slow down unacceptably, an alternative is the approach we used to solve the
    TSP: adding only the constraints that we need. We would do that by solving the
    relaxation, looking for tuples violating the bound, and adding them. This is the
    aim of Listing [7-18](#A457410_1_En_7_Chapter.html#Par179). It is an example of
    how easily one can add relaxation-tightening constraints to a model written with
    OR-Tools.'
