    11             for k in range(len(Path)-1):

    12               for l in range(k+1,len(Path)):

    13                 if Costs[Path[k]][Path[l]] is None:

    14                   Costs[Path[k]][Path[l]] = Cumul[l]-Cumul[k]

    15                   Paths[Path[k]][Path[l]] = Path[k:l+1]

    16     return Paths, Costs

