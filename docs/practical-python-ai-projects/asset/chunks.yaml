    ### 2.1.1 构建模型


    一个解决方案除了列出每种食物的份量之外，还能是什么呢？因此，决策变量必须对应每种食物，代表其份数。我们将这些变量命名为 `f[0]`, …, `f[n]`。我们假设允许出现分数答案（即半份也是可以接受的）。


    目标是**最小化成本**。每种食物都有一个成本（`c[0]`, …, `c[n]`）。这些不是变量，而是数据。因此，我们要做的是最小化所有乘积 `c[i]
    × f[i]` 的总和。由此得出目标函数：


    ![$$ \min \sum \limits_i{c}_i{f}_i $$](img/A457410_1_En_2_Chapter_Equc.gif)


    接下来处理约束条件。我们有两组约束：一组表示每种食物可接受份量的范围（假设食物 `i` 的最小值为 `l[i]`，最大值为 `u[i]`），另一组表示所需营养素的取值范围（营养素
    `j` 的最小值为 `a[j]`，最大值为 `b[j]`）。较简单的约束与食物相关。由于我们的决策变量表示每种食物的份数，我们只需对每个份数进行范围限定：


    ![$$ {l}_i\le {f}_i\le {u}_i $$](img/A457410_1_En_2_Chapter_Equ1.gif)


    (2.1)


    关于营养素的约束则稍微复杂一些。考虑营养素 `j`。饮食中会包含多少这种营养素？每种食物 `i` 可能含有一定量的该营养素，如表 2-1 所示。我们将这个量称为
    `N[ji]`（对应于食物 `i` 所在行与营养素 `j` 所在列交叉处的条目）。要得到这种营养素的总量，我们需要对所有食物求和，即每种食物的份量与其营养素含量的乘积。对于每种营养素
    `j`：


    ![$$ {a}_j\le \sum \limits_i{N}_{ji}{f}_i\le {b}_j $$](img/A457410_1_En_2_Chapter_Equd.gif)


    理论部分到此结束。现在我们将它转化为一个可执行的、通用性足以解决所有此类问题的模型（列表 2-1）。我们假设数据以名为 `N` 的二维数组形式给出。其结构与表
    2-1 相同，但不包含最后一列和最后一行。每一行代表一种食物，但最后两行代表每种营养素的最小和最大需求量（由列表示），而最后三列则代表每种食物份量的最小值、最大值和成本。


    ```

    1  def solve_diet(N):

    2    s = newSolver(''Diet'')

    3    nbF,nbN = len(N)-2, len(N[0])-3

    4    FMin,FMax,FCost,NMin,NMax = nbN,nbN+1,nbN+2,nbF,nbF+1

    5    f = [s.NumVar(N[i][FMin], N[i][FMax],'''') for i in range(nbF)]

    6    for j in range(nbN):

    7      s.Add(N[NMin][j]<=s.Sum([f[i]*N[i][j] for i in range(nbF)]))

    8      s.Add(s.Sum([f[i]*N[i][j] for i in range(nbF)])<=N[NMax][j])

    9    s.Minimize(s.Sum([f[i]*N[i][FCost] for i in range(nbF)]))

    10    rc = s.Solve()

    11    return rc,ObjVal(s),SolVal(f)

    列表 2-1

    最低成本饮食模型（diet problem.py）

    ```


    该模型使用 `newSolver` 函数来简化代码表达³，读者可以在列表 2-2 中看到。这些以及其他简化方法都可以在 `my_or_tools.py` 中找到。


    ```

    from ortools.linear_solver import pywraplp

    def newSolver(name,integer=False):

    return pywraplp.Solver(name,\

    pywraplp.Solver.

    CBC_MIXED_INTEGER_PROGRAMMING \

    if integer else \

    pywraplp.Solver.GLOP_LINEAR_PROGRAMMING)

    列表 2-2

    用于创建适当求解器实例的实用函数

    ```


    为了便于模型表达，第 3-4 行为我们将要使用的行和列索引赋予了有意义的名称。在第 5 行，我们定义了决策变量，每种食物一个，其取值范围如公式 (2-1)
    所示，即 `[l[i], u[i]]`。将范围设为 `0, +∞)` 然后添加约束来强制边界也是正确的。求解器仍会找到相同的解，但尽可能限制决策变量的范围更简单，也是一种良好实践。在复杂模型中，这通常能显著缩短求解时间。


    从第 6 行开始的两行循环根据公式 (2.1.1) 建立了每种营养素的取值范围。第 9 行及后续行创建了目标函数，求解问题，并返回三个数值：求解器的状态（应为零）、最优值以及最优解。函数
    `SolVal` 和 `ObjVal`（见列表 [2-3）的双重作用是简化返回给调用者的结果以及代码的可读性。


    ```

    def SolVal(x):

    if type(x) is not list:

    return 0 if x is None \

    else x if isinstance(x,(int,float)) \

    else x.SolutionValue() if x.Integer() is False \

    else int(x.SolutionValue())

    elif type(x) is list:

    return [SolVal(e) for e in x]

    def ObjVal(x):

    return x.Objective().Value()

    列表 2-3

    用于从 OR-Tools 对象中提取值的实用函数

    ```


    执行此模型的结果显示在表 2-1 的最后一行和最后一列。该列表示每种食物的份数，该行表示饮食中将包含的每种营养素的量。读者应该注意到，许多食物项目和营养素含量都处于其所需的最小值。这对于此类模型来说是意料之中的，因为我们试图最小化一个线性成本函数；最优解应尽可能向约束边界靠拢。


    读者可以尝试使用此模型。它作为 `diet problem.py` 包含在附加材料中，同时还有一个随机饮食问题生成器，以及一个用于以类似于表 2-1 的表格格式显示解决方案的例程。

