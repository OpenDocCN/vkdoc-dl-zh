    ## 7.6 Quick Reference for OR-Tools MPSolver in Python


    This is by no means a complete reference, but it is enough for all the models
    described in the book. Also described are the wrapper functions used to simplify
    model writing.


    To use the LP and IP solvers, a model must start with the code in Listing [7-30](#A457410_1_En_7_Chapter.html#Par297).


    ```python

    from linear_solver import pywraplp

    ```


    A solver instance is created by the code in Listing [7-31](#A457410_1_En_7_Chapter.html#Par299).


    ```python

    s = pywraplp.Solver(NAME,pywraplp.Solver.TYPE)

    ```


    Here `s` is the returned solver, `NAME` is any string, and `TYPE` is one of:


    | `GLOP_LINEAR_PROGRAMMING` | LP |

    | `CLP_LINEAR_PROGRAMMING` | LP |

    | `GLPK_LINEAR_PROGRAMMING` | LP |

    | `SULUM_LINEAR_PROGRAMMING` | LP |

    | `GUROBI_LINEAR_PROGRAMMING` | LP |

    | `CPLEX_LINEAR_PROGRAMMING` | LP |

    | `SCIP_MIXED_INTEGER_PROGRAMMING` | MIP |

    | `GLPK_MIXED_INTEGER_PROGRAMMING` | MIP |

    | `CBC_MIXED_INTEGER_PROGRAMMING` | MIP |

    | `SULUM_MIXED_INTEGER_PROGRAMMING` | MIP |

    | `GUROBI_MIXED_INTEGER_PROGRAMMING` | MIP |

    | `CPLEX_MIXED_INTEGER_PROGRAMMING` | MIP |

    | `BOP_INTEGER_PROGRAMMING` | IP (Binary) |


    All the models in the book use `GLOP` for LP problems and `CBC` for all MIPs.
    Listing [7-32](#A457410_1_En_7_Chapter.html#Par302) shows how the current wrapper
    is set.


    ```python

    s = newSolver(NAME,[False|True])

    ```


    Note that `False` is the default and returns an LP solver instance (`GLOP`) and
    `True` returns a MIP solver (`CBC`).


    To a solver instance we add decision variables by the code in Listing [7-33](#A457410_1_En_7_Chapter.html#Par305)
    for continuous variables or by the code in Listing [7-34](#A457410_1_En_7_Chapter.html#Par306)
    for integer variables where `VAR` is the returned variable object and `NAME` is
    any string. Names must be unique within a solver instance. Given the empty string,
    an automatic unique name will be internally generated, which is a precious feature,
    especially for routines that will be repeatedly reused within a solver instance.
    The range is described by `LOW`, any number, or `-solver.infinity()` and by `HIGH`,
    any number larger than `LOW`, or `solver.infinity()`. It is a good rule of thumb
    to restrict the range as much as possible.


    ```python

    var = s.NumVar(LOW,HIGH,NAME)

    ```


    ```python

    VAR = s.IntVar(LOW,HIGH,NAME)

    ```


    The easiest way to create an array of decision variables is shown in Listing [7-35](#A457410_1_En_7_Chapter.html#Par308).


    ```python

    x = [s.NumVar(LOW,HIGH,") for _ in range(N)]

    ```


    Note that `N` is the number of elements required in the array. Arrays are, of
    course, indexed starting at zero. This is similar for high-dimensional arrays.
    For example, an `M` by `N` matrix is created by the code in Listing [7-36](#A457410_1_En_7_Chapter.html#Par310).


    ```python

    m =[[s.NumVar(LOW,HIGH,") for _ in range(N)] for _ in range(M)]

    ```


    After variable declarations, constraints follow. The simplest constraint declaration
    is shown in Listing [7-37](#A457410_1_En_7_Chapter.html#Par312).


    ```python

    s.Add(REL)

    ```


    Note that `REL` is (almost) any linear algebraic relation using decision variables,
    numbers, the arithmetic operators `+`, `-`, `*`, `/` and the equality and inequality
    relationals. For an example, see Listing [7-38](#A457410_1_En_7_Chapter.html#Par314).


    ```python

    s.Add(2 * x[12] + 30 * x[13] =  x[100])

    ```


    Never use the strict inequalities. For continuous variables, they make no sense;
    for integer variables, they can trivially be changed to the non-strict inequalities
    by adding one. Also remember that we can never use products of decision variables.'
