    \ in must be at most the supply, so\n\n    ![$$ \\sum \\limits_j{x}_{i,j}-\\sum\
    \ \\limits_j{x}_{j,i}\\le {S}_i\\forall \\left\\{i\\in N\\kern0.38em |\\ \\kern0.125em\
    \ {S}_i>0\\right\\} $$](A457410_1_En_4_Chapter_Equj.gif)\n\n    Nothing else needs\
    \ to change because we are minimizing cost and satisfying demands, so we will\
    \ get the optimal solution.\n- The reverse situation is also possible, though\
    \ unlikely, in which case we must treat the demand nodes separately and ensure\
    \ that the flow in less the flow out must be at most the demand value.\n- Another\
    \ simple variation is to have capacities on the arcs, limiting the amount flowing\
    \ through them. In this case, the additional constraints are, assuming a matrix\
    \ of capacity `C`,\n\n    ![$$ {x}_{i,j}\\le {C}_{i,j} $$](A457410_1_En_4_Chapter_Equk.gif)\n\
    \n## 4.4 Shortest Paths\n\nNow let’s consider the problem Google faces every time\
    \ someone asks Google Maps to find a path from point A to point B: the shortest\
    \ path problem (either shortest according to distance or according to time). It\
    \ may surprise the reader that this too can be modeled and solved very efficiently\
    \ as a network flow problem.\n\nHere is the abstracted situation: we are given\
    \ a two-dimensional array of distances between a set of points as exemplified\
    \ by Table [4-8](#A457410_1_En_4_Chapter.html#Tab8). This is called the distance\
    \ matrix. It could be distances in thousands of kilometers between cities if we\
    \ are considering a planetary scale problem or times in minutes between city street\
    \ intersections if we are looking for a bike path taking into consideration the\
    \ path elevation. In addition to the array of distances, we could be given a start\
    \ and an end point but, in their absence, we will assume that the array has been\
    \ ordered so that we need a path from the first point to the last.\n\nThe task\
    \ is to find a sequence of points between the start and the end that minimizes\
    \ the corresponding sum of entries in the array. This is called a shortest path,\
    \ no matter what the units are. Note that we do not say the shortest path as there\
    \ may be many paths with the same shortest total distance. So if we go through\
    \ the sequence 0,3,2,5, for instance, our total distance will be the sum of `M[0,3]\
    \ + M[3,2] + M[2,5]`.\n\n**Table 4-8** Example of a Distance Matrix\n\n|   | P0\
    \ | P1 | P2 | P3 | P4 | P5 | P6 | P7 | P8 | P9 | P10 | P11 | P12 |\n|---|---|---|---|---|---|---|---|---|---|---|---|---|---|\n\
    | P0 |   | 46 | 17 | 24 | 51 |   |   |   |   |   |   |   |   |\n| P1 | 46 |  \
    \ |   |   | 31 | 33 |   | 54 |   |   |   |   |   |\n| P2 |   | 38 |   |   | 34\
    \ | 31 |   |   | 51 |   |   |   |   |\n| P3 | 24 |   |   |   | 33 |   |   | 17\
    \ | 49 | 31 |   |   |   |\n| P4 | 51 |   |   |   |   | 4 |   |   | 18 | 39 | 60\
    \ |   |   |\n| P5 | 48 |   |   |   | 4 |   | 4 | 27 |   | 35 | 57 | 51 |   |\n\
    | P6 |   |   |   | 33 | 1 |   |   |   |   |   | 59 |   |   |\n| P7 |   | 54 |\
    \ 26 |   | 32 | 27 | 31 |   |   | 14 | 42 | 66 |   |\n| P8 |   |   | 51 | 49 |\
    \ 18 | 20 | 17 | 43 |   |   | 57 | 32 |   |\n| P9 |   |   |   |   | 39 | 35 |\
    \   | 14 |   |   | 28 |   |   |\n| P10 |   |   |   |   | 60 |   |   |   |   |\
    \   |   | 58 | 6 |\n| P11 |   |   |   |   |   |   |   |   | 32 | 61 | 58 |   |\
    \ 56 |\n| P12 |   |   |   |   |   |   |   |   | 59 |   |   | 56 |   |\n\n### 4.4.1\
    \ Constructing a Model\n\nWhat we need to decide in this problem is the sequence\
    \ of points to choose to go from start to end. This is a subset of the given points\
    \ (say `P`) along with an order in which to traverse them. It turns out that the\
    \ most efficient approach is to picture a graph with the points as nodes and with\
    \ the distances as weights on the arcs. Choosing a path on the graph will correspond\
    \ to a path on the original map.\n\nAt first glance, this may not seem natural.\
    \ It may not even be clear how to construct a decision variable to hold the subset\
    \ of points and the order in which to visit them. Here is the trick: for each\
    \ arc on the graph we have a decision variable that will take on exactly one of\
    \ two values, either zero if we do not take this arc or one if we do. Therefore,\n\
    \n![$$ {x}_{i,j}\\in \\left[0,1\\right]\\forall i\\in P,\\forall j\\in P $$](A457410_1_En_4_Chapter_Equl.gif)\n\
    \nTo pursue our example path of 0,3,2,5, we will have decision variables `x[0,3]`,\
    \ `x[3,2]`, and `x[2,5]` at value one and all other arc variables at value zero.\
    \ The reader should see the parallel with the other flow problems by thinking\
    \ of a network where all arcs have a capacity of one: an integral solution will\
    \ be a flow of value of one on some sequences of adjacent arcs and zero on all\
    \ others.\n\nThe objective function is correspondingly simple. Assuming that the\
    \ distance matrix is `D`,\n\n![$$ \\min \\kern0.125em \\sum \\limits_i\\sum \\\
    limits_j{D}_{i,j}{x}_{i,j} $$](A457410_1_En_4_Chapter_IEq4.gif),\n\nhow do we\
    \ ensure that we choose a sequence of adjacent arcs from the start point to the\
    \ end point? By modeling this as a unit flow through the graph where the start\
    \ point is a source of value one and the end point is a sink of value one. All\
    \ we need is the usual flow conservation constraints we used previously.\n\nThe\
    \ executable model is seen in Listing [4-4](#A457410_1_En_4_Chapter.html#Par104),\
    \ where we assume a distance matrix `D` with optional starting and ending points.\
    \ We could use our existing code for flow problems but, in this case, as a courtesy\
    \ to the caller, we will write a special-purpose code to help the call and to\
    \ return a meaningful answer. After all, we as modelers are thinking of this problem\
    \ as a flow on a graph, but the caller is thinking of a shortest path! Let’s not\
    \ burden him with our unnatural decision variables. Not to mention that there\
    \ may be a million points, hence a trillion[⁶](#A457410_1_En_4_Chapter.html#Fn6)\
    \ decision variables and yet the solution, from the caller’s perspective, may\
    \ be only a minuscule fraction of those variables.\n\n```\n1   def solve_model(D,Start=None,\
    \ End=None):\n2     s,n = newSolver('Shortestupathuproblem'),len(D)\n3     if\
    \ Start is None:\n4       Start,End = 0,len(D)-1\n5     G = [[s.NumVar(0,1  if\
    \ D[i][j] else  0,\") \\\n6          for j in range(n)] for i in range(n)]\n7\
    \     for i in range(n):\n8       if i == Start:\n9         s.Add(1 == sum(G[Start][j]\
    \ for j in range(n)))\n10         s.Add(0 == sum(G[j][Start] for j in range(n)))\n\
    11     elif i == End:\n12       s.Add(1 == sum(G[j][End] for j in range(n)))\n\
    13       s.Add(0 == sum(G[End][j] for j in range(n)))\n14     else:\n15      \
    \ s.Add(sum(G[i][j] for j in range(n)) ==\n16            sum(G[j][i] for j in\
    \ range(n)))\n17     s.Minimize(s.Sum(G[i][j]*(0 if D[i][j] is None else D[i][j])\
    \ \\\n18                   for i in range(n) for j in range(n)))\n19     rc  =\
    \ s.Solve()\n20     Path,Cost,Cumul,node=[Start],[0],[0],Start\n21     while rc\
    \ == 0 and node != End and len(Path)<n:\n22       next = [i for i in range(n)\
    \ if SolVal(G[node][i]) == 1][0]\n23       Path.append(next)\n24       Cost.append(D[node][next])\n\
    25       Cumul.append(Cumul[-1]+Cost[-1])\n26       node = next\n27     return\
    \ rc,ObjVal(s),Path,Cost,Cumul\n```\n**Listing 4-4** Shortest Path Model (`shortest\
    \ path.py`)"
