    现在让我们考虑一个稍微困难的问题，即著名的 N 皇后问题。这是同样的问题，但要求放置的是皇后而不是车。皇后除了在行和列上攻击外，还在对角线上攻击。我们只需要一种命名对角线的约定和一个提取它们的函数。为了增加趣味性，让我们将
