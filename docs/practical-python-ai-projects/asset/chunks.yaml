- fmt: '### 5.4.2 Variations


    The TSP is one of the most studied combinatorial problems, hence it has a number
    of variations.


    - A simple variation occurring often is that, instead of a tour (a closed path),
    one wants a simple path covering all vertices. For reference, let’s call this
    problem TSP-P. Since we know how to solve the tour problem, the easiest way to
    solve the path problem is to transform the latter into the former. We add another
    node to the network; let’s call it the dummy node. We also add arcs of distance
    zero from the dummy node to every other node on the network. Then we solve the
    TSP on that new network. At optimality we will have a tour going into and out
    of the dummy node. Deleting those two arcs yields the required path. Code to implement
    this variation is shown in Listing [5-8](#A457410_1_En_5_Chapter.html#Par134)
    and the result of running the path model on our example yields Table [5-11](#A457410_1_En_5_Chapter.html#Tab11).


    **Table 5-11** Result of the TSP-P Path Model on Our Example


    | Nodes | 1 | 8 | 7 | 0 | 2 | 5 | 4 | 6 | 3 | 9 |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Distance | 0 | 295 | 350 | 221 | 107 | 264 | 93 | 268 | 101 | 302 |

    | Cumulative | 0 | 295 | 645 | 866 | 973 | 1237 | 1330 | 1598 | 1699 | 2001 |


    ```

    1  def solve_model_p(D):

    2    n,n1 = len(D),len(D)+1

    3    E = [[0 if n in (i,j) else D[i][j] \

    4      for j in range(n1)] for i in range(n1)]

    5    rc,Value,tour = solve_model(E)

    6    i = tour.index(n)

    7    path = [tour[j] for j in range(i+1,n1)]+\

    8          [tour[j] for j in range(i)]

    9    return rc,Value,path

    ```


    **Listing 5-8** Code to Solve the TSP-P Problem (`tsp.py`)


    - A more complex variation is to allow repeated visits to nodes. For reference,
    let’s call this problem as TSP*. The justification for this problem is simple:
    it is conceivable that one could find a shorter overall walk if one is allowed
    to visit any node more than once. Again the trick is to rely on our TSP model
    by transforming TSP* into TSP on a different network. The new network has exactly
    the same nodes, but the distance between the nodes is that of a shortest path
    between nodes of the original network. We must take care to keep track of these
    shortest paths to reconstruct the TSP* solution. Since we already implemented
    an all-pairs shortest paths model (Listing [4-7](#A457410_1_En_4_Chapter.html#Par126)
    in Chapter [4](#A457410_1_En_4_Chapter.html)), we will use it here. Code to implement
    TSP* is shown in Listing [5-9](#A457410_1_En_5_Chapter.html#Par138) and its solution
    on our example is shown in Table [5-12](#A457410_1_En_5_Chapter.html#Tab12) and
    in Figure [5-2](#A457410_1_En_5_Chapter.html#Fig2). Note that the total length
    is less than the TSP length even though it repeats some nodes.


    ![A457410_1_En_5_Fig2_HTML.jpg](A457410_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** TSP* solution


    **Table 5-12** Result of the TSP* Function on Our Example


    | NB 12 | 0 | 2 | 3 | 6 | 9 | 5 | 4 | 5 | 1 | 8 | 7 | 0 |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | ---
    |

    | Total dist 2636 | 0 | 107 | 281 | 93 | 238 | 434 | 93 | 118 | 406 | 295 | 350
    | 221 |


    ```

    1  def solve_model_star(D):

    2    import shortest_path

    3    n = len(D)

    4    Paths, Costs = shortest_path.solve_all_pairs(D)

    5    rc,Value,tour = solve_model(Costs)

    6    Tour=[]

    7    for i in range(len(tour)):

    8      Tour.extend(Paths[tour[i]][tour[(i+1) % len(tour)]][0:-1])

    9    return rc,Value,Tour

    ```


    **Listing 5-9** Code to Solve the TSP* Problem (`tsp.py`)


    **Footnotes**


    [1](#A457410_1_En_5_Chapter.html#Fn1_source) This might be a case, in the words
    of Wigner, of the unreasonable effectiveness of mathematics in the natural sciences;
    or more prosaically, because we mostly solve problems that we know how to solve.


    [2](#A457410_1_En_5_Chapter.html#Fn2_source) There are cases where a binary choice
    -1, 1 would make the model simpler. Alas, no popular integer solver offers that
    option.


    [3](#A457410_1_En_5_Chapter.html#Fn3_source) [`www.coin-or.org`](http://www.coin-or.org)


    [4](#A457410_1_En_5_Chapter.html#Fn4_source) The interested reader should search
    “branch and bound” to start reading about the solution techniques.


    [5](#A457410_1_En_5_Chapter.html#Fn5_source) No other fractions are possible in
    a pure set cover problem for fascinating reasons the reader is encouraged to research
    (keyword search: half-integrality).


    [6](#A457410_1_En_5_Chapter.html#Fn6_source) For the theoretically minded, this
    is a case of dual-degeneracy.


    [7](#A457410_1_En_5_Chapter.html#Fn7_source) The symmetry stems from visualizing
    the search tree and noticing that there are multiple branches with exactly the
    same structure and value.


    [8](#A457410_1_En_5_Chapter.html#Fn8_source) Whether the trace comes back to the
    origin is irrelevant from a complexity standpoint. We can assume a distance zero
    between Vcc and Vee if need be.


    [9](#A457410_1_En_5_Chapter.html#Fn9_source) See [`www.math.uwaterloo.ca/tsp/concorde.html`](http://www.math.uwaterloo.ca/tsp/concorde.html)
    for instance


    # 6. Classic Mixed Models


    This section we will develop models for problems requiring a mix of continuous
    and integral variables, as well as a variety of constraints. Traditionally these
    models have been called mixed integer programs (MIP).[¹](#A457410_1_En_6_Chapter.html#Fn1)


    I will cover a few of the classical problems that require a combination of continuous
    and discrete variables. The prototypical and simplest situation, exhibited by
    facility location, is when we have continuous objects floating around a network,
    but where the existence of the network nodes is subject to an optimizing decision.
    At the other extreme, one of the hardest situations is the job shop scheduling
    problem, where we want to construct a sequence of operations of various machines
    subject to precedence constraints.


    These mixed models vary greatly in difficulty. There is practically no limit to
    the size of problems we can solve in the former instance, yet problems of the
    latter type with a dozen elements will prove, in practice, almost intractable.'
