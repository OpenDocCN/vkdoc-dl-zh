    这种方法适用于小规模实例，但扩展性不佳，读者可以尝试更大的实例来验证这一点。（尝试一个职业联赛规模的问题，然后准备好等待一段时间才能得到解。）问题源于模型可行解空间与整数规划求解器用于寻找最优解的技术之间的相互作用。求解器通常通过固定模型中的部分变量，然后让其他变量取分数解来求解：如此迭代多次。对于我们的模型，这种松弛相当弱。我不会深入探讨原因，但一旦你意识到求解器求解速度很慢，你就会看到如何解决这个问题。关键洞察在于，我们可以轻松地添加更多约束。


    这里有一个例子。想象一个每周只有一场比赛的实例，并考虑三支球队，比如 `i`、`j` 和 `k`。如果在执行过程中的某个时刻允许决策变量取分数值，那么对于给定的周
    `w`，最优解可能满足以下条件：


    ```

    x_{i,j,w} = 1/2   x_{i,k,w} = 1/2   x_{j,k,w} = 1/2

    ```


    请注意，这个解是允许的，因为它满足“每支球队每周一场比赛”的约束，因为


    `x[i,j,w] + x[i,k,w] = 1`，


    `x[i,j,w] + x[j,k,w] = 1`，


    `x[i,k,w] + x[j,k,w] = 1`


    但我们知道这不是一个有效的解，因为这三个变量的总和不能超过一。如果 `i` 和 `j` 对阵，那么 `k` 就不能与它们中的任何一个对阵；对于 `(i, k)`
    和 `(j, k)` 这对组合也是如此。因此，已知每周只有一场比赛，我们可以为每周 `w` 的每三支球队 `i`、`j`、`k` 添加一个约束：


    ```

    x_{i,j,w} + x_{i,k,w} + x_{j,k,w} <= 1

    ```


    请注意，如果变量是整数，这个约束是冗余的。但它仍然是一个有效的约束，并且对于求解器内部处理的分数值很有用。我们还可以考虑四支甚至五支球队的元组，以及每周两场或三场比赛的情况。参见表
    7-15，其中给出了少量球队和每周比赛场次下的界限。请注意，其中许多界限不会被分数解违反，因此对我们的目的来说不太有用。


    **表 7-15** 决策变量小元组之和的界限


    | 球队数量 | 每周比赛场次 | 总和上限 |

    | --- | --- | --- |

    | 3 | 1 | 1 |

    |   | 2 | 3 |

    | 4 | 1 | 2 |

    |   | 2 | 4 |

    |   | 3 | 6 |

    | 5 | 1 | 2 |

    |   | 2 | 5 |

    |   | 3 | 7 |

    |   | 4 | 9 |


    这些额外约束的数量增长很快。因此，这种方法会向模型添加大量约束。如果这导致求解器速度慢到无法接受，另一种方法是我们在求解 TSP 时使用的方法：只添加我们需要的约束。我们将通过求解松弛问题、寻找违反界限的元组并添加它们来实现这一点。这就是代码清单
    7-18 的目的。它展示了如何轻松地向使用 OR-Tools 编写的模型添加松弛收紧约束。

