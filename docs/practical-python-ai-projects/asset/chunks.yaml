    {x}_{2,2}=1\kern16em \wedge {x}_{0,0}+{x}_{0,1}+{x}_{0,2}=1\\ {}{x}_{1,1}=1\Rightarrow
    {x}_{2,1}+{x}_{2,2}=1\kern16em \wedge {x}_{0,0}+{x}_{0,1}=1\\ {}{x}_{1,0}=1\Rightarrow
    {x}_{2,0}+{x}_{2,1}+{x}_{2,2}=1\kern16em \wedge {x}_{0,0}=1\\ {}{x}_{2,2}=1\Rightarrow
    \kern10.25em \ \ {x}_{0,0}+{x}_{0,1}+{x}_{0,2}=1\wedge {x}_{1,0}+{x}_{1,1}+{x}_{1,2}=1\\
    {}{x}_{2,1}=1\Rightarrow \kern16em \ \ {x}_{0,0}+{x}_{0,1}=1\wedge {x}_{1,0}+{x}_{1,1}=1\\
    {}{x}_{2,0}=1\Rightarrow \kern16em \ \ \ \ \ \ \ \ \ \ \ \kern4em {x}_{0,0}=1\wedge
    {x}_{1,0}=1\end{array}} $$](img/A457410_1_En_5_Chapter_Equk.gif)


    稍后您将看到（第 7 章第 7.2.3 节关于具体化）实现这些蕴含关系的一般方法。现在，让我们尝试尽可能简单地实现它们。


    第一个蕴含关系说：“如果包裹 0 被装载到卡车 2 上，那么包裹 1 和 2 也必须被装载到卡车 2 上。”但这是一个边界情况，因为卡车 2 是我们的最后一辆卡车。下一个蕴含关系更有趣：“如果包裹
    0 被装载到卡车 1 上，那么包裹 1 和 2 必须被装载到卡车 1 或 2 上。”


    总的来说，“如果一个包裹被装载到某辆卡车上，那么所有序号更大的包裹必须被装载到序号更大或相等的卡车上。”请注意，约束结构是，如果某个变量取值为 1，我们必须有一个右侧为
    1 的等式成立。右侧为 1 是我们的切入点，因为我们可以将条件变量用作右侧。


    注意不要过度约束模型。考虑第二个蕴含关系的一部分 `x[0,1] = 1 ⇒ x[1,1] + x[1,2] = 1` 以及以下朴素方法。如果我们使用等式，例如


    ![$$ {x}_{1,1}+{x}_{1,2}={x}_{0,1} $$](img/A457410_1_En_5_Chapter_Equl.gif)


    模型很可能会失败，因为如果 `x0,1` 为零（例如，如果包裹 0 被装载到卡车 0 而不是卡车 1），那么我们将阻止包裹 1 被装载到卡车 1 或 2，而这原本是可以接受的解决方案。所以正确的约束是


    ![$$ {x}_{1,1}+{x}_{1,2}\ge {x}_{0,1} $$](img/A457410_1_En_5_Chapter_Equm.gif)


    右侧为零时，约束变得无关紧要，因为左侧的所有变量都是非负的；右侧为一时，它强制将包裹正确分配到编号更高的卡车。用更抽象的术语来说，我们使用不等式是因为我们实现的是逻辑蕴含，而不是逻辑等价（是
    ⇒，而不是 ⇔）。这些约束在模型 5.3 的第 27 行实现。


    蕴含关系的右列可以理解为：“如果包裹 `i` 被装载到卡车 `k` 上，那么所有序号更小的包裹必须被装载到序号更小或相等的卡车上。”这些约束大多是冗余的，但在某些条件下它们可以帮助某些求解器。鼓励读者启用或禁用某些对称性破缺约束并进行实验。


    所有这些额外的约束都减少了搜索空间。对于某些求解器，在某些问题上，这种方法将大幅减少执行时间。通过调用 `solve_model` 并将最后一个参数设置为
