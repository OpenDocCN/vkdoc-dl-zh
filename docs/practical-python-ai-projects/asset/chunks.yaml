    6      s.Add(1 == sum(x[i][j] for j in range(n)))

    7      s.Add(1 == sum(x[j][i] for j in range(n)))

    8      s.Add(0 == x[i][i])

    9    for sub in Subtours:

    10      K = [x[sub[i]][sub[j]]+x[sub[j]][sub[i]]\

    11          for i in range(len(sub)-1) for j in range(i+1,len(sub))]

    12      s.Add(len(sub)-1 >= sum(K))

    13    s.Minimize(s.Sum(x[i][j]*(0 if D[i][j] is None else D[i][j]) \

    14                 for i in range(n) for j in range(n)))

    15    rc = s.Solve()

    16    tours = extract_tours(SolVal(x),n)

    17    return rc,ObjVal(s),tours

    Listing 5-5

    TSP Model with Subtour Elimination Constraints (tsp.py)

    ```


    Line 4 defines the decision variable, a binary indicator of the arcs to take.
    The loop starting at line 5 enforces that there must be an arc in and an arc out
    of every node, exactly as in equations (5.6)-(5.7). We also enforce that all `x[i][i]`
    are zero to avoid loops. For each subtour provided by the caller, we extract all
    arcs of the corresponding clique at line 9 and constrain the sum of them to be
    one less than the number of vertices in the clique. We process the solution returned
    by the solver to extract, at line 16, the subtours and return them to the caller.
    This extraction code is shown in Listing [5-6](#A457410_1_En_5_Chapter.html#Par125).


    ```

    1  def extract_tours(R,n):

    2    node,tours,allnodes = 0,[[0]],[0]+[1]*(n-1)

    3    while sum(allnodes) > 0:

    4      next = [i for i in range(n) if R[node][i]==1][0]

    5      if next not in tours[-1]:

    6        tours[-1].append(next)

    7        node = next

    8      else:

    9        node = allnodes.index(1)

    10        tours.append([node])

    11      allnodes[node] = 0

    12    return tours

    Listing 5-6

    Subtour Extraction

    ```


    The main loop is simple: we iterate until the number of tours returned by the
    solver is one, taking care to accumulate subtours as they are discovered. See
    Listing [5-7](#A457410_1_En_5_Chapter.html#Par127).


    ```

    1  def solve_model(D):

    2    subtours,tours = [],[]

    3    while len(tours) != 1:

    4      rc,Value,tours=solve_model_eliminate(D,subtours)

    5      if rc == 0:

    6        subtours.extend(tours)

    7    return rc,Value,tours[0]

    Listing 5-7

    TSP Model Mainline (tsp.py)

    ```


    The solution to our small example, in Table [5-10](#A457410_1_En_5_Chapter.html#Tab10),
    one iteration per row, illustrates the subtours that were eliminated. In parentheses,
    we see the optimal value, the total length. As we eliminate subtours, it increases,
    of course. A graphical representation is shown in Figure [5-1](#A457410_1_En_5_Chapter.html#Fig1)
    where the subtours eliminated at each iteration are shown in distinct shades.


    ![A457410_1_En_5_Fig1_HTML.jpg](A457410_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Successive (partial) solutions of TSP example


    Table 5-10


    Successive Iterations of the TSP Solver Showing Optimal Values and Subtours


    | Iter (value) | Tour(s) |

    | --- | --- |

    | 0-(2177) | [0, 2]; [1, 7, 8]; [3, 6, 9]; [4, 5] |

    | 1-(2526) | [0, 2, 7]; [1, 8]; [3, 6]; [4, 9, 5] |

    | 2-(2673) | [0, 2, 3, 6, 9, 5, 4, 1, 8, 7] |


    The key idea to take away from the TSP model is not that we can solve gigantic
    instances with it (specialized algorithms will do much better).[⁹](#A457410_1_En_5_Chapter.html#Fn9)
    It is that, even if the number of constraints to completely specify a correct
    model is large, it may be possible to include a very small fraction of the required
    constraints and yet solve the problem to optimality. To do this effectively, one
    must have a deep understanding of the problem and good practical modeling skills
    (and of course, a good modeling language and library, such as Python and OR-Tools).


    As a final note, the reader should be aware that our subtour elimination constraints
    are not the only ones possible. There are a number of ways to eliminate subtours,
    but none are as simple to implement as those we described. In practice, problems
    that have a TSP subproblem embedded in them have a number of other requirements,
    making the model relatively complex. Having a simple yet effective way to deal
    with subtours is a skill required of all modelers.'
  trans: '

    #### 5.4.1.3 约束条件


    在最短路径问题中，当我们进入一个中间节点时，必须确保也能离开该节点。而在此处，我们必须确保形成一条环游路径，即一条覆盖每个顶点恰好一次的单一闭合路径。因此，对于每个顶点，我们必须精确选择一条进入的弧和一条离开的弧，如下所示：


    ![$$ \sum \limits_{j\in P\backslash \left\{i\right\}}{x}_{i,j}=1\forall i\in P
    $$](img/A457410_1_En_5_Chapter_Equ6.gif)


    (5.6) 和


    ![$$ \sum \limits_{j\in P\backslash \left\{i\right\}}{x}_{j,i}=1\forall i\in P
    $$](img/A457410_1_En_5_Chapter_Equ7.gif)


    (5.7)


    现在真正的难点来了：区分旅行商问题（TSP）与最短路径问题。上述两个约束条件是否足够？也许令人惊讶，答案是否定的，它们并不足够。每个顶点都位于某条环游路径上，但可能存在不止一条这样的环游路径。满足上述约束条件后，我们可能会得到一条路径
    0, 1, 3, 4, 0，以及另一条环绕其余顶点的路径。这些有问题的路径被称为子环游（subtours），必须予以消除。消除的关键在于认识到：对于任意严格的节点子集，所选弧的数量必须小于节点数量。例如，为了消除子环游
    0, 1, 3, 4, 0，我们可以添加以下约束：


    `x[0,1] + x[1,0] + x[1,3] + x[3,1] + x[3,4] + x[4,3] + x[4,0] + x[0,4] ≤ 3`。


    添加此约束后，求解器将永远不会在这四个有问题的顶点之间包含超过三条弧，从而防止它们之间形成子环游。另一种理解这类约束的方式是：它强制要求进入某个节点簇的路径必须离开该簇。难点在于存在大量可能的子环游，实际上其数量是指数级的：每个大小大于
    1 的顶点子集都是一个潜在的子环游。


    我们能否添加所有可能的子环游？从编程角度来看，这并不困难，但由此产生的模型会变得笨重，许多求解器的运行速度将慢得无法接受。诀窍在于迭代地改进模型，就像我们在优化非线性函数
    3.1.2.1 时所做的那样。但在这里，我们将利用一次求解器运行的结果来选择要添加到下一次运行中的约束。


    宏观视角：我们首先执行一个不含子环游消除约束的模型。如果求解器返回一条环游路径，则任务完成。如果它返回一组子环游，我们则为每个子环游（且仅针对它们）添加子环游消除约束。最终，所有相关的子环游都被消除，求解器返回整个图的一条环游路径。解释这种方法所花的时间，比通过编写几行代码来实现它要长得多。


    #### 5.4.1.4 可执行模型


    让我们将其转化为可执行代码，并将其分为两部分：第一部分是一个模型，给定某个子环游集合后，它会针对该特定集合添加子环游消除约束并进行优化。参见代码清单 5-5。第二部分是一个主例程，它迭代地调用第一个模型，并在子环游出现时将其添加进去。


    ```

    1  def solve_model_eliminate(D,Subtours=[]):

    2    s,n = newSolver(’TSP’, True),len(D)

    3    x = [[s.IntVar(0,0 if D[i][j] is None else 1,”) \

    4         for j in range(n)] for i in range(n)]

    5    for i in range(n):

    6      s.Add(1 == sum(x[i][j] for j in range(n)))

    7      s.Add(1 == sum(x[j][i] for j in range(n)))

    8      s.Add(0 == x[i][i])

    9    for sub in Subtours:

    10      K = [x[sub[i]][sub[j]]+x[sub[j]][sub[i]]\

    11          for i in range(len(sub)-1) for j in range(i+1,len(sub))]

    12      s.Add(len(sub)-1 >= sum(K))

    13    s.Minimize(s.Sum(x[i][j]*(0 if D[i][j] is None else D[i][j]) \

    14                 for i in range(n) for j in range(n)))

    15    rc = s.Solve()

    16    tours = extract_tours(SolVal(x),n)

    17    return rc,ObjVal(s),tours

    代码清单 5-5

    带子环游消除约束的 TSP 模型 (tsp.py)

    ```


    第 4 行定义了决策变量，即要选取的弧的二元指示符。从第 5 行开始的循环强制执行：每个节点必须有一条进入的弧和一条离开的弧，这与公式(5.6)-(5.7)完全一致。我们还强制所有`x[i][i]`为零，以避免自环。对于调用者提供的每个子环游，我们在第
    9 行提取相应团的所有弧，并约束它们的总和比该团中的顶点数少一。我们处理求解器返回的解，在第 16 行提取子环游并将其返回给调用者。此提取代码如代码清单 5-6
    所示。


    ```

    1  def extract_tours(R,n):

    2    node,tours,allnodes = 0,[[0]],[0]+[1]*(n-1)

    3    while sum(allnodes) > 0:

    4      next = [i for i in range(n) if R[node][i]==1][0]

    5      if next not in tours[-1]:

    6        tours[-1].append(next)

    7        node = next

    8      else:

    9        node = allnodes.index(1)

    10        tours.append([node])

    11      allnodes[node] = 0

    12    return tours

    代码清单 5-6

    子环游提取

    ```


    主循环很简单：我们不断迭代，直到求解器返回的环游路径数量为 1，同时注意在发现子环游时将其累积起来。参见代码清单 5-7。


    ```

    1  def solve_model(D):

    2    subtours,tours = [],[]

    3    while len(tours) != 1:

    4      rc,Value,tours=solve_model_eliminate(D,subtours)

    5      if rc == 0:

    6        subtours.extend(tours)

    7    return rc,Value,tours[0]

    代码清单 5-7

    TSP 模型主程序 (tsp.py)

    ```


    针对我们小示例的求解结果，如表 5-10 所示（每行一次迭代），说明了被消除的子环游。括号内是最优值，即总长度。随着我们消除子环游，该值自然增加。图 5-1
    以图形方式展示了该过程，其中每次迭代消除的子环游以不同的色调显示。


    ![A457410_1_En_5_Fig1_HTML.jpg](img/A457410_1_En_5_Fig1_HTML.jpg)


    **图 5-1** TSP 示例的连续（部分）解


    **表 5-10** TSP 求解器的连续迭代，显示最优值和子环游


    | 迭代（值） | 环游路径 |

    | --- | --- |

    | 0-(2177) | [0, 2]; [1, 7, 8]; [3, 6, 9]; [4, 5] |

    | 1-(2526) | [0, 2, 7]; [1, 8]; [3, 6]; [4, 9, 5] |

    | 2-(2673) | [0, 2, 3, 6, 9, 5, 4, 1, 8, 7] |


    从 TSP 模型中需要领悟的关键思想，并非我们可以用它来解决超大规模实例（专门的算法会做得更好得多）。⁹ 而是，即使完全指定一个正确模型所需的约束数量庞大，我们仍有可能仅包含所需约束中极小的一部分，就能将问题求解至最优。要有效做到这一点，必须对问题有深刻的理解，并具备良好的实践建模技能（当然，还需要一个好的建模语言和库，例如
    Python 和 OR-Tools）。


    最后，读者应注意，我们的子环游消除约束并非唯一可行的方法。消除子环游有多种方式，但没有一种像我们描述的那样易于实现。在实践中，嵌入了 TSP 子问题的问题通常还包含许多其他需求，这使得模型相对复杂。掌握一种简单而有效的处理子环游的方法，是所有建模者必备的技能。

