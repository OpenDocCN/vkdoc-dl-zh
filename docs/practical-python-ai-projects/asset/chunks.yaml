    right\\}\\end{array}} $$](A457410_1_En_5_Chapter_Equo.gif)\n\nwhere y [j] represents\
    \ the decision “Go ahead (or not) with project j.”\n\n## 5.4 TSP\n\nWe now tackle\
    \ the venerable travelling salesman problem (hereafter TSP) . This problem was\
    \ never important for salesmen but it is very important in vehicle routing, electronic\
    \ circuit design, and job sequencing, among other applications. Moreover, it will\
    \ allow me to describe, with a minimum of spurious complexity, an effective and\
    \ reusable modeling technique: adding constraints iteratively.\n\nHere is an example\
    \ situation: at HAL Inc., during the process of a new circuit design, power must\
    \ be routed to each elementary component. These components are set in a two-dimensional\
    \ lattice, potentially all pairwise connected. The best way to feed power to these\
    \ components is to establish a path of minimal total length, conceptually starting\
    \ at the power supply (V [cc] ) , going around to each component, and then coming\
    \ back to the power supply (Vee or ground).[⁸](#A457410_1_En_5_Chapter.html#Fn8)\n\
    \nTherefore, the problem, viewed abstractly, can be stated as “Given a matrix\
