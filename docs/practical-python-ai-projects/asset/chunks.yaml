    | 2 | { 1; 5; 9 } | 3 | { 7; 17; 30 } |

    | 4 | { 10; 23; 23 } | 5 | { 8; 10; 25 } |

    | 6 | { 19; 29; 36 } | 7 | { 3; 4; 17 } |

    | 8 | { 19; 28; 40 } | 9 | { 11; 24; 31 } |

    | 10 | { 18; 30; 33 } | 11 | { 22; 25; 26 } |

    | 12 | { 13; 15; 26 } | 13 | { 21; 27; 28 } |

    | 14 | { 7; 12; 33 } |   |   |


    ### 5.2.1 Constructing a Model


    The model will be constructed in stages.


    #### 5.2.1.1 Decision Variables


    What we need to decide in this problem is very similar to the decision for the
    set cover: which rosters to pick. Again, it’s a yes/no decision, which suggests
    an indicator variable. Let’s assume a set S of crew rosters to declare our indicator
    variables as


    ![$$ {s}_i\in \left\{0,1\right\}\forall i\in S $$](A457410_1_En_5_Chapter_Equd.gif)


    #### 5.2.1.2 Objective


    The simplest objective is to maximize the number of rosters chosen, therefore


    ![$$ \max \kern0.125em \sum \limits_{i\in S}{S}_i $$](A457410_1_En_5_Chapter_Eque.gif)


    Of course, we could also have a variation with a value per roster and maximize
    the total value.


    #### 5.2.1.3 Constraints


    The constraint, and there is only one, is never to pick two rosters including
    the same crew member. Since our decision variables are zero-one, we can simply
    force, for each crew, that the sum of roster variables including the crew under
    consideration is at most one.


    If all crew of roster i are held in Si and the universal set of crew is U, we
    obtain


    ![$$ \sum \limits_{i:j\in {S}_i}{s}_i\le 1\forall j\in u $$](A457410_1_En_5_Chapter_Equf.gif)


    #### 5.2.1.4 Executable Model


    The executable model is seen in Listing [5-2](#A457410_1_En_5_Chapter.html#Par55).
    Very similar to Listing [5-1](#A457410_1_En_5_Chapter.html#Par27), it receives
    a two-dimensional array D with a list of crew rosters, exactly as Table [5-3](#A457410_1_En_5_Chapter.html#Tab3).
    The function will also accept an optional cost array C to attach to each roster.


    ```

    1  def solve_model(D,C=None):

    2    s = newSolver(’SetuPacking’, True)

    3    nbRosters,nbCrew = len(D),max([e for d in D for e in d])+1

    4    S = [s.IntVar(0,1,”) for i in range(nbRosters)]

    5    for j in range(nbCrew):

    6      s.Add(1 >= sum(S[i] for i in range(nbRosters) if j in D[i]))

    7    s.Maximize(s.Sum(S[i]*(1 if C==None else C[i]) \

    8      for i in range(nbRosters)))

    9    rc = s.Solve()

    10    Rosters=[i for i in range(nbRosters)if S[i].SolutionValue()>0]

    11    return rc,s.Objective().Value(),Rosters

    Listing 5-2

    Set Packing Model (set packing.py)

    ```


    A solution for our instance, with no cost array, appears in Table [5-4](#A457410_1_En_5_Chapter.html#Par4).


    Table 5-4


    Optimal Solution to the Set Packing


    ![A457410_1_En_5_Figa_HTML.gif](A457410_1_En_5_Figa_HTML.gif)


    ### 5.2.2 Variations


    A few minor variations.


    *   The main variation is to have a cost on the rosters selected. We then minimize
    the total cost. The code given already implements this possibility.

    *   Another possibility is that we have a combination of set cover and set packing:
    we want to cover entirely the universal set and use each element exactly once.
    In this case, we speak of set partitioning.


    ## 5.3 Bin Packing


    Notwithstanding the familial appearance of set packing and the current problem,
    bin packing , the two problems are antipodal in difficulty. Set cover is the easy
    cousin while set packing is the battle-hardened old aunt. To solve it, we will
    need to go past the obvious natural formulation and dig into a new bag of tools.


    Abstractly, bin packing is the problem of partitioning a set, where each element
    has a weight so that we minimize the number of groups and yet maintain each group
    under a prescribed weight limit.


    To illustrate, shipper VQT Inc. has a number of trucks, each with a maximum weight
    capacity . On a particular morning, they have packages of various weights to transport.
    A simple instance is described in Table [5-5](#A457410_1_En_5_Chapter.html#Tab5).
    The goal is to minimize the number of trucks used to deliver all packages.


    Table 5-5


    Example of Bin Packing


    |   | Truck Weight Limit | 1264 |

    | --- | --- | --- |

    | Number of Packages | Unit weight |

    | --- | --- |

    | 0 | 8 | 258 |

    | 1 | 10 | 478 |

    | 2 | 8 | 399 |

    | Total | 26 | 10036 |


    Note that having only a weight limit is not entirely realistic. Packages also
    have a volume and it is likely that we need to be able to pack according to volume.
    But that problem is considerably more difficult and we will leave it aside. There
    should also be consideration of distances, which we will tackle in a later section
    (see 5.4). To repeat a point worth repeating: few, if any, real-life optimization
    problems are pure and simple textbook problems. They are always a combination
    of multiple problems. A good modeler recognizes this and has the toolset to model
    all.


    ### 5.3.1 Constructing a Model


    The model will be described in stages.


    #### 5.3.1.1 Decision Variables


    What we need to decide is, “Which package goes into which truck?” We know all
    the packages. Although there are many instances of identical packages (identical
    for our purposes, that is, with the same weight), we can give them ordinal numbers.
    But we do not really know the number of trucks.


    That is one of the questions we are trying to answer. Nevertheless, we can certainly
    give an upper bound on the number of trucks by some heuristic. At worst, we can
    say with certainty that we will need at most one truck per package.


    So let’s assume P packages and at most T trucks. Our decision variable is then


    ![$$ {x}_{i,j}\in \left\{0,1\right\}\forall i\in P,j\in T $$](A457410_1_En_5_Chapter_Equg.gif)


    where x [i,j] = 1 will mean that package i goes into truck j.


    This is a good start but we also need to know which of the trucks we will need.
    So another decision variable seems indicated, namely


    ![$$ {y}_j\in \left\{0,1\right\}\forall j\in T $$](A457410_1_En_5_Chapter_Equh.gif)


    where y [j] = 1 will indicate that truck j is to be used. This seems to answer
    all of the questions we need answered.'
  trans: '

    ## 5.2 集合打包


    与集合覆盖问题相对应的镜像问题是集合打包。在这两种问题中，我们都有一个全集和一个子集集合，需要从中选择一些子集。在前者中，我们的目标是用最少的子集覆盖全集，可能某些元素会被覆盖多次。在后者中，目标是尽可能多地选择子集，但每个元素最多只能被选择一次。因此，某些元素可能不会被覆盖。


    为了说明这个问题，我们考虑一个航空公司机组排班的应用。简化来说，假设每架飞机必须配备一名机长、一名副机长、一名领航员和一名乘务长。每个这样的组合称为一个排班表。有些机长可能只能驾驶某些类型的飞机，而不能驾驶其他类型。机长们也可能对副机长有偏好（反之亦然）。从概念上讲，我们可以将飞机/机长/副机长/领航员/乘务长的特定组合视为我们飞机和机组人员全集的一个子集。我们的目标是最大化所选子集的数量，但绝不能选择两个共享元素的子集，因为一名机长不能同时出现在两个地方。表
    5-3 展示了这个问题的一个小实例。


    **表 5-3** 机组排班中的集合打包示例


    | 排班表编号 | 机组人员 ID | 排班表编号 | 机组人员 ID |

    | --- | --- | --- | --- |

    | 0 | { 3; 18; 30 } | 1 | { 4; 4; 36 } |

    | 2 | { 1; 5; 9 } | 3 | { 7; 17; 30 } |

    | 4 | { 10; 23; 23 } | 5 | { 8; 10; 25 } |

    | 6 | { 19; 29; 36 } | 7 | { 3; 4; 17 } |

    | 8 | { 19; 28; 40 } | 9 | { 11; 24; 31 } |

    | 10 | { 18; 30; 33 } | 11 | { 22; 25; 26 } |

    | 12 | { 13; 15; 26 } | 13 | { 21; 27; 28 } |

    | 14 | { 7; 12; 33 } |   |   |


    ### 5.2.1 构建模型


    模型将分阶段构建。


    #### 5.2.1.1 决策变量


    在这个问题中，我们需要做出的决策与集合覆盖问题非常相似：选择哪些排班表。同样，这是一个是/否决策，这暗示了使用指示变量。假设我们有一个机组排班表集合 `S`，将我们的指示变量声明为：


    ```

    s_i ∈ {0,1} ∀ i ∈ S

    ```


    #### 5.2.1.2 目标函数


    最简单的目标是最大化所选排班表的数量，因此：


    ```

    max ∑_{i∈S} S_i

    ```


    当然，我们也可以有一个变体，为每个排班表赋予一个价值，并最大化总价值。


    #### 5.2.1.3 约束条件


    约束条件只有一个，即永远不能选择两个包含同一机组人员的排班表。由于我们的决策变量是 0-1 变量，我们可以简单地强制要求，对于每个机组人员，包含该机组人员的排班表变量之和最多为
    1。


    如果排班表 `i` 的所有机组人员都包含在 `S_i` 中，并且机组人员的全集是 `U`，我们得到：


    ```

    ∑_{i:j∈S_i} s_i ≤ 1 ∀ j ∈ u

    ```


    #### 5.2.1.4 可执行模型


    可执行模型如代码清单 5-2 所示。它与代码清单 5-1 非常相似，接收一个二维数组 `D`，其中包含机组排班表列表，与表 5-3 完全一致。该函数还将接受一个可选的成本数组
    `C`，用于附加到每个排班表。


    ```

    1  def solve_model(D,C=None):

    2    s = newSolver(''SetuPacking'', True)

    3    nbRosters,nbCrew = len(D),max([e for d in D for e in d])+1

    4    S = [s.IntVar(0,1,”) for i in range(nbRosters)]

    5    for j in range(nbCrew):

    6      s.Add(1 >= sum(S[i] for i in range(nbRosters) if j in D[i]))

    7    s.Maximize(s.Sum(S[i]*(1 if C==None else C[i]) \

    8      for i in range(nbRosters)))

    9    rc = s.Solve()

    10    Rosters=[i for i in range(nbRosters)if S[i].SolutionValue()>0]

    11    return rc,s.Objective().Value(),Rosters

    代码清单 5-2

    集合打包模型 (set packing.py)

    ```


    对于我们的实例，在没有成本数组的情况下，一个解出现在表 5-4 中。


    **表 5-4** 集合打包的最优解


    ![A457410_1_En_5_Figa_HTML.gif](img/A457410_1_En_5_Figa_HTML.gif)


    ### 5.2.2 变体


    几个小的变体。


    *   主要的变体是为所选排班表赋予成本。然后我们最小化总成本。给出的代码已经实现了这种可能性。

    *   另一种可能性是结合集合覆盖和集合打包：我们希望完全覆盖全集，并且每个元素恰好使用一次。在这种情况下，我们称之为集合划分。


    ## 5.3 装箱问题


    尽管集合打包和当前问题（装箱问题）在形式上相似，但这两个问题的难度却截然相反。集合覆盖是容易处理的表亲，而集合打包则是久经沙场的老阿姨。为了解决它，我们需要超越显而易见的自然公式，深入挖掘一套新的工具。


    抽象地说，装箱问题是将一个集合进行划分的问题，其中每个元素都有一个重量，我们的目标是使分组数量最小化，同时确保每个分组的重量不超过规定的限制。


    为了说明这一点，运输公司 VQT Inc. 拥有若干辆卡车，每辆都有最大载重能力。在一个特定的早晨，他们有各种重量的包裹需要运输。表 5-5 描述了一个简单的实例。目标是使运送所有包裹所需的卡车数量最小化。


    **表 5-5** 装箱问题示例


    |   | 卡车载重限制 | 1264 |

    | --- | --- | --- |

    | 包裹数量 | 单位重量 |

    | --- | --- |

    | 0 | 8 | 258 |

    | 1 | 10 | 478 |

    | 2 | 8 | 399 |

    | 总计 | 26 | 10036 |


    请注意，仅考虑重量限制并不完全符合现实。包裹也有体积，我们很可能需要能够根据体积进行装箱。但那个问题要困难得多，我们将把它放在一边。还应该考虑距离因素，我们将在后面的章节中处理这个问题（见
    5.4）。值得重复的一点是：现实生活中的优化问题很少（如果有的话）是纯粹而简单的教科书式问题。它们总是多个问题的组合。一个好的建模者能认识到这一点，并拥有建模所有问题的工具集。


    ### 5.3.1 构建模型


    模型将分阶段描述。


    #### 5.3.1.1 决策变量


    我们需要决定的是：“哪个包裹放入哪辆卡车？”我们知道所有包裹。尽管有许多相同的包裹实例（就我们的目的而言，即重量相同），我们可以为它们分配序号。但我们实际上并不知道卡车的数量。


    这正是我们试图回答的问题之一。尽管如此，我们当然可以通过某种启发式方法给出卡车数量的上界。在最坏的情况下，我们可以肯定地说，我们最多需要每辆卡车运送一个包裹。


    因此，假设有 `P` 个包裹，最多有 `T` 辆卡车。那么我们的决策变量是：


    ```

    x_{i,j} ∈ {0,1} ∀ i ∈ P, j ∈ T

    ```


    其中 `x[i,j] = 1` 表示包裹 `i` 放入卡车 `j`。


    这是一个好的开始，但我们还需要知道我们将需要哪些卡车。因此，似乎需要另一个决策变量，即：


    ```

    y_j ∈ {0,1} ∀ j ∈ T

    ```


    其中 `y[j] = 1` 表示卡车 `j` 将被使用。这似乎回答了我们需要回答的所有问题。

