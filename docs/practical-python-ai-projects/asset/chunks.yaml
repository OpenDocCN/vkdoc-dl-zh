    did not specify any. Line 6 defines the decision variable. We apply a little trick
    to the range: we know that if the distance matrix has a zero entry, it means that
    there is no path between two points. In that case, we give a range of [0, 0],
    which forces this variable to be zero. In the other cases, the range will be [0,
    1]. Notice that this range allows fractions but, again because of the structure
    of the constraints in a flow problem, no variable will ever have a fractional
    value. They will all be either 0 or 1.


    At lines 9 and 12 we set the supply to be one at the start node and the demand
    to be one at the end node. At all other nodes (line 16) conservation of flow ensures
    that whatever goes in comes out. This will produce a solution consisting of a
    continuous path from start to end.


    The objective function at line 18 has the same structure as all the flow problem
    examples: the product of the cost (here a distance) with the indicator variable
    of the arc used.


    After we solve the problem , we process the solution to return to the caller something
    smaller, and potentially more meaningful, than our decision variable: a sequence
    of jumps, from point to point, along with the distance of each jump. It is the
    job of the modeler to hide the tricks required to solve a problem and provide
    meaningful solutions to the caller. A solution corresponding to the example above
    is shown in Table [4-9](#A457410_1_En_4_Chapter.html#Tab9).


    Table 4-9


    Optimal Solution to Shortest Path Problem


    | Points | 0 | 3 | 7 | 9 | 10 | 12 |

    | --- | --- | --- | --- | --- | --- | --- |

    | Distance | 0 | 24 | 17 | 14 | 28 | 6 |

