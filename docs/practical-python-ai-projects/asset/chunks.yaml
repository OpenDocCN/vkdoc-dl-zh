- fmt: '一个有用的辅助函数是`sum`，其调用方式如清单[7-39](#A457410_1_En_7_Chapter.html#Par317)所示。


    ```

    s.Sum(LIST)

    Listing 7-39

    Sum Operator in OR-Tools

    ```


    其中`LIST`是任意决策变量列表（或元组）。该函数的用法示例如清单[7-40](#A457410_1_En_7_Chapter.html#Par319)所示。


    ```

    s.Add(s.Sum(x)  <=  100)

    Add(s.Sum(m[i][j] for i in range(M) for j in range(N))<= 100)

    Listing 7-40

    Examples of Sum in OR-Tools

    ```


    除了约束条件外，模型通常还包含目标函数，其形式如清单[7-41](#A457410_1_En_7_Chapter.html#Par321)所示。


    ```

    s.Maximize(EXPR)

    s.Minimize(EXPR)

    Listing 7-41

    Objective Function Declarations in OR-Tools

    ```


    其中`EXPR`是决策变量中的任意线性代数表达式。


    在已创建的模型上调用求解器的方法，请参见清单[7-42](#A457410_1_En_7_Chapter.html#Par324)。


    ```

    rc = s.Solve()

    Listing 7-42

    Solver Invocation in OR-Tools

    ```


    其中`rc`是返回值，如果一切顺利，其值为零。返回值可以是以下之一：


    ```

    OPTIMAL

    FEASIBLE

    INFEASIBLE

    UNBOUNDED

    ABNORMAL

    NOT_SOLVED

    ```


    因此，严格来说，应该将返回值与这些定义的常量进行比较，但谷歌的程序员遵循了数十年的传统：当一切顺利时返回零。[^(17)](#A457410_1_En_7_Chapter.html#Fn17)


    求解后，通过清单[7-43](#A457410_1_En_7_Chapter.html#Par330)中的代码访问最优值和最优解。


    ```

    value = s.Objective().Value()

    varval = var.SolutionValue()

    Listing 7-43

    Optimal Value and Optimal Solution

    ```


    它们被封装在清单[7-44](#A457410_1_En_7_Chapter.html#Par332)所示的辅助函数中。


    ```

    value = ObjVal(s)

    xval = SolVal(x)

    Listing 7-44

    Wrapper Functions for Optimal Value and Solutions

    ```


    返回的变量`xval`将与参数`x`具有相同的维度。


    此外，包装库还提供了以下更高级别的约束，如清单[7-45](#A457410_1_En_7_Chapter.html#Par335)所示。


    ```

    l = k_out_of_n(s,k,x,rel=''=='')

    l = sosn(solver,k,x,rel=''<='')

    delta = reify_force(s,a,x,b,delta=None,rel=''<='',bnds=None)

    delta = reify_raise(s,a,x,b,delta=None,rel=''<='',bnds=None,eps=1)

    delta = reify(s,a,x,b,d=None,rel=''<='',bnds=None,eps=1)

    Listing 7-45

    High-Level Constraints

    ```


    其中：


    *   `k_out_of_n`：向求解器`s`添加必要的约束，使得列表`x`中恰好、至少或至多（取决于`rel`）有`k`（正整数）个变量允许非零。它返回一个与`x`长度相同的二元变量数组`l`。

    *   `sosn`：向求解器`s`添加必要的约束，使得列表`x`中恰好、至少或至多（取决于`rel`）有`k`个相邻变量允许非零。它返回一个与`x`长度相同的二元变量数组`l`。

    *   `reify_force`：向求解器`s`添加必要的约束，使得当`d`（一个二元整数变量）为1时，关系![$$ \sum \limits_i{a}_i{x}_i\approx
    b $$](A457410_1_En_7_Chapter_IEq49.gif)被强制成立（关系![$$ \approx $$](A457410_1_En_7_Chapter_IEq50.gif)由`rel`决定）。此变量`d`无需在调用`reify_force`之前声明。无论该变量是在内部创建还是外部传入，它都会被返回。

    *   `reify_raise`：实现与`force`相反的蕴含关系。

    *   `reify`：同时调用`force`和`raise`来实现“当且仅当”条件。


    它还提供了以下辅助函数。


    接下来是清单[7-46](#A457410_1_En_7_Chapter.html#Par344)。


    ```

    bounds_on_box(a,x,b)

    Listing 7-46

    Bounds Extraction

    ```


    其中`bounds_on_box`在变量`x`的定义域上，找出![$$ \sum {a}_i{x}_i-b $$](A457410_1_En_7_Chapter_IEq51.gif)的最小值和最大值。


    最后一个约束是`all_different`，如清单[7-47](#A457410_1_En_7_Chapter.html#Par347)所示。


    ```

    all_different(s,x)

    Listing 7-47

    All_different Predicate

    ```


    其中`s`是求解器，`x`是整数类型决策变量的集合。所有变量都应具有下界和上界。该约束将强制确保任意两个决策变量的值都不相同。


