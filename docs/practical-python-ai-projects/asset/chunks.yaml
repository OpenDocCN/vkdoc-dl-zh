    # 7. 高级技术


    在本章中，我将介绍优化专家多年来开发的一些技巧，用于调整模型并引导求解器为那些不易符合数学优化严格规则的问题提供解决方案。


    其中一些技术涉及迭代求解一系列部分模型，逐步收敛到我们寻求的解。一些技术涉及创造性地使用多层决策变量，每一层都抽象出更多细节。还有一些技术涉及检查无效模型以获得改进模型的见解。总而言之，这是一袋混杂的珍宝，它们共同点不多，但目标都是解决更复杂的问题。


    最后，我将介绍一系列经典优化器很少考虑、但却是约束编程核心内容的谜题。为了解决这些问题，我们构建了一个小型函数库，该库在简洁地表达这些模型方面被证明非常宝贵，我相信这证明了，只要拥有正确的工具和正确的语言，约束编程的表达能力可以移植到整数规划中。


    ## 7.1 下料问题


    下料问题起源于造纸和纺织行业。典型的造纸厂生产非常大的产品卷（长度和宽度都很大），然后根据客户要求的宽度进行切割。我们将后者称为消费卷。例如，小报印刷机需要
    17 英寸宽的纸卷，而大报印刷机则需要两倍宽度。这些消费卷在印刷后会被裁切成页面尺寸。对于造纸商来说，下料问题就是切割宽幅卷材以满足客户需求，同时最大限度地减少浪费。


    表 7-1 是我们将用于说明模型的一个随机订单实例。第一列是订单中的消费卷数量，第二列是所需的宽度，该宽度已预处理为产品卷宽度的百分比。


    **表 7-1** 下料问题示例


    | 订单 | 卷材数量 | 宽度百分比 |

    | --- | --- | --- |

    | 0 | 6 | 25 |

    | 1 | 12 | 21 |

    | 2 | 7 | 26 |

    | 3 | 3 | 23 |

    | 4 | 8 | 33 |

    | 5 | 2 | 15 |

    | 6 | 2 | 34 |


    我们希望最小化纸张浪费，这实际上意味着最小化使用的产品卷总数。但是，为了进行切割，我们需要更多信息，即给定任何产品卷，应该如何切割？假设我们有一些 21%和
    36%的订单，我们是按 21%、42%、63%和 99%切割（浪费 1%），还是按 36%、72%和 93%切割（浪费 7%）？可能我们需要用第一种模式切割一半的卷材，用第二种模式切割另一半，才能满足所有需求。切割哪些模式以及每种模式切割多少卷是关键问题。参见图
    7-1。


    ![A457410_1_En_7_Fig1_HTML.jpg](img/A457410_1_En_7_Fig1_HTML.jpg)


    **图 7-1** 我们使用哪种模式？


    ### 7.1.1 构建模型


    最初，这个问题是通过指定各种切割模式来解决的，有时是静态的，有时是动态的。这在很大程度上是受当时技术所限。情况已经发生了变化；处理器和求解器都大大加快了速度。此外，一个好的建模者应该首先尝试最简单的方法，并且仅当该方法失败时才使其更复杂。考虑到这一点，我们将把决定切割模式的问题留给求解器。

