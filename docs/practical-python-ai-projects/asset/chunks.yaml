- fmt: '# 3. Hidden Linear Continuous Models


    In this chapter we do violence to some problems to reveal their inner structure.
    The focus is on problems which, at first glance, may not seem to be of the continuous
    linear variety yet can be marshalled into that form with a handful of creative
    alterations. The key is to ensure a one-to-one correspondence between the original
    and the altered problems so that we can retrieve a solution to the original from
    a solution to the alteration.


    The main reason for massaging problems in this way is that continuous linear solvers
    have become so fast that they can handle models with hundreds of thousands of
    variables and constraints. Therefore, if a problem can be modeled in that manner,
    there is little practical limit on the instance size that can be solved. As you
    will see later, this is not the case with more complex models. In fact, we can
    write models with a few dozen variables that no current solver can solve in a
    reasonable time.


    The main obstacles encountered in this chapter are non-linearities of one kind
    or another, but with the advantageous restriction that the functions be considered
    convex. A convex function [¹](#A457410_1_En_3_Chapter.html#Fn1) is one that sits
    “above” any valid linear approximation to it. In one dimension, algebraically,
    `f` is convex at point `x0` if


    ![$$ f\kern0.125em \left({x}_0+h\right)\ge f\kern0.125em \left({x}_0\right)+{f}^{\prime}\kern0.125em
    \left({x}_0\right)h $$](A457410_1_En_3_Chapter_Equa.gif)


    Geometrically, it looks like Figure [3-1](#A457410_1_En_3_Chapter.html#Fig1),
    with a first-order approximation of `f(x) = x²` at `x[0] = 4`. Convexity will
    be the Trojan horse used to beat the non-linearity into submission.


    ![A457410_1_En_3_Fig1_HTML.jpg](A457410_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** Prototypical example of a convex function and a linear approximation


    ## 3.1 Piecewise Linear


    We consider here broken-up linear functions. In the traditional parlance, they
    are piecewise linear. As such, the linear programming solvers we have used up
    to now (`GLPK`, `GLOP`, `CLP`) cannot handle them directly, but a little coding
    on our part will morph them into a standard form that all solvers can handle.
    This is one of the good reasons to code models in Python instead of the specialized
    modeling languages.


    As first example, to illustrate the technique without any side issue that might
    hide the essence, let’s consider a piecewise function defined as


    ![$$ f\kern0.125em (x)=\Big\{{\displaystyle \begin{array}{l}{C}_1x\kern12.25em
    \ \ \kern0.28em \ \kern0.28em \ \kern0.125em \ \kern0.41em 0\le x\le {B}_1,\\
    {}{C}_1{B}_1+{C}_2\left(x-{B}_1\right)\kern6em \ \kern0.28em \ \kern0.67em {B}_1\le
    x\le {B}_2,\\ {}{C}_1{B}_1+{C}_2\kern0.125em \left({B}_2-{B}_1\right)+{C}_3\kern0.125em
    \left(x-{B}_2\right)\ \ {B}_2\le x\le {B}_3,\\ {}\dots \end{array}} $$](A457410_1_En_3_Chapter_Equ1.gif)


    (3.1)


    We can think of this function as a shipping cost function with additional penalties
    for weights; that is, the more product we ship, the more expensive each unit is.
    Table [3-1](#A457410_1_En_3_Chapter.html#Tab1) (and Figure [3-2](#A457410_1_En_3_Chapter.html#Fig2))
    represent an instance of this simple function where the first two columns bracket
    the quantities (`B[i]`, `B[i+1]`) for which the third column is the unit cost,
    `c[i]`.


    We will illustrate the approach by minimizing this function subject to a simple
    bound on the quantity.


    **Table 3-1** Example of Piecewise Function


    | (From | To] | Unit Cost | (Total cost | Total cost] |

    | --- | --- | --- | --- | --- |

    | 0 | 148 | 24 | 0 | 3552 |

    | 148 | 310 | 28 | 3552 | 8088 |

    | 310 | 501 | 32 | 8088 | 14200 |

    | 501 | 617 | 34 | 14200 | 18144 |

    | 617 | 762 | 36 | 18144 | 23364 |

    | 762 | 959 | 40 | 23364 | 31244 |


    ### 3.1.1 Constructing a Model


    What we need to decide in this problem is simply the quantity to produce. We can
    define a decision variable with bounds from 0 to the last quantity in the table
    as


    ![$$ x\in \left[0,{B}_n\right] $$](A457410_1_En_3_Chapter_Equb.gif)


    ![A457410_1_En_3_Fig2_HTML.jpg](A457410_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** Piecewise convex cost function


    But the quantity we decide on will affect the objective function, therefore we
    need to know in which bracket we end up, and where on that bracket. Here is the
    key trick: we introduce additional variables, one for each break-point in the
    function. Assuming that we have `n` brackets, conceptually we consider these variables
    as weights on the bracket boundaries, telling us where we are in the bracket.
    We want at most two consecutive variables to be non-zero, with their sum to be
    one. This will tell us where `x` lies and, consequently, what is the objective
    function value.


    ![$$ {\delta}_i\in \left[0,1\right]\forall i\in \left\{0,\dots, n\right\} $$](A457410_1_En_3_Chapter_Equc.gif)


    For example, if `δ[2] = 1/4` and `δ[3] = 3/4` we know that we are in the third
    bracket, one quarter of the way and that `x = δ[2] * B[2] + δ[3] * B[3]`.


    #### 3.1.1.1 Constraints


    We will enforce that the `δ` sum be one, and, by the convex structure of the problem,
    at most two, adjacent `δ` will be non-zero. This will tell us which bracket and
    where in the bracket. To do this we add the constraint


    ![$$ \sum \limits_i{\delta}_i=1 $$](A457410_1_En_3_Chapter_Equd.gif)


    We deduce the value of the decision variable by


    ![$$ x=\sum \limits_i{\delta}_i{B}_i $$](A457410_1_En_3_Chapter_Equ2.gif)


    (3.2)


    Note that this `x` variable and its associated constraint play no role in the
    optimization model. For the solver, the `δ` is the real decision variable and
    the `x` is simply a translation into the language of the original problem. This
    is the key.


    #### 3.1.1.2 Objective


    The objective function is linear within a bracket; therefore we sum over all brackets:


    ![$$ \min \kern0.125em \sum \limits_{i=1}^n{\delta}_i\kern0.125em \sum \limits_{j=1}^i\left({B}_j-{B}_{j-1}\right)\times
    {C}_{j-1} $$](A457410_1_En_3_Chapter_Eque.gif)


    We must stress here that the transformation trick only works because of the structure
    of this objective function. It is convex. Had it been concave, the problem would
    not have been solvable by a linear programming solver. You will see in Chapter
    [7](#A457410_1_En_7_Chapter.html) (Section 7.2) how to use an integer programming
    solver to handle this more difficult case.'
