- fmt: "### 1.2.2 A Note on Notation\n\nThroughout the book, I will describe algebraic\
    \ models. These models can be represented in a number of ways. I will use two.\
    \ I will sketch each model using common mathematical notation typeset with T[E]X\
    \ in math mode. I will then express the complete, detailed model in executable\
    \ Python code. The reader should have no problem seeing the equivalence between\
    \ the formulations. Table [1-1](#A457410_1_En_1_Chapter.html#Tab1) illustrates\
    \ some of the equivalencies.\n\n**Table 1-1** Equivalence of Expression in Math\
    \ and Python Modes\n\n| Object | Math Mode | Python Mode |\n| --- | --- | ---\
    \ |\n| Scalar Variable | X | `X` |\n| Vector | v [i] | `v[i]` |\n| Matrix | M\
    \ [ij] | `M[i][j]` |\n| Inequality | x + y ≤ 10 | `x+y <= 10` |\n| Summation |\
    \ ![$$ \\sum \\limits_{i=0}^9\\ {x}_i $$](A457410_1_En_1_Chapter_IEq1.gif) | `sum(x[i]\
    \ for i in range(10))` |\n| Set Definition | {i ² &#124; i ∈ [0, 1, . . ., 9]}\
    \ | `[i**2 for i in range(10)]` |\n\n## 1.3 Getting Our Feet Wet: Amphibian Coexistence\n\
    \nThe simplest problems are similar to those first encountered in high school:\
    \ the dreaded word problems. They are algebraic in nature; that is, they can be\
    \ formulated and sometimes solved using the simple tools of elementary linear\
    \ algebra. Let’s consider here one such problem to illustrate the approach to\
    \ modeling and define some fundamental concepts.\n\nA zoo biologist will place\
    \ three species of amphibians (a toad, a salamander, and a caecilian) in an aquarium\
    \ where they will feed on three different small preys: worms, crickets, and flies.\
    \ Each day 1,500 worms, 3,000 crickets, and 5,500 flies will be placed in the\
    \ aquarium. Each amphibian consumes a certain number of preys per day. Table [1-2](#A457410_1_En_1_Chapter.html#Tab2)\
    \ summarizes the relevant data.\n\n**Table 1-2** Number of Preys Consumed by Each\
    \ Species of Amphibian\n\n| Food | Toad | Salamander | Caecilian | Available |\n\
    | --- | --- | --- | --- | --- |\n| Worms | 2 | 1 | 1 | 1500 |\n| Crickets | 1\
    \ | 3 | 2 | 3000 |\n| Flies | 1 | 2 | 3 | 5000 |\n\nThe biologist wants to know\
    \ how many amphibians, up to 1,000 of each species, can coexist in the aquarium\
    \ assuming that food is the only relevant constraint.\n\nHow to we model this\
    \ problem? All optimization and feasibility problems in this book are modeled\
    \ using a three-step approach. We will expand on this approach as we encounter\
    \ problems on increasing complexity, but the fundamental three steps remain the\
    \ cornerstone of a good model.\n\n1.  **Identify the question to answer.** This\
    \ identification should take the form of a precise sentence involving either counting\
    \ or valuating one or more objects. In this case, how many amphibians each species\
    \ can coexist in the aquarium? Notice that “How many amphibians?” would not be\
    \ precise enough because we are not interested in the total count, but rather\
    \ in the count of each species. Formulating a precise question is often the hardest\
    \ part. Once we have this precise question, we assign a variable to each of the\
    \ objects to count. We will use `x[0]`, `x[1]`, and `x[2]`. These are traditionally\
    \ known as **decision variables**. The expression is a misnomer in our first example\
    \ but reflects the origins of optimization problems in logistics where the decision\
    \ variables were indeed representative of quantities under the control of the\
    \ modeler and mapped to planning decisions.\n\n2.  **Identify all requirements\
    \ and translate them into constraints.** The constraints, as you will see throughout\
    \ the book, can take on a multitude of forms. In this simple problem, they are\
    \ algebraic, linear inequalities. It is often best to write down each requirement\
    \ in a precise sentence before translating it into a constraint. For the coexistence\
    \ case, the requirements, in words, are:\n    *   All amphibians combined consume\
    \ 1,500 worms.\n    *   All amphibians combined consume 3,000 crickets.\n    *\
    \   All amphibians combined consume 5,000 flies.\n\n    Note that a statement\
    \ starting with “The amount of …” may not be precise enough. In our simple case,\
    \ there are no specified units but there could be. For instance, the amount consumed\
    \ could be stated in grams while the availability is in kilograms. This happens\
    \ often and is the cause of many a model going awry. Yet, even with our seemingly\
    \ precise statements, there is an ambiguity left to consider. It is one of the\
    \ main contributions of a good modeler to highlight ambiguity and clarify problem\
    \ statements. Here, do we mean that the amphibians will consume exactly the amounts\
    \ stated, or that they will consume at most the amounts stated?[⁶](#A457410_1_En_1_Chapter.html#Fn6)\
    \ We will assume that “at most” is the proper form of the requirement, both because\
    \ it is more interesting and, in a sense, subsumes the “equal” question. We will\
    \ then translate these requirements into algebraic constraints based on our decision\
    \ variables. Let’s consider worms. The toads eat two per day. The salamanders\
    \ and caecilians each eat one. Since we decided on `x[0]` toads, `x[1]` salamanders,\
    \ and `x[2]` caecilians, the total number of worms consumed will be bounded by\
    \ the following inequality:\n\n    ```\n    2*x[0] + x[1] + x[2] <= 1500\n   \
    \ ```\n\n    (1.1) Had we decided that “equal to” was the proper constraint, we\
    \ would replace the inequality by an equality. Consider now crickets. Toads consume\
    \ one per day while salamanders consume three and caecilians consume two. They\
    \ will collectively consume `x[0] + 3*x[1] + 2*x[2]` and we obtain the constraint\n\
    \n    ```\n    x[0] + 3*x[1] + 2*x[2] <= 3000\n    ```\n\n    (1.2) The constraint\
    \ on flies is obtained similarly to produce\n\n    ```\n    x[0] + 2*x[1] + 3*x[2]\
    \ <= 5000\n    ```\n\n    (1.3)\n\n3.  **Identify the objective to optimize.**\
    \ The objective is, in the case of an optimization problem, what we want to maximize\
    \ (or minimize). In the case of a feasibility problem, there is no objective,\
    \ but in practice, most feasibility problems are really optimization problems\
    \ that have been incompletely formulated. Since the problem is stated as “How\
    \ many amphibians of each species can coexist?”, a possible, even likely, reading\
    \ is that we want the maximum number of amphibians. (The minimum number is zero\
    \ and is an example of the uninteresting trivial solution.) In terms of our decision\
    \ variables, we want to maximize the sum and obtain\n\n    ```\n    max x[0] +\
    \ x[1] + x[2]\n    ```\n\n    (1.4)"
