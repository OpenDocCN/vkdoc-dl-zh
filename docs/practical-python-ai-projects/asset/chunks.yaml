  trans: "\n#### 3.2.1.2 约束条件\n\n现在我们需要表达这些偏差。我们得到一组数据对 (`t¯[i]`, `f¯`)，表示在时间 `t¯[i]`\
    \ 对假设函数 `f` 的测量值。因此，特定数据对的偏差为：\n\n![$$ {e}_i=\\mid {a}_0+{a}_1\\overline{t_i}+{a}_2{\\\
    overline{t_i}}²+\\dots +{a}_k{\\overline{t_i}}^k-\\overline{f_i}\\mid $$](img/A457410_1_En_3_Chapter_Equl.gif)\n\
    \n也就是说，偏差是实验值 `f¯[i]` 与理论位移 `f(t¯[i])` 之差的绝对值，其中理论位移是通过在时间 `t¯[i]` 处计算函数得到的。为什么取绝对值？因为偏差可能为正也可能为负，而我们只关心其大小。\n\
    \n用不等式来表达，我们打算写出形如 `|f(t¯[i]) − f¯| <= e` 的约束，但这并非线性。处理这种情况至少有兩種不同的方法。使用哪种方法取决于我们希望从模型解中提取什么信息。\n\
    \n1. **将不等式加倍并约束偏差。** 考虑绝对值的定义。如果 `a` 为正，则 `|a| = a`；如果为负，则 `|a| = −a`。因此，这建议将不等式\
    \ `|e[i]| <= e` 替换为两个不等式：\n\n    ![$$ {\\displaystyle \\begin{array}{l}\\mid f\\\
    left({t}_i\\right)-\\overline{f_i}\\mid <=e,\\\\ {}\\mid -f\\left({\\overline{t}}_i\\\
    right)+\\overline{f_i}\\mid <=e.\\end{array}} $$](img/A457410_1_En_3_Chapter_Equm.gif)\n\
    \n    这是一种可行的方法。\n\n2. **将变量加倍并找出每个偏差。** 请注意，“将不等式加倍”的方法不会找出每个点的偏差。我们只是对所有偏差施加了一个界限，并最小化这个界限。如果我们想知道每个偏差的值，例如，为了最小化它们的总和，该怎么办？\n\
    \n找出每个偏差值的一种方法是为每个点 (`t¯[i]`, `f¯[i]`) 引入两个非负变量。我们将它们称为 `u[i]` 和 `v[i]`，并引入以下等式：\n\
    \n![$$ f\\left({t}_i\\right)-{u}_i+{v}_i=\\overline{f_i} $$](img/A457410_1_En_3_Chapter_Equ3.gif)\n\
    \n(3.3)\n\n请注意，由于新变量是非负的，每个等式中只有一个变量会非零。该变量将等于偏差（即实验点与理论点之间的差值）。\n\n这种“将变量加倍”的方法在某种程度上更通用。如果我们想最小化偏差的总和，我们就最小化所有\
    \ `u[i]` 和 `v[i]` 的总和。如果我们想最小化最大偏差，我们添加不等式：\n\n![$$ {\\displaystyle \\begin{array}{l}{u}_i\\\
    le e,\\\\ {}{v}_i\\le e,\\end{array}} $$](img/A457410_1_En_3_Chapter_Equn.gif)\n\
    \n并最小化 `e`。\n\n#### 3.2.1.3 可执行模型\n\n让我们将其转换为清单 3-3 中所示的可执行模型。假设我们以元组数组 (`t¯[i]`,\
    \ `f¯[i]`) 的形式获取数据，命名为 `D`，同时获取所需多项式的次数以及要最小化的距离指标（0 表示总和，1 表示最大值）。\n\n```\n1\
    \   def solve_model(D,deg=1,objective=0):\n2     s,n = newSolver('Polynomialufitting'),len(D)\n\
    3     b = s.infinity()\n4     a = [s.NumVar(-b,b,'a[%i]' % i) for i in range(1+deg)]\n\
    5     u = [s.NumVar(0,b,'u[%i]' %  i) for i in range(n)]\n6     v = [s.NumVar(0,b,'v[%i]'\
    \ % i) for i in range(n)]\n7     e = s.NumVar(0,b,'e')\n8     for i in range(n):\n\
    9       s.Add(D[i][1]==u[i]-v[i]+sum(a[j]*D[i][0]**j \\\n10                  \
    \            for j in range(1+deg)))\n11     for i in range(n):\n12       s.Add(u[i]\
    \  <=  e)\n13       s.Add(v[i]  <=  e)\n14     if objective:\n15       Cost =\
    \ e\n16     else:\n17       Cost = sum(u[i]+v[i] for i in range(n))\n18     s.Minimize(Cost)\n\
    19     rc  = s.Solve()\n20     return  rc,ObjVal(s),SolVal(a)\n清单 3-3\n多项式曲线拟合模型\
    \ (curve fit.py)\n```\n\n第 4 行定义了实数决策变量，即多项式的系数。由于我们不容易对系数设置界限，因此我们使用无穷大。第 5 行和第\
    \ 6 行定义了数据点与相应理论值之间的偏差。这用于第 8 行，对应于 (3.3)。然后我们在第 11 行通过第 7 行定义的最大误差变量来约束偏差。\n\n\
    最后一个要素是目标函数的选择。用户可以选择在第 15 行最小化最大偏差，或在第 17 行最小化偏差的总和。这些结果分别显示在表 3-9 的 `e[i]^(max)`\
    \ 和 `e[i]^(sum)` 标题下。\n\n**表 3-9** 曲线拟合问题的最优解\n\n| `t[i]` | `f[i]` | `fsum` |\
    \ `e[i]^(sum)` | `fmax` | `e[i]^(max)` |\n| --- | --- | --- | --- | --- | ---\
    \ |\n| 0.1584 | 0.0946 | -0.4382 | 0.5328 | -12.4063 | 12.5008 |\n| 0.8454 | 0.2689\
    \ | 0.3421 | 0.0731 | -8.3251 | 8.594 |\n| 2.1017 | 5.8285 | 5.8285 | 0.0 | 2.0924\
    \ | 3.7362 |\n| 3.1966 | 14.8898 | 14.8898 | 0.0 | 14.285 | 0.6047 |\n| 4.056\
    \ | 25.6134 | 24.7951 | 0.8184 | 25.8879 | 0.2744 |\n| 4.9931 | 38.3952 | 38.3952\
    \ | 0.0 | 40.5766 | 2.1814 |\n| 5.8574 | 43.5065 | 53.5269 | 10.0204 | 56.0073\
    \ | 12.5008 |\n| 7.1474 | 91.3715 | 80.7311 | 10.6403 | 82.3995 | 8.972 |\n| 8.1859\
    \ | 119.075 | 106.6547 | 12.4203 | 106.5742 | 12.5008 |\n| 9.0349 | 115.7737 |\
    \ 130.5102 | 14.7365 | 128.2745 | 12.5008 |\n\n数据点以及两种解（一种用于最小化最大偏差，另一种用于最小化偏差总和）都显示在图\
    \ 3-5 中。\n\n![A457410_1_En_3_Fig5_HTML.jpg](img/A457410_1_En_3_Fig5_HTML.jpg)\n\
    \n**图 3-5** 数据与拟合曲线\n\n### 3.2.2 变体\n\n上面的示例是实践中非常有用的技术的一个特例，即所谓的软约束处理。我们常常希望某个等式能够成立，但知道它不太可能成立。这样的例子比比皆是。这里有一个：构建一个排课系统模型来生成学校的学生课表。在智能方式中，我们收集所有学生的选课及其可用日期（我周五必须工作，所以那天不能上课。或者，我上夜班；我只需要白天的课程）。根据所有这些数据，我们希望构建对所有学生都适用的课表。\n\
    \n不幸的是，一个能满足所有请求的课表很可能不可行。我们最多只能期望满足尽可能多的学生请求。这些就变成了软约束，其处理技术与上述类似：我们引入新变量（如上面的\
    \ `u[i]` 和 `v[i]`）来衡量与理想状态的距离（未满足请求的学生数量），并最小化这些变量的总和。\n\n因此，如果我们旨在满足，例如：\n\n\
    `a[1]x[1] + a[2]x[2] + … + a[n]x[n] = b`。\n\n但我们知道这不太可能，所以我们将其改为：\n\n`a[1]x[i]\
    \ + a[i]x[2] + … + a[n]x[n] + u − v = b`，\n\n其中 `u` 和 `v` 是非负的。然后我们将 `(u + v)`\
    \ 添加到目标函数中（假设这是一个最小化问题）。\n\n请注意，如果我们已经知道左侧相对于右侧总是要么过高要么过低，那么我们可能只需要 `u` 和 `v`\
    \ 中的一个。只有当偏差可能出现在两个方向时，我们才需要两者，就像我们的曲线拟合示例那样。\n"
- fmt: "### 3.3 Pattern Classification Revisited\n\nRecall the classification model\
    \ from Section 2.5 in Chapter [2](#A457410_1_En_2_Chapter.html): given two sets\
    \ of data points, benign and malignant cells identified by an expert, we obtained\
    \ a separating hyperplane that could afterwards be used to mimic the expert by\
    \ classifying new data into one or the other set. One weakness of our initial\
    \ approach was that we would not necessarily find the “best” hyperplane by any\
    \ definition. We stopped as soon as we got one. The result of our first attempt\
    \ is illustrated in Figure [3-6](#A457410_1_En_3_Chapter.html#Fig6) where one\
    \ malignant cell is located exactly on the separating hyperplane. It could just\
    \ as well have been a benign cell.\n\n![A457410_1_En_3_Fig6_HTML.jpg](A457410_1_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6\n\nData and separation maximizing margins\n\nPeople in classification\
    \ therefore tend to prefer a hyperplane that would maximally separate the two\
    \ sets; that is, one that is equally distant from one set as from the other. This\
    \ might minimize misclassification later on, assuming that the training set was\
    \ well chosen.\n\nOne way to achieve this maximal separation is to maximize the\
    \ minimum distance from the training set to the separating hyperplane. This is\
    \ known as maximizing the margins and we now have the tools to perform this maximization.\
    \ Let’s assume that we have run our previous classification model and we know\
    \ that the two sets are separable by hyperplane `∑ a_j x_j = a_0`. Now we want\
    \ the best such separation.\n\nHow does one compute the distance of a point `x¯`\
    \ to hyperplane `∑ a_j x_j = a_0`? By the formula\n\n`|∑ a_j x¯_j - a_0| / √(∑\
    \ a_j²)`\n\nSince we intend to maximize the minimum of this value over all data\
    \ points yet have no need for the actual value, the denominator is irrelevant\
    \ and we might as well simply consider the numerator, a fortuitous condition as\
    \ we cannot yet handle general nonlinear functions. This numerator is an absolute\
    \ value. We will therefore use the double positive variable trick and introduce\
    \ for each data point `x¯` a triplet of constraints\n\n```\n∑ a_j x¯_j - u + l\
    \ = a_0\n    e <= u\n    e <= l\n```\n\nwhere the first constraints will force\
    \ either `u` or `l` to measure the value of the numerator in the distance formula.\
    \ The two inequalities will have the variable `e` lower bound both. We then only\
    \ have to maximize the value of `e` to achieve our goal.\n\n### 3.3.1 Executable\
    \ Model\n\nThe translation into an executable model is shown in Listing [3-4](#A457410_1_En_3_Chapter.html#Par87).\
    \ Lines 4 to 7 define the new positive variables to hold the distance from each\
    \ data point to the separating hyperplane. Line 8 is the same as before, the coefficient\
    \ of the hyperplane we are searching for. The rest of the model is identical to\
    \ our previous classification model with the addition of three lines at 12 and\
    \ at 17 fixing the distance constraint and establishing the lower bound `e` on\
    \ them. The objective function is now to force this lower bound upward, maximizing\
    \ the minimum distance.\n\n```\n1   def solve_margins_classification(A,B):\n2\
    \     n,ma,mb=len(A[0]),len(A),len(B)\n3     s = newSolver('Classification')\n\
    4     ua = [s.NumVar(0,99,\") for _ in range(ma)]\n5     la = [s.NumVar(0,99,\"\
    ) for _ in range(ma)]\n6     ub = [s.NumVar(0,99,\") for _ in range(mb)]\n7  \
    \   lb = [s.NumVar(0,99,\") for _ in range(mb)]\n8     a = [s.NumVar(-99,99,\"\
    ) for _ in range(n+1)]\n9     e = s.NumVar(-99,99,\")\n10     for i in range(ma):\n\
    11       s.Add(0 >= a[n]+1-s.Sum(a[j]*A[i][j] for j in range(n)))\n12       s.Add(a[n]==s.Sum(a[j]*A[i][j]-ua[i]+la[i]for\
    \ j in range(n)))\n13       s.Add(e = s.Sum(a[j]*B[i][j] for j in range(n))-a[n]+1\
    \ )\n17       s.Add(a[n]==s.Sum(a[j]*B[i][j]-ub[i]+lb[i]for j in range(n)))\n\
    18       s.Add(e <= ub[i])\n19       s.Add(e <= lb[i])\n20     s.Maximize(e)\n\
    21     rc  = s.Solve()\n22     return  rc,SolVal(a)\nListing 3-4\nMaximizing the\
    \ Margins (margins.py)\n```\n\nThe result, on the same data set as in Section\
    \ 2.5, shows the new and improved separating hyperplane, equidistant from the\
    \ closest points both in the malignant set and the benign set, which is as good\
    \ a separation as we can hope for. But beware: this is only as good as the training\
    \ set. If this set was biased in any way, the separation will be just as biased.\n\
    \nFootnotes [1](#A457410_1_En_3_Chapter.html#Fn1_source)\n\nAll research mathematicians\
    \ agree on the labels “convex” and its opposite, “concave,” but textbook authors\
    \ for high schools in the US, ignoring thousands of papers, journals, and research\
    \ monographs, insist on “concave up” and “concave down.”\n\n[2](#A457410_1_En_3_Chapter.html#Fn2_source)\n\
    \nThe expression “regression” comes from Francis Galton’s original paper about\
    \ “Re-gression towards mediocrity” and shadows rather than highlights the technique.\
    \ As for “parameter,” what, pray tell, is not a parameter?\n\n[3](#A457410_1_En_3_Chapter.html#Fn3_source)\n\
    \nCarl Friedrich Gauss, Theoria Combinationis Observationum Erroribus Minimis\
    \ Obnoxiae (Theory of the Combination of Observations Least Subject to Errors)\
    \ (Philadelphia, PA: Society for Industrial and Applied Mathematics, 1987).\n\n\
    # 4. Linear Network Models\n\nSix degrees of separation!\n\nThis meme and the\
    \ play, movies, and games it generated did more to introduce elements of network\
    \ theory to the general public than years of public education. Movie buffs play\
    \ the Kevin Bacon Game, trying to link two actors through movies in which they\
    \ appeared with Kevin Bacon. Mathematicians proudly announce their Erdös number\
    \ (when they have one), the number of co-written papers away they stand from a\
    \ paper co-written with the famous Paul Erdös.[¹](#A457410_1_En_4_Chapter.html#Fn1)\
    \ Throughout this chapter networks play an essential role in visualizing a problem.\n\
    \nA network is an object composed of nodes (people, in our examples) and arcs\
    \ (indicating the presence of a relationship). It is a tool mathematicians invented\
    \ hundreds of years ago to help model situations[²](#A457410_1_En_4_Chapter.html#Fn2)\
    \ and solve problems. We will use networks to help us construct optimization models.\
    \ In a sense, we are doing meta-modeling.\n\nNetwork-based optimization models\
    \ often share, along with the structural description, an interesting characteristic:\
    \ if the input data are all integers, then there is an integral optimal solution.\
    \ Moreover, the solver will find it. This is a useful property as it allows for\
    \ modeling of countable items (people, trucks, data packets) as well as measurable\
    \ items (money, time, water).\n\nIt is important to realize the importance of\
    \ integrality in modeling. Let’s imagine a complex problem involving the flight\
    \ of a space shuttle. The constraints involve weight, amount of fuel, amount of\
    \ oxygen, work to do while in orbit, etc. There are thousands, maybe hundreds\
    \ of thousands, of variables and constraints. If such a problem asks “How many\
    \ astronauts can be carried in the shuttle?” it is unlikely that NASA (or SpaceX)\
    \ would accept “Two and a half astronauts” as the optimal answer.\n\nCrucially,\
    \ we must dispense with the tempting but wrong work-around: rounding. It is rarely\
    \ the case that rounding helps. If we round a fractional solution, many (maybe\
    \ even all) constraints might be violated. Round up the solution of our space\
    \ shuttle instance and the weight constraint might prevent lift-off; round down\
    \ and the astronauts may fail to accomplish all the required tasks. To be fair,\
    \ there are problems where rounding is acceptable, but those are either boring,\
    \ or the solution is obvious, or both."
  raw: '## 3.3 Pattern Classification Revisited


    Recall the classification model from Section 2.5 in Chapter [2](#A457410_1_En_2_Chapter.html):
    given two sets of data points, benign and malignant cells identified by an expert,
    we obtained a separating hyperplane that could afterwards be used to mimic the
    expert by classifying new data into one or the other set. One weakness of our
    initial approach was that we would not necessarily find the “best” hyperplane
    by any definition. We stopped as soon as we got one. The result of our first attempt
    is illustrated in Figure [3-6](#A457410_1_En_3_Chapter.html#Fig6) where one malignant
    cell is located exactly on the separating hyperplane. It could just as well have
    been a benign cell.


    ![A457410_1_En_3_Fig6_HTML.jpg](A457410_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Data and separation maximizing margins


    People in classification therefore tend to prefer a hyperplane that would maximally
    separate the two sets; that is, one that is equally distant from one set as from
    the other. This might minimize misclassification later on, assuming that the training
    set was well chosen.


    One way to achieve this maximal separation is to maximize the minimum distance
    from the training set to the separating hyperplane. This is known as maximizing
    the margins and we now have the tools to perform this maximization. Let’s assume
    that we have run our previous classification model and we know that the two sets
    are separable by hyperplane ![$$ \sum {a}_j{x}_j={a}_0 $$](A457410_1_En_3_Chapter_IEq3.gif).
    Now we want the best such separation.


    How does one compute the distance of a point x¯ to hyperplane ![$$ \sum {a}_j{x}_j={a}_0?
    $$](A457410_1_En_3_Chapter_IEq4.gif) By the formula


    ![$$ \frac{\mid \sum {a}_j\overline{x_j}-{a}_0\mid }{\sqrt{\sum {a_j}^2}} $$](A457410_1_En_3_Chapter_Equo.gif)


    Since we intend to maximize the minimum of this value over all data points yet
    have no need for the actual value, the denominator is irrelevant and we might
    as well simply consider the numerator, a fortuitous condition as we cannot yet
    handle general nonlinear functions. This numerator is an absolute value. We will
    therefore use the double positive variable trick and introduce for each data point
    x¯ a triplet of constraints


    ![$$ {\displaystyle \begin{array}{l}\sum {a}_j{\overline{x}}_j-u+l={a}_0\\ {}\kern4em
    e<=u\\ {}\kern4.28em e<=l\end{array}} $$](A457410_1_En_3_Chapter_Equp.gif)


    where the first constraints will force either u or l to measure the value of the
    numerator in the distance formula. The two inequalities will have the variable
    e lower bound both. We then only have to maximize the value of e to achieve our
    goal.


    ### 3.3.1 Executable Model


    The translation into an executable model is shown in Listing [3-4](#A457410_1_En_3_Chapter.html#Par87).
    Lines 4 to 7 define the new positive variables to hold the distance from each
    data point to the separating hyperplane. Line 8 is the same as before, the coefficient
    of the hyperplane we are searching for. The rest of the model is identical to
    our previous classification model with the addition of three lines at 12 and at
    17 fixing the distance constraint and establishing the lower bound e on them.
    The objective function is now to force this lower bound upward, maximizing the
    minimum distance.


    ```

    1   def solve_margins_classification(A,B):

    2     n,ma,mb=len(A[0]),len(A),len(B)

    3     s = newSolver(''Classification'')

    4     ua = [s.NumVar(0,99,") for _ in range(ma)]

    5     la = [s.NumVar(0,99,") for _ in range(ma)]

    6     ub = [s.NumVar(0,99,") for _ in range(mb)]

    7     lb = [s.NumVar(0,99,") for _ in range(mb)]

    8     a = [s.NumVar(-99,99,") for _ in range(n+1)]

    9     e = s.NumVar(-99,99,")

    10     for i in range(ma):

    11       s.Add(0 >= a[n]+1-s.Sum(a[j]*A[i][j] for j in range(n)))

    12       s.Add(a[n]==s.Sum(a[j]*A[i][j]-ua[i]+la[i]for j in range(n)))

    13       s.Add(e = s.Sum(a[j]*B[i][j] for j in range(n))-a[n]+1 )

    17       s.Add(a[n]==s.Sum(a[j]*B[i][j]-ub[i]+lb[i]for j in range(n)))

    18       s.Add(e <= ub[i])

    19       s.Add(e <= lb[i])

    20     s.Maximize(e)

    21     rc  = s.Solve()

    22     return  rc,SolVal(a)

    Listing 3-4

    Maximizing the Margins (margins.py)

    ```


    The result, on the same data set as in Section 2.5, shows the new and improved
    separating hyperplane , equidistant from the closest points both in the malignant
    set and the benign set, which is as good a separation as we can hope for. But
    beware: this is only as good as the training set. If this set was biased in any
    way, the separation will be just as biased.


    Footnotes [1](#A457410_1_En_3_Chapter.html#Fn1_source)


    All research mathematicians agree on the labels “convex” and its opposite, “concave,”
    but textbook authors for high schools in the US, ignoring thousands of papers,
    journals, and research monographs, insist on “concave up” and “concave down.”


      [2](#A457410_1_En_3_Chapter.html#Fn2_source)


    The expression “regression” comes from Francis Galton’s original paper about “Re-gression
    towards mediocrity” and shadows rather than highlights the technique. As for “parameter,”
    what, pray tell, is not a parameter?


      [3](#A457410_1_En_3_Chapter.html#Fn3_source)


    Carl Friedrich Gauss, Theoria Combinationis Observationum Erroribus Minimis Obnoxiae
    (Theory of the Combination of Observations Least Subject to Errors) (Philadelphia,
    PA: Society for Industrial and Applied Mathematics, 1987).


    # 4. Linear Network Models


    Six degrees of separation!


    This meme and the play, movies, and games it generated did more to introduce elements
    of network theory to the general public than years of public education. Movie
    buffs play the Kevin Bacon Game, trying to link two actors through movies in which
    they appeared with Kevin Bacon. Mathematicians proudly announce their Erdös number
    (when they have one), the number of co-written papers away they stand from a paper
    co-written with the famous Paul Erdös.[¹](#A457410_1_En_4_Chapter.html#Fn1) Throughout
    this chapter networks play an essential role in visualizing a problem.


    A network is an object composed of nodes (people, in our examples) and arcs (indicating
    the presence of a relationship). It is a tool mathematicians invented hundreds
    of years ago to help model situations[²](#A457410_1_En_4_Chapter.html#Fn2) and
    solve problems. We will use networks to help us construct optimization models.
    In a sense, we are doing meta-modeling.


    Network-based optimization models often share, along with the structural description
    , an interesting characteristic: if the input data are all integers, then there
    is an integral optimal solution. Moreover, the solver will find it. This is a
    useful property as it allows for modeling of countable items (people, trucks,
    data packets) as well as measurable items (money, time, water).


    It is important to realize the importance of integrality in modeling. Let’s imagine
    a complex problem involving the flight of a space shuttle. The constraints involve
    weight, amount of fuel, amount of oxygen, work to do while in orbit, etc. There
    are thousands, maybe hundreds of thousands, of variables and constraints. If such
    a problem asks “How many astronauts can be carried in the shuttle?” it is unlikely
    that NASA (or SpaceX) would accept “Two and a half astronauts” as the optimal
    answer.


    Crucially, we must dispense with the tempting but wrong work-around: rounding
    . It is rarely the case that rounding helps. If we round a fractional solution,
    many (maybe even all) constraints might be violated. Round up the solution of
    our space shuttle instance and the weight constraint might prevent lift-off; round
    down and the astronauts may fail to accomplish all the required tasks. To be fair,
    there are problems where rounding is acceptable, but those are either boring,
    or the solution is obvious, or both.'
  trans: "\n### 3.3 模式分类再探讨\n\n回顾第 2 章第 2.5 节的分类模型：给定两组数据点（由专家标记的良性和恶性细胞），我们得到了一个分离超平面，之后可用于模仿专家，将新数据分类到其中一组。我们最初方法的一个弱点是，不一定能根据任何定义找到“最佳”超平面。一旦得到一个超平面，我们就停止了。第一次尝试的结果如图\
    \ 3-6 所示，其中一个恶性细胞恰好位于分离超平面上。它同样可能是一个良性细胞。\n\n![A457410_1_En_3_Fig6_HTML.jpg](img/A457410_1_En_3_Fig6_HTML.jpg)\n\
    \n图 3-6\n\n数据与最大化间隔的分离\n\n因此，分类领域的人倾向于选择一个能最大程度分离两组的超平面；即，与一组和另一组距离相等的超平面。假设训练集选择得当，这可能会在后续最小化误分类。\n\
    \n实现这种最大分离的一种方法是最大化训练集到分离超平面的最小距离。这被称为最大化间隔，我们现在有了执行这种最大化的工具。假设我们已经运行了之前的分类模型，并且知道这两组可以通过超平面`∑\
    \ a_j x_j = a_0`分离。现在我们想要最佳的这种分离。\n\n如何计算点`x¯`到超平面`∑ a_j x_j = a_0`的距离？通过公式\n\n\
    `|∑ a_j x¯_j - a_0| / √(∑ a_j²)`\n\n由于我们打算最大化所有数据点上该值的最小值，但又不需要实际数值，因此分母无关紧要，我们不妨只考虑分子——这恰好是一个有利条件，因为我们目前还无法处理一般的非线性函数。这个分子是一个绝对值。因此，我们将使用双正变量技巧，并为每个数据点`x¯`引入一组三个约束：\n\
    \n```\n∑ a_j x¯_j - u + l = a_0\n    e <= u\n    e <= l\n```\n\n其中第一个约束将迫使`u`或`l`测量距离公式中分子的值。两个不等式将变量`e`作为两者的下界。然后我们只需最大化`e`的值即可实现目标。\n\
    \n### 3.3.1 可执行模型\n\n转换为可执行模型的过程如代码清单 3-4 所示。第 4 至 7 行定义了新的正变量，用于保存每个数据点到分离超平面的距离。第\
    \ 8 行与之前相同，是我们正在寻找的超平面的系数。模型的其余部分与我们之前的分类模型相同，只是在第 12 行和第 17 行增加了三行代码，用于固定距离约束并建立其下界`e`。目标函数现在是迫使这个下界向上增长，从而最大化最小距离。\n\
    \n```\n1   def solve_margins_classification(A,B):\n2     n,ma,mb=len(A[0]),len(A),len(B)\n\
    3     s = newSolver('Classification')\n4     ua = [s.NumVar(0,99,\") for _ in\
    \ range(ma)]\n5     la = [s.NumVar(0,99,\") for _ in range(ma)]\n6     ub = [s.NumVar(0,99,\"\
    ) for _ in range(mb)]\n7     lb = [s.NumVar(0,99,\") for _ in range(mb)]\n8  \
    \   a = [s.NumVar(-99,99,\") for _ in range(n+1)]\n9     e = s.NumVar(-99,99,\"\
    )\n10     for i in range(ma):\n11       s.Add(0 >= a[n]+1-s.Sum(a[j]*A[i][j] for\
    \ j in range(n)))\n12       s.Add(a[n]==s.Sum(a[j]*A[i][j]-ua[i]+la[i]for j in\
    \ range(n)))\n13       s.Add(e = s.Sum(a[j]*B[i][j] for j in range(n))-a[n]+1\
    \ )\n17       s.Add(a[n]==s.Sum(a[j]*B[i][j]-ub[i]+lb[i]for j in range(n)))\n\
    18       s.Add(e <= ub[i])\n19       s.Add(e <= lb[i])\n20     s.Maximize(e)\n\
    21     rc  = s.Solve()\n22     return  rc,SolVal(a)\n代码清单 3-4\n最大化间隔（margins.py）\n\
    ```\n\n在与第 2.5 节相同的数据集上运行的结果显示，新的、改进后的分离超平面与恶性集和良性集中最近的点等距，这是我们能期望的最佳分离。但请注意：这仅取决于训练集的质量。如果该训练集有任何偏差，分离结果也会同样有偏差。\n\
    \n脚注 1\n\n所有研究数学家都认同“凸”及其反义词“凹”的标签，但美国高中的教科书作者无视数千篇论文、期刊和研究专著，坚持使用“上凹”和“下凹”。\n\
    \n2\n\n“回归”一词源自弗朗西斯·高尔顿关于“向平庸回归”的原始论文，它掩盖而非突出了该技术的本质。至于“参数”，请问，什么不是参数呢？\n\n3\n\
    \n卡尔·弗里德里希·高斯，《最小误差观测组合理论》（费城，宾夕法尼亚州：工业与应用数学学会，1987 年）。\n\n# 4. 线性网络模型\n\n六度分隔！\n\
    \n这个梗以及由此产生的戏剧、电影和游戏，在向公众介绍网络理论元素方面，比多年的公共教育效果更好。电影爱好者玩凯文·贝肯游戏，试图通过两位演员与凯文·贝肯共同出演的电影来建立联系。数学家们自豪地宣布他们的埃尔德什数（如果有的话），即他们与著名数学家保罗·埃尔德什合著论文的间隔距离。¹\
    \ 在本章中，网络在可视化问题方面发挥着重要作用。\n\n网络是由节点（在我们的例子中是人）和弧（表示关系的存在）组成的对象。它是数学家数百年前发明的一种工具，用于帮助建模情境²和解决问题。我们将利用网络来构建优化模型。从某种意义上说，我们是在进行元建模。\n\
    \n基于网络的优化模型通常与结构描述共享一个有趣的特征：如果输入数据都是整数，那么存在一个整数最优解。此外，求解器会找到它。这是一个有用的特性，因为它允许对可数项目（人、卡车、数据包）以及可测量项目（金钱、时间、水）进行建模。\n\
    \n认识到整数性在建模中的重要性至关重要。让我们想象一个涉及航天飞机飞行的复杂问题。约束条件包括重量、燃料量、氧气量、在轨工作等。可能有数千甚至数十万个变量和约束。如果这样的问题问“航天飞机可以搭载多少名宇航员？”，NASA（或\
    \ SpaceX）不太可能接受“两个半宇航员”作为最优答案。\n\n至关重要的是，我们必须摒弃一种诱人但错误的变通方法：四舍五入。四舍五入很少能解决问题。如果对分数解进行四舍五入，许多（甚至可能全部）约束条件可能会被违反。将航天飞机实例的解向上取整，重量约束可能会阻止起飞；向下取整，宇航员可能无法完成所有必需的任务。公平地说，有些问题中四舍五入是可以接受的，但这些问题要么很无聊，要么解决方案显而易见，或者两者兼而有之。\n"
- fmt: '# 4.1 Maximum Flow


    Network-related problems often have a structure where the integrality of the solution
    is guaranteed “for free.” We can do nothing except recognize that the problem
    falls in that special category and be merry. The goal of this section is to recognize
    and model problems with this special structure.


    The prototypical, overt example is the network maximum flow (maxflow) problem
    where some substance flows from some source(s) to some destinations(s) on capacitated
    channels and we try to maximize the amount of flowing.


    The substance flowing does not have to be material, as water, oil, or even electricity.
    It could be data packets flowing through a network of fiber optics cables. Imagine,
    for instance, that you are trying to establish how many concurrent video streams
    you can send from your servers to your viewers. This fits nicely in the context
    of a maximum flow problem.


    To consider the simplest problem abstractly, let’s assume a network as described
    by Figure [4-1](#A457410_1_En_4_Chapter.html#Fig1) where each arc has the noted
    capacity and we are trying to send as much as possible from the nodes marked as
    sources (-S) to the nodes marked as sinks (-T).


    ![A457410_1_En_4_Fig1_HTML.jpg](A457410_1_En_4_Fig1_HTML.jpg)


    Figure 4-1 Visual representation of a network flow problem instance


    ## 4.1.1 Constructing a Model


    What we need to decide in this problem is the amount to deliver from the source
    to the sink and through which arcs of the network.


    ## 4.1.2 Decision Variables


    The simplest, most natural way to answer the question is to introduce a two-dimensional
    variable. The first dimension indicates the origin node and the second dimension
    indicates the destination node; the value of the variable will be the amount of
    substance flowing on the arc between the two, or


    ```

    x_{i,j} ∀ i ∈ N, ∀ j ∈ N

    ```


    For example, if `x[2,3] = 35`, it will mean that we should send 35 units from
    node 2 to node 3.


    ### 4.1.2.1 Objective


    The objective is to maximize the amount flowing from the sources to the sinks.
    So the sum of either what is coming out of the sources (say set S) or the sum
    of what goes into the sinks (say set T) will work. This suggests either of these
    objective functions


    ```

    max ∑_{i∈s} ∑_{j∈N} x_{i,j}

    ```


    or


    ```

    max ∑_{j∈T} ∑_{i∈N} x_{i,j}

    ```


    But, since we allow multiple sources and nothing prevents a source from sending
    to another source for further transport, we should be careful to maximize the
    “net” flow out of the sources, or


    ```

    max ∑_{i∈S} (∑_{j∈N} x_{i,j} - ∑_{j∈N} x_{j,i})

    ```


    (4.1)


    The corresponding net flow into the sinks should be obvious.[³](#A457410_1_En_4_Chapter.html#Fn3)


    This objective function (4.1) is enough to get a working model, but we have two
    minor annoyances to consider: chained sources and cycles.


    The first problematic case is illustrated by Figure [4-2](#A457410_1_En_4_Chapter.html#Fig2).
    It is clear that since the capacity of the arc going into the sink is 2, exactly
    two units will flow. But these two units could come from source N1-S or one could
    come from N0-S and a second from N1-S.


    ![A457410_1_En_4_Fig2_HTML.jpg](A457410_1_En_4_Fig2_HTML.jpg)


    Figure 4-2 Problematic chaining of sources


    The second problematic case occurs when there is a cycle involving a source. Then,
    given any flow `f` around that cycle, if that flow is not as large as the capacity
    on that cycle, then there is another flow, `f + 1`, with exactly the same objective
    value. Consider Figure [4-3](#A457410_1_En_4_Chapter.html#Fig3) as an example.
    An optimal solution could send 10 units from the source to the sink through the
    intermediate node or up to 20 units from the source, with up to 10 units flowing
    back from the intermediate node to the source.


    ![A457410_1_En_4_Fig3_HTML.jpg](A457410_1_En_4_Fig3_HTML.jpg)


    Figure 4-3 Problematic cycles


    These two cases illustrate multiple optimal solutions with, of course, exactly
    the same optimal value. There is little chance that, for any application, this
    multitude of optimal flows represents a feature. It will likely be considered
    a nuisance, especially if two different solvers or two different runs of the same
    solver return two different flows! How can we ensure that the solver consistently
    returns the same flow?


    We could decide that, among all optimal flows, we want the flow with as little
    flow into the sources as possible. This is a dual objective: maximize the net
    flow out of the sources, and minimize the flow into the sources. This idea of
    a dual objective, or more generally of multiple objectives, often occurs in practice
    and often for the same reason as here: the need to determine, among multiple optimal
    solutions according to one criterion, the most preferable one according to a secondary
    criterion.


    Since we need to maximize one object and minimize another, all at one go, we need
    another trick, the reversal:


    ```

    max f(x) ⇔ min -f(x)

    ```


    We can always replace a minimization problem by a maximization problem, and vice
    versa. And now we can add the two objectives: maximizing the net flow as in equation
    (4.1) and minimizing the inflow, or maximizing `-∑_{i∈S} ∑_{j∈N} x_{j,i}`. After
    simplification, it looks like


    ```

    max ∑_{i∈S} (∑_{j∈N} x_{i,j} - 2^* ∑_{j∈N} x_{j,i})

    ```


    (4.2)


    In the case of our chaining example, we would maximize `x[0,1] + x[1,2] - 2^*
    x[0,1]`, or `x[1,2] - x[0,1]` which would force a solution where all the flow
    is issued from N1-S. In our cyclic example, this would yield `x[0,1] + x[1,2]
    - x[1,0]` which guarantees that no flow comes back into the source and it emits
    10 units.


    ### 4.1.2.2 Constraints


    The only constraint type is known as conservation of flow: for every node that
    is neither a source nor a sink, whatever flow goes in must come out, or


    ```

    ∑_{j∈N} x_{i,j} = ∑_{j∈N} x_{j,i} ∀ i ∈ N \ {S ∪ T}

    ```


    (4.3)


    Since the objective function will force flow out of the sources or, equivalently,
    into the sinks, the conservation of flow will take care to move the material from
    sources to sinks.'
