    ### 7.1.2 Pre-Allocate Cutting Patterns


    The previous approach is optimal but will not scale very well, even with our symmetry-breaking
    constraints. I will describe here a generally suboptimal approach that can be
    used to solve much larger instances.


    The basic idea is to fix the cutting patterns and only optimize the number of
    rolls using those patterns while satisfying demand. Imagine, for instance, that
    we were given the distinct patterns of the last column of Table [7-2](#A457410_1_En_7_Chapter.html#Tab2)
    in matrix A, as well as Table [7-1](#A457410_1_En_7_Chapter.html#Tab1) in array
    D. Then we could have a decision variable y indexed by the patterns of A, representing
    how many rolls to cut according to that pattern. Symbolically, we would have the
    model


    ![$$ {\displaystyle \begin{array}{l}\min \kern0.125em \sum \limits_j\ {y}_j\\
    {}\kern1.25em \ \ {A}_{j,i}{y}_j\ge {D}_i\forall i\\ {}\kern1.25em \ \ {y}_j\in
    \left[0,1,2,\dots \right]\end{array}} $$](A457410_1_En_7_Chapter_Equh.gif)


    It seems simple enough, until one carefully considers the number of patterns.
    If we do not know ahead of time which patterns to use, then the simple option
    seems to be to list them all. How many are there? An astronomical number, even
    for small examples.


    So, here is the brilliant idea: start with a certain set of patterns, optimize.
    Then, in a manner yet to be determined, find some “better” patterns to add. In
    all its generality, this is known to optimizers[¹](#A457410_1_En_7_Chapter.html#Fn1)
    as column generation . Repeat the optimization until we can no longer find “better”
    patterns or until we run out of time or are satisfied with the solution. Listing
    [7-4](#A457410_1_En_7_Chapter.html#Par35) implements the high-level approach.


    ```

    1  def solve_large_model(D):

    2    n,iter = len(D),0

    3    A = get_initial_patterns(D)

    4    while iter = b[i]))

    22    rc = s.Solve()

    23    y = [int(ceil(e.SolutionValue())) for e in y]

    24    return rc, y, [0 if integer else u[i].DualValue() \

    25               for i in range(m)]

    Listing 7-4

    Cutting Stock Model Using Given Patterns (cutting stock.py)

    ```


    At line 4 we loop on the optimization a certain number of times. This is an easy
    termination criteria, which we can tune according to the size of the problem we
    are solving and how long we are willing to wait. There are better criteria, including
    looping until we have a true optimal solution, but they would lead us deep into
    the theory of optimization.[²](#A457410_1_En_7_Chapter.html#Fn2)


    The master problem is essentially the one described above: given the set of allowable
    patterns, do your best to minimize the number of rolls. There are two subtleties.
    The first one is that we solve the optimization problem as a linear program ,
    not an integer program, even though we really want an integer solution, the number
    of rolls. We do this to gain speed. At the end, we simply round up the number
    of rolls, since obviously if 4.6 rolls will satisfy demand, then surely 5 rolls
    will also satisfy demand.


    The second subtlety involves the information we need to find better patterns .
    Consider one imaginary example of a constraint of the form of line 21: for, say
    product roll 5, imagine we need 28 consumer rolls to satisfy demand. Given the
    patterns we have already, we might have that pattern 1 has this roll 3 times,
    pattern 3 has it 5 times, and pattern 10 has it once (and no other pattern has
    roll 5). So the constraint reads


    3y [1] + 5y [3] + 1y [10] ≥ 28,


    where the solution is y. What is the effect of changing the 28 by exactly 1 unit,
    keeping everything else constant? It will change the optimal solution by a small
    value, the marginal value of roll 5\. We can do this, conceptually, for every
    roll and get each of their marginal values. By design, all solvers already have
    these marginal values computed; they are a side-effect of the solution techniques.
    So we simply request them at line 25 by the call for `DualValue`s.'
