  trans: '

    ### 4.2.1.2 目标


    目标是**最小化配送的总成本（美元）**。为此，我们需要一个成本参数。假设 `C[i,j]` 的索引与决策变量完全一致。那么目标函数为：


    ![$$ \min \kern0.125em \sum \limits_i\sum \limits_j{C}_{i,j}{x}_{i,j} $$](img/A457410_1_En_4_Chapter_Equ4.gif)


    (4.4)


    ### 4.2.1.3 约束条件


    约束条件分为紧密相关的两类：供应与需求。为便于引用，我们引入以下参数：`S[i]`（`i ∈ P`）和 `D[j]`（`j ∈ C`），分别表示工厂 `i`
    的可能供应量和城市 `j` 的需求量。


    每个工厂都有最大生产能力，我们必须遵守这一上限。因此，对于每个工厂，我们需要通过一个可用性约束来限制从该工厂配送的总量，如下所示：


    ![$$ \sum \limits_j{x}_{i,j}\le {S}_i\forall i\in P $$](img/A457410_1_En_4_Chapter_Equd.gif)


    注意这里的不等式：我们并未强制配送量必须达到产能，而是要求其不超过供应能力。


    城市的需求约束类似，但必须被满足。因此：


    ![$$ \sum \limits_i{x}_{i,j}={D}_j\forall j\in C $$](img/A457410_1_En_4_Chapter_Eque.gif)


    这里我们使用了等式约束。如果建模时错误地使用了不等式（例如 `≤`），最优解将全部为零。另一方面，如果我们使用 `≥`，由于我们是在最小化总成本，这不会改变解的结果。


    ### 4.2.1.4 可执行模型


    现在将其转化为一个可执行模型。为了使模型具有足够的通用性以解决所有此类问题，我们假设成本、需求和供应能力都存储在一个名为 `D` 的二维数组中，其结构如表
    4-3 所示，其中成本为零表示该工厂与城市之间没有输电线路。


    从比“工厂”和“城市”更通用的角度来看，我们可以将每一行视为一个生产者，每一列视为一个消费者，只是最后一行代表需求，最后一列代表供应。生产者与消费者之间交换的“产品”可以是任何东西，不仅限于可分割的数量（如千瓦时或升水），也可以是卡车、鲜花、数据包或人员。最优解中永远不会出现人员的小数部分。参见代码清单
    4-2。


    ```

    1   def solve_model(D):

    2     s = newSolver(''Mincostuflowuproblem'')

    3     m,n = len(D)-1,len(D[0])-1

    4     B = sum([D[-1][j] for j in range(n)])

    5     G = [[s.NumVar(0,B if D[i][j] else 0,") for j in range(n)] \

    6         for i in range(m)]

    7     for i in range(m):

    8       s.Add(D[i][-1] >= sum(G[i][j] for j in range(n)))

    9     for j in range(n):

    10       s.Add(D[-1][j] == sum(G[i][j] for i in range(m)))

    11     Cost=s.Sum(G[i][j]*D[i][j] for i in range(m)for j in range(n))

    12     s.Minimize(Cost)

    13     rc  = s.Solve()

    14     return rc,ObjVal(s),SolVal(G)

    代码清单 4-2

    电力配送模型 (mincost.py)

    ```


    第 6 行定义了二维变量，其中第一个索引指定生产者，第二个索引指定消费者。由于我们知道，如果某个特定的生产者-消费者对之间没有通道，则对应条目为零，因此我们利用这一点将变量的范围压缩为零。一个好的求解器会在执行任何其他工作之前利用此信息消除这些变量。


    第 8 行确保我们的供应量不超过每个工厂的生产能力，而第 10 行确保满足峰值需求。第 11 行的目标函数计算总成本，并指示我们应最小化该值。


    模型的输出结果如表 4-4 所示。读者可以验证，“总计”列的值小于或等于每个工厂的最大产量，而“总计”行的值恰好等于每个消费者的所需峰值需求。


    **表 4-4** 电力配送问题的最优解


    | 从/到 | 城市 0 | 城市 1 | 城市 2 | 城市 3 | 城市 4 | 城市 5 | 城市 6 | 总计 |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 工厂 0 |   |   |   |   | 247 |   | 281 | 528 |

    | 工厂 1 | 288 |   |   | 231 |   | 170 |   | 689 |

    | 工厂 2 |   | 234 | 236 |   |   | 92 |   | 562 |

    | 总计 | 288 | 234 | 236 | 231 | 247 | 262 | 281 |   |


    这里再次出现了一个有趣的现象：所有解都是整数，尽管我们并未施加任何整数性约束。


    ### 4.2.2 变体


    最简单的变体是给弧线增加容量限制。这样我们需要确保没有流量超过容量。假设我们在矩阵 `A` 中存储了容量，那么只需添加如下形式的约束：


    ![$$ {x}_{i,j}\le {A}_{i,j}\forall i\in P,\forall j\in C $$](img/A457410_1_En_4_Chapter_Equf.gif)


    一个有趣的变体涉及分散供应源。例如，为了最小化风险，我们可能不希望来自单一供应源的需求超过某个比例。假设我们决定，任何城市的需求来自单一供应源的比例不得超过
    60%，我们可以添加如下形式的约束：


    ![$$ {x}_{i,j}\le 0.6{D}_j\forall i\in P,\forall j\in C $$](img/A457410_1_En_4_Chapter_Equg.gif)


    鼓励读者添加此约束，并注意最优值将不会像没有该约束时那么低。此外，解可能不再是整数。这个简单的附加约束破坏了保证整数性的性质。我们必须将决策变量声明为整数（这会增加复杂性和求解时间）以保证得到整数解。


    除了物质流动问题，该问题有时也以指派问题的形式出现：给定一组具有特定技能和小时工资的工人，以及一组工作，你应将哪个工人指派给哪个工作以最小化成本？


    例如，考虑一家咨询公司，有三个团队位于不同城市，以及三个客户位于不同地点。由于从团队到客户地点的差旅成本各不相同，我们希望最小化总差旅成本。在这种情况下，需求和供应都只是
    1，因为我们希望每个客户地点有一个团队，并且每个团队分配一个客户。参见表 4-5。


    **表 4-5** 需要标题


    |   | 客户 0 | 客户 1 | 客户 2 | 供应量 |

    | --- | --- | --- | --- | --- |

    | 团队 0 | 25 | 30 | 20 | 1 |

    | 团队 1 | 20 | 15 | 35 | 1 |

    | 团队 2 | 18 | 19 | 28 | 1 |

    | 需求量 | 1 | 1 | 1 |   |

    '
- fmt: '# 4.3 Transshipment


    A more general type of problem that can be modeled as a network flow problem is
    the transshipment problem. The characteristics of such a problem are a set of
    nodes with a cost of transporting between each pair; a subset of the nodes is
    suppliers and another subset is consumers. The remaining nodes can be used to
    carry the material but neither produces nor consumes, hence the moniker transshipment.


    Table [4-6](#A457410_1_En_4_Chapter.html#Tab6) has, for example, the cost of delivery
    between each pair of nodes. A blank indicates that there is no path between two
    nodes. The last column indicates the amount that a node can produce, if any; the
    last row is the demand of each node, if any. Note that the sum of demands should,
    in general, be the same as the sum of supplies or else the problem is infeasible.


    **Table 4-6** Example of Transshipment Distribution Cost Over a Network


    | From/To | N0 | N1 | N2 | N3 | N4 | N5 | N6 | N7 | Supply |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | N0 | | | | | 17 | 10 | 19 | | |

    | N1 | 23 | | | 28 | | 23 | | | |

    | N2 | 29 | | | | 30 | 25 | 25 | | 680 |

    | N3 | | | | | 17 | 15 | 19 | 29 | |

    | N4 | | 16 | | | | | | | |

    | N5 | 22 | | | | 25 | | | 18 | 540 |

    | N6 | 25 | 29 | 16 | | | 22 | | | |

    | N7 | | | 30 | | 10 | | 27 | | |

    | Demand | 241 | | | 164 | 239 | | 152 | 424 | |


    Transshipment problems are often depicted visually as in Figure [4-6](#A457410_1_En_4_Chapter.html#Fig6),
    corresponding to the data in Table [4-6](#A457410_1_En_4_Chapter.html#Tab6), where
    the arrows are annotated with the cost of transportation of the material and where
    the nodes contain a positive number indicating supply value and/or a negative
    number indicating a demand value.


    Note that this is clearly a generalization of the minimum cost flow problem as
    there could be arcs between any two nodes, which means, for instance, that a source
    node could receive whatever product is flowing through the network, add it to
    its production, and send the result off towards another node, whether a consumer
    or a transshipment node.


    ## 4.3.1 Constructing a Model


    What we need to decide in this problem is the amount of material to deliver from
    each node with a positive supply to each node with a positive demand. The simplest,
    most natural way to model this is to introduce a two-dimensional variable. The
    first dimension indicates the origin and the second dimension indicates the destination.
    The variable itself will contain the amount to ship. We will assume that `N` is
    the set of nodes to get


    ![$$ {x}_{i,j}\forall i\in N,\forall j\in N $$](A457410_1_En_4_Chapter_Equh.gif)


    ![A457410_1_En_4_Fig6_HTML.jpg](A457410_1_En_4_Fig6_HTML.jpg)


    **Figure 4-6** Transshipment example viewed graphically


    For example, if `x[2,3] = 35`, it means we should send 35 units from node 2 to
    node 3.


    ### 4.3.1.1 Objective


    The objective is to minimize cost in dollars of delivery. For this we will need
    a parameter for the cost. Let’s assume `C[i,j]` indexed exactly as the decision
    variable. The objective will therefore be


    ![$$ \min \kern0.125em \sum \limits_i\sum \limits_j{C}_{i,j}{x}_{i,j} $$](A457410_1_En_4_Chapter_Equi.gif)


    ### 4.3.1.2 Constraints


    In the previous minimum cost flow problem, we had two types of constraints: one
    for the producing nodes which stated that the outflow was equal to the supply
    value, and another one for the consuming nodes, stating that the inflow was equal
    to the demand value. We could use these constraints here, in addition to a third
    constraint for intermediate nodes, those without any demand or supply value, stating
    that the inflow must equal flow.


    While it is possible to treat each of type of nodes (producers, consumers, and
    intermediate) differently, it is simpler to notice that one constraint, appropriately
    general, will hold each node. Namely, that the flow into the node (`f[in]`) minus
    the flow out of the node (`f[out]`) must equal the demand (`D`) minus the supply
    (`S`), or


    `f[in] − f[out] = D − S`.


    Note that in the case of pure sources and sinks, the equation reduces to the constraints
    we used in the minimum cost flow model:


    *   `− f[out] = −S` Special case for sources

    *   `f[in] = D` Special case for sinks


    Let’s assume that `S[i]` and `D[i]` are, respectively, the supply and the demand
    of node `i`, keeping in mind that for producing nodes only supply is non-zero;
    for consuming nodes, only demand is non-zero; and for intermediate nodes, both
    are zero. We get


    ![$$ \sum \limits_j{x}_{j,i}-\sum \limits_j{x}_{i,j}={D}_i-{S}_i\forall i\in N
    $$](A457410_1_En_4_Chapter_Equ5.gif)


    (4.5)


    This constraint is known as a general conservation of flow constraint. It is the
    only constraint we need, but it must hold at every node.


    ### 4.3.1.3 Executable Model


    Let’s translate this into an executable model. To make the model general enough
    to solve all problems of this type, we will assume that the costs, demands, and
    supply capacities are given in a two-dimensional array called `D` structured as
    in Table [4-6](#A457410_1_En_4_Chapter.html#Tab6). Each entry `{i,j}` represents
    the cost of transporting from node `i` to node `j`, except that the last row represents
    the demand and the last column the supply. See Listing [4-3](#A457410_1_En_4_Chapter.html#Par83).


    ```

    1   def solve_model(D):

    2     s = newSolver(''Transshipmentuproblem'')

    3     n = len(D[0])-1

    4     B = sum([D[-1][j] for j in range(n)])

    5     G = [[s.NumVar(0,B  if D[i][j] else  0,") \

    6        for j in range(n)] for i in range(n)]

    7     for i in range(n):

    8       s.Add(D[i][-1] - D[-1][i] == \

    9       sum(G[i][j] for j in range(n))-sum(G[j][i]for j in range(n)))

    10     Cost=s.Sum(G[i][j]*D[i][j] for i in range(n)for j in range(n))

    11     s.Minimize(Cost)

    12     rc = s.Solve()

    13     return rc,ObjVal(s),SolVal(G)

    ```


    **Listing 4-3** Transshipment Distribution Model (`transship_dist.py`)


    Line 6 defines the two-dimensional variable where the first index specifies the
    producer and the second, the consumer. The range of a variable is from zero to
    either the total demand or to zero to ensure that we don’t use a route that does
    not exist. In data `D`, the absence of a cost at entry `i,j` indicates that there
    is no direct route between `i` and `j`.


    The generalized conservation of flow constraint corresponding to (6.5) is implemented
    on line 7. The objective function at line 10 computes the total cost and line
    11 indicates that we should minimize that quantity.


    The output of the model is displayed in Table [4-7](#A457410_1_En_4_Chapter.html#Tab7).
    Note that the solution is again entirely integral, even though we did not enforce
    integrality.


    The reader can verify that the difference between the entry in the total column
    of a given node less the entry in the total row of the same node is equal to the
    difference of the supply and the demand of that node. This is especially interesting
    for nodes that receive more than their demands and reroute whatever they do not
    use. Even for very small problems, those are not solutions that can be easily
    guessed.


    **Table 4-7** Optimal Solution to the Transshipment Problem


