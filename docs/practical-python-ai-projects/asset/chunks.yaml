- fmt: '# 5. Classic Discrete Models


    The problems in this chapter are classical examples of integer programs (IP).
    A better name would be discrete linear programs because we described the past
    ones as continuous linear programs and the antonym of continuous is discrete.
    Alas, the tradition is firmly entrenched so we will refer to them as IPs. They
    are characterized by algebraically linear constraints and linear objectives with
    the additional requirement that variables must take on only integral values.


    All are very simple to state, if not always simple to model or solve. They are
    included here to highlight two elements:


    - First, many real-life problems have embedded in them one or more of these simple,
    pure problems. It is therefore profitable for a modeler to recognize these kernels
    and model them with ease.

    - Second, many of the problems, to be efficiently modeled, require some trickery.
    Knowing these tricks, and recognizing different situations where they can be applied,
    is the hallmark of a good modeler.


    What makes an integral model is the requirement that some or all of the variables
    be integral. Keep in mind that, contrary to the pseudo-integral models of the
    previous chapter, the structure of the problem does not guarantee this integrality
    and the modeler must choose a solver capable of handling integrality constraints.


    There are a few reasons to require integral variables. The first and most obvious
    case is that we are counting objects, not measuring amounts (people, cars, or
    planets as opposed to water, carbon dioxide, or percentages). The second case
    occurs when the decision variables represent answers to yes/no questions (Should
    we build this plant? Should we get married?) or, more generally, Boolean conditions
    (with states of either True or False, satisfying the principle of an excluded
    middle). The third case more technical applies to auxiliary variables when they
    are used as “indicator variables.” This is when they indicate the presence or
    absence of a certain state (`y` is 1 if and only if the continuous variable `x`
    is non-zero). Of course, the boundary between these use cases is blurry: a true
    decision variable could be an indicator variable and an auxiliary variable could
    be counting people. The three cases are nevertheless good to keep in mind while
    modeling.


    Problems of this chapter have multiple interesting variations. I cannot possibly
    hope to cover them all, but the reader, after reading some of the variations,
    is encouraged to imagine others. No matter how creative one is in varying some
    of the requirements, most of these problems have been studied so extensively that
    few variations remain untouched and most have found some use.


    ## 5.1 Minimum Set Cover


    The first problem in this chapter is one of the most studied and best understood
    of the integer programs. There are a number of applications, but let’s consider
    the following one: General Engine Corp. is considering suppliers for its new line
    of electric cars. Every supplier can produce some parts of the cars, and there
    is overlap in the parts coverage between suppliers. For instance, Dolphin Inc.
    can supply wheel bearings, electrical cables, and low-power light emitting diodes
    while Schukert GA can supply electrical cables, batteries, and battery casings.
    There are hundreds of suppliers and thousands of parts.


    For General Engine, minimizing the number of suppliers offers contractual savings.
    So the goal is to find the smallest number of suppliers that together will provide
    all the required parts. The name set cover is explained by the goal: covering
    all the elements of the set, here the parts needed to build the electric cars.
    The small example used to illustrate the model is given in Table 5-1.


    **Table 5-1** Example of Set Cover


    | Supplier | Part Numbers | Supplier | Part Numbers |

    | --- | --- | --- | --- |

    | S0 | { 3; 4; 5; 8; 24 } | S1 | { 11; 15; 21; 23 } |

    | S2 | { 9; 15; 24 } | S3 | { 9; 13 } |

    | S4 | { 5; 11; 12; 14; 16; 20 } | S5 | { 8; 11; 12; 15; 21 } |

    | S6 | { 1; 4; 18; 20 } | S7 | { 0; 3; 6; 11; 13; 15; 21; 23 } |

    | S8 | { 14; 16; 18; 19; 23 } | S9 | { 2; 7; 16; 22 } |

    | S10 | { 10; 14; 21 } | S11 | { 6; 19 } |

    | S12 | { 4; 10; 24 } | S13 | { 3; 4; 7; 9; 17 } |

    | S14 | { 1; 3; 5; 6; 15; 18; 19; 20; 23 } |   |   |


    ### 5.1.1 Constructing a Model


    This model will be described in stages.


    #### 5.1.1.1 Decision Variables


    What we need to decide in this problem is which suppliers will get contracts.
    This is a yes/no decision. We need, for each supplier, a variable that will take
    on one of two values. The classical approach in integer programming is to use
    an integer variable with a range of [0, 1]. Being an integer, it therefore only
    has two possible values, zero and one, and is known as a binary or indicator variable.


    There are other possible approaches: one using Boolean variables taking on values
    `True` and `False`, but this is really the same approach, renamed; and one using
    a dynamic array variable that will include only the chosen suppliers. This later
    approach may seem natural at first glance, but is not easily implemented using
    an integer solver. It is better suited to a constraint solver, which I will not
    cover here.


    Let’s assume a set `S` of suppliers and declare our first integer variables as


    ```

    S_i ∈ {0, 1} ∀ i ∈ S

    ```


    The interpretation is that if, for example, `s[3]`, `s[5]`, and `s[7]` are one
    while all the others are zero, then General Engine awards a contract to suppliers
    3, 5, and 7 only. It may occur to the reader that in cases where the number of
    suppliers is much larger than the final set of chosen suppliers we are wasting
    resources. We will try to mitigate this waste but in a certain sense, it is unavoidable
    in integer programs.


    #### 5.1.1.2 Objective


    The standard objective is to minimize the number of suppliers. Since we have a
    zero-one variable per supplier, we need to minimize the sum of all these, so


    ```

    min ∑_{i ∈ S} S_i

    ```


    It is possible to encounter a cost per supplier. So that, instead of simply minimizing
    the number of suppliers, we want to minimize the total cost. Assuming that we
    have cost `C[i]` for supplier `i`, we modify the objective function to read


    ```

    min ∑_{i ∈ S} C_i S_i

    ```


    This cost array could be a function of the parts supplied (more parts, larger
    cost) and the bargaining strength of the supplier.


    #### 5.1.1.3 Constraints


    From a high-level perspective, there is only one constraint: General Engine must
    have access to all the required parts. Of course, there may be more than one supplier
    for some parts, but what we must not have is a part with no supplier (a car without
    a steering wheel might not sell so well).


    How can we insure that we have all of the parts? Consider a given part, say part
    23. Which suppliers provide it? There may be four, say 1, 7, 8, and 14.


    This means that we must choose one of these suppliers to get part 23 or, algebraically,
    that the sum `s[1] + s[7] + s[8] + s[14]` must be at least one. (Not equal to
    one because there are, in general, no solutions without some redundancy.)


    This leads us to a constraint per part `j` in the set `P` of all parts. We will
    assume that we have sets `P[i]` of parts supplied by supplier `i`, just as in
    Table 5-1, to get


    ```

    ∑_{i: j ∈ P_i} s_i ≥ 1, j ∈ P

    ```


    (5.1)


    The notation `{i : j ∈ P[i]}` is meant to indicate that we choose index `i` only
    if index `j` is in the set `P[i]`. We will see how easily this is accomplished
    in the executable model.'
  raw: '# 5. Classic Discrete Models


    The problems in this chapter are classical examples of integer programs (IP).
    A better name would be discrete linear programs because we described the past
    ones as continuous linear programs and the antonym of continuous is discrete.
    Alas, the tradition is firmly entrenched so we will refer to them as IPs. They
    are characterized by algebraically linear constraints and linear objectives with
    the additional requirement that variables must take on only integral values.


    All are very simple to state, if not always simple to model or solve. They are
    included here to highlight two elements:


    *   First, many real-life problems have embedded in them one or more of these
    simple, pure problems. It is therefore profitable for a modeler to recognize these
    kernels and model them with ease.

    *   Second, many of the problems, to be efficiently modeled, require some trickery.
    Knowing these tricks, and recognizing different situations where they can be applied,
    is the hallmark of a good modeler.


    What makes an integral model is the requirement that some or all of the variables
    be integral. Keep in mind that, contrary to the pseudo-integral models of the
    previous chapter, the structure of the problem does not guarantee this integrality
    and the modeler must choose a solver capable of handling integrality constraints.


    There are a few reasons to require integral variables . The first and most obvious
    case is that we are counting objects, not measuring amounts (people, cars, or
    planets as opposed to water, carbon dioxide, or percentages). The second case
    occurs when the decision variables represent answers to yes/no questions (Should
    we build this plant? Should we get married?) or, more generally, Boolean conditions
    (with states of either True or False, satisfying the principle of an excluded
    middle). The third case more technical applies to auxiliary variables when they
    are used as “indicator variables .” This is when they indicate the presence or
    absence of a certain state (y is 1 if and only if the continuous variable x is
    non-zero). Of course, the boundary between these use cases is blurry: a true decision
    variable could be an indicator variable and an auxiliary variable could be counting
    people. The three cases are nevertheless good to keep in mind while modeling.


    Problems of this chapter have multiple interesting variations. I cannot possibly
    hope to cover them all, but the reader, after reading some of the variations,
    is encouraged to imagine others. No matter how creative one is in varying some
    of the requirements, most of these problems have been studied so extensively that
    few variations remain untouched and most have found some use.[¹](#A457410_1_En_5_Chapter.html#Fn1)


    ## 5.1 Minimum Set Cover


    The first problem in this chapter is one of the most studied and best understood
    of the integer programs. There are a number of applications, but let’s consider
    the following one: General Engine Corp. is considering suppliers for its new line
    of electric cars . Every supplier can produce some parts of the cars, and there
    is overlap in the parts coverage between suppliers. For instance, Dolphin Inc.
    can supply wheel bearings, electrical cables, and low-power light emitting diodes
    while Schukert GA can supply electrical cables, batteries, and battery casings.
    There are hundreds of suppliers and thousands of parts.


    For General Engine , minimizing the number of suppliers offers contractual savings.
    So the goal is to find the smallest number of suppliers that together will provide
    all the required parts. The name set cover is explained by the goal: covering
    all the elements of the set, here the parts needed to build the electric cars.
    The small example used to illustrate the model is given in Table [5-1](#A457410_1_En_5_Chapter.html#Tab1).


    Table 5-1


    Example of Set Cover


    | Supplier | Part Numbers | Supplier | Part Numbers |

    | --- | --- | --- | --- |

    | S0 | { 3; 4; 5; 8; 24 } | S1 | { 11; 15; 21; 23 } |

    | S2 | { 9; 15; 24 } | S3 | { 9; 13 } |

    | S4 | { 5; 11; 12; 14; 16; 20 } | S5 | { 8; 11; 12; 15; 21 } |

    | S6 | { 1; 4; 18; 20 } | S7 | { 0; 3; 6; 11; 13; 15; 21; 23 } |

    | S8 | { 14; 16; 18; 19; 23 } | S9 | { 2; 7; 16; 22 } |

    | S10 | { 10; 14; 21 } | S11 | { 6; 19 } |

    | S12 | { 4; 10; 24 } | S13 | { 3; 4; 7; 9; 17 } |

    | S14 | { 1; 3; 5; 6; 15; 18; 19; 20; 23 } |   |   |


    ### 5.1.1 Constructing a Model


    This model will be described in stages.


    #### 5.1.1.1 Decision Variables


    What we need to decide in this problem is which suppliers will get contracts .
    This is a yes/no decision. We need, for each supplier, a variable that will take
    on one of two values. The classical approach in integer programming is to use
    an integer variable with a range of [0, 1]. Being an integer, it therefore only
    has two possible values, zero and one, and is known as a binary or indicator variable
    .[²](#A457410_1_En_5_Chapter.html#Fn2)


    There are other possible approaches: one using Boolean variables taking on values
    `True` and `False`, but this is really the same approach, renamed; and one using
    a dynamic array variable that will include only the chosen suppliers. This later
    approach may seem natural at first glance, but is not easily implemented using
    an integer solver. It is better suited to a constraint solver, which I will not
    cover here.


    Let’s assume a set S of suppliers and declare our first integer variables as


    ![$$ {S}_i\in \left\{0,1\right\}\forall i\in S $$](A457410_1_En_5_Chapter_Equa.gif)


    The interpretation is that if, for example, s [3], s [5], and s [7] are one while
    all the others are zero, then General Engine awards a contract to suppliers 3,
    5, and 7 only. It may occur to the reader that in cases where the number of suppliers
    is much larger than the final set of chosen suppliers we are wasting resources.
    We will try to mitigate this waste but in a certain sense, it is unavoidable in
    integer programs.


    #### 5.1.1.2 Objective


    The standard objective is to minimize the number of suppliers. Since we have a
    zero-one variable per supplier, we need to minimize the sum of all these, so


    ![$$ \min \kern0.125em \sum \limits_{i\in S}{S}_i $$](A457410_1_En_5_Chapter_Equb.gif)


    It is possible to encounter a cost per supplier. So that, instead of simply minimizing
    the number of suppliers, we want to minimize the total cost. Assuming that we
    have cost C [i] for supplier i, we modify the objective function to read


    ![$$ \min \kern0.125em \sum \limits_{i\in S}{C}_i{S}_i $$](A457410_1_En_5_Chapter_Equc.gif)


    This cost array could be a function of the parts supplied (more parts, larger
    cost) and the bargaining strength of the supplier.


    #### 5.1.1.3 Constraints


    From a high-level perspective, there is only one constraint: General Engine must
    have access to all the required parts. Of course, there may be more than one supplier
    for some parts, but what we must not have is a part with no supplier (a car without
    a steering wheel might not sell so well).


    How can we insure that we have all of the parts? Consider a given part, say part
    23\. Which suppliers provide it? There may be four, say 1, 7, 8, and 14.


    This means that we must choose one of these suppliers to get part 23 or, algebraically,
    that the sum s [1] + s [7] + s [8] + s [14] must be at least one. (Not equal to
    one because there are, in general, no solutions without some redundancy.)


    This leads us to a constraint per part j in the set P of all parts. We will assume
    that we have sets P [i] of parts supplied by supplier i, just as in Table [5-1](#A457410_1_En_5_Chapter.html#Tab1),
    to get


    ![$$ \sum \limits_{i:j\in {P}_i}{s}_i\ge 1\ j\in P $$](A457410_1_En_5_Chapter_Equ1.gif)


    (5.1)


    The notation {i : j ∈ P [i] } is meant to indicate that we choose index i only
    if index j is in the set P [i] . We will see how easily this is accomplished in
    the executable model.'
