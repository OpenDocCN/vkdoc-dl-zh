    ### 7.3.1.3 目标函数


    目标函数需要最大化所有讲师的偏好权重。我们将目标函数拆分为三项，分别对应讲师 `i` 在课程 `c` 上的权重（`wc[i,c]`）、在偏好集合 `s` 上的权重（`ws[i,s]`）以及在偏好对
    `p` 上的权重（`wp[i,p]`）。


    对于课程而言，这很简单。假设教学班集合 `S` 被划分为多个子集 `S[c]`，每个子集对应课程编号 `c` 的教学班，那么课程偏好权重的贡献为：


    ![$$ WC=\sum \limits_{c\in C}\sum \limits_{i\in I}w{c}_{i,c}\sum \limits_{j\in
    {S}_c}{x}_{i,j} $$](img/A457410_1_En_7_Chapter_Equ8.gif)


    (7.8)


    集合偏好权重的贡献也相当直接。我们需要对所有偏好集合和所有讲师求和，即讲师对某个集合赋予的权重，乘以该集合中所有教学班的成员指示变量与这些教学班分配给该讲师的指示变量的乘积之和：


    ![$$ WR=\sum \limits_{s\in S}\sum \limits_{i\in I}w{s}_{i,s}\sum \limits_{j\in
    {R}_s}{x}_{i,j}, $$](img/A457410_1_En_7_Chapter_Equx.gif)


    其中 `R[s]` 是表 7-10 的最后一列。


    现在来看更有趣的权重——偏好对上的权重。我们来看一个具体例子。假设偏好对编号 4 表示连续上课，并且它包含教学班 2 和 5 这一对。此外，讲师 13 对此类连续上课的偏好对赋予了
    -15 的权重。那么，如果我们把教学班 2 和 5 分配给讲师 13，就需要在目标函数值中加上 -15。因此，我们需要一个指示变量来表示“教学班 2 和 5
    被分配给讲师 13”。我们将这个指示变量称为 `z[13,4]`。根据我们的模型，我们知道 `x[13,2]` 和 `x[13,5]` 的值将为 1。我们如何设置
    `z[13,4]`，使其仅在两者都为 1 时才为 1？通过以下方式：


    ![$$ {\displaystyle \begin{array}{c}{x}_{13,2}+{x}_{13,5}-1\le {z}_{13,4},\\ {}{z}_{13,4}\le
    {x}_{13,2},\\ {}{z}_{13,4}\le {x}_{13,5}.\end{array}} $$](img/A457410_1_En_7_Chapter_Equy.gif)


    第一个不等式在 `x` 两者都为 1 时，将 `z` 提升为 1。后两个不等式在任一 `x` 为 0 时，将 `z` 降低为 0。


    现在，在一般情况下，假设偏好对集合 `P[p]` 如表 7-11 的最后一列所示，我们得到：


    ![$$ {x}_{i,{s}_1}+{x}_{i,{s}_2}-1\le {z}_{i,p}\ i\in I,\left({s}_1,{s}_2\right)\in
    {P}_p, $$](img/A457410_1_En_7_Chapter_Equ9.gif)


    (7.10)


    ![$$ {x}_{i,{s}_1}\ge {z}_{i,p}, $$](img/A457410_1_En_7_Chapter_Equ10.gif)


    (7.11)


    ![$$ {x}_{i,{s}_2}\ge {z}_{i,p}. $$](img/A457410_1_En_7_Chapter_Equ11.gif)


    (7.12)


    另一种方法是利用我们之前在非凸技巧（第 7.2 节）中开发的内容，使用 `reify` 高级约束来实现：


    ![$$ {x}_{i,{s}_1}+{x}_{i,{s}_2}\ge 2\iff {z}_{i,p}=1 $$](img/A457410_1_En_7_Chapter_Equz.gif)


    现在，我们可以对所有偏好对和所有讲师求和，即权重与指示变量的乘积：


    ![$$ WP=\sum \limits_p\sum \limits_i{z}_{i,p}w{p}_{i,p} $$](img/A457410_1_En_7_Chapter_Equ12.gif)


    (7.13)


    现在，我们得到了完整的目标函数：


    `max WC + WS + WP`。


    ### 7.3.1.4 可执行模型


    让我们将其转化为一个可执行模型。参见清单 7-15。


    ```

