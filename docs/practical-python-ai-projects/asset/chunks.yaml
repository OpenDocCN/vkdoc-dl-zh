- fmt: '# 2. Linear Continuous Models


    At the dawn of optimization (the nineteen fifties), the state-of-the-art was defined
    by linear optimization models and the simplex method, the only reasonably efficient
    algorithm known at the time to solve such models. When I started studying this
    subject, one repeatedly heard from multiple sources that over 70% of the CPU cycles
    in the world were devoted to running various simplex codes. Surely an exaggeration,
    but it is indicative of the power of linear models. The world is not linear, but
    sometimes a linear approximation is good enough.


    More precisely, I discuss here linear continuous models (though the usage is to
    call these models LPs for linear programs, implying the continuity properties).
    Linear continuous models are the simplest to write down and the simplest to solve.
    They have been the workhorse of optimizers since George Dantzig invented the simplex
    method to solve them. What characterizes them are three elements:


    - All variables are continuous.

    - All constraints are linear.

    - The objective function is linear.


    In detail, the decision variables (say `x[0]`, …, `x[n]`) can take on integral
    and fractional values. This is appropriate when the solution is measuring amounts
    (for example, pounds of flour or tons of concrete). It is not appropriate when
    the solution is counting objects (as in people or politicians), unless one is
    looking only for an approximation.


    The objective function is (or can be) parameterized by constant array `c` and
    expressed as


    ![$$ {c}_1{x}_1+{c}_2{x}_2+\dots +{c}_n{x}_n $$](A457410_1_En_2_Chapter_Equa.gif)


    This limitation precludes objective functions with terms of the form


    ![$$ {x}_1^2,{x}_4^3,\sin (x),{e}^{x_3},{x}_1\cdot {x}_2, or\kern0.50em \mid x\mid
    $$](A457410_1_En_2_Chapter_Equb.gif)


    among infinitely many others, although you will see later how to handle some of
    these non-linearities by model transformation.


    Finally, the constraints are parameterized by matrix `a[ij]`, array `b`, and can
    be stated as a set of relations, for `i ∈ {1, . . . , m}`,


    ![$$ {a}_{i1}{x}_{i1}+{a}_{i2}{x}_{i2}+\dots +{a}_{in}{x}_{in}\ge {b}_i $$](A457410_1_En_2_Chapter_IEq1.gif),
    or ![$$ \le {b}_i $$](A457410_1_En_2_Chapter_IEq2.gif), or ![$$ ={b}_i $$](A457410_1_En_2_Chapter_IEq3.gif)


    or some equivalent algebraic form.


    In this chapter, we consider problems where the natural formulation is such a
    linear continuous model.


    ## 2.1 Mixing


    The canonical linear programming example is the diet problem, one of the first
    optimization problems to be studied in the thirties and forties (twentieth century,
    not twenty-first[¹](#A457410_1_En_2_Chapter.html#Fn1)). The likely apocryphal
    origin of the problem is the US military’s desire to meet the nutritional requirements
    of the field GIs while minimizing the cost of the food. One of the early researchers
    to study this problem was George Stigler. He made an educated guess of the optimal
    solution to the linear program using a heuristic method. In the fall of 1947,
    Jack Laderman of the Mathematical Tables Project of the National Bureau of Standards
    (NBS, today NIST) undertook solving Stigler’s model with the new simplex method.
    The linear model consisted of nine equations in 77 unknowns, a huge problem for
    the time. Some models in this book are orders of magnitude larger and will be
    solved in a minuscule fraction of the time it took the NBS people to solve the
    diet problem in 1947. The increase in efficiency is partly due to the hardware,
    but mostly due to the software.


    A generic version of the problem is:


    - Given a list of food with some nutritional content, each with a cost, find the
    combination of food that will minimize cost and yet provide all the necessary
    nutrients.


    Here is one simple version of this problem. The foods are `F0`, `F1`, `F2`, `F3`,
    etc. (Imagine them to be pizza, ramen noodles, cupcakes, chips, etc. or, if you
    are of a more health-conscious bent, tofu, green peas, quinoa, beets, etc.) The
    nutrients will be represented by `N0`, `N1`, `N2`, `N3`, etc. (Imagine them to
    be calories, protein, calcium, vitamin A, etc.). Each has a cost per serving.
    In addition, to avoid eating one food all week long, let’s restrict the number
    of servings per week.


    A randomly generated instance is given in Table [2-1](#A457410_1_En_2_Chapter.html#Tab1).[²](#A457410_1_En_2_Chapter.html#Fn2)
    Each row represents a food, with the nutritional content per serving followed
    by the acceptable range of servings of the food and its cost per serving. Ignore
    the last row and column for now. We will return to them after the model is constructed
    and solved. The two rows before last represent the allowed range of each nutrient.


    **Table 2-1** Example of Data and Solution for the Diet Problem


    |   | N0 | N1 | N2 | N3 | Min | Max | Cost | Solution |

    |---|----|----|----|----|-----|-----|------|---------|

    | F0 | 606 | 563 | 665 | 23 | 7 | 17 | 9.06 | 17.0 |

    | F1 | 68 | 821 | 83 | 72 | 6 | 27 | 8.42 | 7.47 |

    | F2 | 28 | 70 | 916 | 56 | 1 | 36 | 9.47 | 6.11 |

    | F3 | 121 | 429 | 143 | 38 | 14 | 26 | 6.97 | 14.0 |

    | F4 | 60 | 179 | 818 | 46 | 9 | 35 | 4.77 | 35.0 |

    | Min | 5764 | 28406 | 48157 | 1642 |   |   |   |   |

    | Max | 15446 | 76946 | 82057 | 6280 |   |   |   |   |

    | Sol | 14775 | 28406 | 48157 | 3413 |   |   | 539.37 |   |'
