- fmt: '# 7.3 Staff Scheduling


    Staff scheduling is not one problem but a vast array of problems, each with its
    own set of requirements and quirks. I will discuss one interesting variation.
    It involves assigning instructors to course sections. The main characteristic
    of this problem, which makes it interesting, is the handling of instructor preferences.


    Here is the generic situation: course sections have been assigned meeting times
    during the week. For instance, `MOR142` is worth three credits; Section 1 meets
    Monday, Wednesday, and Friday from 9:00 to 10:00 while section 2 meets Tuesday
    and Thursday from 9:00 to 10:30. Each of these sections needs one instructor.
    There are dozens of these sections for various courses, each with assigned times
    and credits, requiring instructors.


    On the other hand, we have a set of instructors, some full time who will teach
    a fixed number of credits, and some part time who can teach up to a certain number
    of credits. Moreover, no instructor has managed to clone himself in order to teach
    two parallel sections offered at the same times. These are hard constraints.


    In addition, each instructor has expressed preferences (or dislikes) for certain
    courses (course preferences), and days or times (we will call these preference
    sets). For instance, we could have a set of "Sections offered on Monday, Wednesday,
    Friday" and another one of "Sections meeting at night." The instructor could give
    a weighted thumbs up (or down) to each set.


    If these were all the required constraints, then the model would simply be that
    of an assignment problem. But real scheduling is never, ever, as trivial as assignments.
    So let''s consider one additional constraint.


    This is where it gets interesting: each instructor has also indirectly expressed
    preferences (or dislikes) to pairs of sections. For instance there could be an
    abstract pair "A section meeting on Monday night and another one meeting on Tuesday
    morning" or "A section meeting, followed within an hour by another meeting." One
    can easily imagine why an instructor might want to avoid (or might prefer) to
    have back-to-back section meetings.


    To illustrate, let''s assume an instance where all these preferences and preferences
    pairs have been processed and expressed in their simplest form in Table 7-8, Table
    7-9, and Table 7-11. A good deal of preprocessing might be required to extract
    the data and format it in these tables, but this is not currently our concern.


    In Table 7-8, the first column is an ordinal indicating the section while the
    second indicates the course. In our example, the first two rows might correspond
    to the first two sections of `MOR142`. The third column is an indication of the
    time (time 12 might be Monday, Wednesday, and Friday at 9:00).


    **Table 7-8** List of Sections Offered


    | Id | Course Id | Meeting Time |

    | --- | --- | --- |

    | 0 | 0 | 12 |

    | 1 | 0 | 19 |

    | 2 | 1 | 11 |

    | 3 | 1 | 12 |

    | 4 | 2 | 11 |

    | 5 | 3 | 16 |

    | 6 | 3 | 2 |

    | 7 | 3 | 7 |

    | 8 | 4 | 17 |

    | 9 | 5 | 1 |

    | 10 | 5 | 20 |

    | 11 | 5 | 20 |

    | 12 | 6 | 13 |

    | 13 | 6 | 4 |

    | 14 | 6 | 1 |


    In Table 7-9 the first column is the ordinal identification of the instructor,
    followed by the course load range. The third column has the preferences (positive
    integer) or dislikes (negative integer) of the instructor for each of the courses,
    in the order of Table 7-8. The fourth column holds the preferences corresponding
    to the sets to which sections belong in the order of Table 7-10. The last column
    is the preference for the pairs found in Table 7-11.


    **Table 7-9** List of Preferences of Each Instructor


    | Id | Load | Course Weights | Set Weights | Pair Weights |

    | --- | --- | --- | --- | --- |

    | 0 | { 2; 3 } | { 0; 2; 0; 0; 0; 0; -4 } | { 0; 0; 7; -5; -6; 0 } | { 0; 0 }
    |

    | 1 | { 2; 2 } | { 0; 3; 2; 0; 0; 10; 0 } | { 0; 0; 0; 8; 4; 9 } | { 0; 8 } |

    | 2 | { 1; 3 } | { 2; -2; 2; 0; 8; -2; 2 } | { 0; 0; 0; 0; 0; 9 } | { 0; 0 } |

    | 3 | { 1; 2 } | { 3; 0; 0; 0; 9; -2; -4 } | { 0; 7; 9; 0; 0; 0 } | { 0; 0 } |

    | 4 | { 2; 2 } | { 0; -10; 1; 0; 0; 0; -6 } | { 0; -1; 3; 10; -6; 0 } | { 0; -7
    } |


    Table 7-10 lists the sections corresponding to each preference set.


    **Table 7-10** List of Preferences Sets


    | Id | Sections |

    | --- | --- |

    | 0 | { 0; 7; 8; 9; 11; 14 } |

    | 1 | { 0; 1; 2; 7; 9; 11; 12 } |

    | 2 | { 0; 2; 5; 6; 10; 11 } |

    | 3 | { 1; 3; 6; 8; 13; 14 } |

    | 4 | { 1; 4; 5; 7; 10 } |

    | 5 | { 0; 2; 5; 7; 8; 11; 12 } |


    Finally, Table 7-11 lists the sections corresponding to each preference set.


    **Table 7-11** List of Preferences Pairs


    | Id | Section Pairs |

    | --- | --- |

    | 0 | { (3 7); (9 12); (10 14) } |

    | 1 | { (10 11); (11 13); (11 14) } |


    ## 7.3.1 Constructing a Model


    We will describe the model in stages.


    ### 7.3.1.1 Decision Variables


    What we need to decide in this problem is which instructor to assign to which
    section. So, clearly by now, the decision variable could be binary, indexed by
    the set of instructors `I` and the set of sections `S` as


    ```

    x_{i,j} ∈ {0,1} ∀ i ∈ I; ∀ j ∈ S,

    ```


    where `x[13,61] = 1` indicates that instructor id 13 is assigned to section id
    61.


    We will likely need a considerable number of auxiliary variables to construct
    a readable model. Let''s start on the constraints and introduce the auxiliaries
    as need be.


    ### 7.3.1.2 Constraints


    Each section needs to be assigned at most one instructor,


    ```

    ∑_i x_{i,j} ≤ 1 ∀ j ∈ S

    ```


    Each instructor must be assigned a number of courses within a certain range, say
    `[L[i], U[i]]`,


    ```

    L_i ≤ ∑_i x_{i,j} ≤ U_i ∀ j ∈ I

    ```


    Now for the no-cloning constraint, that is, each instructor can be busy with at
    most one section per meeting time. Assume that the set of meeting times is `T`,
    then


    ```

    ∑_{j: T_j = t} x_{i,j} ≤ 1 ∀ j ∈ T,

    ```


    where `T[j]` is the meeting time of section `j`.'
  raw: '## 7.3 Staff Scheduling


    Staff scheduling is not one problem but a vast array of problems, each with its
    own set of requirements and quirks. I will discuss one interesting variation.
    It involves assigning instructors to course sections. The main characteristic
    of this problem, which makes it interesting, is the handling of instructor preferences.


    Here is the generic situation: course sections have been assigned meeting times
    during the week. For instance, MOR142[⁸](#A457410_1_En_7_Chapter.html#Fn8) is
    worth three credits; Section 1 meets Monday, Wednesday, and Friday from 9:00 to
    10:00 while section 2 meets Tuesday and Thursday from 9:00 to 10:30. Each of these
    sections needs one instructor. There are dozens of these sections for various
    courses, each with assigned times and credits, requiring instructors.


    On the other hand, we have a set of instructors , some full time who will teach
    a fixed number of credits, and some part time who can teach up to a certain number
    of credits. Moreover, no instructor has managed to clone himself in order to teach
    two parallel sections offered at the same times. These are hard constraints.


    In addition, each instructor has expressed preferences (or dislikes) for certain
    courses (course preferences), and days or times (we will call these preference
    sets). For instance, we could have a set of “Sections offered on Monday, Wednesday,
    Friday” and another one of “Sections meeting at night.” The instructor could give
    a weighted thumbs up (or down) to each set.


    If these were all the required constraints, then the model would simply be that
    of an assignment problem. But real scheduling is never, ever, as trivial as assignments.
    So let’s consider one additional constraint.


    This is where it gets interesting: each instructor has also indirectly expressed
    preferences (or dislikes) to pairs of sections . For instance there could be an
    abstract pair “A section meeting on Monday night and another one meeting on Tuesday
    morning” or “A section meeting, followed within an hour by another meeting.” One
    can easily imagine why an instructor might want to avoid (or might prefer) to
    have back-to-back section meetings.


    To illustrate, let’s assume an instance where all these preferences and preferences
    pairs have been processed and expressed in their simplest form in Table [7-8](#A457410_1_En_7_Chapter.html#Tab8)
    for the sections, Table [7-9](#A457410_1_En_7_Chapter.html#Tab9), and Table [7-11](#A457410_1_En_7_Chapter.html#Tab11).
