- fmt: '#### 6.2.1.4 Executable Model


    Let’s translate this into an executable model, shown in Listing [6-2](#A457410_1_En_6_Chapter.html#Par41).
    The function accepts a three-dimensional array `C` of costs on arcs for each commodity.
    It also accepts capacities in `D` that can be either a scalar, indicating the
    same capacity on all arcs, or a two-dimensional array to specify a capacity per
    arc. Finally, it accepts parameter `Z` to indicate, if `True`, that we must solve
    this as an integer program because the elements transported by the network are
    indivisible. If `False`, we are accepting fractional solutions. The reason for
    this last parameter is that accepting fractional solutions, while it accelerates
    the process tremendously, may still produce integral solutions.


    ```

    1  def solve_model(C,D=None,Z=False):

    2    s = newSolver(''Multi-commodityumincostuflowuproblem'', Z)

    3    K,n = len(C),len(C[0])-1,

    4    B = [sum(C[k][-1][j] for j in range(n)) for k in range(K)]

    5    x = [[[s.IntVar(0,B[k] if C[k][i][j] else 0,") \

    6         if Z else s.NumVar(0,B[k] if C[k][i][j] else 0,") \

    7         for j in range(n)] for i in range(n)] for k in range(K)]

    8    for k in range(K):

    9      for i in range(n):

    10        s.Add(C[k][i][-1] - C[k][-1][i] ==

    11             sum(x[k][i][j] for j in range(n)) - \

    12             sum(x[k][j][i] for j in range(n)))

    13    if D:

    14     for i in range(n):

    15       for j in range(n):

    16         s.Add(sum(x[k][i][j] for k in range(K)) <= \

    17              D  if type(D) in [int,float] else D[i][j])

    18    Cost = s.Sum(C[k][i][j]*x[k][i][j] if C[k][i][j] else 0\

    19         for i in range(n) for j in range(n) for k in range(K))

    20    s.Minimize(Cost)

    21    rc  = s.Solve()

    22    return  rc,ObjVal(s),SolVal(x)

    Listing 6-2

    Multi-Commodity Flow Model (multi_commodityflow.py)

    ```


    This code is essentially identical to the transshipment code, with some practical
    embellishments. The decision variable now has three dimensions instead of two:
    the first one indicating which commodity, and the last two, as usual, the arc.
    Moreover, if the parameter `Z` is `True`, it is defined as an integer variable.
    The reason for the choice is that, for a very large number of networks (the vast
    majority, in fact) and multicommodity flow problems, the variables can be declared
    as continuous and yet, if all demands, supplies, and capacity are integral, so
    will the solution be. The modeler who is faced with long runtimes should try to
    relax the integrality constraint. It might very well be integral, saving oodles
    of CPU cycles. The conditions under which solutions will be integral are complex
    and difficult to verify ahead of time, which is why, for practical purposes, it
    is easier to try a continuous solver and adjust if the solution is not practical.


    The solution to this simple problem is shown in Table [6-5](#A457410_1_En_6_Chapter.html#Tab5).
    And, in fact, it was solved as a continuous problem.


