    一种在垃圾食品中非常流行的成分是通过精炼和混合各种油类制造的。这些油有五种口味（`O1`到`O5`）和“硬度”指标，如表 2-6 所示，其中成本以美元/吨计，硬度以适当单位计量。


    表 2-6


    需要标题


    |   | O1 | O2 | O3 | O4 | O5 |

    | 成本 | 110 | 120 | 130 | 110 | 115 |

    | 硬度 | 8.8 | 6.1 | 2.0 | 4.2 | 5.0 |


    油`O1`和`O2`可以在生产设施 A 中精炼，该设施每月产能为 200 吨，而`O3`、`O4`和`O5`可以在生产设施 B 中精炼，该设施每月产能为 250
    吨。精炼过程中没有重量损失，并且可以忽略该过程的成本。


    最终产品是通过混合不同数量的五种油获得的。它有一个硬度限制。使用与表中相同的单位测量，它必须介于 3 和 6 个单位之间。假设硬度是线性混合的。也就是说，如果我们混合
    10 吨`O1`油和 20 吨`O2`油，混合物的硬度评级为：


    ![$$ \left(10\times 8.8+20\times 6.1\right)/\left(10+20\right) $$](img/A457410_1_En_2_Chapter_Equp.gif)


    最终产品的售价为每吨 150 美元。应如何精炼和混合这些油以最大化利润？

