    \ satisfies a requirement of the form “No PTE working if no FTE are working” (assuming\
    \ that Qi > 0, of course).  \n2.  FTE must work: A possibly more realistic requirement\
    \ is that, given a pool of P of full-time employees (FTE) , we require that they\
    \ all work. Only if the staffing requirements cannot be met should we involve\
    \ part-time staff. This is accomplished by\n\n    ![$$ \\sum \\limits_{i\\in {N}_f}{x}_i=P\
    \ $$](A457410_1_En_6_Chapter_Equ7.gif)\n\n    (6.7) This constraint will be infeasible\
    \ unless the number of full-time workers is below or at the staffing needs, of\
    \ course.  \n3.  No PTE if no FTE present: Consider a particular time interval,\
    \ say 10AM to noon. Say it can be staffed by full-time shift 1 and 2 and also\
    \ by part-time shift 6\\. We want to ensure that x [6] is zero unless either x\
    \ [1] or x [2] is non-zero. As a first attempt, let’s try\n\n    ![$$ {x}_1+{x}_2\\\
    ge {x}_6 $$](A457410_1_En_6_Chapter_Equ8.gif)\n\n    (6.8) This ensures that if\
    \ there are no full-time staff in either full-time shift, then there will be no\
    \ part-time staff either. But it constrains the problem more than necessary because\
    \ it prevents the number of part-time staff to exceed the full-time staff. What\
    \ we need is to scale up the left-hand side of equation (6.8) by some “large enough”\
    \ constant. This is again an instance of the technique optimizers call the big-M\
    \ method. How large is large enough? The sum of the required staff is surely enough\
    \ and yet not so large as to cause numerical problem. Therefore,\n\n    ![$$ \\\
    sum \\limits_{j\\in T}{R}_j\\sum \\limits_{i\\in {N}_f}{M}_{t,i}{x}_i\\ge \\sum\
    \ \\limits_{i\\in {N}_p}{M}_{t,i}{x}_i\\forall t\\in T $$](A457410_1_En_6_Chapter_Equ9.gif)\n\
    \n    (6.9) For each time interval, equation (6.8) sums, on the left, the number\
    \ of full-time workers , scaled up by a large constant. On the right it sums the\
    \ number of part-time workers."
  trans: "\n# 6.3 人员配置水平\n\n这个问题通常被优化师称为排班问题。但这其实是一个严重的误称，因为最终产生的并非排班表，而仅仅是需求水平。从业者所熟知的真正排班问题，其复杂程度要高数个数量级。因此，我们将此问题称为人员配置水平问题。\n\
    \n情况如下：我们有一个网格，其中一个维度按时间间隔索引。这个网格最常见的形式是按天（周一、周二）或按小时（上午 8 点、上午 9 点）划分，但也可以是任何有效的时间单位。在另一个维度上，是我们通常所说的班次，即工人工作时间的单位（周一至周五、周二至周日，或上午\
    \ 8 点至下午 4 点、上午 9 点至下午 5 点）。每个时间间隔都对应着人员配置需求（例如周一需要 45 人，或中午需要 62 人）。最后，每个班次还关联着一个成本。示例见表\
    \ 6-7。\n\n**表 6-7** 人员配置需求矩阵\n\n| | 班次 0 | 班次 1 | 班次 2 | 班次 3 | 班次 4 | 班次 5 |\
    \ 班次 6 | 需求 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 00 时\
    \ | 1 | | | 1 | | | | 15 |\n| 02 时 | 1 | | | | | 1 | | 17 |\n| 04 时 | 1 | | |\
    \ | | 1 | | 16 |\n| 06 时 | 1 | 1 | | | | | | 17 |\n| 08 时 | | 1 | | | | | 1 |\
    \ 19 |\n| 10 时 | | 1 | | | | | 1 | 18 |\n| 12 时 | | 1 | 1 | | | | | 11 |\n| 14\
    \ 时 | | | 1 | | | | | 12 |\n| 16 时 | | | 1 | | | | | 15 |\n| 18 时 | | | 1 | 1\
    \ | | | | 14 |\n| 20 时 | | | | 1 | 1 | | | 20 |\n| 22 时 | | | | 1 | 1 | | | 18\
    \ |\n| 成本 | $69.37 | $67.03 | $64.55 | $72.06 | $29.24 | $21.67 | $24.52 | |\n\
    \n请注意，示例中包含两种类型的班次：全职（八小时）和兼职（四小时）。成本和每班次的工作时长不同，因为通常全职员工的薪酬高于兼职员工。目标是在满足需求并确保全职员工获得优先待遇的前提下，以最低总成本确定每个班次的工作人数。这种优先待遇可以有多种形式。可以是简单的“若无全职员工工作，则不安排兼职员工”，或“每个全职班次必须至少有\
    \ x 人”，或“我们有一个由 x 名全职员工组成的固定团队必须工作；其余需求由兼职员工填补”。我们将讨论这些约束条件的一些可能变体。\n\n请注意，此问题的解决方案仅确定每个班次的人员配置水平。这并不是一个排班表。真正的排班表，即哪个工人上哪个班次，则留待另一个更复杂的模型来处理。\n\
    \n读者在此应注意到优化师处理复杂问题的一种常见方法：分解。表 6-7 最后一列显示的人员配置需求，很可能是由某个模型得出的。而配置水平将由我们正在创建的模型生成。最后，真正的排班表将由另一个模型生成。这种方法不太可能产生全局最优解。然而，它在所有行业中都有应用。航空业因分解问题而臭名昭著。我们之所以用这种方式处理复杂问题，有两个原因：一个好的原因和一个坏的原因。\n\
    \n好的原因是，通常从技术上解决整个问题并不可行。我们当然可以编写整个问题的模型，但在太阳系消亡之前，没有求解器能找到解决方案。同一原因的另一个方面是，整个问题的一部分最好建模为整数规划，而另一部分则用约束规划简单得多。目前还没有完全令人满意的方法来编写这种混合模型。⁵\
    \ 第二个原因，即坏的原因，是即使在某些更全面的方法可行的情况下，组织内部也存在巨大的惯性，阻碍其实施。⁶\n\n### 6.3.1 构建模型\n\n该模型将分阶段进行描述。\n\
    \n#### 6.3.1.1 决策变量\n\n在此问题中，我们需要决定每个班次需要多少人工作。由于全职和兼职班次之间存在区别，区分全职员工（FTE）和兼职员工（PTE）可能是有用的。因此，假设\
    \ `N[f]` 和 `N[p]` 分别代表全职和兼职班次的集合，\n\n```\nx_i ∈ [0,1,2,…] ∀ i ∈ N_f ∪ N_p =: N\n\
    ```\n\n#### 6.3.1.2 目标函数\n\n目标很简单，因为我们有每个班次的成本 `C[i]`，\n\n```\nmin ∑_{i∈N} C_i\
    \ x_i\n```\n\n#### 6.3.1.3 约束条件\n\n让我们通过查看一个特定的时间间隔（例如 06:00，需求为 17 人）来处理人员配置需求。如果班次\
    \ 0 覆盖午夜至上午 8 点，班次 1 覆盖上午 6 点至下午 2 点，那么这两个班次（且仅这两个班次）必须共同拥有至少 17 人来满足上午 6 点的需求。用代数式表示为：\n\
    \n```\nx_0 + x_1 ≥ 17\n```\n\n现在，更一般地，考虑一个矩阵 `M[T×N]`，其中 `T` 是时间间隔的集合，其结构如表 6-7\
    \ 所示（不含最后一行和最后一列）。我们需要的是，对于每个时间间隔 `t`，覆盖 `t` 的 `x[i]` 之和至少达到所需的需求 `R[t]`。用代数式表示为：\n\
    \n```\n∑_{i∈N} M_{t,i} x_i ≥ R_t ∀ t ∈ T\n```\n\n(6.6)\n\n这对于最简单的人员配置水平模型来说已经足够了。如果全职和兼职之间没有区别，我们就完成了。现在让我们考虑一些现实的约束条件。\n\
    \n1.  **最低全职员工数量**：如果我们要求每个全职班次 `i` 至少有 `Q[i]` 人工作，我们可以添加：\n\n   ```\n   x_i ≥\
    \ Q_i ∀ i ∈ N_f\n   ```\n\n   由于班次的结构（全职班次覆盖所有时间间隔），此约束也满足了“若无全职员工工作，则不安排兼职员工”的要求（当然，假设\
    \ `Q_i > 0`）。\n\n2.  **全职员工必须工作**：一个可能更现实的要求是，给定一个由 `P` 名全职员工组成的固定团队，我们要求他们都工作。只有当人员配置需求无法满足时，才应动用兼职员工。这可以通过以下方式实现：\n\
    \n   ```\n   ∑_{i∈N_f} x_i = P\n   ```\n\n   (6.7) 当然，除非全职员工人数低于或等于人员配置需求，否则此约束将不可行。\n\
    \n3.  **若无全职员工，则不安排兼职员工**：考虑一个特定的时间间隔，例如上午 10 点至中午。假设它可以由全职班次 1 和 2 以及兼职班次 6 来配置人员。我们希望确保除非\
    \ `x[1]` 或 `x[2]` 非零，否则 `x[6]` 为零。作为首次尝试，让我们试试：\n\n   ```\n   x_1 + x_2 ≥ x_6\n\
    \   ```\n\n   (6.8) 这确保了如果两个全职班次都没有全职员工，那么也不会有兼职员工。但它对问题的约束超出了必要，因为它阻止了兼职员工数量超过全职员工数量。我们需要的是用某个“足够大”的常数来缩放方程\
    \ (6.8) 的左侧。这又是优化师称之为大 M 法的一个实例。多大才算足够大？所需员工的总和肯定足够，但又不会大到引起数值问题。因此，\n\n   ```\n\
    \   ∑_{j∈T} R_j ∑_{i∈N_f} M_{t,i} x_i ≥ ∑_{i∈N_p} M_{t,i} x_i ∀ t ∈ T\n   ```\n\
    \n   (6.9) 对于每个时间间隔，方程 (6.8) 在左侧对全职员工数量求和，并用一个大常数进行缩放。在右侧，它对兼职员工数量求和。\n"
- fmt: "#### 6.3.1.4 Executable Model\n\nThe model will receive a time vs. shift 0-1\
    \ matrix `M`, exactly as in Table [6-4](#A457410_1_En_6_Chapter.html#Tab4), along\
    \ with the number of shifts considered full-time. This number will be equal to\
    \ the number of columns of `M` if the problem has no part-time staff. The last\
    \ column indicates minimal requirements for each time interval. The last row indicates\
    \ cost of one worker in the indicated shift.\n\nTo make this a more practical\
    \ model, it may be given an array `Q`, indexed by shifts indicating the minimum\
    \ number of people in each shift. It may also be given a scalar `P` of full-time\
    \ people who must work. Finally, it may also be given a flag `no_part` which,\
    \ if `True`, indicates that there will be no part-time people working unless full-time\
    \ people are present.\n\n```\n1  def solve_model(M,nf,Q=None,P=None,no_part=False):\n\
    2    s = newSolver('Staffing', True)\n3    nbt,n = len(M)-1,len(M[0])-1\n4   \
    \ B = sum(M[t][-1] for t in range(len(M)-1))\n5    x = [s.IntVar(0,B,\") for i\
    \ in range(n)]\n6    for t in range(nbt):\n7      s.Add(sum([M[t][i] * x[i] for\
    \ i in range(n)]) >= M[t][-1])\n8    if Q:\n9      for i in range(n):\n10    \
    \    s.Add(x[i]  >=  Q[i])\n11    if P:\n12      s.Add(sum(x[i] for i in range(nf))\
    \ >= P)\n13    if no_part:\n14      for t in range(nbt):\n15        s.Add(B*sum([M[t][i]\
    \ * x[i] for i in range(nf)]) \\\n16             >= sum([M[t][i] * x[i] for i\
    \ in range(nf,n)]))\n17    s.Minimize(sum(x[i]*M[-1][i] for i in range(n)))\n\
    18    rc  = s.Solve()\n19    return rc, ObjVal(s), SolVal(x)\nListing 6-4\nStaffing\
    \ model (staffing.py)\n```\n\nAfter extracting the number of time intervals, number\
    \ of shifts, and computing a bound for the decision variables on line 4, we define\
    \ our decision variable as a non-negative integer. The bound we use is clearly\
    \ valid as it is the sum of all required staff.\n\nWe implement the basic constraint\
    \ of equation (6.6) at line 7. Then, the three following `if` statements implement\
    \ the optional constraints of Minimum full-time staff, FTE must work, and No PTE\
    \ if no FTE present.\n\nResults of the basic constraint only are shown in Table\
    \ [6-8](#A457410_1_En_6_Chapter.html#Tab8) while setting the `no_part` flag to\
    \ `True` yields Table [6-9](#A457410_1_En_6_Chapter.html#Tab9). Note that, for\
    \ this example, the total number of people working has not changed, but the distribution\
    \ of people among shifts has changed, raising the total cost.\n\n**Table 6-9**\
    \  \nOptimal Solution with “No Part-Time Unless Full-Time” Constraint\n\n| $3225.47\
    \ | Shift 0 | Shift 1 | Shift 2 | Shift 3 | Shift 4 | Shift 5 | Shift 6 |\n| ---\
    \ | --- | --- | --- | --- | --- | --- | --- |\n| Nb:71 | 14 | 3 | 15 | 1 | 19\
    \ | 3 | 16 |\n\n**Table 6-8**  \nOptimal Solution to the Basic Staffing Level\
    \ Problem\n\n| $3187.84 | Shift 0 | Shift 1 | Shift 2 | Shift 3 | Shift 4 | Shift\
    \ 5 | Shift 6 |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| Nb:71 |\
    \ 15 | 2 | 15 | 0 | 20 | 2 | 17 |\n\n### 6.3.2 Variations\n\nWe have covered some\
    \ variations by implementing optional parameters already. There are as many other\
    \ variations as there are companies using staffing levels. The next step involves\
    \ transforming this into a real scheduling model, assigning specific people to\
    \ shifts. We will begin to tackle this later, but the reader is encouraged to\
    \ ponder ways to implement true scheduling.\n\n## 6.4 Job Shop Scheduling\n\n\
    A rather difficult problem to solve is the following: consider set of jobs `J`\
    \ to be performed on set of machines `M`. Each job requires some time on each\
    \ of the machines to perform a specific task and has an order in which the tasks\
    \ must be performed. You can think of building wooden toys. The wood needs to\
    \ be cut to shape, then sanded, then primed, then painted, then covered in lacquer.\
    \ Each of these tasks is accomplished by a different machine and requires a certain\
    \ duration, which depends on the toy. The word “machine” here is used in a rather\
    \ wide sense. It could indicate a highly trained worker at his station. It could\
    \ be a robot. The idea is the same. Moreover, not all jobs need all machines.\
    \ Some may require only a subset of the machines. The overall goal is to schedule\
    \ time on each machine to do all tasks while minimizing the overall time used.\n\
    \nThe small example we will use to illustrate this model is given in Table [6-10](#A457410_1_En_6_Chapter.html#Tab10).\n\
    \n**Table 6-10**  \nExample of Job Shop Scheduling (for Each Job, the Machine\
    \ and Duration of Tasks)\n\n| Job | Machine-Duration | Machine-Duration | Machine-Duration\
    \ |\n| --- | --- | --- | --- |\n| J0 | 1-10 | 2-10 | 0-10 |\n| J1 | 1-5 | 0-8\
    \ | 2-5 |\n| J2 | 2-5 | 1-9 | 0-9 |\n| J3 | 0-6 | 2-9 | 1-5 |\n\n### 6.4.1 Constructing\
    \ a Model\n\nSince we are given the order of the tasks for each job, it is not\
    \ part of the decision. The time at which a particular task is started for a given\
    \ job on a given machine is what we seek. We will therefore use a decision variable\
    \ indicating the starting time:\n\n`x_{ik} ∈ [0, ∞) ∀ i ∈ J, ∀ k ∈ M`\n\nWe are\
    \ not making the assumption that the durations are given as integers so that the\
    \ decision variable is continuous.\n\nThe first type of constraints puts a lower\
    \ bound on the starting times. Consider, say, that job 7 must use machine 4 for\
    \ 3 hours before it goes to machine 6, then the starting time is `x[74] + 3 ≤\
    \ x[76]`. In general, assuming that `p[i]` is the vector of order of machines\
    \ of job `i` (a permutation of 0, 1, 2, …, `M − 1`) with duration vector `d[i]`,\
    \ we are led to\n\n`x_{i p_{ik}} + d_{ik} ≤ x_{i p_{ik+1}} ∀ i ∈ J, ∀ k ∈ [0,\
    \ …, |M| − 2]`\n\nThe difficulty in this problem stems from enforcing that, at\
    \ any given time, there is at most one job per machine. It is acceptable for a\
    \ machine to be idle, though we will try to minimize idleness. How can we enforce\
    \ this constraint?\n\nOne way is to introduce an additional variable that will\
    \ indicate the relative order of jobs on a given machine. For instance,\n\n`z_{ijk}\
    \ ∈ {0, 1}, ∀ i, j ∈ J, ∀ k ∈ M`\n\nwith the interpretation that `z_{ijk} = 1`\
    \ if and only if job `i` precedes job `j` on machine `k`. Note that, as either\
    \ job `i` precedes job `j` or vice-versa,\n\n`z_{ijk} = 1 ⇔ z_{jik} = 0`\n\nWith\
    \ this variable we can try to enforce our difficult condition. Consider again\
    \ a simple example. Say that job 7 needs machine 2 for 3 hours and job 5 needs\
    \ it for 4 hours. Then either `x[72] + 3 ≤ x[52]`, indicating that job 5 cannot\
    \ start until job 7 has ended on machine 2, or else that `x[52] + 4 ≤ x[72]` indicating\
    \ the reverse temporal condition. This is a disjunction; we need one or the other\
    \ of the constraints to hold.\n\nUsing variables `z[ijk]` this condition can be\
    \ enforced by considering, for all jobs `i`, `j` and all machines `k`,\n\n```\n\
    z_{ijk} = 1 - z_{jik}\nx_{i p_{ik}} + d_{ik} - M z_{ij p_{ik}} ≤ x_{j p_{ik}}\n\
    x_{j p_{jk}} + d_{jk} - M z_{ji p_{jk}} ≤ x_{i p_{jk}}\n```\n\nfor some large\
    \ enough value `M`. Note that only one of the two `z[ijk]` or `z[jik]` will be\
    \ one. Hence exactly one of the two inequalities will be constraining. The other\
    \ will be vacuously satisfied.\n\nAll that is left is to deal with the objective\
    \ function. We want a schedule that will complete all jobs in the least amount\
    \ of time. We could add a bound to the end of each job and minimize that bound.\
    \ For instance,\n\n`x_{i p_{ik}} + d_{i p_{ik}} ≤ T ∀ i ∈ J, ∀ k ∈ [0, …, |M|\
    \ − 1]`\n\nwith objective\n\n`min T`\n\nwhere `T` will be the completion time\
    \ of the last task on the last machine."
  raw: '#### 6.3.1.4 Executable Model


    The model will receive a time vs. shift 0-1 matrix M, exactly as in Table [6-4](#A457410_1_En_6_Chapter.html#Tab4),
    along with the number of shifts considered full-time. This number will be equal
    to the number of columns of M if the problem has no part-time staff. The last
    column indicates minimal requirements for each time interval. The last row indicates
    cost of one worker in the indicated shift.


    To make this a more practical model, it may be given an array Q, indexed by shifts
    indicating the minimum number of people in each shift. It may also be given a
    scalar P of full-time people who must work. Finally, it may also be given a flag
    `no part` which, if `True`, indicates that there will be no part-time people working
    unless full-time people are present.


    ```

    1  def solve_model(M,nf,Q=None,P=None,no_part=False):

    2    s = newSolver(''Staffing'', True)

    3    nbt,n = len(M)-1,len(M[0])-1

    4    B = sum(M[t][-1] for t in range(len(M)-1))

    5    x = [s.IntVar(0,B,") for i in range(n)]

    6    for t in range(nbt):

    7      s.Add(sum([M[t][i] * x[i] for i in range(n)]) >= M[t][-1])

    8    if Q:

    9      for i in range(n):

    10        s.Add(x[i]  >=  Q[i])

    11    if P:

    12      s.Add(sum(x[i] for i in range(nf)) >= P)

    13    if no_part:

    14      for t in range(nbt):

    15        s.Add(B*sum([M[t][i] * x[i] for i in range(nf)]) \

    16             >= sum([M[t][i] * x[i] for i in range(nf,n)]))

    17    s.Minimize(sum(x[i]*M[-1][i] for i in range(n)))

    18    rc  = s.Solve()

    19    return rc, ObjVal(s), SolVal(x)

    Listing 6-4

    Staffing model (staffing.py)

    ```


    After extracting the number of time intervals, number of shifts, and computing
    a bound for the decision variables on line 4, we define our decision variable
    as a non-negative integer. The bound we use is clearly valid as it is the sum
