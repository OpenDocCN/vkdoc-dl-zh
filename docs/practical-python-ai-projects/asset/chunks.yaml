    \ × 3552 + 0.63 × 8088 = 6408`。\n\n**表 3-2**  \n在 `x ≥ 250` 条件下凸分段目标函数的最优解\n\n\
    | 区间 | 0 | 1 | 2 | 3 | 4 | 5 | 6 | 解 |\n| --- | --- | --- | --- | --- | --- |\
    \ --- | --- | --- |\n| `δ[i]` | 0.0 | 0.3704 | 0.6296 | 0.0 | 0.0 | 0.0 | 0.0\
