  trans: '

    ### 7.5.1 伪国际象棋问题


    作为热身，我们考虑一个指定大小为 `n` 的方形棋盘，希望在上面放置尽可能多的车，使得没有车能攻击到其他车。


    要回答的问题是“将车放在哪里才能避免攻击？”。因此，答案必须是一组被车占据的位置。由于棋盘是方形的，决策变量的一个明显表述是二维二进制变量数组。因此


    ![$$ {x}_{i,j}\forall i\in \left\{0,\dots, n-1\right\},\forall j\in \left\{0,\dots,
    n-1\right\}, $$](img/A457410_1_En_7_Chapter_Equai.gif)


    其中，如果 `x[2,5]` 为 1，则表示位置 `(2, 5)` 上有一个车。


    目标函数很简单：因为我们想放置尽可能多的车，所以我们对决策变量求和：


    ![$$ \sum \limits_i\sum \limits_j{x}_{i,j} $$](img/A457410_1_En_7_Chapter_Equaj.gif)


    那么，防止一个车攻击另一个车的约束条件是什么呢？车可以攻击同一列或同一行上的任何棋子。因此，我们需要每列和每行最多有一个车。这是一个我们很熟悉的约束：即“n
    选 1”约束，通过以下方式实现：


    ![$$ {\displaystyle \begin{array}{l}\sum \limits_i{x}_{i,j}\le 1\forall j\in \left\{0,\dots,
    n-1\right\},\\ {}\sum \limits_j{x}_{i,j}\le 1\forall i\in \left\{0,\dots, n-1\right\}\end{array}}
    $$](img/A457410_1_En_7_Chapter_Equak.gif)


    我们拥有了所有需要的要素。让我们将其转化为可执行代码。核心工作应由我们的 `k_out_of_n` 例程完成，并辅以几个实用函数：一个用于提取指定行的所有变量，另一个用于提取指定列的所有变量。这些实用函数见代码清单
    7-21。


    ```

    1  def get_row(x,i):

    2     return [x[i][j] for j in range(len(x[0]))]

    3  def  get_column(x,i):

    4     return [x[j][i] for j in range(len(x[0]))]

    代码清单 7-21

    列和行提取实用函数 (puzzle.py)

    ```


