    ### 6.2.2 Variations


    #### 6.2.2.1 All-Pairs Shortest Paths (Revisited)


    Why did I cover multi-commodity flows if they are such trivial modifications to
    transshipment? Because they are often used by twisting a problem to fit the structure
    of multi-commodity flows.[⁴](#A457410_1_En_6_Chapter.html#Fn4) Here is a simple
    example: remember the problem of finding the shortest paths between all pairs
    of nodes in a network? We did it by solving a sequence of the shortest paths model.
    It is possible to find all such paths by running a single multicommodity flow;
    better yet, it will never require an integrality constraint, ensuring a very short
    runtime.


    The trick is to consider every node to be a supplier of a particular commodity
    in quantity `n - 1`. And every node is also a consumer of the `n - 1` commodities
    provided by the other nodes. Listing [6-3](#A457410_1_En_6_Chapter.html#Par48)
    implements this approach. The code is slightly more general than that because
    it allows us to specify a set of source nodes for which we want emanating paths
    to all other nodes.


    Running the code on the identical problem to the all-pairs problem in Chapter
    [4](#A457410_1_En_4_Chapter.html) yields identical results. (See Table [4-11](#A457410_1_En_4_Chapter.html#Tab11)).
    The difference is that the flow code is much faster. It is, in fact, often much
    faster than running some specialized algorithm like Floyd-Warshall, which has
    a fixed complexity proportional to `n3`, while our flow problem is often solved
    in time proportional to `n`.


    ```

    1  def solve_all_pairs(D,sources=None):

    2    n,C = len(D),[]

    3    if sources is None:

    4     sources = [i for i in range(n)]

    5    for node in sources:

    6     C0 = [[0 if n in [i,j] else D[i][j] for j in range(n+1) ] \

    7         for i in range(n+1)]

    8     C0[node][-1] = n-1

    9     for j in range(n):

    10      if j!= node:

    11        C0[-1][j] = 1

    12      C.append(C0)

    13    rc,Val,x = solve_model(C)

    14    Paths = [[None for _ in range(n)] for _ in sources]

    15    Costs = [[0 for _ in range(n)] for _ in sources]

    16    if rc == 0:

    17      for source in sources:

    18       ix = sources.index(source)

    19       for target in range(n):

    20        if source != target:

    21          Path,Cost,node = [target],0,target

    22          while  Path[0] != source  and  len(Path)=0.1][0]

    24           Path.insert(0,v)

    25           Cost  +=  D[v][node]

    26           node = v

    27         Paths[ix][target] = Path

    28         Costs[ix][target] = Cost

    29    return rc, Paths, Costs

    Listing 6-3

    All-Pairs Shortest Paths via Multi-Commodity Flow

    ```


    Table [6-6](#A457410_1_En_6_Chapter.html#Tab6) shows the results of running the
    code and requesting the shortest paths emanating from nodes 0 and 2. The reader
    should see that the lengths are identical to those of Table [4-12](#A457410_1_En_4_Chapter.html#Tab12).


    **Table 6-6** Shortest Paths from Nodes 0 and Node 2 in the Example of Section
    4.4


