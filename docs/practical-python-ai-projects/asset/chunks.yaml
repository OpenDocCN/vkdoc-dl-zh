- fmt: '### 7.5.2 Sudoku


    The Sudoku puzzle is as follows: given a 9 by 9 grid, partially filled with numbers
    in the range 1 to 9, fill the rest of the grid such that:


    - Every row contains all numbers 1 to 9.

    - Every column contains all numbers 1 to 9.

    - Every 3 by 3 disjoint subgrid contains all numbers 1 to 9.


    We can represent a solution by specifying, for every grid position, which number
    is in there. So a simple decision variable is:


    ![$$ {x}_{i,j}\in \left\{1,\dots, 9\right\}\forall i\in \left[1,2,3\right]\forall
    j\in \left[1,2,3\right] $$](A457410_1_En_7_Chapter_Equal.gif)


    The constraints are interesting. Each one of them is of the form "Given a given
    set of nine positions, all numbers from 1 to 9 must appear." In constraint programming,
    this requirement is handled by a single functional call, usually named `all_different`.
    We will create a simplified equivalent constraint for Sudoku and improve it for
    the next puzzle.


    For every one of our variable `x[i,j]` we will create an array `v[k]^(ij)` of
    length 9 of binary variables. Each of these is an indicator for the value `k`.
    So that we add the constraint:


    ![$$ {x}_{i,j}={v}_1^{ij}+2{v}_2^{ij}+3{v}_3^{ij}+\dots +8{v}_8^{ij}+9{v}_9^{ij}
    $$](A457410_1_En_7_Chapter_Equ13.gif)


    (7.14)


    Then, for every set `S` of variables that need to be all different, we will ensure
    that the sum of the corresponding indicator variables sums to one.


    This is a feasibility problem so no objective function is required. Let''s create
    an executable model. We leverage our previously defined `get_row` and `get_column`
    to which we are adding a `get_subgrid`. See Listing [7-25](#A457410_1_En_7_Chapter.html#Par222).


    ```

    1  def get_subgrid(x,i,j):

    2    return [x[k][l] for k in range(i*3,i*3+3)\

    3                 for l in range(j*3,j*3+3)]

    4  def all_diff(s,x):

    5    for k in range(1,len(x[0])):

    6      s.Add(sum([e[k] for e in x]) <= 1)

    Listing 7-25

    Some Helper Functions for Sudoku (puzzle.py)

    ```


    The model implemented in Listing [7-26](#A457410_1_En_7_Chapter.html#Par225) accepts
    a grid of data with either a number or `None` to indicate that it must be filled.
    Most of the work is to create a clean set of decision variables in the loop from
    line 3 to line 14: a three-dimensional array indexed by the position on the grid
    for the first two dimensions. At index 0 in the third dimension is our real decision
    variable, holding the value that the grid will hold (either because it is data
    or after the solution process); each other index from 1 to 9 holds the corresponding
    indicator variable. As we create the variables we add the value constraint of
    equation (7.14) at line 9.


    After the variable declaration we call the `all_diff` function of each row, column,
    and subgrid. This function is a simple `k_out_of_n` for each value in the range
    1 to 9.


    ```

    1  def solve_sudoku(G):

    2    s,n,x  =  newSolver(''Sudoku'',True),len(G),[]

    3    for i in range(n):

    4      row=[]

    5      for j in range(n):

    6        if G[i][j] == None:

    7         v=[s.IntVar(1,n+1,")]+[s.IntVar(0,1,")\

    8                            for _ in range(n)]

    9         s.Add(v[0] == sum(k*v[k] for k in range(1,n+1)))

    10        else:

    11         v=[G[i][j]]+[0 if k!=G[i][j] else 1\

    12                   for k in range(1,n+1)]

    13        row.append(v)

    14      x.append(row)

    15    for i in range(n):

    16      all_diff(s,get_row(x,i))

    17      all_diff(s,get_column(x,i))

    18    for i in range(3):

    19      for j in range(3):

    20        all_diff(s,get_subgrid(x,i,j))

    21    rc  = s.Solve()

    22    return rc,[[SolVal(x[i][j][0]) for j in range(n)]\

    23             for i in range(n)]

    Listing 7-26

    Sudoku Model (puzzle.py)

    ```


    Finally, we return the grid values, not the 800 or so indicator variables. As
    an example, see Table [7-19](#A457410_1_En_7_Chapter.html#Tab19). The data are
    in bold.[^(14)](#A457410_1_En_7_Chapter.html#Fn14)


    **Table 7-19** Solution to a Sudoku Puzzle


    | 1 | 2 | 5 | 8 | 3 | 7 | 6 | 9 | 4 |

    | 4 | 7 | 6 | 2 | 1 | 9 | 8 | 3 | 5 |

    | 9 | 3 | 8 | 4 | 6 | 5 | 7 | 2 | 1 |

    | 8 | 6 | 3 | 7 | 4 | 1 | 9 | 5 | 2 |

    | 2 | 5 | 1 | 6 | 9 | 3 | 4 | 7 | 8 |

    | 7 | 4 | 9 | 5 | 8 | 2 | 1 | 6 | 3 |

    | 5 | 8 | 4 | 9 | 2 | 6 | 3 | 1 | 7 |

    | 6 | 1 | 2 | 3 | 7 | 4 | 5 | 8 | 9 |

    | 3 | 9 | 7 | 1 | 5 | 8 | 2 | 4 | 6 |


    ### 7.5.3 Send More Money!


    Here is a crypt-arithmetic puzzle, famous in the constraint programming community:
    Replace each of the letters `S`, `E`, `N`, `D`, `M`, `O`, `R`, `Y`, with a distinct
    digit from 0 to 9 such that the following sum is correct:


    ```

    SEND  +  MORE  =  MONEY

    ```


    There are two high-level constraints in this puzzle. The first is arithmetic:
    we need the equation to hold. We can do this by decomposing each integer into
    its place-value. `SEND` is a four-digit number (presumably in base ten) so it
    really is:


    ```

    S*1000 + E*100 + N*10 + D*1

    ```


    Each of `MORE` and `MONEY` is handled the same way. Then we constrain the equation
    to hold.


    The second constraint is the requirement that all letters receive a distinct digit.
    Here is another case where we could profitably use an `all_different` constraint,
    so let''s generalize what we did for the pseudo-chess models so that we can invoke
    `all_different` in any model. Our trick relies on each variable having an array
    of associated indicator variables, one for each potential integer value. So, in
    addition to our previously defined constraint, which we will slightly generalize,
    we need a routine for variable creation. This is the intent of `newIntVar` of
    Listing [7-27](#A457410_1_En_7_Chapter.html#Par234).


    ```

    1  def newIntVar(s, lb, ub):

    2    l=ub-lb+1

    3    x=[s.IntVar(lb, ub, ")]+[s.IntVar(0,1,") for _ in range(l)]

    4    s.Add(1 == sum( x[k] for k in range(1,l+1)))

    5    s.Add(x[0] == sum((lb+k-1)*x[k] for k in range(1,l+1)))

    6    return x

    7  def all_different(s,x):

    8    lb=min(int(e[0].Lb()) for e in x)

    9    ub=max(int(e[0].Ub()) for e in x)

    10    for v in range(lb,ub+1):

    11      all = []

    12      for e in x:

    13        if e[0].Lb() <= v <= e[0].Ub():

    14          all.append(e[1 + v - int(e[0].Lb())])

    15      s.Add(sum(all)  <=  1)

    16  def neq(s,x,value):

    17    s.Add(x[1+value-int(x[0].Lb())] == 0)

    Listing 7-27

    The General All-Different Structure and Constraint (puzzle.py)

    ```


    We notice that, although unstated, there is an additional assumption on `S` and
    `M`: they cannot take on value 0 if the numbers are truly four and five digits
    long. So we should constrain them to be non-zero. Not coincidentally, the data
    structure we have chosen for the `all_different` implementation allows us to trivially
    create a disequality as you see in function `neq` of Listing [7-27](#A457410_1_En_7_Chapter.html#Par234).


    Armed with this, we can now solve the puzzle. The implementation is shown in Listing
    [7-28](#A457410_1_En_7_Chapter.html#Par237). Its solution is shown in Table [7-20](#A457410_1_En_7_Chapter.html#Tab20).


    ```

    1  def solve_smm():

    2    s = newSolver(''Sendumoreumoney'',True)

    3    ALL = [S,E,N,D,M,O,R,Y] = [newIntVar(s,0,9) for k in range(8)]

    4    s.Add( 1000*S[0]+100*E[0]+10*N[0]+D[0]

    5         + 1000*M[0]+100*O[0]+10*R[0]+E[0]

    6         == 10000*M[0]+1000*O[0]+100*N[0]+10*E[0]+Y[0])

    7    all_different(s,ALL)

    8    neq(s,S,0)

    9    neq(s,M,0)

    10    rc = s.Solve()

    11    return rc,SolVal([a[0] for a in ALL])

    Listing 7-28

    Send More Money (puzzle.py)

    ```


    The reader can verify that the equation holds (9567 + 1085 = 10652).


    **Table 7-20** Solution to the Send More Money Puzzle


    | S | E | N | D | M | O | R | Y |

    | 9 | 5 | 6 | 7 | 1 | 0 | 8 | 2 |'
