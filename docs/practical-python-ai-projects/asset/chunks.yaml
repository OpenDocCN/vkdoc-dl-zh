  raw: 'A useful helper function is the sum, invoked as shown in Listing [7-39](#A457410_1_En_7_Chapter.html#Par317).


    ```

    s.Sum(LIST)

    Listing 7-39

    Sum Operator in OR-Tools

    ```


    Here `LIST` is any list (or tuple) of decision variables. This can be used, for
    instance, as shown in Listing [7-40](#A457410_1_En_7_Chapter.html#Par319).


    ```

    s.Add(s.Sum(x)  <=  100)

    Add(s.Sum(m[i][j] for i in range(M) for j in range(N))<= 100)

    Listing 7-40

    Examples of Sum in OR-Tools

    ```


    In addition to the constraints, a model usually has an objective function of either
    of the forms shown in Listing [7-41](#A457410_1_En_7_Chapter.html#Par321).


    ```

    s.Maximize(EXPR)

    s.Minimize(EXPR)

    Listing 7-41

    Objective Function Declarations in OR-Tools

    ```


    Here `EXPR` is any linear algebraic expression in the decision variables.


    To invoke the solver on the model created, see Listing [7-42](#A457410_1_En_7_Chapter.html#Par324).


    ```

    rc = s.Solve()

    Listing 7-42

    Solver Invocation in OR-Tools

    ```


    Here `rc` is the returned value and is zero if all goes well. It can be one of


    ```

    OPTIMAL

    FEASIBLE

    INFEASIBLE

    UNBOUNDED

    ABNORMAL

    NOT_SOLVED

    ```


    So, to be pedantic, one should check the return value against those defined constants
    but the programmers at Google have followed the decades-old tradition of returning
    zero when all goes well.[^(17)](#A457410_1_En_7_Chapter.html#Fn17)


    After a solve, one accesses the optimal value and optimal solution via the code
    in Listing [7-43](#A457410_1_En_7_Chapter.html#Par330).


    ```

    value = s.Objective().Value()

    varval = var.SolutionValue()

    Listing 7-43

    Optimal Value and Optimal Solution

    ```


    They are wrapped in the helper functions shown in Listing [7-44](#A457410_1_En_7_Chapter.html#Par332).


    ```

    value = ObjVal(s)

    xval = SolVal(x)

    Listing 7-44

    Wrapper Functions for Optimal Value and Solutions

    ```


    The returned variable `xval` will have the same dimensions as the parameter `x`.


    In addition, the wrapper library provides the following higher-level constraints
    shown in Listing [7-45](#A457410_1_En_7_Chapter.html#Par335).


    ```

    l = k_out_of_n(s,k,x,rel=''=='')

    l = sosn(solver,k,x,rel=''<='')

    delta = reify_force(s,a,x,b,delta=None,rel=''<='',bnds=None)

    delta = reify_raise(s,a,x,b,delta=None,rel=''<='',bnds=None,eps=1)

    delta = reify(s,a,x,b,d=None,rel=''<='',bnds=None,eps=1)

    Listing 7-45

    High-Level Constraints

    ```


    Here,


    *   `k_out_of_n` adds the necessary constraints to solver `s` so that exactly,
    at least, or at most (depending on `rel`) `k` (a positive integer) variables from
    the list `x` are allowed to be non-zero. It returns `l`, an array of binary variables
    of the same length as `x`.

    *   `sosn` adds the necessary constraints to solver `s` so that exactly, at least,
    or at most (depending on `rel`) `k` adjacent variables from the list `x` are allowed
    to be non-zero. It returns `l`, an array of binary variables of the same length
    as `x`.

    *   `reify_force` adds the necessary constraints to solver `s` so that the relation
    ![$$ \sum \limits_i{a}_i{x}_i\approx b $$](A457410_1_En_7_Chapter_IEq49.gif) is
    forced (for relation ![$$ \approx $$](A457410_1_En_7_Chapter_IEq50.gif) determined
    by `rel`) when `d` (a binary integer variable) is one. This last variable need
    not be declared ahead of the call to `reify_force`. It is returned whether created
    internally or not.

    *   `reify_raise` implements the opposite implication to `force`.

    *   `reify` calls both `force` and `raise` to implement an “if and only if” condition.


    It also provides the helper function.


    Next is Listing [7-46](#A457410_1_En_7_Chapter.html#Par344).


    ```

    bounds_on_box(a,x,b)

    Listing 7-46

    Bounds Extraction

    ```


    Here `bounds_on_box` finds the smallest and largest possible value of ![$$ \sum
    {a}_i{x}_i-b $$](A457410_1_En_7_Chapter_IEq51.gif) on the domain of variable `x`.


    A final constraint is the `all_different,` shown in Listing [7-47](#A457410_1_En_7_Chapter.html#Par347).


    ```

    all_different(s,x)

    Listing 7-47

    All_different Predicate

    ```


    Here `s` is the solver and `x` is a collection of decision variables of integer
    type. They all should have lower and upper bounds. It will enforce that no two
    of the decision variables will have the same value.


    Footnotes [1](#A457410_1_En_7_Chapter.html#Fn1_source)


    The expression column generation stemmed, in the minds of optimizers, as literal-minded
    as ever, from looking at the set of constraints as a matrix.


    [2](#A457410_1_En_7_Chapter.html#Fn2_source)


    The interested reader should look up “reduced cost” and “column generation of
    the cutting stock” to pursue these matters.


    [3](#A457410_1_En_7_Chapter.html#Fn3_source)


    Optimizers working in engineering or applied mathematics traditionally minimize
    convex functions. There is a whole area of research appropriately called convex
    analysis devoted to the theory of such problems. In contrast, optimizers in business
    usually maximize concave functions. The theory is the same, but everything is
    upside down. Maybe we should call one group the optimizers and the other the pessimizers?


    [4](#A457410_1_En_7_Chapter.html#Fn4_source)


    Yet another example of the sadly unimaginative naming tradition of optimizers.
    Maybe this explains it. My Ph.D. advisor, said, only half in jest: “Do not name
    your algorithms with interesting names if you ever want them to be known by your
    name.” The implication was that if one names his algorithms Alg-1 and Alg-2 or
    something equally pedestrian, colleagues will have no choice but to refer to them
    as Smith-star or Jonesrevised. Alas, such hope at posterity is belied by the use
    of SOS2 and other mutts of the same ilk.


    [5](#A457410_1_En_7_Chapter.html#Fn5_source)


    Though it is possible to model such constraints, it rarely makes much sense for
    continuous variables.


    [6](#A457410_1_En_7_Chapter.html#Fn6_source)


    From res (genitive rei), Latin for object. The unusually creative nomenclature
    is due not to optimizers but to computer scientists working in the related (some
    would say adversarial) field of constraint programming.


    [7](#A457410_1_En_7_Chapter.html#Fn7_source)


    The interested reader needs to research the branch-and-bound technique of integer
    programming.


    [8](#A457410_1_En_7_Chapter.html#Fn8_source)


    Mathematics of Operations Research, the umbrella title for the topics of this
    book.


    [9](#A457410_1_En_7_Chapter.html#Fn9_source)


    And priceless during the inevitable discussions with staff complaining vociferously
    that their preferences were not met. A modeler’s work is incomplete until the
    user accepts the solution.


    [10](#A457410_1_En_7_Chapter.html#Fn10_source)


    Think NBA if you are US American, NHL if Canadian, ARL if Australian, or EPL if
    you are the colonizer of the previous three.


    [11](#A457410_1_En_7_Chapter.html#Fn11_source)


    For the theoretically-minded, the primal-dual gap is smaller; optimality detection
    is easier.


    [12](#A457410_1_En_7_Chapter.html#Fn12_source)


    Actually, even with deep internal knowledge, it may be near impossible to tell.
    Trying the approach to see if it works is orders of magnitude easier than reading
    the entrails of current integer solvers. Written in C, or worse C++, they have
    layers upon layers of complex cut generation routines with subtle interactions,
    not to mention cruft accumulated over years of development and debugging.


    [13](#A457410_1_En_7_Chapter.html#Fn13_source)


    A rook attacks any piece in the same column or row, no matter the distance.


    [14](#A457410_1_En_7_Chapter.html#Fn14_source)


    I have run this code on over 20,000 puzzles. In most cases, the model runs in
    a small fraction of a second; occasionally it will take a few seconds.


    [15](#A457410_1_En_7_Chapter.html#Fn15_source)


    Raymond M. Smullyan, The Lady or the Tiger, and Other Logic Puzzles (Mineola,
    New York: Dover Publications, 2009).


    [16](#A457410_1_En_7_Chapter.html#Fn16_source)


    In general, for integer programs, it is very difficult to find all solutions,
    but it is possible for many practical cases.


    [17](#A457410_1_En_7_Chapter.html#Fn17_source)'
  trans: '

    一个有用的辅助函数是`sum`，其调用方式如清单 7-39 所示。


    ```

    s.Sum(LIST)

    Listing 7-39

    Sum Operator in OR-Tools

    ```


    其中`LIST`是任意决策变量列表（或元组）。该函数的用法示例如清单 7-40 所示。


    ```

    s.Add(s.Sum(x)  <=  100)

    Add(s.Sum(m[i][j] for i in range(M) for j in range(N))<= 100)

    Listing 7-40

    Examples of Sum in OR-Tools

    ```


    除了约束条件外，模型通常还包含目标函数，其形式如清单 7-41 所示。


    ```

    s.Maximize(EXPR)

    s.Minimize(EXPR)

    Listing 7-41

    Objective Function Declarations in OR-Tools

    ```


    其中`EXPR`是决策变量中的任意线性代数表达式。


    在已创建的模型上调用求解器的方法，请参见清单 7-42。


    ```

    rc = s.Solve()

    Listing 7-42

    Solver Invocation in OR-Tools

    ```


    其中`rc`是返回值，如果一切顺利，其值为零。返回值可以是以下之一：


    ```

    OPTIMAL

    FEASIBLE

    INFEASIBLE

    UNBOUNDED

    ABNORMAL

    NOT_SOLVED

    ```


    因此，严格来说，应该将返回值与这些定义的常量进行比较，但谷歌的程序员遵循了数十年的传统：当一切顺利时返回零。¹⁷


    求解后，通过清单 7-43 中的代码访问最优值和最优解。


    ```

    value = s.Objective().Value()

    varval = var.SolutionValue()

    Listing 7-43

    Optimal Value and Optimal Solution

    ```


    它们被封装在清单 7-44 所示的辅助函数中。


    ```

    value = ObjVal(s)

    xval = SolVal(x)

    Listing 7-44

    Wrapper Functions for Optimal Value and Solutions

    ```


    返回的变量`xval`将与参数`x`具有相同的维度。


    此外，包装库还提供了以下更高级别的约束，如清单 7-45 所示。


    ```

    l = k_out_of_n(s,k,x,rel=''=='')

    l = sosn(solver,k,x,rel=''<='')

    delta = reify_force(s,a,x,b,delta=None,rel=''<='',bnds=None)

    delta = reify_raise(s,a,x,b,delta=None,rel=''<='',bnds=None,eps=1)

    delta = reify(s,a,x,b,d=None,rel=''<='',bnds=None,eps=1)

    Listing 7-45

    High-Level Constraints

    ```


    其中：


    *   `k_out_of_n`：向求解器`s`添加必要的约束，使得列表`x`中恰好、至少或至多（取决于`rel`）有`k`（正整数）个变量允许非零。它返回一个与`x`长度相同的二元变量数组`l`。

    *   `sosn`：向求解器`s`添加必要的约束，使得列表`x`中恰好、至少或至多（取决于`rel`）有`k`个相邻变量允许非零。它返回一个与`x`长度相同的二元变量数组`l`。

    *   `reify_force`：向求解器`s`添加必要的约束，使得当`d`（一个二元整数变量）为 1 时，关系![$$ \sum \limits_i{a}_i{x}_i\approx
    b $$](img/A457410_1_En_7_Chapter_IEq49.gif)被强制成立（关系![$$ \approx $$](img/A457410_1_En_7_Chapter_IEq50.gif)由`rel`决定）。此变量`d`无需在调用`reify_force`之前声明。无论该变量是在内部创建还是外部传入，它都会被返回。

    *   `reify_raise`：实现与`force`相反的蕴含关系。

    *   `reify`：同时调用`force`和`raise`来实现“当且仅当”条件。


    它还提供了以下辅助函数。


    接下来是清单 7-46。


    ```

    bounds_on_box(a,x,b)

    Listing 7-46

    Bounds Extraction

    ```


    其中`bounds_on_box`在变量`x`的定义域上，找出![$$ \sum {a}_i{x}_i-b $$](img/A457410_1_En_7_Chapter_IEq51.gif)的最小值和最大值。


    最后一个约束是`all_different`，如清单 7-47 所示。


    ```

    all_different(s,x)

    Listing 7-47

    All_different Predicate

    ```


    其中`s`是求解器，`x`是整数类型决策变量的集合。所有变量都应具有下界和上界。该约束将强制确保任意两个决策变量的值都不相同。


    脚注 1


    列生成这一表述，在优化者（一如既往地字面化思维）看来，源于将约束集视为一个矩阵。


    2


    感兴趣的读者应查阅“reduced cost”和“column generation of the cutting stock”以深入了解这些问题。


    3


    从事工程或应用数学的优化者传统上最小化凸函数。有一个完整的研究领域，恰当地称为凸分析，专门研究此类问题的理论。相比之下，商业领域的优化者通常最大化凹函数。理论是相同的，但一切都颠倒了。也许我们应该称一组人为优化者，另一组为悲观者？


    4


    这是优化者令人遗憾的缺乏想象力的命名传统的又一个例子。也许这可以解释这一点。我的博士导师半开玩笑地说：“如果你希望你的算法以你的名字命名，就不要给它们起有趣的名字。”言下之意是，如果一个人把他的算法命名为
    Alg-1 和 Alg-2 或类似平淡无奇的名字，同事们将别无选择，只能称它们为 Smith-star 或 Jones-revised。唉，这种对身后名的希望被
    SOS2 和其他同类杂种的使用所否定。


    5


    尽管可以对这类约束进行建模，但对于连续变量来说，这通常意义不大。


    6


    源自 res（属格 rei），拉丁语中意为“对象”。这种异常有创意的命名法并非归功于优化者，而是归功于在相关（有人会说是对抗性的）约束编程领域工作的计算机科学家。


    7


    感兴趣的读者需要研究整数规划的分支定界技术。


    8


    运筹学数学，本书主题的总称。


    9


    在不可避免的与员工讨论中，当员工强烈抱怨他们的偏好没有得到满足时，这一点是无价的。在用户接受解决方案之前，建模者的工作尚未完成。


    10


    如果你是美国人，想想 NBA；如果是加拿大人，想想 NHL；如果是澳大利亚人，想想 ARL；如果你是前三个国家的殖民者，想想 EPL。


    11


    对于理论导向的人来说，原始-对偶间隙更小；最优性检测更容易。


    12


    实际上，即使有深入的内部知识，也可能几乎无法判断。尝试这种方法看看它是否有效，比阅读当前整数求解器的内部结构要容易几个数量级。这些求解器用 C 或更糟的 C++编写，具有层层叠叠的复杂割生成例程，它们之间存在微妙的相互作用，更不用说多年开发和调试积累的垃圾代码了。


    13


    车攻击同一列或同一行上的任何棋子，无论距离多远。


    14


    我已经在超过 20,000 个谜题上运行过这段代码。在大多数情况下，模型在零点几秒内运行完毕；偶尔会需要几秒钟。


    15


    Raymond M. Smullyan，《老虎与美女，及其他逻辑谜题》（纽约州米尼奥拉：多佛出版社，2009 年）。


    16


    一般来说，对于整数规划，找到所有解非常困难，但对于许多实际案例来说是可能的。


    17

