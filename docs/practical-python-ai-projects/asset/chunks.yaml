    4       for j in range(n)]

    5     Paths =[[None for i in range(n)] for j in range(n)]

    6     for start in range(n):

    7       for end in range(n):

    8         if start != end and Costs[start][end] is None:

    9           rc, Value, Path, Cost, Cumul = solve_model(D,start,end)

