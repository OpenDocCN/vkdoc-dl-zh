    #### 5.3.1.2 约束条件


    首先，我们需要在变量 `x[i,j]` 和 `y[j]` 之间建立关系，因为如果对于任意 `i`，`x[i,j]` 为 1，那么对应的 `y[j]` 必须等于
    1（表示使用了卡车 `j`）。另一种理解方式是，我们不能将包裹放入未使用的卡车中。你之前已经见过这种类型的约束。回想一下第 2 章第 2.1.2 节的饮食问题，其中一条约束是：“如果使用了食物
    2，那么饮食中必须至少包含等量的食物 3。”


    总体思路是确保一个变量受限于另一个变量或其倍数。在这种情况下，这个技巧建议使用


    ![$$ {x}_{i,j}\le {y}_i\forall i\in P,\forall j\in T $$](img/A457410_1_En_5_Chapter_Equ2.gif)


    (5.2)


    这确实满足我们的关系，尽管读者可能会觉得它相当浪费。确实，我们很快就会对这个尝试进行精简。顺便注意，我们还需要约束每辆卡车上包裹重量的总和。假设包裹 `i`
    的重量为 `w[i]`，卡车 `j` 的容量为 `W[j]`，我们需要


    ![$$ \sum \limits_{i\in P}{w}_i{x}_{i,j}\le {W}_j\forall j\in T $$](img/A457410_1_En_5_Chapter_Equ3.gif)


    (5.3)


    现在，当我们注意到类似约束的数量激增时，一个显而易见的问题是：“有没有办法将公式 (5.2) 和 (5.3) 结合起来？” 确实有：


    ![$$ \sum \limits_{i\in P}{w}_i{x}_{i,j}\le {W}_j{y}_j\forall j\in T $$](img/A457410_1_En_5_Chapter_Equ4.gif)


