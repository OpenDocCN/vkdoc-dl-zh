- fmt: 'After solving, we produce two arrays, each providing a distinct view of the
    solution. The first indicates, for each package, the loading truck. The second
    indicates, for each truck, the list of packages. The solution for our instance
    appears in Table [5-6](#A457410_1_En_5_Chapter.html#Tab6), `tab:` `bin_packing_results_bad`.
    The first table lists the trucks and their content indicated by a triple (weight
    class, package ordinal, weight). The second table lists each weight class, in
    the same order as Table [5-5](#A457410_1_En_5_Chapter.html#Tab5), with the truck
    in which each package of the class is loaded.


    **Table 5-6** Optimal Package Assignments (Naive Approach)


    | Weight | Truck Id |

    | --- | --- |

    | 258 | [0, 6, 2, 5, 3, 8, 7, 4] |

    | 478 | [3, 5, 6, 8, 4, 5, 4, 6, 7] |

    | 399 | [2, 0, 7, 8, 0, 3, 2] |


    Even for small instances, this code can take hours to produce a solution. Bin
    packing is not an easy problem and here is part of the reason why: notice that
    some truck numbers are omitted. The solver seems to choose trucks at random among
    those we allow. Also, the packages of a given weight class are randomly distributed
    among the trucks. Indeed, executing the same model on the same instance on a different
    computer or a different solver might very well produce a different answer (of
    course, with the same total number of trucks). The problem is that there are many
    solutions with exactly the same value. Imagine, for instance, swapping the entire
    contents of two trucks with the same capacity or swapping two packages of the
    same weight class within a truck, or between two trucks. These swaps will clearly
    have no effect on the value of the solution.


    In classical optimization terms, this situation is a form[⁶](#A457410_1_En_5_Chapter.html#Fn6)
    of degeneracy. Researchers in constraint programming talk[⁷](#A457410_1_En_5_Chapter.html#Fn7)
    of symmetry. It almost always affects the solver negatively. The runtime is difficult
    to predict because it is solver-dependent but it is rarely good. There is another
    reason to want to modify the model to avoid these identical solutions: we could
    produce nicer solutions for the user.


    Adding constraints favoring one optimal solution over another identical one (identical
    from our point of view) is known as symmetry breaking, which begins to explain
    the parameter `symmetry_break` in the code guarding the additional constraints.
    Let’s tackle these constraints, starting with the easiest first.


    How can we ensure that the trucks are chosen in order and none are skipped, assuming
    that they all have the same capacity? One way is to bind the truck selection variables
    pairwise:


    ![$$ {y}_{j-1}\le {y}_j\forall j\in T\backslash \left\{0\right\} $$](A457410_1_En_5_Chapter_Equj.gif)


    To see how this works, consider what happens to the `y` vector for, say, `y[5]`
    to be one. It must be that `y[4]` is one and, transitively, so must be `y[3]`,
    `y[2]`, `y[1]`, and `y[0]`. On the other hand, it has no effect on `y[6]` or higher.
    In terms of code, this is done in the loop at line 17.


    The second form of symmetry alluded to is interchangeable packages. The way we
    stated the problem, there is no difference between two packages in the same weight
    class. Yet, for the solver, swapping two packages within a truck or between two
    trucks is another potential solution, and any time spent looking in that direction
    is time wasted.


    Let’s consider how to break this symmetry by looking at a small example, say three
    packages and three trucks. The idea is that since the packages of a weight class
    are naturally ordered, we can force that they be loaded into trucks in their order.
    For instance, if the second package is loaded in truck one, then the third can
    only be loaded in truck one or higher. In terms of the decision variables, we
    want the following implications:


    ![$$ {\displaystyle \begin{array}{l}{x}_{0,2}=1\Rightarrow {x}_{1,2}=1\wedge {x}_{2,2}=1\\
    {}{x}_{0,1}=1\Rightarrow {x}_{1,1}+{x}_{1,2}=1\wedge {x}_{2,1}+{x}_{2,2}=1\\ {}{x}_{0,0}=1\Rightarrow
    {x}_{1,0}+{x}_{1,1}+{x}_{1,2}=1\wedge {x}_{2,0}+{x}_{2,1}+{x}_{2,2}=1\\ {}{x}_{1,2}=1\Rightarrow
    {x}_{2,2}=1\kern16em \wedge {x}_{0,0}+{x}_{0,1}+{x}_{0,2}=1\\ {}{x}_{1,1}=1\Rightarrow
    {x}_{2,1}+{x}_{2,2}=1\kern16em \wedge {x}_{0,0}+{x}_{0,1}=1\\ {}{x}_{1,0}=1\Rightarrow
    {x}_{2,0}+{x}_{2,1}+{x}_{2,2}=1\kern16em \wedge {x}_{0,0}=1\\ {}{x}_{2,2}=1\Rightarrow
    \kern10.25em \ \ {x}_{0,0}+{x}_{0,1}+{x}_{0,2}=1\wedge {x}_{1,0}+{x}_{1,1}+{x}_{1,2}=1\\
    {}{x}_{2,1}=1\Rightarrow \kern16em \ \ {x}_{0,0}+{x}_{0,1}=1\wedge {x}_{1,0}+{x}_{1,1}=1\\
    {}{x}_{2,0}=1\Rightarrow \kern16em \ \ \ \ \ \ \ \ \ \ \ \kern4em {x}_{0,0}=1\wedge
    {x}_{1,0}=1\end{array}} $$](A457410_1_En_5_Chapter_Equk.gif)


    You will see later (Section 7.2.3 in Chapter [7](#A457410_1_En_7_Chapter.html)
    on reification) a general way to implement these implications. For now, let’s
    try to implement them as simply as possible.


    The first implication says “If package 0 is loaded onto truck 2, then both packages
    1 and 2 must also be loaded onto truck 2.” But this is a boundary case because
    truck 2 is our last truck. The next implication is more interesting: “If package
    0 is loaded onto truck 1, then packages 1 and 2 must be loaded onto truck 1 or
    2.”


    In all generality, “If a package is loaded onto a given truck, then all packages
    with greater ordinal numbers must be loaded onto trucks of greater or equal ordinal
    numbers.” Notice that the constraint structure is that if some variable takes
    on value one, we must have an equation with right hand side one holding. The unit
    right hand side is our ticket, as we can use the conditioning variable as the
    right-hand side.


    Beware of over-constraining the model. Consider part of the second implication
    `x[0,1] = 1 ⇒ x[1,1] + x[1,2] = 1` and the following naive approach. If we use
    an equality, as in


    ![$$ {x}_{1,1}+{x}_{1,2}={x}_{0,1} $$](A457410_1_En_5_Chapter_Equl.gif)


    the model will likely fail because if `x0,1` is zero (for example if package 0
    is loaded onto truck 0 instead of 1), then we are preventing package 1 to be loaded
    onto trucks 1 or 2, which would be acceptable solutions. So the right constraint
    is


    ![$$ {x}_{1,1}+{x}_{1,2}\ge {x}_{0,1} $$](A457410_1_En_5_Chapter_Equm.gif)


    The right-hand side at zero trivializes the constraints as all variables on the
    left-hand side are non-negative; at one, it forces a correct assignment to a higher
    numbered truck. In more abstract terms, we have an inequality because we are implementing
    a logical implication, not a logical equivalence (a ⇒, not a ⇔). These constraints
    are implemented at line 27 of model 5.3.


    The right column of the implications can be read as “If package `i` is loaded
    onto truck `k`, then all packages with lower ordinal numbers must be loaded onto
    trucks with lower or equal ordinal numbers.” These constraints are mostly redundant,
    yet they can help some solvers under some conditions. The reader is encouraged
    to enable or disable some symmetry-breaking constraints and experiment.


    All these additional constraints reduce the search space. With some solvers, on
    some problems the approach will drastically reduce the execution time. With these
    symmetry-breaking constraints enabled by calling `solve_model` with the last parameter
    as `True`, the output on the same instance is shown in Tables [5-7](#A457410_1_En_5_Chapter.html#Tab7)
    and [5-8](#A457410_1_En_5_Chapter.html#Tab8). You see that all trucks used are
    consecutive from zero and that the packages are loaded in order, a much nicer
    solution. What you do not see by reading the table is that the runtime is a very
    small fraction of the runtime necessary for the same instance when the symmetry-breaking
    constraints are ignored.


    **Table 5-8** Optimal Package Assignments with Symmetry-Breaking Constraints'
