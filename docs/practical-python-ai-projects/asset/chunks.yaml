- fmt: '### 7.2.1 Selecting k Variables Out of n to Be Non-Zero


    Consider a situation where we have a set of n variables `x[i] ∈ [0, u[i]]` and
    we want to allow exactly k to be non-zero. For instance, if you are considering
    investing in various projects and are setting up a model to choose the best, say
    k of them. (If k = 1 we have the so-called SOS1 case.) We introduce n binary variables,
    `λ[i]`, and add the constraints


    ```

    x[i] ≤ u[i] * λ[i] ∀ i,

    ```


    (7.1)


    ```

    ∑ λ[i] = k

    ```


    (7.2)


    We replace the equality in equation (7.2) with `≤` if we want “at most” and with
    `≥` if we want “at least.” Since this occurs regularly in modeling, let’s create
    a general function that we might use within any given model. See Listing [7-7](#A457410_1_En_7_Chapter.html#Par59).


    ```

    1  def k_out_of_n(solver, k, x, rel=''==''):

    2    n = len(x)

    3    binary = sum(x[i].Lb() == 0 for i in range(n)) == n and \

    4           sum(x[i].Ub() == 1 for i in range(n)) == n

    5    if binary:

    6      l = x

    7    else:

    8      l = [solver.IntVar(0, 1, "") for i in range(n)]

    9      for i in range(n):

    10       if x[i].Ub() > 0:

    11         solver.Add(x[i] == x[i].Lb() * l[i])

    12       else:

    13         solver.Add(x[i] == x[i].Ub() * l[i])

    14    S = sum(l[i] for i in range(n))

    15    if rel == ''=='' or rel == ''='':

    16      solver.Add(S == k)

    17    elif rel == ''>='':

    18      solver.Add(S >= k)

    19    else:

    20      solver.Add(S <= k)

    21    return l

    Listing 7-7

    How to Select k Out of n Variables (my_or_tools.py)

    ```


    We craft Listing [7-7](#A457410_1_En_7_Chapter.html#Par59) to handle multiple
    cases. First, we need to single out binary variables because they do not need
    the additional layer of variables. We detect the binary case on line 4 by checking
    if all lower bounds are zero and all upper bounds are one. Any one variable not
    satisfying these conditions will set `binary` to `False`.


    In the binary case, we simply rename parameter x to be l; in the other cases,
    we create the binary variable array l and then set the forcing bound of equation
    (7.1) at line 11 if `x ∈ [0, u]` and correspondingly at line 13 if `x ∈ [l, 0]`.


    Finally, we set one of three relations on l, depending on whether the caller wants
    “exactly,” “at most,” or “at least” k variables selected. Note that the relation
    `>=` means “at least k variables are allowed to be non-zero.” It does not mean
    that k variables will be non-zero.[⁵](#A457410_1_En_7_Chapter.html#Fn5)


    The reader might remember that in the first chapter (Section 2.1), when discussing
    variations, we left unsatisfied requirements of the form “If food 3 is used, then
    food 4 must not be (and vice versa).” This exclusive-or is now easily accommodated.
    Recall from Listing [2-1](#A457410_1_En_2_Chapter.html#Par25) that our food selection
    was using decision variable f. Then we can add one line to the model,


    ```

    k_out_of_n(s, 1, [f[3], f[4]])

    ```


    where foods 3 and 4 are inserted into an array to be passed to our newly-minted
    routine.


    ### 7.2.2 Selecting k Adjacent Variables Out of n to Be Non-Zero


    If we want to generalize the non-zero adjacent constraint we used for the non-convex
    objective, we will need multiple layers of binary variables. Let’s illustrate
    this by considering a set `x[i] ∈ [0, u[i]]` of variables, out of which we want
    three adjacent to be non-zero. We introduce binary variables `λ[i]`, `δ[i]` and
    `γ[i]`, satisfying the following:


    | `x[0] ≤ λ[0] * u[0]` | `λ[0] ≤ δ[0]` | `δ[0] ≤ γ[0]` |

    | `x[1] ≤ λ[1] * u[1]` | `λ[1] ≤ δ[0] + δ[1]` | `δ[1] ≤ γ[0] + γ[1]` |

    | `x[2] ≤ λ[2] * u[2]` | `λ[2] ≤ δ[1] + δ[2]` | `δ[2] ≤ γ[1] + γ[2]` |

    | `x[3] ≤ λ[3] * u[3]` | `λ[3] ≤ δ[2] + δ[3]` | `δ[3] ≤ γ[2] + γ[3]` |

    | … |  |  |

    | `x[n-1] ≤ λ[n-1] * u[n-1]` | `λ[n-1] ≤ δ[n-2] + δ[n-1]` | `δ[n-1] ≤ γ[n-2]`
    |

    | `x[n] ≤ λ[n] * u[n]` | `λ[n] ≤ δ[n-1]` |  |

    | `∑ λ[i] = 3` | `∑ δ[i] = 2` | `∑ γ[i] = 1` |


    To see how this set of constraints works, read backward from γ to λ. Only one
    of the `γ[i]` is non-zero. This allows two adjacent `δ[i]` to be non-zero, which,
    in turn, allows three adjacent `λ[i]` to be non-zero. These last binary variables
    then correspond to the three adjacent `x[i]` that will be allowed to be non-zero.
    A nice recursive structure is implemented in Listing [7-8](#A457410_1_En_7_Chapter.html#Par69).
    We allow the caller some flexibility by accepting the number of variables selected
    to be zero or all of them; not that it makes sense in general, but it may help
    to structure a loop to include all boundary cases.


    ```

    1  def sosn(solver, k, x, rel=''<=''):

    2    def sosnrecur(solver, k, l):

    3      n = len(l)

    4      d = [solver.IntVar(0, 1, "") for _ in range(n-1)]

    5      for i in range(n):

    6        solver.Add(l[i] <= sum(d[j] \

    7          for j in range(max(0, i-1), min(n-2, i+1))))

    8      solver.Add(k == sum(d[i] for i in range(n-1)))

    9      return d if k <= 1 else [d, sosnrecur(solver, k-1, d)]

    10    n = len(x)

    11    if 0 < k < n:

    12     l = k_out_of_n(solver, k, x, rel)

    13     return l if k <= 1 else [l, sosnrecur(solver, k-1, l)]

    Listing 7-8

    How to Select k Adjacent Variables Out of n to Be Non-Zero

    ```


    The first layer of constraints is different from the others since the variables
    might be continuous. This is handled at line 12 by calling the function creating
    a layer of binary variables, setting bounds on each continuous one, and returning
    the binary array. Then the recursive call to `sosnrecur`, a private function,
    at line 13 implements the successive layers, each one smaller by one variable.
    All the internal layers are returned to the caller. The result of a very simple
    test choosing non-adjacent and adjacent integers from a randomly created array
    to maximize their sum is shown in Table [7-6](#A457410_1_En_7_Chapter.html#Tab6).


    **Table 7-6** Choosing the Largest Sum of k and of k Adjacent Variables'
