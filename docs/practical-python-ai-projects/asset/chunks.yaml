    12   return   x.SolutionValue()\n代码清单 3-2\n通过线性近似最小化非线性函数\n```\n\n函数 `minimize_non_linear`\
    \ 接受任何 Python 函数作为参数，以及一个用于最小化的值区间和所需的精度。在第 4 行，我们计算每个子区间的长度，并在第 5 行构建给定函数的分段描述，将其作为参数传递给之前描述的求解器（代码清单\
    \ 3-1）。\n\n第 9 行和第 11 行放大到适当的子区间，该子区间成为要再次细分的新区间。当区间小于所需精度时，该过程停止。仅用十行非常简单的代码，我们就利用了线性求解器的强大功能来最小化非线性凸函数。\n\
    \n我们可以在表 3-5 中看到解的精度的不断提高。每组连续三行分别代表 `x` 中的断点、这些点处的函数值以及区间参数 `delta`，指示最优区间。最右侧的两列是对应的最优\
