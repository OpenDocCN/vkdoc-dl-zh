  trans: '

    # 2. 线性连续模型


    在优化理论诞生之初（20 世纪 50 年代），最前沿的技术是线性优化模型和单纯形法，这是当时已知唯一能合理高效求解此类模型的算法。当我开始学习这一学科时，多次听到不同来源的说法：全球超过
    70%的 CPU 周期都用于运行各种单纯形法代码。这固然有些夸张，但也足以说明线性模型的强大。世界并非线性，但有时线性近似已经足够好用。


    更准确地说，我在此讨论的是线性连续模型（尽管习惯上称这些模型为线性规划，隐含了连续性特征）。线性连续模型是最容易构建、也最容易求解的模型。自乔治·丹齐格发明单纯形法求解它们以来，这类模型一直是优化领域的核心工具。其特点由三个要素界定：


    - 所有变量均为连续变量。

    - 所有约束均为线性约束。

    - 目标函数为线性函数。


    具体而言，决策变量（例如 `x[0]`，…，`x[n]`）可以取整数值和小数值。当解用于衡量数量时（例如几磅面粉或几吨混凝土），这是合适的。但当解用于计数对象时（例如人数或政客数量），则不合适，除非只寻求近似解。


    目标函数由常数数组 `c` 参数化（或可以如此参数化），并表示为


    ![$$ {c}_1{x}_1+{c}_2{x}_2+\dots +{c}_n{x}_n $$](img/A457410_1_En_2_Chapter_Equa.gif)


    这一限制排除了包含以下形式项的目标函数：


    ![$$ {x}_1²,{x}_4³,\sin (x),{e}^{x_3},{x}_1\cdot {x}_2, 或 \mid x \mid $$](img/A457410_1_En_2_Chapter_Equb.gif)


    以及其他无数种形式，不过你将在后面看到如何通过模型变换来处理其中一些非线性情况。


    最后，约束由矩阵 `a[ij]` 和数组 `b` 参数化，可以表示为一系列关系式，对于 `i ∈ {1, . . . , m}`：


    ![$$ {a}_{i1}{x}_{i1}+{a}_{i2}{x}_{i2}+\dots +{a}_{in}{x}_{in}\ge {b}_i $$](img/A457410_1_En_2_Chapter_IEq1.gif)，或
    ![$$ \le {b}_i $$](img/A457410_1_En_2_Chapter_IEq2.gif)，或 ![$$ ={b}_i $$](img/A457410_1_En_2_Chapter_IEq3.gif)


    或某些等价的代数形式。


    在本章中，我们考虑那些自然表述即为线性连续模型的问题。


    ## 2.1 混合问题


    线性规划的经典范例是饮食问题，这是 20 世纪 30 年代和 40 年代（是 20 世纪，而非 21 世纪¹）最早被研究的优化问题之一。该问题可能源自一个传说：美国军方希望在满足野战士兵营养需求的同时，将食品成本降至最低。早期研究该问题的学者之一是乔治·斯蒂格勒。他使用启发式方法对线性规划的最优解进行了有根据的猜测。1947
    年秋天，美国国家标准局（NBS，即现在的 NIST）数学表项目的杰克·拉德曼着手用新的单纯形法求解斯蒂格勒的模型。该线性模型由 9 个方程和 77 个未知数组成，在当时是一个巨大的问题。本书中的一些模型规模要大几个数量级，但求解时间却只是
    1947 年 NBS 人员解决饮食问题所用时间的极小一部分。效率的提升部分归功于硬件，但主要归功于软件。


    该问题的一个通用版本是：


    - 给定一份食品清单，每种食品含有一定的营养成分，且各有成本，找出能最小化成本同时提供所有必需营养素的食品组合。


    以下是该问题的一个简单版本。食品为 `F0`、`F1`、`F2`、`F3` 等（想象它们是披萨、拉面、纸杯蛋糕、薯片等；或者，如果你更注重健康，也可以是豆腐、青豆、藜麦、甜菜等）。营养素用
    `N0`、`N1`、`N2`、`N3` 等表示（想象它们是卡路里、蛋白质、钙、维生素 A 等）。每种食品都有每份的成本。此外，为了避免整周只吃一种食物，我们限制每周的份数。


    表 2-1 给出了一个随机生成的实例。² 每一行代表一种食品，包括每份的营养成分含量、该食品的可接受份数范围以及每份成本。暂时忽略最后一行和最后一列。我们将在模型构建并求解后再回到它们。倒数第二行和第三行表示每种营养素的允许范围。


    **表 2-1** 饮食问题的数据与求解示例


    |   | N0 | N1 | N2 | N3 | 最小值 | 最大值 | 成本 | 解 |

    |---|----|----|----|----|-----|-----|------|---------|

    | F0 | 606 | 563 | 665 | 23 | 7 | 17 | 9.06 | 17.0 |

    | F1 | 68 | 821 | 83 | 72 | 6 | 27 | 8.42 | 7.47 |

    | F2 | 28 | 70 | 916 | 56 | 1 | 36 | 9.47 | 6.11 |

    | F3 | 121 | 429 | 143 | 38 | 14 | 26 | 6.97 | 14.0 |

    | F4 | 60 | 179 | 818 | 46 | 9 | 35 | 4.77 | 35.0 |

    | 最小值 | 5764 | 28406 | 48157 | 1642 |   |   |   |   |

    | 最大值 | 15446 | 76946 | 82057 | 6280 |   |   |   |   |

    | 解 | 14775 | 28406 | 48157 | 3413 |   |   | 539.37 |   |

    '
- fmt: '### 2.1.1 Constructing a Model


    What would a solution be but a list of servings of each food? Therefore, the decision
    variables must be one per food, representing the number of servings. Let’s name
    these variables `f[0]`, …, `f[n]`. We will assume that it is acceptable to have
    fractional answers (i.e. one half serving is acceptable).


    The objective is to minimize cost. We have one cost per food (`c[0]`, …, `c[n]`).
    These are not variables, they are data. Therefore, what we want is to minimize
    the sum of all the products, `c[i] × f[i]`. This leads to the objective function


    ![$$ \min \sum \limits_i{c}_i{f}_i $$](A457410_1_En_2_Chapter_Equc.gif)


    Let’s tackle the constraints. We have two sets: one indicating the range of acceptable
    servings of each food (assume that the minimum of food `i` is `l[i]` and maximum
    is `u[i]`) and one indicating the required nutrients range (minimum of nutrient
    `j` is `a[j]` and maximum is `b[j]`). The simpler constraint is related to the
    food. Since our decision variables indicate the number of servings of each food,
    we need only to box each serving count,


    ![$$ {l}_i\le {f}_i\le {u}_i $$](A457410_1_En_2_Chapter_Equ1.gif)


    (2.1)


    The constraint on nutrients is a bit more involved. Consider nutrient `j`. How
    much of it will be included in the diet? Each food `i` may have some of it, as
    indicated in Table [2-1](#A457410_1_En_2_Chapter.html#Tab1). Let’s call this amount
    `N[ji]` (corresponding to the entry at the row of food `i` and the column of nutrient
    `j`). To get the total of this nutrient, we therefore need to sum over all foods
    the product of the food serving and the nutrient content. For each nutrient `j`,


    ![$$ {a}_j\le \sum \limits_i{N}_{ji}{f}_i\le {b}_j $$](A457410_1_En_2_Chapter_Equd.gif)


    We are done with the theory. Let’s translate this into an executable model general
    enough to solve all problems of this type (Listing [2-1](#A457410_1_En_2_Chapter.html#Par25)).
    We will assume that the data is given in a two-dimensional array called `N`. It
    has the structure of Table [2-1](#A457410_1_En_2_Chapter.html#Tab1) without the
    last column and row. Each row represents a food, except that the last two rows
    represent the minimum and maximum requirement of each nutrient, represented by
    the columns, with the last three representing the minimum, maximum, and the cost
    of each food serving.


    ```

    1  def solve_diet(N):

    2    s = newSolver(''Diet'')

    3    nbF,nbN = len(N)-2, len(N[0])-3

    4    FMin,FMax,FCost,NMin,NMax = nbN,nbN+1,nbN+2,nbF,nbF+1

    5    f = [s.NumVar(N[i][FMin], N[i][FMax],'''') for i in range(nbF)]

    6    for j in range(nbN):

    7      s.Add(N[NMin][j]<=s.Sum([f[i]*N[i][j] for i in range(nbF)]))

    8      s.Add(s.Sum([f[i]*N[i][j] for i in range(nbF)])<=N[NMax][j])

    9    s.Minimize(s.Sum([f[i]*N[i][FCost] for i in range(nbF)]))

    10    rc = s.Solve()

    11    return rc,ObjVal(s),SolVal(f)

    Listing 2-1

    Model for Minimal Cost Diet (diet problem.py)

    ```


    The model uses the `newSolver` function to simplify the expression of the code[³](#A457410_1_En_2_Chapter.html#Fn3)
    as the reader can see at Listing [2-2](#A457410_1_En_2_Chapter.html#Par28). These,
    and other simplifications, can be found in `my_or_tools.py`.


    ```

    from ortools.linear_solver import pywraplp

    def newSolver(name,integer=False):

    return pywraplp.Solver(name,\

    pywraplp.Solver.

    CBC_MIXED_INTEGER_PROGRAMMING \

    if integer else \

    pywraplp.Solver.GLOP_LINEAR_PROGRAMMING)

    Listing 2-2

    Utility Function to Create an Appropriate Solver Instance

    ```


    To help the expression of the model, lines 3-4 give meaningful names to the row
    and column indices that we will use. In line 5, we define the decision variables,
    one per food, each taking values in the range `[l[i], u[i]]` as in equation (2-1).
    It would be correct to give a range of `[0, +∞)` and then add constraints to enforce
    the bounds. The solver would still find the same solution, but it is simpler and
    good practice to limit as much as possible the range of decision variables. In
    complex models, it often dramatically improves the solution time.


    The two-line loop starting on line 6 establishes the range on each nutrient as
    in (2.1.1). Lines 9 and following create the objective function, solve the problem,
    and return three numbers: the status of the solver (it should be zero), the optimal
    value, and the optimal solution. The dual role of the functions `SolVal` and `ObjVal`
    (seen in Listing [2-3](#A457410_1_En_2_Chapter.html#Par31)) is to simplify the
    results returned to the caller and the code to read.


    ```

    def SolVal(x):

    if type(x) is not list:

    return 0 if x is None \

    else x if isinstance(x,(int,float)) \

    else x.SolutionValue() if x.Integer() is False \

    else int(x.SolutionValue())

    elif type(x) is list:

    return [SolVal(e) for e in x]

    def ObjVal(x):

    return x.Objective().Value()

    Listing 2-3

    Utility Functions to Extract Values from the OR-Tools Objects

    ```


    The results from executing this model are shown in the last row and column of
    Table [2-1](#A457410_1_En_2_Chapter.html#Tab1). The column indicates the number
    of servings of each food and the row indicates the amount of each nutrient that
    will be in the diet. The reader should notice that many of the food items and
    nutrient counts are at their minimum required values. This is expected of such
    a model since we are trying to minimize a linear cost function; the optimal solution
    should push towards the boundary of the constraints as much as possible.


    The reader can experiment with this model. It is included in the additional material
    as `diet problem.py`, along with a generator of random diet problems and a routine
    to display the solution in a table format similar to Table [2-1](#A457410_1_En_2_Chapter.html#Tab1).'
