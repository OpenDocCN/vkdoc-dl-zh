    ### 2.2.2 变体


    虽然混合问题可以以各种方式呈现，但它们都可以用上述方式处理。决策变量应该是二维的：一个维度上的总和以及另一个维度表示使用的总输入材料和产生的总输出材料。最后，除了产能和需求约束外，至少应该有一个满足线性假设的混合约束。


    一个有趣的变体是，我们可能需要实现不止一个特性。例如，除了辛烷值水平，我们可能还知道每种原油中特定的硫浓度，并要求将精炼汽油的硫含量保持在某个阈值以下。在这种情况下，辛烷值方程(2.4)几乎肯定需要被一个不等式替换，以确保最低辛烷值水平，另一个类似的不等式将确保最高硫含量。假设`S[i]`为原油`i`的硫含量，`s[j]`为精炼油`j`的硫含量，我们得到：


    ![$$ \sum \limits_i{O}_i{G}_{ij}\le {F}_j{o}_j\kern1em \forall j $$](A457410_1_En_2_Chapter_Equn.gif)


    以及


    ![$$ \sum \limits_i{S}_i{G}_{ij}\ge {F}_j{s}_j\kern1em \forall j $$](A457410_1_En_2_Chapter_Equo.gif)


    使用不等式的原因是，问题不太可能恰好具有指定的辛烷值和硫含量水平的可行解。读者可以尝试修改清单[2-4](#A457410_1_En_2_Chapter.html#Par73)来验证这一点。


    为了帮助读者识别混合问题的底层结构，以下是一个我们很快会再次遇到的实例，它包含额外的复杂性。


    一种在垃圾食品中非常流行的成分是通过精炼和混合各种油类制造的。这些油有五种口味（`O1`到`O5`）和“硬度”指标，如表[2-6](#A457410_1_En_2_Chapter.html#Tab6)所示，其中成本以美元/吨计，硬度以适当单位计量。


    表2-6


    需要标题


    |   | O1 | O2 | O3 | O4 | O5 |

    | 成本 | 110 | 120 | 130 | 110 | 115 |

    | 硬度 | 8.8 | 6.1 | 2.0 | 4.2 | 5.0 |


    油`O1`和`O2`可以在生产设施A中精炼，该设施每月产能为200吨，而`O3`、`O4`和`O5`可以在生产设施B中精炼，该设施每月产能为250吨。精炼过程中没有重量损失，并且可以忽略该过程的成本。


    最终产品是通过混合不同数量的五种油获得的。它有一个硬度限制。使用与表中相同的单位测量，它必须介于3和6个单位之间。假设硬度是线性混合的。也就是说，如果我们混合10吨`O1`油和20吨`O2`油，混合物的硬度评级为：


    ![$$ \left(10\times 8.8+20\times 6.1\right)/\left(10+20\right) $$](A457410_1_En_2_Chapter_Equp.gif)


    最终产品的售价为每吨150美元。应如何精炼和混合这些油以最大化利润？'
  raw: 'The only real complication of this problem refers to the octane rating . The
    key here is the assumption of linearity. To see how to model the octane requirement,
    let’s imagine a simple case: say we mix 800 barrels of crude 1 with octane rating
    of 98 with 200 barrels of crude 2 with octane rating of 90\. What is the resulting
    octane rating? Since we have a total of 1,000 barrels of refined,


    ![$$ \frac{800\times 98+200\times 90}{1000}=96.4 $$](A457410_1_En_2_Chapter_Equm.gif)


    So, in general, we need the fraction of each crude that goes into a mix times
    its octane rating. Assuming O [i] as the octane rating of crude i and o [j] the
    octane rating of refined j, this leads us to


    ![$$ \sum \limits_i{O}_i{G}_{ij}={F}_j{o}_j\kern1em \forall j $$](A457410_1_En_2_Chapter_Equ4.gif)


    (2.4)


