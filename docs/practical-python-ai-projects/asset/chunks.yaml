    ### 7.2.3 Selecting k Constraints Out of n


    A related trick is to select a certain number of constraints to be satisfied (and
    allowing others to be violated). Let’s consider the case of one constraint, say


    `∑ᵢ aᵢ xᵢ ≤ b` (7.3)


    where `x` is the decision variable. We may want to either raise an indicator variable
    if the constraint is satisfied or force the constraint if the indicator is raised:


    `δ = 1 ⇒ ∑ᵢ aᵢ xᵢ ≤ b` (7.4)


    or


    `∑ᵢ aᵢ xᵢ ≤ b ⇒ δ = 1` (7.5)


    This technique of associating a binary variable to the state of a constraint is
    known as reifying a constraint.


    Let’s consider first the simpler equation (7.4). We need bounds


    `u_b := maxₓ ∑ᵢ aᵢ xᵢ - b`

    `l_b := minₓ ∑ᵢ aᵢ xᵢ - b`


    The bounds need not be exactly computed, although, as you will see, this is easily
    done. Any valid bound will work, with the usual caveat that in order to avoid
    numerical difficulties, one should not introduce “large” numbers. Armed with these
    parameters, we can add the constraint:


    `∑ aᵢ xᵢ ≤ b + u_b (1 - δ)`


    If `δ = 0`, then the constraint is vacuous over the domain of `x`. If, on the
    other hand, `δ = 1`, then the constraint must hold.


    The other direction, equation (7.5), is neither as useful, nor as simple, but
    is an amusing exercise in translating logical expressions into algebraic ones.


    First, let’s formulate the contrapositive of (7.5), namely


    `δ = 0 ⇒ ∑ᵢ aᵢ xᵢ ≰ b` or

    `δ = 0 ⇒ ∑ᵢ aᵢ xᵢ > b`


    In the case where `a`, `b`, and `x` are all integer variables, then the meaning
    of `∑ᵢ aᵢ xᵢ > b` is clear. It means `∑ᵢ aᵢ xᵢ ≥ b + 1`. The main difficulty occurs
    when `x` is a continuous variable. Then we need to decide the meaning of `>` and
    it will be dependent on the problem we are modeling.


    We need to decree that some `ε` violation of the inequality is enough. If `x`
    represents wavelengths of visible light in meters, the value of `ε` might be in
    the order of `10⁻⁹`. If `x` represents the money the US government spends on its
    military, then `10⁵` might be fine. In any case, what we now want to implement
    is


    `δ = 0 ⇒ ∑ᵢ aᵢ xᵢ ≥ b + ε` (7.6)


    Once the modeler has decreed `ε`, we add


    `∑ aᵢ xᵢ ≥ b + l_b δ + ε (1 - δ)` (7.7)


    If `δ = 0`, then this reduces to (7.6). If `δ = 1`, then the lower bound comes
    into play and the constraint becomes vacuous. The case of “smaller than” is handled
    similarly or, even more easily, by multiplying everything by `-1` and using the
    above. The case of equality is handled by transforming it into two inequalities.


    Armed with these equations, we can now select `k` constraints out of `n`, by creating
    one indicator variable `δ[i]` per constraint and using our previously defined
    `k_out_of_n` function on the `δ`. First, since we need bounds and we can easily
    set up a linear program to find them, let’s do so. Listing [7-10](#A457410_1_En_7_Chapter.html#Par86)
    will find the tightest upper bound and lower bound on `∑ aᵢ xᵢ - b` given `a`,
    `x`, and `b`.'
