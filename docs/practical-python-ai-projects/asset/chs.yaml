  ### 7.5.4 淑女与老虎


  雷蒙德·斯穆里安在《淑女还是老虎》¹⁵一书中提出了许多逻辑谜题。其中一章的高潮部分如下：


  一名囚犯面对九扇门，他必须打开其中一扇。其中一扇门后有一位淑女；其余门后，如果有东西的话，则是老虎。可以假设囚犯更愿意打开淑女所在的门，其次是空房间，最差的是老虎的巢穴。这之所以成为一个逻辑谜题，是因为每扇门上都贴着一个逻辑陈述（因此它可以是真或假）。有老虎的房间里的陈述是假的。淑女房间里的陈述是真的。


  -   门 1：淑女在奇数编号的房间。

  -   门 2：这个房间是空的。

  -   门 3：要么标志 5 是对的，要么标志 7 是错的。

  -   门 4：标志 1 是错的。

  -   门 5：要么标志 2 是对的，要么标志 4 是对的。

  -   门 6：标志 3 是错的。

  -   门 7：淑女不在房间 1。

  -   门 8：这个房间里有老虎，并且房间 9 是空的。

  -   门 9：这个房间里有老虎，并且标志 6 是错的。


  淑女在哪里？


  要知道淑女在哪里，我们可能需要知道老虎在哪里。因此，给定一个房间集合 `R = {1, … , 9}` 和一个野兽集合 `B = {1, 2, 3}`（例如，1
  代表空，2 代表淑女，3 代表老虎），一个合理的决策变量是


  ![$$ {r}_i\in B\forall i\in R $$](img/A457410_1_En_7_Chapter_Equam.gif)


  这样，淑女在房间 5 将由 `r[5] = 2` 表示，老虎在房间 4 将由 `r[4] = 3` 表示。如果我们使用 `newIntVar` 函数声明变量，那么关于淑女在奇数编号房间的陈述就很容易处理。相关的指示变量数组是完美的工具。为了便于说明，我们假设对于每个
  `r[i]` 变量，我们都有一个针对 ![$$ j\in B $$](img/A457410_1_En_7_Chapter_IEq47.gif) 的指示变量数组
  `r[i,j]`。


  现在来看逻辑部分。我们得到了一些可以为真或假的陈述，它们的真值会影响约束条件。如果我们为每个陈述引入一个二元变量，那么我们可以使用我们的具体化逻辑将该变量与每个约束关联起来。因此，我们引入


  ![$$ {s}_i\in \left\{0,1\right\}\forall i\in R, $$](img/A457410_1_En_7_Chapter_Equan.gif)


  这样 `s[2] = 1` 将意味着门 2 上的陈述为真。


  可执行模型如代码清单 7-29 所示。我们将一次分解一个约束。


  ```

  1  def solve_lady_or_tiger():

  2    s = newSolver(''Ladyuorutiger'', True)

  3    Rooms = range(1,10)

  4    R = [None]+[newIntVar(s,0,2) for _ in Rooms]

  5    S = [None]+[s.IntVar(0,1,") for _ in Rooms]

  6    i_empty,i_lady,i_tiger = 1,2,3

  7    k_out_of_n(s,1,[R[i][i_lady] for i in Rooms])

  8    for i in Rooms:

  9      reify_force(s,[1],[R[i][i_tiger]],0,S[i],''='')

  11    v=[1]*5

  12    reify(s,v,[R[i][i_lady] for i in range(1,10,2)],1,S[1],''>='')

  13    reify(s,[1],[R[2][i_empty]],1,S[2],''>='')

  14    reify(s,[1,-1],[S[5],S[7]],0,S[3],''>='')

  15    reify(s,[1],[S[1]],0,S[4],''='')

  17    reify(s,[1],[S[3]],0,S[6],''='')

  20    reify(s,[1,-1],[R[9][i_tiger],S[6]],1,S[9],''>='')

  21    rc  = s.Solve()

  22    return rc,[SolVal(S[i]) for i in Rooms],\

  23      [SolVal(R[i]) for i in Rooms]

  代码清单 7-29

  淑女或老虎模型 (puzzle.py)

  ```


  在第 3 行，我们定义了标识每扇门的整数范围。由于问题中房间编号从 1 开始，我们将遵循这一点，而不是像通常那样从 0 开始重新编号。为了从 1 开始索引，我们在接下来的两行中创建决策变量数组，其中第一个元素包含
  `None`。然后，在第 6 行，我们定义了一些常量来访问每个房间的指示变量。


  在第 7 行，我们确保恰好有一位淑女。


  所有其他约束都涉及陈述变量 `S` 与逻辑陈述之间的关系，因此我们的 `reify` 函数将非常有用。第一个约束是，如果一个房间里有老虎，那么它的陈述是假的。陈述“如果房间
  i 里有老虎，那么陈述 i 是假的。”对我们来说是错误的方向。我们可以编写一个新函数，但更简单的方法是使用逆否命题并表述为“如果陈述 i 为真，那么门 i 后面没有老虎。”这是一个布尔值为真强制执行约束的实例，第
  9 行实现了这一点。


  下一个约束是“有淑女的房间门上的陈述为真。”这对我们来说是正确方向：一个满足的约束会引发一个布尔值，如第 10 行所实现。


  “淑女在奇数编号的房间。”很简单。我们需要对奇数门上的 `i_lady` 指示变量求和，并且当且仅当陈述 1 为真时，将它们设置为大于等于 1。奇数房间的索引通过
  `range(1,10,2)` 获得，不等式


  ```

  R[1][i_lady]+R[3][i_lady]+R[5][i_lady]+R[7][i_lady]+R[9][i_lady]  >=  1

  ```


  在第 12 行被具体化为 `S[1]`。


  “这个房间是空的。”是对以下内容的一个简单具体化，关联到第 13 行的 `S[2]`：


  ```

  R[2][i_empty]  >=  1

  ```


  读者可能会想为什么不用等式而用不等式。原因是我们知道，在编写了约束 `reify` 之后，等式更复杂，会引入更多的辅助约束和/或变量。如果我们确定（就像这里一样）不等式就足够了，那么最好使用不等式。


  “要么标志 5 是对的，要么标志 7 是错的。”是二元变量的析取，其中一个小难点是第二个变量被取反了。如果我们知道如何对布尔值取反并实现析取，那么将其转换为代数陈述就是机械性的。我们经常看到析取。像
  `x[1] ∨ … x[n]` 这样的东西被实现为 ![$$ \sum \limits_i{x}_i\ge 1 $$](img/A457410_1_En_7_Chapter_IEq48.gif)。`x[i]`
  的取反通过将 `x[i]` 替换为 `1 − x[i]` 来处理。因此，在我们的例子中，我们需要


  ```

  S[5] + (1-S[7]) >= 1

  ```


  简化为


  ```

  S[5] - S[7] >= 0

  ```


  在第 14 行具体化为 `S[3]`。


  “标志 1 是错的。”是 `S[1]==0` 在第 15 行具体化为 `S[4]`。“标志 3 是错的。”在第 17 行以相同方式处理。


  “要么标志 2 是对的，要么标志 4 是对的。”是一个简单的析取，因此通常的加法转换适用，并在第 16 行具体化为 `S[5]`。


  “淑女不在房间 1。”需要将约束


  ```

  R[1][i_lady]  <=  0

  ```


  具体化为 `S[7]`，如第 18 行所示。


  “这个房间里有老虎，并且房间 9 是空的。”很有趣。子陈述是


  ```

  R[8][i_tiger]  >=  1

  ```


  和


  ```

  R[9][i_empty]  >=  1

  ```


  合取通过将右侧和左侧相加来处理，以创建


  ```

  R[8][i_tiger]  +  R[9][i_empty]  >=  2

  ```


  在第 19 行具体化为 `S[8]`。


  最后，“这个房间里有老虎，并且标志 6 是错的。”包含


  ```

  R[9][i_tiger]  >=  1

  ```


  和


  ```

  S[6] <= 0

  ```


  我们将后者转换为


  ```

  - S[6] >= 0

  ```


  然后将两者相加形成合取，在第 20 行具体化为 `S[9]`。


  至此，我们完成了，可以找到一个解，例如表 7-21 中的第一个解。但是否还有其他解？如果有，如何找到它们？在这种情况下，¹⁶ 很简单，因为我们唯一真正的目标是找到淑女。我们的第一个解中淑女在房间
  1，因此我们可以简单地添加一个约束，阻止淑女在房间 1，例如


  ```

  s.Add(R[1][i_lady]  ==  0)

  ```


  如果存在另一个解，我们会得到它；否则求解器会指示问题不可行。如果需要，我们可以继续这样做，直到穷尽所有解。表 7-21 中的第二个解就是这样一个额外的解。（有趣的是，如果我们添加一个约束“房间
  8 不是空的”，那么这个第二个解就是唯一解。）


  **表 7-21** 淑女或老虎谜题的两个解




  | 1 | 女士在奇数编号的房间。 | T | 女士 | T |   |

  | 2 | 这个房间是空的。 | T |   | F | 老虎 |

  | 3 | 要么 5 号牌子正确，要么 7 号牌子错误。 | T |   | F |   |

  | 4 | 1 号牌子是错误的。 | F |   | F |   |

  | 5 | 要么 2 号牌子正确，要么 4 号牌子正确。 | T |   | F |   |

