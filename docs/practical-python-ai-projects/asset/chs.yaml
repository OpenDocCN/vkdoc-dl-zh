  \ 10, 12] |\n\n### 6.2.3 实例\n\n光纤网络中有一个有趣的应用。考虑一组信号源节点、一组信号必须到达的汇节点，以及一组仅传输信号（必要时可增强信号）的中转节点。多个信号可以同时共享同一根电缆，只要它们使用不同的波长。可用波长的数量是有限的。这里我们面对的是多个叠加的转运问题。在这种情况下，目标是最大化已建立的连接数量。\n\
  \n\n\n## 6.3 人员配置水平\n\n这个问题通常被优化师称为排班问题。但这其实是一个严重的误称，因为最终产生的并非排班表，而仅仅是需求水平。从业者所熟知的真正排班问题，其复杂程度要高数个数量级。因此，我们将此问题称为人员配置水平问题。\n\
  \n情况如下：我们有一个网格，其中一个维度按时间间隔索引。这个网格最常见的形式是按天（周一、周二）或按小时（上午 8 点、上午 9 点）划分，但也可以是任何有效的时间单位。在另一个维度上，是我们通常所说的班次，即工人工作时间的单位（周一至周五、周二至周日，或上午\
  \ 8 点至下午 4 点、上午 9 点至下午 5 点）。每个时间间隔都对应着人员配置需求（例如周一需要 45 人，或中午需要 62 人）。最后，每个班次还关联着一个成本。示例见表\
  \ 6-7。\n\n**表 6-7** 人员配置需求矩阵\n\n| | 班次 0 | 班次 1 | 班次 2 | 班次 3 | 班次 4 | 班次 5 | 班次\
  \ 6 | 需求 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 00 时 | 1\
  \ | | | 1 | | | | 15 |\n| 02 时 | 1 | | | | | 1 | | 17 |\n| 04 时 | 1 | | | | | 1\
  \ | | 16 |\n| 06 时 | 1 | 1 | | | | | | 17 |\n| 08 时 | | 1 | | | | | 1 | 19 |\n|\
  \ 10 时 | | 1 | | | | | 1 | 18 |\n| 12 时 | | 1 | 1 | | | | | 11 |\n| 14 时 | | | 1\
  \ | | | | | 12 |\n| 16 时 | | | 1 | | | | | 15 |\n| 18 时 | | | 1 | 1 | | | | 14 |\n\
  | 20 时 | | | | 1 | 1 | | | 20 |\n| 22 时 | | | | 1 | 1 | | | 18 |\n| 成本 | $69.37\
  \ | $67.03 | $64.55 | $72.06 | $29.24 | $21.67 | $24.52 | |\n\n请注意，示例中包含两种类型的班次：全职（八小时）和兼职（四小时）。成本和每班次的工作时长不同，因为通常全职员工的薪酬高于兼职员工。目标是在满足需求并确保全职员工获得优先待遇的前提下，以最低总成本确定每个班次的工作人数。这种优先待遇可以有多种形式。可以是简单的“若无全职员工工作，则不安排兼职员工”，或“每个全职班次必须至少有\
  \ x 人”，或“我们有一个由 x 名全职员工组成的固定团队必须工作；其余需求由兼职员工填补”。我们将讨论这些约束条件的一些可能变体。\n\n请注意，此问题的解决方案仅确定每个班次的人员配置水平。这并不是一个排班表。真正的排班表，即哪个工人上哪个班次，则留待另一个更复杂的模型来处理。\n\
  \n读者在此应注意到优化师处理复杂问题的一种常见方法：分解。表 6-7 最后一列显示的人员配置需求，很可能是由某个模型得出的。而配置水平将由我们正在创建的模型生成。最后，真正的排班表将由另一个模型生成。这种方法不太可能产生全局最优解。然而，它在所有行业中都有应用。航空业因分解问题而臭名昭著。我们之所以用这种方式处理复杂问题，有两个原因：一个好的原因和一个坏的原因。\n\
  \n好的原因是，通常从技术上解决整个问题并不可行。我们当然可以编写整个问题的模型，但在太阳系消亡之前，没有求解器能找到解决方案。同一原因的另一个方面是，整个问题的一部分最好建模为整数规划，而另一部分则用约束规划简单得多。目前还没有完全令人满意的方法来编写这种混合模型。⁵\
  \ 第二个原因，即坏的原因，是即使在某些更全面的方法可行的情况下，组织内部也存在巨大的惯性，阻碍其实施。⁶\n\n### 6.3.1 构建模型\n\n该模型将分阶段进行描述。\n\
  \n#### 6.3.1.1 决策变量\n\n在此问题中，我们需要决定每个班次需要多少人工作。由于全职和兼职班次之间存在区别，区分全职员工（FTE）和兼职员工（PTE）可能是有用的。因此，假设\
  \ `N[f]` 和 `N[p]` 分别代表全职和兼职班次的集合，\n\n```\nx_i ∈ [0,1,2,…] ∀ i ∈ N_f ∪ N_p =: N\n\
  ```\n\n#### 6.3.1.2 目标函数\n\n目标很简单，因为我们有每个班次的成本 `C[i]`，\n\n```\nmin ∑_{i∈N} C_i x_i\n\
  ```\n\n#### 6.3.1.3 约束条件\n\n让我们通过查看一个特定的时间间隔（例如 06:00，需求为 17 人）来处理人员配置需求。如果班次 0\
  \ 覆盖午夜至上午 8 点，班次 1 覆盖上午 6 点至下午 2 点，那么这两个班次（且仅这两个班次）必须共同拥有至少 17 人来满足上午 6 点的需求。用代数式表示为：\n\
  \n```\nx_0 + x_1 ≥ 17\n```\n\n现在，更一般地，考虑一个矩阵 `M[T×N]`，其中 `T` 是时间间隔的集合，其结构如表 6-7\
  \ 所示（不含最后一行和最后一列）。我们需要的是，对于每个时间间隔 `t`，覆盖 `t` 的 `x[i]` 之和至少达到所需的需求 `R[t]`。用代数式表示为：\n\
  \n```\n∑_{i∈N} M_{t,i} x_i ≥ R_t ∀ t ∈ T\n```\n\n(6.6)\n\n这对于最简单的人员配置水平模型来说已经足够了。如果全职和兼职之间没有区别，我们就完成了。现在让我们考虑一些现实的约束条件。\n\
  \n1.  **最低全职员工数量**：如果我们要求每个全职班次 `i` 至少有 `Q[i]` 人工作，我们可以添加：\n\n   ```\n   x_i ≥ Q_i\
  \ ∀ i ∈ N_f\n   ```\n\n   由于班次的结构（全职班次覆盖所有时间间隔），此约束也满足了“若无全职员工工作，则不安排兼职员工”的要求（当然，假设\
  \ `Q_i > 0`）。\n\n2.  **全职员工必须工作**：一个可能更现实的要求是，给定一个由 `P` 名全职员工组成的固定团队，我们要求他们都工作。只有当人员配置需求无法满足时，才应动用兼职员工。这可以通过以下方式实现：\n\
  \n   ```\n   ∑_{i∈N_f} x_i = P\n   ```\n\n   (6.7) 当然，除非全职员工人数低于或等于人员配置需求，否则此约束将不可行。\n\
  \n3.  **若无全职员工，则不安排兼职员工**：考虑一个特定的时间间隔，例如上午 10 点至中午。假设它可以由全职班次 1 和 2 以及兼职班次 6 来配置人员。我们希望确保除非\
  \ `x[1]` 或 `x[2]` 非零，否则 `x[6]` 为零。作为首次尝试，让我们试试：\n\n   ```\n   x_1 + x_2 ≥ x_6\n\
  \   ```\n\n   (6.8) 这确保了如果两个全职班次都没有全职员工，那么也不会有兼职员工。但它对问题的约束超出了必要，因为它阻止了兼职员工数量超过全职员工数量。我们需要的是用某个“足够大”的常数来缩放方程\
  \ (6.8) 的左侧。这又是优化师称之为大 M 法的一个实例。多大才算足够大？所需员工的总和肯定足够，但又不会大到引起数值问题。因此，\n\n   ```\n\
  \   ∑_{j∈T} R_j ∑_{i∈N_f} M_{t,i} x_i ≥ ∑_{i∈N_p} M_{t,i} x_i ∀ t ∈ T\n   ```\n\n\
  \   (6.9) 对于每个时间间隔，方程 (6.8) 在左侧对全职员工数量求和，并用一个大常数进行缩放。在右侧，它对兼职员工数量求和。\n\n\n\n####\
  \ 6.3.1.4 可执行模型\n\n该模型将接收一个时间与班次对应的 0-1 矩阵 `M`，与表 6-4 完全一致，同时还会接收一个被视为全职的班次数。如果问题中没有兼职人员，该数字将等于\
  \ `M` 的列数。最后一列表示每个时间间隔的最低需求。最后一行表示指定班次中一名工人的成本。\n\n为了使该模型更实用，可以为其提供一个数组 `Q`，该数组以班次为索引，表示每个班次的最少人数。还可以为其提供一个标量\
  \ `P`，表示必须工作的全职人员数量。最后，还可以提供一个标志 `no_part`，如果该标志为 `True`，则表示除非有全职人员在场，否则不会有兼职人员工作。\n\
  \n```\n1  def solve_model(M,nf,Q=None,P=None,no_part=False):\n2    s = newSolver('Staffing',\
  \ True)\n3    nbt,n = len(M)-1,len(M[0])-1\n4    B = sum(M[t][-1] for t in range(len(M)-1))\n\
  5    x = [s.IntVar(0,B,\") for i in range(n)]\n6    for t in range(nbt):\n7    \
  \  s.Add(sum([M[t][i] * x[i] for i in range(n)]) >= M[t][-1])\n8    if Q:\n9   \
  \   for i in range(n):\n10        s.Add(x[i]  >=  Q[i])\n11    if P:\n12      s.Add(sum(x[i]\
  \ for i in range(nf)) >= P)\n13    if no_part:\n14      for t in range(nbt):\n15\
  \        s.Add(B*sum([M[t][i] * x[i] for i in range(nf)]) \\\n16             >=\
  \ sum([M[t][i] * x[i] for i in range(nf,n)]))\n17    s.Minimize(sum(x[i]*M[-1][i]\
  \ for i in range(n)))\n18    rc  = s.Solve()\n19    return rc, ObjVal(s), SolVal(x)\n\
  Listing 6-4\n人员配置模型 (staffing.py)\n```\n\n在提取时间间隔数量、班次数量，并在第 4 行计算决策变量的一个界限后，我们将决策变量定义为一个非负整数。我们使用的界限显然是有效的，因为它是所有所需人员的总和。\n\
  \n我们在第 7 行实现了公式 (6.6) 的基本约束。然后，接下来的三个 `if` 语句实现了可选约束：最低全职人员数量、全职人员必须工作，以及若无全职人员则无兼职人员。\n\
  \n仅应用基本约束的结果如表 6-8 所示，而将 `no_part` 标志设置为 `True` 则得到表 6-9。请注意，在此示例中，工作总人数没有变化，但人员在各班次中的分布发生了变化，从而提高了总成本。\n\
  \n**表 6-9**  \n在“无全职则无兼职”约束下的最优解\n\n| $3225.47 | 班次 0 | 班次 1 | 班次 2 | 班次 3 | 班次\
  \ 4 | 班次 5 | 班次 6 |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| 人数:71\
  \ | 14 | 3 | 15 | 1 | 19 | 3 | 16 |\n\n**表 6-8**  \n基本人员配置水平问题的最优解\n\n| $3187.84\
  \ | 班次 0 | 班次 1 | 班次 2 | 班次 3 | 班次 4 | 班次 5 | 班次 6 |\n| --- | --- | --- | --- |\
  \ --- | --- | --- | --- |\n| 人数:71 | 15 | 2 | 15 | 0 | 20 | 2 | 17 |\n\n### 6.3.2\
  \ 变体\n\n我们已经通过实现可选参数涵盖了一些变体。还有众多其他变体，就像使用人员配置水平的公司一样多。下一步是将此模型转化为一个真正的排班模型，将具体人员分配到各个班次。我们将在后面开始解决这个问题，但鼓励读者思考实现真正排班的方法。\n\
  \n## 6.4 作业车间调度\n\n一个相当难解决的问题如下：考虑在一组机器 `M` 上执行一组作业 `J`。每个作业需要在每台机器上花费一些时间来执行特定任务，并且任务必须按特定顺序执行。你可以想象一下制作木制玩具的过程。木材需要切割成型，然后打磨，再上底漆，然后上色，最后涂清漆。这些任务中的每一个都由不同的机器完成，并且需要一定的持续时间，具体取决于玩具。这里的“机器”一词含义相当广泛。它可以指在其工位上的高技能工人，也可以指机器人。其理念是相同的。此外，并非所有作业都需要所有机器。有些可能只需要一部分机器。总体目标是在每台机器上安排时间以完成所有任务，同时最小化总耗时。\n\
  \n我们将用于说明此模型的小例子如表 6-10 所示。\n\n**表 6-10**  \n作业车间调度示例（每个作业的任务机器及持续时间）\n\n| 作业 |\
  \ 机器-持续时间 | 机器-持续时间 | 机器-持续时间 |\n| --- | --- | --- | --- |\n| J0 | 1-10 | 2-10 |\
  \ 0-10 |\n| J1 | 1-5 | 0-8 | 2-5 |\n| J2 | 2-5 | 1-9 | 0-9 |\n| J3 | 0-6 | 2-9 |\
  \ 1-5 |\n\n### 6.4.1 构建模型\n\n由于我们已知每个作业的任务顺序，因此这并非决策的一部分。我们寻求的是在给定机器上为给定作业开始特定任务的时间。因此，我们将使用一个表示开始时间的决策变量：\n\
  \n`x_{ik} ∈ [0, ∞) ∀ i ∈ J, ∀ k ∈ M`\n\n我们并不假设持续时间是整数，因此决策变量是连续的。\n\n第一类约束对开始时间设置了下界。例如，假设作业\
  \ 7 必须在机器 4 上使用 3 小时，然后才能转到机器 6，那么开始时间满足 `x[74] + 3 ≤ x[76]`。一般来说，假设 `p[i]` 是作业\
  \ `i` 的机器顺序向量（0, 1, 2, …, `M − 1` 的一个排列），并带有持续时间向量 `d[i]`，我们得到：\n\n`x_{i p_{ik}}\
  \ + d_{ik} ≤ x_{i p_{ik+1}} ∀ i ∈ J, ∀ k ∈ [0, …, |M| − 2]`\n\n这个问题的难点在于强制规定在任何给定时间，每台机器上最多只能有一个作业。机器空闲是可以接受的，尽管我们会尽量最小化空闲时间。我们如何强制实施这个约束呢？\n\
  \n一种方法是引入一个额外的变量，该变量将指示作业在给定机器上的相对顺序。例如，\n\n`z_{ijk} ∈ {0, 1}, ∀ i, j ∈ J, ∀ k ∈\
  \ M`\n\n其解释为：当且仅当作业 `i` 在机器 `k` 上先于作业 `j` 时，`z_{ijk} = 1`。请注意，由于要么作业 `i` 先于作业 `j`，要么反之，\n\
  \n`z_{ijk} = 1 ⇔ z_{jik} = 0`\n\n利用这个变量，我们可以尝试强制实施这个困难的条件。再次考虑一个简单的例子。假设作业 7 需要机器\
  \ 2 工作 3 小时，而作业 5 需要它工作 4 小时。那么要么 `x[72] + 3 ≤ x[52]`，表示作业 5 必须等到作业 7 在机器 2 上结束后才能开始，要么\
  \ `x[52] + 4 ≤ x[72]`，表示相反的时间条件。这是一个析取关系；我们需要满足其中一个约束。\n\n使用变量 `z[ijk]`，可以通过考虑所有作业\
  \ `i`、`j` 和所有机器 `k` 来强制实施此条件：\n\n```\nz_{ijk} = 1 - z_{jik}\nx_{i p_{ik}} + d_{ik}\
  \ - M z_{ij p_{ik}} ≤ x_{j p_{ik}}\nx_{j p_{jk}} + d_{jk} - M z_{ji p_{jk}} ≤ x_{i\
  \ p_{jk}}\n```\n\n其中 `M` 是一个足够大的值。请注意，`z[ijk]` 或 `z[jik]` 中只有一个会为 1。因此，两个不等式中有且仅有一个具有约束力。另一个将自动满足。\n\
  \n剩下的就是处理目标函数。我们希望得到一个能在最短时间内完成所有作业的调度方案。我们可以为每个作业的结束时间添加一个界限，并最小化该界限。例如，\n\n`x_{i\
  \ p_{ik}} + d_{i p_{ik}} ≤ T ∀ i ∈ J, ∀ k ∈ [0, …, |M| − 1]`\n\n目标为\n\n`min T`\n\
  \n其中 `T` 将是最后一个机器上最后一个任务的完成时间。\n\n\n\n#### 6.4.1.1 可执行模型\n\n可执行代码见清单 6-5。该代码假设输入是一个元组列表，其格式与表\
  \ 6-10 完全相同，为每个作业指明了所需机器的顺序以及每台机器上任务的持续时间。\n\n```\n1  def solve_model(D):\n2   \
  \ s = newSolver('JobuShopuScheduling', True)\n3    nJ,nM   =   len(D),len(D[0])\n\
  4    M = sum([D[i][k][1] for i in range(nJ) for k in range(nM)])\n5    x = [[s.NumVar(0,M,\"\
  ) for k in range(nM)] for i in range(nJ)]\n6    p = [[D[i][k][0] for k in range(nM)]\
  \ for i in range(nJ)]\n7    d = [[D[i][k][1] for k in range(nM)] for i in range(nJ)]\n\
  8    z = [[[s.IntVar(0,1,\") for k in range(nM)] \\\n9       for j in range(nJ)]\
  \ for i in range(nJ)]\n10    T = s.NumVar(0,M,\")\n11    for i in range(nJ):\n12\
  \      for k in range(nM):\n13        s.Add(x[i][p[i][k]] + d[i][k] <= T)\n14  \
  \      for j in range(nJ):\n15          if i != j:\n16           s.Add(z[i][j][k]\
  \  ==  1-z[j][i][k])\n17           s.Add(x[i][p[i][k]] + d[i][k] - M*z[i][j][p[i][k]]\
  \ \\\n18               <= x[j][p[i][k]])\n19           s.Add(x[j][p[j][k]] + d[j][k]\
  \ - M*z[j][i][p[j][k]] \\\n20              <= x[i][p[j][k]])\n21      for k in range(nM-1):\n\
