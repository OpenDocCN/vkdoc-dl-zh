  \ 88 96 | 663 | 989 | 664 | 335 | 588 | 434 | 297 | 1093 | 1012 | |\n\n### 5.4.1\
  \ 构建模型\n\n该模型将分阶段进行描述。\n\n#### 5.4.1.1 决策变量\n\n在这个问题中，我们需要决定的仅仅是路径，即要遵循的点序列。这与我们在最短路径问题中的决策相同；因此，假设\
  \ `P` 是点的集合，我们定义\n\n![$$ {x}_{i,j}\\in \\left\\{0,1\\right\\}\\forall i\\in P,\\\
  forall j\\in P, $$](img/A457410_1_En_5_Chapter_Equp.gif)\n\n其中，值为 1 的 `x[i,j]` 表示我们需要连接点\
  \ `i` 和 `j`。注意：这个问题与最短路径问题具有相同的决策变量和底层图结构。然而，它不是一个流问题；它要复杂得多，你很快就会开始体会到这一点。\n\n\
  #### 5.4.1.2 目标函数\n\n目标函数与最短路径模型相同。假设距离矩阵为 `D`，我们得到\n\n![$$ \\min \\kern0.125em\
  \ \\sum \\limits_i\\sum \\limits_j{D}_{i,j}{x}_{i,j} $$](img/A457410_1_En_5_Chapter_Equq.gif)\n\
  \n\n\n#### 5.4.1.3 约束条件\n\n在最短路径问题中，当我们进入一个中间节点时，必须确保也能离开该节点。而在此处，我们必须确保形成一条环游路径，即一条覆盖每个顶点恰好一次的单一闭合路径。因此，对于每个顶点，我们必须精确选择一条进入的弧和一条离开的弧，如下所示：\n\
  \n![$$ \\sum \\limits_{j\\in P\\backslash \\left\\{i\\right\\}}{x}_{i,j}=1\\forall\
  \ i\\in P $$](img/A457410_1_En_5_Chapter_Equ6.gif)\n\n(5.6) 和\n\n![$$ \\sum \\limits_{j\\\
  in P\\backslash \\left\\{i\\right\\}}{x}_{j,i}=1\\forall i\\in P $$](img/A457410_1_En_5_Chapter_Equ7.gif)\n\
  \n(5.7)\n\n现在真正的难点来了：区分旅行商问题（TSP）与最短路径问题。上述两个约束条件是否足够？也许令人惊讶，答案是否定的，它们并不足够。每个顶点都位于某条环游路径上，但可能存在不止一条这样的环游路径。满足上述约束条件后，我们可能会得到一条路径\
  \ 0, 1, 3, 4, 0，以及另一条环绕其余顶点的路径。这些有问题的路径被称为子环游（subtours），必须予以消除。消除的关键在于认识到：对于任意严格的节点子集，所选弧的数量必须小于节点数量。例如，为了消除子环游\
  \ 0, 1, 3, 4, 0，我们可以添加以下约束：\n\n`x[0,1] + x[1,0] + x[1,3] + x[3,1] + x[3,4] + x[4,3]\
  \ + x[4,0] + x[0,4] ≤ 3`。\n\n添加此约束后，求解器将永远不会在这四个有问题的顶点之间包含超过三条弧，从而防止它们之间形成子环游。另一种理解这类约束的方式是：它强制要求进入某个节点簇的路径必须离开该簇。难点在于存在大量可能的子环游，实际上其数量是指数级的：每个大小大于\
  \ 1 的顶点子集都是一个潜在的子环游。\n\n我们能否添加所有可能的子环游？从编程角度来看，这并不困难，但由此产生的模型会变得笨重，许多求解器的运行速度将慢得无法接受。诀窍在于迭代地改进模型，就像我们在优化非线性函数\
  \ 3.1.2.1 时所做的那样。但在这里，我们将利用一次求解器运行的结果来选择要添加到下一次运行中的约束。\n\n宏观视角：我们首先执行一个不含子环游消除约束的模型。如果求解器返回一条环游路径，则任务完成。如果它返回一组子环游，我们则为每个子环游（且仅针对它们）添加子环游消除约束。最终，所有相关的子环游都被消除，求解器返回整个图的一条环游路径。解释这种方法所花的时间，比通过编写几行代码来实现它要长得多。\n\
  \n#### 5.4.1.4 可执行模型\n\n让我们将其转化为可执行代码，并将其分为两部分：第一部分是一个模型，给定某个子环游集合后，它会针对该特定集合添加子环游消除约束并进行优化。参见代码清单\
  \ 5-5。第二部分是一个主例程，它迭代地调用第一个模型，并在子环游出现时将其添加进去。\n\n```\n1  def solve_model_eliminate(D,Subtours=[]):\n\
  2    s,n = newSolver(’TSP’, True),len(D)\n3    x = [[s.IntVar(0,0 if D[i][j] is\
  \ None else 1,”) \\\n4         for j in range(n)] for i in range(n)]\n5    for i\
  \ in range(n):\n6      s.Add(1 == sum(x[i][j] for j in range(n)))\n7      s.Add(1\
  \ == sum(x[j][i] for j in range(n)))\n8      s.Add(0 == x[i][i])\n9    for sub in\
  \ Subtours:\n10      K = [x[sub[i]][sub[j]]+x[sub[j]][sub[i]]\\\n11          for\
  \ i in range(len(sub)-1) for j in range(i+1,len(sub))]\n12      s.Add(len(sub)-1\
  \ >= sum(K))\n13    s.Minimize(s.Sum(x[i][j]*(0 if D[i][j] is None else D[i][j])\
  \ \\\n14                 for i in range(n) for j in range(n)))\n15    rc = s.Solve()\n\
  16    tours = extract_tours(SolVal(x),n)\n17    return rc,ObjVal(s),tours\n代码清单\
  \ 5-5\n带子环游消除约束的 TSP 模型 (tsp.py)\n```\n\n第 4 行定义了决策变量，即要选取的弧的二元指示符。从第 5 行开始的循环强制执行：每个节点必须有一条进入的弧和一条离开的弧，这与公式(5.6)-(5.7)完全一致。我们还强制所有`x[i][i]`为零，以避免自环。对于调用者提供的每个子环游，我们在第\
  \ 9 行提取相应团的所有弧，并约束它们的总和比该团中的顶点数少一。我们处理求解器返回的解，在第 16 行提取子环游并将其返回给调用者。此提取代码如代码清单 5-6\
  \ 所示。\n\n```\n1  def extract_tours(R,n):\n2    node,tours,allnodes = 0,[[0]],[0]+[1]*(n-1)\n\
  3    while sum(allnodes) > 0:\n4      next = [i for i in range(n) if R[node][i]==1][0]\n\
  5      if next not in tours[-1]:\n6        tours[-1].append(next)\n7        node\
  \ = next\n8      else:\n9        node = allnodes.index(1)\n10        tours.append([node])\n\
  11      allnodes[node] = 0\n12    return tours\n代码清单 5-6\n子环游提取\n```\n\n主循环很简单：我们不断迭代，直到求解器返回的环游路径数量为\
  \ 1，同时注意在发现子环游时将其累积起来。参见代码清单 5-7。\n\n```\n1  def solve_model(D):\n2    subtours,tours\
  \ = [],[]\n3    while len(tours) != 1:\n4      rc,Value,tours=solve_model_eliminate(D,subtours)\n\
  5      if rc == 0:\n6        subtours.extend(tours)\n7    return rc,Value,tours[0]\n\
  代码清单 5-7\nTSP 模型主程序 (tsp.py)\n```\n\n针对我们小示例的求解结果，如表 5-10 所示（每行一次迭代），说明了被消除的子环游。括号内是最优值，即总长度。随着我们消除子环游，该值自然增加。图\
  \ 5-1 以图形方式展示了该过程，其中每次迭代消除的子环游以不同的色调显示。\n\n![A457410_1_En_5_Fig1_HTML.jpg](img/A457410_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** TSP 示例的连续（部分）解\n\n**表 5-10** TSP 求解器的连续迭代，显示最优值和子环游\n\n| 迭代（值） | 环游路径\
  \ |\n| --- | --- |\n| 0-(2177) | [0, 2]; [1, 7, 8]; [3, 6, 9]; [4, 5] |\n| 1-(2526)\
  \ | [0, 2, 7]; [1, 8]; [3, 6]; [4, 9, 5] |\n| 2-(2673) | [0, 2, 3, 6, 9, 5, 4, 1,\
  \ 8, 7] |\n\n从 TSP 模型中需要领悟的关键思想，并非我们可以用它来解决超大规模实例（专门的算法会做得更好得多）。⁹ 而是，即使完全指定一个正确模型所需的约束数量庞大，我们仍有可能仅包含所需约束中极小的一部分，就能将问题求解至最优。要有效做到这一点，必须对问题有深刻的理解，并具备良好的实践建模技能（当然，还需要一个好的建模语言和库，例如\
  \ Python 和 OR-Tools）。\n\n最后，读者应注意，我们的子环游消除约束并非唯一可行的方法。消除子环游有多种方式，但没有一种像我们描述的那样易于实现。在实践中，嵌入了\
  \ TSP 子问题的问题通常还包含许多其他需求，这使得模型相对复杂。掌握一种简单而有效的处理子环游的方法，是所有建模者必备的技能。\n\n\n\n### 5.4.2\
  \ 变体\n\nTSP 是研究最深入的组合问题之一，因此它有许多变体。\n\n-   一个常见的简单变体是，我们需要的不是一条环游路线（闭合路径），而是一条覆盖所有顶点的简单路径。为便于参考，我们将此问题称为\
  \ TSP-P。由于我们知道如何求解环游问题，求解路径问题最简单的方法是将后者转化为前者。我们在网络中增加一个节点，称之为**虚拟节点**。同时，我们添加从虚拟节点到网络中所有其他节点、距离为零的弧。然后，我们在这个新网络上求解\
  \ TSP。在最优解中，我们会得到一条进出虚拟节点的环游路线。删除这两条弧即可得到所需的路径。实现此变体的代码如代码清单 5-8 所示，在我们的示例上运行路径模型的结果如表\
  \ 5-11 所示。\n\n**表 5-11** TSP-P 路径模型在示例上的运行结果\n\n| 节点 | 1 | 8 | 7 | 0 | 2 | 5 | 4\
  \ | 6 | 3 | 9 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | ---\
  \ |\n| 距离 | 0 | 295 | 350 | 221 | 107 | 264 | 93 | 268 | 101 | 302 |\n| 累计距离 | 0\
  \ | 295 | 645 | 866 | 973 | 1237 | 1330 | 1598 | 1699 | 2001 |\n\n```\n1  def solve_model_p(D):\n\
  2    n,n1 = len(D),len(D)+1\n3    E = [[0 if n in (i,j) else D[i][j] \\\n4     \
  \ for j in range(n1)] for i in range(n1)]\n5    rc,Value,tour = solve_model(E)\n\
  6    i = tour.index(n)\n7    path = [tour[j] for j in range(i+1,n1)]+\\\n8     \
  \     [tour[j] for j in range(i)]\n9    return rc,Value,path\n```\n\n**代码清单 5-8**\
  \ 求解 TSP-P 问题的代码 (`tsp.py`)\n\n-   一个更复杂的变体是允许重复访问节点。为便于参考，我们将此问题称为 TSP*。提出此问题的理由很简单：可以想象，如果允许重复访问任何节点，我们或许能找到一条总长度更短的行走路径。这里的技巧同样是依赖我们的\
  \ TSP 模型，通过将 TSP* 转化为另一个网络上的 TSP 来求解。新网络拥有完全相同的节点，但节点间的距离是原始网络中节点间最短路径的距离。我们必须小心地追踪这些最短路径，以便重构\
  \ TSP* 的解。由于我们已经实现了全源最短路径模型（第 4 章的代码清单 4-7），这里将直接使用它。实现 TSP* 的代码如代码清单 5-9 所示，其在示例上的解如表\
  \ 5-12 和图 5-2 所示。请注意，尽管它重复访问了一些节点，但总长度仍小于 TSP 的长度。\n\n![A457410_1_En_5_Fig2_HTML.jpg](img/A457410_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** TSP* 的解\n\n**表 5-12** TSP* 函数在示例上的运行结果\n\n| NB 12 | 0 | 2 | 3 | 6 |\
  \ 9 | 5 | 4 | 5 | 1 | 8 | 7 | 0 |\n| --- | --- | --- | --- | --- | --- | --- | ---\
  \ | --- | --- | --- | --- | --- |\n| 总距离 2636 | 0 | 107 | 281 | 93 | 238 | 434 |\
  \ 93 | 118 | 406 | 295 | 350 | 221 |\n\n```\n1  def solve_model_star(D):\n2    import\
  \ shortest_path\n3    n = len(D)\n4    Paths, Costs = shortest_path.solve_all_pairs(D)\n\
  5    rc,Value,tour = solve_model(Costs)\n6    Tour=[]\n7    for i in range(len(tour)):\n\
  8      Tour.extend(Paths[tour[i]][tour[(i+1) % len(tour)]][0:-1])\n9    return rc,Value,Tour\n\
  ```\n\n**代码清单 5-9** 求解 TSP* 问题的代码 (`tsp.py`)\n\n**脚注**\n\n¹ 用维格纳的话来说，这可能是数学在自然科学中具有不合理有效性的一个例子；或者更通俗地说，是因为我们主要解决那些我们知道如何解决的问题。\n\
  \n² 在某些情况下，使用二元选择 -1, 1 会使模型更简单。可惜的是，没有流行的整数求解器提供这个选项。\n\n³ [`www.coin-or.org`](http://www.coin-or.org)\n\
