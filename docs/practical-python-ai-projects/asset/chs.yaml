  ### 7.1.2 预分配切割模式


  前面的方法是最优的，但即使加入了对称性破缺约束，其扩展性也不佳。我将在此描述一种通常非最优的方法，可用于求解规模更大的实例。


  基本思路是固定切割模式，仅优化使用这些模式的卷材数量，同时满足需求。例如，假设我们已知表 7-2 最后一列的不同模式（存储在矩阵 `A` 中），以及表 7-1
  中的数据（存储在数组 `D` 中）。那么我们可以定义一个决策变量 `y`，其索引对应 `A` 中的模式，表示按照该模式切割的卷材数量。用符号表示，模型如下：


  ![$$ {\displaystyle \begin{array}{l}\min \kern0.125em \sum \limits_j\ {y}_j\\ {}\kern1.25em
  \ \ {A}_{j,i}{y}_j\ge {D}_i\forall i\\ {}\kern1.25em \ \ {y}_j\in \left[0,1,2,\dots
  \right]\end{array}} $$](A457410_1_En_7_Chapter_Equh.gif)


  这看起来很简单，直到我们仔细考虑模式的数量。如果我们事先不知道使用哪些模式，那么简单的做法似乎是列出所有模式。有多少种模式呢？即使对于小规模示例，这个数字也是天文数字。


  因此，这里有一个绝妙的想法：从一组特定的模式开始，进行优化。然后，以某种尚未确定的方式，寻找一些“更好”的模式加入其中。在优化领域，这种方法通常被称为列生成¹。重复优化过程，直到我们无法再找到“更好”的模式，或者时间耗尽，或者对求解结果感到满意为止。清单
  7-4 实现了这种高层方法。


  ```

  1  def solve_large_model(D):

  2    n,iter = len(D),0

  3    A = get_initial_patterns(D)

  4    while iter = b[i]))

  22    rc = s.Solve()

  23    y = [int(ceil(e.SolutionValue())) for e in y]

  24    return rc, y, [0 if integer else u[i].DualValue() \

  25               for i in range(m)]

  清单 7-4

  使用给定模式的切割库存模型 (cutting stock.py)

  ```


  在第 4 行，我们循环进行一定次数的优化。这是一个简单的终止条件，我们可以根据所求解问题的规模以及愿意等待的时间来调整。存在更好的终止条件，例如循环直到获得真正的最优解，但这会让我们深入优化理论²。


  主问题本质上就是上面描述的问题：给定一组允许的模式，尽最大努力最小化卷材数量。这里有两个微妙之处。第一，我们将优化问题作为线性规划而非整数规划来求解，尽管我们真正想要的是整数解（即卷材数量）。这样做是为了提高速度。最后，我们只需将卷材数量向上取整，因为显然如果
  4.6 卷就能满足需求，那么 5 卷也一定能满足需求。


  第二个微妙之处涉及寻找更好模式所需的信息。考虑一个约束条件的虚构示例，其形式如第 21 行所示：假设对于产品卷材 5，我们需要 28 个消费卷材来满足需求。考虑到我们已有的模式，模式
  1 包含该卷材 3 次，模式 3 包含 5 次，模式 10 包含 1 次（并且没有其他模式包含卷材 5）。因此约束条件为：


  `3y[1] + 5y[3] + 1y[10] ≥ 28`，


  其中 `y` 是解。如果将 28 精确改变 1 个单位，同时保持其他所有条件不变，会产生什么影响？这将使最优解发生微小变化，即卷材 5 的边际价值。从概念上讲，我们可以对每个卷材都这样做，从而得到每个卷材的边际价值。根据设计，所有求解器都已经计算出了这些边际价值；它们是求解技术的副产品。因此，我们只需在第
  25 行通过调用 `DualValue` 来获取它们。




  最后，我们重新格式化求解结果，使其对调用方有意义。我们返回一个数组，其中包含每个使用的卷材、该卷材产生的废料以及所使用的切割模式。


  主模型用于寻找新模式以进行优化的模型（清单 7-5）利用主模型求解提供的每个卷材的边际价值，并最大化该价值乘以该卷材在模式中出现次数的总和，同时确保模式在第 7
  行不超过大卷的总宽度。这是一个背包问题，求解速度非常快。


  ```

  1  def get_new_pattern(l,w):

  2    s = newSolver(''Cuttingustockuslave'', True)

  3    n = len(l)

  4    a = [s.IntVar(0,100,") for i in range(n)]

  5    Cost = sum(l[i]*a[i] for i in range(n))

  6    s.Maximize(Cost)

  7    s.Add(sum(w[i]*a[i] for i in range(n)) <= 100)

  8    rc = s.Solve()

  9    return SolVal(a), ObjVal(s)

  ```

  *清单 7-5 切割库存模型（获取新模式）*


  我们还有两个要素未描述：初始模式，以及将求解结果重新格式化使其有意义。从清单 7-6 可知，初始模式必须能够保证得到一个可行解，即满足所有需求的解。我们在这方面可以非常有创意，也可以不。考虑到模型已经比较复杂，我们选择后者。我们的初始模式每个模式只包含一个卷材，这显然可行但效率低下。


  ```

  1  def get_initial_patterns(D):

  2    n = len(D)

  3    return [[0 if j != i else 1 for j in range(n)]\

  4          for i in range(n)]


  6  def rolls_patterns(C, y, D):

  7    R,m,n = [],len(C),len(y)

  8    for j in range(n):

  9      for _ in range(y[j]):

  10        RR=[]

  11        for i in range(m):

  12          if C[i][j]>0:

  13            RR.extend([D[i][1]]*int(C[i][j]))

  14      w=sum(RR)

  15      R.append([100-w,RR])

  16    return R

  ```

