  \ `K` 种商品和一组 `N` 个节点，\n\n![$$ {x}_{k,i,j}\\in \\left[0,1,2,\\dots \\right]\\forall\
  \ i\\in N,\\forall j\\in N,\\forall k\\in K $$](A457410_1_En_6_Chapter_Eque.gif)\n\
