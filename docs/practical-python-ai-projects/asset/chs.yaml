- "# 6. 经典混合模型\n\n在本节中，我们将为需要混合连续变量和整数变量以及各种约束的问题建立模型。传统上，这些模型被称为混合整数规划 (MIP)。¹\n\n\
  我将介绍几个需要结合连续变量和离散变量的经典问题。设施选址问题所展示的原型且最简单的情况是，我们有在网络中流动的连续对象，但网络节点的存在与否取决于一个优化决策。另一个极端是，最困难的情况之一是作业车间调度问题，我们希望在满足优先约束的条件下，为不同机器上的操作序列进行排序。\n\
  \n这些混合模型的难度差异很大。对于前一种情况，我们能解决的问题规模几乎没有限制；然而，对于后一种类型，即使只有十几个元素的问题，在实践中也几乎是难以处理的。\n\
  \n\n\n## 6.1 设施选址问题\n\n让我们重新审视在讨论流问题时首次遇到的分配问题，但这次增加了一些新的变化。回顾第 4 章第 4.2 节，当时 Solar-1138\
  \ 公司需要决定由哪个电厂向哪个城市供电。现在，我们进一步假设 Solar-1138 正处于规划阶段，需要首先决定建造哪些电厂，然后再向城市供电。数据与之前类似。首先是每个候选电厂到每个城市的成本矩阵，如表\
  \ 6-1 所示。\n\n**表 6-1** 配送成本示例\n\n| 起点/终点 | 城市 0 | 城市 1 | 城市 2 | 城市 3 | 城市 4 | 城市\
  \ 5 | 城市 6 | 供应量 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 电厂\
  \ 0 | 20 | 23 | 23 | 24 | 28 | 25 | 13 | 544 |\n| 电厂 1 | 19 | 18 | 30 | 25 | 19\
  \ | 17 | 14 | 621 |\n| 电厂 2 | 29 | 13 | 19 | 17 | 22 | 15 | 11 | 635 |\n| 电厂 3 |\
  \ 16 | 23 | 29 | 22 | 29 | 26 | 11 | 549 |\n| 电厂 4 | 23 | 20 | 10 | 27 | 23 | 19\
  \ | 20 | 534 |\n| 电厂 5 | 21 | 12 | 23 | 29 | 14 | 15 | 22 | 676 |\n| 电厂 6 | 13 |\
