  \ |\n| P11 |   |   |   |   |   |   |   |   | 32 | 61 | 58 |   | 56 |\n| P12 |  \
  \ |   |   |   |   |   |   |   | 59 |   |   | 56 |   |\n\n### 4.4.1 构建模型\n\n在这个问题中，我们需要决定从起点到终点要选择的点序列。这是给定点集（例如\
  \ `P`）的一个子集，以及遍历这些点的顺序。事实证明，最有效的方法是将点视为节点，将距离视为弧上的权重，从而构建一个图。在图上选择一条路径，就对应于原始地图上的一条路径。\n\
  \n乍一看，这可能不太自然。甚至可能不清楚如何构建一个决策变量来保存点的子集及其访问顺序。诀窍在于：对于图上的每条弧，我们都有一个决策变量，该变量恰好取两个值之一：如果我们不采用这条弧，则为零；如果我们采用这条弧，则为一。因此，\n\
  \n![$$ {x}_{i,j}\\in \\left[0,1\\right]\\forall i\\in P,\\forall j\\in P $$](A457410_1_En_4_Chapter_Equl.gif)\n\
  \n以我们的示例路径 0,3,2,5 为例，决策变量 `x[0,3]`、`x[3,2]` 和 `x[2,5]` 的值为 1，而所有其他弧变量的值为 0。读者应该能看出这与其它流问题的相似之处：想象一个所有弧容量都为\
  \ 1 的网络；一个整数解将是在某些相邻弧序列上的流量值为 1，而在所有其他弧上的流量值为 0。\n\n目标函数相应地很简单。假设距离矩阵为 `D`，\n\n\
  ![$$ \\min \\kern0.125em \\sum \\limits_i\\sum \\limits_j{D}_{i,j}{x}_{i,j} $$](img/A457410_1_En_4_Chapter_IEq4.gif)，\n\
  \n我们如何确保选择一条从起点到终点的相邻弧序列？通过将其建模为通过图的单位流量，其中起点是值为 1 的源点，终点是值为 1 的汇点。我们只需要之前使用过的常规流量守恒约束。\n\
  \n可执行模型见代码清单 4-4，其中我们假设有一个距离矩阵 `D`，并带有可选的起点和终点。我们可以使用现有的流问题代码，但在此情况下，为了方便调用者，我们将编写一个专用代码来帮助调用并返回有意义的答案。毕竟，作为建模者，我们将此问题视为图上的流，但调用者考虑的是最短路径！我们不要用不自然的决策变量来给他增加负担。更不用说可能有百万个点，因此有万亿⁶个决策变量，而从调用者的角度来看，解可能只涉及这些变量中极小的一部分。\n\
  \n```\n1   def solve_model(D,Start=None, End=None):\n2     s,n = newSolver('Shortestupathuproblem'),len(D)\n\
  3     if Start is None:\n4       Start,End = 0,len(D)-1\n5     G = [[s.NumVar(0,1\
  \  if D[i][j] else  0,\") \\\n6          for j in range(n)] for i in range(n)]\n\
  7     for i in range(n):\n8       if i == Start:\n9         s.Add(1 == sum(G[Start][j]\
  \ for j in range(n)))\n10         s.Add(0 == sum(G[j][Start] for j in range(n)))\n\
  11     elif i == End:\n12       s.Add(1 == sum(G[j][End] for j in range(n)))\n13\
  \       s.Add(0 == sum(G[End][j] for j in range(n)))\n14     else:\n15       s.Add(sum(G[i][j]\
  \ for j in range(n)) ==\n16            sum(G[j][i] for j in range(n)))\n17     s.Minimize(s.Sum(G[i][j]*(0\
  \ if D[i][j] is None else D[i][j]) \\\n18                   for i in range(n) for\
  \ j in range(n)))\n19     rc  = s.Solve()\n20     Path,Cost,Cumul,node=[Start],[0],[0],Start\n\
  21     while rc == 0 and node != End and len(Path)<n:\n22       next = [i for i\
  \ in range(n) if SolVal(G[node][i]) == 1][0]\n23       Path.append(next)\n24   \
  \    Cost.append(D[node][next])\n25       Cumul.append(Cumul[-1]+Cost[-1])\n26 \
  \      node = next\n27     return rc,ObjVal(s),Path,Cost,Cumul\n```\n**代码清单 4-4**\
  \ 最短路径模型 (`shortest path.py`)\n\n\n\n在第 3 行，如果调用者没有指定起始节点和结束节点，我们将它们设置为第一个和最后一个节点。第\
  \ 6 行定义了决策变量。我们对范围应用了一个小技巧：我们知道，如果距离矩阵中有一个零条目，这意味着两点之间没有路径。在这种情况下，我们给出一个`[0, 0]`的范围，这迫使该变量为零。在其他情况下，范围将是`[0,\
  \ 1]`。请注意，这个范围允许分数值，但由于流问题中约束的结构，任何变量都不会出现分数值。它们都将为 0 或 1。\n\n在第 9 行和第 12 行，我们将起始节点的供应量设置为\
  \ 1，将结束节点的需求量设置为 1。在所有其他节点（第 16 行），流量守恒确保流入量等于流出量。这将产生一个由从起点到终点的连续路径组成的解。\n\n第 18\
  \ 行的目标函数与所有流问题示例具有相同的结构：成本（此处为距离）与所用弧的指示变量的乘积。\n\n在求解问题之后，我们处理解，以向调用者返回比我们的决策变量更小且可能更有意义的内容：一个从点到点的跳跃序列，以及每次跳跃的距离。建模者的工作是隐藏解决问题所需的技巧，并向调用者提供有意义的解。与上述示例对应的解如表\
  \ 4-9 所示。\n\n**表 4-9** 最短路径问题的最优解\n\n| 点 | 0 | 3 | 7 | 9 | 10 | 12 |\n| --- | ---\
  \ | --- | --- | --- | --- | --- |\n| 距离 | 0 | 24 | 17 | 14 | 28 | 6 |\n| 累计 | 0\
  \ | 24 | 41 | 55 | 83 | 89 |\n\n### 4.4.2 替代算法\n\n如果读者了解 Dijkstra 算法，他可能会疑惑为什么我们要为最短路径创建一个线性规划模型，尤其是因为\
  \ Dijkstra 算法的一个快速实现可能更快。答案是，在建模者的现实生活中，我们很少需要解决纯最短路径问题（或者实际上，纯任何问题）。在教科书之外的大多数情况下，问题的核心可能是一个最短路径，但必然会有许多额外的考虑。将这些考虑以附加约束的形式添加到基本的最短路径线性规划中通常是一件简单的事情。相比之下，尝试修改\
  \ Dijkstra 的实现（假设我们甚至能访问源代码）可能会困难得多，甚至可能根本不可能。\n\n### 4.4.3 变体\n\n*   可能我们想要最小化距离的乘积，而不是距离的总和。我们不能用线性求解器对变量进行乘法运算，但我们可以通过对距离取对数并最小化对数的和来稍微转换问题。\n\
  *   或者，我们可能对起点和终点之间的最长路径感兴趣。理论上，这不太可能在所有情况下都通过线性规划求解⁷，但阻碍理论的病态情况很少，并且可能不适用于当前的问题。另一种看待这个问题的方式是，存在一大类网络，在其中可以找到最长路径。\n\
  \n最简单的转换是将最小化改为最大化。我们可以通过取反距离矩阵来获得最大化。但这将允许重复节点；更糟糕的是，它可能导致一个无界模型（无限循环）。问题在于“流”可能无限次地绕着一个循环运行。一个部分解决方案是添加约束以确保没有超过一个单位的流进入任何节点。在最小化的情况下，这是一个冗余约束，但在最大化的情况下则不是。通过这种方式，我们消除了无限循环和重复节点。但仍然存在一个问题：子环路。我将在第\
  \ 5 章的 5.4 节中解释并处理这个问题。\n\n在无环有向图的情况下，最长路径很容易找到。你之前见过这些路径有意义的情况：在第 2 章的 2.3.1 节中，我讨论了项目管理的关键路径。这些是一系列任务，如果它们被延迟，将会延迟整个项目。请注意，这些路径很少是唯一的，因此寻找一条（或者更糟，寻找“那条”）最长路径是错误的（关于一个简单的例子，请参见任务\
  \ 1 和 2 以及图`fig:process-example`）。让我们创建一个小的函数，它将从我们的项目管理模型的最优解开始，并使用我们的最短路径模型来提取关键路径。详情请参见清单\
  \ 4-5。\n\n```\n1   def critical_tasks(D,t):\n2     s = set([t[i]+D[i][1] \\\n3 \
  \           for i in range(len(t))]+[t[i] for i in range(len(t))])\n4     n,ix,start,end,times\
  \ = len(s),0,min(s),max(s),{}\n5     for e in s:\n6       times[e]=ix\n7       ix\
  \ += 1\n8     M = [[0 for _ in range(n)] for _ in range(n)]\n9     for i in range(len(t)):\n\
  10       M[times[t[i]]][times[t[i]+D[i][1]]] = -D[i][1]\n11     rc,v,Path,Cost,Cumul\
  \ = solve_model(M,times[start],times[end])\n12     T = [i for i in range(len(t))\
  \ \\\n13         for time in Path if times[t[i]+D[i][1]] == time]\n14     return\
