  `binary` 设置为 `False`。


  在二元情况下，我们简单地将参数 x 重命名为 l；在其他情况下，我们创建二元变量数组 l，然后在第 11 行设置公式 (7.1) 的强制边界（如果 `x ∈ [0,
  u]`），并在第 13 行进行相应设置（如果 `x ∈ [l, 0]`）。


