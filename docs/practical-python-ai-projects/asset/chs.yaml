  \n![$$ \\min \\sum \\limits_k\\sum \\limits_i\\sum \\limits_j{C}_{k,i,j}{x}_{k,i,j}\
  \ $$](img/A457410_1_En_6_Chapter_Equf.gif)\n\n现在我们最小化在网络上运输所有商品的成本。\n\n#### 6.2.1.3\
  \ 约束条件\n\n约束条件是广义的流量守恒，需要注意它们必须对每种商品分别成立：\n\n![$$ \\sum \\limits_j{x}_{k,j,i}-\\\
  sum \\limits_j{x}_{k,i,j}={D}_{k,i}-{S}_{k,i}\\forall k\\in K,i\\in N $$](img/A457410_1_En_6_Chapter_Equ5.gif)\n\
  \n(6.5)\n\n\n\n#### 6.2.1.4 可执行模型\n\n让我们将其转化为一个可执行模型，如代码清单 6-2 所示。该函数接受一个三维数组 `C`，表示每种商品在每条弧上的成本。它还接受\
  \ `D` 中的容量，该容量可以是一个标量（表示所有弧具有相同容量），也可以是一个二维数组（用于指定每条弧的容量）。最后，它接受参数 `Z`，用于指示：如果为\
  \ `True`，则必须将其作为整数规划求解，因为通过网络运输的元素是不可分割的；如果为 `False`，则接受分数解。设置最后一个参数的原因是，接受分数解虽然能极大加速求解过程，但仍可能产生整数解。\n\
