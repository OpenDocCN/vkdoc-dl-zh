  k 个变量为非零。⁵


  读者可能还记得，在第一章（第 2.1 节）讨论变体时，我们留下了一个未满足的需求，形式为“如果使用了食物 3，那么就不能使用食物 4（反之亦然）”。这种互斥关系现在可以轻松处理。回顾代码清单
  2-1，我们的食物选择使用了决策变量 f。然后我们可以在模型中添加一行代码：


  ```

