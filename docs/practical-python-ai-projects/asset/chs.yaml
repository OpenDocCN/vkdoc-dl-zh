  \         sum(x[k][i][j] for j in range(n)) - \\\n12             sum(x[k][j][i]\
  \ for j in range(n)))\n13    if D:\n14     for i in range(n):\n15       for j in\
  \ range(n):\n16         s.Add(sum(x[k][i][j] for k in range(K)) <= \\\n17      \
  \        D  if type(D) in [int,float] else D[i][j])\n18    Cost = s.Sum(C[k][i][j]*x[k][i][j]\
  \ if C[k][i][j] else 0\\\n19         for i in range(n) for j in range(n) for k in\
