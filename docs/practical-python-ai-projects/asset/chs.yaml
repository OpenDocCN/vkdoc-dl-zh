  \ |   |\n\n### 6.2.2 变体\n\n#### 6.2.2.1 全源最短路径（重访）\n\n既然多商品流只是对转运问题的简单修改，为什么我还要介绍它呢？因为它们常被用于通过调整问题结构来适配多商品流模型。⁴\
  \ 这里有一个简单的例子：还记得寻找网络中所有节点对之间最短路径的问题吗？我们之前是通过求解一系列最短路径模型来完成的。现在可以通过运行单个多商品流模型来找到所有这样的路径；更好的是，它永远不需要整数约束，从而确保极短的运行时间。\n\
  \n其技巧是将每个节点视为某种特定商品的供应商，供应量为 `n - 1`。同时，每个节点也是其他节点提供的 `n - 1` 种商品的消费者。代码清单 6-3 实现了这种方法。该代码比这更通用一些，因为它允许我们指定一组源节点，并找出从这些节点出发到所有其他节点的路径。\n\
  \n在第四章 4 的全源最短路径问题上运行相同的代码，会得到相同的结果。（见表 4-11）。区别在于，流代码的速度要快得多。事实上，它通常比运行某些专用算法（如\
  \ Floyd-Warshall）快得多，后者的复杂度固定为 `n³`，而我们的流问题通常可以在与 `n` 成正比的时间内求解。\n\n```\n1  def\
  \ solve_all_pairs(D,sources=None):\n2    n,C = len(D),[]\n3    if sources is None:\n\
  4     sources = [i for i in range(n)]\n5    for node in sources:\n6     C0 = [[0\
  \ if n in [i,j] else D[i][j] for j in range(n+1) ] \\\n7         for i in range(n+1)]\n\
  8     C0[node][-1] = n-1\n9     for j in range(n):\n10      if j!= node:\n11   \
  \     C0[-1][j] = 1\n12      C.append(C0)\n13    rc,Val,x = solve_model(C)\n14 \
  \   Paths = [[None for _ in range(n)] for _ in sources]\n15    Costs = [[0 for _\
  \ in range(n)] for _ in sources]\n16    if rc == 0:\n17      for source in sources:\n\
  18       ix = sources.index(source)\n19       for target in range(n):\n20      \
  \  if source != target:\n21          Path,Cost,node = [target],0,target\n22    \
  \      while  Path[0] != source  and  len(Path)=0.1][0]\n24           Path.insert(0,v)\n\
  25           Cost  +=  D[v][node]\n26           node = v\n27         Paths[ix][target]\
  \ = Path\n28         Costs[ix][target] = Cost\n29    return rc, Paths, Costs\n代码清单\
  \ 6-3\n通过多商品流求解全源最短路径\n```\n\n表 6-6 显示了运行代码并请求从节点 0 和节点 2 出发的最短路径的结果。读者应能看出，路径长度与表\
