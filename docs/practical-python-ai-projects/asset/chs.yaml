  \ 7; 10 } | 零件 #22 | { 9 } |\n| 零件 #23 | { 7; 14 } | 零件 #24 | { 12 } |\n\n### 5.1.2\
  \ 变体\n\n变体层出不穷，来自看似无关的领域。\n\n- 集合覆盖问题的一个著名实例是臭名昭著的机组排班问题。假设我们是一家航空公司，希望确保在特定时间窗口内覆盖所有所谓的航段（城市对）。我们拥有机组人员从城市\
  \ A 到城市 B 的排班表，中间会在城市 C、D、……、E 经停。我们的任务是使用最少的排班表覆盖所有航段。\n- 另一个极客风格的例子涉及计算机病毒检测。假设我们有一个包含数千种计算机病毒的数据库，并试图构建一个检测器。一种方法是尝试识别这些病毒中存在但非病毒代码中不存在的短字节串。我们希望最小化字符串的数量，同时识别所有病毒。然后，我们的检测器将在数据（硬盘上的所有程序）中查找这一小部分字符串。\n\
  - 在电信领域也有应用。假设我们可以在城市中的多个位置建造手机信号塔。考虑到每个塔的成本，我们希望最小化支出，同时覆盖城市中的所有建筑物和房屋。\n- 我们应该在城市中何处设置消防站，以便在考虑平均响应时间的情况下，最小化消防站数量，同时覆盖整个城市？\n\
  \n\n\n## 5.2 集合打包\n\n与集合覆盖问题相对应的镜像问题是集合打包。在这两种问题中，我们都有一个全集和一个子集集合，需要从中选择一些子集。在前者中，我们的目标是用最少的子集覆盖全集，可能某些元素会被覆盖多次。在后者中，目标是尽可能多地选择子集，但每个元素最多只能被选择一次。因此，某些元素可能不会被覆盖。\n\
  \n为了说明这个问题，我们考虑一个航空公司机组排班的应用。简化来说，假设每架飞机必须配备一名机长、一名副机长、一名领航员和一名乘务长。每个这样的组合称为一个排班表。有些机长可能只能驾驶某些类型的飞机，而不能驾驶其他类型。机长们也可能对副机长有偏好（反之亦然）。从概念上讲，我们可以将飞机/机长/副机长/领航员/乘务长的特定组合视为我们飞机和机组人员全集的一个子集。我们的目标是最大化所选子集的数量，但绝不能选择两个共享元素的子集，因为一名机长不能同时出现在两个地方。表\
  \ 5-3 展示了这个问题的一个小实例。\n\n**表 5-3** 机组排班中的集合打包示例\n\n| 排班表编号 | 机组人员 ID | 排班表编号 | 机组人员\
  \ ID |\n| --- | --- | --- | --- |\n| 0 | { 3; 18; 30 } | 1 | { 4; 4; 36 } |\n| 2\
  \ | { 1; 5; 9 } | 3 | { 7; 17; 30 } |\n| 4 | { 10; 23; 23 } | 5 | { 8; 10; 25 }\
  \ |\n| 6 | { 19; 29; 36 } | 7 | { 3; 4; 17 } |\n| 8 | { 19; 28; 40 } | 9 | { 11;\
  \ 24; 31 } |\n| 10 | { 18; 30; 33 } | 11 | { 22; 25; 26 } |\n| 12 | { 13; 15; 26\
  \ } | 13 | { 21; 27; 28 } |\n| 14 | { 7; 12; 33 } |   |   |\n\n### 5.2.1 构建模型\n\n\
  模型将分阶段构建。\n\n#### 5.2.1.1 决策变量\n\n在这个问题中，我们需要做出的决策与集合覆盖问题非常相似：选择哪些排班表。同样，这是一个是/否决策，这暗示了使用指示变量。假设我们有一个机组排班表集合\
  \ `S`，将我们的指示变量声明为：\n\n```\ns_i ∈ {0,1} ∀ i ∈ S\n```\n\n#### 5.2.1.2 目标函数\n\n最简单的目标是最大化所选排班表的数量，因此：\n\
  \n```\nmax ∑_{i∈S} S_i\n```\n\n当然，我们也可以有一个变体，为每个排班表赋予一个价值，并最大化总价值。\n\n#### 5.2.1.3\
  \ 约束条件\n\n约束条件只有一个，即永远不能选择两个包含同一机组人员的排班表。由于我们的决策变量是 0-1 变量，我们可以简单地强制要求，对于每个机组人员，包含该机组人员的排班表变量之和最多为\
  \ 1。\n\n如果排班表 `i` 的所有机组人员都包含在 `S_i` 中，并且机组人员的全集是 `U`，我们得到：\n\n```\n∑_{i:j∈S_i} s_i\
  \ ≤ 1 ∀ j ∈ u\n```\n\n#### 5.2.1.4 可执行模型\n\n可执行模型如代码清单 5-2 所示。它与代码清单 5-1 非常相似，接收一个二维数组\
  \ `D`，其中包含机组排班表列表，与表 5-3 完全一致。该函数还将接受一个可选的成本数组 `C`，用于附加到每个排班表。\n\n```\n1  def solve_model(D,C=None):\n\
  2    s = newSolver('SetuPacking', True)\n3    nbRosters,nbCrew = len(D),max([e for\
  \ d in D for e in d])+1\n4    S = [s.IntVar(0,1,”) for i in range(nbRosters)]\n\
  5    for j in range(nbCrew):\n6      s.Add(1 >= sum(S[i] for i in range(nbRosters)\
  \ if j in D[i]))\n7    s.Maximize(s.Sum(S[i]*(1 if C==None else C[i]) \\\n8    \
  \  for i in range(nbRosters)))\n9    rc = s.Solve()\n10    Rosters=[i for i in range(nbRosters)if\
  \ S[i].SolutionValue()>0]\n11    return rc,s.Objective().Value(),Rosters\n代码清单 5-2\n\
  集合打包模型 (set packing.py)\n```\n\n对于我们的实例，在没有成本数组的情况下，一个解出现在表 5-4 中。\n\n**表 5-4**\
  \ 集合打包的最优解\n\n![A457410_1_En_5_Figa_HTML.gif](img/A457410_1_En_5_Figa_HTML.gif)\n\
  \n### 5.2.2 变体\n\n几个小的变体。\n\n*   主要的变体是为所选排班表赋予成本。然后我们最小化总成本。给出的代码已经实现了这种可能性。\n\
  *   另一种可能性是结合集合覆盖和集合打包：我们希望完全覆盖全集，并且每个元素恰好使用一次。在这种情况下，我们称之为集合划分。\n\n## 5.3 装箱问题\n\
  \n尽管集合打包和当前问题（装箱问题）在形式上相似，但这两个问题的难度却截然相反。集合覆盖是容易处理的表亲，而集合打包则是久经沙场的老阿姨。为了解决它，我们需要超越显而易见的自然公式，深入挖掘一套新的工具。\n\
  \n抽象地说，装箱问题是将一个集合进行划分的问题，其中每个元素都有一个重量，我们的目标是使分组数量最小化，同时确保每个分组的重量不超过规定的限制。\n\n为了说明这一点，运输公司\
  \ VQT Inc. 拥有若干辆卡车，每辆都有最大载重能力。在一个特定的早晨，他们有各种重量的包裹需要运输。表 5-5 描述了一个简单的实例。目标是使运送所有包裹所需的卡车数量最小化。\n\
  \n**表 5-5** 装箱问题示例\n\n|   | 卡车载重限制 | 1264 |\n| --- | --- | --- |\n| 包裹数量 | 单位重量\
  \ |\n| --- | --- |\n| 0 | 8 | 258 |\n| 1 | 10 | 478 |\n| 2 | 8 | 399 |\n| 总计 | 26\
  \ | 10036 |\n\n请注意，仅考虑重量限制并不完全符合现实。包裹也有体积，我们很可能需要能够根据体积进行装箱。但那个问题要困难得多，我们将把它放在一边。还应该考虑距离因素，我们将在后面的章节中处理这个问题（见\
  \ 5.4）。值得重复的一点是：现实生活中的优化问题很少（如果有的话）是纯粹而简单的教科书式问题。它们总是多个问题的组合。一个好的建模者能认识到这一点，并拥有建模所有问题的工具集。\n\
  \n### 5.3.1 构建模型\n\n模型将分阶段描述。\n\n#### 5.3.1.1 决策变量\n\n我们需要决定的是：“哪个包裹放入哪辆卡车？”我们知道所有包裹。尽管有许多相同的包裹实例（就我们的目的而言，即重量相同），我们可以为它们分配序号。但我们实际上并不知道卡车的数量。\n\
  \n这正是我们试图回答的问题之一。尽管如此，我们当然可以通过某种启发式方法给出卡车数量的上界。在最坏的情况下，我们可以肯定地说，我们最多需要每辆卡车运送一个包裹。\n\
  \n因此，假设有 `P` 个包裹，最多有 `T` 辆卡车。那么我们的决策变量是：\n\n```\nx_{i,j} ∈ {0,1} ∀ i ∈ P, j ∈ T\n\
  ```\n\n其中 `x[i,j] = 1` 表示包裹 `i` 放入卡车 `j`。\n\n这是一个好的开始，但我们还需要知道我们将需要哪些卡车。因此，似乎需要另一个决策变量，即：\n\
  \n```\ny_j ∈ {0,1} ∀ j ∈ T\n```\n\n其中 `y[j] = 1` 表示卡车 `j` 将被使用。这似乎回答了我们需要回答的所有问题。\n\
  \n\n\n#### 5.3.1.2 约束条件\n\n首先，我们需要在变量 `x[i,j]` 和 `y[j]` 之间建立关系，因为如果对于任意 `i`，`x[i,j]`\
  \ 为 1，那么对应的 `y[j]` 必须等于 1（表示使用了卡车 `j`）。另一种理解方式是，我们不能将包裹放入未使用的卡车中。你之前已经见过这种类型的约束。回想一下第\
  \ 2 章第 2.1.2 节的饮食问题，其中一条约束是：“如果使用了食物 2，那么饮食中必须至少包含等量的食物 3。”\n\n总体思路是确保一个变量受限于另一个变量或其倍数。在这种情况下，这个技巧建议使用\n\
  \n![$$ {x}_{i,j}\\le {y}_i\\forall i\\in P,\\forall j\\in T $$](img/A457410_1_En_5_Chapter_Equ2.gif)\n\
  \n(5.2)\n\n这确实满足我们的关系，尽管读者可能会觉得它相当浪费。确实，我们很快就会对这个尝试进行精简。顺便注意，我们还需要约束每辆卡车上包裹重量的总和。假设包裹\
  \ `i` 的重量为 `w[i]`，卡车 `j` 的容量为 `W[j]`，我们需要\n\n![$$ \\sum \\limits_{i\\in P}{w}_i{x}_{i,j}\\\
  le {W}_j\\forall j\\in T $$](img/A457410_1_En_5_Chapter_Equ3.gif)\n\n(5.3)\n\n现在，当我们注意到类似约束的数量激增时，一个显而易见的问题是：“有没有办法将公式\
  \ (5.2) 和 (5.3) 结合起来？” 确实有：\n\n![$$ \\sum \\limits_{i\\in P}{w}_i{x}_{i,j}\\le {W}_j{y}_j\\\
  forall j\\in T $$](img/A457410_1_En_5_Chapter_Equ4.gif)\n\n(5.4)\n\n我们可以看到，公式 (5.4)\
  \ 同时包含了 (5.2) 和 (5.3)。我们将约束数量从 `|P||T| + |T|` 减少到了 `|T|`，这是一个显著的改进。\n\n至此，我们的模型保证了：\n\
  \n*   如果任何包裹被装载到某辆卡车上，则该卡车被使用。\n*   每辆卡车上包裹的总重量不超过其容量。\n\n最后，我们确保每个包裹都能被分配到某辆卡车上：\n\
  \n![$$ \\sum \\limits_{i\\in T}{x}_{i,j}=1\\forall i\\in P $$](img/A457410_1_En_5_Chapter_Equ5.gif)\n\
  \n(5.5)\n\n#### 5.3.1.3 目标函数\n\n最简单的目标是最小化使用的卡车数量，因此\n\n![$$ \\min \\kern0.125em\
  \ \\sum \\limits_{j\\in T}{y}_j $$](img/A457410_1_En_5_Chapter_Equi.gif)\n\n####\
  \ 5.3.1.4 可执行模型\n\n我们假设函数接收一个数组 `D`，其中包含一个包裹列表，列表中有每个包裹的重量以及每种重量的包裹数量（我们称之为重量等级），与表\
  \ 5-5 完全相同。它还接收 `W` 中每辆卡车的重量容量。第三个参数是可选的，将在我们解决小示例后进行解释。只需注意，其默认值为 `False`，在这种情况下，一组尚未解释的大量约束将被跳过（第\
  \ 17 至 27 行）。参见清单 5-3。\n\n```\n1  def solve_model(D,W,symmetry_break=False,knapsack=True):\n\
  2    s = newSolver('BinuPacking',True)\n3    nbC,nbP = len(D),sum([P[0] for P in\
  \ D])\n4    w = [e for sub in [[d[1]]*d[0] for d in D] for e in sub]\n5    nbT,nbTmin\
  \ = bound_trucks(w,W)\n6    x = [[[s.IntVar(0,1,'') for _ in range(nbT)] \\\n7 \
  \      for _ in range(d[0])] for d in D]\n8    y = [s.IntVar(0,1,'') for _ in  range(nbT)]\n\
  9    for k in range(nbT):\n10      sxk = sum(D[i][1]*x[i][j][k] \\\n11         \
  \     for i in range(nbC) for j in range(D[i][0]))\n12      s.Add(sxk = y[k+1])\n\
  19      for i in range(nbC):\n20        for j in range(D[i][0]):\n21          for\
  \ k in range(nbT):\n22            for jj in range(max(0,j-1),j):\n23           \
  \   s.Add(sum(x[i][jj][kk] \\\n24               for kk in range(k+1)) >= x[i][j][k])\n\
  25            for jj in range(j+1,min(j+2,D[i][0])):\n26              s.Add(sum(x[i][jj][kk]\
  \ \\\n27                for kk in range(k,nbT))>=x[i][j][k])\n28    if knapsack:\n\
  29      s.Add(sum(W*y[i] for i in range(nbT)) >= sum(w))\n30    s.Add(sum(y[k] for\
  \ k in range(nbT)) >= nbTmin)\n31    s.Minimize(sum(y[k] for k in range(nbT)))\n\
  32    rc = s.Solve()\n33    P2T=[[D[i][1], [k for j in range(D[i][0]) for k in range(nbT)\n\
  34                 if SolVal(x[i][j][k])>0]] for i in range(nbC) ]\n35    T2P=[[k,\
  \ [(i,j,D[i][1]) \\\n36      for i in range(nbC) for j in range(D[i][0])\\\n37 \
  \           if SolVal(x[i][j][k])>0]] for k in range(nbT)]\n38    return rc,ObjVal(s),P2T,T2P\n\
  清单 5-3\n装箱模型 (bin_packing.py)\n```\n\n在第 4 行，我们构建了一个重量数组，每个包裹对应一个。这同时也隐式地为每个包裹分配了一个序号。`bound_trucks`\
  \ 函数（在清单 5-4 中描述）利用包裹的重量和每辆卡车的容量来快速估算卡车数量的上界。这个函数不需要非常出色，但更好的上界有助于加速求解器。\n\n从第 7\
  \ 行开始的两行定义了我们的决策变量：一个用于将包裹分配到卡车，另一个用于选择卡车。包裹变量是一个三维数组。第一个维度表示重量等级，第二个维度是该等级内的序号，第三个维度是卡车。因此，例如，如果\
  \ `x[2][3][5]` 的值为 1，则表示重量等级 2 中的第三个包裹被装载到了卡车 5 上。\n\n第 9 行循环中的约束是公式 (5.4) 的转述，这是我们合并后的约束，既用于强制卡车选择变量，也用于限制卡车承载的包裹总重量，并针对三维决策变量进行了修改。\n\
  \n第 15 行的最终约束是公式 (5.5) 的转述，用于确保所有包裹都被分配到卡车。\n\n暂时忽略从第 16 行开始并由 `symmetry_break`\
  \ 参数控制的那些行。\n\n\n\n求解后，我们得到两个数组，每个数组都提供了解决方案的不同视角。第一个数组指示每个包裹所装载的卡车。第二个数组指示每辆卡车所装载的包裹列表。我们实例的解决方案如表\
  \ 5-6 `tab:` `bin_packing_results_bad` 所示。第一个表格列出了卡车及其内容，内容由三元组（重量等级、包裹序号、重量）表示。第二个表格按与表\
  \ 5-5 相同的顺序列出了每个重量等级，以及该等级中每个包裹所装载的卡车。\n\n**表 5-6** 最优包裹分配（朴素方法）\n\n| 重量 | 卡车编号\
  \ |\n| --- | --- |\n| 258 | [0, 6, 2, 5, 3, 8, 7, 4] |\n| 478 | [3, 5, 6, 8, 4,\
  \ 5, 4, 6, 7] |\n| 399 | [2, 0, 7, 8, 0, 3, 2] |\n\n即使对于小规模实例，这段代码也可能需要数小时才能生成解决方案。装箱问题并非易事，原因之一如下：请注意，某些卡车编号被省略了。求解器似乎在我们允许的卡车中随机选择。此外，给定重量等级的包裹也随机分布在卡车之间。实际上，在不同的计算机或不同的求解器上对同一实例执行相同的模型，很可能会产生不同的答案（当然，使用相同总数的卡车）。问题在于存在许多具有完全相同值的解决方案。例如，想象一下交换两辆容量相同卡车的全部内容，或者在卡车内部或两辆卡车之间交换两个相同重量等级的包裹。这些交换显然不会对解决方案的值产生任何影响。\n\
  \n在经典优化术语中，这种情况是一种退化形式⁶。约束编程的研究人员则称之为对称性⁷。它几乎总是对求解器产生负面影响。运行时间难以预测，因为它依赖于求解器，但通常不会很好。还有另一个原因促使我们修改模型以避免这些相同的解决方案：我们可以为用户生成更优的解决方案。\n\
  \n添加约束以支持一个最优解决方案优于另一个相同解决方案（从我们的角度来看是相同的）被称为对称性破缺，这开始解释代码中保护额外约束的参数 `symmetry_break`。让我们着手处理这些约束，从最简单的开始。\n\
  \n假设所有卡车容量相同，我们如何确保卡车按顺序被选择且没有跳过任何一辆？一种方法是成对绑定卡车选择变量：\n\n![$$ {y}_{j-1}\\le {y}_j\\\
  forall j\\in T\\backslash \\left\\{0\\right\\} $$](img/A457410_1_En_5_Chapter_Equj.gif)\n\
  \n要了解其工作原理，请考虑 `y` 向量会发生什么。例如，要使 `y[5]` 为 1，必须满足 `y[4]` 为 1，并且传递性地，`y[3]`、`y[2]`、`y[1]`\
  \ 和 `y[0]` 也必须为 1。另一方面，它对 `y[6]` 或更高值没有影响。在代码方面，这是在第 17 行的循环中完成的。\n\n提到的第二种对称形式是可互换的包裹。按照我们陈述问题的方式，同一重量等级的两个包裹之间没有区别。然而，对于求解器来说，在卡车内部或两辆卡车之间交换两个包裹是另一种潜在的解决方案，而花在探索该方向上的任何时间都是浪费。\n\
  \n让我们考虑如何通过一个小例子来打破这种对称性，例如三个包裹和三辆卡车。思路是，由于一个重量等级的包裹是自然排序的，我们可以强制它们按顺序装载到卡车中。例如，如果第二个包裹装载到卡车一，那么第三个包裹只能装载到卡车一或更高的卡车。就决策变量而言，我们希望得到以下蕴含关系：\n\
  \n![$$ {\\displaystyle \\begin{array}{l}{x}_{0,2}=1\\Rightarrow {x}_{1,2}=1\\wedge\
  \ {x}_{2,2}=1\\\\ {}{x}_{0,1}=1\\Rightarrow {x}_{1,1}+{x}_{1,2}=1\\wedge {x}_{2,1}+{x}_{2,2}=1\\\
  \\ {}{x}_{0,0}=1\\Rightarrow {x}_{1,0}+{x}_{1,1}+{x}_{1,2}=1\\wedge {x}_{2,0}+{x}_{2,1}+{x}_{2,2}=1\\\
  \\ {}{x}_{1,2}=1\\Rightarrow {x}_{2,2}=1\\kern16em \\wedge {x}_{0,0}+{x}_{0,1}+{x}_{0,2}=1\\\
  \\ {}{x}_{1,1}=1\\Rightarrow {x}_{2,1}+{x}_{2,2}=1\\kern16em \\wedge {x}_{0,0}+{x}_{0,1}=1\\\
  \\ {}{x}_{1,0}=1\\Rightarrow {x}_{2,0}+{x}_{2,1}+{x}_{2,2}=1\\kern16em \\wedge {x}_{0,0}=1\\\
  \\ {}{x}_{2,2}=1\\Rightarrow \\kern10.25em \\ \\ {x}_{0,0}+{x}_{0,1}+{x}_{0,2}=1\\\
  wedge {x}_{1,0}+{x}_{1,1}+{x}_{1,2}=1\\\\ {}{x}_{2,1}=1\\Rightarrow \\kern16em \\\
  \ \\ {x}_{0,0}+{x}_{0,1}=1\\wedge {x}_{1,0}+{x}_{1,1}=1\\\\ {}{x}_{2,0}=1\\Rightarrow\
  \ \\kern16em \\ \\ \\ \\ \\ \\ \\ \\ \\ \\ \\ \\kern4em {x}_{0,0}=1\\wedge {x}_{1,0}=1\\\
  end{array}} $$](img/A457410_1_En_5_Chapter_Equk.gif)\n\n稍后您将看到（第 7 章第 7.2.3 节关于具体化）实现这些蕴含关系的一般方法。现在，让我们尝试尽可能简单地实现它们。\n\
  \n第一个蕴含关系说：“如果包裹 0 被装载到卡车 2 上，那么包裹 1 和 2 也必须被装载到卡车 2 上。”但这是一个边界情况，因为卡车 2 是我们的最后一辆卡车。下一个蕴含关系更有趣：“如果包裹\
  \ 0 被装载到卡车 1 上，那么包裹 1 和 2 必须被装载到卡车 1 或 2 上。”\n\n总的来说，“如果一个包裹被装载到某辆卡车上，那么所有序号更大的包裹必须被装载到序号更大或相等的卡车上。”请注意，约束结构是，如果某个变量取值为\
  \ 1，我们必须有一个右侧为 1 的等式成立。右侧为 1 是我们的切入点，因为我们可以将条件变量用作右侧。\n\n注意不要过度约束模型。考虑第二个蕴含关系的一部分\
  \ `x[0,1] = 1 ⇒ x[1,1] + x[1,2] = 1` 以及以下朴素方法。如果我们使用等式，例如\n\n![$$ {x}_{1,1}+{x}_{1,2}={x}_{0,1}\
  \ $$](img/A457410_1_En_5_Chapter_Equl.gif)\n\n模型很可能会失败，因为如果 `x0,1` 为零（例如，如果包裹 0\
  \ 被装载到卡车 0 而不是卡车 1），那么我们将阻止包裹 1 被装载到卡车 1 或 2，而这原本是可以接受的解决方案。所以正确的约束是\n\n![$$ {x}_{1,1}+{x}_{1,2}\\\
  ge {x}_{0,1} $$](img/A457410_1_En_5_Chapter_Equm.gif)\n\n右侧为零时，约束变得无关紧要，因为左侧的所有变量都是非负的；右侧为一时，它强制将包裹正确分配到编号更高的卡车。用更抽象的术语来说，我们使用不等式是因为我们实现的是逻辑蕴含，而不是逻辑等价（是\
  \ ⇒，而不是 ⇔）。这些约束在模型 5.3 的第 27 行实现。\n\n蕴含关系的右列可以理解为：“如果包裹 `i` 被装载到卡车 `k` 上，那么所有序号更小的包裹必须被装载到序号更小或相等的卡车上。”这些约束大多是冗余的，但在某些条件下它们可以帮助某些求解器。鼓励读者启用或禁用某些对称性破缺约束并进行实验。\n\
  \n所有这些额外的约束都减少了搜索空间。对于某些求解器，在某些问题上，这种方法将大幅减少执行时间。通过调用 `solve_model` 并将最后一个参数设置为\
  \ `True` 来启用这些对称性破缺约束后，同一实例的输出如表 5-7 和 5-8 所示。您可以看到所有使用的卡车从零开始连续编号，并且包裹按顺序装载，这是一个更优的解决方案。通过阅读表格您看不到的是，运行时间仅占忽略对称性破缺约束时同一实例所需运行时间的极小部分。\n\
  \n**表 5-8** 带对称性破缺约束的最优包裹分配\n\n\n\n| 重量 | 卡车编号 |\n| --- | --- |\n| 258 | `[0, 0,\
  \ 0, 1, 2, 3, 4, 7]` |\n| 478 | `[0, 1, 1, 2, 2, 3, 5, 5, 7]` |\n| 399 | `[3, 4,\
  \ 4, 6, 6, 6, 7]` |\n\n**表 5-7** 具有对称性破缺约束的最优卡车装载量\n\n| 卡车 8.0 (编号 重量) | 包裹 24 (9159)\
  \ (编号 重量)* |\n| --- | --- |\n| 0 (1252) | `[(0, 0, 258), (0, 1, 258), (0, 2, 258),\
  \ (1, 0, 478)]` |\n| 1 (1214) | `[(0, 3, 258), (1, 1, 478), (1, 2, 478)]` |\n| 2\
  \ (1214) | `[(0, 4, 258), (1, 3, 478), (1, 4, 478)]` |\n| 3 (1135) | `[(0, 5, 258),\
  \ (1, 5, 478), (2, 0, 399)]` |\n| 4 (1056) | `[(0, 6, 258), (2, 1, 399), (2, 2,\
  \ 399)]` |\n| 5 (956) | `[(1, 6, 478), (1, 7, 478)]` |\n| 6 (1197) | `[(2, 3, 399),\
  \ (2, 4, 399), (2, 5, 399)]` |\n| 7 (1135) | `[(0, 7, 258), (1, 8, 478), (2, 6,\
  \ 399)]` |\n\n我们还需要考虑一个简单的启发式方法来限定所需卡车的数量。我们首先将包裹添加到第一辆卡车，直到达到容量上限，然后继续处理下一辆。这种贪心方法永远不会是最优的，但足以获得所需卡车数量的一个合理上界。一个简单的下界可以通过将所有包裹的重量总和除以卡车容量得到。这在代码清单\
  \ 5-4 中给出。存在更好的启发式方法，并且在处理大规模实例时可能是必要的。\n\n```\n1  def bound_trucks(w,W):\n2   \
  \ nb,tot = 1,0\n3    for i in range(len(w)):\n4      if tot+w[i] < W:\n5       tot\
  \ += w[i]\n6      else:\n7       tot = w[i]\n8       nb = nb+1\n9    return nb,ceil(sum(w)/W)\n\
  ```\n\n**代码清单 5-4** 用于限定卡车数量的简单启发式方法\n\n#### 5.3.1.5 变体\n\n这个问题经常与其他问题结合出现。但这里列出几个较为简单的变体。\n\
  \n*   每辆卡车的载重容量可能不同。容量约束很容易调整，但必须注意对称性破缺约束。跳过某些卡车可能是不可避免的。因此，对称性破缺必须仅在具有相同容量的卡车子集内进行。\n\
  *   我们可能不是将固定数量的包裹装载到数量未定的卡车上，而是有固定数量的卡车和数量未定的包裹需要装载。在这种情况下，包裹除了重量之外，通常还具有价值，我们必须尝试最大化总价值。这种情况通常更容易求解。假设包裹\
  \ `i` 的价值为 `v[i]`，目标函数为\n\n    ![$$ \\max \\kern0.125em \\sum \\limits_{i\\in P}\\\
  sum \\limits_{j\\in T}{v}_i{x}_{i,j} $$](img/A457410_1_En_5_Chapter_Equn.gif)\n\n\
  \    并受约束 (5.4) 的限制。\n*   有一种更简单的装箱问题版本，称为背包问题，其中包裹具有价值和重量，但只有一辆具有载重容量的卡车。这个问题非常简单，存在非常快速的算法。当然，通用的整数求解器也能毫无困难地解决它。尽管它很简单，但确实有一定价值，不是作为一个自然出现的问题，而是作为更复杂情况下的一个子问题。稍后你会看到相关示例。\n\
  *   一个密切相关的问题是资本预算问题。考虑一个多期规划期 `T` 和一组可能的项目 `P`；每个项目 `j` 在时期 `t` 需要投资 `a[tj]`，并代表价值\
  \ `c[j]`。给定时期 `t` 的有限预算 `b[t]`，哪些项目应该被指定用于投资？该模型是装箱问题的一个简化：\n\n    ![$$ {\\displaystyle\
  \ \\begin{array}{l}\\max \\kern0.125em \\sum \\limits_{j\\in P}{c}_j{y}_j\\\\ {}\\\
  kern1.25em \\ \\sum \\limits_{j\\in P}{a}_{tj}{y}_i\\le {b}_t\\kern1em \\forall\
  \ t\\in T\\\\ {}\\kern1.25em \\ {y}_i\\in \\left\\{0,1\\right\\}\\end{array}} $$](img/A457410_1_En_5_Chapter_Equo.gif)\n\
  \n其中 `y[j]` 表示“对项目 `j` 进行（或不进行）投资”的决策。\n\n## 5.4 TSP\n\n我们现在来探讨经典的旅行商问题（以下简称 TSP）。这个问题对销售人员来说从未真正重要过，但在车辆路径规划、电子电路设计和作业排序等应用中却非常重要。此外，它还能让我以最小的额外复杂性，描述一种有效且可复用的建模技术：迭代添加约束。\n\
  \n以下是一个示例场景：在 HAL 公司，设计新电路的过程中，必须为每个基本元件供电。这些元件被放置在一个二维网格中，理论上所有元件之间都可以两两连接。为这些元件供电的最佳方式是建立一条总长度最小的路径，概念上从电源（`V[cc]`）开始，依次经过每个元件，然后返回电源（`Vee`\
  \ 或地线）。⁸\n\n因此，抽象地看，这个问题可以表述为：“给定一个图中两两之间的距离矩阵，找到一条遍历所有顶点且总距离最小的回路。”表 5-9 是我们将用来演示的示例。除了距离之外，它还包含了各点的笛卡尔坐标。我们不会在模型中使用这些坐标，但它们有助于可视化问题。表中数字的缺失表示两个节点之间没有直接路径。\n\
  \n**表 5-9** TSP 距离矩阵示例\n\n| P (x y) | P0 | P1 | P2 | P3 | P4 | P5 | P6 | P7 | P8\
  \ | P9 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\
  | P0 72 19 | | 711 | 107 | 516 | 387 | 408 | 539 | 309 | 566 | 771 |\n| P1 10 37\
  \ | 539 | | 769 | 881 | 380 | 546 | 655 | 443 | 295 | 1140 |\n| P2 77 31 | 122 |\
  \ 752 | | 281 | 441 | 264 | 318 | 448 | 588 | 730 |\n| P3 89 61 | 519 | 875 | 274\
  \ | | 435 | 334 | 93 | 776 | 949 | 302 |\n| P4 51 61 | 484 | 561 | 338 | 419 | |\
  \ 118 | 268 | 607 | 495 | 431 |\n| P5 57 52 | 409 | 406 | 244 | 380 | 93 | | 295\
  \ | 544 | 549 | 494 |\n| P6 82 69 | 479 | 735 | 334 | 101 | 345 | 247 | | 679 |\
