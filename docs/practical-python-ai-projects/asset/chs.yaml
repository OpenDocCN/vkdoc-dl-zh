  \   |\n| O7  | 25   |\n| O8  | 89   |\n\n### 2.4.2 构建模型\n\n#### 2.4.2.1 决策变量\n\n\
  需要回答的问题是：“每个月应如何混合各种油类？”这意味着我们需要确定每个月有多少每种油进入最终混合物。这是一个好的开始，但显然还不够。例如，我们可以从购买的油和库存的油中进行混合。\n\
  \n因此，我们需要区分这两个数量。此外，我们可能决定购买并储存（因为价格即将上涨），所以我们还需要知道可以储存多少。这为每种油（`O = {0, 1, 2, …\
  \ , n[o]}` 表示油类集合）和每个月（`M = {0, 1, 2, … , n[m]}` 表示月份集合）提出了至少三个决策变量：\n\n| `x[i,j]\
  \ ≥ 0 ∀i ∈ O, ∀j ∈ M` | 购买量   |\n| `y[i,j] ≥ 0 ∀i ∈ O, ∀j ∈ M` | 混合量 |\n| `z[i,j]\
  \ ≥ 0 ∀i ∈ O, ∀j ∈ M` | 持有量  |\n\n其含义是：`x[i,j]` 表示在第 `j` 月购买的油 `i` 的吨数；`y[i,j]`\
  \ 表示混合到肥皂中的吨数；`z[i,j]` 表示月初持有的吨数。请注意，我们在此可以选择让变量表示期初或期末的数量。两种选择都可以接受，但必须在模型中明确选择哪一种，因为它会影响约束条件。在多周期模型中，一个典型的错误是某些约束假设变量表示期初数量，而另一些约束假设表示期末数量。模型可能可以运行，但解将毫无意义。由于我们在规划期开始时已知库存量，让变量表示期初持有量意味着我们可以轻松地用给定数据对其进行初始化。\n\
  \n我们可能还需要知道每月生产了多少肥皂。严格来说，这对于所阐述的问题并非必不可少，但它可能使解的呈现以及某些约束的表述变得简单得多。像往常一样，引入辅助变量有助于澄清一些表述。为了统计每月的总产量：\n\
  \n![$$ {t}_j\\kern1.25em \\ \\kern0.28em \\forall j\\in M $$](img/A457410_1_En_2_Chapter_Equz.gif)\n\
  \n\n\n#### 2.4.2.2 约束条件\n\n我们来处理连续性约束。我们需要为每种油和每个月（最后一个月除外）指定库存如何波动，因此：\n\n![$$\
  \ {z}_{i,j}+{x}_{i,j}-{y}_{i,j}={z}_{i,j+1}\\kern1.25em \\ \\kern0.28em \\forall\
  \ i\\in O,\\forall j\\in M\\backslash \\left\\{{n}_m\\right\\} $$](img/A457410_1_En_2_Chapter_Equ5.gif)\n\
  \n(2.5)\n\n用文字表述，即月初持有的库存加上我们购买的库存减去我们混合的库存，构成了新的库存。\n\n每个月对总油量都有最小和最大存储容量限制，即：\n\
  \n![$$ {C}_{min}\\le \\sum \\limits_i{z}_{i,j}\\le {C}_{max}\\kern1.25em \\ \\kern0.28em\
  \ \\forall j\\in M $$](img/A457410_1_En_2_Chapter_Equaa.gif)\n\n接下来是混合约束，或者更确切地说是一组约束，因为我们需要针对一定数量的脂肪酸设定目标。为了便于公式化，我们先提取总产量：\n\
  \n![$$ {t}_j=\\sum \\limits_i\\ {y}_{i,j}\\kern1em \\ \\ \\kern0.28em \\forall j\\\
  in M $$](img/A457410_1_En_2_Chapter_Equab.gif)\n\n假设对于每种酸 `k ∈ A`，我们有一个目标范围 `[l[k],\
  \ u[k]]`，并且每种油 `i ∈ O` 含有一定百分比 `p[i,k]` 的所需酸（表 2-10）。由于每种酸的最终产品必须落在特定范围内，我们应该有两个约束：一个针对区间的下限，另一个针对上限。即：\n\
  \n![$$ \\sum \\limits_i\\ {y}_{i,j}{p}_{i,k}\\ge {l}_k{t}_j\\kern4em \\forall k\\\
  in A,\\forall j\\in M $$](img/A457410_1_En_2_Chapter_Equ6.gif)\n\n(2.6) 和\n\n![$$\
  \ \\sum \\limits_i\\ {y}_{i,j}{p}_{i,k}\\le {u}_k{t}_j\\kern4em \\forall k\\in A,\\\
  forall j\\in M $$](img/A457410_1_En_2_Chapter_Equ7.gif)\n\n(2.7)\n\n这些约束可以不使用产量变量\
  \ `t[j]` 来编写，但那样会更繁琐且难以阅读。\n\n最后，我们需要满足需求。这很简单，假设每个月 `j` 的需求为 `D[j]`：\n\n![$$ {t}_j\\\
  ge {D}_j\\kern2em \\forall j\\in M $$](img/A457410_1_En_2_Chapter_Equac.gif)\n\n\
  #### 2.4.2.3 目标函数\n\n我们已知目标是**最小化成本**，成本包括每个月变化的油品成本以及我们库存中持有的油品的固定存储成本。因此：\n\n\
  ![$$ \\sum \\limits_i\\sum \\limits_j{x}_{i,j}{P}_{i,j}+\\sum \\limits_i\\sum \\\
  limits_j{z}_{i,j}p $$](img/A457410_1_En_2_Chapter_Equad.gif)\n\n这种目标函数（固定成本加可变成本）在商业类问题中经常出现。在考虑为满足客户需求而选址设施时，你还会再次看到它。建造决策会产生固定成本，而服务不同客户则属于可变成本。\n\
  \n#### 2.4.2.4 可执行模型\n\n现在，我们将此转化为可执行代码，如清单 2-6 所示。需要传入相当多的数据。假设数组 `Part` 如表 2-10\
  \ 所示，`Target` 如表 2-11 所示，`Cost` 如表 2-12 所示，`Inventory` 如表 2-13 所示，此外还有三个参数：以吨为单位的\
  \ `D`（需求），以美元每吨为单位的 `SC`（存储成本），以及以吨为单位的 `SL`（库存持有量的最小值和最大值）。\n\n从第 5 行到第 11 行，我们声明变量，但只有前三个是真正的决策变量。所有其他变量都是人为引入的，要么是为了帮助我们陈述约束条件（第\
  \ 8 行和第 11 行），要么是为了帮助我们显示结果解决方案的一些细节。它们不会以任何明显的方式影响求解器的运行时间，但会让我们的工作更轻松。\n\n在第 12\
  \ 行，我们设置 `Hold` 变量，使其包含规划期开始时已知的库存量。\n\n从第 14 行开始的大循环将设置所有约束条件，因为每个月的约束结构相同，并且我们已经将变量声明为按月索引的数组。\n\
  \n第 15 行设置人工变量 `Prod`，使其成为混合油的总和。这实际上不是一个约束，而是一个简化技巧。如果我们在模型中重复某些计算，就像这样：\n\n```\n\
  sum(Blnd[i][j] for i in range(nO)\n```\n\n我们应该考虑引入一个人工变量。假设求解器性能不错，这不会增加任何成本，而且很可能有所帮助。编程（和建模）的原则之一是“不要重复自己”。\n\
  \n我们紧接着在第 16 行使用这个 `Prod` 变量来确保满足需求。如果需求是一个标量，我们为每个月设置相同的值，但它也可以是一个按月索引的数组。\n\n\
  从第 17 行开始的 `if` 代码实现了我们在方程 (2.5) 中描述的连续性要求。我们确保当月购买的量加上月初持有的量等于当月混合的量加上为下个月存储的量。条件判断是为了避免对超出规划期范围的月份设置约束。\n\
  \n第 20 行和第 21 行确保了我们库存中油品的上下限。\n\n从第 22 行开始的循环首先定义了辅助变量 `Acid`，以简化接下来两行中陈述的混合约束的公式化，这两行对应于方程\
  \ (2.6) 和 (2.7)。`Acid` 按脂肪酸 `k` 的序号和所考虑的月份 `j` 进行索引，其值是对所有油品中混合量乘以该油品中酸 `k` 的百分比进行求和。这个值除以总混合量，就是必须落在所需范围内的百分比。\n\
  \n最后，从第 26 行开始的四行设置了人工变量，这些变量将保存每个时期的采购和持有成本，然后对它们求和以构建我们将要最小化的目标函数。\n\n\n\n```python\n\
  1  def solve_model(Part,Target,Cost,Inventory,D,SC,SL):\n2    s = newSolver('Multi-period\
  \ soap blending problem')\n3    Oils= range(len(Part))\n4    Periods, Acids = range(len(Cost[0])),\
  \ range(len(Part[0]))\n5    Buy = [[s.NumVar(0,D,'') for _ in Periods] for _ in\
  \ Oils]\n6    Blnd = [[s.NumVar(0,D,'') for _ in Periods] for _ in Oils]\n7    Hold\
  \ = [[s.NumVar(0,D,'') for _ in Periods] for _ in Oils]\n8    Prod = [s.NumVar(0,D,'')\
  \ for _ in Periods]\n9    CostP= [s.NumVar(0,D*1000,'') for _ in Periods]\n10  \
  \  CostS= [s.NumVar(0,D*1000,'') for _ in Periods]\n11    Acid = [[s.NumVar(0,D*D,'')\
  \ for _ in Periods] for _ in Acids]\n12    for i in Oils:\n13      s.Add(Hold[i][0]\
  \ == Inventory[i][0])\n14    for j in Periods:\n15      s.Add(Prod[j] == sum(Blnd[i][j]\
  \ for i in Oils))\n16      s.Add(Prod[j] >= D)\n17      if j = SL[0])\n21      s.Add(sum(Hold[i][j]\
  \ for i in Oils) = Target[0][k] * Prod[j])\n25      s.Add(Acid[k][j] <= Target[1][k]\
  \ * Prod[j])\n26    s.Add(CostP[j] == sum(Buy[i][j] * Cost[i][j] for i in Oils))\n\
  27    s.Add(CostS[j] == sum(Hold[i][j] * SC for i in Oils))\n28  Cost_product =\
  \ s.Sum(CostP[j] for j in Periods)\n29  Cost_storage = s.Sum(CostS[j] for j in Periods)\n\
  30  s.Minimize(Cost_product+Cost_storage)\n31  rc = s.Solve()\n32  B,L,H,A = SolVal(Buy),SolVal(Blnd),SolVal(Hold),SolVal(Acid)\n\
  33  CP,CS,P = SolVal(CostP),SolVal(CostS),SolVal(Prod)\n34  return rc,ObjVal(s),B,L,H,P,A,CP,CS\n\
  ```\n清单 2-6 多周期混合模型（`blend multi.py`）\n\n由于该模型具有一定复杂度，调用方应检查求解器的返回码。返回码必须为零，才能确保解为最优解。最常见的非零返回状态是模型不可行。这可能是由多种原因造成的，其中最可能的原因是没有任何油品组合能够达到我们所需的脂肪酸含量目标。\n\
