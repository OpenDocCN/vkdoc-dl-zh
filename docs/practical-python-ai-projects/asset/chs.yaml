  这里有一个例子。想象一个每周只有一场比赛的实例，并考虑三支球队，比如 `i`、`j` 和 `k`。如果在执行过程中的某个时刻允许决策变量取分数值，那么对于给定的周
  `w`，最优解可能满足以下条件：


  ```

  x_{i,j,w} = 1/2   x_{i,k,w} = 1/2   x_{j,k,w} = 1/2

  ```


  请注意，这个解是允许的，因为它满足“每支球队每周一场比赛”的约束，因为


  `x[i,j,w] + x[i,k,w] = 1`，


  `x[i,j,w] + x[j,k,w] = 1`，


  `x[i,k,w] + x[j,k,w] = 1`


  但我们知道这不是一个有效的解，因为这三个变量的总和不能超过一。如果 `i` 和 `j` 对阵，那么 `k` 就不能与它们中的任何一个对阵；对于 `(i, k)`
  和 `(j, k)` 这对组合也是如此。因此，已知每周只有一场比赛，我们可以为每周 `w` 的每三支球队 `i`、`j`、`k` 添加一个约束：


  ```

  x_{i,j,w} + x_{i,k,w} + x_{j,k,w} <= 1

  ```


  请注意，如果变量是整数，这个约束是冗余的。但它仍然是一个有效的约束，并且对于求解器内部处理的分数值很有用。我们还可以考虑四支甚至五支球队的元组，以及每周两场或三场比赛的情况。参见表
  7-15，其中给出了少量球队和每周比赛场次下的界限。请注意，其中许多界限不会被分数解违反，因此对我们的目的来说不太有用。


