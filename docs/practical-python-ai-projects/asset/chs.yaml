  \ 7 章第 7.2 节）中看到的，情况并非无解。此处采用的方法可以加以修改，通过添加更多约束条件来使用整数求解器。\n\n## 3.2 曲线拟合\n\n一个非常常见的问题是从一组数据点出发，得到同一组数据的解析表示。统计学家称之为回归；应用数学家称之为参数估计；而工程师则称之为曲线拟合。我更喜欢最后一种说法。²\n\
  \n其最著名且最简单的示例如下：假设我们知道（或者像伽利略那样首次猜想）一个落体遵循如下形式的曲线\n\n`f(t) = a[2] t² + a[1] t +\
  \ a[0]`，\n\n其中 `t` 代表时间，但我们不知道 `a[0]`、`a[1]` 和 `a[2]` 的适当值。我们进行了一项实验，收集了表 3-8 中的数据。\n\
  \n**表 3-8** 用于拟合二次函数 `f(t) = a[2] t² + a[1] t + a[0]` 的数据示例\n\n| `t[i]` | `f[i]`\
  \ |\n| --- | --- |\n| 0.1584 | 0.0946 |\n| 0.8454 | 0.2689 |\n| 2.1017 | 5.8285\
  \ |\n| 3.1966 | 14.8898 |\n| 4.056 | 25.6134 |\n| 4.9931 | 38.3952 |\n| 5.8574 |\
  \ 43.5065 |\n| 7.1474 | 91.3715 |\n| 8.1859 | 119.075 |\n| 9.0349 | 115.7737 |\n\
  \n由于我们需要确定函数的系数（即 `a[0]`、`a[1]`……），因此必须以某种方式最小化每条可能曲线到我们数据点的距离。统计学家喜欢使用欧几里得距离，或者等效地使用其平方：\n\
  \n```\nmin ∑_n ( f̄_i - f( t̄_i ) )²\n```\n\n这种最小二乘法源于卡尔·弗里德里希·高斯³，他开发该方法是为了预测行星运动。这种方法通常很有意义，并且通过求解一个线性方程组（即所谓的正规方程）很容易实现。\n\
  \n尽管最小二乘法很流行，但欧几里得距离并非唯一有效的可最小化距离。另一种方法是使用偏差的绝对值，例如：\n\n```\nmin ∑_n | f̄_i - f(\
  \ t̄_i ) |\n```\n\n甚至使用偏差绝对值中的最大值，例如：\n\n```\nmin max_n | f̄_i - f( t̄_i ) |\n```\n\
  \n后一种方法在涉及公差时最为合适；也就是说，当所有误差都必须保持在某个最大值以内时。我们将开发能够在运行时在后两种目标函数之间进行选择的代码。\n\n###\
  \ 3.2.1 构建模型\n\n我们将分阶段描述这个相当复杂的模型。\n\n#### 3.2.1.1 目标函数\n\n让我们在一定的通用性下假设，我们需要确定变量\
  \ `t` 的一个 `k` 次多项式的系数。系数 `a[0]`、`a[1]`、……、`a[k]` 将被确定，以最小化数据点与多项式之间的偏差之和或最大偏差。\n\
  \n这里的第一个抽象是将所有这些偏差视为某些函数，例如 `e[0]`、`e[2]`、……、`e[n]`，我们将在后面确定它们。对于偏差之和的情况，目标函数很简单：\n\
  \n```\nmin ∑_i e_i\n```\n\n但对于第二种情况，我们需要一个能最小化最大偏差的目标函数：\n\n```\nmin max_n e_i\n\
  ```\n\n后一种表达式显然不符合我们线性规划的框架；我们可以有 `min` 或 `max`，但不能同时存在，并且我们必须有一个目标函数，而不是一组目标函数。\n\
  \n在这种情况下使用的抽象方法是将目标函数转移到约束条件中。为了说明这一点，首先我们引入一组不等式，其中包含一个新变量，比如 `e`，代表最大偏差：\n\n```\n\
  e_i ≤ e ∀ i ∈ [1, n]\n```\n\n其次，我们将目标函数表述为 `min e`。由于 `e` 是所有偏差的上界，并且我们将其最小化，因此我们实际上是在最小化最大偏差。请注意，在最优解处，至少有一个不等式将是紧约束，否则我们显然不是最优的，但大多数不等式很可能是松弛的，因为它们的偏差将小于最大偏差。\n\
  \n\n\n#### 3.2.1.2 约束条件\n\n现在我们需要表达这些偏差。我们得到一组数据对 (`t¯[i]`, `f¯`)，表示在时间 `t¯[i]`\
  \ 对假设函数 `f` 的测量值。因此，特定数据对的偏差为：\n\n![$$ {e}_i=\\mid {a}_0+{a}_1\\overline{t_i}+{a}_2{\\\
  overline{t_i}}²+\\dots +{a}_k{\\overline{t_i}}^k-\\overline{f_i}\\mid $$](img/A457410_1_En_3_Chapter_Equl.gif)\n\
  \n也就是说，偏差是实验值 `f¯[i]` 与理论位移 `f(t¯[i])` 之差的绝对值，其中理论位移是通过在时间 `t¯[i]` 处计算函数得到的。为什么取绝对值？因为偏差可能为正也可能为负，而我们只关心其大小。\n\
  \n用不等式来表达，我们打算写出形如 `|f(t¯[i]) − f¯| <= e` 的约束，但这并非线性。处理这种情况至少有兩種不同的方法。使用哪种方法取决于我们希望从模型解中提取什么信息。\n\
  \n1. **将不等式加倍并约束偏差。** 考虑绝对值的定义。如果 `a` 为正，则 `|a| = a`；如果为负，则 `|a| = −a`。因此，这建议将不等式\
  \ `|e[i]| <= e` 替换为两个不等式：\n\n    ![$$ {\\displaystyle \\begin{array}{l}\\mid f\\\
  left({t}_i\\right)-\\overline{f_i}\\mid <=e,\\\\ {}\\mid -f\\left({\\overline{t}}_i\\\
  right)+\\overline{f_i}\\mid <=e.\\end{array}} $$](img/A457410_1_En_3_Chapter_Equm.gif)\n\
  \n    这是一种可行的方法。\n\n2. **将变量加倍并找出每个偏差。** 请注意，“将不等式加倍”的方法不会找出每个点的偏差。我们只是对所有偏差施加了一个界限，并最小化这个界限。如果我们想知道每个偏差的值，例如，为了最小化它们的总和，该怎么办？\n\
  \n找出每个偏差值的一种方法是为每个点 (`t¯[i]`, `f¯[i]`) 引入两个非负变量。我们将它们称为 `u[i]` 和 `v[i]`，并引入以下等式：\n\
  \n![$$ f\\left({t}_i\\right)-{u}_i+{v}_i=\\overline{f_i} $$](img/A457410_1_En_3_Chapter_Equ3.gif)\n\
  \n(3.3)\n\n请注意，由于新变量是非负的，每个等式中只有一个变量会非零。该变量将等于偏差（即实验点与理论点之间的差值）。\n\n这种“将变量加倍”的方法在某种程度上更通用。如果我们想最小化偏差的总和，我们就最小化所有\
  \ `u[i]` 和 `v[i]` 的总和。如果我们想最小化最大偏差，我们添加不等式：\n\n![$$ {\\displaystyle \\begin{array}{l}{u}_i\\\
  le e,\\\\ {}{v}_i\\le e,\\end{array}} $$](img/A457410_1_En_3_Chapter_Equn.gif)\n\
  \n并最小化 `e`。\n\n#### 3.2.1.3 可执行模型\n\n让我们将其转换为清单 3-3 中所示的可执行模型。假设我们以元组数组 (`t¯[i]`,\
  \ `f¯[i]`) 的形式获取数据，命名为 `D`，同时获取所需多项式的次数以及要最小化的距离指标（0 表示总和，1 表示最大值）。\n\n```\n1  \
  \ def solve_model(D,deg=1,objective=0):\n2     s,n = newSolver('Polynomialufitting'),len(D)\n\
  3     b = s.infinity()\n4     a = [s.NumVar(-b,b,'a[%i]' % i) for i in range(1+deg)]\n\
  5     u = [s.NumVar(0,b,'u[%i]' %  i) for i in range(n)]\n6     v = [s.NumVar(0,b,'v[%i]'\
  \ % i) for i in range(n)]\n7     e = s.NumVar(0,b,'e')\n8     for i in range(n):\n\
  9       s.Add(D[i][1]==u[i]-v[i]+sum(a[j]*D[i][0]**j \\\n10                    \
  \          for j in range(1+deg)))\n11     for i in range(n):\n12       s.Add(u[i]\
  \  <=  e)\n13       s.Add(v[i]  <=  e)\n14     if objective:\n15       Cost = e\n\
  16     else:\n17       Cost = sum(u[i]+v[i] for i in range(n))\n18     s.Minimize(Cost)\n\
  19     rc  = s.Solve()\n20     return  rc,ObjVal(s),SolVal(a)\n清单 3-3\n多项式曲线拟合模型\
  \ (curve fit.py)\n```\n\n第 4 行定义了实数决策变量，即多项式的系数。由于我们不容易对系数设置界限，因此我们使用无穷大。第 5 行和第\
  \ 6 行定义了数据点与相应理论值之间的偏差。这用于第 8 行，对应于 (3.3)。然后我们在第 11 行通过第 7 行定义的最大误差变量来约束偏差。\n\n\
  最后一个要素是目标函数的选择。用户可以选择在第 15 行最小化最大偏差，或在第 17 行最小化偏差的总和。这些结果分别显示在表 3-9 的 `e[i]^(max)`\
  \ 和 `e[i]^(sum)` 标题下。\n\n**表 3-9** 曲线拟合问题的最优解\n\n| `t[i]` | `f[i]` | `fsum` | `e[i]^(sum)`\
  \ | `fmax` | `e[i]^(max)` |\n| --- | --- | --- | --- | --- | --- |\n| 0.1584 | 0.0946\
  \ | -0.4382 | 0.5328 | -12.4063 | 12.5008 |\n| 0.8454 | 0.2689 | 0.3421 | 0.0731\
  \ | -8.3251 | 8.594 |\n| 2.1017 | 5.8285 | 5.8285 | 0.0 | 2.0924 | 3.7362 |\n| 3.1966\
  \ | 14.8898 | 14.8898 | 0.0 | 14.285 | 0.6047 |\n| 4.056 | 25.6134 | 24.7951 | 0.8184\
  \ | 25.8879 | 0.2744 |\n| 4.9931 | 38.3952 | 38.3952 | 0.0 | 40.5766 | 2.1814 |\n\
  | 5.8574 | 43.5065 | 53.5269 | 10.0204 | 56.0073 | 12.5008 |\n| 7.1474 | 91.3715\
  \ | 80.7311 | 10.6403 | 82.3995 | 8.972 |\n| 8.1859 | 119.075 | 106.6547 | 12.4203\
  \ | 106.5742 | 12.5008 |\n| 9.0349 | 115.7737 | 130.5102 | 14.7365 | 128.2745 |\
  \ 12.5008 |\n\n数据点以及两种解（一种用于最小化最大偏差，另一种用于最小化偏差总和）都显示在图 3-5 中。\n\n![A457410_1_En_3_Fig5_HTML.jpg](img/A457410_1_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5** 数据与拟合曲线\n\n### 3.2.2 变体\n\n上面的示例是实践中非常有用的技术的一个特例，即所谓的软约束处理。我们常常希望某个等式能够成立，但知道它不太可能成立。这样的例子比比皆是。这里有一个：构建一个排课系统模型来生成学校的学生课表。在智能方式中，我们收集所有学生的选课及其可用日期（我周五必须工作，所以那天不能上课。或者，我上夜班；我只需要白天的课程）。根据所有这些数据，我们希望构建对所有学生都适用的课表。\n\
  \n不幸的是，一个能满足所有请求的课表很可能不可行。我们最多只能期望满足尽可能多的学生请求。这些就变成了软约束，其处理技术与上述类似：我们引入新变量（如上面的\
  \ `u[i]` 和 `v[i]`）来衡量与理想状态的距离（未满足请求的学生数量），并最小化这些变量的总和。\n\n因此，如果我们旨在满足，例如：\n\n`a[1]x[1]\
  \ + a[2]x[2] + … + a[n]x[n] = b`。\n\n但我们知道这不太可能，所以我们将其改为：\n\n`a[1]x[i] + a[i]x[2]\
  \ + … + a[n]x[n] + u − v = b`，\n\n其中 `u` 和 `v` 是非负的。然后我们将 `(u + v)` 添加到目标函数中（假设这是一个最小化问题）。\n\
  \n请注意，如果我们已经知道左侧相对于右侧总是要么过高要么过低，那么我们可能只需要 `u` 和 `v` 中的一个。只有当偏差可能出现在两个方向时，我们才需要两者，就像我们的曲线拟合示例那样。\n\
  \n\n\n## 3.3 模式分类再探讨\n\n回顾第 2 章第 2.5 节的分类模型：给定两组数据点（由专家标记的良性和恶性细胞），我们得到了一个分离超平面，之后可用于模仿专家，将新数据分类到其中一组。我们最初方法的一个弱点是，不一定能根据任何定义找到“最佳”超平面。一旦得到一个超平面，我们就停止了。第一次尝试的结果如图\
  \ 3-6 所示，其中一个恶性细胞恰好位于分离超平面上。它同样可能是一个良性细胞。\n\n![A457410_1_En_3_Fig6_HTML.jpg](img/A457410_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n\n数据与最大化间隔的分离\n\n因此，分类领域的人倾向于选择一个能最大程度分离两组的超平面；即，与一组和另一组距离相等的超平面。假设训练集选择得当，这可能会在后续最小化误分类。\n\
  \n实现这种最大分离的一种方法是最大化训练集到分离超平面的最小距离。这被称为最大化间隔，我们现在有了执行这种最大化的工具。假设我们已经运行了之前的分类模型，并且知道这两组可以通过超平面`∑\
  \ a_j x_j = a_0`分离。现在我们想要最佳的这种分离。\n\n如何计算点`x¯`到超平面`∑ a_j x_j = a_0`的距离？通过公式\n\n\
  `|∑ a_j x¯_j - a_0| / √(∑ a_j²)`\n\n由于我们打算最大化所有数据点上该值的最小值，但又不需要实际数值，因此分母无关紧要，我们不妨只考虑分子——这恰好是一个有利条件，因为我们目前还无法处理一般的非线性函数。这个分子是一个绝对值。因此，我们将使用双正变量技巧，并为每个数据点`x¯`引入一组三个约束：\n\
  \n```\n∑ a_j x¯_j - u + l = a_0\n    e <= u\n    e <= l\n```\n\n其中第一个约束将迫使`u`或`l`测量距离公式中分子的值。两个不等式将变量`e`作为两者的下界。然后我们只需最大化`e`的值即可实现目标。\n\
  \n### 3.3.1 可执行模型\n\n转换为可执行模型的过程如代码清单 3-4 所示。第 4 至 7 行定义了新的正变量，用于保存每个数据点到分离超平面的距离。第\
  \ 8 行与之前相同，是我们正在寻找的超平面的系数。模型的其余部分与我们之前的分类模型相同，只是在第 12 行和第 17 行增加了三行代码，用于固定距离约束并建立其下界`e`。目标函数现在是迫使这个下界向上增长，从而最大化最小距离。\n\
  \n```\n1   def solve_margins_classification(A,B):\n2     n,ma,mb=len(A[0]),len(A),len(B)\n\
  3     s = newSolver('Classification')\n4     ua = [s.NumVar(0,99,\") for _ in range(ma)]\n\
  5     la = [s.NumVar(0,99,\") for _ in range(ma)]\n6     ub = [s.NumVar(0,99,\"\
  ) for _ in range(mb)]\n7     lb = [s.NumVar(0,99,\") for _ in range(mb)]\n8    \
  \ a = [s.NumVar(-99,99,\") for _ in range(n+1)]\n9     e = s.NumVar(-99,99,\")\n\
  10     for i in range(ma):\n11       s.Add(0 >= a[n]+1-s.Sum(a[j]*A[i][j] for j\
  \ in range(n)))\n12       s.Add(a[n]==s.Sum(a[j]*A[i][j]-ua[i]+la[i]for j in range(n)))\n\
  13       s.Add(e = s.Sum(a[j]*B[i][j] for j in range(n))-a[n]+1 )\n17       s.Add(a[n]==s.Sum(a[j]*B[i][j]-ub[i]+lb[i]for\
  \ j in range(n)))\n18       s.Add(e <= ub[i])\n19       s.Add(e <= lb[i])\n20  \
  \   s.Maximize(e)\n21     rc  = s.Solve()\n22     return  rc,SolVal(a)\n代码清单 3-4\n\
  最大化间隔（margins.py）\n```\n\n在与第 2.5 节相同的数据集上运行的结果显示，新的、改进后的分离超平面与恶性集和良性集中最近的点等距，这是我们能期望的最佳分离。但请注意：这仅取决于训练集的质量。如果该训练集有任何偏差，分离结果也会同样有偏差。\n\
  \n脚注 1\n\n所有研究数学家都认同“凸”及其反义词“凹”的标签，但美国高中的教科书作者无视数千篇论文、期刊和研究专著，坚持使用“上凹”和“下凹”。\n\n\
  2\n\n“回归”一词源自弗朗西斯·高尔顿关于“向平庸回归”的原始论文，它掩盖而非突出了该技术的本质。至于“参数”，请问，什么不是参数呢？\n\n3\n\n卡尔·弗里德里希·高斯，《最小误差观测组合理论》（费城，宾夕法尼亚州：工业与应用数学学会，1987\
  \ 年）。\n\n"
- "# 4. 线性网络模型\n\n六度分隔！\n\n这个梗以及由此产生的戏剧、电影和游戏，在向公众介绍网络理论元素方面，比多年的公共教育效果更好。电影爱好者玩凯文·贝肯游戏，试图通过两位演员与凯文·贝肯共同出演的电影来建立联系。数学家们自豪地宣布他们的埃尔德什数（如果有的话），即他们与著名数学家保罗·埃尔德什合著论文的间隔距离。¹\
  \ 在本章中，网络在可视化问题方面发挥着重要作用。\n\n网络是由节点（在我们的例子中是人）和弧（表示关系的存在）组成的对象。它是数学家数百年前发明的一种工具，用于帮助建模情境²和解决问题。我们将利用网络来构建优化模型。从某种意义上说，我们是在进行元建模。\n\
  \n基于网络的优化模型通常与结构描述共享一个有趣的特征：如果输入数据都是整数，那么存在一个整数最优解。此外，求解器会找到它。这是一个有用的特性，因为它允许对可数项目（人、卡车、数据包）以及可测量项目（金钱、时间、水）进行建模。\n\
  \n认识到整数性在建模中的重要性至关重要。让我们想象一个涉及航天飞机飞行的复杂问题。约束条件包括重量、燃料量、氧气量、在轨工作等。可能有数千甚至数十万个变量和约束。如果这样的问题问“航天飞机可以搭载多少名宇航员？”，NASA（或\
  \ SpaceX）不太可能接受“两个半宇航员”作为最优答案。\n\n至关重要的是，我们必须摒弃一种诱人但错误的变通方法：四舍五入。四舍五入很少能解决问题。如果对分数解进行四舍五入，许多（甚至可能全部）约束条件可能会被违反。将航天飞机实例的解向上取整，重量约束可能会阻止起飞；向下取整，宇航员可能无法完成所有必需的任务。公平地说，有些问题中四舍五入是可以接受的，但这些问题要么很无聊，要么解决方案显而易见，或者两者兼而有之。\n\
  \n\n\n## 4.1 最大流\n\n网络相关问题通常具有一种结构，其中解的整数性可以“免费”得到保证。我们只需认识到问题属于这一特殊类别，然后欣然接受即可。本节的目标是识别并建模具有这种特殊结构的问题。\n\
  \n最典型、最明显的例子是网络最大流问题，其中某种物质在具有容量的通道上从某些源点流向某些汇点，我们试图最大化流量。\n\n流动的物质不一定是实物，如水、石油甚至电力。它可以是流经光纤电缆网络的数据包。例如，假设你正试图确定可以从服务器向观众发送多少并发视频流。这恰好符合最大流问题的背景。\n\
  \n为了抽象地考虑最简单的问题，我们假设一个如图 4-1 所示的网络，其中每条弧都有标注的容量，我们试图从标记为源点（-S）的节点向标记为汇点（-T）的节点发送尽可能多的流量。\n\
  \n![A457410_1_En_4_Fig1_HTML.jpg](img/A457410_1_En_4_Fig1_HTML.jpg)\n\n图 4-1 网络流问题实例的可视化表示\n\
  \n### 4.1.1 构建模型\n\n在这个问题中，我们需要决定的是从源点向汇点输送多少流量，以及通过网络的哪些弧进行输送。\n\n### 4.1.2 决策变量\n\
  \n回答这个问题最简单、最自然的方法是引入一个二维变量。第一个维度表示起始节点，第二个维度表示目标节点；变量的值将是流经这两点之间弧的物质数量，即\n\n```\n\
  x_{i,j} ∀ i ∈ N, ∀ j ∈ N\n```\n\n例如，如果 `x[2,3] = 35`，则表示我们应该从节点 2 向节点 3 发送 35 个单位。\n\
  \n#### 4.1.2.1 目标函数\n\n目标是最大化从源点流向汇点的流量。因此，无论是从源点（设为集合 S）流出的总和，还是进入汇点（设为集合 T）的总和，都可以作为目标。这给出了以下两个目标函数之一：\n\
  \n```\nmax ∑_{i∈s} ∑_{j∈N} x_{i,j}\n```\n\n或\n\n```\nmax ∑_{j∈T} ∑_{i∈N} x_{i,j}\n\
  ```\n\n但是，由于我们允许多个源点，并且没有阻止一个源点向另一个源点发送流量以便进一步传输，因此我们应该小心地最大化从源点流出的“净”流量，即\n\n```\n\
  max ∑_{i∈S} (∑_{j∈N} x_{i,j} - ∑_{j∈N} x_{j,i})\n```\n\n(4.1)\n\n相应地，进入汇点的净流量应该是显而易见的。³\n\
  \n这个目标函数 (4.1) 足以得到一个可用的模型，但我们还需要考虑两个小麻烦：链式源点和循环。\n\n第一个有问题的情形如图 4-2 所示。很明显，由于进入汇点的弧的容量是\
  \ 2，因此恰好会有两个单位流量通过。但这两个单位可能全部来自源点 N1-S，也可能一个来自 N0-S，另一个来自 N1-S。\n\n![A457410_1_En_4_Fig2_HTML.jpg](img/A457410_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2 有问题的源点链式结构\n\n第二个有问题的情形发生在存在涉及源点的循环时。那么，对于围绕该循环的任意流量 `f`，如果该流量不大于该循环上的容量，则存在另一个流量\
  \ `f + 1`，其目标函数值完全相同。以图 4-3 为例。一个最优解可以通过中间节点从源点向汇点发送 10 个单位，或者从源点发送最多 20 个单位，其中最多有\
  \ 10 个单位从中间节点流回源点。\n\n![A457410_1_En_4_Fig3_HTML.jpg](img/A457410_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3 有问题的循环\n\n这两个例子说明了存在多个最优解，当然，它们的最优值完全相同。对于任何应用来说，这种大量的最优流不太可能是一个特性。它很可能被视为一个麻烦，尤其是当两个不同的求解器或同一求解器的两次不同运行返回两个不同的流时！我们如何确保求解器始终返回相同的流？\n\
  \n我们可以决定，在所有最优流中，我们希望选择流入源点的流量尽可能小的那个。这是一个双重目标：最大化从源点流出的净流量，并最小化流入源点的流量。这种双重目标，或者更一般地说，多目标的想法，在实践中经常出现，并且通常出于与这里相同的原因：需要根据一个标准在多个最优解中确定根据次要标准最可取的那个。\n\
  \n由于我们需要同时最大化一个目标并最小化另一个目标，我们需要另一个技巧：取反。\n\n```\nmax f(x) ⇔ min -f(x)\n```\n\n我们总是可以将最小化问题替换为最大化问题，反之亦然。现在我们可以将两个目标相加：最大化如公式\
  \ (4.1) 所示的净流量，并最小化流入量，即最大化 `-∑_{i∈S} ∑_{j∈N} x_{j,i}`。简化后，它看起来像\n\n```\nmax ∑_{i∈S}\
  \ (∑_{j∈N} x_{i,j} - 2^* ∑_{j∈N} x_{j,i})\n```\n\n(4.2)\n\n在我们的链式示例中，我们将最大化 `x[0,1]\
  \ + x[1,2] - 2^* x[0,1]`，即 `x[1,2] - x[0,1]`，这将强制所有流量都从 N1-S 发出。在我们的循环示例中，这将得到 `x[0,1]\
  \ + x[1,2] - x[1,0]`，这保证了没有流量流回源点，并且源点发出 10 个单位。\n\n#### 4.1.2.2 约束条件\n\n唯一的约束类型被称为流量守恒：对于既不是源点也不是汇点的每个节点，流入的流量必须等于流出的流量，即\n\
  \n```\n∑_{j∈N} x_{i,j} = ∑_{j∈N} x_{j,i} ∀ i ∈ N \\ {S ∪ T}\n```\n\n(4.3)\n\n由于目标函数会强制流量从源点流出，或者等价地，流入汇点，因此流量守恒将负责将物质从源点输送到汇点。\n\
  \n\n\n#### 4.1.2.3 可执行模型\n\n现在，我们将其转化为一个可执行模型。为了使模型具有足够的通用性以解决所有此类问题，我们假设输入是一个名为\
  \ `C` 的二维数组，以节点为索引，包含两个节点之间弧的容量。我们还假设存在两个数组，一个用于源点 `S`，另一个用于汇点 `T`。\n\n为了在目标函数的选择上提供一定的灵活性，并说明多个最优解的出现，我们添加了最后一个参数\
  \ `unique`。如果此参数设置为 `True`，模型将使用目标函数 (4.2) 运行，该函数将在最小化流入源点的流量的同时最大化净流量。如果设置为 `False`，则仅最大化流出源点的流量。参见列表\
  \ 4-1。\n\n```\n1   def solve_model(C,S,T,unique=True):\n2     s,n = newSolver('Maximumuflowuproblem'),len(C)\n\
  3     x=[[s.NumVar(0,C[i][j],\")for j in range(n)]for i in range(n)]\n4     B=sum(C[i][j]\
  \ for i in range(n) for j in range(n))\n5     Flowout,Flowin   =   s.NumVar(0,B,\"\
  ),s.NumVar(0,B,\")\n6     for i in range(n):\n7       if i not in S and i not in\
  \ T:\n8        s.Add(sum(x[i][j] for j in range(n)) == \\\n9        sum(x[j][i]\
  \ for j in range(n)))\n10     s.Add(Flowout == s.Sum(x[i][j] for i in S for j in\
  \ range(n)))\n11     s.Add(Flowin == s.Sum(x[j][i] for i in S for j in range(n)))\n\
  12     s.Maximize(Flowout-2*Flowin if unique else Flowout-Flowin)\n13     rc  =\
  \ s.Solve()\n14     return rc,SolVal(Flowout),SolVal(Flowin),SolVal(x)\n列表 4-1\n\
  最大流模型 (maxflow.py)\n```\n\n第 3 行定义了二维变量，其中第一个索引指定起点，第二个索引指定终点。第 9 行确保我们保持流经既非源点也非汇点的节点的流量守恒。第\
  \ 12 行的目标函数计算总流量，并指示我们应最大化该数量。\n\n我们返回流出源点的总流量和流入源点的总流量。模型的输出显示在表 4-1 和表 4-2 中，其中每个表分别对应\
  \ `unique` 参数设置为 `False` 和 `True` 的情况。\n\n**表 4-2**  \n最大化净流量并最小化流入量的最优解\n\n| 58-0\
  \ | N0-S | N1 | N2-S | N3 | N4 | N5 | N6-T |\n| --- | --- | --- | --- | --- | ---\
  \ | --- | --- |\n| N0-S |   |   |   | 8.0 |   |   |   |\n| N1 |   |   |   |   |\
  \   |   | 23.0 |\n| N2-S |   |   |   | 24.0 | 10.0 |   | 16.0 |\n| N3 |   | 23.0\
  \ |   |   | 9.0 |   |   |\n| N4 |   |   |   |   |   |   | 19.0 |\n| N5 |   |   |\
  \   |   |   |   |   |\n| N6-T |   |   |   |   |   |   |   |\n\n**表 4-1**  \n最大化净流量的最优解\n\
  \n| 71-13 | N0-S | N1 | N2-S | N3 | N4 | N5 | N6-T |\n| --- | --- | --- | --- |\
  \ --- | --- | --- | --- |\n| N0-S |   |   |   | 21.0 |   |   |   |\n| N1 |   | \
  \  |   |   |   |   | 23.0 |\n| N2-S |   |   |   | 24.0 | 10.0 |   | 16.0 |\n| N3\
  \ |   | 23.0 | 13.0 |   | 9.0 |   |   |\n| N4 |   |   |   |   |   |   | 19.0 |\n\
  | N5 |   |   |   |   |   |   |   |\n| N6-T |   |   |   |   |   |   |   |\n\n这里有一个有趣的现象：所有解都是整数，然而我们并没有施加整数约束。这是两个因素共同作用的结果。首先，问题的结构保证了如果存在最优解，那么必然存在一个整数解。⁴\
  \ 其次，所有求解器的求解技术，要么只考虑整数解（单纯形求解器），要么在返回结果之前从分数解移动到整数解（内点法求解器）。鼓励读者调整数值来验证，如果问题可行，求解器将找到一个整数解。\n\
  \n### 4.1.3 变体\n\n一个有用的应用是建模分配问题。这些问题有多种形式，这里举一个例子：假设我们有特定数量的工人（可以是人、机器或台式计算机的内核）和特定数量的待完成工作（要处理的文件、要制造的零件或要执行的程序）。我们构建一个网络，其中有一个源点，通过一条容量为\
  \ 1 的弧连接到每个工人。这些工人通过一条弧连接到工作节点（即汇点），但只有他们能够执行给定的工作。最大化流量将以最优方式将工人分配给工作，即完成最多的工作。我们通过查看工人和工作之间流量非零的弧来读取分配结果。参见图\
  \ 4-4。\n\n![A457410_1_En_4_Fig4_HTML.jpg](img/A457410_1_En_4_Fig4_HTML.jpg)\n\n\
  **图 4-4**  \n将工人分配给工作\n\n## 4.2 最小成本流\n\n还有一类问题，其解的整数性可以“免费”得到保证：即最小成本流问题（mincost）。\n\
  \n这是一个典型示例。Solar-1138 公司拥有一组清洁发电厂，为多个城市供电。每个发电厂都有最大容量，因此只能提供有限数量的千瓦时（kW-h）。每个城市都有峰值需求，并且所有城市的峰值大致在同一时间出现。因此，峰值需求的总和就是发电厂需要满足的电量。将一千瓦时从发电厂输送到城市的成本因发电厂、城市、输送基础设施以及发电厂与城市之间的距离而异。该成本是通过考虑电力生产、发电厂及电力线路的维护而确定的。\n\
  \n表 4-3 列出了发电厂与城市之间（在可能的情况下）的输送成本，单位为美元/千瓦时。每个发电厂的最大供应量和每个城市的峰值需求均以千瓦时为单位。\n\n**表\
  \ 4-3**  \n电力配送成本示例\n\n| 从/到 | 城市 0 | 城市 1 | 城市 2 | 城市 3 | 城市 4 | 城市 5 | 城市 6 |\
  \ 供应量 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 电厂 0 | 23 |\
  \   | 19 | 25 | 14 |   | 22 | 551 |\n| 电厂 1 | 16 |   |   | 20 | 23 | 13 | 23 | 689\
  \ |\n| 电厂 2 | 22 | 18 | 11 |   | 20 | 13 | 24 | 634 |\n| 需求量 | 288 | 234 | 236 |\
  \ 231 | 247 | 262 | 281 |   |\n\n需要回答的问题是：“应从每个发电厂向每个城市输送多少电力，才能在满足峰值需求的同时使成本最小化？”\n\
  \n### 4.2.1 构建模型\n\n在这个问题中，我们需要决定从每个发电厂向每个客户输送的电量。一个发电厂可能不向任何城市、向部分城市或向所有城市输送电力，我们需要一种方式来指明这一点。作为视觉辅助，请考虑图\
  \ 4-5 中所示的二分图⁵，其中发电厂是顶部节点，城市是底部节点，弧是电力线路，并标注了沿该特定输电线路输送电力的成本。\n\n![A457410_1_En_4_Fig5_HTML.jpg](img/A457410_1_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5**  \n需要图注\n\n#### 4.2.1.1 决策变量\n\n有了这个图像，问题的解决方案将是，对于每个发电厂-城市对，发电厂向城市输送的电量。最简单、最自然的方法是引入一个二维变量。第一个维度表示起点（发电厂集合\
  \ `P` 中的哪个发电厂），第二个维度表示终点（城市集合 `C` 中的哪个城市），即\n\n![$$ {x}_{i,j}\\forall i\\in P,\\\
  forall j\\in C $$](img/A457410_1_En_4_Chapter_Equc.gif)\n\n例如，如果 `x[2,3] = 35`，则表示我们应该从发电厂\
  \ 2 向城市 3 输送 35 千瓦时。\n\n这些多维变量（您将会看到很多）仅仅是每个发电厂-城市组合对应一个变量的简写符号。因此，如果我们有 3 个发电厂和\
  \ 4 个城市，我们实际上引入了 3 * 4 = 12 个决策变量。这在内存上有些浪费，因为并非每个发电厂和每个城市之间都存在路径，但如果这成为一个问题，您将看到如何避免这种浪费。\n\
  \n\n\n#### 4.2.1.2 目标\n\n目标是**最小化配送的总成本（美元）**。为此，我们需要一个成本参数。假设 `C[i,j]` 的索引与决策变量完全一致。那么目标函数为：\n\
  \n![$$ \\min \\kern0.125em \\sum \\limits_i\\sum \\limits_j{C}_{i,j}{x}_{i,j} $$](img/A457410_1_En_4_Chapter_Equ4.gif)\n\
  \n(4.4)\n\n#### 4.2.1.3 约束条件\n\n约束条件分为紧密相关的两类：供应与需求。为便于引用，我们引入以下参数：`S[i]`（`i ∈ P`）和\
  \ `D[j]`（`j ∈ C`），分别表示工厂 `i` 的可能供应量和城市 `j` 的需求量。\n\n每个工厂都有最大生产能力，我们必须遵守这一上限。因此，对于每个工厂，我们需要通过一个可用性约束来限制从该工厂配送的总量，如下所示：\n\
  \n![$$ \\sum \\limits_j{x}_{i,j}\\le {S}_i\\forall i\\in P $$](img/A457410_1_En_4_Chapter_Equd.gif)\n\
  \n注意这里的不等式：我们并未强制配送量必须达到产能，而是要求其不超过供应能力。\n\n城市的需求约束类似，但必须被满足。因此：\n\n![$$ \\sum \\\
  limits_i{x}_{i,j}={D}_j\\forall j\\in C $$](img/A457410_1_En_4_Chapter_Eque.gif)\n\
  \n这里我们使用了等式约束。如果建模时错误地使用了不等式（例如 `≤`），最优解将全部为零。另一方面，如果我们使用 `≥`，由于我们是在最小化总成本，这不会改变解的结果。\n\
  \n#### 4.2.1.4 可执行模型\n\n现在将其转化为一个可执行模型。为了使模型具有足够的通用性以解决所有此类问题，我们假设成本、需求和供应能力都存储在一个名为\
  \ `D` 的二维数组中，其结构如表 4-3 所示，其中成本为零表示该工厂与城市之间没有输电线路。\n\n从比“工厂”和“城市”更通用的角度来看，我们可以将每一行视为一个生产者，每一列视为一个消费者，只是最后一行代表需求，最后一列代表供应。生产者与消费者之间交换的“产品”可以是任何东西，不仅限于可分割的数量（如千瓦时或升水），也可以是卡车、鲜花、数据包或人员。最优解中永远不会出现人员的小数部分。参见代码清单\
  \ 4-2。\n\n```\n1   def solve_model(D):\n2     s = newSolver('Mincostuflowuproblem')\n\
  3     m,n = len(D)-1,len(D[0])-1\n4     B = sum([D[-1][j] for j in range(n)])\n\
  5     G = [[s.NumVar(0,B if D[i][j] else 0,\") for j in range(n)] \\\n6        \
  \ for i in range(m)]\n7     for i in range(m):\n8       s.Add(D[i][-1] >= sum(G[i][j]\
  \ for j in range(n)))\n9     for j in range(n):\n10       s.Add(D[-1][j] == sum(G[i][j]\
  \ for i in range(m)))\n11     Cost=s.Sum(G[i][j]*D[i][j] for i in range(m)for j\
  \ in range(n))\n12     s.Minimize(Cost)\n13     rc  = s.Solve()\n14     return rc,ObjVal(s),SolVal(G)\n\
  代码清单 4-2\n电力配送模型 (mincost.py)\n```\n\n第 6 行定义了二维变量，其中第一个索引指定生产者，第二个索引指定消费者。由于我们知道，如果某个特定的生产者-消费者对之间没有通道，则对应条目为零，因此我们利用这一点将变量的范围压缩为零。一个好的求解器会在执行任何其他工作之前利用此信息消除这些变量。\n\
  \n第 8 行确保我们的供应量不超过每个工厂的生产能力，而第 10 行确保满足峰值需求。第 11 行的目标函数计算总成本，并指示我们应最小化该值。\n\n模型的输出结果如表\
  \ 4-4 所示。读者可以验证，“总计”列的值小于或等于每个工厂的最大产量，而“总计”行的值恰好等于每个消费者的所需峰值需求。\n\n**表 4-4** 电力配送问题的最优解\n\
