  \ `Z` 为 `True`，则将其定义为整数变量。这样选择的原因是，对于极大量的网络（事实上是绝大多数）和多商品流问题，变量可以声明为连续变量，然而，如果所有需求、供应和容量都是整数，那么解也将是整数。面对长时间运行的建模者应尝试放宽整数约束。解很可能本身就是整数，从而节省大量\
  \ CPU 周期。解为整数的条件复杂且难以提前验证，因此出于实用目的，更简单的方法是先尝试连续求解器，如果解不实用再进行相应调整。\n\n这个简单问题的解如表\
