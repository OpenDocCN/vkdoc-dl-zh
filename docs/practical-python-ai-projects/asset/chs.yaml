  \ | --- | --- | --- | --- | --- | --- |\n| 工厂 0 |   |   |   |   | 247 |   | 281\
  \ | 528 |\n| 工厂 1 | 288 |   |   | 231 |   | 170 |   | 689 |\n| 工厂 2 |   | 234 |\
  \ 236 |   |   | 92 |   | 562 |\n| 总计 | 288 | 234 | 236 | 231 | 247 | 262 | 281 |\
  \   |\n\n这里再次出现了一个有趣的现象：所有解都是整数，尽管我们并未施加任何整数性约束。\n\n### 4.2.2 变体\n\n最简单的变体是给弧线增加容量限制。这样我们需要确保没有流量超过容量。假设我们在矩阵\
  \ `A` 中存储了容量，那么只需添加如下形式的约束：\n\n![$$ {x}_{i,j}\\le {A}_{i,j}\\forall i\\in P,\\forall\
  \ j\\in C $$](img/A457410_1_En_4_Chapter_Equf.gif)\n\n一个有趣的变体涉及分散供应源。例如，为了最小化风险，我们可能不希望来自单一供应源的需求超过某个比例。假设我们决定，任何城市的需求来自单一供应源的比例不得超过\
  \ 60%，我们可以添加如下形式的约束：\n\n![$$ {x}_{i,j}\\le 0.6{D}_j\\forall i\\in P,\\forall j\\\
  in C $$](img/A457410_1_En_4_Chapter_Equg.gif)\n\n鼓励读者添加此约束，并注意最优值将不会像没有该约束时那么低。此外，解可能不再是整数。这个简单的附加约束破坏了保证整数性的性质。我们必须将决策变量声明为整数（这会增加复杂性和求解时间）以保证得到整数解。\n\
  \n除了物质流动问题，该问题有时也以指派问题的形式出现：给定一组具有特定技能和小时工资的工人，以及一组工作，你应将哪个工人指派给哪个工作以最小化成本？\n\n\
  例如，考虑一家咨询公司，有三个团队位于不同城市，以及三个客户位于不同地点。由于从团队到客户地点的差旅成本各不相同，我们希望最小化总差旅成本。在这种情况下，需求和供应都只是\
  \ 1，因为我们希望每个客户地点有一个团队，并且每个团队分配一个客户。参见表 4-5。\n\n**表 4-5** 需要标题\n\n|   | 客户 0 | 客户\
  \ 1 | 客户 2 | 供应量 |\n| --- | --- | --- | --- | --- |\n| 团队 0 | 25 | 30 | 20 | 1 |\n\
  | 团队 1 | 20 | 15 | 35 | 1 |\n| 团队 2 | 18 | 19 | 28 | 1 |\n| 需求量 | 1 | 1 | 1 |  \
  \ |\n\n\n\n## 4.3 转运问题\n\n可建模为网络流问题的一类更通用的问题是转运问题。此类问题的特征是一组节点，每对节点之间都有运输成本；其中一部分节点是供应商，另一部分是消费者。其余节点可用于承载物料，但既不生产也不消耗，因此得名“转运”。\n\
  \n例如，表 4-6 给出了每对节点之间的交付成本。空白表示两个节点之间没有路径。最后一列表示节点可以生产的数量（如果有的话）；最后一行是每个节点的需求量（如果有的话）。请注意，需求总和通常应与供应总和相等，否则问题不可行。\n\
  \n**表 4-6** 网络上的转运配送成本示例\n\n| 从/到 | N0 | N1 | N2 | N3 | N4 | N5 | N6 | N7 | 供应量\
  \ |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| N0 | | | |\
  \ | 17 | 10 | 19 | | |\n| N1 | 23 | | | 28 | | 23 | | | |\n| N2 | 29 | | | | 30\
  \ | 25 | 25 | | 680 |\n| N3 | | | | | 17 | 15 | 19 | 29 | |\n| N4 | | 16 | | | |\
  \ | | | |\n| N5 | 22 | | | | 25 | | | 18 | 540 |\n| N6 | 25 | 29 | 16 | | | 22 |\
  \ | | |\n| N7 | | | 30 | | 10 | | 27 | | |\n| 需求量 | 241 | | | 164 | 239 | | 152\
  \ | 424 | |\n\n转运问题通常如图 4-6 所示，对应于表 4-6 中的数据，其中箭头标注了物料运输成本，节点中包含正数表示供应值，负数表示需求值。\n\
  \n请注意，这显然是**最小成本流问题**的泛化，因为任意两个节点之间都可能存在弧，这意味着，例如，一个源节点可以接收网络中流动的任何产品，将其添加到自己的产量中，然后将结果发送到另一个节点，无论是消费者还是转运节点。\n\
  \n### 4.3.1 构建模型\n\n在这个问题中，我们需要决定从每个有正供应量的节点向每个有正需求量的节点运送多少物料。对此进行建模的最简单、最自然的方法是引入一个二维变量。第一个维度表示起点，第二个维度表示终点。变量本身将包含要运输的数量。我们假设\
  \ `N` 是节点集合，得到\n\n![$$ {x}_{i,j}\\forall i\\in N,\\forall j\\in N $$](img/A457410_1_En_4_Chapter_Equh.gif)\n\
  \n![A457410_1_En_4_Fig6_HTML.jpg](img/A457410_1_En_4_Fig6_HTML.jpg)\n\n**图 4-6**\
  \ 转运问题的图形化示例\n\n例如，如果 `x[2,3] = 35`，则表示我们应该将 35 个单位从节点 2 运送到节点 3。\n\n#### 4.3.1.1\
  \ 目标函数\n\n目标是最小化交付成本（以美元计）。为此，我们需要一个成本参数。假设 `C[i,j]` 的索引与决策变量完全相同。因此目标函数为\n\n![$$\
  \ \\min \\kern0.125em \\sum \\limits_i\\sum \\limits_j{C}_{i,j}{x}_{i,j} $$](img/A457410_1_En_4_Chapter_Equi.gif)\n\
  \n#### 4.3.1.2 约束条件\n\n在之前的最小成本流问题中，我们有两种类型的约束：一种针对生产节点，规定流出量等于供应量；另一种针对消费节点，规定流入量等于需求量。我们可以在此处使用这些约束，此外还需要第三个针对中间节点（即没有任何需求或供应值的节点）的约束，规定流入量必须等于流出量。\n\
  \n虽然可以对每种类型的节点（生产者、消费者和中间节点）进行不同处理，但更简单的方法是注意到一个适当通用的约束将适用于每个节点。即，流入节点的流量（`f[in]`）减去流出节点的流量（`f[out]`）必须等于需求量（`D`）减去供应量（`S`），即\n\
  \n`f[in] − f[out] = D − S`。\n\n请注意，在纯源点和汇点的情况下，该方程简化为我们在最小成本流模型中使用的约束：\n\n*   `−\
  \ f[out] = −S` 源点的特殊情况\n*   `f[in] = D` 汇点的特殊情况\n\n假设 `S[i]` 和 `D[i]` 分别是节点 `i`\
  \ 的供应量和需求量，请记住，对于生产节点，只有供应量非零；对于消费节点，只有需求量非零；对于中间节点，两者都为零。我们得到\n\n![$$ \\sum \\\
  limits_j{x}_{j,i}-\\sum \\limits_j{x}_{i,j}={D}_i-{S}_i\\forall i\\in N $$](img/A457410_1_En_4_Chapter_Equ5.gif)\n\
  \n(4.5)\n\n这个约束被称为通用的流量守恒约束。这是我们唯一需要的约束，但它必须在每个节点上都成立。\n\n#### 4.3.1.3 可执行模型\n\n\
  让我们将其转换为可执行模型。为了使模型足够通用以解决所有此类问题，我们假设成本、需求和供应能力都包含在一个名为 `D` 的二维数组中，其结构如表 4-6 所示。每个条目\
  \ `{i,j}` 表示从节点 `i` 到节点 `j` 的运输成本，但最后一行表示需求，最后一列表示供应。参见代码清单 4-3。\n\n```\n1   def\
  \ solve_model(D):\n2     s = newSolver('Transshipmentuproblem')\n3     n = len(D[0])-1\n\
  4     B = sum([D[-1][j] for j in range(n)])\n5     G = [[s.NumVar(0,B  if D[i][j]\
  \ else  0,\") \\\n6        for j in range(n)] for i in range(n)]\n7     for i in\
  \ range(n):\n8       s.Add(D[i][-1] - D[-1][i] == \\\n9       sum(G[i][j] for j\
  \ in range(n))-sum(G[j][i]for j in range(n)))\n10     Cost=s.Sum(G[i][j]*D[i][j]\
  \ for i in range(n)for j in range(n))\n11     s.Minimize(Cost)\n12     rc = s.Solve()\n\
  13     return rc,ObjVal(s),SolVal(G)\n```\n\n**代码清单 4-3** 转运配送模型 (`transship_dist.py`)\n\
  \n第 6 行定义了二维变量，其中第一个索引指定生产者，第二个索引指定消费者。变量的范围是从零到总需求量，或者为零，以确保我们不会使用不存在的路线。在数据 `D`\
  \ 中，条目 `i,j` 处缺少成本表示 `i` 和 `j` 之间没有直接路线。\n\n对应于 (6.5) 的通用流量守恒约束在第 7 行实现。第 10 行的目标函数计算总成本，第\
  \ 11 行指示我们应该最小化该数量。\n\n模型的输出显示在表 4-7 中。请注意，即使我们没有强制整数性，解仍然是完全整数。\n\n读者可以验证，给定节点的“总计”列中的条目减去同一节点的“总计”行中的条目，等于该节点的供应量与需求量之差。这对于接收量超过其需求并将未使用的部分重新路由的节点尤其有趣。即使对于非常小的问题，这些也不是容易猜测的解。\n\
