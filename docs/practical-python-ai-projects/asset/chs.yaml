  ### 7.2.3 从 n 个约束中选取 k 个


  一个相关的技巧是选择一定数量的约束使其满足（并允许其他约束被违反）。让我们考虑单个约束的情况，例如


  `∑ᵢ aᵢ xᵢ ≤ b` (7.3)


  其中 `x` 是决策变量。我们可能希望：如果约束被满足，则触发一个指示变量；或者如果指示变量被触发，则强制该约束成立：


  `δ = 1 ⇒ ∑ᵢ aᵢ xᵢ ≤ b` (7.4)


  或


  `∑ᵢ aᵢ xᵢ ≤ b ⇒ δ = 1` (7.5)


  这种将二元变量与约束状态关联起来的技术称为约束具体化。


  首先考虑较简单的方程 (7.4)。我们需要边界


  `u_b := maxₓ ∑ᵢ aᵢ xᵢ - b`

  `l_b := minₓ ∑ᵢ aᵢ xᵢ - b`


  这些边界不必精确计算，尽管你会看到这很容易做到。任何有效的边界都可以使用，但通常需要注意的是，为了避免数值困难，不应引入“过大”的数字。有了这些参数，我们可以添加约束：


  `∑ aᵢ xᵢ ≤ b + u_b (1 - δ)`


  如果 `δ = 0`，则该约束在 `x` 的定义域内是无效的。另一方面，如果 `δ = 1`，则该约束必须成立。


  另一个方向，即方程 (7.5)，既没有那么有用，也没有那么简单，但它是将逻辑表达式转化为代数表达式的一个有趣练习。


  首先，让我们表述 (7.5) 的逆否命题，即


  `δ = 0 ⇒ ∑ᵢ aᵢ xᵢ ≰ b` 或

  `δ = 0 ⇒ ∑ᵢ aᵢ xᵢ > b`


  当 `a`、`b` 和 `x` 都是整数变量时，`∑ᵢ aᵢ xᵢ > b` 的含义是明确的。它意味着 `∑ᵢ aᵢ xᵢ ≥ b + 1`。主要困难出现在 `x`
  是连续变量时。此时我们需要确定 `>` 的含义，这将取决于我们正在建模的问题。


  我们需要规定，不等式被违反某个 `ε` 就足够了。如果 `x` 表示以米为单位的可见光波长，那么 `ε` 的值可能在 `10⁻⁹` 量级。如果 `x` 表示美国政府在其军事上的支出，那么
  `10⁵` 可能就足够了。无论如何，我们现在要实现的是


  `δ = 0 ⇒ ∑ᵢ aᵢ xᵢ ≥ b + ε` (7.6)


  一旦建模者规定了 `ε`，我们就添加


  `∑ aᵢ xᵢ ≥ b + l_b δ + ε (1 - δ)` (7.7)


  如果 `δ = 0`，则简化为 (7.6)。如果 `δ = 1`，则下界生效，该约束变为无效。“小于”的情况类似处理，或者更简单，将所有项乘以 `-1` 并使用上述方法。“等于”的情况通过将其转化为两个不等式来处理。


  有了这些方程，我们现在可以通过为每个约束创建一个指示变量 `δ[i]`，并在 `δ` 上使用我们之前定义的 `k_out_of_n` 函数，从 `n` 个约束中选取
  `k` 个。首先，由于我们需要边界，并且可以轻松设置一个线性规划来找到它们，让我们这样做。代码清单 7-10 将根据给定的 `a`、`x` 和 `b`，找到 `∑
  aᵢ xᵢ - b` 的最紧上界和下界。




  ```python

  1  from ortools.linear_solver import pywraplp

  2  def bounds_on_box(a,x,b):

  3    Bounds,n = [None,None],len(a)

  4    s = pywraplp.Solver(''Box'',pywraplp.Solver. GLOP_LINEAR_PROGRAMMING)

  5    xx = [s.NumVar(x[i].Lb(), x[i].Ub(),") for i in range(n)]

  6    S = s.Sum([-b]+[a[i]*xx[i] for i in range(n)])

  7    s.Maximize(S)

  8    rc  = s.Solve()

  9    Bounds[1] = None if rc != 0 else ObjVal(s)

  10    s.Minimize(S)

  11    s.Solve()

  12    Bounds[0] = None if rc != 0 else ObjVal(s)

  13    return Bounds

  代码清单 7-10

  如何计算盒式约束下线性约束的边界

  ```


  读者可能会疑惑，为什么在第 5 行，我们创建了传入参数 `x` 的副本，而不是直接使用该参数本身。原因是 `x` 与调用者的求解器对象相关联，而函数 `bounds_on_box`
  正在创建一个新的求解器实例。更糟糕的是，`bounds_on_box` 可能会被多次调用，且每次都使用同一个 `x`，而每个求解器都可能试图将 `x` 绑定到不同的值。如果我们直接使用传入的值，很快就会导致调用者的模型不一致，更糟的是，可能会在没有任何问题根源提示的情况下产生无意义的结果。因此，需要使用不同的变量。


  在完成了这个计算线性函数边界的迂回步骤之后，我们现在可以着手实现一个函数，该函数将一个约束具体化为一个 0-1 变量 `δ`，并在 `δ` 被设置时强制执行该约束。该函数在代码清单
  7-11 中实现。


  函数 `reify_force` 接受定义仿射函数 `∑ a_j x_j - b` 所需的参数 `a`、`x` 和 `b`（注意符号）。它还接受三个可选参数。首先，如果调用者对指示器数组有其他用途，可以创建并传入该数组。如果没有，则在第
  5 行创建。无论哪种情况，该数组都会被返回。其次，关系类型可以是 `≤`、`≥` 或 `=` 中的任意一种。最后，如果调用者拥有该线性函数的边界，可以将其传入。这样可以避免调用我们的
  `bounds_on_box` 函数。例如，当决策变量不受盒式约束限制时，就需要这样做。


  ```

  1  def reify_force(s,a,x,b,delta=None,rel='' a*x ='',''=='']:

  11      s.Add(sum(a[i]*x[i] for i in range(n))>=b+bnds[0]*(1-delta))

  12    return delta

  代码清单 7-11

  如何具体化一个约束并强制执行它

  ```


  如果用户没有提供边界，我们使用 `bounds_on_box` 函数来找到严格的下界和上界（假设 `x` 的定义域是严格的）。读者不必担心可能会实例化大量求解器。每个实例都非常小，运行速度极快。


  最后，我们添加经过适当修改的约束，要么是实现等式 (7.7) 的“小于等于”关系，要么是相应的“大于等于”约束。参见代码清单 7-12。如果调用者需要等式约束，我们会同时添加两个约束，因为


  `∑_j a_j x_j ≤ b ∧ ∑_j a_j x_j ≥ b ⇒ ∑_j a_j x_j = b`


  ```

  1  def reify_raise(s,a,x,b,delta=None,rel='' delta == 1

  3    n = len(a)

  4    if delta is None:

  5      delta = s.IntVar(0,1,")

  6    if bnds is None:

  7      bnds = bounds_on_box(a,x,b)

  8    if rel == ''= b+bnds[0]*delta+eps*(1-delta))

  11    if rel == ''>='':

  12      s.Add(sum(a[i]*x[i] for i in range(n)) \

  13           = b+bnds[0]*gm[0]+eps*(1-gm[0]))

  18      s.Add(sum(a[i]*x[i] for i in range(n)) \

  19           <= b+bnds[1]*gm[1]-eps*(1-gm[1]))

  20      s.Add(gm[0] + gm[1] - 1 == delta)

  21    return delta

  代码清单 7-12

  如何具体化一个约束并在其满足时触发指示器

  ```


  函数 `reify_raise` 与 `reify_force` 共享大部分结构，包括一组必需参数和可选参数。第一个区别是，如上所述，在连续变量的情况下，调用者必须提供违反约束的含义，即
  `eps`。默认值为 1，这在离散变量的情况下完美适用。


  另一个区别是，我们不能在所有情况下都依赖参数 `delta`。在关系为 `≤` 或 `≥` 的情况下可以，但在等式的情况下不行。问题在于等式失败有两种方式：左侧可能大于或小于右侧。这就是为什么我们引入另外两个二元变量
  `gm[0]`（实际上是 `γ[0]`）和 `gm[1]`（实际上是 `γ[1]`）来反映每种违反情况：


  `∑_j a_j x_j > b + ε ⇒ γ_0 = 1,`

  `∑_j a_j x_j < b - ε ⇒ γ_1 = 1`


  然后，使用 `γ` 数组通过一个小技巧来设置 `δ`。由于 `γ` 不能同时为零，它们的和为 1 或 2，这正好对应 `δ` 需要为 0 或 1 的情况，因此
  `γ_0 + γ_1 - 1 = δ`。


  作为最后的润色，我们创建了 `reify` 函数，该函数实现了之前由 `force` 和 `raise` 分别实现的“当且仅当”条件。参见代码清单 7-13。


  ```

