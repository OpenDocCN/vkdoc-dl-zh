    # 2. AI Ethics, Biasness, and Reliability


    This chapter covers different frameworks using Explainable Artificial Intelligence
    (XAI) Python libraries to control biasness, execute the principles of reliability,
    and maintain ethics while generating predictions. As digitalization progresses
    touch different industries, they open up a whole new set of opportunities for
    the application of artificial intelligence and machine learning-related solutions.
    The major challenges with the adoption of these AI technologies are ethics, biasness,
    and the reliability of the system, plus the transparency of the processes. These
    AI systems raise fundamental questions. Can I trust the predictions made by the
    AI system? Can I assume that it is unbiased? What kind of risk does it have? Is
    there any process where I can control the AI systems and their predictions about
    the future? AI ethics focus more on the legitimate use of AI for human kind and
    their wellness. AI should not be used for the destruction of human civilization.
    In this chapter, we are going to discuss various aspects of AI.'
  trans: '

    ### XAI 评估


    目前，互联网上基于 Python 的库所生成的不同解释尚无统一的评估标准。XAI 流程在评估解释时应遵循以下步骤：


    - 每个分层都应有独立的解释。如果数据集因数据量过大而无法用于模型训练，我们通常会对其进行采样。若采用分层抽样方法，则每个分层都应有独立的解释。

    - **时间约束**：我们知道现实生活中的数据集非常庞大。即使采用分布式计算框架，XAI 库生成的解释通常也不应耗费过多时间。

    - **实例不变性**：如果数据点基于其属性完全相同，它们应属于同一组，因此应传达相似的解释。


    在各种 AI 项目和计划中，当我们进行预测时，常常会有人问：为什么有人会信任我们的模型？在预测分析、机器学习或深度学习中，预测结果与预测原因之间存在权衡。如果预测结果符合人类预期，那自然很好。但如果超出人类预期，我们就需要了解模型为何做出这样的决策。在低风险场景下，例如客户定位、数字营销或内容推荐，预测与预期的偏差是可以接受的。然而，在高风险环境中，例如临床试验或药物测试框架，预测与预期的微小偏差都会造成巨大影响，并引发诸多关于模型为何做出此类预测的疑问。作为人类，我们自认为优于万物。我们天生好奇，想知道模型是如何得出预测结果的，以及为什么不是由人类来完成。XAI
    框架是识别机器学习训练过程中固有偏见的绝佳工具。XAI 帮助我们调查偏见产生的原因，并找出偏见具体出现在哪里。


    由于许多人无法自如地解释机器学习模型的结果，也无法推理出模型的决策依据，因此他们不愿意使用 AI 模型（图 1-12）。本书旨在推广 XAI 框架的概念，用于调试机器学习和深度学习模型，以提高
    AI 在工业界的采用率。在高风险环境和用例中，存在监管和审计要求，需要对模型的决策进行推理。本书旨在提供 XAI 框架在有监督回归、分类、无监督学习、聚类和分割相关任务中的实践操作。此外，某些时间序列预测模型也需要
    XAI 来描述预测结果。进一步地，XAI 框架也可用于非结构化文本分类相关问题。单一的 XAI 框架并不适用于所有类型的模型，因此我们将讨论各种类型的开源
    Python 库及其在生成基于 XAI 的解释中的用法。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig12_HTML.png](img/506619_1_En_1_Fig12_HTML.png)


    图 1-12

    AI 提高采用率所需的条件


    检查模型公平性还需要使用预测结果模拟假设情景。我们也将涵盖这一点。然后，我们将讨论 AI 模型的反事实和对比解释。我们将涵盖深度学习模型的模型可解释性、基于规则的专家系统，以及使用各种
    XAI 框架针对预测不变性和计算机视觉任务的模型无关解释。


    模型可解释性和可说明性是本书的重点。书中介绍了通常用于解释 AI 模型决策的数学公式和方法。读者将了解软件库方法、类、框架和函数，以及如何使用它们来实现模型的可说明性、透明度、可靠性、伦理、偏见和可解释性。如果人类能够理解
    AI 模型做出决策背后的原因，这将赋予用户更大的权力来进行修正和提出建议。


    ## 结论


    模型可解释性和可说明性是所有使用 AI 进行预测的流程所必需的，原因在于我们需要了解预测背后的理由。在本章中，您学习了以下内容：


    - 模型可说明性和可解释性基础

    - AI 应用中的伦理考量以及 AI 模型生成预测中的偏见

    - AI 模型在不同用例中生成预测的可靠性

    - 用于解释 AI 中使用的线性模型、非线性模型和时间序列模型的方法和系统

    - 使用诸如 `Lime`、`SHAP`、`Skater`、`ELI5` 等框架的最复杂集成模型、可说明性和可解释性

    - 非结构化数据和自然语言处理相关任务的模型可解释性


    # 2. AI 伦理、偏见与可靠性


    本章涵盖了使用可解释人工智能 (XAI) Python 库的不同框架，以控制偏见、执行可靠性原则，并在生成预测时维护伦理。随着数字化进程触及不同行业，它为人工智能和机器学习相关解决方案的应用开辟了全新的机遇。采用这些
    AI 技术的主要挑战在于伦理、偏见、系统可靠性以及流程的透明度。这些 AI 系统提出了根本性问题：我能信任 AI 系统做出的预测吗？我能假设它是无偏见的吗？它存在何种风险？是否存在某种流程可以让我控制
    AI 系统及其对未来的预测？AI 伦理更侧重于 AI 为人类及其福祉的合法使用。AI 不应被用于毁灭人类文明。在本章中，我们将讨论 AI 的各个方面。

    '
- fmt: '# AI Ethics Primer


    AI is a relatively new field and it is getting streamlined by different governments
    around the world as they see evidence of inconsistencies. AI is broadly known
    as the intelligent behavior displayed or demonstrated by computers to reach end
    goals. The goals are always business defined, such as in a logistics context for
    arranging a warehouse or defining a robot and its activities to lift and shift
    packages in a warehouse. Or it can be defined as a robot that can fire a weapon
    by observing a threat from a human in a self-defense situation. These scenarios
    are quite different. In the first scenario, the use of AI is permissible. In the
    second scenario, it is not the best possible use of AI. The AI systems can reason
    out, think, and perceive actions and reactions and hence can be trained to take
    actions. The central goal of AI is to create machines that can help in sensing,
    logical reasoning, game playing, decision making by use of modelling techniques,
    understanding natural language processing, generating text just like human beings,
    and more.


    There is a huge debate on the subject of AI ethics in academics, by politicians
    in various public speeches, and by practitioners. There is much to say but there
    is little groundwork to frame certain policies around the ethics of AI. This is
    not just because of the intent to do so, but because it is difficult to do. AI
    is evolving and thus a technology policy is difficult to plan and enforce.


    It is really difficult to estimate in advance the impact of AI technology on the
    lives of people, the threat of AI use in the military, and the threat of AI technology
    in other sectors. Hence policy formulation around the use of AI from an ethical
    point of view at times is very much iterative in nature. As different organizations
    use AI for different purposes, there is no consensus among the business power
    houses on how to use AI and what is right from an ethical point of view. Every
    government around the world wants to dominate and be powerful with the use of
    AI technology, hence there is no consensus on building a mutual policy around
    the ethical use of AI (Figure [2-1](#506619_1_En_2_Chapter.xhtml#Fig1)). This
    follows the path of nuclear technology in the past.


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig1_HTML.png](images/506619_1_En_2_Chapter/506619_1_En_2_Fig1_HTML.png)


    **Figure 2-1** Ethics in AI


    - **Volume of data (non-anonymous):** The data collection process and the storage
    systems are predominantly cloud specific and completely digital. The data collected
    from users includes their personalized information as well as their online behavior.
    This data is no longer anonymous, although companies use this information at an
    aggregate level, having Personalized Identifiable Information (PIIs) mostly masked.
    Still the campaigns are at personalized level. Hence the data is no longer anonymous;
    it can be attributable to individuals. An individual’s entire online presence
    is stored, analyzed, and targeted for any product or service selling activity.
    Currently many organizations abide by the rules set forth by their clients regarding
    the usage of data. There is still a need for policies to make the data anonymous.


    - **Variety of data:** Today every activity performed by machines is captured
    and stored in order to improve the machine performance, optimize maintenance cost,
    prevent failure in the production process, and more. There is a large amount of
    data generated by IoT (Internet of Things) applications and systems, such as industrial
    production systems, telematics data from vehicles on the road, and more.


    - **Data trade (intended, unintended):** Data collected for one purpose from the
    source systems should not be utilized for another purpose, intended or unintended.
    The issue of data trade arises when we repurpose data for some other use case.
    This concern has been taken care of by the GDPR regulation, and similar laws are
    enforced by different companies and different authorities just to ensure that
    data trade does not happen. If we create an AI system with traded data, the entire
    system becomes unethical.


    - **Surveillance (targeted, non-targeted):** AI ethics also applies to blanket
    surveillance on all populations whether it is targeted or non-targeted, for any
    purpose. Ethical debates happen over when and how a surveillance system should
    be enforced. Yes, a biometric-based authentication system without additional safeguards
    is a cause for concern, which is why there is a constant campaign in favor of
    halting facial recognition systems around the world.


    - **Manipulation intervenes rational choice:** AI from an ethical point of view
    should be rational. There has to be a legitimate process, and AI systems should
    be transparent.


    - **Honesty:** It is at the core of defining organizational transparency. From
    an ethics point of view, it is important for organizations to adhere to explainability
    and provide technical transparency into core AI products and applications. This
    applies to the source of the training data, the choice of algorithms, how exactly
    the system is trained, how the predictions are generated, and more.


    ## Biasness in AI


    Many AI systems use ML and DL models to be specific and predictive models in general.
    Biasness in AI means biasness in predictions. Why do prediction biases arise?
    How to control biased predictions is a matter of discussion today. The ethical
    consequences of algorithmic decision making by AI systems is a great concern.
    The emergence of biases in AI-led decision making has seriously affected the adoption
    of AI. In order to build an unbiased system, a strong sense of justice needs to
    be in place to help decision makers act fairly without having any prejudice and
    favoritism.


    ## Data Bias


    The biasness can be categorized as data bias and algorithmic bias. The data bias
    arises when we consider limited sampling for labeling data from one angle and
    increase the presence of major group. This leads to a biased dataset. This process
    can be improved with a connection to the natural source of data collection. This
    is shown in Figure [2-2](#506619_1_En_2_Chapter.xhtml#Fig2). Let’s understand
    the data bias through an example. If we look at the trend of revenue or profit
    for an ecommerce company over last 15 years, there is definitely an upward trend
    and every 5 years there is a trend break. The trend break is due to the increase
    in the unit price of the product. If we want to build a machine learning model
    to predict the revenue for the next two years, we cannot include the last 15 years
    of data. If we choose random data points to train the ML model, there is going
    to be data bias, and this data bias could lead to incorrect predictions.'
  raw: '## AI Ethics Primer


    AI is a relatively new field and it is getting streamlined by different governments
    around the world as they see evidence of inconsistencies. AI is broadly known
    as the intelligent behavior displayed or demonstrated by computers to reach end
    goals. The goals are always business defined, such as in a logistics context for
    arranging a warehouse or defining a robot and its activities to lift and shift
    packages in a warehouse. Or it can be defined as a robot that can fire a weapon
    by observing a threat from a human in a self-defense situation. These scenarios
    are quite different. In the first scenario, the use of AI is permissible. In the
    second scenario, it is not the best possible use of AI. The AI systems can reason
    out, think, and perceive actions and reactions and hence can be trained to take
    actions. The central goal of AI is to create machines that can help in sensing,
    logical reasoning, game playing, decision making by use of modelling techniques,
    understanding natural language processing, generating text just like human beings,
    and more.


    There is a huge debate on the subject of AI ethics in academics, by politicians
    in various public speeches, and by practitioners. There is much to say but there
    is little groundwork to frame certain policies around the ethics of AI. This is
    not just because of the intent to do so, but because it is difficult to do. AI
    is evolving and thus a technology policy is difficult to plan and enforce.


    It is really difficult to estimate in advance the impact of AI technology on the
    lives of people, the threat of AI use in the military, and the threat of AI technology
    in other sectors. Hence policy formulation around the use of AI from an ethical
    point of view at times is very much iterative in nature. As different organizations
    use AI for different purposes, there is no consensus among the business power
    houses on how to use AI and what is right from an ethical point of view. Every
    government around the world wants to dominate and be powerful with the use of
    AI technology, hence there is no consensus on building a mutual policy around
    the ethical use of AI (Figure [2-1](#506619_1_En_2_Chapter.xhtml#Fig1)). This
    follows the path of nuclear technology in the past.


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig1_HTML.png](images/506619_1_En_2_Chapter/506619_1_En_2_Fig1_HTML.png)


    Figure 2-1


    Ethics in AI


    *   Volume of data (non-anonymous): The data collection process and the storage
    systems are predominantly cloud specific and completely digital. The data collected
    from users includes their personalized information as well as their online behavior.
    This data is no longer anonymous, although companies use this information at an
    aggregate level, having Personalized Identifiable Information (PIIs) mostly masked.
    Still the campaigns are at personalized level. Hence the data is no longer anonymous;
    it can be attributable to individuals. An individual’s entire online presence
    is stored, analyzed, and targeted for any product or service selling activity.
    Currently many organizations abide by the rules set forth by their clients regarding
    the usage of data. There is still a need for policies to make the data anonymous.


    *   Variety of data: Today every activity performed by machines is captured and
    stored in order to improve the machine performance, optimize maintenance cost,
    prevent failure in the production process, and more. There is a large amount of
    data generated by IoT (Internet of Things) applications and systems, such as industrial
    production systems, telematics data from vehicles on the road, and more.


    *   Data trade (intended, unintended): Data collected for one purpose from the
    source systems should not be utilized for another purpose, intended or unintended.
    The issue of data trade arises when we repurpose data for some other use case.
    This concern has been taken care of by the GDPR regulation, and similar laws are
    enforced by different companies and different authorities just to ensure that
    data trade does not happen. If we create an AI system with traded data, the entire
    system becomes unethical.


    *   Surveillance (targeted, non-targeted): AI ethics also applies to blanket surveillance
    on all populations whether it is targeted or non-targeted, for any purpose. Ethical
    debates happen over when and how a surveillance system should be enforced. Yes,
    a biometric-based authentication system without additional safeguards is a cause
    for concern, which is why there is a constant campaign in favor of halting facial
    recognition systems around the world.


    *   Manipulation intervenes rational choice: AI from an ethical point of view
    should be rational. There has to be a legitimate process, and AI systems should
    be transparent


    *   Honesty: It is at the core of defining organizational transparency. From an
    ethics point of view, it is important for organizations to adhere to explainability
    and provide technical transparency into core AI products and applications. This
    applies to the source of the training data, the choice of algorithms, how exactly
    the system is trained, how the predictions are generated, and more.


    ## Biasness in AI


    Many AI systems use ML and DL models to be specific and predictive models in general.
    Biasness in AI means biasness in predictions. Why do prediction biases arise?
    How to control biased predictions is a matter of discussion today. The ethical
    consequences of algorithmic decision making by AI systems is a great concern.
    The emergence of biases in AI-led decision making has seriously affected the adoption
    of AI. In order to build an unbiased system, a strong sense of justice needs to
    be in place to help decision makers act fairly without having any prejudice and
    favoritism.


    ## Data Bias


    The biasness can be categorized as data bias and algorithmic bias. The data bias
    arises when we consider limited sampling for labeling data from one angle and
    increase the presence of major group. This leads to a biased dataset. This process
    can be improved with a connection to the natural source of data collection. This
    is shown in Figure [2-2](#506619_1_En_2_Chapter.xhtml#Fig2). Let’s understand
    the data bias through an example. If we look at the trend of revenue or profit
    for an ecommerce company over last 15 years, there is definitely an upward trend
    and every 5 years there is a trend break. The trend break is due to the increase
    in the unit price of the product. If we want to build a machine learning model
    to predict the revenue for the next two years, we cannot include the last 15 years
    of data. If we choose random data points to train the ML model, there is going
    to be data bias, and this data bias could lead to incorrect predictions.'
  trans: '

    # AI 伦理入门


    人工智能是一个相对较新的领域，随着世界各国政府发现其存在不一致性的证据，该领域正逐步规范化。AI 广义上指计算机为达成最终目标所展现或演示的智能行为。这些目标通常由业务定义，例如在物流场景中用于安排仓库，或定义机器人及其在仓库中搬运和移动包裹的活动。它也可以被定义为一种机器人，能够在自卫场景中通过观察人类的威胁来开火。这些场景截然不同。在第一种场景中，使用
    AI 是被允许的。在第二种场景中，这并非 AI 的最佳用途。AI 系统能够推理、思考、感知行动与反应，因此可以被训练来采取行动。AI 的核心目标是创造能够通过建模技术辅助感知、逻辑推理、游戏、决策，理解自然语言处理，像人类一样生成文本等等的机器。


    学术界、政治家在各种公开演讲中以及从业者之间，就 AI 伦理这一主题存在着巨大的争论。可说的很多，但围绕 AI 伦理制定某些政策的实际基础工作却很少。这不仅仅是因为缺乏意愿，更是因为执行起来很困难。AI
    正在不断发展，因此技术政策难以规划和执行。


    预先估计 AI 技术对人们生活的影响、AI 在军事领域使用的威胁以及 AI 技术在其他领域的威胁，确实非常困难。因此，从伦理角度围绕 AI 使用制定政策，本质上往往具有很强的迭代性。由于不同组织出于不同目的使用
    AI，商业巨头之间对于如何使用 AI 以及从伦理角度看何为正确，并未达成共识。世界各地的每个政府都希望借助 AI 技术占据主导地位并变得强大，因此在围绕 AI
    伦理使用制定共同政策方面没有共识（图 2-1）。这遵循了过去核技术的发展路径。


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig1_HTML.png](img/506619_1_En_2_Fig1_HTML.png)


    **图 2-1** AI 中的伦理


    -   **数据量（非匿名）：** 数据收集过程和存储系统主要基于云端且完全数字化。从用户收集的数据包括他们的个人信息以及在线行为。这些数据不再是匿名的，尽管公司会在汇总层面使用这些信息，并且大部分个人身份信息（PII）已被屏蔽。但营销活动仍然是个性化的。因此，数据不再是匿名的；它可以追溯到个人。个人的整个在线足迹都被存储、分析，并用于任何产品或服务的销售活动。目前，许多组织遵守其客户制定的数据使用规则。但仍然需要制定政策来使数据匿名化。


    -   **数据多样性：** 如今，机器执行的每一项活动都会被捕获并存储，以改进机器性能、优化维护成本、防止生产过程中的故障等等。物联网（IoT）应用和系统产生了大量数据，例如工业生产系统、道路车辆的远程信息处理数据等等。


    -   **数据交易（有意、无意）：** 从源系统为某一目的收集的数据不应被用于其他目的，无论是有意还是无意。当我们为其他用例重新利用数据时，数据交易问题就出现了。这个问题已由
    GDPR 法规处理，不同的公司和不同的机构也执行类似的法律，目的就是为了确保不发生数据交易。如果我们使用交易来的数据创建 AI 系统，那么整个系统就变得不道德。


    -   **监控（定向、非定向）：** AI 伦理也适用于对所有人群的全面监控，无论其是定向还是非定向，也无论出于何种目的。关于何时以及如何实施监控系统的伦理辩论一直在进行。是的，没有额外安全保障的生物识别认证系统是一个令人担忧的问题，这就是为什么世界各地持续开展呼吁停止人脸识别系统的运动。


    -   **操纵干预理性选择：** 从伦理角度来看，AI 应该是理性的。必须有一个合法的流程，并且 AI 系统应该是透明的。


    -   **诚实：** 这是定义组织透明度的核心。从伦理角度来看，组织遵守可解释性并为核心 AI 产品和应用提供技术透明度至关重要。这适用于训练数据的来源、算法的选择、系统究竟是如何训练的、预测是如何生成的等等。


    ## AI 中的偏见


    许多 AI 系统使用机器学习（ML）和深度学习（DL）模型（具体而言）以及预测模型（一般而言）。AI 中的偏见意味着预测中的偏见。为什么会产生预测偏见？如何控制有偏见的预测是当今讨论的话题。AI
    系统进行算法决策的伦理后果是一个巨大的担忧。AI 主导决策中出现的偏见严重影响了 AI 的采用。为了构建一个无偏见的系统，需要具备强烈的正义感，以帮助决策者公正行事，不带任何偏见和偏袒。


    ## 数据偏见


    偏见可以分为数据偏见和算法偏见。当我们从单一角度考虑有限的样本来标记数据，并增加主要群体的存在时，就会出现数据偏见。这会导致数据集有偏见。通过与自然数据收集源建立联系，可以改进这一过程。如图
    2-2 所示。让我们通过一个例子来理解数据偏见。如果我们观察一家电子商务公司过去 15 年的收入或利润趋势，肯定存在一个上升趋势，并且每 5 年会出现一个趋势转折点。趋势转折是由于产品单价上涨造成的。如果我们想构建一个机器学习模型来预测未来两年的收入，我们不能包含过去
    15 年的所有数据。如果我们选择随机数据点来训练 ML 模型，就会产生数据偏见，而这种数据偏见可能导致错误的预测。

    '
- fmt: '# Algorithmic Bias


    Algorithmic bias to some extent is due to data bias, as data bias cannot be completely
    eradicated by the training process. Hence a wrong model gets trained and this
    leads to a biased prediction. In order to reduce biasness in the training process
    and data bias, a proper explanation of the predictions needs to be generated (Figure
    [2-2](#506619_1_En_2_Chapter.xhtml#Fig2)). At global level as well as at local
    level, the predicted model results need to be explainable to all stakeholders.
    Thus there is a constant need for an XAI framework. The explainable AI platform
    and framework can provide the necessary tools and structure to elaborate the biasness
    in the algorithm and data, and help educate the decision maker about the existence
    of biasness.


    Artificial intelligence systems display intelligent behavior that can provide
    significant efficiency in production systems and help create smart applications
    with smart decision making capability. AI is generally difficult to understand
    for business stakeholders and users. If the application layer of any software
    uses an AI model, it becomes difficult to explain the decisions made by the AI
    system to regulatory authorities, governing law enforcement agencies, and others.
    The data biasness leads to biasness in the AI decision systems and can land the
    organization in a loss-of-reputation scenario. Sometimes the AI systems produce
    results which are not convenient or conducive for the organization. Also, the
    predictions are outside the control of the organization. In a typical software
    development scenario, we know under what circumstances the software will work
    and when it won’t work. However, in an AI-driven decisioning system, we are not
    sure about the conditions under which the AI will not work. It is very hard to
    predict.


    # Bias Mitigation Process


    To reduce biasness and improve ethical standards, governance plays an important
    role. AI governance implies adherence to a set of rules, guidelines, standards,
    practices, and processes through which AI-based decision systems can be controlled
    and governed. The data bias can be reduced by setting governance standards such
    as data evaluation, rigorous testing of the application, and so on.


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig2_HTML.png](images/506619_1_En_2_Chapter/506619_1_En_2_Fig2_HTML.png)


    Figure 2-2


    Biasness in an AI-based decision making system


    # Interpretation Bias


    If the predictions are not generated as per the expected line of thought, then
    some practitioners use the same metric and math to change the narrative of the
    model outcome. This is more confusing for the end user or the business user. The
    interpretation bias is known as bias in usage of predictive models. Suppose we
    train a ML model using population A and get the required result, but we apply
    the model on population B, which is in a sense called as transfer learning in
    machine learning, in order to avoid further training. This is a classic example
    of interpretation bias. This is because the predictions can be biased because
    it is trained on a different population, which may have different features or
    characteristics. Biasness in the algorithmic training process arises due to a
    constant need for improving the model accuracy. We typically go for smoothing
    and feature transformation methods such as logarithmic transformation and square
    transformation. Sometimes to restrict overfitting in the training and testing
    phase we also go for regularization. This regularization process of trimming the
    model coefficients and associated steps is also known as algorithmic bias in the
    model training step.


    # Training Bias


    Training bias in an AI system happens if we either choose an incorrect set of
    hyper parameters, the wrong selection of model types, or overtrain the model in
    the pursuit of achieving higher accuracy for the task. In the development of a
    machine learning model, hyper parameter tuning and cross validation play major
    roles in the stability of the model. To make an assessment of whether an algorithm
    is free from biasness or not, we need to look at data collected for the purpose,
    the model training process, and the assumptions of the modelling process. Let’s
    take an example of willingness to pay for a specific service OTT platform based
    on people’s demographic features and past spend patterns. Can any AI system predict
    the willingness of people to pay for subscribing to an OTT platform and how much
    they can pay for a month-long subscription? Is there any biasness in the prediction
    process or model training process?


    Table 2-1


    Difference Between Procedural and Relational Approaches for Bias Measurement


    | Procedural | Relational |

    | --- | --- |

    | This is algorithm specific | This is data specific |

    | Focuses more on techniques | Compares different data sets |

    | Types of tasks are known | Tasks are unknown |


    There are two different approaches for measuring the biasness: the procedural
    approach and the relational approach. See Table [2-1](#506619_1_En_2_Chapter.xhtml#Tab1).
    If we collect data globally with similar proportions from different groups and
    different countries and different age, gender, and race in proportional manner,
    then we can say there is no bias in the collected data for the purpose of prediction.
    The relational approach helps in finding this bias in the dataset. The procedural
    approach focuses on the algorithmic training process in making predictions. We
    may have to train different models in different age group categories as the attributes
    and relations may not be similar in different age groups.


    Table 2-2


    Bias Metrics


    | Statistical measures | Homogeneity metrics | Causal reasoning metrics |

    | --- | --- | --- |

    | Metric driven | Look like a metric from a feature set | This is similar to if/else
    conditions |

    | Sometimes not meaningful | Meaningful to everyone | Extremely useful |

    | Validation not possible | Validation possible | Validation possible |


    The three most commonly used bias metrics are statistical measures, homogeneity-based
    measures, and causal reasoning-based metrics (Figures [2-2](#506619_1_En_2_Chapter.xhtml#Fig2)
    and [2-3](#506619_1_En_2_Chapter.xhtml#Fig3)). Statistical metrics focus on similar
    predictions for different groups based on their demographic characteristics. If
    the predicted outcome differs from one group to another and there is a difference
    in the accuracy for different groups from a similar model, then we can measure
    this bias in statistical terms. Statistical measures are quite popular. However,
    they’re not sufficient for a certain group of algorithms.


    As an alternative process, we can take a look at the similarity measures. If two
    customers are exactly similar from a features point of view, their predicted result
    should be similar. If it deviates, then there is bias in the algorithm for a specific
    customer against the other customer. Here the customer refers to one record from
    the training data set if we are talking about churn classification, credit scoring,
    or a loan application type of use case. For this method to be successful, there
    is a need for similarity metrics to estimate how similar two records are in a
    training dataset. If they are exactly copied, we can call it perfectly similar.
    However, if one minor or major feature is different, than what is the similarity
    percentage? As we extend this to n-features, how this is going to be useful? This
    method of identifying bias is also not free from limitations. Here the success
    of the method lies in the similarity measure. The more robust the similarity metric,
    the better the result.'
