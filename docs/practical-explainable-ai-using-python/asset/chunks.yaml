  trans: '

    # 算法偏见


    算法偏见在一定程度上源于数据偏见，因为数据偏见无法通过训练过程完全消除。因此，错误的模型被训练出来，导致预测结果存在偏见。为了减少训练过程中的偏见和数据偏见，需要对预测结果进行合理解释（图
    2-2）。无论是在全局层面还是局部层面，预测模型的结果都需要对所有利益相关者具有可解释性。因此，对 XAI 框架的需求持续存在。可解释的人工智能平台和框架能够提供必要的工具和结构，来阐明算法和数据中的偏见，并帮助决策者认识到偏见的存在。


    人工智能系统展现出智能行为，能够显著提升生产系统的效率，并帮助创建具有智能决策能力的智能应用。对于业务利益相关者和用户来说，AI 通常难以理解。如果任何软件的应用程序层使用了
    AI 模型，那么向监管机构、执法机构等解释 AI 系统做出的决策就会变得困难。数据偏见会导致 AI 决策系统产生偏见，并可能使组织陷入声誉受损的境地。有时，AI
    系统会产生对组织不利或不适宜的结果。此外，预测结果也超出了组织的控制范围。在典型的软件开发场景中，我们知道软件在何种情况下会正常工作，在何种情况下不会。然而，在
    AI 驱动的决策系统中，我们无法确定 AI 在何种条件下会失效。这非常难以预测。


    # 偏见缓解流程


    为了减少偏见并提高道德标准，治理发挥着重要作用。AI 治理意味着遵守一套规则、指南、标准、实践和流程，通过这些规则和流程，基于 AI 的决策系统可以得到控制和治理。通过设定治理标准，例如数据评估、应用程序的严格测试等，可以减少数据偏见。


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig2_HTML.png](img/506619_1_En_2_Fig2_HTML.png)


    图 2-2


    基于 AI 的决策系统中的偏见


    # 解释偏见


    如果预测结果没有按照预期的思路生成，那么一些从业者会使用相同的指标和数学方法来改变模型结果的叙述方式。这对最终用户或业务用户来说更加令人困惑。解释偏见被称为预测模型使用中的偏见。假设我们使用群体
    A 训练了一个机器学习模型并得到了所需结果，但我们将该模型应用于群体 B，这在机器学习中被称为迁移学习，目的是避免进一步训练。这是一个典型的解释偏见例子。这是因为预测结果可能存在偏见，因为模型是在一个不同的群体上训练的，而该群体可能具有不同的特征或特性。算法训练过程中的偏见是由于持续提高模型准确性的需求而产生的。我们通常会采用平滑和特征变换方法，例如对数变换和平方变换。有时，为了限制训练和测试阶段的过拟合，我们还会采用正则化。这种修剪模型系数及相关步骤的正则化过程，也被称为模型训练步骤中的算法偏见。


    # 训练偏见


    AI 系统中的训练偏见发生在以下情况：我们选择了不正确的超参数集、错误地选择了模型类型，或者为了追求任务更高的准确性而对模型进行了过度训练。在机器学习模型的开发中，超参数调优和交叉验证对模型的稳定性起着重要作用。为了评估一个算法是否存在偏见，我们需要审视为此目的收集的数据、模型训练过程以及建模过程的假设。让我们举一个例子：基于人们的人口统计特征和过去的消费模式，预测他们对特定
    OTT 平台服务的支付意愿。任何 AI 系统能否预测人们订阅 OTT 平台的意愿以及他们愿意为月度订阅支付多少费用？在预测过程或模型训练过程中是否存在偏见？


    表 2-1


    程序性方法与关系性方法在偏见测量上的区别


    | 程序性方法 | 关系性方法 |

    | --- | --- |

    | 这是算法特定的 | 这是数据特定的 |

    | 更侧重于技术 | 比较不同的数据集 |

    | 任务类型已知 | 任务未知 |


    有两种不同的测量偏见的方法：程序性方法和关系性方法。参见表 2-1。如果我们以全球范围收集数据，并以比例方式从不同群体、不同国家以及不同年龄、性别和种族中获取相似比例的数据，那么我们可以说，为预测目的收集的数据中不存在偏见。关系性方法有助于发现数据集中的这种偏见。程序性方法则侧重于进行预测时的算法训练过程。由于不同年龄组的属性和关系可能不同，我们可能需要在不同年龄组类别中训练不同的模型。


    表 2-2


    偏见指标


    | 统计度量 | 同质性度量 | 因果推理度量 |

    | --- | --- | --- |

    | 指标驱动 | 看起来像来自特征集的指标 | 类似于 if/else 条件 |

    | 有时无意义 | 对所有人都有意义 | 极其有用 |

    | 无法验证 | 可以验证 | 可以验证 |


    三种最常用的偏见指标是统计度量、基于同质性的度量和基于因果推理的度量（图 2-2 和 2-3）。统计度量侧重于基于人口统计特征对不同群体做出相似的预测。如果预测结果因群体而异，并且来自同一模型的不同群体在准确性上存在差异，那么我们可以用统计术语来衡量这种偏见。统计度量非常流行。然而，对于某些特定类型的算法，它们并不足够。


    作为一种替代方法，我们可以考察相似性度量。如果两个客户从特征角度来看完全相似，那么他们的预测结果也应该是相似的。如果结果出现偏差，则说明算法对特定客户存在偏见，而相对于另一个客户则没有。这里的客户指的是训练数据集中的一条记录，例如在讨论客户流失分类、信用评分或贷款申请这类用例时。要使这种方法成功，需要相似性度量来估计训练数据集中两条记录的相似程度。如果它们完全相同，我们可以称之为完全相似。然而，如果有一个次要或主要特征不同，那么相似度百分比是多少？当我们将其扩展到
    n 个特征时，这又将如何发挥作用？这种识别偏见的方法也并非没有局限性。在这里，方法的成功取决于相似性度量。相似性度量越稳健，结果就越好。

