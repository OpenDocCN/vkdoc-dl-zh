  raw: '## Non-Linear Models


    A decision tree is a non-linear model which maps the independent variable to the
    dependent variable. At a local level this may be considered as a piece-wise linear
    regression, but at a global level this is a non-linear model, as there is no one-to-one
    mapping between the dependent and independent variables. Unlike a linear regression
    model, there is no mathematical equation to show the relationship between the
    input and output variables. If we keep the maximum tree depth parameter to an
    infinite level, then the decision tree might fit the data perfectly, which is
    a classic scenario of model overfit. Whether the training dataset is linearly
    separable or not, decision trees are prone to overfitting. This needs to be addressed.
    People usually go for tree pruning in order to get a best fit decision tree model.
    One can view the decision tree as a series of conditional statements that results
    in a value or a class in the output column. As an example, if a person is 45 years
    old and works in the private sector and has a PhD degree, then they are definitely
    earning more than $50K a year. Decision trees are a supervised learning algorithm
    that is applicable when there are infinite possible combinations of features that
    could impact the target column. In a decision tree, we split the population into
    two or more subpopulations based on the most significant splitter or differentiator
    in input variables.


    Primarily the decision tree algorithm follows the ID3 (iterative dichotomiser
    3) algorithm, although there are other algorithms such as C4.5, CART, MARS, and
    CHAID. It is based on the following things:


    *   Identification of the best attribute or feature based on information gain
    (having a high predictive value) from the dataset and placing that at the root
    of the tree


    *   Splitting the training dataset into subsets in such a way that each subset
    has the same value for an attribute


    *   Repeating the above two steps until all of the classes are separated into
    one node, or a minimum number of samples required in the node are satisfied


    In decision tree models, to predict a class label for a record, we start from
    the root of the tree. We compare the root attributes and use the best attribute
    at the beginning and subsequently keep on developing the decision tree. When we
    look at model explainability, the ability of a decision tree to explain the predictions
    is quite good. In simpler terms, a decision tree provides rules that can be directly
    consumed by any application. The rules are mostly a bunch of if/else statements.
    In situations where there is a relationship between features, such as an interaction
    between features, square or cubic values of features are related to the dependent
    variable, etc. In such situations, the linear regression and the logistic regression
    are bound to fail. This is because the number of feature interactions could be
    many. The tree-based models take into account the feature values, decide a threshold
    value, and break the feature into two parts and keep growing the branches of the
    tree. The process of splitting the data into multiple subgroups helps in capturing
    the nonlinearity existing in the dataset. In a similar fashion, the square and
    cubic features also follow the if/else rules as outlined by the model.


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig1_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Decision tree regression captures non-linearity


    As shown in Figure [4-1](#506619_1_En_4_Chapter.xhtml#Fig1) (source: [`https://scikit-learn.org/`](https://scikit-learn.org/)),
    the relationship between the data and target is nonlinear. The non-linearity is
    approximated by a decision tree model by increasing the maximum depth parameter.
    As the maximum depth parameter increases from 2 to 5, all the points off the curve
    also become part of the model, hence they appear in the rule set generated by
    the decision tree model.


    ## Decision Tree Explanation


    Figure [4-2](#506619_1_En_4_Chapter.xhtml#Fig2) depicts the start of the tree.
    It happens using a root feature. The branching logic is based on the best possible
    feature that creates a split.


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig2_HTML.png](images/506619_1_En_4_Chapter/506619_1_En_4_Fig2_HTML.png)


    Figure 4-2


    The anatomy of a decision tree


    The terminal nodes are the ending nodes where the tree construction stops. To
    predict the outcome of a particular record, the average outcome of the overall
    data is used.


    As shown in Figure [4-3](#506619_1_En_4_Chapter.xhtml#Fig3), the model explainability
    can be achieved in two ways: the XAI library and the base ML library.


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig3_HTML.png](images/506619_1_En_4_Chapter/506619_1_En_4_Fig3_HTML.png)


    Figure 4-3


    Two ways to explain tree-based models


    The difference is that if we are using the parent ML library, we can use the already
    trained model. Otherwise, we may have to train the ML model again if we are using
    the XAI library. Now coming back to explaining the model results or outcome, if
    we retrain the model, it is an overhead as model retraining. Hyperparameter tuning
    and best model selection are different processes and take a lot of time.


    However, if we have a readily available model and we can just generate the model
    explanations, it’s beneficial for the end user. The following code shows the necessary
    libraries required for creating the decision tree model. You are going to use
    the telecom churn data you used in Chapter [3](#506619_1_En_3_Chapter.xhtml).
    This dataset has 20 features and 3,333 records in the dataset. For certain categorical
    variables such as area code you need to transform the variable and perform label
    encoder.'
  trans: '

    # 非线性模型


    决策树是一种将自变量映射到因变量的非线性模型。在局部层面，它可以被视为分段线性回归，但在全局层面，它是一个非线性模型，因为因变量和自变量之间不存在一对一的映射关系。与线性回归模型不同，没有数学方程来展示输入和输出变量之间的关系。如果我们将最大树深度参数设置为无限，那么决策树可能会完美拟合数据，这是模型过拟合的经典场景。无论训练数据集是否线性可分，决策树都容易过拟合。这个问题需要解决。人们通常会对树进行剪枝，以获得最佳拟合的决策树模型。我们可以将决策树视为一系列条件语句，这些语句在输出列中产生一个值或一个类别。例如，如果一个人
    45 岁，在私营部门工作，拥有博士学位，那么他们每年的收入肯定超过 5 万美元。决策树是一种监督学习算法，适用于存在无限多种可能影响目标列的特征组合的情况。在决策树中，我们根据输入变量中最显著的分割点或区分因素，将总体分成两个或更多子总体。


    决策树算法主要遵循`ID3`（迭代二分器 3）算法，尽管还有其他算法，如`C4.5`、`CART`、`MARS`和`CHAID`。它基于以下几点：


    -   根据数据集的信息增益（具有高预测价值）识别最佳属性或特征，并将其置于树的根节点

    -   将训练数据集分割成子集，使得每个子集对于某个属性具有相同的值

    -   重复上述两个步骤，直到所有类别都被分离到一个节点中，或者满足节点所需的最小样本数


    在决策树模型中，为了预测一条记录的类别标签，我们从树的根节点开始。我们比较根属性，在开始时使用最佳属性，然后继续构建决策树。当我们考虑模型可解释性时，决策树解释预测的能力相当不错。简单来说，决策树提供了任何应用程序都可以直接使用的规则。这些规则大多是一堆`if/else`语句。在特征之间存在关系的情况下，例如特征之间的交互作用、特征的平方或立方值与因变量相关等。在这种情况下，线性回归和逻辑回归必然会失败。这是因为特征交互的数量可能很多。基于树的模型会考虑特征值，决定一个阈值，将特征分成两部分，并不断生长树的分支。将数据分割成多个子组的过程有助于捕捉数据集中存在的非线性。类似地，平方和立方特征也遵循模型概述的`if/else`规则。


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig1_HTML.jpg](img/506619_1_En_4_Fig1_HTML.jpg)


    图 4-1


    决策树回归捕捉非线性


    如图 4-1（来源：[`https://scikit-learn.org/`](https://scikit-learn.org/)）所示，数据与目标之间的关系是非线性的。决策树模型通过增加最大深度参数来逼近这种非线性。随着最大深度参数从
    2 增加到 5，曲线之外的所有点也成为了模型的一部分，因此它们出现在决策树模型生成的规则集中。


    ## 决策树解释


    图 4-2 描绘了树的起始点。它从一个根特征开始。分支逻辑基于能够创建分割的最佳可能特征。


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig2_HTML.png](img/506619_1_En_4_Fig2_HTML.png)


    图 4-2


    决策树的剖析


    终端节点是树构建停止的结束节点。为了预测特定记录的结果，使用整体数据的平均结果。


    如图 4-3 所示，模型可解释性可以通过两种方式实现：`XAI`库和基础`ML`库。


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig3_HTML.png](img/506619_1_En_4_Fig3_HTML.png)


    图 4-3


    解释基于树的模型的两种方法


    区别在于，如果我们使用父级`ML`库，我们可以使用已经训练好的模型。否则，如果我们使用`XAI`库，我们可能必须重新训练`ML`模型。现在回到解释模型结果或输出，如果我们重新训练模型，这将是模型重新训练的开销。超参数调优和最佳模型选择是不同的过程，并且需要大量时间。


    然而，如果我们有一个现成的模型，并且可以直接生成模型解释，这对最终用户是有益的。以下代码展示了创建决策树模型所需的必要库。你将使用你在第 3 章中使用的电信客户流失数据。该数据集包含
    20 个特征和 3333 条记录。对于某些分类变量，例如区号，你需要转换该变量并执行标签编码。

    '
- fmt: '# Data Preparation for the Decision Tree Model


    The following script shows the necessary libraries for preparing a decision tree
    model. You’re also importing the required data to develop the model as a CSV format.


    ```

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    %matplotlib inline

    import numpy as np, pandas as pd, matplotlib.pyplot as plt

    from sklearn import tree, metrics, model_selection, preprocessing

    from IPython.display import Image, display

    from sklearn.metrics import confusion_matrix, classification_report

    df_train = pd.read_csv(''ChurnData.csv'')

    del df_train[''Unnamed: 0'']

    df_train.shape

    df_train.head()

    ```


    The additional column present in the data is deleted. The `shape` function provides
    an idea about the number of rows and columns present in the dataset. Also, the
    `head` function provides the first five records from the data frame.


    ```

    from sklearn.preprocessing import LabelEncoder

    tras = LabelEncoder()

    df_train[''area_code_tr''] = tras.fit_transform(df_train[''area_code''])

    df_train.columns

    del df_train[''area_code'']

    df_train.columns

    ```


    There are some string columns present in the data, such as `area_code`. This data
    needs to be converted to numbers by using a label encoder. This is required for
    model training, as you cannot use the string variables as they are.


    ```

    df_train[''target_churn_dum''] = pd.get_dummies(df_train.churn,prefix=''churn'',drop_first=True)

    df_train.columns

    del df_train[''international_plan'']

    del df_train[''voice_mail_plan'']

    del df_train[''churn'']

    df_train.info()

    df_train.columns

    ```


    As a next step, you are going to split the dataset into train and test datasets.
    The train set is to develop a model and the test set is to generate inferences
    or predictions.


    ```

    from sklearn.model_selection import train_test_split

    df_train.columns

    X = df_train[[''account_length'', ''number_vmail_messages'', ''total_day_minutes'',

    ''total_day_calls'', ''total_day_charge'', ''total_eve_minutes'',

    ''total_eve_calls'', ''total_eve_charge'', ''total_night_minutes'',

    ''total_night_calls'', ''total_night_charge'', ''total_intl_minutes'',

    ''total_intl_calls'', ''total_intl_charge'',

    ''number_customer_service_calls'', ''area_code_tr'']]

    Y = df_train[''target_churn_dum'']

    xtrain,xtest,ytrain,ytest=train_test_split(X,Y,test_size=0.20,stratify=Y)

    tree.DecisionTreeClassifier() # plain tree model

    # default hyper-parameters for a decision tree classifier

    class_weight=None,

    criterion=''gini'',

    max_depth=None,

    max_features=None,

    max_leaf_nodes=None,

    min_impurity_decrease=0.0,

    min_impurity_split=None,

    min_samples_leaf=1,

    min_samples_split=2,

    min_weight_fraction_leaf=0.0,

    presort=False,

    random_state=None,

    splitter=''best''

    dt1 = tree.DecisionTreeClassifier()

    dt1.fit(xtrain,ytrain)

    print(dt1.score(xtrain,ytrain))

    print(dt1.score(xtest,ytest))

    ```


    **Table 4-1** Hyper Parameter Explanation for Decision Tree


    | Parameters | Explanation |

    | --- | --- |

    | `Class_weight` | Weights associated with classes |

    | `Criterion` | The function to measure the quality of a split, gini, and entropy
    |

    | `max_depth` | The maximum depth of the tree |

    | `max_features` | The number of features to consider when looking for the best
    split |

    | `max_leaf_nodes` | Grow a tree with `max_leaf_nodes` in best-first fashion |

    | `min_samples_leaf` | The minimum number of samples required to be at a leaf
    node |

    | `min_samples_split` | The minimum number of samples required to split an internal
    node |


    There are many other hyper parameters in the decision tree model, but the important
    ones are mentioned in Table [4-1](#506619_1_En_4_Chapter.xhtml#Tab1). Some hyper
    parameters are used to control the overfitting of the model and some hyper parameters
    are used to increase the accuracy of the model.


    ## Creating the Model


    The next step is to create the model and verify the accuracy between the train
    and test accuracy. There are two models, `dt1` and `dt2`: one has a restricted
    maximum depth and the other has no limit to the maximum depth. The difference
    is that `dt1` is an overfitted model and `dt2` is a model where tree pruning happened
    and there is no overfit of the model.


    ```

    dt1 = tree.DecisionTreeClassifier()

    dt1.fit(xtrain,ytrain)

    print(dt1.score(xtrain,ytrain))

    print(dt1.score(xtest,ytest))

    1.0

    0.8590704647676162

    dt2 = tree.DecisionTreeClassifier(max_depth=3)

    dt2.fit(xtrain,ytrain)

    print(dt2.score(xtrain,ytrain))

    print(dt2.score(xtest,ytest))

    0.9021005251312828

    0.8875562218890555

    ```


    The limitation of an unrestricted overfitted model is that it will produce a large
    decision tree and the rules to arrive at a prediction will be many. Thus all the
    rules may not be important because as the tree grows, some redundant rules may
    take part in the tree construction process.


    ```

    !pip install pydotplus

    !pip install graphviz

    import pydotplus

    dot_data = tree.export_graphviz(dt1, out_file=None, filled=True, rounded=True,

    feature_names=list(xtrain.columns),

    class_names=[''yes'',''no''])

    graph = pydotplus.graph_from_dot_data(dot_data)

    display(Image(graph.create_png()))

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig4_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig4_HTML.jpg)


    **Figure 4-4** Decision tree visualization with default model using GraphViz


    The decision tree trained with all the default hyper parameters will produce a
    large tree and will also lead to the generation of multiple rules, which is not
    only difficult to interpret but is also hard to implement in a real-life project
    scenario. The largest possible decision tree as shown in Figure [4-4](#506619_1_En_4_Chapter.xhtml#Fig4)
    is a result of setting the maximum depth of tree parameters to `None`, which means
    you ask the decision tree to keep growing branches.


    ```

    dot_data = tree.export_graphviz(dt2, out_file=None, filled=True, rounded=True,

    feature_names=list(xtrain.columns),

    class_names=[''yes'',''no''])

    graph = pydotplus.graph_from_dot_data(dot_data)

    display(Image(graph.create_png()))

    ```


    ```

    tree.plot_tree(dt1)

    tree.plot_tree(dt2)

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig6_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig6_HTML.jpg)


    **Figure 4-6** Decision tree visualization using the `plot_tree` method


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig5_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig5_HTML.jpg)


    **Figure 4-5** A pruned version of same decision tree model


    The same model shown in Figure [4-4](#506619_1_En_4_Chapter.xhtml#Fig4) is reproduced
    in Figure [4-5](#506619_1_En_4_Chapter.xhtml#Fig5) and [4-6](#506619_1_En_4_Chapter.xhtml#Fig6).
    The latter figure is reproduced with another option using the sklearn Python library’s
    built-in function `plot_tree`. There is no difference; it is just a matter of
    two libraries. If there is an issue with the GraphViz library installation or
    the Pydotplus library installation in a production environment, you can switch
    to the `plot_tree` function.


    The tree from the `dt1` model is so big that it becomes difficult for anyone to
    navigate and interpret the results. After applying the tree pruning method of
    restricting the maximum depth parameter to 3, you can see a much smaller tree
    with only relevant features taking part in the tree construction (Figure [4-7](#506619_1_En_4_Chapter.xhtml#Fig7)).


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig7_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig7_HTML.jpg)


    **Figure 4-7** A pruned version of the decision tree model shown in Figure [4-5](#506619_1_En_4_Chapter.xhtml#Fig5)'
