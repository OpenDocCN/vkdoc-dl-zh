    ## 结论


    文本分类是自然语言处理领域最重要的用例。它可用于消费者投诉分类、将原始文本分类为各种实体，以及将情感分类为正面和负面。我们讨论的是二分类和多分类问题。其他用例包括主题建模和摘要，这些内容也包含在本章中，因为这些任务不属于监督式机器学习模型。你只考虑了监督式机器学习模型，因为当你生成预测类别结果时，解释性通常会丢失。用户自然会思考哪些标记或特征被考虑，以及为什么预测结果是如此这般等等。然而，对于基于无监督学习的
    NLP 任务，有更简单的方法来理解关系，但无监督学习中没有需要向最终用户解释的预测。在本章中，你更多地关注了不同的预处理方法、模型及其可解释性。


    # 8. 使用假设场景实现 AI 模型公平性


    本章解释了如何使用假设工具（WIT）来解释 AI 模型中的偏见，例如基于机器学习的回归模型、分类模型和多分类模型。作为数据科学家，你不仅负责开发机器学习模型，还要确保模型没有偏见，并且新观测值得到公平对待。探究决策并验证算法公平性至关重要。谷歌开发了假设工具（WIT）来解决机器学习模型中的模型公平性问题。你将看到
    WIT 在三种可能的 ML 模型中的实现：用于回归任务的 ML、用于二分类模型的 ML 以及用于多项模型的 ML。


    ## 什么是 WIT？


    假设工具（WIT）是谷歌于 2019 年发布的一款开源工具，用于探究机器学习模型。它旨在理解驱动因素与结果变量之间、数据点变化与结果变量之间的因果关系。这里的驱动因素指的是结果变量的独立预测因子。由于其易用性、吸引人的可视化效果和可解释性，WIT
    工具得到了广泛的接受和采用。只需极少的编码，用户就可以直观地探究任何机器学习模型的学习行为。对训练好的机器学习模型进行各种输入的模拟，对于开发可解释 AI
    和负责任 AI 是必要的。该 WIT 工具有三种格式：来自 Anaconda Navigator 窗口的常规 Jupyter Notebook、Google
    Colab Notebook 以及基于 TensorBoard 的可视化（适用于任何基于深度学习的模型）。当前可用的工具版本是 1.8.0，该版本克服了早期版本的某些限制。流程见图
    8-1。


    ![../images/506619_1_En_8_Chapter/506619_1_En_8_Fig1_HTML.jpg](img/506619_1_En_8_Fig1_HTML.jpg)


    图 8-1


    偏见识别流程图


    训练数据可以根据你的问题，基于某些受保护属性进行划分。例如，假设你有种族和性别两个属性，并且你想从可解释性的角度得到答案，例如：


    *   模型是否对特定种族存在偏见？

    *   模型是否对特定性别（假设为男性和女性）存在偏见？


    我们以第二点为例，将性别作为受保护变量。第一个性别是特权群体，第二个是非特权群体。你可以准备两个训练模型，并使用这两个模型对训练数据进行预测。如果对于任何特定记录，两个模型的预测结果一致，则该记录或数据点是无偏的；如果结果不同，则是有偏的。基于此，你可以判断模型是否对某个性别或种族存在偏见。

