    在选择 ARIMA 模型时，你需要定义模型的阶数。在以下脚本中，你将阶数定义为 `(0,0,1)`，即 `(p,d,q)`，其中 `p` 代表自回归项，`d`
    代表差分阶数，`q` 代表移动平均项。因此，阶数 `0, 0, 和 1` 表示仅包含移动平均模型。


    ```

    # MA example

    from statsmodels.tsa.arima.model import ARIMA

    from random import random

    # fit model

    model = ARIMA(y, order=(0, 0, 1))

    model_fit = model.fit()

    # make prediction

    yhat = model_fit.predict(len(y), len(y))

    print(yhat)

    model_fit.summary()

    ```


    以下脚本展示了阶数为 `2, 0 和 1` 的 ARIMA 模型，即包含 2 个滞后自回归项、0 次差分和 1 个移动平均项：


    ```

    # ARMA example

    from statsmodels.tsa.arima.model import ARIMA

    from random import random

    # fit model

    model = ARIMA(y, order=(2, 0, 1))

    model_fit = model.fit()

    # make prediction

    yhat = model_fit.predict(len(y), len(y))

    print(yhat)

    model_fit.summary()

    ```


    所有模型的结果摘要都可以用与你之前类似的方式进行解读。如果你想在 ARIMA 模型中引入季节性成分，它就变成了 SARIMA 模型。季节性阶数也可以根据表
    6-7 来定义。


    **表 6-7** SARIMA 模型参数说明


    | 参数 | 说明 |

    | --- | --- |

    | `Endog` | 观测到的时间序列过程 `y` |

    | `Order` | 模型的 `(p,d,q)` 阶数，分别对应 AR 参数数量、差分阶数和 MA 参数数量 |

    | `seasonal_order` | 模型季节性成分的 `(p,d,q)` 阶数，分别对应 AR 参数、差分阶数、MA 参数和周期 |

    | `Trend` | 控制确定性趋势多项式 `A(t)` 的参数。 |

    | `enforce_stationarity` | 是否转换 AR 参数以强制模型的自回归分量满足平稳性。默认值为 `True`。 |


    **表 6-6** SARIMAX 模型结果


    | ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figf_HTML.jpg](img/506619_1_En_6_Figf_HTML.jpg)
    |


    ```

    # ARMA example

    from statsmodels.tsa.arima.model import ARIMA

    from random import random

    # fit model

    model = ARIMA(y, order=(2, 1, 1))

    model_fit = model.fit()

    # make prediction

    yhat = model_fit.predict(len(y), len(y))

    print(yhat)

    model_fit.summary()

    # SARIMA example

    from statsmodels.tsa.statespace.sarimax import SARIMAX

    from random import random

    # fit model

    model = SARIMAX(y, order=(1, 1, 1), seasonal_order=(0, 0, 0, 0))

    model_fit = model.fit(disp=False)

    # make prediction

    yhat = model_fit.predict(len(y), len(y))

    print(yhat)

    model_fit.summary()

    ```


    **表 6-8** SARIMA 模型结果


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figg_HTML.jpg](img/506619_1_En_6_Figg_HTML.jpg)


    表 6-8 中系数的 p 值均小于 0.05，因此在 5% 的显著性水平下具有统计显著性。上述模型输出的摘要主要使用 OLS 作为度量技术，而 OLS 方法与多元线性回归模型非常相似。因此，可以轻松地对模型系数、其相关性及含义进行解读。


    ## 时间序列：LIME


    使用 LIME 可解释性库，你可以将 12 个滞后变量作为特征，训练一个回归模型并解释预测结果，如下所示。第一步，如果你尚未安装 LIME 库，需要先进行安装：


    ```

    !pip install Lime

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(X),

    mode=''regression'',

    feature_names=X.columns,

    class_names=[''t''],

    verbose=True)

    explainer.feature_frequencies

    # asking for explanation for LIME model

    i = 60

    exp = explainer.explain_instance(np.array(X)[i],

    new_model.predict,

    num_features=12

    )

    exp.show_in_notebook(show_table=True)

    ```


    在上述脚本中，你将时间序列模型视为一个监督学习模型，并使用 12 个滞后变量作为特征。从 LIME 库中，你使用了 LIME 表格解释器。图 6-9 展示了第
    60 条记录的解释。


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig9_HTML.jpg](img/506619_1_En_6_Fig9_HTML.jpg)


    **图 6-9** 第 60 条记录的 LIME 解释


    预测值为 35.77，下限阈值和上限阈值反映了预测结果的置信区间。对预测结果产生正面和负面影响的因子如图 6-9 所示。滞后 1 是一个非常重要的特征；第二重要的特征是滞后
    2，然后是滞后 5、滞后 3、滞后 6，依此类推。作为特征的滞后值及其对预测值的贡献如图 6-10 所示。


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig10_HTML.jpg](img/506619_1_En_6_Fig10_HTML.jpg)


    **图 6-10** 模型的特征重要性


    ```

    # Code for SP-LIME

    import warnings

    from lime import submodular_pick

    # Remember to convert the dataframe to matrix values

    # SP-LIME returns exaplanations on a sample set to provide a non redundant global
    decision boundary of original model

    sp_obj = submodular_pick.SubmodularPick(explainer, np.array(X),

    new_model.predict,

    num_features=12,

    num_exps_desired=10)

    import matplotlib.pyplot as plt

    plt.savefig(''[exp.as_pyplot_figure() for exp in sp_obj.sp_explanations ].png'',
    dpi=300)

    images = [exp.as_pyplot_figure() for exp in sp_obj.sp_explanations ]

    exp.predicted_value

    ```


    用于解释模型的子模选择通过数据中的一组实例提供了对模型的全局理解。在上述脚本中，你考虑了所有 12 个基于滞后的特征，并选取了 10 个实例供用户检查或展示解释。


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig11_HTML.jpg](img/506619_1_En_6_Fig11_HTML.jpg)


    **图 6-11** 第 0 条记录的局部解释


    在图 6-11 中，滞后 1 在预测输出值时非常重要。绿色条表示提升预测值，红色条表示降低预测值。这是第一条记录的局部解释。类似地，你可以考虑其他样本记录并生成此类解释。


    ## 结论


    在本章中，你学习了如何解读时间序列模型。你将时间序列模型视为一个监督学习模型，并解释了所有特征的特征重要性。你探索了自回归模型、移动平均模型以及自回归积分移动平均模型。通过使用
    LIME 作为可解释性库，你了解了各滞后项在预测目标值中的重要性。此外，你还了解了哪些正向滞后特征和负向滞后特征对预测结果有贡献。'
- fmt: '# 7. Explainability for NLP


    This chapter explains the use of `ELI5` and `SHAP`-explainable AI-based Python
    libraries with natural language processing (NLP) based tasks such as text classification
    models. The prediction decisions made by machine learning models for supervised
    learning tasks are of unstructured data. Text classification is a task where you
    need to consider text sentences or phrases as input and classify them into discrete
    categories. An example is news classification, where the content is used as the
    input and the output is classified into politics, business, sports, technology,
    and so on. A similar use case is spam detection in email classification, where
    the email content is used as the input and classified into spam or not spam. In
    this scenario, it is important to know if an email is classified into spam, then
    why? Which tokens present in the content actually lead to the prediction? This
    is of interest to the end user. When I say NLP tasks here, there any many tasks,
    but I’ll limit it to text classification use cases and similar use cases like
    entity recognition, parts of speech tagging, and sentiment analysis.


    ## Natural Language Processing Tasks


    Today the entire world is connected through the World Wide Web. Unstructured textual
    data is everywhere. It’s in social media, email conversations, chats through various
    applications, HTML-based pages, word documents, customer service center support
    tickets, online survey responses, and more. The following are some use cases associated
    with unstructured data:


    - Document classification, where the input is a text document and the output can
    be a binary class or a multiclass label.

    - Sometimes if the sentiments are labelled, then the sentiments also follow a
    document classification use case. Otherwise, the sentiment classification would
    be a lexicon-based classification.

    - Named entity recognition (NER) models, where the input is a text document and
    the output is a named entity class.

    - Text summarization, where a large text is compressed and represented in a compact
    form.


    In NLP text classification, NER models, next word prediction is common, where
    the input is a sentence or word vectors and the output is a label that needs to
    be classified or predicted. Before the machine learning era, the text classification
    task was fairly manual, where a group of annotators used to read, understand the
    meaning of the text expressed in a document, and attach it to one class. With
    the massive explosion of unstructured data, this manual way of classifying the
    data became very difficult. Now some annotated data can be fed into a machine
    and a learning algorithm can be trained so that in the future the trained model
    can be used to make predictions.


    ## Explainability for Text Classification


    The unstructured documents or input text vectors are highly dimensional. The predictive
    models used to classify the documents need to be explained because the reasons
    behind a prediction or the features behind the predicted class need to be shown
    to the end user. In case of text classification, the model predicts class 1 against
    class 2, so it is important to know the keywords that are actually positive for
    class 1 vs. negative for class 1. In a multi-class classification, this becomes
    more complex since you need to explain all the keywords that lead to a prediction
    of a particular class. In this chapter, you will look at both scenarios.


    Figure [7-1](#506619_1_En_7_Chapter.xhtml#Fig1) shows the steps that are required
    to engage the XAI into text classification models.


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig1_HTML.png](images/506619_1_En_7_Chapter/506619_1_En_7_Fig1_HTML.png)


    Figure 7-1


    Steps in a text explanation where an AI model is involved


    The input texts are represented in the form of a vector and the document term
    matrix is used to develop the classification model and finally the predicted class
    needs to be explained using the explainability library just to know the features
    or words that are responsible for predicting the specific class label.


    ## Dataset for Text Classification


    In this chapter you are going to use the Large Movie Review Dataset from [`http://ai.stanford.edu/~amaas/data/sentiment/`](http://ai.stanford.edu/%257Eamaas/data/sentiment/).
    This dataset has 50,000 reviews, and 25,000 are already labelled with a binary
    classification tag, such as a positive or negative review. It has another 25,000
    reviews for testing purposes. You are going to use this dataset to create a text
    classification model to predict movie reviews. Post prediction you are going to
    analyze the reasons for the predictions and further explain the importance of
    features and other explainability elements from this text classification machine
    learning model. In this task, you provide the review sentences to the machine
    learning model and the model predicts the emotion as positive or negative. Hence
    the ML model is considered here as a black box model. It subsequently raises the
    question, how can someone trust results from a black box model?


    ```

    import warnings

    warnings.filterwarnings("ignore")

    import pandas as pd

    from keras.datasets import imdb

    imdb = pd.read_csv(''IMDB Dataset.csv'')

    imdb.head()

    ```


    The IMDB movie dataset contains reviews and sentiments. The sentiments are labelled
    as positive and negative, which is a binary class label system. The review gets
    cleaned up, stop words are removed, and the text is converted into vectors. The
    following script shows the splitting of the dataset into train and test datasets
    using the `sklearn` library’s function `train_test_split`:


    ```

    from sklearn.model_selection import train_test_split

    from sklearn.feature_extraction.text import CountVectorizer

    from sklearn.linear_model import LogisticRegressionCV

    from sklearn.pipeline import make_pipeline

    vec = CountVectorizer()

    clf = LogisticRegressionCV()

    clf.fit(vec,imdb.sentiment)

    ```


    To distribute the data into train and test sets, you use the `train_test_split`
    function from the `sklearn` library. The count vectorizer converts the tokens
    and represents the tokens as vectors, which is a document term matrix representation
    from the corpus. The count vector is initialized and stored in `vec` and then
    the logistic regression model with cross validation is initialized to develop
    a training model. The initialized object is stored in `clf`. The last step is
    to train the model using the `fit` method.


    A pipeline is a method where all of the preprocessing steps, model training steps,
    and validation steps can be sequenced and triggered once. In this pipeline, you
    convert the textual data from words to the count vector and then pass through
    a classifier. The textual sentences are first converted into a structured data
    table. This happens using the count of the words present in each sentence. In
    the above example, the reviews are considered as documents. Each document is parsed
    into words. A unique list of words is collected from all of the reviews and then
    each word is considered as a feature. If you take the count of each word in various
    reviews, it is called count vectorizer. Since this is a movie review sentiment
    analysis dataset, it is classified into a positive class and a negative class,
    which leads towards a binary classification problem. The pipeline stores the sequence
    of transformations and training steps and gets executed by calling the `fit` method
    from the `sklearn` library.


    ```

    from sklearn import metrics

    def print_report(pipe):

    y_test = imdb.sentiment

    y_pred = pipe.predict(imdb.review)

    report = metrics.classification_report(y_test, y_pred)

    print(report)

    print("accuracy: {:0.3f}".format(metrics.accuracy_score(y_test, y_pred)))

    print_report(pipe)

    ```


    In the above piece of script, you predict the sentiments on the test dataset and
    compute the error metric for the classification accuracy. In this example, the
    classification accuracy is 95%, which is a very good accuracy.'
