    new library.


    # 13. Model Explainability for Rule-Based Expert Systems


    Rule-based systems are relatively easier to explain to end users because rules
    can be expressed as if/else conditions. Indeed, at times there are multiple if/else
    conditions. Expert systems are deterministic in nature and very accurate, because
    they are driven by well-established rules and conditions. The need for explainability
    arises when multiple rules either conflict or are combined in such a way that
    it is difficult to interpret. In the field of artificial intelligence, an expert
    system is a program designed to simulate a real decision making process. Expert
    systems are designed to solve complex problems by simple reasoning and are represented
    as if/else/then conditions. Expert systems are designed to act like an inference
    engine. The role of an inference engine is to make decisions. Sometimes expert
    systems are simple, like a decision tree, and sometimes expert systems are very
    complex. Complex expert systems require a knowledge base. Sometimes these knowledge
    bases are an ontology, which is a form of a body of knowledge, through which a
    particular rule can be framed and inferencing can be done.'
