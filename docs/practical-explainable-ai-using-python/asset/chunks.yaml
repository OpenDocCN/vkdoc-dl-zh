    Table 5-6


    Amazon Dataset Data Description


    | Feature name | Description |

    | --- | --- |

    | `ACTION` | ACTION is 1 if the resource was approved, 0 if the resource was not
    |

    | `RESOURCE` | An ID for each resource |

    | `MGR_ID` | The EMPLOYEE ID of the manager of the current EMPLOYEE ID record;
    an employee may have only one manager at a time |

    | `ROLE_ROLLUP_1` | Company role grouping category id 1 (e.g., US Engineering)
    |

    | `ROLE_ROLLUP_2` | Company role grouping category id 2 (e.g., US Retail) |

    | `ROLE_DEPTNAME` | Company role department description (e.g., Retail) |

    | `ROLE_TITLE` | Company role business title description (e.g., Senior Engineering
    Retail Manager) |

    | `ROLE_FAMILY_DESC` | Company role family extended description (e.g., Retail
    Manager, Software Engineering) |

    | `ROLE_FAMILY` | Company role family description (e.g., Retail Manager) |

    | `ROLE_CODE` | Company role code; this code is unique to each role (e.g., Manager)
    |


    When an employee starts work in a software development department, they need certain
    access and permissions to fulfil their job requirements. There is a manual process
    of granting access to the employee but the employee may encounter roadblocks in
    the process. There is no automated mechanism to grant access to the necessary
    software systems. The objective of this use case is to model historical data to
    determine an employee’s access need. The target column is `ACTION`; it is 1 if
    the resource is approved and 0 if the resource access is denied. The rest of the
    features are used to predict the target feature.


    ```

    train_df, test_df = catboost.datasets.amazon()

    train_df

    set(train_df.ACTION)

    y_train = train_df.ACTION

    X_train = train_df.drop(''ACTION'',axis=1)

    cat_features = list(range(0,X_train.shape[1]))

    from catboost import Pool, CatBoostClassifier, cv

    # Initialize CatBoostClassifier

    model = CatBoostClassifier(iterations=300,

    learning_rate=0.1,

    random_seed=12)

    # Fit model

    model.fit(X_train,y_train,cat_features=cat_features,verbose=False,plot=False)

    ```


    The model training process using the CatBoost classifier has some complexity,
    which means a complex relationship that cannot be approximated by a single function.
    If the features have a linear relationship, you can use a straight line to approximate
    the function. However, if the features are either circular or in a zig-zag pattern,
    then it is called a complex pattern, as there is no function mathematically that
    can approximate a circular or zig-zag pattern. In those scenarios, either you
    need more than one function or data normalization to match to any of the mathematical
    function.


    In the current scenario, the SHAP values are calculated approximately due to the
    complexity of the features dataset.


    ```

    eval_dataset = [X_train.iloc[0:1]]

    eval_dataset

    # Get predicted classes

    preds_class = model.predict(X_train)

    # Get predicted probabilities for each class

    preds_proba = model.predict_proba(X_train)

    # Get predicted RawFormulaVal

    preds_raw = model.predict(X_train,

    prediction_type=''RawFormulaVal'')

    preds_class

    preds_proba

    preds_raw

    ```


    The trained model is stored in the model object. You can take two samples as an
    example to produce the probability for that instance and a raw formula value.
    The sample can be any data point from the training dataset. In the script, let’s
    take first and 91st record as examples.


    ```

    import numpy as np

    np.log(0.9964/(1-0.9964))

    np.exp(5.62)/(1+np.exp(5.62))

    cat_features

    ```


    The first record shows a predicted probability of 99.64% towards class 1\. The
    log odds value is 5.61\. Log odds means log(P/1-P) and here P is the probability
    of class 1\. If you want to get the probability from the raw prediction value,
    you can use the formula exp(raw prediction) / (1+ exp(raw prediction)). For example,
    for the first record, exp(5.61) / (1+ exp(5.61)) = 0.9964\. In a similar fashion
    you can interpret the raw prediction value -3.4734 for the 91st record. The CatBoost
    model provides options to predict different prediction types; see Table [5-7](#506619_1_En_5_Chapter.xhtml#Tab7).


    Table 5-7


    Prediction Type Generated by the CatBoost Model Object


    | prediction_type | Description |

    | --- | --- |

    | **Probability** | Probability value corresponding to each class |

    | **Class** | Class label will be produced |

    | **RawFormula Value** | Log odds value |

    | **Exponent** | Exponential value of prediction probability |

    | **LogProbability** | Logarithmic of the probability |


    Different types of predictions from the CatBoost model give more insights into
    understanding the prediction value and how the model generates the prediction.
    The linkage between all types provides better understanding. You convert the raw
    prediction value to arrive at a probability of class 1.


    ```

    from catboost.datasets import *

    train_df, test_df = catboost.datasets.amazon()

    y = train_df.ACTION

    X = train_df.drop(''ACTION'', axis=1)

    cat_features = list(range(0, X.shape[1]))

    model = CatBoostClassifier(iterations=300, learning_rate=0.1, random_seed=12)

    model.fit(X, y, cat_features=cat_features, verbose=False, plot=False)

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(Pool(X, y, cat_features=cat_features))

    test_objects = [X.iloc[7:9], X.iloc[56:58]]

    for obj in test_objects:

    print(''Probability of class 1 = {:.4f}''.format(model.predict_proba(obj)[0][1]))

    print(''Formula raw prediction = {:.4f}''.format(model.predict(obj, prediction_type=''RawFormulaVal'')[0]))

    print(''\n'')

    shap.force_plot(explainer.expected_value, shap_values[0,:], X.iloc[0,:])

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Figa_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Figa_HTML.jpg)


    ```

    shap.force_plot(explainer.expected_value, shap_values[91,:], X.iloc[91,:])

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig27_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig27_HTML.jpg)


    Figure 5-27


    Force plot for record 1 from training set


    In Figure [5-27](#506619_1_En_5_Chapter.xhtml#Fig27), the force plot shows how
    the raw prediction value is decided based on pull (blue, lower graph) and push
    (red, higher graph) feature values. The values reflected on a scale starting from
    1.124 to 6.124 are the raw prediction values, which is the log odds ratio of the
    prediction probability with respect to class 1\. The average log odds ratio value
    is 3.624\. The pull values lower the predicted odds ratio using features such
    as resource, role title, roll, roll-up 2, etc. The push features (role dept name,
    MGR id, etc.) will increase the predicted odds ratio to the higher level. The
    final value is 5.61, which is the final predicted raw probability value, also
    known as the odds ratio.


    ```

    shap.summary_plot(shap_values, X)

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig28_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig28_HTML.jpg)


    Figure 5-28


    Summary of SHAP values showing impact on model output


    Figure [5-28](#506619_1_En_5_Chapter.xhtml#Fig28) shows the features and their
    importance in impacting the model output. Resource is the most impactful feature,
    then MGR ID, and so on as shown in the figure.'
