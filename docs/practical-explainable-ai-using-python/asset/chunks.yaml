    and the negative attributions are fairly low.


    ## Conclusion


    Image attributions are important to explain the reason for a certain image classification.
    Image attributions can be created using the dominant pixel approach or identifying
    impacted pixels of the image. This can be useful in certain industries. In manufacturing,
    it can be used to identify defective products from product images. In healthcare,
    it can classify kinds of scans and identify anomalies on scans. In all areas it
    is important to explain why the model has classified a class. As long as you are
    able to explain the predictions, you will be in a better position to gain the
    user’s trust on the model and thereby you can increase the adoption of AI models
    in industries to solve complex business problems.'
  raw: '### Integrated Gradients Method


    The objective of the integrated gradients approach is to attribute the feature
    importance score to each of the features used to train the machine learning or
    deep learning model. You use the gradient descent to update the weights of a deep
    neural network model. When you reverse the process, you can take the integration
    of the weights attributing to the feature importance score. Gradients can be defined
    as a slope of the output with respect to the input features in a deep learning
    model. The integrated gradients approach can be used to understand the pixel importance
    in recognizing the correct image in image classification problem. The gradients
    are typically computed for the output of the class where the probability is highest
    with respect to the pixel of the input image.


    ```

    import numpy as np

    import os

    import tensorflow as tf

    from tensorflow.keras.layers import Activation, Conv2D, Dense, Dropout

    from tensorflow.keras.layers import Flatten, Input, Reshape, MaxPooling2D

