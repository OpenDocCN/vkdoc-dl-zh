- fmt: '# Partial Dependency Plot


    A partial dependency plot (PDP) is used to visualize the interaction between the
    feature and target columns or the response column. The target column has two labels:
    0 for no-churn cases and 1 for churn cases. When you use the `predict_proba()`
    function you can generate the probability for class 0 and class 1.


    ```

    pd.DataFrame(dt2.predict_proba(X)) # 0 - No Churn, 1- Churn

    model_churn_proba(X).max()

    model_churn_proba(X).mean()

    model_churn_proba(X).min()

    ```


    In the above script is a function to select column 1, which is the probability
    of churn. As an example, the first record shows a probability of 0.090909, which
    means the chance of churn is less than 10%. You can conclude that it is a no-churn
    sample. In the following script, `model_churn_proba` only shows the second column
    probability of churn.


    Before plotting the probability of churn against the feature of total day minutes,
    which is shown in the PDP plot in Figure [4-10](#506619_1_En_4_Chapter.xhtml#Fig10),
    you should take a look at the distribution of probability of churn using a distribution
    plot. This will help you get an idea about interpreting the partial dependency
    plot. The probability distribution is shown in Figure [4-9](#506619_1_En_4_Chapter.xhtml#Fig9).


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig10_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Total day minutes and the probability of churn PDP


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig9_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Distribution of probability of churn from a decision tree model


    ```

    import seaborn as sns

    sns.distplot(model_churn_proba(X))

    pd.DataFrame(model_churn_proba(X))

    from sklearn.inspection import plot_partial_dependence

    xtrain.columns

    plot_partial_dependence(dt2, X, [''account_length'', ''number_vmail_messages'',
    ''total_day_minutes''])

    plot_partial_dependence(dt2, X, [

    ''total_day_calls'', ''total_day_charge'', ''total_eve_minutes'',

    ])

    plot_partial_dependence(dt2, X, [

    ''total_eve_calls'', ''total_eve_charge'', ''total_night_minutes''])

    ```


    The expected value of total day minutes and total day minutes represented on the
    graph in Figure [4-10](#506619_1_En_4_Chapter.xhtml#Fig10) is piecewise linear,
    but when you look at the entire blue line it is not linear. This is a local interpretation
    for sample number 25. Total day minutes is a numeric and is considered as a continuous
    column in the training dataset. For the same sample observation 25, the number
    of voice mail message also impacts the marginal contribution of this feature to
    the churn prediction. In Figure [4-10](#506619_1_En_4_Chapter.xhtml#Fig10), if
    the user spends up to 225 total day minutes, then the probability of churn is
    going to be less than or equal to the average probability of churn, which is 14.25.
    Even in cases where the total day minutes are greater than 225 minutes, still
    the probability of churn is less than 25%.


    ```

    # make a standard partial dependence plot

    sample_ind = 25

    fig,ax = shap.partial_dependence_plot(

    "number_vmail_messages", model_churn_proba, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False

    )

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig11_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    PDP for number of voice mail messages with probability of churn


    When you look at the relationship between the marginal contribution of account
    length to the churn prediction and account length, you can see a blue parallel
    line (Figure [4-11](#506619_1_En_4_Chapter.xhtml#Fig11)). It indicates that irrespective
    of the account length the marginal contribution stays constant, which indicates
    that this feature has no predictive value, it is not important, and it does not
    play a role in the churn prediction model.


    ```

    # make a standard partial dependence plot

    sample_ind = 25

    fig,ax = shap.partial_dependence_plot(

    "account_length", model_churn_proba, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False

    )

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig12_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    PDP for account length feature


    The PDP for account length has no impact on the probability of churn, which is
    clearly evident from the blue straight line in Figure [4-12](#506619_1_En_4_Chapter.xhtml#Fig12).
    The blue line follows the average probability of the churn value.


    ```

    # make a standard partial dependence plot

    sample_ind = 25

    fig,ax = shap.partial_dependence_plot(

    "number_customer_service_calls", model_churn_proba, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False

    )

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig13_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    PDP for number of customer service calls


    It is important to note that the higher the number of customer service calls,
    the higher the probability of churn. This is because someone is facing issues,
    which is why the number of customer service calls goes up. You can see the same
    pattern in Figure [4-13](#506619_1_En_4_Chapter.xhtml#Fig13): more than four calls
    increases the probability of churn.


    ```

    # make a standard partial dependence plot

    sample_ind = 25

    fig,ax = shap.partial_dependence_plot(

    "total_day_charge", model_churn_proba, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False

    )

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig14_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig14_HTML.jpg)


    Figure 4-14


    PDP for total day charges


    If the total day charges exceeds $45, then the probability of churn will be higher
    (Figure [4-14](#506619_1_En_4_Chapter.xhtml#Fig14)). This is due to higher charges;
    the user would be forced to opt for alternate providers.


    ```

    # make a standard partial dependence plot

    sample_ind = 25

    fig,ax = shap.partial_dependence_plot(

    "total_eve_minutes", model_churn_proba, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False

    )

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig15_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig15_HTML.jpg)


    Figure 4-15


    PDP for total evening minutes


    The total evening minutes shows some impact on the probability of churn, but it
    doesn’t change a user from a no-churn case to a churn case (Figure [4-15](#506619_1_En_4_Chapter.xhtml#Fig15)).
    The probability of churn remains very low and constant for up to 180 total evening
    minutes, which is 13%. The probability of churn increases slightly to 15.5% at
    more than 180 minutes. The probability increases to 16.5% at 250 minutes and after
    250 total evening minutes, which is comparatively very low.


    ```

    # make a standard partial dependence plot

    sample_ind = 25

    fig,ax = shap.partial_dependence_plot(

    "total_eve_calls", model_churn_proba, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False

    )

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig16_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    PDP of total evening calls


    The total evening calls has no impact on the probability of churn, as the probability
    remains unchanged at the average probability value, irrespective of the increase
    in total evening calls (Figure [4-16](#506619_1_En_4_Chapter.xhtml#Fig16)). Table
    [4-3](#506619_1_En_4_Chapter.xhtml#Tab3) shows the feature importance score for
    each feature.


    Table 4-3


    Feature Importance Score for Each Feature'
