    There is another explainability library named `Skope-rules` that can be used to
    generate rules from the training model, and the rules can be used to make predictions
    on any new dataset.


    The following code can be used to install the Python-based library. See Table
    [4-4](#506619_1_En_4_Chapter.xhtml#Tab4) for the parameters.


    **Table 4-4** Explaining the Skope-Rules Parameters


    | Parameters | Explanation |

    | --- | --- |

    | `feature_names` | The name of each feature to be used for returning rules in
    a string format |

    | `precision_min` | The minimal precision of a rule to be selected |

    | `recall_min` | The minimal recall of a rule to be selected |

    | `n_estimators` | The number of base estimators (rules) to use for a prediction
    |

    | `max_depth_duplication` | The maximum depth of the decision tree for rule deduplication
    |

    | `max_depth` | The maximum depth of the decision trees |

    | `max_samples` | The number of samples to draw from X to train each decision
    tree, from which rules are generated and selected |


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig26_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig26_HTML.jpg)


    **Figure 4-26** Feature importance and positive and negative contributions towards
    prediction probabilities of all records


    ```

    !pip install skope-rules

    import six

    import sys

    sys.modules[''sklearn.externals.six''] = six

    import skrules

    from skrules import SkopeRules

    clf = SkopeRules(max_depth_duplication=2,

    n_estimators=30,

    precision_min=0.3,

    recall_min=0.1,

    feature_names=list(xtrain.columns))

    clf

    clf.fit(xtrain,ytrain)

    print(''The 5 most precise rules are the following:'')

    for rule in clf.rules_[:5]:

    print(rule[0])

    ```


    Using the `clf.fit()` method the decision tree model can be trained and the following
    rules can be drawn. The rules can be filtered or curated using `precision` and
    `recall` parameters. The threshold value if reduced to a lower level means a lot
    of rules will be generated, which is of no use to the user as false positive rules
    will enter the business application. A higher threshold will reduce the number
    of rules and only the most relevant rules will be used in the business applications.


    The five most precise rules are the following:


    ```

    number_vmail_messages  249.70000457763672

    number_vmail_messages  44.989999771118164 and total_eve_minutes > 145.39999389648438

    number_customer_service_calls > 3.5 and total_day_minutes  245.0999984741211 and
    total_eve_minutes > 204.20000457763672

    number_customer_service_calls > 3.5 and total_day_charge <= 30.65999984741211

    clf.predict(xtest)

    clf.predict_top_rules(xtest,5)

    clf.score_top_rules(xtest)

    ```


    The `predict` function uses all rules to predict the target churn class: 0 is
    no churn and 1 is churn.


    The `predict_top_rules` function is used to leverage the five rules to predict
    the outcome. Five is the number of rules used for the prediction. If one of the
    `n_rules` most performing rules is activated, the prediction is equal to 1. For
    each observation, the function tells whether or not (1 or 0) it should be considered
    as an outlier according to the selected rules.


    ```

    clf.decision_function(xtrain)

    clf.decision_function(xtest)

    ```


    `Score top rules`, representing an ordering between the base classifiers (rules).
    The score is high when the instance is detected by a performing rule. Positive
    scores represent outliers and null scores represent inliers.


    The `decision_function` is the anomaly score of an input sample and is computed
    as the weighted sum of the binary rules outputs, the weight being the respective
    precision of each rule. For the anomaly score of the input samples, the higher
    it is, the more abnormal it is. Positive scores represent outliers and null scores
    represent inliers.


    ## Conclusion


    In this chapter, you learned how to interpret non-linear models, specifically
    decision tree models, instead of logistic regression for binary classification.
    In a similar fashion, the decision tree model can be used for a regression model
    and can also be extended to multinomial classification. The non-linear models
    are simpler ones to interpret and everyone understands how these models work using
    simple if/then else rules. Therefore there is a high degree of trust in the tree-based
    non-linear models. In this chapter, you looked various angles for creating views
    for non-linear models using the explainable AI libraries such as LIME, SHAP, and
    Skope-rules. In the next chapter, you are going to learn about model explainability
    for ensemble models.


    # 5. Explainability for Ensemble Models


    Ensemble models are a group of models where the predictions are aggregated using
    some metric in order to generate a final prediction. As an example, a group of
    tree-based models can be developed to predict a real valued output, like a regression
    model. The predictions from all of the trees are averaged and taken for the final
    output. In a similar way, classification models generate individual class predictions
    and then take a voting rule. The class with the highest number is taken as final
    output. The ensemble models are not only difficult to interpret but also difficult
    to explain to the end user. Consider a scenario where four trees predict Yes,
    and six trees predict No; we will consider No as the final answer based on the
    majority rule of 6/4. Here it is hard to explain to the end user why some models
    predicted yes. Hence it is very important to explain the ensemble models. In this
    chapter, you are going to use SHAP predominantly to explain ensemble model predictions.


    ## Ensemble Models


    Ensemble models are the most complex set of models that need detailed explanation
    as the output is a combined result of multiple predictions. *Ensemble* simply
    implies *grouping*. What is important in the case of ensemble models is how to
    explain the predictions, which model variant actually produced the prediction,
    and how to read the marginal contribution of the features in the final prediction
    process.


    The advantage of the decision tree model is that it takes into consideration the
    potential non-linearity existing in the dataset. The variable interactions come
    into play while generating model predictions. However, the limitation of decision
    tree model is that it is prone to bias, as the powerful or stronger features take
    part in the tree construction process and weak features are not able to enter
    the tree branching process as they lack predictive power. Hence the model becomes
    biased towards a few selective and stronger features from the dataset. This also
    sometimes leads to model overfitting. To balance out the impact of strong features,
    it is important to regulate the entry of features into the tree-based models.
    If you keep the strong features out of the model creation step and only include
    the weak features in the tree creation, you will still be able to generate predictions,
    but this will again be a biased model. Hence treating the model bias and at the
    same time controlling the overfitting can only be done when you use a combination
    of strong and weak features in the tree construction process. The combination
    can be done purely based on a bootstrap method, and number of trees can be increased
    sufficiently to average out the predictions.'
