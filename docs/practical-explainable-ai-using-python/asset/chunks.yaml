    # 9. Explainability for Deep Learning Models


    Deep neural network-based models are gradually becoming the backbone of artificial
    intelligence and machine learning implementations. The future of data mining will
    be governed by usage of artificial neural network-based advanced modelling techniques.
    So why are neural networks gaining so much importance when they were invented
    in the 1950s? Borrowed from the computer science domain, neural networks can be
    defined as a parallel information processing system where the inputs are connected
    with each other much like neurons in a human brain to transmit information so
    that activities like face recognition and image recognition can be performed.
    In theory, neural networks have existed for more than 50 years, but the execution
    of neural network projects in practical scenarios became possible after certain
    advancements in computation, specifically the evolution of GPUs and TPUs in performing
    high-end calculations, large-scale matrix multiplications, and so on. In this
    chapter, you are going to learn about the application of neural network-based
    methods on various data mining tasks like classification, regression, forecasting,
    and feature reduction. An artificial neural network (ANN) functions similarly
    to the way the human brain functions, where billions of neurons link to each other
    for information processing and insight generation.


    ## Explaining DL Models


    The brain’s biological network provides the basis for connecting elements in a
    real-life scenario for information processing and insight generation. A hierarchy
    of neurons is connected through layers, where the output of one layer becomes
    the input for another layer. The information passes from one layer to another
    layer as weights. The weights associated with each neuron contain insights so
    that recognition and reasoning become easier for the next level. An artificial
    neural network is a very popular and effective method that consists of layers
    associated with weights. The association between different layers is governed
    by a mathematical equation that passes information from one layer to another.
    In fact, a bunch of mathematical equations are at work inside one artificial neural
    network model. Figure [9-1](#506619_1_En_9_Chapter.xhtml#Fig1) shows the general
    architecture for a neural network-based model where the input layer, the output
    layer, and the hidden layer are displayed.


    ![../images/506619_1_En_9_Chapter/506619_1_En_9_Fig1_HTML.jpg](images/506619_1_En_9_Chapter/506619_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Sample neural network structure


    There are three layers (input, hidden, and output) and they are the core of any
    neural network-based architecture. ANNs are a powerful technique to solve many
    real-world problems such as classification, regression, and feature selection.
    ANNs have the ability to learn from new experiences in the form of new input data
    in order to improve the performance of classification or regression-based tasks
    and to adapt themselves to changes in the input environment. Each circle in Figure
    [9-1](#506619_1_En_9_Chapter.xhtml#Fig1) represents a neuron. One of the major
    advantages of deep learning is that we do not have to focus on creating handcrafted
    features for model training. Feature interactions need not be created by human
    beings; they should be automatically created during the training process itself.


    There are different variants of neural networks from an algorithmic or computational
    point of view that are used in multiple different scenarios. I am going to explain
    a few of them conceptually below so that you can understand their usage in practical
    applications.


    *   **Single hidden layer neural network** : This is the simplest form of a neural
    network, as shown in Figure [9-1](#506619_1_En_9_Chapter.xhtml#Fig1). There is
    only one hidden layer in it.


    *   **Multiple hidden layer neural networks** : In this form, more than one hidden
    layer connects the input data with the output data. The complexity of calculations
    increases in this form and it requires more computational power by the system
    to process information.


    *   **Feed forward neural networks** : In this form of neural network architecture,
    the information is passed in one direction from one layer to another layer; there
    is no iteration from the first level of learning.


    *   **Back propagation neural networks** : In this form of a neural network, there
    are two important steps. The feed forward works by passing information from the
    input layer to the hidden layer and from the hidden layer to the output layer.
    Secondly, it calculates the error and propagates it back to the previous layers.


    There is another kind of classification based on usage and structure, which can
    be explained as follows:


    *   **Recurrent neural network (RNN)** : This is mostly used for sequential information
    processing, such as audio processing, text classification, and so on.


    *   **Deep neural network (DNN)** : This is used for high dimensional structured
    data problems where feature interactions are so complex that it is very tedious
    to construct each feature manually.


    *   **Convolutional neural network (CNN)** : This is mostly useful for image data,
    where the pixel sizes produce a high dimensional matrix. There is a need to synthesize
    the information in a convoluted manner to classify images.


    The feed forward neural network model architecture is shown in Figure [9-2](#506619_1_En_9_Chapter.xhtml#Fig2)
    and the back propagation method is explained in the next section.


    ![../images/506619_1_En_9_Chapter/506619_1_En_9_Fig2_HTML.png](images/506619_1_En_9_Chapter/506619_1_En_9_Fig2_HTML.png)


    Figure 9-2


    Basic feed forward NN structure


