  trans: '

    # 使用 Alibi 进行锚点解释


    为了对黑盒模型生成锚点解释，你将使用 Python 库 `Alibi`。以下脚本展示了解释该概念所需的导入语句。你将使用一个随机森林分类器，它本身也是一个黑盒模型，因为其中包含许多生成预测的决策树，这些预测被整合后产生最终输出。


    ```

    import numpy as np

    import pandas as pd

    from sklearn.ensemble import RandomForestClassifier

    from sklearn.compose import ColumnTransformer

    from sklearn.pipeline import Pipeline

    from sklearn.impute import SimpleImputer

    from sklearn.metrics import accuracy_score

    from sklearn.preprocessing import StandardScaler, OneHotEncoder

    from alibi.explainers import AnchorTabular

    from alibi.datasets import fetch_adult

    ```


    `Alibi` 库包含多个数据集，用于生成可用于解释概念的示例。这里你将使用 `adult` 数据集；它也被称为来自 UCI 机器学习库的人口普查收入数据集。这是一个关于二分类模型的问题。有几个特征可用于预测收入类别，即收入是高于
    5 万美元还是低于 5 万美元。


    ```

    adult = fetch_adult()

    adult.keys()

    ```


    上述脚本将数据加载到 Jupyter 环境中。这些键是 `dict_keys([''data'', ''target'', ''feature_names'',
    ''target_names'', ''category_map''])`。


    ```

    data = adult.data

    target = adult.target

    feature_names = adult.feature_names

    category_map = adult.category_map

    ```


    `category_map` 函数的作用是映射数据中所有分类列或字符串列。


    ```

    from alibi.utils.data import gen_category_map

    ```


    分类映射只是一个虚拟变量映射，因为你不能直接使用分类变量或字符串变量进行计算。


    ```

    np.random.seed(0)

    data_perm = np.random.permutation(np.c_[data, target])

    data = data_perm[:,:-1]

    target = data_perm[:,-1]

    ```


    在训练模型之前，你对数据集中的数据进行随机化处理，并使用 33,000 条记录进行模型训练，使用 2,560 条记录进行模型测试或验证。


    ```

    idx = 30000

    X_train,Y_train = data[:idx,:], target[:idx]

    X_test, Y_test = data[idx+1:,:], target[idx+1:]

    X_train.shape,Y_train.shape

    X_test.shape, Y_test.shape

    ordinal_features = [x for x in range(len(feature_names)) if x not in list(category_map.keys())]

    ordinal_features

    ```


    选择好有序特征后，你可以通过管道触发有序特征转换器，如下所示：


    ```

    ordinal_transformer = Pipeline(steps=[(''imputer'', SimpleImputer(strategy=''median'')),

    (''scaler'', StandardScaler())])

    categorical_features = list(category_map.keys())

    categorical_features

    ```


    有序特征是特征编号 0、8、9 和 10，分类特征是 1、2、3、4、5、6、7 和 11。对于有序特征，你应用标准缩放器。如果存在缺失值，则使用中位数进行填充。


    ```

    categorical_transformer = Pipeline(steps=[(''imputer'', SimpleImputer(strategy=''median'')),

    (''onehot'', OneHotEncoder(handle_unknown=''ignore''))])

    categorical_transformer

    preprocessor = ColumnTransformer(transformers=[(''num'', ordinal_transformer,
    ordinal_features),

    (''cat'', categorical_transformer, categorical_features)])

    ```


    对于分类特征，如果存在缺失值，你应用中位数填充技术，并对分类变量转换执行独热编码。如果分类变量值未知，则忽略该值。


    ```

    Preprocessor

    ColumnTransformer(transformers=[(''num'',

    Pipeline(steps=[(''imputer'',

    SimpleImputer(strategy=''median'')),

    (''scaler'', StandardScaler())]),

    [0, 8, 9, 10]),

    (''cat'',

    Pipeline(steps=[(''imputer'',

    SimpleImputer(strategy=''median'')),

    (''onehot'',

    OneHotEncoder(handle_unknown=''ignore''))]),

    [1, 2, 3, 4, 5, 6, 7, 11])])

    ```


    预处理模块现在已准备好进行模型训练。`preprocessor.fit` 函数转换数据集以用于模型训练。用于分类的随机森林模型使用 50 棵树作为估计器数量进行初始化。初始化后的对象存储在
    `clf` 中。`clf.fit` 函数训练模型。


    ```

    preprocessor.fit(X_train)

    np.random.seed(0)

    clf = RandomForestClassifier(n_estimators=50)

    clf.fit(preprocessor.transform(X_train), Y_train)

    predict_fn = lambda x: clf.predict(preprocessor.transform(x))

    print(''Train accuracy: '', accuracy_score(Y_train, predict_fn(X_train)))

    Train accuracy:  0.9655333333333334

    print(''Test accuracy: '', accuracy_score(Y_test, predict_fn(X_test)))

    Test accuracy:  0.855859375

    ```


    下一步，你将使用锚点解释器并将其拟合到表格数据上。表格锚点具有表 12-1 所示的参数要求。


    **表 12-1** 锚点表格参数说明


    | 参数 | 说明 |

    | --- | --- |

    | `Predictor` | 一个模型对象，具有预测函数，该函数接收输入数据并生成输出数据 |

    | `Feature_names` | 特征列表 |

    | `Categorical_names` | 一个字典，其中键是特征列，值是该特征的类别 |

    | `OHE` | 分类变量是否经过独热编码。如果不是独热编码，则假定它们具有有序编码。 |

    | `Seed` | 用于结果可复现性 |


    ```

    explainer = AnchorTabular(predict_fn, feature_names, categorical_names=category_map,
    seed=12345)

    explainer

    explainer.explanations

    explainer.fit(X_train, disc_perc=[25, 50, 75])

    AnchorTabular(meta={

    ''name'': ''AnchorTabular'',

    ''type'': [''blackbox''],

    ''explanations'': [''local''],

    ''params'': {''seed'': 1, ''disc_perc'': [25, 50, 75]}}

    )

    idx = 0

    class_names = adult.target_names

    print(''Prediction: '', class_names[explainer.predictor(X_test[idx].reshape(1,
    -1))[0]])

    Prediction:  50K

    ```


    `explainer.explain` 对象解释分类器对某个观测值所做的预测。`explain` 函数具有表 12-2 所示的参数。


    **表 12-2** 解释函数参数值


    | 参数 | 说明 |

    | --- | --- |

    | `Xtest` | 需要被解释的新数据 |

    | `Threshold` | 最小精度阈值 |

    | `batch_size` | 用于采样的批次大小 |

    | `coverage_samples` | 用于从结果搜索中估计覆盖率的样本数量 |

    | `beam_size` | 在构建新锚点的每一步中扩展的锚点数量 |

    | `stop_on_first` | 如果为 True，束搜索算法将返回第一个满足概率约束的锚点。 |

    | `max_anchor_size` | 结果中特征的最大数量 |


    ```

    explanation = explainer.explain(X_test[idx], threshold=0.95)

    print(''Anchor: %s'' % ('' AND ''.join(explanation.anchor)))

    Output : [Anchor: Capital Loss > 0.00 AND Relationship = Husband AND Marital Status
    = Married AND Age > 37.00 AND Race = White AND Sex = Male AND Country = United-States

    ]

    print(''Precision: %.2f'' % explanation.precision)

    print(''Coverage: %.2f'' % explanation.coverage)

    ```


    在上面的例子中，模型解释的精度仅为 72%，覆盖率仅为 2%。可以得出结论，覆盖率和精度较低是由于数据集不平衡造成的。收入低于 5 万美元的人数多于收入高于
    5 万美元的人数。你可以将类似的锚点概念应用于文本分类数据集。在此示例中，你将使用情感分析数据集。

    '
- fmt: '### Anchor Text for Text Classification


    The anchor’s `text` function is going to help you get an anchors explanation for
    the text classification dataset. It can be spam email identification or it can
    be sentiment analysis. The parameters that can be fine-tuned for generating anchor
    text are shown in Table [12-3](#506619_1_En_12_Chapter.xhtml#Tab3).


    **Table 12-3** Anchor Text Parameter Explanations


    | Parameter | Explanation |

    | --- | --- |

    | `Predictor` | Usually a trained model object that can generate predictions |

    | `sampling_strategy` | Perturbation distribution method, where `unknown` replaces
    words with UNKs; `similarity` samples according to a similarity score with the
    corpus embeddings; and `language_model` samples according the language model’s
    output distributions |

    | `NLP` | spaCy object when the sampling method is `unknown` or `similarity` |

    | `language_model` | Transformers masked language model |


    The sampling strategies you are going to use are `unknown` and `similarity`, because
    the transformers method is out of scope for this book.


    ```

    import numpy as np

    from sklearn.feature_extraction.text import CountVectorizer

    from sklearn.linear_model import LogisticRegression

    from sklearn.metrics import accuracy_score

    from sklearn.model_selection import train_test_split

    #import spacy

    from alibi.explainers import AnchorText

    from alibi.datasets import fetch_movie_sentiment

    #from alibi.utils.download import spacy_model

    ```


    The above script imports the necessary libraries and functions from the libraries.


    ```

    movies = fetch_movie_sentiment()

    movies.keys()

    ```


    The above script loads the labelled data for sentiment classification.


    ```

    data = movies.data

    labels = movies.target

    target_names = movies.target_names

    ```


    This includes movies data, the target columns (which are labelled as positive
    and negative) and the feature names (which are a unique set of tokens from the
    corpus).


    ```

    train, test, train_labels, test_labels = train_test_split(data, labels, test_size=.2,
    random_state=42)

    train, test, train_labels, test_labels

    ```


    The above script splits the data into train and test sets, and the following as
    the train and validation dataset.


    ```

    train, val, train_labels, val_labels = train_test_split(train, train_labels, test_size=.1,
    random_state=42)

    train, val, train_labels, val_labels

    train_labels = np.array(train_labels)

    train_labels

    test_labels = np.array(test_labels)

    test_labels

    val_labels = np.array(val_labels)

    val_labels

    vectorizer = CountVectorizer(min_df=1)

    vectorizer.fit(train)

    ```


    The `CountVectorizer` function creates a document term matrix where the document
    is represented as rows and the tokens as features.


    ```

    np.random.seed(0)

    clf = LogisticRegression(solver=''liblinear'')

    clf.fit(vectorizer.transform(train), train_labels)

    ```


    Logistic regression is used since it is a binary classification problem, with
    a solver as `liblinear`. The following `predict` function takes the trained model
    object and, given the test data set, makes a prediction:


    ```

    predict_fn = lambda x: clf.predict(vectorizer.transform(x))

    preds_train = predict_fn(train)

    preds_train

    preds_val = predict_fn(val)

    preds_val

    preds_test = predict_fn(test)

    preds_test

    print(''Train accuracy'', accuracy_score(train_labels, preds_train))

    print(''Validation accuracy'', accuracy_score(val_labels, preds_val))

    print(''Test accuracy'', accuracy_score(test_labels, preds_test))

    ```


    The train, test, and validation accuracy is in line.


    To generate an anchor explanation, you need to install `spacy`. You also need
    to install the `en_core_web_md` module, which can be done by using the following
    script from the command line:


    ```

    python -m spacy download en_core_web_md

    import spacy

    model = ''en_core_web_md''

    #spacy_model(model=model)

    nlp = spacy.load(model)

    ```


    The `AnchorText` function requires the `spacy` model object, hence you initialize
    the `nlp` object from `spacy`.


    ```

    class_names = movies.target_names

    # select instance to be explained

    text = data[40]

    print("* Text: %s" % text)

    # compute class prediction

    pred = class_names[predict_fn([text])[0]]

    alternative =  class_names[1 - predict_fn([text])[0]]

    print("* Prediction: %s" % pred)

    explainer = AnchorText(

    predictor=predict_fn,

    nlp=nlp

    )

    explanation = explainer.explain(text, threshold=0.95)

    explainer

    explanation

    print(''Anchor: %s'' % ('' AND ''.join(explanation.anchor)))

    print(''Precision: %.2f'' % explanation.precision)

    Anchor: watchable AND bleak AND honest

    Precision: 0.99

    print(''\nExamples where anchor applies and model predicts %s:'' % pred)

    print(''\n''.join([x for x in explanation.raw[''examples''][-1][''covered_true'']]))

    print(''\nExamples where anchor applies and model predicts %s:'' % alternative)

    print(''\n''.join([x for x in explanation.raw[''examples''][-1][''covered_false'']]))

    ```


    Examples where anchor applies and model predicts negative:


    the effort is UNK UNK the results UNK honest , but the UNK UNK so bleak UNK UNK
    UNK hardly watchable .'
  raw: '### Anchor Text for Text Classification


    The anchor’s `text` function is going to help you get an anchors explanation for
    the text classification dataset. It can be spam email identification or it can
    be sentiment analysis. The parameters that can be fine-tuned for generating anchor
    text are shown in Table [12-3](#506619_1_En_12_Chapter.xhtml#Tab3).


    Table 12-3


    Anchor Text Parameter Explanations


    | Parameter | Explanation |

