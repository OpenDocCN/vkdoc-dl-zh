    ## Conclusion


    Text classification is the most important use case in the domain of natural language
    processing. It is useful for the classification of consumer complaints, the classification
    of raw text into various entities, and the classification of sentiments into positive
    and negative. We are talking about both binary classification and multi-class
    classification. Other use cases are topic modelling and summarization, which was
    included in this chapter as these tasks are not supervised machine learning models.
    You only considered the supervised machine learning models because the interpretation
    is usually lost when you generate the predicted class result. The user will obviously
    think about which tokens or features are considered and why the predicted class
    is so and so, etc. However, for unsupervised learning-based tasks from the NLP
    domain, there are easier ways to understand the relations, but there is no prediction
    in unsupervised learning that needs to be explained to the end user. In this chapter,
    you focused more on different preprocessing methods and models and their explainability.


    # 8. AI Model Fairness Using a What-If Scenario


    This chapter explains the use of a What-If Tool (WIT) to explain biases in AI
    models, such as machine learning-based regression models, classification models,
    and multi-class classification models. As a data scientist, you are responsible
    for not only developing a machine learning model, but also for ensuring that the
    model is not biased and that new observations are treated fairly. It is imperative
    to probe the decisions and verify the algorithmic fairness. Google has developed
    the What-If Tool (WIT) to address model fairness issue in machine learning models.
    You will look at the implementation of WIT in three possible ML models: ML for
    regression-based tasks, ML for binary classification models, and ML for multi-nominal
    models.


    ## What Is the WIT?


    The What-If Tool (WIT) is an open source tool released by Google in 2019 to probe
    machine learning models. It was developed to understand the cause-and-effect relationship
    between drivers and outcome variables and changes in data points and outcome variables.
    The drivers here imply the independent predictors for the outcome variables. Due
    to its ease of use, attractive visualization, and explainability, the WIT tool
    has a broad acceptance and adoption. With minimal coding, a user can visually
    probe the learned behavior of any machine learning model. Simulation of various
    inputs to a trained machine learning model is necessary for developing explainable
    AI and responsible AI. This WIT tool is available in three formats: regular Jupyter
    Notebook from Anaconda Navigator window, Google Colab Notebook, and TensorBoard-based
    visualizations for any deep learning-based model. The currently available version
    of the tool is 1.8.0, and this version overcomes certain limitations of earlier
    versions. See Figure [8-1](#506619_1_En_8_Chapter.xhtml#Fig1) for the flow.


    ![../images/506619_1_En_8_Chapter/506619_1_En_8_Fig1_HTML.jpg](images/506619_1_En_8_Chapter/506619_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Bias identification flow chart


    The training data can be divided based on certain protected attributes based on
    your question. As an example, say you have race and gender as two attributes and
    you want an answer from an explainability point of view such as


    *   Is the model biased towards a particular race?


    *   Is the model biased towards a particular gender, assuming male and female?


    Let’s take the second point, gender as a protected variable. The first gender
    is privileged and the second is unprivileged. You can prepare two training models,
    and using the two models you will generate predictions for the training data.
    If for any particular record the predictions match from both models, then the
    record or data point is unbiased; if it differs, then it is biased. Based on that,
    you can conclude whether the model is biased towards a gender or race.'
