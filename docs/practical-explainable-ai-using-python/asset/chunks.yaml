    ### XAI 兼容模型


    让我们来看看当前模型的状态、其内在特性、它们与 XAI 的兼容程度，以及这些模型是否需要额外的框架来实现可解释性。


    -   **线性模型**：线性回归模型或逻辑回归模型通过分析其系数值（一个数字）很容易解释。这些值非常容易理解。然而，如果将其扩展到正则化回归族，解释起来就变得非常困难。通常我们更关注单个特征，而不纳入交互特征。如果包含交互项，例如加法交互、乘法交互、二次多项式交互或三次多项式交互，模型的复杂度就会上升。数学结果需要一种更简单的解释方式。因此，在这些复杂场景中，需要解释的内容要多得多。


    -   **时间序列预测模型**：这些也是非常简单的模型，遵循回归类场景，可以通过参数化方法轻松解释。


    -   **基于树的模型**：基于树的模型更容易分析，对人类来说也非常直观。然而，这些模型通常无法提供更好的准确性和性能。它们还缺乏鲁棒性，并存在固有的偏差和过拟合问题。由于存在如此多的缺点，对最终用户来说，解释这些模型毫无意义。


    -   **集成模型**：集成模型有三种不同类型：Bagging、Boosting 和 Stacking。这三种类型都缺乏可解释性。需要一种简化的描述来传达模型结果。特征重要性也需要简化。


    -   **数学模型**：基于向量数学的支持向量机用于回归任务和分类任务。这些模型相当难以解释，因此非常需要进行模型简化。


    -   **深度学习模型**：深度神经网络模型通常具有三个以上的隐藏层，才能符合“深度”的定义。除了深度学习模型的层之外，还有各种模型调优参数，例如权重、正则化类型、正则化强度、不同层的激活函数类型、模型中使用的损失函数类型，以及包括学习率和动量参数在内的优化算法。这在本质上非常复杂，需要一个简化的框架来进行解释。


    -   **卷积神经网络**：这是另一种神经网络模型，通常应用于目标检测和图像分类相关任务。它被认为是一个完全的黑盒模型。其中有卷积层、最大/平均池化层等等。如果有人问为什么模型把猫预测成了狗，我们能解释哪里出错了吗？目前答案是否定的。在向最终用户解释这个模型方面，还需要大量的工作。


    -   **循环神经网络**：基于循环神经网络的模型通常适用于文本分类和文本预测。存在多种变体，例如长短期记忆网络和双向 LSTM，它们非常复杂，难以解释。我们一直需要更好的框架和方法来解释此类模型。


    -   **基于规则的模型**：这些模型非常简单，因为我们只需要 `if/else` 条件就能构建这些模型。


    ### XAI 与负责任的人工智能


    负责任的人工智能是一个框架，确保在各种软件应用、数字解决方案和产品中实现可解释性、透明度、伦理和问责制。人工智能的发展正在不同领域迅速创造多种机会，普通人的生活也受到这些技术的影响，因此人工智能需要负责任，其决策也应该是可解释的。


    负责任人工智能的七大核心支柱是可解释性的关键部分（图 1-11）。让我们来看看每个支柱。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig11_HTML.png](img/506619_1_En_1_Fig11_HTML.png)


    图 1-11


    负责任人工智能的核心支柱


    -   **公平性**：人工智能系统生成的预测不应导致对个人的歧视，无论其种姓、信仰、宗教、性别、政治派别、种族等如何，因此需要更高程度的公平性。


    -   **伦理**：在构建智能系统的过程中，我们不应忘记在使用数据收集情报时的伦理问题。


    -   **透明度**：模型预测以及预测的生成方式应该是透明的。


    -   **隐私**：在开发人工智能系统时，应保护个人数据（PII，个人可识别信息）。


    -   **安全性**：智能系统应该是安全的。


    -   **问责制**：如果出现错误预测，人工智能模型应能够承担责任并修复问题。


    -   **安全性**：当人工智能模型就自动驾驶汽车的导航、机器人牙科手术和数据驱动的医疗诊断做出决策时，任何错误的预测都可能导致危险的后果。


    许多组织正在为其解决方案中的人工智能使用制定指南和标准，以避免未来人工智能带来意外的负面后果。以组织 A 为例。它使用人工智能来预测销售量。人工智能预测销售额将比平均水平高出
    30%，因此企业储备了大量产品并动员了人力来支持销售。但如果实际销售额与历史销售平均水平持平，那么额外储备的库存和人力就浪费了。这里的人工智能预测是错误的。借助模型可解释性，这种情况本可以得到分析，并且模型或许可以得到纠正。

    '
- fmt: '### Evaluation of XAI


    There is no common standard for the evaluation of different explanations generated
    by the Python-based libraries over the Internet. The XAI process should follow
    these steps in evaluating the explanations:


    - Each strata should have a separate explanation. If we have a dataset that cannot
    be used for model training due to high volume, we typically do a sampling of the
    dataset. If we sample using a stratified sampling approach, then each strata should
    have a separate explanation.

    - **Time constraints**: We know that real-life datasets are quite huge. Even if
    we are proceeding with distributed computing frameworks, the explanations generated
    by the XAI libraries typically should not take that much time.

    - **Instance invariance**: If the data points are identical based on their attributes,
    they should be part of same group and hence they should convey similar interpretations.


    In various AI projects and initiatives, when we make predictions often a question
    arises as to why someone would trust our model. In predictive analytics or machine
    learning or deep learning, there is a trade-off between what is predicted and
    why it was predicted. If the prediction is in line with human expectation, then
    it is good. If it goes beyond human expectation, then we need to know why the
    model made such a decision. Prediction and expectation deviation are fine if it
    is a low-risk scenario such as customer targeting, digital marketing, or content
    recommendation. However, in a high-risk environment such as clinical trials or
    a drug testing framework, a small deviation in prediction and expectation makes
    a lot of difference and a lot of questions will arise as to why the model made
    such a prediction. As human beings, we think ourselves superior to all. There
    is a curiosity to know how the model arrived at a prediction and why not a human
    being. An XAI framework is a great tool to identify the inherent biases in the
    machine learning training process. XAI helps us investigate the reason for bias
    and find where exactly the bias is appearing.


    Because many people are not in a comfortable position to explain the outcomes
    of a machine learning model, they cannot reason out the decisions of a model,
    so they are not ready to use the AI models (Figure [1-12](#506619_1_En_1_Chapter.xhtml#Fig12)).
    This book is an attempt to popularize the concept of XAI frameworks to debug the
    machine learning and deep learning models in order to increase the AI adoption
    in the industry. In high-risk environments and use cases, there are regulatory
    requirements and auditing requirements to reason out the decisions of the model.
    The book is organized to supply hands-on execution of XAI frameworks for supervised
    regression, classification, unsupervised learning, clustering, and segmentation-related
    tasks. In addition, certain time series forecasting models need XAI to describe
    predictions. Further, XAI frameworks can also be used for unstructured text classification-related
    problems. A single XAI framework does not suit all kinds of models, so we are
    going to discuss various types of open source Python libraries and usages in generating
    XAI-based explanations.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig12_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig12_HTML.png)


    Figure 1-12


    What it takes for AI to increase adoption


    Examining model fairness also requires simulations of what-if scenarios using
    the prediction outcomes. We are going to cover this too. Then we’ll discuss counterfactual
    and contrastive explanations for AI models. We will cover model explainability
    for deep learning models, rule-based expert systems, and model-agnostic explanations
    for prediction invariance and for computer vision tasks using various XAI frameworks.


    Model interpretability and explainability are the key focuses of this book. There
    are mathematical formulas and methods that are typically used to explain decisions
    made by AI models. Readers are provided with software library methods, classes,
    frameworks, and functions and how to use them for model explainability, transparency,
    reliability, ethics, biases, and interpretability. If a human being can understand
    the reasons behind the decision made by an AI model, it will give much more power
    to the user to make amendments and recommendations.


    ## Conclusion


    Model interpretability and explainability are needs for all of the processes that
    use AI to predict something, the reason being we need to know the reasons behind
    the prediction. In this chapter, you learned about the following:


    - Model explainability and interpretability basics

    - Ethical considerations in AI applications and biases in predictions generated
    by AI models

    - Reliability of the AI models in generating predictions in different use cases

    - Methods and systems for interpreting the linear models that are used in AI,
    non-linear models, and time series models used in AI

    - The most complex ensemble models, explainability, and interpretability using
    frameworks such as `Lime`, `SHAP`, `Skater`, `ELI5`, and more

    - Model explainability for unstructured data and natural language processing-related
    tasks


    # 2. AI Ethics, Biasness, and Reliability


    This chapter covers different frameworks using Explainable Artificial Intelligence
    (XAI) Python libraries to control biasness, execute the principles of reliability,
    and maintain ethics while generating predictions. As digitalization progresses
    touch different industries, they open up a whole new set of opportunities for
    the application of artificial intelligence and machine learning-related solutions.
    The major challenges with the adoption of these AI technologies are ethics, biasness,
    and the reliability of the system, plus the transparency of the processes. These
    AI systems raise fundamental questions. Can I trust the predictions made by the
    AI system? Can I assume that it is unbiased? What kind of risk does it have? Is
    there any process where I can control the AI systems and their predictions about
    the future? AI ethics focus more on the legitimate use of AI for human kind and
    their wellness. AI should not be used for the destruction of human civilization.
    In this chapter, we are going to discuss various aspects of AI.'
