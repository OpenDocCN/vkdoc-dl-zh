    # 使用 SHAP 多分类 CatBoost 模型


    CatBoost 分类器模型也可用于训练多分类模型。训练好的模型对象可以传递给 SHAP 树解释器以生成 SHAP 值。参见图 5-29。


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig29_HTML.jpg](img/506619_1_En_5_Fig29_HTML.jpg)


    图 5-29


    特征值与 SHAP 值表示


    ```

    model = CatBoostClassifier(loss_function = ''MultiClass'', iterations=300, learning_rate=0.1,
    random_seed=123)

    model.fit(X, y, cat_features=cat_features, verbose=False, plot=False)

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(Pool(X, y, cat_features=cat_features))

    shap.summary_plot(shap_values[0], X)

    ```


    CatBoost 分类器或回归器有许多超参数。表 5-8 展示了一些重要参数及其对模型结果的影响。


    表 5-8


    CatBoost 分类器的超参数


    | 参数 | 说明 |

    | --- | --- |

    | `cat_features` | 训练数据集中存在的分类列索引 |

    | `text_features` | 文本列索引（指定为整数）或名称（指定为字符串） |

    | `learning_rate` | 用于损失函数优化，减小梯度步长 |

    | `Iterations` | 解决机器学习问题时可以构建的最大树数量 |

    | `Max_depth` | 树的深度 |

    | `leaf_estimation_method` | 用于计算叶节点值的方法。可能的值：`Newton`、`Gradient`、`Exact`。取决于模式和所选损失函数：使用
    `Quantile` 或 `MAE` 损失函数的回归——一次精确迭代；使用除 `Quantile` 或 `MAE` 之外的任何损失函数的回归——一次梯度迭代；分类模式——十次牛顿迭代；多分类模式——一次牛顿迭代
    |

    | `boosting_type` | 提升方案。可能的值：`Ordered`——通常在小数据集上提供更好的质量，但可能比 `Plain` 方案慢；`Plain`——经典的梯度提升方案
    |


    为了获得更好的结果，可以更改或修改上述参数，并使用 SHAP 库进行解释。


    # 使用 SHAP 解释 Light GBM 模型


    如 CatBoost 分类器部分所述，类似地，你也可以使用轻量梯度提升模型。Light GBM 模型和 CatBoost 模型之间的区别在于，在混合数据场景（即训练数据集中存在混合特征集）下，Light
    GBM 运行速度更快。当数据集中有大量分类特征时，CatBoost 分类器更有用。在 Light GBM 中，你需要对分类特征进行编码，但在 CatBoost
    模型中，模型具有处理分类特征的内部机制。


    安装 Light GBM 模型：


    ```

    conda install -c conda-forge lightgbm

    from sklearn.model_selection import train_test_split

    import lightgbm as lgb

    import shap

    X,y = shap.datasets.adult()

    X_display,y_display = shap.datasets.adult(display=True)

    # create a train/test split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2, random_state=7)

    d_train = lgb.Dataset(X_train, label=y_train)

    d_test = lgb.Dataset(X_test, label=y_test)

    params = {

    "max_bin": 512,

    "learning_rate": 0.05,

    "boosting_type": "gbdt",

    "objective": "binary",

    "metric": "binary_logloss",

    "num_leaves": 10,

    "verbose": -1,

    "min_data": 100,

    "boost_from_average": True

    }

    model = lgb.train(params, d_train, 10000, valid_sets=[d_test], early_stopping_rounds=50,
    verbose_eval=1000)

    ```


    你可以使用相同的人口普查收入分类数据集，通过 Light GBM 模型训练分类器，并为预测结果生成解释。通过查阅 Light GBM 模型的官方文档页面，可以了解许多超参数。表
    5-9 展示了以下代码行中使用的超参数。


    表 5-9


    LGB 模型的超参数


    | 参数 | 说明 |

    | --- | --- |

    | `Max_bin` | 特征值将被分入的最大箱数。箱数较少可能会降低训练精度，但可能会提高泛化能力（处理过拟合） |

    | `Learning_rate` | 收缩率 |

    | `Boosting_type` | `gbdt`，传统梯度提升决策树，别名：`gbrt`；`rf`，随机森林，别名：`random_forest`；`dart`，Dropouts
    meet Multiple Additive Regression Trees；`goss`，基于梯度的单边采样 |

    | `Objective` | 应用类型，例如二分类、多分类等 |

    | `Metric` | 在评估集上评估的指标 |

    | `Num_leaves` | 一棵树中最大叶节点数 |

    | `Min_data` | 每个分类组的最小数据量 |


    训练完 Light GBM 模型后，你可以使用 SHAP 树解释器来解释预测结果，还可以为 SHAP 值生成力图（图 5-30）。


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig30_HTML.jpg](img/506619_1_En_5_Fig30_HTML.jpg)


    图 5-30


    使用 SHAP 特征值预测对数几率比的力图


    ```

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(X)

    shap.force_plot(explainer.expected_value[1], shap_values[1][0,:], X_display.iloc[0,:])

    ```


    在图 5-30 中，教育年限和年龄将预测的几率比推向更高值，而资本收益和关系将预测的几率比拉向更低值。因此，数据集中第一条记录的最终预测几率比为 -8.43，远低于基准值
    -2.43 所示的平均几率比。


    ```

    shap.force_plot(explainer.expected_value[1], shap_values[1][:1000,:], X_display.iloc[:1000,:])

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig31_HTML.jpg](img/506619_1_En_5_Fig31_HTML.jpg)


    图 5-31


    LGBM 模型生成输出值时样本顺序的相似性


    在图 5-31 中，输出是几率比，并且如本章所示，你可以从几率比反推出目标类别的概率值。此图显示了样本的相似性，然后据此排序。生成较高几率比的样本位于 0-50
    之间。之后，其余样本生成的几率比范围在 +3 到 -9 之间，直到第 900 条记录。此后，几率比下降到非常负的范围。红线表示有助于提高预测几率比的特征值，蓝线表示降低预测几率比的特征值。平均线对应
    -2.43 的值。如果你计算整个数据集的几率比然后求平均值，结果就是 -2.43。


    ```

    shap.summary_plot(shap_values, X)

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig32_HTML.jpg](img/506619_1_En_5_Fig32_HTML.jpg)


    图 5-32


    汇总图


    图 5-32 显示了汇总图。这是一个非常重要的图。它提供了目标列中每个类别对应的不同特征的平均 SHAP 值。此图有趣之处在于，平均值在两个类别之间均匀分布，与特征值无关。

