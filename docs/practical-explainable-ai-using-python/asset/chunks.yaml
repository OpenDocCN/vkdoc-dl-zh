- fmt: '### Deep Explainer for Tabular Data


    Let’s apply a deep learning model on a complex dataset. It’s called a wine quality
    prediction. The best accuracy one can get from this dataset is 62% because of
    feature complexity and ambiguity. No algorithm can increase the accuracy beyond
    70% or 80%. Hence, this is a complex dataset. There are different wine classes
    that need to be classified. The dataset comes from the UCI machine learning repository
    at [`https://archive.ics.uci.edu/ml/datasets/wine+quality`](https://archive.ics.uci.edu/ml/datasets/wine%252Bquality).
    Two datasets are included, related to red and white wine samples from the north
    of Portugal. The goal is to model the wine quality based on physicochemical tests.
    The two datasets are related to red and white variants of the Portuguese Vinho
    Verde wine. Due to privacy and logistic issues, only physicochemical (input) and
    sensory (output) variables are available (e.g., there is no data about grape types,
    wine brand, wine selling price, etc.). These datasets can be viewed as classification
    or regression tasks. The classes are ordered and not balanced (e.g., there are
    many more normal wines than excellent or poor ones).


    ```

    from tensorflow import keras

    from sklearn.model_selection import cross_val_score, KFold

    from keras.wrappers.scikit_learn import KerasRegressor

    from keras.layers import Dense, Dropout

    from keras.models import Sequential

    from sklearn.metrics import accuracy_score

    from sklearn.preprocessing import StandardScaler

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    ```


    The above script imports the necessary libraries to create a deep learning model
    for a tabular dataset. The following script names the features that can be used
    to predict the wine quality target:


    ```

    feature_names = [

    "fixed acidity",

    "volatile acidity",

    "citric acid",

    "residual sugar",

    "chlorides",

    "free sulfur dioxide",

    "total sulfur dioxide",

    "density",

    "pH",

    "sulphates",

    "alcohol",

    "quality",

    ]

    ```


    The following script reads the two datasets from the UCI machine learning repository:


    ```

    red_wine_data = pd.read_csv(

    ''https://archive.ics.uci.edu/ml/machine-learning-databases/wine-quality/winequality-red.csv'',
    names=feature_names, sep=";", header=1)

    white_wine_data = pd.read_csv(

    ''https://archive.ics.uci.edu/ml/machine-learning-databases/wine-quality/winequality-white.csv'',
    names=feature_names, sep=";", header=1)

    wine_data = red_wine_data.append(white_wine_data)

    wine_features = wine_data[feature_names].drop(''quality'', axis=1).values

    wine_quality = wine_data[''quality''].values

    scaler = StandardScaler().fit(wine_features)

    wine_features = scaler.transform(wine_features)

    ```


    The deep learning model has input from 11 features. It is a three-layered deep
    neural network model.


    ```

    model = Sequential()

    model.add(Dense(1024, input_dim=11, activation=''tanh''))

    model.add(Dense(512, activation=''tanh''))

    model.add(Dense(64,  activation=''tanh''))

    model.add(Dense(1))

    model.compile(loss=''mse'', optimizer=''adam'', metrics=[''accuracy''])

    model.summary()

    history = model.fit(wine_features, wine_quality,

    batch_size=BATCH_SIZE,

    epochs=NB_EPOCH,

    validation_split=VALIDATION_SPLIT,

    verbose=VERBOSE)

    background = wine_features[np.random.choice(wine_features.shape[0],100, replace=False)]

    explainer = shap.DeepExplainer(model,background)

    shap_values = explainer.shap_values(wine_features)

    pd.DataFrame(np.array(shap_values).reshape(6495,11))

    np.round(model.predict(wine_features),0)

    ```


    The positive SHAP values help make the prediction and the negative SHAP values
    decrease the power of prediction.


    ## Conclusion


    In this chapter, you learned how to interpret the inference for a classification
    model result using three datasets: MNIST digit dataset, CIFAR dataset, and wine
    quality dataset. Using a deep learning model, the training was completed and you
    explained the model predictions using `DeepExplainer` from the SHAP library. The
    role of `DeepExplainer` is to showcase the positive SHAP values and negative SHAP
    values of the image to explain any ambiguity or overlap in the classification
    task. In a structured data problem like the wine quality classification scenario,
    it also explains what features positively impact the predictions and what features
    negatively impact the predictions. The difference between the machine learning
    model and deep learning model is that in deep learning, feature selection happens
    automatically and there is an iterative process in training a deep neural network.
    Because of this, it is difficult to explain the model predictions to anyone. The
    task is much simpler now with the use of `DeepExplainer` to explain the model
    predictions.


    # 10. Counterfactual Explanations for XAI Models


    This chapter explains the use of the What-If Tool (WIT) to explain counterfactual
    definitions in AI models, such as machine learning-based regression models, classification
    models, and multi-class classification models. As a data scientist, you don’t
    just develop a machine learning model; you make sure that your model is not biased
    and that it is fair about the decisions it makes for new observations that it
    predicts for the future. It is very important to probe the decisions and verify
    the algorithmic fairness. Google developed the What-If Tool to address the model
    fairness issue in machine learning models. You will look at the implementation
    of the WIT in three ML models: ML for regression-based tasks, ML for binomial
    classification models, and ML for multi-nominal models.


    ## What Are CFEs?


    Counterfactual explanations (CFEs) are causal relationships in the prediction
    process of ML models. I will illustrate the prediction or classification by using
    one example. Counterfactual explanations are a way of creating hypothetical scenarios
    and generating predictions under those hypothetical scenarios. This is understandable
    to business users, non-data scientists, and common individuals who are not from
    predictive modelling background. Sometimes we find that the relationship between
    input and output is not causal but still we want to establish a causal relationship
    to generate predictions. Counterfactual explanations are local explanations for
    predictions, which means for individual predictions they generate relevant explanations.


    ## Implementation of CFEs


    Counterfactual explanations can be generated for both regression and classification
    tasks. You are going to use the Python-based library Alibi. Alibi works on Python
    version 3.6+ and higher. The following commands can be used for installation:


    ```

    !pip install alibi

    !pip install alibi[ray]

    import alibi

    alibi.__version__

    ```


    After installation, please check the version using the following lines of code,
    just to ensure that the installation is complete: `alibi.__version__`'
