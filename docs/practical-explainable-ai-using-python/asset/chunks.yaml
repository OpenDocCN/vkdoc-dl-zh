    ## VIF 及其可能引发的问题


    `VIF` 是方差膨胀因子。该指标量化了模型中存在的多重共线性程度。多重共线性可定义为两个以上自变量之间存在高度相关性。遵循 `VIF <= 10` 的规则来检测模型中的多重共线性是行业标准做法。它可能引发的问题可以通过一个例子来解释。假设有两个特征
    `X1` 和 `X2`，两者都可用于预测因变量 `Y`。`X1` 的系数为 `0.20`，其含义可定义为：*在保持模型中所有其他变量不变的情况下，`X1`
    每变化一个单位，因变量预计变化 `0.20` 倍*。当 `X1` 和 `X2` 高度相关时，保持所有其他变量不变的假设就被违反了。因此，应从模型中移除多重共线性，以便对每个预测变量对应的系数值做出正确解释。


    `VIF` 小于 `10` 是可接受的。`VIF` 越大，回归结果的可靠性就越低。通常，`VIF` 超过 `10` 表示高度相关，需要引起关注。以下脚本展示了删除多重共线性变量后的
    `VIF`。模型在精简后的变量集上重新训练。训练得分现在为 `70%`，测试得分现在为 `69%`，因此这是一个良好的模型。一旦模型被确定为良好模型，您可以使用可解释的
    AI Python 包来解释模型的各个组成部分。


