- fmt: '# 排版后的内容


    为了解释如何应用CatBoost分类器，我们使用Amazon数据集。表[5-6](#506619_1_En_5_Chapter.xhtml#Tab6)列出了该数据集中的特征。


    **表 5-6** Amazon数据集数据描述


    | 特征名 | 描述 |

    | --- | --- |

    | `ACTION` | 如果资源被批准，`ACTION`为1；如果资源未被批准，则为0 |

    | `RESOURCE` | 每个资源的ID |

    | `MGR_ID` | 当前员工ID记录的管理者的员工ID；一个员工一次只能有一个管理者 |

    | `ROLE_ROLLUP_1` | 公司角色分组类别ID 1（例如，美国工程部） |

    | `ROLE_ROLLUP_2` | 公司角色分组类别ID 2（例如，美国零售部） |

    | `ROLE_DEPTNAME` | 公司角色部门描述（例如，零售部） |

    | `ROLE_TITLE` | 公司角色业务头衔描述（例如，高级工程零售经理） |

    | `ROLE_FAMILY_DESC` | 公司角色系列扩展描述（例如，零售经理，软件工程） |

    | `ROLE_FAMILY` | 公司角色系列描述（例如，零售经理） |

    | `ROLE_CODE` | 公司角色代码；该代码对每个角色是唯一的（例如，经理） |


    当一名员工开始在软件开发部门工作时，他们需要特定的访问权限和许可才能完成其工作职责。有一个手动流程来授予员工访问权限，但员工在此过程中可能会遇到障碍。没有自动化的机制来授予对必要软件系统的访问权限。此用例的目标是对历史数据进行建模，以确定员工的访问需求。目标列是`ACTION`；如果资源被批准则为1，如果资源访问被拒绝则为0。其余特征用于预测目标特征。


    ```

    train_df, test_df = catboost.datasets.amazon()

    train_df

    set(train_df.ACTION)

    y_train = train_df.ACTION

    X_train = train_df.drop(''ACTION'',axis=1)

    cat_features = list(range(0,X_train.shape[1]))

    from catboost import Pool, CatBoostClassifier, cv

    # Initialize CatBoostClassifier

    model = CatBoostClassifier(iterations=300,

    learning_rate=0.1,

    random_seed=12)

    # Fit model

    model.fit(X_train,y_train,cat_features=cat_features,verbose=False,plot=False)

    ```


    使用CatBoost分类器的模型训练过程具有一定的复杂性，这意味着存在无法通过单一函数近似的复杂关系。如果特征具有线性关系，你可以使用一条直线来近似该函数。然而，如果特征是圆形或锯齿形模式，则称为复杂模式，因为数学上没有任何函数可以近似圆形或锯齿形模式。在这些情况下，你需要多个函数或数据归一化来匹配某个数学函数。


    在当前场景中，由于特征数据集的复杂性，SHAP值是近似计算的。


    ```

    eval_dataset = [X_train.iloc[0:1]]

    eval_dataset

    # Get predicted classes

    preds_class = model.predict(X_train)

    # Get predicted probabilities for each class

    preds_proba = model.predict_proba(X_train)

    # Get predicted RawFormulaVal

    preds_raw = model.predict(X_train,

    prediction_type=''RawFormulaVal'')

    preds_class

    preds_proba

    preds_raw

    ```


    训练好的模型存储在`model`对象中。你可以取两个样本作为示例，来生成该实例的概率和原始公式值。该样本可以是训练数据集中的任何数据点。在脚本中，我们以第一条和第91条记录为例。


    ```

    import numpy as np

    np.log(0.9964/(1-0.9964))

    np.exp(5.62)/(1+np.exp(5.62))

    cat_features

    ```


    第一条记录显示预测为类别1的概率为99.64%。对数几率值为5.61。对数几率意味着`log(P/1-P)`，这里`P`是类别1的概率。如果你想从原始预测值得到概率，可以使用公式`exp(raw
    prediction) / (1+ exp(raw prediction))`。例如，对于第一条记录，`exp(5.61) / (1+ exp(5.61))
    = 0.9964`。以类似的方式，你可以解释第91条记录的原始预测值`-3.4734`。CatBoost模型提供了预测不同预测类型的选项；参见表[5-7](#506619_1_En_5_Chapter.xhtml#Tab7)。


    **表 5-7** CatBoost模型对象生成的预测类型


    | `prediction_type` | 描述 |

    | --- | --- |

    | **Probability** | 对应于每个类别的概率值 |

    | **Class** | 将生成类别标签 |

    | **RawFormula Value** | 对数几率值 |

    | **Exponent** | 预测概率的指数值 |

    | **LogProbability** | 概率的对数值 |


    来自CatBoost模型的不同类型的预测提供了更多洞察，有助于理解预测值以及模型如何生成预测。所有类型之间的关联提供了更好的理解。你可以转换原始预测值以得到类别1的概率。


    ```

    from catboost.datasets import *

    train_df, test_df = catboost.datasets.amazon()

    y = train_df.ACTION

    X = train_df.drop(''ACTION'', axis=1)

    cat_features = list(range(0, X.shape[1]))

    model = CatBoostClassifier(iterations=300, learning_rate=0.1, random_seed=12)

    model.fit(X, y, cat_features=cat_features, verbose=False, plot=False)

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(Pool(X, y, cat_features=cat_features))

    test_objects = [X.iloc[7:9], X.iloc[56:58]]

    for obj in test_objects:

    print(''Probability of class 1 = {:.4f}''.format(model.predict_proba(obj)[0][1]))

    print(''Formula raw prediction = {:.4f}''.format(model.predict(obj, prediction_type=''RawFormulaVal'')[0]))

    print(''\n'')

    shap.force_plot(explainer.expected_value, shap_values[0,:], X.iloc[0,:])

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Figa_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Figa_HTML.jpg)


