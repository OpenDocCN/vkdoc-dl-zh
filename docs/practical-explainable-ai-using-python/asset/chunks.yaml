    \ 12-4 展示了需要解释的锚点图像参数。\n\n**表 12-4** 锚点图像参数说明\n\n| 参数 | 说明 |\n| --- | --- |\n\
    | `Predictor` | 图像分类模型对象 |\n| `image_shape` | 待解释图像的形状 |\n| `segmentation_fn`\
    \ | 内置分割函数字符串之一：`'felzenszwalb'`、`'slic'`、`'quickshift'`，或自定义分割函数（可调用），该函数返回一个带有每个超像素标签的图像掩码\
    \ |\n| `segmentation_kwargs` | 内置分割函数的关键字参数 |\n| `images_background` | 用于叠加超像素的背景图像\
    \ |\n| `Seed` | 用于重现结果 |\n\n让我们看看以下生成锚点图像的脚本。\n\n```\nimport matplotlib\n%matplotlib\
