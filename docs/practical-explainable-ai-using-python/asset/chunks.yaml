    | Parameter | Explanation |

    | --- | --- |

    | `Xtest` | New data that needs to be explained |

    | `Threshold` | Minimum precision threshold |

    | `batch_size` | Batch size used for sampling |

    | `coverage_samples` | Number of samples used to estimate coverage from the result
