    \n## 原始图像与自编码器生成图像的对比\n\n您可以将训练集中的原始图像与基于自编码器生成的模型图像集（如图 11-2 所示）进行对比。从图像中可以看出，自编码器生成的模型与原始图像完全匹配。由于这是一个示例数据集，匹配度非常高；然而，对于其他示例，需要大量的训练才能生成如此接近的图像。一个训练有素的自编码器模型对于生成对比解释将非常有帮助。\n\
