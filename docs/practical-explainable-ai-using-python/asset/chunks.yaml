    The p-values of the coefficients from Table 6-8 are statistically significant
    at a 5% level of significance as the values are less than 0.05. The summary of
    the model output produced above uses primarily the OLS as a measurement technique,
    and the OLS method is very similar to the multiple linear regression model. Hence
    the model coefficients, their relevance, and an interpretation can be made easily.


    ## Time Series: LIME


    Using the LIME explainable library, you can take the 12 lags as features and train
    a regression model and explain the predictions as shown below. As a first step,
    you need to install the LIME library if you have not installed it:


    ```

    !pip install Lime

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(X),

    mode=''regression'',

    feature_names=X.columns,

    class_names=[''t''],

    verbose=True)

    explainer.feature_frequencies

    # asking for explanation for LIME model

    i = 60

    exp = explainer.explain_instance(np.array(X)[i],

    new_model.predict,

    num_features=12

    )

    exp.show_in_notebook(show_table=True)

    ```


    In the above script, you consider the time series model as a supervised learning
    model and used 12 lags as features. From the LIME library you use the LIME tabular
    explainer. Figure [6-9](#506619_1_En_6_Chapter.xhtml#Fig9) shows an explanation
    of record number 60.


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig9_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig9_HTML.jpg)


    **Figure 6-9** LIME explanation for record 60


    The predicted value is 35.77, and the lower threshold value and upper threshold
    value reflect the confidence band of the predicted outcome. The positive factors
    and negative factors contributing towards the prediction are shown in Figure [6-9](#506619_1_En_6_Chapter.xhtml#Fig9).
    Lag 1 is a very important feature; the second important feature is lag 2, then
    lag 5, lag 3, lag 6, and so on. The lag values as features and their contribution
    towards the predicted value is shown in Figure [6-10](#506619_1_En_6_Chapter.xhtml#Fig10).


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig10_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig10_HTML.jpg)


    **Figure 6-10** Feature importance for the model


    ```

    # Code for SP-LIME

    import warnings

    from lime import submodular_pick

    # Remember to convert the dataframe to matrix values

    # SP-LIME returns exaplanations on a sample set to provide a non redundant global
    decision boundary of original model

    sp_obj = submodular_pick.SubmodularPick(explainer, np.array(X),

    new_model.predict,

    num_features=12,

    num_exps_desired=10)

    import matplotlib.pyplot as plt

    plt.savefig(''[exp.as_pyplot_figure() for exp in sp_obj.sp_explanations ].png'',
    dpi=300)

    images = [exp.as_pyplot_figure() for exp in sp_obj.sp_explanations ]

    exp.predicted_value

    ```


    The submodular pick for explaining models provides a global understanding of the
    model by a set of instances from the data. In the above script, you consider all
    12 lag-based features, 10 instances for the user to inspect or show explanations.


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig11_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig11_HTML.jpg)


    **Figure 6-11** Local explanation for record 0


    In Figure [6-11](#506619_1_En_6_Chapter.xhtml#Fig11), lag 1 is very important
    in predicting the output value. The green bars improve the prediction and the
    red bars reduce the predicted value. This is the local explanation for the first
    record. In a similar way you can consider other sample records and generate such
    explanations.


