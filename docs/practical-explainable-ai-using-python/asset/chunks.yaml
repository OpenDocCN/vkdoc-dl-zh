    ## Using SHAP to Explain Categorical Boosting Models


    When the features of a classification model contain categorical variables, we
    usually do one hot encoding for the features in order to identify the impact of
    each feature on the target column. In this example, you are going to use the CatBoost
    Python library along with SHAP to generate explanations.


    To install the CatBoost library you can use the `pip` installation command.


    ```

    !pip install catboost

    shap.initjs()

    import catboost

    from catboost.datasets import *

    import shap

    ```


    This census income data set has categorical features such as relationship, sex,
    occupation, and marital status. These categorical features cannot be directly
    passed to the machine learning training algorithms using `sklearn` or any other
    pipeline like `Keras`, `TensorFlow`, etc. These categorical features first need
    to be converted to label encoder and then converted to one hot encoder. This becomes
    very cumbersome if you have more than a hundred features that are categorical.
    Hence you need a library that can handle this process automatically. This need
    is answered by the CatBoost library.


    The `Initjs()` function loads the JavaScript visualization code to a Jupyter notebook.
    Hence we use the above syntax to load the JS functionality.


    The CatBoost regression model or classification model works on top of a gradient
    boosting model, hence the name is the CatBoost model.


    ```

    X,y = shap.datasets.boston()

    model = CatBoostRegressor(iterations=300, learning_rate=0.1, random_seed=123)

    model.fit(X, y, verbose=False, plot=False)

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(X)

    # visualize the first prediction''s explanation

    shap.force_plot(explainer.expected_value, shap_values[0,:], X.iloc[0,:])

    ```


