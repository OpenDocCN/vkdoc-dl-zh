- fmt: '### Integrated Gradients Method


    The objective of the integrated gradients approach is to attribute the feature
    importance score to each of the features used to train the machine learning or
    deep learning model. You use the gradient descent to update the weights of a deep
    neural network model. When you reverse the process, you can take the integration
    of the weights attributing to the feature importance score. Gradients can be defined
    as a slope of the output with respect to the input features in a deep learning
    model. The integrated gradients approach can be used to understand the pixel importance
    in recognizing the correct image in image classification problem. The gradients
    are typically computed for the output of the class where the probability is highest
    with respect to the pixel of the input image.


    ```

    import numpy as np

    import os

    import tensorflow as tf

    from tensorflow.keras.layers import Activation, Conv2D, Dense, Dropout

    from tensorflow.keras.layers import Flatten, Input, Reshape, MaxPooling2D

    from tensorflow.keras.models import Model

    from tensorflow.keras.utils import to_categorical

    from alibi.explainers import IntegratedGradients

    import matplotlib.pyplot as plt

    print(''TF version: '', tf.__version__)

    print(''Eager execution enabled: '', tf.executing_eagerly()) # True

    train, test = tf.keras.datasets.mnist.load_data()

    X_train, y_train = train

    X_test, y_test = test

    test_labels = y_test.copy()

    train_labels = y_train.copy()

    ```


    To explain the working of the integrated gradients approach, let’s use the MNIST
    dataset, which is easy to understand and many people are familiar with it. Table
    [14-1](#506619_1_En_14_Chapter.xhtml#Tab1) explains the parameters of the model.


    **Table 14-1** Integrated Gradients Parameters


    | Parameters | Explanations |

    | --- | --- |

    | `Model` | TensorFlow or Keras model |

    | `Layer` | Layer with respect to which gradients are calculated. If not provided,
    the gradients are calculated with respect to the input. |

    | `Method` | Method for the integral approximation. Methods available: `riemann_left`,
    `riemann_right`, `riemann_middle`, `riemann_trapezoid`, and `gausslegendre`. |

    | `N_steps` | Number of steps in the path integral approximation from the baseline
    to the input instance |


    ```

    X_train = X_train.reshape(-1, 28, 28, 1).astype(''float64'') / 255

    X_test = X_test.reshape(-1, 28, 28, 1).astype(''float64'') / 255

    y_train = to_categorical(y_train, 10)

    y_test = to_categorical(y_test, 10)

    print(X_train.shape, y_train.shape, X_test.shape, y_test.shape)

    load_mnist_model = False

    save_model = True

    filepath = ''./model_mnist/''  # change to directory where model is saved

    if load_mnist_model:

    model = tf.keras.models.load_model(os.path.join(filepath, ''model.h5''))

    else:

    # define model

    inputs = Input(shape=(X_train.shape[1:]), dtype=tf.float64)

    x = Conv2D(64, 2, padding=''same'', activation=''relu'')(inputs)

    x = MaxPooling2D(pool_size=2)(x)

    x = Dropout(.3)(x)

    x = Conv2D(32, 2, padding=''same'', activation=''relu'')(x)

    x = MaxPooling2D(pool_size=2)(x)

    x = Dropout(.3)(x)

    x = Flatten()(x)

    x = Dense(256, activation=''relu'')(x)

    x = Dropout(.5)(x)

    logits = Dense(10, name=''logits'')(x)

    outputs = Activation(''softmax'', name=''softmax'')(logits)

    model = Model(inputs=inputs, outputs=outputs)

    model.compile(loss=''categorical_crossentropy'',

    optimizer=''adam'',

    metrics=[''accuracy''])

    # train model

    model.fit(X_train,

    y_train,

    epochs=6,

    batch_size=256,

    verbose=1,

    validation_data=(X_test, y_test)

    )

    if save_model:

    if not os.path.exists(filepath):

    os.makedirs(filepath)

    model.save(os.path.join(filepath, ''model.h5''))

    ```


    In order to generate integrated gradients, the target variable specifies which
    class of the output should be considered to calculate the attributions using the
    integration approach.


    ```

    import tensorflow as tf

