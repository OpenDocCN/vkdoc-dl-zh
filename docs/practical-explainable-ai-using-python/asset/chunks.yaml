- fmt: 'The third important method of estimating bias is causal reasoning, which can
    be achieved by creating something like `if/else` conditions. We understand the
    `if/else` condition in a much better way, hence causal reasoning for classifying
    a record into a binary class would provide an additional insight on the biasness
    of the algorithm. The `if/else/then` condition can be applied by taking into consideration
    all of the features that are present in the training dataset.


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig3_HTML.png](images/506619_1_En_2_Chapter/506619_1_En_2_Fig3_HTML.png)


    Figure 2-3


    Metrics for measuring bias


    Ethics in AI systems can be addressed by ensuring the quality of the system set
    by the correctness of the process, the efficiency of the predictions, the robustness
    of the predictions, the explainability of the decisions at an individual level,
    ensuring security and privacy considerations, and making a transparent architecture
    for everyone, so that all the stakeholders are aware of the AI decision making
    system and its internal processes. A good AI system should be accountable for
    the decisions that it generates, thus the decisions need to be fair.


    The current form of AI governance and the associated policies restrict the reuse
    of data for other purposes, but not the use of transfer learning in machine learning.
    The ML and DL models trained in one scenario can be reused in another scenario
    internally or external to the organization. However, the restrictions do not apply
    to the models. The models possess critical information about the training data
    that might be reverse engineered by any developer to gain additional information
    and reuse it for some other purpose. For example, for a virtual trial of spectacles,
    we upload an image and the system classifies the face into a specific category
    which is produced by a trained model, such as oval, square, or round. Accordingly
    the system displays frames designed for that kind of face classification. This
    system can be used by another competitor company to generate their own training
    data and create a parallel system. The General Data Protection Regulation (GDPR)
    was enacted in 2018 to ensure an individual’s right to any AI-driven decisions
    based on their data. If it is personal data, it is required. However, if it is
    non-personal data, then the GDPR regulation does not apply.


    The high-level bias removal process from the predictive models is shown in Figure
    [2-4](#506619_1_En_2_Chapter.xhtml#Fig4). Prediction 1 and prediction 2 should
    match. If they do match, then the data point is considered unbiased; otherwise,
    it is biased. If the data point is biased, then it should be dropped from the
    model training process in order to get a bias-free model.


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig4_HTML.png](images/506619_1_En_2_Chapter/506619_1_En_2_Fig4_HTML.png)


    Figure 2-4


    Bias removal process from model training


    To reduce the biasness in an algorithm model, explainability is a must. The machine
    learning models are generally evaluated before production on the grounds of interpretability,
    robustness, fairness, security, and privacy, and also whether the trained model
    has learned the pattern or undertrained or overtrained. ML model fairness should
    ideally be evaluated for two specific reasons:


    *   Predictions by the models (that is, the decisions generated by the ML models)

    *   The role of data biases on the model’s fairness


    ## Reliability in AI


    The development of AI technology has brought about significant changes in the
    medical imaging field. 3D printed AR and VR experiences deliver real-life experiences
    in a software environment. A robust AI system is reliable if it produces ethical
    insights without any bias and prejudice. There are cases of algorithmic biases
    that were racial, political, and gender oriented that showed up in predictions.
    In order to bring reliability to an AI system, we need to bring ML interpretability,
    design considerations of the ML model, ML model management, and training into
    the picture. The reliability of an AI system for data-driven automated decision
    support depends on the unbiasedness of the algorithms.


    Algorithmic discrimination is one of the negative consequences of biasness in
    the decision making process. It leads to unfair treatment of individuals based
    on their caste, creed, religion, sex, and ethnicity. The reliability of the automated
    decision support system increases as the solution becomes less biased and has
    virtually no discrimination. Consider a credit evaluation or assessment system
    where an AI system makes an evaluation of who should be granted credit and who
    should not be. The decision made by the algorithm may be rational but sometimes
    we have to make it very transparent so that certain group of people may not perceive
    the decision as against their group. Biasness and discrimination in automated
    decision making systems are two different things.


    Discrimination is the unfair and unequal treatment of groups of people or strata
    based on their demographic features or attributes. This kind of discrimination
    is found in decision making AI systems when approving loans and credit requests
    from users. As we move towards more automation and use of AI ML in smart systems,
    there is a larger risk of finding discrimination in the decision making. Hence
    the system must be made discrimination-free by explaining the decisions and making
    the process very transparent. Discrimination is intentional. However, biasness
    is unintentional and inherent in the model training process. Hence the reliability
    of the AI systems will only increase and the adoption of AI systems will only
    go up when we establish a system that is free from both discrimination and biasness.


    To increase the trust and reliability of AI models and associated services developed
    around AI models, it is necessary to explain how the decision is made. Reliability
    of an AI system should be the joint responsibility of all the stakeholders who
    are part of developing the AI solution for the client. Typically, the business
    owner is the client, internal or external to the organization, who provides a
    high level goal of a system and the features that they want developed.


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig5_HTML.png](images/506619_1_En_2_Chapter/506619_1_En_2_Fig5_HTML.png)


    Figure 2-5


    Trust and reliability journey


    It is the role of all the stakeholders to ensure trust and reliability in the
    creation of AI models and the deployment of AI models in a production system (Figure
    [2-5](#506619_1_En_2_Chapter.xhtml#Fig5)). In order to earn trust, proper documentation
    is required when developing the system. The documentation should address certain
    questions. What data is being used to train such a system? Can this model be used
    in some other domain and some other use case? What are the best case scenarios
    where the model will perform better? Do we know cases where the model performs
    poorly? If we know the model performs poorly in certain cases, how do we take
    care of that kind of bias from the system? Is there any mechanism to explain the
    predictions generated by the AI system? These questions should be documented with
    examples and names of the domains and case studies.


    ## Conclusion


    In this chapter, you learned about ethics in designing AI systems, algorithmic
    biases, and model reliability. We humans always find ways to make our understanding
    correct and ways to make it perfect. AI systems are developed and used in an unequal
    world where disastrous things are quite obvious and happen very frequently. We
    learn from our mistakes and frame new rules to take care of them in future. From
    the above three concepts, it is important to bring explainable AI into the fore
    in order to provide at least interpretability, trust, and reliability regarding
    the decisions made by the AI system and to maintain an ethical standards set.'
