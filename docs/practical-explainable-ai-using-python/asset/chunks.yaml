- fmt: '# Knowing Which Model Is Good


    The time series models need to be evaluated using metrics and other diagnostics
    before using the models in a production scenario.


    Metrics:


    - **Root mean square error (RMSE)**: This is a function of scale. The less it
    is, the better the model is.

    - **Mean absolute percentage error (MAPE)**: This is scale-independent. It’s preferred
    to be less than 10%, as per the industry benchmark.


    After the forecasting model has been fit, it is important to know the metrics
    to determine how well the model fits the data. A concept specific to the time
    series model is white noise, which means errors that cannot be explained by the
    model. An error can be considered as white noise if the following properties are
    met:


    - The residual terms are not correlated, which means the autocorrelated function
    represented by the `ACF` value is 0.

    - The residuals follow a normal distribution.


    If the above two are not satisfied, then there is still scope for improving the
    model.


    ## Strategy for Forecasting


    If the business need is to generate a forecast at an upper hierarchy and granular
    level data is available, then there are two ways the forecasting can be generated:


    - Macro level, using the upper hierarchy (example: forecast of sales volume for
    an apparel category is at a macro level and for each stock-keeping unit (SKU)
    it is at a micro level)

    - Micro level and then performing aggregation, using lowest possible granularity


    ## Confidence Interval of Predictions


    Not all time series models provide confidence intervals for the forecasted values.
    The confidence interval of forecasted values provides a meaningful insight. The
    higher the confidence interval, the better the model is. If the models do not
    align to the confidence interval, two scenarios may occur:


    - **A black swan event**: The forecasted value confidence interval is breached
    by an actual value in a significant way, causing havoc.

    - **A gray swan event**: It is less than the confidence interval of forecasted
    value and may result in a suboptimal result.


    In Figure [6-2](#506619_1_En_6_Chapter.xhtml#Fig2), the daily sales are shown
    and the historical data is used to predict the forecast ahead. The dotted line
    shows the forecasted values generated by the model, the two parallel black lines
    show the confidence interval on the forecasted values, and the confidence interval
    has an upper threshold at the upper line and a lower threshold at the lower line.
    If the forecasted values exceed the upper threshold like point A, it is called
    a black swan event, and if the forecasted values exceed the lower threshold point
    B, it is called a grey swan event.


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig2_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Black swan and grey swan events


    ## What Happens to Trust?


    The objective of XAI is to explain to the end user whether they should believe
    the prediction or decide on competing models that can be more trustworthy. The
    above two scenarios, the black swan and gray swan events, are extremely difficult
    to predict. If they occur once or twice, it’s fine. If the model fails to identify
    such scenarios frequently, then the user will not have faith or trust in the model.
    One of the ways to control these kinds of events is to generate the confidence
    interval at a higher threshold value such as a 90% confidence limit. Other scenarios
    need to be explained using model parameters.


    The dataset has a date stamp and a price of some product. This is considered a
    univariate time series model. You need to generate the forecasted values for the
    future.


    ```python

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    %matplotlib inline

    df = pd.read_csv(''/Users/pradmishra/Downloads/XAI Book Apress/monthly_csv.csv'',index_col=0)

    df

    # line plot of time series

    # line plot of dataset

    df.plot()

    ```


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig3_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Price over dates


    In Figure [6-3](#506619_1_En_6_Chapter.xhtml#Fig3), the data in the dataset shows
    variations in price, with trends and some degree of jump towards the end of 2016.
    There is some degree of seasonality in the time series model. Seasonality means
    the same values of price will occur in a particular time period and there will
    be repeated events like this. If it is more than one, then it can be confirmed
    that seasonality exists in the data. To incorporate seasonality in the forecasted
    values, you can extend the time series model to seasonally adjusted model variants.
    But if you want to remove the impact of seasonal elements from the forecasted
    value, you need to adjust the time series by using a difference method. The difference
    is the time series minus its own values in the past by one period. The seasonally
    adjusted data can be stored separately.


    ```python

    # seasonal difference

    differenced = df.diff(12)

    # trim off the first year of empty data

    differenced = differenced[12:]

    # save differenced dataset to file

    differenced.to_csv(''seasonally_adjusted.csv'', index=False)

    # plot differenced dataset

    differenced.plot()

    plt.show()

    ```


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig4_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    The seasonally differenced time series data


    In Figure [6-4](#506619_1_En_6_Chapter.xhtml#Fig4), the same seasonally adjusted
    time series is represented. The autoregressive integrated moving average (ARIMA)
    models are most frequently used in the industry. They explain the autocorrelations
    in the data. A stationary time series can be defined as a series whose values
    do not depend on when it actually occurred. Any time series with trends and seasonality
    is not stationary. However, a time series with cyclicity is stationary in nature.
    One of the ways to make the time series stationary is by applying the differencing
    method, because stationarity is one of the assumptions of the ARIMA model. The
    differencing helps to reduce the trends and seasonality in the data and hence
    make it stationary. The autocorrelation function (ACF) is one of the ways to identify
    stationarity; the `ACF` will drop to zero quickly. However, for a non-stationary
    time series, the value of correlation remains fairly higher and the decay in the
    correlation value is also very insignificant.


    ```python

    from statsmodels.graphics.tsaplots import plot_acf

    plot_acf(df)

    plt.show()

    ```


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig5_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Autocorrelation function of price'
