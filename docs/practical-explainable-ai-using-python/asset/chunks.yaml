  trans: '

    ### 使用 Deep SHAP


    Deep SHAP 是一个用于从基于深度学习（使用 Keras 或 TensorFlow 构建）的模型中推导 SHAP 值的框架。你可以以 MNIST 数据集为例，其中某个样本数据点显示了数字的像素值，并且训练了一个深度学习模型来对图像进行分类。SHAP
    值如下所示。


    如果我们将机器学习模型与深度学习模型进行比较，机器学习模型仍然是可解释的，但神经网络模型，尤其是深度神经网络模型，本质上是黑盒，这阻碍了 AI 模型在工业界的应用，因为没有人能够解释深度学习模型预测的应用。深度学习重要特征（DeepLIFT）是一个于
    2019 年 10 月出现的框架。它旨在应用一种方法来分解深度神经网络模型的输出预测。这是通过反向传播深度神经网络中所有神经元对输入每个特征的贡献来实现的。DeepLIFT
    框架通过将每个神经元的激活与其对应的激活进行比较，并分配一个分数（称为贡献分数）来实现这一点。


    ### 使用 Alibi


    除了 DeepLIFT 和 Deep SHAP 之外，还有另一个名为 Alibi 的开源库。它是一个基于 Python 的库，旨在解释机器学习模型。以下代码说明了如何安装
    Alibi 以及如何使用另一个名为 Ray 的库来加速对 Alibi 的搜索。


    ```

    !pip install alibi

    ```


    上述代码安装了用于解释模型的 Alibi 库。


    ```

    !pip install alibi[ray]

    ```


    `alibi[ray]` 库是一个依赖库，也需要安装。


    ```

    !pip install tensorflow_datasets

    ```


    你可以使用 `tensorflow_datasets` 从该库中收集一些数据集，以便在本章中使用。


    ```

    !pip install keras

    ```


    Keras 库用于训练深度学习模型。


    ```

    from __future__ import print_function

    import keras

    from keras.datasets import mnist

    from keras.models import Sequential

    from keras.layers import Dense, Dropout, Flatten

    from keras.layers import Conv2D, MaxPooling2D

    from keras import backend as K

    import matplotlib.pyplot as plt

    %matplotlib inline

    batch_size = 128

    num_classes = 10

    epochs = 12

    # input image dimensions

    img_rows, img_cols = 28, 28

    ```


    MNIST 是一个数字分类数据集，包含手写数字的图片，并由专家标注，以便模型学习模式。`Conv2D` 是一个二维卷积层，它转换权重并对图像像素执行空间卷积。你在
    `Conv2D` 中提供的值是卷积层将要学习的滤波器数量。卷积之后，需要最大池化来在低维空间中压缩表示像素。因此，每个卷积层都需要一个最大池化层。最大池化层还需要一个输出矩阵大小。在以下脚本中，你在
    `Conv2D` 层中使用了 32 个滤波器，内核大小或滤波器大小为 (3,3)。最大池化通常用于减少输出体积的空间维度。内核大小必须是奇数组合，例如 (1,1)、(3,3)
    或 (5,5)，以确保内核滤波器平滑地遍历空间空间。`Stride` 是使滤波器在像素空间中移动的值。`stride =1` 意味着滤波器在像素矩阵中向右移动一个位置。一旦到达像素矩阵的边缘，它就会向下移动，一直移动到可能的最低行，然后向左移动。当你在像素空间中移动奇数内核以收集所有卷积特征时，有时滤波器不会到达像素矩阵的边缘。为了实现这一点，你在原始像素矩阵周围添加一行和一列。这称为填充。填充可以是零填充和相同填充。


    ```

    # the data, split between train and test sets

    (x_train, y_train), (x_test, y_test) = mnist.load_data()

    if K.image_data_format() == ''channels_first'':

    x_train = x_train.reshape(x_train.shape[0], 1, img_rows, img_cols)

    x_test = x_test.reshape(x_test.shape[0], 1, img_rows, img_cols)

    input_shape = (1, img_rows, img_cols)

    else:

    x_train = x_train.reshape(x_train.shape[0], img_rows, img_cols, 1)

    x_test = x_test.reshape(x_test.shape[0], img_rows, img_cols, 1)

    input_shape = (img_rows, img_cols, 1)

    x_train = x_train.astype(''float32'')

    x_test = x_test.astype(''float32'')

    x_train /= 255

    x_test /= 255

    print(''x_train shape:'', x_train.shape)

    print(x_train.shape[0], ''train samples'')

    print(x_test.shape[0], ''test samples'')

    ```


    上述脚本展示了从 Keras 库获取数据，并使用加载的数据对训练样本和测试样本进行归一化的一般步骤。这是通过将每个像素值除以其最大像素值来完成的。之后，60,000
    个样本用于训练，10,000 个样本用于测试。这里的图像大小为 28 x 28 像素，批量大小为 128，类别数为 10，每个数字对应一个类别图像。此外，你使用
    10 次迭代或周期来训练模型。

    '
- fmt: '# 图像分类模型与 SHAP 解释器


    ```

    # convert class vectors to binary class matrices

    y_train = keras.utils.to_categorical(y_train, num_classes)

    y_test = keras.utils.to_categorical(y_test, num_classes)

    model = Sequential()

    model.add(Conv2D(32, kernel_size=(3, 3),

    activation=''relu'',

    input_shape=input_shape))

    model.add(Conv2D(64, (3, 3), activation=''relu''))

    model.add(MaxPooling2D(pool_size=(2, 2)))

    model.add(Dropout(0.25))

    model.add(Flatten())

    model.add(Dense(128, activation=''relu''))

    model.add(Dropout(0.5))

    model.add(Dense(num_classes, activation=''softmax''))

    ```


    此处用作示例的图像分类模型包含三个部分，外加用于降维的卷积和最大池化操作。使用`Dropout`和`Flatten`是为了移除低概率权重，从而限制模型过拟合。`Flatten`添加层以重塑数据，便于后续矩阵乘法。你还使用了一个全连接层（`Dense`）来创建在低维空间中运行的完全连接神经网络模型，从而以更高的准确率对目标类别进行分类。激活函数是在权重与来自上一层的特征进行点积乘法后使用的传递函数。为了获得每个类别的概率，你需要在神经网络模型的最后一层使用`softmax`激活函数。


    ```

    model.compile(loss=keras.losses.categorical_crossentropy,

    optimizer=keras.optimizers.Adadelta(),

    metrics=[''accuracy''])

    ```


    模型结构设计完成后，下一步是编译模型。在`Keras`库中，编译步骤包含若干参数；其中重要的是损失函数、优化器和评估指标。除此之外，还有其他参数可用于微调模型并重新训练，以限制模型过拟合。误差函数或损失函数的选择应基于任务。如果目标列包含两个以上的类别，则可以使用分类交叉熵（`categorical_crossentropy`）。优化器的作用是优化损失函数，并找到损失函数最小的步骤。评估指标的功能是计算每个训练周期（epoch）对应的模型准确率。


    ```

    model.fit(x_train, y_train,

    batch_size=batch_size,

    epochs=epochs,

    verbose=1,

    validation_data=(x_test, y_test))

    ```


    所有训练周期的结果无法在日志中完整呈现，因此此处进行了截断，但请留意日志，以识别模型开始学习或准确率趋于平稳等迭代节点。从以下结果来看，分类模型的测试准确率为
    85.28%。


    ```

    score = model.evaluate(x_test, y_test, verbose=0)

    print(''Test loss:'', score[0])

    print(''Test accuracy:'', score[1])

    import tensorflow as tf

    tf.compat.v1.disable_v2_behavior() # run this if you get tensor related error

    ```


    ## SHAP 深度学习解释器


    `SHAP`库包含一个深度解释器模块，该模块提供了一种表示方法，用于展示在分类任务中（通常以及针对特定类别）的正向和负向属性或贡献。


    ```

    background = x_train[np.random.choice(x_train.shape[0],100, replace=False)]

    explainer = shap.DeepExplainer(model,background)

    shap_values = explainer.shap_values(x_test[1:5])

    # plot the feature attributions

    shap.image_plot(shap_values, -x_test[1:5])

    ```


    ![../images/506619_1_En_9_Chapter/506619_1_En_9_Fig3_HTML.png](images/506619_1_En_9_Chapter/506619_1_En_9_Fig3_HTML.png)


    **图 9-3** 图像分类的深度解释器


    在图 9-3 中，红色值表示预测类别的正向类别，蓝色值表示预测类别的负向类别。该图显示了数字 2、1、0 和 4 的 SHAP 值。模型针对这四个图像值生成了
    10 个预测。红色值使预测值接近最左侧的输入图像，而负向值则使预测值相对于左侧的输入图像降低。Deep SHAP 是基于一篇发表在 NIPS 上的论文开发的。


    `DeepLIFT` 在分类和回归模型生成预测后，使用类似于反向传播的方法来估算 SHAP 值。


    ```

    # plot the feature attributions

    shap.image_plot(shap_values, -x_test[5:9])

    ```


    ![../images/506619_1_En_9_Chapter/506619_1_En_9_Fig4_HTML.png](images/506619_1_En_9_Chapter/506619_1_En_9_Fig4_HTML.png)


    **图 9-4** 更多记录的深度解释器


    在图 9-4 中，打印了另外四个数字及其对应的 SHAP 分数。如果你观察数字 5 和 1，会发现模式上存在一致性。然而，当观察数字 4 和 9 时，存在模糊性，因为某些情况下
    SHAP 分数并不能清晰地帮助预测该类别。


    ```

    # plot the feature attributions

    shap.image_plot(shap_values, -x_test[9:13])

    ```


