    (0.020325731155606916, ''area_code_tr'')]

    # extract the arrays that define the tree

    children_left = dt2.tree_.children_left

    children_right = dt2.tree_.children_right

    children_default = children_right.copy() # because sklearn does not use missing
    values

    features = dt2.tree_.feature

    thresholds = dt2.tree_.threshold

    values = dt2.tree_.value.reshape(dt2.tree_.value.shape[0], 2)

    node_sample_weight = dt2.tree_.weighted_n_node_samples

    print("     children_left", children_left)

    # note that negative children values mean this is a leaf node

    print("    children_right", children_right)

    print("  children_default", children_default)

    print("          features", features)

    print("        thresholds", thresholds.round(3))

    print("            values", values.round(3))

    print("node_sample_weight", node_sample_weight)

    ```


    The decision tree classifier model has an attribute called `tree_`, which allows
    you to get a detailed explanation about the model object. It stores the entire
    binary tree structure in the form of parallel arrays. Node 0 is the root node
    and the rest of the parameters are explained in Table [4-2](#506619_1_En_4_Chapter.xhtml#Tab2).
    The ID of the left child or right child whenever it assumes a negative value such
    as -1 implies that it is a leaf node, where the decision tree terminates.


    Table 4-2


    Low-Level Attribute Extraction for a Decision Tree


    | Parameters | Explanation |

    | --- | --- |

    | **dt2.tree_.node_count** | Total number of nodes in the tree |

    | **tree_.children_left[i]** | Id of the left child of node i |

    | **tree_.children_right[i]** | Id of the right child of node i |

    | **tree_. feature[i]** | Feature used for splitting node i |

    | **tree_.threshold[i]** | Threshold value at node i |

    | **tree_.n_node_samples[i]** | The number of training samples reaching node i
    |

    | **tree_. impurity[i]** | The impurity at node i |

    | **tree_.weighted_n_node_samples** | `n_node_samples` is the count of actual
    dataset samples in each node. `weighted_n_node_samples` is the same, weighted
    by the `class_weight` and/or `sample_weight`. |


    ```

    # define a custom tree model

    tree_dict = {

    "children_left": children_left,

    "children_right": children_right,

    "children_default": children_default,

    "features": features,

    "thresholds": thresholds,

    "values": values,

    "node_sample_weight": node_sample_weight

    }

    model = {

    "trees": [tree_dict]

    }

    import shap

    explainer = shap.TreeExplainer(model)

    # Provide Probability as Output

    def model_churn_proba(x):

    return dt2.predict_proba(x)[:,1]

    # Provide Log Odds as Output

    def model_churn_log_odds(x):

    p = dt2.predict_log_proba(x)

    return p[:,1] - p[:,0]

    # make a standard partial dependence plot

    sample_ind = 25

    fig,ax = shap.partial_dependence_plot(

    "total_day_minutes", model_churn_proba, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False

    )

    ```


    ## Decision Tree – SHAP


    The SHAP Python library can be used to explain a decision tree. The SHAP library
    has useful functions that provide additional insights into model explainability.


    ```

