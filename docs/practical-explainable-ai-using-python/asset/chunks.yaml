- fmt: '# Using the Interpret Explaining Boosting Model


    In this section, you are going to use the generalized additive models (GAM) to
    predict the housing prices. You can explain the model fitted using the SHAP library.
    The generalized additive model can be trained using the `interpret` Python library,
    and then the trained model object can be passed through the SHAP model to generate
    explanations for the boosting models.


    The `interpret` library can be installed three ways:


    ```

    !pip install interpret-core

    ```


    This is without any dependency using the `pip install` process.


    ```

    conda install -c interpretml interpret-core

    ```


    This is using an anaconda distribution. You can install using the terminal from
    the conda environment.


    ```

    git clone https://github.com/interpretml/interpret.git && cd interpret/scripts
    && make install-core

    ```


    This is straight from the source using GitHub.


    The `interpret` Python library supports two kinds of algorithms:


    - **Glassbox models**: These are designed to be more interpretable, using the
    `scikit-learn` framework, maintaining the same level of accuracy as the state-of-the-art
    `sklearn` library. They support four different kinds of models: linear models,
    decision trees, decision rules, and boosting-based models.

    - **Blackbox explainers**: These are designed to provide approximate explanations
    on how the model behaves and the model predictions. These variants of algorithms
    will be useful when none of the components of the machine learning model are interpretable.
    They support Shapely explanations, LIME explanations, partial dependency plots,
    and Morris sensitivity analysis.


    ```

    # fit a GAM model to the data

    import interpret.glassbox

    model_ebm = interpret.glassbox.ExplainableBoostingRegressor()

    model_ebm.fit(X, y)

    ```


    First, you must import the `glassbox` module from `interpret`, initialize the
    explainable boosting regressor, and fit the model. The model object is `model_ebm`.


    ```

    # explain the GAM model with SHAP

    explainer_ebm = shap.Explainer(model_ebm.predict, X100)

    shap_values_ebm = explainer_ebm(X)

    ```


    You will sample the training dataset and take 100 samples to create a background
    for generating explanations using the SHAP library. In the SHAP explainer you
    use `model_ebm.predict` and you take 100 samples to generate the explanations.


    ```

    # make a standard partial dependence plot with a single SHAP value overlaid

    fig,ax = shap.partial_dependence_plot(

    "RM", model_ebm.predict, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False,

    shap_values=shap_values_ebm[sample_ind:sample_ind+1,:]

    )

    ```


    Figure 5-8 shows the boosting-based model. You can see a stage-wise break non-linear
    curve and the non-linear relationship between the RM values and the predicted
    target column, which is the average value of housing prices. Again you are explaining
    the same 18th record here, as shown by the red straight line.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig8_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig8_HTML.jpg)


    **Figure 5-8** Boosting model PDP plot for RM feature


    ```

    shap.plots.scatter(shap_values_ebm[:,"RM"])

    ```


    In Figure 5-9 the relationship shows as a non-linear curve. In the initial stages,
    as the RM increases, the predicted value does not increase much, but after a certain
    stage as the RM value increases, the SHAP value for RM also increases exponentially.
    See also Figure 5-10.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig10_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig10_HTML.jpg)


    **Figure 5-10** Waterfall plot for the same set of variables


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig9_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig9_HTML.jpg)


    **Figure 5-9** The RM and SHAP for RM


    ```

    # the waterfall_plot shows how we get from explainer.expected_value to model.predict(X)[sample_ind]

    shap.plots.waterfall(shap_values_ebm[sample_ind], max_display=14)

    ```


    ```

    # the waterfall_plot shows how we get from explainer.expected_value to model.predict(X)[sample_ind]

    shap.plots.beeswarm(shap_values_ebm, max_display=14)

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig11_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig11_HTML.jpg)


    **Figure 5-11** Feature value vs. SHAP value


    Figure 5-11 is another visualization of the SHAP value and the feature value.


    ```

    # train XGBoost model

    import xgboost

    model_xgb = xgboost.XGBRegressor(n_estimators=100, max_depth=2).fit(X, y)

    # explain the GAM model with SHAP

    explainer_xgb = shap.Explainer(model_xgb, X100)

    shap_values_xgb = explainer_xgb(X)

    # make a standard partial dependence plot with a single SHAP value overlaid

    fig,ax = shap.partial_dependence_plot(

    "RM", model_xgb.predict, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False,

    shap_values=shap_values_ebm[sample_ind:sample_ind+1,:]

    )

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig12_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig12_HTML.jpg)


    **Figure 5-12** PDP plot for RM and SHAP values extracted


    In Figure 5-12, the extreme gradient boosting regression model is used to explain
    the ensemble models and here also you can see there is a non-linear relationship.


    ```

    shap.plots.scatter(shap_values_xgb[:,"RM"])

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig13_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig13_HTML.jpg)


    **Figure 5-13** RM and SHAP values of the RM scatterplot


    In Figure 5-13, there is a curve that shows a non-linear association between RM
    and the SHAP value of RM.


    ```

    shap.plots.scatter(shap_values_xgb[:,"RM"], color=shap_values)

    ```


    Figure 5-14 shows the same non-linear relationship with an additional overlay
    of the TAX feature, which shows the higher the RM value, the higher the TAX component
    and vice versa.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig14_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig14_HTML.jpg)


    **Figure 5-14** RM and the SHAP of RM can be shown by a third dimension, which
    is color'
