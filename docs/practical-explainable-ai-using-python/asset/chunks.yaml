- fmt: '# Counterfactual for Regression Tasks


    In a regression scenario, the counterfactual explanations can be viewed by looking
    at the neural network model using the Boston housing prices dataset. Regression
    is a task when the target column is a continuous variable and you can use a mix
    of variables such as continuous and categorical variables. The Boston housing
    prices dataset is a common dataset for learning regression, so I selected it to
    showcase counterfactuals, as users are more familiar with this dataset.


    ```

    import tensorflow as tf

    tf.get_logger().setLevel(40) # suppress deprecation messages

    tf.compat.v1.disable_v2_behavior() # disable TF2 behaviour as alibi code still
    relies on TF1 constructs

    from tensorflow.keras.layers import Dense, Input

    from tensorflow.keras.models import Model, load_model

    from tensorflow.keras.utils import to_categorical

    import matplotlib

    %matplotlib inline

    import matplotlib.pyplot as plt

    import numpy as np

    import os

    from sklearn.datasets import load_boston

    from alibi.explainers import CounterFactualProto

    print(''TF version: '', tf.__version__)

    print(''Eager execution enabled: '', tf.executing_eagerly()) # False

    boston = load_boston()

    data = boston.data

    target = boston.target

    feature_names = boston.feature_names

    y = np.zeros((target.shape[0],))

    y[np.where(target > np.median(target))[0]] = 1

    data = np.delete(data, 3, 1)

    feature_names = np.delete(feature_names, 3)

    mu = data.mean(axis=0)

    sigma = data.std(axis=0)

    data = (data - mu) / sigma

    idx = 475

    x_train,y_train = data[:idx,:], y[:idx]

    x_test, y_test = data[idx:,:], y[idx:]

    y_train = to_categorical(y_train)

    y_test = to_categorical(y_test)

    np.random.seed(42)

    tf.random.set_seed(42)

    def nn_model():

    x_in = Input(shape=(12,))

    x = Dense(40, activation=''relu'')(x_in)

    x = Dense(40, activation=''relu'')(x)

    x_out = Dense(2, activation=''softmax'')(x)

    nn = Model(inputs=x_in, outputs=x_out)

    nn.compile(loss=''categorical_crossentropy'', optimizer=''sgd'', metrics=[''accuracy''])

    return nn

    ```


    The script above is a neural network model for regression. The script below is
    the neural network architecture summary:


    ```

    nn = nn_model()

    nn.summary()

    nn.fit(x_train, y_train, batch_size=64, epochs=500, verbose=0)

    nn.save(''nn_boston.h5'', save_format=''h5'')

    ```


    The trained model object `nn_boston.h5` is saved to generate the counterfactuals.


    ```

    nn = load_model(''nn_boston.h5'')

    score = nn.evaluate(x_test, y_test, verbose=0)

