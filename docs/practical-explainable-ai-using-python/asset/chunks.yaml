    # 基于 N-gram 的文本分类


    让我们考虑两种开发文本分类模型的新方法。对于文本分类，你可以使用单词或字符。以下脚本分析字符并提取从二元组到五元组的特征，并将这些 n-gram 作为`tf-idf`向量化器中的特征。向量创建后，评论数据被输入到管道中进行模型训练。情感分类的训练准确率达到
    99.8%，效果不错。现在你可以解释单个预测，并查看哪些因素有助于正面情感，哪些因素导致负面情感（见表 7-4 和图 7-9）。


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig9_HTML.jpg](img/506619_1_En_7_Fig9_HTML.jpg)


    **图 7-9** 模型中二元组和五元组特征的高亮显示


    **表 7-4** 采用基于 N-gram 的向量化器作为预处理方法，并考虑从二元组到五元组的 n-gram，使用`TF-IDF`向量化器创建训练模型，下表
    7-4 显示了分类报告


    | ![../images/506619_1_En_7_Chapter/506619_1_En_7_Figd_HTML.jpg](img/506619_1_En_7_Figd_HTML.jpg)
    |


    ```

    vec = TfidfVectorizer(stop_words=''english'', analyzer=''char'',

    ngram_range=(2,5))

    clf = LogisticRegressionCV()

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    ```


    ```

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```


    在上述脚本中，你选取了第一条评论的总贡献，即绿色和红色高亮文本元素的净结果，结果为+3.106。由于净结果为+3.106，它被归类为正面情感，同时显示正面情感的概率为
    0.949，分类的对数几率为 2.914。-0.192 是偏置项，也称为逻辑回归模型的截距项。


    当文本文档长度较短时，`CountVectorizer`是合适的。如果文本长度较长，意味着每个词在文本中出现频率高或重复多次，那么你应该使用`TfidfVectorizer`。`CountVectorizer`只是将单词及其频率以表格格式或数组形式表示。从以下脚本可以看出，带有停用词移除功能的`CountVectorizer`减少了特征数量，使其更具相关性。模型训练后，你可以看到准确率为
    94.8%。


    此外，当你解释第一条评论时，绿色和红色高亮文本的净结果总和为+1.315，由于净结果为正值，该情感被标记为正面情感，概率得分为 78.7%，对数几率得分为
    1.307。你可以不断更新特征提取方法和模型类型，以改进预测效果。模型越好，情感分类的解释就越清晰。以下脚本展示了未经过停用词移除处理的`tf-idf`向量作为特征。


    你可以在图 7-10 的高亮文本中看到，有一些停用词以及二元组和三元组没有被正确标记颜色。为了解决这个问题，你可以在分析器中使用`char_wb`选项。之前你已经见过`char`作为分析器，因为它将文本解析为字符形式的
    n-gram，但这个过程耗时较长。此外，`char_wb`更适合微调，用于选取那些 n-gram 之间不重叠的特征。


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig10_HTML.jpg](img/506619_1_En_7_Fig10_HTML.jpg)


    **图 7-10** 非重叠字符 N-gram 作为特征重要性


    ```

    vec = TfidfVectorizer(stop_words=''english'', analyzer=''char_wb'',

    ngram_range=(2,5))

    clf = LogisticRegressionCV()

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```


    这次结果看起来更好。例如，“watching just 1”是一个负面的 n-gram，它没有与其他任何 n-gram 重叠，这很有意义。类似地，其他 n-gram
    也更加精细。如果电影评论只有几行文字，你可以使用`CountVectorizer`或`TfidfVectorizer`，但如果评论变得冗长，那么`HashingVectorizer`就能派上用场。当评论长度增加时，词汇量也会增大，因此`HashingVectorizer`非常有用。在以下脚本中，引入了`HashingVectorizer`与一种高级机器学习模型——随机梯度下降分类器相结合。这产生了比之前模型更好的效果（图
    7-11）。这是因为之前的模型也存在轻微的过拟合。为了探索可解释性，你可以使用同样的第一条评论文本，解释分类标签，并查看哪些词对正面情感和负面情感有贡献。


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig11_HTML.jpg](img/506619_1_En_7_Fig11_HTML.jpg)


    **图 7-11** 非常精细的高亮特征能更好地解释预测结果


    ```

    from sklearn.feature_extraction.text import HashingVectorizer

    from sklearn.linear_model import SGDClassifier

    vec = HashingVectorizer(stop_words=''english'', ngram_range=(1,2))

    clf = SGDClassifier(random_state=42)

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```


    第一条评论是正面情感，总体正面得分为+0.243，得分为 0.269。它只考虑了绿色和红色文本高亮显示的相关特征。


    ```

    from eli5.sklearn import InvertableHashingVectorizer

    import numpy as np

    ivec = InvertableHashingVectorizer(vec)

    sample_size = len(imdb.review) // 10

    X_sample = np.random.choice(imdb.review, size=sample_size)

    ivec.fit(X_sample)

    eli5.show_weights(clf, vec=ivec, top=20,

    target_names=set(imdb.sentiment))

    ```


    可逆哈希向量化器有助于在不拟合巨大词汇表的情况下，从哈希向量化器中提取特征权重及其对应的特征名称。图 7-12 中的笔记本输出显示了正面和负面特征。


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig12_HTML.jpg](img/506619_1_En_7_Fig12_HTML.jpg)


    **图 7-12** 正面类别预测的顶级特征

