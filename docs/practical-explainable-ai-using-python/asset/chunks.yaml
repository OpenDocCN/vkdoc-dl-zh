- fmt: '### Global Explanation and Overall Predictions in ML Model


    The `beeswarm` plot is a visualization designed to display an information-dense
    summary of how the top features in a dataset impact the model’s output. Each instance
    of the given explanation is represented by a single dot on each feature row. The
    center position of the dot is determined by the SHAP value of that feature, and
    the dots “pile up” along each feature row to show density. Color is used to display
    the original value of a feature. In the plot in Figure [3-8](#506619_1_En_3_Chapter.xhtml#Fig8),
    you can see that age and power BHP are the most important features on average.


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig8_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig8_HTML.jpg)


    **Figure 3-8** Beeswarm chart showing positive and negative SHAP value


    - The higher the power BHP, the higher the impact on the model output, as you
    know that with higher power BHP comes a higher car price.

    - Similarly, the age of the car is negatively associated with the predicted price
    of the car. Hence, the younger the car, the more impact it will have on the model
    output, as displayed on the graph below.

    - By default, the beeswarm plot shows 10 features. You can change that parameter
    by changing the `max display` option. By default, the features are ordered based
    on the mean absolute value of the SHAP values.

    - By default, the features are ordered using `shap_values.abs.mean(0)`, which
    is the mean absolute value of the SHAP values for each feature. This order, however,
    places more emphasis on a broad average impact and less on rare but high magnitude
    impacts.

    - If you want to find features with high impacts for individual people, you can
    instead sort by the max absolute value.


    ```

    # the waterfall_plot shows how we get from shap_values.base_values to model.predict(X)[sample_ind]

    shap.plots.beeswarm(shap_values)

    ```


    By default, the beeswarm plot uses a color palate of red and blue. You can customize
    and change the colors as well (Figure [3-9](#506619_1_En_3_Chapter.xhtml#Fig9)).


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig9_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig9_HTML.jpg)


    **Figure 3-9** Beeswarm plot using a different color palate


    ```

    import matplotlib.pyplot as plt

    shap.plots.beeswarm(shap_values, color=plt.get_cmap("cool"))

    ```


    There is one option to show the SHAP values using the bar plot, where the mean
    absolute average of the SHAP values are taken into consideration. The horizontal
    axis in Figure [3-10](#506619_1_En_3_Chapter.xhtml#Fig10) shows the mean absolute
    SHAP value and the vertical axis shows the features. The five least important
    features are clubbed together. Also, there is an option to see the maximum absolute
    value of all features with respect to the features. The max absolute SHAP values
    indicate influential observations in the training data set that swayed the predictions.
    Passing a matrix of SHAP values to the heatmap plot function creates a plot with
    the instances on the x-axis, the model inputs on the y-axis, and the SHAP values
    encoded on a color scale. By default, the samples are ordered using `shap.order.hclust`,
    which orders the samples based on a hierarchical clustering by their explanation
    similarity. See Figures [3-11](#506619_1_En_3_Chapter.xhtml#Fig11) and [3-12](#506619_1_En_3_Chapter.xhtml#Fig12)
    as well.


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig12_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig12_HTML.jpg)


    **Figure 3-12** Feature instance with SHAP association


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig11_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig11_HTML.jpg)


    **Figure 3-11** Maximum absolute SHAP values


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig10_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig10_HTML.jpg)


    **Figure 3-10** Mean absolute values of SHAP values


    ```

    shap.plots.bar(shap_values)

    ```


    ```

    shap.plots.bar(shap_values.abs.max(0))

    ```


    ```

    shap.plots.heatmap(shap_values[:1000])

    ```


    This results in samples that have the same model output for the same reason getting
    grouped together (such as people with a high impact from power BHP and age). The
    output of the model is shown above the heatmap matrix in Figure [3-12](#506619_1_En_3_Chapter.xhtml#Fig12)
    (centered around the explanation’s `.base_value`), and the global importance of
    each model’s input is shown as a bar plot on the right-hand side of the plot (by
    default, this is the `shap.order.abs.mean` measure of the overall importance).'
