    下一步是创建模型并验证训练集和测试集之间的准确性。有两个模型，`dt1` 和 `dt2`：一个限制了最大深度，另一个对最大深度没有限制。区别在于 `dt1`
    是一个过拟合模型，而 `dt2` 是一个进行了树剪枝且没有过拟合的模型。


