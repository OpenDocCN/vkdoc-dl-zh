- fmt: '## Using SHAP for Ensemble Models


    You will take into consideration two different datasets. You will use the popular
    Boston housing prices dataset to explain the model predictions in a regression
    use case scenario and the adult dataset to explain the classification scenario.
    The following are the variables from the Boston housing prices dataset:


    - `CRIM`: Per capita crime rate by town

    - `ZN`: Proportion of residential land zoned for lots over 25,000 sq.ft.

    - `INDUS`: Proportion of non-retail business acres per town

    - `CHAS`: Charles River dummy variable (1 if tract bounds river; 0 otherwise)

    - `NOX`: Nitric oxide concentration (parts per 10 million)

    - `RM`: Average number of rooms per dwelling

    - `AGE`: Proportion of owner-occupied units built prior to 1940

    - `DIS`: Weighted distances to five Boston employment centers

    - `RAD`: Index of accessibility to radial highways

    - `TAX`: Full value property tax rate per $10,000

    - `PTRATIO`: Pupil-teacher ratio by town

    - `B`: 1000(Bk - 0.63)^2 where Bk is the proportion of blacks by town

    - `LSTAT`: % lower status of the population

    - `MEDV`: Median value of owner-occupied homes in $1000s


    ```

    import pandas as pd

    import shap

    import sklearn

    # boston Housing price prediction

    X,y = shap.datasets.boston()

    X100 = shap.utils.sample(X, 1000) # 1000 instances for use as the background distribution

    # a simple linear model

    model = sklearn.linear_model.LinearRegression()

    model.fit(X, y)

    ```


    The Boston housing prices dataset is now part of the SHAP library. The base model
    calculation happens using the linear regression model so that you can perform
    the ensemble model on this dataset and compare the results.


    ```

    print("Model coefficients:\n")

    for i in range(X.shape[1]):

    print(X.columns[i], "=", model.coef_[i].round(4))

    ```


    **Table 5-5** Model Coefficients from the Linear Regression Model


    | Model coefficients: |

    | CRIM = -0.108 |

    | ZN = 0.0464 |

    | INDUS = 0.0206 |

    | CHAS = 2.6867 |

    | NOX = -17.7666 |

    | RM = 3.8099 |

    | AGE = 0.0007 |

    | DIS = -1.4756 |

    | RAD = 0.306 |

    | TAX = -0.0123 |

    | PTRATIO = -0.9527 |

    | B = 0.0093 |

    | LSTAT = -0.5248 |


    The coefficients from a base model are the starting point (Table 5-5). Subsequently
    you will look at the complex ensemble models and compare the coefficients with
    the base linear model. Also, you can compare the explanations. The better the
    prediction, the better the explainability.


    ```

    shap.plots.partial_dependence(

    "RM", model.predict, X100, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    The horizontal dotted line `E[f(x)]` shown in Figure 5-4 is nothing but the predicted
    median value of the housing price average.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig4_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig4_HTML.jpg)


    **Figure 5-4** PDP for `RM` and predicted housing price using the `X100` subset
    sample


    If you take the average of the predicted outcome, it is 22.84. There is a linear
    relationship between the `RM` feature and the predicted outcome from the model,
    as shown in Figure 5-4.


    ```

    # compute the SHAP values for the linear model

    explainer = shap.Explainer(model.predict, X100)

    shap_values = explainer(X)

    # make a standard partial dependence plot

    sample_ind = 18

    shap.partial_dependence_plot(

    "RM", model.predict, X100, model_expected_value=True,

    feature_expected_value=True, ice=False,

    shap_values=shap_values[sample_ind:sample_ind+1,:]

    )

    ```


    Figure 5-5 shows that the marginal contribution of the `RM` feature towards the
    predicted value of the target column is a linear relationship, as shown by the
    upward-rising straight line. The red line shows the difference between the predicted
    value and the average predicted value. The SHAP value is equivalent to the predicted
    value.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig5_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig5_HTML.jpg)


    **Figure 5-5** Row number 18 from the dataset is superimposed on the PDP plot


    ```

    X100 = shap.utils.sample(X,100)

    model.predict(X100).mean()

    model.predict(X100).min()

    model.predict(X100).max()

    shap_values[18:19,:]

    X[18:19]

    model.predict(X[18:19])

    shap_values[18:19,:].values.sum() + shap_values[18:19,:].base_values

    ```


    So the predicted outcome for record no 18 is 16.178 and the sum of the SHAP values
    from different features plus the base value, which is the average prediction value,
    is equivalent to the predicted value, which is 16.178.


    ```

    shap.plots.scatter(shap_values[:,"RM"])

    ```


    In Figure 5-6, the relationship is linear because the SHAP values are generated
    using the linear model as an explainer. If you switch to a non-linear model, you
    can expect the line to be non-linear.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig7_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig7_HTML.jpg)


    **Figure 5-7** Relationship between predicted result and SHAP values


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig6_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig6_HTML.jpg)


    **Figure 5-6** Linear relationship between the `RM` and SHAP values for `RM`


    ```

    # the waterfall_plot shows how we get from shap_values.base_values to model.predict(X)[sample_ind]

    shap.plots.waterfall(shap_values[sample_ind], max_display=14)

    ```


    In Figure 5-7, the horizontal axis shows the predicted outcome average value,
    which is 22.841, and the vertical axis shows the SHAP values from different features.
    Each feature’s assumed values from the dataset are shown in grey, the negative
    SHAP values are in blue, and the positive SHAP values are in red. The vertical
    axis also displays the predicted outcome for the 18th record, which is 16.178.'
