    ## 解释


    当你将某个特征的值增加一个单位时，模型方程会产生两个几率：一个是基准几率，另一个是特征增量值对应的几率。这里的目标是观察特征值每增加或减少一个单位时，几率比的变化。特征变化一个单位会导致几率比以相应贝塔系数的指数倍发生变化。这可以通过以下方程进一步解释，其中
    `beta 0` 是截距项，`beta 1` 到 `beta k` 是模型参数，`x1` 到 `xk` 是模型的独立预测变量：


    ![$$ \frac{P\left(y=1\right)}{1-P\left(y=1\right)}= odds=\mathit{\exp}\left({\beta}_0+{\beta}_1{x}_1+\dots
    +{\beta}_p{x}_p\right) $$](img/506619_1_En_3_Chapter_TeX_Equg.png)


    我们将方程右侧称为 `exp(a)`，其中 `a` 代表线性回归概念的方程。如果你增加模型的任意参数，方程将变化一个单位，因此我们称之为 `b`，那么右侧变为
    `exp(b)`。相对于预测变量值变化一个单位的几率比将是 `odds_new / odd_old = exp(a - b)`。你可以用这种格式解释所有数值特征。这也适用于所有分类特征或二元特征。


    ## LIME 推断


    为了解释逻辑回归模型，你可以使用 SHAP 值。然而，其复杂性在于时间成本。如果你有百万条记录，并且需要抽取一个相当大的样本来生成所有排列组合，以便在全局层面解释局部准确性，那么你将需要更多时间。为了避免处理大型数据集时的这一瓶颈，LIME
    在生成解释方面提供了速度优势。为了解释表格矩阵数据（即结构化数据），你必须使用 `LimeTabularExplainer`。对于数值特征，通过从 `Normal(0,1)`
    中采样并进行均值中心化和缩放的逆操作（根据训练数据中的均值和标准差）来扰动它们。对于分类特征，通过根据训练分布进行采样，并创建一个二元特征（当该值与正在解释的实例相同时为
    1）来扰动。


    在生成 LIME 解释器时，你需要将数据作为数组传递，提供列名列表，提供目标列名，并根据你计划使用的机器学习任务将模式设置为回归或分类。verbose 选项用于启用模型预测。


    ```

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(xtrain),

    feature_names=list(xtrain.columns),

    class_names=[''target_churn_dum''],

    verbose=True, mode=''classification'')

    # this record is a no churn scenario

    exp = explainer.explain_instance(xtest.iloc[0], log_model.predict_proba, num_features=16)

    exp.as_list()

    ```


    一旦生成了解释器模型对象，你就可以检查单个预测和全局预测以生成解释。在具有两个类别或多个类别的分类问题中，你可以针对每个类别相对于特征列生成单独的特征重要性。在此示例中，你考虑两条记录：记录
    1（模型正确预测了结果）和记录 20（模型错误地进行了预测）。你将解释在这两种情况下模型为何做出这样的决策。与目标类别具有正相关关系的特征为正数，而具有负相关关系的类别则带有负号。你可以将结果以表格笔记本的形式展示。你也可以通过仅考虑其中最重要的特征来限制视图。


    ```

    pd.DataFrame(exp.as_list())

    ```


