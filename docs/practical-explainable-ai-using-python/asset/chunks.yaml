    数据中存在一些字符串列，例如 `area_code`。需要使用标签编码器将这些数据转换为数字。这是模型训练所必需的，因为您不能直接使用字符串变量。


    ```

    df_train[''target_churn_dum''] = pd.get_dummies(df_train.churn,prefix=''churn'',drop_first=True)

    df_train.columns

