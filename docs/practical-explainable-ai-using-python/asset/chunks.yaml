- fmt: '# Multi-Class Label Text Classification Explainability


    Let’s look at the multi-class classification model, where you have more than two
    categories in the target column. Multi-class classification is another use case
    where the dependent variable or target column can have more than two categories
    or labels. The explainability required here is for each corresponding class label
    so the important positive and negative features need to be shown. Let’s use a
    customer complaints data set, where the objective is to predict the customer complaints
    category or type of customer complaints.


    ```

    import pandas as pd

    df = pd.read_csv(''complaints.csv'')

    df.shape

    df.info()

    # Create a new dataframe with two columns

    df1 = df[[''Product'', ''Consumer complaint narrative'']].copy()

    # Remove missing values (NaN)

    df1 = df1[pd.notnull(df1[''Consumer complaint narrative''])]

    # Renaming second column for a simpler name

    df1.columns = [''Product'', ''Consumer_complaint'']

    df1.shape

    # Because the computation is time consuming (in terms of CPU), the data was sampled

    df2 = df1.sample(20000, random_state=1).copy()

    # Renaming categories

    df2.replace({''Product'':

    {''Credit reporting, credit repair services, or other personal consumer reports'':

    ''Credit reporting, repair, or other'',

    ''Credit reporting'': ''Credit reporting, repair, or other'',

    ''Credit card'': ''Credit card or prepaid card'',

    ''Prepaid card'': ''Credit card or prepaid card'',

    ''Payday loan'': ''Payday loan, title loan, or personal loan'',

    ''Money transfer'': ''Money transfer, virtual currency, or money service'',

    ''Virtual currency'': ''Money transfer, virtual currency, or money service''}},

    inplace= True)

    df2.head()

    pd.DataFrame(df2.Product.unique())

    ```


    The source of dataset is [`https://catalog.data.gov/dataset/consumer-complaint-database`](https://catalog.data.gov/dataset/consumer-complaint-database)`.`
    The dataset is cleaned and prepared to predict the complaint category. After reading
    the data, the Python object `DF` is created. The following output shows the first
    few records from the dataset.


    From `DF` you have a copy with only the customer complaint narrative and the product
    column, for the developing of the multi-class classification model, which is assigned
    to the `DF1` object. Then the data frame is cleaned up by removing the NaNs and
    putting in simpler names for the variables.


    The longer descriptions having more text are cleaned up using shorter and more
    appropriate names so that you can analyze the data better. There are 13 unique
    categories of products against which the customer complaint narrative has been
    mentioned.


    ```

    # Create a new column ''category_id'' with encoded categories

    df2[''category_id''] = df2[''Product''].factorize()[0]

    category_id_df = df2[[''Product'', ''category_id'']].drop_duplicates()

    # Dictionaries for future use

    category_to_id = dict(category_id_df.values)

    id_to_category = dict(category_id_df[[''category_id'', ''Product'']].values)

    # New dataframe

    df2.head()

    df2.Product.value_counts()

    ```


    For the model training purpose, you need to encode the target column text into
    numbers. Hence you create the column `category_id` by factorizing the product
    column. The next two lines of code in the above script create a mapping between
    the encoded number and the class description. This is useful for reverse transformation
    after generating predictions. In the following lines of code you create a tf-idf
    vector with n-grams taken from 1 to 2 and remove the stop words, keeping the sublinear
    TF and minimum document frequency as 5. If you want to reduce the bias generated
    by the length of the document, then you have to use the sublinear term frequency
    TRUE. As you know from Zipf’s Law, the frequency of any word is inversely proportional
    to its rank. The minimum document frequency implies that while developing the
    vocabulary you should ignore terms that have a document frequency lower than the
    defined threshold. In the following script it is 5, which means that any term
    with a frequency less than 5 will not be part of the vocabulary.


    The output from the following script shows the count of each class in the multi-class
    classification target column. The following script fits a logistic regression
    for a multi-class model using a count vectorizer as a starting point.


    ```

    from sklearn.feature_extraction.text import CountVectorizer

    from sklearn.linear_model import LogisticRegressionCV

    from sklearn.pipeline import make_pipeline

    vec = CountVectorizer()

    clf = LogisticRegressionCV()

    pipe = make_pipeline(vec, clf)

    pipe.fit(df2.Consumer_complaint,df2.Product)

    from sklearn import metrics

    def print_report(pipe):

    y_test = df2.Product

    y_pred = pipe.predict(df2.Consumer_complaint)

    report = metrics.classification_report(y_test, y_pred)

    print(report)

    print("accuracy: {:0.3f}".format(metrics.accuracy_score(y_test, y_pred)))

    print_report(pipe)

    ```


    Per Figure [7-13](#506619_1_En_7_Chapter.xhtml#Fig13), the model accuracy seems
    to be fine as it is 89%. In a multi-class classification problem, you typically
    look at the f1-score, which is a harmonic mean of the precision and recall. The
    acceptable limit of an f1-score is 75% or more. You can see for a consumer loan
    and other financial services it is less than 75%. As a starting point, let’s have
    a look at the terms as weights for each class in the classification problem. The
    result is not meaningful as the feature term names are not available (Figure [7-14](#506619_1_En_7_Chapter.xhtml#Fig14)).


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig14_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Sample feature important for each class


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig13_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Classification accuracy for a multi-class text classification model


    ```

    import eli5

    eli5.show_weights(clf, top=10)

    #this result is not meaningful, as weight and feature names are not there

    ```


    Since the feature names as terms are not available in Figure [7-14](#506619_1_En_7_Chapter.xhtml#Fig14),
    you cannot make sense out of this. You need to change the script slightly, as
    below, to include the feature names from the `vec` object and also to include
    target names as unique names. Hence you can see the terms that positively impact
    the class label are in green and the terms that negatively impact it are in red.
    For each category, such as bank account, service, or consumer loan, you can see
    the top features. Since you have more than 10 categories, you cannot accommodate
    all positive and negative terms in one screen, hence you take different snapshots
    for at least 5 labels at a time in order to accommodate readability of the terms.


    ```

    eli5.show_weights(clf,feature_names=vec.get_feature_names(),target_names=set(df2.Product))

    #make sense

    ```


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig15_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Top features for each class with the feature names


    The output in Figure [7-15](#506619_1_En_7_Chapter.xhtml#Fig15) shows the first
    five classes from the target column shows five classes and their top features,
    positive and negative.


    What are the key takeaways from these tables? Let’s take the `mortgage` class.
    Words such as `mortgage`, `escrow`, `refinance`, `modification`, `servicer`, and
    `ditech` are the top positive features that helped in predicting the class `mortgage`.
    In a similar fashion you can interpret and explain all other classes and words
    from the consumer complaints that actually help a text document predict the particular
    class as a product category the customer is complaining about. So it’s not just
    the identification of top features but the entire context that leads to the prediction
    of the class label.'
