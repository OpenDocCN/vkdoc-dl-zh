    在图 5-26 中，样本按样本相似性排序。水平轴显示样本，垂直轴显示预测输出值。这是一个有趣的可视化；只需将鼠标或光标悬停，你应该就能看到特征的 SHAP
    值、精确的预测输出值以及作为解释器输入而选择的相应样本。该图表提供了关于理解预测结果和特征贡献的详细视图。

