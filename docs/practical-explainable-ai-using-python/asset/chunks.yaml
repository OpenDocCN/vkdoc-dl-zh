    让我们解释一条规则：如果总日通话分钟数小于或等于264.45，已订阅国际套餐，并且客户拨打超过四次客服电话，则该客户可能会流失。相反，如果该客户拨打客服电话少于四次，在其他所有因素保持不变的情况下，他们不太可能流失。您可以类似地解释所有其他规则。


    上述示例源自模型的行为，因为模型提供了确定决策的阈值，以识别流失或不流失的场景。然而，规则的阈值是由业务用户或领域专家定义的，他们从专家系统的角度对问题陈述有足够的了解。


    与专家系统的交互可以使用自然语言处理方法来实现，例如开发问答系统。然而，专家系统的设计和开发需要以下步骤：


    *   确定问题陈述

    *   寻找同一领域的主题专家

    *   建立整个解决方案的成本效益


    ### 对基于规则的系统的需求


    对基于规则的专家系统的需求可归因于以下几点：


    *   没有足够的数据来训练机器学习或深度学习算法。

    *   领域专家根据他们的经验制定规则，这些经验基于他们掌握的真理表。找到这样的专家始终是一个挑战。

    *   重现机器学习模型或深度学习模型存在挑战，因为预测或分类中存在一些不确定性。

    *   有时很难解释机器学习模型生成的预测决策。

    *   有时，即使您使用正确的程序训练了机器学习模型，它们也会生成错误的结果；因此，需要用基于规则的结果覆盖机器预测。'
