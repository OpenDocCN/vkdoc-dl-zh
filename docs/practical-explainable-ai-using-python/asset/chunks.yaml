- fmt: '### Explanation After Stop Word Removal


    The above analysis is done just by keeping the stop words in order to retain the
    context of the text input. If you remove the stop words from the input text, then
    a few redundant features will be removed from the input vector. You will be able
    to get more meaningful features for the explanation. The bias is the intercept
    term from the model. In the above script, you looked at the bag of words without
    stop word removal.


    ```

    vec = CountVectorizer(stop_words=''english'')

    clf = LogisticRegressionCV()

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    ```


    **Table 7-1** The Classifier Model Accuracy After Refinement process is shown
    in Table [7-1](#506619_1_En_7_Chapter.xhtml#Tab1)


    | ![../images/506619_1_En_7_Chapter/506619_1_En_7_Figa_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Figa_HTML.jpg)
    |


    You tried the linear classifier. As you increase the model complexity, you get
    more refined tokens and more refined context. See Table [7-1](#506619_1_En_7_Chapter.xhtml#Tab1).
    As an example, you updated the logistic regression model to a logistic regression
    model with cross validation. You can see that review number 0 has a more refined
    probability score which, at 78.7%, is little lower than the earlier model.


    ```

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```


    The movie review text (Figure [7-6](#506619_1_En_7_Chapter.xhtml#Fig6)) shows
    repetition of some key words. If there is too much repetition, then the counts
    will be inflated in the count vectorizer. If there are many words whose counts
    are inflated, then it would reflect the feature in the feature importance list.
    In order to avoid the influence of a higher count of words in a count vectorizer,
    you must apply a normalization method so that all features get equal importance
    in the classification process. In order to do that, you can introduce a new vectorizer
    which is called *term frequency and inverse document frequency*, popularly known
    as a (tf-idf) vectorizer. The following formula can be used to calculate the value
    of tf-idf:


    > *Tf-idf value of ith word in jth document = term frequency of ith word in jth
    document * log (total number of documents / number of documents containing the
    ith word)*


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig6_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig6_HTML.jpg)


    **Figure 7-6** Highlighted feature importance for the positive class


    The tf-idf function is readily available from the `sklearn` library in feature
    extraction from a text module. You do not have to compute for a corpus the tf-idf
    values; you can apply the following method:


    ```

    from sklearn.feature_extraction.text import TfidfVectorizer

    vec = TfidfVectorizer()

    clf = LogisticRegressionCV()

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    ```


    **Table 7-2** Classification Report for the tf-idf Vectorizer-Based Model


    | ![../images/506619_1_En_7_Chapter/506619_1_En_7_Figb_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Figb_HTML.jpg)
    |


    Per Table [7-2](#506619_1_En_7_Chapter.xhtml#Tab2) and Figure [7-7](#506619_1_En_7_Chapter.xhtml#Fig7),
    there is no visible difference in the model accuracy after the application of
    the tf-idf transformation. However, the probability value changes marginally and
    the score also changes marginally.


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig7_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig7_HTML.jpg)


    **Figure 7-7** Feature highlights for the positive class after tf-idf application


    ```

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```


    ```

    vec = TfidfVectorizer(stop_words=''english'')

    clf = LogisticRegressionCV()

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    ```


    **Table 7-3** Classification Report After Stop Word Removal from tf-idf vec Approach


    | ![../images/506619_1_En_7_Chapter/506619_1_En_7_Figc_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Figc_HTML.jpg)
    |


    `Tf-idf` is a vector-based representation of textual data. This is very useful
    when the count-based features have high frequencies. In order to avoid the influence
    of high frequency words on the classification algorithm, it is preferable to use
    the `tf-idf`-based vectorizer. When initializing the `tf-idf` vectorizer, if you
    provide the stop word option, then for the stop words the vectors will not be
    created. Also, for the `tf-idf` calculation the stop word count will not be considered.
    Stop words are defined as words that do not have any meaning themselves but help
    us understand the context along with other words. As a feature, they do not add
    much value to the text classification task; rather, they increase the dimensionality
    of the data. Hence stop word removal will help you get better accuracy by reducing
    the data dimensions. See Figure [7-8](#506619_1_En_7_Chapter.xhtml#Fig8).


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig8_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig8_HTML.jpg)


    **Figure 7-8** Important features highlighted from a more refined model


    ```

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```'
