    The SHAP library has a deep explainer module which contains a representation to
    showcase the positive and negative attributes or contributions towards a classification
    task in general and specific to each class in particular.


    ```

    background = x_train[np.random.choice(x_train.shape[0],100, replace=False)]

    explainer = shap.DeepExplainer(model,background)

    shap_values = explainer.shap_values(x_test[1:5])

    # plot the feature attributions

