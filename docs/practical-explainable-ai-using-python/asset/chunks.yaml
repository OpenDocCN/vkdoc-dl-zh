    \ [6-1](#506619_1_En_6_Chapter.xhtml#Tab1)`。\n\n**Table 6-1**  \n自回归模型结果\n\n|\
    \ ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figa_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Figa_HTML.jpg)\
    \ |\n\n可以将方程写为：\n\n`Yt = 0.5136 + 1.0039 * Yt-1`\n\n系数`1.0039`的`p`值为`0.000`，小于`0.05`。这意味着在95%的置信水平和5%的统计显著性水平下，一阶滞后项足够显著，能够影响实际时间序列`Yt`。这可以解释为：*如果滞后项变化1个单位，序列的实际值预计变化0.39%*。\n\
