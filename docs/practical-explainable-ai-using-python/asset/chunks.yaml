    与专家系统的交互可以使用自然语言处理方法来实现，例如开发问答系统。然而，专家系统的设计和开发需要以下步骤：


    *   确定问题陈述

    *   寻找同一领域的主题专家

    *   建立整个解决方案的成本效益


    ### 对基于规则的系统的需求


    对基于规则的专家系统的需求可归因于以下几点：


    *   没有足够的数据来训练机器学习或深度学习算法。

    *   领域专家根据他们的经验制定规则，这些经验基于他们掌握的真理表。找到这样的专家始终是一个挑战。

    *   重现机器学习模型或深度学习模型存在挑战，因为预测或分类中存在一些不确定性。

    *   有时很难解释机器学习模型生成的预测决策。

    *   有时，即使您使用正确的程序训练了机器学习模型，它们也会生成错误的结果；因此，需要用基于规则的结果覆盖机器预测。'
- fmt: '### Challenges of an Expert System


    The major challenges of an expert rule-based system for explaining a decision
    are as follows:


    - Too many rules may lead to confusion in explaining the outcome.

    - Too few rules may lead to overlooking an important signal.

    - You must manage the conflicting rules, and add an alert mechanism for the end
    user.

    - You must find out rules ensembles in identifying a commonality between various
    rules.

    - If two rules lead to the same decision, backward chaining may lead to confusion.


    ### Conclusion


    The creation of an expert system is a time-intensive process. This chapter provided
    a simulated view of how rules can be generated and elaborated for explainability
    purpose. You learned the approaches, challenges, and needs for a rule-based system.
    In the real world, major robotics processes are powered by expert rule-based systems.
    AI models can explain the decisions but control over the actions is limited; hence
    there is a need for an expert system that often overrides the AI model’s decisions
    whenever they head in an unfavorable direction. Moreover, the rule-based expert
    system is crucial for computer vision-related tasks. The AI model can be fooled
    by using some abstract form of an image, but a rule-based system can identify
    it and recognize the anomalies.


    # 14. Model Explainability for Computer Vision


    Computer vision tasks such as image classification and object detection are gradually
    becoming better day by day due to continuous research in improving the accuracy
    of models, the evolution of new frameworks, and the growing open source community.
    The results from recent state-of-the-art machine learning models are more promising
    than half a decade ago, which gives us confidence to expand the horizon of problems
    by undertaking more complex problems. If we look at the use cases around computer
    vision, the most prominent are in retail, agriculture, public health, the automobile
    industry, and the gaming industry. Some of the industries from this list have
    a legal mandate to use AI responsibly. The European Union is also trying to regulate
    the application and usage of AI. If the predictions or classifications generated
    by image classification models go wrong, users will not trust the model and its
    predictions. It is necessary to understand why the AI model has generated a prediction
    or classification one way vs. another way. Model explainability shows the end
    user which particular parts of an image made the model predict class A vs. other
    classes.


    ## Why Explainability for Image Data?


    Images are converted into pixel values. The pixel values are subsequently used
    as features to train a label that the image best represents. If the AI model generates
    a wrong prediction/classification, two groups of people are accountable and responsible
    in an organization: the data scientist who built the model and the stakeholder
    who approved putting the model into production. The wrong classification of image
    data is due to two reasons:


    - The model is unable to consider the correct set of features for prediction.
    Instead, it picks wrong cues and signals from the data. The right set of features
    are not taken into consideration while training.

    - Not enough training is done to let the algorithm generalize unseen data very
    well.


    ### Anchor Image Using Alibi


    For computer vision tasks such object detection and image classification, you
    can explain the key features that differentiate an image of a bag from an image
    of a t-shirt, for example. This can be achieved by using the anchors explanation,
    which was covered in Chapter [11](#506619_1_En_11_Chapter.xhtml) of this book.
    However, the same method can be extended to other computer vision tasks such as
    fake image identification and possible compromise of the image. The steps are
    as follows:


    - The object detection or image classification model can be trained for each domain,
    such as famous personalities and popular or common objects.

    - If you want to identify the authenticity of another person’s image or a cropped
    image, you can get a prediction, but the probability threshold will be little
    lower.

    - In that case, you can trigger the anchors explanations to learn the key features
    or the prominent pixels that lead to the prediction.

    - In theory, this is fine. In practice, you can verify by using the following
    super pixel formula.


    What the anchors explanation provides are the colors or the contrasting colors
    that differentiate the image or object from other images. You need to write a
    function to generate super pixels for any given image.'
