    ''OwnerType_Fourth +ACY- Above'', ''OwnerType_Second'', ''OwnerType_Third''],

    dtype=''object'')

    clean_df = combine_all_dummy.drop(columns=[''Make'',''Location'',''FuelType'',''Transmission'',''OwnerType'',

    ''Mileage'', ''EngineCC'', ''PowerBhp''])

