    \n**Figure 6-8**  \n来自`RFE`算法的特征重要性\n\n递归特征消除（`RFE`）是一种流行的算法，用于在监督学习环境中从特征列表中移除冗余特征（`Figure\
    \ [6-8](#506619_1_En_6_Chapter.xhtml#Fig8)`）。配置`RFE`有两种不同的选项：要么选择特征的数量，要么选择用于选择特征的算法。`RFE`在监督回归模型或分类模型之上充当包装算法。这意味着需要一个模型，然后在其上应用`RFE`。在上述脚本中，在随机森林回归模型之上使用了`RFE`。选择的最重要特征是滞后7、3、2和1。其余八个特征未被算法选中。因此，连续且一致的滞后对目标特征没有影响；然而，选中的特征对预测结果有影响。如本章前面所述，时间序列模型的特征仅是滞后变量和移动平均变量。这就是为什么如果仅使用滞后项，时间序列对象可以建模为`AR`；如果仅使用移动平均项作为特征，则可以建模为`MA`。自回归意味着滞后值可以用作特征来预测实际时间序列。\n\
