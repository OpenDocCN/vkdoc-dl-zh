  trans: '

    ### 可解释人工智能（XAI）的必要性


    让我们来看看为何将人工智能模型称为黑箱模型。图 1-2 展示了经典的建模场景：一组自变量通过一个预先确定的函数，从而产生输出。将生成的输出与真实输出进行比较，以评估该函数是否拟合数据。如果函数拟合效果不佳，我们就必须对数据进行变换，或者考虑使用另一个函数来拟合数据。但这个过程相当依赖人工操作，并且每当数据刷新时，都需要统计学家或建模者重新校准模型，再次检查数据是否拟合模型。这就是为什么用于推理处理的经典预测模型生成方式依赖于人类，并且总是存在多种解读。有时，利益相关者很难信任模型，因为许多专家提出的各种变体在某种意义上听起来都不错，但缺乏通用性。因此，如图
    1-2 所示的经典模型开发系统，在数据时刻变化的人工智能系统世界中难以实施。数据在不断变化。人类对校准的依赖是一个瓶颈；因此，需要一种使用动态算法动态生成推理的现代系统。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig2_HTML.jpg](img/506619_1_En_1_Fig2_HTML.jpg)


    图 1-2


    经典模型训练系统


    图 1-2 展示了经典的模型开发场景，其中模型可以通过一个方程来捕获，该方程易于解释，也容易向任何人说明。然而，基于公式的解读方式在人工智能世界中正在发生变化。图
    1-3 展示了探索能够利用输入产生输出的最佳可能函数的结构。在这里，没有约束将模型限制为特定的函数（如线性或非线性）。在这种结构中，学习通过多次迭代进行，并使用交叉验证方法来确定最佳模型。人工智能模型面临的挑战在于可解释性和可说明性，因为许多算法很复杂，所以不容易向每个人解释其预测结果。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig3_HTML.jpg](img/506619_1_En_1_Fig3_HTML.jpg)


    图 1-3


    人工智能模型训练过程


    随着计算机程序和算法的进步，开发者搜索不同类型函数（如线性和非线性）变得非常困难，并且对这些函数的评估也变得极其困难。机器学习或深度学习模型负责搜索能够良好拟合训练数据的合适函数。图
    1-3 解释了机器如何识别最终模型，该模型不仅在准确性方面表现更佳，而且在生成预测的稳定性和可靠性方面也更优。当输入和输出之间的函数关系被明确定义时，歧义较少，预测结果也更为透明。然而，当我们的
    AI 模型选择了一个复杂的函数关系时，作为最终用户很难理解。因此，人工智能模型被视为黑箱。在本书中，我们希望让黑箱模型变得可解释，从而使人工智能解决方案越来越易于部署和适应。


    用于决策的人工智能模型的日常执行需要透明度、无偏性和伦理性。目前，在多种场景下缺乏可解释性：


    - 某人申请信用卡，而人工智能模型拒绝了该申请。重要的是要说明申请被拒绝的原因，以及申请人可以采取哪些纠正措施来改善其行为。

    - 在基于生活方式和生命体征的医疗诊断中，人工智能模型预测一个人是否会患糖尿病。这里，如果模型预测此人可能患上糖尿病，那么它也必须说明原因以及未来导致该疾病的驱动因素是什么。

    - 自动驾驶汽车识别道路上的物体并做出明确的决策。它们也需要对其为何做出这些决策有清晰的解释。


    还有许多其他用例，其中支持模型输出的解释至关重要。人类倾向于不接受他们无法解读或理解的事物。这降低了他们对人工智能模型预测结果的信任度。我们使用人工智能模型是为了消除人类决策中的偏见；然而，如果结果不公正、不合法且不透明，那么这些决策将是危险的。另一方面，有人可能会争辩说，如果我们无法解读和解释人工智能模型的决策，那为什么还要使用它们呢？原因在于模型的准确性和性能。模型的性能与可解释性之间总是存在权衡。图
    1-4 解释了两者之间的权衡。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig4_HTML.jpg](img/506619_1_En_1_Fig4_HTML.jpg)


    图 1-4


    模型可解释性与性能（准确性）之间的权衡


    在图 1-4 中，横轴表示模型的性能或准确性，纵轴表示模型的解读和解释。基于规则的系统位于性能并非最优的位置；然而，其可解释性很好。相比之下，基于深度学习的模型以较低的可解释性和可说明性为代价，提供了卓越的性能和良好的准确性。

    '
- fmt: '### Explainability vs. Interpretability


    There is a difference between model interpretation and explainability. Interpretation
    is about the meaning of the predictions. Explainability is why the model predicted
    something and why someone should trust the model. To understand the difference
    better, let’s look at a real world example of a sales prediction, where the factors
    that help in the prediction are advertisement expenses, product quality, sources
    for making the advertisement, the size of the advertisement, etc. Each factor
    has a coefficient after the regression modeling is done. The coefficients can
    be interpreted as the incremental change in sales due to a delta change in one
    factor such as advertisement expenses. However, if you are predicting that sales
    next month are going to be $20,000 when the average monthly sales historically
    have been less than or equal to $15,000, this needs an explanation. As part of
    model explainability we need the following:


    - Model interpretability ensures the decision making is natural and there is no
    biasness in the prediction.

    - Differentiating the false causality from true causality, which helps in making
    the predictions transparent

    - Need to produce explainable models without compromising the high performance
    of the learning experiences and iterations

    - Enable decision makers to trust the AI models.


    > “XAI applications and products will be a new trend in 2021, as the demand for
    interpretability, trust, and ethics in AI is loud and clear” – Pradeepta Mishra
    (Source: Various Research Reports)


    There is a constant research around XAI that makes every attempt in explaining
    the AI models and their behavior to the end users in order to increase the adoption
    of AI models. Now the question is, who are the end users of XAI?


    - Credit officers who evaluate applications for loans, credit requests, and more.
    If they understand the decisions, then they can help educate customers in correcting
    their behavior.

    - Data scientists who evaluate their own solutions and ensure improvements are
    made in the model. Is this the best model that can be made using the present dataset?

    - Senior managers who need to meet regulatory and compliance needs at a high level

    - Business heads who need to trust the AI black-box decisions and are looking
    for any historical evidence they can rely upon

    - Customer support executives who need to answer complaints and explain decisions

    - Internal auditors and regulators who must ensure that a transparent data-driven
    process is established


    The goal of XAI is to achieve the following things:


    - **Trust**: The prediction accuracy is a clear function of data quality, true
    causality, and choice of an appropriate algorithm. However, the models are subject
    to generating false positives in the prediction process. If the models generate
    a lot of false positives, then the end user will lose trust in the model. Thus
    it is important to convey confidence in the model to the end user.

    - **Associations**: The ML or DL models learn to make predictions based on associations
    between various features. The associations can be correlations or mere associations.
    The correlations that are unexplained are spurious correlations that make the
    model impossible to interpret. Hence it is important to capture the true correlations.

    - **Reliability**: Confidence in the model, the stability of the model in predictions,
    and the robustness of the model are also very important. This is required in order
    to have more trustworthiness in AI models and to ensure that the end user has
    enough confidence in the model predictions. If this is not available, then no
    user will trust the models.

    - **Fairness**: The AI models should be fair and ethically compliant. They should
    not discriminate among religion, sex, class, and race in generating predictions.

    - **Identity**: The AI models should be able to keep privacy considerations intact,
    without revealing the identity of an individual. Privacy and identity management
    while generating XAI is very important.


    ### Explainability Types


    Machine learning interpretability is an integral part of model explainability.
    There are various classifications of model interpretations:


    - **Intrinsic explanation**: Simple models fall into this category, such as simple
    linear regression models and decision tree-based models where a simple if/else
    condition can explain the predictions, which means the XAI is intrinsic in the
    model itself and there’s no need to perform any kind of post analysis.

    - **Post-hoc explanation**: Complex models like non-linear models, ensemble tree-based
    models, stochastic gradient boosted tree-based model, and stacked models where
    a greater focus needs to be given to create explainability

    - **Model specific**: There is a set of explanations that can be drawn from a
    specific type of model, nothing more than that. For example, a linear regression
    model does not provide feature importance. However, the coefficients of a linear
    regression model someone can use as a proxy.

    - **Model agnostic**: These explanations some can interpret by looking at the
    pair of training input data and training output data combinations. In this book,
    we are going to look at model-agnostic explanations in later chapters.

    - **Local interpretation**: This gives an idea about individual predictions, which
    is the interpretation of a single data point. As an example, if a borrower is
    predicted by the model as likely to default, why it is so? This is a local interpretation.

    - **Global interpretation**: This gives an idea about the global understanding
    of the predictions for all data points, overall model behavior, and more.

    - **Sublocal interpretation**: This explains the local interpretations about a
    group of data points together rather than all data points. This is different from
    a local interpretation.

    - **Textual explanations**: Text-based explanations include the numeric part as
    well as language to communicate the meaning of a certain parameters of the model.

    - **Visual explanations**: Visual explanations are nice but sometimes they are
    not intuitive enough to explain the predictions, hence a visual accompanied by
    textual interpretation is very much needed.


    ### Tools for Model Explainability


    There are various tools and frameworks available for generating explainability
    out of the ML and DL models. The open source Python libraries have some advantages
    and disadvantages. We are going to use a mix of Python libraries as open source
    libraries and publicly available datasets from various websites in the examples
    all through this book. Here are the tools that need to be installed and the environment
    that needs to be set up.


    ### SHAP


    The SHAP (SHapley Additive exPlanations) library is a Python-based unified approach
    to explain the output of any machine learning model. The SHAP Python library is
    based on game theory with local explanations. The game theory approach is a way
    to get predictions if one factor is present vs. when it is absent. If there is
    a significant change in the expected outcome, then the factor is very important
    to the target variable. This method unites several previous methods to explain
    the output generated by the machine learning models. The SHAP framework can be
    used for different types of models except for time series-based models. See Figure
    [1-5](#506619_1_En_1_Chapter.xhtml#Fig5). The SHAP library can be used to make
    sense of the models.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig5_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig5_HTML.png)


    Figure 1-5 Shapely values and explanation sample image


    In order to install SHAP, the following methods can be used:


    - `!Pip install shap` (from Jupyter notebook)

    - `conda install -c conda-forge shap` (using terminal)


    ```

    !pip3 install shap

    ```'
