    you create a prediction function. Then you use the counterfactual proto function
    (Table [10-3](#506619_1_En_10_Chapter.xhtml#Tab3)).


    **Table 10-3** Counterfactual Proto Hyper Parameters


    | Parameters | Explanation |

    | --- | --- |

    | `predict_fn` | Keras or TensorFlow model or any other model’s prediction function
    returning class probabilities |

    | `Shape` | Shape of input data starting with batch size |

    | `use_kdtree` | Whether to use k-d trees for the prototype loss term if no encoder
    is available |

    | `Theta` | Constant for the prototype search loss term |

    | `max_iterations` | Maximum number of iterations for finding a counterfactual
    |

    | `feature_range` | Tuple with min and max ranges to allow for perturbed instances
    |

    | `c_init, c_steps` | Initial value to scale the attack loss term, number of iterations
    to adjust the constant scaling of the attack loss term |


