    'p_sample': 0.8,\n'seed': None,\n'image_shape': (28, 28, 1),\n'segmentation_fn':\
    \ 'custom',\n'threshold': 0.95,\n'delta': 0.1,\n'tau': 0.15,\n'batch_size': 100,\n\
    'coverage_samples': 10000,\n'beam_size': 1,\n'stop_on_first': False,\n'max_anchor_size':\
    \ None,\n'min_samples_start': 100,\n'n_covered_ex': 10,\n'binary_cache_size':\
    \ 10000,\n'cache_margin': 1000,\n'verbose': False,\n'verbose_every': 1,\n'kwargs':\
    \ {'seed': 0}}\n```\n\n## 结论\n\n在本章中，你了解了使用成人数据集的表格数据示例、用于情感分析的 IMDB 电影评论数据集，以及用于图像分类示例的\
    \ Fashion MNIST 数据集。锚点函数对于表格数据、文本数据和图像数据而言差异很大。在本章中，你通过示例学习了如何解释图像分类与预测、文本分类与预测，以及使用来自\
    \ Alibi 的新库解释器进行图像分类。\n\n# 13. 基于规则的专家系统的模型可解释性\n\n基于规则的系统相对更容易向最终用户解释，因为规则可以表示为`if/else`条件。确实，有时会存在多个`if/else`条件。专家系统本质上是确定性的，并且非常准确，因为它们由完善的规则和条件驱动。当多个规则发生冲突或以难以解释的方式组合时，便产生了对可解释性的需求。在人工智能领域，专家系统是一种旨在模拟真实决策过程的程序。专家系统旨在通过简单的推理来解决复杂问题，并以`if/else/then`条件的形式表示。专家系统旨在像推理引擎一样运作。推理引擎的作用是做出决策。有时专家系统很简单，比如决策树；有时专家系统则非常复杂。复杂的专家系统需要一个知识库。有时这些知识库是一个本体，它是一种知识体系的形式，通过它可以构建特定规则并进行推理。\n"
- fmt: '# What Is an Expert System?


    The knowledge base is the reasoning store through which the `if/else` conditions
    of an expert system operate. In any traditional computer program, reasoning and
    logic are embedded in the script, making it impossible for anyone other than technology
    specialists to understand the reasoning. The goal of a knowledge-based system
    is to make the decision making process explicit. With the knowledge base, the
    objective of the expert system is to explicitly show the rules in a format that
    is intuitive, self-explanatory, and easily understood by the decision makers.
    The ontology is a formal representation of classes, subclasses, and superclasses.
    The entities are linked or associated through some common properties. The relations
    can be concepts, associations, and other meta-properties. The ontology classification
    helps maintain the formal structure of the knowledge base on which an expert system
    works.


    Any expert system requires two components:


    - **A knowledge base**: The formal structure that is called an ontology

    - **An inference engine**: Either a rule-based system or a machine learning-driven
    system.


    An inference engine uses two different forms of reasoning to arrive at a decision
    rule:


    - Forward chaining

    - Backward chaining


    ## Backward and Forward Chaining


    Figure [13-1](#506619_1_En_13_Chapter.xhtml#Fig1) explains the forward chaining
    process. The abstract features can be extracted from the base features and a final
    decision can be arrived at using the abstract features.


    ![../images/506619_1_En_13_Chapter/506619_1_En_13_Fig1_HTML.png](images/506619_1_En_13_Chapter/506619_1_En_13_Fig1_HTML.png)


    Figure 13-1


    Forward chaining


    The forward chaining method explains what happens to the decision. Suppose in
    a structured data problem you have features. The features have their own values.
    The combination of `if/else` conditions leads to the abstract feature formation.
    The abstract features lead to the final decision. If someone wants to verify how
    the final decision is made, it can be traced back. The inference engine follows
    the chain of `if/else` conditions and derivations to reach a conclusion about
    the decision. In the similar manner, we can explain the backward chaining in Figure
    [13-2](#506619_1_En_13_Chapter.xhtml#Fig2).


    ![../images/506619_1_En_13_Chapter/506619_1_En_13_Fig2_HTML.png](images/506619_1_En_13_Chapter/506619_1_En_13_Fig2_HTML.png)


    Figure 13-2


    Backward chaining


    The logic followed in backward chaining is to understand why a certain decision
    is being made. The decision engine of an expert system tries to find out the conditions
    that led to the decision, as an example, spam email or not spam email. Here the
    possibility of having a certain token either led to spam or not is of interest
    to the decision engine.


    ## Rule Extraction Using Scikit-Learn


    Rules explanation using a decision tree-based model, where the churn prediction
    can be explained based on the usage history of the customers in a telecom churn
    dataset, is shown using the Python `scikit-learn` library. In order to explain
    the rule creation and extraction process, let’s look at a telecom churn prediction
    dataset, where predicting the probable churn customers in advance gives an advantage
    to the business when having conversations with them, understanding their concerns,
    and hence trying to retain them. Customer retention is less costly than customer
    acquisition. The training dataset has been already preprocessed where the categorical
    column states are transformed into one hot encoded columns. Similarly, there are
    other categorical features such as area code, international plan status, voice
    email plan, and number of customer service calls, which are transformed into one
    hot encoded features.


    ```

    import pandas as pd

    df_total = pd.read_csv(''Processed_Training_data.csv'')

    ```


    After reading the data into a Jupyter notebook, you can see the first five records
    by using the `head` function. The first column is a serial number; it has no value,
    so you can remove it.


    ```

    df_total.columns

    del df_total[''Unnamed: 0'']

    df_total.head()

    ```


    The following script separates the target column as the Y variable and rest of
    the features as the X variable:


    ```

    import numpy as np

    Y = np.array(df_total.pop(''churn_yes''))

    X = np.array(df_total)

    from sklearn.model_selection import train_test_split

    from sklearn.metrics import confusion_matrix, classification_report

    xtrain,xtest,ytrain,ytest = train_test_split(X,Y,test_size=0.20,random_state=1234)

    xtrain.shape,xtest.shape,ytrain.shape,ytest.shape

    import numpy as np, pandas as pd, matplotlib.pyplot as plt, pydotplus

    from sklearn import tree, metrics, model_selection, preprocessing

    from IPython.display import Image, display

    ```


    For a visualization of a decision tree in a Jupyter environment, you need to install
    the `pydotplus` library.


    ```

    !pip install pydotplus

    ```


    To start, you can train a simple decision tree model and extract the rules and
    visualize the rules. You can get into complex models such as random forest classifiers
    or gradient boosting-based classifiers, which train the model by using numerous
    amount of trees as defined by the user (100 trees to 10000 trees, but not limited
    to those two numbers). Identification of rules in ensemble models also can be
    derived using another library named `RuleFit`, which is out of scope for this
    book due to the installation and stability from a library availability point of
    view. I have included the rule extraction based on a conditional threshold and
    confidence level using the anchors explanation from the Alibi library in Chapter
    [12](#506619_1_En_12_Chapter.xhtml).


    ```

    dt1 = tree.DecisionTreeClassifier()

    dt1

    dt1.fit(xtrain,ytrain)

    dt1.score(xtrain,ytrain)

    dt1.score(xtest,ytest)

    ```


    The decision tree with the default parameters are initialized and the object is
    stored as `dt1`. Then the model training happens using the `fit` method, and the
    `score` function is used to get the accuracy of the model from the training dataset
    and the test dataset. The training accuracy is 100% and the test accuracy is 89.8%.
    This is a clear sign of model overfitting. This is because of the parameter in
    the decision tree classifier, maximum depth. By default it is none, which means
    the branches of the decision tree will be expanded until all of the samples are
    placed in the decision tree. If the model is overfitting the data, then the rules
    extracted from it will also be misleading, sometimes generating false positives
    and sometimes false negatives. So the first step here is to get the model right.
    You need to fine tune the hyper parameters in order to produce a better and stable
    model. Then the rules will be valid.'
