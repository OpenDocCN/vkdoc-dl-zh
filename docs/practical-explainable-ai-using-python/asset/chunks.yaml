- fmt: '# Non-Linear Models


    A decision tree is a non-linear model which maps the independent variable to the
    dependent variable. At a local level this may be considered as a piece-wise linear
    regression, but at a global level this is a non-linear model, as there is no one-to-one
    mapping between the dependent and independent variables. Unlike a linear regression
    model, there is no mathematical equation to show the relationship between the
    input and output variables. If we keep the maximum tree depth parameter to an
    infinite level, then the decision tree might fit the data perfectly, which is
    a classic scenario of model overfit. Whether the training dataset is linearly
    separable or not, decision trees are prone to overfitting. This needs to be addressed.
    People usually go for tree pruning in order to get a best fit decision tree model.
    One can view the decision tree as a series of conditional statements that results
    in a value or a class in the output column. As an example, if a person is 45 years
    old and works in the private sector and has a PhD degree, then they are definitely
    earning more than $50K a year. Decision trees are a supervised learning algorithm
    that is applicable when there are infinite possible combinations of features that
    could impact the target column. In a decision tree, we split the population into
    two or more subpopulations based on the most significant splitter or differentiator
    in input variables.


    Primarily the decision tree algorithm follows the `ID3` (iterative dichotomiser
    3) algorithm, although there are other algorithms such as `C4.5`, `CART`, `MARS`,
    and `CHAID`. It is based on the following things:


    - Identification of the best attribute or feature based on information gain (having
    a high predictive value) from the dataset and placing that at the root of the
    tree

    - Splitting the training dataset into subsets in such a way that each subset has
    the same value for an attribute

    - Repeating the above two steps until all of the classes are separated into one
    node, or a minimum number of samples required in the node are satisfied


    In decision tree models, to predict a class label for a record, we start from
    the root of the tree. We compare the root attributes and use the best attribute
    at the beginning and subsequently keep on developing the decision tree. When we
    look at model explainability, the ability of a decision tree to explain the predictions
    is quite good. In simpler terms, a decision tree provides rules that can be directly
    consumed by any application. The rules are mostly a bunch of `if/else` statements.
    In situations where there is a relationship between features, such as an interaction
    between features, square or cubic values of features are related to the dependent
    variable, etc. In such situations, the linear regression and the logistic regression
    are bound to fail. This is because the number of feature interactions could be
    many. The tree-based models take into account the feature values, decide a threshold
    value, and break the feature into two parts and keep growing the branches of the
    tree. The process of splitting the data into multiple subgroups helps in capturing
    the nonlinearity existing in the dataset. In a similar fashion, the square and
    cubic features also follow the `if/else` rules as outlined by the model.


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig1_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Decision tree regression captures non-linearity


    As shown in Figure [4-1](#506619_1_En_4_Chapter.xhtml#Fig1) (source: [`https://scikit-learn.org/`](https://scikit-learn.org/)),
    the relationship between the data and target is nonlinear. The non-linearity is
    approximated by a decision tree model by increasing the maximum depth parameter.
    As the maximum depth parameter increases from 2 to 5, all the points off the curve
    also become part of the model, hence they appear in the rule set generated by
    the decision tree model.


    ## Decision Tree Explanation


    Figure [4-2](#506619_1_En_4_Chapter.xhtml#Fig2) depicts the start of the tree.
    It happens using a root feature. The branching logic is based on the best possible
    feature that creates a split.


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig2_HTML.png](images/506619_1_En_4_Chapter/506619_1_En_4_Fig2_HTML.png)


    Figure 4-2


    The anatomy of a decision tree


