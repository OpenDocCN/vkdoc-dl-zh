    The following script shows the steps for creating a convolutional neural network
    model:


    *   The input dataset is a 28x28 pixels shape.

    *   The convolutional 2D layer applies 64 filters and a kernel size of 2, with
    padding as the same and a rectified linear unit as an activation function.

    *   After applying the convolutional layer, max pooling needs to be applied in
    order to generate abstract features that can be consumed by subsequent layers.

    *   Dropout is usually applied in order to restrict the model from being overfitted.

    *   There are three layers of convolutional 2D filters followed by a max pooling
    layer and a dropout layer applied to reduce the dimensions of the data.

    *   The objective of applying the convolution and max pooling is to arrive at
    a layer with less neurons that can be used to train a fully connected neural network
    model.

    *   If the data needs to be flattened to change the shape, then the dense layer,
    which is a fully connected neural network model, is applied.

    *   Finally, the softmax layer is applied in order to generate the class probabilities
    with respect to each digit class.

    *   At the compile step, you need to provide the categorical cross entropy as
    a loss function, `adam` as an optimizer, and accuracy as the metric.


    ```

    def cnn_model():

    x_in = Input(shape=(28, 28, 1)) #input layer

    x = Conv2D(filters=64, kernel_size=2, padding=''same'', activation=''relu'')(x_in)
    #conv layer

    x = MaxPooling2D(pool_size=2)(x) #max pooling layer

    x = Dropout(0.3)(x) #drop out to avoid overfitting

    x = Conv2D(filters=32, kernel_size=2, padding=''same'', activation=''relu'')(x)
    # second conv layer

    x = MaxPooling2D(pool_size=2)(x) #max pooling layer

    x = Dropout(0.3)(x) #drop out to avoid overfitting

    x = Conv2D(filters=32, kernel_size=2, padding=''same'', activation=''relu'')(x)
    # third conv layer

    x = MaxPooling2D(pool_size=2)(x) #max pooling layer

    x = Dropout(0.3)(x) # drop out to avoid overfitting

    x = Flatten()(x) # flatten for reshaping the matrix

    x = Dense(256, activation=''relu'')(x) #this is for Fully Connected Neural Network
    Layer training

    x = Dropout(0.5)(x) # drop out again to avoid overfitting

    x_out = Dense(10, activation=''softmax'')(x) #final output layer

    cnn = Model(inputs=x_in, outputs=x_out)

    cnn.compile(loss=''categorical_crossentropy'', optimizer=''adam'', metrics=[''accuracy''])

    return cnn

    ```


