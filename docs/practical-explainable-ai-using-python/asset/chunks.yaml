    The p-value of the probability value of a beta coefficient shows the statistical
    significance of the predictors in a linear regression scenario. The p-value threshold
    is considered as 0.05, keeping a 5% level of significance for the statistical
    test. If for any predictor the p-value is less than 0.05, then the predictor is
    significant; otherwise, it is not. If the p-value is greater than 0.05, the beta
    coefficient value would be closer to zero. There are five variables in this model
