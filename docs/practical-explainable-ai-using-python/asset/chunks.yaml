- fmt: '# 3. Explainability for Linear Models


    This chapter explores the use of the `SHAP`, `LIME`, `SKATER`, and `ELI5` libraries
    to explain the decisions made by linear models for supervised learning tasks for
    structured data. In this chapter, you are going to learn various ways of explaining
    the linear models and their decisions. In supervised machine learning tasks, there
    is a target variable, which is also known as a dependent variable, and a set of
    independent variables. The objective is to predict the dependent variable as a
    weighted sum of the input variables or independent variables.


    ## Linear Models


    Linear models such as linear regression for predicting a real valued output or
    a logistic regression model for predicting a class and its corresponding probabilities
    are supervised learning algorithms. These linear models for supervised machine
    learning tasks are very simple to interpret. They are also easy to explain to
    business stakeholders. Let’s start the explainability for linear models for completeness
    of the module.


    ## Linear Regression


    The use of linear regression is to predict the quantitative outcome of a target
    variable given a set of predictors. The modelling formula typically looks like


    `y = β[0] + β[1]x[1] + … + β[p]x[p] + ϵ`


    The beta coefficients are known as parameters, and the epsilon term is known as
    an error term. The error term can be looked at as a consolidated metric that reflects
    the inability of a model to predict. We cannot predict with 100% accuracy in the
    real world as variations in data are a reality. Data keeps on changing. The objective
    of developing a model is to predict with maximum possible accuracy and stability.
    The target variable assumes the value of the intercept term when the independent
    variables assumes zero value. You are going to use a dataset available online,
    `automobile.csv`, to create a linear regression model to predict the price of
    a car, given the attributes of a car.


    ```python

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    %matplotlib inline

    from sklearn.model_selection import cross_val_score, train_test_split

    from sklearn.linear_model import LinearRegression

    from sklearn import datasets, linear_model

    from scipy import linalg

    df = pd.read_csv(''automobile.csv'')

    df.info()

    df.head()

    ```


    There are 6,019 records and 11 features, which are the base features in this dataset.
    The data dictionary is shown in Table 3-1.


    **Table 3-1** Data Dictionary for the Features


    | Sr No | Feature name | Description |

    | --- | --- | --- |

    | 0 | Price | Price in INR |

    | 1 | Make | Manufacturer |

    | 2 | Location | City of car |

    | 3 | Age | How old the car is |

    | 4 | Odometer | KM travelled |

    | 5 | FuelType | Type of fuel |

    | 6 | Transmission | Transmission type |

    | 7 | OwnerType | How many owners |

    | 8 | Mileage | Mileage per litre |

    | 9 | EngineCC | CC of car |

    | 10 | PowerBhp | BHP of car |


    After a data clean-up and feature transformation, which is a basic step before
    moving to the model development step, the data set will have 11 features with
    same number of records in the dataset. The following graph shows the correlation
    between various features. This is important in order to understand the association
    between various features and the dependent variable. The results are displayed
