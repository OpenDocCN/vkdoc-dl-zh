    ## Interpretation


    When you increase the value of one feature by one unit, the model equation will
    produce two odds: one is the base and the other is an incremental value of a feature.
    The objective here is to look at the ratio of odds with every increase or decrease
    in the value of a feature. A change in a feature by one unit leads to changes
    in the odds ratio by a factor of exponential corresponding beta coefficients.
    This can be further explained using the following equation where `beta 0` is the
    intercept term, `beta 1` up to `beta k` are the parameters of the models, and
    `x1` up to `xk` are the independent predictors for the model:


    ![$$ \frac{P\left(y=1\right)}{1-P\left(y=1\right)}= odds=\mathit{\exp}\left({\beta}_0+{\beta}_1{x}_1+\dots
    +{\beta}_p{x}_p\right) $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equg.png)


    Let’s call the right-hand side of the equation as `exp(a)`, where `a` is the equation
    representing the linear regression concept. If you increase any parameter of the
    model, then the equation will change by one unit, hence let’s call it `b`, so
    the RHS becomes `exp(b)`. The odds ratio with respect to the change in one unit
    value of a predictor will be `odds_new / odd_old = exp(a - b)`. You can interpret
    all numeric features in this format. This can be followed for all categorical
    features or binary features as well.


    ## LIME Inference


    In order to explain the logistic regression model, you can use the SHAP values.
    However, the complexity is time. If you have a million records and you take a
    fairly large sample to generate all permutations and combinations to arrive at
    a global level to explain the local accuracy, you need more time. To avoid this
    bottleneck in processing large datasets, LIME offers speed in terms of generating
    explanations. In order to explain the tabular matrix data which is the structured
    data, you have to use `LimeTabularExplainer`. For numerical features, perturb
    them by sampling from a `Normal(0,1)` and doing the inverse operation of mean-centering
    and scaling, according to the means and standard deviations in the training data.
    For categorical features, perturb by sampling according to the training distribution,
    and making a binary feature that is 1 when the value is the same as the instance
    being explained.


    When generating a LIME explainer, you need to pass the data as an array, provide
    the list of column names, provide the target column name, and make the mode as
    regression and the classification based on the machine learning task that you
    are planning to use. The verbose option is to enable predictions from the model.


    ```

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(xtrain),

    feature_names=list(xtrain.columns),

    class_names=[''target_churn_dum''],

    verbose=True, mode=''classification'')

    # this record is a no churn scenario

    exp = explainer.explain_instance(xtest.iloc[0], log_model.predict_proba, num_features=16)

    exp.as_list()

    ```


    Once the explainer model object is generated, you can check for individual predictions
    and global predictions for generating explanations. In a classification where
    you have two classes or multi-classes, you can generate separate feature importances
    for each class with respect to the features column. In this instance, you consider
    two records: record 1 where the model predicts the outcome correctly and record
    20 where the model incorrectly makes prediction. You will explain for both scenarios
    why this decision was made by the model. Features that have a positive relationship
    with the target class are a positive number and the class with a negative relationship
    has a negative sign. You can show the results in a tabular notebook kind of view.
    You can also restrict the view by taking into consideration the most important
    features in it.


    ```

    pd.DataFrame(exp.as_list())

    ```


