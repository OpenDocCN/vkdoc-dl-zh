    \n## 引言\n\n可解释人工智能（XAI）是当前的需求，因为越来越多的 AI 模型已投入生产以生成业务决策。因此，许多用户也正受到这些决策的影响。某个用户可能受到有利或不利的影响。因此，了解导致这些决策的关键特征至关重要。人们常认为\
    \ AI 模型本质上是黑盒，因为 AI 模型的决策无法解释，因此 AI 模型在行业中的采用速度相当缓慢。本书旨在揭开所谓黑盒模型的面纱，通过使用 Python\
    \ XAI 库、TensorFlow 2.0+、Keras 以及基于 Python 包装器的自定义框架等工具，提升 AI 算法所做决策的适应性、可理解性和可解释性。本书的目标是使用上述框架，用通俗易懂的语言解释\
    \ AI 模型。\n\n模型的可理解性和可解释性是本书的重点。通常有一些数学公式和方法用于解释 AI 模型做出的决策。本书将为您提供软件库方法、类、框架和函数，以及如何使用它们来实现模型的可解释性、透明度、可靠性、伦理、偏见和可理解性。如果人类能够理解\
    \ AI 模型做出决策背后的原因，用户将拥有更大的权力来进行修正和提出建议。有两类不同的用户：业务用户和实践者。业务用户希望用通俗易懂的语言获得可解释性，而不涉及任何统计或数学术语。实践者则希望从计算的角度了解可解释性。本书旨在平衡这两类用户在生成解释时的需求。\n\
    \n本书首先介绍模型可解释性和可理解性的基础知识、AI 应用中的伦理考量以及 AI 模型生成预测中的偏差。然后，您将了解 AI 模型在不同用例中生成预测的可靠性。接着，您将探索用于解释\
    \ AI 中使用的线性模型、非线性模型和时间序列模型的方法和系统。之后，您将学习最复杂的集成模型，以及使用 Lime、SHAP、Skater、ELI5 和\
    \ Alibi 等框架进行可解释性和可理解性分析。然后，您将学习非结构化数据和与文本分类任务相关的自然语言处理的模型可解释性。检查模型公平性还需要使用预测结果模拟假设情景。接下来将涵盖这一点。然后，您将阅读关于\
    \ AI 模型的反事实和对比解释。您将探索深度学习模型、基于规则的专家系统的模型可解释性，以及使用各种 XAI 框架针对预测不变性和计算机视觉任务的模型无关解释。\n\
    \n如今，我们有训练或构建这些模型的 AI 工程师和数据科学家；将这些模型投入生产并使其可操作的软件开发人员；消费模型生成的最终结果或输出的业务用户；以及思考模型所做决策的决策者。领导\
    \ AI 项目/产品的高层会思考：“有没有办法让模型和预测建模者更清晰？”生物统计学家当然会思考如何解释模型预测等。期望是开发一个可解释性框架，以满足在现实世界中让\
    \ AI 发挥作用这一过程中所有相关方的需求。同样，本书在多个相关方之间取得了平衡。它更倾向于数据科学家，因为如果数据科学家至少对可解释性感到信服，他们就可以进一步向业务相关方解释。\n\
    \n用简单、通俗的语言让 AI 模型对业务用户可解释，这需要一些时间。也许未来会出现一些新框架来解决这个问题。目前，挑战在于构建模型的数据科学家对模型行为没有完全清晰的了解，并且在解释\
    \ AI 模型时缺乏清晰度。新培训的数据科学家或即将毕业的数据科学家将从本书中受益匪浅。同样，其他 AI 工程师也将从本书中受益。这是一个不断发展的领域；本书的解释内容截至\
