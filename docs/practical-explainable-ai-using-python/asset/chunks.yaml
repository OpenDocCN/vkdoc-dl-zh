- fmt: '# Ensemble Classification Model: SHAP


    For a regression model you have seen the SHAP features and the feature importance,
    both including the partial dependency plot for a few features. Now let’s look
    at the common and popular income census classification dataset (popularly known
    as the adult dataset). It is popular because it is easy to understand and relatable
    and appears in almost all machine learning example code.


    ```

    # a classic adult census dataset price dataset

    X_adult,y_adult = shap.datasets.adult()

    # a simple linear logistic model

    model_adult = sklearn.linear_model.LogisticRegression(max_iter=10000)

    model_adult.fit(X_adult, y_adult)

    ```


    In the above script, the census income dataset, which is already part of the SHAP
    library, is loaded. A logistic regression model is trained as this is a binary
    classification problem. Finally, a model fit process creates a trained model.


    ```

    def model_adult_proba(x):

    return model_adult.predict_proba(x)[:,1]

    def model_adult_log_odds(x):

    p = model_adult.predict_log_proba(x)

    return p[:,1] - p[:,0]

    ```


    For a classification example using the census income dataset, the target column
    has two labels: people who make more than $50K per annum and people who make less
    than $50K per annum. It is a binary classification model and as a baseline you
    can use a logistic regression model to showcase the PDP as a linear function of
    SHAP values. Then you can use an ensemble model to compare the PDP and show how
    the function becomes non-linear. The non-linear and complex relationship is captured
    by the ensemble model. The two functions named `model_proba` and `model_log_odds`
    provide the probability value of the two classes and the log odds ratio, respectively.


    ```

    # make a standard partial dependence plot

    sample_ind = 18

    fig,ax = shap.partial_dependence_plot(

    "Capital Gain", model_adult_proba, X_adult, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False

    )

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig15_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    PDP between capital gain and the probability of making less than $50K


    The x-axis in Figure [5-15](#506619_1_En_5_Chapter.xhtml#Fig15) shows the capital
    gain variable and the y-axis shows the predicted probabilities of making less
    than $50K. The probability value ranges from 0.05 to 0.99, and after that it becomes
    flat closer to 100% but not exactly 100%. The explanation here is that as the
    capital gains amount exceeds $20K, it has no impact on the predicted probability
    value. Up to $20K, as the capital gain increases, the predicted probability also
    increases.


    ```

    # compute the SHAP values for the linear model

    background_adult = shap.maskers.Independent(X_adult, max_samples=100)

    explainer = shap.Explainer(model_adult_proba, background_adult)

    shap_values_adult = explainer(X_adult[:1000])

    shap.plots.scatter(shap_values_adult[:,"Age"])

    ```


    Figure [5-16](#506619_1_En_5_Chapter.xhtml#Fig16) shows the linear relationship
    but there is a variation in the scatterness of the data points, which shows a
    possibly that non-linearity exists and that it cannot be captured correctly using
    a linear model. Hence there is a need for the ensemble model.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig16_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig16_HTML.jpg)


