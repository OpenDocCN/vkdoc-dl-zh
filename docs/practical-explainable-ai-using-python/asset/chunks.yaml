    的置信区间意味着在 95% 的情况下，预测的真值会落在这个范围内。在当前示例中，你看到的是 95% 的置信区间。显著性水平意味着在双尾假设检验场景中，即 5%
    的显著性水平下，其解释可以在表 3-5 中说明。从解释的角度来看，截距值在建模场景中没有意义。如果训练数据中的所有数值特征都为零，并且所有二元特征都处于其参考类别，那么模型生成的预测将等于截距项。这是一种非常特殊的情况，但在训练数据集中所有数值特征都存在，并且它们被标准化为均值为零、标准差为
