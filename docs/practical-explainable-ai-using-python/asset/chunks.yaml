    some metric in order to generate a final prediction. As an example, a group of
    tree-based models can be developed to predict a real valued output, like a regression
    model. The predictions from all of the trees are averaged and taken for the final
    output. In a similar way, classification models generate individual class predictions
    and then take a voting rule. The class with the highest number is taken as final
    output. The ensemble models are not only difficult to interpret but also difficult
    to explain to the end user. Consider a scenario where four trees predict Yes,
    and six trees predict No; we will consider No as the final answer based on the
    majority rule of 6/4\. Here it is hard to explain to the end user why some models
    predicted yes. Hence it is very important to explain the ensemble models. In this
    chapter, you are going to use SHAP predominantly to explain ensemble model predictions.


    ## Ensemble Models


    Ensemble models are the most complex set of models that need detailed explanation
    as the output is a combined result of multiple predictions. *Ensemble* simply
    implies *grouping*. What is important in the case of ensemble models is how to
    explain the predictions, which model variant actually produced the prediction,
    and how to read the marginal contribution of the features in the final prediction
    process.


    The advantage of the decision tree model is that it takes into consideration the
    potential non-linearity existing in the dataset. The variable interactions come
    into play while generating model predictions. However, the limitation of decision
    tree model is that it is prone to bias, as the powerful or stronger features take
    part in the tree construction process and weak features are not able to enter
    the tree branching process as they lack predictive power. Hence the model becomes
    biased towards a few selective and stronger features from the dataset. This also
    sometimes leads to model overfitting. To balance out the impact of strong features,
    it is important to regulate the entry of features into the tree-based models.
    If you keep the strong features out of the model creation step and only include
    the weak features in the tree creation, you will still be able to generate predictions,
    but this will again be a biased model. Hence treating the model bias and at the
    same time controlling the overfitting can only be done when you use a combination
    of strong and weak features in the tree construction process. The combination
    can be done purely based on a bootstrap method, and number of trees can be increased
    sufficiently to average out the predictions.'
