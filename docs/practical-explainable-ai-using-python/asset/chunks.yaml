    data. The tabular anchor has the parameter requirements shown in Table 12-1.


    **Table 12-1** Parameter Explanations for Anchor Tabular


    | Parameters | Explanation |

    | --- | --- |

    | `Predictor` | A model object that has the predict function that takes an input
    data and generates the output data |

    | `Feature_names` | A list of features |

    | `Categorical_names` | A dictionary where keys are feature columns and values
    are the categories for the feature |

    | `OHE` | Whether the categorical variables are one hot encoded (OHE) or not.
    If not OHE, they are assumed to have ordinal encodings. |

    | `Seed` | For reproducibility |


    ```

    explainer = AnchorTabular(predict_fn, feature_names, categorical_names=category_map,
    seed=12345)

    explainer

    explainer.explanations

    explainer.fit(X_train, disc_perc=[25, 50, 75])

    AnchorTabular(meta={

    ''name'': ''AnchorTabular'',

    ''type'': [''blackbox''],

    ''explanations'': [''local''],

    ''params'': {''seed'': 1, ''disc_perc'': [25, 50, 75]}}

    )

    idx = 0

    class_names = adult.target_names

    print(''Prediction: '', class_names[explainer.predictor(X_test[idx].reshape(1,
    -1))[0]])

    Prediction:  50K

    ```


    The `explainer.explain` object explains the prediction made by a classifier for
    an observation. The `explain` function has the following parameters shown in Table
    12-2.


    **Table 12-2** Explain Function Parameter Values


    | Parameter | Explanation |

    | --- | --- |

    | `Xtest` | New data that needs to be explained |

    | `Threshold` | Minimum precision threshold |

    | `batch_size` | Batch size used for sampling |

    | `coverage_samples` | Number of samples used to estimate coverage from the result
    search |

    | `beam_size` | The number of anchors extended at each step of a new anchor’s
    construction |

    | `stop_on_first` | If True, the beam search algorithm will return the first anchor
    that has satisfied the probability constraint. |

    | `max_anchor_size` | Maximum number of features in a result |


    ```

    explanation = explainer.explain(X_test[idx], threshold=0.95)

    print(''Anchor: %s'' % ('' AND ''.join(explanation.anchor)))

    Output : [Anchor: Capital Loss > 0.00 AND Relationship = Husband AND Marital Status
    = Married AND Age > 37.00 AND Race = White AND Sex = Male AND Country = United-States

    ]

    print(''Precision: %.2f'' % explanation.precision)

    print(''Coverage: %.2f'' % explanation.coverage)

    ```


    In the above example, the precision from the model explanation is only 72% and
    the coverage is only 2%. It can be concluded that the coverage and precision are
    low due to an imbalanced dataset. There are more less-than-$50K earners than there
    are greater-than-$50K earners. You can apply a similar anchors concept on the
    text classification dataset. You are going to use the sentiment analysis dataset
    in this example.'
  raw: '## Anchor Explanations Using Alibi


    In order to generate anchor explanations for a black box model, you are going
    to use the Python library Alibi. The following script shows the import statements
    necessary to explain the concept. You are going to use a random forest classifier,
    which is also a black box model, as there are a number of trees that generate
    predictions and the predictions are assembled to produce the final output.


    ```

    import numpy as np

    import pandas as pd

    from sklearn.ensemble import RandomForestClassifier

    from sklearn.compose import ColumnTransformer

    from sklearn.pipeline import Pipeline

    from sklearn.impute import SimpleImputer

    from sklearn.metrics import accuracy_score

    from sklearn.preprocessing import StandardScaler, OneHotEncoder

    from alibi.explainers import AnchorTabular

    from alibi.datasets import fetch_adult

    ```


    The Alibi library has several datasets in order to generate examples that can
    be used to explain the concept. Here you are going to use the `adult` dataset;
    it’s otherwise known as the census income dataset available from the UCI machine
    learning repository. This is about a binary classification model. There are several
    features that can be used in order to predict the income category and whether
    it is more than $50K or less.


    ```

    adult = fetch_adult()

    adult.keys()

    ```


    The above script brings data to the Jupyter environment. The keys are `dict_keys([''data'',
    ''target'', ''feature_names'', ''target_names'', ''category_map''])`.


    ```

    data = adult.data

    target = adult.target

    feature_names = adult.feature_names

    category_map = adult.category_map

    ```


    The role category `map` function is to map all the categorical columns or the
    string columns present in the data.


    ```

    from alibi.utils.data import gen_category_map

    ```


    The categorical map is just a dummy variable mapping because you cannot use the
    categorical or string variables as they are for computations.


    ```

    np.random.seed(0)

    data_perm = np.random.permutation(np.c_[data, target])

    data = data_perm[:,:-1]

    target = data_perm[:,-1]

    ```


    Before training the model, you randomize the data available in the dataset and
    use 33,000 records for model training and 2,560 records for model testing or validation.


    ```

    idx = 30000

    X_train,Y_train = data[:idx,:], target[:idx]

    X_test, Y_test = data[idx+1:,:], target[idx+1:]

    X_train.shape,Y_train.shape

    X_test.shape, Y_test.shape

    ordinal_features = [x for x in range(len(feature_names)) if x not in list(category_map.keys())]

    ordinal_features

    ```


    After the ordinal features have been selected, you can apply the ordinal feature
    transformer triggered from a pipeline, as follows:


    ```

    ordinal_transformer = Pipeline(steps=[(''imputer'', SimpleImputer(strategy=''median'')),

    (''scaler'', StandardScaler())])

    categorical_features = list(category_map.keys())

    categorical_features

    ```


    The ordinal features are feature numbers 0, 8, 9, and 10, and the categorical
    features are 1, 2, 3, 4, 5, 6, 7, and 11\. For ordinal features you apply a standard
    scaler. If there are missing values, you impute by the median values.


    ```

    categorical_transformer = Pipeline(steps=[(''imputer'', SimpleImputer(strategy=''median'')),

    (''onehot'', OneHotEncoder(handle_unknown=''ignore''))])

    categorical_transformer

    preprocessor = ColumnTransformer(transformers=[(''num'', ordinal_transformer,
    ordinal_features),

    (''cat'', categorical_transformer, categorical_features)])

    ```


    For the categorical features, in case of missing values you apply a median imputation
    technique and perform one hot encoding for the categorical variable transformation.
    If the categorical variable value is unknown, you ignore the value.


    ```

    Preprocessor

    ColumnTransformer(transformers=[(''num'',

    Pipeline(steps=[(''imputer'',

    SimpleImputer(strategy=''median'')),

    (''scaler'', StandardScaler())]),

    [0, 8, 9, 10]),

    (''cat'',

    Pipeline(steps=[(''imputer'',

    SimpleImputer(strategy=''median'')),

    (''onehot'',

    OneHotEncoder(handle_unknown=''ignore''))]),

    [1, 2, 3, 4, 5, 6, 7, 11])])

    ```


    The preprocessor module is now ready for model training. The preprocessor fit
    function transforms the data set for model training. The random forest model for
    classification is initialized with 50 trees as the number of estimators. The initialized
    object is stored in `clf`. The `clf fit` function trains the model.


    ```

    preprocessor.fit(X_train)

    np.random.seed(0)

    clf = RandomForestClassifier(n_estimators=50)

    clf.fit(preprocessor.transform(X_train), Y_train)

    predict_fn = lambda x: clf.predict(preprocessor.transform(x))

    print(''Train accuracy: '', accuracy_score(Y_train, predict_fn(X_train)))

    Train accuracy:  0.9655333333333334

    print(''Test accuracy: '', accuracy_score(Y_test, predict_fn(X_test)))

    Test accuracy:  0.855859375

    ```


    As a next step, you are going to use or fit the anchor explainer to the tabular
    data. The tabular anchor has the parameter requirements shown in Table [12-1](#506619_1_En_12_Chapter.xhtml#Tab1).


    Table 12-1


    Parameter Explanations for Anchor Tabular


    | Parameters | Explanation |

    | --- | --- |

    | `Predictor` | A model object that has the predict function that takes an input
    data and generates the output data |

    | `Feature_names` | A list of features |

    | `Categorical_names` | A dictionary where keys are feature columns and values
    are the categories for the feature |

    | `OHE` | Whether the categorical variables are one hot encoded (OHE) or not.
    If not OHE, they are assumed to have ordinal encodings. |

    | `Seed` | For reproducibility |


    ```

    explainer = AnchorTabular(predict_fn, feature_names, categorical_names=category_map,
    seed=12345)

    explainer

    explainer.explanations

    explainer.fit(X_train, disc_perc=[25, 50, 75])

    AnchorTabular(meta={

    ''name'': ''AnchorTabular'',

    ''type'': [''blackbox''],

    ''explanations'': [''local''],

