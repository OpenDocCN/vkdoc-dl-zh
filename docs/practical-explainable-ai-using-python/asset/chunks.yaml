    Let’s explain a rule: if the total day minutes are less than or equal to 264.45,
    having subscribed to international plans, and the customer makes more than four
    customer service calls, the person is likely to churn. Conversely, if the person
    makes less than four customer service calls, keeping all other factors constant,
    they are not likely to churn. You can explain all other rules in a similar way.


    The above examples are derived from the model’s behavior, as the model provides
    the threshold values in determining the decision to identify a churn-or-no-churn
    scenario. However, the rule''s thresholds are defined by the business user or
    the domain expert who has enough knowledge about the problem statement from an
    expert system.


    The interaction with an expert system can be implemented using natural language
    processing methods such as developing a question/answer systems. However, the
    design and development of an expert system requires the following steps:


    *   Identification of a problem statement


    *   Finding a subject matter expert in the same domain


    *   Establishing the cost benefit of the entire solution


    #### Need for a Rule-Based System


    The need for a rule-based expert system can be attributed to the following:


    *   There is not much data to train a machine learning or deep learning algorithm.


    *   Domain experts frame the rules from their experience, which is based on the
    truth table they carry. Finding such experts always is a challenge.


    *   There is a challenge in reproducing the machine learning models or deep learning
    models as there is a little bit of uncertainty in prediction or classification.


    *   Sometimes it is hard to explain the prediction decisions generated by the
    machine learning models.


    *   Sometimes the machine learning models generate wrong results even if you have
    trained them with the right procedure; hence there is a need to overwrite the
    machine prediction with the rule-based outcome.'
