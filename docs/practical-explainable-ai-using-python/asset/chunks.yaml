    | `max_anchor_size` | Maximum number of features in a result |


    ```

    explanation = explainer.explain(X_test[idx], threshold=0.95)

    print(''Anchor: %s'' % ('' AND ''.join(explanation.anchor)))

    Output : [Anchor: Capital Loss > 0.00 AND Relationship = Husband AND Marital Status
    = Married AND Age > 37.00 AND Race = White AND Sex = Male AND Country = United-States

    ]

    print(''Precision: %.2f'' % explanation.precision)

    print(''Coverage: %.2f'' % explanation.coverage)

