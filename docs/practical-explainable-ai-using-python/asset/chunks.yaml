    prediction) / (1+ exp(raw prediction))`。例如，对于第一条记录，`exp(5.61) / (1+ exp(5.61))
    = 0.9964`。以类似的方式，你可以解释第 91 条记录的原始预测值`-3.4734`。CatBoost 模型提供了预测不同预测类型的选项；参见表 5-7。


    **表 5-7** CatBoost 模型对象生成的预测类型


    | `prediction_type` | 描述 |

