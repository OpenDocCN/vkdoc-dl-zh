    ## 使用 SHAP 解释分类提升模型


    当分类模型的特征包含分类变量时，我们通常会对这些特征进行独热编码，以识别每个特征对目标列的影响。在本例中，你将使用 CatBoost Python 库结合
    SHAP 来生成解释。


    要安装 CatBoost 库，可以使用 `pip` 安装命令。


    ```

    !pip install catboost

    shap.initjs()

    import catboost

    from catboost.datasets import *

    import shap

    ```


    这个人口普查收入数据集包含关系状态、性别、职业和婚姻状况等分类特征。这些分类特征不能直接使用 `sklearn` 或任何其他管道（如 `Keras`、`TensorFlow`
    等）传递给机器学习训练算法。这些分类特征首先需要转换为标签编码，然后再转换为独热编码。如果你有超过一百个分类特征，这会变得非常繁琐。因此，你需要一个能够自动处理此过程的库。CatBoost
    库正好满足了这一需求。


    `Initjs()` 函数将 JavaScript 可视化代码加载到 Jupyter notebook 中。因此，我们使用上述语法来加载 JS 功能。


    CatBoost 回归模型或分类模型基于梯度提升模型运行，因此得名 CatBoost 模型。


    ```

    X,y = shap.datasets.boston()

    model = CatBoostRegressor(iterations=300, learning_rate=0.1, random_seed=123)

    model.fit(X, y, verbose=False, plot=False)

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(X)

    # 可视化第一个预测的解释

    shap.force_plot(explainer.expected_value, shap_values[0,:], X.iloc[0,:])

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig25_HTML.jpg](img/506619_1_En_5_Fig25_HTML.jpg)


    **图 5-25** – 单个记录的预测力图


    在图 5-25 中，你正在尝试解释一个局部预测。对于训练数据集中的第 0 条记录，你展示了预测解释。例如，你使用了波士顿房价数据集，使用默认参数训练了一个
    CatBoost 模型，并保存了该模型。下一步，使用树解释器生成一个解释器对象，然后再次使用该解释器对象，以训练数据集 `X` 作为输入来生成 SHAP 值。最后，使用预测值和训练数据集中第一条输入记录的
    SHAP 值创建了力图可视化。对于第一条记录，预测的房价为 25.35，即 25,350 美元。预测房价的平均值为 22.53，即 22,530 美元。诸如年龄、`PTRATIO`
    和 `LSTAT` 等特征将预测值推高（红色箭头指向右侧）。诸如 `RAD`、`CRIM` 和 `RM` 等特征则将预测值压低，即向左推动，由向后指的蓝色箭头表示。水平轴上以灰色显示的值是所有样本的预测值。


    ```

    # 可视化训练集预测

    shap.force_plot(explainer.expected_value, shap_values, X)

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig26_HTML.jpg](img/506619_1_En_5_Fig26_HTML.jpg)


