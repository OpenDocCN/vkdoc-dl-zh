  trans: '

    评估偏差的第三种重要方法是因果推理，这可以通过创建类似 `if/else` 条件的方式来实现。我们更深入地理解 `if/else` 条件，因此，使用因果推理将记录分类为二元类别，可以为算法的偏差性提供额外的见解。`if/else/then`
    条件可以通过考虑训练数据集中存在的所有特征来应用。


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig3_HTML.png](img/506619_1_En_2_Fig3_HTML.png)


    图 2-3


    衡量偏差的指标


    AI 系统中的伦理问题可以通过以下方式解决：确保系统质量，这取决于流程的正确性、预测的效率、预测的稳健性、在个体层面决策的可解释性、确保安全与隐私考量，并为所有人构建透明的架构，以便所有利益相关者都能了解
    AI 决策系统及其内部流程。一个良好的 AI 系统应为其生成的决策负责，因此这些决策必须是公平的。


    当前形式的 AI 治理及相关政策限制了将数据用于其他目的的重用，但并未限制机器学习中的迁移学习。在一个场景中训练好的 ML 和 DL 模型可以在组织内部或外部的另一个场景中重用。然而，这些限制并不适用于模型本身。模型包含关于训练数据的关键信息，任何开发者都可能通过逆向工程获取这些信息，并将其用于其他目的。例如，在虚拟试戴眼镜时，我们上传一张图片，系统会将面部分类为由训练模型生成的特定类别，如椭圆形、方形或圆形。系统随后会显示为该类脸型设计的镜框。竞争对手公司可以利用这个系统生成自己的训练数据，并创建一个类似的系统。《通用数据保护条例》（GDPR）于
    2018 年颁布，旨在确保个人有权基于其数据获得任何 AI 驱动的决策。如果涉及个人数据，则必须遵守该条例。然而，如果是非个人数据，则 GDPR 不适用。


    从预测模型中消除偏差的高级流程如图 2-4 所示。预测 1 和预测 2 应该匹配。如果匹配，则该数据点被视为无偏差；否则，即为有偏差。如果数据点有偏差，则应将其从模型训练过程中剔除，以获得无偏差的模型。


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig4_HTML.png](img/506619_1_En_2_Fig4_HTML.png)


    图 2-4


    从模型训练中消除偏差的流程


    为了减少算法模型中的偏差，可解释性是必不可少的。机器学习模型在生产前通常会根据可解释性、稳健性、公平性、安全性和隐私性进行评估，同时也会评估训练好的模型是否学习了模式、欠拟合或过拟合。ML
    模型的公平性理想情况下应基于两个特定原因进行评估：


    *   模型的预测（即 ML 模型生成的决策）

    *   数据偏差对模型公平性的影响


    ## AI 的可靠性


    AI 技术的发展给医学影像领域带来了重大变革。3D 打印的 AR 和 VR 体验在软件环境中提供了逼真的体验。一个稳健的 AI 系统如果能产生无偏见、无歧视的伦理洞察，那么它就是可靠的。存在一些算法偏差的案例，这些偏差在预测中表现为种族、政治和性别导向。为了提升
    AI 系统的可靠性，我们需要将 ML 可解释性、ML 模型的设计考量、ML 模型管理和训练纳入考量。基于数据驱动的自动化决策支持的 AI 系统的可靠性，取决于算法的无偏性。


    算法歧视是决策过程中偏差带来的负面后果之一。它导致基于种姓、信仰、宗教、性别和种族的个体受到不公平对待。随着解决方案的偏差减少且几乎不存在歧视，自动化决策支持系统的可靠性会随之提高。考虑一个信用评估系统，AI
    系统会评估谁应该获得信贷，谁不应该。算法做出的决策可能是理性的，但有时我们必须使其非常透明，以免某些群体认为该决策对其群体不利。自动化决策系统中的偏差和歧视是两回事。


    歧视是基于人口统计特征或属性对群体或阶层的不公平、不平等的对待。这种歧视在批准用户贷款和信贷请求的 AI 决策系统中很常见。随着我们在智能系统中越来越多地采用自动化和
    AI/ML，在决策中发现歧视的风险也更大。因此，必须通过解释决策并使流程高度透明，来使系统消除歧视。歧视是故意的。然而，偏差是无意的，并且是模型训练过程中固有的。因此，只有当我们建立一个既无歧视也无偏差的系统时，AI
    系统的可靠性才会提高，AI 系统的采用率才会上升。


    为了增加对 AI 模型及其相关服务的信任和可靠性，有必要解释决策是如何做出的。AI 系统的可靠性应该是所有参与为客户开发 AI 解决方案的利益相关者的共同责任。通常，业务所有者是客户（组织内部或外部），他们提供系统的高级目标以及他们希望开发的功能。


    ![../images/506619_1_En_2_Chapter/506619_1_En_2_Fig5_HTML.png](img/506619_1_En_2_Fig5_HTML.png)


    图 2-5


    信任与可靠性之旅


    确保在 AI 模型创建和部署到生产系统过程中的信任和可靠性，是所有利益相关者的责任（图 2-5）。为了赢得信任，在开发系统时需要适当的文档记录。文档应解决某些问题：训练此类系统使用了哪些数据？该模型能否用于其他领域或其他用例？模型在哪些最佳场景下表现更好？我们是否知道模型表现不佳的情况？如果我们知道模型在某些情况下表现不佳，我们如何从系统中消除这种偏差？是否有任何机制来解释
    AI 系统生成的预测？这些问题应附有示例以及领域和案例研究的名称进行记录。


    ## 结论


    在本章中，您学习了 AI 系统设计中的伦理、算法偏差和模型可靠性。我们人类总是在寻找方法使我们的理解正确并趋于完美。AI 系统是在一个不平等世界中开发和使用的，灾难性事件显而易见且频繁发生。我们从错误中学习，并制定新规则以在未来避免它们。从以上三个概念来看，将可解释
    AI 置于前沿至关重要，以便至少为 AI 系统做出的决策提供可解释性、信任和可靠性，并维护既定的伦理标准。

