  raw: 'The pursuit of finding the minimum information that possibly can change the
    prediction or help in staying with a prediction is generally the most important
    feature value from the input dataset. The matching of input data with an abstract
    layer generated from the data is used to identify the present or absence of minimum
    information. The abstract layer is called the autoencoder. For an image classification
    problem, it can be a convolutional autoencoder. The autoencoder is trained by
    using the input data in the input layer as well as in the output layer. The model
    is trained to exactly predict the same output as input. Once the input and output
    match, then the innermost hidden layer in the neural network model weights can
    be derived as autoencoder values. These autoencoder values help in identifying
    the minimum information availability in any input dataset. The following script
    shows how to train an autoencoder model. It is a neural network model. It takes
    the 28x28 pixels as input and produces 28x28 pixels as output.


    ```

    # Define and train an Auto Encoder, it works like a principal component analysis
    model

    def ae_model():

    x_in = Input(shape=(28, 28, 1))

    x = Conv2D(16, (3, 3), activation=''relu'', padding=''same'')(x_in)

    x = Conv2D(16, (3, 3), activation=''relu'', padding=''same'')(x)

    x = MaxPooling2D((2, 2), padding=''same'')(x)

    encoded = Conv2D(1, (3, 3), activation=None, padding=''same'')(x)

    x = Conv2D(16, (3, 3), activation=''relu'', padding=''same'')(encoded)

    x = UpSampling2D((2, 2))(x)

    x = Conv2D(16, (3, 3), activation=''relu'', padding=''same'')(x)

    decoded = Conv2D(1, (3, 3), activation=None, padding=''same'')(x)

    autoencoder = Model(x_in, decoded)

    autoencoder.compile(optimizer=''adam'', loss=''mse'')

    return autoencoder

    ae = ae_model()

    ae.summary()

    ae.fit(x_train, x_train, batch_size=128, epochs=4, validation_data=(x_test, x_test),
    verbose=0)

    ae.save(''mnist_ae.h5'', save_format=''h5'')

    ```


    The summary of the model shows the architecture and the total number of trainable
    parameters. The trainable parameters have updated weights in each iteration of
    the model. There are no non-trainable parameters. Once the autoencoder model is
    ready, then you can load the model object into a session. Using predict function
    on the test set, you can generate decoded MNIST images. The output from the following
    script shows that the test images exactly match the generated images using the
    autoencoder function, which means your autoencoder model is quite robust in generating
    the exact output. The autoencoder model has two parts: encoder and decoder. The
    role of the encoder is to transform any input into an abstract layer and the role
    of the decoder is to reconstruct the same input from the abostract layer.


