    \n```\ndef superpixel(image, size=(4, 7)):\n    segments = np.zeros([image.shape[0],\
    \ image.shape[1]])\n    row_idx, col_idx = np.where(segments == 0)\n    for i,\
    \ j in zip(row_idx, col_idx):\n        segments[i, j] = int((image.shape[1]/size[1])\
    \ * (i//size[0]) + j//size[1])\n    return segments\nsegments = superpixel(x_train[idx])\n\
    plt.imshow(segments);\npredict_fn = lambda x: cnn.predict(x)\nimage_shape = x_train[idx].shape\n\
    explainer = AnchorImage(predict_fn, image_shape, segmentation_fn=superpixel)\n\
    i = 11\nimage = x_test[i]\nplt.imshow(image[:,:,0]);\ncnn.predict(image.reshape(1,\
    \ 28, 28, 1)).argmax()\nexplanation = explainer.explain(image, threshold=.95,\
    \ p_sample=.8, seed=0)\nplt.imshow(explanation.anchor[:,:,0]);\nexplanation.meta\n\
