    |


    Tf-idf is a vector-based representation of textual data. This is very useful when
    the count-based features have high frequencies. In order to avoid the influence
    of high frequency words on the classification algorithm, it is preferable to use
    the tf-idf-based vectorizer. When initializing the tf-idf vectorizer, if you provide
    the stop word option, then for the stop words the vectors will not be created.
    Also, for the tf-idf calculation the stop word count will not be considered. Stop
    words are defined as words that do not have any meaning themselves but help us
    understand the context along with other words. As a feature, they do not add much
    value to the text classification task; rather, they increase the dimensionality
    of the data. Hence stop word removal will help you get better accuracy by reducing
    the data dimensions. See Figure [7-8](#506619_1_En_7_Chapter.xhtml#Fig8).


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig8_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig8_HTML.jpg)


