    ### Model Explainability


    Model interpretation can be done by looking at the beta coefficients of the model.
    The biggest advantages of a linear regression model are simplicity and linearity,
    which makes the model interpretation easy. Linear regression also forces the prediction
    to be a linear combination of the features. The confidence interval is the range
    of values within which the true prediction value will fall. A 95% confidence interval
    means 95% of the times the true value of prediction will fall within the range.
    In the current example, you are looking at a 95% confidence interval. The level
    of significance means in a two tailed test of hypothesis scenario, which is a
    5% level of significance, the interpretation can be explained in Table [3-5](#506619_1_En_3_Chapter.xhtml#Tab5).
    The intercept value has no significance in a modelling scenario from interpretation
    point of view. If all the numerical features in the training data are zero and
    all the binary features are at their reference category, then the prediction generated
    by the model would be equivalent to the intercept term. This is a very exceptional
    scenario, but in a case where all the numerical features are there in the training
    dataset and they are standardized with mean zero and standard deviation 1, then
    the intercept term reflects the predicted outcome of the instance, where all features
    are at their mean value.


