  trans: '

    ### 可解释性 vs. 可理解性


    模型解释与可解释性之间存在差异。**可理解性**关乎预测结果的含义，而**可解释性**则关乎模型为何做出某个预测，以及人们为何应该信任该模型。为了更好地理解这种差异，让我们看一个销售预测的真实案例。在该案例中，有助于预测的因素包括广告费用、产品质量、广告制作来源、广告尺寸等。回归建模完成后，每个因素都有一个系数。这些系数可以理解为，当某个因素（如广告费用）发生单位变化时，销售额的增量变化。然而，如果你预测下个月的销售额将达到
    20,000 美元，而历史月平均销售额一直低于或等于 15,000 美元，这就需要一个解释。作为模型可解释性的一部分，我们需要以下几点：


    - 模型可理解性确保决策过程自然，且预测中不存在偏见。

    - 区分虚假因果关系与真实因果关系，这有助于使预测过程透明化。

    - 需要在保证学习经验和迭代的高性能不受影响的前提下，生成可解释的模型。

    - 使决策者能够信任 AI 模型。


    > “XAI 应用和产品将成为 2021 年的新趋势，因为对 AI 可理解性、信任度和伦理学的需求已经非常明确且强烈。” – 普拉迪普塔·米什拉（来源：各类研究报告）


    围绕 XAI 的研究从未停止，其目标始终是向最终用户解释 AI 模型及其行为，以提高 AI 模型的采用率。那么问题来了，谁是 XAI 的最终用户？


    - 信贷官员：他们评估贷款、信贷请求等申请。如果他们理解了决策，就能帮助教育客户纠正其行为。

    - 数据科学家：他们评估自己的解决方案，并确保模型得到改进。这是否是利用当前数据集所能构建的最佳模型？

    - 高级管理人员：他们需要在高层面上满足监管和合规要求。

    - 业务负责人：他们需要信任 AI 黑箱决策，并寻找任何可以依赖的历史证据。

    - 客户支持主管：他们需要回应投诉并解释决策。

    - 内部审计师和监管机构：他们必须确保建立了一个透明的、数据驱动的流程。


    XAI 的目标是实现以下几点：


    - **信任**：预测准确性是数据质量、真实因果关系和合适算法选择的明确函数。然而，模型在预测过程中容易产生误报。如果模型产生大量误报，最终用户就会失去对模型的信任。因此，向最终用户传达对模型的信心至关重要。

    - **关联性**：机器学习或深度学习模型通过学习各种特征之间的关联来进行预测。这些关联可能是相关性，也可能仅仅是关联。无法解释的相关性就是虚假相关性，它会使模型难以理解。因此，捕捉真实的相关性非常重要。

    - **可靠性**：对模型的信心、模型预测的稳定性以及模型的鲁棒性也非常重要。这是为了增强 AI 模型的可信度，并确保最终用户对模型预测有足够的信心。如果做不到这一点，就没有用户会信任这些模型。

    - **公平性**：AI 模型应该是公平且符合伦理的。它们在生成预测时不应基于宗教、性别、阶级和种族进行歧视。

    - **身份识别**：AI 模型应能完好地保护隐私，不泄露个人身份。在生成 XAI 时，隐私和身份管理非常重要。


    ### 可解释性类型


    机器学习可理解性是模型可解释性的一个组成部分。模型解释有多种分类方式：


    - **内在解释**：简单模型属于此类，例如简单的线性回归模型和基于决策树的模型，其中简单的 if/else 条件就能解释预测结果。这意味着 XAI 内置于模型本身，无需进行任何事后分析。

    - **事后解释**：复杂模型，如非线性模型、集成树模型、随机梯度提升树模型和堆叠模型，需要投入更多精力来创建可解释性。

    - **模型特定**：有一类解释只能从特定类型的模型中得出，仅此而已。例如，线性回归模型不提供特征重要性。但有人可以将线性回归模型的系数用作代理指标。

    - **模型无关**：这类解释可以通过查看训练输入数据和训练输出数据的组合来理解。在本书中，我们将在后续章节中探讨模型无关的解释。

    - **局部解释**：这提供了关于单个预测的概念，即对单个数据点的解释。例如，如果模型预测某个借款人可能违约，原因是什么？这就是局部解释。

    - **全局解释**：这提供了对所有数据点预测结果的全局理解、整体模型行为等方面的概念。

    - **子局部解释**：这解释了一组数据点（而非所有数据点）的局部情况。这与局部解释不同。

    - **文本解释**：基于文本的解释包括数字部分以及用于传达模型某些参数含义的语言。

    - **可视化解释**：可视化解释很好，但有时它们不够直观，无法解释预测结果，因此非常需要可视化与文本解释相结合。


    ### 模型可解释性工具


    有多种工具和框架可用于从机器学习和深度学习模型中生成可解释性。开源的 Python 库各有优缺点。在本书的所有示例中，我们将混合使用开源的 Python 库以及来自各个网站的公开数据集。以下是需要安装的工具和需要设置的环境。


    ### SHAP


    SHAP（SHapley Additive exPlanations）库是一种基于 Python 的统一方法，用于解释任何机器学习模型的输出。SHAP Python
    库基于博弈论，并提供局部解释。博弈论方法是一种在某个因素存在与不存在时获取预测结果的方式。如果预期结果发生显著变化，则该因素对目标变量非常重要。该方法统一了先前几种解释机器学习模型输出的方法。SHAP
    框架可用于除时间序列模型之外的各种模型类型。参见图 1-5。SHAP 库可用于理解模型。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig5_HTML.png](img/506619_1_En_1_Fig5_HTML.png)


    图 1-5 Shapley 值与解释示例图


    要安装 SHAP，可以使用以下方法：


    - `!Pip install shap`（在 Jupyter notebook 中）

    - `conda install -c conda-forge shap`（使用终端）


    ```

    !pip3 install shap

    ```

    '
- fmt: '### LIME


    `LIME` stands for Local Interpretable Model-Agnostic Explanations. Local refers
    to the explanation around the locality of the class that was predicted by the
    model. The behavior of the classifier around the locality gives a good understanding
    about the predictions. Interpretable means if the prediction cannot be interpreted
    by a human being, there is no point. Hence the class predictions need to be interpretable.
    Model agnostic implies instead of understanding a particular model type, the system
    and method should be able to generate the interpretations.


    A text classification problem such as sentiment analysis or any other text classification
    is where the input is sentences as documents and the output is a class. See Figure
    [1-6](#506619_1_En_1_Chapter.xhtml#Fig6). When the model predicts a positive sentiment
    for a sentence, we need to know which words made the model predict the class as
    positive. These word vectors are sometimes very simple, such as individual words.
    Sometimes they are complex, such as word embeddings, in which case we need to
    know how the model interpreted the word embeddings and how it impacts the classification.
    In those scenarios, `LIME` is extremely useful in making sense of machine learning
    and deep learning models. `LIME` is a Python-based library that can be leveraged
    to showcase how it works. The following step can be followed to install the library:


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig6_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig6_HTML.png)


    Figure 1-6


    An example of mushroom classification


    ```

    !pip install lime

    ```


    ### ELI5


    `ELI5` is a Python-based library intended to be used for an explainable AI pipeline,
    which allows us to visualize and debug various machine learning models using a
    unified API. It has built-in support for several ML frameworks and provides a
    way to explain black box models. The purpose of the library is to make explanations
    easy for all kinds of black box models. See Figure [1-7](#506619_1_En_1_Chapter.xhtml#Fig7).


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig7_HTML.jpg](images/506619_1_En_1_Chapter/506619_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Sample image of ELI5


    Figure [1-7](#506619_1_En_1_Chapter.xhtml#Fig7) from `ELI5` shows the importance
    of factors in predicting the income class in the income classification use case,
    which we are going to look at in subsequent chapters. The Python installation
    of `ELI5` can be done using the following syntax:


    ```

    !pip install eli5

    ```


    This requires many Python-based libraries to be updated and you may have to wait
    for some time for this to happen.


    ### Skater


    `Skater` is an open source unified framework to enable model interpretation for
    all forms of models to help us build an interpretable machine learning system,
    which is often needed for real world use-cases. `Skater` supports algorithms to
    demystify the learned structures of a black box model both globally (inference
    on the basis of a complete data set) and locally (inference about an individual
    prediction).


    `Skater` enables this vision by providing the ability to infer and debug the model’s
    decision policies as needed, bringing “a human into the loop.” See Figure [1-8](#506619_1_En_1_Chapter.xhtml#Fig8).
    To install the `Skater` library, we can use the following command:


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig8_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig8_HTML.png)


    Figure 1-8


    Sample image showing PDP using SHAP and Skater


    ```

    !pip install skater

    ```


    ### Skope_rules


    `Skope-rules` aims at learning logical, interpretable rules for “scoping” a target
    class (i.e., detecting with high precision instances of this class). `Skope-rules`
    is a tradeoff between the interpretability of a decision tree and the modelling
    power of a random forest. See Figure [1-9](#506619_1_En_1_Chapter.xhtml#Fig9).


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig9_HTML.jpg](images/506619_1_En_1_Chapter/506619_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Skope-rules example image


    The above mentioned Python-based libraries are mostly open source and free to
    use and integrate in any software application. However, there are a bunch of enterprise-based
    tools and frameworks that are available, such as `H2O.ai`. The area of XAI is
    relatively new, as the research is still happening in making model interpretation
    easy. Tools and frameworks are coming to the forefront to make the process available
    for the industry to apply in various use cases.


    ### Methods of XAI for ML


    The levels of transparency in the machine learning models can be categorized into
    three groups: transparency of algorithms, decomposition of the parameters and
    hyper parameters, and reproducibility of the same result in similar situations.
    Some ML models by design are interpretable and some require a set of other programs
    to make them explainable. Figure [1-10](#506619_1_En_1_Chapter.xhtml#Fig10) explains
    the methods of model explainability.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig10_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig10_HTML.png)


    Figure 1-10


    Methods of XAI


    There are three methods of model explainability:


    *   The textual explanation requires elaborating the meaning of a mathematical
    formula, an outcome of a model parameter, or metrics defined by the model. The
    interpretations can be designed based on a predefined template where the story
    line has to be prepared beforehand and only the parameters need to be populated
    in the template. There are two different approaches to achieve this: using Natural
    Language Generation (NLG) methods, which requires gather text and making a sentence
    that describes the object, and explaining using summary generation.


    *   The visual explanation can be delivered using custom graphs and charts. Tree-based
    charts are quite easy and self-explanatory for end users. Each tree based-method
    is backed by a set of rules. If these rules can be shown to the user in terms
    of simple `if/else` statements, it is going to be much more powerful.


    *   The example-based method ensures that we can take common day-to-day examples
    to explain the model by drawing parallels. Also, a common business scenario can
    be used to explain the models.'
  raw: '### LIME


    LIME is stands for Local Interpretable Model-Agnostic Explanations. Local refers
    to the explanation around the locality of the class that was predicted by the
    model. The behavior of the classifier around the locality gives a good understanding
    about the predictions. Interpretable means if the prediction cannot be interpreted
    by a human being, there is no point. Hence the class predictions need to be interpretable.
    Model agnostic implies instead of understanding a particular model type, the system
    and method should be able to generate the interpretations.


    A text classification problem such as sentiment analysis or any other text classification
    is where the input is sentences as documents and the output is a class. See Figure
    [1-6](#506619_1_En_1_Chapter.xhtml#Fig6). When the model predicts a positive sentiment
    for a sentence, we need to know which words made the model predict the class as
    positive. These word vectors are sometimes very simple, such as individual words.
    Sometimes they are complex, such as word embeddings, in which case we need to
    know how the model interpreted the word embeddings and how it impacts the classification.
    In those scenarios, LIME is extremely useful in making sense of machine learning
    and deep learning models. LIME is a Python-based library that can be leveraged
    to showcase how it works. The following step can be followed to install the library:


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig6_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig6_HTML.png)


    Figure 1-6


    An example of mushroom classification


    ```

    !pip install lime

    ```


    ### ELI5


    ELI5 is a Python-based library intended to be used for an explainable AI pipeline,
    which allows us to visualize and debug various machine learning models using a
    unified API. It has built-in support for several ML frameworks and provides a
    way to explain black box models. The purpose of the library is to make explanations
    easy for all kinds of black box models. See Figure [1-7](#506619_1_En_1_Chapter.xhtml#Fig7).


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig7_HTML.jpg](images/506619_1_En_1_Chapter/506619_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Sample image of ELI5


    Figure [1-7](#506619_1_En_1_Chapter.xhtml#Fig7) from ELI5 shows the importance
    of factors in predicting the income class in the income classification use case,
    which we are going to look at in subsequent chapters. The Python installation
    of ELI5 can be done using the following syntax:


    ```

    !pip install eli5

    ```


    This requires many Python-based libraries to be updated and you may have to wait
    for some time for this to happen.


    ### Skater


    Skater is an open source unified framework to enable model interpretation for
    all forms of models to help us build an interpretable machine learning system,
    which is often needed for real world use-cases. Skater supports algorithms to
    demystify the learned structures of a black box model both globally (inference
    on the basis of a complete data set) and locally (inference about an individual
    prediction).


    Skater enables this vision by providing the ability to infer and debug the model’s
    decision policies as needed, bringing “a human into the loop.” See Figure [1-8](#506619_1_En_1_Chapter.xhtml#Fig8).
    To install the Skater library, we can use the following command:


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig8_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig8_HTML.png)


    Figure 1-8


    Sample image showing PDP using SHAP and Skater


    ```

    !pip install skater

    ```


    ### Skope_rules


    Skope-rules aims at learning logical, interpretable rules for “scoping” a target
    class (i.e., detecting with high precision instances of this class). Skope-rules
    is a tradeoff between the interpretability of a decision tree and the modelling
    power of a random forest. See Figure [1-9](#506619_1_En_1_Chapter.xhtml#Fig9).


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig9_HTML.jpg](images/506619_1_En_1_Chapter/506619_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Skope-rules example image


    The above mentioned Python-based libraries are mostly open source and free to
    use and integrate in any software application. However, there are a bunch of enterprise-based
    tools and frameworks that are available, such as H2O.ai. The area of XAI is relatively
    new, as the research is still happening in making model interpretation easy. Tools
    and frameworks are coming to the forefront to make the process available for the
    industry to apply in various use cases.


    ### Methods of XAI for ML


    The levels of transparency in the machine learning models can be categorized into
    three groups: transparency of algorithms, decomposition of the parameters and
    hyper parameters, and reproducibility of the same result in similar situations.
    Some ML models by design are interpretable and some require a set of other programs
    to make them explainable. Figure [1-10](#506619_1_En_1_Chapter.xhtml#Fig10) explains
    the methods of model explainability.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig10_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig10_HTML.png)


    Figure 1-10


    Methods of XAI


    There are three methods of model explainability:


    *   The textual explanation requires elaborating the meaning of a mathematical
    formula, an outcome of a model parameter, or metrics defined by the model. The
    interpretations can be designed based on a predefined template where the story
    line has to be prepared beforehand and only the parameters need to be populated
    in the template. There are two different approaches to achieve this: using Natural
    Language Generation (NLG) methods, which requires gather text and making a sentence
    that describes the object, and explaining using summary generation.


    *   The visual explanation can be delivered using custom graphs and charts. Tree-based
    charts are quite easy and self-explanatory for end users. Each tree based-method
    is backed by a set of rules. If these rules can be shown to the user in terms
    of simple if/else statements, it is going to be much more powerful.


    *   The example-based method ensures that we can take common day-to-day examples
    to explain the model by drawing parallels. Also, a common business scenario can
    be used to explain the models.'
  trans: '

    ### LIME


    `LIME` 代表局部可解释的模型无关解释（Local Interpretable Model-Agnostic Explanations）。其中，“局部”指的是围绕模型预测的类别所在局部区域进行解释。分类器在该局部区域的行为有助于我们很好地理解其预测结果。“可解释”意味着，如果预测结果无法被人类理解，那就毫无意义。因此，类别预测必须是可解释的。“模型无关”则意味着，该系统和方法应能够生成解释，而无需理解特定的模型类型。


    文本分类问题，例如情感分析或任何其他文本分类，其输入是作为文档的句子，输出是一个类别。参见图 1-6。当模型预测一个句子具有积极情感时，我们需要知道是哪些词使得模型将类别预测为积极。这些词向量有时非常简单，例如单个词语。有时则很复杂，例如词嵌入，在这种情况下，我们需要知道模型如何解释词嵌入，以及它如何影响分类。在这些场景中，`LIME`
    对于理解机器学习和深度学习模型极其有用。`LIME` 是一个基于 Python 的库，可用于展示其工作原理。可以按照以下步骤安装该库：


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig6_HTML.png](img/506619_1_En_1_Fig6_HTML.png)


    图 1-6


    蘑菇分类示例


    ```

    !pip install lime

    ```


    ### ELI5


    `ELI5` 是一个基于 Python 的库，旨在用于可解释的人工智能管道，它允许我们通过统一的 API 来可视化和调试各种机器学习模型。它内置了对多个机器学习框架的支持，并提供了一种解释黑盒模型的方法。该库的目的是让各种黑盒模型的解释变得简单。参见图
    1-7。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig7_HTML.jpg](img/506619_1_En_1_Fig7_HTML.jpg)


    图 1-7


    ELI5 示例图片


    图 1-7 来自 `ELI5`，展示了在收入分类用例中，各因素对预测收入类别的重要性，我们将在后续章节中探讨这个用例。可以使用以下语法通过 Python 安装
    `ELI5`：


    ```

    !pip install eli5

    ```


    这需要更新许多基于 Python 的库，你可能需要等待一段时间才能完成。


    ### Skater


    `Skater` 是一个开源统一框架，旨在为所有形式的模型提供模型解释，帮助我们构建一个可解释的机器学习系统，这在现实世界的用例中通常是必需的。`Skater`
    支持多种算法，可以从全局（基于完整数据集进行推理）和局部（对单个预测进行推理）两个层面，揭示黑盒模型学习到的结构。


    `Skater` 通过提供按需推断和调试模型决策策略的能力，将“人类引入循环”，从而实现这一愿景。参见图 1-8。要安装 `Skater` 库，我们可以使用以下命令：


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig8_HTML.png](img/506619_1_En_1_Fig8_HTML.png)


    图 1-8


    使用 SHAP 和 Skater 展示 PDP 的示例图片


    ```

    !pip install skater

    ```


    ### Skope_rules


    `Skope-rules` 旨在学习逻辑性强、可解释的规则，用于“界定”目标类别（即，高精度地检测该类别的实例）。`Skope-rules` 是决策树的可解释性与随机森林的建模能力之间的一种权衡。参见图
    1-9。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig9_HTML.jpg](img/506619_1_En_1_Fig9_HTML.jpg)


    图 1-9


    Skope-rules 示例图片


    上述基于 Python 的库大多是开源的，可以免费使用并集成到任何软件应用中。然而，也存在一些企业级的工具和框架，例如 `H2O.ai`。XAI 领域相对较新，因为使模型解释变得简单的研究仍在进行中。各种工具和框架正逐渐涌现，以便工业界能够在各种用例中应用这一过程。


    ### 机器学习可解释人工智能的方法


    机器学习模型中的透明度级别可以分为三类：算法的透明度、参数和超参数的分解，以及在相似情况下结果的可复现性。有些机器学习模型天生就是可解释的，而有些则需要一组其他程序来使其可解释。图
    1-10 解释了模型可解释性的方法。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig10_HTML.png](img/506619_1_En_1_Fig10_HTML.png)


    图 1-10


    可解释人工智能的方法


    模型可解释性有三种方法：


    *   文本解释需要阐述数学公式、模型参数的结果或模型定义的指标的含义。解释可以基于预定义的模板来设计，其中故事线需要事先准备好，只需在模板中填充参数即可。有两种不同的方法可以实现这一点：使用自然语言生成方法，这需要收集文本并生成描述对象的句子；以及使用摘要生成进行解释。


    *   视觉解释可以通过自定义图表和图形来提供。基于树的图表对最终用户来说相当简单且不言自明。每种基于树的方法都有一组规则支持。如果这些规则能够以简单的 `if/else`
    语句形式展示给用户，那将会强大得多。


    *   基于示例的方法确保我们可以通过类比，使用常见的日常示例来解释模型。此外，也可以使用常见的业务场景来解释模型。

    '
- fmt: '### XAI Compatible Models


    Let’s have a look at the current state of the models, their built-in nature, how
    compatible they are for XAI, and whether these models need additional frameworks
    for explainability.


    - **Linear models**: The linear regression models or logistic regression models
    are easy to interpret by analyzing their coefficient value, which is a number.
    These values are very easy to interpret. However, if we extend this to regularized
    regression families, it becomes very difficult to explain. Usually we give more
    importance to the individual features. We do not incorporate the interaction features.
    The complexity of the model goes up if we include interactions, such as additive
    interactions, multiplicative interactions, polynomial of degree two-based interactions,
    or polynomial of degree three-based interactions. The mathematical result need
    a simpler way of interpretation. Hence there is a lot more to explain in those
    complex scenarios.


    - **Time series forecasting models**: These are also very simple models which
    follow a regression kind of scenario that can be explained easily by taking a
    parametric approach.


    - **Tree-based models**: Tree-based models are simpler to analyze and also very
    intuitive for humans to interpret. However, these models often do not provide
    better accuracy and performance. They also lack robustness and have inherent problems
    of biasness and overfitting. Since there are so many drawbacks, the interpretation
    has no point for the end user.


    - **Ensemble-based models**: There are three different types of ensemble models:
    bagging, boosting, and stacking. All three types lack explainability. A simplified
    description is required to convey the model results. The feature importance also
    needs to be simplified.


    - **Mathematical models**: Vector mathematics-based support vector machines are
    used for regression-based tasks and classification-based tasks. These models are
    quite difficult to explain, hence model simplification is very much needed.


    - **Deep learning models**: Deep neural network (DNN) models usually have more
    than three hidden layers in order to qualify for the definition of deep. Apart
    from the layers of the deep learning model, there are various model tuning parameters
    such as weights, regularization types, regularization strength, types of activation
    functions at different layers, types of loss functions used in the model, and
    optimization algorithms including the learning rate and momentum parameters. This
    is very complex in nature and requires a simplified framework for interpretation.


    - **Convolutional Neural Network (CNN)**: This is another type of neural network
    model which is usually applied to object detection and image classification-related
    tasks. This is considered as a complete black box model. There are convolution
    layers, max/average pooling layers, and more. If someone asks why the model predicted
    the cat as a dog, can we explain what went wrong? Currently the answer is no.
    Extensive work is required in explaining this model to the end user.


    - **Recurrent neural networks (RNNs)**: The recurrent neural network-based models
    are usually applicable in text classification and text prediction. There are variations,
    such as long short term memory network (LSTM) and bi-directional LSTMs, which
    are very complex to explain. There is a constant need for better frameworks and
    methods that can be used to explain such models.


    - **Rule-based models**: These are super easy models as we only need the `if/else`
    conditions to have these models in place.


    ### XAI Meets Responsible AI


    Responsible artificial intelligence is a framework where explainability, transparency,
    ethics, and accountability are ensured in various software applications, digital
    solutions, and products. The development of AI is rapidly creating multiple opportunities
    in different sectors where a common man’s life is touched by these technologies,
    hence AI needs to be responsible and decisions should be explainable.


    The seven core pillars of responsible AI are a critical part of explainability
    (Figure [1-11](#506619_1_En_1_Chapter.xhtml#Fig11)). Let’s have a look at each
    of the pillars.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig11_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig11_HTML.png)


    Figure 1-11


    Core pillars of responsible AI


    - **Fairness**: The predictions generated by AI systems should not lead to discrimination
    against persons in relation to their cast, creed, religion, gender, political
    affiliations, ethnicity, and more, hence a greater degree of fairness is required.


    - **Ethics**: In the pursuit of building intelligent systems, we should not forget
    ethics in using data for gathering intelligence.


    - **Transparency**: Model predictions and how predictions are generated should
    be transparent.


    - **Privacy**: Personalized data (PII, personalized identifiable information)
    should be safeguarded when developing AI systems.


    - **Security**: Intelligent systems should be secure.


    - **Accountability**: In case of an erroneous prediction, the AI model should
    be able to take accountability in fixing the issue.


    - **Safety**: When the AI models make decisions regarding the navigation of self-driving
    cars, robotic dental surgery, and a data-driven medical diagnosis, any incorrect
    prediction can lead to dangerous consequences.


    Many organizations are in the process of preparing guidelines and standards for
    using AI in their solutions, in order to avoid unintended negative consequences
    of AI in future. Let’s take organization A. It uses AI to predict the volume of
    sales. The AI predicts that sales are going to be 30% higher than average and
    so the business stocks volumes of the product and mobilizes manpower to support
    sales. But if the actual sales are really at par with the historical sales average,
    then the stocking of additional volume and manpower was a waste. Here the AI prediction
    was wrong. With the help of model explainability, this situation could have been
    analyzed and probably the model can be corrected.'
