    # 12. Model-Agnostic Explanations by Identifying Prediction Invariance


    The invariant terminology taken from the field of mathematics explains that predictions
    generated by a machine learning model remain unchanged if we intervene with the
    explanatory variables, given the fact that the model is generated through a formal
    causal relationship. There is a difference between the causal machine learning
    model and the non-causal machine learning model. The causal model shows a real
    cause-and-effect relationship between the response variable and the explanatory
    variables. The non-causal modal model shows an accidental relationship; the predictions
    do change many times. The only way to understand the difference between the causal
    and non-causal models is through explanations. In this chapter, you are going
    to use a Python library named Alibi to generate model-agnostic explanations.


    ## What Is Model Agnostic?


    The term *model agnostic* implies model independence. The explanation of machine
    learning models that are valid irrespective of model types are called model agnostic.
    When we explain the inherent behavior of a machine learning model, we typically
    do not assume any underlying structure of the behavior as displayed by the machine
    learning model itself. In this chapter, you are going to use model-agnostic explanations
    to describe the prediction invariance. It has always been challenging from a human
    understanding how a machine learning model works. People always wonder and ask
    questions about the behavior of the machine learning model. In order to understand
    the model-agnostic behavior, humans always think they can make predictions about
    the model behavior.


    ## What Is an Anchor?


    Complex models are usually considered as black-box models because it is very hard
    to understand why the prediction was made. The anchors concept is nothing but
    finding out the rules. Here the rules mean high precision rules that explain the
    model behavior, taking into consideration local and global factors. In other words,
    the anchors are if/then/else conditions that anchor the prediction irrespective
    of the values of other features.


    The anchor algorithm is built on top of model-agnostic explanations. It has three
    core functions:


    - **Coverage**: This implies how often one can change the framework to predict
    a machine learning model’s behavior.

    - **Precision**: This implies how accurately humans predict the model behavior.

    - **Effort**: This implies the upfront effort required to interpret the model
    behavior or to understand the predictions generated by the model’s behavior. Both
    scenarios are difficult to explain.'
