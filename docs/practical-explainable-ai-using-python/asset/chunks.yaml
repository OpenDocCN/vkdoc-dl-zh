    **图 5-27** 训练集中记录1的力导向图


    在图[5-27](#506619_1_En_5_Chapter.xhtml#Fig27)中，力导向图展示了原始预测值是如何基于拉低（蓝色，下方图形）和推高（红色，上方图形）的特征值来决定的。从1.124到6.124刻度上反映的值是原始预测值，即相对于类别1的预测概率的对数几率比。平均对数几率比值为3.624。拉低值通过使用诸如`resource`、`role
