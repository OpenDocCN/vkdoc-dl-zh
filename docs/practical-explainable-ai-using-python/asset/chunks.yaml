- fmt: '# Skater Explanation and ML Model


    Skater is an open source unified framework to enable model interpretation for
    all forms of models to help us build an interpretable machine learning system
    often needed for real world use-cases. Skater supports algorithms to demystify
    the learned structures of a black box model both globally (inference on the basis
    of a complete data set) and locally (inference about an individual prediction).
    The package was originally developed by Aaron Kramer, Pramit Choudhary, and the
    rest of the [DataScience.com](http://datascience.com) team to help data scientists
    and data enthusiasts gain better model insight. Skater enables this vision by
    providing the ability to infer and debug the model’s decision policies as needed,
    bringing “a human into the loop.”


    The Skater library can be installed by using the `pip` or `conda` install scripts.
    It’s also easy to install in a Jupyter environment. The model object can be implemented
    by two classes: an in-memory model and a deployed model. Models that are callable
    functions can be consumed via the in-memory model; models that are deployed and
    callable via Rest APIs are exposed via the deployed model object.


    ```

    !pip install skater

    import skater

    from skater import Interpretation

    # An Interpretation consumes a dataset, and optionally some meta data like feature
    names and row ids

    interpreter = Interpretation(xtrain, feature_names=xtrain.columns)

    interpreter

    from skater.model import InMemoryModel

    model = InMemoryModel(new_model.predict, examples = xtrain[:10])

    model

    ```


    The interpretation module consumes a dataset. From the interpreter you can extract
    the feature importance of a regression object. The in-memory model requires a
    predict function and a sample of data for which the prediction need to be explained.


    ```

    interpreter.feature_importance.feature_importance(model)

    #Computes feature importance of all features related to a model instance.

    #Supports regression.

    ```


    From the feature importance table above, the two important features are power
    BHP and age; they cumulatively contribute 75% of the importance. The other 12
    features contribute 25% of the importance. The model report function shows the
    details metadata such as model type trained, output variable type, output shape,
    input shape, and probability status about the model.


    ```

    model.model_report(examples=xtrain)

    ```


    To generate a partial dependency plot or two-way partial dependency plot, the
    interpreter requires you to load the training dataset again, and the feature names
    also need to be provided.


    ```

    # Skater is intutively designed to support

    # - InMemoryModel : A model which is currently being built and estimator instance
    is still in the scope

    # - DeployedModel: A model which is operationalized, or a third party deployed
    model

    interpreter.load_data(xtrain, feature_names=xtrain.columns)

    print("2-way partial dependence plots")

    # Features can passed as a tuple for 2-way partial plot

    pdp_features = [(''Age'', ''powerBhp'')]

    interpreter.partial_dependence.plot_partial_dependence(

    pdp_features, model, grid_resolution=10

    )

    ```


    Using two powerful features with the dependent variable, the above two partial
    dependency plot shown in Figure [3-15](#506619_1_En_3_Chapter.xhtml#Fig15) is
    generated. The colors on the plot show mere associations and should not be interpreted
    as causality. From the second gradient graph from Figure [3-15](#506619_1_En_3_Chapter.xhtml#Fig15),
    the higher contribution towards predicted value is shown using green and the lower
    contribution to the predicted value by those two features, age and power BHP jointly,
    is shown by the deep blue color. The light green color shows the higher predicted
    value and the blue color shows the lower predicted value. Similarly, a one-way
    partial dependency plot can be generated. The PDP plot with the confidence interval
    can be populated on the same one-way PDP graph.


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig15_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Two-way partial dependency plot


    ```

    print("1-way partial dependence plots")

    # or as independent features for 1-way partial plots

    pdp_features = [''powerBhp'', ''Age'']

    interpreter.partial_dependence.plot_partial_dependence(

    pdp_features, model, grid_resolution=30

    )

    # Partial Plot with variance effect

    interpreter.partial_dependence.plot_partial_dependence(

    pdp_features, model, grid_resolution=30, with_variance=True

    )

    ```


    The two graphs each from the two plots are not printed here as at this time they
    will not add much value. You can plot as many PDP charts from the dataset as you
    want. The relevant ones provide important insights about the features.'
