  trans: "\n# 集成分类模型：SHAP\n\n对于回归模型，你已经了解了 SHAP 特征和特征重要性，两者都包含针对少数特征的偏依赖图。现在，让我们来看一个常见且流行的收入普查分类数据集（通常称为成人数据集）。它之所以流行，是因为它易于理解、贴近生活，并且几乎出现在所有机器学习示例代码中。\n\
    \n```\n# 一个经典的成人普查数据集\nX_adult, y_adult = shap.datasets.adult()\n# 一个简单的线性逻辑模型\n\
    model_adult = sklearn.linear_model.LogisticRegression(max_iter=10000)\nmodel_adult.fit(X_adult,\
    \ y_adult)\n```\n\n在上述脚本中，加载了已属于 SHAP 库一部分的普查收入数据集。由于这是一个二分类问题，因此训练了一个逻辑回归模型。最后，通过模型拟合过程创建了一个训练好的模型。\n\
    \n```\ndef model_adult_proba(x):\n    return model_adult.predict_proba(x)[:,1]\n\
    def model_adult_log_odds(x):\n    p = model_adult.predict_log_proba(x)\n    return\
    \ p[:,1] - p[:,0]\n```\n\n对于使用普查收入数据集的分类示例，目标列有两个标签：年收入超过 5 万美元的人和年收入低于 5 万美元的人。这是一个二分类模型，作为基线，你可以使用逻辑回归模型来展示作为\
    \ SHAP 值线性函数的 PDP。然后，你可以使用集成模型来比较 PDP，并展示函数如何变为非线性。集成模型捕捉了这种非线性和复杂的关系。名为 `model_proba`\
    \ 和 `model_log_odds` 的两个函数分别提供了两个类别的概率值和对数几率比。\n\n```\n# 制作一个标准的偏依赖图\nsample_ind\
    \ = 18\nfig, ax = shap.partial_dependence_plot(\n    \"Capital Gain\", model_adult_proba,\
    \ X_adult, model_expected_value=True,\n    feature_expected_value=True, show=False,\
    \ ice=False\n)\n```\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig15_HTML.jpg](img/506619_1_En_5_Fig15_HTML.jpg)\n\
    \n图 5-15\n\n资本收益与收入低于 5 万美元概率之间的 PDP\n\n图 5-15 的 x 轴显示资本收益变量，y 轴显示收入低于 5 万美元的预测概率。概率值范围从\
    \ 0.05 到 0.99，之后变得平坦，接近 100% 但并非恰好 100%。这里的解释是，当资本收益金额超过 2 万美元时，它对预测概率值没有影响。在\
    \ 2 万美元以内，随着资本收益的增加，预测概率也会增加。\n\n```\n# 计算线性模型的 SHAP 值\nbackground_adult = shap.maskers.Independent(X_adult,\
    \ max_samples=100)\nexplainer = shap.Explainer(model_adult_proba, background_adult)\n\
    shap_values_adult = explainer(X_adult[:1000])\nshap.plots.scatter(shap_values_adult[:,\"\
    Age\"])\n```\n\n图 5-16 显示了线性关系，但数据点的分散程度存在变化，这表明可能存在非线性，并且线性模型无法正确捕捉这种非线性。因此，需要使用集成模型。\n\
    \n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig16_HTML.jpg](img/506619_1_En_5_Fig16_HTML.jpg)\n\
    \n图 5-16\n\n线性模型中年龄与年龄 SHAP 值的散点图\n\n```\n# 计算线性模型的 SHAP 值\nexplainer_log_odds\
    \ = shap.Explainer(model_adult_log_odds, background_adult)\nshap_values_adult_log_odds\
    \ = explainer_log_odds(X_adult[:1000])\nshap.plots.scatter(shap_values_adult_log_odds[:,\"\
    Age\"])\n# 制作一个标准的偏依赖图\nsample_ind = 18\nfig, ax = shap.partial_dependence_plot(\n\
    \    \"Age\", model_adult_log_odds, X_adult, model_expected_value=True,\n    feature_expected_value=True,\
    \ show=False, ice=False\n)\n# 训练 XGBoost 模型\nmodel = xgboost.XGBClassifier(n_estimators=100,\
    \ max_depth=2).fit(X_adult, y_adult)\n# 计算 SHAP 值\nexplainer = shap.Explainer(model,\
    \ background_adult)\nshap_values = explainer(X_adult)\n# 设置用于绘图的数据显示版本（包含字符串值）\n\
    shap_values.display_data = shap.datasets.adult(display=True)[0].values\n```\n\n\
    现在让我们看看极端梯度提升分类器模型。作为一种提升模型，它提高了分类器的准确性，同时提供了对预测结果的解释。\n\n```\nshap.plots.bar(shap_values)\n\
    ```\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig17_HTML.jpg](img/506619_1_En_5_Fig17_HTML.jpg)\n\
    \n图 5-17\n\n用于特征排序的平均绝对 SHAP 值\n\n在图 5-17 中，关系变量显示出最高的平均绝对 SHAP 值，这反映了该变量在预测目标列类别方面的重要性。第二重要的变量是年龄，然后是资本收益，依此类推。\n\
    \n```\nshap.plots.bar(shap_values.abs.max(0))\n```\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig18_HTML.jpg](img/506619_1_En_5_Fig18_HTML.jpg)\n\
    \n图 5-18\n\n不同特征的绝对 SHAP 值最大值\n\n在图 5-18 中，资本收益特征具有最高的 SHAP 值，因此这可能是一个异常值。同样，资本损失也可能是一个异常值。这一点将在图\
    \ 5-19 中得到澄清。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig19_HTML.jpg](img/506619_1_En_5_Fig19_HTML.jpg)\n\
    \n图 5-19\n\nSHAP 值与特征值的关系图\n\n在图 5-19 中，SHAP 值显示了特征值如何影响模型输出。蓝色点表示低特征值，红色点表示高特征值。\n\
    \n```\nshap.plots.beeswarm(shap_values)\n```\n\n```\nshap.plots.beeswarm(shap_values.abs,\
    \ color=\"shap_red\")\n```\n\n在图 5-20 中，你看不到负的 SHAP 值，并且资本收益和资本损失这两个特征显示出 SHAP\
    \ 值有很大的变化，这意味着这两个特征实际值的变化可能导致不一致的预测。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig20_HTML.jpg](img/506619_1_En_5_Fig20_HTML.jpg)\n\
    \n图 5-20\n\nSHAP 的绝对值\n\n在图 5-21 中，让我们考虑关系特征。它在第 430 个实例之前具有较高的 SHAP 分数。之后，SHAP\
    \ 值变为负值，直到第 580 个实例，并持续到第 610 个实例。此后，关系特征的所有实例都产生负的 SHAP 值。该图显示了训练数据集中不同实例的 SHAP\
    \ 值变化。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig21_HTML.jpg](img/506619_1_En_5_Fig21_HTML.jpg)\n\
    \n图 5-21\n\n按实例和 SHAP 值显示的特征值变化\n\n```\nshap.plots.heatmap(shap_values[:1000])\n\
    ```\n\n图 5-22 解释了年龄变量与年龄变量 SHAP 分数之间的严格非线性关系。这种非线性是由极端梯度提升分类器模型产生的。\n"
