    # ELI5 解释与机器学习模型


    ELI5 是一个 Python 包，用于帮助调试机器学习分类器并解释其预测结果。它支持以下机器学习框架和包：`scikit-learn`。目前，ELI5 能够解释
    `scikit-learn` 线性分类器和回归器的权重与预测，以文本或 SVG 格式打印决策树，展示特征重要性，并解释决策树及基于树的集成模型的预测。ELI5
    能够理解 `scikit-learn` 的文本处理工具，并据此高亮显示文本数据。它还能通过撤销哈希处理，来调试包含 `HashingVectorizer`
    的 `scikit-learn` 管道。


    特征的权重也包含一个偏置特征。这实际上就是线性回归模型中的截距项。特征按其权重的降序排列。ELI5 的意思是*像对五岁小孩一样解释*。它支持所有 `scikit-learn`
    算法。它还通过 `show_weights()` 函数提供全局解释，并通过 `show_prediction()` 函数提供局部解释。在 ELI5 库中，有一个排列模型。它仅适用于全局解释。其工作原理如下：


    -   首先，它从训练数据集中获取基线模型并计算误差。

    -   然后，它打乱特征的值，重新训练模型，并计算误差。

    -   最后，它比较打乱后与打乱前的误差减少量。


    如果打乱后误差增量变得非常高，则该特征被认为是重要的；如果打乱后错误率保持不变，则该特征被认为是不重要的。结果会显示多次打乱步骤后特征的平均重要性和标准差。这种方法并非用于查看哪个特征影响模型性能。它只告诉我们特征权重的变化幅度，因此我们不能真正将权重视为特征重要性的度量标准。上述过程通过以下脚本演示：


    ```

    !pip install eli5

    import eli5

    eli5.show_weights(new_model,

    feature_names=list(xtrain.columns))

    eli5.explain_weights(new_model, feature_names=list(xtrain.columns))

    eli5.explain_prediction(new_model,xtrain.iloc[60])

    from eli5.sklearn import PermutationImportance

    perm = PermutationImportance(new_model)

    perm.fit(xtest, ytest)

    eli5.show_weights(perm,feature_names=list(xtrain.columns))

    ```


    解释单个预测提供了对某条记录的局部解释。同时，它还会告诉你对预测贡献权重最高的前三个特征。从排列重要性图中可以清楚地看到，功率（BHP）和车龄是最重要的特征。这与您之前使用其他
    XAI Python 库（基于 `automobile.csv` 数据集）进行的类似练习结果一致。


    现在，作为下一步，让我们来看一个线性分类模型，也称为逻辑回归模型，以从逻辑回归模型的角度理解 XAI 的各个方面。部分依赖图描绘了目标特征（或因变量）与一个特征（即自变量）之间的关系。这种关系可以是线性的、非线性的、曲线的，或者更复杂的，如圆形或周期性的单调关系。


    ## 逻辑回归


    当目标特征是连续变量时，线性回归模型适用；但当目标特征是二元的，例如 0 或 1、真或假、接受或拒绝时，线性回归模型则不适用。这是因为目标特征的预测值可能会超出
    0 和 1 的范围，但我们的期望是将输出限制在两个类别中，因为需要分别预测这两个类别。这就是为什么需要逻辑回归模型，它使用二元值来计算对数几率，即优势比。优势比与特征呈线性关系。这就是逻辑回归模型被称为线性模型的原因。


    当需要对本质为二元或多分类的结果进行概率建模时，通常会使用逻辑回归。你不能在那里应用线性回归模型，因为在逻辑回归场景中，结果变量是 0 或 1（有时也可能是多分类的，即可能有两个以上的结果）。如果你在那里应用线性回归，预测范围可能会超出
    0 和 1 的范围。它不会为任何类别提供概率。在多分类模型中，类别分离将是一个巨大的挑战。基于普通最小二乘法的线性回归模型假设因变量和自变量之间的关系是线性的；然而，逻辑回归模型假设这种关系是对数形式的。


    在许多现实场景中，我们关注的变量本质上是分类的，例如是否购买产品、是否批准信用卡、或者肿瘤是否为癌性。逻辑回归不仅能预测因变量的类别，还能预测某个案例属于因变量中某一水平的概率。自变量不需要服从正态分布，也不需要具有相等的方差。逻辑回归属于非线性回归家族。如果因变量有两个水平，可以应用逻辑回归；但如果因变量有两个以上的水平，例如高、中、低，则可以应用多项逻辑回归模型。自变量可以是连续的、分类的或名义的。


    逻辑回归模型可以用以下方程解释：


    ![$$ Sigmoid\kern0.5em (t)=\frac{1}{1+\mathit{\exp}\left(-t\right)} $$](img/506619_1_En_3_Chapter_TeX_Eque.png)


    上述函数也称为 Sigmoid 函数。


    ![$$ Ln\left(\frac{P}{1-P}\right)={\beta}_0+{\beta}_1{X}_1+{\beta}_2{X}_2+\dots
    +{\beta}_k{X}_k $$](img/506619_1_En_3_Chapter_TeX_Equf.png)


    `Ln (P/1-P)` 是结果的对数几率。上述方程中提到的 Beta 系数解释了对于解释变量每增加或减少一个单位，结果变量的几率如何增加或减少。图 3-16
    展示了 Sigmoid 函数的形状。它看起来像一条 S 形曲线。逻辑回归模型的解释与线性回归模型截然不同。方程右侧的加权和被转换/变换成一个概率值。方程左侧被称为对数几率，因为它是事件发生概率与事件不发生概率的比值。关于对数几率的更多解释，可以通过我们接下来要讨论的一个例子来理解。


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig16_HTML.jpg](img/506619_1_En_3_Fig16_HTML.jpg)


    **图 3-16** 逻辑/Sigmoid 函数，x 轴表示特征，y 轴表示概率

    '
- fmt: '为了解释逻辑回归模型及其决策过程，你需要同时理解概率和优势比。你将使用`churndata.csv`，该数据集属于电信领域，包含近3333条记录和18个特征。你将根据特征值预测客户是否可能流失。


    ```

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    %matplotlib inline

    from sklearn.linear_model import LogisticRegression, LogisticRegressionCV

    from sklearn.metrics import confusion_matrix, classification_report

    df_train = pd.read_csv(''ChurnData.csv'')

    ```


    第一步，获取数据，转换某些字符串格式的特征，并应用标签编码器进行转换。转换后，按80%用于训练、20%用于测试的比例进行分割。在创建训练/测试分割时，你保持流失案例和非流失案例的比例，以维持类别间的平衡。然后训练模型，将训练好的模型应用于测试数据，并比较训练集和测试集的准确率。


    ```

    del df_train[''Unnamed: 0'']

    df_train.shape

    df_train.head()

    from sklearn.preprocessing import LabelEncoder

