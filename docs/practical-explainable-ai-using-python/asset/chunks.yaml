- fmt: '# Explaining Using ELI5


    In order to explain the text classification model, you need to install the explainable
    AI (XAI) library `ELI5`. It is known as *explain it like I am 5*. This library
    can be installed either using `pip install` or using `conda install` from an Anaconda
    distribution.


    ```

    !pip install eli5

    import eli5

    eli5.show_weights(clf, top=10) #this result is not meaningful, as weight and feature
    names are not there

    ```


    Once the library is installed, you can write an import statement to call the library.


    ```

    eli5.show_weights(clf,feature_names=vec.get_feature_names(),target_names=set(imdb.sentiment))

    #make sense

    ```


    The results from the `ELI5` module for a base linear classifier are not meaningful.
    It provides weights and features. The feature names are not meaningful. To make
    them meaningful, you can pass the name of the feature names and target names.


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig2_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Features extracted from the model for the positive sentiment class


    The features in Figure [7-2](#506619_1_En_7_Chapter.xhtml#Fig2) in green are positive
    features for the target class positive and red ones are negative features, which
    support the other class. The feature weight along with the weight value indicates
    the relative importance of the features in classifying the sentiments to one category.


    ## Calculating the Feature Weights for Local Explanation


    The feature weights are calculated using the decision path. The decision path
    follows a series of `if/else/then` statements that connect the predicted class
    from the root of the tree through the branches of the tree. In the above example,
    logistic regression is used as a model to train the sentiment classifier, hence
    the weights are the coefficients of the logistic regression model. For a complex
    model like a random forest or a gradient boosting model, the decision path of
    the tree is followed. Basically the weights are estimator parameters that you
    use in the model training phase.


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig3_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Plotting the important features of the sentences for better clarity


    ### Local Explanation Example 1


    ```

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment))        # explain local prediction

    ```


    `BIAS` is the intercept term from the logistic regression classifier. We can use
    the count vectorizer and linear classifier, hence the mapping is quite clear as
    each word’s weight corresponds to the coefficients of the linear classifier. In
    order to explain a single movie review, which is called local interpretation,
    you can pass that through the `show_prediction` function. Since it is a binary
    classifier, the log odds can be calculated. The log odds is 1.698. If you use
    the formula `exp(log odds)/1+exp(log odds)` then you get back the probability
    value 0.845. There is 84.5% chance is that the `review[0]` belongs to the positive
    sentiment. The highlighted text in green in Figure [7-3](#506619_1_En_7_Chapter.xhtml#Fig3)
    leads towards the positive log odds score and the text in red reduces the log
    odds score. The total contribution is the sum of contributions from each text
    in green and red, and the net result is the log odds score.


    ### Local Explanation Example 2


    In a similar way you can explain reviews number 123 and 100. Review 123 is classified
    as negative and the probability for the negative class is 0.980. Review number
    100 is classified as positive with a probability value of 0.670. See Figure [7-4](#506619_1_En_7_Chapter.xhtml#Fig4).


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig4_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Local explanation for a negative class prediction


    ```

    eli5.show_prediction(clf, imdb.review[123], vec=vec,

    target_names=set(imdb.sentiment)) # explain local prediction

    ```


    ### Local Explanation Example 3


    In example 1 you looked at the first record, where the probability of a positive
    class is more than 80%. In example 2, the probability of a negative class is 98%.
    The words highlighted in green contribute towards the negative class of the prediction.
    See Figure [7-5](#506619_1_En_7_Chapter.xhtml#Fig5).


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig5_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Feature highlight for both positive and negative classes


    ```

    eli5.show_prediction(clf, imdb.review[100], vec=vec,

    target_names=set(imdb.sentiment)) # explain local prediction

    ```'
