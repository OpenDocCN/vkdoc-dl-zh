    \n**Figure 6-7**  \n随机森林模型的特征重要性\n\n在`Figure [6-7](#506619_1_En_6_Chapter.xhtml#Fig7)`中，可以看到滞后1（`t-1`）是最重要的特征，滞后2（`t-2`）是第二重要的特征，滞后7（`t-7`）是第三重要的特征，其次是滞后3和滞后4，分别由`t-3`和`t-4`表示。其他特征对模型来说不太重要。\n\
    \n```python\nfrom sklearn.feature_selection import RFE\n# perform feature selection\n\
