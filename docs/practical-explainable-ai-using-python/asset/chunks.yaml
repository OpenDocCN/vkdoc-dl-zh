    When selecting the ARIMA model, you need to define the order of the model. In
    the following script, you define the order as `(0,0,1)` which means `(p,d,q)`
    where `p` is for the autoregressive term, `d` is for differentiation, and `q`
    is for the moving average. So an order of `0, 0, and 1` means only a moving average
    model.


    ```

    # MA example

    from statsmodels.tsa.arima.model import ARIMA

    from random import random

    # fit model

    model = ARIMA(y, order=(0, 0, 1))

    model_fit = model.fit()

    # make prediction

    yhat = model_fit.predict(len(y), len(y))

    print(yhat)

    model_fit.summary()

    ```


    The following script shows the ARIMA of order `2, 0 and 1`, 2 lag autoregressive
    terms, 0 differentiation, and 1 moving average term:


    ```

    # ARMA example

    from statsmodels.tsa.arima.model import ARIMA

    from random import random

    # fit model

    model = ARIMA(y, order=(2, 0, 1))

    model_fit = model.fit()

    # make prediction

    yhat = model_fit.predict(len(y), len(y))

    print(yhat)

    model_fit.summary()

    ```


    The results summary of all the models can be interpreted in a very similar manner
    as you did above. If you want to introduce the seasonal components to the ARIMA
    model, it becomes a SARIMA model. The seasonal order can also be defined per Table
    [6-7](#506619_1_En_6_Chapter.xhtml#Tab7).


    **Table 6-7** SARIMA Model Parameter Explanation


    | Parameters | Explanation |

    | --- | --- |

    | `Endog` | The observed time-series process `y` |

    | `Order` | The `(p,d,q)` order of the model for the number of AR parameters,
    differences, and MA parameters |

    | `seasonal_order` | The `(p,d,q)` order of the seasonal component of the model
    for the AR parameters, differences, MA parameters, and periodicity |

    | `Trend` | Parameter controlling the deterministic trend polynomial `A(t)`. |

    | `enforce_stationarity` | Whether or not to transform the AR parameters to enforce
    stationarity in the autoregressive component of the model. Default is `True`.
    |


    **Table 6-6** SARIMAX Model Results


    | ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figf_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Figf_HTML.jpg)
    |


    ```

    # ARMA example

    from statsmodels.tsa.arima.model import ARIMA

    from random import random

    # fit model

    model = ARIMA(y, order=(2, 1, 1))

    model_fit = model.fit()

    # make prediction

    yhat = model_fit.predict(len(y), len(y))

    print(yhat)

    model_fit.summary()

    # SARIMA example

    from statsmodels.tsa.statespace.sarimax import SARIMAX

    from random import random

    # fit model

    model = SARIMAX(y, order=(1, 1, 1), seasonal_order=(0, 0, 0, 0))

    model_fit = model.fit(disp=False)

    # make prediction

    yhat = model_fit.predict(len(y), len(y))

    print(yhat)

    model_fit.summary()

    ```


