  raw: 'In Figure [6-5](#506619_1_En_6_Chapter.xhtml#Fig5), the pattern of the autocorrelation
    function tells us that the series is non-stationary, because the correlation coefficient
    up to 30 lags seen to be more than 0.80\. The shaded color shows the confidence
    level of the correlation coefficient value. Since the correlation coefficient
    is not zero at up to 30 lags, the series is highly non-stationary in nature. Since
    you know the series is not stationary you cannot apply the standard ARIMA model.


    There is an alternative way of turning the problem into an autoregressive supervised
    machine learning problem to understand if any lag has an impact on the forecast
    value. This is why you create 12 lag values as independent features to predict
    the actual price series as a dependent variable.


    ```

    # reframe as supervised learning

    dataframe = pd.DataFrame()

    for i in range(12,0,-1):

    dataframe[''t-''+str(i)] = df.shift(i).values[:,0]

    dataframe[''t''] = df.values[:,0]

    print(dataframe.head(13))

    dataframe = dataframe[13:]

    # save to new file

    dataframe.to_csv(''lags_12months_features.csv'', index=False)

    ```


    In the above script you calculate the lag values. In Figure [6-6](#506619_1_En_6_Chapter.xhtml#Fig6),
    you can see the lag values as a table.


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig6_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Processed data after lag variable creation for model development


    The 12 lag values are features, and you can use a random forest regressor to make
    different combinations of features in order to construct a decision tree and ensemble
    the model predictions by taking the average of predicted values from all of the
    trees. In this way you can identify which feature is more important.


    ```

    # split into input and output

    df = pd.read_csv(''lags_12months_features.csv'')

    data = df.values

    X = data[:,0:-1]

    y = data[:,-1]

    from sklearn.ensemble import RandomForestRegressor

    # fit random forest model

    model = RandomForestRegressor(n_estimators=500, random_state=1)

    model.fit(X, y)

    # show importance scores

    print(model.feature_importances_)

    # plot importance scores

    names = dataframe.columns.values[0:-1]

    ticks = [i for i in range(len(names))]

    plt.bar(ticks, model.feature_importances_)

    plt.xticks(ticks, names)

    plt.show()

    ```


    You have considered 500 decision trees and used the features to train a random
    forest regression model. Figure [6-7](#506619_1_En_6_Chapter.xhtml#Fig7) estimates
    the feature importance.


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig7_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Feature importance of RF model


    In Figure [6-7](#506619_1_En_6_Chapter.xhtml#Fig7), you can see that lag 1 (t-1)
    is the most important feature, lag 2 (t-2) is second important feature, lag 7
    (t-7) is the third important feature, followed by lag 3 and lag 4 as shown by
    (t-3) and (t-4), respectively. Other features are not too important to the model.


    ```

    from sklearn.feature_selection import RFE

    # perform feature selection

    rfe = RFE(RandomForestRegressor(n_estimators=500, random_state=1), n_features_to_select=4)

    fit = rfe.fit(X, y)

    # report selected features

    print(''Selected Features:'')

    names = dataframe.columns.values[0:-1]

    for i in range(len(fit.support_)):

    if fit.support_[i]:

    print(names[i])

    # plot feature rank

    names = dataframe.columns.values[0:-1]

    ticks = [i for i in range(len(names))]

    plt.bar(ticks, fit.ranking_)

    plt.xticks(ticks, names)

    plt.show()

    ```


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig8_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Feature importance from the RFE algorithm


    Recursive feature elimination (RFE) is a popular algorithm to remove redundant
    features from the list of features in a supervised learning environment (Figure
    [6-8](#506619_1_En_6_Chapter.xhtml#Fig8)). There are two different options to
    configure the RFE: either the number of features to select or the choice of algorithm
    used to choose the features. RFE acts like a wrapper algorithm on top of a supervised
    regression-based model or a classification-based model. This means you need a
    model and then you can apply RFE on top of it. In the above script you use RFE
    on top of random forest regression model. The most important features selected
    are lags 7, 3, 2, and 1\. The rest of the eight features are not selected by the
    algorithm. Hence continuous and consistent lags have no impact on the target feature;
    however, the selected features have an impact on the prediction result. The features
    of the time series model as discussed earlier in this chapter are only the lag
    variables and the moving average variables. This is why the time series object
    can be modelled as AR if only the lagged terms are used. It can be only MA if
    only the moving average terms are used as features. Autoregression means the lagged
    values can be used as features to predict the actual time series.


    ```

    # AR example

    from statsmodels.tsa.ar_model import AutoReg

    from random import random

    # fit model

    model = AutoReg(y, lags=1)

    model_fit = model.fit()

    model_fit.summary()

    ```


    The preceding script shows if you use only lag 1 to predict the current time period,
    it is called an AR 1 model. This is similar to linear regression. See Table [6-1](#506619_1_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    Autoregression Model Results


    | ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figa_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Figa_HTML.jpg)
    |


    You can write the equation as


    Yt = 0.5136 + 1.0039*Yt-1


    The coefficient 1.0039 has a p-value of 0.000, which is less than 0.05. That means
    at a 95% confidence level and a 5% statistical level of significance, the first
    lag term is significant enough to impact the actual time series Yt. This can be
    interpreted as, *if the lag term changes by 1 unit, the actual value of the series
    is predicted to change by 0.39%*.


    ```

    # AR example

    from statsmodels.tsa.ar_model import AutoReg

    from random import random

    # fit model

    model = AutoReg(y, lags=2)

    model_fit = model.fit()

    model_fit.summary()

    ```


    Similar analysis can be done by taking into consideration two lags, and the equation
    becomes


    Yt = 0.6333 + 1.2182*Yt-1 – 0.2156*Yt-2


    The coefficients 1.2182 and 0.2156 have a p-value of 0.000, which is less than
    0.05, which means a 95% confidence level and a 5% statistical level of significance.
    For the first and second lag terms, this is significant enough to impact the actual
    time series Yt. This can be interpreted as, *if the lag term changes by one unit,
    the actual value of the series is predicted to change by 0.22%*. The lag 2 coefficient
    can be interpreted as, *if lag 2 changes by one unit, the series Yt is going to
    reduce by 0.2156 times*. See Table [6-2](#506619_1_En_6_Chapter.xhtml#Tab2).


    Table 6-2


    Autoregression Model with Two Lag Results


    | ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figb_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Figb_HTML.jpg)
    |


    ```

    # AR example

    from statsmodels.tsa.ar_model import AutoReg

    from random import random

    # fit model

    model = AutoReg(y, lags=12)

    model_fit = model.fit()

    model_fit.summary()

    ```


    Like the above two-lag scenario, you can extend the model for 12 lag scenarios
    and a similar interpretation can be made. See Tables [6-3](#506619_1_En_6_Chapter.xhtml#Tab3)
    and [6-4](#506619_1_En_6_Chapter.xhtml#Tab4).


    Table 6-5


    Seasonal ARIMA Model Results


    | ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fige_HTML.jpg](images/506619_1_En_6_Chapter/506619_1_En_6_Fige_HTML.jpg)
    |


