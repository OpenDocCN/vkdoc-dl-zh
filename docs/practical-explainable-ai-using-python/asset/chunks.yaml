    \n**图 8-8**  \n区号变量的部分依赖图\n\n在评估模型的整体性能时，您可以考虑混淆矩阵，它展示了模型中流失与非流失案例的匹配与不匹配情况。\n\
    \n![../images/506619_1_En_8_Chapter/506619_1_En_8_Fig9_HTML.png](img/506619_1_En_8_Fig9_HTML.png)\n\
    \n**图 8-9**  \n性能与公平性界面\n\n在图 8-9 所示的性能与公平性界面中，您可以看到 ROC 曲线、AUC 曲线、混淆矩阵以及成本比率。您可以更改阈值概率值来改变分类矩阵。\n\
    \n### 评估指标\n\n**精确率**：模型正确预测正标签的频率\n\n**召回率**：模型正确预测数据集中正类别的比例是多少？\n\n![../images/506619_1_En_8_Chapter/506619_1_En_8_Fig10_HTML.png](img/506619_1_En_8_Fig10_HTML.png)\n\
    \n**图 8-10**  \n显示模型准确率的评估界面\n\n## 结论\n\n本章讨论了如何使用 What-If 工具解释分类模型结果的推理过程，以及如何识别在区分流失与非流失案例中起关键作用的特征。此外，您还使用了针对单个数据点进行局部解释的方法。\n\
    \n# 9. 深度学习模型的可解释性\n\n基于深度神经网络的模型正逐渐成为人工智能和机器学习实现的支柱。数据挖掘的未来将由基于人工神经网络的先进建模技术所主导。那么，既然神经网络早在\
    \ 20 世纪 50 年代就被发明出来，为何如今它们变得如此重要？借用计算机科学领域的定义，神经网络可以被描述为一个并行信息处理系统，其中输入相互连接，就像人脑中的神经元一样，以传递信息，从而执行人脸识别和图像识别等活动。理论上，神经网络已经存在了\
    \ 50 多年，但神经网络项目在实际场景中的执行，是在计算能力取得某些进步之后才成为可能的，特别是 GPU 和 TPU 在执行高端计算、大规模矩阵乘法等方面的演进。在本章中，您将学习基于神经网络的方法在各种数据挖掘任务（如分类、回归、预测和特征降维）中的应用。人工神经网络（ANN）的功能类似于人脑的工作方式，其中数十亿个神经元相互连接，用于信息处理和洞察生成。\n\
    \n## 解释深度学习模型\n\n大脑的生物网络为现实场景中连接元素以进行信息处理和洞察生成提供了基础。神经元通过层级结构连接，其中一层的输出成为另一层的输入。信息以权重的形式从一层传递到另一层。与每个神经元相关的权重包含洞察信息，使得下一层的识别和推理变得更加容易。人工神经网络是一种非常流行且有效的方法，它由与权重相关联的层组成。不同层之间的关联由一个数学方程控制，该方程将信息从一层传递到另一层。事实上，一个人工神经网络模型内部运行着一系列数学方程。图\
    \ 9-1 展示了一个基于神经网络的模型的一般架构，其中显示了输入层、输出层和隐藏层。\n\n![../images/506619_1_En_9_Chapter/506619_1_En_9_Fig1_HTML.jpg](img/506619_1_En_9_Fig1_HTML.jpg)\n\
    \n**图 9-1**  \n示例神经网络结构\n\n存在三个层（输入层、隐藏层和输出层），它们是任何基于神经网络的架构的核心。ANN 是解决许多现实世界问题（如分类、回归和特征选择）的强大技术。ANN\
    \ 能够以新输入数据的形式从新经验中学习，以提高基于分类或回归任务的性能，并使其自身适应输入环境的变化。图 9-1 中的每个圆圈代表一个神经元。深度学习的主要优势之一是我们不必专注于为模型训练创建手工特征。特征交互不需要由人类创建；它们应该在训练过程中自动创建。\n\
    \n从算法或计算的角度来看，神经网络有不同的变体，它们被用于多种不同的场景。下面我将从概念上解释其中几种，以便您理解它们在实际应用中的用途。\n\n- **单隐藏层神经网络**：这是最简单的神经网络形式，如图\
    \ 9-1 所示。其中只有一个隐藏层。\n- **多隐藏层神经网络**：在这种形式中，有多个隐藏层连接输入数据和输出数据。这种形式的计算复杂度增加，并且需要系统提供更多的计算能力来处理信息。\n\
    - **前馈神经网络**：在这种神经网络架构形式中，信息从一层向另一层单向传递；没有从第一级学习开始的迭代。\n- **反向传播神经网络**：在这种神经网络形式中，有两个重要步骤。前馈过程将信息从输入层传递到隐藏层，再从隐藏层传递到输出层。其次，它计算误差并将其反向传播到前面的层。\n\
    \n还有另一种基于用途和结构的分类，可以解释如下：\n\n- **循环神经网络（RNN）**：主要用于序列信息处理，例如音频处理、文本分类等。\n- **深度神经网络（DNN）**：用于高维结构化数据问题，其中特征交互非常复杂，以至于手动构建每个特征非常繁琐。\n\
    - **卷积神经网络（CNN）**：主要用于图像数据，其中像素尺寸会产生高维矩阵。需要以卷积的方式综合信息来对图像进行分类。\n\n前馈神经网络模型架构如图\
    \ 9-2 所示，反向传播方法将在下一节中解释。\n\n![../images/506619_1_En_9_Chapter/506619_1_En_9_Fig2_HTML.png](img/506619_1_En_9_Fig2_HTML.png)\n\
    \n**图 9-2**  \n基本前馈神经网络结构\n\n## 将 SHAP 与深度学习结合使用\n\n如前几章所述，SHAP 是一个出色的库，适用于各种模型解释、局部模型解释和全局模型解释，其解释基于\
    \ Shapley 值。了解什么是 Shapley 值很重要；这个 Shapley 值完全依赖于博弈论方法。以下公式解释了 Shapley 值在库内部是如何计算的：\n\
    \n![../images/506619_1_En_9_Chapter/506619_1_En_9_Figa_HTML.png](img/506619_1_En_9_Figa_HTML.png)\n"
- fmt: '### Using Deep SHAP


    Deep SHAP is a framework to derive SHAP values from a deep learning-based model,
    developed either using Keras-based models or TensorFlow-based models. You can
    take the example of the MNIST dataset, where a sample data point shows the pixel
    values of the number and a deep learning model is being trained to classify the
    image. The SHAP values are shown below.


    If we compare machine learning models with deep learning models, the ML models
    are still interpretable, but the neural network models, especially the deep neural
    network models, are black box in nature, which is an obstacle in the adoption
    of AI models in the industry because no one can interpret the application of deep
    learning model prediction. Deep Learning Important Features (DeepLIFT) is a framework
    that came into the picture in October 2019. It is designed to apply a method for
    decomposing the output prediction of a deep neural network model. This is done
    by backpropagating the contribution of all neurons in the deep neural network
    to every feature of the input. The DeepLIFT framework makes it possible by comparing
    the activation of each neuron to their corresponding activation and assigns a
    score, which is known as the contribution score.


    ### Using Alibi


    Apart from DeepLIFT and Deep SHAP, there is another open source library named
    Alibi. It’s a Python-based library aimed at explaining the machine learning models.
    The following code explains how to install Alibi and how to speed up the search
    for Alibi using another library called Ray.


    ```

    !pip install alibi

    ```


    The above code installs the Alibi library for explaining the models.


    ```

    !pip install alibi[ray]

    ```


    The `alibi[ray]` library is a dependency library and needs to be installed as
    well.


    ```

    !pip install tensorflow_datasets

    ```


    You can use `tensorflow_datasets` to collect few datasets from the library for
    usage in this chapter.


    ```

    !pip install keras

    ```


    The Keras library is for training deep learning models.


    ```

    from __future__ import print_function

    import keras

    from keras.datasets import mnist

    from keras.models import Sequential

    from keras.layers import Dense, Dropout, Flatten

    from keras.layers import Conv2D, MaxPooling2D

    from keras import backend as K

    import matplotlib.pyplot as plt

    %matplotlib inline

    batch_size = 128

    num_classes = 10

    epochs = 12

    # input image dimensions

    img_rows, img_cols = 28, 28

    ```


    MNIST is a digit classification dataset that has pictures of digits written by
    hand and labelled by experts to let the model learn the patterns. `Conv2D` is
    a convolutional two-dimensional layer that transforms the weights and performs
    spatial convolution over image pixels. The values that you provide within `Conv2D`
    are the numbers of filters that the convolutional layers will learn from. Post
    convolution, the max pooling is required for a compressed representation of the
    pixels in a lower-dimensional space. Hence each convoluted layer needs a max pool
    layer. The max pool layer requires a output matrix size also. In the following
    script, you are using 32 filters in the `Conv2D` layer and the kernel size or
    the filter size is (3,3). Max pooling is generally used to reduce the spatial
    dimensions of the output volume. The kernel size must be an odd number combination
    such as (1,1), (3,3) or (5,5) in order to ensure that the kernel filter traverses
    the spatial space smoothly. `Stride` is the value that makes the filters move
    in the pixel space. `stride =1` means the filter moves one place to the right
    in the matrix of pixels. Once it reaches the edge of the pixel matrix, it goes
    down and keeps moving to the lowest possible row and then it moves towards left.
    When you move an odd numbered kernel in the pixel space to collect all the convoluted
    features, sometimes the filter does not go to the edges of the pixel matrix. In
    order to make that happen, you add a row and column around the original pixel
    matrix. This is called padding. Padding can be zero padding and same padding.


    ```

    # the data, split between train and test sets

    (x_train, y_train), (x_test, y_test) = mnist.load_data()

    if K.image_data_format() == ''channels_first'':

    x_train = x_train.reshape(x_train.shape[0], 1, img_rows, img_cols)

    x_test = x_test.reshape(x_test.shape[0], 1, img_rows, img_cols)

    input_shape = (1, img_rows, img_cols)

    else:

    x_train = x_train.reshape(x_train.shape[0], img_rows, img_cols, 1)

    x_test = x_test.reshape(x_test.shape[0], img_rows, img_cols, 1)

    input_shape = (img_rows, img_cols, 1)

    x_train = x_train.astype(''float32'')

    x_test = x_test.astype(''float32'')

    x_train /= 255

    x_test /= 255

    print(''x_train shape:'', x_train.shape)

    print(x_train.shape[0], ''train samples'')

    print(x_test.shape[0], ''test samples'')

    ```


    The above script shows the general steps for fetching the data from the Keras
    library and using the loaded data to normalize the training samples and test samples.
    This is done by dividing each individual pixel value with its highest pixel value.
    After that, 60,000 samples are parked for training and 10,000 are parked for testing.
    The image size here is 28 x 28 pixels, the batch size is 128, and the number of
    classes is 10 for each digit one class image. Also, you are using 10 iterations
    or epochs to train the model.'
