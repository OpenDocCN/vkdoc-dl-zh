- fmt: '### Types of Ensemble Models


    The ensemble models are of three types: bagging models (also known as bootstrap
    aggregation models), boosting models, and stacking models (Figure [5-1](#506619_1_En_5_Chapter.xhtml#Fig1)).
    The stacking models can be of two types: same group stacking and different variant
    model stacking. The same group stacking involves homogenous model types such as
    only including tree-based models and putting each model outcome against the other
    models. The heterogeneous stacking model means putting tree-based and non-tree-based
    models against each other and combining their predictions. Model explainability
    for stacking models is not difficult at all as we can identify the particular
    model and explain the predictions and parameters; however, explaining the bagging
    and boosting models are little tricky. The random forest model is an example of
    a bagging model, where many trees are grown and finally the predictions are combined
    to arrive at final result. Boosting models take a base model and learn from the
    results of the base model and try to improve the model in an iterative manner.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig1_HTML.png](images/506619_1_En_5_Chapter/506619_1_En_5_Fig1_HTML.png)


    Figure 5-1


    Three types of ensemble models


    ## Why Ensemble Models?


    When the total number of features in a dataset increases, say to over 50, it cannot
    be accommodated in a single decision tree due to the following reasons:


    - The features that are powerful will occupy the branch creation step in the decision
    tree construction; hence the weak features will not take part in the tree formation.

    - The models in a single decision tree scenario become more biased because a few
    powerful features govern the prediction.

    - Hyper parameter choices are limited due to a few powerful features.

    - This problem even gets bigger when you think that of 100 plus features, 20%
    of the powerful features drive the prediction. The remaining 80% of the weak features
    are unutilized.

    - Due to a single tree, not all features get a fair chance in the prediction.

    - Bias mitigation in a single decision tree scenario is mostly done by pruning.


    In order to address the above limitations of a single decision tree model, there
    is a need to have a group of trees, hence the name *tree ensembles*. Bagging,
    boosting, and stacking models can be applied to regression-based problems as well
    as classification based-problems. Figure [5-2](#506619_1_En_5_Chapter.xhtml#Fig2)
    offers a pictorial view of differentiating the three types of ensemble models.


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig2_HTML.png](images/506619_1_En_5_Chapter/506619_1_En_5_Fig2_HTML.png)


    Figure 5-2


    Bagging model


    Bagging (also known as bootstrap aggregation) takes different samples of features
    and records from the training dataset and tries to train a decision tree. In Figure
    [5-2](#506619_1_En_5_Chapter.xhtml#Fig2), you can develop `n` trees where `n`
    can be 100, 500, or 1000. As you increase the number of trees, the accuracy of
    the model goes up when you have more features in a training dataset. If you have
    less features and samples, and if you increase the number of trees, then you will
    be able to get more accuracy, but in the process you will generate a lot of duplicate
    trees. They are duplicate trees because the same set of features appears in each
    tree. Bagging is parallel in nature, as you can train multiple trees in parallel
    for both classification and regression-based tasks. Hence it is recommended to
    use ensemble when you have more than 50 features and more than 50,000 records
    in the training dataset, as per industry practice.


    Boosting, on the other hand, is a sequential process where a base classifier is
    trained to classify or predict the target column. Then correctly predicted cases
    are separated in the classification scenario and the error distribution is picked
    up in a regression-based scenario in order to retrain the model on the same configuration
    or setting. This process is repeated multiple times, until there is no possibility
    of improving the accuracy further. This is sequential in nature because the second
    model works on the results of the first model. This is a powerful technique to
    get the ensemble models. The process is explained in Figure [5-3](#506619_1_En_5_Chapter.xhtml#Fig3).


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig3_HTML.png](images/506619_1_En_5_Chapter/506619_1_En_5_Fig3_HTML.png)


    Figure 5-3


    Boosting model training process


    The third variant of the ensemble model is stacking. There two ways to stack model
    predictions: homogenous group stacking and heterogeneous group stacking. See Table
    [5-1](#506619_1_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    Regression Problem Homogenous Group Stacking


    | | Models | |

    | --- | --- | --- |

    | **Test data** | DT | RF | Adaptive boosting | Gradient boosting | XGBoost |
    Prediction |

    | --- | --- | --- | --- | --- | --- | --- |

    | **1** | 25.3 | 25.2 | 24.3 | 26.1 | 24.5 | 25.08 |

    | **2** | 12.5 | 13.21 | 14.1 | 11.9 | 12.2 | 12.782 |

    | **3** | 17.8 | 15.3 | 16.3 | 16.7 | 17.1 | 16.64 |


    The last column, Prediction, is the average of the values predicted by different
    models. You considered only three records from the test dataset. Now see Table
    [5-2](#506619_1_En_5_Chapter.xhtml#Tab2).


    Table 5-2


    Classification Problem Homogenous Group Stacking


    | | Models | |

    | --- | --- | --- |

    | **Data** | DT | RF | Adaptive boosting | Gradient boosting | XGBoost | Prediction
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | **1** | Yes | No | Yes | Yes | Yes | Yes |

    | **2** | No | No | No | Yes | No | No |

    | **3** | Yes | Yes | No | No | No | No |


    In the first row there are four Yes answers and one No, hence the final prediction
    is Yes. Likewise, in the second and third rows, the final prediction is guided
    by majority voting. In a heterogeneous stacking scenario, not only the tree-based
