- fmt: '### Another Example of Image Classification


    The CIFAR-10 dataset is taken from [`www.cs.toronto.edu/~kriz/cifar.html`](http://www.cs.toronto.edu/%257Ekriz/cifar.html).
    You have a sample of 60,000 images consisting of 32x32 color images with 10 classes
    that need to be predicted or classified. These classes are airplane, automobile,
    bird, etc. Deep learning models can be explained using two explainers, `DeepExplainer`
    and `GradientExplainer`.


    ```

    from keras.datasets import cifar10

    from keras.utils import np_utils

    from keras.models import Sequential

    from keras.layers.core import Dense, Dropout, Activation, Flatten

    from keras.layers.convolutional import Conv2D, MaxPooling2D

    from keras.optimizers import SGD, Adam, RMSprop

    import matplotlib.pyplot as plt

    #from quiver_engine import server

    # CIFAR_10 is a set of 60K images 32x32 pixels on 3 channels

    IMG_CHANNELS = 3

    IMG_ROWS = 32

    IMG_COLS = 32

    #constant

    BATCH_SIZE = 128

    NB_EPOCH = 20

    NB_CLASSES = 10

    VERBOSE = 1

    VALIDATION_SPLIT = 0.2

    OPTIM = RMSprop()

    ```


    You cannot take an entire set of samples and run them through the convolutional
    layer and the dense layer. This process is very slow and time consuming and also
    computationally intensive. Hence there is a need to use small batches of the sample
    from the training set and incrementally update the weights after each epoch. Hence
    the batch size is 128, the number of epochs is 20, the optimizer is `RMSPROP`,
    and the validation sample size is 20%. These are the hyper parameters that has
    been considered as an example, is this the best set of hyper parameter configuration,
    may not be, as these can be set after many iterations. The best hyper parameter
    selection either can be done using a grid search approach or multiple iterations.


    ```

    #load dataset

    (X_train, y_train), (X_test, y_test) = cifar10.load_data()

    print(''X_train shape:'', X_train.shape)

    print(X_train.shape[0], ''train samples'')

    print(X_test.shape[0], ''test samples'')

    # convert to categorical

    Y_train = np_utils.to_categorical(y_train, NB_CLASSES)

    Y_test = np_utils.to_categorical(y_test, NB_CLASSES)

    # float and normalization

    X_train = X_train.astype(''float32'')

    X_test = X_test.astype(''float32'')

    X_train /= 255

    X_test /= 255

    # network

    model = Sequential()

    model.add(Conv2D(32, (3, 3), padding=''same'',

    input_shape=(IMG_ROWS, IMG_COLS, IMG_CHANNELS)))

    model.add(Activation(''relu''))

    model.add(MaxPooling2D(pool_size=(2, 2)))

    model.add(Dropout(0.25))

    model.add(Flatten())

    model.add(Dense(512))

    model.add(Activation(''relu''))

    model.add(Dropout(0.5))

    model.add(Dense(NB_CLASSES))

    model.add(Activation(''softmax''))

    model.summary()

    ```


    The summary of the number of neurons is shown in the `param` column. There are
    4,200,842 parameters being trained and there is no non-trainable parameter.


    ```

    # train

    #optim = SGD(lr=0.01, decay=1e-6, momentum=0.9, nesterov=True)

    model.compile(loss=''categorical_crossentropy'', optimizer=OPTIM,

    metrics=[''accuracy''])

    history = model.fit(X_train, Y_train, batch_size=BATCH_SIZE,

    epochs=NB_EPOCH, validation_split=VALIDATION_SPLIT,

    verbose=VERBOSE)

    print(''Testing...'')

    score = model.evaluate(X_test, Y_test,

    batch_size=BATCH_SIZE, verbose=VERBOSE)

    print("\nTest score:", score[0])

    print(''Test accuracy:'', score[1])

    ```


    Once a better model to classify is trained, you can save the model object for
    further usage at a later time for inference generation.


    ```

    #save model

    model_json = model.to_json()

    open(''cifar10_architecture.json'', ''w'').write(model_json)

    model.save_weights(''cifar10_weights.h5'', overwrite=True)

    # list all data in history

    print(history.history.keys())

    # summarize history for accuracy

    #plt.plot(mo)

    plt.plot(history.history[''val_acc''])

    plt.title(''model accuracy'')

    plt.ylabel(''accuracy'')

    plt.xlabel(''epoch'')

    plt.legend([''train'', ''test''], loc=''upper left'')

    plt.show()

    ```


    ![../images/506619_1_En_9_Chapter/506619_1_En_9_Fig6_HTML.jpg](images/506619_1_En_9_Chapter/506619_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Training model accuracy for each epoch


    From Figure [9-6](#506619_1_En_9_Chapter.xhtml#Fig6) it is clear that the highest
    training accuracy is achieved around the 10^(th) epoch. After that the training
    accuracy is quite unstable. There is a zigzag pattern.


    ```

    # summarize history for loss

    plt.plot(history.history[''loss''])

    plt.plot(history.history[''val_loss''])

    plt.title(''model loss'')

    plt.ylabel(''loss'')

    plt.xlabel(''epoch'')

    plt.legend([''train'', ''test''], loc=''upper left'')

    plt.show()

    ```


    ![../images/506619_1_En_9_Chapter/506619_1_En_9_Fig7_HTML.jpg](images/506619_1_En_9_Chapter/506619_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Model training loss and model test loss representation


    From Figure [9-7](#506619_1_En_9_Chapter.xhtml#Fig7), the model training loss
    and model test loss go hand in hand until the 3^(rd) epoch. After that, the loss
    values diverge and the test loss shows a zigzag pattern, clearly showing unstable
    loss, and the training loss goes on dropping, which is a clear sign of over-fitting.


    Before generating model explanations, it is important to ensure a stable, accurate,
    and reliable model. Otherwise, it is very difficult to justify the inference,
    as the model will produce random inferences and explanations.


