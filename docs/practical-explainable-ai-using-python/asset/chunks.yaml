    \ for AI models. You will explore model explainability for deep learning models,\
    \ rule-based expert systems, and model-agnostic explanations for prediction invariance\
    \ and for computer vision tasks using various XAI frameworks.\n\nToday we have\
    \ AI engineers and data scientists who train or build these models; software developers\
    \ who put these models into production and thus operationalize the models; business\
    \ users who consume the end result or outcome generated by the models; and decision\
    \ makers who think about the decisions made by the models. The leadership in driving\
    \ AI projects/products think, “Is there any way to have clarity around the models\
    \ and predictive modelers?” Bio-statisticians of course think how explain the\
    \ model predictions, etc. The expectation is to develop an explainability framework\
    \ that caters to the needs of all stakeholders involved in this process of making\
    \ AI work in real life. Again, this book strikes a balance between multiple stakeholders.\
    \ It leans towards data scientists, because if a data scientist is at least convinced\
    \ about the explainability, they can explain further to the business stakeholder.\n\
    \nMaking AI models explainable to the business user in simple, plain language\
    \ will take some time. Perhaps some new framework will come along to address this.\
    \ At this moment, the challenge is that the data scientist who built the model\
    \ doesn’t have complete clarity about the model’s behavior and lacks clarity in\
    \ explaining the AI model. Newly trained data scientists or graduating data scientists\
    \ will get a tremendous benefit from this book. Similarly, other AI engineers\
    \ will also benefit from this book. This is an evolving area; this book’s explanations\
