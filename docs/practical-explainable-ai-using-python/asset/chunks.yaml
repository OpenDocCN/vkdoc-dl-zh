    ## 结论


    在本章中，你学习了如何解释线性模型、用于预测的线性回归模型以及用于二分类的逻辑回归模型。类似地，逻辑回归模型也可以扩展到多项分类。线性模型是较易于解释的模型，每个人都很好地理解这些模型的工作原理。因此，人们对线性模型始终抱有高度的信任。然而，在本章中，你从多个角度探讨了如何使用可解释
    AI 库（如 LIME 和 SHAP）为线性模型创建视图。在下一章中，你将学习非线性模型的模型可解释性。


    # 4. 非线性模型的可解释性


    本章探讨如何使用基于可解释 AI 的 Python 库 LIME、SHAP 和 Skope-rules 来解释非线性模型在结构化数据监督学习任务中所做的决策。在本章中，你将学习解释非线性模型和基于树的模型及其在预测因变量时的决策的各种方法。在监督式机器学习任务中，存在一个目标变量（也称为因变量）和一组自变量。目标是预测因变量作为输入变量或自变量的加权和，其中存在高度的特征交互和非线性复杂关系。

