    shap_values = explainer.shap_values(Pool(X, y, cat_features=cat_features))

    shap.summary_plot(shap_values[0], X)

    ```


    A CatBoost classifier or regression has many hyper parameters. Table [5-8](#506619_1_En_5_Chapter.xhtml#Tab8)
    shows some of the important parameters and how they impact the model outcome.


    Table 5-8


    The Hyper Parameters of the CatBoost Classifier


    | Parameter | Explanation |

    | --- | --- |

    | `cat_features` | Categorical columns indices that are present in the training
    dataset |

    | `text_features` | Text columns indices (specified as integers) or names (specified
    as strings) |

    | `learning_rate` | For loss function optimization, used for reducing the gradient
    step |

    | `Iterations` | The maximum number of trees that can be built when solving machine
    learning problems |

    | `Max_depth` | Depth of the tree |

    | `leaf_estimation_method` | The method used to calculate the values in leavesPossible
    values:NewtonGradientExactDepends on the mode and the selected loss function:Regression
    with Quantile or MAE loss functions — One exact iterationRegression with any loss
    function but Quantile or MAE – One gradient iterationClassification mode – Ten
    Newton iterationsMulti-classification mode – One Newton iteration |

    | `boosting_type` | Boosting schemePossible values:Ordered — Usually provides
    better quality on small datasets, but it may be slower than the Plain schemePlain
    — The classic gradient boosting scheme |


    In order to get better results, the above parameters can be changed or modified
    and can be explained using the SHAP library.


    ## Using SHAP for Light GBM Model Explanation


    As discussed in the CatBoost classifier section, in a similar manner you can use
    a light gradient boosting model also. The difference between a light gbm model
    and a CatBoost model is that light GBM is faster to run in a mixed data scenario,
    where there is a mixed set of features in the training dataset. The CatBoost classifier
    is useful when you have a high number of categorical features in the dataset.
    In light GBM you need to encode the categorical features, but in the CatBoost
    model, the model has an internal mechanism to handle the categorical features.


    To install the light gbm model :


    ```

    conda install -c conda-forge lightgbm

    from sklearn.model_selection import train_test_split

    import lightgbm as lgb

    import shap

    X,y = shap.datasets.adult()

    X_display,y_display = shap.datasets.adult(display=True)

    # create a train/test split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2, random_state=7)

    d_train = lgb.Dataset(X_train, label=y_train)

    d_test = lgb.Dataset(X_test, label=y_test)

    params = {

    "max_bin": 512,

    "learning_rate": 0.05,

    "boosting_type": "gbdt",

    "objective": "binary",

    "metric": "binary_logloss",

    "num_leaves": 10,

    "verbose": -1,

    "min_data": 100,

    "boost_from_average": True

    }

    model = lgb.train(params, d_train, 10000, valid_sets=[d_test], early_stopping_rounds=50,
    verbose_eval=1000)

    ```


    You can take the same census income classification dataset for training a classifier
    using the light GBM model and generate the explanations for the predicted outcomes.
    There are many hyper parameters that can be understood by going through the official
    documentation page of the light gbm model. Table [5-9](#506619_1_En_5_Chapter.xhtml#Tab9)
    shows the hyper parameters that are used in the following lines of code.


    Table 5-9


    Hyper Parameters of a LGB Model


    | Parameters | Explanation |

    | --- | --- |

    | `Max_bin` | Max number of bins that feature values will be bucketed inA small
    number of bins may reduce training accuracy but may increase general power (deal
    with overfitting) |

    | `Learning_rate` | Shrinkage rate |

    | `Boosting_type` | gbdt, traditional Gradient Boosting Decision Tree, aliases:
    gbrtrf, Random Forest, aliases: random_forestdart, Dropouts meet Multiple Additive
    Regression Treesgoss, Gradient-based One-Side Sampling |

    | `Objective` | Application type such as binary classification, multiclass classification,
    etc. |

    | `Metric` | Metric(s) to be evaluated on the evaluation set(s) |

    | `Num_leaves` | Max number of leaves in one tree |

    | `Min_data` | Minimal number of data per categorical group |


    After training the light GBM model, you can go to the SHAP tree explainer to explain
    the predicted results, and also you can generate the force plot for the SHAP values
    (Figure [5-30](#506619_1_En_5_Chapter.xhtml#Fig30)).


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig30_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig30_HTML.jpg)


    Figure 5-30


    Force plot for predicting the log odds with the SHAP feature values


    ```

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(X)

    shap.force_plot(explainer.expected_value[1], shap_values[1][0,:], X_display.iloc[0,:])

    ```


    In Figure [5-30](#506619_1_En_5_Chapter.xhtml#Fig30), the education number and
    age push the predicted odds ratio to a higher value and the capital gains and
    relationship pull the predicted odds ratio to a lower value. Hence the final predicted
    odds ratio for record 1 from the dataset produces -8.43, which is much lower than
    the average odds ratio as shown by the base value of -2.43.


    ```

    shap.force_plot(explainer.expected_value[1], shap_values[1][:1000,:], X_display.iloc[:1000,:])

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig31_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig31_HTML.jpg)


    Figure 5-31


    Sample order similarity in producing the output value from the LGBM model


    In Figure [5-31](#506619_1_En_5_Chapter.xhtml#Fig31), the odds ratio is the output,
    and from the odds ratio you can get back the probability values of the target
    classes as shown in this chapter. This graph shows the samples’ similarity and
    then ordered accordingly. The samples that generate a higher odds ratio are placed
    between 0-50. Afterwards the rest of the samples generate odds ratios in the range
    of +3 and -9 up to the 900the record. After that, the odds ratio drops to a very
    negative range. The red line shows feature values that contribute towards making
    the predicted odds ratio higher and the blue line indicates the feature values
    that make the predicted odds ratio lower. The average line corresponds to a -2.43
    value. If you take the odds ratio of the entire dataset and then compute the average,
    the value comes out to be -2.43.


    ```

    shap.summary_plot(shap_values, X)

    ```


    ![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig32_HTML.jpg](images/506619_1_En_5_Chapter/506619_1_En_5_Fig32_HTML.jpg)


    Figure 5-32


    Summary plot


    Figure [5-32](#506619_1_En_5_Chapter.xhtml#Fig32) shows the summary plot. It’s
    a very important one. It provides the average SHAP value by different features
    corresponding to each class for the target column. What is interesting from this
    graph is that the average value is distributed equally between two classes independent
    of the feature values.'
