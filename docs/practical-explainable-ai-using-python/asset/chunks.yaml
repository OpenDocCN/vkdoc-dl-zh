    y_test = to_categorical(y_test)\nprint('y_train shape:', y_train.shape, 'y_test\
    \ shape:', y_test.shape)\n```\n\nCNN 模型通常用于预测图像类别。它包含一个二维卷积滤波器以更好地识别像素值，随后是一个最大池化层（有时是平均池化，有时是最大池化），以准备抽象层。丢弃层旨在控制模型预测中可能出现的任何过拟合问题。\n\
    \n```\ndef model():\n    x_in = Input(shape=(28, 28, 1))\n    x = Conv2D(filters=64,\
    \ kernel_size=2, padding='same', activation='relu')(x_in)\n    x = MaxPooling2D(pool_size=2)(x)\n\
    \    x = Dropout(0.3)(x)\n    x = Conv2D(filters=32, kernel_size=2, padding='same',\
