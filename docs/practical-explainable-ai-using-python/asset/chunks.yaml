    delta = counterfactual - orig

    for i, f in enumerate(feature_names):

    if np.abs(delta[0][i]) > 1e-4:

    print(''{}: {}''.format(f, delta[0][i]))

    print(''% owner-occupied units built prior to 1940: {}''.format(orig[0][5]))

