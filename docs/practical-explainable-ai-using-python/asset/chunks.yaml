- fmt: '# LIME Explanation and ML Model


    LIME, or Local Interpretable Model-Agnostic Explanations, is an algorithm that
    can explain the predictions of any classifier or regressor in a faithful way by
    approximating it locally with an interpretable model. It modifies a single data
    sample by tweaking the feature values and observes the resulting impact on the
    output. It performs the role of an "explainer" to explain predictions from each
    data sample. The output of LIME is a set of explanations representing the contribution
    of each feature to a prediction for a single sample, which is a form of local
    interpretability. Interpretable models in LIME can be, for instance, linear regression
    or decision trees, which are trained on small perturbations (e.g. adding noise,
    removing words, or hiding parts of the image) of the original model to provide
    a good local approximation. LIME can be installed using the `pip` command.


    You can take up the model training dataset with the target column and train a
    regression model afresh, instead of the previous model object `new_model`, because
    LIME is a model-agnostic technique and it retrains the models while generating
    the explainer. LIME localizes a problem and explains the model at local level
    rather than global explanations.


    ```

    !pip install lime

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(xtrain),

    mode=''regression'',

    feature_names=xtrain.columns,

    class_names=[''price''],

    verbose=True)

    ```


    The LIME tabular explainer requires a numpy array as an input, hence the training
    data format changes. The mode is selected as regression after perturbation and
    the target column is price. Once the explainer has been developed, detailed local
    explanations can be further generated. The feature frequencies option provides
    the distribution of features and how many times it has been part of the perturbation
    process.


    ```

    explainer.feature_selection

    explainer.feature_frequencies

    ```


    If you want to use the previously trained model object, then you can use the explain
    instance option. This requires a test dataset, model object, and number of features
    that can be used. Let''s take the same 60th record from the test dataset. You
    will get the result as an intercept term, a local prediction value, and right,
    which is global prediction value. For the 60th record from the test dataset, if
    you use a predict function, you get a predicted value of 27.5854, which is equal
    to the right value from the explain instance. The local mode of prediction is
    28.54, which is closer to the actual predicted value of 35.0.


    ```

    # asking for explanation for LIME model

    i = 60

    exp = explainer.explain_instance(np.array(xtest)[i],

    new_model.predict,

    num_features=14

    )

    new_model.predict(xtest)[60]

    ytest[60:61]

    Intercept 18.186435664326485

    Prediction_local [28.15539047]

    Right: 27.58547373488966

    exp.show_in_notebook(show_table=True)

    exp.as_list()

    ```


    You can show the explainer in a tabular format with the predicted value, positive
    and negative feature values, and overall features and their value in the table.
    The predicted value is 46.62. In the second chart, the positive feature and negative
    feature values are displayed for the same instance, number 60. The horizontal
    bars in the second chart indicate the feature importance for the record. The third
    table shows the LIME value corresponding to each feature. The methodology and
    the local explanations are quite intuitive. This can be explained to any business
    user. The sample locality of the 60th record selects the single data point uniformly
    and at random, creating perturbed data points and a corresponding predicted value
    from the model. By default, the feature selection method is auto. LIME focuses
    on fitting the interpretable model on the shuffled dataset (perturbed) using the
    sample weights and provides local explanations using the newly trained model.
    See Figure [3-13](#506619_1_En_3_Chapter.xhtml#Fig13).


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig13_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Contributions of positive and negative values from different features towards
    the predicted value


    The explainer for the 60th record can also be displayed as a list as above. There
    is another class function called a sub modular pick for generating a global decision
    boundary.


    ```

    # Code for SP-LIME

    import warnings

    from lime import submodular_pick

    # Remember to convert the dataframe to matrix values

    # SP-LIME returns exaplanations on a sample set to provide a non redundant global
    decision boundary of original model

    sp_obj = submodular_pick.SubmodularPick(explainer, np.array(xtrain),

    new_model.predict,

    num_features=14,

    num_exps_desired=10)

    [exp.show_in_notebook() for exp in sp_obj.sp_explanations ]

    ```


    Here the number of features used for generating a global decision boundary is
    14, and the number of experiments desired is 10. This part of the script will
    take some time to complete since you are generating multiple iterations. See Figure
    [3-14](#506619_1_En_3_Chapter.xhtml#Fig14).


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig14_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig14_HTML.jpg)


    Figure 3-14


    Sub-modular pick explanations


    LIME tries to trade off between fidelity and interpretability. Fidelity means
    the model should be able to replicate the model behavior in the locality of the
    instance used in prediction. Interpretability you already know is clarity so humans
    can understand the model output. The following equation shows the relationship
    between the two:


    ![$$ \xi (x)=\underset{g\in G}{\arg \min}\kern1.5em L\left(f,g,{\pi}_x\right)+\Omega
    (g) $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equd.png)


    Let''s understand each of the symbols used in the above formula:


    *   `F` is the original predictor.

    *   `g` is the model explanation.

    *   The original features are `x`.

    *   The `pi` of `x` is a proximity measure defining the locality around `xx`.

    *   The `omega` of `x` is a measure of model complexity for explanation.


    One of the limitations of LIME is the inaccurate definition of neighborhood and
    proximity. While sampling the records in the locality, it uses a Gaussian distribution,
    which does not take into consideration the relationship between various features.
    If the relationship between the dependent and independent variables is non-linear,
    then the explanations will not be accurate. Another limitation is the sub-modular
    pick, which is a set of n-samples from the dataset that best explains the model.
    The sub-modular pick generates a lot of output, which is at times difficult to
    interpret. Despite the limitations of the module, LIME is mostly used for generating
    model-agnostic local interpretations of individual predictions. It is quite popular
    because of the simplicity of its output and how easy it is to explain.'
  raw: '## LIME Explanation and ML Model


    LIME, or Local Interpretable Model-Agnostic Explanations, is an algorithm that
    can explain the predictions of any classifier or regressor in a faithful way by
    approximating it locally with an interpretable model. It modifies a single data
    sample by tweaking the feature values and observes the resulting impact on the
    output. It performs the role of an "explainer" to explain predictions from each
    data sample. The output of LIME is a set of explanations representing the contribution
    of each feature to a prediction for a single sample, which is a form of local
    interpretability. Interpretable models in LIME can be, for instance, linear regression
    or decision trees, which are trained on small perturbations (e.g. adding noise,
    removing words, or hiding parts of the image) of the original model to provide
    a good local approximation. LIME can be installed using the pip command.


    You can take up the model training dataset with the target column and train a
    regression model afresh, instead of the previous model object `new_model`, because
    LIME is a model-agnostic technique and it retrains the models while generating
    the explainer. LIME localizes a problem and explains the model at local level
    rather than global explanations.


    ```

    !pip install lime

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(xtrain),

    mode=''regression'',

    feature_names=xtrain.columns,

    class_names=[''price''],

    verbose=True)

    ```


    The LIME tabular explainer requires a numpy array as an input, hence the training
    data format changes. The mode is selected as regression after perturbation and
    the target column is price. Once the explainer has been developed, detailed local
    explanations can be further generated. The feature frequencies option provides
    the distribution of features and how many times it has been part of the perturbation
    process.


    ```

    explainer.feature_selection

    explainer.feature_frequencies

    ```


    If you want to use the previously trained model object, then you can use the explain
    instance option. This requires a test dataset, model object, and number of features
    that can be used. Let’s take the same 60th record from the test dataset. You will
    get the result as an intercept term, a local prediction value, and right, which
    is global prediction value. For the 60th record from the test dataset, if you
    use a predict function, you get a predicted value of 27.5854, which is equal to
    the right value from the explain instance. The local mode of prediction is 28.54,
    which is closer to the actual predicted value of 35.0.


    ```

    # asking for explanation for LIME model

    i = 60

    exp = explainer.explain_instance(np.array(xtest)[i],

    new_model.predict,

    num_features=14

    )

    new_model.predict(xtest)[60]

    ytest[60:61]

    Intercept 18.186435664326485

    Prediction_local [28.15539047]

    Right: 27.58547373488966

    exp.show_in_notebook(show_table=True)

    exp.as_list()

    ```


    You can show the explainer in a tabular format with the predicted value, positive
    and negative feature values, and overall features and their value in the table.
    The predicted value is 46.62\. In the second chart, the positive feature and negative
    feature values are displayed for the same instance, number 60\. The horizontal
    bars in the second chart indicate the feature importance for the record. The third
    table shows the LIME value corresponding to each feature. The methodology and
    the local explanations are quite intuitive. This can be explained to any business
    user. The sample locality of the 60th record selects the single data point uniformly
    and at random, creating perturbed data points and a corresponding predicted value
    from the model. By default, the feature selection method is auto. LIME focuses
    on fitting the interpretable model on the shuffled dataset (perturbed) using the
    sample weights and provides local explanations using the newly trained model.
    See Figure [3-13](#506619_1_En_3_Chapter.xhtml#Fig13).


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig13_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Contributions of positive and negative values from different features towards
    the predicted value


    The explainer for the 60th record can also be displayed as a list as above. There
    is another class function called a sub modular pick for generating a global decision
    boundary.


    ```

    # Code for SP-LIME

    import warnings

    from lime import submodular_pick

    # Remember to convert the dataframe to matrix values

    # SP-LIME returns exaplanations on a sample set to provide a non redundant global
    decision boundary of original model

    sp_obj = submodular_pick.SubmodularPick(explainer, np.array(xtrain),

    new_model.predict,

    num_features=14,

    num_exps_desired=10)

    [exp.show_in_notebook() for exp in sp_obj.sp_explanations ]

    ```


    Here the number of features used for generating a global decision boundary is
    14, and the number of experiments desired is 10\. This part of the script will
    take some time to complete since you are generating multiple iterations. See Figure
    [3-14](#506619_1_En_3_Chapter.xhtml#Fig14).


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig14_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig14_HTML.jpg)


    Figure 3-14


    Sub-modular pick explanations


    LIME tries to trade off between fidelity and interpretability. Fidelity means
    the model should be able to replicate the model behavior in the locality of the
    instance used in prediction. Interpretability you already know is clarity so humans
    can understand the model output. The following equation shows the relationship
    between the two:


    ![$$ \xi (x)=\underset{g\in G}{\arg \min}\kern1.5em L\left(f,g,{\pi}_x\right)+\Omega
    (g) $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equd.png)


    Let’s understand each of the symbols used in the above formula:


    *   F is the original predictor.


    *   g is the model explanation.


    *   The original features are x.


    *   The pi of x is a proximity measure defining the locality around xx.


    *   The omega of x is a measure of model complexity for explanation.


    One of the limitations of LIME is the inaccurate definition of neighborhood and
    proximity. While sampling the records in the locality, it uses a Gaussian distribution,
    which does not take into consideration the relationship between various features.
    If the relationship between the dependent and independent variables is non-linear,
    then the explanations will not be accurate. Another limitation is the sub-modular
    pick, which is a set of n-samples from the dataset that best explains the model.
    The sub-modular pick generates a lot of output, which is at times difficult to
    interpret. Despite the limitations of the module, LIME is mostly used for generating
    model-agnostic local interpretations of individual predictions. It is quite popular
    because of the simplicity of its output and how easy it is to explain.'
  trans: '

    # LIME 解释与机器学习模型


    LIME（局部可解释模型无关解释）是一种算法，能够通过使用可解释模型在局部进行近似，以可信的方式解释任何分类器或回归器的预测结果。它通过调整特征值来修改单个数据样本，并观察对输出产生的影响。它扮演着“解释器”的角色，用于解释每个数据样本的预测结果。LIME
    的输出是一组解释，代表每个特征对单个样本预测的贡献，这是一种局部可解释性形式。LIME 中的可解释模型可以是，例如，线性回归或决策树，这些模型通过在原始模型的小扰动（例如，添加噪声、移除单词或隐藏图像部分）上进行训练，以提供良好的局部近似。可以使用
    `pip` 命令安装 LIME。


    你可以使用包含目标列的模型训练数据集，重新训练一个回归模型，而不是使用之前的模型对象 `new_model`，因为 LIME 是一种模型无关技术，它在生成解释器时会重新训练模型。LIME
    将问题局部化，并在局部层面解释模型，而不是提供全局解释。


    ```

    !pip install lime

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(xtrain),

    mode=''regression'',

    feature_names=xtrain.columns,

    class_names=[''price''],

    verbose=True)

    ```


    LIME 表格解释器需要 numpy 数组作为输入，因此训练数据格式会发生变化。在扰动后，模式选择为回归，目标列为价格。一旦解释器开发完成，就可以进一步生成详细的局部解释。特征频率选项提供了特征的分布情况以及它在扰动过程中被使用的次数。


    ```

    explainer.feature_selection

    explainer.feature_frequencies

    ```


    如果你想使用之前训练好的模型对象，那么可以使用解释实例选项。这需要一个测试数据集、模型对象以及可以使用的特征数量。让我们使用测试数据集中的第 60 条记录。你将得到结果，包括截距项、局部预测值以及全局预测值（即
    `right` 值）。对于测试数据集中的第 60 条记录，如果你使用预测函数，你会得到预测值 27.5854，该值等于解释实例中的 `right` 值。局部预测模式值为
    28.54，更接近实际预测值 35.0。


    ```

    # 请求 LIME 模型的解释

    i = 60

    exp = explainer.explain_instance(np.array(xtest)[i],

    new_model.predict,

    num_features=14

    )

    new_model.predict(xtest)[60]

    ytest[60:61]

    Intercept 18.186435664326485

    Prediction_local [28.15539047]

    Right: 27.58547373488966

    exp.show_in_notebook(show_table=True)

    exp.as_list()

    ```


    你可以以表格格式显示解释器，其中包含预测值、正负特征值以及表格中的总体特征及其值。预测值为 46.62。在第二个图表中，针对同一个实例（编号 60）显示了正特征值和负特征值。第二个图表中的水平条表示该记录的特征重要性。第三个表格显示了每个特征对应的
    LIME 值。该方法和局部解释非常直观。这可以向任何业务用户解释。第 60 条记录的样本局部性会均匀且随机地选择单个数据点，创建扰动数据点以及模型对应的预测值。默认情况下，特征选择方法是自动的。LIME
    专注于使用样本权重在打乱的数据集（扰动后）上拟合可解释模型，并使用新训练的模型提供局部解释。参见图 3-13。


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig13_HTML.jpg](img/506619_1_En_3_Fig13_HTML.jpg)


    图 3-13


    不同特征的正负值对预测值的贡献


    第 60 条记录的解释器也可以像上面那样以列表形式显示。还有另一个类函数，称为子模选择，用于生成全局决策边界。


    ```

    # SP-LIME 的代码

    import warnings

    from lime import submodular_pick

    # 记住将数据框转换为矩阵值

    # SP-LIME 返回样本集上的解释，以提供原始模型的非冗余全局决策边界

    sp_obj = submodular_pick.SubmodularPick(explainer, np.array(xtrain),

    new_model.predict,

    num_features=14,

    num_exps_desired=10)

    [exp.show_in_notebook() for exp in sp_obj.sp_explanations ]

    ```


    这里用于生成全局决策边界的特征数量是 14，期望的实验次数是 10。这部分脚本需要一些时间才能完成，因为你正在生成多次迭代。参见图 3-14。


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig14_HTML.jpg](img/506619_1_En_3_Fig14_HTML.jpg)


    图 3-14


    子模选择解释


    LIME 试图在保真度和可解释性之间进行权衡。保真度意味着模型应该能够在用于预测的实例的局部区域内复制模型行为。可解释性你已经知道，是指清晰度，以便人类能够理解模型输出。以下公式展示了两者之间的关系：


    ![$$ \xi (x)=\underset{g\in G}{\arg \min}\kern1.5em L\left(f,g,{\pi}_x\right)+\Omega
    (g) $$](img/506619_1_En_3_Chapter_TeX_Equd.png)


    让我们理解上述公式中使用的每个符号：


    *   `F` 是原始预测器。

    *   `g` 是模型解释。

    *   原始特征是 `x`。

    *   `x` 的 `pi` 是一个邻近度度量，定义了 `xx` 周围的局部区域。

    *   `x` 的 `omega` 是用于解释的模型复杂度的度量。


    LIME 的局限性之一是对邻域和邻近度的定义不准确。在对局部区域内的记录进行采样时，它使用高斯分布，这没有考虑各个特征之间的关系。如果因变量和自变量之间的关系是非线性的，那么解释将不准确。另一个局限性是子模选择，它是从数据集中选出的最能解释模型的一组
    n 个样本。子模选择会产生大量输出，有时难以解释。尽管该模块存在局限性，但 LIME 主要用于为单个预测生成与模型无关的局部解释。由于其输出的简单性和易于解释的特点，它非常受欢迎。

