  raw: '## Trust in ML Model: SHAP


    In order to trust the linear regression-based machine learning model, you need
    to understand the R square value derived from the model. The R square value indicates
    the goodness of the fit of a regression model, which means the proportion of the
    explained variance in the target variable by all the features together. The R
    square value ranges from 0.0-1.0\. If the R square value is zero, then the model
    shows there is no correlation between the dependent and independent variables.
    If it is 1, then it shows the features are very highly correlated. It should be
    0.80 or more in order to qualify as a good model on whose predictions you can
    trust. In the above automobile example, the R square value is 0.70, which is very
    close to a standard model you can trust. Instead of R square, it is the adjusted
    R square value that is most referred to as it takes into account the number of
    features used in the model. The R square and adjusted R square relationship is
    shown below using the formula. In the following formula, N means the total number
    of training examples and p means the total number of features:


    ![$$ Adjusted\kern0.5em {R}^2=1-\frac{\left(1-{R}^2\right)\left(N-1\right)}{N-p-1}
    $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equa.png)


    The R square value may increase as you add redundant variables into the model,
    but the adjusted R square will remain unchanged. The adjusted R square will only
    increase if the feature has any contribution to the overall model explainability.


    In order to generate additional explainability and gain deeper understanding into
    how the model works, you can get help from additional Python-based libraries.
    Shapley values are a widely used approach from cooperative game theory that come
    with desirable properties. You understand from the model coefficients how the
    outcome variable is predicted or estimated to change as you change the input parameters.
    However, it does not tell you which features are important. The value of each
    coefficient is dependent on the scale of the input features. As an example, the
    car age can scale between 0-15 years. However, the BHP can range from a 34.20-560.00
    in the above dataset. Hence the magnitude of the model coefficient is not necessarily
    a good measure of feature importance in a linear regression model.


    Some data scientists use the absolute value of t-statistics as a measure of importance
    of features in a linear regression model.


    ![$$ {t}_{{\overset{\frown }{\beta}}_j}=\frac{{\overset{\frown }{\beta}}_j}{SE\left({\overset{\frown
    }{\beta}}_j\right)} $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equb.png)


    One of the ways to understand feature importance is to look at the partial dependency
    plot of the feature against the model output.


    ```

    !pip install shap

    ```


    Once SHAP is successfully installed, you can use the library to generate the partial
    dependency plot shown in Figure [3-3](#506619_1_En_3_Chapter.xhtml#Fig3).


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig3_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Partial dependency plot


    ```

    import shap

    shap.plots.partial_dependence("Age", new_model.predict,xtrain, ice=False, model_expected_value=True,
    feature_expected_value=True)

    ```


    The dotted horizontal line shows the expected value of the model output when applied
    to the dataset, the vertical dotted line shows the average age value feature,
    and the blue partial dependence plot line, which the is average value of the model
    output when you fix the age feature to a given value, on the graph always passes
    through the intersection of the two gray expected value lines. This intersection
    point can be considered as the “center” of the partial dependence plot with respect
    to the data distribution. The vertical grey boxes on the horizontal axis line
    show that the age distribution is slightly skewed towards the right.


    The main idea behind the Shapley value established model explanations is to use
    an impartial distribution of results from cooperative game theory to allocate
    credit for a model’s output (𝑥) among its input features. In order connect game
    theory with machine learning models, it is necessary to both match a model’s input
    features with players in a game and also to match the model function with the
    rules of the game. In game theory, a player has the option to join or not join
    a game, similar to the way a feature can “join” or “not join” a model.


    What is a SHAP value and how it is computed? This provides a fair idea about the
    interpretation and meaning of a SHAP value. The Shapely value for each feature
    value is computed by the following formula:


    ![$$ {\phi}_i=\sum \limits_{S\subseteq F\backslash \left\{i\right\}}\frac{\mid
    S\mid !\left(|F|-|S|-1\right)!}{\mid F\mid !}\left[{f}_{S\cup \left\{i\right\}}\left({x}_{S\cup
    \left\{i\right\}}\right)-{f}_S\left({x}_S\right)\right] $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equc.png)


    The following points clarify how it works:


    *   To compute each feature’s contribution, SHAP requires retraining the model
    on all feature subsets S.


    *   In the above formula, i is the individual feature.


    *   F is the set of all features.


    *   S is the subset of features from the set F.


    *   For any feature I, two models are created: model 1 with the feature i and
    model 2 without feature i. Then the difference between the predictions computed.


    *   The effect of one feature on the model depends on how the other features in
    the model behave.


    *   The differences in prediction are computed for all possible subsets of S and
    their average values are taken.


    *   The weighted average value of all possible differences is used to populate
    feature importance.


    The most common way to define what it means for a feature to “join” a model is
    to say that a feature has “joined a model” when we know the value of that feature,
    and it has not joined a model when we don’t know the value of that feature. This
    happens when the weight/coefficient of a feature in a model assumes 0.000, then
    we consider that feature has not joined the game. If the coefficient of a feature
    is not equal to 0.000, then we consider that feature as part of the game. Let’s
    look at the SHAP values for the linear regression model.


    ```

    # compute the SHAP values for the linear model

    background = shap.maskers.Independent(xtrain, max_samples=2000)

    background

    xtrain.shape

    ```


    This `shap.maskers.Independent` function masks out tabular features by integrating
    over the given background dataset. Here the background dataset has 4,500 records
    from the training dataset, which is the maximum number of samples to use from
    the passed background data. If data has more than `max_samples`, then `shap.utils.sample`
    is used to subsample the dataset. The number of samples coming out of the masker
    (to be integrated over) matches the number of samples in the background dataset.
    This means a larger background dataset causes longer runtimes. Normally about
    1, 10, 100, or 1000 background samples are reasonable choices.


    ```

    explainer = shap.Explainer(new_model, background)

    explainer

    shap_values = explainer(xtrain)

    shap_values

    ```'
  trans: '

    # 对机器学习模型的信任：SHAP


    为了信任基于线性回归的机器学习模型，你需要理解模型得出的`R square`值。`R square`值表示回归模型的拟合优度，即所有特征共同解释目标变量方差的比例。`R
    square`值的范围是 0.0 到 1.0。如果`R square`值为零，则表明模型显示因变量与自变量之间没有相关性。如果为 1，则表明特征之间高度相关。要成为一个值得信赖其预测的优质模型，该值应达到
    0.80 或更高。在上述汽车示例中，`R square`值为 0.70，非常接近一个可信任的标准模型。相比于`R square`，更常被引用的是调整后的`R
    square`值，因为它考虑了模型中使用的特征数量。`R square`与调整后的`R square`之间的关系通过以下公式展示。在下面的公式中，`N`表示训练样本总数，`p`表示特征总数：


    ![$$ Adjusted\kern0.5em {R}²=1-\frac{\left(1-{R}²\right)\left(N-1\right)}{N-p-1}
    $$](img/506619_1_En_3_Chapter_TeX_Equa.png)


    当你向模型中添加冗余变量时，`R square`值可能会增加，但调整后的`R square`值将保持不变。只有当该特征对模型的整体可解释性有所贡献时，调整后的`R
    square`值才会增加。


    为了生成额外的可解释性并更深入地理解模型的工作原理，你可以借助其他基于 Python 的库。Shapley 值是一种广泛使用的合作博弈论方法，具有理想的特性。你可以从模型系数中了解，当改变输入参数时，结果变量是如何被预测或估计变化的。然而，它并不能告诉你哪些特征是重要的。每个系数的值取决于输入特征的尺度。例如，车龄的范围可以是
    0-15 年。然而，在上述数据集中，`BHP`的范围可以从 34.20 到 560.00。因此，在线性回归模型中，模型系数的大小并不一定是衡量特征重要性的良好指标。


    一些数据科学家使用 t 统计量的绝对值作为线性回归模型中特征重要性的度量。


    ![$$ {t}_{{\overset{\frown }{\beta}}_j}=\frac{{\overset{\frown }{\beta}}_j}{SE\left({\overset{\frown
    }{\beta}}_j\right)} $$](img/506619_1_En_3_Chapter_TeX_Equb.png)


    理解特征重要性的方法之一是查看特征相对于模型输出的偏依赖图。


    ```

    !pip install shap

    ```


    一旦`SHAP`成功安装，你就可以使用该库生成如图 3-3 所示的偏依赖图。


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig3_HTML.jpg](img/506619_1_En_3_Fig3_HTML.jpg)


    图 3-3


    偏依赖图


    ```

    import shap

    shap.plots.partial_dependence("Age", new_model.predict,xtrain, ice=False, model_expected_value=True,
    feature_expected_value=True)

    ```


    水平虚线表示模型应用于数据集时的期望输出值，垂直虚线表示平均年龄特征值，而蓝色的偏依赖图线（即当你将年龄特征固定为某个给定值时模型输出的平均值）在图上始终穿过两条灰色期望值线的交点。这个交点可以被视为相对于数据分布的偏依赖图的“中心”。水平轴上的垂直灰色框显示年龄分布略微向右偏斜。


    Shapley 值建立的模型解释背后的主要思想是，利用合作博弈论中公正的结果分配方式，将模型输出（`x`）的贡献在其输入特征之间进行分配。为了将博弈论与机器学习模型联系起来，既需要将模型的输入特征与博弈中的玩家相匹配，也需要将模型函数与博弈规则相匹配。在博弈论中，玩家可以选择加入或不加入一个博弈，这类似于一个特征可以“加入”或“不加入”一个模型。


    什么是`SHAP`值，它是如何计算的？这为理解`SHAP`值的解释和含义提供了一个清晰的概念。每个特征值的 Shapley 值通过以下公式计算：


    ![$$ {\phi}_i=\sum \limits_{S\subseteq F\backslash \left\{i\right\}}\frac{\mid
    S\mid !\left(|F|-|S|-1\right)!}{\mid F\mid !}\left[{f}_{S\cup \left\{i\right\}}\left({x}_{S\cup
    \left\{i\right\}}\right)-{f}_S\left({x}_S\right)\right] $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equc.png)


    以下几点阐明了其工作原理：


    - 为了计算每个特征的贡献，`SHAP`需要在所有特征子集`S`上重新训练模型。

    - 在上述公式中，`i`是单个特征。

    - `F`是所有特征的集合。

    - `S`是来自集合`F`的特征子集。

    - 对于任何特征`i`，会创建两个模型：包含特征`i`的模型 1 和不包含特征`i`的模型 2。然后计算预测值之间的差异。

    - 一个特征对模型的影响取决于模型中其他特征的行为。

    - 针对`S`的所有可能子集计算预测差异，并取其平均值。

    - 所有可能差异的加权平均值用于填充特征重要性。


    定义特征“加入”模型含义的最常见方式是：当我们知道某个特征的值时，就说该特征“加入了模型”；当我们不知道其特征值时，就说它没有加入模型。当模型中某个特征的权重/系数为
    0.000 时，我们就认为该特征没有加入博弈。如果某个特征的系数不等于 0.000，我们就认为该特征是博弈的一部分。让我们来看看线性回归模型的`SHAP`值。


    ```

    # 计算线性模型的 SHAP 值

    background = shap.maskers.Independent(xtrain, max_samples=2000)

    background

    xtrain.shape

    ```


    这个`shap.maskers.Independent`函数通过对给定的背景数据集进行积分来屏蔽表格特征。这里的背景数据集包含来自训练数据集的 4500 条记录，这是从传入的背景数据中使用的最大样本数。如果数据超过`max_samples`，则使用`shap.utils.sample`对数据集进行子采样。从掩码器中输出的样本数量（用于积分）与背景数据集中的样本数量相匹配。这意味着更大的背景数据集会导致更长的运行时间。通常，大约
    1、10、100 或 1000 个背景样本是合理的选择。


    ```

    explainer = shap.Explainer(new_model, background)

    explainer

    shap_values = explainer(xtrain)

    shap_values

    ```

    '
- fmt: 'The above script shows the output of SHAP values, background data samples,
    and the base values from the model. The following script shows the standard partial
    dependency plot, taking into account the `age` feature and the model `predict`
    function, for sample record number 23 from the dataset. The SHAP value for a specific
    feature `i` is just the difference between the expected model output and the partial
    dependence plot at the feature’s value `xi`, the additive nature of Shapley values.
    One of the fundamental properties of Shapley values is that they always sum up
    the difference between the game outcome when all players are present and the game
    outcome when no players are present. For machine learning models, this means that
    SHAP values of all input features will always sum up to the difference between
    the baseline (expected) model output and the current model output for the prediction
    being explained. The easiest way to see this is through a waterfall plot that
    starts your background prior expectation for a home price `f(x)` and then adds
    features one at a time until you reach the current model output `f(x)`. Corresponding
    to the `age` feature of 10 years, the vertical difference between the blue line
    and grey dotted line is the SHAP value for the feature.


    ### Local Explanation and Individual Predictions in a ML Model


    The SHAP partial dependency plot (Figure [3-4](#506619_1_En_3_Chapter.xhtml#Fig4))
    is a good way to explain the individual predictions, get additional insight for
    the individual predictions, and explain what features matter for that particular
    individual prediction.


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig4_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Partial dependence plot of age and expected value of prediction


    ```

    # make a standard partial dependence plot

    sample_ind = 23

    fig,ax = shap.partial_dependence_plot(

    "Age", new_model.predict, xtrain, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False,

    shap_values=shap_values[sample_ind:sample_ind+1,:],

    shap_value_features=X.iloc[sample_ind:sample_ind+1,:]

    )

    ```


    Figure [3-5](#506619_1_En_3_Chapter.xhtml#Fig5) explains the correlation in terms
    of a scatter plot between the `age` feature and the SHAP value of an `age` feature.


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig5_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    SHAP value of age and age association


    ```

    shap.plots.scatter(shap_values[:,"Age"])

    ```


    Getting the SHAP values for a sample row from the dataset can be explained through
    a waterfall chart (Figure [3-6](#506619_1_En_3_Chapter.xhtml#Fig6)). This is part
    of the local explanation. Waterfall plots are designed to display explanations
    for individual predictions, so they expect a single row of an explanation object
    as input. The bottom of a waterfall plot starts as the expected value of the model
    output, and then each row shows how the positive (red) or negative (blue) contribution
    of each feature moves the value from the expected model output over the background
    dataset to the model output for this prediction.


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig6_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Waterfall chart showing positive and negative SHAP values


    Let’s take an example to understand the SHAP values: record number 60 from the
    training dataset, which is the 2966th row in the overall dataset. Use it as a
    new data point and make a prediction using the trained model. The predicted value
    is 4.7656. However, the actual price value for the same record is 4.85. The waterfall
    plot from the SHAP library shows how the predicted value of 4.766 is reached from
    the SHAP base values from the function to the predicted value.


    ```

    xtrain[60:61]

    new_model.predict(xtrain[60:61])

    ytrain[60:61]

    # the waterfall_plot shows how we get from shap_values.base_values to model.predict(X)[sample_ind]

    shap.plots.waterfall(shap_values[60])

    ```


    From the above waterfall chart, it is clear that for record number 60, the most
    impactful predictors are power BHP, age, petrol fuel type, and manual transmission.
    There are five least important features that are collapsed together and their
    joint contribution towards the prediction is +0.09. If you remove that restriction
    of collapsing into a single feature, you can expand by changing the `max_display`
    option. The following script shows a modified version of the waterfall chart from
    the SHAP values for local interpretation of the prediction (Figure [3-7](#506619_1_En_3_Chapter.xhtml#Fig7)):


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig7_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Expanded form showing all features


    ```

    shap.plots.waterfall(shap_values[60],max_display=30)

    ```'
