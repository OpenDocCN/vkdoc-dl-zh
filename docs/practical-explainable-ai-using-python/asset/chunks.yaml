    ## Non-Linear Model Explanation – LIME


    The top important features that play a role in the churn prediction process are
    `total_day_charge`, `number_customer_service_calls`, `total_day_minutes`, `number_vmail_messages`,
    and `total_eve_minutes`. The other features have no role to play, so the partial
    dependency plots for the unrelated features are parallel lines.


    You can also leverage some functions from the LIME Python library to explain the
    decisions made by the decision tree model.


    ```

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(xtrain),

    feature_names=list(xtrain.columns),

    class_names=[''target_churn_dum''],

    verbose=True, mode=''classification'')

    # this record is a no churn scenario

    exp = explainer.explain_instance(xtest.iloc[0], dt2.predict_proba,

    num_features=16)

    exp.as_list()

    pd.DataFrame(exp.as_list())

    exp.show_in_notebook(show_table=True)

    ```


    ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig23_HTML.jpg](images/506619_1_En_4_Chapter/506619_1_En_4_Fig23_HTML.jpg)


    Figure 4-23


    Feature importance and positive and negative contribution towards prediction probabilities
    of record 0


    Figure [4-23](#506619_1_En_4_Chapter.xhtml#Fig23) shows the local interpretation
    model explanation for the first record from test set `xtest[0]`. The middle chart
    in Figure [4-23](#506619_1_En_4_Chapter.xhtml#Fig23) shows two colors. The blue
    color shows the contribution to the target churn prediction probability and the
    orange color shows the contribution towards the other class, which is the no-churn
    scenario. The decision tree produces features as a range of values such as `total_day_minutes`
    between 179.90 and 216.20 as a feature contributes to churn probability by 0.08
    (8%). If you remove two features from the model `number_customer_service_calls
    <= 1.00` and `total_day_minutes > 179.90` and `<= 216.20`, then the target churn
    prediction probability will reduce by 0.16 (16%), that is (0.94 – 0.08 -0.08)
    which is 0.78 (78%). On the other hand, if you remove the `number_vmail_messages
    <=0.00`, then the target churn probability increases by 4% (0.04). The third table
    in Figure [4-23](#506619_1_En_4_Chapter.xhtml#Fig23) shows the contribution value
    of each feature towards the prediction. A similar kind of analysis and interpretation
    can be done for few more records, as shown in Figures [4-24](#506619_1_En_4_Chapter.xhtml#Fig24)
    through 4-26.


