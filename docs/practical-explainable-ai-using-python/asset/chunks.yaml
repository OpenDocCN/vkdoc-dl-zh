    for the predicted class. The figure displays SHAP values of 2, 1, 0, and 4\. The
    model generates 10 predictions corresponding to those four values of images. The
    red values make the predictions close to the input image on the extreme left,
    and the negative values make the predictions decrease in comparison to the input
    image, which is on the left side. Deep SHAP was developed on the basis of a paper
    published in NIPS.


    DeepLIFT makes an estimation of the SHAP values using an approach similar to backpropagation
