  trans: '

    # 7. 自然语言处理的可解释性


    本章将讲解如何将基于可解释人工智能的 Python 库 `ELI5` 和 `SHAP` 应用于自然语言处理任务，例如文本分类模型。机器学习模型为监督学习任务做出的预测决策，其对象是非结构化数据。文本分类是一项任务，你需要将文本句子或短语作为输入，并将其分类到离散的类别中。一个例子是新闻分类，其中内容作为输入，输出则被分类为政治、商业、体育、技术等。类似的应用场景是电子邮件分类中的垃圾邮件检测，其中电子邮件内容作为输入，并被分类为垃圾邮件或非垃圾邮件。在这种情况下，了解一封邮件为何被归类为垃圾邮件就很重要：内容中究竟是哪些词元导致了该预测？这对最终用户来说很有意义。这里我提到
    NLP 任务时，有很多种，但我会将其限定在文本分类用例以及类似用例上，比如实体识别、词性标注和情感分析。


    ## 自然语言处理任务


    如今，整个世界通过万维网连接在一起。非结构化的文本数据无处不在。它们存在于社交媒体、电子邮件对话、各种应用程序的聊天记录、基于 HTML 的页面、Word
    文档、客户服务中心的支持工单、在线调查回复等等之中。以下是一些与非结构化数据相关的用例：


    -   文档分类，其中输入是文本文档，输出可以是二分类或多分类标签。

    -   有时，如果情感已被标注，那么情感分类也遵循文档分类的用例。否则，情感分类将是一种基于词典的分类。

    -   命名实体识别模型，其中输入是文本文档，输出是命名实体类别。

    -   文本摘要，其中大段文本被压缩并以紧凑的形式呈现。


    在 NLP 文本分类、命名实体识别模型中，下一个词预测很常见，其中输入是句子或词向量，输出是需要分类或预测的标签。在机器学习时代之前，文本分类任务相当依赖人工，一组标注员需要阅读、理解文档中文本表达的含义，并将其归入一个类别。随着非结构化数据的大规模爆发，这种人工分类数据的方式变得非常困难。现在，可以将一些标注好的数据输入机器，训练一个学习算法，以便将来可以使用训练好的模型进行预测。


    ## 文本分类的可解释性


    非结构化文档或输入文本向量的维度非常高。用于对文档进行分类的预测模型需要被解释，因为预测背后的原因或预测类别背后的特征需要向最终用户展示。在文本分类的情况下，模型预测类别
    1 而非类别 2，因此了解哪些关键词实际上对类别 1 是正面的，哪些对类别 1 是负面的，这一点很重要。在多分类中，这会变得更加复杂，因为你需要解释所有导致预测出特定类别的关键词。在本章中，你将看到这两种情况。


    图 7-1 展示了将 XAI 引入文本分类模型所需的步骤。


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig1_HTML.png](img/506619_1_En_7_Fig1_HTML.png)


    图 7-1


    涉及 AI 模型的文本解释步骤


    输入文本以向量的形式表示，并使用文档-词项矩阵来开发分类模型，最后需要使用可解释性库来解释预测的类别，以便了解哪些特征或词语负责预测特定的类别标签。


    ## 文本分类数据集


    在本章中，你将使用来自 [`http://ai.stanford.edu/~amaas/data/sentiment/`](http://ai.stanford.edu/%257Eamaas/data/sentiment/)
    的大型电影评论数据集。该数据集包含 50,000 条评论，其中 25,000 条已经用二分类标签（如正面或负面评论）进行了标注。另外还有 25,000 条评论用于测试。你将使用此数据集创建一个文本分类模型来预测电影评论。在预测之后，你将分析预测的原因，并进一步解释该文本分类机器学习模型中特征的重要性及其他可解释性要素。在此任务中，你将评论句子提供给机器学习模型，模型预测情感为正面或负面。因此，这里的
    ML 模型被视为一个黑盒模型。这随之引发了一个问题：人们如何能信任来自黑盒模型的结果？


    ```

    import warnings

    warnings.filterwarnings("ignore")

    import pandas as pd

    from keras.datasets import imdb

    imdb = pd.read_csv(''IMDB Dataset.csv'')

    imdb.head()

    ```


    IMDB 电影数据集包含评论和情感。情感被标注为正面和负面，这是一个二分类标签系统。评论会被清理，停用词会被移除，文本会被转换为向量。以下脚本展示了使用 `sklearn`
    库的 `train_test_split` 函数将数据集拆分为训练集和测试集的过程：


    ```

    from sklearn.model_selection import train_test_split

    from sklearn.feature_extraction.text import CountVectorizer

    from sklearn.linear_model import LogisticRegressionCV

    from sklearn.pipeline import make_pipeline

    vec = CountVectorizer()

    clf = LogisticRegressionCV()

    clf.fit(vec,imdb.sentiment)

    ```


    为了将数据分配到训练集和测试集，你使用了 `sklearn` 库中的 `train_test_split` 函数。计数向量化器将词元转换并以向量的形式表示，这是来自语料库的文档-词项矩阵表示。计数向量被初始化并存储在
    `vec` 中，然后带有交叉验证的逻辑回归模型被初始化以开发训练模型。初始化后的对象存储在 `clf` 中。最后一步是使用 `fit` 方法训练模型。


    管道是一种方法，其中所有预处理步骤、模型训练步骤和验证步骤都可以被排序并一次性触发。在这个管道中，你将文本数据从单词转换为计数向量，然后传递给分类器。文本句子首先被转换为结构化的数据表。这是通过计算每个句子中出现的单词数量来实现的。在上面的例子中，评论被视为文档。每个文档被解析成单词。从所有评论中收集一个唯一的单词列表，然后将每个单词视为一个特征。如果你统计每个单词在不同评论中的出现次数，这被称为计数向量化器。由于这是一个电影评论情感分析数据集，它被分类为正面类别和负面类别，这构成了一个二分类问题。管道存储了转换和训练步骤的顺序，并通过调用
    `sklearn` 库的 `fit` 方法来执行。


    ```

    from sklearn import metrics

    def print_report(pipe):

    y_test = imdb.sentiment

    y_pred = pipe.predict(imdb.review)

    report = metrics.classification_report(y_test, y_pred)

    print(report)

    print("accuracy: {:0.3f}".format(metrics.accuracy_score(y_test, y_pred)))

    print_report(pipe)

    ```


    在上面的脚本片段中，你在测试数据集上预测情感，并计算分类准确率的误差指标。在这个例子中，分类准确率为 95%，这是一个非常好的准确率。

