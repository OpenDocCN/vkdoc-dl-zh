- fmt: '# N-gram-Based Text Classification


    Let’s consider two new approaches to developing the text classification model.
    For text classification, either you can use words or you can use characters. The
    following script analyses the characters and picks up the bigrams until five grams
    and keeps those n-grams as features in the `tf-idf` vectorizers. After the vector
    creation, the data for review is fed to the pipeline and model training happens.
    The training accuracy for sentiment classification is 99.8%, which is good. Now
    you can explain the individual prediction and see what factors contribute to positive
    sentiment and what contribute to negative sentiment (see Table [7-4](#506619_1_En_7_Chapter.xhtml#Tab4)
    and Figure [7-9](#506619_1_En_7_Chapter.xhtml#Fig9)).


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig9_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig9_HTML.jpg)


    **Figure 7-9** 2 gram and 5 gram feature highlights from the model


    **Table 7-4** N-gram-Based Vectorizer is taken as a pre-processing method and
    n-gram 2 till n-gram 5 is considered to create the training model using `TF-IDF`
    vectorizer and following Table [7-4](#506619_1_En_7_Chapter.xhtml#Tab4) shows
    the Classification Report


    | ![../images/506619_1_En_7_Chapter/506619_1_En_7_Figd_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Figd_HTML.jpg)
    |


    ```

    vec = TfidfVectorizer(stop_words=''english'', analyzer=''char'',

    ngram_range=(2,5))

    clf = LogisticRegressionCV()

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    ```


    ```

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```


    In the above script, you picked up the first review’s total contribution, which
    is the net result of green plus red highlighted text elements, and that is +3.106.
    Since the net result is +3.106, it is classified as a positive sentiment, which
    is also shown as the probability of positive sentiment is 0.949 and log odds for
    the classification is 2.914. -0.192 is the bias, which is also known as the intercept
    term for the logistic regression model.


    The `CountVectorizer` is appropriate when the length of the text documents is
    shorter. If the length of the text is longer, which means each word has a high
    frequency or is repeated multiple times in the text, then you should use the `TfidfVectorizer`.
    The `CountVectorizer` is just the words and their frequencies represented in a
    tabular format or array. From the following script, a `CountVectorizer` with stop
    word removal reduces the number of features and makes it very relevant. After
    training the model, you can see that the accuracy is 94.8%.


    Also, when you explain the first review, the sum of the net result of green plus
    red highlighted text is +1.315, and since the net result is positive, the sentiment
    is tagged as a positive sentiment with a probability score of 78.7% and a log
    odds score of 1.307. You can keep updating the feature extraction and keep updating
    the model type to make the prediction better. The better the model, the better
    the explanation of the classification of sentiments. The following script shows
    the `tf-idf` vector as a feature without the stop word removal process.


    You can see in the highlighted text in Figure [7-10](#506619_1_En_7_Chapter.xhtml#Fig10)
    there are few stop words and bigrams and trigrams, which are not correctly labelled
    with color. In order to take care of this, you can use the option in the analyzer
    as `char_wb`. `char` as an analyzer you have seen before because it parses the
    text into characters as n-grams, but this process takes time. In addition, `char_wb`
    is more to fine-tune, to take those n-grams as features where the n-grams are
    not overlapping each other.


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig10_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig10_HTML.jpg)


    **Figure 7-10** Non-overlapping character N-grams as feature importance


    ```

    vec = TfidfVectorizer(stop_words=''english'', analyzer=''char_wb'',

    ngram_range=(2,5))

    clf = LogisticRegressionCV()

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```


    This time the results look better. As an example, “watching just 1” is a negative
    n-gram that is not overlapping with any other n-gram, which is meaningful. Similarly,
    other n-grams are more refined. If the movie review is limited to a few lines
    of words you can use a `CountVectorizer` or `TfidfVectorizer`, but if the reviews
    become lengthy, then a `HashingVectorizer` comes to the rescue. When the review
    length goes up, the vocabulary size increases, hence a `HashingVectorizer` is
    quite useful. In the following script, the `HashingVectorizer` with one of the
    advanced ML model stochastic gradient descent classifiers is introduced. This
    produces a better model than the earlier model (Figure [7-11](#506619_1_En_7_Chapter.xhtml#Fig11)).
    This is because earlier models were slightly overfitting as well. To explore explainability,
    you can take the same first review text and explain the classification label and
    also look at the words that contributed to the positive sentiment and the negative
    sentiment.


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig11_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig11_HTML.jpg)


    **Figure 7-11** Very refined highlighted features explain the prediction better


    ```

    from sklearn.feature_extraction.text import HashingVectorizer

    from sklearn.linear_model import SGDClassifier

    vec = HashingVectorizer(stop_words=''english'', ngram_range=(1,2))

    clf = SGDClassifier(random_state=42)

    pipe = make_pipeline(vec, clf)

    pipe.fit(imdb.review, imdb.sentiment)

    print_report(pipe)

    eli5.show_prediction(clf, imdb.review[0], vec=vec,

    target_names=set(imdb.sentiment),

    targets=[''positive''])

    ```


    The first review comment is a positive sentiment, the overall positive score is
    +0.243, and the score is 0.269. It only considered relevant features as highlighted
    by the green and red colored text.


    ```

    from eli5.sklearn import InvertableHashingVectorizer

    import numpy as np

    ivec = InvertableHashingVectorizer(vec)

    sample_size = len(imdb.review) // 10

    X_sample = np.random.choice(imdb.review, size=sample_size)

    ivec.fit(X_sample)

    eli5.show_weights(clf, vec=ivec, top=20,

    target_names=set(imdb.sentiment))

    ```


    The invertible hashing vectorizer helps in featuring the weights along with the
    feature names from the hashing vectorizer without fitting a huge vocabulary. The
    notebook output in Figure [7-12](#506619_1_En_7_Chapter.xhtml#Fig12) shows the
    positive and negative features.


    ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig12_HTML.jpg](images/506619_1_En_7_Chapter/506619_1_En_7_Fig12_HTML.jpg)


    **Figure 7-12** Top features for the positive class prediction'
