- fmt: '# Conclusion


    You covered a few boosting based models for both classification scenarios and
    regression scenarios. In a similar fashion, the bagging classifiers can be trained
    and similar graphs as output can be produced. The graphs won’t change, but the
    interpretation of the values will change as you switch from one model to another
    model. Here are five important things you should take a note of:


    - In a regression scenario, you predict the target column and, based on the feature
    contribution, you can see how the predicted outcome moves up or down. So if you
    change an input feature, you can easily understand the impact on the target output.

    - In a classification scenario, you predict the log odds ratio as a continuous
    variable and predict the value based on feature input values. You know which features
    are important, so you have an exact visibility of a predicted outcome based on
    changes in the input features.

    - Be it bagging, boosting, or stacking, a similar framework of PDP, force plot,
    and summary plot can be generated to understand the decision making by the model.
    However, the pattern shown in a PDP plot, as an example, will change.

    - The changes in the patterns of the graphs happen because the model tries to
    capture the complex patterns, if any, in the data. As the data complexity increases,
    the model becomes more complex, and visually it may look difficult to interpret.
    However, the inference from the values will remain same.

    - Hence, based on the analysis in this chapter, it does not matter how many ensemble
    models you are covering. It is more important to establish a framework that can
    be followed for other ensemble models.


    # 6. Explainability for Time Series Models


    A time series model is a way of generating a multi-step prediction along a future
    time period. There are statistical models and machine learning-based models that
    can be deployed to generate forecasting for the future based on historical data.
    If the model predictions can be trusted or not, what is the degree of confidence
    someone can have about the predictions? Models that can be explained and models
    that cannot be explained are certain things we are going to cover in this chapter.


    ## Time Series Models


    The primary objective of a time series model is to estimate the value of a target
    variable using time as an independent variable. The target variable can be the
    value of a stock price, it can be the number of units of product, it can be the
    amount of revenue that would flow into the company account, and it can be the
    number of unique visitors for a particular website. The predicted values are multi-step
    because when using a time series model we usually predict multiple time steps.
    The time series model generates forecast values. The forecast values have certain
    confidence levels. The higher the confidence level, the better the model is; in
    lower confidence levels the model lacks stability in generating forecast values.
    The confidence interval can be calculated as a predicted value of a forecasted
    value plus and minus 1.96 (the standardized value from statistical table corresponding
    to 95% confidence) multiplied by the standard error of the residual term calculated
    from the model. This is based on the condition that the error term is normally
    distributed.


    The time series model requires the data to be recorded at frequent time intervals,
    without any interruption in the time step. The time series data is ordered in
    nature as the order determines the implicit time sequence. As a machine learning
    engineer, it is important to create useful features from the data to make the
    right predictions. In a time series model, time is an independent variable. In
    a univariate time series model, you have only one variable. In a causal forecasting
    model, you have a model similar to a regression model. In a univariate time series
    model, the features are autoregressive terms such as lagged terms, moving average
    terms (such as three period or five period moving average), and difference terms.
    The most popular time series forecasting models rely purely on the historical
    values of the target variable. They are exponential smoothing models and ARIMA
    (autoregressive integrated moving average model). If you are going to use the
    above mentioned two models, you must capture the components of a time series in
    the feature engineering step. The following are the components of a time series:


    - **Trend**: It is a sign when the value of the variable increases or decreases
    or remains constant continuously over a couple of time steps in sequence. When
    using time series modelling, the trend is considered as a feature.

    - **Seasonality**: It is a sign of regular patterns evident in a definite interval,
    which is periodic in nature. It keeps repeating with a constant time interval.
    A time series model also takes the seasonal variables in the feature engineering
    step.

    - **Cyclic**: Business cycles usually fluctuate over time. Sometimes it’s higher
    and sometimes it’s lower. The cyclicity is a particular feature that helps in
    predicting the value of the target variable.


    Apart from the time series components, other engineered features also can be introduced
    such as lagged variables; moving average-based variables; dummy variables based
    on events such as holidays and special events; marketing campaigns; and the existence
    of outliers in the data. The explainability and interpretability of a time series
    model is necessary to build trust in the model, to explain the predictions, and
    also to understand the behavior of the models. The time series components and
    features and additional features are important to interpret the behavior of the
    time series model. Figure 6-1 shows what we usually model in a univariate time
    series forecasting model.


    ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig1_HTML.png](images/506619_1_En_6_Chapter/506619_1_En_6_Fig1_HTML.png)


    *Figure 6-1 – What we usually model in a time series forecasting model*


    Let’s look at some use cases where a time series model is applicable and also
    model explainability is required:


    - Data fetched from sensors of IoT devices installed in various places

    - Financial data such as stock prices

    - Economic indicators such as GDP, FII, IIP, inflation, and so on

    - System logs and error logs from machines

    - Demand forecasting in a supply chain industry


    To solve the various use cases, we have a list of algorithms that can generate
    predictions for future. However, the algorithms are not simple to understand.
    There are complex models as well. Not all of the algorithms possess interpretability
    and explainability. But it is important to explain the models to the business
    leaders. The algorithms are as follows:


    - Autoregressive integrated moving average model

    - Generalized autoregressive conditional heteroskedasticity model

    - Baysian probabilistic model

    - Vector autoregressive model

    - Neural network autoregressive model

    - Recurrent neural network model

    - Long short term memory model

    - Gate recurrent unit model'
