    \   decoded = Conv2D(1, (3, 3), activation=None, padding='same')(x)\n    autoencoder\
    \ = Model(x_in, decoded)\n    autoencoder.compile(optimizer='adam', loss='mse')\n\
    \    return autoencoder\n\nae = ae_model()\nae.summary()\nae.fit(x_train, x_train,\
    \ batch_size=128, epochs=4, validation_data=(x_test, x_test), verbose=0)\nae.save('mnist_ae.h5',\
