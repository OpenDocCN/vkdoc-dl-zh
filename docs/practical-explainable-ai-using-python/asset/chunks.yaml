    class as a user-defined function. This `nn_model()` function takes the input and
    applies a rectified linear unit activation function. Then it creates another hidden
    layer with 40 neurons and applies the same activation function and uses the stochastic
    gradient descent as the optimizer and a loss function as the categorical cross
    entropy.


