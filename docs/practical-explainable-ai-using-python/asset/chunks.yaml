- fmt: '# ELI5 Explanation and ML Model


    ELI5 is a Python package that helps debug machine learning classifiers and explain
    their predictions. It provides support for the following machine learning framework
    and package: `scikit-learn`. Currently ELI5 can explain weights and predictions
    of the `scikit-learn` linear classifiers and regressors, print decision trees
    as text or as SVG, show feature importance, and explain predictions of decision
    trees and tree-based ensembles. ELI5 understands text processing utilities from
    `scikit-learn` and can highlight text data accordingly. It also allows you to
    debug `scikit-learn` pipelines which contain `HashingVectorizer` by undoing hashing.


    The weights of features have a bias feature also. This is nothing but the intercept
    term for a linear regression model. The features are listed based on descending
    order of their weight. ELI5 means *explain like I am five*. It supports all of
    the `scikit-learn` algorithms. It also has global interpretation using the `show_weights()`
    function. It also has local interpretation using the `show_prediction()` function.
    In the ELI5 library there is a permutation model. It only works for global interpretation.
    Here is how it works:


    - First, it takes the baseline model from the training dataset and computes the
    error.

    - It shuffles the values of the features, retrains the model, and computes the
    error.

    - It compares the decrease in error after shuffling and before shuffling.


    A feature is considered important if post shuffling the error delta becomes very
    high, and a feature is considered unimportant if post shuffling the error rate
    remain unchanged. The result displays the average importance and standard deviation
    of the features with multiple shuffle steps. It is not a way to look at which
    feature impacts the model performance. It only tells us the magnitude of changes
    in feature weights, so we cannot really consider the weights as feature important
    at a scale. The above process is demonstrated using the following script:


    ```

    !pip install eli5

    import eli5

    eli5.show_weights(new_model,

    feature_names=list(xtrain.columns))

    eli5.explain_weights(new_model, feature_names=list(xtrain.columns))

    eli5.explain_prediction(new_model,xtrain.iloc[60])

    from eli5.sklearn import PermutationImportance

    perm = PermutationImportance(new_model)

    perm.fit(xtest, ytest)

    eli5.show_weights(perm,feature_names=list(xtrain.columns))

    ```


    The explain individual prediction provides a local interpretation of a record.
    Also it tells you the top three features that have higher weights in making the
    prediction. From the permutation importance plot, it is clear that power BHP and
    age are the most important features. This is in line with similar exercises from
    the other XAI Python libraries you implemented so far by taking into consideration
    the `automobile.csv`.


    Now as a next step, let’s look at a linear classification model, which is also
    known as a logistic regression model, to understand various aspects of XAI from
    a logistic regression model. A partial dependency plot depicts the relationship
    between the target feature or dependent variable and a feature known as an independent
    variable. The relationship can be linear, non-linear, curvilinear, or more complex
    like a circular or cyclical monotonic relationship.


    ## Logistic Regression


    The linear regression model is applicable when the target feature is continuous,
    but when the target feature is binary such as 0 or 1, true or false, accept or
    reject, the linear regression model is not applicable. This is because the predicted
    value for the target feature may exceed the range of 0 and 1, but the expectation
    is to limit the output into two classes since you need to predict the two classes
    separately. This is why you need a logistic regression model, which takes the
    binary values to compute the log odds, known as the odds ratio. The odds ratio
    is linearly related to the features. This is why the logistic regression model
    is known as the linear model.


    Logistic regression is typically used when you need to model the probabilities
    when the outcome is binary or multinomial in nature. You cannot apply a linear
    regression model there, because in a logistic regression scenario the outcome
    variable is either 0 or 1 (or at times it can be multinomial as well, where more
    than two outcomes are also possible). If you apply a linear regression there,
    the prediction range could exceed the range of 0 and 1. It won’t provide the probabilities
    for any of the classes. In a multinomial class classification model, class separation
    would be a big challenge. A linear regression model based on an ordinary least
    square method assumes that the relationship between the dependent variable and
    the independent variables is linear; however, the logistic regression model assumes
    the relationship to be logarithmic.


    There are many real-life scenarios where the variable of interest is categorical
    in nature, like buying a product or not, approving a credit card or not, or a
    tumor is cancerous or not. Logistic regression not only predicts a dependent variable
    class but it predicts the probability of a case belonging to a level in the dependent
    variable. The independent variables need not be normally distributed and need
    not have equal variance. Logistic regression belongs to the family of non-linear
    regression. If the dependent variable has two levels, logistic regression can
    be applied, but if it has more than two levels, such as high, medium, and low,
    then multinomial regression model can be applied. The independent variables can
    be continuous, categorical, or nominal.


    The logistic regression model can be explained using the following equation:


    ![$$ Sigmoid\kern0.5em (t)=\frac{1}{1+\mathit{\exp}\left(-t\right)} $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Eque.png)


    The above function is also known as a sigmoid function.


    ![$$ Ln\left(\frac{P}{1-P}\right)={\beta}_0+{\beta}_1{X}_1+{\beta}_2{X}_2+\dots
    +{\beta}_k{X}_k $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equf.png)


    `Ln (P/1-P)` is the log odds of the outcome. The beta coefficients mentioned in
    the above equation explain how the odds of the outcome variable increase or decrease
    for every one unit increased or decreased in the explanatory variable. Figure
    [3-16](#506619_1_En_3_Chapter.xhtml#Fig16) shows the shape of the sigmoid function.
    It looks like an s-shaped curve. The interpretation of a logistic regression model
    is quite different from a linear regression model. The weighted sum from the equation
    on the right-hand side is converted/transformed into a probability value. The
    left-hand side of the equation is called the log odds, as it is the ratio of the
    probability of an event happening to the probability of the event not happening.
    More interpretations about the log odds can be understood by taking into account
    an example which we are going to discuss further.


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig16_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig16_HTML.jpg)


    **Figure 3-16** Logistic/sigmoid function, x-axis shows features, y-axis shows
    probabilities'
