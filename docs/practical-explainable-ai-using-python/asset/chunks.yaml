    ## 结论


    在本章中，你学习了如何使用三个数据集（MNIST 手写数字数据集、CIFAR 数据集和葡萄酒质量数据集）来解释分类模型结果的推理过程。通过使用深度学习模型，完成了训练，并使用
    SHAP 库中的`DeepExplainer`解释了模型预测。`DeepExplainer`的作用是展示图像的正 SHAP 值和负 SHAP 值，以解释分类任务中的任何歧义或重叠。在像葡萄酒质量分类这样的结构化数据问题中，它还能解释哪些特征对预测有正面影响，哪些特征有负面影响。机器学习模型与深度学习模型的区别在于，深度学习中特征选择是自动进行的，并且在训练深度神经网络时存在一个迭代过程。正因如此，向他人解释模型预测变得困难。现在，使用`DeepExplainer`来解释模型预测，任务就简单多了。


    # 10. XAI 模型的反事实解释


    本章将解释如何使用假设分析工具（WIT）来解释 AI 模型中的反事实定义，例如基于机器学习的回归模型、分类模型和多类分类模型。作为数据科学家，你不仅要开发机器学习模型，还要确保你的模型没有偏见，并且对于它未来预测的新观测值所做的决策是公平的。探究这些决策并验证算法公平性非常重要。谷歌开发了假设分析工具来解决机器学习模型中的模型公平性问题。你将看到
    WIT 在三种机器学习模型中的实现：基于回归任务的机器学习、二项分类模型以及多项分类模型。


    ## 什么是 CFE？


    反事实解释（CFE）是机器学习模型预测过程中的因果关系。我将通过一个例子来说明预测或分类。反事实解释是一种创建假设场景并在这些假设场景下生成预测的方法。这对于业务用户、非数据科学家以及没有预测建模背景的普通人来说是可以理解的。有时我们发现输入和输出之间的关系并非因果关系，但我们仍然希望建立因果关系来生成预测。反事实解释是针对预测的局部解释，这意味着它们会为单个预测生成相关的解释。


    ## CFE 的实现


    反事实解释可以针对回归和分类任务生成。你将使用基于 Python 的 Alibi 库。Alibi 适用于 Python 3.6 及以上版本。可以使用以下命令进行安装：


    ```

    !pip install alibi

    !pip install alibi[ray]

    import alibi

    alibi.__version__

    ```


