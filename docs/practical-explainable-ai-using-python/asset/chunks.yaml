    What you can see from the table is that `PowerBhp` is highly positively correlated
    with `Price`, and `EngineCC` is also highly correlated with `Price`. There are
    four categorical variables for which you need to introduce dummy variables in
    order to perform matrix multiplication. You cannot use the string as it is in
    the calculation process. In machine learning, it’s called *one hot encoder* that
    needs to be applied on categorical columns in order to generate flags corresponding
    to each category, so that we can introduce the information to the model. In a
    statistical modelling framework, the same technique is called *dummy variable
    creation*. The variables for which you create dummy variables are `Location`,
    `FuelType`, `Transmission`, and `OwnerType`. The following program does that dummy
    variable calculation:


    ```

    Location_dummy = pd.get_dummies(df.Location,prefix=''Location'',drop_first=True)

    FuelType_dummy = pd.get_dummies(df.FuelType,prefix=''FuelType'',drop_first=True)

    Transmission_dummy = pd.get_dummies(df.Transmission,prefix=''Transmission'',drop_first=True)

    OwnerType_dummy = pd.get_dummies(df.OwnerType,prefix=''OwnerType'',drop_first=True)

    combine_all_dummy = pd.concat([df,Location_dummy,FuelType_dummy,Transmission_dummy,OwnerType_dummy],axis=1)

    combine_all_dummy.head()

    combine_all_dummy.columns

