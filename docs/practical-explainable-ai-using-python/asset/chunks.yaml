    internal_batch_size=100)

    ```


    The integrated gradient module from `alibi.explainers` is imported, a pre-trained
    TensorFlow or Keras model is loaded, and then the gradients are generated. There
    are five different methods of integral approximation, based on the complexity
    of the image classification. There is no direct rule or way to know which methods
    work when, so you need to try all of the methods in an iterative manner.


    ```

