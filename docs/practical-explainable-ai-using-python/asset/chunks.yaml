    ## Conclusion


    In this chapter, you explored counterfactual explanations for regression-related
    problems and classification-related problems. The counterfactual objective is
    to find the similar data point in the training data that produces a different
    prediction than the labelled class. The reasoning in counterfactual explanations
    is if two data points are very similar, then both should have a similar prediction
    or similar outcome. There should not be different output in the target class.
    In the diabetes prediction use case, if two people have similar features, then
    either both of them have no diabetes or both have diabetes. It should not happen
    that one has diabetes and the other has no diabetes. The existence of different
    counterfactual information actually creates confusion from an end user perspective,
    which will lead to lack of trust in AI models. In order to build trust in AI models,
    it is important to generate counterfactual explanations.


    # 11. Contrastive Explanations for Machine Learning


    Contrastive learning is a newer approach to finding similar and dissimilar candidate
    objects in a machine learning pipeline. The contrastive explanation aims to find
    the similarity between two features to help the prediction of a class. Typical
    black box models trained on different types of hyper parameters and a bunch of
    parameters optimized on various epochs and learning rates are very hard to interpret
    and even harder to reason why the model predicted Class A vs. Class B. The need
    to generate more explanations so business users can understand the predictions
    has attracted many developers to create innovative frameworks that can generate
    value. The contrastive explanation focuses on explaining why the model predicted
    Class A and not Class B. The reason finding helps the business user understand
    the behavior of the model. In this chapter, you are going to use the Alibi library
    for an image classification task using a TensorFlow-based framework.


    ## What Is CE for ML?


    In order to understand the contrastive explanation (CE) for machine learning,
    let’s take an example of the loan approval process or credit risk assessment process
    of a bank. No bank will provide a loan to a risky customer. Likewise, no bank
    will refuse to give a loan to a non-risky customer. When a loan application or
    credit application gets rejected, it is not just an arbitrary decision made by
    someone at the bank. Rather, it’s a decision made by an AI model that considers
    numerous features about a person, including financial history and other factors.
    The individual whose loan was denied can wonder what aspect determines his loan
    eligibility, what distinguishes one person from another in terms of loan eligibility,
    and what element is lacking from their profile, among other things. Similarly,
    in identifying objects of interest from multiple other images that are available,
    what makes the object of interest different from the rest of the images? The contrastive
    explanations are the feature differences that distinguish a class from other classes.


    Contrastive explanations are like human conversations that help a human have a
    more engaged conversation. There are two concepts associated with contrastive
    explanations:


    *   Pertinent positives (PP)

    *   Pertinent negatives (PN)


    The PP explanation finds the presence of those features that are necessary for
    the machine learning model to identify the same class as the predicted class.
    As an example, the income and age of a person determine the net worth of the individual.
    You want your ML model to identify a class of high net worth individuals from
    the presence of high income and high age group. This is comparable to the anchors
    explanations of a machine learning model in several ways. PN is the reverse of
    PP; it explains the features that should be absent from the record while maintaining
    the original output class. This is also termed as *counterfactual explanation*
    by some researchers.'
