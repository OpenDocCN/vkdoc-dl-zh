- fmt: '# Trust in ML Model: SHAP


    In order to trust the linear regression-based machine learning model, you need
    to understand the `R square` value derived from the model. The `R square` value
    indicates the goodness of the fit of a regression model, which means the proportion
    of the explained variance in the target variable by all the features together.
    The `R square` value ranges from 0.0-1.0. If the `R square` value is zero, then
    the model shows there is no correlation between the dependent and independent
    variables. If it is 1, then it shows the features are very highly correlated.
    It should be 0.80 or more in order to qualify as a good model on whose predictions
    you can trust. In the above automobile example, the `R square` value is 0.70,
    which is very close to a standard model you can trust. Instead of `R square`,
    it is the adjusted `R square` value that is most referred to as it takes into
    account the number of features used in the model. The `R square` and adjusted
    `R square` relationship is shown below using the formula. In the following formula,
    `N` means the total number of training examples and `p` means the total number
    of features:


    ![$$ Adjusted\kern0.5em {R}^2=1-\frac{\left(1-{R}^2\right)\left(N-1\right)}{N-p-1}
    $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equa.png)


    The `R square` value may increase as you add redundant variables into the model,
    but the adjusted `R square` will remain unchanged. The adjusted `R square` will
    only increase if the feature has any contribution to the overall model explainability.


    In order to generate additional explainability and gain deeper understanding into
    how the model works, you can get help from additional Python-based libraries.
    Shapley values are a widely used approach from cooperative game theory that come
    with desirable properties. You understand from the model coefficients how the
    outcome variable is predicted or estimated to change as you change the input parameters.
    However, it does not tell you which features are important. The value of each
    coefficient is dependent on the scale of the input features. As an example, the
    car age can scale between 0-15 years. However, the `BHP` can range from a 34.20-560.00
    in the above dataset. Hence the magnitude of the model coefficient is not necessarily
    a good measure of feature importance in a linear regression model.


    Some data scientists use the absolute value of t-statistics as a measure of importance
    of features in a linear regression model.


    ![$$ {t}_{{\overset{\frown }{\beta}}_j}=\frac{{\overset{\frown }{\beta}}_j}{SE\left({\overset{\frown
    }{\beta}}_j\right)} $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equb.png)


    One of the ways to understand feature importance is to look at the partial dependency
    plot of the feature against the model output.


    ```

    !pip install shap

    ```


    Once `SHAP` is successfully installed, you can use the library to generate the
    partial dependency plot shown in Figure [3-3](#506619_1_En_3_Chapter.xhtml#Fig3).


    ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig3_HTML.jpg](images/506619_1_En_3_Chapter/506619_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Partial dependency plot


    ```

    import shap

    shap.plots.partial_dependence("Age", new_model.predict,xtrain, ice=False, model_expected_value=True,
    feature_expected_value=True)

    ```


    The dotted horizontal line shows the expected value of the model output when applied
    to the dataset, the vertical dotted line shows the average age value feature,
    and the blue partial dependence plot line, which the is average value of the model
    output when you fix the age feature to a given value, on the graph always passes
    through the intersection of the two gray expected value lines. This intersection
    point can be considered as the “center” of the partial dependence plot with respect
    to the data distribution. The vertical grey boxes on the horizontal axis line
    show that the age distribution is slightly skewed towards the right.


    The main idea behind the Shapley value established model explanations is to use
    an impartial distribution of results from cooperative game theory to allocate
    credit for a model’s output (`x`) among its input features. In order connect game
    theory with machine learning models, it is necessary to both match a model’s input
    features with players in a game and also to match the model function with the
    rules of the game. In game theory, a player has the option to join or not join
    a game, similar to the way a feature can “join” or “not join” a model.


    What is a `SHAP` value and how it is computed? This provides a fair idea about
    the interpretation and meaning of a `SHAP` value. The Shapely value for each feature
    value is computed by the following formula:


    ![$$ {\phi}_i=\sum \limits_{S\subseteq F\backslash \left\{i\right\}}\frac{\mid
    S\mid !\left(|F|-|S|-1\right)!}{\mid F\mid !}\left[{f}_{S\cup \left\{i\right\}}\left({x}_{S\cup
    \left\{i\right\}}\right)-{f}_S\left({x}_S\right)\right] $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equc.png)


    The following points clarify how it works:


    - To compute each feature’s contribution, `SHAP` requires retraining the model
    on all feature subsets `S`.

    - In the above formula, `i` is the individual feature.

    - `F` is the set of all features.

    - `S` is the subset of features from the set `F`.

    - For any feature `I`, two models are created: model 1 with the feature `i` and
    model 2 without feature `i`. Then the difference between the predictions computed.

    - The effect of one feature on the model depends on how the other features in
    the model behave.

    - The differences in prediction are computed for all possible subsets of `S` and
    their average values are taken.

    - The weighted average value of all possible differences is used to populate feature
    importance.


    The most common way to define what it means for a feature to “join” a model is
    to say that a feature has “joined a model” when we know the value of that feature,
    and it has not joined a model when we don’t know the value of that feature. This
    happens when the weight/coefficient of a feature in a model assumes 0.000, then
    we consider that feature has not joined the game. If the coefficient of a feature
    is not equal to 0.000, then we consider that feature as part of the game. Let’s
    look at the `SHAP` values for the linear regression model.


    ```

    # compute the SHAP values for the linear model

    background = shap.maskers.Independent(xtrain, max_samples=2000)

    background

    xtrain.shape

    ```


    This `shap.maskers.Independent` function masks out tabular features by integrating
    over the given background dataset. Here the background dataset has 4,500 records
    from the training dataset, which is the maximum number of samples to use from
