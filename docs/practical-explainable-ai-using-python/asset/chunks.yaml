    \n在本书中，我们将首先介绍模型可解释性和可理解性的基础知识、AI 应用中的伦理考量以及 AI 模型生成预测中的偏差。我们将涵盖 AI 模型在不同用例中生成预测的可靠性。然后，我们将介绍用于解释\
    \ AI 中使用的线性模型（如非线性模型和时间序列模型）的方法和系统。接下来，我们将探索最复杂的集成模型，以及使用 Lime、SHAP、Skater、ELI5\
    \ 等框架进行可解释性和可理解性分析。然后，我们将涵盖非结构化数据和与自然语言处理相关任务的模型可解释性。\n"
- fmt: '# Establishing the Framework


    Tremendous progress has been made in last few years in the area of machine learning
    and deep learning in creating artificial intelligence (AI) solutions across different
    sectors, spanning retail, banking, financial services, insurance, healthcare,
    manufacturing, and Internet of Things-based industries. AI is the core of many
    products and solutions that are coming up with rapid digitalization of various
    business functions. The reason why AI is at the root of these products and solutions
    is that intelligent machines are now powered by learning, reasoning, and adaptation
    capabilities. Experience is scarce. If we can leverage the rich experience gained
    by intelligent people and reflect it using a learning, reasoning layer through
    machines, that can go a long way in bringing a multiplication factor to the learning
    element. By virtue of these capabilities, today’s machine learning and deep learning
    models are able to achieve unprecedented levels of performance in solving complex
    business problems, thereby driving business outcomes.


    If we look at the last two years, there are plenty of AutoML (Automatic Machine
    Learning) tools, frameworks, low code, and no code tools (minimum human intervention),
    which is another level of sophistication that has been achieved by AI-enabled
    systems. This is the epitome of near-zero human intervention required in terms
    of design, delivery, and deployment of solutions. When the decisions are completely
    made by machines and because humans are always at the receiving end, there is
    an urgent need to understand how the machines arrived at those decisions. The
    models that power the AI systems are often referred as black box models. Hence
    there is a need for model explainability and interpretability in order to explain
    the predictions made by the AI models.


    # Artificial Intelligence


    Artificial intelligence refers to the design of a system as a computer program
    that automatically makes decisions on behalf of human beings, with respect to
    some task, without explicitly being programmed. Figure [1-1](#506619_1_En_1_Chapter.xhtml#Fig1)
    explains the relationship between machine learning, deep learning, and artificial
    intelligence.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig1_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig1_HTML.png)


    Figure 1-1


    Relationship Between ML, DL, and AI


    Artificial intelligence is a system designed using a computer program where intelligent
    inferences can be drawn with respect to a problem statement. In the process of
    deriving intelligence we may use machine learning algorithms or deep learning
    algorithms. Machine learning algorithms are simple mathematical functions used
    in the process of optimization using input and output data combinations. Further,
    the functions can be utilized to predict the unknown output using new input. For
    structured data we can use machine learning algorithms, but when the data dimensions
    and volume increases, such as image data, audio data, text and video data, the
    machine learning models fails to perform better, hence a deep learning model is
    required. An expert system is designed as a rule-based system that helps in getting
    inferences. This is required when we do not have enough training data to train
    machine learning models or deep learning models. Overall the construction of an
    artificial intelligence system requires a combination of expert systems, machine
    learning algorithms, and deep learning algorithms to generate inferences.


    Machine learning can be defined as a system where the algorithm learns from examples
    with respect to some task defined earlier, and the learning performance increases
    as we feed more and more data to the system. The tasks can be defined as supervised,
    where the output/outcome is known beforehand; unsupervised, where the output/outcome
    is not known beforehand; and reinforcement, where the actions/outcomes are always
    driven by a feedback layer and the feedback can be a reward or a penalty. So far
    as the learning algorithms are concerned, they can be categorized as linear algorithms,
    deterministic algorithms, additive and multiplicative algorithms, tree-based algorithms,
    ensemble algorithms, and graph-based algorithms. The performance criteria can
    be defined as per the selection of the algorithm. Explaining the decisions of
    an AI model is called explainable AI (XAI).'
  raw: '## Establishing the Framework


    Tremendous progress has been made in last few years in the area of machine learning
    and deep learning in creating artificial intelligence (AI) solutions across different
    sectors, spanning retail, banking, financial services, insurance, healthcare,
    manufacturing, and Internet of Things-based industries. AI is the core of many
    products and solutions that are coming up with rapid digitalization of various
    business functions. The reason why AI is at the root of these products and solutions
    is that intelligent machines are now powered by learning, reasoning, and adaptation
    capabilities. Experience is scarce. If we can leverage the rich experience gained
    by intelligent people and reflect it using a learning, reasoning layer through
    machines, that can go a long way in bringing a multiplication factor to the learning
    element. By virtue of these capabilities, today’s machine learning and deep learning
    models are able to achieve unprecedented levels of performance in solving complex
    business problems, thereby driving business outcomes.


    If we look at the last two years, there are plenty of AutoML (Automatic Machine
    Learning) tools, frameworks, low code, and no code tools (minimum human intervention),
    which is another level of sophistication that has been achieved by AI-enabled
    systems. This is the epitome of near-zero human intervention required in terms
    of design, delivery, and deployment of solutions. When the decisions are completely
    made by machines and because humans are always at the receiving end, there is
    an urgent need to understand how the machines arrived at those decisions. The
    models that power the AI systems are often referred as black box models. Hence
    there is a need for model explainability and interpretability in order to explain
    the predictions made by the AI models.


    ## Artificial Intelligence


    Artificial intelligence refers to the design of a system as a computer program
    that automatically makes decisions on behalf of human beings, with respect to
    some task, without explicitly being programmed. Figure [1-1](#506619_1_En_1_Chapter.xhtml#Fig1)
    explains the relationship between machine learning, deep learning, and artificial
    intelligence.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig1_HTML.png](images/506619_1_En_1_Chapter/506619_1_En_1_Fig1_HTML.png)


    Figure 1-1


    Relationship Between ML, DL, and AI


    Artificial intelligence is a system designed using a computer program where intelligent
    inferences can be drawn with respect to a problem statement. In the process of
    deriving intelligence we may use machine learning algorithms or deep learning
    algorithms. Machine learning algorithms are simple mathematical functions used
    in the process of optimization using input and output data combinations. Further,
    the functions can be utilized to predict the unknown output using new input. For
    structured data we can use machine learning algorithms, but when the data dimensions
    and volume increases, such as image data, audio data, text and video data, the
    machine learning models fails to perform better, hence a deep learning model is
    required. An expert system is designed as a rule-based system that helps in getting
    inferences. This is required when we do not have enough training data to train
    machine learning models or deep learning models. Overall the construction of an
    artificial intelligence system requires a combination of expert systems, machine
    learning algorithms, and deep learning algorithms to generate inferences.


    Machine learning can be defined as a system where the algorithm learns from examples
    with respect to some task defined earlier, and the learning performance increases
    as we feed more and more data to the system. The tasks can be defined as supervised,
    where the output/outcome is known beforehand; unsupervised, where the output/outcome
    is not known beforehand; and reinforcement, where the actions/outcomes are always
    driven by a feedback layer and the feedback can be a reward or a penalty. So far
    as the learning algorithms are concerned, they can be categorized as linear algorithms,
    deterministic algorithms, additive and multiplicative algorithms, tree-based algorithms,
    ensemble algorithms, and graph-based algorithms. The performance criteria can
    be defined as per the selection of the algorithm. Explaining the decisions of
    an AI model is called explainable AI (XAI) .'
  trans: '

    # 建立框架


    近年来，机器学习与深度学习领域在构建人工智能解决方案方面取得了巨大进展，这些方案横跨零售、银行、金融服务、保险、医疗、制造业以及基于物联网的行业。人工智能是众多产品与解决方案的核心，这些产品正随着各类业务功能的快速数字化而不断涌现。人工智能之所以能成为这些产品与解决方案的根基，是因为智能机器如今已具备学习、推理和自适应能力。经验是稀缺的。如果我们能利用聪明人积累的丰富经验，并通过机器的学习与推理层将其反映出来，就能极大地放大学习要素的倍增效应。凭借这些能力，当今的机器学习和深度学习模型在解决复杂业务问题方面能够达到前所未有的性能水平，从而推动业务成果的实现。


    回顾过去两年，市场上涌现了大量 AutoML（自动机器学习）工具、框架、低代码和无代码工具（只需最少的人工干预），这是人工智能系统实现的又一层次精妙之处。这标志着在解决方案的设计、交付和部署方面，几乎实现了零人工干预的极致。当决策完全由机器做出，而人类始终处于被动接收端时，我们迫切需要理解机器是如何得出这些决策的。为人工智能系统提供动力的模型通常被称为黑盒模型。因此，为了解释人工智能模型做出的预测，我们需要模型的可解释性与可理解性。


    # 人工智能


    人工智能是指将系统设计为一个计算机程序，该程序能在无需显式编程的情况下，代表人类针对特定任务自动做出决策。图 1-1 解释了机器学习、深度学习与人工智能之间的关系。


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig1_HTML.png](img/506619_1_En_1_Fig1_HTML.png)


    图 1-1


    机器学习、深度学习与人工智能之间的关系


    人工智能是一个利用计算机程序设计的系统，能够针对问题陈述得出智能推论。在获取智能的过程中，我们可能会使用机器学习算法或深度学习算法。机器学习算法是简单的数学函数，用于利用输入和输出数据的组合进行优化。此外，这些函数可用于利用新的输入来预测未知的输出。对于结构化数据，我们可以使用机器学习算法；但当数据维度和规模增加时，例如图像数据、音频数据、文本数据和视频数据，机器学习模型的表现会变差，因此需要深度学习模型。专家系统被设计为基于规则的系统，有助于获取推论。当我们没有足够的训练数据来训练机器学习模型或深度学习模型时，就需要用到它。总体而言，构建人工智能系统需要结合专家系统、机器学习算法和深度学习算法来生成推论。


    机器学习可以定义为一个系统，其中算法根据先前定义的某个任务从示例中学习，并且随着我们向系统输入越来越多的数据，学习性能会不断提高。任务可以定义为监督学习（输出/结果事先已知）、无监督学习（输出/结果事先未知）以及强化学习（行动/结果始终由反馈层驱动，反馈可以是奖励或惩罚）。就学习算法而言，它们可以分为线性算法、确定性算法、加法和乘法算法、基于树的算法、集成算法以及基于图的算法。性能标准可根据所选算法来定义。解释人工智能模型的决策被称为可解释人工智能（XAI）。

    '
- fmt: '### Need for XAI


    Let’s have a look at the reason for calling the AI models as black box models.
    Figure [1-2](#506619_1_En_1_Chapter.xhtml#Fig2) explains the classical modelling
    scenario where the set of independent variables is passed through the function,
    which is predetermined to produce the output. The output produced is compared
    with the true output in order to make an assessment of whether the function fits
    the data or not. If the function does not fit well, then we must either transform
    the data or consider using another function so that it can fit to the data, but
    the experiment is quite manual and every time there is a data refresh, there is
    a need for statisticians or modelers to recalibrate the models and again see if
    the data fits the model. This is why the classical way of predictive model generation
    for inference processing has human dependency and is always subject to more than
    one interpretation. At times it is difficult for the stakeholders to trust the
    model as all variants proposed by many experts may sound good in a sense, but
    there is no generalization. Hence the classic system of model development as shown
    in Figure [1-2](#506619_1_En_1_Chapter.xhtml#Fig2) is difficult to implement in
    the world of artificial intelligence systems, where every moment data is on the
    run. It keeps on changing. Human dependency on calibration is a bottleneck; hence
    there is a need for a modern system of inference generation dynamically using
    dynamic algorithms.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig2_HTML.jpg](images/506619_1_En_1_Chapter/506619_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    The classic model training system


    Figure [1-2](#506619_1_En_1_Chapter.xhtml#Fig2) shows the classic model development
    scenario, where the model can be captured through an equation and that equation
    is easy to interpret and simple to explain to anyone, but the existence of formula-based
    interpretation is changing in the AI world. Figure [1-3](#506619_1_En_1_Chapter.xhtml#Fig3)
    shows the structure of exploring the best possible functions that produce the
    output using the input. Here there is no constraint to limit the model to a particular
    function like linear or non-linear. In this structure, the learning happens through
    many iterations and using a cross validation approach the best model gets identified.
    The challenge with AI models is interpretability and explainability as many algorithms
    are complex and so it’s not easy to explain the predictions to everyone.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig3_HTML.jpg](images/506619_1_En_1_Chapter/506619_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    AI model training process


    With the advancement of computer programs and algorithms, it became very difficult
    for developers to search for different kinds of functions such as linear and non-linear,
    and the evaluation of such functions also became extremely difficult. ML or DL
    models take care of the search for appropriate functions that fit the training
    data well. Figure [1-3](#506619_1_En_1_Chapter.xhtml#Fig3) explains that the machine
    identifies the final model that provides better performance not only in terms
    of accuracy but also stability and reliability in generating predictions. When
    the functional relationship between input and output is clearly defined, there
    is less ambiguity and the predictions are transparent. However, when our AI models
    make a selection of a complex functional relationship, it is very hard to understand
    as an end user. Hence the AI models are considered as black box. In this book,
    we want to make the black box model interpretable so that AI solutions will become
    increasingly deployable and adaptable.


    The day-to-day execution of AI models for decisioning requires transparency, unbiasedness,
    and ethics. There are various scenarios where it currently lacks explainability:


    - Someone applies for a credit card and the AI model rejects the credit card application.
    It is important to convey why the application was rejected and what corrective
    actions the applicant may take to amend their behavior.

    - In a medical diagnosis based on life style and vital parameters, the AI model
    predicts whether the person will have diabetes of not. Here, if the AI model predicts
    that the person might develop diabetes, then it has to also convey why and what
    the drivers are for getting the disease in future.

    - Autonomous vehicles identify objects found on the road and make clear decisions.
    They also need a clear explanation of why they make these decisions.


    There are numerous other use cases where the explanations supporting the output
    of a model are crucial. It is a human tendency not to adopt something that they
    cannot interpret or understand. Thereby it reduces their trust factor in believing
    the predictions of AI model. We are using AI models in order to remove biasness
    from human decision making; however, the decisions will be dangerous if the outcome
    is not justifiable, legitimate, and transparent. On the other hand, one may argue
    that if we cannot interpret and explain the decisions of AI models, then why use
    them. The reasons are model accuracy and performance. There is always going to
    be a trade-off between the performance of a model and the explainability of a
    model. Figure [1-4](#506619_1_En_1_Chapter.xhtml#Fig4) explains the trade-off
    between the two.


    ![../images/506619_1_En_1_Chapter/506619_1_En_1_Fig4_HTML.jpg](images/506619_1_En_1_Chapter/506619_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Tradeoff between model explainability and performance (accuracy)


    In Figure [1-4](#506619_1_En_1_Chapter.xhtml#Fig4), the horizontal axis explains
    the performance or accuracy of the models and the vertical axis shows the model
    interpretation and explanation. A rule-based system is placed at a position where
    the performance is not optimal; however, the interpretability is good. In contrast,
    the deep learning-based models provide superior performance and good accuracy
    at the cost of less interpretability and explainability.'
