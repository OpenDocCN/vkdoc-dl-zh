  \ 展示了第 60 条记录的解释。\n\n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig9_HTML.jpg](img/506619_1_En_6_Fig9_HTML.jpg)\n\
  \n**图 6-9** 第 60 条记录的 LIME 解释\n\n预测值为 35.77，下限阈值和上限阈值反映了预测结果的置信区间。对预测结果产生正面和负面影响的因子如图\
  \ 6-9 所示。滞后 1 是一个非常重要的特征；第二重要的特征是滞后 2，然后是滞后 5、滞后 3、滞后 6，依此类推。作为特征的滞后值及其对预测值的贡献如图\
