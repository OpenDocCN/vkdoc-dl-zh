  以下神经网络模型函数将四个特征作为输入，并使用 Keras 的密集函数通过全连接网络训练模型。你使用分类交叉熵作为损失函数，随机梯度下降作为优化器。训练模型的批量大小为
  16，迭代 500 轮。需要训练的参数数量非常少。


