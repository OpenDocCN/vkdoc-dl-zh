  ## 结论


  本章涵盖了用于分类和回归场景的几种基于提升的模型。类似地，装袋分类器也可以进行训练，并生成类似的输出图表。图表本身不会改变，但随着你从一个模型切换到另一个模型，对数值的解释会发生变化。以下是需要重点关注的五点：


  - 在回归场景中，你预测目标列，并根据特征贡献观察预测结果是上升还是下降。因此，如果你改变一个输入特征，就能轻松理解对目标输出的影响。

  - 在分类场景中，你将对数几率比作为连续变量进行预测，并根据特征输入值预测结果。你知道哪些特征重要，因此能够清晰地看到基于输入特征变化的预测结果。

  - 无论是装袋、提升还是堆叠，都可以生成类似的偏依赖图（PDP）、力图和汇总图框架，以理解模型的决策过程。然而，以偏依赖图为例，其展示的模式会发生变化。

  - 图表模式发生变化，是因为模型试图捕捉数据中可能存在的复杂模式。随着数据复杂性的增加，模型变得更加复杂，从视觉上看可能难以解释。然而，从数值中得出的推论将保持不变。

  - 因此，基于本章的分析，你涵盖了多少个集成模型并不重要。更重要的是建立一个可以应用于其他集成模型的框架。


  '
- "# 6. 时间序列模型的可解释性\n\n时间序列模型是一种沿未来时间段生成多步预测的方法。存在统计模型和基于机器学习的模型，可以利用历史数据对未来进行预测。模型预测是否可信？人们对预测结果能有多大程度的信心？可解释的模型和不可解释的模型是本章将要探讨的内容。\n\
  \n## 时间序列模型\n\n时间序列模型的主要目标是利用时间作为自变量来估计目标变量的值。目标变量可以是股票价格、产品单位数量、流入公司账户的收入金额，也可以是特定网站的独立访客数量。预测值是多步的，因为使用时间序列模型时，我们通常预测多个时间步长。时间序列模型生成预测值，这些预测值具有一定的置信水平。置信水平越高，模型越好；置信水平较低时，模型在生成预测值方面缺乏稳定性。置信区间可以计算为预测值加减\
  \ 1.96（统计表中对应 95% 置信度的标准化值）乘以模型计算出的残差项的标准误差。这基于误差项呈正态分布的条件。\n\n时间序列模型要求数据以频繁的时间间隔记录，且时间步长不能中断。时间序列数据本质上是有序的，因为顺序决定了隐含的时间序列。作为机器学习工程师，从数据中创建有用的特征以做出正确预测至关重要。在时间序列模型中，时间是自变量。在单变量时间序列模型中，你只有一个变量。在因果预测模型中，你有一个类似于回归模型的模型。在单变量时间序列模型中，特征是自回归项，如滞后项、移动平均项（例如三期或五期移动平均）和差分项。最流行的时间序列预测模型纯粹依赖于目标变量的历史值。它们是指数平滑模型和\
  \ ARIMA（自回归积分滑动平均模型）。如果你打算使用上述两种模型，必须在特征工程步骤中捕捉时间序列的组成部分。以下是时间序列的组成部分：\n\n- **趋势**：当变量的值在连续几个时间步长内持续增加、减少或保持不变时，这是一个信号。在使用时间序列建模时，趋势被视为一个特征。\n\
  - **季节性**：这是在特定时间间隔内显现的规律性模式的信号，具有周期性。它以恒定的时间间隔不断重复。时间序列模型在特征工程步骤中也会考虑季节性变量。\n-\
  \ **周期性**：商业周期通常会随时间波动。有时较高，有时较低。周期性是一个特定特征，有助于预测目标变量的值。\n\n除了时间序列组成部分，还可以引入其他工程特征，例如滞后变量；基于移动平均的变量；基于事件（如节假日和特殊事件）的虚拟变量；营销活动；以及数据中异常值的存在。时间序列模型的可解释性和可说明性对于建立对模型的信任、解释预测结果以及理解模型行为至关重要。时间序列组成部分、特征以及附加特征对于解释时间序列模型的行为非常重要。图\
  \ 6-1 展示了我们在单变量时间序列预测模型中通常建模的内容。\n\n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig1_HTML.png](img/506619_1_En_6_Fig1_HTML.png)\n\
  \n*图 6-1 – 我们在时间序列预测模型中通常建模的内容*\n\n让我们看一些适用时间序列模型且需要模型可解释性的用例：\n\n- 从安装在各地的物联网设备传感器获取的数据\n\
  - 金融数据，如股票价格\n- 经济指标，如 GDP、FII、IIP、通货膨胀等\n- 来自机器的系统日志和错误日志\n- 供应链行业的需求预测\n\n为了解决各种用例，我们有一系列可以生成未来预测的算法。然而，这些算法并不容易理解。也存在复杂的模型。并非所有算法都具有可解释性和可说明性。但向业务领导者解释模型非常重要。算法如下：\n\
  \n- 自回归积分滑动平均模型\n- 广义自回归条件异方差模型\n- 贝叶斯概率模型\n- 向量自回归模型\n- 神经网络自回归模型\n- 循环神经网络模型\n\
  - 长短期记忆模型\n- 门控循环单元模型\n\n\n\n### 判断模型优劣\n\n在将时间序列模型投入生产场景之前，需要使用指标和其他诊断方法对其进行评估。\n\
  \n指标：\n\n- **均方根误差（RMSE）**：这是一个尺度相关函数。该值越小，模型性能越好。\n- **平均绝对百分比误差（MAPE）**：该指标与尺度无关。根据行业基准，该值最好低于\
  \ 10%。\n\n在拟合预测模型后，了解这些指标对于判断模型对数据的拟合程度至关重要。时间序列模型的一个特定概念是白噪声，即模型无法解释的误差。如果满足以下特性，则误差可被视为白噪声：\n\
  \n- 残差项不相关，即由`ACF`值表示的自相关函数为 0。\n- 残差服从正态分布。\n\n如果上述两个条件不满足，则模型仍有改进空间。\n\n## 预测策略\n\
  \n如果业务需求是在上层层级生成预测，并且有粒度数据可用，则有两种生成预测的方式：\n\n- 宏观层面，使用上层层级（例如：对服装类别的销量预测属于宏观层面，而对每个库存单位（SKU）的预测属于微观层面）\n\
  - 微观层面，然后使用尽可能低的粒度进行聚合\n\n## 预测的置信区间\n\n并非所有时间序列模型都能为预测值提供置信区间。预测值的置信区间提供了有意义的洞察。置信区间越高，模型性能越好。如果模型与置信区间不一致，可能会出现两种情况：\n\
  \n- **黑天鹅事件**：实际值显著突破预测值的置信区间，造成严重破坏。\n- **灰天鹅事件**：实际值低于预测值的置信区间，可能导致次优结果。\n\n在图\
  \ 6-2 中，显示了每日销售额，并使用历史数据来预测未来的预测值。虚线表示模型生成的预测值，两条平行的黑线表示预测值的置信区间，置信区间在上线处有上限阈值，在下线处有下限阈值。如果预测值超过上限阈值（如\
  \ A 点），则称为黑天鹅事件；如果预测值超过下限阈值（如 B 点），则称为灰天鹅事件。\n\n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig2_HTML.jpg](img/506619_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\n黑天鹅与灰天鹅事件\n\n## 信任何去何从？\n\nXAI 的目标是向最终用户解释他们是否应该相信预测，或者决定选择更值得信赖的竞争模型。上述两种情况，即黑天鹅和灰天鹅事件，极难预测。如果它们发生一两次，还可以接受。如果模型频繁无法识别此类情况，用户将对该模型失去信心或信任。控制此类事件的方法之一是在更高的阈值（例如\
  \ 90%的置信限）下生成置信区间。其他情况则需要使用模型参数进行解释。\n\n该数据集包含某个产品的日期戳和价格。这被视为一个单变量时间序列模型。你需要生成未来的预测值。\n\
  \n```python\nimport pandas as pd\nimport numpy as np\nimport matplotlib.pyplot as\
  \ plt\n%matplotlib inline\ndf = pd.read_csv('/Users/pradmishra/Downloads/XAI Book\
  \ Apress/monthly_csv.csv',index_col=0)\ndf\n# 时间序列的折线图\n# 数据集的折线图\ndf.plot()\n```\n\
  \n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig3_HTML.jpg](img/506619_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n价格随时间变化\n\n在图 6-3 中，数据集中的数据显示了价格的变化，存在趋势，并且在 2016 年底有一定程度的跳跃。该时间序列模型存在一定程度的季节性。季节性意味着价格会在特定时间段内出现相同的值，并且会重复出现此类事件。如果出现多次，则可以确认数据中存在季节性。为了将季节性纳入预测值，你可以将时间序列模型扩展为季节性调整模型变体。但是，如果你想从预测值中消除季节性因素的影响，则需要使用差分法对时间序列进行调整。差分是时间序列减去其自身过去一个周期的值。季节性调整后的数据可以单独存储。\n\
  \n```python\n# 季节性差分\ndifferenced = df.diff(12)\n# 修剪掉第一年的空数据\ndifferenced = differenced[12:]\n\
  # 保存差分后的数据集到文件\ndifferenced.to_csv('seasonally_adjusted.csv', index=False)\n# 绘制差分后的数据集\n\
  differenced.plot()\nplt.show()\n```\n\n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig4_HTML.jpg](img/506619_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n\n季节性差分后的时间序列数据\n\n在图 6-4 中，展示了相同的季节性调整后的时间序列。自回归积分滑动平均模型（ARIMA）在业界使用最为频繁。它们解释了数据中的自相关性。平稳时间序列可以定义为其值不依赖于实际发生时间的时间序列。任何具有趋势和季节性的时间序列都是非平稳的。然而，具有周期性的时间序列本质上是平稳的。使时间序列平稳的方法之一是应用差分法，因为平稳性是\
  \ ARIMA 模型的假设之一。差分有助于减少数据中的趋势和季节性，从而使其平稳。自相关函数（ACF）是识别平稳性的方法之一；`ACF`会迅速下降到零。然而，对于非平稳时间序列，相关值仍然相当高，并且相关值的衰减也非常不明显。\n\
  \n```python\nfrom statsmodels.graphics.tsaplots import plot_acf\nplot_acf(df)\n\
  plt.show()\n```\n\n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig5_HTML.jpg](img/506619_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n\n价格的自相关函数\n\n\n\n在`Figure 6-5`中，自相关函数的模式表明该序列是非平稳的，因为直到 30 阶滞后的相关系数都超过\
  \ 0.80。阴影区域显示了相关系数值的置信水平。由于相关系数在 30 阶滞后内不为零，该序列本质上高度非平稳。由于已知序列非平稳，因此无法应用标准`ARIMA`模型。\n\
  \n有一种替代方法可以将问题转化为自回归监督机器学习问题，以了解任何滞后是否对预测值有影响。因此，创建 12 个滞后值作为独立特征，以预测实际价格序列作为因变量。\n\
  \n```python\n# reframe as supervised learning\ndataframe = pd.DataFrame()\nfor i\
  \ in range(12,0,-1):\n    dataframe['t-'+str(i)] = df.shift(i).values[:,0]\ndataframe['t']\
  \ = df.values[:,0]\nprint(dataframe.head(13))\ndataframe = dataframe[13:]\n# save\
  \ to new file\ndataframe.to_csv('lags_12months_features.csv', index=False)\n```\n\
  \n在上述脚本中，计算了滞后值。在`Figure 6-6`中，可以看到以表格形式呈现的滞后值。\n\n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig6_HTML.jpg](img/506619_1_En_6_Fig6_HTML.jpg)\n\
  \n**Figure 6-6**  \n为模型开发创建滞后变量后的处理数据\n\n这 12 个滞后值是特征，可以使用随机森林回归器对特征进行不同组合，以构建决策树，并通过取所有树预测值的平均值来集成模型预测。通过这种方式，可以识别哪个特征更重要。\n\
  \n```python\n# split into input and output\ndf = pd.read_csv('lags_12months_features.csv')\n\
  data = df.values\nX = data[:,0:-1]\ny = data[:,-1]\nfrom sklearn.ensemble import\
  \ RandomForestRegressor\n# fit random forest model\nmodel = RandomForestRegressor(n_estimators=500,\
  \ random_state=1)\nmodel.fit(X, y)\n# show importance scores\nprint(model.feature_importances_)\n\
  # plot importance scores\nnames = dataframe.columns.values[0:-1]\nticks = [i for\
  \ i in range(len(names))]\nplt.bar(ticks, model.feature_importances_)\nplt.xticks(ticks,\
  \ names)\nplt.show()\n```\n\n考虑了 500 棵决策树，并使用这些特征训练了一个随机森林回归模型。`Figure 6-7`估计了特征重要性。\n\
  \n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig7_HTML.jpg](img/506619_1_En_6_Fig7_HTML.jpg)\n\
  \n**Figure 6-7**  \n随机森林模型的特征重要性\n\n在`Figure 6-7`中，可以看到滞后 1（`t-1`）是最重要的特征，滞后 2（`t-2`）是第二重要的特征，滞后\
  \ 7（`t-7`）是第三重要的特征，其次是滞后 3 和滞后 4，分别由`t-3`和`t-4`表示。其他特征对模型来说不太重要。\n\n```python\n\
  from sklearn.feature_selection import RFE\n# perform feature selection\nrfe = RFE(RandomForestRegressor(n_estimators=500,\
  \ random_state=1), n_features_to_select=4)\nfit = rfe.fit(X, y)\n# report selected\
  \ features\nprint('Selected Features:')\nnames = dataframe.columns.values[0:-1]\n\
  for i in range(len(fit.support_)):\n    if fit.support_[i]:\n        print(names[i])\n\
  # plot feature rank\nnames = dataframe.columns.values[0:-1]\nticks = [i for i in\
  \ range(len(names))]\nplt.bar(ticks, fit.ranking_)\nplt.xticks(ticks, names)\nplt.show()\n\
  ```\n\n![../images/506619_1_En_6_Chapter/506619_1_En_6_Fig8_HTML.jpg](img/506619_1_En_6_Fig8_HTML.jpg)\n\
  \n**Figure 6-8**  \n来自`RFE`算法的特征重要性\n\n递归特征消除（`RFE`）是一种流行的算法，用于在监督学习环境中从特征列表中移除冗余特征（`Figure\
  \ 6-8`）。配置`RFE`有两种不同的选项：要么选择特征的数量，要么选择用于选择特征的算法。`RFE`在监督回归模型或分类模型之上充当包装算法。这意味着需要一个模型，然后在其上应用`RFE`。在上述脚本中，在随机森林回归模型之上使用了`RFE`。选择的最重要特征是滞后\
  \ 7、3、2 和 1。其余八个特征未被算法选中。因此，连续且一致的滞后对目标特征没有影响；然而，选中的特征对预测结果有影响。如本章前面所述，时间序列模型的特征仅是滞后变量和移动平均变量。这就是为什么如果仅使用滞后项，时间序列对象可以建模为`AR`；如果仅使用移动平均项作为特征，则可以建模为`MA`。自回归意味着滞后值可以用作特征来预测实际时间序列。\n\
  \n```python\n# AR example\nfrom statsmodels.tsa.ar_model import AutoReg\nfrom random\
  \ import random\n# fit model\nmodel = AutoReg(y, lags=1)\nmodel_fit = model.fit()\n\
  model_fit.summary()\n```\n\n前面的脚本显示，如果仅使用滞后 1 来预测当前时间段，则称为`AR(1)`模型。这类似于线性回归。参见`Table\
  \ 6-1`。\n\n**Table 6-1**  \n自回归模型结果\n\n| ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figa_HTML.jpg](img/506619_1_En_6_Figa_HTML.jpg)\
  \ |\n\n可以将方程写为：\n\n`Yt = 0.5136 + 1.0039 * Yt-1`\n\n系数`1.0039`的`p`值为`0.000`，小于`0.05`。这意味着在\
  \ 95%的置信水平和 5%的统计显著性水平下，一阶滞后项足够显著，能够影响实际时间序列`Yt`。这可以解释为：*如果滞后项变化 1 个单位，序列的实际值预计变化\
  \ 0.39%*。\n\n```python\n# AR example\nfrom statsmodels.tsa.ar_model import AutoReg\n\
  from random import random\n# fit model\nmodel = AutoReg(y, lags=2)\nmodel_fit =\
  \ model.fit()\nmodel_fit.summary()\n```\n\n类似的分析可以通过考虑两个滞后项进行，方程变为：\n\n`Yt = 0.6333\
  \ + 1.2182 * Yt-1 – 0.2156 * Yt-2`\n\n系数`1.2182`和`0.2156`的`p`值为`0.000`，小于`0.05`，这意味着\
  \ 95%的置信水平和 5%的统计显著性水平。对于一阶和二阶滞后项，这足够显著，能够影响实际时间序列`Yt`。这可以解释为：*如果滞后项变化一个单位，序列的实际值预计变化\
  \ 0.22%*。滞后 2 的系数可以解释为：*如果滞后 2 变化一个单位，序列`Yt`将减少 0.2156 倍*。参见`Table 6-2`。\n\n**Table\
  \ 6-2**  \n包含两个滞后项的自回归模型结果\n\n| ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figb_HTML.jpg](img/506619_1_En_6_Figb_HTML.jpg)\
  \ |\n\n```python\n# AR example\nfrom statsmodels.tsa.ar_model import AutoReg\nfrom\
  \ random import random\n# fit model\nmodel = AutoReg(y, lags=12)\nmodel_fit = model.fit()\n\
  model_fit.summary()\n```\n\n与上述两个滞后项的情况类似，可以将模型扩展到 12 个滞后项的场景，并进行类似的解释。参见`Tables\
  \ 6-3`和`6-4`。\n\n**Table 6-5**  \n季节性`ARIMA`模型结果\n\n| ![../images/506619_1_En_6_Chapter/506619_1_En_6_Fige_HTML.jpg](img/506619_1_En_6_Fige_HTML.jpg)\
  \ |\n\n**Table 6-4**  \n上述模型的系数表\n\n\n\n| ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figd_HTML.jpg](img/506619_1_En_6_Figd_HTML.jpg)\
  \ |\n\n**表 6-3** 包含 12 个滞后变量的自回归模型结果\n\n| ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figc_HTML.jpg](img/506619_1_En_6_Figc_HTML.jpg)\
  \ |\n\n在选择 ARIMA 模型时，你需要定义模型的阶数。在以下脚本中，你将阶数定义为 `(0,0,1)`，即 `(p,d,q)`，其中 `p` 代表自回归项，`d`\
  \ 代表差分阶数，`q` 代表移动平均项。因此，阶数 `0, 0, 和 1` 表示仅包含移动平均模型。\n\n```\n# MA example\nfrom statsmodels.tsa.arima.model\
  \ import ARIMA\nfrom random import random\n# fit model\nmodel = ARIMA(y, order=(0,\
  \ 0, 1))\nmodel_fit = model.fit()\n# make prediction\nyhat = model_fit.predict(len(y),\
  \ len(y))\nprint(yhat)\nmodel_fit.summary()\n```\n\n以下脚本展示了阶数为 `2, 0 和 1` 的 ARIMA\
  \ 模型，即包含 2 个滞后自回归项、0 次差分和 1 个移动平均项：\n\n```\n# ARMA example\nfrom statsmodels.tsa.arima.model\
  \ import ARIMA\nfrom random import random\n# fit model\nmodel = ARIMA(y, order=(2,\
  \ 0, 1))\nmodel_fit = model.fit()\n# make prediction\nyhat = model_fit.predict(len(y),\
  \ len(y))\nprint(yhat)\nmodel_fit.summary()\n```\n\n所有模型的结果摘要都可以用与你之前类似的方式进行解读。如果你想在\
  \ ARIMA 模型中引入季节性成分，它就变成了 SARIMA 模型。季节性阶数也可以根据表 6-7 来定义。\n\n**表 6-7** SARIMA 模型参数说明\n\
  \n| 参数 | 说明 |\n| --- | --- |\n| `Endog` | 观测到的时间序列过程 `y` |\n| `Order` | 模型的 `(p,d,q)`\
  \ 阶数，分别对应 AR 参数数量、差分阶数和 MA 参数数量 |\n| `seasonal_order` | 模型季节性成分的 `(p,d,q)` 阶数，分别对应\
  \ AR 参数、差分阶数、MA 参数和周期 |\n| `Trend` | 控制确定性趋势多项式 `A(t)` 的参数。 |\n| `enforce_stationarity`\
  \ | 是否转换 AR 参数以强制模型的自回归分量满足平稳性。默认值为 `True`。 |\n\n**表 6-6** SARIMAX 模型结果\n\n| ![../images/506619_1_En_6_Chapter/506619_1_En_6_Figf_HTML.jpg](img/506619_1_En_6_Figf_HTML.jpg)\
  \ |\n\n```\n# ARMA example\nfrom statsmodels.tsa.arima.model import ARIMA\nfrom\
  \ random import random\n# fit model\nmodel = ARIMA(y, order=(2, 1, 1))\nmodel_fit\
  \ = model.fit()\n# make prediction\nyhat = model_fit.predict(len(y), len(y))\nprint(yhat)\n\
  model_fit.summary()\n# SARIMA example\nfrom statsmodels.tsa.statespace.sarimax import\
  \ SARIMAX\nfrom random import random\n# fit model\nmodel = SARIMAX(y, order=(1,\
  \ 1, 1), seasonal_order=(0, 0, 0, 0))\nmodel_fit = model.fit(disp=False)\n# make\
  \ prediction\nyhat = model_fit.predict(len(y), len(y))\nprint(yhat)\nmodel_fit.summary()\n\
  ```\n\n**表 6-8** SARIMA 模型结果\n\n![../images/506619_1_En_6_Chapter/506619_1_En_6_Figg_HTML.jpg](img/506619_1_En_6_Figg_HTML.jpg)\n\
  \n表 6-8 中系数的 p 值均小于 0.05，因此在 5% 的显著性水平下具有统计显著性。上述模型输出的摘要主要使用 OLS 作为度量技术，而 OLS 方法与多元线性回归模型非常相似。因此，可以轻松地对模型系数、其相关性及含义进行解读。\n\
  \n## 时间序列：LIME\n\n使用 LIME 可解释性库，你可以将 12 个滞后变量作为特征，训练一个回归模型并解释预测结果，如下所示。第一步，如果你尚未安装\
  \ LIME 库，需要先进行安装：\n\n```\n!pip install Lime\nimport lime\nimport lime.lime_tabular\n\
  explainer = lime.lime_tabular.LimeTabularExplainer(np.array(X),\nmode='regression',\n\
  feature_names=X.columns,\nclass_names=['t'],\nverbose=True)\nexplainer.feature_frequencies\n\
