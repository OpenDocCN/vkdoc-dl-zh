- "# 12. 通过识别预测不变性实现模型无关解释\n\n从数学领域借用的不变性术语解释：如果对解释变量进行干预，机器学习模型生成的预测保持不变，前提是该模型是通过正式的因果关系生成的。因果机器学习模型与非因果机器学习模型之间存在差异。因果模型展示了响应变量与解释变量之间真实的因果关系。非因果模型展示的是偶然关系；预测结果会多次改变。理解因果模型与非因果模型之间差异的唯一途径是通过解释。在本章中，你将使用一个名为\
  \ Alibi 的 Python 库来生成模型无关的解释。\n\n## 什么是模型无关？\n\n术语*模型无关*意味着模型独立性。对机器学习模型的解释，无论模型类型如何都有效，被称为模型无关。当我们解释机器学习模型的内在行为时，我们通常不会假设该行为具有任何由机器学习模型本身展示的底层结构。在本章中，你将使用模型无关的解释来描述预测不变性。从人类理解的角度来看，机器学习模型如何工作一直是一个挑战。人们总是对机器学习模型的行为感到好奇并提出问题。为了理解模型无关的行为，人类总是认为他们可以对模型行为做出预测。\n\
  \n## 什么是锚点？\n\n复杂模型通常被视为黑盒模型，因为很难理解预测为何做出。锚点概念无非是找出规则。这里的规则指的是高精度规则，这些规则在考虑局部和全局因素的情况下解释模型行为。换句话说，锚点是\
  \ if/then/else 条件，无论其他特征的值如何，这些条件都能锚定预测。\n\n锚点算法建立在模型无关解释之上。它有三个核心功能：\n\n- **覆盖率**：这表示改变框架以预测机器学习模型行为的频率。\n\
  - **精确度**：这表示人类预测模型行为的准确程度。\n- **工作量**：这表示解释模型行为或理解模型行为生成的预测所需的前期工作量。这两种情况都难以解释。\n\
  \n\n### 使用 Alibi 进行锚点解释\n\n为了对黑盒模型生成锚点解释，你将使用 Python 库 `Alibi`。以下脚本展示了解释该概念所需的导入语句。你将使用一个随机森林分类器，它本身也是一个黑盒模型，因为其中包含许多生成预测的决策树，这些预测被整合后产生最终输出。\n\
  \n```\nimport numpy as np\nimport pandas as pd\nfrom sklearn.ensemble import RandomForestClassifier\n\
  from sklearn.compose import ColumnTransformer\nfrom sklearn.pipeline import Pipeline\n\
  from sklearn.impute import SimpleImputer\nfrom sklearn.metrics import accuracy_score\n\
  from sklearn.preprocessing import StandardScaler, OneHotEncoder\nfrom alibi.explainers\
  \ import AnchorTabular\nfrom alibi.datasets import fetch_adult\n```\n\n`Alibi` 库包含多个数据集，用于生成可用于解释概念的示例。这里你将使用\
  \ `adult` 数据集；它也被称为来自 UCI 机器学习库的人口普查收入数据集。这是一个关于二分类模型的问题。有几个特征可用于预测收入类别，即收入是高于 5\
  \ 万美元还是低于 5 万美元。\n\n```\nadult = fetch_adult()\nadult.keys()\n```\n\n上述脚本将数据加载到\
  \ Jupyter 环境中。这些键是 `dict_keys(['data', 'target', 'feature_names', 'target_names',\
  \ 'category_map'])`。\n\n```\ndata = adult.data\ntarget = adult.target\nfeature_names\
  \ = adult.feature_names\ncategory_map = adult.category_map\n```\n\n`category_map`\
  \ 函数的作用是映射数据中所有分类列或字符串列。\n\n```\nfrom alibi.utils.data import gen_category_map\n\
  ```\n\n分类映射只是一个虚拟变量映射，因为你不能直接使用分类变量或字符串变量进行计算。\n\n```\nnp.random.seed(0)\ndata_perm\
