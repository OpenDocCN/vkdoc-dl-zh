- '# 偏依赖图


  偏依赖图（PDP）用于可视化特征列与目标列（或响应列）之间的交互关系。目标列包含两个标签：0 表示未流失案例，1 表示流失案例。当你使用 `predict_proba()`
  函数时，可以生成类别 0 和类别 1 的概率。


  ```

  pd.DataFrame(dt2.predict_proba(X)) # 0 - 未流失, 1- 流失

  model_churn_proba(X).max()

  model_churn_proba(X).mean()

  model_churn_proba(X).min()

  ```


  上述脚本中的函数用于选择第 1 列，即流失概率。例如，第一条记录显示概率为 0.090909，这意味着流失几率低于 10%。你可以得出结论，这是一个未流失样本。在下面的脚本中，`model_churn_proba`
  仅显示第二列的流失概率。


