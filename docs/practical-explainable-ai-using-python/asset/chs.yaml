  def nn_model():

  x_in = Input(shape=(12,))

  x = Dense(40, activation=''relu'')(x_in)

  x = Dense(40, activation=''relu'')(x)

  x_out = Dense(2, activation=''softmax'')(x)

  nn = Model(inputs=x_in, outputs=x_out)

  nn.compile(loss=''categorical_crossentropy'', optimizer=''sgd'', metrics=[''accuracy''])

  return nn

