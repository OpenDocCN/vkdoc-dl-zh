  ## 对机器学习模型的信任：SHAP


  为了信任基于线性回归的机器学习模型，你需要理解模型得出的`R square`值。`R square`值表示回归模型的拟合优度，即所有特征共同解释目标变量方差的比例。`R
  square`值的范围是 0.0 到 1.0。如果`R square`值为零，则表明模型显示因变量与自变量之间没有相关性。如果为 1，则表明特征之间高度相关。要成为一个值得信赖其预测的优质模型，该值应达到
  0.80 或更高。在上述汽车示例中，`R square`值为 0.70，非常接近一个可信任的标准模型。相比于`R square`，更常被引用的是调整后的`R square`值，因为它考虑了模型中使用的特征数量。`R
  square`与调整后的`R square`之间的关系通过以下公式展示。在下面的公式中，`N`表示训练样本总数，`p`表示特征总数：


  ![$$ Adjusted\kern0.5em {R}²=1-\frac{\left(1-{R}²\right)\left(N-1\right)}{N-p-1}
  $$](img/506619_1_En_3_Chapter_TeX_Equa.png)


  当你向模型中添加冗余变量时，`R square`值可能会增加，但调整后的`R square`值将保持不变。只有当该特征对模型的整体可解释性有所贡献时，调整后的`R
  square`值才会增加。


  为了生成额外的可解释性并更深入地理解模型的工作原理，你可以借助其他基于 Python 的库。Shapley 值是一种广泛使用的合作博弈论方法，具有理想的特性。你可以从模型系数中了解，当改变输入参数时，结果变量是如何被预测或估计变化的。然而，它并不能告诉你哪些特征是重要的。每个系数的值取决于输入特征的尺度。例如，车龄的范围可以是
  0-15 年。然而，在上述数据集中，`BHP`的范围可以从 34.20 到 560.00。因此，在线性回归模型中，模型系数的大小并不一定是衡量特征重要性的良好指标。


  一些数据科学家使用 t 统计量的绝对值作为线性回归模型中特征重要性的度量。


  ![$$ {t}_{{\overset{\frown }{\beta}}_j}=\frac{{\overset{\frown }{\beta}}_j}{SE\left({\overset{\frown
  }{\beta}}_j\right)} $$](img/506619_1_En_3_Chapter_TeX_Equb.png)


  理解特征重要性的方法之一是查看特征相对于模型输出的偏依赖图。


  ```

  !pip install shap

  ```


  一旦`SHAP`成功安装，你就可以使用该库生成如图 3-3 所示的偏依赖图。


  ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig3_HTML.jpg](img/506619_1_En_3_Fig3_HTML.jpg)


  图 3-3


  偏依赖图


  ```

  import shap

  shap.plots.partial_dependence("Age", new_model.predict,xtrain, ice=False, model_expected_value=True,
  feature_expected_value=True)

  ```


  水平虚线表示模型应用于数据集时的期望输出值，垂直虚线表示平均年龄特征值，而蓝色的偏依赖图线（即当你将年龄特征固定为某个给定值时模型输出的平均值）在图上始终穿过两条灰色期望值线的交点。这个交点可以被视为相对于数据分布的偏依赖图的“中心”。水平轴上的垂直灰色框显示年龄分布略微向右偏斜。


  Shapley 值建立的模型解释背后的主要思想是，利用合作博弈论中公正的结果分配方式，将模型输出（`x`）的贡献在其输入特征之间进行分配。为了将博弈论与机器学习模型联系起来，既需要将模型的输入特征与博弈中的玩家相匹配，也需要将模型函数与博弈规则相匹配。在博弈论中，玩家可以选择加入或不加入一个博弈，这类似于一个特征可以“加入”或“不加入”一个模型。


  什么是`SHAP`值，它是如何计算的？这为理解`SHAP`值的解释和含义提供了一个清晰的概念。每个特征值的 Shapley 值通过以下公式计算：


  ![$$ {\phi}_i=\sum \limits_{S\subseteq F\backslash \left\{i\right\}}\frac{\mid S\mid
  !\left(|F|-|S|-1\right)!}{\mid F\mid !}\left[{f}_{S\cup \left\{i\right\}}\left({x}_{S\cup
  \left\{i\right\}}\right)-{f}_S\left({x}_S\right)\right] $$](images/506619_1_En_3_Chapter/506619_1_En_3_Chapter_TeX_Equc.png)


  以下几点阐明了其工作原理：


  - 为了计算每个特征的贡献，`SHAP`需要在所有特征子集`S`上重新训练模型。

  - 在上述公式中，`i`是单个特征。

  - `F`是所有特征的集合。

  - `S`是来自集合`F`的特征子集。

  - 对于任何特征`i`，会创建两个模型：包含特征`i`的模型 1 和不包含特征`i`的模型 2。然后计算预测值之间的差异。

  - 一个特征对模型的影响取决于模型中其他特征的行为。

  - 针对`S`的所有可能子集计算预测差异，并取其平均值。

  - 所有可能差异的加权平均值用于填充特征重要性。


  定义特征“加入”模型含义的最常见方式是：当我们知道某个特征的值时，就说该特征“加入了模型”；当我们不知道其特征值时，就说它没有加入模型。当模型中某个特征的权重/系数为
  0.000 时，我们就认为该特征没有加入博弈。如果某个特征的系数不等于 0.000，我们就认为该特征是博弈的一部分。让我们来看看线性回归模型的`SHAP`值。


  ```

  ### 计算线性模型的 SHAP 值

  background = shap.maskers.Independent(xtrain, max_samples=2000)

  background

  xtrain.shape

  ```


  这个`shap.maskers.Independent`函数通过对给定的背景数据集进行积分来屏蔽表格特征。这里的背景数据集包含来自训练数据集的 4500 条记录，这是从传入的背景数据中使用的最大样本数。如果数据超过`max_samples`，则使用`shap.utils.sample`对数据集进行子采样。从掩码器中输出的样本数量（用于积分）与背景数据集中的样本数量相匹配。这意味着更大的背景数据集会导致更长的运行时间。通常，大约
  1、10、100 或 1000 个背景样本是合理的选择。


  ```

  explainer = shap.Explainer(new_model, background)

  explainer

  shap_values = explainer(xtrain)

  shap_values

  ```




  上述脚本展示了 SHAP 值、背景数据样本以及模型基值的输出结果。以下脚本展示了标准的偏依赖图，该图考虑了`age`特征和模型`predict`函数，针对数据集中第
  23 号样本记录。特定特征`i`的 SHAP 值就是模型期望输出与该特征值`xi`处偏依赖图之间的差值，这体现了 Shapley 值的可加性。Shapley 值的基本属性之一是，它们总和始终等于所有玩家参与时的游戏结果与无玩家参与时的游戏结果之差。对于机器学习模型而言，这意味着所有输入特征的
  SHAP 值总和始终等于基线（期望）模型输出与当前模型输出（针对被解释的预测）之间的差值。理解这一点的最简单方式是通过瀑布图，该图从你对房价`f(x)`的背景先验期望开始，然后逐个添加特征，直到达到当前模型输出`f(x)`。对应于`age`特征值为
  10 年时，蓝线与灰色虚线之间的垂直差值就是该特征的 SHAP 值。


