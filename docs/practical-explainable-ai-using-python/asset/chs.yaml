  \ in list(category_map.keys())]\nordinal_features\n```\n\n选择好有序特征后，你可以通过管道触发有序特征转换器，如下所示：\n\
  \n```\nordinal_transformer = Pipeline(steps=[('imputer', SimpleImputer(strategy='median')),\n\
  ('scaler', StandardScaler())])\ncategorical_features = list(category_map.keys())\n\
