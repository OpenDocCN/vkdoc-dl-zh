  \ witwidget.notebook.visualization import WitWidget, WitConfigBuilder\n```\n\n你将使用\
  \ `churn` 数据集，因为你在其他章节中已经使用过它。\n\n```python\ndf = pd.read_csv('ChurnData.csv')\n\
  df.head()\ndel df['Unnamed: 0']\ndf.head()\nimport pandas as pd\nimport numpy as\
  \ np\nimport tensorflow as tf\nimport functools\n# 根据数据框和指定的列创建 tf 特征规范。\ndef create_feature_spec(df,\
  \ columns=None):\n    feature_spec = {}\n    if columns == None:\n        columns\
  \ = df.columns.values.tolist()\n    for f in columns:\n        if df[f].dtype is\
  \ np.dtype(np.int64):\n            feature_spec[f] = tf.io.FixedLenFeature(shape=(),\
  \ dtype=tf.int64)\n        elif df[f].dtype is np.dtype(np.float64):\n         \
  \   feature_spec[f] = tf.io.FixedLenFeature(shape=(), dtype=tf.float32)\n      \
  \  else:\n            feature_spec[f] = tf.io.FixedLenFeature(shape=(), dtype=tf.string)\n\
  \    return feature_spec\n# 根据特征规范以及该规范中要使用的列列表，创建简单的数值型和类别型特征列。\n#\n# 注意：通过一些特征工程（例如分桶数值列和类别特征的哈希桶/嵌入列），模型可能会有更好的表现。\n\
  def create_feature_columns(columns, feature_spec):\n    ret = []\n    for col in\
  \ columns:\n        if feature_spec[col].dtype is tf.int64 or feature_spec[col].dtype\
  \ is tf.float32:\n            ret.append(tf.feature_column.numeric_column(col))\n\
  \        else:\n            ret.append(tf.feature_column.indicator_column(\n   \
  \             tf.feature_column.categorical_column_with_vocabulary_list(col, list(df[col].unique()))))\n\
  \    return ret\n```\n\n在上述函数中，给定一个数据集，你可以验证输入数据，并格式化基于整数、浮点数和字符串的列。\n\n以下实用函数根据基于\
  \ TensorFlow 的示例生成输入，用于模型训练步骤：\n\n```python\n# 一个用于从 tf.Examples 向模型提供输入的输入函数\n\
  def tfexamples_input_fn(examples, feature_spec, label, mode=tf.estimator.ModeKeys.EVAL,\n\
  \                        num_epochs=None,\n                        batch_size=64):\n\
  \    def ex_generator():\n        for i in range(len(examples)):\n            yield\
  \ examples[i].SerializeToString()\n    dataset = tf.data.Dataset.from_generator(\n\
  \        ex_generator, tf.dtypes.string, tf.TensorShape([]))\n    if mode == tf.estimator.ModeKeys.TRAIN:\n\
  \        dataset = dataset.shuffle(buffer_size=2 * batch_size + 1)\n    dataset\
  \ = dataset.batch(batch_size)\n    dataset = dataset.map(lambda tf_example: parse_tf_example(tf_example,\
  \ label, feature_spec))\n    dataset = dataset.repeat(num_epochs)\n    return dataset\n\
  ```\n\n以下函数使用特征规范函数定义的特征规范来解析 TensorFlow 示例函数：\n\n```python\n# 将 Tf.Example protos\
  \ 解析为输入函数的特征。\ndef parse_tf_example(example_proto, label, feature_spec):\n    parsed_features\
  \ = tf.io.parse_example(serialized=example_proto, features=feature_spec)\n    target\
  \ = parsed_features.pop(label)\n    return parsed_features, target\n```\n\n基于 TensorFlow\
  \ 的模型需要将输入数据分批输入到训练步骤中。\n\n```python\n# 将数据框转换为 tf.Example protos 列表。\ndef df_to_examples(df,\
  \ columns=None):\n    examples = []\n    if columns == None:\n        columns =\
  \ df.columns.values.tolist()\n    for index, row in df.iterrows():\n        example\
  \ = tf.train.Example()\n        for col in columns:\n            if df[col].dtype\
  \ is np.dtype(np.int64):\n                example.features.feature[col].int64_list.value.append(int(row[col]))\n\
  \            elif df[col].dtype is np.dtype(np.float64):\n                example.features.feature[col].float_list.value.append(row[col])\n\
  \            elif row[col] == row[col]:\n                example.features.feature[col].bytes_list.value.append(row[col].encode('utf-8'))\n\
  \        examples.append(example)\n    return examples\n```\n\n以下函数将用户提供的数据框中的某一列转换为二进制值（0\
  \ 和 1）列。该函数强制标签列变为数值型，以用于二分类模型。类似地，对于多分类模型，标签或目标列也会通过应用标签编码器函数变为标签编码器列。\n\n```python\n\
  # 根据提供的测试条件，将数据框中的某一列转换为 0 和 1 的列。\n# 用于在使用 TF 估计器进行二分类时强制标签列变为数值型。\ndef make_label_column_numeric(df,\
  \ label_column, test):\n    df[label_column] = np.where(test(df[label_column]),\
  \ 1, 0)\n```\n\n你在本章中研究的用例是一个电信客户流失分类场景。电信客户的使用历史被纳入考量，例如账户时长、客户所在地区号、州代码、是否开通国际套餐、语音邮件套餐、语音邮件数量、日间总通话时长（分钟）、日间总通话次数以及日间总费用。与日间类似，晚间和夜间的使用详情也被视为特征。这些特征有助于你预测未来客户流失的可能性。如果你能提前预测出正确的结果，那么就可以处理可能导致客户流失的因素，从而留住客户。留住客户总是比获取新客户更可取。获取新客户成本高昂，而留住现有客户的成本则要低得多。因此，在客户流失预测过程中，你可以通过识别流失原因并提前验证偏差和假设情景，来制定相关策略以防止客户流失。\n\
  \n\n\n```python\nimport numpy as np\n# 设置数据集中希望模型预测的列\nlabel_column = 'churn'\n\
  # 将标签列转换为数值（0 和 1），以便在模型中使用。\n# 在此示例中，目标值为'yes'的样本被视为正类（'1'），\n# 所有其他样本被视为负类（'0'）。\n\
  make_label_column_numeric(df, label_column, lambda val: val == 'yes')\n# 设置我们将用于模型输入的数据集中所有列的列表。\n\
  input_features = [\n'account_length', 'area_code', 'international_plan',\n'voice_mail_plan',\
  \ 'number_vmail_messages', 'total_day_minutes',\n'total_day_calls', 'total_day_charge',\
  \ 'total_eve_minutes',\n'total_eve_calls', 'total_eve_charge', 'total_night_minutes',\n\
  'total_night_calls', 'total_night_charge', 'total_intl_minutes',\n'total_intl_calls',\
  \ 'total_intl_charge',\n'number_customer_service_calls']\n# 创建一个包含所有输入特征和标签列的列表\n\
  features_and_labels = input_features + [label_column]\nfeatures_and_labels\nexamples\
  \ = df_to_examples(df)\nnum_steps = 5000  #@param {type: \"number\"}\n# 为分类器创建特征规范\n\
  feature_spec = create_feature_spec(df, features_and_labels)\n# 定义并训练分类器\ntrain_inpf\
  \ = functools.partial(tfexamples_input_fn, examples, feature_spec, label_column)\n\
  classifier = tf.estimator.LinearClassifier(\nfeature_columns=create_feature_columns(input_features,\
  \ feature_spec))\nclassifier.train(train_inpf, steps=num_steps)\ntest_df = pd.read_csv('churnTest.csv')\n\
  num_datapoints = 2000\ntool_height_in_px = 700\nfrom witwidget.notebook.visualization\
