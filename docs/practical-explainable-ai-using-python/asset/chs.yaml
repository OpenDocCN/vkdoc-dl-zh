  `Tf-idf` 是一种基于向量的文本数据表示方法。当基于计数的特征具有高频率时，这非常有用。为了避免高频词对分类算法的影响，最好使用基于 `tf-idf` 的向量化器。在初始化
  `tf-idf` 向量化器时，如果提供了停用词选项，那么对于停用词将不会创建向量。同时，在 `tf-idf` 计算中也不会考虑停用词的计数。停用词被定义为本身没有意义，但能帮助我们结合其他词理解上下文的词。作为特征，它们对文本分类任务没有太多价值；相反，它们会增加数据的维度。因此，去除停用词将通过减少数据维度帮助你获得更好的准确率。参见图
  7-8。


