  为了生成 CEM 解释，你需要一个能将输入数据分类到特定类别的模型对象。CEM 尝试生成两种可能的解释：


  *   尝试找出输入数据中必须存在的最少信息量，这些信息足以产生相同的类别分类。这被称为 PP。

  *   尝试找出输入数据中缺失的最少信息量，这些信息足以阻止类别预测发生变化。这被称为 PN。




