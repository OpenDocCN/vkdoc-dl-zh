  您可以使用以 TensorFlow 为后端的 Keras 层来训练神经网络模型对象。Alibi 提供了解释器类，该类有一个用于生成反事实原型结果的模块。以下脚本创建了一个神经网络模型类作为用户自定义函数。这个
  `nn_model()` 函数接收输入并应用修正线性单元激活函数。然后它创建另一个包含 40 个神经元的隐藏层，应用相同的激活函数，并使用随机梯度下降作为优化器，分类交叉熵作为损失函数。


