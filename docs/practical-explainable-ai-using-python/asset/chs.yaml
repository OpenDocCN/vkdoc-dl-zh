  ## 结论


  图像归因对于解释特定图像分类的原因非常重要。可以使用主导像素方法或识别图像中受影响的像素来创建图像归因。这在某些行业中可能很有用。在制造业中，它可用于从产品图像中识别缺陷产品。在医疗保健领域，它可以对各类扫描进行分类并识别扫描中的异常。在所有领域，解释模型为何将某个类别分类出来都很重要。只要能够解释预测结果，就能更好地赢得用户对模型的信任，从而可以增加
  AI 模型在行业中解决复杂业务问题的采用率。




