  电影评论文本（图 7-6）显示了一些关键词的重复。如果重复过多，计数向量化器中的计数将会膨胀。如果有很多词的计数被膨胀，那么这将在特征重要性列表中反映出来。为了避免计数向量化器中高词频的影响，你必须应用一种归一化方法，以便所有特征在分类过程中获得同等的重要性。为此，你可以引入一种新的向量化器，称为*词频-逆文档频率*，通常称为（tf-idf）向量化器。以下公式可用于计算
  tf-idf 的值：


  > *第 j 个文档中第 i 个词的 tf-idf 值 = 第 j 个文档中第 i 个词的词频 * log (文档总数 / 包含第 i 个词的文档数)*


  ![../images/506619_1_En_7_Chapter/506619_1_En_7_Fig6_HTML.jpg](img/506619_1_En_7_Fig6_HTML.jpg)


