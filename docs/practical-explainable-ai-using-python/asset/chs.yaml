  shap.plots.heatmap(shap_values[:1000])

  ```


  这会导致具有相同模型输出且原因相同的样本被分组在一起（例如，受马力（BHP）和年龄影响较大的人群）。模型的输出显示在图 3-12 的热力图矩阵上方（以解释的 `.base_value`
  为中心），每个模型输入的全局重要性则显示在图的右侧（默认情况下，这是整体重要性的 `shap.order.abs.mean` 度量）。




  ## LIME 解释与机器学习模型


  LIME（局部可解释模型无关解释）是一种算法，能够通过使用可解释模型在局部进行近似，以可信的方式解释任何分类器或回归器的预测结果。它通过调整特征值来修改单个数据样本，并观察对输出产生的影响。它扮演着“解释器”的角色，用于解释每个数据样本的预测结果。LIME
  的输出是一组解释，代表每个特征对单个样本预测的贡献，这是一种局部可解释性形式。LIME 中的可解释模型可以是，例如，线性回归或决策树，这些模型通过在原始模型的小扰动（例如，添加噪声、移除单词或隐藏图像部分）上进行训练，以提供良好的局部近似。可以使用
  `pip` 命令安装 LIME。


  你可以使用包含目标列的模型训练数据集，重新训练一个回归模型，而不是使用之前的模型对象 `new_model`，因为 LIME 是一种模型无关技术，它在生成解释器时会重新训练模型。LIME
  将问题局部化，并在局部层面解释模型，而不是提供全局解释。


  ```

  !pip install lime

  import lime

  import lime.lime_tabular

  explainer = lime.lime_tabular.LimeTabularExplainer(np.array(xtrain),

  mode=''regression'',

  feature_names=xtrain.columns,

  class_names=[''price''],

  verbose=True)

  ```


  LIME 表格解释器需要 numpy 数组作为输入，因此训练数据格式会发生变化。在扰动后，模式选择为回归，目标列为价格。一旦解释器开发完成，就可以进一步生成详细的局部解释。特征频率选项提供了特征的分布情况以及它在扰动过程中被使用的次数。


  ```

  explainer.feature_selection

  explainer.feature_frequencies

  ```


  如果你想使用之前训练好的模型对象，那么可以使用解释实例选项。这需要一个测试数据集、模型对象以及可以使用的特征数量。让我们使用测试数据集中的第 60 条记录。你将得到结果，包括截距项、局部预测值以及全局预测值（即
  `right` 值）。对于测试数据集中的第 60 条记录，如果你使用预测函数，你会得到预测值 27.5854，该值等于解释实例中的 `right` 值。局部预测模式值为
  28.54，更接近实际预测值 35.0。


  ```

  # 请求 LIME 模型的解释

  i = 60

  exp = explainer.explain_instance(np.array(xtest)[i],

  new_model.predict,

  num_features=14

  )

  new_model.predict(xtest)[60]

  ytest[60:61]

  Intercept 18.186435664326485

  Prediction_local [28.15539047]

  Right: 27.58547373488966

  exp.show_in_notebook(show_table=True)

  exp.as_list()

  ```


  你可以以表格格式显示解释器，其中包含预测值、正负特征值以及表格中的总体特征及其值。预测值为 46.62。在第二个图表中，针对同一个实例（编号 60）显示了正特征值和负特征值。第二个图表中的水平条表示该记录的特征重要性。第三个表格显示了每个特征对应的
  LIME 值。该方法和局部解释非常直观。这可以向任何业务用户解释。第 60 条记录的样本局部性会均匀且随机地选择单个数据点，创建扰动数据点以及模型对应的预测值。默认情况下，特征选择方法是自动的。LIME
  专注于使用样本权重在打乱的数据集（扰动后）上拟合可解释模型，并使用新训练的模型提供局部解释。参见图 3-13。


  ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig13_HTML.jpg](img/506619_1_En_3_Fig13_HTML.jpg)


  图 3-13


  不同特征的正负值对预测值的贡献


  第 60 条记录的解释器也可以像上面那样以列表形式显示。还有另一个类函数，称为子模选择，用于生成全局决策边界。


  ```

  # SP-LIME 的代码

  import warnings

  from lime import submodular_pick

  # 记住将数据框转换为矩阵值

  # SP-LIME 返回样本集上的解释，以提供原始模型的非冗余全局决策边界

  sp_obj = submodular_pick.SubmodularPick(explainer, np.array(xtrain),

  new_model.predict,

  num_features=14,

  num_exps_desired=10)

  [exp.show_in_notebook() for exp in sp_obj.sp_explanations ]

  ```


  这里用于生成全局决策边界的特征数量是 14，期望的实验次数是 10。这部分脚本需要一些时间才能完成，因为你正在生成多次迭代。参见图 3-14。


  ![../images/506619_1_En_3_Chapter/506619_1_En_3_Fig14_HTML.jpg](img/506619_1_En_3_Fig14_HTML.jpg)


  图 3-14


  子模选择解释


  LIME 试图在保真度和可解释性之间进行权衡。保真度意味着模型应该能够在用于预测的实例的局部区域内复制模型行为。可解释性你已经知道，是指清晰度，以便人类能够理解模型输出。以下公式展示了两者之间的关系：


  ![$$ \xi (x)=\underset{g\in G}{\arg \min}\kern1.5em L\left(f,g,{\pi}_x\right)+\Omega
  (g) $$](img/506619_1_En_3_Chapter_TeX_Equd.png)


  让我们理解上述公式中使用的每个符号：


  *   `F` 是原始预测器。

  *   `g` 是模型解释。

  *   原始特征是 `x`。

  *   `x` 的 `pi` 是一个邻近度度量，定义了 `xx` 周围的局部区域。

  *   `x` 的 `omega` 是用于解释的模型复杂度的度量。


  LIME 的局限性之一是对邻域和邻近度的定义不准确。在对局部区域内的记录进行采样时，它使用高斯分布，这没有考虑各个特征之间的关系。如果因变量和自变量之间的关系是非线性的，那么解释将不准确。另一个局限性是子模选择，它是从数据集中选出的最能解释模型的一组
  n 个样本。子模选择会产生大量输出，有时难以解释。尽管该模块存在局限性，但 LIME 主要用于为单个预测生成与模型无关的局部解释。由于其输出的简单性和易于解释的特点，它非常受欢迎。




  ## Skater 解释与机器学习模型


  Skater 是一个开源统一框架，用于实现所有形式模型的解释，帮助我们构建在实际应用场景中通常需要的可解释机器学习系统。Skater 支持多种算法，可以从全局（基于完整数据集进行推理）和局部（对单个预测进行推理）两个层面，揭示黑盒模型已学习到的结构。该软件包最初由
  Aaron Kramer、Pramit Choudhary 以及 [DataScience.com](http://datascience.com) 团队的其他成员开发，旨在帮助数据科学家和数据爱好者更好地理解模型。Skater
  通过提供按需推断和调试模型决策策略的能力，将“人类引入循环”，从而实现这一愿景。


  可以使用 `pip` 或 `conda` 安装脚本来安装 Skater 库。在 Jupyter 环境中安装也很容易。模型对象可以通过两个类来实现：内存模型和已部署模型。可调用函数形式的模型可以通过内存模型来使用；通过
  Rest API 部署和调用的模型则通过已部署模型对象来暴露。


