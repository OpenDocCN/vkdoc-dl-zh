  def ErrorMetric(model,X,Y):

  Yhat = model.predict(X)

  MAPE = np.mean(abs(Y-Yhat)/Y)*100

  MSSE = np.mean(np.square(Y-Yhat))

  Error = sns.distplot(Y-Yhat)

  return MAPE, MSSE, Error

