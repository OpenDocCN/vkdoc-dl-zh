  ## 结论


  在本章中，你探讨了与回归问题和分类问题相关的反事实解释。反事实的目标是在训练数据中找到与标记类别产生不同预测的相似数据点。反事实解释的推理逻辑是：如果两个数据点非常相似，那么两者应该具有相似的预测或相似的结果。目标类别的输出不应存在差异。在糖尿病预测用例中，如果两个人具有相似的特征，那么要么两人都没有糖尿病，要么两人都有糖尿病。不应出现一人有糖尿病而另一人没有的情况。存在不同的反事实信息实际上会从最终用户的角度造成混淆，这将导致对
  AI 模型缺乏信任。为了建立对 AI 模型的信任，生成反事实解释至关重要。


  '
- '# 11. 机器学习的对比解释


  对比学习是一种较新的方法，用于在机器学习流程中寻找相似和相异的候选对象。对比解释旨在寻找两个特征之间的相似性，以帮助对某个类别进行预测。典型的黑盒模型，基于不同类型的超参数以及在不同轮次和学习率下优化的大量参数进行训练，非常难以解释，更难以推理模型为何预测
  A 类而非 B 类。为了生成更多解释以便业务用户理解预测结果的需求，吸引了许多开发者创建能够产生价值的创新框架。对比解释侧重于解释模型为何预测 A 类而非 B
  类。寻找原因有助于业务用户理解模型的行为。在本章中，你将使用基于 TensorFlow 框架的 Alibi 库来处理图像分类任务。


  ## 什么是机器学习中的对比解释？


  为了理解机器学习中的对比解释，让我们以银行的贷款审批流程或信用风险评估流程为例。没有银行会向高风险客户提供贷款。同样，没有银行会拒绝向非风险客户提供贷款。当贷款申请或信用申请被拒绝时，这并非银行某人的随意决定。相反，这是一个
  AI 模型做出的决定，该模型考虑了关于个人的众多特征，包括财务历史和其他因素。贷款被拒绝的个人可能会思考：哪些方面决定了他的贷款资格？在贷款资格方面，是什么将一个人与另一个人区分开来？他的个人资料中缺少哪些要素？等等。同样，在从多个可用图像中识别感兴趣的对象时，是什么使感兴趣的对象与其他图像不同？对比解释就是将一个类别与其他类别区分开来的特征差异。


  对比解释就像人类的对话，有助于人类进行更深入的交流。对比解释涉及两个概念：


  *   相关正特征

  *   相关负特征


  相关正特征解释是指，找到那些对于机器学习模型识别出与预测类别相同的类别所必需的特征的存在。例如，一个人的收入和年龄决定了个人的净资产。你希望你的机器学习模型能够根据高收入和高年龄段的存在来识别高净值人群类别。这在多个方面与机器学习模型的锚点解释相似。相关负特征是相关正特征的反面；它解释了在保持原始输出类别不变的情况下，应该从记录中缺失的特征。一些研究人员也将其称为*反事实解释*。




  ### 使用 Alibi 实现对比解释方法（CEM）


  模型的对比解释有助于向最终用户阐明，为何某个事件或预测结果会与另一种情况不同。为了解释模型对比解释方法（CEM）的概念以及如何通过基于 Python 的库来实现它，我们以
  Alibi 为例。首先，你需要使用 TensorFlow 作为后端，开发一个基于 Keras 的深度学习模型。以下脚本包含了开发深度学习模型时可用的各种模块和方法的导入语句。CEM
