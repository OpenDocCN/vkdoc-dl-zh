  ### 多标签文本分类的可解释性


  我们来看一下多类分类模型，即目标列中包含两个以上类别的情况。多类分类是另一种应用场景，其中因变量或目标列可以包含两个以上的类别或标签。这里需要的可解释性是针对每个对应的类别标签，因此需要展示重要的正向和负向特征。我们使用一个客户投诉数据集，其目标是预测客户投诉的类别或类型。


  ```

  import pandas as pd

  df = pd.read_csv(''complaints.csv'')

  df.shape

  df.info()

  # 创建一个包含两列的新数据框

  df1 = df[[''Product'', ''Consumer complaint narrative'']].copy()

  # 移除缺失值 (NaN)

  df1 = df1[pd.notnull(df1[''Consumer complaint narrative''])]

  # 重命名第二列，使其更简洁

  df1.columns = [''Product'', ''Consumer_complaint'']

  df1.shape

  # 由于计算耗时（就 CPU 而言），对数据进行了抽样

  df2 = df1.sample(20000, random_state=1).copy()

  # 重命名类别

  df2.replace({''Product'':

  {''Credit reporting, credit repair services, or other personal consumer reports'':

  ''Credit reporting, repair, or other'',

  ''Credit reporting'': ''Credit reporting, repair, or other'',

  ''Credit card'': ''Credit card or prepaid card'',

  ''Prepaid card'': ''Credit card or prepaid card'',

  ''Payday loan'': ''Payday loan, title loan, or personal loan'',

  ''Money transfer'': ''Money transfer, virtual currency, or money service'',

  ''Virtual currency'': ''Money transfer, virtual currency, or money service''}},

  inplace= True)

  df2.head()

  pd.DataFrame(df2.Product.unique())

  ```


  数据集的来源是 [`https://catalog.data.gov/dataset/consumer-complaint-database`](https://catalog.data.gov/dataset/consumer-complaint-database)`.`
  该数据集经过清洗和准备，用于预测投诉类别。读取数据后，创建了 Python 对象 `DF`。以下输出显示了数据集中的前几条记录。


  从 `DF` 中，你复制了一份仅包含客户投诉叙述和产品列的数据，用于开发多类分类模型，并将其赋值给 `DF1` 对象。然后，通过移除 NaN 值并为变量设置更简洁的名称来清理数据框。


  那些包含更多文本的长描述被清理为更短、更合适的名称，以便你能更好地分析数据。客户投诉叙述涉及的产品类别共有 13 个唯一值。


  ```

  # 创建一个新列 ''category_id''，包含编码后的类别

  df2[''category_id''] = df2[''Product''].factorize()[0]

  category_id_df = df2[[''Product'', ''category_id'']].drop_duplicates()

  # 用于后续使用的字典

  category_to_id = dict(category_id_df.values)

  id_to_category = dict(category_id_df[[''category_id'', ''Product'']].values)

  # 新的数据框

  df2.head()

  df2.Product.value_counts()

  ```


  为了模型训练的目的，你需要将目标列文本编码为数字。因此，你通过对产品列进行因子化来创建 `category_id` 列。上述脚本中的接下来两行代码创建了编码数字与类别描述之间的映射。这在生成预测后用于反向转换非常有用。在接下来的代码行中，你创建了一个
  tf-idf 向量，其 n-gram 范围从 1 到 2，并移除了停用词，同时将次线性 TF 和最小文档频率设置为 5。如果你想减少文档长度带来的偏差，则必须将次线性词频设置为
  TRUE。正如你从齐普夫定律所知，任何词的频率与其排名成反比。最小文档频率意味着在构建词汇表时，你应该忽略文档频率低于定义阈值的词项。在以下脚本中，该值为 5，这意味着任何频率低于
  5 的词项都不会成为词汇表的一部分。


  以下脚本的输出显示了多类分类目标列中每个类别的计数。以下脚本使用计数向量化器作为起点，为多类模型拟合了一个逻辑回归。


  ```

  from sklearn.feature_extraction.text import CountVectorizer

  from sklearn.linear_model import LogisticRegressionCV

  from sklearn.pipeline import make_pipeline

  vec = CountVectorizer()

  clf = LogisticRegressionCV()

  pipe = make_pipeline(vec, clf)

  pipe.fit(df2.Consumer_complaint,df2.Product)

  from sklearn import metrics

  def print_report(pipe):

  y_test = df2.Product

  y_pred = pipe.predict(df2.Consumer_complaint)

  report = metrics.classification_report(y_test, y_pred)

  print(report)

  print("accuracy: {:0.3f}".format(metrics.accuracy_score(y_test, y_pred)))

  print_report(pipe)

  ```


