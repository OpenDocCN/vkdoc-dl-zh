  使用默认参数初始化决策树，并将对象存储为 `dt1`。然后使用 `fit` 方法进行模型训练，并使用 `score` 函数获取模型在训练数据集和测试数据集上的准确率。训练准确率为
  100%，测试准确率为 89.8%。这是模型过拟合的明显迹象。这是由于决策树分类器中的参数“最大深度”导致的。默认情况下该参数为 None，这意味着决策树的分支将一直扩展，直到所有样本都被分配到决策树中。如果模型对数据过拟合，那么从中提取的规则也会产生误导，有时会产生误报，有时会产生漏报。因此，第一步是让模型正确。你需要微调超参数，以生成一个更好、更稳定的模型。这样，规则才会有效。



