  ## 非线性解释 – Skope-Rules


  还有另一个名为 `Skope-rules` 的可解释性库，可用于从训练模型中生成规则，并且这些规则可用于对任何新数据集进行预测。


  以下代码可用于安装基于 Python 的库。参数说明见表 4-4。


  **表 4-4** Skope-Rules 参数说明


  | 参数 | 说明 |

  | --- | --- |

  | `feature_names` | 每个特征的名称，用于以字符串格式返回规则 |

  | `precision_min` | 规则被选中的最小精确度 |

  | `recall_min` | 规则被选中的最小召回率 |

  | `n_estimators` | 用于预测的基础估计器（规则）数量 |

  | `max_depth_duplication` | 用于规则去重的决策树最大深度 |

  | `max_depth` | 决策树的最大深度 |

  | `max_samples` | 从 X 中抽取用于训练每棵决策树的样本数量，规则由此生成并筛选 |


  ![../images/506619_1_En_4_Chapter/506619_1_En_4_Fig26_HTML.jpg](img/506619_1_En_4_Fig26_HTML.jpg)


  **图 4-26** 所有记录的特征重要性以及对预测概率的正负贡献


  ```

  !pip install skope-rules

  import six

  import sys

  sys.modules[''sklearn.externals.six''] = six

  import skrules

  from skrules import SkopeRules

  clf = SkopeRules(max_depth_duplication=2,

  n_estimators=30,

  precision_min=0.3,

  recall_min=0.1,

  feature_names=list(xtrain.columns))

  clf

  clf.fit(xtrain,ytrain)

  print(''以下是最精确的 5 条规则：'')

  for rule in clf.rules_[:5]:

  print(rule[0])

  ```


  使用 `clf.fit()` 方法可以训练决策树模型，并得出以下规则。可以使用 `precision` 和 `recall` 参数对规则进行筛选或整理。如果将阈值降低到较低水平，将会生成大量规则，这对用户毫无用处，因为误报规则会进入业务应用。较高的阈值会减少规则数量，只有最相关的规则才会被用于业务应用。


  最精确的五条规则如下：


  ```

  number_vmail_messages  249.70000457763672

  number_vmail_messages  44.989999771118164 and total_eve_minutes > 145.39999389648438

  number_customer_service_calls > 3.5 and total_day_minutes  245.0999984741211 and
  total_eve_minutes > 204.20000457763672

  number_customer_service_calls > 3.5 and total_day_charge <= 30.65999984741211

  clf.predict(xtest)

  clf.predict_top_rules(xtest,5)

  clf.score_top_rules(xtest)

  ```


  `predict` 函数使用所有规则来预测目标流失类别：0 表示未流失，1 表示流失。


  `predict_top_rules` 函数用于利用这五条规则来预测结果。5 是用于预测的规则数量。如果 `n_rules` 条性能最佳的规则中有一条被激活，则预测结果等于
  1。对于每个观测值，该函数会根据所选规则判断其是否应被视为异常值（1 或 0）。


  ```

  clf.decision_function(xtrain)

  clf.decision_function(xtest)

  ```


  `Score top rules` 表示基础分类器（规则）之间的排序。当实例被一条性能良好的规则检测到时，得分会很高。正分数代表异常值，零分数代表正常值。


  `decision_function` 是输入样本的异常得分，计算方式为二元规则输出的加权和，权重为每条规则各自的精确度。对于输入样本的异常得分，得分越高，表示异常程度越高。正分数代表异常值，零分数代表正常值。


  ## 结论


  在本章中，您学习了如何解释非线性模型，特别是决策树模型，而不是用于二分类的逻辑回归。类似地，决策树模型也可用于回归模型，并可扩展到多项分类。非线性模型是较易于解释的模型，每个人都通过简单的
  if/then else 规则理解这些模型的工作原理。因此，人们对基于树的非线性模型有很高的信任度。在本章中，您从多个角度探讨了如何使用可解释 AI 库（如 LIME、SHAP
  和 Skope-rules）为非线性模型创建视图。在下一章中，您将学习集成模型的模型可解释性。


  '
- "# 5. 集成模型的可解释性\n\n集成模型是一组模型，其预测结果通过某种度量进行聚合，以生成最终预测。例如，可以开发一组基于树的模型来预测实值输出，如回归模型。所有树的预测结果取平均值作为最终输出。类似地，分类模型会生成各个类别的预测，然后采用投票规则。得票最多的类别作为最终输出。集成模型不仅难以解释，而且难以向最终用户说明。考虑一个场景：四棵树预测“是”，六棵树预测“否”；根据\
  \ 6/4 的多数规则，我们将“否”作为最终答案。这里很难向最终用户解释为什么有些模型预测了“是”。因此，解释集成模型非常重要。在本章中，您将主要使用 SHAP\
  \ 来解释集成模型的预测。\n\n## 集成模型\n\n集成模型是最复杂的模型集合，需要详细解释，因为输出是多个预测结果的组合。*集成* 简单来说就是*分组*。对于集成模型，重要的是如何解释预测结果、实际产生预测的是哪个模型变体，以及如何在最终预测过程中解读特征的边际贡献。\n\
  \n决策树模型的优点在于它考虑了数据集中潜在的非线性关系。在生成模型预测时，变量交互作用会发挥作用。然而，决策树模型的局限性在于它容易产生偏差，因为强大或更强的特征会参与树的构建过程，而弱特征由于缺乏预测能力而无法进入树的分支过程。因此，模型会偏向于数据集中少数几个选定的、更强的特征。这有时也会导致模型过拟合。为了平衡强特征的影响，规范特征进入基于树的模型的过程非常重要。如果在模型创建步骤中排除强特征，只包含弱特征来创建树，您仍然能够生成预测，但这同样会是一个有偏模型。因此，只有在树构建过程中同时使用强特征和弱特征的组合，才能处理模型偏差并同时控制过拟合。这种组合可以纯粹基于自助法进行，并且可以充分增加树的数量以平均化预测结果。\n\
  \n\n\n### 集成模型的类型\n\n集成模型分为三种类型：装袋模型（也称为自助聚合模型）、提升模型和堆叠模型（图 5-1）。堆叠模型又可分为两种类型：同质组堆叠和异质变体模型堆叠。同质组堆叠涉及同质模型类型，例如仅包含基于树的模型，并将每个模型的输出与其他模型进行对比。异质堆叠模型则意味着将基于树的模型与非基于树的模型进行对比，并组合它们的预测结果。堆叠模型的可解释性并不困难，因为我们可以识别特定模型并解释其预测和参数；然而，解释装袋模型和提升模型则有些棘手。随机森林模型是装袋模型的一个例子，其中生长了许多树，最终将预测结果组合起来得出最终结论。提升模型则采用一个基础模型，从该模型的结果中学习，并尝试以迭代方式改进模型。\n\
  \n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig1_HTML.png](img/506619_1_En_5_Fig1_HTML.png)\n\
  \n图 5-1\n\n三种类型的集成模型\n\n## 为什么使用集成模型？\n\n当数据集中特征总数增加，例如超过 50 个时，由于以下原因，单个决策树无法容纳：\n\
  \n-   强大的特征将在决策树构建过程中占据分支创建步骤；因此，弱特征将不会参与树的形成。\n-   在单个决策树场景中，模型会变得更具偏差，因为少数几个强大的特征主导了预测。\n\
  -   由于少数几个强大的特征，超参数的选择受到限制。\n-   当你考虑到在 100 多个特征中，20% 的强大特征驱动着预测时，这个问题会变得更大。剩余的\
  \ 80% 的弱特征未被利用。\n-   由于是单棵树，并非所有特征都能在预测中获得公平的机会。\n-   在单个决策树场景中，偏差缓解主要通过剪枝来完成。\n\
  \n为了解决单个决策树模型的上述局限性，需要有一组树，因此得名*树集成*。装袋、提升和堆叠模型既可以应用于基于回归的问题，也可以应用于基于分类的问题。图 5-2\
  \ 提供了区分这三种集成模型的图示。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig2_HTML.png](img/506619_1_En_5_Fig2_HTML.png)\n\
  \n图 5-2\n\n装袋模型\n\n装袋（也称为自助聚合）从训练数据集中抽取不同的特征和记录样本，并尝试训练一个决策树。在图 5-2 中，你可以开发 `n`\
  \ 棵树，其中 `n` 可以是 100、500 或 1000。当你增加树的数量时，如果训练数据集中的特征更多，模型的准确率就会上升。如果你的特征和样本较少，并且你增加树的数量，那么你将能够获得更高的准确率，但在此过程中会产生大量重复的树。它们是重复的树，因为每棵树中都出现了相同的特征集。装袋本质上是并行的，因为你可以为分类和回归任务并行训练多棵树。因此，根据行业实践，当训练数据集中有超过\
  \ 50 个特征和超过 50,000 条记录时，建议使用集成方法。\n\n另一方面，提升是一个顺序过程，首先训练一个基础分类器来分类或预测目标列。然后，在分类场景中分离出正确预测的案例，在基于回归的场景中拾取误差分布，以便在相同的配置或设置下重新训练模型。这个过程会重复多次，直到没有进一步提高准确率的可能性。这本质上是顺序的，因为第二个模型基于第一个模型的结果工作。这是一种获得集成模型的强大技术。该过程在图\
  \ 5-3 中进行了说明。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig3_HTML.png](img/506619_1_En_5_Fig3_HTML.png)\n\
  \n图 5-3\n\n提升模型训练过程\n\n集成模型的第三种变体是堆叠。堆叠模型预测有两种方式：同质组堆叠和异质组堆叠。参见表 5-1。\n\n表 5-1\n\
  \n回归问题同质组堆叠\n\n| | 模型 | |\n| --- | --- | --- |\n| **测试数据** | DT | RF | 自适应提升 | 梯度提升\
  \ | XGBoost | 预测 |\n| --- | --- | --- | --- | --- | --- | --- |\n| **1** | 25.3\
  \ | 25.2 | 24.3 | 26.1 | 24.5 | 25.08 |\n| **2** | 12.5 | 13.21 | 14.1 | 11.9 |\
  \ 12.2 | 12.782 |\n| **3** | 17.8 | 15.3 | 16.3 | 16.7 | 17.1 | 16.64 |\n\n最后一列“预测”是不同模型预测值的平均值。你只考虑了测试数据集中的三条记录。现在请看表\
  \ 5-2。\n\n表 5-2\n\n分类问题同质组堆叠\n\n| | 模型 | |\n| --- | --- | --- |\n| **数据** | DT |\
  \ RF | 自适应提升 | 梯度提升 | XGBoost | 预测 |\n| --- | --- | --- | --- | --- | --- | ---\
  \ |\n| **1** | 是 | 否 | 是 | 是 | 是 | 是 |\n| **2** | 否 | 否 | 否 | 是 | 否 | 否 |\n| **3**\
  \ | 是 | 是 | 否 | 否 | 否 | 否 |\n\n在第一行中，有四个“是”和一个“否”，因此最终预测为“是”。同样，在第二行和第三行中，最终预测由多数投票决定。在异质堆叠场景中，不仅基于树的模型可以参与，其他模型也可以，例如逻辑回归模型、支持向量机模型等。在表\
  \ 5-3 中，你可以看到回归模型异质组堆叠，在表 5-4 中，你可以看到带有异质组堆叠的分类模型。\n\n表 5-4\n\n分类问题异质堆叠\n\n| | 模型\
  \ | | | |\n| --- | --- | --- | --- | --- |\n| **数据** | DT | RF | 自适应提升 | 梯度提升 |\
  \ XGBoost | SVM | LR | 预测 |\n| --- | --- | --- | --- | --- | --- | --- | --- | ---\
  \ |\n| **1** | 是 | 否 | 是 | 是 | 是 | 否 | 否 | 是 |\n| **2** | 否 | 否 | 否 | 是 | 否 | 是\
  \ | 是 | 否 |\n| **3** | 是 | 是 | 否 | 否 | 否 | 否 | 是 | 否 |\n\n表 5-3\n\n回归问题异质组堆叠\n\n\
  | | 模型 | | | |\n| --- | --- | --- | --- | --- |\n| **数据** | DT | RF | 自适应提升 | 梯度提升\
  \ | XGBoost | SVM | LR | 预测 |\n| --- | --- | --- | --- | --- | --- | --- | --- |\
  \ --- |\n| **1** | 25.3 | 25.2 | 24.3 | 26.1 | 24.5 | 24.9 | 24.6 | 24.98571429\
  \ |\n| **2** | 12.5 | 13.21 | 14.1 | 11.9 | 12.2 | 12.6 | 11.9 | 12.63 |\n| **3**\
  \ | 17.8 | 15.3 | 16.3 | 16.7 | 17.1 | 16.8 | 17.1 | 16.72857143 |\n\n\n\n## 使用\
  \ SHAP 进行集成模型分析\n\n你将考虑两个不同的数据集。你将使用流行的波士顿房价数据集来解释回归用例场景中的模型预测，并使用成人数据集来解释分类场景。以下是波士顿房价数据集中的变量：\n\
  \n- `CRIM`：城镇人均犯罪率\n- `ZN`：占地面积超过 25,000 平方英尺的住宅用地比例\n- `INDUS`：每个城镇非零售商业用地的比例\n\
  - `CHAS`：查尔斯河虚拟变量（若地块临河则为 1；否则为 0）\n- `NOX`：一氧化氮浓度（每千万分之一）\n- `RM`：每栋住宅的平均房间数\n\
  - `AGE`：1940 年之前建造的自住单位比例\n- `DIS`：到波士顿五个就业中心的加权距离\n- `RAD`：径向高速公路可达性指数\n- `TAX`：每\
  \ 10,000 美元的全额财产税率\n- `PTRATIO`：城镇师生比\n- `B`：1000(Bk - 0.63)²，其中 Bk 是城镇黑人比例\n- `LSTAT`：人口中较低地位阶层的百分比\n\
  - `MEDV`：自住房屋的中位数价值（单位：千美元）\n\n```\nimport pandas as pd\nimport shap\nimport sklearn\n\
  ### 波士顿房价预测\nX,y = shap.datasets.boston()\nX100 = shap.utils.sample(X, 1000) # 1000\
  \ 个实例用作背景分布\n# 一个简单的线性模型\nmodel = sklearn.linear_model.LinearRegression()\nmodel.fit(X,\
  \ y)\n```\n\n波士顿房价数据集现在是 SHAP 库的一部分。基础模型的计算使用线性回归模型进行，这样你就可以在该数据集上执行集成模型并比较结果。\n\
  \n```\nprint(\"模型系数:\\n\")\nfor i in range(X.shape[1]):\nprint(X.columns[i], \"\
  =\", model.coef_[i].round(4))\n```\n\n**表 5-5** 线性回归模型的模型系数\n\n| 模型系数： |\n| CRIM\
  \ = -0.108 |\n| ZN = 0.0464 |\n| INDUS = 0.0206 |\n| CHAS = 2.6867 |\n| NOX = -17.7666\
  \ |\n| RM = 3.8099 |\n| AGE = 0.0007 |\n| DIS = -1.4756 |\n| RAD = 0.306 |\n| TAX\
  \ = -0.0123 |\n| PTRATIO = -0.9527 |\n| B = 0.0093 |\n| LSTAT = -0.5248 |\n\n基础模型的系数是起点（表\
  \ 5-5）。随后，你将查看复杂的集成模型，并将系数与基础线性模型进行比较。此外，你还可以比较解释结果。预测效果越好，可解释性就越强。\n\n```\nshap.plots.partial_dependence(\n\
  \"RM\", model.predict, X100, ice=False,\nmodel_expected_value=True, feature_expected_value=True\n\
  )\n```\n\n图 5-4 中显示的水平虚线`E[f(x)]`实际上就是房价中位数的预测平均值。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig4_HTML.jpg](img/506619_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** 使用`X100`子集样本绘制的`RM`与预测房价的 PDP 图\n\n如果取预测结果的平均值，则为 22.84。如图 5-4 所示，`RM`特征与模型的预测结果之间存在线性关系。\n\
  \n```\n### 计算线性模型的 SHAP 值\nexplainer = shap.Explainer(model.predict, X100)\nshap_values\
  \ = explainer(X)\n# 绘制标准的部分依赖图\nsample_ind = 18\nshap.partial_dependence_plot(\n\
  \"RM\", model.predict, X100, model_expected_value=True,\nfeature_expected_value=True,\
  \ ice=False,\nshap_values=shap_values[sample_ind:sample_ind+1,:]\n)\n```\n\n图 5-5\
  \ 显示，`RM`特征对目标列预测值的边际贡献呈线性关系，如向上倾斜的直线所示。红线表示预测值与平均预测值之间的差异。SHAP 值等于预测值。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig5_HTML.jpg](img/506619_1_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5** 数据集中第 18 行叠加在 PDP 图上\n\n```\nX100 = shap.utils.sample(X,100)\nmodel.predict(X100).mean()\n\
  model.predict(X100).min()\nmodel.predict(X100).max()\nshap_values[18:19,:]\nX[18:19]\n\
  model.predict(X[18:19])\nshap_values[18:19,:].values.sum() + shap_values[18:19,:].base_values\n\
  ```\n\n因此，第 18 条记录的预测结果为 16.178，而来自不同特征的 SHAP 值之和加上基础值（即平均预测值）等于预测值 16.178。\n\n\
  ```\nshap.plots.scatter(shap_values[:,\"RM\"])\n```\n\n在图 5-6 中，关系是线性的，因为 SHAP 值是使用线性模型作为解释器生成的。如果你切换到非线性模型，可以预期这条线将是非线性的。\n\
  \n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig7_HTML.jpg](img/506619_1_En_5_Fig7_HTML.jpg)\n\
  \n**图 5-7** 预测结果与 SHAP 值之间的关系\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig6_HTML.jpg](img/506619_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6** `RM`与`RM`的 SHAP 值之间的线性关系\n\n```\n# waterfall_plot 展示了如何从 shap_values.base_values\
  \ 得到 model.predict(X)[sample_ind]\nshap.plots.waterfall(shap_values[sample_ind],\
  \ max_display=14)\n```\n\n在图 5-7 中，水平轴显示预测结果的平均值（22.841），垂直轴显示来自不同特征的 SHAP 值。数据集中每个特征的假定值以灰色显示，负\
  \ SHAP 值以蓝色显示，正 SHAP 值以红色显示。垂直轴还显示了第 18 条记录的预测结果，即 16.178。\n\n\n\n### 使用可解释的增强模型\n\
  \n在本节中，你将使用广义加性模型（GAM）来预测房价。你可以使用 SHAP 库来解释拟合后的模型。广义加性模型可以使用 `interpret` Python\
  \ 库进行训练，然后将训练好的模型对象传递给 SHAP 模型，以生成对增强模型的解释。\n\n`interpret` 库可以通过三种方式安装：\n\n```\n\
  !pip install interpret-core\n```\n\n这是使用 `pip install` 过程，没有任何依赖项。\n\n```\nconda\
  \ install -c interpretml interpret-core\n```\n\n这是使用 anaconda 发行版。你可以从 conda 环境的终端进行安装。\n\
  \n```\ngit clone https://github.com/interpretml/interpret.git && cd interpret/scripts\
  \ && make install-core\n```\n\n这是直接从 GitHub 源码安装。\n\n`interpret` Python 库支持两种算法：\n\
  \n- **玻璃箱模型**：这些模型旨在更具可解释性，使用 `scikit-learn` 框架，同时保持与最先进的 `sklearn` 库相同的精度水平。它们支持四种不同类型的模型：线性模型、决策树、决策规则和基于增强的模型。\n\
  - **黑盒解释器**：这些解释器旨在提供关于模型行为及模型预测的近似解释。当机器学习模型的任何组件都不可解释时，这些算法变体将非常有用。它们支持 Shapley\
  \ 解释、LIME 解释、部分依赖图和 Morris 敏感性分析。\n\n```\n# 对数据拟合 GAM 模型\nimport interpret.glassbox\n\
  model_ebm = interpret.glassbox.ExplainableBoostingRegressor()\nmodel_ebm.fit(X,\
  \ y)\n```\n\n首先，你必须从 `interpret` 导入 `glassbox` 模块，初始化可解释增强回归器，并拟合模型。模型对象是 `model_ebm`。\n\
  \n```\n# 使用 SHAP 解释 GAM 模型\nexplainer_ebm = shap.Explainer(model_ebm.predict, X100)\n\
  shap_values_ebm = explainer_ebm(X)\n```\n\n你将采样训练数据集，并取 100 个样本，为使用 SHAP 库生成解释创建背景。在\
  \ SHAP 解释器中，你使用 `model_ebm.predict`，并取 100 个样本生成解释。\n\n```\n# 制作一个标准的偏依赖图，并叠加单个\
  \ SHAP 值\nfig,ax = shap.partial_dependence_plot(\n\"RM\", model_ebm.predict, X,\
  \ model_expected_value=True,\nfeature_expected_value=True, show=False, ice=False,\n\
  shap_values=shap_values_ebm[sample_ind:sample_ind+1,:]\n)\n```\n\n图 5-8 展示了基于增强的模型。你可以看到一个分阶段的非线性曲线，以及\
  \ RM 值与预测目标列（即房价平均值）之间的非线性关系。这里再次解释的是同一个第 18 条记录，如红色直线所示。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig8_HTML.jpg](img/506619_1_En_5_Fig8_HTML.jpg)\n\
  \n**图 5-8** RM 特征的增强模型 PDP 图\n\n```\nshap.plots.scatter(shap_values_ebm[:,\"RM\"\
  ])\n```\n\n在图 5-9 中，关系显示为一条非线性曲线。在初始阶段，随着 RM 的增加，预测值增加不多，但在某个阶段之后，随着 RM 值的增加，RM\
  \ 的 SHAP 值也呈指数级增长。另请参见图 5-10。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig10_HTML.jpg](img/506619_1_En_5_Fig10_HTML.jpg)\n\
  \n**图 5-10** 同一组变量的瀑布图\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig9_HTML.jpg](img/506619_1_En_5_Fig9_HTML.jpg)\n\
  \n**图 5-9** RM 与 RM 的 SHAP 值\n\n```\n# waterfall_plot 展示了如何从 explainer.expected_value\
  \ 得到 model.predict(X)[sample_ind]\nshap.plots.waterfall(shap_values_ebm[sample_ind],\
  \ max_display=14)\n```\n\n```\n# waterfall_plot 展示了如何从 explainer.expected_value\
  \ 得到 model.predict(X)[sample_ind]\nshap.plots.beeswarm(shap_values_ebm, max_display=14)\n\
  ```\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig11_HTML.jpg](img/506619_1_En_5_Fig11_HTML.jpg)\n\
  \n**图 5-11** 特征值与 SHAP 值\n\n图 5-11 是 SHAP 值和特征值的另一种可视化。\n\n```\n# 训练 XGBoost 模型\n\
  import xgboost\nmodel_xgb = xgboost.XGBRegressor(n_estimators=100, max_depth=2).fit(X,\
  \ y)\n# 使用 SHAP 解释 GAM 模型\nexplainer_xgb = shap.Explainer(model_xgb, X100)\nshap_values_xgb\
  \ = explainer_xgb(X)\n# 制作一个标准的偏依赖图，并叠加单个 SHAP 值\nfig,ax = shap.partial_dependence_plot(\n\
  \"RM\", model_xgb.predict, X, model_expected_value=True,\nfeature_expected_value=True,\
  \ show=False, ice=False,\nshap_values=shap_values_ebm[sample_ind:sample_ind+1,:]\n\
  )\n```\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig12_HTML.jpg](img/506619_1_En_5_Fig12_HTML.jpg)\n\
  \n**图 5-12** RM 的 PDP 图与提取的 SHAP 值\n\n在图 5-12 中，使用极端梯度提升回归模型来解释集成模型，这里你也可以看到存在非线性关系。\n\
  \n```\nshap.plots.scatter(shap_values_xgb[:,\"RM\"])\n```\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig13_HTML.jpg](img/506619_1_En_5_Fig13_HTML.jpg)\n\
  \n**图 5-13** RM 与 RM 的 SHAP 值散点图\n\n在图 5-13 中，有一条曲线显示了 RM 与 RM 的 SHAP 值之间的非线性关联。\n\
  \n```\nshap.plots.scatter(shap_values_xgb[:,\"RM\"], color=shap_values)\n```\n\n\
  图 5-14 显示了相同的非线性关系，并额外叠加了 TAX 特征，这表明 RM 值越高，TAX 分量越高，反之亦然。\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig14_HTML.jpg](img/506619_1_En_5_Fig14_HTML.jpg)\n\
  \n**图 5-14** RM 与 RM 的 SHAP 值可以通过第三个维度（即颜色）来展示\n\n\n\n### 集成分类模型：SHAP\n\n对于回归模型，你已经了解了\
  \ SHAP 特征和特征重要性，两者都包含针对少数特征的偏依赖图。现在，让我们来看一个常见且流行的收入普查分类数据集（通常称为成人数据集）。它之所以流行，是因为它易于理解、贴近生活，并且几乎出现在所有机器学习示例代码中。\n\
  \n```\n# 一个经典的成人普查数据集\nX_adult, y_adult = shap.datasets.adult()\n# 一个简单的线性逻辑模型\n\
  model_adult = sklearn.linear_model.LogisticRegression(max_iter=10000)\nmodel_adult.fit(X_adult,\
  \ y_adult)\n```\n\n在上述脚本中，加载了已属于 SHAP 库一部分的普查收入数据集。由于这是一个二分类问题，因此训练了一个逻辑回归模型。最后，通过模型拟合过程创建了一个训练好的模型。\n\
  \n```\ndef model_adult_proba(x):\n    return model_adult.predict_proba(x)[:,1]\n\
  def model_adult_log_odds(x):\n    p = model_adult.predict_log_proba(x)\n    return\
  \ p[:,1] - p[:,0]\n```\n\n对于使用普查收入数据集的分类示例，目标列有两个标签：年收入超过 5 万美元的人和年收入低于 5 万美元的人。这是一个二分类模型，作为基线，你可以使用逻辑回归模型来展示作为\
  \ SHAP 值线性函数的 PDP。然后，你可以使用集成模型来比较 PDP，并展示函数如何变为非线性。集成模型捕捉了这种非线性和复杂的关系。名为 `model_proba`\
  \ 和 `model_log_odds` 的两个函数分别提供了两个类别的概率值和对数几率比。\n\n```\n# 制作一个标准的偏依赖图\nsample_ind\
  \ = 18\nfig, ax = shap.partial_dependence_plot(\n    \"Capital Gain\", model_adult_proba,\
  \ X_adult, model_expected_value=True,\n    feature_expected_value=True, show=False,\
  \ ice=False\n)\n```\n\n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig15_HTML.jpg](img/506619_1_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15\n\n资本收益与收入低于 5 万美元概率之间的 PDP\n\n图 5-15 的 x 轴显示资本收益变量，y 轴显示收入低于 5 万美元的预测概率。概率值范围从\
  \ 0.05 到 0.99，之后变得平坦，接近 100% 但并非恰好 100%。这里的解释是，当资本收益金额超过 2 万美元时，它对预测概率值没有影响。在 2\
  \ 万美元以内，随着资本收益的增加，预测概率也会增加。\n\n```\n### 计算线性模型的 SHAP 值\nbackground_adult = shap.maskers.Independent(X_adult,\
  \ max_samples=100)\nexplainer = shap.Explainer(model_adult_proba, background_adult)\n\
  shap_values_adult = explainer(X_adult[:1000])\nshap.plots.scatter(shap_values_adult[:,\"\
  Age\"])\n```\n\n图 5-16 显示了线性关系，但数据点的分散程度存在变化，这表明可能存在非线性，并且线性模型无法正确捕捉这种非线性。因此，需要使用集成模型。\n\
  \n![../images/506619_1_En_5_Chapter/506619_1_En_5_Fig16_HTML.jpg](img/506619_1_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16\n\n线性模型中年龄与年龄 SHAP 值的散点图\n\n```\n### 计算线性模型的 SHAP 值\nexplainer_log_odds\
  \ = shap.Explainer(model_adult_log_odds, background_adult)\nshap_values_adult_log_odds\
