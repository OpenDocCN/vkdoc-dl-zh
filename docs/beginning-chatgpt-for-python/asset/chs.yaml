  \ 机器人的首次对话\n```\n\n\n\n## 我们取得了一项里程碑式的成就……但有一个小缺陷\n\n好了，如果你退后一步审视我们目前取得的成果，你应该会意识到，我们正见证着一项堪称里程碑式的成就。我们拥有以下成果：\n\
  \n-   一个由几个脚本组成的系统，允许用户输入问题，并获得关于如何使用我们移动应用的答案。\n-   通过一个简单的文本文件，我们可以教会机器人如何回答用户的问题。这个文本文件可以由公司里的任何人编辑，并可作为知识库，日复一日地帮助提升机器人的智能。这真是太棒了。\n\
  -   我们的系统允许客户使用自然语言输入问题，机器人则会向他们提供智能答案。你知道吗？客户不喜欢阅读常见问题解答（FAQ）——尤其是那些特别长的。然而，使用这个系统，他们就不需要了！他们只需提出与自己相关的问题即可。\n\
  \n那么，在我们取得所有这些成就的同时，却有一个*巨大*的缺陷不容忽视。在上面的代码清单 7-5 中，机器人对用户说：\n\n```\nOnce you're\
  \ logged in, you can set up Touch ID or Face ID for quicker, secure login in the\
  \ future.\n```\n\n不，不，不！坏机器人！如果你没有完整阅读常见问题解答文件，请允许我解释一下这里出了什么问题：\n\n1.  代码清单 7-1\
  \ 中的 `FAQ.txt` 文件明确指出，Crook's Bank 移动应用是一个移动应用。目前，Touch ID 只能用于苹果台式机和笔记本电脑。所以，这根本说不通。\n\
  2.  `FAQ.txt` 文件中完全没有提到使用 Face ID 进行移动应用身份验证。\n\n所以，不幸的是，ChatGPT 在编造一些根本不真实的事情，并假设存在某些并不存在的功能。因此，就真正的技术支持而言，这是绝对不可接受的。\n\
  \n那么，我们该如何解决这个问题呢？在阅读下一节之前，先思考一下*你*会如何解决这个问题。\n\n## 更新发送给 ChatGPT 的系统消息，再试一次\n\n\
  你想出解决方案了吗？解决这个问题的一种方法是更新系统消息。请参考上面代码清单 7-2 中的以下代码行：\n\n```\nsystem_message_to_chatgpt\
  \ = \"You are a virtual assistant that provides support for the Crooks Bank banking\
  \ app. \";\n```\n\n请记住，系统消息向 ChatGPT 指明了它在聊天对话中的角色。目前，它被设定为一个乐于助人的助手，因此它擅自猜测移动应用中存在某些功能。现在，让我们确保\
  \ ChatGPT 不会做出任何假设。将系统消息更新如下所示：\n\n```\nsystem_message_to_chatgpt = \"You are a\
  \ virtual assistant that provides support for the Crooks Bank banking app. You will\
  \ be provided Information about the application, and users will ask you questions\
  \ about the application. Your role is to answer questions explicitly from the training\
  \ information. If you were not given an answer to a question, then provide an apologetic\
  \ message to the user explaining that you do not know the answer.\";\n```\n\n就是这样。`FAQ.txt`\
  \ 文件保持与之前完全相同，我们只需要更新系统消息，让 ChatGPT 知道它在对话中的角色。代码清单 7-6 展示了我们与 Discord 机器人的新对话。\n\
  \n```\nMe: How are you today?\nQ and A Bot: As a virtual assistant, I don't have\
  \ feelings or emotions, but I'm here and ready to assist you. How may I help you\
  \ with the Crooks Bank Mobile App today?\nMe: I have an old Blackberry phone, is\
  \ the app supported on my device?\nQ and A Bot: I'm sorry, but from the information\
  \ provided, the Crooks Bank Mobile App can only be downloaded from the App Store\
  \ for iOS devices and Google Play for Android devices. BlackBerry devices are not\
  \ mentioned, therefore I cannot confirm that it would be compatible.\nMe: So, if\
  \ I use an iPhone, how do I setup the app?\nQ and A Bot: To set up the Crooks Bank\
  \ Mobile App on your iPhone, you can download it from the App Store. Simply search\
  \ for \"Crooks Bank Mobile App\" and click the \"Install\" button. After the installation\
  \ is finished, open the app and follow the prompts to set up your account. If you\
  \ already have an account, use your login information to access your account through\
  \ the app.\n代码清单 7-6\n我们与智能问答 Discord 机器人的第二次（也是更好的）对话\n```\n\n现在，好多了！我们的技术支持机器人“严格遵守脚本”，不允许编造或假设任何事情。\n\
  \n## 结论\n\n在本章中，我们收获颇丰！我们拥有一个功能完备的 Discord 机器人，任何人都可以使用一个简单的文本文件来训练它，而无需任何 AI、NLP\
  \ 或机器学习经验。我们了解到，一个“乐于助人的助手”有时可能会变得*过于热心*，并假设一些不真实的事实。然而，我们也再次强调了系统消息的概念和价值，这是提示工程的重要组成部分。\n\
  \n现在，我们已经让我们的问答 Discord 机器人变得智能，接下来让我们看看如何让我们的内容审核机器人也变得智能吧！\n\n\n\n# 8. 为 Discord\
  \ 机器人注入智能，第二部分：使用聊天与审核模型进行内容审核\n\n在本章中，我们将采取必要步骤，使我们的内容审核 Discord 机器人具备人工智能。让我们概述一下将要进行的更改：\n\
  \n*   创建一个新脚本 `moderation_client.py`，用于调用 OpenAI API 的 `OpenAI.moderations.create()`\
  \ 方法。审核模型使我们能够识别任何文本内容是否属于以下类别：\n    *   仇恨言论\n    *   仇恨/威胁性言论\n    *   骚扰\n  \
  \  *   骚扰/威胁性言论\n    *   自残\n    *   自残/意图\n    *   自残/指导\n    *   色情内容\n    * \
  \  色情内容/涉及未成年人\n    *   暴力内容\n    *   暴力内容/血腥画面\n\n*   复用上一章中的 `chatgpt_client_for_qa_and_moderation.py`\
  \ 脚本。在第 7 章中，该脚本用于调用 OpenAI 的 Chat 类，以回答用户提出的问题。在本章中，它将再次用于调用 Chat 类，但这次是为了审核目的。这就是为什么该脚本被恰当地命名为\
  \ `chatgpt_client_for_qa_and_moderation`，因为它既用于第 7 章的问答，也用于本章的审核。\n\n*   修改我们的 `content_moderator_bot.py`\
  \ 脚本（原名为 `content_moderator_bot_dumb.py`），使其能够同时调用 `moderation_client.py` 和 `chatgpt_client_for_qa_and_moderation.py`。如果任一脚本指示\
  \ Discord 频道中输入的内容存在异议，它将从该 Discord 频道中删除该消息。请记住，此机器人会监控 Discord 服务器中所有频道的所有内容！\n\
  \n现在，你可能会问自己，既然审核类已经知道如何标记任何有害内容，为什么我们还需要使用聊天类呢？问得好。\n\n是的，审核类能让我们了解有害内容，但它**不会**告知我们其他类型的不当内容（针对我们的用例而言），例如当不怀好意的人试图引诱我们的用户陷入骗局时。请记住，这是一个银行应用的\
  \ Discord 服务器，因此诈骗者肯定会非常乐意针对该服务器的所有成员，因为这里聚集了大量银行用户！\n\n因此，我们将使用 `moderation_client.py`\
  \ 调用审核类，以了解 Discord 服务器中是否存在任何有害内容；同时，我们将复用上一章的 `chatgpt_client_for_qa_and_moderation.py`\
  \ 来调用聊天方法，以便了解 Discord 服务器中是否发布了任何其他不良内容，例如诈骗企图。\n\n## 使用 `OpenAI.moderations.create()`\
  \ 审核内容\n\n通过使用审核模型，开发者可以提交一段文本，并随后了解该文本是否包含暴力、仇恨和/或威胁性内容，或任何形式的骚扰。\n\n表 8-1 描述了调用\
  \ `OpenAI.moderations.create()` 方法所需参数的格式。该服务使用起来非常简单，因为只需一个参数即可正确调用该服务。\n\n###\
  \ 检查方法参数\n\n**表 8-1** 审核模型的请求体\n\n| 字段 | 类型 | 是否必需 | 描述 |\n| --- | --- | --- | ---\
  \ |\n| `input` | 字符串或列表 | 必需 | 需要分类的文本。 |\n| `model` | 字符串默认值：`omni-moderation-latest`\
  \ | 可选 | 有多个内容审核模型可供使用，例如：`omni-moderation-latest`、`text-moderation-stable`、`text-moderation-latest`。默认情况下，此参数设置为\
  \ `omni-moderation-latest`。它会随时间自动升级，确保你始终使用最准确的模型。如果你决定使用任何基于文本的审核模型，则只能提交文本进行评估。然而，全能审核模型能够评估文本和图像内容。因此，请选择最适合你用例的模型。\
  \ |\n\n### 处理响应\n\n成功调用审核模型后，该方法将返回一个响应，其结构如表 8-2 所示。\n\n\n\n### 审核（字典）\n\n**表 8-2**\
  \ 审核响应的结构\n\n| 字段 | 类型 | 描述 |\n| --- | --- | --- |\n| `id` | String | 审核请求的唯一标识符。\
  \ |\n| `model` | String | 用于执行审核请求的模型。 |\n| `results` | List | 审核对象列表。 |\n| ↳ `flagged`\
  \ | Boolean | 标记内容是否违反 OpenAI 的使用政策。 |\n| ↳ `categories` | List | 类别列表及其是否被标记。 |\n\
  |  ↳↳ `hate` | Boolean | 表示给定文本是否表达、煽动或宣扬基于种族、性别、宗教、民族、国籍、残疾状况、性取向或种姓的仇恨。 |\n|  ↳↳\
  \ `hate/threatening` | Boolean | 表示给定文本是否包含仇恨内容，并同时基于上述偏见对目标群体威胁实施暴力或严重伤害。 |\n|\
  \  ↳↳ `harassment` | Boolean | 表示给定文本是否包含表达、煽动或宣扬针对任何目标的骚扰性语言。 |\n|  ↳↳ `harassment/threatening`\
  \ | Boolean | 表示给定文本是否包含骚扰内容，并同时威胁对任何目标实施暴力或严重伤害。 |\n|  ↳↳ `self-harm` | Boolean\
  \ | 表示给定文本是否包含宣扬、鼓励或描述自残行为的内容，例如自杀、割伤和饮食失调。 |\n|  ↳↳ `self-harm/intent` | Boolean\
  \ | 表示给定文本是否包含说话者表示正在或意图进行自残行为的内容，例如自杀、割伤和饮食失调。 |\n|  ↳↳ `self-harm/instructions`\
  \ | Boolean | 表示给定文本是否包含鼓励进行自残行为的内容，例如自杀、割伤和饮食失调。这包括提供如何实施此类行为的指导或建议的内容。 |\n|  ↳↳\
  \ `sexual` | Boolean | 表示给定文本是否包含旨在引起性兴奋的内容，例如对性行为的描述。这包括推广性服务的内容；但**不包括**性教育和健康等主题。\
  \ |\n|  ↳↳ `sexual/minors` | Boolean | 表示给定文本是否包含涉及未满 18 岁个人的内容。 |\n|  ↳↳ `violence`\
  \ | Boolean | 表示给定文本是否包含描述死亡、暴力或身体伤害的内容。 |\n|  ↳↳ `violence/graphic` | Boolean |\
  \ 表示给定文本是否包含详细描述死亡、暴力或身体伤害的内容。 |\n| ↳ `category_scores` | List | 类别列表及其对应的模型评分。\
  \ |\n|  ↳↳ `hate` | Number | “hate”类别的评分。 |\n|  ↳↳ `hate/threatening` | Number |\
  \ “hate/threatening”类别的评分。 |\n|  ↳↳ `harassment` | Number | “harassment”类别的评分。 |\n\
  |  ↳↳ `harassment/threatening` | Number | “harassment/threatening”类别的评分。 |\n|  ↳↳\
  \ `self-harm` | Number | “self-harm”类别的评分。 |\n|  ↳↳ `self-harm/intent` | Number\
  \ | “self-harm/intent”类别的评分。 |\n|  ↳↳ `self-harm/instructions` | Number | “self-harm/instructions”类别的评分。\
  \ |\n|  ↳↳ `sexual` | Number | “sexual”类别的评分。 |\n|  ↳↳ `violence` | Number | “violence”类别的评分。\
  \ |\n|  ↳↳ `violence/graphic` | Number | “violence/graphic”类别的评分。 |\n\n以下列表是调用审核模型后返回的审核响应示例。表\
  \ 8-2 看起来有点复杂，但正如你所见，如果任何类别被标记为“true”，那么 `results.flagged` 节点也会被标记为“true”。\n\n请查看清单\
  \ 8-1，了解审核响应的实际示例。\n\n```\n{\n\"id\": \"modr-XXXXX\",\n\"model\": \"text-moderation-005\"\
  ,\n\"results\": [\n{\n\"flagged\": true,\n\"categories\": {\n\"sexual\": false,\n\
  \"hate\": false,\n\"harassment\": false,\n\"self-harm\": false,\n\"sexual/minors\"\
  : false,\n\"hate/threatening\": false,\n\"violence/graphic\": false,\n\"self-harm/intent\"\
  : false,\n\"self-harm/instructions\": false,\n\"harassment/threatening\": true,\n\
  \"violence\": true,\n},\n\"category_scores\": {\n\"sexual\": 1.2282071e-06,\n\"\
  hate\": 0.010696256,\n\"harassment\": 0.29842457,\n\"self-harm\": 1.5236925e-08,\n\
  \"sexual/minors\": 5.7246268e-08,\n\"hate/threatening\": 0.0060676364,\n\"violence/graphic\"\
  : 4.435014e-06,\n\"self-harm/intent\": 8.098441e-10,\n\"self-harm/instructions\"\
  : 2.8498655e-11,\n\"harassment/threatening\": 0.63055265,\n\"violence\": 0.99011886,\n\
  }\n}\n]\n}\n```\n**清单 8-1** 审核响应\n\n## 为审核模型创建客户端：`moderation_client.py`\n\n清单 8-2\
  \ 是我们用于调用审核模型的客户端。请先查看它，然后我们将讨论其中的重要部分。\n\n```\nimport os\nfrom dotenv import load_dotenv\n\
  from openai import OpenAI\nclass ModerationResponse:\ndef __init__(self):\nload_dotenv()\n\
  self.client = OpenAI()\ndef moderate_text(self, text):\nmoderation = self.client.moderations.create(input=text)\n\
  return moderation\n```\n**清单 8-2** `moderation_client.py`\n\n在本书的前几章中，我们为 OpenAI\
  \ API 类的各种方法创建了客户端脚本。因此，上面 `moderation_client.py` 中的 `ModerationResponse` 类应该看起来相当熟悉。归根结底，我们有一个简单的函数\
  \ `moderate_text()`，它允许我们传递要评估的文本并返回响应。\n\n## 让 `content_moderator_bot.py` 更智能\n\
  \n现在我们有了用于调用审核模型的 `moderation_client.py`，让我们看看更新后的 `content_moderator_bot.py`（之前名为\
  \ `content_moderator_bot_dumb.py`），它将使用 `moderation_client.py` 检查有害内容，并使用 `chatgpt_client_for_qa_and_moderation.py`（与前一章相比未修改）检查潜在的诈骗。\n\
  \n清单 8-3 是我们智能 Discord 审核机器人 `content_moderator_bot.py` 的完整源代码。\n\n\n\n```python\n\
  \"\"\"\ncontent_moderation_bot.py\n一个集成了 ChatGPT 和审核服务的 Discord 机器人，用于 Discord 服务器的自动内容审核。\n\
  该脚本使用`discord.Client()`类初始化一个 Discord 机器人，并监听消息发送等事件。当收到消息时，它会同时调用 ChatGPT API 和审核服务来分析消息内容是否违反规则。如果任一服务标记了该消息，机器人将删除该消息，并向用户发送通知，说明其为何被视为不当内容。\n\
  \n依赖项：\n- discord (https://pypi.org/project/discord.py/)\n- chatgpt_client_for_qa_and_moderation\
  \ (假设为自定义模块，提供与 ChatGPT 的交互)\n- moderation_client (假设为自定义模块，提供与审核服务的交互)\n\n使用方法：\n\
  1. 将`DISCORD_TOKEN`变量替换为从 Discord 开发者门户获取的机器人令牌。\n2. 确保`chatgpt_client_for_qa_and_moderation`和`moderation_client`模块已正确实现并可访问。\n\
  \n注意：此脚本假设存在用于与 ChatGPT 和审核服务交互的模块。\n\"\"\"\nimport discord\nfrom chatgpt_client_for_qa_and_moderation\
  \ import ChatGPTClient\nfrom moderation_client import ModerationResponse\n\n###\
  \ 用于身份验证的机器人令牌\nDISCORD_TOKEN = ''\n\n### 初始化 Discord 客户端\ndiscord_client = discord.Client()\n\
  \n### 为 ChatGPT 创建系统消息\nsystem_message_to_chatgpt = \"\"\"\n你是 Discord 服务器的自动审核助手。\n\
  请检查每条消息是否存在以下违规行为：\n1. 敏感信息\n2. 辱骂\n3. 不当评论\n4. 垃圾信息，例如：全大写字母的消息、重复多次的相同短语或单词、超过\
  \ 3 个感叹号或问号。\n5. 广告\n6. 外部链接\n7. 政治消息或辩论\n8. 宗教消息或辩论\n如果检测到任何违规行为，请回复\"FLAG\"（大写，不含引号）。如果消息符合规则，请回复\"\
  SAFE\"（大写，不含引号）。\n\"\"\"\n\ninitial_instructions_to_chatgpt = \"分析以下消息是否存在违规行为：\"\
  \n\n### 初始化 ChatGPT 客户端\nchatgpt_client_for_qa_and_moderation = ChatGPTClient(system_message_to_chatgpt,\
  \ initial_instructions_to_chatgpt)\n\n### 初始化审核客户端\nmoderation_client = ModerationResponse()\n\
  \n### 机器人就绪时的事件处理程序\n@discord_client.event\nasync def on_ready():\n    \"\"\"\n\
  \    当机器人成功登录并准备好接收事件时触发的事件处理程序。\n    \"\"\"\n    print('已登录为', discord_client.user)\n\
  \    print('------')\n\n### 收到消息时的事件处理程序\n@discord_client.event\nasync def on_message(message):\n\
  \    \"\"\"\n    收到消息时触发的事件处理程序。\n    参数：\n    message (discord.Message)：机器人收到的消息。\n\
  \    返回：\n    None\n    \"\"\"\n    # 忽略机器人自己发送的消息，防止自我响应\n    if message.author\
  \ == discord_client.user:\n        return\n\n    # 调用审核方法检查有害内容\n    moderation_response\
  \ = moderation_client.moderate_text(message.content)\n\n    # 调用 ChatGPT 根据收到的消息生成响应\n\
  \    response_from_chatgpt = chatgpt_client_for_qa_and_moderation.send_message_from_discord(message.content)\n\
  \n    # 检查 ChatGPT 的响应是否为\"FLAG\"，或审核响应是否标记了输入内容\n    if response_from_chatgpt ==\
  \ \"FLAG\" or moderation_response.results[0].flagged:\n        # 删除消息\n        await\
  \ message.delete()\n        # 提及发送不当消息的用户\n        author_mention = message.author.mention\n\
  \        # 发送一条消息，提及用户并解释为何不当\n        await message.channel.send(f\"{author_mention}\
  \ 此评论被视为不适合本频道。\" +\n                                   \"如果您认为这是误判，请联系人工服务器管理员。\"\
  )\n\n### 使用提供的令牌运行机器人\ndiscord_client.run(DISCORD_TOKEN)\n```\n\n**清单 8-3** `content_moderator_bot.py`\n\
  \n### 对 `on_message(message)` 函数的更新\n\n在 Discord 服务器的任何频道中收到消息后，`on_message(message)`\
  \ 函数会被异步调用。以下是需要注意的最重要的更改：\n\n```python\n#### 调用审核模型检查有害内容\nmoderation_response\
  \ = moderation_client.moderate_text(message.content)\n#### 调用 ChatGPT 根据收到的消息生成响应\n\
  response_from_chatgpt = chatgpt_client_for_qa_and_moderation.send_message_from_discord(message.content)\n\
  #### 检查 ChatGPT 的响应是否为\"FLAG\"，或审核响应是否标记了输入内容\nif response_from_chatgpt == \"FLAG\"\
  \ or moderation_response.results[0].flagged:\n    # 删除消息\n    await message.delete()\n\
  \    # 提及发送不当消息的用户\n    author_mention = message.author.mention\n    # 发送一条消息，提及用户并解释为何不当\n\
  \    await message.channel.send(f\"{author_mention} 此评论被视为不适合本频道。\" +\n        \
  \                       \"如果您认为这是误判，请联系人工服务器管理员。\")\n```\n\n在这里，我们获取在 Discord 服务器中发布的每条消息，并使用`Moderations`类和`Chat`方法进行检查。如果任一方法返回信息告知我们消息被标记，则删除频道中的消息，并通知用户其消息违反了规则。\n\
  \n现在我们的内容审核 Discord 机器人已经智能化，让我们试试看吧！\n\n## 运行我们的智能内容审核机器人：`content_moderator_bot.py`\n\
