  列表 4-1\nSlack 频道中试图分析客户问题的团队成员\n```\n\n## 提示工程入门：文本摘要\n\n所以，不用说，没人愿意整天在 Slack 频道里滚动阅读那些“火烧眉毛”的问题。我们将利用\
  \ ChatGPT 的文本摘要能力。为简单起见，让我们尝试几个提示，将整个聊天消息列表发送给 ChatGPT，以便它为我们生成所有已发生事件的可用的摘要。\n\n\
  \n\n### 提示 #1：`“tl;dr”`\n\n这个提示简短、精炼且直击要点。如果你不熟悉它，这是一个在网络上经常使用的术语，用来简要总结一篇长文章。它的字面意思是“太长，没读”（too\
  \ long; didn’t read），这也是我在工作繁忙时，对 `Slack` 上许多对话的感受。方便的是，`ChatGPT` 能够理解这个简单的术语（我不一定称它为单词）作为提示，而且效果相当令人印象深刻。\n\
  \n```\nSystem: You are a helpful assistant\nUser:  Fatima [16:00 | 02/08/2019]:\
  \ Hey everyone, I have an urgent ...\nUser: Tl;dr\nModel: gpt-4o\nTemperature: 1\n\
  Maximum length: 360\nTop P: 1\nFrequency penalty: 0\nPresence penalty: 0\nListing\
  \ 4-2\nPROMPT. 请求对较长对话的摘要版本\n```\n\n请注意，令牌数量被控制在较小的 360 个，这最终有助于 `ChatGPT` 生成简短的回复。同时，可以看到温度设置为\
  \ 1（默认值），但 `Top P` 被增加到了最大值（即 1）。因此，调整温度和其他设置来控制 `ChatGPT` 回复的语气和多样性是很重要的。\n\n下面的列表\
  \ 4-3 展示了 `ChatGPT` 对列表 4-1 中对话的总结。\n\n```\nThe team quickly responds to a client's\
  \ app crashing issue. John investigates the codebase while Fatima gathers information\
  \ from the client. They discover a compatibility issue with iOS 15.1 and John fixes\
  \ it. The patch is reviewed and approved, and the app is updated in the store. The\
  \ client is informed and grateful for the quick resolution. The team is praised\
  \ for their collaboration and prompt action.\nListing 4-3\nRESPONSE. 获取超长对话的摘要版本\n\
  ```\n\n太棒了！它将那段极长的对话缩减成了一个只有 68 个单词的简单摘要。如你所见，`ChatGPT` 并非要取代某个工作岗位，但它无疑能提高人们的工作效率。现在，让我们再试试几个提示，好吗？\n\
  \n### 提示 #2：`“用三句话或更少的话解释这个”`\n\n那么，如果 `“tl;dr”` 提供的解释对你来说还不够简短，我们可以告诉 `ChatGPT`\
  \ 让事情变得更简单。`ChatGPT` 在处理参数方面表现良好，所以让我们指定解释内容不能超过三句话。\n\n```\nSystem: You are a helpful\
  \ assistant\nUser:  Fatima [16:00 | 02/08/2019]: Hey everyone, I have an urgent\
  \ ...\nUser: Explain this in 3 sentences or less.\nModel: gpt-4o\nTemperature: 1\n\
  Maximum length: 250\nTop P: 0\nFrequency penalty: 0\nPresence penalty: 0\nListing\
  \ 4-4\nPROMPT. 请求对较长对话的更短版本\n```\n\n你可能已经注意到，在这个例子中温度设置为 0.82。我们确实希望 `ChatGPT` 能给出一个简洁的答案，所以越“干巴巴”越好。\n\
  \n```\nA customer reported an urgent issue of app crashes to the team. John investigates\
  \ the issue and asks Fatima to gather additional information from the client. They\
  \ discover that the issue is related to a compatibility problem with iOS 15.1\\\
  . John fixes the problem and Keith approves the deployment of the fix to the client's\
  \ production environment.\nListing 4-5\nRESPONSE. 获取三句话摘要\n```\n\n### 提示 #3：`“我是一名经理。向我解释发生了什么”`\n\
  \n当你不想成为那个唯一听不懂的人时，`ChatGPT` 能够重新表述已经说过的话，并将其分解，直到变得非常简单易懂。\n\n```\nSystem: You\
  \ are a helpful assistant\nUser:  Fatima [16:00 | 02/08/2019]: Hey everyone, I have\
  \ an urgent ...\nUser: Summarize this conversation and explain it to me like I'm\
