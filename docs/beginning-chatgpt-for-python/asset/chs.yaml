- "# 2. 使用 ChatGPT 作为你的 Python 结对编程伙伴\n\n我是 XP（极限编程）某些实践的忠实粉丝，尤其是结对编程。无论你喜欢哪种风格的结对编程，它都涉及两名工程师坐在同一屏幕前，共同解决同一个问题。你获得的最大好处之一就是为问题带来新的视角，当然，现在有两名工程师“接触”过代码库，而不是只有一名。有时，你可以让一名工程师编写代码，另一名编写测试和注释。无论你如何划分，这都是好事。\n\
  \n\n\n## 概述\n\n本章将引导您获取并测试您的 API 密钥，让您熟悉如何调用 OpenAI Python API 来使用 ChatGPT，并介绍如何将其应用于其他模型。此外，我们将把\
  \ ChatGPT 作为结对编程伙伴，开发一个应用程序，该程序能够接收城市名称和您希望到达工作地点的时间，然后根据交通状况为您提供天气和预计到达时间！听起来很激动人心吧？那么，让我们马上开始吧。\n\
  \n## 使用 `pip` 安装（或更新）OpenAI 库\n\n要使用 Python 的 OpenAI 库，您的机器上至少需要安装 Python 3.7.1。要检查您安装的\
  \ Python 版本，只需打开一个终端窗口，然后执行：\n\n```\npython3 -v\n```\n\n如果已安装 Python 3，终端将显示您拥有的版本。当然，如果终端提示您使用的是不兼容的版本（即低于\
  \ 3.7.1），那么您应该更新机器上的 Python。此外，如果您根本没有安装 Python 3，那么您应该在继续之前安装它。\n\n现在您已经满足了所有先决条件，是时候安装\
  \ OpenAI Python 库本身了。回到您的终端窗口，执行以下命令：\n\n```\npip install --upgrade openai\n```\n\
  \n上面的命令将为您安装 OpenAI 库（如果尚未安装），如果已安装，则会将其更新到最新版本。\n\n## 设置 API 密钥的三种方法\n\n在设置 OpenAI\
  \ API 的 API 密钥时，有多种方法可供选择，每种方法都针对特定的项目需求和安全考虑而设计。\n\n### 选项 #1：设置系统级环境变量\n\n环境变量方法会建立一个系统级的环境变量来存储\
  \ API 密钥。这为密钥管理提供了一个集中点，简化了跨不同项目的部署。\n\n让我们看看具体的操作步骤。\n\n#### 对于 Mac OS\n\n首先，打开终端。您可以在“应用程序”文件夹中找到它，或使用聚焦搜索（Command\
  \ + Space）进行搜索。\n\n接下来，编辑您的 bash 配置文件。对于较旧的 MacOS 版本，您需要使用命令 `nano ~/.bash_profile`。较新\
  \ MacOS 版本的用户需要使用 `nano ~/.zshrc`。这将在文本编辑器中打开配置文件。\n\n现在，让我们添加您的环境变量。在编辑器中，添加下面这一行，将\
  \ `'your-api-key-here'` 替换为您的实际 API 密钥（不要包含单引号）。\n\n```\nexport OPENAI_API_KEY='your-api-key-here'\n\
  ```\n\n让我们保存并退出，按 `Ctrl+O` 写入更改，然后按 `Ctrl+X` 关闭编辑器。\n\n现在，您需要加载您的配置文件，对于较旧的 Mac\
  \ OS 版本使用 `source ~/.bash_profile`，对于较新的 Mac OS 版本使用 `source ~/.zshrc`。这将加载更新后的配置文件。\n\
  \n最后，我们将验证一切是否正确完成。在终端中，输入 `echo $OPENAI_API_KEY`。如果一切顺利，它将显示您的 API 密钥，确认设置成功。\n\
  \n```\necho $OPENAI_API_KEY\n```\n\n#### 对于 Windows\n\n首先打开命令提示符。您可以在开始菜单中搜索 \"\
  cmd\" 来找到它。\n\n现在，我们将使用以下命令在当前会话中设置环境变量，将 `'your-api-key-here'` 替换为您的实际 API 密钥。此命令为当前会话设置\
  \ `OPENAI_API_KEY`。\n\n```\nsetx OPENAI_API_KEY 'your-api-key-here'\n```\n\n您可以通过系统属性添加变量来使设置永久生效：\n\
  \n*   右键单击“此电脑”或“我的电脑”，然后选择“属性”。\n*   点击“高级系统设置”。\n*   点击“环境变量”按钮。\n*   在“系统变量”部分，点击“新建...”，然后输入\
  \ `OPENAI_API_KEY` 作为变量名，输入您的 API 密钥作为变量值。\n\n为确保一切正常工作，请重新打开命令提示符并输入以下命令来验证设置。它应该会显示您的\
  \ API 密钥。\n\n```\necho %OPENAI_API_KEY%\n```\n\n#### 对于 Linux\n\n要为当前会话设置环境变量，请打开一个终端窗口并使用\
  \ `export` 命令。将 `'your-api-key-here'` 替换为您的实际 API 密钥。\n\n```\nexport OPENAI_API_KEY='your-api-key-here'\n\
  ```\n\n要使环境变量在会话之间持久化，您可以将其添加到 shell 的配置文件中，例如 Bash 的 `~/.bashrc`。操作方法如下：\n\n在文本编辑器中打开配置文件。例如：\n\
  \n```\nnano ~/.bashrc\n```\n\n在文件末尾添加以下行：\n\n```\nexport OPENAI_API_KEY='your-api-key-here'\n\
  ```\n\n保存文件并退出文本编辑器。\n\n要立即应用更改，您可以关闭并重新打开终端，或者运行：\n\n```\nsource ~/.bashrc\n```\n\
  \n要验证环境变量是否正确设置，您可以在终端中 `echo` 其值。此命令应显示您的 API 密钥：\n\n```\necho $OPENAI_API_KEY\n\
  ```\n\n### 选项 #2：创建 `.env` 文件\n\n使用系统级环境变量非常适合让机器上的任何应用程序或脚本都能访问 API 密钥。但是，如果您的用例更简单一些，我们可以简单地创建一个仅在特定程序或脚本范围内可访问的局部变量。这在不同项目需要不同密钥的情况下也很有用，因此可以防止密钥使用冲突。让我们开始吧！\n\
  \n我们将首先创建一个本地的 `.env` 文件。此文件将存放您的 API 密钥，确保它仅被指定的项目使用。导航到您打算创建 `.env` 文件的项目文件夹。\n\
  \n**注意：** 为防止您的 `.env` 文件通过版本控制被意外共享，请在项目的根目录中创建一个 `.gitignore` 文件。添加一行 `.env` 以确保您的\
  \ API 密钥和其他敏感信息的机密性。\n\n接下来，使用终端或 IDE 创建 `.gitignore` 和 `.env` 文件。复制您的 API 密钥，并将\
  \ `'your-api-key-here'` 替换为您的实际 API 密钥（不要包含单引号）。\n\n此时，您的 `.env` 文件应如下所示：\n\n```\n\
  OPENAI_API_KEY='your-api-key-here'\n```\n\n最后，您可以使用以下代码片段将 API 密钥导入到您的 Python 代码中。\n\
  \n```\nimport os\nfrom dotenv import load_dotenv\nfrom openai import OpenAI\n###\
  \ 从 .env 加载环境变量\nload_dotenv()\n### 使用环境变量中的 API 密钥\napi_key = os.getenv(\"OPENAI_API_KEY\"\
  )\nclient = OpenAI()\n清单 2-1\n将您的 .env 文件导入到 Python 应用程序中\n```\n\n\n\n### 选项 #3：在应用程序中直接硬编码\
  \ API 密钥（请谨慎使用）\n\n出于安全原因，不建议长期使用最后这种方法。但是，为了了解其工作原理，我们将介绍如何将 API 密钥硬编码到应用程序中，以便快速测试你的\
  \ API 密钥是否正常工作。\n\n首先，你需要在 Python 代码中将 API 密钥赋值给一个变量。将 `\"YOUR_API_KEY\"` 替换为你从\
  \ OpenAI 收到的实际 API 密钥。请确保此 API 密钥安全存放，不要公开分享。\n\n接下来，你需要在 Python 脚本中初始化 OpenAI 客户端。这通过实例化\
  \ `OpenAI` 类并将 `api_key` 参数设置为该 API 密钥来完成。通过在初始化时提供 API 密钥，你可以让 OpenAI 客户端访问 OpenAI\
  \ API 提供的服务。此步骤确保你的 Python 脚本能够使用指定的 API 密钥与 OpenAI API 进行通信。\n\n```python\nfrom\
  \ openai import OpenAI\n#### API 密钥\nAPI_KEY = \"your-api-key-here\"\n#### 使用硬编码的\
  \ API 密钥初始化 OpenAI 客户端\nclient = OpenAI(api_key=API_KEY)\n清单 2-2\n将你的 API 密钥直接编码到应用程序中\n\
  ```\n\n现在，让我们使用 OpenAI API 创建第一个应用程序，并通过获取 OpenAI API 可用模型列表来同时测试该密钥。\n\n> **注意**\
  \  \n> 从现在开始，代码示例将通过本地的 `.env` 文件访问我们的 API 密钥。\n\n## 创建你的第一个 Python ChatGPT 应用程序：`model_lister.py`\n\
  \n实际上，我们将在这里同时完成两项任务。我们将使用 OpenAI API 创建一个基本的 Python 应用程序，并在此过程中验证我们是否已正确获取 API\
  \ 密钥。因此，不言而喻，如果你还没有这样做，请按照第 1 章的说明创建你的 OpenAI 开发者帐户并获取 API 密钥。接下来，本书中的所有代码示例都需要一个有效的\
  \ API 密钥。\n\n### 使用 `OpenAI.models.list()` 获取可用模型列表\n\n我们可以调用的最基本（但也至关重要）的功能之一位于\
  \ `Model` 类中。你可能会问，为什么？`Model` 类允许你获取当前开发者可通过 Python API 使用的所有 AI 模型的列表。\n\n成功获取\
  \ `OpenAI` 和 `Model` 对象的实例后，API 将提供 OpenAI API 中所谓的 `SyncPage`，它本质上是一个字典，其结构如表 2-1\
  \ 所示。\n\n### 处理响应\n\n**表 2-1** Model 对象的结构\n\n| 字段 | 类型 | 描述 |\n| --- | --- | ---\
  \ |\n| `object` | 字符串 | 始终返回字面量 `\"list\"`。 |\n| `data` | 字典 | OpenAI 提供的 AI 模型字典。\
  \ |\n| `↳ id` | 字符串 | AI 模型的唯一 ID，本质上是模型的完整名称。 |\n| `↳ object` | 字符串 | 始终返回字面量 `\"\
  model\"`。 |\n| `↳ created` | 整数 | 模型的创建日期。 |\n| `↳ owned_by` | 字符串 | 拥有该模型的组织名称。\
  \ |\n\n> **注意**  \n> 由于对象可以包含字典（在表格中可能难以表示），我们使用以下符号 `↳` 来表示字典的元素。从表 2-1 中可以看出，`id`、`object`、`created`\
  \ 和 `owned_by` 都是响应中 `data` 字典的元素。\n\n现在我们已经了解了 `Model` 对象的详细信息，接下来讨论如何测试我们在第一章中获取的\
  \ API 密钥。实际上有几种方法可以做到这一点。\n\n### 使用你的 API 密钥通过 OpenAI API 获取可用模型列表\n\n将 API 密钥设置在本地\
  \ `.env` 文件中后，我们将使用以下代码获取 OpenAI API 中可用的模型列表，然后将其打印到终端。\n\n```python\n\"\"\"用于与\
  \ OpenAI API 交互以列出可用模型的模块\"\"\"\nimport os\nfrom dotenv import load_dotenv\nfrom\
  \ openai import OpenAI\n### 从 .env 加载环境变量\nload_dotenv()\n### 使用环境变量中的 API 密钥\n\
  api_key = os.getenv(\"OPENAI_API_KEY\")\nclient = OpenAI()\nmodels_list = client.models.list()\n\
  print(models_list)\n清单 2-3\n通过调用 models.list() 方法并使用 model_lister.py 获取 OpenAI API\
  \ 可用模型列表\n```\n\n运行清单 2-3 中的代码后，清单 2-4 是你应该会看到的截断响应。\n\n```\nSyncPageModel, Model(id='dall-e-2',\
  \ created=1698798177, object='model', owned_by='system'), Model(id='gpt-3.5-turbo-0125',\
  \ created=1706048358, object='model', owned_by='system'), Model(id='text-embedding-ada-002',\
  \ created=1671217299, object='model', owned_by='openai-internal'), Model(id='tts-1-hd-1106',\
  \ created=1699053533, object='model', owned_by='system'), Model(id='tts-1-hd', created=1699046015,\
  \ object='model', owned_by='system'). . .\n清单 2-4\n运行我们的 model_lister.py 应用程序后得到的难看响应\n\
  ```\n\n### 获取更美观的模型列表\n\n清单 2-4 只是一个部分列表，因为可供开发者使用的模型数量非常庞大！不过，好消息是，完整的响应以表格形式提供在附录\
  \ 1 中。\n\n所以，首先，这很棒。我们知道我们的 API 密钥有效！但是，你可能没有注意到，我们得到的响应相当难看。为简洁起见，清单 2-4 已被缩短，但很明显，当我们只想知道\
  \ OpenAI API 中的所有模型时，没有人愿意阅读那一大段文本。\n\n如果我们能在运行代码后得到更清晰的响应，那就太好了。那么，让我们添加一些代码来格式化响应。\n\
  \n```python\n\"\"\"用于与 OpenAI API 交互以列出可用模型的模块\"\"\"\nimport os\nfrom dotenv import\
