  图 6-10\n\n如果您仔细阅读此处的屏幕信息，您会发现 Discord 颇具幽默感\n\n点击“继续”按钮将机器人添加到您的服务器。\n\n接下来，您将看到一个与上一页面非常相似的页面，但主要区别在于它会为您提供机器人所有权限和功能的摘要。通常，如果您要将机器人添加到*非您创建*的服务器，这会非常有用。但是，由于这个机器人是我们自己创建的，这仅是对我们之前已指定设置的确认。图\
  \ 6-11 显示了使用所选权限授权我们机器人的确认屏幕。\n\n![](img/615442_1_En_6_Fig11_HTML.jpg)\n\n图 6-11\n\
  \n确认机器人的功能\n\n点击“授权”按钮，授予机器人在您的服务器上运行的权限。\n\n如果一切顺利，您应该会在服务器的常规频道中看到一条自动消息，表明该过程已成功完成。\n\
  \n### 获取机器人的 Discord ID 令牌并设置网关意图\n\n现在，是时候获取机器人的 Discord ID 令牌了，您将在代码中使用它来以编程方式验证您的机器人。\n\
  \n注意\n\n出于显而易见的原因，在这里使用“令牌”一词让我感到紧张，因为由于上下文原因，这个词在本书中有两种不同的含义，但这里快速回顾一下其含义：\n\n\
  *   使用 Discord 和 Slack API 时，“令牌”是身份验证令牌。\n*   使用 OpenAI API 时，“令牌”是单词的一部分。\n\n\
  返回 Discord 开发者网站，在设置导航菜单中点击“机器人”类别以继续。\n\n尽管您还没有看到您的令牌，但您需要点击“重置令牌”按钮，如图 6-12 所示。\n\
  \n请务必将 ID 令牌复制并保存到安全的地方。您将在本章后面介绍的 Python 代码中需要此令牌。\n\n![](img/615442_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n\n点击“重置令牌”按钮查看您的 ID 令牌\n\n向下滚动页面到名为“特权网关意图”的部分，并启用名为“消息内容意图”的选项。\n\n注意\n\
  \n那么，让我们放慢节奏，谈谈意图。到底什么是“意图”，为什么需要它？就 Discord API 而言，您需要明确指定您希望 Discord 以编程方式通知您的每一种信息类型。否则，Discord\
  \ 会不断用与您或您的机器人无关的事件轰炸您。例如，就我们的目的而言，我们不关心人们何时加入或离开服务器。但是，如果您想向首次加入服务器的任何人发送服务器规则列表，那么您肯定希望启用“服务器成员意图”。当我们深入研究代码时，您会看到更多关于意图的信息。\n\
  \n请务必点击绿色按钮“保存更改”以保存您的更改。结果如图 6-13 所示。\n\n![](img/615442_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13\n\n启用名为“消息内容意图”的选项\n\n\n\n## 用 Python 创建问答机器人应用，从频道中回答问题：`tech_support_bot_dumb.py`\n\
  \n当然，既然我们已经完成了所有必要的准备工作，并且知道了要监控用户问题的频道名称，那么接下来就让我们看看用 Python 编写的代码，这些代码能让机器人加入我们的服务器并访问特定\
  \ Discord 频道的所有消息。\n\n这是本章中我们将要创建的两个 Discord 机器人中的第一个。这个名为 `tech_support_bot_dumb.py`\
  \ 的机器人将负责监控我们 Discord 服务器中“q-and-a”频道的消息。\n\n在本章稍后的内容中，我们将创建另一个机器人，它负责审核 Discord\
  \ 服务器中的*所有内容*，包括“q-and-a”频道，以过滤掉不良内容。这样做的目的是遵循“关注点分离”的架构模式。我们不会创建一个庞大的、能处理 Discord\
  \ 服务器所有审核需求的 Python Discord 机器人，而是将功能拆分成两个不同的应用。\n\n我们还将循序渐进，将本章的重点放在攻克 Python 中\
  \ Discord 功能的学习曲线上。在本书的最后几章中，我们将对这两个机器人进行增强，利用 OpenAI API 让它们具备人工智能。\n\n清单 6-1 展示了创建一个基础\
  \ Discord 机器人所需的代码，该机器人可以监控单个频道中发布的所有消息并提供回答。\n\n*清单 6-1.* *tech_support_bot_dumb.py*\n\
  \n```\nimport discord\n### 用于身份验证的机器人令牌\ndiscord_token = 'YOUR_TOKEN_HERE'\n###\
  \ 机器人应监控和交互的频道名称\nchannel_to_watch = 'q-and-a'\n### 初始化 Discord 客户端\ndiscord_client\
  \ = discord.Client()\n### 机器人就绪时的事件处理程序\n@discord_client.event\nasync def on_ready():\n\
  print('已登录为', client.user)\nprint('------')\n### 收到消息时的事件处理程序\n@ discord_client.event\n\
  async def on_message(message):\n### 忽略机器人自己发送的消息，防止自我回复\nif message.author == client.user:\n\
  return\n### 忽略不在指定 \"q-and-a\" 频道中的消息\nif isinstance(message.channel, discord.TextChannel)\
  \ and message.channel.name != channel_to_watch:\nreturn\n### 向发送消息的用户发送问候回复\nreply\
  \ = f'你好 {message.author.mention}，我可以帮你解决这个问题！'\nawait message.channel.send(reply)\n\
  ### 使用提供的令牌运行机器人\ndiscord_client.run(discord_token)\n```\n\n在脚本的开头，你应该会注意到我们通过 `channel_to_watch`\
  \ 变量指定了我们想要监控的频道。\n\n**注意**\n\n由于某些原因，Discord 自身的术语有时会将 Discord 服务器称为“公会”。然而，从我们的角度来看，公会就是一个\
  \ Discord 服务器。\n\n## 处理发送到 Discord 服务器的消息\n\n在结束第一个 Python Discord 机器人的介绍之前，我们需要讨论一下\
  \ `on_message(message)` 函数。对于发送到 Discord 服务器的每一条消息，以及用户直接以私信形式发送给机器人本身的消息，都会异步调用此函数。\n\
  \n**注意**\n\n你知道吗？当机器人在 Discord 服务器中回答某人的问题时，Discord 会调用机器人的 `on_message(message)`\
  \ 函数，将机器人刚刚发送的消息传递给机器人。这听起来像是无限循环的根源，不是吗？因此，我们在代码中设置了逻辑，让机器人忽略自己发送的消息。\n\n在 `on_message(message)`\
  \ 函数的最后几行中，我们通过在回复中“@提及”原始消息发送者，确保给予他们友好的回复。正如我们之前提到的，这个问答机器人的第一个版本是“笨”的。当你在 Discord\
  \ 服务器中发布问题时，它会做出响应，但响应实际上并不会回答你的问题。\n\n## 成功！运行你的第一个 Discord 机器人：`tech_support_bot_dumb.py`\n\
  \n现在，让我们运行我们的 Python Discord 机器人。执行应用后，请务必返回你的 Discord 服务器，并尝试在你为问答设置的频道中输入一个问题。图\
  \ 6-14 展示了对我的问题“这个机器人会回答我关于这个应用的问题吗？”的响应。\n\n![](img/615442_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14\n\n在 Discord 中成功运行问答机器人\n\n仔细查看图 6-14，你会看到一些关键特性，例如：\n\n- 在右侧，你会看到机器人处于在线状态，并带有绿色状态指示器。\n\
  - 在频道中提问后，机器人会直接@提及你。\n\n## 简化向 Discord 注册下一个 Discord 机器人应用的流程\n\n既然我们已经成功完成了所有步骤，拥有了一个可运行的\
  \ Discord 机器人，那么创建第二个机器人就易如反掌了！所以，让我们简要地重复一下上述所有步骤，以便创建我们的第二个 Discord 机器人。我会明确指出哪些项目需要更改或增强，因为第二个机器人将作为审核员，而不是为\
  \ Discord 服务器的用户提供问题答案。\n\n### 向 Discord 注册一个新的 Discord 机器人应用\n\n执行与上述相同的步骤；不过，明智的做法是给机器人起一个不同的名字。对我来说，第二个机器人将命名为“Mod\
  \ Bot”。\n\n### 指定机器人的常规信息\n\n对我来说，内容审核机器人有一个不同的图标，所以我在这里指定了它，如图 6-15 所示。\n\n![](img/615442_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15\n\n为第二个机器人提供名称和图标\n\n### 为机器人指定 OAuth2 参数\n\n第二个机器人需要更多权限才能执行更多任务。以下是我们需要的范围：\n\
  \n- 机器人\n  - 踢出成员\n  - 封禁成员\n  - 发送消息\n  - 管理消息\n  - 读取消息历史\n\n### 邀请你的机器人到你的服务器\n\
  \n重复第一个机器人的相同步骤。\n\n### 获取机器人的 Discord ID 令牌并设置网关意图\n\n再次按照上述步骤获取 Discord ID 令牌。然后，向下滚动页面到名为“特权网关意图”的部分，并启用名为“服务器成员意图”和“消息内容意图”的选项。\n\
  \n\n\n## 创建下一个 Discord 机器人：`content_moderator_bot_dumb.py`\n\n内容审核员的职责是确保 Discord\
  \ 服务器中不会出现不当内容。与我们本章前面创建的机器人一样，这个机器人（暂时）还不具备人工智能。在当前状态下，该机器人会不加区分地删除服务器中任何包含“puppies”一词的消息。\n\
  \n这并不是因为“puppies”本身有什么邪恶之处。不过，它们确实有在你不在家时毁掉你最爱那双鞋的倾向。老实说，我们只是需要在 Discord 中运行机器人时，有东西可以用来测试我们的代码。\n\
  \n清单 6-2 展示了 `content_moderator_bot_dumb.py` 的代码。\n\n*清单 6-2.* `content_moderator_bot_dumb.py`\n\
  \n```\nimport discord\n### 用于身份验证的机器人令牌\ndiscord_token = ''\n### 需要监控的违禁词\nbanned_word\
  \ = 'puppies'\n### 初始化 Discord 客户端\ndiscord_client = discord.Client()\n### 机器人就绪时的事件处理程序\n\
  @discord_client.event\nasync def on_ready():\nprint('已登录为', discord_client.user)\n\
  print('------')\n### 收到消息时的事件处理程序\n@discord_client.event\nasync def on_message(message):\n\
  ### 忽略机器人自身发送的消息，防止自我响应\nif message.author == discord_client.user:\nreturn\n###\
  \ 检查消息是否发送自公会（服务器）\nif message.guild is not None:\n### 检查消息内容中是否包含违禁词\nif banned_word\
  \ in message.content:\n### 删除该消息\nawait message.delete()\n### 提及发送不当消息的用户\nauthor_mention\
  \ = message.author.mention\n### 发送一条提及该用户的警告消息\nawait message.channel.send(f'{author_mention}\
  \ 此评论被认为不适合本频道。'\n'如果您认为这是误判，请联系人工服务器管理员。')\n### 使用提供的令牌运行机器人\ndiscord_client.run(discord_token)\n\
  ```\n\n## 处理发送到 Discord 服务器的消息\n\n再次，让我们将注意力集中在 `onMessageReceived()` 函数上，因为每当有消息发布到\
  \ Discord 服务器时，它都会被异步调用。如您所见，如果发布到服务器的消息包含违禁词，我们会删除该消息，并在发布违规消息的同一频道中通过 @提及 消息向发送者发出警告。\n\
  \n## 再次成功！运行您的第二个 Discord 机器人：`content_moderator_bot_dumb.py`\n\n现在，让我们运行第二个 Python\
  \ Discord 机器人。执行应用程序后，请务必返回您的 Discord 服务器，并在任意频道中输入一条包含违规词的消息。图 6-16 展示了机器人的运行效果。\n\
