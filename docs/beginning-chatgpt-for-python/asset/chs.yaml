  ```\n\n如您所见，我们同时做了几件事。\n\n首先，正如我们从本书前几章中学到的，您可以通过在提示中为系统本身提供一条特定消息来显著设定对话的基调。因此，我们这里有一个包含系统消息的变量。\n\
  \n接下来，我们定义了另一个变量，它提供了存储常见问题解答文件的路径位置引用。然后我们简单地读取了文件——就这么简单。\n\n\n\n### `on_message(message)`\
  \ 函数的更新\n\n当收到消息时，请务必注意以下几行代码：\n\n```\n@discord_client.event\nasync def on_message(message):\n\
  ```\n\n此函数是我们 Discord 机器人的核心部分。每当我们的 Discord 服务器中发布一条消息时，就会调用 `on_message()` 函数。这里的\
  \ `async` 关键字很重要，因为它使得 `on_message()` 能够被异步调用，这正是我们想要的，即每当有消息发布时都能及时响应。\n\n**注意**\n\
  \n快速回顾一下同步通信与异步通信的区别。同步通信的一个典型例子是使用网页浏览器访问网络服务器。一旦你发送请求，就需要等待直到收到响应。要查看不同的网站，你需要再次发送请求并再次等待响应。\n\
  \n异步通信的一个好例子是给朋友或同事发送电子邮件。你可以给朋友发送 1 封、2 封、5 封、10 封甚至 1000 封邮件，但他们不一定在*等待*你的邮件。换句话说，由于电子邮件的运作方式，他们不会陷入“等待模式”并一直等着你发送内容。当邮件到达时，你的朋友会收到通知。\n\
  \n因此，每当我们的 Discord 服务器中发布一条消息时，就会调用 `on_message()` 函数，并将消息本身作为函数参数传入。\n\n现在，让我们进一步分析\
  \ `tech_support_bot.py` 中的以下代码：\n\n```\nasync with message.channel.typing():\n####\
  \ 调用 ChatGPT 根据收到的消息生成回复\nresponse_from_chatgpt = chatgpt_client_for_qa_and_moderation.send_message_from_discord(message.content)\n\
  #### 构建一条提及消息作者并附加 ChatGPT 回复的回复消息\nreply = f'{message.author.mention} {response_from_chatgpt}'\n\
  ```\n\n在这里，我们提供了良好的用户体验，在用户的问题被发送到 ChatGPT 的同时，向用户显示机器人正在“输入”。当收到回复后，我们将回复内容返回给用户。\n\
  \n## 分析 `chatgpt_client_for_qa_and_moderation.py`\n\n现在，当我们进一步查看上面的代码清单 7-2 时，`tech_support_bot.py`\
  \ 在 `chatgpt_client_for_qa_and_moderation.py` 脚本中实例化了 `ChatGPTClient` 对象，该脚本（正如我们之前所述）与我们之前使用的\
  \ `chatgpt_client.py` 脚本非常相似。`chatgpt_client_for_qa_and_moderation.py` 的完整源代码如代码清单\
  \ 7-4 所示。\n\n```\nimport os\nfrom dotenv import load_dotenv\nfrom openai import\
  \ OpenAI\nclass ChatGPTClient:\ndef __init__(self, system_message, initial_instructions_to_chatgpt):\n\
  ### 从 .env 文件加载环境变量\nload_dotenv()\n### 使用环境变量中的 API 密钥\nself.client = OpenAI()\n\
  self.system_message = system_message\nself.initial_instructions_to_chatgpt = initial_instructions_to_chatgpt\n\
  def send_message_from_discord(self, user_message):\nresponse = self.client.chat.completions.create(\n\
  model=\"gpt-4\",\nmessages=[\n{\n\"role\": \"system\",\n\"content\": f'{self.system_message}'\n\
  },\n{\n\"role\": \"user\",\n\"content\": f'{self.initial_instructions_to_chatgpt}'\n\
  },\n{\n\"role\": \"user\",\n\"content\": f'{user_message}'\n}\n],\ntemperature=0.85,\n\
  max_tokens=1921,\ntop_p=1,\nfrequency_penalty=0,\npresence_penalty=0\n)\ncondensed_response\
  \ = response.choices[0].message.content\nreturn condensed_response\n代码清单 7-4\nchatgpt_client_for_QA_and_moderation.py\n\
  ```\n\n### 解析 Python 中的 `ChatGPTClient` 类，以便我们的机器人能够利用 ChatGPT\n\n我们创建的 Python 类\
  \ `ChatGPTClient` 在将 OpenAI API 集成到我们的 Discord 机器人中扮演着关键角色。让我们来看看它的优势：\n\n该类在设计上考虑了模块化，封装了与\
  \ ChatGPT 交互的所有功能。在 `__init__` 方法中，我们初始化客户端，传入系统消息和 `FAQ.txt` 的内容，并从 `.env` 文件中加载\
  \ OpenAI API 密钥。\n\n通过 `send_message_from_discord()` 方法，该类简化了与 ChatGPT 的通信。由于对象在构建时已经包含了系统消息的初始指令，Discord\
  \ 用户的消息会被作为用户消息放入提示中，这样我们就可以通过编程方式将用户的问题发送给 ChatGPT。\n\n`send_message_from_discord()`\
  \ 方法并不限制我们对该类的使用场景。目前，我们将其用于问答；然而，任何使用该类的机器人都可以出于任何目的以任何方式向 ChatGPT 发送提示。\n\n最后，我们通过提取生成消息的内容并返回精简版本来高效处理来自\
  \ OpenAI API 的响应。这使得我们的 Discord 机器人能够仅回复我们所需的信息，而不是聊天模型返回的完整响应。这通过一行代码即可实现：\n\n\
  ```\ncondensed_response = response.choices[0].message.content\n```\n\n### 运行我们的智能问答机器人：`tech_support_bot.py`\n\
