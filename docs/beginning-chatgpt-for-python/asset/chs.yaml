  \n现在我们有了 Google Maps API 密钥，就可以利用我们的结对编程伙伴了。实际上，有两种方法可以使用 ChatGPT 来简化代码运行，从而成功检索我们想要的信息：目的地有多远，以及到达那里需要多长时间（这里有一个有趣的事实——Google\
  \ Maps Routes API 在预估行程时间中考虑了交通趋势，这使得我们的应用程序非常适合提高生产力！）。\n\n### 使用 ChatGPT 将 cURL\
  \ 命令转换为可在 Python 中使用的代码：灵活程序员的方法\n\n对一些人来说，使用 cURL 可能有点令人生畏，这就是为什么我们提供了两种使用 ChatGPT\
  \ 帮助我们编写代码来利用 Google Maps Platform API 的方法；一种方法是将 cURL 代码“翻译”成我们可以在 Python 中使用的东西，另一种方法则完全不需要查看任何令人生畏的\
  \ cURL 代码。\n\n在第一种方法中，我们实际上不会去查阅 Google Maps Platform 文档，而是直接切入正题，为你提供所需的 cURL 代码，并向你展示如何使用\
  \ ChatGPT 将其转换为 Python 程序员可用的代码。不用谢。\n\n以下是来自 Google Maps Platform 文档的 cURL 代码。\n\
  \n```\ncurl -X POST -d '{\n\"origin\":{\n\"location\":{\n\"latLng\":{\n\"latitude\"\
  : 37.419734,\n\"longitude\": -122.0827784\n}\n}\n},\n\"destination\":{\n\"location\"\
  :{\n\"latLng\":{\n\"latitude\": 37.417670,\n\"longitude\": -122.079595\n}\n}\n},\n\
  \"travelMode\": \"DRIVE\",\n\"routingPreference\": \"TRAFFIC_AWARE\",\n\"departureTime\"\
  : \"2023-10-15T15:01:23.045123456Z\",\n\"computeAlternativeRoutes\": false,\n\"\
  routeModifiers\": {\n\"avoidTolls\": false,\n\"avoidHighways\": false,\n\"avoidFerries\"\
  : false\n},\n\"languageCode\": \"en-US\",\n\"units\": \"IMPERIAL\"\n}' \\\n-H 'Content-Type:\
  \ application/json' -H 'X-Goog-Api-Key: YOUR_API_KEY' \\\n-H 'X-Goog-FieldMask:\
  \ routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline' \\\n'https://routes.googleapis.com/directions/v2:computeRoutes'\n\
  ```\n\n清单 2-18 使用 Google Maps Routes API 的 cURL 代码\n\n请记住，在实践提示工程时，最佳实践是使用三个井号（`###`）将指令与内容分开，以获得最佳结果。为此，以下是我们给\
  \ ChatGPT 的提示，以便我们可以使用这段 cURL 代码并产生我们想要的结果，我们使用了三个井号来分隔指令和内容，内容即清单 2-18 中展示的 cURL\
  \ 代码：\n\n```\n我正在用 Python 编码，试图构建一个应用程序，该应用程序向 Google Maps API 发出请求，并获取从一个地点到另一个地点所需的时间。这是可以实现该目标的\
  \ cURL 代码。请帮助我将其转换为可以在 Python 中使用的东西。\n###\n[来自清单 2-18 的 cURL 代码]\n```\n\n清单 2-19\
  \ 提示 ChatGPT 以 cURL 命令为上下文提供 Python 代码\n\n这是我们从 ChatGPT 的回复中得到的代码。\n\n```\nimport\
  \ requests\nimport json\n#### 定义负载\npayload = {\n\"origin\": {\n\"location\": {\n\
  \"latLng\": {\n\"latitude\": 37.419734,\n\"longitude\": -122.0827784\n}\n}\n},\n\
  \"destination\": {\n\"location\": {\n\"latLng\": {\n\"latitude\": 37.417670,\n\"\
  longitude\": -122.079595\n}\n}\n},\n\"travelMode\": \"DRIVE\",\n\"routingPreference\"\
  : \"TRAFFIC_AWARE\",\n\"departureTime\": \"2025-02-17T17:00:00Z\",\n\"computeAlternativeRoutes\"\
  : False,\n\"routeModifiers\": {\n\"avoidTolls\": False,\n\"avoidHighways\": False,\n\
  \"avoidFerries\": False\n},\n\"languageCode\": \"en-US\",\n\"units\": \"IMPERIAL\"\
  \n}\n#### 定义请求头\nheaders = {\n\"Content-Type\": \"application/json\",\n\"X-Goog-Api-Key\"\
  : \"YOUR_API_KEY\",\n\"X-Goog-FieldMask\": \"routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline\"\
  \n}\n#### 发起请求\nresponse = requests.post(\"https://routes.googleapis.com/directions/v2:computeRoutes\"\
  , json=payload, headers=headers)\n#### 打印响应\nprint(response.json())\n```\n\n清单 2-20\
  \ 从 ChatGPT 获得包含可用 Python 代码的回复\n\n**注意**\n\n为了使此代码运行，你必须在 `DEPARTURE-TIME` 参数中设置一个晚于你运行代码时间的日期和时间。换句话说，出发时间不能设置为过去的时间。在此示例中，日期设置为\
  \ 2025 年的某个特定时间，但如果你在 2025 年之后运行此代码，则需要调整 `DEPARTURE-TIME` 参数中的代码，以便代码按预期运行。\n\n\
  运行此代码后，你应该会得到如下响应。\n\n```\n{'routes': [{'distanceMeters': 773, 'duration': '158s',\
  \ 'polyline': {'encodedPolyline': 'ipkcFjichVzQ@d@gU{E?'}}]}\n```\n\n清单 2-21 运行\
  \ ChatGPT 代码后的成功响应\n\n\n\n### 使用 ChatGPT 避免阅读大量文档和解析任何 cURL 代码\n\n如前所述，Google Maps\
  \ 平台有*大量*文档需要阅读。如果你粗略浏览一下我们为了到达 Routes API 而经过的其他 API，特别是，你会看到用于提取各种数据的各种 API：空气质量、花粉、鸟瞰图（就像你使用\
  \ Google Maps 时看到的那样），以及你可能认为理所当然的 Google Maps 的许多其他功能，它们都有各自的 API。你知道什么是地理编码吗？好吧，如果你自己通读文档，你可能会费一番功夫才能弄明白。\n\
  \n通读文档很烦人。尤其是当我们只想要某个 API 或服务中的几个功能时。在一个完美的世界里，我们甚至不*需要*知道什么是地理编码，就能让我们的代码在不同于 Google\
  \ 提供的示例代码的各种场景下工作。\n\n我们可能生活在一个不完美的世界，但我们*不必*知道什么是地理编码，至少现在不用了。我们可以简单地使用 ChatGPT\
  \ 来跳过我们不想阅读的文档。\n\n以下是我们向 ChatGPT 提出的问题，这样你就不必阅读任何 Google Maps Route API 文档就能获得可用的代码。\n\
  \n```\n我需要使用 Google Maps 平台的 Routes API 来获取从一个目的地到另一个目的地所需的时间以及两点之间的距离信息。我如何在 Python\
  \ 中发出 HTTP 请求来获取我正在寻找的信息？\n清单 2-22\n提示 ChatGPT 以避免阅读文档\n```\n\n这是我们从 ChatGPT 的回复中得到的代码。\n\
  \n```\nimport requests\ndef get_route_info(google_maps_api_key, origin, destination):\n\
  url = f\"https://maps.googleapis.com/maps/api/directions/json?origin={origin}&destination={destination}&key={google_maps_api_key}\"\
  \nresponse = requests.get(url)\nif response.status_code == 200:\nroute_data = response.json()\n\
  if route_data[\"status\"] == \"OK\":\nroute_info = route_data[\"routes\"][0][\"\
  legs\"][0]\ndistance = route_info[\"distance\"][\"text\"]\nduration = route_info[\"\
  duration\"][\"text\"]\nprint(f\"Distance: {distance}, Duration: {duration}\")\n\
  else:\nprint(\"Error:\", route_data[\"status\"])\nelse:\nprint(\"Error:\", response.status_code)\n\
  #### 将 'YOUR_GOOGLE_MAPS_API_KEY' 替换为你的实际 Google Maps API 密钥\ngoogle_maps_api_key\
  \ = 'YOUR_GOOGLE_MAPS_API_KEY'\norigin = 'New York, NY'  # 示例起点\ndestination = 'Los\
  \ Angeles, CA'  # 示例终点\nget_route_info(google_maps_api_key, origin, destination)\n\
  清单 2-23\n从 ChatGPT 获得回复以避免阅读文档\n```\n\n如果你运行这段代码，你应该会得到这个非常清晰、非常简单的响应：\n\n```\n\
  Distance: 2,789 mi, Duration: 1 day 17 hours\n```\n\n## 结论\n\n让我们澄清一个常见的误解并说明真相：ChatGPT\
  \ 并不是什么读心术的巫师！作为一种 AI 工具，它并不是要取代开发人员和架构师的专业知识——而是为了补充它，并节省大量时间和麻烦，解决普通程序员日常工作中经常遇到的挫折。当然，它可以帮助将你的自然语言请求翻译成代码，但我们不要忘记人类判断的关键作用。最终，由开发者来决定是使用、调整还是丢弃生成的代码。\n\
  \n# 3. 在 Python 中创建一个基本的 ChatGPT 客户端\n\n本章的目的简单明了。我们将仅用几行 Python 代码构建最强大的 ChatGPT\
  \ 客户端。这个客户端将比你在 ChatGPT 网站上能做的多得多，并且会为你提供比我们在第 1 章中看到的 Chat Playground 更多的选项。\n\n\
  ## 创建我们的 ChatGPT 聊天补全应用程序 `chatgpt_client.py`\n\n清单 3-1 是我们 ChatGPT 客户端 `chatgpt_client.py`\
  \ 的代码。\n\n```\n\"\"\"\n演示使用 OpenAI 的 GPT-4 进行聊天补全的 API 调用的脚本。\n\"\"\"\nfrom dotenv\
  \ import load_dotenv\nfrom openai import OpenAI\n### 从 .env 加载环境变量\nload_dotenv()\n\
  ### 实例化 OpenAI 对象\nclient = OpenAI()\nresponse = client.chat.completions.create(\n\
  model=\"gpt-4o\",\nmessages=[\n{\n\"role\": \"system\",\n\"content\": \"你是一名 Python\
  \ 开发者\"\n},\n{\n\"role\": \"user\",\n\"content\": \"为什么 Python 通常用于数据科学？\"\n}\n\
  ],\ntemperature=0.85,\nmax_tokens=1921,\ntop_p=1,\nfrequency_penalty=0,\npresence_penalty=0\n\
  )\nprint(response)\n清单 3-1\nchatgpt_client.py\n```\n\n当你分析清单 3-1 中的代码时，你会看到一些在 Chat\
  \ Playground 中非常熟悉的东西，比如 `model`、`messages`、`temperature` 和 `tokens`。\n\n注意\n\n\
  在本章中，我们将使用 Python 数据类型，因此你会看到一个 `list`，而在官方 OpenAPI 文档中指定的是 `Array`。\n\n## 使用 `OpenAI.chat.completions.create()`\
  \ 向 ChatGPT 发送消息\n\n`OpenAI.chat.completions.create()` 方法基本上是你可以在 Chat Playground\
  \ 中执行的操作的一对一映射；因此，这个方法应该让你感觉非常熟悉。\n\n表 3-1 描述了调用 `OpenAI.chat.completions.create()`\
  \ 方法所需参数的格式。虽然表格很长，但快速浏览后，你应该会看到只有少数几个字段是成功调用该方法所必需的。\n\n该方法的响应被称为 `ChatCompletion`。\n\
  \n### 检查方法参数\n\n表 3-1\n\n创建 ChatCompletion 对象的结构\n\n\n\n| 字段 | 类型 | 是否必填 | 描述 |\n\
  | --- | --- | --- | --- |\n| `model` | `String` | `Required` | 用于`ChatCompletion`的模型\
  \ ID。兼容模型包括：`gpt-4`、`gpt-4-0613`、`gpt-4-32k`、`gpt-4-32k-0613`、`gpt-4o`、`gpt-4o-mini`、`o1`、`o1-mini`\
  \ |\n| `messages` | `List` | `Required` | 共有四种消息类型，每种类型各有其要求：`系统消息`（见表 3-2）、`用户消息`（见表\
  \ 3-3）、`助手消息`（见表 3-4）、`工具消息`（见表 3-5） |\n| `frequency_penalty` | `Number` 或 `null`（默认值：`0`）\
  \ | `Optional` | 介于-2.0 到 2.0 之间的数字。正值会根据对话历史中已有的词频对词元进行惩罚，从而降低逐字重复相同句子的可能性。 |\n\
  | `logit_bias` | `JSON map`（默认值：`null`） | `Optional` | 允许你修改特定词元在补全中出现的可能性。你需要提供一个\
  \ JSON 对象，将词元（通过分词器中的词元 ID 指定）映射到-100 到 100 之间的相关偏差值。该偏差会在采样前添加到模型的 logits 中。 |\n\
  | `logprobs` | `Boolean` 或 `null` | `Optional`，默认为`false` | 此参数用于决定是否返回输出词元的对数概率。当设置为`true`时，它会提供消息内容中包含的每个输出词元的对数概率。不过，`gpt-4-vision-preview`模型目前不支持此功能。\
  \ |\n| `max_tokens` | `Integer` 或 `null` | `Optional` | 此参数用于设置生成的`ChatCompletion`可以拥有的最大词元数量。\
  \ |\n| `n` | `Integer` 或 `null`（默认值：`1`） | `Optional` | 指定模型应为每条输入消息生成多少个`ChatCompletion`选项。\
  \ |\n| `presence_penalty` | `Number` 或 `null`（默认值：`0`） | `Optional` | 介于-2.0 到 2.0\
  \ 之间的数字。正值会根据新词元是否出现在对话历史中进行惩罚，从而鼓励模型谈论新话题。 |\n| `response_format` | `JSON object`\
  \ | `Optional` | 你有两个选项：`{ \"type\": \"json_object\" }`用于 JSON 对象响应，或`{ \"type\"\
  : \"text\" }`用于文本响应。注意：务必记住，在 JSON 模式下操作时，你需要通过系统或用户指令明确命令模型生成 JSON。否则，模型可能会无限输出空白字符，直到达到词元上限，导致请求看似卡住。此外，请注意，如果`finish_reason`为`\"\
  length\"`，则表明生成内容超出了`max_tokens`或对话超出了最大允许上下文长度，这可能导致消息被截断。 |\n| `seed` | `Integer`\
  \ 或 `null` | `Optional` | 通过指定种子，系统将尝试生成可重复的结果。理论上，这意味着如果你使用相同的种子和参数重复请求，应该会得到相同的结果。为了获取用于后续请求的种子值，请从你上一次的响应中复制`system_fingerprint`。\
  \ |\n| `stop` | `String`/`list`/`null`（默认值：`null`） | `Optional` | 你可以提供最多四个序列，API\
  \ 将在这些序列处停止生成更多词元。这对于控制响应的长度或内容很有用。 |\n| `stream` | `Boolean` 或 `null`（默认值：`false`）\
  \ | `Optional` | 如果`\"stream\"`设置为`\"true\"`，部分消息更新将以服务器发送事件的形式发送。这意味着词元将在可用时作为纯数据事件发送，并且流将以`\"\
  data: [DONE]\"`消息结束。 |\n| `temperature` | `Number` 或 `null`（默认值：`1`） | `Optional`\
  \ | 有效值范围在 0 到 2 之间。控制模型输出的随机性。最佳实践是调整`top_p`或`temperature`，但不要同时调整两者。 |\n| `tool_choice`\
  \ | `String` 或 `JSON object` | `Optional` | 此参数控制模型调用哪个（如果有）函数。你有两个选项：`\"none\"\
  `或`\"auto\"`。如果你不希望模型调用函数，请使用`\"none\"`。如果你希望模型在生成消息或调用函数之间进行选择，请使用`\"auto\"`。通过`{\"\
  type\": \"function\", \"function\": {\"name\": \"my_function\"}}`指定特定函数会强制模型调用该函数。请注意，当没有函数时，默认值为`\"\
  none\"`；当存在函数时，默认值为`\"auto\"`。 |\n| `tools` | `List` | `Optional` | 你可以选择指定模型可能调用的工具列表。目前，仅支持函数作为工具。使用此参数提供模型可能为其生成\
  \ JSON 输入的函数列表。 |\n| `top_logprobs` | `Integer` 或 `null` | `Optional` | 可以是 0 到\
  \ 5 之间的任意整数。用于确定在每个词元位置返回的最可能词元的数量，并附带其各自的对数概率。要使此参数生效，必须通过将`logprobs`设置为`true`来启用它。\
  \ |\n| `top_p` | `Number` 或 `null`（默认值：`1`） | `Optional` | 有效值范围在 0 到 1 之间。指示是考虑少数可能性（0）还是所有可能性（1）。最佳实践是调整`top_p`或`temperature`，但不要同时调整两者。\
  \ |\n| `user` | `String` | `Optional` | 这是一个唯一 ID，你可以选择生成它来表示你的最终用户。这将有助于 OpenAI\
  \ 监控和检测滥用行为。 |\n\n好了，表 3-1 看起来有点吓人！不过，如前所述，只有`model`和`messages`是必填参数。\n\n此外，我们还在上面的代码清单\
  \ 3-1 中展示了这些参数在实际应用程序中是如何使用的。\n\n所以，正如你所见，作为一名 Python 开发者，我们有几个可供使用的选项和参数，这些是普通人使用\
  \ ChatGPT 网站或聊天游乐场无法做到的。\n\n现在，最需要详细解释的参数是`messages`参数，让我们进一步分析它。\n\n## 共有四种消息类型\n\
  \n当以编程方式调用 ChatGPT API 时，你可以向 API 提供四种类型的消息：\n\n*   系统消息\n*   用户消息\n*   助手消息\n*\
  \   工具消息\n\n好消息是，如果你回顾一下第 1 章中我们解释如何使用聊天游乐场的内容，你会发现我们已经接触过前三种消息类型了！我们目前不熟悉的唯一新消息类型是工具消息。\n\
  \n### 系统消息（字典）\n\n表 3-2：系统消息的结构\n\n| 字段 | 类型 | 是否必填 | 描述 |\n| --- | --- | --- |\
  \ --- |\n| `role` | `String` | `Required` | 必须设置为字符串`\"system\"` |\n| `content`\
  \ | `String` | `Required` | 这些是你希望系统在对话中执行的指令。 |\n| `name` | `String` | `Optional`\
  \ | 这是你可以为系统提供的可选名称。 |\n\n代码清单 3-2 是代码清单 3-1 中的一个片段，展示了系统消息的格式。\n\n```\nmessages=[\n\
  {\n\"role\": \"system\",\n\"content\": \"你是一名 Python 开发者\"\n},\n...\n```\n\n\n###\
  \ 用户消息（字典）\n\n表 3-3  \n用户消息的结构\n\n| 字段 | 类型 | 是否必填 | 描述 |\n| --- | --- | --- | ---\
  \ |\n| `role` | `String` | `Required` | `必须设置为字符串 \"user\"` |\n| `content` | `String`\
  \ | `Required` | `此字符串包含您想要发送给 ChatGPT 的实际消息或问题。` |\n| `name` | `String` | `Optional`\
  \ | `这是您在对话中可选的名称。` |\n\n清单 3-3 是清单 3-1 中的一个片段，展示了用户消息的格式。\n\n```\nmessages=\n...\n\
  {\n\"role\": \"user\",\n\"content\": \"为什么 Python 通常用于数据科学？\"\n}\n...\n清单 3-3\n\
  格式化用户消息\n```\n\n### 助手消息（字典）\n\n**注意**  \n以防您忘记，助手消息用于“提醒”ChatGPT 它在之前回复中告诉您的内容。理想情况下，这可以让您继续数周或数月前与它的对话。\n\
  \n表 3-4  \n助手消息的结构\n\n| 字段 | 类型 | 是否必填 | 描述 |\n| --- | --- | --- | --- |\n| `role`\
  \ | `String` | `Required` | `必须设置为字符串 \"assistant\"` |\n| `content` | `String` |\
  \ `Required` | `此字符串包含来自之前对话中 ChatGPT 的回复。` |\n| `name` | `String` | `Optional`\
  \ | `这是您在对话中为 ChatGPT 提供的可选名称。` |\n| `tool_calls` | `List` | `Optional` | `如果 ChatGPT\
  \ 在之前的回复中使用了工具，请在此处包含它指定的工具。` |\n| `↳ id` | `String` | `Required` | `这是 ChatGPT\
  \ 调用的工具的 ID。` |\n| `↳ type` | `String` | `Required` | `这是 ChatGPT 调用的工具的类型。只有字面量\
  \ \"function\" 是有效的工具。` |\n| `↳ function` | `Object` | `Required` | `这是模型调用的函数。`\
  \ |\n\n清单 [3-4 是清单 3-1 中的一个片段，展示了助手消息的格式。\n\n```\nmessages=\n...\n{\n\"role\": \"\
  assistant\",\n\"content\": \"Python 通常用于数据科学有几个原因...\"\n}\n...\n清单 3-4\n格式化助手消息\n\
