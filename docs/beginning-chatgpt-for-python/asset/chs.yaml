  \ and grateful client.\nListing 4-7\nRESPONSE. 获取更复杂对话的简化版本\n```\n\n\n\n### 提示 #4：“给我下一步行动建议”\n\
  \n除了生成更易于理解的摘要外，`ChatGPT` 还能以不同的风格和“语气”进行解释。我们将把 `Top P` 提高到 `0.75`，因为我们希望 `ChatGPT`\
  \ 能比默认设置考虑更多可能性。我们还将把 `存在惩罚` 提高到 `0.5`，因为我们希望鼓励生成多样化的回复。\n\n```\n系统：你是一个乐于助人的助手\n\
  用户：Fatima [16:00 | 02/08/2019]：大家好，我有一件紧急的事情……\n用户：我是公司的 QA 工程师。请给我下一步行动的建议。\n模型：gpt-4o\n\
  温度：1\n最大长度：1200\nTop P：0.75\n频率惩罚：0\n存在惩罚：0.5\n清单 4-8\n提示。向 ChatGPT 询问最佳下一步行动建议\n\
  ```\n\n```\n作为一名 QA 工程师，以下是下一步行动的一些建议：\n1. 测试补丁：一旦补丁部署到应用商店，在各种设备和操作系统上对其进行彻底测试，以确保问题已解决，并且没有引入新的错误或回归问题。\n\
  2. 进行回归测试：除了测试特定问题外，还要执行全面的回归测试，以确保修复不会对应用的其他功能产生任何意外的副作用。\n3. 向客户沟通修复情况：随时向客户更新进展，并告知他们修复程序已在最新的应用更新中可用。向他们提供如何更新应用的清晰说明，并鼓励他们也在自己那边进行测试。\n\
  4. 监控用户反馈：在修复程序部署后密切关注用户反馈。鼓励用户报告他们遇到的任何问题，并主动及时解决这些问题。\n5. 记录问题和解决方案：创建一份详细报告，记录问题、重现和解决该问题所采取的步骤，以及任何其他相关信息。这将作为未来故障排除的参考，并有助于改进开发流程。\n\
  6. 进行事后分析：在问题解决且修复程序部署后，安排一次与团队的事后分析会议，讨论根本原因、经验教训以及可以实施的流程改进，以防止将来出现类似问题。\n7. 持续改进：将此事件视为一个机会，识别开发和测试流程中需要改进的领域。评估是否可以做出任何更改，以防止将来发生类似问题。\n\
  请记住，开放的沟通、协作和持续学习是确保应用最高质量并与客户保持牢固关系的关键。\n清单 4-9\n响应。ChatGPT 关于可能下一步行动的建议\n```\n\
  \n当然，`ChatGPT`（就像地球上所有其他形式的人工智能一样）并非完全完美。例如，第三条建议是一个有效的待办事项，但通常 QA 人员并不负责直接与客户沟通。这种沟通可以通过技术支持或拥有沟通渠道的产品经理来完成（尤其是当客户非常重要时）。所以，这个建议本身没问题，但对于公司中担任该角色的人来说并不合适。\n\
  \n### 让我们谈谈真正的提示工程\n\n如果你在谷歌上搜索“提示工程”这个词，你会找到大量的示例、博客，甚至还有提供订阅计划的完整网站，它们会试图说服你，完美的提示只需通过纯文本就能创建。正如你从上面的示例中看到的，提示工程不能仅仅通过精心设计文本输入来完成。\n\
  \n实际上，这个过程很像烹饪一道精致的菜肴。想象一下，例如，只用盐作为调味料，而忽略所有其他配料和香料来烹饪勃艮第牛肉！老实说，结果与真正的菜肴相比会相形见绌。\n\
  \n类似地，尝试组建一个完整的管弦乐队，却只使用一种乐器和一位音乐家。那是一个尴尬的“一人乐队”。因此，仅仅调整提示文本不足以真正执行提示工程。诸如模型的`温度`（控制随机性）、`Top\
  \ P`（影响令牌概率）、所使用的特定模型、令牌数量以及其他参数，都在获得出色响应中扮演着至关重要的角色。\n\n本书并非关于提示工程，因为（从上面的解释可以看出）它确实涉及几个与\
  \ Python 无关的因素。但是，我们强烈建议你尝试 OpenAI 提供的模型中的*所有*参数，以找到最适合你用例的设置。\n\n## 注册一个 Slack\
  \ 机器人应用\n\n现在我们已经了解了`ChatGPT`为我们总结大量文本的各种方法，接下来看看在 Python 中创建一个简单的机器人所需的条件，该机器人将能够以编程方式抓取\
  \ Slack 实例中某个频道内的所有消息。\n\n**注意**\n\n要完成这些步骤，你需要拥有对 Slack 工作区的管理权限。大多数开发者**不会**拥有这些级别的权限；因此，为了充分进行实验，我建议你创建自己的个人\
  \ Slack 工作区用于测试目的。这样，你将拥有安装 Slack 机器人的所有权限。\n\n但是，一步一步来。首先，我们要创建我们的 Slack 机器人应用，所以前往\
  \ Slack API 网站：\n\n[`https://api.slack.com/`](https://api.slack.com/)\n\n![](img/615442_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** 要创建 Slack 机器人，请前往 Slack API 网站\n\n当然，你需要有一个 Slack 账户才能使其工作，所以如果你还没有，需要先创建一个。\n\
  \n登录后，转到页面右上角，导航到“你的应用 > 创建你的第一个应用”，如上图 4-1 所示。在 Slack 术语中，“机器人”就是一个“应用”，并且机器人必须先向\
  \ Slack 注册，才能在一个 Slack 实例上运行。\n\n![](img/615442_1_En_4_Fig2_HTML.jpg)\n\n**图 4-2**\
  \ 为 Slack 创建一个新的机器人应用\n\n如上图 4-2 所示，你将被带到**你的应用**页面，在那里你可以管理你的 Slack 应用。你会立即在屏幕中央看到一个弹出窗口，上面有一个**创建应用**按钮。\n\
  \n选择**从头开始**创建你的应用的选项。这是因为我们希望自己能够操控应用的所有细节，而不被一堆默认设置弄得过于复杂。\n\n之后，系统会提示你为你的机器人指定一个名称，并选择你希望机器人有权访问的工作区，如下图\
  \ 4-3 所示。\n\n点击**创建应用**按钮继续。\n\n![](img/615442_1_En_4_Fig3_HTML.jpg)\n\n**图 4-3**\
  \ 为 Slack 创建一个新的机器人应用\n\n\n\n### 通过设置作用域来指定机器人能（和不能）做什么\n\n现在，你将看到一个包含大量 Slack 工作区机器人选项的屏幕。不过，你需要做的第一件事是，从左侧边栏点击\
  \ **OAuth 与权限**。\n\n我们的机器人将非常简单；它只需要读取某个频道中的消息，以便为我们提供讨论内容的摘要。除了读取消息，我们还需要知道 Slack\
  \ 工作区中人员的姓名，否则我们将获得人员的 UUID 表示形式，而不是他们的姓名，这对我们来说毫无意义。\n\n因此，向下滚动，为你的 Slack 机器人添加以下\
  \ OAuth 作用域，如下图 4-4 所示。\n\n![](img/615442_1_En_4_Fig4_HTML.jpg)\n\n图 4-4\n\n为 Slack\
  \ 机器人应用添加作用域\n\n- `channels:history`\n- `channels:read`\n- `users:read`\n\n### 确认你的设置\n\
  \n为你的机器人添加了适当的作用域后，向上滚动并从左侧边栏点击**基本信息**。\n\n在接下来的页面上，你会看到“添加特性和功能”旁边现在有一个绿色的勾选标记，这确认了你已正确添加作用域，如下图\
  \ 4-5 所示。\n\n![](img/615442_1_En_4_Fig5_HTML.jpg)\n\n图 4-5\n\n确认你的设置\n\n### 查看 OAuth\
  \ 与权限页面\n\n如下图 4-6 所示，导航到 **OAuth 与权限**页面，然后点击“安装到工作区”按钮。\n\n![](img/615442_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\nOAuth 与权限屏幕\n\n### 将你的 Slack 机器人应用安装到工作区\n\n现在所有权限都已请求完毕，是时候将你的机器人安装到工作区了。在安装过程中，你应该会看到如下图\
  \ 4-7 所示的屏幕。\n\n![](img/615442_1_En_4_Fig7_HTML.jpg)\n\n图 4-7\n\n*“安装”一个新的* *Slack\
  \ 机器人应用*\n\n点击**允许**按钮以授权机器人并允许你在上一步中分配的权限。\n\n注意\n\n理解这里“安装”的含义很重要。在传统的 Python\
  \ 意义上，安装应用意味着将你的文件和依赖项复制到另一台机器并执行它。这里的情况并非如此。\n\n在这里，当你“安装”一个机器人应用时，你是在启用你的 Slack\
  \ 工作区，允许一个应用加入该工作区——仅此而已。你的机器人代码将在你自己的机器上运行，而不是在 Slack 的服务器上。\n\n### 获取你的 Slack\
  \ 机器人（访问）令牌\n\n这次，“令牌”实际上指的是访问令牌！为了以编程方式连接到 Slack API 并访问消息和用户信息，你需要一个为你的 Slack\
  \ 机器人生成的特定 OAuth 令牌。\n\n![](img/615442_1_En_4_Fig8_HTML.jpg)\n\n图 4-8\n\n为你的 Slack\
  \ 机器人应用复制 OAuth 令牌\n\n回到 **OAuth 与权限**页面，请务必从此页面复制机器人令牌（通常以 `xoxb-` 开头），如下图 4-8\
  \ 所示。\n\n### 将你的机器人邀请到频道\n\n接下来，你将进入想要用来测试机器人的频道，并在该频道中输入以下命令。\n\n```\n/invite\n\
  ```\n\n选择“将应用添加到此频道”选项，然后选择你之前在向 Slack 注册机器人时指定的 Slack 机器人名称。\n\n![](img/615442_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n将你的 Slack 机器人添加到一个频道\n\n恭喜！你现在已成功向 Slack 注册了一个 Slack 机器人应用，使其能够读取你工作区中的消息，并将该\
  \ Slack 机器人添加到了一个频道。在我们编写 Python 代码来访问工作区中的频道之前，我们需要知道 Slack 用于我们频道的内部 ID。\n\n##\
  \ 查找你频道的频道 ID\n\n好的，这是一个简单的步骤。在 Slack 中，右键单击你的频道名称，然后选择“查看频道详细信息”选项。弹出窗口的底部就是你的频道\
  \ ID。复制该编号并保存以备后用。你的 Python 应用将需要它来加入 Slack 工作区中的正确频道。\n\n## 使用你的 Slack 机器人应用自动抓取频道中的消息\n\
  \n好了，既然我们已经完成了所有先决条件并且知道了频道的 ID，让我们开始编写 Python 代码来访问特定 Slack 频道中的所有消息。\n\n### 使用\
  \ `slack_chat_reader_bot.py` 以编程方式从 Slack 读取消息\n\n首先，你需要安装官方的 Python Slack 库 `slack_sdk`。你可以像这样使用\
  \ `pip install`：\n\n```\npip install slack_sdk\n```\n\n清单 4-10 是一个简单的 Python Slack\
  \ 机器人，它获取指定时间段内频道中每条帖子的用户名、时间戳和消息内容。\n\n```\nfrom slack_sdk import WebClient\nfrom\
  \ slack_sdk.errors import SlackApiError\nfrom datetime import datetime, timezone\n\
  \n#### 定义你的 Slack API 令牌\nSLACK_BOT_TOKEN = \"YOUR_SLACK_API_TOKEN\"\n\n#### 初始化一个\
  \ WebClient 实例\nclient = WebClient(token=SLACK_BOT_TOKEN)\n\n#### 定义你的频道 ID\nchannel_id\
  \ = \"YOUR_CHANNEL_ID\"\n\n#### 以 UTC 时间定义开始和结束时间\nstart_time_utc = datetime(2024,\
  \ 8, 3, 10, 0, tzinfo=timezone.utc)\nend_time_utc = datetime(2024, 8, 12, 15, 0,\
  \ tzinfo=timezone.utc)\n\n#### 将开始和结束时间转换为 Unix 时间戳\nstart_time_unix = int(start_time_utc.timestamp())\n\
  end_time_unix = int(end_time_utc.timestamp())\n\ntry:\n    # 使用 WebClient 调用 conversations.history\
  \ 方法\n    response = client.conversations_history(\n        channel=channel_id,\n\
  \        oldest=start_time_unix,\n        latest=end_time_unix,\n    )\n\n    #\
  \ 检查 API 调用是否成功\n    if response[\"ok\"]:\n        # 反转消息列表以按时间顺序获取\n        messages\
  \ = reversed(response[\"messages\"])\n        for message in messages:\n       \
  \     user_id = message.get(\"user\")\n            timestamp = datetime.fromtimestamp(float(message.get(\"\
  ts\")), tz=timezone.utc)\n            user_info_response = client.users_info(user=user_id)\n\
  \            if user_info_response[\"ok\"]:\n                user_name = user_info_response[\"\
  user\"][\"name\"]\n                print(\"用户:\", user_name)\n                print(\"\
  时间戳:\", timestamp)\n                print(\"消息:\", message.get(\"text\"))\n    \
  \            print()\n            else:\n                print(\"获取用户信息失败:\", user_info_response[\"\
  error\"])\n    else:\n        print(\"获取消息失败:\", response[\"error\"])\nexcept SlackApiError\
  \ as e:\n    print(f\"错误: {e.response['error']}\")\n```\n\n清单 4-10\n\n`slack_chat_reader_bot.py`\n\
  \n让我们一起来浏览这段代码。首先，我们导入与 Slack API 交互和管理日期/时间数据所需的基本模块。然后，我们定义了身份验证所需的 Slack API\
  \ 令牌（`SLACK_BOT_TOKEN`）以及目标 Slack 频道的 ID（`channel_id`）。\n\n接下来，我们建立消息检索窗口的开始和结束时间，并以协调世界时（UTC）指定它们。我们的脚本将这些时间值转换为\
  \ Unix 时间戳，因为 Slack API 期望消息检索使用此格式的时间戳。\n\n如果 API 调用成功，我们的脚本将继续提取和处理消息。消息按时间顺序呈现，以便最早的消息首先出现。为了保持整洁，对于每条消息，脚本会检索用户\
  \ ID 和消息时间戳。然后，它使用 `client.users_info` 方法获取有关发送消息的用户的更多信息。\n\n如果在 API 请求过程中出现任何错误（`SlackApiError`），脚本会捕获并处理它们，打印一条错误消息。\n\
  \n清单 4-11 显示了执行 `slack_chat_reader_bot.py` 后的输出，此处已截断，因为你已在本章前面的清单 4-1 中获得了完整文本。\n\
  \n\n\n```  \nFatima [2023-08-11T09:04:20] : 大家好，我有个紧急问题需要讨论。我刚和一位客户通完电话，他们的应用一加载就崩溃。客户非常沮丧。我们能尽快解决这个问题吗？:tired_face:\
  \  \nKeith [2023-08-11T09:04:35] : 感谢你提醒我们，Fatima。我们马上处理这个问题。John，既然我们的架构师今天生病请假了，你能牵头调查这个问题吗？\
  \  \nJohn [2023-08-11T09:04:52] : 没问题，Keith。我会深入代码库，看看能否找到导致崩溃的潜在原因。  \nJohn [2023-08-11T09:05:30]\
  \ : Fatima，你能从客户那里收集一些额外信息吗？问问他们具体的设备型号、操作系统，以及最近是否安装了任何更新。  \n...  \n清单 4-11  \n\
  执行 `slack_chat_reader_bot.py` 的输出  \n```  \n\n## 留给读者的练习  \n\n显然，我们还可以做一些额外的工作，这些步骤将留给您（读者）来完成，例如：\
  \  \n\n*   将 `slack_chat_reader_bot.py` 中从 Slack 读取消息的代码连接到 `chatgpt_client.py`，以便将抓取消息和获取摘要合并为一步操作。\
  \  \n\n*   为 Slack 机器人本身增加更多功能，例如添加命令，使频道中的任何人都可以请求摘要。在当前状态下，机器人不会在频道中发布任何内容。然而，机器人的“用户界面”就是频道本身；因此，用户应该能够通过输入命令（例如请求摘要）与\
  \ Slack 机器人进行交互。  \n\n*   确保机器人不会让糟糕的情况变得更糟。每当机器人提供摘要时，它不应在频道内发布，因为这可能会给已经嘈杂的环境增加更多噪音。最佳实践是让机器人向请求摘要的人（或您创建的任何新命令的发起者）发送私密消息。\
  \  \n\n## 结论  \n\n在本章中，我们讨论了人工智能在企业中实际应用的多种方式之一。我们探讨了什么是真正的“提示工程”，指出提示工程不能仅通过向 ChatGPT\
  \ 输入文本就能完成。为了正确且有效地进行提示工程，您必须理解 ChatGPT API 所有输入参数的影响。  \n\n利用我们学到的提示工程知识，我们成功地对提供的任何大段文本进行了摘要。最后，我们看到了运行自动化机器人所需的代码，该机器人可以在指定有效日期范围的情况下，以编程方式从任何\
  \ Slack 频道抓取消息。  \n\n在本章（以及前一章）中，我们专门使用了 OpenAI API 的聊天补全模型。在下一章中，我们将通过实验 Whisper\
  \ 和 DALL·E 模型来突破可能的边界。  \n\n# 5. 多模态 AI：使用 Whisper 和 DALL·E 3 创建播客可视化工具  \n\n现在让我们引入一个新术语：**多模态\
  \ AI**。简单来说，生成式 AI 模型可以创建以下四种格式之一的内容：  \n\n*   文本  \n*   音频  \n*   图像  \n*   视频\
  \  \n\n每种格式都是一种**模态**。多模态 AI 是使用多个 AI 模型共同生成（或理解）内容的过程，其中输入是一种模态类型，而输出是另一种不同的模态类型。\
  \  \n\n以 OpenAI 的 Whisper 模型为例。如果你提供音频，它能够将所有内容转录为文本。DALL·E 也是如此。如果你提供文本提示，它能够生成你所描述内容的图像。\
  \  \n\n在本章中，我们将把多模态 AI 提升到一个新的水平！作为一名狂热的播客听众，我经常在收听音频格式的沉浸式故事时，好奇场景、意象、角色、主题或背景是什么样的。\
  \  \n\n因此，我们将使用 OpenAI 的多个模型创建一个播客可视化工具。这涉及几个步骤，但最终结果令人惊叹。在收听一个关于某人用豆腐烹饪美味佳肴（别急着否定，先试试看）的播客时，播客可视化工具生成了图\
  \ 5-1 中的图像。  \n\n![](img/615442_1_En_5_Fig1_HTML.jpg)  \n\n**图 5-1** 使用 GPT-4、Whisper\
  \ 和 DALL·E 模型可视化关于豆腐的播客的 AI 生成结果  \n\n为了使播客可视化工具的代码易于理解，我们将分以下三个步骤分别进行：  \n\n* \
  \  步骤 1：获取一集播客，使用 Whisper 模型生成转录文本。  \n*   步骤 2：获取生成的转录文本，使用 GPT-4 模型描述该集播客中讨论内容的视觉方面。\
  \  \n*   步骤 3：获取生成的描述，使用 DALL·E 模型生成图像。  \n\n本章提供的代码具有大量实际用途，例如：  \n\n*   如果你只是好奇一集播客的内容可能是什么样子（我们总是如此），你可以获得一个简单的代表性视觉图像，与你正在收听的内容相关联。\
  \  \n*   对于有听力障碍的人，你可以轻松地将播客或广播节目转换为图像幻灯片。这大大增强了内容的可访问性。  \n*   对于播客创作者，你现在有了一种简单的方法，可以为每一集添加视觉/主图。这很有用，因为\
  \ Apple Podcasts 和 Spotify 等播客播放器允许播客创作者显示单张图像与单集关联。这有助于提高听众的参与度。\n\n\n\n## 介绍 OpenAI\
  \ 的 Whisper 模型\n\n现在让我们介绍另一个新术语：**自动语音识别**（ASR）。普通消费者对这种技术非常熟悉，因为它已集成到手机（例如 iPhone\
  \ 的 Siri）和智能音箱（例如各类 Alexa 设备）中。其核心功能是将口语转换为文本。\n\nWhisper 是 OpenAI 的语音识别模型，其准确度惊人地高。下方列表是热门播客《多邻国西班牙语》某一集的转录文本，该播客通过将英语和西班牙语交织成叙事故事，让英语听众能够轻松理解西班牙语。在清单\
  \ 5-1 中，你可以看到使用 Whisper 模型生成的转录文本。\n\n```\n……我是玛蒂娜·卡斯特罗。每期节目，我们都会为您带来引人入胜的真实故事，帮助您提升西班牙语听力，并获得看待世界的新视角。讲述者将使用中级西班牙语，而我会用英语补充背景信息。如果您错过了什么，随时可以回退重听。我们还在\
  \ podcast.duolingo.com 提供完整文本。\n琳达从小就对她的祖母埃尔琳达着迷。埃尔琳达是一位治疗师或 curandera（巫医），为人们提供心理、情感、身体或精神疾病的疗法。\n\
  在危地马拉，这是一种通过同一家族世代口耳相传的实践。Mal de ojo（邪恶之眼）被许多危地马拉人视为一种疾病，他们认为人类有能力将负能量传递给他人。当邻居们怀疑婴儿有能量失衡时，就会把宝宝带到琳达的祖母那里。Su\
  \ madre lo llevaba a nuestra casa para curarlo……\n清单 5-1\nWhisper 模型执行语音识别，将音频转换为文本\n\
  ```\n\n如果你曾经使用过语音识别系统（即使是像 Siri 和 Alexa 这样复杂的技术），你就会知道它存在问题，例如：\n\n* **语音识别在标点符号方面存在问题**\n\
  \  * 你有没有注意到，没有人说话时会带标点符号？对于英语，我们通过改变语调或音量来提问或表达感叹。我们也用短停顿和长停顿来表示逗号和句号。\n\n* **语音识别在外来词和口音方面存在问题**\n\
  \  * 根据你询问的对象不同，英语中至少有 17 万个单词。然而，在英语口语中，我们经常使用外来词，例如：\n    * Tsunami（源自日语）：通常由地震引起的巨大海浪\n\
  \    * Hors d'oeuvre（源自法语）：开胃菜\n    * Lingerie（源自法语）：女性内衣或睡衣\n    * Aficionado（源自西班牙语）：对特定活动或主题非常热衷的人\n\
  \    * Piñata（源自西班牙语）：一种色彩鲜艳的糖果盒，供孩子们尽情敲打\n\n* **语音识别在名称方面存在问题**\n  * 某些人名、企业名和网站名通常难以拼写和理解\n\
  \n* **语音识别在同音词方面存在问题**\n  * 你还记得那些发音相同但拼写和含义不同的词吗？本书那位出色的编辑全都知道！\n    * Would /\
  \ Wood\n    * Flour / Flower\n    * Two / Too / To\n    * They’re / There / Their\n\
  \    * Pair / Pare / Pear\n    * Break / Brake\n    * Allowed / Aloud\n\n正如你从上面的清单\
  \ 5-1 中看到的，Whisper 能够理解音频中的所有标点符号，识别所有外来词（其中有几个），理解人名，以及 URL 中的公司名称（\"Duolingo\"\
  ）！当然，如果你注意到了，它还能区分 \"wood\" 和 \"would\"。\n\n### Whisper 模型的功能与限制\n\nWhisper 模型能够将以下语言的口语音频转换为文本：\n\
  \n* 南非荷兰语\n* 阿拉伯语\n* 亚美尼亚语\n* 阿塞拜疆语\n* 白俄罗斯语\n* 波斯尼亚语\n* 保加利亚语\n* 加泰罗尼亚语\n* 中文\n\
  * 克罗地亚语\n* 捷克语\n* 丹麦语\n* 荷兰语\n* **英语（当然！）**\n* 爱沙尼亚语\n* 芬兰语\n* 法语\n* 加利西亚语\n* 德语\n\
  * 希腊语\n* 希伯来语\n* 印地语\n* 匈牙利语\n* 冰岛语\n* 印尼语\n* 意大利语\n* 日语\n* 卡纳达语\n* 哈萨克语\n* 韩语\n\
  * 拉脱维亚语\n* 立陶宛语\n* 马其顿语\n* 马来语\n* 马拉地语\n* 毛利语\n* 尼泊尔语\n* 挪威语\n* 波斯语\n* 波兰语\n* 葡萄牙语\n\
  * 罗马尼亚语\n* 俄语\n* 塞尔维亚语\n* 斯洛伐克语\n* 斯洛文尼亚语\n* 西班牙语\n* 斯瓦希里语\n* 瑞典语\n* 他加禄语\n* 泰米尔语\n\
  * 泰语\n* 土耳其语\n* 乌克兰语\n* 乌尔都语\n* 越南语\n* 威尔士语\n\n所以，归根结底，它能够理解你自己说的音频，以及你的朋友和同事可能说的任何语言。\n\
  \n开发者每分钟最多只能向 API 发送 50 个请求，因此如果你要转录大量音频，需要考虑这一限制。\n\nWhisper 支持 `flac`、`mp3`、`mp4`、`mpeg`、`mpga`、`m4a`、`ogg`、`wav`\
  \ 或 `webm` 格式的音频。无论你使用哪种格式，发送到 API 的最大文件大小为 25MB。\n\n现在，如果你没有大量处理过音频文件，请注意，某些格式会生成*非常大的*文件（例如\
  \ `wav` 格式），而其他格式会生成非常小的文件（例如 `m4a` 格式）。因此，将文件转换为不同格式可以帮助你应对 25MB 的限制。不过，在本章后面，我们将看到一个工具的代码，它可以将单个大音频文件分割成多个较小的文件。\n\
  \n### 使用 `OpenAI.audio.transcriptions.create()` 转录音频\n\n`OpenAI.audio.transcriptions.create()`\
  \ 方法将音频转换为文本，并且仅与 Whisper 模型兼容。让我们看看表 5-1，了解成功调用该方法需要在参数中包含哪些内容。\n\n**表 5-1** Whisper\
  \ 的请求体\n\n| 字段 | 类型 | 是否必需 | 描述 |\n| --- | --- | --- | --- |\n| `file` | `File`\
  \ | 必需 | 你想要转录的整个音频文件。接受的格式为 `flac`、`mp3`、`mp4`、`mpeg`、`mpga`、`m4a`、`ogg`、`wav`、`webm`。\
  \ |\n| `model` | `String` | 必需 | 你想要用于转录的模型 ID。兼容的模型包括 `whisper-1`。 |\n| `prompt`\
  \ | `String` | 可选 | 这是可以提供以改变模型转录风格或为其提供来自先前音频片段更多上下文的任何文本。为确保最佳效果，请确保提示与音频使用相同语言。此外，此字段可用于更改\
  \ Whisper 不熟悉的任何单词的拼写或大小写。 |\n| `response_format` | `String` 默认值：`json` | 可选 | 这是转录输出的格式。接受的格式为\
  \ `json`、`text`、`srt`、`verbose_json`、`vtt`。 |\n| `temperature` | `Number` 默认值：`0`\
  \ | 可选 | 这是采样温度，范围从 0 到 1。较高的值会增加输出的随机性，而较低的值则确保输出更具确定性。 |\n| `language` | `String`\
  \ | 可选 | 这是输入音频的语言。它是可选的，但提供该值可以提高转录的准确性和延迟。 |\n\n### 检查方法参数\n\n\n\n## 创建音频文件分割工具：`audio_splitter.py`\n\
  \n好了，我们即将能够使用 `OpenAI.audio.transcriptions.create()` 方法以编程方式调用 Whisper 模型。然而，Whisper\
  \ 模型对每个文件有 25MB 的大小限制。\n\n如果你收听的是（例如）德克萨斯大学奥斯汀分校的 *StarDate* 播客，这倒不是问题。这个播客用大约两分钟的音频就能让你对夜空中该寻找什么有个很好的了解。但对于其他时长可达一小时（甚至更长）的音频节目来说，情况就不同了。在这种情况下，你肯定会超过\
  \ 25MB 的文件大小限制。\n\n因此，让我们与 ChatGPT 结对编程，运用我们的人类智慧来创建自己的工具，将单个音频文件分割成多个较小的文件。\n\n\
  **注意**\n\n在本节中，我将介绍多种将大音频文件分割成小片段的方法之一。例如，你可以使用流行的音频编辑应用（如开源工具 Audacity 或授权工具 Adobe\
  \ Audition）手动将大文件切割成较小的文件。\n\n`FFmpeg` 是以编程方式处理音频文件最可靠的方法之一，而 `pydub` 是 OpenAI 关于使用\
  \ Whisper 与 Python 的文档中推荐的开源库。\n\n清单 5-2 是发送给 ChatGPT 的提示，用于获取一个基本的音频文件分割应用。\n\n\
  ```\nSystem: You are a Python developer\nUser: Write an application that takes as\
  \ input a single MP3 file and splits the file into contiguous segments no longer\
  \ than 10 minutes using the pydub library and ffmpeg\n清单 5-2\n提示。使用 ChatGPT 创建 audio_splitter.py\
  \ 应用\n```\n\n经过一番来回交流，我们成功创建了（如清单 5-3 所示）`audio_splitter.py` 应用，其中包含我们对 ChatGPT\
  \ 生成内容的编辑。\n\n```\nfrom pydub import AudioSegment\nimport os\n### 输入音频文件的路径\ninput_audio_path\
  \ = \"audio-example.mp3\"\n### 加载音频文件\naudio = AudioSegment.from_mp3(input_audio_path)\n\
  ### 定义片段长度（毫秒） - 10 分钟\nsegment_length_ms = 10 * 60 * 1000  # 10 分钟换算为毫秒\n### 将音频分割成每段十分钟的片段\n\
  segments = [audio[i:i+segment_length_ms] for i in range(0, len(audio), segment_length_ms)]\n\
  ### 保存片段的输出目录\noutput_directory = \"/PATH/TO/OUTPUT\"\n### 确保输出目录存在，如果不存在则创建\nos.makedirs(output_directory,\
  \ exist_ok=True)\n### 处理每个片段（例如，可以将它们保存到单独的文件中）\nfor i, segment in enumerate(segments):\n\
  segment.export(os.path.join(output_directory, f\"segment_{i}.mp3\"), format=\"mp3\"\
  )\n清单 5-3\n响应。audio_splitter.py\n```\n\n我们的目标很简单：使用 Python 语言将一个 MP3 文件分割成不超过十分钟的连续片段。在此过程中，我们遵循以下步骤：\n\
  \n-   指定输入文件路径、输出目录以及所需的片段时长（以毫秒为单位，十分钟）。\n-   使用 `pydub` 库的 `AudioSegment` 类加载\
  \ MP3 文件，该类提供了音频处理功能。\n-   遍历输入的 MP3 文件，使用切片操作将其分割成指定时长（十分钟或更短）的较小部分。\n-   将每个片段作为单独的\
  \ MP3 文件保存到指定的输出目录中。\n\n要使其正常工作，你需要在项目中正确安装并配置 `pydub` 库**以及** `FFmpeg`。`FFmpeg`\
  \ 是一个极其通用的媒体转换器，不仅能处理 MP3 音频文件，还能处理各种其他音频文件格式（包括 `m4a`、`ogg` 和 `wav`）。它还能转换视频格式以及静态图像，如\
  \ `png`、`jpeg` 和 `gif`。\n\n运行脚本后，你将得到一个装满时长不超过十分钟的分段音频文件的文件夹。使用 `audio_splitter.py`\
  \ 工具，你拥有一个易于使用的 Python 脚本，可以修改设置以最适合你的需求。就我们的目的而言，目标是让音频文件小于 25MB，因此如果你要转录（例如）WAV\
  \ 格式的八小时法律诉讼记录，你可能需要将时长调整得更短，比如六分钟。\n\n使用音频分割器时，最佳实践是将输出文件夹与输入文件夹分开，当我们开始使用 Whisper\
  \ 模型调用 OpenAI 的 `audio.transcriptions.create()` 方法时，你就会明白原因。\n\n## 创建音频转录器：`whisper_transcriber.py`\n\
  \n现在，让我们构建下一个 Python 应用 `whisper_transcriber.py`。同样，我们将与 ChatGPT 结对编程，以获得一个可用的基础。清单\
  \ 5-4 是放入聊天游乐场以启动的提示。\n\n```\nSystem: You are a Python developer.\nUser: Using Python,\
  \ write a script that iterates over all of the mp3 files in a single folder on my\
  \ local computer and send all the files in the folder to be transcribed by OpenAI's\
  \ Whisper model, using the OpenAI's python library.\nModel: gpt-4o\nTemperature:\
  \ 1\nMaximum Length: 1150\n清单 5-4\n提示。要求 ChatGPT 使用 OpenAI 的 Python 库并将 MP3 文件发送到\
  \ Whisper 的 API\n```\n\n经过一些来回交流，清单 5-5 显示了 ChatGPT 给我们的有效响应。\n\n```\nimport os\n\
  import openai\nfrom dotenv import load_dotenv\ndef transcribe_mp3_files(openai_api_key,\
  \ mp3_folder_path):\n### 设置 OpenAI API 密钥\nopenai.api_key = openai_api_key\n###\
  \ 用于转录的模型\nmodel = \"whisper-1\"\n### 转录响应的期望格式\nresponse_format = \"text\"\n###\
  \ 遍历文件夹中的每个 MP3 文件\nfor filename in sorted(os.listdir(mp3_folder_path)):\nif filename.endswith(\"\
  .mp3\"):\nfile_path = os.path.join(mp3_folder_path, filename)\ntry:\n### 读取 MP3\
  \ 文件的内容\nwith open(file_path, \"rb\") as f:\nfile_content = f.read()\n### 转录 MP3\
  \ 文件\nresponse = openai.audio.transcriptions.create(\nfile=(filename, file_content),\n\
  model=model,\nresponse_format=response_format\n)\n### 打印整个响应对象\nprint(response)\n\
  except Exception as e:\nprint(f\"文件 {filename} 转录错误: {e}\")\ndef main():\n### 从\
  \ .env 文件加载环境变量\nload_dotenv()\n### OpenAI 的 API 密钥\nopenai_api_key = os.getenv(\"\
  OPENAI_API_KEY\")\n### 包含要转录的 MP3 文件的文件夹\nmp3_folder_path = \"/PATH/TO/OUTPUT\"\
  \  # 替换为你的 MP3 文件夹路径\n### 转录 MP3 文件\ntranscribe_mp3_files(openai_api_key, mp3_folder_path)\n\
  if __name__ == \"__main__\":\nmain()\n清单 5-5\n响应。whisper_transcriber.py\n```\n\n\
  从上面的代码清单可以看出，将输入文件与输出文件放在不同文件夹的一个主要好处是，你可以将输出文件夹的路径提供给上面的脚本，而无需担心其他任何事情。该脚本会抓取输出文件夹中的所有文件，无论该文件夹中有多少个文件，因此可以是\
  \ 1 个或 100 个文件——都没关系。\n\n\n\n## 用播客找点乐子，动手试试看\n\n好了，让我们用目前展示的代码来运行一个测试。《*美国生活*》是一档由艾拉·格拉斯主持、与芝加哥\
  \ WBEZ 电台联合制作的每周公共广播节目（也是一个播客）。该播客的图标如图 5-2 所示。\n\n![](img/615442_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 如果你在寻找一个故事引人入胜的好播客，我推荐收听《美国生活》（图片来源：芝加哥 WBEZ 电台）\n\n每一集节目都围绕一个特定的主题或话题，将一系列故事编织在一起。有些故事是调查性新闻报道，另一些则只是对拥有动人故事的普通人的采访。第\
  \ 811 集的标题是“我唯一不能去的地方”，文件大小为 56MB，格式为 MP3。既然我们已经知道 56MB 对于发送给 Whisper 进行转录来说太大了，我们需要使用`audio_splitter.py`来为我们拆分文件。\n\
  \n代码清单 5-6 展示了该集完整转录文本的摘录。\n\n```\n“……我的表妹卡米尔其实并不喜欢狗，但有一只狗她非常喜爱。它叫福克西，因为它看起来完全像一只狐狸，只不过它是黑色的。它是邻居家的狗，但卡米尔和它似乎有一种真正的亲密关系，也许是因为她们俩离地面都不太远。那时卡米尔大概四五岁，说话有点口齿不清，所以福克西被她叫成了‘福兹’。我觉得这是我听过最可爱的事情之一。\n\
  卡米尔对福克西的记忆，几乎像一部电影。她的回忆感觉像是无尽的夏天，朦胧而完美，就像用有颗粒感的胶片拍摄的场景。我只记得那种兴奋地跑去看福克西的感觉。我脑海里有一个画面，就是来到房子前，我能看到福克西在外面。我能透过通往花园的门看到福克西。有一个关于卡米尔和福克西的故事，我经常想起。我和姐姐谈论这个故事好多年了，但从未和卡米尔聊过。故事是这样的：有一次她们在玩的时候……”\n\
  ```\n\n**代码清单 5-6** 《美国生活》第 811 集的部分转录文本\n\n为简洁起见，我们只展示了转录文本的摘录。完整的转录文本超过 8000 个单词，因为该集节目时长接近一小时。\n\
  \n### 元操作：提示工程——让 GPT-4 为 DALL·E 编写提示词\n\n由于我们想要可视化的播客集完整文本转录有数千个单词，我们将使用 GPT-4\
  \ 来自动创建 DALL·E 模型所需的提示词。DALL·E 能够根据提示词中的文本描述生成图像，但最好让提示词尽可能简短。代码清单 5-7 是让 GPT-4\
  \ 为 DALL·E 生成提示词的提示词。\n\n```\n系统：你是一个帮助可视化播客的服务。\n用户：阅读以下播客转录文本。为一位视障人士描述最能代表该集整体主题的背景和主体。请以下列短语之一开头：\n\
  - \"一张照片，内容是\"\n- \"一幅画，内容是\"\n- \"一张 35mm 微距照片，内容是\"\n- \"数字艺术作品，内容是\"\n用户：对《美国生活》的支持来自\
  \ Squarespace……\n模型：gpt-4o\n温度：1.47\n最大长度：150\nTop P：0\n频率惩罚：0.33\n存在惩罚：0\n```\n\
  \n**代码清单 5-7** 让 GPT-4 为 DALL·E 创建提示词的提示词\n\nDALL·E 需要知道要生成哪种类型的图像，因此我们需要指定图像应该是照片、绘画、数字艺术等。我们需要确保\
  \ GPT-4 生成的文本简短，所以我们将最大长度设为 150 个令牌。此外，为了防止 GPT-4 多次重复某些短语，我们引入了 0.33 的频率惩罚。\n\n\
  代码清单 5-8 展示了 GPT-4 在阅读《美国生活》第 811 集转录文本后生成的结果。\n\n```\n数字艺术作品，内容是一个小女孩坐在花园里，旁边有一只看起来像狐狸的黑狗。女孩在微笑，狗在摇尾巴。图像具有朦胧、梦幻般的质感，并带有胶片颗粒效果，以唤起怀旧之情。\n\
  ```\n\n**代码清单 5-8** GPT-4 为 DALL·E 创建的提示词\n\n### 使用 `OpenAI.images.generate()` 创建图像\n\
  \n为了使用 DALL·E 模型根据文本提示词动态创建图像，你需要调用 `OpenAI.images.generate()` 方法。\n\n### 检查方法参数\n\
  \n表 5-2 描述了 `OpenAI.images.generate()` 方法请求体所需参数的格式。显而易见，`prompt` 参数是成功调用模型的唯一必需参数。\n\
  \n**表 5-2** `OpenAI.images.generate()` 方法的请求体\n\n| 字段 | 类型 | 是否必需 | 描述 |\n| ---\
  \ | --- | --- | --- |\n| `prompt` | 字符串 | 必需 | 在此描述你想要创建的图像。对于 `dall-e-2`，最大长度为\
  \ 1000 个字符；对于 `dall-e-3`，最大长度为 4000 个字符。 |\n| `model` | 字符串 | 可选 | 用于生成图像的模型名称。兼容的模型包括：`\"\
  dall-e-2\"`、`\"dall-e-3\"`。 |\n| `n` | 整数或 null 默认值：1 | 可选 | 这是你请求创建的图像数量。必须在 1\
  \ 到 10 之间。注意：由于 `dall-e-3` 所需的复杂性，OpenAI 可能会将你的请求限制为单张图像。 |\n| `quality` | 字符串 默认值：`\"\
  standard\"` | 可选 | 允许你指定生成图像的质量。此参数仅对 `dall-e-3` 有效。可接受的值有：`\"standard\"`、`\"hd\"\
  `。 |\n| `size` | 字符串或 null 默认值：`\"1024x1024\"` | 可选 | 生成图像的尺寸。`dall-e-2` 可用的图像尺寸有：`\"\
  256x256\"`、`\"512x512\"`、`\"1024x1024\"`。`dall-e-3` 可用的图像尺寸有：`\"1024x1024\"`、`\"\
  1792x1024\"`（横向）、`\"1024x1792\"`（纵向）。 |\n| `style` | 字符串 默认值：`\"vivid\"` | 可选 |\
  \ 允许你指定生成图像的自然程度。此参数仅对 `dall-e-3` 有效。可接受的值有：`\"natural\"`（适合照片）、`\"vivid\"`（适合艺术风格）。\
  \ |\n| `response_format` | 字符串或 null 默认值：`\"url\"` | 可选 | 生成图像的格式。可接受的值有：`\"url\"\
  `、`\"b64_json\"`。 |\n| `user` | 字符串 | 可选 | 这是一个代表最终用户的唯一标识符，可以帮助 OpenAI 监控和检测滥用行为。\
  \ |\n\n### 处理响应\n\n成功调用 `OpenAI.images.generate()` 方法后，API 将返回一个图像 JSON 对象。表 5-3\
  \ 展示了该图像对象的分解结构，它只有一个参数。\n\n**表 5-3** 响应对象的结构\n\n| 字段 | 类型 | 描述 |\n| --- | --- |\
  \ --- |\n| `url`（或）`b64_json` | 字符串 | 如果请求中的 `response_format` 是 `\"url\"`，则这是生成图像的\
  \ URL。（或）如果请求中的 `response_format` 是 `\"b64_json\"`，则这是 base64 编码的 JSON 图像。 |\n\n\
  \n\n### 创建图像生成器：`dalle_client.py`\n\n清单 5-9 是一个简短而精妙的脚本，它使我们能够以编程方式调用 DALL·E，从而创建我们想要的任何图像。\n\
  \n```\nimport openai\nimport os\nfrom dotenv import load_dotenv\n#### 从 .env 文件加载\
  \ API 密钥\nload_dotenv()\napi_key = os.getenv(\"OPENAI_API_KEY\")\nopenai.api_key\
  \ = api_key\n#### 定义提示词和尺寸\nprompt = \"一张 35mm 微距照片，三只可爱的罗威纳幼犬，没有项圈，躺在田野里\"\nsize\
  \ = \"1024x1024\"\n#### 使用 DALL·E 生成图像\nresponse = openai.images.generate(\nprompt=prompt,\n\
  size=size,\nmodel=\"dall-e-3\"\n)\nprint(\"图像 URL:\", response.data[0].url)\n清单\
  \ 5-9\n在 dalle_client.py 中使用 Python 调用 DALL·E\n```\n\n下面的图 5-3 和图 5-4 展示了根据清单 5-8\
  \ 中来自播客节目《美国生活》第 811 期的文本提示词生成的图像。\n\n![](img/615442_1_En_5_Fig4_HTML.jpg)\n\n图\
  \ 5-4\n\n来自《美国生活》播客第 811 期的 DALL·E 生成图像：一个小女孩和她的狗\n\n![](img/615442_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n来自《美国生活》播客第 811 期的 DALL·E 生成图像：一个小女孩和她的狗\n\n### DALL·E 提示词工程与最佳实践\n\n\
  现在，使用 DALL·E 创建图像需要运用提示词工程，才能获得一致且理想的结果。最好多尝试不同的提示词来练习，看看哪些对你和你的用例有效。也许你更喜欢绘画而不是\
  \ 3D 效果的图像？也许你需要照片而不是数字艺术？也许你希望图像是特写镜头而不是肖像？有很多可能性需要考虑。\n\n无论你的用例是什么，这里有两条黄金法则，可以帮助你充分利用\
  \ DALL·E 提示词。\n\n#### DALL·E 黄金法则 #1：熟悉 DALL·E 能生成的图像类型\n\n首先，DALL·E 需要理解的最重要的事情之一是需要生成的图像类型。以下是\
  \ DALL·E 能够创建的几种最常见的图像类型列表：\n\n*   3D 渲染\n*   绘画\n*   抽象画\n*   表现主义油画\n*   油画（以任何已故艺术家的风格）\n\
  *   油画棒\n*   数字艺术\n*   照片\n*   照片级真实感\n*   超写实\n*   霓虹照片\n*   35mm 微距照片\n*   高质量照片\n\
  *   剪影\n*   蒸汽波\n*   卡通\n*   毛绒物体\n*   大理石雕塑\n*   手绘草图\n*   海报\n*   铅笔与水彩\n*   合成波\n\
  *   漫画风格\n*   手绘\n\n#### DALL·E 黄金法则 #2：详细描述你希望出现在前景和背景中的内容\n\n我们怎么强调都不为过：你需要向 DALL·E\
  \ 进行详细描述，才能获得一致且理想的结果。这听起来可能有点奇怪，但向 DALL·E 描述图像的最佳方式，就像你向另一个人描述一个梦境一样。\n\n所以，作为我们之间的一个思维练习，试着描述你最近做的一个梦。当你描述梦中的人物、地点和事物时，你的脑海中会浮现出你记得的最重要的东西，以及你所感受到的体验。当你向另一个人描述时，微小的细节开始浮现，例如：\n\
  \n*   有多少人在场（如果有的话）？\n*   人或动物处于什么姿势？站着、坐着还是躺着？\n*   场景和背景中有什么东西？\n*   哪些物品让你印象深刻？声音？气味？颜色？\n\
  *   你感觉如何？快乐、诡异、兴奋？\n*   感觉是什么时间？早晨、中午、夜晚？\n\n如果你能向另一个人描述一个梦，那么向 DALL·E 描述你想要的东西应该毫无问题。\n\
  \n### 让我们尝试向 DALL·E 输入提示词\n\n为了让您了解可以用 DALL·E 做些什么，我们创建了几个不同风格的图像提示词，供您参考并激发灵感。图\
