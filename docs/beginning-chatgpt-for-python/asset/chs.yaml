  \ Chat Playground 的技术人员都无法使用的。在本章中，我们花时间解释了这些选项，重点是我们能够发送的 `messages`。\n\n既然我们已经有了一个可用的\
  \ Python ChatGPT 客户端，接下来让我们看看如何利用它来完成本书其余部分的示例！\n\n# 4. 在企业中使用 AI！为 Slack 消息创建文本摘要器\n\
  \n在当今的企业界，公司使用 Slack（或 Microsoft Teams）来组织自身，并将其作为公司内部所有人的中心沟通场所，这是非常普遍的现象。现在，如果你曾经使用过\
  \ Slack，我想你知道一个频道很容易因为公司或世界某个地方发生了某些重要事情而被大量消息淹没。\n\n当然，你在公司承担的责任越多（例如，经理、团队负责人、架构师等），你被期望参与的频道就越多。在我看来，Slack\
  \ 是一把双刃剑。你需要用它来完成工作，但作为开发者，你肯定不能在每日站会上说：“昨天，呃，我花了一整天读 Slack。没有遇到障碍。”\n\n此外，如果你为一家客户遍布不同时区的公司工作（这在当今很常见），那么早上打开\
  \ Slack 看到大量在你离开键盘期间发布的消息，会让人感到相当沮丧。\n\n因此，在本章中，我们将把 AI 应用于企业，使 Slack 更加有用。我们将利用上一章的代码，用\
  \ Python 创建一个 Slack 机器人，用于总结 Slack 频道中的重要对话。我们将利用 ChatGPT 的文本摘要能力，并更多地关注**提示工程**。\n\
  \n## 那么，什么是提示工程？\n\n简单来说，提示工程就是精心设计和优化提示及输入参数，以指导和引导 ChatGPT 及其他 AI 模型行为的过程。它基本上是行业内用来描述创建正确输入以获得所需结果的术语。\n\
  \n## ChatGPT 会抢走所有人的饭碗（其实不然）\n\n我个人的浅见是，世界上每家公司都坐拥一座未开发信息的金矿。如果你正在使用任何记录员工之间交流日志的系统、客户支持请求的数据库，或任何大型文本存储库（是的，这包括你的电子邮件、Microsoft\
  \ Exchange 和企业版 Gmail），那么你就拥有一个等待被利用的大型非结构化文本存储库。\n\n因此，ChatGPT 的最佳用途不是要消除任何人的工作。它应该被用来增强和扩展公司团队成员已经在做的事情。正如我们在上一章中看到的，作为一名程序员，ChatGPT\
  \ 可以作为一个非常有效的结对编程伙伴。它也非常擅长高效快速地执行某些困难任务。因此，本章的项目涉及处理一个实际示例，展示如何利用大量非结构化文本源使其变得有用。\n\
  \n你可以使用在第 3 章中创建的 ChatGPT 客户端来运行本章后面列出的提示工程示例，也可以使用我们在第 1 章中讨论过的 Playground 模式。无论哪种方式，让我们直接开始吧。\n\
  \n\n\n## 审视真实世界的问题：软件公司的客户支持\n\n让我们来看看软件开发中最艰巨的任务之一：提供技术支持。想象一下，整天接听来自可能因使用你的软件而感到沮丧、困惑或只是需要解决方案的人们的电话和信息，这该有多“美妙”。以下是客户支持为何如此棘手的一些原因：\n\
  \n-   众所周知，你的最终用户和客户在解释软件问题时非常不擅长。\n-   一级技术人员通常是第一道防线，他们通常处理最基本的问题或用户错误。但当问题变得更复杂时，用户会被升级到二级。\n\
  -   中级是一个棘手的位置，因为他们比一级技术支持人员拥有更多的知识和经验；然而，他们没有机会直接从最终用户那里获得答案。\n-   真正糟糕的问题会被升级到三级；然而，这些是最昂贵的技术支持人员，因为他们拥有最多的知识和经验。他们对代码以及服务器和基础设施都有实践经验。\n\
  \n那么，让我们以一个在 Slack 中典型的支持渠道内的真实对话为例。以下是虚构公司中团队成员及其角色的列表：\n\n-   法蒂玛（客户服务代表）\n- \
  \  约翰（软件工程师）\n-   戴夫（项目经理）\n-   基思（首席技术官）\n\n下面的列表提供了一个软件初创公司团队成员之间的对话示例。客户服务代表法蒂玛让团队知道他们的应用在启动后立即崩溃（这可不是什么好问题）。首席技术官基思立即介入，升级了这个问题。\n\
