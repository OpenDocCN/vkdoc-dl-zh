  ### 为 ChatGPT 创建系统消息\nsystem_message_to_chatgpt = \"You are a virtual assistant\
  \ that provides support for the Crooks Bank banking app.\"\nwith open('FAQ.txt',\
  \ 'r', encoding='utf-8') as file:\n    # 将文件的全部内容作为一个字符串读入变量\n    file_contents\
  \ = file.read()\n### 初始化 ChatGPT 客户端\nchatgpt_client_for_qa_and_moderation = ChatGPTClient(system_message_to_chatgpt,\
  \ file_contents)\n### 机器人就绪时的事件处理程序\n@discord_client.event\nasync def on_ready():\n\
  \    \"\"\"\n    当机器人成功登录并准备好接收事件时触发的事件处理程序。\n    \"\"\"\n    print('已登录为', discord_client.user)\n\
  \    print('------')\n### 收到消息时的事件处理程序\n@discord_client.event\nasync def on_message(message):\n\
  \    \"\"\"\n    收到消息时触发的事件处理程序。\n    参数：\n    message (discord.Message)：机器人收到的消息。\n\
