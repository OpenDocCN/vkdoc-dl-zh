    \ token in the Python code that’s presented later in this chapter.\n\n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12\n\nClick on the “Reset Token” Button to See Your ID Token\n\nScroll\
    \ down the page to the section named “Privileged Gateway Intents” and enable the\
    \ option named “MESSAGE CONTENT INTENT.”\n\nNote\n\nSo, let's slow things down\
    \ a bit and talk about intents. What exactly is an \"intent\" and why is it needed?\
    \ For the purposes of the Discord API, you need to specify explicitly every type\
    \ of information that you want to be notified by Discord programmatically. Otherwise,\
    \ Discord will constantly bombard you with events that are not relevant to you\
    \ or your bot. For example, for our purposes, we don’t care when people join or\
    \ leave the server. However, if you want to send a list of server rules to anyone\
    \ who joins your server for the first time, then you definitely would want to\
    \ enable the “SERVER MEMBERS INTENT.” When we deep dive into the code, you'll\
    \ see more information about intents.\n\nBe sure to click on the green button,\
    \ “Save Changes” to save your changes. The result is shown in Figure [6-13](#615442_1_En_6_Chapter.xhtml#Fig13).\n\
    \n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig13_HTML.jpg)\n\nFigure 6-13\n\
    \nEnable the option named “MESSAGE CONTENT INTENT”"
  trans: "\n# 在 Discord 上注册一个新的机器人应用\n\n现在我们已经创建好了包含相应频道的 Discord 服务器，是时候注册机器人本身了——或者更确切地说，在我们的案例中，是注册多个机器人。为了保持代码的整洁和可维护性，我们实际上会为\
    \ Discord 服务器配置多个机器人。第一个机器人将专门用于回答“问答”频道中的问题。第二个机器人将监控所有频道，查找有害内容或广告等不良信息。\n\n\
    要创建我们的机器人，请前往 Discord 开发者网站，如图 6-5 所示：\n\n[**https://discord.com/developers**](https://discord.com/developers)\n\
    \n![](img/615442_1_En_6_Fig5_HTML.jpg)\n\n图 6-5\n\n要创建 Discord 机器人，请前往 Discord\
    \ 开发者网站\n\n在页面右上角，点击“新建应用”按钮，如图 6-5 所示。\n\n在 Discord 和 Slack 的术语中，“机器人”就是一个“应用”，并且机器人必须先向\
    \ Discord 注册，才能在 Discord 服务器上运行。\n\n为机器人指定一个名称，然后点击“创建”按钮，如图 6-6 所示。\n\n![](img/615442_1_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6\n\n为 Discord 创建/注册机器人\n\n## 指定机器人的基本信息\n\n之后，您将进入一个页面，可以在其中指定机器人的基本信息，如图\
    \ 6-7 所示。\n\n![](img/615442_1_En_6_Fig7_HTML.jpg)\n\n图 6-7\n\n我决定给我的机器人一个可爱的小机器人图标\n\
    \n请务必熟悉页面左侧的导航菜单。如您所见，我们有几类设置需要为机器人配置。默认情况下，我们位于“基本信息”页面，在此处指定机器人的基本信息。如果您已为机器人准备好图标，可以在此处上传。\n\
    \n## 为机器人指定 OAuth2 参数\n\n现在，是时候为我们的机器人指定作用域和权限了。如果您按照第 4 章中创建 Slack 机器人的步骤操作，那么（如前所述）您会对这个过程感到熟悉。机器人**不能**也**不应该**拥有做任何事的能力——它们只应被允许执行其设计要执行的一系列操作。\n\
    \n在左侧的设置导航菜单中，导航到“OAuth2 > OAuth2 URL 生成器”以继续。\n\n以下是我们需要的作用域：\n\n*   作用域\n  \
    \  *   机器人\n\n这反映在图 6-8 中。\n\n![](img/615442_1_En_6_Fig8_HTML.jpg)\n\n图 6-8\n\n\
    选择作用域\n\n选择机器人的作用域后，我们会看到所有仅适用于机器人的权限（请务必向下滚动查看）。\n\n根据您授予的权限，机器人可以变得相当强大。有些权限允许机器人像普通人类管理员一样行事，例如管理服务器、角色和频道。拥有这些权限的机器人还可以踢出和封禁成员。\n\
    \n我们现在要为机器人启用的权限是允许机器人在文本频道中发送和接收消息，以及允许机器人参与语音频道的语音权限。很简单，对吧？\n\n为机器人选择以下权限：\n\
    \n*   机器人权限\n    *   读取消息/查看频道\n    *   发送消息\n    *   读取消息历史\n\n这反映在图 6-9 中。\n\
    \n![](img/615442_1_En_6_Fig9_HTML.jpg)\n\n图 6-9\n\n指定机器人权限\n\n尽管您还没有编写任何 Python\
    \ 代码，但现在是将机器人邀请到您的服务器的时候了。\n\n## 将机器人邀请到您的服务器\n\n选择适当的权限后，Discord 会为您生成一个动态 URL，使您能够将机器人邀请到您的服务器（如果看不到，请向下滚动页面）。\n\
    \n复制该 URL 并将其粘贴到您已登录 Discord 的 Web 浏览器中。结果如图 6-10 所示。\n\n![](img/615442_1_En_6_Fig10_HTML.jpg)\n\
    \n图 6-10\n\n如果您仔细阅读此处的屏幕信息，您会发现 Discord 颇具幽默感\n\n点击“继续”按钮将机器人添加到您的服务器。\n\n接下来，您将看到一个与上一页面非常相似的页面，但主要区别在于它会为您提供机器人所有权限和功能的摘要。通常，如果您要将机器人添加到*非您创建*的服务器，这会非常有用。但是，由于这个机器人是我们自己创建的，这仅是对我们之前已指定设置的确认。图\
    \ 6-11 显示了使用所选权限授权我们机器人的确认屏幕。\n\n![](img/615442_1_En_6_Fig11_HTML.jpg)\n\n图 6-11\n\
    \n确认机器人的功能\n\n点击“授权”按钮，授予机器人在您的服务器上运行的权限。\n\n如果一切顺利，您应该会在服务器的常规频道中看到一条自动消息，表明该过程已成功完成。\n\
    \n## 获取机器人的 Discord ID 令牌并设置网关意图\n\n现在，是时候获取机器人的 Discord ID 令牌了，您将在代码中使用它来以编程方式验证您的机器人。\n\
    \n注意\n\n出于显而易见的原因，在这里使用“令牌”一词让我感到紧张，因为由于上下文原因，这个词在本书中有两种不同的含义，但这里快速回顾一下其含义：\n\n\
    *   使用 Discord 和 Slack API 时，“令牌”是身份验证令牌。\n*   使用 OpenAI API 时，“令牌”是单词的一部分。\n\n\
    返回 Discord 开发者网站，在设置导航菜单中点击“机器人”类别以继续。\n\n尽管您还没有看到您的令牌，但您需要点击“重置令牌”按钮，如图 6-12\
    \ 所示。\n\n请务必将 ID 令牌复制并保存到安全的地方。您将在本章后面介绍的 Python 代码中需要此令牌。\n\n![](img/615442_1_En_6_Fig12_HTML.jpg)\n\
    \n图 6-12\n\n点击“重置令牌”按钮查看您的 ID 令牌\n\n向下滚动页面到名为“特权网关意图”的部分，并启用名为“消息内容意图”的选项。\n\n\
    注意\n\n那么，让我们放慢节奏，谈谈意图。到底什么是“意图”，为什么需要它？就 Discord API 而言，您需要明确指定您希望 Discord 以编程方式通知您的每一种信息类型。否则，Discord\
    \ 会不断用与您或您的机器人无关的事件轰炸您。例如，就我们的目的而言，我们不关心人们何时加入或离开服务器。但是，如果您想向首次加入服务器的任何人发送服务器规则列表，那么您肯定希望启用“服务器成员意图”。当我们深入研究代码时，您会看到更多关于意图的信息。\n\
    \n请务必点击绿色按钮“保存更改”以保存您的更改。结果如图 6-13 所示。\n\n![](img/615442_1_En_6_Fig13_HTML.jpg)\n\
    \n图 6-13\n\n启用名为“消息内容意图”的选项\n"
- fmt: "# Creating a Q&A Bot App in Python to Answer Questions from a Channel: `tech_support_bot_dumb.py`\n\
    \nOf course, now that we’ve done all the prerequisites necessary and we know the\
    \ name of the channel that we want to monitor for questions from our users, let’s\
    \ get to the code in Python that joins our server and accesses all the messages\
    \ from a specific Discord channel.\n\nThis is the first of two Discord bots that\
    \ we’re creating in this chapter. This bot, `tech_support_bot_dumb.py`, will be\
    \ responsible for watching the messages in the “q-and-a” channel in our Discord\
    \ server.\n\nLater on, in this chapter, we’ll create another bot that will be\
    \ responsible for moderating *all content* in the Discord server for unwanted\
    \ content, including the “q-and-a” channel. The goal here is to follow the architectural\
    \ pattern of “separation of concerns.” Rather than creating a gigantic Python\
    \ Discord bot that performs all the moderation needs for the Discord server, we’re\
    \ going to separate the functionality into two different apps.\n\nWe’re also going\
    \ to take things step by step and focus this chapter on getting past the learning\
    \ curve for the Discord capabilities in Python. In the final chapters of this\
    \ book, we’ll enhance both bots and make them artificially intelligent using the\
    \ Open AI APIs.\n\nListing [6-1](#615442_1_En_6_Chapter.xhtml#PC1) is the code\
    \ that we need to create a basic Discord bot that watches all the messages posted\
    \ in a single channel and provides an answer.\n\n*Listing 6-1.* *tech_support_bot_dumb.py*\n\
    \n```\nimport discord\n# Bot's token for authentication\ndiscord_token = 'YOUR_TOKEN_HERE'\n\
    # Name of the channel the bot should monitor and interact with\nchannel_to_watch\
    \ = 'q-and-a'\n# Initialize the Discord client\ndiscord_client = discord.Client()\n\
    # Event handler for when the bot is ready\n@discord_client.event\nasync def on_ready():\n\
    print('Logged in as', client.user)\nprint('------')\n# Event handler for when\
    \ a message is received\n@ discord_client.event\nasync def on_message(message):\n\
    # Ignore messages sent by the bot to prevent self-responses\nif message.author\
    \ == client.user:\nreturn\n# Ignore messages not in the specified \"q-and-a\"\
    \ channel\nif isinstance(message.channel, discord.TextChannel) and message.channel.name\
    \ != channel_to_watch:\nreturn\n# Send a greeting response to the user who sent\
    \ the message\nreply = f'hi {message.author.mention}, I can help you with that!'\n\
    await message.channel.send(reply)\n# Run the bot with the provided token\ndiscord_client.run(discord_token)\n\
    ```\n\nAt the beginning of the script, you should notice that we specify the channel\
    \ that we are interested in monitoring with the `channel_to_watch` variable.\n\
    \n**Note**\n\nFor some reason, Discord’s own terminology sometimes refers to Discord\
    \ servers as “guilds.” However, from our perspective, a guild is simply a Discord\
    \ server.\n\n## Handling Messages Sent to the Discord Server\n\nAs we wrap things\
    \ up for this first Python Discord bot, we need to talk about the `on_message(message)`\
    \ function. This function is called asynchronously for every single message sent\
    \ to the Discord server, as well as for messages from users sent directly to the\
    \ bot itself as a DM.\n\n**Note**\n\nDid you know that when the bot sends an answer\
    \ to a person’s question in the Discord server, Discord will invoke the `on_message(message)`\
    \ function of the bot to give the bot the message that the bot just sent. This\
    \ sounds like a recipe for an infinite loop, doesn’t it? Therefore, we have logic\
    \ in place for the bot to ignore messages sent from itself.\n\nIn the final lines\
    \ of the `on_message(message)` function, we make sure that we give a friendly\
    \ reply to the original sender of the message by “tagging” them in the response.\
    \ As we mentioned before, this first version of the Q&A bot is dumb. It will respond\
    \ to your question when posted in the Discord server, but the response won’t actually\
    \ answer your question.\n\n## Success! Running Your First Discord Bot: `tech_support_bot_dumb.py`\n\
    \nNow, let’s run our Python Discord bot. After executing the app, be sure to return\
    \ back to your Discord server and try to type a question in the channel that you\
    \ set up for Q&A. Figure [6-14](#615442_1_En_6_Chapter.xhtml#Fig14) shows the\
    \ response to my question, “Is this bot going to answer my questions about the\
    \ app?”\n\n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig14_HTML.jpg)\n\n\
    Figure 6-14\n\nSuccess Running the Q&A Bot in Discord\n\nAs you carefully inspect\
    \ Figure [6-14](#615442_1_En_6_Chapter.xhtml#Fig14), you’ll see some key features\
    \ such as:\n\n- On the right side, you’ll see that the bot is online with a green\
    \ status indicator.\n- After asking a question in the channel, the bot will tag\
    \ you directly.\n\n# Streamlining the Process of Registering Our Next Discord\
    \ Bot App with Discord\n\nNow that we have successfully performed all the steps\
    \ in order to get a functioning Discord bot, creating the second bot will be a\
    \ piece of cake! So, let’s briefly reiterate all the steps from above in order\
    \ to create our second Discord bot. I’ll be sure to point out the items that need\
    \ to be changed or enhanced due to the fact that this second bot will work as\
    \ a moderator, instead of providing answers to questions from the users of our\
    \ Discord server.\n\n## Registering a New Discord Bot App with Discord\n\nPerform\
    \ the same steps as above; however, it would be wise to give the bot a different\
    \ name. For me, this second bot will be named “Mod Bot.”\n\n## Specifying General\
    \ Info for the Bot\n\nFor me, I have a different icon for the content moderator\
    \ bot, so I specified it here, as you can see in Figure [6-15](#615442_1_En_6_Chapter.xhtml#Fig15).\n\
    \n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig15_HTML.jpg)\n\nFigure 6-15\n\
    \nProviding a Name and Icon for the Second Bot\n\n## Specifying OAuth2 Parameters\
    \ for the Bot\n\nThis second bot needs more permissions in order to perform more\
    \ tasks. Below are the scopes that we want:\n\n- Bot\n  - Kick members\n  - Ban\
    \ members\n  - Send messages\n  - Manage messages\n  - Read message history\n\n\
    ## Invite Your Bot to Your Server\n\nRepeat the same steps as above for the first\
    \ bot.\n\n## Getting the Discord ID Token for Your Bot and Setting the Gateway\
    \ Intents\n\nAgain, follow the steps above in order to get the Discord ID token.\
    \ Then, scroll down the page to the section named “Privileged Gateway Intents,”\
    \ and enable the options named “SERVER MEMBERS INTENT” and “MESSAGE CONTENT INTENT.”"
