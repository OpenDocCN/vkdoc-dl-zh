    \n*   Korean\n\n*   Latvian\n\n*   Lithuanian\n\n*   Macedonian\n\n*   Malay\n\
    \n*   Marathi\n\n*   Maori\n\n*   Nepali\n\n*   Norwegian\n\n*   Persian\n\n*\
    \   Polish\n\n*   Portuguese\n\n*   Romanian\n\n*   Russian\n\n*   Serbian\n\n\
