- fmt: '### Updates to the `on_message(message)` Function


    When a message is received, be sure to notice the following lines:


    ```

    @discord_client.event

    async def on_message(message):

    ```


    This function is the core part of our Discord bot. Whenever a message is posted
    in our Discord server, the function `on_message()` is called. The `async` keyword
    is important here because this enables `on_message()` to be called asynchronously,
    which is what we want, i.e., whenever a message is posted.


    **Note**


    A quick reminder about synchronous vs. asynchronous communication. A typical example
    of synchronous communication is like accessing a web server using a web browser.
    Once you send your request, you need to wait until you get a response. In order
    to view a different website, you need to send another request and wait again for
    the response.


    A good example of asynchronous communication is emailing a friend or colleague.
    You can send 1, 2, 5, 10, or even 1000 emails to your friend, but they aren’t
    necessarily *waiting* for your email. In other words, they aren’t left in a “holding
    pattern" and stuck waiting for you to send something due to the way that email
    simply works. If and when an email arrives, your friend will get a notification.


    Therefore, whenever a message is posted in our Discord server, the function `on_message()`
    is called with the message itself in the function parameters.


    Now, let’s further examine the following code from `tech_support_bot.py`:


    ```

    async with message.channel.typing():

    # Call ChatGPT to generate a response based on the received message

    response_from_chatgpt = chatgpt_client_for_qa_and_moderation.send_message_from_discord(message.content)

    # Construct a reply mentioning the message author and appending ChatGPT''s response

    reply = f''{message.author.mention} {response_from_chatgpt}''

    ```


    Here, we provide a nice user experience and show the user that the bot is “typing,”
    while the user’s question is being sent to ChatGPT. When the response comes back,
    we provide the reply back to the user.


    ## Analyzing `chatgpt_client_for_qa_and_moderation.py`


    Now, as we look further into Listing [7-2](#615442_1_En_7_Chapter.xhtml#PC9) above,
    `tech_support_bot.py` instantiates the `ChatGPTClient` object in the `chatgpt_client_for_qa_and_moderation.py`
    script which (as we stated previously) is very similar to the `chatgpt_client.py`
    script that we have used before. The complete source for `chatgpt_client_for_qa_and_moderation.py`
    is shown in Listing [7-4](#615442_1_En_7_Chapter.xhtml#PC13).


    ```

    import os

    from dotenv import load_dotenv

    from openai import OpenAI

    class ChatGPTClient:

    def __init__(self, system_message, initial_instructions_to_chatgpt):

    # Load environment variables from .env

    load_dotenv()

    # Use the API key from the environment variable

    self.client = OpenAI()

    self.system_message = system_message

    self.initial_instructions_to_chatgpt = initial_instructions_to_chatgpt

    def send_message_from_discord(self, user_message):

    response = self.client.chat.completions.create(

    model="gpt-4",

    messages=[

    {

    "role": "system",

    "content": f''{self.system_message}''

    },

    {

    "role": "user",

    "content": f''{self.initial_instructions_to_chatgpt}''

    },

    {

    "role": "user",

    "content": f''{user_message}''

    }

    ],

    temperature=0.85,

    max_tokens=1921,

    top_p=1,

    frequency_penalty=0,

    presence_penalty=0

    )

    condensed_response = response.choices[0].message.content

    return condensed_response

    Listing 7-4

    chatgpt_client_for_QA_and_moderation.py

    ```


    ### Breaking Down the `ChatGPTClient` Class in Python So Our Bot Can Utilize ChatGPT


    The Python class we’ve created, `ChatGPTClient`, serves as a crucial role in integrating
    the OpenAI API into our Discord bot. Let’s take a look at the benefits:


    The class is designed with modularity in mind, encapsulating all the functionalities
    for interacting with ChatGPT. In the `__init__` method, we initialize the client
    passing in system message and contents of the `FAQ.txt`, as well as loading the
    OpenAI API key from the `.env` file.


    Through the `send_message_from_discord()` method, the class makes communication
    with ChatGPT easier. Since the object is already constructed with the system message’s
    initial instructions, the message from the Discord user is placed into the prompt
    as the user message, so that we can send the user’s questions to ChatGPT programmatically.


    The `send_message_from_discord()` method doesn’t limit our use cases for this
    class. At the moment, we’re using it for Q&A; however, any bot that uses this
    class would be able to prompt ChatGPT in any way for any purpose.


    Finally, we’re efficiently handling the response from the OpenAI API by extracting
    the content of the generated message and returning a condensed version. This allows
    our Discord bot to reply with just the information we’re looking for, not the
    entire response that the Chat model returns. This is accomplished in a single
    line of code:


    ```

    condensed_response = response.choices[0].message.content

    ```


