- fmt: "### Refining Our Prompt with Prompt Engineering\n\n回到 ChatGPT 提供的代码示例，我们可以在代码中需要的位置提供\
    \ API 密钥。为清晰起见，我们将 API 密钥变量重命名为`accuweather_api_key`。如果需要回顾，以下是我们需要输入 AccuWeather\
    \ API 密钥的代码行。\n\n```\nif __name__ == \"__main__\":\n    accuweather_api_key =\
    \ \"your-accuweather-api-key-here\"\n    city = input(\"Enter your city: \")\n\
    \    get_weather(accuweather_api_key, city)\n```\n\n现在，所有内容整合在一起后，运行代码时，您应该会看到一个提示，要求输入城市名称。\n\
