    Model: gpt-4o

    Temperature: 1

    Maximum Length: 1150

    Listing 5-4

    PROMPT. Asking ChatGPT to Use OpenAI’s Python Library and Send MP3 Files to Whisper’s
    API

    ```


    After some back and forth, Listing [5-5](#615442_1_En_5_Chapter.xhtml#PC5) shows
    the response ChatGPT gave us that worked.


    ```

    import os

    import openai

    from dotenv import load_dotenv

    def transcribe_mp3_files(openai_api_key, mp3_folder_path):

    # Set OpenAI API key

    openai.api_key = openai_api_key

    # Model used for transcription

    model = "whisper-1"

    # Desired format for the transcription response

    response_format = "text"

    # Iterate over each MP3 file in the folder

    for filename in sorted(os.listdir(mp3_folder_path)):

    if filename.endswith(".mp3"):

    file_path = os.path.join(mp3_folder_path, filename)

    try:

    # Read the content of the MP3 file

    with open(file_path, "rb") as f:

