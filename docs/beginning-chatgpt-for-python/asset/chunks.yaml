  raw: '### Handling the Response (ChatCompletion)


    Table 3-6


    The Structure of the ChatCompletion Object Response


    | Field | Type | Description |

    | --- | --- | --- |

    | id | String | A distinct identifier for the ChatCompletion. |

    | choices | List | A list of ChatCompletion options. There can be multiple options
    in the response if “n” is greater than 1 in Table [3-1](#615442_1_En_3_Chapter.xhtml#Tab1).
    |

    |     ↳ finish_reason | String | Every response will include a finish_reason.
    The possible values for finish_reason arestop: The API returned complete message
    or a message terminated by one of the stop sequences provided via the stop parameter.length:
    The model output was incomplete due to the max_tokens parameter in the request
    or token limit of the model itself.tool_call: The model called a tool, such as
    a function.content_filter: The response was terminated due to a violation of the
    content filters.null: The API response still in progress or incomplete. |

    |     ↳ index | Integer | The index of the choice in the list of choices. |

    |     ↳ message | Object | A ChatCompletionMessage generated by the model. This
    is explained in further detail in Table [3-7](#615442_1_En_3_Chapter.xhtml#Tab7).
    |

    |     ↳ logprobs | Object or null | Log probability information for the choice.
    |

    | model | String | The model used for the ChatCompletion. |

    | system_fingerprint | String | Use this parameter as the “seed” in a subsequent
    request if you want to reproducible results in from a previous conversation. |

    | object | String | This always returns the literal, “chat.completion." |

    | usage | Object | Usage statistics for the completion request. |

    |     ↳ completion_tokens | Integer | Number of tokens in the generated completion.
    |

    |     ↳ prompt_tokens | Integer | Number of tokens in the prompt. |

    |     ↳ total_tokens | Integer | The total count of tokens utilized in the request,
    including both the prompt and the completion. |


    The most important item in the `ChatCompletion` object is the `ChatCompletionMessage`
    which is explained in more detail in Table [3-7](#615442_1_En_3_Chapter.xhtml#Tab7).


    ### ChatCompletionMessage


    Table 3-7


    The Structure of the ChatCompletionMessage


    | Field | Type | Description |

    | --- | --- | --- |

    | role | `String` | `This will always be the literal, "assistant."` |

    | content | `String or null` | `This is a string that contains the response from
    ChatGPT to our request.` |

    | `tool_calls` | `List` | `If you indicated in Table` [`3-1`](#615442_1_En_3_Chapter.xhtml#Tab1)
    `that you want ChatGPT to call a tool (which is currently a function), then this
    list will exist in the ChatCompletionMessage.` |

    |     ↳ id | `String` | `This is the ID of the tool called by ChatGPT.` |

    |     ↳ type | `String` | `This is the type of the tool called by ChatGPT. Only
    the literal, "function," is a valid tool.` |

    |     ↳ function | `Object` | `This is the function and the parameters that the
    model called.` |


    ## Conclusion


    In this chapter, we took our experiences from Chapters [1](#615442_1_En_1_Chapter.xhtml)
    and [2](#615442_1_En_2_Chapter.xhtml) and created a fully functioning ChatGPT
    client in Python. In the code for our ChatGPT client, we saw some terms that we
    were already introduced to from the Chat Playground such as the `model`, `messages`,
    `temperature`, and `tokens`.


    We also saw that, as Python developers, OpenAI gives us a **ton of additional
    options** to invoke ChatGPT that aren’t available to average everyday users or
    even to technical people who use the Chat Playground. In this chapter, we took
    the time to explain these options, with a focus on the `messages` that we can
    send.


    Now that we have a working ChatGPT client in Python, let’s see how to leverage
    it for the rest of the examples in the book!


