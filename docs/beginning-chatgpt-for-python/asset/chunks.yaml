    ## There Are Four Types of Messages


    When invoking the ChatGPT API programmatically, there are four types of messages
    that you can provide to the API:


    *   System message

    *   User message

    *   Assistant message

    *   Tool message


    The good news is that if you refer back to Chapter 1 where we explained how to
    use the Chat Playground, you can see that we''ve already have encountered the
    first three message types! The only new message type that we''re not currently
    familiar with is the tool message.


