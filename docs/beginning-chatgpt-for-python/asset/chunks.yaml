- fmt: '# Overview


    This chapter will walk you through obtaining and testing out your API key, get
    you comfortable making calls to the OpenAI Python API for ChatGPT, and introduce
    you to how it’s done for other models as well. Furthermore, we’ll be using ChatGPT
    as a pair-programmer to get an application that will be able to receive the name
    of a city and the time you’d like to arrive to work, then give you the weather
    and an estimated arrival time based on traffic! Sounds exciting? Then, let’s jump
    right in.


    # Installing (or Updating) the OpenAI Library with `pip`


    In order to use the OpenAI library with Python, you will need at minimum Python
    3.7.1 installed on your machine. In order to check the version of Python that
    you have, just open a terminal window, and execute:


    ```

    python3 - v

    ```


    If Python 3 is installed, then your terminal will display the version that you
    have. Now, of course, if your terminal is informing you that you have a noncompatible
    version (i.e., older than 3.7.1), then you should update Python on your machine.
    Additionally, if you don’t have Python 3 installed at all, then you should install
    it before proceeding.


    Now that you have all the prerequisites, it’s time to install the OpenAI Python
    library itself. Go back to your terminal window, and execute the following command:


    ```

    pip install --upgrade openai

    ```


    The command above will install the OpenAI library for you if it doesn’t already
    exist and will update the library to the most recent version if it’s already there.


    # Three Ways to Set Your API Key


    When setting up your API key for the OpenAI API, there are different methods to
    choose from, each designed for specific project needs and security concerns.


    ## Option #1: Setting a System-Wide Environment Variable


    The environment variable approach establishes a system-wide environment variable
    for API key storage. This provides a centralized point for key management, simplifying
    deployment across diverse projects.


    Let’s look at the steps on how we’d go about doing it.


    ### For Mac OS


    First off, open Terminal. You can find it in the applications folder or use spotlight
    (Command + Space) to search for it.


    Next, edit your bash profile. For older MacOS versions, you’d use the command
    `nano ~/.bash_profile`. Users of newer MacOS versions will need to use `nano ~/.zshrc`.
    This will open the profile file in a text editor.


    Now, let’s add your environment variable. In the editor, add the line below, replacing
    `''your-api-key-here''` with your actual API key without the single quotation
    marks.


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    ```


    Let’s save and exit by pressing `Ctrl+O` to write the changes, then pressing `Ctrl+X`
    to close the editor.


    Now, you’re going to load your profile by using `source ~/.bash_profile` for older
    Mac OS versions and `source ~/.zshrc` for the newer Mac OS versions. This will
    load the updated profile.


    Finally, we’re going to verify that we’ve done everything correctly. In the terminal,
    type `echo $OPENAI_API_KEY`. If everything went well, it should display your API
    key, confirming the setup.


    ```

    echo $OPENAI_API_KEY

    ```


    ### For Windows


    Start by opening the command prompt. You can find it by searching "cmd" in the
    start menu.


    Now, we’re going to set the environment variable in the current session by using
    the command below, replacing `''your-api-key-here''` with your actual API key.
    This command sets the `OPENAI_API_KEY` for the current session.


    ```

    setx OPENAI_API_KEY ''your-api-key-here''

    ```


    You can make the setup permanent by adding the variable through system properties:


    *   Right-click “This PC” or “My Computer” and select “Properties.”

    *   Click “Advanced system settings.”

    *   Click the “Environment Variables” button.

    *   In the “System variables” section, click “New...” and enter `OPENAI_API_KEY`
    as the variable name and your API key as the variable value.


    To make sure everything is working properly, reopen the command prompt and type
    the command below to verify the setup. It should display your API key.


    ```

    echo %OPENAI_API_KEY%

    ```


    ### For Linux


    To set the environment variable for the current session, open a terminal window
    and use the `export` command. Replace `''your-api-key-here''` with your actual
    API key.


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    ```


    To make the environment variable persistent across sessions, you can add it to
    your shell''s configuration file, such as `~/.bashrc` for Bash. Here''s how you
    can do it:


    Open the configuration file in a text editor. For example:


    ```

    nano ~/.bashrc

    ```


    Add the following line at the end of the file:


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    ```


    Save the file and exit the text editor.


    To apply the changes immediately, you can either close and reopen the terminal
    or run:


    ```

    source ~/.bashrc

    ```


    To verify that the environment variable is set correctly, you can `echo` its value
    in the terminal. This command should display your API key:


    ```

    echo $OPENAI_API_KEY

    ```


    ## Option #2: Creating a `.env` File


    Using a system-wide environment variable is great for making the API key accessible
    by any application or script running on the machine. However, if your use case
    is a little more simplistic, we can simply create a local variable accessible
    within just the scope of a particular program or script. It’s also useful for
    situations in which different projects necessitate different keys, so you can
    prevent conflicts in key usage. Let’s dive right in!


    We’re going to start by creating a local `.env` file. This file will house your
    API key, ensuring it''s only utilized by the designated project. Navigate to the
    project folder where you intend to create the `.env` file.


    **Note:** To prevent your `.env` file from being unintentionally shared via version
    control, create a `.gitignore` file in your project''s root directory. Add a line
    with `.env` to ensure the confidentiality of your API key and other sensitive
    information.


    Next, use the terminal or an IDE to create both the `.gitignore` and `.env` files.
    Copy your API key, and replace `''your-api-key-here''` with your actual API key
    without the single quotation marks.


    At this point, your `.env` file should look like this:


    ```

    OPENAI_API_KEY=''your-api-key-here''

    ```


    Finally, you can import the API key into your Python code using the following
    snippet.


    ```

    import os

    from dotenv import load_dotenv

    from openai import OpenAI

    # Load environment variables from .env

    load_dotenv()

    # Use the API key from the environment variable

    api_key = os.getenv("OPENAI_API_KEY")

    client = OpenAI()

    Listing 2-1

    Importing Your .env File into Your Python Application

    ```'
