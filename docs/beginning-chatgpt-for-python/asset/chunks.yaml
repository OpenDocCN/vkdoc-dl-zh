  trans: '

    ## 我们取得了一项里程碑式的成就……但有一个小缺陷


    好了，如果你退后一步审视我们目前取得的成果，你应该会意识到，我们正见证着一项堪称里程碑式的成就。我们拥有以下成果：


    -   一个由几个脚本组成的系统，允许用户输入问题，并获得关于如何使用我们移动应用的答案。

    -   通过一个简单的文本文件，我们可以教会机器人如何回答用户的问题。这个文本文件可以由公司里的任何人编辑，并可作为知识库，日复一日地帮助提升机器人的智能。这真是太棒了。

    -   我们的系统允许客户使用自然语言输入问题，机器人则会向他们提供智能答案。你知道吗？客户不喜欢阅读常见问题解答（FAQ）——尤其是那些特别长的。然而，使用这个系统，他们就不需要了！他们只需提出与自己相关的问题即可。


    那么，在我们取得所有这些成就的同时，却有一个*巨大*的缺陷不容忽视。在上面的代码清单 7-5 中，机器人对用户说：


    ```

    Once you''re logged in, you can set up Touch ID or Face ID for quicker, secure
    login in the future.

    ```


    不，不，不！坏机器人！如果你没有完整阅读常见问题解答文件，请允许我解释一下这里出了什么问题：


    1.  代码清单 7-1 中的 `FAQ.txt` 文件明确指出，Crook''s Bank 移动应用是一个移动应用。目前，Touch ID 只能用于苹果台式机和笔记本电脑。所以，这根本说不通。

    2.  `FAQ.txt` 文件中完全没有提到使用 Face ID 进行移动应用身份验证。


    所以，不幸的是，ChatGPT 在编造一些根本不真实的事情，并假设存在某些并不存在的功能。因此，就真正的技术支持而言，这是绝对不可接受的。


    那么，我们该如何解决这个问题呢？在阅读下一节之前，先思考一下*你*会如何解决这个问题。


    ## 更新发送给 ChatGPT 的系统消息，再试一次


    你想出解决方案了吗？解决这个问题的一种方法是更新系统消息。请参考上面代码清单 7-2 中的以下代码行：


    ```

    system_message_to_chatgpt = "You are a virtual assistant that provides support
    for the Crooks Bank banking app. ";

    ```


    请记住，系统消息向 ChatGPT 指明了它在聊天对话中的角色。目前，它被设定为一个乐于助人的助手，因此它擅自猜测移动应用中存在某些功能。现在，让我们确保
    ChatGPT 不会做出任何假设。将系统消息更新如下所示：


    ```

    system_message_to_chatgpt = "You are a virtual assistant that provides support
    for the Crooks Bank banking app. You will be provided Information about the application,
    and users will ask you questions about the application. Your role is to answer
    questions explicitly from the training information. If you were not given an answer
    to a question, then provide an apologetic message to the user explaining that
    you do not know the answer.";

    ```


    就是这样。`FAQ.txt` 文件保持与之前完全相同，我们只需要更新系统消息，让 ChatGPT 知道它在对话中的角色。代码清单 7-6 展示了我们与 Discord
    机器人的新对话。


    ```

    Me: How are you today?

    Q and A Bot: As a virtual assistant, I don''t have feelings or emotions, but I''m
    here and ready to assist you. How may I help you with the Crooks Bank Mobile App
    today?

    Me: I have an old Blackberry phone, is the app supported on my device?

    Q and A Bot: I''m sorry, but from the information provided, the Crooks Bank Mobile
    App can only be downloaded from the App Store for iOS devices and Google Play
    for Android devices. BlackBerry devices are not mentioned, therefore I cannot
    confirm that it would be compatible.

    Me: So, if I use an iPhone, how do I setup the app?

    Q and A Bot: To set up the Crooks Bank Mobile App on your iPhone, you can download
    it from the App Store. Simply search for "Crooks Bank Mobile App" and click the
    "Install" button. After the installation is finished, open the app and follow
    the prompts to set up your account. If you already have an account, use your login
    information to access your account through the app.

    代码清单 7-6

    我们与智能问答 Discord 机器人的第二次（也是更好的）对话

    ```


    现在，好多了！我们的技术支持机器人“严格遵守脚本”，不允许编造或假设任何事情。


    ## 结论


    在本章中，我们收获颇丰！我们拥有一个功能完备的 Discord 机器人，任何人都可以使用一个简单的文本文件来训练它，而无需任何 AI、NLP 或机器学习经验。我们了解到，一个“乐于助人的助手”有时可能会变得*过于热心*，并假设一些不真实的事实。然而，我们也再次强调了系统消息的概念和价值，这是提示工程的重要组成部分。


    现在，我们已经让我们的问答 Discord 机器人变得智能，接下来让我们看看如何让我们的内容审核机器人也变得智能吧！

    '
- fmt: "# 8. Adding Intelligence to Our Discord Bots, Part 2: Using Chat and Moderations\
    \ Models for Content Moderation\n\nIn this chapter, we’re going to take the steps\
    \ necessary in order to make our content moderator discord bot artificially intelligent.\
    \ Let’s overview the changes that we’re going to make:\n\n*   Create a new script\
    \ for ourselves, `moderation_client.py`, to invoke the `OpenAI.moderations.create()`\
    \ method of the OpenAI API. The Moderations model allows us to be aware when any\
    \ textual content fits any of the following categories:\n    *   Hate\n    * \
    \  Hate/threatening\n    *   Harassment\n    *   Harassment/threatening\n    *\
    \   Self-harm\n    *   Self-harm/intent\n    *   Self-harm/instructions\n    *\
    \   Sexual\n    *   Sexual/minors\n    *   Violence\n    *   Violence/graphic\n\
    \n*   Reuse our `chatgpt_client_for_qa_and_moderation.py` script from the previous\
    \ chapter. In Chapter [7](#615442_1_En_7_Chapter.xhtml), it was used to invoke\
    \ the OpenAI Chat class for Q&A purposes from our users. In this chapter, it will\
    \ be used to invoke the Chat class again, but this time for moderation purposes.\
    \ This is why the script is aptly named `chatgpt_client_for_qa_and_moderation`\
    \ because it’s used for Q&A in Chapter [7](#615442_1_En_7_Chapter.xhtml) but also\
    \ for moderation in this chapter.\n\n*   Modify our `content_moderator_bot.py`\
    \ script (formerly named `content_moderator_bot_dumb.py`) so that it can invoke\
    \ both the `moderation_client.py` and `chatgpt_client_for_qa_and_moderation.py`.\
    \ If either script indicates that the content typed in the Discord channel is\
    \ objectionable, then it will delete the message from that Discord channel. Remember,\
    \ this bot watches all content in all channels of the Discord server!\n\nNow,\
    \ at this point, you may be asking yourself, if the Moderations class already\
    \ knows how to flag any harmful content, then why do we need to use the Chat class\
    \ as well? Good question.\n\nYes, the Moderations class will allow us to know\
    \ about harmful content, but it **does not** inform us about any other types of\
    \ unwanted content for our use case, such as when unscrupulous individuals try\
    \ to lure our users into a scam. Remember, this is a Discord server for a banking\
    \ app, so scammers would definitely love to target all the members of this Discord\
    \ server since it’s a central location full of bank users!\n\nTherefore, we’ll\
    \ use the `moderation_client.py` to invoke the Moderations class to know if any\
    \ content in the Discord server is harmful, and we’ll reuse the `chatgpt_client_for_qa_and_moderation.py`\
    \ from the last chapter in order to invoke the Chat method in order to be made\
    \ aware of any other undesirable content is posted in the Discord server, such\
    \ as scam attempts.\n\n## Using `OpenAI.moderations.create()` to Moderate Content\n\
    \nBy using the Moderations models, developers are able to submit a string of text\
    \ and to subsequently know if it’s violent, hateful, and/or threatening or contains\
    \ any form of harassment.\n\nTable [8-1](#615442_1_En_8_Chapter.xhtml#Tab1) describes\
    \ the format of the parameters necessary to call the `OpenAI.moderations.create()`\
    \ method. The service is very simple to use, since only one parameter is required\
    \ to properly invoke the service.\n\n### Examining the Method Parameters\n\n**Table\
    \ 8-1** The Request Body for the Moderations Model\n\n| Field | Type | Required?\
    \ | Description |\n| --- | --- | --- | --- |\n| `input` | String or list | Required\
    \ | The text that needs to be classified. |\n| `model` | StringDefault: `omni-moderation-latest`\
    \ | Optional | There are multiple content moderation models available for use,\
    \ for example: `omni-moderation-latest`, `text-moderation-stable`, `text-moderation-latest`.\
    \ By default, this is set to `omni-moderation-latest`. It will be automatically\
    \ upgraded over time, which ensures you’re always using the most accurate model.\
    \ If you decide to use any of the text based moderation models, then you are only\
    \ able to submit text to be evaluated. The omni moderation models, however, are\
    \ able to evaluate content as text and images. Therefore choose the model that\
    \ works best for your use case. |\n\n### Handling the Response\n\nAfter successfully\
    \ invoking the Moderations model, the method will provide a response with the\
    \ structure shown in Table [8-2](#615442_1_En_8_Chapter.xhtml#Tab2)."
