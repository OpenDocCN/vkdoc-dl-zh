    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    The DALL·E-Generated Image of a Girl and Her Dog from Episode 811 of “This American
    Life” Podcast


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    The DALL·E-Generated Image of a Girl and Her Dog from Episode 811 of “This American
    Life” Podcast


    ## DALL·E Prompt Engineering and Best Practices


    Now, creating images with DALL·E takes prompt engineering in order to get consistent,
    desired results, and it’s a good idea to play around with different prompts to
    get some practice to see what works for you and your use case. Maybe you prefer
    paintings instead of 3D-looking images? Maybe you need photos instead of digital
    art? Maybe you want the image to be a close-up shot instead of a portrait? There
    are a lot of possibilities to consider.


    Regardless of your use case, here are two golden rules in order to get the most
    out of your DALL·E prompts.


    ### DALL·E Golden Rule #1: Get Familiar with the Types of Images That DALL·E Can
    Generate


    First and foremost, one of the most important things that DALL·E needs to understand
    is the type of image that needs to be generated. Here’s a list of several of the
    most common types of images that DALL·E is able to create:


    *   3D render


    *   Painting


    *   Abstract painting


    *   Expressive oil painting


    *   Oil painting (in the style of any deceased artist)


    *   Oil pastel


    *   Digital art


    *   Photo


    *   Photorealistic


    *   Hyperrealistic


    *   Neon photo


    *   35-mm macro photo


    *   High-quality photo


    *   Silhouette


    *   Vaporware


    *   Cartoon


    *   Plush object


    *   Marble sculpture


    *   Hand sketch


    *   Poster


    *   Pencil and watercolor


    *   Synth wave


    *   Comic book style


    *   Hand drawn


    ### DALL·E Golden Rule #2: Be Descriptive with What You Want in the Foreground
    and Background


    We cannot emphasize enough that you need to be descriptive with DALL·E in order
    to get consistent, desirable results. It may sound weird, but the best way to
    describe your image to DALL·E is to act like you’re describing a dream to another
    person.


    So, as a mental exercise between us, try to describe your last dream. As you describe
    the people, places, and things in your dream, you have in your mind the most important
    things that you remember, as well as the experience that you felt. As you describe
    things to another person, tiny details start to emerge such as


    *   How many people were present (if any)?


    *   What position were the people or animals in? Standing, sitting, or laying
    down?


    *   What things were in the scenery and the background?


    *   What items stood out to you? Sounds? Smells? Colors?


    *   How did you feel? Happy, eerie, excited?


    *   What was the perceived time of day? Morning, midday, night?


    If you can describe a dream to another person, then you should have no problem
    describing what you want to DALL·E.


    ## Let’s Play Around with Prompts to DALL·E


    To give you an idea of what kind of things you can do with DALL·E, we’ve created
    a couple prompts for images in a variety of styles for inspiration to get you
    started. Figures [5-5](#615442_1_En_5_Chapter.xhtml#Fig5) through [5-10](#615442_1_En_5_Chapter.xhtml#Fig10)
    show several different examples.


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Oil Painting: Ship on Stormy Water with Dynamic Lighting and Lightning in the
    Background


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    3D Art: A Baby Panda Working at a Typewriter


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Digital Painting: A Female Videogame Character in a Jungle with a Spear and a
    Shield


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Vaporwave: Greek Statues in a Temple


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Vector Art: A Man Wearing Sunglasses with a Beard of Flowers


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Photo-Realistic: Penguin at an Office Desk


    ## Conclusion


    In this chapter, we accomplished a lot! With a few scripts, we created a Podcast
    Visualizer.


    *   We created and used `audio_splitter.py`, which works as a utility for us.
    If you have an audio file that’s larger than the limitations of the Whisper model,
    this script will give you a folder of smaller audio files to send to Whisper.


    *   We created and used `whisper_transcriber.py` to get a transcription of a folder
    of audio files. The folder can contain a single audio file or several files. Your
    only limitation is the number of requests that you can send to the Whisper model.


    *   We did a little prompt engineering with GPT-4 in order to get a descriptive
    prompt of the imagery in a podcast based upon the transcript.


    *   Finally, we created and used `dalle_client.py` to take the prompt generated
    from calling the GPT-4 model and getting an image that represents the podcast
    episode visually.


    ## Exercises Left for the Reader


    So, there are obviously a few additional things we can do here, and these steps
    will be left for you (the reader) to accomplish, for example:


    *   The `audio_splitter.py` app is a Python interface to FFmpeg. FFmpeg can not
    only split audio files but can also do a lot more with media files, such as format
    conversion and reencoding. Experiment to see which of the supported media formats
    by Whisper are the smallest audio files. Hint: It’s definitely not wav format.


    *   If you’re planning to create an app or a service that automatically generates
    images based upon a textual prompt from your end-users, then you definitely would
    want to update the `dalle_client.py` script in order to ensure that you’re tracking
    and providing in your request the user parameter. This is due to the fact that
    your end-user has the potential to generate harmful images through your API key.
    Remember, you have an API account with Open AI, and they don’t! As a result, you
    need to be aware if you need to terminate your business relationship with a user
    who is violating Open AI content rules through your service.'
