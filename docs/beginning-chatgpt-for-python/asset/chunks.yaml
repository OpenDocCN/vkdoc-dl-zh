- fmt: "Not bad, huh? ChatGPT was not only able to provide a list of common design\
    \ patterns used by Python developers but also explain valid reasons on why they\
    \ are important – all done in natural language.\n\nSo, at the end of the day,\
    \ what does this mean for Python developers? Well, it’s actually a big deal. That's\
    \ because developers are now able to create applications that can have some type\
    \ of \"understanding\" of text in natural language. Before the advent of artificial\
    \ intelligence (AI) tools like ChatGPT, developers typically had to create regular\
    \ expressions (also called “regex”) in order to perform rudimentary character\
    \ and string pattern matching within a body of text. However, pattern matching\
    \ and natural language understanding are two totally different things.\n\n## Regex\
    \ vs. ChatGPT: Fight!\n\n> **Note**  \n> If you already know that a regular expression\
    \ can’t perform natural language understanding or sentiment analysis, then feel\
    \ free to skip this section.\n\nI'm thoroughly convinced that every programmer\
    \ somewhere in their lifetime has met *some guy* who happens to be an expert in\
    \ writing regular expressions. Regular expressions are great because they serve\
    \ the purpose of being able to parse large amounts of text in order to find patterns\
    \ within the text programmatically.\n\n*However*, one of the biggest downsides\
    \ to regular expressions is that once they have been written, they are extremely\
    \ difficult to read (in my opinion, even by the developer who originally wrote\
    \ it).\n\nSo, let’s see how regex holds up against ChatGPT, which has natural\
    \ language processing (NLP) and natural language understanding (NLU) capabilities.\n\
    \nListing [1-3](#615442_1_En_1_Chapter.xhtml#PC3) is a story of an impractically\
    \ sad situation. However, it drives home the point that although regular expressions\
    \ can be used to find words and phrases within a body of text, it can’t be used\
    \ to provide any type of NLU.\n\n```\nIn the city of Buttersville,USA on Milkmaid\
    \ street, there's a group of three friends: Marion Yogurt, Janelle de Queso, and\
    \ Steve Cheeseworth III. On a hot summer's day, they heard the music from an ice\
    \ cream truck, and decided to buy something to eat.\nMarion likes strawberries,\
    \ Janelle prefers chocolate, and Steve is lactose intolerant. That day, only two\
    \ kids ate ice cream, and one of them bought a bottle of room-temperature water.\
    \ The ice cream truck was fully stocked with the typical flavors of ice cream.\n\
    Listing 1-3\nSadstory.txt: A Sad Story About a Kid Who Didn’t Eat Ice Cream\n\
    ```\n\n### Analysis Question #1: Who Didn’t Get Any Ice Cream, and Why?\n\nNow,\
    \ let's analyze this for a bit and ask some questions among ourselves. First of\
    \ all, who didn’t get any ice cream and why? The obvious answer is that Steve\
    \ did not get any ice cream because of his lactose intolerance. However, since\
    \ the story did not directly say that Steve did not buy ice cream, there's no\
    \ way for a regular expression to match a text pattern in the story.\n\nThe regular\
    \ expression could look for keywords such as \"didn't have,\" \"no ice cream,\"\
    \ or the names of the kids. However, it would only be able to provide a response\
    \ based on the presence of these patterns. For example, if the regular expression\
    \ matches the pattern \"didn't have\" or \"no ice cream\" with Steve's name, it\
    \ could show you the result of the text pattern. However, it certainly wouldn't\
    \ be able to explain why Steve was the one who didn't have ice cream or provide\
    \ any context-specific reasoning.\n\nNow, let's provide the same story to ChatGPT,\
    \ and ask the question, “Who didn't get any ice cream?” Listing [1-4](#615442_1_En_1_Chapter.xhtml#PC4),\
    \ located below, takes our question and the story above and puts both together\
    \ as a prompt.\n\n```\nUsing the information in the story below, who didn't get\
    \ any ice cream and why?\n###\nIn the city of Buttersville,USA on Milkmaid street,\
    \ there's a group of three friends: Marion Yogurt, Janelle de Queso, and Steve\
    \ Cheeseworth III. On a hot summer's day, they heard the music from an ice cream\
    \ truck, and decided to buy something to eat.\nMarion likes strawberries, Janelle\
    \ prefers chocolate, and Steve is lactose intolerant. That day, only two kids\
    \ ate ice cream, and one of them bought a bottle of room-temperature water. The\
    \ ice cream truck was fully stocked with the typical flavors of ice cream.\nListing\
    \ 1-4\nPROMPT. The Sad Story Put into a Prompt\n```\n\nNotice how it is a best\
    \ practice to provide some type of separation, in this case, “###”, when creating\
    \ a prompt (like the one above) where you have both instructions and data together.\
    \ Later on, when we start using either the Playground or Python to programmatically\
    \ invoke the ChatGPT API, you’ll see that there’s a much better way to provide\
    \ that separation.\n\nSo, after sending the prompt, ChatGPT will provide you an\
    \ answer like this.\n\n```\nBased on the given information, Steve is lactose intolerant\
    \ and therefore cannot eat ice cream. Therefore, Steve is the one who didn't get\
    \ any ice cream.\nListing 1-5\nRESPONSE. ChatGPT’s Answer to Analysis Question\
    \ #1\n```\n\nAs you can see, ChatGPT can utilize NLP and NLU, and therefore, it\
    \ can understand (artificially intelligently, that is) the context of the scenario.\
    \ It can interpret the relationships between the kids, their preferences, and\
    \ Steve’s lactose intolerance. It is able to understand that the last names of\
    \ the children, the street name, and the city name are the names of dairy products\
    \ but are obviously irrelevant to the question at hand.\n\n### Analysis Question\
    \ #2: Which Kid Was Probably Left Sad?\n\nNow, to further prove the point that\
    \ a regular expression is unable to provide any type of NLP or NLU, let's use\
    \ a new term called **sentiment analysis**. Therefore, after the ice cream truck\
    \ drove away, which kid was left sad?\n\nSince the story had no mention of any\
    \ of the children's feelings or emotions, there is no text pattern that would\
    \ allow any regular expression to return a match.\n\nHowever, if you posed the\
    \ same question to ChatGPT, it will return a response like this.\n\n```\nSince\
    \ Steve is lactose intolerant and cannot eat ice cream, he would be the kid left\
    \ sad because he couldn't enjoy the ice cream like Marion and Janelle.\nSince\
    \ Steve is lactose intolerant and cannot eat ice cream, he would be the kid left\
    \ sad because he couldn't enjoy the ice cream like Marion and Janelle.\nListing\
    \ 1-6\nRESPONSE. ChatGPT’s Answer to Analysis Question #2\n```\n\nTherefore, ChatGPT\
    \ is able to comprehend the scenario, reason through the information, and provide\
