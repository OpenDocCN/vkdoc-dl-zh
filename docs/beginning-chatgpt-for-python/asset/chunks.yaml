    in their Discord servers. Figure [6-1](#615442_1_En_6_Chapter.xhtml#Fig1) shows
    a fun illustration of Crook’s Bank.


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    This Fake App from a Fake Bank Has Real Problems


    ## First Things First: Create Your Own Discord Server


    Before we can make an AI Discord bot, we’re obviously going to need a Discord
    server already in place for the bot to interact with. Use either the Discord App
    or go to the Discord website (log in first of course), and start the process to
    Add/Create a new server.


    After you have started the process, select the option labeled “Create My Own”
    as shown in Figure [6-2](#615442_1_En_6_Chapter.xhtml#Fig2).


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Creating Your Own Discord Server


    Next, you’ll be prompted to specify additional information about your server.
    Continue to proceed through the creation process until you are prompted to provide
    a name and icon for your server, as shown in Figure [6-3](#615442_1_En_6_Chapter.xhtml#Fig3).


    Specify the name of your server and provide an optional server icon (if you have
    one).


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Providing a Name for Your Own Discord Server


    ## Create the Q&A Channel


    By default, every Discord server has a “general” channel, but we want a dedicated
    channel especially for questions and answers. Depending upon how you created your
    server, Figure [6-4](#615442_1_En_6_Chapter.xhtml#Fig4) will be presented to you
    to create your new channel.


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Creating a Channel Using the Web Interface'
  trans: '

    # 6. 使用 Discord 和 Python 创建自动化社区管理机器人


    当你发布一款应用或服务时，建立并维护自己的社区至关重要。以下是健康用户社区的典型特征：


    -   成员参与有意义的讨论，分享见解、反馈和支持。

    -   存在分歧或辩论，但能以建设性的方式处理，不进行人身攻击或使用侮辱性语言。

    -   充满尊重的氛围，成员相互倾听并认可不同意见。

    -   新老成员都积极参与，确保社区保持活力，不会停滞不前。

    -   用户贡献多样化的内容，从回答问题到分享资源，丰富了社区的知识库。

    -   索取与给予之间保持平衡；寻求帮助或信息的成员也会向他人提供帮助。

    -   新成员频繁加入，通常由现有成员推荐，这表明社区被积极看待且值得推荐。

    -   用户经常成为社区或平台的倡导者，在社区空间之外（例如社交媒体或其他论坛）进行推广。

    -   社区通过为功能和特性提供新想法，帮助塑造应用或服务。


    无论我创建何种类型的应用或服务，我都希望我的用户社区能够体现上述所有特征！


    ## 选择 Discord 作为你的社区平台


    在过去几年中，Discord 作为社区管理工具，在那些对社区充满热情的人群中迅速流行起来。这在一定程度上归功于其跨平台兼容性，允许成员无论是在桌面端、移动设备还是网页浏览器上都能保持联系。然而，其最突出的特点之一是基于邀请的社区系统，这有助于社区管理者控制增长并防止垃圾信息。这种模式不仅确保了为成员提供量身定制的体验，还增强了安全性，因为社区管理者有权决定是否授予访问权限。


    Discord 不仅支持文本消息，还支持语音聊天和视频流。与 Slack 非常相似，Discord 允许社区管理者将内容分隔到不同的频道中，以组织讨论、简化信息流，并帮助用户看到他们感兴趣的内容。


    ## 创建比我们的 Slack 机器人更高级的机器人


    现在，如果你已经成功完成了第 4 章中关于 Slack 机器人的步骤，那么本章的步骤会让你感到熟悉。在第 4 章中，我们创建了一个 Slack 机器人，用于在特定时间段内读取单个频道并获取所讨论内容的摘要。那个
    Slack 机器人并非社区管理者，而更像一个有用的助手。


    在本书的剩余部分，我们将执行所有必要的步骤，为 Discord 创建强大的机器人，这些机器人将利用人工智能来实际帮助管理社区。


    ## 创建比任何典型 Discord 机器人更高级的机器人


    如果你曾经有过使用 Discord 机器人的经验，那么你可能知道，与它们交互最常见的方式是使用所谓的“`/命令`”。这使得典型的机器人（即非智能机器人）基本上只有在接收到非常具体的操作或命令时才能工作。如果没有提供“`/命令`”，机器人就会保持沉默，什么也不做。本质上，它体现了“只有别人跟你说话时你才能说话”这句话。


    然而，我们正在创建一个将具备人工智能的 Discord 机器人，因此，它将比任何典型的 Discord 机器人先进得多。我们将创建能够读取并查看 Discord
    服务器中所有消息，并且足够智能以做出正确响应的机器人。


    ### 理解机器人的角色


    那么，让我们探讨一个场景，以使事情变得真实。我们正在创建一个公共 Discord 服务器，以便与移动银行应用的用户进行交互。我们的最终目标是拥有用 Python
    编写的机器人来处理以下场景：


    -   问答：监控特定频道，并自动回答用户关于如何使用银行应用的问题。为此，机器人需要接受关于应用如何工作的训练。

    -   禁止招揽：对于任何商业社区来说，确保社区参与者不被不道德的个人盯上非常重要。例如，如果你正在创建一个银行应用，你希望你的客户被用户名为“`B4nk
    Admin`”的人联系吗？

    -   禁止有害内容：对于任何社区来说，保护成员免受仇恨言论等有害内容的侵害非常重要。


    ## 我们的示例银行：克鲁克银行


    出于本示例的目的，我决定使用一个虚构银行的虚构名称，该名称与实际银行名称重合的可能性极低。因此，在本示例中，“克鲁克银行”正在为其银行客户推出一款新的移动应用。他们希望有一个由机器人监控的频道来回答应用用户的问题，并且他们还希望确保没有人向其应用用户进行招揽，或在他们的
    Discord 服务器中发布伤害性或有害的内容。图 6-1 展示了克鲁克银行的一个有趣插图。


    ![](img/615442_1_En_6_Fig1_HTML.jpg)


    图 6-1：这家来自虚构银行的虚构应用存在真实问题


    ## 首要任务：创建你自己的 Discord 服务器


    在我们能够创建 AI Discord 机器人之前，显然我们需要一个已经就位的 Discord 服务器供机器人与之交互。使用 Discord 应用或访问 Discord
    网站（当然要先登录），然后开始添加/创建新服务器的过程。


    开始该过程后，选择标记为“创建我自己的”选项，如图 6-2 所示。


    ![](img/615442_1_En_6_Fig2_HTML.jpg)


    图 6-2：创建你自己的 Discord 服务器


    接下来，系统会提示你指定有关服务器的其他信息。继续完成创建过程，直到系统提示你为服务器提供名称和图标，如图 6-3 所示。


    指定你的服务器名称，并提供可选的服务器图标（如果你有的话）。


    ![](img/615442_1_En_6_Fig3_HTML.jpg)


    图 6-3：为你自己的 Discord 服务器提供名称


    ## 创建问答频道


    默认情况下，每个 Discord 服务器都有一个“通用”频道，但我们想要一个专门用于问答的频道。根据你创建服务器的方式，系统会呈现图 6-4 来创建你的新频道。


    ![](img/615442_1_En_6_Fig4_HTML.jpg)


    图 6-4：使用 Web 界面创建频道

