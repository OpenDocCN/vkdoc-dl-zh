  raw: '### Specifying What Your Bot Can (and Can’t) Do by Setting the Scope


    Now, you’ll be presented with a screen that has a ton of options for bots for
    Slack workspaces. The first thing you need to do, however, is from the sidebar
    on the left, click **OAuth & Permissions**.


    Our bot is going to be pretty simple; all it needs to do is read the messages
    from a channel in order to give us a summary of what was said. In addition to
    reading the messages, we also need to know the names of the people in the Slack
    workspace, otherwise, we’ll get a UUID representation of the person instead of
    their name, which is meaningless to us.


    So, scroll down to add the following OAuth Scope to your Slack bot, as shown in
    Figure [4-4](#615442_1_En_4_Chapter.xhtml#Fig4), below.


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Adding Scopes for the Slack Bot App


    *   channels:history


    *   channels:read


    *   users:read


    ### Confirming Your Settings


    After you’ve added the appropriate scopes for your bot, scroll back up and click
    on **Basic Information** from the left side bar.


    On the page that follows, you’ll see that there’s now a green checkmark beside
    “Add features and functionality,” which confirms that you’ve added your scopes
    correctly, as shown in Figure [4-5](#615442_1_En_4_Chapter.xhtml#Fig5).


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Confirm Your Settings


    ### Viewing the OAuth & Permissions Page


    As shown in Figure [4-6](#615442_1_En_4_Chapter.xhtml#Fig6), below, navigate to
    the **OAuth & Permissions** page, and click on the “Install to Workspace” button.


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    The OAuth & Permissions Screen


    ### Installing Your Slack Bot App to Your Workspace


    Now that all the permissions have been requested, it’s time to install your bot
    to your workspace. During the installation process, you should see a screen as
    shown in Figure [4-7](#615442_1_En_4_Chapter.xhtml#Fig7) below.


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    *“Installing” a New* *Slack Bot App*


    Click the **Allow** button to authorize the bot and allow the permissions you
    allotted in the previous step.


    Note


    It’s important to understand what “installing” means here. In a traditional Python
    sense, installing an app means to copy your files and dependencies to another
    machine and have it execute. That’s not what’s happening here.


    Here, when you “install” a bot app, you’re enabling your Slack workspace to allow
    an app to join the workspace – that’s all. The code for your bot will run on your
    own machine and not on Slack’s servers.


    ### Getting Your Slack Bot (Access) Token


    This time, “token” actually means access token! In order to connect to the Slack
    API and access messages and user information programmatically, you need a specific
    OAuth token generated for your Slack bot.


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Copy Your OAuth Token for Your Slack Bot App


    Back on the **OAuth & Permissions** page, be sure to copy the bot token (which
    usually starts with "`xoxb-`") from the page here, as shown in Figure [4-8](#615442_1_En_4_Chapter.xhtml#Fig8).


    ### Inviting Your Bot to Your Channel


    Next, you’re going to go to the channel you’d like to use to test your bot and
    type in the following command in the channel itself.


    ```

    /invite

    ```


    Select the option “Add apps to this channel,” and then select the name of the
    Slack bot that you specified earlier when you registered the bot with Slack.


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Adding Your Slack Bot to a Channel


    Congratulations! You now have successfully registered a Slack bot app with Slack,
    enabled it to read messages in your workspace, and added the Slack bot to a channel.
    Before we can write the Python code to access the channel in our workspace, we
    need to know what is the internal ID that Slack uses for our channel.


    ## Finding the Channel ID of Your Channel


    Ok, this is an easy step to do. In Slack, right-click on the name of your channel
    and select the option “View Channel details.” At the bottom of the pop-up window
    is the ID of your channel. Copy that number and save it for later. Your Python
    app will need this in order to join the right channel in your Slack workspace.


    ## Using Your Slack Bot App to Automatically Grab Messages from a Channel


    Alright, now that we have done all the prerequisites and we know the ID of our
    channel, let’s get to the code in Python that accesses all the messages from a
    particular Slack channel.


    ### Programmatically Reading Messages from Slack with **slack_chat_reader_bot.py**


    First things first, you need to install the official Python Slack library, `slack_sdk`.
    You can use pip install like this:


    ```

    pip install slack_sdk

    ```


    Listing [4-10](#615442_1_En_4_Chapter.xhtml#PC12) is a simple Python Slack bot
    that obtains the user name, timestamp, and message content of each posting in
    the channel within a designated time period.


    ```

    from slack_sdk import WebClient

    from slack_sdk.errors import SlackApiError

    from datetime import datetime, timezone

    # Define your Slack API token

    SLACK_BOT_TOKEN = "YOUR_SLACK_API_TOKEN"

    # Initialize a WebClient instance

    client = WebClient(token=SLACK_BOT_TOKEN)

    # Define your channel ID

    channel_id = "YOUR_CHANNEL_ID"

    # Define start and end time in UTC

    start_time_utc = datetime(2024, 8, 3, 10, 0, tzinfo=timezone.utc)

    end_time_utc = datetime(2024, 8, 12, 15, 0, tzinfo=timezone.utc)

    # Convert start and end time to Unix timestamps

    start_time_unix = int(start_time_utc.timestamp())

    end_time_unix = int(end_time_utc.timestamp())

    try:

    # Call the conversations.history method using WebClient

    response = client.conversations_history(

    channel=channel_id,

    oldest=start_time_unix,

    latest=end_time_unix,

    )

    # Check if the API call was successful

    if response["ok"]:

    # Reverse the messages list to get them in chronological order

    messages = reversed(response["messages"])

    for message in messages:

    user_id = message.get("user")

    timestamp = datetime.fromtimestamp(float(message.get("ts")), tz=timezone.utc)

    user_info_response = client.users_info(user=user_id)

    if user_info_response["ok"]:

    user_name = user_info_response["user"]["name"]

    print("User:", user_name)

    print("Timestamp:", timestamp)

    print("Message:", message.get("text"))

    print()

    else:

    print("Failed to fetch user info:", user_info_response["error"])

    else:

    print("Failed to fetch messages:", response["error"])

    except SlackApiError as e:

    print(f"Error: {e.response[''error'']}")

    Listing 4-10

    slack_chat_reader_bot.py

    ```


    Let’s walk through this code together. First, we’re importing essential modules
    for interfacing with the Slack API and managing date/time data. We then define
    the Slack API token (SLACK_BOT_TOKEN) needed for authentication, along with the
    ID of the target Slack channel (channel_id).


    Next, we establish the start and end times for the message retrieval window, specifying
    them in coordinated universal time (UTC). Our script converts these time values
    into Unix timestamps since the Slack API expects timestamps in this format for
    message retrieval.


    If the API call is successful, our script proceeds to extract and process the
    messages. Messages are presented in chronological order so that the oldest messages
    appear first. To keep things clean, for each message, the script retrieves the
    user ID and message timestamp. It then uses the `client.users_info` method to
    fetch additional information about the user who sent the message.


    In case of any errors during the API request process (SlackApiError), the script
    catches and handles them by printing an error message.


    Listing [4-11](#615442_1_En_4_Chapter.xhtml#PC13) shows the output after executing
    `slack_chat_reader_bot.py`, which is truncated here since you already have the
    full text in Listing [4-1](#615442_1_En_4_Chapter.xhtml#PC1) earlier in this chapter.'
  trans: "\n### 通过设置作用域来指定机器人能（和不能）做什么\n\n现在，你将看到一个包含大量 Slack 工作区机器人选项的屏幕。不过，你需要做的第一件事是，从左侧边栏点击\
    \ **OAuth 与权限**。\n\n我们的机器人将非常简单；它只需要读取某个频道中的消息，以便为我们提供讨论内容的摘要。除了读取消息，我们还需要知道 Slack\
    \ 工作区中人员的姓名，否则我们将获得人员的 UUID 表示形式，而不是他们的姓名，这对我们来说毫无意义。\n\n因此，向下滚动，为你的 Slack 机器人添加以下\
    \ OAuth 作用域，如下图 4-4 所示。\n\n![](img/615442_1_En_4_Fig4_HTML.jpg)\n\n图 4-4\n\n为\
    \ Slack 机器人应用添加作用域\n\n- `channels:history`\n- `channels:read`\n- `users:read`\n\
    \n### 确认你的设置\n\n为你的机器人添加了适当的作用域后，向上滚动并从左侧边栏点击**基本信息**。\n\n在接下来的页面上，你会看到“添加特性和功能”旁边现在有一个绿色的勾选标记，这确认了你已正确添加作用域，如下图\
    \ 4-5 所示。\n\n![](img/615442_1_En_4_Fig5_HTML.jpg)\n\n图 4-5\n\n确认你的设置\n\n### 查看\
    \ OAuth 与权限页面\n\n如下图 4-6 所示，导航到 **OAuth 与权限**页面，然后点击“安装到工作区”按钮。\n\n![](img/615442_1_En_4_Fig6_HTML.jpg)\n\
    \n图 4-6\n\nOAuth 与权限屏幕\n\n### 将你的 Slack 机器人应用安装到工作区\n\n现在所有权限都已请求完毕，是时候将你的机器人安装到工作区了。在安装过程中，你应该会看到如下图\
    \ 4-7 所示的屏幕。\n\n![](img/615442_1_En_4_Fig7_HTML.jpg)\n\n图 4-7\n\n*“安装”一个新的* *Slack\
    \ 机器人应用*\n\n点击**允许**按钮以授权机器人并允许你在上一步中分配的权限。\n\n注意\n\n理解这里“安装”的含义很重要。在传统的 Python\
    \ 意义上，安装应用意味着将你的文件和依赖项复制到另一台机器并执行它。这里的情况并非如此。\n\n在这里，当你“安装”一个机器人应用时，你是在启用你的 Slack\
    \ 工作区，允许一个应用加入该工作区——仅此而已。你的机器人代码将在你自己的机器上运行，而不是在 Slack 的服务器上。\n\n### 获取你的 Slack\
    \ 机器人（访问）令牌\n\n这次，“令牌”实际上指的是访问令牌！为了以编程方式连接到 Slack API 并访问消息和用户信息，你需要一个为你的 Slack\
    \ 机器人生成的特定 OAuth 令牌。\n\n![](img/615442_1_En_4_Fig8_HTML.jpg)\n\n图 4-8\n\n为你的 Slack\
    \ 机器人应用复制 OAuth 令牌\n\n回到 **OAuth 与权限**页面，请务必从此页面复制机器人令牌（通常以 `xoxb-` 开头），如下图 4-8\
    \ 所示。\n\n### 将你的机器人邀请到频道\n\n接下来，你将进入想要用来测试机器人的频道，并在该频道中输入以下命令。\n\n```\n/invite\n\
    ```\n\n选择“将应用添加到此频道”选项，然后选择你之前在向 Slack 注册机器人时指定的 Slack 机器人名称。\n\n![](img/615442_1_En_4_Fig9_HTML.jpg)\n\
    \n图 4-9\n\n将你的 Slack 机器人添加到一个频道\n\n恭喜！你现在已成功向 Slack 注册了一个 Slack 机器人应用，使其能够读取你工作区中的消息，并将该\
    \ Slack 机器人添加到了一个频道。在我们编写 Python 代码来访问工作区中的频道之前，我们需要知道 Slack 用于我们频道的内部 ID。\n\n\
    ## 查找你频道的频道 ID\n\n好的，这是一个简单的步骤。在 Slack 中，右键单击你的频道名称，然后选择“查看频道详细信息”选项。弹出窗口的底部就是你的频道\
    \ ID。复制该编号并保存以备后用。你的 Python 应用将需要它来加入 Slack 工作区中的正确频道。\n\n## 使用你的 Slack 机器人应用自动抓取频道中的消息\n\
    \n好了，既然我们已经完成了所有先决条件并且知道了频道的 ID，让我们开始编写 Python 代码来访问特定 Slack 频道中的所有消息。\n\n###\
    \ 使用 `slack_chat_reader_bot.py` 以编程方式从 Slack 读取消息\n\n首先，你需要安装官方的 Python Slack\
    \ 库 `slack_sdk`。你可以像这样使用 `pip install`：\n\n```\npip install slack_sdk\n```\n\n\
    清单 4-10 是一个简单的 Python Slack 机器人，它获取指定时间段内频道中每条帖子的用户名、时间戳和消息内容。\n\n```\nfrom slack_sdk\
    \ import WebClient\nfrom slack_sdk.errors import SlackApiError\nfrom datetime\
    \ import datetime, timezone\n\n# 定义你的 Slack API 令牌\nSLACK_BOT_TOKEN = \"YOUR_SLACK_API_TOKEN\"\
    \n\n# 初始化一个 WebClient 实例\nclient = WebClient(token=SLACK_BOT_TOKEN)\n\n# 定义你的频道\
    \ ID\nchannel_id = \"YOUR_CHANNEL_ID\"\n\n# 以 UTC 时间定义开始和结束时间\nstart_time_utc\
    \ = datetime(2024, 8, 3, 10, 0, tzinfo=timezone.utc)\nend_time_utc = datetime(2024,\
    \ 8, 12, 15, 0, tzinfo=timezone.utc)\n\n# 将开始和结束时间转换为 Unix 时间戳\nstart_time_unix\
    \ = int(start_time_utc.timestamp())\nend_time_unix = int(end_time_utc.timestamp())\n\
    \ntry:\n    # 使用 WebClient 调用 conversations.history 方法\n    response = client.conversations_history(\n\
    \        channel=channel_id,\n        oldest=start_time_unix,\n        latest=end_time_unix,\n\
    \    )\n\n    # 检查 API 调用是否成功\n    if response[\"ok\"]:\n        # 反转消息列表以按时间顺序获取\n\
    \        messages = reversed(response[\"messages\"])\n        for message in messages:\n\
    \            user_id = message.get(\"user\")\n            timestamp = datetime.fromtimestamp(float(message.get(\"\
    ts\")), tz=timezone.utc)\n            user_info_response = client.users_info(user=user_id)\n\
    \            if user_info_response[\"ok\"]:\n                user_name = user_info_response[\"\
    user\"][\"name\"]\n                print(\"用户:\", user_name)\n               \
    \ print(\"时间戳:\", timestamp)\n                print(\"消息:\", message.get(\"text\"\
    ))\n                print()\n            else:\n                print(\"获取用户信息失败:\"\
    , user_info_response[\"error\"])\n    else:\n        print(\"获取消息失败:\", response[\"\
    error\"])\nexcept SlackApiError as e:\n    print(f\"错误: {e.response['error']}\"\
    )\n```\n\n清单 4-10\n\n`slack_chat_reader_bot.py`\n\n让我们一起来浏览这段代码。首先，我们导入与 Slack\
    \ API 交互和管理日期/时间数据所需的基本模块。然后，我们定义了身份验证所需的 Slack API 令牌（`SLACK_BOT_TOKEN`）以及目标\
    \ Slack 频道的 ID（`channel_id`）。\n\n接下来，我们建立消息检索窗口的开始和结束时间，并以协调世界时（UTC）指定它们。我们的脚本将这些时间值转换为\
    \ Unix 时间戳，因为 Slack API 期望消息检索使用此格式的时间戳。\n\n如果 API 调用成功，我们的脚本将继续提取和处理消息。消息按时间顺序呈现，以便最早的消息首先出现。为了保持整洁，对于每条消息，脚本会检索用户\
    \ ID 和消息时间戳。然后，它使用 `client.users_info` 方法获取有关发送消息的用户的更多信息。\n\n如果在 API 请求过程中出现任何错误（`SlackApiError`），脚本会捕获并处理它们，打印一条错误消息。\n\
    \n清单 4-11 显示了执行 `slack_chat_reader_bot.py` 后的输出，此处已截断，因为你已在本章前面的清单 4-1 中获得了完整文本。\n"
