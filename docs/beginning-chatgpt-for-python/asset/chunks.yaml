    ## Prompt Engineering 101: Text Summarization


    So, needless to say, no one wants to spend their day constantly scrolling through
    Slack channels reading about issues and problems that are on fire. We''re going
    to utilize the capabilities of ChatGPT for text summarization. To keep things
    simple, let''s try a few prompts to send the entire listing of the chat messages
    to ChatGPT in order for it to give us a usable summary of all the events that
    have happened.'
  trans: '

    # 审视真实世界的问题：软件公司的客户支持


    让我们来看看软件开发中最艰巨的任务之一：提供技术支持。想象一下，整天接听来自可能因使用你的软件而感到沮丧、困惑或只是需要解决方案的人们的电话和信息，这该有多“美妙”。以下是客户支持为何如此棘手的一些原因：


    -   众所周知，你的最终用户和客户在解释软件问题时非常不擅长。

    -   一级技术人员通常是第一道防线，他们通常处理最基本的问题或用户错误。但当问题变得更复杂时，用户会被升级到二级。

    -   中级是一个棘手的位置，因为他们比一级技术支持人员拥有更多的知识和经验；然而，他们没有机会直接从最终用户那里获得答案。

    -   真正糟糕的问题会被升级到三级；然而，这些是最昂贵的技术支持人员，因为他们拥有最多的知识和经验。他们对代码以及服务器和基础设施都有实践经验。


    那么，让我们以一个在 Slack 中典型的支持渠道内的真实对话为例。以下是虚构公司中团队成员及其角色的列表：


    -   法蒂玛（客户服务代表）

    -   约翰（软件工程师）

    -   戴夫（项目经理）

    -   基思（首席技术官）


    下面的列表提供了一个软件初创公司团队成员之间的对话示例。客户服务代表法蒂玛让团队知道他们的应用在启动后立即崩溃（这可不是什么好问题）。首席技术官基思立即介入，升级了这个问题。


    ```

    Fatima [16:00 | 02/08/2019]: 大家好，我有一个紧急问题需要讨论。我刚和一个客户通完电话，他们的应用一加载就崩溃。他们非常沮丧。我们能尽快解决这个问题吗？😫

    Keith [16:01 | 02/08/2019]: 法蒂玛，感谢你提醒我们这个问题。我们马上处理。@John，既然我们的架构师今天生病请假了，你能带头调查这个问题吗？

    John [16:02 | 02/08/2019]: 没问题，基思。我会深入代码库，看看能否找到导致崩溃的潜在原因。

    John [16:02 | 02/08/2019]: 法蒂玛，你能从客户那里收集一些额外信息吗？问问他们具体的设备型号、操作系统以及最近是否安装了任何更新。

    Fatima [16:03 | 02/08/2019]: 当然可以，约翰。我马上联系客户收集这些细节。有消息了我会通知大家。

    Dave [16:04 | 02/08/2019]: 我理解情况的紧迫性。法蒂玛，我们一定要让客户了解我们的进展。在故障排除过程中，我们不想让他们感觉被蒙在鼓里。

    Fatima [16:04 | 02/08/2019]: 肯定的，戴夫。我会定期向客户更新情况，告知他们我们发现的任何相关信息。

    John [16:20 | 02/08/2019]: 我检查了代码库，到目前为止没有发现明显的问题。应用在加载时崩溃很奇怪。会不会是内存相关的问题？基思，我们最近有收到内存泄漏或高内存使用的报告吗？

    Keith [16:22 | 02/08/2019]: 我会调出监控日志，约翰，检查最近的版本中是否有任何内存相关的异常。我查完再回复你。

    Fatima [17:01 | 02/08/2019]: 各位，快速更新一下。客户使用的是运行 iOS 15.1 的 iPhone X。他们提到问题是在几天前更新应用后开始的。

    Keith [17:05 | 02/08/2019]: 谢谢更新，法蒂玛。这是很有用的信息。约翰，我们重点在装有 iOS 15.1 的 iPhone X 模拟器上测试最新的应用更新，看看能否重现这个问题。

    John [17:06 | 02/08/2019]: 好主意，基思。我马上设置模拟器并运行一些测试。

    Keith [17:30 | 02/08/2019]: 约翰，在模拟器上重现问题有进展吗？

    John [17:32 | 02/08/2019]: 有的，基思。我成功在模拟器上重现了崩溃。这似乎与 iOS 15.1 的兼容性问题有关。我怀疑是由于调用了一个已弃用的方法。我会修复它并运行更多测试来确认。

    John [18:03 | 02/08/2019]: 修复了已弃用方法的问题，应用在加载时不再崩溃。看来我们已经找到并解决了问题。我会准备一个补丁发给你，基思，供你审查和部署。

    Keith [18:04 | 02/08/2019]: 谢谢，请尽快把补丁发给我。我审查完后，我们会将修复部署到应用商店。

    Dave [18:06 | 02/08/2019]: 干得好，团队！约翰，请让客户了解进展，并告知他们我们已准备好在下一次应用更新中为他们提供修复。有人能确保发布说明中反映这一点吗？

    John [18:07 | 02/08/2019]: 我会的，戴夫。我会通知客户，确保他们知道即将到来的修复。

    Keith [18:27 | 02/08/2019]: 补丁已审查并批准，约翰。请继续更新商店中的应用。我们争取在一小时内完成。

    John [18:26 | 02/08/2019]: 明白，基思。我正在上传中。

    Fatima [18:38 | 02/08/2019]: 我刚通知了客户关于修复的消息。他们松了一口气，并对我们的迅速响应表示感谢。感谢大家的协作和快速行动。能与如此能干的团队共事真是愉快！

    Dave [18:40 | 02/08/2019]: 干得好，团队！非常感谢大家的努力。我们以创纪录的速度解决了这个紧急问题。让我们继续保持良好的工作状态！

    列表 4-1

    Slack 频道中试图分析客户问题的团队成员

    ```


    ## 提示工程入门：文本摘要


    所以，不用说，没人愿意整天在 Slack 频道里滚动阅读那些“火烧眉毛”的问题。我们将利用 ChatGPT 的文本摘要能力。为简单起见，让我们尝试几个提示，将整个聊天消息列表发送给
    ChatGPT，以便它为我们生成所有已发生事件的可用的摘要。

    '
- fmt: '### Prompt #1: `“tl;dr”`


    This prompt is short, sweet, and to the point. In case you''re not familiar with
    it, it’s a term used online frequently to briefly summarize a long article. It
    literally stands for “too long; didn’t read,” which is how I feel about a lot
    of conversations on `Slack` when I’m swamped with work. Conveniently, `ChatGPT`
    can understand this simple term (I wouldn''t necessarily call it a word) as a
    prompt, and the results are pretty impressive.


    ```

    System: You are a helpful assistant

    User:  Fatima [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...

    User: Tl;dr

    Model: gpt-4o

    Temperature: 1

    Maximum length: 360

    Top P: 1

    Frequency penalty: 0

    Presence penalty: 0

    Listing 4-2

    PROMPT. Asking for a Summarized Version of a Longer Conversation

    ```


    Notice how the number of tokens is kept small, at 360, which will ultimately help
    `ChatGPT` to create a short response. Also, see that the temperature is left at
    1 (the default value), but the `Top P` is increased all the way to its maximum
    (which is 1). Therefore, it’s important to play around with temperature and other
    settings to control the tone and variety of `ChatGPT`''s responses.


    Listing [4-3](#615442_1_En_4_Chapter.xhtml#PC3) below shows `ChatGPT`''s summarization
    of the conversation from Listing [4-1](#615442_1_En_4_Chapter.xhtml#PC1).


    ```

    The team quickly responds to a client''s app crashing issue. John investigates
    the codebase while Fatima gathers information from the client. They discover a
    compatibility issue with iOS 15.1 and John fixes it. The patch is reviewed and
    approved, and the app is updated in the store. The client is informed and grateful
    for the quick resolution. The team is praised for their collaboration and prompt
    action.

    Listing 4-3

    RESPONSE. Getting a Summarized Version of a Very Long Conversation

    ```


    That''s fantastic! It reduced that extremely long conversation down to a simple
    and brief summary of only 68 words. As you can see, `ChatGPT` is not replacing
    a job here; however, it will definitely make someone more productive. Now, let''s
    try a few more prompts, shall we?


    ### Prompt #2: `“Explain This in Three Sentences or Less”`


    So, If `“tl;dr”` doesn’t provide a brief enough explanation for you, then we can
    tell `ChatGPT` to make things even simpler. `ChatGPT` does well with parameters,
    so let''s specify that the explanation shouldn’t be any longer than three sentences.


    ```

    System: You are a helpful assistant

    User:  Fatima [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...

    User: Explain this in 3 sentences or less.

    Model: gpt-4o

    Temperature: 1

    Maximum length: 250

    Top P: 0

    Frequency penalty: 0

    Presence penalty: 0

    Listing 4-4

    PROMPT. Asking for a Shorter Version of a Longer Conversation

    ```


    As you may have noticed, the temperature is set to 0.82 in this example. We really
    want `ChatGPT` to give us a concise answer here, so the “drier,” the better.


    ```

    A customer reported an urgent issue of app crashes to the team. John investigates
    the issue and asks Fatima to gather additional information from the client. They
    discover that the issue is related to a compatibility problem with iOS 15.1\.
    John fixes the problem and Keith approves the deployment of the fix to the client''s
    production environment.

    Listing 4-5

    RESPONSE. Getting a Three-Sentence Summary

    ```


    ### Prompt #3: `“I’m a Manager. Explain to Me What Happened”`


    When you don’t want to sound like the one person that doesn’t understand, `ChatGPT`
    has the capability to rephrase what has been said and break it down until it’s
    very simple.


    ```

    System: You are a helpful assistant

    User:  Fatima [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...

    User: Summarize this conversation and explain it to me like I''m a manager with
    little technical experience.

    Model: gpt-4o

    Temperature: 0.82

    Maximum length: 750

    Top P: 1

    Frequency penalty: 0

    Presence penalty: 0

    Listing 4-6

    PROMPT. Asking for a Simplified Version of a More Complex Conversation

    ```


    Again, the temperature is set below 1.0 so that `ChatGPT` can keep the answer
    brief and easy to understand. We increased the token length so that `ChatGPT`
    can take the time to explain some potentially technical concepts.


    ```

    In this conversation, Fatima brings up an urgent issue with a client who is experiencing
    app crashes as soon as they load it. Keith assigns John to investigate the issue
    since their architect is out sick. John asks Fatima to gather additional information
    from the client about their device, operating system, and recent updates. Dave
    emphasizes the importance of keeping the client informed throughout the troubleshooting
    process.

    John checks the codebase but doesn''t find any obvious issues, so he suspects
    it could be a memory-related problem. Keith agrees to check for memory-related
    anomalies in recent releases. Fatima provides an update that the client is using
    an iPhone X running iOS 15.1 and mentioned that the issue started after updating
    the app. Keith suggests testing the latest app update on an iPhone X simulator
    with iOS 15.1 to replicate the issue.

    John successfully reproduces the crash on the emulator and identifies a compatibility
    issue with iOS 15.1, possibly due to a deprecated method call. He fixes the issue
    and prepares a patch for review and deployment. Keith approves the patch and asks
    John to update the app in the store. Dave requests that the client be kept informed
    and that the release notes reflect the upcoming fix.

    John uploads the patch and informs the client about the fix. Keith reviews and
    approves the patch, and John proceeds with updating the app in the store. Fatima
    informs the client about the fix, and they express relief and gratitude for the
    prompt response. Dave commends the team for their collaboration and quick action,
    emphasizing the importance of maintaining good work.

    In summary, the team quickly addressed an urgent issue where a client''s app was
    crashing on load. They investigated the issue, identified a compatibility problem
    with iOS 15.1, fixed it, and prepared a patch for deployment. The client was kept
    informed throughout the process, and the fix was successfully implemented, resulting
    in a relieved and grateful client.

    Listing 4-7

    RESPONSE. Getting a Simplified Version of a More Complex Conversation

    ```'
