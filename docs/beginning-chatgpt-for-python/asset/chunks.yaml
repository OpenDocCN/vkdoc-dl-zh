    Now, let’s run our new and improved Q&A Python Discord bot, `tech_support_bot.py`.
    After executing the app, be sure to return back to your Discord server and start
    asking questions. Figure [7-1](#615442_1_En_7_Chapter.xhtml#Fig1) shows the bot
    in action.


    ![](images/615442_1_En_7_Chapter/615442_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1** Having a Discussion with Our Intelligent Discord Q&A Bot, `tech_support_bot.py`


    Listing [7-6](#615442_1_En_7_Chapter.xhtml#PC19) shows the conversation between
