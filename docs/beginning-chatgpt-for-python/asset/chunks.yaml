- fmt: '# Examining a Real-World Problem: Customer Support for a Software Company


    Let’s look at one of the most grueling tasks in software development: providing
    tech support. Imagine the joys of fielding calls and messages all day from people
    who might be frustrated, confused, or just in need of a solution while using your
    software. Here’s some of the reasons why customer support is a tough nut to crack:


    - Your end-users and your customers are notoriously bad at explaining problems
    with your software.

    - Level 1 technicians, often the first line of defense, typically handle the most
    basic issues or user errors. But when problems get more complex, users are escalated
    to Level 2.

    - The mid-tier is a tricky place, because they have more knowledge and experience
    than the tech support staff at Level 1; however, they don''t have the opportunity
    to directly get answers from the end-user.

    - Really bad problems get escalated to Level 3; however, these are the most expensive
    tech support staff because they have the most knowledge and experience. They have
    hands-on experience with the code as well as the servers and the infrastructure.


    So, let''s work with a real-world example of a typical conversation within a typical
    tech support channel within Slack. Below is a list of the team members and their
    roles within a fictional company:


    - Fatima (customer service representative)

    - John (software engineer)

    - Dave (PM)

    - Keith (CTO)


    The listing below provides an example of a conversation between the team members
    at a software startup. Fatima, the customer service representative, lets the team
    know that their app is crashing immediately after launching (not a good problem
    to have). Keith, the CTO, steps in immediately to escalate the issue.


    ```

    Fatima [16:00 | 02/08/2019]: Hey everyone, I have an urgent issue to discuss.
    I just got off a call with a client who''s experiencing app crashes as soon as
    they load it. They''re really frustrated. Can we get this sorted ASAP? 😫

    Keith [16:01 | 02/08/2019]: Thanks for bringing this to our attention, Fatima.
    Let''s jump on this right away. @John, can you take the lead in investigating
    the issue since our architect is out sick today?

    John [16:02 | 02/08/2019]: Sure thing, Keith. I''ll dive into the codebase and
    see if I can find any potential culprits for the crashes.

    John [16:02 | 02/08/2019]: Fatima, could you gather some additional information
    from the client? Ask them about the specific device, operating system, and any
    recent updates they might have installed.

    Fatima [16:03 | 02/08/2019]: Absolutely, John. I''ll reach out to the client immediately
    and gather those details. Will update you all once I have them.

    Dave [16:04 | 02/08/2019]: I understand the urgency here. Let''s make sure we
    keep the client informed about our progress Fatima. We don''t want them feeling
    left in the dark during this troubleshooting process.

    Fatima [16:04 | 02/08/2019]: Definitely, Dave. I''ll keep the client updated at
    regular intervals, providing them with any relevant information we uncover.

    John [16:20 | 02/08/2019]: I''ve checked the codebase, and so far, I haven''t
    found any obvious issues. It''s strange that the app is crashing on load. Could
    it be a memory-related issue? Keith, do we have any recent reports of memory leaks
    or high memory usage?

    Keith [16:22 | 02/08/2019]: I''ll pull up the monitoring logs, John, and check
    if there have been any memory-related anomalies in recent releases. Let me get
    back to you on that.

    Fatima [17:01 | 02/08/2019]: Quick update, everyone. The client is using an iPhone
    X running iOS 15.1\. They mentioned that the issue started after updating their
    app a few days ago

    Keith [17:05 | 02/08/2019]: Thanks for the update, Fatima. That''s helpful information.
    John, let''s focus on testing the latest app update on an iPhone X simulator with
    iOS 15.1 to see if we can replicate the issue.

    John [17:06 | 02/08/2019]: Good idea, Keith. I''ll set up the emulator and run
    some tests right away.

    Keith [17:30 | 02/08/2019]: John, any progress on replicating the issue on the
    emulator?

    John [17:32 | 02/08/2019]: Yes, Keith. I managed to reproduce the crash on the
    emulator. It seems to be related to a compatibility issue with iOS 15.1 . I suspect
    it''s due to a deprecated method call. I''ll fix it and run more tests to confirm.

    John [18:03 | 02/08/2019]: Fixed the deprecated method issue, and the app is no
    longer crashing on load. It looks like we''ve identified and resolved the problem.
    I''ll prepare a patch and send it to you, Keith, for review and deployment.

    Keith [18:04 | 02/08/2019]: Thank you, please provide me with the patch as soon
    as possible. Once I review it, we''ll deploy the fix to the app store.

    Dave [18:06 | 02/08/2019]: Great job, team! John, please keep the client informed
    about the progress and let them know we have a fix ready for them on the next
    app update. Can someone make sure the release notes reflect this?

    John [18:07 | 02/08/2019]: Will do, Dave. I''ll update the client and ensure they''re
    aware of the upcoming fix.

    Keith [18:27 | 02/08/2019]: Patch reviewed and approved, John. Please proceed
    with updating the app in the store. Let''s aim to have it done within the next
    hour.

    John [18:26 | 02/08/2019]: Understood, Keith. I''m in the process of uploading
    it now.

    Fatima [18:38 | 02/08/2019]: I just informed the client about the fix. They''re
    relieved and grateful for our prompt response. Thanks, everyone, for your collaboration
    and quick action. It''s a pleasure working with such a competent team!

    Dave [18:40 | 02/08/2019]: Well done, team! Your efforts are greatly appreciated.
    We managed to turn this urgent problem around in record time. Let''s keep up the
    good work!

    Listing 4-1

    Team Members Within a Slack Channel Trying to Analyze a Customer’s Problem

    ```


    ## Prompt Engineering 101: Text Summarization


    So, needless to say, no one wants to spend their day constantly scrolling through
    Slack channels reading about issues and problems that are on fire. We''re going
    to utilize the capabilities of ChatGPT for text summarization. To keep things
    simple, let''s try a few prompts to send the entire listing of the chat messages
    to ChatGPT in order for it to give us a usable summary of all the events that
    have happened.'
