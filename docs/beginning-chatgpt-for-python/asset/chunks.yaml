    with Caution)


    This last method isn’t recommended for long-term use because of security reasons.
    But, for the sake of knowing how it works, we’re going to cover how you can hard-code
    your API key into your application if you want to quickly test out your API key
    to make sure it’s working.


    To begin, you''ll assign the API key to a variable within the Python code. Replace
    "YOUR_API_KEY" with the actual API key you received from OpenAI. Ensure that this
    API key is kept secure and not shared publicly.


    Next, you''ll initialize the OpenAI client within your Python script. This is
    done by instantiating the OpenAI class with the api_key parameter set to the API
    key. By providing the API key during initialization, you enable the OpenAI client
    to access the services offered by the OpenAI API. This step ensures that your
    Python script can communicate with the OpenAI API using the specified API key.


    ```

    from openai import OpenAI

    # API key

    API_KEY = "your-api-key-here"

    # Initialize OpenAI client with hardcoded API key

    client = OpenAI(api_key=API_KEY)

    Listing 2-2

    Coding Your API Key Directly into Your Application

    ```


    Now, let’s make our first application with the OpenAI API, and test out the key
    at the same time by getting a list of models useable with the OpenAI API.


    Note


    From this point on, the code examples will be accessing our API key with a local
    .env file.


    ## Creating Your First Python ChatGPT App: `model_lister.py`


    We’re actually going to accomplish two tasks at once here. We’re going to create
    a basic application in Python using the OpenAI APIs, and in the process, we’re
    going to verify that we’ve properly obtained an API key. So, needless to say,
    in case you haven''t done so already, follow the instructions in Chapter [1](#615442_1_En_1_Chapter.xhtml)
    to create your OpenAI developer account and obtain your API key. Going forward,
    all the code samples in this book require a valid API key.


    ## Using `OpenAI.models.list()` to Get a List of Available Models


    One of the most basic (but also essential) capabilities that we can invoke is
    in the Model class. Why, you may ask? The Model class allows you to get a list
    of all the AI models that are currently available for use by developers via the
    Python API.


    After successfully getting an instance of the OpenAI and Model objects, the API
    will provide what is referred to within the OpenAI API as a “SyncPage,” which
    is essentially a dictionary with the structure shown in Table [2-1](#615442_1_En_2_Chapter.xhtml#Tab1).


    ### Handling the Response


    Table 2-1


    The Structure of the Model Object


    | Field | Type | Description |

    | --- | --- | --- |

    | object | String | This always returns the literal “list.” |

    | data | Dictionary | A dictionary of AI models offered by OpenAI. |

    |     ↳ id | String | The unique ID of the AI model, which is essentially the
    full name of the model. |

    |     ↳ object | String | This always returns the literal “model.” |

    |     ↳ created | Integer | The creation date for the model. |

    |     ↳ owned_by | String | The name of the organization that owns the model.
    |


    Note


    Since objects can contain dictionaries (which can be hard to represent in a table),
    we’re using the following notation “ ↳ ” to indicate the elements of the dictionary.
    As you can see from Table [2-1](#615442_1_En_2_Chapter.xhtml#Tab1), “id,” “object,”
    “created,” and “owned_by” are all elements of the “data” dictionary in the response.


    Now that we have the details of the Model object, let’s talk about how we can
    test the API key we obtained in the first chapter. There are actually a few ways
    to do this.


    ## Using Your API Key to Get a List of Available Models with the OpenAI API


    With our API key set up in a local .env file, we’re going to use the following
    code to get a list of models available within the OpenAI API, which will then
    be printed into our terminal.


    ```

    """Module for interacting with OpenAI API to list the models available"""

    import os

    from dotenv import load_dotenv

    from openai import OpenAI

    # Load environment variables from .env

    load_dotenv()

    # Use the API key from the environment variable

    api_key = os.getenv("OPENAI_API_KEY")

    client = OpenAI()

    models_list = client.models.list()

    print(models_list)

    Listing 2-3

    Getting a List of Models Available with the OpenAI API by Calling the models.list()
    method with model_lister.py

    ```


    After running the code in Listing [2-3](#615442_1_En_2_Chapter.xhtml#PC15), Listing
    [2-4](#615442_1_En_2_Chapter.xhtml#PC16) is a truncated response that you should
    expect to see.


    ```

    SyncPage[Model](data=[Model(id=''dall-e-3'', created=1698785189, object=''model'',
    owned_by=''system''), Model(id=''dall-e-2'', created=1698798177, object=''model'',
    owned_by=''system''), Model(id=''gpt-3.5-turbo-0125'', created=1706048358, object=''model'',
    owned_by=''system''), Model(id=''text-embedding-ada-002'', created=1671217299,
    object=''model'', owned_by=''openai-internal''), Model(id=''tts-1-hd-1106'', created=1699053533,
    object=''model'', owned_by=''system''), Model(id=''tts-1-hd'', created=1699046015,
    object=''model'', owned_by=''system''). . .

    Listing 2-4

    An Ugly-Looking Response After Running Our model_lister.py Application

    ```


    ## Getting a Prettier List of Models


    Listing [2-4](#615442_1_En_2_Chapter.xhtml#PC16) is a partial list due to the
    sheer size of the number of models available for developers to use! The good news,
    however, is that the full response is provided as a table in Appendix 1.


    So, first off, this is great. We know that our API key works! However, if you
    hadn’t noticed, we’re getting a fairly ugly-looking response. For the sake of
    brevity, Listing [2-4](#615442_1_En_2_Chapter.xhtml#PC15) has been shortened,
    but it’s quite obvious no one is going to want to read that big ol’ chunk of text
    when we just want to know all of the models within the OpenAI API.


    It would be nice if we could get a more cleaned up response after running our
    code. So, let’s add some code that will format the response.


    ```

