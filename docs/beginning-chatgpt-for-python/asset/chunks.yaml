- fmt: "### Specifying What Your Bot Can (and Can’t) Do by Setting the Scope\n\nNow,\
    \ you’ll be presented with a screen that has a ton of options for bots for Slack\
    \ workspaces. The first thing you need to do, however, is from the sidebar on\
    \ the left, click **OAuth & Permissions**.\n\nOur bot is going to be pretty simple;\
    \ all it needs to do is read the messages from a channel in order to give us a\
    \ summary of what was said. In addition to reading the messages, we also need\
    \ to know the names of the people in the Slack workspace, otherwise, we’ll get\
    \ a UUID representation of the person instead of their name, which is meaningless\
    \ to us.\n\nSo, scroll down to add the following OAuth Scope to your Slack bot,\
    \ as shown in Figure [4-4](#615442_1_En_4_Chapter.xhtml#Fig4), below.\n\n![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4\n\nAdding Scopes for the Slack Bot App\n\n- `channels:history`\n\
    - `channels:read`\n- `users:read`\n\n### Confirming Your Settings\n\nAfter you’ve\
    \ added the appropriate scopes for your bot, scroll back up and click on **Basic\
    \ Information** from the left side bar.\n\nOn the page that follows, you’ll see\
    \ that there’s now a green checkmark beside “Add features and functionality,”\
    \ which confirms that you’ve added your scopes correctly, as shown in Figure [4-5](#615442_1_En_4_Chapter.xhtml#Fig5).\n\
    \n![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig5_HTML.jpg)\n\nFigure 4-5\n\
    \nConfirm Your Settings\n\n### Viewing the OAuth & Permissions Page\n\nAs shown\
    \ in Figure [4-6](#615442_1_En_4_Chapter.xhtml#Fig6), below, navigate to the **OAuth\
    \ & Permissions** page, and click on the “Install to Workspace” button.\n\n![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6\n\nThe OAuth & Permissions Screen\n\n### Installing Your Slack Bot\
    \ App to Your Workspace\n\nNow that all the permissions have been requested, it’s\
