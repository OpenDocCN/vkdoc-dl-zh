    Note


    This is by no means an exhaustive list of models available for developers provided
    by OpenAI! As newer models are released, the older models will be marked as legacy
    or deprecated. Therefore, it’s important to stay up-to-date by checking the list
    of available models on the OpenAI documentation list of models:


    [**https://platform.openai.com/docs/models**](https://platform.openai.com/docs/models)


    ### When We Talk About Tokens, Don’t Think About Access Tokens


    When using a third party API, such as an external REST service, you might think
    of a “token” in the same sense as an access token, which is typically a UUID that
    allows you to identify yourself and maintain a session with the service. Well,
    forget that definition for now. Instead, when using the OpenAI APIs, a **token**
    is a chunk of a text that is approximately four characters long. That’s it – nothing
    else special.


    So, if a token is approximately a four-character chunk of text, then why do we
    care about it?


    When working with the OpenAI textual models, developers need to be aware of token
    limitations, because they impact the cost and performance of API calls. For example,
    the gpt-4o and o1 models both support 128,000 tokens (which is approximately the
    size of a 300 page novel) that can go in your prompt. These input tokens are also
    called the context windows. In contrast, the maximum output tokens for gpt-4o
    is 16,384, while the maximum output tokens for the o1 model is 32,768.


    As a result, developers need to take into account the length of the prompts as
    inputs and outputs to the models, ensuring that they fit within the model''s token
    constraints.


    Table [1-1](#615442_1_En_1_Chapter.xhtml#Tab1) provides a list of some of the
    most current models with the token limitations and their pricing.


    Table 1-1


    List of Models with Their Token Limitations and the Cost Per Token


    | Model | Context Window | Cost of Token Input | Cost of Token Output |

    | --- | --- | --- | --- |

    | gpt-4o | 128,000 | $2.50 / 1M input tokens | $10.00 / 1M output tokens |

    | gpt-4o-mini | 128,000 | $0.150 / 1M input tokens | $0.600 / 1M output tokens
    |

    | o1 | 128,000 | $15.00 / 1M input tokens | $60.00 / 1M output tokens |

    | o1-mini | 128,000 | $3.00 / 1M input tokens | $12.00 / 1M output tokens |


    ### Temperature Is All About Creativity


    Of course, ChatGPT isn’t sentient, so it''s incapable of thinking as we humans
    do. However, by adjusting the **temperature** setting in your prompts to the ChatGPT
    API, you can enable the responses to be more creative. Being aware of what it
    understands is crucial if you want to make best use of its potential.


    ![](images/615442_1_En_1_Chapter/615442_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Modify the Temperature in Order to Get More (or Less) Creative Responses'
  trans: "\n### 模型。模型？模型！！！\n\n作为一名 Python 开发者，当你听到“模型”这个词时，可能立刻会想到 Python 应用中现实世界实体的表示，对吧？例如，想想“对象模型”这个术语。此外，如果你曾使用过任何类型的数据库，那么“模型”这个词*也*可能会让你联想到数据库中数据及其关系的表示。例如，想想“数据模型”这个术语。\n\
    \n然而，在使用 ChatGPT API（以及广义上的人工智能）时，你需要忘记这两种定义，因为它们并不适用。在人工智能领域，“模型”是一个预训练的**神经网络**。\n\
    \n请记住，正如我之前提到的，阅读本书并不需要机器学习博士学位。那么，什么是神经网络？简单来说，神经网络是人工智能系统的基本组成部分，因为它通过使用互连的人工神经元层来处理和分析数据，旨在模拟人脑的工作方式。这些网络可以在大量数据上进行训练，以学习模式、关系并做出预测。\n\
    \n![](img/615442_1_En_1_Fig1_HTML.jpg)\n\n**图 1-1** 人工智能模型在大量数据上进行训练\n\n在人工智能的语境中，“预训练模型”指的是一个神经网络，它在可供开发者使用之前，已经针对特定任务或数据集进行了训练。这个训练过程包括将模型暴露于大量已标记和分类（也称为“注释”）的数据中，并调整其内部参数以优化其在给定任务上的性能。\n\
    \n让我们来看看 OpenAI 为开发者提供的一些模型，以便为其应用程序赋能人工智能。\n\n| `o1` | `o1` 系列大型语言模型通过强化学习进行训练，以处理复杂的推理任务。`o1`\
    \ 模型在回答前会进行深度思考，在响应用户之前生成长篇的内部推理链。这些模型生成响应所需的时间比其他模型长得多。一些可用的 `o1` 模型包括：• `o1`\
    \ • `o1-mini` |\n| --- | --- |\n| `GPT-4` | `GPT-4` 是 OpenAI 的 GPT 模型系列中生成速度最快的模型之一。`GPT`\
    \ 代表生成式预训练变换器，这些模型经过训练，能够理解自然语言以及多种编程语言。`GPT-4` 模型接受文本和图像作为提示输入，并输出文本。一些可用的 `GPT-4`\
    \ 模型包括：• `gpt-4o` • `gpt-4o-mini` • `gpt-4o-realtime` • `gpt-4o-audio` |\n| `DALL·E`\
    \ | `DALL·E` 模型可以根据自然语言提示生成和编辑图像。在本书后面的第 5 章中，我们将使用 `DALL·E` 模型来可视化你最喜欢的播客剧集中讨论的内容，这会很有趣。一些可用的\
    \ `DALL·E` 模型包括：• `dall-e-3` • `dall-e-2` |\n| `TTS` | `TTS` 模型接收文本并将其转换为音频，效果出奇地好。在大多数情况下，生成的音频几乎与人类声音无法区分。一些可用的\
    \ `TTS` 模型包括：• `tts-1` • `tts-1-hd` |\n| `Whisper` | 简单来说，`Whisper` 模型将音频转换为文本。在本书中，我们将使用\
    \ `Whisper` 模型在播客剧集中搜索文本。 |\n| `Embeddings` | `Embeddings` 模型可以将大量文本转换为数值表示，以反映文本中字符串之间的关联方式。那么这有什么用呢？嵌入允许开发者使用自定义数据集执行特定任务。是的，这意味着你可以在与你的应用程序相关的特定数据上训练\
    \ `Embeddings` 模型。这使你能够执行诸如以下操作：• 在你自己的文本语料库中进行搜索 • 对数据进行聚类，以便根据相似性对文本字符串进行分组\
    \ • 获取推荐（推荐具有相关文本字符串的项目） • 检测异常（识别出相关性较低的异常值） • 衡量多样性（分析相似性分布） • 对数据进行分类（根据最相似的标签对文本字符串进行分类）\
    \ |\n| `Moderations` | `Moderations` 模型是经过微调的模型，可以检测文本是否敏感或不安全。这些模型可以分析文本内容，并根据以下类别进行分类：•\
    \ 仇恨 • 仇恨/威胁 • 骚扰 • 骚扰/威胁 • 自残 • 自残/意图 • 自残/指示 • 色情 • 色情/未成年人 • 暴力 • 暴力/图形 可用的\
    \ `Moderations` 模型包括：• `text-moderation-latest` • `omni-moderation-latest` • `text-moderation-stable`\
    \ |\n| 旧版与已弃用 | 自 ChatGPT 首次亮相以来，OpenAI 一直持续支持其较旧的 AI 模型，但这些模型已被标记为“旧版”或“已弃用”。这些模型仍然存在；然而，他们已经发布了其他更准确、更快且使用成本更低的模型。\
    \ |\n\n> **注意**  \n> 这绝非 OpenAI 为开发者提供的可用模型的详尽列表！随着新模型的发布，旧模型将被标记为旧版或已弃用。因此，务必通过查看\
    \ OpenAI 文档中的模型列表来保持更新：  \n> [`platform.openai.com/docs/models`](https://platform.openai.com/docs/models)\n\
    \n### 当我们谈论 Token 时，别想成访问令牌\n\n当使用第三方 API（例如外部 REST 服务）时，你可能会将“token”理解为访问令牌，它通常是一个\
    \ UUID，用于标识你的身份并与服务保持会话。那么，现在请忘记这个定义。相反，在使用 OpenAI API 时，**token** 是一个大约四个字符长的文本块。仅此而已——没有其他特殊含义。\n\
    \n那么，如果 token 只是一个大约四个字符的文本块，我们为什么要在意它呢？\n\n在使用 OpenAI 的文本模型时，开发者需要注意 token 限制，因为它们会影响\
    \ API 调用的成本和性能。例如，`gpt-4o` 和 `o1` 模型都支持 128,000 个 token（大约相当于一本 300 页小说的篇幅）作为提示输入。这些输入\
    \ token 也称为上下文窗口。相比之下，`gpt-4o` 的最大输出 token 为 16,384，而 `o1` 模型的最大输出 token 为 32,768。\n\
    \n因此，开发者需要考虑作为模型输入和输出的提示长度，确保它们符合模型的 token 约束。\n\n**表 1-1** 列出了一些最新模型及其 token\
    \ 限制和定价。\n\n**表 1-1** 模型列表及其 Token 限制和每 Token 成本\n\n| 模型 | 上下文窗口 | 输入 Token 成本\
    \ | 输出 Token 成本 |\n| --- | --- | --- | --- |\n| `gpt-4o` | 128,000 | $2.50 / 1M\
    \ 输入 tokens | $10.00 / 1M 输出 tokens |\n| `gpt-4o-mini` | 128,000 | $0.150 / 1M\
    \ 输入 tokens | $0.600 / 1M 输出 tokens |\n| `o1` | 128,000 | $15.00 / 1M 输入 tokens\
    \ | $60.00 / 1M 输出 tokens |\n| `o1-mini` | 128,000 | $3.00 / 1M 输入 tokens | $12.00\
    \ / 1M 输出 tokens |\n\n### 温度关乎创造力\n\n当然，ChatGPT 没有感知能力，因此无法像人类一样思考。但是，通过调整向 ChatGPT\
    \ API 发送提示中的**温度**设置，你可以让响应更具创造力。如果你想充分利用其潜力，了解它所理解的内容至关重要。\n\n![](img/615442_1_En_1_Fig2_HTML.jpg)\n\
    \n**图 1-2** 调整温度以获得更多（或更少）创造性的响应\n"
- fmt: '# Getting Started with the OpenAI Playground


    Now it''s time to take the concepts that we’ve learned so far and start to put
    them to good use! However, we need to do first things first, and therefore, you
    will need to have a developer account with OpenAI and create an API key.


    Head over to the following URL to create your dev account and API key:


    [https://platform.openai.com/account/api-keys](https://platform.openai.com/account/api-keys)


    As you can see from Figure [1-3](#615442_1_En_1_Chapter.xhtml#Fig3), you can name
    your API key anything that you want.


    ![](images/615442_1_En_1_Chapter/615442_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Before You Can Access the Playground or Make API Calls, You Need to Have an API
    Key


    You should be aware that as a requirement to create an API key, you will need
    to provide to OpenAI a credit card so that you can be billed for usage of their
    models.


    Now that you’ve got your API key, let’s go straight to the Chat Playground at
    the following URL:


    [https://platform.openai.com/playground](https://platform.openai.com/playground)


    Upon entering the Playground, click on the combobox at the top and select the
    Chat option to start the Chat Playground, as shown in Figure [1-4](#615442_1_En_1_Chapter.xhtml#Fig4).


    ![](images/615442_1_En_1_Chapter/615442_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    After Entering the Playground, Select the Chat Option


    Figure [1-5](#615442_1_En_1_Chapter.xhtml#Fig5) depicts the Chat Playground, with
    certain parts numbered so that they can be easily identified.


    ![](images/615442_1_En_1_Chapter/615442_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The Chat Playground Can Be a Little Daunting at First Glance


    ## 1\. Model


    Earlier in this chapter, we talked about the various models that are available
    for developers. Click the Model field in order to see a list of models that are
    available.


    You may also see that some models have a month and day associated with their name,
    which is simply a snapshot of that model. Programmatically selecting a snapshot
    enables developers to have some sort of predictability in the responses that they
    will receive from ChatGPT, because the current models are always updated.


    ## 2\. System


    As you can see, the user interface for the Chat Playground is vastly more complex
    than the ChatGPT website that everyone else uses. So, let’s talk about the System
    field (see Figure [1-5](#615442_1_En_1_Chapter.xhtml#Fig5), item 2).


    In my opinion, ChatGPT can be described as “a vastly powerful form of artificial
    intelligence…with amnesia." Therefore, when you''re using ChatGPT programmatically,
    you need to inform the system who it is in the conversation!


    Figure [1-6](#615442_1_En_1_Chapter.xhtml#Fig6), shown below, gives you a glimpse
    of the thousands of different roles that ChatGPT can play in a conversation.


    ![](images/615442_1_En_1_Chapter/615442_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    The System Field in the Chat Playground Allows You to Set the Role That ChatGPT
    Will Play in the Conversation


    ## 3\. User/Assistant


    The User field (Figure [1-5](#615442_1_En_1_Chapter.xhtml#Fig5), item 3) in the
    Chat Playground is where you type your prompt to ChatGPT, which can be anything
    that you want, for example, “describe how telemedicine will affect the medical
    industry.”


    When you initially load the Chat Playground, the Assistant field is not visible.
    In order to make it appear, you need to click “User” button to switch to the Assistant
    field. Now, you may be asking yourself, “Why is this field needed at all?” Well,
    that’s a fine question. If you want ChatGPT to remember something that it has
    already told you in a previous conversation, then you need to type into the Assistant
    field anything that it has already told you that you think is relevant in order
    to continue with the conversation. Remember, it is a vastly powerful AI, but it
    has amnesia!


    ## 4\. Add (Optional)


    Add (Figure [1-5](#615442_1_En_1_Chapter.xhtml#Fig5), item 4) is where you’d click
    in order to add either an Assistant message to the conversation or another User
    message. Now, you may ask, “What’s the point of adding yet another User message
    to the conversation, when I can type what I want in the original User field above?”
    Good question.


    If you wanted to separate your command from your data, then you would use a separate
    User message for that.


    Do you remember in Listing [1-4](#615442_1_En_1_Chapter.xhtml#PC4) earlier in
    this chapter, where we had to use the “###” to separate the command to ChatGPT
    from the data that we wanted it to analyze? Well, this is now no longer needed
    because the command would be the first User message; the data would be the second
    User message.


    ## 5\. Temperature (Optional)


    As noted earlier in this chapter, the temperature selector ranges between 0 and
    2 and allows you to select the “randomness” of the response.


    ## 6\. Maximum Tokens (Optional)


    Do you remember the discussion earlier in this chapter about tokens? By selecting
    anything in the range for this item, you can adjust the number of tokens (which
    directly affects the number of words) in the response.


    ## 7\. Code (Optional)


    After you have submitted your prompt using the Playground, you can click on the
    code button (Figure [1-4](#615442_1_En_1_Chapter.xhtml#Fig4), item 7) in order
    to see the code necessary to send the same prompt using any of the languages that
    they support.


    ## Try It Now! Experimenting with the “System” Role


    Now that we’re familiar with several of the features of the Chat Playground, let’s
    send our first prompt using the settings discussed above. Listings [1-7](#615442_1_En_1_Chapter.xhtml#PC7)
    and [1-8](#615442_1_En_1_Chapter.xhtml#PC8) below use the same prompt asking ChatGPT
    to give a few paragraphs on telemedicine, but the role of the system is vastly
    different from each other.


    ```

    System: You are a highly opinionated health blogger who always has stories with
    firsthand experience

    User: Write 3 paragraphs on pros and cons of telemedicine

    Listing 1-8

    PROMPT. The Pros and Cons of Telemedicine as an Opinionated Health Blogger

    ```


    ```

    System: You are a strictly factual researcher

    User: Write 3 paragraphs on pros and cons of telemedicine

    Listing 1-7

    PROMPT. The Pros and Cons of Telemedicine as a Researcher

    ```


    You are encouraged to try these two prompts yourself and see what the responses
    are. Adjust the settings for the temperature and token length to get familiar
    with how those parameters affect the outcome.


    ## Conclusion


    You just learned more about how ChatGPT can be used by developers. We covered
    some of the basics of the Chat Playground, which is a web interface for developers
    to interact with the ChatGPT API.


    We talked about how to set the system, user, and assistant roles in the Chat Playground
    and how to adjust settings such as the temperature and maximum length of output.


    You learned about some of the parameters and terminology necessary to use the
    Chat Playground, such as the model, temperature, and tokens. Getting familiar
    with the parameters of the Chat Playground is essential to knowing how to use
    the REST API since the Playground is a subset of capabilities offered by the REST
    API.


    In the next chapter, we’ll see how to use ChatGPT as your “pair-programmer” and
    create a productivity app that gives us weather and arrival time to work.


    # 2. Using ChatGPT As Your Python Pair-Programmer


    I’m a big fan of some of the practices of XP (eXtreme Programming) and especially
    pair-programming. No matter what flavor of pair-programming that you prefer, it
    involves two engineers sitting down at the same screen and solving the same problem
    together. One of the biggest benefits that you get is a fresh set of eyes on a
    problem, and of course, you now have two engineers who have “touched” the codebase
    instead of one. Sometimes you can have one engineer write the code and the other
    write the tests and the comments. No matter how you slice it, it’s all good stuff.'
