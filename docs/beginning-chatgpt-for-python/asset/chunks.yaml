- fmt: '# Having a Little Fun and Trying Things Out with a Podcast


    Ok, so let’s run a test using the code that we have presented so far. *This American
    Life* is a weekly public radio program (and also a podcast) that’s hosted by Ira
    Glass and produced in collaboration with WBEZ Chicago. The icon for this podcast
    is shown in Figure [5-2](#615442_1_En_5_Chapter.xhtml#Fig2).


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** If You’re Looking for a Good Podcast with Compelling Stories, I
    Recommend Listening to “This American Life” (Image credit: WBEZ Chicago)


    Each episode weaves together a series of stories centered around a specific theme
    or topic. Some stories are investigative journalism, and others are simply interviews
    with ordinary people with captivating stories. Episode 811 is entitled, “The one
    place I can''t go." and the file is 56MB in MP3 format. Since we already know
    that 56MB is way too big to send to Whisper to get transcribed, we need the `audio_splitter.py`
    to break up the file for us.


    Listing [5-6](#615442_1_En_5_Chapter.xhtml#PC6) shows an excerpt from the full
    transcript of the episode.


    ```

    “...My younger cousin Camille is not really a dog person, but there is one dog
    she adored. Her name was Foxy, because she looked exactly like a fox, except she
    was black. She was the neighbor''s dog, but she and Camille seemed to have a real
    kinship, maybe because they both weren''t very far from the ground. Camille was
    around four or five years old back then, and she had a little lisp, so Foxy came
    out as Fozzie. I thought it was one of the cutest things I''d ever heard.

    The way Camille remembers Foxy, it''s almost like a movie. Her memories feel like
    endless summer, hazy and perfect, like a scene shot on crackly film. I just remembered
    like the feeling of being excited to go and see Foxy. I have an image in my head
    of like coming to the house, and I could see Foxy was like outside. I can see
    Foxy through the door that leads to the garden. There''s a story about Camille
    and Foxy that I think about fairly often. I''ve talked about it with my sister
    for years, but never with Camille. And it''s this. Once when they were playing..."

    ```


    **Listing 5-6** The Partial Transcript of Episode 811 of “This American Life”


    For brevity, we’re only showing an excerpt of the transcript. The full transcript
    itself is over 8000 words due to the fact that the episode is nearly one hour
    in length.


    ## Going Meta: Prompt Engineering GPT-4 to Write a Prompt for DALL·E


    Since the full text transcript of the podcast episode that we want to visualize
    is thousands of words, we’re going to use GPT-4 to automatically create the prompt
    needed for the DALL·E model. DALL·E is able to take a textual description in a
    prompt and create an image, but it’s best to keep the prompt as short as possible.
    Listing [5-7](#615442_1_En_5_Chapter.xhtml#PC7) is the prompt for GPT-4 to generate
    a prompt for DALL·E.


    ```

    System: You are a service that helps to visualize podcasts.

    User: Read the following transcript from a podcast. Describe for a visually impaired
    person the background and subject that best represents the overall theme of the
    episode. Start with any of the following phrases:

    - "A photo of"

    - "A painting of"

    - "A macro 35mm photo of"

    - "Digital art of "

    User: Support for This American Life comes from Squarespace...

    Model: gpt-4o

    Temperature: 1.47

    Maximum length: 150

    Top P: 0

    Frequency penalty: 0.33

    Presence penalty: 0

    ```


    **Listing 5-7** The Prompt for GPT-4 to Create a Prompt for DALL·E


    DALL·E needs to know the type of image to generate so that’s why we need to specify
    that the image should be a photo, painting, digital art, etc. We need to ensure
    that the resulting text generated by GPT-4 is short, so we want to have a maximum
    length of 150 tokens. Also, in order to prevent GPT-4 from repeating some phrases
    multiple times, we introduced a frequency penalty of 0.33.


    Listing [5-8](#615442_1_En_5_Chapter.xhtml#PC8) shows the results from GPT-4 after
    reading the transcript of Episode 811 of *This American Life*.


    ```

    Digital art of a young girl sitting in a garden with a black dog that looks like
    a fox. The girl is smiling and the dog is wagging its tail. The image has a hazy,
    dream-like quality, with crackly film effects to evoke nostalgia.

    ```


    **Listing 5-8** The Prompt for DALL·E Created by GPT-4


    ## Using `OpenAI.images.generate()` to Create Images


    In order to use the DALL·E model to dynamically create an image from a text prompt,
    you need to call the `OpenAI.images.generate()` method.


    ### Examining the Method Parameters


    Table [5-2](#615442_1_En_5_Chapter.xhtml#Tab2) describes the format of the parameter
    necessary for the request body for the `OpenAI.images.generate()` method. For
    obvious reasons, the `prompt` parameter is the only required parameter in order
    to successfully invoke the model.


    **Table 5-2** Request Body for the `OpenAI.images.generate()` method


    | Field | Type | Required? | Description |

    | --- | --- | --- | --- |

    | `prompt` | String | Required | This is where you describe the image that you
    want to be created. The maximum length is 1000 characters for `dall-e-2` and 4000
    characters for `dall-e-3`. |

    | `model` | String | Optional | The model name to generate the image. Compatible
    models include: `"dall-e-2"`, `"dall-e-3"`. |

    | `n` | Integer or null Default: 1 | Optional | This is the requested number of
    images that you want created. Must be between 1 and 10. Note: Due to the complexity
    required for `dall-e-3`, OpenAI may limit your request to a single image. |

    | `quality` | String Default: `"standard"` | Optional | This allows you to specify
    the quality of the image to be generated. This parameter is only valid for `dall-e-3`.
    Accepted values are: `"standard"`, `"hd"`. |

    | `size` | String or null Default: `"1024x1024"` | Optional | The size of the
    generated images. Image sizes available for `dall-e-2` are: `"256x256"`, `"512x512"`,
    `"1024x1024"`. Image sizes available for `dall-e-3` are: `"1024x1024"`, `"1792x1024"`
    (landscape), `"1024x1792"` (portrait). |

    | `style` | String Default: `"vivid"` | Optional | This allows you to specify
    how natural-looking the generated image should be. This parameter is only valid
    for `dall-e-3`. Accepted values are: `"natural"` (good for photos), `"vivid"`
    (good for artistic looks). |

    | `response_format` | String or null Default: `"url"` | Optional | This is the
    format of the generated image. Accepted values are: `"url"`, `"b64_json"`. |

    | `user` | String | Optional | This is a unique identifier representing your end-user,
    which can help OpenAI to monitor and detect abuse. |


    ### Handling the Response


    After successfully invoking the `OpenAI.images.generate()` method, the API will
    respond with an image JSON object. Table [5-3](#615442_1_En_5_Chapter.xhtml#Tab3)
    shows a breakdown of the image object, which only has one parameter.


    **Table 5-3** The Structure of the Response Object


    | Field | Type | Description |

    | --- | --- | --- |

    | `url` (or) `b64_json` | String | This is a url to your generated image if the
    `response_format` is `"url"` in the request. (or) This is a base64-encoded JSON
    image if the `response_format` is `"b64_json"` in the request. |'
  raw: '## Having a Little Fun and Trying Things Out with a Podcast


    Ok, so let’s run a test using the code that we have presented so far. *This American
    Life* is a weekly public radio program (and also a podcast) that’s hosted by Ira
    Glass and produced in collaboration with WBEZ Chicago. The icon for this podcast
    is shown in Figure [5-2](#615442_1_En_5_Chapter.xhtml#Fig2).


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    If You’re Looking for a Good Podcast with Compelling Stories, I Recommend Listening
    to “This American Life” (Image credit: WBEZ Chicago)


    Each episode weaves together a series of stories centered around a specific theme
    or topic. Some stories are investigative journalism, and others are simply interviews
    with ordinary people with captivating stories. Episode 811 is entitled, “The one
    place I can''t go." and the file is 56MB in MP3 format. Since we already know
    that 56MB is way too big to send to Whisper to get transcribed, we need the `audio_splitter.py`
    to break up the file for us.


    Listing [5-6](#615442_1_En_5_Chapter.xhtml#PC6) shows an excerpt from the full
    transcript of the episode.


    ```

    “...My younger cousin Camille is not really a dog person, but there is one dog
    she adored. Her name was Foxy, because she looked exactly like a fox, except she
    was black. She was the neighbor''s dog, but she and Camille seemed to have a real
    kinship, maybe because they both weren''t very far from the ground. Camille was
    around four or five years old back then, and she had a little lisp, so Foxy came
    out as Fozzie. I thought it was one of the cutest things I''d ever heard.

    The way Camille remembers Foxy, it''s almost like a movie. Her memories feel like
    endless summer, hazy and perfect, like a scene shot on crackly film. I just remembered
    like the feeling of being excited to go and see Foxy. I have an image in my head
    of like coming to the house, and I could see Foxy was like outside. I can see
    Foxy through the door that leads to the garden. There''s a story about Camille
    and Foxy that I think about fairly often. I''ve talked about it with my sister
    for years, but never with Camille. And it''s this. Once when they were playing..."

    Listing 5-6

    The Partial Transcript of Episode 811 of “This American Life”

    ```


    For brevity, we’re only showing an excerpt of the transcript. The full transcript
    itself is over 8000 words due to the fact that the episode is nearly one hour
    in length.


    ## Going Meta: Prompt Engineering GPT-4 to Write a Prompt for DALL·E


    Since the full text transcript of the podcast episode that we want to visualize
    is thousands of words, we’re going to use GPT-4 to automatically create the prompt
    needed for the DALL·E model. DALL·E is able to take a textual description in a
    prompt and create an image, but it’s best to keep the prompt as short as possible.
    Listing [5-7](#615442_1_En_5_Chapter.xhtml#PC7) is the prompt for GPT-4 to generate
    a prompt for DALL·E.


    ```

    System: You are a service that helps to visualize podcasts.

    User: Read the following transcript from a podcast. Describe for a visually impaired
    person the background and subject that best represents the overall theme of the
    episode. Start with any of the following phrases:

    - "A photo of"

    - "A painting of"

    - "A macro 35mm photo of"

    - "Digital art of "

    User: Support for This American Life comes from Squarespace...

    Model: gpt-4o

    Temperature: 1.47

    Maximum length: 150

    Top P: 0

    Frequency penalty: 0.33

    Presence penalty: 0

    Listing 5-7

    The Prompt for GPT-4 to Create a Prompt for DALL·E

    ```


    DALL·E needs to know the type of image to generate so that’s why we need to specify
    that the image should be a photo, painting, digital art, etc. We need to ensure
    that the resulting text generated by GPT-4 is short, so we want to have a maximum
    length of 150 tokens. Also, in order to prevent GPT-4 from repeating some phrases
    multiple times, we introduced a frequency penalty of 0.33.


    Listing [5-8](#615442_1_En_5_Chapter.xhtml#PC8) shows the results from GPT-4 after
    reading the transcript of Episode 811 of *This American Life*.


    ```

    Digital art of a young girl sitting in a garden with a black dog that looks like
    a fox. The girl is smiling and the dog is wagging its tail. The image has a hazy,
    dream-like quality, with crackly film effects to evoke nostalgia.

    Listing 5-8

    The Prompt for DALL·E Created by GPT-4

    ```


    ## Using `OpenAI.images.generate()` to Create Images


    In order to use the DALL·E model to dynamically create an image from a text prompt,
    you need to call the `OpenAI.images.generate()` method.


    ### Examining the Method Parameters


    Table [5-2](#615442_1_En_5_Chapter.xhtml#Tab2) describes the format of the parameter
    necessary for the request body for the `OpenAI.images.generate()` method. For
    obvious reasons, the prompt parameter is the only required parameter in order
    to successfully invoke the model.


    Table 5-2


    Request Body for the OpenAI.images.generate() method


    | Field | Type | Required? | Description |

    | --- | --- | --- | --- |

    | prompt | String | Required | This is where you describe the image that you want
    to be created.The maximum length is 1000 characters for dall-e-2 and 4000 characters
    for dall-e-3. |

    | model | String | Optional | The model name to generate the image.Compatible
    models include• “dall-e-2”• “dall-e-3” |

    | n | Integer or nullDefault: 1 | Optional | This is the requested number of images
    that you want created.Must be between 1 and 10.Note: Due to the complexity required
    for dall-e-3, OpenAI may limit your request to a single image. |

    | quality | StringDefault: “standard” | Optional | This allows you to specify
    the quality of the image to be generated. This parameter is only valid for dall-e-3.Accepted
    values are• “standard”• “hd” |

    | size | String or nullDefault: “1024x1024” | Optional | The size of the generated
    images.Image sizes available for dall-e-2 are• “256x256”• “512x512”• “1024x1024”Image
    sizes available for dall-e-3 are• “1024x1024”• “1792x1024” (landscape)• “1024x1792”
    (portrait) |

    | style | StringDefault: “vivid” | Optional | This allows you to specify how natural-looking
    the generated image should be.This parameter is only valid for dall-e-3.Accepted
    values are• “natural” (good for photos)• “vivid” (good for artistic looks) |

    | response_format | String or nullDefault: “url” | Optional | This is the format
    of the generated image.Accepted values are• “url”• “b64_json” |

    | user | String | Optional | This is a unique identifier representing your end-user,
    which can help OpenAI to monitor and detect abuse. |


    ### Handling the Response


    After successfully invoking the `OpenAI.images.generate()` method, the API will
    respond with an image JSON object. Table [5-3](#615442_1_En_5_Chapter.xhtml#Tab3)
    shows a breakdown of the image object, which only has one parameter.


    Table 5-3


    The Structure of the Response Object


    | Field | Type | Description |

    | --- | --- | --- |

    | url (or) b64_json | String | This is a url to your generated image if the response_format
    is “url” in the request.(or)This is a base64-encoded JSON image if the response_format
    is “b64_json” in the request. |'
