- fmt: '### Prompt #4: “Give Me Suggestions on Next Steps”


    In addition to making a summary that’s easier to understand, `ChatGPT` can explain
    in different styles and “tones.” We''re going to increase the `Top P` to `0.75`
    because we want `ChatGPT` to think of more possibilities than what is the default.
    We are also going to increase the `presence penalty` to `0.5` because we want
    to encourage a versatile response.


    ```

    System: You are a helpful assistant

    User:  Fatima [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...

    User: I''m a QA engineer at the company. Give me suggestions on next steps.

    Model: gpt-4o

    Temperature: 1

    Maximum length: 1200

    Top P: 0.75

    Frequency penalty: 0

    Presence penalty: 0.5

    Listing 4-8

    PROMPT. Asking to ChatGPT for Advice on the Best Next Steps

    ```


    ```

    As a QA engineer, here are some suggestions for next steps:

    1\. Test the patch: Once the patch has been deployed to the app store, thoroughly
    test it on various devices and operating systems to ensure that the issue has
    been resolved and there are no new bugs or regressions introduced.

    2\. Conduct regression testing: In addition to testing the specific issue, perform
    a comprehensive regression test to ensure that the fix does not have any unintended
    side effects on other functionalities of the app.

    3\. Communicate the fix to the client: Keep the client updated on the progress
    and let them know that the fix is available in the latest app update. Provide
    them with clear instructions on how to update their app and encourage them to
    test it on their end as well.

    4\. Monitor user feedback: Keep an eye on user feedback after the fix has been
    deployed. Encourage users to report any issues they encounter, and be proactive
    in addressing them promptly.

    5\. Document the issue and resolution: Create a detailed report documenting the
    issue, the steps taken to reproduce and resolve it, and any other relevant information.
    This will serve as a reference for future troubleshooting and help improve the
    development process.

    6\. Conduct a post-mortem analysis: After the issue has been resolved and the
    fix has been deployed, schedule a post-mortem meeting with the team to discuss
    the root cause, lessons learned, and any process improvements that can be implemented
    to prevent similar issues in the future.

    7\. Continuous improvement: Use this incident as an opportunity to identify areas
    of improvement in the development and testing processes. Evaluate if there are
    any changes that can be made to prevent similar issues from occurring in the future.

    Remember, open communication, collaboration, and continuous learning are key to
    ensuring the highest quality of your app and maintaining a strong relationship
    with your clients.

    Listing 4-9

    RESPONSE. Suggestions from ChatGPT on Possible Next Steps

    ```


    Now, of course, `ChatGPT` (like every other form of artificial intelligence on
    the planet) is not entirely perfect. For instance, recommendation number three
    is a valid item to do, except for the fact that it''s not usually the responsibility
    of a QA person to communicate anything directly to the client or customer. That
    communication can be done either through tech support or with a product manager
    who has those communication channels (especially if they are a significant customer).
    So, the suggestion is fine, but it''s not appropriate for a person with that role
    within a company.


    ### Let’s Talk About Real Prompt Engineering


    If you Google the term "prompt engineering," you''ll find a ton of examples, blogs,
    and even full websites with subscription plans that will try to convince you that
    the perfect prompts can be created by simply only using text. As you have seen
    from the examples above, prompt engineering cannot be accomplished solely by merely
    crafting textual inputs.


    In reality, the process is quite similar to cooking a sophisticated meal. Imagine
    trying to cook, for example, beef bourguignon using only salt as the seasoning
    and neglecting all other ingredients and spices! Honestly, the result would pale
    in comparison to the actual dish.


    Similarly, try assembling an entire orchestra but only use one instrument and
    one musician. That’s an embarrassing “one-man band.” Therefore, simply adjusting
    the text to the prompt isn''t enough in order to truly perform prompt engineering.
    The parameters such as the model''s `temperature`, which controls randomness;
    the `Top P`, impacting token probability; the specific model used; the number
    of tokens; and the other parameters all play highly pivotal roles in getting a
    great response.


    This book is not about prompt engineering, since (as you can see from the explanation
    above) it truly involves several factors that don’t have anything to do with Python.
    However, you are highly encouraged to experiment with *all* the parameters to
    the models provided by OpenAI to find what works best for your use case.


    ## Registering a Slack Bot App


    Now that we know the various ways for `ChatGPT` to summarize a large body of text
    for us, let''s see what''s necessary in order to create a simple bot in Python
    that will programmatically grab all the messages from a channel within a Slack
    instance.


    **Note**


    In order to accomplish these steps, you will need to have administrative access
    to a Slack workspace. Most developers will **not** have these levels of permissions;
    therefore, in order to fully experiment, I recommend that you create your own
    personal Slack workspace for testing purposes. This way, you will have all the
    rights and privileges to install your Slack bot.


    But, one step at a time. First, we’re going to make our Slack bot app, so head
    over the Slack API website:


    [`https://api.slack.com/`](https://api.slack.com/)


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** In Order to Create a Slack Bot, Go To the Slack API Website


    Of course, you’ll need to have a Slack account in order for this to work, so if
    you don’t have one, then you need to create one first.


    After you have logged in, go to the top-right of the page and navigate to “Your
    apps > Create your first app,” as shown in Figure [4-1](#615442_1_En_4_Chapter.xhtml#Fig1)
    above. In Slack terminology, a “bot” is an “app,” and bots are not allowed to
    run on a Slack instance unless they have been registered with Slack first.


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig2_HTML.jpg)


    **Figure 4-2** Creating a New Bot App for Slack


    As shown in Figure [4-2](#615442_1_En_4_Chapter.xhtml#Fig2), above, you’ll be
    taken to the **Your Apps** page where you can manage your Slack apps. Immediately,
    you’ll see a pop-up to **Create an App** button in the middle of the screen.


    Select the option to create your app **from scratch**. This is because we want
    to be able to manipulate all of the details of the application ourselves without
    overcomplicating things with a bunch of default settings.


    Afterwards, you’ll be prompted to specify a name for your bot and to select the
    workspace that you want your bot to have access to, as shown in Figure [4-3](#615442_1_En_4_Chapter.xhtml#Fig3)
    below.


    Click the **Create App** button to proceed.


    ![](images/615442_1_En_4_Chapter/615442_1_En_4_Fig3_HTML.jpg)


    **Figure 4-3** Creating a New Bot App for Slack'
