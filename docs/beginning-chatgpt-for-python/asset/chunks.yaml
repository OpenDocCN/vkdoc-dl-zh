    Duolingo\"）！当然，如果你注意到了，它还能区分 \"wood\" 和 \"would\"。\n\n## Whisper 模型的功能与限制\n\n\
    Whisper 模型能够将以下语言的口语音频转换为文本：\n\n* 南非荷兰语\n* 阿拉伯语\n* 亚美尼亚语\n* 阿塞拜疆语\n* 白俄罗斯语\n*\
    \ 波斯尼亚语\n* 保加利亚语\n* 加泰罗尼亚语\n* 中文\n* 克罗地亚语\n* 捷克语\n* 丹麦语\n* 荷兰语\n* **英语（当然！）**\n\
