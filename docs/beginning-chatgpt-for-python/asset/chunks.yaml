  raw: '## Creating a Utility App to Split Audio Files: `audio_splitter.py`


    So, we’re almost at the point where we are able to programmatically invoke the
    Whisper model using the `OpenAI.audio.transcriptions.create()` method. However,
    the Whisper model has a limitation of 25MB per file.


    Now, this is not a problem if you’re listening to (for example) the *StarDate*
    podcast from the University of Texas at Austin. This podcast gives you a great
    glimpse of what to look for in the nighttime sky in about two minutes of audio.
    However, that’s not the case for other audio programs which tend to last for up
    to an hour (or even more). In cases like that, you’re going to definitely exceed
    the 25MB file limitation.


    Therefore, let''s pair-program with ChatGPT and use our human intelligence to
    create our own utility that will take a single audio file and split it into multiple
    smaller files.


    Note


    In this section, I''m presenting one of many possibilities available on how to
    segment a large audio file into smaller pieces. For instance, you can use popular
    audio editing apps (such as the Open Source tool, Audacity, or the licensed tool,
    Adobe Audition) to manually cut up a large file into smaller files.


    FFmpeg is one of the most reliable ways to programmatically manipulate audio files,
    and pydub is an open source library recommended in OpenAI’s documentation on using
    Whisper with Python.


    Listing [5-2](#615442_1_En_5_Chapter.xhtml#PC2) is the prompt that is sent to
    ChatGPT in order to get a basic app that splits audio files.


    ```

    System: You are a Python developer

    User: Write an application that takes as input a single MP3 file and splits the
    file into contiguous segments no longer than 10 minutes using the pydub library
    and ffmpeg

    Listing 5-2

    PROMPT. Using ChatGPT to Create the audio_splitter.py App

    ```


    After a little back and forth, we were able to create (as shown in Listing [5-3](#615442_1_En_5_Chapter.xhtml#PC3))
    the `audio_splitter.py` application that includes our edits to what was generated
    by ChatGPT.


    ```

    from pydub import AudioSegment

    import os

    # Path to the input audio file

    input_audio_path = "audio-example.mp3"

    # Load the audio file

    audio = AudioSegment.from_mp3(input_audio_path)

    # Define segment length (in milliseconds) - 10 minutes

    segment_length_ms = 10 * 60 * 1000  # 10 minutes in milliseconds

    # Split the audio into segments of ten minutes each

    segments = [audio[i:i+segment_length_ms] for i in range(0, len(audio), segment_length_ms)]

    # Output directory for saving segments

    output_directory = "/PATH/TO/OUTPUT"

    # Ensure output directory exists, create it if necessary

    os.makedirs(output_directory, exist_ok=True)

    # Process each segment (for example, you can save them to separate files)

    for i, segment in enumerate(segments):

    segment.export(os.path.join(output_directory, f"segment_{i}.mp3"), format="mp3")

    Listing 5-3

    RESPONSE. audio_splitter.py

    ```


    Our goal is simple: split an MP3 file into contiguous segments no longer than
    ten minutes using the Python language. In this process, we follow these steps:


    *   Specify the input file path, output directory, and the desired segment duration
    in milliseconds (ten minutes).


    *   Load the MP3 file using the pydub library''s AudioSegment class, which provides
    functionalities for audio processing.


    *   Iterate through the input MP3 file, segmenting it into smaller parts of the
    specified duration (ten minutes or less) using slicing.


    *   Save each segment as a separate MP3 file in the specified output directory.


    In order for this to work, you need to have the pydub library **and** FFmpeg properly
    installed and configured in your project. FFmpeg is an extremely versatile media
    converter which not only handles MP3 audio files, but various other audio file
    formats (including m4a, ogg, and wav). It is able to convert video formats as
    well as static images like png, jpeg, and gif.


    After running the script, you’ll have a folder full of segmented audio files that
    are ten minutes long or less. Using the `audio_splitter.py` utility, you have
    a simple to use Python script to modify the settings that work best for you. For
    our purposes, the goal here is to have audio files that are <25MB, so if you’re
    transcribing eight-hour legal proceedings (for example) in WAV format, you may
    need to adjust the duration to be shorter, like six minutes in length.


    When using the audio splitter, the best practice is to have the output folder
    to be a different folder from the input, and you’ll see why when we start to invoke
    the OpenAI `audio.transcriptions.create()` method using the Whisper model.


    ## Creating the Audio Transcriber: `whisper_transcriber.py`


    Now, let’s build our next Python app, `whisper_transcriber.py`. Again, we’re going
    to pair-program with ChatGPT to get a basis to work with. Listing [5-4](#615442_1_En_5_Chapter.xhtml#PC4)
    is the prompt to put in the Chat Playground to get things started.


    ```

