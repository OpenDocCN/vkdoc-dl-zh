  trans: "\n# 介绍 OpenAI 的 Whisper 模型\n\n现在让我们介绍另一个新术语：**自动语音识别**（ASR）。普通消费者对这种技术非常熟悉，因为它已集成到手机（例如\
    \ iPhone 的 Siri）和智能音箱（例如各类 Alexa 设备）中。其核心功能是将口语转换为文本。\n\nWhisper 是 OpenAI 的语音识别模型，其准确度惊人地高。下方列表是热门播客《多邻国西班牙语》某一集的转录文本，该播客通过将英语和西班牙语交织成叙事故事，让英语听众能够轻松理解西班牙语。在清单\
    \ 5-1 中，你可以看到使用 Whisper 模型生成的转录文本。\n\n```\n……我是玛蒂娜·卡斯特罗。每期节目，我们都会为您带来引人入胜的真实故事，帮助您提升西班牙语听力，并获得看待世界的新视角。讲述者将使用中级西班牙语，而我会用英语补充背景信息。如果您错过了什么，随时可以回退重听。我们还在\
    \ podcast.duolingo.com 提供完整文本。\n琳达从小就对她的祖母埃尔琳达着迷。埃尔琳达是一位治疗师或 curandera（巫医），为人们提供心理、情感、身体或精神疾病的疗法。\n\
    在危地马拉，这是一种通过同一家族世代口耳相传的实践。Mal de ojo（邪恶之眼）被许多危地马拉人视为一种疾病，他们认为人类有能力将负能量传递给他人。当邻居们怀疑婴儿有能量失衡时，就会把宝宝带到琳达的祖母那里。Su\
    \ madre lo llevaba a nuestra casa para curarlo……\n清单 5-1\nWhisper 模型执行语音识别，将音频转换为文本\n\
    ```\n\n如果你曾经使用过语音识别系统（即使是像 Siri 和 Alexa 这样复杂的技术），你就会知道它存在问题，例如：\n\n* **语音识别在标点符号方面存在问题**\n\
