    \ `SyncPage`，它本质上是一个字典，其结构如表 2-1 所示。\n\n### 处理响应\n\n**表 2-1** Model 对象的结构\n\n\
    | 字段 | 类型 | 描述 |\n| --- | --- | --- |\n| `object` | 字符串 | 始终返回字面量 `\"list\"`。\
    \ |\n| `data` | 字典 | OpenAI 提供的 AI 模型字典。 |\n| `↳ id` | 字符串 | AI 模型的唯一 ID，本质上是模型的完整名称。\
    \ |\n| `↳ object` | 字符串 | 始终返回字面量 `\"model\"`。 |\n| `↳ created` | 整数 | 模型的创建日期。\
    \ |\n| `↳ owned_by` | 字符串 | 拥有该模型的组织名称。 |\n\n> **注意**  \n> 由于对象可以包含字典（在表格中可能难以表示），我们使用以下符号\
    \ `↳` 来表示字典的元素。从表 2-1 中可以看出，`id`、`object`、`created` 和 `owned_by` 都是响应中 `data`\
    \ 字典的元素。\n\n现在我们已经了解了 `Model` 对象的详细信息，接下来讨论如何测试我们在第一章中获取的 API 密钥。实际上有几种方法可以做到这一点。\n\
    \n## 使用你的 API 密钥通过 OpenAI API 获取可用模型列表\n\n将 API 密钥设置在本地 `.env` 文件中后，我们将使用以下代码获取\
    \ OpenAI API 中可用的模型列表，然后将其打印到终端。\n\n```python\n\"\"\"用于与 OpenAI API 交互以列出可用模型的模块\"\
    \"\"\nimport os\nfrom dotenv import load_dotenv\nfrom openai import OpenAI\n#\
    \ 从 .env 加载环境变量\nload_dotenv()\n# 使用环境变量中的 API 密钥\napi_key = os.getenv(\"OPENAI_API_KEY\"\
    )\nclient = OpenAI()\nmodels_list = client.models.list()\nprint(models_list)\n\
    清单 2-3\n通过调用 models.list() 方法并使用 model_lister.py 获取 OpenAI API 可用模型列表\n```\n\n\
    运行清单 2-3 中的代码后，清单 2-4 是你应该会看到的截断响应。\n\n```\nSyncPageModel, Model(id='dall-e-2',\
    \ created=1698798177, object='model', owned_by='system'), Model(id='gpt-3.5-turbo-0125',\
    \ created=1706048358, object='model', owned_by='system'), Model(id='text-embedding-ada-002',\
    \ created=1671217299, object='model', owned_by='openai-internal'), Model(id='tts-1-hd-1106',\
    \ created=1699053533, object='model', owned_by='system'), Model(id='tts-1-hd',\
    \ created=1699046015, object='model', owned_by='system'). . .\n清单 2-4\n运行我们的 model_lister.py\
    \ 应用程序后得到的难看响应\n```\n\n## 获取更美观的模型列表\n\n清单 2-4 只是一个部分列表，因为可供开发者使用的模型数量非常庞大！不过，好消息是，完整的响应以表格形式提供在附录\
    \ 1 中。\n\n所以，首先，这很棒。我们知道我们的 API 密钥有效！但是，你可能没有注意到，我们得到的响应相当难看。为简洁起见，清单 2-4 已被缩短，但很明显，当我们只想知道\
    \ OpenAI API 中的所有模型时，没有人愿意阅读那一大段文本。\n\n如果我们能在运行代码后得到更清晰的响应，那就太好了。那么，让我们添加一些代码来格式化响应。\n\
    \n```python\n\"\"\"用于与 OpenAI API 交互以列出可用模型的模块\"\"\"\nimport os\nfrom dotenv import\
    \ load_dotenv\nfrom openai import OpenAI\n# 从 .env 加载环境变量\nload_dotenv()\n# 使用环境变量中的\
    \ API 密钥\napi_key = os.getenv(\"OPENAI_API_KEY\")\nclient = OpenAI()\nmodels_list\
    \ = client.models.list()\n# 遍历列表并打印模型信息\nfor model in models_list.data:\nprint(f\"\
    模型 ID: {model.id}\")\nprint(f\"创建时间: {model.created}\")\nprint(f\"对象: {model.object}\"\
    )\nprint(f\"拥有者: {model.owned_by}\")\nprint(\"\\n============================\\\
    n\")  # 分隔符，提高可读性\n清单 2-5\n使用 model_lister_pretty.py 清理从 OpenAI API 获得的响应\n```\n\
    \n清单 2-6 是运行 `model_lister_pretty.py` 后的响应。\n\n```\n模型 ID: text-embedding-ada-002\n\
    创建时间: 1671217299\n对象: model\n拥有者: openai-internal\n==================================================\n\
    模型 ID: gpt-3.5-turbo-instruct\n创建时间: 1692901427\n对象: model\n拥有者: system\n==================================================\n\
    模型 ID: dall-e-3\n创建时间: 1698785189\n对象: model\n拥有者: system\n清单 2-6\n使用 model_lister_pretty.py\
    \ 从 OpenAI 获得的清理后响应\n```\n"
- fmt: '# Wait, How Many Tokens Are in My Prompt?


    At a certain point, you’re going to start thinking about the prompts that you
    plan to send to ChatGPT and give considerable thought to the token limitations
    (and the costs) regarding the model that you want to use. In case you forgot,
    be sure to refer back to Table [1-1](#615442_1_En_1_Chapter.xhtml#Tab1) for a
    list of models and the price of the tokens. Additionally, OpenAI created a simple-to-use
    website that allows you to see how many tokens are in your prompt, as shown in
    the figure below.


    *ChatGPT Token Counter*


    [https://platform.openai.com/tokenizer](https://platform.openai.com/tokenizer)


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** The ChatGPT Tokenizer Can Give You a Quick Count of the Tokens
    in Your Prompt


    # Using ChatGPT As a Pair-Programmer to Build a Weather Application


    Now that we’ve made sure that our API key works, it’s time to start writing our
    first project with ChatGPT. This is the exciting part! We’re going to use ChatGPT
    to help us create an application in Python that will give us the weather and the
    time it’ll take us to get to work from the location of our home to work. Sounds
    impressive, doesn’t it?


    ## Setting Up the Prompt


    Let’s ask ChatGPT how we should get started. Now is a good time to practice prompt
    engineering. We’re going to explain to ChatGPT what we want and see what it comes
    up with. This is the prompt we used.


    ```

    How can I make a simple application in Python that allows me to type in my city
    and then use AccuWeather''s API to give me the weather?

    Listing 2-7

    Prompting ChatGPT to Help Us Make a Weather App For Productivity

    ```


    This is the code we got in the response.


    ```

    To create a simple application in Python that allows you to type in your city
    and retrieve the weather using AccuWeather''s API, you can follow these steps:

    - Sign up for an AccuWeather API key on their developer portal: https://developer.accuweather.com/.

    - Install the requests library if you haven''t already. You can install it via
    pip:

    pip install requests

    - Write a Python script to interact with the AccuWeather API. Here''s a basic
    example:

    import requests

    def get_weather(accuweather_api_key, city):

    base_url = "http://dataservice.accuweather.com/locations/v1/cities/search"

    params = {

    "apikey": accuweather_api_key,

    "q": city,

    }

    response = requests.get(base_url, params=params)

    location_data = response.json()

    if location_data:

    location_key = location_data[0]["Key"]

    weather_url = f"http://dataservice.accuweather.com/currentconditions/v1/{location_key}"

    params = {

    "apikey": accuweather_api_key,

    }

    response = requests.get(weather_url, params=params)

    weather_data = response.json()

    if weather_data:

    weather_text = weather_data[0]["WeatherText"]

    temperature = weather_data[0]["Temperature"]["Metric"]["Value"]

    print(f"The current weather in {city} is {weather_text} with a temperature of
    {temperature}°C.")

    else:

    print("Weather data not found.")

    else:

    print("Location not found.")

    if __name__ == "__main__":

    accuweather_api_key = "api-key"

    city = input("Enter your city: ")

    get_weather(accuweather_api_key, city)

    Listing 2-8

    Getting a Response Back from ChatGPT to Build Our Weather App, accuweather_forecaster.py

    ```


    ## Creating `accuweather_forecaster.py` with the AccuWeather API


    So, let’s follow the steps we got from ChatGPT. First, we need to set up an account
    with AccuWeather. Go to [https://developer.accuweather.com/](https://developer.accuweather.com/)
    and hit register to sign up.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig2_HTML.jpg)


    **Figure 2-2** AccuWeather Home Page for Developers


    After signing in, you’ll notice that the menu changes, and you can now navigate
    over to **My Apps**.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** Navigating to the My Apps Tab on the AccuWeather Developer Portal


    Once you’re on the **My Apps** tab, you’re going to want to **Add a new App**
    in order to get an API key to use in our application.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig4_HTML.jpg)


    **Figure 2-4** Creating a New App with AccuWeather


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig5_HTML.jpg)


    **Figure 2-5** Adding Specifications for Our AccuWeather App


    As you set things up, you’ll need to name your app and answer benign questions
    like where the API will be used and what you plan to be creating with the API.
    As you can see in Figure [2-5](#615442_1_En_2_Chapter.xhtml#Fig5), we’ve called
    our AccuWeather app “Weather Tracker”; however, this is not the name of our actual
    Python application, `accuweather_forecaster.py`.


    The names don’t have to match. You can name your app in AccuWeather whatever you
    like. The most important configuration to enable here is where you’re being asked
    to specify the product you’re intending to use. **Be sure to enable the Core Weather
    Limited Trial.**


    The difference between choosing Core Weather and MinuteCast is an application
    that works and an application that doesn’t and takes a long time to figure out
    why it doesn’t (can you tell this was a memorable experience?).


    It may take some time for your application to be approved, but usually, this is
    a very quick process. When it’s done, you’ll see your new application on the **My
    Apps** page, which will include your API key! Mission accomplished.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig6_HTML.jpg)


    **Figure 2-6** Seeing Your Newly Created App on the AccuWeather Developer Portal'
