- fmt: '# 6. Creating an Automated Community Manager Bot with Discord and Python


    When you’re launching an app or a service, it’s important to build and maintain
    your own community. Below are the telltale signs of a healthy user community:


    - Members engage in meaningful discussions, sharing insights, feedback, and support.

    - Disagreements or debates occur, but they are approached constructively without
    resorting to personal attacks or derogatory language.

    - There''s an atmosphere of respect, where members listen to each other and acknowledge
    differing opinions.

    - A mix of old and new members actively participate, ensuring the community remains
    vibrant and doesn''t stagnate.

    - Users contribute diverse content, from answering questions to sharing resources,
    which enriches the community''s knowledge base.

    - There''s a balance between giving and taking; members who seek help or information
    also offer it to others.

    - New members frequently join, often referred by existing members, indicating
    that the community is seen positively and worth recommending.

    - Users often become advocates for the community or platform, promoting it outside
    of the direct community space, such as on social media or other forums.

    - The community helps to shape the app or service by providing new ideas for features
    and functionality.


    No matter what type of app or service that I create, I would love for my user
    community to exemplify the items listed above!


    ## Choosing Discord as Your Community Platform


    Over the past few years, Discord has surged in popularity as a useful tool for
    community management for people who are passionate about their communities. This
    is partially due to its cross-platform compatibility, allowing members to stay
    connected whether they''re on a desktop, mobile device, or web browser. However,
    one of its standout features is the invitation-based community system, which helps
    community managers to control growth and prevents spam. This model not only ensures
    a tailored experience for members but also enhances security, since community
    managers have the discretion to grant or deny access.


    Discord not only supports text messaging but also supports voice chats and streaming
    video. Very similar to Slack, Discord allows community managers to separate content
    into channels to organize discussions, streamline information flow, and help users
    see the content that they’re interested in.


    ## Creating a More Advanced Bot Than Our Slack Bot


    Now, If you successfully went through the steps in Chapter [4](#615442_1_En_4_Chapter.xhtml)
    where we worked with a Slack bot, then the steps in this chapter will feel familiar
    to you. In Chapter [4](#615442_1_En_4_Chapter.xhtml), we created a Slack bot to
    read a single channel during a time period and get a summary of the content discussed.
    The Slack bot was not a community manager but was more like a helpful assistant.


    For the remainder of this book, we’re going to perform all the steps necessary
    to make powerful bots for Discord that will use AI to help actually manage the
    community.


    ## Creating a More Advanced Bot Than Any Typical Discord Bot


    If you''ve ever had any experience using a Discord bot, then you’re probably aware
    that the most common way in order to interact with them is with what''s called
    a "`/command`." This enables typical bots (read: nonintelligent bots) to essentially
    work only when they have received a very specific operation or command. If the
    "`/command`" is not provided, then the bot will be silent and not do anything.
    Essentially, it exemplifies the phrase "speak only when you are spoken to."


    However, we are creating a Discord bot that will be artificially intelligent,
    and therefore, it will be much more advanced than any typical Discord bot. We’re
    going to create bots that will be able to read and see all messages in the Discord
    server and be intelligent enough to respond correctly.


    ### Understanding the Roles for the Bots


    So, let’s explore a scenario in order to make things real. We’re creating a public
    Discord server to interact with the users of a mobile banking app. Our end goal
    is to have bots written in Python to handle the following scenarios:


    - Q&A: Monitor a specific channel and automatically answer questions from users
    about how to use the banking app. For this to work, the bot will need to be trained
    on how the app works.

    - No solicitations: For any business community, it’s important that the participants
    of the community are not being targeted by unscrupulous individuals. For example,
    if you’re creating a banking app, do you want your customers contacted by anyone
    whose username is "`B4nk Admin`"?

    - No harmful content: For any community, it’s important for the members to be
    protected from harmful content such as hate language.


    ## Our Example Bank: Crook’s Bank


    For the purposes of this example, I decided upon a fictional name of a fictional
    bank that would have an extremely low likelihood of coinciding with the name of
    a real bank. Therefore, for this example, “Crook’s Bank” is launching a new mobile
    app for customers of their bank. They want to have a channel that will be monitored
    by a bot to answer questions from users of the app, and they also want to ensure
    that no one is soliciting users of their app or posting hurtful or harmful content
    in their Discord servers. Figure [6-1](#615442_1_En_6_Chapter.xhtml#Fig1) shows
    a fun illustration of Crook’s Bank.


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig1_HTML.jpg)


    Figure 6-1: This Fake App from a Fake Bank Has Real Problems


    ## First Things First: Create Your Own Discord Server


    Before we can make an AI Discord bot, we’re obviously going to need a Discord
    server already in place for the bot to interact with. Use either the Discord App
    or go to the Discord website (log in first of course), and start the process to
    Add/Create a new server.


    After you have started the process, select the option labeled “Create My Own”
    as shown in Figure [6-2](#615442_1_En_6_Chapter.xhtml#Fig2).


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig2_HTML.jpg)


    Figure 6-2: Creating Your Own Discord Server


    Next, you’ll be prompted to specify additional information about your server.
    Continue to proceed through the creation process until you are prompted to provide
    a name and icon for your server, as shown in Figure [6-3](#615442_1_En_6_Chapter.xhtml#Fig3).


    Specify the name of your server and provide an optional server icon (if you have
    one).


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig3_HTML.jpg)


    Figure 6-3: Providing a Name for Your Own Discord Server


    ## Create the Q&A Channel


    By default, every Discord server has a “general” channel, but we want a dedicated
    channel especially for questions and answers. Depending upon how you created your
    server, Figure [6-4](#615442_1_En_6_Chapter.xhtml#Fig4) will be presented to you
    to create your new channel.


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig4_HTML.jpg)


    Figure 6-4: Creating a Channel Using the Web Interface'
