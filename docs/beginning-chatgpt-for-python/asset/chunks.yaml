    \ 类。这体现在代码清单 7-2 中。\n\n```\n\"\"\"\ntech_support_bot.py\n一个与 ChatGPT 集成的 Discord\
    \ 机器人，用于在指定频道中自动回复。\n此脚本使用 discord.Client() 类初始化一个 Discord 机器人，并监听诸如消息发送等事件。\n\
    当在指定频道收到消息时，机器人会调用 ChatGPT 根据消息内容生成回复，并将回复发送回同一频道。\n要求：\n- discord (https://pypi.org/project/discord.py/)\n\
    - chatgpt_client (假定为提供与 ChatGPT 交互的自定义模块)\n用法：\n1. 将 DISCORD_TOKEN 变量替换为您从 Discord\
    \ 开发者门户获取的机器人令牌。\n2. 调整 CHANNEL_TO_WATCH 变量以指定机器人应监控和交互的频道名称。\n3. 确保 chatgpt_client\
    \ 模块已正确实现且可访问。\n注意：此脚本假定存在一个 chatgpt_client 模块用于与 ChatGPT API 交互。\n\"\"\"\nimport\
    \ discord\nfrom chatgpt_client_for_qa_and_moderation import ChatGPTClient\n# 用于身份验证的机器人令牌\n\
    DISCORD_TOKEN = ''\n# 机器人应监控和交互的频道名称\nCHANNEL_TO_WATCH = 'q-and-a'\n# 初始化 Discord\
    \ 客户端\ndiscord_client = discord.Client()\n# 为 ChatGPT 创建系统消息\nsystem_message_to_chatgpt\
    \ = \"You are a virtual assistant that provides support for the Crooks Bank banking\
    \ app.\"\nwith open('FAQ.txt', 'r', encoding='utf-8') as file:\n    # 将文件的全部内容作为一个字符串读入变量\n\
    \    file_contents = file.read()\n# 初始化 ChatGPT 客户端\nchatgpt_client_for_qa_and_moderation\
    \ = ChatGPTClient(system_message_to_chatgpt, file_contents)\n# 机器人就绪时的事件处理程序\n\
    @discord_client.event\nasync def on_ready():\n    \"\"\"\n    当机器人成功登录并准备好接收事件时触发的事件处理程序。\n\
    \    \"\"\"\n    print('已登录为', discord_client.user)\n    print('------')\n# 收到消息时的事件处理程序\n\
    @discord_client.event\nasync def on_message(message):\n    \"\"\"\n    收到消息时触发的事件处理程序。\n\
    \    参数：\n    message (discord.Message)：机器人收到的消息。\n    返回：\n    None\n    \"\"\
    \"\n    # 忽略机器人自己发送的消息，以防止自我回复\n    if message.author == discord_client.user:\n\
    \        return\n    # 忽略不在指定“tech-support”频道中的消息\n    if isinstance(message.channel,\
    \ discord.TextChannel) and \\\n            message.channel.name != CHANNEL_TO_WATCH:\n\
    \        return\n    async with message.channel.typing():\n        # 调用 ChatGPT\
    \ 根据收到的消息生成回复\n        response_from_chatgpt = chatgpt_client_for_qa_and_moderation.send_message_from_discord(message.content)\n\
    \        # 构建一条提及消息作者并附加 ChatGPT 回复的回复\n        reply = f'{message.author.mention}\
    \ {response_from_chatgpt}'\n        # 将回复发送到收到原始消息的同一频道\n        await message.channel.send(reply)\n\
    # 使用提供的令牌运行机器人\ndiscord_client.run(DISCORD_TOKEN)\n代码清单 7-2\ntech_support_smart_bot.py\n\
    ```\n\n## 与之前版本技术支持机器人相比的重要变化\n\n让我们简要分析一下 `tech_support_smart_bot.py` 并讨论所做的更改。代码片段清单\
    \ 7-3 包含了完整清单的一部分。\n\n```\n# 为 ChatGPT 创建系统消息\nsystem_message_to_chatgpt = \"\
    You are a Q and A bot for a discord group dedicated to the banking app, Crook's\
    \ Bank\"\nwith open('FAQ.txt', 'r', encoding='utf-8') as file:\n    # 将文件的全部内容作为一个字符串读入变量\n\
