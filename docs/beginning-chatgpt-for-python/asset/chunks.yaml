- fmt: '### Creating a Project with Google Maps Platform API


    Most people already have a Gmail account, but on the off chance you don’t, be
    sure to create one before proceeding.


    Google has a mountain of APIs for various applications, so we’re going to need
    to go directly to the API for Google Maps, in specific, at [`https://developers.google.com/maps/documentation`](https://developers.google.com/maps/documentation).


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig7_HTML.jpg)


    Figure 2-7 The Google Maps Platform Home Page


    On the Google Maps Platform page, click **Getting Started** to set up your account
    for using the APIs. After following the steps Google presents you with, you’ll
    be taken to the page on Figure 2-8, where you can see the different APIs available
    with the Google Maps Platform. But what’ll probably catch your attention first
    is the fact that you still have to **Finish Account Setup**.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig8_HTML.jpg)


    Figure 2-8 Finishing Your Google Maps Platform Account Setup


    Finishing your account setup will compose of entering credit card information
    so you can start the free trial that will allow you $200 worth of credit, which
    is more than enough for the purposes of our testing.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig9_HTML.jpg)


    Figure 2-9 Navigating to the APIs & Services Tab on the Google Maps Platform


    After properly setting up your account, you’ll be greeted by a welcome page. On
    the left, you’ll find a menu icon you can click on to reveal a list of services
    you have access to. You want to navigate to **Apps & Services** and then click
    **Library**.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig10_HTML.jpg)


    Figure 2-10 The API Library Page


    You’re going to want to click on **Maps JavaScript API** and then **Enable** it.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig11_HTML.jpg)


    Figure 2-11 Enabling the JavaScript API


    After enabling the JavaScript API, go back twice and open the menu again, and
    then click on the **Google Maps Platform** to see the dashboard for Google Maps.


    From here, we’re going to be looking at another side menu that looks similar to
    the one from before, but here we’re going to click on **Apps & Services** again
    to see a different page this time. From here, you can click on **Routes** to enable
    it.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig12_HTML.jpg)


    Figure 2-12 Enabling the Routes API


    Once you’ve enabled the API we need, navigate to the **Keys & Credentials** tab
    and **Create a new API key**.


    ![](images/615442_1_En_2_Chapter/615442_1_En_2_Fig13_HTML.jpg)


    Figure 2-13 The Keys and Credentials Page on the Google Maps Platform


    Now that we have our Google Maps API key, we can make use of our pair programmer.
    There are actually two ways we can use ChatGPT to make it easier to run code that
    successfully retrieves the information we want: how far away is the destination
    and how long will it take to get there (and here’s a fun fact – the Google Maps
    Routes API factors in traffic trends in the estimated travel time, making our
    application perfect for productivity!).


    ### Using ChatGPT to Take a cURL Command and Make It Useable in Python: The Flexible
    Programmer’s Approach


    To some, using cURL can be a bit intimidating, which is why we’ve laid out two
    methods for using ChatGPT to help us write code that makes use of the Google Maps
    Platform API; one way that takes cURL code and “translates” it to something we
    can use in Python and another way that surpasses the need to look at any scary
    cURL code at all.


    In this first method, instead of navigating the Google Maps Platform documentation,
    we’re actually going to cut to the chase and give you the cURL code you need and
    show you how to use ChatGPT to make it useable to you as a Python programmer.
    You’re welcome.


    Here’s the cURL code from the Google Maps Platform documentation.


    ```

    curl -X POST -d ''{

    "origin":{

    "location":{

    "latLng":{

    "latitude": 37.419734,

    "longitude": -122.0827784

    }

    }

    },

    "destination":{

    "location":{

    "latLng":{

    "latitude": 37.417670,

    "longitude": -122.079595

    }

    }

    },

    "travelMode": "DRIVE",

    "routingPreference": "TRAFFIC_AWARE",

    "departureTime": "2023-10-15T15:01:23.045123456Z",

    "computeAlternativeRoutes": false,

    "routeModifiers": {

    "avoidTolls": false,

    "avoidHighways": false,

    "avoidFerries": false

    },

    "languageCode": "en-US",

    "units": "IMPERIAL"

    }'' \

    -H ''Content-Type: application/json'' -H ''X-Goog-Api-Key: YOUR_API_KEY'' \

    -H ''X-Goog-FieldMask: routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline''
    \

    ''https://routes.googleapis.com/directions/v2:computeRoutes''

    ```


    Listing 2-18 cURL Code for Using the Google Maps Routes API


    Remember, when practicing prompt engineering, the best practice is to separate
    the instructions from the content with three hashes (`###`) to get the best results.
    To that end, here’s the prompt we gave ChatGPT so that we could use this cURL
    code and produce the results we desired using three hashes to separate the instructions
    from the content, the content being the cURL code presented in Listing 2-18:


    ```

    I''m coding in Python and trying to build an application that makes a request
    to the Google Maps API and pulls down the amount of time it''ll take to get from
    one location to the other. This is the cURL code that would accomplish that goal.
    Help me convert this to something I can use in Python.

    ###

    [cURL code from listing 2-18]

    ```


    Listing 2-19 Prompting ChatGPT to Provide Python Code Using the cURL Command As
    Context


    This is the code we got in the response from ChatGPT.


    ```

    import requests

    import json

    # Define the payload

    payload = {

    "origin": {

    "location": {

    "latLng": {

    "latitude": 37.419734,

    "longitude": -122.0827784

    }

    }

    },

    "destination": {

    "location": {

    "latLng": {

    "latitude": 37.417670,

    "longitude": -122.079595

    }

    }

    },

    "travelMode": "DRIVE",

    "routingPreference": "TRAFFIC_AWARE",

    "departureTime": "2025-02-17T17:00:00Z",

    "computeAlternativeRoutes": False,

    "routeModifiers": {

    "avoidTolls": False,

    "avoidHighways": False,

    "avoidFerries": False

    },

    "languageCode": "en-US",

    "units": "IMPERIAL"

    }

    # Define headers

    headers = {

    "Content-Type": "application/json",

    "X-Goog-Api-Key": "YOUR_API_KEY",

    "X-Goog-FieldMask": "routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline"

    }

    # Make the request

    response = requests.post("https://routes.googleapis.com/directions/v2:computeRoutes",
    json=payload, headers=headers)

    # Print the response

    print(response.json())

    ```


    Listing 2-20 Getting a Response Back from ChatGPT with Useable Python Code


    **Note**


    In order for this code to run, you must set a date and time in the `DEPARTURE-TIME`
    parameter that is beyond the time at which you run the code. In other words, the
    departure time cannot be set in the past. In this example, the date is set to
    a specific time in 2025, but if you’re running this code beyond that year, you
    need to adjust the code in the `DEPARTURE-TIME` parameter in order for your code
    to run as expected.


    After running this code, this is the response you should get.


    ```

    {''routes'': [{''distanceMeters'': 773, ''duration'': ''158s'', ''polyline'':
    {''encodedPolyline'': ''ipkcFjichVzQ@d@gU{E?''}}]}

    ```


    Listing 2-21 The Successful Response After Running the Code from ChatGPT'
