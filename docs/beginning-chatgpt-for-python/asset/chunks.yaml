  trans: "\n# 8. 为 Discord 机器人注入智能，第二部分：使用聊天与审核模型进行内容审核\n\n在本章中，我们将采取必要步骤，使我们的内容审核\
    \ Discord 机器人具备人工智能。让我们概述一下将要进行的更改：\n\n*   创建一个新脚本 `moderation_client.py`，用于调用\
    \ OpenAI API 的 `OpenAI.moderations.create()` 方法。审核模型使我们能够识别任何文本内容是否属于以下类别：\n \
    \   *   仇恨言论\n    *   仇恨/威胁性言论\n    *   骚扰\n    *   骚扰/威胁性言论\n    *   自残\n   \
    \ *   自残/意图\n    *   自残/指导\n    *   色情内容\n    *   色情内容/涉及未成年人\n    *   暴力内容\n\
    \    *   暴力内容/血腥画面\n\n*   复用上一章中的 `chatgpt_client_for_qa_and_moderation.py` 脚本。在第\
    \ 7 章中，该脚本用于调用 OpenAI 的 Chat 类，以回答用户提出的问题。在本章中，它将再次用于调用 Chat 类，但这次是为了审核目的。这就是为什么该脚本被恰当地命名为\
    \ `chatgpt_client_for_qa_and_moderation`，因为它既用于第 7 章的问答，也用于本章的审核。\n\n*   修改我们的\
    \ `content_moderator_bot.py` 脚本（原名为 `content_moderator_bot_dumb.py`），使其能够同时调用\
    \ `moderation_client.py` 和 `chatgpt_client_for_qa_and_moderation.py`。如果任一脚本指示\
    \ Discord 频道中输入的内容存在异议，它将从该 Discord 频道中删除该消息。请记住，此机器人会监控 Discord 服务器中所有频道的所有内容！\n\
    \n现在，你可能会问自己，既然审核类已经知道如何标记任何有害内容，为什么我们还需要使用聊天类呢？问得好。\n\n是的，审核类能让我们了解有害内容，但它**不会**告知我们其他类型的不当内容（针对我们的用例而言），例如当不怀好意的人试图引诱我们的用户陷入骗局时。请记住，这是一个银行应用的\
    \ Discord 服务器，因此诈骗者肯定会非常乐意针对该服务器的所有成员，因为这里聚集了大量银行用户！\n\n因此，我们将使用 `moderation_client.py`\
    \ 调用审核类，以了解 Discord 服务器中是否存在任何有害内容；同时，我们将复用上一章的 `chatgpt_client_for_qa_and_moderation.py`\
    \ 来调用聊天方法，以便了解 Discord 服务器中是否发布了任何其他不良内容，例如诈骗企图。\n\n## 使用 `OpenAI.moderations.create()`\
    \ 审核内容\n\n通过使用审核模型，开发者可以提交一段文本，并随后了解该文本是否包含暴力、仇恨和/或威胁性内容，或任何形式的骚扰。\n\n表 8-1 描述了调用\
    \ `OpenAI.moderations.create()` 方法所需参数的格式。该服务使用起来非常简单，因为只需一个参数即可正确调用该服务。\n\n###\
    \ 检查方法参数\n\n**表 8-1** 审核模型的请求体\n\n| 字段 | 类型 | 是否必需 | 描述 |\n| --- | --- | --- |\
    \ --- |\n| `input` | 字符串或列表 | 必需 | 需要分类的文本。 |\n| `model` | 字符串默认值：`omni-moderation-latest`\
    \ | 可选 | 有多个内容审核模型可供使用，例如：`omni-moderation-latest`、`text-moderation-stable`、`text-moderation-latest`。默认情况下，此参数设置为\
    \ `omni-moderation-latest`。它会随时间自动升级，确保你始终使用最准确的模型。如果你决定使用任何基于文本的审核模型，则只能提交文本进行评估。然而，全能审核模型能够评估文本和图像内容。因此，请选择最适合你用例的模型。\
    \ |\n\n### 处理响应\n\n成功调用审核模型后，该方法将返回一个响应，其结构如表 8-2 所示。\n"
- fmt: '### Moderation (Dictionary)


    **Table 8-2** The Structure of the Moderation Response


    | Field | Type | Description |

    | --- | --- | --- |

    | `id` | String | A unique identifier for the moderation request. |

    | `model` | String | The model used to perform the moderation request. |

    | `results` | List | A list of moderation objects. |

    | ↳ `flagged` | Boolean | Flags if the content violates OpenAI''s usage policies.
    |

    | ↳ `categories` | List | A list of the categories and whether they’re being flagged
    or not. |

    |  ↳↳ `hate` | Boolean | This indicates whether or not the text given expresses,
    incites, or promotes hate based on race, gender, religion, ethnicity, nationality,
    disability status, sexual orientation, or caste. |

    |  ↳↳ `hate/threatening` | Boolean | This indicates whether or not the text given
    contains hateful content that also threatens violence or serious harm toward the
    targeted group based on biases expressed above. |

    |  ↳↳ `harassment` | Boolean | This indicates whether or not the text given contains
    content that expresses, incites, or promotes harassing language toward any target.
    |

    |  ↳↳ `harassment/threatening` | Boolean | This indicates whether or not the text
    given contains harassment content that also threatens violence or serious harm
    toward any target. |

    |  ↳↳ `self-harm` | Boolean | This indicates whether or not the text given contains
    content that promotes, encourages, or depicts acts of self-harm, for example,
    suicide, cutting, and eating disorders. |

    |  ↳↳ `self-harm/intent` | Boolean | This indicates whether or not the text given
    contains content in which the speaker expresses that they are engaging or intend
    to engage in acts of self-harm, such as suicide, cutting, and eating disorders.
    |

    |  ↳↳ `self-harm/instructions` | Boolean | This indicates whether or not the text
    given contains content that encourages the performing acts of self-harm, such
    as suicide, cutting, and eating disorders. This includes content that gives instructions
    or advice on how to commit such acts. |

    |  ↳↳ `sexual` | Boolean | This indicates whether or not the text given contains
    content meant to arouse sexual excitement, such as the description of sexual activity.
    This includes content that promotes sexual services; however, this **excludes**
    topics such as sex education and wellness. |

    |  ↳↳ `sexual/minors` | Boolean | This indicates whether or not the text given
    contains content that includes an individual under the age of 18. |

    |  ↳↳ `violence` | Boolean | This indicates whether or not the text given contains
    content depicting death, violence, or physical injury. |

    |  ↳↳ `violence/graphic` | Boolean | This indicates whether or not the text given
    contains content depicting death, violence, or physical injury in graphic detail.
    |

    | ↳ `category_scores` | List | A list of the categories along with the scores
    given by the model. |

    |  ↳↳ `hate` | Number | Score for the category “hate.” |

    |  ↳↳ `hate/threatening` | Number | Score for the category “hate/threatening.”
    |

    |  ↳↳ `harassment` | Number | Score for the category “harassment.” |

    |  ↳↳ `harassment/threatening` | Number | Score for the category “harassment/threatening.”
    |

    |  ↳↳ `self-harm` | Number | Score for the category “self-harm.” |

    |  ↳↳ `self-harm/intent` | Number | Score for the category “self-harm/intent.”
    |

    |  ↳↳ `self-harm/instructions` | Number | Score for the category “self-harm/instructions.”
    |

    |  ↳↳ `sexual` | Number | Score for the category “sexual.” |

    |  ↳↳ `violence` | Number | Score for the category “violence.” |

    |  ↳↳ `violence/graphic` | Number | Score for the category “violence/graphic.”
    |


    The listing below is an example of the Moderation response after invoking the
    Moderations model. Table 8-2 looks a little complex, but as you can see, if any
    of the categories are labeled as “true,” then the `results.flagged` node is labeled
    as “true.”


    Take a look at Listing 8-1 for a practical example of the Moderation response.


    ```

    {

    "id": "modr-XXXXX",

    "model": "text-moderation-005",

    "results": [

    {

    "flagged": true,

    "categories": {

    "sexual": false,

    "hate": false,

    "harassment": false,

    "self-harm": false,

    "sexual/minors": false,

    "hate/threatening": false,

    "violence/graphic": false,

    "self-harm/intent": false,

    "self-harm/instructions": false,

    "harassment/threatening": true,

    "violence": true,

    },

    "category_scores": {

    "sexual": 1.2282071e-06,

    "hate": 0.010696256,

    "harassment": 0.29842457,

    "self-harm": 1.5236925e-08,

    "sexual/minors": 5.7246268e-08,

    "hate/threatening": 0.0060676364,

    "violence/graphic": 4.435014e-06,

    "self-harm/intent": 8.098441e-10,

    "self-harm/instructions": 2.8498655e-11,

    "harassment/threatening": 0.63055265,

    "violence": 0.99011886,

    }

    }

    ]

    }

    ```

    **Listing 8-1** The Moderation Response


    ## Creating Our Client for the Moderations Model: `moderation_client.py`


    Listing 8-2 is our client to invoke the Moderations model. Take a look at it,
    and then we’ll discuss the important parts afterward.


    ```

    import os

    from dotenv import load_dotenv

    from openai import OpenAI

    class ModerationResponse:

    def __init__(self):

    load_dotenv()

    self.client = OpenAI()

    def moderate_text(self, text):

    moderation = self.client.moderations.create(input=text)

    return moderation

    ```

    **Listing 8-2** `moderation_client.py`


    In the previous chapters in this book, we created client scripts for the various
    methods of the classes of the OpenAI API. Therefore, the class above, `ModerationResponse`
    in `moderation_client.py`, should look quite familiar. At the end of the day,
    we have a simple function, `moderate_text()`, which allows us to pass the text
    that we want to evaluate and returns the response.


    ## Making `content_moderator_bot.py` More Intelligent


    Now that we have `moderation_client.py` to invoke the Moderations model, let’s
    take a look at the updated `content_moderator_bot.py` (formerly named, `content_moderator_bot_dumb.py`)
    that will use the `moderation_client.py` to check for harmful content and the
    `chatgpt_client_for_qa_and_moderation.py` (unmodified from the previous chapter)
    to check for potential scams.


    Listing 8-3 is the full source code for our intelligent Discord moderator bot,
    `content_moderator_bot.py`.'
