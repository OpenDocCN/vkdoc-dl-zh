    take for granted all have individual APIs. Do you know what geocoding is? Well,
    you’d have to find out the hard way if you went through the documentation on your
    own.


    Reading through documentation is annoying. Especially when we only want a few
    features in any given API or service. In a perfect world, we wouldn’t even *need*
    to know what geocoding is in order to get our code working in different scenarios
    other than what’s provided in the example code from Google.


    We may not live in a perfect world, but we *don’t* have to know what geocoding
    is, at least not anymore. We can simply use ChatGPT to get through the documentation
    we don’t want to read.


    Here’s what we asked ChatGPT so you don’t have to read any of the Google Maps
    Route API to get working code.


    ```

    I need to use the Google Maps Platform''s Routes API gives me to pull down information
    pertaining to how much time it''ll take to get from one destination to the other,
    as well as how much distance is between the two points. How can I make an HTTP
    request in Python to get the information I''m looking for?

