  trans: "\n# 用 Python 创建问答机器人应用，从频道中回答问题：`tech_support_bot_dumb.py`\n\n当然，既然我们已经完成了所有必要的准备工作，并且知道了要监控用户问题的频道名称，那么接下来就让我们看看用\
    \ Python 编写的代码，这些代码能让机器人加入我们的服务器并访问特定 Discord 频道的所有消息。\n\n这是本章中我们将要创建的两个 Discord\
    \ 机器人中的第一个。这个名为 `tech_support_bot_dumb.py` 的机器人将负责监控我们 Discord 服务器中“q-and-a”频道的消息。\n\
    \n在本章稍后的内容中，我们将创建另一个机器人，它负责审核 Discord 服务器中的*所有内容*，包括“q-and-a”频道，以过滤掉不良内容。这样做的目的是遵循“关注点分离”的架构模式。我们不会创建一个庞大的、能处理\
    \ Discord 服务器所有审核需求的 Python Discord 机器人，而是将功能拆分成两个不同的应用。\n\n我们还将循序渐进，将本章的重点放在攻克\
    \ Python 中 Discord 功能的学习曲线上。在本书的最后几章中，我们将对这两个机器人进行增强，利用 OpenAI API 让它们具备人工智能。\n\
    \n清单 6-1 展示了创建一个基础 Discord 机器人所需的代码，该机器人可以监控单个频道中发布的所有消息并提供回答。\n\n*清单 6-1.* *tech_support_bot_dumb.py*\n\
    \n```\nimport discord\n# 用于身份验证的机器人令牌\ndiscord_token = 'YOUR_TOKEN_HERE'\n# 机器人应监控和交互的频道名称\n\
    channel_to_watch = 'q-and-a'\n# 初始化 Discord 客户端\ndiscord_client = discord.Client()\n\
    # 机器人就绪时的事件处理程序\n@discord_client.event\nasync def on_ready():\nprint('已登录为', client.user)\n\
    print('------')\n# 收到消息时的事件处理程序\n@ discord_client.event\nasync def on_message(message):\n\
    # 忽略机器人自己发送的消息，防止自我回复\nif message.author == client.user:\nreturn\n# 忽略不在指定 \"\
    q-and-a\" 频道中的消息\nif isinstance(message.channel, discord.TextChannel) and message.channel.name\
    \ != channel_to_watch:\nreturn\n# 向发送消息的用户发送问候回复\nreply = f'你好 {message.author.mention}，我可以帮你解决这个问题！'\n\
    await message.channel.send(reply)\n# 使用提供的令牌运行机器人\ndiscord_client.run(discord_token)\n\
    ```\n\n在脚本的开头，你应该会注意到我们通过 `channel_to_watch` 变量指定了我们想要监控的频道。\n\n**注意**\n\n由于某些原因，Discord\
    \ 自身的术语有时会将 Discord 服务器称为“公会”。然而，从我们的角度来看，公会就是一个 Discord 服务器。\n\n## 处理发送到 Discord\
    \ 服务器的消息\n\n在结束第一个 Python Discord 机器人的介绍之前，我们需要讨论一下 `on_message(message)` 函数。对于发送到\
    \ Discord 服务器的每一条消息，以及用户直接以私信形式发送给机器人本身的消息，都会异步调用此函数。\n\n**注意**\n\n你知道吗？当机器人在\
    \ Discord 服务器中回答某人的问题时，Discord 会调用机器人的 `on_message(message)` 函数，将机器人刚刚发送的消息传递给机器人。这听起来像是无限循环的根源，不是吗？因此，我们在代码中设置了逻辑，让机器人忽略自己发送的消息。\n\
    \n在 `on_message(message)` 函数的最后几行中，我们通过在回复中“@提及”原始消息发送者，确保给予他们友好的回复。正如我们之前提到的，这个问答机器人的第一个版本是“笨”的。当你在\
    \ Discord 服务器中发布问题时，它会做出响应，但响应实际上并不会回答你的问题。\n\n## 成功！运行你的第一个 Discord 机器人：`tech_support_bot_dumb.py`\n\
    \n现在，让我们运行我们的 Python Discord 机器人。执行应用后，请务必返回你的 Discord 服务器，并尝试在你为问答设置的频道中输入一个问题。图\
    \ 6-14 展示了对我的问题“这个机器人会回答我关于这个应用的问题吗？”的响应。\n\n![](img/615442_1_En_6_Fig14_HTML.jpg)\n\
    \n图 6-14\n\n在 Discord 中成功运行问答机器人\n\n仔细查看图 6-14，你会看到一些关键特性，例如：\n\n- 在右侧，你会看到机器人处于在线状态，并带有绿色状态指示器。\n\
    - 在频道中提问后，机器人会直接@提及你。\n\n# 简化向 Discord 注册下一个 Discord 机器人应用的流程\n\n既然我们已经成功完成了所有步骤，拥有了一个可运行的\
    \ Discord 机器人，那么创建第二个机器人就易如反掌了！所以，让我们简要地重复一下上述所有步骤，以便创建我们的第二个 Discord 机器人。我会明确指出哪些项目需要更改或增强，因为第二个机器人将作为审核员，而不是为\
    \ Discord 服务器的用户提供问题答案。\n\n## 向 Discord 注册一个新的 Discord 机器人应用\n\n执行与上述相同的步骤；不过，明智的做法是给机器人起一个不同的名字。对我来说，第二个机器人将命名为“Mod\
    \ Bot”。\n\n## 指定机器人的常规信息\n\n对我来说，内容审核机器人有一个不同的图标，所以我在这里指定了它，如图 6-15 所示。\n\n![](img/615442_1_En_6_Fig15_HTML.jpg)\n\
    \n图 6-15\n\n为第二个机器人提供名称和图标\n\n## 为机器人指定 OAuth2 参数\n\n第二个机器人需要更多权限才能执行更多任务。以下是我们需要的范围：\n\
    \n- 机器人\n  - 踢出成员\n  - 封禁成员\n  - 发送消息\n  - 管理消息\n  - 读取消息历史\n\n## 邀请你的机器人到你的服务器\n\
    \n重复第一个机器人的相同步骤。\n\n## 获取机器人的 Discord ID 令牌并设置网关意图\n\n再次按照上述步骤获取 Discord ID 令牌。然后，向下滚动页面到名为“特权网关意图”的部分，并启用名为“服务器成员意图”和“消息内容意图”的选项。\n"
- fmt: '# Creating The Next Discord Bot: `content_moderator_bot_dumb.py`


    The role of the content moderator is to make sure that unwanted content is not
    posted in the Discord server. Just like the previous bot that we created earlier
    in this chapter, this bot will not (yet) be artificially intelligent. In its current
    state, the bot will indiscriminately delete any message posted anywhere in the
    server that contains the word “puppies.”


    It’s not because puppies are inherently evil. However, they do have a tendency
    to destroy your favorite pair of shoes when left alone. In all honesty, we simply
    need something to test our code in Discord when we run our bot.


    Listing [6-2](#615442_1_En_6_Chapter.xhtml#PC2) is the code for `content_moderator_bot_dumb.py`.


    *Listing 6-2.* `content_moderator_bot_dumb.py`


    ```

    import discord

    # Bot''s token for authentication

    discord_token = ''''

    # Banned word to monitor in messages

    banned_word = ''puppies''

    # Initialize the Discord client

    discord_client = discord.Client()

    # Event handler for when the bot is ready

    @discord_client.event

    async def on_ready():

    print(''Logged in as'', discord_client.user)

    print(''------'')

    # Event handler for when a message is received

    @discord_client.event

    async def on_message(message):

    # Ignore messages sent by the bot to prevent self-responses

    if message.author == discord_client.user:

    return

    # Check if the message was sent in a guild (server)

    if message.guild is not None:

    # Check if the banned word is in the message content

    if banned_word in message.content:

    # Delete the message

    await message.delete()

    # Mention the user who sent the inappropriate message

    author_mention = message.author.mention

    # Send a warning message mentioning the user

    await message.channel.send(f''{author_mention} This comment was deemed inappropriate
    for this channel. ''

    ''If you believe this to be in error, please contact one of the human server moderators.'')

    # Run the bot with the provided token

    discord_client.run(discord_token)

    ```


    ## Handling Messages Sent to the Discord Server


    Again, let’s focus our attention on the `onMessageReceived()` function, since
    it’s called asynchronously every time a message is posted to the Discord server.
    As you can see, if the message posted to the server contains the banned word,
    then we delete the message and warn the sender with a @mention message in the
    same channel where the offending message was posted.


    ## Success Again! Running Your Second Discord Bot: `content_moderator_bot_dumb.py`


    Now, let’s run our second Python Discord bot. After executing the app, be sure
    to return back to your Discord server and type a message in any channel that contains
    the offending word. Figure [6-16](#615442_1_En_6_Chapter.xhtml#Fig16) shows the
    bot in action.


    ![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    This Bot Has a Strict Rule About Discussing “Puppies”; However, Discussing “Kittens”
    Is Perfectly Fine


    ## Conclusion


    We just went through all the steps necessary to create two functioning Discord
    bots in Python. For those who are unfamiliar with the process of creating a Discord
    server, we showed the process on how to set up a server to manage our community.


    As you can see, we took a much different approach compared to our Slack bot that
    we did in Chapter [4](#615442_1_En_4_Chapter.xhtml)! The Slack bot that we created
    was pretty much focused on user productivity within the workplace. The two Discord
    bots, on the other hand, are truly focused on community management. We have everything
    in place for these bots to be artificially intelligent with the help of OpenAI’s
    APIs. This is all accomplished in the final two chapters.


    ## Exercises Left for the Reader


    In the next chapters, we’re going to make our “dumb” bots to be intelligent, but
    there’s at least one thing we can do right now. Rather than using the command
    line to report status messages, it’s better for the bots to have their own channel
    that’s exclusively used for status reports. This way, when the bot starts up,
    shuts down, or has anything important to inform the administrators, it’s all logged
    and recorded in a central location.


    # Adding Intelligence to Our Discord Bots, Part 1: Using the Chat Model for Q&A


    At this point, we have all the structure in place to make both our Discord bots
    that we created in the previous chapter to be fully functional and artificially
    intelligent, and that''s what we''re going to do in the final chapters of this
    book. The focus of this chapter will be on our tech support bot, which was called
    `tech_support_bot_dumb.py`. Below are the two major changes that we’re going to
    make:


    - Modify our `chatgpt_client.py` script so that the Discord bot script can ask
    questions about specific information that we provide to it. The updated file will
    be a class called `chatgpt_client_for_qa_and_moderation.py`. It will be used for
    Q&A purposes in this chapter but will be used in the final chapter of the book
    as well.


    - Modify our `tech_support_bot.py` script (formerly named `tech_support_bot_dumb.py`)
    so that it can load an external text file that contains frequently asked questions
    with the answers. The script will then provide the contents of the text file to
    the `ChatGPTClient` class inside the `chatgpt_client_for_qa_and_moderation.py`
    script who is responsible for creating the prompt and of course invoking the chat
    object of the OpenAI API for Python.'
