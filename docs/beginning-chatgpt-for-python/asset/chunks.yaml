  trans: '

    # 创建下一个 Discord 机器人：`content_moderator_bot_dumb.py`


    内容审核员的职责是确保 Discord 服务器中不会出现不当内容。与我们本章前面创建的机器人一样，这个机器人（暂时）还不具备人工智能。在当前状态下，该机器人会不加区分地删除服务器中任何包含“puppies”一词的消息。


    这并不是因为“puppies”本身有什么邪恶之处。不过，它们确实有在你不在家时毁掉你最爱那双鞋的倾向。老实说，我们只是需要在 Discord 中运行机器人时，有东西可以用来测试我们的代码。


    清单 6-2 展示了 `content_moderator_bot_dumb.py` 的代码。


    *清单 6-2.* `content_moderator_bot_dumb.py`


    ```

    import discord

    # 用于身份验证的机器人令牌

    discord_token = ''''

    # 需要监控的违禁词

    banned_word = ''puppies''

    # 初始化 Discord 客户端

    discord_client = discord.Client()

    # 机器人就绪时的事件处理程序

    @discord_client.event

    async def on_ready():

    print(''已登录为'', discord_client.user)

    print(''------'')

    # 收到消息时的事件处理程序

    @discord_client.event

    async def on_message(message):

    # 忽略机器人自身发送的消息，防止自我响应

    if message.author == discord_client.user:

    return

    # 检查消息是否发送自公会（服务器）

    if message.guild is not None:

    # 检查消息内容中是否包含违禁词

    if banned_word in message.content:

    # 删除该消息

    await message.delete()

    # 提及发送不当消息的用户

    author_mention = message.author.mention

    # 发送一条提及该用户的警告消息

    await message.channel.send(f''{author_mention} 此评论被认为不适合本频道。''

    ''如果您认为这是误判，请联系人工服务器管理员。'')

    # 使用提供的令牌运行机器人

    discord_client.run(discord_token)

    ```


    ## 处理发送到 Discord 服务器的消息


    再次，让我们将注意力集中在 `onMessageReceived()` 函数上，因为每当有消息发布到 Discord 服务器时，它都会被异步调用。如您所见，如果发布到服务器的消息包含违禁词，我们会删除该消息，并在发布违规消息的同一频道中通过
    @提及 消息向发送者发出警告。


    ## 再次成功！运行您的第二个 Discord 机器人：`content_moderator_bot_dumb.py`


    现在，让我们运行第二个 Python Discord 机器人。执行应用程序后，请务必返回您的 Discord 服务器，并在任意频道中输入一条包含违规词的消息。图
    6-16 展示了机器人的运行效果。


    ![](img/615442_1_En_6_Fig16_HTML.jpg)


    图 6-16


    这个机器人对讨论“Puppies”有严格规定；不过，讨论“Kittens”则完全没问题


    ## 结论


    我们刚刚完成了用 Python 创建两个可运行 Discord 机器人所需的所有步骤。对于那些不熟悉创建 Discord 服务器流程的读者，我们展示了如何设置一个服务器来管理我们的社区。


    如您所见，我们采用的方法与我们在第 4 章中创建的 Slack 机器人截然不同！我们创建的 Slack 机器人主要关注工作场所的用户生产力。而这两个 Discord
    机器人则真正专注于社区管理。借助 OpenAI 的 API，我们已经为这些机器人具备人工智能做好了所有准备。这一切将在最后两章中完成。


    ## 留给读者的练习


    在接下来的章节中，我们将让我们的“傻瓜”机器人变得智能，但至少有一件事我们现在就可以做。与其使用命令行报告状态消息，不如让机器人拥有一个专门用于状态报告的频道。这样，当机器人启动、关闭或有任何重要信息需要通知管理员时，所有信息都会记录并保存在一个中心位置。


    # 为我们的 Discord 机器人增加智能，第 1 部分：使用聊天模型进行问答


    至此，我们已经具备了所有结构，可以使我们在上一章创建的两个 Discord 机器人功能完备且具备人工智能，这正是我们在本书最后几章要做的事情。本章的重点是我们的技术支持机器人，它被称为
    `tech_support_bot_dumb.py`。以下是我们要做的两个主要更改：


    - 修改我们的 `chatgpt_client.py` 脚本，使 Discord 机器人脚本能够就我们提供的特定信息进行提问。更新后的文件将是一个名为 `chatgpt_client_for_qa_and_moderation.py`
    的类。它将在本章用于问答目的，并且也将在本书的最后一章中使用。


    - 修改我们的 `tech_support_bot.py` 脚本（原名为 `tech_support_bot_dumb.py`），使其能够加载一个包含常见问题及解答的外部文本文件。然后，该脚本会将文本文件的内容提供给
    `chatgpt_client_for_qa_and_moderation.py` 脚本中的 `ChatGPTClient` 类，该类负责创建提示词，并当然会调用
    OpenAI Python API 的聊天对象。

