- fmt: "# Registering a New Discord Bot App with Discord\n\nNow that we have our Discord\
    \ server with the appropriate channels created, it’s time to register the bot\
    \ itself – or rather, in our case, the bots themselves. In order to keep the code\
    \ clean and manageable, we’ll actually have multiple bots for our Discord server.\
    \ The first bot will be used exclusively to answer questions in the “q-and-a”\
    \ channel. The second bot will monitor all channels for unwanted content, such\
    \ as harmful content or solicitations.\n\nIn order to create our bot, head over\
    \ to the Discord Developers website, which is also shown in Figure [6-5](#615442_1_En_6_Chapter.xhtml#Fig5):\n\
    \n[**https://discord.com/developers**](https://discord.com/developers)\n\n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nIn Order to Create a Discord Bot, Go To the Discord Developers\
    \ Website\n\nAt the top-right of the page, click on the button “New Application,”\
    \ as shown in Figure [6-5](#615442_1_En_6_Chapter.xhtml#Fig5).\n\nIn both Discord\
    \ and Slack terminology, a “bot” is an “app,” and bots are not allowed to run\
    \ on Discord servers unless they have been registered with Discord first.\n\n\
    Specify a name for the bot and click the \"Create\" button, as shown in Figure\
    \ [6-6](#615442_1_En_6_Chapter.xhtml#Fig6).\n\n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nCreating/Registering a Bot for Discord\n\n## Specifying General\
    \ Info for the Bot\n\nAfterward, you will be taken to a page where you can specify\
    \ general information about your bot, as shown in Figure [6-7](#615442_1_En_6_Chapter.xhtml#Fig7).\n\
    \n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig7_HTML.jpg)\n\nFigure 6-7\n\
    \nI Decided to Give My Bot a Cute Little Robot Icon\n\nBe sure to familiarize\
    \ yourself with the navigation menu on the left side of the page. As you can see,\
    \ we have several categories of settings to configure for our bot. By default,\
    \ we have landed on the “General Information” page, where we specify basic info\
    \ about our bot. If you have an icon ready for your bot, you can upload it here.\n\
    \n## Specifying OAuth2 Parameters for the Bot\n\nNow, it's time to specify the\
    \ scopes and permissions for our bot. If you followed the steps in creating a\
    \ Slack bot in Chapter [4](#615442_1_En_4_Chapter.xhtml), then (as stated before)\
    \ this procedure will feel familiar to you. Bots **cannot** and **should not**\
    \ have the ability to do anything and everything – they should be only allowed\
    \ to perform a list of operations that they were designed to perform.\n\nOn the\
    \ settings navigation menu on the left, navigate to \"OAuth2 > OAuth2 URL Generator\"\
    \ to continue.\n\nBelow are the scopes that we want:\n\n*   Scopes\n    *   Bot\n\
    \nThis is reflected in Figure [6-8](#615442_1_En_6_Chapter.xhtml#Fig8).\n\n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8\n\nSelecting the Scopes\n\nAfter we select the bot’s scope, we get\
    \ to see all the permissions that are only applicable to bots (be sure to scroll\
    \ down to see them).\n\nBots can be pretty powerful depending on the permissions\
    \ you give it. There are permissions that allow the bot to act in the capacity\
    \ of a normal human moderator, such as managing the server, roles, and channels.\
    \ Bots with these permissions can also kick and ban members.\n\nWhat we’re going\
    \ to enable for our bot right now are the ones that allow the bot to send and\
    \ receive messages in text channels, and voice permissions allow the bot to participate\
    \ in voice channels. Simple enough, right?\n\nSelect the following permissions\
    \ for the bot:\n\n*   Bot permissions\n    *   Read messages/view channels\n \
    \   *   Send messages\n    *   Read message history\n\nThis is reflected in Figure\
    \ [6-9](#615442_1_En_6_Chapter.xhtml#Fig9).\n\n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9\n\nSpecifying the Bot Permissions\n\nAlthough you haven’t written\
    \ any Python code yet, now it’s time to invite your bot to your server.\n\n##\
    \ Invite Your Bot to Your Server\n\nAfter you have selected the appropriate permissions,\
    \ Discord will give you a dynamically generated URL that will enable you to invite\
    \ your bot to your server (scroll down on the page in case you don’t see it).\n\
    \nCopy the URL and paste it into a web browser where you’re already authenticated\
    \ into Discord. The result is shown in Figure [6-10](#615442_1_En_6_Chapter.xhtml#Fig10).\n\
    \n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig10_HTML.jpg)\n\nFigure 6-10\n\
    \nIf You Read the Screen Carefully Here, You Can See That Discord Has a Sense\
    \ of Humor\n\nClick the \"Continue\" button to add the bot to your server.\n\n\
    Next, you will see a page that looks quite similar to the previous one, but the\
    \ main difference is that it will give you a summary of all the permissions and\
    \ capabilities of the bot. Typically, this is quite useful if you are adding a\
    \ bot to a server that you *did not create*. However, since we created this bot\
    \ ourselves, this is just a confirmation of the settings that we have already\
    \ specified earlier. Figure [6-11](#615442_1_En_6_Chapter.xhtml#Fig11) shows the\
    \ confirmation screen for authorizing our bot with the selected permissions.\n\
    \n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig11_HTML.jpg)\n\nFigure 6-11\n\
    \nConfirming the Capabilities of the Bot\n\nClick on the \"Authorize\" button\
    \ to give the bot the permission to run on your server.\n\nIf everything went\
    \ smoothly, then you should see an automated message in the general channel of\
    \ your server that indicates that the process has been successful.\n\n## Getting\
    \ the Discord ID Token for Your Bot and Setting the Gateway Intents\n\nNow, it’s\
    \ time to get the Discord ID token for your bot, which you’ll use in your code\
    \ to authenticate your bot programmatically.\n\nNote\n\nFor obvious reasons, using\
    \ the word “token” here makes me nervous because this word has two distinct meanings\
    \ in this book due to the context, but here’s a quick refresher on the meanings:\n\
    \n*   When using Discord and Slack APIs, a “token” is an authentication token.\n\
    *   When using OpenAI APIs, a “token” as a part of a word.\n\nGo back to the Discord\
    \ Developers website, and click the “Bot” category in the settings navigation\
    \ menu to continue.\n\nAlthough you haven’t seen your token yet, you need to click\
    \ the “Reset Token” button, as shown in Figure [6-12](#615442_1_En_6_Chapter.xhtml#Fig12).\n\
    \nBe sure to copy and save the ID token to someplace safe. You will need this\
    \ token in the Python code that’s presented later in this chapter.\n\n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12\n\nClick on the “Reset Token” Button to See Your ID Token\n\nScroll\
    \ down the page to the section named “Privileged Gateway Intents” and enable the\
    \ option named “MESSAGE CONTENT INTENT.”\n\nNote\n\nSo, let's slow things down\
    \ a bit and talk about intents. What exactly is an \"intent\" and why is it needed?\
    \ For the purposes of the Discord API, you need to specify explicitly every type\
    \ of information that you want to be notified by Discord programmatically. Otherwise,\
    \ Discord will constantly bombard you with events that are not relevant to you\
    \ or your bot. For example, for our purposes, we don’t care when people join or\
    \ leave the server. However, if you want to send a list of server rules to anyone\
    \ who joins your server for the first time, then you definitely would want to\
    \ enable the “SERVER MEMBERS INTENT.” When we deep dive into the code, you'll\
    \ see more information about intents.\n\nBe sure to click on the green button,\
    \ “Save Changes” to save your changes. The result is shown in Figure [6-13](#615442_1_En_6_Chapter.xhtml#Fig13).\n\
    \n![](images/615442_1_En_6_Chapter/615442_1_En_6_Fig13_HTML.jpg)\n\nFigure 6-13\n\
    \nEnable the option named “MESSAGE CONTENT INTENT”"
