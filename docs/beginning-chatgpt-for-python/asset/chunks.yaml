    Me: I''m an iPhone user. Can I sign into the app with face or touch ID?

    Q and A Bot: Sure, here''s how you can set up the Crooks Bank Mobile App on your
    iPhone:

    1\. Open the App Store on your iPhone.

    2\. In the search bar at the top, type in "Crooks Bank Mobile App" and tap "Search".

    3\. Once you can see the app in the search results, simply tap on the "Get" button
    to download it.

    4\. After the app downloads, tap "Open".

    5\. You''ll have to agree to our Terms and Conditions upon the first launch.

    6\. If you''re an existing Crooks Bank member, you can log in using your online
    banking user ID and password. If you''re a new member, you''ll need to register
    for an account.

    7\. Once you''re logged in, you can set up Touch ID or Face ID for quicker, secure
    login in the future.

    8\. Now you can start using your Crooks Bank Mobile App to manage your finances,
    pay bills, make transactions, and more!

    Please make sure you update the app regularly to access new features and improvements.
    If you have any challenges during setup, please reach out to us through the app''s
