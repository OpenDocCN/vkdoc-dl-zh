    In the city of Buttersville,USA on Milkmaid street, there''s a group of three
    friends: Marion Yogurt, Janelle de Queso, and Steve Cheeseworth III. On a hot
    summer''s day, they heard the music from an ice cream truck, and decided to buy
    something to eat.

    Marion likes strawberries, Janelle prefers chocolate, and Steve is lactose intolerant.
    That day, only two kids ate ice cream, and one of them bought a bottle of room-temperature
    water. The ice cream truck was fully stocked with the typical flavors of ice cream.

    Listing 1-3

    Sadstory.txt: A Sad Story About a Kid Who Didn’t Eat Ice Cream

    ```


    ### Analysis Question #1: Who Didn’t Get Any Ice Cream, and Why?


    Now, let''s analyze this for a bit and ask some questions among ourselves. First
    of all, who didn’t get any ice cream and why? The obvious answer is that Steve
    did not get any ice cream because of his lactose intolerance. However, since the
    story did not directly say that Steve did not buy ice cream, there''s no way for
    a regular expression to match a text pattern in the story.


    The regular expression could look for keywords such as "didn''t have," "no ice
    cream," or the names of the kids. However, it would only be able to provide a
    response based on the presence of these patterns. For example, if the regular
    expression matches the pattern "didn''t have" or "no ice cream" with Steve''s
    name, it could show you the result of the text pattern. However, it certainly
    wouldn''t be able to explain why Steve was the one who didn''t have ice cream
    or provide any context-specific reasoning.


    Now, let''s provide the same story to ChatGPT, and ask the question, “Who didn''t
    get any ice cream?” Listing [1-4](#615442_1_En_1_Chapter.xhtml#PC4), located below,
    takes our question and the story above and puts both together as a prompt.


    ```

    Using the information in the story below, who didn''t get any ice cream and why?

    ###

    In the city of Buttersville,USA on Milkmaid street, there''s a group of three
    friends: Marion Yogurt, Janelle de Queso, and Steve Cheeseworth III. On a hot
    summer''s day, they heard the music from an ice cream truck, and decided to buy
    something to eat.

    Marion likes strawberries, Janelle prefers chocolate, and Steve is lactose intolerant.
    That day, only two kids ate ice cream, and one of them bought a bottle of room-temperature
    water. The ice cream truck was fully stocked with the typical flavors of ice cream.

    Listing 1-4

    PROMPT. The Sad Story Put into a Prompt

    ```


    Notice how it is a best practice to provide some type of separation, in this case,
    “###”, when creating a prompt (like the one above) where you have both instructions
    and data together. Later on, when we start using either the Playground or Python
    to programmatically invoke the ChatGPT API, you’ll see that there’s a much better
    way to provide that separation.


    So, after sending the prompt, ChatGPT will provide you an answer like this.


    ```

    Based on the given information, Steve is lactose intolerant and therefore cannot
    eat ice cream. Therefore, Steve is the one who didn''t get any ice cream.

    Listing 1-5

    RESPONSE. ChatGPT’s Answer to Analysis Question #1

    ```


    As you can see, ChatGPT can utilize NLP and NLU, and therefore, it can understand
    (artificially intelligently, that is) the context of the scenario. It can interpret
    the relationships between the kids, their preferences, and Steve’s lactose intolerance.
    It is able to understand that the last names of the children, the street name,
    and the city name are the names of dairy products but are obviously irrelevant
    to the question at hand.


    ### Analysis Question #2: Which Kid Was Probably Left Sad?


    Now, to further prove the point that a regular expression is unable to provide
    any type of NLP or NLU, let''s use a new term called **sentiment analysis**. Therefore,
    after the ice cream truck drove away, which kid was left sad?


    Since the story had no mention of any of the children''s feelings or emotions,
    there is no text pattern that would allow any regular expression to return a match.


    However, if you posed the same question to ChatGPT, it will return a response
    like this.


    ```

    Since Steve is lactose intolerant and cannot eat ice cream, he would be the kid
    left sad because he couldn''t enjoy the ice cream like Marion and Janelle.

    Since Steve is lactose intolerant and cannot eat ice cream, he would be the kid
    left sad because he couldn''t enjoy the ice cream like Marion and Janelle.

    Listing 1-6

    RESPONSE. ChatGPT’s Answer to Analysis Question #2

    ```


    Therefore, ChatGPT is able to comprehend the scenario, reason through the information,
    and provide a correct answer along with an explanation for that answer.


    ## Let’s Unlearn Some Words in Order to Learn More About the ChatGPT API


    First of all, before you get started working with the ChatGPT and OpenAI APIs,
    there are a few words and terms that you should be familiar with first; otherwise,
    things won’t exactly make sense. So, let’s make sure that we’re all clear on the
    definition of models, prompts, tokens, and temperature when using ChatGPT programmatically.'
  trans: "\n不错吧？ChatGPT 不仅能列出 Python 开发者常用的设计模式，还能用自然语言解释它们为何重要。\n\n那么，归根结底，这对 Python\
    \ 开发者意味着什么呢？嗯，这其实意义重大。因为开发者现在能够创建对自然语言文本具有一定“理解”能力的应用程序。在像 ChatGPT 这样的人工智能工具出现之前，开发者通常需要创建正则表达式（也称为“regex”）来对文本主体执行基本的字符和字符串模式匹配。然而，模式匹配和自然语言理解完全是两码事。\n\
    \n## 正则表达式 vs. ChatGPT：对决！\n\n> **注意**  \n> 如果你已经知道正则表达式无法执行自然语言理解或情感分析，可以随意跳过本节。\n\
    \n我深信，每个程序员在职业生涯的某个阶段都遇到过某个恰好是编写正则表达式专家的家伙。正则表达式很棒，因为它们能够解析大量文本，以编程方式在文本中查找模式。\n\
    \n*然而*，正则表达式最大的缺点之一是，一旦编写完成，它们就极难阅读（在我看来，即使是原始开发者本人也难以阅读）。\n\n那么，让我们看看正则表达式在面对具备自然语言处理（NLP）和自然语言理解（NLU）能力的\
    \ ChatGPT 时表现如何。\n\n清单 1-3 讲述了一个不切实际的悲伤故事。然而，它清楚地说明了一点：尽管正则表达式可用于在文本主体中查找单词和短语，但它无法提供任何类型的\
    \ NLU。\n\n```\n在美国巴特斯维尔市的米尔克梅德街上，住着三个朋友：玛丽昂·优格特、珍妮尔·德·克索和史蒂夫·奇斯沃斯三世。在一个炎热的夏日，他们听到了冰淇淋车的音乐，决定去买点吃的。\n\
    玛丽昂喜欢草莓味，珍妮尔偏爱巧克力味，而史蒂夫有乳糖不耐症。那天，只有两个孩子吃了冰淇淋，其中一个还买了一瓶常温的水。冰淇淋车里备齐了各种经典口味的冰淇淋。\n\
    清单 1-3\nSadstory.txt：一个关于没吃上冰淇淋的孩子的悲伤故事\n```\n\n### 分析问题 #1：谁没吃到冰淇淋，为什么？\n\n现在，让我们稍微分析一下，并问自己几个问题。首先，谁没吃到冰淇淋，为什么？显而易见的答案是史蒂夫因为乳糖不耐症没吃到冰淇淋。然而，由于故事没有直接说史蒂夫没买冰淇淋，正则表达式无法匹配到故事中的文本模式。\n\
    \n正则表达式可以查找诸如“没吃”、“没有冰淇淋”或孩子们的名字等关键词。然而，它只能根据这些模式的存在来提供响应。例如，如果正则表达式匹配到“没吃”或“没有冰淇淋”与史蒂夫名字的模式，它可以向你展示文本模式的结果。但是，它肯定无法解释为什么史蒂夫是那个没吃冰淇淋的人，也无法提供任何特定于上下文的推理。\n\
    \n现在，让我们把同样的故事提供给 ChatGPT，并提问：“谁没吃到冰淇淋？”下面的清单 1-4 将我们的问题和上面的故事放在一起，作为一个提示词。\n\n\
    ```\n根据下面故事中的信息，谁没吃到冰淇淋，为什么？\n###\n在美国巴特斯维尔市的米尔克梅德街上，住着三个朋友：玛丽昂·优格特、珍妮尔·德·克索和史蒂夫·奇斯沃斯三世。在一个炎热的夏日，他们听到了冰淇淋车的音乐，决定去买点吃的。\n\
    玛丽昂喜欢草莓味，珍妮尔偏爱巧克力味，而史蒂夫有乳糖不耐症。那天，只有两个孩子吃了冰淇淋，其中一个还买了一瓶常温的水。冰淇淋车里备齐了各种经典口味的冰淇淋。\n\
    清单 1-4\n提示词。被放入提示词的悲伤故事\n```\n\n请注意，在创建同时包含指令和数据的提示词（如上所示）时，提供某种分隔符（此处为“###”）是一种最佳实践。稍后，当我们开始使用\
    \ Playground 或 Python 以编程方式调用 ChatGPT API 时，你会看到有更好的方法来实现这种分隔。\n\n因此，发送提示词后，ChatGPT\
    \ 会提供如下答案。\n\n```\n根据所给信息，史蒂夫有乳糖不耐症，因此不能吃冰淇淋。所以，史蒂夫是那个没吃到冰淇淋的人。\n清单 1-5\n响应。ChatGPT\
    \ 对分析问题 #1 的回答\n```\n\n如你所见，ChatGPT 能够利用 NLP 和 NLU，因此它可以（以人工智能的方式）理解场景的上下文。它可以解读孩子们之间的关系、他们的喜好以及史蒂夫的乳糖不耐症。它能够理解孩子们的名字、街道名称和城市名称都是乳制品的名称，但显然与当前问题无关。\n\
    \n### 分析问题 #2：哪个孩子可能感到难过？\n\n现在，为了进一步证明正则表达式无法提供任何类型的 NLP 或 NLU，让我们引入一个新术语：**情感分析**。那么，冰淇淋车开走后，哪个孩子感到难过？\n\
    \n由于故事中没有提及任何孩子的感受或情绪，因此没有任何文本模式能让正则表达式返回匹配结果。\n\n然而，如果你向 ChatGPT 提出同样的问题，它会返回如下响应。\n\
    \n```\n由于史蒂夫有乳糖不耐症，不能吃冰淇淋，他会是那个感到难过的孩子，因为他无法像玛丽昂和珍妮尔一样享受冰淇淋。\n由于史蒂夫有乳糖不耐症，不能吃冰淇淋，他会是那个感到难过的孩子，因为他无法像玛丽昂和珍妮尔一样享受冰淇淋。\n\
    清单 1-6\n响应。ChatGPT 对分析问题 #2 的回答\n```\n\n因此，ChatGPT 能够理解场景，推理信息，并提供正确答案以及该答案的解释。\n\
    \n## 为了更深入了解 ChatGPT API，让我们先忘掉一些词汇\n\n首先，在开始使用 ChatGPT 和 OpenAI API 之前，你应该先熟悉一些词汇和术语；否则，事情可能不会完全说得通。所以，让我们确保在使用\
    \ ChatGPT 编程时，对模型、提示词、令牌和温度的定义都一清二楚。\n"
- fmt: "### Models. Models? Models!!!\n\nAs a Python developer, when you hear the\
    \ term \"model,\" you may immediately think of the representation of real-world\
    \ entities in your Python app, right? For example, think of the term, \"object\
    \ model.\" Additionally, if you’ve ever worked with any type of database before,\
    \ then the term \"model\" may *also* conjure into your mind the idea of the representation\
    \ of data and their relationships in your database. For example, think of the\
    \ term, \"data model.\"\n\nHowever, when working with the ChatGPT APIs (and artificial\
    \ intelligence in general, for that matter), you need to forget both of those\
    \ definitions, because they don’t apply. In the realm of artificial intelligence,\
    \ a \"model\" is a pre-trained **neural network**.\n\nRemember, as I mentioned\
    \ earlier, you won’t need a PhD in machine learning in order to read this book.\
    \ So, what’s a neural network? Simply stated, a neural network is a fundamental\
    \ component of artificial intelligence systems, because they are designed to simulate\
    \ the way the human brain works by using interconnected layers of artificial neurons\
    \ to process and analyze data. These networks can be trained on vast amounts of\
    \ data to learn patterns and relationships and make predictions.\n\n![](images/615442_1_En_1_Chapter/615442_1_En_1_Fig1_HTML.jpg)\n\
    \n**Figure 1-1** An AI Model Is Trained on Vast Amounts of Data\n\nIn the context\
    \ of AI, a \"pre-trained model\" refers to a neural network that has been trained\
    \ on a specific task or dataset before being made available for use by developers.\
    \ This training process involves exposing the model to large amounts of labeled\
    \ and categorized (also called, \"annotated\") data and adjusting its internal\
    \ parameters to optimize its performance on the given task.\n\nLet’s look at some\
    \ of the models provided by OpenAI for developers to use to AI-enable their applications.\n\
    \n| `o1` | The `o1` series of large language models is trained through reinforcement\
    \ learning to handle complex reasoning tasks. `o1` models engage in deep thought\
    \ before answering, generating a lengthy internal chain of reasoning prior to\
    \ responding to the user. These models take a significantly longer time to generate\
    \ a response than other models. Some `o1` available models are: • `o1` • `o1-mini`\
    \ |\n| --- | --- |\n| `GPT-4` | `GPT-4` is one of the fastest generation of OpenAI's\
    \ GPT set of models. `GPT` stands for generative pre-trained transformer, and\
    \ these models have been trained to understand natural language as well as multiple\
    \ programming languages. The `GPT-4` models take text and images as inputs as\
    \ the prompt and provide text as the output. Some of the `GPT-4` models available\
    \ are • `gpt-4o` • `gpt-4o-mini` • `gpt-4o-realtime` • `gpt-4o-audio` |\n| `DALL·E`\
    \ | The `DALL·E` model can generate and edit images given a natural language prompt.\
    \ Later in this book in Chapter [5](#615442_1_En_5_Chapter.xhtml), we’re going\
    \ to have some fun with the `DALL·E` model to visualize the conversation of what\
    \ is being discussed in your favorite podcast episode. Some of the `DALL·E` models\
    \ available are • `dall-e-3` • `dall-e-2` |\n| `TTS` | The `TTS` model takes text\
    \ and converts it to audio with surprisingly good results. In most cases, the\
    \ audio is almost indistinguishable from a human voice. Some of the `TTS` models\
    \ available are • `tts-1` • `tts-1-hd` |\n| `Whisper` | Simply stated, the `Whisper`\
    \ model converts audio into text. In this book, we’re going to use the `Whisper`\
    \ model to search for text in a podcast episode. |\n| `Embeddings` | The `Embeddings`\
    \ model can convert large amounts of text into a numerical representation of how\
    \ the strings in the text are related. So how is that useful? Embeddings allow\
    \ developers to do specific tasks using custom datasets. Yes, this means that\
    \ you can train the `Embeddings` model on specific data that is relevant to your\
    \ application. This allows you to do operations such as • Searching within your\
    \ own body of text • Clustering data so that strings of text are grouped by their\
    \ similarity • Getting recommendations (where items with related text strings\
    \ are recommended) • Detecting anomalies (where outliers with little relatedness\
    \ are identified) • Measuring diversity (where similarity distributions are analyzed)\
    \ • Classifying data (where text strings are classified by their most similar\
    \ label) |\n| `Moderations` | The `Moderations` models are fine-tuned models that\
    \ can detect whether text may be sensitive or unsafe. These models can analyze\
    \ text content and classify it according to the following categories: • Hate •\
    \ Hate/threatening • Harassment • Harassment/threatening • Self-harm • Self-harm/intent\
    \ • Self-harm/instructions • Sexual • Sexual/minors • Violence • Violence/graphic\
    \ The `Moderations` models available are • `text-moderation-latest` • `omni-moderation-latest`\
    \ • `text-moderation-stable` |\n| Legacy and Deprecated | Since the debut of ChatGPT,\
    \ OpenAI has continued to support their older AI models, but they have been labeled\
    \ as \"legacy\" or \"deprecated\" models. These models continue to exist; however,\
    \ they have released other models that are more accurate, faster, and cheaper\
    \ to use. |\n\n> **Note**  \n> This is by no means an exhaustive list of models\
    \ available for developers provided by OpenAI! As newer models are released, the\
    \ older models will be marked as legacy or deprecated. Therefore, it’s important\
    \ to stay up-to-date by checking the list of available models on the OpenAI documentation\
    \ list of models:  \n> [https://platform.openai.com/docs/models](https://platform.openai.com/docs/models)\n\
    \n### When We Talk About Tokens, Don’t Think About Access Tokens\n\nWhen using\
    \ a third party API, such as an external REST service, you might think of a \"\
    token\" in the same sense as an access token, which is typically a UUID that allows\
    \ you to identify yourself and maintain a session with the service. Well, forget\
    \ that definition for now. Instead, when using the OpenAI APIs, a **token** is\
    \ a chunk of a text that is approximately four characters long. That’s it – nothing\
    \ else special.\n\nSo, if a token is approximately a four-character chunk of text,\
    \ then why do we care about it?\n\nWhen working with the OpenAI textual models,\
    \ developers need to be aware of token limitations, because they impact the cost\
    \ and performance of API calls. For example, the `gpt-4o` and `o1` models both\
    \ support 128,000 tokens (which is approximately the size of a 300 page novel)\
    \ that can go in your prompt. These input tokens are also called the context windows.\
    \ In contrast, the maximum output tokens for `gpt-4o` is 16,384, while the maximum\
    \ output tokens for the `o1` model is 32,768.\n\nAs a result, developers need\
    \ to take into account the length of the prompts as inputs and outputs to the\
    \ models, ensuring that they fit within the model's token constraints.\n\n**Table\
    \ 1-1** provides a list of some of the most current models with the token limitations\
    \ and their pricing.\n\n**Table 1-1** List of Models with Their Token Limitations\
    \ and the Cost Per Token\n\n| Model | Context Window | Cost of Token Input | Cost\
    \ of Token Output |\n| --- | --- | --- | --- |\n| `gpt-4o` | 128,000 | $2.50 /\
    \ 1M input tokens | $10.00 / 1M output tokens |\n| `gpt-4o-mini` | 128,000 | $0.150\
    \ / 1M input tokens | $0.600 / 1M output tokens |\n| `o1` | 128,000 | $15.00 /\
    \ 1M input tokens | $60.00 / 1M output tokens |\n| `o1-mini` | 128,000 | $3.00\
    \ / 1M input tokens | $12.00 / 1M output tokens |\n\n### Temperature Is All About\
    \ Creativity\n\nOf course, ChatGPT isn’t sentient, so it's incapable of thinking\
    \ as we humans do. However, by adjusting the **temperature** setting in your prompts\
    \ to the ChatGPT API, you can enable the responses to be more creative. Being\
    \ aware of what it understands is crucial if you want to make best use of its\
    \ potential.\n\n![](images/615442_1_En_1_Chapter/615442_1_En_1_Fig2_HTML.jpg)\n\
    \n**Figure 1-2** Modify the Temperature in Order to Get More (or Less) Creative\
    \ Responses"
