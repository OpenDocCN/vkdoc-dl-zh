    # 创建音频文件分割工具：`audio_splitter.py`


    好了，我们即将能够使用 `OpenAI.audio.transcriptions.create()` 方法以编程方式调用 Whisper 模型。然而，Whisper
    模型对每个文件有 25MB 的大小限制。


    如果你收听的是（例如）德克萨斯大学奥斯汀分校的 *StarDate* 播客，这倒不是问题。这个播客用大约两分钟的音频就能让你对夜空中该寻找什么有个很好的了解。但对于其他时长可达一小时（甚至更长）的音频节目来说，情况就不同了。在这种情况下，你肯定会超过
    25MB 的文件大小限制。


    因此，让我们与 ChatGPT 结对编程，运用我们的人类智慧来创建自己的工具，将单个音频文件分割成多个较小的文件。


    **注意**


    在本节中，我将介绍多种将大音频文件分割成小片段的方法之一。例如，你可以使用流行的音频编辑应用（如开源工具 Audacity 或授权工具 Adobe Audition）手动将大文件切割成较小的文件。


    `FFmpeg` 是以编程方式处理音频文件最可靠的方法之一，而 `pydub` 是 OpenAI 关于使用 Whisper 与 Python 的文档中推荐的开源库。


    清单 5-2 是发送给 ChatGPT 的提示，用于获取一个基本的音频文件分割应用。


    ```

    System: You are a Python developer

    User: Write an application that takes as input a single MP3 file and splits the
    file into contiguous segments no longer than 10 minutes using the pydub library
    and ffmpeg

    清单 5-2

    提示。使用 ChatGPT 创建 audio_splitter.py 应用

    ```


    经过一番来回交流，我们成功创建了（如清单 5-3 所示）`audio_splitter.py` 应用，其中包含我们对 ChatGPT 生成内容的编辑。


    ```

    from pydub import AudioSegment

    import os

    # 输入音频文件的路径

    input_audio_path = "audio-example.mp3"

    # 加载音频文件

    audio = AudioSegment.from_mp3(input_audio_path)

    # 定义片段长度（毫秒） - 10 分钟

    segment_length_ms = 10 * 60 * 1000  # 10 分钟换算为毫秒

    # 将音频分割成每段十分钟的片段

    segments = [audio[i:i+segment_length_ms] for i in range(0, len(audio), segment_length_ms)]

    # 保存片段的输出目录

    output_directory = "/PATH/TO/OUTPUT"

    # 确保输出目录存在，如果不存在则创建

    os.makedirs(output_directory, exist_ok=True)

    # 处理每个片段（例如，可以将它们保存到单独的文件中）

    for i, segment in enumerate(segments):

    segment.export(os.path.join(output_directory, f"segment_{i}.mp3"), format="mp3")

    清单 5-3

    响应。audio_splitter.py

    ```


    我们的目标很简单：使用 Python 语言将一个 MP3 文件分割成不超过十分钟的连续片段。在此过程中，我们遵循以下步骤：


    -   指定输入文件路径、输出目录以及所需的片段时长（以毫秒为单位，十分钟）。

    -   使用 `pydub` 库的 `AudioSegment` 类加载 MP3 文件，该类提供了音频处理功能。

    -   遍历输入的 MP3 文件，使用切片操作将其分割成指定时长（十分钟或更短）的较小部分。

    -   将每个片段作为单独的 MP3 文件保存到指定的输出目录中。


    要使其正常工作，你需要在项目中正确安装并配置 `pydub` 库**以及** `FFmpeg`。`FFmpeg` 是一个极其通用的媒体转换器，不仅能处理 MP3
    音频文件，还能处理各种其他音频文件格式（包括 `m4a`、`ogg` 和 `wav`）。它还能转换视频格式以及静态图像，如 `png`、`jpeg` 和 `gif`。


    运行脚本后，你将得到一个装满时长不超过十分钟的分段音频文件的文件夹。使用 `audio_splitter.py` 工具，你拥有一个易于使用的 Python
    脚本，可以修改设置以最适合你的需求。就我们的目的而言，目标是让音频文件小于 25MB，因此如果你要转录（例如）WAV 格式的八小时法律诉讼记录，你可能需要将时长调整得更短，比如六分钟。


    使用音频分割器时，最佳实践是将输出文件夹与输入文件夹分开，当我们开始使用 Whisper 模型调用 OpenAI 的 `audio.transcriptions.create()`
    方法时，你就会明白原因。


    # 创建音频转录器：`whisper_transcriber.py`


    现在，让我们构建下一个 Python 应用 `whisper_transcriber.py`。同样，我们将与 ChatGPT 结对编程，以获得一个可用的基础。清单
    5-4 是放入聊天游乐场以启动的提示。


    ```

    System: You are a Python developer.

    User: Using Python, write a script that iterates over all of the mp3 files in
    a single folder on my local computer and send all the files in the folder to be
    transcribed by OpenAI''s Whisper model, using the OpenAI''s python library.

    Model: gpt-4o

    Temperature: 1

    Maximum Length: 1150

    清单 5-4

    提示。要求 ChatGPT 使用 OpenAI 的 Python 库并将 MP3 文件发送到 Whisper 的 API

    ```


    经过一些来回交流，清单 5-5 显示了 ChatGPT 给我们的有效响应。


    ```

    import os

    import openai

    from dotenv import load_dotenv

    def transcribe_mp3_files(openai_api_key, mp3_folder_path):

    # 设置 OpenAI API 密钥

    openai.api_key = openai_api_key

    # 用于转录的模型

    model = "whisper-1"

    # 转录响应的期望格式

    response_format = "text"

    # 遍历文件夹中的每个 MP3 文件

    for filename in sorted(os.listdir(mp3_folder_path)):

    if filename.endswith(".mp3"):

    file_path = os.path.join(mp3_folder_path, filename)

    try:

    # 读取 MP3 文件的内容

    with open(file_path, "rb") as f:

    file_content = f.read()

    # 转录 MP3 文件

    response = openai.audio.transcriptions.create(

    file=(filename, file_content),

    model=model,

    response_format=response_format

    )

    # 打印整个响应对象

    print(response)

    except Exception as e:

    print(f"文件 {filename} 转录错误: {e}")

    def main():

    # 从 .env 文件加载环境变量

    load_dotenv()

    # OpenAI 的 API 密钥

    openai_api_key = os.getenv("OPENAI_API_KEY")

    # 包含要转录的 MP3 文件的文件夹

    mp3_folder_path = "/PATH/TO/OUTPUT"  # 替换为你的 MP3 文件夹路径

    # 转录 MP3 文件

    transcribe_mp3_files(openai_api_key, mp3_folder_path)

    if __name__ == "__main__":

    main()

    清单 5-5

    响应。whisper_transcriber.py

    ```


    从上面的代码清单可以看出，将输入文件与输出文件放在不同文件夹的一个主要好处是，你可以将输出文件夹的路径提供给上面的脚本，而无需担心其他任何事情。该脚本会抓取输出文件夹中的所有文件，无论该文件夹中有多少个文件，因此可以是
    1 个或 100 个文件——都没关系。

