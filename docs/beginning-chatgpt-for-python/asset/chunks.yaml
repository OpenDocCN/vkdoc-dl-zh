    I just got off a call with a client who''s experiencing app crashes as soon as
    they load it. They''re really frustrated. Can we get this sorted ASAP? :tired_face:

    Keith [2023-08-11T09:04:35] : Thanks for bringing this to our attention, Fatima.
    Let''s jump on this right away. John, can you take the lead in investigating the
    issue since our architect is out sick today?

    John [2023-08-11T09:04:52] : Sure thing, Keith. I''ll dive into the codebase and
    see if I can find any potential culprits for the crashes.

    John [2023-08-11T09:05:30] : Fatima, could you gather some additional information
    from the client? Ask them about the specific device, operating system, and any
    recent updates they might have installed.

    ...

    Listing 4-11

    The Output from Executing slack_chat_reader_bot.py

    ```


    ## Exercises Left for the Reader


    So, there are obviously a few additional things we can do here, and these steps
    will be left for you (the reader) to accomplish, for example:


    *   Connecting the code in `slack_chat_reader_bot.py` that reads the messages
    from Slack to the `chatgpt_client.py` so that grabbing the messages and getting
    a summary is a single step process.


    *   Adding more capabilities to the Slack bot itself such as adding commands so
    that anyone in the channel can request a summary. In its current state, the bot
    doesn’t post anything in the channel. However, the “user interface” to the bot
    is the channel itself; therefore, someone should be able to interact with the
    Slack bot by typing a command (such as requesting a summary)


    *   Making sure that the bot doesn’t make a bad situation worse. Whenever the
    bot provides a summary, it should not post in the channel itself because that
    could add a lot of noise to an already noisy situation. The best practice is to
    have the bot send a private message to the person asking for a summary (or whatever
    new command that you create).


    ## Conclusion


    In this chapter, we talked about one of the various ways artificial intelligence
    can be put to practical use within the enterprise today. We discussed what is
    truly "prompt engineering," by discussing that prompt engineering cannot be accomplished
    by simply textual input to ChatGPT alone. You definitely need to understand the
    ramifications of all the input parameters to the ChatGPT API, in order to properly,
    and effectively, perform prompt engineering.


    Using what we learned about prompt engineering, we were able to successfully obtain
    summarizations of any large body of text provided to us. Finally, we saw the code
    necessary in order to run an automated bot that will grab messages from any Slack
    channel programmatically, if we specify a valid date range.


    In this chapter (as well as the previous chapter), we were working exclusively
    with the Chat Completions model of the OpenAI APIs. In the next chapter, we''re
    going to push the boundaries of what’s possible by experimenting with the Whisper
    and DALL·E models.


    # 5. Multimodal AI: Creating a Podcast Visualizer with Whisper and DALL·E 3


    Now let’s introduce a new term: **multimodal AI**. In the simplest of terms, generative
    AI models can create content in one of four formats:


    *   Text


    *   Audio


    *   Images


    *   Video


    Each of those formats are a **mode**. Multimodal AI is the process of using multiple
    AI models together to generate (or to understand) content where the input is one
    type of mode and the output is a different type of mode.


    Take, for example, OpenAI’s Whisper model. If you provide it audio, it is able
    to create a transcription of everything said into text. The same thing applies
    to DALL·E. If you supply it with a textual prompt, then it is able to generate
    an image of what you described.


    In this chapter, we’re going to take multimodal AI to the next level! As an avid
    podcast listener, I’ve often wondered what the scenery, the imagery, the characters,
    the subject, or the background looked like while listening to a very immersive
    story in audio format.


    So, we’re going to create a Podcast Visualizer using multiple models from OpenAI.
    There are a few steps involved, but the final results are stunning. While listening
    to a podcast about a guy cooking some amazing things with tofu (don’t knock it
    until you try it), the Podcast Visualizer came up with the image in Figure [5-1](#615442_1_En_5_Chapter.xhtml#Fig1).


    ![](images/615442_1_En_5_Chapter/615442_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The AI-Generated Result of Visualizing a Podcast About Tofu Using the GPT-4, Whisper,
    and DALL·E Models


    In order to make the code for the Podcast Visualizer easy to follow along, we’ll
    do things separately in the following three steps:


    *   Step 1: Take a podcast episode, and use the Whisper model to get a transcript.


    *   Step 2: Take the resulting transcript, and use the GPT-4 model to describe
    the visual aspects of what’s being discussed in the podcast episode.


    *   Step 3: Take the resulting description, and use the DALL·E model to generate
    an image.


    The code presented here in this chapter has tons of practical uses, for example:


    *   If you’re just curious about the things in a podcast episode could look like
    (which is always the case for us), you can get a simple representative visual
    image to associate with what you’re listening to.


    *   For people who are hearing impaired, you can easily turn a podcast or radio
    program into a slideshow of images. This greatly enhances the accessibility of
    the content


    *   For podcasters, you can now have a simple way to add a visual/hero image to
    each of your episodes. This is useful since podcast players such as Apple Podcasts
    and Spotify allow podcasters to display a single image to associate with an individual
    episode. This can help with engagement for your listeners.'
  trans: "\n```  \nFatima [2023-08-11T09:04:20] : 大家好，我有个紧急问题需要讨论。我刚和一位客户通完电话，他们的应用一加载就崩溃。客户非常沮丧。我们能尽快解决这个问题吗？:tired_face:\
    \  \nKeith [2023-08-11T09:04:35] : 感谢你提醒我们，Fatima。我们马上处理这个问题。John，既然我们的架构师今天生病请假了，你能牵头调查这个问题吗？\
    \  \nJohn [2023-08-11T09:04:52] : 没问题，Keith。我会深入代码库，看看能否找到导致崩溃的潜在原因。  \nJohn [2023-08-11T09:05:30]\
    \ : Fatima，你能从客户那里收集一些额外信息吗？问问他们具体的设备型号、操作系统，以及最近是否安装了任何更新。  \n...  \n清单 4-11\
    \  \n执行 `slack_chat_reader_bot.py` 的输出  \n```  \n\n## 留给读者的练习  \n\n显然，我们还可以做一些额外的工作，这些步骤将留给您（读者）来完成，例如：\
    \  \n\n*   将 `slack_chat_reader_bot.py` 中从 Slack 读取消息的代码连接到 `chatgpt_client.py`，以便将抓取消息和获取摘要合并为一步操作。\
    \  \n\n*   为 Slack 机器人本身增加更多功能，例如添加命令，使频道中的任何人都可以请求摘要。在当前状态下，机器人不会在频道中发布任何内容。然而，机器人的“用户界面”就是频道本身；因此，用户应该能够通过输入命令（例如请求摘要）与\
    \ Slack 机器人进行交互。  \n\n*   确保机器人不会让糟糕的情况变得更糟。每当机器人提供摘要时，它不应在频道内发布，因为这可能会给已经嘈杂的环境增加更多噪音。最佳实践是让机器人向请求摘要的人（或您创建的任何新命令的发起者）发送私密消息。\
    \  \n\n## 结论  \n\n在本章中，我们讨论了人工智能在企业中实际应用的多种方式之一。我们探讨了什么是真正的“提示工程”，指出提示工程不能仅通过向\
    \ ChatGPT 输入文本就能完成。为了正确且有效地进行提示工程，您必须理解 ChatGPT API 所有输入参数的影响。  \n\n利用我们学到的提示工程知识，我们成功地对提供的任何大段文本进行了摘要。最后，我们看到了运行自动化机器人所需的代码，该机器人可以在指定有效日期范围的情况下，以编程方式从任何\
    \ Slack 频道抓取消息。  \n\n在本章（以及前一章）中，我们专门使用了 OpenAI API 的聊天补全模型。在下一章中，我们将通过实验 Whisper\
    \ 和 DALL·E 模型来突破可能的边界。  \n\n# 5. 多模态 AI：使用 Whisper 和 DALL·E 3 创建播客可视化工具  \n\n\
    现在让我们引入一个新术语：**多模态 AI**。简单来说，生成式 AI 模型可以创建以下四种格式之一的内容：  \n\n*   文本  \n*   音频 \
    \ \n*   图像  \n*   视频  \n\n每种格式都是一种**模态**。多模态 AI 是使用多个 AI 模型共同生成（或理解）内容的过程，其中输入是一种模态类型，而输出是另一种不同的模态类型。\
    \  \n\n以 OpenAI 的 Whisper 模型为例。如果你提供音频，它能够将所有内容转录为文本。DALL·E 也是如此。如果你提供文本提示，它能够生成你所描述内容的图像。\
    \  \n\n在本章中，我们将把多模态 AI 提升到一个新的水平！作为一名狂热的播客听众，我经常在收听音频格式的沉浸式故事时，好奇场景、意象、角色、主题或背景是什么样的。\
    \  \n\n因此，我们将使用 OpenAI 的多个模型创建一个播客可视化工具。这涉及几个步骤，但最终结果令人惊叹。在收听一个关于某人用豆腐烹饪美味佳肴（别急着否定，先试试看）的播客时，播客可视化工具生成了图\
    \ 5-1 中的图像。  \n\n![](img/615442_1_En_5_Fig1_HTML.jpg)  \n\n**图 5-1** 使用 GPT-4、Whisper\
    \ 和 DALL·E 模型可视化关于豆腐的播客的 AI 生成结果  \n\n为了使播客可视化工具的代码易于理解，我们将分以下三个步骤分别进行：  \n\n\
    *   步骤 1：获取一集播客，使用 Whisper 模型生成转录文本。  \n*   步骤 2：获取生成的转录文本，使用 GPT-4 模型描述该集播客中讨论内容的视觉方面。\
    \  \n*   步骤 3：获取生成的描述，使用 DALL·E 模型生成图像。  \n\n本章提供的代码具有大量实际用途，例如：  \n\n*   如果你只是好奇一集播客的内容可能是什么样子（我们总是如此），你可以获得一个简单的代表性视觉图像，与你正在收听的内容相关联。\
    \  \n*   对于有听力障碍的人，你可以轻松地将播客或广播节目转换为图像幻灯片。这大大增强了内容的可访问性。  \n*   对于播客创作者，你现在有了一种简单的方法，可以为每一集添加视觉/主图。这很有用，因为\
    \ Apple Podcasts 和 Spotify 等播客播放器允许播客创作者显示单张图像与单集关联。这有助于提高听众的参与度。\n"
- fmt: "# Introducing the Whisper Model by OpenAI\n\nNow let’s introduce another new\
    \ term: **automatic speech recognition** (ASR). The average everyday consumer\
    \ is very familiar with this technology due to its integration into mobile phones\
    \ (e.g., Siri for the iPhone) and smart speakers (e.g., any Alexa device). At\
    \ its core, ASR technology converts spoken language into text.\n\nWhisper is OpenAI’s\
    \ model for speech recognition, and the accuracy is astonishingly high. The listing\
    \ below is a transcript of an episode of the very popular Duolingo Spanish podcast,\
    \ which makes the Spanish language easy to be understood by English listeners\
    \ by combining both English and Spanish together in a woven narrative story. In\
    \ Listing [5-1](#615442_1_En_5_Chapter.xhtml#PC1), you can see the transcript\
    \ that was generated using the Whisper model.\n\n```\n...I'm Martina Castro. Every\
    \ episode we bring you fascinating, true stories to help you improve your Spanish\
    \ listening and gain new perspectives on the world. The storyteller will be using\
    \ intermediate Spanish and I'll be chiming in for context in English. If you miss\
    \ something, you can always skip back and listen again. We also offer full transcripts\
    \ at podcast.duolingo.com.\nGrowing up, Linda was fascinated with her grandmother,\
    \ Erlinda. Erlinda was a healer or curandera, someone who administers remedies\
    \ for mental, emotional, physical, or spiritual illnesses.\nIn Guatemala, this\
    \ is a practice passed down orally through generations in the same family. Mal\
    \ de ojo, or the evil eye, is considered an illness by many Guatemalans who believe\
    \ humans have the power to transfer bad energy to others. Neighbors would bring\
    \ their babies to Linda's grandmother when they suspected an energy imbalance.\
    \ Su madre lo llevaba a nuestra casa para curarlo...\nListing 5-1\nThe Whisper\
    \ Model Performs Speech Recognition to Convert Audio into Text\n```\n\nIf you’ve\
    \ ever worked with a speech recognition system before (even with sophisticated\
    \ technologies like Siri and Alexa), you will know that it has problems, for instance:\n\
    \n* **Speech recognition has problems with punctuation**\n  * Have you noticed\
    \ that nobody speaks with punctuation? For the English language, we use changes\
    \ in tone or volume to ask a question or give an exclamation. We also use short\
    \ and long pauses for commas and periods.\n\n* **Speech recognition has problems\
    \ with foreign words and accents**\n  * Depending on who you ask, there are at\
    \ least 170k words in the English language. However, in conversational English\
    \ we are always using foreign words like:\n    * Tsunami (Japanese origin): A\
    \ large sea wave often caused by an earthquake\n    * Hors d'oeuvre (French origin):\
    \ An appetizer\n    * Lingerie (French origin): Women's underwear or nightclothes\n\
    \    * Aficionado (Spanish origin): Someone who is very passionate about a specific\
    \ activity or subject\n    * Piñata (Spanish origin): A brightly colored box of\
    \ candy for kids to beat relentlessly\n\n* **Speech recognition has problems with\
    \ names**\n  * Certain names of people, businesses, and websites can often be\
    \ hard to spell and understand\n\n* **Speech recognition has problems with homophones**\n\
    \  * Do you remember those words that sound the same but have different spellings\
    \ and meanings? The fantastic editor of this book knows all of them!\n    * Would\
    \ / Wood\n    * Flour / Flower\n    * Two / Too / To\n    * They’re / There /\
    \ Their\n    * Pair / Pare / Pear\n    * Break / Brake\n    * Allowed / Aloud\n\
    \nAs you can see from Listing [5-1](#615442_1_En_5_Chapter.xhtml#PC1), above,\
    \ Whisper was able to understand all the punctuation in the audio, identify all\
    \ the foreign words (of which there were several), understand the names, as well\
    \ as the company name (\"Duolingo\") within a URL! Of course, if you noticed,\
    \ it could also understand the difference between \"wood\" and \"would.\"\n\n\
    ## Features and Limitations of the Whisper Model\n\nThe Whisper model is able\
    \ to convert spoken audio from the following languages into text:\n\n* Afrikaans\n\
    * Arabic\n* Armenian\n* Azerbaijani\n* Belarusian\n* Bosnian\n* Bulgarian\n* Catalan\n\
    * Chinese\n* Croatian\n* Czech\n* Danish\n* Dutch\n* **English (of course!)**\n\
    * Estonian\n* Finnish\n* French\n* Galician\n* German\n* Greek\n* Hebrew\n* Hindi\n\
    * Hungarian\n* Icelandic\n* Indonesian\n* Italian\n* Japanese\n* Kannada\n* Kazakh\n\
    * Korean\n* Latvian\n* Lithuanian\n* Macedonian\n* Malay\n* Marathi\n* Maori\n\
    * Nepali\n* Norwegian\n* Persian\n* Polish\n* Portuguese\n* Romanian\n* Russian\n\
    * Serbian\n* Slovak\n* Slovenian\n* Spanish\n* Swahili\n* Swedish\n* Tagalog\n\
    * Tamil\n* Thai\n* Turkish\n* Ukrainian\n* Urdu\n* Vietnamese\n* Welsh\n\nSo,\
    \ at the end of the day, it will be able to understand audio spoken by yourself\
    \ and probably any language spoken by your friends and colleagues.\n\nDevelopers\
    \ are limited to sending no more than 50 requests per minute to the API, so this\
    \ constraint needs to be taken into consideration if you want to transcribe vast\
    \ amounts of audio.\n\nWhisper supports audio in `flac`, `mp3`, `mp4`, `mpeg`,\
    \ `mpga`, `m4a`, `ogg`, `wav`, or `webm` formats. Regardless of the format that\
    \ you use, the maximum file size to send to the API is 25MB.\n\nNow, if you haven’t\
    \ worked extensively with audio files, please be aware that some formats create\
    \ *really huge* files (e.g., `wav` format) and others create really small files\
    \ (e.g., `m4a` format). So, converting your file to a different format can help\
    \ you with the 25MB limitation. However, later in this chapter, we’ll see the\
    \ code for a tool that takes a single large audio file and splits it into multiple,\
    \ smaller files.\n\n## Using `OpenAI.audio.transcriptions.create()` to Transcribe\
    \ Audio\n\nThe `OpenAI.audio.transcriptions.create()` method converts audio into\
    \ text and is only compatible with the Whisper model. Let’s take a look at Table\
    \ [5-1](#615442_1_En_5_Chapter.xhtml#Tab1) to find out what needs to be in the\
    \ method parameters in order to call it successfully.\n\n**Table 5-1** The Request\
    \ Body for Whisper\n\n| Field | Type | Required? | Description |\n| --- | ---\
    \ | --- | --- |\n| `file` | `File` | Required | The entire audio file that you\
    \ want to be transcribed. Accepted formats are `flac`, `mp3`, `mp4`, `mpeg`, `mpga`,\
    \ `m4a`, `ogg`, `wav`, `webm`. |\n| `model` | `String` | Required | The ID of\
    \ the model that you want to use for transcription. Compatible models include\
    \ `whisper-1`. |\n| `prompt` | `String` | Optional | This is any text that can\
    \ be provided to change the model's transcription style or to provide it with\
    \ more context from a previous segment of audio. Be sure that the prompt is in\
    \ the same language as the audio for best results. Additionally, this field can\
    \ be used to change the spelling or capitalization of any words that Whisper is\
    \ not familiar with. |\n| `response_format` | `String` Default: `json` | Optional\
    \ | This is the format of the output of transcription. Accepted formats are `json`,\
    \ `text`, `srt`, `verbose_json`, `vtt`. |\n| `temperature` | `Number` Default:\
    \ `0` | Optional | This is the sampling temperature, ranging from 0 to 1. A higher\
    \ value increases the randomness of the output, whereas a lower value ensures\
    \ a more deterministic output. |\n| `language` | `String` | Optional | This is\
    \ the language of the input audio. It’s optional, but providing the value can\
    \ improve the accuracy and latency for the transcription. |\n\n### Examining the\
    \ Method Parameters"
