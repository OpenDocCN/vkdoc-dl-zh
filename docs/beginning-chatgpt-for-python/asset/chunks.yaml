    # 3. Creating a Basic ChatGPT Client in Python


    The purpose of this chapter is plain and simple. We’re going to build the most
    powerful ChatGPT client available using only a few lines of code in python. This
    client will do a lot more than what you’re able to do using the ChatGPT website
    and will provide you more options than what is available using the Chat Playground
    that we saw in Chapter [1](#615442_1_En_1_Chapter.xhtml).


    ## Creating Our ChatGPT Chat Completion Application, `chatgpt_client.py`


    Listing [3-1](#615442_1_En_3_Chapter.xhtml#PC1) is the code for our ChatGPT client,
    `chatgpt_client.py`.


    ```

    """

    Script to demonstrate API call using OpenAI''s GPT-4 for chat completions.

    """

    from dotenv import load_dotenv

    from openai import OpenAI

    # Load environment variables from .env

    load_dotenv()

    #instantiate the OpenAI object

    client = OpenAI()

    response = client.chat.completions.create(

    model="gpt-4o",

    messages=[

    {

    "role": "system",

    "content": "You are a Python developer"

    },

    {

    "role": "user",

    "content": "Why is Python typically used for data science?"

    }

    ],

    temperature=0.85,

    max_tokens=1921,

    top_p=1,

    frequency_penalty=0,

    presence_penalty=0

    )

    print(response)

