- fmt: '## We Have a Monumental Achievement…with One Slight Flaw


    OK, if you step back and examine what we have achieved so far, you should realize
    that we''re looking at what is nothing short of a monumental achievement. We have
    the following:


    - A system made up of a few scripts that allows users to type in questions and
    get answers about how to use our mobile application.

    - Using a simple text file, we can teach our bot how to answer the questions from
    our users. This text file can be edited by anyone in the company and can be used
    as a knowledge base to help improve the intelligence of the bot day by day. This
    is amazing stuff.

    - Our system allows customers to type their questions using natural language,
    and the bot provides an intelligent answer back to them. And do you know what?
    Customers don''t like reading FAQs – especially really long ones. However, using
    this system, they don''t need to! All they have to do is ask the question that
    is relevant to them.


    So, with all this that we have accomplished, there’s one *gigantic* flaw that
    we can’t ignore. In Listing [7-5](#615442_1_En_7_Chapter.xhtml#PC15) above, the
    bot said to the user:


    ```

    Once you''re logged in, you can set up Touch ID or Face ID for quicker, secure
    login in the future.

    ```


    No, no, no! Bad bot! In case you didn’t read the Frequently Asked Questions file
    completely, please allow me to explain what went wrong here:


    1. The `FAQ.txt` file in Listing [7-1](#615442_1_En_7_Chapter.xhtml#PC1) clearly
    states that the Crook’s Bank mobile app is a mobile app. Currently, Touch ID can
    only be used on Apple desktop and laptop computers. So, this doesn’t even make
    sense.

    2. The `FAQ.txt` file has no mention of Face ID for authentication to the mobile
    app at all.


    So unfortunately, ChatGPT is making up things that are simply not true and is
    assuming that certain features exist that are not present. So, for the purposes
    of true tech support, this is absolutely unacceptable.


    So, how do we solve this problem? Think about how *you* could solve this problem
    for a second before reading the next section.


    ## Update the System Message to ChatGPT, and Let’s Try Again


    Have you come up with a solution yet? One way to resolve this issue is to update
    the system message. Refer to the following line in Listing [7-2](#615442_1_En_7_Chapter.xhtml#PC9)
    above:


    ```

    system_message_to_chatgpt = "You are a virtual assistant that provides support
    for the Crooks Bank banking app. ";

    ```


    Remember that the system message indicates to ChatGPT what its role is in the
    chat conversation. Right now, it is told to be a helpful assistant, and therefore,
    it has taken the liberty in order to guess that certain features exist within
    the mobile application. Now, let''s ensure that ChatGPT does not provide any assumptions.
    Update the system message to be as shown below:


    ```

    system_message_to_chatgpt = "You are a virtual assistant that provides support
    for the Crooks Bank banking app. You will be provided Information about the application,
    and users will ask you questions about the application. Your role is to answer
    questions explicitly from the training information. If you were not given an answer
    to a question, then provide an apologetic message to the user explaining that
    you do not know the answer.";

    ```


    And that’s it. The `FAQ.txt` file remains exactly the same as before, and all
    we needed to do is to update the system message to let ChatGPT know its role in
    the conversation. Listing [7-6](#615442_1_En_7_Chapter.xhtml#PC19) has the new
    conversation between us and the Discord bot.


    ```

    Me: How are you today?

    Q and A Bot: As a virtual assistant, I don''t have feelings or emotions, but I''m
    here and ready to assist you. How may I help you with the Crooks Bank Mobile App
    today?

    Me: I have an old Blackberry phone, is the app supported on my device?

    Q and A Bot: I''m sorry, but from the information provided, the Crooks Bank Mobile
    App can only be downloaded from the App Store for iOS devices and Google Play
    for Android devices. BlackBerry devices are not mentioned, therefore I cannot
    confirm that it would be compatible.

    Me: So, if I use an iPhone, how do I setup the app?

    Q and A Bot: To set up the Crooks Bank Mobile App on your iPhone, you can download
    it from the App Store. Simply search for "Crooks Bank Mobile App" and click the
    "Install" button. After the installation is finished, open the app and follow
    the prompts to set up your account. If you already have an account, use your login
    information to access your account through the app.

    Listing 7-6

    Our Second (and Better) Conversation with the Intelligent Q&A Discord Bot

    ```


    Now, that’s a lot better! Our tech support bot is “sticking to the script” and
    is not allowed to make up or assume anything.


    ## Conclusion


    In this chapter, we’ve accomplished a lot! We have a fully functioning Discord
    bot that can be trained by anyone without any experience in AI, NLP, or machine
    learning using a simple text file. We learned that a “helpful assistant” may at
    times become *too helpful* and assume facts that are not true. However, we also
    reiterated the concept and the value of the system message, which is an important
    part of prompt engineering.


    Now that we have made our Q&A Discord bot to be intelligent, let’s find out how
    to make our content moderator bot to be intelligent as well!'
