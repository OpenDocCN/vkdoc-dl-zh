- "# 11. 文本生成：下一个词预测\n\n本章探讨了在给定前序词序列的情况下，如何生成文本或预测下一个词。用例或应用包括在 Gmail 中撰写电子邮件或在 LinkedIn\
  \ 中发送文本消息时的单词/句子建议，以及机器写诗、文章、博客、小说章节或期刊论文。\n\n图 11-1 显示了一封写给 Adarsha 的电子邮件。当输入单词\
  \ *Hope* 时，Gmail 会推荐下一组单词 *you are doing well*。这是文本生成的最佳应用。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig1_HTML.jpg](img/517793_1_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1** 文本生成示例\n\n文本生成模型是使用最先进的深度学习算法构建的，尤其是 RNN 和注意力网络的变体。\n\n文本生成是一个序列到序列（seq2seq）建模问题。这些生成模型可以在字符级别、单词级别、词组级别、句子级别或段落级别构建。\n\
  \n本项目探讨了通过实现和构建最先进的循环网络变体及预训练模型来创建能够生成文本的语言模型。\n\n## 问题陈述\n\n探讨如何为文本生成应用（例如基于前一个词或一组词进行下一个词预测或句子预测）构建一个序列到序列模型。\n\
  \n\n\n## 方法：理解语言建模\n\n`seq2seq` 模型是许多自然语言处理模型的关键组成部分，例如翻译、文本摘要和文本生成。\n\n在此，模型被训练用于预测下一个单词或单词序列。\n\
  \n让我们看看如何为文本生成任务（如下一个单词预测）构建一个 `seq2seq` 模型。假设这是用于训练模型的数据。理想情况下，源数据应非常庞大，包含所有可能的句子和单词组合。\n\
  \n以下是一个输入示例：\n\n`I use a MacBook for work, and I like Apple.`\n\n表 11-1 展示了如何将这些数据转换为下一个单词预测模型所需的格式。\n\
  \n**表 11-1.** 数据转换\n\n| 输入 | 输出（目标） |\n| --- | --- |\n| `I` | `use` |\n| `Use` |\
  \ `MacBook` |\n| `MacBook` | `for` |\n| `For` | `my` |\n| `My` | `work` |\n| `Work`\
  \ | `and` |\n| `And` | `I` |\n| `I` | `like` |\n| `Like` | `Apple` |\n| `I use`\
  \ | `MacBook` |\n| `use MacBook` | `for` |\n| … |  |\n| `I use` | `MacBook for`\
  \ |\n| … |  |\n\n我们按顺序为一元组、二元组等所有组合创建输入和输出。它可以是一对多、多对一或多对多，以相应地表示输入和输出；因此，它被称为 `seq2seq`\
  \ 模型。\n\n由于捕捉上下文至关重要，我们首先想到的模型是 `RNN` 及其变体。因此，我们可以从基本的 `LSTM` 架构开始，然后探索诸如双向 `LSTM`、自编码器、注意力机制和\
  \ Transformer 等架构。\n\n此外，让我们看看一些最新的、最先进的用于 `seq2seq` 和文本生成模型的预训练模型。\n\n以下是针对 `seq2seq`\
  \ 或文本生成模型不同训练方式的三个逻辑流程图。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig4_HTML.jpg](img/517793_1_En_11_Fig4_HTML.jpg)\n\
  \n**图 11-4** 使用预训练模型\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig3_HTML.jpg](img/517793_1_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3** 迁移学习\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig2_HTML.jpg](img/517793_1_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2** 从头开始训练\n\n*   从头开始训练模型（见图 11-2）\n*   迁移学习（见图 11-3）\n*   直接使用预训练模型（见图\
  \ 11-4）\n\n现在你已经了解了如何处理文本生成模型，让我们进入不同的实现方式。\n\n## 实现\n\n首先，让我们探索几种不同的方法，使用深度学习从头开始开发一个基于文本的语言模型。\n\
  \n### 模型 1：词到词的文本生成\n\n模型被训练用于捕捉两个单词序列之间的关系，将第一个单词视为输入，第二个单词视为目标（输出）。注意：导入所有必需的库。\n\
  \n第一步是将源文本中的每个小写文本的输入序列转换为向量。\n\n```python\n# 训练数据（我们从互联网（博客）中随机选取了几个段落）\n#数据源链接\
  \ 1: maggiesmetawatershed.blogspot.com\n#数据源链接 2: www.humbolt1.com\ntext = \"\"\"\
  She's a copperheaded waitress,\ntired and sharp-worded, she hides\nher bad brown\
  \ tooth behind a wicked\nsmile, and flicks her ass\nout of habit, to fend off the\
  \ pass\nthat passes for affection.\nShe keeps her mind the way men\nkeep a knife—keen\
  \ to strip the game\ndown. The ladies men admire, I've heard,\nWould shudder at\
  \ a wicked word.\nTheir candle gives a single light;\nThey'd rather stay at home\
  \ at night.\nThey do not keep awake till three,\nNor read erotic poetry.\nThey never\
  \ sanction the impure,\nNor recognize an overture.\nThey shrink from\"\"\"\n# 文本编码\n\
  # 为了对句子进行分词，我们使用 Tokenizer 函数\ntoken = Tokenizer()\ntoken.fit_on_texts([text])\n\
  #将文本转换为特征\nohe = token.texts_to_sequences([text])[0]\n```\n\n让我们构建词汇维度。\n\n```python\n\
  # 文本词汇维度\ntext_dim = len(token.word_index) + 1\n```\n\n然后我们需要创建包含输入和输出单词的训练数据。\n\
  \n```python\n# 词到词序列\n#创建空列表\nseq = list()\nfor k in range(1, len(ohe)):\n    seq1\
  \ = ohe[k-1:k+1]\n    #追加到列表\n    seq.append(seq1)\n# 将文本转换为输入和输出\nseq = np.array(seq)\n\
  I, O = seq[:,0], seq[:,1]\n```\n\n让我们对输出进行编码。\n\n```python\n# 编码 y 变量\nO = keras.utils.np_utils.to_categorical(O,\
  \ num_classes=text_dim)\n```\n\n现在让我们定义一个 `seq2seq` 模型。\n\n```python\n#初始化\nmod\
  \ = Sequential()\n#添加嵌入层\nmod.add(Embedding(text_dim, 10, input_length=1))\n#添加\
  \ LSTM 层\nmod.add(LSTM(50))\n#添加密集层\nmod.add(Dense(text_dim, activation='softmax'))\n\
  print(mod.summary())\n```\n\n图 11-5 显示了模型训练输出。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig5_HTML.jpg](img/517793_1_En_11_Fig5_HTML.jpg)\n\
  \n**图 11-5** 输出\n\n从技术上讲，我们模拟了一个多类分类问题（预测词汇表中的单词），因此让我们使用带有交叉熵损失的分类函数。这里我们使用 `Adam`\
  \ 优化器来优化成本函数。\n\n```python\n# 运行网络\nmod.compile(loss='categorical_crossentropy',\
  \ optimizer='adam', metrics=['accuracy'])\n#训练\nmod.fit(I, O, epochs=600)\n#输出\n\
  ```\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Figa_HTML.jpg](img/517793_1_En_11_Figa_HTML.jpg)\n\
  \n调整模型后，我们通过传入词汇表中的单词并预测下一个单词来测试它。我们得到完整的预测输出。\n\n```python\n#预测输入\ninp = 'ladies'\n\
  #转换为特征\ndummy = token.texts_to_sequences([inp])[0]\ndummy = np.array(dummy)\n#预测\n\
  y1 = mod.predict_classes(dummy)\nfor word, index in token.word_index.items():\n\
  \    if index == y1:\n        print(word)\n#输出\nmen\n```\n\n现在让我们预测单词序列。\n\n```python\n\
  # 预测单词序列\ndef gen_seq(mod, token, seed, n):\n    inp, op = seed, seed\n    for _\
  \ in range(n):\n        # 将文本转换为特征\n        dummy = token.texts_to_sequences([inp])[0]\n\
  \        dummy = np.array(dummy)\n        # 预测\n        y1 = mod.predict_classes(dummy)\n\
  \        outp = ''\n        for word, index in token.word_index.items():\n     \
  \       if index == y1:\n                outp = word\n                break\n  \
  \      # 追加\n        inp += ' ' + outp\n    return inp\n```\n\n让我们使用一些输入元素来获得合理的序列输出。\n\
  \n```python\nprint(gen_seq(mod, token, 'wicked', 1))\n#输出:\nwicked word\n```\n\n\
  当输入单词 `wicked` 时，模型预测出下一组序列单词：`word their candle gives a`。\n\n考虑到训练规模较小，这个结果是合理的。如果你在更大的数据和\
  \ GPU 上进行训练，准确率会提高。\n\n\n\n### 模型 2：逐句处理\n\n另一种方法是将输入划分为一个词序列（逐句处理）。这种方法有助于更好地理解上下文，因为我们使用的是词序列。这样做是为了避免跨多行预测单词。如果我们只想建模和生成文本行，那么这些词目前可能适用。\n\
  \n首先，进行分词。\n\n```python\n# 句子到句子序列\n# 创建空列表\nseq = list()\nfor tex in text.split('\\\
  n'):\n# 将文本转换为特征\ndum = token.texts_to_sequences([tex])[0]\nfor k in range(1, len(dum)):\n\
  seq1 = dum[:k+1]\n# 追加到列表\nseq.append(seq1)\n```\n\n得到序列后，我们对其进行填充，使其长度固定一致。\n\n\
  ```python\n# 填充\nlength = max([len(s) for s in seq])\nseq = pad_sequences(seq, maxlen=length,\
  \ padding='pre')\n```\n\n然后，将序列划分为输入和目标。\n\n```python\n# 划分\nseq = np.array(seq)\n\
  I, O = seq[:,:-1],seq[:,-1]\n# 对输出变量进行编码\nO = keras.utils.np_utils.to_categorical(O,\
  \ num_classes=text_dim)\n```\n\n模型定义和初始化代码与之前的方法相同，但输入序列不再只是单个词。因此，将 `input_length`\
  \ 改为 `len-1`，并重新运行相同的代码。\n\n图 11-6 显示了模型训练的输出。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig6_HTML.jpg](img/517793_1_En_11_Fig6_HTML.jpg)\n\
  \n**图 11-6** 输出\n\n现在，像之前一样，使用这个训练好的模型来生成新的序列。\n\n```python\n# 预测下一个词\ndef gen_seq(mod,\
  \ token, length, seed, n):\ninp = seed\nfor _ in range(n_words):\n# 将文本转换为特征\ndum\
  \ = token.texts_to_sequences([inp])[0]\ndum = pad_sequences([dum], maxlen=length,\
  \ padding='pre')\n# 预测\ny1 = mod.predict_classes(dum)\noutp = ''\nfor word, index\
  \ in token.word_index.items():\nif index == y1:\noutp = word\nbreak\ninp += ' '\
  \ + outp\nreturn inp\nprint(gen_seq(mod, token, length-1, 'she hides her bad', 4))\n\
  print(gen_seq(mod, token, length-1, 'hides', 4))\n# 输出\nshe hides her bad the way\
  \ men i've\nhides bad shudder at a\n```\n\n### 模型 3：输入词序列与输出词\n\n我们使用三个输入词来预测一个输出词，如下所示。\n\
  \n```python\n# 编码 2 个词 - 1 个词\n# 创建空列表\nseq = list()\nfor k in range(2, len(ohe)):\n\
  seq1 = ohe[k-2:k+1]\n# 追加到列表\nseq.append(seq1)]\n```\n\n模型初始化和构建步骤与之前相同。\n\n让我们看看预测结果如何。\n\
  \n```python\n# 预测\nprint(gen_seq(mod, token, len-1, 'candle gives', 5))\nprint(gen_seq(mod,\
  \ token, len-1, 'keeps her', 3))\n```\n\n输出：\n\n```\ncandle gives a a wicked light\
  \ light\nkeeps her mind the way\n```\n\n如果你留意输出或下一个词的预测，效果并不理想。在某些情况下，它会预测相同的词。然而，如果我们在拥有海量数据的大型机器上训练这个模型/框架，我们可以期待良好的结果。此外，如第\
  \ 10 章所述，还需要对输出进行后处理。\n\n为了克服任何问题，我们可以利用迁移学习的概念，使用预训练模型，就像我们在文本摘要中所做的那样。\n\n在此之前，让我们探索一些稍大的数据集，使用已构建的框架来构建一个文本生成模型。\n\
  \n该数据集包含莎士比亚先生的十四行诗。\n\n图 11-7 显示了整个数据集中出现频率最高的词：\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig7_HTML.jpg](img/517793_1_En_11_Fig7_HTML.jpg)\n\
  \n**图 11-7** 输出\n\n在这里，你可以看到像 *the*、*end* 和 *i* 这样的常见词在输入数据中被大量使用。因此，你可以有把握地假设模型对这些词存在偏差。\n\
  \n图 11-8 显示了数据集中出现频率最低的词。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig8_HTML.jpg](img/517793_1_En_11_Fig8_HTML.jpg)\n\
  \n**图 11-8** 输出\n\n图 11-8 显示了在数据集中极少使用的词，因此模型很少从这些词中预测单词。\n\n与之前的框架一样，这包括文本的分词、词汇表和逆词汇表的构建，以及输入文本序列批次的构建。\n\
  \n```python\n## 我们使用这个函数来清洗文本并进行分词。\ndef clean_text(doc):\ntoks = doc.split()\n\
  tab = str.maketrans('', '', string.punctuation)\ntoks = [words.translate(table)\
  \ for words in toks]\n# 只考虑包含字母的词。\ntoks =[words for words in toks if words.isalpha()]\n\
  #### 转换为小写\ntoks = [words.lower() for words in toks]\nreturn toks\n```\n\n词汇表被构建，其中每个词根据句子集合映射到一个索引。`counter`\
  \ 为文本中的每个词形成键/值对。`counter` 是一个容器，它将词存储为键，将其计数存储为值。\n\n逆词汇表被维护，其中存在从索引到词的映射。这是通过使用\
  \ `enumerate` 函数完成的。这会以计数器和元素的形式生成元组。\n\n我们可以利用上一节中使用的相同模型定义代码，并根据此数据集更改 `input_length`\
  \ 和 `vocab_size`。\n\n图 11-9 说明了模型的工作原理。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig9_HTML.jpg](img/517793_1_En_11_Fig9_HTML.jpg)\n\
  \n**图 11-9** 输出\n\n采样后，使用输入文本中的词生成新文本，如模型中所示。由于模型是在莎士比亚十四行诗上训练的，因此模型可以生成后续的词。\n\n\
  图 11-10 显示了输出。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig10_HTML.jpg](img/517793_1_En_11_Fig10_HTML.jpg)\n\
  \n**图 11-10** 输出\n\n到目前为止，你已经了解了如何训练一个 seq2seq 模型用于文本生成任务。我们可以利用相同的框架在海量数据和 GPU\
  \ 上进行训练以获得更好的结果，并向模型架构中添加更多层，例如双向 LSTM、Dropout、编码器-解码器和注意力机制。\n\n接下来，让我们看看如何利用一些最先进的预训练模型来完成文本生成任务。\n\
  \n\n\n### GPT-2（高级预训练模型）\n\n`GPT-2` 代表生成式预训练 Transformer 第二版。它是一个基于 Transformer\
  \ 构建的庞大架构，拥有数十亿个超参数，并在互联网上 50 GB 的文本数据上进行了训练。`GPT-2` 模型专为文本生成任务而设计。`GPT-2` 是 `GPT-1`\
  \ 的改进版本。`GPT` 在性能上优于其他特定领域的模型。\n\n有关 `GPT` 及其版本的更多信息，请参考我们的书籍 *《自然语言处理实战：利用机器学习和深度学习解锁文本数据》*（Apress，2021\
  \ 年）。\n\n对 `GPT` 的详细解释超出了本书的范围。有关 `GPT-1`、`2`、`3` 的更多信息，请参阅 [`https://openai.com/research/`](https://openai.com/research/)\
  \ 上的研究论文。\n\n`GPT-2` 有四种不同的版本可供使用。\n\n本章使用的是一个拥有约 7 亿参数的大型模型。该模型的 `transformers`\
  \ 库包含了其不同版本的权重。这是一个最先进的模型，我们希望尽可能通用地使用它，因此我们不会在此进行自定义训练。我们将使用它，并创建一个自定义函数，根据给定的输入词生成输出。\n\
  \n```\nImport and initialize gpt2\n!pip install transformers\nimport torch\nimport\
  \ transformers\n#import tokenization and pre trained model\nftrs = transformers.GPT2Tokenizer.from_pretrained('gpt2')\n\
  pre_g_model = transformers.GPT2LMHeadModel.from_pretrained('gpt2')\n#input text\n\
  input_text=\"We are writing book on NLP, let us\"\n# tokenization for input text\n\
  input_tokens = ftrs.encode(input_text,return_tensors=\"pt\")\n#sequences generated\
  \ from the model\nseq_gen = pre_g_model.generate(input_ids=input_tokens,max_length=100,repetition_penalty=1.4)\n\
  seq_gen = seq_gen.squeeze_()\n# predicted sequences\nseq_gen\ntensor([ 1135,   389,\
  \  3597,  1492,   319,   399, 19930,    11,  1309,   514,\n760,   644,   345,  \
  \ 892,    13,   198,   464,   717,  1517,   356,\n761,   284,   466,   318,   651,\
  \   262,  1573,   503,   546,   340,\n290,   787,  1654,   326,   661,  1833,  \
  \ 703,  1593,   428,  2071,\n1107,   373,   329,   606,   526, 50256])\n# lets get\
  \ the words from decoder\ntxt_gen = []\nfor i, j in enumerate(seq_gen):\nj = j.tolist()\n\
  txt = ftrs.decode(j)\ntxt_gen.append(txt)\n# final text generated\ntext_generated\
  \ = ''\ntext_generated.join(txt_gen).strip('\\n')\n#output\n```\n\nWe are writing\
  \ a book on NLP; let us know what you think.\n\nThe first thing we need to do is\
  \ get the word out about it and make sure that people understand how important this\
  \ issue is to them.\"<|endoftext|>\n\n这个示例给出了有意义的输出。我们没有对模型进行微调或重新训练任何数据，它就能推导出上下文并预测下一组词。你可以根据需要更改参数，其中\
  \ `max_length` 指的是要预测的最大单词数，`n_seqs` 指的是不同序列的数量（即根据需求，从同一输入生成的不同输出的数量）。我们得到的结果相当有趣。\n\
  \n总而言之，这个模型在文本生成任务上的表现超出了我们的预期。\n\n**注意**\n\n`GPT-3` 的架构与 `GPT-2` 相似。主要区别在于注意力层、词嵌入大小和激活函数参数。\n\
  \n现在，让我们继续探讨另一个有趣的库，它可以在大多数需要文本输入的应用中发挥作用。例如，这个智能系统通过推荐在搜索引擎或 WhatsApp 消息中要写的内容来节省时间。\n\
  \n### 自动补全/建议\n\n我们已经研究过几个文本生成模型，其中一些是在相对非常小的数据库上进行本地训练的。另一个是 `GPT-2`，这是一个最先进的 NLP\
  \ 通用模型，用于逐词生成文本。现在是时候根据不完整/拼写错误的字符来预测下一个词了。最终，我们想要寻找的是“增量搜索，又称自动补全，又称自动建议”。在这里，当你输入文本时，系统会找到可能的匹配项并立即呈现给你。大多数此类应用都在搜索引擎中启用。\n\
  \n图 11-11 展示了自动单词建议的工作原理。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig11_HTML.jpg](img/517793_1_En_11_Fig11_HTML.jpg)\n\
  \n**图 11-11** 自动建议示例\n\n#### 快速自动补全\n\n`Fast Autocomplete` 库（由 zepworks 开发）能够高效地搜索词库。该库完全基于\
  \ Python 语言。在内部，它为词库中的每个唯一单词构建了一个字典树。该库中使用的数据结构称为 `Dwg`，代表*有向词图*。\n\n```\nInstall\
  \ the library:\n!pip install fast-autocomplete\n```\n\n要使用这个库，我们需要从数据中提取词元，并将其放入特定格式，作为模型在用户输入时提供建议的上下文。\n\
  \n让我们使用之前用过的相同数据，其中包含莎士比亚的十四行诗，并编写函数从中提取单词。\n\n以下是从语料库中提取唯一词元的函数。\n\n```\ndef unique_tokens(location):\n\
  to_doc = read_csv_gen(location, csv_func=csv.DictReader)\ntoks = {}\nfor row in\
  \ to_doc:\ndistinct_words = row['distinct_words']\nindex = row['index']\nif distinct_words\
  \ != index:\nlocal_words = [index, '{} {}'.format(distinct_words, index)]\nwhile\
  \ local_words:\nw = local_words.pop()\nif w not in toks:\ntoks[w] = {}\nif distinct_words\
  \ not in toks:\ntoks[distinct_words] = {}\nreturn toks\nprint(toks)\n```\n\n图 11-12\
  \ 显示了词元输出。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig12_HTML.jpg](img/517793_1_En_11_Fig12_HTML.jpg)\n\
  \n**图 11-12** 输出\n\n类似地，如果有同义词，我们可以提供一个预定义的字典。\n\n最后，我们初始化自动补全模型。\n\n```\nfrom fast_autocomplete\
  \ import AutoComplete\nautocomplete = AutoComplete(words=toks)\n```\n\n现在我们已经向模型提供了数据上下文，只需调用\
  \ `autocomplete` 库中的 `search` 函数，即可根据提供的上下文/数据获得自动单词建议。它只需要三个参数。\n\n*   `Word`：你想要输入的单词\n\
  *   `Max_Cost`：距离度量成本\n*   `Size`：建议的单词数量\n\n图 11-13 展示了搜索像 *straw* 这样的单词。建议包括 *straws*\
  \ 和 *strawberry*。类似地，我们尝试了 *tr*、*hag*、*sc* 和 *mam*。\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig13_HTML.png](img/517793_1_En_11_Fig13_HTML.png)\n\
  \n**图 11-13** 输出\n\n你看到了单个单词建议是如何工作的。类似地，你可以实现多个单词序列的建议。有关更多信息，请参考 [`https://pypi.org/project/fast-autocomplete/`](https://pypi.org/project/fast-autocomplete/)。\n\
  \n## 结论\n\n我们使用不同的技术和库实现了多种语言建模方法，用于文本生成。所有这些模型都是基线模型，可以通过使用更大的训练数据和更强大的 GPU 进行改进。\n\
  \n文本生成有广泛的应用，我们可以利用本章讨论的框架，并根据用例使用特定领域的训练数据。有一个很棒的 Git 应用程序可以从注释生成代码，反之亦然。\n\n你已经看到并实现了一些复杂的算法，并学习了一些\
  \ NLP 和深度学习领域的最先进算法。第 12 章将讨论 NLP 和深度学习的下一步发展方向。接下来该往哪里走？我们将揭示一些有趣的研究领域。\n\n\n\n"
- '# 12. 结论与未来趋势


  你已经学会了如何利用机器学习和深度学习的力量构建不同的自然语言处理（NLP）应用和项目，这有助于解决跨行业的业务问题。


  本书重点介绍了以下方面：


  -   分类（电商产品分类、投诉分类、Quora 重复问题预测）

  -   聚类（TED 演讲分割及其他文档聚类）

  -   摘要（新闻标题摘要）

  -   主题提取（简历解析与筛选）

  -   实体识别（使用`CRF`从电影情节中提取自定义实体）

  -   相似度（简历筛选与排序）

  -   信息检索（基于 AI 的语义搜索，智能搜索引擎如何提升电商客户体验）

  -   生成（下一个词预测、自动补全）

  -   信息抽取（简历解析）

  -   翻译（多语言搜索）

  -   对话式 AI（聊天机器人与问答）


  你还了解了部分最新的 SOTA（最先进）算法如何构建更健壮的模型和应用。


  ## 接下来该往哪走？


  NLP 和深度学习在研究领域非常活跃。在你阅读本文时，许多新算法正在被设计出来，以提升应用的智能水平，并使 NLP 更高效、更用户友好。


  关于下一代 NLP 的更多信息，请参阅我们的书籍 *《自然语言处理实战：利用 Python 和机器学习与深度学习解锁文本数据》*（Apress，2019 年）。


  围绕 NLP 的最新及未来趋势可分为两个方面：


  -   深度（技术与算法）

  -   广度（应用与用例）


  本书简要介绍了一些活跃的研究领域（深度方面）：


  -   **词嵌入的进展**：你了解了`word2vec`、`GloVe`、`BERT`、`Transformers`和`GPT`。我们可以关注这一领域，期待更多基于
  Transformer 和 Reformer（最新、最先进的 Transformer 变体，具有可逆层）改进的 SOTA 文本特征算法。

  -   **用于 NLP 的先进深度学习**：当前主流技术围绕`LSTM`、`GRU`、双向`LSTM`、自编码器、注意力机制、Transformer 和自回归层。未来几年，我们可以期待为
  NLP 任务设计出更高效、更完善的深度学习和 Transformer 架构。

  -   **强化学习在 NLP 中的应用**。

  -   **迁移学习与预训练模型**：我们使用了许多 SOTA 预训练模型来解决摘要、生成和搜索问题。在不久的将来，我们可以期待更多通用、健壮、高效且更准确的预训练模型和迁移学习框架。

  -   **NLP 中的元学习**。

  -   **用于 NLP 的胶囊网络**：以其多任务处理能力而闻名，单个训练好的模型可以解决多样化的问题并执行多项 NLP 任务。

  -   **集成/结合监督与无监督方法**：为任何任务训练模型都需要大量数据，尤其是标注数据。这个时代最大的挑战之一是获取准确标注的数据。这通常是一个手动过程，但在海量数据上执行需要大量的时间和资源。因此，结合无监督和监督方法来解决模型训练中标注数据挑战的研究非常活跃。


  除了这些技术深度领域，从更广泛的 NLP 视角来看，还有几个领域：


  -   NLP 自动化：`AutoNLP`

  -   文本可以是任何语言：多语言 NLP

  -   对话式 AI

  -   特定领域和行业的训练模型

  -   NLP 与计算机视觉的结合


  让我们逐一了解。


  ## AutoNLP


  作为一名数据科学家，创建优秀的机器学习和深度学习模型来训练和实施各种 NLP 相关任务需要大量的技能和时间。在选择正确的参数、优化、调试以及在新数据上测试时，可能会面临挑战。对于熟练的数据科学家来说，这不算大问题，但仍然很耗时。如果我们能使用某种框架来自动化所有流程，提供可视化，并以最小的误差获得出色的结果，那会怎样？


  Hugging Face 的`AutoNLP`就是答案！


  ### 什么是 AutoNLP？


  它让你能够轻松地预处理、训练、调优和评估用于各种任务的 NLP 模型或算法，省去诸多麻烦。


  Hugging Face 是一家下一代 NLP 初创公司，帮助专业人士和公司轻松构建和实验最先进的 NLP 和深度学习模型。你可以在[`https://huggingface.co/`](https://huggingface.co/)上进行大量探索和研究。


  以下是`AutoNLP`的主要特点：


  -   根据你的数据自动选择最佳模型

  -   自动微调

  -   自动超参数优化

  -   训练后模型比较

  -   训练后立即部署

  -   提供`CLI`和 Python API


  它支持二分类、多分类、实体抽取、文本摘要、问答和语音识别。


  图 12-1 展示了 Hugging Face `AutoNLP`在其可执行任务和支持语言方面的能力。


  ![../images/517793_1_En_12_Chapter/517793_1_En_12_Fig1_HTML.jpg](img/517793_1_En_12_Fig1_HTML.jpg)


  **图 12-1** Hugging Face


  因此，它支持多种语言，这是另一个趋势。


  `AutoNLP`可以通过最少的人工干预执行各种 NLP 相关任务，让我们的生活变得更加轻松。我们正处于技术日新月异的时代。通过 NLP，我们正在使人与机器的交流变得像人与人交流一样个性化。因此，在未来几年，有许多
  NLP 趋势值得我们期待。


  除了`AutoNLP`，Hugging Face 还拥有多个其他自定义的 SOTA 预训练模型、框架和 API。


  在`AutoNLP`中，你还可以微调托管在 Hugging Face Hub 上的模型。那里有超过 14,000 个可用模型，可以根据你想要执行的任务、偏好的语言或你想使用的数据集（如果托管在
  Hugging Face 上）进行筛选。


  Hugging Face 数据集库目前拥有超过 100 个公共数据集。


  以下是 Hugging Face 的一些模型：


  -   `BERT-base`

  -   `RoBERTa`

  -   `DistilBERT`

  -   `Sentence Transformers`

  -   `GPT-2`

  -   `T5-base`

  -   `ALBERT`


  大约有 14,000 个模型（每天都在增加）。你可以应用过滤器来获取符合你需求的模型。


  以下是 Hugging Face 的一些摘要任务模型：


  -   `Distilbart-xsum`

  -   `Bart-large-cnn`

  -   `Pegasus-large`

  -   `Mt5`


  让我们进入下一个趋势技术。




  ## 多语言自然语言处理


  以下是最突出的多语言模型。


  - `mBERT`

  - `XLM`

  - `XLM-R`

  - 多语言 BERT（`mBERT`）：该模型与 BERT 一同发布，支持 104 种语言。本质上，它是在多种语言上训练得到的 BERT。

  - `XLM` 和 `XLM-R`：`XLM-R` 在规模庞大的多语言数据集上以巨大规模训练了 `RoBERTa`。


  直到最近，大多数自然语言处理领域的进展都集中在英语上。像谷歌和 Facebook 这样的大型科技组织正在推出预训练的多语言系统，其整体性能与英语系统相当。


  在 Facebook 上，如果有人在时间线上发布了中文内容，可以选择将其翻译成英语。


  最初，亚马逊的 Alexa 只理解英语。现在，它已扩展到支持印度市场的印地语版本。


  因此，这两个例子都使用了多语言自然语言处理模型来理解不同的语言。


