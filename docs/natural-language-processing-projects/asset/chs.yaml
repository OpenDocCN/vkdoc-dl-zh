  for filename in os.listdir(file_path):

  # 如果文档是 pdf 格式，则执行此代码

  if(filename.endswith(".pdf")):

  try:

  fileTXT.append(pdf_extractor(file_path+filename)) # 此处使用 pdf_extractor 函数提取 pdf
  文件

