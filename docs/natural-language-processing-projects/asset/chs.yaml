  '''')

  Prod_cat_data[''description''] = Prod_cat_data[''description''].str.replace(r''\s+'',
  '' '')# 移除单个字符

  Prod_cat_data[''description''] = Prod_cat_data[''description''].apply(lambda a:
  " ".join(a for a in a.split() if len(a)>1))

  Prod_cat_data[''description''][4]

  ```


