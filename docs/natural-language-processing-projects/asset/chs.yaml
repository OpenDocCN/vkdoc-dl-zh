  , text)\n        if(pt3 != None):\n            # 将匹配到的所有字符串分组\n            p = pt3.group()\n\
  \        if(p == 0):\n            return 0\n        # findall 查找 compile 中定义的模式\n\
  \        ep = re.findall('[0-9]{1,2}', p)\n        ep_int = list(map(int, ep))\n\
