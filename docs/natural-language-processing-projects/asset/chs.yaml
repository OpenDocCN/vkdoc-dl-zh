  图 7-1


  无监督学习流程


  以下是无监督学习的步骤。


  1.  将问题 1 和问题 2 列垂直堆叠，以获取所有问题的嵌入。

  2.  使用各种句子嵌入技术（如 Sentence-BERT、OpenAI GPT 和 doc2vec）对问题进行编码。

  3.  使用输入向量与原始数据集之间的余弦相似度查找相似问题，并返回余弦相似度得分最高的前 N 个问题。


  ### 有监督学习


  在有监督学习中，我们训练深度学习分类器来预测两组问题是否相似。输出是两个问题之间的概率得分。图 7-2 说明了该过程的流程。


