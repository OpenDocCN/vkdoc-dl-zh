  ## 模型评估与比较总结


  我们尝试了几种不同的机器学习算法，分别使用了计数向量器和 TF-IDF 向量器。表 2-1 展示了结果。本例中我们考虑了准确率。你也可以考虑其他指标，如 AUC、特异性和
  F1 分数，以便进行更全面的评估。


  **表 2-1.** 输出总结


  | 算法 | 特征工程 | 准确率 |

  | --- | --- | --- |

  | 朴素贝叶斯 | 计数向量 | 56% |

  | | TF-IDF（词级别） | 57% |

  | **线性分类器** | 计数向量 | 57% |

  | | **TF-IDF（词级别）** | **59%** |

  | 支持向量机 | 计数向量 | 54% |

  | | TF-IDF（词级别） | 57% |

  | 随机森林 | 计数向量 | 55% |

  | | TF-IDF（词级别） | 53% |


  由于使用词级别 TF-IDF 的线性分类器准确率更高，我们将在后续步骤中选择该组合。


  请注意，通过增加数据和计算能力可以提高准确率。然而，本章的目标并非追求更高的准确率，而是理解并实现端到端的流程。


