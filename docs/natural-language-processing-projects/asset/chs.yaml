  接着，我们深入研究了诸如`PyTerrier`和`Sentence-BERT`等高级模型，这些模型利用预训练模型提取向量。由于这些模型基于深度学习，其结果相比传统方法要好得多。我们还使用了`Deep
  Text Search`，这是另一个适用于多语言文本语料库的深度学习库。


