  temp=[]

  temp.append(data[''description''][i])

  fin = fin + temp

  data1 = data[[''product_name'',''description'']]

  #导入 word2vec

  from gensim.models import KeyedVectors

  filename = ''C:\\GoogleNews-vectors-negative300.bin''

  model = KeyedVectors.load_word2vec_format(filename, binary=True, limit=50000)

  #预处理

  def remove_stopwords(text, is_lower_case=False):

  pattern = r''[^a-zA-z0-9\s]''

  text = re.sub(pattern, '''', text[0])

  tokens = nltk.word_tokenize(text)

  tokens = [token.strip() for token in tokens]

  if is_lower_case:

  filtered_tokens = [token for token in tokens if token not in stop]

  else:

  filtered_tokens = [token for token in tokens if token.lower() not in stop]

  filtered_text = '' ''.join(filtered_tokens)

  return filtered_text

  # 获取嵌入，我们使用“300”

  def get_embedding(word):

  if word in model.wv.vocab:

  return model[word]

  else:

  return np.zeros(300)

  ```


  对于每个文档，我们计算文档中所有单词的平均值。


  ```

  # 获取所有文档的平均向量

  out_dict =  {}

  for sen in fin:

  average_vector = (np.mean(np.array([get_embedding(x) for x in nltk.word_tokenize(remove_stopwords(sen))]),
  axis=0))

  dict = { sen : (average_vector) }

  out_dict.update(dict)

  # 获取查询与文档之间的相似度

  def get_sim(query_embedding, average_vector_doc):

  sim = [(1 - scipy.spatial.distance.cosine(query_embedding, average_vector_doc))]

  return sim

  # 根据相似度对所有文档进行排序

  def Ranked_documents(query):

  global rank

  query_words =  (np.mean(np.array([get_embedding(x) for x in nltk.word_tokenize(query.lower())],dtype=float),
  axis=0))

  rank = []

  for k,v in out_dict.items():

  rank.append((k, get_sim(query_words, v)))

  rank = sorted(rank,key=lambda t: t[1], reverse=True)

  dd =pd.DataFrame(rank,columns=[''Desc'',''score''])

  rankfin = pd.merge(data1,dd,left_on=''description'',right_on=''Desc'')

  rankfin = rankfin[[''product_name'',''description'',''score'']]

  print(''排序后的文档：'')

  return rankfin

  # 使用查询调用信息检索函数

  query=input("您想搜索什么？")

  Ranked_documents(query)

