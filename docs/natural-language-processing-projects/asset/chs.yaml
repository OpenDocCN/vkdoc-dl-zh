  ### 文本到特征


  TF-IDF 衡量一个词对特定文档的重要程度。


  这里我们使用 `sklearn` 中的默认 `TfidfVectorizer` 库。


  ```

  # 合并简历和职位描述以计算 TF-IDF 和余弦相似度

