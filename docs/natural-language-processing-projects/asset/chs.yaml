  ## 模型构建


  这是一个相似度度量问题，系统会向招聘人员推荐前 N 个（N 可自定义）最匹配的简历。为此，我们采用余弦相似度，它用于衡量两个向量的相似程度。


  公式如下：


  ![$$ \mathit{\cos}\left(x,y\right)=\frac{\ x\bullet y}{\left|\left|x\right|\right|\ast
  \left|\left|y\right|\right|} $$](img/517793_1_En_5_Chapter_TeX_Equa.png)


  - `x` ⋅ `y` 是向量 `x` 和 `y` 的点积

  - `||x||` 和 `||y||` 是向量 `x` 和 `y` 的长度

  - `||x||` ∗ `||y||` 是向量 `x` 和 `y` 的叉积


  ```

  # 计算职位描述与简历之间的余弦相似度，以找出最适合某职位描述的简历

  similarity = cosine_similarity(df_tfidfvect1[0:len(resumeTxt)],df_tfidfvect1[len(resumeTxt):])

  # 职位描述的列名

  abc = []

  for i in range(1,len(jds)+1):

  abc.append(f"JD {i}")

  # 相似度得分的 DataFrame

  Data=pd.DataFrame(similarity,columns=abc)

  print(''\n 余弦相似度\n'')

  print(Data[0:10])

  ```


