  ## 文本预处理


  文本数据中存在大量噪声。文本预处理至关重要。让我们进行清理。


  文本预处理任务包括：


  *   将文本转换为小写

  *   移除标点符号

  *   移除数字

  *   移除多余空白


  让我们创建一个包含所有这些步骤的函数，以便在未来的实例（模型训练）中需要时使用。


  ```

  #文本预处理函数

  def txt_preprocessing(txt):

  txt = re.sub(r''[_"\-;%()|+&=*%.,!?:#$@\[\]/]'', '' '', txt)

  txt = re.sub(r''\'''', '' '', txt)

  txt = txt.lower()

  return txt

  headlines_processed = []

  clean_news = []

  # 标题文本清洗

  for z in df.headlines:

  headlines_processed.append(txt_preprocessing(z))

  # 新闻文本清洗

  for z in df.text:

  clean_news.append(txt_preprocessing(z))

  ```


