    \ more sensible features from the business context\n\n*   Validates the features\
    \ using it in the model\n\n*   Repeats the process until you find the best features\
    \ for the model\n\nThe following are some examples.\n\n*   Extracting day, time,\
    \ and weekday from dates\n\n*   Extracting the region from a location\n\n*   Creating\
    \ grouped data from numerical features\n\n### Model Building, Tuning, and Selection\n\
    \nWith all the data in place and processed, split the data into training and testing\
    \ data and get into the model building phase. Choose the appropriate algorithm\
    \ to solve the problem. It’s not a one-time process; it’s an iterative process.\
    \ You must try multiple algorithms before selecting the final one.\n\nThere are\
    \ so many algorithms and tuning parameters to get the highest possible accuracy.\
    \ But manually performing that task takes a lot of time. There are many model-tuning\
    \ libraries like grid search that provide the best model to use for implementation.\n\
    \n### Model Testing and Validation\n\nIt is very important to test the model on\
    \ unseen data and see if it’s not overfitting. If the model performs equally well\
    \ on the unseen data and outcomes are as expected, we finalize the model, else\
    \ repeat steps 6, 7, and 8 until we find the most optimum model. Cross validation\
    \ is a more popularly used technique in machine learning for model testing and\
    \ validation\n\n### Prediction and Insights\n\nThere are two ways predictive modeling\
    \ can be leveraged. One is the prediction that directly impacts the business.\
    \ On the other hand, models also generate insights and hidden patterns that are\
    \ useful for making data-driven decisions and business strategies.\n\n### Deployment\
    \ or Productionization and Model Maintenance\n\nTaking projects from Jupyter notebook\
    \ to live is an important step to leveraging AI in real time and realizing its\
    \ impact. Cloud giants like Microsoft Azure, Google Cloud Platform (GCP), and\
    \ Amazon Web Services (AWS) provide deployment frameworks and MLOps components\
    \ for easy productionization.\n\nAlso, you can have multiple problem statements\
    \ which produce multiple machine learning solutions. Maintaining these models,\
    \ versioning, updating with new data plays a vital role. To achieve this, a model\
    \ maintenance framework and AI governance should be in place to obtain the highest\
    \ impact."
  trans: "\n# AI 生命周期\n\n要解决任何人工智能和数据科学问题，每个人都应遵循十个关键步骤。利用数据科学解决问题并非易事。它涉及多学科知识，包含从业务理解到生产化以获取实时输出的不同步骤。为了简化这一漫长过程，让我们将完整的数据科学和\
    \ AI 生命周期划分为十个不同的步骤。\n\n1.  理解并定义业务问题\n2.  将业务问题转化为机器学习问题，并创建解决方案/架构设计\n3.  数据收集与理解\n\
    4.  数据清洗与预处理\n5.  探索性数据分析\n6.  特征工程与选择\n7.  模型构建、调优与选择\n8.  模型测试与验证\n9.  预测与洞察\n\
    10. 部署或生产化及模型维护\n\n让我们深入探讨每一个步骤。\n\n## 理解并定义业务问题\n\n-   整个数据科学过程都建立在这一步之上，即识别/定义问题。数据科学令人兴奋，但这并不意味着你可以随意编造一个问题陈述。\n\
    -   理解业务、问题、瓶颈、痛点和业务目标非常重要。数据科学不是为了让你的产品或公司看起来很酷；而是为了解决企业面临的实际问题，从而在增加收入、降低成本或提升客户体验/满意度方面产生重大影响。\n\
    -   一旦问题被明确定义，比如降低企业的客户流失率，就可以开始探索可能的解决方案、数据需求等。\n\n## 将业务问题转化为机器学习问题并创建解决方案/架构设计\n\
    \n数据科学过程中的关键部分是将业务问题转化为分析或机器学习方法。有些问题看似直接，但并非所有问题都如此。\n\n需要精通所有算法、业务知识和经验，才能创建一个可靠的架构来有效且高效地解决问题。\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig19_HTML.jpg](img/517793_1_En_1_Fig19_HTML.jpg)\n\
    \n图 1-19\n\n场景\n\n1.  验证问题是否可以通过简单的分析方法解决，如探索性数据分析、双变量分析和相关性分析。通过这些步骤，你可以得到大部分答案。\n\
    2.  接下来，深入问题，判断它是监督学习、无监督学习还是强化学习问题。\n3.  如果是监督学习问题，它属于回归还是分类？基于这些判断，使用机器学习或统计算法来解决问题。图\
    \ 1-19 展示了这些场景。\n\n## 数据收集与理解\n\n这部分涉及思考解决给定问题需要哪些数据，并找到获取这些数据的方法。数据可以是\n\n- \
    \  内部数据库，如交易数据\n-   免费可用的开源数据，如人口数据\n-   购买外部数据\n\n数据也可以是任何格式。\n\n-   结构化数据（以表格形式存在的数据）\n\
    -   非结构化数据（图像、文本、音频和视频）\n\n记住那句老话：“垃圾进，垃圾出。”因此，数据收集是最关键的一步。\n\n## 数据清洗与预处理\n\n\
    现在原始数据已经就绪，在开始任何类型的分析之前，你需要对其进行处理。很多时候，数据可能非常混乱，这会破坏分析。整个数据科学过程中最耗时的步骤就是数据清洗和准备。\n\
    \n-   数据清洗\n    -   缺失值处理\n    -   插补方法\n    -   检测/移除异常值\n    -   消除重复行\n-  \
    \ 合并多个数据源\n-   数据转换\n\n## 探索性数据分析\n\n在整个过程中，一个更有趣的步骤是我们“拷问”数据，以发现隐藏的模式、洞察，并通过可视化从数据中讲述故事。\n\
    \n以下是作为 EDA（探索性数据分析）一部分最常见的工作。\n\n-   假设检验\n-   描述性统计或单变量分析\n-   推断性统计或双变量分析\n\
    -   数据透视表、图表、可视化等\n\n## 特征工程与选择\n\n*特征工程*是一个利用领域和业务知识来创建更多与目标特征具有有意义关系的特征或变量的过程。恰当的特征工程能提高机器学习模型的准确性，并提供有价值且相关的洞察。这是一门艺术。\n\
    \n*特征提取*从原始数据中提取新特征，并创建有助于稳定机器学习模型的有价值变量。这些变量是手动创建的，需要花费大量时间研究实际数据，思考底层问题、数据结构，以及如何最好地将它们暴露给预测建模算法。它可以是一个聚合或组合变量以创建新变量，或者拆分特征以创建新特征的过程。\n\
    \n并非所有创建的特征都会影响模型的结果。只有少数特征是有用的，大部分是垃圾。这些垃圾变量需要被移除以获得更好的结果。像`LASSO`/岭回归和逐步回归这样的正则化方法就是自动执行特征选择的例子。\n\
    \n特征工程过程\n\n-   从现有特征中衍生出特征和 KPI（关键绩效指标），为目标特征增加更多意义和关联\n-   从业务背景中创建更合理的特征\n\
    -   通过在模型中使用特征来验证它们\n-   重复此过程，直到找到模型的最佳特征\n\n以下是一些例子。\n\n-   从日期中提取日、时间和工作日\n\
    -   从位置中提取区域\n-   从数值特征中创建分组数据\n\n## 模型构建、调优与选择\n\n所有数据就位并处理完毕后，将数据拆分为训练数据和测试数据，进入模型构建阶段。选择合适的算法来解决问题。这不是一次性的过程，而是一个迭代的过程。在选定最终模型之前，你必须尝试多种算法。\n\
    \n有如此多的算法和调优参数来获得尽可能高的准确率。但手动执行这项任务会花费大量时间。有许多模型调优库，如网格搜索，可以提供用于实施的最佳模型。\n\n##\
    \ 模型测试与验证\n\n在未见过的数据上测试模型，并检查其是否过拟合，这一点非常重要。如果模型在未见过的数据上表现同样良好，并且结果符合预期，我们就确定该模型；否则，重复步骤\
    \ 6、7 和 8，直到找到最优模型。交叉验证是机器学习中用于模型测试和验证的更常用技术。\n\n## 预测与洞察\n\n预测建模有两种利用方式。一种是直接影响业务的预测。另一方面，模型也会产生洞察和隐藏模式，这些对于制定数据驱动的决策和业务战略非常有用。\n\
    \n## 部署或生产化及模型维护\n\n将项目从 Jupyter notebook 迁移到生产环境是实时利用 AI 并实现其影响的重要一步。像 Microsoft\
    \ Azure、Google Cloud Platform (GCP) 和 Amazon Web Services (AWS) 这样的云巨头提供了部署框架和\
    \ MLOps 组件，以便于轻松实现生产化。\n\n此外，你可能会有多个问题陈述，从而产生多个机器学习解决方案。维护这些模型、进行版本控制、用新数据更新模型起着至关重要的作用。为了实现这一点，应建立模型维护框架和\
    \ AI 治理体系，以获得最大的影响力。\n"
