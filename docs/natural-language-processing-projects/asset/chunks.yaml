    ## About the Authors About the Technical Reviewer


    # 1. Natural Language Processing and Artificial Intelligence Overview


    In recent years, we have heard a lot about artificial intelligence, machine learning,
    deep learning, and natural language processing. What are they? Are they all the
    same? How do we differentiate between them?


    In 1956, an American computer scientist named John McCarthy coined the term *artificial
    intelligence*, a subfield of computer science. Artificial intelligence (AI) is
    a machine’s ability to think and learn. The concept of AI is to make machines
    capable of thinking and learning like the human brain.


    Before getting into more detail, it is important to clarify one thing about AI:
    most of the population falsely considers AI a technology, whereas it is a concept
    in which machines can deal with tasks intelligently.


    Today, it is an umbrella that comprehends everything from data interpretation
    to humanoid robotics. It has gained prominence recently due to an increase in
    computation power and huge data. It can identify patterns in data more efficiently
    than humans, enabling any business to acquire more insight from their own data.


    Is AI the same as machine learning? Not really. The two terms can often be used
    interchangeably, but they are not the same. Artificial intelligence is a broader
    concept, while machine learning is one part of the artificial intelligence paradigm
    and can be considered a subfield of AI. Under the AI paradigm, there are several
    concepts, like machine learning, natural language processing, deep learning, and
    many more.


    You can understand machine learning as a portion of AI focused on making machines
    learn from data and enable machines to think and make decisions without human
    assistance or intervention. The entire machine learning concept assumes that we
    should give machines access to data and learn from it themselves.


    Similarly, deep learning mainly deals with unstructured data like images, text,
    and audio.


    And when specifically dealing with text data, we leverage natural language processing.
    Natural language processing (NLP) needs no introduction in the present scenario.
    It’s one of the fields where study and research are very active, and the interest
    has multiplied in the last few years. Even though the fundamentals of NLP are
    quite easy, the advanced topics are complicated to understand.


    That’s where machine learning, deep learning, and other state-of-the-art algorithms
    become so pivotal. Figure [1-1](#517793_1_En_1_Chapter.xhtml#Fig1) is a Venn diagram
    of the AI paradigm.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig1_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1** AI paradigm


    Before getting into projects, let’s understand some of these concepts and techniques
    required to solve upcoming projects at a very high level. An in-depth understanding
    of these concepts is beyond the scope of this book.


    ## Machine Learning


    Machine learning can be defined as the machine’s capability to learn from experience
    (data) and make meaningful predictions without being explicitly programmed.


    It is a subfield of AI which deals with building systems that can learn from data.
    The objective is to make computers learn on their own without any intervention
    from humans.


    There are three main categories in machine learning.


    *   Supervised learning

    *   Unsupervised learning

    *   Reinforcement learning


    ### Supervised Learning


    Supervised learning is a part of machine learning where labeled training data
    is leveraged to derive the pattern or function and make models or machine learning.
    Data consists of a dependent variable (target label) and the independent variables
    or predictors. The machine tries to learn the function from labeled data and predict
    the output on unseen data.


    ### Unsupervised Learning


    Here the machine learns the hidden pattern without leveraging labeled data, so
    training doesn’t happen. Instead, these algorithms learn based on similarities
    or distances between features to capture the patterns.


    ### Reinforcement Learning


    Reinforcement learning is a process of maximizing the reward by taking action.
    These are goal-oriented algorithms that learn how to reach a goal through experience.


    Going forward, we discuss all the algorithms which are part of these categories
    briefly. You also learn how natural language processing works and how deep learning
    is solving NLP problems.


    Figure [1-2](#517793_1_En_1_Chapter.xhtml#Fig2) explains all the categories and
    subcategories.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig2_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig2_HTML.jpg)


    **Figure 1-2** Machine learning categories


    ### Supervised Learning


    Learning from labeled data is called *supervised learning*, of which there are
    two types: *regression* and *classification*.


    #### Regression


    Regression is a statistical predictive modeling technique that finds the relationship
    between the dependent variable and independent variables. Regression is used when
    the dependent variable is continuous; prediction can take any numerical value.


    The following are the few regression algorithms widely used in the industry. Let’s
    get into the theory to better understand these algorithms.


    *   Linear regression

    *   Decision tree

    *   Random forest

    *   Support-vector machines

    *   GBM

    *   XGBOOST

    *   ADABOOST

    *   LightGBM


    #### Classification


    Classification is a supervised machine learning technique where the dependent
    or output variable is categorical. For example, spam/ham, churn/not churned, and
    so on.


    *   In *binary classification*, it’s either yes or no. There is no third option.
    For example, the customer can churn or not churn from a given business.

    *   In *multiclass classification*, the labeled variable can be multiclass, for
    example, product categorization of an e-commerce website.


    The following are the few classification algorithms widely used in the industry.


    *   Logistic regression

    *   Decision tree

    *   Random forest

    *   Support-vector machine

    *   GBM

    *   XGBoost

    *   AdaBoost

    *   LightGBM


    Let’s briefly look at each of these algorithms.'
