    The following is an input example:


    I use a MacBook for work, and I like Apple.


    Table [11-1](#517793_1_En_11_Chapter.xhtml#Tab1) shows how to transform this data
    into the required format for the next-word prediction model.


    Table 11-1.


    Data Transformation


    | Input | Output (Target) |

    | --- | --- |

    | I | use |

    | Use | MacBook |

    | MacBook | for |

    | For | my |

    | My | work |

    | Work | and |

    | And | I |

    | I | like |

    | Like | Apple |

    | I use | MacBook |

    | use MacBook | for |

    | …. |   |

    | I use | MacBook for |

    | ….. |   |


    We are creating input and output for all combinations of unigrams, bigrams, and
    so forth, sequentially. It can be one to many, many to one, or many to many to
    represent input and output accordingly; hence, it is called a seq2seq model.


    Since capturing context is vital, the model that comes to mind is RNN and its
    variant. So, we can start with basic LSTM architecture and then explore architectures
    like bidirectional LSTM, autoencoders, attention mechanisms, and transformers.


    Also, let’s look at some of the latest state-of-the-art pretrained models for
    seq2seq and text generation models.


    Here are the three logical flow diagrams for different ways of training seq2seq
    or text generation models.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig4_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Using pretrained model


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig3_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Transfer learning


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig2_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Training from scratch


    *   Training the model from scratch (see Figure [11-2](#517793_1_En_11_Chapter.xhtml#Fig2))


    *   Transfer learning (see Figure [11-3](#517793_1_En_11_Chapter.xhtml#Fig3))


    *   Directly using pretrained model (see Figure [11-4](#517793_1_En_11_Chapter.xhtml#Fig4))


    Now that you understand how to approach text generation models. Let’s jump into
    different ways of implementation.


    ## Implementation


    First, let’s explore few different approaches for developing a text-based language
    model from scratch using deep learning.


    ### Model 1: Word-to-Word Text Generation


    Models are trained to capture the relationship between the sequence of two words,
    considering the first word as input and the second one as target(output). Note:
    Import all the required libraries.


    The first step is to convert the input sequence into a vector for each lowercase
    text in the source text.


    ```

    # data for training (we picked few random paragraphs from the internet (blog)

    #data source link 1: maggiesmetawatershed.blogspot.com

    #data source link 2: www.humbolt1.com

    text = """She''s a copperheaded waitress,

    tired and sharp-worded, she hides

    her bad brown tooth behind a wicked

    smile, and flicks her ass

    out of habit, to fend off the pass

    that passes for affection.

    She keeps her mind the way men

    keep a knife—keen to strip the game

    down. The ladies men admire, I''ve heard,

    Would shudder at a wicked word.

    Their candle gives a single light;

    They''d rather stay at home at night.

    They do not keep awake till three,

    Nor read erotic poetry.

    They never sanction the impure,

    Nor recognize an overture.

    They shrink from"""

    # text encoding

    # To tokenize the sentence let''s use Tokenizer function

    token = Tokenizer()

    token.fit_on_texts([text])

    #convert text to features

    ohe = token.texts_to_sequences([text])[0]

    ```


    Let’s build the vocabulary dimension.


    ```

    # text vocab dim

    text_dim = len(token.word_index) + 1

    ```


    Then we need to create a training data with input and output words.


    ```

    # word to word sequence

    #create empty list

    seq = list()

    for k in range(1, len(ohe)):

    seq1 = ohe[k-1:k+1]

    #append to list

    seq.append(seq1)

    # convert text into input and output

    seq = np.array(seq)

    I, O = seq[:,0],seq[:,1]

    ```


    Let’s encode the output.


    ```

    # encoding the y variable

    O = keras.utils.np_utils.to_categorical(O, num_classes=text_dim)

    ```


    Now let’s define a seq2seq model.


    ```

    #initialize

    mod = Sequential()

    #add embedding layer

    mod.add(Embedding(text_dim, 10, input_length=1))

    #add LSTM layer

    mod.add(LSTM(50))

    #add dense layer

    mod.add(Dense(text_dim, activation=''softmax''))

    print(mod.summary())

    ```


    Figure [11-5](#517793_1_En_11_Chapter.xhtml#Fig5) shows the model training output.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig5_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Output


    Technically, we simulated a multi-class classification problem (predicting words
    in the vocabulary) so let’s use a classification function with cross-entropy loss.
    Here we used Adam optimizer to optimize the cost function.


    ```

    # run network

    mod.compile(loss=''categorical_crossentropy'', optimizer=''adam'', metrics=[''accuracy''])

    #Training

    mod.fit(I, O, epochs=600)

    #Output

    ```


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Figa_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Figa_HTML.jpg)


    After tuning the model , we test it by passing the words in the vocabulary and
    predicting the next word. We get the entire output of the prediction.


    ```

    #input for the prediction

    inp = ''ladies''

    #convert to features

    dummy = token.texts_to_sequences([inp])[0]

    dummy = np.array(dummy)

    #predict

    y1 = mod.predict_classes(dummy)

    for word, index in token.word_index.items():

    if index == y1:

    print(word)

    #output

    men

    ```


    Now let’s predict sequence of words.


    ```

    # predicting the sequence of words

    def gen_seq(mod, token, seed, n):

    inp, op = seed, seed

    for _ in range(n):

    # convert text to features

    dummy = token.texts_to_sequences([inp])[0]

    dummy = np.array(dummy)

    # prediction

    y1 = mod.predict_classes(dummy)

    outp = ''''

    for word, index in token.word_index.items():

    if index == y1:

    outp = word

    break

    # append

    inp += '' '' + outp

    return inp

    ```


    Let’s use some elements of input to get a reasonable sequence output.


    ```

    print(gen_seq(mod, token, ''wicked'', 1))

    #output:

    wicked word

    ```


    As the word *wicked* is typed, the model predicts the next set of sequence words:
    *word their candle gives a*.


    This is reasonable given the small training scale. If you train on larger data
    and GPU, accuracy increases.'
