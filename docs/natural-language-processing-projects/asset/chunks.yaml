- fmt: '### RASA


    `RASA` ([`https://rasa.com`](https://rasa.com)) is an AI framework to build chatbots.
    It’s an open source and low code framework, and chatbots can be built with very
    little effort. It can both understand the text and create flows for chats.


    `RASA` stack has a bunch of functionalities to build effective chatbots. It lets
    the user train custom models where industry-specific data builds the chatbots.
    `RASA` already does the heavy lifting of building the framework.


    `RASA`’s architecture has two main components: `RASA NLU` to understand the incoming
    text where it identifies intents, and `RASA CORE` which gives the output for the
    question asked by the user.


    ### Microsoft Bot Framework


    `MS bot framework` is another framework to create bots as well as deploy them
    to Azure services. It has all the end-to-end components to build the bots and
    connect to any platform like Skype, SMS, and so forth.


    This framework is open source. You can use the SDK at [`https://github.com/microsoft/botframework-sdk`](https://github.com/microsoft/botframework-sdk)
    to create the chatbots.


    The `bot builder SDK` has two other components: a developer portal and a directory
    that help you easily develop and deploy.


    It creates a very effective dialogue flow. For example, one of the main objectives
    of the bots is to remember what happened in the previous action. It has to remember
    the historical flows to give contextual answers.


    ## Conclusion


    We explored multiple ways of building a chatbot in this chapter using the power
    of natural language processing and deep learning. This is the back end of the
    chatbot, and integrating this with a front end is a task.


    We built a simple chatbot using a similarity score where the sentences are converted
    to `TF-IDF` features and distance is calculated using cosine similarity. In another
    approach, a deep neural network was leveraged to build the context-based chatbots.
    Finally, you saw how `RNN` can predict the next word and how it works in chatbots
    using a pretrained model. There is active research in this field, and we can expect
    many more groundbreaking results that take customer experience to another level.


    There is a huge market for chatbots, given that it has already proved its credibility.
    It’s only going to increase in coming years with applications both vertically
    and horizontally, making the customer’s life a lot easier.


    # 10. News Headline Summarization


    Text summarization is all about converting a bunch of paragraphs into a few sentences
    that explain the whole document’s gist. There are hundreds of applications in
    every industry, given the amount of text data. Text data is increasing exponentially.
    A lot of time is needed to analyze, understand, and summarize each piece of it.


    At some point in time, we may need a smart way to summarize text data, which is
    why it’s a very active research area. We can achieve some level of success, but
    there is a long way to go since capturing context like a human being is easier
    said than done!


    A summarization can be of two types based on size.


    - **Long summary**: A paragraph with 10 sentences or more.

    - **Short summary**: A sentence or two with 10–20 words.


    Summarization has abundant applications across industries. It can be leveraged
    in various places, including the following.


    - Summarizing news articles to enrich the user experience

    - Legal document summarization

    - Summarizing clinical research documents

    - Product review insight from multiple data sources

    - Call center data summarization to understand the high-level cause

    - Summarize educational notes and books for quick revision

    - Transcript summarization

    - Social media analysis


    Let’s look at the various ways of summarizing text and its challenges and implement
    a few state-of-the-art techniques in this chapter.


    ## Approach


    Let’s first understand the different types of summarization techniques before
    getting into implementation.


    There are two main ways to summarize text in NLP: *extractive summarization* and
    *abstractive summarization*.


    ### Extractive Summarization


    Extractive summarization is the simple technique that selects the important sentences
    from the document and creates the summary. In the extractive text summarization
    technique, the most repeating sentence gets more importance and generates a summary.
    The original text remains the same, and without making any changes to it, the
    summary would be generated. But the disadvantage is that the summary might not
    be as perfect as humans write.


    Here is a simple example.


    - **Source text**: Varun went to attend an event in Bangalore about data science.
    The event discussed how machine learning works along with the applications of
    AI and ML in the retail industry, including churn prediction, recommendation system,
    and buying propensity model. Finally, the session ended with next-generation AI.

    - **Extractive summary**: Varun went to attend an event about data science. It
    extracted a few important words from the source, and that’s it.


    There are different types of extractive summarization techniques based on the
    algorithm used.


    - **GraphBase**, which uses graph technology, creates nodes and edges using the
    document and finally finds relations to summarize it. `TextRank` and `LexRank`
    are examples of graph-based algorithms.

    - **Feature-based algorithms** extract certain features from each sentence of
    the document and then decide the important sentence based on the features. The
    feature can be term frequency, presence of verb, and so forth. `TextTeaser` and
    `Luhn’s Algorithm` are different feature-based algorithms.

    - **Topic-based algorithms** extract topics from the documents using algorithms
    like singular value decomposition and score the sentences based on the topics
    extracted. `Gensim` has the `lsimodel` function to carry out topic-based summarization.


    Implementing extractive summarization techniques is straightforward. For more
    information, please refer to our book *Natural Language Processing Recipes: Unlocking
    Text Data with Machine Learning and Deep Learning Using Python* (Apress, 2019).


    ### Abstractive Summarization


    Abstract techniques involve interpreting and shortening the parts of the source
    document. This algorithm creates new sentences and phrases which cover most of
    the context from the original text. It’s more difficult to develop these kinds
    of algorithms, so extraction is still very popular.


    Here is a simple example.


    - **Source text**: Varun went to attend an event in Bangalore about data science.
    The event discussed how machine learning works along with the applications of
    AI and ML in the retail industry, like churn prediction, recommendation system,
    and buying propensity model. Finally, the session ended with next-generation AI.

    - **Abstractive summary**: Varun attended a data science event where machine learning
    and its application were discussed, including how to predict customer churn in
    the retail industry and build recommendation systems along with the future of
    AI.


    So, if you look at it, the summary is handcrafted using the context of the source.
    It did not only extract a few important sentences, like in the extractive summary.


    There have been many approaches to build abstractive summarization. And with the
    advancements in deep learning, we are now able to achieve good results.


    This chapter looks at implementing an abstractive summarization technique using
    deep learning algorithms. You also learn how to leverage pretrained models to
    increase accuracy.


    Figure [10-1](#517793_1_En_10_Chapter.xhtml#Fig1) illustrates the approach design
    to solve a text summarization problem.


    ![../images/517793_1_En_10_Chapter/517793_1_En_10_Fig1_HTML.jpg](images/517793_1_En_10_Chapter/517793_1_En_10_Fig1_HTML.jpg)


    **Figure 10-1** Approach design


    More information on the models and process are uncovered as we move along.'
