    \ ([`https://github.com/grammarly/gector`](https://github.com/grammarly/gector)).\n\
    \n2.  Remove duplicates. Another biggest challenge in summarization is duplicating—words\
    \ and sentences. We need to remove them as well.\n\n3.  Remove incomplete sentences.\
    \ We need to filter out incomplete sentences generated by the model, if any.\n\
    \n## Conclusion\n\nWith the ever-increasing content and news from all types of\
    \ media and social media, text summarization is one of the most widely used applications\
    \ of NLP and deep learning. We explored how to build that pipeline right from\
    \ importing raw data, cleaning it, using the pretrained model for custom training,\
    \ evaluating, and finally predicting (generating summaries). There is a lot of\
