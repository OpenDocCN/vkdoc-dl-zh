    # Creating an E-commerce Product Categorization Model Using Deep Learning


    This chapter explores multiclass classification using deep learning. You look
    at different deep neural networks, like CNN, RNN, and LSTM, and ways to tune and
    evaluate them.


    ## Problem Statement


    In the era of e-commerce and retail, the biggest challenge is to tag a particular
    product or SKU to its category. There are billions of items, and manually tagging
    is an inefficient task and cost to a company. It must be done intelligently and
    fast. New items are added to the website or store every day, and detecting the
    category is critical. Machine learning and natural language processing come to
    the rescue to solve this problem and save a lot of time and money.


    Figure [6-1](#517793_1_En_6_Chapter.xhtml#Fig1) is an example of a category hierarchy.
    There are categories, subcategories, and within that, products/items. The whole
    structure is hierarchical.


    ![../images/517793_1_En_6_Chapter/517793_1_En_6_Fig1_HTML.jpg](images/517793_1_En_6_Chapter/517793_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Categories details


    In this project, we build a predictive model and categorize products in an e-commerce
    data set. Product categorization is a supervised classification problem where
    the product categories are the target classes, and the features are the words
    extracted from the product description or an image.


    The aim is to successfully classify product categories with high precision using
    state machine learning and deep learning techniques.


    ## Methodology and Approach


    Product classification is one of the classic problem statements in the e-commerce
    industry, and there are multiple approaches to solve it. Let’s use the following
    approaches.


    *   Image classification


    *   Text classification


    The problem can be solved in two ways. There are images for every item mapped
    to a particular category. We need to train deep learning algorithms and use that
    machine to predict the category whenever there is a new image of the product.
    But the challenge is, not every time seller provides the image which becomes a
    problem.


    The other approach is multiclass text classification. Instead of images, we need
    to consider the product description as features and product category as a label
    to build the classifier. The idea is that a product description has detailed information
    about a particular product, and with some confidence, the text present in the
    description can predict the category.


    Figure [6-2](#517793_1_En_6_Chapter.xhtml#Fig2) shows the methodology adopted
    for an e-commerce product data set classification using the text classification
    approach.


    ![../images/517793_1_En_6_Chapter/517793_1_En_6_Fig2_HTML.jpg](images/517793_1_En_6_Chapter/517793_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Flow diagram


    This model can be built using traditional machine learning algorithms (naive Bayes
    classifier, logistics regression, support vector machine classifier, random forest
    classifier) and deep neural networks.


    Figure [6-3](#517793_1_En_6_Chapter.xhtml#Fig3) shows the types of algorithms.


    ![../images/517793_1_En_6_Chapter/517793_1_En_6_Fig3_HTML.jpg](images/517793_1_En_6_Chapter/517793_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Types of algorithms


    We implement the multiclass text classification using different deep neural networks
    algorithms, based on Keras sequential libraries, underlying back end as tensor
    flow framework.'
