    \n**Figure 11-1** Text generation example\n\nText generation models are built\
    \ using state-of-the-art deep learning algorithms, especially the variants of\
    \ RNNs and attention networks.\n\nText generation is a seq2seq modeling problem.\
    \ These generation models can be built at the character level, word level, grams\
