    ## 词嵌入


    让我们使用 Gensim 中的 word2vec 预训练模型。导入并实现它。同时，从 [`www.kaggle.com/sandreds/googlenewsvectorsnegative300`](http://www.kaggle.com/sandreds/googlenewsvectorsnegative300)
