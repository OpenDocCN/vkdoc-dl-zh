    # Product360: Sentiment and Emotion Detector


    This chapter explores sentiment analysis and emotion detection along with text
    preprocessing and feature engineering methods. Also, we are exploring different
    machine learning techniques to train classifier models and evaluate using a confusion
    matrix. In the second half of the chapter, let’s pull real-time data from Twitter,
    and predict sentiment and emotions to generate insights. Also, we generate a script
    for automated reporting, which sends reports to a given set of e-mail addresses.
    This chapter gives you an overall picture of implementing an end-to-end pipeline
    that provides powerful insights about any product available on the market.


    This chapter covers the following topics.


    * Problem statements

    * Building an emotion classifier model

    * Label encoding

    * Train-test split

    * Feature engineering

    * Model building

    * Confusion matrix for a selected model

    * Real-time data extraction

    * Generating sentiment and emotions

    * Visualizations and insights

    * Automated report generation


    ## Problem Statement


    `Product360` is an end-to-end solution that helps users understand consumer sentiment
    on a product or service. For example, input a product name, such as `Nokia 6.1`,
    and decode 360-degree customer and market behavior. It is a simple solution that
    can solve multiple business problems and help with making business strategies.


    Sentiment analysis involves finding the sentiments score for a given sentence.
    It categorizes a sentence as positive, negative, or neutral. It captures the public
    sentiment in reaction to a product or brand, which influences future business
    decision-making. However, this approach can only classify the texts into a positive,
    negative, or neutral class. This is not enough method when there are so many possible
    emotions attached to it. The desired solution to the problem is emotion detection
    along with sentiment.


    Emotion detection involves identifying emotions (sad, angry, happy, etc.) from
    sentences. Data is extracted from social media like Twitter and Facebook, and
    e-commerce websites, and processed and analyzed using different NLP and machine
    learning techniques that provide the 360-degree view of that product, enabling
    better decision-making.


    ## Approach Formulation


    There are multiple sentiment prediction libraries, but we do not have the same
    for emotion detection, which is more robust. We build an emotion classifier as
    a part of this exercise. And using the classifier we built and sentiment prediction
    libraries, we predict the emotion and sentiment of a product using Twitter data.
    The detailed report is sent to the business team through an automated e-mail.


    Data is collected from Twitter by using Twitter search API by specifying the search
    key. So, tweets related to any product can be used as the testing data. It is
    also possible to collect date and geolocation data.


    Figure [2-1](#517793_1_En_2_Chapter.xhtml#Fig1) is a flowchart that explains how
    the product works at a high level.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig1_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Flowchart


    ### Steps to Solve This Problem


    1. Build an emotion classifier model

    2. Twitter data extraction

    3. Data preprocessing

    4. Emotion prediction

    5. Sentiment prediction

    6. Visualization and insights

    7. Send report via mail


    ## Building an Emotion Classifier Model


    This model helps you understand the emotions around given sentences and reviews.


    ### Data for Emotion Classifiers


    To train the emotion classifier, let’s use the ISEAR data set. Download the data
    from this book’s git link.


    | Emotion | Sentence |

    | --- | --- |

    | Anger | 1094 |

    | Disgust | 1094 |

    | Shame | 1094 |

    | Sadness | 1094 |

    | Fear | 1093 |

    | Joy | 1092 |

    | Guilt | 1091 |

    | **Total** | **7652** |


    * The data set has 7666 phrases classified into seven basic emotions.

    * The data set classifies joy, anger, fear, disgust, sadness, guilt, and shame.


    The data set consists of the following two columns.


    * `EMOTION` lists the emotions.

    * `TEXT` features the number of corresponding sentences.


    Let’s import the data set.


    ```python

    import pandas as pd

    data = pd.read_csv(''ISEAR.csv'')

    data.columns =[''EMOTION'', ''TEXT'']

    data.head()

    ```


    Figure [2-2](#517793_1_En_2_Chapter.xhtml#Fig2) shows the output of first five
    rows.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig2_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig2_HTML.jpg)


