- fmt: '# 12. Conclusion and Future Trends


    You have learned how to build different NLP applications and projects leveraging
    the power of machine learning and deep learning, which helps solve business problems
    across industries.


    This book focused on aspects of:


    - Classification (e-commerce product categorization, complaint classification,
    Quora duplication prediction)

    - Clustering (TED Talks segmentation and other document clustering)

    - Summarization (news headlines summarization)

    - Topic extraction (résumé parsing and screening)

    - Entity recognition (`CRF` extracting custom entities from movie plot)

    - Similarity (résumé shortlisting and ranking)

    - Information retrieval (AI-based semantic search, how smart search engines can
    improve the customer experience for e-commerce)

    - Generation (next word prediction, autocomplete)

    - Information extraction (résumé parsing)

    - Translation (multilanguage for search)

    - Conversational AI (chatbots and Q&A)


    You also looked at how some of the latest SOTA algorithms build more robust models
    and applications.


    ## Where to go from here?


    NLP and deep learning are very active in research. As you are reading this, many
    new algorithms are being designed to increase the intelligence of applications
    and make NLP more efficient and user-friendly.


    More information on next-generation NLP can be found in our book *Natural Language
    Processing Recipes: Unlocking Text Data with Machine Learning and Deep Learning
    Using Python* (Apress, 2019).


    The latest and future trends around NLP can be categorized into two aspects:


    - Depth (tech and algorithms)

    - Broad/wide (applications and use cases)


    This book briefly looked at a few active research areas (depth aspect):


    - **Advancements in word embeddings**: You looked at `word2vec`, `GloVe`, `BERT`,
    `Transformers`, and `GPT`. We can watch this section for more SOTA text to features
    algorithms improvised on top of transformers and reformers (most recent and advanced
    transformer variant with reversible layers).

    - **Advanced deep learning for NLP**: Current state is around `LSTM`, `GRU`, Bi-directional
    `LSTM`, auto-encoders, attention mechanism, transformers, and the auto-regressive
    layer. In the coming years, we can expect more efficient and improved deep learning
    and transformers architecture designed for NLP tasks.

    - **Reinforcement learning application in NLP**.

    - **Transfer learning and pretrained models**: We used many SOTA pretrained models
    to solve summarization, generation, and search problems. We can expect many more
    generalized, robust, efficient, and more accurate pretrained models and transfer
    learning frameworks in the near future.

    - **Meta-learning in NLP**.

    - **Capsule networks for NLP**: Known for multitasking capabilities, a single
    trained model can solve diversified problems and perform multiple NLP tasks.

    - **Integrating/coupling supervised and unsupervised methods**: Training a model
    for any task requires huge data and the labeled one. The biggest challenge in
    this era is to get accurately labeled data. It’s usually a manual process, but
    doing it on huge data requires a lot of time and resources. Hence there is active
    research to combine unsupervised and supervised to solve the challenge of labeled
    data for the model training.


    Besides these tech deep areas, there are few areas from a broader or wider NLP
    perspective:


    - Automation in NLP: `AutoNLP`

    - Text can be in any language: Multilingual NLP

    - Conversational AI

    - Domain and industry-specific trained models

    - NLP coupled with computer vision


    Let’s look at each of them.


    ## AutoNLP


    As a data scientist, it takes a lot of skill and time to create a good machine
    learning and deep learning model to train and implement various NLP-related tasks.
    One can face challenges in selecting the right parameters, optimizing, debugging,
    and testing them on new data. This is not much of a problem for a skilled data
    scientist but is still time-consuming. What if we can use something that automates
    everything using a framework that provides visualizations and gives excellent
    results with minimal error?


    Hugging Face’s `AutoNLP` is the way to go!


    ### What is AutoNLP?


    It lets you preprocess, train, tune and evaluate different NLP models or algorithms
    for various tasks hassle-free.


    Hugging Face is a next-gen NLP start-up helping professionals and companies build
    and experiment state of the art NLP and deep learning models with ease. There
    is a lot you can explore and research at [`https://huggingface.co/`](https://huggingface.co/).


    The following are the main features of `AutoNLP`:


    - Automatic selection of best models given your data

    - Automatic fine-tuning

    - Automatic hyperparameter optimization

    - Model comparison after training

    - Immediate deployment after training

    - `CLI` and Python API available


    It supports binary classification, multiclass classification, entity extraction,
    text summarization, Q&A, and speech recognition.


    Figure [12-1](#517793_1_En_12_Chapter.xhtml#Fig1) shows the capability of Hugging
    Face `AutoNLP` with respect to the tasks it can perform and languages it can support.


    ![../images/517793_1_En_12_Chapter/517793_1_En_12_Fig1_HTML.jpg](images/517793_1_En_12_Chapter/517793_1_En_12_Fig1_HTML.jpg)


    **Figure 12-1** Hugging Face


    So, it supports multiple languages, which is another trend.


    `AutoNLP` can make our lives much easier by performing various NLP-related tasks
    with minimum human intervention. We are in an era where technology is developing
    day by day. Through NLP, we are making human-to-machine communication as personal
    as human-to-human communication. So, there are many NLP trends we can look forward
    to in the coming years.


    In addition to `AutoNLP`, Hugging Face has multiple other custom SOTA pretrained
    models, frameworks, and API.


    In `AutoNLP`, you can also fine-tune a model that is hosted on Hugging Face Hub.
    There are more than 14,000 models available, which can be filtered based on the
    task you want to perform, your preferred language, or the data set (if hosted
    on Hugging Face) you wish to use.


    The Hugging Face data sets library currently has over 100 public data sets.


    The following are some of the models from Hugging Face:


    - `BERT-base`

    - `RoBERTa`

    - `DistilBERT`

    - `Sentence Transformers`

    - `GPT-2`

    - `T5-base`

    - `ALBERT`


    There are around 14,000 (increases every day) models. And you can apply filters
    to get models as per your requirements.


    The following are some of the Hugging Face summarization task models:


    - `Distilbart-xsum`

    - `Bart-large-cnn`

    - `Pegasus-large`

    - `Mt5`


    Let’s move to the next trending technique.'
