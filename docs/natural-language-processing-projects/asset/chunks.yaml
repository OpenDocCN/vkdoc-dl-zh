    NLP generalized model to generate text word by word. Now it is time to predict
    the upcoming word from half-written/ill-written characters. Ultimately, we wanted
    to look for “Incremental Search AKA Auto Complete AKA Auto Suggestion”. Here,
    as you type text, possible matches are found and immediately presented to you.
    Most of these applications are enabled in search engines.


    Figure [11-11](#517793_1_En_11_Chapter.xhtml#Fig11) shows how an autoword suggestion
    works.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig11_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig11_HTML.jpg)


    Figure 11-11


    Example of autosuggestion


    #### Fast Autocomplete


    The Fast Autocomplete library (by zepworks) efficiently searches a corpus of words.
    This library is completely based on Python language. Internally, it makes a trie
    tree of every unique word in the corpus. The data structure they used in this
    library is called Dwg, which stands for *directed word graph* .


    ```

    Install the library:

    !pip install fast-autocomplete

    ```


    To use this library, we needed to extract tokens from the data and put them in
    a specific format, which acts as the context to the model for providing suggestions
    as the user types.


    Let’s use the same data we used previously, which contained sonnets of Shakespeare,
    and write the function to extract words from it.


    The following is the function to extract a unique token from the corpus.


    ```

    def unique_tokens(location):

    to_doc = read_csv_gen(location, csv_func=csv.DictReader)

    toks = {}

    for row in to_doc:

    distinct_words = row[''distinct_words'']

    index = row[''index'']

    if distinct_words != index:

    local_words = [index, ''{} {}''.format(distinct_words, index)]

    while local_words:

    w = local_words.pop()

    if w not in toks:

    toks[w] = {}

    if distinct_words not in toks:

    toks[distinct_words] = {}

    return toks

    print(toks)

    ```


    Figure [11-12](#517793_1_En_11_Chapter.xhtml#Fig12) shows tokens output.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig12_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig12_HTML.jpg)


    Figure 11-12


    Output


    Similarly, we can provide a predefined dictionary for synonyms, if any.


    Finally, we initialize the autocomplete model.


    ```

    from fast_autocomplete import AutoComplete

    autocomplete = AutoComplete(words=toks)

    ```


    Now that we have provided the data context to the model, we only need to call
    the search function from autocomplete library to get the auto word suggestion
    based on the context/data provided. It takes only three parameters.


    *   Word: the word you want to type


    *   Max_Cost: Distance metric cost


    *   Size: no. of words to recommend


    Figure [11-13](#517793_1_En_11_Chapter.xhtml#Fig13) shows searching a word like
    *straw.* The recommendations include *straws* and *strawberry*. Similarly, we
    experimented with *tr*, *hag*, *sc*, and *mam*.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig13_HTML.png](images/517793_1_En_11_Chapter/517793_1_En_11_Fig13_HTML.png)


    Figure 11-13


    Output


    You saw how single-word suggestion works . Similarly, you can implement multiple
    sequences of word suggestions. For more information, refer to [`https://pypi.org/project/fast-autocomplete/`](https://pypi.org/project/fast-autocomplete/).


    ## Conclusion


    We implemented different ways to model language for text generation using different
    techniques and libraries. All these are the baseline models, can be improved with
    huge training data and bigger GPUs.


    There is ample application of text generation for which we can utilize the frameworks
    discussed in this chapter and use domain-specific training data accordingly based
    on the use case. One amazing Git application generates code from the comments
    and the other way around.


    You have seen and implemented few complex algorithms and learned some state of
    art algorithms in NLP and deep learning. Chapter [12](#517793_1_En_12_Chapter.xhtml)
    discusses what’s next in NLP and deep learning. Where to go from here? We uncover
    some of the interesting research areas.'
