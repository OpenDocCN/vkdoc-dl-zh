    # 使用机器学习进行 TED 演讲分割与主题提取


    TED 演讲是由技术、娱乐和设计领域的专家进行的知识性演讲视频（因此得名 TED）。这些会议在世界各地举办。杰出的演讲者站出来分享他们的经验和知识。这些演讲最长限制为
    18 分钟，涵盖广泛的主题。这些视频被存储起来，每个视频都有其内容的描述。


    本章根据 TED 演讲的描述对其进行分组，并使用各种聚类技术，如 `k-means` 和层次聚类。使用基于潜在狄利克雷分配（LDA）的主题建模来理解和解释每个聚类。使用的库包括
    `Genism`、`NLTK`、`scikit-learn` 和 `word2vec`。


    ## 问题陈述


    世界各地有海量的此类视频。它们在不同的地点录制，涉及不同的主题和各种各样的演讲者。鉴于我们已经拥有的视频数量，手动将这些视频标记到特定类别是最大的挑战。让我们看看如何利用机器学习和自然语言处理来解决这个问题。


    这里的挑战在于我们没有标记数据来训练分类器并预测类别。相反，我们需要采用无监督学习方法。让我们看看如何制定方法来获取每个视频的类别。


    ## 方法制定


    该方法包含两个部分来解决上述问题。


    第一个问题是文档分组。我们需要使用文档聚类来分割 TED 演讲。文档聚类技术主要有两个步骤。首先，使用不同的技术（如计数向量化器、`TF-IDF` 或词嵌入）将文本转换为特征。然后，利用这些特征，使用
    `k-means` 或层次聚类执行聚类。


    一旦聚类完成，下一个问题是理解这些聚类。然后，你可以执行主题建模来提取主题并了解聚类属性。同样，有多种算法可以提取主题。在这种情况下，我们使用 LDA。


    让我们可视化聚类和主题建模结果，以便更好地理解 TED 演讲。


