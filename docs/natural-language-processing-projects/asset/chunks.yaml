    ### Feature Engineering


    To build the text classification model, we need to first convert the text data
    into features. For a detailed explanation of feature engineering, please refer
    to Chapter [1](#517793_1_En_1_Chapter.xhtml). We are considering only one feature
    described in this project: extracted words from the description after text preprocessing
    and using them as the vocabulary.


    We use deep learning algorithms to build the classifier, and feature extraction
    should be carried out accordingly. We use the Keras tokenizer function to generate
    features. We are setting `max_length` to 200, which means we are only considering
