  trans: "\n# 问题陈述\n\n目标是从电影冷知识中提取命名实体。例如，标签包括电影名称、演员姓名、导演姓名和电影情节。通用库可能能够提取名称，但无法区分演员和导演，并且提取电影情节也颇具挑战性。我们需要构建一个定制模型，用于预测电影相关句子的这些标签。\n\
    \n本质上，我们拥有一个关于电影的数据集。它包含关于电影的句子或问题，并且句子中的每个单词都有一个预定义的标签。我们需要构建一个命名实体识别（NER）模型来预测这些标签。\n\
    \n在此过程中，我们需要理解以下概念：\n\n1.  使用各种算法构建模型。\n2.  设计一个衡量模型性能的指标。\n3.  理解模型在何处失效以及失效的可能原因。\n\
    4.  微调模型。\n5.  重复这些步骤，直到在测试数据上达到最佳准确率。\n\n# 方法论与方案\n\nNER 可以识别文本中的实体，并将其分类为预定义的类别，例如地点、人名、组织名称等。但对于这个问题，我们需要为句子中的实体标记导演姓名、演员姓名、类型和电影角色（类似地，数据集中定义了\
    \ 25 个这样的标签）。因此，仅靠 NER 是不够的。这里，我们将构建定制模型，并使用条件随机场和 BERT 对其进行训练。\n\n解决此问题的步骤如下：\n\
    \n1.  数据收集\n2.  数据理解\n3.  数据预处理\n4.  特征映射\n5.  模型构建\n    -   条件随机场\n    -   BERT\n\
