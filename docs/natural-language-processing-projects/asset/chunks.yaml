    # 4. Enhancing E-commerce Using an Advanced Search Engine and Recommendation System


    A few decades ago, no one would have ever imagined that we could buy a 55-inch
    TV at midnight while sitting at home watching a 22-inch TV. Thanks to the Internet
    and e-commerce, we can buy any item at any time from anywhere, and it is delivered
    quickly. Flexibility has made e-commerce businesses expand exponentially. You
    don’t have to visit the store, products have unlimited options, prices are lower,
    no standing in line to pay, and so forth.


    Given the traction e-commerce is getting, many big names are taking part in it.
    Companies keep technology in check along with operations, supply chains, and marketing.
    To survive competition, the right use of digital marketing and social media presence
    is also required. Also, most importantly, businesses must leverage data and technology
    to personalize the customer experience.


    ## Problem Statement


    One of the most talked-about problems of this era is recommendation systems. Personalization
    is the next big data science problem. It’s almost everywhere—movies, music, e-commerce
    sites, and more.


    Since the applications are wide, let’s pick an e-commerce product recommendation
    as one of the problem statements. There are multiple types of recommender systems.
    But the one that deals with text is content-based recommender systems. For example,
    if you see the diagram shown in Figure [4-1](#517793_1_En_4_Chapter.xhtml#Fig1),
    similar products have been recommended based on the product description of the
    clicked product. Let’s explore building this kind of recommender system in this
    chapter.


    ![../images/517793_1_En_4_Chapter/517793_1_En_4_Fig1_HTML.jpg](images/517793_1_En_4_Chapter/517793_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** Types of recommendation engines


    On the same lines, search engines in e-commerce websites also play a major role
    in user experience and increasing revenue. The search bar should give the relevant
    matches for a search query, and wrong results eventually result in the churn of
    the customers. This is another problem that we plan to solve.


    To summarize, in this project, we aim to build a search and recommender system
    that can search and recommend products based on an e-commerce data set.


    ## Approach


    Our main aim is to recommend the products or items based on users’ historical
    interests. A recommendation engine uses different algorithms and recommends the
    most relevant items to the users. It initially captures the past behavior of the
    users. It recommends products based on that.


    Let’s discuss the various types of recommendation engines in brief before we move
    further. Figure [4-1](#517793_1_En_4_Chapter.xhtml#Fig1) shows the types of recommendation
    engines.


    The following are various types of recommendation engines.


    *   Market basket analysis (association rule mining)

    *   Content based

    *   Collaborative filtering

    *   Hybrid systems

    *   ML clustering based

    *   ML classification based

    *   Deep learning and NLP based'
