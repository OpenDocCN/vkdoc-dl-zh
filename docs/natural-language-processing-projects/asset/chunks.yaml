    \ the elbow method to identify the optimum number of clusters. This act as *k.*\n\
    \n2.  Select random *k* points as cluster centers from the overall observations\
    \ or points.\n\n3.  Calculate the distance between these centers and other points\
    \ in the data and assign to the closest center cluster that point belongs to using\
    \ any distance metrics.\n    *   Euclidean distance\n\n    *   Manhattan distance\n\
    \n    *   Cosine distance\n\n    *   Hamming distance\n\n4.  Recalculate the cluster\
    \ center or centroid for each cluster.\n\n5.  Repeat steps 2, 3, and 4 until the\
    \ same points are assigned to each cluster, and the cluster centroid is stabilized.\n\
    \n##### Hierarchical Clustering\n\nHierarchical clustering is another type of\
    \ clustering technique that also uses distance to create groups. The following\
    \ steps generate clusters.\n\n1.  Hierarchical clustering starts by creating each\
    \ observation or point as a single cluster.\n\n2.  It identifies the two observations\
    \ or points that are closest together based on distance metrics.\n\n3.  Combine\
    \ these two most similar points and form one cluster.\n\n4.  This continues until\
    \ all the clusters are merged and form one final single cluster.\n\n5.  Finally,\
    \ using a dendrogram, decide the ideal number of clusters.\n\nYou cut the tree\
    \ to decide the number of clusters. The cutting of the tree is one where there\
    \ is a maximum jump of one level to another, as shown in Figure [1-17](#517793_1_En_1_Chapter.xhtml#Fig17).\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig17_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig17_HTML.jpg)\n\
    \nFigure 1-17\n\nHierarchical clustering\n\nUsually, the distance between two\
    \ clusters has been computed based on Euclidean distance. Many other distance\
    \ metrics can be leveraged to do the same.\n\n#### Dimensionality Reduction\n\n\
    Dimensionality reduction is the process of decreasing the number of features from\
    \ an entire data to a few significant principal features to increase the accuracy\
    \ of our modeling practices and reduce computational challenges. For example,\
    \ if we are working on predictive modeling and the number of variables is more\
    \ than 1000, there is a good possibility that our algorithms might fail to perform.\
    \ Using any dimensionality reduction techniques, you can bring the number of features\
    \ while capturing most of the context/information from all the features.\n\n*\
    \   It helps when independent variables have a correlation between them, which\
    \ is called *multicollinearity*. We might have encountered this more often while\
    \ working on our machine learning algorithms. You can also use *principal component\
    \ analysis* (PCA) and *linear discriminant analysis* (LDA) to solve such a challenge.\n\
    \n### Reinforcement Learning\n\nYou saw two well-known machine learning categories,\
    \ supervised and unsupervised learning. In recent days, reinforcement learning\
    \ is also gearing up to solve a lot of business problems. There is a lot of research\
    \ in this field, and it has already showcased its potential. We all know that\
    \ machines playing games against humans are already a talking point about how\
    \ machines are winning the contest. AlphaGo is the best example.\n\nHow does it\
    \ work?\n\nReinforcement learning is learning from experience and mistakes. There\
    \ is a goal to achieve in every setting, and for every positive move, a reward\
    \ is given. In the same way, for every negative move, it penalizes the machine.\
    \ It learns what kind of actions it should take to gain more rewards and reach\
    \ the goal. It is a continuous sequential process, and, in some cases, there might\
    \ be no information at the beginning of the process.\n\nIt has five components\
    \ to carry out the process, as shown in Figure [1-18](#517793_1_En_1_Chapter.xhtml#Fig18).\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig18_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig18_HTML.jpg)\n\
    \nFigure 1-18\n\nReinforcement learning\n\n*   Environment\n\n*   State\n\n* \
    \  Agent\n\n*   Action\n\n*   Reward or penalty\n\n1.  The process starts from\
    \ state S0, which is the environment.\n\n2.  The agent takes action A0 after this.\n\
    \n3.  The state has changed from S0 to S1.\n\n4.  Reward R1 is provided to the\
    \ agent.\n\n5.  This RL loop repeats until the goal is achieved.\n\n## NLP Concepts\n\
    \n### Unstructured Data\n\nWhen data is stored in a structured manner with columns\
    \ and rows, it’s called *structured data* . But more than 80% of the data cannot\
    \ be used in the same way because of its unstructured behavior. But there is infinite\
    \ insight hidden within that data as well. Unstructured data can be text, image,\
    \ video, and so on.\n\n#### Natural Language Processing\n\nCollecting, understanding,\
    \ processing, and generating insights out of text data is called *natural language\
    \ processing.*\n\nText data is available everywhere. The exponential increase\
    \ in social media, retail product reviews, entertainment reviews, and healthcare\
    \ documents generates an unimaginable amount of text data. Leveraging these kinds\
    \ of data is critical in the era of AI coupled with business."
  trans: "\n### 无监督学习\n\n无监督学习是一种机器学习类别，它不利用带标签的数据，但仍能从手头的数据中发现推断结果。你需要在不依赖因变量的情况下寻找模式，以解决业务问题。图\
    \ 1-15 展示了聚类的结果。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig15_HTML.jpg](img/517793_1_En_1_Fig15_HTML.jpg)\n\
    \n图 1-15 聚类\n\n无监督学习技术主要有两种类型：*聚类*和*降维*。\n\n#### 聚类\n\n将相似的事物分组称为*聚类*。相似的“事物”不仅指数据点，还包括满足以下条件的观测值集合：\n\
    \n- 同一组内的观测值彼此相似\n- 与其他组内的观测值不相似\n\n业界广泛使用的主要有两种重要算法。在进入项目之前，我们先简要了解一下这些算法的工作原理。\n\
    \n##### k-means 聚类\n\n`k-means` 是一种高效且广泛使用的聚类技术，它根据点之间的距离对数据进行分组。`k-means` 聚类的目标是最小化簇内的总方差，如图\
    \ 1-16 所示。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig16_HTML.jpg](img/517793_1_En_1_Fig16_HTML.jpg)\n\
    \n图 1-16 k-means\n\n以下步骤用于生成聚类。\n\n1. 使用肘部法确定最佳聚类数。该数值即为 `k`。\n2. 从所有观测值或点中随机选择\
    \ `k` 个点作为聚类中心。\n3. 计算这些中心与数据中其他点之间的距离，并使用任意距离度量方法，将点分配到其所属的最近中心簇。\n   - 欧氏距离\n\
    \   - 曼哈顿距离\n   - 余弦距离\n   - 汉明距离\n4. 为每个簇重新计算聚类中心或质心。\n5. 重复步骤 2、3 和 4，直到每个簇分配到的点相同，且簇质心稳定。\n\
    \n##### 层次聚类\n\n层次聚类是另一种聚类技术，它也利用距离来创建分组。以下步骤用于生成聚类。\n\n1. 层次聚类首先将每个观测值或点创建为一个单独的簇。\n\
    2. 根据距离度量，识别出距离最近的两个观测值或点。\n3. 将这两个最相似的点合并，形成一个簇。\n4. 重复此过程，直到所有簇合并，最终形成一个单一的簇。\n\
    5. 最后，使用树状图确定理想的聚类数量。\n\n通过切割树状图来决定聚类的数量。切割点应选在层级之间出现最大跳跃的位置，如图 1-17 所示。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig17_HTML.jpg](img/517793_1_En_1_Fig17_HTML.jpg)\n\
    \n图 1-17 层次聚类\n\n通常，两个簇之间的距离基于欧氏距离计算。也可以利用许多其他距离度量方法来完成同样的任务。\n\n#### 降维\n\n降维是将整个数据集中的特征数量减少到少数几个重要的主成分特征的过程，目的是提高建模实践的准确性并减少计算挑战。例如，如果我们在进行预测建模时变量数量超过\
    \ 1000 个，那么算法很可能会表现不佳。使用任何降维技术，你都可以在减少特征数量的同时，捕获所有特征中的大部分上下文/信息。\n\n- 当自变量之间存在相关性（即*多重共线性*）时，降维会有所帮助。我们在运行机器学习算法时可能经常遇到这种情况。你也可以使用*主成分分析*（`PCA`）和*线性判别分析*（`LDA`）来解决此类挑战。\n\
    \n### 强化学习\n\n你已经了解了两种著名的机器学习类别：监督学习和无监督学习。近年来，强化学习也正被用于解决大量业务问题。该领域已有大量研究，并已展现出其潜力。我们都知道，机器与人类对弈已成为热门话题，讨论机器如何赢得比赛。`AlphaGo`\
    \ 就是最好的例子。\n\n它是如何工作的？\n\n强化学习是从经验和错误中学习。在每个设定中都有一个目标要实现，每一次正向的移动都会获得奖励。同样，每一次负向的移动都会对机器进行惩罚。它学习应该采取何种行动来获得更多奖励并达成目标。这是一个连续的序列过程，在某些情况下，过程开始时可能没有任何信息。\n\
    \n该过程包含五个组成部分，如图 1-18 所示。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig18_HTML.jpg](img/517793_1_En_1_Fig18_HTML.jpg)\n\
    \n图 1-18 强化学习\n\n- 环境\n- 状态\n- 智能体\n- 动作\n- 奖励或惩罚\n\n1. 过程从状态 `S0` 开始，即环境。\n2.\
    \ 之后，智能体采取动作 `A0`。\n3. 状态从 `S0` 变为 `S1`。\n4. 向智能体提供奖励 `R1`。\n5. 此强化学习循环重复进行，直到达成目标。\n\
    \n## 自然语言处理概念\n\n### 非结构化数据\n\n当数据以列和行的结构化方式存储时，称为*结构化数据*。但超过 80% 的数据由于其非结构化特性而无法以相同方式使用。然而，这些数据中也隐藏着无限的洞察。非结构化数据可以是文本、图像、视频等。\n\
    \n#### 自然语言处理\n\n从文本数据中收集、理解、处理并生成洞察的过程称为*自然语言处理*。\n\n文本数据无处不在。社交媒体、零售产品评论、娱乐评论和医疗文档的指数级增长，产生了难以想象的文本数据量。在人工智能与业务相结合的时代，利用这类数据至关重要。\n\
    \n"
- fmt: "### Text Preprocessing\n\nText data is so unstructured and clumsy. There is\
    \ a lot of junk present in the text, and it requires mandatory preprocessing to\
    \ be done on top of raw data. It’s vital because unwanted text can change the\
    \ direction of the results it produces. So, let’s quickly look at different data\
    \ preprocessing techniques to clean the text data.\n\n- Lowercasing\n- Removal\
    \ of punctuations and stop words\n- Spelling correction\n- Text standardization\n\
    - Text normalization\n    - Stemming\n    - Lemmatization\n\nWe understand concepts\
    \ related to these techniques in this chapter and implement them in the rest of\
    \ the book as we move along.\n\n- **Lowercasing** converts text to lowercase to\
    \ avoid duplication of features.\n- **Removal of punctuations and stop words**:\
    \ Punctuation doesn’t add much value to a sentence’s meaning. In the same context,\
    \ stop words (`the`, `a`, `it`, `is`, and so on) are meaningless depending on\
    \ the use cases. Their presence across the corpus skew the results. If we remove\
    \ these words, weight distribution is more accurate, and crucial words get more\
    \ importance.\n- **Spelling correction**: The raw data we encounter has a lot\
    \ of spelling mistakes, and using it without correcting creates redundancy. You\
    \ need to correct it to some extent and start using it for better results using\
    \ certain packages.\n- **Text standardization**: Abbreviations are another biggest\
    \ challenge in text data. Whenever we are dealing with reviews and comments, there\
    \ is high chance customers are using the abbreviation. You need to take care of\
    \ this; this process is equally important.\n- **Text normalization**: The words\
    \ `clean`, `cleaning`, and `cleaned` mean the same but are used in different tenses.\
    \ Normalizing these words is called *text normalization*.\n    - **Stemming**:\
    \ Normalizing texts to the base word is called *stemming*. For example, `clean`,\
    \ `cleaning`, and `cleaned` are stemmed to `clean`.\n    - **Lemmatization**:\
    \ Lemmatization gets to the root word, considering the tenses and plurality of\
    \ a word. For example, `best` and `good` can mean the same thing. After lemmatization,\
    \ the result for both words is `good`.\n\n### Text to Features\n\nSince machines\
    \ or algorithms cannot understand the text, a key task in NLP is to convert text\
    \ data into numerical data called *features*. There are different techniques to\
    \ do this. Let’s discuss them briefly.\n\n#### One-Hot Encoding (OHE)\n\nOHE is\
    \ the basic and simple way of converting text to numbers or features. First, it\
    \ converts all the tokens present in the corpus into columns, as shown in Table\
    \ [1-1](#517793_1_En_1_Chapter.xhtml#Tab1). After that, against every observation,\
    \ it tags a 1 if the word is present; otherwise, it tags a 0.\n\nTable 1-1 OHE\n\
    \n| | One | Hot | Encoding |\n| --- | --- | --- | --- |\n| One-Hot | 1 | 1 | 0\
    \ |\n| Hot | 0 | 1 | 0 |\n| Encoding | 0 | 0 | 1 |\n\nTable [1-1](#517793_1_En_1_Chapter.xhtml#Tab1)\
    \ demonstrates OHE.\n\n#### Count Vectorizer\n\nThe drawback to this approach\
    \ is that if the word appears multiple times in a sentence, it has the same importance\
    \ as any other word that has appeared only once. To overcome this, there is the\
    \ count vectorizer where everything else remains the same but counts the tokens\
    \ present in that observation instead of tagging it as 1 or 0.\n\nTable [1-2](#517793_1_En_1_Chapter.xhtml#Tab2)\
    \ demonstrates a count vectorizer.\n\nTable 1-2 Count Vectorizer\n\n| | AI | new\
    \ | Learn | ……. |\n| --- | --- | --- | --- | --- |\n| AI is new AI is everywhere\
    \ | 2 | 1 | 0 | ………. |\n| Learn AI Learn NLP | 1 | 1 | 2 | ……… |\n| NLP is cool\
    \ | 0 | 0 | 1 | ………. |\n\n#### Term Frequency–Inverse Document Frequency (TF-IDF)\n\
    \nEven a count vectorizer cannot answer all questions. If the length of sentences\
    \ is inconsistent and a word is repeating in all the sentences, then it becomes\
    \ tricky. TF-IDF addresses these problems.\n\n- **Term frequency** (TF) is defined\
    \ as the “number of times the token appeared in a corpus doc divided by the total\
    \ number of tokens.”\n- **Inverse document frequency** (IDF) is the total number\
    \ of corpus docs in the overall docs divided by the number of overall docs with\
    \ the selected word. This provides more weight to rare words in the corpus.\n\n\
    Multiplying these two gives the TF-IDF vector for a word in the corpus.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Figb_HTML.png](images/517793_1_En_1_Chapter/517793_1_En_1_Figb_HTML.png)\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Figc_HTML.png](images/517793_1_En_1_Chapter/517793_1_En_1_Figc_HTML.png)\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Figd_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Figd_HTML.jpg)\n\
    \n#### Word Embeddings\n\nEven though TF-IDF is most widely used, it doesn’t capture\
    \ the context of a word or sentence. Word embeddings solve this problem. Word\
    \ embeddings capture context and semantic and syntactic similarities between words.\n\
    \nUsing shallow neural networks, we generate a vector that captures the context\
    \ and semantics.\n\nIn recent years, there has been a lot of advancements in this\
    \ field, particularly by:\n\n- `word2vec`\n- `GloVe`\n- `fastText`\n- `ELMo`\n\
    - `Sentence-BERT`\n- `GPT`\n\nFor more information about these techniques, please\
    \ refer to our book *Natural Language Processing Recipes: Unlocking Text Data\
    \ with Machine Learning and Deep Learning Using Python* (Apress, 2021).\n\n###\
    \ Applications\n\n#### Text Classification\n\nThis is where your machine learning\
    \ starts interacting with text data. The classic example is your spam classification.\
    \ Independent variables are the feature extracted using the steps discussed (text\
    \ to features) earlier. Dependent variables depend on whether the mail is spam\
    \ or ham. Using a machine learning classification algorithm, let’s build a model\
    \ that predicts whether mail is spam or ham. Many deep learning techniques like\
    \ RNN and LSTM also obtain better accuracy.\n\nIn the coming chapters, we build\
    \ both binary and multiclass text classification models to solve different business\
    \ use cases.\n\n#### Text Summarization\n\nThe other powerful application of NLP\
    \ coupled with deep learning is text summarization. It is the process of creating\
    \ short notes out of a long and detailed document. There is an abundant amount\
    \ of text data, and reading every word takes a lot of time. That’s where the industry\
    \ saw its need and worked toward building state-of-the-art text summarization\
    \ solutions using deep learning and reinforcement learning.\n\nYou learn how to\
    \ implement text summarization using deep learning in one of the projects in this\
    \ book.\n\n#### Text Generation\n\nThe AI world is moving from understanding to\
    \ generation. Be it image or text, we are witnessing a good amount of traction.\
    \ For instance, an AI-generated painting sold for millions of dollars.\n\nText\
    \ generation uses neural language models at its core. Recurrent neural networks\
    \ are the foundation of neural language models, with variants LSTM and GRU networks.\
    \ The latest work in encoder-decoder coupled with attention mechanism approaches\
    \ achieved good results in this field.\n\nLet’s further discuss this concept with\
    \ the application using RNNs and transformers to build a text generator.\n\nAnd\
    \ there are many more such applications.\n\n- **Text regression**: “Predicting\
    \ time to resolve” an issue or complaint by looking at the description of the\
    \ complaint\n- **Text similarity**: Search engines, content-based recommendation\
    \ systems, resume shortlisting based on the job description, and many others\n\
    - **Entities extraction**: Extracting important and required words or a set of\
    \ words from the document\n- **Conversational AI**: Chatbots and Q&A systems\n\
    \nNow that you understand the fundamentals of machine learning, deep learning,\
    \ and NLP, let’s look at the life cycle (step by step) leveraging the concepts\
    \ to solve business problems."
