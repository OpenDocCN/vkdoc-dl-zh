- fmt: '# T5 Pretrained Model


    `T5` is short for *text-to-text transfer transformer*. It’s a transformer model
    from Google where it takes text as input and modified text as output. It is easy
    to fine-tune this model on any text-to-text task, which makes it very special.


    This transformer model is trained on the Colossal Clean Common Crawl (`C4`) data
    set. The architecture is integrated to devise `text2text` model. And hence `T5`
    can also be used for many text-to-text-based applications.


    Figure [10-6](#517793_1_En_10_Chapter.xhtml#Fig6) demonstrates that the task name
    must be in front of the input sequences, which goes to the `T5` model, and the
    output is text.


    Now, let’s look at how to use Hugging Face’s `transformers` library and implement
    news heading generation using the article information as input.


    Let’s install `T5` first by running this command.


    ```

    #Installing simple-T5

    ! pip install simplet5 -q

    #Import the library

    from simplet5 import SimpleT5

    ```


    Let’s prepare the data in a way the model expects.


    | source_text | target_text |   |

    | 0 | summarize: Saurav Kant, an alumnus of upGrad and IIIT-B''s PG Program in
    Machine learning and Artificial Intelligence, was a Sr Systems Engineer at Infosys
    with almost 5 years of work experience. T... | upGrad learner switches to career
    in ML and Al with 90% salary hike |

    | 1 | summarize: Kunal Shah''s credit card bill payment platform, CRED, gave users
    a chance to win free food from Swiggy for one year. Pranav Kaushik, a Delhi techie,
    bagged this reward after spending 20... | Delhi techie wins free food from Swiggy
    for one year on CRED |

    | 2 | summarize: New Zealand defeated India by 8 wickets in the fourth ODI at
    Hamilton on Thursday to win their first match of the five-match ODI series. India
    lost an international match under Rohit Sh... | New Zealand end Rohit Sharma-led
    India''s 12-match winning streak |

    | 3 | summarize: With Aegon Life iTerm Insurance plan, customers can enjoy tax
    benefits on your premiums paid and save up to â?¹46,800^ on taxes. The plan provides
    life cover up to the age of 100 years.... | Aegon life iTerm insurance plan helps
    customers save tax |

    | 4 | summarize: Speaking about the sexual harassment allegations against Rajkumar
    Hirani, Sonam Kapoor said, "I''ve known Hirani for many years...What if it''s
    not true, the [#MeToo] movement will get de... | Have known Hirani for yrs, what
    if MeToo claims are not true: Sonam |


    ```

    # Model expects dataframe to have 2 column names

