    ## 关于作者 关于技术审稿人


    # 1. 自然语言处理与人工智能概述


    近年来，我们听到了很多关于人工智能、机器学习、深度学习和自然语言处理的内容。它们是什么？它们都一样吗？我们如何区分它们？


    1956 年，一位名叫约翰·麦卡锡的美国计算机科学家创造了*人工智能*这个术语，它是计算机科学的一个子领域。人工智能（AI）是机器思考和学习的能。AI 的概念是让机器能够像人脑一样思考和学。


    在深入细节之前，有必要澄清关于 AI 的一点：大多数人错误地认为 AI 是一种技术，而实际上它是一个概念，即机器能够智能地处理任务。


    如今，它是一个涵盖从数据解释到人形机器人等一切的总称。由于计算能力的提升和海量数据的出现，它最近获得了显著地位。它比人类更有效地识别数据中的模式，使任何企业都能从自己的数据中获得更多洞察。


    AI 和机器学习一样吗？并非如此。这两个术语经常可以互换使用，但它们并不相同。人工智能是一个更广泛的概念，而机器学习是人工智能范式的一部分，可以被视为 AI
    的一个子领域。在 AI 范式下，有多个概念，如机器学习、自然语言处理、深度学习等等。


    你可以将机器学习理解为 AI 的一部分，专注于让机器从数据中学习，并使机器能够在没有人类帮助或干预的情况下思考和决策。整个机器学习概念假设我们应该让机器访问数据，并让它们自己从中学习。


    类似地，深度学习主要处理非结构化数据，如图像、文本和音频。


    而当专门处理文本数据时，我们利用自然语言处理。自然语言处理（NLP）在当前场景下无需介绍。它是一个研究和探索非常活跃的领域，并且在过去几年中兴趣成倍增长。尽管
    NLP 的基础知识相当简单，但高级主题却难以理解。


    这就是机器学习、深度学习和其他最先进算法变得如此关键的地方。图 1-1 是 AI 范式的维恩图。


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig1_HTML.jpg](img/517793_1_En_1_Fig1_HTML.jpg)


    **图 1-1** AI 范式


    在进入项目之前，让我们从非常高的层面理解一些解决后续项目所需的概念和技术。对这些概念的深入理解超出了本书的范围。


    ## 机器学习


    机器学习可以定义为机器从经验（数据）中学习并在没有明确编程的情况下做出有意义的预测的能力。


    它是 AI 的一个子领域，涉及构建能够从数据中学习的系统。目标是让计算机在没有人类干预的情况下自主学习。


    机器学习主要有三大类别。


    *   监督学习

    *   无监督学习

    *   强化学习


    ### 监督学习


    监督学习是机器学习的一部分，利用带标签的训练数据来推导模式或函数，并构建模型或机器学习。数据由因变量（目标标签）和自变量或预测变量组成。机器试图从带标签的数据中学习函数，并对未见过的数据预测输出。


    ### 无监督学习


    在这里，机器学习隐藏模式而不利用带标签的数据，因此不进行训练。相反，这些算法基于特征之间的相似性或距离来学习，以捕获模式。


    ### 强化学习


    强化学习是通过采取行动来最大化奖励的过程。这些是目标导向的算法，学习如何通过经验达到目标。


    接下来，我们将简要讨论属于这些类别的所有算法。您还将了解自然语言处理是如何工作的，以及深度学习是如何解决 NLP 问题的。


    图 1-2 解释了所有类别和子类别。


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig2_HTML.jpg](img/517793_1_En_1_Fig2_HTML.jpg)


    **图 1-2** 机器学习类别


    ### 监督学习


    从带标签的数据中学习称为*监督学习*，它有两种类型：*回归*和*分类*。


    #### 回归


    回归是一种统计预测建模技术，用于找出因变量和自变量之间的关系。当因变量是连续的时使用回归；预测可以取任何数值。


    以下是业界广泛使用的几种回归算法。让我们深入了解其理论，以便更好地理解这些算法。


    *   线性回归

    *   决策树

    *   随机森林

    *   支持向量机

    *   GBM

    *   XGBOOST

    *   ADABOOST

    *   LightGBM


    #### 分类


    分类是一种监督机器学习技术，其中因变量或输出变量是分类的。例如，垃圾邮件/正常邮件、流失/未流失等。


    *   在*二分类*中，要么是“是”，要么是“否”。没有第三种选择。例如，客户可能会从某个业务中流失或不流失。

    *   在*多分类*中，标签变量可以是多类的，例如，电子商务网站的产品分类。


    以下是业界广泛使用的几种分类算法。


    *   逻辑回归

    *   决策树

    *   随机森林

    *   支持向量机

    *   GBM

    *   XGBoost

    *   AdaBoost

    *   LightGBM


    让我们简要地看一下这些算法中的每一个。

