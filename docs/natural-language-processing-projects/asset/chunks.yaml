    Output


    Now, let’s use this trained model for generating new sequences as before.


    ```

    # predicting the next word

    def gen_seq(mod, token, length, seed, n):

    inp = seed

    for _ in range(n_words):

    #convert text to features

    dum = token.texts_to_sequences([inp])[0]

    dum = pad_sequences([dum], maxlen=length, padding=''pre'')

    #predict

    y1 = mod.predict_classes(dum)

    outp = ''''

    for word, index in token.word_index.items():

    if index == y1:

    outp = word

    break

    inp += '' '' + outp

    return inp

    print(gen_seq(mod, token, length-1, ''she hides her bad'', 4))

    print(gen_seq(mod, token, length-1, ''hides'', 4))

    #Output

    she hides her bad the way men i''ve

    hides bad shudder at a

    ```


    ### Model 3: Sequence of Input Words and Output Word


    Let’s use three input words to predict an output word, as follows.


    ```

    # encoding 2 words - 1 word

    #create empty list

    seq = list()

    for k in range(2, len(ohe)):

    seq1 = ohe[k-2:k+1]

    #append to list

    seq.append(seq1)]

    ```


    Model initialization and building step would remain the same as the previous one.


    Let’s see what the prediction looks like.


    ```

    # prediction

    print(gen_seq(mod, token, len-1, ''candle gives'', 5))

    print(gen_seq(mod, token, len-1, ''keeps her'', 3))

    ```


    Output:


    ```

    candle gives a a wicked light light

    keeps her mind the way

    ```


    If you notice the output or next word prediction, it is not great. It is predicting
    the same word in some of the cases. However, if we train this model/framework
    on large machines with huge data, we can expect good results. Also, post-processing
    of the output is required, as discussed in Chapter [10](#517793_1_En_10_Chapter.xhtml).


    To overcome any concerns, we can leverage transfer learning concepts to use pretrained
    models as we did for text summarization.


    Before that, let’s explore some other, bit bigger data set to build a text generation
    model using the built frameworks.


    The data set contains sonnets of Mr. Shakespeare.


    Figure [11-7](#517793_1_En_11_Chapter.xhtml#Fig7) shows the top recurring words
    throughout the data set:


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig7_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Output


    Here, you can see that common words like *the*, *end*, and *i* were highly used
    in the input data. So, you can safely assume that the model is biased on these
    words.


    Figure [11-8](#517793_1_En_11_Chapter.xhtml#Fig8) shows the least occurring words
    in the data set.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig8_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    Output


    Figure [11-8](#517793_1_En_11_Chapter.xhtml#Fig8) shows the words that have been
    used very rarely in the data set, thus the model predicts words from these words
    very rarely.


    As with previous frameworks, this includes tokenization of text, vocabulary and
    inverse vocabulary formation and building batches of sequences of input text.


    ```

    ##We use this function to clean text and tokenize it.

    def clean_text(doc):

    toks = doc.split()

    tab = str.maketrans('''', '''', string.punctuation)

    toks = [words.translate(table) for words in toks]

    #consider he words which has only alphabets.

    toks =[words for words in toks if words.isalpha()]

    #Lower casing

    toks = [words.lower() for words in toks]

    return toks

    ```


    Vocabulary is formed in which each word is mapped to an index based on sentences
    collections, The “counter” forms key/value pairs for each word of text. The “counter”
    is a container that stores words as keys and their count as values.


    Inverse vocabulary is maintained in which there is an index to word mapping. It
    is done by using an enumerate function. This gives tuples in the form of counter
    and element.


    We can leverage the same model definition code used in the previous section and
    change input length and vocab size according to this data set.


    Figure [11-9](#517793_1_En_11_Chapter.xhtml#Fig9) illustrates the workings of
    the model.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig9_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Output


    After sampling, the new text is generated using the words from the input text,
    which is shown in the model. Since the model is trained on Shakespearean sonnets,
    the model can generate the upcoming words.


    Figure [11-10](#517793_1_En_11_Chapter.xhtml#Fig10) shows the output.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig10_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig10_HTML.jpg)


    Figure 11-10


    Output


    So far, you have seen to train a seq2seq model for text generation tasks. We can
    leverage the same frameworks to train on huge data and GPU for better outcomes
    and add more layers to the model architecture like bidirectional LSTM, dropouts,
    encoder-decoder, and attention.


    Next, let’s look at how to leverage some of the state-of-the-art pretrained models
    for text generation tasks.'
