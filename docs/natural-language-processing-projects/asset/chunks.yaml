    #print the loss

    results

    {''eval_loss'': 2.0229070737797725}

    ```


    There is a loss of 2.02. The model is trained. Now let’s look at some of the results
    to evaluate the performance. Let’s print both the original summary as well as
    the machine-generated summary.


    ```

