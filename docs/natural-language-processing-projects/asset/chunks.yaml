    L / df.shape[0]\n0.769163055697453\n```\n\n整个语料库的平均分数为 77%。\n\n## 未来展望\n\n输出必须语法正确、可读性强且格式良好。为了在生成摘要后也能实现这一点，我们需要进行输出处理。这种后处理是在单词或句子级别进行的，以使输出易于理解。\n\
    \n以下是我们可以在流程中添加的一些后处理步骤。\n\n1. **检查语法**。鉴于输出是机器生成的，我们可以预期会有很多语法错误。在向用户展示之前，我们需要清理它们。\n\
    \n   我们可以使用像 Grammarly 的 GECToR（语法错误纠正：标记，而非重写）这样的库（`https://github.com/grammarly/gector`）。\n\
    \n2. **删除重复内容**。摘要中的另一个最大挑战是重复——单词和句子的重复。我们也需要删除它们。\n\n3. **删除不完整的句子**。我们需要过滤掉模型生成的不完整句子（如果有的话）。\n\
    \n## 结论\n\n随着来自各类媒体和社交媒体的内容和新闻不断增加，文本摘要是 NLP 和深度学习应用最广泛的领域之一。我们探讨了如何构建从导入原始数据、清洗数据、使用预训练模型进行自定义训练、评估，到最终预测（生成摘要）的完整流程。在添加更多数据、更改参数以及使用一些高端\
    \ GPU 进行更好训练方面，还有很大的空间，这将产生出色的结果。\n\n应用在各个行业都非常广泛，我们已经可以通过该领域正在进行的几个研究项目看到其发展势头。强化学习与深度学习的结合有望带来更好的结果，相关研究也在朝着这个方向继续推进。目前已有许多用于文本摘要的\
    \ API，但它们还不够准确和可靠。随着所有这些进步，文本摘要很快将达到一个全新的水平。\n\n# 11. 文本生成：下一个词预测\n\n本章探讨了在给定前序词序列的情况下，如何生成文本或预测下一个词。用例或应用包括在\
    \ Gmail 中撰写电子邮件或在 LinkedIn 中发送文本消息时的单词/句子建议，以及机器写诗、文章、博客、小说章节或期刊论文。\n\n图 11-1\
    \ 显示了一封写给 Adarsha 的电子邮件。当输入单词 *Hope* 时，Gmail 会推荐下一组单词 *you are doing well*。这是文本生成的最佳应用。\n\
    \n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig1_HTML.jpg](img/517793_1_En_11_Fig1_HTML.jpg)\n\
    \n**图 11-1** 文本生成示例\n\n文本生成模型是使用最先进的深度学习算法构建的，尤其是 RNN 和注意力网络的变体。\n\n文本生成是一个序列到序列（seq2seq）建模问题。这些生成模型可以在字符级别、单词级别、词组级别、句子级别或段落级别构建。\n\
    \n本项目探讨了通过实现和构建最先进的循环网络变体及预训练模型来创建能够生成文本的语言模型。\n\n## 问题陈述\n\n探讨如何为文本生成应用（例如基于前一个词或一组词进行下一个词预测或句子预测）构建一个序列到序列模型。\n"
- fmt: "# Approach: Understanding Language Modeling\n\n`seq2seq` models are key elements\
    \ of many natural language processing models, such as translation, text summarization,\
    \ and text generation.\n\nHere the model is trained to predict the next word or\
    \ sequence of words.\n\nLet’s look at how to formulate a `seq2seq` model for text\
    \ generation tasks like next word prediction. Let’s assume that this is the data\
    \ on which are training the model. Ideally, the source data is huge with all the\
    \ possible sentences and combinations of words.\n\nThe following is an input example:\n\
    \n`I use a MacBook for work, and I like Apple.`\n\nTable [11-1](#517793_1_En_11_Chapter.xhtml#Tab1)\
    \ shows how to transform this data into the required format for the next-word\
    \ prediction model.\n\n**Table 11-1.** Data Transformation\n\n| Input | Output\
    \ (Target) |\n| --- | --- |\n| `I` | `use` |\n| `Use` | `MacBook` |\n| `MacBook`\
    \ | `for` |\n| `For` | `my` |\n| `My` | `work` |\n| `Work` | `and` |\n| `And`\
    \ | `I` |\n| `I` | `like` |\n| `Like` | `Apple` |\n| `I use` | `MacBook` |\n|\
    \ `use MacBook` | `for` |\n| … |  |\n| `I use` | `MacBook for` |\n| … |  |\n\n\
    We are creating input and output for all combinations of unigrams, bigrams, and\
    \ so forth, sequentially. It can be one to many, many to one, or many to many\
    \ to represent input and output accordingly; hence, it is called a `seq2seq` model.\n\
    \nSince capturing context is vital, the model that comes to mind is `RNN` and\
    \ its variant. So, we can start with basic `LSTM` architecture and then explore\
    \ architectures like bidirectional `LSTM`, autoencoders, attention mechanisms,\
    \ and transformers.\n\nAlso, let’s look at some of the latest state-of-the-art\
    \ pretrained models for `seq2seq` and text generation models.\n\nHere are the\
    \ three logical flow diagrams for different ways of training `seq2seq` or text\
    \ generation models.\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig4_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig4_HTML.jpg)\n\
    \n**Figure 11-4** Using pretrained model\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig3_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig3_HTML.jpg)\n\
    \n**Figure 11-3** Transfer learning\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig2_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig2_HTML.jpg)\n\
    \n**Figure 11-2** Training from scratch\n\n* Training the model from scratch (see\
    \ Figure [11-2](#517793_1_En_11_Chapter.xhtml#Fig2))\n* Transfer learning (see\
    \ Figure [11-3](#517793_1_En_11_Chapter.xhtml#Fig3))\n* Directly using pretrained\
    \ model (see Figure [11-4](#517793_1_En_11_Chapter.xhtml#Fig4))\n\nNow that you\
    \ understand how to approach text generation models, let’s jump into different\
    \ ways of implementation.\n\n## Implementation\n\nFirst, let’s explore few different\
    \ approaches for developing a text-based language model from scratch using deep\
    \ learning.\n\n### Model 1: Word-to-Word Text Generation\n\nModels are trained\
    \ to capture the relationship between the sequence of two words, considering the\
    \ first word as input and the second one as target (output). Note: Import all\
    \ the required libraries.\n\nThe first step is to convert the input sequence into\
    \ a vector for each lowercase text in the source text.\n\n```python\n# data for\
    \ training (we picked few random paragraphs from the internet (blog)\n#data source\
    \ link 1: maggiesmetawatershed.blogspot.com\n#data source link 2: www.humbolt1.com\n\
    text = \"\"\"She's a copperheaded waitress,\ntired and sharp-worded, she hides\n\
    her bad brown tooth behind a wicked\nsmile, and flicks her ass\nout of habit,\
    \ to fend off the pass\nthat passes for affection.\nShe keeps her mind the way\
    \ men\nkeep a knife—keen to strip the game\ndown. The ladies men admire, I've\
    \ heard,\nWould shudder at a wicked word.\nTheir candle gives a single light;\n\
    They'd rather stay at home at night.\nThey do not keep awake till three,\nNor\
    \ read erotic poetry.\nThey never sanction the impure,\nNor recognize an overture.\n\
    They shrink from\"\"\"\n# text encoding\n# To tokenize the sentence let's use\
    \ Tokenizer function\ntoken = Tokenizer()\ntoken.fit_on_texts([text])\n#convert\
    \ text to features\nohe = token.texts_to_sequences([text])[0]\n```\n\nLet’s build\
    \ the vocabulary dimension.\n\n```python\n# text vocab dim\ntext_dim = len(token.word_index)\
    \ + 1\n```\n\nThen we need to create a training data with input and output words.\n\
    \n```python\n# word to word sequence\n#create empty list\nseq = list()\nfor k\
    \ in range(1, len(ohe)):\n    seq1 = ohe[k-1:k+1]\n    #append to list\n    seq.append(seq1)\n\
    # convert text into input and output\nseq = np.array(seq)\nI, O = seq[:,0], seq[:,1]\n\
    ```\n\nLet’s encode the output.\n\n```python\n# encoding the y variable\nO = keras.utils.np_utils.to_categorical(O,\
    \ num_classes=text_dim)\n```\n\nNow let’s define a `seq2seq` model.\n\n```python\n\
    #initialize\nmod = Sequential()\n#add embedding layer\nmod.add(Embedding(text_dim,\
    \ 10, input_length=1))\n#add LSTM layer\nmod.add(LSTM(50))\n#add dense layer\n\
    mod.add(Dense(text_dim, activation='softmax'))\nprint(mod.summary())\n```\n\n\
    Figure [11-5](#517793_1_En_11_Chapter.xhtml#Fig5) shows the model training output.\n\
    \n![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig5_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig5_HTML.jpg)\n\
    \n**Figure 11-5** Output\n\nTechnically, we simulated a multi-class classification\
    \ problem (predicting words in the vocabulary) so let’s use a classification function\
    \ with cross-entropy loss. Here we used `Adam` optimizer to optimize the cost\
    \ function.\n\n```python\n# run network\nmod.compile(loss='categorical_crossentropy',\
    \ optimizer='adam', metrics=['accuracy'])\n#Training\nmod.fit(I, O, epochs=600)\n\
    #Output\n```\n\n![../images/517793_1_En_11_Chapter/517793_1_En_11_Figa_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Figa_HTML.jpg)\n\
    \nAfter tuning the model, we test it by passing the words in the vocabulary and\
    \ predicting the next word. We get the entire output of the prediction.\n\n```python\n\
    #input for the prediction\ninp = 'ladies'\n#convert to features\ndummy = token.texts_to_sequences([inp])[0]\n\
    dummy = np.array(dummy)\n#predict\ny1 = mod.predict_classes(dummy)\nfor word,\
    \ index in token.word_index.items():\n    if index == y1:\n        print(word)\n\
    #output\nmen\n```\n\nNow let’s predict sequence of words.\n\n```python\n# predicting\
    \ the sequence of words\ndef gen_seq(mod, token, seed, n):\n    inp, op = seed,\
    \ seed\n    for _ in range(n):\n        # convert text to features\n        dummy\
    \ = token.texts_to_sequences([inp])[0]\n        dummy = np.array(dummy)\n    \
    \    # prediction\n        y1 = mod.predict_classes(dummy)\n        outp = ''\n\
    \        for word, index in token.word_index.items():\n            if index ==\
    \ y1:\n                outp = word\n                break\n        # append\n\
    \        inp += ' ' + outp\n    return inp\n```\n\nLet’s use some elements of\
    \ input to get a reasonable sequence output.\n\n```python\nprint(gen_seq(mod,\
    \ token, 'wicked', 1))\n#output:\nwicked word\n```\n\nAs the word `wicked` is\
    \ typed, the model predicts the next set of sequence words: `word their candle\
    \ gives a`.\n\nThis is reasonable given the small training scale. If you train\
    \ on larger data and GPU, accuracy increases."
