- fmt: '### Data Cleaning and Preprocessing


    Data cleaning is important to obtain better features and accuracy. You can achieve
    this by doing text preprocessing steps on the data.


    The preprocessing steps are as follows.


    1. Lowercase

    2. Remove special characters

    3. Remove punctuation

    4. Remove stop words

    5. Correct spelling

    6. Normalization


    The following are the libraries to preprocess the text. `NLTK` is a predominant
    free source Python package for text preprocessing.


    ```python

    #Importing the libraries for building Emotion Classifier

    import pandas as pd

    from nltk.corpus import stopwords

    from nltk.stem.wordnet import WordNetLemmatizer

    import string

    from textblob.classifiers import NaiveBayesClassifier

    from textblob import TextBlob

    from nltk.corpus import stopwords

    from nltk.stem import PorterStemmer

    from textblob import Word

    from nltk.util import ngrams

    import re

    from nltk.tokenize import word_tokenize

    import matplotlib.pyplot as plt

    from sklearn.feature_extraction.text import CountVectorizer,TfidfVectorizer

    from sklearn.decomposition import LatentDirichletAllocation

    import sklearn.feature_extraction.text as text

    from sklearn.decomposition import NMF, LatentDirichletAllocation, TruncatedSVD

    from sklearn import model_selection, preprocessing, linear_model, naive_bayes,
    metrics, svm

    import xgboost

    from sklearn import decomposition, ensemble

    import pandas, numpy, textblob, string

    import re

    import nltk

    from sklearn.metrics import classification_report

    from sklearn.metrics import confusion_matrix

    from sklearn.metrics import accuracy_score

    from sklearn.metrics import mean_absolute_error

    ```


    Let’s look at more detail in the preprocessing steps and learn how to implement
    them.


    1. Convert uppercase letters to lowercase.

    2. Remove white space and special characters.


    ```python

    data[''TEXT''] = data[''TEXT''].apply(lambda a: " ".join(a.replace(''[^\w\s]'','''')
    for a in a.split()))

    ```


    3. Remove the stop words.


    ```python

    stop = stopwords.words(''english'')

    data[''TEXT''] = data[''TEXT''].apply(lambda a: " ".join(a for a in a.split()
    if a not in stop))

    ```


    4. Correct spelling.


    ```python

    data[''TEXT''] = data[''TEXT''].apply(lambda a: " ".join(a.lower() for a in a.split()))

    ```


    5. Do stemming.


    ```python

    st = PorterStemmer()

    data[''TEXT''] =  data[''TEXT''].apply(lambda a: " ".join([st.stem(word) for word
    in a.split()]))

    ```


    ```python

    data[''TEXT''] = data[''TEXT''].apply(lambda a: str(TextBlob(a).correct()))

    ```


    After completing all the preprocessing steps, this is what the data looks like.


    ```python

    data.head()

    ```


    Figure [2-3](#517793_1_En_2_Chapter.xhtml#Fig3) shows the output after preprocessing.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig3_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** Output


    ### Label Encoding


    The target encoding is an approach to convert categorical value to numerical value.
    There are seven categories in this data, and we must encode them to proceed further.
    We are using the label encoder function to encode these categories.


    The following shows the data before encoding.


    ```python

    data[''EMOTION''].value_counts()

    ```


    Figure [2-4](#517793_1_En_2_Chapter.xhtml#Fig4) shows the output before encoding.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig4_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig4_HTML.jpg)


    **Figure 2-4** Output


    Labels encode the target variable


    ```python

    object = preprocessing.LabelEncoder()

    data[''EMOTION''] = object.fit_transform(data[''EMOTION''])

    ```


    The following is the data after encoding.


    ```python

    data[''EMOTION''].value_counts()

    ```


    Figure [2-5](#517793_1_En_2_Chapter.xhtml#Fig5) shows the output after encoding.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig5_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig5_HTML.jpg)


    **Figure 2-5** Output


    ### Train-Test Split


    The data is split into two parts: one part trains the model, which is the training
    set, and the other part evaluates the model, which is the test set. The `train_test_split`
    library from `sklearn.model_selection` is imported to split the data frame into
    two parts.


    ```python

    #train-test split

    Xtrain, Xtest, Ytrain, Ytest = model_selection.train_test_split(data[''TEXT''],
    data[''EMOTION''],stratify= data[''EMOTION''])

    ```


    Now that you have completed the train-test split step, the next step is to extract
    the features out of these texts. For this, we use two important methods.


    ### Feature Engineering


    Feature engineering is the process of creating a new feature considering the domain
    context. Let’s implement the count vectorizer and TF-IDF techniques to obtain
    the relevant features from the data sets.


    For more information about the count vectorizer and TF-IDF, please refer to Chapter
    [1](#517793_1_En_1_Chapter.xhtml).


    ```python

    cv = CountVectorizer()

    cv.fit(data[''TEXT''])

    cv_xtrain =  cv.transform(Xtrain)

    cv_xtest =  cv.transform(Xtest)

    ```


    The following is word-level TF-IDF.


    ```python

    tv = TfidfVectorizer()

    tv.fit(data[''TEXT''])

    ```


    Transform the training and validation data using TF-IDF object.


    ```python

    tv_xtrain =  tv.transform(Xtrain)

    tv_xtest =  tv.transform(Xtest)

    ```


    Now let’s get into one of the crucial steps to build the multiclass text classification
    model. We explore the different algorithms in this section.


    ### Model Building Phase


    In this phase, we build different models using both count vectors and word-level
    TF-IDF as features, and then the model is finalized based on the accuracy level
    of the classifier.


    Let''s build a classifier function so that you can play around with the different
    algorithms.


    ```python

    def build(model_initializer, independent_variables_training, target, independent_variable_test):

    # fit

    model_initializer.fit(independent_variables_training, target)

    # predict

    modelPred=classifier_model.predict(independent_variable_test)

    return metrics.accuracy_score(modelPred, Ytest)

    ```


    Let’s use the preceding function and try various algorithms.


    #### Multinomial Naive Bayes


    The multinomial naive Bayes algorithm essentially calculates the probability of
    each category using the Bayes theorem. For more information, refer to Chapter
    [1](#517793_1_En_1_Chapter.xhtml).


    Let’s build a naive Bayes model.


    The following uses naive Bayes generated with count vectors.


    ```python

    output = build(naive_bayes.MultinomialNB(), cv_xtrain, Ytrain, cv_xtest)

    print(output)

    ```


    The following uses naive Bayes generated with word-level TF-IDF vectors.


    ```python

    output = build(naive_bayes.MultinomialNB(), tv_xtrain, Ytrain, tv_xtest)

    print(output)

    #Output:

    0.561944

    0.565081

    ```


    56.1% accuracy is obtained from count vectorizer features.


    56.5% accuracy is obtained from TD-IDF vectorizer features.


    #### Linear Classifier/Logistic Regression


    For more information on the algorithm, please refer to Chapter [1](#517793_1_En_1_Chapter.xhtml).


    The following builds a logistic regression model.


    ```python

    # for CV

    output = build(linear_model.LogisticRegression(), cv_xtrain, Ytrain, cv_xtest)

    print(output)

    # for TF-IDF

    output = build(linear_model.LogisticRegression(), tv_xtrain, Ytrain, tv_xtest)

    print(output)

    #Output:

    0.565081

    0.590172

    ```


    #### Support-Vector Machine


    For more information, refer to Chapter [1](#517793_1_En_1_Chapter.xhtml).


    Let’s build the SVM model.


    ```python

    #for cv

    output = build(svm.SVC(), cv_xtrain, Ytrain, cv_xtest)

    print(output)

    #for TF-IDF

    output = build(svm.SVC(), tv_xtrain, Ytrain, tv_xtest)

    print(output)

    #Output:

    0.545739

    0.578672

    ```


    #### Random Forest


    You learned how random forest works in chapter [1](#517793_1_En_1_Chapter.xhtml).
    It’s an ensemble technique that consists of decision trees. Let’s look at how
    this performs on the data.


    The following builds a random forest model.


    ```python

    #for CV

    output = build(ensemble.RandomForestClassifier(), cv_xtrain, Ytrain, cv_xtest)

    print(output)

    #for TF-IDF

    output = build(ensemble.RandomForestClassifier(), tv_xtrain, Ytrain, tv_xtest)

    print(output)

    #Output:

    0.553580

    0.536330

    ```'
