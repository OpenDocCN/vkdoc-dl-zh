    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Figc_HTML.png](images/517793_1_En_1_Chapter/517793_1_En_1_Figc_HTML.png)\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Figd_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Figd_HTML.jpg)\n\
    \n###### Word Embeddings\n\nEven though TF-IDF is most widely used, it doesn’t\
    \ capture the context of a word or sentence. Word embeddings solve this problem.\
    \ Word embeddings capture context and semantic and syntactic similarities between\
    \ words.\n\nUsing shallow neural networks, we generate a vector that captures\
    \ the context and semantics.\n\nIn recent years, there has been a lot of advancements\
    \ in this field, particularly by\n\n*   word2vec\n\n*   GloVe\n\n*   fastText\n\
    \n*   ELMo\n\n*   Sentence-BERT\n\n*   GPT\n\nFor more information about these\
    \ techniques, please refer to our book *Natural Language Processing Recipes: Unlocking\
    \ Text Data with Machine Learning and Deep Learning* *Using Python* (Apress, 2021).\n\
    \n#### Applications\n\n##### Text Classification\n\nThis is where your machine\
    \ learning starts interacting with text data. The classic example is your spam\
    \ classification. Independent variables are the feature extracted using the steps\
    \ discussed (text to features) earlier. Dependent variables depend on whether\
    \ the mail is spam or ham. Using a machine learning classification algorithm,\
    \ let’s build a model that predicts whether mail is spam or ham. Many deep learning\
    \ techniques like RNN and LSTM also obtain better accuracy.\n\nIn the coming chapters,\
    \ we build both binary and multiclass text classification models to solve different\
    \ business use cases.\n\n##### Text Summarization\n\nThe other powerful application\
    \ of NLP coupled with deep learning is text summarization. It is the process of\
    \ creating short notes out of a long and detailed document. There is an abundant\
    \ amount of text data, and reading every word takes a lot of time. That’s where\
    \ the industry saw its need and worked toward building state-of-the-art text summarization\
    \ solutions using deep learning and reinforcement learning.\n\nYou learn how to\
    \ implement text summarization using deep learning in one of the projects in this\
    \ book.\n\n##### Text Generation\n\nThe AI world is moving from understanding\
    \ to generation. Be it image or text, we are witnessing a good amount of traction.\
    \ For instance, an AI-generated painting sold for millions of dollars.\n\nText\
    \ generation uses neural language models at its core. Recurrent neural networks\
    \ are the foundation of neural language models, with variants LSTM and GRU networks.\
    \ The latest work in encoder-decoder coupled with attention mechanism approaches\
    \ achieved good results in this field.\n\nLet’s further discuss this concept with\
    \ the application using RNNs and transformers to build a text generator.\n\nAnd\
    \ there are many more such applications.\n\n*   **Text regression**: “Predicting\
    \ time to resolve” an issue or complaint by looking at the description of the\
    \ complaint\n\n*   **Text similarity**: Search engines, content-based recommendation\
    \ systems, resume shortlisting based on the job description, and many others\n\
    \n*   **Entities extraction**: Extracting important and required words or a set\
    \ of words from the document\n\n*   **Conversational AI**: Chatbots and Q&A systems\n\
    \nNow that you understand the fundamentals of machine learning, deep learning,\
    \ and NLP, let’s look at the life cycle (step by step) leveraging the concepts\
    \ to solve business problems."
  trans: "\n### 文本预处理\n\n文本数据通常是非结构化的且难以处理。其中包含大量无用信息，因此必须对原始数据进行强制预处理。这一点至关重要，因为无关文本可能会改变最终结果的方向。那么，让我们快速了解几种用于清洗文本数据的不同预处理技术。\n\
    \n-   小写化\n-   移除标点符号和停用词\n-   拼写纠正\n-   文本标准化\n-   文本规范化\n    -   词干提取\n    -\
    \   词形还原\n\n在本章中，我们将理解与这些技术相关的概念，并在本书后续部分中逐步实现它们。\n\n-   **小写化**：将文本转换为小写，以避免特征重复。\n\
    -   **移除标点符号和停用词**：标点符号对句子含义的贡献不大。同样，停用词（如 `the`、`a`、`it`、`is` 等）根据具体用例可能毫无意义。它们在语料库中的存在会扭曲结果。如果移除这些词，权重分布会更准确，关键词语也能获得更高的权重。\n\
    -   **拼写纠正**：我们遇到的原始数据包含大量拼写错误，未经纠正直接使用会造成冗余。你需要在一定程度上纠正这些错误，并使用某些包来获得更好的结果。\n\
    -   **文本标准化**：缩写是文本数据中的另一大挑战。在处理评论和意见时，客户使用缩写的可能性很高。你需要处理这个问题；这个过程同样重要。\n-   **文本规范化**：单词\
    \ `clean`、`cleaning` 和 `cleaned` 含义相同，但时态不同。将这些词规范化称为*文本规范化*。\n    -   **词干提取**：将文本规范化为词根形式称为*词干提取*。例如，`clean`、`cleaning`\
    \ 和 `cleaned` 的词干都是 `clean`。\n    -   **词形还原**：词形还原会考虑单词的时态和单复数，找到其词根形式。例如，`best`\
    \ 和 `good` 可能含义相同。经过词形还原后，这两个词的结果都是 `good`。\n\n### 文本到特征\n\n由于机器或算法无法理解文本，NLP\
    \ 中的一项关键任务是将文本数据转换为称为*特征*的数值数据。有多种技术可以实现这一点。让我们简要讨论一下。\n\n#### 独热编码 (OHE)\n\n\
    OHE 是将文本转换为数字或特征的基本且简单的方法。首先，它将语料库中存在的所有标记转换为列，如表 1-1 所示。然后，针对每个观测值，如果单词存在则标记为\
    \ 1，否则标记为 0。\n\n表 1-1 OHE\n\n| | One | Hot | Encoding |\n| --- | --- | --- | ---\
    \ |\n| One-Hot | 1 | 1 | 0 |\n| Hot | 0 | 1 | 0 |\n| Encoding | 0 | 0 | 1 |\n\n\
    表 1-1 演示了 OHE。\n\n#### 计数向量化器\n\n这种方法的一个缺点是，如果一个单词在句子中出现多次，其重要性与仅出现一次的单词相同。为了解决这个问题，出现了计数向量化器，其原理与\
    \ OHE 相同，但不再标记为 1 或 0，而是统计该观测值中出现的标记数量。\n\n表 1-2 演示了计数向量化器。\n\n表 1-2 计数向量化器\n\n\
    | | AI | new | Learn | ……. |\n| --- | --- | --- | --- | --- |\n| AI is new AI\
    \ is everywhere | 2 | 1 | 0 | ………. |\n| Learn AI Learn NLP | 1 | 1 | 2 | ……… |\n\
    | NLP is cool | 0 | 0 | 1 | ………. |\n\n#### 词频-逆文档频率 (TF-IDF)\n\n即使是计数向量化器也无法解决所有问题。如果句子长度不一致，并且某个单词在所有句子中重复出现，那么问题就会变得棘手。TF-IDF\
    \ 解决了这些问题。\n\n-   **词频** (TF) 定义为“标记在语料库文档中出现的次数除以标记总数”。\n-   **逆文档频率** (IDF)\
    \ 是语料库文档总数除以包含所选单词的文档总数。这为语料库中的稀有单词赋予了更高的权重。\n\n将两者相乘，即可得到语料库中某个单词的 TF-IDF 向量。\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Figb_HTML.png](img/517793_1_En_1_Figb_HTML.png)\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Figc_HTML.png](img/517793_1_En_1_Figc_HTML.png)\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Figd_HTML.jpg](img/517793_1_En_1_Figd_HTML.jpg)\n\
    \n#### 词嵌入\n\n尽管 TF-IDF 应用最广泛，但它无法捕捉单词或句子的上下文。词嵌入解决了这个问题。词嵌入能够捕捉单词之间的上下文、语义和句法相似性。\n\
    \n通过使用浅层神经网络，我们生成一个能够捕捉上下文和语义的向量。\n\n近年来，该领域取得了许多进展，特别是通过：\n\n-   `word2vec`\n\
    -   `GloVe`\n-   `fastText`\n-   `ELMo`\n-   `Sentence-BERT`\n-   `GPT`\n\n有关这些技术的更多信息，请参考我们的书籍\
    \ *Natural Language Processing Recipes: Unlocking Text Data with Machine Learning\
    \ and Deep Learning Using Python* (Apress, 2021)。\n\n### 应用\n\n#### 文本分类\n\n这是机器学习开始与文本数据交互的地方。经典的例子是垃圾邮件分类。自变量是使用前面讨论的步骤（文本到特征）提取的特征。因变量取决于邮件是垃圾邮件还是正常邮件。使用机器学习分类算法，让我们构建一个模型来预测邮件是垃圾邮件还是正常邮件。许多深度学习技术，如\
    \ RNN 和 LSTM，也能获得更好的准确性。\n\n在接下来的章节中，我们将构建二分类和多分类文本分类模型，以解决不同的业务用例。\n\n#### 文本摘要\n\
    \nNLP 与深度学习相结合的另一个强大应用是文本摘要。它是从冗长详细的文档中生成简短笔记的过程。文本数据量巨大，阅读每个单词需要大量时间。这就是业界看到其需求，并致力于使用深度学习和强化学习构建最先进的文本摘要解决方案的原因。\n\
    \n你将在本书的某个项目中学习如何使用深度学习实现文本摘要。\n\n#### 文本生成\n\n人工智能世界正从理解转向生成。无论是图像还是文本，我们都看到了大量的进展。例如，一幅由\
    \ AI 生成的画作卖出了数百万美元。\n\n文本生成的核心是使用神经语言模型。循环神经网络是神经语言模型的基础，其变体包括 LSTM 和 GRU 网络。最近在编码器-解码器架构中结合注意力机制的方法在该领域取得了良好的效果。\n\
    \n让我们进一步讨论这个概念，并使用 RNN 和 Transformer 构建一个文本生成器。\n\n还有更多此类应用。\n\n-   **文本回归**：通过查看问题或投诉的描述来“预测解决时间”\n\
    -   **文本相似度**：搜索引擎、基于内容的推荐系统、基于职位描述的简历筛选等\n-   **实体提取**：从文档中提取重要或所需的单词或词组\n- \
    \  **对话式 AI**：聊天机器人和问答系统\n\n现在你已经了解了机器学习、深度学习和 NLP 的基础知识，让我们看看如何利用这些概念来逐步解决业务问题的生命周期。\n"
- fmt: "# The AI Life Cycle\n\nThere are ten critical steps everyone should follow\
    \ to solve any AI and data science problems. Solving a problem using data science\
    \ is not an easy task. It’s multidisciplinary and includes different steps, right\
    \ from business understanding to productionizing for real-time output. To simplify\
    \ this long process, let’s divide the complete data science and AI life cycle\
    \ into ten different steps.\n\n1. Understanding and defining the business problem\n\
    2. Translating the business problem into a machine learning problem and creating\
    \ a solution approach/architecture design\n3. Data collection and understanding\n\
    4. Data cleaning and preprocessing\n5. Exploratory data analysis\n6. Feature engineering\
    \ and selection\n7. Model building, tuning, and selection\n8. Model testing and\
    \ validation\n9. Prediction and insights\n10. Deployment or productionization\
    \ and model maintenance\n\nLet’s dive into each of these steps.\n\n## Understanding\
    \ and Defining the Business Problem\n\n- The entire data science process stands\
    \ on this step which is identifying/defining the problem. Just because data science\
    \ is thrilling doesn’t mean you can randomly create a problem statement.\n- Understanding\
    \ the business, problem, bottlenecks, pain points, and business goals is very\
    \ important. Data science is not about making your product or company cool; rather,\
    \ it’s about solving the actual problems that a business is facing to make a significant\
    \ impact on increasing revenue, reducing cost, or customer experience/satisfaction.\n\
    - Once the problem is defined well, let’s say to decrease the business’s churn\
    \ rate, then start exploring the possible solutions, data requirements, and so\
    \ on.\n\n## Translating the Business Problem into an ML Problem and Creating a\
    \ Solution Approach/Architecture Design\n\nThe critical part of the data science\
    \ process is converting a business problem into an analytical or machine learning\
    \ approach. Few problems seem straightforward, but not all.\n\nIt takes mastering\
    \ all the algorithms, business knowledge, and experiences to create a solid architecture\
    \ to solve the problem effectively and efficiently.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig19_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig19_HTML.jpg)\n\
    \nFigure 1-19\n\nScenarios\n\n1. Validate if a problem can be solved by simple\
    \ analytical methods like exploratory data analysis, bivariate analysis, and correlation.\
    \ You can get most of the answers through these steps.\n2. Next, go deeper into\
    \ the problem to see whether it’s supervised, unsupervised, or reinforcement learning.\n\
    3. If it’s a supervised learning problem, does it belong to regression or classification?\
    \ Based on all of these, use machine learning or statistical algorithms to solve\
    \ the problem. Figure [1-19](#517793_1_En_1_Chapter.xhtml#Fig19) shows the scenarios.\n\
    \n## Data Collection and Understanding\n\nThis part involves thinking through\
    \ what data is required to solve the given problem and finding ways to get that\
    \ data. Data can be\n\n- Internal databases like transaction data\n- Freely available\
    \ open source data like population\n- Purchasing external data\n\nData can also\
    \ be in any format.\n\n- Structured data (data present in table format)\n- Unstructured\
    \ data (image, text, audio, and video)\n\nRemember the expression, “garbage in,\
    \ garbage out.” Hence, data collection is the most critical step.\n\n## Data Cleaning\
    \ and Preprocessing\n\nNow that the raw data is ready, you need to process it\
    \ before starting any type of analysis. Many times, data can be quite messy, and\
    \ it would corrupt the analysis. The most time-consuming step in the entire data\
    \ science process is data cleaning and preparation.\n\n- Data cleaning\n    -\
    \ Missing value treatment\n    - Imputation methods\n    - Detect/remove outliers\n\
    \    - Eliminating duplicate rows\n- Combining multiple data sources\n- Transforming\
    \ data\n\n## Exploratory Data Analysis\n\nA more interesting step in the overall\
    \ process is where we torture the data to find hidden patterns, insights and visualize\
    \ to tell a story from the data.\n\nThe following are the most common things done\
    \ as part of EDA.\n\n- Hypothesis testing\n- Descriptive statistics or univariate\
    \ analysis\n- Inferential statistics or bivariate analysis\n- Pivots, plots, visuals,\
    \ and so on\n\n## Feature Engineering and Selection\n\n*Feature engineering* is\
    \ a process where that leverages domain and business knowledge to create more\
    \ features or variables that has meaningful relationships with the target feature.\
    \ Proper feature engineering increases the accuracy of the machine learning models\
    \ and provides valuable and relevant insights. It is an art.\n\n*Feature extraction*\
    \ extracts new features from raw data and creates valuable variables that stabilize\
    \ the machine learning model. They are manually created with spending a lot of\
    \ time on actual data and thinking about the underlying problem, structures in\
    \ the data, and how best to expose them to predictive modeling algorithms. It\
    \ can be a process of aggregating or combining variables to create new ones or\
    \ splitting features to create new features.\n\nNot all features are created to\
    \ affect the outcome of the model. There are only a few that are useful, and most\
    \ of them are junk. These junk variables need to be removed to achieve better\
    \ results. Regularization methods like `LASSO`/ridge regression and Stepwise regression\
    \ are examples that automatically perform feature selection.\n\nThe feature engineering\
    \ process\n\n- Derives features and KPIs from the existing ones, which adds more\
    \ meaning and relation to the target feature\n- Creates more sensible features\
    \ from the business context\n- Validates the features using it in the model\n\
    - Repeats the process until you find the best features for the model\n\nThe following\
    \ are some examples.\n\n- Extracting day, time, and weekday from dates\n- Extracting\
    \ the region from a location\n- Creating grouped data from numerical features\n\
    \n## Model Building, Tuning, and Selection\n\nWith all the data in place and processed,\
    \ split the data into training and testing data and get into the model building\
    \ phase. Choose the appropriate algorithm to solve the problem. It’s not a one-time\
    \ process; it’s an iterative process. You must try multiple algorithms before\
    \ selecting the final one.\n\nThere are so many algorithms and tuning parameters\
    \ to get the highest possible accuracy. But manually performing that task takes\
    \ a lot of time. There are many model-tuning libraries like grid search that provide\
    \ the best model to use for implementation.\n\n## Model Testing and Validation\n\
    \nIt is very important to test the model on unseen data and see if it’s not overfitting.\
    \ If the model performs equally well on the unseen data and outcomes are as expected,\
    \ we finalize the model, else repeat steps 6, 7, and 8 until we find the most\
    \ optimum model. Cross validation is a more popularly used technique in machine\
    \ learning for model testing and validation.\n\n## Prediction and Insights\n\n\
    There are two ways predictive modeling can be leveraged. One is the prediction\
    \ that directly impacts the business. On the other hand, models also generate\
    \ insights and hidden patterns that are useful for making data-driven decisions\
    \ and business strategies.\n\n## Deployment or Productionization and Model Maintenance\n\
    \nTaking projects from Jupyter notebook to live is an important step to leveraging\
    \ AI in real time and realizing its impact. Cloud giants like Microsoft Azure,\
    \ Google Cloud Platform (GCP), and Amazon Web Services (AWS) provide deployment\
    \ frameworks and MLOps components for easy productionization.\n\nAlso, you can\
    \ have multiple problem statements which produce multiple machine learning solutions.\
    \ Maintaining these models, versioning, updating with new data plays a vital role.\
    \ To achieve this, a model maintenance framework and AI governance should be in\
    \ place to obtain the highest impact."
