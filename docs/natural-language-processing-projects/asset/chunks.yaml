    0.769163055697453\n```\n\nThe average score for the whole corpus is 77%.\n\n##\
    \ Future Scope\n\nThe output must be grammatically correct, readable, and well-formatted.\
    \ For this to happen even after the summary is generated, we need to do output\
    \ processing. This post-processing is done at the word or sentence level to make\
    \ the output understandable.\n\nThe following are the few post-processing steps\
    \ we can add to the pipeline.\n\n1. **Check grammar**. Given the output is machine-generated,\
    \ we can expect a lot of grammatical mistakes. We need to clean them up before\
    \ showing them to the user.\n\n   We can use libraries like GECToR (Grammatical\
    \ Error Correction: Tag, Not Rewrite) by Grammarly (`https://github.com/grammarly/gector`).\n\
    \n2. **Remove duplicates**. Another biggest challenge in summarization is duplicating—words\
    \ and sentences. We need to remove them as well.\n\n3. **Remove incomplete sentences**.\
    \ We need to filter out incomplete sentences generated by the model, if any.\n\
    \n## Conclusion\n\nWith the ever-increasing content and news from all types of\
    \ media and social media, text summarization is one of the most widely used applications\
    \ of NLP and deep learning. We explored how to build that pipeline right from\
    \ importing raw data, cleaning it, using the pretrained model for custom training,\
    \ evaluating, and finally predicting (generating summaries). There is a lot of\
    \ scope to add more data, change the parameters, and use some high-end GPUs for\
    \ better training, which would yield great results.\n\nApplications are broad\
    \ in every industry, and we can already see the traction through several research\
    \ projects going on in this area. The use of reinforcement learning coupled with\
    \ deep learning promises better results, and research continues in that direction.\
    \ There are a lot of APIs in place to summarize the text, but they are not that\
    \ accurate and reliable. Text summarization will soon reach a whole new level\
    \ with all these advances.\n\n# 11. Text Generation: Next Word Prediction\n\n\
    This chapter explores ways to generate text or predict the next word, given the\
    \ sequence of previous words. Use cases or applications include word/sentence\
    \ suggestions while typing an e-mail in Gmail or text messages in LinkedIn, and\
    \ machines writing poems, articles, blogs, chapters of novels, or journal papers.\n\
