    ```


    我们再来看看语料库中出现频率最高的词汇，以便更好地理解数据。


    ```

    # 移除领域相关停用词后的高频词

    a = data[''description''].str.cat(sep='' '')

    words = nltk.tokenize.word_tokenize(a)

    word_dist = nltk.FreqDist(words)

