  trans: '

    # 12. 结论与未来趋势


    你已经学会了如何利用机器学习和深度学习的力量构建不同的自然语言处理（NLP）应用和项目，这有助于解决跨行业的业务问题。


    本书重点介绍了以下方面：


    -   分类（电商产品分类、投诉分类、Quora 重复问题预测）

    -   聚类（TED 演讲分割及其他文档聚类）

    -   摘要（新闻标题摘要）

    -   主题提取（简历解析与筛选）

    -   实体识别（使用`CRF`从电影情节中提取自定义实体）

    -   相似度（简历筛选与排序）

    -   信息检索（基于 AI 的语义搜索，智能搜索引擎如何提升电商客户体验）

    -   生成（下一个词预测、自动补全）

    -   信息抽取（简历解析）

    -   翻译（多语言搜索）

    -   对话式 AI（聊天机器人与问答）


    你还了解了部分最新的 SOTA（最先进）算法如何构建更健壮的模型和应用。


    ## 接下来该往哪走？


    NLP 和深度学习在研究领域非常活跃。在你阅读本文时，许多新算法正在被设计出来，以提升应用的智能水平，并使 NLP 更高效、更用户友好。


    关于下一代 NLP 的更多信息，请参阅我们的书籍 *《自然语言处理实战：利用 Python 和机器学习与深度学习解锁文本数据》*（Apress，2019 年）。


    围绕 NLP 的最新及未来趋势可分为两个方面：


    -   深度（技术与算法）

    -   广度（应用与用例）


    本书简要介绍了一些活跃的研究领域（深度方面）：


    -   **词嵌入的进展**：你了解了`word2vec`、`GloVe`、`BERT`、`Transformers`和`GPT`。我们可以关注这一领域，期待更多基于
    Transformer 和 Reformer（最新、最先进的 Transformer 变体，具有可逆层）改进的 SOTA 文本特征算法。

    -   **用于 NLP 的先进深度学习**：当前主流技术围绕`LSTM`、`GRU`、双向`LSTM`、自编码器、注意力机制、Transformer 和自回归层。未来几年，我们可以期待为
    NLP 任务设计出更高效、更完善的深度学习和 Transformer 架构。

    -   **强化学习在 NLP 中的应用**。

    -   **迁移学习与预训练模型**：我们使用了许多 SOTA 预训练模型来解决摘要、生成和搜索问题。在不久的将来，我们可以期待更多通用、健壮、高效且更准确的预训练模型和迁移学习框架。

    -   **NLP 中的元学习**。

    -   **用于 NLP 的胶囊网络**：以其多任务处理能力而闻名，单个训练好的模型可以解决多样化的问题并执行多项 NLP 任务。

    -   **集成/结合监督与无监督方法**：为任何任务训练模型都需要大量数据，尤其是标注数据。这个时代最大的挑战之一是获取准确标注的数据。这通常是一个手动过程，但在海量数据上执行需要大量的时间和资源。因此，结合无监督和监督方法来解决模型训练中标注数据挑战的研究非常活跃。


    除了这些技术深度领域，从更广泛的 NLP 视角来看，还有几个领域：


    -   NLP 自动化：`AutoNLP`

    -   文本可以是任何语言：多语言 NLP

    -   对话式 AI

    -   特定领域和行业的训练模型

    -   NLP 与计算机视觉的结合


    让我们逐一了解。


    ## AutoNLP


    作为一名数据科学家，创建优秀的机器学习和深度学习模型来训练和实施各种 NLP 相关任务需要大量的技能和时间。在选择正确的参数、优化、调试以及在新数据上测试时，可能会面临挑战。对于熟练的数据科学家来说，这不算大问题，但仍然很耗时。如果我们能使用某种框架来自动化所有流程，提供可视化，并以最小的误差获得出色的结果，那会怎样？


    Hugging Face 的`AutoNLP`就是答案！


    ### 什么是 AutoNLP？


    它让你能够轻松地预处理、训练、调优和评估用于各种任务的 NLP 模型或算法，省去诸多麻烦。


    Hugging Face 是一家下一代 NLP 初创公司，帮助专业人士和公司轻松构建和实验最先进的 NLP 和深度学习模型。你可以在[`https://huggingface.co/`](https://huggingface.co/)上进行大量探索和研究。


    以下是`AutoNLP`的主要特点：


    -   根据你的数据自动选择最佳模型

    -   自动微调

    -   自动超参数优化

    -   训练后模型比较

    -   训练后立即部署

    -   提供`CLI`和 Python API


    它支持二分类、多分类、实体抽取、文本摘要、问答和语音识别。


    图 12-1 展示了 Hugging Face `AutoNLP`在其可执行任务和支持语言方面的能力。


    ![../images/517793_1_En_12_Chapter/517793_1_En_12_Fig1_HTML.jpg](img/517793_1_En_12_Fig1_HTML.jpg)


    **图 12-1** Hugging Face


    因此，它支持多种语言，这是另一个趋势。


    `AutoNLP`可以通过最少的人工干预执行各种 NLP 相关任务，让我们的生活变得更加轻松。我们正处于技术日新月异的时代。通过 NLP，我们正在使人与机器的交流变得像人与人交流一样个性化。因此，在未来几年，有许多
    NLP 趋势值得我们期待。


    除了`AutoNLP`，Hugging Face 还拥有多个其他自定义的 SOTA 预训练模型、框架和 API。


    在`AutoNLP`中，你还可以微调托管在 Hugging Face Hub 上的模型。那里有超过 14,000 个可用模型，可以根据你想要执行的任务、偏好的语言或你想使用的数据集（如果托管在
    Hugging Face 上）进行筛选。


    Hugging Face 数据集库目前拥有超过 100 个公共数据集。


    以下是 Hugging Face 的一些模型：


    -   `BERT-base`

    -   `RoBERTa`

    -   `DistilBERT`

    -   `Sentence Transformers`

    -   `GPT-2`

    -   `T5-base`

    -   `ALBERT`


    大约有 14,000 个模型（每天都在增加）。你可以应用过滤器来获取符合你需求的模型。


    以下是 Hugging Face 的一些摘要任务模型：


    -   `Distilbart-xsum`

    -   `Bart-large-cnn`

    -   `Pegasus-large`

    -   `Mt5`


    让我们进入下一个趋势技术。

    '
- fmt: '# Multilingual NLP


    The following are the most prominent multilingual models.


    - `mBERT`

    - `XLM`

    - `XLM-R`

    - Multilingual BERT (`mBERT`): This is released along with the BERT and it supports
    104 languages. Essentially it is BERT trained in many languages.

    - `XLM` and `XLM-R`: `XLM-R` trains `RoBERTa` on a huge multilingual data set
    at an enormous scale.


    Most NLP advances have been in English until recently. Major tech organizations
    like Google and Facebook are rolling out preskilled multilingual systems whose
    overall performance is on par with English.


    On Facebook, if a person posts something on his timeline that is written in Chinese,
    there is an option to translate it to English.


    Initially, Amazon’s Alexa understood only the English language. Now it is extended
    to a Hindi version for India.


    So, these two examples use the multilingual NLP models to understand different
    languages.


    Figure [12-2](#517793_1_En_12_Chapter.xhtml#Fig2) shows some of the most recent
    models created in the field of multilingual NLP, with the top results according
    to Google XTREME.


    ![../images/517793_1_En_12_Chapter/517793_1_En_12_Fig5_HTML.jpg](images/517793_1_En_12_Chapter/517793_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Example (photo by Digital Marketing Agency NTWRK on Unsplash [https://​unsplash.​com/​license](https://unsplash.com/license))


    ![../images/517793_1_En_12_Chapter/517793_1_En_12_Fig4_HTML.jpg](images/517793_1_En_12_Chapter/517793_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Example (photo by Harley-Davidson on Unsplash [`https://unsplash.com/license`](https://unsplash.com/license))


    ![../images/517793_1_En_12_Chapter/517793_1_En_12_Fig3_HTML.jpg](images/517793_1_En_12_Chapter/517793_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Example (photo by XPS on Unsplash [`https://unsplash.com/license`](https://unsplash.com/license))


    ![../images/517793_1_En_12_Chapter/517793_1_En_12_Fig2_HTML.jpg](images/517793_1_En_12_Chapter/517793_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Multilingual NLP


    As of August 2021, `Polyglot` stands at the top of the Google XTREME leaderboard
    with the highest points compared to other multilingual models.


    # Conversational AI


    A few years back, it was all the human intelligence behind multiple domains to
    get the job done, like a customer support center.


    And now, there is an artificially enabled intelligent system chatbot that does
    many of the things humans do.


    These days, Amazon Alexa, Apple Siri, and Google Home are in every other home.
    Be it for your daily news, weather updates, entertainment, or traffic, we almost
    interact with these intelligent systems. In time, their performance will only
    improve.


    Yes, this is one such topic hot in the air right now.


    # Industry-Specific Pretrained Models


    Industry or domain-specific models start getting a lot of traction. Although many
    generalized pretrained models, these sometimes fail to perform well on domain-specific
    problems (whose data are not easily available on the Internet at scale).


    For example, 80% of all health care data is locked in unstructured data. Its applications
    include the following.


    - Information extraction from clinical notes and reports

    - NLP in patient trials


    There are several pretrained AI models.


    - Pretrained sentiment models

    - Pretrained chatbot models

    - Pretrained text generation or summarization models


    These might not perform well in the health care domain. Hence there is a need
    for custom training and making it domain-specific. There is a pretrained model
    called `bioBERT` that is domain-specific language representation on medical data.


    # Image Captioning


    When two states of the art technologies combine, imagine the wonders they can
    do. Computer vision and NLP form a deadly combination for many human-like intelligent
    systems.


    One such application is image caption generation or image-to-text summarization.
    Likewise, video summarization can be implemented that summarizes the scene of
    the video.


    Figure [12-3](#517793_1_En_12_Chapter.xhtml#Fig3) shows example 1.


    Figure [12-4](#517793_1_En_12_Chapter.xhtml#Fig4) shows example 2.


    Figure [12-5](#517793_1_En_12_Chapter.xhtml#Fig5) shows example 3.


    There will be many applications under this umbrella.


    We hope you enjoyed this book and are now ready to leverage the learnings to solve
    real-world business problems using NLP.


    See you soon in the next book/edition.'
