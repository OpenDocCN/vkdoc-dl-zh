    # 7. Predicting Duplicate Questions in Quora


    Quora is a question-and-answer platform for folks to connect and gain knowledge
    on various topics. Anyone can ask a question, and anyone can write answers to
    these questions, thereby bringing variety in views.


    ## Problem Statement


    Questions flow in each day, and thousands are answering them. There is a very
    good probability that questions are the same literally or with similar intent,
    which creates unnecessary duplicate questions and answers in the system. This
    can be data-heavy and the user experience takes a hit.


    For instance, “Who is the best cricketer in the world now?” and “Currently, which
    cricketer ranks top in the world?” They are the same question but asked differently.
    So, identifying whether given questions are similar or not is the main goal of
    the problem. If we can solve this problem with the help of NLP, that reduces significant
    duplication and enhances the user experience.


    ## Approach


    This is a straightforward sentence comparison NLP task. We use both unsupervised
    and supervised approaches to solve this problem.


    ### Unsupervised Learning


    Let’s use various pretrained models like Sentence-BERT, GPT, and doc2vec to solve
    this problem. Figure [7-1](#517793_1_En_7_Chapter.xhtml#Fig1) is a flow chart
    of the process of unsupervised learning.


    ![../images/517793_1_En_7_Chapter/517793_1_En_7_Fig1_HTML.png](images/517793_1_En_7_Chapter/517793_1_En_7_Fig1_HTML.png)


    Figure 7-1


    Unsupervised learning flow


    The following are the steps for unsupervised learning.


    1.  Stack the question 1 and question 2 columns vertically to get embeddings of
    all questions.

    2.  Encode questions using various sentence embeddings techniques like Sentence-BERT,
    OpenAI GPT, and doc2vec.

    3.  Find similar questions using cosine similarity between the input vector and
    the original data set, and return the top N questions with the highest cosine
    similarity score.


    ### Supervised Learning


    In supervised learning, we are training the deep learning classifier to predict
    whether two sets of questions are similar or not. The output is a probabilistic
    score between two questions. Figure [7-2](#517793_1_En_7_Chapter.xhtml#Fig2) illustrates
    the flow of the process.


    ![../images/517793_1_En_7_Chapter/517793_1_En_7_Fig2_HTML.png](images/517793_1_En_7_Chapter/517793_1_En_7_Fig2_HTML.png)


    Figure 7-2


    Supervised learning flow


    ## Data set


    We are using the Quora Question Pairs data set from Kaggle. You can download the
    data from [`www.kaggle.com/c/quora-question-pairs/data`](http://www.kaggle.com/c/quora-question-pairs/data).


    The data contains IDs and questions. It also contains a label to implicate whether
    two questions are duplicates. If it’s duplicate then the value will be 1, otherwise
    0.


    Figure [7-3](#517793_1_En_7_Chapter.xhtml#Fig3) shows the output.


    ![../images/517793_1_En_7_Chapter/517793_1_En_7_Fig3_HTML.jpg](images/517793_1_En_7_Chapter/517793_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Output


