    So, let’s start the model building phase.


    # Model Building Phase


    In this phase, we build clusters using the k-means method. To define an optimal
    number of clusters, we considered different methods like elbow, silhouette coefficient,
    and dendrogram method. All these methods are considered by using count vectors,
    word-level TF-IDF, and word embeddings as features, and then the model has been
    finalized based on the performance.


    ## K-means Clustering


    For more information on the k-means algorithm, please refer to Chapter [1](#517793_1_En_1_Chapter.xhtml).


    There are various techniques to define an optimal number of clusters, including
    the elbow method, the silhouette score, and the dendrogram approach.


    ### Elbow Method


    The elbow method is a type of method for checking the consistency of clusters
    created. It finds the ideal number of clusters in data. Explained variance considers
    the percentage of variance explained and derives an ideal number of clusters.
    If the deviation percentage explained is compared with the number of clusters,
    the first cluster adds a lot of information, but at some point, explained variance
    decreases, which gives an angle on the graph. At the moment, the number of clusters
    is selected.


    ### Silhouette Coefficient


    The silhouette coefficient, or silhouette score, tells how much the object is
    similar to other clusters compared to its own cluster. The value varies from –1
    to 1, where a high value indicates that the cluster fits well with itself, and
    the cluster does not match the neighboring cluster.


    The silhouette value is calculated using distance metrics like Euclidean distance,
    the Manhattan distance, and so on.


    ### Count Vectors as Features


    Since we built the count vectorizer feature earlier, let’s use that.


    #### Elbow Method


    Determine `k` using the elbow method.


    ```

    from sklearn.cluster import KMeans

    import matplotlib.pyplot as plt

    elbow_method = {}

    for k in range(1, 10):

    kmeans_elbow = KMeans(n_clusters=k).fit(cv_tedfeatures)

    elbow_method[k] = kmeans_elbow.inertia_

    plt.figure()

    plt.plot(list(elbow_method.keys()), list(elbow_method.values()))

    plt.xlabel("Number of cluster")

    plt.ylabel("SSE")

    plt.show()

    ```


    Figure [3-8](#517793_1_En_3_Chapter.xhtml#Fig8) shows the elbow output.


    ![../images/517793_1_En_3_Chapter/517793_1_En_3_Fig8_HTML.jpg](images/517793_1_En_3_Chapter/517793_1_En_3_Fig8_HTML.jpg)


    **Figure 3-8** Output'
