    ## Real-time Data Extraction


    You want to make a product as real time as possible. To understand the sentiment
    and emotion of any product, you need public data that is freely available. If
    you have a retail website, you can fetch data from there. But that’s very rare.
    And you always sell products on someone else’s platform. The following are possible
    ways to collect data.


    * Twitter

    * Other social media like Facebook and LinkedIn

    * E-commerce websites like Amazon

    * Company websites

    * News articles on companies or products


    Getting data from all these data sources is the biggest task. We start with Twitter
    for this chapter.


    All kinds of people share their opinion on Twitter about newly released products.
    It’s one of the right platforms to fetch the data and analyze it. It also provides
    APIs to collect the data for any given search. You need to create the Twitter
    developer account, and we are good to use the tweets. Let’s explore how to use
    this API and pull data.


    ### Twitter API


    To use this script, you should register a data-mining application with Twitter.
    After doing this, you are provided with a unique consumer key, consumer secret,
    access token, and access secret. Using these keys, you can use the functions from
    the `Tweepy` library to pull the data from Twitter without much hassle.


    To get the real-time Twitter data, use the `twitter_data_extraction.py` file,
    consisting of all the required functions with necessary comments.


    Run `twitter_data_extraction.py` from the Git source to extract Twitter data (see
    [`https://github.com/agalea91/twitter_search`](https://github.com/agalea91/twitter_search)).


    By executing all the functions from the `.py` file, you get the output shown in
    Figure [2-7](#517793_1_En_2_Chapter.xhtml#Fig7). The data collected from Twitter
    is saved in JSON format by creating a separate directory. Figure [2-7](#517793_1_En_2_Chapter.xhtml#Fig7)
    shows the snapshot of Samsung data extracted from Twitter.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig7_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig7_HTML.jpg)


    **Figure 2-7** Output


    We are converting JSON to CSV and importing the CSV as a data frame to use this
    data.


    ```

    twt=pd.read_json(''/path/samsung/samsung_date.json'',lines=True,orient=''records'')

    ```


    We are only selecting dates and comments which are required for future analysis.


    ```

    twt = twt[[ ''created_at'',''text'']]

    ```


    The tweets related to the Samsung brand are collected from the Twitter search
    API and used as the test set. It consists of 1723 sentences. The data set consists
    of two columns.


    * `created_at` consists of date and time corresponding to tweets.

    * `text` consists of corresponding tweets.


    ```

    twt.tail()

