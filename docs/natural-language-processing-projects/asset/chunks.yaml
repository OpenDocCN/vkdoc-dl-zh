    # Text Preprocessing


    There is a lot of noise present in the text data. Text preprocessing is vital.
    Let’s clean it up.


    Text preprocessing tasks include


    *   Converting the text to lower case

    *   Removing punctuations

    *   Removing numbers

    *   Removing extra whitespace


    Let’s create a function that includes all these steps so that we can use this
    wherever required in future instances (for model training).


    ```

    #Text preprocessing function

    def txt_preprocessing(txt):

    txt = re.sub(r''[_"\-;%()|+&=*%.,!?:#$@\[\]/]'', '' '', txt)

    txt = re.sub(r''\'''', '' '', txt)

    txt = txt.lower()

    return txt

    headlines_processed = []

