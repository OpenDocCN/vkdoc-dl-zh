    \n**图 8-16** 模型预测\n\n## 后续步骤\n\n- 为模型添加更多特征，例如，对于 CRF 模型，可以组合能表达恰当含义的单词。\n- 当前实现仅在\
    \ CRF 模型的交叉验证搜索中考虑了两种超参数；然而，CRF 模型提供了更多可进一步调整以提升性能的参数。\n- 使用 LSTM 神经网络，并与 CRF\
    \ 构建集成模型。\n- 对于 BERT 模型，我们可以添加一个 CRF 层，以构建更高效的网络，因为 BERT 能高效地发现单词间的模式。\n\n## 总结\n\
    \n我们通过简要介绍 NER 和用于提取主题的现有库开始了这个项目。鉴于其局限性，您需要构建自定义的 NER 模型。在定义问题之后，我们提取了电影名称和导演名称，并构建了解决问题的方法。\n\
    \n我们尝试了三种模型：随机森林、CRF 和 BERT。我们从文本中创建特征，并将它们传递给具有不同特征的 `RandomForest` 和 CRF 模型。如您所见，特征越多，准确率越高。\n\
    \n我们没有手动构建这些特征，而是使用了深度学习算法。我们采用了一个基于 BERT 的预训练模型，并在其基础上训练了 NER。我们没有使用任何手动创建的特征，这是深度学习模型的优势之一。另一个优点是预训练模型。您知道迁移学习有多么强大，本项目的结果也证明了这一点。与使用手动特征结合\
    \ CRF 相比，我们能够从 NER BERT 模型中获得良好的结果。\n\n# 9. 使用迁移学习构建聊天机器人\n\n在当今世界，大多数企业都需要为其产品和服务提供客户支持。随着电子商务、电信服务、互联网相关产品等的增长，对客户服务的需求只增不减。在大多数对话中，客户服务支持查询的性质是重复的。客户支持对话可以实现自动化。\n\
    \n以下是需要客户服务的几个行业：\n\n- 电子商务\n- 电信\n- 医疗保健\n- 制造业\n- 电子设备\n\n随着领域的发展，这个列表只会越来越长。那么，解决方案是什么呢？图\
    \ 9-1 展示了聊天机器人在客户服务中的应用。\n\n![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig1_HTML.jpg](img/517793_1_En_9_Fig1_HTML.jpg)\n\
    \n**图 9-1** 聊天机器人的应用\n\n任何专注于提供下一代客户体验的企业都需要卓越的售后服务。提供可靠的客户服务呼叫中心来解答客户的问题，这在几年前还行得通。随着最新技术的兴起，在当今的现代世界中，客户追求更大的便利性和速度。在人力资源有限的情况下，速度和客户体验是最大的挑战。\n\
    \n如果实施得当，这些问题大部分都可以通过聊天机器人解决。\n\n那么，什么是聊天机器人？\n\n维基百科将聊天机器人（也称为间谍程序、对话机器人、聊天机器人、交互式代理、对话界面、对话式\
    \ AI、聊天机器人或人工智能间谍实体）定义为：“一种通过听觉或文本方式进行[对话](https://en.wikipedia.org/wiki/Conversation)的[计算机程序](https://en.wikipedia.org/wiki/Computer_program)或[人工智能](https://en.wikipedia.org/wiki/Artificial_intelligence)。”\n\
    \n*机器人*是计算机理解人类语音或文本的能力。*聊天机器人*是一个从根本上模拟人类对话的计算机程序。它是*聊天机器人*的简称。\n\n聊天机器人通过自动化客户支持来节省时间和精力。它们也用于其他业务任务，例如收集用户信息和组织会议。如今，它们可以做很多事情，让生活更加顺畅。\n\
    \n以下是一些统计数据：\n\n- 2020 年，超过 85% 的客户交互是在无人参与的情况下管理的。\n- 拥有 AI 系统来协助客户支持的公司已经看到了积极的投资回报率、更高的员工和客户满意度，以及更快的解决问题时间。\n\
    \n因此，在本章中，让我们探索构建聊天机器人的多种方法，并了解如何实施它们来解决业务问题。根据问题陈述和数据，我们可以通过多种方式构建聊天机器人。即使不能面面俱到，也让我们构建其中的几个。\n"
- fmt: '# Approach


    There are so many ways to build a chatbot. It depends on the complexity of the
    problem it should serve and the available data. Based on these considerations,
    there are the following types of chatbots.


    ## Rule-based Chatbots


    These are predefined keywords that the bot can understand. These commands must
    be written explicitly while coding using regular expressions or using any other
    text analysis method. It is very much rule-based, and if the user asks anything
    out of the box, the response from the bot is static, which shows that the bot
    cannot understand that input.


    Even though it is very simple, it serves most of the problems where the task is
    repetitive, such as canceling the order or asking for a refund.


    ## Generative or Smart Chatbots


    These are advanced context-based chatbots that are backed by deep learning. There
    are no predefined sentences, but you should be able to answer most of the questions,
    if not all. At this stage, we cannot build a perfect chatbot, given the challenges
    in this area. But this is an active research area, and we can observe better results
    as days pass by.


    We can also classify these chatbots into two more types based on their usage.


    - **Vertical chatbots** are domain-specific chatbots focused on the application
    and do not work well enough across industries. For example, we are building a
    chatbot for doctors to answer questions about products on the market. However,
    we cannot use this for telecom industry applications.


    - A **horizontal chatbot** is a general and open domain bot. The best examples
    are Siri, Alexa, and Google Assistant. These chatbots work at a high level and
    cannot be used for a granular task at the domain level. It does most of the tasks
    and acts as the starting point for most of the vertical bots.


    Given these types of classification within chatbots, there are a lot of ways to
    implement these bots. There are a good number of frameworks to build chatbots
    for both vertical and horizontal chatbots. But let’s go one level deeper and learn
    to implement these chatbots from scratch using natural language processing.


    Also, let’s not get into rule-based chatbots, given they are easy to implement.
    Let’s investigate the different variations of advanced chatbots. We can use any
    of these chatbots based on the business problem.


    So, let’s start.


    # Chatbot 1: QA System Using Similarity Scores


    One of the ways we can build chatbots is using the similarity scores between the
    sentences. We know that the bot always gets a sentence from the user. We need
    to use the sentence, and it should be answered so that the answer is relevant.


    It must find a similar sentence in the data and show the response. Again, there
    are multiple ways to do this based on feature engineering techniques and formulas
    to calculate the similarity score. Figure [9-2](#517793_1_En_9_Chapter.xhtml#Fig2)
    shows the architecture for this simple chatbot.


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig2_HTML.jpg](images/517793_1_En_9_Chapter/517793_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Simple chatbot flow


    To convert text to features, we can use either a count vectorizer or TF-IDF vectorizer.
    In this exercise, let’s use TF-IDF since we know it’s going to perform better.
    We can also use word embeddings.


    So, let’s implement this.


    ```

    #import packages

    import pandas as pd

    import numpy as np

    #import nltk

    import nltk

    #import other

    import string

    import random

    #importing the data

    data=open(''data.txt'',''r'',errors = ''ignore'')

    text=data.read()

    print(text)

    ```


    Figure [9-3](#517793_1_En_9_Chapter.xhtml#Fig3) shows the text imported from Wikipedia,
    and it has all the sentences in it. Since we are doing this at the sentence level,
    let’s convert them to sentences. And convert them to words to obtain the features
    using TF-IDF.


    ```

    # to lower  case

    text=text.lower()

    # tokenize the words

    wr_ids = nltk.word_tokenize(text)

    # tokenize the sent

    st_ids = nltk.sent_tokenize(text)

    wr_ids[0]

    ''data''

    st_ids[0]

    ```


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig3_HTML.jpg](images/517793_1_En_9_Chapter/517793_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Text from Wikipedia


    The following is the output.


    ```

    ''data science is an interdisciplinary field that uses scientific methods, processes,
    algorithms and systems to extract knowledge and insights from structured and unstructured
    data,[1][2] and apply knowledge and actionable insights from data across a broad
    range of application domains.''

    ```


    We need to calculate the similarity between sentences, and for that, distance
    measures are necessary. The most used distance metric is cosine similarity. Let’s
    import the libraries for that and use them to calculate distance.


    ```

    #import libraries for distance calculation

    from sklearn.feature_extraction.text import TfidfVectorizer

    from sklearn.metrics.pairwise import cosine_similarity

    ```


    The following code is the response function, which is called once there is input
    from the bot. First, the code takes the input and appends it to the text corpus.
    Then TF-IDF is calculated for all the tokens using `TfidfVectorizer`. Next, the
    similarity score is calculated using cosine similarity between input and all the
    sentences present in the corpus. Then the sentence with the highest similarity
    is given a response from the bot.


    If the TF-IDF is 0, then the standard response is given.


    ```

    #define function for response

    def get_output(user_input):

    #define the output

    output=''''

    #append input to text

    st_ids.append(user_input)

    #define tfidf

    txt_v = TfidfVectorizer(stop_words=''english'')

    #get vector

    vec_txt = txt_v.fit_transform(st_ids)

    #get score

    rank_score= cosine_similarity(vec_txt[-1], vec_txt)

    idx=rank_score.argsort()[0][-2]

    ft_out = rank_score.flatten()

    ft_out.sort()

    final_v = ft_out[-2]

    if(final_v==0):

    output=output+"Dont know this annswer, Ask something else"

    return output

    else:

    output = output+st_ids[idx]

    return output

    ```


    The final piece of code activates the bot, gets the input, calls the response
    function, and gives the output.


    ```

    # Final code to run the bot

    print("Enter your question")

    print("")

    in_txt = input()

    in_txt=in_txt.lower()

    print("")

    print("Ans:", get_output(in_txt))

    print("")

    st_ids.remove(in_txt)

    ```


    The following is the output.


    Done. Figure [9-4](#517793_1_En_9_Chapter.xhtml#Fig4) shows the model output for
    the question “What is data science?”


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig4_HTML.jpg](images/517793_1_En_9_Chapter/517793_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Model output


    We implemented a simple chatbot using TFIDF and similarity scores. Many things
    can be implemented on top of this, but there are the fundamentals behind these
    types of bots. Post this, APIs need to be created. The front end has to be integrated
    and hosted in a repository. All these things are the engineering or dev ops side
    of things.


    The following are the disadvantages of these kinds of Q&A systems.


    - The chatbot can answer the questions only on data present in the input text
    we used in the initial stage of the code. It fails to answer the question out
    of it.


    - Fails to capture the entire context of the question since we did not use any
    advanced text to feature techniques.


    But these are well suited for vertical chatbots where we know what the backed
    data is and certainly know that questions are within that. A chatbot can be built
    for legal activities using all possible legal documents as training data.


    So that ends one type of chatbot implementation. It fails to understand the context.
    This is a problem given that the chatbot has to understand the context of the
    question; otherwise, users will not be excited about it.


    This leads to our second chatbot built using deep learning, which captures the
    context.'
