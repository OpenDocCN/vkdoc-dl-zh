- fmt: '### GPT-2 (Advanced Pretrained Model)


    `GPT-2` stands for Generative Pretrained Transformer version-2. It is a huge architecture
    built on transformers with billions of hyperparameters and trained with 50 GB
    of text on the Internet. The `GPT-2` model is built to focus on the task of text
    generation. `GPT-2` is an improved version of `GPT-1`. `GPT` outperforms other
    domain-specific models on paper.


    For more information on `GPT` and its versions, refer to our book *Natural Language
    Processing Recipes: Unlocking Text Data with Machine Learning and Deep Learning
    Using Python* (Apress, 2021).


    Explanation of `GPT` in detail is beyond the scope of this book. For more information
    on the `GPT-1`, `2`, `3`, please refer to the research papers from [`https://openai.com/research/`](https://openai.com/research/).


    There are four different versions of `GPT-2` available.


    This chapter uses a large model with approximately 700 million parameters. The
    `transformers` library for this model contains weights of different versions of
    it. This is a state-of-the-art model, and we want to use it as generalized as
    possible, so we won’t be custom training here. We use it and make a customized
    function that gives output as per the given input words.


    ```

    Import and initialize gpt2

    !pip install transformers

    import torch

    import transformers

    #import tokenization and pre trained model

    ftrs = transformers.GPT2Tokenizer.from_pretrained(''gpt2'')

    pre_g_model = transformers.GPT2LMHeadModel.from_pretrained(''gpt2'')

    #input text

    input_text="We are writing book on NLP, let us"

    # tokenization for input text

    input_tokens = ftrs.encode(input_text,return_tensors="pt")

    #sequences generated from the model

    seq_gen = pre_g_model.generate(input_ids=input_tokens,max_length=100,repetition_penalty=1.4)

    seq_gen = seq_gen.squeeze_()

    # predicted sequences

    seq_gen

    tensor([ 1135,   389,  3597,  1492,   319,   399, 19930,    11,  1309,   514,

    760,   644,   345,   892,    13,   198,   464,   717,  1517,   356,

    761,   284,   466,   318,   651,   262,  1573,   503,   546,   340,

    290,   787,  1654,   326,   661,  1833,   703,  1593,   428,  2071,

    1107,   373,   329,   606,   526, 50256])

    # lets get the words from decoder

    txt_gen = []

    for i, j in enumerate(seq_gen):

    j = j.tolist()

    txt = ftrs.decode(j)

    txt_gen.append(txt)

    # final text generated

    text_generated = ''''

    text_generated.join(txt_gen).strip(''\n'')

    #output

    ```


    We are writing a book on NLP; let us know what you think.


    The first thing we need to do is get the word out about it and make sure that
    people understand how important this issue is to them."<|endoftext|>


    The example gives meaningful output. We haven’t fine-tuned the model or re-trained
    on any data, and it derives context and predicts the next set of words. Here you
    can change parameters according to your needs where `max_length` refers to the
    maximum number of words to predict, and `n_seqs` refers to the number of different
    sequences (i.e., the number of different outputs from the same input, as required).
    The results we got were quite interesting.


    So, to sum it up, this model outperformed our expectations for the text generation
    task.


    **Note**


    The architecture of `GPT-3` is similar to `GPT-2`. Few major differences are around
    the attention layers, word embedding size, and activation function parameters.


    Now, let’s move on to another interesting library that can be leveraged in most
    applications that requires text input. This intelligent system saves time by recommending
    what to write in a search engine or a WhatsApp message, for example.


    ### Autocomplete/Suggestion


    We already worked on few text generation models in which few were made locally
    trained on a relatively very small database. The other was `GPT-2` state-of-the-art
    NLP generalized model to generate text word by word. Now it is time to predict
    the upcoming word from half-written/ill-written characters. Ultimately, we wanted
    to look for “Incremental Search AKA Auto Complete AKA Auto Suggestion”. Here,
    as you type text, possible matches are found and immediately presented to you.
    Most of these applications are enabled in search engines.


    Figure [11-11](#517793_1_En_11_Chapter.xhtml#Fig11) shows how an autoword suggestion
    works.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig11_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig11_HTML.jpg)


    **Figure 11-11** Example of autosuggestion


    #### Fast Autocomplete


    The `Fast Autocomplete` library (by zepworks) efficiently searches a corpus of
    words. This library is completely based on Python language. Internally, it makes
    a trie tree of every unique word in the corpus. The data structure they used in
    this library is called `Dwg`, which stands for *directed word graph*.


    ```

    Install the library:

    !pip install fast-autocomplete

    ```


    To use this library, we needed to extract tokens from the data and put them in
    a specific format, which acts as the context to the model for providing suggestions
    as the user types.


    Let’s use the same data we used previously, which contained sonnets of Shakespeare,
    and write the function to extract words from it.


    The following is the function to extract a unique token from the corpus.


    ```

    def unique_tokens(location):

    to_doc = read_csv_gen(location, csv_func=csv.DictReader)

    toks = {}

    for row in to_doc:

    distinct_words = row[''distinct_words'']

    index = row[''index'']

    if distinct_words != index:

    local_words = [index, ''{} {}''.format(distinct_words, index)]

    while local_words:

    w = local_words.pop()

    if w not in toks:

    toks[w] = {}

    if distinct_words not in toks:

    toks[distinct_words] = {}

    return toks

    print(toks)

    ```


    Figure [11-12](#517793_1_En_11_Chapter.xhtml#Fig12) shows tokens output.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig12_HTML.jpg](images/517793_1_En_11_Chapter/517793_1_En_11_Fig12_HTML.jpg)


    **Figure 11-12** Output


    Similarly, we can provide a predefined dictionary for synonyms, if any.


    Finally, we initialize the autocomplete model.


    ```

    from fast_autocomplete import AutoComplete

    autocomplete = AutoComplete(words=toks)

    ```


    Now that we have provided the data context to the model, we only need to call
    the `search` function from `autocomplete` library to get the auto word suggestion
    based on the context/data provided. It takes only three parameters.


    *   `Word`: the word you want to type

    *   `Max_Cost`: Distance metric cost

    *   `Size`: no. of words to recommend


    Figure [11-13](#517793_1_En_11_Chapter.xhtml#Fig13) shows searching a word like
    *straw*. The recommendations include *straws* and *strawberry*. Similarly, we
    experimented with *tr*, *hag*, *sc*, and *mam*.


    ![../images/517793_1_En_11_Chapter/517793_1_En_11_Fig13_HTML.png](images/517793_1_En_11_Chapter/517793_1_En_11_Fig13_HTML.png)


    **Figure 11-13** Output


    You saw how single-word suggestion works. Similarly, you can implement multiple
    sequences of word suggestions. For more information, refer to [`https://pypi.org/project/fast-autocomplete/`](https://pypi.org/project/fast-autocomplete/).


    ## Conclusion


    We implemented different ways to model language for text generation using different
    techniques and libraries. All these are the baseline models, can be improved with
    huge training data and bigger GPUs.


    There is ample application of text generation for which we can utilize the frameworks
    discussed in this chapter and use domain-specific training data accordingly based
    on the use case. One amazing Git application generates code from the comments
    and the other way around.


    You have seen and implemented few complex algorithms and learned some state of
    art algorithms in NLP and deep learning. Chapter [12](#517793_1_En_12_Chapter.xhtml)
    discusses what’s next in NLP and deep learning. Where to go from here? We uncover
    some of the interesting research areas.'
