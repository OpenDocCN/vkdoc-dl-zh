- fmt: '### Linear Regression


    Regression is the most frequently used term in analytics and data science. It
    captures the relationship between the target feature and independent features.
    And it is used when you want to predict a continuous value. Figure [1-3](#517793_1_En_1_Chapter.xhtml#Fig3)
    demonstrates how linear regression works.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig3_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Linear regression


    In Figure [1-3](#517793_1_En_1_Chapter.xhtml#Fig3), points are plotted using the
    x-axis and the y-axis. The aim is to find the relation between `x` and `y` by
    drawing an optimal line close to all the points on the plane (minimizing error).
    The slope of the line derives from the following equation.


    `Y = A[0] + A[1]X`


    `Y` = dependent variable


    `X` = independent variable


    `A[0]` = intercept


    `A[1]` = coefficient of `X`


    For example,


    `Age = Ht * 4 + wt * 3 + 2`


    Here we are forming a relationship between height and weight with age. Given the
    height and weight, you can calculate age.


    There are few assumptions in linear regression.


    - There should always be a linear relationship between dependent variables and
    independent variables.

    - Data should be normally distributed.

    - There should not be any collinearity between independent variables. Multicollinearity
    refers to a strong linear relationship between independent variables. These correlated
    variables act as redundant and need to be treated.

    - There is *homoscedasticity*, which means the variance of errors should be constant
    over time. Variance shouldn’t be higher for higher output values and lower for
    lower output values.

    - The error terms should not have any correlation among themselves.


    Once you build the model, you want to know how well the model is performing. To
    do this, you can use metrics.


    - *R-squared* (`R²`) is the most widely used metric to calculate the accuracy
    of linear regression. The `R²` value shows how the variance of dependent variables
    is explained through independent variables. R-squared ranges from 0 to 1.

    - The *root-mean-square error* (`RMSE`) shows the measure of the dispersion of
    predicted values from actual values.


    ### Logistic Regression


    We discussed how to predict a numerical value using linear regression. But we
    also encounter classification problems where dependent variables are binary classes
    like yes or no, 1 or 0, true or false, and so on. In that case, you need to use
    *logistic regression,* which is a classification algorithm. Logistic regression
    is an extended version of linear regression, but we use a log of odds to restrict
    the dependent variable between zero and one. The following is the logic function.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Figa_HTML.png](images/517793_1_En_1_Chapter/517793_1_En_1_Figa_HTML.png)


    `(p/1 – p)` is the odds ratio. `B0` is constant. `B` is the coefficient.


    Figure [1-4](#517793_1_En_1_Chapter.xhtml#Fig4) shows how logistic regression
    works.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig4_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Logistic regression


    Now let’s look at how to evaluate a classification model.


    - **Accuracy** is the number of correct predictions divided by the total number
    of predictions. The values lie between 0 to 1, and to convert it into a percentage,
    multiply the answer by 100. But only considering accuracy as the evaluation parameter
    is not an ideal thing to do. For example, you can obtain very high accuracy if
    the data is imbalanced.

    - A **confusion matrix** is a crosstab between actual vs. predicted classes. You
    can use it for binary and multiclass classification.


    Figure [1-5](#517793_1_En_1_Chapter.xhtml#Fig5) represents a confusion matrix.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig5_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Confusion matrix


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig6_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    ROC curve


    - **ROC curve**: A *receiver operating characteristic* (`ROC`) curve is an evaluation
    metric for classification tasks. A `ROC` curve plot has a false positive rate
    on the x-axis and a true positive rate on the y-axis. It says how strongly the
    classes are distinguishing when the thresholds are varied. Higher the value of
    the area under the `ROC` curve, the higher the predictive power. Figure [1-6](#517793_1_En_1_Chapter.xhtml#Fig6)
    shows the `ROC` curve.


    Linear and logistic regression are traditional ways of doing things that use statistics
    to predict the dependent variable. But there are few drawbacks to these algorithms.
    The following describes a few of them.


    - Statistical modeling must satisfy the assumptions discussed previously. If they
    are not satisfied, models won’t be reliable and thorough fit random predictions.

    - These algorithms face challenges when data and target feature is nonlinear.
    Complex patterns are hard to decode.

    - Data should be clean (missing values and outliers should be treated).


    There are other advanced machine learning concepts like a decision tree, random
    forest, `SVM`, and neural networks to overcome these limitations.


    The decision is a type of supervised learning in which the data is split into
    similar groups based on the most important variable to the least. It looks like
    a tree-shaped structure when all the variables split hence the name tree-based
    models.


    The tree comprises a root node, decision node, and leaf node. A decision node
    can have two or more branches, and a leaf node represents a decision. Decision
    trees are capable of handling any type of data, whether it is quantitative or
    qualitative. Figure [1-7](#517793_1_En_1_Chapter.xhtml#Fig7) shows how the decision
    tree works.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig7_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Decision tree


    Let’s explore how tree splitting happens, which is the key concept in decision
    trees.


    The core of the decision tree algorithm is the process of splitting the tree.
    It uses different algorithms to split the node and different for classification
    and regression problems. Now, let’s try to understand it.


    #### Classification


    - The **Gini index** is a probabilistic way of splitting the trees. It uses the
    sum of the square of probability for success and failure and decides the purity
    of the nodes.

    - **CART** (classification and regression tree) uses the Gini method to create
    splits.

    - A **Chi-square** is a statistical significance between subnodes, and the parent
    node decides the splitting. `Chi-square = ((Actual – Expected)^2 / Expected)^1/2`.

    - **CHAID** (Chi-square Automatic Interaction Detector) is an example of this.


    #### Regression


    - **Variance reduction** works to split the tree based on the variance between
    two features (target and independent feature).

    - **Overfitting** occurs when the algorithms tightly fit the given training data
    but inaccurately predict the untrained or test data outcomes.


    This is the case with decision trees as well. It occurs when the tree is created
    to perfectly fit all samples present in the training data set, affecting the accuracy
    of test data.'
  raw: '##### Linear Regression


    Regression is the most frequently used term in analytics and data science. It
    captures the relationship between the target feature and independent features.
    And it is used when you want to predict a continuous value. Figure [1-3](#517793_1_En_1_Chapter.xhtml#Fig3)
    demonstrates how linear regression works.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig3_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Linear regression


    In Figure [1-3](#517793_1_En_1_Chapter.xhtml#Fig3), points are plotted using the
    x-axis and the y-axis. The aim is to find the relation between *x* and *y* by
    drawing an optimal line close to all the points on the plane (minimizing error).
    The slope of the line derives from the following equation.


    Y = A[0] + A[1]X


    Y = dependent variable


    X = independent variable


    A[0] = intercept


    A[1] = coefficient of X


    For example,


    Age = Ht * 4 + wt * 3 + 2


    Here we are forming a relationship between height and weight with age. Given the
    height and weight, you can calculate age.


    There are few assumptions in linear regression.


    *   There should always be a linear relationship between dependent variables and
    independent variables.


    *   Data should be normally distributed.


    *   There should not be any collinearity between independent variables. Multicollinearity
    refers to a strong linear relationship between independent variables. These correlated
    variables act as redundant and need to be treated.


    *   There is *homoscedasticity*, which means the variance of errors should be
    constant over time. Variance shouldn’t be higher for higher output values and
    lower for lower output values.


    *   The error terms should not have any correlation among themselves.


    Once you build the model, you want to know how well the model is performing. To
    do this, you can use metrics.


    *   *R-squared* (R²) is the most widely used metric to calculate the accuracy
    of linear regression. The R² value shows how the variance of dependent variables
    is explained through independent variables. R-squared ranges from 0 to 1.


    *   The *root-mean-square error* (RMSE) shows the measure of the dispersion of
    predicted values from actual values.


    ##### Logistic Regression


    We discussed how to predict a numerical value using linear regression . But we
    also encounter classification problems where dependent variables are binary classes
    like yes or no, 1 or 0, true or false, and so on. In that case, you need to use
    *logistic regression,* which is a classification algorithm. Logistic regression
    is an extended version of linear regression, but we use a log of odds to restrict
    the dependent variable between zero and one. The following is the logic function.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Figa_HTML.png](images/517793_1_En_1_Chapter/517793_1_En_1_Figa_HTML.png)


    (p/1 – p) is the odds ratio. B0 is constant. B is the coefficient.


    Figure [1-4](#517793_1_En_1_Chapter.xhtml#Fig4) shows how logistic regression
    works.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig4_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig4_HTML.jpg)


