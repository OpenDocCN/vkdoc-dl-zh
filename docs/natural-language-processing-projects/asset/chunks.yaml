- fmt: 'Since in summarization, the input is in the form of sequence text (news),
    and even output is in the form of sequence text again (news headline). This is
    a seq2seq model, which is popular in applying text summarization, text generation,
    machine translation, and Q&A.


    Now let’s discuss the building blocks of seq2seq models.


    The first thing that comes to mind when we hear about sequence is LSTM. The LSTM
    architecture captures sequence. So, keep it as a base. The following are some
    of the building blocks.


    - **Bidirectional LSTM**: The first layer of the recurrent network is replicated
    to form another architecture where the reverse of the input is passed through
    it to capture the relationship of words and context in both directions, capturing
    better context.

    - **Autoencoders**: Encoder and decoder architecture. The encoder encodes the
    input text and generates the fixed-length vector, which is fed into the decoder
    layer for prediction. The main disadvantage here is that the decoder has visibility
    to the fixed-length vector-only and might be limited to some context, and there
    is a high chance of important information loss. Hence the birth of the attention
    mechanism.

    - **Attention mechanism**: The attention mechanism captures the importance each
    word carries to generate the desired outcome. It increases the importance of few
    words that result in the desired output summary or sequence.


    There is also self-attention and transformers. Getting into the details of all
    these concepts is beyond the scope of this book. Please refer to the respective
    research papers to gain a deeper understanding of these concepts.


    Now that you understand how seq2seq models are formulated, let’s discuss how to
    build them. There are three options.


    - Training from scratch (requires a large amount of data and resources to achieve
    better accuracy)

    - Only using a pretrained model

    - Transfer learning (custom training on a pretrained model)


    Let’s jump into BART, which is built on the building blocks we have discussed.


    ### BART: Simple-Transformer Pretrained Model


    Bidirectional encoders form the first part of the BART transformers architecture.
    Autoregressive decoders form the second part. They are integrated to devise the
    seq2seq model. And, hence BART can also be used for many text-to-text-based applications,
    including language translation and text generation.


    The AR in BART stands for *autoregressive*, where the model consumes the previously
    generated output as an additional input at each step.


    This makes BART particularly effective in text generation tasks. We fine-tuned
    BART for abstractive text summarization. BART offers an abstractive summarizer
    that can intelligently paraphrase, capture, and combine information based on contextual
    overlap. You can also experiment with tuning the beam width hyperparameter to
    optimize generative capabilities while minimizing the chances of misinformation.


    BART pretrained model is trained on CNN/*Daily Mail* data for the summarization
    task.


    Please note that you can also use this pretrained model directly without customization
    and generate the summary output.


    Let’s start the implementation using this model. First, install the necessary
    libraries.


    ```

    #Installing transformers

    !pip install simpletransformers

    !pip install transformers

    #Importing necessary libraries from simple transformers

    import pandas as pd

    from simpletransformers.seq2seq import Seq2SeqModel,Seq2SeqArgs

    ```


    BART accepts two columns: `target_text` and `input_text`. Let’s rename the existing
    columns to match BART’s requirements.


    ```

    #Rename columns as per pretrained model required format

    df=df.rename(columns={''headlines'':''target_text'',''text'':''input_text''})

    model_args = Seq2SeqArgs()

    #Initializing number of epochs

    model_args.num_train_epochs = 25

    #Initializing no_save arg

    model_args.no_save = True

    #Initializing evaluation args

    model_args.evaluate_generated_text = True

    model_args.evaluate_during_training = True

    model_args.evaluate_during_training_verbose = True

    ```


    Let’s use the `Seq2SeqModel` function to train the BART model on the training
    data. We are using the BART-large pretrained model here.


    ```

    # Initialize the model with type as ''bart'' and provide model args

    model = Seq2SeqModel(

    encoder_decoder_type="bart",

    encoder_decoder_name="facebook/bart-large",

    args=model_args,

    use_cuda=False,

    )

    #Splitting data into train-test

    from sklearn.model_selection import train_test_split

    train_df, test_df = train_test_split(df, test_size=0.2)

    train_df.shape, test_df.shape

    #Training the model and keeping eval dataset as test data

    model.train_model(train_df, eval_data=test_df)

    ```


    Figure [10-5](#517793_1_En_10_Chapter.xhtml#Fig5) shows the model training.


    ![../images/517793_1_En_10_Chapter/517793_1_En_10_Fig5_HTML.jpg](images/517793_1_En_10_Chapter/517793_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Output


    ```

