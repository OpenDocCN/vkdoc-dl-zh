    # Feature Engineering


    In the NLP life cycle, feature engineering uses domain knowledge of the data to
    create features that make machine learning algorithms work. It is fundamental
    to the application of machine learning. We implement the following techniques
    to obtain the relevant features from data sets.


    ## Count Vectors


    For more information on count vectorizer and TF-IDF, please refer to Chapter [1](#517793_1_En_1_Chapter.xhtml).


    ```

    cv =CountVectorizer()

    cv.fit(ted_df[''transcript''])

    cv_tedfeatures = cv.transform(ted_df[''transcript''])

    ```


    ## TF-IDF Vectors


    ```

    #word level TF-IDF

    tv = TfidfVectorizer()

    tv.fit(ted_df[''transcript''])

    tv_tedfeatures =  tv.transform(ted_df[''transcript''])

    ```


    ## Word Embeddings


    Let’s use the word2vec pretrained model from Gensim. Import and implement the
    same. Also, download the `GoogleNews-vectors-negative300.bin` pretrained model
    from [`www.kaggle.com/sandreds/googlenewsvectorsnegative300`](http://www.kaggle.com/sandreds/googlenewsvectorsnegative300).


    ```

    #Load

    m1=gensim.models.KeyedVectors.load_word2vec_format(''GoogleNews-vectors-negative300.bin'',
    binary=True)

    # Function to get the embeddings

    def get_embedding (x, out=False):

    if x in m1.wv.vocab:

    if out == True:

    return m1.wv.vocab[x]

    else:

    return m1[x]

    else:

    return np.zeros(300)

    # Getting means

    op =  {}

    for i in ted_df[''transcript'']:

    avg_vct_doc = (np.mean(np.array([get_embedding(a)for a in nltk.word_tokenize((i))]),
    axis=0))

    d = { i : (avg_vct_doc) }

    op.update(d)

    op

    ```


