    ### C. GPT


    The GPT (Generative Pretrained Transformer) model is from Open AI. It is one of
    the very effective language models which can again perform various tasks like
    summarization and Q&A systems.


    Figure [7-9](#517793_1_En_7_Chapter.xhtml#Fig9) shows GPT architecture.


