    ### Text Processing


    You must process text to remove the noise and other irrelevant information. Let’s
    follow some basic text-cleaning procedures, like lowercasing all the words, removing
    special characters (`%`, `$`, `#`, etc.), eliminating words that contain numbers
    (e.g., `hey199`, etc.), removing extra spaces, removing stop words (e.g., repetitive
    words like *is*, *the*, *an*, etc.), and so on.


    ```

    # This function helps us in removing stopwords, punctuation marks, special characters,
    extra spaces and numeric data. It also lowercases all the text.

    Def preprocessing(Txt):

    sw = stopwords.words(''english'')

    space_pattern = ''\s+''

    special_letters = "[^a-zA-Z#]"

    p_txt = []

    for resume in Txt:

    text = re.sub(space_pattern, '' '', resume) # Removes extra spaces

    text = re.sub(special_letters, '' '', text) # Removes special characters

    text = re.sub(r''[^\w\s]'','''',text) # Removes punctuations

    text = text.split() # Splits the words in a text

    text = [word for word in text if word.isalpha()] # Keeps alphabetic word

    text = [w for w in text if w not in sw] # Removes stopwords

    text = [item.lower() for item in text] # Lowercases the words

    p_txt.append(" ".join(text)) # Joins all the words  back

    return p_txt

    ```


