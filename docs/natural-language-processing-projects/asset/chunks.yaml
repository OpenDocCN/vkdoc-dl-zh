    results = model.eval_model(test_df)

    #打印损失值

    results

    {''eval_loss'': 2.0229070737797725}

    ```


    损失值为 2.02。模型已训练完成。现在让我们查看一些结果来评估性能。让我们同时打印原始摘要和机器生成的摘要。


    ```

