    ### Predicting the Sentiment


    We predicted emotion using the function that we built earlier. But to predict
    sentiment, we are using a pretrained model. Let’s use the `sentiment` function
    from `TextBlob`. We predict sentiment for each tweet and then aggregate to generate
    the insights.


    The `sentiment` function has two outputs: `polarity` and `subjectivity`.


    We concentrate on `polarity`, which provides the sentiment of that tweet on a
    scale of –1 to +1. You need to decide the threshold to get the final sentiment.
    For this exercise,


    * if the `polarity` is > 0, then the positive sentiment

    * if the `polarity` is < 0, then the negative sentiment

    * if the `polarity` is = 0, then neutral sentiment


    The following code provides the sentiments against the given input.


    ```

    twt[''sentiment''] = twt[''text''].apply(lambda a: TextBlob(a).sentiment[0] )

    def function (value):

    if value[''sentiment''] < 0 :

    return ''Negative''

    elif value[''sentiment''] > 0 :

    return ''Positive''

    return ''Neutral''

    twt[''Sentiment_label''] = twt.apply (lambda a: function(a),axis=1)

    twt.tail()

    ```


