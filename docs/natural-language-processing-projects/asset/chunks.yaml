    # headline text cleaning

    for z in df.headlines:

    headlines_processed.append(txt_preprocessing(z))

    # news text cleaning

    for z in df.text:

    clean_news.append(txt_preprocessing(z))

    ```


    Now that most of the data understanding and preprocessing are completed let’s
    move into the model building phase.


    # Model Building


    Before we get into model building, let’s discuss transfer learning.


    The process where the model is trained to do a specific task and the knowledge
    gained in this model is leveraged to do another task on different data set is
    called *transfer learning*.


    The language models require huge data and resources to give better accuracy, and
    every individual or company would not have access to both. The big companies like
    Google, Microsoft, and Facebook train these algorithms with their abundant data
    and research teams and make them open source. We can simply download and start
    utilizing those pretrained models for specific tasks.


    But the challenge is, since these models are trained on a wide variety of data,
    the domain-specific tasks might not work that well. That’s where we use domain-specific
    data and re-train or customize the models on top of existing ones.


    This whole process is transfer learning.


    We are using 2 LSTM based pretrained models in this project. In 2019, Google and
    Facebook published new transformer papers on T5 and BART. Both papers reported
    great performance in tasks like abstractive summarization. We use these two transformers
    to see what the results look like on the data set.


    First, use a pretrained model directly to generate a summary for any input brief
    (a small demo). In this case, let’s generate a news summary.


    ```

    #connect to hugging face

    !git clone https://github.com/huggingface/transformers \

    && cd transformers \

    #install

    !pip install -q ./transformers

    #Import

    import torch

    import transformers

    from transformers import BartTokenizer, BartForConditionalGeneration

    torch_device = ''cpu''

    tokenizer = BartTokenizer.from_pretrained("facebook/bart-large")

    model = BartForConditionalGeneration.from_pretrained("facebook/bart-large")

    #Function to summarize

    def summarize_news(input_text, maximum_length, minimum_length):

    #Tokenize

    input_txt_ids = tokenizer.batch_encode_plus([input_text], return_tensors=''pt'',
    max_length=1024)[''input_ids''].to(torch_device)

    #summarize

    ids_sum = model.generate(input_txt_ids, max_length=int(maximum_length), min_length=int(minimum_length))

    #get the text summary

    output_sum = tokenizer.decode(ids_sum.squeeze(), skip_special_tokens=True)

    return output_sum

    input_text = "According to a Hindustan Times report, the 14 Keralites were among
    the terrorists and militants freed by the Taliban from Bagram jail. As of now,
    unconfirmed reports state that two Pakistani residents were detained by the Sunni
    Pashtun terrorist group for trying to blow off an Improvised Explosive Device
    (IED) device outside Turkmenistan embassy in Kabul on August 26\. And as intelligence
    reports indicate, an IED was recovered from the two Pakistani nationals soon after
    the Kabul airport blast. As per reports, a Kerala resident contacted his home,
    while the remaining 13 are still in Kabul with the ISIS-K terrorist group. After
    Syria and Levant occupied Mosul in 2014, people from the Malappuram, Kasaragod
    and Kannur districts left India and joined the jihadist group in West Asia from
    where a few Keralites came down to Nangarhar province of Afghanistan."

    #Generate summary using function

    summarize_news(input_text,20,10)

    #output

    14 Keralites were among the terrorists and militants freed by the Taliban from
    Bagram

    ```


    This looks good; the pretrained BART model did provide a reasonable summary. However,
    if you want to further improve it and bring in domain-specific context for a better
    summary, you can use this pretrained model as a base and perform transfer learning
    (custom training on your dataset). Let’s explore how to do that in the next section.


    How do you train the summarization model? First, let’s discuss a few more concepts.


    Broadly, sequence models can be of three types.


    *   seq2num

    *   seq2class

    *   seq2seq'
