  trans: '

    # 方法


    构建聊天机器人的方法有很多种，这取决于它要解决的问题的复杂程度以及可用的数据。基于这些考量，主要有以下几种类型的聊天机器人。


    ## 基于规则的聊天机器人


    这类机器人能理解预定义的关键词。这些命令必须在编码时使用正则表达式或任何其他文本分析方法显式编写。它非常依赖规则，如果用户提出任何超出预设范围的问题，机器人的响应将是静态的，这表明它无法理解该输入。


    尽管它非常简单，但对于重复性任务（例如取消订单或申请退款）来说，它能够解决大部分问题。


    ## 生成式或智能聊天机器人


    这些是基于深度学习的先进上下文感知聊天机器人。它们没有预定义的句子，但应该能够回答大部分（如果不是全部）问题。鉴于该领域面临的挑战，现阶段我们无法构建完美的聊天机器人。但这是一个活跃的研究领域，随着时间的推移，我们可以观察到更好的结果。


    我们还可以根据用途将这些聊天机器人进一步分为两种类型。


    - **垂直聊天机器人**是特定领域的聊天机器人，专注于特定应用，跨行业表现不佳。例如，我们为医生构建一个聊天机器人，用于回答关于市场上产品的问题。然而，我们不能将其用于电信行业的应用。


    - **水平聊天机器人**是一个通用的开放领域机器人。最好的例子是 Siri、Alexa 和 Google Assistant。这些聊天机器人在高层面上工作，不能用于领域级别的精细任务。它能完成大部分任务，并作为大多数垂直机器人的起点。


    鉴于聊天机器人内部的这些分类，实现这些机器人的方法有很多。有相当多的框架可用于构建垂直和水平聊天机器人。但让我们深入一层，学习如何使用自然语言处理从头开始实现这些聊天机器人。


    另外，鉴于基于规则的聊天机器人易于实现，我们就不深入探讨了。让我们研究一下高级聊天机器人的不同变体。我们可以根据业务问题选择使用其中任何一种。


    那么，让我们开始吧。


    # 聊天机器人 1：使用相似度评分的问答系统


    构建聊天机器人的一种方法是利用句子之间的相似度评分。我们知道机器人总是从用户那里获取一个句子。我们需要利用这个句子，并给出相关的回答。


    它必须在数据中找到相似的句子并显示响应。同样，基于特征工程技术以及计算相似度评分的公式，有多种方法可以实现这一点。图 9-2 展示了这个简单聊天机器人的架构。


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig2_HTML.jpg](img/517793_1_En_9_Fig2_HTML.jpg)


    图 9-2


    简单的聊天机器人流程


    要将文本转换为特征，我们可以使用计数向量化器或 TF-IDF 向量化器。在本练习中，我们使用 TF-IDF，因为我们知道它的性能会更好。我们也可以使用词嵌入。


    那么，让我们来实现它。


    ```

    #import packages

    import pandas as pd

    import numpy as np

    #import nltk

    import nltk

    #import other

    import string

    import random

    #importing the data

    data=open(''data.txt'',''r'',errors = ''ignore'')

    text=data.read()

    print(text)

    ```


    图 9-3 显示了从维基百科导入的文本，其中包含所有句子。由于我们在句子级别进行操作，让我们将它们转换为句子。然后将它们转换为单词，以便使用 TF-IDF
    获取特征。


    ```

    # to lower  case

    text=text.lower()

    # tokenize the words

    wr_ids = nltk.word_tokenize(text)

    # tokenize the sent

    st_ids = nltk.sent_tokenize(text)

    wr_ids[0]

    ''data''

    st_ids[0]

    ```


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig3_HTML.jpg](img/517793_1_En_9_Fig3_HTML.jpg)


    图 9-3


    来自维基百科的文本


    以下是输出结果。


    ```

    ''data science is an interdisciplinary field that uses scientific methods, processes,
    algorithms and systems to extract knowledge and insights from structured and unstructured
    data,[1][2] and apply knowledge and actionable insights from data across a broad
    range of application domains.''

    ```


    我们需要计算句子之间的相似度，为此，距离度量是必需的。最常用的距离度量是余弦相似度。让我们导入相关的库并使用它们来计算距离。


    ```

    #import libraries for distance calculation

    from sklearn.feature_extraction.text import TfidfVectorizer

    from sklearn.metrics.pairwise import cosine_similarity

    ```


    以下代码是响应函数，一旦机器人有输入就会被调用。首先，代码获取输入并将其附加到文本语料库中。然后，使用 `TfidfVectorizer` 计算所有词元的
    TF-IDF。接下来，使用余弦相似度计算输入与语料库中所有句子之间的相似度评分。然后，机器人会给出相似度最高的句子作为响应。


    如果 TF-IDF 为 0，则给出标准响应。


    ```

    #define function for response

    def get_output(user_input):

    #define the output

    output=''''

    #append input to text

    st_ids.append(user_input)

    #define tfidf

    txt_v = TfidfVectorizer(stop_words=''english'')

    #get vector

    vec_txt = txt_v.fit_transform(st_ids)

    #get score

    rank_score= cosine_similarity(vec_txt[-1], vec_txt)

    idx=rank_score.argsort()[0][-2]

    ft_out = rank_score.flatten()

    ft_out.sort()

    final_v = ft_out[-2]

    if(final_v==0):

    output=output+"Dont know this annswer, Ask something else"

    return output

    else:

    output = output+st_ids[idx]

    return output

    ```


    最后一段代码激活机器人，获取输入，调用响应函数，并给出输出。


    ```

    # Final code to run the bot

    print("Enter your question")

    print("")

    in_txt = input()

    in_txt=in_txt.lower()

    print("")

    print("Ans:", get_output(in_txt))

    print("")

    st_ids.remove(in_txt)

    ```


    以下是输出结果。


    完成。图 9-4 显示了针对问题“什么是数据科学？”的模型输出。


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig4_HTML.jpg](img/517793_1_En_9_Fig4_HTML.jpg)


    图 9-4


    模型输出


    我们使用 TFIDF 和相似度评分实现了一个简单的聊天机器人。在此基础上可以实施许多改进，但这些都是这类机器人背后的基本原理。之后，需要创建 API。前端必须集成并托管在仓库中。所有这些都属于工程或开发运维方面。


    以下是这类问答系统的缺点。


    - 聊天机器人只能回答代码初始阶段使用的输入文本中存在的数据相关问题。它无法回答超出此范围的问题。


    - 由于我们没有使用任何高级的文本到特征技术，因此无法捕捉问题的完整上下文。


    但这些非常适合垂直聊天机器人，因为我们知道后端数据是什么，并且确信问题都在该范围内。可以使用所有可能的法律文档作为训练数据，为法律活动构建一个聊天机器人。


    这样就介绍完了一种聊天机器人的实现方式。它无法理解上下文。这是一个问题，因为聊天机器人必须理解问题的上下文；否则，用户不会对它感兴趣。


    这引出了我们使用深度学习构建的第二个聊天机器人，它能够捕捉上下文。

    '
- fmt: '# Chatbot 2: Context-based Chatbot Using a Pretrained Model


    Let’s explore one more variation of chatbots. This is general-purpose and builds
    on a huge data set after training for a long time using GPUs. But let’s say we
    don’t have the resources to do this. Then comes the concept of transfer learning.
    Let’s use one of the pretrained models and solve the problem at hand.


    We already saw the capabilities of deep learning to capture context and increase
    accuracy. Let’s look at another example of using a deep learning-based pretrained
    model to improve the chatbots. So, let’s explore.


    ## Hugging Face Transformers


    Let''s use a state-of-the-art Hugging Face library for this task. The `transformers`
    are an open source library that has extraordinary pretrained models which can
    be downloaded and build on any downstream applications—just like that. It''s very
    easy to use, and the results are great.


    So let’s install and start using it.


    ```

    #install transformers

    !pip install transformers

    ```


    Now comes model selection. We all know how effective the BERT architecture is
    to produce great contextual outputs. Let’s consider one of the BERT-based models
    for this task.


    Let’s import the model and the tokenizer.


    ```

    #import model and tokenizer

    from transformers import BertForQuestionAnswering

    from transformers import BertTokenizer

    # import torch

    import torch

    ```


    Let’s load the pretrained model. We can simply change these Q&A-based pretrained
    models to any other present on the Hugging Face website, and it works.


    ```

    #loading the pre trained Model

    qna_model = BertForQuestionAnswering.from_pretrained(''bert-large-uncased-whole-word-masking-finetuned-squad'')

    #loading the Tokenizer for same model

    qna_tokenizer = BertTokenizer.from_pretrained(''bert-large-uncased-whole-word-masking-finetuned-squad'')

    ```


    To ask questions, we first need text. Let’s take a paragraph from Wikipedia based
    on cricketer Virat Kohli. Figure [9-5](#517793_1_En_9_Chapter.xhtml#Fig5) shows
    a snapshot of the text.


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig5_HTML.jpg](images/517793_1_En_9_Chapter/517793_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Text from Wikipedia


    Now let’s build a function that takes user input questions, hits the text, and
    predicts answers.


    ```

    #function to get an answer for a use given question

    def QnA(user_input_que):

    #tokinizng the texts

    in_tok = qna_tokenizer.encode_plus(user_input_que, ans_text, return_tensors="pt")

    #getting scores from tokens

    ans_str_sc, ans_en_sc = qna_model(**in_tok,return_dict=False)

    #getting the position

    ans_st = torch.argmax(ans_str_sc)

    ans_en = torch.argmax(ans_en_sc) + 1

    #ids are then converted to tokens

    ans_tok = qna_tokenizer.convert_ids_to_tokens(in_tok["input_ids"][0][ans_st:ans_en])

    #getting the answer

    return qna_tokenizer.convert_tokens_to_string(ans_tok)

    ```


    Let’s take a couple of questions to see how it works.


    ```

    Example 1:

    que = "when did kohli win world cup"

    QnA(que)

    2011 world cup

    Example 2:

    que = "when did kohli born"

    QnA(que)

    5 november 1988

    ```


    Both answers are spot on. That’s how powerful these pretrained models which capture
    the context so well.


    Now let’s take another example from a different domain and see if it can perform
    to the same level. Let’s pick a healthcare-related text. This text is also from
    Wikipedia. Figure [9-6](#517793_1_En_9_Chapter.xhtml#Fig6) shows the snapshot
    for the text.


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig6_HTML.jpg](images/517793_1_En_9_Chapter/517793_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Text from Wikipedia on covid19


    Let’s ask questions now.


    ```

    Question 1:

    que = "where did covid started?"

    QnA(que)

    wuhan , china

    Question 2:

    que = "what are the symptoms of covid19?"

    QnA(que)

    fever , [ 9 ] cough , headache , [ 10 ] fatigue , breathing difficulties , and
    loss of smell and taste

    ```


    Those are great answers, isn’t it? We can check out different pretrained models
    and compare the results.


    Now, let’s move on to one more pretrained model based on RNN.


    ## Chatbot 3: Pretrained Chatbot Using RNN


    With less data, the response from the bot is not going to be that great because
    it struggles to understand the context. Also, training the bot with a lot of data
    is a challenge for each use case. That is where we use transfer learning.


    Someone already trained the algorithm with a certain amount of data. That model
    is available for everyone to use. Generalized pretrained models solve many of
    the problems across industries.


    One of those examples is a chatbot trained using a language model. The one way
    of solving this problem is generating a sequence of text or next word or character
    given all previous words and characters. These models are called *language models*.


    Usually, recurrent neural networks (RNN) train a model because they are very powerful
    and expressive through remembering and processing past information through their
    high dimensional hidden state units.


    There are two types of models.


    * **Word level**: The words are used as input to train the model. If a particular
    word is not present in the corpus, we do not get a prediction for that.

    * **Character level**: The training is done at the character level.


    In this architecture, there are certain pretrained models. Let’s use them for
    our application.


    Next, let’s explore implementing RNN. The following is the GitHub link pretrained
    chatbot using character-level RNN. It’s been trained using a lot of Reddit data.


    Github link: [`https://github.com/pender/chatbot-rnn`](https://github.com/pender/chatbot-rnn)


    Close this repository or download the whole project and keep it in your local.


    The following are the steps to use this pretrained model with RNN architecture.


    1. Download the pretrained model.


    First, let’s download the pretrained model, which is trained on Reddit data.


    Link: [`https://drive.google.com/uc?id=1rRRY-y1KdVk4UB5qhu7BjQHtfadIOmMk&export=download`](https://drive.google.com/uc%253Fid%253D1rRRY-y1KdVk4UB5qhu7BjQHtfadIOmMk%2526export%253Ddownload)


    2. Unzip the downloaded pretrained model.


    3. Place the unzipped folder into the `models` folder present in the downloaded
    project as shown in Figure [9-7](#517793_1_En_9_Chapter.xhtml#Fig7).


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig7_HTML.jpg](images/517793_1_En_9_Chapter/517793_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Repo structure


    4. Open the terminal and navigate to the folder where the project is saved locally.


    5. Run the Python chatbot model, as shown in Figure [9-8](#517793_1_En_9_Chapter.xhtml#Fig8).


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig8_HTML.jpg](images/517793_1_En_9_Chapter/517793_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Loading the model


    ```

    python chatbot.py

    ```


    Let’s ask a few questions to see how it works. Figure [9-9](#517793_1_En_9_Chapter.xhtml#Fig9)
    shows the output.


    ![../images/517793_1_En_9_Chapter/517793_1_En_9_Fig9_HTML.jpg](images/517793_1_En_9_Chapter/517793_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Model output


    Again, this is a generalized bot that is built on Reddit data. We need to retrain
    this on whatever domain we are using it too. We can use the `train.py` to train
    this model on our data set.


    Information on the RNN that trained this model is at [`http://karpathy.github.io/2015/05/21/rnn-effectiveness/`](http://karpathy.github.io/2015/05/21/rnn-effectiveness/).


    ## Future Scope


    We tried out various models to build the chatbots in the back end. But chatbot
    also requires the frameworks to make the conversation smooth and logical. We can
    use the following frameworks for implementation.'
