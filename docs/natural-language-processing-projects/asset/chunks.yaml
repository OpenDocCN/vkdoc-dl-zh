    # 业务背景


    业务背景在故事线的每一步中都扮演着至关重要的角色。图 1-20 至图 1-30 展示了业务背景在生命周期各阶段的作用。


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fige_HTML.jpg](img/517793_1_En_1_Fige_HTML.jpg)

