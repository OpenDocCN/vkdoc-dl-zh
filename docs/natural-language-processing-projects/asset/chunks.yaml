    # 数据清洗与预处理


    清洗文本数据对于获取更优质的特征至关重要。这可以通过对数据执行一些基本的预处理步骤来实现。


    以下是预处理步骤：


    1.  将单词转换为小写。

    2.  移除停用词。

    3.  纠正拼写错误。

    4.  移除数字。

    5.  移除空白字符和特殊字符。


    首先，导入所有必需的库。


    ```

    import numpy as np

    import nltk

    import itertools

    from nltk.tokenize import sent_tokenize, word_tokenize

    import scipy

    from scipy import spatial

    import re

    from textblob import TextBlob

    sw = nltk.corpus.stopwords.words(''english'')

    import gensim

    from gensim.models import Word2Vec

    from nltk.corpus import stopwords

    from nltk.stem import PorterStemmer

    from nltk.tokenize import word_tokenize

    from nltk.stem.wordnet import WordNetLemmatizer

    import string

    from nltk.util import ngrams

    from textblob import TextBlob

    from textblob import Word

    from nltk.stem.snowball import SnowballStemmer

    stemmer = SnowballStemmer("english")

    from nltk.stem import PorterStemmer

    st = PorterStemmer()

    from sklearn.feature_extraction.text import CountVectorizer,TfidfVectorizer

    import gensim

    from gensim.models import Word2Vec

    from sklearn.cluster import KMeans

    ```


    让我们创建一个数据清洗与预处理函数，以执行第 1 章中讨论的必要清洗操作。


    ```

    def  text_processing(df):

    """""=== 转换为小写 ==="""

    df[''transcript''] = df[''transcript''].apply(lambda x: " ".join(x.lower() for
    x in x.split()))

    ''''''=== 移除停用词 ===''''''

    df[''transcript''] = df[''transcript''].apply(lambda x: " ".join(x for x in x.split()if
    x not in sw))

    ''''''=== 拼写纠正 === ''''''

    df[''transcript''].apply(lambda x: str(TextBlob(x).correct()))

    ''''''=== 移除标点符号 ===''''''

    df[''transcript''] = df[''transcript''].str.replace(''[^\w\s]'', '''')

    ''''''=== 移除数字 ===''''''

    df[''transcript''] = df[''transcript''].str.replace(''[0-9]'', '''')

    return df

    ted_df = text_processing(ted_df)

    print(ted_df)

    ```


