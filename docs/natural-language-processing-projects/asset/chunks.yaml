- fmt: '### Conditional Random Fields (CRF)


    CRF is a conditional model class best suited to prediction tasks where the state
    of neighbors or contextual information affects the current prediction.


    The main applications of CRFs are named-entity recognition, part of speech tagging,
    gene prediction, noise reduction, and object detection problems, to name a few.


    In a sequence classification problem, the final goal is to find the probability
    of `y` (target) given input of sequence vector `x`.


    Because conditional random fields are conditional models, they apply logistic
    regression to sequence data.


    Conditional distribution is basically:


    `Y = argmax P(y|x)`


    This finds the best output (probability) given sequence `x`.


    In CRF, the input data is expected to be sequential, so we have to label the data
    as position `i` for the data point we are predicting.


    We define feature functions for each variable; in this case, there is no POS tag.
    We only use one feature function.


    The feature function’s main purpose is to express a characteristic of the sequence
    that the data point represents.


    Each feature function is relatively based on the label of the previous word and
    the current word. It is either a 0 or a 1.


    So, to build CRF as we do in other models, assign some weights to each feature
    function and let weights update by optimization algorithm like gradient descent.


    Maximum likelihood estimation is used to estimate parameters, where we take the
    negative log of distribution to make the derivative easier to calculate.


    In general:


    1.  Define feature function.

    2.  Initialize weights to random values.

    3.  Apply gradient descent to parameter values to converge.


    CRFs are more likely similar to logistic regression since they use *conditional
    probability distribution*. But, we extend the algorithm by applying feature functions
    as the sequential input.


    We aim to extract entities from the given sentence and identifying their types
    using the CRF model. Now, let’s import the required libraries.


    We used the following libraries.


    ```python

    #For visualization

    import matplotlib.pyplot as plt

    import seaborn as sns

    sns.set(color_codes=True)

    sns.set(font_scale=1)

    %matplotlib inline

    %config InlineBackend.figure_format = ''svg''

    # For Modeling

    from sklearn.ensemble import RandomForestClassifier

    from sklearn_crfsuite import CRF, scorers, metrics

    from sklearn_crfsuite.metrics import flat_classification_report

    from sklearn.metrics import classification_report, make_scorer

    import scipy.stats

    import eli5

    ```


    Let’s create grouped words and their corresponding tags as a tuple. Also, let’s
    store the words of the same sentence in one list using the following sentence
    generator function.


    ```python

    class Get_Sent(object):

    def __init__(self, dataset):

    self.n_sent = 1

    self.dataset = dataset

    self.empty = False

    agg_func = lambda s: [(a, b) for a,b in zip(s["words"].values.tolist(),

    s["labels"].values.tolist())]

    self.grouped = self.dataset.groupby("sentence_id").apply(agg_func)

    self.sentences = [x for x in self.grouped]

    def get_next(self):

    try:

    s = self.grouped["Sentence: {}".format(self.n_sent)]

    self.n_sent += 1

    return s

    except:

    return None

    # calling the Get_Sent function and passing the train dataset

    Sent_get= Get_Sent(data)

    sentences = Sent_get.sentences

    ```


    So, the sentence looks like this.


    Figure [8-5](#517793_1_En_8_Chapter.xhtml#Fig5) shows the output of the `Get_Sent`
    function for training data.


    ![../images/517793_1_En_8_Chapter/517793_1_En_8_Fig5_HTML.jpg](images/517793_1_En_8_Chapter/517793_1_En_8_Fig5_HTML.jpg)


    **Figure 8-5** Output


    ```python

    # calling the Get_Sent function and passing the test dataset

    Sent_get= Get_Sent(data1)

    sentences1 = Sent_get.sentences

    #This is what a sentence will look like.

    print(sentences1[0])

    ```


    Figure [8-6](#517793_1_En_8_Chapter.xhtml#Fig6) shows the output of the `Get_Sent`
    function for test data.


    ![../images/517793_1_En_8_Chapter/517793_1_En_8_Fig6_HTML.jpg](images/517793_1_En_8_Chapter/517793_1_En_8_Fig6_HTML.jpg)


    **Figure 8-6** Output


    For converting text into numeric arrays, we use simple and complex features.


    ### Simple Feature Mapping


    In this mapping, we have considered simple mapping of words and considered only
    six features of each word.


    *   word title

    *   word lower string

    *   word upper string

    *   length of word

    *   word numeric

    *   word alphabet


    Let’s look at the code for simple feature mapping.


    ```python

    # feature mapping for the classifier.

    def create_ft(txt):

    return np.array([txt.istitle(), txt.islower(), txt.isupper(),

    len(txt),txt.isdigit(),  txt.isalpha()])

    #using the above function created to get the mapping of words for train data.

    words = [create_ft(x) for x in data["words"].values.tolist()]

    #lets take unique labels

    target = data["labels"].values.tolist()

    #print few words with array

    print(words[:5])

    Output:

    we got mapping of words as below (for first five words)

    [array([0, 1, 0, 5, 0, 1]), array([0, 1, 0, 7, 0, 1]), array([0, 1, 0, 8, 0, 1]),
    array([0, 1, 0, 1, 0, 1]), array([0, 1, 0, 9, 0, 1])]

    ```


    Likewise, we use the function created for the test data.


    ```python

    #using the above function created to get the mapping of words for test data.

    words1 = [create_ft(x) for x in data1["words"].values.tolist()]

    target1 = data1["labels"].values.tolist()

    ```


    Apply five-fold cross validation for the random classifier model and get the results
    as follows. Next, the `cross_val_predict` function is used. It is defined in `sklearn`.


    ```python

    #importing package

    from sklearn.model_selection import cross_val_predict

    # train the RF model

    Ner_prediction = cross_val_predict(RandomForestClassifier(n_estimators=20),X=words,
    y=target, cv=10)

    #import library

    from sklearn.metrics import classification_report

    #generate report

    Accuracy_rpt= classification_report(y_pred= Ner_prediction, y_true=target)

    print(Accuracy_rpt)

    ```


    Figure [8-7](#517793_1_En_8_Chapter.xhtml#Fig7) shows the classification report.


    ![../images/517793_1_En_8_Chapter/517793_1_En_8_Fig7_HTML.jpg](images/517793_1_En_8_Chapter/517793_1_En_8_Fig7_HTML.jpg)


    **Figure 8-7** Classification report


    Accuracy is 45%, and the overall F1 score is 0.38. The performance is not so good.
    Now let’s further improve the accuracy, leveraging more features, like “pre” and
    “post” words.'
