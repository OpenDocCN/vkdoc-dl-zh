    # TED Talks Segmentation and Topics Extraction Using Machine Learning


    TED Talks are knowledge videos of talks by experts in technology, entertainment,
    and design (hence TED). These conferences are arranged across the world. Great
    speakers come forward and share their experiences and knowledge. These talks are
    limited to a maximum length of 18 minutes and cover a wide range of topics. The
    videos are stored, and every video has a description of the video content.


    This chapter groups TED Talks based on their description and uses various clustering
    techniques like `k-means` and hierarchical clustering. Topic modeling using Latent
    Dirichlet Allocation (LDA) is used to understand and interpret each cluster. The
    libraries used include `Genism`, `NLTK`, `scikit-learn`, and `word2vec`.


    ## Problem Statement


    There are tons of these videos across the world. They are recorded in different
    locations, with different topics and a variety of speakers. Tagging these videos
    manually to a certain category is the biggest challenge given the number of videos
    we have already. Let’s look at leveraging machine learning and natural language
    processing to solve this problem.


    The challenge here is that we don’t have labeled data to train a classifier and
    predict the categories. Instead, we need to take the unsupervised learning approach.
    Let’s look at how to formulate the approach to get the categories for each video.


    ## Approach Formulation


    The approach has two parts to solve the preceding problem.


    The first problem is grouping the documents. We need to use document clustering
    to segment the TED Talks. The document clustering technique has mainly two steps.
    First, convert the text to feature using different techniques like count vectorizer,
    `TF-IDF`, or word embeddings. Then using these features, perform clustering using
    `k-means` or hierarchical clustering.


    Once the clustering is performed, the next problem is to understand the clusters.
    Then, you can perform topic modeling to extract topics and learn the cluster properties.
    Again, there are multiple algorithms to extract topics. We use LDA in this case.


    Let’s visualize the clusters and topic modeling results for a better understanding
    of TED Talks.


    Figure 3-1 shows the logical flow diagram of the approach.


    ![../images/517793_1_En_3_Chapter/517793_1_En_3_Fig1_HTML.png](images/517793_1_En_3_Chapter/517793_1_En_3_Fig1_HTML.png)


    **Figure 3-1** Approach flow chart


    ## Data Collection


    We are considering open source data for this. Download the data set from this
    book project’s Gitlink.


    ## Understanding the Data


    We are considering the open source data for this. Download the data set from the
    repo where the code is located. The data set file name is `''Ted talks.csv''`.


