    def filter_keywords(doc):

    doc=doc.lower()

    stop_free = " ".join([i for i in doc.split() if i not in stop_words])

    punc_free = "".join(ch for ch in stop_free if ch not in exclude)

    word_tokens = word_tokenize(punc_free)

