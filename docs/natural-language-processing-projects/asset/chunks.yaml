- fmt: '### Product Search Engine


    The next problem statement is optimizing the search engine to get better search
    results. The biggest challenge is that most search engines are string matching
    and might not perform well in all circumstances.


    For example, if the user searches “guy shirt”, the search results should have
    all the results that have men, a boy, and so on. The search should not work based
    on string match, but the other similar words should also consider.


    The best way to solve this problem is *word embeddings*.


    Word embeddings are N-dimensional vectors for each word that captures the meaning
    of the word along with context.


    `word2vec` is one of the methods to construct such an embedding. It uses a shallow
    neural network to build the embeddings. There are two ways the embeddings can
    be built: skip-gram and CBOW (common bag-of-words).


    The CBOW method takes each word’s context as the input and predicts the word corresponding
    to the context. The input to the network context and passed to the hidden layer
    with N neurons. Then at the end, the output layer predicts the word using the
    `softmax` layer. The hidden layer neuron’s weight is considered the vector that
    captured the meaning and context.


    The skip-gram model is the reverse of CBOW. The word is the input, and the network
    predicts context.


    That’s the brief theory about word embeddings and how it works. We can build the
    embeddings or use existing trained ones. It takes a lot of data and resources
    to build one, and for domains like healthcare, we need to build our own because
    generalized embeddings won’t perform well.


    #### Implementation


    Let’s use the pretrained `word2vec` model on the news data set by Google. The
    trained model can be imported, and vectors can be obtained for each word. Then,
    any of the similarity measures can be leveraged to rank the results.


