    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig6_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    ROC curve


    *   **ROC curve**: A *receiver operating characteristic* (ROC) curve is an evaluation
