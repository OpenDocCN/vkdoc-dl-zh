  trans: '

    ### RASA


    `RASA` ([`https://rasa.com`](https://rasa.com)) 是一个用于构建聊天机器人的 AI 框架。它是一个开源且低代码的框架，只需很少的工作量就能构建聊天机器人。它既能理解文本，也能创建聊天流程。


    `RASA` 技术栈包含一系列用于构建高效聊天机器人的功能。它允许用户训练自定义模型，利用行业特定数据来构建聊天机器人。`RASA` 已经完成了构建框架的大部分繁重工作。


    `RASA` 的架构有两个主要组件：`RASA NLU` 用于理解输入的文本并识别意图，以及 `RASA CORE` 用于针对用户提出的问题给出输出。


    ### Microsoft Bot Framework


    `MS bot framework` 是另一个用于创建机器人并将其部署到 Azure 服务的框架。它拥有构建机器人并连接到任何平台（如 Skype、短信等）所需的所有端到端组件。


    该框架是开源的。您可以使用位于 [`https://github.com/microsoft/botframework-sdk`](https://github.com/microsoft/botframework-sdk)
    的 SDK 来创建聊天机器人。


    `bot builder SDK` 还有另外两个组件：一个开发者门户和一个目录，可帮助您轻松开发和部署。


    它能创建非常有效的对话流程。例如，机器人的主要目标之一是记住之前操作中发生的事情。它必须记住历史流程才能给出上下文相关的答案。


    ## 结论


    在本章中，我们探讨了利用自然语言处理和深度学习的力量构建聊天机器人的多种方法。这是聊天机器人的后端，将其与前端集成是一项任务。


    我们使用相似度评分构建了一个简单的聊天机器人，其中句子被转换为 `TF-IDF` 特征，并使用余弦相似度计算距离。在另一种方法中，我们利用深度神经网络来构建基于上下文的聊天机器人。最后，您了解了
    `RNN` 如何预测下一个单词，以及它如何在聊天机器人中使用预训练模型工作。该领域的研究非常活跃，我们可以期待更多突破性的成果，将客户体验提升到一个新的水平。


    鉴于聊天机器人已经证明了其可靠性，其市场非常巨大。未来几年，随着其在纵向和横向应用上的发展，它只会不断增长，让客户的生活变得更加轻松。


    # 10. 新闻标题摘要


    文本摘要就是将大量段落转换成能够解释整个文档要点的几句话。鉴于文本数据的数量，每个行业都有数百种应用。文本数据正在呈指数级增长。分析、理解和总结每一段文本都需要大量时间。


    在某个时间点，我们可能需要一种智能的方法来总结文本数据，这就是为什么它是一个非常活跃的研究领域。我们可以取得一定程度的成功，但还有很长的路要走，因为像人类一样捕捉上下文说起来容易做起来难！


    根据篇幅，摘要可以分为两种类型。


    - **长摘要**：包含 10 个或更多句子的段落。

    - **短摘要**：包含 10–20 个单词的一两个句子。


    摘要技术在各个行业都有丰富的应用。它可以在多种场景中使用，包括以下方面。


    - 总结新闻文章以丰富用户体验

    - 法律文档摘要

    - 临床研究文档摘要

    - 从多个数据源获取产品评论洞察

    - 呼叫中心数据摘要以了解高层原因

    - 总结教育笔记和书籍以便快速复习

    - 转录文本摘要

    - 社交媒体分析


    让我们在本章中了解文本摘要的各种方法及其挑战，并实现一些最先进的技术。


    ## 方法


    在进入实现之前，让我们先了解不同类型的摘要技术。


    在 NLP 中，有两种主要的文本摘要方法：*抽取式摘要* 和 *生成式摘要*。


    ### 抽取式摘要


    抽取式摘要是一种简单的技术，它从文档中选择重要的句子来生成摘要。在抽取式文本摘要技术中，重复最多的句子获得更高的权重并生成摘要。原始文本保持不变，在不做任何更改的情况下生成摘要。但缺点是摘要可能不如人类写得那么完美。


    以下是一个简单的例子。


    - **源文本**：Varun 去班加罗尔参加了一个关于数据科学的活动。该活动讨论了机器学习的工作原理，以及 AI 和 ML 在零售行业的应用，包括客户流失预测、推荐系统和购买倾向模型。最后，会议以下一代
    AI 结束。

    - **抽取式摘要**：Varun 去参加了一个关于数据科学的活动。它从源文本中提取了一些重要的词语，仅此而已。


    根据所使用的算法，有不同类型的抽取式摘要技术。


    - **基于图的算法**，使用图技术，利用文档创建节点和边，最终找到关系来总结它。`TextRank` 和 `LexRank` 是基于图的算法的例子。

    - **基于特征的算法**从文档的每个句子中提取某些特征，然后根据这些特征决定重要的句子。特征可以是词频、动词的存在等。`TextTeaser` 和 `Luhn
    算法` 是不同的基于特征的算法。

    - **基于主题的算法**使用奇异值分解等算法从文档中提取主题，并根据提取的主题对句子进行评分。`Gensim` 具有 `lsimodel` 函数来执行基于主题的摘要。


    实现抽取式摘要技术很简单。更多信息，请参考我们的书 *《自然语言处理食谱：使用 Python 的机器学习和深度学习解锁文本数据》*（Apress，2019）。


    ### 生成式摘要


    生成式技术涉及解释和缩短源文档的部分内容。该算法创建新的句子和短语，这些句子和短语涵盖了原始文本的大部分上下文。开发这类算法更加困难，因此抽取式仍然非常流行。


    以下是一个简单的例子。


    - **源文本**：Varun 去班加罗尔参加了一个关于数据科学的活动。该活动讨论了机器学习的工作原理，以及 AI 和 ML 在零售行业的应用，如客户流失预测、推荐系统和购买倾向模型。最后，会议以下一代
    AI 结束。

    - **生成式摘要**：Varun 参加了一个数据科学活动，讨论了机器学习及其应用，包括如何预测零售行业的客户流失、构建推荐系统以及 AI 的未来。


    所以，如果你看一下，摘要是使用源文本的上下文手工制作的。它不仅仅是提取了几个重要的句子，就像在抽取式摘要中那样。


    构建生成式摘要的方法有很多。随着深度学习的进步，我们现在能够取得良好的结果。


    本章将介绍如何使用深度学习算法实现生成式摘要技术。您还将学习如何利用预训练模型来提高准确性。


    图 10-1 说明了解决文本摘要问题的方法设计。


    ![../images/517793_1_En_10_Chapter/517793_1_En_10_Fig1_HTML.jpg](img/517793_1_En_10_Fig1_HTML.jpg)


    **图 10-1** 方法设计


    随着我们的深入，将揭示更多关于模型和过程的信息。

