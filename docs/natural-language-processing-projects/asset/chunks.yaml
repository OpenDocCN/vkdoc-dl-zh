    根据文档的大小，这可能会产生一个巨大的矩阵，因此使用特征降维技术来降低维度非常重要。


    ### 特征降维


    截断*奇异值分解*（SVD）是最著名的降维方法之一。它将矩阵 `M` 分解为三个矩阵 `U`、`Σ` 和 `V^T` 以生成特征。`U`、`Σ` 和 `V^T`
    描述如下。


    *   `U` 是左奇异矩阵

    *   `Σ` 是对角矩阵

    *   `V^T` 是右奇异矩阵


    截断 SVD 产生一种分解，我们可以指定想要的列数，从而保留最相关的特征。


    ```

    # 定义变换

