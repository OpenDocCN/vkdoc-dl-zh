- fmt: "### Random Forest\n\nRandom forest is the most widely used machine learning\
    \ algorithm because of its flexibility and ability to overcome the overfitting\
    \ problem. Random forest is an ensemble algorithm that is an ensemble of multiple\
    \ decision trees—the higher the number of trees, the better the accuracy.\n\n\
    The random forest can perform both classification and regression tasks. The following\
    \ are its advantages.\n\n- Random forest is insensitive to missing values and\
    \ outliers.\n- It prevents the algorithm from overfitting.\n\nHow does it work?\
    \ It works on bagging and bootstrap sample techniques.\n\n- Randomly takes the\
    \ square root of `m` features and a 2/3 bootstrap data sample with a replacement\
    \ for training each decision tree randomly and predicts the outcome.\n- An `n`\
    \ number of trees are built until the out-of-bag error rate is minimized and stabilized.\n\
    - Compute the votes for each predicted target and consider the mode as a final\
    \ prediction in terms of classification.\n\nFigure [1-8](#517793_1_En_1_Chapter.xhtml#Fig8)\
    \ shows the working of the random forest model.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig8_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8  \nRandom forest\n\n### Support-Vector Machines\n\nSVM tries to find\
    \ the best hyperplane which separates the data into groups based on the target\
    \ feature. Figure [1-9](#517793_1_En_1_Chapter.xhtml#Fig9) represents the working\
    \ of SVM.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig9_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9  \nSVM\n\nConsider the graph Figure [1-9](#517793_1_En_1_Chapter.xhtml#Fig9)\
    \ as two groups: circles and boxes. Since there are only two features, separating\
    \ these groups becomes easier, and using a line to do so. But as the number of\
    \ features increases, dimensionality also increases and uses a hyperplane or a\
    \ set of hyperplanes to separate the classes. These planes are called a *decision\
    \ boundary*. Anything that falls on one side of the line is classified as a *circle*,\
    \ and the other side is a *box*.\n\nHow to decide the best hyperplane? Figure\
    \ [1-10](#517793_1_En_1_Chapter.xhtml#Fig10) demonstrates the hyperplane concept.\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig10_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10  \nHyperplane\n\nMargin width is the distance between the plane\
    \ and the nearest data point. SVM tries to maximize the margin width to achieve\
    \ the goal of choosing the right hyperplane. As shown in the image, line C is\
    \ the best hyperplane as the margin is high.\n\n#### Nonlinear Data: The Kernel\
    \ Trick\n\nThe data distribution is not always linear. Most of the time, the data\
    \ distribution is nonlinear, and linear hyperplanes fail to classify the data.\
    \ To solve this problem, SVM introduced the *kernel trick* (see Figure [1-11](#517793_1_En_1_Chapter.xhtml#Fig11)),\
    \ which projects data multidimensionally to perform learning tasks.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig11_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig11_HTML.jpg)\n\
    \nFigure 1-11  \nKernel trick\n\n### Neural Networks\n\nNeural networks are machine\
    \ learning algorithms inspired by the human nervous system, which processes information\
    \ and takes actions.\n\nMillions of neurons are interconnected, and each neuron\
    \ learns or finds the pattern based on the training data. The network tries to\
    \ find the hidden rules automatically without human intervention. These algorithms\
    \ outperformed all other machine learning techniques, especially on unstructured\
    \ data like image and text. Figure [1-12](#517793_1_En_1_Chapter.xhtml#Fig12)\
    \ shows the architecture of the neural network.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig12_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12  \nNeural network\n\nYou need to find the weights and biases that\
    \ are predicted. The training of neural networks is done by fine-tuning the weights\
    \ and biases through multiple iterations.\n\n- Feedforward: Taking the input through\
    \ the input layer, passing it on to the hidden layer where the weights and bias\
    \ are added randomly for the first iteration, and finally predicting the output\
    \ as the sum product of weights and feature value plus bias.\n- Backpropagation:\
    \ Computes error between the predicted and actual output from the previous step.\
    \ This error is propagated backward, and weights and biases are updated accordingly\
    \ using optimizers to minimize the loss function.\n\nOne cycle of feedforward\
    \ and backpropagation is called an *epoch*. And such multiple epochs are carried\
    \ out to improve the accuracy.\n\nThe *activation function* introduces non-linearity\
    \ to map the input to the output accordingly. Multiple activation functions are\
    \ based on the target feature, such as Sigmoid, which is mostly used in binary\
    \ classification; similarly, Softmax is predominantly used in multiclass classification.\n\
    \nThe following are key terms or components in deep learning.\n\n- Weights\n-\
    \ Bias\n- Loss function\n- Optimizers: gradient descent, Adam, AdaDelta, RMS Prop\n\
    - Activation functions: sigmoid, softmax, ReLU\n\n### Deep Neural Networks\n\n\
    Characteristics\n\n- The number of hidden layers is more than one\n- The previous\
    \ layer’s output is fed into the next layers\n- Each layer extracts features\n\
    - Nonlinear functions capture complex hidden features\n\nFigure [1-13](#517793_1_En_1_Chapter.xhtml#Fig13)\
    \ shows a flow diagram.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig13_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13  \nDeep neural network\n\n### Convolutional Neural Networks\n\n\
    Convolution neural networks are a type of deep neural network with a minor change\
    \ in architecture. These are specifically designed for processing images. CNN\
    \ has a couple of other layers, which makes the implementation more efficient.\
    \ CNN takes every image pixel as a feature with a 3D array (for color images)\
    \ and processes it to classify it.\n\nThere are multiple custom layers in CNN,\
    \ including the following.\n\n- Convolution layer\n- Max pooling layer\n- Fully\
    \ connected layer\n- Dropout layer\n\nThe *convolution layer* acts as a filter\
    \ that extracts the feature present in an image. The values of the filters are\
    \ derived in the training process. Figure [1-14](#517793_1_En_1_Chapter.xhtml#Fig14)\
    \ shows the workings of CNN.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig14_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14  \nCNN\n\n### RNN\n\nJust as CNNs are specifically designed for\
    \ images, there are recurrent neural networks to process sequence-based data like\
    \ text. The idea is that text data have a certain sequence attached to it. The\
    \ data itself is sequential, and that adds meaning to the sentence. RNNs also\
    \ capture the sequential nature of data.\n\nRNN works in loops. The data flows\
    \ in circles and thereby learning not only current state input but previous input\
    \ as well. The concept of backpropagation through time comes into the picture;\
    \ it is similar to the backpropagation of a normal neural network, but it goes\
    \ back in time and updates the weights.\n\nBut the biggest challenge in RNN is\
    \ vanishing gradients which means when the gradients are too small, the learning\
    \ of the model will stop. Models like *long short-term memory* (LSTM) networks\
    \ and *gated recurrent units* (GRUs) overcome problems using the gates mechanism."
  raw: '##### Random Forest


    Random forest is the most widely used machine learning algorithm because of its
    flexibility and ability to overcome the overfitting problem. Random forest is
    an ensemble algorithm that is an ensemble of multiple decision trees—the higher
    the number of trees, the better the accuracy.


    The random forest can perform both classification and regression tasks. The following
    are its advantages.


    *   Random forest is insensitive to missing values and outliers.


    *   It prevents the algorithm from overfitting.


    How does it work? It works on bagging and bootstrap sample techniques.


    *   Randomly takes the square root of *m* features and a 2/3 bootstrap data sample
    with a replacement for training each decision tree randomly and predicts the outcome.


    *   An *n* number of trees are built until the out-of-bag error rate is minimized
    and stabilized.


    *   Compute the votes for each predicted target and consider the mode as a final
    prediction in terms of classification.


    Figure [1-8](#517793_1_En_1_Chapter.xhtml#Fig8) shows the working of the random
    forest model.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig8_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Random forest


    ##### Support-Vector Machines


    SVM tries to find the best hyperplane which separates the data into groups based
    on the target feature. Figure [1-9](#517793_1_En_1_Chapter.xhtml#Fig9) represents
    the working of SVM.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig9_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    SVM


    Consider the graph Figure [1-9](#517793_1_En_1_Chapter.xhtml#Fig9) as two groups:
    circles and boxes. Since there are only two features, separating these groups
    becomes easier, and using a line to do so. But as the number of features increases,
    dimensionality also increases and uses a hyperplane or a set of hyperplanes to
    separate the classes. These planes are called a *decision boundary* . Anything
    that falls on one side of the line is classified as a *circle*, and the other
    side is a *box*.


    How to decide the best hyperplane? Figure [1-10](#517793_1_En_1_Chapter.xhtml#Fig10)
    demonstrates the hyperplane concept.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig10_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Hyperplane


    Margin width is the distance between the plane and the nearest data point. SVM
    tries to maximize the margin width to achieve the goal of choosing the right hyperplane
    . As shown in the image, line C is the best hyperplane as the margin is high.


    ###### Nonlinear Data: The Kernel Trick


    The data distribution is not always linear. Most of the time, the data distribution
    is nonlinear, and linear hyperplanes fail to classify the data. To solve this
    problem, SVM introduced the *kernel trick* (see Figure [1-11](#517793_1_En_1_Chapter.xhtml#Fig11)),
    which projects data multidimensionally to perform learning tasks.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig11_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Kernel trick


    ##### Neural Networks


    Neural networks are machine learning algorithms inspired by the human nervous
    system, which processes information and takes actions.


    Millions of neurons are interconnected, and each neuron learns or finds the pattern
    based on the training data. The network tries to find the hidden rules automatically
    without human intervention. These algorithms outperformed all other machine learning
    techniques, especially on unstructured data like image and text. Figure [1-12](#517793_1_En_1_Chapter.xhtml#Fig12)
    shows the architecture of the neural network.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig12_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Neural network


    You need to find the weights and biases that are predicted. The training of neural
    networks is done by fine-tuning the weights and biases through multiple iterations.


    *   Feedforward: Taking the input through the input layer, passing it on to the
    hidden layer where the weights and bias are added randomly for the first iteration,
    and finally predicting the output as the sum product of weights and feature value
    plus bias.


    *   Backpropagation: Computes error between the predicted and actual output from
    the previous step. This error is propagated backward, and weights and biases are
    updated accordingly using optimizers to minimize the loss function.


    One cycle of feedforward and backpropagation is called an *epoch* . And such multiple
    epochs are carried out to improve the accuracy.


    The *activation function* introduces non-linearity to map the input to the output
    accordingly. Multiple activation functions are based on the target feature, such
    as Sigmoid, which is mostly used in binary classification; similarly, Softmax
    is predominantly used in multiclass classification.


    The following are key terms or components in deep learning.


    *   Weights


    *   Bias


    *   Loss function


    *   Optimizers: gradient descent, Adam, AdaDelta, RMS Prop


    *   Activation functions: sigmoid, softmax, ReLU


    ##### Deep Neural Networks


    Characteristics


    *   The number of hidden layers is more than one


    *   The previous layer’s output is fed into the next layers


    *   Each layer extracts features


    *   Nonlinear functions capture complex hidden features


    Figure [1-13](#517793_1_En_1_Chapter.xhtml#Fig13) shows a flow diagram.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig13_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig13_HTML.jpg)


    Figure 1-13


    Deep neural network


    ##### Convolutional Neural Networks


    Convolution neural networks are a type of deep neural network with a minor change
    in architecture. These are specifically designed for processing images. CNN has
    a couple of other layers, which makes the implementation more efficient. CNN takes
    every image pixel as a feature with a 3D array (for color images) and processes
    it to classify it.


    There are multiple custom layers in CNN, including the following.


    *   Convolution layer


    *   Max pooling layer


    *   Fully connected layer


    *   Dropout layer


    The *convolution layer* acts as a filter that extracts the feature present in
    an image. The values of the filters are derived in the training process. Figure
    [1-14](#517793_1_En_1_Chapter.xhtml#Fig14) shows the workings of CNN.


    ![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig14_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    CNN


    ##### RNN


    Just as CNNs are specifically designed for images, there are recurrent neural
    networks to process sequence-based data like text. The idea is that text data
    have a certain sequence attached to it. The data itself is sequential, and that
    adds meaning to the sentence. RNNs also capture the sequential nature of data.


    RNN works in loops. The data flows in circles and thereby learning not only current
    state input but previous input as well. The concept of backpropagation through
    time comes into the picture; it is similar to the backpropagation of a normal
    neural network, but it goes back in time and updates the weights.


    But the biggest challenge in RNN is vanishing gradients which means when the gradients
    are too small, the learning of the model will stop. Models like *long short-term
    memory* (LSTM) networks and *gated recurrent units* (GRUs) overcome problems using
    the gates mechanism.'
  trans: "\n### 随机森林\n\n随机森林因其灵活性和克服过拟合问题的能力，成为应用最广泛的机器学习算法。它是一种集成算法，由多个决策树集成——树的数量越多，准确率越高。\n\
    \n随机森林可以执行分类和回归任务。以下是其优点。\n\n- 随机森林对缺失值和异常值不敏感。\n- 它能防止算法过拟合。\n\n它是如何工作的？它基于装袋（bagging）和自助采样（bootstrap\
    \ sample）技术。\n\n- 随机取`m`个特征的平方根，并取一个包含 2/3 数据的自助样本（有放回），用于随机训练每个决策树并预测结果。\n- 构建`n`棵树，直到袋外错误率最小化并趋于稳定。\n\
    - 计算每个预测目标的投票数，并将众数作为分类任务的最终预测结果。\n\n图 1-8 展示了随机森林模型的工作原理。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig8_HTML.jpg](img/517793_1_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8  \n随机森林\n\n### 支持向量机\n\n支持向量机（SVM）试图找到最佳超平面，该超平面根据目标特征将数据分成不同的组。图 1-9\
    \ 展示了 SVM 的工作原理。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig9_HTML.jpg](img/517793_1_En_1_Fig9_HTML.jpg)\n\
    \n图 1-9  \nSVM\n\n将图 1-9 中的图形视为两组：圆形和方形。由于只有两个特征，分离这些组变得更容易，可以使用一条直线来完成。但随着特征数量的增加，维度也会增加，此时需要使用一个超平面或一组超平面来分隔这些类别。这些平面被称为*决策边界*。落在直线一侧的任何事物都被归类为*圆形*，另一侧则为*方形*。\n\
    \n如何决定最佳超平面？图 1-10 展示了超平面的概念。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig10_HTML.jpg](img/517793_1_En_1_Fig10_HTML.jpg)\n\
    \n图 1-10  \n超平面\n\n间隔宽度是平面与最近数据点之间的距离。SVM 试图最大化间隔宽度，以实现选择正确超平面的目标。如图所示，由于间隔较大，直线\
    \ C 是最佳超平面。\n\n#### 非线性数据：核技巧\n\n数据分布并不总是线性的。大多数情况下，数据分布是非线性的，线性超平面无法对数据进行分类。为了解决这个问题，SVM\
    \ 引入了*核技巧*（参见图 1-11），它将数据投影到多维空间以执行学习任务。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig11_HTML.jpg](img/517793_1_En_1_Fig11_HTML.jpg)\n\
    \n图 1-11  \n核技巧\n\n### 神经网络\n\n神经网络是受人类神经系统启发的机器学习算法，人类神经系统负责处理信息并采取行动。\n\n数百万个神经元相互连接，每个神经元根据训练数据学习或发现模式。网络试图自动发现隐藏的规则，无需人工干预。这些算法在所有其他机器学习技术中表现优异，尤其是在处理图像和文本等非结构化数据时。图\
    \ 1-12 展示了神经网络的架构。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig12_HTML.jpg](img/517793_1_En_1_Fig12_HTML.jpg)\n\
    \n图 1-12  \n神经网络\n\n你需要找到预测的权重和偏置。神经网络的训练是通过多次迭代微调权重和偏置来完成的。\n\n- 前向传播：通过输入层接收输入，将其传递到隐藏层（在第一次迭代中随机添加权重和偏置），最后将输出预测为权重与特征值的乘积之和加上偏置。\n\
    - 反向传播：计算上一步中预测输出与实际输出之间的误差。该误差被反向传播，并使用优化器相应地更新权重和偏置，以最小化损失函数。\n\n一个前向传播和反向传播的循环称为一个*周期*。通过执行多个这样的周期来提高准确率。\n\
    \n*激活函数*引入非线性，从而将输入相应地映射到输出。基于目标特征有多种激活函数，例如 Sigmoid 主要用于二分类；类似地，Softmax 主要用于多分类。\n\
    \n以下是深度学习中的关键术语或组件。\n\n- 权重\n- 偏置\n- 损失函数\n- 优化器：梯度下降、Adam、AdaDelta、RMS Prop\n\
    - 激活函数：sigmoid、softmax、ReLU\n\n### 深度神经网络\n\n特点\n\n- 隐藏层数量多于一个\n- 前一层的输出被馈送到后续层\n\
    - 每一层都提取特征\n- 非线性函数捕获复杂的隐藏特征\n\n图 1-13 展示了一个流程图。\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig13_HTML.jpg](img/517793_1_En_1_Fig13_HTML.jpg)\n\
    \n图 1-13  \n深度神经网络\n\n### 卷积神经网络\n\n卷积神经网络是一种深度神经网络，其架构略有变化。它们专门为处理图像而设计。CNN 有几个其他层，这使得实现更高效。CNN\
    \ 将每个图像像素作为一个特征（对于彩色图像是三维数组）进行处理，并对其进行分类。\n\nCNN 中有多个自定义层，包括以下内容。\n\n- 卷积层\n-\
    \ 最大池化层\n- 全连接层\n- 丢弃层\n\n*卷积层*充当滤波器，提取图像中存在的特征。滤波器的值在训练过程中得出。图 1-14 展示了 CNN 的工作原理。\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig14_HTML.jpg](img/517793_1_En_1_Fig14_HTML.jpg)\n\
    \n图 1-14  \nCNN\n\n### RNN\n\n正如 CNN 专门为图像设计一样，也存在用于处理基于序列的数据（如文本）的循环神经网络。其思想是文本数据具有特定的序列。数据本身是顺序的，这为句子增添了意义。RNN\
    \ 也能捕获数据的序列特性。\n\nRNN 以循环方式工作。数据以循环方式流动，因此不仅学习当前状态的输入，也学习先前的输入。随时间反向传播的概念应运而生；它类似于普通神经网络的反向传播，但它是回溯时间并更新权重。\n\
    \n但 RNN 最大的挑战是梯度消失，这意味着当梯度太小时，模型的学习将会停止。像*长短期记忆网络*（LSTM）和*门控循环单元*（GRU）这样的模型通过门控机制克服了这些问题。\n"
- fmt: "### Unsupervised Learning\n\nUnsupervised learning is a machine learning category\
    \ where the labeled data is not leveraged, but still, inferences are discovered\
    \ using the data at hand. You need to find the patterns without the dependent\
    \ variables to solve the business problems. Figure [1-15](#517793_1_En_1_Chapter.xhtml#Fig15)\
    \ shows the clustering outcome.\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig15_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15 Clustering\n\nThere are two main types of unsupervised learning\
    \ techniques: *clustering* and *dimensionality reduction*.\n\n#### Clustering\n\
    \nGrouping similar things into segments is called *clustering*. Similar “things”\
    \ are not only data points but a collection of observations that are:\n\n- Similar\
    \ to each other in the same group\n- Dissimilar to the observations in other groups\n\
    \nThere are mainly two important algorithms that are highly being used in the\
    \ industry. Let’s briefly look at how algorithms work before getting into projects.\n\
    \n##### k-means Clustering\n\n`k-means` is the efficient and widely used clustering\
    \ technique that groups the data based on the distance between the points. The\
    \ objective of `k-means` clustering is to minimize total variance within the cluster,\
    \ as shown in Figure [1-16](#517793_1_En_1_Chapter.xhtml#Fig16).\n\n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig16_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig16_HTML.jpg)\n\
    \nFigure 1-16 k-means\n\nThe following steps generate clusters.\n\n1. Use the\
    \ elbow method to identify the optimum number of clusters. This acts as `k`.\n\
    2. Select random `k` points as cluster centers from the overall observations or\
    \ points.\n3. Calculate the distance between these centers and other points in\
    \ the data and assign to the closest center cluster that point belongs to using\
    \ any distance metrics.\n   - Euclidean distance\n   - Manhattan distance\n  \
    \ - Cosine distance\n   - Hamming distance\n4. Recalculate the cluster center\
    \ or centroid for each cluster.\n5. Repeat steps 2, 3, and 4 until the same points\
    \ are assigned to each cluster, and the cluster centroid is stabilized.\n\n#####\
    \ Hierarchical Clustering\n\nHierarchical clustering is another type of clustering\
    \ technique that also uses distance to create groups. The following steps generate\
    \ clusters.\n\n1. Hierarchical clustering starts by creating each observation\
    \ or point as a single cluster.\n2. It identifies the two observations or points\
    \ that are closest together based on distance metrics.\n3. Combine these two most\
    \ similar points and form one cluster.\n4. This continues until all the clusters\
    \ are merged and form one final single cluster.\n5. Finally, using a dendrogram,\
    \ decide the ideal number of clusters.\n\nYou cut the tree to decide the number\
    \ of clusters. The cutting of the tree is one where there is a maximum jump of\
    \ one level to another, as shown in Figure [1-17](#517793_1_En_1_Chapter.xhtml#Fig17).\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig17_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig17_HTML.jpg)\n\
    \nFigure 1-17 Hierarchical clustering\n\nUsually, the distance between two clusters\
    \ has been computed based on Euclidean distance. Many other distance metrics can\
    \ be leveraged to do the same.\n\n#### Dimensionality Reduction\n\nDimensionality\
    \ reduction is the process of decreasing the number of features from an entire\
    \ data to a few significant principal features to increase the accuracy of our\
    \ modeling practices and reduce computational challenges. For example, if we are\
    \ working on predictive modeling and the number of variables is more than 1000,\
    \ there is a good possibility that our algorithms might fail to perform. Using\
    \ any dimensionality reduction techniques, you can bring the number of features\
    \ while capturing most of the context/information from all the features.\n\n-\
    \ It helps when independent variables have a correlation between them, which is\
    \ called *multicollinearity*. We might have encountered this more often while\
    \ working on our machine learning algorithms. You can also use *principal component\
    \ analysis* (`PCA`) and *linear discriminant analysis* (`LDA`) to solve such a\
    \ challenge.\n\n### Reinforcement Learning\n\nYou saw two well-known machine learning\
    \ categories, supervised and unsupervised learning. In recent days, reinforcement\
    \ learning is also gearing up to solve a lot of business problems. There is a\
    \ lot of research in this field, and it has already showcased its potential. We\
    \ all know that machines playing games against humans are already a talking point\
    \ about how machines are winning the contest. `AlphaGo` is the best example.\n\
    \nHow does it work?\n\nReinforcement learning is learning from experience and\
    \ mistakes. There is a goal to achieve in every setting, and for every positive\
    \ move, a reward is given. In the same way, for every negative move, it penalizes\
    \ the machine. It learns what kind of actions it should take to gain more rewards\
    \ and reach the goal. It is a continuous sequential process, and, in some cases,\
    \ there might be no information at the beginning of the process.\n\nIt has five\
    \ components to carry out the process, as shown in Figure [1-18](#517793_1_En_1_Chapter.xhtml#Fig18).\n\
    \n![../images/517793_1_En_1_Chapter/517793_1_En_1_Fig18_HTML.jpg](images/517793_1_En_1_Chapter/517793_1_En_1_Fig18_HTML.jpg)\n\
    \nFigure 1-18 Reinforcement learning\n\n- Environment\n- State\n- Agent\n- Action\n\
    - Reward or penalty\n\n1. The process starts from state `S0`, which is the environment.\n\
    2. The agent takes action `A0` after this.\n3. The state has changed from `S0`\
    \ to `S1`.\n4. Reward `R1` is provided to the agent.\n5. This RL loop repeats\
    \ until the goal is achieved.\n\n## NLP Concepts\n\n### Unstructured Data\n\n\
    When data is stored in a structured manner with columns and rows, it’s called\
    \ *structured data*. But more than 80% of the data cannot be used in the same\
    \ way because of its unstructured behavior. But there is infinite insight hidden\
    \ within that data as well. Unstructured data can be text, image, video, and so\
    \ on.\n\n#### Natural Language Processing\n\nCollecting, understanding, processing,\
    \ and generating insights out of text data is called *natural language processing*.\n\
    \nText data is available everywhere. The exponential increase in social media,\
    \ retail product reviews, entertainment reviews, and healthcare documents generates\
    \ an unimaginable amount of text data. Leveraging these kinds of data is critical\
    \ in the era of AI coupled with business."
