    ### A. Building Vectors Using doc2vec


    `doc2vec` is similar to `word2vec`. In `word2vec`, there is a vector of each word
    or token. But if we need a vector for a sentence or document, the average of all
    the word vectors is calculated. In that process, the document might lose some
    information or context.


    Here we evolve to `doc2vec`, where every document is passed to the model as unique
    input and vectors are found.


    Let’s import the necessary libraries and start building the model.


    ```

    # importing doc2vec from gensim

    from gensim.models.doc2vec import Doc2Vec, TaggedDocument

    # tokenizing the sentences

    tok_quora=[word_tokenize(wrd) for wrd in df.question]

    #creating training data

    Quora_training_data=[TaggedDocument(d, [i]) for i, d in enumerate(tok_quora)]

