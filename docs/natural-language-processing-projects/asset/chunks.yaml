    \ Patel had said.`\n\nThe results look promising. We can further improve and polish\
    \ the summary to handle noise in the output. First, let's evaluate the summarization\
    \ model.\n\n## Evaluation Metrics for Summarization\n\n- **ROUGE score**: Basically,\
    \ the number of words in the human-generated summary appeared in the machine extracted\
    \ summary. It measures the recall of the output in terms of machine learning evaluation.\n\
    \n- **BLEU score**: The score is calculated using the following formula.\n\n`Score\
    \ = number of words in the machine-generated summary that appeared in the human-created\
    \ summary.`\n\nThe BLEU score gives the precision of the model.\n\nLet's quickly\
    \ find the BLEU score for the T5 model.\n\nLet's import the library.\n\n```\n\
    from nltk.translate.bleu_score import sentence_bleu\n```\n\nLet's predict for\
    \ the source text, which is new.\n\n```\nx = [x for x in df.headlines]\ny = [model.predict(p)[0]\
    \ for p in df['source_text']]\n# Function to calculate the score\nL = 0\nfor i,\
    \ j in zip(x, y):\n    L += sentence_bleu(\n        [i],\n        j,\n       \
    \ weights=(0.25, 0.25, 0.25, 0.25),\n        smoothing_function=None,\n      \
