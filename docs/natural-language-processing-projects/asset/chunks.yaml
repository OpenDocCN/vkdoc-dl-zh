    我们在测试数据上也得到了 78% 的 F1 分数，这是一个很好的迹象。这意味着模型没有过拟合，准确率看起来很有希望。通过进一步微调和增加训练轮数，我们可以尝试提高这个分数。


    ### 对新问题对的预测


    让我们构建一个函数，用于计算给定问题对的概率分数。


    ```

    def find_similarity_score(q1,q2):

    #清洗第一个问题

    Q1_C=  txt_process(q1)

    #print(q1)

    #清洗第二个问题

    Q2_C = txt_process(q2)

    #print(q2)

    #将第一个问题转换为 token

    Q1_C = tokenizer.texts_to_sequences([Q1_C])

    #将第二个问题转换为 token

    Q2_C = tokenizer.texts_to_sequences([Q2_C])

    #合并两个 token，就像我们对训练数据所做的那样

    Q_final = Q1_C[0] + Q2_C[0]

    #将合并后的序列填充到最大长度

    Q_Test = sequence.pad_sequences([Q_final], maxlen = 500)

    #预测给定问题对的概率

    Prob=quora_model.predict(Q_Test)

    print(Prob)

    #如果 p>0.5 则相似

    if Prob[0]>0.5:

    return ''Quora 问题相似''

    else:

    return ''Quora 问题不相似''

    #示例 1

    find_similarity_score(''Who is Narendra Modi?'',''What is identity of Narendra
    Modi?'')

    [[0.70106715]]

    Quora 问题相似

    #示例 2

    find_similarity_score(''is there life after death?'',''Do people belive in afterlife'')

    [[0.550213]]

    Quora 问题相似

    #示例 3

    find_similarity_score(''Should I have a hair transplant at age 24? How much would
    it cost?'',''How much cost does hair transplant require?'')

    [[0.17271936]]

    Quora 问题不相似

    ```


    你可以看到这些概率值有多好。在前两个示例中，概率大于 0.5，并且问题是相似的。示例 3 是问题不相似的情况。


    ## 结论


    我们成功构建了两种模型来查找相似的 Quora 问题：监督学习和无监督学习。我们探索了各种最新的预训练嵌入来解决这个问题。在监督学习中，我们训练了一个深度学习分类器，在不使用任何嵌入的情况下预测相似性。


    接下来，让我们尝试以下步骤进行改进。


    1.  我们可以采用混合方法。我们可以使用预训练嵌入作为基础向量，并在其之上构建一个分类器——这是一种迁移学习方法。我们将在本书后面的章节中探讨这个概念。


    2.  我们还可以尝试不同的、先进的深度学习架构，例如注意力机制，而不是简单的带有 dropout 的 LSTM。


    3.  对任何架构中的参数进行超参数调优都可以提高准确率。


    # 8. 使用 CRF 和 BERT 进行命名实体识别


    命名实体识别（NER）是一种自然语言处理技术。它也被称为*实体识别*或*实体提取*。它识别文本中的命名实体，并将其分类到预定义的类别中。例如，提取的实体可以是文本中存在的组织名称、地点、时间、数量、人物、货币价值等。


    通过 NER，通常可以提取关键信息来了解给定文本的内容，或者用于收集重要信息并存储在数据库中。


    NER 被广泛应用于许多领域的应用程序中。NER 在生物医学数据中得到了广泛的应用。例如，它用于 DNA 识别、基因识别以及药物名称和疾病名称的识别。图 8-1
    展示了一个与医学文本相关的 NER 示例，该示例提取了症状、患者类型和剂量。


    ![../images/517793_1_En_8_Chapter/517793_1_En_8_Fig1_HTML.jpg](img/517793_1_En_8_Fig1_HTML.jpg)


    图 8-1


    对医学文本数据进行 NER


    NER 还用于优化搜索查询和排序搜索结果。它有时与主题识别结合使用。NER 也用于机器翻译。


    有许多使用 NER 的预训练通用库。例如，spaCy——一个用于各种 NLP 任务的开源 Python 库。而 NLTK（自然语言工具包）有一个用于 Stanford
    NER 的包装器，这在许多情况下更简单。


    这些库只能提取特定类型的实体，例如名称、地点等。如果你需要提取非常特定领域的内容，例如治疗方法的名称，这是不可能的。在这些情况下，你需要构建自定义的 NER。本章将解释如何构建自定义的
    NER 模型。

