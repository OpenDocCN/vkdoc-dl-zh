    We implemented a search engine and recommendation systems using various models
    in this chapter. We started with a simple recommender system using the `TF-IDF`
    approach to find the similarity score for all the products description. Based
    on the description, products are ranked and shown to the users. Later, we explored
    how to build a simple search engine using word embeddings and ranked the results.


    Then, we jumped into advanced models like `PyTerrier` and `Sentence-BERT`, where
    pretrained models extract the vectors. Since these models are deep learning-based,
    results are a lot better when compared to traditional approaches. We also used
    `Deep Text Search`, another deep learning library that works for multilanguage
    text corpus.


    # 5. Creating a Résumé Parsing, Screening and Shortlisting System


    The objective of this project is to create a résumé shortlisting system using
    natural language processing.


    ## Context


    With millions of individuals looking for a job, it is impossible to sort through
    hundreds and thousands of résumés to find the best applicant. Most résumés do
    not follow a standard format; that is, nearly every résumé on the market has a
    unique structure and content. Human resource personnel must personally review
    each résumé to determine the best fit for the job description. This is time-consuming
    and prone to inaccuracy, as a suitable candidate for the job may be overlooked
    in the process.


    One of the difficult challenges companies currently face is choosing the right
    candidate for a job with a limited amount of time and resources. When choosing
    the best candidate, a recruiter must consider the following.


    - From the set of résumés in the database, manually go through them one by one
    to look for the those that best match the given job description.

    - Out of the selected résumés, rank them based on the greatest relevance to the
    job description.

    - Once ranked, information like name, contact number, and e-mail address, is necessary
    to take the candidate further.


    To overcome these challenges, let’s see how NLP can build a résumé parsing and
    shortlisting system that parses, matches, selects, and ranks the résumés from
    a huge pool based on the job description (JD).


    ## Methodology and Approach


    The key requirements to solve this project are job descriptions and résumés that
    act as input to the model, which is then passed on to the document reader based
    on the format (word or PDF), which extracts all the content from word/PDF documents
    in the form of text.


    Now that we have the text data, it is important to process it to remove the noise
    and unwanted information like stop words and punctuation.


    Once résumés and job descriptions are processed, we need to convert the text into
    features using a count vectorizer or `TD-IDF`. `TD-IDF` might make more sense
    for this use case because we want to emphasize the occurrence of each keyword
    (skill) mentioned in the résumé. After that, we use *truncated singular vector
    decomposition* to reduce the dimensions of the feature vector.


    Then we move on to the model building stage, where we have a similarity engine
    to capture how similar the two documents (résumé and JD) are with respect to the
    keywords present in them. Using the similarity scores, we rank each résumé to
    each job description present in the system. For example, there are two job descriptions
    (data science and analytics) and 50 résumés from diversified skill sets. So, out
    of these 50 résumés, this model would provide top résumés for data science and
    top résumés for analytics.


    Once the model is built, and we have selected the top résumés for the given job
    description, it is important to extract relevant information like the person’s
    name, contact number, location, and e-mail address.


    Finally, we collate all the outcomes and present them in a tabular format, which
    the recruiter can access and proceed with the hiring process. The validation and
    visualization layer help the recruiter further validate and have a look at the
    top skills in the résumé without having to open the résumé to understand the candidate’s
    profile.


    Figure [5-1](#517793_1_En_5_Chapter.xhtml#Fig1) shows the process flow diagram
    as an approach to solve this problem.


    ![../images/517793_1_En_5_Chapter/517793_1_En_5_Fig1_HTML.jpg](images/517793_1_En_5_Chapter/517793_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Shows the entire framework for the model


    **Note** Extracting of information and entities is done on the original text (without
    preprocessing).


    ## Implementation


    The data set we considered consists of 32 different résumés from various domains
    and three different job descriptions. This data set is open source. The data sets
    that are used here contain different file formats of résumés and job descriptions.
    The following are the links to the data sets. (We considered only a few data sets
    for this chapter demo, but there are thousands of résumés for each domain profile.)


    Now that the data is collected, let’s start the implementation.


