    This might lead to a huge matrix based on the size of the documents, so it is
    important to reduce the dimensionality by using feature reduction techniques.


    ### Feature Reduction


    Truncated *singular value decomposition* (SVD) is one of the most famous approaches
    for dimension reduction. It factors the matrix M into the three matrixes U, Σ,
    and V^T to generate features. U, Σ, and V^T are described as follows.


    *   U is the left singular matrix


    *   Σ is the diagonal matrix


    *   V^T is the right singular matrix


    Truncated SVD produces a factorization where we can specify the number of columns
    that we want, keeping the most relevant features.


    ```

    # Defining transformation

    dimrec = TruncatedSVD(n_components=30, n_iter=7, random_state=42)

    transformed = dimrec.fit_transform(df_tfidfvect1)

    # Converting transformed vector to list

    vl = transformed.tolist()

    # Converting list to DataFrame

    fr = pd.DataFrame(vl)

    print(''SVD Feature Vector'')

    print(fr[0:10])

    ```


