    ```


    看起来不错；预训练的 BART 模型确实提供了合理的摘要。但是，如果你想进一步改进它，并引入特定领域的上下文以获得更好的摘要，你可以使用这个预训练模型作为基础，进行迁移学习（在你的数据集上进行自定义训练）。让我们在下一节探讨如何做到这一点。


    如何训练摘要模型？首先，让我们再讨论一些概念。


