- fmt: '### Visualization and Insights


    We generated emotion and sentiment in the last section on Samsung data pulled
    from Twitter using APIs. But building the algorithms, predicting emotion and sentiment
    won''t solve the purpose. Instead, you need insights so that businesses can make
    decisions on that.


    This section discusses how to do that using different libraries. The output of
    the predictive models is visualized through the different graphs. We are leveraging
    libraries like `Plotly` and `Matplotlib`.


    First, let’s visualize the sentiments. This is done by a pie graph, which gives
    detailed insight. The `cufflinks` library generates the graph.


    ```python

    import chart_studio.plotly as py

    import plotly as ply

    import cufflinks as cf

    from plotly.graph_objs import *

    from plotly.offline import *

    init_notebook_mode(connected=True)

    cf.set_config_file(offline=True, world_readable=True, theme=''white'')

    Sentiment_df = pd.DataFrame(twt.Sentiment_label.value_counts().reset_index())

    Sentiment_df.columns = [''Sentiment'', ''Count'']

    Sentiment_df = pd.DataFrame(Sentiment_df)

    Sentiment_df[''Percentage''] = 100 * Sentiment_df[''Count'']/ Sentiment_df[''Count''].sum()

    Sentiment_Max = Sentiment_df.iloc[0,0]

    Sentiment_percent = str(round(Sentiment_df.iloc[0,2],2))

    fig1 = Sentiment_df.iplot(kind=''pie'',labels=''Sentiment'',values=''Count'',textinfo=''label+percent'',
    title= ''Sentiment Analysis'', world_readable=True,

    asFigure=True)

    ply.offline.plot(fig1,filename="Sentiment")

    ```


    Figure [2-12](#517793_1_En_2_Chapter.xhtml#Fig12) shows the output of sentiment
    represented in a pie chart.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig12_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig12_HTML.jpg)


    **Figure 2-12** Output


    The graph clearly shows that 58% of total comments are neutral and that 32% of
    total comments are positive. Only about 9% are negative. From a business point
    of view, it’s a pretty good result for Samsung.


    You can generate the following graphs to understand more about products.


    - Sentiment by date reveals at what point of time a product or company was not
    doing well.

    - Generate word cloud by a segment that tells you what positive and negative factors
    are for that product.


    As with the sentiment, you see what the emotion results look like.


    ### Emotion Analysis


    As with the sentiment, you need to understand how the emotion to draw some significant
    conclusions. You predicted the emotion of every comment in earlier steps. Let’s
    use that and generate charts to understand it better.


    A pie chart visualizes the emotions of the document. This graph is also generated
    using the `cufflinks` library.


    ```python

    import chart_studio.plotly as py

    import plotly as ply

    import cufflinks as cf

    from plotly.graph_objs import *

    from plotly.offline import *

    init_notebook_mode(connected=True)

    cf.set_config_file(offline=True, world_readable=True, theme=''white'')

    Emotion_df = pd.DataFrame(twt.Emotion.value_counts().reset_index())

    Emotion_df.columns = [''Emotion'', ''Count'']

    Emotion_df = pd.DataFrame (Emotion_df)

    Emotion_df[''Percentage''] = 100 * Emotion_df[''Count'']/ Emotion_df[''Count''].sum()

    Emotion_Max = Emotion_df.iloc[0,0]

    Emotion_percent = str(round(Emotion_df.iloc[0,2],2))

    fig = Emotion_df.iplot(kind=''pie'', labels = ''Emotion'', values = ''Count'',pull=
    .2, hole=.2 , colorscale = ''reds'', textposition=''outside'',colors=[''red'',''green'',''purple'',''orange'',''blue'',''yellow'',''pink''],textinfo=''label+percent'',
    title= ''Emotion Analysis'', world_readable=True,asFigure=True)

    ply.offline.plot(fig,filename="Emotion")

    ```


    Figure [2-13](#517793_1_En_2_Chapter.xhtml#Fig13) shows the output of emotions
    represented in a pie chart.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig13_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig13_HTML.jpg)


    **Figure 2-13** Output


    The generated graph gives an emotional sense of the comments: 39% captured “disgust,”
    32% captured “joy,” and the remaining captured fear, guilt, shame, anger, and
    sadness.


    The good thing is 32% of the customers are happy. But you need to dig deeper to
    understand why 39% of comments are disgusting. There is chance customer were neutral
    with sentiments and disgusted.


    To understand that, let’s plot both sentiment and emotion on a single plot that
    answers all your questions.


    ### Emotion and Sentiment Analysis


    The stacked bar plot is the combination of both emotion and sentiment. It consists
    of each emotion and the corresponding sentiment on that emotion and gives the
    value count of the emotions.


    The following generates a stacked bar plot chart.


    ```python

    import seaborn as sns

    sns.set(rc={''figure.figsize'':(11.7,8.27)})

    Result = pd.crosstab(twt.Emotion, twt.Sentiment_label)

    plt = Result.plot.bar(stacked=True,sort_columns = True)

    plt.legend(title=''Sentiment_label'')

    plt.figure.savefig(''Emotion_Sentiment_stacked.png'', dpi=400)

    ```


    Figure [2-14](#517793_1_En_2_Chapter.xhtml#Fig14) shows the output of sentiment
    and emotions represented in stacked bar chart.


    ![../images/517793_1_En_2_Chapter/517793_1_En_2_Fig14_HTML.jpg](images/517793_1_En_2_Chapter/517793_1_En_2_Fig14_HTML.jpg)


    **Figure 2-14** Output


    This chart helps us analyze the overlap of sentiment and emotion in a better way.'
