    ### Predicting the Emotion


    We extracted data using the Twitter API and collected enough to make predictions
    that led to some insights. After preprocessing, we predicted emotions using the
    function or algorithm built in the previous section. Then, we finalized a linear
    model, which gave better results. Finally, we saved the final data in a data frame.


    Now, let’s extract the relevant feature using the TF-IDF vectorizer. After that,
    we use the `predict` function to obtain the emotion.


    ```

    Xpredict = twt[''text'']

