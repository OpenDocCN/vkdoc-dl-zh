    Code that tries to generate comment for Google search code

    ```


    This outputs


    ```

    https://www. googleapis. com / ajax. services. search. web?v = 1\. 0 &q = 123
    Show title and URL of 1st result.

    ```


    The last result might not look good, but this can be improved by tuning the specific
    parameters, which I leave to you to experiment with.


    Finally, these pretrained models can also be fine-tuned for specific programming
    languages like C, C++, etc.


    ## Summary


    In this chapter we looked into the various use cases and implementations of how
    transformers can be used for processing text and applying it for various tasks
    like classification, translation, summarization, etc. We also looked at how we
    can easily build a chatbot using the huggingface APIs.


    In the next chapter, we look at how transformers can be applied to the area of
    image processing.'
