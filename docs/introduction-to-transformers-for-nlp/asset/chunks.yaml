  trans: '

    ### 残差连接、层归一化与前馈网络


    原始的位置输入嵌入会与多头注意力输出向量相加，作为额外的组成部分。这种连接方式被称为残差连接。你可以将此步骤理解为将输入（此处为位置编码）与输出（此处为多头注意力输出）相加。之后，会对残差连接的输出执行一种称为层归一化的操作。层归一化的目标是提升训练性能。


    归一化后，输出会通过一个前馈网络，然后该前馈网络的结果会与输入（即馈入前馈网络的数据）一起进行归一化处理。


    由于残差连接能使梯度直接在网络中传播，因此它们对网络的训练过程非常有益。层归一化则负责稳定网络，这最终能显著缩短所需的训练时间。


    这大致就是从高层视角来看编码器的工作原理。接下来，我们将简要讨论 Transformer 的解码器组件。


    ### 解码器


    解码器的职责是生成文本序列。解码器与编码器类似，都包含以下层：


    1.  多头注意力层

    2.  加和与归一化层

    3.  前馈层


    此外，它还有一个带有 softmax 分类器的线性层，用于输出概率。这就是生成部分发挥作用的地方。


    解码器的工作原理是：接收起始的标记化单词以及之前的输出（如果有的话），并将其与编码器的输出相结合。


    解码过程中涉及的不同方面将在下文进行解释。


    #### 输入嵌入与位置编码


    在很大程度上，解码器的起始部分与编码器的起始部分相同。为了获得位置嵌入，输入首先会经过一个嵌入层，然后是一个位置编码层。随后，位置嵌入会被送入第一个多头注意力层。


    #### 第一层多头注意力


    这一层虽然在名称上与我们在编码器中使用的层相似，但在功能上略有不同。原因在于，解码器只能访问句子中当前单词之前的单词。它不应该看到序列中接下来会出现哪个单词。


    我们需要一种方法来避免计算未来词元的注意力分数。这里所采用的技术称为掩码。通过使用前瞻掩码，可以限制解码器查看尚未出现的词元。该掩码会在分数缩放之后、softmax
    计算之前和之后都进行应用。本书不会讨论前瞻掩码的数学细节。掩码的基本思想是：仅根据当前单词之前的单词来计算其注意力分数，而不考虑句子中未来的单词。


    #### 第二层多头注意力


    这一层接收来自解码器第一个多头注意力层的输出，并将其与编码器的输出相结合。这将使解码器能够更好地理解应该关注编码器输出的哪些部分。该多头注意力层的输出会通过一个前馈网络。


    #### 线性分类器与最终 Softmax 输出概率


    前一个多头注意力层和前馈网络的输出会再次进行归一化，然后传递到一个带有 softmax 组件的线性层，用于输出概率——例如，在特定单词序列中下一个单词可能是什么的概率。这就是架构的生成能力大放异彩的地方。


    ## 总结


    本章解释了 Transformer 的工作原理。同时，也详细阐述了 Transformer 所利用的注意力机制的力量，使其能够做出更准确的预测。循环神经网络也可以追求类似的目标，但其有限的短期记忆使得实现这些目标变得困难。如果你希望对长序列进行编码或生成长序列，Transformer
    可能是更好的选择。正是由于 Transformer 的设计，自然语言处理领域才能取得前所未有的成果。


    在下一章中，我们将从代码的角度更详细地探讨 Transformer 的工作原理。我们将介绍 huggingface 生态系统，它是 Transformer
    模型的主要开源仓库之一。


    # 3. BERT


    在本章中，你将学习由谷歌开发的 Transformer 架构的一种实现，称为 BERT。


    谷歌 AI 语言团队的研究人员近期完成的工作，促成了一篇名为《BERT：来自 Transformer 的双向编码器表示》的论文的发表。


    BERT 取得的最重要的技术进步，是将流行的注意力模型 Transformer 的双向训练应用于语言建模。根据对语言模型的研究发现，同时进行双向训练的语言模型，能够比仅进行单向训练的模型更好地理解语言的流动和上下文。研究人员在论文中描述了一种独特的训练方法，他们称之为掩码语言模型（MLM）。这种方法使得模型能够进行双向训练，而这在以前是难以实现的。


    BERT 还允许我们进行迁移学习，这使得预训练的 BERT 模型可以应用于各种自然语言应用。


    根据模型架构的规模，BERT 有两种不同的预训练版本，如下所示：


    -   **BERT-Base** 共有 1.1 亿个参数、12 个注意力头、768 个隐藏节点和 12 层。

    -   **BERT-Large** 拥有 24 层、1024 个隐藏节点、16 个注意力头和 3.4 亿个参数值。


    ## BERT 的工作原理


    BERT 基于 Transformer 架构，该架构内部使用了第 2 章讨论的注意力机制。BERT 的妙处在于理解句子中的上下文，并在考虑上下文的情况下表示一个单词。这意味着，像
    *bank* 这样的词，在金融语境下使用时，与在河岸语境下使用时的表示是不同的。BERT 仅使用 Transformer 架构的编码器机制，主要用于创建更好的单词表示，这些表示随后可用于更多的下游应用。Transformer
    的详细工作原理已在第 2 章中介绍过。


    Transformer 编码器的输入是一个单词序列，BERT 的架构使其能够双向读取以捕捉单词的上下文，即关注单词之前和之后出现的单词。这克服了例如 LSTM
    类型架构中发生的顺序读取（尽管双向 LSTM 是可能的，但它们很复杂，并且仍然存在顺序处理问题）。


    在训练语言模型的过程中，必须克服的挑战之一是确定预测目标。大量模型会预测序列中的下一个单词（例如，“太阳正在 ___ 中下沉”），这是一种方向性方法，其本质限制了上下文学习。BERT
    采用两种不同的训练策略来克服这一障碍。

