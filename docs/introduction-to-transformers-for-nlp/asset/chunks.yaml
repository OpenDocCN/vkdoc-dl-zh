  trans: '

    # BERT 的应用场景


    一旦编码器生成了合适的表征，BERT 便可应用于多种下游任务，包括情感分析、摘要生成、问答、文本到 SQL 生成等。


    除了使用预训练的 BERT 模型，我们还可以使用特定的文本数据集对其进行微调。这将使我们能够充分利用自己的数据。


    与 GPT3 等其他大型学习模型不同，BERT 的源代码对公众完全免费开放，并可在 GitHub 上查看。这使得 BERT 能够在全球范围内更广泛地应用。这彻底改变了格局！


    现在，开发者无需投入大量时间或资金，就能快速部署像 BERT 这样的尖端模型并使其运行。


    此外，开发者可以专注于微调 BERT，以根据其具体项目的需求定制模型性能。


    如果不想花时间微调 BERT，用户应该知道，有成千上万个开源且免费的 BERT 模型已经过预训练，并且目前可用于特定的应用场景。


    BERT 模型已针对多种任务进行了预训练，例如：


    1. 分析 Twitter 及其他社交媒体上的用户情感

    2. 有害评论检测

    3. 语音转文本

    4. 问答


    以及更多其他任务。


    下面我们使用 `huggingface` 库，以推文分类为例来介绍 BERT。


    ## 推文情感分析


    BERTweet 语言模型是首个公开可用、针对英文推文进行预训练的大规模模型。其预训练采用了 RoBERTa 的技术来指导 BERTweet 的训练。BERTweet
    的预训练数据集包含 8.5 亿条英文推文（160 亿个词元，80 GB 数据），其中 8.45 亿条推文来自 2012 年 1 月 1 日至 2019 年
    8 月 8 日，另有 500 万条与新冠疫情相关的推文。


    ```

    model = pipeline(''sentiment-analysis'', model="finiteautomata/bertweet-base-sentiment-analysis")

    代码清单 3-2

    使用 BERT 进行情感分析

    ```


    运行这段代码，我们将得到如图 3-4 所示的输出结果。


    ![](img/523273_1_En_3_Fig4_HTML.jpg)


    图 3-4 展示了使用 BERT 对推文进行情感分析的结果。BERT 是一个针对英文推文进行预训练并指导推文训练的大规模模型。


    图 3-4


    执行代码清单 3-2。此图显示了模型和分词器的下载过程。


    然后，我们将两条推文输入模型：


    ```

    data = ["idk about you guys but i''m having more fun during the bear than I was
    having in the bull.","At least in the bear market it’s down only. Bull market
    is up and down"]

    model(data)

    ```


    这将得到以下输出：


    ```

    [{''label'': ''POS'', ''score'': 0.9888675808906555}, {''label'': ''NEG'', ''score'':
    0.7523579001426697}]

    ```


    这表明 BERTweet 模型能够对上述两条推文进行分类。


    `POS` 分数表示积极情感，`NEG` 分数表示消极情感。


    ## BERT 在多种常见语言任务上的表现


    BERT 的性能在以下几个基准测试上进行了评估：


    1. **SQuAD**（斯坦福问答数据集）：这是一个来自斯坦福大学的问答数据集。BERT 在该数据集上的表现远超现有模型，并且也显著优于人类水平。

    2. **SWAG**：SWAG 代表“对抗性生成情境”。这是一个基于日常场景的数据集，主要测试常识和推理能力。在此任务中，BERT 同样超越了其他模型以及人类的表现。

    3. **GLUE**：代表“通用语言理解评估”。该基准测试评估模型在理解特定语言方面的能力。这里包含一些特定的评估任务。在此任务中，BERT 的表现也异常出色。


    ## 总结


    BERT 是一个极其复杂且尖端的语言模型，能够帮助用户自动化语言理解。它依托海量数据的训练，并利用 Transformer 架构彻底改变了自然语言处理领域，从而实现了最先进的性能。


    得益于 BERT 提供的开源库，以及令人惊叹的 AI 社区为不断改进和分享新 BERT 模型所做的努力，尚未触及的 NLP 里程碑似乎拥有光明的未来。

    '
- fmt: '# 4. Hugging Face


    If you have even a passing familiarity with the advancements that have been made
    in the fields of machine learning and artificial intelligence in the years since
    2018, you have almost certainly become aware of the tremendous strides that have
    been taken in the field of natural language processing (also known as NLP). Most
    of the progress in this area can be attributed to large language models, also
    known as LLMs. The architecture behind these LLMs is the transformer’s encoder-decoder,
    which we discussed in Chapter [2](#523273_1_En_2_Chapter.xhtml).


    Success of transformers came from the architecture’s ability to process input
    data in parallel as well as having a better contextual understanding via the attention
    mechanism. We already referred to Vaswani’s “Attention Is All You Need” paper
    in previous chapters. Before the emergence of transformers, the context was captured
    by vanilla RNN or LSTM without attention.


    `Hugging Face` is now widely recognized as a one-stop shop for all things related
    to natural language processing (NLP), offering not only datasets and pretrained
    models but also a community and even a course.


    `Hugging Face` is a new company that has been built on principles of using open
    source software and data. In true sense, the revolution in NLP started with democratization
    of the NLP models based on the transformer architecture. `Hugging Face` turned
    out to be a pioneer in not just open sourcing these models but also providing
    a handy and easy-to-use abstraction in the form of the `Transformers` library,
    which made it really easy to consume and infer these models.


    `Hugging Face` provided a central place or hub for model developers to publish
    the models in the `huggingface` repository, which can then be consumed by consumers
    who are looking to build applications on top of these models. As an example, the
    BERT (Bidirectional Encoder Representations from Transformers) model was contributed
    by Google to `huggingface`. This then allowed a community of users to consume
    these models in their applications. Then came GPT models from OpenAI like GPT2,
    which are generative models and allowed the end user to write applications that
    can generate, say, stories, novels, etc. GPT2 is also a part of the `huggingface`
    ecosystem. `Hugging Face` provided not only APIs for consuming those models but
    also a way to fine-tune them with our own dataset and monitor and benchmark these
    models. So in a nutshell, the emergence of an ecosystem like `huggingface` has
    really opened up a plethora of opportunities for developers intending to build
    applications on top of natural language processing–based models.


    Currently the scope of these models is not just limited to text processing. We
    now see the emergence of vision transformers and transformer-based models for
    audio. People are building applications for music generation or voice cloning
    in the audio domain and using them for fake image generation in the case of vision
    use cases. There are also models that have mined scientific literature and can
    be used for extracting knowledge from scientific journals. Similarly, models based
    on law-related documents have emerged, and people can use them to build a question
    and answering system on top of them. These models come in a variety of sizes based
    on the underlying architectures being used. As an example, the GPT3 model has
    around 175 billion parameters.


    Similarly, the size and scope of their training datasets have both increased significantly.
    For instance, the original transformer was replaced by the much larger `Transformer-XL`;
    the number of parameters in `BERT-Base` increased from 110 million to 340 million
    in `Bert-Large`; and the GPT2 model, which had 1.5 billion parameters, was replaced
    by the GPT3 model that has 175 billion parameters. China launched a model named
    `Wu Dao 2.0`, which has around 1.75 trillion parameters. The proponents of scaling
    opine that as we increase the sizes of these models, we will also be reaching
    our goal of artificial general intelligence (AGI).


    To give an example of infrastructure needed for such large models, GPT3 was trained
    on a super-computer with more than 10000 GPUs. This means training these models
    only lies in the realm of big companies. Now with the ability to consume most
    of these models, the end user becomes part of the application development ecosystem
    based around these large language models.


    ## Features of the Hugging Face Platform


    Because the `Hugging Face` platform is predicated on the idea of attention-based
    transformer models, it should come as no surprise that the `Transformers` library
    is at the center of the `Hugging Face` ecosystem. The accompanying `Datasets`
    and `Tokenizers` libraries offer assistance to the `Transformers` library. Keep
    in mind that transformers are unable to comprehend text in its original form,
    which is a string of characters. Since our inputs to transformers are in text,
    this text has to be encoded in a way that makes it consumable via the transformer-based
    neural network architecture. For this we make use of `huggingface`-provided APIs
    for tokenizing, which are known as `tokenizers`.


    Apart from tokenizing, we might need to use some custom datasets to either fine-tune
    existing models or train the models from scratch. To have a uniformity in architecture,
    `huggingface` provides an abstraction for datasets via the `Datasets` API. The
    user can then have their own datasets, upload the datasets, train/fine-tune the
    models, and also upload the trained models all just by using the `huggingface`
    APIs. This is nothing less than revolutionary.


    ### Components of Hugging Face


    The `huggingface` library is based on a set of rich abstractions, which abstract
    out the complexity of creating applications based on natural language processing.
    These abstractions allow us a single interface to load models, use tokenizers,
    use datasets across a variety of models, tokenizers and datasets. This is really
    an empowering experience for the developer whose job is simplified by using these
    abstractions. We discuss some of these abstractions in the following subsections.


    #### Pipelines


    `Pipelines` provide a powerful and convenient abstraction for consuming the pretrained
    models from the `huggingface` model repository. It offers a straightforward application
    programming interface (API) that is dedicated to a variety of tasks:


    1. Determine whether the overall sentiment of the sentence can be characterized
    as positive or negative.

    2. Question and answering takes a question and pulls an answer out of the text
    that corresponds to it.

    3. The masked language modeling technique suggests possible words to fill masked
    input with the given context.

    4. The named entity recognition program will automatically assign a label to each
    of the tokens that are included in the input.

    5. Reducing a longer piece of writing or an article into a more concise summary
    is referred to as summarization.


    `Pipelines` are an abstraction built on top of three `huggingface` components,
    namely:


    1. `Tokenizer`

    2. `Model`

    3. `Post-processor`


    ![](images/523273_1_En_4_Chapter/523273_1_En_4_Fig1_HTML.jpg)


    The model diagram of the workflow of a hugging face pipeline depicting tokenizer,
    model, and post-processing with text, logits, input IDs, and predictions.


    **Figure 4-1** Workflow of a huggingface pipeline'
