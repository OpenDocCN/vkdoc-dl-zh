- fmt: '# 6. Fine-Tuning Pretrained Models


    So far we have seen how to use huggingface APIs that include the pretrained models
    to create simple applications. Wouldn’t it be amazing if you could start from
    scratch and train your own model using only your own data?


    Utilizing transfer learning is the most effective strategy to take if you do not
    have a large amount of spare time or computing resources at your disposal. There
    are two main advantages of utilizing transfer learning with Hugging Face as opposed
    to starting from scratch when training a model.


    As we stated in Chapter [4](#523273_1_En_4_Chapter.xhtml), models like GPT3 take
    enormous amount of infrastructural resources to train. This is beyond the capability
    of most of us. So how do we then use these models in a much more flexible way
    and not just use them by downloading the pretrained models? The answer lies in
    fine-tuning these models with the additional data we have. This would require
    very little resources and be easy to achieve as compared with training a full
    big language model from scratch.


    To transform a basic model into something that is able to generate reliable outcomes
    requires a significant investment of time and resources. Because of transfer learning,
    you can forego the laborious step of training and devote only a small amount of
    time to adapting the dataset to your specific requirements.


    In fact, pretrained models from Hugging Face are capable of excelling at tasks
    in a variety of domains even without the need for additional fine-tuning. It is
    likely that one can use these models in a zero-shot learning scenario as well,
    but if there is a specific dataset one has, then our good friend, the huggingface
    APIs, provides us the needed abstractions for fine-tuning these existing models.


    Therefore, we can basically consider transfer learning to be a kind of a shortcut
    when it comes to training. Simply by making use of pretrained language models,
    you can save tens of thousands of dollars and thousands of hours in terms of your
    computing needs. You should stick to transfer learning unless the tasks you are
    working on are extremely specific and cannot be solved using models that already
    exist.


    We can now move on to our fine-tuning guide with Hugging Face because we have
    a better understanding of the applications and advantages of transfer learning.


    The workflow for fine-tuning is shown in the following:


    - Select a pretrained model from huggingface that suits the need for your use
    case.

    - The additional custom dataset has to stick to the huggingface dataset spec,
    so we need to preprocess our data so that it conforms to the format needed.

    - Upload the dataset to Colab, S3, or any other store.

    - Use the `Trainer` API from huggingface to fine-tune the existing model.

    - Save the model locally or upload it to the huggingface repo.


    With some basic idea, let’s get started on some transfer learning with Hugging
    Face libraries.


    During the fine-tuning stages, most of the neural architecture is frozen. This
    means that we only adjust weights in the output layer. Since we have already covered
    tokenizers in an earlier chapter, we will give a brief overview about huggingface
    datasets here, which are the most important constructs for this chapter. Once
    we understand the `Datasets` API, we will proceed to using a custom dataset for
    a pretrained model through transfer learning.


    ## Datasets


    In this section we describe the basic dataset construct from huggingface and some
    of its basic functions.


    The data that you are utilizing throughout the course of any machine learning
    project is going to be of utmost significance. The real accuracy derives not only
    from the quantity but also from the quality of the data that is being used, and
    this is true regardless of the algorithm or model that you are working with.


    Accessing large datasets can be a challenging endeavor at times. The process of
    scraping, accumulating, and then cleaning up this data in the appropriate manner
    can take a significant amount of time. Hugging Face, fortunately for people interested
    in NLP as well as image and audio processing, comes with a central repository
    of datasets that are already prepared for use. In the following paragraphs, we
    will have a brief look at how you can work with this datasets module to select
    and prepare the appropriate dataset for your project.


    To install the datasets library, use the following command:


    ```

    !pip install datasets

    ```


    As we have been reading the documentation for the datasets repository, we have
    discovered that there are several primary methods. The first method is the one
    that we are able to use to investigate the list of datasets that are readily available.
    You should see options to work with close to 6800 different datasets, all of which
    are currently available:


    ```

    from datasets import list_datasets, load_dataset, list_metrics, load_metric

    # Print all the available datasets

    print(len(list_datasets()))

    ```


    Output:


    ```


    ```


    Load a dataset:


    ```

    dataset = load_dataset(''imdb'')

    ```


    Print the dataset object:


    ```

    DatasetDict({ train: Dataset({ features: [''text'', ''label''], num_rows: 25000
    }) test: Dataset({ features: [''text'', ''label''], num_rows: 25000 }) unsupervised:
    Dataset({ features: [''text'', ''label''], num_rows: 50000 }) })

    ```


    It constitutes a dictionary with train, test, and unsupervised datasets, each
    having features and `num_rows` as values. Here, examples are taken from the IMDB
    dataset, and thereby the text on which we will be doing sentiment analysis is
    also taken from IMDB.


    Let us access the train dataset:


    ```

    dataset[''train''][2]

    {''label'': 0, ''text'': "If only to avoid making this type of film in the future.
    This film is interesting as an experiment but tells no cogent story.One might
    feel virtuous for sitting thru it because it touches on so many IMPORTANT issues
    but it does so without any discernable motive. The viewer comes away with no new
    perspectives (unless one comes up with one while one''s mind wanders, as it will
    invariably do during this pointless film).One might better spend one''s time staring
    out a window at a tree growing."}

    ```


    Describe the dataset:


    ```

    dataset[''train''].description

    ```


    We get the following output:


    ```

    Large Movie Review Dataset.\nThis is a dataset for binary sentiment classification
    containing substantially more data than previous benchmark datasets. We provide
    a set of 25,000 highly polar movie reviews for training, and 25,000 for testing.
    There is additional unlabeled data for use as well.

    ```


    List features of the dataset:


    ```

    dataset[''train''].features

    ```


    We can see there are two features:


    ```

    {''label'': ClassLabel(num_classes=2, names=[''neg'', ''pos''], id=None), ''text'':
    Value(dtype=''string'', id=None)}

    ```


    It’s possible that you won’t want to deal with utilizing one of the Hugging Face
    datasets in certain circumstances. This dataset object is still capable of loading
    locally stored CSV files in addition to other types of files. If, for example,
    you want to work with a CSV file, you can easily pass this information into the
    `load_dataset` method along with the path to the CSV file on your local machine.


    ## Fine-Tuning a Pretrained Model


    Now since we understand the dataset construct, it’s time for applying some transfer
    learning on a pretrained model using our own dataset. In the following we show
    an example of how to fine-tune a pretrained model with the IMDB dataset.


    We will divide the fine-tuning aspect into two parts. The training section is
    where we will use the `Trainer` API of huggingface to fine-tune the model and
    save it. The other section is the inference part where we will load this fine-tuned
    model to achieve inferencing.'
