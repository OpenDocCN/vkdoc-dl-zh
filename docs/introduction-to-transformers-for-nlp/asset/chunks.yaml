    \ remains neutral with regard to jurisdictional claims in published maps and institutional\
    \ affiliations.\n\nThis Apress imprint is published by the registered company\
    \ APress Media, LLC, part of Springer Nature.\n\nThe registered company address\
    \ is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\n## Introduction\n\nThis\
    \ book takes the user through the journey of natural language processing starting\
    \ from n-gram models to neural network architectures like RNN before it moves\
    \ to the state-of-the-art technology today, which is known as the transformers.\
    \ The book details out the transformer architecture and mainly explains the self-attention\
    \ mechanism, which is the foundation of the transformer concept.\n\nThe book deals\
    \ with the topic of transformers in depth with examples from different NLP areas\
    \ like text generation, sentiment analysis, zero-shot learning, text summarization,\
    \ etc. The book takes a deep dive into huggingface APIs and their usage to create\
    \ simple Gradio-based applications. We will delve into details of not only using\
    \ pretrained models but also how to fine-tune the existing models with our own\
    \ datasets.\n\nWe cover models like BERT, GPT2, T5, etc., and showcase how these\
    \ models can be used directly to create a different range of applications in the\
    \ area of natural language processing and understanding.\n\nThe book doesn’t just\
    \ limit the knowledge and exploration of transformers to NLP but also covers at\
    \ a high level how transformers are being used in areas like vision.\n\n### Source\
    \ Code\n\nAll source code used in this book can be found at `github.com/apress/intro-transformers-nlp`.\n\
    \nAbout the Author About the Technical Reviewer\n\n# 1. Introduction to Language\
    \ Models\n\n> ***Language is power, life and the instrument of culture, the instrument\
    \ of domination and liberation.***\n> \n> ***—Angela Carter (English writer)***\n\
    \nOne of the biggest developments that made *Homo sapiens* different from other\
    \ animal species on this planet was the evolution of language. This allowed us\
    \ to exchange and communicate ideas and thoughts, which led to so many scientific\
    \ discoveries including the Internet. This is how important language is.\n\nSo\
    \ when we venture into the area of artificial intelligence, the progress made\
    \ there would not move much unless we made sure the machines understand and comprehend\
    \ natural language. So it’s pertinent for anyone who wants to venture into the\
    \ area of artificial intelligence, and thereby artificial general intelligence,\
    \ that they develop a good grasp of how we are progressing on teaching machines\
    \ how to understand language.\n\nThe intent of this chapter is to take you through\
    \ the evolution of the natural language processing domain by covering some of\
    \ the historical aspects of it and its evolution to the state-of-the-art neural\
    \ network–based language models of today.\n\n## History of NLP\n\nNatural language\
    \ processing is one of the fastest-developing areas of machine learning and artificial\
    \ intelligence. Its aim is to provide machines the capability to understand natural\
    \ language and provide capabilities that assist humans in achieving tasks related\
    \ to natural language. The concept of machine translation (also known as MT),\
    \ which was first developed during the Second World War, was the seed from which\
    \ it grew. The intent of NLU, or natural language understanding, is to allow machines\
    \ to comprehend natural language and accomplish tasks like translation from one\
    \ language to another, determining the sentiment of a specific text segment, or\
    \ providing a summary of, say, a paragraph.\n\nA language can be broken down into\
    \ its component parts, which can be thought of as a set of rules or symbols. Following\
    \ the integration process, these symbols are put to use for both the transmission\
    \ and the broadcasting of information. The field of natural language processing\
    \ is broken down into several subfields, the most notable of which are natural\
    \ language generation and natural language understanding. These subfields, as\
    \ their names imply, are concerned with the production of text as well as its\
    \ comprehension. Be careful not to let these relatively new words – such as phonology,\
    \ pragmatics, morphology, syntax, and semantics – throw you off.\n\nOne of the\
    \ main areas of NLP or NLU is to understand not just the statistical properties\
    \ of a particular language but also the semantics of it. With machine learning\
    \ the aim was to feed in the content in a certain language to the machine and\
    \ let the machine understand not just the statistical properties but also the\
    \ meaning and context of, say, a certain word.\n\nAn NLP engineer’s workflow would\
    \ consist of first attempting to transform the words into numbers that computers\
    \ are able to interpret and then developing machine learning architectures that\
    \ are able to use these numbers for the many tasks that are necessary. In more\
    \ specific terms, it should involve the following steps:\n\n1. Collecting Data:\
    \ The first thing to do with every project you have in mind is to collect data\
    \ that is directly connected to the project you are working on. This is essential\
    \ to the study of machine learning, which is its own area. We supply many algorithms\
    \ with vast volumes of data, some of which may have been prohibitively expensive\
    \ to obtain. In the context of NLP, this stage may entail the collection of tweets\
    \ or reviews from various ecommerce websites like Amazon or Yelp. Additionally,\
    \ this process may involve cleaning and categorizing the collected tweets or reviews.\n\
    \n2. Tokenization: This is the process of chopping up each piece of text into\
    \ manageable word chunks in order to get ready for the subsequent stage. In this\
    \ phase, you may also be asked to remove stop words, perform lemmatization, or\
    \ stem the text.\n\n3. Vectorization: In this stage, the tokens that were obtained\
    \ in the previous step known as `tokenization` are transformed into vectors that\
    \ the ML algorithms are able to process. It is clear to us at this point that\
    \ the models that we develop do not truly see the words and comprehend them in\
    \ the same manner that we humans do (or that we think we do), but rather operate\
    \ on the vector representations of these words.\n\n4. Model Creation and Evaluation:\
    \ This step entails developing ML models and architectures, such as transformers,\
    \ that are able to chew on the word vectors that are provided for the many tasks\
    \ that are required. Translation, semantic analysis, named entity identification,\
    \ and other similar activities may be included in these tasks. The NLP engineer\
    \ is responsible for performing ongoing evaluations of the models and architectures,\
    \ measuring them against previously established goals and KPIs."
