    in our code.


    ## Summary


    In this chapter we discussed the architecture of the huggingface library and its
    components like tokenizers and models. We also learned how we can use these components
    to do a simple task like analyzing the sentiments of the sentences. In the next
    chapter, we will take more examples of doing different kinds of tasks using the
    Transformers library .


    # 5. Tasks Using the Hugging Face Library


    So far we have seen how transformers can be used with the huggingface Transformers
    library at a very elementary level. We will now start to see how we can use the
    library for different tasks related to not just text but also audio and images.


    But before we move on with this, we will introduce you to Gradio, which is a library
    for building UI on top of huggingface.'
