- fmt: '### Masked LM (MLM)


    Providing BERT with a sentence and then optimizing the weights included inside
    it in order to produce the same sentence on the other side is what constitutes
    MLM. Therefore, we give BERT a sentence and ask it to produce the same sentence
    as the input. Before we really provide BERT that input sentence, we cover up a
    few tokens.


    Before being fed into BERT, word sequences have 15% of their words substituted
    with `[MASK]` tokens. This is done before the word sequences are fed into BERT.
    The model will then make an attempt to make a prediction of the possible value
    of the masked words. It uses the context provided by surrounding words, both in
    the left and right directions.


    To predict the masked sentence, we will need an additional layer on top of the
    encoder, which would help in classifying the masked sentence.


    The loss function used takes into consideration only the prediction of the masked
    values. As a direct result of this, the model converges more slowly than directed
    models do; however, the higher context awareness that it possesses makes up for
    this shortcoming.


    Figure [3-1](#523273_1_En_3_Chapter.xhtml#Fig1) shows how training a masked language
    model works. Around 15% of the input tokens are masked, and the feed-forward neural
    network then is trained to predict only these masked tokens.


    ![](images/523273_1_En_3_Chapter/523273_1_En_3_Fig1_HTML.jpg)


    The flowchart represents the structure of masked language from input, masked tokens,
    BERT, and FFN to the classes column involving 0.05 street, 0.18 market, and others.


    **Figure 3-1** Masked language model


    An example of how inference in MLM works is shown in Figure [3-2](#523273_1_En_3_Chapter.xhtml#Fig2),
    which shows how a masked language model can be used to predict the masked word.


    ![](images/523273_1_En_3_Chapter/523273_1_En_3_Fig2_HTML.jpg)


    A representation of the inference in masked language model work, it depicts the
    use of the masked language model to predict the masked word, with the model checkpoint.


    **Figure 3-2** Masked language model usage for token prediction


    This is a screenshot from using the huggingface library, which we will cover in
    the next chapter.


    ### Next Sentence Prediction


    The Next Sentence Prediction (NSP) protocol entails providing BERT with two sentences,
    designated as sentence A and sentence B. Then, we inquire of BERT, “Hey, does
    sentence B come after sentence A?” – and depending on the situation, BERT will
    either say `IsNextSentence` or `NotNextSentence`.


    Let us consider three sentences in our dataset:


    1.  John went to the restaurant.

    2.  The kite is flying high in the sky.

    3.  John ordered a pizza.


    Now when we look at these three sentences, we can easily make out that sentence
    2 does not follow sentence 1 and, on the contrary, sentence 3 follows sentence
    1. This mode of reasoning, which involves dependencies between phrases that span
    extended time periods, is taught to BERT via NSP.


    For training with NSP in mind, the BERT architecture takes positive pairs and
    negative pairs as inputs.


    The positive pair constitutes sentences that are related to each other, whereas
    the negative pair constitutes sentences not related each other in the sequence.
    These negative and positive samples constitute 50% each in the dataset.


    Before the input is added to the model, it is processed in the following manner
    so that it can better assist the model in differentiating between the two sentences
    used in training:


    1.  At the beginning of the very first sentence, a `[CLS]` token is inserted,
    and at the very end of each sentence, a `[SEP]` token is placed.

    2.  Each token now has a sentence embedding that indicates whether it belongs
    to sentence A or sentence B. Token embeddings and sentence embeddings are conceptually
    comparable representations of a vocabulary size of 2.

    3.  Each token receives an additional embedding called a positional embedding
    so that its position in the sequence may be determined. This is explained in Chapter
    [2](#523273_1_En_2_Chapter.xhtml), in the section “Positional Encoding.”


    ### Inference in NSP


    To demonstrate inference via NSP, we take the three sentences:


    1.  John went to the restaurant.

    2.  The kite is flying high in the sky.

    3.  John ordered a pizza.


    Calculate the probability of whether sentence 2 follows sentence 1 and the probability
    of sentence 3 following sentence 1.


    We will again use the huggingface library (which we will cover in the next chapter)
    to calculate the individual probabilities.


    See sample code to be used in Google Colab. (Don’t worry about code as of now
    as there will be plenty of examples in Chapter [5](#523273_1_En_5_Chapter.xhtml).)


    ```

    from torch.nn.functional import softmax

    from transformers import BertForNextSentencePrediction, BertTokenizer

    mdl = BertForNextSentencePrediction.from_pretrained(''bert-base-cased'')

    brt_tkn = BertTokenizer.from_pretrained(''bert-base-cased'')

    sentenceA = ''John went to the restaurant''

    sentenceB = ''The kite is flying high in the sky''

    encoded = brt_tkn.encode_plus(sentenceA, text_pair=sentenceB, return_tensors=''pt'')

    sentence_relationship_logits = mdl(**encoded)[0]

    probablities = softmax(sentence_relationship_logits, dim=1)

    print(probablities)

    ```


    **Listing 3-1** BERT for sentence prediction


    We get output as:


    ```

    tensor([[0.0926, 0.9074]], grad_fn=<SoftmaxBackward0>)

    ```


    This shows that there is a very low probability that sentence 2 follows sentence
    1.


    Now we run the same inference for sentence 1 and sentence 3:


    ```

    sentenceA = ''John went to the restaurant''

    sentenceB = ''John ordered a pizza''

    ```


    We get output as:


    ```

    tensor([[9.9998e-01, 2.2391e-05]], grad_fn=<SoftmaxBackward0>)

    ```


    This shows that there is a high probability of sentence 3 following sentence 1.


    ## BERT Pretrained Models


    BERT is based on the transformer architecture and uses the encoder mechanism primarily.
    It has many variations including the following.


    `BERT-Base` has a smaller size for its transformer blocks and its hidden layers
    than OpenAI GPT does, but it has the same overall model size (12 transformer blocks,
    12 attention heads, and a size of 768 for the hidden layer).


    `BERT-Large` is an enormous network that accomplishes state-of-the-art results
    on NLP tasks. It has twice as many attention layers as `BERT-Base` (24 transformer
    blocks, 16 attention heads, and a size of 1024 for the hidden layer).


    The pretrained BERT models are available at huggingface and can be used directly
    for the fine-tuning of downstream tasks.


    A few of the pretrained BERT models available on huggingface are shown in Figure
    [3-3](#523273_1_En_3_Chapter.xhtml#Fig3).


    ![](images/523273_1_En_3_Chapter/523273_1_En_3_Fig3_HTML.png)


    A representation of the bert models involving `bert-base-uncased`, `bert-large-uncased`,
    `bert-base-cased`, `bert-large-cased`, `bert-base-multilingual-uncased`, etc.


    **Figure 3-3** Bert models from huggingface


    ## BERT Input Representations


    *   Always consider the first token in a sequence to be a special classification
    token (also abbreviated `CLS`). For the purposes of the classification task, the
    final hidden state that corresponds to this token will be used.

    *   The `[SEP]` token serves to demarcate the break between the two sentences.

    *   Whenever a sentence pair is being processed, an additional segment embedding
    is going to be added. This embedding will indicate whether the token belongs to
    sentence A or sentence B.

    *   The input representation of a given token is constructed by adding positional
    embedding to the representation of the token.'
