    ### 截断


    模型有时可能无法处理过长的序列。在这种情况下，你需要将序列压缩到更易于管理的长度。


    如果你想截断序列，使其达到模型能接受的最大长度，可以将 `truncation` 参数设置为 `true`，如代码清单 4-6 所示。


