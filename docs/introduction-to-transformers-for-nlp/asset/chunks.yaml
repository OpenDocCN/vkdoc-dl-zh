    我们可以看到有两个特征：


    ```

    {''label'': ClassLabel(num_classes=2, names=[''neg'', ''pos''], id=None), ''text'':
    Value(dtype=''string'', id=None)}

    ```


    在某些情况下，你可能不想使用 Hugging Face 的数据集。这个数据集对象仍然能够加载本地存储的 CSV 文件以及其他类型的文件。例如，如果你想处理一个
    CSV 文件，你可以轻松地将此信息连同本地机器上 CSV 文件的路径一起传递给 `load_dataset` 方法。


