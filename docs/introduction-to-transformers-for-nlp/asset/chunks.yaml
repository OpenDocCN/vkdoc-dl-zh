    流程中的下一个阶段是模型。


    ### AutoModel


    我们将了解 `AutoModel` 如何在加载预训练模型方面简化我们的工作。


    Transformers 库使得加载预训练实例的过程变得简单且统一。这意味着你可以像加载 `AutoTokenizer` 一样加载 `AutoModel`。唯一的区别在于需要为当前任务选择合适的
    `AutoModel`。


    以文本分类为例，加载模型的方式如下所示。


    我们将遵循以下步骤：


    1.  根据检查点的名称创建分词器和模型的实例。该模型被确定为 BERT 模型，然后将检查点中保存的权重加载到其中。

    2.  获取令牌并将其传递给模型。

    3.  模型返回 logits。

    4.  应用 softmax 来计算句子被分类的类别的概率（对于下面的示例，是负面或正面）。


    代码清单 4-7 分为多个部分，其中代码清单 4-7-1 解释了如何通过 Transformers 库加载分词器。


    ```python

    from transformers import AutoTokenizer

    tokenizer = AutoTokenizer.from_pretrained("siebert/sentiment-roberta-large-english")

    sentences=["This is my first stab at AutoTokenizer","life is what happens when
    you are planning other things. so plan life accordingly","this is not tasty at
    all"]

    encoding = tokenizer(sentences,padding=True,truncation=True,return_tensors="pt")

    print(encoding)

