    可以看出，分词器在句子中插入了两个特殊词元。这些词元被称为`CLS`和`SEP`，分别代表分类器和分隔符。只要相关模型确实需要，分词器会自动为你添加任何必要的特殊词元。


    让我们向这个分词器传递多个句子，如代码清单 4-4 所示。


