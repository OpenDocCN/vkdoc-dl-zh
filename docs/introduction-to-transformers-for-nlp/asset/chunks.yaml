- fmt: '### Multi-headed Attention


    The encoder makes use of a particular attention process known as self-attention
    in its multi-headed attention system. A multi-headed attention is nothing but
    multiple modules of self-attention capturing different kinds of attentions. As
    specified earlier in the chapter, self-attention allows us to associate each word
    in the input with other words in the same sentence.


    Let’s go a bit deeper into the self-attention layer.


    Take this sentence for example:


    > *“Sam had been working whole day so he decided to take some rest”*


    In the preceding sentence, as humans when the word *he* is uttered, we automatically
    connect it to *Sam*. This simply implies that when we refer to the word *he*,
    we need to attend to the word *Sam*. The mechanism of self-attention allows us
    to provide a reference to *Sam* when *he* is uttered in this sentence. As the
    model gets trained, it looks at each individual word in the input sequence and
    tries to look at words it must attend to in order to provide a better embedding
    for the word. In essence it captures the context better by using the attention
    mechanism.


    One can see in Figure [2-7](#523273_1_En_2_Chapter.xhtml#Fig7) that the word *he*
    pays attention to the word *Sam*. By using the self-attention technique, the context
    gets captured in a much better way.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig7_HTML.jpg)


    A represents the word he pays attention to the word Sam by using a self-attention
    technique with layer 0, head 0 involving words like Sam, had, whole, take, etc.


    **Figure 2-7** – Attention mechanism at work


    Next, we take a look into how query, key, and value vectors work.


    ### Query, Key, and Value Vectors


    The concept of self-attention is based on three vector representations:


    1.  Query

    2.  Key

    3.  Value


    The query, key, and value concept emerged from information retrieval systems.
    As an example when we search in Google or for that matter any search engine, we
    provide a **query** as input. The search engine then finds specific **keys** in
    its database or repository that match the query and finally will return the best
    **values** back to us as a result.


    Figure [2-8](#523273_1_En_2_Chapter.xhtml#Fig8) shows how the query, key, and
    value mechanism works to capture context information about a word representation.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig8_HTML.jpg)


    The picture represents the context information by the column of input, working,
    whole, and day involving embedding, query, key, value, score, scaling, softmax,
    and sum.


    **Figure 2-8** – Query, key, and value mechanism at work


    ### Self-Attention


    As explained in Figure [2-8](#523273_1_En_2_Chapter.xhtml#Fig8), once we have
    the input vector prepared, we pass it to a self-attention layer, which actually
    captures the context of the word in its representation by using an attention mechanism.


    Figure [2-9](#523273_1_En_2_Chapter.xhtml#Fig9) shows how the self-attention mechanism
    works to create context vectors.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig9_HTML.jpg)


    A representation of the context vectors by the column of the tokenize and the
    vectorize and row of working from t 1 to v 1, whole from t 2 to v 2, and day from
    t 3 to v 3.


    **Figure 2-9** – Self-attention mechanism


    For a simple implementation of attention at a high level, we take individual word
    vectors obtained from the preceding step, and for each word vector:


    1.  We do a dot product with self and other vectors.

    2.  We get a score, say, `S11`, `S12`, `S13` – in this case we have three words
    in a sentence and we want to capture embedding for `V1`.

    3.  This score is then treated as weight and multiplied by `V1`, `V2`, and `V3`.

    4.  Normalize the score.

    5.  The sum of the vectors obtained in step 3 is done.


    The intuition of the preceding steps is to capture the closeness of words in vector
    space to each other and then assign weights based on that closeness. Then the
    neighbor vectors are weighted according to the weight they exercise and added
    together to give a representation of a word, which takes into account the closeness
    of words in its neighborhood.


    Though this mechanism is simple, there is no learning of weights happening in
    this. And this is where the mechanism of query and key matrices comes into the
    picture. The weights in these matrices are what are learned by the network. Each
    individual word vector does a dot product with the query and key matrix to give
    a query and key vector.


    Following the execution of a linear layer on the query, the key, and the value
    vector, the production of a score matrix is accomplished by performing a dot product
    matrix multiplication on the queries and the keys.


    The score matrix is used to calculate the relative weight that each word should
    have in relation to the other words. As a result, every word will be assigned
    a score, keeping the surrounding contextual words. The higher the score for a
    specific word, the more it is attended to. This is the process that is used to
    map the queries onto the keys.


    After that, the scores are lowered by having their total divided by the square
    root of the dimension that contains both the query and the key. This is done in
    order to make it possible to build gradients that are more stable, as multiplying
    values can have explosive effects.


    After that, you must take the softmax of the scaled score in order to obtain the
    attention weights, which will provide you with probability values ranging from
    0 to 1. When you perform a softmax, the better results are amplified, while the
    lower levels see a downward adjustment. Because of this, the model is able to
    have a greater sense of confidence regarding the terms to which they should pay
    attention.


    ### Multiply the Softmax Output with the Value Vector


    After that, you get an output vector by taking the attention weights and multiplying
    them by your value vector. The higher the softmax scores, the more vital it will
    be to preserve the values of the words that the model learns. The words with lower
    scores will be drowned out by those with higher scores. The output of it is then
    processed by a linear layer after it has been fed into it.


    Figure [2-10](#523273_1_En_2_Chapter.xhtml#Fig10) shows the mechanism of multiplication
    of attention weights with the value vectors to get the output.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig10_HTML.jpg)


    A representation of the mechanism of the attention weights grid multiplied by
    the value vectors equal to the output which is processed by the linear layer.


    **Figure 2-10** – Multiply attention weights by the value vectors


    ### Computing Multi-headed Attention


    Before applying self-attention, you must first divide the query, the key, and
    the value into `N` vectors so that you may do a multi-headed attention computation
    with this data. After that, each of the split vectors goes through its own particular
    process of self-attention. The term “head” refers to each individual process of
    self-attention. Before passing through the last linear layer, the output vectors
    that are generated by each head are combined into a single vector by means of
    concatenation. In principle, each head would learn something unique, which would
    result in the encoder model having a greater capacity for representation.


    Multi-headed attention is just self-attention applied multiple times in different
    ways. The goal is to capture the different contextual representations via these
    different heads. By using multi-headed attention, the representations we get for
    a specific word are very rich.'
