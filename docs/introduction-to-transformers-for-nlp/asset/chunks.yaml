  raw: 'In conclusion, I would like to present the T5 model that Google offers (Figure
    [1-2](#523273_1_En_1_Chapter.xhtml#Fig2)). In the past, language models were utilized
    for conventional natural language processing tasks, such as part-of-speech (POS)
    tagging or machine translation, albeit with a few tweaks here and there. Because
    of its abstract capability to understand the fundamental structure of natural
    language, BERT, for instance, may be retrained to function as a POS tagger with
    only a little bit of additional instruction.


    ![](images/523273_1_En_1_Chapter/523273_1_En_1_Fig2_HTML.png)


    An illustration represents a language model which is representing a Google T5
    model which is a text-to-text model this model is translating English to German.


    Figure 1-2


    Google’s T5 model , which is a text-to-text model


    Figure [1-2](#523273_1_En_1_Chapter.xhtml#Fig2) shows a representation of the
    T5 language model .


    When using T5 , there is no requirement for any sort of modification in order
    to complete NLP jobs. If it receives a text that contains certain M tokens, it
    recognizes that these tokens represent blanks that need to be filled in with the
    proper words. It is also capable of providing answers. If it is provided with
    some context after the questions , it will seek that context for the answer; otherwise,
    it will answer based on the information it already possesses. It is an interesting
    fact that its designers have been bested by it in a trivia contest. Additional
    examples of possible applications can be seen in the image (Figure [1-2](#523273_1_En_1_Chapter.xhtml#Fig2))
    on the left.


    ## Summary


    In my opinion, NLP is the area in which we are the most likely to succeed in developing
    artificial intelligence . There is a great deal of excitement about this term,
    and many straightforward decision-making systems, as well as virtually every neural
    network, are referred to as AI; however, this is primarily marketing. The Oxford
    Dictionary of English, as well as just about any other dictionary, defines *artificial
    intelligence* as the performance of intelligence-related tasks by a machine that
    are analogous to those performed by humans. One of the key aspects for AI is generalization,
    which is the ability of a single model to do many tasks. The fact that the same
    model can perform a wide variety of NLP tasks and can infer what to do based on
    the input is astounding in and of itself, and it gets us one step closer to genuinely
    developing artificial intelligence systems that are comparable to human intellect.


    # 2. Introduction to Transformers


    Around December 2017, a seminal paper titled “Attention Is All You Need” was published.
    This paper revolutionized the way the NLP domain would look like in the times
    to come. Transformers and what is known as a sequence-to-sequence architecture
    are described in this paper.


    A sequence-to-sequence (or Seq2Seq) neural network is a neural network that converts
    one sequence of components into another, such as the words in a phrase. (Considering
    the name, this should come as no surprise.)


    Seq2Seq models excel at translation, which involves transforming a sequence of
    words from one language into a sequence of other words in another. Long Short-Term
    Memory (LSTM)–based neural network architectures are deemed best for the sequence-to-sequence
    kind of requirements. The LSTM model has a concept of forget gates via which it
    can also forget information, which it doesn’t need to remember.


    ## What Is a Seq2Seq Neural Network?


    A Seq2Seq model is one that begins with a sequence of objects (such as words,
    letters, or time series) and produces still another sequence of items as its output.
    When it comes to neural machine translation, we need to provide an input sentence
    in a specific language, and output should be the translated text in another language.


    As shown in Figure [2-1](#523273_1_En_2_Chapter.xhtml#Fig1) , the neural network
    based on the Seq2Seq architecture takes the word *learn* as input and outputs
    the French translation of the word.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig1_HTML.png)


    A representation of neural network form of seq to seq architecture which takes
    up the input and output for the translation in french of the word learn.


    Figure 2-1


    Function of a Seq2Seq network


    The encoder and decoder are the two components that make up the model as shown
    in Figure [2-2](#523273_1_En_2_Chapter.xhtml#Fig2). The input sequence’s context
    is saved by the encoder in the form of a vector, which it then transmits to the
    decoder so that the decoder may construct the output sequence based on the information
    it contains.


    The architecture of encoders and decoders was mainly manifested by RNNs, LSTMs,
    or GRUs for sequence-to-sequence tasks.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig2_HTML.png)


    A representation of the sequence-to-sequence order network for the decoder and
    the encoder which explains the architecture of the translation mask.


    Figure 2-2


    Encoder-decoder usage in Seq2Seq networks


    Figure [2-2](#523273_1_En_2_Chapter.xhtml#Fig2) explains how the encoder and decoder
    fit into the Seq2Seq architecture for a translation task.


    We won’t go into details of the Seq2Seq architecture since the book is mostly
    about transformers. But to understand the essence of Seq2Seq models, they take
    a sequence as input and transform it into another sequence.


    ## The Transformer


    As was discussed in the beginning of this chapter, there was this great paper
    called “Attention Is All You Need” in which a new neural architecture called the
    transformer was proposed. The main highlight of this work was a mechanism called
    self-attention . One of the idea transformer architecture was to move away from
    sequential processing where we provided input to the network one at a time. For
    example, in the case of a sentence, the RNN or LSTM will take one word input at
    a time from the sentence. This would mean the processing will only be sequential.
    Transformers intended to change this design by providing the whole sequence as
    input at one shot to the network and allowing the network to learn one whole sentence
    at once. This would allow parallel processing to happen and also allow distributing
    the learnings to other cores or GPUs in parallel.


    The transformer architecture ’s main point was to only use self-attention for
    capturing the dependencies between the words in a sequence and not depend on any
    of the RNN- or LSTM-based approaches.


    ### Transformers


    A high-level architecture of the transformer is shown in the following. It constitutes
    two major parts:


    1.  Encoder


    2.  Decoder


    Figure [2-3](#523273_1_En_2_Chapter.xhtml#Fig3) shows the transformer architecture
    with both encoder and decoder blocks.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig3_HTML.png)


    The flowchart represents the inputs and outputs from input embedding and output
    embedding to output probabilities flowing through positional encoding and N x.


    Figure 2-3


    High-level transformer architecture (taken from Vaswani’s “Attention Is All You
    Need” paper)


    #### Encoder


    Let us take a look at the individual layers of the encoder in detail.'
  trans: "\n# 总结\n\n最后，我想介绍一下谷歌提供的 `T5` 模型（图 1-2）。过去，语言模型主要用于传统的自然语言处理任务，例如词性（`POS`）标注或机器翻译，尽管需要做一些微调。由于其理解自然语言基本结构的抽象能力，例如，`BERT`\
    \ 只需少量额外指令就可以被重新训练为 `POS` 标注器。\n\n![](img/523273_1_En_1_Fig2_HTML.png)\n\n这幅图展示了一个语言模型，它代表谷歌的\
    \ `T5` 模型，这是一个文本到文本的模型；该模型正在将英语翻译成德语。\n\n**图 1-2**  \n谷歌的 `T5` 模型，一个文本到文本的模型\n\
    \n图 1-2 展示了 `T5` 语言模型的一个表示。\n\n使用 `T5` 时，无需任何修改即可完成 `NLP` 任务。如果它接收到包含某些 `M` 标记的文本，它会识别出这些标记代表需要填入正确单词的空白。它也能够提供答案。如果在问题之后提供了一些上下文，它会从该上下文中寻找答案；否则，它会根据自身已有的信息来回答。有趣的是，它的设计者在一个问答竞赛中被它击败了。其他可能应用的例子可以在左侧的图片（图\
    \ 1-2）中看到。\n\n## 总结\n\n在我看来，`NLP` 是我们最有可能成功开发人工智能的领域。这个术语令人兴奋，许多简单的决策系统以及几乎所有的神经网络都被称为\
    \ `AI`；然而，这主要是营销手段。《牛津英语词典》以及几乎所有其他词典都将*人工智能*定义为机器执行与人类类似的、与智能相关的任务。`AI` 的一个关键方面是泛化能力，即单个模型执行多项任务的能力。同一个模型可以执行各种各样的\
    \ `NLP` 任务，并能根据输入推断出该做什么，这一事实本身就令人震惊，它让我们离真正开发出与人类智力相当的人工智能系统又近了一步。\n\n# 2. Transformer\
    \ 简介\n\n大约在 2017 年 12 月，一篇题为“注意力就是一切”的开创性论文发表了。这篇论文彻底改变了 `NLP` 领域未来的面貌。该论文描述了\
    \ Transformer 以及所谓的序列到序列架构。\n\n序列到序列（或 `Seq2Seq`）神经网络是一种将一个序列的组件转换为另一个序列的神经网络，例如将短语中的单词进行转换。（考虑到这个名称，这应该不足为奇。）\n\
    \n`Seq2Seq` 模型擅长翻译，这涉及将一种语言的单词序列转换为另一种语言的单词序列。基于长短期记忆（`LSTM`）的神经网络架构被认为最适合序列到序列这类需求。`LSTM`\
    \ 模型具有遗忘门的概念，通过它，模型可以遗忘不需要记住的信息。\n\n## 什么是 Seq2Seq 神经网络？\n\n`Seq2Seq` 模型从一个对象序列（例如单词、字母或时间序列）开始，并生成另一个项目序列作为其输出。在神经机器翻译中，我们需要提供特定语言的输入句子，输出应该是另一种语言的翻译文本。\n\
    \n如图 2-1 所示，基于 `Seq2Seq` 架构的神经网络接收单词 *learn* 作为输入，并输出该单词的法语翻译。\n\n![](img/523273_1_En_2_Fig1_HTML.png)\n\
    \n`Seq2Seq` 架构的神经网络形式表示，它接收单词 *learn* 的输入并输出其法语翻译。\n\n**图 2-1**  \n`Seq2Seq` 网络的功能\n\
    \n如图 2-2 所示，编码器和解码器是构成该模型的两个组成部分。编码器以向量的形式保存输入序列的上下文，然后将其传递给解码器，以便解码器可以根据其中包含的信息构建输出序列。\n\
    \n编码器和解码器的架构主要通过 `RNN`、`LSTM` 或 `GRU` 来实现序列到序列的任务。\n\n![](img/523273_1_En_2_Fig2_HTML.png)\n\
    \n解码器和编码器的序列到序列顺序网络表示，解释了翻译掩码的架构。\n\n**图 2-2**  \n`Seq2Seq` 网络中的编码器-解码器使用\n\n\
    图 2-2 解释了编码器和解码器如何融入翻译任务的 `Seq2Seq` 架构。\n\n我们不会深入探讨 `Seq2Seq` 架构的细节，因为本书主要关注 Transformer。但要理解\
    \ `Seq2Seq` 模型的本质，它们接收一个序列作为输入，并将其转换为另一个序列。\n\n## Transformer\n\n正如本章开头所讨论的，有一篇名为“注意力就是一切”的伟大论文，其中提出了一种名为\
    \ Transformer 的新型神经架构。这项工作的主要亮点是一种称为自注意力的机制。Transformer 架构的理念之一是摆脱顺序处理，即一次只向网络提供一个输入。例如，对于一个句子，`RNN`\
    \ 或 `LSTM` 会一次从句子中接收一个单词输入。这意味着处理只能是顺序的。Transformer 旨在通过一次性将整个序列作为输入提供给网络，并允许网络一次学习整个句子来改变这种设计。这将允许进行并行处理，并允许将学习内容并行分发到其他核心或\
    \ `GPU`。\n\nTransformer 架构的要点是仅使用自注意力来捕获序列中单词之间的依赖关系，而不依赖于任何基于 `RNN` 或 `LSTM`\
    \ 的方法。\n\n### Transformer\n\nTransformer 的高级架构如下所示。它包含两个主要部分：\n\n1.  编码器\n2. \
    \ 解码器\n\n图 2-3 展示了包含编码器和解码器模块的 Transformer 架构。\n\n![](img/523273_1_En_2_Fig3_HTML.png)\n\
    \n流程图展示了从输入嵌入和输出嵌入到输出概率的输入和输出，这些概率流经位置编码和 `N x`。\n\n**图 2-3**  \n高级 Transformer\
    \ 架构（取自 Vaswani 的“注意力就是一切”论文）\n\n#### 编码器\n\n让我们详细看看编码器的各个层。\n"
- fmt: '### Input Embeddings


    The first thing that has to be done is to feed input into a layer that does word
    embedding. One way to think of a word embedding layer is as a lookup table, which
    allows for the acquisition of a learned vector representation of each word. The
    learning process in neural networks is based on numbers, which means that each
    word is associated with a vector that has continuous values to represent that
    word.


    Before applying self-attention, we need to tokenize the words of a sentence into
    individual tokens.


    #### Tokenize


    Figure [2-4](#523273_1_En_2_Chapter.xhtml#Fig4) shows a tokenization process for
    a sentence where each word of the sentence is tokenized.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig4_HTML.jpg)


    A representation of the tokenization process for a sentence where each word of
    the sentence is tokenized with a column of working to `T1`, whole to `T2`, and
    day to `T3`.


    **Figure 2-4** Word tokenization in a sentence


    #### Vectorize


    Post tokenization we vectorize the tokens obtained previously by using, say, `word2vec`
    or `GloVe` encoding. Now each word would be represented as a vector as shown in
    Figure [2-5](#523273_1_En_2_Chapter.xhtml#Fig5).


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig5_HTML.jpg)


    A representation of the column of the tokenize and the vectorize which involves
    the row of Working from `T1` to `V1`, Whole from `T2` to `V2`, and Day from `T3`
    to `V3`.


    **Figure 2-5** Vectorize each token individually to create a mathematical representation
    of the word


    #### Positional Encoding


    It’s an encoding based on the position of a specific word, say, in a sentence.


    This encoding is based on which position the text is within a sequence. We need
    to provide some information about the positions in the input embeddings because
    the transformer encoder does not have recurrence as recurrent neural networks
    do. Positional encoding is what is used to accomplish this goal. The authors conceived
    of a cunning strategy that makes use of the sine and cosine functions.


    The mathematical representation for positional encoding is shown in Equation 2-1:


    ![ $$ {\displaystyle \begin{array}{l}{PE}_{\left( pos,2i\right)}=\mathit{\sin}\left(
    pos/{10000}^{2i/{d}_{model}}\right)\\ {}{PE}_{\left( pos,2i+1\right)}=\mathit{\cos}\left(
    pos/{10000}^{2i/{d}_{model}}\right)\end{array}} $$ ](images/523273_1_En_2_Chapter/523273_1_En_2_Chapter_TeX_Equa.png)


    **(Equation 2-1)**


    This equation calculates the positional embeddings of each word so that each word
    has a positional component alongside the semantic component.


    The mathematical specifics of positional encoding are outside the scope of this
    discussion; however, the fundamentals are as follows.


    As demonstrated in Equation 2-1, we pass the word at the odd index via the cosine
    function and at the even index via the sine function. The output of each word
    would be a vector that represents the positional encoding of the specific word.
    We explain this in the following via an example.


    ##### Example of Positional Encoding


    Take a sequence, say, “Sam loves to walk.”


    Here, first we define the values of some parameters:


    - `N`: 10000.

    - `K`: Position of a word in a sentence starting from 0.

    - `D`: Dimension of a sentence. In our case it’s 4.

    - `I`: Used for mapping to column index.


    Now we calculate the values of the sine and cosine components.


    **Sam**


    | `sin(0/10000^((0/4)))=0` | `cos(0/10000^((0/4)))=1` | `sin(0/10000^((2/4)))=0`
    | `cos(0/10000^((2/4)))=1` |

    |--------------------------|--------------------------|--------------------------|--------------------------|


    **Likes**


    | `sin(1/10000^((0/4)))=0.8414` | `cos(1/10000^((0/4)))=0.5403` | `sin(1/10000^((2/4)))=0.0099`
    | `cos(1/10000^((2/4)))=0.999` |

    |-------------------------------|-------------------------------|-------------------------------|------------------------------|


    **To**


    | `sin(2/10000^((0/4)))=0.909` | `cos(2/10000^((0/4)))=-0.416` | `sin(2/10000^((2/4)))=0.0199`
    | `cos(2/10000^((2/4)))=0.9998` |

    |-------------------------------|--------------------------------|-------------------------------|-------------------------------|


    **Walk**


    | `sin(3/10000^((0/4)))=0.1411` | `cos(3/10000^((0/4)))=-0.989` | `sin(3/10000^((2/4)))=0.0299`
    | `cos(3/10000^((2/4)))=0.9995` |

    |--------------------------------|--------------------------------|-------------------------------|-------------------------------|


    We can see how each word from the sentence “Sam likes to walk” has got a word
    embedding vector to represent the position of the word in the sentence.


    After that, add those vectors to the input embeddings that correspond to those
    vectors. The intuition behind adding the positional embeddings to the input embeddings
    is to give each word a small shift in vector space toward the position the word
    occurs in. So if we think a bit more about it, we can see this leads to semantically
    similar words that occur in near positions to be represented close by in vector
    space. Because of this, the network is provided with accurate information regarding
    the location of each vector. Because of their linear characteristics and the ease
    with which the model may learn to pay attention to them, the sine and cosine functions
    were selected together.


    At this point, we have reached the encoder layer, as also shown in Figure [2-6](#523273_1_En_2_Chapter.xhtml#Fig6).
    The objective of the encoder layer is to convert all the input sequences into
    a representation that captures the context in a way that it also gives more attention
    to words that are more important to it in a specific context. It begins with a
    multi-headed attention sub-module and then moves on to a fully connected network
    sub-module. Finally, this is followed by a layer of normalization.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig6_HTML.jpg)


    A flowchart of encoder components from positional embedding, multi-head attention,
    add and norm, feed-forward, add and norm to input representations.


    **Figure 2-6** Encoder component of the transformer'
  raw: '##### Input Embeddings


    The first thing that has to be done is to feed input into a layer that does word
    embedding. One way to think of a word embedding layer is as a lookup table, which
    allows for the acquisition of a learned vector representation of each word. The
    learning process in neural networks is based on numbers, which means that each
    word is associated with a vector that has continuous values to represent that
    word.


    Before applying self-attention, we need to tokenize the words of a sentence into
    individual tokens.


    **Tokenize**


    Figure [2-4](#523273_1_En_2_Chapter.xhtml#Fig4) shows a tokenization process for
    a sentence where each word of the sentence is tokenized.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig4_HTML.jpg)


    A representation of the tokenization process for a sentence where each word of
    the sentence is tokenized with a column of working to T 1, whole to T 2, and day
    to T 3.


    Figure 2-4


    Word tokenization in a sentence


    **Vectorize**


    Post tokenization we vectorize the tokens obtained previously by using, say, word2vec
    or GloVe encoding. Now each word would be represented as a vector as shown in
    Figure [2-5](#523273_1_En_2_Chapter.xhtml#Fig5).


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig5_HTML.jpg)


    A representation of the column of the tokenize and the vectorize which involves
    the row of Working from T 1 to V 1, Whole from T 2 to V 2, and Day from T 3 to
    V 3.


    Figure 2-5


    Vectorize each token individually to create a mathematical representation of the
    word


    **Positional Encoding**


    It’s an encoding based on the position of a specific word, say, in a sentence.


    This encoding is based on which position the text is within a sequence. We need
    to provide some information about the positions in the input embeddings because
    the transformer encoder does not have recurrence as recurrent neural networks
    do. Positional encoding is what is used to accomplish this goal. The authors conceived
    of a cunning strategy that makes use of the sine and cosine functions.


    The mathematical representation for positional encoding is shown in Equation 2-1:


    ![ $$ {\displaystyle \begin{array}{l}{PE}_{\left( pos,2i\right)}=\mathit{\sin}\left(
    pos/{10000}^{2i/{d}_{model}}\right)\\ {}{PE}_{\left( pos,2i+1\right)}=\mathit{\cos}\left(
    pos/{10000}^{2i/{d}_{model}}\right)\end{array}} $$ ](images/523273_1_En_2_Chapter/523273_1_En_2_Chapter_TeX_Equa.png)


    (Equation 2-1)


    This equation calculates the positional embeddings of each word so that each word
    has a positional component alongside the semantic component.


    The mathematical specifics of positional encoding are outside the scope of this
    discussion; however, the fundamentals are as follows.


    As demonstrated in Equation 2-1, we pass the word at the odd index via the cosine
    function and at the even index via the sine function. The output of each word
    would be a vector that represents the positional encoding of the specific word.
    We explain this in the following via an example.


    **Example of Positional Encoding**


    Take a sequence, say, “Sam loves to walk.”


    Here, first we define the values of some parameters:


    N: 10000.


    K: Position of a word in a sentence starting from 0.


    D: Dimension of a sentence. In our case it’s 4.


    I: Used for mapping to column index.


    Now we calculate the values of the sine and cosine components.


    Sam


    | sin(0/10000^((0/4)))=0 | cos(0/10000^((0/4)))=1 | sin(0/10000^((2/4)))=0 | cos(0/10000^((2/4)))=1
    |


    Likes


    | sin(1/10000^((0/4)))=0.8414 | cos(1/10000^((0/4)))=0.5403 | sin(1/10000^((2/4)))=0.0099
    | cos(1/10000^((2/4)))=0.999 |


    To


    | sin(2/10000^((0/4)))=0.909 | cos(2/10000^((0/4)))=-0.416 | sin(2/10000^((2/4)))=0.0199
    | cos(2/10000^((2/4)))=0.9998 |


    Walk


    | sin(3/10000^((0/4)))=0.1411 | cos(3/10000^((0/4)))=-0.989 | sin(3/10000^((2/4)))=0.0299
    | cos(3/10000^((2/4)))=0.9995 |


    We can see how each word from the sentence “Sam likes to walk” has got a word
    embedding vector to represent the position of the word in the sentence.


    After that, add those vectors to the input embeddings that correspond to those
    vectors . The intuition behind adding the positional embeddings to the input embeddings
    is to give each word a small shift in vector space toward the position the word
    occurs in. So if we think a bit more about it, we can see this leads to semantically
    similar words that occur in near positions to be represented close by in vector
    space. Because of this, the network is provided with accurate information regarding
    the location of each vector. Because of their linear characteristics and the ease
    with which the model may learn to pay attention to them, the sine and cosine functions
    were selected together.


    At this point, we have reached the encoder layer, as also shown in Figure [2-6](#523273_1_En_2_Chapter.xhtml#Fig6).
    The objective of the encoder layer is to convert all the input sequences into
    a representation that captures the context in a way that it also gives more attention
    to words that are more important to it in a specific context. It begins with a
    multi-headed attention sub-module and then moves on to a fully connected network
    sub-module. Finally, this is followed by a layer of normalization.


    ![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig6_HTML.jpg)


    A flowchart of encoder components from positional embedding, multi-head attention,
    add and norm, feed-forward, add and norm to input representations.


    Figure 2-6


    Encoder component of the transformer'
  trans: '

    ### 输入嵌入


    首先要做的是将输入馈送到执行词嵌入的层。可以将词嵌入层理解为一种查找表，它能够获取每个单词的学习向量表示。神经网络中的学习过程基于数字，这意味着每个单词都与一个包含连续值的向量相关联，用以表示该单词。


    在应用自注意力机制之前，我们需要将句子中的单词分词为独立的词元。


    #### 分词


    图 2-4 展示了一个句子的分词过程，其中句子中的每个单词都被分词。


    ![](img/523273_1_En_2_Fig4_HTML.jpg)


    一个句子的分词过程表示，其中句子中的每个单词都被分词，Working 对应 `T1`，Whole 对应 `T2`，Day 对应 `T3`。


    **图 2-4** 句子中的单词分词


    #### 向量化


    分词之后，我们使用例如 `word2vec` 或 `GloVe` 编码对之前获得的词元进行向量化。现在，每个单词都将表示为一个向量，如图 2-5 所示。


    ![](img/523273_1_En_2_Fig5_HTML.jpg)


    分词和向量化的列表示，其中包含从 `T1` 到 `V1` 的 Working 行，从 `T2` 到 `V2` 的 Whole 行，以及从 `T3` 到 `V3`
    的 Day 行。


    **图 2-5** 对每个词元单独进行向量化，以创建单词的数学表示


    #### 位置编码


    这是一种基于特定单词（例如在句子中）位置的编码。


    这种编码基于文本在序列中的位置。我们需要在输入嵌入中提供一些关于位置的信息，因为 Transformer 编码器不像循环神经网络那样具有循环性。位置编码正是用来实现这一目标的。作者构思了一种巧妙的策略，利用了正弦和余弦函数。


    位置编码的数学表示如公式 2-1 所示：


    ![ $$ {\displaystyle \begin{array}{l}{PE}_{\left( pos,2i\right)}=\mathit{\sin}\left(
    pos/{10000}^{2i/{d}_{model}}\right)\\ {}{PE}_{\left( pos,2i+1\right)}=\mathit{\cos}\left(
    pos/{10000}^{2i/{d}_{model}}\right)\end{array}} $$ ](img/523273_1_En_2_Chapter_TeX_Equa.png)


    **（公式 2-1）**


    该公式计算每个单词的位置嵌入，使得每个单词在语义分量之外还拥有一个位置分量。


    位置编码的数学细节不在本讨论范围之内；然而，其基本原理如下。


    如公式 2-1 所示，我们将奇数索引处的单词通过余弦函数处理，偶数索引处的单词通过正弦函数处理。每个单词的输出将是一个向量，代表该特定单词的位置编码。下面我们通过一个例子来解释这一点。


    ##### 位置编码示例


    取一个序列，例如“Sam loves to walk.”。


    这里，我们首先定义一些参数的值：


    - `N`：10000。

    - `K`：单词在句子中的位置，从 0 开始。

    - `D`：句子的维度。在我们的例子中为 4。

    - `I`：用于映射到列索引。


    现在我们计算正弦和余弦分量的值。


    **Sam**


    | `sin(0/10000^((0/4)))=0` | `cos(0/10000^((0/4)))=1` | `sin(0/10000^((2/4)))=0`
    | `cos(0/10000^((2/4)))=1` |

    |--------------------------|--------------------------|--------------------------|--------------------------|


    **Likes**


    | `sin(1/10000^((0/4)))=0.8414` | `cos(1/10000^((0/4)))=0.5403` | `sin(1/10000^((2/4)))=0.0099`
    | `cos(1/10000^((2/4)))=0.999` |

    |-------------------------------|-------------------------------|-------------------------------|------------------------------|


    **To**


    | `sin(2/10000^((0/4)))=0.909` | `cos(2/10000^((0/4)))=-0.416` | `sin(2/10000^((2/4)))=0.0199`
    | `cos(2/10000^((2/4)))=0.9998` |

    |-------------------------------|--------------------------------|-------------------------------|-------------------------------|


    **Walk**


    | `sin(3/10000^((0/4)))=0.1411` | `cos(3/10000^((0/4)))=-0.989` | `sin(3/10000^((2/4)))=0.0299`
    | `cos(3/10000^((2/4)))=0.9995` |

    |--------------------------------|--------------------------------|-------------------------------|-------------------------------|


    我们可以看到，句子“Sam likes to walk”中的每个单词都获得了一个词嵌入向量，用以表示该单词在句子中的位置。


    之后，将这些向量添加到与之对应的输入嵌入中。将位置嵌入添加到输入嵌入背后的直觉是，为每个单词在向量空间中提供一个朝向其出现位置的小偏移。因此，如果我们再深入思考一下，就会发现这会导致语义相似且出现在相近位置的单词在向量空间中的表示也彼此靠近。正因为如此，网络获得了关于每个向量位置的准确信息。由于正弦和余弦函数的线性特性以及模型易于学习关注它们，因此选择了这两个函数。


    至此，我们到达了编码器层，如图 2-6 所示。编码器层的目标是将所有输入序列转换为一种表示，这种表示能够捕获上下文，同时也会对特定上下文中更重要的单词给予更多关注。它从一个多头注意力子模块开始，然后进入一个全连接网络子模块。最后，紧随其后的是一个归一化层。


    ![](img/523273_1_En_2_Fig6_HTML.jpg)


    编码器组件的流程图，从位置嵌入、多头注意力、加与归一化、前馈网络、加与归一化到输入表示。


    **图 2-6** Transformer 的编码器组件

