    ### Summary


    If we are presented with lengthy documents to read, our natural inclination is
    to either not read them at all or skim only the most important points. Therefore,
    it would be very helpful to have a summary of the information to save both time
    and mental processing power.


    In the past, however, automatically summarizing text was an impossible task. To
    be more specific, making an abstractive summary is a very difficult task. Abstractive
    summarization is more difficult than extractive summarization, which pulls key
    sentences from a document and combines them to form a “summary.” Because abstractive
    summarization involves paraphrasing words, it is also more time-consuming; however,
    it has the potential to produce a more polished and coherent summary.


    We will be first looking at the `google/pegasus-xsum` model to generate the summary
    of some text.


    Here is the code.


    **app.py**


    ```

    from transformers import PegasusForConditionalGeneration, PegasusTokenizer

    import gradio as grad

    mdl_name = "google/pegasus-xsum"

    pegasus_tkn = PegasusTokenizer.from_pretrained(mdl_name)

    mdl = PegasusForConditionalGeneration.from_pretrained(mdl_name)

    def summarize(text):

    tokens = pegasus_tkn(text, truncation=True, padding="longest", return_tensors="pt")

    txt_summary = mdl.generate(**tokens)

    response = pegasus_tkn.batch_decode(txt_summary, skip_special_tokens=True)

    return response

    txt=grad.Textbox(lines=10, label="English", placeholder="English Text here")

    out=grad.Textbox(lines=10, label="Summary")

    grad.Interface(summarize, inputs=txt, outputs=out).launch()

