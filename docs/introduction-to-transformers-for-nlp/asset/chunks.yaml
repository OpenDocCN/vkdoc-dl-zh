- fmt: '# Gradio: An Introduction


    `Gradio` is a web framework specially built for deploying and inferencing machine
    learning models. `Gradio` allows us to have our ML models exposed quickly over
    a web interface without a requirement of learning too much coding. With acquisition
    of `Gradio`, Hugging Face has moved one step ahead in providing the huggingface
    community an easy interface to deploy and provide UI over the huggingface models.


    In this chapter we will make use of huggingface spaces, which provide us an interface
    to quickly deploy and provide our application (built using the huggingface APIs),
    a web front end that can then be used by end users to interact with our application.


    ## Creating a Space on Hugging Face


    To create a space on the huggingface infra, we need to have an account with huggingface.
    This can be done by navigating to [`https://huggingface.co/`](https://huggingface.co/)
    and creating an account there. Once the account is created, we can click the colored
    circle on the extreme right as shown in Figure [5-1](#523273_1_En_5_Chapter.xhtml#Fig1).


    ![](images/523273_1_En_5_Chapter/523273_1_En_5_Fig1_HTML.jpg)


    The illustration of the hugging face screen after login. It has a menu bar open
    at the top right corner labeled from top to down as profile, notification, add
    new model, new dataset, new space, settings and sign out.


    **Figure 5-1** Hugging Face screen after login


    Click `New space`, and we see a screen as shown in Figure [5-2](#523273_1_En_5_Chapter.xhtml#Fig2).


    ![](images/523273_1_En_5_Chapter/523273_1_En_5_Fig2_HTML.jpg)


    A screen to create a new space. It has fields for owner, space name, and license.
    It also has space SDK options like Streamlet, Gradio, and static.


    **Figure 5-2** Create a new space


    Provide a name for your space and choose `Gradio` as the SDK. Keep `public` as
    default for now for visibility and finally click the `Create Space` button.


    You will see the following menu as shown in Figure [5-3](#523273_1_En_5_Chapter.xhtml#Fig3).


    ![](images/523273_1_En_5_Chapter/523273_1_En_5_Fig3_HTML.jpg)


    A screenshot of the menu on the hugging face web. It has space specifications
    like owner name and likes. It has options from left to right like the app, files
    and version, community, and settings.


    **Figure 5-3** Menu on display on the huggingface web page


    For most of our applications in this chapter, we will use the `Files and versions`
    and `App` tabs.


    Click the `Files and versions` tab, and on the right side, we see `Add file`.
    Clicking it we can add the files needed for our application.


    For our application we need only two files that we need to create:


    1. `app.py`: This is the file that is the main code of the `Gradio` application.

    2. `requirements.txt`: This file has the Python dependencies needed for the app.


    ## Hugging Face Tasks


    We will start with a question and answering task.


    ### Question and Answering


    The input to the model would be a paragraph and a question from within that paragraph.
    The output of the model inference would be the answer to the question.


    The models we use are trained on the SQuAD dataset.


    The Stanford Question Answering Dataset, also known as SQuAD, is a reading comprehension
    dataset that is comprised of questions that were posed by crowdworkers on a set
    of Wikipedia articles. The answer to every question is a segment of text, also
    known as a span, from the corresponding reading passage, or the question may be
    unanswerable.


    More than 100,000 question and answer pairs are included in SQuAD 1.1, which covers
    more than 500 different articles.


    First, the RoBERTa [base](https://huggingface.co/roberta-base) model is used,
    fine-tuned using the [SQuAD 2.0](https://huggingface.co/datasets/squad_v2) dataset.
    It’s been trained on question-answer pairs, including unanswerable questions,
    for the task of question and answering.


    Some of the hyperparameters used by the model are:


    * `batch_size`: 96

    * `n_epochs`: 2

    * `max_seq_len`: 386

    * `max_query_length`: 64


    Start by creating a new space using the huggingface UI as explained in steps in
    the previous section.


    Click the `Files and versions` tab on the UI. Create a file `requirements.txt`
    with the following content:


    **requirements.txt**


    ```

    gradio

    transformers

    torch

    ```


    Create another file `app.py` and copy the content from Listing [5-1](#523273_1_En_5_Chapter.xhtml#PC1).


    ```

    from transformers import AutoModelForQuestionAnswering, AutoTokenizer, pipeline

    import gradio as grad

    import ast

    mdl_name = "deepset/roberta-base-squad2"

    my_pipeline = pipeline(''question-answering'', model=mdl_name, tokenizer=mdl_name)

    def answer_question(question,context):

    text= "{"+"''question'': ''"+question+"'',''context'': ''"+context+"''}"

    di=ast.literal_eval(text)

    response = my_pipeline(di)

    return response

    grad.Interface(answer_question, inputs=["text","text"], outputs="text").launch()

    ```


    **Listing 5-1** Code for `app.py`


    Commit the changes by clicking the `Commit changes` button as shown in Figure
    [5-4](#523273_1_En_5_Chapter.xhtml#Fig4).


    ![](images/523273_1_En_5_Chapter/523273_1_En_5_Fig4_HTML.jpg)


    A screen to commit changes in `app.py` file. It has a code at the top, and two
    radio buttons to commit directly to the main branch and open as a pull request.
    It has two fields to commit a change.


    **Figure 5-4** Commit the `app.py` file


    This would trigger the build and deployment process, and one can click the `See
    logs` button as in Figure [5-5](#523273_1_En_5_Chapter.xhtml#Fig5) to see the
    activity.


    ![](images/523273_1_En_5_Chapter/523273_1_En_5_Fig5_HTML.jpg)


    A screenshot of the menu on the hugging face web. It has space specifications
    like owner name, likes, and see logs. It has options from left to right like the
    app, files and version, and community.


    **Figure 5-5** Shows the various tabs including the “See logs” button


    The initial stage will be the building stage as shown in Figure [5-6](#523273_1_En_5_Chapter.xhtml#Fig6).


    ![](images/523273_1_En_5_Chapter/523273_1_En_5_Fig6_HTML.jpg)


    A screenshot of the menu on the hugging face web. It has space options like owner
    name, likes, see logs, and building, and in the bottom bar are the app, files
    and version, community, and settings.


    **Figure 5-6** Status of the deployment of the app


    Clicking `See logs` we can see the activity as shown in Figure [5-7](#523273_1_En_5_Chapter.xhtml#Fig7).


    ![](images/523273_1_En_5_Chapter/523273_1_En_5_Fig7_HTML.jpg)


    An algorithm for the building progress of the app. An image is loading from the
    docker library. The main commands are run `pip install`, `mkdir app`, `apt-get
    update`, and copy packages.


    **Figure 5-7** Shows the build progress of the app. Here, it’s loading the Docker
    images for creating a container


    One can see here the Docker image is being built, and then it will be deployed.
    If everything runs successfully, we will see a green stage on the UI with status
    `Running` as shown in Figure [5-8](#523273_1_En_5_Chapter.xhtml#Fig8).'
