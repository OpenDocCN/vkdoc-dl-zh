- fmt: '### Text Generation Task/Models


    The development of text generation models started many decades ago, which is a
    long time before the recent surge in interest in deep learning. Given a piece
    of text, models of this kind should be able to make accurate predictions about
    a particular word or string of words. Given a text as input, the model navigates
    through a search space to generate probabilities of what could be the next probable
    word from a joint distribution of words.


    The earliest text generation models were based on Markov chains. Markov chains
    are like a state machine wherein using only the previous state, the next state
    is predicted. This is similar also to what we studied in bigrams.


    Post the Markov chains, recurrent neural networks (RNNs), which were capable of
    retaining a greater context of the text, were introduced. They are based on neural
    network architectures that are recurrent in nature. RNNs are able to retain a
    greater context of the text that was introduced. Nevertheless, the amount of information
    that these kinds of networks are able to remember is constrained, and it is also
    difficult to train them, which means that they are not effective at generating
    lengthy texts. To counter this issue with RNNs, LSTM architectures were evolved,
    which could capture long-term dependencies in text. Finally, we came to transformers,
    whose decoder architecture became popular for generative models used for generating
    text as an example.


    In this section we will concentrate on the GPT2 model and see how we can use the
    huggingface APIs to consume the GPT2 model for generative tasks. This will allow
    us to generate text with the pretrained models and also fine-tune them if needed
    with a custom text dataset.


    ### Code


    #### `app.py`


    ```python

    from transformers import GPT2LMHeadModel,GPT2Tokenizer

    import gradio as grad

    mdl = GPT2LMHeadModel.from_pretrained(''gpt2'')

    gpt2_tkn=GPT2Tokenizer.from_pretrained(''gpt2'')

    def generate(starting_text):

    tkn_ids = gpt2_tkn.encode(starting_text, return_tensors = ''pt'')

    gpt2_tensors = mdl.generate(tkn_ids)

    response = gpt2_tensors

    return response

    txt=grad.Textbox(lines=1, label="English", placeholder="English Text here")

    out=grad.Textbox(lines=1, label="Generated Tensors")

    grad.Interface(generate, inputs=txt, outputs=out).launch()

    Listing 5-11

    Code for app.py

    ```


    #### `requirements.txt`


    ```

    gradio

    transformers

    torch

    ```


    Commit the changes and wait for the status of deployment to get green. Post that
    click the App tab in the menu to launch the application.


    Provide inputs to the UI and click the Submit button to see the results as shown
    in Figure [5-23](#523273_1_En_5_Chapter.xhtml#Fig23).


    ![](images/523273_1_En_5_Chapter/523273_1_En_5_Fig23_HTML.png)


    Two dialog boxes for tensor generation for English text. The English dialog box
    has a field and two buttons clear and submit. The generated tensor dialog box
    also has a text field.


    **Figure 5-23** Tensors for the English text


    Next, we decode these tensors in the `generate` function.


    ```python

    def generate(starting_text):

    tkn_ids = gpt2_tkn.encode(starting_text, return_tensors = ''pt'')

    gpt2_tensors = mdl.generate(tkn_ids)

    response=""

    #response = gpt2_tensors

    for i, x in enumerate(gpt2_tensors):

    response=response+f"{i}: {gpt2_tkn.decode(x, skip_special_tokens=True)}"

    return response

    Listing 5-12

    Generate function

    ```


    I will give another text as input and check.


    Commit the changes and wait for the status of deployment to get green. Post that
    click the App tab in the menu to launch the application.


