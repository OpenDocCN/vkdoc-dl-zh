- fmt: '### The Residual Connections, Layer Normalization, and Feed-Forward Network


    The original positional input embedding is then given the multi-headed attention
    output vector as an additional component. This type of connection is known as
    a residual connection. You can think of this step as addition of input (positional
    encoding in this case) to the output (multi-headed attention output in this case).
    After this, an operation known as layer normalization is performed on the output
    of the residual connection. The goal of layer normalization is to improve the
    performance of training.


    Post normalization, the output is passed via a feed-forward network, and then
    the result of this feed-forward network is normalized with input as the data fed
    to the feed-forward network.


    Because they enable gradients to move directly across the network, the residual
    connections are beneficial to the network’s training process. The layer normalizations
    are responsible for stabilizing the network, which ultimately leads to a significant
    cut in the amount of training time required.


    This is, more or less, at a high level how the encoder works. Next, we discuss
    in brief the decoder component of transformers.


    ### Decoder


    It is the responsibility of the decoder to produce text sequences. The decoder
    is similar to encoders in having the layers like:


    1. Multi-headed attention layer

    2. Add and norm layers

    3. Feed-forward layer


    In addition, it has a linear layer with a softmax classifier to emit probabilities
    of an output. This is where the generative part comes into play.


    The decoder works by taking the starting tokenized word and then previous outputs
    (if any) and combining it with the output of the encoder.


    The different aspects involved in the decoding process are explained in the following.


    #### Input Embeddings and Positional Encoding


    To a large extent, the beginning of the decoder is identical to the beginning
    of the encoder. In order to obtain positional embeddings, the input is first placed
    via an embedding layer and then a positional encoding layer. The positional embeddings
    are then sent through to the first multi-head attention layer.


    #### First Layer of Multi-headed Attention


    This layer, though similar in name to what we used in encoders, is a bit different
    in functionality. The reason is that the decoder only has access to words that
    come prior to the current word in the sentence. It’s not supposed to see what
    word comes next in the sequence.


    There needs to be a way for us to avoid computing attention scores for terms in
    the future. The technique in question is known as masking. By using a lookahead
    mask, you can restrict the decoder from looking at tokens that are yet to come.
    The mask is included both before and after the softmax calculation, which takes
    place after the scores have been scaled. We won’t discuss the mathematical details
    of the lookahead mask in this book. The basic idea of the mask is to only calculate
    the attention score for the current word based on previous words and not for future
    words in the sentence.


    #### Second Layer of Multi-headed Attention


    This layer takes the output from the first multi-headed attention layer of the
    decoder and combines this with the output of the encoder. This will enable the
    decoder to understand better as to which components of encoder output to attend
    to. The output of this multi-headed attention layer is passed via a feed-forward
    network.


    #### Linear Classifier and Final Softmax for Output Probabilities


    The output of the previous multi-headed attention layer and feed-forward network
    is again normalized and passed to a linear layer with a softmax component for
    emitting the probabilities – as an example, the probability of what could be the
    next word in a specific sequence of words. This is where the generative aspect
    of the architecture shines.


    ## Summary


    This chapter explained how transformers work. Also, it detailed the power of the
    attention mechanism that is harnessed by transformers so that they can make more
    accurate predictions. Similar goals can be pursued by recurrent neural networks,
    but their limited short-term memory makes progress toward these goals difficult.
    If you wish to encode a long sequence or produce a long sequence, transformers
    may be a better option for you. The natural language processing sector is able
    to accomplish results that have never been seen before as a direct result of the
    transformer design.


    In the next chapter, we look into how transformers work from the point of view
    of code in more detail. We introduce the huggingface ecosystem, which is one of
    the major open source repositories for transformer models.


    # 3. BERT


    In this chapter, you will learn one of the implementations of the transformer
    architecture, developed by Google, called BERT.


    Recent work done by researchers at Google AI Language resulted in the publication
    of a paper known as “BERT (Bidirectional Encoder Representations from Transformers).”


    The most important technical advancement that BERT has made is the application
    of bidirectional training of the popular attention model, transformer, to language
    modeling. According to the findings of the study on language models, a language
    model that is trained in both directions at once is able to have a greater awareness
    of the flow and context of language than models trained in just one direction.
    The researchers describe a unique training method that they call masked language
    modeling (MLM) in the publication. This method enables bidirectional training
    in models, which was previously difficult to do.


    BERT also allows us to do transfer learning, which allows the pretrained BERT
    model to be used in a variety of natural language applications.


    Depending on the scale of the model architecture, there are two different pretrained
    versions of BERT, which are as follows:


    - **BERT-Base** has a total of 110 million parameters, 12 attention heads, 768
    hidden nodes, and 12 layers.

    - **BERT-Large** is characterized by having 24 layers, 1024 hidden nodes, 16 attention
    heads, and 340 million parameter values.


    ## Workings of BERT


    BERT is based on the transformer architecture, which internally makes use of the
    attention mechanism as discussed in Chapter [2](#523273_1_En_2_Chapter.xhtml).
    BERT’s beauty lies in understanding the context in a sentence and representing
    a word, keeping the context into account. This means that a word like *bank* when
    used in the context of finance has a different representation than when the same
    word *bank* is used as in a river bank. BERT only uses the encoder mechanism of
    the transformer architecture and is mainly used to create better word representations,
    which can then be used for more downstream applications. The detailed working
    of transformers was covered in Chapter [2](#523273_1_En_2_Chapter.xhtml).


    The input to the transformer encoder is a sentence of words, and the architecture
    of BERT is such that it can read in both directions to capture context in words,
    meaning words that occur both prior to the word in focus and later in the sentence.
    This overcomes sequential reading, which happens in, say, LSTM-type architectures
    (although bidirectional LSTMs are possible, they are complex and still have sequential
    processing).


    In the process of training language models, one of the challenges that must be
    overcome is identifying a prediction goal. A large number of models provide predictions
    about the following word in a sequence (e.g., “The sun is sinking in the ___”),
    which is a directional approach that limits context learning by its very nature.
    BERT employs two different training tactics in order to overcome this obstacle.'
