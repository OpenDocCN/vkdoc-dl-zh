    \n如果我们面对冗长的文档需要阅读，我们的自然倾向是根本不读，或者只浏览最重要的要点。因此，拥有一个信息摘要来节省时间和脑力处理能力将非常有帮助。\n\n\
    然而，在过去，自动总结文本是一项不可能完成的任务。更具体地说，生成抽象式摘要是一项非常困难的任务。抽象式摘要比抽取式摘要更难，后者是从文档中提取关键句子并将它们组合成一个“摘要”。由于抽象式摘要涉及改写词语，因此也更耗时；然而，它有潜力生成更精炼和连贯的摘要。\n\
    \n我们将首先查看 `google/pegasus-xsum` 模型来生成一些文本的摘要。\n\n以下是代码。\n\n**`app.py`**\n\n```python\n\
    from transformers import PegasusForConditionalGeneration, PegasusTokenizer\nimport\
    \ gradio as grad\nmdl_name = \"google/pegasus-xsum\"\npegasus_tkn = PegasusTokenizer.from_pretrained(mdl_name)\n\
    mdl = PegasusForConditionalGeneration.from_pretrained(mdl_name)\ndef summarize(text):\n\
    tokens = pegasus_tkn(text, truncation=True, padding=\"longest\", return_tensors=\"\
    pt\")\ntxt_summary = mdl.generate(**tokens)\nresponse = pegasus_tkn.batch_decode(txt_summary,\
    \ skip_special_tokens=True)\nreturn response\ntxt=grad.Textbox(lines=10, label=\"\
    English\", placeholder=\"English Text here\")\nout=grad.Textbox(lines=10, label=\"\
    Summary\")\ngrad.Interface(summarize, inputs=txt, outputs=out).launch()\n```\n\
    \n*清单 5-7*  \n*`app.py` 的代码*\n\n**`requirements.txt`**\n\n```\ngradio\ntransformers\n\
    torch\ntransformers[sentencepiece]\n```\n\n提交更改，等待部署状态变为绿色。之后，点击菜单中的 **App** 选项卡启动应用程序。\n\
    \n向用户界面提供输入，然后点击 **Submit** 按钮查看结果，如图 5-17 所示。\n\n![使用 Gradio 进行摘要的两个对话框。英语对话框有一个字段和两个按钮：清除和提交。摘要对话框也有一个文本字段。](img/523273_1_En_5_Fig17_HTML.png)\n\
    \n*图 5-17*  \n*使用 Gradio 的摘要应用。在标记为“English”的框中粘贴一段文字，提交后，标记为“Summary”的框将显示该段文字的摘要*\n\
    \n接下来，我们使用另一段文本，并通过一些参数对模型进行微调。\n\n```python\nfrom transformers import PegasusForConditionalGeneration,\
    \ PegasusTokenizer\nimport gradio as grad\nmdl_name = \"google/pegasus-xsum\"\n\
    pegasus_tkn = PegasusTokenizer.from_pretrained(mdl_name)\nmdl = PegasusForConditionalGeneration.from_pretrained(mdl_name)\n\
    def summarize(text):\ntokens = pegasus_tkn(text, truncation=True, padding=\"longest\"\
    , return_tensors=\"pt\")\ntranslated_txt = mdl.generate(**tokens,num_return_sequences=5,max_length=200,temperature=1.5,num_beams=10)\n\
    response = pegasus_tkn.batch_decode(translated_txt, skip_special_tokens=True)\n\
    return response\ntxt=grad.Textbox(lines=10, label=\"English\", placeholder=\"\
    English Text here\")\nout=grad.Textbox(lines=10, label=\"Summary\")\ngrad.Interface(summarize,\
    \ inputs=txt, outputs=out).launch()\n```\n\n*清单 5-8*  \n*`app.py` 的代码*\n\n提交更改，等待部署状态变为绿色。之后，点击菜单中的\
    \ **App** 选项卡启动应用程序。\n\n向用户界面提供输入，然后点击 **Submit** 按钮查看结果，如图 5-18 所示。\n\n![用于文本摘要的\
    \ Google Pegasus 模型框图。文本以六个块的形式写在 Transformer 上方，并转换为 Transformer 下方的两个块。](img/523273_1_En_5_Fig19_HTML.jpg)\n\
    \n*图 5-19*  \n*用于文本摘要的 Google Pegasus 模型*  \n*图片来源：* [`https://1.bp.blogspot.com/-TSor4o51jGI/Xt50lkj6blI/AAAAAAAAGDs/`](https://1.bp.blogspot.com/-TSor4o51jGI/Xt50lkj6blI/AAAAAAAAGDs/)\n\
    \n![使用 Gradio 进行摘要的两个对话框。英语对话框有一个字段和两个按钮：清除和提交。摘要对话框也有一个文本字段。](img/523273_1_En_5_Fig18_HTML.png)\n"
- fmt: '# Two Dialog Boxes for Summarization Using the Gradio App


    Two dialog boxes side by side for summarization using the Gradio app. The English
    and summary dialog box has a text field each.


    **Figure 5-18**


    Summary of the text via the Gradio app


    We can see we provided the following parameters in the code:


    ```

    translated_txt = mdl.generate(**tokens,num_return_sequences=5,max_length=200,temperature=1.5,num_beams=10)

    ```


    Text generation is accomplished through the use of beam search, which is what
    `num_beams` refers to. In contrast with greedy search, which only returns the
    next word that is most likely to be found, this method returns the `n` words that
    are most likely to be found.


    `Num_return_sequences` returns the number of outputs returned. In the preceding
    example, we gave `5` as the number of sequences.


    Altering the output distribution that is computed by your neural network is one
    justification for making use of the temperature function. In accordance with Equation
    5-1 (temperature function), it is added to the logits vector:


    `𝑞𝑖 =exp(𝑧𝑖/𝑇)/ ∑𝑗exp(𝑧𝑗/𝑇)` Equation 5-1


    where `𝑇` is the temperature parameter.


    You must understand that this will result in a shift in the overall probabilities.
    You are free to pick any value for `T` you like (the higher the `T`, the “softer”
    the distribution will be; if it is set to `1`, the output distribution will be
    the same as your normal softmax outputs), but keep in mind that the softer the
    distribution, the higher the `T` should be. When I say that the model’s prediction
    will be “softer,” what I mean is that the model will have less confidence in its
    ability to make the prediction. The “difficulty” of the distribution increases
    as the parameter `T` approaches `0`.


    1. Sample “hard” softmax probs: `[0.01,0.04,0.95]`

    2. Sample ‘soft’ softmax probs: `[0.15,0.25,0.6]`


    In the preceding “a” is a harder distribution. Your model exhibits a high level
    of assurance regarding its predictions. On the other hand, you probably don’t
    want your model to behave in that way in most situations. For instance, if you
    are generating text with an RNN, you are essentially taking a sample from your
    output distribution and using that sampled word as your output token (and next
    input). If your model has a high level of self-assurance, it may generate text
    that is very repetitive and not very interesting. You want it to produce text
    with a greater variety of topics, but it won’t be able to do that because, while
    the sampling procedure is taking place, the majority of the probability mass will
    be concentrated in a few tokens, and as a result, your model will keep selecting
    the same small group of words over and over again. You could plug in the temperature
    variable to generate more diverse text and give other words a chance to be sampled
    as well. This would accomplish the same thing.


    The exponential function is to blame for the fact that higher temperatures result
    in flatter distributions. This is because of how the function works. The temperature
    parameter places a greater amount of negative weight on larger logits than it
    does on smaller logits. An “increasing function” is what the exponential function
    is called. Therefore, if a term is already quite significant, penalizing it by
    a small amount would make it much smaller (in terms of percentage) than if that
    term was relatively minor.


    For a more keen user, here is a brief about the Pegasus model.


    ## Pegasus


    During the pretraining phase of the Pegasus system, several complete sentences
    are deleted from the source document. The model is then tasked with retrieving
    these sentences. The missing sentences from the document serve as the input for
    such pretraining, while the document itself serves as the output. The input document
    is what is known as the “input document.” This is a self-supervised model without
    any need of annotations in the training dataset.


    ### Zero-Shot Learning


    Zero-shot learning, as the name implies, is to use a pretrained model, trained
    on a certain set of data, on a different set of data, which it has not seen during
    training. This would mean, as an example, to take some model from HuggingFace
    that is trained on a certain dataset and use it for inference on examples it has
    never seen before.


    #### Zero-Shot Text Classification


    Text classification is a task in natural language processing that requires the
    model to make predictions about the classes that the text documents belong to,
    as is common knowledge. In the traditional method, we are required to use a significant
    amount of data that has been labeled in order to train the model. Additionally,
    they are unable to make predictions using data that they have not seen. The use
    of zero-shot learning in conjunction with text classification has reached an unprecedented
    level of sophistication in natural language processing.


    The primary objective of any model associated with the zero-shot text classification
    technique is to classify the text documents without employing any labeled data
    or without having seen any labeled text. This can be accomplished by classifying
    the documents without having seen any labeled text. The transformers are where
    the zero-shot classification implementations are most frequently found by us.
    There are more than 60 transformer models that function based on the zero-shot
    classification that are found in the HuggingFace library.


    When we discuss zero-shot text classification, there is one additional thing that
    springs to mind. In the same vein as zero-shot classification is few-shot classification,
    which is very similar to zero-shot classification. However, in contrast with zero-shot
    classification, few-shot classification makes use of very few labeled samples
    during the training process. The implementation of the few-shot classification
    methods can be found in OpenAI, where the GPT3 classifier is a well-known example
    of a few-shot classifier.'
