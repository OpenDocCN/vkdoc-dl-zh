    The Transformers library includes a `Trainer` class that is specifically designed
    for training huggingface transformer models. This class makes it much simpler
    to begin training without the need to manually write your own code. The `Trainer`
    API provides features like logging, monitoring, etc.


    Here, we provide the training arguments by instantiating a class called `TrainingArguments`
    that has all of the hyperparameters that one can experiment with. Here in this
    case, we will be just using the defaults:


    ```

    from transformers import TrainingArguments

    training_args = TrainingArguments(output_dir="imdb")

    ```


    During training, `Trainer` does not automatically evaluate how well the model
    is performing. If you want `Trainer` to be able to compute and report metrics,
    you will need to pass it a function. This is what we will do in the following
    code segment:


    ```

    import numpy as np

    from datasets import load_metric

    mdl_metrics = load_metric("accuracy")

    def calculate_metrics(eval_pred):

    logits, labels = eval_pred

    predictions = np.argmax(logits, axis=-1)

    return mdl_metrics.compute(predictions=predictions, references=labels)

    from transformers import TrainingArguments, Trainer

    trng_args = TrainingArguments(output_dir="test_trainer", evaluation_strategy="epoch",
    num_train_epochs=3)

    ```


    Instantiate a `Trainer` object that contains your model, the training arguments,
    the datasets to be used for training and testing, and the evaluation function:


    ```

    Mdl_trainer = Trainer(

    model=model,

    args=trng_args,

    train_dataset=training_dataset,

    eval_dataset=evaluation_dataset,

    compute_metrics=calculate_metrics,

    )

    ```


    Train the model:


    ```

    trainer.train()

    ```


