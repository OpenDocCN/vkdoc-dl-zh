    \ automatically assign a label to each of the tokens that are included in the\
    \ input.\n\n5.  Reducing a longer piece of writing or an article into a more concise\
    \ summary is referred to as summarization.\n\nPipelines are an abstraction built\
    \ on top of three huggingface components, namely\n\n1.  Tokenizer\n\n2.  Model\n\
    \n3.  Post-processor\n\n    ![](images/523273_1_En_4_Chapter/523273_1_En_4_Fig1_HTML.jpg)\n\
    \n    The model diagram of the workflow of a hugging face pipeline depicting tokenizer,\
    \ model, and post-processing with text, logits, input IDs, and predictions.\n\n\
    \    Figure 4-1\n\n    Workflow of a huggingface pipeline"
  trans: '

    # 4. Hugging Face


    如果你对 2018 年以来机器学习和人工智能领域的进展稍有了解，几乎肯定已经注意到自然语言处理（NLP）领域取得的巨大进步。该领域的大部分进展可归功于大型语言模型（LLM）。这些
    LLM 背后的架构是我们在第 2 章讨论过的 Transformer 编码器-解码器结构。


    Transformer 的成功源于其架构能够并行处理输入数据，并通过注意力机制获得更好的上下文理解能力。我们在前几章已经提到过 Vaswani 等人的论文《注意力就是一切》。在
    Transformer 出现之前，上下文信息是通过普通的 RNN 或 LSTM（不含注意力机制）来捕获的。


    `Hugging Face`如今被广泛认为是自然语言处理（NLP）领域的一站式平台，不仅提供数据集和预训练模型，还拥有社区甚至课程。


    `Hugging Face`是一家基于开源软件和数据原则成立的新公司。从真正意义上说，NLP 革命始于基于 Transformer 架构的 NLP 模型的民主化。`Hugging
    Face`不仅率先开源了这些模型，还以`Transformers`库的形式提供了便捷易用的抽象接口，使得这些模型的调用和推理变得非常简单。


    `Hugging Face`为模型开发者提供了一个中心化的平台或枢纽，让他们可以将模型发布到`huggingface`仓库中，而希望基于这些模型构建应用的消费者则可以方便地使用它们。例如，BERT（来自
    Transformer 的双向编码器表示）模型就是由谷歌贡献给`huggingface`的。这使得用户社区能够在自己的应用中使用这些模型。随后，OpenAI
    推出了 GPT2 等生成式模型，让最终用户能够编写生成故事、小说等内容的应用程序。GPT2 也是`huggingface`生态系统的一部分。`Hugging
    Face`不仅提供了调用这些模型的 API，还提供了使用自有数据集进行微调、监控和基准测试的方法。简而言之，像`huggingface`这样的生态系统的出现，为那些希望基于自然语言处理模型构建应用的开发者打开了无数机遇之门。


    目前，这些模型的应用范围已不仅限于文本处理。我们现在看到了视觉 Transformer 和基于 Transformer 的音频模型的出现。人们正在构建用于音乐生成或语音克隆的音频领域应用，以及在视觉用例中用于生成虚假图像的应用。还有一些模型挖掘了科学文献，可用于从科学期刊中提取知识。同样，基于法律相关文档的模型也已出现，人们可以基于它们构建问答系统。这些模型根据底层架构的不同，规模也各不相同。例如，GPT3
    模型拥有约 1750 亿个参数。


    同样，其训练数据集的大小和范围也显著增加。例如，最初的 Transformer 被规模更大的`Transformer-XL`所取代；`BERT-Base`的参数数量从
    1.1 亿增加到`Bert-Large`的 3.4 亿；拥有 15 亿参数的 GPT2 模型被拥有 1750 亿参数的 GPT3 模型所取代。中国推出了名为`Wu
    Dao 2.0`的模型，拥有约 1.75 万亿个参数。规模扩展的支持者认为，随着模型规模的增大，我们也将逐步实现通用人工智能（AGI）的目标。


    以 GPT3 为例，它是在一台拥有超过 10000 个 GPU 的超级计算机上训练的。这意味着训练这些模型仅属于大公司的能力范围。如今，由于能够使用这些模型中的大部分，最终用户成为了围绕这些大型语言模型构建的应用开发生态系统的一部分。


    ## Hugging Face 平台的特点


    由于`Hugging Face`平台建立在基于注意力的 Transformer 模型理念之上，因此`Transformers`库位于`Hugging Face`生态系统的核心也就不足为奇了。配套的`Datasets`和`Tokenizers`库为`Transformers`库提供支持。请记住，Transformer
    无法理解文本的原始形式（即字符串）。由于我们输入给 Transformer 的是文本，因此必须以一种能够被基于 Transformer 的神经网络架构消费的方式对文本进行编码。为此，我们使用`huggingface`提供的用于分词（tokenizing）的
    API，这些 API 被称为`tokenizers`。


    除了分词，我们可能还需要使用一些自定义数据集来微调现有模型或从头训练模型。为了保持架构的统一性，`huggingface`通过`Datasets` API
    为数据集提供了抽象接口。用户只需使用`huggingface`的 API，就可以拥有自己的数据集、上传数据集、训练/微调模型，以及上传训练好的模型。这无疑是革命性的。


    ### Hugging Face 的组件


    `huggingface`库基于一组丰富的抽象接口，这些接口简化了基于自然语言处理创建应用的复杂性。这些抽象接口为我们提供了一个统一的接口，用于加载模型、使用分词器、跨各种模型、分词器和数据集使用数据集。这对于开发者来说是一种赋能体验，他们的工作因使用这些抽象接口而变得简化。我们将在以下小节中讨论其中一些抽象接口。


    #### Pipelines


    `Pipelines`为使用`huggingface`模型仓库中的预训练模型提供了强大且便捷的抽象接口。它提供了一个专用于多种任务的简单应用程序编程接口（API）：


    1. 判断句子的整体情感是正面还是负面。

    2. 问答：接受一个问题，并从文本中提取出对应的答案。

    3. 掩码语言建模：根据给定上下文，建议可能的单词来填充掩码输入。

    4. 命名实体识别：自动为输入中包含的每个标记分配标签。

    5. 摘要：将较长的文章或文档缩减为更简洁的摘要。


    `Pipelines`是建立在三个`huggingface`组件之上的抽象接口，即：


    1. `Tokenizer`（分词器）

    2. `Model`（模型）

    3. `Post-processor`（后处理器）


    ![](img/523273_1_En_4_Fig1_HTML.jpg)


    Hugging Face Pipeline 工作流的模型图，展示了分词器、模型以及包含文本、logits、输入 ID 和预测的后处理过程。


    **图 4-1** Hugging Face Pipeline 的工作流

