    Once we have fine-tuned the model and saved it, it’s time to do inference on data
    outside the train dataset.


    We will load the fine-tuned model from the path and use it to make a classification,
    which in this case is a sentiment classification on IMDB movie reviews:


    ```

    from transformers import BertTokenizer

    ```


    Load the fine-tuned model from the following path:


    ```

    PATH = ''test_trainer/''

    md = AutoModelForSequenceClassification.from_pretrained(PATH, local_files_only=True)

    def make_classification(text):

    # Tokenize

    inps = brt_tkn(text, padding=True, truncation=True, max_length=512, return_tensors="pt").to("cuda")

    # get output

    outputs = model(**inps)

    # softmax for generating probablities

    probablities = outputs[0].softmax(1)

    # get best match.

    return probablities .argmax()

    ```


    Here is the first inference:


    ```

    text = """

    This is the show that puts a smile on your face as you watch it. You get in love
    with each and every character of the show. At the end, I felt eight episode were
    not enough. Will wait for season 2.

    """

    print(make_classification(text))

    ```


