  trans: '

    #### 使用语言模型能带来哪些优势？


    为了根据上下文推断单词概率所需的自然语言抽象理解能力，可应用于多种场景和任务。


    如果我们拥有精准的语言模型，就能对文本进行抽取式或生成式摘要。若掌握多种语言模型，构建自动翻译系统将变得更为简便。在更复杂的应用中，还包括问答系统（无论是否提供上下文）。如今，语言模型正被应用于非常有趣的领域，例如软件代码生成、文本到图像生成（如
    OpenAI 的`DALL-E 2`），以及其他文本生成机制（如`GPT3`）等。


    必须理解以下两者之间的区别：


    1. 属于概率语言模型的统计技术

    2. 基于神经网络的语言模型


    如“n-grams”部分所述，计算 n-gram 的概率会构建出一个简单的概率语言模型（a）（n-gram 指由 n 个单词组成的序列，n 为大于 0 的整数）。n-gram
    的概率可定义为：该 n-gram 的最后一个单词在特定 n-1 gram（不含最后一个单词）之后出现的条件概率。通俗来说，它指的是不含最后一个单词的 n-1
    gram 之后出现最后一个单词的频率。给定代表现在的 n-1 gram，代表未来的 n-gram 的概率不依赖于代表过去的 n-2、n-3 等 gram。这是马尔可夫提出的假设。


    采用这种方法存在明显的缺点。下一个单词的概率分布仅受其前面 n 个单词的影响，这是最核心的一点。难以理解的文本包含丰富的上下文，这些上下文会对下一个单词的选择产生重大影响。因此，即使
    n 高达 50，下一个单词的身份也可能无法从它前面的 n 个单词中辨别出来。


    此外，这种方法显然不具备良好的可扩展性：随着数据集规模（n）的增大，可能的排列组合数量会急剧飙升，尽管大多数变体从未在实际文本中出现。而且，每一个出现的概率（或每一个
    n-gram 计数）都需要计算和存储！此外，未出现的 n-gram 会导致稀疏性问题，因为当它们数量极少时，概率分布的粒度可能相对较低（单词概率的取值很少，因此大多数单词具有相同的概率）。


    #### 基于神经网络的语言模型


    基于神经网络的语言模型对输入进行编码的方式，使得处理稀疏性问题变得更加容易。嵌入层为每个单词生成一个任意大小的向量，其中考虑了单词之间的语义联系。这些连续向量生成了下一个单词概率分布中迫切需要的粒度。此外，语言模型本质上是一个函数（所有神经网络都包含大量矩阵计算），这意味着无需存储所有
    n-gram 计数即可构建下一个单词的概率分布。


    神经网络可以解决稀疏性问题，但上下文问题依然存在。首先，语言模型的发展过程就是不断寻找更有效方法来解决上下文问题的过程。这通过引入更多的上下文单词来更有效地影响概率分布得以实现。其次，目标是设计一种架构，使模型能够发现给定上下文中哪些短语比其他短语更重要。


    利用循环神经网络（如前所述）是处理上下文问题方面迈出的正确一步。由于它基于 LSTM 或 GRU 单元的网络，在选择下一个单词时会考虑它之前的所有单词。


    基于 RNN 的架构是顺序处理的，这是使用这类模型的主要缺点。由于缺乏并行处理的可能性，处理长序列时所需的训练时间会急剧增加。Transformer 架构正是解决这一困境的方案。建议阅读
    Google Brain 撰写的原始文档。


    此外，OpenAI 的 GPT 模型和 Google 的 BERT 都采用了 Transformer 架构（我们将在后续章节中讨论）。除此之外，这些模型还利用了一种称为注意力机制的技术，该技术使模型能够发现哪些输入在特定情况下比其他输入更值得关注。


    在模型架构方面，最重大的飞跃首先是 RNN（特别是 LSTM 和 GRU），它解决了稀疏性问题，使语言模型能够使用更少的磁盘空间；随后是 Transformer
    架构，它实现了并行化并创造了注意力机制。这两项发展都至关重要。然而，架构并非语言模型展现其能力的唯一领域。


    OpenAI 发布了几个基于 Transformer 架构的语言模型。第一个模型是`GPT1`，最新的是`GPT3`。与`GPT1`的架构相比，`GPT3`几乎没有任何创新特性。但它规模巨大。它使用了模型有史以来训练过的最大的语料库——Common
    Crawl 进行训练，拥有 1750 亿个不同的参数。这在一定程度上得益于语言模型的半监督训练方法，该方法允许将文本作为训练样本，同时省略部分单词。`GPT3`的强大之处在于，它几乎阅读了过去几年互联网上发布的所有文本，并且具备反映自然语言大部分复杂性的能力。

    '
- fmt: "# Summary\n\nIn conclusion, I would like to present the `T5` model that Google\
    \ offers (Figure [1-2](#523273_1_En_1_Chapter.xhtml#Fig2)). In the past, language\
    \ models were utilized for conventional natural language processing tasks, such\
    \ as part-of-speech (`POS`) tagging or machine translation, albeit with a few\
    \ tweaks here and there. Because of its abstract capability to understand the\
    \ fundamental structure of natural language, `BERT`, for instance, may be retrained\
    \ to function as a `POS` tagger with only a little bit of additional instruction.\n\
    \n![](images/523273_1_En_1_Chapter/523273_1_En_1_Fig2_HTML.png)\n\nAn illustration\
    \ represents a language model which is representing a Google `T5` model which\
    \ is a text-to-text model; this model is translating English to German.\n\n**Figure\
    \ 1-2**  \nGoogle’s `T5` model, which is a text-to-text model\n\nFigure [1-2](#523273_1_En_1_Chapter.xhtml#Fig2)\
    \ shows a representation of the `T5` language model.\n\nWhen using `T5`, there\
    \ is no requirement for any sort of modification in order to complete `NLP` jobs.\
    \ If it receives a text that contains certain `M` tokens, it recognizes that these\
    \ tokens represent blanks that need to be filled in with the proper words. It\
    \ is also capable of providing answers. If it is provided with some context after\
    \ the questions, it will seek that context for the answer; otherwise, it will\
    \ answer based on the information it already possesses. It is an interesting fact\
    \ that its designers have been bested by it in a trivia contest. Additional examples\
    \ of possible applications can be seen in the image (Figure [1-2](#523273_1_En_1_Chapter.xhtml#Fig2))\
    \ on the left.\n\n## Summary\n\nIn my opinion, `NLP` is the area in which we are\
    \ the most likely to succeed in developing artificial intelligence. There is a\
    \ great deal of excitement about this term, and many straightforward decision-making\
    \ systems, as well as virtually every neural network, are referred to as `AI`;\
    \ however, this is primarily marketing. The Oxford Dictionary of English, as well\
