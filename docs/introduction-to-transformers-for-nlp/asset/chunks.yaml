    information about what is to come after it. This is one of the reasons an RNN
    is able to accomplish tasks that other algorithms are unable to.


    The output is first produced by a feed-forward neural network , which, like all
    other deep learning algorithms, begins by assigning a weight matrix to the inputs
    of the network. Take note that RNNs assign weights not only to the most recent
    input but also to the inputs that came before it. In addition, a recurrent neural
    network will adjust the weights over the course of time using gradient descent
    as well as backpropagation (BP) .


    As things evolved, we discovered that there are challenges with RNNs and their
    counterparts in terms of processing time and capturing long-term dependencies
    between words in a sentence. This led us to the evolution of language models,
    which we describe in the next section.


    ### Language Models


    Over the course of the last decade, there has been a substantial amount of development
    in the field of information extraction from textual data. Natural language processing
    replaced text mining as the name of this field, and as a result, the approach
    that is applied in this field has also undergone a significant change. The development
    of language models as a foundation for a wide variety of applications that seek
    to extract useful insights from unprocessed text was one of the primary factors
    that brought about this transition.


    A probability distribution over words or word sequences is the fundamental building
    block of a language model. In application, a language model provides the chance
    that a particular word sequence can be considered “valid.” In this discussion,
    “validity” does not at all refer to the grammatical correctness of a statement.
    This indicates that it is similar to the way people speak (or, to be more specific,
    write) because this is how the language model acquires its knowledge. A language
    model is “just” a tool to incorporate abundant information in a condensed manner
    that is reusable in an out-of-sample setting. This is an important point to keep
    in mind because it shows that there is no magic to a language model (like other
    machine learning models, particularly deep neural networks).'
  trans: '

    # 循环神经网络（RNN）究竟是什么？


    循环神经网络（RNN）是神经网络的一个子类别，对于序列数据的建模非常有用。RNN 源自前馈网络，其表现出的行为与人类大脑的运作方式类似。换句话说，循环神经网络能够利用序列数据产生预测结果，而其他算法则无法做到这一点。


    ## RNN 的工作原理


    为了全面理解 RNN，你需要对“常规”的前馈神经网络以及序列数据有一个实用的认识。


    序列数据最基本的定义就是有序数据，其中相关项按时间顺序依次排列。例如 DNA 序列和金融数据。最常见的序列数据可能是时间序列数据，它无非就是按正确时间顺序呈现的一系列数据点。


    信息传递的方式赋予了 RNN 和前馈神经网络各自的名称。


    前馈网络是一种单程网络，这意味着它内部没有循环。输入数据经过各个层，网络的输出与实际输出进行比较，并通过反向传播机制引入误差修正。这种方法一次只能处理一个输入。


    由于一次只能处理一个输入，前馈神经网络在预测接下来会发生什么方面表现很差，因为它没有记忆来存储接收到的信息。前馈网络没有任何时间顺序的概念，因为它只考虑最近的输入。除了它接受的训练之外，它根本不记得过去发生的任何事情。


    在 RNN 中，信息在一个循环内无限重复。当需要做出决策时，它除了考虑从先前输入中学到的经验之外，还会考虑最近的输入。


    图 1-1 以可视化形式展示了这种差异。


    ![](img/523273_1_En_1_Fig1_HTML.jpg)


    两种神经网络差异的示意图：一种是循环神经网络，另一种是前馈神经网络。


    **图 1-1** 简单前馈网络与 RNN 之间的区别


    另一种阐明循环神经网络记忆概念的有效方法是通过一个例子来描述。


    想象你有一个典型的前馈神经网络，你向它输入单词“machine”。然后你观察网络逐个字符地处理这个单词。因为当它处理到字符“h”时，它已经忘记了“m”、“a”和“c”，所以这种形式的神经网络几乎无法预测下一个字符是什么，因为它已经忘记了这些字符。


    然而，由于循环神经网络拥有自己的内部记忆，它能够记住这些字符。它生成输出，复制该输出，然后将这两个版本都反馈回网络。


    换句话说，循环神经网络将近期历史纳入对当前情况的分析中。


    因此，RNN 将当前和近期的情况都作为输入来考虑。这一点很重要，因为数据序列提供了关于后续内容的关键信息。这也是 RNN 能够完成其他算法无法完成的任务的原因之一。


    输出首先由前馈神经网络产生，与所有其他深度学习算法一样，它首先为网络的输入分配一个权重矩阵。请注意，RNN 不仅为最近的输入分配权重，也为之前的输入分配权重。此外，循环神经网络会随着时间的推移，使用梯度下降和反向传播来调整权重。


    随着事物的发展，我们发现 RNN 及其同类在处理时间以及捕捉句子中单词之间的长期依赖关系方面存在挑战。这促使我们发展了语言模型，我们将在下一节中描述。


    ## 语言模型


    在过去的十年中，从文本数据中提取信息这一领域取得了长足的发展。自然语言处理取代了文本挖掘成为该领域的名称，因此该领域应用的方法也发生了重大变化。语言模型作为各种旨在从原始文本中提取有用见解的应用的基础，其发展是实现这一转变的主要因素之一。


    语言模型的基本构建块是单词或单词序列上的概率分布。在实际应用中，语言模型提供了特定单词序列可以被认为是“有效”的概率。在此讨论中，“有效性”完全不指语句的语法正确性。它表示该序列与人们说话（或者更具体地说，写作）的方式相似，因为语言模型正是通过这种方式获取知识的。语言模型“仅仅”是一种工具，用于以简洁的方式整合丰富的信息，使其能够在样本外场景中重复使用。记住这一点很重要，因为它表明语言模型（像其他机器学习模型，特别是深度神经网络一样）并没有什么魔力。

    '
- fmt: '#### What Advantages Does Using a Language Model Give Us?


    The abstract comprehension of natural language, which is required in order to
    deduce word probabilities based on context, can be put to use in a variety of
    contexts and activities.


    We are able to execute extractive or abstractive summarization of texts if we
    have an accurate language model. If we have models for a variety of languages,
    it will be much simpler to develop a system for automatic translation. Among the
    more complicated applications is the process of question answering (with or without
    context). Language models today are being put to very interesting tasks like software
    code generation, text-to-image generation like `DALL-E 2` from OpenAI, as well
    as other text generation mechanisms like `GPT3` and so on.


    It is essential to understand that there is a distinction between:


    1. Statistical techniques that come under probabilistic language models

    2. Language models that are built on neural networks


    As explained in the “n-grams” section, calculating the probabilities of n-grams
    results in the construction of a straightforward probabilistic language model
    (a) (an n-gram being an n-word sequence, n being an integer greater than 0). The
    likelihood of an n-gram can be defined as the conditional probability that the
    n-gram’s final word follows a specific n-1 gram (leaving out the last word). In
    everyday terms, it refers to the frequency of occurrence of the final word that
    comes after the n-1 gram that does not include the last word. Given the n-1 gram,
    which represents the present, the probabilities of the n-gram, which represents
    the future, do not depend on the n-2, n-3, etc. grams, which represent the past.
    This is an assumption made by Markov.


    There are obvious disadvantages associated with taking this method. The probability
    distribution of the following word is only influenced by the n words that came
    before it. This is the most essential point. Texts that are difficult to understand
    contain rich contexts, which can have a significant impact on the choice of the
    next word. Therefore, the identity of the following word might not be discernible
    from the n words that came before it, even if n is as high as 50.


    On top of that, it is obvious that this method does not scale well: the number
    of possible permutations skyrockets as the size of the dataset (n) increases,
    despite the fact that the majority of the variants never appear in the actual
    text. In addition, each and every occurring probability (or each and every n-gram
    count) needs to be computed and saved! Additionally, non-occurring n-grams cause
    a sparsity problem because the granularity of the probability distribution might
    be relatively low when there are so few of them (word probabilities have few different
    values; therefore, most of the words have the same probability).


    #### Neural Network–Based Language Models


    The manner in which neural network–based language models encode inputs makes it
    easier to deal with the sparsity problem. Embedding layers produce a vector of
    arbitrary size for each word, where the semantic links between the words is taken
    into account. These continuous vectors generate the granularity that is so desperately
    required in the probability distribution of the following word. In addition, the
    language model is basically a function (as are all neural networks, which include
    a great deal of matrix calculations), which means that it is not necessary to
    store all of the n-gram counts in order to construct the probability distribution
    of the next word.


    The sparsity problem can be solved using neural networks, but there is still a
    difficulty with the context. First, the process of developing language models
    consisted of finding ways to solve the context problem in an ever-increasingly
    effective manner. This was accomplished by bringing in ever-more context words
    in order to impact the probability distribution in an ever-more effective manner.
    Second, the objective was to design an architecture that would endow the model
    with the capability of discovering which phrases in a given context are more significant
    than others.


    Utilizing recurrent neural networks (described in the previous section) is a step
    in the right direction with regard to the topic of handling context. When selecting
    the following word, it takes into account all of the words that came before it
    because it is either an LSTM or a GRU cell-based network.


    The fact that RNN-based designs are sequential is the primary downside associated
    with using these kinds of models. Due to the absence of any opportunity for parallel
    processing, the amount of time required for training skyrockets when dealing with
    lengthy sequences. The transformer architecture is the answer to this predicament
    that you’re having. It is recommended that you read the original document that
    was produced by Google Brain.


    Additionally, OpenAI’s GPT models and Google’s BERT are utilizing the transformer
    design (which we will discuss in upcoming chapters). In addition to this, these
    models make use of a technique known as attention, which allows the model to discover
    which inputs, in particular circumstances, merit more attention than others.


    In terms of the architecture of models, the most significant quantum leaps were
    firstly made by RNNs (specifically LSTM and GRU), which solved the sparsity problem
    and allowed language models to use a great deal less disk space, and then, more
    recently, by the transformer architecture, which made parallelization possible
    and created attention mechanisms. Both of these developments were important. However,
    architecture is not the only domain in which a language model can demonstrate
    its prowess.


    OpenAI released few language models based on the transformer architecture. The
    first model was `GPT1`, and the latest one is `GPT3`. When contrasted with the
    architecture of `GPT1`, `GPT3` contains almost no innovative features. But it
    is massive. It was trained using the largest corpus a model has ever been trained
    on, which is known as the Common Crawl, and it has 175 billion different parameters.
    This is made possible in part by the semi-supervised training method of a language
    model, which allows for the use of a text as a training example while simultaneously
    omitting some words. The remarkable power of `GPT3` stems from the fact that it
    read virtually all of the text that has been published anywhere on the Internet
    over the course of the last few years and possesses the capacity to reflect the
    majority of the complexity that natural language possesses.'
