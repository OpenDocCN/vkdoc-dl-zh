    \ paper revolutionized the way the `NLP` domain would look like in the times to\
    \ come. Transformers and what is known as a sequence-to-sequence architecture\
    \ are described in this paper.\n\nA sequence-to-sequence (or `Seq2Seq`) neural\
    \ network is a neural network that converts one sequence of components into another,\
    \ such as the words in a phrase. (Considering the name, this should come as no\
    \ surprise.)\n\n`Seq2Seq` models excel at translation, which involves transforming\
    \ a sequence of words from one language into a sequence of other words in another.\
    \ Long Short-Term Memory (`LSTM`)–based neural network architectures are deemed\
    \ best for the sequence-to-sequence kind of requirements. The `LSTM` model has\
    \ a concept of forget gates via which it can also forget information, which it\
    \ doesn’t need to remember.\n\n## What Is a Seq2Seq Neural Network?\n\nA `Seq2Seq`\
    \ model is one that begins with a sequence of objects (such as words, letters,\
    \ or time series) and produces still another sequence of items as its output.\
    \ When it comes to neural machine translation, we need to provide an input sentence\
    \ in a specific language, and output should be the translated text in another\
    \ language.\n\nAs shown in Figure [2-1](#523273_1_En_2_Chapter.xhtml#Fig1), the\
    \ neural network based on the `Seq2Seq` architecture takes the word *learn* as\
    \ input and outputs the French translation of the word.\n\n![](images/523273_1_En_2_Chapter/523273_1_En_2_Fig1_HTML.png)\n\
    \nA representation of neural network form of `Seq2Seq` architecture which takes\
    \ up the input and output for the translation in French of the word *learn*.\n\
    \n**Figure 2-1**  \nFunction of a `Seq2Seq` network\n\nThe encoder and decoder\
