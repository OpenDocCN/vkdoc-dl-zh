    ### Code Comment Generator


    The goal of this section is to have some code as input and let the model generate
    comments for that code. In this case we will use the Salesforce CodeT5 model,
    which is fine-tuned on Java code.


    As its name suggests, the T5 encoder-decoder paradigm is the foundation upon which
    CodeT5 [1] is built. Instead of treating the source code like any other natural
    language (NL) text, it applies a new identifier-aware pretraining objective that
    capitalizes on code semantics. This is in contrast with previous code generation
    models, which rely on traditional pretraining methods.


    The authors distributed two pretrained models: a basic model with 220 million
    data points and a smaller model with only 60 million data points. In addition
    to that, they distributed all of their fine-tuning checkpoints through their public
    GCP bucket. Additionally, the well-known huggingface library makes both of these
    pretrained models available for use.


    CodeT5 is a unified pretrained encoder-decoder transformer model. The CodeT5 approach
    makes use of a unified framework, which not only facilitates multitask learning
    but also supports code interpretation and generation activities in an effortless
    manner.


    The pretraining of CodeT5 is accomplished in a sequential manner using two separate
    goals. The model is optimized with an identifier-aware denoising objective during
    the first 100 epochs. This trains the model to distinguish between identifiers
    (such as variable names, function names, etc.) and specific programming language
    (PL) keywords (e.g., `if`, `while`, etc.). Then, optimization is performed for
    a total of 50 iterations utilizing a bimodal dual generation goal. As a final
    goal, we want to make sure that the code and the NL descriptions are more aligned
    with one another.


    Since this example needs to download models from a non-huggingface repository
    (as of writing this book, the model was not updated on huggingface), we will do
    this example in Google Colab instead of huggingface.


    Create a new notebook in Colab.


    Before starting the comment generation code, we need to install the dependencies:


    ```

    !pip install -q git+https://github.com/huggingface/transformers.git

    ```


    Create a comment model directory:


    ```

    !mkdir comment_model

    %cd comment_model

    !wget -O config.json https://storage.googleapis.com/sfr-codet5-data-research/pretrained_models/codet5_base/config.json

    !wget -O pytorch_model.bin https://storage.googleapis.com/sfr-codet5-data-research/finetuned_models/summarize_java_codet5_base.bin

    from transformers import RobertaTokenizer, T5ForConditionalGeneration

    model_name_or_path = ''./comment_model''  #  Path to the folder created earlier.

    codeT5_tkn = RobertaTokenizer.from_pretrained(''Salesforce/codet5-base'')

    mdl = T5ForConditionalGeneration.from_pretrained(model_name_or_path)

    ```


    Provide code snippet as input:


    ```

    text = """ public static void main(String[] args) {

    int num = 29;

    boolean flag = false;

    for (int i = 2; i <= num / 2; ++i) {

    // condition for nonprime number

    if (num % i == 0) {

    flag = true;

    break;

    }

    }

    if (!flag)

    System.out.println(num + " is a prime number.");

    else

    System.out.println(num + " is not a prime number.");

    } """

    input_ids = codeT5_tkn(text, return_tensors="pt").input_ids

    gen_ids = mdl.generate(input_ids, max_length=20)

    print(codeT5_tkn.decode(gen_ids[0], skip_special_tokens=True))

    ```


