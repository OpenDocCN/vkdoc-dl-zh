    ## 代码与代码注释生成


    代码生成正迅速成为自然语言处理（NLP）领域的热门话题，与普遍看法相反，这并非空穴来风。OpenAI Codex 模型刚刚发布。如果你看过 Codex 的演示之一，就能观察到这些模型将如何影响未来软件编程的发展。由于预训练模型并未向公众开放，如果研究需求不仅仅是使用
    API 进行简单实验，那么从研究人员的角度来看，使用 Codex 模型几乎是不可能的。从技术上讲，利用已发表的论文复现 Codex 是可能的；但要做到这一点，你需要一个大型
    GPU 集群，而这是极少数人能够获得或负担得起的。我认为这一限制将使研究变得更加困难。想象一下，如果作者选择不公开预训练权重，那么可供我们使用的 BERT
    下游应用数量将会骤降。我们只能希望 Codex 不是目前唯一可用的代码生成范式。


    在本章中，我们将介绍 CodeGen，这是一个编码器-解码器代码生成模型，其预训练检查点已公开，你现在就可以进行测试。


    ### CodeGen


    CodeGen 是一种语言模型，能将简单的英文提示转换为可执行的代码。你无需自己编写代码，而是用自然语言描述代码应实现的功能，机器会根据你的描述为你编写代码。


    在由 Erik Nijkamp、Bo Pang、Hiroaki Hayashi、Lifu Tu、Huan Wang、Yingbo Zhou、Silvio Savarese
    和 Caiming Xiong 撰写的论文《A Conversational Paradigm for Program Synthesis》中，提出了一系列用于程序合成的自回归语言模型，称为
    CodeGen。这些模型最初以三种不同的预训练数据变体（NL、Multi 和 Mono）以及四种不同的模型大小变体（350M、2B、6B、16B）提供下载。


    在本章中，我们将探讨一些示例，展示如何使用 CodeGen 模型生成代码。我们将使用一个拥有 3.5 亿参数的小型 CodeGen 模型。


    ### 代码


    **app.py**


    ```python

    from transformers import AutoTokenizer, AutoModelForCausalLM

    import gradio as grad

    codegen_tkn = AutoTokenizer.from_pretrained("Salesforce/codegen-350M-mono")

    mdl = AutoModelForCausalLM.from_pretrained("Salesforce/codegen-350M-mono")

    def codegen(intent):

    # give input as text which reflects intent of the program.

    #text = " write a function which takes 2 numbers as input and returns the larger
    of the two"

    input_ids = codegen_tkn(intent, return_tensors="pt").input_ids

    gen_ids = mdl.generate(input_ids, max_length=128)

    response = codegen_tkn.decode(gen_ids[0], skip_special_tokens=True)

    return response

    output=grad.Textbox(lines=1, label="生成的 Python 代码", placeholder="")

    inp=grad.Textbox(lines=1, label="在此输入你的意图")

    grad.Interface(codegen, inputs=inp, outputs=output).launch()

    ```


