    ## Code and Code Comment Generation


    Code generation is quickly becoming a hot topic in the area of natural language
    processing (NLP), and contrary to popular belief, this is not just hype. The OpenAI
    Codex model was just made available. If you view one of the Codex demonstrations,
    you will be able to observe how these models will influence the development of
    software programming in the future. Since the pretrained models are not made available
    to the public, working with a Codex model can be impossible from the point of
    view of a researcher if the requirements go beyond simply experimenting with it
    using the API. Technically, it is possible to recreate Codex by using the published
    paper; but, in order to do so, you will need a big GPU cluster, which is something
    that very few people either have access to or can afford. I believe that this
    restriction will make it more difficult to do research. Imagine if the authors
    chose not to disclose the pretrained weights; the number of BERT downstream applications
    that would be available to us would plummet. We can only hope that Codex is not
    the only paradigm of code generation currently available.


    In this chapter, we will get an introduction to CodeGen, an encoder-decoder code
    generation model that features publicly available pretraining checkpoints that
    you can test out right now.


    ### CodeGen


    CodeGen is a language model that converts basic English prompts into code that
    can be executed. Instead of writing code yourself, you describe what the code
    should do using natural language, and the machine writes the code for you based
    on what you’ve described.


    In the paper “A Conversational Paradigm for Program Synthesis,” written by Erik
    Nijkamp, Bo Pang, Hiroaki Hayashi, Lifu Tu, Huan Wang, Yingbo Zhou, Silvio Savarese,
    and Caiming Xiong, there is a family of autoregressive language models for program
    synthesis called CodeGen. The models were first made available for download from
    this repository in three different pretraining data variations (NL, Multi, and
    Mono), as well as four different model size variants (350M, 2B, 6B, 16B).


    In this chapter we look into some examples, where we can use the CodeGen model
    to generate code. We will use a small CodeGen model with 350 million parameters.


    ### Code


    **app.py**


    ```python

    from transformers import AutoTokenizer, AutoModelForCausalLM

    import gradio as grad

    codegen_tkn = AutoTokenizer.from_pretrained("Salesforce/codegen-350M-mono")

    mdl = AutoModelForCausalLM.from_pretrained("Salesforce/codegen-350M-mono")

    def codegen(intent):

    # give input as text which reflects intent of the program.

    #text = " write a function which takes 2 numbers as input and returns the larger
    of the two"

    input_ids = codegen_tkn(intent, return_tensors="pt").input_ids

    gen_ids = mdl.generate(input_ids, max_length=128)

    response = codegen_tkn.decode(gen_ids[0], skip_special_tokens=True)

    return response

    output=grad.Textbox(lines=1, label="Generated Python Code", placeholder="")

    inp=grad.Textbox(lines=1, label="Place your intent here")

    grad.Interface(codegen, inputs=inp, outputs=output).launch()

    ```


