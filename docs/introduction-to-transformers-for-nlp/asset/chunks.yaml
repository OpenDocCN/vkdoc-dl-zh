- fmt: "### Why We Need Zero-Shot\n\n1. There is either no data at all or only a very\
    \ limited amount of data available for training (detection of the user’s intentions\
    \ without receiving any data from the user).\n2. There are an extremely high number\
    \ of classes and labels (thousands upon thousands).\n3. A classifier that works\
    \ “out of the box,” with reduced costs for both infrastructure and development.\n\
    \nWe will use the `pipeline` API first to see if we can just create a simple classifier\
    \ with zero-shot learning.\n\n**Code**\n\n**app.py**\n\n```python\nfrom transformers\
    \ import pipeline\nimport gradio as grad\n\nzero_shot_classifier = pipeline(\"\
    zero-shot-classification\")\n\ndef classify(text, labels):\n    classifer_labels\
    \ = labels.split(\",\")\n    # [\"software\", \"politics\", \"love\", \"movies\"\
    , \"emergency\", \"advertisment\", \"sports\"]\n    response = zero_shot_classifier(text,\
    \ classifer_labels)\n    return response\n\ntxt = grad.Textbox(lines=1, label=\"\
    English\", placeholder=\"text to be classified\")\nlabels = grad.Textbox(lines=1,\
    \ label=\"Labels\", placeholder=\"comma separated labels\")\nout = grad.Textbox(lines=1,\
    \ label=\"Classification\")\n\ngrad.Interface(classify, inputs=[txt, labels],\
    \ outputs=out).launch()\n```\n\n*Listing 5-9 Code for app.py*\n\n**requirements.txt**\n\
    \n```\ngradio\ntransformers\ntorch\ntransformers[sentencepiece]\n```\n\nCommit\
    \ the changes and wait for the status of deployment to get green. Post that click\
    \ the App tab in the menu to launch the application.\n\nProvide inputs to the\
    \ UI and click the Submit button to see the results as shown in Figure 5-20.\n\
    \n![Two dialog boxes for zero-shot classification. The English dialog box has\
    \ two fields, English and label and two buttons clear and submit. The classification\
    \ dialog box also has a text field.](images/523273_1_En_5_Chapter/523273_1_En_5_Fig20_HTML.png)\n\
    \n*Figure 5-20 Zero-shot classification*\n\nWe can see this text gets classified\
    \ under the sports category correctly.\n\nWe try another example as shown in Figure\
    \ 5-21.\n\n![Two dialog boxes for zero-shot classification. The English dialog\
    \ box has two fields, English and label and two buttons clear and submit. The\
    \ classification dialog box also has a text field.](images/523273_1_En_5_Chapter/523273_1_En_5_Fig21_HTML.png)\n\
    \n*Figure 5-21 Another example of zero-shot classification. The box labeled Classification\
    \ represents the scores/probabilities of individual classes*\n\nAnother way to\
    \ attain the same without the `pipeline` API is shown in the following.\n\n**Code**\n\
    \n**app.py**\n\n```python\nfrom transformers import BartForSequenceClassification,\
    \ BartTokenizer\nimport gradio as grad\n\nbart_tkn = BartTokenizer.from_pretrained('facebook/bart-large-mnli')\n\
    mdl = BartForSequenceClassification.from_pretrained('facebook/bart-large-mnli')\n\
    \ndef classify(text, label):\n    tkn_ids = bart_tkn.encode(text, label, return_tensors='pt')\n\
    \    tkn_lgts = mdl(tkn_ids)[0]\n    entail_contra_tkn_lgts = tkn_lgts[:,[0,2]]\n\
    \    probab = entail_contra_tkn_lgts.softmax(dim=1)\n    response = probab[:,1].item()\
    \ * 100\n    return response\n\ntxt = grad.Textbox(lines=1, label=\"English\"\
    , placeholder=\"text to be classified\")\nlabels = grad.Textbox(lines=1, label=\"\
    Label\", placeholder=\"Input a Label\")\nout = grad.Textbox(lines=1, label=\"\
    Probablity of label being true is\")\n\ngrad.Interface(classify, inputs=[txt,\
    \ labels], outputs=out).launch()\n```\n\n*Listing 5-10 Code for app.py*\n\n**requirements.txt**\n\
    \n```\ngradio\ntransformers\ntorch\n```\n\nCommit the changes and wait for the\
