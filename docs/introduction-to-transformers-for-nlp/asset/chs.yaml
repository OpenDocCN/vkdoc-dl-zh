- "# 使用 Gradio 应用进行摘要的两个对话框\n\n两个并排的对话框，用于通过 Gradio 应用进行摘要。英文和摘要对话框各有一个文本字段。\n\n**图\
  \ 5-18**\n\n通过 Gradio 应用对文本进行摘要\n\n我们可以看到，在代码中提供了以下参数：\n\n```\ntranslated_txt =\
  \ mdl.generate(**tokens,num_return_sequences=5,max_length=200,temperature=1.5,num_beams=10)\n\
  ```\n\n文本生成是通过使用束搜索（beam search）来实现的，`num_beams` 指的就是这个。与仅返回最有可能出现的下一个单词的贪婪搜索不同，此方法返回最有可能出现的\
  \ `n` 个单词。\n\n`Num_return_sequences` 返回输出的数量。在前面的示例中，我们将序列数设置为 `5`。\n\n改变由神经网络计算的输出分布，是使用温度函数的一个理由。根据公式\
  \ 5-1（温度函数），它被添加到 logits 向量中：\n\n`\U0001D45E\U0001D456 =exp(\U0001D467\U0001D456\
  /\U0001D447)/ ∑\U0001D457exp(\U0001D467\U0001D457/\U0001D447)` 公式 5-1\n\n其中 `\U0001D447\
  ` 是温度参数。\n\n你必须明白，这会导致整体概率发生变化。你可以随意选择任何你喜欢的 `T` 值（`T` 值越高，分布就越“平滑”；如果设置为 `1`，输出分布将与正常的\
  \ softmax 输出相同），但请记住，分布越平滑，`T` 值就应该越高。当我说模型的预测会变得“更平滑”时，我的意思是模型对其预测能力的信心会降低。随着参数\
  \ `T` 趋近于 `0`，分布的“难度”会增加。\n\n1. 示例“硬” softmax 概率：`[0.01,0.04,0.95]`\n2. 示例“平滑” softmax\
  \ 概率：`[0.15,0.25,0.6]`\n\n在上面的示例中，“a”是一个更硬的分布。你的模型对其预测表现出很高的置信度。另一方面，在大多数情况下，你可能不希望模型表现出这种行为。例如，如果你使用\
  \ RNN 生成文本，你基本上是从输出分布中抽取一个样本，并将该采样词用作输出 token（以及下一个输入）。如果你的模型具有很高的自信度，它可能会生成非常重复且不太有趣的文本。你希望它生成主题更多样化的文本，但它无法做到这一点，因为在采样过程中，大部分概率质量会集中在少数几个\
  \ token 上，因此你的模型会一遍又一遍地选择同一小部分词语。你可以引入温度变量来生成更多样化的文本，并让其他词也有机会被采样。这将达到同样的效果。\n\n\
  指数函数是导致较高温度产生更平坦分布的原因。这是因为该函数的工作原理。温度参数对较大的 logits 施加的负权重比施加在较小 logits 上的更大。指数函数被称为“递增函数”。因此，如果一个项已经相当显著，对其进行少量惩罚会使其（按百分比计算）比该项相对较小的情况下小得多。\n\
  \n对于更敏锐的用户，以下是关于 Pegasus 模型的简要介绍。\n\n## Pegasus\n\n在 Pegasus 系统的预训练阶段，会从源文档中删除几个完整的句子。然后，模型的任务是检索这些句子。文档中缺失的句子作为此类预训练的输入，而文档本身则作为输出。输入的文档被称为“输入文档”。这是一个自监督模型，在训练数据集中不需要任何标注。\n\
  \n### 零样本学习\n\n顾名思义，零样本学习是指使用在特定数据集上训练过的预训练模型，应用于训练期间未见过的不同数据集。举例来说，这意味着从 HuggingFace\
  \ 获取一个在特定数据集上训练的模型，并将其用于对从未见过的样本进行推理。\n\n#### 零样本文本分类\n\n众所周知，文本分类是自然语言处理中的一项任务，要求模型对文本文档所属的类别进行预测。在传统方法中，我们需要使用大量已标注的数据来训练模型。此外，它们无法使用未见过的数据进行预测。将零样本学习与文本分类相结合，在自然语言处理中已达到前所未有的复杂程度。\n\
  \n与零样本文本分类技术相关的任何模型的主要目标，都是在不使用任何标注数据或未见过任何标注文本的情况下对文本文档进行分类。这可以通过在未见任何标注文本的情况下对文档进行分类来实现。我们最常在\
  \ transformers 中找到零样本分类的实现。在 HuggingFace 库中，有超过 60 个基于零样本分类运行的 transformer 模型。\n\
  \n当我们讨论零样本文本分类时，还有一件事会浮现在脑海中。与零样本分类类似的是少样本分类，它与零样本分类非常相似。然而，与零样本分类不同，少样本分类在训练过程中使用了非常少的标注样本。少样本分类方法的实现可以在\
  \ OpenAI 中找到，其中 GPT3 分类器是少样本分类器的一个著名例子。\n\n\n\n### 为什么需要零样本学习\n\n1.  要么完全没有训练数据，要么只有非常有限的数据可用（在未收到用户任何数据的情况下检测用户意图）。\n\
  2.  类别和标签数量极其庞大（成千上万）。\n3.  需要一个“开箱即用”的分类器，以降低基础设施和开发成本。\n\n我们将首先使用 `pipeline` API，看看能否仅通过零样本学习就创建一个简单的分类器。\n\
  \n**代码**\n\n**app.py**\n\n```python\nfrom transformers import pipeline\nimport gradio\
  \ as grad\n\nzero_shot_classifier = pipeline(\"zero-shot-classification\")\n\ndef\
  \ classify(text, labels):\n    classifer_labels = labels.split(\",\")\n    # [\"\
  software\", \"politics\", \"love\", \"movies\", \"emergency\", \"advertisment\"\
  , \"sports\"]\n    response = zero_shot_classifier(text, classifer_labels)\n   \
  \ return response\n\ntxt = grad.Textbox(lines=1, label=\"English\", placeholder=\"\
  text to be classified\")\nlabels = grad.Textbox(lines=1, label=\"Labels\", placeholder=\"\
  comma separated labels\")\nout = grad.Textbox(lines=1, label=\"Classification\"\
  )\n\ngrad.Interface(classify, inputs=[txt, labels], outputs=out).launch()\n```\n\
