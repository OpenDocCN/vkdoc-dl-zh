  ## BERT 输入表示


  *   始终将序列中的第一个标记视为特殊的分类标记（也缩写为 `CLS`）。对于分类任务，将使用与该标记对应的最终隐藏状态。

  *   `[SEP]` 标记用于分隔两个句子之间的界限。

