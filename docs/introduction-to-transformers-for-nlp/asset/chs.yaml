  \n用于代码生成 Gradio 应用程序的两个对话框。英文对话框有一个字段以及“清除”和“提交”两个按钮。生成的文本框也有一个文本字段。\n\n**图 5-24**\
  \ 通过 Gradio 实现的代码生成应用程序\n\n接下来，我们将更改模型中的一个简单参数。\n\n我们再次稍微修改 `generate` 函数，如下所示。\n\
  \n\n\n```python\ndef generate(starting_text):\n    tkn_ids = gpt2_tkn.encode(starting_text,\
