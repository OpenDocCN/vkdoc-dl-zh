  )\ndef text2text_summary(para):\ninitial_txt = para.strip().replace(\"\\n\",\"\"\
  )\ntkn_text = text2text_tkn.encode(initial_txt, return_tensors=\"pt\")\ntkn_ids\
  \ = mdl.generate(\ntkn_text,\nmax_length=250,\nnum_beams=5,\nrepetition_penalty=2.5,\n\
