  \n生成模型表现出的贪婪程度与温度成正比。\n\n如果温度较低，除了具有最高对数概率的样本类别之外，其他样本类别的概率将会很低。因此，模型很可能会输出最正确的文本，但会相当单调，且变化很少。\n\
  \n如果温度较高，模型输出不同于最高概率词的其他词的可能性更大。生成的文本将包含更多样化的主题，但生成无意义文本和包含语法错误的可能性也会增加。\n\n我们再次修改\
