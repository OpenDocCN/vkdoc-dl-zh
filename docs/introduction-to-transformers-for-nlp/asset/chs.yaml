  \n### 代码注释生成器\n\n本节的目标是输入一些代码，让模型为这些代码生成注释。在此案例中，我们将使用 Salesforce CodeT5 模型，该模型针对\
  \ Java 代码进行了微调。\n\n顾名思义，T5 编码器-解码器范式是 CodeT5 [1] 构建的基础。与将源代码视为任何其他自然语言文本不同，它应用了一种新的、能识别标识符的预训练目标，充分利用了代码语义。这与依赖传统预训练方法的先前代码生成模型形成了对比。\n\
  \n作者发布了两个预训练模型：一个包含 2.2 亿数据点的基本模型，以及一个仅包含 6000 万数据点的较小模型。除此之外，他们还通过公共 GCP 存储桶发布了所有微调检查点。此外，著名的\
  \ huggingface 库使得这两个预训练模型均可使用。\n\nCodeT5 是一个统一的预训练编码器-解码器 Transformer 模型。CodeT5\
  \ 方法利用了一个统一框架，这不仅促进了多任务学习，还以轻松的方式支持代码解释和生成活动。\n\nCodeT5 的预训练是通过两个独立目标按顺序完成的。在前 100\
  \ 个 epoch 中，模型通过一个能识别标识符的去噪目标进行优化。这训练模型区分标识符（如变量名、函数名等）和特定编程语言的关键字（例如`if`、`while`等）。然后，利用双模态双重生成目标，总共进行\
  \ 50 次迭代优化。最终目标是确保代码与自然语言描述之间更加对齐。\n\n由于此示例需要从非 huggingface 仓库下载模型（在撰写本书时，该模型尚未在\
  \ huggingface 上更新），我们将在 Google Colab 中而非 huggingface 上执行此示例。\n\n在 Colab 中创建一个新的笔记本。\n\
  \n在开始注释生成代码之前，我们需要安装依赖项：\n\n```\n!pip install -q git+https://github.com/huggingface/transformers.git\n\
  ```\n\n创建一个注释模型目录：\n\n```\n!mkdir comment_model\n%cd comment_model\n!wget -O config.json\
  \ https://storage.googleapis.com/sfr-codet5-data-research/pretrained_models/codet5_base/config.json\n\
  !wget -O pytorch_model.bin https://storage.googleapis.com/sfr-codet5-data-research/finetuned_models/summarize_java_codet5_base.bin\n\
  from transformers import RobertaTokenizer, T5ForConditionalGeneration\nmodel_name_or_path\
  \ = './comment_model'  #  指向之前创建的文件夹的路径。\ncodeT5_tkn = RobertaTokenizer.from_pretrained('Salesforce/codet5-base')\n\
  mdl = T5ForConditionalGeneration.from_pretrained(model_name_or_path)\n```\n\n提供代码片段作为输入：\n\
  \n```\ntext = \"\"\" public static void main(String[] args) {\nint num = 29;\nboolean\
  \ flag = false;\nfor (int i = 2; i <= num / 2; ++i) {\n// condition for nonprime\
  \ number\nif (num % i == 0) {\nflag = true;\nbreak;\n}\n}\nif (!flag)\nSystem.out.println(num\
  \ + \" is a prime number.\");\nelse\nSystem.out.println(num + \" is not a prime\
  \ number.\");\n} \"\"\"\ninput_ids = codeT5_tkn(text, return_tensors=\"pt\").input_ids\n\
  gen_ids = mdl.generate(input_ids, max_length=20)\nprint(codeT5_tkn.decode(gen_ids[0],\
  \ skip_special_tokens=True))\n```\n\n**代码清单 5-31** 从源代码文件生成注释的代码\n\n我们得到以下输出：\n\n\
  ```\nA test program to check if the number is a prime number .\n```\n\n我们输入另一段文本并检查：\n\
  \n```\ntext = \"\"\" LocalDate localDate = new LocalDate(2020, 1, 31);\nint numberOfDays\
  \ = Days.daysBetween(localDate, localDate.plusYears(1)).getDays();\nboolean isLeapYear\
  \ = (numberOfDays > 365) ? true : false;\"\"\"\ninput_ids = codeT5_tkn(text, return_tensors=\"\
  pt\").input_ids\ngen_ids = mdl.generate(input_ids, max_length=150)\nprint(codeT5_tkn.decode(gen_ids[0],\
  \ skip_special_tokens=True))\n```\n\n输出：\n\n```\nReturns true if the year is a leap\
  \ year\n```\n\n接下来，我们尝试使用访问 Google 搜索 API 的代码。\n\n```\ntext = \"\"\"\nString google\
  \ = \"http://ajax.googleapis.com/ajax/services/search/web?v=1.0&q=\";\nString search\
  \ = \"stackoverflow\";\nString charset = \"UTF-8\";\nURL url = new URL(google +\
  \ URLEncoder.encode(search, charset));\nReader reader = new InputStreamReader(url.openStream(),\
  \ charset);\nGoogleResults results = new Gson().fromJson(reader, GoogleResults.class);\n\
  // Show title and URL of 1st result.\nSystem.out.println(results.getResponseData().getResults().get(0).getTitle());\n\
  System.out.println(results.getResponseData().getResults().get(0).getUrl());\n\"\"\
  \"\ninput_ids = codeT5_tkn(text, return_tensors=\"pt\").input_ids\ngen_ids = mdl.generate(input_ids,\
  \ max_length=50, temperature=0.2,num_beams=200,no_repeat_ngram_size=2,num_return_sequences=5)\n\
  print(codeT5_tkn.decode(gen_ids[0], skip_special_tokens=True))\n```\n\n**代码清单 5-32**\
  \ 尝试为 Google 搜索代码生成注释的代码\n\n输出结果为：\n\n```\nhttps://www. googleapis. com / ajax.\
  \ services. search. web?v = 1\\. 0 &q = 123 Show title and URL of 1st result.\n\
  ```\n\n最后一个结果可能看起来不太好，但可以通过调整特定参数来改进，这部分留给你去尝试。\n\n最后，这些预训练模型也可以针对特定的编程语言（如 C、C++等）进行微调。\n\
  \n## 总结\n\n在本章中，我们探讨了 Transformer 如何用于处理文本并将其应用于分类、翻译、摘要等各种任务的不同用例和实现。我们还了解了如何使用\
  \ huggingface API 轻松构建聊天机器人。\n\n在下一章中，我们将探讨 Transformer 如何应用于图像处理领域。\n\n\n\n"
- '# 6. 微调预训练模型


  到目前为止，我们已经了解了如何使用包含预训练模型的 Hugging Face API 来创建简单的应用程序。如果你能从头开始，仅使用自己的数据来训练模型，那岂不是妙不可言？


  如果你没有大量的空闲时间或充足的计算资源，利用迁移学习是最有效的策略。与从头开始训练模型相比，使用 Hugging Face 进行迁移学习有两个主要优势。


  正如我们在第 4 章中所述，像 GPT3 这样的模型需要巨大的基础设施资源才能进行训练。这超出了我们大多数人的能力范围。那么，我们如何才能以更灵活的方式使用这些模型，而不仅仅是下载预训练模型来使用呢？答案在于使用我们拥有的额外数据来微调这些模型。与从头开始训练一个完整的大型语言模型相比，这所需的资源非常少，并且更容易实现。


  将一个基础模型转变为能够生成可靠结果的模型，需要投入大量的时间和资源。由于迁移学习的存在，你可以省去繁琐的训练步骤，只需花费少量时间将数据集调整到满足你的特定需求。


  事实上，来自 Hugging Face 的预训练模型即使无需额外的微调，也能在各种领域的任务中表现出色。人们甚至可能可以在零样本学习场景中使用这些模型，但如果你有特定的数据集，那么我们的好朋友——Hugging
  Face API——为我们提供了微调这些现有模型所需的抽象接口。


  因此，在训练方面，我们基本上可以将迁移学习视为一种捷径。只需利用预训练语言模型，你就可以在计算需求方面节省数万美元和数千小时。除非你正在处理的任务极其特殊，无法使用现有模型解决，否则你应该坚持使用迁移学习。


  既然我们对迁移学习的应用和优势有了更好的理解，现在可以继续学习我们的 Hugging Face 微调指南了。


  微调的工作流程如下所示：


  -   从 Hugging Face 中选择一个适合你用例需求的预训练模型。

  -   额外的自定义数据集必须符合 Hugging Face 的数据集规范，因此我们需要预处理数据，使其符合所需的格式。

  -   将数据集上传到 Colab、S3 或任何其他存储位置。

  -   使用 Hugging Face 的 `Trainer` API 来微调现有模型。

  -   将模型保存到本地或上传到 Hugging Face 仓库。


  有了基本概念后，让我们开始使用 Hugging Face 库进行一些迁移学习。


  在微调阶段，大部分神经架构是被冻结的。这意味着我们只调整输出层的权重。由于我们已经在前面章节中介绍了分词器，这里将简要概述 Hugging Face 的数据集，这是本章最重要的概念。一旦我们理解了
  `Datasets` API，我们将继续通过迁移学习，为预训练模型使用自定义数据集。


  ## 数据集


  在本节中，我们将描述 Hugging Face 的基本数据集结构及其一些基本功能。


  在任何机器学习项目中，你所使用的数据都将至关重要。真正的准确性不仅来源于所用数据的数量，也来源于其质量，无论你使用的是何种算法或模型，这一点都成立。


  访问大型数据集有时可能是一项具有挑战性的工作。以适当的方式抓取、积累然后清理这些数据可能需要花费大量时间。幸运的是，对于对 NLP 以及图像和音频处理感兴趣的人来说，Hugging
  Face 附带了一个已准备好使用的中心化数据集仓库。在接下来的段落中，我们将简要了解如何使用这个数据集模块来为你的项目选择和准备合适的数据集。


  要安装数据集库，请使用以下命令：


  ```

  !pip install datasets

  ```


  在我们阅读数据集仓库的文档时，我们发现了几种主要方法。第一种方法是我们可以用来研究可用数据集列表的方法。你应该会看到有近 6800 个不同的数据集可供使用，所有这些数据集目前都是可用的：


  ```

  from datasets import list_datasets, load_dataset, list_metrics, load_metric

  # 打印所有可用的数据集

  print(len(list_datasets()))

  ```


  输出：


  ```


  ```


  加载一个数据集：


  ```

  dataset = load_dataset(''imdb'')

  ```


  打印数据集对象：


