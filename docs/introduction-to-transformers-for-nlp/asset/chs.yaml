  text = """

  观看过程挺有趣，但并没有给我留下太深印象，我觉得浪费了钱，爆米花、披萨、汉堡都白买了。

  阿克谢应该只拍喜剧片，这种国王类型的电影只适合有王者气质的演员，完全是浪费。

  """

  print(make_classification(text))

  ```


