- "# Gradio：简介\n\n`Gradio` 是一个专为部署和推理机器学习模型而构建的 Web 框架。`Gradio` 允许我们通过 Web 界面快速公开我们的机器学习模型，而无需学习太多编码知识。随着对\
  \ `Gradio` 的收购，Hugging Face 在为其社区提供便捷的界面来部署和提供 Hugging Face 模型的用户界面方面又迈进了一步。\n\n\
  在本章中，我们将利用 Hugging Face Spaces，它为我们提供了一个界面，可以快速部署我们的应用程序（使用 Hugging Face API 构建），并为其提供一个\
  \ Web 前端，最终用户可以使用该前端与我们的应用程序进行交互。\n\n## 在 Hugging Face 上创建 Space\n\n要在 Hugging Face\
  \ 基础设施上创建一个 Space，我们需要拥有一个 Hugging Face 账户。可以通过访问 [`https://huggingface.co/`](https://huggingface.co/)\
  \ 并在那里创建一个账户来完成。创建账户后，我们可以点击最右侧的彩色圆圈，如图 5-1 所示。\n\n![](img/523273_1_En_5_Fig1_HTML.jpg)\n\
  \n登录后 Hugging Face 界面的示意图。右上角有一个打开的菜单栏，从上到下依次标记为：个人资料、通知、添加新模型、新数据集、新 Space、设置和退出。\n\
  \n**图 5-1** 登录后的 Hugging Face 界面\n\n点击 `New space`，我们会看到一个如图 5-2 所示的界面。\n\n![](img/523273_1_En_5_Fig2_HTML.jpg)\n\
  \n创建新 Space 的界面。它包含所有者、Space 名称和许可证等字段。它还有 Space SDK 选项，例如 Streamlet、Gradio 和 static。\n\
  \n**图 5-2** 创建新 Space\n\n为你的 Space 提供一个名称，并选择 `Gradio` 作为 SDK。暂时将可见性保持为 `public`\
  \ 默认值，最后点击 `Create Space` 按钮。\n\n你将看到如图 5-3 所示的菜单。\n\n![](img/523273_1_En_5_Fig3_HTML.jpg)\n\
  \nHugging Face 网页上菜单的截图。它包含 Space 规格，如所有者名称和点赞数。从左到右有应用程序、文件和版本、社区和设置等选项。\n\n**图\
  \ 5-3** Hugging Face 网页上显示的菜单\n\n在本章的大多数应用程序中，我们将使用 `Files and versions` 和 `App`\
  \ 选项卡。\n\n点击 `Files and versions` 选项卡，在右侧我们会看到 `Add file`。点击它，我们可以添加应用程序所需的文件。\n\
  \n对于我们的应用程序，我们只需要创建两个文件：\n\n1.  `app.py`：这是 `Gradio` 应用程序主要代码的文件。\n2.  `requirements.txt`：此文件包含应用程序所需的\
  \ Python 依赖项。\n\n## Hugging Face 任务\n\n我们将从一个问答任务开始。\n\n### 问答\n\n模型的输入将是一个段落和该段落中的一个问题。模型推理的输出将是问题的答案。\n\
  \n我们使用的模型是在 SQuAD 数据集上训练的。\n\n斯坦福问答数据集，也称为 SQuAD，是一个阅读理解数据集，由众包工作者在一组维基百科文章上提出的问题组成。每个问题的答案都是来自相应阅读段落的一段文本（也称为跨度），或者该问题可能无法回答。\n\
  \nSQuAD 1.1 包含超过 100,000 个问答对，涵盖 500 多篇不同的文章。\n\n首先，使用 RoBERTa [base](https://huggingface.co/roberta-base)\
  \ 模型，并使用 [SQuAD 2.0](https://huggingface.co/datasets/squad_v2) 数据集进行微调。它已经在问答对（包括无法回答的问题）上进行了训练，用于问答任务。\n\
  \n模型使用的一些超参数包括：\n\n*   `batch_size`: 96\n*   `n_epochs`: 2\n*   `max_seq_len`: 386\n\
  *   `max_query_length`: 64\n\n首先，按照上一节中的步骤，使用 Hugging Face UI 创建一个新的 Space。\n\n\
  点击 UI 上的 `Files and versions` 选项卡。创建一个包含以下内容的 `requirements.txt` 文件：\n\n**requirements.txt**\n\
  \n```\ngradio\ntransformers\ntorch\n```\n\n创建另一个文件 `app.py`，并从清单 5-1 中复制内容。\n\n\
  ```\nfrom transformers import AutoModelForQuestionAnswering, AutoTokenizer, pipeline\n\
  import gradio as grad\nimport ast\nmdl_name = \"deepset/roberta-base-squad2\"\n\
  my_pipeline = pipeline('question-answering', model=mdl_name, tokenizer=mdl_name)\n\
  def answer_question(question,context):\ntext= \"{\"+\"'question': '\"+question+\"\
  ','context': '\"+context+\"'}\"\ndi=ast.literal_eval(text)\nresponse = my_pipeline(di)\n\
