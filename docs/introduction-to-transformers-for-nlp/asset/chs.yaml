  ## 总结


  在本章中，我们讨论了 huggingface 库的架构及其组件，例如分词器和模型。我们还学习了如何使用这些组件来执行简单的任务，例如分析句子的情感。在下一章中，我们将通过更多示例来学习如何使用
  Transformers 库执行不同类型的任务。


