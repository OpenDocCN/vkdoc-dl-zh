  return response\npara=grad.Textbox(lines=10, label=\"段落\", placeholder=\"复制段落\"\
  )\nout=grad.Textbox(lines=1, label=\"摘要\")\ngrad.Interface(text2text_summary, inputs=para,\
  \ outputs=out).launch()\n```\n代码清单 5-21 `app.py` 代码\n\n**requirements.txt**\n\n\
