  \ 对话框有两个字段：English 和 label，以及两个按钮。Classification 对话框也有一个文本字段。](img/523273_1_En_5_Fig21_HTML.png)\n\
  \n*图 5-21 零样本分类的另一个示例。标记为“Classification”的框显示了各个类别的得分/概率*\n\n另一种不使用 `pipeline` API\
  \ 实现相同功能的方法如下所示。\n\n**代码**\n\n**app.py**\n\n```python\nfrom transformers import\
  \ BartForSequenceClassification, BartTokenizer\nimport gradio as grad\n\nbart_tkn\
  \ = BartTokenizer.from_pretrained('facebook/bart-large-mnli')\nmdl = BartForSequenceClassification.from_pretrained('facebook/bart-large-mnli')\n\
  \ndef classify(text, label):\n    tkn_ids = bart_tkn.encode(text, label, return_tensors='pt')\n\
  \    tkn_lgts = mdl(tkn_ids)[0]\n    entail_contra_tkn_lgts = tkn_lgts[:,[0,2]]\n\
  \    probab = entail_contra_tkn_lgts.softmax(dim=1)\n    response = probab[:,1].item()\
  \ * 100\n    return response\n\ntxt = grad.Textbox(lines=1, label=\"English\", placeholder=\"\
  text to be classified\")\nlabels = grad.Textbox(lines=1, label=\"Label\", placeholder=\"\
  Input a Label\")\nout = grad.Textbox(lines=1, label=\"Probablity of label being\
  \ true is\")\n\ngrad.Interface(classify, inputs=[txt, labels], outputs=out).launch()\n\
  ```\n\n*代码清单 5-10 app.py 代码*\n\n**requirements.txt**\n\n```\ngradio\ntransformers\n\
  torch\n```\n\n提交更改，等待部署状态变为绿色。之后，点击菜单中的“App”选项卡启动应用程序。\n\n在 UI 中提供输入，然后点击“Submit”按钮查看结果，如图\
  \ 5-22 所示。\n\n![零样本分类的两个对话框。English 对话框有两个字段：English 和 label，以及两个按钮。另一个对话框有一个字段显示标签为真的概率。](img/523273_1_En_5_Fig22_HTML.png)\n\
  \n*图 5-22 用于零样本分类的 Gradio 应用*\n\n这同样将文本正确分类到了“sports”类别下。\n\n\n\n### 文本生成任务/模型\n\
  \n文本生成模型的发展始于几十年前，远早于近期深度学习热潮的兴起。这类模型需要能够根据给定的文本片段，对特定单词或单词序列做出准确预测。当输入一段文本时，模型会在搜索空间中导航，从单词的联合分布中生成下一个最可能单词的概率。\n\
  \n最早的文本生成模型基于马尔可夫链。马尔可夫链类似于一个状态机，仅利用前一个状态来预测下一个状态。这与我们在二元语法中研究的内容类似。\n\n在马尔可夫链之后，引入了能够保留更大文本上下文的循环神经网络（RNN）。它们基于具有循环特性的神经网络架构。RNN\
  \ 能够保留所引入文本的更大上下文。然而，这类网络能够记住的信息量是有限的，并且训练它们也很困难，这意味着它们在生成长文本时效果不佳。为了解决 RNN 的这个难题，演化出了\
  \ LSTM 架构，它能够捕捉文本中的长期依赖关系。最后，我们迎来了 Transformer，其解码器架构在用于生成文本的生成模型中变得非常流行。\n\n在本节中，我们将重点介绍\
  \ GPT2 模型，并了解如何使用 Hugging Face API 来调用 GPT2 模型执行生成任务。这将使我们能够使用预训练模型生成文本，并在需要时使用自定义文本数据集对其进行微调。\n\
  \n### 代码\n\n#### `app.py`\n\n```python\nfrom transformers import GPT2LMHeadModel,GPT2Tokenizer\n\
  import gradio as grad\nmdl = GPT2LMHeadModel.from_pretrained('gpt2')\ngpt2_tkn=GPT2Tokenizer.from_pretrained('gpt2')\n\
  def generate(starting_text):\ntkn_ids = gpt2_tkn.encode(starting_text, return_tensors\
  \ = 'pt')\ngpt2_tensors = mdl.generate(tkn_ids)\nresponse = gpt2_tensors\nreturn\
  \ response\ntxt=grad.Textbox(lines=1, label=\"English\", placeholder=\"English Text\
  \ here\")\nout=grad.Textbox(lines=1, label=\"Generated Tensors\")\ngrad.Interface(generate,\
  \ inputs=txt, outputs=out).launch()\nListing 5-11\nCode for app.py\n```\n\n####\
  \ `requirements.txt`\n\n```\ngradio\ntransformers\ntorch\n```\n\n提交更改，等待部署状态变为绿色。之后，点击菜单中的“App”选项卡启动应用程序。\n\
  \n向用户界面提供输入，然后点击“Submit”按钮查看结果，如图 5-23 所示。\n\n![](img/523273_1_En_5_Fig23_HTML.png)\n\
  \n用于英文文本张量生成的两个对话框。英文对话框有一个字段以及“清除”和“提交”两个按钮。生成的张量对话框也有一个文本字段。\n\n**图 5-23** 英文文本的张量\n\
  \n接下来，我们在 `generate` 函数中解码这些张量。\n\n```python\ndef generate(starting_text):\ntkn_ids\
  \ = gpt2_tkn.encode(starting_text, return_tensors = 'pt')\ngpt2_tensors = mdl.generate(tkn_ids)\n\
  response=\"\"\n#response = gpt2_tensors\nfor i, x in enumerate(gpt2_tensors):\n\
  response=response+f\"{i}: {gpt2_tkn.decode(x, skip_special_tokens=True)}\"\nreturn\
  \ response\nListing 5-12\nGenerate function\n```\n\n我将输入另一段文本进行检查。\n\n提交更改，等待部署状态变为绿色。之后，点击菜单中的“App”选项卡启动应用程序。\n\
