  \n图 5-31：后台使用 GPT2 模型进行文本生成\n\n### 文本到文本生成\n\n在本节中，我们将介绍使用 T5 模型进行文本到文本生成。\n\n一种基于\
  \ Transformer 架构、采用文本到文本方法的模型被称为 T5，即 Text-to-Text Transfer Transformer（文本到文本转换\
  \ Transformer）。\n\n在文本到文本方法中，我们将问答、分类、摘要、代码生成等任务转化为一个问题，为模型提供某种形式的输入，然后教会它生成某种形式的目标文本。这使得我们可以将相同的模型、损失函数、超参数和其他设置应用于我们所有不同的任务集。\n\
  \nT5 模型由 Google Research 开发并公开发布，它对先前的研究做出了以下贡献：\n\n1.  它生成了一个更干净的巨型 Common Crawl\
  \ 数据集版本，称为 Colossal Cleaned Common Crawl (C4)。该数据集比 Wikipedia 大约大 100,000 倍。\n2.\
  \  它在 Common Crawl 上为 T5 准备了主体。\n3.  它提出将每一个 NLP 任务重新思考为从输入文本到输出文本的表述。\n4.  它证明了通过利用预训练的\
  \ T5 和文本到文本的表述，在摘要、问答和阅读理解等多种任务上进行微调，可以达到最先进的结果。\n5.  此外，T5 团队还进行了深入研究，以了解预训练和微调的最有效方法。在他们的论文中，他们详细说明了哪些参数对于获得理想结果最为重要。\n\
  \n**代码**\n\n**app.py**\n\n```python\nfrom transformers import AutoModelWithLMHead,\
  \ AutoTokenizer\nimport gradio as grad\ntext2text_tkn = AutoTokenizer.from_pretrained(\"\
  mrm8488/t5-base-finetuned-question-generation-ap\")\nmdl = AutoModelWithLMHead.from_pretrained(\"\
  mrm8488/t5-base-finetuned-question-generation-ap\")\ndef text2text(context,answer):\n\
  input_text = \"answer: %s  context: %s \" % (answer, context)\nfeatures = text2text_tkn\
  \ ([input_text], return_tensors='pt')\noutput = mdl.generate(input_ids=features['input_ids'],\n\
  attention_mask=features['attention_mask'],\nmax_length=64)\nresponse=text2text_tkn.decode(output[0])\n\
  return response\ncontext=grad.Textbox(lines=10, label=\"English\", placeholder=\"\
  Context\")\nans=grad.Textbox(lines=1, label=\"Answer\")\nout=grad.Textbox(lines=1,\
  \ label=\"Genereated Question\")\ngrad.Interface(text2text, inputs=[context,ans],\
  \ outputs=out).launch()\n```\n\n代码清单 5-20：`app.py` 代码\n\n**requirements.txt**\n\n\
  ```\ngradio\ntransformers\ntorch\ntransformers[sentencepiece]\n```\n\n提交更改，等待部署状态变为绿色。之后，点击菜单中的\
  \ App 选项卡启动应用程序。\n\n在 UI 中输入内容，点击 Submit 按钮查看结果，如图 5-32 所示。\n\n![](img/523273_1_En_5_Fig33_HTML.png)\n\
