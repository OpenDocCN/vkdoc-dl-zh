  \ AI 开发者/研究人员达成共识，所有生成的内容都应带有此水印。\n\n### 为视频着色与增强\n\nDeOldify 不仅能为图像着色，还能处理视频。用于视频着色的特定模型变体称为*简单视频*，它自身进行了一些改进。虽然视频模型基于\
