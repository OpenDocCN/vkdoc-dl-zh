  \n图 8-12 ArtLine 的示例输出\n\nDeOldify 是一个很好的例子，展示了生成式建模如何变得对研究机构之外的人也可用。它展示了一位敏锐的程序员如何独立扩展模型，以产生一些重要且令人兴奋的结果。我们当然可以期待未来有更多像\
  \ DeOldify 这样的项目，在下一节中，我们将探讨另一个类似的计划，名为 ArtLine。\n\n\n\n## 用 ArtLine 展现艺术风格\n\n\
  `ArtLine` 是另一个旨在将照片转换为线条艺术画作，并将其转化为卡通版本的项目。该项目遵循了 `Antic` 在构建 `DeOldify` 时使用的许多相同发现。这两个项目都基于\
  \ `Fast.ai` 团队开发的许多改进/实用工具。\n\n从技术上讲，`ArtLine` 与 `DeOldify` 类似，都基于一个自注意力生成对抗网络（self-attention\
  \ GAN），该网络会逐步调整大小以达到所需分辨率。它同样以 NoGAN 的方式进行训练，其中初始生成器特征损失由预训练的 VGG 模型确定，这与我们在第 6\
  \ 章的示例中所做的非常相似。然而，与 `DeOldify` 不同的是，`ArtLine` 不使用判别器来微调特征提取，因此它从未作为 GAN 进行训练。\n\n\
  正如我们将看到的，`ArtLine` 的结果在人像和面部方面表现良好，但在其他类型的照片上效果稍逊。不过，看看这种 NoGAN 形式在各种图像上的表现可能会很有趣，我们将在练习\
  \ 8-5 中看到这一点。我们将再次使用直接从仓库中拉取的项目源代码，并在笔记本中运行它。\n\n### 练习 8-5. 用 ArtLine 展现艺术风格\n\n\
  1. 从 GitHub 项目站点打开 `GEN_8_ArtLine.ipynb` 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2. 在使用 `ArtLine`\
  \ 展现艺术风格之前，此笔记本同样需要下载、安装并重启。因此，在安装 `requirements.txt` 文件后，您可能需要重启运行时，如下面的代码块所示：\n\
  \n3. 如果在笔记本的后续部分遇到错误，请确保已通过从菜单中选择 **运行时 ➤ 重启运行时** 来重启运行时。\n\n4. 此笔记本的 `imports`\
  \ 块对各种组件进行了广泛的安装。与 `DeOldify` 不同，该项目有一些要求需要在类中描述特征损失。\n\n5. 向下滚动到 `FeatureLoss`\
  \ 类，查看模型如何确定特征之间的损失。`ArtLine` 模型使用此类来评估模型内部的特征训练。\n\n```\nclass FeatureLoss(nn.Module):\n\
  \    def __init__(self, m_feat, layer_ids, layer_wgts):\n        super().__init__()\n\
  \        self.m_feat = m_feat\n        self.loss_features = [self.m_feat[i] for\
  \ i in layer_ids]\n        self.hooks = hook_outputs(self.loss_features, detach=False)\n\
  \        self.wgts = layer_wgts\n        self.metric_names = ['pixel',] + [f'feat_{i}'\
  \ for i in range(len(layer_ids))] + [f'gram_{i}' for i in range(len(layer_ids))]\n\
  \    def make_features(self, x, clone=False):\n        self.m_feat(x)\n        return\
  \ [(o.clone() if clone else o) for o in self.hooks.stored]\n    def forward(self,\
  \ input, target):\n        out_feat = self.make_features(target, clone=True)\n \
  \       in_feat = self.make_features(input)\n        self.feat_losses = [base_loss(input,target)]\n\
  \        self.feat_losses += [base_loss(f_in, f_out)*w for f_in, f_out, w in zip(in_feat,\
  \ out_feat, self.wgts)]\n        self.feat_losses += [base_loss(gram_matrix(f_in),\
  \ gram_matrix(f_out))*w**2 * 5e3 for f_in, f_out, w in zip(in_feat, out_feat, self.wgts)]\n\
  \        self.metrics = dict(zip(self.metric_names, self.feat_losses))\n       \
  \ return sum(self.feat_losses)\n    def __del__(self): self.hooks.remove()\n```\n\
  \n6. 在此类内部，您可以调整一个超参数，该参数将特征损失缩放回模型中。该常量显示为 `5e3`，您可以更改此值以确定其对最终输出的影响。\n\n7. 接下来，我们可以看到如何使用以下代码下载预训练的\
  \ `ArtLine` 模型：\n\n```\nMODEL_URL = \"https://www.dropbox.com/s/starqc9qd2e1lg1/ArtLine_650.pkl?dl=1\"\
  \nurllib.request.urlretrieve(MODEL_URL, \"ArtLine_650.pkl\")\npath = Path(\".\"\
  )\nlearn=load_learner(path, 'ArtLine_650.pkl')\n```\n\n8. 为了使用该模型，我们再次设置了一个表单，允许您浏览各种图像。对于此示例，我们有两个数据集：我们在上一个练习中使用的\
