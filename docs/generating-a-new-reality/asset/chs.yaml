  \n**图 2-11** 在 MNIST 上训练 GAN\n\n理解 GAN 的另一个关键区别在于，图像完全是由随机噪声生成的。请记住，我们生成器的输入只是随机噪声。随着时间的推移，生成器学会了将这些噪声转换为逼真的数字。请记住，这些数字并非绘制而成，而是从无到有生成的。\n\
  \n一旦掌握了 GAN 的基础知识，你就能开始理解它生成任何内容的潜力。事实上，GAN 的应用和变体数量正与日俱增。在下一节中，我们将探讨对原始 GAN 的初步改进。\n\
  \n## 深度卷积生成对抗网络\n\n深度卷积生成对抗网络（DCGAN）通过添加卷积层，是对原始 GAN 的初步改进。就像我们之前在自编码器中添加卷积一样，架构的变化几乎完全相同。这意味着编码器/判别器将进行卷积并提取特征，而解码器/生成器将进行转置卷积以构建特征。\n\
  \nDCGAN 在训练方面与其他特征几乎相同，唯一的例外是我们可能会改变随机噪声的输入大小。我们可以使用相同的代码基础，并在下一个练习中将其升级为 DCGAN。通过这次升级，我们还需要增加输入图像的尺寸。更大的图像允许进行更多的卷积应用，从而提取更多特征。\n\
  \n在练习 2-5 中，我们有三个真实训练数据集选项可供判别器使用。我们理想的数据集是 CelebA 数据集，这是一个名人面孔的集合。然而，CelebA 是一个繁忙的数据集，并不总是能够下载到。因此，我们还提供了其他几个选项，例如\
  \ CIFAR10 和 STL10。STL10 数据集与 CIFAR 相同，但图像尺寸更大。\n\n**练习 2-5. 使用 DCGAN 生成人脸**\n\n\
  ![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig12_HTML.jpg](img/502181_1_En_2_Fig12_HTML.jpg)\n\
  \n**图 2-12** CelebA 样本人脸\n\n1.  从项目的 GitHub 站点打开 `GEN_2_DCGAN.ipynb` 笔记本。从菜单中选择“运行”\
  \ ➤ “全部运行”以运行整个工作表。\n\n2.  导入部分与上一个练习几乎相同，只有一个关键区别。我们将数据集导入抽象为 `DS`，以便我们可以轻松地在 CelebA、CIFAR10\
  \ 或 STL10 之间切换数据源。如果你想使用不同的数据集，请更改导入的数据集。\n\n```python\nfrom torchvision.datasets\
  \ import CelebA as DS  #其他选项 CIFAR10, STL10\n```\n\n3.  下一个主要变化是我们应用于输入数据集的变换。对于此数据的导入，我们将数据变换为此版本的\
  \ `image_size`（`64`）。然后我们使用 `CenterCrop` 裁剪图像，最后对其进行归一化。\n\n```python\ntransform=transforms.Compose([\n\
  \    transforms.Resize(image_size),\n    transforms.CenterCrop(image_size),\n  \
  \  transforms.ToTensor(),\n    transforms.Normalize((0.5, 0.5, 0.5), (0.5, 0.5,\
  \ 0.5)),\n])\n```\n\n4.  图 2-12 展示了数据加载输出的摘录，以及真实图像的输出。\n\n5.  接下来，我们来看更新后的 `Generator`\
  \ 类。我们可以看到输入已更新，包含了一个名为 `feature_maps` 的新输入。`feature_maps` 输入设置了我们在卷积层之间传递的通道数。你可以将此数字视为一个超参数，用于在其他数据集上进行调优。此外，还新增了一种名为\
  \ `BatchNorm2d` 的层类型。这种新层会在数据通过时对其进行重新归一化，这是一种限制损失梯度过大或过小的方法。\n\n随着网络层数加深，损失梯度变得过小或过大的可能性会更高。这被称为*梯度消失*或*梯度爆炸*。通过在数据通过网络时对其进行归一化，我们可以将权重参数保持在接近零的值，从而避免梯度消失/爆炸。这样做的一个额外好处是提高了训练性能。\n\
  \n\n\n```python\nclass Generator(nn.Module):\n    def __init__(self, latent_dim=100,\
  \ feature_maps=64, channels=3):\n        super(Generator, self).__init__()\n   \
  \     self.main = nn.Sequential(\n            nn.ConvTranspose2d(latent_dim, feature_maps\
  \ * 8, 4, 1, 0, bias=False),\n            nn.BatchNorm2d(feature_maps * 8),\n  \
  \          nn.ReLU(True),\n            nn.ConvTranspose2d(feature_maps * 8, feature_maps\
  \ * 4, 4, 2, 1, bias=False),\n            nn.BatchNorm2d(feature_maps * 4),\n  \
  \          nn.ReLU(True),\n            nn.ConvTranspose2d(feature_maps * 4, feature_maps\
  \ * 2, 4, 2, 1, bias=False),\n            nn.BatchNorm2d(feature_maps * 2),\n  \
  \          nn.ReLU(True),\n            nn.ConvTranspose2d(feature_maps * 2, feature_maps,\
  \ 4, 2, 1, bias=False),\n            nn.BatchNorm2d(feature_maps),\n           \
  \ nn.ReLU(True),\n            nn.ConvTranspose2d(feature_maps, channels, 4, 2, 1,\
  \ bias=False),\n            nn.Tanh()\n        )\n\n    def forward(self, input):\n\
  \        return self.main(input)\n```\n\n1.  从生成器出发，我们可以继续讨论更新后的判别器。在很大程度上，这将类似于我们之前练习中构建的分类器和编码器。请注意，在这个示例中，判别器更深且拥有更多层，我们之所以能做到这一点，是因为基础图像的尺寸是\
  \ 64×64。输入网络的基础图像越大，我们就能使用越多的卷积层来提取特征。\n\n```python\nclass Discriminator(nn.Module):\n\
  \    def __init__(self, feature_maps=64, channels=3):\n        super(Discriminator,\
  \ self).__init__()\n        self.main = nn.Sequential(\n            nn.Conv2d(channels,\
  \ feature_maps, 4, 2, 1, bias=False),\n            nn.LeakyReLU(0.2, inplace=True),\n\
  \            nn.Conv2d(feature_maps, feature_maps * 2, 4, 2, 1, bias=False),\n \
  \           nn.BatchNorm2d(feature_maps * 2),\n            nn.LeakyReLU(0.2, inplace=True),\n\
  \            nn.Conv2d(feature_maps * 2, feature_maps * 4, 4, 2, 1, bias=False),\n\
  \            nn.BatchNorm2d(feature_maps * 4),\n            nn.LeakyReLU(0.2, inplace=True),\n\
  \            nn.Conv2d(feature_maps * 4, feature_maps * 8, 4, 2, 1, bias=False),\n\
  \            nn.BatchNorm2d(feature_maps * 8),\n            nn.LeakyReLU(0.2, inplace=True),\n\
  \            nn.Conv2d(feature_maps * 8, 1, 4, 1, 0, bias=False),\n            nn.Sigmoid()\n\
  \        )\n\n    def forward(self, input):\n        return self.main(input)\n```\n\
  \n2.  其余代码与原始 GAN 的代码几乎相同，只有一个细微差别。在 DCGAN 中，我们使用一种略有不同的方法来构建输入噪声，如下所示：\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig13_HTML.jpg](img/502181_1_En_2_Fig13_HTML.jpg)\n\
