  \n```python\nfor batch_idx, (images, masks, _) in enumerate(train_loader):\n   \
  \ images = Variable(images.cuda())\n    masks = Variable(masks.cuda())\n    optimizer.zero_grad()\n\
  \    outputs = model(images)\n    predicted = outputs.round()\n    loss = loss_fn(outputs,\
  \ masks)\n    loss.backward()\n    optimizer.step()\n```\n\n4.  基于这段代码，你可以看到损失是根据模型输出与输入图像掩码之间的\
  \ BCE 差异计算的。因此，与自编码器（我们训练图像输出图像）不同，在这种情况下，我们训练图像输出图像掩码，从而要求模型学习从图像到掩码的映射。\n\n现在，我们有意暂时不解释`UNet`模型，以展示此示例与自编码器之间的相似性。这里的关键区别在于，损失是基于配对的图像掩码而非原始图像计算的。这使得模型能够学习从图像到掩码的转换。在下一节中，我们将详细探讨`UNet`如何实现这一点。\n\
  \n### 揭示 UNet 的细节\n\n简单来说，`UNet`是一种转换器，它允许将输入图像转换为输出，这与自编码器并无不同。`UNet`与自编码器之间的关键区别在于卷积块的使用方式及其连接方式。除此之外，该模型应该感觉像自编码器，但存在一些关键差异。\n\
  \n当然，为了更好地理解这一点，我们应该回到上一个练习中的代码，更详细地查看`UNet`模型。请参见练习 5-2。\n\n**练习 5-2. 探索 UNET 模型**\n\
  \n1.  从 GitHub 项目站点打开`GEN_5_UNet.ipynb`笔记本。如果不确定如何操作，请查阅附录 B。\n\n2.  如果尚未运行，请选择**运行时**\
  \ ➤ **全部运行**来运行整个笔记本。\n\n3.  向下滚动到定义`UNet`模型的位置，双击单元格以显示代码。我们将从查看`ConvBlock`类开始，这是一个用于封装卷积层的辅助类。其中包括权重的初始化。\n\
  \n```python\nclass ConvBlock(nn.Module):\n    def __init__(self, in_channels, out_channels):\n\
  \        super().__init__()\n        self.conv = nn.Conv2d(in_channels, out_channels,\
  \ 3, padding=1)\n        init.xavier_uniform(self.conv.weight, gain=np.sqrt(2))\n\
  \        self.batch_norm = nn.BatchNorm2d(out_channels)\n        self.leaky_relu\
  \ = nn.LeakyReLU(0.01)\n\n    def forward(self, x):\n        x = self.conv(x)\n\
  \        x = self.batch_norm(x)\n        x = self.leaky_relu(x)\n        return\
  \ x\n```\n\n4.  现在转到`UNet`类的开头，查看网络的初始化。注意我们如何定义三个`down`超级层：`down1`、`down2`和`down3`。这些层由`ConvBlock`组成，将通道从较低数量转换为较高数量。它们从\
  \ 3 开始，然后是 32、64，最后到 128。\n\n在中间层之后，还有三个超级层`up1`、`up2`和`up3`，用于将结果上采样回单个通道。从 128\
  \ 开始，它们首先上采样到 256，然后到 128，最后到 64。这里的关键区别在于，上采样层不仅仅是向上移动单个值，而是将前一层的值组合起来。当我们查看`forward`函数时，这一点将变得更加明显。\n\
  \n```python\nclass UNet(nn.Module):\n    def __init__(self):\n        super().__init__()\n\
  \        self.down1 = nn.Sequential(\n            ConvBlock(3, 32),\n          \
  \  ConvBlock(32, 32)\n        )\n        self.down2 = nn.Sequential(\n         \
  \   ConvBlock(32, 64),\n            ConvBlock(64, 64)\n        )\n        self.down3\
  \ = nn.Sequential(\n            ConvBlock(64, 128),\n            ConvBlock(128,\
  \ 128)\n        )\n        self.middle = ConvBlock(128, 128)\n        self.up3 =\
  \ nn.Sequential(\n            ConvBlock(256, 256),\n            ConvBlock(256, 64)\n\
  \        )\n        self.up2 = nn.Sequential(\n            ConvBlock(128, 128),\n\
  \            ConvBlock(128, 32)\n        )\n        self.up1 = nn.Sequential(\n\
  \            ConvBlock(64, 64),\n            ConvBlock(64, 1)\n        )\n```\n\n\
  5.  在下面的`forward`函数中，你可以看到`UNet`的所有部分是如何组装起来的。从这段代码中，你可以看到前三个`down`层是如何按顺序连接在一起的：`down1`\
  \ > `down2` > `down3` > `middle`。\n\n```python\ndef forward(self, x):\n    down1\
  \ = self.down1(x)\n    out = F.max_pool2d(down1, 2)\n    down2 = self.down2(out)\n\
  \    out = F.max_pool2d(down2, 2)\n    down3 = self.down3(out)\n    out = F.max_pool2d(down3,\
  \ 2)\n    out = self.middle(out)\n    out = Upsample(scale_factor=2)(out)\n    out\
  \ = torch.cat([down3, out], 1)\n    out = self.up3(out)\n    out = Upsample(scale_factor=2)(out)\n\
  \    out = torch.cat([down2, out], 1)\n    out = self.up2(out)\n    out = Upsample(scale_factor=2)(out)\n\
  \    out = torch.cat([down1, out], 1)\n    out = self.up1(out)\n    out = torch.sigmoid(out)\n\
  \    return out\n```\n\n\n6. 在中间层之后，我们进入上采样阶段：将中间层的输出与`down3`通过`torch.cat`合并，然后传入`up3`。此过程持续进行，使得\
  \ `middle => out`，`(out, down3) -> up3 => out`，`(out, down2)-> up2 => out`，`(out,\
  \ down1) -> up1 => out`。本质上，在向上传递的每一轮中，我们都会将结果与对应的下采样层合并。这自然会在上采样时复用下采样层中已训练好的特征。\n\
  \n7. 此时，请尝试修改一些超参数，观察这对模型输出有何影响。\n\n8. 尝试修改 UNet 的架构。试着改变每个超级层作为输入或输出使用的通道数。务必考虑在通过上采样层时合并操作的影响。\n\
  \n虽然 U 型网络仍然通过将输入循环回模型来使用卷积提取特征，但我们可以训练出更好的生成器，使其利用相同的已学习特征提取方法。在本章的剩余部分，我们将探讨 UNet\
  \ 如何增强我们的生成器，尤其是在图像到图像的生成任务中。下一节，我们将研究一组使用 UNet 进行图像到图像学习的新型 GAN。\n\n## 使用 Pix2Pix\
  \ 进行图像翻译\n\n通过使用 UNet 进行图像分割或翻译，我们看到了模型如何学习从一种图像形式到另一种形式的转换。我们研究了 UNet 如何通过成对的训练图像来学习分割或掩码图像。Pix2Pix\
  \ GAN 通过引入对抗训练，将这一过程向前推进了一步。\n\n通过 GAN 引入对抗训练，我们可以增强在单个 UNet 模型中使用的损失函数，并进一步分离对损失的解释。这不仅使我们能够进行基于成对基础的训练比较来计算损失，还能使用第二个指标——判别器损失——来确保转换/生成的图像更接近其训练配对图像。参见练习\
  \ 5-3。\n\n**练习 5-3. 使用 Pix2Pix 进行图像翻译**\n\n1. 从 GitHub 项目站点打开 `GEN_5_Pix2Pix.ipynb`\
  \ 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2. 如果尚未运行，请选择 **运行时** ➤ **全部运行** 来运行整个笔记本。首先要注意的是，`Hyperparameter`\
  \ 部分现在提供了使用 Colab 表单配置的替代训练数据集。对于图像到图像的示例，我们提供了三个数据集。`maps` 代表同一区域街道和卫星图像的地图瓦片配对。`facades`\
  \ 数据集包含建筑外观照片，以及显示代表区域色块的立面配对图。第三个数据集 `cityscapes` 类似于 `facades`，但显示的是带有注释的街道配对视图，而非建筑。\n\
  \n3. 我们可以跳过这段代码的大部分主要部分，因为现在你可能已经熟悉了。向下滚动到生成器/判别器块定义处。这段代码的开头展示了两个用于辅助上采样和下采样的 UNet\
  \ 类。\n\n```\nclass UNetDown(nn.Module):\n    def __init__(self, in_size, out_size,\
  \ normalize=True, dropout=0.0):\n        super(UNetDown, self).__init__()\n    \
  \    layers = [nn.Conv2d(in_size, out_size, 4, 2, 1, bias=False)]\n        if normalize:\n\
  \            layers.append(nn.InstanceNorm2d(out_size))\n        layers.append(nn.LeakyReLU(0.2))\n\
  \        if dropout:\n            layers.append(nn.Dropout(dropout))\n        self.model\
  \ = nn.Sequential(*layers)\n    def forward(self, x):\n        return self.model(x)\n\
  \nclass UNetUp(nn.Module):\n    def __init__(self, in_size, out_size, dropout=0.0):\n\
  \        super(UNetUp, self).__init__()\n        layers = [\n            nn.ConvTranspose2d(in_size,\
  \ out_size, 4, 2, 1, bias=False),\n            nn.InstanceNorm2d(out_size),\n  \
  \          nn.ReLU(inplace=True),\n        ]\n        if dropout:\n            layers.append(nn.Dropout(dropout))\n\
  \        self.model = nn.Sequential(*layers)\n    def forward(self, x, skip_input):\n\
  \        x = self.model(x)\n        x = torch.cat((x, skip_input), 1)\n        return\
  \ x\n```\n\n4. 你可能会注意到 `UNetUp` 类中使用了 `ConvTranspose2D`，这是用于上采样部分的。请记住，对应的下采样超级层会如\
  \ `forward` 函数所示进行合并。\n\n5. 然后我们可以向下滚动，查看 `GeneratorUNet` 模型中如何使用 UNet 超级层。\n\n\
  ```\nclass GeneratorUNet(nn.Module):\n    def __init__(self, in_channels=3, out_channels=3):\n\
  \        super(GeneratorUNet, self).__init__()\n        self.down1 = UNetDown(in_channels,\
  \ 64, normalize=False)\n        self.down2 = UNetDown(64, 128)\n        self.down3\
  \ = UNetDown(128, 256)\n        self.down4 = UNetDown(256, 512, dropout=0.5)\n \
  \       self.down5 = UNetDown(512, 512, dropout=0.5)\n        self.down6 = UNetDown(512,\
  \ 512, dropout=0.5)\n        self.down7 = UNetDown(512, 512, dropout=0.5)\n    \
  \    self.down8 = UNetDown(512, 512, normalize=False, dropout=0.5)\n        self.up1\
  \ = UNetUp(512, 512, dropout=0.5)\n        self.up2 = UNetUp(1024, 512, dropout=0.5)\n\
  \        self.up3 = UNetUp(1024, 512, dropout=0.5)\n        self.up4 = UNetUp(1024,\
  \ 512, dropout=0.5)\n        self.up5 = UNetUp(1024, 256)\n        self.up6 = UNetUp(512,\
  \ 128)\n        self.up7 = UNetUp(256, 64)\n        self.final = nn.Sequential(\n\
  \            nn.Upsample(scale_factor=2),\n            nn.ZeroPad2d((1, 0, 1, 0)),\n\
  \            nn.Conv2d(128, out_channels, 4, padding=1),\n            nn.Tanh(),\n\
  \        )\n```\n\n\n\n4. 请注意，我们重复使用了多个具有 512 通道输入/输出的`UNetDown`层。我们可以通过模型的`forward`函数看到这种结构是如何组合的。注意，下采样层`d8`被复用为模型的输入，并实际上成为了中间层。\n\
  \n```\ndef forward(self, x):\n    # 带有从编码器到解码器跳跃连接的 U-Net 生成器\n    d1 = self.down1(x)\n\
  \    d2 = self.down2(d1)\n    d3 = self.down3(d2)\n    d4 = self.down4(d3)\n   \
  \ d5 = self.down5(d4)\n    d6 = self.down6(d5)\n    d7 = self.down7(d6)\n    d8\
  \ = self.down8(d7)\n    u1 = self.up1(d8, d7)\n    u2 = self.up2(u1, d6)\n    u3\
  \ = self.up3(u2, d5)\n    u4 = self.up4(u3, d4)\n    u5 = self.up5(u4, d3)\n   \
  \ u6 = self.up6(u5, d2)\n    u7 = self.up7(u6, d1)\n    return self.final(u7)\n\
  ```\n\n5. `Discriminator`与我们之前见过的类似，但有一个关键区别。该判别器不是接收单个三通道图像，而是将图像对组合成六个通道作为输入。请注意这如何改变了判别器的`forward`函数。\n\
  \n```\ndef forward(self, img_A, img_B):\n    # 按通道连接图像和条件图像以生成输入\n    img_input\
  \ = torch.cat((img_A, img_B), 1)\n    return self.model(img_input)\n```\n\n6. 跳转到笔记本底部的`Training`代码块。我们可以看到训练循环中损失计算的一个变化。现在我们的判别器接收图像对。这改变了生成器损失，因为它需要同时考虑重建图像的损失和逐像素比较。请记住，逐像素比较损失是我们会在简单自编码器中使用的损失。生成器损失由判别器损失和经过缩放的逐像素损失组合而成，其中可以通过设置`hp.lambda_pixel`超参数来调整缩放比例。\n\
  \n```\n### GAN 损失\nfake_B = generator(real_A)\npred_fake = discriminator(fake_B,\
  \ real_A)\nloss_GAN = criterion_GAN(pred_fake, valid)\n### 逐像素损失\nloss_pixel = criterion_pixelwise(fake_B,\
  \ real_B)\n### 总损失\nloss_G = loss_GAN + hp.lambda_pixel * loss_pixel\n```\n\n7.\
  \ 最后，判别器损失的计算方式与其他 GAN 相同，唯一的区别在于输入的是图像对。\n\n```\n### 真实损失\npred_real = discriminator(real_B,\
  \ real_A)\nloss_real = criterion_GAN(pred_real, valid)\n### 虚假损失\npred_fake = discriminator(fake_B.detach(),\
  \ real_A)\nloss_fake = criterion_GAN(pred_fake, fake)\n### 总损失\nloss_D = 0.5 * (loss_real\
  \ + loss_fake)\n```\n\n```\ndataset_name = \"maps\" #@param [\"facades\", \"cityscapes\"\
  , \"maps\"]\n```\n\n训练此练习将使用 Maps 数据集输出图 5-3。从图像中可以看到，第一行图像代表原始街道地图图像。其正下方是生成器生成的输出图像，再下方是训练好的配对图像。接下来的三行图像重复了此模式。\n\
  \n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig3_HTML.jpg](img/502181_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\nPix2Pix GAN 的训练输出\n\n如果你观察这些图像，会注意到生成的虚假图像具有相当多的细节。这是将逐像素比较添加到生成器损失中的结果。同样，如果我们将`lambda_pixel`的缩放比例从\
  \ 100 降低到 10 或 25，那么我们会看到更少的细节。相反，将此值增加到 1000 会使输出图像更接近使用标准逐像素损失时的典型自编码器输出。\n\n\
  Pix2Pix GAN 是首批能够良好运行并产生有趣结果的图像翻译模型之一。Pix2Pix 和 UNet 被广泛用于需要分割和/或变换的各种成像应用中。在下一节中，我们将通过引入双\
  \ GAN（DualGAN）来扩展此图像翻译模型。\n\n## 双 GAN：双重视角\n\n按理说，如果我们能训练一个 GAN 来执行单向的图像到图像翻译（例如，从街道图像到卫星图像），那么我们也同样可以逆转这个过程。然后，我们或许还可以通过理解每对生成器/判别器的训练方式来考虑额外的损失指标。\n\
  \n使用双 GAN，我们通过一对生成器和判别器，利用图像配对来执行双向的图像到图像翻译。这使我们能够计算从一个域到另一个域再返回的训练图像的组合损失。这个过程被称为*循环一致性损失*。\n\
  \n循环一致性损失是一种我们将在下一章通过更多示例深入探讨的方法。在此之前，图 5-4 展示了如何基于图像配对计算循环损失。为了计算循环损失，第一组生成的图像被反馈到相反的生成器中，以便基于虚假图像生成新的\
  \ X/Y 图像。这种转换和再转换的过程被称为*循环一致性*。\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig4_HTML.jpg](img/502181_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\n\n计算对抗损失和循环损失\n\n通过使用循环一致性，两个生成器同时进行训练，交替使用另一个生成器生成的图像作为真实输入。这使得两个生成器都与循环损失紧密耦合。\n\
  \n对于判别器，我们还使用 Wasserstein 梯度惩罚计算来增强损失计算方法。如果你还记得，Wasserstein GAN（WGAN）计算的是两组分布数据之间的相对距离。添加梯度惩罚是一种软化\
  \ WGAN 损失函数的方法。\n\n当我们把所有这些结合起来，就得到了我们的第一个双 GAN 实例——双 GAN，我们将在练习 5-4 中演示。这个 GAN\
  \ 使用两个生成器和两个判别器的组合来协同工作。这意味着配对判别器和生成器的损失计算是相互结合的。我们将在下一个练习中看到这一切是如何整合在一起的。\n\n练习\
  \ 5-4. 双 GAN：双重视角\n\n1. 从 GitHub 项目站点打开`GEN_5_DualGAN.ipynb`笔记本。如果不确定如何操作，请查阅附录\
  \ B。\n\n2. 如果尚未运行，请选择“运行时” ➤ “全部运行”来运行整个笔记本。向下滚动并打开`Hyperparameters`部分；然后查看定义的新变量，总结如下：\n\
  \n```\nlambda_adv = 1,\nlambda_cycle = 10,\nlambda_gp = 10\n```\n\n3. `lambda_adv`超参数是对抗损失修正因子。`lambda_cycle`用于缩放循环损失，而`lambda_gp`是梯度惩罚损失，我们稍后会介绍。\n\
  \n4. 我们之前已经多次介绍过大部分代码，因此只需在向下滚动到训练代码块时，快速浏览其他代码部分即可。务必查看模型是如何构建的。我们首先来看生成器损失是如何计算的，如下所示：\n\
  \n```\n### 将图像翻译到相反域\nfake_A = G_BA(imgs_B)\nfake_B = G_AB(imgs_A)\n### 重建图像\nrecov_A\
  \ = G_BA(fake_B)\nrecov_B = G_AB(fake_A)\n### 对抗损失\nG_adv = -torch.mean(D_A(fake_A))\
  \ - torch.mean(D_B(fake_B))\n### 循环损失\nG_cycle = cycle_loss(recov_A, imgs_A) + cycle_loss(recov_B,\
  \ imgs_B)\n### 总损失\nG_loss = hp.lambda_adv * G_adv + hp.lambda_cycle * G_cycle\n\
  ```\n\n\n\n5.  我们有两个生成器，一个用于将图像从域 A 转换到域 B，另一个用于从域 B 转换到域 A，分别命名为`G_AB`和`G_BA`。请注意，我们如何将伪造/生成的图像传回相反的生成器，以创建`recov_A`和`recov_B`输出。重新转换后的图像用于计算循环一致性损失。在生成各种图像后，我们首先通过将伪造图像传入相应的判别器`D_A`或`D_B`来计算对抗性损失。接着，通过比较重新转换后的图像与原始图像来计算循环损失。由此，我们确定从生成器\
  \ A > B 和 B > A 的完整转换中存在多少误差。最后，通过求和并应用 lambda 缩放超参数来计算总的`G_loss`。\n\n6.  接下来查看判别器部分及其损失计算，如下所示：\n\
  \n```\n### 为改进的 Wasserstein 训练计算梯度惩罚\ngp_A = compute_gradient_penalty(D_A, imgs_A.data,\
  \ fake_A.data)\n### 对抗性损失\nD_A_loss = -torch.mean(D_A(imgs_A)) + torch.mean(D_A(fake_A))\
  \ + hp.lambda_gp * gp_A\n### 为改进的 Wasserstein 训练计算梯度惩罚\ngp_B = compute_gradient_penalty(D_B,\
  \ imgs_B.data, fake_B.data)\n### 对抗性损失\nD_B_loss = -torch.mean(D_B(imgs_B)) + torch.mean(D_B(fake_B))\
  \ + hp.lambda_gp * gp_B\n### 总损失\nD_loss = D_A_loss + D_B_loss\nD_loss.backward()\n\
  optimizer_D_A.step()\noptimizer_D_B.step()\n```\n\n7.  对于判别器损失，我们使用了特殊的`compute_gradient_penalty`函数，稍后将详细介绍。该函数接收判别器（A\
  \ 或 B）以及对应域（A 或 B）的真实图像和伪造图像。由此我们计算出两种形式的对抗性损失；`D_A_loss`/`D_B_loss`将常规对抗性损失与之前的梯度惩罚损失相结合，并再次通过`lambda_gp`进行缩放。最后，总损失由两个域\
  \ A/B 的损失合并而成。请注意代码末尾我们如何使用两个不同的优化器来训练判别器中的权重。这与生成器形成对比，生成器仅使用一个优化器。\n\n8.  最后一步，我们将回到`compute_gradient_penalty`函数，如下所示：\n\
  \n```\ndef compute_gradient_penalty(D, real_samples, fake_samples):\n    alpha =\
  \ FloatTensor(np.random.random((real_samples.size(0), 1, 1, 1)))\n    interpolates\
  \ = (alpha * real_samples + ((1 - alpha) * fake_samples)).requires_grad_(True)\n\
  \    validity = D(interpolates)\n    fake = Variable(FloatTensor(np.ones(validity.shape)),\
  \ requires_grad=False)\n    # 获取关于插值点的梯度\n    gradients = autograd.grad(\n     \
  \   outputs=validity,\n        inputs=interpolates,\n        grad_outputs=fake,\n\
  \        create_graph=True,\n        retain_graph=True,\n        only_inputs=True,\n\
  \    )[0]\n    gradients = gradients.view(gradients.size(0), -1)\n    gradient_penalty\
  \ = ((gradients.norm(2, dim=1) - 1) ** 2).mean()\n    return gradient_penalty\n\
  ```\n\n9.  该函数基于第 4 章中的 Wasserstein GP 损失。回顾一下，这转换了 Wasserstein 推土机方法，通过使用梯度惩罚而非裁剪函数来衡量分布之间的差异。\n\
  \n如图 5-5 所示，该 GAN 在跨两个域并返回的图像到图像转换学习方面非常高效。结果显示了从域 A 到域 B 再返回的域转换。仅经过几个周期，双 GAN\
  \ 就能轻松完成域到域转换的学习。\n\n从图像到图像的配对转换，我们可以开始考虑图像转换模型的其他可能性。在下一节中，我们将考虑第一个假设并非每张图像都有唯一正确转换的模型。\n\
  \n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig5_HTML.jpg](img/502181_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n\nDualGAN 用于图像到图像转换的训练输出\n\n## 驾驭 BicycleGAN 的潜在空间\n\n图像配对转换的一个主要缺陷是假设每张图像只有一种正确的转换。但情况往往并非如此，一种语言中的一张图像或一个短语在另一个域中可能有多个正确的含义。\n\
  \nBicycleGAN 引入了这样一个假设：每个输入图像都有多个正确的转换，而不仅仅是一个。然而，为了实现这一壮举，这种形式的 GAN 使用了一位老朋友——变分自编码器，以更好地映射学习到的分布。\n\
  \n现在，该模型不再使用配对的生成器和判别器，而是使用一个生成器和一个 VAE 编码器，如图 5-6 所示。从图中，A 和 B 表示不同的图像域，其中![$$\
  \ \\hat{B} $$](img/502181_1_En_5_Chapter_TeX_IEq1.png)表示 A 的输出。*G*表示生成器，*E*表示编码器，而*D*当然是判别器。函数*N*(*z*)和*Q*(*z*|*B*)是采样函数，其输出被传递到*KL*块。KL\
  \ 代表 Kullback-Leibler，是衡量分布输出差异的另一种方法。\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig6_HTML.jpg](img/502181_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n\nBicycleGAN 架构\n\n*L1*和*L1+D*表示循环损失，即从转换到再返回的损失量。我们将在第 6 章中介绍循环损失的其他示例。\n\
  \n图 5-6 应能提供 BicycleGAN 工作原理的基本直觉，但我们当然也想深入代码并观察其运行。在练习 5-5 中，我们使用 BicycleGAN 从单个图像配对生成多个可能的转换。\n\
  \n练习 5-5. 驾驭潜在空间\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig7_HTML.jpg](img/502181_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n\n训练 BicycleGAN 的示例输出\n\n1.  从 GitHub 项目站点打开`GEN_5_BicycleGAN.ipynb`笔记本。如果不确定如何操作，请查阅附录\
  \ B。如果尚未运行，请通过选择“运行时”➤“全部运行”来运行整个笔记本。向下滚动并打开`Hyperparameters`部分，查看定义的新变量，总结如下：\n\
  \n```\nlambda_pixel=10,\nlambda_latent=.5,\nlambda_kl=.01\n```\n\n2.  这些超参数都用于缩放各种损失输出。其中`pixel`表示逐像素损失，`latent`表示来自编码器的潜在空间编码损失，`kl`表示来自学习分布的\
  \ Kullback-Leibler 损失。\n\n3.  向下滚动到模型部分，特别是`Encoder`模型，如下所示：\n\n```\nclass Encoder(nn.Module):\n\
  \    def __init__(self, latent_dim, input_shape):\n        super(Encoder, self).__init__()\n\
  \        resnet18_model = resnet18(pretrained=False)\n        self.feature_extractor\
  \ = nn.Sequential(*list(resnet18_model.children())[:-3])\n        self.pooling =\
  \ nn.AvgPool2d(kernel_size=8, stride=8, padding=0)\n        # 输出是 mu 和 log(var)，用于\
  \ VAE 中的重参数化技巧\n        self.fc_mu = nn.Linear(256, latent_dim)\n        self.fc_logvar\
  \ = nn.Linear(256, latent_dim)\n\n    def forward(self, img):\n        out = self.feature_extractor(img)\n\
  \        out = self.pooling(out)\n        out = out.view(out.size(0), -1)\n    \
  \    mu = self.fc_mu(out)\n        logvar = self.fc_logvar(out)\n        return\
  \ mu, logvar\n```\n\n4.  关于`Encoder`类，有几点关键事项需要注意。首先，该编码器使用一个名为`resnet18`的现有模型作为特征提取器。我们将在第\
  \ 6 章中了解更多关于 ResNet 模型的信息，以及如何重用预训练模型。使用预训练模型被称为*迁移学习*。\n\n5.  接下来，我们将简要总结模型和优化器的创建方式：\n\
  \n\n\n```python\ngenerator = Generator(hp.latent_dim, input_shape)\nencoder = Encoder(hp.latent_dim,\
  \ input_shape)\nD_VAE = MultiDiscriminator(input_shape)\nD_LR = MultiDiscriminator(input_shape)\n\
  optimizer_E = torch.optim.Adam(encoder.parameters(), lr=hp.lr, betas=(hp.b1, hp.b2))\n\
  optimizer_G = torch.optim.Adam(generator.parameters(), lr=hp.lr, betas=(hp.b1, hp.b2))\n\
  optimizer_D_VAE = torch.optim.Adam(D_VAE.parameters(), lr=hp.lr, betas=(hp.b1, hp.b2))\n\
  optimizer_D_LR = torch.optim.Adam(D_LR.parameters(), lr=hp.lr, betas=(hp.b1, hp.b2))\n\
  ```\n\n我们可以看到构建了四个模型，每个模型都有各自的优化器。请注意我们如何区分判别器损失模型：`D_VAE` 衡量编码器的准确率，而 `D_LR` 衡量生成器的准确率。\n\
  \n最后，除了模型配置之外，训练代码大部分应该是熟悉的。参考图 5-6 有助于解释代码。我们将重点介绍一个关键部分，如下所示：\n\n```python\nmu,\
  \ logvar = encoder(real_B)\nencoded_z = reparameterization(mu, logvar)\nfake_B =\
  \ generator(real_A, encoded_z)\n### VAE 翻译图像的像素级损失\nloss_pixel = mae_loss(fake_B,\
  \ real_B)\n### 编码 B 的 Kullback-Leibler 散度\nloss_kl = 0.5 * torch.sum(torch.exp(logvar)\
  \ + mu ** 2 - logvar - 1)\n### 对抗性损失\nloss_VAE_GAN = D_VAE.compute_loss(fake_B,\
  \ valid)\n```\n\n这段代码中令人困惑或棘手的部分是编码器模型的输出；`mu` 和 `logvar`（方差）被用作 `reparameterization`\
  \ 函数的输入。该函数只是转换这些值并从该空间重新采样。回想一下标准 VAE 中是如何完成此操作的。然后，这个编码后的值与一张真实图像一起被传入生成器。接着，我们使用像素级比较、`KL`\
  \ 散度和判别器损失来衡量损失。请务必进一步查看损失计算代码的其余部分。\n\n在笔记本的底部，您将看到训练输出，如图 5-7 所示。在输出中，您可以看到对于每张输入图像，都会输出多个变体。这些变体通过使用\
  \ VAE 编码器学习模型中使用的域分布来控制。\n\nBicycleGAN 背后的概念对于我们思考翻译配对时的后续方向至关重要。然而，在准确性方面，该模型缺乏跨域映射的能力，如图\
  \ 5-7 所示。更进一步，接下来我们将考虑如何在没有配对的情况下进行跨域翻译。\n\n## 使用 DiscoGAN 发现域\n\n图像或语言的翻译通常使用配对数据集完成。例如，对于语言，这通常是两种语言中可比的短语。在我们之前的图像案例中，同一图像的配对以某种形式进行了翻译。\n\
  \n当然，现在使用未配对的短语进行跨语言的准确翻译是不太可能的。然而，在这些类型的翻译任务中，通过未配对数据可以学习到的是域的本质或风格。\n\nDiscoGAN\
  \ 旨在捕获并允许在未配对图像之间进行风格翻译。它通过结合两个生成器上的对抗性损失、像素损失和循环损失来实现这一点。其效果允许将马翻译成斑马，或将苹果翻译成橙子，正如我们将在练习\
  \ 5-6 中看到的那样。\n\n### 练习 5-6. 使用 DiscoGAN 发现域\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig8_HTML.jpg](img/502181_1_En_5_Fig8_HTML.jpg)\n\
  \n**图 5-8** 未配对图像到图像数据集示例\n\n1. 从 GitHub 项目站点打开 `GEN_5_DiscoGAN.ipynb` 笔记本。如果不确定如何操作，请参考附录\
  \ B。\n\n2. 这个 GAN 提供了多个示例数据集，我们将在此示例以及后续章节的更多示例中使用它们。图 5-8 显示了可用数据集的摘要以及匹配图像的外观。请务必选择您想要的数据集，然后运行整个笔记本。从菜单中选择\
  \ **运行 ➤ 全部运行**。\n\n3. 请随意探索各种数据集，并熟悉它们在训练过程中的外观。这对于我们稍后探索再次使用这些数据集的其他示例练习来说，将是一个很好的实践。\n\
  \n4. 现在，这个示例中的大部分代码应该都是复习内容。因此，我们将只关注模型和优化器的创建，如下所示：\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig9_HTML.jpg](img/502181_1_En_5_Fig9_HTML.jpg)\n\
  \n**图 5-9** 跨域训练示例，从梵高风格到莫奈风格\n\n5. 同样，这个 GAN 中有两个生成器和两个判别器。虽然两个生成器共享一个优化器，但判别器使用各自的优化器。\n\
  \n6. 跳转到训练代码，特别是损失计算部分。我们将重点介绍生成器中循环损失的计算方式，如下所示：\n\n```python\nfake_B = G_AB(real_A)\n\
  loss_GAN_AB = adversarial_loss(D_B(fake_B), valid)\nfake_A = G_BA(real_B)\nloss_GAN_BA\
  \ = adversarial_loss(D_A(fake_A), valid)\nloss_GAN = (loss_GAN_AB + loss_GAN_BA)\
  \ / 2\n### 像素级翻译损失\nloss_pixelwise = (pixelwise_loss(fake_A, real_A) + pixelwise_loss(fake_B,\
  \ real_B)) / 2\nloss_cycle_A = cycle_loss(G_BA(fake_B), real_A)\nloss_cycle_B =\
  \ cycle_loss(G_AB(fake_A), real_B)\nloss_cycle = (loss_cycle_A + loss_cycle_B) /\
  \ 2\n### 总损失\nloss_G = loss_GAN + loss_cycle + loss_pixelwise\n```\n\n7. 首先计算对抗性损失（`loss_GAN`），然后是像素级损失，最后是循环损失。所有三个损失合并为生成器总损失（`loss_G`）。\n\
  \n8. 让模型在各种数据集上训练。每次切换数据集后，请务必重置模型。否则，您将遇到奇怪的结果。\n\n9. 您也可以选择连续训练多个数据集，从而让 GAN 学习多种域风格并将它们组合起来。图\
  \ 5-9 展示了这样一个训练示例，该训练首先在 Monet 2 Photo 数据集上训练，然后切换到 VanGogh 2 Photo 数据集。\n\n```python\n\
  G_AB = GeneratorUNet(input_shape)\nG_BA = GeneratorUNet(input_shape)\nD_A = Discriminator(input_shape)\n\
  D_B = Discriminator(input_shape)\noptimizer_G = torch.optim.Adam(\nitertools.chain(G_AB.parameters(),\
  \ G_BA.parameters()), lr=hp.lr, betas=(hp.b1, hp.b2)\n)\noptimizer_D_A = torch.optim.Adam(D_A.parameters(),\
  \ lr=hp.lr, betas=(hp.b1, hp.b2))\noptimizer_D_B = torch.optim.Adam(D_B.parameters(),\
  \ lr=hp.lr, betas=(hp.b1, hp.b2))\n```\n\n这个练习的输出很有趣，因为它展示了域风格翻译是如何生效的。在某些情况下，经过短时间的训练，艺术作品和照片看起来就相当可信。如您所见，DiscoGAN\
  \ 是跨图像翻译域/风格的有效解决方案。\n\n请务必使用多种变体或不同数据来探索和尝试前面的练习。可视化该模型如何跨域和交叉域进行训练可能会很有启发性，尤其是当您尝试调整模型中的一些超参数时。\n\
  \n\n\n## 结论\n\n在本章中，我们探讨了如何将图像生成的带宽提升至图像转换/生成模型。我们首先通过用于图像分割的`UNet`编码结构来探索这一概念，并研究了鱼类图像的分割。随后，我们将`UNet`模型应用于基于`Pix2Pix`的图像到图像转换，并进一步升级到`DualGAN`——一种使用两个生成器和两个判别器的生成对抗网络。\n\
  \n在理解图像到图像转换的基础上，我们继续探索其他形式的图像或领域转换。首先研究了`BicycleGAN`，它基于每个输入存在多种转换的假设。接着我们转向`DiscoGAN`，用于执行非配对图像风格的领域迁移。\n\
  \n本章使用的技术已扩展到许多通常利用图像进行分析的领域。例如在医学领域，图像到图像转换和分割 GAN 为医疗诊断提供了卓越支持，甚至能够通过识别从乳腺癌到心脏问题等各种疾病的诊断标志物，超越该领域的医学专家。\n\
  \n在下一章中，我们将继续探索使用非配对图像进行领域转换，以及如何进一步控制此类输出变化。\n\n"
- "# 6. 残差网络生成对抗网络\n\n生成对抗网络和对抗训练在概念上确实无限广阔，但在执行和实现中往往有所欠缺。正如我们在本书中反复看到的，失败通常源于生成器。而我们也已认识到，优秀\
  \ GAN 的关键在于优秀的生成器。\n\nGAN 中的判别器本质上只是一个分类器，通常甚至是一个简单的二分类器。事实上，现在常见的做法是构建一个 GAN 来训练判别器/分类器。GAN\
  \ 会在数据集上针对二分类任务进行训练，训练完成后生成器被丢弃。这样不仅能得到一个准确的分类器，而且分类器还具备鲁棒性。\n\n通过对抗学习，分类器可以在生成器提供的更广阔训练空间中学习到更好的近似。生成器通过试图欺骗判别器/分类器，使其更好地学习和逼近，从而填补那些潜在空间。因此，在真实数据上训练的分类器也能学会识别同一数据的近似伪造版本。\n\
  \n事实证明，构建一个好的判别器远比创建好的生成器容易，这源于学习问题的本质。生成器需要精细地理解特征和目标分布，以便重现这些特征；而判别器只需分类特征之间的差异或距离。\n\
  \n我们之前已经看到卷积神经网络如何帮助提取这些特征，但发现这些特征在重建时往往表现为斑块或斑点。随后我们研究了`UNet`，它能够将学习到的特征转换回生成输出。正如我们在第\
  \ 5 章所见，这可以产生更好的生成输出。\n\n在本章中，我们将迈出特征提取机制的下一步演进：残差块和残差网络（`ResNet`）。我们将深入剖析并理解`ResNet`和残差块如何用于分类，学习这些模型如何绕过深度\
  \ CNN 网络中的深度层问题。\n\n随着我们开发的模型不断使用更大、更复杂的特征提取器，我们将转向理解如何重用现有的预训练模型。重用预训练标准化模型被称为*迁移学习*，我们将通过一个使用预训练模型进行分类的简单示例来探索这一概念。\n\
  \n我们还将整合所有这些新知识，研究三种使用`ResNet`构建更好生成器的 GAN 变体。第一种是`CycleGAN`及其扩展的非配对图像到图像生成器。第二种是专门用于从名人面部图像中学习并有条件地生成面部的\
  \ GAN。\n\n最后，我们将以超分辨率 GAN（`SRGAN`）作为本章的结尾，该 GAN 结合了从`ResNet`到预训练鲁棒特征提取器的多种模型优势。我们将使用`SRGAN`来提升一些名人面部图像的分辨率。\n\
  \n随着本书的深入，示例将变得愈发复杂，因此为节省篇幅，仅展示重要代码片段。在阅读本章时，打开代码文件可能会更有帮助。以下是本章将要涵盖的内容：\n\n* 理解残差网络\n\
  * 使用`CycleGAN`再次循环\n* 使用`StarGAN`生成面部\n* 利用迁移学习实现最佳效果\n* 使用`SRGAN`提升分辨率\n\n我们将继续基于前几章的知识进行构建。如有需要，请务必复习卷积网络及特征提取/生成的相关内容。正如我们将在下一节中看到的，残差网络是卷积层的大规模使用者。\n\
  \n\n\n## 理解残差网络\n\n正如我们在前几章和练习中所见，为了更有效地学习特征提取，我们常常需要增加网络的深度。然而，我们也了解到，网络层数越深，出现的问题就越多，例如由特征过度提取常导致的梯度爆炸或梯度消失。\n\
  \n当卷积网络层变得过深时，即使进行了归一化处理，仍然会产生难以映射的潜在曲面，从而引发特征过度提取。其结果是模型过度强调某些特征，而忽略了其他不那么常见的特征。\n\
  \n我们在许多使用多层卷积的生成对抗网络（GAN）中已经看到了大量特征过度提取的例子。这可以通过生成图像中的明亮区域来识别。\n\n残差网络和残差块试图通过允许跳过某些层来克服这种特征过度效应，从而使模型能够忽略那些可能过度强调特征的层。残差网络通过在卷积过程之后，将残差输出从块的顶部传递到底部来实现这一点。\n\
  \n图 6-1 展示了一个单独的残差块。在图中，输入 `x` 进入第一个权重层，并绕过它到达底部的 `+` 节点。`F(x)` 表示使用权重层对 `x` 应用的卷积函数。在块的底部，你可以看到输出是\
  \ `F(x) + x`，其中 `x` 是来自块起始位置的残差。\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig1_HTML.jpg](img/502181_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\n一个单独的残差块\n\n通过将残差输入从块的顶部传递到底部，我们有效地减少并归一化了对权重层的依赖。这反过来又减少了由特征过度提取引起的梯度爆炸/消失。这样做还有一个好处，就是能够显著增加网络深度。\n\
  \n图 6-2 展示了一个 19 层网络（参考 VGG19）与 ResNet152（一个使用 152 层的残差网络）的对比。在 ResNet 模型中，你可以看到残差卷积块之间的跳跃连接。想想\
  \ ResNet152 与简单的 VGG19 相比有多深。\n\n牛津大学的视觉几何组（VGG）开发了一套使用卷积的标准化模型。在 VGG19 中有 19 层，其中\
  \ 16 层是卷积层，3 层是线性扁平层。\n\n我们可以通过再次查看 fashion MNIST 数据集，了解残差网络中的残差块如何用于一个简单的分类问题。这次我们将构建一个带有残差网络的简单模型来学习如何对时尚物品进行分类。请打开你的电脑，准备探索练习\
  \ 6-1。\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig2_HTML.jpg](img/502181_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\n常规卷积网络与 ResNet 的对比\n\n### 练习 6-1. 残差网络分类器\n\n1.  从 GitHub 项目站点打开 `GEN_6_ResNet_classifier.ipynb`\
  \ 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2.  通过选择“运行时” ➤ “全部运行”来运行整个笔记本。此笔记本的大部分代码应该很熟悉。因此，我们将只关注新的或重要的部分。\n\
  \n3.  你可以向下滚动到 RESNET 模型块，查看前两个辅助函数。第一个函数 `preprocess` 用于交换和设置张量。第二个是 `conv` 函数，它是创建卷积层的一个包装器。\n\
  \n```\n    def preprocess(x):\n    return x.view(-1, 1, 28, 28)\n    def conv(in_size,\
  \ out_size, pad=1):\n    return nn.Conv2d(in_size, out_size, kernel_size=3, stride=2,\
  \ padding=pad)\n```\n\n4.  紧接着下面是 `ResidualBlock` 类的定义。请记住，一个单独的残差块允许输入残差绕过训练层，然后通过跳跃连接在底部相加。\n\
  \n```\n    class ResBlock(nn.Module):\n    def __init__(self, in_size:int, hidden_size:int,\
  \ out_size:int, pad:int):\n    super().__init__()\n    self.conv1 = conv(in_size,\
  \ hidden_size, pad)\n    self.conv2 = conv(hidden_size, out_size, pad)\n    self.batchnorm1\
  \ = nn.BatchNorm2d(hidden_size)\n    self.batchnorm2 = nn.BatchNorm2d(out_size)\n\
  \    def convblock(self, x):\n    x = nn.functional.relu(self.batchnorm1(self.conv1(x)))\n\
  \    x = nn.functional.relu(self.batchnorm2(self.conv2(x)))\n    return x\n    def\
  \ forward(self, x): return x + self.convblock(x) # 跳跃连接\n```\n\n5.  再下面是构建 `ResidualNetwork`\
  \ 类的地方。注意这里有两个 `ResBlocks` 残差块按顺序连接，输出在最后/输出端经过批归一化和最大池化处理。\n\n```\n    class ResNet(nn.Module):\n\
  \    def __init__(self, n_classes=10):\n    super().__init__()\n    self.res1 =\
  \ ResBlock(1, 8, 16, 15)\n    self.res2 = ResBlock(16, 32, 16, 15)\n    self.conv\
  \ = conv(16, n_classes)\n    self.batchnorm = nn.BatchNorm2d(n_classes)\n    self.maxpool\
  \ = nn.AdaptiveMaxPool2d(1)\n    def forward(self, x):\n    x = preprocess(x)\n\
  \    x = self.res1(x)\n    x = self.res2(x)\n    x = self.maxpool(self.batchnorm(self.conv(x)))\n\
  \    return x.view(x.size(0), -1)\n```\n\n6.  接下来要关注的是各种重要的代码片段或行，如下所示。第一行显示了我们使用的损失函数。交叉熵损失是分类问题的标准选择。之后是一个名为\
  \ `accuracy` 的函数。`accuracy` 函数返回分类与一组输出匹配的准确率百分比。它的工作原理是获取最大预测值，并使用 `argmax` 找到索引。然后它将正确的输出与标签进行比较，返回一个介于\
  \ 0.0 和 1.0 之间的值，即 0% 到 100%。\n\n```\n    loss_fn = nn.CrossEntropyLoss()\n    def\
  \ accuracy(pred, labels):\n    preds = torch.argmax(pred, dim=1)\n    return (preds\
  \ == labels).float().mean()\n```\n\n7.  让模型训练直至完成，并注意模型训练时的输出。我们应该看到训练集和测试集的损失都在下降，并且两个数据集的准确率都在提高。如果模型训练良好，损失和准确率的两条曲线应该相互跟随。测试集和训练集之间的损失或准确率出现差异是过拟合或欠拟合的结果。\n\
  \n8.  撇开数字不谈，查看实际结果通常很有帮助，因此笔记本上的最后一个代码块提供了实际的视觉确认。在此代码块中，我们从 `testloader` 中采样一批图像/标签，然后将它们传入模型以输出预测结果\
  \ `preds`。然后我们需要使用 `torch.max` 将这些预测结果转换回标签/索引。之后，打印模型准确率（乘以 100），并绘制带有标签的图像。\n\n\
  ```\n    dataiter = iter(testloader)\n    images, labels = dataiter.next()\n   \
  \ preds = model(images.cuda())\n    values, indices = torch.max(preds, 1)\n    print(f\"\
  accuracy {accuracy(preds, labels.cuda()).item()*100}%\")\n    plot_images(images.cpu().numpy(),\
  \ indices.cpu().numpy(), 25)\n```\n\n9.  图 6-3 展示了一组带有预测标签的图像。虽然准确率超过 92%，但我们在输出图像中可以看到没有图像被错误标记。\n\
  \n在运行上一个练习时，你理想中注意到的一件事是这个模型训练得有多快。该模型最初设置为仅训练五个周期，在大多数情况下可以迅速达到 90% 的准确率。如果你训练这个模型更长时间，它应该能轻松超过该数据集\
  \ 90% 的准确率。\n\n\n\n## 残差网络与 CycleGAN\n\n如你所见，残差网络为更深的网络提供了更高的稳定性，并能提升训练性能。进而，它们使得更深的网络能够学习到不会因过度特征提取而受损的特征集。\n\
  \n在掌握了这一强大的新工具后，我们可以重新审视它如何改进 GAN 的变体。接下来，我们将再次从 CycleGAN 开始，研究无配对图像到图像的翻译。\n\n\
  ![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig3_HTML.jpg](img/502181_1_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3** 预测准确率与标注输出\n\n### 再次循环：CycleGAN\n\n循环一致性 GAN（CycleGAN）的主要损失机制是循环损失。回顾一下，我们在第\
  \ 5 章中已经介绍过循环损失。循环一致性损失是通过将一个物品翻译成另一种形式，然后再翻译回原始形式来衡量的，其损失值取决于原始输出与两次翻译后输出的对比效果。\n\
  \n虽然 CycleGAN 以其主要的损失判定方法命名，但它也结合了其他损失方法作为保障。这种 GAN 变体在生成器上使用了三种损失：对抗性损失（即标准 GAN\
  \ 损失）、循环损失和身份损失。\n\n身份损失衡量的是图像上的颜色变化或色温变化。如果没有身份损失，生成的输出可能会呈现出与期望输出截然不同的色调。CycleGAN\
  \ 不一定非要包含身份损失，但它能使输出更加统一。\n\n由于我们已经介绍过这种 GAN 的变体（BicycleGAN 和 DiscoGAN），我们可以快速进入练习环节。练习\
  \ 6-2 将与我们之前在第 5 章中看到的 DiscoGAN 练习类似。在进入练习时，我们还会进一步介绍一些变体，比如身份损失。\n\n### 练习 6-2：使用\
  \ CycleGAN 进行循环与身份映射\n\n1. 从 GitHub 项目站点打开`GEN_6_CycleGAN.ipynb`笔记本。如果不确定如何操作，请参考附录\
  \ B。\n\n2. 该笔记本的大部分代码应该很熟悉，但我们仍将介绍其中显示的新增或不同的超参数。`n_residual_blocks`超参数允许我们控制生成器中使用的残差块数量，而`lambda_cyc`和`lambda_id`则分别控制循环损失和身份损失的缩放比例。\n\
  \n```\nn_residual_blocks=9,\nlambda_cyc=10.0,\nlambda_id=5.0\n```\n\n3. 你还会注意到，该笔记本允许你在五个无配对图像到图像的数据集之间进行选择：莫奈风格转照片、梵高风格转照片、苹果转橙子、约塞米蒂的夏天转冬天，以及马转斑马。选择一个你感兴趣的数据集，然后通过选择**运行时**\
  \ ➤ **全部运行**来运行整个笔记本。\n\n4. 你可能会注意到，`GeneratorResNet`类由下采样层组成，这些层连接到由超参数设置的多个残差块，然后输出到上采样层以生成最终输出。以下是`init`函数的精简版本，展示了模型架构的组装方式。\n\
  \n5. 接下来，我们将查看损失函数、模型创建和优化器函数。请注意，生成器共享一个优化器，而判别器则使用独立的优化器。\n\n```\ndef __init__(self,\
  \ input_shape, num_residual_blocks):\n    super(GeneratorResNet, self).__init__()\n\
  \    channels = input_shape[0]\n    out_features = 64\n    model = [\n        nn.ReflectionPad2d(channels),\n\
  \        nn.Conv2d(channels, out_features, 7),\n        nn.InstanceNorm2d(out_features),\n\
  \        nn.ReLU(inplace=True),\n    ]\n    in_features = out_features\n    # 下采样\n\
  \    for _ in range(2):\n        out_features *= 2\n        model += [\n       \
  \     nn.Conv2d(in_features, out_features, 3, stride=2, padding=1),\n          \
  \  nn.InstanceNorm2d(out_features),\n            nn.ReLU(inplace=True),\n      \
  \  ]\n        in_features = out_features\n    # 残差块\n    for _ in range(num_residual_blocks):\n\
  \        model += [ResidualBlock(out_features)]\n    # 上采样\n    for _ in range(2):\n\
  \        out_features //= 2\n        model += [\n            nn.Upsample(scale_factor=2),\n\
  \            nn.Conv2d(in_features, out_features, 3, stride=1, padding=1),\n   \
  \         nn.InstanceNorm2d(out_features),\n            nn.ReLU(inplace=True),\n\
  \        ]\n        in_features = out_features\n    # 输出层\n    model += [n...\n\
  ```\n\n6. 在创建优化器之后，我们立即添加了一个名为*调度器*的新工具。调度器用于在训练过程中修改超参数。在本例中，我们使用调度器来修改训练期间的学习率。对于这个模型，我们随时间降低学习率，从而使模型能够先进行大幅调整，然后逐渐进行微调。\n\
  \n\n\n### 学习率更新调度器\n\n```python\nlr_scheduler_G = torch.optim.lr_scheduler.LambdaLR(\n\
  \    optimizer_G, lr_lambda=LambdaLR(hp.n_epochs, hp.epoch, hp.decay_epoch).step\n\
  )\nlr_scheduler_D_A = torch.optim.lr_scheduler.LambdaLR(\n    optimizer_D_A, lr_lambda=LambdaLR(hp.n_epochs,\
  \ hp.epoch, hp.decay_epoch).step\n)\nlr_scheduler_D_B = torch.optim.lr_scheduler.LambdaLR(\n\
  \    optimizer_D_B, lr_lambda=LambdaLR(hp.n_epochs, hp.epoch, hp.decay_epoch).step\n\
  )\n```\n\n2. 跳转到训练代码部分，我们首先来看一下身份损失是如何计算的。\n\n```python\n### 损失函数\ncriterion_GAN\
  \ = torch.nn.MSELoss()\ncriterion_cycle = torch.nn.L1Loss()\ncriterion_identity\
  \ = torch.nn.L1Loss()\ninput_shape = (hp.channels, hp.img_size, hp.img_size)\n###\
  \ 初始化生成器和判别器\nG_AB = GeneratorResNet(input_shape, hp.n_residual_blocks)\nG_BA =\
  \ GeneratorResNet(input_shape, hp.n_residual_blocks)\nD_A = Discriminator(input_shape)\n\
  D_B = Discriminator(input_shape)\noptimizer_G = torch.optim.Adam(\n    itertools.chain(G_AB.parameters(),\
  \ G_BA.parameters()), lr=hp.lr, betas=(hp.b1, hp.b2)\n)\noptimizer_D_A = torch.optim.Adam(D_A.parameters(),\
  \ lr=hp.lr, betas=(hp.b1, hp.b2))\noptimizer_D_B = torch.optim.Adam(D_B.parameters(),\
  \ lr=hp.lr, betas=(hp.b1, hp.b2))\n```\n\n1. 接下来，GAN 或对抗损失与之前的许多示例类似：\n\n```python\n\
  loss_id_A = criterion_identity(G_BA(real_A), real_A)\nloss_id_B = criterion_identity(G_AB(real_B),\
  \ real_B)\nloss_identity = (loss_id_A + loss_id_B) / 2\n```\n\n1. 最后，循环损失与我们第 4\
  \ 章中所做的类似，然后我们使用 lambda 缩放因子计算最终损失：\n\n```python\nfake_B = G_AB(real_A)\nloss_GAN_AB\
  \ = criterion_GAN(D_B(fake_B), valid)\nfake_A = G_BA(real_B)\nloss_GAN_BA = criterion_GAN(D_A(fake_A),\
  \ valid)\nloss_GAN = (loss_GAN_AB + loss_GAN_BA) / 2\n```\n\n```python\nrecov_A\
  \ = G_BA(fake_B)\nloss_cycle_A = criterion_cycle(recov_A, real_A)\nrecov_B = G_AB(fake_A)\n\
  loss_cycle_B = criterion_cycle(recov_B, real_B)\nloss_cycle = (loss_cycle_A + loss_cycle_B)\
  \ / 2\n### 总损失\nloss_G = loss_GAN + hp.lambda_cyc * loss_cycle + hp.lambda_id *\
  \ loss_identity\n```\n\n在你选择的数据集上运行此示例时，可能会注意到出现了一些亮斑。这是由于特征过度提取造成的，并且应该会很快消失。如果发现该问题持续存在，可以增加超参数\
  \ `n_residual_blocks` 来增加生成器中残差块的数量。\n\n增加残差生成器中的块数将减少特征过度提取的问题，但训练时间会更长。训练时间变长是由于网络中权重/参数数量增加所致。\n\
  \n图 6-4 展示了使用包含 9 个残差块的残差生成器，在“马到斑马”数据集上训练 CycleGAN 200 个 epoch 后的部分结果。结果并非最优，但可以看出生成器表现良好。当然，我们可以通过调整和超参数调优来改进这个训练示例。\n\
  \n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig4_HTML.jpg](img/502181_1_En_6_Fig4_HTML.jpg)\n\
  \n**图 6-4** CycleGAN 的样本训练输出\n\n使图像转换更自然的一种方法是增加残差块。你可以返回并尝试使用超参数增加残差块，并观察其对训练的影响。你可能还想切换数据集并重新训练，以观察数据域交换带来的效果。\n\
  \n`ResNet` 通过学习复制特征，为图像到图像转换的应用提供了一套有用的工具。正如我们所见，它也可以用于其他分类应用以及其他形式的图像转换。在下一节中，我们将研究一种新的条件式图像转换形式。\n\
  \n## 使用 StarGAN 创建人脸\n\n到目前为止，我们研究了使用成对或非成对训练集进行的无条件图像到图像转换。通过我们对 GAN 的逐步学习，我们了解到一个有用的特性是能够对输出进行条件控制。这不仅为我们提供了对输出的控制，还提高了模型的训练性能。\n\
  \nStarGAN 就是为引入条件控制而设计的 GAN 之一。它之所以得名，是因为该 GAN 是在一个包含已标注属性的人脸名人图像的综合性数据集上进行条件训练的。该数据集名为\
  \ `CelebA`，已成为人脸训练数据集的标准。\n\n`CelebA` 本身有几种不同的版本。我们将使用的版本是人脸居中在画面中的。除此之外，我们还将使用一个带注释的文本文件，该文件试图用\
  \ 30 多个属性来描述图像，这些属性包括黑发、金发、男性、年轻等。\n\n`StarGAN` 本身只是我们之前回顾过的条件 GAN（如 `cGAN`/`CGAN`\
  \ 或 `cDCGAN`）的一种高级实现。StarGAN 令人难以置信的地方在于，它如何巧妙地利用残差网络来生成一些令人惊叹的输出。\n\n图 6-5 展示了我们将在练习\
  \ 6-3 中研究的 StarGAN 笔记本的输出。该 GAN 在以下类别上进行了条件训练：黑发、金发、棕发、男性和年轻。根据图中的输出，除了“年轻”属性可能稍差外，整体效果看起来不错。\n\
  \n由于我们之前已经回顾过条件 GAN，并且已经涵盖了图像到图像转换，因此我们可以继续学习练习 6-3。在这个练习中，我们将研究一个在部分属性和数据子集上训练的\
  \ StarGAN 实现。\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig5_HTML.jpg](img/502181_1_En_6_Fig5_HTML.jpg)\n\
  \n**图 6-5** 训练 65 个 epoch 后的 StarGAN 输出\n\n### 练习 6-3. 使用 StarGAN 进行人脸条件控制\n\n1.\
  \ 从 GitHub 项目站点打开 `GEN_6_StarGAN.ipynb` 笔记本。如果不确定如何操作，请查阅附录 B。继续操作，从菜单中选择 **运行**\
  \ ➤ **全部运行** 来运行整个笔记本。\n\n2. 此笔记本的大部分代码应该很熟悉，但我们将再次介绍其中显示的新颖或不同的超参数。`n_residual_blocks`\
  \ 超参数允许我们控制生成器中使用的残差块数量，而 `lambda_cls` 和 `lambda_rec` 分别控制类别损失和重构损失的缩放比例。`lambda_gp`\
  \ 超参数缩放影响对抗损失的梯度惩罚量。评论器数量（`n_critics`）是指在生成器训练之前，判别器训练的次数。\n\n3. 我们使用的图像对齐 `CelebA`\
  \ 数据集非常大，超过 200,000 张图像。因此，还有一个值得注意的额外超参数 `train_split`，它控制模型训练所使用的数据量。该值设置为图像数量的\
  \ `.2`，即 20%。这样做是为了减少训练时间，但可能会影响输出质量。\n\n```python\nn_critic=5,\nresidual_blocks=16,\n\
  lambda_cls = 1,\nlambda_rec = 10,\nlambda_gp = 10\n```\n\n4. 我们做的另一个重要修改是，在将人脸图像加载到数据集时，先放大然后裁剪。这是通过下面显示的一组变换来执行的，并且极大地提高了训练性能：\n\
  \n```python\ntrain_split=.2\n```\n\n5. 接下来，我们将跳转到损失函数定义和模型代码的创建部分。在代码顶部，损失函数 `criterion_cls`\
  \ 接收 `logit`（类别）和目标作为输入，然后将其通过带有 logits 的二元交叉熵损失函数。此输出除以 `size(0)`（即批量大小），从而对结果进行平均。\n\
  \n\n\n```python\ntrain_transforms = [\n    transforms.Resize(int(1.25 * hp.img_size),\
  \ Image.BICUBIC),\n    transforms.CenterCrop(hp.img_size),\n    transforms.RandomHorizontalFlip(),\n\
  \    transforms.ToTensor(),\n    transforms.Normalize((0.5, 0.5, 0.5), (0.5, 0.5,\
  \ 0.5)),\n]\n```\n\n1.  跳转到训练代码部分，我们首先关注这里展示的判别器或对抗性损失。关键区别在于使用了`criterion_cls`损失函数增加了分类损失。\n\
  \n```python\ndef criterion_cls(logit, target):\n    return F.binary_cross_entropy_with_logits(logit,\
  \ target, size_average=False) / logit.size(0)\n\n### 初始化生成器和判别器\ngenerator = GeneratorResNet(img_shape=input_shape,\
  \ res_blocks=hp.residual_blocks, c_dim=c_dim)\ndiscriminator = Discriminator(img_shape=input_shape,\
  \ c_dim=c_dim)\nif cuda:\n    generator = generator.cuda()\n    discriminator =\
  \ discriminator.cuda()\ncriterion_cycle.cuda()\ngenerator.apply(weights_init_normal)\n\
  discriminator.apply(weights_init_normal)\n```\n\n1.  向下滚动一点到生成器损失部分，注意`n_critic`值如何在`if`语句中设置生成器的训练频率，从而控制我们对判别器和生成器应用损失的频率。如果你觉得其中一个模型超越了另一个，这是一个很有用的超参数可以调整。\n\
  \n2.  你还应该能看到生成器损失部分，如下所示。同样，损失计算与之前的练习类似，我们首先计算对抗性损失，然后是分类损失，最后是循环损失。使用 lambda\
  \ 缩放因子将它们全部相加。\n\n```python\n### 真实图像\nreal_validity, pred_cls = discriminator(imgs)\n\
  ### 伪造图像\nfake_validity, _ = discriminator(fake_imgs.detach())\n### 梯度惩罚\ngradient_penalty\
  \ = compute_gradient_penalty(discriminator, imgs.data, fake_imgs.data)\n### 对抗性损失\n\
  loss_D_adv = -torch.mean(real_validity) + torch.mean(fake_validity) + hp.lambda_gp\
  \ * gradient_penalty\n### 分类损失\nloss_D_cls = criterion_cls(pred_cls, labels)\n###\
  \ 总损失\nloss_D = loss_D_adv + hp.lambda_cls * loss_D_cls\n```\n\n1.  这个练习的训练时间可能会很长。然而，这段时间是值得的，因为这个示例可以产生相当逼真的结果。请务必打开`images`文件夹中的`list_attr_celeba.txt`文件。从这个文件中，你可以看到可以在此示例上训练的属性列表；大约有\
  \ 30 个属性。通过调整超参数列表`selected_attrs`来替换属性名称。\n\n```python\n### 翻译并重建图像\ngen_imgs =\
  \ generator(imgs, sampled_c)\nrecov_imgs = generator(gen_imgs, labels)\n### 判别器评估翻译后的图像\n\
  fake_validity, pred_cls = discriminator(gen_imgs)\n### 对抗性损失\nloss_G_adv = -torch.mean(fake_validity)\n\
  ### 分类损失\nloss_G_cls = criterion_cls(pred_cls, sampled_c)\n### 重建损失\nloss_G_rec\
  \ = criterion_cycle(recov_imgs, imgs)\n### 总损失\nloss_G = loss_G_adv + hp.lambda_cls\
  \ * loss_G_cls + hp.lambda_rec * loss_G_rec\n```\n\n如图 6-5 所示，这个 GAN 可以产生一些令人印象深刻且有趣的结果。虽然可能需要一些时间，但训练这个\
  \ GAN 绝对是值得的。这是一个你可以扩展并应用于自己项目的示例。它确实非常出色。\n\n在查看本章最后一个 GAN 之前，我们将在下一节中快速探讨如何使用现有的、成熟的参考模型。\n\
  \n## 最佳实践：迁移学习\n\n到现在为止，你可能已经注意到我们的模型以及我们处理它们的方式中存在一种模式。这当然是故意的，它允许代码轻松地从一个练习切换到另一个练习。在深度学习中，我们可以共享代码，但也可以共享模型、代码的实现和/或训练好的权重。\n\
  \n当我们在 PyTorch 或其他框架中构建一个模型时，该模型会被编译成一个数学函数图。这个图可以保存到磁盘上的文件中，以便以后无需原始代码即可重用。此外，我们还可以保存模型的训练参数/权重以供以后重用。\n\
  \n保存模型和权重的灵活性不仅会在未来帮助我们，还允许共享各种参考网络。参考网络或模型通常是通过文献发表或竞赛，在特定任务上被确立为当时最先进的模型。\n\n\
  ImageNet 就是为许多参考网络开发的一个任务。ImageNet 是一个包含 200 多万张图像、定义有 1000 个类别的大型数据集。网络在 ImageNet\
  \ 上根据分类准确率进行训练和测试，当时最准确的模型通常会被引入作为参考模型。\n\n起初，使用像 ImageNet 这样多样化图像集训练的模型，并且仍然能够重用这些模型，可能看起来很奇怪，直到你考虑到深度学习模型是按层构建的，这些层可以被移除或添加，然后重新编译。移除和添加模型的层允许将其扩展到新的共享领域。\n\
  \n图 6-6 展示了我们如何移除模型的底层（即分类层），并用新层替换它们，同时冻结几个现有层，即模型的顶层。冻结这些层意味着我们固定了权重，不允许模型进一步训练这些层。底层和新层被设置为可训练的，允许模型学习新的分类任务。\n\
  \n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig6_HTML.jpg](img/502181_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6\n\n迁移学习\n\n因此，我们可以采用像图 6-2 中所示的 VGG19 这样的参考模型，并将其从输出 1000 个类别重新调整为输出 4 个类别的模型。这样做的好处是我们在新模型中重用了模型训练好的特征提取能力。由于我们只在新模型中训练几个新层，我们可以快速训练一个新模型来分类新的输出。\n\
  \n从一个模型到另一个模型重用学习到的特征提取能力是有限度的。请记住，一个训练用于分类猫和狗的模型可能无法很好地迁移到需要识别重型机械的模型。幸运的是，在 1000\
  \ 类 ImageNet 数据集上训练的参考网络具有相当多样化的特征提取能力，可以适用于许多任务。\n\n在练习 6-4 中，我们将研究如何重新调整参考 VGG19\
  \ 模型的用途，使其对 CelebA 数据集进行分类。我们将使用上一个练习中 StarGAN 的注释，将其作为名人面孔的类别输出。由于我们重用了预训练的参考模型，我们的期望是模型能够快速学习。\n\
  \n**练习 6-4. 使用迁移学习进行特征重构**\n\n1.  从 GitHub 项目站点打开`GEN_6_Transfer_Learning.ipynb`笔记本。如果不确定如何操作，请查阅附录\
  \ B。\n\n2.  同样，此笔记本中的大部分代码应与之前的练习重复。花几秒钟查看代码，并观察超参数中的任何细微差异。\n\n3.  主要的关注点将是我们加载参考\
  \ VGG19 模型、冻结它，然后用一个新的设计替换底层分类层，该设计将输出分类到我们选择的类别。\n\n\n\n```python\nclasses = hp.selected_attrs\n\
  ### 基于 VGG19 加载模型\nmodel = torchvision.models.vgg19(pretrained=True)\n### 冻结各层\n\
  for param in model.parameters():\n    param.requires_grad = False\n### 修改最后一层\n\
  number_features = model.classifier[6].in_features\nfeatures = list(model.classifier.children())[:-1]\
  \ # 移除最后一层\nfeatures.extend([torch.nn.Linear(number_features, len(classes))])\n\
  model.classifier = torch.nn.Sequential(*features)\n```\n\n4.  没错，就是这么简单。现在我们有了一个新模型，它经过训练可以提取特征，我们可以将这些特征重新用于新的分类器。这个分类器能够处理我们选定的类别。\n\
  \n5.  向下滚动到底部附近的训练代码，注意我们是如何训练模型的。留意我们如何使用 `torch.max` 将标签从类别数组缩减为最大值。这意味着我们只训练模型输出单个类别的最大值。\n\
  \n```python\ninputs, labels = data\ninputs = inputs.cuda()\nlabels = labels.cuda()\n\
  optimizer.zero_grad()\nwith torch.set_grad_enabled(True):\n    outputs = model(inputs)\n\
  \    loss = loss_fn(outputs, torch.max(labels, 1)[1])\n    loss.backward()\n   \
  \ optimizer.step()\n```\n\n6.  模型完成训练后，我们希望继续操作，并通过可视化方式在验证数据集上对其进行测试。我们通过以下代码实现这一点：\n\
  \n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig7_HTML.jpg](img/502181_1_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7** 预测输出示例\n\n1.  图 6-7 展示了模型输出的可视化样本。注意模型如何仅预测单个类别；这是有意为之，因为模型每次只训练输出一个类别。\n\
  \n```python\nnum_images = 6\nwas_training = model.training\nmodel.eval()\nwith torch.no_grad():\n\
  \    (inputs, labels) = next(iter(val_dataloader))\n    inputs = inputs.cuda()\n\
  \    outputs = model(inputs)\n    preds = torch.where(outputs > .5, 1, 0)\n    for\
  \ i in range(len(inputs)):\n        pred_label = [hp.selected_attrs[i] for i, label\
  \ in enumerate(preds[i]) if label > 0]\n        truth_label = [hp.selected_attrs[i]\
  \ for i, label in enumerate(labels[i]) if label > 0]\n        print(f\"预测值: {(pred_label[0]\
  \ if pred_label else None)} 真实值: {truth_label}\")\n        imshow(make_grid(inputs[i].cpu()),\
  \ size=pic_size)\nmodel.train(mode=was_training)\n```\n\n1.  这个模型训练速度很快，所以可以返回去尝试不同的类别，看看这对预测输出有什么影响。\n\
  \n现在，你并不总是需要冻结参考模型的所有层。事实上，你可以选择只冻结模型的一部分，允许某些层将学习到的特征提取调整到你的领域。我们通常不会冻结或解冻模型中的较低层。这些层是针对特定领域进行更精细调整的层。\n\
  \n迁移学习是一种极好的方法，可用于从分类到特征提取等各种应用中对模型进行再学习。在下一节中，我们将探索一种新的 GAN，它正是利用 VGG19 来进行特征提取。\n\
  \n## 使用 SRGAN 提高分辨率\n\n在导演雷德利·斯科特 1982 年的电影《银翼杀手》中，有一个场景是哈里森·福特扮演的主角使用软件放大并增强静态图像。虽然这部电影设定在未来，但没过多久，这种技术就在电影和电视节目中反复出现。\n\
  \n这成了一种刻板印象，以至于喜剧演员甚至网络迷因都以此取乐，嘲笑这种所谓的应用，并解释说图像分析软件永远不可能那样工作。好吧，那都是在生成模型和深度学习出现之前的事了。\n\
  \n幸运的是，随着生成模型和深度学习的发展，我们现在可以做到这部近 40 年前的未来主义电影所设想的事情。通过生成模型，我们现在可以放大图像，同时提高图像分辨率。\n\
  \n能够做到这一点的 GAN 被称为*超分辨率*（SRGAN），它最初的设计目的仅仅是提高图像分辨率。通过一些细微的修改，我们不仅会看到这个 GAN 如何提高分辨率，还会看到它如何同时实现放大。\n\
  \nSRGAN 虽然有些简单，但它结合了几种技术的精华来实现其神奇效果。在 SRGAN 中，生成器与一个确定特征损失的特征提取器配对。这个特征提取器模型基于 VGG19\
  \ 模型，但我们不是重新利用该模型，而是只移除最后一层。\n\n通过移除 VGG19 模型的最后一层，我们将模型输出从 1000 个类别转换为最后一层中提取的特征。然后，这些提取的特征可以与真实图像进行比较，以确定生成过程中的进一步损失或误差。这需要添加新的分类层，这些层随后可以学习对提取的特征进行重新分类。\n\
  \n结合 ResNet，SRGAN 成为一个相对简单但功能强大的模型，我们将在下一个练习中看到这一点。这个模型一开始训练速度非常慢，所以请耐心等待，如果一段时间内看到输出效果不佳，不要惊慌。让我们进入练习\
  \ 6-5，看看未来会带来什么。\n\n**练习 6-5. 使用 SRGAN 提高分辨率**\n\n1.  从 GitHub 项目站点打开 `GEN_6_SRGAN.ipynb`\
  \ 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2.  这段代码的大部分内容会很熟悉，但请注意我们如何在该部分定义一个新的超参数。SRGAN 使用像 CelebA\
  \ 这样的单一图像集，但会准备并将图像副本调整为我们想要的输出大小。为了设置图像增强的程度，我们使用 `hr_size` 来定义高分辨率图像集的大小。\n\n\
  ```python\nimg_size=128,\nhr_size=256,\n```\n\n3.  向下滚动到加载图像的 `ImageSet` 类数据加载器。在里面，注意我们如何使用第一个数据集创建两个图像集。一个图像集将是低分辨率的，另一个是高分辨率的。转换各个图像集的代码如下所示：\n\
  \n```python\nself.lr_transform = transforms.Compose(\n    [\n        transforms.Resize((hr_height\
  \ // 4, hr_height // 4), Image.BICUBIC),\n        transforms.ToTensor(),\n     \
  \   transforms.Normalize(mean, std),\n    ]\n)\nself.hr_transform = transforms.Compose(\n\
  \    [\n        transforms.Resize(int(1.5*hr_height), Image.BICUBIC),\n        transforms.CenterCrop(hr_height),\n\
  \        transforms.ToTensor(),\n        transforms.Normalize(mean, std),\n    ]\n\
  )\n```\n\n4.  注意高分辨率图像的转换 `self.hr_transform` 包含了我们在 StarGAN 中使用的放大功能以及中心裁剪，从而有效地放大了名人的脸部。`self.lr_transform`\
  \ 通过 `hr_height // 4` 缩小图像，从而将图像尺寸减小到原来的四分之一。\n\n5.  再次向下滚动到模型定义，查看此处显示的新模型类 `FeatureExtractor`。在这个模型中，我们可以看到如何使用预训练模型创建\
  \ VGG19 参考模型。然后，模型从第 18 层开始被切片，从而移除了最后的分类层。\n\n\n\n```python\nclass FeatureExtractor(nn.Module):\n\
  \    def __init__(self):\n        super(FeatureExtractor, self).__init__()\n   \
  \     vgg19_model = vgg19(pretrained=True)\n        self.feature_extractor = nn.Sequential(*list(vgg19_model.features.children())[:18])\n\
  \    def forward(self, img):\n        return self.feature_extractor(img)\n```\n\n\
  6.  接下来，我们可以向下滚动一点，快速查看`generator`、`discriminator`和`feature_extractor`这三个模型是如何创建的。\n\
  \n```python\ngenerator = GeneratorResNet()\ndiscriminator = Discriminator(input_shape=(hp.channels,\
  \ *hr_shape))\nfeature_extractor = FeatureExtractor()\n### 将特征提取器设置为推理模式\nfeature_extractor.eval()\n\
  ```\n\n7.  向下滚动到训练代码块，查看生成器的损失是如何计算的。注意内容损失在最终损失确定中的使用方式。\n\n```python\n### 从低分辨率输入生成高分辨率图像\n\
  gen_hr = generator(imgs_lr)\n### 对抗损失\nloss_GAN = criterion_GAN(discriminator(gen_hr),\
  \ valid)\n### 内容损失\ngen_features = feature_extractor(gen_hr)\nreal_features = feature_extractor(imgs_hr)\n\
  loss_content = criterion_content(gen_features, real_features.detach())\n### 总损失\n\
  loss_G = loss_content + 1e-3 * loss_GAN\n```\n\n8.  这个模型训练可能需要一段时间，初始输出可能看起来像垃圾。请耐心等待，让模型训练几个周期，奇迹才会开始发生。\n\
  \n图 6-8 显示了训练数小时后的模型结果。最左侧的图像是原始的 64×64 低分辨率图像，右侧是 256×256 的高分辨率图像。虽然看起来只是放大了，但请注意，左侧图像是低分辨率的，同时被放大和升采样。\n\
  \n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig8_HTML.jpg](img/502181_1_En_6_Fig8_HTML.jpg)\n\
  \n**图 6-8** SRGAN 的样本训练输出\n\n生成式建模和 SRGAN 使我们能够做到以前只存在于科幻小说中的事情，而现在已成为现实。这必将受到生成式建模和像\
  \ SRGAN 这样的 GAN 爆发的塑造。无论结果如何，SRGAN 的可能性仍有待观察。\n\n## 结论\n\nResNet 在 GAN 中的应用使得生成模型现在能够超越我们一些最疯狂的期望。我们在本章中研究的\
  \ GAN 当然可以直接使用，从进行性别转换到改变发色，生成一些逼真的内容。\n\n在本书的这个阶段，我们开发的模型可以用于广泛的商业应用，从简单的图像增强到向客户展示不同发色或服装可能的样子。这些可能性是无穷无尽且强大的，并且每天都在变得更强。\n\
  \n随着我们继续阅读本书，我们将继续关注逼真度，但本章应该是一个里程碑。这很可能是你第一次能够生成非常逼真的假图像。想到这些可能性，既令人兴奋，又令人深思后感到恐惧。\n\
  \n凭借你在本书中学到的这些新技能，同样重要的是要记住，你正在成为一个新时代的巫师。虽然这个 AI 巫师群体没有既定的准则，但有几条尚未成文的规则。\n\n在这些未成文或部分成文的规则中，有一条几乎在所有列表中位居榜首，那就是不要用我们构建的\
  \ AI 模型作恶。对许多人来说，这是黄金法则，从谷歌到微软的许多公司都曾因试图打破这条规则而引发广泛的员工异议。\n\n因此，我希望你在本章及后续章节中获得的知识只用于善途。在构建模型时，请始终牢记这一点。虽然你无法预想到每一种应用，但请考虑他人可能作恶的方式并加以避免。\n\
  \n在下一章中，我们将通过一种名为*注意力*的新机制来探索增强生成模型的更多方法。注意力机制目前正在席卷深度学习领域，并渗透到从自然语言处理到 GAN 的各种应用中。\n\
  \n"
- "# 7. 注意力即一切！\n\n*注意力*一词源自拉丁语 *attentionem*，意为关注或需要某人的专注。这是一个用来要求人们集中注意力的词，从军事教官到老师和家长都在使用。然而，这也是我们在数学和计算机科学中用来描述某物如何关注或关联到另一物的词。\n\
  \n2017 年，里程碑式的论文《注意力即一切》将这一概念向前推进了一步，将注意力机制应用于深度学习，以理解特征如何关注其他特征。该论文的作者展示了具有影响力的结果，这些结果自此改变了深度学习。\n\
  \n虽然原始论文中展示的工作注意力机制主要用于自然语言处理应用，但直到一年后，GAN 的创造者才在名为*自注意力 GAN*（SAGAN）的 GAN 中展示了有效的注意力机制。\n\
  \n在本章中，我们将仔细研究注意力机制的工作原理以及如何将其融入深度学习。我们首先了解各种类型的注意力及其使用方法。然后，通过代码示例了解基本注意力机制如何提取特征关系。最后，我们通过一个与卷积层配合使用的注意力可视化示例来结束本章。\n\
  \n引入自注意力机制会增加训练压力，在开始使用注意力之前，我们需要了解函数的一些基本属性。其中一个属性是 Lipschitz 连续性，它是 GAN 中平衡训练的基础。因此，我们将花一些时间来理解什么是\
  \ Lipschitz 以及如何使用它。\n\n接下来，我们将构建一个在 CelebA 人脸数据集上训练的 SAGAN 示例，训练模型从零开始盲目生成真实人脸。最后，我们将通过构建一个带有残差网络和多个\
  \ Lipschitz 约束辅助工具的 SAGAN 模型来结束本章。\n\n你一路努力走到这里，在本章中，我们构建和使用的模型将开始获得巨大的回报。我们现在构建或使用的模型能够产生前沿的结果，这应该使本章成为迄今为止最激动人心的一章。本章将涵盖以下内容：\n\
  \n*   注意力\n*   用注意力增强卷积\n*   GAN 中的 Lipschitz 连续性\n*   构建自注意力 GAN\n*   改进 SAGAN\n\
  \n与之前你努力完成的几章相比，本章可能会让你感觉像旋风一样。我们将花更多时间从核心上理解如何利用基本数学属性有效训练 GAN。我们还将深入探讨如何在特征映射中识别上下文和关系。\n\
  \n\n\n## 什么是注意力？\n\n我们可以将“*注意力*”一词理解为：你或其他实体专注于特定任务或其他实体的程度。在军队中，你可能被要求“立正”（come\
  \ to attention），意思是站直并目视前方；而亲密的朋友或亲戚可能会用这个词来请求你的陪伴和关注。\n\n无论如何，我们都可以将注意力理解为一个实体关注或听从另一个实体指令的程度。简单来说，我们可以这样关联对象：A\
  \ 关注 B，但 B 可能不关注 A。换句话说，A 听从 B 的指令，但 B 不听从 A 的指令。\n\n图 7-1 展示了一个关于鼠标在网页表单上移动的热度注意力图。图中，颜色代表热度或注意力程度。红色区域代表我们注意力集中的热点区域，或者访问者鼠标悬停的区域。较冷的蓝色区域代表鼠标很少或没有关注。\n\
  \n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig1_HTML.jpg](img/502181_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n鼠标移动注意力图\n\n在数学和深度学习的各种应用中使用的注意力，通常与图 7-1 中的示例非常相似。事实上，我们将在本章后面看到其中一些注意力图。这些示例可能使用不同的渐变来表示注意力，但概念是相同的。\n\
  \n注意力的概念最初被应用于自然语言处理，作为一种在序列到序列翻译模型中关联词对的方法。众所周知的 `Seq2Seq` 模型，其概念与自编码器非常相似。它们通过从词对中学习来有效地翻译语言，这个想法与我们用于图像到图像翻译的\
  \ GAN 并无不同。\n\n传统上，在 NLP 应用中，使用循环或门控网络层来识别单词之间的关系。这与卷积不同，循环网络依赖于一种递归方法来展开序列以训练网络层。这使得深度学习模型能够学习时间或语言上的序列。\n\
  \n不幸的是，循环网络的可扩展性不佳，尤其是当学习的序列规模增大时。事实上，原始论文中注意力机制承诺的主要改进之一就是提高了训练的可扩展性，特别是在应用于更长的序列时。\n\
  \n将注意力机制添加到 NLP 模型中，通常被封装在一种称为*变换器*（transformers）的升级版 `Seq2Seq` 模型类型中。因此，带有注意力机制的变换器彻底革新了自然语言模型，带来了前所未有的提升。你可能已经听说过这些模型被称为\
  \ `BERT`，或者更著名的 `GPT-2` 和 `GPT-3`。\n\n图 7-2 展示了一组语言翻译文本的注意力图。图的左侧是英文单词，顶部是相同短语的西班牙语。图中较亮的区域表示单词之间相互关注的程度更高。暗色区域表示单词之间可能没有关联。\n\
  \n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig2_HTML.jpg](img/502181_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n\n用于语言翻译的 NLP 注意力图\n\nNLP 模型在生成文本翻译时，会利用注意力来权衡最可能的单词配对。这使得模型不仅能学习单词序列，还能学习单词之间如何链接或关联。这个概念已经有效地取代了\
  \ NLP 任务中对循环网络的依赖。\n\n`GPT-2` 花了将近一年时间才向公众发布，原因是担心该模型能够生成看似可信但实则虚假的新闻文本。虽然本书不涉及\
  \ NLP 文本生成，但只需认识到这些模型共享许多相同的概念。在下一节中，我们将探讨注意力的类型以及它们之间的关系。\n\n### 理解注意力的类型\n\n我们通常认为“*注意力*”这个词是二元的，意思是你要么在专注，要么不在，尽管我们在日常生活中理解并使用着各种类型的专注。我们可能会用其他措辞来表示我们的注意力集中在某个特定问题上，无论是局部还是全局，甚至进一步专注于一组任务或项目中的特定元素，并理解它们彼此之间以及自身之间的关系。\n\
  \n在机器学习中，注意力是一种机制，我们可以用它来在不同上下文中关联特征与其他特征。我们可能需要考虑局部特征组如何相互关注，或者一个特征在全局上下文中如何表示。注意力可以是局部注意力或全局注意力，也可以是硬注意力或软注意力。\n\
  \n图 7-3 展示了应用于图像的两种注意力类型。在左侧，我们看到狗的头部是清晰的，身体其余部分仍然略微可见但不太清晰。这是一个全局注意力的例子，因为我们可以看到狗的头部与图像其余部分的关系。然而，它也是一个软注意力的例子，因为我们可以观察到图像中清晰度的逐渐丧失。\n\
  \n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig3_HTML.jpg](img/502181_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n\n注意力类型作用于图像的示例\n\n相反，图 7-3 的右侧展示了一个硬局部注意力的例子。它是“硬”的，因为我们只关注一个局部区域，完全忽略了图像的其余部分。同样，这种注意力也是局部的，因为我们不知道狗的头部在全局中相对于图像其他部分应该如何呈现。\n\
  \n卷积层是局部软或硬注意力机制的一个例子。当与池化层一起使用时，CNN 是硬聚焦的，因为它们移除了空间关系，从而使提取的特征输出变得块状。使用卷积残差块的 `ResNet`\
  \ 模型是局部软注意力机制的一个例子。软化是由于残差在层间传递或跳跃而产生的。\n\n自注意力（原始论文中提出的注意力类型）是一种进一步的类型，它使用全局软机制来学习特征自身或特征内部的重要性。这以特征/注意力图的形式产生输出，显示一个特征与另一个特征之间的关系。\n\
  \n图 7-4 展示了自注意力如何应用于句子中的单词。高亮（红色）文本显示了句子中的焦点词，以及它如何与句子中每组单词的其他单词相关联。单词周围的阴影越深，该单词与焦点词的相关性或关注度就越高。图\
  \ 7-2 也展示了自注意力应用于注意力图上的一组单词的示例。\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig4_HTML.jpg](img/502181_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n\n应用于文本的自注意力，展示句子中单词的关系\n\n现在我们已经了解了注意力的基本类型，接下来需要在下一节中探讨如何应用注意力。\n\n\n\
  \n#### 应用注意力机制\n\n注意力不仅形式多样，从局部硬性注意到全局软性注意，还可以通过多种机制来应用。表 7-1 展示了用于特征提取和/或关系建模的多种注意力机制示例。虽然我们可以更详细地审视每种方法，但我们的主要焦点将是最后一种——Transformer。\n\
  \n**表 7-1** 用于应用注意力的注意力机制\n\n| 注意力机制 | 说明 | 参考文献 |\n| --- | --- | --- |\n| 基于内容\
  \ | 余弦相似度 | Graves2014 |\n| 拼接或加性 | 对权重应用 Tanh 函数 | [Bahdanau2015](https://arxiv.org/pdf/1409.0473.pdf)\
  \ |\n| 基于位置 | 对权重进行 Softmax 对齐 | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf)\
  \ |\n| 通用 | 直接应用于权重 | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf) |\n| 点积\
  \ | 注意力参数与点积结合 | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf) |\n| 缩放点积 | 与点积相同，但应用了缩放变量\
  \ | [Vaswani2017](http://papers.nips.cc/paper/7181-attention-is-all-you-need.pdf)\
  \ |\n\n图 7-5 展示了原始论文中提出的 Transformer 架构。在图中，你可以看到使用了两种形式的注意力：多头注意力和缩放点积注意力。两者结合，提供了我们之前讨论过的自注意力机制。\n\
  \n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig5_HTML.jpg](img/502181_1_En_7_Fig5_HTML.jpg)\n\
  \n**图 7-5** 展示多头注意力的 Transformer 架构\n\n多头注意力机制由 AAYN 论文的作者提出，其内部展开为图 7-5 插图中所示的缩放点积注意力形式。再次提醒，该论文的重点是训练\
  \ NLP 模型，因此图中所示的架构是针对 NLP Transformer 的，而非我们稍后将看到的 GAN 设计。然而，用于提取自注意力的多头注意力机制将是我们关注的重点。\n\
  \n请参考图 7-5 以及最右侧的放大图，该图突出显示了应用于三个输入 `Q`、`K` 和 `V` 的缩放点积注意力机制。这些字母分别缩写为 `Q`（代表 `querys`，是的，拼写有误）、`K`（代表\
  \ `keys`）和 `V`（代表 `values`）。首先将 `Q` 和 `K` 相乘，然后进行缩放，并通过一个 softmax 函数。此输出再与输入值相乘。\n\
  \n为了演示如何以这种方式计算自注意力，我们当然需要通过一个练习来查看一些代码。练习 7-1 除了展示计算步骤外，不做其他任何事情。所有输入和权重都是随机化的，你可以将其视为训练的初始阶段。让我们开始看看多头注意力是如何工作的。\n\
  \n**练习 7-1. 理解多头注意力**\n\n1.  从 GitHub 项目站点打开 `GEN_7_Attention.ipynb` 笔记本。如果不确定如何操作，请参考附录\
  \ B。\n\n2.  第一个单元格表示导入和一个示例随机输入，如下所示：\n\n```\n    import torch\n    import numpy\
  \ as np\n    x = np.random.randint(0,3,(3,4))\n    x = torch.tensor(x, dtype=torch.float32)\n\
  \    print(x)\n```\n\n3.  同样，输入和权重都是随机化的，我们只关注计算步骤。这里是创建 `query`、`key` 和 `values`\
  \ 随机权重的地方：\n\n```\n    w_key = np.random.randint(0,2,(4,3))\n    w_query = np.random.randint(0,2,(4,3))\n\
  \    w_value = np.random.randint(0,4,(4,3))\n    w_key = torch.tensor(w_key, dtype=torch.float32)\n\
  \    w_query = torch.tensor(w_query, dtype=torch.float32)\n    w_value = torch.tensor(w_value,\
  \ dtype=torch.float32)\n    print(w_key)\n    print(w_query)\n    print(w_value)\n\
  ```\n\n4.  在真正的多头自注意力层中，这些权重会随着时间推移进行训练。\n\n5.  接下来，我们将所有权重应用于输入 `x`，以推导出 `keys`、`querys`\
  \ 和 `values`。\n\n```\n    keys = x @ w_key\n    querys = x @ w_query\n    values\
  \ = x @ w_value\n    print(keys)\n    print(querys)\n    print(values)\n```\n\n\
  6.  之后，我们将 `querys` 乘以 `keys` 的转置，并计算 `attn_scores` 值。\n\n```\n    attn_scores =\
  \ querys @ keys.T\n    print(attn_scores)\n```\n\n7.  然后，我们对输出 `attn_scores` 应用\
  \ `softmax` 函数，得到 `attn_scores_softmax`。\n\n```\n    from torch.nn.functional import\
  \ softmax\n    attn_scores_softmax = softmax(attn_scores, dim=-1)\n    print(attn_scores_softmax)\n\
  ```\n\n8.  最后，通过乘以 values 并求和结果来生成输出。\n\n```\n    weighted_values = values[:,None]\
  \ * attn_scores_softmax.T[:,:,None]\n    outputs = weighted_values.sum(dim=0)\n\
  \    print(outputs)\n```\n\n你应从上述练习中掌握的核心内容是：通过一个简单示例，了解如何将多头注意力应用于输入 `x` 的功能性步骤。实际使用卷积实现多头注意力会更加复杂，这将在下一节中讨论。\n\
  \n\n\n## 用注意力增强卷积\n\n注意力（自注意力）增强卷积的概念最早通过自注意力 GAN 论文引入。在该论文中，作者展示了如何利用多头自注意力机制来增强卷积层。\n\
  \n图 7-6 摘自原始 SAGAN 论文，展示了一个增强注意力层的工作原理。从左侧输入侧开始，卷积输出进入该机制并被分割成 1×1 卷积层。输出的 `f(x)`\
  \ 代表 `keys` 头，`g(x)` 函数代表 `querys`，当然 `h(x)` 代表 `values`。\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig6_HTML.jpg](img/502181_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n\n应用于卷积层的多头自注意力\n\n回顾练习 7-1 中其余计算的应用方式，你就能从高层次理解多头自注意力是如何计算的。输出的自注意力特征图随后被传递到后续的卷积块中。在何处以及应用多少自注意力，取决于模型架构。在大多数情况下，你会将自注意力应用于模型的较低层和/或输出层。\n\
  \n代码清单 7-1 摘自 `GEN_7_SAGAN.ipynb` 示例中的 `Self_Attn` 层类。`Self_Attn` 类为卷积增强的自注意力提供了一个封装器。我们将在本章后面查看完整示例，但请注意\
  \ `query` 和 `key` 卷积层如何通过除以 8 来改变输入 `in_dim`，而值卷积保持不变。\n\n```\nself.query_conv =\
  \ nn.Conv2d(in_channels = in_dim , out_channels = in_dim//8 , kernel_size= 1)\n\
  self.key_conv = nn.Conv2d(in_channels = in_dim , out_channels = in_dim//8 , kernel_size=\
  \ 1)\nself.value_conv = nn.Conv2d(in_channels = in_dim , out_channels = in_dim ,\
  \ kernel_size= 1)\n```\n\n代码清单 7-1\n\n注意力卷积层\n\n在 `Self_Attn` 类的 `forward` 函数内部，我们可以看到自注意力机制的应用位置。除了使用\
  \ `view` 进行张量操作以及使用 `torch.bmm`（代表批量矩阵乘法）之外，代码清单 7-2 中显示的代码与我们之前在练习 7-1 中介绍的内容类似。\n\
  \n```\n### forward 函数内部\nm_batchsize,C,width ,height = x.size()\nproj_query  = self.query_conv(x).view(m_batchsize,-1,width*height).permute(0,2,1)\
  \ # B X CX(N)\nproj_key =  self.key_conv(x).view(m_batchsize,-1,width*height) #\
  \ B X C x (*W*H)\nenergy =  torch.bmm(proj_query,proj_key) # 转置检查\nattention = self.softmax(energy)\
  \ # BX (N) X (N)\nproj_value = self.value_conv(x).view(m_batchsize,-1,width*height)\
  \ # B X C X N\nout = torch.bmm(proj_value,attention.permute(0,2,1) )\nout = out.view(m_batchsize,C,width,height)\n\
  out = self.gamma*out + x\nreturn out,attention\n```\n\n代码清单 7-2\n\n`Self_Attn` 类的\
  \ `forward` 函数内部\n\n请注意，代码清单 7-2 中的 `forward` 函数有两个输出：经过注意力处理的输出 `out` 和计算出的 `attention`\
  \ 图。虽然我们不会进一步投影这些输出，但可视化这些注意力图是可行的。我们可以通过练习 7-2 来了解如何可视化这些注意力图。\n\n练习 7-2. 可视化自注意力图\n\
  \n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig7_HTML.jpg](img/502181_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n\n控制可视化选项的界面\n\n1.  在浏览器中打开 GitHub 项目站点上的 `https://epfml.github.io/attention-cnn/`\
  \ 笔记本。\n\n2.  该网站是作为 ICLR 2020 上发表的论文《论自注意力与卷积层之间的关系》的一部分而开发的。\n\n3.  图 7-7 显示了可视化表格的起始部分，并提供了可视化三种类型注意力的选项。\n\
  \n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig8_HTML.jpg](img/502181_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8\n\n每层和每个头生成的注意力图\n\n1.  点击最右侧的 Vision Transformer，注意图像也会随之变化。\n\n2.  将鼠标悬停在图像上，你会看到下方表格中的注意力图随着你划过每个像素而更新。\n\
  \n3.  图 7-8 展示了将像素悬停在鲨鱼图片上时得到的自注意力图示例。\n\n1.  仔细观察这些图，在许多图中你会看到鲨鱼的轮廓，这代表了该像素如何关注鲨鱼身上的其他特征。\n\
  \n该网页和论文展示了模型每一层上的多头注意力。在某些情况下，你可能希望对模型中的每一层都应用注意力，而在其他情况下则可能不需要。\n\n截至 2020 年，卷积的增强注意力正变得相当流行，这是有充分理由的。注意力机制是一个强大的工具，可以为通过卷积或其他方式提取的特征提供学习到的上下文信息。然而，我们总是需要平衡两方面的改进，以构建一个好的生成器。因此，在将注意力应用于\
  \ GAN 之前，我们想在下节中再次回顾训练平衡的重要性。\n\n## GAN 中的 Lipschitz 连续性\n\n在本书的大部分内容中，我们都讨论了平衡生成器和判别器训练的必要性。没有平衡，如果任何一方变得过于精确，另一方就永远没有机会变得更好。\n\
  \n举个例子，想象你正在训练成为一名冠军跑步运动员。你的训练对手很荣幸是地球上最快的人——尤塞恩·博尔特。你每天训练，并与尤塞恩比较你的进步。不幸的是，尤塞恩也在每天训练，并且进步和你一样多，甚至更多。由于你是在将自己的表现与博尔特的表现进行比较，你的收益以及你的表现开始下降。最终，你放弃了，决定在场边观看。\n\
  \n同样的原理也适用于常规 GAN。由于生成器是根据判别器来衡量其性能的，如果判别器变得非常擅长区分真假，那么反馈给生成器的损失就会减少。反过来，生成器用于训练的损失也会减少，导致梯度消失问题。\n\
  \n如果你正在训练一个 GAN，并注意到输出开始退化，这很可能是判别器变得过于优秀的迹象。当你的生成器似乎停止或不再改进时，则会发生相反的情况。这是判别器正在退化或已达到其最大潜力的迹象。\n\
  \n因此，平衡是训练 GAN 的关键，我们之前已经研究过一些方法来更好地管理这个问题。回想一下我们在第 4 章中讨论的各种衡量和比较分布的方法。我们介绍了 WGAN，这是一种使用推土机距离算法来确定损失，而不是像\
  \ KL 这样的散度函数的 GAN。\n\n由于 GAN 中的平衡点是判别器，我们通常首先着眼于它来改善平衡和训练稳定性。我们可以通过审视判别器试图逼近的函数的一个抽象属性来实现这一点。这个属性被称为\
  \ Lipschitz 连续性，这将是我们在下一节中要介绍的内容。\n\n\n\n### 什么是利普希茨连续性？\n\n利普希茨连续性是一个函数的数学性质，它定义了具有一致连续性的子类。也就是说，如果一个函数在其整个图像上是一致连续的，那么它就是利普希茨连续的。这意味着图像上每一对点之间的斜率都必须位于某个值或常数之内。\n\
  \n图 7-9 展示了两个函数：`f(x) = sin(x)` 和 `f(x) = x²`。第一个函数是利普希茨连续的，因为展示变化连续性的边界线没有与图像相交。相反，第二个函数不是利普希茨连续的，因为当利普希茨常数等于\
  \ 1.0 时，边界线与图像相交了。虽然我们可以增大这个常数/斜率，但出于稳定性的考虑，我们更倾向于将其保持在 1。\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig9_HTML.jpg](img/502181_1_En_7_Fig9_HTML.jpg)\n\
  \n**图 7-9**  \n连续与非连续利普希茨函数的示例\n\n在 WGAN 中，通过使用推土机距离函数，判别器试图保持利普希茨连续性，因为该函数近似于一个连续函数。然而，请记住，由于我们的网络是在近似一个函数，它可能会推断出一个仍然破坏连续性的函数。\n\
  \n我们可以通过利普希茨约束或一种度量来控制函数的 LS 连续性，这种度量使用几种不同的形式来控制函数的变化程度。该约束被称为 *1-利普希茨约束*，因为我们力求将变化强制为常数\
  \ 1。以下列出的形式是我们在采用某种形式的约束训练梯度时通常考虑的：\n\n- **“软” 1-利普希茨约束**：梯度函数被强制平均等于或接近 1。因此，某些函数点的值可能很高，而其他点的值则很低。\n\
  - **“硬” 1-利普希茨约束**：这强制每个点的梯度都小于或等于 1。这通常适用于对抗训练。\n- **“梯度” 1-利普希茨约束**：这强制梯度在几乎所有地方都接近\
  \ 1。这通常不用于其他机器学习领域，但在基于 Wasserstein 距离进行训练时是必需的。\n\n为了对梯度实施 1-利普希茨约束，我们通常使用两种方法：权重裁剪和谱归一化。权重裁剪，或对梯度进行惩罚，确保权重被裁剪，使得利普希茨常数小于\
  \ 1。我们在前几章中一直使用清单 7-3 中所示的 `gradient_penalty` 函数进行权重裁剪。\n\n```\n#@title 辅助函数 - 计算梯度惩罚\n\
  def compute_gradient_penalty(D, real_samples, fake_samples, labels):\n\"\"\"计算 WGAN\
  \ GP 的梯度惩罚损失\"\"\"\n### 用于在真实样本和虚假样本之间插值的随机权重项\nalpha = FloatTensor(np.random.random((real_samples.size(0),\
  \ 1, 1, 1)))\n### 获取真实样本和虚假样本之间的随机插值\ninterpolates = (alpha * real_samples + ((1\
  \ - alpha) * fake_samples)).requires_grad_(True)\nd_interpolates = D(interpolates,\
  \ labels)\nfake = Variable(FloatTensor(np.ones(d_interpolates.shape)), requires_grad=False)\n\
  ### 获取关于插值的梯度\ngradients = autograd.grad(\noutputs=d_interpolates,\ninputs=interpolates,\n\
  grad_outputs=fake,\ncreate_graph=True,\nretain_graph=True,\nonly_inputs=True,\n\
  )[0]\ngradients = gradients.view(gradients.size(0), -1)\ngradient_penalty = ((gradients.norm(2,\
  \ dim=1) - 1) ** 2).mean()\nreturn gradient_penalty\n```\n\n**清单 7-3**  \n`gradient_penalty`\
  \ 函数\n\n以这种方式进行权重裁剪的问题在于，近似函数总是假设利普希茨常数小于 1。这意味着近似函数更加平缓，具有更平滑的山丘和山谷。这反过来可能会冲淡我们试图生成的复制输出中的重要细节。\n\
  \n谱归一化是一种依赖于对梯度张量进行奇异值分解的方法，它为每个元素生成一个 sigma 值。通过取张量的最大 sigma 值并将其除以所有值，我们可以确保最大值是\
  \ 1，从而确认该函数是 1-利普希茨连续的。\n\n清单 7-4 展示了 `SpectralNorm` 类的 `compute_weight` 函数，我们将在训练时将其用作约束梯度的方法。该函数使用\
  \ SVD 来确定 sigma 的值，然后将所有权重除以 sigma，以确保没有权重大于 1。\n\n```\ndef compute_weight(self,\
  \ module):\nweight = getattr(module, self.name + '_orig')\nu = getattr(module, self.name\
  \ + '_u')\nsize = weight.size()\nweight_mat = weight.contiguous().view(size[0],\
  \ -1)\nwith torch.no_grad():\nv = weight_mat.t() @ u\nv = v / v.norm()\nu = weight_mat\
  \ @ v\nu = u / u.norm()\nsigma = u @ weight_mat @ v\nweight_sn = weight / sigma\n\
  ```\n\n**清单 7-4**  \n谱归一化 `compute_weight` 函数\n\n在下一个练习中，我们将看到这两种方法如何帮助改进判别器训练以及\
  \ GAN 的平衡。虽然这两种方法可以像我们在前几章中看到的梯度惩罚那样单独使用，但练习 7-3 将演示两者的结合。\n\n#### 练习 7-3. GAN 中的利普希茨连续性\n\
  \n1. 从 GitHub 项目站点打开 `GEN_7_Lipschitz_GAN.ipynb` 笔记本。运行整个笔记本。\n2. 此代码示例与第 4 章的 `GEN_4_DCGAN.ipynb`\
  \ 练习笔记本几乎相同。唯一的区别是这里添加了梯度惩罚损失和谱归一化。\n3. 添加梯度惩罚损失和谱归一化相对容易。以下代码展示了一个判别器及其内部卷积块，其中\
  \ `SpectralNorm` 类包装了卷积层。\n\n```\n    class Discriminator(nn.Module):\n    def __init__(self):\n\
  \    super(Discriminator, self).__init__()\n    def discriminator_block(in_filters,\
  \ out_filters, bn=True):\n    block = [SpectralNorm(nn.Conv2d(in_filters, out_filters,\
  \ 3, 2, 1)),\n    nn.LeakyReLU(0.2, inplace=True), nn.Dropout2d(0.25)]\n    if bn:\n\
  \    block.append(nn.BatchNorm2d(out_filters, 0.8))\n    return block\n```\n\n4.\
  \ 我们同样可以轻松地使用 `SpectralNorm` 类将谱归一化添加到生成器的卷积层。这里保持生成器简洁，以便专注于判别器。\n5. 如果我们向下滚动到训练块，可以再次回顾如何通过以下方式将梯度惩罚损失应用于判别器损失：\n\
  \n```\n    real_loss = loss_fn(discriminator(real_imgs), valid)\n    fake_loss =\
  \ loss_fn(discriminator(gen_imgs.detach()), fake)\n    # 梯度惩罚\n    gradient_penalty\
  \ = compute_gradient_penalty(discriminator, real_imgs.data, gen_imgs.data)\n   \
  \ loss_D = real_loss + fake_loss + hp.lambda_gp * gradient_penalty\n```\n\n6. `lambda_gp`\
  \ 是缩放超参数，用于调整将多少梯度惩罚应用于总损失计算。您可以通过在笔记本中向上滚动几个块来参考 `gradient_penalty` 函数。\n7. 这个笔记本通常需要更长的时间才能稳定下来，因此输出在开始时可能看起来相当随机。只需认识到这是维持利普希茨连续性的一个后果。请耐心等待，让样本训练几个小时，以注意到生成的细节数量增加。\n\
  \n现在我们已经完成了对 GAN 中利普希茨连续性的探讨，我们将在下一节回到自注意力和自注意力 GAN 的工作中。\n\n\n\n## 构建自注意力生成对抗网络\n\
  \nSAGAN 原论文的作者发现，即使尝试通过梯度惩罚和/或 Wasserstein 距离来平衡训练，自注意力机制仍会导致判别器失去 Lipschitz 连续性。因此，他们采用上一节刚刚介绍过的谱归一化形式实施了一种修复方案。\n\
  \n通过引入自注意力机制及其所需的约束条件（即谱归一化），作者成功将简单的 DCGAN 转换为 SAGAN。这进而为纯粹的盲样本生成（而非图像到图像的转换）带来了令人惊叹的成果。\n\
  \n在练习 7-4 中，我们将研究一个基础的 SAGAN 实现，该模型经过训练可从 CelebA 数据集生成人脸。请记住，这个生成器（GAN）完全是盲生成人脸，仅使用带有自注意力的卷积操作。当然，为了平衡训练，我们加入了一些谱归一化来避免情况失控。\n\
  \n### 练习 7-4. 构建并训练 SAGAN\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig10_HTML.jpg](img/502181_1_En_7_Fig10_HTML.jpg)\n\
  \n**图 7-10** 训练练习 `GEN_7_DCGAN_SAGAN.ipynb` 的示例输出\n\n1. 从 GitHub 项目站点打开 `GEN_7_DCGAN_SAGAN.ipynb`\
  \ 笔记本。运行整个笔记本。\n\n2. 此代码示例与第 4 章的 `GEN_4_DCGAN.ipynb` 练习笔记本几乎相同。这里的关键区别在于模型中增加了自注意力和谱归一化。\n\
  \n3. 向下滚动到 `Generator` 类定义，查看层配置和 `forward` 函数的起始部分，即可了解自注意力层是如何添加到模型中的，如下所示：\n\n\
  ```\nself.attn1 = Self_Attn( 512, 'relu')\nself.attn2 = Self_Attn( 256, 'relu')\n\
  self.attn3 = Self_Attn( 128, 'relu')\nself.attn4 = Self_Attn( 64,  'relu')\ndef\
  \ forward(self, z):\n    z = z.view(z.size(0), z.size(1), 1, 1)\n    out=self.l1(z)\n\
  \    out,_ = self.attn1(out)\n    out=self.l2(out)\n    out,_ = self.attn2(out)\n\
  \    out=self.l3(out)\n    out,p1 = self.attn3(out)\n    out=self.l4(out)\n    out,p2\
  \ = self.attn4(out)\n    out=self.last(out)\n    return out, p1, p2\n```\n\n4. 同样，自注意力也可以按如下方式添加到\
  \ `Discriminator` 类中：\n\n```\nself.attn1 = Self_Attn(64, 'relu')\nself.attn2 = Self_Attn(128,\
  \ 'relu')\nself.attn3 = Self_Attn(256, 'relu')\nself.attn4 = Self_Attn(512, 'relu')\n\
  def forward(self, x):\n    out = self.l1(x)\n    out,p0 = self.attn1(out)\n    out\
  \ = self.l2(out)\n    out,p0 = self.attn2(out)\n    out = self.l3(out)\n    out,p1\
  \ = self.attn3(out)\n    out=self.l4(out)\n    out,p2 = self.attn4(out)\n    out=self.last(out)\n\
  \    return out.squeeze(), p1, p2\n```\n\n5. 该模型中的所有层都在其间使用了自注意力。不过，你可以通过简单地注释掉模型中不需要的注意力层来调整此行为。添加注意力层会因额外的计算以及平衡\
  \ Lipschitz 连续性的需求增加而降低训练性能。\n\n6. 如果你愿意，可以注释掉部分或全部注意力层，以观察这对训练产生的影响。如果这样做，请务必调整模型的注意力输出（`p1`、`p2`）。\n\
  \n7. 最后，在训练模块中，我们可以看到所有这些是如何整合在一起计算损失的，如下所示：\n\n```\nd_out_real,dr1,dr2 = discriminator(real_images)\n\
  #hinge loss\nd_loss_real = torch.nn.ReLU()(1.0 - d_out_real).mean()\nz = tensor2var(torch.randn(real_images.size(0),\
  \ hp.latent_dim))\nfake_images,gf1,gf2 = generator(z)\nd_out_fake,df1,df2 = discriminator(fake_images)\n\
  #hinge loss\nd_loss_fake = torch.nn.ReLU()(1.0 + d_out_fake).mean()\n### Backward\
  \ + Optimize\nd_loss = (d_loss_real + d_loss_fake) / 2\nd_loss.backward()\noptimizer_D.step()\n\
  ```\n\n8. 在此示例中，我们使用铰链损失，通过将输出传递给 `ReLU` 函数并取平均值来确定损失。这只是一种控制负损失的方法。请注意，判别器的注意力图输出并未被使用。\n\
  \n9. 图 7-10 显示了此练习训练数小时（第 14 个周期）后的输出。请注意输出的质量，并记住所有这些面孔都不是真实的人。这些面孔完全是盲生成的。\n\n\
  考虑到生成器在生成人脸时完全是盲操作的，上一个练习的输出相当令人印象深刻。这与我们在过去几章中看到的图像到图像模型形成了鲜明对比。\n\n正如人们所说，从这里我们只能向上走，在下一章中，我们将改进这个示例，研究生成条件人脸，同时结合残差网络以获得更好的样本生成效果。\n\
  \n\n\n## 改进 SAGAN\n\n`自注意力`为特征学习提供了另一个维度，即相对于卷积的全局特征定位，但正如我们所知，这并非没有副作用。这些副作用可以通过强制满足利普希茨连续性来最小化，但我们仍然存在其他问题，比如特征过度提取。\n\
  \n为了帮助缓解这些问题，我们将研究 SAGAN 的另一个示例，该示例在卷积中使用残差块进行跳跃连接，并增加了条件生成。正如我们之前所见，条件生成和判别可以通过定位子域来提高性能。\n\
  \n在练习 7-5 中，我们研究如何使用 ResNet 卷积模型、标签和条件来改进 SAGAN。我们将再次使用 CelebA 数据集，这次将标记的属性作为每张图片的类别。因此，我们希望我们的类别是唯一的，并且不能在图像之间共享。为此，我们将坚持使用基本发色（金色、黑色和棕色）作为类别，并且只加载具有这些属性的名人面孔。练习\
  \ 7-5 改进了我们之前的工作，因为它还尝试生成 128×128 像素的人脸，这是迄今为止我们进行的最大规模的盲生成。\n\n### 练习 7-5. 改进 SAGAN\n\
  \n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig11_HTML.jpg](img/502181_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11\n\n训练名人 SAGAN 的示例输出\n\n1.  从 GitHub 项目站点打开 `GEN_7_Celeb_SAGAN.ipynb` 笔记本。运行整个笔记本。\n\
  \n2.  此代码示例再次基于第 4 章的 `GEN_4_DCGAN.ipynb` 练习笔记本。大部分新代码仅存在于定义模型和辅助函数的几个代码块中。请注意，此笔记本在使用\
  \ GPU 运行时目前会占用 Google Colab 的所有内存。因此，在修改某些超参数（如批量大小或图像大小）时需要小心。\n\n    增加任何模型的批量大小都会增加模型在处理前向传播时的内存需求。通过减小批量大小，可以降低内存需求，但这可能会降低训练性能质量并增加运行时间。\n\
  \n3.  跳转到模型部分和 `Generator` 类定义。注意 `SelfAttention` 类是如何在几个层之间使用的：\n\n```\n    ConvBlock(512,\
  \ 512, n_class=n_class),\n    ConvBlock(512, 256, n_class=n_class),\n    SelfAttention(256),\n\
  \    ConvBlock(256, 128, n_class=n_class),\n    SelfAttention(128),\n    ConvBlock(128,\
  \ 64, n_class=n_class)])\n```\n\n4.  同样，我们可以在判别器结构中看到相同的结构：\n\n```\n    SelfAttention(128),\n\
  \    conv(128, 256, downsample=False),\n    SelfAttention(256),\n    conv(256, 512),\n\
  \    conv(512, 512),\n    conv(512, 512))\n```\n\n5.  注意在生成器和判别器模型构建中 512 层的加倍。你可以尝试添加更多重复层或自注意力层。然而，当前配置已经使用了最大的\
  \ GPU 内存。虽然你可以将运行时切换到 CPU 并增加模型参数，但在 CPU 上训练这样的模型会非常耗时。\n\n6.  此示例的另一个新特性是引入了调度器。调度器允许我们在运行时修改超参数（即那些可以修改的参数）。虽然你可以安排任何超参数进行更改，但在训练期间，最常见的修改对象是学习率。在优化器部分，我们创建了两个新的调度器，如下所示：\n\
  \n```\n    scheduler_G = StepLR(optimizer_G, step_size=1, gamma=hp.lr_gamma)\n \
  \   scheduler_D = StepLR(optimizer_D, step_size=1, gamma=hp.lr_gamma)\n```\n\n7.\
  \  这些调度器会随着时间的推移衰减学习率，方法是将当前学习率乘以 `lr_gamma` 超参数，该参数在示例中设置为 .999。在每次对生成器运行训练批次后，我们通过调用\
  \ `step` 函数来步进/衰减学习率，如下所示：\n\n```\n    scheduler_G.step()\n    scheduler_D.step()\n\
  ```\n\n8.  接下来，我们将查看判别器损失计算。注意我们是如何使用铰链损失来计算对抗性假损失和真损失，然后通过附加梯度惩罚来计算总损失的。\n\n```\n\
  \    loss_D_fake = F.relu(1 + fake_validity).mean()\n    loss_D_real = F.relu(1\
  \ - real_validity).mean()\n    loss_D = loss_D_real + loss_D_fake  + hp.lambda_gp\
  \ * gradient_penalty\n```\n\n9.  如图 7-11 所示，这个示例可能需要一段时间来训练，甚至才能产生一些有趣的结果。然而，一旦成功，输出可能会非常有趣，并且在某些方面具有艺术性。\n\
  \n这个练习和示例可能需要很长时间的训练才能获得极好的结果，但在此之前你得到的结果本身也可能令人着迷。花些时间观察这个示例的训练过程，你会得到既有有趣又有令人惊讶的输出作为回报。\n\
  \n作为额外内容，第 6 章的 StarGAN 笔记本已升级为使用自注意力和谱归一化。请务必也查看 `GEN_7_Self-attention_STARGAN.ipynb`\
  \ 笔记本，以获取更多关于将自注意力与谱归一化结合使用的示例。\n\n至此，我们关于自注意力、使用自注意力的 GAN 以及支持它们的机制的旋风式章节就结束了。\n\
  \n## 结论\n\n在本章中，我们学习了注意力，以及如何从局部/全局和软/硬的角度来定义它。理解注意力不仅使我们能够更好地定义特征映射或关系，还能重新生成这些相同的关系。\n\
  \n然而，使用注意力的扩展特征映射也要求我们更好地理解判别器/生成器的训练平衡。为此，我们研究了一个重要的数学和抽象函数性质，称为利普希茨连续性。这个抽象术语定义了函数的均匀性或平滑程度。\n\
  \n因此，我们了解到，通过使用梯度惩罚损失或谱归一化来约束函数的利普希茨连续性，GAN 可以成为更平衡的训练器，从而使我们能够使用更好的特征提取策略，如自注意力。\n\
  \n最后，在本章中，我们首先将所有这些整合到一个 SAGAN 的实现中，该 SAGAN 在名人面孔上训练，目的是盲生成新面孔。然后，为了改进这个模型，我们添加了残差网络块用于特征跳跃，这是我们从上一章借鉴的改进，再次用于生成全新的面孔，这次分辨率更高，理想情况下细节更丰富。\n\
  \n\n\n"
- "# 8. 高级生成器\n\n人工智能和机器学习领域正日新月异地发展，各种新型的生成对抗网络（GAN）和生成器层出不穷。通过本书的学习，我们回顾了这些生成器的发展历程。我们深入研究了它们对生成任务的贡献细节和技术进步，也探讨了它们可能存在的不足之处。\n\
  \n本书的目标是为您提供扎实的基础知识，以便理解生成器的细微差别以及如何构建它们。使用像 Google Colab 这样的平台，可以让学生们更容易地学习复杂算法，而无需忍受自行安装依赖项的烦恼。这大大降低了新手接触生成器和深度学习的门槛。\n\
  \n不幸的是，随着人工智能/机器学习技术的飞速发展，我们遇到了收益递减的瓶颈：代码示例变得异常庞大，新变体或新功能层出不穷，以至于解释一种新型 GAN 就可能耗尽本书的剩余篇幅。因此，在本章及接下来的几章中，我们将采用更偏向功能性的方法，使用封装好的代码来运用生成器。\n\
  \n在本章中，我们将首次尝试使用封装好的开源代码，这些代码可以快速搭建，并用于训练或实际的生成任务。本章中我们将看到的所有示例都是生成器的进阶版本。虽然我们不会深入分析它们的代码，但会从宏观层面了解它们的工作原理。由于这些代码都是开源的，感兴趣的读者可以自行深入研究其内部机制。\n\
  \n本章将从渐进式生成对抗网络（ProGAN）开始。这是一种通过训练逐步构建图像分辨率来开发生成器的方法。接着，我们将介绍风格生成对抗网络（StyleGAN），这是一种受风格迁移启发、基于\
  \ ProGAN 构建的 GAN。我们还将探讨 StyleGAN2（即第二代版本），它在我们的老朋友 CelebA 数据集上训练后，能够产生一些非常出色的结果。\n\
  \n在云端笔记本上训练高级 GAN 并非理想之选，因此在本章的最后部分，我们将探讨如何使用其他生成器包进行生成。首先，我们将介绍 DeOldify，这是一种受新启发的生成器，被称为\
  \ NoGAN，能够为老照片和视频着色。然后，我们将以另一种非 GAN 的实现——ArtLine 来结束本章，它可以将照片转换为线条画。\n\n本章融合了训练\
  \ ProGAN 和 StyleGAN2 等高级示例，以及使用 DeOldify 和 ArtLine 等酷炫生成器的内容。与之前的章节相比，我们将把代码视为一个黑盒，只关注让程序包运行起来所需的部分。以下是本章将涵盖的主要内容摘要：\n\
  \n-   渐进式增长的生成对抗网络\n-   使用 StyleGAN 第二版进行风格化\n-   使用新型 NoGAN——DeOldify\n-   使用 ArtLine\
  \ 展现艺术效果\n\n如果您一直跟随本书的示例进行实践，那么现在您肯定已经是一位深度学习和 GAN 训练大师了。虽然在本章中我们仍会借鉴其中的一些技能，但我们将采用更偏向功能性的生成方法。不过在此之前，我们将在下一节中探讨渐进式\
  \ GAN 增长的基础知识。\n\n## 渐进式增长的生成对抗网络\n\n2016 年，英伟达的一个团队发表了一篇题为《渐进式增长生成对抗网络以提升质量、稳定性和多样性》的论文。该论文概述了一种渐进式增长\
  \ GAN 的流程，从非常低分辨率的图像开始，逐步提升到高分辨率。一个 ProGAN 可能从 4×4 像素的图像开始，最终生成 1024×1024 的高分辨率图像。\n\
  \nProGAN 的概念源于解决我们在卷积中经常遇到的问题。正如我们在本书中反复看到的，卷积层越深，它们产生的噪声就越多。我们在探索用于特征提取和重建的深度 CNN\
  \ 层的各个章节中都观察到了这一点。\n\n我们已经看到了几种解决深度卷积问题的方法，包括批归一化、UNet、ResNet 以及带有谱归一化的自注意力机制。虽然这些方法本身已经取得了成功，但\
  \ ProGAN 的概念更进一步，将训练分解为多个渐进阶段。\n\n毕竟，我们不能指望给小学生讲授微积分，那么我们又怎能期望一个未经训练的 GAN 在没有过往经验的情况下学会生成人脸呢？尽管我们通过数千次迭代输入数千张人脸来尝试训练这样的模型，但这种训练方式会变得效率低下。\n\
  \n正如我们现在所知，这种低效率发生在我们的模型变得过大过深，包含数十或数百个卷积层的时候。但是，如果我们要训练模型生成高分辨率图像，就必须创建如此庞大的模型。然而，ProGAN\
  \ 并非从一开始就构建这些模型，而是通过训练逐步构建模型。\n\n图 8-1 展示了在面部数据上训练 ProGAN 的渐进过程。该过程首先将真实的训练图像缩小到\
  \ 4×4 像素，然后将它们输入到为该图像尺寸设计的 GAN 中。经过一段时间的训练后，通过添加用于更高分辨率的新层来增长 GAN，首先是 8×8，然后逐步增加到\
  \ 16×16、32×32、64×64，以此类推，直到 1024×1024。\n\n渐进式增长 GAN 的代价是，需要反复构建后续模型，且分辨率越来越高，从而增加了额外的训练时间。此外，训练此类模型需要额外的数据准备和存储空间。在使用像\
  \ Colab 这样的云端笔记本时，这些要求并不理想，因此我们将在练习中坚持使用一些更简单的示例。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig1_HTML.jpg](img/502181_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\nProGAN 训练渐进过程\n\n图 8-2 展示了原始作者提出的 ProGAN 中生成器和判别器的内部结构。在图中，您可以看到用于定义\
  \ GAN 从 4×4 到 16×16 初始渐进阶段的基础模块。随着模型继续构建到所需的任何分辨率，会使用图中所示的模板形成新的模块，其中 k 代表最终输出图像所需的像素分辨率。\n\
  \n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig2_HTML.png](img/502181_1_En_8_Fig2_HTML.png)\n\
  \n图 8-2\n\nProGAN 内部结构\n\n在图 8-2 所示的生成器内部，有一种称为 Pixelnorm（像素归一化层）的新型层。像素归一化类似于批归一化，不同之处在于它将每个特征像素向量归一化到长度为\
  \ 1，并将其传递回模块中的卷积层。这样做是为了避免我们在前几章中遇到的“特征叠加”或“噪声特征提取”问题。\n\n\n\n### ProGAN 与 StyleGAN\
  \ 版本 2\n\n作者还提出了一种新的判别器层形式，称为**小批量标准差（MSD）层**，同样如图 8-2 所示。引入这种新层形式是为了给判别器增加一种手段，用于跟踪真实图像批次与伪造图像批次之间的统计信息，并将这些统计信息作为训练中的一个额外通道。\n\
  \n添加`MSD`层的结果是迫使生成器以匹配真实数据的方式变化其生成的样本。这会导致生成输出更加多样化，并减少生成器陷入尝试解决特定特征的可能性。在之前的许多\
  \ GAN 训练练习中，我们已经看到了非多样化输出的后果。\n\n现在我们对 ProGAN 的高级工作原理有了很好的理解，可以看看如何在练习 8-1 中使用一个实现此类\
  \ GAN 的 Python 包。同样，这些 GAN 的训练成本可能很高，因此我们将看一个简单的训练集示例，以便初步体验。\n\n#### 练习 8-1：使用\
  \ ProGAN\n\n1.  从 GitHub 项目站点打开`GEN_8_ProGAN.ipynb`笔记本。如果不确定如何操作，请查阅附录 B。\n\n2.\
  \  笔记本中的第一个单元格安装了`pro-gan-pth`包，该包来自 [`https://github.com/akanimax/pro_gan_pytorch`](https://github.com/akanimax/pro_gan_pytorch)，这是一个致力于此类\
  \ GAN 的开源项目：\n\n    ```\n    !pip install pro-gan-pth --quiet\n    ```\n\n3.  此示例中的`imports`和其他设置代码已被精简，对于读到本书这一部分的多数读者来说应该足够简单。我们将从如下所示的函数开始，介绍几个更有趣的部分：\n\
  \n    ```\n    def check_output():\n        print(\"rendering output loop - started\"\
  )\n        folder = './samples'\n        while running:\n            time.sleep(15)\n\
  \            file = get_latest_file(folder)\n            if file:\n            \
  \    clear_output()\n                print(file)\n                visualize_output(file,10,10)\n\
  \    ```\n\n4.  此函数用于在 ProGAN 代码训练时渲染输出。为了在笔记本中看到连续输出，我们将在训练单元格外部的一个独立进程中使用此函数。这样做是为了让输出能够实时渲染并在训练期间可见。\n\
  \n5.  接下来，我们向下滚动到创建并训练 ProGAN 的位置，代码如下：\n\n    ```\n    pro_gan = pg.ConditionalProGAN(num_classes=10,\
  \ depth=depth,\n                                   latent_size=latent_size, device=device)\n\
  \    with io.capture_output() as captured:\n        pro_gan.train(\n           \
  \ dataset=dataset,\n            epochs=num_epochs,\n            fade_in_percentage=fade_ins,\n\
  \            batch_sizes=batch_sizes\n        )\n    ```\n\n6.  此包的默认训练实现相当嘈杂，在笔记本中效果不佳。因此，我们使用`io.capture.output()`函数关闭输出，以抑制单元格的输出。\n\
  \n7.  从这里，我们可以通过实例化一个用于渲染的工作附加进程和一个用于训练的工作线程，来了解这段代码是如何全部运行的。\n\n    ```\n    t1\
  \ = threading.Thread(target=train_gan)\n    p = multiprocessing.Process(target=check_output)\n\
  \    start = time.time()\n    p.start()\n    t1.start()\n    t1.join()\n    ```\n\
  \n8.  同样，这段代码是为了让我们能够看到 GAN 训练过程中的输出。由于 GAN 是在另一个名为`t1`的线程中创建的，我们使用`t1.start`和`t1.join`来启动并等待线程完成。同样，`p`是为将运行渲染循环的进程创建的。但请注意，如果你终止单元格，渲染循环进程将继续运行，因此要停止该进程，你需要从菜单中选择运行时重启。\n\
  \n9.  从菜单中选择 **运行** ➤ **全部运行** 以开始训练，并在 ProGAN 训练时查看结果。\n\n在前面的练习训练过程中，你看到了模型从 4×4\
  \ 分辨率开始逐步提升。此示例的最终输出并不出色，因为它只升级到了三代，但请记住，随着模型的改进，更高分辨率在训练过程中会持续看起来更好。\n\n当然，你可以尝试此\
  \ GAN 的其他变体，从训练其他样本数据到自行探索 Python 包的不同功能。如果你想进一步探索此 GAN，请查阅 GitHub 资源页面以获取更多文档。ProGAN\
  \ 是下一节我们将要探讨的 GAN 下一个重要步骤的良好示范。\n\n## 使用 StyleGAN 版本 2 进行样式化\n\n最初的 StyleGAN 首次出现在\
  \ NVIDIA 团队的另一篇论文《一种基于样式的 GAN 生成器架构》中，该论文扩展了他们在 ProGAN 上的工作。这种形式的 GAN 是为了扩展生成器的生成能力，特别是不同特征的生成能力而开发的。\n\
  \n作者发现，他们可以将特征提取和复制隔离为三个不同的类别或粒度。这反过来又投射到 GAN 本身的架构中：在较低/顶层，提取较粗糙的特征，而较低的块则识别更详细的特征。作者定义了这些特征提取的粒度，如下所示：\n\
  \n- **粗粒度（小于 8² 像素）**：在低细节处识别，包括头发、面部朝向和大小等特征\n- **中粒度（从 16² 到 32² 像素）**：通常由更精细的面部特征、闭眼和张嘴等特征定义\n\
  - **细粒度（64² 及以上像素）**：调整到眼睛、头发和肤色等细节特征\n\n基于这种在层级别提取特征的概念，StyleGAN 通过提供两个新的主要增强功能扩展了模型。第一个是映射网络，提供了将特征向量输入映射到实际可见特征的能力。第二个是添加了样式模块，将这些特征映射转换为可见特征。\n\
  \n### 映射网络\n\n映射网络提供了一种将编码向量表示转换为可见特征的非平凡方法。这些形式的网络工作方式类似于自编码器的编码器部分，但额外增加了识别可见特征的步骤。将编码映射到特征所产生的产物称为**特征纠缠**。\n\
  \n图 8-3 展示了映射网络，并详细说明了用于将特征映射到向量的八层分解，这些层将结果缩减到与输入相同的大小。在该图中，你可以看到结果（称为`W`）如何被馈送到\
  \ ProGAN 合成网络中进行生成。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig3_HTML.jpg](img/502181_1_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3** StyleGAN 中的映射网络\n\n\n\n### 风格模块\n\n风格模块，即自适应实例归一化（AdaIN），将映射网络的向量输出\
  \ `W` 引入模型的生成层。在每个相应的渐进块中，每个上采样层和卷积层之间都会添加一个这样的模块。\n\n图 8-4 展示了 AdaIN 模块的添加过程，以及将映射网络编码后的\
  \ `W` 作为每个模块直接输入的使用方式。在某些方面，这类似于残差网络，我们通过允许输入以某种形式绕过某些层来实现跨层跳跃。AdaIN 模块并非使用完整的输入，而是使用一个经过探索的映射输出作为\
  \ `W`；它们仅提供输入的缩放/归一化。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig4_HTML.jpg](img/502181_1_En_8_Fig4_HTML.jpg)\n\
  \n**图 8-4** 包含 AdaIN 模块的 StyleGAN 架构\n\n在图 8-4 的放大示意图中，你可以看到编码后的向量是如何在层间对输出进行缩放和归一化的内部工作机制。这意味着\
  \ AdaIN 层不像 ResNet 那样是加法性的，而是定义了一个应用于输出的缩放归一化过程。\n\n通过在层间对输出进行平移和缩放，AdaIN 模块有助于提升每个卷积层中相关滤波器的重要性，从而使生成器能够更好地理解哪些特征比其他特征更相关。将其视为一个内部强化循环也可能有所帮助，在这个循环中，映射层基于对更相关特征的理解来学习如何编码\
  \ `W` 向量。\n\n#### 移除随机/传统输入\n\n由于映射网络仅依赖于将随机输入简化为一个编码，作者决定摒弃对随机性的需求。相反，他们使用常量输入作为传入的初始向量。这通过最小化或控制输入生成器的随机输入，极大地减少了特征纠缠的问题。\n\
  \n当不同的特征（如头发的位置）可能被无意中映射到一起时，就会产生特征纠缠。在我们之前的训练练习中，你可能无数次注意到这一点，比如一缕缕头发可能出现在脸旁边，而不是在头顶上。\n\
  \n#### 随机变化（噪声输入）\n\n在移除随机输入后，就需要向模型中添加某种形式的变异性。没有变异性，模型会变得过于专门化。添加噪声可以使模型保持更强的泛化能力。作者发现，他们可以通过在输入传入\
  \ AdaIN 层之前向每个通道添加随机噪声来引入输出的变异性。\n\n在每个风格块中添加随机噪声的好处在于，它可以控制模型生成的细节，从而允许随机生成更精细的特征细节，例如雀斑、胡须、皱纹/酒窝。如果没有随机噪声，这些精细细节就会被更粗粒度的特征所掩盖。\n\
  \n#### 风格混合\n\n使用 `W` 中间编码向量作为每个 AdaIN 块的直接输入的一个缺点是，模型特征之间存在紧密的相关性。为了打破这种相关性，会选择两组输入并通过映射网络，然后每个输出以\
  \ 50/50 的概率随机传递给每个 AdaIN 块。\n\n虽然这对 StyleGAN 使用的所有形式的训练数据并非都有益，但对于像 CelebA 这样的同质数据集，它确实有积极的效果。作者发现，他们可以将一个生成图像的特征与第二个生成图像的特征结合起来，生成第三个全新的组合图像。\n\
  \nYouTube 上有一个很好的视频演示了这种效果，网址是 [`https://youtu.be/kSLJriaOumA`](https://youtu.be/kSLJriaOumA)。该视频直观地展示了图像特征如何组合以生成新的独特组合图像。\n\
  \n#### W 的截断\n\n正如我们在几章中看到的，真实数据中表示不佳的区域不容易生成。例如，在我们的 CelebA 数据集中，只有一小部分图像包含秃头的人。在之前的生成器中，这导致生成的秃头人物效果很差，因为样本的代表性不足。\n\
  \n为了适应训练中这个常见的缺陷，作者实现了对编码向量 `W` 的平均化处理。维护一个 `W` 的连续平均值，称为 `wavg`，然后将编码向量 `W` 转换为与该平均值的差值（delta）。\n\
  \n这里的思路是，生成最佳的平均图像，然后通过允许使用 `w_delta` 对图像进行修改来反向工作，这也提供了额外的特征控制能力。这反过来又允许仅通过改变 `w_delta`\
  \ 来控制模型，这与我们使用变分自编码器在均值和方差之间进行映射的方式类似。\n\n#### 超参数调优\n\nStyleGAN 作者贡献巨大的最后一个主要元素是花费大量时间调整和优化模型的超参数。与他们之前\
  \ ProGAN 的工作相比，他们取得了显著的改进。学习率、训练轮次等超参数值在代码中都已进行了优化。\n\n因此，我们即将看到的 StyleGAN 和 StyleGAN2\
  \ 在人脸生成方面产生了令人难以置信的输出。如果你决定在自己的数据集上使用这个模型，你可能需要花时间相应地修改各种超参数。\n\n### Frechet Inception\
  \ Distance\n\n生成模型的输出是通过一个称为 Frechet Inception Distance（FID）的指标来衡量的。该距离基于比较预训练的图像分类网络在真实图像和输出图像上的激活值。得分越低，表示生成的模型输出越好。\n\
  \n在图 8-5 中，展示了基于 ProGAN 的 StyleGAN（上方）与第二版 StyleGAN2（下方）的 FID 对比。FFHQ 代表 Flikr-Faces\
  \ HQ，这是另一个用于训练生成器的人脸数据集。你可以看到，结果从第一个表格中 ProGAN 的 FID 得分 7-8，降低到 StyleGAN2 的略低于 3。\n\
  \n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig5_HTML.jpg](img/502181_1_En_8_Fig5_HTML.jpg)\n\
  \n**图 8-5** StyleGAN 与 StyleGAN2 的 FID 得分对比\n\n这些结果令人印象深刻，如果你想直观地了解 StyleGAN2 的表现有多出色，可以访问\
  \ `whichfaceisreal.com`，该网站直观地展示了这些生成的人脸有多么逼真。\n\n虽然我们没有时间更详细地回顾 StyleGAN，因为涵盖所有这些特性的代码量很大，但我们将继续探讨当前人脸生成的黄金标准。这个标准目前由\
  \ StyleGAN2 设定，我们将在下一节中更详细地介绍它。\n\n### StyleGAN2\n\n尽管 NVIDIA 的团队本可以满足于 StyleGAN\
  \ 的成果，但他们继续挑战可能性的极限，并因此推出了 StyleGAN2。这个版本进一步将 FID 得分从 4.40 降低到 2.84，并生成了迄今为止最逼真的一些人脸。\n\
  \n与上一节我们审视 StyleGAN 时类似，我们将回顾每个相对于图 8-5 提升了 FID 得分的特征组。我们从下一节中的第一个特征——权重解调开始。\n\n\
  \n\n### 权重解调\n\n`AdaIN`层源于早期一个名为*神经风格迁移*的概念，该概念能够捕捉并迁移风格。然而，`StyleGAN2`的作者发现，诸如水滴或污渍之类的视觉伪影，会因风格的强化而通过图像传播。\n\
  \n相反，他们发现可以将`AdaIN`层移至卷积层内部，不再作为直接输入，而是作为归一化层融入其中。\n\n将风格归一化融入卷积层本身的好处在于实现了计算的并行化，从而使模型训练速度提升高达\
  \ 40%，并进一步消除了水滴或污渍等视觉伪影。\n\n### 路径长度正则化\n\n这为损失函数引入了一个新的归一化项，以更好地平滑或均匀化潜在空间。我们在本书中多次看到，在生成模型中归一化或均匀化潜在空间的重要性。这是理解如何生成能够产生一致输出的模型的关键概念。\n\
  \n平滑潜在空间使得图像能够更容易地映射到该空间并从该空间映射出来，在已知的投影中，这不仅能实现更可控的图像生成，还能将图像投影回潜在空间编码。理解从潜在空间到生成图像的这种关系，使得能够沿着潜在空间的路径生成图像。\n\
  \n平滑和理解潜在空间的能力为从动画到年龄增长等更多应用提供了可能。这些应用已通过`StyleGAN2`在风格和特征间的动画生成中成功展示。\n\n### 惰性正则化\n\
  \n应用路径长度正则化可能是一个计算成本高昂的过程，且并非每次训练迭代都能带来收益。因此，在`StyleGAN2`中，`PLR`仅每`n`次迭代应用一次，其中`n`通常设置为`16`，但也可调整。\n\
  \n### 无需渐进式增长\n\n正如我们所看到的，渐进式增长 GAN 成功地从`4×4`像素构建出高达`1024×1024`像素的大尺度图像。然而，`ProGAN`通常会出现对某些特征（如鼻子、眼睛和嘴巴）的强烈位置偏好。\n\
  \n为了绕过这些问题，同时仍能实现生成器模型的渐进式发展，我们转向另一篇近期论文：Animesh Karnewar 和 Oliver Wang 的《生成对抗网络的多尺度梯度》。该论文提出了使用单一架构实现多尺度梯度的概念。\n\
  \n图 8-6 展示了多尺度梯度 GAN（`MSG-GAN`）的架构，请勿将其与食品添加剂混淆。在`MSG-GAN`中，模型被设计为基于我们在`ProGAN`中看到的相同渐进过程，逐步构建生成输出。\n\
  \n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig6_HTML.jpg](img/502181_1_En_8_Fig6_HTML.jpg)\n\
  \n**图 8-6**  \n`MSG-GAN`架构\n\n`StyleGAN`的作者采用了这种渐进模型，并通过输入/输出跳跃连接实现，这与我们在`ResNet`中看到的类似。图\
  \ 8-7 展示了`MSG-GAN`、输入/输出跳跃连接和`ResNet`三种模型架构差异的对比。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig7_HTML.jpg](img/502181_1_En_8_Fig7_HTML.jpg)\n\
  \n**图 8-7**  \n渐进式架构对比\n\n`StyleGAN2`中使用的跳跃连接架构可以执行与`ProGAN`相同的特征粒度渐进式增长，使模型能够更专注于更高层级的进展（例如`1024×1024`分辨率），而非通过常规的渐进式发展。当使用大型网络进行扩展时，这种增强效果会进一步放大，我们将在下一节看到。\n\
  \n### 大型网络\n\n通过对`ResNet`的探索，我们看到了一个典型的只有 10 层或更少卷积层的浅层模型，如何通过跳跃连接的魔力，增加到拥有超过 100\
  \ 层的生成器。与`ResNet`类似，`StyleGAN2`也可以通过采用输入/输出跳跃连接，从超大型网络中获益。\n\n图 8-8 比较了`StyleGAN`和`StyleGAN2`各自的特征贡献。请记住，`StyleGAN`使用基本的渐进式增长架构，而`StyleGAN2`使用`MSG`输入/输出跳跃连接，使模型能够更专注于我们通常在更高层级（如`1024×1024`）生成的精细细节。x\
  \ 轴表示渐进层级，y 轴表示生成目标尺寸输出时的准确率百分比。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig8_HTML.jpg](img/502181_1_En_8_Fig8_HTML.jpg)\n\
  \n**图 8-8**  \n特征对各自输出的贡献对比\n\n通过构建大型网络，模型生成器可以更加强调从较高层级发展而来的特征。如图 8-9 所示，与常规的`StyleGAN`相比，大型网络中`1024×1024`的特征得到了更显著的强调。\n\
  \n现在我们已经理解了`StyleGAN`和`StyleGAN2`的所有特性，我们可以继续使用一个已有的包来训练一个版本。在练习 8-2 中，我们将使用我们的老朋友`CelebA`数据集来训练一个`PyTorch`版本的`StyleGAN2`。让我们进入下一个练习，训练一个`StyleGAN2`来为我们服务。\n\
