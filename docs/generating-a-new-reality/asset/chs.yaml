  \n**图 4-6** RGAN 的早期训练结果\n\n到目前为止，我们研究了 GAN 中的几种方法，使用各种损失函数以期改进结果。我们研究了在 WGAN 和\
  \ RGAN/RaGAN 中将损失函数的视角从绝对变为相对，以及如何使用边界搜索 GAN 更好地分类离散或越界数据。在下一节中，我们将研究 GAN 的另一种变体，它改进了领域识别和归因。\n\
  \n\n\n## 使用 CGAN 进行条件控制\n\n正如我们所看到的，有几种变体可以处理 GAN 中的损失或期望损失。所有这些方法都期望 GAN 能够在没有辅助的情况下学习整个图像或其他数据。这要求\
  \ GAN 不仅要学习什么是假的或真的，还要学习数据的潜在域。\n\n潜在域是相对于 GAN 或其他模型的一个隐藏域。GAN 需要自行学习这个域，才能为该域或类别生成逼真的图像。例如，考虑我们整章都在训练的\
  \ MNIST 时尚数据集。该数据集包含 10 个类别，其中一些类别比其他类别更独特，GAN 也必须学习这些类别。当我们比较查看更多样化和详细类别（如凉鞋）的结果时，我们看到了这导致了什么问题。\n\
  \n因此，我们可以给 GAN 的简单变通方法或辅助手段就是将标签与数据一起输入，这应该不足为奇。所以，我们不仅告诉 GAN 它有这个图像要学习，还告诉它属于哪个类别或域。通过这样做，我们不再需要改变损失函数，只需要改变通用损失函数的输入，如下所示：\n\
  \n![$$ L={\\displaystyle \\begin{array}{c}\\mathit{\\min}\\\\ {}G\\end{array}}{\\\
  displaystyle \\begin{array}{c}\\mathit{\\max}\\\\ {}D\\end{array}}\\left[\\mathit{\\\
  log}\\left(D\\left(x, label\\right)\\right)+\\mathit{\\log}\\left(1-D\\left(G\\\
  left(z, label\\right)\\right)\\right)\\right] $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equp.png)\n\
  \n这里的主要变化是，我们现在将标签与数据一起输入到判别器和生成器中。通过将标签输入模型，我们减轻了模型自行学习域或类别的难度。相反，我们通过告诉它我们为其标记的类别来给予它一些帮助。\n\
  \n对于纯粹的 AI 或生成式建模，理想情况下，我们不希望必须为数据提供标签，因为这会带入我们人类自身的偏见。每当我们标记数据时，我们都在将人类偏见施加到该数据上。这就是为什么我们通常更倾向于向深度学习模型输入原始的、未标记的数据，让模型自行学习。在原始\
  \ GAN 中，我们基本上总是至少对数据进行真实/虚假的标记。\n\n向 GAN 中添加标签将其升级为条件 GAN（CGAN）。我们称之为*条件*，因为我们向\
  \ CGAN 提供了域的条件或标签。出于我们的目的，我们将在练习 4-5 中研究 cDCGAN 或条件 DCGAN。\n\n**练习 4-5. 关联相对论 GAN**\n\
  \n1. 从 GitHub 项目站点打开 `GEN_4_cDCGAN.ipynb` 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2. 通过选择 **运行时**\
  \ ➤ **全部运行** 来运行整个笔记本。然后，查看导入单元格之后，找到第一个包含 `Hyperparameters` 类的单元格，并检查新值 `n_classes\
  \ = 10`。这将设置作为标签输入到模型中的类别数量。\n\n3. 向下滚动到 `Generator` 类定义，如下所示：\n\n```\n    class\
  \ Generator(nn.Module):\n    def __init__(self):\n    super(Generator, self).__init__()\n\
  \    self.label_emb = nn.Embedding(hp.n_classes, hp.n_classes)\n    def block(in_feat,\
  \ out_feat, normalize=True):\n    layers = [nn.Linear(in_feat, out_feat)]\n    if\
  \ normalize:\n    layers.append(nn.BatchNorm1d(out_feat, 0.8))\n    layers.append(nn.LeakyReLU(0.2,\
  \ inplace=True))\n    return layers\n    self.model = nn.Sequential(\n    *block(hp.latent_dim\
  \ + hp.n_classes, 128, normalize=False),\n    *block(128, 256),\n    *block(256,\
  \ 512),\n    *block(512, 1024),\n    nn.Linear(1024, int(np.prod(img_shape))),\n\
  \    nn.Tanh()\n    )\n    def forward(self, noise, labels):\n    gen_input = torch.cat((self.label_emb(labels),\
  \ noise), -1)\n    img = self.model(gen_input)\n    img = img.view(img.size(0),\
  \ *img_shape)\n    return img\n```\n\n4. 注意在 `forward` 函数中，标签是如何与随机噪声拼接在一起的。标签嵌入是使用一个称为*嵌入*层的特殊层来学习的。嵌入层类似于自编码器，只是其输出是中间学习到的嵌入。\n\
  \n5. 接下来，我们将跳转到 `Discriminator` 类定义，看看如何使用学习到的嵌入以相同的方式输入标签。\n\n```\n    class Discriminator(nn.Module):\n\
  \    def __init__(self):\n    super(Discriminator, self).__init__()\n    self.label_embedding\
  \ = nn.Embedding(hp.n_classes, hp.n_classes)\n    self.model = nn.Sequential(\n\
  \    nn.Linear(hp.n_classes + int(np.prod(img_shape)), 512),\n    nn.LeakyReLU(0.2,\
  \ inplace=True),\n    nn.Linear(512, 512),\n    nn.Dropout(0.4),\n    nn.LeakyReLU(0.2,\
  \ inplace=True),\n    nn.Linear(512, 512),\n    nn.Dropout(0.4),\n    nn.LeakyReLU(0.2,\
  \ inplace=True),\n    nn.Linear(512, 1),\n    )\n```\n\n6. 从这里开始，我们对代码的其余部分很熟悉，因此可以跳过到训练代码并查看特定部分。\n\
  \n```\n    # 生成器\n    z = Variable(FloatTensor(np.random.normal(0, 1, (batch_size,\
  \ hp.latent_dim))))\n    gen_labels = Variable(LongTensor(np.random.randint(0, hp.n_classes,\
  \ batch_size)))\n    gen_imgs = generator(z, gen_labels)\n    validity = discriminator(gen_imgs,\
  \ gen_labels)\n    g_loss = loss_fn(validity, valid)\n    # 判别器\n    validity_real\
  \ = discriminator(real_imgs, labels)\n    d_real_loss = loss_fn(validity_real, valid)\n\
  \    validity_fake = discriminator(gen_imgs.detach(), gen_labels)\n    d_fake_loss\
  \ = loss_fn(validity_fake, fake)\n```\n\n7. 这里唯一的主要变化是，我们现在将标签作为输入传递给判别器和生成器。\n\n\
