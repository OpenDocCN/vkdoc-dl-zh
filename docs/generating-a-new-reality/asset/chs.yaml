  \ GAN 变体，可能会在架构和方法上有所差异，从而对 GAN 进行改进。\n\n## 结论\n\n在本章中，我们研究了使用自编码器和 GAN 进行的一阶生成建模。我们学习了如何调整监督学习方法，以使用像\
  \ GAN 这样的无监督方法。编码器将内容编码到某个潜在隐藏空间，而 GAN 则从空/随机隐藏空间创建内容。这使得我们可以利用各种真实基础图像进行各种内容生成。\n\
  \n理想情况下，我们希望以某种方式控制随机输入，从而控制 GAN 生成的内容。如果我们能够学会控制生成器用于输出特定类型图像的随机想法，我们就能控制生成这些类型的图像。\n\
