  \n\n\n## 使用 VAE 学习分布\n\n在 VAE 中，模型的学习方式不仅仅是理解中间或潜在空间的编码，而是理解编码本身的分布。通过理解编码的分布或变异性，我们可以学习如何映射潜在编码并生成那些隐藏空间。\n\
  \n图 3-13 并排展示了 AE 和 VAE。在图中，`x` 代表输入，`x'` 代表生成的输出。同样地，`z` 代表我们数据的潜在编码或中间表示。在 VAE\
  \ 中，有一个细微的差别：我们不学习编码本身，而是学习该编码的分布或变异性。然后，我们使用这些学习到的参数来采样一个 `z` 表示，并将其输入到解码器中。\n\n\
  ![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig13_HTML.jpg](img/502181_1_En_3_Fig13_HTML.jpg)\n\
  \n图 3-13  \nAE 与 VAE 的对比\n\n这个 VAE 模型学习到的参数是均值（`μ`）和标准差或方差平方（`σ²`）。如果你还记得统计学知识，这些正是我们用来定义正态分布的参数。我们通常默认使用正态分布，但重要的是要理解数据可以以多种方式分布。\n\
  \n图 3-14 展示了各种分布以及正态分布（或高斯分布）的示例。正态分布是我们通常假设大多数数据所呈现的形态。任何基本描述性统计的使用通常都会假设数据呈正态分布。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig14_HTML.jpg](img/502181_1_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14  \n各种分布的示例\n\n如图 3-15 所示，正态分布由两个参数定义：均值（`μ`）和标准差（`σ2`）。在 VAE 中，我们让网络通过使用这些值来生成一个样本编码，从而学习分布的均值和标准差。然后，该样本编码被输入到解码器中，并输出生成的图像。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig15_HTML.jpg](img/502181_1_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15  \n由 `μ` 和 `σ2` 修改的正态分布示例\n\n在图 3-15 中，我们可以看到 `μ` 和 `σ2` 的不同变化如何改变正态分布的形状，其中均值始终代表分布的中心，而标准差代表分布的离散程度或多样性。\n\
  \n通常，我们使用统计学来发现数据是如何分布的，或者它代表了什么样的变异性。使用 VAE，我们仍然在学习数据的参数是什么，只不过现在我们关注的数据空间变成了该数据的隐藏或潜在空间表示。与尝试学习一组训练图像的整个潜在空间相比，这具有三个优势。\n\
  \n首先，通过学习嵌入空间，数据量或数据的维度可以大大减少。这使得我们的 VAE 能够以更简单的形式学习特征的表示方式，从而让我们能够建模一个简单的正态分布。更复杂的数据形式可能需要\
  \ VAE 来建模更复杂的分布或分布集合。\n\n第二个优势使我们能够从这个学习到的潜在空间映射或生成新的输出。我们只需要理解和控制这些分布参数，就能得到新颖的输出。\n\
  \n第三个优势（但可能不那么重要）是确认我们只需学习输入数据分布并将其转换为正态参数，就能生成输出。AE 和 VAE 之间的一个关键架构差异是发生在模型中间的采样操作。这个操作本质上将编码器和解码器模型解耦，为我们提供了更好的复用能力和进一步的生成式建模机会。\n\
  \n当然，为了更好地理解这一点，我们需要回到另一个代码练习中，看看这一切是如何结合在一起的。在下一个练习中，我们将深入 VAE 的内部，了解它如何学习编码空间的分布或变异性；请参见练习\
  \ 3-5。\n\n### 练习 3-5. 理解 VAE\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig16_HTML.jpg](img/502181_1_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16  \n展示两个正态分布之间的测量散度\n\n1. 从 GitHub 项目站点打开 `GEN_3_conv_VAE_latent.ipynb`\
  \ 笔记本。\n\n2. 通过选择“运行时” ➤ “全部运行”来运行整个笔记本。\n\n3. 跳转到类定义代码块以及此处显示的 `encode` 和 `decode`\
  \ 函数：\n\n```\ndef bottleneck(self, h):\n    mu, logvar = self.fc1(h), self.fc2(h)\n\
  \    z = self.reparameterize(mu, logvar)\n    return z, mu, logvar\ndef encode(self,\
  \ x):\n    h = self.encoder(x)\n    z, mu, logvar = self.bottleneck(h)\n    return\
  \ z, mu, logvar\ndef decode(self, z):\n    z = self.fc3(z)\n    z = self.decoder(z)\n\
  \    return z\ndef forward(self, x):\n    z, mu, logvar = self.encode(x)\n    z\
  \ = self.decode(z)\n    return z, mu, logvar\n```\n\n4. 注意网络如何通过 `bottleneck` 函数限制生成\
  \ `mu` 和 `logvar`（方差参数）。然后使用这些参数从分布中采样一个 `z` 或编码表示。接着在 `forward` 函数中，我们可以看到 `encode`\
  \ 如何用于生成这些参数以及采样的 `z`，而 `z` 被输入到解码器中，作为用于生成新输出的编码。\n\n5. 接下来，我们再次向下滚动到 `loss_fn`，如下所示：\n\
  \n```\ndef loss_fn(recon_x, x, mu, logvar):\n    BCE = F.binary_cross_entropy(recon_x,\
  \ x, size_average=False)\n    KLD = -0.5 * torch.mean(1 + logvar - mu.pow(2) - logvar.exp())\n\
  \    return BCE + KLD, BCE, KLD\n```\n\n6. 在这种情况下，自定义损失函数使用两种方法来测量学习到的分布与观察到的分布之间的散度。第一种技术称为*二元交叉熵*（BCE），它测量原始输入图像与重建图像之间的差异。这与我们在普通\
  \ AE 中测量损失的方式并无不同。第二种技术称为 Kullback Leibler 散度（KLD），用于测量数据分布之间的实际差异。\n\n7. 图 3-16\
  \ 展示了如何使用 KLD 测量两个正态分布之间的差异。阴影区域代表两个分布之间的散度。我们使用 BCE 和 KLD 计算组合损失的目标是，通过损失函数最小化这种分布差异，从而学习均值和标准差的值。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig17_HTML.jpg](img/502181_1_En_3_Fig17_HTML.jpg)\n\
  \n图 3-17  \n输入图像与输出生成图像的对比\n\n8. 让笔记本运行直到完成至少 100 个 epoch。你需要一个良好的模型来更好地理解下一部分。\n\
  \n9. 以下代码块负责生成图 3-17 中所示的示例输出对比。在该图中，我们看到了用于输入到 VAE 以生成输出图像的原始图像。请注意，考虑到 VAE 学习的只是映射输入图像的数据分布，输出效果相对不错。\n\
  \n\n\n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\nplt.ion()\n\
  import torchvision.utils\ndef to_img(x):\n    x = x.clamp(0, 1)\n    return x\n\
  def show_image(img):\n    img = to_img(img)\n    npimg = img.numpy()\n    plt.imshow(np.transpose(npimg,\
  \ (1, 2, 0)))\ndef visualize_output(images, model):\n    with torch.no_grad():\n\
  \        images = images.to(device)\n        images, _, _ = model(images)\n    \
  \    images = images.cpu()\n        images = to_img(images)\n        np_imagegrid\
  \ = torchvision.utils.make_grid(images[1:50], 10, 5).numpy()\n        plt.imshow(np.transpose(np_imagegrid,\
  \ (1, 2, 0)))\n        plt.show()\nimages, labels = iter(train_loader).next()\n\
  ## 首先可视化原始图像\nprint('原始图像')\nshow_image(torchvision.utils.make_grid(images[1:50],10,\
  \ 5))\nplt.show()\n## 使用 VAE 重建并可视化图像\nprint('VAE 重建：')\nvisualize_output(images,\
  \ model)\n```\n\n通过图 3-17 中的输出，你可以开始体会到学习图像中数据分布的力量。请注意，对于每一张输入图像，VAE 都在学习图像中数据/像素的分布方式。然后，它利用从学习到的均值和标准差中捕获的知识，创建一个正态分布，并从中随机采样。因此，VAE\
  \ 重建中的每一张输出图像都是从学习到的分布中随机采样得到的。\n\n学习数据如何分布，并将其映射到一个已知或未知函数的概念，是深度学习生成式建模的核心。在本书后续内容中，我们将反复使用这一概念。在下一节中，我们将探讨理解数据分布如何让我们能够操控输出。\n\
  \n### 变异性与探索潜在空间\n\n借助训练好的 VAE 模型，我们可以开始探索模型所学习的潜在空间。本章一直在努力理解这个潜在空间的样子。现在，我们终于可以展开这个潜在空间，并直观地查看其内容了。\n\
  \n在 VAE 中可视化潜在空间编码的最佳方式是可视化输出或受控输出。我们可以通过几种方式做到这一点，在练习 3-6 中，我们将探索如何搜索已学习 VAE 的输出空间。\n\
  \n**练习 3-6. 理解 VAE**\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig18_HTML.png](img/502181_1_En_3_Fig18_HTML.png)\n\
  \n**图 3-18** 随机潜在空间生成的示例输出\n\n1.  跳转到你最新的、已训练好的`GEN_3_conv_VAE_latent.ipynb`笔记本。如果需要重新训练该笔记本，请执行此操作；这可能需要大约一个小时。我们稍后会讨论如何保存和恢复模型，但现在如果需要，就重新训练。\n\
  \n2.  在该笔记本的底部有两个代码单元，它们允许我们跨潜在空间分布参数（均值和标准差）随机或受控地映射模型的输出。\n\n```python\n    with\
  \ torch.no_grad():\n    # 从正态分布中采样潜在向量\n    latent = torch.randn(60, 1024, device=device)\n\
  \    # 从潜在向量重建图像\n    img_recon = model.decoder(latent)\n    img_recon = img_recon.cpu()\n\
