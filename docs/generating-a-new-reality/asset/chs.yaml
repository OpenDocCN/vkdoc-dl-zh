  \    plt.show()\n```\n\n3.  上面显示的第一个代码块使用`torch.randn`函数生成样本潜在向量，生成了 60 个大小为 1024\
  \ 的向量。我们从 VAE 中使用的潜在向量大小得到 1024；1024 比我们在探索自编码器时使用的潜在向量大得多，这是为了应对更复杂的训练数据集。其余代码使用`model.decoder`，将`latent`向量作为输入来生成一组新图像。\n\
  \n4.  图 3-18 显示了最后一个代码单元的示例输出。这里的输出实际上代表了完全随机的向量被输入到 VAE 的解码器部分以生成输出。如你所见，结果并不理想。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig19_HTML.jpg](img/502181_1_En_3_Fig19_HTML.jpg)\n\
  \n**图 3-19** 样本潜在空间参数的示例输出\n\n1.  接下来的最后一个代码块演示了如何遍历正态分布参数，以生成并非随机样本，而是从已知分布创建的样本。这使我们能够理解模型中数据与潜在空间之间的视觉区域是什么样的。\n\
  \n```python\n    for std in np.arange(.75, 1.5, .1):\n    for mean in np.arange(-2,\
  \ 3, 1):\n    with torch.no_grad():\n    # 从正态分布中采样潜在向量\n    latent = torch.normal(mean,\
  \ std, size=(10, 1024), device=device)\n    # 从潜在向量重建图像\n    img_recon = model.decoder(latent)\n\
  \    img_recon = img_recon.cpu()\n    fig, ax = plt.subplots(figsize=(20, 20))\n\
  \    show_image(torchvision.utils.make_grid(img_recon.data[:100],10,5))\n    ax.axis('off')\n\
  \    print(mean, std)\n    plt.show()\n```\n\n2.  现在，我们不再生成一整批随机图像，而是在每次更新`std`和`mean`时生成一组\
  \ 10 张图像。这使我们能够确定这些参数的敏感度，以及它们如何直观地生成输出。\n\n3.  图 3-19 显示了最后一个代码单元输出的一个片段。请注意`mean`和`std`的变化如何改变输出的外观。还要注意模型如何尝试复制它学到的特征。这种特征重建是我们的卷积层创建这些特征的结果。在某些情况下，你可能会看到属于特定类别（如猫或狗）的可识别特征。见图\
  \ 3-19。\n\n1.  既然你已经理解了 VAE 的工作原理，请尝试调整超参数`batch_size`、`learning_rate`和`epochs`。回想一下我们本章前面学到的内容。\n\
  \n2.  如果你觉得更有挑战性，可以尝试将隐藏潜在向量大小`h_dim`从 1024 改为其他数字。也可以尝试将`z_dim`超参数从 32 改为 64 或\
  \ 16。这会产生什么影响？提示：可以找到这两个超参数的代码如下所示：\n\n```python\nclass ConvVAE(nn.Module):\ndef\
  \ __init__(self, image_channels=3, h_dim=1024, z_dim=32):\n```\n\n在前面的练习中，我们开始直观地探索模型中的潜在空间。这种技术为我们提供了关于模型训练效果以及训练目标的更多反馈。在本书中，我们将反复使用像前一个练习中使用的技术。\n\
  \n探索 VAE 中的潜在空间非常有用，并能提供多种见解。不幸的是，映射到分布参数仍然极大地限制了模型的学习能力。幸运的是，我们已经探索过的模型——GAN，已经学习了数据的潜在分布。我们将在下一章中进一步探讨\
  \ GAN 是如何做到这一点的。\n\n\n\n## 结论\n\n要构建可运行且实用的生成模型，我们需要理解深度学习网络是如何学习的。我们需要了解网络如何逼近函数，以及这对网络学习的内容有何影响。在此基础上，我们详细探讨了各种超参数如何影响网络的学习方式和学习内容，并进一步学习了如何在玩具示例上调整这些超参数。\n\
  \n接下来，我们从调整超参数转向理解它们如何让我们控制模型中的潜在空间或隐藏空间。学会控制潜在空间的大小使我们能够更好地训练模型。然后，我们进阶到构建变分自编码器，这种模型不仅通过理解潜在空间来学习，还通过理解映射到该潜在空间的分布参数来学习。\n\
  \n最后，基于将参数映射到潜在空间的知识，我们可以严格地根据这些参数构建输出。这使我们能够详细了解模型学到了什么，以及它对输入数据的敏感程度。虽然本章我们并未着手解决模型的问题，但未来我们一定会研究其他系统来改进它。\n\
  \n在下一章中，我们将重新审视生成对抗网络，并继续探索其众多变体。生成对抗网络可以通过多种技术轻松调整，以控制模型生成中的潜在空间，其中许多技术与分布学习相关。这将使我们能够以更可控的方式生成内容。\n\
  \n"
- "# 4. 生成对抗网络，生成对抗网络，以及更多的生成对抗网络\n\n生成建模已经存在了几十年，但该领域的许多研究是在生成对抗网络被发现之后才真正开始被认可的。关于生成对抗网络何时被发现以及由谁发现，存在一些争议。但有一点是确定的：2014\
  \ 年，伊恩·古德费洛及其蒙特利尔大学的同事们，在重新发明对抗学习技术方面功不可没。\n\n毕竟，生成对抗网络不过是从中间分开并翻转过来的自编码器。古德费洛将这一概念更进一步，在真正的对抗意义上引入了生成器（艺术伪造者）和判别器（艺术评论家）的概念，作为生成新颖内容的一种方式。这项技术在生成新内容方面非常成功，以至于现在有数百种基于这个简单模型的实现和变体。\n\
  \n在本章中，我们将重新审视生成对抗网络，并开始研究许多已被采纳为改进或变体的实现。我们首先通过改进深度卷积生成对抗网络来回顾生成对抗网络中的卷积。我们将了解如何通过引入\
  \ Wasserstein 生成对抗网络来改进损失或距离的度量。接下来，我们探讨离散数据可能对生成对抗网络产生的影响，以及如何使用边界搜索生成对抗网络来解决这个问题。然后，我们通过使用相对论生成对抗网络来优化损失度量，从而提升生成对抗网络的性能。接着，我们跳回使用条件生成对抗网络来理解和控制潜在空间。\n\
  \n生成对抗网络已经站在了生成建模的前沿。这是一种我们将在本书中不懈探索的技术。在本章中，我们首先探索几种基础的生成对抗网络，它们将为我们提供后续使用的技术。以下是本章将涵盖的主要主题的快速分解：\n\
  \n-   使用深度卷积生成对抗网络理解特征\n-   展开生成对抗网络的数学原理\n-   使用 Wasserstein 生成对抗网络解决距离问题\n-  \
  \ 离散化边界搜索生成对抗网络\n-   相对论与相对论生成对抗网络\n-   使用条件生成对抗网络进行条件控制\n\n本章代码量很大，包含许多示例。所有这些示例在适当的情况下都使用了更大的训练集，以更好地演示概念。较大的数据集可能需要数小时或数天来训练。虽然本章中的大多数练习可能在一小时内完成训练，但有些可能需要更长时间。在下一节中，我们将通过理解特征学习的重要性来开始探索生成对抗网络。\n\
  \n## 特征理解与深度卷积生成对抗网络\n\n虽然我们在前一章已经探讨过深度卷积生成对抗网络，但我们未能详细说明究竟是什么让这个模型更好。正如我们已经学到的，卷积层可以促进二维图像中可见特征的提取。但我们没有足够详细地说明这为什么重要。\n\
  \n在数据科学中，我们通常将特征提取描述为识别数据集中已知或未知特征的过程。虽然数据科学使用统计建模来提取特征，但深度学习有多种方法可以自动完成此操作。卷积是允许我们的模型学习哪些特征对于表征对象是重要的方法之一。\n\
  \n卷积并不是提取特征的唯一方法；它是对于大多数图像分类和识别任务来说效果足够好的方法之一。常规卷积本身仅限于提取局部特征，例如眼睛或鼻子。我们将在后续章节中介绍的全局特征提取方法，可以识别鼻子，但也能关联到该特征需要位于双眼之间。\n\
  \n由于我们已经在第 2 章中介绍过深度卷积生成对抗网络，因此在本练习中，我们将专门关注模型使用卷积学习或提取了什么。通过能够理解模型如何学习以及学习了什么，我们就能推导出它生成了什么。在练习\
  \ 4-1 中，我们重新审视深度卷积生成对抗网络，重点在于理解它提取的特征。\n\n练习 4-1. 深度卷积生成对抗网络特征学习\n\n1.  从 GitHub\
  \ 项目站点打开 `GEN_4_DCGAN.ipynb` 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2.  通过选择 **运行时** ➤ **全部运行**\
  \ 来运行整个笔记本。然后，查看 `imports` 单元格之后，找到第一个包含名为 `Hyperparameters` 的新类的单元格：\n\n```\nclass\
  \ Hyperparameters(object):\n    def __init__(self, **kwargs):\n        self.__dict__.update(kwargs)\n\
  \nhp = Hyperparameters(n_epochs=200,\n                     batch_size=64,\n    \
  \                 lr=.0002,\n                     b1=.5,\n                     b2=0.999,\n\
  \                     n_cpu=8,\n                     latent_dim=100,\n         \
  \            img_size=32,\n                     channels=1,\n                  \
  \   sample_interval=400)\nprint(hp.lr)\n```\n\n3.  `Hyperparameters` 是一个字典辅助类，允许我们在一个地方定义所有超参数，可以通过字典或像所示那样的键值对列表进行初始化。然后，我们可以使用名称\
  \ `hp` 加上参数来引用超参数，如 `print(hp.lr)` 行所示。\n\n4.  下一个代码块包含我们之前查看过的实用代码。之后是一个新的 `Generator`\
  \ 定义。\n\n```\nclass Generator(nn.Module):\n    def __init__(self):\n        super(Generator,\
  \ self).__init__()\n        self.init_size = hp.img_size // 4\n        self.l1 =\
  \ nn.Sequential(nn.Linear(hp.latent_dim, 128 * self.init_size ** 2))\n        self.conv_blocks\
  \ = nn.Sequential(\n            nn.BatchNorm2d(128),\n            nn.Upsample(scale_factor=2),\n\
  \            nn.Conv2d(128, 128, 3, stride=1, padding=1),\n            nn.BatchNorm2d(128,\
  \ 0.8),\n            nn.LeakyReLU(0.2, inplace=True),\n            nn.Upsample(scale_factor=2),\n\
  \            nn.Conv2d(128, 64, 3, stride=1, padding=1),\n            nn.BatchNorm2d(64,\
  \ 0.8),\n            nn.LeakyReLU(0.2, inplace=True),\n            nn.Conv2d(64,\
  \ hp.channels, 3, stride=1, padding=1),\n            nn.Tanh(),\n        )\n\n \
  \   def forward(self, z):\n        out = self.l1(z)\n        out = out.view(out.shape[0],\
  \ 128, self.init_size, self.init_size)\n        img = self.conv_blocks(out)\n  \
  \      return img\n```\n\n5.  这个类与我们之前生成器使用的类相似。有一些细微的差别使得这个类更加抽象和可重用。请注意，生成对抗网络中的原始生成器是从随机噪声中学习的，而判别器是从已建立的或*基准*事实中学习的。\n\
  \n6.  接下来，我们有 `Discriminator` 类，它展示了深度卷积生成对抗网络判别器的一个新版本。\n\n\n```python\nclass Discriminator(nn.Module):\n\
  \    def __init__(self):\n        super(Discriminator, self).__init__()\n      \
  \  def discriminator_block(in_filters, out_filters, bn=True):\n            block\
  \ = [nn.Conv2d(in_filters, out_filters, 3, 2, 1),\n                     nn.LeakyReLU(0.2,\
  \ inplace=True), nn.Dropout2d(0.25)]\n            if bn:\n                block.append(nn.BatchNorm2d(out_filters,\
  \ 0.8))\n            return block\n        self.model = nn.Sequential(\n       \
  \     *discriminator_block(hp.channels, 16, bn=False),\n            *discriminator_block(16,\
  \ 32),\n            *discriminator_block(32, 64),\n            *discriminator_block(64,\
  \ 128),\n        )\n        # 下采样图像的高度和宽度\n        ds_size = hp.img_size // 2 **\
  \ 4\n        self.adv_layer = nn.Sequential(nn.Linear(128 * ds_size ** 2, 1), nn.Sigmoid())\n\
  \n    def forward(self, img):\n        out = self.model(img)\n        out = out.view(out.shape[0],\
  \ -1)\n        validity = self.adv_layer(out)\n        return validity\n```\n\n\
  7. 接下来是定义模型和创建损失函数的单元格。请注意，我们提供了使用 `cuda` 的选项，以及在使用 GPU 时模型的定义方式。\n\n```python\n\
  loss_fn = torch.nn.BCELoss()\ngenerator = Generator()\ndiscriminator = Discriminator()\n\
  if cuda:\n    generator.cuda()\n    discriminator.cuda()\n    loss_fn.cuda()\n###\
  \ 初始化权重\ngenerator.apply(weights_init_normal)\ndiscriminator.apply(weights_init_normal)\n\
  ```\n\n8. 向下滚动其余代码，直到定义所有训练过程的最后一个单元格。请注意，我们使用 0.0 或 1.0 来定义假图像和真图像的方式与之前略有不同。\n\
  \n```python\nfor epoch in range(hp.n_epochs):\n    for i, (imgs, _) in enumerate(dataloader):\n\
  \        valid = Variable(Tensor(imgs.shape[0], 1).fill_(1.0), requires_grad=False)\n\
  \        fake = Variable(Tensor(imgs.shape[0], 1).fill_(0.0), requires_grad=False)\n\
  \        real_imgs = Variable(imgs.type(Tensor))\n        optimizer_G.zero_grad()\n\
  \        z = Variable(Tensor(np.random.normal(0, 1, (imgs.shape[0], hp.latent_dim))))\n\
  \        gen_imgs = generator(z)\n        g_loss = loss_fn(discriminator(gen_imgs),\
  \ valid)\n        g_loss.backward()\n        optimizer_G.step()\n        optimizer_D.zero_grad()\n\
  \        real_loss = loss_fn(discriminator(real_imgs), valid)\n        fake_loss\
  \ = loss_fn(discriminator(gen_imgs.detach()), fake)\n        d_loss = (real_loss\
  \ + fake_loss) / 2\n        d_loss.backward()\n        optimizer_D.step()\n    \
  \    batches_done = epoch * len(dataloader) + i\n        if batches_done % hp.sample_interval\
  \ == 0:\n            clear_output()\n            print(f\"Epoch:{epoch}:It{i}:DLoss{d_loss.item()}:GLoss{g_loss.item()}\"\
  )\n            visualize_output(gen_imgs.data[:50],10, 10)\n```\n\n9. 随着笔记本的运行，观察图像是如何生成的。请特别注意图像生成过程中呈现的块状特征。这些近乎块状的特征是卷积特征提取过程的结果。如果你需要回顾使用\
  \ CNN 层进行图像特征提取的过程，请参考第 2 章。\n\n图 4-1 展示了训练过程以及在训练中不同采样点生成的图像结果。请注意，这些图像看起来像是从不同图块拼接而成，或者用最贴切的说法是*提取的特征*。\n\
  \n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig1_HTML.jpg](img/502181_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** DCGAN 在不同采样点生成的图像结果\n\n由于具备特征提取能力，双卷积 GAN 相比原始的基础 GAN 有了显著改进。虽然视觉上结果令人印象深刻，但模型的局限性也显而易见——从学习到的特征图块中拼接图像的现象便可见一斑。\n\
  \n但这并不意味着卷积或生成建模中的特征提取概念存在局限。在使用卷积层或循环层等特征提取层时，我们需要考虑提取的细节和上下文。在卷积中，细节受限于最小卷积层的最小图块尺寸，而上下文始终是局部化的。\n\
  \n循环层是一种特殊的深度学习层，能够学习或提取数据中的序列信息。这类层通常用于时间序列数据或自然语言文本分析中的特征提取。理论上，它们也可用于从视频数据或数据序列中提取特征，但实践证明这并非高效方案。循环神经网络（RNN）计算成本高昂，如今已有其他解决方案用于执行同类特征提取。本书将不再进一步讨论\
  \ RNN。\n\n由于卷积在生成建模中的应用存在一定局限性，我们将探讨其他能提供更优结果的方法。不过，最终结果往往取决于你试图模拟的输入数据。在下一节中，我们将重新深入\
  \ GAN 的数学原理，以理解哪些可能是更好的选择。\n\n\n## 揭开 GAN 的数学原理\n\n为了更好地理解生成对抗网络（GAN）的学习机制，掌握其背后的数学原理（或至少是数学直觉）至关重要。幸运的是，我们在第\
  \ 3 章讨论变分自编码器（VAE）时，已经接触过其中一些数学基础。如果你还记得，VAE 通过理解和建模输入数据的分布来学习，然后从该学习到的分布中生成样本。\n\
  \n事实证明，GAN 的数学原理与 VAE 类似，它们都通过理解试图辨别或生成的分布来学习。然而，我们用于实现这一目标的数学推导方式略有不同。从底层理解 GAN\
  \ 的工作原理，对于在后续训练中修复或解决问题至关重要。\n\n我们将从 GAN 中使用的基本损失函数——二元交叉熵损失函数开始，如下所示：\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Figa_HTML.png](img/502181_1_En_4_Figa_HTML.png)\n\
  \n其中：\n\n![$$ y= originaldata $$](img/502181_1_En_4_Chapter_TeX_Equb.png)\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Figb_HTML.png](img/502181_1_En_4_Figb_HTML.png)\n\
  \n为了优化这个函数，我们首先来看如何确定判别器的损失。在训练判别器时，对于真实数据，我们假设 `y = 1`。相反，对于生成的数据，我们令 ；然后代入最后一个方程，得到判别器的损失如下：\n\
  \n![$$ L\\left(D(x),1\\right)=\\mathit{\\log}\\left(D(x)\\right) $$](img/502181_1_En_4_Chapter_TeX_Equd.png)\n\
  \n![../images/502181_1_En_4_Chapter/502181_1_En_4_Figc_HTML.png](img/502181_1_En_4_Figc_HTML.png)\n\
  \n；然后代入最后一个方程，得到判别器的损失如下：\n\n接着，对于生成器生成的输出，我们假设 `y = 0`（假数据），然后 ，其中 `z` 表示随机样本向量空间。将其代回损失方程，得到生成器的损失如下：\n\
  \n![$$ L\\left(D\\left(G(z)\\right),0\\right)=\\mathit{\\log}\\left(1-D\\left(G(z)\\\
  right)\\right) $$](img/502181_1_En_4_Chapter_TeX_Eque.png)\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Figd_HTML.png](img/502181_1_En_4_Figd_HTML.png)\n\
  \n，其中\n\n然后我们可以将两个方程的损失合并，并通过最大化来确定总的判别器损失，如下所示：\n\n![$$ {L}^{(D)}=\\mathit{\\max}\\\
  left[\\mathit{\\log}\\left(D(x)\\right)+\\mathit{\\log}\\left(1-D\\left(G(z)\\right)\\\
  right)\\right] $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equf.png)\n\
  \n由于生成器与判别器相互对抗，它的任务是执行相反的操作，因此，我们通过以下公式计算生成器的最小损失：\n\n![$$ {L}^{(G)}=\\mathit{\\\
  min}\\left[\\mathit{\\log}\\left(D(x)\\right)+\\mathit{\\log}\\left(1-D\\left(G(z)\\\
  right)\\right)\\right] $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equg.png)\n\
  \n为了简化这一视图，我们可以使用如下简写方程将这两个方程合并：\n\n![$$ L={\\displaystyle \\begin{array}{c}\\mathit{\\\
  min}\\\\ {}G\\end{array}}{\\displaystyle \\begin{array}{c}\\mathit{\\max}\\\\ {}D\\\
  end{array}}\\left[\\mathit{\\log}\\left(D(x)\\right)+\\mathit{\\log}\\left(1-D\\\
  left(G(z)\\right)\\right)\\right] $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equh.png)\n\
  \n现在，上述损失函数仅定义了单个像素或数据点上的损失量。为了覆盖整个图像或数据集，我们需要展开方程，使其与 Ian Goodfellow 及其同事在 GAN\
  \ 论文中提出的原始 GAN 方程相匹配：\n\n![$$ {\\displaystyle \\begin{array}{c}\\mathit{\\min}\\\
  \\ {}G\\end{array}}{\\displaystyle \\begin{array}{c}\\mathit{\\max}\\\\ {}D\\end{array}}V\\\
  left(D,G\\right)={\\displaystyle \\begin{array}{c}\\mathit{\\min}\\\\ {}G\\end{array}}{\\\
  displaystyle \\begin{array}{c}\\mathit{\\max}\\\\ {}D\\end{array}}\\left({E}_{xPdata(x)}\\\
  left[\\mathit{\\log}\\left(D(x)\\right)\\right]+{E}_{zP(z)}\\left[\\mathit{\\log}\\\
  left(1-D\\left(G(z)\\right)\\right)\\right]\\right) $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equi.png)\n\
  \n其中：\n\n`E[xPdata(x)]` 是真实数据的期望或分布。\n\n`E[zP(z)]` 是假数据的期望分布。\n\n这意味着我们试图优化期望的生成分布，使其与真实或实际的数据分布相匹配。同样，这与我们之前对\
  \ VAE 的探讨并无二致，其目标都是优化采样分布。我们经常会看到该方程被重写如下：\n\n![$$ {E}_x\\left[\\mathit{\\log}\\\
  left(D(x)\\right)\\right]+{E}_z\\left[1-\\mathit{\\log}\\left(D\\left(G(z)\\right)\\\
  right)\\right] $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equj.png)\n\
  \n现在，问题变成了我们的生成器能够多好地学习建模真实数据分布。然而，在实践中，如果生成分布与真实分布之间的差异变得过大，生成器将会停滞，并遭受梯度消失问题。\n\
  \n图 4-2 展示了在训练过程中，期望的生成分布与判别器对真实分布的期望可能如何收敛或发散。随着判别器在识别真假图像方面变得更好，这可能会增加生成期望分布的发散程度。同样，如果生成器配置不当，它可能一开始就具有较差的期望，或者无法学习到期望的分布。\n\
  \n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig2_HTML.jpg](img/502181_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n理解生成器与判别器的期望\n\n如果期望的真实分布和生成分布变得过于多样或分离，且没有重叠，那么生成器将遭受梯度消失损失。梯度消失是一个问题，因为损失梯度变得非常小，以至于对训练模型没有影响。我们会看到生成器模型停滞不前，没有任何进展。\n\
  \n梯度消失背后的数学原理超出了本书的范围。然而，这里的直觉是，随着期望的真实分布和生成分布发散且没有重叠，这就会成为问题。从这个知识中，我们可以得出两个重要的概念。\n\
  \n首先，我们的生成器和判别器模型需要协同训练，任何一方都不能获得明显的优势。期望分布与生成分布匹配得越好，我们的模型训练效果就越好。一个在早期就能很好区分真假图像的判别器，会使生成器面临无法逾越的挑战。\n\
  \n其次，通过理解可能发生的问题，我们可以寻找更先进的解决方案来尝试解决生成器训练问题。幸运的是，GAN 的出现引入了数百种新方法来解决这些问题。\n\n幸运的是，有几种方法可以使用不同的方法来衡量距离或解释该距离。我们将探讨的第一种方法称为\
  \ Wasserstein 距离，因此我们接下来要介绍的 GAN 被称为 Wasserstein GAN（WGAN）。\n\n\n\n### 使用 WGAN 解决距离问题\n\
  \n解决生成器与判别器之间分布或期望数据分布的一种方法是让它不成问题。这听起来可能过于简化了一个复杂的问题，而事实也确实可能如此。然而，如果我们能找到另一种衡量两个期望分布之间差异的方法呢？\n\
  \n简单来说，Wasserstein 距离是一种衡量两个分布（无论是期望的还是真实的）之间差异的方法，它使用一个单一的标量距离，该距离由将一个分布转换为另一个分布所需的工作量来衡量。描述这一方法的常用思路是想象两堆泥土。两堆泥土质量/大小相等，但形状不同。Wasserstein\
  \ 度量或距离就是将第一堆泥土转换为第二堆所需的工作量，如图 4-3 所示。\n\n这意味着我们忽略两个分布之间的距离，这可以大大简化数学计算。由于我们不再担心距离问题，损失函数得以简化，进而成为真实与虚假之间的差异。这也意味着判别器不再能区分什么是真实或虚假，而只是进行评判。因此，我们现在将判别器称为*评论家*。\n\
  \n这种衡量两个分布之间距离的方法也被称为*推土机距离*。这个术语表示使用离散量将材料/泥土从一堆移动到另一堆所需的工作量。简单来说，你可以想象一辆卡车需要运输多少次才能将一堆泥土从一个位置移动到另一个位置。\n\
  \n所有这些数学计算将评论家和生成器的损失函数简化为以下形式：\n\n评论家损失：`D(x) - D(G(z))`\n\n生成器损失：`D(G(z))`\n\n\
  这里的另一个关键区别是生成器试图最大化函数，而在标准 GAN 中，生成器是最小化损失。\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig3_HTML.jpg](img/502181_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\nWasserstein 距离解释\n\n这些假设还导致了其他几个关键区别。首先，网络中的权重需要被限制在某个范围内，以避免评论家/判别器中的梯度消失或爆炸。其次，我们需要增加评论家的训练迭代次数，以便它能更快地逼近真实分布。\n\
  \n现在我们对这些概念的工作原理有了一些了解，让我们深入另一个代码示例，看看它在实践中是如何运作的。在练习 4-2 中，我们将研究一个基于 MNIST 时尚数据集训练的\
  \ WGAN 实现。学习这些基础训练数据集对于更好地理解 GAN 之间的差异非常重要。\n\n练习 4-2. 探索 WGAN\n\n1.  从 GitHub 项目站点打开\
  \ `GEN_4_WGAN.ipynb` 笔记本。如果不确定如何操作，请参考附录 B。\n\n2.  通过选择“运行时” ➤ “全部运行”来运行整个笔记本。然后跳过\
  \ `imports` 单元格，找到第一个包含 `Hyperparameters` 类的单元格，并检查新的超参数 `n_critic` 和 `clip_value`：\n\
  \n```\nclass Hyperparameters(object):\n    def __init__(self, **kwargs):\n     \
  \   self.__dict__.update(kwargs)\nhp = Hyperparameters(n_epochs=200,\n         \
  \            batch_size=64,\n                     lr=0.00005,\n                \
  \     n_cpu=8,\n                     latent_dim=100,\n                     img_size=32,\n\
  \                     channels=1,\n                     n_critic=25,\n         \
  \            clip_value=.005,\n                     sample_interval=400)\n```\n\n\
  3.  新的超参数是 `n_critic` 和 `clip_value`。`n_critic` 定义了训练中评论家的迭代次数，`clip_value` 设置了评论家/判别器中权重的限制范围。\n\
  \n4.  你可以向下滚动到最后一个代码块，即训练块。本示例中的大部分代码我们已在之前的示例中介绍过，因此这里无需重复。\n\n5.  我们将重点关注从判别器/评论家损失开始的训练代码内部块，如下所示：\n\
  \n```\nvalid = Variable(Tensor(imgs.shape[0], 1).fill_(1.0), requires_grad=False)\n\
  fake = Variable(Tensor(imgs.shape[0], 1).fill_(0.0), requires_grad=False)\nreal_imgs\
  \ = Variable(imgs.type(Tensor))\noptimizer_G.zero_grad()\nz = Variable(Tensor(np.random.normal(0,\
  \ 1,\n                (imgs.shape[0], hp.latent_dim))))\nfake_imgs = generator(z).detach()\n\
  d_loss = -torch.mean(discriminator(real_imgs)) + torch.mean(discriminator(fake_imgs))\n\
  d_loss.backward()\noptimizer_D.step()\n```\n\n6.  顶部部分生成了我们之前见过的有效和虚假张量的真实标签。之后，我们看到从批次中提取的\
  \ `real_imgs` 以及从随机 `z` 生成的 `fake_imgs`。接着，评论家/判别器损失通过将 `fake_imgs` 传入判别器的均值减去 `real_imgs`\
  \ 传入判别器的均值来计算。在标准 GAN 中，我们会使用二元交叉熵函数来衡量损失。\n\n7.  接下来，我们将查看执行权重限制的代码。我们再次需要将权重限制在一个狭窄的窗口内，以避免梯度爆炸。\n\
  \n```\nfor p in discriminator.parameters():\n    p.data.clamp_(-hp.clip_value, hp.clip_value)\n\
  ```\n\n8.  之后，我们开始控制生成器损失迭代的部分，以 `if` 语句开头：\n\n```\nif i % hp.n_critic == 0:\n \
  \   optimizer_G.zero_grad()\n    gen_imgs = generator(z)\n    g_loss = -torch.mean(discriminator(gen_imgs))\n\
  \    g_loss.backward()\n    optimizer_G.step()\n```\n\n9.  `if` 语句控制生成器在每次评论家训练轮次后如何运行。之后，大部分代码是熟悉的，但请注意生成器损失\
  \ `g_loss` 计算的简化。\n\n考虑到我们最近在运行更高级的 GAN（如 DCGAN）方面的探索，这个训练示例的输出可能会有些令人失望。很明显，WGAN\
  \ 并不适合或不足以学习 MNIST 时尚数据集。如果我们使用不同的数据集，我们期望得到更好的结果。那么，MNIST 时尚数据集有什么问题呢？\n\n时尚数据集的问题在于图像的构成过于多样化，难以轻松学习一个通用或广义的期望分布。换句话说，鞋子的图片与毛衣或裤子的图片差异太大。随着我们尝试训练的数据类别或领域增多，这个问题会变得更加复杂。\n\
  \n虽然我们可以通过特征提取（如我们在 DCGAN 中所做的那样）来解决学习多样化领域的问题，但理想情况下，我们希望通过研究如何管理或表征跨领域或类别的损失来解决问题的根本原因。在下一节中，我们将研究一种这样的方法。\n\
  \n\n\n## 离散化边界搜索生成对抗网络\n\n我们可以将图像或其他数据中的视觉差异归类为不同类别。在 MNIST 时尚数据集中，有 10 个类别，它们既有相似之处，也存在关键差异。图\
  \ 4-4 展示了时尚数据集中各类别数据之间的差异。\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig4_HTML.jpg](img/502181_1_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4** 可视化时尚 MNIST 数据中的边界\n\n在图 4-4 中，你可以清晰地看到某些类别在视觉上相似，而其他类别则不然。如果我们将训练数据集缩减为仅包含前五个类别（T\
  \ 恤、裤子、套头衫、连衣裙和外套），那么我们的模型生成将会更简单。\n\n在本例中，我们将对图像的视觉感知等同于期望分布。只要数据易于泛化，这种方法通常效果良好。如果我们观察图\
  \ 4-4 中的凉鞋组，请注意每张图像的视觉细节。细节也可能意味着需要学习更复杂的期望分布。\n\n这给我们的 GAN 带来问题的另一个原因在于深度学习网络通过微积分进行学习的方式。通过使用微积分，我们的输入数据应始终是连续的。也就是说，它必须展示那些易于泛化且可以在图像间转换的通用数据。以时尚\
  \ MNIST 数据集为例，我们可以清楚地看到，将凉鞋这样的图像转换为套头衫在许多情况下并非连续的转换。\n\n我们可以通过重新审视损失计算方式来解决 GAN\
  \ 中的这些缺陷。R Devon Hjelm 及其同事在一篇题为“边界搜索生成对抗网络”的论文中提出了一个想法。他们提出的想法是使用重要性权重来衡量期望分布的差异。\n\
  \n重要性权重或加权是一种方法，通过该方法，图像或数据集中更重要的特征会被赋予更大的权重或输出。这会产生隔离对特定类别或多个类别重要的特征的效果，从而使模型能够学习更离散或更多样化的类别数据集。\n\
  \n使用重要性采样可以推导出策略梯度解，从而更好地近似损失。重要性采样是一种用于估计重建分布所需的参数化参数的技术。策略梯度方法源于强化学习，是一种使用参数化解来优化损失的简单方法。\n\
  \n强化学习是一种通过奖励来训练模型（也称为*智能体*）进行学习的方法。与无监督学习类似，智能体可以通过试错探索自主学习。这种学习形式未来可能用于生成式建模解决方案，但本书不对此进行探讨。策略梯度方法是强化学习方法的一个子集，它试图通过梯度裁剪来收敛一个策略。\n\
  \nBGAN 与原始 GAN 之间的差异很微妙，最好通过运行一些代码并查看结果来探索。在练习 4-3 中，我们将这样做，并尝试在 MNIST 时尚数据集上再次使用\
  \ BGAN。\n\n### 练习 4-3. 使用 BGAN 打破边界\n\n1. 从 GitHub 项目站点打开 `GEN_4_Boundary_Seeking_GAN.ipynb`\
  \ 笔记本。如果不确定如何操作，请参考附录 B。\n\n2. 通过选择“运行时” ➤ “全部运行”来运行整个笔记本。然后跳过 `imports` 单元格，找到第一个包含\
  \ `Hyperparameters` 类的单元格，检查超参数，所有这些参数我们之前都见过。\n\n3. 唯一的主要变化是损失的计算方式以及函数的定义方式，如下所示：\n\
  \n```\ndef boundary_seeking_loss(y_pred, y_true):\n    \"\"\"\n    边界搜索损失。\n   \
  \ 参考：https://wiseodd.github.io/techblog/2017/03/07/boundary-seeking-gan/\n    \"\
  \"\"\n    return 0.5 * torch.mean((torch.log(y_pred)\n    - torch.log(1 - y_pred))\
  \ ** 2)\n    d_loss_fn = torch.nn.BCELoss()\n    generator = Generator()\n    discriminator\
  \ = Discriminator()\n    if cuda:\n        generator.cuda()\n        discriminator.cuda()\n\
  \        d_loss_fn.cuda()\n```\n\n4. 我们可以看到 `boundary_seeking_loss` 函数的定义以及用于计算该损失的公式。该公式如下所示：\n\
  \n![$$ \\frac{1}{2}\\times mean $$](img/502181_1_En_4_Chapter_TeX_Equk.png)\n\n\
  5. 这个公式成为生成器的损失。注意 `y_true` 或 `x` 并未在公式中使用。同样，这与策略梯度方法有关，该方法关注的是预测值而非实际值。\n\n6.\
  \ 向下滚动到训练代码块，我们可以看到这个新的损失公式是如何在生成器训练中使用的。\n\n7. 高亮显示的行展示了训练循环中唯一的代码更改。通过这一行代码以及对损失计算的细微改动，我们可以显著改变结果。\n\
  \n```\n## 生成器损失\ngen_imgs = generator(z)\n## 衡量欺骗判别器的能力\ng_loss = boundary_seeking_loss(discriminator(gen_imgs),\
  \ valid)\ng_loss.backward()\noptimizer_G.step()\n## 判别器损失\noptimizer_D.zero_grad()\n\
  real_loss = d_loss_fn(discriminator(real_imgs), valid)\nfake_loss = d_loss_fn(discriminator(gen_imgs.detach()),\
  \ fake)\nd_loss = (real_loss + fake_loss) / 2\n```\n\n图 4-5 显示了仅训练几个周期后的结果，可以清晰地看到\
  \ BGAN 能够识别服装类别并开始生成它们。与最初难以找到共同点的 WGAN 不同，BGAN 几乎可以立即区分不同类别。\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig5_HTML.jpg](img/502181_1_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5** 在时尚 MNIST 上运行 BGAN 的早期结果\n\n然而，在完全训练 BGAN 之后，结果仍然不完全如我们所愿。这更多是由于类别多样性以及某些类别（如凉鞋）特有的细节量所致。事实上，如果你考虑最终的训练输出，你会注意到那些特殊类别（如凉鞋）的表示效果很差。\n\
  \n我们可以预期，通过更长时间的训练，最终会获得良好的结果，但正如你所见，这个模型仍然存在局限性。边界搜索 GAN 旨在处理具有离散边界的数据，也可能非常适合其他离散形式的数据，例如显示非连续数据的表格数据集。\n\
  \n到目前为止，我们已经看到，生成器和判别器的损失函数中涉及很多内容。在下一节中，我们将探讨另一种改进 GAN 中损失函数的方法。\n\n\n\n## 相对论与相对论\
  \ GAN\n\n我们研究了两种不同的方法来确定 GAN 中的损失。在普通或标准 GAN 中，损失是以绝对方式衡量的。在 WGAN 中，我们学习了如何使用推土机算法以更相对的方式确定损失。通过采用更相对的方法计算损失，WGAN\
  \ 能够解决我们在标准 GAN 中之前看到的一些训练缺陷。\n\n相对论 GAN 是另一种使用相对方法计算 GAN 中距离或损失的方法。在标准 GAN 中，判别器估计真实数据为真实的概率，而生成器的工作是增加假数据也被视为真实的概率。然而，RGAN\
  \ 的作者还希望考虑到生成器，降低真实图像为真实的概率。\n\n考虑到先验知识——它看到的一半数据总是假的，并且假数据变得更真实的概率——使得 GAN 能够利用先前观察到的观测结果来推断图像是真实的还是假的。结果是一个相对论判别器，它能够通过学习来考虑期望分布随时间的变化。\n\
  \n这改变了生成器的损失函数，使其类似于以下形式：\n\n![$$ {L}^{(G)}= logit\\left(D\\left(G(z)\\right)-\\\
  left(D(x)\\right),1\\right) $$](img/502181_1_En_4_Chapter_TeX_Equl.png)\n\n其中：\n\
  \n`logit` = 二元交叉熵 logit 损失函数 ![$$ \\mathit{\\log}\\left(\\frac{x}{1-x}\\right) $$](img/502181_1_En_4_Chapter_TeX_IEq1.png)。\n\
  \n`logit`函数通常被描述为几率函数，它返回给定期望概率下结果是真实或虚假的几率。\n\n相对论判别器接收两种组合的损失版本，即真实和虚假，由以下公式给出：\n\
  \n![$$ {L^{(D)}}_{real}= logit\\left(\\left(D(x)\\right)-D\\left(G(z)\\right),1\\\
  right) $$](img/502181_1_En_4_Chapter_TeX_Equm.png)\n\n![$$ {L^{(D)}}_{fake}= logit\\\
  left(D\\left(G(z)-\\left(D(x)\\right)\\right),0\\right) $$](img/502181_1_En_4_Chapter_TeX_Equn.png)\n\
  \n![$$ {L^{(D)}}_{total}=\\frac{\\left({L^{(D)}}_{real}+{L^{(D)}}_{fake}\\right)}{2}\
  \ $$](img/502181_1_En_4_Chapter_TeX_Equo.png)\n\n使用`logit`函数将输出从期望概率转换为期望几率。换句话说，不要猜测数据是真实还是虚假，而是猜测数据是真实或虚假的概率或几率。其思想是，根据过去对数据的观察，考虑答案与真实情况可能有多大的差距。\n\
  \nRGAN 的作者还提出了另一种方法，将计算出的几率与真实或预测数据的平均几率进行比较。他们将这种变体称为*相对论平均 GAN*（RaGAN）。\n\n现在我们对损失的工作原理有了更好的理解，可以看看在\
  \ PyTorch 中的具体实现。在练习 4-4 中，我们将研究在 Fashion MNIST 数据集上训练的 RGAN 和 RaGAN。\n\n### 练习\
  \ 4-4. 关联相对论 GAN\n\n1. 从 GitHub 项目站点打开`GEN_4_Relativistic_GAN.ipynb`笔记本。如果不确定如何操作，请参考附录\
  \ B。\n\n2. 通过选择“运行时” ➤ “全部运行”来运行整个笔记本。然后跳过`imports`单元格，找到第一个包含`Hyperparameters class`的单元格，检查超参数，这些我们之前都见过。有一个名为`rel_avg_gan`的新超参数，它控制\
  \ GAN 是作为 RGAN 还是 RaGAN 运行。\n\n3. 该 GAN 使用卷积进行额外的特征提取。生成器与之前看到的 DCGAN 类似，但判别器的构造不同，如下所示：\n\
  \n```\nclass Discriminator(nn.Module):\n    def __init__(self):\n        super(Discriminator,\
  \ self).__init__()\n        def discriminator_block(in_filters, out_filters, bn=True):\n\
  \            block = [nn.Conv2d(in_filters, out_filters, 3, 2, 1), nn.LeakyReLU(0.2,\
  \ inplace=True), nn.Dropout2d(0.25)]\n            if bn:\n                block.append(nn.BatchNorm2d(out_filters,\
  \ 0.8))\n            return block\n        self.model = nn.Sequential(\n       \
  \     *discriminator_block(hp.channels, 16, bn=False),\n            *discriminator_block(16,\
  \ 32),\n            *discriminator_block(32, 64),\n            *discriminator_block(64,\
  \ 128),\n        )\n        # 下采样图像的高度和宽度\n        ds_size = hp.img_size // 2 **\
  \ 4\n        self.adv_layer = nn.Sequential(nn.Linear(128 * ds_size ** 2, 1))\n\
  \    def forward(self, img):\n        out = self.model(img)\n        out = out.view(out.shape[0],\
  \ -1)\n        validity = self.adv_layer(out)\n        return validity\n```\n\n\
  4. 注意我们如何定义一个名为`discriminator_block`的内部函数，它设置了卷积层。\n\n5. 现在跳转到训练循环，看看内部代码如何使用我们更新的方程计算损失。\n\
  \n```\n## 生成器\noptimizer_G.zero_grad()\nz = Variable(Tensor(np.random.normal(0,\
  \ 1, (imgs.shape[0], hp.latent_dim))))\ngen_imgs = generator(z)\nreal_pred = discriminator(real_imgs).detach()\n\
  fake_pred = discriminator(gen_imgs)\nif hp.rel_avg_gan:\n    g_loss = loss_fn(fake_pred\
  \ - real_pred.mean(0, keepdim=True), valid)\nelse:\n    g_loss = loss_fn(fake_pred\
  \ - real_pred, valid)\ng_loss.backward()\noptimizer_G.step()\n\n## 判别器\noptimizer_D.zero_grad()\n\
  real_pred = discriminator(real_imgs)\nfake_pred = discriminator(gen_imgs.detach())\n\
  if hp.rel_avg_gan:\n    real_loss = loss_fn(real_pred - fake_pred.mean(0, keepdim=True),\
  \ valid)\n    fake_loss = loss_fn(fake_pred - real_pred.mean(0, keepdim=True), fake)\n\
  else:\n    real_loss = loss_fn(real_pred - fake_pred, valid)\n    fake_loss = loss_fn(fake_pred\
  \ - real_pred, fake)\nd_loss = (real_loss + fake_loss) / 2\nd_loss.backward()\n\
  optimizer_D.step()\n```\n\n6. 让示例训练完成，然后返回并将`rel_avg_gan`超参数切换为 false 或 true。然后比较\
  \ RGAN 和 RaGAN 的结果。\n\n图 4-6 显示了在 Fashion 数据集上训练 RGAN 的早期结果。如您所见，与我们之前的尝试相比，结果相当令人印象深刻。注意，我们在\
