  ```\n\n6. 只有 10 个输入点，将数据分别拆分为 8 个和 2 个点似乎是一个愚蠢的步骤。然而，即使在调整已知函数时，这也有助于验证我们的结果，所以我们仍然喜欢进行验证/测试拆分。\n\
  \n7. 这个笔记本中唯一其他的变化是我们在最后使用以下代码进行的另一个验证步骤：\n\n```\nX_a = torch.rand(25,1).clone()\
  \ * 9\ny_a = net(X_a)\ny_a = y_a.detach().numpy()\nplt.plot(X_a, y_a, 'o', color='black')\n\
  ```\n\n8. 这段代码使用 `torch.rand` 创建了 25 个随机值。由于这些值在 0–1 之间，我们将输出乘以 9，将值缩放到 0–9 之间。然后我们将这些值\
  \ `X_a` 输入到网络 `net` 中，并绘制出如图 3-3 所示的输出。\n\n9. 注意在图 3-3 中，网络在逼近我们已知函数的中间值时表现得非常出色。然而，你可以看到网络在底部（接近\
  \ `X` 为 0 处）和顶部端点处表现不佳。你可以看到网络在逼近边界时遇到了更大的困难。但它仍然很好地匹配了函数的中间值。\n\n我们刚刚演示了一个简单的网络如何学习逼近一个函数。然而，我们确实注意到网络在逼近边界时仍然存在困难，我们需要理解其中的原因。\n\
  \n部分问题在于我们用于训练网络的数据量有限。毕竟，我们只用了 10 个点。然而，与端点处的情况相比，通过中心点的函数逼近效果非常好。那么，这是为什么呢？\n\n\
  简单来说，一个深度学习系统可以在已知数据范围或方程极限内，很好地逼近一个已知或未知的方程。在我们上一个例子中，我们使用了 0–10 的数据值，边界为 0 和 10。然而，从图\
  \ 3-3 中我们看到，函数逼近在输入 `X` 大约为 7 时开始失效。同样，在下边界，当 `X`<1 时，我们也能看到问题。\n\n造成这些不一致的原因不在于数据，也不在于数据的极限，而在于微积分本身。还记得我们在第\
  \ 2 章中关于使用微积分进行自动微分的讨论吗？现在的问题不在于微分的“自动”部分，而在于微分本身。\n\n微积分帮助我们理解方程或函数的变化率。这对于从发射宇宙飞船到建造更好的建筑，当然也包括深度学习，都非常有用。理解为什么使用微积分来逼近深度学习中的函数也很重要，这将在下一节中介绍。\n\
  \n\n\n#### 微积分的局限性\n\n如果你学过微积分，就会了解它的局限性。其中之一是，我们用微积分进行求导的所有函数都必须是连续的。图 3-4 展示了一些带有所谓*不连续点*区域的函数示例。这些区域中的函数会阻碍深度学习系统学习或逼近该函数。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig4_HTML.jpg](img/502181_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4\n\n不连续函数的示例\n\n在生成式建模中，你可以将不连续点视为数据中的间隙或真空。但不要将这里的“间隙”与空间或距离混淆。我们在此使用术语*间隙*，指的是函数中没有任何样本值的断裂处。而术语*空间*、*潜在空间*或*隐藏空间*则用于定义连续数据集中的未知区域。\n\
  \n通常，当我们在生成的输出中看到黑色区域时，这表示输入数据存在极限或不连续性问题。\n\n理解连续数据与不连续数据之间的区别需要一些时间，有时这种区别可能并不明显。这里的关键要点是，函数逼近存在局限性，而这些局限性通常由数据本身决定，有时需要网络在不连续的数据上逼近一个连续函数。\n\
  \n现在，回到极限问题，让我们了解极限如何影响网络学习或逼近数据。在我们的练习示例中，网络的极限是 1 和 10。如果参考图 3-3，我们可以看到当 `X`<1\
  \ 时，函数变得平坦，考虑到极限为 1，这是合理的。这意味着当 `X` 小于 0 时，我们的网络将函数逼近限制为 `y`=5。\n\n然而，不太明显的是，为什么当极限为\
  \ 10 时，我们的函数逼近在大于 7 的值上会失败。要理解这个问题出现的原因，我们需要了解深度学习如何利用微积分来逼近函数，这将在下一节中介绍。\n\n####\
  \ 深度学习爬山法\n\n任何深奥的数学概念核心，总有一个直观的解释来说明其“为什么”。不幸的是，大多数经典数学课程常常忽略了“为什么”的解释。相反，它们依赖于学生通过进行证明或死记硬背方程来自己发现其中的直觉。这对崭露头角的数学家来说效果很好，但往往会压垮其他人。因此，我们将始终更关注数学的“为什么”，而不是具体的“怎么做”。\n\
  \n微积分是我们在深度学习系统中用来平衡网络权重/参数的工具。回想一下，微积分通过理解系统的变化率来工作。在深度学习中，微积分使我们能够确定需要调整网络权重的变化量以及调整的位置。\n\
  \n微积分和梯度优化或梯度下降并不是我们用来寻找网络权重的唯一工具。它目前是最有效的，但深度学习系统已经并将继续使用其他机器学习方法。如果你有兴趣了解更多，可以搜索\
  \ *深度学习 PSO* 或 *深度学习 GA*。\n\n图 3-4 展示了一个一维函数，其中有一个小球位于位置 1。我们可以将深度学习系统的目标视为引导这个球在函数上移动。更进一步，我们希望这个球能够尽可能紧密地跟随该函数。球能够跟随函数路径的效果越好，我们的网络预测或生成内容的效果就越好。\n\
  \n请注意，在图 3-4 中，我们移动球的量是通过自动微分和我们的优化方法计算得出的，再乘以学习率（`alpha`）。这在图中被标记为“梯度 X alpha”。梯度的量可以通过选择不同的优化方法和/或调整超参数来改变。调整优化器，无论是随机梯度下降还是\
  \ Adam，都是我们稍后会涉及的内容。\n\n这就引出了 *alpha*，即学习率或学习参数。这个超参数允许我们控制网络在将球映射到函数时使用的调整程度。在图\
  \ 3-5 和我们之前的例子中，我们应用了较高的学习率。正如你所见，这通过球移动到位置 2 然后到位置 3 的运动来体现。注意球在第三个位置是如何远高于函数线的。这就是导致我们前一个例子中出现问题的原因。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig5_HTML.jpg](img/502181_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5\n\n深度学习爬山法\n\n在图 3-6 中，我们可以看到降低学习率如何使网络更好地逼近函数路径。你可以看到，随着边界的加入，让球保持在边界内也变得至关重要。当球弹跳到最大边界之外时，其值会被限制在最大值。这就是图\
  \ 3-3 中最大值映射不佳的原因。\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig6_HTML.jpg](img/502181_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n\n调整学习率\n\n从中得出的主要结论是，在映射函数时，学习率通常是我们最敏感的超参数。学习率，即 *alpha*，几乎总是你为网络调整和理解的首要参数。`Alpha`\
  \ 也是调整网络训练速度的关键。当 `alpha` 过大时，网络会超出函数范围。相反，将 `alpha` 保持得非常小可以让球很好地学习函数。然而，这可能会以巨大的计算性能为代价。\n\
  \n\n\n## 学习率与过拟合/欠拟合\n\n考虑一个学习率为`.001`的情况，与值为`.00001`的情况进行比较。假设我们可以用较小的学习率在 10 分钟内训练一个网络。较小的学习率（小\
  \ 100 倍）由于训练迭代次数的增加，很可能需要 100 倍的时间，将训练时间增加到 10 × 100 = 1000 分钟，即超过 16 小时。这一切都源于一个更小但不幸的是效率更低的学习率。\n\
  \n为了进一步演示这一关键概念，让我们看另一个例子。练习 3-2 展示了我们将如何调整`alpha`（学习率）以更好地逼近上一个练习中的函数。\n\n### 练习\
  \ 3-2：调整学习率以实现高效学习\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig7_HTML.jpg](img/502181_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7** 对函数`x2 + 5`的更好逼近？\n\n1.  从 GitHub 项目站点打开`GEN_3_learning_rate.ipynb`笔记本。如果不确定如何操作，请查阅附录\
  \ B。\n2.  通过选择“Runtime ➤ Run all”运行整个笔记本。注意，在定义优化器的地方（如下代码所示），我们设置了学习率`lr`。\n\n\
  \    ```\n    loss_fn = nn.MSELoss()\n    optimizer = torch.optim.Adam(net.parameters(),\
  \ lr = .001)\n    ```\n\n3.  在我们之前的`GEN_3_function_approx.ipynb`示例中，学习率是`.025`，这个值刚好能够正确映射函数。\n\
  4.  我们的目标是找到能让网络 100%或接近 100%映射函数的学习率。\n5.  更改前面代码块中的学习率`lr`，然后通过选择“Runtime ➤ Run\
  \ all”重新运行整个笔记本。\n6.  看看你是否能调整`lr`值以匹配或逼近图 3-7。如果你将学习率设置得非常小会发生什么？\n7.  如果你的网络在找到函数之前就完成了训练，这可以通过增加`epoch`数量轻松解决。将`num_epochs`改为更大的值，看看结果如何。\n\
  \n    ```\n    num_epochs = 8000\n    y_train_t = torch.from_numpy(y_train).clone().reshape(-1,\
  \ 1)\n    ```\n\n8.  尝试找到能够训练网络匹配函数`x2 + 5`的最小`epoch`数量和最大学习率。\n9.  如果你觉得更有挑战性，可以尝试改变每一层的神经元数量或改变网络本身。\n\
  \n当你完成上一个练习时，可能已经意识到网络本身和数据可能存在局限性。事实上，这正是练习中的情况。在这个特定示例中，网络试图过拟合数据。我们将在下一节中探讨如何解决过拟合和欠拟合问题。\n\
  \n### 过拟合与欠拟合\n\n通常，当新手设计网络时，他们的第一个假设是神经元越多意味着结果越好。不幸的是，由于我们将在后续章节中理解的多种原因，情况很少如此。现在，我们想关注网络规模本身如何导致对函数的过拟合或欠拟合。\n\
  \n你可能经常听到深度学习从业者提到他们的网络对数据过拟合或欠拟合。他们真正的意思是网络对匹配或分类该数据的函数过拟合或欠拟合。\n\n图 3-8 展示了我们之前的示例与函数`x2\
  \ + 5`的对比图，以查看我们实际匹配结果的程度。如你所见，我们匹配得并不好——事实上，考虑到我们网络的规模，匹配得相当差。然而，网络规模并非全部问题所在。网络规模和数据量几乎是相辅相成的。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig8_HTML.jpg](img/502181_1_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8** 训练模型与真实函数`x2 + 5`的对比图\n\n回想一下我们之前的练习以及我们逼近函数`x2 + 5`的尝试。最初几次尝试使用了从 1\
  \ 到 10 的一组固定数量的数据点。我们将这些数据点输入函数以生成`y`输出。这生成了我们的可训练数据集，然后我们将其拆分为训练集和测试集。\n\n图 3-9\
  \ 展示了我们为训练和逼近函数而生成的 10 个数据点的图。在这些点中，我们移除了 20%（即 2 个点）用于测试。这减少了数据集中的点数，实质上缩小了训练数据之间的空间大小。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig9_HTML.jpg](img/502181_1_En_3_Fig9_HTML.jpg)\n\
  \n**图 3-9** 练习 3-1 和练习 3-2 中输入数据集的图\n\n这意味着当我们的模型逼近函数`x2 + 5`时，数据之间存在大片区域。我们将这些区域称为*潜在空间*或*隐藏空间*。再次强调，这不应与数据中的间隙、鸿沟或真空混淆。数据中的这种隐藏空间代表了函数中缺少任何实际训练数据的区域。这意味着网络必须在这些数据点之间逼近值。\n\
  \n事实证明，生成建模的一个重要部分是理解如何从这种潜在空间中提取结果，正如我们将在本书中看到的那样。这与我们之前尝试从函数逼近练习中提取结果的方式并无不同。我们之前的假设可能是减少训练点的数量，但现在我们可以看到，这增加了潜在空间的大小，导致模型对函数过拟合。\n\
  \n当模型逼近一个函数但错误地填充或逼近潜在空间时，就会发生过拟合。在我们之前的函数逼近示例中，情况显然如此，这是由两个问题造成的。第一个问题是数据不足，导致网络估计了大面积的潜在空间。第二个问题是网络规模过大，拥有过强的能力来估计数据中的空间。因此，它基本上是在编造值，这可能成为一个问题。\n\
  \n当网络规模很大时，它拥有很大的能力，在这种情况下是过大的能力。大型网络可以记忆各种形式的数据，包括图像或视频。这对于针对特定数据的网络可能有用，但在生成建模以及大多数其他机器学习学科中，我们的目标始终是泛化。\n\
  \n泛化始终是我们构建模型时要追求的目标。这意味着我们输入模型的数据需要分布良好。分布良好的数据为我们提供了数据之间均匀的潜在空间。在我们之前的示例中，数据被分布到\
  \ 10 个区间中，值从 1 到 10。然而，正如我们所看到的，我们的数据分布得不够好。\n\n\n\n## 泛化与过拟合、欠拟合\n\n泛化也意味着我们的网络应该只保持所需的大小，不多也不少。如果网络过大，它往往会过拟合，或用不正确的值填充潜在空间。同样，过小的网络会导致欠拟合。欠拟合通常是模型中潜在空间或间隙过大的结果。\n\
  \n图 3-10 展示了使用线性模型或近似直线来拟合`x² + 5`函数的经典欠拟合示例。此例中的欠拟合是由于模型复杂度不足造成的。然而，当网络没有获得足够的数据，或数据分布不均匀时，也可能发生欠拟合。\n\
  \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig10_HTML.jpg](img/502181_1_En_3_Fig10_HTML.jpg)\n\
  \n**图 3-10**  \n线性模型试图拟合`x² + 5`函数\n\n为了具体理解这一点，我们的下一个练习将专注于如何创建对一组函数数据过拟合和欠拟合的模型。我们将继续使用之前练习的基础，但这次会修改一些细节以更好地理解问题；参见练习\
  \ 3-3。\n\n### 练习 3-3：理解过拟合与欠拟合\n\n1. 从 GitHub 项目站点打开`GEN_3_over_under.ipynb`笔记本。如果不确定如何操作，请查阅附录\
  \ B。\n\n2. 通过选择 **Runtime** ➤ **Run all** 运行整个笔记本。注意我们在输出图之前的代码块中如何更改了输入（`X`, `y`），如下所示：\n\
  \n```\ndata_step = .1\nX = np.reshape(np.arange(1,10, data_step), (-1, 1))\ny =\
  \ function(X)\ninputs = X.shape[1]\nplt.plot(X, y, 'o', color='red')\n```\n\n3.\
  \ 在上一个代码块中，我们修改了 NumPy 调用，以便使用`np.arange`自动生成数组。`arange`函数接收起始值、结束值和步长作为输入。我们使用一个名为`data_step`的新超参数来设置潜在空间中的距离。使用`.1`的步长可以创建比之前多\
  \ 10 倍的数据点，从而大大减少了潜在空间。\n\n4. 接下来，注意在此示例中，学习率（`lr`）和训练轮数（`num_epochs`）这两个超参数是如何被修改的：\n\
  \n```\noptimizer = torch.optim.Adam(net.parameters(), lr = .01)\nnum_epochs = 1000\n\
  ```\n\n5. 网络设计也通过移除一层并引入另一个名为`neurons`的超参数而发生了变化：\n\n```\nneurons = 20\ntorch.set_default_dtype(torch.float64)\n\
  net = nn.Sequential(\nnn.Linear(inputs, neurons, bias = True), nn.ReLU(),\nnn.Linear(neurons,\
  \ neurons, bias = True), nn.Sigmoid(),\nnn.Linear(neurons, 1)\n)\n```\n\n6. `neurons`超参数允许我们快速调整网络大小，从而减少神经元数量以使网络过拟合或欠拟合。\n\
  \n7. 尝试仅调整`data_step`和`neurons`这两个超参数，观察它们对模型过拟合或欠拟合的影响。请记住，更大更复杂的模型通常需要更多的训练迭代次数（`num_epochs`）。这反过来意味着你可能也需要调整学习率`lr`。\n\
  \n8. 现在尝试找到能够以最少`num_epochs`最快学习该函数的最小网络（即最少的神经元数量）。请根据需要自由调整学习率（`lr`）和`data_step`。\n\
  \n9. 最后，将`data_step`设置为一个较高的值，例如 1.0，然后观察调整`neurons`会产生什么影响。你需要增加还是减少神经元数量？\n\n\
  上述练习的目的是演示我们的网络如何对映射到数据的函数进行过拟合和欠拟合。在这个简单的例子中，我们可以快速且明确地看到每个超参数的作用，从而理解网络如何过拟合或欠拟合。\n\
  \n随着本书的深入，我们使用更复杂的数据形式（如图像）时，过拟合和欠拟合往往变得不那么明显。幸运的是，有几个线索可以帮助我们识别这类问题，我们将在后续练习中逐步探索。\n\
  \n我们尚未涉及的一个关键要素是数据分布，它可能导致许多过拟合/欠拟合问题。在示例中，数据在某个值范围内是均匀分布的。但这在现实世界中很少见。\n\n例如，假设你有一个包含\
  \ 30,000 张动物图像的数据集（10,000 张猫、15,000 张狗和 5,000 张鸟），你想将其分类为猫、狗和鸟。问题在于你的数据分布不均匀。你有更多的狗图片，因此你的模型会高估或记住狗。相反，我们应该做的是将猫和狗的图像数量减少到\
  \ 5,000 张，以匹配鸟的图像数量。你仍然可以争辩说，猫和狗在视觉上比鸟更相似，因此可能会影响你的结果。\n\n在生成式建模中，我们以多种方式使用和理解数据的分布。事实上，这是许多方法的基础。在下一节中，我们将理解为什么数据分布对变分自编码器如此重要。\n\
  \n\n\n## 构建变分自编码器\n\n在前面的示例练习中，我们探讨了网络如何执行函数逼近，并发现了离散区间内的潜在空间。我们发现，通过增加数据采样区间的数量，可以减少未知的潜在空间，并改进模型训练。这种技术对于简单的函数效果良好，但无法扩展到更复杂的问题。\n\
  \n理解问题和数据本身的更好方法是使用统计学。统计学使我们能够理解模型和数据中的潜在空间。反过来，统计学可以为我们提供模型的摘要或概览，以及我们生成新数据的方式。\n\
  \n统计学是数据科学、深度学习和生成式建模的基础。在数据科学中，我们使用统计学来决定使用哪些数据。对于深度学习，统计学用于衡量模型的效率，而生成式建模则利用统计学来理解模型正在学习什么。\n\
  \n现在，在我们深入探讨生成式建模的统计学和潜在空间的理解之前，先看一个实际运行的示例会很有帮助。这个示例的训练也需要一些时间，所以在训练的同时，你可以阅读下一节中的理论知识。\n\
  \n在下一个练习中，我们将深入构建一个变分自编码器（VAE）。VAE 在结构和功能上类似于自编码器，不同之处在于它学习编码部分的方式。回想一下，在 AE 中，模型学习如何对数据的潜在表示进行编码，然后再解码回原始数据。而在\
  \ VAE 中，模型学习的是潜在编码的分布方式。我们暂时不必担心理解分布部分，而是直接进入练习 3-4，看看代码是如何工作的。\n\n### 练习 3-4：构建卷积变分自编码器\n\
  \n1. 由于我们之前已经介绍过接下来的几节数据处理代码，我们将直接跳转到定义 `ConvVAE` 类和 `__init__` 函数的单元格。\n\n```\n\
  class ConvVAE(nn.Module):\n    def __init__(self, image_channels=3, h_dim=1024,\
  \ z_dim=32):\n        super(ConvVAE, self).__init__()\n        self.encoder = nn.Sequential(\n\
  \            nn.Conv2d(image_channels, 32, kernel_size=4, stride=2),\n         \
  \   nn.ReLU(),\n            nn.Conv2d(32, 64, kernel_size=4, stride=2),\n      \
  \      nn.ReLU(),\n            nn.Conv2d(64, 128, kernel_size=4, stride=2),\n  \
  \          nn.ReLU(),\n            nn.Conv2d(128, 256, kernel_size=4, stride=2),\n\
  \            nn.ReLU(),\n            Flatten()\n        )\n        self.fc1 = nn.Linear(h_dim,\
  \ z_dim)\n        self.fc2 = nn.Linear(h_dim, z_dim)\n        self.fc3 = nn.Linear(z_dim,\
  \ h_dim)\n        self.decoder = nn.Sequential(\n            UnFlatten(),\n    \
  \        nn.ConvTranspose2d(h_dim, 128, kernel_size=5, stride=2),\n            nn.ReLU(),\n\
  \            nn.ConvTranspose2d(128, 64, kernel_size=5, stride=2),\n           \
  \ nn.ReLU(),\n            nn.ConvTranspose2d(64, 32, kernel_size=6, stride=2),\n\
  \            nn.ReLU(),\n            nn.ConvTranspose2d(32, image_channels, kernel_size=6,\
  \ stride=2),\n            nn.Sigmoid(),\n        )\n```\n\n2. 这段代码类似于我们之前看过的卷积自编码器。关键区别在于使用了三个\
  \ `nn.Linear` 层，它们现在负责学习中间的编码分布。之前，我们定义了一个离散的数据大小作为学习表示。请耐心等待：我们稍后会详细讨论学习分布。\n\n\
  3. 跳过 `ConvVAE` 类中的其余函数，直接进入定义优化器的代码块。\n\n```\noptimizer = torch.optim.Adam(model.parameters(),\
  \ lr=learning_rate)\ndef loss_fn(recon_x, x, mu, logvar):\n    BCE = F.binary_cross_entropy(recon_x,\
  \ x, size_average=False)\n    KLD = -0.5 * torch.mean(1 + logvar - mu.pow(2) - logvar.exp())\n\
  \    return BCE + KLD, BCE, KLD\n```\n\n4. 在前面的代码中，我们可以看到定义了一个专门的损失函数 `loss_fn`。该函数中的代码负责学习潜在编码分布。同样，细节将在后面介绍。\n\
  \n5. 最后，我们来到训练代码的最后一个块。这一部分与我们之前的练习几乎相同。然而，需要注意的一个关键区别是以 `images =` 开头的高亮行。这行代码将图像从\
  \ CPU 张量转换为 GPU 张量，区别在于内存的驻留位置和处理方式。在 GPU 上处理的张量可以将性能提升 100 倍以上。\n\n```\nfor epoch\
  \ in range(epochs):\n    train_loss = 0.0\n    for data in train_loader:\n     \
  \   images, labels = data\n        optimizer.zero_grad()\n        images = images.to(device)\n\
  \        generated, mu, logvar = model(images)\n        loss, bce, kld = loss_fn(generated,\
  \ images, mu, logvar)\n        loss.backward()\n        optimizer.step()\n     \
  \   train_loss += loss.item()*images.size(0)\n    train_loss = train_loss/len(train_loader)\n\
  \    clear_output()\n    print(f'Epoch: {epoch+1} Training Loss: {train_loss:.3f}')\n\
  \    plot_images(generated.cpu().data,labels,16)\n```\n\n6. 在继续阅读下一节时，请保持笔记本的训练状态。务必定期回来查看模型的学习进展。如果你对结果不满意，可以通过运行最后一个单元格来继续训练模型。每次运行最后一个单元格都会为模型增加\
  \ 100 次迭代训练。\n\n1. 从 GitHub 项目站点打开 `GEN_3_conv_VAE.ipynb` 笔记本。\n\n2. 通过选择 **运行时**\
  \ ➤ **全部运行** 来运行整个笔记本。在第一个导入单元格下方，你会注意到一个检查设备类型的单元格，如下代码所示：\n\n```\ndevice = torch.device('cuda'\
  \ if torch.cuda.is_available() else 'cpu')\ndevice\n```\n\n3. 对于此笔记本以及所有未来的笔记本，我们将配置运行时以使用\
  \ GPU。图 3-11 显示了可通过菜单选择 **运行时** ➤ **更改运行时类型** 来访问的运行时类型。\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig11_HTML.jpg](img/502181_1_En_3_Fig11_HTML.jpg)\n\
