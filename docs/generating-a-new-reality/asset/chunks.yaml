- fmt: "# Being Artistic with ArtLine\n\n`ArtLine` was another project developed to\
    \ turn photos into line art drawings and convert them to cartoon versions. The\
    \ project follows many of the same discoveries that `Antic` used in building `DeOldify`.\
    \ Both projects are based on many of the improvements/utilities developed by the\
    \ team at `Fast.ai`.\n\nTechnically, `ArtLine` is like `DeOldify` in that it is\
    \ based on a self-attention GAN that is progressively resized to achieve a desired\
    \ resolution. It is likewise trained as a NoGAN where the initial generator feature\
    \ loss is determined by a pretrained VGG model much like we did in examples in\
    \ Chapter [6](#502181_1_En_6_Chapter.xhtml). Unlike `DeOldify`, however, `ArtLine`\
    \ does not use a discriminator for fine-tuning feature extraction, so it is never\
    \ trained as a GAN.\n\nAs we will see, the results of `ArtLine` work well with\
    \ portraits and faces and less so with other types of photos. It can, however,\
    \ be interesting to see how this form of NoGAN works across a variety of images,\
    \ as we will see in Exercise 8-5. We will again use the project’s source code\
    \ pulled directly from the repo and run it in a notebook.\n\n## EXERCISE 8-5.\
    \ GETTING ARTISTIC WITH ARTLINE\n\n1. Open the `GEN_8_ArtLine.ipynb` notebook\
    \ from the GitHub project site. If you are unsure how, then consult Appendix B.\n\
    \n2. This notebook again needs to download, install, and restart before we can\
    \ be artistic with `ArtLine`. As such, you will likely need to restart the runtime\
    \ after installing the `requirements.txt` file, as shown in the following code\
    \ block:\n\n3. If you encounter an error further down in the notebook, make sure\
    \ that you have restarted the runtime by selecting **Runtime ➤ Restart runtime**\
    \ from the menu.\n\n4. The `imports` block for this notebook does a wide variety\
    \ of installs for various components. Unlike `DeOldify`, this project has some\
    \ requirements to describe the feature loss in a class.\n\n5. Scroll down to the\
    \ `FeatureLoss` class and see how the model determines the loss between features.\
    \ This class is used by the `ArtLine` model to evaluate feature training within\
    \ the model itself.\n\n```\nclass FeatureLoss(nn.Module):\n    def __init__(self,\
    \ m_feat, layer_ids, layer_wgts):\n        super().__init__()\n        self.m_feat\
    \ = m_feat\n        self.loss_features = [self.m_feat[i] for i in layer_ids]\n\
    \        self.hooks = hook_outputs(self.loss_features, detach=False)\n       \
    \ self.wgts = layer_wgts\n        self.metric_names = ['pixel',] + [f'feat_{i}'\
    \ for i in range(len(layer_ids))] + [f'gram_{i}' for i in range(len(layer_ids))]\n\
    \    def make_features(self, x, clone=False):\n        self.m_feat(x)\n      \
    \  return [(o.clone() if clone else o) for o in self.hooks.stored]\n    def forward(self,\
    \ input, target):\n        out_feat = self.make_features(target, clone=True)\n\
    \        in_feat = self.make_features(input)\n        self.feat_losses = [base_loss(input,target)]\n\
    \        self.feat_losses += [base_loss(f_in, f_out)*w for f_in, f_out, w in zip(in_feat,\
    \ out_feat, self.wgts)]\n        self.feat_losses += [base_loss(gram_matrix(f_in),\
    \ gram_matrix(f_out))*w**2 * 5e3 for f_in, f_out, w in zip(in_feat, out_feat,\
    \ self.wgts)]\n        self.metrics = dict(zip(self.metric_names, self.feat_losses))\n\
    \        return sum(self.feat_losses)\n    def __del__(self): self.hooks.remove()\n\
    ```\n\n6. Inside this class you can tweak one hyperparameter that scales the feature\
    \ loss back into the model. The constant is exposed as `5e3`, and you may alter\
    \ this value to determine the effect it has on the final output.\n\n7. Next, we\
    \ can see how the pretrained `ArtLine` model is downloaded with the following\
    \ code:\n\n```\nMODEL_URL = \"https://www.dropbox.com/s/starqc9qd2e1lg1/ArtLine_650.pkl?dl=1\"\
    \nurllib.request.urlretrieve(MODEL_URL, \"ArtLine_650.pkl\")\npath = Path(\".\"\
    )\nlearn=load_learner(path, 'ArtLine_650.pkl')\n```\n\n8. To use the model, we\
    \ have again set up a form to allow you to scroll through the various images.\
    \ For this example, we have two datasets, the `historic-bw` one we used in the\
    \ previous exercise and a new one of interesting photos.\n\n```\n#@title ARTLINE\
    \ IMAGES  { run: \"auto\" }\nimport glob\nfiles = sorted(glob.glob(\"%s/*.jpg\"\
    \ % image_folder))\nfile_idx = 7 #@param {type:\"slider\", min:0, max:25, step:1}\n\
    img = PIL.Image.open(files[file_idx]).convert(\"RGB\")\nimg_t = T.ToTensor()(img)\n\
    img_fast = Image(img_t)\nshow_image(img_fast, figsize=(8,8), interpolation='nearest');\n\
    p,img_hr,b = learn.predict(img_fast)\nImage(img_hr).show(figsize=(8,8))\n```\n\
    \n9. Running the code will produce output shown in Figure [8-12](#502181_1_En_8_Chapter.xhtml#Fig13),\
    \ which is the same old photo we colorized with `DeOldify`. If you run through\
    \ the various other photos from either dataset, you may notice the higher-contrast\
    \ images from the historic set translate better.\n\n```\n!pip install -r colab_requirements.txt\n\
    ```\n\n`ArtLine` has another variation of its model that allows you to convert\
    \ images to colorized cartoons. This model works quite well and can be set up\
    \ in a similar fashion to the exercise we just worked with. We leave it up to\
    \ you to pursue this on your own and enjoy the fun of converting images to cartoons.\n\
    \nProjects like `ArtLine` and `DeOldify` are recent initiatives brought about\
    \ by developers interested in developing generative modeling for various applications,\
    \ from creating art to coloring and enhancing old photos. How these projects mature\
    \ and impact various communities remains to be seen, but it is also likely many\
    \ other developers will follow suit.\n\n## Conclusion\n\nAs we saw in this chapter,\
    \ generative modeling extends beyond the typical GAN architecture. It has grown\
    \ into other variations from models that use progressive architectures to those\
    \ that use no GAN training at all. How this whole new area of application development\
    \ evolves in the short- and long-term remains to be seen.\n\nOne thing is for\
    \ sure, however, which is that these forms of enhanced and impressive generators\
    \ are only becoming more accessible. In the future, this should certainly have\
    \ an impact on a wide variety of applications across multiple industries. The\
    \ main hurdle we need to overcome now is the application of generative modeling\
    \ to other sources of domain data.\n\nHowever, it is also important as generative\
    \ modelers that we understand how we can put this technology to use. In the next\
    \ chapter, we look to apply all our learnings of generative modeling into the\
    \ scariest application for many deep fakes."
