    5.  Finally, click the Sort button at the bottom of the window, and in a few minutes,
    you will be notified that the output folder has the sorted faces.


    6.  Locate and open the output folder, as shown in Figure [9-6](#502181_1_En_9_Chapter.xhtml#Fig6),
    where the faces are sorted by similarity.


    1.  At one end of the folder, you will see faces and garbage images you likely
    don’t want to train on or swap. Go ahead and delete those images. You may also
    want to remove faces that are abnormal. Perhaps the celebrity is wearing sunglasses
    or had unusual facial hair or makeup. You may notice several duplicate images,
    which is okay but not ideal.


    With the unwanted faces removed, we now need to move and clean up the alignments
    file using another tool in the software, as we will see in the next section.


    ### Realigning the Alignments File


    The alignments file is used to identify the 68 mapping points of a face in an
    image and is heavily used to define which face is the target in the image. Often
    you may extract images of faces with more than one face, and the alignments file
    helps the software identify which to use. It also helps to mask the face for better
    mapping of one face to another when we apply conversion later.


    After we have the unwanted faces removed from the folder, we need to rebuild the
    alignments file. Specifically, we need to remove the faces we deleted from the
    sorted folder from the alignments file. Otherwise, the software will complain
    we are missing images when we proceed to training.


    The process is quite simple for removing faces from the alignments file and is
    included as a tool within the software on the Tools tab. You will need to clean
    up each alignments file that you sort and remove images from the extract folder.
    Return to the Faceswap software, and we will go through the process of removing
    faces in Exercise 9-5.


    EXERCISE 9-5\. REMOVING FACES FROM THE ALIGNMENTS FILE


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig7_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Removing faces from an alignments file


    1.  With the software running, open the Tools tab and then the Alignments tab,
    as shown in Figure [9-7](#502181_1_En_9_Chapter.xhtml#Fig7).


    1.  In the Job group box, select the Remove-Faces option. As you can see, there
    are several operations you can perform on an alignments file. For more information
    on how use these tools, consult the Faceswap repository or forums.


    2.  Next in the Data group box, select the source alignments file and the folder
    you extracted, sorted, and removed faces from in the Faces Folder field.


    3.  Leave the rest of the defaults as they are, but do make sure they are set
    the same way as in Figure [9-7](#502181_1_En_9_Chapter.xhtml#Fig7).


    4.  Finally, click the Alignments button to start the removal process. If you
    encounter an error, be sure you have the right faces folder and alignments file
    selected and then try again. Sometimes, you may just need to run the alignments
    process again to resolve with no errors.


    Be sure to clean up all your alignments files for each extracted group of images
    and video you process. If you forget to do this, you will encounter more serious
    errors when we move on to training in the next section.'
  trans: '

    ### 排序与修剪人脸


    我们在上一步中提取的人脸并非全部有用，甚至可能包含错误的主体。如果你转换了一个包含多个演员的视频片段，这种情况尤其常见。因此，我们需要从提取的文件夹中移除不需要的人脸，然后重建对齐文件。


    为此，我们需要手动进入提取文件夹，删除不需要的图像。由于这些图像通常混杂在一起，一个有效的方法是先使用软件内置的工具，按相似度对这些图像进行排序。


    在练习 9-4 中，我们将运行排序工具，按相似度对图像进行排序，然后从文件夹中移除那些不需要的人脸。这是一个相当简单的过程，你需要为每个提取的人脸集执行此操作。接下来，让我们从提取文件夹中对图像进行排序开始。


    **练习 9-4. 排序与移除人脸**


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig5_HTML.jpg](img/502181_1_En_9_Fig5_HTML.jpg)


    *图 9-5 – 使用“工具/排序”功能对人脸排序*


    1. 在软件运行状态下，打开 `Tools` 选项卡，然后打开 `Sort` 选项卡，如图 9-5 所示。


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig6_HTML.jpg](img/502181_1_En_9_Fig6_HTML.jpg)


    *图 9-6 – 从朱莉娅·罗伯茨提取的名人图像中排序输出的示例*


    2. 在 `Data` 组下，我们需要再次填写 `Input`、`Output` 和 `Alignments` 文件的位置。输入文件夹是提取图像的位置。输出文件夹是你希望存放排序后图像的新文件夹，而对齐文件则位于原始输入文件夹的源目录中。


    3. 在 `Sort Settings` 和 `Sort By` 组框中，选择 `Face` 作为排序方法。


    4. 对于 `Output/Final Process` 组，保持默认的 `Rename` 选项。这将根据排序顺序重命名图像。


    5. 然后，在 `Group By` 下，我们将使用默认但首选的 `Hist` 方法。


    6. 最后，点击窗口底部的 `Sort` 按钮，几分钟后，你会收到通知，告知输出文件夹中已包含排序后的人脸。


    7. 找到并打开输出文件夹，如图 9-6 所示，其中的人脸已按相似度排序。


    8. 在文件夹的一端，你会看到可能不想用于训练或交换的人脸和垃圾图像。请删除这些图像。你可能还想移除异常的人脸，例如名人戴着太阳镜，或者有不同寻常的胡须或妆容。你可能会注意到一些重复的图像，这没问题，但并非理想情况。


    移除不需要的人脸后，我们现在需要使用软件中的另一个工具来移动并清理对齐文件，我们将在下一节中看到。


    ### 重新对齐对齐文件


    对齐文件用于识别图像中人脸的 68 个映射点，并且在定义图像中哪张脸是目标时被大量使用。通常，你可能会提取包含多张人脸的图像，而对齐文件有助于软件识别使用哪一张。当我们稍后应用转换时，它还有助于遮罩人脸，以便更好地将一张脸映射到另一张脸。


    从文件夹中移除不需要的人脸后，我们需要重建对齐文件。具体来说，我们需要从对齐文件中移除那些我们从排序文件夹中删除的人脸。否则，当我们进行训练时，软件会报错缺少图像。


    从对齐文件中移除人脸的过程相当简单，它作为软件 `Tools` 选项卡中的一个工具提供。你需要清理每个你排序过并从提取文件夹中移除图像的对齐文件。返回 Faceswap
    软件，我们将在练习 9-5 中逐步完成移除人脸的过程。


    **练习 9-5. 从对齐文件中移除人脸**


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig7_HTML.jpg](img/502181_1_En_9_Fig7_HTML.jpg)


    *图 9-7 – 从对齐文件中移除人脸*


    1. 在软件运行状态下，打开 `Tools` 选项卡，然后打开 `Alignments` 选项卡，如图 9-7 所示。


    2. 在 `Job` 组框中，选择 `Remove-Faces` 选项。如你所见，你可以对对齐文件执行多种操作。有关如何使用这些工具的更多信息，请查阅 Faceswap
    仓库或论坛。


    3. 接下来，在 `Data` 组框中，选择源对齐文件，并在 `Faces Folder` 字段中选择你提取、排序并移除了人脸的文件夹。


    4. 其余选项保持默认，但请确保它们的设置与图 9-7 一致。


    5. 最后，点击 `Alignments` 按钮开始移除过程。如果遇到错误，请确保你选择了正确的人脸文件夹和对齐文件，然后重试。有时，你可能只需要再次运行对齐过程即可无错误地解决。


    请务必为你处理的每组提取图像和视频清理所有对齐文件。如果忘记执行此操作，当我们进入下一节的训练环节时，将会遇到更严重的错误。

    '
- fmt: '# Training a Face Swapping Model


    At this point you should now have your two sets of celebrity faces, A and B, that
    we will use for training. While it is possible to train directly against the faces
    you may want to swap for a video, it isn’t recommended as the faces are often
    too similar. Remember in generative modeling we want some amount of diversity
    in our data, and that means it’s best to use external images.


    Keeping in mind that the basic architecture of the models used in Faceswap are
    double autoencoders, you may be surprised at the required amount of training time.
    It can take up to a week or more to train some of the more sophisticated models
    like `Villan`. There are various other models you can try, depending on your hardware,
    including a lightweight version. However, as you likely realize by now, the quality
    and size of the model’s architecture will be a main determiner in the generated
    results.


    In the next exercise, we look at how to train a face swapping model. We have already
    done various similar trainings when we explored image to image paired and unpaired
    translations with GANs in Chapters [6](#502181_1_En_6_Chapter.xhtml) and [7](#502181_1_En_7_Chapter.xhtml).
    The Faceswap software makes the process of setting up training relatively easy,
    but it may take some time to master which model works well for your hardware and
    what results you ultimately want. We will continue where we left off from the
    previous exercise and start training a model in Exercise 9-6.


    ## EXERCISE 9-6. TRAINING A FACE SWAPPING MODEL


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig8_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig8_HTML.jpg)


    **Figure 9-8** Training a face swapping model


    1. With the software open, select the `Train` tab, as shown in Figure [9-8](#502181_1_En_9_Chapter.xhtml#Fig8).


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig9_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig9_HTML.jpg)


    **Figure 9-9** Later stages of model training using `Villan`


    2. The first thing we will do is set the `Input A` and `Input B` fields to the
    folders where we have the extracted, sorted, and trimmed faces. Figure [9-8](#502181_1_En_9_Chapter.xhtml#Fig8)
    shows an example using Will Ferrell as `Input A` and Eugene Levy with glasses
    as `Input B`. Care was taken to remove images of Will Ferrell with a mustache
    made famous for his role in *Anchorman*. Faces of Eugene Levy without glasses
    were also removed. Deciding which set of faces to remove will depend on the source
    video you want to convert. If we want to convert images of Eugene Levy in *Schitt’s
    Creek*, we would likely not use his famous glasses look.


    3. Next, we need to set the `Alignment A` and `Alignment B` file sources. Again,
    these files will typically be in the original input folders.


    4. Setting the model in the `Model Dir` field is next, and it is best to use a
    new folder for this. This will be the folder where the trained models will be
    saved as training progresses.


    5. From here, we need to determine which model to use from the `Trainer` group
    box. The `Villan` model selected is considered the best but also requires the
    most horsepower for training. If your computer is lacking a supported GPU, then
    it may be better to start with the `Lightweight` or `Original` model.


    6. Depending on the model you choose, you may need tweak some of the various hyperparameters
    like “Batch size” found under the `Training` group box. When using the `Villian`
    model, which consumes a lot of GPU memory, you may need to reduce the batch size
    from the default of 16. You can modify other hyperparameters by accessing the
    settings from the main menu.


    7. After you are done filling in the basic required fields, you can start training
    by clicking the `Train` button at the bottom of the window. As training starts
    out, you will see as shown in Figure [9-8](#502181_1_En_9_Chapter.xhtml#Fig8)
    the use of masks over the faces to represent the areas the model is training to
    translate. You will also notice that the various model swaps from `Input A` to
    `Input B`, and the reverse is also shown. During model training, you will also
    notice the loss for each A-B and B-A translation being output in the log window.


    8. As mentioned previously, it may take a substantial amount of time to train
    a model accurately. While the model is training, you can view the loss progress
    by clicking the `Graph` tab found beside the `Preview` tab in the training window.


    9. You can at any point stop the training by clicking the `Stop` button and then
    move on to testing a conversion. Generally, you will want your model to display
    accurate translations, as shown in Figure [9-9](#502181_1_En_9_Chapter.xhtml#Fig9),
    which shows a later state of training, before continuing to create a deepfake
    video.


    When you are happy with the trained model, you can move on to converting your
    subject video into a deepfake. Of course, you don’t have to wait for the model
    to complete training, but realize partially trained models may generate poor results.
    The great thing about having a fully trained model for face swapping is that it
    can be used across multiple videos that feature the same subject. Keep in mind,
    though, that you need to account for actors appearing with makeup, facial hair,
    and glasses that are outside their normal appearance.


    With a sufficiently trained model, we can move on to the next section and learn
    how to generate a full deepfake video.'
  raw: '## Training a Face Swapping Model


    At this point you should now have your two sets of celebrity faces, A and B, that
    we will use for training. While it is possible to train directly against the faces
    you may want to swap for a video, it isn’t recommended as the faces are often
    too similar. Remember in generative modeling we want some amount of diversity
    in our data, and that means it’s best to use external images.


    Keeping in mind that the basic architecture of the models used in Faceswap are
    double autoencoders, you may be surprised at the required amount of training time.
    It can take up to a week or more to train some of the more sophisticated models
    like Villan. There are various other models you can try, depending on your hardware,
    including a lightweight version. However, as you likely realize by now, the quality
    and size of the model’s architecture will be a main determiner in the generated
    results.


    In the next exercise, we look at how to train a face swapping model. We have already
    done various similar trainings when we explored image to image paired and unpaired
    translations with GANs in Chapters [6](#502181_1_En_6_Chapter.xhtml) and [7](#502181_1_En_7_Chapter.xhtml).
    The Faceswap software makes the process of setting up training relatively easy,
    but it may take some time to master which model works well for your hardware and
    what results you ultimately want. We will continue where we left off from the
    previous exercise and start training a model in Exercise 9-6.


    EXERCISE 9-6\. TRAINING A FACE SWAPPING MODEL


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig8_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Training a face swapping model


    1.  With the software open, select the Train tab, as shown in Figure [9-8](#502181_1_En_9_Chapter.xhtml#Fig8).


