    \ In the decoder, you can see two `ConvTranspose2d` layers that output to a sigmoid\
    \ activation function.\n\n```\n    class ConvAutoencoder(nn.Module):\n    def\
    \ __init__(self):\n    super(ConvAutoencoder, self).__init__()\n    self.encoder\
    \ = nn.Sequential(\n    nn.Conv2d(3, 16, 3, padding=1),\n    nn.ReLU(True),\n\
    \    nn.MaxPool2d(2, 2),\n    nn.Conv2d(16, 4, 3, padding=1),\n    nn.ReLU(True),\n\
    \    nn.MaxPool2d(2, 2)\n    )\n    self.decoder = nn.Sequential(\n    nn.ConvTranspose2d(4,\
    \ 16, 2, stride=2),\n    nn.ReLU(True),\n    nn.ConvTranspose2d(16, 3, 2, stride=2),\n\
    \    nn.Sigmoid()\n    )\n    def forward(self, x):\n    x = self.encoder(x)\n\
    \    x = self.decoder(x)\n    return x\n    model = ConvAutoencoder()\n    print(model)\n\
    \    ```\n\n7.  Before training, we need to create our loss function and optimizer\
    \ with the following code:\n\n```\n    loss_fn = nn.MSELoss()\n    optimizer =\
    \ torch.optim.Adam(model.parameters(), lr=learning_rate)\n    ```\n\n8.  Finally,\
    \ we can move to the last cell, `training` . This code is the same as our previous\
    \ autoencoder exercise, but we only show it here for review:\n\n```\n    for epoch\
    \ in range(epochs):\n    train_loss = 0.0\n    for data in train_loader:\n   \
    \ images, labels = data\n    optimizer.zero_grad()\n    generated = model(images)\n\
    \    loss = loss_fn(generated, images)\n    loss.backward()\n    optimizer.step()\n\
    \    train_loss += loss.item()*images.size(0)\n    train_loss = train_loss/len(train_loader)\n\
    \    clear_output()\n    print(f'Epoch: {epoch+1} Training Loss: {train_loss:.3f}')\n\
    \    plot_images(generated.detach(),labels,16)\n    ```\n\nAs the code is running,\
    \ you will see output like Figure [2-9](#502181_1_En_2_Chapter.xhtml#Fig9). Figure\
    \ [2-9](#502181_1_En_2_Chapter.xhtml#Fig9) shows the training transition for `ConvAutoencoder`.\
    \ Notice how the images now look more blocky than fuzzy with the images being\
    \ more a collection of recognizable features than fuzzy outlines. Because of the\
    \ size of the input images, we are somewhat limited to how well we can apply convolution\
    \ in this exercise. In later chapters and exercises, we will see various configurations\
    \ of CNN layers.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig9_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9\n\nConvolutional autoencoder training on CIFAR10\n\nYou can see that\
    \ we could approach limits to the detail we use with convolution, which has more\
    \ to do with the localized feature extraction. Localized feature extraction limits\
    \ the layer to extracting features in blocks. In later chapters, we will look\
    \ at other methods that can alleviate issues like these.\n\nAutoencoders use a\
    \ form of learning called *unsupervised* since the model does not depend on image\
    \ labels to rebuild or regenerate the images. However, the model still needs an\
    \ image as a sample to encode and then decode from. What we want to explore next\
    \ is how we can generate images from a random latent space by using adversarial\
    \ learning."
  trans: "\n# 卷积自编码器\n\n卷积不仅能帮助我们识别图像中的特征，还能反过来帮助我们生成特征。在之前的自编码器练习中，你可以清晰地看到图像是如何基于逐像素表示构建起来的。\n\
    \n请再次查看图 2-3，你会看到图像或特征周围存在模糊的轮廓；这是我们应用的生成类型的典型特征。毕竟，我们在第一个自编码器中所做的只是逐像素比较，因此我们最多只能期望得到像素值的平均值，这反过来导致了图像中的模糊区域。\n\
    \n为了提取并生成特征，我们将升级上次使用的普通自编码器，使其能够处理卷积操作。作为进一步的演示，我们还将把基础数据集升级为 CIFAR10。CIFAR 数据集由\
    \ 28×28 的彩色图像组成，分为十个类别，从飞机到猫狗等。\n\n图 2-8 展示了 CIFAR10 数据集中的一些示例图像及其对应的标签，该图由我们接下来的练习生成。在练习\
    \ 2-3 中，我们将升级普通自编码器，使其使用卷积来提取和学习如何生成特征。\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig8_HTML.jpg](img/502181_1_En_2_Fig8_HTML.jpg)\n\
    \n图 2-8\n\nCIFAR10 数据集中的示例图像\n\n## 练习 2-3. 在 CIFAR10 上实现卷积自编码器\n\n1.  从项目的 GitHub\
    \ 站点打开 `GEN_2_conv_autoencoder.ipynb` 笔记本。从菜单中选择“运行时” ➤ “全部运行”来运行整个工作表。如果不确定如何访问源代码，请查看附录\
    \ B。\n\n2.  查看导入部分的顶部单元格，然后转到加载数据的单元格。在本练习中，我们从 `torchvision` 模块中拉取 CIFAR10 数据集。请注意，这里我们仅使用默认的张量进行数据转换。\n\
    \n```\n    transform = transforms.ToTensor()\n    train_data = datasets.CIFAR10(root='data',\
    \ train=True,\n    download=True, transform=transform)\n    test_data = datasets.CIFAR10(root='data',\
    \ train=False,\n    download=True, transform=transform)\n```\n\n3.  接下来，我们设置超参数，并为测试集和训练集实例化\
    \ `DataLoader`。\n\n```\n    batch_size = 64\n    epochs = 100\n    learning_rate\
    \ = 1e-3\n    train_loader = torch.utils.data.DataLoader(train_data,\n    batch_size=batch_size,\
    \ shuffle=True)\n    test_loader = torch.utils.data.DataLoader(test_data,\n  \
    \  batch_size=batch_size, shuffle=True)\n```\n\n4.  从这里开始，我们再次创建一些用于渲染图像集的图像显示函数。我们还为标签提供了文本，以便我们能够标记数据集图像。函数\
    \ `plot_images` 用于渲染一个带有标签的图像网格。在该函数的底部，有一些定时代码，这些代码需要在笔记本中用于训练期间的渲染。这些代码不会影响渲染，只是暂停训练代码足够长的时间，以便将图像输出到笔记本。\n\
    \n```\n    def imshow(img):\n    plt.imshow(np.transpose(img, (1, 2, 0)))  # 从张量图像转换\n\
    \    # 指定图像类别\n    classes = ['airplane', 'automobile', 'bird', 'cat', 'deer',\n\
    \    'dog', 'frog', 'horse', 'ship', 'truck']\n    def plot_images(images, labels,\
    \ no):\n    rows = int(math.sqrt(no))\n    plt.ion()\n    fig = plt.figure(figsize=(rows*2,\
    \ rows*2))\n    for idx in np.arange(no):\n    ax = fig.add_subplot(rows, no/rows,\
    \ idx+1, xticks=[], yticks=[])\n    imshow(images[idx])\n    ax.set_title(classes[labels[idx]])\n\
    \    time.sleep(0.1)\n    plt.pause(0.0001)\n```\n\n5.  创建好辅助函数后，我们可以使用以下代码生成图\
    \ 2-8：\n\n```\n    dataiter = iter(train_loader)\n    images, labels = dataiter.next()\n\
    \    images = images.numpy() # 将图像转换为 numpy 以便显示\n    plot_images(images,labels,25)\n\
    ```\n\n6.  接下来是 `ConvAutoencoder` 类，它是对我们之前 `Autoencoder` 的升级。在这个类中，我们可以看到线性层已被替换为\
    \ `Conv2d` 层。我们还可以看到新增了一种名为 `MaxPool2d` 或池化层的层类型。池化层用于收集相似特征，是网络训练中的一种效率提升手段。在解码器模型中，我们可以看到使用了\
    \ `ConvTranspose2d` 层。卷积转置层是卷积的逆操作，它们不是提取特征，而是生成学习到的特征。在解码器中，你可以看到两个 `ConvTranspose2d`\
    \ 层，其输出连接到一个 sigmoid 激活函数。\n\n```\n    class ConvAutoencoder(nn.Module):\n   \
    \ def __init__(self):\n    super(ConvAutoencoder, self).__init__()\n    self.encoder\
    \ = nn.Sequential(\n    nn.Conv2d(3, 16, 3, padding=1),\n    nn.ReLU(True),\n\
    \    nn.MaxPool2d(2, 2),\n    nn.Conv2d(16, 4, 3, padding=1),\n    nn.ReLU(True),\n\
    \    nn.MaxPool2d(2, 2)\n    )\n    self.decoder = nn.Sequential(\n    nn.ConvTranspose2d(4,\
    \ 16, 2, stride=2),\n    nn.ReLU(True),\n    nn.ConvTranspose2d(16, 3, 2, stride=2),\n\
    \    nn.Sigmoid()\n    )\n    def forward(self, x):\n    x = self.encoder(x)\n\
    \    x = self.decoder(x)\n    return x\n    model = ConvAutoencoder()\n    print(model)\n\
    ```\n\n7.  在训练之前，我们需要使用以下代码创建损失函数和优化器：\n\n```\n    loss_fn = nn.MSELoss()\n  \
    \  optimizer = torch.optim.Adam(model.parameters(), lr=learning_rate)\n```\n\n\
    8.  最后，我们可以转到最后一个单元格 `training`。这段代码与我们之前的自编码器练习相同，但这里展示出来以供回顾：\n\n```\n    for\
    \ epoch in range(epochs):\n    train_loss = 0.0\n    for data in train_loader:\n\
    \    images, labels = data\n    optimizer.zero_grad()\n    generated = model(images)\n\
    \    loss = loss_fn(generated, images)\n    loss.backward()\n    optimizer.step()\n\
    \    train_loss += loss.item()*images.size(0)\n    train_loss = train_loss/len(train_loader)\n\
    \    clear_output()\n    print(f'Epoch: {epoch+1} Training Loss: {train_loss:.3f}')\n\
    \    plot_images(generated.detach(),labels,16)\n```\n\n随着代码的运行，你将看到类似图 2-9 的输出。图\
    \ 2-9 展示了 `ConvAutoencoder` 的训练过程。请注意，现在的图像看起来更加块状而非模糊，图像更像是可识别特征的集合，而不是模糊的轮廓。由于输入图像的大小限制，我们在本练习中应用卷积的效果受到一定限制。在后面的章节和练习中，我们将看到\
    \ CNN 层的各种配置。\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig9_HTML.jpg](img/502181_1_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9\n\n在 CIFAR10 上训练卷积自编码器\n\n你可以看到，我们可能会接近卷积所能处理的细节极限，这更多与局部特征提取有关。局部特征提取限制了层只能以块为单位提取特征。在后面的章节中，我们将研究其他可以缓解此类问题的方法。\n\
    \n自编码器使用一种称为*无监督*的学习形式，因为模型不依赖图像标签来重建或再生图像。然而，模型仍然需要一个图像作为样本来进行编码和解码。接下来我们要探索的是，如何通过对抗学习从随机潜在空间中生成图像。\n"
- fmt: "# Generative Adversarial Networks\n\nGenerative adversarial networks have\
    \ been around for only a short time. GANs are similar to autoencoders in that\
    \ they comprise two models, but instead of an encoder and decoder, they use a\
    \ discriminator and generator.\n\nFigure [2-10](#502181_1_En_2_Chapter.xhtml#Fig10)\
    \ shows the architecture of a GAN. An analogy we often use to help describe the\
    \ GAN process is that of the interaction between an art verifier and the art forger.\
    \ In this scenario, the art forger works to create a convincing fake piece of\
    \ art the verifier will consider to be real. The art verifier learns to understand\
    \ what is real by looking at real art. In turn, the forger learns by creating\
    \ pieces of art and then testing them against the verifier.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig10_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10\n\nGAN architecture\n\nIn a GAN, the art forger is the generator.\
    \ The generator generates images or artwork from a random latent space we define\
    \ as `Z`. After an image is generated, it is shown to the verifier or discriminator.\
    \ The discriminator learns by looking at samples of real images as well as the\
    \ fake images generated by the discriminator.\n\nThe discriminator determines\
    \ loss by analyzing the real and fake images. If it thinks a real image is fake,\
    \ it outputs higher loss back to itself. Likewise, if the generator passes a fake\
    \ image as real, it returns a higher loss back to the discriminator but a lower\
    \ loss to itself, the generator. Both models learn in tandem to get better at\
    \ either generating images or determining what images are real or fake.\n\nWhile\
    \ the architecture of the GAN may seem overly complex, it is just the autoencoder\
    \ architecture split apart and reversed, where the generator is the same as the\
    \ decoder and the discriminator resembles the encoder. Thus, the discriminator\
    \ is like the encoder, but instead of outputting an encoding, it just outputs\
    \ real or fake. On the other side, the generator consumes a random latent space\
    \ of data, resembling nothing, and learns to create new images that can be passed\
    \ off as real to the discriminator.\n\nIn Exercise 2-4, we are going to build\
    \ a vanilla or base GAN. With this base form of the GAN, we will learn how to\
    \ generate digits from the MNIST handwritten dataset. We won’t construct a GAN\
    \ class but instead create two classes for the generator and discriminator and\
    \ then write code to train them independently as well.\n\n## EXERCISE 2-4. BUILDING\
    \ A VANILLA GAN\n\n1.  Open the `GEN_2_vanilla_gan.ipynb` notebook from the project’s\
    \ GitHub site. From the menu, select Runtime ➤ Run All to run the entire sheet.\n\
    \n2.  Skipping the `imports` and the `imshow` helper function at the top of the\
    \ sheet, we come to the data loading and transformation code. All of this code\
    \ should be review at this point.\n\n```\n    transform = transforms.Compose([\n\
    \    transforms.ToTensor(),\n    transforms.Normalize((0.5,),(0.5,))\n    ])\n\
    \    to_image = transforms.ToPILImage()\n    trainset = MNIST(root='./data/',\
    \ train=True, download=True, transform=transform)\n    train_loader = DataLoader(trainset,\
    \ batch_size=100, shuffle=True)\n    device = 'cuda'\n```\n\n3.  Next, we come\
    \ to the `Generator` class. The generator serves the same roles as the decoder\
    \ in an autoencoder. The key difference with a generator is the input is just\
    \ random noise. It may help to think of this random noise as a random thought\
    \ vector. Other than that, the code is quite similar to the decoder we have seen\
    \ before. The size of this random vector is defined by `latent_dim` in the inputs.\
    \ You may also notice the use of a new activation function `LeakyReLU`. This function\
    \ allows for some amount of negative leakage through a function rather than cutting\
    \ values off at 0. For the forward/prediction function, you can see the outputs\
    \ are reshaped to a `1,28,28` tensor of the image.\n\n```\n    class Generator(nn.Module):\n\
    \    def __init__(self, latent_dim=128, output_dim=784):\n    super(Generator,\
    \ self).__init__()\n    self.latent_dim = latent_dim\n    self.output_dim = output_dim\n\
    \    self.generator = nn.Sequential(\n    nn.Linear(self.latent_dim, 256),\n \
    \   nn.LeakyReLU(0.2),\n    nn.Linear(256, 512),\n    nn.LeakyReLU(0.2),\n   \
    \ nn.Linear(512, 1024),\n    nn.LeakyReLU(0.2),\n    nn.Linear(1024, self.output_dim),\n\
    \    nn.Tanh()\n    )\n    def forward(self, x):\n    x = self.generator(x)\n\
    \    x = x.view(-1, 1, 28, 28)\n    return x\n```\n\n4.  After that comes the\
    \ discriminator, which resembles the encoder from an autoencoder, with the difference\
    \ being the output is only two classes, real or fake. In the forward/predict function,\
    \ the input is reshaped from a 28×28 image to an input vector of size 784. Other\
    \ than that, the architecture of the model resembles a typical classifier, which\
    \ is what it also is. In fact, a fully trained discriminator can have excellent\
    \ applications in classifying data as real or fake for other applications outside\
    \ of GANs, perhaps being able to determine if some input image is of a particular\
    \ type based on the data fed the GAN. You could therefore train a discriminator\
    \ on faces, and it would learn to recognize a real or fake face.\n\n```\n    class\
    \ Discriminator(nn.Module):\n    def __init__(self, input_dim=784, output_dim=1):\n\
    \    super(Discriminator, self).__init__()\n    self.input_dim = input_dim\n \
    \   self.output_dim = output_dim\n    self.discriminator = nn.Sequential(\n  \
    \  nn.Linear(self.input_dim, 1024),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n\
    \    nn.Linear(1024, 512),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n   \
    \ nn.Linear(512, 256),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n    nn.Linear(256,\
    \ self.output_dim),\n    nn.Sigmoid()\n    )\n    def forward(self, x):\n    x\
    \ = x.view(-1, 784)\n    x = self.discriminator(x)\n    return x\n```\n\n5.  With\
    \ the classes built, we can move on to instantiate them this time with GPU (`cuda`)\
    \ support for more performant training. In addition, we will create the optimizer\
    \ and loss function.\n\n```\n    generator = Generator()\n    discriminator =\
    \ Discriminator()\n    generator.to(device)\n    discriminator.to(device)\n  \
    \  g_optim = optim.Adam(generator.parameters(), lr=2e-4)\n    d_optim = optim.Adam(discriminator.parameters(),\
    \ lr=2e-4)\n    g_losses = []\n    d_losses = []\n    loss_fn = nn.BCELoss()\n\
    ```\n\n6.  We also need to create some helper functions. The first function `noise`\
    \ generates the random noise we input into the generator. The second function\
    \ `make_ones` is a helper to mark the batch as real, with 1s. Then the third function,\
    \ `make_zeros`, does the opposite and marks the batch of images with a zero for\
    \ fake.\n\n```\n    def noise(n, n_features=128):\n    return Variable(torch.randn(n,\
    \ n_features)).to(device)\n    def make_ones(size):\n    data = Variable(torch.ones(size,\
    \ 1))\n    return data.to(device)\n    def make_zeros(size):\n    data = Variable(torch.zeros(size,\
    \ 1))\n    return data.to(device)\n```\n\n7.  Then we add an extra helper function\
    \ to train the discriminator. Recall that the discriminator is trained on both\
    \ the real images as well as the fake images from the generator. Then notice that\
    \ we pass the real data into the discriminator and use that to predict the real\
    \ loss, `loss_real`. That loss is then backpropagated through the discriminator.\
    \ After that, we test a set of fake images and pass that loss backward to the\
    \ network. Then we return the combined output of both losses. You should also\
    \ notice the use of the functions `make_ones` and `make_zeros` being used to label\
    \ the data as real (`1`) or fake (`0`)."
