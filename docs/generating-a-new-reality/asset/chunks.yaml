  trans: "\n6. 在中间层之后，我们进入上采样阶段：将中间层的输出与`down3`通过`torch.cat`合并，然后传入`up3`。此过程持续进行，使得\
    \ `middle => out`，`(out, down3) -> up3 => out`，`(out, down2)-> up2 => out`，`(out,\
    \ down1) -> up1 => out`。本质上，在向上传递的每一轮中，我们都会将结果与对应的下采样层合并。这自然会在上采样时复用下采样层中已训练好的特征。\n\
    \n7. 此时，请尝试修改一些超参数，观察这对模型输出有何影响。\n\n8. 尝试修改 UNet 的架构。试着改变每个超级层作为输入或输出使用的通道数。务必考虑在通过上采样层时合并操作的影响。\n\
    \n虽然 U 型网络仍然通过将输入循环回模型来使用卷积提取特征，但我们可以训练出更好的生成器，使其利用相同的已学习特征提取方法。在本章的剩余部分，我们将探讨\
    \ UNet 如何增强我们的生成器，尤其是在图像到图像的生成任务中。下一节，我们将研究一组使用 UNet 进行图像到图像学习的新型 GAN。\n\n## 使用\
    \ Pix2Pix 进行图像翻译\n\n通过使用 UNet 进行图像分割或翻译，我们看到了模型如何学习从一种图像形式到另一种形式的转换。我们研究了 UNet\
    \ 如何通过成对的训练图像来学习分割或掩码图像。Pix2Pix GAN 通过引入对抗训练，将这一过程向前推进了一步。\n\n通过 GAN 引入对抗训练，我们可以增强在单个\
    \ UNet 模型中使用的损失函数，并进一步分离对损失的解释。这不仅使我们能够进行基于成对基础的训练比较来计算损失，还能使用第二个指标——判别器损失——来确保转换/生成的图像更接近其训练配对图像。参见练习\
    \ 5-3。\n\n**练习 5-3. 使用 Pix2Pix 进行图像翻译**\n\n1. 从 GitHub 项目站点打开 `GEN_5_Pix2Pix.ipynb`\
    \ 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2. 如果尚未运行，请选择 **运行时** ➤ **全部运行** 来运行整个笔记本。首先要注意的是，`Hyperparameter`\
    \ 部分现在提供了使用 Colab 表单配置的替代训练数据集。对于图像到图像的示例，我们提供了三个数据集。`maps` 代表同一区域街道和卫星图像的地图瓦片配对。`facades`\
    \ 数据集包含建筑外观照片，以及显示代表区域色块的立面配对图。第三个数据集 `cityscapes` 类似于 `facades`，但显示的是带有注释的街道配对视图，而非建筑。\n\
    \n3. 我们可以跳过这段代码的大部分主要部分，因为现在你可能已经熟悉了。向下滚动到生成器/判别器块定义处。这段代码的开头展示了两个用于辅助上采样和下采样的\
    \ UNet 类。\n\n```\nclass UNetDown(nn.Module):\n    def __init__(self, in_size,\
    \ out_size, normalize=True, dropout=0.0):\n        super(UNetDown, self).__init__()\n\
    \        layers = [nn.Conv2d(in_size, out_size, 4, 2, 1, bias=False)]\n      \
    \  if normalize:\n            layers.append(nn.InstanceNorm2d(out_size))\n   \
    \     layers.append(nn.LeakyReLU(0.2))\n        if dropout:\n            layers.append(nn.Dropout(dropout))\n\
    \        self.model = nn.Sequential(*layers)\n    def forward(self, x):\n    \
    \    return self.model(x)\n\nclass UNetUp(nn.Module):\n    def __init__(self,\
    \ in_size, out_size, dropout=0.0):\n        super(UNetUp, self).__init__()\n \
    \       layers = [\n            nn.ConvTranspose2d(in_size, out_size, 4, 2, 1,\
    \ bias=False),\n            nn.InstanceNorm2d(out_size),\n            nn.ReLU(inplace=True),\n\
    \        ]\n        if dropout:\n            layers.append(nn.Dropout(dropout))\n\
    \        self.model = nn.Sequential(*layers)\n    def forward(self, x, skip_input):\n\
    \        x = self.model(x)\n        x = torch.cat((x, skip_input), 1)\n      \
    \  return x\n```\n\n4. 你可能会注意到 `UNetUp` 类中使用了 `ConvTranspose2D`，这是用于上采样部分的。请记住，对应的下采样超级层会如\
    \ `forward` 函数所示进行合并。\n\n5. 然后我们可以向下滚动，查看 `GeneratorUNet` 模型中如何使用 UNet 超级层。\n\n\
    ```\nclass GeneratorUNet(nn.Module):\n    def __init__(self, in_channels=3, out_channels=3):\n\
    \        super(GeneratorUNet, self).__init__()\n        self.down1 = UNetDown(in_channels,\
    \ 64, normalize=False)\n        self.down2 = UNetDown(64, 128)\n        self.down3\
