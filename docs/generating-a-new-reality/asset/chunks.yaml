    \                     img_size=32,\n                     channels=1,\n       \
    \              sample_interval=400)\nprint(hp.lr)\n```\n\n3.  `Hyperparameters`\
    \ 是一个字典辅助类，允许我们在一个地方定义所有超参数，可以通过字典或像所示那样的键值对列表进行初始化。然后，我们可以使用名称 `hp` 加上参数来引用超参数，如\
    \ `print(hp.lr)` 行所示。\n\n4.  下一个代码块包含我们之前查看过的实用代码。之后是一个新的 `Generator` 定义。\n\n\
    ```\nclass Generator(nn.Module):\n    def __init__(self):\n        super(Generator,\
    \ self).__init__()\n        self.init_size = hp.img_size // 4\n        self.l1\
    \ = nn.Sequential(nn.Linear(hp.latent_dim, 128 * self.init_size ** 2))\n     \
    \   self.conv_blocks = nn.Sequential(\n            nn.BatchNorm2d(128),\n    \
    \        nn.Upsample(scale_factor=2),\n            nn.Conv2d(128, 128, 3, stride=1,\
    \ padding=1),\n            nn.BatchNorm2d(128, 0.8),\n            nn.LeakyReLU(0.2,\
    \ inplace=True),\n            nn.Upsample(scale_factor=2),\n            nn.Conv2d(128,\
    \ 64, 3, stride=1, padding=1),\n            nn.BatchNorm2d(64, 0.8),\n       \
