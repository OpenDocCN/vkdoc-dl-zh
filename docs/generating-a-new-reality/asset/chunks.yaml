    \ the forward or predict function, we can see the encoder model being fed the\
    \ image, encoding it, and then passing the output to the decoder that rebuilds\
    \ the image.\n\n```\n    class Autoencoder(nn.Module):\n    def __init__(self):\n\
    \    super(Autoencoder, self).__init__()\n    self.encoder = nn.Sequential(\n\
    \    nn.Linear(28 * 28, 128),\n    nn.ReLU(True),\n    nn.Linear(128, 64),\n \
    \   nn.ReLU(True), nn.Linear(64, 12), nn.ReLU(True), nn.Linear(12, 3))\n    self.decoder\
    \ = nn.Sequential(\n    nn.Linear(3, 12),\n    nn.ReLU(True),\n    nn.Linear(12,\
    \ 64),\n    nn.ReLU(True),\n    nn.Linear(64, 128),\n    nn.ReLU(True), nn.Linear(128,\
    \ 28 * 28), nn.Tanh())\n    def forward(self, x):\n    x = self.encoder(x)\n \
    \   x = self.decoder(x)\n    return x\n    ```\n\n2.  In the next cell, we instantiate\
    \ the model and construct the loss function and optimizer.\n\n```\n    model =\
    \ Autoencoder()\n    loss_fn = nn.MSELoss()\n    optimizer = torch.optim.Adam(\n\
    \    model.parameters(), lr=learning_rate, weight_decay=1e-5)\n    ```\n\n3. \
    \ Now we can move on to the training code and where all the magic happens. Again,\
    \ we see the familiar double loop, looping through epochs and then data. Inside\
    \ that, we can see the data is extracted from the dataloader, but we ignore the\
    \ labels. We wrap up the images and feed them to the model to output the `y_pred`\
    \ or decoded output. Then we take the MSE loss for each pixel in the image. Where\
    \ the differences in pixel values are the loss, we train back to the network.\
    \ The rest of the code resets the gradient and then pushes back the loss through\
    \ the network.\n\n```\n    for epoch in range(epochs):\n    for data in dataloader:\n\
    \    x_img, _ = data\n    x_img = x_img.view(x_img.size(0), -1)\n    x_img = Variable(x_img)\n\
    \    # ===================forward=====================\n    y_pred = model(x_img)\n\
    \    loss = loss_fn(y_pred, x_img)\n    # ===================backward====================\n\
    \    optimizer.zero_grad()\n    loss.backward()\n    optimizer.step()\n    # ===================log========================\n\
    \    clear_output()\n    print(f'epoch [{epoch}/{epochs}], loss:{loss.data:.4f}')\n\
    \    pic = to_img(y_pred.cpu().data)\n    imshow(make_grid(pic))\n    ```\n\n\
    4.  As you run the training code cell, you will see how the model improves over\
    \ time. Figure [2-3](#502181_1_En_2_Chapter.xhtml#Fig3) shows the difference in\
    \ the first training epoch to the last.\n\nAt this stage, we have an autoencoder\
    \ that can encode an image of some piece of clothing down to vector representation\
    \ of size 3\\. That latent or hidden representation of the image may also be referred\
    \ to as an *encoding* or *embedding* . We can use that learned encoding to represent\
    \ characteristics of the images that make them unique, and the best part is the\
    \ machine learns this on its own. In Chapter [3](#502181_1_En_3_Chapter.xhtml),\
    \ we will look at more ways of understanding how these encodings can be visualized.\n\
    \nOur focus at this stage is to understand how an image can be decomposed into\
    \ some lower representation and then rebuilt using unsupervised learning. That\
    \ is, at no point did we label the images, and the model was learned entirely\
    \ by understanding the reconstruction of images. This is an immensely powerful\
    \ concept, and we use it throughout deep learning.\n\nThe process of learning\
    \ to encode and decode data reduces dimensionality in data to understand how similar\
    \ words are in natural language processing. It has also been extended to machine\
    \ translation and text generation using transformers. Autoencoders are often the\
    \ first demonstration of combining multiple forms of network architecture to solve\
    \ some tasks.\n\nWhile we were able to achieve some nice results with the networks\
    \ we have used thus far, we need to discover new improvements to network layers\
    \ that allow us to extract features from data. In the next section, we learn how\
    \ using a convolutional filter can extract features in images and other data."
  trans: "\n```python\nimg_transform = transforms.Compose([\n    transforms.ToTensor(),\n\
    \    transforms.Normalize([0.5], [0.5])\n])\ndataset = mnist('./data', download=True,\
    \ transform=img_transform)\ndataloader = DataLoader(dataset, batch_size=batch_size,\
    \ shuffle=True)\ndataiter = iter(dataloader)\nimages, labels = dataiter.next()\n\
    imshow(make_grid(images, nrow=8))\n```\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig3_HTML.jpg](img/502181_1_En_2_Fig3_HTML.jpg)\n\
    \n**图 2-3** 训练自编码器\n\n1.  接下来，我们为自编码器创建一个类。在这个类中，我们构建两个模型：编码器和解码器。编码器将输入数据从大小为\
    \ 784（28×28）的向量缩减到 128 个输入神经元，然后进一步缩减到 64、12，最后输出一个大小为 3 的向量。解码器接收来自编码器的大小为 3\
    \ 的向量作为输入，然后将其逐步扩展至 12、64、128，最终输出 784 个值，解码器的完整输出应与输入图像匹配。在 `forward` 或预测函数中，我们可以看到编码器模型接收图像、对其进行编码，然后将输出传递给解码器，由解码器重建图像。\n\
    \n```python\nclass Autoencoder(nn.Module):\n    def __init__(self):\n        super(Autoencoder,\
    \ self).__init__()\n        self.encoder = nn.Sequential(\n            nn.Linear(28\
    \ * 28, 128),\n            nn.ReLU(True),\n            nn.Linear(128, 64),\n \
    \           nn.ReLU(True), nn.Linear(64, 12), nn.ReLU(True), nn.Linear(12, 3))\n\
    \        self.decoder = nn.Sequential(\n            nn.Linear(3, 12),\n      \
    \      nn.ReLU(True),\n            nn.Linear(12, 64),\n            nn.ReLU(True),\n\
    \            nn.Linear(64, 128),\n            nn.ReLU(True), nn.Linear(128, 28\
    \ * 28), nn.Tanh())\n\n    def forward(self, x):\n        x = self.encoder(x)\n\
    \        x = self.decoder(x)\n        return x\n```\n\n2.  在下一个单元格中，我们实例化模型，并构建损失函数和优化器。\n\
    \n```python\nmodel = Autoencoder()\nloss_fn = nn.MSELoss()\noptimizer = torch.optim.Adam(\n\
    \    model.parameters(), lr=learning_rate, weight_decay=1e-5)\n```\n\n3.  现在我们可以进入训练代码部分，所有神奇的事情都发生在这里。我们再次看到熟悉的双重循环，遍历\
    \ epochs 和数据。在循环内部，我们可以看到数据从 `dataloader` 中提取，但忽略了标签。我们将图像包装起来并输入模型，以输出 `y_pred`\
    \ 或解码后的输出。然后，我们计算图像中每个像素的 MSE 损失。像素值的差异即为损失，我们将其反向传播到网络。其余代码重置梯度，然后将损失通过网络反向传播。\n\
    \n```python\nfor epoch in range(epochs):\n    for data in dataloader:\n      \
    \  x_img, _ = data\n        x_img = x_img.view(x_img.size(0), -1)\n        x_img\
    \ = Variable(x_img)\n        # ===================forward=====================\n\
    \        y_pred = model(x_img)\n        loss = loss_fn(y_pred, x_img)\n      \
    \  # ===================backward====================\n        optimizer.zero_grad()\n\
    \        loss.backward()\n        optimizer.step()\n        # ===================log========================\n\
    \        clear_output()\n        print(f'epoch [{epoch}/{epochs}], loss:{loss.data:.4f}')\n\
    \        pic = to_img(y_pred.cpu().data)\n        imshow(make_grid(pic))\n```\n\
    \n4.  当你运行训练代码单元格时，你会看到模型如何随时间逐步改进。图 2-3 展示了第一个训练周期与最后一个训练周期之间的差异。\n\n至此，我们拥有了一个自编码器，它可以将某件衣物的图像编码为大小为\
    \ 3 的向量表示。这种图像的潜在或隐藏表示也可以称为*编码*或*嵌入*。我们可以利用这种学习到的编码来表示使图像独一无二的特征，而最棒的是，机器可以自行学习这些特征。在第\
    \ 3 章中，我们将探讨更多可视化这些编码的方法。\n\n我们当前的重点是理解如何将图像分解为更低维的表示，然后通过无监督学习进行重建。也就是说，我们从未对图像进行标注，模型完全是通过理解图像的重建过程来学习的。这是一个极其强大的概念，我们在整个深度学习过程中都会用到它。\n\
    \n学习编码和解码数据的过程可以降低数据的维度，从而理解自然语言处理中单词之间的相似性。这一过程也已扩展到使用 Transformer 进行机器翻译和文本生成。自编码器通常是展示如何结合多种网络架构来解决某些任务的第一个示例。\n\
    \n尽管我们通过目前使用的网络取得了一些不错的结果，但我们还需要发现网络层的新改进，以便从数据中提取特征。在下一节中，我们将学习如何使用卷积滤波器从图像和其他数据中提取特征。\n"
- fmt: "# Extracting Features with Convolution\n\nUp until 2012, image analysis with\
    \ neural networks was done by flattening an image to a single one-dimensional\
    \ (1D) vector. We have done this already several times with MNIST digits and fashion\
    \ datasets. In those cases, we flattened the data from a 28×28-pixel image to\
    \ a flat vector of 784 pixels. Figure [2-4](#502181_1_En_2_Chapter.xhtml#Fig4)\
    \ shows how an image is flattened in deep learning.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig4_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig4_HTML.jpg)\n\
    \n**Figure 2-4** Flattening an image to a 1D vector\n\nIn Figure [2-4](#502181_1_En_2_Chapter.xhtml#Fig4)\
    \ we can see how the MNIST digit of 28×28 pixels is flattened into a single layer.\
    \ This single layer of inputs is then fed into the neural network. From this,\
    \ our network can classify or rebuild the representation well, but not perfectly.\
    \ In fact, the more complex the image, the more difficult this becomes. It was\
    \ also a major limitation of deep learning since it often missed obvious image\
    \ features.\n\nThat all changed in 2012 when a team led by Geoffrey Hinton won\
    \ the ImageNet challenge by a wide margin. ImageNet is a labeled classification\
    \ dataset of 1.5 million images in 1,000 classes. The challenge was being able\
    \ to classify this dataset better than other models. Hinton’s team used a new\
    \ network type called a *convolutional neural network* (CNN).\n\nCNN deep learning\
    \ systems describe a type of network layer that can extract like or similar features\
    \ from data using a process called *convolutional filtering*. In convolutional\
    \ filtering, a patch or kernel of some dimension is passed over an image. As the\
    \ kernel moves across the image, it uses a training set of weights to scale the\
    \ values of the image as a type of filtering process.\n\nFigure [2-5](#502181_1_En_2_Chapter.xhtml#Fig5)\
    \ shows the convolutional filtering process. In the figure we can see the kernel\
    \ patch being slid across the image. As the filter is passed over the image, it\
    \ multiplies the weights of the kernel with the pixel values of the image. This\
    \ has the effect of filtering the image. The output of this filtering is shown\
    \ in the next image. In this case, the filter may have been similar to an edge\
    \ detection filter.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig5_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig5_HTML.jpg)\n\
    \n**Figure 2-5** Convolutional filtering process\n\nAt the bottom of Figure [2-5](#502181_1_En_2_Chapter.xhtml#Fig5),\
    \ you can see how a single kernel filter with weights is like a single neuron/perceptron\
    \ in a network layer, where each weight in the neuron is a value in the kernel.\
    \ In the figure, we can also see how successive layers of convolution can be applied\
    \ in sequence. This has the effect of filtering the extracted filtered features\
    \ from the extracted.\n\nThis successive filtering process with convolutional\
    \ layers has the effect of identifying key features in images, like a dog’s ear\
    \ or a cat’s eyes. After all the features of the image or other data is extracted,\
    \ the data is again flattened and fed into linear network layers.\n\nFor Exercise\
    \ 2-2 we are going to revisit Exercise 1-5 and explore the difference using CNN\
    \ layers will have. We are going to add a couple of two-dimensional (2D) convolutional\
    \ layers for image extraction. From this, we can make comparisons against our\
    \ previous exercise and get a sense for how much feature extraction improves performance.\n\
    \n## EXERCISE 2-2. CONVOLUTIONAL NETWORKS FOR CLASSIFICATION\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig6_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig6_HTML.jpg)\n\
    \n**Figure 2-6** PyTorch CNN layer configuration\n\n1. Open the `GEN_2_classify_cnn.ipynb`\
    \ notebook from the project’s GitHub site. If you are unsure on how to access\
    \ the source, check Appendix B.\n\n2. Open `GEN_1_classify_pytorch.ipynb` as well.\
    \ We want to run a side-by-side comparison.\n\n3. The code for both notebooks\
    \ is virtually identical except for the neural network model. For that reason,\
    \ we can omit reviewing most of the code.\n\n4. Run both notebooks by selecting\
    \ from the menu Runtime ➤ Run All. Keep both notebooks running as you review the\
    \ rest of the exercise.\n\n5. Scroll down to the `ConvNet` class in the CNN notebook\
    \ and study the code. Inside the `init` function of this class, you will see the\
    \ instantiation of two convolutional layers (`conv1` and `conv2`), two dropout\
    \ layers (`dropout1` and `dropout2`), and two linear layers (`fc1` and `fc2`).\
    \ Then we see in the forward function how the layers are all connected. Notice\
    \ the placement of the dropout layers and the linear layers as well.\n\n```\n\
    class ConvNet(nn.Module):\n    def __init__(self):\n        super(ConvNet, self).__init__()\n\
    \        self.conv1 = nn.Conv2d(1, 32, 3, 1)\n        self.conv2 = nn.Conv2d(32,\
    \ 64, 3, 1)\n        self.dropout1 = nn.Dropout2d(0.25)\n        self.dropout2\
    \ = nn.Dropout2d(0.5)\n        self.fc1 = nn.Linear(9216, 128)\n        self.fc2\
    \ = nn.Linear(128, 10)\n\n    def forward(self, x):\n        x = self.conv1(x)\n\
    \        x = F.relu(x)\n        x = self.conv2(x)\n        x = F.relu(x)\n   \
    \     x = F.max_pool2d(x, 2)\n        x = self.dropout1(x)\n        x = torch.flatten(x,\
    \ 1)\n        x = self.fc1(x)\n        x = F.relu(x)\n        x = self.dropout2(x)\n\
    \        x = self.fc2(x)\n        output = F.log_softmax(x, dim=1)\n        return\
    \ output\n```\n\n6. Notice how the inputs are defined into a `Conv2D` layer. Figure\
    \ [2-6](#502181_1_En_2_Chapter.xhtml#Fig6) shows how each input into `Conv2D`\
    \ is configured and defined for the layer. CNN layers consume channels of data,\
    \ where typically a black and white or grayscale image like MNIST has only one\
    \ channel. For color images we will break the image into red, green, and blue\
    \ color channels with their respective color values. We will explore more about\
    \ channels later.\n\n7. Look back at the `ConvNet` class code, and notice how\
    \ the input is a single channel that extracts 32 output channels. This is pushed\
    \ into a second `Conv2D` layer with 32 input channels and 64 output channels.\
    \ The output of this last layer of convolution creates 9,216 inputs when flattened\
    \ into the first linear layer. Then the second layer consumes those with 128 neurons\
    \ and outputs 10 classes.\n\nLet both examples run to completion, and you will\
    \ notice two things. The first is that our previous exercise runs much quicker,\
    \ and the second is the results with convolution are ten times better. Convolution\
    \ requires more parameters and thus more training time. These training times can\
    \ be dramatically reduced by using CUDA or a GPU. In later sections and chapters,\
    \ we will use GPU processing where applicable.\n\nIn the previous exercise, we\
    \ also used a new layer called `Dropout`. Dropout layers are special layers that\
    \ randomly turn off a percentage of neurons for each training iteration. The number\
    \ of random neurons turned off is set at the instantiation and is typically .2\
    \ to .5 or 20 to 50 percent. By turning off random neurons in each training pass,\
    \ the network has to shift to becoming more generalized and less specialized.\
    \ Dropout layers are the first cure we select if we diagnose a network as overfitting\
    \ or memorizing data points. (In Chapter [1](#502181_1_En_1_Chapter.xhtml) we\
    \ discussed over- and underfitting.)\n\nFigure [2-7](#502181_1_En_2_Chapter.xhtml#Fig7)\
    \ shows a visualization from the TensorSpace.js Playground at [`https://tensorspace.org/html/playground`](https://tensorspace.org/html/playground).\
    \ This is an excellent resource to look at and understand how convolution and\
    \ deep learning layers do what they do.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig7_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig7_HTML.jpg)\n\
    \n**Figure 2-7** TensorSpace.js Playground\n\nConvolutional layers can help us\
    \ classify but also can provide added benefit when doing generative modeling.\
    \ However, when we generate content with convolution, we must apply the opposite\
    \ of filtering called *transposition*. We will cover using CNN in autoencoders\
    \ with transposition in the next section."
