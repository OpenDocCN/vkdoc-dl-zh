- fmt: "# Understanding Residual Networks\n\nAs we saw in previous chapters and exercises,\
    \ we often need to increase the depth of our networks for better learning feature\
    \ extraction. However, as we have also learned, the deeper those network layers\
    \ became, the more problems arose such as exploding or vanishing gradients that\
    \ are often caused by feature over feature extraction.\n\nFeature over feature\
    \ extraction happens when convolutional network layers become too deep and, even\
    \ though they may be normalized, still create difficult to map latent surfaces.\
    \ The effect is the model over-emphasizes some features and ignores fewer less\
    \ common ones.\n\nWe have seen plenty examples of feature over feature extraction\
    \ in many GANs that use multiple convolutional layers. This can be identified\
    \ as the bright areas in regenerated images.\n\nResidual networks and blocks try\
    \ to overcome this feature over feature effect by allowing some layers to be skipped,\
    \ thus allowing the model to ignore layers that may be overemphasizing features.\
    \ ResNets do this by passing residual outputs from the top of the block to the\
    \ bottom after a convolutional process.\n\nFigure [6-1](#502181_1_En_6_Chapter.xhtml#Fig1)\
    \ shows a single residual block. In the figure, the inputs `x` come in and enter\
    \ the first weight layer and bypass it to the `+` node, the bottom. `F(x)` represents\
    \ the convolutional function applied to `x` using the weight layers. At the bottom\
    \ of the block, you can see that the output is `F(x) + x`, where `x` is the residuals\
    \ from the start of the block.\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig1_HTML.jpg](images/502181_1_En_6_Chapter/502181_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nA single residual block\n\nBy passing the residual inputs from\
    \ the top of the block to the bottom, we effectively reduce and normalize the\
    \ dependency on the weight layers. This in turn reduces exploding/vanishing gradients\
    \ caused by feature over feature extraction. Another benefit of this is the ability\
    \ to increase network depth significantly.\n\nFigure [6-2](#502181_1_En_6_Chapter.xhtml#Fig2)\
    \ shows a comparison of a 19-layer network, the reference VGG19, and ResNet152,\
    \ which is a residual network that uses 152 layers. Within the ResNet model, you\
    \ can see the skip connections between the residual convolution blocks. Consider\
    \ how deep ResNet152 is compared to the simple VGG19.\n\nVisual Geometry Group\
    \ (VGG) from Oxford University developed a set of standardized models that used\
    \ convolution. In VGG19 there are 19 layers, 16 convolution, and 3 linear flat\
    \ layers.\n\nWe can see how a residual block within a residual network works for\
    \ a simple classification problem by again looking at the fashion MNIST dataset.\
    \ This time we are going to build a simple model with a residual network to learn\
    \ how to classify fashion. Jump on to your computer and get ready to explore Exercise\
    \ 6-1.\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig2_HTML.jpg](images/502181_1_En_6_Chapter/502181_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nComparison of regular convolutional network and ResNet\n\n## EXERCISE\
    \ 6-1. RESIDUAL NETWORK CLASSIFIER\n\n1.  Open the `GEN_6_ResNet_classifier.ipynb`\
    \ notebook from the GitHub project site. If you are unsure how, then consult Appendix\
    \ B.\n\n2.  Run the whole notebook by selecting Runtime ➤ Run all. The bulk of\
    \ this notebooks code should be familiar. Therefore, we will focus only on the\
    \ new or important sections.\n\n3.  You can scroll down to the RESNET model block\
    \ and look at the first two helper functions. The first of these functions, `preprocess`,\
    \ is for swapping and setting up the tensors. The second is the `conv` function\
    \ that is a wrapper around creating a convolutional layer.\n\n```\n    def preprocess(x):\n\
    \    return x.view(-1, 1, 28, 28)\n    def conv(in_size, out_size, pad=1):\n \
    \   return nn.Conv2d(in_size, out_size, kernel_size=3, stride=2, padding=pad)\n\
    ```\n\n4.  Just below that is the definition for the `ResidualBlock` class. Remember,\
    \ a single residual block allows for the input residuals to bypass the training\
    \ layers and then get added in at the bottom with the skip connection.\n\n```\n\
    \    class ResBlock(nn.Module):\n    def __init__(self, in_size:int, hidden_size:int,\
    \ out_size:int, pad:int):\n    super().__init__()\n    self.conv1 = conv(in_size,\
    \ hidden_size, pad)\n    self.conv2 = conv(hidden_size, out_size, pad)\n    self.batchnorm1\
    \ = nn.BatchNorm2d(hidden_size)\n    self.batchnorm2 = nn.BatchNorm2d(out_size)\n\
    \    def convblock(self, x):\n    x = nn.functional.relu(self.batchnorm1(self.conv1(x)))\n\
    \    x = nn.functional.relu(self.batchnorm2(self.conv2(x)))\n    return x\n  \
    \  def forward(self, x): return x + self.convblock(x) # skip connection\n```\n\
    \n5.  Below that is where the `ResidualNetwork` class is constructed. Notice how\
    \ there are two `ResBlocks` residual blocks connected in sequence and the output\
    \ is passed through a batch normalization and max pooling at the end/output.\n\
    \n```\n    class ResNet(nn.Module):\n    def __init__(self, n_classes=10):\n \
    \   super().__init__()\n    self.res1 = ResBlock(1, 8, 16, 15)\n    self.res2\
    \ = ResBlock(16, 32, 16, 15)\n    self.conv = conv(16, n_classes)\n    self.batchnorm\
    \ = nn.BatchNorm2d(n_classes)\n    self.maxpool = nn.AdaptiveMaxPool2d(1)\n  \
    \  def forward(self, x):\n    x = preprocess(x)\n    x = self.res1(x)\n    x =\
    \ self.res2(x)\n    x = self.maxpool(self.batchnorm(self.conv(x)))\n    return\
    \ x.view(x.size(0), -1)\n```\n\n6.  The next thing to focus on are various snippets\
    \ or lines of important code, shown next. The first line shows the loss function\
    \ we are using. Cross-entropy loss is standard for classification problems. After\
    \ that there is a function called `accuracy`. The `accuracy` function returns\
    \ a percentage for how accurately a classification matched a set of outputs. It\
    \ works by taking the maximum predicted values and finding the index using `argmax`.\
    \ It then compares the correct outputs with what is labeled, returning a value\
    \ between 0.0 and 1.0, or 0 to 100 percent.\n\n```\n    loss_fn = nn.CrossEntropyLoss()\n\
    \    def accuracy(pred, labels):\n    preds = torch.argmax(pred, dim=1)\n    return\
    \ (preds == labels).float().mean()\n```\n\n7.  Let the model train until completion,\
    \ and notice the output as the model trains. We should see loss decreasing for\
    \ both the training and test sets, and we should see the accuracy increase for\
    \ both sets. If the model is training well, both curves in loss and accuracy should\
    \ follow each other. Loss or accuracy that diverges between test and training\
    \ is a result of over- or underfitting.\n\n8.  Numbers aside, it is often helpful\
    \ to see actual results, so the last block of code on the notebook provides actual\
    \ visual confirmation. Inside this block we sample a batch of images/labels from\
    \ the `testloader` and then pass them into the model to output predictions, `preds`.\
    \ We then need to convert those predictions back to labels/indices with `torch.max`.\
    \ After that, the model accuracy is printed, multiplied by 100, and the images\
    \ are plotted with the labels.\n\n```\n    dataiter = iter(testloader)\n    images,\
    \ labels = dataiter.next()\n    preds = model(images.cuda())\n    values, indices\
    \ = torch.max(preds, 1)\n    print(f\"accuracy {accuracy(preds, labels.cuda()).item()*100}%\"\
    )\n    plot_images(images.cpu().numpy(), indices.cpu().numpy(), 25)\n```\n\n9.\
    \  Figure [6-3](#502181_1_En_6_Chapter.xhtml#Fig3) shows a set of images with\
    \ predicted labels. While the accuracy is at over 92 percent, we can see in the\
    \ output image that no images are incorrectly labeled.\n\nOne thing you ideally\
    \ noticed when running that previous exercise is how quickly this model trained.\
    \ This model is initially set to train with only five epochs and in most cases\
    \ can quickly get up to 90 percent accuracy. If you train this model longer, it\
    \ should easily exceed 90 percent accuracy for this dataset."
  raw: "## Understanding Residual Networks\n\nAs we saw in previous chapters and exercises,\
    \ we often need to increase the depth of our networks for better learning feature\
    \ extraction. However, as we have also learned, the deeper those network layers\
    \ became, the more problems arose such as exploding or vanishing gradients that\
    \ are often caused by feature over feature extraction.\n\nFeature over feature\
    \ extraction happens when convolutional network layers become too deep and, even\
    \ though they may be normalized, still create difficult to map latent surfaces.\
    \ The effect is the model over-emphasizes some features and ignores fewer less\
    \ common ones.\n\nWe have seen plenty examples of feature over feature extraction\
    \ in many GANs that use multiple convolutional layers. This can be identified\
    \ as the bright areas in regenerated images.\n\nResidual networks and blocks try\
    \ to overcome this feature over feature effect by allowing some layers to be skipped,\
    \ thus allowing the model to ignore layers that may be overemphasizing features.\
    \ ResNets do this by passing residual outputs from the top of the block to the\
    \ bottom after a convolutional process.\n\nFigure [6-1](#502181_1_En_6_Chapter.xhtml#Fig1)\
    \ shows a single residual block. In the figure, the inputs x come in and enter\
    \ the first weight layer and bypass it to the + node, the bottom. *F*(x) represents\
    \ the convolutional function applied to x using the weight layers. At the bottom\
    \ of the block, you can see that the output is *F*(x) + x, where x is the residuals\
    \ from the start of the block.\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig1_HTML.jpg](images/502181_1_En_6_Chapter/502181_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nA single residual block\n\nBy passing the residual inputs from\
    \ the top of the block to the bottom, we effectively reduce and normalize the\
    \ dependency on the weight layers. This in turn reduces exploding/vanishing gradients\
    \ caused by feature over feature extraction. Another benefit of this is the ability\
    \ to increase network depth significantly.\n\nFigure [6-2](#502181_1_En_6_Chapter.xhtml#Fig2)\
    \ shows a comparison of a 19-layer network, the reference VGG19, and ResNet152,\
    \ which is a residual network that uses 152 layers. Within the ResNet model, you\
    \ can see the skip connections between the residual convolution blocks. Consider\
    \ how deep ResNet152 is compared to the simple VGG19.\n\nVisual Geometry Group\
    \ (VGG) from Oxford University developed a set of standardized models that used\
    \ convolution. In VGG19 there are 19 layers, 16 convolution, and 3 linear flat\
    \ layers.\n\nWe can see how a residual block within a residual network works for\
    \ a simple classification problem by again looking at the fashion MNIST dataset.\
    \ This time we are going to build a simple model with a residual network to learn\
    \ how to classify fashion. Jump on to your computer and get ready to explore Exercise\
    \ 6-1.\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig2_HTML.jpg](images/502181_1_En_6_Chapter/502181_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nComparison of regular convolutional network and ResNet\n\nEXERCISE\
    \ 6-1\\. RESIDUAL NETWORK CLASSIFIER\n\n1.  Open the `GEN_6_ResNet_classifier.ipynb`\
    \ notebook from the GitHub project site. If you are unsure how, then consult Appendix\
    \ B.\n\n2.  Run the whole notebook by selecting Runtime ➤ Run all. The bulk of\
    \ this notebooks code should be familiar. Therefore, we will focus only on the\
    \ new or important sections.\n\n3.  You can scroll down to the RESNET model block\
    \ and look at the first two helper functions. The first of these functions, `preprocess`,\
    \ is for swapping and setting up the tensors. The second is the `conv` function\
    \ that is a wrapper around creating a convolutional layer.\n\n```\n    def preprocess(x):\n\
    \    return x.view(-1, 1, 28, 28)\n    def conv(in_size, out_size, pad=1):\n \
    \   return nn.Conv2d(in_size, out_size, kernel_size=3, stride=2, padding=pad)\n\
    \    ```\n\n4.  Just below that is the definition for the `ResidualBlock` class\
    \ . Remember, a single residual block allows for the input residuals to bypass\
    \ the training layers and then get added in at the bottom with the skip connection.\n\
    \n```\n    class ResBlock(nn.Module):\n    def __init__(self, in_size:int, hidden_size:int,\
    \ out_size:int, pad:int):\n    super().__init__()\n    self.conv1 = conv(in_size,\
    \ hidden_size, pad)\n    self.conv2 = conv(hidden_size, out_size, pad)\n    self.batchnorm1\
    \ = nn.BatchNorm2d(hidden_size)\n    self.batchnorm2 = nn.BatchNorm2d(out_size)\n\
    \    def convblock(self, x):\n    x = nn.functional.relu(self.batchnorm1(self.conv1(x)))\n\
    \    x = nn.functional.relu(self.batchnorm2(self.conv2(x)))\n    return x\n  \
    \  def forward(self, x): return x + self.convblock(x) # skip connection\n    ```\n\
    \n5.  Below that is where the `ResidualNetwork` class is constructed. Notice how\
    \ there are two `ResBlocks` residual blocks connected in sequence and the output\
    \ is passed through a batch normalization and max pooling at the end/output.\n\
    \n```\n    class ResNet(nn.Module):\n    def __init__(self, n_classes=10):\n \
    \   super().__init__()\n    self.res1 = ResBlock(1, 8, 16, 15)\n    self.res2\
    \ = ResBlock(16, 32, 16, 15)\n    self.conv = conv(16, n_classes)\n    self.batchnorm\
    \ = nn.BatchNorm2d(n_classes)\n    self.maxpool = nn.AdaptiveMaxPool2d(1)\n  \
    \  def forward(self, x):\n    x = preprocess(x)\n    x = self.res1(x)\n    x =\
    \ self.res2(x)\n    x = self.maxpool(self.batchnorm(self.conv(x)))\n    return\
    \ x.view(x.size(0), -1)\n    ```\n\n6.  The next thing to focus on are various\
    \ snippets or lines of important code, shown next. The first line shows the loss\
    \ function we are using. Cross-entropy loss is standard for classification problems.\
    \ After that there is a function called `accuracy` . The `accuracy` function returns\
    \ a percentage for how accurately a classification matched a set of outputs. It\
    \ works by taking the maximum predicted values and finding the index using `argmax`.\
    \ It then compares the correct outputs with what is labeled, returning a value\
    \ between 0.0 and 1.0, or 0 to 100 percent.\n\n```\n    loss_fn = nn.CrossEntropyLoss()\n\
    \    def accuracy(pred, labels):\n    preds = torch.argmax(pred, dim=1)\n    return\
    \ (preds == labels).float().mean()\n    ```\n\n7.  Let the model train until completion,\
    \ and notice the output as the model trains. We should see loss decreasing for\
    \ both the training and test sets, and we should see the accuracy increase for\
    \ both sets. If the model is training well, both curves in loss and accuracy should\
    \ follow each other. Loss or accuracy that diverges between test and training\
    \ is a result of over- or underfitting.\n\n8.  Numbers aside, it is often helpful\
    \ to see actual results, so the last block of code on the notebook provides actual\
    \ visual confirmation. Inside this block we sample a batch of images/labels from\
    \ the testloader and then pass them into the model to output predictions, `preds`.\
    \ We then need to convert those predictions back to labels/indices with `torch.max`.\
    \ After that, the model accuracy is printed, multiplied by 100, and the images\
    \ are plotted with the labels.\n\n```\n    dataiter = iter(testloader)\n    images,\
    \ labels = dataiter.next()\n    preds = model(images.cuda())\n    values, indices\
    \ = torch.max(preds, 1)\n    print(f\"accuracy {accuracy(preds, labels.cuda()).item()*100}%\"\
    )\n    plot_images(images.cpu().numpy(), indices.cpu().numpy(), 25)\n    ```\n\
    \n9.  Figure [6-3](#502181_1_En_6_Chapter.xhtml#Fig3) shows a set of images with\
    \ predicted labels. While the accuracy is at over 92 percent, we can see in the\
    \ output image that no images are incorrectly labeled.\n\nOne thing you ideally\
    \ noticed when running that previous exercise is how quickly this model trained.\
    \ This model is initially set to train with only five epochs and in most cases\
    \ can quickly get up to 90 percent accuracy. If you train this model longer, it\
    \ should easily exceed 90 percent accuracy for this dataset."
  trans: "\n# 理解残差网络\n\n正如我们在前几章和练习中所见，为了更有效地学习特征提取，我们常常需要增加网络的深度。然而，我们也了解到，网络层数越深，出现的问题就越多，例如由特征过度提取常导致的梯度爆炸或梯度消失。\n\
    \n当卷积网络层变得过深时，即使进行了归一化处理，仍然会产生难以映射的潜在曲面，从而引发特征过度提取。其结果是模型过度强调某些特征，而忽略了其他不那么常见的特征。\n\
    \n我们在许多使用多层卷积的生成对抗网络（GAN）中已经看到了大量特征过度提取的例子。这可以通过生成图像中的明亮区域来识别。\n\n残差网络和残差块试图通过允许跳过某些层来克服这种特征过度效应，从而使模型能够忽略那些可能过度强调特征的层。残差网络通过在卷积过程之后，将残差输出从块的顶部传递到底部来实现这一点。\n\
    \n图 6-1 展示了一个单独的残差块。在图中，输入 `x` 进入第一个权重层，并绕过它到达底部的 `+` 节点。`F(x)` 表示使用权重层对 `x` 应用的卷积函数。在块的底部，你可以看到输出是\
    \ `F(x) + x`，其中 `x` 是来自块起始位置的残差。\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig1_HTML.jpg](img/502181_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1\n\n一个单独的残差块\n\n通过将残差输入从块的顶部传递到底部，我们有效地减少并归一化了对权重层的依赖。这反过来又减少了由特征过度提取引起的梯度爆炸/消失。这样做还有一个好处，就是能够显著增加网络深度。\n\
    \n图 6-2 展示了一个 19 层网络（参考 VGG19）与 ResNet152（一个使用 152 层的残差网络）的对比。在 ResNet 模型中，你可以看到残差卷积块之间的跳跃连接。想想\
    \ ResNet152 与简单的 VGG19 相比有多深。\n\n牛津大学的视觉几何组（VGG）开发了一套使用卷积的标准化模型。在 VGG19 中有 19\
    \ 层，其中 16 层是卷积层，3 层是线性扁平层。\n\n我们可以通过再次查看 fashion MNIST 数据集，了解残差网络中的残差块如何用于一个简单的分类问题。这次我们将构建一个带有残差网络的简单模型来学习如何对时尚物品进行分类。请打开你的电脑，准备探索练习\
    \ 6-1。\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig2_HTML.jpg](img/502181_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2\n\n常规卷积网络与 ResNet 的对比\n\n## 练习 6-1. 残差网络分类器\n\n1.  从 GitHub 项目站点打开 `GEN_6_ResNet_classifier.ipynb`\
    \ 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2.  通过选择“运行时” ➤ “全部运行”来运行整个笔记本。此笔记本的大部分代码应该很熟悉。因此，我们将只关注新的或重要的部分。\n\
    \n3.  你可以向下滚动到 RESNET 模型块，查看前两个辅助函数。第一个函数 `preprocess` 用于交换和设置张量。第二个是 `conv` 函数，它是创建卷积层的一个包装器。\n\
    \n```\n    def preprocess(x):\n    return x.view(-1, 1, 28, 28)\n    def conv(in_size,\
    \ out_size, pad=1):\n    return nn.Conv2d(in_size, out_size, kernel_size=3, stride=2,\
    \ padding=pad)\n```\n\n4.  紧接着下面是 `ResidualBlock` 类的定义。请记住，一个单独的残差块允许输入残差绕过训练层，然后通过跳跃连接在底部相加。\n\
    \n```\n    class ResBlock(nn.Module):\n    def __init__(self, in_size:int, hidden_size:int,\
    \ out_size:int, pad:int):\n    super().__init__()\n    self.conv1 = conv(in_size,\
    \ hidden_size, pad)\n    self.conv2 = conv(hidden_size, out_size, pad)\n    self.batchnorm1\
    \ = nn.BatchNorm2d(hidden_size)\n    self.batchnorm2 = nn.BatchNorm2d(out_size)\n\
    \    def convblock(self, x):\n    x = nn.functional.relu(self.batchnorm1(self.conv1(x)))\n\
    \    x = nn.functional.relu(self.batchnorm2(self.conv2(x)))\n    return x\n  \
    \  def forward(self, x): return x + self.convblock(x) # 跳跃连接\n```\n\n5.  再下面是构建\
    \ `ResidualNetwork` 类的地方。注意这里有两个 `ResBlocks` 残差块按顺序连接，输出在最后/输出端经过批归一化和最大池化处理。\n\
    \n```\n    class ResNet(nn.Module):\n    def __init__(self, n_classes=10):\n \
    \   super().__init__()\n    self.res1 = ResBlock(1, 8, 16, 15)\n    self.res2\
    \ = ResBlock(16, 32, 16, 15)\n    self.conv = conv(16, n_classes)\n    self.batchnorm\
    \ = nn.BatchNorm2d(n_classes)\n    self.maxpool = nn.AdaptiveMaxPool2d(1)\n  \
    \  def forward(self, x):\n    x = preprocess(x)\n    x = self.res1(x)\n    x =\
    \ self.res2(x)\n    x = self.maxpool(self.batchnorm(self.conv(x)))\n    return\
    \ x.view(x.size(0), -1)\n```\n\n6.  接下来要关注的是各种重要的代码片段或行，如下所示。第一行显示了我们使用的损失函数。交叉熵损失是分类问题的标准选择。之后是一个名为\
    \ `accuracy` 的函数。`accuracy` 函数返回分类与一组输出匹配的准确率百分比。它的工作原理是获取最大预测值，并使用 `argmax` 找到索引。然后它将正确的输出与标签进行比较，返回一个介于\
    \ 0.0 和 1.0 之间的值，即 0% 到 100%。\n\n```\n    loss_fn = nn.CrossEntropyLoss()\n  \
    \  def accuracy(pred, labels):\n    preds = torch.argmax(pred, dim=1)\n    return\
    \ (preds == labels).float().mean()\n```\n\n7.  让模型训练直至完成，并注意模型训练时的输出。我们应该看到训练集和测试集的损失都在下降，并且两个数据集的准确率都在提高。如果模型训练良好，损失和准确率的两条曲线应该相互跟随。测试集和训练集之间的损失或准确率出现差异是过拟合或欠拟合的结果。\n\
    \n8.  撇开数字不谈，查看实际结果通常很有帮助，因此笔记本上的最后一个代码块提供了实际的视觉确认。在此代码块中，我们从 `testloader` 中采样一批图像/标签，然后将它们传入模型以输出预测结果\
    \ `preds`。然后我们需要使用 `torch.max` 将这些预测结果转换回标签/索引。之后，打印模型准确率（乘以 100），并绘制带有标签的图像。\n\
    \n```\n    dataiter = iter(testloader)\n    images, labels = dataiter.next()\n\
    \    preds = model(images.cuda())\n    values, indices = torch.max(preds, 1)\n\
    \    print(f\"accuracy {accuracy(preds, labels.cuda()).item()*100}%\")\n    plot_images(images.cpu().numpy(),\
    \ indices.cpu().numpy(), 25)\n```\n\n9.  图 6-3 展示了一组带有预测标签的图像。虽然准确率超过 92%，但我们在输出图像中可以看到没有图像被错误标记。\n\
    \n在运行上一个练习时，你理想中注意到的一件事是这个模型训练得有多快。该模型最初设置为仅训练五个周期，在大多数情况下可以迅速达到 90% 的准确率。如果你训练这个模型更长时间，它应该能轻松超过该数据集\
    \ 90% 的准确率。\n"
- fmt: "# Residual Networks and CycleGAN\n\nAs you can see, residual networks provide\
    \ increased stability to deeper networks and can allow for an increase in training\
    \ performance. In turn, they allow for deeper networks that can learn feature\
    \ sets that don’t suffer from feature over feature extraction.\n\nWith another\
    \ new powerful addition to our toolbelt, we can move back to looking at how this\
    \ improves on GAN variations. We will start back again to looking at unpaired\
    \ image to image translation with the CycleGAN next.\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig3_HTML.jpg](images/502181_1_En_6_Chapter/502181_1_En_6_Fig3_HTML.jpg)\n\
    \n**Figure 6-3** Predicted accuracy and labeled output\n\n## Cycling Again with\
    \ CycleGAN\n\nThe cycle or cycle consistency GAN’s primary loss mechanism is cycle\
    \ loss. Recall that we previously covered cycle loss in Chapter [5](#502181_1_En_5_Chapter.xhtml).\
    \ Cycle consistency loss is measured by the translation of an item into something\
    \ and then translated back into the original, where the measured loss is taken\
    \ by how well the original compares with the double translation output.\n\nWhile\
    \ the CycleGAN is named after its primary method of loss determination, it again\
    \ combines other methods of loss as assurances. This variation of a GAN uses three\
    \ forms of loss on the generator: the adversarial or standard GAN loss, the cycle\
    \ loss, and an identity loss.\n\nIdentity loss measures the color variation or\
    \ temperature change over an image. Without the addition of identity loss, the\
    \ generated output may take on different hues much different than our desired\
    \ output. A CycleGAN doesn’t necessarily need to include the identity loss, but\
    \ it makes the output more uniform.\n\nSince we have already covered a variation\
    \ of this GAN, the BicycleGAN and DiscoGAN, we can quickly jump into the exercise.\
    \ Exercise 6-2 will be similar to the DiscoGAN exercise we looked at in Chapter\
    \ [5](#502181_1_En_5_Chapter.xhtml). There may be a few variations like identity\
    \ loss that we will cover further as we get into the exercise.\n\n## EXERCISE\
    \ 6-2. CYCLING AND IDENTITY WITH CYCLEGAN\n\n1. Open the `GEN_6_CycleGAN.ipynb`\
    \ notebook from the GitHub project site. If you are unsure how, then consult Appendix\
    \ B.\n\n2. The bulk of this notebook’s code should be familiar, but we will again\
    \ cover the new or different hyperparameters shown. The `n_residual_blocks` hyperparameter\
    \ allows for us to control the number of residual blocks used in the generator,\
    \ where `lambda_cyc` and `lambda_id` control the scale on the cycle and identity\
    \ loss, respectively.\n\n```\nn_residual_blocks=9,\nlambda_cyc=10.0,\nlambda_id=5.0\n\
    ```\n\n3. You will also note that this notebook allows you to choose between the\
    \ five unpaired image to image datasets: Monet to Photo, VanGogh to Photo, Apples\
    \ to Oranges, Summer to Winter in Yosemite, and Horses to Zebras. Select a dataset\
    \ that you find interesting and then run the whole notebook by selecting **Runtime**\
    \ ➤ **Run all**.\n\n4. You may notice that the `GeneratorResNet` class is comprised\
    \ of downsampling layers joined to several residual blocks, set by the hyperparameter,\
    \ that output to upsample layers for the generated output. An abridged version\
    \ of the `init` function shows how the model architecture is assembled.\n\n5.\
    \ Next, we will look at the loss, model creation, and optimizer functions. Notice\
    \ how the generator shares an optimizer, while the discriminator uses independent\
    \ optimizers.\n\n```\ndef __init__(self, input_shape, num_residual_blocks):\n\
    \    super(GeneratorResNet, self).__init__()\n    channels = input_shape[0]\n\
    \    out_features = 64\n    model = [\n        nn.ReflectionPad2d(channels),\n\
    \        nn.Conv2d(channels, out_features, 7),\n        nn.InstanceNorm2d(out_features),\n\
    \        nn.ReLU(inplace=True),\n    ]\n    in_features = out_features\n    #\
    \ Downsampling\n    for _ in range(2):\n        out_features *= 2\n        model\
    \ += [\n            nn.Conv2d(in_features, out_features, 3, stride=2, padding=1),\n\
    \            nn.InstanceNorm2d(out_features),\n            nn.ReLU(inplace=True),\n\
    \        ]\n        in_features = out_features\n    # Residual blocks\n    for\
    \ _ in range(num_residual_blocks):\n        model += [ResidualBlock(out_features)]\n\
    \    # Upsampling\n    for _ in range(2):\n        out_features //= 2\n      \
    \  model += [\n            nn.Upsample(scale_factor=2),\n            nn.Conv2d(in_features,\
    \ out_features, 3, stride=1, padding=1),\n            nn.InstanceNorm2d(out_features),\n\
    \            nn.ReLU(inplace=True),\n        ]\n        in_features = out_features\n\
    \    # Output layer\n    model += [n...\n```\n\n6. Right after the optimizers\
    \ are created, we add a new tool called a *scheduler*. Schedulers are used to\
    \ modify hyperparameters during training. In this case, we used one to modify\
    \ the learning rate during training. For this model, we decrease the learning\
    \ rate over time, thus allowing our model to start out making big changes and\
    \ then over time gradually make small tweaks."
