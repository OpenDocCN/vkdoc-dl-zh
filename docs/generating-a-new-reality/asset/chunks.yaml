  trans: "\n# 相对论与相对论 GAN\n\n我们研究了两种不同的方法来确定 GAN 中的损失。在普通或标准 GAN 中，损失是以绝对方式衡量的。在 WGAN\
    \ 中，我们学习了如何使用推土机算法以更相对的方式确定损失。通过采用更相对的方法计算损失，WGAN 能够解决我们在标准 GAN 中之前看到的一些训练缺陷。\n\
    \n相对论 GAN 是另一种使用相对方法计算 GAN 中距离或损失的方法。在标准 GAN 中，判别器估计真实数据为真实的概率，而生成器的工作是增加假数据也被视为真实的概率。然而，RGAN\
    \ 的作者还希望考虑到生成器，降低真实图像为真实的概率。\n\n考虑到先验知识——它看到的一半数据总是假的，并且假数据变得更真实的概率——使得 GAN 能够利用先前观察到的观测结果来推断图像是真实的还是假的。结果是一个相对论判别器，它能够通过学习来考虑期望分布随时间的变化。\n\
    \n这改变了生成器的损失函数，使其类似于以下形式：\n\n![$$ {L}^{(G)}= logit\\left(D\\left(G(z)\\right)-\\\
    left(D(x)\\right),1\\right) $$](img/502181_1_En_4_Chapter_TeX_Equl.png)\n\n其中：\n\
    \n`logit` = 二元交叉熵 logit 损失函数 ![$$ \\mathit{\\log}\\left(\\frac{x}{1-x}\\right)\
    \ $$](img/502181_1_En_4_Chapter_TeX_IEq1.png)。\n\n`logit`函数通常被描述为几率函数，它返回给定期望概率下结果是真实或虚假的几率。\n\
    \n相对论判别器接收两种组合的损失版本，即真实和虚假，由以下公式给出：\n\n![$$ {L^{(D)}}_{real}= logit\\left(\\left(D(x)\\\
    right)-D\\left(G(z)\\right),1\\right) $$](img/502181_1_En_4_Chapter_TeX_Equm.png)\n\
    \n![$$ {L^{(D)}}_{fake}= logit\\left(D\\left(G(z)-\\left(D(x)\\right)\\right),0\\\
    right) $$](img/502181_1_En_4_Chapter_TeX_Equn.png)\n\n![$$ {L^{(D)}}_{total}=\\\
    frac{\\left({L^{(D)}}_{real}+{L^{(D)}}_{fake}\\right)}{2} $$](img/502181_1_En_4_Chapter_TeX_Equo.png)\n\
    \n使用`logit`函数将输出从期望概率转换为期望几率。换句话说，不要猜测数据是真实还是虚假，而是猜测数据是真实或虚假的概率或几率。其思想是，根据过去对数据的观察，考虑答案与真实情况可能有多大的差距。\n\
    \nRGAN 的作者还提出了另一种方法，将计算出的几率与真实或预测数据的平均几率进行比较。他们将这种变体称为*相对论平均 GAN*（RaGAN）。\n\n\
    现在我们对损失的工作原理有了更好的理解，可以看看在 PyTorch 中的具体实现。在练习 4-4 中，我们将研究在 Fashion MNIST 数据集上训练的\
    \ RGAN 和 RaGAN。\n\n## 练习 4-4. 关联相对论 GAN\n\n1. 从 GitHub 项目站点打开`GEN_4_Relativistic_GAN.ipynb`笔记本。如果不确定如何操作，请参考附录\
    \ B。\n\n2. 通过选择“运行时” ➤ “全部运行”来运行整个笔记本。然后跳过`imports`单元格，找到第一个包含`Hyperparameters\
    \ class`的单元格，检查超参数，这些我们之前都见过。有一个名为`rel_avg_gan`的新超参数，它控制 GAN 是作为 RGAN 还是 RaGAN\
    \ 运行。\n\n3. 该 GAN 使用卷积进行额外的特征提取。生成器与之前看到的 DCGAN 类似，但判别器的构造不同，如下所示：\n\n```\nclass\
    \ Discriminator(nn.Module):\n    def __init__(self):\n        super(Discriminator,\
    \ self).__init__()\n        def discriminator_block(in_filters, out_filters, bn=True):\n\
    \            block = [nn.Conv2d(in_filters, out_filters, 3, 2, 1), nn.LeakyReLU(0.2,\
    \ inplace=True), nn.Dropout2d(0.25)]\n            if bn:\n                block.append(nn.BatchNorm2d(out_filters,\
    \ 0.8))\n            return block\n        self.model = nn.Sequential(\n     \
    \       *discriminator_block(hp.channels, 16, bn=False),\n            *discriminator_block(16,\
    \ 32),\n            *discriminator_block(32, 64),\n            *discriminator_block(64,\
    \ 128),\n        )\n        # 下采样图像的高度和宽度\n        ds_size = hp.img_size // 2\
    \ ** 4\n        self.adv_layer = nn.Sequential(nn.Linear(128 * ds_size ** 2, 1))\n\
    \    def forward(self, img):\n        out = self.model(img)\n        out = out.view(out.shape[0],\
    \ -1)\n        validity = self.adv_layer(out)\n        return validity\n```\n\n\
    4. 注意我们如何定义一个名为`discriminator_block`的内部函数，它设置了卷积层。\n\n5. 现在跳转到训练循环，看看内部代码如何使用我们更新的方程计算损失。\n\
    \n```\n# 生成器\noptimizer_G.zero_grad()\nz = Variable(Tensor(np.random.normal(0,\
    \ 1, (imgs.shape[0], hp.latent_dim))))\ngen_imgs = generator(z)\nreal_pred = discriminator(real_imgs).detach()\n\
    fake_pred = discriminator(gen_imgs)\nif hp.rel_avg_gan:\n    g_loss = loss_fn(fake_pred\
    \ - real_pred.mean(0, keepdim=True), valid)\nelse:\n    g_loss = loss_fn(fake_pred\
    \ - real_pred, valid)\ng_loss.backward()\noptimizer_G.step()\n\n# 判别器\noptimizer_D.zero_grad()\n\
    real_pred = discriminator(real_imgs)\nfake_pred = discriminator(gen_imgs.detach())\n\
    if hp.rel_avg_gan:\n    real_loss = loss_fn(real_pred - fake_pred.mean(0, keepdim=True),\
    \ valid)\n    fake_loss = loss_fn(fake_pred - real_pred.mean(0, keepdim=True),\
    \ fake)\nelse:\n    real_loss = loss_fn(real_pred - fake_pred, valid)\n    fake_loss\
    \ = loss_fn(fake_pred - real_pred, fake)\nd_loss = (real_loss + fake_loss) / 2\n\
    d_loss.backward()\noptimizer_D.step()\n```\n\n6. 让示例训练完成，然后返回并将`rel_avg_gan`超参数切换为\
    \ false 或 true。然后比较 RGAN 和 RaGAN 的结果。\n\n图 4-6 显示了在 Fashion 数据集上训练 RGAN 的早期结果。如您所见，与我们之前的尝试相比，结果相当令人印象深刻。注意，我们在\
    \ DCGAN 中观察到的特征修补问题也已得到解决。您还可以看到服装物品上的精细细节，比如那些有问题的凉鞋。\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig6_HTML.jpg](img/502181_1_En_4_Fig6_HTML.jpg)\n\
    \n**图 4-6** RGAN 的早期训练结果\n\n到目前为止，我们研究了 GAN 中的几种方法，使用各种损失函数以期改进结果。我们研究了在 WGAN\
    \ 和 RGAN/RaGAN 中将损失函数的视角从绝对变为相对，以及如何使用边界搜索 GAN 更好地分类离散或越界数据。在下一节中，我们将研究 GAN 的另一种变体，它改进了领域识别和归因。\n"
- fmt: "## Conditioning with CGAN\n\nAs we have seen, there are several variations\
    \ to account for loss or expected loss in a GAN. All these methods used an expectation\
    \ that the GAN would learn the entirety of the image or other data without assistance.\
    \ This requires the GAN to not only learn what is fake or real but also learn\
    \ latent domains of data.\n\nA latent domain is a hidden domain with respect to\
    \ the GAN or other model. The GAN needs to learn this domain on its own to generate\
    \ realistic images for that domain or class. As an example, consider the MNIST\
    \ fashion dataset we have been GAN training all chapter. This dataset consists\
    \ of 10 classes, some more unique than others, that the GAN also must learn. We\
    \ see what issues this caused when we compared the results from looking at the\
    \ more diverse and detailed classes, like sandals.\n\nIt should come as no surprise\
    \ then that the simple workaround or helper we can give to a GAN is to feed the\
    \ labels in with the data. So, we tell the GAN not only that it has this image\
    \ to learn but also what class or domain it belongs to. By doing that, we no longer\
    \ need to change our loss function, just the inputs into the general loss function,\
    \ as shown here:\n\n![$$ L={\\displaystyle \\begin{array}{c}\\mathit{\\min}\\\\\
    \ {}G\\end{array}}{\\displaystyle \\begin{array}{c}\\mathit{\\max}\\\\ {}D\\end{array}}\\\
    left[\\mathit{\\log}\\left(D\\left(x, label\\right)\\right)+\\mathit{\\log}\\\
    left(1-D\\left(G\\left(z, label\\right)\\right)\\right)\\right] $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equp.png)\n\
    \nThe big change here is that we now also feed the label into the discriminator\
    \ and generator along with the data. By feeding the label into the models, we\
    \ now take some of the difficulty away from the model to learn a domain or class\
    \ on its own. Instead, we give it some help by telling it the class we have tagged\
    \ it with.\n\nFor pure AI or generative modeling, ideally we do not want to have\
    \ to provide labels on data because of our own human prejudice or bias. Anytime\
    \ we label data, we are putting a human bias on that data. This is the reason\
    \ we often prefer to feed deep learning models with raw, unlabeled data and let\
    \ the model learn on its own. In a vanilla GAN, we essentially always have a minimum\
    \ of real/fake labeling of data.\n\nAdding labels into our GAN upgrades it to\
    \ a conditional GAN (CGAN). We call it *conditional* since we provide the conditions\
    \ or labels of the domains to the CGAN. For our purposes, we are going to look\
    \ at a cDCGAN or conditional DCGAN in Exercise 4-5.\n\n**EXERCISE 4-5. RELATING\
    \ THE RELATIVISTIC GAN**\n\n1. Open the `GEN_4_cDCGAN.ipynb` notebook from the\
    \ GitHub project site. If you are unsure how, then consult Appendix B.\n\n2. Run\
    \ the whole notebook by selecting **Runtime** ➤ **Run all**. Then look past the\
    \ imports cell and on to the first cell with the `Hyperparameters` class and examine\
    \ the new value `n_classes = 10`. This sets the number of classes to be fed as\
    \ labels into the model.\n\n3. Scroll down to the `Generator` class definition,\
    \ as shown here:\n\n```\n    class Generator(nn.Module):\n    def __init__(self):\n\
    \    super(Generator, self).__init__()\n    self.label_emb = nn.Embedding(hp.n_classes,\
    \ hp.n_classes)\n    def block(in_feat, out_feat, normalize=True):\n    layers\
    \ = [nn.Linear(in_feat, out_feat)]\n    if normalize:\n    layers.append(nn.BatchNorm1d(out_feat,\
    \ 0.8))\n    layers.append(nn.LeakyReLU(0.2, inplace=True))\n    return layers\n\
    \    self.model = nn.Sequential(\n    *block(hp.latent_dim + hp.n_classes, 128,\
    \ normalize=False),\n    *block(128, 256),\n    *block(256, 512),\n    *block(512,\
    \ 1024),\n    nn.Linear(1024, int(np.prod(img_shape))),\n    nn.Tanh()\n    )\n\
    \    def forward(self, noise, labels):\n    gen_input = torch.cat((self.label_emb(labels),\
    \ noise), -1)\n    img = self.model(gen_input)\n    img = img.view(img.size(0),\
    \ *img_shape)\n    return img\n```\n\n4. Notice in the `forward` function how\
    \ the label is concatenated with the random noise. The label embeddings are learned\
    \ using a special layer called an *embedding* layer. Embedding layers are like\
    \ autoencoders except the output is the middle-learned embedding.\n\n5. Next,\
    \ we will jump down to the `Discriminator` class definition and see how the labels\
    \ are fed in the same way using the learned embeddings.\n\n```\n    class Discriminator(nn.Module):\n\
    \    def __init__(self):\n    super(Discriminator, self).__init__()\n    self.label_embedding\
    \ = nn.Embedding(hp.n_classes, hp.n_classes)\n    self.model = nn.Sequential(\n\
    \    nn.Linear(hp.n_classes + int(np.prod(img_shape)), 512),\n    nn.LeakyReLU(0.2,\
    \ inplace=True),\n    nn.Linear(512, 512),\n    nn.Dropout(0.4),\n    nn.LeakyReLU(0.2,\
    \ inplace=True),\n    nn.Linear(512, 512),\n    nn.Dropout(0.4),\n    nn.LeakyReLU(0.2,\
    \ inplace=True),\n    nn.Linear(512, 1),\n    )\n```\n\n6. From here, we are familiar\
    \ with the rest of the code, so we can skip down to the training code and look\
    \ at the specific sections.\n\n```\n    # Generator\n    z = Variable(FloatTensor(np.random.normal(0,\
    \ 1, (batch_size, hp.latent_dim))))\n    gen_labels = Variable(LongTensor(np.random.randint(0,\
    \ hp.n_classes, batch_size)))\n    gen_imgs = generator(z, gen_labels)\n    validity\
    \ = discriminator(gen_imgs, gen_labels)\n    g_loss = loss_fn(validity, valid)\n\
    \    # Discriminator\n    validity_real = discriminator(real_imgs, labels)\n \
    \   d_real_loss = loss_fn(validity_real, valid)\n    validity_fake = discriminator(gen_imgs.detach(),\
    \ gen_labels)\n    d_fake_loss = loss_fn(validity_fake, fake)\n```\n\n7. The only\
    \ major change here is now we push the labels as inputs into both the discriminator\
    \ and the generator.\n\n8. As you let this sample run and watch the results, are\
    \ they what you expected? Could we add other relative forms of loss like the WGAN\
    \ or RGAN/RaGAN?\n\n```\ndef forward(self, img, labels):\nd_in = torch.cat((img.view(img.size(0),\
    \ -1), self.label_embedding(labels)), -1)\nvalidity = self.model(d_in)\nreturn\
    \ validity\n```\n\nWhen this sample completes, it will unfortunately be obvious\
    \ that we still have more work to do. However, notice how this model can create\
    \ detailed images from those difficult classes like sandals. In some cases, now\
    \ those difficult classes start to look more realistic than our previous attempts.\n\
    \nAt this point, you could go back and look at combining the loss from a WGAN\
    \ or RGAN/RaGAN into a CGAN or cDCGAN. Some of this has already been done in plenty\
    \ of other GAN variations you can search for. For us, though, we are going to\
    \ move on and look at more advanced techniques around generative modeling in later\
    \ chapters. Now, though, let’s finish up the chapter with our conclusions in the\
    \ next section.\n\n## Conclusion\n\nAs we saw in this chapter, there are several\
    \ GAN variations that try to increase performance by looking at loss from different\
    \ perspectives. From the standard/vanilla GAN, we saw how performance can be improved\
    \ with convolution and feature extraction. We also look at the Wasserstein and\
    \ relativistic GANs that accounted for loss in relative terms. Then we tried to\
    \ account for learning domains or classes in data with the boundary and conditional\
    \ GANs.\n\nThroughout this chapter we also studied the loss equations and how\
    \ they varied from one variation to another. By digging under the covers and studying\
    \ those equations, we began to understand how loss can be learned in absolute\
    \ or relative terms, as well as looked at ways to improve on those harder-to-learn\
    \ domains or classes.\n\nUltimately, what we hope to take away from this chapter\
    \ is the knowledge that GANs are susceptible to loss and how loss is calculated.\
    \ Understanding this gives us the power to pick the right loss or set of loss\
    \ equations that may be relevant to our datasets. After all, if you are building\
    \ a GAN specialized on your data, you will always want to try several GAN variations\
    \ and pick the best for your needs.\n\nIn the next chapter, we will move on from\
    \ understanding loss in GANs to exploring variations in training."
