- fmt: "# 学习率与过拟合/欠拟合\n\n考虑一个学习率为`.001`的情况，与值为`.00001`的情况进行比较。假设我们可以用较小的学习率在10分钟内训练一个网络。较小的学习率（小100倍）由于训练迭代次数的增加，很可能需要100倍的时间，将训练时间增加到10\
    \ × 100 = 1000分钟，即超过16小时。这一切都源于一个更小但不幸的是效率更低的学习率。\n\n为了进一步演示这一关键概念，让我们看另一个例子。练习3-2展示了我们将如何调整`alpha`（学习率）以更好地逼近上一个练习中的函数。\n\
    \n## 练习3-2：调整学习率以实现高效学习\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig7_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig7_HTML.jpg)\n\
    \n**图3-7** 对函数`x2 + 5`的更好逼近？\n\n1.  从GitHub项目站点打开`GEN_3_learning_rate.ipynb`笔记本。如果不确定如何操作，请查阅附录B。\n\
    2.  通过选择“Runtime ➤ Run all”运行整个笔记本。注意，在定义优化器的地方（如下代码所示），我们设置了学习率`lr`。\n\n    ```\n\
    \    loss_fn = nn.MSELoss()\n    optimizer = torch.optim.Adam(net.parameters(),\
    \ lr = .001)\n    ```\n\n3.  在我们之前的`GEN_3_function_approx.ipynb`示例中，学习率是`.025`，这个值刚好能够正确映射函数。\n\
    4.  我们的目标是找到能让网络100%或接近100%映射函数的学习率。\n5.  更改前面代码块中的学习率`lr`，然后通过选择“Runtime ➤ Run\
    \ all”重新运行整个笔记本。\n6.  看看你是否能调整`lr`值以匹配或逼近图[3-7](#502181_1_En_3_Chapter.xhtml#Fig7)。如果你将学习率设置得非常小会发生什么？\n\
    7.  如果你的网络在找到函数之前就完成了训练，这可以通过增加`epoch`数量轻松解决。将`num_epochs`改为更大的值，看看结果如何。\n\n \
    \   ```\n    num_epochs = 8000\n    y_train_t = torch.from_numpy(y_train).clone().reshape(-1,\
    \ 1)\n    ```\n\n8.  尝试找到能够训练网络匹配函数`x2 + 5`的最小`epoch`数量和最大学习率。\n9.  如果你觉得更有挑战性，可以尝试改变每一层的神经元数量或改变网络本身。\n\
    \n当你完成上一个练习时，可能已经意识到网络本身和数据可能存在局限性。事实上，这正是练习中的情况。在这个特定示例中，网络试图过拟合数据。我们将在下一节中探讨如何解决过拟合和欠拟合问题。\n\
    \n## 过拟合与欠拟合\n\n通常，当新手设计网络时，他们的第一个假设是神经元越多意味着结果越好。不幸的是，由于我们将在后续章节中理解的多种原因，情况很少如此。现在，我们想关注网络规模本身如何导致对函数的过拟合或欠拟合。\n\
    \n你可能经常听到深度学习从业者提到他们的网络对数据过拟合或欠拟合。他们真正的意思是网络对匹配或分类该数据的函数过拟合或欠拟合。\n\n图[3-8](#502181_1_En_3_Chapter.xhtml#Fig8)展示了我们之前的示例与函数`x2\
    \ + 5`的对比图，以查看我们实际匹配结果的程度。如你所见，我们匹配得并不好——事实上，考虑到我们网络的规模，匹配得相当差。然而，网络规模并非全部问题所在。网络规模和数据量几乎是相辅相成的。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig8_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig8_HTML.jpg)\n\
    \n**图3-8** 训练模型与真实函数`x2 + 5`的对比图\n\n回想一下我们之前的练习以及我们逼近函数`x2 + 5`的尝试。最初几次尝试使用了从1到10的一组固定数量的数据点。我们将这些数据点输入函数以生成`y`输出。这生成了我们的可训练数据集，然后我们将其拆分为训练集和测试集。\n\
    \n图[3-9](#502181_1_En_3_Chapter.xhtml#Fig9)展示了我们为训练和逼近函数而生成的10个数据点的图。在这些点中，我们移除了20%（即2个点）用于测试。这减少了数据集中的点数，实质上缩小了训练数据之间的空间大小。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig9_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig9_HTML.jpg)\n\
    \n**图3-9** 练习3-1和练习3-2中输入数据集的图\n\n这意味着当我们的模型逼近函数`x2 + 5`时，数据之间存在大片区域。我们将这些区域称为*潜在空间*或*隐藏空间*。再次强调，这不应与数据中的间隙、鸿沟或真空混淆。数据中的这种隐藏空间代表了函数中缺少任何实际训练数据的区域。这意味着网络必须在这些数据点之间逼近值。\n\
    \n事实证明，生成建模的一个重要部分是理解如何从这种潜在空间中提取结果，正如我们将在本书中看到的那样。这与我们之前尝试从函数逼近练习中提取结果的方式并无不同。我们之前的假设可能是减少训练点的数量，但现在我们可以看到，这增加了潜在空间的大小，导致模型对函数过拟合。\n\
    \n当模型逼近一个函数但错误地填充或逼近潜在空间时，就会发生过拟合。在我们之前的函数逼近示例中，情况显然如此，这是由两个问题造成的。第一个问题是数据不足，导致网络估计了大面积的潜在空间。第二个问题是网络规模过大，拥有过强的能力来估计数据中的空间。因此，它基本上是在编造值，这可能成为一个问题。\n\
    \n当网络规模很大时，它拥有很大的能力，在这种情况下是过大的能力。大型网络可以记忆各种形式的数据，包括图像或视频。这对于针对特定数据的网络可能有用，但在生成建模以及大多数其他机器学习学科中，我们的目标始终是泛化。\n\
    \n泛化始终是我们构建模型时要追求的目标。这意味着我们输入模型的数据需要分布良好。分布良好的数据为我们提供了数据之间均匀的潜在空间。在我们之前的示例中，数据被分布到10个区间中，值从1到10。然而，正如我们所看到的，我们的数据分布得不够好。"
  raw: "Consider a learning rate of .001 compared to a value of .00001\\. Say we can\
    \ train a network with the smaller rate in, say, 10 minutes. The smaller rate,\
    \ being 100 times smaller, would likely take 100 times longer due to the increase\
    \ in training iterations, increasing training times to 10 × 100 = 1000 minutes,\
    \ or more than 16 hours. This is all from a smaller but unfortunately less efficient\
    \ learning rate.\n\nTo demonstrate this key concept further, let’s look at another\
    \ example. Exercise 3-2 shows how we will tune the alpha (learning rate) to better\
    \ approximate the function in our previous exercise.\n\nEXERCISE 3-2\\. TUNING\
    \ ALPHA FOR EFFICIENT LEARNING\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig7_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7\n\nBetter approximation to the function x2 + 5?\n\n1.  Open the `GEN_3_learning_rate.ipynb`\
    \ notebook from the GitHub project site. If you are unsure how, then consult Appendix\
    \ B.\n\n2.  Run the whole notebook by selecting Runtime ➤ Run all. Notice that\
    \ where we define the optimizer, as shown in the following code, is where we set\
    \ the learning rate `lr`.\n\n```\n    loss_fn = nn.MSELoss()\n    optimizer =\
    \ torch.optim.Adam(net.parameters(), lr = .001)\n    ```\n\n3.  In our previous\
    \ example of `GEN_3_function_approx.ipynb`, our learning rate was .025, a value\
    \ that was on the cusp of being able to correctly map the function.\n\n4.  Our\
    \ goal here is to find the learning rate that will allow the network to map 100\
    \ percent to the function or close to it.\n\n5.  Change the learning rate `lr`\
    \ in the previous block of code and rerun the entire notebook by selecting Runtime\
    \ ➤ Run all.\n\n6.  See if you can tune the `lr` value to match or approximate\
    \ Figure [3-7](#502181_1_En_3_Chapter.xhtml#Fig7). What happens if you make the\
    \ learning rate really small?\n\n7.  If your network completes training before\
    \ finding the function, this is easily fixed by increasing the number of epochs.\
    \ Change `num_epochs` to something larger and see what results this has.\n\n```\n\
    \    num_epochs = 8000\n    y_train_t = torch.from_numpy(y_train).clone().reshape(-1,\
    \ 1)\n    ```\n\n8.  Attempt to find the smallest number of epochs and the greatest\
    \ learning rate that will train the network to match the function `x2 + 5`.\n\n\
    9.  If you are feeling more advanced, try altering the number of neurons in each\
    \ layer or altering the network itself.\n\nAs you worked through the previous\
    \ exercise, it may have occurred to you that there may be limitations to the network\
    \ itself and the data. In fact, that is exactly the case in the exercise. For\
    \ this particular example, the network attempts to overfit the data. We will look\
    \ at how to resolve both over- and underfitting in the next section.\n\n### Over-\
    \ and Underfitting\n\nOftentimes when newcomers design networks, their first assumption\
    \ is that having more neurons means better results. Unfortunately, this is rarely\
    \ the case for a number of reasons that we will understand in later chapters.\
    \ For now, we want to focus on how the network size itself can overfit or underfit\
    \ to the function.\n\nYou may often hear deep learners mention their network is\
    \ over- or underfitting to the data. What they really mean is that the network\
    \ is over- or underfitting to the function that matches or categorizes that data.\n\
    \nFigure [3-8](#502181_1_En_3_Chapter.xhtml#Fig8) shows our previous example plotted\
    \ against the function x2 + 5 to see how well we were actually matching to the\
    \ results. As you can see, we are not matching well—in fact not really well at\
    \ all considering the size of our network. However, the size of our network isn’t\
    \ the entire problem. Network size and the amount of data go almost hand in hand.\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig8_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8\n\nTrained model plotted against actual function x2 + 5\n\nThink\
    \ back to our previous exercise and our attempts to approximate to the function\
    \ x2 + 5\\. Our first couple of attempts used a set number of data points from\
    \ 1 to 10\\. We fed those data points into the function to generate `y` outputs.\
    \ This generated our set of trainable data, which we then broke up into training\
    \ and testing splits.\n\nFigure [3-9](#502181_1_En_3_Chapter.xhtml#Fig9) shows\
    \ the plot of the 10 data points we generated to train and approximate the function.\
    \ Of those points, we are removing 20 percent or 2 for test. This decreases the\
    \ number of points in the dataset and in essence the size of space in between\
    \ our training data.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig9_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9\n\nPlot of input dataset from Exercise 3-1 and Exercise 3-2\n\nThat\
    \ means when our model goes to approximate the function x2 + 5, it has large areas\
    \ between data. We call these areas the *latent* or *hidden space*. Again, this\
    \ is not to be confused with a gap, chasm, or vacuum in the data. This hidden\
    \ space in the data represents an area of the function missing any actual training\
    \ data. That means the network must approximate values between these data points.\n\
    \nAs it turns out, a big part of generative modeling is understanding how to extract\
    \ results from this latent space, as we will see throughout this book. It’s not\
    \ unlike how we tried to extract the results of our previous function approximation\
    \ exercise. Our previous assumption may have been to reduce the number of training\
    \ points, but as we can see now, this increases the size of the latent space,\
    \ causing our model to overfit to the function.\n\nOverfitting is caused when\
    \ a model approximates to a function but wrongly fills or approximates the latent\
    \ space. In our previous function approximation examples, this was clearly the\
    \ case, which was caused by two problems. The first was the lack of data, which\
    \ caused the network to estimate large areas of latent space. The second was the\
    \ size of our network, which had too much power to estimate the space in data.\
    \ So, it essentially made up values, which can be a problem.\n\nWhen a network\
    \ is large, it has a lot of power, in this case too much power. Large networks\
    \ can memorize data of all forms including images or video. This may be useful\
    \ for networks scoped to specific data, but in generative modeling as well as\
    \ most other machine learning disciplines, our goal is always to generalize.\n\
    \nGeneralizing is always a goal we will undertake when building models. That means\
    \ the data we feed into the model needs to be well distributed. Well-distributed\
    \ data provides us with even latent space between data. In our previous example,\
    \ our data was distributed into 10 bins, with values from 1–10\\. However, as\
    \ we can see, our data was not distributed well enough."
