    # 用注意力增强卷积


    注意力（自注意力）增强卷积的概念最早通过自注意力 GAN 论文引入。在该论文中，作者展示了如何利用多头自注意力机制来增强卷积层。


    图 7-6 摘自原始 SAGAN 论文，展示了一个增强注意力层的工作原理。从左侧输入侧开始，卷积输出进入该机制并被分割成 1×1 卷积层。输出的 `f(x)`
    代表 `keys` 头，`g(x)` 函数代表 `querys`，当然 `h(x)` 代表 `values`。


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig6_HTML.jpg](img/502181_1_En_7_Fig6_HTML.jpg)


    图 7-6


    应用于卷积层的多头自注意力


    回顾练习 7-1 中其余计算的应用方式，你就能从高层次理解多头自注意力是如何计算的。输出的自注意力特征图随后被传递到后续的卷积块中。在何处以及应用多少自注意力，取决于模型架构。在大多数情况下，你会将自注意力应用于模型的较低层和/或输出层。


    代码清单 7-1 摘自 `GEN_7_SAGAN.ipynb` 示例中的 `Self_Attn` 层类。`Self_Attn` 类为卷积增强的自注意力提供了一个封装器。我们将在本章后面查看完整示例，但请注意
    `query` 和 `key` 卷积层如何通过除以 8 来改变输入 `in_dim`，而值卷积保持不变。


    ```

    self.query_conv = nn.Conv2d(in_channels = in_dim , out_channels = in_dim//8 ,
    kernel_size= 1)

    self.key_conv = nn.Conv2d(in_channels = in_dim , out_channels = in_dim//8 , kernel_size=
    1)

    self.value_conv = nn.Conv2d(in_channels = in_dim , out_channels = in_dim , kernel_size=
    1)

    ```


    代码清单 7-1


    注意力卷积层


    在 `Self_Attn` 类的 `forward` 函数内部，我们可以看到自注意力机制的应用位置。除了使用 `view` 进行张量操作以及使用 `torch.bmm`（代表批量矩阵乘法）之外，代码清单
    7-2 中显示的代码与我们之前在练习 7-1 中介绍的内容类似。


    ```

    # forward 函数内部

    m_batchsize,C,width ,height = x.size()

    proj_query  = self.query_conv(x).view(m_batchsize,-1,width*height).permute(0,2,1)
    # B X CX(N)

    proj_key =  self.key_conv(x).view(m_batchsize,-1,width*height) # B X C x (*W*H)

    energy =  torch.bmm(proj_query,proj_key) # 转置检查

    attention = self.softmax(energy) # BX (N) X (N)

    proj_value = self.value_conv(x).view(m_batchsize,-1,width*height) # B X C X N

    out = torch.bmm(proj_value,attention.permute(0,2,1) )

    out = out.view(m_batchsize,C,width,height)

    out = self.gamma*out + x

    return out,attention

    ```


    代码清单 7-2


    `Self_Attn` 类的 `forward` 函数内部


    请注意，代码清单 7-2 中的 `forward` 函数有两个输出：经过注意力处理的输出 `out` 和计算出的 `attention` 图。虽然我们不会进一步投影这些输出，但可视化这些注意力图是可行的。我们可以通过练习
    7-2 来了解如何可视化这些注意力图。


    练习 7-2. 可视化自注意力图


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig7_HTML.jpg](img/502181_1_En_7_Fig7_HTML.jpg)


    图 7-7


    控制可视化选项的界面


    1.  在浏览器中打开 GitHub 项目站点上的 `https://epfml.github.io/attention-cnn/` 笔记本。


    2.  该网站是作为 ICLR 2020 上发表的论文《论自注意力与卷积层之间的关系》的一部分而开发的。


    3.  图 7-7 显示了可视化表格的起始部分，并提供了可视化三种类型注意力的选项。


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig8_HTML.jpg](img/502181_1_En_7_Fig8_HTML.jpg)


    图 7-8


    每层和每个头生成的注意力图


    1.  点击最右侧的 Vision Transformer，注意图像也会随之变化。


    2.  将鼠标悬停在图像上，你会看到下方表格中的注意力图随着你划过每个像素而更新。


    3.  图 7-8 展示了将像素悬停在鲨鱼图片上时得到的自注意力图示例。


    1.  仔细观察这些图，在许多图中你会看到鲨鱼的轮廓，这代表了该像素如何关注鲨鱼身上的其他特征。


    该网页和论文展示了模型每一层上的多头注意力。在某些情况下，你可能希望对模型中的每一层都应用注意力，而在其他情况下则可能不需要。


    截至 2020 年，卷积的增强注意力正变得相当流行，这是有充分理由的。注意力机制是一个强大的工具，可以为通过卷积或其他方式提取的特征提供学习到的上下文信息。然而，我们总是需要平衡两方面的改进，以构建一个好的生成器。因此，在将注意力应用于
    GAN 之前，我们想在下节中再次回顾训练平衡的重要性。


    ## GAN 中的 Lipschitz 连续性


    在本书的大部分内容中，我们都讨论了平衡生成器和判别器训练的必要性。没有平衡，如果任何一方变得过于精确，另一方就永远没有机会变得更好。


    举个例子，想象你正在训练成为一名冠军跑步运动员。你的训练对手很荣幸是地球上最快的人——尤塞恩·博尔特。你每天训练，并与尤塞恩比较你的进步。不幸的是，尤塞恩也在每天训练，并且进步和你一样多，甚至更多。由于你是在将自己的表现与博尔特的表现进行比较，你的收益以及你的表现开始下降。最终，你放弃了，决定在场边观看。


    同样的原理也适用于常规 GAN。由于生成器是根据判别器来衡量其性能的，如果判别器变得非常擅长区分真假，那么反馈给生成器的损失就会减少。反过来，生成器用于训练的损失也会减少，导致梯度消失问题。


    如果你正在训练一个 GAN，并注意到输出开始退化，这很可能是判别器变得过于优秀的迹象。当你的生成器似乎停止或不再改进时，则会发生相反的情况。这是判别器正在退化或已达到其最大潜力的迹象。


    因此，平衡是训练 GAN 的关键，我们之前已经研究过一些方法来更好地管理这个问题。回想一下我们在第 4 章中讨论的各种衡量和比较分布的方法。我们介绍了 WGAN，这是一种使用推土机距离算法来确定损失，而不是像
    KL 这样的散度函数的 GAN。


    由于 GAN 中的平衡点是判别器，我们通常首先着眼于它来改善平衡和训练稳定性。我们可以通过审视判别器试图逼近的函数的一个抽象属性来实现这一点。这个属性被称为
    Lipschitz 连续性，这将是我们在下一节中要介绍的内容。

    '
- fmt: "### What Is Lipschitz Continuity?\n\nLipschitz continuity is a mathematical\
    \ property of a function that defines a subclass with uniform continuity. That\
    \ is, a function is Lipschitz continuous if it is uniformly continuous across\
    \ its entire graph. This means the slope for every pair of points on the graph\
    \ must be within some value or constant.\n\nFigure [7-9](#502181_1_En_7_Chapter.xhtml#Fig9)\
    \ shows two functions, `f(x) = sin(x)` and `f(x) = x²`. The first function is\
    \ Lipschitz continuous since the bounding lines that demonstrate the continuity\
    \ of change don’t intersect the graph. Alternatively, the second function is not\
    \ Lipschitz continuous since the bounding lines do intersect the graph when the\
    \ Lipschitz constant is equal to 1.0. While we could increase the constant/slope,\
    \ our preference for stability is to remain at 1.\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig9_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig9_HTML.jpg)\n\
    \n**Figure 7-9**  \nExample of continuous and discontinuous Lipschitz functions\n\
    \nIn the WGAN, with the use of the earth mover’s function, the discriminator tries\
    \ to stay Lipschitz continuous since the function approximates a continuous function.\
    \ However, remember since our network is approximating a function, it could infer\
    \ one that still breaks discontinuity.\n\nWe can control the LS continuity of\
    \ a function through a Lipschitz constraint or a measure to control how much a\
    \ function changes using a few different forms. The constraint is called a *1-Lipschitz\
    \ constraint* since we look to enforce the change to a constant of 1. The forms\
    \ listed here are what we typically consider when employing some form of constraint\
    \ training gradients:\n\n- **“Soft” 1-Lipschitz constraint**: The gradient function\
    \ is forced to equal or be close to 1 on average. Thus, some function points may\
    \ have high values, while others low.\n- **“Hard” 1-Lipschitz constraint**: This\
    \ forces the gradient to be lower or equal to one at every point. This typically\
    \ works well for adversarial training.\n- **“Gradient” 1-Lipschitz constraint**:\
    \ This forces the gradient to be almost 1 everywhere. This is not typically used\
    \ in other ML areas but is required when training over Wasserstein distance.\n\
    \nTo enforce 1-Lipschitz constraints over gradients, we typically use two methods,\
    \ weight clipping and spectral normalization. Weight clipping, or penalizing the\
    \ gradient, ensures that weights are clipped such that the Lipschitz constant\
    \ is less than 1. We have used the `gradient_penalty` function shown in listing\
    \ [7-3](#502181_1_En_7_Chapter.xhtml#PC9) throughout the last few chapters for\
    \ weight clipping.\n\n```\n#@title HELPER FUNCTION - COMPUTE GRADIENT PENALTY\n\
    def compute_gradient_penalty(D, real_samples, fake_samples, labels):\n\"\"\"Calculates\
    \ the gradient penalty loss for WGAN GP\"\"\"\n# Random weight term for interpolation\
    \ between real and fake samples\nalpha = FloatTensor(np.random.random((real_samples.size(0),\
    \ 1, 1, 1)))\n# Get random interpolation between real and fake samples\ninterpolates\
    \ = (alpha * real_samples + ((1 - alpha) * fake_samples)).requires_grad_(True)\n\
    d_interpolates = D(interpolates, labels)\nfake = Variable(FloatTensor(np.ones(d_interpolates.shape)),\
    \ requires_grad=False)\n# Get gradient w.r.t. interpolates\ngradients = autograd.grad(\n\
    outputs=d_interpolates,\ninputs=interpolates,\ngrad_outputs=fake,\ncreate_graph=True,\n\
    retain_graph=True,\nonly_inputs=True,\n)[0]\ngradients = gradients.view(gradients.size(0),\
    \ -1)\ngradient_penalty = ((gradients.norm(2, dim=1) - 1) ** 2).mean()\nreturn\
    \ gradient_penalty\n```\n\n**Listing 7-3**  \n`gradient_penalty` Function\n\n\
    The problem with weight clipping in this manner is that approximated functions\
    \ always assume a Lipschitz constant less than 1. This means that the approximated\
    \ function is more gradual with smoother hills and valleys. This in turn can wash\
    \ out important details in the replicated output we are looking to produce.\n\n\
    Spectral normalization is a method that relies on a singular value decomposition\
    \ of the gradient tensor that produces a sigma value for each element. By taking\
    \ the largest sigma value of the tensor and dividing it by all values, we can\
    \ be assured that the maximum is 1, confirming that the function is 1-Lipschitz\
    \ continuous.\n\nListing [7-4](#502181_1_En_7_Chapter.xhtml#PC10) shows the `SpectralNorm`\
    \ class’s `compute_weight` function we will use as a method to constrain gradients\
    \ when training. This function uses SVD to determine the value of sigma and then\
    \ divides all the weights by sigma to assure none is greater than 1.\n\n```\n\
    def compute_weight(self, module):\nweight = getattr(module, self.name + '_orig')\n\
    u = getattr(module, self.name + '_u')\nsize = weight.size()\nweight_mat = weight.contiguous().view(size[0],\
    \ -1)\nwith torch.no_grad():\nv = weight_mat.t() @ u\nv = v / v.norm()\nu = weight_mat\
    \ @ v\nu = u / u.norm()\nsigma = u @ weight_mat @ v\nweight_sn = weight / sigma\n\
    ```\n\n**Listing 7-4**  \nSpectral Normalization `compute_weight` Function\n\n\
    We can see how both methods work to help improve discriminator training and the\
    \ balance of a GAN in the next exercise. While both methods can work separately\
    \ as we have seen with gradient penalties in previous chapters, Exercise 7-3 demonstrates\
    \ both.\n\n### EXERCISE 7-3. LIPSCHITZ CONTINUITY IN GANS\n\n1. Open the `GEN_7_Lipschitz_GAN.ipynb`\
    \ notebook from the GitHub project site. Run the entire notebook.\n2. This code\
    \ example is nearly identical to the Chapter [4](#502181_1_En_4_Chapter.xhtml)\
    \ `GEN_4_DCGAN.ipynb` exercise notebook. The only difference here is that gradient\
    \ penalty loss and spectral normalization have been added.\n3. Adding gradient\
    \ penalty loss and spectral normalization is relatively easy. The following code\
    \ shows a discriminator and internal convolution block with the `SpectralNorm`\
    \ class wrapping the convolutional layer.\n\n```\n    class Discriminator(nn.Module):\n\
    \    def __init__(self):\n    super(Discriminator, self).__init__()\n    def discriminator_block(in_filters,\
    \ out_filters, bn=True):\n    block = [SpectralNorm(nn.Conv2d(in_filters, out_filters,\
    \ 3, 2, 1)),\n    nn.LeakyReLU(0.2, inplace=True), nn.Dropout2d(0.25)]\n    if\
    \ bn:\n    block.append(nn.BatchNorm2d(out_filters, 0.8))\n    return block\n\
    ```\n\n4. We could just as easily add spectral normalization to the generator\
    \ convolutional layers using the `SpectralNorm` class. The generator is kept clean\
    \ here to focus on the discriminator.\n5. If we move down to the training block,\
    \ we can again review how the gradient penalty loss is applied to the discriminator\
    \ loss with the following:\n\n```\n    real_loss = loss_fn(discriminator(real_imgs),\
    \ valid)\n    fake_loss = loss_fn(discriminator(gen_imgs.detach()), fake)\n  \
    \  # Gradient penalty\n    gradient_penalty = compute_gradient_penalty(discriminator,\
    \ real_imgs.data, gen_imgs.data)\n    loss_D = real_loss + fake_loss + hp.lambda_gp\
    \ * gradient_penalty\n```\n\n6. `lambda_gp` is the scale hyperparameter that adjusts\
    \ how much of the gradient penalty to apply to the total calculation of loss.\
    \ You can refer to the `gradient_penalty` function by scrolling up a few blocks\
    \ in the notebook.\n7. This notebook will generally take much longer to stabilize,\
    \ so the output may appear quite random at start. Just realize that is a consequence\
    \ of maintaining Lipschitz continuity. Be patient and let the sample train for\
    \ a few hours to notice the increase in the number of details generated.\n\nNow\
    \ that we have completed our divergence on Lipschitz continuity in GANs, we return\
    \ to our work with self-attention and the self-attention GAN in the next section."
  raw: "### What Is Lipschitz Continuity?\n\nLipschitz continuity is a mathematical\
    \ property of a function that defines a subclass with uniform continuity. That\
    \ is a function of Lipschitz continuity if it is uniformly continuous across its\
    \ entire graph. This means the slope for every pair of points on the graph must\
    \ be within some value or constant.\n\nFigure [7-9](#502181_1_En_7_Chapter.xhtml#Fig9)\
    \ shows two functions, *f*(*x*) =  *sin* (*x*) ∧ *f*(*x*) = *x*². The first function\
    \ is Lipschitz continuous since the bounding lines that demonstrate the continuity\
    \ of change don’t intersect the graph. Alternatively, the second function is not\
    \ Lipschitz continuous since the bounding lines do intersect the graph when the\
    \ Lipschitz constant is equal to 1.0\\. While we could increase the constant/slope,\
    \ our preference for stability is to remain at 1.\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig9_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9\n\nExample of continuous and discontinuous Lipschitz functions\n\n\
    In the WGAN, with the use of the earth mover’s function, the discriminator tries\
    \ to stay Lipschitz continuous since the function approximates a continuous function.\
    \ However, remember since our network is approximating a function, it could infer\
    \ one that still breaks discontinuity.\n\nWe can control the LS continuity of\
    \ a function through a Lipschitz constraint or a measure to control how much a\
    \ function changes using a few different forms. The constraint is called a *1-Lipschitz\
    \ constraint* since we look to enforce the change to a constant of 1. The forms\
    \ listed here are what we typically consider when employing some form of constraint\
    \ training gradients:\n\n*   **“Soft” 1-Lipschitz constraint**: The gradient function\
    \ is forced to equal or be close to 1 on average. Thus, some function points may\
    \ have high values, while others low.\n\n*   **“Hard” 1-Lipschitz constraint**:\
    \ This forces the gradient to be lower or equal to one at every point. This typically\
    \ works well for adversarial training.\n\n*   **“Gradient” 1-Lipschitz constraint**:\
    \ This forces the gradient to be almost 1 everywhere. This is not typically used\
    \ in other ML areas but is required when training over Wasserstein distance.\n\
    \nTo enforce 1-Lipschitz constraints over gradients, we typically use two methods,\
    \ weight clipping and spectral normalization. Weight clipping, or penalizing the\
    \ gradient, ensures that weights are clipped such that the Lipschitz constant\
    \ is less than 1\\. We have used the `gradient_penalty` function shown in listing\
    \ [7-3](#502181_1_En_7_Chapter.xhtml#PC9) throughout the last few chapters for\
    \ weight clipping.\n\n```\n#@title HELPER FUNCTION - COMPUTE GRADIENT PENALTY\n\
    def compute_gradient_penalty(D, real_samples, fake_samples, labels):\n\"\"\"Calculates\
    \ the gradient penalty loss for WGAN GP\"\"\"\n# Random weight term for interpolation\
    \ between real and fake samples\nalpha = FloatTensor(np.random.random((real_samples.size(0),\
    \ 1, 1, 1)))\n# Get random interpolation between real and fake samples\ninterpolates\
    \ = (alpha * real_samples + ((1 - alpha) * fake_samples)).requires_grad_(True)\n\
    d_interpolates = D(interpolates, labels)\nfake = Variable(FloatTensor(np.ones(d_interpolates.shape)),\
    \ requires_grad=False)\n# Get gradient w.r.t. interpolates\ngradients = autograd.grad(\n\
    outputs=d_interpolates,\ninputs=interpolates,\ngrad_outputs=fake,\ncreate_graph=True,\n\
    retain_graph=True,\nonly_inputs=True,\n)[0]\ngradients = gradients.view(gradients.size(0),\
    \ -1)\ngradient_penalty = ((gradients.norm(2, dim=1) - 1) ** 2).mean()\nreturn\
    \ gradient_penalty\nListing 7-3\ngradient_penalty Function\n```\n\nThe problem\
    \ with weight clipping in this manner is that approximated functions always assume\
    \ a Lipschitz constant less than 1\\. This means that the approximated function\
    \ is more gradual with smoother hills and valleys. This in turn can wash out important\
    \ details in the replicated output we are looking to produce.\n\nSpectral normalization\
    \ is a method that relies on a singular value decomposition of the gradient tensor\
    \ that produces a sigma value for each element. By taking the largest sigma value\
    \ of the tensor and dividing it by all values, we can be assured that the maximum\
    \ is 1, confirming that the function is 1-Lipschitz continuous.\n\nListing [7-4](#502181_1_En_7_Chapter.xhtml#PC10)\
    \ shows the `SpectralNorm` class’s `compute_weight` function we will use as a\
    \ method to constrain gradients when training. This function uses SVD to determine\
    \ the value of sigma and then divides all the weights by sigma to assure none\
    \ is greater than 1.\n\n```\ndef compute_weight(self, module):\nweight = getattr(module,\
    \ self.name + '_orig')\nu = getattr(module, self.name + '_u')\nsize = weight.size()\n\
    weight_mat = weight.contiguous().view(size[0], -1)\nwith torch.no_grad():\nv =\
    \ weight_mat.t() @ u\nv = v / v.norm()\nu = weight_mat @ v\nu = u / u.norm()\n\
    sigma = u @ weight_mat @ v\nweight_sn = weight / sigma\nListing 7-4\nSpectral\
    \ Normalization compute_weight Function\n```\n\nWe can see how both methods work\
    \ to help improve discriminator training and the balance of a GAN in the next\
    \ exercise. While both methods can work separately as we have seen with gradient\
    \ penalties in previous chapters, but Exercise 7-3 demonstrates both.\n\nEXERCISE\
    \ 7-3\\. LIPSCHITZ CONTINUITY IN GANS\n\n1.  Open the `GEN_7_Lipschitz_GAN.ipynb`\
    \ notebook from the GitHub project site. Run the entire notebook.\n\n2.  This\
    \ code example is nearly identical to the Chapter [4](#502181_1_En_4_Chapter.xhtml)\
    \ `GEN_4_DCGAN.ipynb` exercise notebook. The only difference here is that gradient\
    \ penalty loss and spectral normalization have been added.\n\n3.  Adding gradient\
    \ penalty loss and spectral normalization is relatively easy. The following code\
    \ shows a discriminator and internal convolution block with the `SpectralNorm`\
    \ class wrapping the convolutional layer.\n\n```\n    class Discriminator(nn.Module):\n\
    \    def __init__(self):\n    super(Discriminator, self).__init__()\n    def discriminator_block(in_filters,\
    \ out_filters, bn=True):\n    block = [SpectralNorm(nn.Conv2d(in_filters, out_filters,\
    \ 3, 2, 1)),\n    nn.LeakyReLU(0.2, inplace=True), nn.Dropout2d(0.25)]\n    if\
    \ bn:\n    block.append(nn.BatchNorm2d(out_filters, 0.8))\n    return block\n\
    \    ```\n\n4.  We could just as easily add spectral normalization to the generator\
    \ convolutional layers using the `SpectralNorm` class. The generator is kept clean\
    \ here to focus on the discriminator.\n\n5.  If we move down to the training block,\
    \ we can again review how the gradient penalty loss is applied to the discriminator\
    \ loss with the following:\n\n```\n    real_loss = loss_fn(discriminator(real_imgs),\
    \ valid)\n    fake_loss = loss_fn(discriminator(gen_imgs.detach()), fake)\n  \
    \  # Gradient penalty\n    gradient_penalty = compute_gradient_penalty(discriminator,\
    \ real_imgs.data, gen_imgs.data)\n    loss_D = real_loss + fake_loss + hp.lambda_gp\
    \ * gradient_penalty\n    ```\n\n6.  `lambda_gp` is the scale hyperparameter that\
    \ adjusts how much of the gradient penalty to apply to the total calculation of\
    \ loss. You can refer to the `gradient_penalty` function by scrolling up a few\
    \ blocks in the notebook.\n\n7.  This notebook will generally take much longer\
    \ to stabilize, so the output may appear quite random at start. Just realize that\
    \ is a consequence of maintaining Lipschitz continuity. Be patient and let the\
    \ sample train for a few hours to notice the increase in the number of details\
    \ generated.\n\nNow that we have completed our divergence on Lipschitz continuity\
    \ in GANs, we return to our work with self-attention and the self-attention GAN\
    \ in the next section."
  trans: "\n### 什么是利普希茨连续性？\n\n利普希茨连续性是一个函数的数学性质，它定义了具有一致连续性的子类。也就是说，如果一个函数在其整个图像上是一致连续的，那么它就是利普希茨连续的。这意味着图像上每一对点之间的斜率都必须位于某个值或常数之内。\n\
    \n图 7-9 展示了两个函数：`f(x) = sin(x)` 和 `f(x) = x²`。第一个函数是利普希茨连续的，因为展示变化连续性的边界线没有与图像相交。相反，第二个函数不是利普希茨连续的，因为当利普希茨常数等于\
    \ 1.0 时，边界线与图像相交了。虽然我们可以增大这个常数/斜率，但出于稳定性的考虑，我们更倾向于将其保持在 1。\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig9_HTML.jpg](img/502181_1_En_7_Fig9_HTML.jpg)\n\
    \n**图 7-9**  \n连续与非连续利普希茨函数的示例\n\n在 WGAN 中，通过使用推土机距离函数，判别器试图保持利普希茨连续性，因为该函数近似于一个连续函数。然而，请记住，由于我们的网络是在近似一个函数，它可能会推断出一个仍然破坏连续性的函数。\n\
    \n我们可以通过利普希茨约束或一种度量来控制函数的 LS 连续性，这种度量使用几种不同的形式来控制函数的变化程度。该约束被称为 *1-利普希茨约束*，因为我们力求将变化强制为常数\
    \ 1。以下列出的形式是我们在采用某种形式的约束训练梯度时通常考虑的：\n\n- **“软” 1-利普希茨约束**：梯度函数被强制平均等于或接近 1。因此，某些函数点的值可能很高，而其他点的值则很低。\n\
    - **“硬” 1-利普希茨约束**：这强制每个点的梯度都小于或等于 1。这通常适用于对抗训练。\n- **“梯度” 1-利普希茨约束**：这强制梯度在几乎所有地方都接近\
    \ 1。这通常不用于其他机器学习领域，但在基于 Wasserstein 距离进行训练时是必需的。\n\n为了对梯度实施 1-利普希茨约束，我们通常使用两种方法：权重裁剪和谱归一化。权重裁剪，或对梯度进行惩罚，确保权重被裁剪，使得利普希茨常数小于\
    \ 1。我们在前几章中一直使用清单 7-3 中所示的 `gradient_penalty` 函数进行权重裁剪。\n\n```\n#@title 辅助函数 -\
    \ 计算梯度惩罚\ndef compute_gradient_penalty(D, real_samples, fake_samples, labels):\n\
    \"\"\"计算 WGAN GP 的梯度惩罚损失\"\"\"\n# 用于在真实样本和虚假样本之间插值的随机权重项\nalpha = FloatTensor(np.random.random((real_samples.size(0),\
    \ 1, 1, 1)))\n# 获取真实样本和虚假样本之间的随机插值\ninterpolates = (alpha * real_samples + ((1\
    \ - alpha) * fake_samples)).requires_grad_(True)\nd_interpolates = D(interpolates,\
    \ labels)\nfake = Variable(FloatTensor(np.ones(d_interpolates.shape)), requires_grad=False)\n\
    # 获取关于插值的梯度\ngradients = autograd.grad(\noutputs=d_interpolates,\ninputs=interpolates,\n\
    grad_outputs=fake,\ncreate_graph=True,\nretain_graph=True,\nonly_inputs=True,\n\
    )[0]\ngradients = gradients.view(gradients.size(0), -1)\ngradient_penalty = ((gradients.norm(2,\
    \ dim=1) - 1) ** 2).mean()\nreturn gradient_penalty\n```\n\n**清单 7-3**  \n`gradient_penalty`\
    \ 函数\n\n以这种方式进行权重裁剪的问题在于，近似函数总是假设利普希茨常数小于 1。这意味着近似函数更加平缓，具有更平滑的山丘和山谷。这反过来可能会冲淡我们试图生成的复制输出中的重要细节。\n\
    \n谱归一化是一种依赖于对梯度张量进行奇异值分解的方法，它为每个元素生成一个 sigma 值。通过取张量的最大 sigma 值并将其除以所有值，我们可以确保最大值是\
    \ 1，从而确认该函数是 1-利普希茨连续的。\n\n清单 7-4 展示了 `SpectralNorm` 类的 `compute_weight` 函数，我们将在训练时将其用作约束梯度的方法。该函数使用\
    \ SVD 来确定 sigma 的值，然后将所有权重除以 sigma，以确保没有权重大于 1。\n\n```\ndef compute_weight(self,\
    \ module):\nweight = getattr(module, self.name + '_orig')\nu = getattr(module,\
    \ self.name + '_u')\nsize = weight.size()\nweight_mat = weight.contiguous().view(size[0],\
    \ -1)\nwith torch.no_grad():\nv = weight_mat.t() @ u\nv = v / v.norm()\nu = weight_mat\
    \ @ v\nu = u / u.norm()\nsigma = u @ weight_mat @ v\nweight_sn = weight / sigma\n\
    ```\n\n**清单 7-4**  \n谱归一化 `compute_weight` 函数\n\n在下一个练习中，我们将看到这两种方法如何帮助改进判别器训练以及\
    \ GAN 的平衡。虽然这两种方法可以像我们在前几章中看到的梯度惩罚那样单独使用，但练习 7-3 将演示两者的结合。\n\n### 练习 7-3. GAN\
    \ 中的利普希茨连续性\n\n1. 从 GitHub 项目站点打开 `GEN_7_Lipschitz_GAN.ipynb` 笔记本。运行整个笔记本。\n2.\
    \ 此代码示例与第 4 章的 `GEN_4_DCGAN.ipynb` 练习笔记本几乎相同。唯一的区别是这里添加了梯度惩罚损失和谱归一化。\n3. 添加梯度惩罚损失和谱归一化相对容易。以下代码展示了一个判别器及其内部卷积块，其中\
    \ `SpectralNorm` 类包装了卷积层。\n\n```\n    class Discriminator(nn.Module):\n    def\
    \ __init__(self):\n    super(Discriminator, self).__init__()\n    def discriminator_block(in_filters,\
    \ out_filters, bn=True):\n    block = [SpectralNorm(nn.Conv2d(in_filters, out_filters,\
    \ 3, 2, 1)),\n    nn.LeakyReLU(0.2, inplace=True), nn.Dropout2d(0.25)]\n    if\
    \ bn:\n    block.append(nn.BatchNorm2d(out_filters, 0.8))\n    return block\n\
    ```\n\n4. 我们同样可以轻松地使用 `SpectralNorm` 类将谱归一化添加到生成器的卷积层。这里保持生成器简洁，以便专注于判别器。\n5.\
    \ 如果我们向下滚动到训练块，可以再次回顾如何通过以下方式将梯度惩罚损失应用于判别器损失：\n\n```\n    real_loss = loss_fn(discriminator(real_imgs),\
    \ valid)\n    fake_loss = loss_fn(discriminator(gen_imgs.detach()), fake)\n  \
    \  # 梯度惩罚\n    gradient_penalty = compute_gradient_penalty(discriminator, real_imgs.data,\
    \ gen_imgs.data)\n    loss_D = real_loss + fake_loss + hp.lambda_gp * gradient_penalty\n\
    ```\n\n6. `lambda_gp` 是缩放超参数，用于调整将多少梯度惩罚应用于总损失计算。您可以通过在笔记本中向上滚动几个块来参考 `gradient_penalty`\
    \ 函数。\n7. 这个笔记本通常需要更长的时间才能稳定下来，因此输出在开始时可能看起来相当随机。只需认识到这是维持利普希茨连续性的一个后果。请耐心等待，让样本训练几个小时，以注意到生成的细节数量增加。\n\
    \n现在我们已经完成了对 GAN 中利普希茨连续性的探讨，我们将在下一节回到自注意力和自注意力 GAN 的工作中。\n"
- fmt: "# Building the Self-Attention GAN\n\nWhat the authors of the original SAGAN\
    \ paper discovered was that the self-attention mechanism caused the discriminator\
    \ to lose Lipschitz continuity even when trying to balance training with a gradient\
    \ penalty and/or Wasserstein distance. They therefore implemented a fix using\
    \ spectral normalization in a form we just covered in the previous section.\n\n\
    By incorporating self-attention and the required constraints, aka spectral normalization,\
    \ the authors were able to convert a simple DCGAN into a SAGAN. This in turn produced\
    \ some incredible results for straight blind sample generation, not image-to-image\
    \ translation.\n\nIn Exercise 7-4, we look at a base implementation of the SAGAN\
    \ trained to generate faces from the CelebA dataset. Keep in mind that this generator\
    \ (GAN) is completely blind generating faces just using convolution with self-attention.\
    \ Of course, to balance the training, we throw in some spectral normalization\
    \ to avoid things getting crazy.\n\n## EXERCISE 7-4. BUILDING AND TRAINING THE\
    \ SAGAN\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig10_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig10_HTML.jpg)\n\
    \n**Figure 7-10** Example output from training exercise `GEN_7_DCGAN_SAGAN.ipynb`\n\
    \n1. Open the `GEN_7_DCGAN_SAGAN.ipynb` notebook from the GitHub project site.\
    \ Run the entire notebook.\n\n2. This code example is nearly identical to the\
    \ Chapter 4 `GEN_4_DCGAN.ipynb` exercise notebook. The key differences here are\
    \ the addition of self-attention and spectral normalization in the models.\n\n\
    3. We can see how the self-attention layers are added to the models by scrolling\
    \ down to the `Generator` class definition and viewing the layer configuration\
    \ and the start of the `forward` function shown here:\n\n```\nself.attn1 = Self_Attn(\
    \ 512, 'relu')\nself.attn2 = Self_Attn( 256, 'relu')\nself.attn3 = Self_Attn(\
    \ 128, 'relu')\nself.attn4 = Self_Attn( 64,  'relu')\ndef forward(self, z):\n\
    \    z = z.view(z.size(0), z.size(1), 1, 1)\n    out=self.l1(z)\n    out,_ = self.attn1(out)\n\
    \    out=self.l2(out)\n    out,_ = self.attn2(out)\n    out=self.l3(out)\n   \
    \ out,p1 = self.attn3(out)\n    out=self.l4(out)\n    out,p2 = self.attn4(out)\n\
    \    out=self.last(out)\n    return out, p1, p2\n```\n\n4. Likewise, self-attention\
    \ can be added to the `Discriminator` class in the same manner as shown here:\n\
    \n```\nself.attn1 = Self_Attn(64, 'relu')\nself.attn2 = Self_Attn(128, 'relu')\n\
    self.attn3 = Self_Attn(256, 'relu')\nself.attn4 = Self_Attn(512, 'relu')\ndef\
    \ forward(self, x):\n    out = self.l1(x)\n    out,p0 = self.attn1(out)\n    out\
    \ = self.l2(out)\n    out,p0 = self.attn2(out)\n    out = self.l3(out)\n    out,p1\
    \ = self.attn3(out)\n    out=self.l4(out)\n    out,p2 = self.attn4(out)\n    out=self.last(out)\n\
    \    return out.squeeze(), p1, p2\n```\n\n5. All the layers in this model use\
    \ self-attention in between. However, you can adjust this behavior by simply commenting\
    \ out the attention layers you don’t want in the model. Adding attention layers\
    \ decreases training performance due to extra calculations and the increased need\
    \ to balance Lipschitz continuity.\n\n6. If you want, you can comment out some\
    \ of all the attention layers to see what effect this has on training. If you\
    \ do so, be sure to adjust the attention outputs of the model (`p1`, `p2`).\n\n\
    7. Finally, in the training block, we can see how this is all pulled together\
    \ to calculate loss, as shown here:\n\n```\nd_out_real,dr1,dr2 = discriminator(real_images)\n\
    #hinge loss\nd_loss_real = torch.nn.ReLU()(1.0 - d_out_real).mean()\nz = tensor2var(torch.randn(real_images.size(0),\
    \ hp.latent_dim))\nfake_images,gf1,gf2 = generator(z)\nd_out_fake,df1,df2 = discriminator(fake_images)\n\
    #hinge loss\nd_loss_fake = torch.nn.ReLU()(1.0 + d_out_fake).mean()\n# Backward\
    \ + Optimize\nd_loss = (d_loss_real + d_loss_fake) / 2\nd_loss.backward()\noptimizer_D.step()\n\
    ```\n\n8. In this example, we use hinge loss to determine the loss by passing\
    \ the output through a `ReLU` function and taking the mean. This is just a means\
    \ for controlling negative loss. Notice how the attention map outputs from the\
    \ discriminator are not used.\n\n9. Figure 7-10 shows the output of training this\
    \ exercise for a few hours (Epoch14). Notice the quality of the output, and keep\
    \ in mind that all the faces are not real people. These faces are generated completely\
    \ blind.\n\nThe output of the previous exercise is quite impressive when you consider\
    \ the generator is completely working blind when generating the faces. This contrasts\
    \ with the image to image models we looked at in the past couple chapters.\n\n\
    From here we can only go up, as they say, and in the next chapter we will look\
    \ to improve on this example to look at generating conditional faces while also\
    \ incorporating a residual network for better sample generation."
