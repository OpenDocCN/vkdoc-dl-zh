  trans: "\n## 使用 WGAN 解决距离问题\n\n解决生成器与判别器之间分布或期望数据分布的一种方法是让它不成问题。这听起来可能过于简化了一个复杂的问题，而事实也确实可能如此。然而，如果我们能找到另一种衡量两个期望分布之间差异的方法呢？\n\
    \n简单来说，Wasserstein 距离是一种衡量两个分布（无论是期望的还是真实的）之间差异的方法，它使用一个单一的标量距离，该距离由将一个分布转换为另一个分布所需的工作量来衡量。描述这一方法的常用思路是想象两堆泥土。两堆泥土质量/大小相等，但形状不同。Wasserstein\
    \ 度量或距离就是将第一堆泥土转换为第二堆所需的工作量，如图 4-3 所示。\n\n这意味着我们忽略两个分布之间的距离，这可以大大简化数学计算。由于我们不再担心距离问题，损失函数得以简化，进而成为真实与虚假之间的差异。这也意味着判别器不再能区分什么是真实或虚假，而只是进行评判。因此，我们现在将判别器称为*评论家*。\n\
    \n这种衡量两个分布之间距离的方法也被称为*推土机距离*。这个术语表示使用离散量将材料/泥土从一堆移动到另一堆所需的工作量。简单来说，你可以想象一辆卡车需要运输多少次才能将一堆泥土从一个位置移动到另一个位置。\n\
    \n所有这些数学计算将评论家和生成器的损失函数简化为以下形式：\n\n评论家损失：`D(x) - D(G(z))`\n\n生成器损失：`D(G(z))`\n\
    \n这里的另一个关键区别是生成器试图最大化函数，而在标准 GAN 中，生成器是最小化损失。\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig3_HTML.jpg](img/502181_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3\n\nWasserstein 距离解释\n\n这些假设还导致了其他几个关键区别。首先，网络中的权重需要被限制在某个范围内，以避免评论家/判别器中的梯度消失或爆炸。其次，我们需要增加评论家的训练迭代次数，以便它能更快地逼近真实分布。\n\
    \n现在我们对这些概念的工作原理有了一些了解，让我们深入另一个代码示例，看看它在实践中是如何运作的。在练习 4-2 中，我们将研究一个基于 MNIST 时尚数据集训练的\
    \ WGAN 实现。学习这些基础训练数据集对于更好地理解 GAN 之间的差异非常重要。\n\n练习 4-2. 探索 WGAN\n\n1.  从 GitHub\
    \ 项目站点打开 `GEN_4_WGAN.ipynb` 笔记本。如果不确定如何操作，请参考附录 B。\n\n2.  通过选择“运行时” ➤ “全部运行”来运行整个笔记本。然后跳过\
    \ `imports` 单元格，找到第一个包含 `Hyperparameters` 类的单元格，并检查新的超参数 `n_critic` 和 `clip_value`：\n\
    \n```\nclass Hyperparameters(object):\n    def __init__(self, **kwargs):\n   \
    \     self.__dict__.update(kwargs)\nhp = Hyperparameters(n_epochs=200,\n     \
    \                batch_size=64,\n                     lr=0.00005,\n          \
    \           n_cpu=8,\n                     latent_dim=100,\n                 \
    \    img_size=32,\n                     channels=1,\n                     n_critic=25,\n\
    \                     clip_value=.005,\n                     sample_interval=400)\n\
    ```\n\n3.  新的超参数是 `n_critic` 和 `clip_value`。`n_critic` 定义了训练中评论家的迭代次数，`clip_value`\
    \ 设置了评论家/判别器中权重的限制范围。\n\n4.  你可以向下滚动到最后一个代码块，即训练块。本示例中的大部分代码我们已在之前的示例中介绍过，因此这里无需重复。\n\
    \n5.  我们将重点关注从判别器/评论家损失开始的训练代码内部块，如下所示：\n\n```\nvalid = Variable(Tensor(imgs.shape[0],\
    \ 1).fill_(1.0), requires_grad=False)\nfake = Variable(Tensor(imgs.shape[0], 1).fill_(0.0),\
    \ requires_grad=False)\nreal_imgs = Variable(imgs.type(Tensor))\noptimizer_G.zero_grad()\n\
    z = Variable(Tensor(np.random.normal(0, 1,\n                (imgs.shape[0], hp.latent_dim))))\n\
    fake_imgs = generator(z).detach()\nd_loss = -torch.mean(discriminator(real_imgs))\
    \ + torch.mean(discriminator(fake_imgs))\nd_loss.backward()\noptimizer_D.step()\n\
    ```\n\n6.  顶部部分生成了我们之前见过的有效和虚假张量的真实标签。之后，我们看到从批次中提取的 `real_imgs` 以及从随机 `z` 生成的\
    \ `fake_imgs`。接着，评论家/判别器损失通过将 `fake_imgs` 传入判别器的均值减去 `real_imgs` 传入判别器的均值来计算。在标准\
    \ GAN 中，我们会使用二元交叉熵函数来衡量损失。\n\n7.  接下来，我们将查看执行权重限制的代码。我们再次需要将权重限制在一个狭窄的窗口内，以避免梯度爆炸。\n\
    \n```\nfor p in discriminator.parameters():\n    p.data.clamp_(-hp.clip_value,\
    \ hp.clip_value)\n```\n\n8.  之后，我们开始控制生成器损失迭代的部分，以 `if` 语句开头：\n\n```\nif i % hp.n_critic\
    \ == 0:\n    optimizer_G.zero_grad()\n    gen_imgs = generator(z)\n    g_loss\
    \ = -torch.mean(discriminator(gen_imgs))\n    g_loss.backward()\n    optimizer_G.step()\n\
    ```\n\n9.  `if` 语句控制生成器在每次评论家训练轮次后如何运行。之后，大部分代码是熟悉的，但请注意生成器损失 `g_loss` 计算的简化。\n\
    \n考虑到我们最近在运行更高级的 GAN（如 DCGAN）方面的探索，这个训练示例的输出可能会有些令人失望。很明显，WGAN 并不适合或不足以学习 MNIST\
    \ 时尚数据集。如果我们使用不同的数据集，我们期望得到更好的结果。那么，MNIST 时尚数据集有什么问题呢？\n\n时尚数据集的问题在于图像的构成过于多样化，难以轻松学习一个通用或广义的期望分布。换句话说，鞋子的图片与毛衣或裤子的图片差异太大。随着我们尝试训练的数据类别或领域增多，这个问题会变得更加复杂。\n\
    \n虽然我们可以通过特征提取（如我们在 DCGAN 中所做的那样）来解决学习多样化领域的问题，但理想情况下，我们希望通过研究如何管理或表征跨领域或类别的损失来解决问题的根本原因。在下一节中，我们将研究一种这样的方法。\n"
- fmt: "# Discretizing Boundary-Seeking GANs\n\nWe can characterize visual differences\
    \ in images or other data as classes. In the MNIST fashion dataset there are 10\
    \ classes that have similarities and key differences. Figure [4-4](#502181_1_En_4_Chapter.xhtml#Fig4)\
    \ shows the differences between the classes of data in the fashion set.\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig4_HTML.jpg](images/502181_1_En_4_Chapter/502181_1_En_4_Fig4_HTML.jpg)\n\
    \n**Figure 4-4** Visualizing the boundaries in the fashion MNIST data\n\nIn Figure\
    \ [4-4](#502181_1_En_4_Chapter.xhtml#Fig4), you can clearly see how some classes\
    \ are visually similar, while other classes are not. If we reduced our training\
    \ dataset to just the first five classes (T-shirt, Trouser, Pullover, Dress, and\
    \ Coat), our model generation would be simpler.\n\nFor this example, we are equating\
    \ our visual perception of an image to an expected distribution. That generally\
    \ works well, provided the data can be easily generalized. If we look at the Sandals\
    \ group from Figure [4-4](#502181_1_En_4_Chapter.xhtml#Fig4), notice the visual\
    \ detail for each image. Detail can also equate to more complicated expected distributions\
    \ to learn.\n\nThe other reason this causes an issue for our GAN is because of\
    \ the way deep learning networks learn through calculus. By using calculus, our\
    \ input data should always be continuous. That is, it must show common data that\
    \ can be easily generalized and that can be transformed across images. In the\
    \ case of the fashion MNIST dataset, we can clearly see many places where transforming\
    \ one image like sandals into a pullover would not be a continuous transition.\n\
    \nWe can look to solve these shortcomings in GANs by again looking at how we calculate\
    \ loss. One such idea was proposed in a paper titled “Boundary-seeking Generative\
    \ Adversarial Networks” by R Devon Hjelm and colleagues. The idea they proposed\
    \ was to measure expected distribution differences using importance weights.\n\
    \nImportance weights or weighing is a method by which the more important features\
    \ of an image or dataset are given more strength or output. This has the effect\
    \ of isolating those features important to a given class or classes, thus allowing\
    \ the model to learn more discrete or varied sets of class data.\n\nUsing importance\
    \ sampling allows the derivation of a policy gradient solution to better approximate\
    \ the loss. Importance sampling is a technique for estimating the parametric parameters\
    \ required to regenerate a distribution. Policy gradient methods have their background\
    \ in reinforcement learning and are simply a way of optimizing loss using parameterized\
    \ solutions.\n\nReinforcement learning is a method that teaches models also called\
    \ *agents* to learn using rewards. Like unsupervised learning, the agent can learn\
    \ on its own through trial-and-error exploration. It is possible this form of\
    \ learning could be used for future generative modeling solutions but is not something\
    \ we will explore in this book. Policy gradient methods are a subset of RL methods\
    \ that attempt to converge a policy using gradient clipping.\n\nThe differences\
    \ between the BGAN and a vanilla GAN are subtle and best explored by running some\
    \ code and looking at the results. In Exercise 4-3, we will do just that and look\
    \ to use a BGAN again on the MNIST fashion dataset.\n\n## EXERCISE 4-3. BREAKING\
    \ BOUNDARIES WITH BGAN\n\n1. Open the `GEN_4_Boundary_Seeking_GAN.ipynb` notebook\
    \ from the GitHub project site. If you are unsure how, then consult Appendix B.\n\
    \n2. Run the whole notebook by selecting Runtime ➤ Run all. Then look past the\
    \ `imports` cell and on to the first cell with the `Hyperparameters` class, and\
    \ examine the hyperparameters, all of which we have seen before.\n\n3. The only\
    \ major change is the determination of loss and how the functions are defined,\
    \ as shown here:\n\n```\ndef boundary_seeking_loss(y_pred, y_true):\n    \"\"\"\
    \n    Boundary seeking loss.\n    Reference: https://wiseodd.github.io/techblog/2017/03/07/boundary-seeking-gan/\n\
    \    \"\"\"\n    return 0.5 * torch.mean((torch.log(y_pred)\n    - torch.log(1\
    \ - y_pred)) ** 2)\n    d_loss_fn = torch.nn.BCELoss()\n    generator = Generator()\n\
    \    discriminator = Discriminator()\n    if cuda:\n        generator.cuda()\n\
    \        discriminator.cuda()\n        d_loss_fn.cuda()\n```\n\n4. We can see\
    \ the definition of the `boundary_seeking_loss` function and the equation used\
    \ to determine that loss. That equation is shown here:\n\n![$$ \\frac{1}{2}\\\
    times mean $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equk.png)\n\
    \n5. This equation becomes the loss for the generator. Notice how `y_true` or\
    \ `x` is not used in the equation. Again, this has to do with the policy gradient\
    \ method, which looks at predictions and not actuals.\n\n6. Scrolling down to\
    \ the training block of code, we can see how this new loss equation is used in\
    \ the generator training.\n\n7. The highlighted line shows the only code change\
    \ in the training loop. With that one line of code and subtle change to our loss\
    \ calculation, we can alter the results substantially.\n\n```\n# Generator loss\n\
    gen_imgs = generator(z)\n# measure ability to fool discriminator\ng_loss = boundary_seeking_loss(discriminator(gen_imgs),\
    \ valid)\ng_loss.backward()\noptimizer_G.step()\n#  Discriminator loss\noptimizer_D.zero_grad()\n\
    real_loss = d_loss_fn(discriminator(real_imgs), valid)\nfake_loss = d_loss_fn(discriminator(gen_imgs.detach()),\
    \ fake)\nd_loss = (real_loss + fake_loss) / 2\n```\n\nFigure [4-5](#502181_1_En_4_Chapter.xhtml#Fig5)\
    \ shows the results of training after only a couple of epochs, and it can clearly\
    \ be seen that the BGAN is able to identify classes of clothing and start to generate\
    \ them. As opposed to the WGAN, which struggled initially to find common ground,\
    \ the BGAN can almost immediately distinguish between classes.\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig5_HTML.jpg](images/502181_1_En_4_Chapter/502181_1_En_4_Fig5_HTML.jpg)\n\
    \n**Figure 4-5** Early results from running the BGAN on fashion MNIST\n\nHowever,\
    \ after fully training the BGAN, the results are still not entirely as good as\
    \ we had hoped. This has more to do with the diverse classes and the amount of\
    \ detail specific to some classes like sandals. In fact, if you consider the final\
    \ training output, you will note that those specialized classes (like sandals)\
    \ are poorly represented.\n\nWe should expect with more longer-term training to\
    \ eventually get good results, but as you can see, there are still limitations\
    \ on this model. The boundary-seeking GAN was developed to work across data with\
    \ discrete boundaries and could also be well suited to other discrete forms of\
    \ data such as tabular datasets that show discontinuous data.\n\nAs we have seen\
    \ so far, a lot can go into the loss functions for both the generator and the\
    \ discriminator. In the next section, we look at another approach to improving\
    \ the loss function in a GAN."
