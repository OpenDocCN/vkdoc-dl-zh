    \n```\nn_residual_blocks=9,\nlambda_cyc=10.0,\nlambda_id=5.0\n```\n\n3. 你还会注意到，该笔记本允许你在五个无配对图像到图像的数据集之间进行选择：莫奈风格转照片、梵高风格转照片、苹果转橙子、约塞米蒂的夏天转冬天，以及马转斑马。选择一个你感兴趣的数据集，然后通过选择**运行时**\
