    *To my true loves: knowledge, my children, and Rhonda.*


    # Introduction


    We live in an era of fake news and uncertain reality. It’s a world where reality
    has become blurred by digital wizardry artists and artificial intelligence practitioners.
    It’s a digital reality now populated with fake news, images, and people. For many,
    the uncertainty and confusion are overwhelming. Yet, others, like yourself, search
    to embrace this new era of digital fakery to explore new opportunities.


    This book takes an in-depth look at the technology that powers this new digital
    fake reality. The broad name for this technology or form of AI/ML is *generative
    modeling* (GM). It is a form of AI/ML modeling that looks to understand what something
    represents, as opposed to other forms of modeling that look to classify or predict
    something.


    Generative modeling is not a new concept, but one that has emerged from the application
    of deep learning. The introduction of deep learning has launched the field into
    the mainstream. Unfortunately, not all mainstream use of GM is flattering or showcases
    the power of this diverse technology.


    There is a real and speculated fear for most outside and inside the field of GM
    on what is possible. For many, the application of GM to produce fake anything
    is abhorrent and nonessential, but the broad applications GM introduces can benefit
    many industries across many tasks.


    In this book, we begin with the assumption you have limited or little knowledge
    of deep learning and generative modeling. You have a basic knowledge of programming
    Python and applying data science, including the typical fundamental math knowledge
    in calculus, linear algebra, and statistics used in data science.


    We will cover a wide range of GM techniques and applications in this book, starting
    with the fundamentals of building a deep learning network and then progressing
    to GM. Here is a brief overview of the chapters we will explore:


    1.  **The Basics of Deep Learning**: We begin by introducing the basic concepts
    of deep learning, autoencoders, and how to build simple models with PyTorch. The
    examples in this chapter demonstrate simple concepts we will apply throughout
    this book and should not be missed by newcomers.


    2.  **Unleashing Generative Adversarial Networks**: This chapter moves to the
    fundamentals of explaining the generative adversarial network (GAN) and how it
    can be used to generate new and novel content. Examples in this chapter explore
    the applications of GANs from generating fashion to faces.


    3.  **Exploring the Latent Space**: Fundamental to generative modeling is the
    concept of learning the latent or hidden representation of something. In this
    chapter, we explore how the latent space is defined and how we can better control
    it through hyperparameters, loss function, and network configuration.


    4.  **GANs, GANs, and More GANs**: This book explores several variations of GANs,
    and in this chapter we look at five forms that attempt to learn the latent space
    differently. We build on knowledge from previous chapters to explore key differences
    in the way GANs learn and generate content.


    5.  **Image to Image Content Generation**: This chapter covers the advanced application
    of GANs to enhance the generation of content by learning through understanding
    translations. The examples in this chapter focus on showcasing paired and unpaired
    image translation using a variety of powerful GANs.


    6.  **Residual Network GANs**: Throughout this book we will constantly struggle
    with the generative ability to produce diverse and realistic features. The GANs
    in this chapter all use residual networks to help identify and learn more realistic
    feature generation.


    7.  **Attention Is All We Need**: This chapter explores the attention mechanism
    introduced into deep learning through the application of natural language processing.
    Attention provides a unique capability to identify and map relevant features with
    other features. The examples in this chapter demonstrate the power of using an
    attention mechanism with a GAN.


    8.  **Advanced Generators**: This chapter dives into the deep end and explores
    the current class of best-performing GANs. The examples in this chapter work from
    several open-source repositories that showcase how far the field of GM has come
    in a short time.


    9.  **Deepfakes and Face Swapping**: In this chapter, we switch gears and explore
    the application of GM for producing deepfakes. Where this whole chapter is dedicated
    to showcasing the ease of which you can produce a deepfake freely available open-source
    desktop software.


    10.  **Cracking Deepfakes**: From creating deepfakes and fake content for most
    of the book, we move on to understanding how generated content can be detected.
    This chapter looks at the techniques and research currently being done to expose
    fake content. In the future, these tools will be critical to controlling the digital
    reality we embrace and understanding what is real.


    This book covers a wide range of complex subjects presented in a practical hands-on
    and technically friendly manner. To get the most out of this book, it is recommended
    that you engage and work with several of the 40+ examples. All the examples in
    this book have been tested and run to completion using Google Colab, the recommended
    platform for this book. While some examples in this book may take up to days to
    train, most can be run in under an hour.


    Thank you for taking your precious time to read this book and ideally expand your
    opportunities and understanding in the field of AI/ML. The journey you have chosen
    is nontrivial and will be filled with frustration and anguish. It is one that
    will also be filled with awe and wonder the first time you generate your first
    fake face.


    # Acknowledgments


    This book, like many others, would not have been possible without the free exchange
    of knowledge provided in the AI/ML community, from countless researchers who tirelessly
    work on improving the field of artificial intelligence and generative modeling
    to the mass of AI enthusiasts who regularly produce open code repositories featuring
    new tools and a catalog of innovations.'
