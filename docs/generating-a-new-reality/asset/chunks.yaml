    \n图 5-3\n\nPix2Pix GAN 的训练输出\n\n如果你观察这些图像，会注意到生成的虚假图像具有相当多的细节。这是将逐像素比较添加到生成器损失中的结果。同样，如果我们将`lambda_pixel`的缩放比例从\
