  trans: "\n# 对 MNIST 手写数字进行分类\n\n在深度学习中，有几个标准的入门数据集，我们既可以从中学习，也可以用来测试新方法。随着深度学习的成熟，这些入门或测试数据集也变得更加复杂，但我们仍然可以使用一些经典标准来学习。\n\
    \n在接下来的练习中，我们将使用 MNIST 手写数字数据集，通过多层网络执行分类任务。每个数字是一张 28×28 像素的图像，这代表了我们网络的 784\
    \ 个输入。由于有 10 个数字类别，我们的输出层也将输出到 10 个神经元。我们将在练习 1-5 中看到这是如何构建的。\n\n## 练习 1-5. 使用\
    \ PyTorch 对 MNIST 进行分类\n\n1.  从项目的 GitHub 站点打开 `GEN_1_classify_pytorch.ipynb`\
    \ 笔记本。如果你不确定如何访问源代码，请查看附录 B。\n\n2.  在这个示例中，我们将使用 `torchvision.datasets` 模块来加载\
    \ MNIST 数据集，因此导入语句会略有不同。\n\n    ```python\n    import os\n    import torch\n \
    \   import torch.nn as nn\n    from torch.autograd import Variable\n    import\
    \ torchvision.datasets as dset\n    import torchvision.transforms as transforms\n\
    \    import torch.nn.functional as F\n    import torch.optim as optim\n    ```\n\
    \n3.  下一段代码将在根目录下设置一个数据文件夹并创建它。接下来的几行代码会将数据集下载到此文件夹。在此之前，我们使用 `transforms` 对象创建一个张量变换来转换数据。我们需要这样做，因为数据表示为值在\
    \ 0-255 之间的灰度字节。变换代码将这些数据归一化到 0 和 1 之间的值。\n\n    ```python\n    root = './data'\n\
    \    if not os.path.exists(root):\n        os.mkdir(root)\n    trans = transforms.Compose([transforms.ToTensor(),\n\
    \                                transforms.Normalize((0.5,), (1.0,))])\n    train_set\
    \ = dset.MNIST(root=root, train=True,\n                           transform=trans,\
    \ download=True)\n    test_set = dset.MNIST(root=root, train=False,\n        \
    \                  transform=trans, download=True)\n    print(train_set)\n   \
    \ print(test_set)\n    ```\n\n4.  向下移动，下一个代码块使用 `DataLoader` 类创建数据批次。`DataLoader`\
    \ 对数据进行批处理，以便更高效地提供给网络，并提供打乱数据的选项。在这个代码块中，我们创建了两个加载器，一个用于训练，另一个用于测试。\n\n    ```python\n\
    \    batch_size = 128\n    train_loader = torch.utils.data.DataLoader(\n     \
    \   dataset=train_set,\n        batch_size=batch_size,\n        shuffle=True)\n\
    \    test_loader = torch.utils.data.DataLoader(\n        dataset=test_set,\n \
    \       batch_size=batch_size,\n        shuffle=False)\n    print(len(train_loader))\n\
    \    print(len(test_loader))\n    ```\n\n5.  下一步是创建一个新的 MLP 模型。该网络将接收一个 28×28\
    \ 像素的数字作为输入，并将其传递到 500 个神经元，然后从 500 个传递到 256 个，最终传递到 10 个。请记住，10 个神经元的输出代表数据集中每个类别的一个输出。\n\
    \n    ```python\n    class MLP(nn.Module):\n        def __init__(self):\n    \
    \        super(MLP, self).__init__()\n            self.fc1 = nn.Linear(28*28,\
    \ 500)\n            self.fc2 = nn.Linear(500, 256)\n            self.fc3 = nn.Linear(256,\
    \ 10)\n        def forward(self, x):\n            x = x.view(-1, 28*28)\n    \
    \        x = torch.relu(self.fc1(x))\n            x = torch.relu(self.fc2(x))\n\
    \            x = torch.sigmoid(self.fc3(x))\n            return x\n        def\
    \ name(self):\n            return \"MLP\"\n    ```\n\n6.  定义了 MLP 模型类后，我们可以实例化该类，并创建优化器和损失函数。注意，损失函数是\
    \ `CrossEntropyLoss` 类型，因为这是一个分类问题。\n\n    ```python\n    model = MLP()\n    optimizer\
    \ = optim.SGD(model.parameters(), lr=0.01, momentum=0.9)\n    loss_fn = nn.CrossEntropyLoss()\n\
    \    ```\n\n7.  接下来是训练代码块，这与我们之前的几个练习非常相似。在这个示例中，由于我们使用了 `DataLoader`，有一些细微的差别需要注意。\n\
    \n    ```python\n    epochs = 10\n    history=[]\n    for epoch in range(epochs):\n\
    \        avg_loss = 0\n        for batch_idx, (x, y) in enumerate(train_loader):\n\
    \            optimizer.zero_grad()\n            x, y = Variable(x), Variable(y)\n\
    \            y_pred = model(x)\n            loss = loss_fn(y_pred, y)\n      \
    \      avg_loss = avg_loss * 0.9 + loss.data * 0.1\n            history.append(avg_loss)\n\
    \            loss.backward()\n            optimizer.step()\n            if (batch_idx+1)\
    \ % 100 == 0 or (batch_idx+1) == len(train_loader):\n                print(f'epoch:\
    \ {epoch}, batch index:' +\n                      f'{batch_idx+1}, train loss:\
    \ {avg_loss:.6f}')\n    ```\n\n8.  在此阶段，向笔记本添加另一个代码块，并使用之前练习中的代码输出历史记录的图表。\n\n\
    9.  作为另一个扩展练习，你还可以添加代码来测试测试数据集，以查看模型对数据的拟合程度。\n\n除了在测试集上进行验证，我们还可以使用模型对已知数字进行类别预测。这将使我们能够了解模型的表现如何。不过，我们暂时不必担心这些额外的步骤。我们将把这些繁重的工作和更彻底的数据可视化留到第\
    \ 2 章，届时我们将开始探讨生成式建模的基础。\n\n## 结论\n\n深度学习与神经网络在学术界酝酿了数十年，直到最近，它们的真正力量才得以释放。释放这种力量需要多种因素的协同，例如改进的\
    \ GPU 处理能力、大数据和数据科学，以及对机器学习技术日益增长的兴趣。虽然这些因素支撑了深度学习科学的发展，但真正推动 AI 研究人员突破极限、激发想象力的，是生成式建模领域的发现。\n\
    \n在本章中，我们介绍了深度学习及其工作原理，从基本的感知机到 MLP 和深度学习网络。我们学习了如何使用监督学习来训练这些网络，以执行回归和分类任务。在本书的其余部分，我们将深入探讨一种称为*无监督*和/或*自监督学习*的学习形式，以及其他称为*对抗学习*的高级方法。\n\
    \n在下一章中，我们将探索使用自编码器进行无监督学习的基础知识，然后转向使用生成对抗网络进行对抗学习。\n\n脚注 1 2 3\n"
- fmt: "# 2. Unleashing Generative Modeling\n\nDeep learning was stuffed away in the\
    \ back closet for years, often thought of as a pseudo or fuzzy science. It wasn’t\
    \ until the last decade that an explosion of growth has fostered in a new wave\
    \ of AI. AI has matured from using supervised learning to more advanced forms\
    \ of learning including unsupervised, self-supervised learning, adversarial learning,\
    \ and reinforcement learning. It was from these other forms of learning that the\
    \ area of generative modeling has come to flourish and advance in many areas.\n\
    \nThe advent of deep learning and the innovative architectures it brings have\
    \ allowed us to better understand what it means for an AI to learn. We previously\
    \ struggled with implementing AI that could self-learn, but with deep learning,\
    \ this can easily be accomplished. Furthermore, new and varied forms of learning\
    \ have exploded. Adversarial learning, which has broad applications to generative\
    \ modeling, was also born and in turn has fueled an AI explosion.\n\nGenerative\
    \ modeling, by our most recent definition, is the building of an AI or machine\
    \ learning model that can learn to generate new and varied content using a variety\
    \ of learning methods. The key term here is *generate* and is not to be confused\
    \ with filtering or transforming content. When we build a generative model, it\
    \ needs to generate new content, sometimes completely randomly, but in many cases\
    \ we conditionally control content generation.\n\nIn this chapter, we unleash\
    \ generative modeling. We explore how to construct the base form of generators\
    \ called *autoencoders*. Then we move on to learning how to better extract features\
    \ from image data using convolution. From there we build an autoencoder with convolution\
    \ layers added for better feature extraction. After that, we dive into the basis\
    \ of adversarial learning and explore the generative adversarial network (GAN).\
    \ We finish the chapter by upgrading a vanilla GAN to use deep convolution.\n\n\
    As we introduce generative modeling in this chapter, we will look to explore the\
    \ basis for other forms of learning from unsupervised to adversarial learning\
    \ and GANs. These are the main the topics we will explore in this chapter:\n\n\
    - Unsupervised learning with autoencoders\n- Extracting features with convolution\n\
    - The convolutional autoencoder\n- Generative adversarial networks\n- Deep convolutional\
    \ GANs\n\nBefore continuing, be sure you have all the required knowledge of deep\
    \ learning with PyTorch as covered in Chapter [1](#502181_1_En_1_Chapter.xhtml).\
    \ In the next section, we begin our exploration into unsupervised learning and\
    \ autoencoders.\n\n## Unsupervised Learning with Autoencoders\n\nSupervised learning,\
    \ or learning with labels, is a foundation to data science and a basis for many\
    \ machine learning models. It is a natural form of learning and one that we often\
    \ use ourselves to understand a problem space. When we or other animals do it,\
    \ we call it *concept learning*. However, the concept of concept learning may\
    \ blend with other forms of learning like unsupervised learning.\n\nUnsupervised\
    \ learning is a form of self or self-supervised learning that allows the machine\
    \ to learn the concept of something by understanding the representation without\
    \ labels. By not using labels, the machine is able to learn the representation\
    \ of an object without the bias of a label. While in some cases we may use labels\
    \ to control some aspect of that understanding, it is important to understand\
    \ that labels are not used in the learning process.\n\nTo train a machine/model\
    \ to learn the representation of something without a label, we build a machine\
    \ that can decompose and then compose the model back together. The process for\
    \ this in deep learning is referred to as *encoding* and *decoding* or *autoencoding*.\
    \ An autoencoder is a machine that can encode or break down data into some lower\
    \ form of representation. Then from that lower form it rebuilds it with a decoder.\n\
    \nFigure [2-1](#502181_1_En_2_Chapter.xhtml#Fig1) shows a deep learning autoencoder.\
    \ On the left side the input is a raw MNIST digit being fed into the encoder.\
    \ The encoder decomposes the image into some latent or hidden form. From this\
    \ the decoder decomposes the image back to the original as best it can, not by\
    \ using labels but by understanding how well it can rebuild the image.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig1_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1\n\nAutoencoder architecture\n\nAn autoencoder learns and improves\
    \ on its model by how well it reconstructs the original image. In fact, we measure\
    \ the error or loss in an autoencoder by doing pixel-wise comparisons between\
    \ the original and recomposed images. With a deep learning autoencoder, we stack\
    \ the two models of an encoder/decoder together.\n\nFor Exercise 2-1, we are going\
    \ to use the MNIST fashion dataset with an autoencoder. This dataset is comprised\
    \ of ten classes of garments you may wear or carry, from shoes, boots, and purses\
    \ to sweaters, pants, and dresses. The images also provide excellent visuals of\
    \ how an autoencoder can learn the recompositing process.\n\nEXERCISE 2-1. A FASHION\
    \ AUTOENCODER\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig2_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2\n\nFashion MNIST dataset\n\n1. Open the `GEN_2_autoencoder.ipynb`\
    \ notebook from the project’s GitHub site. If you are unsure on how to access\
    \ the source, check Appendix B.\n\n2. Run the first imports cell and then move\
    \ to the next cell that sets up some image helper functions. The first function,\
    \ `imshow`, is for rendering a PyTorch tensor image to a Matplotlib plot. The\
    \ second function, `to_img`, converts the tensor to the appropriate size and dimensions.\n\
    \n```\ndef imshow(img,size=10):\n    img = img / 2 + 0.5\n    npimg = img.numpy()\n\
    \    plt.figure(figsize=(size, size))\n    plt.imshow(np.transpose(npimg, (1,\
    \ 2, 0)))\n    plt.show()\n\ndef to_img(x):\n    x = x.view(x.size(0), 1, 28,\
    \ 28)\n    return x\n```\n\n3. The next block contains the familiar hyperparameters:\n\
    \n```\nepochs = 100\nbatch_size = 64\nlearning_rate = 1e-3\n```\n\n4. The next\
    \ block of code downloads the data, transforms it, and batches it into a `DataLoader`.\
    \ We then extract a batch of images from `DataLoader` and use the image util functions\
