    当然，你可以尝试此 GAN 的其他变体，从训练其他样本数据到自行探索 Python 包的不同功能。如果你想进一步探索此 GAN，请查阅 GitHub 资源页面以获取更多文档。ProGAN\
    \ 是下一节我们将要探讨的 GAN 下一个重要步骤的良好示范。\n\n## 使用 StyleGAN 版本 2 进行样式化\n\n最初的 StyleGAN 首次出现在\
    \ NVIDIA 团队的另一篇论文《一种基于样式的 GAN 生成器架构》中，该论文扩展了他们在 ProGAN 上的工作。这种形式的 GAN 是为了扩展生成器的生成能力，特别是不同特征的生成能力而开发的。\n\
    \n作者发现，他们可以将特征提取和复制隔离为三个不同的类别或粒度。这反过来又投射到 GAN 本身的架构中：在较低/顶层，提取较粗糙的特征，而较低的块则识别更详细的特征。作者定义了这些特征提取的粒度，如下所示：\n\
    \n- **粗粒度（小于 8² 像素）**：在低细节处识别，包括头发、面部朝向和大小等特征\n- **中粒度（从 16² 到 32² 像素）**：通常由更精细的面部特征、闭眼和张嘴等特征定义\n\
    - **细粒度（64² 及以上像素）**：调整到眼睛、头发和肤色等细节特征\n\n基于这种在层级别提取特征的概念，StyleGAN 通过提供两个新的主要增强功能扩展了模型。第一个是映射网络，提供了将特征向量输入映射到实际可见特征的能力。第二个是添加了样式模块，将这些特征映射转换为可见特征。\n\
    \n### 映射网络\n\n映射网络提供了一种将编码向量表示转换为可见特征的非平凡方法。这些形式的网络工作方式类似于自编码器的编码器部分，但额外增加了识别可见特征的步骤。将编码映射到特征所产生的产物称为**特征纠缠**。\n\
    \n图 8-3 展示了映射网络，并详细说明了用于将特征映射到向量的八层分解，这些层将结果缩减到与输入相同的大小。在该图中，你可以看到结果（称为`W`）如何被馈送到\
    \ ProGAN 合成网络中进行生成。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig3_HTML.jpg](img/502181_1_En_8_Fig3_HTML.jpg)\n\
    \n**图 8-3** StyleGAN 中的映射网络\n"
- fmt: '### Style Modules


    Style modules, or adaptive instance normalization (AdaIN), take the vector output
    from the mapping network, `W`, into the model’s generation layers. One module
    is added between each upsample and convolutional layer within each respective
    progression block.


    Figure [8-4](#502181_1_En_8_Chapter.xhtml#Fig4) shows the addition of the AdaIN
    modules and the process of using the encoded `W` from the mapping network as direct
    inputs to each module. In some respects, this is like residual networks where
    we skipped across layers by allowing inputs to bypass in some form. The AdaIN
    modules do not use the full input but rather a discovered mapping output as `W`;
    they also only provide scaling/normalization of the input.


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig4_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig4_HTML.jpg)


    **Figure 8-4** StyleGAN architecture with AdaIN modules


    Within the blowup diagram of Figure [8-4](#502181_1_En_8_Chapter.xhtml#Fig4),
    you can see the inner workings of how the encoded vector is used to scale and
    normalize the output through the layers. That means AdaIN layers are not additive
    like ResNET but define a scaling normalization process that is applied to the
    outputs.


    By shifting and scaling the output through the layers, AdaIN modules help promote
    the importance of relevant filters in each convolutional layer, thereby allowing
    the generator to better understand which features are more relevant than others.
    It may also be helpful to think of this as an internal reinforcement loop, where
    the mapping layers learn how to encode the `W` vector based on understanding more
    relevant features.


    #### Removing Stochastic/Traditional Input


    Since the mapping network only relies on reducing the stochastic input to an encoding,
    the authors decided to discard the need for randomness. Instead, they used constant
    inputs as the initial vector passed in. This dramatically reduced issues with
    entangled features by minimizing or controlling the random inputs into the generator.


    Entangled features occur when disparate features may get inadvertently mapped
    together like the position of the hair. During our previous training exercise,
    you likely noticed this countless times, where feature-like hair strands may appear
    next to a face rather than on top.


    #### Stochastic Variation (Noisy Inputs)


    Having removed stochastic input, there became a need to add some form of variation
    into the models. Without variation, a model will become more specialized. The
    addition of noise allows the model to keep more generalized. What the authors
    found was they could introduce variation in outputs by adding random noise to
    each channel before the input is passed into the AdaIN layer.


    The benefit of adding random noise at each style block allows for control of the
    finer details of the model generation, thus allowing for finer feature details
    such as freckles, facial hair, and wrinkles/dimples to be generated at random.
    Without the random noise, finer details would be obscured by more granular features.


    #### Mixing Styles


    One downside of using the `W` intermediate encoded vector as direct input to each
    AdaIN block is the tight correlation between model features. To break this correlation,
    two sets of inputs are chosen and passed through the mapping network, where each
    output is then randomly passed with a 50/50 chance to each AdaIN block.


    While this doesn’t benefit all forms of training data used on StyleGAN, it does
    have an upside effect with homogenous datasets like CelebA. What the authors discovered
    was that they could combine features from one generated image with a second generated
    image to produce a third new combined image.


    An excellent video demonstrating this effect is on YouTube at [`https://youtu.be/kSLJriaOumA`](https://youtu.be/kSLJriaOumA).
    This video provides an excellent visual of how image features may be combined
    to produce new unique combined images.


    #### Truncation of W


    As we have seen through course of several chapters now, poorly represented areas
    in real data are not easily generated. For example, in our CelebA dataset there
    is only a small percentage of images with bald people. In previous generators,
    this caused the generation of bald people to be poor since the sample was poorly
    represented.


    To accommodate this common defect in training, the authors implemented an averaging
    of the encoded vector `W`. A continuous average of `W` is maintained called `wavg`,
    and then the encoded vector `W` is transformed into a delta or difference from
    the average.


    The thought here is that producing the best average image and working back by
    allowing the image to be modified with `w_delta` also provides for additional
    feature control. This in turn allows the model to be controlled just by altering
    the `w_delta`, not unlike our mapping across mean and variance with a variational
    autoencoder.


    #### Hyperparameter Tuning


    The last major element the authors of the StyleGAN contributed heavily to was
    spending hours tweaking and tuning the model’s hyperparameters. They made significant
    improvements with respect to their previous efforts of the ProGAN. The hyperparameter
    values for learning rate, training epochs, and so on, have all been optimized
    in the code.


    As a result, the StyleGAN and StyleGAN2 we will look at shortly produce incredible
    output with respect to faces. If you decide to use this model on your own datasets,
    you may need to spend time modifying the various hyperparameters accordingly.


    ### Frechet Inception Distance


    The output of generative models is measured on a scale called the Frechet Inception
    Distance (FID). This distance is measured based on comparing the activations within
    pretrained image classification networks on the real and output images. Low scores
    represent better generated model outputs.


    In Figure [8-5](#502181_1_En_8_Chapter.xhtml#Fig5) there is an FID comparison
    of StyleGAN based on top of ProGAN at the top with the second version StyleGAN2
    below it. FFHQ stands for Flikr-Faces HQ, which is another facial dataset used
    to train generators. You can see the results go from an FID score of 7–8 in the
    first table starting with ProGAN and reduce to just below 3 for the StyleGAN2.


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig5_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig5_HTML.jpg)


    **Figure 8-5** FID score comparison of StyleGAN versus StyleGAN2


    These are impressive results, and if you want an interesting visual showing you
    just how well StyleGAN2 performs, visit `whichfaceisreal.com` for an excellent
    visual of how close these generated faces look.


    While we won’t have time to review the StyleGAN in more detail since the amount
    of code to cover all those features is substantial, we will instead progress to
    the gold standard in facial generation now. That standard is currently set by
    StyleGAN2 and something we will cover in more detail in the next section.


    ### StyleGAN2


    While the team at NVIDIA could have been certainly happy to stop with StyleGAN,
    they continued to push the limits of what is possible and as result produced StyleGAN2.
    This version further reduced the FID score from 4.40 to 2.84 and produced some
    of the most realistic faces yet.


    Like the previous section, when we looked at the StyleGAN, we will review each
    of the feature groups that provided increases in FID score with respect to Figure
    [8-5](#502181_1_En_8_Chapter.xhtml#Fig5). We start with the first feature weight
    demodulation in the next section.'
