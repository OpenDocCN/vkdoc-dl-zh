  trans: '

    # 训练换脸模型


    至此，你应该已经准备好了两组用于训练的名人面部数据，分别称为 A 组和 B 组。虽然可以直接针对你想要换脸的视频中的人脸进行训练，但通常不推荐这样做，因为这些面部往往过于相似。请记住，在生成式建模中，我们希望数据具有一定的多样性，这意味着最好使用外部图像。


    考虑到 Faceswap 中使用的基本模型架构是双自编码器，你可能会对所需的训练时间感到惊讶。训练一些更复杂的模型（如 `Villan`）可能需要一周甚至更长时间。根据你的硬件配置，你还可以尝试其他各种模型，包括轻量级版本。不过，你可能已经意识到，模型架构的质量和规模将是决定生成结果的主要因素。


    在下一个练习中，我们将学习如何训练换脸模型。在第 6 章和第 7 章中，我们使用 GAN 探索图像到图像的成对和不成对翻译时，已经做过各种类似的训练。Faceswap
    软件使设置训练的过程相对简单，但可能需要一些时间才能掌握哪种模型适合你的硬件以及你最终想要的结果。我们将继续上一个练习的进度，在练习 9-6 中开始训练一个模型。


    ## 练习 9-6. 训练换脸模型


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig8_HTML.jpg](img/502181_1_En_9_Fig8_HTML.jpg)


    **图 9-8** 训练换脸模型


    1. 打开软件后，选择 `Train` 选项卡，如图 9-8 所示。


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig9_HTML.jpg](img/502181_1_En_9_Fig9_HTML.jpg)


    **图 9-9** 使用 `Villan` 模型训练后期阶段


    2. 我们要做的第一件事是将 `Input A` 和 `Input B` 字段设置为存放已提取、排序和裁剪好的人脸的文件夹。图 9-8 展示了一个示例，其中
    `Input A` 是威尔·法瑞尔，`Input B` 是戴着眼镜的尤金·利维。我们特意移除了威尔·法瑞尔留着小胡子的图像（他在电影《王牌播音员》中的经典造型）。同时，也移除了尤金·利维不戴眼镜的人脸。决定移除哪组人脸取决于你想要转换的源视频。如果我们想转换尤金·利维在《富家穷路》中的图像，我们可能不会使用他著名的眼镜造型。


    3. 接下来，我们需要设置 `Alignment A` 和 `Alignment B` 文件源。同样，这些文件通常位于原始输入文件夹中。


    4. 下一步是在 `Model Dir` 字段中设置模型，最好为此新建一个文件夹。随着训练的进行，训练好的模型将保存在这个文件夹中。


    5. 接下来，我们需要从 `Trainer` 组框中选择要使用的模型。选中的 `Villan` 模型被认为是最好的，但训练时也需要最强的计算能力。如果你的电脑没有支持的
    GPU，那么最好从 `Lightweight` 或 `Original` 模型开始。


    6. 根据你选择的模型，你可能需要调整一些超参数，例如 `Training` 组框下的“Batch size”。当使用消耗大量 GPU 内存的 `Villian`
    模型时，你可能需要将批处理大小从默认的 16 减小。你可以通过主菜单访问设置来修改其他超参数。


    7. 完成基本必填字段的填写后，你可以点击窗口底部的 `Train` 按钮开始训练。训练开始时，你会看到如图 9-8 所示，在人脸上使用了遮罩，以表示模型正在训练进行翻译的区域。你还会注意到，从
    `Input A` 到 `Input B` 的各种模型交换，以及反向交换也会显示出来。在模型训练期间，你还会在日志窗口中看到每次 A-B 和 B-A 翻译的损失值输出。


    8. 如前所述，准确训练一个模型可能需要大量时间。在模型训练时，你可以通过点击训练窗口中 `Preview` 选项卡旁边的 `Graph` 选项卡来查看损失进度。


    9. 你可以随时点击 `Stop` 按钮停止训练，然后继续测试转换效果。通常，你会希望模型能够显示准确的翻译结果，如图 9-9 所示，该图显示了训练的后期状态，然后再继续创建深度伪造视频。


    当你对训练好的模型感到满意时，就可以继续将你的目标视频转换为深度伪造视频了。当然，你不必等待模型完全训练完毕，但要知道，部分训练的模型可能会产生较差的结果。拥有一个完全训练好的换脸模型的好处是，它可以用于包含同一主体的多个视频。不过请记住，你需要考虑到演员化妆、留胡须或戴眼镜等超出其正常外观的情况。


    有了充分训练的模型，我们就可以进入下一节，学习如何生成完整的深度伪造视频。

    '
- fmt: "# Creating a Deepfake Video\n\nGetting a believable and accurate deepfake\
    \ video is mostly about the performance of the model you trained in your previous\
    \ step. It is also important that you have extracted and cleaned the faces from\
    \ the video you will be converting. Be sure before proceeding that you have extracted,\
    \ sorted, and trimmed the faces in your target conversion video.\n\nAssuming you\
    \ have everything prepared, we can move on to the next exercise of converting\
    \ the target video into a deepfake. Again, Faceswap makes this an extremely easy\
    \ process, and a 30-second video can be converted in less than 5 minutes if you\
    \ have a GPU-supported environment. Jump back into the software, and we can work\
    \ toward to creating your first deepfake video; see Exercise 9-7.\n\n## EXERCISE\
    \ 9-7. CONVERTING A VIDEO TO SWAP FACES\n\n![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig10_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9-10\n\nInterface for converting a video to deepfake frames\n\n1. With\
    \ the software open, select the `Convert` tab, as shown in Figure [9-10](#502181_1_En_9_Chapter.xhtml#Fig10).\n\
    \n2. There are several options available to modify the results of a conversion.\
    \ We will stick to the basics in this exercise, but you can learn more about the\
    \ various options from the Faceswap repository or forum.\n\n3. As typical, we\
    \ start with the `Data` group box at the top of the window. You will need to set\
    \ the `Input Dir` option to the actual target video you want to convert. Then\
    \ set the `Output Dir` option to a new folder where the video frames will be written\
    \ to. Faceswap does not create the output video by default, and combining the\
    \ frames will be done in the last phase.\n\n4. Next, we can set the alignments\
    \ file in the `Alignments` field. In addition, the `Reference Video` input will\
    \ the same as the `Input Dir` video. Then finish off this first section of inputs\
    \ by selecting the model folder you used for training.\n\n5. Typically, you can\
    \ leave the `Color Adjustment` section as the default. However, if you notice\
    \ differences in color around the face of a converted image, you may want to play\
    \ with these options further.\n\n6. The `Mask Type` setting defines the mask used\
    \ for the area around the face that needs to be converted. Different masks will\
    \ alter that area using several factors dependent on the model plugin. If you\
    \ notice the face not getting completely translated in your converted output,\
    \ you likely need to adjust the mask used in the conversion process. You may also\
    \ need to select and define different masks used for the extraction process. These\
    \ are advanced settings and again best documented on the Faceswap site.\n\n7.\
    \ You can stick with the other default settings, as shown in Figure [9-10](#502181_1_En_9_Chapter.xhtml#Fig10).\
    \ When you are ready, you can start the conversion process by clicking the `Convert`\
    \ button at the bottom of the window.\n\nAfter the video has been converted, you\
    \ can open the `Output Dir` folder and review how well the process worked. If\
    \ you find you are not happy with the conversion, start by going back and training\
    \ the model more or with a different type. You may also need to understand some\
    \ of the finer options around masking and color normalization. Again, consult\
    \ the Faceswap documentation, forum site, and other sources for help.\n\nWhen\
    \ you are happy with the conversion, we can move on to the last step of creating\
    \ the final deepfake video from the converted frames in the next section.\n\n\
    ### Encoding the Video\n\nThe last step in creating a deepfake is taking all the\
    \ converted video frames and combining them into a video. Faceswap has a tool\
    \ that can convert frames to video, but it relies on the reference video for extracting\
    \ the codec and other properties. However, many times when creating a deepfake\
    \ you may want to use only a partial set of frames to rebuild the video.\n\nFortunately,\
    \ Python and OpenCV make constructing a new video with just fames quite easy as\
    \ we already seen with the YouTube-Downloader exercise. Therefore, it is a simple\
    \ matter to set up and use another Colab notebook that can easily do the video\
    \ creation for us using the frames and codec of our choosing.\n\nIn the last exercise\
    \ of this chapter, we jump back on to Colab to use a Python tool to create the\
    \ deepfake video. If you don’t want to use a notebook and you have a proper Python\
    \ environment set up, you can also copy the code to a local file and run it directly\
    \ from your machine. Either way, the flexibility of using this notebook should\
    \ make it easy to quickly build a deepfake; see Exercise 9-8.\n\n## EXERCISE 9-8.\
    \ CREATING THE DEEPFAKE VIDEO\n\n1. Open the `GEN_9_Make_Video.ipynb` notebook\
    \ from the GitHub project site. If you are unsure how, then consult Appendix B.\n\
    \n2. Open the folder/files tab on the left side of the window and create a new\
    \ folder called `images`. Using the ellipsis menu beside the new folder, click\
    \ the `Upload` option to open a file browser view.\n\n3. Locate and open the `Output\
    \ Dir` folder of the converted frames from the previous exercise. Select some\
    \ of the frames you want to convert to a video using the File Browser. When all\
    \ the images are selected, click `Open` in the browser to upload the images. Wait\
    \ for all the images to uploaded before continuing.\n\n4. Return to the notebook\
    \ cells, and you can now run the entire notebook from the menu by selecting `Runtime\
    \ ➤ Run all`.\n\n5. The first block of code, shown here, pulls all the images\
    \ from the folder and puts them in an array/list for later processing:\n\n```\n\
    import cv2\nimport numpy as np\nimport glob\nimg_array = []\nfor filename in sorted(glob.glob('/content/images/*.png')):\n\
    \    print(filename)\n    img = cv2.imread(filename)\n    height, width, layers\
    \ = img.shape\n    size = (width,height)\n    img_array.append(img)\n```\n\n6.\
    \ Notice the use of the `glob` and `sorted` functions to load all the images and\
    \ sort them.\n\n7. Moving down to the next cell, we can see how easy it is for\
    \ Python with OpenCV to create a new video file. Again, if you need to modify\
    \ the codec used to create the video, uncomment/comment the appropriate lines,\
    \ as shown in the following code:\n\n```\nmovie = 'deepfakes.mp4'\n#codecs\n#\
    \ Define the codec and create VideoWriter object\n#fourcc = cv2.VideoWriter_fourcc(*'FFV1')\n\
    #fourcc = cv2.VideoWriter_fourcc(*'XVID')\n#fourcc = cv2.VideoWriter_fourcc(*'DIVX')\n\
    #fourcc = cv2.VideoWriter_fourcc(*'DIV3')\nfourcc = cv2.VideoWriter_fourcc('F','M','P','4')\n\
    #fourcc = cv2.VideoWriter_fourcc('D','I','V','X')\n#fourcc = cv2.VideoWriter_fourcc('D','I','V','3')\n\
    #fourcc = cv2.VideoWriter_fourcc('F','F','V','1')\nout = cv2.VideoWriter(movie,fourcc,\
    \ 15, size)\nfor i in range(len(img_array)):\n    out.write(img_array[i])\nout.release()\n\
    ```\n\n8. In the video creation code, you can also see where the `cv2.VideoWriter`\
    \ function is called to define the movie name, type of codec, frames per second\
    \ playback, and video size.\n\n9. Finally, in the last block of code, the video\
    \ will be downloaded using the same pattern as we did earlier in this chapter.\
    \ After the movie has been built and downloaded, review it and decide if you are\
    \ happy or need to go back to the drawing board."
