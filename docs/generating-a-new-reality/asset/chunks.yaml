    \ learning when you view the results of an autoencoder or generative adversarial\
    \ network. The results of these deep learning systems can appear magical and even\
    \ show signs of actual intelligence. Unfortunately, the truth is far different\
    \ and even challenges our perception of intelligence.\n\nAs our knowledge of AI\
    \ advances, we often set the bar higher as to what systems demonstrate intelligence.\
    \ Deep learning is one of those systems that many now view as a mathematical process\
    \ (machine learning) rather than actual AI. In this book, we won’t debate if DL\
    \ is AI or just machine learning. Instead, we will focus on why understanding\
    \ the math of DL is important.\n\nTo build generators that work, we need to understand\
    \ that deep learning systems are nothing more than really good function solvers.\
    \ While that may dissolve some of their mystique, it will allow us to understand\
    \ how to manipulate generators to do our bidding.\n\nIn this chapter, we take\
    \ a closer look at how deep learning systems learn and indeed what they are learning.\
    \ We then advance to understanding variability and how DL can learn the variability\
    \ of data. From there we use that knowledge to build a variational autoencoder\
    \ (VAE). Then we learn how to explore the variability to tune the VAE generator.\
    \ Extending that knowledge, we move on to building and understanding a conditional\
    \ GAN (CGAN). We finish the chapter using the CGAN to generate pictures of food.\n\
    \nWe have a lot of ground to cover in this chapter, from some math theory to more\
    \ complex examples. Here is a quick overview of the main topics we will cover\
    \ in this chapter:\n\n*   Understanding what deep learning learns\n\n*   Building\
    \ a variational autoencoder\n\n*   Learning distributions with the VAE\n\n*  \
    \ Variability and exploring the latent space\n\nIt is recommended that you have\
    \ reviewed the material in Chapters [1](#502181_1_En_1_Chapter.xhtml)–[2](#502181_1_En_2_Chapter.xhtml)\
    \ before reading this chapter. You may also find it helpful to review the math\
    \ concepts of probability statistics and calculus. Don’t feel you need to be proficient\
    \ in calculus; just understand the basic concepts. In the next section, we take\
    \ a closer look at the math of deep learning."
