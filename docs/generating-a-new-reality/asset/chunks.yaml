    \    #fourcc = cv2.VideoWriter_fourcc('F','F','V','1')\n    filename = f\"{video}.avi\"\
    \n    out = cv2.VideoWriter(filename,fourcc, 20.0, (frame_width,frame_height))\n\
    \    while True:\n    ret, frame = input_movie.read()\n    frame_number += 1\n\
    \    if not ret or frame_number > frame_limit:\n    break\n    out.write(frame)\n\
    \    if frame_number < 10:\n    cv2_imshow(frame)\n    input_movie.release()\n\
    \    out.release()\n    cv2.destroyAllWindows()\n    ```\n\n7.  The `cv2.VideoWriter`\
    \ constructs the writer to perform the rendering of the captured frames. We limit\
    \ the number of frames rendered by the variable `frame_limit`, which is currently\
    \ set to 1000\\. You can of course alter this as you see fit. As this writer is\
    \ processing, it will also output the first 10 frames of video for inspection.\n\
    \n8.  We next download the rendered video using the same block of code in the\
    \ previous exercise:\n\n```\n    from google.colab import files\n    files.download(filename)\n\
    \    ```\n\n9.  When all the cells are run in the notebook, you should have a\
    \ video downloaded to your machine in your preferred download folder. Be sure\
    \ to watch the video to confirm it is the correct format and covers the right\
    \ subjects. Note, we have plenty of opportunity to trim out areas of the video\
