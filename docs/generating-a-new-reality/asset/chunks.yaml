    ## Discovering Domains with the DiscoGAN


    The ability to translate images or languages is often done with paired datasets.
    For language, this will often be comparable phrases in both languages, for example.
    In the case of our previous images, pairings of the same image were translated
    in some form.


    Now, of course, getting accurate translation across languages using unpaired phrases
    is not likely. However, what can be learned across these types of translation
    tasks using unpairings is the domain essence or style.


    The DiscoGAN is designed to capture and allow for a translation of style across
    unpaired images. It does this by combining the adversarial, pixel, and cycle loss
    across both generators. The effect allows for the translation of horses to zebras
    or apples to oranges, as we will see in Exercise 5-6.


    ### EXERCISE 5-6. DISCOVERING DOMAINS WITH A DISCOGAN


    ![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig8_HTML.jpg](images/502181_1_En_5_Chapter/502181_1_En_5_Fig8_HTML.jpg)


    **Figure 5-8** Examples of unpaired image to image datasets


    1. Open the `GEN_5_DiscoGAN.ipynb` notebook from the GitHub project site. If you
    are unsure how, then consult Appendix B.


    2. This GAN provides for a number example datasets that we will use for this example
    and several more in later chapters. Figure [5-8](#502181_1_En_5_Chapter.xhtml#Fig8)
    shows a summary of the available datasets and what the matching images look like.
    Be sure to select your desired dataset and then run the whole notebook. Select
    **Run ➤ Run all** from the menu.


    3. Feel free to explore the various datasets and get comfortable with how they
    look through training. This will be good practice for when we explore other example
    exercises that use these sets again.


    4. Most of the code in this sample should be review by now. So, we will focus
    on just the creation of the models and optimizers, as shown here:


    ![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig9_HTML.jpg](images/502181_1_En_5_Chapter/502181_1_En_5_Fig9_HTML.jpg)


    **Figure 5-9** Example of cross-domain training, from VanGogh to Monet


    5. Again, we have two generators and discriminators in the GAN. While both generators
    share an optimizer, the discriminators use their own.


    6. Jump down to the training code and specifically the loss calculations. We will
    focus on how the cycle loss is calculated in the generators, as shown here:


    ```python

    fake_B = G_AB(real_A)

    loss_GAN_AB = adversarial_loss(D_B(fake_B), valid)

    fake_A = G_BA(real_B)

    loss_GAN_BA = adversarial_loss(D_A(fake_A), valid)

    loss_GAN = (loss_GAN_AB + loss_GAN_BA) / 2

    # Pixelwise translation loss

    loss_pixelwise = (pixelwise_loss(fake_A, real_A) + pixelwise_loss(fake_B, real_B))
    / 2

    loss_cycle_A = cycle_loss(G_BA(fake_B), real_A)

    loss_cycle_B = cycle_loss(G_AB(fake_A), real_B)

    loss_cycle = (loss_cycle_A + loss_cycle_B) / 2

    # Total loss

    loss_G = loss_GAN + loss_cycle + loss_pixelwise

    ```


    7. Adversarial loss (`loss_GAN`) is first calculated and then pixel-wise and finally
    cycle loss. All three are combined into the total generator loss (`loss_G`).


    8. Let the model train on the various datasets. Be sure to reset the models after
    each time you switch the datasets. Otherwise, you will experience strange results.


    9. You may also choose to train multiple datasets in succession, thus allowing
    the GAN to learn multiple domain styles and combine them. Figure [5-9](#502181_1_En_5_Chapter.xhtml#Fig9)
    shows an example of such a training that was first trained on the Monet 2 Photo
    set and then switches to the VanGogh 2 Photo set.


    ```python

    G_AB = GeneratorUNet(input_shape)

    G_BA = GeneratorUNet(input_shape)

    D_A = Discriminator(input_shape)

    D_B = Discriminator(input_shape)

    optimizer_G = torch.optim.Adam(

    itertools.chain(G_AB.parameters(), G_BA.parameters()), lr=hp.lr, betas=(hp.b1,
    hp.b2)

    )

    optimizer_D_A = torch.optim.Adam(D_A.parameters(), lr=hp.lr, betas=(hp.b1, hp.b2))

    optimizer_D_B = torch.optim.Adam(D_B.parameters(), lr=hp.lr, betas=(hp.b1, hp.b2))

    ```


    The output from this exercise is interesting because it shows how the domain-style
    translation is put into effect. In some cases, the art and photo look believable
    after a short amount of training. As you can see, the DiscoGAN is an effective
    solution for translating domains/styles across images.


    Be sure to explore and play with the previous exercise using multiple variations
    or different data. Visualizing how this model trains across domains and cross
    domains can be enlightening, especially when you try to tune some of the hyperparameters
    in the model.'
