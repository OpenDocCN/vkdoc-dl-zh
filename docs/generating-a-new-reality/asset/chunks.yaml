  trans: '

    # 理解面部操控方法


    在面部操控领域，我们通常将技术分为两大类。一类是身份到身份的转换，即将一个人的面部替换为另一个人的。另一种形式是将一个身份的姿态转换为另一个身份的姿态，称为*面部重现*。


    我们已经在第 9 章中探讨了名为换脸的身份到身份转换方法，并利用它构建了一个深度伪造。虽然我们使用了深度学习双自编码器来投射面部变换，但实际上还存在其他基于图形学的方法。以下是高级身份转换方法的总结：


    *   **FaceSwap**：不要将其与软件包 `Faceswap` 混淆。`FaceSwap` 是一种基于图形学的方法，类似于从目标图像中提取面部，使用面部特征点将其投影到
    3D 模型上，然后捕获替换后的面部。这种方法目前被电影工业用于各种换脸及其他操控。


    *   **Deepfakes**：其工作原理是首先从源身份和目标身份中提取面部。训练一个深度学习网络将面部 A 转换为面部 B，反之亦然。然后，可以使用训练好的模型，通过网络来解释任何所需的姿态变化，从而将面部
    A 与面部 B 进行交换。同样，我们在第 9 章中详细介绍了整个过程。


    面部重现是面部操控的第二类，其工作原理是保留目标身份，但用另一个源（例如一个正在说话的人）的姿态进行替换。这种方法常被归入深度伪造的范畴，但为了我们的目的，我们将其定义为*面部重现*，而不是换脸。


    图 10-1 使用一些广为人知的流行示例展示了换脸与面部重现（或姿态交换）之间的区别。图的上半部分展示了将 Lady Gaga 的面部与演员史蒂夫·布西密的头部进行换脸。这次交换是使用`Faceswap`通过
    Villain 模型完成的。


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig1_HTML.jpg](img/502181_1_En_10_Fig1_HTML.jpg)


    图 10-1


    换脸与姿态交换的区别


    在图 10-1 的下半部分，使用了巴拉克·奥巴马总统的肖像，但他的动作和行为（姿态）被喜剧演员乔丹·皮尔所取代。该图像取自一个完整视频，该视频展示了姿态交换的全部威力。在视频中，这位喜剧演员以总统的身份发表各种虚假言论。


    目前，姿态交换的实现采用了两种不同的策略，这与我们在换脸中看到的情况类似。有一种基于图形学的方法和一种深度学习方法可用于交换目标的姿态。以下是每种方法的更多细节：


    *   **Face2Face**：这是一种类似于`FaceSwap`的基于图形学的方法，但它使用两个输入视频流，从中提取关键帧并用作混合目标。这次不是从特征点提取面部，而是提取姿态。然后，将姿态转换为用于混合目标面部的
    3D 特征图。


    *   **NeuralTextures**：此方法使用典型的生成对抗网络，类似于`Pix2Pix`或其他图像到图像的转换模型，将姿态从一张图像转换到另一张图像。有许多开源项目示例展示了这项技术，但目前最顶尖的是`Avatarify`。使用`Avatarify`，在合适的硬件支持下，你可以实时转换你的姿态，或者转换蒙娜丽莎、阿尔伯特·爱因斯坦等人的面部。如果你需要回忆这种方法的工作原理，请回顾第
    6 章和第 7 章，我们在那里训练了基于成对和不成对图像的模型，用于图像到图像的转换。


    图 10-2 摘自论文《FaceForensics++：学习检测被操控的面部图像》，该论文是展示各种面部检测技术的优秀来源。作者们甚至慷慨地在他们的 GitHub
    仓库[`https://github.com/ondyari/FaceForensics/`](https://github.com/ondyari/FaceForensics/)中提供了免费的面部操控图像和视频资源。


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig2_HTML.jpg](img/502181_1_En_10_Fig2_HTML.jpg)


    图 10-2


    FaceForensics++ 对面部操控方法的分解比较


    需要注意的是，`FaceForensics++`论文的作者将换脸称为*deepfakes*，如图 10-2 所示。我们现在也做出同样的区分，并从此将换脸伪造称为*deepfakes*，而将更广泛的深度伪造定义留给面部操控内容这一类别。


    进一步参考


    利用视觉伪影揭露深度伪造和面部操控：


    [`https://ieeexplore.ieee.org/abstract/document/8638330`](https://ieeexplore.ieee.org/abstract/document/8638330)


    深度伪造：对人脸识别的新威胁？评估与检测：


    [`https://arxiv.org/abs/1812.08685`](https://arxiv.org/abs/1812.08685)


    深度伪造对品牌意味着什么？


    [`https://www.thedrum.com/opinion/2020/01/10/what-do-deepfakes-mean-brands`](https://www.thedrum.com/opinion/2020/01/10/what-do-deepfakes-mean-brands)


    既然我们对面部操控技术的范围有了更清晰的理解，我们就可以继续学习如何识别此类伪造。在下一节中，我们将介绍当前用于识别深度伪造的各种方法。


    ## 破解伪造的技术


    近年来，关于开发破解和识别深度伪造方法的研究蓬勃发展，这无疑是由对日益强大的生成模型的担忧所推动的。正如我们在本书中所见，早期的生成器很容易被识别，不足为虑。但近年来情况完全改变了，现在人类几乎不可能仅凭一瞥就分辨出真假。


    然而，或许对我们和生成建模领域来说更幸运的是，同样的人工智能可以用于对抗自身。毕竟，正如我们在本书中所见，我们常常在判别器和生成器的训练之间挣扎平衡；我们可能经常需要削弱判别器，以便生成器能够产生出色的结果。


    在破解伪造方面，我们希望构建最佳的判别器，能够利用各种特征检测方法来识别伪造。当然，这并不意味着一个优秀的评论家不能被用于对抗训练一个更好的生成器。事实上，有很多研究正是这样做的。这场军备竞赛将如何展开还有待观察，但现在让我们先考虑用于识别伪造的方法。


    我们可以将当前用于识别伪造的方法分为三类，正如 Ruben Tolosana 等人在《深度伪造及其超越：面部操控与伪造检测综述》中所定义的那样。这篇优秀的论文梳理了当前用于识别伪造的方法类别，总结如下：


    *   手工特征


    *   基于学习的特征


    *   伪影


    关于每一类，需要记住的重要一点是，它们定义了广泛的技术，这些技术可能结合了 AI/ML 以及通过像`OpenCV`这样的图形学包进行的特征提取技术。我们将在下一节开始，更详细地回顾每一类方法。

    '
- fmt: '### Handcrafted Features


    In many deepfake videos or images, there are often noticeable flaws in the reconstruction
    of features. If these flaws are especially evident, a human author may often edit
    them out with graphics software. Often, though, these flaws may not be so evident
    and are left in as markers of the fake.


    Discovering these markers, our misaligned and constructed features can be accomplished
    with a variety of techniques that look to classify known features by similarity.
    A person, for instance, may tilt their head a certain way when talking or only
    open their mouth a specific distance. These features are specific to individuals
    and are difficult to mimic or translate effectively.


    We can discover these hidden features of the way someone talks by handcrafting
    features using software like `OpenCV` to measure the amount of head tilt, eye
    movement, lip movement, and so on. Then we can compare like measurements using
    similarity feature maps to identify faces or facial posing that is consistent
    with an individual’s identity.


    Figure [10-3](#502181_1_En_10_Chapter.xhtml#Fig3) was extracted from the paper
    “Protecting World Leaders Against Deep Fakes” by Shruti Agarwal and Hany Farid,
    in which the authors analyzed the use of handcrafted features to identify deepfakes.
    The figure shows a comparison of various famous speakers using the encoding of
    several handcrafted features. From the figure it becomes obvious to distinguish
    between the real Barack Obama and the lip-synced Jordan Peele version.


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig3_HTML.jpg](images/502181_1_En_10_Chapter/502181_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Showing the use of handcrafted features to identify a speaker’s identity


    While using handcrafted features is successful in demonstrating the obvious differences
    between various speakers, it still implements human bias. Ideally, what we want
    to do is remove human bias and allow a model to learn which features to compare
    on their own. This is the method we will look at in the next section.


    ### Learning-Based Features


    Just like the critics we develop with the adversarial training of GANs, we can
    take this concept further using convolution neural networks to identify and learn
    features that mark fakes. As showcased in the `FaceForensics++` paper, there are
    several architectures that have been used to learn fake feature markers.


    Figure [10-4](#502181_1_En_10_Chapter.xhtml#Fig4) is another extracted image from
    the `FaceForensics++` paper that demonstrates the differences between the various
    architectures used to identify fakes, including the use of handcrafted features
    (`Steg. Features + SWM`). The accuracy was measured on the raw images as well
    as high- and low-quality versions. The clear winner in all cases is the `XceptionNet`
    architecture, which we will review later in this chapter.


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig4_HTML.jpg](images/502181_1_En_10_Chapter/502181_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Comparison of feature extraction methods and models on detection of fakes


    The construction of feature learning models using CNN is generally like that of
    the discriminator in a GAN. As we have seen, convolutional layers are the primary
    method of feature extraction found in most adversarial/GAN models, where the output
    of the model will typically be a binary classification identifying if the image
    is fake or real.


    In the paper “GANprintR: Improved Fakes and Evaluation of the State of the Art
    in Face Manipulation Detection” by Joao C. Neves et al., the authors use a technique
    of reusing various CNN architectures like `ExceptionNet` as a learning decoder
    placed within an autoencoder.


    Figure [10-5](#502181_1_En_10_Chapter.xhtml#Fig5) is an image extracted from the
    `GANprintR` paper that describes the architecture of the autoencoder used to remove
    possible features that may identify the image as a fake. The model is trained
    by feeding real faces into the model and then decoding it with an `XceptionNet`
    or other CNN model that identifies fakes.


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig5_HTML.jpg](images/502181_1_En_10_Chapter/502181_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Autoencoder designed to reverse feature anomalies in fakes


    The result of training real images to identify and remove fake markers again improves
    on the quality of the fake image. Fake images and content can then be fed into
    the model to likewise remove fake markers from synthetic images. This is just
    another example of the current arms war being played out on the field of facial
    manipulation.


    Of course, as we have seen throughout this book, there are often other features
    outside the face or primary target that can clearly define evidence of faking.
    In the next section, we look at how these artifacts can be used to identify synthetic
    images.'
