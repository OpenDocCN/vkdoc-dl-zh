    Later stages of model training using Villan


    1.  The first thing we will do is set the Input A and Input B fields to the folders
    where we have the extracted, sorted, and trimmed faces. Figure [9-8](#502181_1_En_9_Chapter.xhtml#Fig8)
    shows an example using Will Ferrell as Input A and Eugene Levy with glasses as
    Input B. Care was taken to remove images of Will Ferrell with a mustache made
    famous for his role in *Anchorman*. Faces of Eugene Levy without glasses were
    also removed. Deciding which set of faces to remove will depend on the source
    video you want to convert. If we want to convert images of Eugene Levy in *Schitt’s
    Creek*, we would likely not use his famous glasses look.


    2.  Next, we need to set the Alignment A and Alignment B file sources. Again,
    these files will typically be in the original input folders.


    3.  Setting the model in the Model Dir field is next, and it is best to use a
    new folder for this. This will be the folder where the trained models will be
    saved as training progresses.


    4.  From here, we need to determine which model to use from the Trainer group
    box. The Villan model selected is considered the best but also requires the most
    horsepower for training. If your computer is lacking a supported GPU, then it
    may be better to start with the Lightweight or Original model.


    5.  Depending on the model you choose, you may need tweak some of the various
    hyperparameters like “Batch size” found under the Training group box. When using
    the Villian model, which consumes a lot of GPU memory, you may need to reduce
    the batch size from the default of 16\. You can modify other hyperparameters by
    accessing the settings from the main menu.


    6.  After you are done filling in the basic required fields, you can start training
    by clicking the Train button at the bottom of the window. As training starts out,
    you will see as shown in Figure [9-8](#502181_1_En_9_Chapter.xhtml#Fig8) the use
    of masks over the faces to represent the areas the model is training to translate.
    You will also notice that the various model swaps from Input A to Input B, and
    the reverse is also shown. During model training, you will also notice the loss
