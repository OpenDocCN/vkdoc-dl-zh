  trans: '

    ### 风格模块


    风格模块，即自适应实例归一化（AdaIN），将映射网络的向量输出 `W` 引入模型的生成层。在每个相应的渐进块中，每个上采样层和卷积层之间都会添加一个这样的模块。


    图 8-4 展示了 AdaIN 模块的添加过程，以及将映射网络编码后的 `W` 作为每个模块直接输入的使用方式。在某些方面，这类似于残差网络，我们通过允许输入以某种形式绕过某些层来实现跨层跳跃。AdaIN
    模块并非使用完整的输入，而是使用一个经过探索的映射输出作为 `W`；它们仅提供输入的缩放/归一化。


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig4_HTML.jpg](img/502181_1_En_8_Fig4_HTML.jpg)


    **图 8-4** 包含 AdaIN 模块的 StyleGAN 架构


    在图 8-4 的放大示意图中，你可以看到编码后的向量是如何在层间对输出进行缩放和归一化的内部工作机制。这意味着 AdaIN 层不像 ResNet 那样是加法性的，而是定义了一个应用于输出的缩放归一化过程。


    通过在层间对输出进行平移和缩放，AdaIN 模块有助于提升每个卷积层中相关滤波器的重要性，从而使生成器能够更好地理解哪些特征比其他特征更相关。将其视为一个内部强化循环也可能有所帮助，在这个循环中，映射层基于对更相关特征的理解来学习如何编码
    `W` 向量。


    #### 移除随机/传统输入


    由于映射网络仅依赖于将随机输入简化为一个编码，作者决定摒弃对随机性的需求。相反，他们使用常量输入作为传入的初始向量。这通过最小化或控制输入生成器的随机输入，极大地减少了特征纠缠的问题。


    当不同的特征（如头发的位置）可能被无意中映射到一起时，就会产生特征纠缠。在我们之前的训练练习中，你可能无数次注意到这一点，比如一缕缕头发可能出现在脸旁边，而不是在头顶上。


    #### 随机变化（噪声输入）


    在移除随机输入后，就需要向模型中添加某种形式的变异性。没有变异性，模型会变得过于专门化。添加噪声可以使模型保持更强的泛化能力。作者发现，他们可以通过在输入传入
    AdaIN 层之前向每个通道添加随机噪声来引入输出的变异性。


    在每个风格块中添加随机噪声的好处在于，它可以控制模型生成的细节，从而允许随机生成更精细的特征细节，例如雀斑、胡须、皱纹/酒窝。如果没有随机噪声，这些精细细节就会被更粗粒度的特征所掩盖。


    #### 风格混合


    使用 `W` 中间编码向量作为每个 AdaIN 块的直接输入的一个缺点是，模型特征之间存在紧密的相关性。为了打破这种相关性，会选择两组输入并通过映射网络，然后每个输出以
    50/50 的概率随机传递给每个 AdaIN 块。


    虽然这对 StyleGAN 使用的所有形式的训练数据并非都有益，但对于像 CelebA 这样的同质数据集，它确实有积极的效果。作者发现，他们可以将一个生成图像的特征与第二个生成图像的特征结合起来，生成第三个全新的组合图像。


    YouTube 上有一个很好的视频演示了这种效果，网址是 [`https://youtu.be/kSLJriaOumA`](https://youtu.be/kSLJriaOumA)。该视频直观地展示了图像特征如何组合以生成新的独特组合图像。


    #### W 的截断


    正如我们在几章中看到的，真实数据中表示不佳的区域不容易生成。例如，在我们的 CelebA 数据集中，只有一小部分图像包含秃头的人。在之前的生成器中，这导致生成的秃头人物效果很差，因为样本的代表性不足。


    为了适应训练中这个常见的缺陷，作者实现了对编码向量 `W` 的平均化处理。维护一个 `W` 的连续平均值，称为 `wavg`，然后将编码向量 `W` 转换为与该平均值的差值（delta）。


    这里的思路是，生成最佳的平均图像，然后通过允许使用 `w_delta` 对图像进行修改来反向工作，这也提供了额外的特征控制能力。这反过来又允许仅通过改变 `w_delta`
    来控制模型，这与我们使用变分自编码器在均值和方差之间进行映射的方式类似。


    #### 超参数调优


    StyleGAN 作者贡献巨大的最后一个主要元素是花费大量时间调整和优化模型的超参数。与他们之前 ProGAN 的工作相比，他们取得了显著的改进。学习率、训练轮次等超参数值在代码中都已进行了优化。


    因此，我们即将看到的 StyleGAN 和 StyleGAN2 在人脸生成方面产生了令人难以置信的输出。如果你决定在自己的数据集上使用这个模型，你可能需要花时间相应地修改各种超参数。


    ### Frechet Inception Distance


    生成模型的输出是通过一个称为 Frechet Inception Distance（FID）的指标来衡量的。该距离基于比较预训练的图像分类网络在真实图像和输出图像上的激活值。得分越低，表示生成的模型输出越好。


    在图 8-5 中，展示了基于 ProGAN 的 StyleGAN（上方）与第二版 StyleGAN2（下方）的 FID 对比。FFHQ 代表 Flikr-Faces
    HQ，这是另一个用于训练生成器的人脸数据集。你可以看到，结果从第一个表格中 ProGAN 的 FID 得分 7-8，降低到 StyleGAN2 的略低于 3。


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig5_HTML.jpg](img/502181_1_En_8_Fig5_HTML.jpg)


    **图 8-5** StyleGAN 与 StyleGAN2 的 FID 得分对比


    这些结果令人印象深刻，如果你想直观地了解 StyleGAN2 的表现有多出色，可以访问 `whichfaceisreal.com`，该网站直观地展示了这些生成的人脸有多么逼真。


    虽然我们没有时间更详细地回顾 StyleGAN，因为涵盖所有这些特性的代码量很大，但我们将继续探讨当前人脸生成的黄金标准。这个标准目前由 StyleGAN2
    设定，我们将在下一节中更详细地介绍它。


    ### StyleGAN2


    尽管 NVIDIA 的团队本可以满足于 StyleGAN 的成果，但他们继续挑战可能性的极限，并因此推出了 StyleGAN2。这个版本进一步将 FID 得分从
    4.40 降低到 2.84，并生成了迄今为止最逼真的一些人脸。


    与上一节我们审视 StyleGAN 时类似，我们将回顾每个相对于图 8-5 提升了 FID 得分的特征组。我们从下一节中的第一个特征——权重解调开始。

    '
- fmt: "### Weight Demodulation\n\nThe `AdaIN` layers are a derivation from an earlier\
    \ concept called *neural-style transfer* where styles could be captured and transferred.\
    \ However, what the authors of `StyleGAN2` found was that visual artifacts such\
    \ as water droplets or smudges could be carried through images by the reinforcement\
    \ of the styles.\n\nInstead, what they discovered is that the `AdaIN` layers could\
    \ be moved to inside the convolutional layers themselves and not used as direct\
    \ inputs but rather baked in as normalization.\n\nThe benefit of baking in the\
    \ style normalization to the convolutional layers themselves provided for parallelization\
    \ of the computations, thus allowing for models to train upward of 40 percent\
    \ faster and further removing visual artifacts like droplets or smudges.\n\n###\
    \ Path Length Regularization\n\nThis introduces a new normalization term to the\
    \ loss to better smooth or make uniform the latent space. We have seen throughout\
    \ this book the importance of normalizing or making uniform the latent space in\
    \ generative models. It has been a critical concept in understanding how to producing\
    \ models that can generate consistent output.\n\nSmoothing the latent space provides\
    \ for the mapping of images more readily into and out of the space in known projections\
    \ allows for more controlled generation of images but also provides for projection\
    \ of images back into latent space encodings. Understanding this relationship\
    \ from latent space to generated images allows for images to be generated across\
    \ a path of latent space.\n\nThe capability to smooth and understand the latent\
    \ space provides further applications from animation to age progression and more.\
    \ These have been demonstrated successfully using `StyleGAN2` to animate across\
    \ styles and features.\n\n### Lazy Regularization\n\nApplying path length regularization\
    \ can be a computationally expensive process that doesn’t necessarily derive benefit\
    \ through every training iteration. As such, in `StyleGAN2`, `PLR` is applied\
    \ only every `n`th number of iterations where `n` is typically set to `16` but\
    \ may be varied.\n\n### No Growing\n\nAs we saw, progressively growing GANs were\
    \ successful in building up large-scale images from `4×4` to `1024×1024` pixels\
    \ in size. However, what typically happens with a `ProGAN` is a strong location\
    \ preference for certain features such as a nose, eyes, and mouth.\n\nTo bypass\
    \ these issues yet still allow for the progressive development of the generator\
    \ model, we turn to another recent paper: “Multi-Scale Gradients for Generative\
    \ Adversarial Networks” by Animesh Karnewar and Oliver Wang. This paper introduced\
    \ the idea of multiple scale gradient using a single architecture.\n\nFigure [8-6](#502181_1_En_8_Chapter.xhtml#Fig6)\
    \ shows the architecture of the multiple scale gradient GAN (`MSG-GAN`), not to\
    \ be confused with the food additive. In the `MSG-GAN`, the model is designed\
    \ to progressively build generated output based on the same progressions we see\
    \ in a `ProGAN`.\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig6_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig6_HTML.jpg)\n\
    \n**Figure 8-6**  \n`MSG-GAN` architecture\n\nAuthors of `StyleGAN` took this\
    \ progression model and implemented it with input/output skips not unlike what\
    \ we have seen in a `ResNet`. Figure [8-7](#502181_1_En_8_Chapter.xhtml#Fig7)\
    \ demonstrates a comparison of the architecture differences between the three\
    \ models `MSG-GAN`, input/output skipping, and `ResNet`.\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig7_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig7_HTML.jpg)\n\
    \n**Figure 8-7**  \nComparison of progressive architectures\n\nThe skip architecture\
    \ used in `StyleGAN2` can perform the same progressive growing of feature granularity\
    \ as is done in `ProGAN`, allowing the model to focus more on the higher progressions\
    \ (those at `1024×1024` than through normal progressive development). When scaled\
    \ up using large networks, this enhancement was further magnified, as we will\
    \ see next.\n\n### Large Networks\n\nThrough our exploration of `ResNet`, we saw\
    \ how a typical shallow model with 10 or fewer layers of convolution could be\
    \ increased to generators with more than 100, all through the magic and use of\
    \ skipped connections. Not unlike `ResNet`, `StyleGAN2` can also benefit from\
    \ exceptionally large networks through the adaptation of input/output skipping.\n\
    \nFigure [8-8](#502181_1_En_8_Chapter.xhtml#Fig8) compares the respective feature\
    \ contribution between `StyleGAN` and `StyleGAN2`. Remember that `StyleGAN` uses\
    \ a basic progressive growing architecture, whereas `StyleGAN2` uses `MSG` input/output\
    \ skipping to allow the model to focus more on the finer details we typically\
    \ see generated at the higher levels like `1024×1024`. The x-axis represents a\
    \ level of progression, and the y-axis denotes the percentage of accuracy when\
    \ generating an output of the preferred size.\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig8_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig8_HTML.jpg)\n\
    \n**Figure 8-8**  \nComparison of feature contribution to respective outputs\n\
    \nBy building large networks, the model generator can place more emphasis features\
    \ developed from the higher layers. As Figure 8-9 shows, the `1024×1024` features\
    \ are far more emphasized in the large networks as opposed to the regular `StyleGAN`.\n\
    \nNow that we understand all the features of the `StyleGAN` and `StyleGAN2`, we\
    \ can move on to training a version using an already established package. In Exercise\
    \ 8-2, we will train a `PyTorch` version of `StyleGAN2` on our old friend the\
    \ `CelabA` dataset. Let’s jump into the next exercise and train a `StyleGAN2`\
    \ to do our bidding.\n\n**EXERCISE 8-2. TRAINING STYLEGAN2**\n\n1.  Open the `GEN_8_StyleGAN2.ipynb`\
    \ notebook from the GitHub project site. If you are unsure how, then consult Appendix\
    \ B.\n\n2.  This model can take a substantial amount of time to train, but the\
    \ results are worth it, and likewise, the saved models generated are also worth\
    \ keeping. With that in mind, for this notebook we will use the features discussed\
    \ in Appendix C that allow us to connect to our Google Drive and save the models\
    \ permanently. The top cells of the notebook provide for the connection to your\
    \ Google Drive.\n\n3.  Next, we will install the `PyPi` package `stylegan2_pytorch`\
    \ for the `StyleGAN2` with the following code:\n\n```\n!pip install stylegan2_pytorch\
    \ --quiet\n```\n\n4.  The next blocks of code download the images for `CelebA`\
    \ and unpack them into a folder on your Google Drive called `stylegan2`.\n\n5.\
    \  Now, when you download the `CelebA` dataset, it will be saved to your Google\
    \ Drive. This means that successive runs of this notebook can now refer directly\
    \ to the saved folder and not be required to redownload the data. Again, the details\
    \ of setting up saving and loading data and models to your Google Drive are covered\
    \ in Appendix C.\n\n6.  Finally, we can simply run the model against the save\
    \ image folder using the following code. Notice the use of the `$` before the\
    \ variable `image_folder`. We use the `$` to substitute variables from the Python\
    \ code to the shell.\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig9_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig9_HTML.jpg)\n\
    \n**Figure 8-9a**  \nExamining generated output while training\n\n7.  When you\
    \ run the last cell, the model will be set up and begin ingesting real images\
    \ from the saved image folder. While running the code, output is saved into your\
    \ Google Drive within the `stylegan2` folder in subfolders called `results`. Along\
    \ with the generated output, models of the current training spot are also saved\
    \ into another folder called `models`. Refer to Appendix C on how to load/save\
    \ models.\n\n8.  You can view the generated output at any time by opening the\
    \ files folder using the left folder icon. Then drill down to the `gdrive/MyDrive/stylegan2/results/default`\
    \ folder, as shown in Figure [8-9a](#502181_1_En_8_Chapter.xhtml#Fig9).\n\n```\n\
    !stylegan2_pytorch --data $image_folder\n```"
  raw: "#### Weight Demodulation\n\nThe AdaIN layers are a derivation from an earlier\
    \ concept called *neural-style transfer* where styles could be captured and transferred.\
    \ However, what the authors of StyleGAN2 found was that visual artifacts such\
    \ as water droplets or smudges could be carried through images by the reinforcement\
    \ of the styles.\n\nInstead, what they discovered is that the AdaIN layers could\
    \ be moved to inside the convolutional layers themselves and not used as direct\
    \ inputs but rather baked in as normalization.\n\nThe benefit of baking in the\
    \ style normalization to the convolutional layers themselves provided for parallelization\
    \ of the computations, thus allowing for models to train upward of 40 percent\
    \ faster and further removing visual artifacts like droplets or smudges.\n\n####\
    \ Path Length Regularization\n\nThis introduces a new normalization term to the\
    \ loss to better smooth or make uniform the latent space. We have seen throughout\
    \ this book the importance of normalizing or making uniform the latent space in\
    \ generative models. It has been a critical concept in understanding how to producing\
    \ models that can generate consistent output.\n\nSmoothing the latent space provides\
    \ for the mapping of images more readily into and out of the space in known projections\
    \ allows for more controlled generation of images but also provides for projection\
    \ of images back into latent space encodings. Understanding this relationship\
    \ from latent space to generated images allows for images to be generated across\
    \ a path of latent space.\n\nThe capability to smooth and understand the latent\
    \ space provides further applications from animation to age progression and more.\
