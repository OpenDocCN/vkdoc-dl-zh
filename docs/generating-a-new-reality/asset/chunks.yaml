    \ += [\n            nn.Upsample(scale_factor=2),\n            nn.Conv2d(in_features,\
    \ out_features, 3, stride=1, padding=1),\n            nn.InstanceNorm2d(out_features),\n\
    \            nn.ReLU(inplace=True),\n        ]\n        in_features = out_features\n\
    \    # 输出层\n    model += [n...\n```\n\n6. 在创建优化器之后，我们立即添加了一个名为*调度器*的新工具。调度器用于在训练过程中修改超参数。在本例中，我们使用调度器来修改训练期间的学习率。对于这个模型，我们随时间降低学习率，从而使模型能够先进行大幅调整，然后逐渐进行微调。\n"
- fmt: "# Learning rate update schedulers\n\n```python\nlr_scheduler_G = torch.optim.lr_scheduler.LambdaLR(\n\
    \    optimizer_G, lr_lambda=LambdaLR(hp.n_epochs, hp.epoch, hp.decay_epoch).step\n\
    )\nlr_scheduler_D_A = torch.optim.lr_scheduler.LambdaLR(\n    optimizer_D_A, lr_lambda=LambdaLR(hp.n_epochs,\
    \ hp.epoch, hp.decay_epoch).step\n)\nlr_scheduler_D_B = torch.optim.lr_scheduler.LambdaLR(\n\
    \    optimizer_D_B, lr_lambda=LambdaLR(hp.n_epochs, hp.epoch, hp.decay_epoch).step\n\
    )\n```\n\n2. Jump down to the training code, where we will first look at how the\
    \ identity loss is calculated.\n\n```python\n# Loss functions\ncriterion_GAN =\
    \ torch.nn.MSELoss()\ncriterion_cycle = torch.nn.L1Loss()\ncriterion_identity\
    \ = torch.nn.L1Loss()\ninput_shape = (hp.channels, hp.img_size, hp.img_size)\n\
    # Initialize generator and discriminator\nG_AB = GeneratorResNet(input_shape,\
    \ hp.n_residual_blocks)\nG_BA = GeneratorResNet(input_shape, hp.n_residual_blocks)\n\
    D_A = Discriminator(input_shape)\nD_B = Discriminator(input_shape)\noptimizer_G\
    \ = torch.optim.Adam(\n    itertools.chain(G_AB.parameters(), G_BA.parameters()),\
    \ lr=hp.lr, betas=(hp.b1, hp.b2)\n)\noptimizer_D_A = torch.optim.Adam(D_A.parameters(),\
    \ lr=hp.lr, betas=(hp.b1, hp.b2))\noptimizer_D_B = torch.optim.Adam(D_B.parameters(),\
    \ lr=hp.lr, betas=(hp.b1, hp.b2))\n```\n\n1. Next the GAN or adversarial loss\
    \ is like many previous examples:\n\n```python\nloss_id_A = criterion_identity(G_BA(real_A),\
    \ real_A)\nloss_id_B = criterion_identity(G_AB(real_B), real_B)\nloss_identity\
    \ = (loss_id_A + loss_id_B) / 2\n```\n\n1. Finally, the cycle loss is like what\
    \ we did in Chapter [4](#502181_1_En_4_Chapter.xhtml), and then we calculate the\
    \ final loss using the lambda scalings:\n\n```python\nfake_B = G_AB(real_A)\n\
    loss_GAN_AB = criterion_GAN(D_B(fake_B), valid)\nfake_A = G_BA(real_B)\nloss_GAN_BA\
    \ = criterion_GAN(D_A(fake_A), valid)\nloss_GAN = (loss_GAN_AB + loss_GAN_BA)\
    \ / 2\n```\n\n```python\nrecov_A = G_BA(fake_B)\nloss_cycle_A = criterion_cycle(recov_A,\
    \ real_A)\nrecov_B = G_AB(fake_A)\nloss_cycle_B = criterion_cycle(recov_B, real_B)\n\
    loss_cycle = (loss_cycle_A + loss_cycle_B) / 2\n# Total loss\nloss_G = loss_GAN\
    \ + hp.lambda_cyc * loss_cycle + hp.lambda_id * loss_identity\n```\n\nWhile running\
    \ this example on your chosen dataset, you may notice some of those bright patches\
    \ appearing. This is being caused by feature over feature extraction, and it should\
    \ quickly go away. If you find it persists, you can increase the hyperparameter\
    \ `n_residual_blocks` to increase the number of residual blocks in the generator.\n\
    \nIncreasing the number of blocks in the residual generator will reduce the feature\
    \ over feature extraction issues but will take longer to train. The longer training\
    \ time is a result of the increased number of weights/parameters in the network.\n\
    \nFigure [6-4](#502181_1_En_6_Chapter.xhtml#Fig4) shows a subset of the results\
    \ of training the CycleGAN on Horse to Zebras over 200 epochs using a residual\
    \ generator with 9 residual blocks. The results are not optimal, but as you can\
    \ see, the generator does a good job. We could, of course, improve on this training\
    \ example with tweaking and hyperparameter tuning.\n\n![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig4_HTML.jpg](images/502181_1_En_6_Chapter/502181_1_En_6_Fig4_HTML.jpg)\n\
    \n**Figure 6-4** Sample training output from CycleGAN\n\nOne thing that can make\
    \ the translation more natural is adding residual blocks. You can go back and\
    \ try adding residual blocks using the hyperparameter and watch the effect on\
    \ training. You may also want to switch datasets and retrain to see the effect\
    \ swapping the data domain has.\n\n`ResNet` provides a useful set of tools to\
    \ the application of image to image translation by learning to replicate features.\
    \ It can also be useful in other applications of classification as we saw and\
    \ other forms of image translation. We will look at a new form of conditioned\
    \ image translation in the next section.\n\n## Creating Faces with StarGAN\n\n\
    Up to this point we have looked at unconditional image to image translation using\
    \ paired or unpaired training sets. As we learned through our progression of GANs,\
    \ one useful feature is the ability to condition output. Not only does this provide\
    \ us with control of the output, but it also increases the training performance\
    \ of the model.\n\nOne such GAN devised to introduce conditioning was the StarGAN.\
    \ It was so named because the GAN is conditionally trained on a comprehensive\
    \ dataset of celebrity faces that have been annotated with attributes. The dataset’s\
    \ name is `CelebA`, and it has become the standard for face training datasets.\n\
    \n`CelebA` by itself comes in a few flavors. The version we will be using has\
    \ the faces centered in the frame. Along with this, we will be using an annotated\
    \ text file that attempts to describe the images with 30+ attributes from black\
    \ to blond hair, male, and young.\n\n`StarGAN` itself is just an advanced implementation\
    \ of a conditioned GAN such as the `cGAN`/`CGAN` or `cDCGAN` we reviewed previously.\
    \ The incredible thing about StarGAN is how well it uses residual networks to\
    \ produce some incredible output.\n\nFigure [6-5](#502181_1_En_6_Chapter.xhtml#Fig5)\
    \ shows the output of the StarGAN notebook we will look at in Exercise 6-3. The\
    \ GAN was conditionally trained on these classes: black hair, blond hair, brown\
    \ hair, male, and young. Based on the output from the figure, it looks like it\
    \ does a generally good job aside from perhaps the young attribute.\n\nSince we\
    \ reviewed a conditioned GAN previously and already covered image to image translation,\
    \ we can move on to working with Exercise 6-3. In this exercise, we look at an\
    \ implementation of the StarGAN trained on a subset of attributes and data.\n\n\
    ![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig5_HTML.jpg](images/502181_1_En_6_Chapter/502181_1_En_6_Fig5_HTML.jpg)\n\
    \n**Figure 6-5** Output from StarGAN trained at 65 epochs\n\n## EXERCISE 6-3.\
    \ FACE CONDITIONING WITH THE STARGAN\n\n1. Open the `GEN_6_StarGAN.ipynb` notebook\
    \ from the GitHub project site. If you are unsure how, then consult Appendix B.\
    \ Go ahead and run the entire notebook by selecting **Run** ➤ **Run all** from\
    \ the menu.\n\n2. The bulk of this notebook’s code should be familiar, but we\
    \ will again cover the new or different hyperparameters shown. The `n_residual_blocks`\
    \ hyperparameter allows for us to control the number of residual blocks used in\
    \ the generator, where `lambda_cls` and `lambda_rec` control the scale on the\
    \ class and reconversion loss, respectively. The `lambda_gp` hyperparameter scales\
    \ the amount of gradient penalty that affects the adversarial loss. The number\
    \ of critics (`n_critics`) is the number of times the discriminator trains before\
    \ the generator.\n\n3. The image-aligned `CelebA` dataset we are using is quite\
    \ large, more than 200,000 images. As such, there is an additional hyperparameter\
    \ of note, `train_split`, which controls the amount of data the model trains on.\
    \ The value is set to `.2`, or 20 percent, of the images. This is done to reduce\
    \ the training time, but it can affect the output quality.\n\n```python\nn_critic=5,\n\
    residual_blocks=16,\nlambda_cls = 1,\nlambda_rec = 10,\nlambda_gp = 10\n```\n\n\
    4. Another important modification we make is to zoom in on the face images and\
    \ then crop them when we load them into the dataset. This is performed with the\
    \ set of transforms shown here and greatly improves training performance:\n\n\
    ```python\ntrain_split=.2\n```\n\n5. Next, we will jump down to the loss function\
    \ definition and the creation of the model’s code. At the top of the code the\
    \ loss function `criterion_cls` takes as input the `logit` (class) and target,\
    \ which it then passes through the binary cross entropy loss with the logits function.\
    \ The output of this is divided by `size(0)`, or the batch size, thus averaging\
    \ the results."
