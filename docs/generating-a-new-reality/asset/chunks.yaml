    \    self.generator = nn.Sequential(\n    nn.Linear(self.latent_dim, 256),\n \
    \   nn.LeakyReLU(0.2),\n    nn.Linear(256, 512),\n    nn.LeakyReLU(0.2),\n   \
    \ nn.Linear(512, 1024),\n    nn.LeakyReLU(0.2),\n    nn.Linear(1024, self.output_dim),\n\
    \    nn.Tanh()\n    )\n    def forward(self, x):\n    x = self.generator(x)\n\
    \    x = x.view(-1, 1, 28, 28)\n    return x\n    ```\n\n4.  After that comes\
    \ the discriminator, which resembles the encoder from an autoencoder, with the\
    \ difference being the output is only two classes, real or fake. In the forward/predict\
    \ function, the input is reshaped from a 28×28 image to an input vector of size\
    \ 784\\. Other than that, the architecture of the model resembles a typical classifier,\
    \ which is what it also is. In fact, a fully trained discriminator can have excellent\
    \ applications in classifying data as real or fake for other applications outside\
    \ of GANs, perhaps being able to determine if some input image is of a particular\
    \ type based on the data fed the GAN. You could therefore train a discriminator\
    \ on faces, and it would learn to recognize a real or fake face.\n\n```\n    class\
    \ Discriminator(nn.Module):\n    def __init__(self, input_dim=784, output_dim=1):\n\
    \    super(Discriminator, self).__init__()\n    self.input_dim = input_dim\n \
    \   self.output_dim = output_dim\n    self.discriminator = nn.Sequential(\n  \
    \  nn.Linear(self.input_dim, 1024),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n\
    \    nn.Linear(1024, 512),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n   \
    \ nn.Linear(512, 256),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n    nn.Linear(256,\
    \ self.output_dim),\n    nn.Sigmoid()\n    )\n    def forward(self, x):\n    x\
    \ = x.view(-1, 784)\n    x = self.discriminator(x)\n    return x\n    ```\n\n\
    5.  With the classes built, we can move on to instantiate them this time with\
    \ GPU (`cuda`) support for more performant training. In addition, we will create\
    \ the optimizer and loss function.\n\n```\n    generator = Generator()\n    discriminator\
    \ = Discriminator()\n    generator.to(device)\n    discriminator.to(device)\n\
    \    g_optim = optim.Adam(generator.parameters(), lr=2e-4)\n    d_optim = optim.Adam(discriminator.parameters(),\
    \ lr=2e-4)\n    g_losses = []\n    d_losses = []\n    loss_fn = nn.BCELoss()\n\
    \    ```\n\n6.  We also need to create some helper functions. The first function\
    \ `noise` generates the random noise we input into the generator. The second function\
    \ `make_ones` is a helper to mark the batch as real, with 1s. Then the third function,\
    \ `make_zeros`, does the opposite and marks the batch of images with a zero for\
    \ fake.\n\n```\n    def noise(n, n_features=128):\n    return Variable(torch.randn(n,\
    \ n_features)).to(device)\n    def make_ones(size):\n    data = Variable(torch.ones(size,\
    \ 1))\n    return data.to(device)\n    def make_zeros(size):\n    data = Variable(torch.zeros(size,\
    \ 1))\n    return data.to(device)\n    ```\n\n7.  Then we add an extra helper\
    \ function to train the discriminator. Recall that the discriminator is trained\
    \ on both the real images as well as the fake images from the generator. Then\
    \ notice that we pass the real data into the discriminator and use that to predict\
    \ the real loss, `loss_real`. That loss is then backpropagated through the discriminator.\
    \ After that, we test a set of fake images and pass that loss backward to the\
    \ network. Then we return the combined output of both losses. You should also\
    \ notice the use of the functions `make_ones` and `make_zeros` being used to label\
    \ the data as real (`1`) or fake (`0`)."
  trans: "\n# 生成对抗网络\n\n生成对抗网络出现的时间并不长。GAN 与自编码器类似，都包含两个模型，但 GAN 使用的是判别器和生成器，而非编码器和解码器。\n\
    \n图 2-10 展示了 GAN 的架构。我们常用一个比喻来描述 GAN 的过程：艺术品鉴定师与艺术品伪造者之间的互动。在这个场景中，艺术品伪造者致力于创作出足以乱真的赝品，让鉴定师误以为真。艺术品鉴定师通过观察真品来学习辨别真伪。而伪造者则通过不断创作艺术品，并让鉴定师检验，从而提升自己的技艺。\n\
    \n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig10_HTML.jpg](img/502181_1_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10\n\nGAN 架构\n\n在 GAN 中，艺术品伪造者就是生成器。生成器从一个我们定义为`Z`的随机潜在空间中生成图像或艺术品。图像生成后，会被展示给鉴定师（即判别器）。判别器通过观察真实图像样本以及生成器生成的假图像来学习。\n\
    \n判别器通过分析真实图像和假图像来确定损失。如果它认为一张真实图像是假的，就会向自身输出较高的损失。同样，如果生成器将一张假图像成功冒充为真，那么它就会向判别器返回较高的损失，而向自身（生成器）返回较低的损失。两个模型协同学习，各自在生成图像或判断图像真伪方面不断提升。\n\
    \n虽然 GAN 的架构看似过于复杂，但它实际上只是将自编码器的架构拆分开并反转过来：生成器相当于解码器，而判别器则类似于编码器。因此，判别器就像编码器，但它的输出不是编码，而是“真”或“假”。另一方面，生成器接收一个看似毫无意义的随机潜在数据空间，并学习创建新的图像，这些图像能够被判别器误认为是真实的。\n\
    \n在练习 2-4 中，我们将构建一个基础版（vanilla）GAN。通过这种基础形式的 GAN，我们将学习如何生成 MNIST 手写数据集中的数字。我们不会构建一个\
    \ GAN 类，而是为生成器和判别器分别创建两个类，并编写代码对它们进行独立训练。\n\n## 练习 2-4. 构建基础版 GAN\n\n1.  从项目的\
    \ GitHub 站点打开`GEN_2_vanilla_gan.ipynb`笔记本。从菜单中选择“运行时” ➤ “全部运行”来运行整个工作表。\n\n2.\
    \  跳过工作表顶部的`imports`和`imshow`辅助函数，我们进入数据加载和转换代码。到目前为止，所有这些代码应该都是复习内容。\n\n```\n\
    \    transform = transforms.Compose([\n    transforms.ToTensor(),\n    transforms.Normalize((0.5,),(0.5,))\n\
    \    ])\n    to_image = transforms.ToPILImage()\n    trainset = MNIST(root='./data/',\
    \ train=True, download=True, transform=transform)\n    train_loader = DataLoader(trainset,\
    \ batch_size=100, shuffle=True)\n    device = 'cuda'\n```\n\n3.  接下来，我们进入`Generator`类。生成器扮演的角色与自编码器中的解码器相同。生成器的关键区别在于其输入只是随机噪声。你可以将这些随机噪声想象成随机的思维向量。除此之外，代码与我们之前见过的解码器非常相似。这个随机向量的大小由输入中的`latent_dim`定义。你可能还会注意到使用了新的激活函数`LeakyReLU`。这个函数允许一定量的负值通过，而不是将值在\
    \ 0 处截断。对于前向/预测函数，你可以看到输出被重塑为图像的`1,28,28`张量。\n\n```\n    class Generator(nn.Module):\n\
    \    def __init__(self, latent_dim=128, output_dim=784):\n    super(Generator,\
    \ self).__init__()\n    self.latent_dim = latent_dim\n    self.output_dim = output_dim\n\
    \    self.generator = nn.Sequential(\n    nn.Linear(self.latent_dim, 256),\n \
    \   nn.LeakyReLU(0.2),\n    nn.Linear(256, 512),\n    nn.LeakyReLU(0.2),\n   \
    \ nn.Linear(512, 1024),\n    nn.LeakyReLU(0.2),\n    nn.Linear(1024, self.output_dim),\n\
    \    nn.Tanh()\n    )\n    def forward(self, x):\n    x = self.generator(x)\n\
    \    x = x.view(-1, 1, 28, 28)\n    return x\n```\n\n4.  之后是判别器，它类似于自编码器中的编码器，区别在于输出只有两个类别：真或假。在前向/预测函数中，输入从\
    \ 28×28 的图像重塑为大小为 784 的输入向量。除此之外，模型的架构类似于典型的分类器，而它本身也确实是一个分类器。事实上，一个训练有素的判别器在\
    \ GAN 之外的其他应用中，也能出色地用于将数据分类为真或假，例如，根据输入给 GAN 的数据，判断某个输入图像是否属于特定类型。因此，你可以用人脸数据训练一个判别器，它就能学会识别人脸的真伪。\n\
    \n```\n    class Discriminator(nn.Module):\n    def __init__(self, input_dim=784,\
    \ output_dim=1):\n    super(Discriminator, self).__init__()\n    self.input_dim\
    \ = input_dim\n    self.output_dim = output_dim\n    self.discriminator = nn.Sequential(\n\
    \    nn.Linear(self.input_dim, 1024),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n\
    \    nn.Linear(1024, 512),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n   \
    \ nn.Linear(512, 256),\n    nn.LeakyReLU(0.2),\n    nn.Dropout(0.3),\n    nn.Linear(256,\
    \ self.output_dim),\n    nn.Sigmoid()\n    )\n    def forward(self, x):\n    x\
    \ = x.view(-1, 784)\n    x = self.discriminator(x)\n    return x\n```\n\n5.  构建好类之后，我们可以继续实例化它们，这次使用\
    \ GPU（`cuda`）支持以获得更高的训练性能。此外，我们还将创建优化器和损失函数。\n\n```\n    generator = Generator()\n\
    \    discriminator = Discriminator()\n    generator.to(device)\n    discriminator.to(device)\n\
    \    g_optim = optim.Adam(generator.parameters(), lr=2e-4)\n    d_optim = optim.Adam(discriminator.parameters(),\
    \ lr=2e-4)\n    g_losses = []\n    d_losses = []\n    loss_fn = nn.BCELoss()\n\
    ```\n\n6.  我们还需要创建一些辅助函数。第一个函数`noise`生成我们输入到生成器中的随机噪声。第二个函数`make_ones`是一个辅助函数，用于将批次标记为真实（用\
    \ 1 表示）。第三个函数`make_zeros`则相反，将图像批次标记为假（用 0 表示）。\n\n```\n    def noise(n, n_features=128):\n\
    \    return Variable(torch.randn(n, n_features)).to(device)\n    def make_ones(size):\n\
    \    data = Variable(torch.ones(size, 1))\n    return data.to(device)\n    def\
    \ make_zeros(size):\n    data = Variable(torch.zeros(size, 1))\n    return data.to(device)\n\
    ```\n\n7.  然后我们添加一个额外的辅助函数来训练判别器。回想一下，判别器是在真实图像和生成器生成的假图像上共同训练的。注意，我们将真实数据传入判别器，并用它来预测真实损失`loss_real`。然后，该损失通过判别器进行反向传播。之后，我们测试一组假图像，并将该损失反向传播到网络。最后，我们返回两个损失的总和。你还应该注意到使用了`make_ones`和`make_zeros`函数来将数据标记为真实（`1`）或虚假（`0`）。\n"
- fmt: "```python\ndef train_discriminator(optimizer, real_data, fake_data):\n   \
    \ n = real_data.size(0)\n    optimizer.zero_grad()\n    prediction_real = discriminator(real_data)\n\
    \    loss_real = loss_fn(prediction_real, make_ones(n))\n    loss_real.backward()\n\
    \    prediction_fake = discriminator(fake_data)\n    loss_fake = loss_fn(prediction_fake,\
    \ make_zeros(n))\n    loss_fake.backward()\n    optimizer.step()\n    return loss_real\
    \ + loss_fake\n```\n\n8.  We also create a helper function to train the generator.\
    \ In the second train function, we only need to pass the fake/generated images\
    \ into the discriminator to evaluate the loss. Notice the use of the helper function\
    \ `make_ones` being used to label the data as real.\n\n```python\ndef train_generator(optimizer,\
    \ fake_data):\n    n = fake_data.size(0)\n    optimizer.zero_grad()\n    prediction\
    \ = discriminator(fake_data)\n    loss = loss_fn(prediction, make_ones(n))\n \
    \   loss.backward()\n    optimizer.step()\n    return loss\n```\n\n9.  Finally,\
    \ we come to the training code, which is slightly different than we’ve seen before.\
    \ Since we constructed two helper functions to independently train the generator\
    \ and discriminator, this code loops through and calls those *functions*. Notice\
    \ the addition of an internal training loop restricted by `k`. This internal loop\
    \ can be used to increase the number of iterations we train the discriminator\
    \ on each epoch. We may want or need to do this to better balance the training.\
    \ It is best to keep both models in a GAN learning at the same rate.\n\n```python\n\
    epochs = 250\nk = 1\ntest_noise = noise(64)\ngenerator.train()\ndiscriminator.train()\n\
    for epoch in range(epochs):\n    g_loss = 0.0\n    d_loss = 0.0\n    for i, data\
    \ in enumerate(train_loader):\n        imgs, _ = data\n        n = len(imgs)\n\
    \        for j in range(k):\n            fake_data = generator(noise(n)).detach()\n\
    \            real_data = imgs.to(device)\n            d_loss += train_discriminator(d_optim,\
    \ real_data, fake_data)\n        fake_data = generator(noise(n))\n        g_loss\
    \ += train_generator(g_optim, fake_data)\n    img = generator(test_noise).cpu().detach()\n\
    \    g_losses.append(g_loss/i)\n    d_losses.append(d_loss/i)\n    clear_output()\n\
    \    print(f'Epoch {epoch+1}: g_loss: {g_loss/i:.8f} d_loss: {d_loss/i:.8f}')\n\
    \    imshow(make_grid(img))\n```\n\nFigure [2-11](#502181_1_En_2_Chapter.xhtml#Fig11)\
    \ shows the output generation at the start of training, then to epoch 150 or so,\
    \ and at the final 250 epochs. As you run the exercise, you will see the output\
    \ update over time as well. Notice how the images start out very rough and random\
    \ but over training become quite readable as handwritten digits.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig11_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig11_HTML.jpg)\n\
    \n**Figure 2-11** Training a GAN on MNIST\n\nAnother key difference to understand\
    \ with a GAN is that the images are entirely generated from random noise. Remember\
    \ the input into our generator is just random noise. Over time the generator has\
    \ learned to convert that noise to realistic-looking digits. Keep in mind those\
    \ digits were not drawn but were generated from essentially nothing.\n\nOnce you\
    \ get the basics of a GAN, you can start to understand its potential to generate\
    \ anything. Indeed, the number of GAN applications and variants are exploding\
    \ daily. In the next section, we look at a first-step improvement on the vanilla\
    \ GAN.\n\n## Deep Convolutional GAN\n\nDeep convolutional GANs (DCGANs) are a\
    \ first-level improvement to the vanilla GAN by adding convolutional layers. Just\
    \ like our previous work on autoencoders when we added convolution, the architecture\
    \ changes are almost exact. That means the encoder/discriminator will convolve\
    \ and extract features, while the decoder/generator will transpose to build features.\n\
    \nThe DCGAN is virtually identical to other features in training, with the one\
    \ exception being we may alter the input of random noise size. We can use the\
    \ same base of code and upgrade it to a DCGAN in our next exercise. With this\
    \ upgrade we will also want to increase the size of the input images. Bigger images\
    \ allow for more applications of convolution and thus feature extraction.\n\n\
    For Exercise 2-5 we have three options for the real set of training data to the\
    \ discriminator. Our ideal dataset will be the CelebA dataset, which is a collection\
    \ of celebrity faces. However, CelebA is a busy dataset and not always accessible\
    \ to download. Therefore, we also provide a couple of other options such as CIFAR10\
    \ and STL10. The STL10 dataset is the same as CIFAR, but the images are larger.\n\
    \n**EXERCISE 2-5. GENERATING FACES WITH DCGAN**\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig12_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig12_HTML.jpg)\n\
    \n**Figure 2-12** CelebA sample faces\n\n1.  Open the `GEN_2_DCGAN.ipynb` notebook\
    \ from the project’s GitHub site. From the menu, select Runtime ➤ Run All to run\
    \ the entire sheet.\n\n2.  The imports are almost identical to the previous exercise\
    \ with one key difference. We abstract the dataset import as `DS` so that we can\
    \ easily swap data sources from CelebA, CIFAR10, or STL10. If you want to use\
    \ a different dataset, change the import dataset.\n\n```python\nfrom torchvision.datasets\
    \ import CelebA as DS  #other options CIFAR10, STL10\n```\n\n3.  The next major\
    \ change is the transform we apply to the input dataset. For the import of this\
    \ data, we transform the data to an `image_size` of `64` for this version. Then\
    \ we use `CenterCrop` to crop the image and finally normalize it.\n\n```python\n\
    transform=transforms.Compose([\n    transforms.Resize(image_size),\n    transforms.CenterCrop(image_size),\n\
    \    transforms.ToTensor(),\n    transforms.Normalize((0.5, 0.5, 0.5), (0.5, 0.5,\
    \ 0.5)),\n])\n```\n\n4.  Figure [2-12](#502181_1_En_2_Chapter.xhtml#Fig12) shows\
    \ an excerpt from the output of the data loading and then the output of the real\
    \ images.\n\n5.  Next, we come to the updated `Generator` class. We can see the\
    \ inputs are updated to include a new input called `feature_maps`. The input `feature_maps`\
    \ sets the number of channels we pass between convolutional layers. You can treat\
    \ this number as a hyperparameter for tuning on other datasets. There is also\
    \ the addition of a new layer type called `BatchNorm2d`. This new layer renormalizes\
    \ the data as it passes through and is a way for us to limit the loss gradient\
    \ getting too big or too small.\n\nAs a network gets deeper with more layers,\
    \ there becomes a higher possibility that the loss gradient either gets too small\
    \ or gets too big. This is called *vanishing* or *exploding* gradients. By normalizing\
    \ the data as it passes through the network, we avoid the vanishing/exploding\
    \ gradients by keeping the weight parameters closer to zero. An added benefit\
    \ of this is increased training performance."
