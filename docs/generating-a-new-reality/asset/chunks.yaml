  trans: "\n# 2. 释放生成式建模的力量\n\n深度学习曾多年被束之高阁，常被视为伪科学或模糊科学。直到近十年，其爆发式增长才催生了新一波人工智能浪潮。人工智能已从使用监督学习发展到更高级的学习形式，包括无监督学习、自监督学习、对抗学习和强化学习。正是这些其他形式的学习，使得生成式建模领域得以蓬勃发展，并在众多领域取得进步。\n\
    \n深度学习的出现及其带来的创新架构，让我们得以更深入地理解人工智能学习的本质。过去我们难以实现能够自学习的人工智能，但借助深度学习，这已变得轻而易举。此外，各种新颖的学习形式也如雨后春笋般涌现。对抗学习在生成式建模中有着广泛应用，它的诞生反过来又推动了人工智能的爆发。\n\
    \n根据我们最新的定义，生成式建模是指构建一种人工智能或机器学习模型，使其能够利用多种学习方法，学习生成新颖且多样化的内容。这里的关键词是*生成*，切勿与过滤或转换内容相混淆。当我们构建生成模型时，它需要生成全新的内容，有时是完全随机的，但在许多情况下，我们可以有条件地控制内容的生成。\n\
    \n在本章中，我们将释放生成式建模的力量。我们将探索如何构建生成器的基础形式——*自编码器*。接着，我们将学习如何利用卷积从图像数据中更好地提取特征。在此基础上，我们将构建一个添加了卷积层以增强特征提取能力的自编码器。之后，我们将深入对抗学习的基础，探索生成对抗网络（GAN）。最后，我们将通过升级一个基础\
    \ GAN，使其使用深度卷积来结束本章。\n\n在本章介绍生成式建模时，我们将探讨从无监督学习到对抗学习和 GAN 等其他学习形式的基础。以下是本章将探讨的主要主题：\n\
    \n-   使用自编码器进行无监督学习\n-   使用卷积提取特征\n-   卷积自编码器\n-   生成对抗网络\n-   深度卷积 GAN\n\n在继续之前，请确保您已掌握第\
    \ 1 章中介绍的关于使用 PyTorch 进行深度学习的所有必要知识。在下一节中，我们将开始探索无监督学习和自编码器。\n\n## 使用自编码器进行无监督学习\n\
    \n监督学习，即带有标签的学习，是数据科学的基础，也是许多机器学习模型的基础。这是一种自然的学习形式，我们自己也经常用它来理解问题空间。当我们或其他动物这样做时，我们称之为*概念学习*。然而，概念学习的概念可能会与其他学习形式（如无监督学习）相融合。\n\
    \n无监督学习是一种自我或自监督学习形式，它允许机器通过理解数据的表示（无需标签）来学习某个概念。通过不使用标签，机器能够学习对象的表示，而不会受到标签偏差的影响。虽然在某些情况下，我们可能会使用标签来控制理解的某些方面，但重要的是要理解，在学习过程中并不使用标签。\n\
    \n为了训练机器/模型在没有标签的情况下学习某物的表示，我们构建了一个能够分解然后重新组合模型的机器。在深度学习中，这个过程被称为*编码*和*解码*，或*自编码*。自编码器是一种能够将数据编码或分解为某种较低级表示形式的机器。然后，它通过解码器从这种较低级形式重建数据。\n\
    \n图 2-1 展示了一个深度学习自编码器。左侧是输入，一个原始的 MNIST 数字被送入编码器。编码器将图像分解为某种潜在或隐藏形式。然后，解码器尽可能地将图像重建回原始状态，这不是通过使用标签，而是通过理解它重建图像的好坏程度。\n\
    \n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig1_HTML.jpg](img/502181_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1\n\n自编码器架构\n\n自编码器通过其重建原始图像的好坏程度来学习和改进其模型。实际上，我们通过比较原始图像和重建图像之间的像素差异来衡量自编码器中的误差或损失。对于深度学习自编码器，我们将编码器和解码器这两个模型堆叠在一起。\n\
    \n在练习 2-1 中，我们将使用 MNIST 时尚数据集与自编码器。该数据集包含十类你可能穿着或携带的服装，从鞋子、靴子和手提包到毛衣、裤子和连衣裙。这些图像也很好地展示了自编码器如何学习重建过程。\n\
    \n练习 2-1. 时尚自编码器\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig2_HTML.jpg](img/502181_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2\n\nFashion MNIST 数据集\n\n1.  从项目的 GitHub 站点打开 `GEN_2_autoencoder.ipynb`\
    \ 笔记本。如果您不确定如何访问源代码，请查看附录 B。\n\n2.  运行第一个导入单元格，然后转到设置一些图像辅助函数的下一个单元格。第一个函数 `imshow`\
    \ 用于将 PyTorch 张量图像渲染到 Matplotlib 图中。第二个函数 `to_img` 用于将张量转换为适当的大小和维度。\n\n```\n\
    def imshow(img,size=10):\n    img = img / 2 + 0.5\n    npimg = img.numpy()\n \
    \   plt.figure(figsize=(size, size))\n    plt.imshow(np.transpose(npimg, (1, 2,\
    \ 0)))\n    plt.show()\n\ndef to_img(x):\n    x = x.view(x.size(0), 1, 28, 28)\n\
    \    return x\n```\n\n3.  下一个代码块包含熟悉的超参数：\n\n```\nepochs = 100\nbatch_size = 64\n\
    learning_rate = 1e-3\n```\n\n4.  下一个代码块下载数据，对其进行转换，并将其分批到 `DataLoader` 中。然后我们从\
    \ `DataLoader` 中提取一批图像，并使用图像工具函数 `imshow` 和 `make_grid` 来渲染图 2-2。`make_grid` 函数是\
    \ `torchvision.utils` 模块的一部分。\n"
- fmt: "```python\nimg_transform = transforms.Compose([\n    transforms.ToTensor(),\n\
    \    transforms.Normalize([0.5], [0.5])\n])\ndataset = mnist('./data', download=True,\
    \ transform=img_transform)\ndataloader = DataLoader(dataset, batch_size=batch_size,\
    \ shuffle=True)\ndataiter = iter(dataloader)\nimages, labels = dataiter.next()\n\
    imshow(make_grid(images, nrow=8))\n```\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig3_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3** Training the autoencoder\n\n1.  Next, we create a class for the\
    \ autoencoder. Inside this class we construct two models, an encoder and decoder.\
    \ The encoder reduces the input data from a vector of size 784 (28×28) down to\
    \ 128 input neurons. This gets reduced further to 64, then to 12, and finally\
    \ to an output vector of size 3. The decoder takes as input a vector of size 3,\
    \ from the encoder. Then it builds it up to 12, 64, 128, and finally 784 outputs,\
    \ where the complete output from the decoder should match the input image. Inside\
    \ the `forward` or predict function, we can see the encoder model being fed the\
    \ image, encoding it, and then passing the output to the decoder that rebuilds\
    \ the image.\n\n```python\nclass Autoencoder(nn.Module):\n    def __init__(self):\n\
    \        super(Autoencoder, self).__init__()\n        self.encoder = nn.Sequential(\n\
    \            nn.Linear(28 * 28, 128),\n            nn.ReLU(True),\n          \
    \  nn.Linear(128, 64),\n            nn.ReLU(True), nn.Linear(64, 12), nn.ReLU(True),\
    \ nn.Linear(12, 3))\n        self.decoder = nn.Sequential(\n            nn.Linear(3,\
    \ 12),\n            nn.ReLU(True),\n            nn.Linear(12, 64),\n         \
    \   nn.ReLU(True),\n            nn.Linear(64, 128),\n            nn.ReLU(True),\
    \ nn.Linear(128, 28 * 28), nn.Tanh())\n\n    def forward(self, x):\n        x\
    \ = self.encoder(x)\n        x = self.decoder(x)\n        return x\n```\n\n2.\
    \  In the next cell, we instantiate the model and construct the loss function\
    \ and optimizer.\n\n```python\nmodel = Autoencoder()\nloss_fn = nn.MSELoss()\n\
    optimizer = torch.optim.Adam(\n    model.parameters(), lr=learning_rate, weight_decay=1e-5)\n\
    ```\n\n3.  Now we can move on to the training code and where all the magic happens.\
    \ Again, we see the familiar double loop, looping through epochs and then data.\
    \ Inside that, we can see the data is extracted from the `dataloader`, but we\
    \ ignore the labels. We wrap up the images and feed them to the model to output\
    \ the `y_pred` or decoded output. Then we take the MSE loss for each pixel in\
    \ the image. Where the differences in pixel values are the loss, we train back\
    \ to the network. The rest of the code resets the gradient and then pushes back\
    \ the loss through the network.\n\n```python\nfor epoch in range(epochs):\n  \
    \  for data in dataloader:\n        x_img, _ = data\n        x_img = x_img.view(x_img.size(0),\
    \ -1)\n        x_img = Variable(x_img)\n        # ===================forward=====================\n\
    \        y_pred = model(x_img)\n        loss = loss_fn(y_pred, x_img)\n      \
    \  # ===================backward====================\n        optimizer.zero_grad()\n\
    \        loss.backward()\n        optimizer.step()\n        # ===================log========================\n\
    \        clear_output()\n        print(f'epoch [{epoch}/{epochs}], loss:{loss.data:.4f}')\n\
    \        pic = to_img(y_pred.cpu().data)\n        imshow(make_grid(pic))\n```\n\
    \n4.  As you run the training code cell, you will see how the model improves over\
    \ time. Figure [2-3](#502181_1_En_2_Chapter.xhtml#Fig3) shows the difference in\
    \ the first training epoch to the last.\n\nAt this stage, we have an autoencoder\
    \ that can encode an image of some piece of clothing down to vector representation\
    \ of size 3. That latent or hidden representation of the image may also be referred\
    \ to as an *encoding* or *embedding*. We can use that learned encoding to represent\
    \ characteristics of the images that make them unique, and the best part is the\
    \ machine learns this on its own. In Chapter [3](#502181_1_En_3_Chapter.xhtml),\
    \ we will look at more ways of understanding how these encodings can be visualized.\n\
    \nOur focus at this stage is to understand how an image can be decomposed into\
    \ some lower representation and then rebuilt using unsupervised learning. That\
    \ is, at no point did we label the images, and the model was learned entirely\
    \ by understanding the reconstruction of images. This is an immensely powerful\
    \ concept, and we use it throughout deep learning.\n\nThe process of learning\
    \ to encode and decode data reduces dimensionality in data to understand how similar\
    \ words are in natural language processing. It has also been extended to machine\
    \ translation and text generation using transformers. Autoencoders are often the\
    \ first demonstration of combining multiple forms of network architecture to solve\
    \ some tasks.\n\nWhile we were able to achieve some nice results with the networks\
    \ we have used thus far, we need to discover new improvements to network layers\
    \ that allow us to extract features from data. In the next section, we learn how\
    \ using a convolutional filter can extract features in images and other data."
