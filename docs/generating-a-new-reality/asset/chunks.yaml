  trans: '

    # 什么是注意力？


    我们可以将“*注意力*”一词理解为：你或其他实体专注于特定任务或其他实体的程度。在军队中，你可能被要求“立正”（come to attention），意思是站直并目视前方；而亲密的朋友或亲戚可能会用这个词来请求你的陪伴和关注。


    无论如何，我们都可以将注意力理解为一个实体关注或听从另一个实体指令的程度。简单来说，我们可以这样关联对象：A 关注 B，但 B 可能不关注 A。换句话说，A
    听从 B 的指令，但 B 不听从 A 的指令。


    图 7-1 展示了一个关于鼠标在网页表单上移动的热度注意力图。图中，颜色代表热度或注意力程度。红色区域代表我们注意力集中的热点区域，或者访问者鼠标悬停的区域。较冷的蓝色区域代表鼠标很少或没有关注。


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig1_HTML.jpg](img/502181_1_En_7_Fig1_HTML.jpg)


    图 7-1


    鼠标移动注意力图


    在数学和深度学习的各种应用中使用的注意力，通常与图 7-1 中的示例非常相似。事实上，我们将在本章后面看到其中一些注意力图。这些示例可能使用不同的渐变来表示注意力，但概念是相同的。


    注意力的概念最初被应用于自然语言处理，作为一种在序列到序列翻译模型中关联词对的方法。众所周知的 `Seq2Seq` 模型，其概念与自编码器非常相似。它们通过从词对中学习来有效地翻译语言，这个想法与我们用于图像到图像翻译的
    GAN 并无不同。


    传统上，在 NLP 应用中，使用循环或门控网络层来识别单词之间的关系。这与卷积不同，循环网络依赖于一种递归方法来展开序列以训练网络层。这使得深度学习模型能够学习时间或语言上的序列。


    不幸的是，循环网络的可扩展性不佳，尤其是当学习的序列规模增大时。事实上，原始论文中注意力机制承诺的主要改进之一就是提高了训练的可扩展性，特别是在应用于更长的序列时。


    将注意力机制添加到 NLP 模型中，通常被封装在一种称为*变换器*（transformers）的升级版 `Seq2Seq` 模型类型中。因此，带有注意力机制的变换器彻底革新了自然语言模型，带来了前所未有的提升。你可能已经听说过这些模型被称为
    `BERT`，或者更著名的 `GPT-2` 和 `GPT-3`。


    图 7-2 展示了一组语言翻译文本的注意力图。图的左侧是英文单词，顶部是相同短语的西班牙语。图中较亮的区域表示单词之间相互关注的程度更高。暗色区域表示单词之间可能没有关联。


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig2_HTML.jpg](img/502181_1_En_7_Fig2_HTML.jpg)


    图 7-2


    用于语言翻译的 NLP 注意力图


    NLP 模型在生成文本翻译时，会利用注意力来权衡最可能的单词配对。这使得模型不仅能学习单词序列，还能学习单词之间如何链接或关联。这个概念已经有效地取代了 NLP
    任务中对循环网络的依赖。


    `GPT-2` 花了将近一年时间才向公众发布，原因是担心该模型能够生成看似可信但实则虚假的新闻文本。虽然本书不涉及 NLP 文本生成，但只需认识到这些模型共享许多相同的概念。在下一节中，我们将探讨注意力的类型以及它们之间的关系。


    ## 理解注意力的类型


    我们通常认为“*注意力*”这个词是二元的，意思是你要么在专注，要么不在，尽管我们在日常生活中理解并使用着各种类型的专注。我们可能会用其他措辞来表示我们的注意力集中在某个特定问题上，无论是局部还是全局，甚至进一步专注于一组任务或项目中的特定元素，并理解它们彼此之间以及自身之间的关系。


    在机器学习中，注意力是一种机制，我们可以用它来在不同上下文中关联特征与其他特征。我们可能需要考虑局部特征组如何相互关注，或者一个特征在全局上下文中如何表示。注意力可以是局部注意力或全局注意力，也可以是硬注意力或软注意力。


    图 7-3 展示了应用于图像的两种注意力类型。在左侧，我们看到狗的头部是清晰的，身体其余部分仍然略微可见但不太清晰。这是一个全局注意力的例子，因为我们可以看到狗的头部与图像其余部分的关系。然而，它也是一个软注意力的例子，因为我们可以观察到图像中清晰度的逐渐丧失。


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig3_HTML.jpg](img/502181_1_En_7_Fig3_HTML.jpg)


    图 7-3


    注意力类型作用于图像的示例


    相反，图 7-3 的右侧展示了一个硬局部注意力的例子。它是“硬”的，因为我们只关注一个局部区域，完全忽略了图像的其余部分。同样，这种注意力也是局部的，因为我们不知道狗的头部在全局中相对于图像其他部分应该如何呈现。


    卷积层是局部软或硬注意力机制的一个例子。当与池化层一起使用时，CNN 是硬聚焦的，因为它们移除了空间关系，从而使提取的特征输出变得块状。使用卷积残差块的 `ResNet`
    模型是局部软注意力机制的一个例子。软化是由于残差在层间传递或跳跃而产生的。


    自注意力（原始论文中提出的注意力类型）是一种进一步的类型，它使用全局软机制来学习特征自身或特征内部的重要性。这以特征/注意力图的形式产生输出，显示一个特征与另一个特征之间的关系。


    图 7-4 展示了自注意力如何应用于句子中的单词。高亮（红色）文本显示了句子中的焦点词，以及它如何与句子中每组单词的其他单词相关联。单词周围的阴影越深，该单词与焦点词的相关性或关注度就越高。图
    7-2 也展示了自注意力应用于注意力图上的一组单词的示例。


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig4_HTML.jpg](img/502181_1_En_7_Fig4_HTML.jpg)


    图 7-4


    应用于文本的自注意力，展示句子中单词的关系


    现在我们已经了解了注意力的基本类型，接下来需要在下一节中探讨如何应用注意力。

    '
- fmt: "### Applying Attention\n\nNot only does attention come in various forms from\
    \ local hard to global soft, it can also be applied with several mechanisms. Table\
    \ [7-1](#502181_1_En_7_Chapter.xhtml#Tab1) shows various examples of attention\
    \ mechanics used to apply attention for feature extraction and/or relationships.\
    \ While we could review each method in more detail, our primary focus will be\
    \ on the last one, transformers.\n\n**Table 7-1** Attention Mechanisms Used to\
    \ Apply Attention\n\n| Attention Mechanism | Notes | Reference |\n| --- | ---\
    \ | --- |\n| Content-based | Cosine similarity | Graves2014 |\n| Concat or additive\
    \ | Tanh applied across weights | [Bahdanau2015](https://arxiv.org/pdf/1409.0473.pdf)\
    \ |\n| Location base | Softmax alignment over weights | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf)\
    \ |\n| General | Applied directly to weights | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf)\
    \ |\n| Dot product | Attention parameters combined with dot product | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf)\
    \ |\n| Scaled dot product | Same as dot product with application of scaling variable\
    \ | [Vaswani2017](http://papers.nips.cc/paper/7181-attention-is-all-you-need.pdf)\
    \ |\n\nFigure [7-5](#502181_1_En_7_Chapter.xhtml#Fig5) shows the architecture\
    \ of the transformer proposed in the original paper. In the figure, you can see\
    \ two forms of attention being used, multihead and scaled dot product. Both combine\
    \ to provide the self-attention mechanism we discussed earlier.\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig5_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig5_HTML.jpg)\n\
    \n**Figure 7-5** Transformer architecture showing multihead attention\n\nThe multihead\
    \ attention mechanism was introduced by the authors of the AAYN paper and internally\
    \ unfolded into the form of scaled dot-product attention shown in the inset of\
    \ Figure [7-5](#502181_1_En_7_Chapter.xhtml#Fig5). Again, remember that the focus\
    \ of that paper was training NLP models, so the architecture pictured is for NLP\
    \ transformers and not the GAN design we will see later. However, the multiheaded\
    \ attention mechanism used to extract self-attention is something we will focus\
    \ on.\n\nRefer to Figure [7-5](#502181_1_En_7_Chapter.xhtml#Fig5) and the far-right\
    \ zoom-in that highlights the scaled dot-product attention mechanism being applied\
    \ across three inputs: `Q`, `K`, and `V`. These letters are shortened to `Q` for\
    \ `querys` (yes, the spelling is incorrect), `K` for `keys`, and `V` for `values`.\
    \ `Q` and `K` are first multiplied and then scaled and passed through a softmax\
    \ function. The output of this is then multiplied by the input values.\n\nTo demonstrate\
    \ how self-attention is calculated in this manner, we of course need to look at\
    \ some code in an exercise. Exercise 7-1 doesn’t do anything aside from show the\
    \ steps in the calculation. All inputs and weights are randomized, and you can\
    \ think of this as the initial phase of training. Let’s jump in and see how multihead\
    \ attention works next.\n\n**EXERCISE 7-1. UNDERSTANDING MULTIHEADED ATTENTION**\n\
    \n1.  Open the `GEN_7_Attention.ipynb` notebook from the GitHub project site.\
    \ If you are unsure how, then consult Appendix B.\n\n2.  The first cell denotes\
    \ the imports and an example randomized input, as shown here:\n\n```\n    import\
    \ torch\n    import numpy as np\n    x = np.random.randint(0,3,(3,4))\n    x =\
    \ torch.tensor(x, dtype=torch.float32)\n    print(x)\n```\n\n3.  Again, the inputs\
    \ and weights are randomized, and we only want to focus on the calculation steps.\
    \ Here is where we create the randomized weights for the `query`, `key`, and `values`:\n\
    \n```\n    w_key = np.random.randint(0,2,(4,3))\n    w_query = np.random.randint(0,2,(4,3))\n\
    \    w_value = np.random.randint(0,4,(4,3))\n    w_key = torch.tensor(w_key, dtype=torch.float32)\n\
    \    w_query = torch.tensor(w_query, dtype=torch.float32)\n    w_value = torch.tensor(w_value,\
    \ dtype=torch.float32)\n    print(w_key)\n    print(w_query)\n    print(w_value)\n\
    ```\n\n4.  In a real multiheaded self-attention layer, the weights would be trained\
    \ over time.\n\n5.  Next, we apply/multiply all the weights to the input `x` to\
    \ derive `keys`, `querys`, and `values`.\n\n```\n    keys = x @ w_key\n    querys\
    \ = x @ w_query\n    values = x @ w_value\n    print(keys)\n    print(querys)\n\
    \    print(values)\n```\n\n6.  After that, we multiply `querys` by the transpose\
    \ of the `keys` and find the `attn_scores` value.\n\n```\n    attn_scores = querys\
    \ @ keys.T\n    print(attn_scores)\n```\n\n7.  Then we apply a `softmax` function\
    \ to the output `attn_scores` to get `attn_scores_softmax`.\n\n```\n    from torch.nn.functional\
    \ import softmax\n    attn_scores_softmax = softmax(attn_scores, dim=-1)\n   \
    \ print(attn_scores_softmax)\n```\n\n8.  We finish off by generating the outputs\
    \ by multiplying by the values and summing the results.\n\n```\n    weighted_values\
    \ = values[:,None] * attn_scores_softmax.T[:,:,None]\n    outputs = weighted_values.sum(dim=0)\n\
    \    print(outputs)\n```\n\nThe main thing you should take away from the previous\
    \ exercise is the functional steps in determining how to apply multiheaded attention\
    \ to an input `x` using a simple example. An actual implementation of multiheader\
    \ attention with convolution is more complicated and something we will discuss\
    \ in the next section."
