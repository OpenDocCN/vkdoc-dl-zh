    \ detach=False)\n    self.wgts = layer_wgts\n    self.metric_names = ['pixel',]\
    \ + [f'feat_{i}' for i in range(len(layer_ids))\n    ] + [f'gram_{i}' for i in\
    \ range(len(layer_ids))]\n    def make_features(self, x, clone=False):\n    self.m_feat(x)\n\
    \    return [(o.clone() if clone else o) for o in self.hooks.stored]\n    def\
    \ forward(self, input, target):\n    out_feat = self.make_features(target, clone=True)\n\
    \    in_feat = self.make_features(input)\n    self.feat_losses = [base_loss(input,target)]\n\
    \    self.feat_losses += [base_loss(f_in, f_out)*w\n    for f_in, f_out, w in\
    \ zip(in_feat, out_feat, self.wgts)]\n    self.feat_losses += [base_loss(gram_matrix(f_in),\
    \ gram_matrix(f_out))*w**2 * 5e3\n    for f_in, f_out, w in zip(in_feat, out_feat,\
    \ self.wgts)]\n    self.metrics = dict(zip(self.metric_names, self.feat_losses))\n\
    \    return sum(self.feat_losses)\n    def __del__(self): self.hooks.remove()\n\
    \    ```\n\n4.  Inside this class you can tweak one hyperparameter that scales\
    \ the feature loss back into the model. The constant is exposed as `5e3`, and\
    \ you may alter this value to determine the effect it has on the final output.\n\
    \n5.  Next, we can see how the pretrained ArtLine model is downloaded with the\
    \ following code:\n\n```\n    MODEL_URL = \"https://www.dropbox.com/s/starqc9qd2e1lg1/ArtLine_650.pkl?dl=1\"\
    \n    urllib.request.urlretrieve(MODEL_URL, \"ArtLine_650.pkl\")\n    path = Path(\"\
    .\")\n    learn=load_learner(path, 'ArtLine_650.pkl')\n    ```\n\n6.  To use the\
    \ model, we have again set up a form to allow you to scroll through the various\
    \ images. For this example, we have two datasets, the `historic-bw` one we used\
    \ in the previous exercise and a new one of interesting photos.\n\n```\n    #@title\
    \ ARTLINE IMAGES  { run: \"auto\" }\n    import glob\n    files = sorted(glob.glob(\"\
    %s/*.jpg\" % image_folder))\n    file_idx = 7 #@param {type:\"slider\", min:0,\
    \ max:25, step:1}\n    img = PIL.Image.open(files[file_idx]).convert(\"RGB\")\n\
    \    img_t = T.ToTensor()(img)\n    img_fast = Image(img_t)\n    show_image(img_fast,\
    \ figsize=(8,8), interpolation='nearest');\n    p,img_hr,b = learn.predict(img_fast)\n\
    \    Image(img_hr).show(figsize=(8,8))\n    ```\n\n7.  Running the code will produce\
    \ output shown in Figure [8-12](#502181_1_En_8_Chapter.xhtml#Fig13), which is\
    \ the same old photo we colorized with DeOldify. If you run through the various\
    \ other photos from either dataset, you may notice the higher-contrast images\
    \ from the historic set translate better.\n\n```\n!pip install -r colab_requirements.txt\n\
    ```\n\nArtLine has another variation of its model that allows you to convert images\
    \ to colorized cartoons. This model works quite well and can be set up in a similar\
    \ fashion to the exercise we just worked with. We leave it up to you to pursue\
    \ this on your own and enjoy the fun of converting images to cartoons.\n\nProjects\
    \ like ArtLine and DeOldify are recent initiatives brought about by developers\
    \ interested in developing generative modeling for various applications, from\
    \ creating art to coloring and enhancing old photos. How these projects mature\
    \ and impact various communities remains to be seen, but it is also likely many\
    \ other developers will follow suit.\n\n## Conclusion\n\nAs we saw in this chapter,\
    \ generative modeling extends beyond the typical GAN architecture. It has grown\
    \ into other variations from models that use progressive architectures to those\
    \ that use no GAN training at all. How this whole new area of application development\
    \ evolves in the short- and long-term remains to be seen.\n\nOne thing is for\
    \ sure, however, which is that these forms of enhanced and impressive generators\
    \ are only becoming more accessible. In the future, this should certainly have\
    \ an impact on a wide variety of applications across multiple industries. The\
    \ main hurdle we need to overcome now is the application of generative modeling\
    \ to other sources of domain data.\n\nHowever, it is also important as generative\
    \ modelers that we understand how we can put this technology to use. In the next\
    \ chapter, we look to apply all our learnings of generative modeling into the\
    \ scariest application for many deep fakes."
  trans: "\n# 用 ArtLine 展现艺术风格\n\n`ArtLine` 是另一个旨在将照片转换为线条艺术画作，并将其转化为卡通版本的项目。该项目遵循了\
    \ `Antic` 在构建 `DeOldify` 时使用的许多相同发现。这两个项目都基于 `Fast.ai` 团队开发的许多改进/实用工具。\n\n从技术上讲，`ArtLine`\
    \ 与 `DeOldify` 类似，都基于一个自注意力生成对抗网络（self-attention GAN），该网络会逐步调整大小以达到所需分辨率。它同样以\
    \ NoGAN 的方式进行训练，其中初始生成器特征损失由预训练的 VGG 模型确定，这与我们在第 6 章的示例中所做的非常相似。然而，与 `DeOldify`\
    \ 不同的是，`ArtLine` 不使用判别器来微调特征提取，因此它从未作为 GAN 进行训练。\n\n正如我们将看到的，`ArtLine` 的结果在人像和面部方面表现良好，但在其他类型的照片上效果稍逊。不过，看看这种\
    \ NoGAN 形式在各种图像上的表现可能会很有趣，我们将在练习 8-5 中看到这一点。我们将再次使用直接从仓库中拉取的项目源代码，并在笔记本中运行它。\n\
    \n## 练习 8-5. 用 ArtLine 展现艺术风格\n\n1. 从 GitHub 项目站点打开 `GEN_8_ArtLine.ipynb` 笔记本。如果不确定如何操作，请查阅附录\
    \ B。\n\n2. 在使用 `ArtLine` 展现艺术风格之前，此笔记本同样需要下载、安装并重启。因此，在安装 `requirements.txt` 文件后，您可能需要重启运行时，如下面的代码块所示：\n\
    \n3. 如果在笔记本的后续部分遇到错误，请确保已通过从菜单中选择 **运行时 ➤ 重启运行时** 来重启运行时。\n\n4. 此笔记本的 `imports`\
    \ 块对各种组件进行了广泛的安装。与 `DeOldify` 不同，该项目有一些要求需要在类中描述特征损失。\n\n5. 向下滚动到 `FeatureLoss`\
    \ 类，查看模型如何确定特征之间的损失。`ArtLine` 模型使用此类来评估模型内部的特征训练。\n\n```\nclass FeatureLoss(nn.Module):\n\
    \    def __init__(self, m_feat, layer_ids, layer_wgts):\n        super().__init__()\n\
    \        self.m_feat = m_feat\n        self.loss_features = [self.m_feat[i] for\
    \ i in layer_ids]\n        self.hooks = hook_outputs(self.loss_features, detach=False)\n\
    \        self.wgts = layer_wgts\n        self.metric_names = ['pixel',] + [f'feat_{i}'\
    \ for i in range(len(layer_ids))] + [f'gram_{i}' for i in range(len(layer_ids))]\n\
    \    def make_features(self, x, clone=False):\n        self.m_feat(x)\n      \
    \  return [(o.clone() if clone else o) for o in self.hooks.stored]\n    def forward(self,\
    \ input, target):\n        out_feat = self.make_features(target, clone=True)\n\
    \        in_feat = self.make_features(input)\n        self.feat_losses = [base_loss(input,target)]\n\
    \        self.feat_losses += [base_loss(f_in, f_out)*w for f_in, f_out, w in zip(in_feat,\
    \ out_feat, self.wgts)]\n        self.feat_losses += [base_loss(gram_matrix(f_in),\
    \ gram_matrix(f_out))*w**2 * 5e3 for f_in, f_out, w in zip(in_feat, out_feat,\
    \ self.wgts)]\n        self.metrics = dict(zip(self.metric_names, self.feat_losses))\n\
    \        return sum(self.feat_losses)\n    def __del__(self): self.hooks.remove()\n\
    ```\n\n6. 在此类内部，您可以调整一个超参数，该参数将特征损失缩放回模型中。该常量显示为 `5e3`，您可以更改此值以确定其对最终输出的影响。\n\n\
    7. 接下来，我们可以看到如何使用以下代码下载预训练的 `ArtLine` 模型：\n\n```\nMODEL_URL = \"https://www.dropbox.com/s/starqc9qd2e1lg1/ArtLine_650.pkl?dl=1\"\
    \nurllib.request.urlretrieve(MODEL_URL, \"ArtLine_650.pkl\")\npath = Path(\".\"\
    )\nlearn=load_learner(path, 'ArtLine_650.pkl')\n```\n\n8. 为了使用该模型，我们再次设置了一个表单，允许您浏览各种图像。对于此示例，我们有两个数据集：我们在上一个练习中使用的\
    \ `historic-bw` 数据集，以及一个包含有趣照片的新数据集。\n\n```\n#@title ARTLINE IMAGES  { run: \"\
    auto\" }\nimport glob\nfiles = sorted(glob.glob(\"%s/*.jpg\" % image_folder))\n\
    file_idx = 7 #@param {type:\"slider\", min:0, max:25, step:1}\nimg = PIL.Image.open(files[file_idx]).convert(\"\
    RGB\")\nimg_t = T.ToTensor()(img)\nimg_fast = Image(img_t)\nshow_image(img_fast,\
    \ figsize=(8,8), interpolation='nearest');\np,img_hr,b = learn.predict(img_fast)\n\
    Image(img_hr).show(figsize=(8,8))\n```\n\n9. 运行代码将产生如图 8-12 所示的输出，这是我们之前用 `DeOldify`\
    \ 着色过的同一张旧照片。如果您浏览任一数据集中的其他各种照片，您可能会注意到历史数据集中对比度较高的图像转换效果更好。\n\n```\n!pip install\
    \ -r colab_requirements.txt\n```\n\n`ArtLine` 的模型还有另一种变体，允许您将图像转换为彩色卡通。该模型效果很好，并且可以以与我们刚刚完成的练习类似的方式进行设置。我们将其留给您自行探索，并享受将图像转换为卡通的乐趣。\n\
    \n像 `ArtLine` 和 `DeOldify` 这样的项目是近期由对开发各种应用（从艺术创作到为旧照片着色和增强）的生成式建模感兴趣的开发者发起的。这些项目将如何成熟并影响各个社区还有待观察，但很可能许多其他开发者也会效仿。\n\
    \n## 结论\n\n正如我们在本章中所看到的，生成式建模已经超越了典型的 GAN 架构。它已经发展出其他变体，从使用渐进式架构的模型到完全不使用 GAN\
    \ 训练的模型。这一全新的应用开发领域在短期和长期内将如何演变，仍有待观察。\n\n然而，有一件事是肯定的，那就是这些增强型且令人印象深刻的生成器正变得越来越易于使用。未来，这必将对多个行业的各种应用产生影响。我们现在需要克服的主要障碍是将生成式建模应用于其他领域数据源。\n\
    \n然而，作为生成式建模者，理解如何利用这项技术也同样重要。在下一章中，我们将把我们学到的所有生成式建模知识应用到许多深度伪造中最令人恐惧的应用中。\n"
- fmt: '# Deepfakes and Face Swapping


    There is likely no more controversial application of generative modeling than
    creating fake faces or applying the technology to swap faces. This technique is
    colloquially known as *deepfakes* and has been the basis for fake news and all
    forms of various related conspiracy theories. Many, from fear of understanding,
    see this technology as providing no value and as unethical, which also gives generative
    modeling a bad image.


    Deepfakes have been used to create various memes and other YouTube videos of celebrities
    in famous roles with their face swapped out for the purpose of humor. Deepfakes
    have also been used to puppet political figures into various comedic and not so
    funny demonstrations.


    Of course, there is a darker side to deepfakes where various pornographic images/videos
    have the nameless, often female, star’s face swapped with a celebrity. This is
    by far the most unethical application of deepfakes since the celebrity’s face
    is used without consent and placed in extremely compromising situations.


    Yet, the power of deepfakes is also beginning to infiltrate Hollywood by providing
    new visual effects capabilities, where older or younger stars may have their appearance
    modified with deepfakes or more generally generative modeling. The current most
    common application of this technology is face aging or de-aging, which has been
    used in many blockbuster movies.


    It remains to be seen how the application of deepfakes is used/abused, but what
    is demonstrated is how powerful generative modeling will have an impact on our
    future lives. For instance, it may be commonplace to swap faces or other forms
    in media. Imagine being able to swap out a star in a movie because you prefer
    another actor or, better yet, changing the whole style of the film. As we have
    learned through this book, swapping or generating anything is possible, given
    enough data and patience.


    We couldn’t produce a comprehensive book about generative modeling without demonstrating
    the application of swapping faces. Understanding the how and what of deepfakes
    will allow you to theorize or possibly construct other forms of swapping. It also
    gives you the tools to promote the technology in an ethical and friendly manner.


    In this chapter, we look at the application of face swapping (FS) and how it may
    be applied to photos, videos, and your personal webcam. We will look at a couple
    of tools that can be used to perform face swapping and go through the entire workflow
    to produce a deepfake video.


    Then we will progress to training a face swapping model so that it can replace
    a subject’s face with another. After that, we will use the software to convert
    the faces in a subject deepfake video of your choosing. We finish off the chapter
    with putting the whole process together and building a short deepfake clip of
    your own.


    Face swapping can take a bit of work to get good results, but much like anything
    worth doing, the output can be rewarding and provide a sense of accomplishment.
    As we will see, it also demonstrates several aspects of applying generative modeling
    to a problem. It is an excellent way for us to start wrapping up this book. Here
    are the main points we will cover:


    - Introducing the tools for face swapping

    - Gathering the swapping data

    - Understanding the deepfake workflow

    - Training a face swapping model

    - Creating a deepfake video


    Unlike previous chapters, we will not strictly work with Google Colab for all
    the exercises. Instead, we will use a couple of GUI tools that are designed for
    the desktop. Not only will this make understanding the FS workflow easier, but
    it will provide you with a better long-term working environment. While the packages
    we use in this chapter are supported to run on Colab, it has been suggested that
    Google may prevent these types of apps from running freely in the future due to
    misuse.


    Keep in mind that FS provides many opportunities for abuse, and our purpose for
    demonstrating how to build deepfakes is to promote your future ethical use. Many
    applications and operating systems are currently using facial recognition as a
    form of identification, and FS provides a potential security risk. As we will
    see in the next section, this technology is just getting started but already provides
    numerous sophisticated tools.'
