    \n现在，我们有意暂时不解释`UNet`模型，以展示此示例与自编码器之间的相似性。这里的关键区别在于，损失是基于配对的图像掩码而非原始图像计算的。这使得模型能够学习从图像到掩码的转换。在下一节中，我们将详细探讨`UNet`如何实现这一点。\n\
    \n### 揭示 UNet 的细节\n\n简单来说，`UNet`是一种转换器，它允许将输入图像转换为输出，这与自编码器并无不同。`UNet`与自编码器之间的关键区别在于卷积块的使用方式及其连接方式。除此之外，该模型应该感觉像自编码器，但存在一些关键差异。\n\
    \n当然，为了更好地理解这一点，我们应该回到上一个练习中的代码，更详细地查看`UNet`模型。请参见练习 5-2。\n\n**练习 5-2. 探索 UNET\
    \ 模型**\n\n1.  从 GitHub 项目站点打开`GEN_5_UNet.ipynb`笔记本。如果不确定如何操作，请查阅附录 B。\n\n2.  如果尚未运行，请选择**运行时**\
    \ ➤ **全部运行**来运行整个笔记本。\n\n3.  向下滚动到定义`UNet`模型的位置，双击单元格以显示代码。我们将从查看`ConvBlock`类开始，这是一个用于封装卷积层的辅助类。其中包括权重的初始化。\n\
    \n```python\nclass ConvBlock(nn.Module):\n    def __init__(self, in_channels,\
    \ out_channels):\n        super().__init__()\n        self.conv = nn.Conv2d(in_channels,\
    \ out_channels, 3, padding=1)\n        init.xavier_uniform(self.conv.weight, gain=np.sqrt(2))\n\
    \        self.batch_norm = nn.BatchNorm2d(out_channels)\n        self.leaky_relu\
    \ = nn.LeakyReLU(0.01)\n\n    def forward(self, x):\n        x = self.conv(x)\n\
    \        x = self.batch_norm(x)\n        x = self.leaky_relu(x)\n        return\
    \ x\n```\n\n4.  现在转到`UNet`类的开头，查看网络的初始化。注意我们如何定义三个`down`超级层：`down1`、`down2`和`down3`。这些层由`ConvBlock`组成，将通道从较低数量转换为较高数量。它们从\
    \ 3 开始，然后是 32、64，最后到 128。\n\n在中间层之后，还有三个超级层`up1`、`up2`和`up3`，用于将结果上采样回单个通道。从 128\
    \ 开始，它们首先上采样到 256，然后到 128，最后到 64。这里的关键区别在于，上采样层不仅仅是向上移动单个值，而是将前一层的值组合起来。当我们查看`forward`函数时，这一点将变得更加明显。\n\
    \n```python\nclass UNet(nn.Module):\n    def __init__(self):\n        super().__init__()\n\
    \        self.down1 = nn.Sequential(\n            ConvBlock(3, 32),\n        \
    \    ConvBlock(32, 32)\n        )\n        self.down2 = nn.Sequential(\n     \
    \       ConvBlock(32, 64),\n            ConvBlock(64, 64)\n        )\n       \
    \ self.down3 = nn.Sequential(\n            ConvBlock(64, 128),\n            ConvBlock(128,\
    \ 128)\n        )\n        self.middle = ConvBlock(128, 128)\n        self.up3\
    \ = nn.Sequential(\n            ConvBlock(256, 256),\n            ConvBlock(256,\
    \ 64)\n        )\n        self.up2 = nn.Sequential(\n            ConvBlock(128,\
    \ 128),\n            ConvBlock(128, 32)\n        )\n        self.up1 = nn.Sequential(\n\
    \            ConvBlock(64, 64),\n            ConvBlock(64, 1)\n        )\n```\n\
    \n5.  在下面的`forward`函数中，你可以看到`UNet`的所有部分是如何组装起来的。从这段代码中，你可以看到前三个`down`层是如何按顺序连接在一起的：`down1`\
    \ > `down2` > `down3` > `middle`。\n\n```python\ndef forward(self, x):\n    down1\
    \ = self.down1(x)\n    out = F.max_pool2d(down1, 2)\n    down2 = self.down2(out)\n\
    \    out = F.max_pool2d(down2, 2)\n    down3 = self.down3(out)\n    out = F.max_pool2d(down3,\
    \ 2)\n    out = self.middle(out)\n    out = Upsample(scale_factor=2)(out)\n  \
    \  out = torch.cat([down3, out], 1)\n    out = self.up3(out)\n    out = Upsample(scale_factor=2)(out)\n\
    \    out = torch.cat([down2, out], 1)\n    out = self.up2(out)\n    out = Upsample(scale_factor=2)(out)\n\
    \    out = torch.cat([down1, out], 1)\n    out = self.up1(out)\n    out = torch.sigmoid(out)\n\
    \    return out\n```"
- fmt: "6. After the middle layer, we move to upsampling by taking the output of the\
    \ middle and combining it with `down3` using `torch.cat` and then passing that\
    \ through `up3`. This same process continues so that `middle => out`, `(out, down3)\
    \ -> up3 => out`, `(out, down2)-> up2 => out`, `(out, down1) -> up1 => out`. Essentially\
    \ for every pass back through on the way up, we are combining the results with\
    \ the corresponding down layer. This of course has the effect of reusing the trained\
    \ features in the down layers while upsampling.\n\n7. At this point, go ahead\
    \ and alter some of the hyperparameters and see what effect this has on the model\
    \ output.\n\n8. See if you can alter the architecture of the UNet. Try to modify\
    \ the number of channels that each super layer uses as input or output. Be sure\
    \ to account for the merging when passed through the up layers.\n\nWhile U networks\
    \ still use convolution to extract features by recycling the input back through\
    \ the model, we can train better generators that use the same learned feature\
    \ extraction. Throughout the rest of this chapter, we will explore how the UNet\
    \ can enhance our generators, especially for image to image generation. In the\
    \ next section, we look at a new set of GANs that use a UNet for image to image\
    \ learning.\n\n## Translating Images with Pix2Pix\n\nWith image segmentation or\
    \ translation with a UNet, we saw how a model could learn the transformation from\
    \ one form of image into another. We looked at how a UNet could learn to segment\
    \ or mask an image based on pairs of training images. The Pix2Pix GAN takes this\
    \ a step further using adversarial training.\n\nBy adding adversarial training\
    \ via a GAN, we can augment the loss functions we used in a single UNet model\
    \ and further separate out the interpretation of loss. This not only allows us\
    \ to do paired base training comparisons for loss but also a second metric using\
    \ discriminator loss to assure the transformed/generated images more closely resemble\
    \ their trained pairs. See Exercise 5-3.\n\n**EXERCISE 5-3. IMAGE TRANSLATION\
    \ WITH PIX2PIX**\n\n1. Open the `GEN_5_Pix2Pix.ipynb` notebook from the GitHub\
    \ project site. If you are unsure how, then consult Appendix B.\n\n2. Run the\
    \ whole notebook by selecting **Runtime** ➤ **Run all** if you have not already\
    \ done so. The first thing to notice is that the `Hyperparameter` section now\
    \ provides for alternate training datasets configured using a Colab form. For\
    \ the image to image examples we provide three datasets. `maps` represents a map\
    \ tile pairing of street and satellite images of the same areas. The `facades`\
    \ set consists of exterior building shots with pairings of facades displaying\
    \ blocks representing areas. A third set, `cityscapes`, is like `facades`, but\
    \ instead of buildings, it shows paired annotated views of streets.\n\n3. We can\
    \ scroll past major sections of this code since it likely is already familiar\
    \ to you by now. Move down to the generator/discriminator block definitions. The\
    \ start of this code shows two UNet classes for helping do upsampling and downsampling.\n\
    \n```\nclass UNetDown(nn.Module):\n    def __init__(self, in_size, out_size, normalize=True,\
    \ dropout=0.0):\n        super(UNetDown, self).__init__()\n        layers = [nn.Conv2d(in_size,\
    \ out_size, 4, 2, 1, bias=False)]\n        if normalize:\n            layers.append(nn.InstanceNorm2d(out_size))\n\
    \        layers.append(nn.LeakyReLU(0.2))\n        if dropout:\n            layers.append(nn.Dropout(dropout))\n\
    \        self.model = nn.Sequential(*layers)\n    def forward(self, x):\n    \
    \    return self.model(x)\n\nclass UNetUp(nn.Module):\n    def __init__(self,\
    \ in_size, out_size, dropout=0.0):\n        super(UNetUp, self).__init__()\n \
    \       layers = [\n            nn.ConvTranspose2d(in_size, out_size, 4, 2, 1,\
    \ bias=False),\n            nn.InstanceNorm2d(out_size),\n            nn.ReLU(inplace=True),\n\
    \        ]\n        if dropout:\n            layers.append(nn.Dropout(dropout))\n\
    \        self.model = nn.Sequential(*layers)\n    def forward(self, x, skip_input):\n\
    \        x = self.model(x)\n        x = torch.cat((x, skip_input), 1)\n      \
    \  return x\n```\n\n4. You may notice `ConvTranspose2D` being used in the `UNetUp`\
    \ class, but that is for the upsampling part. Remember the corresponding `down`\
    \ super layer is combined, as shown in the `forward` function.\n\n5. We can then\
    \ move down to see how the UNet super layers are used in the `GeneratorUNet` model.\n\
    \n```\nclass GeneratorUNet(nn.Module):\n    def __init__(self, in_channels=3,\
    \ out_channels=3):\n        super(GeneratorUNet, self).__init__()\n        self.down1\
    \ = UNetDown(in_channels, 64, normalize=False)\n        self.down2 = UNetDown(64,\
    \ 128)\n        self.down3 = UNetDown(128, 256)\n        self.down4 = UNetDown(256,\
    \ 512, dropout=0.5)\n        self.down5 = UNetDown(512, 512, dropout=0.5)\n  \
    \      self.down6 = UNetDown(512, 512, dropout=0.5)\n        self.down7 = UNetDown(512,\
    \ 512, dropout=0.5)\n        self.down8 = UNetDown(512, 512, normalize=False,\
    \ dropout=0.5)\n        self.up1 = UNetUp(512, 512, dropout=0.5)\n        self.up2\
    \ = UNetUp(1024, 512, dropout=0.5)\n        self.up3 = UNetUp(1024, 512, dropout=0.5)\n\
    \        self.up4 = UNetUp(1024, 512, dropout=0.5)\n        self.up5 = UNetUp(1024,\
    \ 256)\n        self.up6 = UNetUp(512, 128)\n        self.up7 = UNetUp(256, 64)\n\
    \        self.final = nn.Sequential(\n            nn.Upsample(scale_factor=2),\n\
    \            nn.ZeroPad2d((1, 0, 1, 0)),\n            nn.Conv2d(128, out_channels,\
    \ 4, padding=1),\n            nn.Tanh(),\n        )\n```"
