  trans: "\n## 使用 CGAN 进行条件控制\n\n正如我们所看到的，有几种变体可以处理 GAN 中的损失或期望损失。所有这些方法都期望 GAN 能够在没有辅助的情况下学习整个图像或其他数据。这要求\
    \ GAN 不仅要学习什么是假的或真的，还要学习数据的潜在域。\n\n潜在域是相对于 GAN 或其他模型的一个隐藏域。GAN 需要自行学习这个域，才能为该域或类别生成逼真的图像。例如，考虑我们整章都在训练的\
    \ MNIST 时尚数据集。该数据集包含 10 个类别，其中一些类别比其他类别更独特，GAN 也必须学习这些类别。当我们比较查看更多样化和详细类别（如凉鞋）的结果时，我们看到了这导致了什么问题。\n\
    \n因此，我们可以给 GAN 的简单变通方法或辅助手段就是将标签与数据一起输入，这应该不足为奇。所以，我们不仅告诉 GAN 它有这个图像要学习，还告诉它属于哪个类别或域。通过这样做，我们不再需要改变损失函数，只需要改变通用损失函数的输入，如下所示：\n\
    \n![$$ L={\\displaystyle \\begin{array}{c}\\mathit{\\min}\\\\ {}G\\end{array}}{\\\
    displaystyle \\begin{array}{c}\\mathit{\\max}\\\\ {}D\\end{array}}\\left[\\mathit{\\\
    log}\\left(D\\left(x, label\\right)\\right)+\\mathit{\\log}\\left(1-D\\left(G\\\
    left(z, label\\right)\\right)\\right)\\right] $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equp.png)\n\
    \n这里的主要变化是，我们现在将标签与数据一起输入到判别器和生成器中。通过将标签输入模型，我们减轻了模型自行学习域或类别的难度。相反，我们通过告诉它我们为其标记的类别来给予它一些帮助。\n\
    \n对于纯粹的 AI 或生成式建模，理想情况下，我们不希望必须为数据提供标签，因为这会带入我们人类自身的偏见。每当我们标记数据时，我们都在将人类偏见施加到该数据上。这就是为什么我们通常更倾向于向深度学习模型输入原始的、未标记的数据，让模型自行学习。在原始\
    \ GAN 中，我们基本上总是至少对数据进行真实/虚假的标记。\n\n向 GAN 中添加标签将其升级为条件 GAN（CGAN）。我们称之为*条件*，因为我们向\
    \ CGAN 提供了域的条件或标签。出于我们的目的，我们将在练习 4-5 中研究 cDCGAN 或条件 DCGAN。\n\n**练习 4-5. 关联相对论\
    \ GAN**\n\n1. 从 GitHub 项目站点打开 `GEN_4_cDCGAN.ipynb` 笔记本。如果不确定如何操作，请查阅附录 B。\n\n\
    2. 通过选择 **运行时** ➤ **全部运行** 来运行整个笔记本。然后，查看导入单元格之后，找到第一个包含 `Hyperparameters` 类的单元格，并检查新值\
    \ `n_classes = 10`。这将设置作为标签输入到模型中的类别数量。\n\n3. 向下滚动到 `Generator` 类定义，如下所示：\n\n\
    ```\n    class Generator(nn.Module):\n    def __init__(self):\n    super(Generator,\
    \ self).__init__()\n    self.label_emb = nn.Embedding(hp.n_classes, hp.n_classes)\n\
    \    def block(in_feat, out_feat, normalize=True):\n    layers = [nn.Linear(in_feat,\
    \ out_feat)]\n    if normalize:\n    layers.append(nn.BatchNorm1d(out_feat, 0.8))\n\
    \    layers.append(nn.LeakyReLU(0.2, inplace=True))\n    return layers\n    self.model\
    \ = nn.Sequential(\n    *block(hp.latent_dim + hp.n_classes, 128, normalize=False),\n\
    \    *block(128, 256),\n    *block(256, 512),\n    *block(512, 1024),\n    nn.Linear(1024,\
    \ int(np.prod(img_shape))),\n    nn.Tanh()\n    )\n    def forward(self, noise,\
    \ labels):\n    gen_input = torch.cat((self.label_emb(labels), noise), -1)\n \
    \   img = self.model(gen_input)\n    img = img.view(img.size(0), *img_shape)\n\
    \    return img\n```\n\n4. 注意在 `forward` 函数中，标签是如何与随机噪声拼接在一起的。标签嵌入是使用一个称为*嵌入*层的特殊层来学习的。嵌入层类似于自编码器，只是其输出是中间学习到的嵌入。\n\
    \n5. 接下来，我们将跳转到 `Discriminator` 类定义，看看如何使用学习到的嵌入以相同的方式输入标签。\n\n```\n    class\
    \ Discriminator(nn.Module):\n    def __init__(self):\n    super(Discriminator,\
    \ self).__init__()\n    self.label_embedding = nn.Embedding(hp.n_classes, hp.n_classes)\n\
    \    self.model = nn.Sequential(\n    nn.Linear(hp.n_classes + int(np.prod(img_shape)),\
    \ 512),\n    nn.LeakyReLU(0.2, inplace=True),\n    nn.Linear(512, 512),\n    nn.Dropout(0.4),\n\
    \    nn.LeakyReLU(0.2, inplace=True),\n    nn.Linear(512, 512),\n    nn.Dropout(0.4),\n\
    \    nn.LeakyReLU(0.2, inplace=True),\n    nn.Linear(512, 1),\n    )\n```\n\n\
    6. 从这里开始，我们对代码的其余部分很熟悉，因此可以跳过到训练代码并查看特定部分。\n\n```\n    # 生成器\n    z = Variable(FloatTensor(np.random.normal(0,\
    \ 1, (batch_size, hp.latent_dim))))\n    gen_labels = Variable(LongTensor(np.random.randint(0,\
    \ hp.n_classes, batch_size)))\n    gen_imgs = generator(z, gen_labels)\n    validity\
    \ = discriminator(gen_imgs, gen_labels)\n    g_loss = loss_fn(validity, valid)\n\
    \    # 判别器\n    validity_real = discriminator(real_imgs, labels)\n    d_real_loss\
    \ = loss_fn(validity_real, valid)\n    validity_fake = discriminator(gen_imgs.detach(),\
    \ gen_labels)\n    d_fake_loss = loss_fn(validity_fake, fake)\n```\n\n7. 这里唯一的主要变化是，我们现在将标签作为输入传递给判别器和生成器。\n\
    \n8. 当你让这个样本运行并观察结果时，它们是否符合你的预期？我们能否添加其他相对形式的损失，如 WGAN 或 RGAN/RaGAN？\n\n```\n\
    def forward(self, img, labels):\nd_in = torch.cat((img.view(img.size(0), -1),\
    \ self.label_embedding(labels)), -1)\nvalidity = self.model(d_in)\nreturn validity\n\
    ```\n\n当这个样本完成时，不幸的是，很明显我们还有更多工作要做。然而，请注意这个模型如何能够从那些困难的类别（如凉鞋）中生成详细的图像。在某些情况下，现在那些困难的类别开始看起来比我们之前的尝试更逼真。\n\
    \n此时，你可以回过头来研究如何将 WGAN 或 RGAN/RaGAN 的损失与 CGAN 或 cDCGAN 结合起来。其中一些工作已经在你可以搜索到的许多其他\
    \ GAN 变体中完成了。不过，对我们来说，我们将继续前进，在后面的章节中研究围绕生成式建模的更高级技术。现在，让我们在下一节中总结本章的结论。\n\n##\
    \ 结论\n\n正如我们在本章中所看到的，有几种 GAN 变体试图通过从不同角度看待损失来提高性能。从标准/原始 GAN 开始，我们看到了如何通过卷积和特征提取来提高性能。我们还研究了以相对方式处理损失的\
    \ Wasserstein 和相对论 GAN。然后，我们尝试使用边界和条件 GAN 来处理数据中的学习域或类别。\n\n在本章中，我们还研究了损失方程以及它们在不同变体之间的差异。通过深入挖掘并研究这些方程，我们开始理解损失是如何以绝对或相对方式学习的，并研究了改进那些更难学习的域或类别的方法。\n\
    \n最终，我们希望从本章中学到的是，GAN 容易受到损失以及损失计算方式的影响。理解这一点使我们有能力选择可能与我们数据集相关的正确损失或一组损失方程。毕竟，如果你正在构建一个专门针对你的数据的\
    \ GAN，你总是希望尝试几种 GAN 变体，并选择最适合你需求的那一个。\n\n在下一章中，我们将从理解 GAN 中的损失转向探索训练中的变体。\n"
- fmt: "# 5. Image to Image Content Generation\n\nIn days of old, before cameras captured\
    \ everything, if a crime were committed and it was particularly heinous, the police\
    \ would send a sketch artist around to interview witnesses. The purpose of this\
    \ was to build an image or likeness of the criminal and expedite an arrest.\n\n\
    Sketch artists would work by questioning witnesses about features, and the witness\
    \ would answer yes or no to help the artist create a better likeness. This process\
    \ is not unlike that of a GAN in that the artist is the generator and the witness\
    \ is the discriminator. Over time, instead of relying on verbal descriptions,\
    \ the sketch artists carried along visual aids to help the witness match features.\n\
    \nSticking with the sketch artist analogy, we have come to the point that simple\
    \ text/label descriptions will go only so far identifying the features we want\
    \ generated. Now we want to provide the ability to demonstrate important features\
    \ or characteristics the generators should focus on through using images.\n\n\
    For this chapter, we move on from using attributes to control important feature\
    \ generation to using actual images. Before jumping into the GANs, we will look\
    \ at how we can perform image to image translation using an image segmentation\
    \ built around a U network (UNet). We will uncover how a UNet can extract and\
    \ learn features.\n\nThen we will move on to a couple of examples of GANs that\
    \ function by translating one image into another. We start with Pix2Pix for understanding\
    \ the translation of images with a GAN. Then we move on to DualGAN and explore\
    \ how a dual architecture can enhance learning.\n\nUsing image to image pairings\
    \ is successful in training image translation models, but they often fall short\
    \ of understanding translation variety. That is, one image could be possibly translated\
    \ into multiple correct variations. Not unlike translating one phrase to another\
    \ in languages, there are often multiple possible translations. We will use BicycleGAN\
    \ to understand how multiple translations of an image may be possible.\n\nFinally,\
    \ we finish the chapter by breaking the paired image requirement, and we look\
    \ at our first GAN, DiscoGAN, for performing image domain translation. We look\
    \ at several new interesting datasets and train models to translate apples to\
    \ oranges, horses to zebras, or works of art by Monet to photos.\n\nTo summarize,\
    \ this is what we will be looking at in this chapter:\n\n- Segmenting images with\
    \ a UNet\n- Translating images with Pix2Pix\n- Seeing double with DualGAN\n- Riding\
    \ the latent space on BicycleGAN\n- Discovering domains with DiscoGAN\n\nBeing\
    \ able to generate content that contains relevant features allows us to control\
    \ generators to generate a reality we define. In this chapter, we take our next\
    \ steps into becoming generative gurus and look to augment generator training\
    \ with additional image characteristics. In the next section, we look at a key\
    \ element of extracting features from images: a UNet.\n\n## Segmenting Images\
    \ with a UNet\n\nConvolutional network layers are excellent at extracting localized\
    \ features in images, but their ability to reconstruct those same features is\
    \ less than ideal. If you recall, we have seen this a few times now when exploring\
    \ generative models that used CNNs. These models often poorly rebuilt the features,\
    \ and the image typically looks like nothing more than a patchwork. To resolve\
    \ issues such as these in generators, we need to look beyond simple CNNs.\n\n\
    One such extension to CNNs and feature rebuilding was developed with a UNet, as\
    \ shown in Figure 5-1. The architecture derives its name from the shape of the\
    \ model as it looks like a *U*. Inside, convolutional layers are still used, but\
    \ instead of trying to rebuild images from a convolutional transpose, the image\
    \ is rebuilt from the actual learned feature mapping.\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig1_HTML.jpg](images/502181_1_En_5_Chapter/502181_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1 UNet architecture\n\nIf you recall when working with CNNs in our\
    \ models, we will often use a `ConvTranspose2D` layer when rebuilding an image.\
    \ The problem with this is that learned transposed features are different than\
    \ the original features. The UNet architecture allows the model to use the same\
    \ features as used when classifying or discriminating the image to regenerate\
    \ or segment it.\n\nImage segmentation is a key prerequisite to understanding\
    \ how to extract and rebuild key features. Remember those sketch artists? Well,\
    \ they advanced to segmenting out parts of the face and using those parts to rebuild\
    \ new faces. This is indeed very much what we will be doing when we start to translate\
    \ or pair images to images for generation.\n\nBefore we get to that, though, we\
    \ should probably back up and understand in practice how the UNet works and how\
    \ it can be used to extract or segment images. So in Exercise 5-1, we will build\
    \ a UNet model to extract and segment images of a fish. As we go through this\
    \ exercise, we will talk about the modifications of the architecture and how loss\
    \ is calculated.\n\n**EXERCISE 5-1. IMAGE SEGMENTATION WITH A UNET**\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig2_HTML.jpg](images/502181_1_En_5_Chapter/502181_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2 Visualizing fish data input images and masks (segments)\n\n1. Open\
    \ the `GEN_5_UNet.ipynb` notebook from the GitHub project site. If you are unsure\
    \ how, then consult Appendix B.\n\n2. Run the whole notebook by selecting Runtime\
    \ ➤ Run all. Then look past the imports cell and on to the first cell with the\
    \ `Hyperparameters` class. We have seen all the hyperparameters in this example\
    \ before.\n\n3. Past the hyperparameters, the next block of code provides for\
    \ downloading datasets directly from Dropbox or other online resources. We will\
    \ use specialized datasets now that are designed for the image to image models\
    \ we will build in this chapter.\n\n```\nfrom io import BytesIO\nfrom urllib.request\
    \ import urlopen\nfrom zipfile import ZipFile\nzipurl = hp.dataset_url\nwith urlopen(zipurl)\
    \ as zipresp:\n    with ZipFile(BytesIO(zipresp.read())) as zfile:\n        zfile.extractall(image_folder)\n\
    print(f\"Downloaded & Extracted {zipurl}\")\n```\n\n4. After this block of code\
    \ is a new class called `FishDataset`. As we move to more advanced data, we will\
    \ often need to extend `DataSet` to accommodate loading those new sets. Extending\
    \ `Dataset` allows us to fine-tune the way `Dataloader`s load data. We will extend\
    \ the `Dataset` class in this manner throughout this and future chapters. The\
    \ following code shows the start of the class:"
