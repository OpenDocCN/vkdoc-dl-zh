    \ SRGAN 这样的 GAN 爆发的塑造。无论结果如何，SRGAN 的可能性仍有待观察。\n\n## 结论\n\nResNet 在 GAN 中的应用使得生成模型现在能够超越我们一些最疯狂的期望。我们在本章中研究的\
    \ GAN 当然可以直接使用，从进行性别转换到改变发色，生成一些逼真的内容。\n\n在本书的这个阶段，我们开发的模型可以用于广泛的商业应用，从简单的图像增强到向客户展示不同发色或服装可能的样子。这些可能性是无穷无尽且强大的，并且每天都在变得更强。\n\
    \n随着我们继续阅读本书，我们将继续关注逼真度，但本章应该是一个里程碑。这很可能是你第一次能够生成非常逼真的假图像。想到这些可能性，既令人兴奋，又令人深思后感到恐惧。\n\
    \n凭借你在本书中学到的这些新技能，同样重要的是要记住，你正在成为一个新时代的巫师。虽然这个 AI 巫师群体没有既定的准则，但有几条尚未成文的规则。\n\n\
    在这些未成文或部分成文的规则中，有一条几乎在所有列表中位居榜首，那就是不要用我们构建的 AI 模型作恶。对许多人来说，这是黄金法则，从谷歌到微软的许多公司都曾因试图打破这条规则而引发广泛的员工异议。\n\
    \n因此，我希望你在本章及后续章节中获得的知识只用于善途。在构建模型时，请始终牢记这一点。虽然你无法预想到每一种应用，但请考虑他人可能作恶的方式并加以避免。\n\
    \n在下一章中，我们将通过一种名为*注意力*的新机制来探索增强生成模型的更多方法。注意力机制目前正在席卷深度学习领域，并渗透到从自然语言处理到 GAN 的各种应用中。\n\
    \n# 7. 注意力即一切！\n\n*注意力*一词源自拉丁语 *attentionem*，意为关注或需要某人的专注。这是一个用来要求人们集中注意力的词，从军事教官到老师和家长都在使用。然而，这也是我们在数学和计算机科学中用来描述某物如何关注或关联到另一物的词。\n\
    \n2017 年，里程碑式的论文《注意力即一切》将这一概念向前推进了一步，将注意力机制应用于深度学习，以理解特征如何关注其他特征。该论文的作者展示了具有影响力的结果，这些结果自此改变了深度学习。\n\
    \n虽然原始论文中展示的工作注意力机制主要用于自然语言处理应用，但直到一年后，GAN 的创造者才在名为*自注意力 GAN*（SAGAN）的 GAN 中展示了有效的注意力机制。\n\
    \n在本章中，我们将仔细研究注意力机制的工作原理以及如何将其融入深度学习。我们首先了解各种类型的注意力及其使用方法。然后，通过代码示例了解基本注意力机制如何提取特征关系。最后，我们通过一个与卷积层配合使用的注意力可视化示例来结束本章。\n\
    \n引入自注意力机制会增加训练压力，在开始使用注意力之前，我们需要了解函数的一些基本属性。其中一个属性是 Lipschitz 连续性，它是 GAN 中平衡训练的基础。因此，我们将花一些时间来理解什么是\
    \ Lipschitz 以及如何使用它。\n\n接下来，我们将构建一个在 CelebA 人脸数据集上训练的 SAGAN 示例，训练模型从零开始盲目生成真实人脸。最后，我们将通过构建一个带有残差网络和多个\
    \ Lipschitz 约束辅助工具的 SAGAN 模型来结束本章。\n\n你一路努力走到这里，在本章中，我们构建和使用的模型将开始获得巨大的回报。我们现在构建或使用的模型能够产生前沿的结果，这应该使本章成为迄今为止最激动人心的一章。本章将涵盖以下内容：\n\
    \n*   注意力\n*   用注意力增强卷积\n*   GAN 中的 Lipschitz 连续性\n*   构建自注意力 GAN\n*   改进 SAGAN\n\
    \n与之前你努力完成的几章相比，本章可能会让你感觉像旋风一样。我们将花更多时间从核心上理解如何利用基本数学属性有效训练 GAN。我们还将深入探讨如何在特征映射中识别上下文和关系。\n"
- fmt: '# What Is Attention?


    We can think of the word *attention* as meaning how well you or another entity
    focus on a specific task or another entity. In the military, you may be asked
    to come to attention, meaning to stand straight and focus forward, while a close
    friend or relative may use the word as a plea for your companionship and focus.


    Either way, we can think of attention as meaning how well one entity focuses on
    or takes direction from another entity. In simple terms, we can relate objects
    by saying A attends to B, but B may not attend to A. In other words, A takes direction
    from B, but B doesn’t take direction from A.


    Figure [7-1](#502181_1_En_7_Chapter.xhtml#Fig1) shows a heat attention map of
    mouse movement over a web form. In the figure, the colors represent heat or the
    amount of attention. Red areas represent the hot areas of focus for our attention,
    or where visitors hovered the mouse over those areas. Colder blue areas represent
    little or no focus by the mouse.


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig1_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Mouse movement attention map


    Attention used in various applications of mathematics and deep learning often
    looks very much like the example in Figure [7-1](#502181_1_En_7_Chapter.xhtml#Fig1).
    In fact, we will view some of these attention maps later in this chapter. These
    examples may use different gradients to represent attention, but the concept is
    the same.


    The idea of attention was first applied to natural language processing as a means
    of relating word pairs in sequence to sequence translation models. `Seq2Seq` models,
    as they are known, are remarkably similar in concept to autoencoders. They effectively
    translate language by learning from word pairings, an idea not unlike our image
    to image translation GANs.


    Traditionally in NLP applications, recurrent or gated network layers were used
    to identify relationships between words. This unlike convolution where recurrent
    networks relies on a recursive method of unfolding sequences to train network
    layers. This allowed for deep learning models to learn sequences in time or language.


    Unfortunately, recurrent networks don’t scale very well, especially as the learned
    sequences increase in size. In fact, one of the primary improvement’s attention
    promised in the original paper was an increase in training scalability, especially
    when applied to longer sequences.


    The addition of attention to NLP models is typically wrapped in an upscaled `Seq2Seq`
    model type called *transformers*. As a result, transformers with attention radicalized
    natural language models to unforeseen gains. You may have already heard these
    models referred to as `BERT` or the more infamous `GPT-2` and `GPT-3`.


    Figure [7-2](#502181_1_En_7_Chapter.xhtml#Fig2) shows an attention map for set
    of language translation text. At the left side of the figure are the words in
    English, and on the top the same phrase is in Spanish. The brighter areas of the
    plot show words that attend more to each other than other words. Dark areas indicate
    where words likely have no relationship with each other.


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig2_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    NLP attention map for language translation


    An NLP model uses the attention to then weigh the most likely pairing of words
    when generating text translations. This allows the model to not only learn word
    sequences but how words link or relate to other words. This concept has been an
    effective replacement for the reliance of recurrent networks to NLP tasks.


    The `GPT-2` took almost a year to release to the public over fears this model
    would allow for believable yet fake text in the form of news generation. While
    this book doesn’t cover NLP text generation, just realize that these models share
    many of the same concepts. In the next section, we look at the types of attention
    and how they relate to each other.


    ## Understanding the Types of Attention


    We typically think of the word *attention* as binary, meaning you are focusing
    or not, though we understand and use various types of focus in our daily lives.
    We may use other phrasing to suggest our focus is concentrated on a specific problem,
    local or global, even going so far as focusing on specific elements in sets of
    tasks or items and understanding their relationship with each other and themselves.


    In machine learning, attention is a mechanism we can use to relate features to
    other features in various contexts. We may want to consider how localized groups
    of features attend to each other or how a feature is represented in a global context.
    Attention can be either local or global attention and can be either hard or soft.


    Figure [7-3](#502181_1_En_7_Chapter.xhtml#Fig3) shows two types of attention being
    applied to an image. On the left side we see that the head of the dog is in focus
    and the remainder of the body is still slightly visible but less in focus. This
    is an example of global attention since we can see the dog’s head in relation
    to the rest of the image. Yet it is also an example of softened attention because
    we can visualize the loss of focus across the image.


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig3_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Examples of types of attention working on an image


    Conversely, the right side of Figure [7-3](#502181_1_En_7_Chapter.xhtml#Fig3)
    shows an example of hard local attention. It’s hard because we focus on one localized
    area and totally ignore the rest of the image. Likewise, this attention is also
    local since we have no relation to how the dog’s head should appear globally in
    relation to other parts of the image.


    Convolutional layers are an example of a localized soft or hard attention mechanism.
    CNNs are hard focused when used with pooling layers since they remove spatial
    relationships, thus making the extracted feature output blocky. `ResNet` models
    using convolutional residual blocks are an example of a local soft attention mechanism.
    The softening occurs because of the residuals being passed or skipped across the
    layers.


    Self-attention, the type of attention suggested in the original paper, is a further
    type that uses a global soft mechanism to learn feature importance with itself
    or features within itself. This produces output in the form of feature/attention
    maps showing the relation from one feature to the other.


    Figure [7-4](#502181_1_En_7_Chapter.xhtml#Fig4) shows how self-attention may be
    applied across words in a sentence. The highlighted (red) text shows the focus
    word in the sentence and how it relates to other words for each set of words in
    the sentence. The darker the shading around the word, the more related or attended
    the word is to the focused word. Figure [7-2](#502181_1_En_7_Chapter.xhtml#Fig2)
    also shows an example of self-attention applied to a set of words on an attention
    map.


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig4_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Self-attention applied to text showing relationship of words in a sentence


    So now that we understand the basic types of attention, we need to look at how
    we can apply attention in the next section.'
