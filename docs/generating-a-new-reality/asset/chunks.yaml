- fmt: '### Downloading YouTube Videos for Deepfakes


    You may decide to just perform face swaps on single images, but in most cases,
    you will likely want to create deepfakes with videos. There are plenty of sources
    for free and paid videos you can access, but the easiest and best resource is
    of course YouTube. By downloading videos from YouTube, you often also have choices
    on the format of the content.


    When you decide on the type of video you want as your subject for a deepfake,
    you often want to consider a few details, as outlined in the list here:


    - **Short**: Choose videos typically less than 30 seconds in length. If you do
    want to deepfake larger videos, then you are likely better off using a different
    source than YouTube.

    - **Easily recognizable faces**: Make sure to select videos with prominent and
    recognizable faces. It will be better if the individual’s face is the focus for
    several frames as well.

    - **Fewer faces**: Avoid videos with crowded scenes at least until you get good
    at perfecting the FS/deepfake workflow. More faces in a frame of video represents
    more work for you later. Faceswap has some useful tools to help manage this, but
    it generally works better to use fewer faces.

    - **Popularity**: You will often want to choose the subjects of your video by
    popularity. The reason for this is the need for those initial 1,000 or so faces
    you will use for training. Training the Faceswap model later will depend on the
    quality of those faces you extracted in the previous exercise. Therefore, it is
    helpful to have popular enough celebrities to get a good set of diverse training
    images.


    As you get more experienced with FS, you may want to break some or all those rules.
    You may just want to use your own home videos swapped with a celebrity for your
    personal enjoyment. At this point, those details are all up to you, and the methods
    presented here are only to be used as a guide.


    For the next step in our process, we are going to use another third-party tool,
    YouTube-Downloader, to automate the downloading and packaging of videos from YouTube.
    Exercise 9-2 provides several sample video options, but you can easily swap out
    your own choices later. Open your browser again and jump on Colab to download
    a selection of subject videos.


    ### EXERCISE 9-2. DOWNLOADING YOUTUBE SUBJECT VIDEOS


    1. Open the `GEN_9_Video_DL.ipynb` notebook from the GitHub project site. If you
    are unsure how, then consult Appendix B.


    2. The first cell in the notebook installs the `youtube-dl` package and requirements
    with the following code:


    ```

    !pip install --upgrade youtube-dl

    ```


    3. After installing the package, we set up a form to select from a choice of subject
    videos and download them with the following:


    ```

    #@title SELECT VIDEO

    video = "Anchorman" #@param ["Elf", "Zoolander", "Schitts Creek","Pretty Woman","Avengers","Anchorman"]

    from __future__ import unicode_literals

    import youtube_dl

    videos = { "Elf" : { "url" : ''https://www.youtube.com/watch?v=3Eto6DU_2oI''},

    "Zoolander" : { "url" : "https://www.youtube.com/watch?v=KeX9BXnD6D4"},

    "Schitts Creek" : { "url" : "https://www.youtube.com/watch?v=hg1Uk60rBsc"},

    "Pretty Woman" : { "url" : "https://www.youtube.com/watch?v=1_TZEsUhXRs"},

    "Avengers" : { "url" : "https://www.youtube.com/watch?v=JyyGJk51n-0"},

    "Anchorman" : { "url" : "https://www.youtube.com/watch?v=88zGzznpnis"},

    }

    video_url = videos[video][''url'']

    download_options = {}

    download = youtube_dl.YoutubeDL(download_options)

    info_dict = download.extract_info(video_url, download=False)

    formats = info_dict.get(''formats'',None)

    for f in formats:

    if f.get(''format_note'',None) == ''480p'':

    url = f.get(''url'',None)

    print(url)

    ```


    4. When this cell is done running, confirm that the URL is printed to the output
    window below the cell. If no URL is printed, then the video format is not supported
    at 480p, our preferred format. An alternative is to select another video or modify
    the format.


    5. Next, we will do some imports for OpenCV2, an image and video library, to turn
    the download back into a video using our preferred codec. This step sets up the
    capture for video and does an initial frame count.


    ```

    import cv2

    input_movie = cv2.VideoCapture(url)

    length = int(input_movie.get(cv2.CAP_PROP_FRAME_COUNT))

    print(length)

    ```


    6. From here, we want to render the captured video frames from YouTube back into
    a video using a codec of our choosing. Codecs are a form of video encrypting,
    and there are numerous options to choose from. You can either use the default
    codec selected or comment out the line and select another as appropriate. If after
    you download the video it is unable to play on your desktop, you may want to swap
    the codec and render the video again:


    ```

    from google.colab.patches import cv2_imshow

    from IPython.display import clear_output

    import time

    frame_width = int(input_movie.get(cv2.CAP_PROP_FRAME_WIDTH))

    frame_height = int(input_movie.get(cv2.CAP_PROP_FRAME_HEIGHT))

    print(frame_width, frame_height)

    frame_number = 0

    frame_limit = 1000

    # Define the codec and create VideoWriter object

    #fourcc = cv2.VideoWriter_fourcc(*''FFV1'')

    fourcc = cv2.VideoWriter_fourcc(*''XVID'')

    #fourcc = cv2.VideoWriter_fourcc(*''DIVX'')

    #fourcc = cv2.VideoWriter_fourcc(*''DIV3'')

    #fourcc = cv2.VideoWriter_fourcc(''F'',''M'',''P'',''4'')

    #fourcc = cv2.VideoWriter_fourcc(''D'',''I'',''V'',''X'')

    #fourcc = cv2.VideoWriter_fourcc(''D'',''I'',''V'',''3'')

    #fourcc = cv2.VideoWriter_fourcc(''F'',''F'',''V'',''1'')

    filename = f"{video}.avi"

    out = cv2.VideoWriter(filename,fourcc, 20.0, (frame_width,frame_height))

    while True:

    ret, frame = input_movie.read()

    frame_number += 1

    if not ret or frame_number > frame_limit:

    break

    out.write(frame)

    if frame_number < 10:

    cv2_imshow(frame)

    input_movie.release()

    out.release()

    cv2.destroyAllWindows()

    ```


    7. The `cv2.VideoWriter` constructs the writer to perform the rendering of the
    captured frames. We limit the number of frames rendered by the variable `frame_limit`,
    which is currently set to 1000. You can of course alter this as you see fit. As
    this writer is processing, it will also output the first 10 frames of video for
    inspection.


    8. We next download the rendered video using the same block of code in the previous
    exercise:


    ```

    from google.colab import files

    files.download(filename)

    ```


    9. When all the cells are run in the notebook, you should have a video downloaded
    to your machine in your preferred download folder. Be sure to watch the video
    to confirm it is the correct format and covers the right subjects. Note, we have
    plenty of opportunity to trim out areas of the video we may not want later. So,
    don’t worry too much about excess content, but be sure your preferred subject
    is clearly visible and in frame for several seconds.


    After you have the subject video and two sets of celebrity faces downloaded as
    zip files into a folder, unpack the files into new folders. Be sure that only
    a single set of celebrity images is in each folder and the video is also in separate
    folder. We will look at other organizational tips when we move on to the FS workflow
    in the next section.'
