    \    ```\n\n6.  From here, we want to render the captured video frames from YouTube\
    \ back into a video using a codec of our choosing. Codecs are a form of video\
    \ encrypting, and there are numerous options to choose from. You can either use\
    \ the default codec selected or comment out the line and select another as appropriate.\
    \ If after you download the video it is unable to play on your desktop, you may\
