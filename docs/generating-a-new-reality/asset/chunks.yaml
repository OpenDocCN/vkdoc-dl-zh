  trans: '

    ## 结论


    在本章中，我们探讨了如何将图像生成的带宽提升至图像转换/生成模型。我们首先通过用于图像分割的`UNet`编码结构来探索这一概念，并研究了鱼类图像的分割。随后，我们将`UNet`模型应用于基于`Pix2Pix`的图像到图像转换，并进一步升级到`DualGAN`——一种使用两个生成器和两个判别器的生成对抗网络。


    在理解图像到图像转换的基础上，我们继续探索其他形式的图像或领域转换。首先研究了`BicycleGAN`，它基于每个输入存在多种转换的假设。接着我们转向`DiscoGAN`，用于执行非配对图像风格的领域迁移。


    本章使用的技术已扩展到许多通常利用图像进行分析的领域。例如在医学领域，图像到图像转换和分割 GAN 为医疗诊断提供了卓越支持，甚至能够通过识别从乳腺癌到心脏问题等各种疾病的诊断标志物，超越该领域的医学专家。


    在下一章中，我们将继续探索使用非配对图像进行领域转换，以及如何进一步控制此类输出变化。


    # 6. 残差网络生成对抗网络


    生成对抗网络和对抗训练在概念上确实无限广阔，但在执行和实现中往往有所欠缺。正如我们在本书中反复看到的，失败通常源于生成器。而我们也已认识到，优秀 GAN 的关键在于优秀的生成器。


    GAN 中的判别器本质上只是一个分类器，通常甚至是一个简单的二分类器。事实上，现在常见的做法是构建一个 GAN 来训练判别器/分类器。GAN 会在数据集上针对二分类任务进行训练，训练完成后生成器被丢弃。这样不仅能得到一个准确的分类器，而且分类器还具备鲁棒性。


    通过对抗学习，分类器可以在生成器提供的更广阔训练空间中学习到更好的近似。生成器通过试图欺骗判别器/分类器，使其更好地学习和逼近，从而填补那些潜在空间。因此，在真实数据上训练的分类器也能学会识别同一数据的近似伪造版本。


    事实证明，构建一个好的判别器远比创建好的生成器容易，这源于学习问题的本质。生成器需要精细地理解特征和目标分布，以便重现这些特征；而判别器只需分类特征之间的差异或距离。


    我们之前已经看到卷积神经网络如何帮助提取这些特征，但发现这些特征在重建时往往表现为斑块或斑点。随后我们研究了`UNet`，它能够将学习到的特征转换回生成输出。正如我们在第
    5 章所见，这可以产生更好的生成输出。


    在本章中，我们将迈出特征提取机制的下一步演进：残差块和残差网络（`ResNet`）。我们将深入剖析并理解`ResNet`和残差块如何用于分类，学习这些模型如何绕过深度
    CNN 网络中的深度层问题。


    随着我们开发的模型不断使用更大、更复杂的特征提取器，我们将转向理解如何重用现有的预训练模型。重用预训练标准化模型被称为*迁移学习*，我们将通过一个使用预训练模型进行分类的简单示例来探索这一概念。


    我们还将整合所有这些新知识，研究三种使用`ResNet`构建更好生成器的 GAN 变体。第一种是`CycleGAN`及其扩展的非配对图像到图像生成器。第二种是专门用于从名人面部图像中学习并有条件地生成面部的
    GAN。


    最后，我们将以超分辨率 GAN（`SRGAN`）作为本章的结尾，该 GAN 结合了从`ResNet`到预训练鲁棒特征提取器的多种模型优势。我们将使用`SRGAN`来提升一些名人面部图像的分辨率。


    随着本书的深入，示例将变得愈发复杂，因此为节省篇幅，仅展示重要代码片段。在阅读本章时，打开代码文件可能会更有帮助。以下是本章将要涵盖的内容：


    * 理解残差网络

    * 使用`CycleGAN`再次循环

    * 使用`StarGAN`生成面部

    * 利用迁移学习实现最佳效果

    * 使用`SRGAN`提升分辨率


    我们将继续基于前几章的知识进行构建。如有需要，请务必复习卷积网络及特征提取/生成的相关内容。正如我们将在下一节中看到的，残差网络是卷积层的大规模使用者。

