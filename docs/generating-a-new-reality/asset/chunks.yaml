    \n超参数是一类通常需要手动调整的变量。它们之所以被区分为超参数，是因为我们将内部权重称为*参数*。\n\n单个感知器或单层感知器的问题在于它们只能解决线性函数。异或（XOR）问题不是一个线性函数。为了解决\
    \ XOR 问题，我们需要引入不止一层的感知器，这被称为*多层感知器*。不过，在此之前，让我们重新审视感知器，看看它能解决什么问题。\n\n在下一个练习中，我们将研究一个更难的问题，该问题可以用感知器这样的线性方法解决。我们将要研究的问题是解决一个二维线性回归问题。就在\
    \ 15 年前，这类问题用传统的回归方法还很难解决。我们将在后面的章节中详细介绍回归；现在，让我们直接进入练习 1-2。\n\n**练习 1-2. 使用感知器进行线性回归**\n\
    \n![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig3_HTML.jpg](img/502181_1_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3\n\n在 3D 图上绘制的输入点\n\n1.  从项目的 GitHub 站点打开`GEN_1_perceptron_class.ipynb`笔记本。如果您不确定如何访问源代码，请查看附录\
    \ B。\n\n2.  这次我们将运行线性回归问题的代码块来设置数据，如下所示：\n\n    ```python\n    X = np.array([[1,2,3],[3,4,5],[5,6,7],[7,8,9],[9,8,7]])\n\
