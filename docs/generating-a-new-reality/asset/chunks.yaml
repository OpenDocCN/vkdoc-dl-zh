    \        self.down5 = UNetDown(512, 512, dropout=0.5)\n        self.down6 = UNetDown(512,\
    \ 512, dropout=0.5)\n        self.down7 = UNetDown(512, 512, dropout=0.5)\n  \
    \      self.down8 = UNetDown(512, 512, normalize=False, dropout=0.5)\n       \
    \ self.up1 = UNetUp(512, 512, dropout=0.5)\n        self.up2 = UNetUp(1024, 512,\
    \ dropout=0.5)\n        self.up3 = UNetUp(1024, 512, dropout=0.5)\n        self.up4\
    \ = UNetUp(1024, 512, dropout=0.5)\n        self.up5 = UNetUp(1024, 256)\n   \
    \     self.up6 = UNetUp(512, 128)\n        self.up7 = UNetUp(256, 64)\n      \
    \  self.final = nn.Sequential(\n            nn.Upsample(scale_factor=2),\n   \
    \         nn.ZeroPad2d((1, 0, 1, 0)),\n            nn.Conv2d(128, out_channels,\
    \ 4, padding=1),\n            nn.Tanh(),\n        )\n```\n"
- fmt: "4. Notice how we have duplication of several of the `UNetDown` layers with\
    \ 512 channels in/out. We can see how this structure is combined in the model’s\
    \ forward function. Notice how down layer `d8` is reused as the input into the\
    \ model and effectively becomes the middle layer.\n\n```\ndef forward(self, x):\n\
    \    # U-Net generator with skip connections from encoder to decoder\n    d1 =\
    \ self.down1(x)\n    d2 = self.down2(d1)\n    d3 = self.down3(d2)\n    d4 = self.down4(d3)\n\
    \    d5 = self.down5(d4)\n    d6 = self.down6(d5)\n    d7 = self.down7(d6)\n \
