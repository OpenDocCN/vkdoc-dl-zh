    \ with more detail."
  trans: "\n# 改进 SAGAN\n\n`自注意力`为特征学习提供了另一个维度，即相对于卷积的全局特征定位，但正如我们所知，这并非没有副作用。这些副作用可以通过强制满足利普希茨连续性来最小化，但我们仍然存在其他问题，比如特征过度提取。\n\
    \n为了帮助缓解这些问题，我们将研究 SAGAN 的另一个示例，该示例在卷积中使用残差块进行跳跃连接，并增加了条件生成。正如我们之前所见，条件生成和判别可以通过定位子域来提高性能。\n\
    \n在练习 7-5 中，我们研究如何使用 ResNet 卷积模型、标签和条件来改进 SAGAN。我们将再次使用 CelebA 数据集，这次将标记的属性作为每张图片的类别。因此，我们希望我们的类别是唯一的，并且不能在图像之间共享。为此，我们将坚持使用基本发色（金色、黑色和棕色）作为类别，并且只加载具有这些属性的名人面孔。练习\
    \ 7-5 改进了我们之前的工作，因为它还尝试生成 128×128 像素的人脸，这是迄今为止我们进行的最大规模的盲生成。\n\n## 练习 7-5. 改进\
    \ SAGAN\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig11_HTML.jpg](img/502181_1_En_7_Fig11_HTML.jpg)\n\
    \n图 7-11\n\n训练名人 SAGAN 的示例输出\n\n1.  从 GitHub 项目站点打开 `GEN_7_Celeb_SAGAN.ipynb`\
    \ 笔记本。运行整个笔记本。\n\n2.  此代码示例再次基于第 4 章的 `GEN_4_DCGAN.ipynb` 练习笔记本。大部分新代码仅存在于定义模型和辅助函数的几个代码块中。请注意，此笔记本在使用\
    \ GPU 运行时目前会占用 Google Colab 的所有内存。因此，在修改某些超参数（如批量大小或图像大小）时需要小心。\n\n    增加任何模型的批量大小都会增加模型在处理前向传播时的内存需求。通过减小批量大小，可以降低内存需求，但这可能会降低训练性能质量并增加运行时间。\n\
    \n3.  跳转到模型部分和 `Generator` 类定义。注意 `SelfAttention` 类是如何在几个层之间使用的：\n\n```\n    ConvBlock(512,\
    \ 512, n_class=n_class),\n    ConvBlock(512, 256, n_class=n_class),\n    SelfAttention(256),\n\
    \    ConvBlock(256, 128, n_class=n_class),\n    SelfAttention(128),\n    ConvBlock(128,\
    \ 64, n_class=n_class)])\n```\n\n4.  同样，我们可以在判别器结构中看到相同的结构：\n\n```\n    SelfAttention(128),\n\
    \    conv(128, 256, downsample=False),\n    SelfAttention(256),\n    conv(256,\
    \ 512),\n    conv(512, 512),\n    conv(512, 512))\n```\n\n5.  注意在生成器和判别器模型构建中\
    \ 512 层的加倍。你可以尝试添加更多重复层或自注意力层。然而，当前配置已经使用了最大的 GPU 内存。虽然你可以将运行时切换到 CPU 并增加模型参数，但在\
    \ CPU 上训练这样的模型会非常耗时。\n\n6.  此示例的另一个新特性是引入了调度器。调度器允许我们在运行时修改超参数（即那些可以修改的参数）。虽然你可以安排任何超参数进行更改，但在训练期间，最常见的修改对象是学习率。在优化器部分，我们创建了两个新的调度器，如下所示：\n\
    \n```\n    scheduler_G = StepLR(optimizer_G, step_size=1, gamma=hp.lr_gamma)\n\
    \    scheduler_D = StepLR(optimizer_D, step_size=1, gamma=hp.lr_gamma)\n```\n\n\
    7.  这些调度器会随着时间的推移衰减学习率，方法是将当前学习率乘以 `lr_gamma` 超参数，该参数在示例中设置为 .999。在每次对生成器运行训练批次后，我们通过调用\
    \ `step` 函数来步进/衰减学习率，如下所示：\n\n```\n    scheduler_G.step()\n    scheduler_D.step()\n\
    ```\n\n8.  接下来，我们将查看判别器损失计算。注意我们是如何使用铰链损失来计算对抗性假损失和真损失，然后通过附加梯度惩罚来计算总损失的。\n\n\
    ```\n    loss_D_fake = F.relu(1 + fake_validity).mean()\n    loss_D_real = F.relu(1\
    \ - real_validity).mean()\n    loss_D = loss_D_real + loss_D_fake  + hp.lambda_gp\
    \ * gradient_penalty\n```\n\n9.  如图 7-11 所示，这个示例可能需要一段时间来训练，甚至才能产生一些有趣的结果。然而，一旦成功，输出可能会非常有趣，并且在某些方面具有艺术性。\n\
    \n这个练习和示例可能需要很长时间的训练才能获得极好的结果，但在此之前你得到的结果本身也可能令人着迷。花些时间观察这个示例的训练过程，你会得到既有有趣又有令人惊讶的输出作为回报。\n\
    \n作为额外内容，第 6 章的 StarGAN 笔记本已升级为使用自注意力和谱归一化。请务必也查看 `GEN_7_Self-attention_STARGAN.ipynb`\
    \ 笔记本，以获取更多关于将自注意力与谱归一化结合使用的示例。\n\n至此，我们关于自注意力、使用自注意力的 GAN 以及支持它们的机制的旋风式章节就结束了。\n\
    \n## 结论\n\n在本章中，我们学习了注意力，以及如何从局部/全局和软/硬的角度来定义它。理解注意力不仅使我们能够更好地定义特征映射或关系，还能重新生成这些相同的关系。\n\
    \n然而，使用注意力的扩展特征映射也要求我们更好地理解判别器/生成器的训练平衡。为此，我们研究了一个重要的数学和抽象函数性质，称为利普希茨连续性。这个抽象术语定义了函数的均匀性或平滑程度。\n\
    \n因此，我们了解到，通过使用梯度惩罚损失或谱归一化来约束函数的利普希茨连续性，GAN 可以成为更平衡的训练器，从而使我们能够使用更好的特征提取策略，如自注意力。\n\
    \n最后，在本章中，我们首先将所有这些整合到一个 SAGAN 的实现中，该 SAGAN 在名人面孔上训练，目的是盲生成新面孔。然后，为了改进这个模型，我们添加了残差网络块用于特征跳跃，这是我们从上一章借鉴的改进，再次用于生成全新的面孔，这次分辨率更高，理想情况下细节更丰富。\n"
- fmt: '# 8. Advanced Generators


    The field of artificial intelligence and machine learning is growing by leaps
    and bounds daily with new forms of GANs/generators being developed. Through the
    course of this book, we have covered the history of those generators as they have
    progressed. We looked closely at the details and technical advances of their contribution
    to generation, as well as how they may have failed.


    Our goal in this book has been to provide you with a good foundational knowledge
    to understand the nuances of generators and how to build them. Using a platform
    like Google Colab provides significantly easier access for students to learn complex
    algorithms without the agony of installing the dependencies themselves. This can
    go a long way into making generators and deep learning far more accessible to
    newcomers.


    Unfortunately, with AI/ML advancing so rapidly, there comes a point of diminishing
    returns, where the code examples get so big and so many new variations or features
    are implemented that explaining a single new form of GAN could take the rest of
    this book. Therefore, for this and the next couple chapters, we are now going
    to take a more functional approach to using generators with packaged code.


    In this chapter, we take our first look at using packaged open source code that
    can be quickly set up and either trained or used for actual generation. All the
    examples we will look at in this chapter are advanced versions of generators.
    And while we won’t look at their code, we will take a high-level look at how they
    function. Since the code is all open source, interested readers can then advance
    to investigate the inner workings of that code themselves.


    We will start the chapter by looking at the progressive GAN (ProGAN). A method
    develops a generator by progressively building up image resolutions through training.
    From there we will move up to the StyleGAN, a style transfer–inspired GAN that
    builds from ProGAN. We will look at StyleGAN2, or version 2, which can produce
    some excellent results trained on our old friend CelebA.


    Training advanced GANs, especially on a cloud notebook, is less than ideal, so
    in the final sections of the chapter we look at using other generator packages
    for generation. We will look first at DeOldify, a newly inspired generator referred
    to as a NoGAN that can colorize old photos and videos. Then we finish the chapter
    with another non-GAN implementation called ArtLine, which turns photographs into
    line art drawings.


    This chapter is a blend of training advanced examples like ProGAN and StyleGAN2
    to using cool generators like DeOldify and ArtLine. Compared to previous chapters,
    we will keep the code within a black box and look at only what is required to
    get the package running. Here is a summary of the main elements we will cover
    in this chapter:


    - Progressively growing GANs

    - Styling with StyleGAN version 2

    - Using DeOldify, the new NoGAN

    - Being artistic with ArtLine


    If you have been playing along at home and following the examples throughout this
    book, you will surely be a deep learning and GAN training master by now. While
    we will continue to borrow from some of those skills in this chapter, we take
    a more functional approach to generation. Before that, though, we are going to
    look at the foundations of progressive GAN growing in the next section.


    ## Progressively Growing GANs


    In 2016, a team at NVIDIA wrote a paper titled “Progressive Growing of GANs for
    Improved Quality, Stability, and Variation.” This paper outlined a procedure for
    progressively growing a GAN, starting with very low-resolution images to increasing
    resolution. A ProGAN may start with a 4×4-pixel image and work its way up to a
    1024×1024 high-resolution image.


    The concept of a ProGAN originated with trying to solve the problems we often
    encounter with convolution. As we have seen time and again throughout this book,
    the deeper convolutional layers become, the more noise they project. This was
    observed in various chapters where we explored deep CNN layers for feature extraction
    and reproduction.


    We have seen several solutions to managing the deep convolutional problem, including
    batch normalization, UNets, ResNets, and self-attention with spectral normalization.
    While these have and are successful on their own, the concept of a ProGAN goes
    a step further in breaking down training into progressions.


    After all, you couldn’t necessarily expect to teach calculus to an elementary
    student, so why should we expect an untrained GAN to learn to generate a face
    from no past experience? As much as we feed thousands of faces in thousands of
    iterations to try to teach such models, there becomes an inefficiency in that
    form of training.


    That inefficiency, as we now know, occurs when our models get too big and too
    deep with tens or hundreds of convolutional layers. But we need to create such
    big models if we are going to train models to generate high-resolution images.
    However, instead of building those models from the start, ProGAN builds a model
    incrementally through training.


    Figure [8-1](#502181_1_En_8_Chapter.xhtml#Fig1) shows the progression of training
    a ProGAN on facial data. The process works by first reducing the real training
    images to 4×4 pixels and feeding those into a GAN designed for that image size.
    After a certain period of training time, the GAN is grown by adding new layers
    for higher resolution, first 8×8 but then up to 16×16, 32×32, 64×64, and so on,
    to 1024×1024.


    The sacrifice of progressively growing a GAN is the additional training time of
    building successive models over and over but at higher resolutions. Additionally,
    training such models requires extra data preparation and storage. These are not
    ideal requirements when using a cloud notebook like Colab, so we will stick with
    some simpler examples in the exercise.


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig1_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    ProGAN training progression


    Figure [8-2](#502181_1_En_8_Chapter.xhtml#Fig2) shows the internal structure of
    a ProGAN for the generator and discriminator as proposed by the original authors.
    In the figure you can see the base blocks used to define the first progressions
    of the GAN from 4×4 to 16×16. As the model continues to build to whatever resolution
    is needed, new blocks are formed using the template shown, where k represents
    the desired pixel resolution of the final output image.


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig2_HTML.png](images/502181_1_En_8_Chapter/502181_1_En_8_Fig2_HTML.png)


    Figure 8-2


    Internals of ProGAN


    Within the generator pictured in Figure [8-2](#502181_1_En_8_Chapter.xhtml#Fig2),
    there is a new layer type called Pixelnorm, or the pixel normalization layer.
    Pixel normalization is like batch normalization with the difference of normalizing
    each feature pixel vector to a length of 1 and passing that back through the convolutional
    layers in the block. This is done with another method to avoid the feature over
    feature or noisy feature extraction problems we encountered in previous chapters.'
