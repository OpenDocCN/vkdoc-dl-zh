  trans: '

    # 深度伪造与换脸技术


    生成式建模最具争议的应用莫过于制造虚假人脸或将其用于换脸技术。这种技术俗称*深度伪造*，已成为假新闻及各类相关阴谋论的温床。许多人因恐惧而误解，认为这项技术毫无价值且违背伦理，这也给生成式建模带来了负面形象。


    深度伪造已被用于制作各种名人恶搞表情包和 YouTube 视频，通过替换经典角色中的面孔达到幽默效果。该技术也曾被用来让政治人物在各类喜剧乃至并不有趣的演示中"傀儡化"表演。


    当然，深度伪造也存在阴暗面：各类色情图片/视频中，无名（通常为女性）演员的面孔被替换成名人。这是目前最违背伦理的应用，因为名人的面孔未经同意就被使用，并被置于极具争议的处境中。


    然而，深度伪造的力量也开始渗透好莱坞，通过提供新的视觉效果技术，让年长或年轻明星的外貌通过深度伪造或更广义的生成式建模进行修改。目前该技术最常见的应用是面部老化或年轻化处理，这已被多部大片采用。


    深度伪造技术将如何被使用/滥用仍有待观察，但已证明的是生成式建模将对未来生活产生深远影响。例如，在媒体中替换面孔或其他形态可能成为常态。想象一下，只因偏爱某位演员就能替换电影主角，甚至改变整部电影的风格。正如本书所述，只要有足够的数据和耐心，替换或生成任何内容都是可能的。


    若未演示换脸技术的应用，我们便无法撰写一本关于生成式建模的全面著作。理解深度伪造的原理与方法，将助你推演甚至构建其他形式的替换技术，同时赋予你以合乎伦理且友好的方式推广该技术的工具。


    本章我们将探讨换脸技术的应用场景，以及如何将其应用于照片、视频和个人网络摄像头。我们将研究几款可用于换脸的工具，并完整演示制作深度伪造视频的工作流程。


    接着我们将训练一个换脸模型，使其能够用另一张面孔替换目标对象的面部。之后，我们将使用软件对你选择的深度伪造视频中的面孔进行转换。最后，我们将整合整个流程，制作属于你自己的短深度伪造片段。


    换脸技术需要投入一定精力才能获得良好效果，但正如所有值得尝试的事情一样，最终成果会带来满足感与成就感。我们还将看到，这展示了将生成式建模应用于实际问题的多个方面。这也是我们为本书收尾的绝佳方式。以下是本章要点：


    - 介绍换脸工具

    - 收集换脸数据

    - 理解深度伪造工作流程

    - 训练换脸模型

    - 制作深度伪造视频


    与之前章节不同，本章不会严格依赖 Google Colab 完成所有练习。我们将使用几款专为桌面端设计的 GUI 工具。这不仅能让换脸工作流程更易理解，还能为你提供更优质的长期工作环境。虽然本章使用的软件包支持在
    Colab 运行，但有迹象表明谷歌可能因滥用问题而禁止此类应用自由运行。


    请谨记：换脸技术存在大量滥用可能，我们演示深度伪造制作方法的目的在于促进你未来合乎伦理的使用。当前许多应用和操作系统已采用面部识别作为身份验证手段，而换脸技术正构成潜在安全风险。正如下一节所述，这项技术虽刚起步，但已提供了众多精密的工具。

    '
- fmt: "# Introducing the Tools for Face Swapping\n\nYou may be surprised to learn\
    \ that deepfakes and face swapping originated as far back as the 1990s when digital\
    \ video manipulation first became possible. Since then, the technology has flourished\
    \ in academia, film production, and most recently amateur communities made possible\
    \ by commercialization and open sourcing.\n\nThere are a wide variety of techniques\
    \ and applications that may perform some form of face swapping, from full digital\
    \ video software that uses filters and other more artistic-driven techniques to\
    \ those that apply generative modeling with deep learning. For our purposes, we\
    \ are going to stick with community-driven projects that use or apply deep learning\
    \ in some facet.\n\nThe following list shows the primary contenders we may consider\
    \ for performing FS and producing deepfakes. This list is by no means comprehensive\
    \ and will likely continue to grow in the coming years. For now, though it represents\
    \ some of the more popular community-driven methods, we can use the following:\n\
    \n- **Deep Fake Lab** (`https://github.com/iperov/DeepFaceLab`): This is promoted\
    \ as the top FS and deepfakes tool suggesting that 90 percent of content developed\
    \ uses this tool. There are GUI and command-line versions of this tool that provide\
    \ considerable options for managing the FS workflow. For that reason, it has become\
    \ the most popular with several online videos demonstrating its use. It is also\
    \ the more controversial tools since it hails from Russia and often avoids mentioning\
    \ or promoting proper ethics.\n    - *Base technology*: Face swapping/mapping\
    \ is performed with various CNN autoencoders. Developed with TensorFlow.\n\n-\
    \ **Faceswap** (`https://github.com/deepfakes/faceswap#overview`): This less often\
    \ used tool provides GUI and command-line versions for undertaking the FS workflow.\
    \ It provides plenty of options and various plugins to control the workflow but\
    \ is not as sophisticated as DFL. What makes this tool stand out is the ease of\
    \ use with the GUI, including the installation, and a direct emphasis on ethical\
    \ concerns when using it. For those reasons, it will be our chosen tool to demonstrate\
    \ in this chapter.\n    - *Base technology*: Various forms of CNN autoencoder\
    \ models used for face-to-face translation. Developed with TensorFlow.\n\n- **Faceswap-GAN**\
    \ (`https://github.com/shaoanlu/faceswap-GAN`): This is an older, less maintained\
    \ tool that is a great demonstration of doing FS with a GAN combined with a CNN\
    \ autoencoder similar to the more popular tools mentioned earlier.\n\n- **CelebAMask-HQ**\
    \ (`https://github.com/switchablenorms/CelebAMask-HQ`): This is based on a MaskGAN,\
    \ which like a CycleGAN is a model that provides for editing and extracting features\
    \ from faces. Masking and editing features are only one part of the FS workflow,\
    \ as we will see. This makes this tool not able to perform full FS but could be\
    \ used to enhance other of the other tools.\n\n- **StarGAN version 2** (`https://github.com/clovaai/stargan-v2`):\
    \ This is a model extended from a StarGAN that can be used to alter or swap faces\
    \ to match various learned attributes. This tool can be used to perform full face\
    \ swapping or just swap out attributes like we did in Chapter 6 when we used version\
    \ 1 of a StarGAN.\n\n- **FSGAN** (`https://github.com/YuvalNirkin/fsgan`): This\
    \ is described as a subject-agnostic face swapping and reenactment tool. This\
    \ tool is one of the few developed with PyTorch and does provide a Google Colab\
    \ version as well. It performs decent face swapping but requires a keen knowledge\
    \ of the FS process. This is a good, advanced tool for anyone looking to upgrade\
    \ their skills to using a GAN for FS.\n\nOne thing to notice from the previous\
    \ list is that the two main applications used to perform FS (DFL and face swap)\
    \ use somewhat low-tech approaches with CNN autoencoders. As we saw in the earlier\
    \ chapters, autoencoders can produce effective results and can be trained relatively\
    \ quickly. They also have fewer hyperparameters to tune, which makes them overall\
    \ more robust for amateur usage.\n\nFigure 9-1 shows the underlying architecture\
    \ for the Faceswap tool as it is used for training and then actual conversion.\
    \ In the tool, we can see that the model encoder takes two input images labeled\
    \ face A and B. Face A represents that target face you want to swap out, and B\
    \ is the face you want to replace with.\n\nWithin this architecture, you can see\
    \ that the encoder splits to two decoders, one for each set of faces. This configuration\
    \ is like our earlier explorations of image to image models using paired and unpaired\
    \ translations. With Faceswap, we use unpaired translations to teach the model\
    \ the translation required to map one face to another.\n\nThen, as shown in Figure\
    \ 9-1, when it comes time to convert, only the respective input face (A) needs\
    \ to be fed into and then converted using the decoder for B. The result is the\
    \ converted B face that can then be swapped for the original face.\n\n![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig1_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1: Faceswap encoder-double decoder architecture\n\nFigure 9-2 shows\
    \ the results of using Faceswap to swap Julia Roberts’ face with Scarlet Johannsen’s.\
    \ Results were obtained using the Villian model, which is a third-party plugin\
    \ often used to produce high-quality deepfakes. Figure 9-2 shows a comparison\
    \ of the before and after of swapping the star’s face in the movie *Pretty Woman*.\n\
    \n![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig2_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2: Face swapping Julia Roberts for Scarlet Johannsen in the film Pretty\
    \ Woman\n\nWe will learn how to create the deepfake shown in Figure 9-2 through\
    \ various exercises later in this chapter. For now, though, we want to reiterate\
    \ the importance of keeping our ethics at the forefront when creating such content.\
    \ As such, the Faceswap site has an excellent manifesto covering the usage and\
    \ ethics of such tools and is reiterated here:\n\n- FaceSwap is not for creating\
    \ inappropriate content.\n- FaceSwap is not for changing faces without consent\
    \ or with the intent of hiding its use.\n- FaceSwap is not for any illicit, unethical,\
    \ or questionable purposes.\n- FaceSwap exists to experiment and discover AI techniques,\
    \ for social or political commentary, for movies, and for any number of ethical\
    \ and reasonable uses.\n\nAlways try to keep these guidelines in mind when using\
    \ this technology. There exist numerous ways for people’s reputations to be harmed\
    \ through abuse that could result in serious legal consequences. That aside, your\
    \ abuse of deepfakes could potentially harm future employment opportunities or\
    \ hopes for working in the AI generative modeling workspace. Be careful about\
    \ what you produce and how you present it.\n\nProvided you respect this technology,\
    \ your subject’s face swapping can be an entertaining pursuit that you could get\
    \ lost in for days, weeks, or months. It can be amusing to swap celebrities in\
    \ movies or images to see the what-if possibilities. There are plenty of excellent\
    \ examples online, good and bad, featuring humorous and respectable use of this\
    \ technology.\n\nWhether you use this technology for personal use or create your\
    \ own online YouTube channel, the FS workflow is common across toolsets. We will\
    \ start in the next section looking at how we can gather data for the purposes\
    \ of performing FS workflows."
