- fmt: "# Conclusion\n\nTo construct working and practical generative models, we need\
    \ to understand how deep learning networks learn. We needed to learn how networks\
    \ approximate to functions and what effect that has on what the network learns.\
    \ From that we explored in some detail how the various hyperparameters can affect\
    \ how and what a network learns, further learning how to tune those hyperparameters\
    \ on toy examples.\n\nNext, we moved from tuning to understanding how hyperparameters\
    \ can allow us to control the latent or hidden space in our models. Learning to\
    \ control the size of latent space allowed us to better train the models. Then\
    \ we advanced to building a variational autoencoder, a model that learns by understanding\
    \ not just the latent space but distributional parameters that map to that latent\
    \ space.\n\nFinally, from our knowledge of mapping parameters to the latent space,\
    \ we could then construct output strictly based on those parameters. This allowed\
    \ us to see in detail what our model learns and how sensitive it is to the input\
    \ data. While we didn't look to resolve issues with our model in this chapter,\
    \ we will certainly look to other systems in the future to improve on it.\n\n\
    In the next chapter, we will revisit GAN and move on to explore its many variations.\
    \ GANs can be adapted to easily to control the latent space in model generation\
    \ using several techniques, many of them related to distributional learning. This\
    \ will allow us to generate content in a more controlled manner.\n\n# 4. GANs,\
    \ GANs, and More GANs\n\nGenerative modeling has been around for a few decades,\
    \ but much of the field didn't start to recognize itself without the discovery\
    \ of the generative adversarial network (GAN). There is some debate on when GANs\
    \ were discovered and by whom. One thing is for certain: Ian Goodfellow and his\
    \ colleagues from the University of Montreal in 2014 deserve a good deal of credit\
    \ for reinventing the technique of adversarial learning.\n\nGANs are, after all,\
    \ nothing more than autoencoders that have been split in the middle and flipped\
    \ around. Goodfellow took this concept a step further by introducing the concepts\
    \ of the generator (art forger) and the discriminator (art critic) in a true adversarial\
    \ sense as a way of generating new and novel content. This technique has become\
    \ so successful in generating new content that there are now hundreds of implementations\
    \ and variations of this simple model.\n\nIn this chapter, we revisit the GAN\
    \ and start to look at the many implementations that have been adopted as improvements\
    \ or variations. We start by looking back at convolution in a GAN by improving\
    \ on the deep convolutional GAN. We will see how to improve on measuring loss\
    \ or distance by introducing the Wasserstein GAN. Next, we explore what effect\
    \ discrete data may have on a GAN and how to solve it with the boundary-seeking\
    \ GAN. We then advance to improving our GAN performance by refining loss measurement\
    \ with the relativistic GAN. From there, we jump back to understanding and controlling\
    \ the latent space with the conditional GAN.\n\nGANs have landed at the forefront\
    \ of generative modeling. They are a technique we will explore tirelessly throughout\
    \ this book. In this chapter, we start with exploring several base GANs that will\
    \ provide us with techniques to use later. Here is a quick breakdown of the main\
    \ topics we will cover in this chapter:\n\n- Feature understanding with the DCGAN\n\
    - Unrolling the math of GANs\n- Resolving distance with WGAN\n- Discretizing boundary-seeking\
    \ GANs\n- Relativity and the relativistic GAN\n- Conditioning with CGAN\n\nThis\
    \ is a code-heavy chapter filled with many examples. All these examples use larger\
    \ training sets, where appropriate, to demonstrate concepts better. Larger datasets\
    \ could take hours or days to train. While most of the exercises in this chapter\
    \ may be trained in under an hour, some may take longer. In the next section,\
    \ we start exploring GANs by understanding the importance of feature learning.\n\
    \n## Feature Understanding and the DCGAN\n\nWhile we already explored the deep\
    \ convolutional GAN in a previous chapter, what we failed to cover are the details\
    \ of what really makes this model better. As we already learned, feature extraction\
    \ of visible features in 2D images can be facilitated with convolutional layers.\
    \ What we didn't cover in enough detail is how this matters.\n\nIn data science\
    \ we often characterize feature extraction as the process by which we identify\
    \ known or unknown features in a dataset. While data science uses statistical\
    \ modeling to extract features, deep learning has numerous ways to do this automatically.\
    \ Convolution is one of those methods that allows our model to learn what features\
    \ are important to characterize an object.\n\nConvolution is not the only way\
    \ to extract features; it is one that works well enough for most image classification\
    \ and recognition tasks. Regular convolution itself is limited to extracting localized\
    \ features, that is, features like an eye or nose. Global feature extraction methods,\
    \ which we will look at in later chapters, could recognize a nose but also relate\
    \ that the feature needs to be between the eyes.\n\nSince we already covered the\
    \ DCGAN in Chapter [2](#502181_1_En_2_Chapter.xhtml), in this exercise we are\
    \ going to focus specifically on what the model is learning or extracting using\
    \ convolution. By being able to understand how and what a model learns, we can\
    \ then derive what it generates. In Exercise 4-1, we revisit the DCGAN with a\
    \ focus on understanding the features it extracts.\n\nEXERCISE 4-1. DCGAN FEATURE\
    \ LEARNING\n\n1. Open the `GEN_4_DCGAN.ipynb` notebook from the GitHub project\
    \ site. If you are unsure how, then consult Appendix B.\n\n2. Run the whole notebook\
    \ by selecting Runtime ➤ Run all. Then look past the `imports` cell and on to\
    \ the first cell with a new class called `Hyperparameters`:\n\n```\nclass Hyperparameters(object):\n\
    \    def __init__(self, **kwargs):\n        self.__dict__.update(kwargs)\n\nhp\
    \ = Hyperparameters(n_epochs=200,\n                     batch_size=64,\n     \
    \                lr=.0002,\n                     b1=.5,\n                    \
    \ b2=0.999,\n                     n_cpu=8,\n                     latent_dim=100,\n\
    \                     img_size=32,\n                     channels=1,\n       \
    \              sample_interval=400)\nprint(hp.lr)\n```\n\n3. `Hyperparameters`\
    \ is a dictionary helper that allows us to define all the hyperparameters in one\
