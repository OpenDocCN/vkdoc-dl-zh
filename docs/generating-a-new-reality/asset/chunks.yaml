  trans: '

    ### 微积分的局限性


    如果你学过微积分，就会了解它的局限性。其中之一是，我们用微积分进行求导的所有函数都必须是连续的。图 3-4 展示了一些带有所谓*不连续点*区域的函数示例。这些区域中的函数会阻碍深度学习系统学习或逼近该函数。


    ![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig4_HTML.jpg](img/502181_1_En_3_Fig4_HTML.jpg)


    图 3-4


    不连续函数的示例


    在生成式建模中，你可以将不连续点视为数据中的间隙或真空。但不要将这里的“间隙”与空间或距离混淆。我们在此使用术语*间隙*，指的是函数中没有任何样本值的断裂处。而术语*空间*、*潜在空间*或*隐藏空间*则用于定义连续数据集中的未知区域。


    通常，当我们在生成的输出中看到黑色区域时，这表示输入数据存在极限或不连续性问题。


    理解连续数据与不连续数据之间的区别需要一些时间，有时这种区别可能并不明显。这里的关键要点是，函数逼近存在局限性，而这些局限性通常由数据本身决定，有时需要网络在不连续的数据上逼近一个连续函数。


    现在，回到极限问题，让我们了解极限如何影响网络学习或逼近数据。在我们的练习示例中，网络的极限是 1 和 10。如果参考图 3-3，我们可以看到当 `X`<1
    时，函数变得平坦，考虑到极限为 1，这是合理的。这意味着当 `X` 小于 0 时，我们的网络将函数逼近限制为 `y`=5。


    然而，不太明显的是，为什么当极限为 10 时，我们的函数逼近在大于 7 的值上会失败。要理解这个问题出现的原因，我们需要了解深度学习如何利用微积分来逼近函数，这将在下一节中介绍。


    ### 深度学习爬山法


    任何深奥的数学概念核心，总有一个直观的解释来说明其“为什么”。不幸的是，大多数经典数学课程常常忽略了“为什么”的解释。相反，它们依赖于学生通过进行证明或死记硬背方程来自己发现其中的直觉。这对崭露头角的数学家来说效果很好，但往往会压垮其他人。因此，我们将始终更关注数学的“为什么”，而不是具体的“怎么做”。


    微积分是我们在深度学习系统中用来平衡网络权重/参数的工具。回想一下，微积分通过理解系统的变化率来工作。在深度学习中，微积分使我们能够确定需要调整网络权重的变化量以及调整的位置。


    微积分和梯度优化或梯度下降并不是我们用来寻找网络权重的唯一工具。它目前是最有效的，但深度学习系统已经并将继续使用其他机器学习方法。如果你有兴趣了解更多，可以搜索
    *深度学习 PSO* 或 *深度学习 GA*。


    图 3-4 展示了一个一维函数，其中有一个小球位于位置 1。我们可以将深度学习系统的目标视为引导这个球在函数上移动。更进一步，我们希望这个球能够尽可能紧密地跟随该函数。球能够跟随函数路径的效果越好，我们的网络预测或生成内容的效果就越好。


    请注意，在图 3-4 中，我们移动球的量是通过自动微分和我们的优化方法计算得出的，再乘以学习率（`alpha`）。这在图中被标记为“梯度 X alpha”。梯度的量可以通过选择不同的优化方法和/或调整超参数来改变。调整优化器，无论是随机梯度下降还是
    Adam，都是我们稍后会涉及的内容。


    这就引出了 *alpha*，即学习率或学习参数。这个超参数允许我们控制网络在将球映射到函数时使用的调整程度。在图 3-5 和我们之前的例子中，我们应用了较高的学习率。正如你所见，这通过球移动到位置
    2 然后到位置 3 的运动来体现。注意球在第三个位置是如何远高于函数线的。这就是导致我们前一个例子中出现问题的原因。


    ![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig5_HTML.jpg](img/502181_1_En_3_Fig5_HTML.jpg)


    图 3-5


    深度学习爬山法


    在图 3-6 中，我们可以看到降低学习率如何使网络更好地逼近函数路径。你可以看到，随着边界的加入，让球保持在边界内也变得至关重要。当球弹跳到最大边界之外时，其值会被限制在最大值。这就是图
    3-3 中最大值映射不佳的原因。


    ![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig6_HTML.jpg](img/502181_1_En_3_Fig6_HTML.jpg)


    图 3-6


    调整学习率


    从中得出的主要结论是，在映射函数时，学习率通常是我们最敏感的超参数。学习率，即 *alpha*，几乎总是你为网络调整和理解的首要参数。`Alpha` 也是调整网络训练速度的关键。当
    `alpha` 过大时，网络会超出函数范围。相反，将 `alpha` 保持得非常小可以让球很好地学习函数。然而，这可能会以巨大的计算性能为代价。

