  trans: "\n## PyTorch 与深度学习\n\n到目前为止，我们一直在使用纯 Python，并借助一位名为 NumPy 的朋友的帮助来构建一些简单的感知器。你现在可能已经意识到，通过网络反向传播损失的过程并不简单，需要一些额外的帮助。幸运的是，有许多深度学习库可供我们使用，但它们并非都同样出色。\n\
    \n在本书中，我们将使用 `PyTorch`，这是一个开源库，因其易用性、高性能和可定制性而变得非常流行。它目前是大多数学术和前沿人工智能研究人员的首选库。这将在本书后续尝试构建前沿生成模型时为我们带来好处。\n\
    \n`PyTorch` 可以让我们构建从最简单的两层多层感知器到数千层的复杂模型。在练习 1-3 中，我们将深入实践，在 `PyTorch` 中构建我们的第一个\
    \ MLP 网络，重新解决我们之前未能解决的 XOR 问题。\n\n### 练习 1-3. 在 PyTorch 上用 MLP 解决 XOR 问题\n\n1.\
    \  从项目的 GitHub 站点打开 `GEN_1_mlp_pytorch.ipynb` 笔记本。如果你不确定如何访问源代码，请查看附录 B。\n\n2.\
    \  运行第一个代码块，它会加载 NumPy 以及我们将要使用的几个 `PyTorch`（`torch`）模块。\n\n    ```python\n  \
    \  import numpy as np\n    import torch\n    import torch.nn as nn\n    from torch.autograd\
    \ import Variable\n    import torch.nn.functional as F\n    import torch.optim\
    \ as optim\n    ```\n\n3.  下一个代码块包含一个名为 `XorNet` 的类中的模型。在这个类中，我们使用 `nn` 模块通过 `nn.linear`\
    \ 创建了两个神经网络层。我们将该层称为 `fc`；提醒一下，该层是全连接的。第一个 `fc1` 层接收 2 个输入并输出到 10 个神经元/感知器。第二个\
    \ `fc2` 层接收 10 个输入并输出到单个神经元。`forward` 函数展示了输入 `x` 如何被传递到第一个 `fc1` 层，并通过 `F.relu`\
    \ 经过 ReLU 激活函数，然后再传递到第二个 `fc2` 层。\n\n    ```python\n    class XorNet(nn.Module):\n\
    \        def __init__(self):\n            super().__init__()\n            self.fc1\
    \ = nn.Linear(2,10)\n            self.fc2 = nn.Linear(10,1)\n        def forward(self,\
    \ x):\n            x = F.relu(self.fc1(x))\n            x = self.fc2(x)\n    \
    \        return x\n    ```\n\n4.  下一个代码块是我们实例化 `XorNet` 模型的地方。之后，我们创建了一个均方误差（MSE）类型的损失函数。这个损失计算与我们之前看到的相同。之后，我们创建了一个\
    \ Adam 类型的优化器。Adam 优化器是 SGD 的改进版本，它提供了更好的权重更新缩放，从而使优化更加高效。\n\n5.  接着，我们开始设置 XOR\
    \ 问题的数据，并调整这些数据的封装方式，以便输入到 `PyTorch` 中。\n\n    ```python\n    X = np.array([[0.,0.],[1.,1.],[0.,1.],[1.,0.]])\n\
    \    Y = np.array([0.,0.,1.,1.])\n    y_train_t = torch.from_numpy(Y).clone().reshape(-1,\
    \ 1)\n    x_train_t = torch.from_numpy(X).clone()\n    history = []\n    ```\n\
    \n6.  接下来，我们进入训练循环，这与我们之前看到的类似。不同之处在于我们在这里对数据进行批处理。由于我们只有四个样本，我们将所有数据作为一个批次。这些数据被输入模型进行前向传播或预测。之后，使用损失函数\
    \ `loss_fn` 根据 `y_batch` 中的期望值和预测值 `y_pred` 计算损失。然后我们使用 `optimizer.zero_grad()`\
    \ 将优化器的梯度归零，这类似于重置。接着使用 `loss.backward()` 反向传播损失，最后使用 `optimizer.step()` 执行另一个优化步骤。\n\
    \n    ```python\n    for i in range(epochs):\n        for batch_ind in range(4):\n\
    \            x_batch = Variable(torch.Tensor(x_train_t.float()))\n           \
    \ y_batch = Variable(torch.Tensor(y_train_t.float()))\n            y_pred = model(x_batch)\n\
    \            loss = loss_fn(y_pred, y_batch)\n            print(i, loss.data)\n\
    \            optimizer.zero_grad()\n            loss.backward()\n            optimizer.step()\n\
    \    ```\n\n7.  随着模型训练，你会看到损失很快趋近于零。还记得我们之前使用单个感知器模型时，损失最小化到 0.25 吗？这是因为网络无法拟合\
    \ XOR 函数。通过添加一个包含 10 个神经元/感知器的第二层，我们现在能够解决 XOR 问题了。\n\n8.  我们可以通过以下方式从 XOR 真值表中输入单个输入来测试模型的预测效果：\n\
    \n    ```python\n    v = Variable(torch.FloatTensor([1,0]))\n    model(v)\n  \
    \  ```\n\n9.  在代码中，你可以看到我们需要将输入 1,0 转换为张量，然后通过 `Variable` 转换为 torch 变量。然后将该值输入模型，并显示预测结果。注意，预测的输出将恰好是\
    \ 1.0。\n\n通过向 MLP 模型添加一个包含 10 个神经元的第二层，我们能够使用 `PyTorch` 快速有效地解决 XOR 问题。`PyTorch`\
    \ 凭借其神经网络抽象模块 `nn`，提供了快速构建模型的能力。在 `PyTorch` 中还有其他更底层的方法来构建网络，但在本书的大部分内容中，我们将坚持使用\
    \ `nn`。在下一节中，我们将探讨如何运用 `PyTorch` 网络进行回归分析。\n"
- fmt: "# Understanding Regression\n\nOver the course of this chapter, we have used\
    \ a form of teaching or learning called *supervised learning*. In supervised learning,\
    \ our inputs have a known and expected output called a *label*. Mathematically,\
    \ we often denote inputs as `X` and labels as `Y` shown in the familiar equation\
    \ of a line, as shown here:\n\n![$$ Y= mX+b $$](images/502181_1_En_1_Chapter/502181_1_En_1_Chapter_TeX_Equb.png)\n\
    \nwhere:\n\n- `m` = slope or weight of the line\n- `b` = the offset or bias\n\n\
    Likewise, we can model the equation for a perceptron with the following:\n\n![$$\
    \ Y={\\sum}_{i=1}^n{w}_i{X}_i+b $$](images/502181_1_En_1_Chapter/502181_1_En_1_Chapter_TeX_Equc.png)\n\
    \nwhere:\n\n- `n` = the number of inputs\n- `b` = bias\n\nIn a supervised learning\
    \ scenario, we are given the inputs `X` and the expected results or labels `Y`.\
    \ The goal is to find the parameters of the equation, either slope and offset\
    \ or weights and bias, that will produce the expected output. Typically, we solve\
    \ these problems by performing regression analysis.\n\nRegression analysis is\
    \ when we iteratively modify the parameters of a model until we find a consistent\
    \ solution for the set of all inputs. You can think of this analysis as mapping\
    \ to or solving the function. For all deep learning and machine learning, our\
    \ goal is often just solving an equation or function. Deep learning is an excellent\
    \ equation solver when the equation is differentiable.\n\nSince we use calculus\
    \ to find the gradients, we can solve any equation if it is differentiable. That\
    \ means the equation needs to be continuous at every point across the domain with\
    \ no discontinuities or gaps.\n\nThe purpose of solving or learning an equation\
    \ is to reuse that same equation for later inference of other unknown inputs to\
    \ produce outputs. Thus, if we solve the equation of a line with a regression\
    \ given a known set of data points and outputs, we can reuse that equation to\
    \ plot or infer new data points.\n\nFigure [1-8](#502181_1_En_1_Chapter.xhtml#Fig8)\
    \ shows the plot of data points `X` and `Y` with a line of regression passing\
    \ through them. The equation of the line is shown in the legend. This plot was\
    \ created with Microsoft Excel and uses the standard linear regression tools to\
    \ generate the plot with a trendline. A trendline in Excel vernacular is a line\
    \ calculated using regression to solve the line that best fits the points.\n\n\
    ![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig8_HTML.jpg](images/502181_1_En_1_Chapter/502181_1_En_1_Fig8_HTML.jpg)\n\
    \n**Figure 1-8** Trendline equation of line from Excel\n\nThe line shown on the\
    \ plot can be used to further infer new data points given some arbitrary `X` value.\
    \ For instance, if we wanted to determine what the value of `Y` would be when\
    \ `X` is 0, the results would be 1.63, which so happens to the offset of intercept\
    \ of the line. How accurate this line prediction is depending on the quantity\
    \ and quality of the data.\n\nWhen we run a deep learning model, we are essentially\
    \ doing the same thing: solving for some unknown equation that will fit the input\
    \ data. In future chapters, this process may become blurred, but it is important\
    \ to understand that in all cases we are just solving for a function or equation\
    \ with deep learning.\n\nIn data science we often denote simple regression as\
    \ finding an explicit value. What you may consider the opposite of regression\
    \ is *classification*. In classification, we don’t find an explicit value but\
    \ instead the class the value belongs to. We will explore more about classification\
    \ later in this chapter. For now, though, let’s jump into another exercise and\
    \ show how we can perform more complex regression with a deep learning network.\
    \ In Exercise 1-4, we will use the Boston housing value dataset to predict the\
    \ value of a house.\n\n## EXERCISE 1-4. PREDICTING HOUSE PRICES WITH PYTORCH\n\
    \n1.  Open the `GEN_1_regression_pytorch.ipynb` notebook from the project’s GitHub\
    \ site. If you are unsure on how to access the source, check Appendix B.\n\n2.\
    \  In the first cell, we again load the imports and this time add a new module\
    \ called `sklearn`. We will use this module to download the Boston housing data\
    \ as well as break the data into a training set and a test set. In most cases,\
    \ we will always want to break our data into a training/test split, where on average\
    \ 80 percent of the original data will be used for training and the remaining\
    \ 20 percent to test the model after.\n\n    ```python\n    from sklearn.datasets\
    \ import load_boston\n    from sklearn.model_selection import train_test_split\n\
    \    import numpy as np\n    import matplotlib.pyplot as plt\n    import torch\n\
    \    import torch.nn as nn\n    ```\n\n3.  Next, we will load the dataset with\
    \ the code and split it up into inputs (`X`) and labels (`y`).\n\n    ```python\n\
    \    boston = load_boston()\n    X, y = (boston.data, boston.target)\n    boston.data[:2]\n\
    \    inputs = X.shape[1]\n    ```\n\n4.  The data is loaded, and now we will split\
    \ it into the training and test split using the `train_test_split` function. Notice\
    \ how we set `test_size` to .2, meaning 20 percent of the data will be test.\n\
    \n    ```python\n    X_train, X_test, y_train, y_test = train_test_split(X, y,\
    \ test_size=0.2, random_state=0)\n    num_train = X_train.shape[0]\n    X_train[:2],\
    \ y_train[:2]\n    num_train\n    ```\n\n5.  This time we are going to create\
    \ a sequential model with four layers. The first layer will take the size of the\
    \ dataset as inputs and output to 50 neurons. It continues to the next layer with\
    \ 50 and 50 and so on, finishing at the output layer of one neuron. Then we create\
    \ the loss and optimizer functions. Notice the difference in activation functions\
    \ between the layers and the output layer. The last layer uses a `sigmoid` function,\
    \ which outputs a value from 0 to 1.\n\n    ```python\n    torch.set_default_dtype(torch.float64)\n\
    \    net = nn.Sequential(\n        nn.Linear(inputs, 50, bias=True), nn.ReLU(),\n\
    \        nn.Linear(50, 50, bias=True), nn.ReLU(),\n        nn.Linear(50, 50, bias=True),\
    \ nn.Sigmoid(),\n        nn.Linear(50, 1)\n    )\n    loss_fn = nn.MSELoss()\n\
    \    optimizer = torch.optim.Adam(net.parameters(), lr=.001)\n    ```\n\n6.  We\
    \ can next move on to preparing the data for training. For this example, we need\
    \ to reshape the labels from row to column order. In this block of code, we set\
    \ up tensors for both the training and testing datasets.\n\n    ```python\n  \
    \  num_epochs = 8000\n    y_train_t = torch.from_numpy(y_train).clone().reshape(-1,\
    \ 1)\n    x_train_t = torch.from_numpy(X_train).clone()\n    y_test_t = torch.from_numpy(y_test).clone().reshape(-1,\
    \ 1)\n    x_test_t = torch.from_numpy(X_test).clone()\n    history = []\n    ```\n\
    \n7.  Now we can proceed to the training loop of code, which should be relatively\
    \ familiar by now.\n\n    ```python\n    for i in range(num_epochs):\n       \
    \ y_pred = net(x_train_t)\n        loss = loss_fn(y_train_t, y_pred)\n       \
    \ history.append(loss.data)\n        loss.backward()\n        optimizer.step()\n\
    \        optimizer.zero_grad()\n        test_loss = loss_fn(y_test_t, net(x_test_t))\n\
    \        if i > 0 and i % 100 == 0:\n            print(f'Epoch {i}, loss = {loss:.3f},\
    \ test loss {test_loss:.3f}')\n    ```\n\n8.  In the training block of code, we\
    \ are again using the training set inputs (`X`) and labels (`Y`) to train the\
    \ network. Along with this, we are also calculating `test_loss` by passing the\
    \ test dataset in the network.\n\n9.  Running that last block of code will show\
    \ you how the loss or error gets reduced from about 390 to around 1 or 2. This\
    \ value represents the amount of value the house prediction was off. You should\
    \ also notice that the test loss does not keep the same rate as the training loss.\
    \ This is an example of our network overfitting.\n\nFrom running this model, you\
    \ can see our training dataset could be optimized too well. However, when we tested\
    \ the test dataset against the same model, our results showed more error or loss.\
    \ The reason for this is because the model is overfitting to the training data.\
    \ Over- and underfitting of data is a problem we will chat about in the next section."
