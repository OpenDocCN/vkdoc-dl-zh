- fmt: '# Understanding Face Manipulation Methods


    In the realm of facial manipulation, we typically categorize the techniques into
    two broad categories. There is identity to identity transformation where one individual’s
    face is swapped for another. The other form is where an identity is translated
    to the pose of another identity, called *facial reenactment*.


    We already looked at the identity to identity transformation method called face
    swapping in Chapter [9](#502181_1_En_9_Chapter.xhtml) and used that to construct
    a deepfake. While we used deep learning dual autoencoders to project the facial
    transformation, there are in fact other graphics-based methods. Here is a summary
    of the high-level identity transformation methods:


    * **FaceSwap**: This is not to be confused with the software package `Faceswap`.
    `FaceSwap` is a graphics-based approach that is akin to pulling the face from
    the target image, projecting it to a 3D model using facial landmarks, and then
    capturing the replacement face. This method is currently used in the film industry
    for all manner of swapping faces and other manipulations.


    * **Deepfakes**: This works by first extracting the faces from the source and
    target identities. A deep learning network is trained to transform face A into
    face B, and vice versa. The trained model can then be used to swap face A with
    face B using the network to interpret any required pose changes. Again, we covered
    this whole process in fine detail in Chapter [9](#502181_1_En_9_Chapter.xhtml).


    Facial reenactment is the second category of facial manipulation and works by
    keeping the target identity but replacing the pose from another source, where
    the other source may be a person speaking. This method is often lumped in with
    deepfakes, but for our purposes we will define this as *facial reenactment* rather
    than face swapping (FS).


    Figure [10-1](#502181_1_En_10_Chapter.xhtml#Fig1) shows the difference between
    FS and facial reenactment (FE) or pose swapping using some well-known popular
    examples. The first top half of the figure demonstrates face swapping with the
    face of Lady Gaga and the actor Steve Buscemi. This swap was performed with the
    Villain model using `Faceswap`.


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig1_HTML.jpg](images/502181_1_En_10_Chapter/502181_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Difference between face swap and pose swap


    In the bottom half of Figure [10-1](#502181_1_En_10_Chapter.xhtml#Fig1), President
    Barack Obama’s likeness is being used, but his movements and actions (pose) are
    being replaced by comedian Jordan Peele. The image is extracted from an entire
    video that demonstrates the full power of pose swapping. During the video, the
    comedian goes on to speak as the president making various false claims.


    Pose swapping is currently implemented using two diverse strategies, not unlike
    what we see with FS. There is a graphics-based approach and a deep learning method
    that can be applied to swap the pose of a target. Here are more details about
    each method:


    * **Face2Face**: This is a graphics-based method like `FaceSwap` but uses two
    input video streams where key frames are extracted and used as blend targets.
    Instead of extracting the face from landmarks, this time the pose is extracted.
    Then the pose is translated to a 3D feature map used to blend the target face.


    * **NeuralTextures**: This method uses a typical GAN not unlike `Pix2Pix` or another
    image to image translation model to translate the pose from one image to another.
    There are plenty examples of various open source projects that demonstrate this
    technique, but the current top contender is `Avatarify`. With `Avatarify`, using
    the right hardware, you can translate your pose in real time or the faces of Mona
    Lisa or Albert Einstein, among others. If you need to remember how this method
    works, look back to Chapters [6](#502181_1_En_6_Chapter.xhtml) and [7](#502181_1_En_7_Chapter.xhtml)
    where we trained models on paired and unpaired images for image to image translation.


    Figure [10-2](#502181_1_En_10_Chapter.xhtml#Fig2) was extracted from the paper
    “FaceForensics++: Learning to Detect Manipulated Facial Images,” which is a great
    source of work showcasing various facial detection techniques. The authors have
    even been so gracious as to provide a free source of facial manipulated images
    and videos on their GitHub repository at [`https://github.com/ondyari/FaceForensics/`](https://github.com/ondyari/FaceForensics/).


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig2_HTML.jpg](images/502181_1_En_10_Chapter/502181_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    FaceForensics++ breakdown comparison of facial manipulation methods


    It should be noted that the authors in the `FaceForensics++` paper make the distinction
    to call face swapping *deepfakes*, as shown in Figure [10-2](#502181_1_En_10_Chapter.xhtml#Fig2).
    We will also now make that distinction and from now on call face swapping fakes
    *deepfakes*, leaving the broader deepfakes definition to represent the genre of
    facial manipulation content.


    FURTHER REFERENCES


    Exploiting Visual Artifacts to Expose Deepfakes and Face Manipulations:


    [`https://ieeexplore.ieee.org/abstract/document/8638330`](https://ieeexplore.ieee.org/abstract/document/8638330)


    DeepFakes: a New Threat to Face Recognition? Assessment and Detection:


    [`https://arxiv.org/abs/1812.08685`](https://arxiv.org/abs/1812.08685)


    What do deepfakes mean for brands?


    [`https://www.thedrum.com/opinion/2020/01/10/what-do-deepfakes-mean-brands`](https://www.thedrum.com/opinion/2020/01/10/what-do-deepfakes-mean-brands)


    Now that we have clearer understanding of the scope of facial manipulation techniques,
    we can move on to understanding how to identify such fakes. In the next section,
    we introduce the various methods currently employed to identify deepfakes.


    ## Techniques for Cracking Fakes


    The research into developing methods to crack and identify deepfakes has flourished
    in recent years, certainly encouraged by the fear of increasingly better generative
    models. As we have seen throughout this book, the early days of generators could
    be easily identified and were of no concern. That has all changed in recent years,
    and now it is almost impossible for a human to distinguish what is a fake anymore
    with a mere glance.


    However, and perhaps more fortunately for us and generative modeling in general,
    the same AI can be used against itself. After all, as we have seen throughout
    this book, we often struggle with the balance between the training of a discriminator
    and a generator; we may often have to handicap the discriminator so that a generator
    can produce great results.


    In terms of cracking fakes, we then want to construct the best discriminator that
    can identify fakes using various feature detection methods. Of course, that doesn’t
    mean that an excellent critic could not be used to adversarial train a better
    generator. In fact, there is plenty of research doing just that. How this arms
    race unfolds remains to be seen, but for now let’s consider the methods used to
    identify fakes.


    We can break down the current methods used to identify fakes into three categories,
    as defined in “DeepFakes and Beyond: A Survey of Face Manipulation and Fake Detection”
    by Ruben Tolosana et al. This excellent paper walks through the current categories
    of methods used to identify fakes and is summarized here:


    * Handcrafted features


    * Learning-based features


    * Artifacts


    The important thing to remember about each of these categories is they define
    broad techniques that may use a combination of AI/ML and feature extraction techniques
    through graphics packages like `OpenCV`. We will review each of these categories
    in more detail by starting in the next section.'
