  trans: "\n5.  我们有两个生成器，一个用于将图像从域 A 转换到域 B，另一个用于从域 B 转换到域 A，分别命名为`G_AB`和`G_BA`。请注意，我们如何将伪造/生成的图像传回相反的生成器，以创建`recov_A`和`recov_B`输出。重新转换后的图像用于计算循环一致性损失。在生成各种图像后，我们首先通过将伪造图像传入相应的判别器`D_A`或`D_B`来计算对抗性损失。接着，通过比较重新转换后的图像与原始图像来计算循环损失。由此，我们确定从生成器\
    \ A > B 和 B > A 的完整转换中存在多少误差。最后，通过求和并应用 lambda 缩放超参数来计算总的`G_loss`。\n\n6.  接下来查看判别器部分及其损失计算，如下所示：\n\
    \n```\n# 为改进的 Wasserstein 训练计算梯度惩罚\ngp_A = compute_gradient_penalty(D_A, imgs_A.data,\
    \ fake_A.data)\n# 对抗性损失\nD_A_loss = -torch.mean(D_A(imgs_A)) + torch.mean(D_A(fake_A))\
    \ + hp.lambda_gp * gp_A\n# 为改进的 Wasserstein 训练计算梯度惩罚\ngp_B = compute_gradient_penalty(D_B,\
    \ imgs_B.data, fake_B.data)\n# 对抗性损失\nD_B_loss = -torch.mean(D_B(imgs_B)) + torch.mean(D_B(fake_B))\
    \ + hp.lambda_gp * gp_B\n# 总损失\nD_loss = D_A_loss + D_B_loss\nD_loss.backward()\n\
    optimizer_D_A.step()\noptimizer_D_B.step()\n```\n\n7.  对于判别器损失，我们使用了特殊的`compute_gradient_penalty`函数，稍后将详细介绍。该函数接收判别器（A\
    \ 或 B）以及对应域（A 或 B）的真实图像和伪造图像。由此我们计算出两种形式的对抗性损失；`D_A_loss`/`D_B_loss`将常规对抗性损失与之前的梯度惩罚损失相结合，并再次通过`lambda_gp`进行缩放。最后，总损失由两个域\
    \ A/B 的损失合并而成。请注意代码末尾我们如何使用两个不同的优化器来训练判别器中的权重。这与生成器形成对比，生成器仅使用一个优化器。\n\n8.  最后一步，我们将回到`compute_gradient_penalty`函数，如下所示：\n\
    \n```\ndef compute_gradient_penalty(D, real_samples, fake_samples):\n    alpha\
    \ = FloatTensor(np.random.random((real_samples.size(0), 1, 1, 1)))\n    interpolates\
    \ = (alpha * real_samples + ((1 - alpha) * fake_samples)).requires_grad_(True)\n\
    \    validity = D(interpolates)\n    fake = Variable(FloatTensor(np.ones(validity.shape)),\
    \ requires_grad=False)\n    # 获取关于插值点的梯度\n    gradients = autograd.grad(\n   \
    \     outputs=validity,\n        inputs=interpolates,\n        grad_outputs=fake,\n\
    \        create_graph=True,\n        retain_graph=True,\n        only_inputs=True,\n\
    \    )[0]\n    gradients = gradients.view(gradients.size(0), -1)\n    gradient_penalty\
    \ = ((gradients.norm(2, dim=1) - 1) ** 2).mean()\n    return gradient_penalty\n\
    ```\n\n9.  该函数基于第 4 章中的 Wasserstein GP 损失。回顾一下，这转换了 Wasserstein 推土机方法，通过使用梯度惩罚而非裁剪函数来衡量分布之间的差异。\n\
    \n如图 5-5 所示，该 GAN 在跨两个域并返回的图像到图像转换学习方面非常高效。结果显示了从域 A 到域 B 再返回的域转换。仅经过几个周期，双 GAN\
    \ 就能轻松完成域到域转换的学习。\n\n从图像到图像的配对转换，我们可以开始考虑图像转换模型的其他可能性。在下一节中，我们将考虑第一个假设并非每张图像都有唯一正确转换的模型。\n\
    \n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig5_HTML.jpg](img/502181_1_En_5_Fig5_HTML.jpg)\n\
    \n图 5-5\n\nDualGAN 用于图像到图像转换的训练输出\n\n## 驾驭 BicycleGAN 的潜在空间\n\n图像配对转换的一个主要缺陷是假设每张图像只有一种正确的转换。但情况往往并非如此，一种语言中的一张图像或一个短语在另一个域中可能有多个正确的含义。\n\
    \nBicycleGAN 引入了这样一个假设：每个输入图像都有多个正确的转换，而不仅仅是一个。然而，为了实现这一壮举，这种形式的 GAN 使用了一位老朋友——变分自编码器，以更好地映射学习到的分布。\n\
    \n现在，该模型不再使用配对的生成器和判别器，而是使用一个生成器和一个 VAE 编码器，如图 5-6 所示。从图中，A 和 B 表示不同的图像域，其中![$$\
    \ \\hat{B} $$](img/502181_1_En_5_Chapter_TeX_IEq1.png)表示 A 的输出。*G*表示生成器，*E*表示编码器，而*D*当然是判别器。函数*N*(*z*)和*Q*(*z*|*B*)是采样函数，其输出被传递到*KL*块。KL\
    \ 代表 Kullback-Leibler，是衡量分布输出差异的另一种方法。\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig6_HTML.jpg](img/502181_1_En_5_Fig6_HTML.jpg)\n\
