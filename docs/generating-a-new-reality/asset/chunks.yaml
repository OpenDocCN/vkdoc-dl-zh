    ### Colorizing and Enhancing Video


    DeOldify is capable of colorizing not only images but video as well. The specific
    model variation used to colorize video is called *simple video* and uses a few
    improvements on its own. While the video model is based on SAGAN/NoGAN training,
    it is improved by optimizing across frames to prevent flicker-free output.


    In this next exercise, we set up the DeOldify video model to process older movies
    that we want to colorize. For the most part, this example will be like the image
    (artistic) model we used to colorize in our previous exercise. Colorizing video
    can be quite interesting to see how frames are interpolated across output, as
    we will see in Exercise 8-4.


    **EXERCISE 8-4. USING DEOLDIFY TO COLORIZE VIDEO**


    1. Open the `GEN_8_DeOldify_Video.ipynb` notebook from the GitHub project site.
    If you are unsure how, then consult Appendix B.


    2. This notebook again needs to download, install, and restart before we can use
    the magic of DeOldify. That means you may need to restart the notebook’s runtime
    after installation of the `requirements.txt` file, as shown in the following code
    block:


    ```

    !pip install -r colab_requirements.txt

    ```


    3. Remember, you can restart the runtime from the menu by selecting Runtime ➤
    Restart runtime. Note that runtime restart is different than a factory reset of
    the notebook. We typically only use factory resets when we want everything, including
    files and installations, to be reset.


    4. The next few blocks of code are all like our previous exercise and other examples.
    Notice how this time we are loading a video-bw for video black and white dataset
    of old movies. Several of these clips are from the silent era of film; others
    may have audio. DeOldify strips out the audio from the file and replaces it after
    colorization, thus allowing movies with sound to be colorized as well.


    5. Next, we can create the video colorizer with the following block of code:


    ```

    colorizer = get_video_colorizer()

    ```


    6. The key difference is the call to the helper function to create the video colorizer.


    7. From there, we can move down to the last block of code and see how the colorizer
    is again set up in a Colab form for easy use:


    ```

    #@title IMAGE SELECTION  { run: "auto" }

    import glob

    import ipywidgets as widgets

    from IPython.display import display

    from IPython.display import clear_output

    files = sorted(glob.glob("%s/*.mp4" % video_folder))

    file_idx = 4 #@param {type:"slider", min:0, max:12, step:1}

    show_video_in_notebook(files[file_idx])

    video = colorizer.colorize_from_file_name(files[file_idx])

    show_video_in_notebook(video)

    ```


    8. Again, after all the previous notebook cells have run, you can use the form
    to scroll through the collection of videos and visualize the output.


    9. Feel free to use your own selection of older videos and colorize/enhance them
    with DeOldify.


    Figure [8-11](#502181_1_En_8_Chapter.xhtml#Fig12) shows an example of a simple
    frame of video output. In the sample frame, we can see some artifacts where the
    ladies dress and horse’s leg are not correctly colorized. When this type of similar
    discoloration occurred with skin, Antic would name these defects *zombie skin*.


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig12_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig12_HTML.jpg)


    Figure 8-11 Example frame of colorized video


    *Zombie skin* describes gray or incorrectly colorized skin often as the result
    of poor feature extraction. In Figure [8-12](#502181_1_En_8_Chapter.xhtml#Fig13)
    we can observe this zombie-like skin effect happening to the horse’s leg, which
    appears to be gray. With video this effect is more pronounced as the scene lighting
    may quickly vary and cause these various artifacts. Again, the best way to visualize
    these results is to run the notebook and scroll through the various sample videos.


