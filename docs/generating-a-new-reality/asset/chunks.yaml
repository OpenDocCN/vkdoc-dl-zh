    \n3.  下一个代码块在图表上渲染输入点：\n\n    ```python\n    fig = plt.figure()\n    ax = fig.add_subplot(111,\
    \ projection='3d')\n    ax.scatter(X[:,0], X[:,1], X[:,2], c='r', marker='o')\n\
    \    ```\n\n4.  在这种情况下，我们仅在如图 1-3 所示的 3D 图中显示输入点。我们在这个问题中的目标是训练感知器，使其能够学习如何将这些点映射到我们的输出标签`Y`。\n\
    \n5.  接下来，我们进入设置参数和超参数的代码部分。在这个练习中，我们调整了超参数`epochs`和`learning_rate`。我们将`learning_rate`降低到\
    \ 0.01。这样做有效地使每次更新训练传递或 epoch 的效果减弱。然而，在这种情况下，感知器学习映射这些值的速度比 XOR 问题快得多，因此我们也将减少\
    \ epoch 的数量。\n\n    ```python\n    no_of_inputs = X.shape[1]\n    epochs = 50\n\
    \    learning_rate = .01\n    weights = np.random.rand(no_of_inputs + 1)\n   \
    \ print(weights.shape)\n    ```\n\n6.  对于这个练习，我们将引入一个激活函数。激活函数用于缩放输出，以便更好地输入或预测。在这个例子中，我们使用一个修正线性单元（ReLU）函数。这个函数有效地将小于或等于\
    \ 0 的输出置为 0，否则就线性地传递输出。\n\n    ```python\n    def relu_activation(sum):\n    \
    \    if sum > 0: return sum\n        else: return 0\n    ```\n\n7.  接下来，我们将感知器的全部功能封装到一个\
    \ Python 类中，以实现更好的封装和复用。以下代码是我们之前所有感知器和设置代码的组合：\n\n    ```python\n    class Perceptron(object):\n\
    \        def __init__(self, no_of_inputs, activation):\n            self.learning_rate\
    \ = learning_rate\n            self.weights = np.zeros(no_of_inputs + 1)\n   \
    \         self.activation = activation\n        def predict(self, inputs):\n \
    \           summation = np.dot(inputs, self.weights[1:]) + self.weights[0]\n \
    \           return self.activation(summation)\n        def train(self, training_inputs,\
    \ training_labels, epochs=100, learning_rate=0.01):\n            history = []\n\
    \            for _ in range(epochs):\n                for inputs, label in zip(training_inputs,\
    \ training_labels):\n                    prediction = self.predict(inputs)\n \
    \                   loss = (label - prediction)\n                    loss2 = loss*loss\n\
    \                    history.append(loss2)\n                    print(f\"loss\
    \ = {loss2}\")\n                    self.weights[1:] += self.learning_rate * loss\
    \ * inputs\n                    self.weights[0] += self.learning_rate * loss\n\
    \            return history\n    ```\n\n8.  我们可以用以下代码实例化并训练这个类：\n\n    ![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig4_HTML.jpg](img/502181_1_En_1_Fig4_HTML.jpg)\n\
    \n    图 1-4\n\n    感知器在线性回归问题上的输出损失\n\n9.  图 1-4 显示了训练函数调用产生的历史输出，这是运行最后一组单元格的结果。我们可以清楚地看到损失几乎降到了\
    \ 0。这意味着我们的感知器能够根据给定的输入预测并映射结果。\n\n    ```python\n    perceptron = Perceptron(no_of_inputs,\
    \ relu_activation)\n    history = perceptron.train(X,Y, epochs=epochs)\n    ```\n\
    \n你可以在图 1-4 中看到网络损失存在明显的波动。这种波动部分是由学习率过高以及我们向网络输入数据的方式引起的。我们将在本书后续内容中探讨如何解决此类问题。\n\
    \n这个练习的结果在将输入映射到预期输出方面要成功得多，即使面对的是一个通常更难的数学问题。我们刚刚见证的这类结果，正是感知器在第一次 AI 寒冬中得以存活的原因。直到这次寒冬之后，我们才发现将感知器堆叠成层可以做得更多，并最终解决\
    \ XOR 问题。我们将在下一节中深入探讨多层感知器。\n"
- fmt: '# The Multilayer Perceptron


    Fundamentally, the notion of stacking perceptrons into layers is not a difficult
    concept. Figure [1-5](#502181_1_En_1_Chapter.xhtml#Fig5) demonstrates a three-layer
    multilayer perceptron (MLP). The top layer is called the *input layer*, the last
    layer the *output layer*, and the in-between layers the *middle* or *hidden layers*.


    ![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig5_HTML.jpg](images/502181_1_En_1_Chapter/502181_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Example of MLP network


    Figure [1-5](#502181_1_En_1_Chapter.xhtml#Fig5) shows how we may feed images of
    cats and dogs to a network and have it classify the output. We will talk about
    how we can classify outputs later. Each node or circle in the figure represents
    a single perceptron, and each perceptron is fully connected to the successive
    layers in the network. The term we use for these types of networks is a *fully
    connected sequential network*.


    The prediction of forward pass through the network runs the same as our perceptron,
    with the only difference that the output from the first layer becomes the input
    to the next, and so on. Calculating the output by passing an input into the network
    is called the *forward pass* or *prediction*. Computationally, through the use
    of the dot product function, the forward pass in DL is very efficient and one
    of the great strengths of neural networks.


    If you recall from the previous section, the `np.dot` function we used did the
    summation of weights with the inputs. This function is optimized on a GPU to perform
    very quickly. So even if we had 1 million inputs (and yes, that is possible),
    the calculation could be done in one operation on a GPU.


    The reason the `np.dot` function is optimized on a GPU is due to the advancement
    of computer 3D graphics. The dot product operation is quite common in graphics
    processing. In a sense, the development of games and graphics engines has been
    a big help for AI and deep learning.


    While the forward pass or prediction step can run quickly, it is not exceedingly
    difficult to compute. Unfortunately, the opposite of training the updates or what
    we call the *backward pass* is not so easy. The problem we face when we stack
    perceptrons is that the simple update equation we applied before won''t work across
    network layers.


    The problem we encounter when updating the multiple layer networks is determining
    how much of the loss needs to be applied to not only which layer, but which perceptron
    in that layer. We can no longer just subtract the loss from the prediction and
    apply that value to a single weight. Instead, we need to calculate the impact
    of each weight applied to the resulting output or prediction.


    To calculate how we can apply the loss to each weight, in each perceptron, and
    in each layer, we use calculus. Calculus allows us to determine the amount of
    loss to apply using differentiation. We use calculus to differentiate the forward
    or predict function along with the activation function. By differentiating these
    functions with respect to the weights, we can determine the amount of impact each
    weight contributes to the result.


    ## Backpropagation


    We call the update process or backward pass through network backpropagation since
    we are backpropagating the errors or loss to each weight. Figure [1-6](#502181_1_En_1_Chapter.xhtml#Fig6)
    shows the backpropagation of error or loss back through the network. The figure
    also shows the equations to calculate this amount of error.


    ![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig6_HTML.jpg](images/502181_1_En_1_Chapter/502181_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Backpropagation explained


    The first equation in Figure [1-6](#502181_1_En_1_Chapter.xhtml#Fig6) shows the
    calculation of the forward pass through the network. Moving to the next equation,
    we write this as a parameterized function. Following that, we apply the chain
    rule from calculus to differentiate the forward equation with respect to the input.
    By understanding how much each input affects the change, we can differentiate
    again this time with respect to the weights. The last equation shows how we calculate
    the change for each weight in the network.


    Now, we don''t have to worry about managing the mathematics or sorting out the
    equations to make this work. All deep learning libraries provide an automatic
    differentiation mechanism that does this for us. The critical bit to understand
    is how the last equation is used to push the loss back to each weight in the network.
    Output from this equation is a gradient describing the direction and amount of
    change. To perform the update, we reverse this gradient and scale it with the
    learning rate hyperparameter.


    Since the output of our final calculation is a gradient, we use an optimization
    method to minimize or reduce this gradient. We call this method *gradient descent*
    since it intends to decrease the amount of gradient as the function minimizes
    the loss/error. You can picture how gradient descent works in Figure [1-7](#502181_1_En_1_Chapter.xhtml#Fig7).


    ![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig7_HTML.jpg](images/502181_1_En_1_Chapter/502181_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Gradient descent explained


    In Figure [1-7](#502181_1_En_1_Chapter.xhtml#Fig7), gradient descent is being
    used to modify the gradient of the weight to minimize the global loss of the forward
    pass function. The figure represents a simple 2D representation, but in most cases
    the dimensional space of the problem could well be in the hundreds or thousands.
    This means the landscape or surface of global minimum optimization for such a
    problem could have many hills and valleys of local minimums as well.


    ## Stochastic Gradient Descent


    Backpropagation and gradient descent were the discoveries that reawakened deep
    learning in the 1980s. Back then, though, they still had to work out the calculations
    manually. This was an impressive feat when you consider how complex or deep a
    network can get.


    Over time, though, single gradient descent, doing the update after each input
    is shown to the network, was inefficient and as it turns out not optimal. What
    we found is that by batching data in groups, the process could be more efficient,
    and the results were not much different. We called this form of gradient descent
    *batch gradient descent* (BGD).


    As deep learning matured, it was later found that consistent batches could skew
    results, especially if like datasets were clumped together. For instance, if we
    were classifying cats and dogs and our dataset had 1,000 cat images and 1,000
    dog images, then feeding those images as batches of cats or dogs was contrary
    to doing small updates. A batch of 100 cats fed into a network would not provide
    any benefit to understanding what not to classify.


    Instead, we found that randomizing the input data into batches of, say, cat and
    dog images worked far better. By randomizing the data, a network may be fed any
    number of cat or dog images in a batch, thus allowing the network to better understand
    the difference between a cat and dog.


    The method of randomly batching data to the network is called *stochastic gradient
    descent* (SGD). SGD is now the basis for a family of optimization algorithms we
    use in deep learning. It will be the base method for many of the networks we use
    in this book. In the next section, we will look at how to perform backpropagation
    with stochastic gradient descent on a network with PyTorch.'
