  raw: "## Conclusion\n\nTo construct working and practical generative models, we\
    \ need to understand how deep learning networks learn. We needed to learn how\
    \ networks approximate to functions and what effect that has on what the network\
    \ learns. From that we explored in some detail how the various hyperparameters\
    \ can affect how and what a network learns, further learning how to tune those\
    \ hyperparameters on toy examples.\n\nNext, we moved from tuning to understanding\
    \ how hyperparameters can allow us to control the latent or hidden space in our\
    \ models. Learning to control the size of latent space allowed us to better train\
    \ the models. Then we advanced to building a variational autoencoder, a model\
    \ that learns by understanding not just the latent space but distributional parameters\
    \ that map to that latent space.\n\nFinally, from our knowledge of mapping parameters\
    \ to the latent space, we could then construct output strictly based on those\
    \ parameters. This allowed us to see in detail what our model learns and how sensitive\
    \ it is to the input data. While we didn't look to resolve issues with our model\
    \ in this chapter, we will certainly look to other systems in the future to improve\
    \ on it.\n\nIn the next chapter, we will revisit GAN and move on to explore its\
    \ many variations. GANs can be adapted to easily to control the latent space in\
    \ model generation using several techniques, many of them related to distributional\
    \ learning. This will allow us to generate content in a more controlled manner.\n\
    \n# 4. GANs, GANs, and More GANs\n\nGenerative modeling has been around for a\
    \ few decades, but much of the field didn’t start to recognize itself without\
    \ the discovery of the generative adversarial network (GAN). There is some debate\
    \ on when GANs were discovered and by whom. One thing is for certain: Ian Goodfellow\
    \ and his colleagues from the University of Montreal in 2014 deserve a good deal\
    \ of credit for reinventing the technique of adversarial learning.\n\nGANs are,\
    \ after all, nothing more than autoencoders that have been split in the middle\
    \ and flipped around. Goodfellow took this concept a step further by introducing\
    \ the concepts of the generator (art forger) and the discriminator (art critic)\
    \ in a true adversarial sense as a way of generating new and novel content. This\
    \ technique has become so successful in generating new content that there are\
    \ now hundreds of implementations and variations of this simple model.\n\nIn this\
    \ chapter, we revisit the GAN and start to look at the many implementations that\
    \ have been adopted as improvements or variations. We start by looking back at\
    \ convolution in a GAN by improving on the deep convolutional GAN. We will see\
    \ how to improve on measuring loss or distance by introducing the Wasserstein\
    \ GAN. Next, we explore what effect discrete data may have on a GAN and how to\
    \ solve it with the boundary-seeking GAN. We then advance to improving our GAN\
    \ performance by refining loss measurement with the relativistic GAN. From there,\
    \ we jump back to understanding and controlling the latent space with the conditional\
    \ GAN.\n\nGANs have landed at the forefront of generative modeling. They are a\
    \ technique we will explore tirelessly throughout this book. In this chapter,\
    \ we start with exploring several base GANs that will provide us with techniques\
    \ to use later. Here is a quick breakdown of the main topics we will cover in\
    \ this chapter:\n\n*   Feature understanding with the DCGAN\n\n*   Unrolling the\
    \ math of GANs\n\n*   Resolving distance with WGAN\n\n*   Discretizing boundary-seeking\
    \ GANs\n\n*   Relativity and the relativistic GAN\n\n*   Conditioning with CGAN\n\
    \nThis is a code-heavy chapter filled with many examples. All these examples use\
    \ larger training sets, where appropriate, to demonstrate concepts better. Larger\
    \ datasets could take hours or days to train. While most of the exercises in this\
    \ chapter may be trained in under an hour, some may take longer. In the next section,\
    \ we start exploring GANs by understanding the importance of feature learning.\n\
    \n## Feature Understanding and the DCGAN\n\nWhile we already explored the deep\
    \ convolutional GAN in a previous chapter, what we failed to cover are the details\
    \ of what really makes this model better. As we already learned, feature extraction\
    \ of visible features in 2D images can be facilitated with convolutional layers.\
    \ What we didn’t cover in enough detail is how this matters.\n\nIn data science\
    \ we often characterize feature extraction as the process by which we identify\
    \ known or unknown features in a dataset. While data science uses statistical\
    \ modeling to extract features, deep learning has numerous ways to do this automatically.\
    \ Convolution is one of those methods that allows our model to learn what features\
    \ are important to characterize an object.\n\nConvolution is not the only way\
    \ to extract features; it is one that works well enough for most image classification\
    \ and recognition tasks. Regular convolution itself is limited to extracting localized\
    \ features, that is, features like an eye or nose. Global feature extraction methods,\
    \ which we will look at in later chapters, could recognize a nose but also relate\
    \ that the feature needs to be between the eyes.\n\nSince we already covered the\
    \ DCGAN in Chapter [2](#502181_1_En_2_Chapter.xhtml), in this exercise we are\
    \ going to focus specifically on what the model is learning or extracting using\
    \ convolution. By being able to understand how and what a model learns, we can\
    \ then derive what it generates. In Exercise 4-1, we revisit the DCGAN with a\
    \ focus on understanding the features it extracts.\n\nEXERCISE 4-1\\. DCGAN FEATURE\
    \ LEARNING\n\n1.  Open the `GEN_4_DCGAN.ipynb` notebook from the GitHub project\
    \ site. If you are unsure how, then consult Appendix B.\n\n2.  Run the whole notebook\
    \ by selecting Runtime ➤ Run all. Then look past the `imports` cell and on to\
    \ the first cell with a new class called `Hyperparameters` :\n\n```\n    class\
    \ Hyperparameters(object):\n    def __init__(self, **kwargs):\n    self.__dict__.update(kwargs)\n\
    \    hp = Hyperparameters(n_epochs=200,\n    batch_size=64,\n    lr=.0002,\n \
    \   b1=.5,\n    b2=0.999,\n    n_cpu=8,\n    latent_dim=100,\n    img_size=32,\n\
    \    channels=1,\n    sample_interval=400)\n    print(hp.lr)\n    ```\n\n3.  `Hyperparameters`\
    \ is a dictionary helper that allows us to define all the hyperparameters in one\
    \ place initialized either by a dictionary or by a list of key-value pairs like\
    \ that shown. Then we can refer to a hyperparameter by using the name `hp` plus\
    \ the parameter, as shown in the `print(hp.lr)` line.\n\n4.  The next block of\
    \ code contains utility code we have reviewed before. After that is a new definition\
    \ of `Generator` .\n\n```\n    class Generator(nn.Module):\n    def __init__(self):\n\
    \    super(Generator, self).__init__()\n    self.init_size = hp.img_size // 4\n\
    \    self.l1 = nn.Sequential(nn.Linear(hp.latent_dim, 128 * self.init_size **\
    \ 2))\n    self.conv_blocks = nn.Sequential(\n    nn.BatchNorm2d(128),\n    nn.Upsample(scale_factor=2),\n\
    \    nn.Conv2d(128, 128, 3, stride=1, padding=1),\n    nn.BatchNorm2d(128, 0.8),\n\
    \    nn.LeakyReLU(0.2, inplace=True),\n    nn.Upsample(scale_factor=2),\n    nn.Conv2d(128,\
    \ 64, 3, stride=1, padding=1),\n    nn.BatchNorm2d(64, 0.8),\n    nn.LeakyReLU(0.2,\
    \ inplace=True),\n    nn.Conv2d(64, hp.channels, 3, stride=1, padding=1),\n  \
    \  nn.Tanh(),\n    )\n    def forward(self, z):\n    out = self.l1(z)\n    out\
    \ = out.view(out.shape[0], 128, self.init_size, self.init_size)\n    img = self.conv_blocks(out)\n\
    \    return img\n    ```\n\n5.  This class resembles the same class we used for\
    \ our previous generator. There are a few subtle differences that make this class\
    \ more abstract and reusable. Note that the vanilla generator in a GAN learns\
    \ from random noise, while the discriminator is learning from the established,\
    \ or *ground*, truth.\n\n6.  Next, we have the `Discriminator` class that shows\
    \ a new version of a discriminator for a DCGAN."
  trans: "\n# 结论\n\n要构建可运行且实用的生成模型，我们需要理解深度学习网络是如何学习的。我们需要了解网络如何逼近函数，以及这对网络学习的内容有何影响。在此基础上，我们详细探讨了各种超参数如何影响网络的学习方式和学习内容，并进一步学习了如何在玩具示例上调整这些超参数。\n\
    \n接下来，我们从调整超参数转向理解它们如何让我们控制模型中的潜在空间或隐藏空间。学会控制潜在空间的大小使我们能够更好地训练模型。然后，我们进阶到构建变分自编码器，这种模型不仅通过理解潜在空间来学习，还通过理解映射到该潜在空间的分布参数来学习。\n\
    \n最后，基于将参数映射到潜在空间的知识，我们可以严格地根据这些参数构建输出。这使我们能够详细了解模型学到了什么，以及它对输入数据的敏感程度。虽然本章我们并未着手解决模型的问题，但未来我们一定会研究其他系统来改进它。\n\
    \n在下一章中，我们将重新审视生成对抗网络，并继续探索其众多变体。生成对抗网络可以通过多种技术轻松调整，以控制模型生成中的潜在空间，其中许多技术与分布学习相关。这将使我们能够以更可控的方式生成内容。\n\
    \n# 4. 生成对抗网络，生成对抗网络，以及更多的生成对抗网络\n\n生成建模已经存在了几十年，但该领域的许多研究是在生成对抗网络被发现之后才真正开始被认可的。关于生成对抗网络何时被发现以及由谁发现，存在一些争议。但有一点是确定的：2014\
    \ 年，伊恩·古德费洛及其蒙特利尔大学的同事们，在重新发明对抗学习技术方面功不可没。\n\n毕竟，生成对抗网络不过是从中间分开并翻转过来的自编码器。古德费洛将这一概念更进一步，在真正的对抗意义上引入了生成器（艺术伪造者）和判别器（艺术评论家）的概念，作为生成新颖内容的一种方式。这项技术在生成新内容方面非常成功，以至于现在有数百种基于这个简单模型的实现和变体。\n\
    \n在本章中，我们将重新审视生成对抗网络，并开始研究许多已被采纳为改进或变体的实现。我们首先通过改进深度卷积生成对抗网络来回顾生成对抗网络中的卷积。我们将了解如何通过引入\
    \ Wasserstein 生成对抗网络来改进损失或距离的度量。接下来，我们探讨离散数据可能对生成对抗网络产生的影响，以及如何使用边界搜索生成对抗网络来解决这个问题。然后，我们通过使用相对论生成对抗网络来优化损失度量，从而提升生成对抗网络的性能。接着，我们跳回使用条件生成对抗网络来理解和控制潜在空间。\n\
    \n生成对抗网络已经站在了生成建模的前沿。这是一种我们将在本书中不懈探索的技术。在本章中，我们首先探索几种基础的生成对抗网络，它们将为我们提供后续使用的技术。以下是本章将涵盖的主要主题的快速分解：\n\
    \n-   使用深度卷积生成对抗网络理解特征\n-   展开生成对抗网络的数学原理\n-   使用 Wasserstein 生成对抗网络解决距离问题\n-\
    \   离散化边界搜索生成对抗网络\n-   相对论与相对论生成对抗网络\n-   使用条件生成对抗网络进行条件控制\n\n本章代码量很大，包含许多示例。所有这些示例在适当的情况下都使用了更大的训练集，以更好地演示概念。较大的数据集可能需要数小时或数天来训练。虽然本章中的大多数练习可能在一小时内完成训练，但有些可能需要更长时间。在下一节中，我们将通过理解特征学习的重要性来开始探索生成对抗网络。\n\
    \n## 特征理解与深度卷积生成对抗网络\n\n虽然我们在前一章已经探讨过深度卷积生成对抗网络，但我们未能详细说明究竟是什么让这个模型更好。正如我们已经学到的，卷积层可以促进二维图像中可见特征的提取。但我们没有足够详细地说明这为什么重要。\n\
    \n在数据科学中，我们通常将特征提取描述为识别数据集中已知或未知特征的过程。虽然数据科学使用统计建模来提取特征，但深度学习有多种方法可以自动完成此操作。卷积是允许我们的模型学习哪些特征对于表征对象是重要的方法之一。\n\
    \n卷积并不是提取特征的唯一方法；它是对于大多数图像分类和识别任务来说效果足够好的方法之一。常规卷积本身仅限于提取局部特征，例如眼睛或鼻子。我们将在后续章节中介绍的全局特征提取方法，可以识别鼻子，但也能关联到该特征需要位于双眼之间。\n\
    \n由于我们已经在第 2 章中介绍过深度卷积生成对抗网络，因此在本练习中，我们将专门关注模型使用卷积学习或提取了什么。通过能够理解模型如何学习以及学习了什么，我们就能推导出它生成了什么。在练习\
    \ 4-1 中，我们重新审视深度卷积生成对抗网络，重点在于理解它提取的特征。\n\n练习 4-1. 深度卷积生成对抗网络特征学习\n\n1.  从 GitHub\
    \ 项目站点打开 `GEN_4_DCGAN.ipynb` 笔记本。如果不确定如何操作，请查阅附录 B。\n\n2.  通过选择 **运行时** ➤ **全部运行**\
    \ 来运行整个笔记本。然后，查看 `imports` 单元格之后，找到第一个包含名为 `Hyperparameters` 的新类的单元格：\n\n```\n\
    class Hyperparameters(object):\n    def __init__(self, **kwargs):\n        self.__dict__.update(kwargs)\n\
    \nhp = Hyperparameters(n_epochs=200,\n                     batch_size=64,\n  \
