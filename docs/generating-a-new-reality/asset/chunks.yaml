    ## Using the Best with Transfer Learning


    Likely by now you started to notice a pattern in our models and the way we work
    with them. This is, of course, intentional and allows for code to easily be swapped
    from one exercise to another. In deep learning, we can share code, but we can
    also share models, the implementation of the code, and/or the trained weights.


    When we build a model in PyTorch or another framework, that model is compiled
    into a mathematical function graph. This graph can then be saved to a file on
    disk for later reuse without the original code. Furthermore, we can also save
    the trained parameters/weights of a model for later reuse.


    The flexibility of saving the models and weights not only will help us in the
    future but also allows for various reference networks to be shared. A reference
    network or model is often one that through literature publication or competition
    was established as the cutting edge for its time on a particular task.


    One such task many reference networks have been developed for was ImageNet. ImageNet
    is a massive dataset of 2 million plus images defined by 1,000 classes. Networks
    are trained and tested on ImageNet in terms of classification accuracy, where
    the most accurate models at the time typically get introduced as a reference model.


    It may at first seem odd that we could use models trained on diverse image sets
    like ImageNet and still be able to reuse such models, until you consider that
    a deep learning model is constructed in layers, and those layers may be removed
    or added to and then recompiled. Removing and adding layers to a model allow for
    it to be extended to new shared domains.


    Figure [6-6](#502181_1_En_6_Chapter.xhtml#Fig6) shows how we would remove the
    bottom layers of a model, which are the classification layers, and replace them
    with new ones, where we also freeze several existing layers, namely, the top layers
    of a model. Freezing these layers means that we are fixing the weights and not
    allowing the model to train those any further. The bottom and new layers are set
    to trainable and allow the model to learn new classification tasks.


    ![../images/502181_1_En_6_Chapter/502181_1_En_6_Fig6_HTML.jpg](images/502181_1_En_6_Chapter/502181_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Transfer learning


    We can thus take a reference model like the VGG19 shown in Figure [6-2](#502181_1_En_6_Chapter.xhtml#Fig2)
    and repurpose it from outputting 1,000 classes to one a model that outputs 4\.
    The benefit here is that we reuse the model’s trained feature extraction abilities
    in a new model. Since we are training only a couple new layers in the new model,
