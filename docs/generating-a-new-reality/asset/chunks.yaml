    \ sure your preferred subject is clearly visible and in frame for several seconds.\n\
    \nAfter you have the subject video and two sets of celebrity faces downloaded\
    \ as zip files into a folder, unpack the files into new folders. Be sure that\
    \ only a single set of celebrity images is in each folder and the video is also\
    \ in separate folder. We will look at other organizational tips when we move on\
    \ to the FS workflow in the next section."
  trans: '

    ### 为深度伪造下载 YouTube 视频


    你可能决定只对单张图片进行换脸，但在大多数情况下，你很可能希望用视频来创建深度伪造。你可以访问许多免费和付费视频资源，但最简单也是最好的资源当然是 YouTube。通过从
    YouTube 下载视频，你通常还可以选择内容的格式。


    当你决定将哪种类型的视频作为深度伪造的主题时，通常需要考虑一些细节，如下列表所述：


    - **简短**：选择时长通常少于 30 秒的视频。如果你确实想对更长的视频进行深度伪造，那么最好使用 YouTube 以外的来源。

    - **易于识别的面部**：确保选择面部突出且可识别的视频。如果个人的面部在多个帧中都是焦点，效果会更好。

    - **更少的面孔**：至少在你熟练掌握 FS/深度伪造工作流程之前，避免使用人群拥挤的场景。视频帧中面孔越多，后续的工作量就越大。Faceswap 有一些有用的工具可以帮助管理这一点，但通常使用更少的面孔效果更好。

    - **知名度**：你通常会根据知名度来选择视频的主题。原因在于你需要最初的大约 1000 张面孔用于训练。后续训练 Faceswap 模型将取决于你在前一步骤中提取的面孔质量。因此，选择足够知名的名人有助于获得一组多样化的优质训练图像。


    随着你对 FS 越来越有经验，你可能会想要打破部分或全部这些规则。你可能只想使用自己的家庭视频与名人进行换脸，以供个人娱乐。此时，这些细节完全由你决定，这里介绍的方法仅作为指南使用。


    在我们流程的下一步中，我们将使用另一个第三方工具 YouTube-Downloader 来自动化从 YouTube 下载和打包视频的过程。练习 9-2 提供了几个示例视频选项，但你以后可以轻松替换为你自己的选择。再次打开浏览器，进入
    Colab 下载一组主题视频。


    ### 练习 9-2. 下载 YouTube 主题视频


    1.  从 GitHub 项目站点打开 `GEN_9_Video_DL.ipynb` 笔记本。如果不确定如何操作，请查阅附录 B。


    2.  笔记本中的第一个单元格使用以下代码安装 `youtube-dl` 包及其依赖项：


    ```

    !pip install --upgrade youtube-dl

    ```


    3.  安装包后，我们设置一个表单来选择主题视频，并使用以下代码下载它们：


    ```

    #@title SELECT VIDEO

    video = "Anchorman" #@param ["Elf", "Zoolander", "Schitts Creek","Pretty Woman","Avengers","Anchorman"]

    from __future__ import unicode_literals

    import youtube_dl

    videos = { "Elf" : { "url" : ''https://www.youtube.com/watch?v=3Eto6DU_2oI''},

    "Zoolander" : { "url" : "https://www.youtube.com/watch?v=KeX9BXnD6D4"},

    "Schitts Creek" : { "url" : "https://www.youtube.com/watch?v=hg1Uk60rBsc"},

    "Pretty Woman" : { "url" : "https://www.youtube.com/watch?v=1_TZEsUhXRs"},

    "Avengers" : { "url" : "https://www.youtube.com/watch?v=JyyGJk51n-0"},

    "Anchorman" : { "url" : "https://www.youtube.com/watch?v=88zGzznpnis"},

    }

    video_url = videos[video][''url'']

    download_options = {}

    download = youtube_dl.YoutubeDL(download_options)

    info_dict = download.extract_info(video_url, download=False)

    formats = info_dict.get(''formats'',None)

    for f in formats:

    if f.get(''format_note'',None) == ''480p'':

    url = f.get(''url'',None)

    print(url)

    ```


    4.  此单元格运行完毕后，确认 URL 已打印到单元格下方的输出窗口中。如果没有打印出 URL，则说明该视频格式不支持我们首选的 480p。另一种方法是选择其他视频或修改格式。


    5.  接下来，我们将导入 OpenCV2（一个图像和视频库），以便使用我们首选的编解码器将下载的内容转换回视频。此步骤设置视频捕获并进行初始帧计数。


    ```

    import cv2

    input_movie = cv2.VideoCapture(url)

    length = int(input_movie.get(cv2.CAP_PROP_FRAME_COUNT))

    print(length)

    ```


    6.  从这里开始，我们希望使用我们选择的编解码器将从 YouTube 捕获的视频帧渲染回视频。编解码器是一种视频加密形式，有众多选项可供选择。你可以使用默认选择的编解码器，或者注释掉该行并选择其他合适的编解码器。如果下载视频后无法在桌面上播放，你可能需要更换编解码器并重新渲染视频：


    ```

    from google.colab.patches import cv2_imshow

    from IPython.display import clear_output

    import time

    frame_width = int(input_movie.get(cv2.CAP_PROP_FRAME_WIDTH))

    frame_height = int(input_movie.get(cv2.CAP_PROP_FRAME_HEIGHT))

    print(frame_width, frame_height)

    frame_number = 0

    frame_limit = 1000

    # Define the codec and create VideoWriter object

    #fourcc = cv2.VideoWriter_fourcc(*''FFV1'')

    fourcc = cv2.VideoWriter_fourcc(*''XVID'')

    #fourcc = cv2.VideoWriter_fourcc(*''DIVX'')

    #fourcc = cv2.VideoWriter_fourcc(*''DIV3'')

    #fourcc = cv2.VideoWriter_fourcc(''F'',''M'',''P'',''4'')

    #fourcc = cv2.VideoWriter_fourcc(''D'',''I'',''V'',''X'')

    #fourcc = cv2.VideoWriter_fourcc(''D'',''I'',''V'',''3'')

    #fourcc = cv2.VideoWriter_fourcc(''F'',''F'',''V'',''1'')

    filename = f"{video}.avi"

    out = cv2.VideoWriter(filename,fourcc, 20.0, (frame_width,frame_height))

    while True:

    ret, frame = input_movie.read()

    frame_number += 1

    if not ret or frame_number > frame_limit:

    break

    out.write(frame)

    if frame_number < 10:

    cv2_imshow(frame)

    input_movie.release()

    out.release()

    cv2.destroyAllWindows()

    ```


    7.  `cv2.VideoWriter` 构造写入器以执行捕获帧的渲染。我们通过变量 `frame_limit` 限制渲染的帧数，当前设置为 1000。当然，你可以根据需要更改此值。当此写入器处理时，它还会输出视频的前
    10 帧以供检查。


    8.  接下来，我们使用与上一个练习相同的代码块下载渲染后的视频：


    ```

    from google.colab import files

    files.download(filename)

    ```


    9.  当笔记本中的所有单元格都运行完毕后，你应该会在机器的首选下载文件夹中下载到一个视频。请务必观看视频以确认其格式正确且涵盖了正确的主题。请注意，我们之后有很多机会裁剪掉视频中可能不需要的部分。所以，不必过于担心多余的内容，但要确保你偏好的主题清晰可见且在画面中持续数秒。


    在你将主题视频和两组名人面孔作为 zip 文件下载到一个文件夹后，将这些文件解压到新文件夹中。确保每个文件夹中只有一组名人图像，并且视频也放在单独的文件夹中。当我们进入下一节的
    FS 工作流程时，我们将讨论其他组织技巧。

    '
- fmt: '# Understanding the Deepfakes Workflow


    Constructing deepfake videos or other content is relatively simple with a good
    tool like `Faceswap` or `DFL`. There is often a well-defined workflow that needs
    to be followed to prepare, mark, and align the content used in `FS`. For `Faceswap`,
    the basic workflow is shown here:


    1. **Extracting**: The downloaded celebrity images and video need to be processed
    for facial extraction and alignment. This requires running the `Faceswap` software
    over either a folder of images or videos to first extract each face from an image.
    When a face is extracted, it is oriented correctly and then dropped into a new
    folder, with the description of the face added to an alignments file.


    2. **Sorting**: After extracting faces, we move on to sorting those faces into
    a new folder. `Faceswap` has a tool to sort faces according to similarity and
    results in a neatly categorized folder of faces. By sorting the images, we can
    prepare for the next step trimming.


    3. **Trimming**: After faces are sorted, we can review the images and remove any
    that don’t match our primary subject. The software is not smart enough to extract
    the correct faces, and it will generally extract all faces in images or video
    frames. As such, we want to go though and remove those unneeded or unwanted faces.


    4. **Realigning**: The alignments file generated from the initial extraction is
    critical to training and conversion later. After we remove the unwanted faces
    in the trimming step, we need to clean up the alignments file of any unneeded
    references. This step can be quickly performed with a tool within the software,
    as we will see later.


    5. **Repeat**: You need to repeat the previous four steps for each of the celebrity
    subjects A and B as well as the desired output video.


    6. **Training**: After the faces for the two subject celebrities are extracted,
    sorted, and trimmed, we can move on to training the A/B faces. `Faceswap` makes
    this especially easy provided you select the correct options.


    7. **Converting**: When everything is cleaned and we have a well-trained model,
    we can move on to converting the video into a deepfake. This step is quick to
    perform provided the video length is small.


    8. **Rebuilding**: Finally, when the conversion process is complete, we need to
    convert the deepfake images back to a video. The software has a tool to perform
    that as well, as we have provided another `Colab` notebook tool to do so.


    Before we get into running the workflow with `Faceswap`, you will need to download
    the GUI client from the GitHub site at [`https://github.com/deepfakes/faceswap/releases`](https://github.com/deepfakes/faceswap/releases)
    where a Windows and Linux version is freely available. Be sure to download the
    version for your OS and then run it through the installer.


    Installing `Faceswap` on Windows/Linux should be straightforward, and it includes
    all the required dependencies as well as setting up any needed GPU `Cuda` support
    for your graphics card. If you have ever tried to install a Python framework like
    `PyTorch` or `TensorFlow` on Windows, you know how difficult and convoluted the
    process can be. Fortunately, the `Faceswap` installer handles this all for us.


    After you have the software installed, we can move on to our first step in the
    process in the next section. We will treat each step in the `FS` and deepfakes
    process as an exercise.


    ## Extracting Faces


    The process of extracting and identifying faces is well-defined and has been used
    for years. In this step, our goal is to extract each face in the various images
    and frames into separate files with just an aligned face. In the process, each
    face is entered into an alignments file describing the orientation and feature
    points.


    Figure [9-3](#502181_1_En_9_Chapter.xhtml#Fig3) shows the 68 feature points extracted
    from a face and entered into the alignments file. This file is critical to every
    step in the process as it defines the important features of each face. The actual
    alignments file is binary and not directly editable without tools like `Faceswap`.


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig3_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    68 facial feature points as described in an alignments file


    In Exercise 9-3, we start by extracting the faces from one of our earlier downloaded
    videos, but the same process will apply to a folder of images for the celebrity
    subjects. The output of this process will be the folder of extracted faces and
    the alignments file. Start up the `Faceswap` software and begin the exercise.


    EXERCISE 9-3. EXTRACTING FACES


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig4_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Extracting faces from the Pretty Woman video clip


    1. After the software starts, you want to make sure you are looking at the `Extract`
    tab, as shown in Figure [9-4](#502181_1_En_9_Chapter.xhtml#Fig4).


    2. Select the folder or file with your input content in the `Input Dir` field.
    For this example, we are using the downloaded video.


    3. Choose an empty output folder where the extracted faces will be placed and
    put it in the `Output Dir` field.


    4. Choose the `Detector` type to use for identifying the images. `S3Fd` is currently
    the best for extraction and the one we will use. If you want to learn more about
    the various options, check out the `Faceswap` forums at [`https://forum.faceswap.dev/`](https://forum.faceswap.dev/).


    5. The next option, `Aligner`, allows you to choose which plugin for orienting
    the images. Again, we will use the current best, `Fan`.


    6. `Masking` is next and is the process of removing unwanted content from around
    the face and making sure features of the face are visible. For the masker, we
    will use the `Unet-Dfl` model.


    7. As always, we then want to normalize the extracted images for better training
    later. `Hist` is the suggested normalization method and appears to work well for
    training all the models.


    8. The last option we want to set is `Face Processing`. This set of options is
    advanced aside from the minimum size of the faces we want to extract. Depending
    on your content, you may want to adjust this number to a nonzero value that represents
    the minimum face size you want to extract. You may want to play with this value
    for various content depending on your final production needs.


    9. Finally, we can start converting by clicking the `Convert` button at the bottom
    of the window. After clicking `Convert`, you will see log output in the bottom
    window, and then on your right you will see the various faces as they are being
    extracted. When the process is complete, you should have a folder filled with
    faces and a new alignments file in your original input folder.


    You will need to run the extraction process for the subject video and the two
    celebrity sources you want to swap. After you complete the extraction for all
    content, we can move on to the next section about sorting.'
