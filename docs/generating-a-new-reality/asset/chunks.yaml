  trans: "\n# 离散化边界搜索生成对抗网络\n\n我们可以将图像或其他数据中的视觉差异归类为不同类别。在 MNIST 时尚数据集中，有 10 个类别，它们既有相似之处，也存在关键差异。图\
    \ 4-4 展示了时尚数据集中各类别数据之间的差异。\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig4_HTML.jpg](img/502181_1_En_4_Fig4_HTML.jpg)\n\
    \n**图 4-4** 可视化时尚 MNIST 数据中的边界\n\n在图 4-4 中，你可以清晰地看到某些类别在视觉上相似，而其他类别则不然。如果我们将训练数据集缩减为仅包含前五个类别（T\
    \ 恤、裤子、套头衫、连衣裙和外套），那么我们的模型生成将会更简单。\n\n在本例中，我们将对图像的视觉感知等同于期望分布。只要数据易于泛化，这种方法通常效果良好。如果我们观察图\
    \ 4-4 中的凉鞋组，请注意每张图像的视觉细节。细节也可能意味着需要学习更复杂的期望分布。\n\n这给我们的 GAN 带来问题的另一个原因在于深度学习网络通过微积分进行学习的方式。通过使用微积分，我们的输入数据应始终是连续的。也就是说，它必须展示那些易于泛化且可以在图像间转换的通用数据。以时尚\
    \ MNIST 数据集为例，我们可以清楚地看到，将凉鞋这样的图像转换为套头衫在许多情况下并非连续的转换。\n\n我们可以通过重新审视损失计算方式来解决 GAN\
    \ 中的这些缺陷。R Devon Hjelm 及其同事在一篇题为“边界搜索生成对抗网络”的论文中提出了一个想法。他们提出的想法是使用重要性权重来衡量期望分布的差异。\n\
    \n重要性权重或加权是一种方法，通过该方法，图像或数据集中更重要的特征会被赋予更大的权重或输出。这会产生隔离对特定类别或多个类别重要的特征的效果，从而使模型能够学习更离散或更多样化的类别数据集。\n\
    \n使用重要性采样可以推导出策略梯度解，从而更好地近似损失。重要性采样是一种用于估计重建分布所需的参数化参数的技术。策略梯度方法源于强化学习，是一种使用参数化解来优化损失的简单方法。\n\
    \n强化学习是一种通过奖励来训练模型（也称为*智能体*）进行学习的方法。与无监督学习类似，智能体可以通过试错探索自主学习。这种学习形式未来可能用于生成式建模解决方案，但本书不对此进行探讨。策略梯度方法是强化学习方法的一个子集，它试图通过梯度裁剪来收敛一个策略。\n\
    \nBGAN 与原始 GAN 之间的差异很微妙，最好通过运行一些代码并查看结果来探索。在练习 4-3 中，我们将这样做，并尝试在 MNIST 时尚数据集上再次使用\
    \ BGAN。\n\n## 练习 4-3. 使用 BGAN 打破边界\n\n1. 从 GitHub 项目站点打开 `GEN_4_Boundary_Seeking_GAN.ipynb`\
    \ 笔记本。如果不确定如何操作，请参考附录 B。\n\n2. 通过选择“运行时” ➤ “全部运行”来运行整个笔记本。然后跳过 `imports` 单元格，找到第一个包含\
    \ `Hyperparameters` 类的单元格，检查超参数，所有这些参数我们之前都见过。\n\n3. 唯一的主要变化是损失的计算方式以及函数的定义方式，如下所示：\n\
    \n```\ndef boundary_seeking_loss(y_pred, y_true):\n    \"\"\"\n    边界搜索损失。\n \
    \   参考：https://wiseodd.github.io/techblog/2017/03/07/boundary-seeking-gan/\n \
    \   \"\"\"\n    return 0.5 * torch.mean((torch.log(y_pred)\n    - torch.log(1\
    \ - y_pred)) ** 2)\n    d_loss_fn = torch.nn.BCELoss()\n    generator = Generator()\n\
    \    discriminator = Discriminator()\n    if cuda:\n        generator.cuda()\n\
    \        discriminator.cuda()\n        d_loss_fn.cuda()\n```\n\n4. 我们可以看到 `boundary_seeking_loss`\
    \ 函数的定义以及用于计算该损失的公式。该公式如下所示：\n\n![$$ \\frac{1}{2}\\times mean $$](img/502181_1_En_4_Chapter_TeX_Equk.png)\n\
    \n5. 这个公式成为生成器的损失。注意 `y_true` 或 `x` 并未在公式中使用。同样，这与策略梯度方法有关，该方法关注的是预测值而非实际值。\n\n\
    6. 向下滚动到训练代码块，我们可以看到这个新的损失公式是如何在生成器训练中使用的。\n\n7. 高亮显示的行展示了训练循环中唯一的代码更改。通过这一行代码以及对损失计算的细微改动，我们可以显著改变结果。\n\
    \n```\n# 生成器损失\ngen_imgs = generator(z)\n# 衡量欺骗判别器的能力\ng_loss = boundary_seeking_loss(discriminator(gen_imgs),\
    \ valid)\ng_loss.backward()\noptimizer_G.step()\n#  判别器损失\noptimizer_D.zero_grad()\n\
    real_loss = d_loss_fn(discriminator(real_imgs), valid)\nfake_loss = d_loss_fn(discriminator(gen_imgs.detach()),\
    \ fake)\nd_loss = (real_loss + fake_loss) / 2\n```\n\n图 4-5 显示了仅训练几个周期后的结果，可以清晰地看到\
    \ BGAN 能够识别服装类别并开始生成它们。与最初难以找到共同点的 WGAN 不同，BGAN 几乎可以立即区分不同类别。\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig5_HTML.jpg](img/502181_1_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5** 在时尚 MNIST 上运行 BGAN 的早期结果\n\n然而，在完全训练 BGAN 之后，结果仍然不完全如我们所愿。这更多是由于类别多样性以及某些类别（如凉鞋）特有的细节量所致。事实上，如果你考虑最终的训练输出，你会注意到那些特殊类别（如凉鞋）的表示效果很差。\n\
    \n我们可以预期，通过更长时间的训练，最终会获得良好的结果，但正如你所见，这个模型仍然存在局限性。边界搜索 GAN 旨在处理具有离散边界的数据，也可能非常适合其他离散形式的数据，例如显示非连续数据的表格数据集。\n\
    \n到目前为止，我们已经看到，生成器和判别器的损失函数中涉及很多内容。在下一节中，我们将探讨另一种改进 GAN 中损失函数的方法。\n"
- fmt: "# Relativity and the Relativistic GAN\n\nWe have looked at two distinct methods\
    \ approaches to determining loss in a GAN. With a vanilla or standard GAN, loss\
    \ is measured in absolute terms. In a WGAN, we learned how loss was determined\
    \ in a more relativistic approach using an earth mover's algorithm. By using a\
    \ more relative approach to calculating loss, the WGAN was able to account for\
    \ some training deficiencies we had seen earlier in the standard GAN.\n\nThe relativistic\
    \ GAN is another approach that uses a relative method to calculate the distance\
    \ or loss in a GAN. In a standard GAN, the discriminator estimates the probability\
    \ that real data is real, and the generator's job to increase the probability\
    \ that fake data is also seen as real. However, the authors of the RGAN also want\
    \ to account for the generator, reducing the probability of real images being\
    \ real.\n\nAccounting for prior knowledge that half the data it sees is always\
    \ fake and the probability fake data becomes more real allows the GAN to infer\
    \ if an image is real or fake using previously observed observations. The result\
    \ is a relativistic discriminator that can account for how the expected distribution\
    \ is changing over time through learning.\n\nThis alters the loss function of\
    \ the generator to resemble the following:\n\n![$$ {L}^{(G)}= logit\\left(D\\\
    left(G(z)\\right)-\\left(D(x)\\right),1\\right) $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equl.png)\n\
    \nwhere:\n\n`logit` = the binary cross entropy logit loss function ![$$ \\mathit{\\\
    log}\\left(\\frac{x}{1-x}\\right) $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_IEq1.png).\n\
    \nThe `logit` function is often described as the odds function, and it returns\
    \ the odds of the given probability of expectation the result is real or fake.\n\
    \nThe relativistic discriminator is fed two combined versions of loss, the real\
    \ and fake given by the following:\n\n![$$ {L^{(D)}}_{real}= logit\\left(\\left(D(x)\\\
    right)-D\\left(G(z)\\right),1\\right) $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equm.png)\n\
    \n![$$ {L^{(D)}}_{fake}= logit\\left(D\\left(G(z)-\\left(D(x)\\right)\\right),0\\\
    right) $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equn.png)\n\n\
    ![$$ {L^{(D)}}_{total}=\\frac{\\left({L^{(D)}}_{real}+{L^{(D)}}_{fake}\\right)}{2}\
    \ $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equo.png)\n\nUsing\
    \ the `logit` function turns the output from an expected probability to the expected\
    \ odds. In other words, do not guess what the real or fake data is but rather\
    \ the probability or odds that data is real or fake. The idea is to think of how\
    \ far the answer is likely from the truth given past views of the data.\n\nThe\
    \ authors of the RGAN also proposed another method that compares calculated odds\
    \ against average/mean odds from the real or predicted data. They called this\
    \ variation the *relativistic average GAN* (RaGAN).\n\nNow that we understand\
    \ how the loss works a little better, we can look at a concrete implementation\
    \ in PyTorch. In Exercise 4-4, we look at employing an RGAN and RaGAN trained\
    \ on the fashion MNIST dataset.\n\n## EXERCISE 4-4. RELATING THE RELATIVISTIC\
    \ GAN\n\n1. Open the `GEN_4_Relativistic_GAN.ipynb` notebook from the GitHub project\
    \ site. If you are unsure how, then consult Appendix B.\n\n2. Run the whole notebook\
    \ by selecting Runtime ➤ Run all. Then look past the `imports` cell and on to\
    \ the first cell with the `Hyperparameters class` and examine the hyperparameters,\
    \ all of which we have seen before. There is a new hyperparameter called `rel_avg_gan`,\
    \ which controls if the GAN is run as an RGAN or RaGAN.\n\n3. This GAN uses convolution\
    \ for additional feature extraction. The generator is similar to previous looks\
    \ at the DCGAN, but the discriminator is constructed differently, as shown here:\n\
    \n```\nclass Discriminator(nn.Module):\n    def __init__(self):\n        super(Discriminator,\
    \ self).__init__()\n        def discriminator_block(in_filters, out_filters, bn=True):\n\
    \            block = [nn.Conv2d(in_filters, out_filters, 3, 2, 1), nn.LeakyReLU(0.2,\
    \ inplace=True), nn.Dropout2d(0.25)]\n            if bn:\n                block.append(nn.BatchNorm2d(out_filters,\
    \ 0.8))\n            return block\n        self.model = nn.Sequential(\n     \
    \       *discriminator_block(hp.channels, 16, bn=False),\n            *discriminator_block(16,\
    \ 32),\n            *discriminator_block(32, 64),\n            *discriminator_block(64,\
    \ 128),\n        )\n        # The height and width of downsampled image\n    \
    \    ds_size = hp.img_size // 2 ** 4\n        self.adv_layer = nn.Sequential(nn.Linear(128\
    \ * ds_size ** 2, 1))\n    def forward(self, img):\n        out = self.model(img)\n\
    \        out = out.view(out.shape[0], -1)\n        validity = self.adv_layer(out)\n\
    \        return validity\n```\n\n4. Notice how we define an inner function called\
    \ `discriminator_block`, which sets up the convolutional layers.\n\n5. Now jump\
    \ to the training loop and look at how the inner code calculates the loss with\
    \ our updated equations.\n\n```\n# Generator\noptimizer_G.zero_grad()\nz = Variable(Tensor(np.random.normal(0,\
    \ 1, (imgs.shape[0], hp.latent_dim))))\ngen_imgs = generator(z)\nreal_pred = discriminator(real_imgs).detach()\n\
    fake_pred = discriminator(gen_imgs)\nif hp.rel_avg_gan:\n    g_loss = loss_fn(fake_pred\
    \ - real_pred.mean(0, keepdim=True), valid)\nelse:\n    g_loss = loss_fn(fake_pred\
    \ - real_pred, valid)\ng_loss.backward()\noptimizer_G.step()\n\n# Discriminator\n\
    optimizer_D.zero_grad()\nreal_pred = discriminator(real_imgs)\nfake_pred = discriminator(gen_imgs.detach())\n\
    if hp.rel_avg_gan:\n    real_loss = loss_fn(real_pred - fake_pred.mean(0, keepdim=True),\
    \ valid)\n    fake_loss = loss_fn(fake_pred - real_pred.mean(0, keepdim=True),\
    \ fake)\nelse:\n    real_loss = loss_fn(real_pred - fake_pred, valid)\n    fake_loss\
    \ = loss_fn(fake_pred - real_pred, fake)\nd_loss = (real_loss + fake_loss) / 2\n\
    d_loss.backward()\noptimizer_D.step()\n```\n\n6. Let the example train to completion\
    \ and then go back and switch the `rel_avg_gan` hyperparameter to false or true.\
    \ Then compare the results of the RGAN and the RaGAN.\n\nFigure [4-6](#502181_1_En_4_Chapter.xhtml#Fig6)\
    \ shows the early results of training the RGAN on the fashion dataset. As you\
    \ can see, the results are reasonably impressive compared to our previous attempts.\
    \ Notice how the feature patching we observed with the DCGAN has also been cured.\
    \ You can also pick up fine details on clothing items like those problem sandals.\n\
    \n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig6_HTML.jpg](images/502181_1_En_4_Chapter/502181_1_En_4_Fig6_HTML.jpg)\n\
    \n**Figure 4-6** Early training results on the RGAN\n\nSo far, we looked at a\
    \ few approaches in GANs using various loss functions in the hopes of improving\
    \ the results. We looked at changing the perspective of the loss function from\
    \ absolute to relative in the WGAN and RGAN/RaGAN, and we looked at how to better\
    \ classify discrete or out-of-bounds data with a boundary-seeking GAN. In the\
    \ next section, we look at another variation of the GAN that improves on domain\
    \ recognition and attribution."
