  trans: "\n# 人脸交换工具介绍\n\n你可能会惊讶地发现，深度伪造和人脸交换技术最早可追溯到 20 世纪 90 年代，当时数字视频处理技术首次成为可能。自那时起，这项技术在学术界、电影制作领域蓬勃发展，而近年来，随着商业化和开源化进程，业余爱好者社区也得以参与其中。\n\
    \n从使用滤镜和其他更具艺术性手法的全功能数字视频软件，到应用深度学习生成建模的技术，存在多种多样的技术和应用可以执行某种形式的人脸交换。就我们的目的而言，我们将专注于那些在某个方面使用或应用深度学习的社区驱动项目。\n\
    \n以下列表列出了我们在执行人脸交换和生成深度伪造时可能考虑的主要候选工具。这份列表绝非详尽无遗，并且未来几年很可能会继续增长。不过，目前它代表了一些较为流行的社区驱动方法，我们可以使用以下工具：\n\
    \n- **Deep Fake Lab** (`https://github.com/iperov/DeepFaceLab`)：该工具被宣传为顶级的人脸交换和深度伪造工具，据称\
    \ 90%的相关内容都是使用它开发的。该工具提供图形界面和命令行版本，为管理人脸交换工作流程提供了丰富的选项。正因如此，它已成为最受欢迎的工具，网上有多个视频演示其用法。它也是争议较大的工具之一，因为它源自俄罗斯，且常常避免提及或推广正确的伦理规范。\n\
    \    - *基础技术*：使用各种 CNN 自编码器执行人脸交换/映射。基于 TensorFlow 开发。\n\n- **Faceswap** (`https://github.com/deepfakes/faceswap#overview`)：这个使用频率较低的工具提供图形界面和命令行版本，用于执行人脸交换工作流程。它提供了大量选项和各种插件来控制工作流程，但不如\
    \ DFL 那么复杂。该工具的突出之处在于其图形界面（包括安装过程）的易用性，以及在使用时直接强调伦理问题。基于这些原因，它将成为我们在本章中演示所选用的工具。\n\
    \    - *基础技术*：用于人脸到人脸转换的各种形式的 CNN 自编码器模型。基于 TensorFlow 开发。\n\n- **Faceswap-GAN**\
    \ (`https://github.com/shaoanlu/faceswap-GAN`)：这是一个较老、维护较少的工具，但它很好地演示了如何将 GAN\
    \ 与 CNN 自编码器结合使用来执行人脸交换，类似于前面提到的更流行的工具。\n\n- **CelebAMask-HQ** (`https://github.com/switchablenorms/CelebAMask-HQ`)：该工具基于\
    \ MaskGAN，与 CycleGAN 类似，是一种能够编辑和提取人脸特征的模型。正如我们将看到的，遮罩和编辑特征只是人脸交换工作流程的一部分。这使得该工具无法执行完整的人脸交换，但可用于增强其他工具的功能。\n\
    \n- **StarGAN 第二版** (`https://github.com/clovaai/stargan-v2`)：这是一个从 StarGAN 扩展而来的模型，可用于修改或交换人脸，以匹配各种学习到的属性。该工具可用于执行完整的人脸交换，或仅交换属性，就像我们在第\
    \ 6 章中使用 StarGAN 第一版时所做的那样。\n\n- **FSGAN** (`https://github.com/YuvalNirkin/fsgan`)：该工具被描述为一个与主体无关的人脸交换和再现工具。它是少数几个使用\
    \ PyTorch 开发的工具之一，并且也提供了 Google Colab 版本。它能执行不错的人脸交换，但需要对人脸交换过程有深入的了解。对于任何希望提升技能、使用\
    \ GAN 进行人脸交换的人来说，这是一个不错的高级工具。\n\n从上述列表中需要注意的一点是，用于执行人脸交换的两个主要应用程序（DFL 和 Faceswap）都使用了相对低技术含量的\
    \ CNN 自编码器方法。正如我们在前几章中看到的，自编码器可以产生有效的结果，并且训练速度相对较快。它们需要调整的超参数也更少，这使得它们总体上对业余用户来说更加稳健。\n\
    \n图 9-1 展示了 Faceswap 工具在训练和实际转换过程中使用的底层架构。在该工具中，我们可以看到模型编码器接收两个输入图像，分别标记为人脸 A\
    \ 和人脸 B。人脸 A 代表你想要替换掉的目标人脸，而人脸 B 是你想要替换上去的人脸。\n\n在这个架构中，你可以看到编码器分叉为两个解码器，每个解码器对应一组人脸。这种配置类似于我们之前使用配对和非配对转换探索图像到图像模型的方式。使用\
    \ Faceswap 时，我们采用非配对转换来训练模型学习将一张人脸映射到另一张人脸所需的转换。\n\n然后，如图 9-1 所示，当进入转换阶段时，只需将相应的输入人脸（A）输入，然后使用人脸\
    \ B 的解码器进行转换。结果就是转换后的人脸 B，然后可以用它来替换原始人脸。\n\n![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig1_HTML.jpg](img/502181_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1：Faceswap 编码器-双解码器架构\n\n图 9-2 展示了使用 Faceswap 将朱莉娅·罗伯茨的脸替换为斯嘉丽·约翰逊的脸的结果。这些结果是使用\
    \ Villian 模型获得的，该模型是一个常用于生成高质量深度伪造的第三方插件。图 9-2 展示了在电影《风月俏佳人》中交换这位明星面孔的前后对比。\n\n\
    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig2_HTML.jpg](img/502181_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2：在电影《风月俏佳人》中将朱莉娅·罗伯茨的脸交换为斯嘉丽·约翰逊的脸\n\n我们将在本章后面的各种练习中学习如何创建图 9-2 所示的深度伪造。不过，现在我们要重申，在创建此类内容时，始终将伦理道德放在首位的重要性。因此，Faceswap\
    \ 网站有一份出色的宣言，涵盖了此类工具的使用和伦理问题，现重申如下：\n\n- FaceSwap 并非用于制作不当内容。\n- FaceSwap 并非用于未经同意或意图隐藏其使用而更改人脸。\n\
    - FaceSwap 并非用于任何非法、不道德或可疑的目的。\n- FaceSwap 的存在是为了实验和探索人工智能技术，用于社会或政治评论，用于电影制作，以及用于任何数量的道德和合理用途。\n\
    \n在使用这项技术时，请始终牢记这些准则。存在多种方式可能因滥用而损害他人声誉，并可能导致严重的法律后果。除此之外，滥用深度伪造技术还可能损害你未来的就业机会或从事人工智能生成建模工作的希望。请注意你制作的内容以及你呈现它们的方式。\n\
    \n只要你尊重这项技术，对人脸进行交换可以成为一种令人着迷的追求，你可能会沉浸其中数天、数周甚至数月。在电影或图片中交换名人的面孔，看看“如果……会怎样”的可能性，会很有趣。网上有很多优秀的例子，有好有坏，展示了这项技术的幽默和值得尊敬的使用方式。\n\
    \n无论你是将这项技术用于个人用途，还是创建自己的在线 YouTube 频道，人脸交换工作流程在各种工具集中都是通用的。在下一节中，我们将开始探讨如何为执行人脸交换工作流程收集数据。\n"
- fmt: '# Gathering the Swapping Data


    Gathering required data for any AI/ML task, be it generative modeling or image
    classification, can be an undertaking in and of itself. Fortunately, there are
    numerous example datasets online that can be used for various tasks, as we have
    demonstrated throughout this book. However, at some point, there comes a need
    to gather your own data for the projects you want to work on.


    Therefore, in this section, we will look at a few tools developed on Colab that
    can help gather data we need for proper face swapping and deepfakes generation.
    These tools rely on third-party community packages that are always in a state
    of flux and change. While it is hoped that these tools continue to function well
    into the future, you may need to look for alternatives.


    Tools like YouTube-Downloader, which we will employ later in this section, are
    often plagued with controversy. These downloaders allow us to download videos
    directly from YouTube. However, YouTube is not so keen on allowing users to download
    videos without consent, so the tools may often alter its API to break this software.
    GitHub has even gone so far as to unsuccessfully try to ban such tools from being
    hosted.


    The first thing we need for good face swapping is of course a good collection
    of faces. However, unlike our previous experience in using the CelebA dataset,
    we want specific faces of two individuals. One individual set of faces will be
    representative of our target face A, and the second face will be the face we want
    to swap with, B.


    Our other requirement for gathering these faces is that we want them to be varied
    with different poses and lighting conditions. To keep things simple, we will also
    want to avoid faces with too much variation in eyewear, facial hair, and makeup.
    We typically don’t need to worry about hair since our focus in swapping is often
    just the face.


    For the next exercise, we are going to look at a tool that can quickly provide
    us with a collection of faces from specific celebrities. This tool is called Bing
    Image Downloader, and it is a Python package that allows you to do image searches
    and retrieve the results. Open your browser and let’s jump into Exercise 9-1.


    ## EXERCISE 9-1. DOWNLOADING CELEBRITY FACES


    1. Open the `GEN_9_Faces.ipynb` notebook from the GitHub project site. If you
    are unsure how, then consult Appendix B.


    2. The first cell in the notebook installs the package and requirements with the
    following code:


    ```

    %%bash

    git clone https://github.com/gurugaurav/bing_image_downloader

    cd bing_image_downloader

    pip install .

    ```


    3. The `%%bash` at the top of the cell allows all the following commands to be
    executed directly against the Bash shell of the server runtime.


    4. After that, we have a block that defines a form for easy selection of some
    celebrities and the number of faces to extract:


    ```

    #@title DOWNLOAD IMAGES { run: "auto" }

    search = "julia roberts" #@param ["will ferrel", "ben stiller", "owen wilson",
    "eugene levy glasses","julia roberts","scarlett johansson"]

    image_cnt = 1001 #@param {type:"slider", min:1, max:10000, step:100}

    ```


    5. The `search` variable defines the search string we will use to find the faces
    in Bing. `image_cnt` is a value for the number of faces to download controlled
    by a slider. You typically want 500 to 1,000 good faces to train your face swap
    model on later.


    6. Just below that, the next section of code does all the work of downloading
    the images to the given folder:


    ```

    from pathlib import Path

    from bing_image_downloader import downloader

    folder = Path("dataset")

    downloader.download(search, limit=image_cnt, output_dir=folder, adult_filter_off=False,
    force_replace=True)

    output_folder = folder / search.replace(" ", "\ ")

    filter = output_folder / "*.jpg"

    zip_file = search.replace(" ", "_") + ".zip"

    print(filter,zip_file)

    ```


    7. The previous code may take some time to download 1,000 images. Just be patient
    and wait until all the files are downloaded into the designated folder.


    8. After that, the files are zipped up using the Bash `zip` command. Notice the
    use of `$` before the predefined variables, allowing us to substitute Python variables
    into shell commands.


    ```

    !zip $zip_file $filter

    ```


    9. Then we can download the ZIP file using the code in the last cell. Running
    this cell will download the ZIP file to your machine.


    ```

    from google.colab import files

    files.download(zip_file)

    ```


    You should run the previous exercise for the celebrities suggested on the form,
    or feel free to add your own. The faces/people we choose here will be dependent
    on the video we decide to deepfake later. If you are unsure of what faces to download,
    jump to the next section to download the subject video, which may help you decide
    which celebrities to search for.'
