- fmt: "# ProGAN 与 StyleGAN 版本 2\n\n作者还提出了一种新的判别器层形式，称为**小批量标准差（MSD）层**，同样如图 [8-2](#502181_1_En_8_Chapter.xhtml#Fig2)\
    \ 所示。引入这种新层形式是为了给判别器增加一种手段，用于跟踪真实图像批次与伪造图像批次之间的统计信息，并将这些统计信息作为训练中的一个额外通道。\n\n\
    添加`MSD`层的结果是迫使生成器以匹配真实数据的方式变化其生成的样本。这会导致生成输出更加多样化，并减少生成器陷入尝试解决特定特征的可能性。在之前的许多\
    \ GAN 训练练习中，我们已经看到了非多样化输出的后果。\n\n现在我们对 ProGAN 的高级工作原理有了很好的理解，可以看看如何在练习 8-1 中使用一个实现此类\
    \ GAN 的 Python 包。同样，这些 GAN 的训练成本可能很高，因此我们将看一个简单的训练集示例，以便初步体验。\n\n## 练习 8-1：使用\
    \ ProGAN\n\n1.  从 GitHub 项目站点打开`GEN_8_ProGAN.ipynb`笔记本。如果不确定如何操作，请查阅附录 B。\n\n\
    2.  笔记本中的第一个单元格安装了`pro-gan-pth`包，该包来自 [`https://github.com/akanimax/pro_gan_pytorch`](https://github.com/akanimax/pro_gan_pytorch)，这是一个致力于此类\
    \ GAN 的开源项目：\n\n    ```\n    !pip install pro-gan-pth --quiet\n    ```\n\n3. \
    \ 此示例中的`imports`和其他设置代码已被精简，对于读到本书这一部分的多数读者来说应该足够简单。我们将从如下所示的函数开始，介绍几个更有趣的部分：\n\
    \n    ```\n    def check_output():\n        print(\"rendering output loop - started\"\
    )\n        folder = './samples'\n        while running:\n            time.sleep(15)\n\
    \            file = get_latest_file(folder)\n            if file:\n          \
    \      clear_output()\n                print(file)\n                visualize_output(file,10,10)\n\
    \    ```\n\n4.  此函数用于在 ProGAN 代码训练时渲染输出。为了在笔记本中看到连续输出，我们将在训练单元格外部的一个独立进程中使用此函数。这样做是为了让输出能够实时渲染并在训练期间可见。\n\
    \n5.  接下来，我们向下滚动到创建并训练 ProGAN 的位置，代码如下：\n\n    ```\n    pro_gan = pg.ConditionalProGAN(num_classes=10,\
    \ depth=depth,\n                                   latent_size=latent_size, device=device)\n\
    \    with io.capture_output() as captured:\n        pro_gan.train(\n         \
    \   dataset=dataset,\n            epochs=num_epochs,\n            fade_in_percentage=fade_ins,\n\
    \            batch_sizes=batch_sizes\n        )\n    ```\n\n6.  此包的默认训练实现相当嘈杂，在笔记本中效果不佳。因此，我们使用`io.capture.output()`函数关闭输出，以抑制单元格的输出。\n\
    \n7.  从这里，我们可以通过实例化一个用于渲染的工作附加进程和一个用于训练的工作线程，来了解这段代码是如何全部运行的。\n\n    ```\n   \
    \ t1 = threading.Thread(target=train_gan)\n    p = multiprocessing.Process(target=check_output)\n\
    \    start = time.time()\n    p.start()\n    t1.start()\n    t1.join()\n    ```\n\
    \n8.  同样，这段代码是为了让我们能够看到 GAN 训练过程中的输出。由于 GAN 是在另一个名为`t1`的线程中创建的，我们使用`t1.start`和`t1.join`来启动并等待线程完成。同样，`p`是为将运行渲染循环的进程创建的。但请注意，如果你终止单元格，渲染循环进程将继续运行，因此要停止该进程，你需要从菜单中选择运行时重启。\n\
    \n9.  从菜单中选择 **运行** ➤ **全部运行** 以开始训练，并在 ProGAN 训练时查看结果。\n\n在前面的练习训练过程中，你看到了模型从\
    \ 4×4 分辨率开始逐步提升。此示例的最终输出并不出色，因为它只升级到了三代，但请记住，随着模型的改进，更高分辨率在训练过程中会持续看起来更好。\n\n\
    当然，你可以尝试此 GAN 的其他变体，从训练其他样本数据到自行探索 Python 包的不同功能。如果你想进一步探索此 GAN，请查阅 GitHub 资源页面以获取更多文档。ProGAN\
    \ 是下一节我们将要探讨的 GAN 下一个重要步骤的良好示范。\n\n## 使用 StyleGAN 版本 2 进行样式化\n\n最初的 StyleGAN 首次出现在\
    \ NVIDIA 团队的另一篇论文《一种基于样式的 GAN 生成器架构》中，该论文扩展了他们在 ProGAN 上的工作。这种形式的 GAN 是为了扩展生成器的生成能力，特别是不同特征的生成能力而开发的。\n\
    \n作者发现，他们可以将特征提取和复制隔离为三个不同的类别或粒度。这反过来又投射到 GAN 本身的架构中：在较低/顶层，提取较粗糙的特征，而较低的块则识别更详细的特征。作者定义了这些特征提取的粒度，如下所示：\n\
    \n- **粗粒度（小于 8² 像素）**：在低细节处识别，包括头发、面部朝向和大小等特征\n- **中粒度（从 16² 到 32² 像素）**：通常由更精细的面部特征、闭眼和张嘴等特征定义\n\
    - **细粒度（64² 及以上像素）**：调整到眼睛、头发和肤色等细节特征\n\n基于这种在层级别提取特征的概念，StyleGAN 通过提供两个新的主要增强功能扩展了模型。第一个是映射网络，提供了将特征向量输入映射到实际可见特征的能力。第二个是添加了样式模块，将这些特征映射转换为可见特征。\n\
    \n### 映射网络\n\n映射网络提供了一种将编码向量表示转换为可见特征的非平凡方法。这些形式的网络工作方式类似于自编码器的编码器部分，但额外增加了识别可见特征的步骤。将编码映射到特征所产生的产物称为**特征纠缠**。\n\
    \n图 [8-3](#502181_1_En_8_Chapter.xhtml#Fig3) 展示了映射网络，并详细说明了用于将特征映射到向量的八层分解，这些层将结果缩减到与输入相同的大小。在该图中，你可以看到结果（称为`W`）如何被馈送到\
    \ ProGAN 合成网络中进行生成。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig3_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig3_HTML.jpg)\n\
    \n**图 8-3** StyleGAN 中的映射网络"
  raw: "The authors also presented a new layer form for the discriminator as well\
    \ called *minibatch standard deviation (MSD) layer* , again shown in Figure [8-2](#502181_1_En_8_Chapter.xhtml#Fig2).\
    \ This new layer form was introduced to add a means for the discriminator to track\
    \ statistics between real and fake batches of images, using those statistics as\
    \ an extra channel in training.\n\nA result of adding the MSD layer forces the\
    \ generator to vary its generated samples in a manner that matches the real data.\
    \ This results in more varied generated output and less chance of the generator\
    \ getting stuck trying to resolve specific features. We have seen the consequence\
    \ of nonvaried output in plenty of previous GAN training exercises.\n\nNow that\
    \ we have a good grasp of the high-level workings of a ProGAN, we can look at\
    \ using a Python package that implements such a GAN in Exercise 8-1\\. Again,\
    \ these can be expensive GANs to train, so we will look at a simple example training\
    \ set to just get our feet wet.\n\nEXERCISE 8-1\\. USING A PROGAN\n\n1.  Open\
    \ the `GEN_8_ProGAN.ipynb` notebook from the GitHub project site. If you are unsure\
    \ how, then consult Appendix B.\n\n2.  The first cell in the notebook installs\
    \ the package `pro-gan-pth` from [`https://github.com/akanimax/pro_gan_pytorch`](https://github.com/akanimax/pro_gan_pytorch),\
    \ which is an open source project devoted to this type of GAN:\n\n```\n    !pip\
    \ install pro-gan-pth --quiet\n    ```\n\n3.  The `imports` and other setup code\
    \ in this example is trimmed down and should be simple enough to follow for most\
    \ readers who have progressed this far in the book. We will cover a few of the\
    \ more interesting sections starting with the function shown here:\n\n```\n  \
    \  def check_output():\n    print(\"rendering output loop - started\")\n    folder\
    \ = './samples'\n    while running:\n    time.sleep(15)\n    file = get_latest_file(folder)\n\
    \    if file:\n    clear_output()\n    print(file)\n    visualize_output(file,10,10)\n\
    \    ```\n\n4.  This function is in place to render the output while the ProGAN\
    \ code is training. To see continuous output in the notebook, we will use this\
    \ function within a separate process external to the training cell. We do this\
    \ so the output may be rendered in real time and visible while training.\n\n5.\
    \  Next, we scroll down to where the ProGAN is created and trained with the following:\n\
    \n```\n    pro_gan = pg.ConditionalProGAN(num_classes=10, depth=depth,\n    latent_size=latent_size,\
    \ device=device)\n    with io.capture_output() as captured:\n    pro_gan.train(\n\
    \    dataset=dataset,\n    epochs=num_epochs,\n    fade_in_percentage=fade_ins,\n\
    \    batch_sizes=batch_sizes\n    )\n    ```\n\n6.  The default training implementation\
    \ of this package is quite noisy and doesn’t work well within a notebook. Therefore,\
    \ we turn off the output using the function `io.capture.output()` to suppress\
    \ the cell’s output.\n\n7.  From here we can look at how this code is all run\
    \ by instantiating a working additional process for the rendering and a worker\
    \ thread for the training.\n\n```\n    t1 = threading.Thread(target=train_gan)\n\
    \    p = multiprocessing.Process(target=check_output)\n    start = time.time()\n\
    \    p.start()\n    t1.start()\n    t1.join()\n    ```\n\n8.  Again, this code\
    \ is in place so that we may see the training output of the GAN as it progresses.\
    \ Since the GAN is created in another thread called `t1`, we use `t1.start` and\
    \ `t1.join` to start and wait for the thread to complete. Likewise, `p` is created\
    \ for the process that will run the rendering loop. However, be aware that the\
    \ rendering loop process will continue if you terminate the cell, so to stop the\
    \ process, you need to do a runtime restart from the menu.\n\n9.  From the menu,\
    \ select Run ➤ Run all to start the training and see the results as the ProGAN\
    \ is trained.\n\nAs the previous exercise trained, you saw the model progress\
    \ to various resolutions starting with 4×4 and working up. The final output of\
    \ this example is not outstanding since it upscales to only three generations,\
    \ but keep in mind that as the model improves, higher resolutions will continue\
    \ to look better as training progresses.\n\nYou can, of course, play with other\
    \ variations of this GAN from training other sample data to exploring different\
    \ features of the Python package yourself. If you want to explore this GAN more,\
    \ just consult the GitHub resource page for further documentation. The ProGAN\
    \ is a good demonstration for the next big step in GANs we will look at in the\
    \ next section.\n\n## Styling with StyleGAN Version 2\n\nThe original StyleGAN\
    \ was first unleashed in another paper from the folks at NVIDIA titled “A Style-Based\
    \ Generator Architecture for GANs” that extended their work of the ProGAN. This\
    \ form of GAN was developed to extend the generation capabilities of the generator\
    \ and in particular distinct feature generation.\n\nWhat the authors found was\
    \ that they could isolate feature extraction and replication into three distinct\
    \ classes or granularity. This, in turn, projected into the architecture of the\
    \ GAN itself; at lower/top layers, coarser features are extracted, with lower\
    \ blocks identifying more detailed features. The authors defined the granularity\
    \ of those feature extractions, as shown here:\n\n*   **Coarse (less than 82 pixels)**:\
    \ Identified at the low details and would include features such as hair, face\
    \ orientation, and size\n\n*   **Medium (from 162 to 322 pixels)**: Typically\
    \ defined by features such as finer facial features, eyes closed, and mouth open\n\
    \n*   **Fine (642 and up pixels)**: Tunes to the detailed features like eye, hair,\
    \ and skin color\n\nBased on this concept of extracting features at the layer\
    \ level, StyleGAN extended the model by providing two new major enhancements.\
    \ The first, a mapping network, provided the ability to map feature vector input\
    \ to actual visible features. Second was the addition of style modules that converted\
    \ those feature mappings into visible features.\n\n### Mapping Networks\n\nMapping\
    \ networks provide a nontrial method of converting an encoded vector representation\
    \ into visible features. These forms of network work similarly to the encoder\
    \ portion of an autoencoder with the additional step of identifying visible features.\
    \ The produced artifact of mapping encodings to features is called *feature entanglement*\
    \ .\n\nFigure [8-3](#502181_1_En_8_Chapter.xhtml#Fig3) shows the mapping network\
    \ and details the breakdown of the eight layers used to map features to vectors\
    \ using layers and reduces to the same size as the input. Within the figure you\
    \ can see how the result, called W, is then fed into a ProGAN, synthesis network\
    \ for generation.\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig3_HTML.jpg](images/502181_1_En_8_Chapter/502181_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3\n\nMapping network in StyleGAN"
