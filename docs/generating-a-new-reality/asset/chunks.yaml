    \n**图 6-3** 预测准确率与标注输出\n\n## 再次循环：CycleGAN\n\n循环一致性 GAN（CycleGAN）的主要损失机制是循环损失。回顾一下，我们在第\
    \ 5 章中已经介绍过循环损失。循环一致性损失是通过将一个物品翻译成另一种形式，然后再翻译回原始形式来衡量的，其损失值取决于原始输出与两次翻译后输出的对比效果。\n\
    \n虽然 CycleGAN 以其主要的损失判定方法命名，但它也结合了其他损失方法作为保障。这种 GAN 变体在生成器上使用了三种损失：对抗性损失（即标准 GAN\
    \ 损失）、循环损失和身份损失。\n\n身份损失衡量的是图像上的颜色变化或色温变化。如果没有身份损失，生成的输出可能会呈现出与期望输出截然不同的色调。CycleGAN\
    \ 不一定非要包含身份损失，但它能使输出更加统一。\n\n由于我们已经介绍过这种 GAN 的变体（BicycleGAN 和 DiscoGAN），我们可以快速进入练习环节。练习\
    \ 6-2 将与我们之前在第 5 章中看到的 DiscoGAN 练习类似。在进入练习时，我们还会进一步介绍一些变体，比如身份损失。\n\n## 练习 6-2：使用\
