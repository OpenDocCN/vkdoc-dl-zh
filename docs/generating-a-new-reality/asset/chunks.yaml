    you can enjoy the satisfaction of seeing your first complete deepfake. You may
    find that after your first attempt, the results are less than optimal. As mentioned
    previously, there are plenty of modifications you can make through the `FS` workflow,
    training, and conversion process.


    At this point, you can move on to creating various other deepfakes or improve
    on ones you already attempted. You could also try different or more complex variations.
    Perhaps attempt to do multiple subjects in a video, which would require you to
    run multiple passes of conversion across the same output video. There are more
    advanced workflows as well that will allow you to do multiple subjects, but we
    leave that up to you to explore on your own.


    You could also move on to exploring the other software options for face swapping
    and creating deepfakes we covered early on in this chapter. Just be aware that
    no matter which software you are working with, you still want to maintain those
    ethical standards when creating fake videos. Either way, there are plenty of options
    for you to explore on your own.


    ## Conclusion


    Probably the most controversial and abused form of generative modeling is the
    application of face swapping and the creation of deepfakes. In many aspects, the
    ethical abuse of this subset of generators often puts a black mark against the
    whole technology. There is also potential for the abuse of this technology for
    creating disinformation and fake news. It is for those reasons that it is important
    you follow the ethical guidelines when performing face swapping.


    While it remains to be seen how this technology will evolve, there is already
    a certain amount of fear of misuse for those who practice this craft. It certainly
    is likely that our ability to create better face swaps will improve. After all,
    the models used for current face swapping workflows are far less advanced than
    many of the generative models we used in this book.


    However, there also remains several opportunities to extend this technology outside
    of just faces. Imagine swapping workflows that can alter people’s clothes, the
    background, and even the style of a movie. Perhaps one day we will see movies
    like *Star Wars* converted to westerns or perhaps famous westerns translated to
    space operas.


    Face swapping and deepfakes are likely here to stay if most of us develop them
    in an ethical manner. If this craft continues to be abused for the creation of
    fake porn and fake news, we could risk government controls and legislation against
    such tools. Perhaps even worse would be the tarnished reputation of generative
    modeling itself.


    In the next and final chapter of this book, we step back and explore how we can
    identify content that has been created from generative modeling. There is a major
    focus around this area due to security concerns regarding deepfakes and the potential
    abuse for creating fake news. As such, understanding how we can identify generated
    fakes will be good final step to complete our journey.


    # 10. Cracking Deepfakes


    Throughout this book we have considered numerous strategies for generating content
    that will match the reality we know or perhaps even surpass it. While most of
    that time has been spent exploring the realm of faces and creating realistic faces,
    the same techniques can be applied to any other domain as we see fit. However,
    it is perhaps being able to generate realistic faces that is the most frightening
    to so many.


    Faces are, after all, the heart and soul of how we communicate and convey emotions.
    Being able to create real faces or swap faces, as it were, opens a world of possibilities
    for abuse in all manner of things. As we talked about in Chapter [9](#502181_1_En_9_Chapter.xhtml),
    this is an ever-present danger and one we need to take seriously in terms of ethics
    and understanding.


    In the Canadian Navy, all vessels are equipped with a ship’s diver, and these
    individuals are trained in all manner of demolitions from construction to deactivation.
    The course is so extensive it is said that if you pass, you become a demolitions
    expert, and if you fail, a terrorist. While certainly this isn’t true, it is said
    because individuals who fail the course learn how to build a bomb but likely failed
    how to disarm it.


    We could perhaps apply the same analogy to a generative modeler who builds deepfakes
    and face swapping but fails to understand the principles of detecting them. As
    we saw in the previous chapter, it is relatively easy to create a deepfake, and
    you don’t really need to understand the finer details of generators. Now you likely
    won’t be classified as a terrorist if you fail generative modeling, so this may
    not concern you.


    However, if you do understand generators and how they fail, or better yet succeed,
    you can also find their faults. After all, for most of this book, we looked at
    better ways to fool a discriminator so well that it could fool ourselves. Now
    it is time to flip the script and look at ways at which we can detect the fakes
    using the knowledge we have gained.


    Understanding fake content detection will provide us with not only a new set of
    tools but also opportunities. It is likely that the future will be littered with
    all manner of fake content that will need to be policed at all levels. From governments
    to private industry, there likely will evolve a whole new machine learning developer/engineering
    position.


    In this chapter, we look at how to detect fake content and specifically deepfakes.
    We will first look at the various methods used to manipulate content/faces with
    generative modeling. From there we will look at the strategies used to determine
    if content is fake and how they can be applied to determining what is real. We
    finish the chapter by looking at several useful tools and methods for identifying
    the current fakes.


    While we won’t have the time to explore the various strategies and techniques
    for detecting fakes and deepfakes as we have previously, this chapter should provide
    the interested reader with a good foundation for how to pursue this subject further.
    Here are the highlights we will cover in this chapter:


    - Understanding face manipulation methods

    - Techniques for cracking fakes

    - Identifying fakes in deepfakes


    The field of fakes and deepfakes detection is just emerging and will likely significantly
    mature in the next few years. This chapter is meant as a high-level introduction
    to a quickly expanding field that will evolve into advanced methods and tools.
    In the next section, we look at the methods and strategies we use detect fakes,
    which will be the basis for those tools.'
