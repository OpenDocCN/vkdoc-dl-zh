    4. 现在，这个示例中的大部分代码应该都是复习内容。因此，我们将只关注模型和优化器的创建，如下所示：


    ![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig9_HTML.jpg](img/502181_1_En_5_Fig9_HTML.jpg)


    **图 5-9** 跨域训练示例，从梵高风格到莫奈风格


    5. 同样，这个 GAN 中有两个生成器和两个判别器。虽然两个生成器共享一个优化器，但判别器使用各自的优化器。


    6. 跳转到训练代码，特别是损失计算部分。我们将重点介绍生成器中循环损失的计算方式，如下所示：


    ```python

    fake_B = G_AB(real_A)

    loss_GAN_AB = adversarial_loss(D_B(fake_B), valid)

    fake_A = G_BA(real_B)

    loss_GAN_BA = adversarial_loss(D_A(fake_A), valid)

    loss_GAN = (loss_GAN_AB + loss_GAN_BA) / 2

    # 像素级翻译损失

    loss_pixelwise = (pixelwise_loss(fake_A, real_A) + pixelwise_loss(fake_B, real_B))
    / 2

    loss_cycle_A = cycle_loss(G_BA(fake_B), real_A)

    loss_cycle_B = cycle_loss(G_AB(fake_A), real_B)

    loss_cycle = (loss_cycle_A + loss_cycle_B) / 2

    # 总损失

    loss_G = loss_GAN + loss_cycle + loss_pixelwise

    ```


    7. 首先计算对抗性损失（`loss_GAN`），然后是像素级损失，最后是循环损失。所有三个损失合并为生成器总损失（`loss_G`）。


    8. 让模型在各种数据集上训练。每次切换数据集后，请务必重置模型。否则，您将遇到奇怪的结果。


    9. 您也可以选择连续训练多个数据集，从而让 GAN 学习多种域风格并将它们组合起来。图 5-9 展示了这样一个训练示例，该训练首先在 Monet 2 Photo
    数据集上训练，然后切换到 VanGogh 2 Photo 数据集。


    ```python

    G_AB = GeneratorUNet(input_shape)

    G_BA = GeneratorUNet(input_shape)

    D_A = Discriminator(input_shape)

    D_B = Discriminator(input_shape)

    optimizer_G = torch.optim.Adam(

    itertools.chain(G_AB.parameters(), G_BA.parameters()), lr=hp.lr, betas=(hp.b1,
    hp.b2)

    )

    optimizer_D_A = torch.optim.Adam(D_A.parameters(), lr=hp.lr, betas=(hp.b1, hp.b2))

    optimizer_D_B = torch.optim.Adam(D_B.parameters(), lr=hp.lr, betas=(hp.b1, hp.b2))

    ```


    这个练习的输出很有趣，因为它展示了域风格翻译是如何生效的。在某些情况下，经过短时间的训练，艺术作品和照片看起来就相当可信。如您所见，DiscoGAN 是跨图像翻译域/风格的有效解决方案。


    请务必使用多种变体或不同数据来探索和尝试前面的练习。可视化该模型如何跨域和交叉域进行训练可能会很有启发性，尤其是当您尝试调整模型中的一些超参数时。

    '
- fmt: '## Conclusion


    In this chapter, we looked at increasing the bandwidth of our image generation
    to an image translation/generation model. We first explored this concept with
    the encoding structure of the `UNet` for performing image segmentation, where
    we looked at segmenting images of fish. Then we employed the `UNet` model in an
    image-to-image translation with `Pix2Pix` and later upgraded to the `DualGAN`,
    a GAN using two generators and discriminators.


    From understanding image to image translation, we moved on to exploring other
    forms of image or domain translation. First we looked at the `BicycleGAN`, which
    used the assumption that for each input multiple translations exist. Then we moved
    on to the `DiscoGAN` for performing unpaired image-style domain transfer.


    The techniques we have used in this chapter have extended to many areas that typically
    use images for analysis. As an example in the medical field, image to image and
    segmentation GANs provide excellent support for medical diagnostics, even allowing
    these GANs to surpass medical experts in their field by identifying diagnostic
    markers for everything from breast cancer to heart problems.


    In the next chapter, we will continue our exploration of domain translation with
    unpaired images and how we can further control such output variations.


    # 6. Residual Network GANs


    Generative adversarial networks and adversarial training are truly limitless in
    concept but often fall short in execution and implementation. As we have seen
    throughout this book, the failures often reside in the generator. And, as we have
    learned, the key to a good GAN is a good generator.


    The discriminator in a GAN is simply a classifier and often a simple binary one
    at that. In fact, it is a common practice now to build a GAN to train a discriminator/classifier.
    A GAN will be trained on a set of data for binary classification, and after training,
    the generator is discarded. Not only does this provide an accurate classifier
    but one that is also robust as well.


    Through adversarial learning, the classifier can learn better approximations across
    a wider training space provided by the generator. The generator can fill in those
    latent spaces by trying to trick the discriminator/classifier to better learn
    and approximate to. Thus, a classifier trained on real data also learns to spot
    approximated fakes of the same data.


    As it turns out, building a good discriminator is considerably easier than creating
    a good generator, and this is due to the learning problem. Generators require
    a finesse in understanding features and the target distribution so that they can
    reproduce said features, while discriminators only need to classify the differences
    or distance between features.


    We saw early on how convolutional neural networks can help extract those features.
    But we saw those features would often be exposed as patches or blobs when regenerated.
    Then we looked at the `UNet` for being able to translate learned features back
    to generated output. As we saw in Chapter [5](#502181_1_En_5_Chapter.xhtml), this
    can produce better generated output.


    In this chapter, we take the next step or evolution of feature extracting mechanisms,
    the residual block and residual network (`ResNet`). We will break down and understand
    how the `ResNet` and residual blocks work for classification. We learn how these
    models are able to bypass the depth layer problem we encounter with deep CNN networks.


    As the models we develop continue to use larger more complex feature extractors
    in various forms, we will move to understanding how to reuse existing previously
    trained models. Reusing previously trained standardized models is called *transfer
    learning*, and we will explore a simple example using a pretrained model for classification.


    We will also put all this new knowledge together and look at three GAN variations
    that use `ResNet`s to build better generators. The first of these will be the
    `CycleGAN` and extended unpaired image to image generator. The second will be
    a GAN dedicated to learning and conditionally creating faces from looking at celebrity
    faces.


    Finally, we will finish the chapter looking at the super resolution GAN (`SRGAN`),
    a GAN that combines the best of multiple models from a `ResNet` to a pretrained
    robust feature extractor. This is where we will use the `SRGAN` to improve resolution
    on some celebrity faces.


    As we progress through the book, the examples get far more complicated, so to
    save space, only important snippets are shown. It will likely be more helpful
    to have the code open while you are working through the chapter. Here again is
    what we will cover in this chapter:


    * Understanding residual networks

    * Cycling again with `CycleGAN`

    * Creating faces with `StarGAN`

    * Using the best with transfer learning

    * Increasing resolution with `SRGAN`


    We will continue to build on our knowledge from previous chapters. If you need
    to, be sure to review the content on convolutional networks and feature extraction/generation.
    Residual networks are big consumers of convolutional layers, as we will see in
    the next section.'
