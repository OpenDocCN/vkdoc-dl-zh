    \ paper discovered was that the self-attention mechanism caused the discriminator\
    \ to lose Lipschitz continuity even when trying to balance training with a gradient\
    \ penalty and/or Wasserstein distance. They therefore implemented a fix using\
    \ spectral normalization in a form we just covered in the previous section.\n\n\
    By incorporating self-attention and the required constraints, aka spectral normalization,\
    \ the authors were able to convert a simple DCGAN into a SAGAN. This in turn produced\
    \ some incredible results for straight blind sample generation, not image-to-image\
    \ translation.\n\nIn Exercise 7-4, we look at a base implementation of the SAGAN\
    \ trained to generate faces from the CelebA dataset. Keep in mind that this generator\
    \ (GAN) is completely blind generating faces just using convolution with self-attention.\
    \ Of course, to balance the training, we throw in some spectral normalization\
    \ to avoid things getting crazy.\n\nEXERCISE 7-4\\. BUILDING AND TRAINING THE\
    \ SAGAN\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig10_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig10_HTML.jpg)\n\
    \nFigure 7-10\n\nExample output from training exercise GEN_7_DCGAN_SAGAN.ipynb\n\
    \n1.  Open the `GEN_7_DCGAN_SAGAN.ipynb` notebook from the GitHub project site.\
    \ Run the entire notebook.\n\n2.  This code example is nearly identical to the\
    \ Chapter [4](#502181_1_En_4_Chapter.xhtml) `GEN_4_DCGAN.ipynb` exercise notebook.\
    \ The key differences here are the addition of self-attention and spectral normalization\
    \ in the models.\n\n3.  We can see how the self-attention layers are added to\
    \ the models by scrolling down to the `Generator` class definition and viewing\
    \ the layer configuration and the start of the `forward` function shown here:\n\
    \n```\n    self.attn1 = Self_Attn( 512, 'relu')\n    self.attn2 = Self_Attn( 256,\
    \ 'relu')\n    self.attn3 = Self_Attn( 128, 'relu')\n    self.attn4 = Self_Attn(\
    \ 64,  'relu')\n    def forward(self, z):\n    z = z.view(z.size(0), z.size(1),\
    \ 1, 1)\n    out=self.l1(z)\n    out,_ = self.attn1(out)\n    out=self.l2(out)\n\
    \    out,_ = self.attn2(out)\n    out=self.l3(out)\n    out,p1 = self.attn3(out)\n\
    \    out=self.l4(out)\n    out,p2 = self.attn4(out)\n    out=self.last(out)\n\
    \    return out, p1, p2\n    ```\n\n4.  Likewise, self-attention can be added\
    \ to the `Discriminator` class in the same manner as shown here:\n\n```\n    self.attn1\
    \ = Self_Attn(64, 'relu')\n    self.attn2 = Self_Attn(128, 'relu')\n    self.attn3\
    \ = Self_Attn(256, 'relu')\n    self.attn4 = Self_Attn(512, 'relu')\n    def forward(self,\
    \ x):\n    out = self.l1(x)\n    out,p0 = self.attn1(out)\n    out = self.l2(out)\n\
    \    out,p0 = self.attn2(out)\n    out = self.l3(out)\n    out,p1 = self.attn3(out)\n\
    \    out=self.l4(out)\n    out,p2 = self.attn4(out)\n    out=self.last(out)\n\
    \    return out.squeeze(), p1, p2\n    ```\n\n5.  All the layers in this model\
    \ use self-attention in between. However, you can adjust this behavior by simply\
    \ commenting out the attention layers you don’t want in the model. Adding attention\
    \ layers decreases training performance due to extra calculations and the increased\
    \ need to balance Lipschitz continuity.\n\n6.  If you want, you can comment out\
    \ some of all the attention layers to see what effect this has on training. If\
    \ you do so, be sure to adjust the attention outputs of the model (`p1, p2`).\n\
    \n7.  Finally, in the training block, we can see how this is all pulled together\
    \ to calculate loss, as shown here:\n\n```\n    d_out_real,dr1,dr2 = discriminator(real_images)\n\
    \    #hinge loss\n    d_loss_real = torch.nn.ReLU()(1.0 - d_out_real).mean()\n\
    \    z = tensor2var(torch.randn(real_images.size(0), hp.latent_dim))\n    fake_images,gf1,gf2\
    \ = generator(z)\n    d_out_fake,df1,df2 = discriminator(fake_images)\n    #hinge\
    \ loss\n    d_loss_fake = torch.nn.ReLU()(1.0 + d_out_fake).mean()\n    # Backward\
    \ + Optimize\n    d_loss = (d_loss_real + d_loss_fake) / 2\n    d_loss.backward()\n\
    \    optimizer_D.step()\n    ```\n\n8.  In this example, we use hinge loss to\
    \ determine the loss by passing the output through a ReLU function and taking\
    \ the mean. This is just a means for controlling negative loss. Notice how the\
    \ attention map outputs from the discriminator are not used.\n\n9.  Figure [7-10](#502181_1_En_7_Chapter.xhtml#Fig10)\
    \ shows the output of training this exercise for a few hours (Epoch14). Notice\
    \ the quality of the output, and keep in mind that all the faces are not real\
    \ people. These faces are generated completely blind.\n\nThe output of the previous\
    \ exercise is quite impressive when you consider the generator is completely working\
    \ blind when generating the faces. This contrasts with the image to image models\
    \ we looked at in the past couple chapters.\n\nFrom here we can only go up, as\
    \ they say, and in the next chapter we will look to improve on this example to\
    \ look at generating conditional faces while also incorporating a residual network\
    \ for better sample generation."
  trans: "\n# 构建自注意力生成对抗网络\n\nSAGAN 原论文的作者发现，即使尝试通过梯度惩罚和/或 Wasserstein 距离来平衡训练，自注意力机制仍会导致判别器失去\
    \ Lipschitz 连续性。因此，他们采用上一节刚刚介绍过的谱归一化形式实施了一种修复方案。\n\n通过引入自注意力机制及其所需的约束条件（即谱归一化），作者成功将简单的\
    \ DCGAN 转换为 SAGAN。这进而为纯粹的盲样本生成（而非图像到图像的转换）带来了令人惊叹的成果。\n\n在练习 7-4 中，我们将研究一个基础的\
    \ SAGAN 实现，该模型经过训练可从 CelebA 数据集生成人脸。请记住，这个生成器（GAN）完全是盲生成人脸，仅使用带有自注意力的卷积操作。当然，为了平衡训练，我们加入了一些谱归一化来避免情况失控。\n\
    \n## 练习 7-4. 构建并训练 SAGAN\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig10_HTML.jpg](img/502181_1_En_7_Fig10_HTML.jpg)\n\
    \n**图 7-10** 训练练习 `GEN_7_DCGAN_SAGAN.ipynb` 的示例输出\n\n1. 从 GitHub 项目站点打开 `GEN_7_DCGAN_SAGAN.ipynb`\
    \ 笔记本。运行整个笔记本。\n\n2. 此代码示例与第 4 章的 `GEN_4_DCGAN.ipynb` 练习笔记本几乎相同。这里的关键区别在于模型中增加了自注意力和谱归一化。\n\
    \n3. 向下滚动到 `Generator` 类定义，查看层配置和 `forward` 函数的起始部分，即可了解自注意力层是如何添加到模型中的，如下所示：\n\
    \n```\nself.attn1 = Self_Attn( 512, 'relu')\nself.attn2 = Self_Attn( 256, 'relu')\n\
    self.attn3 = Self_Attn( 128, 'relu')\nself.attn4 = Self_Attn( 64,  'relu')\ndef\
    \ forward(self, z):\n    z = z.view(z.size(0), z.size(1), 1, 1)\n    out=self.l1(z)\n\
    \    out,_ = self.attn1(out)\n    out=self.l2(out)\n    out,_ = self.attn2(out)\n\
    \    out=self.l3(out)\n    out,p1 = self.attn3(out)\n    out=self.l4(out)\n  \
    \  out,p2 = self.attn4(out)\n    out=self.last(out)\n    return out, p1, p2\n\
    ```\n\n4. 同样，自注意力也可以按如下方式添加到 `Discriminator` 类中：\n\n```\nself.attn1 = Self_Attn(64,\
    \ 'relu')\nself.attn2 = Self_Attn(128, 'relu')\nself.attn3 = Self_Attn(256, 'relu')\n\
    self.attn4 = Self_Attn(512, 'relu')\ndef forward(self, x):\n    out = self.l1(x)\n\
    \    out,p0 = self.attn1(out)\n    out = self.l2(out)\n    out,p0 = self.attn2(out)\n\
    \    out = self.l3(out)\n    out,p1 = self.attn3(out)\n    out=self.l4(out)\n\
    \    out,p2 = self.attn4(out)\n    out=self.last(out)\n    return out.squeeze(),\
    \ p1, p2\n```\n\n5. 该模型中的所有层都在其间使用了自注意力。不过，你可以通过简单地注释掉模型中不需要的注意力层来调整此行为。添加注意力层会因额外的计算以及平衡\
    \ Lipschitz 连续性的需求增加而降低训练性能。\n\n6. 如果你愿意，可以注释掉部分或全部注意力层，以观察这对训练产生的影响。如果这样做，请务必调整模型的注意力输出（`p1`、`p2`）。\n\
    \n7. 最后，在训练模块中，我们可以看到所有这些是如何整合在一起计算损失的，如下所示：\n\n```\nd_out_real,dr1,dr2 = discriminator(real_images)\n\
    #hinge loss\nd_loss_real = torch.nn.ReLU()(1.0 - d_out_real).mean()\nz = tensor2var(torch.randn(real_images.size(0),\
    \ hp.latent_dim))\nfake_images,gf1,gf2 = generator(z)\nd_out_fake,df1,df2 = discriminator(fake_images)\n\
    #hinge loss\nd_loss_fake = torch.nn.ReLU()(1.0 + d_out_fake).mean()\n# Backward\
    \ + Optimize\nd_loss = (d_loss_real + d_loss_fake) / 2\nd_loss.backward()\noptimizer_D.step()\n\
    ```\n\n8. 在此示例中，我们使用铰链损失，通过将输出传递给 `ReLU` 函数并取平均值来确定损失。这只是一种控制负损失的方法。请注意，判别器的注意力图输出并未被使用。\n\
    \n9. 图 7-10 显示了此练习训练数小时（第 14 个周期）后的输出。请注意输出的质量，并记住所有这些面孔都不是真实的人。这些面孔完全是盲生成的。\n\
    \n考虑到生成器在生成人脸时完全是盲操作的，上一个练习的输出相当令人印象深刻。这与我们在过去几章中看到的图像到图像模型形成了鲜明对比。\n\n正如人们所说，从这里我们只能向上走，在下一章中，我们将改进这个示例，研究生成条件人脸，同时结合残差网络以获得更好的样本生成效果。\n"
- fmt: "# Improving on the SAGAN\n\n`Self-attention` provides another aspect of feature\
    \ learning, that of globalized feature localization over convolution, but as we\
    \ learned this doesn’t come without side effects. These side effects can be minimized\
    \ by enforcing Lipschitz continuity, but we still have other problems like feature\
    \ over feature extraction.\n\nTo help mitigate these issues, we are going to look\
    \ at another example of an SAGAN that uses residual blocks for skip connections\
    \ in convolutions as well as adds conditional generation. As we saw earlier, conditional\
    \ generation and discriminating can improve performance by localizing subdomains.\n\
    \nFor Exercise 7-5, we look at improving on the SAGAN using a ResNet convolutional\
    \ model, labels, and conditions. We will again use the CelebA dataset, this time\
    \ using the labeled attributes as classes for each picture. As such, we want our\
    \ classes to be unique and not shareable across images. To do that, we will stick\
    \ to using the basic hair colors (blond, black, and brown) as classes and only\
    \ load celebrity faces that are attributed as such. Exercise 7-5 improves on our\
    \ previous work in that it also attempts to generate 128×128-pixel faces, the\
    \ largest blind generating we have done thus far.\n\n## EXERCISE 7-5. IMPROVING\
    \ THE SAGAN\n\n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig11_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig11_HTML.jpg)\n\
    \nFigure 7-11\n\nExample output from training the celebrity SAGAN\n\n1.  Open\
    \ the `GEN_7_Celeb_SAGAN.ipynb` notebook from the GitHub project site. Run the\
    \ entire notebook.\n\n2.  This code example is again based on the Chapter [4](#502181_1_En_4_Chapter.xhtml)\
    \ `GEN_4_DCGAN.ipynb` exercise notebook. Most of the new code resides in just\
    \ a couple blocks where the models and helper functions are defined. Note that\
    \ this notebook currently uses all the memory of Google Colab when using a GPU\
    \ runtime. As such, you need to be careful about how you modify some of the hyperparameters\
    \ like batch size or image size.\n\nIncreasing the batch size of any model increases\
    \ the memory requirements of the model as it is processing the forward pass. By\
    \ reducing the batch size, you reduce the memory requirements, but this can degrade\
    \ training performance quality and increase running time.\n\n3.  Jump down to\
    \ the model’s section and the `Generator` class definition. Notice how the `SelfAttention`\
    \ class is used in between a couple of the layers:\n\n```\n    ConvBlock(512,\
    \ 512, n_class=n_class),\n    ConvBlock(512, 256, n_class=n_class),\n    SelfAttention(256),\n\
    \    ConvBlock(256, 128, n_class=n_class),\n    SelfAttention(128),\n    ConvBlock(128,\
    \ 64, n_class=n_class)])\n```\n\n4.  Likewise, we can see the same structure in\
    \ the discriminator construction:\n\n```\n    SelfAttention(128),\n    conv(128,\
    \ 256, downsample=False),\n    SelfAttention(256),\n    conv(256, 512),\n    conv(512,\
    \ 512),\n    conv(512, 512))\n```\n\n5.  Notice the doubling up of the 512 layers\
    \ in both the generator and discriminator model construction. You could play with\
    \ adding more duplicate layers or self-attention layers. However, this current\
    \ configuration uses the maximum GPU memory. While you could swap the runtime\
    \ to CPU and increase the model parameters, training such a model on a CPU would\
    \ be considerably more time-consuming.\n\n6.  One other new feature of this example\
    \ is the introduction of a scheduler. Schedulers allow us to modify hyperparameters\
    \ at runtime (that is, those that can be modified). While you can schedule any\
    \ hyperparameter to change, during training the usual suspect is the learning\
    \ rate. In the optimizers section, we create two new schedulers like so:\n\n```\n\
    \    scheduler_G = StepLR(optimizer_G, step_size=1, gamma=hp.lr_gamma)\n    scheduler_D\
    \ = StepLR(optimizer_D, step_size=1, gamma=hp.lr_gamma)\n```\n\n7.  These schedulers\
    \ will decay the learning rate over time by multiplying the current learning rate\
    \ by the `lr_gamma` hyperparameter, set to .999 for the example. After every training\
    \ batch run on the generator, we step/decay the learning rate by calling the `step`\
    \ function, as shown here:\n\n```\n    scheduler_G.step()\n    scheduler_D.step()\n\
    ```\n\n8.  Next, we will look at the discriminator loss calculation. Notice how\
    \ we are using hinge loss for the adversarial fake and real loss and then computing\
    \ total loss by attaching a gradient penalty.\n\n```\n    loss_D_fake = F.relu(1\
    \ + fake_validity).mean()\n    loss_D_real = F.relu(1 - real_validity).mean()\n\
    \    loss_D = loss_D_real + loss_D_fake  + hp.lambda_gp * gradient_penalty\n```\n\
    \n9.  As Figure [7-11](#502181_1_En_7_Chapter.xhtml#Fig11) demonstrates, this\
    \ example can take a while to train and even produce something interesting. However,\
    \ when it does, the output can be remarkably interesting and, in some ways, artistic.\n\
    \nThis exercise and example may take a long time to train to get fantastic results,\
    \ but the results you do get before then can be themselves mesmerizing. Take some\
    \ time and watch the training of this example, and you will be rewarded by both\
    \ some amusing and scary output.\n\nAs a bonus, the StarGAN notebook from Chapter\
    \ [6](#502181_1_En_6_Chapter.xhtml) has been upgraded to use self-attention and\
    \ spectral normalization. Be sure to also check out the `GEN_7_Self-attention_STARGAN.ipynb`\
    \ notebook for more examples of using self-attention with spectral normalization.\n\
    \nThat completes our whirlwind chapter on self-attention, the GAN that uses them,\
    \ and the mechanisms that help support them.\n\n## Conclusion\n\nIn this chapter,\
    \ we learned about attention and how to define it in terms of local/global and\
    \ too soft or hard. Understanding attention allowed us not only to better define\
    \ feature mappings or relationships but also to regenerate those same relationships.\n\
    \nHowever, using the extended feature mapping of attention also required us to\
    \ better understand the training balance of the discriminator/generator. To do\
    \ that, we looked at an important mathematical and abstract property of functions\
    \ called Lipschitz continuity. This abstract term defines how uniform or smooth\
    \ a function is.\n\nWe therefore learned that by constraining the Lipschitz continuity\
    \ of a function using gradient penalty loss or spectral normalization, a GAN could\
    \ be a more balanced trainer, thus allowing us to use better feature extraction\
    \ strategies like self-attention.\n\nFinally, in this chapter, we put everything\
    \ together in first an implementation of the SAGAN trained on celebrity faces\
    \ with the purpose of blindly generating new faces. Then improving on this model,\
    \ we added residual network blocks for feature skipping an improvement we borrowed\
    \ from the previous chapter, again to generate completely new faces, this time\
    \ at higher resolution and ideally with more detail."
