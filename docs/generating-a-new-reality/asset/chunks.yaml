    # 多层感知机


    从根本上说，将感知机堆叠成层的概念并不难理解。图 1-5 展示了一个三层多层感知机（MLP）。最顶层称为*输入层*，最后一层称为*输出层*，中间的各层称为*中间层*或*隐藏层*。


    ![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig5_HTML.jpg](img/502181_1_En_1_Fig5_HTML.jpg)


    图 1-5


    MLP 网络示例


    图 1-5 展示了我们如何将猫和狗的图片输入网络，并让其对输出进行分类。我们稍后会讨论如何对输出进行分类。图中的每个节点或圆圈代表一个单独的感知机，每个感知机都与网络中的后续层全连接。我们称这类网络为*全连接顺序网络*。


    通过网络进行前向传播的预测过程与我们的感知机相同，唯一的区别在于第一层的输出成为下一层的输入，以此类推。通过将输入传入网络来计算输出的过程称为*前向传播*或*预测*。从计算角度来看，通过使用点积函数，深度学习中的前向传播非常高效，这也是神经网络的一大优势。


    如果你还记得上一节的内容，我们使用的 `np.dot` 函数对权重和输入进行了求和。该函数在 GPU 上经过优化，执行速度非常快。因此，即使我们有 100
    万个输入（是的，这是可能的），也可以在 GPU 上通过一次操作完成计算。


    `np.dot` 函数之所以能在 GPU 上得到优化，得益于计算机 3D 图形技术的发展。点积运算在图形处理中相当常见。从某种意义上说，游戏和图形引擎的发展对人工智能和深度学习起到了巨大的推动作用。


    虽然前向传播或预测步骤可以快速运行，但其计算并不特别困难。不幸的是，与之相反的训练更新过程，即我们所说的*反向传播*，则不那么容易。当我们堆叠感知机时面临的问题是，之前应用的简单更新方程无法跨网络层工作。


    在更新多层网络时，我们遇到的问题是如何确定损失需要应用于哪些层，以及该层中的哪个感知机。我们不能再简单地从预测中减去损失，然后将该值应用于单个权重。相反，我们需要计算每个权重对最终输出或预测结果的影响程度。


    为了计算如何将损失应用于每个感知机、每个层中的每个权重，我们使用微积分。微积分使我们能够通过微分来确定要应用的损失量。我们使用微积分对前向传播函数或预测函数以及激活函数进行微分。通过针对权重对这些函数进行微分，我们可以确定每个权重对结果的影响程度。


    ## 反向传播


    我们将通过网络的反向更新过程称为反向传播，因为我们是将误差或损失反向传播到每个权重。图 1-6 展示了误差或损失通过网络的反向传播过程。该图还展示了计算此误差量的公式。


    ![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig6_HTML.jpg](img/502181_1_En_1_Fig6_HTML.jpg)


    图 1-6


    反向传播详解


    图 1-6 中的第一个公式展示了通过网络的前向传播计算。进入下一个公式，我们将其写成一个参数化函数。接着，我们应用微积分中的链式法则，针对输入对前向方程进行微分。通过了解每个输入对变化的影响程度，我们可以再次进行微分，这次是针对权重。最后一个公式展示了我们如何计算网络中每个权重的变化量。


    现在，我们无需担心管理数学运算或整理公式来实现这一过程。所有深度学习库都提供了自动微分机制来为我们完成这项工作。需要理解的关键点在于最后一个公式如何将损失推回网络中的每个权重。该公式的输出是一个梯度，描述了变化的方向和幅度。为了执行更新，我们反转这个梯度，并用学习率超参数对其进行缩放。


    由于最终计算的输出是一个梯度，我们使用一种优化方法来最小化或减小这个梯度。我们称这种方法为*梯度下降*，因为它的目的是随着函数最小化损失/误差而减少梯度量。你可以通过图
    1-7 来想象梯度下降的工作原理。


    ![../images/502181_1_En_1_Chapter/502181_1_En_1_Fig7_HTML.jpg](img/502181_1_En_1_Fig7_HTML.jpg)


    图 1-7


    梯度下降详解


    在图 1-7 中，梯度下降被用来修改权重的梯度，以最小化前向传播函数的全局损失。该图展示了一个简单的二维表示，但在大多数情况下，问题的维度空间可能达到数百或数千。这意味着，对于此类问题，全局最小优化的地形或表面可能包含许多局部最小值的山峰和山谷。


    ## 随机梯度下降


    反向传播和梯度下降是 20 世纪 80 年代重新唤醒深度学习的发现。不过在当时，人们仍需手动完成计算。考虑到网络可能变得多么复杂或深入，这堪称一项令人印象深刻的壮举。


    然而，随着时间的推移，单一的梯度下降（即在每个输入展示给网络后立即进行更新）效率低下，并且事实证明并非最优。我们发现，通过将数据分批处理，该过程可以更高效，且结果相差不大。我们将这种形式的梯度下降称为*批量梯度下降*（BGD）。


    随着深度学习的成熟，后来发现一致的批次可能会使结果产生偏差，尤其是当相似的数据集聚集在一起时。例如，如果我们要对猫和狗进行分类，并且我们的数据集有 1000
    张猫的图片和 1000 张狗的图片，那么将这些图片作为猫或狗的批次输入，与进行小幅更新是相悖的。将 100 张猫的图片作为一个批次输入网络，对于理解什么不该分类没有任何帮助。


    相反，我们发现将输入数据随机分批，例如混合猫和狗的图片，效果要好得多。通过随机化数据，一个批次中可能包含任意数量的猫或狗图片，从而使网络能够更好地理解猫和狗之间的区别。


    这种将数据随机分批输入网络的方法称为*随机梯度下降*（SGD）。SGD 现在是我们用于深度学习的一系列优化算法的基础。它将是本书中我们使用的许多网络的基础方法。在下一节中，我们将研究如何使用
    PyTorch 在网络上执行带有随机梯度下降的反向传播。

    '
- fmt: "## PyTorch and Deep Learning\n\nUp until now we have been using plain old\
    \ Python with a little help from a friend called NumPy to construct some simple\
    \ perceptrons. As you can likely appreciate now, the process of backpropagating\
    \ loss through a network is not trivial and requires some additional help. Fortunately,\
    \ there are numerous deep learning libraries available at our disposal, but not\
    \ all of them are created equally.\n\nFor this book, we will use `PyTorch`, which\
    \ is an open-source library that has become quite popular due to ease of use,\
    \ performance, and ability to customize. It currently is the preferred library\
    \ by most academic and cutting-edge AI researchers. This will benefit us when\
    \ trying to build cutting-edge generative models later in this book.\n\n`PyTorch`\
    \ can allow us to build the simplest two-layer multilayer perceptron to several\
    \ thousand-layer complex models. In Exercise 1-3, we will dive in and build our\
    \ first MLP network in `PyTorch` to revisit and solve the XOR problem we failed\
    \ at solving earlier.\n\n### EXERCISE 1-3. SOLVING XOR WITH MLP ON PYTORCH\n\n\
    1.  Open the `GEN_1_mlp_pytorch.ipynb` notebook from the project’s GitHub site.\
    \ If you are unsure on how to access the source, check Appendix B.\n\n2.  Run\
    \ the first block of code, which loads NumPy and several `PyTorch` (`torch`) modules\
    \ we will work with.\n\n    ```python\n    import numpy as np\n    import torch\n\
    \    import torch.nn as nn\n    from torch.autograd import Variable\n    import\
    \ torch.nn.functional as F\n    import torch.optim as optim\n    ```\n\n3.  The\
    \ next block of code contains the model in a class called `XorNet`. In this class,\
    \ we create two neural network layers with the `nn` module using `nn.linear`.\
    \ We call the layer `fc`; as a reminder, the layer is fully connected. The first\
    \ `fc1` layer takes 2 inputs and outputs to 10 neurons/perceptrons. The second\
    \ `fc2` layer takes 10 inputs and outputs to a single neuron. The `forward` function\
    \ is where we can see how the input `x` is passed to the first `fc1` layer and\
    \ passed through a ReLU activation function with `F.relu` before being passed\
    \ to the second `fc2` layer.\n\n    ```python\n    class XorNet(nn.Module):\n\
    \        def __init__(self):\n            super().__init__()\n            self.fc1\
    \ = nn.Linear(2,10)\n            self.fc2 = nn.Linear(10,1)\n        def forward(self,\
    \ x):\n            x = F.relu(self.fc1(x))\n            x = self.fc2(x)\n    \
    \        return x\n    ```\n\n4.  The next block of code is where we instantiate\
    \ the model of `XorNet`. After that, we create a loss function of type mean squared\
    \ error (MSE). This loss calculation is the same as we saw earlier. After that,\
    \ we create an optimizer of type Adam. The Adam optimizer is an improved version\
    \ of SGD that provides for better scaling of the weight updates so that optimization\
    \ can be more efficient.\n\n5.  From there, we move to setting up the data for\
    \ the XOR problem and adjusting how this data is wrapped for consumption into\
    \ `PyTorch`.\n\n    ```python\n    X = np.array([[0.,0.],[1.,1.],[0.,1.],[1.,0.]])\n\
    \    Y = np.array([0.,0.,1.,1.])\n    y_train_t = torch.from_numpy(Y).clone().reshape(-1,\
    \ 1)\n    x_train_t = torch.from_numpy(X).clone()\n    history = []\n    ```\n\
    \n6.  Next, we move to training loops not unlike those we see before. The difference\
    \ here is that we are batching the data. Since we have only four samples, we batch\
    \ all the data. This is fed into the model to the forward pass or prediction.\
    \ After that, the loss is calculated from the expected values in `y_batch` and\
    \ those predicted `y_pred` using the loss function `loss_fn`. Then we zero the\
    \ gradient of the optimizer. This is like a reset, with `optimizer.zero_grad()`.\
    \ Apply the loss backward with `loss.backward()` and finally take another optimization\
    \ step with `optimizer.step()`.\n\n    ```python\n    for i in range(epochs):\n\
    \        for batch_ind in range(4):\n            x_batch = Variable(torch.Tensor(x_train_t.float()))\n\
    \            y_batch = Variable(torch.Tensor(y_train_t.float()))\n           \
    \ y_pred = model(x_batch)\n            loss = loss_fn(y_pred, y_batch)\n     \
    \       print(i, loss.data)\n            optimizer.zero_grad()\n            loss.backward()\n\
    \            optimizer.step()\n    ```\n\n7.  As the model is training, you will\
    \ see the loss approaches zero quite quickly. Remember when we used a single perceptron\
    \ model how our loss minimized at .25. This was due to the network not being able\
    \ to fit the XOR function. By adding a second layer with 10 neurons/perceptrons,\
    \ we are now able to solve XOR.\n\n8.  We can test how well the model is predicting\
    \ by feeding a single input from the XOR truth table with the following:\n\n \
    \   ```python\n    v = Variable(torch.FloatTensor([1,0]))\n    model(v)\n    ```\n\
    \n9.  In the code you can see that we need to convert the input of 1,0 into a\
    \ tensor and then into a torch variable with `Variable`. Then that value is fed\
    \ into the model, and the prediction is displayed. Notice that the output of the\
    \ prediction will be exactly 1.0.\n\nBy adding a second layer of 10 neurons to\
    \ an MLP model, we were able to solve the XOR problem quite quickly and effectively\
    \ using `PyTorch`. `PyTorch` provides the power to quickly build models with its\
    \ neural network abstraction module `nn`. There are other lower ways to build\
    \ networks in `PyTorch`, but we will stick with using `nn` for most of this book.\
    \ In the next section, we look at how to exercise a `PyTorch` network for regression\
    \ analysis."
