    ![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig5_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Deep learning hill climbing


    In Figure [3-6](#502181_1_En_3_Chapter.xhtml#Fig6), we can see how reducing the
    learning rate allows the network to better approximate the function path. You
