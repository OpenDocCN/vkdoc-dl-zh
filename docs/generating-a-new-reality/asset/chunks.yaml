  trans: "\n### 应用注意力机制\n\n注意力不仅形式多样，从局部硬性注意到全局软性注意，还可以通过多种机制来应用。表 7-1 展示了用于特征提取和/或关系建模的多种注意力机制示例。虽然我们可以更详细地审视每种方法，但我们的主要焦点将是最后一种——Transformer。\n\
    \n**表 7-1** 用于应用注意力的注意力机制\n\n| 注意力机制 | 说明 | 参考文献 |\n| --- | --- | --- |\n| 基于内容\
    \ | 余弦相似度 | Graves2014 |\n| 拼接或加性 | 对权重应用 Tanh 函数 | [Bahdanau2015](https://arxiv.org/pdf/1409.0473.pdf)\
    \ |\n| 基于位置 | 对权重进行 Softmax 对齐 | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf)\
    \ |\n| 通用 | 直接应用于权重 | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf) |\n| 点积\
    \ | 注意力参数与点积结合 | [Luong2015](https://arxiv.org/pdf/1508.04025.pdf) |\n| 缩放点积 |\
    \ 与点积相同，但应用了缩放变量 | [Vaswani2017](http://papers.nips.cc/paper/7181-attention-is-all-you-need.pdf)\
    \ |\n\n图 7-5 展示了原始论文中提出的 Transformer 架构。在图中，你可以看到使用了两种形式的注意力：多头注意力和缩放点积注意力。两者结合，提供了我们之前讨论过的自注意力机制。\n\
    \n![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig5_HTML.jpg](img/502181_1_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5** 展示多头注意力的 Transformer 架构\n\n多头注意力机制由 AAYN 论文的作者提出，其内部展开为图 7-5 插图中所示的缩放点积注意力形式。再次提醒，该论文的重点是训练\
    \ NLP 模型，因此图中所示的架构是针对 NLP Transformer 的，而非我们稍后将看到的 GAN 设计。然而，用于提取自注意力的多头注意力机制将是我们关注的重点。\n\
    \n请参考图 7-5 以及最右侧的放大图，该图突出显示了应用于三个输入 `Q`、`K` 和 `V` 的缩放点积注意力机制。这些字母分别缩写为 `Q`（代表\
    \ `querys`，是的，拼写有误）、`K`（代表 `keys`）和 `V`（代表 `values`）。首先将 `Q` 和 `K` 相乘，然后进行缩放，并通过一个\
    \ softmax 函数。此输出再与输入值相乘。\n\n为了演示如何以这种方式计算自注意力，我们当然需要通过一个练习来查看一些代码。练习 7-1 除了展示计算步骤外，不做其他任何事情。所有输入和权重都是随机化的，你可以将其视为训练的初始阶段。让我们开始看看多头注意力是如何工作的。\n\
    \n**练习 7-1. 理解多头注意力**\n\n1.  从 GitHub 项目站点打开 `GEN_7_Attention.ipynb` 笔记本。如果不确定如何操作，请参考附录\
    \ B。\n\n2.  第一个单元格表示导入和一个示例随机输入，如下所示：\n\n```\n    import torch\n    import numpy\
    \ as np\n    x = np.random.randint(0,3,(3,4))\n    x = torch.tensor(x, dtype=torch.float32)\n\
    \    print(x)\n```\n\n3.  同样，输入和权重都是随机化的，我们只关注计算步骤。这里是创建 `query`、`key` 和 `values`\
    \ 随机权重的地方：\n\n```\n    w_key = np.random.randint(0,2,(4,3))\n    w_query = np.random.randint(0,2,(4,3))\n\
    \    w_value = np.random.randint(0,4,(4,3))\n    w_key = torch.tensor(w_key, dtype=torch.float32)\n\
    \    w_query = torch.tensor(w_query, dtype=torch.float32)\n    w_value = torch.tensor(w_value,\
    \ dtype=torch.float32)\n    print(w_key)\n    print(w_query)\n    print(w_value)\n\
    ```\n\n4.  在真正的多头自注意力层中，这些权重会随着时间推移进行训练。\n\n5.  接下来，我们将所有权重应用于输入 `x`，以推导出 `keys`、`querys`\
    \ 和 `values`。\n\n```\n    keys = x @ w_key\n    querys = x @ w_query\n    values\
    \ = x @ w_value\n    print(keys)\n    print(querys)\n    print(values)\n```\n\n\
    6.  之后，我们将 `querys` 乘以 `keys` 的转置，并计算 `attn_scores` 值。\n\n```\n    attn_scores\
    \ = querys @ keys.T\n    print(attn_scores)\n```\n\n7.  然后，我们对输出 `attn_scores`\
    \ 应用 `softmax` 函数，得到 `attn_scores_softmax`。\n\n```\n    from torch.nn.functional\
    \ import softmax\n    attn_scores_softmax = softmax(attn_scores, dim=-1)\n   \
    \ print(attn_scores_softmax)\n```\n\n8.  最后，通过乘以 values 并求和结果来生成输出。\n\n```\n \
    \   weighted_values = values[:,None] * attn_scores_softmax.T[:,:,None]\n    outputs\
    \ = weighted_values.sum(dim=0)\n    print(outputs)\n```\n\n你应从上述练习中掌握的核心内容是：通过一个简单示例，了解如何将多头注意力应用于输入\
    \ `x` 的功能性步骤。实际使用卷积实现多头注意力会更加复杂，这将在下一节中讨论。\n"
- fmt: '# Augmenting Convolution with Attention


    The concept of attention (self-attention) augmented convolution was first introduced
    through the self-attention GAN paper. In the paper, the authors showed how convolutional
    layers could be augmented using a multihead self-attention mechanism.


    Figure [7-6](#502181_1_En_7_Chapter.xhtml#Fig6) is extracted from the original
    SAGAN paper and demonstrates how a single augmented attention layer works. From
    the left input side, the convolution outputs enter the mechanism and are split
    into 1×1 convolutional layers. The out `f(x)` represents the `keys` head, the
    `g(x)` function represents `querys`, and of course `h(x)` represents `values`.


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig6_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Multiheaded self-attention applied to convolution layer


    Recall from Exercise 7-1 how the rest of the calculations are applied, and you
    have a high-level understanding of how multiheaded, self-attention is calculated.
    The output self-attention feature maps are then passed into successive convolutional
    blocks. How much and where you apply self-attention is up to the model architecture.
    In most cases, you will apply self-attention to the lower and/or output layers
    of a model.


    Listing [7-1](#502181_1_En_7_Chapter.xhtml#PC7) is extracted from the `Self_Attn`
    layer class from the `GEN_7_SAGAN.ipynb` example. The `Self_Attn` class provides
    a wrapper for convolutional augmented self-attention. We will look at the full
    example later in the chapter, but notice how the `query` and `key` convolutional
    layers alter the input `in_dim` by dividing by 8, but the value convolution remains
    the same.


    ```

    self.query_conv = nn.Conv2d(in_channels = in_dim , out_channels = in_dim//8 ,
    kernel_size= 1)

    self.key_conv = nn.Conv2d(in_channels = in_dim , out_channels = in_dim//8 , kernel_size=
    1)

    self.value_conv = nn.Conv2d(in_channels = in_dim , out_channels = in_dim , kernel_size=
    1)

    ```


    Listing 7-1


    Attention Convolutional Layers


    Within the `forward` function of the `Self_Attn` class, we can see where the self-attention
    mechanism is applied. Aside from the tensor manipulations with `view` and the
    use of `torch.bmm`, which stands for batch matrix multiply, the code shown in
    Listing [7-2](#502181_1_En_7_Chapter.xhtml#PC8) is like what we covered in Exercise
    7-1.


    ```

    #inside forward function

    m_batchsize,C,width ,height = x.size()

    proj_query  = self.query_conv(x).view(m_batchsize,-1,width*height).permute(0,2,1)
    # B X CX(N)

    proj_key =  self.key_conv(x).view(m_batchsize,-1,width*height) # B X C x (*W*H)

    energy =  torch.bmm(proj_query,proj_key) # transpose check

    attention = self.softmax(energy) # BX (N) X (N)

    proj_value = self.value_conv(x).view(m_batchsize,-1,width*height) # B X C X N

    out = torch.bmm(proj_value,attention.permute(0,2,1) )

    out = out.view(m_batchsize,C,width,height)

    out = self.gamma*out + x

    return out,attention

    ```


    Listing 7-2


    Inside the Forward Function of the `Self_Attn` Class


    Notice that the forward function in Listing [7-2](#502181_1_En_7_Chapter.xhtml#PC8)
    has two outputs, the attended output `out` and the calculated `attention` map.
    While we won’t project those outputs any further, what is possible is visualizing
    those attention maps. We can work through Exercise 7-2 to visualize how those
    attention maps look next.


    EXERCISE 7-2\. VISUALIZING SELF-ATTENTION MAPS


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig7_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Interface for controlling visualization options


    1.  Open the `https://epfml.github.io/attention-cnn/` notebook from the GitHub
    project site in your browser.


    2.  This site was developed as part of the paper “On the Relationship between
    Self-Attention and Convolutional Layers” published at ICLR 2020.


    3.  Figure [7-7](#502181_1_En_7_Chapter.xhtml#Fig7) shows the start of the visualization
    table and provides the options for visualizing three types of attention.


    ![../images/502181_1_En_7_Chapter/502181_1_En_7_Fig8_HTML.jpg](images/502181_1_En_7_Chapter/502181_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    The generated attention maps per layer and head


    1.  Click the Vision Transformer at the far right, and notice how the images also
    change.


    2.  Hover your mouse over the images, and you will see how the attention maps
    in the table below update as you cross each pixel.


    3.  Figure [7-8](#502181_1_En_7_Chapter.xhtml#Fig8) shows an example of self-attention
    maps from hovering the pixel over the picture of the shark.


    1.  Look closely at the maps, and in many of them you will see the outline of
    the shark representing how the pixel attends to the rest of the features on the
    shark.


    The web page and paper demonstrate multiheaded attention over each layer of a
    model. In some cases, you may want to apply attention across every layer in a
    model, and in others you may not.


    As of 2020, augmented attention for convolution is becoming quite popular and
    for good reason. An attention mechanism is a powerful tool to provide learned
    context to the features we extract with convolution or other means. However, we
    always need to balance the improvements over either side to build a good generator.
    So, before we apply attention to a GAN, we want to review again the importance
    of training balance in the next section.


    ## Lipschitz Continuity in GANs


    For most of this book we have discussed the need to balance the training of the
    generator and the discriminator. Without balance, if either side ever becomes
    too accurate, then the other has no hope of ever getting better.


    As an example, imagine you are training to be a champion runner. Graciously your
    training competition is Usain Bolt, fastest man on Earth. Every day you train
    and measure your improvements next to Usain. Unfortunately, Usain is also training
    daily and improves just as much as you if not more. Since you are comparing your
    performance to Bolt’s performance, your gains and therefore your performance begin
    to diminish. In the end, you quit and just decide to watch from the sidelines.


    This same principle works in a regular GAN. Since the generator measures its performance
    with respect to the discriminator, if the discriminator becomes great at picking
    real/fake, the loss pushed back to the generator will diminish. In turn, the loss
    the generator uses to train reduces, causing a vanishing gradient problem.


    If you are training a GAN and notice the output starting to degrade, then this
    is likely a sign that the discriminator is getting too good. The opposite occurs
    when your generator seems to stop or just not improve anymore. This is a sign
    the discriminator is regressing or has just reached its maximum potential.


    Balance is therefore key to training a GAN, and we have looked at some methods
    previously to better manage this problem. Recall when we looked at the various
    methods of measuring and comparing distributions in Chapter [4](#502181_1_En_4_Chapter.xhtml).
    We covered the WGAN, a GAN that used an earth mover’s distance algorithm to determine
    loss rather than a divergence function like KL.


    Since the balance point in a GAN is the discriminator, we often first look to
    it to improve balance and training stability. We can do this by reviewing an abstract
    property of the function the discriminator is trying to approximate to. That property
    is called the Lipschitz continuity and is what we will cover in the next section.'
