    \ you may want to use only a partial set of frames to rebuild the video.\n\nFortunately,\
    \ Python and OpenCV make constructing a new video with just fames quite easy as\
    \ we already seen with the YouTube-Downloader exercise. Therefore, it is a simple\
    \ matter to set up and use another Colab notebook that can easily do the video\
    \ creation for us using the frames and codec of our choosing.\n\nIn the last exercise\
    \ of this chapter, we jump back on to Colab to use a Python tool to create the\
    \ deepfake video. If you don’t want to use a notebook and you have a proper Python\
    \ environment set up, you can also copy the code to a local file and run it directly\
    \ from your machine. Either way, the flexibility of using this notebook should\
    \ make it easy to quickly build a deepfake; see Exercise 9-8.\n\nEXERCISE 9-8\\\
    . CREATING THE DEEPFAKE VIDEO\n\n1.  Open the `GEN_9_Make_Video.ipynb` notebook\
    \ from the GitHub project site. If you are unsure how, then consult Appendix B.\n\
    \n2.  Open the folder/files tab on the left side of the window and create a new\
    \ folder called `images`. Using the ellipsis menu beside the new folder, click\
    \ the Upload option to open a file browser view.\n\n3.  Locate and open the Output\
    \ Dir folder of the converted frames from the previous exercise. Select some of\
    \ the frames you want to convert to a video using the File Browser. When all the\
    \ images are selected, click Open in the browser to upload the images. Wait for\
    \ all the images to uploaded before continuing.\n\n4.  Return to the notebook\
    \ cells, and you can now run the entire notebook from the menu by selecting Runtime\
    \ ➤ Run all.\n\n5.  The first block of code, shown here, pulls all the images\
    \ from the folder and puts them in an array/list for later processing:\n\n```\n\
    \    import cv2\n    import numpy as np\n    import glob\n    img_array = []\n\
    \    for filename in sorted(glob.glob('/content/images/*.png')):\n    print(filename)\n\
    \    img = cv2.imread(filename)\n    height, width, layers = img.shape\n    size\
    \ = (width,height)\n    img_array.append(img)\n    ```\n\n6.  Notice the use of\
    \ the `glob` and `sorted` functions to load all the images and sort them.\n\n\
    7.  Moving down to the next cell, we can see how easy it is for Python with OpenCV\
    \ to create a new video file. Again, if you need to modify the codec used to create\
    \ the video, uncomment/comment the appropriate lines, as shown in the following\
    \ code:\n\n```\n    movie = 'deepfakes.mp4'\n    #codecs\n    # Define the codec\
    \ and create VideoWriter object\n    #fourcc = cv2.VideoWriter_fourcc(*'FFV1')\n\
    \    #fourcc = cv2.VideoWriter_fourcc(*'XVID')\n    #fourcc = cv2.VideoWriter_fourcc(*'DIVX')\n\
    \    #fourcc = cv2.VideoWriter_fourcc(*'DIV3')\n    fourcc = cv2.VideoWriter_fourcc('F','M','P','4')\n\
    \    #fourcc = cv2.VideoWriter_fourcc('D','I','V','X')\n    #fourcc = cv2.VideoWriter_fourcc('D','I','V','3')\n\
    \    #fourcc = cv2.VideoWriter_fourcc('F','F','V','1')\n    out = cv2.VideoWriter(movie,fourcc,\
    \ 15, size)\n    for i in range(len(img_array)):\n    out.write(img_array[i])\n\
    \    out.release()\n    ```\n\n8.  In the video creation code, you can also see\
    \ where the `cv2.VideoWriter` function is called to define the movie name, type\
    \ of codec, frames per second playback, and video size.\n\n9.  Finally, in the\
    \ last block of code, the video will be downloaded using the same pattern as we\
    \ did earlier in this chapter. After the movie has been built and downloaded,\
    \ review it and decide if you are happy or need to go back to the drawing board."
  trans: "\n# 创建深度伪造视频\n\n要获得可信且精准的深度伪造视频，关键在于上一步中训练模型的性能。同时，从待转换视频中提取并清理好人脸也至关重要。在继续操作前，请确保已对目标转换视频中的人脸完成提取、排序和修剪。\n\
    \n假设一切准备就绪，我们就可以进入下一个练习：将目标视频转换为深度伪造视频。同样，Faceswap 让这一过程变得极其简单。如果你拥有支持 GPU 的环境，一个\
    \ 30 秒的视频可以在不到 5 分钟内完成转换。回到软件中，我们开始制作你的第一个深度伪造视频；参见练习 9-7。\n\n## 练习 9-7. 转换视频以交换人脸\n\
    \n![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig10_HTML.jpg](img/502181_1_En_9_Fig10_HTML.jpg)\n\
    \n图 9-10\n\n将视频转换为深度伪造帧的界面\n\n1. 打开软件后，选择 `Convert` 选项卡，如图 9-10 所示。\n\n2. 有多个选项可用于修改转换结果。在本练习中，我们将只使用基本设置，但你可以从\
    \ Faceswap 仓库或论坛了解更多关于各种选项的信息。\n\n3. 按照惯例，我们从窗口顶部的 `Data` 分组框开始。你需要将 `Input Dir`\
    \ 选项设置为要转换的实际目标视频。然后将 `Output Dir` 选项设置为一个新文件夹，视频帧将写入该文件夹。Faceswap 默认不会创建输出视频，帧的合成将在最后阶段完成。\n\
    \n4. 接下来，我们可以在 `Alignments` 字段中设置对齐文件。此外，`Reference Video` 输入将与 `Input Dir` 视频相同。然后，通过选择你用于训练的模型文件夹来完成这第一部分的输入。\n\
    \n5. 通常，你可以将 `Color Adjustment` 部分保留为默认设置。但是，如果你注意到转换后图像的人脸周围存在颜色差异，可能需要进一步调整这些选项。\n\
    \n6. `Mask Type` 设置定义了用于需要转换的人脸周围区域的遮罩。不同的遮罩会根据模型插件的多个因素来改变该区域。如果你注意到转换输出中的人脸没有完全转换，很可能需要调整转换过程中使用的遮罩。你可能还需要选择并定义用于提取过程的不同遮罩。这些是高级设置，同样在\
    \ Faceswap 网站上有最佳文档说明。\n\n7. 你可以保留其他默认设置，如图 9-10 所示。准备就绪后，点击窗口底部的 `Convert` 按钮即可开始转换过程。\n\
    \n视频转换完成后，你可以打开 `Output Dir` 文件夹，检查转换效果。如果对转换结果不满意，请先返回并进一步训练模型，或尝试不同类型的模型。你可能还需要了解一些关于遮罩和颜色归一化的更精细选项。同样，请查阅\
    \ Faceswap 文档、论坛网站和其他资源寻求帮助。\n\n当你对转换结果满意后，我们可以进入下一节，从转换后的帧创建最终的深度伪造视频，这是最后一步。\n\
    \n### 编码视频\n\n创建深度伪造视频的最后一步是获取所有转换后的视频帧，并将它们合成为一个视频。Faceswap 有一个工具可以将帧转换为视频，但它依赖于参考视频来提取编解码器和其他属性。然而，在创建深度伪造视频时，很多时候你可能只想使用部分帧来重建视频。\n\
    \n幸运的是，正如我们在 YouTube-Downloader 练习中已经看到的，Python 和 OpenCV 使得仅用帧来构建新视频变得非常容易。因此，设置并使用另一个\
    \ Colab 笔记本，利用我们选择的帧和编解码器轻松创建视频，是一件简单的事情。\n\n在本章的最后一个练习中，我们将回到 Colab，使用一个 Python\
    \ 工具来创建深度伪造视频。如果你不想使用笔记本，并且已经设置了合适的 Python 环境，你也可以将代码复制到本地文件，并直接从你的机器上运行。无论哪种方式，使用这个笔记本的灵活性应该能让你轻松快速地构建深度伪造视频；参见练习\
    \ 9-8。\n\n## 练习 9-8. 创建深度伪造视频\n\n1. 从 GitHub 项目站点打开 `GEN_9_Make_Video.ipynb` 笔记本。如果不确定如何操作，请查阅附录\
    \ B。\n\n2. 打开窗口左侧的文件夹/文件选项卡，创建一个名为 `images` 的新文件夹。使用新文件夹旁边的省略号菜单，点击 `Upload` 选项打开文件浏览器视图。\n\
    \n3. 找到并打开上一个练习中转换后的帧所在的 `Output Dir` 文件夹。使用文件浏览器选择一些你想要转换为视频的帧。当所有图像都被选中后，点击浏览器中的\
    \ `Open` 上传图像。等待所有图像上传完毕后再继续。\n\n4. 返回笔记本单元格，现在你可以通过选择菜单中的 `Runtime ➤ Run all`\
    \ 来运行整个笔记本。\n\n5. 第一个代码块（如下所示）从文件夹中提取所有图像，并将它们放入一个数组/列表中，以供后续处理：\n\n```\nimport\
    \ cv2\nimport numpy as np\nimport glob\nimg_array = []\nfor filename in sorted(glob.glob('/content/images/*.png')):\n\
    \    print(filename)\n    img = cv2.imread(filename)\n    height, width, layers\
    \ = img.shape\n    size = (width,height)\n    img_array.append(img)\n```\n\n6.\
    \ 注意使用了 `glob` 和 `sorted` 函数来加载所有图像并对其进行排序。\n\n7. 向下移动到下一个单元格，我们可以看到 Python 配合\
    \ OpenCV 创建新视频文件是多么容易。同样，如果你需要修改用于创建视频的编解码器，请取消注释/注释掉相应的行，如下代码所示：\n\n```\nmovie\
    \ = 'deepfakes.mp4'\n#codecs\n# Define the codec and create VideoWriter object\n\
    #fourcc = cv2.VideoWriter_fourcc(*'FFV1')\n#fourcc = cv2.VideoWriter_fourcc(*'XVID')\n\
    #fourcc = cv2.VideoWriter_fourcc(*'DIVX')\n#fourcc = cv2.VideoWriter_fourcc(*'DIV3')\n\
    fourcc = cv2.VideoWriter_fourcc('F','M','P','4')\n#fourcc = cv2.VideoWriter_fourcc('D','I','V','X')\n\
    #fourcc = cv2.VideoWriter_fourcc('D','I','V','3')\n#fourcc = cv2.VideoWriter_fourcc('F','F','V','1')\n\
    out = cv2.VideoWriter(movie,fourcc, 15, size)\nfor i in range(len(img_array)):\n\
    \    out.write(img_array[i])\nout.release()\n```\n\n8. 在视频创建代码中，你还可以看到调用 `cv2.VideoWriter`\
    \ 函数来定义电影名称、编解码器类型、每秒播放帧数和视频尺寸。\n\n9. 最后，在最后一个代码块中，视频将使用与本章前面相同的模式进行下载。电影构建并下载完成后，请检查它，并决定你是否满意，或者是否需要回到起点重新开始。\n"
