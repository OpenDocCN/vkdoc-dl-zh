    \n5.  这个类与我们之前生成器使用的类相似。有一些细微的差别使得这个类更加抽象和可重用。请注意，生成对抗网络中的原始生成器是从随机噪声中学习的，而判别器是从已建立的或*基准*事实中学习的。\n\
    \n6.  接下来，我们有 `Discriminator` 类，它展示了深度卷积生成对抗网络判别器的一个新版本。\n"
- fmt: "```python\nclass Discriminator(nn.Module):\n    def __init__(self):\n    \
    \    super(Discriminator, self).__init__()\n        def discriminator_block(in_filters,\
    \ out_filters, bn=True):\n            block = [nn.Conv2d(in_filters, out_filters,\
    \ 3, 2, 1),\n                     nn.LeakyReLU(0.2, inplace=True), nn.Dropout2d(0.25)]\n\
    \            if bn:\n                block.append(nn.BatchNorm2d(out_filters,\
    \ 0.8))\n            return block\n        self.model = nn.Sequential(\n     \
    \       *discriminator_block(hp.channels, 16, bn=False),\n            *discriminator_block(16,\
    \ 32),\n            *discriminator_block(32, 64),\n            *discriminator_block(64,\
    \ 128),\n        )\n        # The height and width of downsampled image\n    \
    \    ds_size = hp.img_size // 2 ** 4\n        self.adv_layer = nn.Sequential(nn.Linear(128\
    \ * ds_size ** 2, 1), nn.Sigmoid())\n\n    def forward(self, img):\n        out\
    \ = self.model(img)\n        out = out.view(out.shape[0], -1)\n        validity\
    \ = self.adv_layer(out)\n        return validity\n```\n\n7. After that we have\
    \ the cell where the models are defined and the loss function is created. Notice\
    \ how we have the option to use `cuda` and how the models are defined if we are\
    \ using a GPU.\n\n```python\nloss_fn = torch.nn.BCELoss()\ngenerator = Generator()\n\
    discriminator = Discriminator()\nif cuda:\n    generator.cuda()\n    discriminator.cuda()\n\
    \    loss_fn.cuda()\n# Initialize weights\ngenerator.apply(weights_init_normal)\n\
    discriminator.apply(weights_init_normal)\n```\n\n8. Move down the rest of the\
    \ code to the last cell where all the training is defined. Notice how we define\
    \ the fake and real images with 0.0 or 1.0s a little different than we did before.\n\
    \n```python\nfor epoch in range(hp.n_epochs):\n    for i, (imgs, _) in enumerate(dataloader):\n\
    \        valid = Variable(Tensor(imgs.shape[0], 1).fill_(1.0), requires_grad=False)\n\
    \        fake = Variable(Tensor(imgs.shape[0], 1).fill_(0.0), requires_grad=False)\n\
    \        real_imgs = Variable(imgs.type(Tensor))\n        optimizer_G.zero_grad()\n\
    \        z = Variable(Tensor(np.random.normal(0, 1, (imgs.shape[0], hp.latent_dim))))\n\
    \        gen_imgs = generator(z)\n        g_loss = loss_fn(discriminator(gen_imgs),\
    \ valid)\n        g_loss.backward()\n        optimizer_G.step()\n        optimizer_D.zero_grad()\n\
    \        real_loss = loss_fn(discriminator(real_imgs), valid)\n        fake_loss\
    \ = loss_fn(discriminator(gen_imgs.detach()), fake)\n        d_loss = (real_loss\
    \ + fake_loss) / 2\n        d_loss.backward()\n        optimizer_D.step()\n  \
    \      batches_done = epoch * len(dataloader) + i\n        if batches_done % hp.sample_interval\
    \ == 0:\n            clear_output()\n            print(f\"Epoch:{epoch}:It{i}:DLoss{d_loss.item()}:GLoss{g_loss.item()}\"\
    )\n            visualize_output(gen_imgs.data[:50],10, 10)\n```\n\n9. As the notebook\
    \ runs, watch how the images are generated. Pay particular attention to the blocky\
    \ nature of how the images are generated. These almost block-like features are\
    \ a result of the convolutional feature extraction process. If you need to review\
    \ the image feature extraction process with CNN layers, consult Chapter [2](#502181_1_En_2_Chapter.xhtml).\n\
    \nFigure [4-1](#502181_1_En_4_Chapter.xhtml#Fig1) shows the training process and\
    \ results of the generated images at various sampling points in training. Notice\
    \ how the images appear to be stitched together from various patches or what best\
    \ can be described as *extracted features*.\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig1_HTML.jpg](images/502181_1_En_4_Chapter/502181_1_En_4_Fig1_HTML.jpg)\n\
    \n**Figure 4-1** Generated results from the DCGAN at various sampling points\n\
    \nThe dual convolutional GAN was a substantial improvement over the original vanilla\
    \ GAN due to the ability to perform feature extraction. While visually the results\
    \ can be impressive, it becomes obvious that the model has limitations. This can\
    \ be seen with the apparent stitching of the images from learned feature patches.\n\
    \nThat doesn’t mean convolution or the concept of feature extraction in generative\
    \ modeling is limited. What we need to consider when using feature extracting\
    \ layers like convolution or recurrent layers are the details and context of the\
    \ extraction. In convolution, the detail is limited to the minimum patch size\
