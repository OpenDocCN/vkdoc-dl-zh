    本 Apress 印记由注册公司 APress Media, LLC（Springer Nature 的一部分）出版。


    注册公司地址为：1 New York Plaza, New York, NY 10004, U.S.A.


    *献给我真正的挚爱：知识、我的孩子们，以及朗达。*


    # 引言


    我们生活在一个充斥着假新闻和不确定现实的时代。在这个世界里，现实已被数字魔法艺术家和人工智能从业者模糊了界限。如今，数字现实中充斥着假新闻、虚假图像和虚假人物。对许多人来说，这种不确定性和困惑令人难以承受。然而，另一些人，比如你，则试图拥抱这个数字造假的新时代，以探索新的机遇。


    本书深入探讨了驱动这种新型数字虚假现实的技术。这项技术或这种 AI/ML 形式的广义名称是*生成式建模*（GM）。它是一种 AI/ML 建模形式，旨在理解某事物代表什么，而非像其他建模形式那样对事物进行分类或预测。


    生成式建模并非新概念，而是从深度学习的应用中涌现出来的。深度学习的引入将该领域推向了主流。不幸的是，并非所有 GM 的主流应用都令人称道，或能展示这项多样化技术的强大之处。


    对于 GM 领域内外的大多数人来说，对其可能性的恐惧是真实存在且被推测的。对许多人而言，利用 GM 制造任何虚假内容都是令人憎恶且不必要的，但 GM 引入的广泛应用可以在许多任务中惠及众多行业。


    在本书中，我们假设你对深度学习和生成式建模的了解有限或甚少。你具备 Python 编程和数据科学应用的基础知识，包括数据科学中使用的微积分、线性代数和统计学等典型基础数学知识。


    我们将在本书中涵盖广泛的 GM 技术和应用，从构建深度学习网络的基础知识开始，然后逐步深入到 GM。以下是我们将探讨的各章节的简要概述：


    1.  **深度学习基础**：我们首先介绍深度学习、自编码器的基本概念，以及如何使用 PyTorch 构建简单模型。本章中的示例演示了我们将贯穿全书应用的简单概念，新手不应错过。


    2.  **释放生成对抗网络**：本章转向解释生成对抗网络（GAN）的基础知识，以及如何利用它生成新颖的内容。本章中的示例探讨了 GAN 从生成时尚物品到生成人脸的各种应用。


    3.  **探索潜在空间**：生成式建模的基础是学习某事物的潜在或隐藏表示。在本章中，我们将探讨潜在空间是如何定义的，以及如何通过超参数、损失函数和网络配置来更好地控制它。


    4.  **GAN，GAN，更多的 GAN**：本书探讨了 GAN 的多种变体，在本章中，我们将研究五种试图以不同方式学习潜在空间的 GAN 形式。我们基于前几章的知识，探讨
    GAN 学习和生成内容方式的关键差异。


    5.  **图像到图像的内容生成**：本章涵盖了 GAN 的高级应用，即通过理解翻译来增强内容生成。本章中的示例侧重于展示使用多种强大的 GAN 进行配对和未配对图像翻译。


    6.  **残差网络 GAN**：在本书中，我们将不断面临生成多样化和逼真特征的挑战。本章中的 GAN 都使用了残差网络来帮助识别和学习更逼真的特征生成。


    7.  **注意力就是一切**：本章探讨了通过自然语言处理应用引入深度学习的注意力机制。注意力提供了一种独特的能力，可以识别相关特征并将其与其他特征进行映射。本章中的示例展示了在
    GAN 中使用注意力机制的力量。


    8.  **高级生成器**：本章深入探讨了当前性能最佳的 GAN 类别。本章中的示例基于多个开源代码库，展示了 GM 领域在短时间内取得的巨大进步。


    9.  **深度伪造与人脸交换**：在本章中，我们将转换方向，探讨 GM 在制作深度伪造方面的应用。整章致力于展示使用免费开源桌面软件制作深度伪造的便捷性。


    10.  **破解深度伪造**：在本书大部分内容中，我们一直在创建深度伪造和虚假内容，现在我们将转向理解如何检测生成的内容。本章着眼于当前用于揭露虚假内容的技术和研究。未来，这些工具对于控制我们所拥抱的数字现实以及理解何为真实将至关重要。


    本书以实践性强、技术友好的方式涵盖了广泛而复杂的主题。为了充分利用本书，建议您参与并实践 40 多个示例中的几个。本书中的所有示例均已使用 Google Colab（本书推荐平台）进行测试并成功运行。虽然本书中的某些示例可能需要数天时间进行训练，但大多数示例可以在不到一小时内运行完毕。


    感谢您抽出宝贵时间阅读本书，并希望这能拓展您在 AI/ML 领域的机遇和理解。您选择的这条道路并不简单，将充满挫折和苦恼。但这也将是一条充满敬畏和惊叹的道路，尤其是在您第一次生成自己的虚假人脸时。


    # 致谢


    与许多其他书籍一样，如果没有 AI/ML 社区提供的自由知识交流，本书是不可能完成的——从孜孜不倦地改进人工智能和生成式建模领域的无数研究人员，到定期发布包含新工具和创新成果目录的开源代码库的大量
    AI 爱好者。'
- fmt: "# 1. The Basics of Deep Learning\n\nThroughout history mankind has often struggled\
    \ with making sense of what is real and what reality means. From hunter gatherers\
    \ to Greek philosophers and then to the Renaissance, our interpretation of reality\
    \ has matured over time. What we once perceived as mysticism is now understood\
    \ and regulated by much of science. Not more than 10 years ago we were on track\
    \ to understanding the reality of the universe, or so we thought. Now, with the\
    \ inception of AI, we are seeing new forms of reality spring up around us daily.\
    \ New realities being manifested by this new wave of AI are made possible by *neural\
    \ networks* and *deep learning*.\n\nDeep learning and neural networks have been\
    \ on the fringe of computer science for more than 50 years, and they have their\
    \ own mystique associated with them. For many, the abstract concepts and mathematics\
    \ of deep learning make them inaccessible. Mainstream science shunned deep learning\
    \ and neural networks for years, and in many industries they are still off-limits.\
    \ Yet, among all those hurdles, deep learning has become the brave new leader\
    \ in AI and machine learning for the 21st century.\n\nIn this book, we look at\
    \ how deep learning and neural networks work at a fundamental level. We will learn\
    \ the inner workings of networks and what makes them tick. Then we will quickly\
    \ move on to understanding how neural networks can be configured to generate their\
    \ own content and reality. From there, we will progress through many other versions\
    \ of deep learning content generation including swapping faces, enhancing old\
    \ videos, and creating new realities.\n\nFor this chapter, we will start at the\
    \ basics of deep learning and how to build neural networks for several typical\
    \ machine learning tasks. We will look at how deep learning can perform regression\
    \ and classification of data as well as understand internally the process of learning.\
    \ Then we will move on to understanding how networks can be specialized to extract\
    \ features in data with convolution. We will finish with building a full working\
    \ image classifier using supervised deep learning.\n\nAs this is the first chapter,\
    \ we will also cover several prerequisites and other helpful content to better\
    \ guide your success through this book. Here is a summary of what we will cover\
    \ in this chapter:\n\n* Prerequisites\n* Perceptrons\n* Multilayer perceptrons\n\
    * PyTorch for deep learning\n* Regression\n* Classifying classes\n\nThis book\
    \ will begin at the basics of data science, machine learning, and deep learning,\
    \ but to be successful, be sure you meet most of the requirements in the next\
    \ section.\n\n## Prerequisites\n\nWhile many of the concepts regarding machine\
    \ learning and deep learning should be taught at the high school level, in this\
    \ book we will go way beyond the basic introduction of deep learning. Generating\
    \ content with deep learning networks is an advanced endeavor that can be learned,\
    \ but to be successful, it will be helpful if you meet most of the following prerequisites:\n\
    \n* **Interest in mathematics**: You don’t need a degree in math, but you should\
    \ have an interest in learning math concepts. Thankfully, most of the hard math\
    \ is handled by the coding libraries we will use, but you still need to understand\
    \ some key differences in math concepts. Deep learning and generative modeling\
    \ use the following areas of mathematics:\n  * **Linear algebra**, working with\
    \ matrices and systems of equations\n  * **Statistics and probability**, understanding\
    \ how descriptive statistics work and basic probability theory\n  * **Calculus**,\
    \ understanding the basics of differentiation and how it can be used to understand\
    \ the rate of change\n\n* **Programming knowledge**: Ideally you have used and\
    \ programmed with Python or another programming language. If you have no programming\
    \ knowledge at all, you will want to pick up a course or textbook on Python. As\
    \ part of your knowledge of programming, you may also want to take a closer look\
    \ at the following libraries:\n  * **NumPy**^([¹](#fn1)): NumPy (pronounced “numb\
    \ pie”) is a library for manipulating arrays or tensors of numbers. It and the\
    \ concepts it applies are fundamental to machine learning and deep learning. We\
    \ will cover various uses of NumPy in this book, but it is suggested you study\
    \ it further on your own as needed.\n  * **PyTorch**^([²](#fn2)): This will be\
    \ the basis for the deep learning projects in this book. It will be assumed you\
    \ have little to no knowledge of PyTorch, but you may still want to learn more\
    \ on your own what this impressive library has to offer.\n  * **MatPlotLib** ^([³](#fn3)):\
    \ This module will be the foundation for much of the output we display in this\
    \ book. There will be plenty of examples showing how it is used, but additional\
    \ homework may be helpful.\n\n* **Data science and/or machine learning**: It will\
    \ be helpful if you have previously taken a data science course, one that covers\
    \ the statistical methods used in machine learning and what aspects to be aware\
    \ of when working with data.\n\n* **Computer**: All the examples in this book\
    \ are developed on the cloud, and while it is possible to use them with a mobile\
    \ computing device, for best results it is suggested you use a computer.\n  *\
    \ Instructions have been provided in Appendix A for setting up and using the code\
    \ examples on your local computer. This may be a consideration if you have a machine\
