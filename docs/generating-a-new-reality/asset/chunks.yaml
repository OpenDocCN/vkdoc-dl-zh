    ### 手工特征


    在许多深度伪造视频或图像中，特征重建往往存在明显缺陷。如果这些缺陷特别明显，人类创作者可能会用图形软件将其修掉。不过，这些缺陷通常并不那么明显，会作为伪造痕迹残留下来。


    要发现这些痕迹、错位特征和构造特征，可以通过多种技术来实现，这些技术旨在根据相似性对已知特征进行分类。例如，一个人在说话时可能会以某种方式倾斜头部，或者只张开特定距离的嘴巴。这些特征因人而异，难以有效模仿或迁移。


    我们可以通过使用 `OpenCV` 等软件手工构建特征，来测量头部倾斜程度、眼球运动、嘴唇运动等，从而发现某人说话方式的这些隐藏特征。然后，我们可以使用相似性特征图来比较这些测量结果，以识别与个人身份相符的面部或面部姿态。


    图 10-3 摘自 Shruti Agarwal 和 Hany Farid 的论文《保护世界领导人免受深度伪造侵害》，作者在论文中分析了使用手工特征识别深度伪造的方法。该图展示了使用几种手工特征编码对多位知名演讲者进行的比较。从图中可以明显区分出真实的巴拉克·奥巴马和经过唇形同步处理的乔丹·皮尔版本。


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig3_HTML.jpg](img/502181_1_En_10_Fig3_HTML.jpg)


    图 10-3


    展示使用手工特征识别演讲者身份


    虽然使用手工特征成功展示了不同演讲者之间的明显差异，但它仍然引入了人为偏见。理想情况下，我们希望消除人为偏见，让模型自行学习需要比较哪些特征。这就是我们将在下一节中探讨的方法。


    ### 基于学习的特征


    就像我们在 GAN 的对抗训练中开发的判别器一样，我们可以利用卷积神经网络进一步扩展这一概念，以识别和学习标记伪造的特征。正如 `FaceForensics++`
    论文所展示的，已有多种架构被用于学习伪造特征标记。


    图 10-4 是摘自 `FaceForensics++` 论文的另一张图片，展示了用于识别伪造的各种架构之间的差异，包括使用手工特征（`Steg. Features
    + SWM`）。准确率是在原始图像以及高、低质量版本上测量的。在所有情况下，`XceptionNet` 架构都是明显的赢家，我们将在本章后面介绍它。


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig4_HTML.jpg](img/502181_1_En_10_Fig4_HTML.jpg)


    图 10-4


    伪造检测中特征提取方法和模型的比较


    使用 CNN 构建特征学习模型的过程通常类似于 GAN 中的判别器。正如我们所看到的，卷积层是大多数对抗/GAN 模型中特征提取的主要方法，模型的输出通常是一个二元分类结果，用于识别图像是伪造的还是真实的。


    在 Joao C. Neves 等人的论文《GANprintR：改进的伪造与面部操纵检测技术现状评估》中，作者使用了一种技术，即重用各种 CNN 架构（如
    `ExceptionNet`）作为放置在自编码器中的学习解码器。


    图 10-5 是摘自 `GANprintR` 论文的一张图片，描述了用于去除可能将图像识别为伪造的特征的自编码器架构。该模型的训练方法是，将真实人脸输入模型，然后用一个
    `XceptionNet` 或其他识别伪造的 CNN 模型对其进行解码。


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig5_HTML.jpg](img/502181_1_En_10_Fig5_HTML.jpg)


    图 10-5


    旨在逆转伪造中特征异常的自编码器


    通过训练真实图像来识别和去除伪造标记，其结果再次提升了伪造图像的质量。然后，可以将伪造图像和内容输入模型，以类似方式去除合成图像中的伪造标记。这只是当前面部操纵领域军备竞赛的又一个例子。


    当然，正如我们在本书中反复看到的，面部或主要目标之外通常还有其他特征可以清晰地证明伪造的证据。在下一节中，我们将探讨如何利用这些伪影来识别合成图像。

    '
- fmt: '### Artifacts


    Aside from understanding how well specific features are being correctly faked
    or translated, there is always the possibility of other artifacts identifying
    a fake. Recall our previous look at the site [`https://www.whichfaceisreal.com/`](https://www.whichfaceisreal.com/)
    that demonstrated the comparison of real faces beside those generated with `StyleGAN`.


    Figure [10-6](#502181_1_En_10_Chapter.xhtml#Fig6) was extracted from the `whichfaceisreal.com`
    site as an example of how well `StyleGAN` can generate a synthetic face image.
    By looking at the faces themselves, it is difficult to determine which face is
    real or fake. Often the trick is to spot the artifacts or the lack of background
    details from image to image.


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig6_HTML.jpg](images/502181_1_En_10_Chapter/502181_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Can you identify the real face?


    Developing methods that can identify these artifacts in images can also provide
    a basis for full or partial synthetic image identification. In the paper “Do GANs
    leave artificial fingerprints?” by Francesco Marra et al. (2019 IEEE Conference
    on Multimedia Information Processing and Retrieval [MIPR], IEEE Xplore, April
    25, 2019, [`https://ieeexplore.ieee.org/document/8695364`](https://ieeexplore.ieee.org/document/8695364)),
    the authors examined the artifacts left behind through the generation of synthetic
    images using `CycleGAN`, `ProGAN`, and others.


    Figure [10-7](#502181_1_En_10_Chapter.xhtml#Fig7) shows an example of the fingerprints
    the authors were able to identify for `CycleGAN` and the `ProGAN` from photo marks.
    Each photo or image can be analyzed using a photo-response nonuniformity (`PRNU`)
    pattern to determine if and how an image may have been manipulated.


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig7_HTML.jpg](images/502181_1_En_10_Chapter/502181_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Comparison of GAN fingerprints identified at various residuals


    Based on this study of the fingerprint of images in models, we can then understand
    which parts of image may have been manipulated. Looking at Figure [10-7](#502181_1_En_10_Chapter.xhtml#Fig7),
    you can also visualize how the architecture of a GAN can contribute to this fingerprinting.
    Different architectures and feature extraction generation techniques will yield
    different fingerprints.


    The authors went even further to compare various GAN architectures and real images
    taken with a physical camera. What they found, as shown in Figure [10-8](#502181_1_En_10_Chapter.xhtml#Fig8),
    is that by comparing the correlations of fingerprints, there are easily distinguishable
    markers left behind depending on the type of GAN and the source set of images.


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig8_HTML.jpg](images/502181_1_En_10_Chapter/502181_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Example of fingerprint correlations applied to GANs/camera and training data


    Note that the table and correlation plot in Figure [10-8](#502181_1_En_10_Chapter.xhtml#Fig8)
    have an error where the corresponding `ProGAN` models need to be mapped from `G1...`
    to `P1...` in the figure. The comparison shows the average correlation between
    fingerprints, with the diagonal showing larger values for similar model comparisons
    between the same fingerprints.


    Likewise, notice from Figure [10-8](#502181_1_En_10_Chapter.xhtml#Fig8) how well
    the variations of the attributes a `StarGAN` is trained to replicate match to
    each other. We can also see how a `CycleGAN` is easily identifiable, but things
    get more difficult to discern with the `ProGAN`. Unfortunately, the others did
    not test the self-attention or the `StyleGAN` and `StyleGAN2`, which likely would
    have shown some remarkably interesting results.


    In any case, what we can certainly learn is that there are identifiable artifacts
    left behind based on the type of GAN and the way it was trained. This is something
    you may have already realized, especially if you have gone through several of
    the exercises in this book. It can be obvious how the architecture of a GAN may
    leave indiscernible artifacts in the produced fake images.


    While we leave it up to you to review all the papers mentioned in this chapter
    on your own, we will finish up the chapter by looking at some packages that may
    be used to identify various incarnations of fakes.'
