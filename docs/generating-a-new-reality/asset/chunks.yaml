    \ 128, kernel_size=4, stride=2),\n    nn.ReLU(),\n    nn.Conv2d(128, 256, kernel_size=4,\
    \ stride=2),\n    nn.ReLU(),\n    Flatten()\n    )\n    self.fc1 = nn.Linear(h_dim,\
    \ z_dim)\n    self.fc2 = nn.Linear(h_dim, z_dim)\n    self.fc3 = nn.Linear(z_dim,\
    \ h_dim)\n    self.decoder = nn.Sequential(\n    UnFlatten(),\n    nn.ConvTranspose2d(h_dim,\
    \ 128, kernel_size=5, stride=2),\n    nn.ReLU(),\n    nn.ConvTranspose2d(128,\
    \ 64, kernel_size=5, stride=2),\n    nn.ReLU(),\n    nn.ConvTranspose2d(64, 32,\
    \ kernel_size=6, stride=2),\n    nn.ReLU(),\n    nn.ConvTranspose2d(32, image_channels,\
    \ kernel_size=6, stride=2),\n    nn.Sigmoid(),\n    )\n    ```\n\n2.  This code\
    \ is like the convolutional autoencoder we looked at before. The key difference\
    \ here is the use of the three `nn.Linear` layers that now are responsible for\
    \ learning the middle encoding distribution. Previously we defined a discrete\
    \ data size as our learning representation. Have some patience: we will talk more\
    \ about learning distributions later.\n\n3.  Jump over the remaining functions\
    \ in the `ConvVAE` class and down to the block of code where the optimizer is\
    \ defined.\n\n```\n    optimizer = torch.optim.Adam(model.parameters(), lr=learning_rate)\n\
    \    def loss_fn(recon_x, x, mu, logvar):\n    BCE = F.binary_cross_entropy(recon_x,\
    \ x, size_average=False)\n    KLD = -0.5 * torch.mean(1 + logvar - mu.pow(2) -\
    \ logvar.exp())\n    return BCE + KLD, BCE, KLD\n    ```\n\n4.  We can see in\
    \ the previous code the definition of a specialize loss function `loss_fn`. The\
    \ code in this function is responsible for learning latent encoding distribution.\
    \ Again, details to come later.\n\n5.  Finally, we come to the last block of the\
    \ training code. This section is almost identical to our previous exercises. One\
    \ key difference to note, however, is the highlighted line starting with `images\
    \ =`. This line converts the images from a CPU tensor to a GPU tensor, the difference\
    \ being where the memory resides and how it is processed. Tensors processed on\
    \ GPUs can increase performance by more than 100x.\n\n```\n    for epoch in range(epochs):\n\
    \    train_loss = 0.0\n    for data in train_loader:\n    images, labels = data\n\
    \    optimizer.zero_grad()\n    images = images.to(device)\n    generated, mu,\
    \ logvar = model(images)\n    loss, bce, kld = loss_fn(generated, images, mu,\
    \ logvar)\n    loss.backward()\n    optimizer.step()\n    train_loss += loss.item()*images.size(0)\n\
    \    train_loss = train_loss/len(train_loader)\n    clear_output()\n    print(f'Epoch:\
    \ {epoch+1} Training Loss: {train_loss:.3f}')\n    plot_images(generated.cpu().data,labels,16)\n\
    \    ```\n\n6.  Keep the notebook training as you continue reading through the\
    \ next section. Be sure to check back periodically to see how the model progression\
