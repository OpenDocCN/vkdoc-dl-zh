    Pix2Pix GAN 是首批能够良好运行并产生有趣结果的图像翻译模型之一。Pix2Pix 和 UNet 被广泛用于需要分割和/或变换的各种成像应用中。在下一节中，我们将通过引入双\
    \ GAN（DualGAN）来扩展此图像翻译模型。\n\n## 双 GAN：双重视角\n\n按理说，如果我们能训练一个 GAN 来执行单向的图像到图像翻译（例如，从街道图像到卫星图像），那么我们也同样可以逆转这个过程。然后，我们或许还可以通过理解每对生成器/判别器的训练方式来考虑额外的损失指标。\n\
    \n使用双 GAN，我们通过一对生成器和判别器，利用图像配对来执行双向的图像到图像翻译。这使我们能够计算从一个域到另一个域再返回的训练图像的组合损失。这个过程被称为*循环一致性损失*。\n\
    \n循环一致性损失是一种我们将在下一章通过更多示例深入探讨的方法。在此之前，图 5-4 展示了如何基于图像配对计算循环损失。为了计算循环损失，第一组生成的图像被反馈到相反的生成器中，以便基于虚假图像生成新的\
    \ X/Y 图像。这种转换和再转换的过程被称为*循环一致性*。\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig4_HTML.jpg](img/502181_1_En_5_Fig4_HTML.jpg)\n\
    \n图 5-4\n\n计算对抗损失和循环损失\n\n通过使用循环一致性，两个生成器同时进行训练，交替使用另一个生成器生成的图像作为真实输入。这使得两个生成器都与循环损失紧密耦合。\n\
    \n对于判别器，我们还使用 Wasserstein 梯度惩罚计算来增强损失计算方法。如果你还记得，Wasserstein GAN（WGAN）计算的是两组分布数据之间的相对距离。添加梯度惩罚是一种软化\
    \ WGAN 损失函数的方法。\n\n当我们把所有这些结合起来，就得到了我们的第一个双 GAN 实例——双 GAN，我们将在练习 5-4 中演示。这个 GAN\
    \ 使用两个生成器和两个判别器的组合来协同工作。这意味着配对判别器和生成器的损失计算是相互结合的。我们将在下一个练习中看到这一切是如何整合在一起的。\n\n\
    练习 5-4. 双 GAN：双重视角\n\n1. 从 GitHub 项目站点打开`GEN_5_DualGAN.ipynb`笔记本。如果不确定如何操作，请查阅附录\
    \ B。\n\n2. 如果尚未运行，请选择“运行时” ➤ “全部运行”来运行整个笔记本。向下滚动并打开`Hyperparameters`部分；然后查看定义的新变量，总结如下：\n\
    \n```\nlambda_adv = 1,\nlambda_cycle = 10,\nlambda_gp = 10\n```\n\n3. `lambda_adv`超参数是对抗损失修正因子。`lambda_cycle`用于缩放循环损失，而`lambda_gp`是梯度惩罚损失，我们稍后会介绍。\n\
    \n4. 我们之前已经多次介绍过大部分代码，因此只需在向下滚动到训练代码块时，快速浏览其他代码部分即可。务必查看模型是如何构建的。我们首先来看生成器损失是如何计算的，如下所示：\n\
    \n```\n# 将图像翻译到相反域\nfake_A = G_BA(imgs_B)\nfake_B = G_AB(imgs_A)\n# 重建图像\nrecov_A\
    \ = G_BA(fake_B)\nrecov_B = G_AB(fake_A)\n# 对抗损失\nG_adv = -torch.mean(D_A(fake_A))\
    \ - torch.mean(D_B(fake_B))\n# 循环损失\nG_cycle = cycle_loss(recov_A, imgs_A) + cycle_loss(recov_B,\
    \ imgs_B)\n# 总损失\nG_loss = hp.lambda_adv * G_adv + hp.lambda_cycle * G_cycle\n\
    ```\n"
- fmt: "5.  We have two generators, one for generating images from domain A to B and\
    \ another going from B to A named `G_AB` and `G_BA`, respectively. Notice how\
    \ we pass the fake/generated images back into the opposing generators to create\
    \ `recov_A` and `recov_B` outputs. The reconverted images are used to calculate\
    \ the cycle consistency loss. After the various images are generated, then we\
    \ first calculate adversarial loss by passing in the fakes to the respective discriminator\
    \ `D_A` or `D_B`. Next, cycle loss is calculated from comparisons between the\
    \ reconverted images and originals. Thus, we determine how much error is in a\
    \ full translation from generator A > B and B > A. Finally, the total `G_loss`\
    \ is calculating by summing up the values and applying the lambda scaling hyperparameters.\n\
    \n6.  Next look at the discriminator section and look at the loss calculation\
    \ shown here:\n\n```\n# Compute gradient penalty for improved wasserstein training\n\
    gp_A = compute_gradient_penalty(D_A, imgs_A.data, fake_A.data)\n# Adversarial\
    \ loss\nD_A_loss = -torch.mean(D_A(imgs_A)) + torch.mean(D_A(fake_A)) + hp.lambda_gp\
    \ * gp_A\n# Compute gradient penalty for improved wasserstein training\ngp_B =\
    \ compute_gradient_penalty(D_B, imgs_B.data, fake_B.data)\n# Adversarial loss\n\
    D_B_loss = -torch.mean(D_B(imgs_B)) + torch.mean(D_B(fake_B)) + hp.lambda_gp *\
    \ gp_B\n# Total loss\nD_loss = D_A_loss + D_B_loss\nD_loss.backward()\noptimizer_D_A.step()\n\
    optimizer_D_B.step()\n```\n\n7.  For the discriminator loss, we are using the\
    \ special function `compute_gradient_penalty` that we will get too shortly. This\
    \ function takes the discriminator (A or B) and the real and fake images for the\
    \ respective domain (A or B). From this we calculate two forms of adversarial\
    \ loss; `D_A_loss`/`D_B_loss` combines normal adversarial loss plus the previous\
    \ gradient penalty loss again scaled by `lambda_gp`. Finally, total loss is combined\
    \ from the two domain A/B losses. Notice at the end of the code how we use two\
    \ different optimizers to train the weights in the discriminators. This contrasts\
    \ with the generators, which use only a single optimizer.\n\n8.  Our last step\
    \ will be to move back up to the `compute_gradient_penalty` function, as shown\
    \ here:\n\n```\ndef compute_gradient_penalty(D, real_samples, fake_samples):\n\
    \    alpha = FloatTensor(np.random.random((real_samples.size(0), 1, 1, 1)))\n\
    \    interpolates = (alpha * real_samples + ((1 - alpha) * fake_samples)).requires_grad_(True)\n\
    \    validity = D(interpolates)\n    fake = Variable(FloatTensor(np.ones(validity.shape)),\
    \ requires_grad=False)\n    # Get gradient w.r.t. interpolates\n    gradients\
    \ = autograd.grad(\n        outputs=validity,\n        inputs=interpolates,\n\
    \        grad_outputs=fake,\n        create_graph=True,\n        retain_graph=True,\n\
    \        only_inputs=True,\n    )[0]\n    gradients = gradients.view(gradients.size(0),\
    \ -1)\n    gradient_penalty = ((gradients.norm(2, dim=1) - 1) ** 2).mean()\n \
    \   return gradient_penalty\n```\n\n9.  This function is based on the Wasserstein\
    \ GP loss from Chapter [4](#502181_1_En_4_Chapter.xhtml). Recall that this converts\
    \ the Wasserstein earth mover’s method of measuring differences in distributions\
    \ using a gradient penalty rather than a clipping function.\n\nAs shown in Figure\
    \ [5-5](#502181_1_En_5_Chapter.xhtml#Fig5), this GAN is quite efficient at learning\
    \ image to image translation across both domains and back. This results in the\
    \ figure showing the domain translation from A to B and back again. After just\
    \ a few epochs, the double GANs are making short work of learning the domain to\
    \ domain translation.\n\nFrom image to image paired translation, we can start\
    \ to move on to consider other possibilities of image translation models. In the\
    \ next section, we consider our first model that assumes not every image has one\
    \ correct translation.\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig5_HTML.jpg](images/502181_1_En_5_Chapter/502181_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5\n\nTraining output of DualGAN for image to image translation\n\n\
    ## Riding the Latent Space on the BicycleGAN\n\nA major downfall in image paired\
    \ translations is the assumption that each image has only one correct translation.\
    \ This is often not the case, and one image or phrase in a language could have\
    \ multiple correct meanings in the other domain.\n\nThe BicycleGAN introduced\
    \ the assumption that every input image had multiple correct translations and\
    \ not just one. However, to perform this feat, this form of GAN uses an old friend,\
    \ the variational autoencoder, to better map across the learned distribution.\n\
    \nNow, instead of paired generators and discriminators, this model uses a generator\
    \ and VAE encoder, as shown in Figure [5-6](#502181_1_En_5_Chapter.xhtml#Fig6).\
    \ From the figure, A and B denote the different image domains, where ![$$ \\hat{B}\
    \ $$](images/502181_1_En_5_Chapter/502181_1_En_5_Chapter_TeX_IEq1.png) represents\
    \ the output of A. The *G* denotes the generator, and *E* denotes the encoder,\
    \ where *D* of course is the discriminator. The functions *N*(*z*) and *Q*(*z*|*B*)\
    \ are sampling functions where the output is passed to the *KL* block. KL stands\
    \ for Kullback-Leibler and is another way to measure differences in distribution\
    \ outputs.\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig6_HTML.jpg](images/502181_1_En_5_Chapter/502181_1_En_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6\n\nThe BicycleGAN architecture\n\nThe *L1* and *L1+D* denotes the\
    \ cycle loss or the amount of loss from translating to and back again. We will\
    \ cover other examples of cycle loss in Chapter [6](#502181_1_En_6_Chapter.xhtml).\n\
    \nFigure [5-6](#502181_1_En_5_Chapter.xhtml#Fig6) should provide the basic intuition\
    \ behind how the BicycleGAN functions, but of course we want to dig into the code\
    \ and see it run as well. In Exercise 5-5, we use the BicycleGAN to generate multiple\
    \ possible translations from a single image pairing.\n\nEXERCISE 5-5\\. RIDING\
    \ THE LATENT SPACE\n\n![../images/502181_1_En_5_Chapter/502181_1_En_5_Fig7_HTML.jpg](images/502181_1_En_5_Chapter/502181_1_En_5_Fig7_HTML.jpg)\n\
    \nFigure 5-7\n\nExample output from training the BicycleGAN\n\n1.  Open the `GEN_5_BicycleGAN.ipynb`\
    \ notebook from the GitHub project site. If you are unsure how, then consult Appendix\
    \ B. Run the whole notebook by selecting Runtime ➤ Run all if you have not already\
    \ done so. Scroll down and open the `Hyperparameters` section to see the new variables\
    \ defined, as summarized here:\n\n```\nlambda_pixel=10,\nlambda_latent=.5,\nlambda_kl=.01\n\
    ```\n\n2.  These hyperparameters are all used to scale the various loss outputs.\
    \ Where pixel denotes pixel-wise loss, `latent` denotes the latent space encoding\
    \ loss from the encoder and `kl` the Kullback-Leibler loss from the learned distributions.\n\
    \n3.  Scroll down to the models’ section and specifically to the `Encoder` model\
    \ , as shown here:\n\n```\nclass Encoder(nn.Module):\n    def __init__(self, latent_dim,\
    \ input_shape):\n        super(Encoder, self).__init__()\n        resnet18_model\
    \ = resnet18(pretrained=False)\n        self.feature_extractor = nn.Sequential(*list(resnet18_model.children())[:-3])\n\
    \        self.pooling = nn.AvgPool2d(kernel_size=8, stride=8, padding=0)\n   \
    \     # Output is mu and log(var) for reparameterization trick used in VAEs\n\
    \        self.fc_mu = nn.Linear(256, latent_dim)\n        self.fc_logvar = nn.Linear(256,\
    \ latent_dim)\n\n    def forward(self, img):\n        out = self.feature_extractor(img)\n\
    \        out = self.pooling(out)\n        out = out.view(out.size(0), -1)\n  \
    \      mu = self.fc_mu(out)\n        logvar = self.fc_logvar(out)\n        return\
    \ mu, logvar\n```\n\n4.  There are a couple key things to note about the `Encoder`\
    \ class. First this encoder is using an existing model called `resnet18` as a\
    \ feature extractor. We will learn more about the ResNet model in Chapter [6](#502181_1_En_6_Chapter.xhtml)\
    \ as well as how we can reuse pretrained models. Using pretrained models is known\
    \ as *transfer learning* .\n\n5.  Next, we will look at a summary of how the models\
    \ and optimizers are created here:"
