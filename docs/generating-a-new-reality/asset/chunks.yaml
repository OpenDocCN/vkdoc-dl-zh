- fmt: "# Classifying MNIST Digits\n\nIn deep learning, we have several standard beginning\
    \ datasets we can both learn from and test new methods with. As deep learning\
    \ matures, these beginner or test datasets have gotten more sophisticated, but\
    \ we can still use some of the old standards to learn by.\n\nFor the next exercise,\
    \ we will look at the MNIST handwritten digits dataset to perform classification\
    \ using a multiple-layer network. Each digit is a 28×28-pixel image that will\
    \ represent 784 inputs into our network. Since there are 10 classes of digits,\
    \ our output layer will also output to 10 neurons. We will see how this is constructed\
    \ in Exercise 1-5.\n\n## EXERCISE 1-5. CLASSIFYING MNIST WITH PYTORCH\n\n1.  Open\
    \ the `GEN_1_classify_pytorch.ipynb` notebook from the project’s GitHub site.\
    \ If you are unsure on how to access the source, check Appendix B.\n\n2.  In this\
    \ example, we are going to use the `torchvision.datasets` module to load the MNIST\
    \ dataset so the imports will be slightly different.\n\n    ```python\n    import\
    \ os\n    import torch\n    import torch.nn as nn\n    from torch.autograd import\
    \ Variable\n    import torchvision.datasets as dset\n    import torchvision.transforms\
    \ as transforms\n    import torch.nn.functional as F\n    import torch.optim as\
    \ optim\n    ```\n\n3.  The next block of code will set up a data folder in the\
    \ root and create it. This is where the next lines of code will download the dataset\
    \ to. Before that, though, we use the `transforms` object to create a tensor transformation\
    \ to transform the data. We need to do this because the data is represented as\
    \ grayscale bytes with values of 0–255. The transform code normalizes this data\
    \ to values between 0 and 1.\n\n    ```python\n    root = './data'\n    if not\
    \ os.path.exists(root):\n        os.mkdir(root)\n    trans = transforms.Compose([transforms.ToTensor(),\n\
    \                                transforms.Normalize((0.5,), (1.0,))])\n    train_set\
    \ = dset.MNIST(root=root, train=True,\n                           transform=trans,\
    \ download=True)\n    test_set = dset.MNIST(root=root, train=False,\n        \
    \                  transform=trans, download=True)\n    print(train_set)\n   \
    \ print(test_set)\n    ```\n\n4.  Moving down the next block creates the batches\
    \ of data using the `DataLoader` class. `DataLoader` batches the data so that\
    \ it can be more efficiently served to the network as well as provides options\
    \ to shuffle the data. In this code block, we create two loaders, one for training\
    \ and the other test.\n\n    ```python\n    batch_size = 128\n    train_loader\
    \ = torch.utils.data.DataLoader(\n        dataset=train_set,\n        batch_size=batch_size,\n\
    \        shuffle=True)\n    test_loader = torch.utils.data.DataLoader(\n     \
    \   dataset=test_set,\n        batch_size=batch_size,\n        shuffle=False)\n\
    \    print(len(train_loader))\n    print(len(test_loader))\n    ```\n\n5.  Our\
    \ next step is to create a new MLP model. This network will take as inputs a digit\
    \ of 28×28 pixels as input and push that down to 500 neurons and then from 500\
    \ to 256 and eventually down to 10. Remember the output of 10 neurons represents\
    \ one output for each class in our dataset.\n\n    ```python\n    class MLP(nn.Module):\n\
    \        def __init__(self):\n            super(MLP, self).__init__()\n      \
    \      self.fc1 = nn.Linear(28*28, 500)\n            self.fc2 = nn.Linear(500,\
    \ 256)\n            self.fc3 = nn.Linear(256, 10)\n        def forward(self, x):\n\
    \            x = x.view(-1, 28*28)\n            x = torch.relu(self.fc1(x))\n\
    \            x = torch.relu(self.fc2(x))\n            x = torch.sigmoid(self.fc3(x))\n\
    \            return x\n        def name(self):\n            return \"MLP\"\n \
    \   ```\n\n6.  With the MLP model class defined, we can move to instantiating\
    \ the class as well as creating an optimizer and loss function. Notice the loss\
    \ function is of type `CrossEntropyLoss` since this is a classification problem.\n\
    \n    ```python\n    model = MLP()\n    optimizer = optim.SGD(model.parameters(),\
    \ lr=0.01, momentum=0.9)\n    loss_fn = nn.CrossEntropyLoss()\n    ```\n\n7. \
    \ We next come to the training block of code, which again is quite similar to\
    \ our last couple of exercises. In this example, since we are using a `DataLoader`,\
    \ there are a few subtle differences you should note.\n\n    ```python\n    epochs\
    \ = 10\n    history=[]\n    for epoch in range(epochs):\n        avg_loss = 0\n\
    \        for batch_idx, (x, y) in enumerate(train_loader):\n            optimizer.zero_grad()\n\
    \            x, y = Variable(x), Variable(y)\n            y_pred = model(x)\n\
    \            loss = loss_fn(y_pred, y)\n            avg_loss = avg_loss * 0.9\
    \ + loss.data * 0.1\n            history.append(avg_loss)\n            loss.backward()\n\
    \            optimizer.step()\n            if (batch_idx+1) % 100 == 0 or (batch_idx+1)\
    \ == len(train_loader):\n                print(f'epoch: {epoch}, batch index:'\
    \ +\n                      f'{batch_idx+1}, train loss: {avg_loss:.6f}')\n   \
    \ ```\n\n8.  At this stage, add another code block to the notebook and use the\
    \ code from the previous exercises to output a plot of the history.\n\n9.  As\
    \ another extended exercise, you can also add code to test the test dataset to\
    \ see how well your model is fitting to the data.\n\nAside from doing validation\
    \ on the test set, we could also use the model to predict classes on known digits.\
    \ This would allow us to see how the model was performing. We won’t worry about\
    \ going through those extra steps just yet, though. We will leave that for the\
    \ heavy lifting and more thorough data visualizations in Chapter 2, where we start\
    \ looking at the foundations of generative modeling.\n\n## Conclusion\n\nDeep\
    \ learning and neural networks have been brewing in the back of academia for decades,\
    \ and it was not until relatively recently that their true power has been unleashed.\
    \ Unleashing this power required the alignment of several factors such as improved\
    \ GPU processes, big data, and data science as well as an increased interest in\
    \ machine learning technologies. While these factors held up the science of deep\
    \ learning, it was the discoveries in generative modeling that have really pushed\
    \ the envelope and imagination of AI researchers.\n\nIn this chapter, we introduced\
    \ deep learning and how it works, from the basic perceptron to the MLP and deep\
    \ learning networks. We learned how to train these networks using supervised learning\
    \ to perform regression and classification. For the rest of this book, we will\
    \ advance to a form of learning called *unsupervised* and/or *self-supervised\
    \ learning* as well as other advanced methods called *adversarial learning*.\n\
    \nIn the next chapter, we explore the basics of unsupervised learning with autoencoders\
    \ and then move on to adversarial learning with generative adversarial networks.\n\
    \nFootnotes [1](#502181_1_En_1_Chapter.xhtml#Fn1_source) [2](#502181_1_En_1_Chapter.xhtml#Fn2_source)\
    \ [3](#502181_1_En_1_Chapter.xhtml#Fn3_source)"
