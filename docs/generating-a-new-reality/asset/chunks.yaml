    distribution and the real distribution becomes too large, the generator will stall
    and suffer from a vanishing gradient problem.


    Figure [4-2](#502181_1_En_4_Chapter.xhtml#Fig2) shows how the expected generated
    distribution and the discriminators’ expectation of the real distribution may
    converge or diverge during training. As the discriminator gets better at identifying
    fake and real images, this may increase divergence between the generated expected
    distribution. Likewise, if the generator is poorly configured, it may start out
    with a poor expectation or not be able to learn the expected distribution.


    ![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig2_HTML.jpg](images/502181_1_En_4_Chapter/502181_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Understanding generator and discriminator expectation


    If the expected real and generated distributions become too diverse or separate
    with no overlap, then the generator will suffer from vanishing gradient loss.
    Vanishing gradients are an issue in that the loss gradient becomes so small that
    it has no effect on training the model. What we see is the generator model will
    just stall, not making any progress.


    The mathematics behind why the loss vanishes are beyond the scope of the book.
    However, the intuition here is that as the expected real and generated distributions
    diverge with no overlap, this becomes problematic. We have two important concepts
    to take away from this knowledge.


    First, our generator and discriminator models need to be trained in tandem with
    neither gaining clear superiority over the other. The better the expected and
    generated distribution matches, the better our models will train. A discriminator
    too good at identifying fakes versus real early on makes the challenge of the
    generator insurmountable.


    Second, by understanding what problems may occur, we can look to more advanced
    solutions to try to address generator training problems. Fortunately, the advent
    of the GAN has introduced hundreds of new methods to try to resolve these issues.


    Fortunately, there are several ways of determining the distance or accounting
    for that distance using different approaches. The first approach we will look
    at is called Wasserstein distance, and hence the name of our next GAN is called
    the Wasserstein GAN (WGAN).'
  trans: '

    # 揭开 GAN 的数学原理


    为了更好地理解生成对抗网络（GAN）的学习机制，掌握其背后的数学原理（或至少是数学直觉）至关重要。幸运的是，我们在第 3 章讨论变分自编码器（VAE）时，已经接触过其中一些数学基础。如果你还记得，VAE
    通过理解和建模输入数据的分布来学习，然后从该学习到的分布中生成样本。


    事实证明，GAN 的数学原理与 VAE 类似，它们都通过理解试图辨别或生成的分布来学习。然而，我们用于实现这一目标的数学推导方式略有不同。从底层理解 GAN
    的工作原理，对于在后续训练中修复或解决问题至关重要。


    我们将从 GAN 中使用的基本损失函数——二元交叉熵损失函数开始，如下所示：


    ![../images/502181_1_En_4_Chapter/502181_1_En_4_Figa_HTML.png](img/502181_1_En_4_Figa_HTML.png)


    其中：


    ![$$ y= originaldata $$](img/502181_1_En_4_Chapter_TeX_Equb.png)


    ![../images/502181_1_En_4_Chapter/502181_1_En_4_Figb_HTML.png](img/502181_1_En_4_Figb_HTML.png)


    为了优化这个函数，我们首先来看如何确定判别器的损失。在训练判别器时，对于真实数据，我们假设 `y = 1`。相反，对于生成的数据，我们令 ；然后代入最后一个方程，得到判别器的损失如下：


    ![$$ L\left(D(x),1\right)=\mathit{\log}\left(D(x)\right) $$](img/502181_1_En_4_Chapter_TeX_Equd.png)


    ![../images/502181_1_En_4_Chapter/502181_1_En_4_Figc_HTML.png](img/502181_1_En_4_Figc_HTML.png)


    ；然后代入最后一个方程，得到判别器的损失如下：


    接着，对于生成器生成的输出，我们假设 `y = 0`（假数据），然后 ，其中 `z` 表示随机样本向量空间。将其代回损失方程，得到生成器的损失如下：


    ![$$ L\left(D\left(G(z)\right),0\right)=\mathit{\log}\left(1-D\left(G(z)\right)\right)
    $$](img/502181_1_En_4_Chapter_TeX_Eque.png)


    ![../images/502181_1_En_4_Chapter/502181_1_En_4_Figd_HTML.png](img/502181_1_En_4_Figd_HTML.png)


    ，其中


    然后我们可以将两个方程的损失合并，并通过最大化来确定总的判别器损失，如下所示：


    ![$$ {L}^{(D)}=\mathit{\max}\left[\mathit{\log}\left(D(x)\right)+\mathit{\log}\left(1-D\left(G(z)\right)\right)\right]
    $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equf.png)


    由于生成器与判别器相互对抗，它的任务是执行相反的操作，因此，我们通过以下公式计算生成器的最小损失：


    ![$$ {L}^{(G)}=\mathit{\min}\left[\mathit{\log}\left(D(x)\right)+\mathit{\log}\left(1-D\left(G(z)\right)\right)\right]
    $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equg.png)


    为了简化这一视图，我们可以使用如下简写方程将这两个方程合并：


    ![$$ L={\displaystyle \begin{array}{c}\mathit{\min}\\ {}G\end{array}}{\displaystyle
    \begin{array}{c}\mathit{\max}\\ {}D\end{array}}\left[\mathit{\log}\left(D(x)\right)+\mathit{\log}\left(1-D\left(G(z)\right)\right)\right]
    $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equh.png)


    现在，上述损失函数仅定义了单个像素或数据点上的损失量。为了覆盖整个图像或数据集，我们需要展开方程，使其与 Ian Goodfellow 及其同事在 GAN
    论文中提出的原始 GAN 方程相匹配：


    ![$$ {\displaystyle \begin{array}{c}\mathit{\min}\\ {}G\end{array}}{\displaystyle
    \begin{array}{c}\mathit{\max}\\ {}D\end{array}}V\left(D,G\right)={\displaystyle
    \begin{array}{c}\mathit{\min}\\ {}G\end{array}}{\displaystyle \begin{array}{c}\mathit{\max}\\
    {}D\end{array}}\left({E}_{xPdata(x)}\left[\mathit{\log}\left(D(x)\right)\right]+{E}_{zP(z)}\left[\mathit{\log}\left(1-D\left(G(z)\right)\right)\right]\right)
    $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equi.png)


    其中：


    `E[xPdata(x)]` 是真实数据的期望或分布。


    `E[zP(z)]` 是假数据的期望分布。


    这意味着我们试图优化期望的生成分布，使其与真实或实际的数据分布相匹配。同样，这与我们之前对 VAE 的探讨并无二致，其目标都是优化采样分布。我们经常会看到该方程被重写如下：


    ![$$ {E}_x\left[\mathit{\log}\left(D(x)\right)\right]+{E}_z\left[1-\mathit{\log}\left(D\left(G(z)\right)\right)\right]
    $$](images/502181_1_En_4_Chapter/502181_1_En_4_Chapter_TeX_Equj.png)


    现在，问题变成了我们的生成器能够多好地学习建模真实数据分布。然而，在实践中，如果生成分布与真实分布之间的差异变得过大，生成器将会停滞，并遭受梯度消失问题。


    图 4-2 展示了在训练过程中，期望的生成分布与判别器对真实分布的期望可能如何收敛或发散。随着判别器在识别真假图像方面变得更好，这可能会增加生成期望分布的发散程度。同样，如果生成器配置不当，它可能一开始就具有较差的期望，或者无法学习到期望的分布。


    ![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig2_HTML.jpg](img/502181_1_En_4_Fig2_HTML.jpg)


    图 4-2


    理解生成器与判别器的期望


    如果期望的真实分布和生成分布变得过于多样或分离，且没有重叠，那么生成器将遭受梯度消失损失。梯度消失是一个问题，因为损失梯度变得非常小，以至于对训练模型没有影响。我们会看到生成器模型停滞不前，没有任何进展。


    梯度消失背后的数学原理超出了本书的范围。然而，这里的直觉是，随着期望的真实分布和生成分布发散且没有重叠，这就会成为问题。从这个知识中，我们可以得出两个重要的概念。


    首先，我们的生成器和判别器模型需要协同训练，任何一方都不能获得明显的优势。期望分布与生成分布匹配得越好，我们的模型训练效果就越好。一个在早期就能很好区分真假图像的判别器，会使生成器面临无法逾越的挑战。


    其次，通过理解可能发生的问题，我们可以寻找更先进的解决方案来尝试解决生成器训练问题。幸运的是，GAN 的出现引入了数百种新方法来解决这些问题。


    幸运的是，有几种方法可以使用不同的方法来衡量距离或解释该距离。我们将探讨的第一种方法称为 Wasserstein 距离，因此我们接下来要介绍的 GAN 被称为
    Wasserstein GAN（WGAN）。

