  trans: "\n### 权重解调\n\n`AdaIN`层源于早期一个名为*神经风格迁移*的概念，该概念能够捕捉并迁移风格。然而，`StyleGAN2`的作者发现，诸如水滴或污渍之类的视觉伪影，会因风格的强化而通过图像传播。\n\
    \n相反，他们发现可以将`AdaIN`层移至卷积层内部，不再作为直接输入，而是作为归一化层融入其中。\n\n将风格归一化融入卷积层本身的好处在于实现了计算的并行化，从而使模型训练速度提升高达\
    \ 40%，并进一步消除了水滴或污渍等视觉伪影。\n\n### 路径长度正则化\n\n这为损失函数引入了一个新的归一化项，以更好地平滑或均匀化潜在空间。我们在本书中多次看到，在生成模型中归一化或均匀化潜在空间的重要性。这是理解如何生成能够产生一致输出的模型的关键概念。\n\
    \n平滑潜在空间使得图像能够更容易地映射到该空间并从该空间映射出来，在已知的投影中，这不仅能实现更可控的图像生成，还能将图像投影回潜在空间编码。理解从潜在空间到生成图像的这种关系，使得能够沿着潜在空间的路径生成图像。\n\
    \n平滑和理解潜在空间的能力为从动画到年龄增长等更多应用提供了可能。这些应用已通过`StyleGAN2`在风格和特征间的动画生成中成功展示。\n\n###\
    \ 惰性正则化\n\n应用路径长度正则化可能是一个计算成本高昂的过程，且并非每次训练迭代都能带来收益。因此，在`StyleGAN2`中，`PLR`仅每`n`次迭代应用一次，其中`n`通常设置为`16`，但也可调整。\n\
    \n### 无需渐进式增长\n\n正如我们所看到的，渐进式增长 GAN 成功地从`4×4`像素构建出高达`1024×1024`像素的大尺度图像。然而，`ProGAN`通常会出现对某些特征（如鼻子、眼睛和嘴巴）的强烈位置偏好。\n\
    \n为了绕过这些问题，同时仍能实现生成器模型的渐进式发展，我们转向另一篇近期论文：Animesh Karnewar 和 Oliver Wang 的《生成对抗网络的多尺度梯度》。该论文提出了使用单一架构实现多尺度梯度的概念。\n\
    \n图 8-6 展示了多尺度梯度 GAN（`MSG-GAN`）的架构，请勿将其与食品添加剂混淆。在`MSG-GAN`中，模型被设计为基于我们在`ProGAN`中看到的相同渐进过程，逐步构建生成输出。\n\
    \n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig6_HTML.jpg](img/502181_1_En_8_Fig6_HTML.jpg)\n\
    \n**图 8-6**  \n`MSG-GAN`架构\n\n`StyleGAN`的作者采用了这种渐进模型，并通过输入/输出跳跃连接实现，这与我们在`ResNet`中看到的类似。图\
    \ 8-7 展示了`MSG-GAN`、输入/输出跳跃连接和`ResNet`三种模型架构差异的对比。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig7_HTML.jpg](img/502181_1_En_8_Fig7_HTML.jpg)\n\
    \n**图 8-7**  \n渐进式架构对比\n\n`StyleGAN2`中使用的跳跃连接架构可以执行与`ProGAN`相同的特征粒度渐进式增长，使模型能够更专注于更高层级的进展（例如`1024×1024`分辨率），而非通过常规的渐进式发展。当使用大型网络进行扩展时，这种增强效果会进一步放大，我们将在下一节看到。\n\
    \n### 大型网络\n\n通过对`ResNet`的探索，我们看到了一个典型的只有 10 层或更少卷积层的浅层模型，如何通过跳跃连接的魔力，增加到拥有超过\
    \ 100 层的生成器。与`ResNet`类似，`StyleGAN2`也可以通过采用输入/输出跳跃连接，从超大型网络中获益。\n\n图 8-8 比较了`StyleGAN`和`StyleGAN2`各自的特征贡献。请记住，`StyleGAN`使用基本的渐进式增长架构，而`StyleGAN2`使用`MSG`输入/输出跳跃连接，使模型能够更专注于我们通常在更高层级（如`1024×1024`）生成的精细细节。x\
    \ 轴表示渐进层级，y 轴表示生成目标尺寸输出时的准确率百分比。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig8_HTML.jpg](img/502181_1_En_8_Fig8_HTML.jpg)\n\
    \n**图 8-8**  \n特征对各自输出的贡献对比\n\n通过构建大型网络，模型生成器可以更加强调从较高层级发展而来的特征。如图 8-9 所示，与常规的`StyleGAN`相比，大型网络中`1024×1024`的特征得到了更显著的强调。\n\
    \n现在我们已经理解了`StyleGAN`和`StyleGAN2`的所有特性，我们可以继续使用一个已有的包来训练一个版本。在练习 8-2 中，我们将使用我们的老朋友`CelebA`数据集来训练一个`PyTorch`版本的`StyleGAN2`。让我们进入下一个练习，训练一个`StyleGAN2`来为我们服务。\n\
    \n**练习 8-2. 训练 STYLEGAN2**\n\n1.  从 GitHub 项目站点打开`GEN_8_StyleGAN2.ipynb`笔记本。如果不确定如何操作，请查阅附录\
    \ B。\n\n2.  这个模型训练可能需要相当长的时间，但结果是值得的，同样，生成的已保存模型也值得保留。考虑到这一点，对于这个笔记本，我们将使用附录 C\
    \ 中讨论的功能，这些功能允许我们连接到 Google Drive 并永久保存模型。笔记本顶部的单元格提供了连接到你的 Google Drive 的功能。\n\
    \n3.  接下来，我们将使用以下代码安装用于`StyleGAN2`的`PyPi`包`stylegan2_pytorch`：\n\n```\n!pip install\
    \ stylegan2_pytorch --quiet\n```\n\n4.  接下来的代码块会下载`CelebA`的图像，并将它们解压到你的 Google\
    \ Drive 上一个名为`stylegan2`的文件夹中。\n\n5.  现在，当你下载`CelebA`数据集时，它将被保存到你的 Google Drive\
    \ 中。这意味着后续运行此笔记本时，可以直接引用已保存的文件夹，而无需重新下载数据。同样，关于设置将数据和模型保存到 Google Drive 以及从中加载的详细信息，请参阅附录\
    \ C。\n\n6.  最后，我们可以使用以下代码直接针对保存的图像文件夹运行模型。注意变量`image_folder`前的`$`符号。我们使用`$`将 Python\
    \ 代码中的变量替换到 shell 中。\n\n![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig9_HTML.jpg](img/502181_1_En_8_Fig9_HTML.jpg)\n\
    \n**图 8-9a**  \n训练过程中检查生成的输出\n\n7.  当你运行最后一个单元格时，模型将被设置好并开始从保存的图像文件夹中摄取真实图像。在运行代码时，输出会被保存到你的\
    \ Google Drive 中`stylegan2`文件夹下的`results`子文件夹中。除了生成的输出，当前训练点的模型也会被保存到另一个名为`models`的文件夹中。关于如何加载/保存模型，请参阅附录\
    \ C。\n\n8.  你可以随时通过左侧的文件夹图标打开文件文件夹来查看生成的输出。然后向下导航到`gdrive/MyDrive/stylegan2/results/default`文件夹，如图\
    \ 8-9a 所示。\n\n```\n!stylegan2_pytorch --data $image_folder\n```\n"
- fmt: '在`Figure [8-9a](#502181_1_En_8_Chapter.xhtml#Fig9)`中，你可以看到10%训练的结果。注意与我们之前的示例相比，人脸生成质量的关键差异。某些图像中仍然存在不悦目的视觉伪影，但总体而言，图像和人脸的细节非常精致。


    `StyleGAN`和`StyleGAN2`确实改进了整体生成模型，并增加了若干功能以提供出色的特征提取和图像隔离能力，以至于连我们人类都难以分辨真假。我们将在第[10](#502181_1_En_10_Chapter.xhtml)章中探讨识别假图像和深度伪造的方法。


    上一个练习中包含了另外两个数据集：`cars_all`和`foods`。`cars_all`数据集包含60,000张新款车型的照片，从外部和内部的不同角度拍摄。`foods`数据集包含80,000张各种菜肴的照片，盛放在盘子、碗或其他餐具中。`Figure
    [8-9b](#502181_1_En_8_Chapter.xhtml#Fig10)`展示了两个数据集训练至100%完成度的示例，这在`Colab`上大约需要两到三天，并且可能需要多次重启。


