    ![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig6_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Adjusting the learning rate


    The primary takeaway from this is that the learning rate is often our most sensitive
