    \ notice two things. The first is that our previous exercise runs much quicker,\
    \ and the second is the results with convolution are ten times better. Convolution\
    \ requires more parameters and thus more training time. These training times can\
    \ be dramatically reduced by using CUDA or a GPU. In later sections and chapters,\
    \ we will use GPU processing where applicable.\n\nIn the previous exercise, we\
    \ also used a new layer called `Dropout`. Dropout layers are special layers that\
    \ randomly turn off a percentage of neurons for each training iteration. The number\
    \ of random neurons turned off is set at the instantiation and is typically .2\
    \ to .5 or 20 to 50 percent. By turning off random neurons in each training pass,\
    \ the network has to shift to becoming more generalized and less specialized.\
    \ Dropout layers are the first cure we select if we diagnose a network as overfitting\
    \ or memorizing data points. (In Chapter [1](#502181_1_En_1_Chapter.xhtml) we\
    \ discussed over- and underfitting.)\n\nFigure [2-7](#502181_1_En_2_Chapter.xhtml#Fig7)\
    \ shows a visualization from the TensorSpace.js Playground at [`https://tensorspace.org/html/playground`](https://tensorspace.org/html/playground).\
    \ This is an excellent resource to look at and understand how convolution and\
    \ deep learning layers do what they do.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig7_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7\n\nTensorSpace.js Playground\n\nConvolutional layers can help us\
    \ classify but also can provide added benefit when doing generative modeling.\
    \ However, when we generate content with convolution, we must apply the opposite\
    \ of filtering called *transposition* . We will cover using CNN in autoencoders\
    \ with transposition in the next section."
  trans: "\n# 使用卷积提取特征\n\n直到 2012 年，利用神经网络进行图像分析的方法，都是将图像展平为一维向量。我们在处理 MNIST 手写数字和\
    \ Fashion 数据集时已经多次这样做过。在这些案例中，我们将 28×28 像素的图像数据展平为包含 784 个像素的一维向量。图 2-4 展示了深度学习中将图像展平的过程。\n\
    \n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig4_HTML.jpg](img/502181_1_En_2_Fig4_HTML.jpg)\n\
    \n**图 2-4** 将图像展平为一维向量\n\n在图 2-4 中，我们可以看到 28×28 像素的 MNIST 数字是如何被展平成一个单层的。这个单层输入随后被送入神经网络。由此，我们的网络能够较好地分类或重建表示，但并非完美。事实上，图像越复杂，这项任务就越困难。这也是深度学习的一个主要局限，因为它常常会遗漏明显的图像特征。\n\
    \n这一切在 2012 年发生了改变，当时由杰弗里·辛顿领导的一个团队以巨大优势赢得了 ImageNet 挑战赛。ImageNet 是一个包含 150 万张图像、涵盖\
    \ 1000 个类别的带标签分类数据集。该挑战的目标是比其它模型更好地对这个数据集进行分类。辛顿的团队使用了一种新型网络，称为*卷积神经网络*（CNN）。\n\
    \nCNN 深度学习系统描述了一种网络层类型，它能够通过一种称为*卷积滤波*的过程，从数据中提取相似或相近的特征。在卷积滤波中，一个具有一定尺寸的补丁或核会在图像上滑动。当核在图像上移动时，它会使用一组训练好的权重来缩放图像的数值，作为一种滤波过程。\n\
    \n图 2-5 展示了卷积滤波过程。在图中，我们可以看到核补丁在图像上滑动。当滤波器在图像上滑动时，它会将核的权重与图像的像素值相乘。这起到了对图像进行滤波的效果。滤波后的输出显示在下一张图中。在这个例子中，该滤波器可能类似于一个边缘检测滤波器。\n\
    \n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig5_HTML.jpg](img/502181_1_En_2_Fig5_HTML.jpg)\n\
    \n**图 2-5** 卷积滤波过程\n\n在图 2-5 的底部，你可以看到一个带有权重的单一核滤波器，它就像一个网络层中的单个神经元/感知器，其中神经元中的每个权重都是核中的一个值。在图中，我们还可以看到如何依次应用连续的卷积层。这起到了从已提取的特征中进一步过滤提取特征的效果。\n\
    \n这种使用卷积层进行的连续滤波过程，能够识别图像中的关键特征，比如狗的耳朵或猫的眼睛。在图像或其他数据的所有特征都被提取之后，数据会再次被展平并送入线性网络层。\n\
    \n在练习 2-2 中，我们将重新审视练习 1-5，并探索使用 CNN 层会带来的差异。我们将添加几个二维卷积层用于图像特征提取。由此，我们可以与之前的练习进行比较，并直观感受特征提取能在多大程度上提升性能。\n\
    \n## 练习 2-2. 用于分类的卷积网络\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig6_HTML.jpg](img/502181_1_En_2_Fig6_HTML.jpg)\n\
    \n**图 2-6** PyTorch CNN 层配置\n\n1. 从项目的 GitHub 站点打开 `GEN_2_classify_cnn.ipynb`\
    \ 笔记本。如果不确定如何访问源代码，请查看附录 B。\n\n2. 同时打开 `GEN_1_classify_pytorch.ipynb`。我们想要进行并排比较。\n\
    \n3. 除了神经网络模型之外，两个笔记本的代码几乎完全相同。因此，我们可以省略对大部分代码的审查。\n\n4. 通过选择菜单“运行时” ➤ “全部运行”来运行两个笔记本。在审查练习的其余部分时，请保持两个笔记本都在运行。\n\
    \n5. 向下滚动到 CNN 笔记本中的 `ConvNet` 类并研究代码。在这个类的 `init` 函数内部，你会看到两个卷积层（`conv1` 和 `conv2`）、两个丢弃层（`dropout1`\
    \ 和 `dropout2`）以及两个线性层（`fc1` 和 `fc2`）的实例化。然后我们在前向函数中看到这些层是如何连接起来的。同时注意丢弃层和线性层的位置。\n\
    \n```\nclass ConvNet(nn.Module):\n    def __init__(self):\n        super(ConvNet,\
    \ self).__init__()\n        self.conv1 = nn.Conv2d(1, 32, 3, 1)\n        self.conv2\
    \ = nn.Conv2d(32, 64, 3, 1)\n        self.dropout1 = nn.Dropout2d(0.25)\n    \
    \    self.dropout2 = nn.Dropout2d(0.5)\n        self.fc1 = nn.Linear(9216, 128)\n\
    \        self.fc2 = nn.Linear(128, 10)\n\n    def forward(self, x):\n        x\
    \ = self.conv1(x)\n        x = F.relu(x)\n        x = self.conv2(x)\n        x\
    \ = F.relu(x)\n        x = F.max_pool2d(x, 2)\n        x = self.dropout1(x)\n\
    \        x = torch.flatten(x, 1)\n        x = self.fc1(x)\n        x = F.relu(x)\n\
    \        x = self.dropout2(x)\n        x = self.fc2(x)\n        output = F.log_softmax(x,\
    \ dim=1)\n        return output\n```\n\n6. 注意输入是如何定义到 `Conv2D` 层的。图 2-6 展示了 `Conv2D`\
    \ 的每个输入是如何为该层配置和定义的。CNN 层消耗数据通道，通常像 MNIST 这样的黑白或灰度图像只有一个通道。对于彩色图像，我们会将图像分解为红、绿、蓝三个颜色通道，并带有各自的颜色值。我们稍后会进一步探讨通道。\n\
    \n7. 回头再看 `ConvNet` 类的代码，注意输入是一个单通道，它提取出 32 个输出通道。这被送入第二个 `Conv2D` 层，该层有 32 个输入通道和\
    \ 64 个输出通道。这最后一个卷积层的输出，在展平后为第一个线性层创建了 9216 个输入。然后第二个线性层用 128 个神经元处理这些输入，并输出 10\
    \ 个类别。\n\n让两个示例都运行完成，你会注意到两件事。第一，我们之前的练习运行得快得多；第二，使用卷积后的结果要好十倍。卷积需要更多的参数，因此也需要更长的训练时间。通过使用\
    \ CUDA 或 GPU，可以显著减少这些训练时间。在后面的章节中，我们将在适用的情况下使用 GPU 处理。\n\n在上一个练习中，我们还使用了一个名为 `Dropout`\
    \ 的新层。丢弃层是一种特殊的层，它会在每次训练迭代中随机关闭一定百分比的神经元。被关闭的随机神经元数量在实例化时设置，通常为 0.2 到 0.5，即 20%到\
    \ 50%。通过在每次训练过程中关闭随机神经元，网络被迫变得更加泛化，而不是特化。如果我们诊断网络过拟合或记忆数据点，丢弃层是我们首选的补救措施。（在第 1\
    \ 章中，我们讨论了过拟合和欠拟合。）\n\n图 2-7 展示了来自 TensorSpace.js Playground（网址为[`https://tensorspace.org/html/playground`](https://tensorspace.org/html/playground)）的可视化效果。这是一个极好的资源，可以用来观察和理解卷积及深度学习层的工作原理。\n\
    \n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig7_HTML.jpg](img/502181_1_En_2_Fig7_HTML.jpg)\n\
    \n**图 2-7** TensorSpace.js Playground\n\n卷积层可以帮助我们进行分类，同时在进行生成式建模时也能带来额外的好处。然而，当我们使用卷积生成内容时，必须应用与滤波相反的操作，称为*转置*。我们将在下一节中介绍如何在自编码器中使用带有转置的\
    \ CNN。\n"
- fmt: "# The Convolutional Autoencoder\n\nWhile convolution can certainly help us\
    \ identify features in images, it can also help us do the opposite: generate features.\
    \ In our previous autoencoder exercise, you can clearly see how the images are\
    \ built up on pixel-by-pixel representations.\n\nReview Figure [2-3](#502181_1_En_2_Chapter.xhtml#Fig3)\
    \ again, and you can see a fuzzy outline around the images or features; this is\
    \ characteristic for the type of generation we applied. After all, all we did\
    \ in our first autoencoder was do pixel-by-pixel comparisons so it only stands\
    \ that the best we can hope for is an averaging of pixel values, which in turn\
    \ causes the fuzzy areas in the images.\n\nFor us to extract and then generate\
    \ features, we will look at upgrading the plain-vanilla autoencoder we used last\
    \ time to work with convolution. As a further demonstration, we will also upgrade\
    \ our base dataset to CIFAR10. The CIFAR dataset consists of 28×28 color images\
    \ separated into ten classes, from airplanes to dogs and cats.\n\nFigure [2-8](#502181_1_En_2_Chapter.xhtml#Fig8)\
    \ shows an example of the CIFAR10 dataset images with respective labels and was\
    \ generated from our next exercise. In Exercise 2-3 we upgrade the vanilla autoencoder\
    \ to use convolution to extract and learn how to generate features.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig8_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8\n\nExample images from the CIFAR10 dataset\n\n## EXERCISE 2-3. CONVOLUTIONAL\
    \ AUTOENCODER ON CIFAR10\n\n1.  Open the `GEN_2_conv_autoencoder.ipynb` notebook\
    \ from the project’s GitHub site. From the menu, select Runtime ➤ Run All to run\
    \ the entire sheet. If you are unsure on how to access the source, check Appendix\
    \ B.\n\n2.  Review the import’s top cell and then move to the cell where we load\
    \ the data. In this exercise, we pull the CIFAR10 dataset from the `torchvision`\
    \ module. Notice in this case we just use a default tensor for the data transformations.\n\
    \n```\n    transform = transforms.ToTensor()\n    train_data = datasets.CIFAR10(root='data',\
    \ train=True,\n    download=True, transform=transform)\n    test_data = datasets.CIFAR10(root='data',\
    \ train=False,\n    download=True, transform=transform)\n```\n\n3.  Next, we set\
    \ the hyperparameters and instantiate the `DataLoader`s for the test and training\
    \ sets.\n\n```\n    batch_size = 64\n    epochs = 100\n    learning_rate = 1e-3\n\
    \    train_loader = torch.utils.data.DataLoader(train_data,\n    batch_size=batch_size,\
    \ shuffle=True)\n    test_loader = torch.utils.data.DataLoader(test_data,\n  \
    \  batch_size=batch_size, shuffle=True)\n```\n\n4.  From here we again create\
    \ some image display functions for rendering the image sets. We also provide text\
    \ for the labels so that we can label the dataset images. The function `plot_images`\
    \ is used to render a grid of labeled images. At the bottom of this function is\
    \ some timing code that needs to be in place for rendering in the notebook during\
    \ training. This code does not affect the rendering but just pauses the training\
    \ code enough to output the images to the notebook.\n\n```\n    def imshow(img):\n\
    \    plt.imshow(np.transpose(img, (1, 2, 0)))  # convert from Tensor image\n \
    \   # specify the image classes\n    classes = ['airplane', 'automobile', 'bird',\
    \ 'cat', 'deer',\n    'dog', 'frog', 'horse', 'ship', 'truck']\n    def plot_images(images,\
    \ labels, no):\n    rows = int(math.sqrt(no))\n    plt.ion()\n    fig = plt.figure(figsize=(rows*2,\
    \ rows*2))\n    for idx in np.arange(no):\n    ax = fig.add_subplot(rows, no/rows,\
    \ idx+1, xticks=[], yticks=[])\n    imshow(images[idx])\n    ax.set_title(classes[labels[idx]])\n\
    \    time.sleep(0.1)\n    plt.pause(0.0001)\n```\n\n5.  With the helper functions\
    \ created, we can generate Figure [2-8](#502181_1_En_2_Chapter.xhtml#Fig8) with\
    \ the following code:\n\n```\n    dataiter = iter(train_loader)\n    images, labels\
    \ = dataiter.next()\n    images = images.numpy() # convert images to numpy for\
    \ display\n    plot_images(images,labels,25)\n```\n\n6.  That takes us to the\
    \ `ConvAutoencoder` class, which is an upgrade from our earlier `Autoencoder`.\
    \ In this class, we can see the linear layers have been swapped out for `Conv2d`\
    \ layers. We can also see the addition of a new layer type called `MaxPool2d`\
    \ or a pooling layer. Pooling layers are used to collect like features and are\
    \ an efficiency in network training. With the decoder model, we can see the use\
    \ of `ConvTranspose2d` layers. Convolution transpose layers are the opposite of\
    \ convolution, and instead of extracting features, they generate learned features.\
    \ In the decoder, you can see two `ConvTranspose2d` layers that output to a sigmoid\
    \ activation function.\n\n```\n    class ConvAutoencoder(nn.Module):\n    def\
    \ __init__(self):\n    super(ConvAutoencoder, self).__init__()\n    self.encoder\
    \ = nn.Sequential(\n    nn.Conv2d(3, 16, 3, padding=1),\n    nn.ReLU(True),\n\
    \    nn.MaxPool2d(2, 2),\n    nn.Conv2d(16, 4, 3, padding=1),\n    nn.ReLU(True),\n\
    \    nn.MaxPool2d(2, 2)\n    )\n    self.decoder = nn.Sequential(\n    nn.ConvTranspose2d(4,\
    \ 16, 2, stride=2),\n    nn.ReLU(True),\n    nn.ConvTranspose2d(16, 3, 2, stride=2),\n\
    \    nn.Sigmoid()\n    )\n    def forward(self, x):\n    x = self.encoder(x)\n\
    \    x = self.decoder(x)\n    return x\n    model = ConvAutoencoder()\n    print(model)\n\
    ```\n\n7.  Before training, we need to create our loss function and optimizer\
    \ with the following code:\n\n```\n    loss_fn = nn.MSELoss()\n    optimizer =\
    \ torch.optim.Adam(model.parameters(), lr=learning_rate)\n```\n\n8.  Finally,\
    \ we can move to the last cell, `training`. This code is the same as our previous\
    \ autoencoder exercise, but we only show it here for review:\n\n```\n    for epoch\
    \ in range(epochs):\n    train_loss = 0.0\n    for data in train_loader:\n   \
    \ images, labels = data\n    optimizer.zero_grad()\n    generated = model(images)\n\
    \    loss = loss_fn(generated, images)\n    loss.backward()\n    optimizer.step()\n\
    \    train_loss += loss.item()*images.size(0)\n    train_loss = train_loss/len(train_loader)\n\
    \    clear_output()\n    print(f'Epoch: {epoch+1} Training Loss: {train_loss:.3f}')\n\
    \    plot_images(generated.detach(),labels,16)\n```\n\nAs the code is running,\
    \ you will see output like Figure [2-9](#502181_1_En_2_Chapter.xhtml#Fig9). Figure\
    \ [2-9](#502181_1_En_2_Chapter.xhtml#Fig9) shows the training transition for `ConvAutoencoder`.\
    \ Notice how the images now look more blocky than fuzzy with the images being\
    \ more a collection of recognizable features than fuzzy outlines. Because of the\
    \ size of the input images, we are somewhat limited to how well we can apply convolution\
    \ in this exercise. In later chapters and exercises, we will see various configurations\
    \ of CNN layers.\n\n![../images/502181_1_En_2_Chapter/502181_1_En_2_Fig9_HTML.jpg](images/502181_1_En_2_Chapter/502181_1_En_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9\n\nConvolutional autoencoder training on CIFAR10\n\nYou can see that\
    \ we could approach limits to the detail we use with convolution, which has more\
    \ to do with the localized feature extraction. Localized feature extraction limits\
    \ the layer to extracting features in blocks. In later chapters, we will look\
    \ at other methods that can alleviate issues like these.\n\nAutoencoders use a\
    \ form of learning called *unsupervised* since the model does not depend on image\
    \ labels to rebuild or regenerate the images. However, the model still needs an\
    \ image as a sample to encode and then decode from. What we want to explore next\
    \ is how we can generate images from a random latent space by using adversarial\
    \ learning."
