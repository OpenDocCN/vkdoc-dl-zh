  trans: '

    # 理解深度伪造工作流程


    使用像 `Faceswap` 或 `DFL` 这样的好工具来构建深度伪造视频或其他内容相对简单。通常需要遵循一个明确的工作流程来准备、标记和对齐 `FS`
    中使用的素材。对于 `Faceswap`，基本工作流程如下所示：


    1.  **提取**：下载的名人图像和视频需要经过面部提取和对齐处理。这需要在图像文件夹或视频上运行 `Faceswap` 软件，首先从图像中提取每张人脸。提取人脸时，会将其正确对齐，然后放入一个新文件夹，并将人脸的描述信息添加到对齐文件中。


    2.  **排序**：提取人脸后，我们继续将这些人脸排序到新文件夹中。`Faceswap` 有一个工具可以根据相似度对人脸进行排序，并生成一个分类整齐的人脸文件夹。通过对图像进行排序，我们可以为下一步的修剪做准备。


    3.  **修剪**：人脸排序后，我们可以检查图像，并移除任何与主要对象不匹配的图像。该软件不够智能，无法提取出正确的人脸，它通常会提取图像或视频帧中的所有面孔。因此，我们需要逐一检查并移除那些不需要或不想要的面孔。


    4.  **重新对齐**：初始提取生成的对齐文件对于后续的训练和转换至关重要。在修剪步骤中移除不需要的面孔后，我们需要清理对齐文件，删除所有不需要的引用。此步骤可以使用软件内的一个工具快速完成，我们稍后会看到。


    5.  **重复**：你需要对名人对象 A 和 B 以及期望输出的视频重复上述四个步骤。


    6.  **训练**：在提取、排序和修剪完两位名人对象的面孔后，我们可以继续训练 A/B 面孔。只要你选择了正确的选项，`Faceswap` 会让这一步变得特别简单。


    7.  **转换**：当所有内容都清理干净并且我们拥有一个训练良好的模型后，我们可以继续将视频转换为深度伪造内容。如果视频长度较短，这一步执行起来很快。


    8.  **重建**：最后，当转换过程完成时，我们需要将深度伪造图像转换回视频。该软件也有一个工具可以执行此操作，正如我们提供了另一个 `Colab` 笔记本工具来执行此操作一样。


    在我们开始使用 `Faceswap` 运行工作流程之前，你需要从 GitHub 网站 [`https://github.com/deepfakes/faceswap/releases`](https://github.com/deepfakes/faceswap/releases)
    下载 GUI 客户端，那里免费提供 Windows 和 Linux 版本。请务必下载适用于你操作系统的版本，然后通过安装程序运行它。


    在 Windows/Linux 上安装 `Faceswap` 应该很简单，它包含了所有必需的依赖项，并为你的显卡设置任何所需的 GPU `Cuda` 支持。如果你曾经尝试在
    Windows 上安装像 `PyTorch` 或 `TensorFlow` 这样的 Python 框架，你就会知道这个过程有多么困难和复杂。幸运的是，`Faceswap`
    安装程序为我们处理了这一切。


    安装好软件后，我们可以在下一节中进入流程的第一步。我们将把 `FS` 和深度伪造过程中的每一步都当作一个练习。


    ## 提取人脸


    提取和识别人脸的过程是明确定义的，并且已经使用了多年。在此步骤中，我们的目标是将各种图像和帧中的每张人脸提取到单独的文件中，且只包含对齐后的人脸。在此过程中，每张人脸都会被记录到一个描述其方向和特征点的对齐文件中。


    图 9-3 显示了从一张人脸中提取并记录到对齐文件中的 68 个特征点。该文件对于流程中的每一步都至关重要，因为它定义了每张人脸的重要特征。实际的对齐文件是二进制的，没有像
    `Faceswap` 这样的工具是无法直接编辑的。


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig3_HTML.jpg](img/502181_1_En_9_Fig3_HTML.jpg)


    图 9-3


    对齐文件中描述的 68 个人脸特征点


    在练习 9-3 中，我们首先从之前下载的一个视频中提取人脸，但同样的过程也适用于包含名人对象图像的文件夹。此过程的输出将是提取的人脸文件夹和对齐文件。启动
    `Faceswap` 软件并开始练习。


    练习 9-3. 提取人脸


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig4_HTML.jpg](img/502181_1_En_9_Fig4_HTML.jpg)


    图 9-4


    从《风月俏佳人》视频片段中提取人脸


    1.  软件启动后，请确保你看到的是 `Extract` 选项卡，如图 9-4 所示。


    2.  在 `Input Dir` 字段中选择包含输入内容的文件夹或文件。在此示例中，我们使用下载的视频。


    3.  选择一个空的输出文件夹，用于放置提取的人脸，并将其路径填入 `Output Dir` 字段。


    4.  选择用于识别图像的 `Detector` 类型。`S3Fd` 是目前最适合提取的，我们将使用它。如果你想了解更多关于各种选项的信息，请查看 [`https://forum.faceswap.dev/`](https://forum.faceswap.dev/)
    上的 `Faceswap` 论坛。


    5.  下一个选项 `Aligner`，允许你选择用于对齐图像的插件。同样，我们将使用当前最好的 `Fan`。


    6.  接下来是 `Masking`，这是移除人脸周围不需要的内容并确保人脸特征可见的过程。对于遮罩器，我们将使用 `Unet-Dfl` 模型。


    7.  像往常一样，我们希望对提取的图像进行归一化处理，以便后续更好地训练。`Hist` 是推荐的归一化方法，并且似乎对所有模型的训练效果都很好。


    8.  我们要设置的最后一个选项是 `Face Processing`。除了我们要提取的人脸最小尺寸之外，这组选项是高级选项。根据你的内容，你可能希望将此数字调整为一个非零值，该值代表你想要提取的最小人脸尺寸。根据最终制作需求，你可能需要针对不同的内容调整此值。


    9.  最后，我们可以通过单击窗口底部的 `Convert` 按钮开始转换。单击 `Convert` 后，你将在底部窗口中看到日志输出，然后在右侧你将看到正在提取的各种人脸。当过程完成时，你的原始输入文件夹中应该会有一个装满人脸的文件夹和一个新的对齐文件。


    你需要对目标视频以及你想要替换的两位名人来源运行提取过程。完成所有内容的提取后，我们可以进入下一节关于排序的内容。

    '
- fmt: '### Sorting and Trimming Faces


    Not all the faces we extracted in the previous step will be useful and may even
    be of the wrong subject. This will be especially true if you have converted a
    video clip with several actors in a scene. What we want to do, therefore, is remove
    unwanted faces from the extracted folder and then rebuild the alignments file.


    To do that, we need to manually go in and remove unwanted images from the extracted
    folder. Since many of these images will often be mixed, a useful process is to
    first sort those images by similarity using a tool built into the software.


    In Exercise 9-4, we will run the sorting tool to sort the images by similarity
    and then remove those unwanted faces from the folder. This is a fairly simple
    process you will need to perform for each extracted face set. Let’s begin by sorting
    the images from an extract folder next.


    **EXERCISE 9-4. SORTING AND REMOVING FACES**


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig5_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig5_HTML.jpg)


    *Figure 9-5 – Using the Tools/Sort feature to order faces*


    1. With the software running, open the `Tools` tab and then the `Sort` tab, as
    shown in Figure 9-5.


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig6_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig6_HTML.jpg)


    *Figure 9-6 – Example of sorted output from the Julia Roberts extracted celebrity
    images*


    2. Under the `Data` group, we need to again fill in the `Input`, `Output`, and
    `Alignments` file locations. The input folder is the location of the extracted
    images. The output folder is a new folder you want to contain the sorted images,
    and the alignments file will be found in your original input folder’s source.


    3. Within the `Sort Settings` and `Sort By` group boxes, you want to select `Face`
    as the method of sorting.


    4. For the `Output/Final Process` group, you want to keep the default using the
    `Rename` option. This will rename the images based on the sort order.


    5. Then under `Group By`, we will use `Hist` as the default but preferred method.


    6. Finally, click the `Sort` button at the bottom of the window, and in a few
    minutes, you will be notified that the output folder has the sorted faces.


    7. Locate and open the output folder, as shown in Figure 9-6, where the faces
    are sorted by similarity.


    8. At one end of the folder, you will see faces and garbage images you likely
    don’t want to train on or swap. Go ahead and delete those images. You may also
    want to remove faces that are abnormal. Perhaps the celebrity is wearing sunglasses
    or had unusual facial hair or makeup. You may notice several duplicate images,
    which is okay but not ideal.


    With the unwanted faces removed, we now need to move and clean up the alignments
    file using another tool in the software, as we will see in the next section.


    ### Realigning the Alignments File


    The alignments file is used to identify the 68 mapping points of a face in an
    image and is heavily used to define which face is the target in the image. Often
    you may extract images of faces with more than one face, and the alignments file
    helps the software identify which to use. It also helps to mask the face for better
    mapping of one face to another when we apply conversion later.


    After we have the unwanted faces removed from the folder, we need to rebuild the
    alignments file. Specifically, we need to remove the faces we deleted from the
    sorted folder from the alignments file. Otherwise, the software will complain
    we are missing images when we proceed to training.


    The process is quite simple for removing faces from the alignments file and is
    included as a tool within the software on the `Tools` tab. You will need to clean
    up each alignments file that you sort and remove images from the extract folder.
    Return to the Faceswap software, and we will go through the process of removing
    faces in Exercise 9-5.


    **EXERCISE 9-5. REMOVING FACES FROM THE ALIGNMENTS FILE**


    ![../images/502181_1_En_9_Chapter/502181_1_En_9_Fig7_HTML.jpg](images/502181_1_En_9_Chapter/502181_1_En_9_Fig7_HTML.jpg)


    *Figure 9-7 – Removing faces from an alignments file*


    1. With the software running, open the `Tools` tab and then the `Alignments` tab,
    as shown in Figure 9-7.


    2. In the `Job` group box, select the `Remove-Faces` option. As you can see, there
    are several operations you can perform on an alignments file. For more information
    on how use these tools, consult the Faceswap repository or forums.


    3. Next in the `Data` group box, select the source alignments file and the folder
    you extracted, sorted, and removed faces from in the `Faces Folder` field.


    4. Leave the rest of the defaults as they are, but do make sure they are set the
    same way as in Figure 9-7.


    5. Finally, click the `Alignments` button to start the removal process. If you
    encounter an error, be sure you have the right faces folder and alignments file
    selected and then try again. Sometimes, you may just need to run the alignments
    process again to resolve with no errors.


    Be sure to clean up all your alignments files for each extracted group of images
    and video you process. If you forget to do this, you will encounter more serious
    errors when we move on to training in the next section.'
