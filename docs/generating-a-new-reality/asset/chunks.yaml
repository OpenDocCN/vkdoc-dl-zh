    ### 伪影


    除了了解特定特征被正确伪造或翻译的程度外，始终存在其他伪影暴露伪造品的可能性。回想一下我们之前查看的网站 [`https://www.whichfaceisreal.com/`](https://www.whichfaceisreal.com/)，该网站展示了真实人脸与使用
    `StyleGAN` 生成的人脸之间的对比。


    图 10-6 摘自 `whichfaceisreal.com` 网站，展示了 `StyleGAN` 生成合成人脸图像的能力。仅观察人脸本身，很难判断哪张是真实的，哪张是伪造的。通常的技巧是发现图像中的伪影或背景细节的缺失。


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig6_HTML.jpg](img/502181_1_En_10_Fig6_HTML.jpg)


    图 10-6


    你能识别出真实的人脸吗？


    开发能够识别图像中这些伪影的方法，也可以为全合成或部分合成图像的识别提供基础。在 Francesco Marra 等人（2019 年 IEEE 多媒体信息处理与检索会议
    [MIPR]，IEEE Xplore，2019 年 4 月 25 日，[`https://ieeexplore.ieee.org/document/8695364`](https://ieeexplore.ieee.org/document/8695364)）的论文《Do
    GANs leave artificial fingerprints?》中，作者研究了使用 `CycleGAN`、`ProGAN` 等模型生成合成图像时留下的伪影。


    图 10-7 展示了作者能够从照片标记中识别出的 `CycleGAN` 和 `ProGAN` 的指纹示例。每张照片或图像都可以使用光响应非均匀性（`PRNU`）模式进行分析，以确定图像是否被篡改以及如何被篡改。


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig7_HTML.jpg](img/502181_1_En_10_Fig7_HTML.jpg)


    图 10-7


    在不同残差下识别的 GAN 指纹对比


    基于对模型中图像指纹的研究，我们可以了解图像的哪些部分可能被篡改。观察图 10-7，你还可以直观地看到 GAN 的架构如何影响这种指纹特征。不同的架构和特征提取生成技术会产生不同的指纹。


    作者进一步比较了各种 GAN 架构以及使用物理相机拍摄的真实图像。他们的发现如图 10-8 所示：通过比较指纹的相关性，根据 GAN 的类型和图像源集，可以轻松区分出留下的标记。


    ![../images/502181_1_En_10_Chapter/502181_1_En_10_Fig8_HTML.jpg](img/502181_1_En_10_Fig8_HTML.jpg)


    图 10-8


    应用于 GAN/相机及训练数据的指纹相关性示例


    请注意，图 10-8 中的表格和相关性图存在一处错误：相应的 `ProGAN` 模型需要从图中的 `G1...` 映射为 `P1...`。该比较展示了指纹之间的平均相关性，对角线上的数值较大，表明相同指纹的相似模型比较结果。


    同样，从图 10-8 中可以看出，`StarGAN` 训练所复制的属性变体之间匹配得非常好。我们还可以看到 `CycleGAN` 很容易被识别，但 `ProGAN`
    的辨别难度则更大。遗憾的是，其他模型并未测试自注意力机制或 `StyleGAN` 与 `StyleGAN2`，而这些测试很可能会得出一些非常有趣的结果。


    无论如何，我们可以确定的是，基于 GAN 的类型及其训练方式，会留下可识别的伪影。这一点你可能已经有所察觉，尤其是如果你已经完成了本书中的几个练习。很明显，GAN
    的架构可能会在生成的伪造图像中留下难以察觉的伪影。


    我们将本章中提到的所有论文留给你自行查阅，最后，我们将通过介绍一些可用于识别各种伪造变体的工具包来结束本章。

    '
- fmt: '# Identifying Fakes in Deepfakes


    As we have seen throughout the previous section, there are a number of strategies
    and methods for identifying deepfakes and facial manipulation. We have looked
    at the broad categories of methods you can employ, but in this section we want
    to look at specific packages you can employ to identify reality.


    To simplify things, we will look at the class of methods we identified earlier
    as feature learners—those that use CNN architecture and other layer types to learn
    the features that may identify synthetic images. The current best of these as
    identified in the FaceForensics++ paper is the `XceptionNet`, but we will look
    at others as well.


    Here is a summary of a few better-known open source packages that may be used
    to identify deepfakes and other forms of synthetic images. These packages use
    a variety of methods from feature learners with `PyTorch` and feature extractors
    with `OpenCV`. All the code is in Python so you can review the source code on
    your own:


    - **MesoNet-Pytorch** ([`https://github.com/HongguLiu/MesoNet-Pytorch`](https://github.com/HongguLiu/MesoNet-Pytorch)):
    This is a CNN architecture-based model that learns features by being trained on
    fake images. Using this model requires a diverse set of fake images that you can
    pull from the FaceForensics++ site.


    - **Deepfake-Detection** ([`https://github.com/HongguLiu/Deepfake-Detection`](https://github.com/HongguLiu/Deepfake-Detection)):
    This is by the same team and author of the previous repository. This implementation
    extends the model and training architectures with new model variations and helpful
    ways to train and test models.


    - **Pytorch-Xception** ([`https://github.com/hoya012/pytorch-Xception`](https://github.com/hoya012/pytorch-Xception)):
    This is the implementation of the `Xception` model using `PyTorch` in a Jupyter
    notebook. This example can be easily converted to Google Colab and trained and
    tested in the cloud using the provided example. The `Xception` model is the current
    gold standard in identifying deepfakes.


    - **DeepFakeDetection** ([`https://github.com/cc-hpc-itwm/DeepFakeDetection`](https://github.com/cc-hpc-itwm/DeepFakeDetection)):
    This package uses the handcrafted feature extraction method with `OpenCV` to identify
    inconsistent features in generated images. The example in this project is developed
    on top of Jupyter Notebook, which should be easy to convert to Google Colab if
    you are so inclined. The added benefit of this approach is the lack of model training,
    which may be useful if you lack a good source of fake data.


    These packages are all relatively easy to use and set up but, in some cases, require
    a substantial amount of training data. Again, a good source of this training data
    is the FaceForensics++ repository page, which has a good variety of fake synthetic
    content.


    There is also a current trend in deepfakes detection where several variations
    of techniques and models may be combined to provide an overall fake score. That
    score can then represent a broader approximation of whether the faces or other
    content in images was faked. It also remains to be seen how such methods could
    be used in the reverse, that is, to generate better fake images.


    Ultimately, the arms race between creating fakes and identifying them is only
    getting started, and who/what methods come out on top likely won’t be decided
    for years. Unlike a military arms race, however, this race will certainly generate
    a plethora of new technologies and strategies that should allow generative modeling
    to become more mainstream and diverse. Ideally, this diversity can be applied
    across industries and applications.


    ## Conclusion


    The deepfakes arms race is only the start of an explosion in growth in the field
    of generative modeling. While we are still trying to understand the nuances of
    creating better synthetic content, there likely will always be the need to identify
    such fakes, whether the application is for the generation or manipulation of faces
    or other content.


    What we found in this chapter is that the best method we have at our disposal
    currently is an implementation of an adversarial critic called `XceptionNet`.
    This model is built with a CNN architecture and resembles the discriminator in
    a GAN. However, instead of training such models with real and fake images, only
    fake images are used.


    We also saw that as we increase our ability to identify fakes, we in turn provide
    new ways of critiquing the fakes we do make. There are currently adversarial models
    that employ architectures like `XceptionNet` to further improve faked content.
    It is this cyclic nature of this battle of technologies that makes generative
    modeling exciting, but also frightening.


    There may come a time in the not so distant future where being able to identify
    fake content will be all but impossible, where generators employ all manner of
    counter models like `XceptionNet` to make the synthetic images even better than
    reality. There may be a point in time where we cannot ascertain what is a real
    image and what is fake.


    When that day comes, and it likely will, how the world reacts to messages from
    leaders, the news, or just pictures on the internet will change forever. Will
    we be able to ever trust a video or image as being real? How will that affect
    mediums that heavily rely on image content such as photographic identification,
    legal proceedings, and other institutions?


    Indeed, we are on the cusp of a new revolution in our digital, and to a certain
    extent our physical, world. This world, which was once dictated by digital and
    virtual media, might have to go back to relying on physical interaction, where
    it becomes more important to physically witness a concert or political event in
    person, over trusting news or other media.


    As you may realize now, the deepfakes arena is only a small subset of the possibilities
    available to us with generative modeling. It will likely remain in the forefront
    and dictate the how and why of the growth and use of generators. This is not something
    that is likely to change until other generator applications can show they are
    useful in the mainstream.


    I hope that through your journey in this book you have picked up the skills and
    understanding of how generators can be used in a variety of applications. While
    most of these applications will currently be centered around images or imagery
    like mapping or art/design, GM will certainly not be limited to just creating
    synthetic image content.


    > *“We are made wise not by the recollection of our past, but by the responsibility
    for our future.” —*[*George Bernard Shaw*](https://www.brainyquote.com/authors/george-bernard-shaw-quotes)


    This great quote by George Bernard Shaw should help guide you on your journey
    to working with and developing your generators and fake content. Remember that
    your future is tightly tied to your responsibility for how you use and plan to
    use this technology. Using this technology ethically will be important to your
    future.


    There are countless possibilities for applications of generative modeling in all
    industries worldwide, including perhaps music, text, and other forms of content.
    You now have the skills to jump into any of several areas where content generation
    could be used. I hope you use your newly acquired skills wisely and enjoy newfound
    success due to understanding a form of AI that will revolutionize our world in
    the coming years.'
