  trans: "\n# 构建变分自编码器\n\n在前面的示例练习中，我们探讨了网络如何执行函数逼近，并发现了离散区间内的潜在空间。我们发现，通过增加数据采样区间的数量，可以减少未知的潜在空间，并改进模型训练。这种技术对于简单的函数效果良好，但无法扩展到更复杂的问题。\n\
    \n理解问题和数据本身的更好方法是使用统计学。统计学使我们能够理解模型和数据中的潜在空间。反过来，统计学可以为我们提供模型的摘要或概览，以及我们生成新数据的方式。\n\
    \n统计学是数据科学、深度学习和生成式建模的基础。在数据科学中，我们使用统计学来决定使用哪些数据。对于深度学习，统计学用于衡量模型的效率，而生成式建模则利用统计学来理解模型正在学习什么。\n\
    \n现在，在我们深入探讨生成式建模的统计学和潜在空间的理解之前，先看一个实际运行的示例会很有帮助。这个示例的训练也需要一些时间，所以在训练的同时，你可以阅读下一节中的理论知识。\n\
    \n在下一个练习中，我们将深入构建一个变分自编码器（VAE）。VAE 在结构和功能上类似于自编码器，不同之处在于它学习编码部分的方式。回想一下，在 AE 中，模型学习如何对数据的潜在表示进行编码，然后再解码回原始数据。而在\
    \ VAE 中，模型学习的是潜在编码的分布方式。我们暂时不必担心理解分布部分，而是直接进入练习 3-4，看看代码是如何工作的。\n\n## 练习 3-4：构建卷积变分自编码器\n\
    \n1. 由于我们之前已经介绍过接下来的几节数据处理代码，我们将直接跳转到定义 `ConvVAE` 类和 `__init__` 函数的单元格。\n\n```\n\
    class ConvVAE(nn.Module):\n    def __init__(self, image_channels=3, h_dim=1024,\
    \ z_dim=32):\n        super(ConvVAE, self).__init__()\n        self.encoder =\
    \ nn.Sequential(\n            nn.Conv2d(image_channels, 32, kernel_size=4, stride=2),\n\
    \            nn.ReLU(),\n            nn.Conv2d(32, 64, kernel_size=4, stride=2),\n\
    \            nn.ReLU(),\n            nn.Conv2d(64, 128, kernel_size=4, stride=2),\n\
    \            nn.ReLU(),\n            nn.Conv2d(128, 256, kernel_size=4, stride=2),\n\
    \            nn.ReLU(),\n            Flatten()\n        )\n        self.fc1 =\
    \ nn.Linear(h_dim, z_dim)\n        self.fc2 = nn.Linear(h_dim, z_dim)\n      \
    \  self.fc3 = nn.Linear(z_dim, h_dim)\n        self.decoder = nn.Sequential(\n\
    \            UnFlatten(),\n            nn.ConvTranspose2d(h_dim, 128, kernel_size=5,\
    \ stride=2),\n            nn.ReLU(),\n            nn.ConvTranspose2d(128, 64,\
    \ kernel_size=5, stride=2),\n            nn.ReLU(),\n            nn.ConvTranspose2d(64,\
    \ 32, kernel_size=6, stride=2),\n            nn.ReLU(),\n            nn.ConvTranspose2d(32,\
    \ image_channels, kernel_size=6, stride=2),\n            nn.Sigmoid(),\n     \
    \   )\n```\n\n2. 这段代码类似于我们之前看过的卷积自编码器。关键区别在于使用了三个 `nn.Linear` 层，它们现在负责学习中间的编码分布。之前，我们定义了一个离散的数据大小作为学习表示。请耐心等待：我们稍后会详细讨论学习分布。\n\
    \n3. 跳过 `ConvVAE` 类中的其余函数，直接进入定义优化器的代码块。\n\n```\noptimizer = torch.optim.Adam(model.parameters(),\
    \ lr=learning_rate)\ndef loss_fn(recon_x, x, mu, logvar):\n    BCE = F.binary_cross_entropy(recon_x,\
    \ x, size_average=False)\n    KLD = -0.5 * torch.mean(1 + logvar - mu.pow(2) -\
    \ logvar.exp())\n    return BCE + KLD, BCE, KLD\n```\n\n4. 在前面的代码中，我们可以看到定义了一个专门的损失函数\
    \ `loss_fn`。该函数中的代码负责学习潜在编码分布。同样，细节将在后面介绍。\n\n5. 最后，我们来到训练代码的最后一个块。这一部分与我们之前的练习几乎相同。然而，需要注意的一个关键区别是以\
    \ `images =` 开头的高亮行。这行代码将图像从 CPU 张量转换为 GPU 张量，区别在于内存的驻留位置和处理方式。在 GPU 上处理的张量可以将性能提升\
    \ 100 倍以上。\n\n```\nfor epoch in range(epochs):\n    train_loss = 0.0\n    for\
    \ data in train_loader:\n        images, labels = data\n        optimizer.zero_grad()\n\
    \        images = images.to(device)\n        generated, mu, logvar = model(images)\n\
    \        loss, bce, kld = loss_fn(generated, images, mu, logvar)\n        loss.backward()\n\
    \        optimizer.step()\n        train_loss += loss.item()*images.size(0)\n\
    \    train_loss = train_loss/len(train_loader)\n    clear_output()\n    print(f'Epoch:\
    \ {epoch+1} Training Loss: {train_loss:.3f}')\n    plot_images(generated.cpu().data,labels,16)\n\
    ```\n\n6. 在继续阅读下一节时，请保持笔记本的训练状态。务必定期回来查看模型的学习进展。如果你对结果不满意，可以通过运行最后一个单元格来继续训练模型。每次运行最后一个单元格都会为模型增加\
    \ 100 次迭代训练。\n\n1. 从 GitHub 项目站点打开 `GEN_3_conv_VAE.ipynb` 笔记本。\n\n2. 通过选择 **运行时**\
    \ ➤ **全部运行** 来运行整个笔记本。在第一个导入单元格下方，你会注意到一个检查设备类型的单元格，如下代码所示：\n\n```\ndevice = torch.device('cuda'\
    \ if torch.cuda.is_available() else 'cpu')\ndevice\n```\n\n3. 对于此笔记本以及所有未来的笔记本，我们将配置运行时以使用\
    \ GPU。图 3-11 显示了可通过菜单选择 **运行时** ➤ **更改运行时类型** 来访问的运行时类型。\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig11_HTML.jpg](img/502181_1_En_3_Fig11_HTML.jpg)\n\
    \n图 3-11\n\n在 Colab 笔记本上更改运行时类型\n\n如果笔记本的运行时没有重置或过期，你可以持续增量训练模型。运行时可以在笔记本中手动重置，或者\
    \ Google 会在一段时间后自动使其过期。Google 建议运行时有效期为 12 小时，但似乎有几个因素会影响这一点。其中一些因素包括你正在运行的笔记本数量、它们是否使用\
    \ GPU 以及流量。\n\n图 3-12 显示了模型在 100、200 和 500 个 epoch 后的训练结果。注意 VAE 如何在迭代中学习，并尝试找出输出中的相似点和差异点。事实上，这看起来几乎就像我们的模型在验光师那里试配不同度数的眼镜。每次训练迭代都在配一副更好的眼镜，从而使图像更清晰、更易分辨。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig12_HTML.jpg](img/502181_1_En_3_Fig12_HTML.jpg)\n\
    \n图 3-12\n\nVAE 在 1、50 和 101 次迭代后的训练结果\n\n现在我们已经了解了 VAE 的功能，我们将在下一节中理解内部模型的工作原理，并学习数据的分布或变异性。\n"
- fmt: "# Learning Distributions with the VAE\n\nIn a VAE, the model learns by not\
    \ just understanding a middle or latent space encoding but rather how the encoding\
    \ itself is distributed. By understanding the distribution or variability of the\
    \ encoding, we can then learn to map across the latent encoding and generate those\
    \ hidden spaces.\n\nFigure [3-13](#502181_1_En_3_Chapter.xhtml#Fig13) shows an\
    \ AE and VAE side-by-side. In the figure, `x` represents the input, and `x'` represents\
    \ the generated output. Likewise, `z` represents the latent encoding or middle\
    \ representation of our data. In a VAE, there is a slight difference where we\
    \ don’t learn the encoding but rather learn the distribution or variability of\
    \ that encoding. Then we use those learned parameters to sample a `z` representation\
    \ and feed it into the decoder.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig13_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13  \nComparison of AE vs. VAE\n\nThe parameters this VAE model learns\
    \ are the mean (`μ`) and standard deviation or variance squared (`σ²`). If you\
    \ recall from statistics, these are the same parameters we use to define a normal\
    \ distribution. We often default to the normal distribution, but it is important\
    \ to understand that data can be distributed in a myriad of ways.\n\nFigure [3-14](#502181_1_En_3_Chapter.xhtml#Fig14)\
    \ shows an example of various distributions along with the normal or Gaussian\
    \ distribution. The normal distribution is what we typically assume most data\
    \ to resemble. Any use of basic descriptive statistics will generally assume data\
    \ to be normally distributed.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig14_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14  \nExamples of various distributions\n\nA normal distribution as\
    \ shown in Figure [3-15](#502181_1_En_3_Chapter.xhtml#Fig15) is defined by two\
    \ parameters, the mean (`μ`) and standard deviation (`σ2`). In a VAE, we let the\
    \ network learn what the mean and standard deviations are of the distribution\
    \ by using those values to generate a sample encoding. That sample encoding is\
    \ then fed into the decoder, and a generated image is output.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig15_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15  \nExample of normal distributions modified by `μ` and `σ2`\n\n\
    In Figure [3-15](#502181_1_En_3_Chapter.xhtml#Fig15) we can see how different\
    \ variations of `μ` and `σ2` alter the shape of the normal distribution, where\
    \ the mean always represents the center of the distribution and the standard deviation\
    \ represents the spread or diversity.\n\nTypically, we use statistics to find\
    \ how data is distributed or what variability it represents. With a VAE we are\
    \ still learning what the parameters of the data are, except now the data space\
    \ we are focusing on becomes the hidden or latent space representation of that\
    \ data. This has three advantages over trying to learn the entire latent space\
    \ of a set of training images.\n\nFirst, by learning the embedding space, the\
    \ amount of data or dimensions of data can be greatly reduced. This allows our\
    \ VAE to learn how features are represented in a simpler form, which in turn allows\
    \ us to model a simple normal distribution. More complex forms of data could require\
    \ a VAE to model more complex distributions or sets of distributions.\n\nThe second\
    \ advantage provides us with the ability to map or generate from this learned\
    \ latent space into new output. All we need to do is understand and control those\
    \ distributional parameters, and we have new novel outputs.\n\nThe third advantage\
    \ (but perhaps less of one) is the confirmation that we can generate output by\
    \ just learning the input data distribution and converting it into normal parameters.\
    \ One key architectural difference between an AE and VAE is the sampling operation\
    \ that takes place in the middle of the model. This operation essentially decouples\
    \ the encoder and decoder models, providing us with the ability for better reuse\
    \ and further generative modeling opportunities.\n\nOf course, to understand this\
    \ better, we need to jump back into another code exercise and see how all this\
    \ comes together. In the next exercise, we go under the covers of VAE to understand\
    \ how it learns the distribution or variability of the encoded space; see Exercise\
    \ 3-5.\n\n## EXERCISE 3-5. UNDERSTANDING THE VAE\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig16_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16  \nShowing measured divergence between two normal distributions\n\
    \n1. Open the `GEN_3_conv_VAE_latent.ipynb` notebook from the GitHub project site.\n\
    \n2. Run the whole notebook by selecting Runtime ➤ Run all.\n\n3. Jump down to\
    \ the class definition code block and the `encode` and `decode` functions shown\
    \ here:\n\n```\ndef bottleneck(self, h):\n    mu, logvar = self.fc1(h), self.fc2(h)\n\
    \    z = self.reparameterize(mu, logvar)\n    return z, mu, logvar\ndef encode(self,\
    \ x):\n    h = self.encoder(x)\n    z, mu, logvar = self.bottleneck(h)\n    return\
    \ z, mu, logvar\ndef decode(self, z):\n    z = self.fc3(z)\n    z = self.decoder(z)\n\
    \    return z\ndef forward(self, x):\n    z, mu, logvar = self.encode(x)\n   \
    \ z = self.decode(z)\n    return z, mu, logvar\n```\n\n4. Notice how the network\
    \ restricts using the `bottleneck` function to generate the `mu` and `logvar`\
    \ or variance parameter. Those parameters are then used to sample a `z` or encoded\
    \ representation from the distribution. Then in the `forward` function we can\
    \ see how `encode` is used to generate those parameters as well as the sampled\
    \ `z`, with `z` being fed into the decoder as the encoding used to generate new\
    \ output.\n\n5. Next, we will scroll down to the `loss_fn` again, shown here:\n\
    \n```\ndef loss_fn(recon_x, x, mu, logvar):\n    BCE = F.binary_cross_entropy(recon_x,\
    \ x, size_average=False)\n    KLD = -0.5 * torch.mean(1 + logvar - mu.pow(2) -\
    \ logvar.exp())\n    return BCE + KLD, BCE, KLD\n```\n\n6. The customized loss\
    \ function in this case is using two methods to measure the divergence between\
    \ the learned distribution and that observed. The first technique is called *binary\
    \ cross entropy* (BCE), which measures the difference in the raw input image and\
    \ the reconstructed one. It’s is not unlike how we measured loss in a vanilla\
    \ AE. The second technique is called Kullback Leibler Divergence (KLD) and is\
    \ used to measure the actual difference in data distributions.\n\n7. Figure [3-16](#502181_1_En_3_Chapter.xhtml#Fig16)\
    \ shows how KLD can be used to measure the difference between two normal distributions.\
    \ The shaded area represents the divergence between the two distributions. Our\
    \ goal of calculating the combined loss using BCE and KLD allows us to learn the\
    \ values of the mean and standard deviation by minimizing this difference in distributions\
    \ via the loss function.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig17_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig17_HTML.jpg)\n\
    \nFigure 3-17  \nInput images versus output generated images\n\n8. Let the notebook\
    \ run until it completes at a minimum of 100 epochs. You will want a good model\
    \ to better understand the next section.\n\n9. The following block is responsible\
    \ for generating the example output comparison shown in Figure [3-17](#502181_1_En_3_Chapter.xhtml#Fig17).\
    \ In this figure we see the original images used to input into the VAE to generate\
    \ the output images. Notice how the output is relatively good considering all\
    \ the VAE learns is to map the data distribution of the input image."
  raw: "## Learning Distributions with the VAE\n\nIn a VAE, the model learns by not\
    \ just understanding a middle or latent space encoding but rather how the encoding\
    \ itself is distributed. By understanding the distribution or variability of the\
    \ encoding, we can then learn to map across the latent encoding and generate those\
    \ hidden spaces.\n\nFigure [3-13](#502181_1_En_3_Chapter.xhtml#Fig13) shows an\
    \ AE and VAE side-by-side. In the figure, `x` represents the input, and `x'` represents\
    \ the generated output. Likewise, `z` represents the latent encoding or middle\
    \ representation of our data. In a VAE, there is a slight difference where we\
    \ don’t learn the encoding but rather learn the distribution or variability of\
    \ that encoding. Then we use those learned parameters to sample a `z` representation\
    \ and feed it into the decoder.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig13_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13\n\nComparison of AE vs. VAE\n\nThe parameters this VAE model learns\
    \ are the mean (μ) and standard deviation or variance squared (σ²). If you recall\
    \ from statistics, these are the same parameters we use to define a normal distribution.\
    \ We often default to the normal distribution, but it is important to understand\
    \ that data can be distributed in a myriad of ways.\n\nFigure [3-14](#502181_1_En_3_Chapter.xhtml#Fig14)\
    \ shows an example of various distributions along with the normal or Gaussian\
    \ distribution. The normal distribution is what we typically assume most data\
    \ to resemble. Any use of basic descriptive statistics will generally assume data\
    \ to be normally distributed.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig14_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14\n\nExamples of various distributions\n\nA normal distribution as\
    \ shown in Figure [3-15](#502181_1_En_3_Chapter.xhtml#Fig15) is defined by two\
    \ parameters, the mean (μ) and standard deviation (σ2). In a VAE, we let the network\
    \ learn what the mean and standard deviations are of the distribution by using\
    \ those values to generate a sample encoding. That sample encoding is then fed\
    \ into the decoder, and a generated image is output.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig15_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15\n\nExample of normal distributions modified by μ and σ2\n\nIn Figure\
    \ [3-15](#502181_1_En_3_Chapter.xhtml#Fig15) we can see how different variations\
    \ of μ and σ2 alter the shape of the normal distribution, where the mean always\
    \ represents the center of the distribution and the standard deviation represents\
    \ the spread or diversity.\n\nTypically, we use statistics to find how data is\
    \ distributed or what variability it represents. With a VAE we are still learning\
    \ what the parameters of the data are, except now the data space we are focusing\
    \ on becomes the hidden or latent space representation of that data. This has\
    \ three advantages over trying to learn the entire latent space of a set of training\
    \ images.\n\nFirst, by learning the embedding space, the amount of data or dimensions\
    \ of data can be greatly reduced. This allows our VAE to learn how features are\
    \ represented in a simpler form, which in turn allows us to model a simple normal\
    \ distribution. More complex forms of data could require a VAE to model more complex\
    \ distributions or sets of distributions.\n\nThe second advantage provides us\
    \ with the ability to map or generate from this learned latent space into new\
    \ output. All we need to do is understand and control those distributional parameters,\
    \ and we have new novel outputs.\n\nThe third advantage (but perhaps less of one)\
    \ is the confirmation that we can generate output by just learning the input data\
    \ distribution and converting it into normal parameters. One key architectural\
    \ difference between an AE and VAE is the sampling operation that takes place\
    \ in the middle of the model. This operation essentially decouples the encoder\
    \ and decoder models, providing us with the ability for better reuse and further\
    \ generative modeling opportunities.\n\nOf course, to understand this better,\
    \ we need to jump back into another code exercise and see how all this comes together.\
    \ In the next exercise, we go under the covers of VAE to understand how it learns\
    \ the distribution or variability of the encoded space; see Exercise 3-5.\n\n\
    EXERCISE 3-5\\. UNDERSTANDING THE VAE\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig16_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16\n\nShowing measured divergence between two normal distributions\n\
    \n1.  Open the `GEN_3_conv_VAE_latent.ipynb` notebook from the GitHub project\
    \ site.\n\n2.  Run the whole notebook by selecting Runtime ➤ Run all.\n\n3.  Jump\
    \ down to the class definition code block and the encode and decode functions\
    \ shown here:\n\n```\n    def bottleneck(self, h):\n    mu, logvar = self.fc1(h),\
    \ self.fc2(h)\n    z = self.reparameterize(mu, logvar)\n    return z, mu, logvar\n\
    \    def encode(self, x):\n    h = self.encoder(x)\n    z, mu, logvar = self.bottleneck(h)\n\
    \    return z, mu, logvar\n    def decode(self, z):\n    z = self.fc3(z)\n   \
    \ z = self.decoder(z)\n    return z\n    def forward(self, x):\n    z, mu, logvar\
    \ = self.encode(x)\n    z = self.decode(z)\n    return z, mu, logvar\n    ```\n\
    \n4.  Notice how the network restricts using the `bottleneck` function to generate\
    \ the `mu` and `logvar` or variance parameter. Those parameters are then used\
    \ to sample a `z` or encoded representation from the distribution. Then in the\
    \ forward function we can see how `encode` is used to generate those parameters\
    \ as well as the sampled `z`, with `z` being fed into the decoder as the encoding\
    \ used to generate new output.\n\n5.  Next, we will scroll down to the `loss_fn`\
    \ again, shown here:\n\n```\n    def loss_fn(recon_x, x, mu, logvar):\n    BCE\
    \ = F.binary_cross_entropy(recon_x, x, size_average=False)\n    KLD = -0.5 * torch.mean(1\
    \ + logvar - mu.pow(2) - logvar.exp())\n    return BCE + KLD, BCE, KLD\n    ```\n\
    \n6.  The customized loss function in this case is using two methods to measure\
    \ the divergence between the learned distribution and that observed. The first\
    \ technique is called *binary cross entropy* (BCE), which measures the difference\
    \ in the raw input image and the reconstructed one. It’s is not unlike how we\
    \ measured loss in a vanilla AE. The second technique is called Kullback Leibler\
    \ Divergence (KLD) and is used to measure the actual difference in data distributions.\n\
    \n7.  Figure [3-16](#502181_1_En_3_Chapter.xhtml#Fig16) shows how KLD can be used\
    \ to measure the difference between two normal distributions. The shaded area\
    \ represents the divergence between the two distributions. Our goal of calculating\
    \ the combined loss using BCE and KLD allows us to learn the values of the mean\
    \ and standard deviation by minimizing this difference in distributions via the\
    \ loss function.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig17_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig17_HTML.jpg)\n\
    \nFigure 3-17\n\nInput images versus output generated images\n\n1.  Let the notebook\
    \ run until it completes at a minimum of 100 epochs. You will want a good model\
    \ to better understand the next section.\n\n2.  The following block is responsible\
    \ for generating the example output comparison shown in Figure [3-17](#502181_1_En_3_Chapter.xhtml#Fig17).\
    \ In this figure we see the original images used to input into the VAE to generate\
    \ the output images. Notice how the output is relatively good considering all\
    \ the VAE learns is to map the data distribution of the input image."
  trans: "\n# 使用 VAE 学习分布\n\n在 VAE 中，模型的学习方式不仅仅是理解中间或潜在空间的编码，而是理解编码本身的分布。通过理解编码的分布或变异性，我们可以学习如何映射潜在编码并生成那些隐藏空间。\n\
    \n图 3-13 并排展示了 AE 和 VAE。在图中，`x` 代表输入，`x'` 代表生成的输出。同样地，`z` 代表我们数据的潜在编码或中间表示。在 VAE\
    \ 中，有一个细微的差别：我们不学习编码本身，而是学习该编码的分布或变异性。然后，我们使用这些学习到的参数来采样一个 `z` 表示，并将其输入到解码器中。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig13_HTML.jpg](img/502181_1_En_3_Fig13_HTML.jpg)\n\
    \n图 3-13  \nAE 与 VAE 的对比\n\n这个 VAE 模型学习到的参数是均值（`μ`）和标准差或方差平方（`σ²`）。如果你还记得统计学知识，这些正是我们用来定义正态分布的参数。我们通常默认使用正态分布，但重要的是要理解数据可以以多种方式分布。\n\
    \n图 3-14 展示了各种分布以及正态分布（或高斯分布）的示例。正态分布是我们通常假设大多数数据所呈现的形态。任何基本描述性统计的使用通常都会假设数据呈正态分布。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig14_HTML.jpg](img/502181_1_En_3_Fig14_HTML.jpg)\n\
    \n图 3-14  \n各种分布的示例\n\n如图 3-15 所示，正态分布由两个参数定义：均值（`μ`）和标准差（`σ2`）。在 VAE 中，我们让网络通过使用这些值来生成一个样本编码，从而学习分布的均值和标准差。然后，该样本编码被输入到解码器中，并输出生成的图像。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig15_HTML.jpg](img/502181_1_En_3_Fig15_HTML.jpg)\n\
    \n图 3-15  \n由 `μ` 和 `σ2` 修改的正态分布示例\n\n在图 3-15 中，我们可以看到 `μ` 和 `σ2` 的不同变化如何改变正态分布的形状，其中均值始终代表分布的中心，而标准差代表分布的离散程度或多样性。\n\
    \n通常，我们使用统计学来发现数据是如何分布的，或者它代表了什么样的变异性。使用 VAE，我们仍然在学习数据的参数是什么，只不过现在我们关注的数据空间变成了该数据的隐藏或潜在空间表示。与尝试学习一组训练图像的整个潜在空间相比，这具有三个优势。\n\
    \n首先，通过学习嵌入空间，数据量或数据的维度可以大大减少。这使得我们的 VAE 能够以更简单的形式学习特征的表示方式，从而让我们能够建模一个简单的正态分布。更复杂的数据形式可能需要\
    \ VAE 来建模更复杂的分布或分布集合。\n\n第二个优势使我们能够从这个学习到的潜在空间映射或生成新的输出。我们只需要理解和控制这些分布参数，就能得到新颖的输出。\n\
    \n第三个优势（但可能不那么重要）是确认我们只需学习输入数据分布并将其转换为正态参数，就能生成输出。AE 和 VAE 之间的一个关键架构差异是发生在模型中间的采样操作。这个操作本质上将编码器和解码器模型解耦，为我们提供了更好的复用能力和进一步的生成式建模机会。\n\
    \n当然，为了更好地理解这一点，我们需要回到另一个代码练习中，看看这一切是如何结合在一起的。在下一个练习中，我们将深入 VAE 的内部，了解它如何学习编码空间的分布或变异性；请参见练习\
    \ 3-5。\n\n## 练习 3-5. 理解 VAE\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig16_HTML.jpg](img/502181_1_En_3_Fig16_HTML.jpg)\n\
    \n图 3-16  \n展示两个正态分布之间的测量散度\n\n1. 从 GitHub 项目站点打开 `GEN_3_conv_VAE_latent.ipynb`\
    \ 笔记本。\n\n2. 通过选择“运行时” ➤ “全部运行”来运行整个笔记本。\n\n3. 跳转到类定义代码块以及此处显示的 `encode` 和 `decode`\
    \ 函数：\n\n```\ndef bottleneck(self, h):\n    mu, logvar = self.fc1(h), self.fc2(h)\n\
    \    z = self.reparameterize(mu, logvar)\n    return z, mu, logvar\ndef encode(self,\
    \ x):\n    h = self.encoder(x)\n    z, mu, logvar = self.bottleneck(h)\n    return\
    \ z, mu, logvar\ndef decode(self, z):\n    z = self.fc3(z)\n    z = self.decoder(z)\n\
    \    return z\ndef forward(self, x):\n    z, mu, logvar = self.encode(x)\n   \
    \ z = self.decode(z)\n    return z, mu, logvar\n```\n\n4. 注意网络如何通过 `bottleneck`\
    \ 函数限制生成 `mu` 和 `logvar`（方差参数）。然后使用这些参数从分布中采样一个 `z` 或编码表示。接着在 `forward` 函数中，我们可以看到\
    \ `encode` 如何用于生成这些参数以及采样的 `z`，而 `z` 被输入到解码器中，作为用于生成新输出的编码。\n\n5. 接下来，我们再次向下滚动到\
    \ `loss_fn`，如下所示：\n\n```\ndef loss_fn(recon_x, x, mu, logvar):\n    BCE = F.binary_cross_entropy(recon_x,\
    \ x, size_average=False)\n    KLD = -0.5 * torch.mean(1 + logvar - mu.pow(2) -\
    \ logvar.exp())\n    return BCE + KLD, BCE, KLD\n```\n\n6. 在这种情况下，自定义损失函数使用两种方法来测量学习到的分布与观察到的分布之间的散度。第一种技术称为*二元交叉熵*（BCE），它测量原始输入图像与重建图像之间的差异。这与我们在普通\
    \ AE 中测量损失的方式并无不同。第二种技术称为 Kullback Leibler 散度（KLD），用于测量数据分布之间的实际差异。\n\n7. 图 3-16\
    \ 展示了如何使用 KLD 测量两个正态分布之间的差异。阴影区域代表两个分布之间的散度。我们使用 BCE 和 KLD 计算组合损失的目标是，通过损失函数最小化这种分布差异，从而学习均值和标准差的值。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig17_HTML.jpg](img/502181_1_En_3_Fig17_HTML.jpg)\n\
    \n图 3-17  \n输入图像与输出生成图像的对比\n\n8. 让笔记本运行直到完成至少 100 个 epoch。你需要一个良好的模型来更好地理解下一部分。\n\
    \n9. 以下代码块负责生成图 3-17 中所示的示例输出对比。在该图中，我们看到了用于输入到 VAE 以生成输出图像的原始图像。请注意，考虑到 VAE 学习的只是映射输入图像的数据分布，输出效果相对不错。\n"
- fmt: "```python\nimport numpy as np\nimport matplotlib.pyplot as plt\nplt.ion()\n\
    import torchvision.utils\ndef to_img(x):\n    x = x.clamp(0, 1)\n    return x\n\
    def show_image(img):\n    img = to_img(img)\n    npimg = img.numpy()\n    plt.imshow(np.transpose(npimg,\
    \ (1, 2, 0)))\ndef visualize_output(images, model):\n    with torch.no_grad():\n\
    \        images = images.to(device)\n        images, _, _ = model(images)\n  \
    \      images = images.cpu()\n        images = to_img(images)\n        np_imagegrid\
    \ = torchvision.utils.make_grid(images[1:50], 10, 5).numpy()\n        plt.imshow(np.transpose(np_imagegrid,\
    \ (1, 2, 0)))\n        plt.show()\nimages, labels = iter(train_loader).next()\n\
    # First visualize the original images\nprint('Original images')\nshow_image(torchvision.utils.make_grid(images[1:50],10,\
    \ 5))\nplt.show()\n# Reconstruct and visualize the images using the vae\nprint('VAE\
    \ reconstruction:')\nvisualize_output(images, model)\n```\n\nWith the output in\
    \ Figure [3-17](#502181_1_En_3_Chapter.xhtml#Fig17) you can start to appreciate\
    \ the power of learning the distribution of data in an image. Realize that with\
    \ each input image the VAE is learning how the data/pixels in the image are being\
    \ distributed. It then uses that knowledge captured in the learned mean and standard\
    \ deviation to create a normal distribution that it then uses to randomly sample\
    \ from. Thus, each of the output images in the VAE reconstruction is randomly\
    \ sampled from the learned distribution.\n\nThe concept of learning how data is\
    \ distributed, and mapping that to a known or unknown function, is the core of\
    \ generative modeling with deep learning. We will use this concept repeatedly\
    \ as we progress through this book. In the next section, we look at how understanding\
    \ the distribution of data allows us to also manipulate output.\n\n## Variability\
    \ and Exploring the Latent Space\n\nWith a trained VAE model, we can begin to\
    \ explore the latent space of what the model learns. Throughout this chapter we\
    \ have been working toward understanding what that latent space looks like. Now\
    \ we are at a position to unfold that latent space and view the contents visually.\n\
    \nThe best way to visualize the latent space encodings in a VAE is to visualize\
    \ the output or the controlled output. We can do that a couple of ways, and in\
    \ Exercise 3-6 we explore how to search the output space of a learned VAE.\n\n\
    **EXERCISE 3-6. UNDERSTANDING THE VAE**\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig18_HTML.png](images/502181_1_En_3_Chapter/502181_1_En_3_Fig18_HTML.png)\n\
    \n**Figure 3-18** Example output from random latent space generation\n\n1.  Jump\
    \ to your last and trained version of the `GEN_3_conv_VAE_latent.ipynb` notebook.\
    \ If you need to train the notebook again, do so; it can take about up to an hour.\
    \ We will look at how to save and restore models later, but for now just retrain\
    \ if you need to.\n\n2.  At the bottom of this notebook are two code cells that\
    \ allow us to map the output of the model either randomly or controlled across\
    \ the latent space distribution parameters, mean, and standard deviation.\n\n\
    ```python\n    with torch.no_grad():\n    # sample latent vectors from the normal\
    \ distribution\n    latent = torch.randn(60, 1024, device=device)\n    # reconstruct\
    \ images from the latent vectors\n    img_recon = model.decoder(latent)\n    img_recon\
    \ = img_recon.cpu()\n    fig, ax = plt.subplots(figsize=(20, 20))\n    show_image(torchvision.utils.make_grid(img_recon.data[:100],10,5))\n\
    \    plt.show()\n```\n\n3.  The first block of code shown earlier generates the\
    \ sample latent vectors using the `torch.randn` function to generate 60 vectors\
    \ of size 1024. We get 1024 from the latent vector size used in our VAE; 1024\
    \ is a much larger latent vector than we used when exploring autoencoders, which\
