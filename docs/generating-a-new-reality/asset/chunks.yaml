  trans: "\n# 残差网络与 CycleGAN\n\n如你所见，残差网络为更深的网络提供了更高的稳定性，并能提升训练性能。进而，它们使得更深的网络能够学习到不会因过度特征提取而受损的特征集。\n\
    \n在掌握了这一强大的新工具后，我们可以重新审视它如何改进 GAN 的变体。接下来，我们将再次从 CycleGAN 开始，研究无配对图像到图像的翻译。\n\n\
