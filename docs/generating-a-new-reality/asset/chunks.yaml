    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig8_HTML.jpg](img/502181_1_En_3_Fig8_HTML.jpg)\n\
    \n**图 3-8** 训练模型与真实函数`x2 + 5`的对比图\n\n回想一下我们之前的练习以及我们逼近函数`x2 + 5`的尝试。最初几次尝试使用了从\
    \ 1 到 10 的一组固定数量的数据点。我们将这些数据点输入函数以生成`y`输出。这生成了我们的可训练数据集，然后我们将其拆分为训练集和测试集。\n\n\
    图 3-9 展示了我们为训练和逼近函数而生成的 10 个数据点的图。在这些点中，我们移除了 20%（即 2 个点）用于测试。这减少了数据集中的点数，实质上缩小了训练数据之间的空间大小。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig9_HTML.jpg](img/502181_1_En_3_Fig9_HTML.jpg)\n\
    \n**图 3-9** 练习 3-1 和练习 3-2 中输入数据集的图\n\n这意味着当我们的模型逼近函数`x2 + 5`时，数据之间存在大片区域。我们将这些区域称为*潜在空间*或*隐藏空间*。再次强调，这不应与数据中的间隙、鸿沟或真空混淆。数据中的这种隐藏空间代表了函数中缺少任何实际训练数据的区域。这意味着网络必须在这些数据点之间逼近值。\n\
    \n事实证明，生成建模的一个重要部分是理解如何从这种潜在空间中提取结果，正如我们将在本书中看到的那样。这与我们之前尝试从函数逼近练习中提取结果的方式并无不同。我们之前的假设可能是减少训练点的数量，但现在我们可以看到，这增加了潜在空间的大小，导致模型对函数过拟合。\n\
    \n当模型逼近一个函数但错误地填充或逼近潜在空间时，就会发生过拟合。在我们之前的函数逼近示例中，情况显然如此，这是由两个问题造成的。第一个问题是数据不足，导致网络估计了大面积的潜在空间。第二个问题是网络规模过大，拥有过强的能力来估计数据中的空间。因此，它基本上是在编造值，这可能成为一个问题。\n\
    \n当网络规模很大时，它拥有很大的能力，在这种情况下是过大的能力。大型网络可以记忆各种形式的数据，包括图像或视频。这对于针对特定数据的网络可能有用，但在生成建模以及大多数其他机器学习学科中，我们的目标始终是泛化。\n\
    \n泛化始终是我们构建模型时要追求的目标。这意味着我们输入模型的数据需要分布良好。分布良好的数据为我们提供了数据之间均匀的潜在空间。在我们之前的示例中，数据被分布到\
    \ 10 个区间中，值从 1 到 10。然而，正如我们所看到的，我们的数据分布得不够好。\n"
- fmt: "# 泛化与过拟合、欠拟合\n\n泛化也意味着我们的网络应该只保持所需的大小，不多也不少。如果网络过大，它往往会过拟合，或用不正确的值填充潜在空间。同样，过小的网络会导致欠拟合。欠拟合通常是模型中潜在空间或间隙过大的结果。\n\
    \n图[3-10](#502181_1_En_3_Chapter.xhtml#Fig10)展示了使用线性模型或近似直线来拟合`x² + 5`函数的经典欠拟合示例。此例中的欠拟合是由于模型复杂度不足造成的。然而，当网络没有获得足够的数据，或数据分布不均匀时，也可能发生欠拟合。\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig10_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig10_HTML.jpg)\n\
    \n**图 3-10**  \n线性模型试图拟合`x² + 5`函数\n\n为了具体理解这一点，我们的下一个练习将专注于如何创建对一组函数数据过拟合和欠拟合的模型。我们将继续使用之前练习的基础，但这次会修改一些细节以更好地理解问题；参见练习\
    \ 3-3。\n\n## 练习 3-3：理解过拟合与欠拟合\n\n1. 从 GitHub 项目站点打开`GEN_3_over_under.ipynb`笔记本。如果不确定如何操作，请查阅附录\
    \ B。\n\n2. 通过选择 **Runtime** ➤ **Run all** 运行整个笔记本。注意我们在输出图之前的代码块中如何更改了输入（`X`,\
    \ `y`），如下所示：\n\n```\ndata_step = .1\nX = np.reshape(np.arange(1,10, data_step),\
    \ (-1, 1))\ny = function(X)\ninputs = X.shape[1]\nplt.plot(X, y, 'o', color='red')\n\
    ```\n\n3. 在上一个代码块中，我们修改了 NumPy 调用，以便使用`np.arange`自动生成数组。`arange`函数接收起始值、结束值和步长作为输入。我们使用一个名为`data_step`的新超参数来设置潜在空间中的距离。使用`.1`的步长可以创建比之前多\
    \ 10 倍的数据点，从而大大减少了潜在空间。\n\n4. 接下来，注意在此示例中，学习率（`lr`）和训练轮数（`num_epochs`）这两个超参数是如何被修改的：\n\
    \n```\noptimizer = torch.optim.Adam(net.parameters(), lr = .01)\nnum_epochs =\
    \ 1000\n```\n\n5. 网络设计也通过移除一层并引入另一个名为`neurons`的超参数而发生了变化：\n\n```\nneurons = 20\n\
    torch.set_default_dtype(torch.float64)\nnet = nn.Sequential(\nnn.Linear(inputs,\
    \ neurons, bias = True), nn.ReLU(),\nnn.Linear(neurons, neurons, bias = True),\
    \ nn.Sigmoid(),\nnn.Linear(neurons, 1)\n)\n```\n\n6. `neurons`超参数允许我们快速调整网络大小，从而减少神经元数量以使网络过拟合或欠拟合。\n\
    \n7. 尝试仅调整`data_step`和`neurons`这两个超参数，观察它们对模型过拟合或欠拟合的影响。请记住，更大更复杂的模型通常需要更多的训练迭代次数（`num_epochs`）。这反过来意味着你可能也需要调整学习率`lr`。\n\
    \n8. 现在尝试找到能够以最少`num_epochs`最快学习该函数的最小网络（即最少的神经元数量）。请根据需要自由调整学习率（`lr`）和`data_step`。\n\
    \n9. 最后，将`data_step`设置为一个较高的值，例如 1.0，然后观察调整`neurons`会产生什么影响。你需要增加还是减少神经元数量？\n\n\
    上述练习的目的是演示我们的网络如何对映射到数据的函数进行过拟合和欠拟合。在这个简单的例子中，我们可以快速且明确地看到每个超参数的作用，从而理解网络如何过拟合或欠拟合。\n\
    \n随着本书的深入，我们使用更复杂的数据形式（如图像）时，过拟合和欠拟合往往变得不那么明显。幸运的是，有几个线索可以帮助我们识别这类问题，我们将在后续练习中逐步探索。\n\
    \n我们尚未涉及的一个关键要素是数据分布，它可能导致许多过拟合/欠拟合问题。在示例中，数据在某个值范围内是均匀分布的。但这在现实世界中很少见。\n\n例如，假设你有一个包含\
    \ 30,000 张动物图像的数据集（10,000 张猫、15,000 张狗和 5,000 张鸟），你想将其分类为猫、狗和鸟。问题在于你的数据分布不均匀。你有更多的狗图片，因此你的模型会高估或记住狗。相反，我们应该做的是将猫和狗的图像数量减少到\
    \ 5,000 张，以匹配鸟的图像数量。你仍然可以争辩说，猫和狗在视觉上比鸟更相似，因此可能会影响你的结果。\n\n在生成式建模中，我们以多种方式使用和理解数据的分布。事实上，这是许多方法的基础。在下一节中，我们将理解为什么数据分布对变分自编码器如此重要。"
  raw: "Generalizing also means that our network should be only the size it needs,\
    \ no more or less. If our network is too large, it will tend to overfit or fill\
    \ in those latent space with incorrect values. Likewise, networks that are too\
    \ small will underfit. Underfitting is often a consequence of too large of gaps\
    \ or latent space in a model.\n\nFigure [3-10](#502181_1_En_3_Chapter.xhtml#Fig10)\
    \ shows the classic example of underfitting to the x2 + 5 function by using a\
    \ linear model or approximating a line. Underfitting in this example would be\
    \ the result of the model not being complex enough. However, it can also occur\
    \ when a network is not being fed enough data or that data is poorly distributed.\n\
    \n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig10_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10\n\nA linear model trying to fit to the function x2 + 5\n\nTo understand\
    \ this in a tangible manner, our next exercise will focus on how we create models\
    \ that over- and underfit to a set of function data. We will continue to use the\
    \ base of our previous exercise, but this time we will modify some details to\
    \ understand the problem better; see Exercise 3-3.\n\nEXERCISE 3-3\\. UNDERSTANDING\
    \ OVER- AND UNDERFITTING\n\n1.  Open the `GEN_3_over_under.ipynb` notebook from\
    \ the GitHub project site. If you are unsure how, then consult Appendix B.\n\n\
    2.  Run the whole notebook by selecting Runtime ➤ Run all. Notice how we changed\
    \ the inputs (`X,y`) in the block just before the output plot, as shown here:\n\
    \n```\n    data_step = .1\n    X = np.reshape(np.arange(1,10, data_step), (-1,\
    \ 1))\n    y = function(X)\n    inputs = X.shape[1]\n    plt.plot(X, y, 'o', color='red')\n\
    \    ```\n\n3.  In the previous block of code, we alter the NumPy calls so that\
    \ we autogenerate our array using `np.arange`. The `arange` function takes as\
    \ input the start and end and the step size. We use a new hyperparameter called\
    \ `data_step` to set the distance in latent space. Using a step size of `.1` allows\
    \ us to create 10 times the number of data points we previously used, thus greatly\
    \ reducing those latent spaces.\n\n4.  Next, notice in this example how the hyperparameters\
    \ of learning rate (`lr`) and the number of epochs (`num_epochs`) have been altered:\n\
    \n```\n    optimizer = torch.optim.Adam(net.parameters(), lr = .01)\n    num_epochs\
    \ = 1000\n    ```\n\n5.  The network design has also been altered by removing\
    \ a layer and putting in another hyperparameter called `neurons`.\n\n```\n   \
    \ neurons = 20\n    torch.set_default_dtype(torch.float64)\n    net = nn.Sequential(\n\
    \    nn.Linear(inputs, neurons, bias = True), nn.ReLU(),\n    nn.Linear(neurons,\
    \ neurons, bias = True), nn.Sigmoid(),\n    nn.Linear(neurons, 1)\n    )\n   \
    \ ```\n\n6.  The `neurons` hyperparameter allows us to quickly alter the network\
    \ size, allowing us to reduce the number of neurons to either over- or underfit\
    \ the network.\n\n7.  Try adjusting just the two hyperparameters, `data_step`\
    \ and `neurons`, to see what effect this has on over- or underfitting the model.\
    \ Keep in mind that larger and complex models generally require more training\
    \ iterations, `num_epochs`. This in turn means you may want to alter the learning\
    \ rate `lr`, as well.\n\n8.  Now try to find the smallest network, the least number\
    \ of neurons, that can learn the function the quickest, with fewer `num_epochs`.\
    \ Feel free to adjust the learning rate (`lr`) and `data_step` as you need.\n\n\
    9.  Finally, set `data_step` to a high value like 1.0 and then see what effect\
    \ altering the `neurons` has. Do you need to increase or decrease the number of\
    \ neurons?\n\nThe intention of the previous exercise was to demonstrate how our\
    \ networks can over- and underfit the function that maps to our data. In this\
    \ simple example, we could see quick and explicit feedback for what each of our\
    \ hyperparameters did, allowing us to understand how a network can over- or underfit.\n\
    \nAs we progress through this book and use more complex forms of data, like images,\
    \ over- and underfitting often becomes less obvious. Fortunately, there are several\
    \ clues that can help us identify these types of problems that we explore as we\
    \ progress to those exercises.\n\nOne key element we didn’t cover and can cause\
    \ a lot of over/underfitting issues is data distribution. In the examples, the\
    \ data was uniformly distributed across a range of values. This is rarely something\
    \ we see in the real world.\n\nFor example, assume you had a dataset of 30,000\
    \ animal images (10,000 cats, 15,000 of dogs, and 5,000 birds) that you wanted\
    \ to classify into cats, dogs, and birds. The problem is your data is not evenly\
    \ distributed. You have more pictures of dogs, and hence your model will overestimate\
    \ or memorize dogs. Instead, what we should do is reduce the number of cat and\
    \ dog images to 5,000 to match the number of bird images. You could still argue\
    \ that the cat and dog are more visually similar than a bird, thus potentially\
    \ influencing your results.\n\nWe use and understand how data is distributed in\
    \ several ways in generative modeling. It is in fact a foundation of many of the\
    \ methods. In the next section, we will understand why data distributions are\
    \ important to the variational autoencoder."
