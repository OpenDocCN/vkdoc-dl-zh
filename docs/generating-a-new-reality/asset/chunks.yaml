  trans: '

    # 8. 高级生成器


    人工智能和机器学习领域正日新月异地发展，各种新型的生成对抗网络（GAN）和生成器层出不穷。通过本书的学习，我们回顾了这些生成器的发展历程。我们深入研究了它们对生成任务的贡献细节和技术进步，也探讨了它们可能存在的不足之处。


    本书的目标是为您提供扎实的基础知识，以便理解生成器的细微差别以及如何构建它们。使用像 Google Colab 这样的平台，可以让学生们更容易地学习复杂算法，而无需忍受自行安装依赖项的烦恼。这大大降低了新手接触生成器和深度学习的门槛。


    不幸的是，随着人工智能/机器学习技术的飞速发展，我们遇到了收益递减的瓶颈：代码示例变得异常庞大，新变体或新功能层出不穷，以至于解释一种新型 GAN 就可能耗尽本书的剩余篇幅。因此，在本章及接下来的几章中，我们将采用更偏向功能性的方法，使用封装好的代码来运用生成器。


    在本章中，我们将首次尝试使用封装好的开源代码，这些代码可以快速搭建，并用于训练或实际的生成任务。本章中我们将看到的所有示例都是生成器的进阶版本。虽然我们不会深入分析它们的代码，但会从宏观层面了解它们的工作原理。由于这些代码都是开源的，感兴趣的读者可以自行深入研究其内部机制。


    本章将从渐进式生成对抗网络（ProGAN）开始。这是一种通过训练逐步构建图像分辨率来开发生成器的方法。接着，我们将介绍风格生成对抗网络（StyleGAN），这是一种受风格迁移启发、基于
    ProGAN 构建的 GAN。我们还将探讨 StyleGAN2（即第二代版本），它在我们的老朋友 CelebA 数据集上训练后，能够产生一些非常出色的结果。


    在云端笔记本上训练高级 GAN 并非理想之选，因此在本章的最后部分，我们将探讨如何使用其他生成器包进行生成。首先，我们将介绍 DeOldify，这是一种受新启发的生成器，被称为
    NoGAN，能够为老照片和视频着色。然后，我们将以另一种非 GAN 的实现——ArtLine 来结束本章，它可以将照片转换为线条画。


    本章融合了训练 ProGAN 和 StyleGAN2 等高级示例，以及使用 DeOldify 和 ArtLine 等酷炫生成器的内容。与之前的章节相比，我们将把代码视为一个黑盒，只关注让程序包运行起来所需的部分。以下是本章将涵盖的主要内容摘要：


    -   渐进式增长的生成对抗网络

    -   使用 StyleGAN 第二版进行风格化

    -   使用新型 NoGAN——DeOldify

    -   使用 ArtLine 展现艺术效果


    如果您一直跟随本书的示例进行实践，那么现在您肯定已经是一位深度学习和 GAN 训练大师了。虽然在本章中我们仍会借鉴其中的一些技能，但我们将采用更偏向功能性的生成方法。不过在此之前，我们将在下一节中探讨渐进式
    GAN 增长的基础知识。


    ## 渐进式增长的生成对抗网络


    2016 年，英伟达的一个团队发表了一篇题为《渐进式增长生成对抗网络以提升质量、稳定性和多样性》的论文。该论文概述了一种渐进式增长 GAN 的流程，从非常低分辨率的图像开始，逐步提升到高分辨率。一个
    ProGAN 可能从 4×4 像素的图像开始，最终生成 1024×1024 的高分辨率图像。


    ProGAN 的概念源于解决我们在卷积中经常遇到的问题。正如我们在本书中反复看到的，卷积层越深，它们产生的噪声就越多。我们在探索用于特征提取和重建的深度 CNN
    层的各个章节中都观察到了这一点。


    我们已经看到了几种解决深度卷积问题的方法，包括批归一化、UNet、ResNet 以及带有谱归一化的自注意力机制。虽然这些方法本身已经取得了成功，但 ProGAN
    的概念更进一步，将训练分解为多个渐进阶段。


    毕竟，我们不能指望给小学生讲授微积分，那么我们又怎能期望一个未经训练的 GAN 在没有过往经验的情况下学会生成人脸呢？尽管我们通过数千次迭代输入数千张人脸来尝试训练这样的模型，但这种训练方式会变得效率低下。


    正如我们现在所知，这种低效率发生在我们的模型变得过大过深，包含数十或数百个卷积层的时候。但是，如果我们要训练模型生成高分辨率图像，就必须创建如此庞大的模型。然而，ProGAN
    并非从一开始就构建这些模型，而是通过训练逐步构建模型。


    图 8-1 展示了在面部数据上训练 ProGAN 的渐进过程。该过程首先将真实的训练图像缩小到 4×4 像素，然后将它们输入到为该图像尺寸设计的 GAN 中。经过一段时间的训练后，通过添加用于更高分辨率的新层来增长
    GAN，首先是 8×8，然后逐步增加到 16×16、32×32、64×64，以此类推，直到 1024×1024。


    渐进式增长 GAN 的代价是，需要反复构建后续模型，且分辨率越来越高，从而增加了额外的训练时间。此外，训练此类模型需要额外的数据准备和存储空间。在使用像 Colab
    这样的云端笔记本时，这些要求并不理想，因此我们将在练习中坚持使用一些更简单的示例。


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig1_HTML.jpg](img/502181_1_En_8_Fig1_HTML.jpg)


    图 8-1


    ProGAN 训练渐进过程


    图 8-2 展示了原始作者提出的 ProGAN 中生成器和判别器的内部结构。在图中，您可以看到用于定义 GAN 从 4×4 到 16×16 初始渐进阶段的基础模块。随着模型继续构建到所需的任何分辨率，会使用图中所示的模板形成新的模块，其中
    k 代表最终输出图像所需的像素分辨率。


    ![../images/502181_1_En_8_Chapter/502181_1_En_8_Fig2_HTML.png](img/502181_1_En_8_Fig2_HTML.png)


    图 8-2


    ProGAN 内部结构


    在图 8-2 所示的生成器内部，有一种称为 Pixelnorm（像素归一化层）的新型层。像素归一化类似于批归一化，不同之处在于它将每个特征像素向量归一化到长度为
    1，并将其传递回模块中的卷积层。这样做是为了避免我们在前几章中遇到的“特征叠加”或“噪声特征提取”问题。

