- fmt: "## Resolving Distance with WGAN\n\nOne approach to resolving distribution\
    \ or expected data distribution between the generator and discriminator is to\
    \ not make it an issue. That may sound like an oversimplification of a complex\
    \ problem, and indeed it can be. However, what if we could find another way of\
    \ measuring the separation between two expected distributions?\n\nIn simple terms,\
    \ the Wasserstein distance is a way to measure dissimilarity between two distributions,\
    \ expected or real, using a single scalar distance measured by the amount of work\
    \ to transform one into another. The approach often used to describe this is to\
    \ think of two piles of dirt. Both piles are of equal mass/size but are different\
    \ shapes. The Wasserstein metric or distance is the amount of work it would take\
    \ to transform the first pile of dirt into the second, as shown in Figure [4-3](#502181_1_En_4_Chapter.xhtml#Fig3).\n\
    \nThat means we ignore the distance between the two distributions, and this allows\
    \ us to greatly simplify the math. Since we no longer worry about the distance,\
    \ the loss functions become simplified and in turn are the difference between\
    \ real and fake. It also means that the discriminator can no longer discriminate\
    \ between what is real or fake, but instead just critique. As such, we now call\
    \ our discriminator a *critic*.\n\nThis method of measuring the distance between\
    \ two distributions is also known as *earth mover’s distance*. This term denotes\
    \ the amount of work it would take to move material/dirt from one pile to another\
    \ using discrete amounts. In simple terms, you could think of how many trips a\
    \ truck would need to move a pile of dirt from one location to the next.\n\nThe\
    \ math for all this breaks down the loss functions for the critic and generator\
    \ to just be the following:\n\nCritic Loss: `D(x) - D(G(z))`\n\nGenerator Loss:\
    \ `D(G(z))`\n\nThe other key difference here is the generator tries to maximize\
    \ the function, whereas in a vanilla GAN the generator minimizes loss.\n\n![../images/502181_1_En_4_Chapter/502181_1_En_4_Fig3_HTML.jpg](images/502181_1_En_4_Chapter/502181_1_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3\n\nWasserstein distance explained\n\nThere are a couple of other\
    \ key differences that result from these assumptions. First, the weights in the\
    \ network need to be clamped into a certain range to avoid vanishing/exploding\
    \ gradients in the critic/discriminator. Second, we need to increase training\
    \ iterations of the critic so that it works to approximate the real distribution\
    \ sooner.\n\nNow that we have some understanding of the concepts of how this works,\
    \ let’s dive into another code example and see how it works in practice. In Exercise\
    \ 4-2, we look at an implementation of the WGAN trained from the MNIST fashion\
    \ dataset. It is important that we learn the baseline training datasets to better\
    \ understand differences in GANs.\n\nEXERCISE 4-2. EXPLORING THE WGAN\n\n1.  Open\
    \ the `GEN_4_WGAN.ipynb` notebook from the GitHub project site. If you are unsure\
    \ how, then consult Appendix B.\n\n2.  Run the whole notebook by selecting Runtime\
    \ ➤ Run all. Then look past the `imports` cell and on to the first cell with the\
    \ `Hyperparameters` class, and examine the new hyperparameters, `n_critic` and\
    \ `clip_value`:\n\n```\nclass Hyperparameters(object):\n    def __init__(self,\
    \ **kwargs):\n        self.__dict__.update(kwargs)\nhp = Hyperparameters(n_epochs=200,\n\
    \                     batch_size=64,\n                     lr=0.00005,\n     \
    \                n_cpu=8,\n                     latent_dim=100,\n            \
    \         img_size=32,\n                     channels=1,\n                   \
    \  n_critic=25,\n                     clip_value=.005,\n                     sample_interval=400)\n\
    ```\n\n3.  The new hyperparameters are `n_critic` and `clip_value`. `n_critic`\
    \ defines the number of critic iterations in training, and `clip_value` sets the\
    \ limits of the weights in the critic/discriminator.\n\n4.  You can scroll down\
    \ to the last code block, which is the training block. Most of the code in this\
    \ example we covered in previous examples, so we don’t need to review it here.\n\
    \n5.  We will focus on the inner block of training code starting with the discriminator/critic\
    \ loss, as shown here:\n\n```\nvalid = Variable(Tensor(imgs.shape[0], 1).fill_(1.0),\
    \ requires_grad=False)\nfake = Variable(Tensor(imgs.shape[0], 1).fill_(0.0), requires_grad=False)\n\
    real_imgs = Variable(imgs.type(Tensor))\noptimizer_G.zero_grad()\nz = Variable(Tensor(np.random.normal(0,\
    \ 1,\n                (imgs.shape[0], hp.latent_dim))))\nfake_imgs = generator(z).detach()\n\
    d_loss = -torch.mean(discriminator(real_imgs)) + torch.mean(discriminator(fake_imgs))\n\
    d_loss.backward()\noptimizer_D.step()\n```\n\n6.  The top part of that generates\
    \ the ground truths of valid and fake tensors we have seen before. After that,\
    \ we see the set of `real_imgs` extracted from the batch as well as `fake_imgs`\
    \ generated from a random `z`. After that, the critic/discriminator loss is calculated\
    \ from subtracting the mean of passing `real_imgs` into the discriminator from\
    \ the mean of the `fake_imgs` passed into the discriminator. In a vanilla GAN,\
    \ we would use the binary cross-entropy function to measure the loss.\n\n7.  Next,\
    \ we will look at the code that does the weight clamping. We again need to clamp\
    \ the weights into a narrow window to avoid exploding gradients.\n\n```\nfor p\
    \ in discriminator.parameters():\n    p.data.clamp_(-hp.clip_value, hp.clip_value)\n\
    ```\n\n8.  After that, we start the section that controls the iteration of the\
    \ generator loss starting with the `if` statement:\n\n```\nif i % hp.n_critic\
    \ == 0:\n    optimizer_G.zero_grad()\n    gen_imgs = generator(z)\n    g_loss\
    \ = -torch.mean(discriminator(gen_imgs))\n    g_loss.backward()\n    optimizer_G.step()\n\
    ```\n\n9.  The `if` statement controls how after the generator is run per critic\
    \ training pass. After that, most of the code is familiar, but notice the simplification\
    \ for calculation of loss, `g_loss`, for the generator.\n\nThe output from this\
    \ training example will be somewhat disappointing considering our most recent\
    \ expeditions into running more advanced GANs like the DCGAN. It becomes obvious\
    \ that the WGAN is not well suited or equipped to learn the MNIST fashion dataset.\
    \ If we used a different dataset, we would expect much better results. So, what\
    \ is wrong with the MNIST fashion dataset?\n\nThe problem with the fashion dataset\
    \ is the makeup of the images are too diverse to easily learn a common or generalized\
    \ expected distribution. In other words, the picture of a shoe is far too different\
    \ than a picture of a sweater or pants. This problem becomes compounded with the\
    \ more classes or domains of data we try to train on.\n\nWhile we can fix the\
    \ problem of learning diverse domains by doing feature extraction, like we did\
    \ with the DCGAN, ideally we want to solve the root cause of the problem by looking\
    \ how we can manage or characterize loss across domains or classes. We will look\
    \ at one such approach in the next section."
