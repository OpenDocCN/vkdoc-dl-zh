- fmt: "# Building a Variational Autoencoder\n\nIn our previous example exercises,\
    \ we explored how networks perform function approximation and discovered the latent\
    \ space at discrete intervals. We found that by increasing our amount of data\
    \ sampling intervals we could reduce our unknown latent space and improve our\
    \ model training. This is a technique that works well for simplistic functions\
    \ but does not scale to more complex problems.\n\nA better approach to understanding\
    \ our problem and the data itself is with statistics. Statistics allows us to\
    \ understand the model and latent space in the data. In turn, statistics can provide\
    \ us with a summary or overview of the models and the way we generate new data.\n\
    \nStatistics are fundamental to data science, deep learning, and generative modeling.\
    \ In data science we use statistics to make decisions on what data to use. For\
    \ deep learning, statistics are used to measure a model’s efficiency, while generative\
    \ modeling uses statistics to understand what the model is learning.\n\nNow before\
    \ we jump into the statistics of generative modeling and understanding latent\
    \ spaces, it would be helpful to look at a working example. This example also\
    \ can take a while to train, so while it does, you can read up on the theory in\
    \ the next section.\n\nIn our next exercise, we are going to dive in and build\
    \ a variational autoencoder (VAE). A VAE is like an autoencoder in structure and\
    \ function except in how it learns that encoding part. Remember in an AE, the\
    \ model learns how to encode a latent representation of the data before decoding\
    \ it back to the original. In a VAE, the model learns how the latent encoding\
    \ is distributed. We won’t worry about understanding the distributed part just\
    \ yet but instead jump in and see how the code works in Exercise 3-4.\n\n## EXERCISE\
    \ 3-4: BUILDING A CONVOLUTIONAL VARIATIONAL AUTOENCODER\n\n1. Since we covered\
    \ the next few sections of data handling code before, we will jump down to the\
    \ cell that defines the `ConvVAE` class and the `__init__` function.\n\n```\n\
    class ConvVAE(nn.Module):\n    def __init__(self, image_channels=3, h_dim=1024,\
    \ z_dim=32):\n        super(ConvVAE, self).__init__()\n        self.encoder =\
    \ nn.Sequential(\n            nn.Conv2d(image_channels, 32, kernel_size=4, stride=2),\n\
    \            nn.ReLU(),\n            nn.Conv2d(32, 64, kernel_size=4, stride=2),\n\
    \            nn.ReLU(),\n            nn.Conv2d(64, 128, kernel_size=4, stride=2),\n\
    \            nn.ReLU(),\n            nn.Conv2d(128, 256, kernel_size=4, stride=2),\n\
    \            nn.ReLU(),\n            Flatten()\n        )\n        self.fc1 =\
    \ nn.Linear(h_dim, z_dim)\n        self.fc2 = nn.Linear(h_dim, z_dim)\n      \
    \  self.fc3 = nn.Linear(z_dim, h_dim)\n        self.decoder = nn.Sequential(\n\
    \            UnFlatten(),\n            nn.ConvTranspose2d(h_dim, 128, kernel_size=5,\
    \ stride=2),\n            nn.ReLU(),\n            nn.ConvTranspose2d(128, 64,\
    \ kernel_size=5, stride=2),\n            nn.ReLU(),\n            nn.ConvTranspose2d(64,\
    \ 32, kernel_size=6, stride=2),\n            nn.ReLU(),\n            nn.ConvTranspose2d(32,\
    \ image_channels, kernel_size=6, stride=2),\n            nn.Sigmoid(),\n     \
    \   )\n```\n\n2. This code is like the convolutional autoencoder we looked at\
    \ before. The key difference here is the use of the three `nn.Linear` layers that\
    \ now are responsible for learning the middle encoding distribution. Previously\
    \ we defined a discrete data size as our learning representation. Have some patience:\
    \ we will talk more about learning distributions later.\n\n3. Jump over the remaining\
    \ functions in the `ConvVAE` class and down to the block of code where the optimizer\
    \ is defined.\n\n```\noptimizer = torch.optim.Adam(model.parameters(), lr=learning_rate)\n\
    def loss_fn(recon_x, x, mu, logvar):\n    BCE = F.binary_cross_entropy(recon_x,\
    \ x, size_average=False)\n    KLD = -0.5 * torch.mean(1 + logvar - mu.pow(2) -\
    \ logvar.exp())\n    return BCE + KLD, BCE, KLD\n```\n\n4. We can see in the previous\
    \ code the definition of a specialize loss function `loss_fn`. The code in this\
    \ function is responsible for learning latent encoding distribution. Again, details\
    \ to come later.\n\n5. Finally, we come to the last block of the training code.\
    \ This section is almost identical to our previous exercises. One key difference\
    \ to note, however, is the highlighted line starting with `images =`. This line\
    \ converts the images from a CPU tensor to a GPU tensor, the difference being\
    \ where the memory resides and how it is processed. Tensors processed on GPUs\
    \ can increase performance by more than 100x.\n\n```\nfor epoch in range(epochs):\n\
    \    train_loss = 0.0\n    for data in train_loader:\n        images, labels =\
    \ data\n        optimizer.zero_grad()\n        images = images.to(device)\n  \
    \      generated, mu, logvar = model(images)\n        loss, bce, kld = loss_fn(generated,\
    \ images, mu, logvar)\n        loss.backward()\n        optimizer.step()\n   \
    \     train_loss += loss.item()*images.size(0)\n    train_loss = train_loss/len(train_loader)\n\
    \    clear_output()\n    print(f'Epoch: {epoch+1} Training Loss: {train_loss:.3f}')\n\
    \    plot_images(generated.cpu().data,labels,16)\n```\n\n6. Keep the notebook\
    \ training as you continue reading through the next section. Be sure to check\
    \ back periodically to see how the model progression learns. If you are not happy\
    \ with the results, keep the model training by running the last cell. Each run\
    \ of the last cell will add another 100 iterations of training to the model.\n\
    \n1. Open the `GEN_3_conv_VAE.ipynb` notebook from the GitHub project site.\n\n\
    2. Run the whole notebook by selecting Runtime ➤ Run all. Just below the first\
    \ import cell, you will notice a cell checking for the device type, as shown in\
    \ the following code:\n\n```\ndevice = torch.device('cuda' if torch.cuda.is_available()\
    \ else 'cpu')\ndevice\n```\n\n3. For this notebook and all future notebooks, we\
    \ will be configuring the runtime to use a GPU. Figure [3-11](#502181_1_En_3_Chapter.xhtml#Fig11)\
    \ shows the runtime type accessible from the menu by selecting Runtime ➤ Change\
    \ runtime type.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig11_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nChanging the runtime type on a Colab notebook\n\nYou can keep\
    \ incrementally training your model if the notebook’s runtime is not reset or\
    \ expires. The runtime can be manually reset in the notebook or Google will expire\
    \ it for you over time. Google suggests a runtime is good for 12 hours, but several\
    \ factors appear to affect that. A few can be the number of notebooks you are\
    \ running, if they are using GPUs and traffic.\n\nFigure [3-12](#502181_1_En_3_Chapter.xhtml#Fig12)\
    \ shows the result of training the model after 100, 200, and 500 epochs. Notice\
    \ how the VAE learns over iterations and try to pick out similarities and differences\
    \ in the output. In fact, it almost looks like our model is going to the optometrist\
    \ and being fitted for different levels of glasses. Each training iteration is\
    \ fitting a better pair of glasses and thus making the images less fuzzy and more\
    \ distinguishable.\n\n![../images/502181_1_En_3_Chapter/502181_1_En_3_Fig12_HTML.jpg](images/502181_1_En_3_Chapter/502181_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nTraining results of VAE after 1, 50, and 101 iterations\n\nNow\
    \ that we have seen how a VAE can function, we want to understand how the internal\
    \ model works and learn the distribution or variation of the data in the next\
    \ section."
  raw: "## Building a Variational Autoencoder\n\nIn our previous example exercises,\
    \ we explored how networks perform function approximation and discovered the latent\
    \ space at discrete intervals. We found that by increasing our amount of data\
    \ sampling intervals we could reduce our unknown latent space and improve our\
    \ model training. This is a technique that works well for simplistic functions\
    \ but does not scale to more complex problems.\n\nA better approach to understanding\
    \ our problem and the data itself is with statistics. Statistics allows us to\
    \ understand the model and latent space in the data. In turn, statistics can provide\
    \ us with a summary or overview of the models and the way we generate new data.\n\
    \nStatistics are fundamental to data science, deep learning, and generative modeling.\
    \ In data science we use statistics to make decisions on what data to use. For\
    \ deep learning, statistics are used to measure a model’s efficiency, while generative\
    \ modeling uses statistics to understand what the model is learning.\n\nNow before\
    \ we jump into the statistics of generative modeling and understanding latent\
    \ spaces, it would be helpful to look at a working example. This example also\
    \ can take a while to train, so while it does, you can read up on the theory in\
    \ the next section.\n\nIn our next exercise, we are going to dive in and build\
    \ a variational autoencoder (VAE). A VAE is like an autoencoder in structure and\
    \ function except in how it learns that encoding part. Remember in an AE, the\
    \ model learns how to encode a latent representation of the data before decoding\
    \ it back to the original. In a VAE, the model learns how the latent encoding\
    \ is distributed. We won’t worry about understanding the distributed part just\
    \ yet but instead jump in and see how the code works in Exercise 3-4.\n\nEXERCISE\
    \ 3-4: BUILDING A CONVOLUTIONAL VARIATIONAL AUTOENCODER\n\n1.  Since we covered\
    \ the next few sections of data handling code before, we will jump down to the\
    \ cell that defines the `ConvVAE` class and the `__init__` function.\n\n```\n\
    \    class ConvVAE(nn.Module):\n    def __init__(self, image_channels=3, h_dim=1024,\
    \ z_dim=32):\n    super(ConvVAE, self).__init__()\n    self.encoder = nn.Sequential(\n\
    \    nn.Conv2d(image_channels, 32, kernel_size=4, stride=2),\n    nn.ReLU(),\n\
