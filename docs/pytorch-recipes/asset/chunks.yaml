- fmt: "在 TensorFlow 中，我们必须定义张量、初始化会话并为张量对象保留占位符；然而，在 PyTorch 中我们不需要执行这些操作。\n\n在 TensorFlow\
    \ 中，以情感分析为例。输入句子被标记为正面或负面标签。如果输入句子的长度不相等，那么我们设置最大句子长度并添加零以使其他句子的长度相等，以便循环神经网络能够运行；然而，这是\
    \ PyTorch 中的内置功能，因此我们不必定义句子的长度。\n\n在 PyTorch 中，调试更加容易和简单，但在 TensorFlow 中这是一项困难的任务。\n\
    \n在数据可视化方面，模型部署在 TensorFlow 中绝对更好；然而，PyTorch 正在发展，我们期望最终能在未来看到相同的功能。\n\nTensorFlow\
    \ 无疑经历了许多变化才达到稳定状态。PyTorch 刚刚进入游戏，因此需要一些时间才能充分发挥该工具的潜力。\n\n## 什么是 PyTorch？\n\n\
    PyTorch 是由 Facebook 的人工智能部门开发的机器学习和深度学习工具，用于处理大规模图像分析，包括对象检测、分割和分类。然而，它并不仅限于这些任务。它可以与其他框架一起使用来实现复杂的算法。它是使用\
    \ Python 和 C++ 语言编写的。为了在 GPU 环境中处理大规模计算，编程语言应相应地进行修改。PyTorch 提供了一个很好的框架来编写自动在\
    \ GPU 环境中运行的函数。\n\n## PyTorch 安装\n\n安装 PyTorch 非常简单。在 Windows、Linux 或 macOS 中，如果您熟悉用于管理包的\
    \ Anaconda 和 Conda 环境，则安装非常简单。以下步骤描述了如何在 Windows/macOS/Linux 环境中安装 PyTorch。\n\n\
    1.  打开 Anaconda 导航器并转到环境页面，如图 [1-2](#474315_1_En_1_Chapter.xhtml#Fig2) 中的截图所示。\n\
    \n    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Fig2_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Fig2_HTML.jpg)\n\
    \n    图 1-2\n\n    ML、DL 和 AI 之间的关系\n\n2.  打开终端并输入以下内容：\n\n    ```\n    conda\
    \ install -c peterjc123 pytorch\n    ```\n\n3.  启动 Jupyter 并打开 IPython Notebook。\n\
    \n4.  输入以下命令以检查 PyTorch 是否已安装。\n\n5.  检查 PyTorch 的版本。\n\n```\nfrom __future__\
    \ import print_function\nimport torch\n```\n\n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figa_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figa_HTML.jpg)\n\
    \n此安装过程是在 Microsoft Windows 机器上完成的。该过程可能因操作系统而异，因此对于安装和错误相关的任何问题，请使用以下 URL。\n\n\
    有两种安装方式：`Conda`（`Anaconda`）库管理或 `Pip3` 包管理框架。此外，本地系统（如 macOS、Windows 或 Linux）和云机器（如\
    \ Microsoft Azure、AWS 和 GCP）的安装是不同的。要根据您的平台进行设置，请遵循 [`https://PyTorch.org/get-started/cloud-partners/`](https://pytorch.org/get-started/cloud-partners/)\
    \ 上的官方 PyTorch 安装文档。\n\nPyTorch 有各种组件。\n\n*   `Torch` 具有类似于 `NumPy` 的功能，并支持 GPU。\n\
    *   `Autograd` 的 `torch.autograd` 提供了用于实现任意标量值函数自动微分的类、方法和函数。它需要对现有代码进行最少的更改。您只需要声明\
    \ `class:'Tensor'`，对于这些张量，应使用 `requires_grad=True` 关键字计算梯度。\n*   `NN` 是 PyTorch\
    \ 中的神经网络库。\n*   `Optim` 提供了用于函数最小化和最大化的优化算法。\n*   `Multiprocessing` 是一个用于多个张量之间内存共享的有用库。\n\
    *   `Utils` 具有加载数据的实用函数；它还具有其他函数。\n\n现在我们准备继续本章的内容。\n\n## 配方 1-1：使用张量\n\n### 问题\n\
    \nPyTorch 中使用的数据结构是基于图和基于张量的，因此，理解基本操作和定义张量非常重要。\n\n### 解决方案\n\n这个问题的解决方案是练习张量及其操作，其中包括许多使用各种操作的示例。虽然假设用户熟悉\
    \ PyTorch 和 Python 基础知识，但复习 PyTorch 对于激发新用户的兴趣至关重要。"
