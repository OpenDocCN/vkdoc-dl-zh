- fmt: '# Introduction to PyTorch, Tensors, and Tensor Operations


    `PyTorch` has been evolving as a larger framework for writing dynamic models.
    Because of that, it is very popular among data scientists and data engineers deploying
    large-scale deep learning frameworks. This book provides a structure for the experts
    in terms of handling activities while working on a practical data science problem.
    As evident from applications that we use in our day-to-day lives, there are layers
    of intelligence embedded with the product features. Those features are enabled
    to provide a better experience and better services to the user.


    The world is moving toward artificial intelligence. There are two main components
    of it: deep learning and machine learning. Without deep learning and machine learning,
    it is impossible to visualize artificial intelligence.


    `PyTorch` is the most optimized high-performance tensor library for computation
    of deep learning tasks on GPUs (graphics processing units) and CPUs (central processing
    units). The main purpose of `PyTorch` is to enhance the performance of algorithms
    in large-scale computing environments. `PyTorch` is a library based on Python
    and the Torch tool provided by Facebook’s Artificial Intelligence Research group,
    which performs scientific computing.


    `NumPy`-based operations on a GPU are not efficient enough to process heavy computations.
    Static deep learning libraries are a bottleneck for bringing flexibility to computations
    and speed. From a practitioner’s point of view, `PyTorch` tensors are very similar
    to the N-dimensional arrays of a `NumPy` library based on Python. The `PyTorch`
    library provides bridge options for moving a `NumPy` array to a tensor array,
    and vice versa, in order to make the library flexible across different computing
    environments.


    The use cases where it is most frequently used include natural language processing,
    image processing, computer vision, social media data analysis, and sensor data
    processing. Although `PyTorch` provides a large collection of libraries and modules
    for computation, three modules are very prominent.


    - `Autograd`. This module provides functionality for automatic differentiation
    of tensors. A recorder class in the program remembers the operations and retrieves
    those operations with a trigger called `backward` to compute the gradients. This
    is immensely helpful in the implementation of neural network models.


    - `Optim`. This module provides optimization techniques that can be used to minimize
    the error function for a specific model. Currently, `PyTorch` supports various
    advanced optimization methods, which includes Adam, stochastic gradient descent
    (SGD), and more.


    - `NN`. `NN` stands for *neural network* model. Manually defining the functions,
    layers, and further computations using complete tensor operations is very difficult
    to remember and execute. We need functions that automate the layers, activation
    functions, loss functions, and optimization functions and provides a layer defined
    by the user so that manual intervention can be reduced. The `NN` module has a
    set of built-in functions that automates the manual process of running a tensor
    operation.


    Industries in which artificial intelligence is applied include banking, financial
    services, insurance, health care, manufacturing, retail, clinical trials, and
    drug testing. Artificial intelligence involves classifying objects, recognizing
    the objects to detecting fraud, and so forth. Every learning system requires three
    things: input data, processing, and an output layer. Figure 1-1 explains the relationship
    between these three topics. If the performance of any learning system improves
    over time by learning from new examples or data, it is called a *machine learning
    system*. When a machine learning system becomes too difficult to reflect reality,
    it requires a deep learning system.


    In a deep learning system, more than one layer of a learning algorithm is deployed.
    In machine learning, we think of supervised, unsupervised, semisupervised, and
    reinforcement learning systems. A supervised machine-learning algorithm is one
    where the data is labeled with classes or tagged with outcomes. We show the machine
    the input data with corresponding tags or labels. The machine identifies the relationship
    with a function. Please note that this function connects the input to the labels
    or tags.


    In unsupervised learning, we show the machine only the input data and ask the
    machine to group the inputs based on association, similarities or dissimilarities,
    and so forth.


    In semisupervised learning, we show the machine input features and labeled data
    or tags; however we ask the machine to predict the untagged outcomes or labels.


    In reinforcement learning, we introduce a reward and penalty mechanism, where
    every correct action is rewarded and every incorrect action is penalized.


    In all of these examples of machine learning algorithms, we assume that the dataset
    is small, because getting massive amounts of tagged data is a challenge, and it
    takes a lot of time for machine learning algorithms to process large-scale matrix
    computations. Since machine learning algorithms are not scalable for massive datasets,
    we need deep learning algorithms.


    Figure 1-1 shows the relationships among artificial intelligence, machine learning,
    and deep learning. Natural language is an important part of artificial intelligence.
    We need to develop systems that understand natural language and provide responses
    to the agent. Let’s take an example of machine translation, where a sentence in
    language 1 (French) can be converted to language 2 (English), and vice versa.
    To develop such a system, we need a large collection of English-French bilingual
    sentences. The corpus requirement is very large, as all the language nuances need
    to be covered by the model.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Fig1_HTML.png](images/474315_1_En_1_Chapter/474315_1_En_1_Fig1_HTML.png)


    Figure 1-1: Relationships among ML, DL, and AI


    After preprocessing and feature creation, you can observe hundreds of thousands
    of features that need to be computed to produce output. If we train a machine
    learning supervised model, it would take months to run and to produce output.
    To achieve scalability in this task, we need deep learning algorithms, such as
    a recurrent neural network. This is how the artificial intelligence is connected
    to deep learning and machine learning.


    There are various challenges in deploying deep learning models that require large
    volumes of labeled data, faster computing machines, and intelligent algorithms.
    The success of any deep learning system requires good labeled data and better
    computing machines because the smart algorithms are already available.


    The following are various use cases that require deep learning implementation:


    - Speech recognition

    - Video analysis

    - Anomaly detection from videos

    - Natural language processing

    - Machine translation

    - Speech-to-text conversion


    The development of the NVIDIA GPU computing for processing large-scale data is
    another path-breaking innovation. The programming language that is required to
    run in a GPU environment requires a different programming framework. Two major
    frameworks are very popular for implementing graphical computing: `TensorFlow`
    and `PyTorch`. In this book, we discuss `PyTorch` as a framework to implement
    data science algorithms and make inferences.


    The major frameworks for graph computations include `PyTorch`, `TensorFlow`, and
    `MXNet`. `PyTorch` and `TensorFlow` compete with each other in neurocomputations.
    `TensorFlow` and `PyTorch` are equally good in terms of performance; however,
    the real differences are known only when we benchmark a particular task. Concept-wise
    there are certain differences.'
