    # 解决方案


    我们将考虑一个示例数据集，其中包含两个变量（`x` 和 `y`）。在给定初始权重的情况下，我们能否通过计算得到每次迭代后的梯度？让我们来看这个例子。


    # 工作原理


    `x_data` 和 `y_data` 都是列表。要计算这两个数据列表的梯度，需要计算损失函数、执行前向传播，并在循环中运行相关操作。


    前向函数计算权重张量与输入张量的矩阵乘法。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figl_HTML.jpg](img/474315_1_En_2_Figl_HTML.jpg)


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figm_HTML.jpg](img/474315_1_En_2_Figm_HTML.jpg)


