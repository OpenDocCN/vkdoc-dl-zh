    should be constant, along the predictors on another axis, which means the error
    variance should be constant.


    *   The error term should be normally distributed. The error term is basically
    defined as the difference between an actual and a predicted variable.


    Within linear regression, there are different variants but in machine learning
    we consider them as one method. For example, if we are using one explanatory variable
    to predict the dependent variable, it is called a *simple linear regression model*
    . If we are using more than one explanatory variable, then the model is called
    a *multiple linear regression model* . The ordinary least square is a statistical
    technique to predict the linear regression model; hence, sometimes the linear
    regression model is also known as an *ordinary least square model* .


    Linear regression is very sensitive to missing values and outliers because the
    statistical method of computing a linear regression depends on the mean, standard
    deviation, and covariance between the variables. Mean is sensitive to outlier
    values; therefore, it is expected that we need to clear out the outliers before
    proceeding toward forming the linear regression model.


    In machine learning literature, the method for getting optimum beta coefficients
    that minimize the error in a regression model is achieved by a method called a
    *gradient descent algorithm* . How does the gradient descent algorithm work? It
    starts with an initial value, preferably from zero, and updates the scaling factor
    by a learning rate regularly iteratively to minimize the error term.


    Understanding linear regression based on a machine learning approach requires
    special data preparation that avoids assumptions by keeping the original data
    intact. Data transformation is required to make your model more robust.


    ## Recipe 5-1\. Data Preparation for the Supervised Model


    ### Problem


    How do we perform data preparation for creating a supervised learning model using
    PyTorch?


    ### Solution


    We take an open source dataset, mtcars.csv, which is a regression dataset, to
    test how to create an input and output tensor.


    ### How It Works


    First, the necessary library needs to be imported.


    ![../images/474315_1_En_5_Chapter/474315_1_En_5_Figa_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figa_HTML.jpg)


    The predictor for the supervised algorithm is qsec, which is used to predict the
    mileage per gallon provided by the car. What is important here is the data type.
    First, we import the data, which is in NumPy format, into a PyTorch tensor format.
    The default tensor format is a float. Using the tensor float format would cause
    errors when performing the optimization function, so it is important to change
    the tensor data type. We can reformat the tensor type by using the unsqueeze function
    and specifying that the dimension is equal to 1.


    ![../images/474315_1_En_5_Chapter/474315_1_En_5_Figb_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figb_HTML.jpg)


    To reproduce the same result, a manual seed needs to be set; so torch.manual_seed(1234)
    was used. Although we see that the data type is a tensor, if we check the type
    function, it will show as double, because a tensor type double is required for
    the optimization function.


    ![../images/474315_1_En_5_Chapter/474315_1_En_5_Figc_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figc_HTML.jpg)


    ## Recipe 5-2\. Forward and Backward Propagation


    ### Problem


    How do we build a neural network torch class function so that we can build a forward
    propagation method?


    ### Solution


    Design the neural network class function, including the hidden layer from the
    input layer and from the hidden layer to the output layer. In the neural network
    architecture, the number of neurons in the hidden layer also needs to be specified.'
