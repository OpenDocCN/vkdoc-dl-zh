  trans: "\n### 工作原理\n\n要应用张量微分，需要调用 `nn.backward()` 方法。我们通过一个示例来了解误差梯度是如何反向传播的。`grad()`\
    \ 函数保存了张量微分的最终输出。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figj_HTML.jpg](img/474315_1_En_5_Figj_HTML.jpg)\n\
