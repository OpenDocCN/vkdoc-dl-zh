    The words and phrases are represented in real vector format. The words or phrases
    that have similar meanings in a paragraph or document have similar vector representation.
    This makes the computation process effective in finding similar words. There are
    various algorithms for creating embedded vectors from text. `Word2vec` and `GloVe`
    are known frameworks to execute word embeddings. Let’s look at the following example.


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figa_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Figa_HTML.jpg)


