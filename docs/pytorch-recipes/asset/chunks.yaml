    Now let’s run the train and validation process. We first take the training input
    data and multiply it by the parameter’s next line. We make a prediction and compute
    the loss function. Using the same model in third line, we make predictions and
    then we evaluate the loss function for the validation dataset. In the backpropagation
    process, we calculate the gradient of the loss function for the training set,
    and using the optimizer, we update the parameters.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figaq_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figaq_HTML.jpg)


