    \n以下脚本说明了如何从 `mtcars.csv` 数据集中读取 `mpg` 和 `qsec` 列。它使用 `unsqueeze` 函数将这两个变量转换为张量，然后在神经网络模型中使用它们进行预测。\n\
    \n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figm_HTML.jpg](img/474315_1_En_5_Figm_HTML.jpg)\n\
    \n经过 1000 次迭代后，模型收敛。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Fign_HTML.jpg](img/474315_1_En_5_Fign_HTML.jpg)\n\
    \n`torch` 库中的神经网络通常与 `nn` 模块一起使用。让我们来看一下。\n\n神经网络可以使用 `torch.nn` 包构建，该包提供了几乎所有与神经网络相关的功能，包括以下内容。\n\
    \n- *线性层*：`nn.Linear`，`nn.Bilinear`\n- *卷积层*：`nn.Conv1d`，`nn.Conv2d`，`nn.Conv3d`，`nn.ConvTranspose2d`\n\
