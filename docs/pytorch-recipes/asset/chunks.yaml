    - *循环网络*：`nn.LSTM`，`nn.GRU`\n- *归一化*：`nn.BatchNorm2d`\n- *Dropout*：`nn.Dropout`，`nn.Dropout2d`\n\
    - *嵌入*：`nn.Embedding`\n- *损失函数*：`nn.MSELoss`，`nn.CrossEntropyLoss`，`nn.NLLLoss`\n\
    \n标准分类算法是监督学习算法的另一个版本，其中目标列是一个类别变量，特征可以是数值型或分类型。\n\n## 配方 5-5\\. 监督模型：逻辑回归\n\n\
    ### 问题\n\n如何使用 PyTorch 部署逻辑回归模型？\n\n### 解决方案\n\n计算图网络由节点表示，并通过函数连接。可以应用多种技术来最小化误差函数并获得最佳预测模型。我们可以增加迭代次数、估计损失函数、优化函数、打印实际值和预测值，并将其显示在图表中。\n\
    \n### 工作原理\n\n要应用张量微分，需要调用 `nn.backward()` 方法。让我们看一个例子。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figo_HTML.jpg](img/474315_1_En_5_Figo_HTML.jpg)\n\
    \n以下展示了逻辑回归模型的数据准备过程。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figp_HTML.jpg](img/474315_1_En_5_Figp_HTML.jpg)\n\
    \n让我们看一下用于分类的示例数据集。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figq_HTML.jpg](img/474315_1_En_5_Figq_HTML.jpg)\n\
    \n为逻辑回归模型设置神经网络模块。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figr_HTML.jpg](img/474315_1_En_5_Figr_HTML.jpg)\n\
    \n检查神经网络配置。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figs_HTML.jpg](img/474315_1_En_5_Figs_HTML.jpg)\n\
    \n运行迭代并为样本图找到最佳解决方案。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figt_HTML.jpg](img/474315_1_En_5_Figt_HTML.jpg)\n\
    \n第一次迭代提供了近 99% 的准确率，随后模型在训练数据上达到了 100% 的准确率（见图 5-3 和 5-4）。\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Fig4_HTML.jpg](img/474315_1_En_5_Fig4_HTML.jpg)\n\
    \n图 5-4：最终准确率\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Fig3_HTML.jpg](img/474315_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3：初始准确率\n\n最终准确率显示为 100，这是一个明显的过拟合案例，但我们可以通过引入 dropout 率来控制这一点，这将在下一章中讨论。\n\
    \n## 结论\n\n本章讨论了两种主要的监督学习算法——线性回归和逻辑回归——以及它们使用样本数据集和 PyTorch 程序的实现。这两种算法都是线性模型，一种用于预测实值输出，另一种用于将一个类别与另一个类别分开。尽管我们在逻辑回归示例中考虑了二分类，但它可以扩展到多分类模型。\n\
    \n# 6. 使用 PyTorch 微调深度学习模型\n\n深度学习模型正变得非常流行。它们在生物神经元连接方式以及信息在网络模型中从一个节点传输到另一个节点的方式上有着非常深厚的根基。\n\
    \n深度学习有非常特定的用途，特别是当基于单一函数的机器学习技术无法逼近现实生活中的挑战时。例如，当数据维度非常大（数千维）时，标准的机器学习算法无法预测或分类结果变量。这在计算上效率也不高。它会消耗大量资源，并且模型永远不会收敛。最突出的例子是目标检测、图像分类和图像分割。\n\
    \n最常用的深度学习算法可以分为三类。\n\n- *卷积神经网络*。主要适用于高度稀疏数据集、图像分类、图像识别、目标检测等。\n- *循环神经网络*。适用于处理序列信息，如果数据生成方式中存在任何内部序列结构。这包括音乐、自然语言、音频和视频，这些信息是按顺序消费的。\n\
    - *深度神经网络*。通常适用于单层机器学习算法无法正确分类或预测的情况。有三种变体。\n  - *深度网络*，其中每个隐藏层中的神经元数量通常多于前一层。\n\
    \  - *宽度网络*，其中隐藏层的数量多于通常的神经网络模型。\n  - *深度和宽度网络*，其中网络中的神经元数量和层数都非常高。\n\n本章讨论如何使用超参数微调深度学习模型。参数和超参数之间存在区别。通常在深度学习模型中，我们不对估计参数感兴趣，因为它们是权重，并且会根据初始值、学习率和迭代次数不断变化。重要的是决定用于微调模型的超参数，如第\
    \ 3 章所述，以便获得最佳结果。\n\n## 配方 6-1\\. 构建序列神经网络\n\n### 问题\n\n有没有办法像在 Keras 中那样，在 PyTorch\
    \ 中构建序列神经网络模型，而不是声明神经网络模型？\n"
- fmt: '### Solution


    If we declare the entire neural network model, line by line, with the number of
    neurons, number of hidden layers and iterations, choice of loss functions, optimization
    functions, and the selection of weight distribution, and so forth, it will be
    extremely cumbersome to scale the model. And, it is not foolproof—errors could
    crop up in the model. To avoid the issues in declaring the entire model line by
    line, we can use a high-level function that assumes certain default parameters
    in the back end and returns the result to the user with minimum hyperparameters.
    Yes, it is possible to not have to declare the neural network model.


    ### How It Works


    Let’s look at how to create such models. In the Torch library, the neural network
    module contains a functional API (application programming interface) that contains
    various activation functions, as discussed in earlier chapters.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figa_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figa_HTML.jpg)


    In the following lines of script, we create a simple neural network model with
    linear function as the activation function for input to the hidden layer, and
    the hidden layer to the output layer.


    The following function requires declaring `class Net`, declaring the features,
    hidden neurons, and activation functions, which can be easily replaced by the
    sequential module.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figb_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figb_HTML.jpg)


    Instead of using this script, we can change the class function and replace it
    with the sequential function. The Keras functions replace the TensorFlow functions,
    which means that many lines of TensorFlow code can be replaced by a few lines
    of Keras script. The same thing is possible in PyTorch without requiring any external
    modules. As an example, in the following, `net2` explains the sequential model
    and `net1` explains the preceding script. From a readability perspective, `net2`
    is much better than `net1`.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figc_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figc_HTML.jpg)


    If we simply print both the `net1` and `net2` model architectures, it does the
    same thing.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figd_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figd_HTML.jpg)


    ## Recipe 6-2\. Deciding the Batch Size


    ### Problem


    How do we perform batch data training for a deep learning model using PyTorch?


    ### Solution


    Training a deep learning model requires a large amount of labeled data. Typically,
    it is the process of finding a set of weights and biases in such a way that the
    loss function becomes minimal with respect to matching the target label. If the
    training process approximates well to the function, the prediction or classification
    becomes robust.


    ### How It Works


    There are two methods for training a deep learning network: batch training and
    online training. The choice of training algorithm dictates the method of learning.
    If the algorithm is backpropagation, then online learning is better. For a deep
    and wide network model with various layers of backpropagation and forward propagation,
    then batch training is better.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Fige_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Fige_HTML.jpg)


    In the training process, the batch size is 5; we can change the batch size to
    8 and see the results. In online training process, the weights and biases are
    updated for every training example based on the variations between predicted result
    and actual result. However, in the batch training process, the differences between
    actual and predicted values which is error gets accumulated and computed as a
    single number over the batch size, and reported at the final layer.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figf_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figf_HTML.jpg)


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figg_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figg_HTML.jpg)


    After training the dataset for five iterations, we can print the batch and step.
    If we compare the online training and batch training, batch training has many
    more advantages than online training. When the requirement is to train a huge
    dataset, there are memory constraints. When we cannot process a huge dataset in
    a CPU environment, batch training comes to the rescue. In a CPU environment, we
    can process large amounts of data with a smaller batch size.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figh_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figh_HTML.jpg)


    We take the batch size as 8 and retrain the model.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figi_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figi_HTML.jpg)


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figj_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figj_HTML.jpg)


    ## Recipe 6-3\. Deciding the Learning Rate


    ### Problem


    How do we identify the best solution based on learning rate and the number of
    epochs?


    ### Solution


    We take a sample tensor and apply various alternative models and print model parameters.
    The learning rate and epoch number are associated with model accuracy. To reach
    the global minimum state of the loss function, it is important to keep the learning
    rate to a minimum and the epoch number to a maximum so that the iteration can
    take the loss function to the minimum state.


    ### How It Works


    First, the necessary library needs to be imported. To find the minimum loss function,
    gradient descent is typically used as the optimization algorithm, which is an
    iterative process. The objective is to find the rate of decline of the loss function
    with respect to the trainable parameters.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figk_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figk_HTML.jpg)


    The sample dataset taken for the experiment includes the following.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figl_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figl_HTML.jpg)


    The sample dataset and the first five records would look like the following.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figm_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figm_HTML.jpg)


    Using the PyTorch utility function, let’s load the tensor dataset, introduce the
    batch size, and test out.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Fign_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Fign_HTML.jpg)


    Declare the neural network module.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figo_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figo_HTML.jpg)


    Now, let’s look at the network architecture.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figp_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figp_HTML.jpg)


    While performing the optimization, we can include many options; select the best
    among the best.


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figq_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figq_HTML.jpg)


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figr_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figr_HTML.jpg)


    ![../images/474315_1_En_6_Chapter/474315_1_En_6_Figs_HTML.jpg](images/474315_1_En_6_Chapter/474315_1_En_6_Figs_HTML.jpg)


    ## Recipe 6-4\. Performing Parallel Training


    ### Problem


    How do we perform parallel data training that includes a lot of models using PyTorch?


    ### Solution


    The optimizers are really functions that augment the tensor. The process of finding
    a best model requires parallel training of many models. The choice of learning
    rate, batch size, and optimization algorithms make models unique and different
    from other models. The process of selecting the best model requires hyperparameter
    optimization.'
