    如果我们稍微降低学习率，那么权重更新的过程会慢一些，这意味着需要增加轮次数才能为模型找到稳定状态。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figo_HTML.jpg](img/474315_1_En_3_Figo_HTML.jpg)


    以下是我们观察到的结果。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figp_HTML.jpg](img/474315_1_En_3_Figp_HTML.jpg)


    如果我们增加轮次数，那么损失函数和参数张量会发生什么变化，可以在下面的脚本中查看，我们在其中打印损失值以找到对应于轮次的最小损失。然后我们可以从模型中提取最佳参数。


