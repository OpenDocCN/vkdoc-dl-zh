    \ 中的神经网络库。\n*   `Optim` 提供了用于函数最小化和最大化的优化算法。\n*   `Multiprocessing` 是一个用于多个张量之间内存共享的有用库。\n\
    *   `Utils` 具有加载数据的实用函数；它还具有其他函数。\n\n现在我们准备继续本章的内容。\n\n## 配方 1-1：使用张量\n\n### 问题\n\
    \nPyTorch 中使用的数据结构是基于图和基于张量的，因此，理解基本操作和定义张量非常重要。\n\n### 解决方案\n\n这个问题的解决方案是练习张量及其操作，其中包括许多使用各种操作的示例。虽然假设用户熟悉\
    \ PyTorch 和 Python 基础知识，但复习 PyTorch 对于激发新用户的兴趣至关重要。\n"
- fmt: '### How It Works


    Let’s have a look at the following examples of tensors and tensor operation basics,
    including mathematical operations.


    The `x` object is a list. We can check whether an object in Python is a tensor
    object by using the following syntax. Typically, the `is_tensor` function checks
    and the `is_storage` function checks whether the object is stored as tensor object.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figb_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figb_HTML.jpg)


    Now, let’s create an object that contains random numbers from Torch, similar to
    NumPy library. We can check the tensor and storage type.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figc_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figc_HTML.jpg)


    The `y` object is a tensor; however, it is not stored. To check the total number
    of elements in the input tensor object, the numerical element function can be
    used. The following script is another example of creating zero values in a 2D
    tensor and counting the numerical elements in it.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figd_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figd_HTML.jpg)


    Like NumPy operations, the `eye` function creates a diagonal matrix, of which
    the diagonal elements have ones, and off diagonal elements have zeros. The `eye`
    function can be manipulated by providing the shape option. The following example
    shows how to provide the shape parameter.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Fige_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Fige_HTML.jpg)


    Linear space and points between the linear space can be created using tensor operations.
    Let’s use an example of creating 25 points in a linear space starting from value
    2 and ending with 10. Torch can read from a NumPy array format.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figf_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figf_HTML.jpg)


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figg_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figg_HTML.jpg)


    Like linear spacing, logarithmic spacing can be created.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figh_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figh_HTML.jpg)


    Random number generation is a common process in data science to generate or gather
    sample data points in a space to simulate structure in the data. Random numbers
    can be generated from a statistical distribution, any two values, or a predefined
    distribution. Like NumPy functions, the random number can be generated using the
    following example. Uniform distribution is defined as a distribution where each
    outcome has equal probability of happening; hence, the event probabilities are
    constant.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figi_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figi_HTML.jpg)


    The following script shows how the random number from two values, 0 and 1, are
    selected. The result tensor can be reshaped to create a (4,5) matrix. The random
    numbers from a normal distribution with arithmetic mean 0 and standard deviation
    1 can also be created, as follows.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figj_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figj_HTML.jpg)


    To select random values from a range of values using random permutation requires
    defining the range first. This range can be created by using the `arrange` function.
    When using the `arrange` function, you must define the step size, which places
    all the values in an equal distance space. By default, the step size is 1.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figk_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figk_HTML.jpg)


    To find the minimum and maximum values in a 1D tensor, `argmin` and `argmax` can
    be used. The dimension needs to be mentioned if the input is a matrix in order
    to search minimum values along rows or columns.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figl_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figl_HTML.jpg)


    If it is either a row or column, it is a single dimension and is called a *1D
    tensor*. If the input is a matrix, in which rows and columns are present, it is
    called a *2D tensor*. If it is more than two-dimensional, it is called a *multidimensional
    tensor*.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figm_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figm_HTML.jpg)


    Now, let’s create a sample 2D tensor and perform indexing and concatenation by
    using the `concat` operation on the tensors.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Fign_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Fign_HTML.jpg)


    The sample `x` tensor can be used in 3D as well. Again, there are two different
    options to create three-dimensional tensors; the third dimension can be extended
    over rows or columns.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figo_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figo_HTML.jpg)


    A tensor can be split between multiple chunks. Those small chunks can be created
    along dim rows and dim columns. The following example shows a sample tensor of
    size (4,4). The chunk is created using the third argument in the function, as
    0 or 1.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figp_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figp_HTML.jpg)


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figq_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figq_HTML.jpg)


    The `gather` function collects elements from a tensor and places it in another
    tensor using an index argument. The index position is determined by the `LongTensor`
    function in PyTorch.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figr_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figr_HTML.jpg)


    The `LongTensor` function or the `index select` function can be used to fetch
    relevant values from a tensor. The following sample code shows two options: selection
    along rows and selection along columns. If the second argument is 0, it is for
    rows. If it is 1, then it is along the columns.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figs_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figs_HTML.jpg)


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figt_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figt_HTML.jpg)


    It is a common practice to check non-missing values in a tensor, the objective
    is to identify non-zero elements in a large tensor.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figu_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figu_HTML.jpg)


    Restructuring the input tensors into smaller tensors not only fastens the calculation
    process, but also helps in distributed computing. The `split` function splits
    a long tensor into smaller tensors.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figv_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figv_HTML.jpg)


    Now, let’s have a look at examples of how the input tensor can be resized given
    the computational difficulty. The `transpose` function is primarily used to reshape
    tensors. There are two ways of writing the `transpose` function: `.t` and `.transpose`.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figw_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figw_HTML.jpg)


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figx_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figx_HTML.jpg)


    The `unbind` function removes a dimension from a tensor. To remove the dimension
    row, the 0 value needs to be passed. To remove a column, the 1 value needs to
    be passed.


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figy_HTML.jpg](images/474315_1_En_1_Chapter/474315_1_En_1_Figy_HTML.jpg)


    Mathematical functions are the backbone of implementing any algorithm in PyTorch;
    therefore, it is needed to go through functions that help perform arithmetic-based
    operations. A scalar is a single value, and a tensor 1D is a row, like NumPy.
    The scalar multiplication and addition with a 1D tensor are done using the `add`
    and `mul` functions.'
