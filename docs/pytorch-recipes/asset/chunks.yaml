    ## Recipe 7-2\. CBOW Model in PyTorch


    ### Problem


    How do we create a CBOW model using `PyTorch`?


    ### Solution


    There are two different methods to represent words and phrases in vectors: *continuous
    bag of words* (CBOW) and *skip gram*. The bag-of-words approach learns embedding
    vectors by predicting the word or phrase in context. Context means the words before
    and after the current word. If we take a context of size 4, this implies that
    the four words to the left of the current word and the four words to the right
    of it are considered for context. The model tries to find those eight words in
    another sentence to predict the current word.


    ### How It Works


    Let’s look at the following example.


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figj_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Figj_HTML.jpg)


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figk_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Figk_HTML.jpg)


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figl_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Figl_HTML.jpg)


    Graphically, the bag-of-words model looks like what is shown in Figure [7-1](#474315_1_En_7_Chapter.xhtml#Fig1).
    It has three layers: input, which are the embedding vectors that take the words
    and phrases into account; the output vector, which is the relevant word predicted
    by the model; and the projection layer, which is a computational layer provided
    by the neural network model.


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Fig1_HTML.png](images/474315_1_En_7_Chapter/474315_1_En_7_Fig1_HTML.png)


    Figure 7-1


    CBOW model representation


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figm_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Figm_HTML.jpg)


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Fign_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Fign_HTML.jpg)


    ## Recipe 7-3\. LSTM Model


    ### Problem


    How do we create a LSTM model using `PyTorch`?


    ### Solution


    The *long short-term memory* (LSTM) model, also known as the *specific form of
    recurrent neural network* model, is commonly used in the natural language processing
    field. Text and sentences come in sequences to make a meaningful sentence, so
    we need a model that remembers the long and short sequences of text to predict
    a word or text.


    ### How It Works


    Let’s look at the following example.


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figo_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Figo_HTML.jpg)


    Prepare a sequence of words as training data to form the LSTM network.


