    Standard deviation shows the deviation from the measures of central tendency,
    which indicates the consistency of the data/variable. It shows whether there is
    enough fluctuation in data or not.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figk_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figk_HTML.jpg)


