    ## Conclusion


    This chapter is a refresher for people who have prior experience in PyTorch and
    Python. It is a basic building block for people who are new to the PyTorch framework.
    Before starting the advanced topics, it is important to become familiar with the
    terminology and basic syntaxes. The next chapter is on using PyTorch to implement
    probabilistic models, which includes the creation of random variables, the application
    of statistical distributions, and making statistical inferences.


    # 2. Probability Distributions Using PyTorch


    Probability and random variables are an integral part of computation in a graph-computing
    platform like PyTorch. Understanding probability and associated concepts are essential.
    This chapter covers probability distributions and implementation using PyTorch,
    and interpreting the results from tests.


    In probability and statistics, a random variable is also known as a *stochastic
    variable*, whose outcome is dependent on a purely stochastic phenomenon, or random
    phenomenon. There are different types of probability distributions, including
    normal distribution, binomial distribution, multinomial distribution, and Bernoulli
    distribution. Each statistical distribution has its own properties.


    The `torch.distributions` module contains probability distributions and sampling
    functions. Each distribution type has its own importance in a computational graph.
    The distributions module contains binomial, Bernoulli, beta, categorical, exponential,
    normal, and Poisson distributions.


    ## Recipe 2-1. Sampling Tensors


    ### Problem


    Weight initialization is an important task in training a neural network and any
    kind of deep learning model, such as a convolutional neural network (CNN), a deep
    neural network (DNN), and a recurrent neural network (RNN). The question always
    remains on how to initialize the weights.


    ### Solution


    Weight initialization can be done by using various methods, including random weight
    initialization. Weight initialization based on a distribution is done using uniform
    distribution, Bernoulli distribution, multinomial distribution, and normal distribution.
    How to do it using PyTorch is explained next.'
