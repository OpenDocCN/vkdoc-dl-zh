    ### 工作原理


    让我们看下面的例子。在之前的秘籍中，脚本的最后一行显示`grad_fn`是嵌入在输出张量对象中的一个对象。在本秘籍中，我们将解释这是如何计算的。`grad_fn`是损失函数相对于模型参数的导数。这正是我们在下面的`grad_fn`中所做的。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figj_HTML.jpg](img/474315_1_En_3_Figj_HTML.jpg)


    参数包括输入、偏置设置、学习率以及模型训练的轮数。对这些参数的估计为方程提供了数值。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figk_HTML.jpg](img/474315_1_En_3_Figk_HTML.jpg)


    这是初始结果的样子。轮次（Epoch）是一次迭代，它根据之前定义的损失函数产生一个损失值。`params`向量是关于需要改变以最小化损失函数的系数和常量的。`grad`函数计算反馈值给下一个轮次。这只是一个例子。选择的轮次数是一个迭代任务，取决于输入数据、输出数据以及损失函数和优化函数的选择。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figl_HTML.jpg](img/474315_1_En_3_Figl_HTML.jpg)


    如果我们降低学习率，我们就能以更好的方式将相关值传递给梯度、进行参数更新，并且模型收敛会变得更快。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figm_HTML.jpg](img/474315_1_En_3_Figm_HTML.jpg)


    初始结果如下所示。结果是在第 5 轮时，损失值为 29.35，远低于第 0 轮时的 1763.88，并且对应于该轮次，在第 100 轮时估计的参数为 0.24
    和-0.01。这些参数值是最优的。


