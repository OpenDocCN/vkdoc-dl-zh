    ## 配方 3-11：使用自编码器


    ### 问题


    如何使用自编码器函数进行聚类？


    ### 解决方案


    无监督学习是机器学习的一个分支，它没有目标列，或者输出未定义。我们只需要理解数据中存在的独特模式。让我们看看图 3-1 中的自编码器架构。输入特征空间通过一个隐藏层被转换为一个更低维度的张量表示，然后再映射回相同的输入空间。位于正中间的层保存了自编码器的值。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Fig1_HTML.png](img/474315_1_En_3_Fig1_HTML.png)


    图 3-1


    自编码器架构


    ### 工作原理


    让我们来看下面的例子。`torchvision`库包含了流行的数据集、模型架构和框架。自编码器是一个从数据集中识别潜在特征的过程；它用于分类、预测和聚类。如果我们将输入数据放入输入层，并将相同的数据集放入输出层，然后添加多个包含许多神经元的隐藏层，再经过一系列的训练周期（epochs），我们就能在最内层的隐藏层中获得一组潜在特征。中心隐藏层中的权重或参数被称为*自编码器层*。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figci_HTML.jpg](img/474315_1_En_3_Figci_HTML.jpg)


    我们再次使用 MNIST 数据集来试验自编码器的功能。这次我们采用 10 个训练周期，批量大小为 64 传入网络，学习率为 0.005，并使用 5 张图像进行测试。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcj_HTML.jpg](img/474315_1_En_3_Figcj_HTML.jpg)


    下图展示了从`torchvision`库上传并以图像形式显示的数据集。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figck_HTML.jpg](img/474315_1_En_3_Figck_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcl_HTML.jpg](img/474315_1_En_3_Figcl_HTML.jpg)


    我们来讨论一下自编码器的架构。输入有 784 个特征，高度为 28，宽度为 28。我们将 784 个神经元从输入层传递到第一个隐藏层，该层有 128 个神经元。然后，我们应用双曲正切函数将信息传递到下一个隐藏层。第二个隐藏层包含
    128 个输入神经元，并将其转换为 64 个神经元。在第三个隐藏层中，我们再次应用双曲正切函数将信息传递到下一个隐藏层。最内层包含三个神经元，被视为三个特征，这是编码器层的终点。然后，解码器函数将该层扩展回输出层的
    784 个特征。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcm_HTML.jpg](img/474315_1_En_3_Figcm_HTML.jpg)


    一旦我们设置好架构，就会开始正常的流程，即根据学习率和优化函数来最小化损失函数。整个架构会经过一系列的训练周期，以达到目标输出。


    ## 配方 3-12：使用自编码器微调结果


    ### 问题


    如何设置迭代来微调结果？


    ### 解决方案


    从概念上讲，自编码器的工作原理与聚类模型相同。在无监督学习中，机器从数据中学习模式，并将其泛化到新的数据集上。学习过程是通过获取一组输入特征来完成的。自编码器函数也用于特征工程。


    ### 工作原理


    让我们来看下面的例子。我们仍然以相同的 MNIST 数据集为例，目标是理解训练周期在获得更好的自编码器层中的作用。我们增加训练周期的大小以将误差降至最低；然而，在实践中，增加训练周期会带来许多挑战，包括内存限制。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcn_HTML.jpg](img/474315_1_En_3_Figcn_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figco_HTML.jpg](img/474315_1_En_3_Figco_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcp_HTML.jpg](img/474315_1_En_3_Figcp_HTML.jpg)


    通过使用编码器函数，我们可以将输入特征表示为一组潜在特征。而通过使用解码器函数，我们可以重建图像。然后，我们可以对比使用自编码器函数进行图像重建的效果。从前面的一组图表中可以清楚地看出，随着训练周期的增加，图像识别变得清晰。


    ## 配方 3-13：在 3D 图中可视化编码数据


    ### 问题


    如何在 3D 图中可视化 MNIST 数据？


    ### 解决方案


    我们使用自编码器函数获取编码后的特征，然后使用数据集将其表示在 3D 平面上。


    ### 工作原理


    让我们来看下面的例子。本配方是关于如何将前一个配方中推导出的自编码器函数表示在三维空间中，因为我们在最内层隐藏层中有三个神经元。下图展示了一个三维神经元。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcq_HTML.jpg](img/474315_1_En_3_Figcq_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcr_HTML.jpg](img/474315_1_En_3_Figcr_HTML.jpg)


    ## 配方 3-14：限制模型过拟合


    ### 问题


    当我们拟合大量神经元和层来预测目标类别或输出变量时，函数通常会过拟合训练数据集。由于模型过拟合，我们无法在测试集上做出良好的预测。测试准确率与训练准确率不一致。训练和测试准确率之间会存在偏差。

    '
- fmt: '### Solution


    To restrict model overfitting, we consciously introduce `dropout` rate, which
    means randomly delete (let’s say) 10% or 20% of the weights in the network, and
    check the model accuracy at the same time. If we are able to match the same model
    accuracy after deleting the 10% or 20% of the weights, then our model is good.


    ### How It Works


    Let’s look at the following example. Model overfitting occurs when the trained
    model does not generalize to other test case scenarios. It is identified when
    the training accuracy becomes significantly different from the test accuracy.
    To avoid model overfitting, we can introduce the `dropout` rate in the model.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcs_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcs_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figct_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figct_HTML.jpg)


    The `dropout` rate introduction to the hidden layer ensures that weights less
    than the threshold defined are removed from the architecture. A typical threshold
    for an application’s `dropout` rate is 20% to 50%. A 20% `dropout` rate implies
    a smaller degree of penalization; however, the 50% threshold implies heavy penalization
    of the model weights.


    In the following script, we apply a 50% `dropout` rate to drop the weights from
    the model. We applied the `dropout` rate twice.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcu_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcu_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcv_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcv_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcw_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcw_HTML.jpg)


    The selection of right `dropout` rate requires a fair idea about the business
    and domain.


    ## Recipe 3-15. Visualizing the Model Overfit


    ### Problem


    Assess model overfitting.


    ### Solution


    We change the model hyperparameters and iteratively see if the model is overfitting
    data or not.


    ### How It Works


    Let’s look at the following example. The previous recipe covered two types of
    neural networks: overfitting and `dropout` rate. When the model parameters estimated
    from the data come closer to the actual data, for the training dataset and the
    same models differs from the test set, it is a clear sign of model overfit. To
    restrict model overfit, we can introduce the `dropout` rate, which deletes a certain
    percentage of connections (as in weights from the network) to allow the trained
    model to come to the real data.


    In the following script, the iterations were taken 500 times. The predicted values
    are generated from the base model, which shows overfitting, and from the `dropout`
    model, which shows the deletion of some weights. In the same fashion, we create
    the two loss functions, backpropagation, and implementation of the optimizer.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcx_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcx_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcy_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcy_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcz_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcz_HTML.jpg)


    The initial round of plotting includes the overfitting loss and `dropout` loss
    and how it is different from the actual training and test data points from the
    preceding graph.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figda_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figda_HTML.jpg)


    After many iterations, the preceding graph was generated by using the two functions
    with the actual model and with the `dropout` rate. The takeaway from this graph
    is that actual training data may get closer to the overfit model; however, the
    `dropout` model fits the data really well.


    ## Recipe 3-16. Initializing Weights in the Dropout Rate


    ### Problem


    How do we delete the weights in a network? Should we delete randomly or by using
    any distribution?


    ### Solution


    We should delete the weights in the `dropout` layer based on probability distribution,
    rather than randomly.


    ### How It Works


    Let’s look at the following example. In the previous recipe, three layers of a
    `dropout` rate were introduced: one after the first hidden layer and two after
    the second hidden layer. The probability percentage was 0.50, which meant randomly
    delete 50% of the weights. Sometimes, random selection of weights from the network
    deletes relevant weights, so an alternative idea is to delete the weights in the
    network generated from statistical distribution.


    The following script shows how to generate the weights from a uniform distribution,
    then we can use the set of weights in the network architecture.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdb_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figdb_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdc_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figdc_HTML.jpg)


    ## Recipe 3-17. Adding Math Operations


    ### Problem


    How do we set up the broadcasting function and optimize the convolution function?


    ### Solution


    The script snippet shows how to introduce batch normalization when setting up
    a convolutional neural network model, and then further setting up a pooling layer.


    ### How It Works


    Let’s look at the following example. To introduce batch normalization in the convolutional
    layer of the neural network model, we need to perform tensor-based mathematical
    operations that are functionally different from other methods of computation.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdd_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figdd_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figde_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figde_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdf_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figdf_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdg_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figdg_HTML.jpg)


    The following piece of script shows how the batch normalization using a 2D layer
    is resolved before entering into the 2D max pooling layer.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdh_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figdh_HTML.jpg)


    ## Recipe 3-18. Embedding Layers in RNN


    ### Problem


    The recurrent neural network is used mostly for text processing. An embedded feature
    offers more accuracy on a standard RNN model than raw features. How do we create
    embedded features in an RNN?


    ### Solution


    The first step is to create an embedding layer, which is a fixed dictionary and
    fixed-size lookup table, and then introduce the `dropout` rate after that create
    gated recurrent unit.


    ### How It Works


    Let’s look at the following example. When textual data comes in as a sequence,
    the information is processed in a sequential way; for example, when we describe
    something, we use a set of words in sequence to convey the meaning. If we use
    the individual words as vectors to represent the data, the resulting dataset would
    be very sparse. But if we use a phrase-based approach or a combination of words
    to represent as feature vector, then the vectors become a dense layer. Dense vector
    layers are called *word embeddings*, as the embedding layer conveys a context
    or meaning as the result. It is definitely better than the bag-of-words approach.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdi_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figdi_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdj_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figdj_HTML.jpg)'
