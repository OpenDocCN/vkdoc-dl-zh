    ## Recipe 2-7. Distributions


    ### Problem


    Knowledge of statistical distributions is essential for weight normalization,
    weight initialization, and computation of gradients in neural network–based operations
    using PyTorch. How do we know which distributions to use and when to use them?


    ### Solution


    Each statistical distribution follows a pre-established mathematical formula.
    We are going to use the most commonly used statistical distributions, their arguments
    in scenarios of problems.


    ### How It Works


    Bernoulli distribution is a special case of *binomial distribution*, in which
    the number of trials can be more than one; but in a Bernoulli distribution, the
    number of experiment or trial remains one. It is a discrete probability distribution
    of a random variable, which takes a value of 1 when there is probability that
    an event is a success, and takes a value of 0 when there is probability that an
    event is a failure. A perfect example of this is tossing a coin, where 1 is heads
    and 0 is tails. Let’s look at the program.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figz_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figz_HTML.jpg)


    The *beta distribution* is a family of continuous random variables defined in
    the range of 0 and 1. This distribution is typically used for Bayesian inference
    analysis.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figaa_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figaa_HTML.jpg)


    The binomial distribution is applicable when the outcome is twofold and the experiment
    is repetitive. It belongs to the family of discrete probability distribution,
    where the probability of success is defined as 1 and the probability of failure
    is 0. The binomial distribution is used to model the number of successful events
    over many trials.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figab_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figab_HTML.jpg)


    In probability and statistics, a categorical distribution can be defined as a
    generalized Bernoulli distribution, which is a discrete probability distribution
    that explains the possible results of any random variable that may take on one
    of the possible categories, with the probability of each category exclusively
    specified in the tensor.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figac_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figac_HTML.jpg)


    A *Laplacian distribution* is a continuous probability distribution function that
    is otherwise known as a *double exponential distribution*. A Laplacian distribution
    is used in speech recognition systems to understand prior probabilities. It is
    also useful in Bayesian regression for deciding prior probabilities.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figad_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figad_HTML.jpg)


    A *normal distribution* is very useful because of the property of central limit
    theorem. It is defined by mean and standard deviations. If we know the mean and
    standard deviation of the distribution, we can estimate the event probabilities.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Fig2_HTML.png](images/474315_1_En_2_Chapter/474315_1_En_2_Fig2_HTML.png)


    Figure 2-2


    Normal probability distribution


