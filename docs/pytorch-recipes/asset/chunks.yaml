    ## Recipe 2-3\. Basic Statistics


    ### Problem


    How do we compute basic statistics, such as mean, median, mode, and so forth,
    from a Torch tensor?


    ### Solution


    Computation of basic statistics using PyTorch enables the user to apply probability
    distributions and statistical tests to make inferences from data. Though the Torch
    functionality is like that of Numpy, Torch functions have GPU acceleration. Let’s
    have a look at the functions to create basic statistics.


    ### How It Works


    The mean computation is simple to write for a 1D tensor; however, for a 2D tensor,
    an extra argument needs to be passed as a mean, median, or mode computation, across
    which the dimension needs to be specified.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figi_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figi_HTML.jpg)


