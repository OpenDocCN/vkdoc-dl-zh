  trans: '

    # 结论


    本章介绍了如何使用 PyTorch API 创建简单的神经网络模型，并通过调整超参数（即学习率、迭代次数、梯度下降）来优化参数。我们探讨了如何创建卷积神经网络和循环神经网络的方法，并介绍了在这些网络中引入
    dropout 率以控制模型过拟合。


    我们使用小型张量来追踪计算等过程背后的具体细节。我们只需定义问题陈述、创建特征并应用方法即可获得结果。在下一章中，我们将使用 PyTorch 实现更多示例。


    # 4. 使用 PyTorch 的神经网络入门


    基于深度神经网络的模型正逐渐成为人工智能和机器学习实现的支柱。未来数据挖掘的发展将由基于人工神经网络的先进建模技术所主导。一个显而易见的问题是，为什么神经网络直到现在才获得如此重要的地位，尽管它早在
    20 世纪 50 年代就被发明了。


    借鉴自计算机科学领域，神经网络可以被定义为一个并行信息处理系统，其中所有输入相互关联，就像人脑中的神经元一样，以传递信息，从而执行人脸识别、图像识别等活动。在本章中，你将学习如何将基于神经网络的方法应用于各种数据挖掘任务，例如分类、回归、预测和特征降维。*人工神经网络*（ANN）的功能方式与人脑功能相似，其中数十亿个神经元相互连接，用于信息处理和洞察生成。


    ## 方法 4-1. 使用激活函数


    ### 问题


    什么是激活函数？它们在实际项目中如何工作？如何使用 PyTorch 实现激活函数？


    ### 解决方案


    激活函数是一种数学公式，它根据数学变换函数的类型，将二进制、浮点或整数格式的向量转换为另一种格式。神经元存在于不同的层中——输入层、隐藏层和输出层，它们通过一种称为*激活函数*的数学函数相互连接。激活函数有不同的变体，接下来将进行解释。理解激活函数有助于准确实现神经网络模型。


    ### 工作原理


    神经网络模型中所有激活函数可以大致分为线性函数和非线性函数。PyTorch 的 `torch.nn` 模块可以创建任何类型的神经网络模型。让我们看一些使用
    PyTorch 和 `torch.nn` 模块部署激活函数的示例。


    PyTorch 和 TensorFlow 之间的核心区别在于计算图的定义方式、两个框架执行计算的方式，以及我们在修改脚本和引入其他基于 Python 的库方面的灵活性。在
    TensorFlow 中，我们需要在初始化模型之前定义变量和占位符。我们还需要跟踪稍后需要的对象，为此我们需要一个占位符。在 TensorFlow 中，我们需要先定义模型，然后编译并运行；然而，在
    PyTorch 中，我们可以边定义模型边运行——我们不需要在代码中保留占位符。这就是 PyTorch 框架是动态的原因。


    #### 线性函数


    线性函数是一种简单的函数，通常用于将信息从解映射层传递到输出层。我们在数据变化较小的场景中使用线性函数。在深度学习模型中，实践者通常将线性函数用于从最后一个隐藏层到输出层。在线性函数中，输出始终限制在特定范围内；因此，它被用于深度学习模型的最后一个隐藏层，或基于线性回归的任务中，或用于需要从输入数据集预测结果的深度学习模型中。以下是其公式。


    ![$$ y=\alpha +\beta x $$](img/474315_1_En_4_Chapter_TeX_Equa.png)


    #### 双线性函数


    双线性函数是一种简单的函数，通常用于传递信息。它对传入数据应用双线性变换。


    ![$$ y={x}_1\ast A\ast {x}_2+b $$](img/474315_1_En_4_Chapter_TeX_Equb.png)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figa_HTML.jpg](img/474315_1_En_4_Figa_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figb_HTML.jpg](img/474315_1_En_4_Figb_HTML.jpg)


    #### Sigmoid 函数


    Sigmoid 函数经常被数据挖掘和分析领域的专业人士使用，因为它更容易解释和实现。它是一个非线性函数。当我们将权重从输入层传递到神经网络中的隐藏层时，我们希望模型能够捕获数据中存在的各种非线性；因此，建议在神经网络的隐藏层中使用
    sigmoid 函数。非线性函数有助于对数据集进行泛化。使用非线性函数更容易计算函数的梯度。


    Sigmoid 函数是一种特定的非线性激活函数。Sigmoid 函数的输出始终限制在 0 和 1 之间；因此，它主要用于执行基于分类的任务。Sigmoid
    函数的局限性之一是它可能陷入局部最小值。其优点是它提供了属于某个类别的概率。以下是其方程。


    ![$$ f(x)=\frac{1}{1+{e}^{-\beta x}} $$](img/474315_1_En_4_Chapter_TeX_Equc.png)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figc_HTML.jpg](img/474315_1_En_4_Figc_HTML.jpg)


    #### 双曲正切函数


    双曲正切函数是变换函数的另一种变体。它用于将信息从映射层转换到隐藏层。它通常用于神经网络模型的隐藏层之间。`tanh` 函数的范围在 –1 到 +1 之间。


    ![$$ \tanh (x)=\frac{e^x-{e}^{-x}}{e^x+{e}^{-x}} $$](img/474315_1_En_4_Chapter_TeX_Equd.png)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figd_HTML.jpg](img/474315_1_En_4_Figd_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Fige_HTML.jpg](img/474315_1_En_4_Fige_HTML.jpg)


    #### 对数 Sigmoid 传递函数


    以下公式解释了对数 sigmoid 传递函数，它用于将输入层映射到隐藏层。如果数据不是二进制的，而是浮点类型且包含大量异常值（例如输入特征中存在较大的数值），那么我们应该使用对数
    sigmoid 传递函数。


    ![$$ f(x)=\log \left(\frac{1}{1+{e}^{-\beta x}}\right) $$](img/474315_1_En_4_Chapter_TeX_IEq1.png)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figf_HTML.jpg](img/474315_1_En_4_Figf_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figg_HTML.jpg](img/474315_1_En_4_Figg_HTML.jpg)

