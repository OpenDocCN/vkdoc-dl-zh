- fmt: '# Conclusion


    This chapter covered using the PyTorch API, creating a simple neural network mode,
    and optimizing the parameters by changing the hyperparameters (i.e., learning
    rate, epochs, gradients drop). We looked at recipes on how to create a convolutional
    neural network and a recurrent neural network, and introduced the dropout rate
    in these networks to control model overfitting.


    We took small tensors to follow what exactly goes on behind the scenes with calculations
    and so forth. We only need to define the problem statement, create features, and
    apply the recipe to get results. In the next chapter, we implement many more examples
    with PyTorch.


    # 4. Introduction to Neural Networks Using PyTorch


    Deep neural network–based models are gradually becoming the backbone for artificial
    intelligence and machine learning implementations. The future of data mining will
    be governed by the usage of artificial neural network–based advanced modeling
    techniques. One obvious question is why neural networks are only now gaining so
    much importance, because it was invented in 1950s.


    Borrowed from the computer science domain, neural networks can be defined as a
    parallel information processing system where all the input relates to each other,
    like neurons in the human brain, to transmit information so that activities like
    face recognition, image recognition, and so forth, can be performed. In this chapter,
    you learn about the application of neural network-based methods on various data
    mining tasks, such as classification, regression, forecasting, and feature reduction.
    An *artificial neural network* (ANN) functions in a way that is similar to the
    way that the human brain functions, in which billions of neurons link to each
    other for information processing and insight generation.


    ## Recipe 4-1. Working with Activation Functions


    ### Problem


    What are the activation functions and how do they work in real projects? How do
    you implement an activation function using PyTorch?


    ### Solution


    Activation function is a mathematical formula that transforms a vector available
    in a binary, float, or integer format to another format based on the type of mathematical
    transformation function. The neurons are present in different layers—input, hidden,
    and output, which are interconnected through a mathematical function called an
    *activation function*. There are different variants of activation functions, which
    are explained next. Understanding the activation function helps in accurately
    implementing a neural network model.


    ### How It Works


    All the activation functions that are part of a neural network model can be broadly
    classified as linear functions and nonlinear functions. The PyTorch `torch.nn`
    module creates any type of a neural network model. Let’s look at some examples
    of the deployment of activation functions using PyTorch and the `torch.nn` module.


    The core differences between PyTorch and TensorFlow is the way a computational
    graph is defined, the way the two frameworks perform calculations, and the amount
    of flexibility we have in changing the script and introducing other Python-based
    libraries in it. In TensorFlow, we need to define the variables and placeholders
    before we initialize the model. We also need to keep track of objects that we
    need later, and for that we need a placeholder. In TensorFlow, we need to define
    the model first, and then compile and run; however, in PyTorch, we can define
    the model as we go—we don’t have to keep placeholders in the code. That’s why
    the PyTorch framework is dynamic.


    #### Linear Function


    A linear function is a simple functions typically used to transfer information
    from the demapping layer to the output layer. We use the linear function in places
    where variations in data are lower. In a deep learning model, practitioners typically
    use a linear function in the last hidden layer to the output layer. In the linear
    function, the output is always confined to a specific range; because of that,
    it is used in the last hidden layer in a deep learning model, or in linear regression–based
    tasks, or in a deep learning model where the task is to predict the outcome from
    the input dataset. The following is the formula.


    ![$$ y=\alpha +\beta x $$](images/474315_1_En_4_Chapter/474315_1_En_4_Chapter_TeX_Equa.png)


    #### Bilinear Function


    A bilinear function is a simple functions typically used to transfer information.
    It applies a bilinear transformation to incoming data.


    ![$$ y={x}_1\ast A\ast {x}_2+b $$](images/474315_1_En_4_Chapter/474315_1_En_4_Chapter_TeX_Equb.png)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figa_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figa_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figb_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figb_HTML.jpg)


    #### Sigmoid Function


    A sigmoid function is frequently used by professionals in data mining and analytics
    because it is easier to explain and implement. It is a nonlinear function. When
    we pass weights from the input layer to the hidden layer in a neural network,
    we want our model to capture all sorts of nonlinearity present in the data; hence,
    using the sigmoid function in the hidden layers of a neural network is recommended.
    The nonlinear functions help with generalizing the dataset. It is easier to compute
    the gradient of a function using a nonlinear function.


    The sigmoid function is a specific nonlinear activation function. The sigmoid
    function output is always confined within 0 and 1; therefore, it is mostly used
    in performing classification-based tasks. One of the limitations of the sigmoid
    function is that it may get stuck in local minima. An advantage is that it provides
    probability of belonging to the class. The following is its equation.


    ![$$ f(x)=\frac{1}{1+{e}^{-\beta x}} $$](images/474315_1_En_4_Chapter/474315_1_En_4_Chapter_TeX_Equc.png)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figc_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figc_HTML.jpg)


    #### Hyperbolic Tangent Function


    A hyperbolic tangent function is another variant of a transformation function.
    It is used to transform information from the mapping layer to the hidden layer.
    It is typically used between the hidden layers of a neural network model. The
    range of the `tanh` function is between –1 and +1.


    ![$$ \tanh (x)=\frac{e^x-{e}^{-x}}{e^x+{e}^{-x}} $$](images/474315_1_En_4_Chapter/474315_1_En_4_Chapter_TeX_Equd.png)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figd_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figd_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Fige_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Fige_HTML.jpg)


    #### Log Sigmoid Transfer Function


    The following formula explains the log sigmoid transfer function, which is used
    in mapping the input layer to the hidden layer. If the data is not binary, and
    it is a float type with a lot of outliers (as in large numeric values present
    in the input feature), then we should use the log sigmoid transfer function.


    ![$$ f(x)=\log \left(\frac{1}{1+{e}^{-\beta x}}\right) $$](images/474315_1_En_4_Chapter/474315_1_En_4_Chapter_TeX_IEq1.png)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figf_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figf_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figg_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figg_HTML.jpg)'
