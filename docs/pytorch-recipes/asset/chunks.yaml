    优化函数的作用是最小化相对于参数和学习率定义的损失函数。这里选择的学习率是 0.2。我们还将神经网络参数传递给优化器。有多种优化函数。


    *   `SGD`：实现随机梯度下降（可选带动量）。参数可能包括动量、学习率和权重衰减。

    *   `Adadelta`：自适应学习率。有五个不同的参数：网络的参数、用于计算梯度平方运行平均值的系数、为实现模型数值稳定性而添加的项、学习率以及用于应用正则化的权重衰减参数。

    *   `Adagrad`：用于在线学习和随机优化的自适应次梯度方法。参数包括用于优化学习率的可迭代参数、学习率衰减以及权重衰减。

    *   `Adam`：一种随机优化方法。该函数有六个不同的参数：用于优化的可迭代参数、学习率、`betas`（用于计算梯度及其平方运行平均值的系数）、用于改善数值稳定性的参数等。

    *   `ASGD`：通过平均加速随机逼近。它有五个不同的参数：用于优化的可迭代参数、学习率、衰减项、权重衰减等。

    *   `RMSprop`算法：使用计算出的梯度幅度来归一化梯度。

    *   `SparseAdam`：实现适用于稀疏张量的`Adam`算法的惰性版本。在此变体中，仅更新梯度中出现的矩，并且仅将梯度的这些部分应用于参数。


    除了优化函数之外，在运行监督学习模型之前还需要选择一个损失函数。同样，有多种损失函数；让我们看看误差函数。


    *   `MSELoss`：创建一个标准，用于衡量输入变量和目标变量中元素之间的均方误差。对于回归相关问题，这是最佳的损失函数。


    ![../images/474315_1_En_5_Chapter/474315_1_En_5_Figg_HTML.jpg](img/474315_1_En_5_Figg_HTML.jpg)


    在运行监督学习模型（这是一个回归模型）之后，我们需要打印实际值与预测值，并以图形格式呈现它们；因此，我们需要开启模型的交互式功能。


    ## 配方 5-3\. 优化与梯度计算


    ### 问题


    如何使用 PyTorch 通过不同的迭代构建一个基本的监督神经网络训练模型？


    ### 解决方案


    PyTorch 中的基本神经网络模型需要六个不同的步骤：准备训练数据、初始化权重、创建基本网络模型、计算损失函数、选择学习率，以及相对于模型参数优化损失函数。


    ### 工作原理


    让我们按照逐步的方法来创建一个基本的神经网络模型。


    ![../images/474315_1_En_5_Chapter/474315_1_En_5_Figh_HTML.jpg](img/474315_1_En_5_Figh_HTML.jpg)


    模型在第一次迭代和最后一次迭代的最终预测结果现在呈现在下图中。


    ![../images/474315_1_En_5_Chapter/474315_1_En_5_Figi_HTML.jpg](img/474315_1_En_5_Figi_HTML.jpg)


    在初始步骤中，损失函数为 276.91。优化后，损失函数变为 35.1890。图中展示了拟合的回归线及其与数据集的拟合方式。


    ## 配方 5-4\. 查看预测结果


    ### 问题


    如何从基于 PyTorch 的监督学习模型中提取最佳结果？


    ### 解决方案


    计算图网络由节点表示，并通过函数连接。可以应用各种技术来最小化误差函数并获得最佳的预测模型。我们可以增加迭代次数、评估损失函数、优化函数、打印实际值和预测值，并将其显示在图表中。

