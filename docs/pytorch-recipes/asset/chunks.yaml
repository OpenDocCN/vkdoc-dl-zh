    Let’s look at the sample text. The following text has two paragraphs, and each
    paragraph has several sentences. If we apply word embedding on these two paragraphs,
    then we will get real vectors as features from the text. Those features can be
    used for further computation.


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figd_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Figd_HTML.jpg)


    Tokenization is the process of splitting sentences into small chunks of tokens,
    known as *n-grams*. This is called a *unigram* if it is a single word, a *bigram*
    if it is two words, a *trigram* if it is three words, so on and so forth.


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Fige_HTML.jpg](images/474315_1_En_7_Chapter/474315_1_En_7_Fige_HTML.jpg)


