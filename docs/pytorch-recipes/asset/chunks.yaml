  trans: '

    ### 工作原理


    让我们来看几个张量及张量运算基础的示例，包括数学运算。


    `x` 对象是一个列表。我们可以使用以下语法来检查 Python 中的某个对象是否为张量对象。通常，`is_tensor` 函数用于检查，而 `is_storage`
    函数则用于检查该对象是否以张量对象的形式存储。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figb_HTML.jpg](img/474315_1_En_1_Figb_HTML.jpg)


    现在，让我们创建一个包含来自 Torch 的随机数的对象，类似于 NumPy 库。我们可以检查张量和存储类型。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figc_HTML.jpg](img/474315_1_En_1_Figc_HTML.jpg)


    `y` 对象是一个张量，但它并未被存储。要检查输入张量对象中的元素总数，可以使用数值元素函数。以下脚本是另一个示例，演示如何在二维张量中创建零值并计算其中的数值元素。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figd_HTML.jpg](img/474315_1_En_1_Figd_HTML.jpg)


    与 NumPy 运算类似，`eye` 函数用于创建一个对角矩阵，其对角线元素为 1，非对角线元素为 0。可以通过提供形状选项来操作 `eye` 函数。以下示例展示了如何提供形状参数。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Fige_HTML.jpg](img/474315_1_En_1_Fige_HTML.jpg)


    可以使用张量运算创建线性空间以及线性空间中的点。让我们用一个示例来演示，在一个从值 2 开始到 10 结束的线性空间中创建 25 个点。Torch 可以从
    NumPy 数组格式中读取数据。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figf_HTML.jpg](img/474315_1_En_1_Figf_HTML.jpg)


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figg_HTML.jpg](img/474315_1_En_1_Figg_HTML.jpg)


    与线性间隔类似，也可以创建对数间隔。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figh_HTML.jpg](img/474315_1_En_1_Figh_HTML.jpg)


    随机数生成是数据科学中一个常见的过程，用于在空间中生成或收集样本数据点，以模拟数据中的结构。随机数可以从统计分布、任意两个值或预定义的分布中生成。与 NumPy
    函数类似，可以使用以下示例生成随机数。均匀分布被定义为每个结果出现概率相等的分布；因此，事件概率是恒定的。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figi_HTML.jpg](img/474315_1_En_1_Figi_HTML.jpg)


    以下脚本展示了如何从 0 和 1 这两个值中选择随机数。结果张量可以重塑以创建一个 (4,5) 矩阵。也可以创建来自算术平均值为 0、标准差为 1 的正态分布的随机数，如下所示。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figj_HTML.jpg](img/474315_1_En_1_Figj_HTML.jpg)


    要使用随机排列从一个值范围中选择随机值，需要先定义该范围。这个范围可以通过使用 `arrange` 函数来创建。使用 `arrange` 函数时，必须定义步长，它会将所有值放置在一个等距空间中。默认情况下，步长为
    1。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figk_HTML.jpg](img/474315_1_En_1_Figk_HTML.jpg)


    要查找一维张量中的最小值和最大值，可以使用 `argmin` 和 `argmax`。如果输入是一个矩阵，则需要指定维度，以便沿行或列搜索最小值。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figl_HTML.jpg](img/474315_1_En_1_Figl_HTML.jpg)


    如果它只有一行或一列，即单个维度，则称为*一维张量*。如果输入是一个矩阵，包含行和列，则称为*二维张量*。如果维度超过两个，则称为*多维张量*。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figm_HTML.jpg](img/474315_1_En_1_Figm_HTML.jpg)


    现在，让我们创建一个示例二维张量，并通过在张量上使用 `concat` 运算来执行索引和拼接操作。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Fign_HTML.jpg](img/474315_1_En_1_Fign_HTML.jpg)


    示例 `x` 张量也可以用于三维。同样，有两种不同的选项可以创建三维张量；第三个维度可以在行或列上扩展。


    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Figo_HTML.jpg](img/474315_1_En_1_Figo_HTML.jpg)


