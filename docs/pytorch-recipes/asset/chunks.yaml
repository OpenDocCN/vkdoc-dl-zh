    ## Recipe 2-6. Tensor Operations


    ### Problem


    How do we compute or perform operations based on variables such as matrix-vector
    computation, and matrix-matrix and vector-vector calculation?


    ### Solution


    One of the necessary conditions for the success of matrix-based operations is
    that the length of the tensor needs to match or be compatible for the execution
    of algebraic expressions.


    ### How It Works


    The tensor definition of a scalar is just one number. A 1D tensor is a vector,
    and a 2D tensor is a matrix. When it extends to an *n* dimensional level, it can
    be generalized to only tensors. When performing algebraic computations in PyTorch,
    the dimension of a matrix and a vector or scalar should be compatible.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figt_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figt_HTML.jpg)


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figu_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figu_HTML.jpg)


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figv_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figv_HTML.jpg)


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figw_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figw_HTML.jpg)


    Since `mat1` and `mat2` dimensions are different, they are not compatible for
    matrix addition or multiplication. If the dimension remains the same, we can multiply
    them. In the following script, the matrix addition throws an error when we multiply
    similar dimensions—`mat1` with `mat1`. We get relevant results.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figx_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figx_HTML.jpg)


