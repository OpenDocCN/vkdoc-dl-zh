    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figp_HTML.jpg](img/474315_1_En_2_Figp_HTML.jpg)


    以下程序展示了如何使用张量上的变量方法从损失函数计算梯度。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figq_HTML.jpg](img/474315_1_En_2_Figq_HTML.jpg)


    ## 方法 2-5. 张量运算


    ### 问题


    如何基于变量（例如矩阵乘法）进行计算或执行操作？


    ### 解决方案


    张量被封装在变量中，该变量具有三个属性：`grad`、`volatile` 和 `gradient`。


    ### 工作原理


    让我们创建一个变量并提取其属性。这是必需的，因为权重更新过程需要梯度计算。通过使用 `mm` 模块，我们可以执行矩阵乘法。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figr_HTML.jpg](img/474315_1_En_2_Figr_HTML.jpg)


    以下程序展示了变量的属性，该变量是张量的一个封装器。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figs_HTML.jpg](img/474315_1_En_2_Figs_HTML.jpg)


    ## 方法 2-6. 张量运算


    ### 问题


    如何基于变量（例如矩阵-向量计算、矩阵-矩阵计算和向量-向量计算）进行计算或执行操作？


    ### 解决方案


    基于矩阵的运算成功的一个必要条件是，张量的长度需要匹配或兼容，以便执行代数表达式。


    ### 工作原理


    标量的张量定义只是一个数字。一维张量是向量，二维张量是矩阵。当扩展到 *n* 维级别时，可以泛化为仅张量。在 PyTorch 中执行代数计算时，矩阵与向量或标量的维度应兼容。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figt_HTML.jpg](img/474315_1_En_2_Figt_HTML.jpg)


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figu_HTML.jpg](img/474315_1_En_2_Figu_HTML.jpg)


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figv_HTML.jpg](img/474315_1_En_2_Figv_HTML.jpg)


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figw_HTML.jpg](img/474315_1_En_2_Figw_HTML.jpg)


    由于 `mat1` 和 `mat2` 的维度不同，它们不兼容进行矩阵加法或乘法。如果维度相同，我们可以将它们相乘。在以下脚本中，当我们对相似维度（`mat1`
    与 `mat1`）进行乘法时，矩阵加法会抛出错误。我们会得到相关结果。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figx_HTML.jpg](img/474315_1_En_2_Figx_HTML.jpg)


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figy_HTML.jpg](img/474315_1_En_2_Figy_HTML.jpg)


    ## 方法 2-7. 分布


    ### 问题


    统计分布的知识对于使用 PyTorch 进行基于神经网络的操作中的权重归一化、权重初始化以及梯度计算至关重要。我们如何知道该使用哪些分布以及何时使用它们？


    ### 解决方案


    每个统计分布都遵循一个预先建立的数学公式。我们将使用最常用的统计分布及其在问题场景中的参数。


    ### 工作原理


    伯努利分布是*二项分布*的一种特殊情况，其中试验次数可以多于一次；但在伯努利分布中，实验或试验的次数保持为一次。它是一个随机变量的离散概率分布，当事件成功的概率存在时，该变量取值为
    1；当事件失败的概率存在时，该变量取值为 0。一个典型的例子是抛硬币，其中 1 代表正面，0 代表反面。让我们来看一下程序。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figz_HTML.jpg](img/474315_1_En_2_Figz_HTML.jpg)


    *贝塔分布* 是一族在 0 到 1 范围内定义的连续随机变量。该分布通常用于贝叶斯推断分析。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figaa_HTML.jpg](img/474315_1_En_2_Figaa_HTML.jpg)


    当结果具有双重性且实验可重复时，二项分布适用。它属于离散概率分布族，其中成功的概率定义为 1，失败的概率定义为 0。二项分布用于对多次试验中成功事件的数量进行建模。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figab_HTML.jpg](img/474315_1_En_2_Figab_HTML.jpg)


    在概率论和统计学中，分类分布可以定义为广义的伯努利分布，它是一种离散概率分布，用于解释任何可能取其中一个类别的随机变量的可能结果，每个类别的概率在张量中专门指定。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figac_HTML.jpg](img/474315_1_En_2_Figac_HTML.jpg)


    *拉普拉斯分布* 是一种连续概率分布函数，也称为*双指数分布*。拉普拉斯分布用于语音识别系统中以理解先验概率。它在贝叶斯回归中对于确定先验概率也很有用。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figad_HTML.jpg](img/474315_1_En_2_Figad_HTML.jpg)


    *正态分布* 由于中心极限定理的性质而非常有用。它由均值和标准差定义。如果我们知道分布的均值和标准差，就可以估计事件的概率。


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Fig2_HTML.png](img/474315_1_En_2_Fig2_HTML.png)


    图 2-2


    正态概率分布


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figae_HTML.jpg](img/474315_1_En_2_Figae_HTML.jpg)

