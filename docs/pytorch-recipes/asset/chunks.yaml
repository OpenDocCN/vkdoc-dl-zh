    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figba_HTML.jpg](img/474315_1_En_3_Figba_HTML.jpg)


    在卷积神经网络架构中，输入图像会根据颜色乘以图像的高度和宽度被转换成一个特征集。由于数据集的维度，我们无法对其进行建模以预测输出。上图中的输出层包含诸如汽车、卡车、货车和自行车等类别。输入的自行车图像具有
    CNN 模型应利用并正确预测的特征。卷积层总是伴随着池化层，池化层可以是最大池化或平均池化。不同的池化和卷积层会持续进行，直到维度降低到我们可以使用全连接的简单神经网络来预测正确类别的程度。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbb_HTML.jpg](img/474315_1_En_3_Figbb_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbc_HTML.jpg](img/474315_1_En_3_Figbc_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbd_HTML.jpg](img/474315_1_En_3_Figbd_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbe_HTML.jpg](img/474315_1_En_3_Figbe_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbf_HTML.jpg](img/474315_1_En_3_Figbf_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbg_HTML.jpg](img/474315_1_En_3_Figbg_HTML.jpg)


    在上图中，如果我们观察数字 4，它分散在整个图中。理想情况下，所有的 4 应该彼此更接近。这是因为测试准确率非常低。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbh_HTML.jpg](img/474315_1_En_3_Figbh_HTML.jpg)


    在此次迭代中，训练损失从 0.4369 降低到 0.1482，测试准确率从 16%提高到 94%。相同颜色的数字在图上紧密地放置在一起。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbi_HTML.jpg](img/474315_1_En_3_Figbi_HTML.jpg)


    在下一个周期中，`MNIST` 数字数据集上的测试准确率提高到了 95%。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbj_HTML.jpg](img/474315_1_En_3_Figbj_HTML.jpg)


    在最后一步/周期中，数字相似的样本被放置在一起。成功训练模型后，下一步是利用该模型进行预测。以下代码解释了预测过程。输出对象被编号为 0、1、2 等。下面显示了真实数字和预测数字。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbk_HTML.jpg](img/474315_1_En_3_Figbk_HTML.jpg)


    ## 配方 3-7\. 重新加载模型


    ### 问题


    如何存储并重新加载一个已经训练好的模型？鉴于深度学习模型通常需要较长的训练时间，这一计算过程会给公司带来巨大的成本。我们能否用新的输入重新训练模型并存储它？


    ### 解决方案


    在生产环境中，我们通常无法同时进行训练和预测，因为训练过程耗时很长。在基于周期的训练过程完成之前，无法应用预测服务。因此，需要将训练过程与预测过程分离；我们需要存储应用程序训练好的模型，并持续到下一阶段的训练完成。


    ### 工作原理


    让我们看下面的示例，我们创建了保存函数，该函数使用 `Torch` 神经网络模块来创建模型，并使用 `restore_net()` 函数来恢复之前训练好的神经网络模型。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbl_HTML.jpg](img/474315_1_En_3_Figbl_HTML.jpg)


    上述脚本包含一个因变量 `Y` 和一个自变量 `X` 作为样本数据点，用于创建神经网络模型。下面的 `save` 函数用于存储模型。`net1` 对象是训练好的神经网络模型，可以通过两种不同的协议进行存储：(1)
    保存包含所有权重和偏置的整个神经网络模型，(2) 仅使用权重保存模型。如果训练好的模型对象在大小上非常庞大，我们应该只保存权重参数；如果训练好的对象大小较小，则可以存储整个模型。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbm_HTML.jpg](img/474315_1_En_3_Figbm_HTML.jpg)


    预构建的神经网络模型可以通过使用 `load` 函数重新加载到现有的 `PyTorch` 会话中。为了测试 `net1` 对象并进行预测，我们加载 `net1`
    对象并将模型存储为 `net2`。通过使用 `net2` 对象，我们可以预测结果变量。以下脚本生成一个包含因变量和自变量的图。代码最后一行的 `prediction.data.numpy()`
    显示了预测结果。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbn_HTML.jpg](img/474315_1_En_3_Figbn_HTML.jpg)


    加载整个神经网络的 pickle 文件格式相对较慢；然而，如果我们只是对新数据集进行预测，我们可以仅以 pickle 格式加载模型的参数，而不是整个网络。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbo_HTML.jpg](img/474315_1_En_3_Figbo_HTML.jpg)


    重用模型。`restore` 函数确保训练好的参数可以被模型重用。要恢复模型，我们可以使用 `load_state_dict()` 函数来加载模型的参数。如果我们在图中看到以下三个模型，它们是相同的，因为
    `net2` 和 `net3` 是 `net1` 的副本。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbp_HTML.jpg](img/474315_1_En_3_Figbp_HTML.jpg)


    ## 配方 3-8\. 实现循环神经网络 (RNN)


    ### 问题


    如何使用 `MNIST` 数据集建立一个循环神经网络？


    ### 解决方案


    循环神经网络被认为是一种记忆网络。我们将使用周期数设为 1，每次批量大小为 64 个样本，以建立输入和输出之间的连接。使用 RNN 模型，我们可以预测图像中存在的数字。

    '
- fmt: '### How It Works


    Let’s look at the following example. The recurrent neural network takes a sequence
    of vectors in the input layer and produces a sequence of vectors in the output
    layer. The information sequence is processed through the internal state transfer
    in the recurrent layer. Sometimes the output values have a long dependency in
    past historical values. This is another variant of the RNN model: the long short-term
    memory (LSTM) model. This is applicable for any sort of domain where the information
    is consumed in a sequential manner; for example, in a time series where the current
    stock price is decided by the historical stock price, where the dependency can
    be short or long. Similarly, the context prediction using the long and short range
    of textual input vectors. There are other industry use cases, such as noise classification,
    where noise is also a sequence of information.


    The following piece of code explains the execution of RNN model using PyTorch
    module.


    There are three sets of weights: `U`, `V` and `W`. The set of weights vector,
    represented by `W`, is for passing information among the memory cells in the network
    that display communication among the hidden state. RNN uses an embedding layer
    using the Word2vec representation. The embedding matrix is the size of the number
    of words by the number of neurons in the hidden layer. If you have 20,000 words
    and 1000 hidden units, for example, the matrix has a 20,000×1000 size of the embedding
    layer. The new representations are passed to LSTM cells, which go to a sigmoid
    output layer.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbq_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbq_HTML.jpg)


    The RNN models have hyperparameters, such as the number of iterations (`EPOCH`);
    batch size dependent on the memory available in a single machine; a time step
    to remember the sequence of information; input size, which shows the vector size;
    and learning rate. The selection of these values is indicative; we cannot depend
    on them for other use cases. The value selection for hyperparameter tuning is
    an iterative process; either you can choose multiple parameters and decide which
    one is working, or do parallel training of the model and decide which one is working
    fine.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbr_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbr_HTML.jpg)


    Using the `dsets.MINIST()` function, we can load the dataset to the current session.
    If you need to store the dataset, then download it locally.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbs_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbs_HTML.jpg)


    The preceding script shows what the sample image dataset would look like. To train
    the deep learning model, we need to convert the whole training dataset into mini
    batches, which help us with averaging the final accuracy of the model. By using
    the data loader function, we can load the training data and prepare the mini batches.
    The purpose of the shuffle selection in mini batches is to ensure that the model
    captures all the variations in the actual dataset.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbt_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbt_HTML.jpg)


    The preceding script prepares the training dataset. The test data is captured
    with the flag `train=False`. It is transformed to a tensor using the test data
    random sample of 2000 each at a time is picked up for testing the model. The test
    features set is converted to a variable format and the test label vector is represented
    in a NumPy array format.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbu_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbu_HTML.jpg)


    In the preceding RNN class, we are training an LSTM network, which is proven effective
    for holding memory for a long time, and thus helps in learning. If we use the
    `nn.RNN()` model, it hardly learns the parameters, because the vanilla implementation
    of RNN cannot hold or remember the information for a long period of time. In the
    LSTM network, the image width is considered the input size, hidden size is decided
    as the number of neurons in the hidden layer, `num_layers` shows the number of
    RNN layers in the network.


    The RNN module, within the LSTM module, produces the output as a vector size of
    64×10 because the output layer has digits to be classified as 0 to 9. The last
    forward function shows how to proceed with forward propagation in an RNN network.


    The following script shows how the LSTM model is processed under the RNN class.
    In the LSTM function, we pass the input length as 28 and the number of neurons
    in the hidden layer as 64, and from the hidden 64 neurons to the output 10 neurons.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbv_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbv_HTML.jpg)


    To optimize all RNN parameters, we use the Adam optimizer. Inside the function,
    we use the learning rate as well. The loss function used in this example is the
    cross-entropy loss function. We need to provide multiple epochs to get the best
    parameters.


    In the following script, we are printing the training loss and the test accuracy.
    After one epoch, the test accuracy increases to 95% and the training loss reduces
    to 0.24.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbw_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbw_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbx_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbx_HTML.jpg)


    Once the model is trained, then the next step is to make predictions using the
    RNN model. Then we compare the actual vs. real output to assess how the model
    is performing.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figby_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figby_HTML.jpg)


    ## Recipe 3-9. Implementing a RNN for Regression Problems


    ### Problem


    How do we set up a recurrent neural network for regression-based problems?


    ### Solution


    The regression model requires a target function and a feature set, and then a
    function to establish the relationship between the input and the output. In this
    example, we are going to use the recurrent neural network (RNN) for a regression
    task. Regression problems seem to be very simple; they do work best but are limited
    to data that shows clear linear relationships. They are quite complex when predicting
    nonlinear relationships between the input and the output.


    ### How It Works


    Let’s look at the following example that shows a nonlinear cyclical pattern between
    input and output data. In the previous recipe, we looked at an example of RNN
    in general for classification-related problems, where predicted the class of the
    input image. In regression, however, the architecture of RNN would change, because
    the objective is to predict the real valued output. The output layer would have
    one neuron in regression-related problems.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbz_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbz_HTML.jpg)


    RNN time step implies that the last 10 values predict the current value, and the
    rolling happens after that.


    The following script shows some sample series in which the target cos function
    is approximated by the sin function.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figca_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figca_HTML.jpg)


    ## Recipe 3-10. Using PyTorch Built-in Functions


    ### Problem


    How do we set up an RNN module and call the RNN function using PyTorch?


    ### Solution


    By using the built-in function available in the neural network module, we can
    implement an RNN model.'
