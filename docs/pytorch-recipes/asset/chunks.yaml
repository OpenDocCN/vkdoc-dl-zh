- fmt: '### ReLU Function


    The rectified linear unit (`ReLU`) is another activation function. It is used
    in transferring information from the input layer to the output layer. `ReLU` is
    mostly used in a convolutional neural network model. The range in which this activation
    function operates is from 0 to infinity. It is mostly used between different hidden
    layers in a neural network model.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figh_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figh_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figi_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figi_HTML.jpg)


    The different types of transfer functions are interchangeable in a neural network
    architecture. They can be used in different stages, such as the input to the hidden
    layer, the hidden layer to the output layer, and so forth, to improve the model’s
    accuracy.


    ### Leaky ReLU


    In a standard neural network model, a dying gradient problem is common. To avoid
    this issue, leaky `ReLU` is applied. Leaky `ReLU` allows a small and non-zero
    gradient when the unit is not active.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figj_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figj_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figk_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figk_HTML.jpg)


    ## Recipe 4-2. Visualizing the Shape of Activation Functions


    ### Problem


    How do we visualize the activation functions? The visualization of activation
    functions is important in correctly building a neural network model.


    ### Solution


    The activation functions translate the data from one layer into another layer.
    The transformed data can be plotted against the actual tensor to visualize the
    function. We have taken a sample tensor, converted it to a `PyTorch` variable,
    applied the function, and stored it as another tensor. Represent the actual tensor
    and the transformed tensor using `matplotlib`.


    ### How It Works


    The right choice of an activation function will not only provide better accuracy
    but also help with extracting meaningful information.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figl_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figl_HTML.jpg)


    In this script, we have an array in the linear space between –10 and +10, and
    we have 1500 sample points. We converted the vector to a `Torch` variable, and
    then made a copy as a `NumPy` variable for plotting the graph. Then, we calculated
    the activation functions. The following images show the activation functions.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figm_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figm_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Fign_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Fign_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figo_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figo_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figp_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figp_HTML.jpg)


    ## Recipe 4-3. Basic Neural Network Model


    ### Problem


    How do we build a basic neural network model using `PyTorch`?


    ### Solution


    A basic neural network model in `PyTorch` requires six steps: preparing training
    data, initializing weights, creating a basic network model, calculating the loss
    function, selecting the learning rate, and optimizing the loss function with respect
    to the model’s parameters.


    ### How It Works


    Let’s follow a step-by-step approach to create a basic neural network model.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figq_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figq_HTML.jpg)


    To show a sample neural network model, we prepare the dataset and change the data
    type to a float tensor. When we work on a project, data preparation for building
    it is a separate activity. Data preparation should be done in the proper way.
    In the preceding step, `train_x` and `train_y` are two `NumPy` vectors. Next,
    we change the data type to a float tensor because it is necessary for matrix multiplication.
    The next step is to convert it to variable, because a variable has three properties
    that help us fine-tune the object. In the dataset, we have 17 data points on one
    dimension.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figr_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figr_HTML.jpg)


    The `set_weight()` function initializes the random weights that the neural network
    model will use in forward propagation. We need two tensors: weights and biases.
    The `build_network()` function simply multiplies the weights with input, adds
    the bias to it, and generates the predicted values. This is a custom function
    that we built. If we need to implement the same thing in `PyTorch`, then it is
    much simpler to use `nn.Linear()` when we need to use it for linear regression.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figs_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figs_HTML.jpg)


    Once we define a network structure, then we need to compare the results with the
    output to assess the prediction step. The metric that tracks the accuracy of the
    system is the loss function, which we want to be minimal. The loss function may
    have a different shape. How do we know exactly where the loss is at a minimum,
    which corresponds to which iteration is providing the best results? To know this,
    we need to apply the optimization function on the loss function; it finds the
    minimum loss value. Then we can extract the parameters corresponding to that iteration.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figt_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figt_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figu_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figu_HTML.jpg)


    Median, mode and standard deviation computation can be written in the same way.
    Standard deviation shows the deviation from the measures of central tendency,
    which indicates the consistency of the data/variable. It shows whether there is
    enough fluctuation in data or not.


    ## Recipe 4-4. Tensor Differentiation


    ### Problem


    What is tensor differentiation, and how is it relevant in computational graph
    execution using the `PyTorch` framework?


    ### Solution


    The computational graph network is represented by nodes and connected through
    functions. There are two different kinds of nodes: dependent and independent.
    *Dependent nodes* are waiting for results from other nodes to process the input.
    *Independent nodes* are connected and are either constants or the results. Tensor
    differentiation is an efficient method to perform computation in a computational
    graph environment.'
