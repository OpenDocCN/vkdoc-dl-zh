    ### 工作原理


    单词和短语以实向量格式表示。段落或文档中含义相似的单词或短语具有相似的向量表示。这使得计算过程能够有效地找到相似的单词。有多种算法可以从文本中创建嵌入向量。`Word2vec`
    和 `GloVe` 是执行词嵌入的知名框架。让我们看下面的例子。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figa_HTML.jpg](img/474315_1_En_7_Figa_HTML.jpg)


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figb_HTML.jpg](img/474315_1_En_7_Figb_HTML.jpg)


    以下代码设置了一个嵌入层。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figc_HTML.jpg](img/474315_1_En_7_Figc_HTML.jpg)


    让我们看一个示例文本。下面的文本有两个段落，每个段落包含几个句子。如果我们对这两个段落应用词嵌入，那么我们将从文本中获得实向量作为特征。这些特征可用于进一步的计算。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figd_HTML.jpg](img/474315_1_En_7_Figd_HTML.jpg)


    分词是将句子分割成小块标记的过程，这些标记被称为 *n-grams*。如果是一个单词，则称为 *unigram*；如果是两个单词，则称为 *bigram*；如果是三个单词，则称为
    *trigram*，以此类推。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Fige_HTML.jpg](img/474315_1_En_7_Fige_HTML.jpg)


    `PyTorch` n-gram 语言建模器可以提取相关的关键词。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figf_HTML.jpg](img/474315_1_En_7_Figf_HTML.jpg)


    n-gram 提取器有三个参数：要提取的词汇表长度、嵌入向量的维度和上下文大小。让我们看一下损失函数和模型规范。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figg_HTML.jpg](img/474315_1_En_7_Figg_HTML.jpg)


    应用 `Adam` 优化器。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figh_HTML.jpg](img/474315_1_En_7_Figh_HTML.jpg)


    从句子中提取上下文也很重要。让我们看一下下面的函数。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figi_HTML.jpg](img/474315_1_En_7_Figi_HTML.jpg)


    ## 配方 7-2\. PyTorch 中的 CBOW 模型


    ### 问题


    如何使用 `PyTorch` 创建一个 CBOW 模型？


    ### 解决方案


    有两种不同的方法可以将单词和短语表示为向量：*连续词袋*（CBOW）和 *跳字模型*。词袋方法通过预测上下文中的单词或短语来学习嵌入向量。上下文指的是当前单词前后的单词。如果我们取一个大小为
    4 的上下文，这意味着当前单词左边的四个单词和右边的四个单词都被视为上下文。模型尝试在另一个句子中找到这八个单词来预测当前单词。


    ### 工作原理


    让我们看下面的例子。


    ![../images/474315_1_En_7_Chapter/474315_1_En_7_Figj_HTML.jpg](img/474315_1_En_7_Figj_HTML.jpg)


