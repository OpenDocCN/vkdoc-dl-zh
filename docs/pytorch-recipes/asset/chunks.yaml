    ## Recipe 2-2\. Variable Tensors


    ### Problem


    What is a variable in PyTorch and how is it defined? What is a random variable
    in PyTorch?


    ### Solution


    In PyTorch, the algorithms are represented as a computational graph. A variable
    is considered as a representation around the tensor object, corresponding gradients,
    and a reference to the function from where it was created. For simplicity, gradients
    are considered as slope of the function. The slope of the function can be computed
    by the derivative of the function with respect to the parameters that are present
    in the function. For example, in linear regression (Y = W*X + alpha), representation
    of the variable would look like the one shown in Figure [2-2](#474315_1_En_2_Chapter.xhtml#Fig2).


    Basically, a PyTorch variable is a node in a computational graph, which stores
    data and gradients. When training a neural network model, after each iteration,
    we need to compute the gradient of the loss function with respect to the parameters
    of the model, such as weights and biases. After that, we usually update the weights
    using the gradient descent algorithm. Figure [2-1](#474315_1_En_2_Chapter.xhtml#Fig1)
    explains how the linear regression equation is deployed under the hood using a
    neural network model in the PyTorch framework.


    In a computational graph structure, the sequencing and ordering of tasks is very
    important. The one-dimensional tensors are X, Y, W, and alpha in Figure [2-2](#474315_1_En_2_Chapter.xhtml#Fig2).
    The direction of the arrows change when we implement backpropagation to update
    the weights to match with Y, so that the error or loss function between Y and
    predicted Y can be minimized.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Fig1_HTML.png](images/474315_1_En_2_Chapter/474315_1_En_2_Fig1_HTML.png)


    Figure 2-1


    A sample computational graph of a PyTorch implementation


    ### How It Works


    An example of how a variable is used to create a computational graph is displayed
    in the following script. There are three variable objects around tensors— x1,
    x2, and x3—with random points generated from *a* = 12 and *b* = 23\. The graph
    computation involves only multiplication and addition, and the final result with
    the gradient is shown.


    The partial derivative of the loss function with respect to the weights and biases
    in a neural network model is achieved in PyTorch using the Autograd module. Variables
    are specifically designed to hold the changed values while running a backpropagation
    in a neural network model when the parameters of the model change. The variable
    type is just a wrapper around the tensor. It has three properties: data, grad,
    and function.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figg_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figg_HTML.jpg)


