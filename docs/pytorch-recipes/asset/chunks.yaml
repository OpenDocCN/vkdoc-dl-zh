    ### 工作原理


    让我们来看下面的例子。`PyTorch`库中的神经网络模块包含了`RNN`函数。在下面的脚本中，我们使用了输入矩阵的大小、隐藏层中的神经元数量以及网络中的隐藏层层数。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcb_HTML.jpg](img/474315_1_En_3_Figcb_HTML.jpg)


    创建`RNN`类函数后，我们需要提供优化函数，即`Adam`，而这一次，损失函数是均方损失函数。由于目标是预测一个连续变量，我们在优化层中使用`MSELoss`函数。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcc_HTML.jpg](img/474315_1_En_3_Figcc_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcd_HTML.jpg](img/474315_1_En_3_Figcd_HTML.jpg)


    现在，我们迭代 60 步来预测从样本空间生成的`cos`函数，并让它通过`sin`函数进行预测。迭代过程采用之前定义的学习率，并通过反向传播误差来减少均方误差（MSE），从而提高预测效果。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figce_HTML.jpg](img/474315_1_En_3_Figce_HTML.jpg)


