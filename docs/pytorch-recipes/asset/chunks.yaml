- fmt: "### How It Works\n\nTo apply tensor differentiation, the `nn.backward()` method\
    \ needs to be applied. Let’s take an example to see how the error gradients are\
    \ backpropagated. The `grad()` function holds the final output from the tensor\
    \ differentiation.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figj_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figj_HTML.jpg)\n\
    \nThe tuning parameters that can increase the accuracy of the supervised learning\
    \ model, which is a regression use case, can be achieved with the following methods.\n\
    \n- Number of iterations\n- Type of loss function\n- Selection of optimization\
    \ method\n- Selection of loss function\n- Learning rate\n- Decay in the learning\
    \ rate\n- Momentum require for optimization\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figk_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figk_HTML.jpg)\n\
    \nThe real dataset looks like the following.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figl_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figl_HTML.jpg)\n\
    \nThe following script explains reading the `mpg` and `qsec` columns from the\
    \ `mtcars.csv` dataset. It converts those two variables to tensors using the `unsqueeze`\
    \ function, and then uses it inside the neural network model for prediction.\n\
    \n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figm_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figm_HTML.jpg)\n\
    \nAfter 1000 iterations, the model converges.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Fign_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Fign_HTML.jpg)\n\
    \nThe neural networks in the `torch` library are typically used with the `nn`\
    \ module. Let’s take a look at that.\n\nNeural networks can be constructed using\
    \ the `torch.nn` package, which provides almost all neural network related functionalities,\
    \ including the following.\n\n- *Linear layers*: `nn.Linear`, `nn.Bilinear`\n\
    - *Convolution layers*: `nn.Conv1d`, `nn.Conv2d`, `nn.Conv3d`, `nn.ConvTranspose2d`\n\
    - *Nonlinearities*: `nn.Sigmoid`, `nn.Tanh`, `nn.ReLU`, `nn.LeakyReLU`\n- *Pooling\
    \ layers*: `nn.MaxPool1d`, `nn.AveragePool2d`\n- *Recurrent networks*: `nn.LSTM`,\
    \ `nn.GRU`\n- *Normalization*: `nn.BatchNorm2d`\n- *Dropout*: `nn.Dropout`, `nn.Dropout2d`\n\
    - *Embedding*: `nn.Embedding`\n- *Loss functions*: `nn.MSELoss`, `nn.CrossEntropyLoss`,\
    \ `nn.NLLLoss`\n\nThe standard classification algorithm is another version of\
    \ a supervised learning algorithm, in which the target column is a class variable\
    \ and the features could be numeric and categorical.\n\n## Recipe 5-5\\. Supervised\
    \ Model Logistic Regression\n\n### Problem\n\nHow do we deploy a logistic regression\
    \ model using PyTorch?\n\n### Solution\n\nThe computational graph network is represented\
    \ by nodes and connected through functions. Various techniques can be applied\
    \ to minimize the error function and get the best predictive model. We can increase\
    \ the iteration numbers, estimate the loss function, optimize the function, print\
    \ actual and predicted values, and show it in a graph.\n\n### How It Works\n\n\
    To apply tensor differentiation, the `nn.backward()` method needs to be applied.\
    \ Let’s look at an example.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figo_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figo_HTML.jpg)\n\
    \nThe following shows data preparation for a logistic regression model.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figp_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figp_HTML.jpg)\n\
    \nLet’s look at the sample dataset for classification.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figq_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figq_HTML.jpg)\n\
    \nSet up the neural network module for the logistic regression model.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figr_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figr_HTML.jpg)\n\
    \nCheck the neural network configuration.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figs_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figs_HTML.jpg)\n\
    \nRun iterations and find the best solution for the sample graph.\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Figt_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Figt_HTML.jpg)\n\
    \nThe first iteration provides almost 99% accuracy, and subsequently, the model\
    \ provides 100% accuracy on the training data (see Figures [5-3](#474315_1_En_5_Chapter.xhtml#Fig3)\
    \ and [5-4](#474315_1_En_5_Chapter.xhtml#Fig4)).\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Fig4_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4: Final accuracy\n\n![../images/474315_1_En_5_Chapter/474315_1_En_5_Fig3_HTML.jpg](images/474315_1_En_5_Chapter/474315_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3: Initial accuracy\n\nFinal accuracy shows 100, which is a clear case\
    \ of overfitting, but we can control this by introducing the dropout rate, which\
    \ is covered in the next chapter.\n\n## Conclusion\n\nThis chapter discussed two\
    \ major types of supervised learning algorithms—linear regression and logistic\
    \ regression—and their implementation using sample datasets and the PyTorch program.\
    \ Both algorithms are linear models, one for predicting real valued output and\
    \ the other for separating one class from another class. Although we considered\
    \ a two-class classification in the logistic regression example, it can be extended\
    \ to a multiclass classification model.\n\n# 6. Fine-Tuning Deep Learning Models\
    \ Using PyTorch\n\nDeep learning models are becoming very popular. They have very\
    \ deep roots in the way biological neurons are connected and the way they transmit\
    \ information from one node to another node in a network model.\n\nDeep learning\
    \ has a very specific usage, particularly when the single function–based machine\
    \ learning techniques fail to approximate real-life challenges. For example, when\
    \ the data dimension is very large (in the thousands), then standard machine learning\
    \ algorithms fail to predict or classify the outcome variable. This is also not\
    \ very efficient computationally. It consumes a lot of resources and model convergence\
    \ never happens. Most prominent examples are object detection, image classification,\
    \ and image segmentation.\n\nThe most commonly used deep learning algorithms can\
    \ be classified into three groups.\n\n- *Convolutional neural network*. Mostly\
    \ suitable for highly sparse datasets, image classification, image recognition,\
    \ object detection, and so forth.\n- *Recurrent neural network*. Applicable to\
    \ processing sequential information, if there is any internal sequential structure\
    \ in the way data is generated. This includes music, natural language, audio,\
    \ and video, where the information is consumed in a sequence.\n- *Deep neural\
    \ network*. Typically applicable when a single layer of a machine learning algorithm\
    \ cannot classify or predict correctly. There are three variants.\n  - *Deep network*,\
    \ where the number of neurons present in each hidden layer is usually more than\
    \ the previous layer\n  - *Wide network*, where the number of hidden layers are\
    \ more than a usual neural network model\n  - *Both deep and wide network*, where\
    \ the number of neurons and the number of layers in the network are very high\n\
    \nThis chapter discusses how to fine-tune deep learning models using hyperparameters.\
    \ There is a difference between the parameters and hyperparameters. Usually in\
    \ the deep learning models, we are not interested in estimating the parameters\
    \ because they are the weights and keep changing based on the initial values,\
    \ learning rate, and number of iterations. What is important is deciding on the\
    \ hyperparameters to fine-tune the models, as discussed in Chapter [3](#474315_1_En_3_Chapter.xhtml),\
    \ so that optimum results can be derived.\n\n## Recipe 6-1\\. Building Sequential\
    \ Neural Networks\n\n### Problem\n\nIs there any way to build sequential neural\
    \ network models, as we do in Keras in PyTorch, instead of declaring the neural\
    \ network models?"
