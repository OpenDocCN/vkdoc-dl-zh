  trans: '

    ### 工作原理


    让我们来看下面的例子。循环神经网络在输入层接收一个向量序列，并在输出层生成一个向量序列。信息序列通过循环层中的内部状态传递进行处理。有时，输出值对过去的历史值存在长期依赖关系。这是
    RNN 模型的另一种变体：长短期记忆（LSTM）模型。这适用于任何以顺序方式消费信息的领域；例如，在时间序列中，当前股票价格由历史股票价格决定，其依赖关系可以是短期的或长期的。类似地，利用文本输入向量的长程和短程信息进行上下文预测。还有其他行业用例，例如噪声分类，其中噪声也是一个信息序列。


    以下代码片段解释了如何使用 PyTorch 模块执行 RNN 模型。


    有三组权重：`U`、`V` 和 `W`。由 `W` 表示的权重向量集用于在网络中的记忆单元之间传递信息，这些信息展示了隐藏状态之间的通信。RNN 使用基于
    Word2vec 表示的嵌入层。嵌入矩阵的大小为词汇数量乘以隐藏层神经元数量。例如，如果你有 20,000 个单词和 1000 个隐藏单元，那么嵌入层的矩阵大小为
    20,000×1000。新的表示被传递到 LSTM 单元，然后进入 sigmoid 输出层。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbq_HTML.jpg](img/474315_1_En_3_Figbq_HTML.jpg)


    RNN 模型具有超参数，例如迭代次数（`EPOCH`）；取决于单台机器可用内存的批量大小；用于记住信息序列的时间步长；表示向量大小的输入大小；以及学习率。这些值的选择仅供参考；我们不能在其他用例中依赖它们。超参数调优的值选择是一个迭代过程；你可以选择多个参数并决定哪个有效，或者对模型进行并行训练并决定哪个运行良好。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbr_HTML.jpg](img/474315_1_En_3_Figbr_HTML.jpg)


    使用 `dsets.MINIST()` 函数，我们可以将数据集加载到当前会话中。如果需要存储数据集，则将其下载到本地。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbs_HTML.jpg](img/474315_1_En_3_Figbs_HTML.jpg)


    前面的脚本展示了样本图像数据集的样子。为了训练深度学习模型，我们需要将整个训练数据集转换为小批量，这有助于我们平均模型的最终准确率。通过使用数据加载器函数，我们可以加载训练数据并准备小批量。在小批量中进行随机选择的目的，是确保模型捕获到实际数据集中的所有变化。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbt_HTML.jpg](img/474315_1_En_3_Figbt_HTML.jpg)


    前面的脚本准备了训练数据集。测试数据通过标志 `train=False` 捕获。它使用测试数据转换为张量，每次随机选取 2000 个样本用于测试模型。测试特征集被转换为变量格式，测试标签向量以
    NumPy 数组格式表示。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbu_HTML.jpg](img/474315_1_En_3_Figbu_HTML.jpg)


    在前面的 RNN 类中，我们正在训练一个 LSTM 网络，该网络被证明能有效长期保持记忆，从而有助于学习。如果我们使用 `nn.RNN()` 模型，它几乎无法学习参数，因为
    RNN 的基本实现无法长时间保持或记住信息。在 LSTM 网络中，图像宽度被视为输入大小，隐藏大小由隐藏层中的神经元数量决定，`num_layers` 表示网络中
    RNN 层的数量。


    LSTM 模块内的 RNN 模块，输出一个大小为 64×10 的向量，因为输出层需要将数字分类为 0 到 9。最后的 forward 函数展示了如何在 RNN
    网络中进行前向传播。


    以下脚本展示了 LSTM 模型如何在 RNN 类下进行处理。在 LSTM 函数中，我们传递输入长度为 28，隐藏层神经元数量为 64，并从隐藏的 64 个神经元连接到输出的
    10 个神经元。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbv_HTML.jpg](img/474315_1_En_3_Figbv_HTML.jpg)


    为了优化所有 RNN 参数，我们使用 Adam 优化器。在函数内部，我们也使用了学习率。本例中使用的损失函数是交叉熵损失函数。我们需要提供多个周期来获得最佳参数。


    在下面的脚本中，我们打印训练损失和测试准确率。一个周期后，测试准确率提高到 95%，训练损失降低到 0.24。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbw_HTML.jpg](img/474315_1_En_3_Figbw_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbx_HTML.jpg](img/474315_1_En_3_Figbx_HTML.jpg)


    模型训练完成后，下一步是使用 RNN 模型进行预测。然后我们比较实际输出与真实输出，以评估模型的性能。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figby_HTML.jpg](img/474315_1_En_3_Figby_HTML.jpg)


    ## 配方 3-9. 为回归问题实现 RNN


    ### 问题


    如何为基于回归的问题设置循环神经网络？


    ### 解决方案


    回归模型需要一个目标函数和一个特征集，然后需要一个函数来建立输入和输出之间的关系。在这个例子中，我们将使用循环神经网络（RNN）来完成回归任务。回归问题看起来非常简单；它们效果很好，但仅限于显示清晰线性关系的数据。在预测输入和输出之间的非线性关系时，它们相当复杂。


    ### 工作原理


    让我们看下面的例子，它展示了输入和输出数据之间的非线性周期模式。在之前的配方中，我们看了一个 RNN 在分类相关问题上的通用例子，其中预测了输入图像的类别。然而，在回归中，RNN
    的架构会发生变化，因为目标是预测实值输出。在回归相关问题中，输出层将只有一个神经元。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbz_HTML.jpg](img/474315_1_En_3_Figbz_HTML.jpg)


    RNN 的时间步长意味着最后 10 个值预测当前值，然后滚动进行。


    以下脚本展示了一些示例序列，其中目标 cos 函数由 sin 函数近似。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figca_HTML.jpg](img/474315_1_En_3_Figca_HTML.jpg)


    ## 配方 3-10. 使用 PyTorch 内置函数


    ### 问题


    如何使用 PyTorch 设置一个 RNN 模块并调用 RNN 函数？


    ### 解决方案


    通过使用神经网络模块中可用的内置函数，我们可以实现一个 RNN 模型。

    '
- fmt: '### How It Works


    Let’s look at the following example. The neural network module in the `PyTorch`
    library contains the `RNN` function. In the following script, we use the input
    matrix size, the number of neurons in the hidden layer, and the number of hidden
    layers in the network.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcb_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcb_HTML.jpg)


    After creating the `RNN` class function, we need to provide the optimization function,
    which is `Adam`, and this time, the loss function is the mean square loss function.
    Since the objective is to make predictions of a continuous variable, we use `MSELoss`
    function in the optimization layer.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcc_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcc_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcd_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcd_HTML.jpg)


    Now we iterate over 60 steps to predict the `cos` function generated from the
    sample space, and have it predicted by a `sin` function. The iterations take the
    learning rate defined as before, and backpropagate the error to reduce the MSE
    and improve the prediction.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figce_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figce_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcf_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcf_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcg_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcg_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figch_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figch_HTML.jpg)


    ## Recipe 3-11\. Working with Autoencoders


    ### Problem


    How do we perform clustering using the autoencoders function?


    ### Solution


    Unsupervised learning is a branch of machine learning that does not have a target
    column or the output is not defined. We only need to understand the unique patterns
    existing in the data. Let’s look at the autoencoder architecture in Figure [3-1](#474315_1_En_3_Chapter.xhtml#Fig1).
    The input feature space is transformed into a lower dimensional tensor representation
    using a hidden layer and mapped back to the same input space. The layer that is
    precisely in the middle holds the autoencoder’s values.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Fig1_HTML.png](images/474315_1_En_3_Chapter/474315_1_En_3_Fig1_HTML.png)


    Figure 3-1


    Autoencoder architecture


    ### How It Works


    Let’s look at the following example. The `torchvision` library contains popular
    datasets, model architectures, and frameworks. Autoencoder is a process of identifying
    latent features from the dataset; it is used for classification, prediction, and
    clustering. If we put the input data in the input layer and the same dataset in
    the output layer, then we add multiple layers of hidden layers with many neurons,
    and then we pass through a series of epochs. We get a set of latent features in
    the innermost hidden layer. The weights or parameters in the central hidden layer
    are known as the *autoencoder* *layer*.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figci_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figci_HTML.jpg)


    We again use the MNIST dataset to experiment with autoencoder functionality. This
    time we are taking 10 epochs, a batch size 64 to be passed to the network, a learning
    rate of 0.005, and 5 images for testing.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcj_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcj_HTML.jpg)


    The following plot shows the dataset uploaded from the `torchvision` library and
    displayed as an image.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figck_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figck_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcl_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcl_HTML.jpg)


    Let’s discuss the autoencoder architecture. The input has 784 features. It has
    a height of 28 and a width of 28. We pass the 784 neurons from the input layer
    to the first hidden layer, which has 128 neurons in it. Then we apply the hyperbolic
    tangent function to pass the information to the next hidden layer. The second
    hidden layer contains 128 input neurons and transforms it into 64 neurons. In
    the third hidden layer, we apply the hyperbolic tangent function to pass the information
    to the next hidden layer. The innermost layer contains three neurons, which are
    considered as three features, which is the end of the encoder layer. Then the
    decoder function expands the layer back to the 784 features in the output layer.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcm_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcm_HTML.jpg)


    Once we set the architecture, then the normal process of making the loss function
    minimize corresponding to a learning rate and optimization function happens. The
    entire architecture passes through a series of epochs in order to reach the target
    output.


    ## Recipe 3-12\. Fine-Tuning Results Using Autoencoder


    ### Problem


    How do we set up iterations to fine-tune the results?


    ### Solution


    Conceptually, an autoencoder works the same as the clustering model. In unsupervised
    learning, the machine learns patterns from data and generalizes it to the new
    dataset. The learning happens by taking a set of input features. Autoencoder functions
    are also used for feature engineering.


    ### How It Works


    Let’s look at the following example. The same MNIST dataset is used as an example,
    and the objective is to understand the role of the epoch in achieving a better
    autoencoder layer. We increase the epoch size to reduce errors to a minimum; however,
    in practice, increasing the epoch has many challenges, including memory constraints.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcn_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcn_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figco_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figco_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcp_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcp_HTML.jpg)


    By using the encoder function, we can represent the input features into a set
    of latent features. By using the decoder function, however, we can reconstruct
    the image. Then we can match how image reconstruction is done by using the autoencoder
    functions. From the preceding set of graphs, it is clear that as we increase the
    epoch, the image recognition becomes transparent.


    ## Recipe 3-13\. Visualizing the Encoded Data in a 3D Plot


    ### Problem


    How do we visualize the MNIST data in a 3D plot?


    ### Solution


    We use the autoencoder function to get the encoded features and then use the dataset
    to represent it in a 3D plane.


    ### How It Works


    Let’s look at the following example. This recipe is about how to represent the
    autoencoder function derived from the preceding recipe in the three-dimensional
    space, because we have three neurons in the innermost hidden layer. The following
    display shows a three-dimensional neuron.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcq_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcq_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcr_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figcr_HTML.jpg)


    ## Recipe 3-14\. Restricting Model Overfitting


    ### Problem


    When we fit many neurons and layers to predict the target class or output variable,
    the function usually overfits the training dataset. Because of model overfitting,
    we cannot make a good prediction on the test set. The test accuracy is not the
    same as training accuracy. There would be deviations in training and test accuracy.'
