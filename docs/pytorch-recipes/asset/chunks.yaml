    ### 工作原理


    让我们来看下面的示例。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figab_HTML.jpg](img/474315_1_En_3_Figab_HTML.jpg)


    每种优化方法在解决问题时都独具特色。我们稍后将对此进行描述。


    `Adam` 优化器是一种基于随机目标函数的一阶梯度优化方法。它基于低阶矩的自适应估计。其计算效率足以部署在大型数据集上。要使用 `torch.optim`，我们必须在代码中构建一个优化器对象，该对象将保存参数的当前状态，并根据计算出的梯度、矩和学习率来更新参数。要构建优化器，我们需要向其提供一个包含参数的可迭代对象，并确保所有参数都是待优化的变量。然后，我们可以指定优化器特定的选项，例如学习率、权重衰减、矩等。


    `Adadelta` 是另一种优化器，其速度足以处理大型数据集。该方法无需手动微调学习率；算法会在内部自行处理。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figac_HTML.jpg](img/474315_1_En_3_Figac_HTML.jpg)


