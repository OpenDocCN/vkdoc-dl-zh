    ## Recipe 3-7\. Reloading a Model


    ### Problem


    How do we store and re-upload a model that has already been trained? Given the
    nature of deep learning models, which typically require a larger training time,
    the computational process creates a huge cost to the company. Can we retrain the
    model with new inputs and store the model?


    ### Solution


    In the production environment, we typically cannot train and predict at the same
    time because the training process takes a very long time. The prediction services
    cannot be applied until the training process using epoch is completed, the prediction
    services cannot be applied. Disassociating the training process from the prediction
    process is required; therefore, we need to store the application’s trained model
    and continue until the next phase of training is done.


    ### How It Works


    Let’s look at the following example, where we are creating the save function,
    which uses the `Torch` neural network module to create the model and the `restore_net()`
    function to get back the neural network model that was trained earlier.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbl_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbl_HTML.jpg)


    The preceding script contains a dependent `Y` variable and an independent `X`
    variable as sample data points to create a neural network model. The following
    `save` function stores the model. The `net1` object is the trained neural network
    model, which can be stored using two different protocols: (1) save the entire
    neural network model with all the weights and biases, and (2) save the model using
    only the weights. If the trained model object is very heavy in terms of size,
    we should save only the parameters that are weights; if the trained object size
    is low, then the entire model can be stored.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbm_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbm_HTML.jpg)


    The prebuilt neural network model can be reloaded to the existing `PyTorch` session
    by using the `load` function. To test the `net1` object and make predictions,
    we load the `net1` object and store the model as `net2`. By using the `net2` object,
    we can predict the outcome variable. The following script generates the graph
    as a dependent and an independent variable. `prediction.data.numpy()` in the last
    line of the code shows the predicted result.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbn_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbn_HTML.jpg)


    Loading the pickle file format of the entire neural network is relatively slow;
    however, if we are only making predictions for a new dataset, we can only load
    the parameters of the model in a pickle format rather than the whole network.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbo_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbo_HTML.jpg)


    Reuse the model. The `restore` function makes sure that the trained parameters
    can be reused by the model. To restore the model, we can use the `load_state_dict()`
    function to load the parameters of the model. If we see the following three models
    in the graph, they are identical, because `net2` and `net3` are copies of `net1`.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbp_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figbp_HTML.jpg)


    ## Recipe 3-8\. Implementing a Recurrent Neural Network (RNN)


    ### Problem


    How do we set up a recurrent neural network using the `MNIST` dataset?


    ### Solution


    The recurrent neural network is considered as a memory network. We will use the
    epoch as 1 and a batch size of 64 samples at a time to establish the connection
    between the input and the output. Using the RNN model, we can predict the digits
    present in the images.'
