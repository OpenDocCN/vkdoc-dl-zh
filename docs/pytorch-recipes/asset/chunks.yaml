    PyTorch 实现概率模型，包括创建随机变量、应用统计分布以及进行统计推断。


    # 2. 使用 PyTorch 的概率分布


    概率和随机变量是 PyTorch 这类图计算平台中不可或缺的组成部分。理解概率及其相关概念至关重要。本章涵盖概率分布及其在 PyTorch 中的实现，以及如何解释测试结果。


    在概率论和统计学中，随机变量也称为*随机变量*，其结果取决于纯粹的随机现象。概率分布有多种类型，包括正态分布、二项分布、多项分布和伯努利分布。每种统计分布都有其自身的特性。


    `torch.distributions` 模块包含概率分布和采样函数。每种分布类型在计算图中都有其重要性。该分布模块包含二项分布、伯努利分布、贝塔分布、类别分布、指数分布、正态分布和泊松分布。


    ## 方法 2-1. 张量采样


    ### 问题


    权重初始化是训练神经网络以及任何深度学习模型（如卷积神经网络 (CNN)、深度神经网络 (DNN) 和循环神经网络 (RNN)）时的一项重要任务。如何初始化权重始终是一个关键问题。


    ### 解决方案


    权重初始化可以通过多种方法实现，包括随机权重初始化。基于分布的权重初始化可以使用均匀分布、伯努利分布、多项分布和正态分布。接下来将解释如何使用 PyTorch
    实现。

    '
- fmt: '### How It Works


    To execute a neural network, a set of initial weights needs to be passed to the
    backpropagation layer to compute the loss function (and hence, the accuracy can
    be calculated). The selection of a method depends on the data type, the task,
    and the optimization required for the model. Here we are going to look at all
    types of approaches to initialize weights.


    If the use case requires reproducing the same set of results to maintain consistency,
    then a manual seed needs to be set.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figa_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figa_HTML.jpg)


    The seed value can be customized. The random number is generated purely by chance.
    Random numbers can also be generated from a statistical distribution. The probability
    density function of the *continuous uniform distribution* is defined by the following
    formula.


    ![$$ f(x)=\Big\{{\displaystyle \begin{array}{cc}\frac{1}{b-a}&amp; \mathrm{for}\
    a\le x\le b,\\ {}0&amp; \mathrm{for}\ x&lt;a\ or\ x&gt;b\end{array}} $$](images/474315_1_En_2_Chapter/474315_1_En_2_Chapter_TeX_Equa.png)


    The function of `x` has two points, `a` and `b`, in which `a` is the starting
    point and `b` is the end. In a continuous uniform distribution, each number has
    an equal chance of being selected. In the following example, the start is 0 and
    the end is 1; between those two digits, all 16 elements are selected randomly.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figb_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figb_HTML.jpg)


    In statistics, the *Bernoulli distribution* is considered as the discrete probability
    distribution, which has two possible outcomes. If the event happens, then the
    value is 1, and if the event does not happen, then the value is 0.


    For *discrete probability distribution*, we calculate probability mass function
    instead of probability density function. The probability mass function looks like
    the following formula.


    ![$$ \Big\{{\displaystyle \begin{array}{cc}q=\left(1-p\right)&amp; \mathrm{for}\kern0.125em
    k=0\\ {}p&amp; \mathrm{for}\kern0.125em k=1\end{array}} $$](images/474315_1_En_2_Chapter/474315_1_En_2_Chapter_TeX_Equb.png)


    From the Bernoulli distribution, we create sample tensors by considering the uniform
    distribution of size 4 and 4 in a matrix format, as follows.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figc_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figc_HTML.jpg)


    The generation of sample random values from a *multinomial distribution* is defined
    by the following script. In a multinomial distribution, we can choose with a replacement
    or without a replacement. By default, the multinomial function picks up without
    a replacement and returns the result as an index position for the tensors. If
    we need to run it with a replacement, then we need to specify that while sampling.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figd_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figd_HTML.jpg)


    Sampling from multinomial distribution with a replacement returns the tensors’
    index values.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Fige_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Fige_HTML.jpg)


    The weight initialization from the normal distribution is a method that is used
    in fitting a neural network, fitting a deep neural network, and CNN and RNN. Let’s
    have a look at the process of creating a set of random weights generated from
    a normal distribution.


    ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figf_HTML.jpg](images/474315_1_En_2_Chapter/474315_1_En_2_Figf_HTML.jpg)


    ## Recipe 2-2\. Variable Tensors


    ### Problem


    What is a variable in PyTorch and how is it defined? What is a random variable
    in PyTorch?


    ### Solution


    In PyTorch, the algorithms are represented as a computational graph. A variable
    is considered as a representation around the tensor object, corresponding gradients,
    and a reference to the function from where it was created. For simplicity, gradients
    are considered as slope of the function. The slope of the function can be computed
    by the derivative of the function with respect to the parameters that are present
    in the function. For example, in linear regression (`Y = W*X + alpha`), representation
    of the variable would look like the one shown in Figure [2-2](#474315_1_En_2_Chapter.xhtml#Fig2).


    Basically, a PyTorch variable is a node in a computational graph, which stores
    data and gradients. When training a neural network model, after each iteration,
    we need to compute the gradient of the loss function with respect to the parameters
    of the model, such as weights and biases. After that, we usually update the weights
    using the gradient descent algorithm. Figure [2-1](#474315_1_En_2_Chapter.xhtml#Fig1)
    explains how the linear regression equation is deployed under the hood using a
    neural network model in the PyTorch framework.


    In a computational graph structure, the sequencing and ordering of tasks is very
