- fmt: '### How It Works


    Let’s look at the following example. In the previous recipe, the last line of
    the script shows the `grad_fn` as an object embedded in the output object tensor.
    In this recipe, we explain how this is computed. `grad_fn` is a derivative of
    the loss function with respect to the parameters of the model. This is exactly
    what we do in the following `grad_fn`.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figj_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figj_HTML.jpg)


    The parameters are the input, bias settings, and the learning rate, and the number
    of epochs for the model training. The estimation of these parameters provides
    values to the equation.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figk_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figk_HTML.jpg)


    This is what the initial result looks like. Epoch is an iteration that produces
    a loss value from the loss function defined earlier. The `params` vector is about
    coefficients and constants that need to be changed to minimize the loss function.
    The `grad` function computes the feedback value to the next epoch. This is just
    an example. The number of epochs chosen is an iterative task depending on the
    input data, output data, and choice of loss and optimization functions.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figl_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figl_HTML.jpg)


    If we reduce the learning rate, we are able to pass relevant values to the gradient,
    the parameter updates in a better way, and model convergence becomes quicker.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figm_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figm_HTML.jpg)


    The initial results look like as the following. The results are at epoch 5 and
    the loss value is 29.35, which is much lower than 1763.88 at epoch 0, and corresponding
    to the epoch, the estimated parameters are 0.24 and –.01, at epoch 100. These
    parameter values are optimal.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Fign_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Fign_HTML.jpg)


    If we reduce the learning rate a bit, then the process of weight updating will
    be a little slower, which means that the epoch number needs to be increased in
    order to find a stable state for the model.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figo_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figo_HTML.jpg)


    The following are the results that we observe.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figp_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figp_HTML.jpg)


    If we increase the number of epochs, then what happens to the loss function and
    parameter tensor can be viewed in the following script, in which we print the
    loss value to find the minimum loss corresponding to the epoch. Then we can extract
    the best parameters from the model.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figq_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figq_HTML.jpg)


    The following are the results.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figr_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figr_HTML.jpg)


    The following is the final loss value at the final epoch level.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figs_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figs_HTML.jpg)


    At epoch 5000, the loss value is 2.92, which is not going down further; hence,
    at this iteration level, the tensor output displays 5.36 as the final weight and
    –17.30 as the final bias. These are the final parameters from the model.


    To fine-tune this model in estimating parameters, we can redefine the model and
    the loss function and apply it to the same example.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figt_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figt_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figu_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figu_HTML.jpg)


    Set up the parameters. After completing the training process, we should reset
    the `grad` function to `None`.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figv_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figv_HTML.jpg)


    ## Recipe 3-3. Fine-Tuning a Model


    ### Problem


    How do we find the gradients of the loss function by applying an optimization
    function to optimize the loss function?


    ### Solution


    We’ll use the `backward()` function.


    ### How It Works


    Let’s look at the following example. The `backward()` function calculates the
    gradients of a function with respect to its parameters. In this section, we retrain
    the model with new set of hyperparameters.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figw_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figw_HTML.jpg)


    Reset the parameter grid. If we do not reset the parameters in an existing session,
    the error values accumulated from any other session become mixed, so it is important
    to reset the parameter grid.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figx_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figx_HTML.jpg)


    After redefining the model and the loss function, let’s retrain the model.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figy_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figy_HTML.jpg)


    We have taken 5000 epochs. We train the parameters in a backward propagation method
    and get the following results. At epoch 0, the loss value is 80.36. We try to
    minimize the loss value as we proceed with the next iteration by adjusting the
    learning rate. At the final epoch, we observe that the loss value is 2.92, which
    is same result as before but with a different loss function and using backpropagation.


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figz_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figz_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figaa_HTML.jpg](images/474315_1_En_3_Chapter/474315_1_En_3_Figaa_HTML.jpg)


    The final model parameters are 5.3671 with a bias of –17.3012.


    ## Recipe 3-4. Selecting an Optimization Function


    ### Problem


    How do we optimize the gradients with the function in Recipe 3-3?


    ### Solution


    There are certain functions that are embedded in PyTorch, and there are certain
    optimization functions that the user has to create.'
