  trans: '

    ### 解决方案


    为了限制模型过拟合，我们有意引入了`dropout`比率，即随机删除（比方说）网络中 10%或 20%的权重，并同时检查模型准确率。如果我们在删除 10%或
    20%的权重后，仍能达到相同的模型准确率，那么我们的模型就是好的。


    ### 工作原理


    让我们看下面的例子。当训练好的模型无法泛化到其他测试场景时，就会发生模型过拟合。当训练准确率与测试准确率出现显著差异时，即可识别出过拟合。为了避免模型过拟合，我们可以在模型中引入`dropout`比率。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcs_HTML.jpg](img/474315_1_En_3_Figcs_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figct_HTML.jpg](img/474315_1_En_3_Figct_HTML.jpg)


    在隐藏层中引入`dropout`比率，可以确保将低于设定阈值的权重从网络架构中移除。应用程序`dropout`比率的典型阈值是 20%到 50%。20%的`dropout`比率意味着较小的惩罚力度；而
    50%的阈值则意味着对模型权重的重度惩罚。


    在下面的脚本中，我们应用了 50%的`dropout`比率来从模型中丢弃权重。我们应用了两次`dropout`比率。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcu_HTML.jpg](img/474315_1_En_3_Figcu_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcv_HTML.jpg](img/474315_1_En_3_Figcv_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcw_HTML.jpg](img/474315_1_En_3_Figcw_HTML.jpg)


    选择合适的`dropout`比率需要对业务和领域有相当的了解。


    ## 方法 3-15. 可视化模型过拟合


    ### 问题


    评估模型过拟合。


    ### 解决方案


    我们改变模型超参数，并迭代地检查模型是否过拟合数据。


    ### 工作原理


    让我们看下面的例子。上一个方法涵盖了两种类型的神经网络：过拟合和`dropout`比率。当从数据中估计出的模型参数对于训练数据集来说非常接近实际数据，而同样的模型在测试集上表现不同时，这就是模型过拟合的明显迹象。为了限制模型过拟合，我们可以引入`dropout`比率，它会删除一定比例的连接（即网络中的权重），以使训练后的模型更接近真实数据。


    在下面的脚本中，迭代进行了 500 次。预测值分别由基础模型（显示过拟合）和`dropout`模型（显示删除了部分权重）生成。以同样的方式，我们创建了两个损失函数、反向传播以及优化器的实现。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcx_HTML.jpg](img/474315_1_En_3_Figcx_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcy_HTML.jpg](img/474315_1_En_3_Figcy_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figcz_HTML.jpg](img/474315_1_En_3_Figcz_HTML.jpg)


    初始的绘图轮次包括了过拟合损失和`dropout`损失，以及它们与上图中实际训练和测试数据点的差异。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figda_HTML.jpg](img/474315_1_En_3_Figda_HTML.jpg)


    经过多次迭代后，上图是通过使用实际模型和带有`dropout`比率的两个函数生成的。从这张图中可以得出的结论是，实际训练数据可能会更接近过拟合模型；然而，`dropout`模型对数据的拟合效果非常好。


    ## 方法 3-16. 在 Dropout 比率中初始化权重


    ### 问题


    我们如何删除网络中的权重？是应该随机删除，还是使用某种分布来删除？


    ### 解决方案


    我们应该基于概率分布来删除`dropout`层中的权重，而不是随机删除。


    ### 工作原理


    让我们看下面的例子。在之前的方法中，引入了三个`dropout`比率层：一个在第一个隐藏层之后，两个在第二个隐藏层之后。概率百分比为 0.50，这意味着随机删除
    50%的权重。有时，从网络中随机选择权重会删除相关的权重，因此一个替代方案是删除从统计分布中生成的网络权重。


    下面的脚本展示了如何从均匀分布中生成权重，然后我们可以在网络架构中使用这组权重。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdb_HTML.jpg](img/474315_1_En_3_Figdb_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdc_HTML.jpg](img/474315_1_En_3_Figdc_HTML.jpg)


    ## 方法 3-17. 添加数学运算


    ### 问题


    我们如何设置广播函数并优化卷积函数？


    ### 解决方案


    下面的脚本片段展示了在设置卷积神经网络模型时如何引入批归一化，然后进一步设置池化层。


    ### 工作原理


    让我们看下面的例子。为了在神经网络模型的卷积层中引入批归一化，我们需要执行基于张量的数学运算，这些运算在功能上与其他计算方法不同。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdd_HTML.jpg](img/474315_1_En_3_Figdd_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figde_HTML.jpg](img/474315_1_En_3_Figde_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdf_HTML.jpg](img/474315_1_En_3_Figdf_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdg_HTML.jpg](img/474315_1_En_3_Figdg_HTML.jpg)


    下面的脚本片段展示了在进入 2D 最大池化层之前，如何使用 2D 层解决批归一化问题。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdh_HTML.jpg](img/474315_1_En_3_Figdh_HTML.jpg)


    ## 方法 3-18. 在 RNN 中嵌入层


    ### 问题


    循环神经网络主要用于文本处理。与原始特征相比，嵌入特征在标准 RNN 模型上能提供更高的准确率。我们如何在 RNN 中创建嵌入特征？


    ### 解决方案


    第一步是创建一个嵌入层，它是一个固定的字典和固定大小的查找表，然后引入`dropout`比率，之后再创建门控循环单元。


    ### 工作原理


    让我们看下面的例子。当文本数据以序列形式输入时，信息会以顺序方式被处理；例如，当我们描述某事物时，我们会按顺序使用一组词语来传达含义。如果我们使用单个词作为向量来表示数据，那么生成的数据集会非常稀疏。但是，如果我们使用基于短语的方法或词语组合来表示特征向量，那么这些向量就会变成一个密集层。密集向量层被称为*词嵌入*，因为嵌入层传达的是上下文或含义作为结果。这绝对比词袋方法要好。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdi_HTML.jpg](img/474315_1_En_3_Figdi_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figdj_HTML.jpg](img/474315_1_En_3_Figdj_HTML.jpg)

