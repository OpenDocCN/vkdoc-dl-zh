    ## 配方 3-5\. 进一步优化函数


    ### 问题


    如何使用随机样本优化训练集，并用验证集对其进行测试？


    ### 解决方案


    我们将逐步介绍进一步优化的过程。


    ### 工作原理


    让我们来看下面的示例。这里我们设置了样本数量，然后使用 `shuffled_indices` 将 20% 的数据作为验证样本。我们对所有记录进行了随机采样。训练集和验证集的目标是在训练集上构建模型，对验证集进行预测，并检查模型的准确性。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figan_HTML.jpg](img/474315_1_En_3_Figan_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figao_HTML.jpg](img/474315_1_En_3_Figao_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figap_HTML.jpg](img/474315_1_En_3_Figap_HTML.jpg)


    现在让我们运行训练和验证过程。我们首先获取训练输入数据，并将其与下一行的参数相乘。我们进行预测并计算损失函数。在第三行使用相同的模型，我们进行预测，然后评估验证数据集的损失函数。在反向传播过程中，我们计算训练集损失函数的梯度，并使用优化器更新参数。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figaq_HTML.jpg](img/474315_1_En_3_Figaq_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figar_HTML.jpg](img/474315_1_En_3_Figar_HTML.jpg)


    以下是最后 10 个周期及其结果。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figas_HTML.jpg](img/474315_1_En_3_Figas_HTML.jpg)


    在上一步中，梯度被设置为 true。在接下来的步骤中，我们通过使用 `torch.no_grad()` 函数来禁用梯度计算。其余语法保持不变。当我们确定不会调用
    `Tensor.backward()` 时，禁用梯度计算有助于进行推理。这可以减少那些原本 `requires_grad=True` 的计算的内存消耗。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figat_HTML.jpg](img/474315_1_En_3_Figat_HTML.jpg)


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figau_HTML.jpg](img/474315_1_En_3_Figau_HTML.jpg)


    最后几轮周期的结果显示在以下其他代码行中。


    ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figav_HTML.jpg](img/474315_1_En_3_Figav_HTML.jpg)


    最终参数为 5.44 和 –18.012。


