  trans: '

    ### ReLU 函数


    线性整流单元（`ReLU`）是另一种激活函数。它用于将信息从输入层传输到输出层。`ReLU` 主要应用于卷积神经网络模型中。该激活函数的取值范围是从 0 到无穷大。它通常用于神经网络模型中不同的隐藏层之间。


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figh_HTML.jpg](img/474315_1_En_4_Figh_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figi_HTML.jpg](img/474315_1_En_4_Figi_HTML.jpg)


    不同类型的传递函数在神经网络架构中可以互换使用。它们可以应用于不同阶段，例如从输入层到隐藏层、从隐藏层到输出层等，以提高模型的准确率。


    ### 带泄露的 ReLU


    在标准神经网络模型中，梯度消失问题很常见。为了避免这个问题，可以采用带泄露的 `ReLU`。当单元未激活时，带泄露的 `ReLU` 允许一个微小且非零的梯度。


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figj_HTML.jpg](img/474315_1_En_4_Figj_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figk_HTML.jpg](img/474315_1_En_4_Figk_HTML.jpg)


    ## 方法 4-2. 可视化激活函数的形状


    ### 问题


    我们如何可视化激活函数？激活函数的可视化对于正确构建神经网络模型至关重要。


    ### 解决方案


    激活函数将数据从一个层转换到另一个层。可以将转换后的数据与原始张量进行对比绘图，以实现函数的可视化。我们选取了一个样本张量，将其转换为 `PyTorch`
    变量，应用该函数，并将其存储为另一个张量。使用 `matplotlib` 来表示原始张量和转换后的张量。


    ### 工作原理


    正确选择激活函数不仅能提供更好的准确率，还有助于提取有意义的信息。


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figl_HTML.jpg](img/474315_1_En_4_Figl_HTML.jpg)


    在此脚本中，我们有一个位于 -10 到 +10 线性空间内的数组，并且有 1500 个样本点。我们将该向量转换为 `Torch` 变量，然后复制一份作为 `NumPy`
    变量用于绘制图形。接着，我们计算了激活函数。下图展示了这些激活函数。


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figm_HTML.jpg](img/474315_1_En_4_Figm_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Fign_HTML.jpg](img/474315_1_En_4_Fign_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figo_HTML.jpg](img/474315_1_En_4_Figo_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figp_HTML.jpg](img/474315_1_En_4_Figp_HTML.jpg)


    ## 方法 4-3. 基础神经网络模型


    ### 问题


    如何使用 `PyTorch` 构建一个基础神经网络模型？


    ### 解决方案


    在 `PyTorch` 中构建基础神经网络模型需要六个步骤：准备训练数据、初始化权重、创建基础网络模型、计算损失函数、选择学习率，以及针对模型参数优化损失函数。


    ### 工作原理


    让我们按照逐步的方法来创建一个基础神经网络模型。


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figq_HTML.jpg](img/474315_1_En_4_Figq_HTML.jpg)


    为了展示一个示例神经网络模型，我们准备数据集并将数据类型更改为浮点张量。当我们开展一个项目时，构建模型的数据准备是一项独立的活动。数据准备应以恰当的方式进行。在上一步中，`train_x`
    和 `train_y` 是两个 `NumPy` 向量。接下来，我们将数据类型更改为浮点张量，因为这是矩阵乘法所必需的。下一步是将其转换为变量，因为变量具有三个有助于我们微调对象的属性。在该数据集中，我们在一个维度上有
    17 个数据点。


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figr_HTML.jpg](img/474315_1_En_4_Figr_HTML.jpg)


    `set_weight()` 函数初始化神经网络模型在前向传播中将使用的随机权重。我们需要两个张量：权重和偏置。`build_network()` 函数简单地将权重与输入相乘，加上偏置，并生成预测值。这是我们构建的自定义函数。如果我们需要在
    `PyTorch` 中实现同样的功能，那么当我们需要将其用于线性回归时，使用 `nn.Linear()` 会简单得多。


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figs_HTML.jpg](img/474315_1_En_4_Figs_HTML.jpg)


    一旦我们定义了网络结构，就需要将结果与输出进行比较，以评估预测步骤。跟踪系统准确率的指标是损失函数，我们希望它尽可能小。损失函数可能有不同的形状。我们如何确切知道损失在何处最小，以及这对应哪一次迭代能提供最佳结果？要知道这一点，我们需要对损失函数应用优化函数；它会找到最小的损失值。然后我们可以提取与该迭代对应的参数。


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figt_HTML.jpg](img/474315_1_En_4_Figt_HTML.jpg)


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figu_HTML.jpg](img/474315_1_En_4_Figu_HTML.jpg)


    中位数、众数和标准差的计算可以用相同的方式编写。标准差显示了与集中趋势度量的偏差，这指示了数据/变量的一致性。它显示了数据中是否存在足够的波动。


    ## 方法 4-4. 张量微分


    ### 问题


    什么是张量微分，以及它如何与使用 `PyTorch` 框架的计算图执行相关联？


    ### 解决方案


    计算图网络由节点表示，并通过函数连接。有两种不同类型的节点：依赖节点和独立节点。*依赖节点*等待来自其他节点的结果来处理输入。*独立节点*是相互连接的，并且要么是常量，要么是结果。张量微分是在计算图环境中执行计算的一种高效方法。

    '
- fmt: '### How It Works


    In a computational graph, tensor differentiation is very effective because the
    tensors can be computed as parallel nodes, multiprocess nodes, or multithreading
    nodes. The major deep learning and neural computation frameworks include this
    tensor differentiation.


    `Autograd` is the function that helps perform tensor differentiation, which means
    calculating the gradients or slope of the error function, and backpropagating
    errors through the neural network to fine-tune the weights and biases. Through
    the learning rate and iteration, it tries to reduce the error value or loss function.


    To apply tensor differentiation, the `nn.backward()` method needs to be applied.
    Let’s take an example and see how the error gradients are backpropagated. To update
    the curve of the loss function, or to find where the shape of the loss function
    is minimum and in which direction it is moving, a derivative calculation is required.
    Tensor differentiation is a way to compute the slope of the function in a computational
    graph.


    ![../images/474315_1_En_4_Chapter/474315_1_En_4_Figv_HTML.jpg](images/474315_1_En_4_Chapter/474315_1_En_4_Figv_HTML.jpg)


    In this script, the `x` is a sample tensor, for which automatic gradient calculation
    needs to happen. The `fn` is a linear function that is created using the `x` variable.
    Using the `backward` function, we can perform a backpropagation calculation. The
    `.grad()` function holds the final output from the tensor differentiation.


    ## Conclusion


    This chapter discussed various activation functions and the use of the activation
    functions in various situations. The method or system to select the best activation
    function is accuracy driven; the activation function that gives the best results
    should always be used dynamically in the model. We also created a basic neural
    network model using small sample tensors, updated the weights using optimization,
    and generated predictions. In the next chapter, we see more examples.


    # 5. Supervised Learning Using PyTorch


    Supervised machine learning is the most sophisticated branch of machine learning.
    It is in use in almost all fields, including artificial intelligence, cognitive
    computing, and language processing. Machine learning literature broadly talks
    about three types of learning: supervised, unsupervised, and reinforcement learning.
    In supervised learning, the machine learns to recognize the output; hence, it
    is task driven and the task can be classification or regression.


    In unsupervised learning, the machine learns patterns from data; thus, it generalizes
    the new dataset and the learning happens by taking a set of input features. In
    reinforcement learning, the learning happens in response to a system that reacts
    to situations.


    This chapter covers regression techniques in detail with a machine learning approach
    and interprets the output from regression methods in the context of a business
    scenario. The algorithmic classification is shown in Figure [5-1](#474315_1_En_5_Chapter.xhtml#Fig1).


    ![../images/474315_1_En_5_Chapter/474315_1_En_5_Fig1_HTML.png](images/474315_1_En_5_Chapter/474315_1_En_5_Fig1_HTML.png)


    Figure 5-1


    Algorithmic classification


    Each object or row represents one event and each event is categorized into groups.
    Identifying which level group a record belongs to is called *classification*,
    in which the target variable has specific labels or tags attached to the events.
    For example, in a bank database, each customer is tagged as either a loyal customer
    or not a loyal customer. In a medical records database, each patient’s disease
    is tagged. In the telecom industry, each subscriber is tagged as a churn or non-churn
    customer. These are examples in which a supervised algorithm performs classification.
    The word *classification* comes from the classes available in the target column.


    In *regression learning*, the objective is to predict the value of a continuous
    variable; for example, given the features of a property, such as the number of
    bedrooms, square feet, nearby areas, the township, and so forth, the asking price
    for the house is determined. In such scenarios, the regression models can be used.
    Similar examples include predicting stock prices or the sales, revenue, and profit
    of a business.


    In an unsupervised learning algorithm, we do not have an outcome variable, and
    tagging or labeling is not available. We are interested in knowing the natural
    grouping of the observations, or records, or rows in a dataset. This natural grouping
    should be in such a way that within groups, similarity should be at a maximum
    and between groups similarity should be at a minimum.


    In real-world scenarios, there are cases where regression does not help predict
    the target variable. In supervised regression techniques, the input data is also
    known as *training data*. For each record, there is a label that has a continuous
    numerical value. The model is prepared through a training process that predicts
    the right output, and the process continues until the desired level of accuracy
    is achieved. We may need advanced regression methods to understand the pattern
    existing in the dataset.'
