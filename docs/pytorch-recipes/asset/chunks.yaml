    ### How It Works


    Let’s look at the following example. Here we set the number of samples, then we
    take 20% of the data as validation samples using `shuffled_indices`. We took random
    samples of all the records. The objective of the train and validation set is to
    build a model in a training set, make the prediction on the validation set, and
    check the accuracy of the model.


