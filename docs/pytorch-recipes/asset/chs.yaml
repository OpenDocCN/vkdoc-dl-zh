- '# 2. 使用 PyTorch 的概率分布


  概率和随机变量是 PyTorch 这类图计算平台中不可或缺的组成部分。理解概率及其相关概念至关重要。本章涵盖概率分布及其在 PyTorch 中的实现，以及如何解释测试结果。


  在概率论和统计学中，随机变量也称为*随机变量*，其结果取决于纯粹的随机现象。概率分布有多种类型，包括正态分布、二项分布、多项分布和伯努利分布。每种统计分布都有其自身的特性。


  `torch.distributions` 模块包含概率分布和采样函数。每种分布类型在计算图中都有其重要性。该分布模块包含二项分布、伯努利分布、贝塔分布、类别分布、指数分布、正态分布和泊松分布。


  ## 方法 2-1. 张量采样


  ### 问题


  权重初始化是训练神经网络以及任何深度学习模型（如卷积神经网络 (CNN)、深度神经网络 (DNN) 和循环神经网络 (RNN)）时的一项重要任务。如何初始化权重始终是一个关键问题。


  ### 解决方案


  权重初始化可以通过多种方法实现，包括随机权重初始化。基于分布的权重初始化可以使用均匀分布、伯努利分布、多项分布和正态分布。接下来将解释如何使用 PyTorch
  实现。




  ### 工作原理


  要执行神经网络，需要将一组初始权重传递给反向传播层，以计算损失函数（从而可以计算准确率）。方法的选择取决于数据类型、任务以及模型所需的优化方式。接下来，我们将探讨所有类型的权重初始化方法。


  如果用例需要复现相同的结果集以保持一致性，则需要设置一个手动种子。


  ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figa_HTML.jpg](img/474315_1_En_2_Figa_HTML.jpg)


  种子值可以自定义。随机数是纯粹随机生成的。随机数也可以从统计分布中生成。*连续均匀分布*的概率密度函数由以下公式定义。


  ![$$ f(x)=\Big\{{\displaystyle \begin{array}{cc}\frac{1}{b-a}&amp; \mathrm{for}\
  a\le x\le b,\\ {}0&amp; \mathrm{for}\ x&lt;a\ or\ x&gt;b\end{array}} $$](img/474315_1_En_2_Chapter_TeX_Equa.png)


  `x` 的函数有两个点，`a` 和 `b`，其中 `a` 是起点，`b` 是终点。在连续均匀分布中，每个数字被选中的概率相等。在以下示例中，起点为 0，终点为
  1；在这两个数字之间，所有 16 个元素都是随机选择的。


  ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figb_HTML.jpg](img/474315_1_En_2_Figb_HTML.jpg)


  在统计学中，*伯努利分布*被视为离散概率分布，它有两个可能的结果。如果事件发生，则值为 1；如果事件未发生，则值为 0。


  对于*离散概率分布*，我们计算的是概率质量函数，而不是概率密度函数。概率质量函数如下公式所示。


  ![$$ \Big\{{\displaystyle \begin{array}{cc}q=\left(1-p\right)&amp; \mathrm{for}\kern0.125em
  k=0\\ {}p&amp; \mathrm{for}\kern0.125em k=1\end{array}} $$](img/474315_1_En_2_Chapter_TeX_Equb.png)


  根据伯努利分布，我们通过考虑大小为 4 和 4 的均匀分布，以矩阵格式创建样本张量，如下所示。


  ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figc_HTML.jpg](img/474315_1_En_2_Figc_HTML.jpg)


