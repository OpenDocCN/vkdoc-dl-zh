  ## 配方 2-2\. 变量张量


  ### 问题


  PyTorch 中的变量是什么？它是如何定义的？PyTorch 中的随机变量是什么？


  ### 解决方案


  在 PyTorch 中，算法被表示为计算图。变量被视为张量对象、对应梯度以及对其创建来源函数的引用的一个表示。为简单起见，梯度被视为函数的斜率。函数的斜率可以通过函数相对于函数中存在的参数的导数来计算。例如，在线性回归（`Y
  = W*X + alpha`）中，变量的表示形式将类似于图 2-2 所示。


  基本上，PyTorch 变量是计算图中的一个节点，它存储数据和梯度。在训练神经网络模型时，每次迭代后，我们需要计算损失函数相对于模型参数（如权重和偏置）的梯度。之后，我们通常使用梯度下降算法更新权重。图
  2-1 解释了在 PyTorch 框架中，线性回归方程是如何在底层通过神经网络模型部署的。


  在计算图结构中，任务的排序和顺序非常重要。图 2-2 中的一维张量是 `X`、`Y`、`W` 和 `alpha`。当我们实现反向传播以更新权重来匹配 `Y` 时，箭头的方向会改变，从而可以最小化
  `Y` 与预测 `Y` 之间的误差或损失函数。


  ![../images/474315_1_En_2_Chapter/474315_1_En_2_Fig1_HTML.png](img/474315_1_En_2_Fig1_HTML.png)


