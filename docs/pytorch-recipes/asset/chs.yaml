- '# 3. 使用 PyTorch 的 CNN 与 RNN


  概率与随机变量是 PyTorch 这类图计算平台中计算不可或缺的一部分。理解概率及其相关概念至关重要。本章涵盖概率分布及其使用 PyTorch 的实现，以及如何解读测试结果。在概率论与统计学中，随机变量也被称为*随机变量*，其取值完全取决于随机现象。概率分布有多种类型，包括正态分布、二项分布、多项分布和伯努利分布。每种统计分布都有其自身的特性。


  ## 配方 3-1. 设置损失函数


  ### 问题


  如何设置损失函数并对其进行优化？选择合适的损失函数能提高模型收敛的可能性。


  ### 解决方案


  在本配方中，我们使用另一个张量作为更新变量，将张量引入样本模型并计算误差或损失。然后，我们计算损失函数的变化率，以衡量损失函数的选择对模型收敛的影响。


  ### 工作原理


  在以下示例中，`t_c` 和 `t_u` 是两个张量。它们可以由任何 NumPy 数组构建。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figa_HTML.jpg](img/474315_1_En_3_Figa_HTML.jpg)


  该样本模型只是一个线性方程，用于进行计算，而损失函数则定义为均方误差（MSE），如下所示。在本章后续内容中，我们将增加模型的复杂度。目前，这只是一个简单的线性方程计算。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figb_HTML.jpg](img/474315_1_En_3_Figb_HTML.jpg)


  现在我们来定义模型。`w` 参数是权重张量，它与 `t_u` 张量相乘。结果加上一个常数张量 `b`，所选的损失函数是自定义的；该函数在 PyTorch 中也可用。在以下示例中，`t_u`
  是使用的张量，`t_p` 是预测张量，`t_c` 是预先计算好的张量，需要将预测张量与 `t_c` 进行比较以计算损失函数。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figc_HTML.jpg](img/474315_1_En_3_Figc_HTML.jpg)


  公式 `w * t_u + b` 是基于张量计算的线性方程表示。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figd_HTML.jpg](img/474315_1_En_3_Figd_HTML.jpg)


  初始损失值为 1763.88，由于初始选择的权重，这个值过高。第一轮迭代中的误差会通过反向传播来减少第二轮迭代中的误差，因此需要更新初始权重集。因此，损失函数的变化率对于在估计过程中更新权重至关重要。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Fige_HTML.jpg](img/474315_1_En_3_Fige_HTML.jpg)


  更新损失函数变化率有两个参数：当前迭代的学习率和前一次迭代的学习率。如果两次迭代之间的差值超过某个阈值，则需要更新权重张量，否则模型可能收敛。前面的脚本显示了差值和学习率的值。目前，这些是静态值，用户可以选择更改。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figf_HTML.jpg](img/474315_1_En_3_Figf_HTML.jpg)


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figg_HTML.jpg](img/474315_1_En_3_Figg_HTML.jpg)


  这就是一个简单的均方损失函数在二维张量示例（张量大小为 10,5）中的工作方式。


  让我们看下面的例子。`MSELoss` 函数位于 PyTorch 的神经网络模块中。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figh_HTML.jpg](img/474315_1_En_3_Figh_HTML.jpg)


  当我们查看用于反向传播的梯度计算时，它显示为 `MSELoss`。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figi_HTML.jpg](img/474315_1_En_3_Figi_HTML.jpg)


