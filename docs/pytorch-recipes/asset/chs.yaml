- "# PyTorch、张量及张量运算简介\n\n`PyTorch` 已发展成为一个用于编写动态模型的大型框架。正因如此，它在部署大规模深度学习框架的数据科学家和数据工程师中非常受欢迎。本书为专家在处理实际数据科学问题时的操作活动提供了结构化的指导。从我们日常使用的应用程序中可以明显看出，产品功能中嵌入了多层智能。这些功能旨在为用户提供更好的体验和更优质的服务。\n\
  \n世界正朝着人工智能的方向发展。人工智能包含两个主要组成部分：深度学习和机器学习。没有深度学习和机器学习，就无法想象人工智能的实现。\n\n`PyTorch`\
  \ 是用于在 GPU（图形处理单元）和 CPU（中央处理单元）上执行深度学习任务的最优化的高性能张量库。`PyTorch` 的主要目的是提升大规模计算环境中算法的性能。`PyTorch`\
  \ 是一个基于 Python 和 Facebook 人工智能研究团队提供的 Torch 工具的库，用于执行科学计算。\n\n在 GPU 上基于 `NumPy`\
  \ 的操作不足以高效处理繁重的计算任务。静态深度学习库成为提升计算灵活性和速度的瓶颈。从实践者的角度来看，`PyTorch` 张量与基于 Python 的 `NumPy`\
  \ 库中的 N 维数组非常相似。`PyTorch` 库提供了桥接选项，可以将 `NumPy` 数组转换为张量数组，反之亦然，从而使该库在不同的计算环境中具有灵活性。\n\
  \n其最常用的应用场景包括自然语言处理、图像处理、计算机视觉、社交媒体数据分析以及传感器数据处理。尽管 `PyTorch` 提供了大量的库和模块用于计算，但有三个模块尤为突出。\n\
  \n- `Autograd`。该模块提供了张量自动求导的功能。程序中的记录器类会记住操作，并通过名为 `backward` 的触发器检索这些操作以计算梯度。这在神经网络模型的实现中非常有用。\n\
  \n- `Optim`。该模块提供了可用于最小化特定模型误差函数的优化技术。目前，`PyTorch` 支持多种先进的优化方法，包括 Adam、随机梯度下降（SGD）等。\n\
  \n- `NN`。`NN` 代表*神经网络*模型。手动定义函数、层以及使用完整的张量运算进行进一步计算，很难记住和执行。我们需要能够自动化层、激活函数、损失函数和优化函数的函数，并提供用户定义的层，从而减少人工干预。`NN`\
  \ 模块包含一组内置函数，可以自动化运行张量运算的手动过程。\n\n应用人工智能的行业包括银行、金融服务、保险、医疗保健、制造业、零售、临床试验和药物测试。人工智能涉及对物体进行分类、识别物体以检测欺诈等。每个学习系统都需要三样东西：输入数据、处理和输出层。图\
  \ 1-1 解释了这三个主题之间的关系。如果任何学习系统通过从新示例或数据中学习而随着时间的推移提高性能，则称为*机器学习系统*。当机器学习系统变得过于复杂而难以反映现实时，就需要深度学习系统。\n\
  \n在深度学习系统中，会部署不止一层的学习算法。在机器学习中，我们考虑监督学习、无监督学习、半监督学习和强化学习系统。监督机器学习算法是指数据带有类别标签或结果标记的算法。我们向机器展示带有相应标签或标记的输入数据。机器通过一个函数来识别这种关系。请注意，这个函数将输入与标签或标记连接起来。\n\
  \n在无监督学习中，我们只向机器展示输入数据，并要求机器基于关联、相似性或差异性等对输入进行分组。\n\n在半监督学习中，我们向机器展示输入特征和标记数据或标签；然而，我们要求机器预测未标记的结果或标签。\n\
  \n在强化学习中，我们引入奖励和惩罚机制，其中每个正确的行为都会得到奖励，每个错误的行为都会受到惩罚。\n\n在所有这些机器学习算法的例子中，我们假设数据集很小，因为获取大量标记数据是一个挑战，而且机器学习算法处理大规模矩阵计算需要花费大量时间。由于机器学习算法无法扩展到大规模数据集，因此我们需要深度学习算法。\n\
  \n图 1-1 展示了人工智能、机器学习和深度学习之间的关系。自然语言是人工智能的重要组成部分。我们需要开发能够理解自然语言并向智能体提供响应的系统。以机器翻译为例，语言\
  \ 1（法语）中的句子可以转换为语言 2（英语），反之亦然。要开发这样的系统，我们需要大量的英法双语平行句。语料库的需求非常大，因为模型需要涵盖所有的语言细微差别。\n\
  \n![../images/474315_1_En_1_Chapter/474315_1_En_1_Fig1_HTML.png](img/474315_1_En_1_Fig1_HTML.png)\n\
  \n图 1-1：机器学习、深度学习与人工智能之间的关系\n\n经过预处理和特征创建后，你可以观察到需要计算数十万个特征才能产生输出。如果我们训练一个监督机器学习模型，运行并产生输出可能需要数月时间。为了实现此任务的可扩展性，我们需要深度学习算法，例如循环神经网络。这就是人工智能与深度学习和机器学习的联系。\n\
  \n部署深度学习模型面临着各种挑战，这些模型需要大量标记数据、更快的计算设备和智能算法。任何深度学习系统的成功都需要良好的标记数据和更好的计算设备，因为智能算法已经存在。\n\
  \n以下是需要实施深度学习的各种应用场景：\n\n- 语音识别\n- 视频分析\n- 视频异常检测\n- 自然语言处理\n- 机器翻译\n- 语音转文本转换\n\
  \n用于处理大规模数据的 NVIDIA GPU 计算的发展是另一项突破性创新。在 GPU 环境中运行所需的编程语言需要不同的编程框架。有两个主要框架非常流行用于实现图形计算：`TensorFlow`\
  \ 和 `PyTorch`。在本书中，我们将讨论 `PyTorch` 作为实现数据科学算法并进行推理的框架。\n\n用于图计算的主要框架包括 `PyTorch`、`TensorFlow`\
  \ 和 `MXNet`。`PyTorch` 和 `TensorFlow` 在神经计算方面相互竞争。`TensorFlow` 和 `PyTorch` 在性能方面同样出色；然而，真正的差异只有在对特定任务进行基准测试时才能知晓。在概念上存在某些差异。\n\
  \n\n\n在 TensorFlow 中，我们必须定义张量、初始化会话并为张量对象保留占位符；然而，在 PyTorch 中我们不需要执行这些操作。\n\n在 TensorFlow\
  \ 中，以情感分析为例。输入句子被标记为正面或负面标签。如果输入句子的长度不相等，那么我们设置最大句子长度并添加零以使其他句子的长度相等，以便循环神经网络能够运行；然而，这是\
  \ PyTorch 中的内置功能，因此我们不必定义句子的长度。\n\n在 PyTorch 中，调试更加容易和简单，但在 TensorFlow 中这是一项困难的任务。\n\
  \n在数据可视化方面，模型部署在 TensorFlow 中绝对更好；然而，PyTorch 正在发展，我们期望最终能在未来看到相同的功能。\n\nTensorFlow\
  \ 无疑经历了许多变化才达到稳定状态。PyTorch 刚刚进入游戏，因此需要一些时间才能充分发挥该工具的潜力。\n\n## 什么是 PyTorch？\n\nPyTorch\
  \ 是由 Facebook 的人工智能部门开发的机器学习和深度学习工具，用于处理大规模图像分析，包括对象检测、分割和分类。然而，它并不仅限于这些任务。它可以与其他框架一起使用来实现复杂的算法。它是使用\
  \ Python 和 C++ 语言编写的。为了在 GPU 环境中处理大规模计算，编程语言应相应地进行修改。PyTorch 提供了一个很好的框架来编写自动在 GPU\
  \ 环境中运行的函数。\n\n## PyTorch 安装\n\n安装 PyTorch 非常简单。在 Windows、Linux 或 macOS 中，如果您熟悉用于管理包的\
  \ Anaconda 和 Conda 环境，则安装非常简单。以下步骤描述了如何在 Windows/macOS/Linux 环境中安装 PyTorch。\n\n\
  1.  打开 Anaconda 导航器并转到环境页面，如图 1-2 中的截图所示。\n\n    ![../images/474315_1_En_1_Chapter/474315_1_En_1_Fig2_HTML.jpg](img/474315_1_En_1_Fig2_HTML.jpg)\n\
  \n    图 1-2\n\n    ML、DL 和 AI 之间的关系\n\n2.  打开终端并输入以下内容：\n\n    ```\n    conda install\
  \ -c peterjc123 pytorch\n    ```\n\n3.  启动 Jupyter 并打开 IPython Notebook。\n\n4. \
  \ 输入以下命令以检查 PyTorch 是否已安装。\n\n5.  检查 PyTorch 的版本。\n\n```\nfrom __future__ import\
  \ print_function\nimport torch\n```\n\n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figa_HTML.jpg](img/474315_1_En_1_Figa_HTML.jpg)\n\
  \n此安装过程是在 Microsoft Windows 机器上完成的。该过程可能因操作系统而异，因此对于安装和错误相关的任何问题，请使用以下 URL。\n\n\
  有两种安装方式：`Conda`（`Anaconda`）库管理或 `Pip3` 包管理框架。此外，本地系统（如 macOS、Windows 或 Linux）和云机器（如\
  \ Microsoft Azure、AWS 和 GCP）的安装是不同的。要根据您的平台进行设置，请遵循 [`https://PyTorch.org/get-started/cloud-partners/`](https://pytorch.org/get-started/cloud-partners/)\
  \ 上的官方 PyTorch 安装文档。\n\nPyTorch 有各种组件。\n\n*   `Torch` 具有类似于 `NumPy` 的功能，并支持 GPU。\n\
  *   `Autograd` 的 `torch.autograd` 提供了用于实现任意标量值函数自动微分的类、方法和函数。它需要对现有代码进行最少的更改。您只需要声明\
  \ `class:'Tensor'`，对于这些张量，应使用 `requires_grad=True` 关键字计算梯度。\n*   `NN` 是 PyTorch\
  \ 中的神经网络库。\n*   `Optim` 提供了用于函数最小化和最大化的优化算法。\n*   `Multiprocessing` 是一个用于多个张量之间内存共享的有用库。\n\
  *   `Utils` 具有加载数据的实用函数；它还具有其他函数。\n\n现在我们准备继续本章的内容。\n\n## 配方 1-1：使用张量\n\n### 问题\n\
  \nPyTorch 中使用的数据结构是基于图和基于张量的，因此，理解基本操作和定义张量非常重要。\n\n### 解决方案\n\n这个问题的解决方案是练习张量及其操作，其中包括许多使用各种操作的示例。虽然假设用户熟悉\
  \ PyTorch 和 Python 基础知识，但复习 PyTorch 对于激发新用户的兴趣至关重要。\n\n\n\n### 工作原理\n\n让我们来看几个张量及张量运算基础的示例，包括数学运算。\n\
  \n`x` 对象是一个列表。我们可以使用以下语法来检查 Python 中的某个对象是否为张量对象。通常，`is_tensor` 函数用于检查，而 `is_storage`\
  \ 函数则用于检查该对象是否以张量对象的形式存储。\n\n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figb_HTML.jpg](img/474315_1_En_1_Figb_HTML.jpg)\n\
  \n现在，让我们创建一个包含来自 Torch 的随机数的对象，类似于 NumPy 库。我们可以检查张量和存储类型。\n\n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figc_HTML.jpg](img/474315_1_En_1_Figc_HTML.jpg)\n\
  \n`y` 对象是一个张量，但它并未被存储。要检查输入张量对象中的元素总数，可以使用数值元素函数。以下脚本是另一个示例，演示如何在二维张量中创建零值并计算其中的数值元素。\n\
  \n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figd_HTML.jpg](img/474315_1_En_1_Figd_HTML.jpg)\n\
  \n与 NumPy 运算类似，`eye` 函数用于创建一个对角矩阵，其对角线元素为 1，非对角线元素为 0。可以通过提供形状选项来操作 `eye` 函数。以下示例展示了如何提供形状参数。\n\
  \n![../images/474315_1_En_1_Chapter/474315_1_En_1_Fige_HTML.jpg](img/474315_1_En_1_Fige_HTML.jpg)\n\
  \n可以使用张量运算创建线性空间以及线性空间中的点。让我们用一个示例来演示，在一个从值 2 开始到 10 结束的线性空间中创建 25 个点。Torch 可以从\
  \ NumPy 数组格式中读取数据。\n\n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figf_HTML.jpg](img/474315_1_En_1_Figf_HTML.jpg)\n\
  \n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figg_HTML.jpg](img/474315_1_En_1_Figg_HTML.jpg)\n\
  \n与线性间隔类似，也可以创建对数间隔。\n\n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figh_HTML.jpg](img/474315_1_En_1_Figh_HTML.jpg)\n\
  \n随机数生成是数据科学中一个常见的过程，用于在空间中生成或收集样本数据点，以模拟数据中的结构。随机数可以从统计分布、任意两个值或预定义的分布中生成。与 NumPy\
  \ 函数类似，可以使用以下示例生成随机数。均匀分布被定义为每个结果出现概率相等的分布；因此，事件概率是恒定的。\n\n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figi_HTML.jpg](img/474315_1_En_1_Figi_HTML.jpg)\n\
  \n以下脚本展示了如何从 0 和 1 这两个值中选择随机数。结果张量可以重塑以创建一个 (4,5) 矩阵。也可以创建来自算术平均值为 0、标准差为 1 的正态分布的随机数，如下所示。\n\
  \n![../images/474315_1_En_1_Chapter/474315_1_En_1_Figj_HTML.jpg](img/474315_1_En_1_Figj_HTML.jpg)\n\
