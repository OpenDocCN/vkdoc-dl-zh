  ## 配方 7-2\. PyTorch 中的 CBOW 模型


  ### 问题


  如何使用 `PyTorch` 创建一个 CBOW 模型？


  ### 解决方案


  有两种不同的方法可以将单词和短语表示为向量：*连续词袋*（CBOW）和 *跳字模型*。词袋方法通过预测上下文中的单词或短语来学习嵌入向量。上下文指的是当前单词前后的单词。如果我们取一个大小为
  4 的上下文，这意味着当前单词左边的四个单词和右边的四个单词都被视为上下文。模型尝试在另一个句子中找到这八个单词来预测当前单词。


  ### 工作原理


  让我们看下面的例子。


