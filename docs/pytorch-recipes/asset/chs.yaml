  `set_weight()` 函数初始化神经网络模型在前向传播中将使用的随机权重。我们需要两个张量：权重和偏置。`build_network()` 函数简单地将权重与输入相乘，加上偏置，并生成预测值。这是我们构建的自定义函数。如果我们需要在
  `PyTorch` 中实现同样的功能，那么当我们需要将其用于线性回归时，使用 `nn.Linear()` 会简单得多。


