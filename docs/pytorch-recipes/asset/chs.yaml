  ## 配方 3-7\. 重新加载模型


  ### 问题


  如何存储并重新加载一个已经训练好的模型？鉴于深度学习模型通常需要较长的训练时间，这一计算过程会给公司带来巨大的成本。我们能否用新的输入重新训练模型并存储它？


  ### 解决方案


  在生产环境中，我们通常无法同时进行训练和预测，因为训练过程耗时很长。在基于周期的训练过程完成之前，无法应用预测服务。因此，需要将训练过程与预测过程分离；我们需要存储应用程序训练好的模型，并持续到下一阶段的训练完成。


  ### 工作原理


  让我们看下面的示例，我们创建了保存函数，该函数使用 `Torch` 神经网络模块来创建模型，并使用 `restore_net()` 函数来恢复之前训练好的神经网络模型。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbl_HTML.jpg](img/474315_1_En_3_Figbl_HTML.jpg)


  上述脚本包含一个因变量 `Y` 和一个自变量 `X` 作为样本数据点，用于创建神经网络模型。下面的 `save` 函数用于存储模型。`net1` 对象是训练好的神经网络模型，可以通过两种不同的协议进行存储：(1)
  保存包含所有权重和偏置的整个神经网络模型，(2) 仅使用权重保存模型。如果训练好的模型对象在大小上非常庞大，我们应该只保存权重参数；如果训练好的对象大小较小，则可以存储整个模型。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbm_HTML.jpg](img/474315_1_En_3_Figbm_HTML.jpg)


  预构建的神经网络模型可以通过使用 `load` 函数重新加载到现有的 `PyTorch` 会话中。为了测试 `net1` 对象并进行预测，我们加载 `net1`
  对象并将模型存储为 `net2`。通过使用 `net2` 对象，我们可以预测结果变量。以下脚本生成一个包含因变量和自变量的图。代码最后一行的 `prediction.data.numpy()`
  显示了预测结果。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbn_HTML.jpg](img/474315_1_En_3_Figbn_HTML.jpg)


  加载整个神经网络的 pickle 文件格式相对较慢；然而，如果我们只是对新数据集进行预测，我们可以仅以 pickle 格式加载模型的参数，而不是整个网络。


  ![../images/474315_1_En_3_Chapter/474315_1_En_3_Figbo_HTML.jpg](img/474315_1_En_3_Figbo_HTML.jpg)


  重用模型。`restore` 函数确保训练好的参数可以被模型重用。要恢复模型，我们可以使用 `load_state_dict()` 函数来加载模型的参数。如果我们在图中看到以下三个模型，它们是相同的，因为
