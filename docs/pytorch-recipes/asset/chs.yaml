  ![../images/474315_1_En_2_Chapter/474315_1_En_2_Figd_HTML.jpg](img/474315_1_En_2_Figd_HTML.jpg)


  从多项分布中进行有放回抽样会返回张量的索引值。


  ![../images/474315_1_En_2_Chapter/474315_1_En_2_Fige_HTML.jpg](img/474315_1_En_2_Fige_HTML.jpg)


