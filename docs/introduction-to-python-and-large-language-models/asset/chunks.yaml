- fmt: '# Your First Python Program


    You have the choice of using a simple code editor known as IDLE or an integrated
    development environment (IDE), which is part of the Python installation package.
    There are various ways to run Python interactively. You can opt for the system’s
    Console, the Python IDLE (Figure [3-4](#613844_1_En_3_Chapter.xhtml#Fig4)), or
    the Python Shell, all of which are included in the standard Python installation
    available at [`www.python.org`](http://www.python.org).


    To write your first program, open it and type the following line of code, then
    hit Enter:


    ```

    print("Hello, from IDLE!")

    ```


    You can activate the Python interpreter by opening your operating system’s terminal
    application and typing `python3`. This command will launch the Python interpreter
    in your terminal, allowing you to interact with Python directly from the command
    line.


    Python offers versatility in its usage, allowing you to utilize it in two primary
    modes: interactive mode and scripting mode. The Python program you’ve installed
    inherently functions as an interpreter. An interpreter processes text commands
    and executes them as you input them, making it particularly convenient for experimentation
    and rapid testing.


    # Variables and Data Types, Numbers, Strings, and Casting


    Variables serve as labels for data that we want to store and manipulate within
    our programs. Let’s consider an example: suppose your program must retain a user’s
    name. To achieve this, we can create a variable named `user_name` and initialize
    it using the following statement:


    ```

    user_name = "John"

    ```


    Once you’ve defined the `user_name` variable, your program will allocate a specific
    portion of your computer’s memory to hold this data. You can subsequently access
    and modify this data by referring to it with its age, `user_age`. When introducing
    a new variable, you must provide it with an initial value. In this instance, we’ve
    assigned it the value `John`. It’s important to note that you can always alter
    this value within your program later on.


    Moreover, you can define multiple variables in a single step. To do this, simply
    write:


    ```

    use_rage, user_name = 30, ''Peter''

    ```


    ## Naming a Variable


    In Python, variable names must adhere to certain rules and conventions:


    1. Variable names can contain letters (both lowercase and uppercase), numbers,
    and underscores (`_`). However, they must begin with a letter or underscore, and
    the first character cannot be a number. For example, valid variable names are
    `userName`, `user_name`, or `userName2`, but `2userName` is not allowed.


    2. Certain words are reserved in Python because they already have predefined meanings
    within the language. These reserved words include terms like `print`, `input`,
    `if`, `while`, and all others previously mentioned as reserved keywords. You cannot
    use these reserved words as variable names. We’ll explore these reserved words
    in greater detail in subsequent chapters.


    3. Variable names in Python are case-sensitive. This means that `username` and
    `userName` are considered distinct variables.


    When it comes to naming variables in Python, there are two common conventions
    to follow:


    - **Camel Case Notation:** This practice involves writing compound words with
    mixed casing, where each word begins with a capital letter except the first one.
    For example, `thisIsAVariableName`. This convention will be used throughout the
    remainder of this book.


    - **Underscore Separation:** An alternative convention is to use underscores (`_`)
    to separate words in variable names. For those who prefer this style, you can
    name your variables like `this_is_a_variable_name`.


    - **Pascal Case:** Identical to Camel Case, except the first word is also capitalized.
    Example: `NumberOfUsers`.


    Ultimately, adhering to these rules and conventions ensures that your variable
    names are both valid and readable within the Python programming language.


    Using underscores to separate words in variable names, also known as snake_case,
    is more widely used as the naming convention for Python variables. This convention
    is recommended by the official Python style guide, PEP 8, which is widely followed
    by the Python community. Snake_case is considered more Pythonic and is the preferred
    style for variable names in most Python projects and libraries.


    # Data Types


    ## Numbers in Python


    There are three numeric types in Python:


    - `int`

    - `float`

    - `complex`


    ```

    x = 10  # int

    y = 2.8 # float

    z = 3 + 2j # complex

    ```


    ### Integers


    Integers represent whole numbers, whether positive or negative, without any decimal
    component. For instance, in the field of neuroscience, researchers might use integers
    to tally the count of active neurons at a specific moment.


    ### Floats


    Floats, also known as floating-point real values, encompass real numbers that
    can include decimal points. For instance, recording a participant’s reaction time
    in milliseconds for a specific task would involve using floating-point numbers.


    ### Complex


    In Python, complex numbers are a built-in data type used to represent numbers
    in the form `a + bj`, where `a` and `b` are real numbers and `j` represents the
    imaginary unit, equal to the square root of -1. Complex numbers are often used
    in mathematical and scientific computations where real and imaginary parts need
    to be handled simultaneously.


    You can perform various operations on complex numbers in Python, including addition,
    subtraction, multiplication, division, and more. Python’s standard library provides
    functions and methods for working with complex numbers.


    **Note**


    Numeric Variables


    They are automatically generated when you assign values to them, making it straightforward
    in regular coding. Therefore, you can assign values to variables without concerning
    yourself with specifying their data type.


    ### Strings


    A string is a collection of characters, which can include letters, numbers, symbols,
    or spaces, enclosed within either single or double quotation marks in Python.
    It’s important to note that strings in Python are immutable, which means once
    a string is created, you cannot modify its contents directly; instead, you can
    only overwrite it by redefining the variable.


    ```

    >>> a = "Hello World!"

    >>> print(a)

    >>> Hello World!

    ```


    You can display strings on the screen using the `print` function. In Python, strings
    are sequences of bytes, and you can access a specific character within a string
    using indexing or in Python called slicing, as demonstrated in the code example:


    ```

    >>> a = "Hello World!"

    >>> print(a[0:2])

    >>> He

    ```


    Note that the last character, when slicing a string, is exclusive!


    There are many built-in functions for manipulating strings in Python; part of
    them is as follows:


    - `split()`: Which splits the string by a character or empty space and makes it
    a list

    - `replace()`: To replace one character in the string with another one

    - `upper()`: To make all characters of the string uppercase

    - `lower()`: To make all characters of the string lowercase

    - `len()`: To get the length of the string'
