    *   任意字面量字符串类型

    *   负零格式化

    *   改进的类型变量

    *   可变参数泛型


    #### 任意字面量字符串类型


    为了解决这个限制，Python 3.11 引入了一个新的通用类型 `LiteralString`，它允许用户输入任何字符串字面量，如下所示：


    ```

