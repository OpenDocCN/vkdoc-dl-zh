- fmt: '# Markov, Shannon, and the Language Models


    The inception of language models traces back to the contributions of **Andrey
    Markov**^([¹](#fn1)) **and Claude Shannon**^([²](#fn2)) in the early and mid-20th
    century, respectively. Markov laid the mathematical groundwork for what we now
    recognize as n-grams. Intriguingly, the concept of n-grams was first proposed
    in Markov’s earlier works. Andrey Markov stands out as one of the earliest scientists
    to delve into the study of language models, even though the term “language model”
    had yet to be coined during that period.


    Consider the conditional probability denoted as `p(w1|w0) = p(w1)`. Various language
    models employ distinct approaches to compute conditional probabilities, denoted
    as `p(wi|w1, w2, ..., wi-1)`. The procedure of acquiring and applying a language
    model is known as **language modeling**. An n-gram model serves as a fundamental
    type of model, assuming that the word at any given position is solely influenced
    by the words at the preceding `n – 1` positions. In essence, the model operates
    as an **n – 1-order Markov chain**.


    In 1906, Markov delved into the study of Markov chains, initially exploring a
    straightforward model with only two states and corresponding transition probabilities
    between them. He demonstrated that by traversing between these states based on
    the transition probabilities, the frequencies of transitioning to each state would
    ultimately converge to the expected values. Over subsequent years, Markov expanded
    the model and established that this conclusion held true in more generalized contexts.


    Illustrating his model’s practicality, Markov applied it to Alexander Pushkin’s
    verse novel, “Eugene Onegin” in 1913. Through the removal of spaces and punctuation
    marks and the categorization of the first 20,000 Russian letters into vowels and
    consonants, Markov derived a sequence representing the novel’s vowel and consonant
    distribution. Utilizing manual counting methods, Markov calculated the transition
    probabilities between vowels and consonants, using the resulting data to verify
    the characteristics of the simplest Markov chain.


    It is intriguing that the initial application area of the Markov chain was in
    language, with Markov’s study serving as a foundational exploration into the **simplest
    form of a language model**.


    Moving forward in the mid-20th century, **Claude Shannon** suggested the utilization
    of Markov processes to model natural language. Employing n-th order Markov chains,
    he developed a statistical model capable of characterizing the probability of
    sequences of letters, encompassing words and sentences. From a mathematical perspective,
    Shannon’s approach involved counting the frequency of character sequences of length
    n, referred to as n-grams.


    In 1948, Claude Shannon revolutionized the field of information theory with his
    seminal paper, “The Mathematical Theory of Communication.” This work marked the
    inception of key concepts such as entropy and cross-entropy, as well as an exploration
    of the n-gram model. (Shannon adopted the term “entropy” from statistical mechanics
    following advice from John von Neumann.)


    Entropy, in this context, signifies the uncertainty inherent in a probability
    distribution, while cross-entropy encapsulates the uncertainty of one probability
    distribution concerning another. Notably, entropy serves as a lower bound for
    cross-entropy. To elaborate, as the length of a word sequence tends toward infinity,
    the language’s entropy can be defined, assuming a constant value that can be estimated
    from the language’s data.


    Shannon’s contribution establishes a valuable tool for evaluating language models.
    If one language model demonstrates superior accuracy in predicting word sequences
    compared to another, it will exhibit lower cross-entropy. This insight provides
    a robust framework for assessing language modeling. It is essential to recognize
    that language models extend beyond natural languages to encompass formal and semi-formal
    languages.


    The pioneering works of Markov and Shannon paved the way for diverse approaches
    to language modeling, encompassing rule-based systems, neural network`–`based
    systems, and more recently, **transformer-based pre-trained large language models**
    (LLMs) founded on attention mechanisms.


    ## Chomsky and the Language Models


    In 1956, Noam Chomsky^([³](#fn3)) introduced the **Chomsky hierarchy of grammars**,
    a framework aimed at representing the **syntax of languages**. Chomsky emphasized
    the limitations of finite-state grammars, including n-gram models, in adequately
    describing natural languages.


    Chomsky’s theory posits that a language comprises a finite or infinite collection
    of sentences, where each sentence is a finite sequence of words drawn from a finite
    vocabulary. A grammar, according to Chomsky, is defined by a set of production
    rules capable of generating all sentences within the language. Different grammars
    yield languages of varying complexities, forming a **hierarchical structure**.


    A grammar that can generate sentences acceptable by a finite-state machine is
    termed a finite-state grammar or regular grammar, whereas a grammar capable of
    producing sentences acceptable by a nondeterministic pushdown automaton is labeled
    a context-free grammar. Finite-state grammars are encompassed by context-free
    grammars.


    The grammar underlying a finite Markov chain or an n-gram model aligns with a
    finite-state grammar. However, finite-state grammars face limitations in generating
    English sentences with grammatical relationships, such as those depicted in (i)
    and (ii).


    *   If S1, then S2.

    *   Either S3 or S4.

    *   Either if S5, then S6, or if S7, then S8.


    While these relations can theoretically be combined indefinitely to create correct
    English expressions (as in example iii), finite-state grammars cannot account
    for all such combinations. Chomsky argued that there are significant constraints
    in describing languages, including n-gram models, with finite-state grammars.
    Instead, he advocated for the more effective modeling of languages using context-free
    grammars. This influence led to the increased adoption of context-free grammars
    in natural language processing (NLP) over the subsequent decades. Although Chomsky’s
    theory may not wield significant influence in contemporary NLP, it retains important
    scientific value.


    ## Rule-Based Language Models


    This section provides an overview of the first chatbot, ELIZA, created in 1966
    by Joseph Weizenbaum. ELIZA’s rule-based approach to dialogue simulation marked
    a significant milestone, although it lacked genuine comprehension of language
    nuances. This era saw a focus on rule-based chatbot programs, which led to the
    creation of several similar systems, including PARRY, ALICE, and CLEVER.'
