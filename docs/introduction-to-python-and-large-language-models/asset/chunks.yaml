- fmt: '### Vector Space Models and State Space Models


    Notably, the bag-of-words (BOW) model is considered a basic word embedding technique,
    correlating words to vectors. However, the widespread adoption of embedding words
    in vector spaces saw significant advancements, particularly with breakthroughs
    in the early 2000s and later with `Word2Vec`^([⁸](#fn8)) and `GloVe` in 2013 and
    2014, respectively. Word embedding techniques have become integral to language
    modeling, extensively employed by various other models.


    Vector space models and state space models are fundamental concepts in language
    modeling. Vector space models involve algebraic approaches for representing language
    elements as vectors embedded in specific vector spaces.


    A vector space comprises vectors, numerical representations of words, sentences,
    and even documents. While basic vectors, such as map coordinates, have only two
    dimensions, those employed in natural language processing can encompass thousands.


    The concept of representing words as vectors, often known as word embedding or
    word vectorization, has been present since the 1980s.^([⁹](#fn9)) This simplifies
    the assessment of similarity between words or the relevance of a search query
    to a document. Cosine similarity is commonly applied to gauge the similarity between
    vectors. Utilizing linear algebra with nonbinary term weights, the vector space
    model enables the computation of the continuous degree of similarity between two
    objects, such as a query and documents, facilitating partial matching.


    **Note**


    **State Space Models**


    *Although vector space models have been thoroughly examined and utilized in natural
    language processing (NLP), there has been a recent surge of interest in state
    space models within the NLP domain. Despite this, state space models have already
    demonstrated their value in sequence modeling across various domains, including
    signal processing and control theory. Acknowledging the effectiveness of state
    space models in managing lengthy sequences, these models offer promising possibilities
    for crafting innovative architectures in language modeling and refining existing
    techniques.*


    ### Neural Language Models – The Rise of LLMs


    In 2001, Yoshua Bengio and colleagues introduced one of the earliest neural language
    models, marking the onset of a new era in language modeling. It’s noteworthy that
    Bengio,^([^(10)](#fn10)) Geoffrey Hinton, and Yann LeCun were honored with the
    2018 ACM A.M. Turing Award for their groundbreaking contributions, widely recognized
    for making deep neural networks a vital component of computing.


    The conventional n-gram model exhibits limitations in its learning capacity. The
    customary approach involves estimating conditional probabilities, `p(wi|wi-n+1,
    wi-n+2, ···, wi-1)`, from the corpus using a smoothing method. However, as the
    value of `n` increases, the model’s parameters grow exponentially at `O(V^n)`,
    where `V` represents the vocabulary size. This exponential growth, coupled with
    the sparsity of training data, hinders the accurate learning of model parameters.


    Bengio et al.’s neural language model enhances the n-gram model through two key
    advancements. Firstly, it incorporates a real-valued vector known as word embedding
    to represent individual words or word combinations. Compared to the “one-hot vector”
    representation of a word, where the corresponding element is one and others are
    zero, word embedding has significantly lower dimensionality.


    Functioning as a form of “distributed representation,” word embedding offers enhanced
    efficiency, generalization ability, robustness, and extensibility compared to
    the one-hot vector. Secondly, the language model is structured as a neural network,
    leading to a substantial reduction in the number of parameters within the model.


    Artificial neural networks (ANNs) have emerged as a widely adopted approach in
    natural language processing and the development of various machine learning and
    artificial intelligence models.


    Following the contributions of Bengio and colleagues, a plethora of techniques
    for word embedding and neural language modeling have emerged, introducing enhancements
    from various angles.


    The late 2000s witnessed a pivotal shift marked by a renewed fascination with
    neural networks, especially the emergence of deep learning techniques. The utilization
    of recurrent neural networks (RNNs) and Long Short-Term Memory (LSTM) networks^([^(11)](#fn11))
    for processing sequential data played a crucial role in advancing language understanding
    and generation. This transformative period saw notable applications, particularly
    in machine translation. Google’s introduction of the “Neural Machine Translation”
    system in 2016 exemplified this progress, outperforming traditional methods by
    leveraging deep learning techniques for language translation.


    A notable milestone during this era was the unveiling of the `Word2Vec` model
    in 2013 by Tomas Mikolov and his team at Google. This model revolutionized language
    representation by learning distributed word representations based on their contextual
    usage within extensive text datasets. The `Word2Vec` model laid the groundwork
    for capturing semantic relationships between words, elevating language understanding
    beyond mere statistical associations.


    #### Recurrent Neural Networks


    Recurrent neural networks (RNNs) (Figure [1-2](#613844_1_En_1_Chapter.xhtml#Fig2))
    represent a pivotal advancement in language models following basic statistical
    and rule-based models. Originating in the 1980s, RNNs have played a significant
    role in processing sequential and time series data. While contributing to language
    model progress, RNNs face challenges in handling long-term dependencies,^([^(12)](#fn12))
    such as the issues of vanishing gradient and exploding gradient. Researchers have
    sought improved solutions to address these limitations and enhance the capability
    of processing lengthy sequences.


    A crucial aspect within the realm of recurrent neural networks (RNNs) is the concept
    of intermediate representations or states. The interdependence among words is
    mirrored by the relationships between states in the RNN model. While the model’s
    parameters are shared across different positions, the resulting representations
    differ based on their respective positions.


    ![](images/613844_1_En_1_Chapter/613844_1_En_1_Fig2_HTML.jpg)


    **Figure 1-2** Basic architecture of the layers of RNN


    In the RNNs at each position, there exists an intermediate representation for
    each layer, embodying the “state” of the word sequence up to that point. The intermediate
    representation for the current layer at the current position is determined by
    the intermediate representation of the same layer at the previous position and
    the intermediate representation of the layer beneath at the current position.
    The ultimate intermediate representation at the current position plays a pivotal
    role in computing the probability of the next word.'
