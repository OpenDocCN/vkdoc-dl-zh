- fmt: '#### Crawling the Articles Provided by the User


    To initiate the process, let’s gather some articles concerning AI news. Our focus
    lies in retrieving the textual content of each article along with its corresponding
    publication URL.


    Within the code, you''ll encounter the following components:


    1.  **Imports:** We commence by importing essential Python libraries. `requests`
    facilitates sending HTTP requests, `newspaper` proves invaluable for extracting
    and organizing articles from web pages, and `time` aids in incorporating pauses
    during our web scraping endeavor.


    2.  **Headers:** Certain websites may block requests lacking a proper `User-Agent`
    header, perceiving them as bot activity. Hence, we define a `User-Agent` string
    to emulate a genuine browser request.


    3.  **Article URLs:** A compilation of URLs for online articles.


    4.  **Web Scraping:** Establishing an HTTP session via `requests.Session()` enables
    us to execute multiple requests within the same session. Additionally, we initialize
    an empty list, `pages_content`, designated for storing our scraped articles.


    ```python

    import requests

    from newspaper import Article # https://github.com/codelucas/newspaper

    import time

    headers = {

    ''User-Agent'': ''Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
    (KHTML, like Gecko) Chrome/89.0.4389.82 Safari/537.36''

    }

    article_urls = [

    "https://www.site.com/2023/05/16/page-one/",

    "https://www.site.com/2023/05/16/page-two/",

    "https://www.site.com/2023/05/16/page-three/",

    Add Your URLs…

    ]

    session = requests.Session()

    pages_content = [] # where we save the scraped articles

    for url in article_urls:

    try:

    time.sleep(2) # sleep two seconds for gentle scraping

    response = session.get(url, headers=headers, timeout=10)

    if response.status_code == 200:

    article = Article(url)

    article.download()

    article.parse()

    pages_content.append({ "url": url, "text": article.text })

    else:

    print(f"Failed to fetch article at {url}")

    except Exception as e:

    print(f"Error occurred while fetching article at {url}: {e}")

    ```


    Following this, we’ll proceed to compute the embeddings of our documents utilizing
    an embedding model and preserve them within Deep Lake, a database capable of handling
    multimodal vectors. `OpenAIEmbeddings` will serve as the tool for generating vector
    representations of our documents.


    These embeddings consist of high-dimensional vectors adept at encapsulating the
    semantic essence of the documents. Upon initializing an instance of the Deep Lake
    class, we furnish a path commencing with `hub://...` delineating the database
    name, which will subsequently be housed on the cloud.


    ```python

    from langchain.embeddings.openai import OpenAIEmbeddings

    from langchain.vectorstores import DeepLake

    embeddings = OpenAIEmbeddings(model="text-embedding-ada-002")

    my_activeloop_org_id = "Your Organization ID - Usually Your Username"

    my_activeloop_dataset_name = "qabot_with_source"

    dataset_path = f"hub://{my_activeloop_org_id}/{my_activeloop_dataset_name}"

    db = DeepLake(dataset_path=dataset_path, embedding=embeddings)

    ```


    This segment is pivotal in configuring the system to handle the storage and retrieval
    of documents based on their semantic content. Such functionality stands as a linchpin
    for subsequent stages, where the objective is to pinpoint the most pertinent documents
    to address user queries.


    Subsequently, we’ll dissect these articles into smaller segments, with each segment’s
    corresponding URL being preserved as a point of reference. This segmentation aids
    in streamlining data processing, rendering the retrieval task more manageable,
    and directing attention toward the most pertinent text fragments when responding
    to inquiries.


    The `RecursiveCharacterTextSplitter` is instantiated with a chunk size of 1000
    characters and an overlap of 100 characters between adjacent chunks. The `chunk_size`
    parameter delineates the length of each text segment, while `chunk_overlap` specifies
    the number of characters shared between adjacent segments. For every document
    within `pages_content`, the text undergoes segmentation using the `.split_text()`
    method.


    ```python

    from langchain.text_splitter import RecursiveCharacterTextSplitter

    text_splitter = RecursiveCharacterTextSplitter(chunk_size=1000, chunk_overlap=100)

    all_texts, all_metadatas = [], []

    for d in pages_content:

    chunks = text_splitter.split_text(d["text"])

    for chunk in chunks:

    all_texts.append(chunk)

    all_metadatas.append({ "source": d["url"] })

    ```


    In the metadata dictionary, we utilize the `source` key to conform with the expectations
    of the `RetrievalQAWithSourcesChain` class, which autonomously retrieves this
    `source` item from the metadata. Subsequently, we incorporate these segmented
    chunks into our Deep Lake database alongside their corresponding metadata.


    ```python

