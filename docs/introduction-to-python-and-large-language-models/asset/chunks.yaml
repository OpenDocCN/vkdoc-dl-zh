- fmt: "# Conditionals and Loops\n\nConditionals and loops are fundamental constructs\
    \ in programming that enable developers to create dynamic, efficient, and responsive\
    \ applications. Conditionals, also known as decision-making statements, allow\
    \ a program to execute different actions based on specific criteria. By evaluating\
    \ boolean expressions, conditionals such as `if`, `else if`, and `else` statements\
    \ determine the flow of execution, making programs adaptable to varying inputs\
    \ and conditions.\n\nLoops, on the other hand, are iterative control structures\
    \ that repeat a block of code as long as a given condition is true. Common types\
    \ of loops include `for` and `while` loops. These constructs are crucial for tasks\
    \ that require repetitive actions, such as processing elements in an array, handling\
    \ user input until a valid response is received, or performing complex calculations\
    \ iteratively. By leveraging conditionals and loops, programmers can design robust\
    \ and flexible code, capable of handling a wide range of scenarios and improving\
    \ overall program efficiency.\n\n## Conditionals\n\nIn the examples up to this\
    \ point, you’ve accumulated a substantial amount of Python programming knowledge,\
    \ focusing on code that executes in a linear sequence. This means each command\
    \ is processed one after the other, in the precise sequence they are laid out.\n\
    \nHowever, real-world scenarios often demand more flexibility. Programs may need\
    \ to bypass certain instructions, repeatedly execute a block of statements, or\
    \ choose from among different sets of instructions depending on various conditions.\n\
    \nThis is where the concept of **control structures** becomes crucial. Control\
    \ structures are instrumental in guiding the flow of execution within a program,\
    \ also known as its **control flow**.\n\nWithin the context of Python, the `if`\
    \ statement is the fundamental mechanism for making decisions. It enables the\
    \ conditional execution of a single statement or a collection of statements, contingent\
    \ on the evaluation of an expression.\n\n**Example:**\n\n```\nif <expr>:\n   \
    \ <statement>\n```\n\n**In this code snippet:**\n\n*   `\"<expr>\"` represents\
    \ an expression that Python evaluates to determine its truth value, a concept\
    \ elaborated upon in the discussion about logical operators within the Python\
    \ Operators and Expressions tutorial.\n\n*   `\"<statement>\"` refers to any valid\
    \ line of Python code that follows an indentation rule.\n\n*   When `<expr>` yields\
    \ a truthy outcome (meaning Python interprets it as true), then `<statement>`\
    \ is carried out. Conversely, if `<expr>` results in a falsy value (interpreted\
    \ as false), then `<statement>` is bypassed and remains unexecuted.\n\n*   It’s\
    \ important to note the necessity of the **colon (`:`) after `<expr>`**. Unlike\
    \ some languages that mandate the encapsulation of `<expr>` within parentheses,\
    \ Python has no such requirement.\n\n**Example:**\n\n```\n>>> x = 0\n>>> y = 5\n\
    >>> if x < y:   # Truthy\n...     print('yes')\nyes\n```\n\n### Grouping Statements\n\
    \nAs mentioned earlier in this chapter, Python employs a programming principle\
    \ known as the off-side rule. This rule is characterized using indentation to\
    \ demarcate blocks of code. Python belongs to a relatively exclusive group of\
    \ languages that implement the off-side rule.\n\nThe role of indentation is not\
    \ merely stylistic but **carries functional significance in Python code**. The\
    \ reason behind this is now clear: indentation serves to delineate compound statements\
    \ or blocks within the code. **Therefore, in Python, lines of code that share\
    \ the same level of indentation are treated as part of the same block.**\n\nConsequently,\
    \ the structure of a compound `if` statement in Python is defined through indentation:\n\
    \n```\n1| if <expr>:\n2|    <statement>\n3|    <statement>\n4|    <statement>\n\
    ...\n5| <following_statement>\n```\n\nIn this case, statements that share the\
    \ same indentation level (from lines 2 to 4) are grouped together as a single\
    \ block. If `<expr>` evaluates to true, the entire block is executed; if `<expr>`\
    \ is false, the block is bypassed. After processing this block, the program continues\
    \ with `<following_statement>`.\n\n### Nested Blocks\n\nBlocks within Python can\
    \ be nested to any level of depth, where each additional indentation level signifies\
    \ the beginning of a new block and each decrease in indentation marks the end\
    \ of the current block. This hierarchical arrangement of code blocks creates a\
    \ structure that is simple, uniform, and easy to understand.\n\n**Example:**\n\
    \n```\nage = 20\nhas_license = True\nif age >= 18:\n    if has_license:\n    \
    \    print(\"You are eligible to drive.\")\n    else:\n        print(\"You are\
    \ not old enough to drive.\")\n```\n\n### Else and Elif Clauses\n\nYou’ve learned\
    \ to employ an `if` statement for executing either a solitary instruction or a\
    \ group of instructions based on a condition. Now, let’s explore additional capabilities.\
    \ At times, you might need to assess a situation and follow one course of action\
    \ if the condition holds true, while also defining a different course should the\
    \ condition prove false. This scenario is effectively managed by incorporating\
    \ an `else` clause.\n\n```\nif <expr>:\n    <statement(s)>\nelse:\n    <statement(s)>\n\
    ```\n\nWhen `<expr>` evaluates to true, **the program executes the initial set\
    \ of statements and bypasses the second set**. Conversely, if `<expr>` is false,\
    \ the program skips the first set and **proceeds with the execution of the second\
    \ set**. Following the completion of these conditional branches, the program’s\
    \ flow continues beyond the second set of statements.\n\n**Example:**\n\n```\n\
    temperature = 30\nif temperature > 25:\n    print(\"It's a hot day.\")\nelse:\n\
    \    print(\"It's not a hot day.\")\n```\n\nPython offers a way to navigate through\
    \ multiple conditional paths by employing one or more `elif` clauses, which stands\
    \ for `else if`. The language sequentially assesses each condition (`<expr>`)\
    \ and executes the block of code associated with the first condition that evaluates\
    \ to true. If all conditions prove false and an `else` clause is present, then\
    \ the code block under the `else` clause will be executed.\n\n**Example:**\n\n\
    ```\nscore = 75  # Assume this is the score out of 100\nif score >= 90:\n    print(\"\
    Grade: A\")\nelif score >= 80:\n    print(\"Grade: B\")\nelif score >= 70:\n \
    \   print(\"Grade: C\")\nelif score >= 60:\n    print(\"Grade: D\")\nelse:\n \
    \   print(\"Grade: F\")\n```\n\n### One-Line if Statements\n\nConventionally,\
    \ `<expr>` in an `if` statement is written on one line, with the `<statement>`\
    \ indented beneath it on the next line. However, it’s also acceptable to construct\
    \ the entire `if` statement on a single line, achieving the same functionality.\n\
    \n**Syntax:**\n\n```\nif <expr>: <statement>\n```\n\nIt’s possible to include\
    \ multiple `<statement>`s on a single line by separating them with semicolons:\n\
    \n**Syntax:**\n\n```\nif <expr>: <statement>; <statement>; ...; <statement>\n\
    ```\n\n## Python Loops (For and While)\n\nA loop in programming is a fundamental\
    \ concept that allows a block of code to be executed repeatedly based on a condition\
    \ or until a certain condition is met. Loops are used to automate repetitive tasks,\
    \ making it possible to perform operations on collections of data, generate sequences,\
    \ or wait for certain events without the need for writing the same lines of code\
    \ multiple times.\n\n**There are several types of loops, but the most common ones\
    \ include the following:**\n\n*   **For Loop**: Iterates over a sequence (such\
    \ as a list, tuple, dictionary, set, or string) and executes a block of code for\
    \ each item in the sequence. It’s often used when the number of iterations is\
    \ known or finite.\n\n*   **While Loop**: Continues to execute a block of code\
    \ as long as a specified condition remains true. It’s used when the number of\
    \ iterations is not known before the loop starts and depends on when a certain\
    \ condition changes.\n\nLoops can include various control statements to modify\
    \ their execution flow, such as `break` to exit the loop prematurely, `continue`\
    \ to skip the current iteration and proceed to the next one, or `else` to execute\
    \ a block of code once the loop condition is no longer true (applies to Python)."
