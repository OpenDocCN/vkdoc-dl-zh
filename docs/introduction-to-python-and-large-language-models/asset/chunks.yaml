- fmt: '### Key Takeaways


    - **Optimization for Specific Tasks**: The success of the specialized models highlights
    the importance of tailoring algorithms to the specific requirements of abstract
    reasoning tasks, including the ability to generalize from specific instances of
    core concepts.

    - **Limitations of General-Purpose Models**: `GPT-4`, while powerful, is a general-purpose
    model not specifically optimized for tasks like those in `ConceptARC`. This illustrates
    the need for continued development in AI to bridge the gap in abstract reasoning
    capabilities.


    `Sam Bowman`, a researcher not involved in the study, noted that these findings
    might not necessarily point to a deficiency in abstract reasoning capabilities
    of `GPT-4`, considering that the assessment was visually oriented and `GPT-4`
    is primarily a linguistic model.


    A study in January 2024 by Cohen Children’s Medical Center^([^(43)](#fn43)) researchers
    reported that `GPT-4` had a 17% accuracy rate in diagnosing pediatric medical
    conditions, highlighting limitations in its medical diagnostic capabilities.


    Regarding bias, `GPT-4` underwent a two-stage training process. Initially, it
    was fed vast amounts of Internet text to learn to predict the next token in a
    sequence. Subsequently, it underwent refinement through reinforcement learning
    from human feedback, aimed at teaching the model to reject prompts that could
    lead to harmful behaviors, as defined by `OpenAI`. This includes generating responses
    related to illegal activities, self-harm, or the description of explicit content.


    Researchers from Microsoft have raised concerns that `GPT-4` may display certain
    cognitive biases, including confirmation bias, anchoring, and base-rate neglect,
    indicating potential areas where the model’s reasoning could be influenced by
    inherent biases.


    ### BERT


    `BERT`, short for Bidirectional Encoder Representations from Transformers, is
    a freely available software library developed for tasks related to natural language
    processing (NLP). Introduced in 2018 by the Google AI Language team, `BERT` is
    designed to understand the subtleties and context of human language.


    #### Introduction to BERT


    At its core, `BERT` utilizes a neural network architecture based on transformers
    to process and interpret the nuances of human language. Unlike the traditional
    transformer model, which includes both encoder and decoder components, `BERT`
    incorporates only the encoder mechanism. This design choice underscores `BERT`’s
    focus on comprehending input texts over generating new text.


    #### The Bidirectional Nature of BERT


    Conventional language models typically analyze text in a linear fashion, processing
    words one after the other in either forward or backward direction. This approach
    can overlook the full context surrounding a word. Contrary to this, `BERT` adopts
    a bidirectional strategy, evaluating the context on both sides of a word within
    a sentence simultaneously. This method enables `BERT` to gain a comprehensive
    understanding of the text by considering the entire sentence context at once.


    *Take the sentence: “She went to the bank to _______ some money.” In models that
    process text from one direction, the meaning of the gap relies heavily on the
    words leading up to it, possibly confusing whether “bank” signifies a riverbank
    or a financial institution. `BERT`’s bidirectional feature, however, evaluates
    the context preceding (“She went to the bank to”) and following (“some money”)
    the blank space in tandem. This approach furnishes a more layered interpretation,
    recognizing that the “bank” here pertains to a financial establishment, given
    the context of money. This showcases the enhanced comprehension `BERT` achieves
    by considering the entire sentence’s context, overcoming limitations seen in unidirectional
    models.*


    #### Training Stages of BERT: Pre-training and Fine-Tuning


    `BERT`’s development involves a dual-phase strategy:


    - **Pre-training on vast volumes of unlabeled text data** to master contextual
    relationships between words

    - **Fine-tuning with task-specific labeled data** to apply this understanding
    to particular NLP challenges


    ##### Phase 1: Pre-training with Unlabeled Data


    During its pre-training, `BERT` is exposed to extensive corpora of text without
    specific labels. It learns rich word embeddings that reflect the words’ meanings
    based on their contexts. This phase includes self-directed tasks, such as filling
    in blanks within sentences (a technique known as Masked Language Modeling, or
    `MLM`) and determining whether two sentences logically follow one another. These
    exercises enable `BERT` to capture the subtle nuances of language and sentence
    structure.


    ##### Phase 2: Fine-Tuning for Specific Tasks


    *Once pre-trained, `BERT` is fine-tuned by adjusting its parameters on a smaller,
    task-specific dataset.* This process refines `BERT`’s broad language understanding
    to perform specific tasks like sentiment analysis, question answering, or entity
    recognition. The model’s versatile architecture allows for easy adaptation across
    various NLP applications with only minor adjustments needed for each new task.


    #### How BERT Functions


    `BERT` leverages just the encoder part of the transformer architecture, processing
    input token sequences to generate contextualized token embeddings (Figure [5-13](#613844_1_En_5_Chapter.xhtml#Fig13)).
    Unlike traditional models that predict the next word linearly, `BERT` employs
    two novel pre-training objectives:


    - **Masked Language Model (MLM)**: `BERT` hides a fraction of the input tokens
    at random and then predicts these masked tokens based on their context, enhancing
    its grasp of language contextuality.

    - **Next Sentence Prediction (NSP)**: `BERT` assesses whether two sentences are
    logically sequenced, further refining its understanding of narrative flow.


    #### BERT’s Architectural Innovations


    The architecture of `BERT`, whether in its `BASE` or `LARGE` variant, expands
    upon the original transformer model (Figure [5-14](#613844_1_En_5_Chapter.xhtml#Fig14))
    with more encoder layers, larger feedforward networks, and more attention heads,
    enabling it to capture a deeper level of linguistic detail. The `BASE` model incorporates
    12 transformer blocks (with 768 hidden units and 12 attention heads), while the
    `LARGE` model doubles this capacity.


    ![](images/613844_1_En_5_Chapter/613844_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    `BERT` input embeddings visualization (Source: [*http://medium.com*](http://medium.com))


    ![](images/613844_1_En_5_Chapter/613844_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Transformer encoder classification layer (Source: [*http://medium.com*](http://medium.com))


    #### From Training to Application


    `BERT` processes inputs by starting with a special classification token (`CLS`)
    followed by the input text. The model’s layers apply self-attention and feedforward
    networks sequentially, producing a vector representation for each token. The `CLS`
    token’s final representation can serve as a feature for classification tasks,
    illustrating `BERT`’s ability to transform its pre-trained embeddings into task-specific
    applications, such as single-layer neural network classifications, with remarkable
    success.'
