    \ and upgrade `Lamini` by using the following commands:\n\n```\npip install lamini\n\
    pip install --upgrade lamini\n```\n\n**Then use the following code:**\n\n```\n\
    import lamini\nlamini.api_key = \"YOUR-API-KEY\"\nfrom lamini import LaminiClassifier\n\
    llm = LaminiClassifier()\nprompts={\n\"cat\": \"Cats are generally more independent\
    \ and aloof than dogs, who are often more social and affectionate.\",\n\"dog\"\
    : \"Dogs are more pack-oriented and tend to be more loyal to their human family.\"\
    ,\n}\nllm.add_data_to_class(\"dog\", [\"woof\", \"group oriented\"])\nllm.add_data_to_class(\"\
    cat\", [\"Oh, I prefer to do stuff on my own than dogs\", \"meow\"])  # list of\
