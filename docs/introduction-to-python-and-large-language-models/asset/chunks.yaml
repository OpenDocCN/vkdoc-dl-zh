    to visually distinguish it from the adjacent code.


    **Example:**


    ```

    def greetings():

    print("hello world")

    for i in range(10)

    print(i)

    ```


    **In Python, adhering to specific rules is crucial when it comes to code indentation:**


    *   Avoid splitting indentation across multiple lines using the backslash (“\”)
    character.


    *   You must not indent the first line of Python code; doing so will result in
    an Indentation Error.


    *   Consistency is key when choosing between tabs and spaces for indentation.
    Stick with your preferred spacing method throughout your code. Mixing tabs and
    spaces can lead to incorrect indentation.


    *   It’s generally recommended to use either one tab or four whitespaces for the
    initial level of indentation and increment by an additional four whitespaces (or
    one more tab) for deeper indentation levels.


    ### Python Multiline Statements


    In Python, statements usually terminate with a newline character. However, Python
    offers the flexibility of using the line continuation character (\) to indicate
    that a line should be continued.


    **Example:**


    ```

    total = one + \

    two + \

    three

    ```


    Statements enclosed within square brackets [], curly braces {}, or parentheses
    () do not require the line continuation character. For instance, the following
    statement is valid in Python:


    **Example:**


    ```

    days = [''Monday'', ''Tuesday'', ''Wednesday'',

    ''Thursday'', ''Friday'']

    ```


    ### Quotations in Python


    In Python, string literals can be represented using single (’), double (”), or
    triple (’’’ or ” ” ”) quotes, provided that the same type of quote is used to
    both start and end the string.


    Triple quotes, on the other hand, are employed to encompass strings that span
    multiple lines. For instance, the following examples are all valid in Python:


    **Example:**


    ```

    name = ''Alice''

    print(f"My name is {name}.")

    quote = "To be or not to be, that is the question."

    print(f"Shakespeare once said, ''{quote}''")

    story = """Once upon a time,

    there was a brave knight

    who embarked on a grand adventure."""

    print(story)

    ```


    **Output:**


    ```

    My name is Alice.

    Shakespeare once said, ''To be or not to be, that is the question.''

    Once upon a time,

    there was a brave knight

    who embarked on a grand adventure.

    ```


    ### Comments in Python


    In Python, comments serve as programmer-readable explanations or annotations within
    the source code. They are included to enhance the code’s comprehensibility for
    human readers and are disregarded by the Python interpreter.


    Python, like many contemporary programming languages, supports both single-line
    (end-of-line) and multiline (block) comments. The structure of Python comments
    closely resembles those found in languages such as PHP, BASH, and Perl.


    To create a comment in Python, you use the hash sign (#). Any hash sign that is
    not within a string literal marks the beginning of a comment. Everything following
    the # symbol up to the end of the physical line is considered part of the comment,
    and Python’s interpreter disregards it.


    ```

    # First comment

    print ("Hello, World!") # Second comment

    ```


    **You can type a comment on the same line after a statement or expression:**


    ```

    Name = "John" # comment on the same line

    ```


    **You can comment multiple lines as follows:**


    ```

    # Comment 1

    # Comment 2

    # Comment 3

    ```


    **The Python interpreter will also ignore the triple-quoted string that follows,
    allowing it to serve as a multiline comment:**


    ```

    ''''''

    This is my first multiline

    comment.

    ''''''

    ```


    #### Utilizing Blank Lines in Python Code


    A blank line in Python code is one that consists solely of whitespace or possibly
    contains a comment, and Python completely disregards it. When working in an interactive
    interpreter session, you must input an empty physical line to conclude a multiline
    statement.


    #### Combining Multiple Statements in a Single Line


    You can use the semicolon (;) to include multiple statements on a single line,
    provided that none of these statements initiates a new code block. Here’s an example
    snippet demonstrating the use of the semicolon:


    **Example:**


    ```

    x = 5; y = 10; z = x + y; print(z)

    ```'
