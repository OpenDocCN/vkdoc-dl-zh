- fmt: '# `Summary`


    Python’s syntax is designed for readability and simplicity, adhering to the philosophy
    that there should be a clear way to accomplish tasks. This design choice, coupled
    with English keywords instead of punctuation, makes Python’s code clean and easy
    to understand.


    **In the next chapter, we will discuss the following:**


    - The different types of layers in the architecture of the large language models

    - Attention mechanisms

    - Tokenization strategies in large language models

    - What is zero-shot and few-shot learning

    - More about LLM hallucinations

    - Examples of architectures of popular LLMs


    # 5. Basic Overview of the Components of the LLM Architectures


    This chapter delves into the intricate components that constitute large language
    model (LLM) architectures. Understanding these elements is crucial for appreciating
    how LLMs transform raw textual data into meaningful, context-aware outputs. The
    key components discussed in this chapter include **embedding layers, feedforward
    layers, recurrent layers, and attention mechanisms**. Each of these plays a pivotal
    role in enabling LLMs to process and generate human-like language.


    `Embedding` layers are foundational to LLMs, converting discrete tokens such as
    words into continuous vector representations. The `embedding` matrix within these
    layers, initially filled with random values, is a learnable component that adapts
    during training. Each row of this matrix corresponds to a unique token from the
    model’s vocabulary. The `embedding` layer fetches these rows to create vector
    representations, which serve as the model’s understanding of the tokens’ meanings.
    Various embedding algorithms enhance the model’s ability to capture positional
    and contextual nuances, enabling it to handle diverse linguistic scenarios effectively.


    `Feedforward` neural networks (FFNs) are a straightforward type of artificial
    neural network, characterized by the unidirectional flow of data from input to
    output nodes through hidden layers. Each neuron in these layers is connected to
    neurons in adjacent layers via weighted connections. FFNs process input data by
    calculating weighted sums, applying activation functions, and generating outputs.
    In LLMs, feedforward layers are integral to recognizing and assimilating complex
    patterns, thereby enhancing the model’s comprehension capabilities.


    `Recurrent` layers are crucial for processing sequential data, particularly in
    natural language processing (NLP). These layers maintain hidden states that carry
    forward information from previous elements in a sequence, allowing the model to
    consider the context of earlier words when interpreting current ones. Training
    recurrent layers involves techniques like backpropagation through time (BPTT),
    which adjusts weights based on the model’s performance across entire sequences.
    Variants like Long Short-Term Memory (LSTM) units and Gated Recurrent Units (GRUs)
    are employed to manage long-term dependencies more effectively.


    `Attention` mechanisms are a cornerstone of modern LLMs, enabling them to focus
    on specific parts of the input text that are most relevant to the task at hand.
    The attention mechanism functions through a two-phase approach: during the attention
    phase, words seek out and exchange information with relevant words in the context,
    and during the feedforward phase, they process this accumulated information. Transformers,
    a type of LLM, utilize multiple attention heads to perform various information-exchange
    tasks in parallel, enhancing their ability to process extensive texts efficiently.


    `Self-attention` allows each word in a sentence to attend to all other words,
    capturing their contextual relationships. `Multi-head attention` extends this
    by enabling the model to focus on different parts of the sentence simultaneously,
    thereby improving its understanding of syntactic and semantic relationships. These
    mechanisms are vital for tasks requiring a comprehensive understanding of text,
    such as translation and summarization.


    `Tokenization` is the process of breaking down text into manageable units known
    as tokens, which are then transformed into numerical representations called embeddings.
    This segmentation is fundamental for LLMs to process and learn from large datasets
    efficiently. The distribution and handling of these tokens, especially predicting
    the next token in a sequence, form the basis of many LLM tasks, including text
    generation and translation.


    ## `Embedding` Layers


    `Embedding` layers in neural networks, including large language models (LLMs),
    play a crucial role in transforming discrete inputs, such as words or tokens,
    into continuous vector forms. At the heart of this transformation is the **embedding
    matrix**, a learnable component of the layer that starts off with random values.


    This matrix features rows that correspond to the unique tokens in the model’s
    vocabulary. In operation, the `embedding` layer conducts a lookup for each input
    token, fetching the corresponding row from the matrix. These fetched rows serve
    as the **continuous vector representations, or embeddings (Figure** [**5-1**](#613844_1_En_5_Chapter.xhtml#Fig1)**),
    of the tokens**. This outlines the fundamental operation of `embedding` layers,
    although each embedding algorithm may vary, incorporating the position and context
    of sentences. Such variations enable different models to perform with varying
    effectiveness across diverse scenarios.


    ![](images/613844_1_En_5_Chapter/613844_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Word embeddings visualization (Source: [*http://medium.com*](http://medium.com))


    Word embeddings (Figure [5-2](#613844_1_En_5_Chapter.xhtml#Fig2)) represent individual
    words within a text as vectors, generated by specialized models designed for this
    purpose. Each word is assigned a distinct vector, which is essentially an array
    filled with numbers that uniquely identify that word. These vectors are multidimensional
    entities, with each dimension representing a numerical component specific to the
    word. The uniqueness of these vectors allows for the distinct representation of
    each word within a document.


    The principle of word embedding is to map words with similar meanings close to
    each other in the vector space. For instance, the vector assigned to “apple” would
    be more similar to that of “orange” than to “violin,” reflecting the closer relationship
    between the fruits compared to the musical instrument. This similarity in vectors
    mirrors the semantic proximity between words.


    ![](images/613844_1_En_5_Chapter/613844_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Embeddings (Source: [*http://medium.com*](http://medium.com))


    It’s important to mention that the choice of dimensionality for these vectors
    lies in the hands of the model’s architect. Take `Word2Vec` as an instance; it
    employs vectors of 300 dimensions, representing each word with 300 distinct numbers.
    In this context, we aim to construct a basic word embedding model using just two
    dimensions.'
