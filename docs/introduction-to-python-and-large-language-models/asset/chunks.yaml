- fmt: '### Stop Word Removal


    ```python

    import nltk

    from nltk.corpus import stopwords

    from nltk.tokenize import word_tokenize

    nltk.download(''stopwords'')

    text = "The quick brown fox jumped over the lazy dog."

    stop_words = set(stopwords.words(''english''))

    tokens = word_tokenize(text)

    filtered_tokens = [token for token in tokens if not token in stop_words]

    print(filtered_tokens)

    Output:

    [''The'', ''quick'', ''brown'', ''fox'', ''jumped'', ''lazy'', ''dog'', ''.'']

    ```


    ### Stemming


    ```python

    import nltk

    from nltk.stem import PorterStemmer

    from nltk.tokenize import word_tokenize

    nltk.download(''punkt'')

    text = "The quick brown foxes jumped over the lazy dogs."

    stemmer = PorterStemmer()

    tokens = word_tokenize(text)

    stemmed_tokens = [stemmer.stem(token) for token in tokens]

    print(stemmed_tokens)

    ```


    **Output**


    ```python

    [''the'', ''quick'', ''brown'', ''fox'', ''jump'', ''over'', ''the'', ''lazi'',
    ''dog'', ''.'']

    ```


    ### Lemmatization


    ```python

    import nltk

    from nltk.stem import WordNetLemmatizer

    from nltk.tokenize import word_tokenize

    nltk.download(''wordnet'')

    text = "The quick brown foxes jumped over the lazy dogs."

    lemmatizer = WordNetLemmatizer()

    tokens = word_tokenize(text)

    lemmatized_tokens = [lemmatizer.lemmatize(token) for token in tokens]

    print(lemmatized_tokens)

    ```


    **Output:**


    ```python

    [''The'', ''quick'', ''brown'', ''fox'', ''jumped'', ''over'', ''the'', ''lazy'',
    ''dog'', ''.'']

    ```


    ### N-grams for NLP Feature Engineering


    ```python

    import nltk

    from nltk.util import ngrams

    text = "The quick brown foxes jumped over the lazy dogs."

    tokens = nltk.word_tokenize(text)

    bigrams = ngrams(tokens, 2) trigrams = ngrams(tokens, 3)

    print(list(bigrams))

    print(list(trigrams))

    ```


    **Output:**


    ```python

    [(''The'', ''quick''), (''quick'', ''brown''), (''brown'', ''foxes''), (''foxes'',
    ''jumped''), (''jumped'', ''over''), (''over'', ''the''), (''the'', ''lazy''),
    (''lazy'', ''dogs''), (''dogs'', ''.'')] [(''The'', ''quick'', ''brown''), (''quick'',
    ''brown'', ''foxes''), (''brown'', ''foxes'', ''jumped''), (''foxes'', ''jumped'',
    ''over''), (''jumped'', ''over'', ''the''), (''over'', ''the'', ''lazy''), (''the'',
    ''lazy'', ''dogs''), (''lazy'', ''dogs'', ''.'')]

    ```


    ### Part-of-Speech (POS) Tagging


    ```python

    import nltk

    nltk.download(''averaged_perceptron_tagger'')

    text = "The quick brown foxes jumped over the lazy dogs."

    tokens = nltk.word_tokenize(text)

    pos_tags = nltk.pos_tag(tokens)

    print(pos_tags)

    ```


    **Output:**


    ```python

    [(''The'', ''DT''), (''quick'', ''JJ''), (''brown'', ''NN''), (''foxes'', ''NNS''),
    (''jumped'', ''VBD''), (''over'', ''IN''), (''the'', ''DT''), (''lazy'', ''JJ''),
    (''dogs'', ''NNS''), (''.'', ''.'')]

    ```


    ### Named Entity Recognition (NER)


    ```python

    import nltk

    nltk.download(''words'')

    nltk.download(''maxent_ne_chunker'')

    nltk.download(''averaged_perceptron_tagger'')

    text = "John Smith works at Google in New York City."

    tokens = nltk.word_tokenize(text)

    pos_tags = nltk.pos_tag(tokens)

    ner_tags = nltk.ne_chunk(pos_tags)

    print(ner_tags)

    ```


    **Output:**


    ```python

    (S (PERSON John/NNP) (PERSON Smith/NNP) works/VBZ at/IN (ORGANIZATION Google/NNP)
    in/IN (GPE New/NNP York/NNP City/NNP) ./.)

    ```


    ### TF-IDF


    ```python

    from sklearn.feature_extraction.text import TfidfVectorizer

    corpus = [ "The quick brown fox jumps over the lazy dog.",

    "The quick brown foxes jump over the lazy dogs and cats.",

    "The lazy dogs and cats watch the quick brown foxes jump over the moon."]

    tfidf_vectorizer = TfidfVectorizer()

    tfidf_matrix = tfidf_vectorizer.fit_transform(corpus)

    print(tfidf_matrix.toarray())

    ```


    **Output:**


    ```python

