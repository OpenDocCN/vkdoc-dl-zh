    [2, 4, 6]\n```\n\nLambda 函数特别适用于可以用单行表达式的简单操作。然而，对于复杂操作，建议使用命名函数以保证清晰度和可读性。\n\n\
    ## 总结\n\nPython 是一种通用、高级编程语言，是跨多个领域和平台进行脚本编写和快速应用程序开发的理想选择。在本章中，我们回顾了 Python 的语法和语义，指出了它与其他编程语言的相似之处，同时强调了其独特特性。在下一章中，我们将了解\
    \ Python 如何支持多种编程方法，包括结构化编程、面向对象编程和函数式编程。\n\n脚注 1\n\n# 4. Python 与其他编程方法\n\nPython\
    \ 丰富的自然语言处理生态系统、活跃的社区支持、可读性、与数据科学和机器学习工具的集成、预训练模型的可用性、开源特性、广泛采用、多功能性以及跨平台兼容性，使其成为自然语言处理任务的理想选择。其流行度和强大的生态系统使\
    \ Python 成为自然语言处理研究和开发的事实标准语言。\n\n## Python 中的面向对象编程\n\nPython 中的面向对象编程是一种使用对象对复杂问题进行建模的编码方法。这种方法基于一个指导问题解决策略的理论框架。\n\
    \n在面向对象编程的背景下，这涉及运用一套原则和设计模式，通过对象的视角来应对挑战。在 Python 中，对象是将数据（称为属性）和函数（称为方法）封装到一个单一实体中。对象可以类比为现实世界中的有形实体。\n\
    \n在这种方案中，属性通常是名词，表示对象的属性；而方法是动作，用动词表示，定义了对象能做什么。\n\n这种将数据存储和操作功能分开的方式构成了面向对象编程的核心。它涉及创建不仅包含信息，而且体现特定行为的对象。\n"
- fmt: "### Why Do We Use Object-Oriented Programming in Python?\n\nWe use Object-Oriented\
    \ Programming (OOP) in Python to organize code into reusable, modular units called\
    \ objects, which combine data and functionality. This approach simplifies complex\
    \ software development, making code more understandable, maintainable, and scalable.\n\
    \n**Object-Oriented Programming**\n\n- Enhances code reuse through **inheritance**.\n\
    - Allows for flexible code interaction via **polymorphism**.\n- Improves problem-solving\
    \ by breaking down problems into manageable objects.\n- Promotes **data encapsulation**,\
    \ ensuring secure and structured code management. This methodology aligns well\
    \ with Python’s philosophy of clear, logical code for both small and large-scale\
    \ projects.\n\n**OOP vs. Structured Programming**\n\n- **Maintenance:** OOP is\
    \ generally more maintainable compared to structured programming, which can be\
    \ more challenging to maintain.\n- **Code Duplication:** OOP follows the Don’t\
    \ Repeat Yourself (DRY) principle, minimizing code repetition, whereas structured\
    \ programming may involve code being duplicated across multiple locations.\n-\
    \ **Code Reusability:** In OOP, small, reusable code segments are common, unlike\
    \ structured programming, where larger blocks of code are centralized.\n- **Programming\
    \ Model:** OOP utilizes an object-based model, while structured programming relies\
    \ on a sequential block of code model.\n- **Debugging:** Debugging is typically\
    \ more straightforward in OOP due to its modular nature, whereas it can be more\
    \ complex in structured programming.\n- **Learning Curve:** OOP comes with a steeper\
    \ learning curve, whereas structured programming is often seen as easier for beginners\
    \ to grasp.\n- **Project Suitability:** OOP is preferred for complex, large-scale\
    \ projects, while structured programming is more suited to simpler, smaller programs.\n\
    \n#### Everything Is an Object in Python\n\nHere’s a little insider knowledge:\
    \ you’ve been immersed in Object-Oriented Programming (OOP) during your entire\
    \ journey with Python, perhaps without even realizing it. In Python, regardless\
    \ of the programming paradigm you’re working within, you’re engaging with objects\
    \ for virtually every operation.\n\nThis stems from Python’s core principle: **everything\
    \ in Python is treated as an object**. Recall what constitutes an object: In Python,\
    \ an object encapsulates both data (known as attributes) and functionalities (referred\
    \ to as methods). This concept perfectly aligns with every data type in Python.\n\
    \nTake a string, for example; it’s essentially a collection of data (the characters\
    \ within it) coupled with a set of functionalities or behaviors (methods like\
    \ `upper()`, `lower()`, and so on). This principle equally applies to other data\
    \ types like integers, floats, booleans, lists, and dictionaries.\n\n**Example:**\n\
    \n```\ntext = \"Hello, Python!\"\nprint(text.upper())  # Using the upper() method\n\
    ```\n\n**Output:**\n\n```\nHELLO PYTHON\n```\n\n#### Attributes and Methods\n\n\
    **Before we proceed, it’s beneficial to revisit what we mean by attributes and\
    \ methods:**\n\n- **Attributes** are akin to internal variables housed within\
    \ objects, holding data relevant to the object.\n- **Methods** are similar to\
    \ functions, except they are bound to the objects themselves, offering specific\
    \ behaviors or actions that can be performed with or on the object’s data.\n\n\
    ### Your First Python Object\n\nLet’s consider a simple example of an object in\
    \ Python by creating a “Book” class and then instantiating it to create a “Book”\
    \ object. This example will illustrate how Python treats everything as an object,\
    \ encompassing both attributes (data) and methods (functionality).\n\n#### Defining\
    \ the 'Book' Class\n\nFirst, we define a class named “Book”, which is like a blueprint\
    \ for creating “Book” objects. This class will have attributes to store data such\
    \ as the title and author of the book and a method to display this information.\n\
    \n```\nclass Book:\n    def __init__(self, title, author):\n        self.title\
    \ = title\n        self.author = author\n\n    def display_info(self):\n     \
    \   print(f\"Book Title: {self.title}\\nAuthor: {self.author}\")\n```\n\n**Explanation:**\n\
    \n- `__init__` is a special method in Python, known as the constructor. It initializes\
    \ new objects from the class, setting up their initial state. In this case, it\
    \ takes `title` and `author` as parameters and assigns them to the object’s attributes\
    \ (`self.title` and `self.author`). It’s called each time we instantiate an object.\n\
    - `display_info` is a method defined to perform an operation related to the object,\
    \ which is displaying the book’s title and author.\n\n#### Creating and Using\
    \ a “Book” Object\n\nNow, let’s create an actual “Book” object using the “Book”\
    \ class blueprint and then use its method.\n\n```\n# Creating a Book object\n\
    my_book = Book(\"The Catcher in the Rye\", \"J.D. Salinger\")\n\n# Using the display_info\
    \ method of the Book object\nmy_book.display_info()\n```\n\n**This will output:**\n\
    \n```\nBook Title: The Catcher in the Rye\nAuthor: J.D. Salinger\n```\n\nThe `my_book`\
    \ instance is an object of the `Book` class. It encapsulates data (the title and\
    \ author attributes) and provides functionality through a method (`display_info`).\
    \ This object is a practical embodiment of OOP principles in Python, demonstrating\
    \ how data and related behaviors are bundled together. Each `Book` object can\
    \ hold different data, showcasing the power of objects in managing state and behavior\
    \ in a structured way.\n\n### Object-Oriented Programming (OOP) in Python Is Founded\
    \ on Four Fundamental Concepts\n\n#### Abstraction\n\nAbstraction involves concealing\
    \ the complex realities of a system to simplify its interaction for the user,\
    \ who could be the end user or other developers. It’s akin to knowing how to operate\
    \ a smartphone without understanding the intricate details of its internal processes,\
    \ or using Python to develop applications without needing to grasp its underlying\
    \ mechanics. In programming, abstraction allows for the distillation of common\
    \ functionalities into classes, making the management of objects and their interactions\
    \ more straightforward.\n\n**Example:**\n\n```\nfrom abc import ABC, abstractmethod\n\
    \n# Define an abstract base class (ABC)\nclass Shape(ABC):\n    @abstractmethod\n\
    \    def area(self):\n        pass\n\n# Create a concrete class that inherits\
    \ from Shape\nclass Circle(Shape):\n    def __init__(self, radius):\n        self.radius\
    \ = radius\n\n    def area(self):\n        return 3.1415 * self.radius ** 2\n\n\
    # Create a concrete class that inherits from Shape\nclass Rectangle(Shape):\n\
    \    def __init__(self, width, height):\n        self.width = width\n        self.height\
    \ = height\n\n    def area(self):\n        return self.width * self.height\n\n\
    # Instantiate objects and calculate areas\ncircle = Circle(5)\nrectangle = Rectangle(4,\
    \ 6)\n\nprint(\"Circle Area:\", circle.area())  # Output: Circle Area: 78.53750000000001\n\
    print(\"Rectangle Area:\", rectangle.area())  # Output: Rectangle Area: 24\n```\n\
    \n**Output:**\n\n```\nCircle Area: 78.53750000000001\nRectangle Area: 24\n```"
  raw: '### Why Do We Use Object-Oriented Programming in Python?


    We use Object-Oriented Programming (OOP) in Python to organize code into reusable,
    modular units called objects, which combine data and functionality. This approach
    simplifies complex software development, making code more understandable, maintainable,
    and scalable.


    **Object-Oriented Programming**


    *   Enhances code reuse through **inheritance**.


    *   Allows for flexible code interaction via **polymorphism**.


    *   Improves problem-solving by breaking down problems into manageable objects.


    *   Promotes **data encapsulation**, ensuring secure and structured code management.
    This methodology aligns well with Python’s philosophy of clear, logical code for
    both small and large-scale projects.


    **OOP vs. Structured Programming**


    *   **Maintenance:** OOP is generally more maintainable compared to structured
    programming, which can be more challenging to maintain.


    *   **Code Duplication:** OOP follows the Don’t Repeat Yourself (DRY) principle,
    minimizing code repetition, whereas structured programming may involve code being
    duplicated across multiple locations.


    *   **Code Reusability:** In OOP, small, reusable code segments are common, unlike
    structured programming, where larger blocks of code are centralized.


    *   **Programming Model:** OOP utilizes an object-based model, while structured
    programming relies on a sequential block of code model.


    *   **Debugging:** Debugging is typically more straightforward in OOP due to its
    modular nature, whereas it can be more complex in structured programming.


    *   **Learning Curve:** OOP comes with a steeper learning curve, whereas structured
    programming is often seen as easier for beginners to grasp.


    *   **Project Suitability:** OOP is preferred for complex, large-scale projects,
    while structured programming is more suited to simpler, smaller programs.


    #### Everything Is an Object in Python


    Here’s a little insider knowledge: you’ve been immersed in Object-Oriented Programming
    (OOP) during your entire journey with Python, perhaps without even realizing it.
    In Python, regardless of the programming paradigm you’re working within, you’re
    engaging with objects for virtually every operation.


    This stems from Python’s core principle: **everything in Python is treated as
    an object**. Recall what constitutes an object: In Python, an object encapsulates
    both data (known as attributes) and functionalities (referred to as methods).
    This concept perfectly aligns with every data type in Python.


    Take a string, for example; it’s essentially a collection of data (the characters
    within it) coupled with a set of functionalities or behaviors (methods like upper(),
    lower(), and so on). This principle equally applies to other data types like integers,
    floats, booleans, lists, and dictionaries.


    **Example:**


    ```

    text = "Hello, Python!"

    print(text.upper())  # Using the upper() method

    ```


    **Output:**


    ```

    HELLO PYTHON

    ```


    #### Attributes and Methods


    **Before we proceed, it’s beneficial to revisit what we mean by attributes and
    methods****:**


    *   **Attributes** are akin to internal variables housed within objects, holding
    data relevant to the object.


    *   **Methods** are similar to functions, except they are bound to the objects
    themselves, offering specific behaviors or actions that can be performed with
    or on the object’s data.


    ### Your First Python Object


    Let’s consider a simple example of an object in Python by creating a “Book” class
    and then instantiating it to create a “Book” object. This example will illustrate
    how Python treats everything as an object, encompassing both attributes (data)
    and methods (functionality).


    ```

    ### Defining the ''Book'' Class

    ```


    First, we define a class named “Book”, which is like a blueprint for creating
    “Book” objects. This class will have attributes to store data such as the title
    and author of the book and a method to display this information.


    ```

    class Book:

    def __init__(self, title, author):

    self.title = title

    self.author = author

    def display_info(self):

    print(f"Book Title: {self.title}\nAuthor: {self.author}")

    ```


    **Explanation:**


    *   **__init__** is a special method in Python, known as the constructor. It initializes
    new objects from the class, setting up their initial state. In this case, it takes
    “title” and “author” as parameters and assigns them to the object’s attributes
    (“self.title” and “self.author”). It’s called Python each time we instantiate
    an object.


    *   **display_info** is a method defined to perform an operation related to the
    object, which is displaying the book’s title and author.


    #### Creating and Using a “Book” Object


    Now, let’s create an actual “Book” object using the “Book” class blueprint and
    then use its method.


    ```

    # Creating a Book object

    my_book = Book("The Catcher in the Rye", "J.D. Salinger")

    # Using the display_info method of the Book object

    my_book.display_info()

    ```


    **This will output**


    ```

    Book Title: The Catcher in the Rye

    Author: J.D. Salinger

    ```


    The “my_book” instance is an object of the “Book” class. It encapsulates data
    (the title and author attributes) and provides functionality through a method
    (“display_info”). This object is a practical embodiment of OOP principles in Python,
    demonstrating how data and related behaviors are bundled together. Each “Book”
    object can hold different data, showcasing the power of objects in managing state
    and behavior in a structured way.


    ### Object-Oriented Programming (OOP) in Python Is Founded on Four Fundamental
    Concepts


    #### Abstraction


    Abstraction involves concealing the complex realities of a system to simplify
    its interaction for the user, who could be the end user or other developers. It’s
    akin to knowing how to operate a smartphone without understanding the intricate
    details of its internal processes, or using Python to develop applications without
    needing to grasp its underlying mechanics. In programming, abstraction allows
    for the distillation of common functionalities into classes, making the management
    of objects and their interactions more straightforward.


    **Example:**


    ```

    from abc import ABC, abstractmethod

    # Define an abstract base class (ABC)

    class Shape(ABC):

    @abstractmethod

    def area(self):

    pass

    # Create a concrete class that inherits from Shape

    class Circle(Shape):

    def __init__(self, radius):

    self.radius = radius

    def area(self):

    return 3.1415 * self.radius ** 2

    # Create a concrete class that inherits from Shape

    class Rectangle(Shape):

    def __init__(self, width, height):

    self.width = width

    self.height = height

    def area(self):

    return self.width * self.height

    # Instantiate objects and calculate areas

    circle = Circle(5)

    rectangle = Rectangle(4, 6)

    print("Circle Area:", circle.area())  # Output: Circle Area: 78.53750000000001

    print("Rectangle Area:", rectangle.area())  # Output: Rectangle Area: 24

    ```


    **Output:**


    ```

    Circle Area: 78.53750000000001

    Rectangle Area: 24

    ```'
  trans: "\n### 为什么要在 Python 中使用面向对象编程？\n\n我们在 Python 中使用面向对象编程（OOP），是为了将代码组织成可复用、模块化的单元，这些单元被称为对象，它们将数据与功能结合在一起。这种方法简化了复杂的软件开发，使代码更易于理解、维护和扩展。\n\
    \n**面向对象编程**\n\n-   通过**继承**增强代码复用性。\n-   通过**多态**实现灵活的代码交互。\n-   通过将问题分解为可管理的对象来改进问题解决能力。\n\
    -   促进**数据封装**，确保代码管理安全且结构清晰。这种方法论与 Python 追求清晰、逻辑化代码的理念高度契合，适用于从小型到大型的各种项目。\n\
    \n**OOP 与结构化编程的对比**\n\n-   **维护性：** OOP 通常比结构化编程更易于维护，后者维护起来可能更具挑战性。\n-   **代码重复：**\
    \ OOP 遵循“不要重复自己”（DRY）原则，最大限度地减少代码重复；而结构化编程可能涉及代码在多个位置重复。\n-   **代码复用性：** 在 OOP\
    \ 中，小而可复用的代码段很常见，这与结构化编程中大型代码块集中化的特点不同。\n-   **编程模型：** OOP 采用基于对象的模型，而结构化编程依赖于顺序执行的代码块模型。\n\
    -   **调试：** 由于其模块化特性，OOP 中的调试通常更直接，而在结构化编程中可能更复杂。\n-   **学习曲线：** OOP 的学习曲线较陡，而结构化编程通常被认为对初学者更友好。\n\
    -   **项目适用性：** OOP 更适合复杂的大型项目，而结构化编程更适用于简单的小型程序。\n\n#### Python 中一切都是对象\n\n这里有一个内行才知道的小知识：在你学习\
    \ Python 的整个过程中，你其实一直沉浸在面向对象编程（OOP）中，也许你自己都没有意识到。在 Python 中，无论你使用哪种编程范式，你几乎在每一个操作中都在与对象打交道。\n\
    \n这源于 Python 的核心原则：**Python 中的一切都被视为对象**。回想一下对象的构成：在 Python 中，一个对象封装了数据（称为属性）和功能（称为方法）。这个概念完美地适用于\
    \ Python 中的每一种数据类型。\n\n以字符串为例；它本质上是一个数据集合（其中的字符）加上一组功能或行为（如 `upper()`、`lower()`\
    \ 等方法）。这个原则同样适用于其他数据类型，如整数、浮点数、布尔值、列表和字典。\n\n**示例：**\n\n```\ntext = \"Hello, Python!\"\
    \nprint(text.upper())  # 使用 upper() 方法\n```\n\n**输出：**\n\n```\nHELLO PYTHON\n\
    ```\n\n#### 属性和方法\n\n**在继续之前，回顾一下我们所说的属性和方法会很有帮助：**\n\n-   **属性**类似于对象内部的变量，用于保存与该对象相关的数据。\n\
    -   **方法**类似于函数，区别在于它们绑定在对象本身上，提供了可以对对象数据执行或操作的特定行为或动作。\n\n### 你的第一个 Python 对象\n\
    \n让我们通过创建一个“Book”类，然后实例化它来创建一个“Book”对象，以此考虑一个简单的 Python 对象示例。这个示例将说明 Python 如何将一切视为对象，包括属性（数据）和方法（功能）。\n\
    \n#### 定义 'Book' 类\n\n首先，我们定义一个名为“Book”的类，它就像创建“Book”对象的蓝图。这个类将拥有存储数据（如书名和作者）的属性，以及一个显示这些信息的方法。\n\
    \n```\nclass Book:\n    def __init__(self, title, author):\n        self.title\
    \ = title\n        self.author = author\n\n    def display_info(self):\n     \
    \   print(f\"Book Title: {self.title}\\nAuthor: {self.author}\")\n```\n\n**解释：**\n\
    \n-   `__init__` 是 Python 中的一个特殊方法，称为构造函数。它从类中初始化新对象，设置它们的初始状态。在这个例子中，它接收 `title`\
    \ 和 `author` 作为参数，并将它们赋值给对象的属性（`self.title` 和 `self.author`）。每次我们实例化一个对象时，它都会被调用。\n\
    -   `display_info` 是一个定义好的方法，用于执行与对象相关的操作，即显示书的标题和作者。\n\n#### 创建并使用一个 “Book” 对象\n\
    \n现在，让我们使用“Book”类蓝图创建一个实际的“Book”对象，然后使用它的方法。\n\n```\n# 创建一个 Book 对象\nmy_book =\
    \ Book(\"The Catcher in the Rye\", \"J.D. Salinger\")\n\n# 使用 Book 对象的 display_info\
    \ 方法\nmy_book.display_info()\n```\n\n**这将输出：**\n\n```\nBook Title: The Catcher\
    \ in the Rye\nAuthor: J.D. Salinger\n```\n\n`my_book` 实例是 `Book` 类的一个对象。它封装了数据（书名和作者属性），并通过一个方法（`display_info`）提供了功能。这个对象是\
    \ Python 中 OOP 原则的一个实际体现，展示了数据和相关行为是如何捆绑在一起的。每个 `Book` 对象可以保存不同的数据，展示了对象在以结构化方式管理状态和行为方面的强大能力。\n\
    \n### Python 中的面向对象编程（OOP）建立在四个基本概念之上\n\n#### 抽象\n\n抽象涉及隐藏系统的复杂现实，以简化用户（可能是最终用户或其他开发者）与它的交互。这类似于知道如何操作智能手机，却无需了解其内部过程的复杂细节，或者使用\
    \ Python 开发应用程序，却无需掌握其底层机制。在编程中，抽象允许将通用功能提炼到类中，从而使对象及其交互的管理更加直接。\n\n**示例：**\n\n\
    ```\nfrom abc import ABC, abstractmethod\n\n# 定义一个抽象基类 (ABC)\nclass Shape(ABC):\n\
    \    @abstractmethod\n    def area(self):\n        pass\n\n# 创建一个继承自 Shape 的具体类\n\
    class Circle(Shape):\n    def __init__(self, radius):\n        self.radius = radius\n\
    \n    def area(self):\n        return 3.1415 * self.radius ** 2\n\n# 创建一个继承自 Shape\
    \ 的具体类\nclass Rectangle(Shape):\n    def __init__(self, width, height):\n    \
    \    self.width = width\n        self.height = height\n\n    def area(self):\n\
    \        return self.width * self.height\n\n# 实例化对象并计算面积\ncircle = Circle(5)\n\
    rectangle = Rectangle(4, 6)\n\nprint(\"Circle Area:\", circle.area())  # 输出: Circle\
    \ Area: 78.53750000000001\nprint(\"Rectangle Area:\", rectangle.area())  # 输出:\
    \ Rectangle Area: 24\n```\n\n**输出：**\n\n```\nCircle Area: 78.53750000000001\n\
    Rectangle Area: 24\n```\n"
- fmt: "### Inheritance\n\nInheritance is the mechanism by which classes can derive\
    \ characteristics and behaviors from pre-existing classes. This principle supports\
    \ the Don’t Repeat Yourself (DRY) philosophy, enabling the reuse of code by incorporating\
    \ shared attributes and methods into base classes (superclasses). This concept\
    \ mirrors biological inheritance, where subclasses inherit traits and behaviors\
    \ from their parents (superclasses), showcasing shared attributes and potentially\
    \ shared methods.\n\n**Example:**\n\n```python\n# Parent class (superclass)\n\
    class Animal:\n    def __init__(self, name):\n        self.name = name\n    def\
    \ speak(self):\n        pass  # Placeholder for the speak method\n\n# Child class\
    \ (subclass) inheriting from Animal\nclass Dog(Animal):\n    def speak(self):\n\
    \        return f\"{self.name} says Woof!\"\n\n# Child class (subclass) inheriting\
    \ from Animal\nclass Cat(Animal):\n    def speak(self):\n        return f\"{self.name}\
    \ says Meow!\"\n\n# Create instances of the child classes\ndog = Dog(\"Buddy\"\
    )\ncat = Cat(\"Whiskers\")\n\n# Call the speak method for each instance\nprint(dog.speak())\
    \  # Output: Buddy says Woof!\nprint(cat.speak())  # Output: Whiskers says Meow!\n\
    ```\n\n**Output:**\n\n```\nBuddy says Woof!\nWhiskers says Meow!\n```\n\n### Polymorphism\n\
    \nPolymorphism permits the tailoring of methods and attributes in subclasses that\
    \ were initially defined in a superclass, embodying the concept of “many forms.”\
    \ It allows for the creation of methods with the same name but differing implementations\
    \ across classes. Reflecting on our real-life analogy, children (subclasses) may\
    \ share a common behavior like getting hungry (a method) from their parents, but\
    \ the specifics, such as frequency of hunger, can vary, demonstrating polymorphism.\n\
    \n**Example:**\n\n```python\n# Parent class (superclass)\nclass Animal:\n    def\
