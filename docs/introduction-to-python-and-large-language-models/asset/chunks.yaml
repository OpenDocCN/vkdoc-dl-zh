  trans: '

    #### 数据与训练方法


    `Claude v1`的训练基础是一种名为`Constitutional AI`的方法，该方法利用了大量多样化的自然对话数据集，这些对话体现了各种角色和沟通风格，并有意排除了任何有害内容。`Anthropic`开发了一种名为`Vigilance`的独特训练方法，旨在将安全机制嵌入`Claude`中，通过社会学习和评估反馈，鼓励系统学习并遵守社会规范和伦理准则。


    `Claude`的初始训练采用了监督学习方法，以优化模型生成有益且无害响应的能力。同时辅以自监督学习，以增强`Claude`更广泛的对话能力。


    #### 模型设计


    `Anthropic`为`Claude v1`定制了一种基于 Transformer 技术的神经网络结构，该技术常用于自然语言处理任务。虽然`Claude
    v1`模型的具体规模属于专有信息，但其数十亿的参数使其能够处理涵盖众多主题的广泛讨论。


    通过将`Constitutional AI`和`Vigilance`等安全措施融入其架构，`Claude v1`被设计用于避免不安全的交互。其主要功能包括进行自然对话、提供有价值的帮助、避免生成有害内容、保持诚实、提供个性化体验，以及具备持续改进的能力。


    #### Claude v1 的局限性


    **尽管取得了进步，`Claude v1`仍面临一些限制：**


    *   它仅依赖训练数据获取知识，这限制了对许多主题的理解。

    *   它偶尔会产生不准确或不相关的回复。

    *   其专长仅限于对话任务，缺乏数据分析或复杂问题解决的能力。

    *   `Claude v1`仅作为纯文本界面运行，无法直接与物理世界交互或处理语音。


    ### Falcon 40B


    `Falcon 40B`是`Falcon`系列大型语言模型（`LLMs`）的一员，由技术创新研究院（`TII`）开发。该系列还包括`Falcon 7B`和`Falcon
    180B`等模型。具体来说，`Falcon 40B`是一个因果解码器专用模型，专为各种自然语言处理任务而设计。


    该模型支持多语言，涵盖英语、德语、西班牙语和法语，并对意大利语、葡萄牙语、波兰语、荷兰语、罗马尼亚语、捷克语和瑞典语等其他语言具备部分处理能力。


    #### 模型设计


    `Falcon 40B`的设计（图 5-17）借鉴了`GPT-3`架构，但进行了显著增强以提升性能。它引入了旋转位置嵌入来改善对序列的理解。该模型还受益于先进的注意力机制，包括多查询注意力和`Flash
    Attention`，以及一个将并行注意力与多层感知机（`MLP`）结构相结合的解码器架构，所有这些都在双层归一化框架下进行，以优化计算效率。


    ![](img/613844_1_En_5_Fig17_HTML.jpg)


    图 5-17 多查询注意力机制（来源：Falcon 博客）


    #### 训练数据


    `Falcon 40B`的训练使用了超过 1 万亿个 token，这些 token 来自`RefinedWeb`（一个经过精心过滤以确保数据质量的网络语料库）以及其他精心挑选的数据集。`TII`通过广泛的去重和严格的过滤流程，专注于提升数据质量，确保使用优质数据集，这极大地促进了`Falcon`模型的卓越性能。


    #### 训练过程


    `Falcon 40B`的训练利用了配备 384 块`A100 40GB GPU`的`AWS SageMaker`，采用了 3D 并行方法（`张量并行度=8`，`流水线并行度=4`，`数据并行度=12`），并与`ZeRO`优化协同工作。训练于
    2022 年 12 月开始，历时两个月完成。


    对于有兴趣使用`PyTorch`训练大型语言模型的爱好者和开发者，有一份全面的指南可供参考，该指南涵盖了从设置到执行的整个过程。


    #### 多查询注意力机制


    `Falcon 40B`引入了多查询注意力机制，这与传统的多头注意力方法有所不同。在此机制中，所有注意力头共享一个键值对。这种策略虽然不会显著改变预训练结果，但能极大地提升模型在推理过程中的可扩展性。


    #### 用于增强性能的指令版本


    除了标准模型外，`TII`还发布了指令变体，例如`Falcon-7B-Instruct`和`Falcon-40B-Instruct`。这些版本使用指令和对话数据进行了微调，优化了它们执行助手类任务的能力，并确保了性能的提升。


    #### 用户可访问性


    尽管`Falcon 40B`需要大量的 GPU 资源，但通过量化等技术，它可以在性能较低的 GPU 上运行。对于资源有限的用户，较小的`Falcon 7B`模型是一个替代选择，可以在`Google
    Colab`等平台中使用。

    '
- fmt: '### LLaMA


    Meta AI 于 2023 年 2 月启动了 LLaMA（Large Language Model Meta AI）项目，推出了一系列自回归大型语言模型（LLM），标志着该领域的重大进步。初始版本发布了多种复杂程度的模型，包括拥有
    7、13、33 和 650 亿参数的版本。


    令人印象深刻的是，拥有 130 亿参数的版本在众多 NLP 基准测试中超越了规模大得多的 GPT-3（拥有 1750 亿参数），而最大的 LLaMA 模型在与
    PaLM 和 Chinchilla 等领先模型的竞争中表现出了具有竞争力的结果。^([^(45)](#fn45)) 与以往通常通过受限 API 提供的高容量
    LLM 不同，Meta 采取了前所未有的举措，在非商业许可下向研究人员开放 LLaMA 的模型，尽管模型权重在发布后不久就在网上泄露了。


    2023 年 7 月，Meta 与微软合作，进一步扩展了其 LLaMA 产品线，推出了 LLaMA 2。这一代新模型包括 7、13 和 700 亿参数的版本，^([^(46)](#fn46))
    尽管架构基础与第一版相似，但用于训练的数据增加了 40%。Meta 的策略不仅包括发布基础模型，还包括发布针对对话进行微调的版本，称为 LLaMA-2 Chat，这些版本可用于广泛的商业用途，尽管某些限制引发了关于其开源状态的争论。


    2023 年 11 月，Patronus AI 在一项专门测试中将 LLaMA 2 与 GPT-4 和 Anthropic 的 Claude 2 等其他知名
    AI 模型进行了比较，揭示了它们在处理和解释复杂金融文档方面的优势和劣势。


    利用 Transformer 架构，LLaMA 融入了独特的功能，例如 SwiGLU 激活函数、^([^(47)](#fn47)) 旋转位置嵌入、^([^(48)](#fn48))
    和均方根层归一化，^([^(49)](#fn49)) 以增强其性能，而不是使用标准的层归一化。LLaMA 2 系列进一步提升了其上下文长度能力，突显了 Meta
    不断推动 LLM 效率和有效性的努力。


    这些模型的训练优先考虑增加数据量而非参数数量，LLaMA 1 模型在包含来自不同公共来源的 1.4 万亿个 token 的数据集上进行训练。LLaMA 2
    模型受益于更大的数据集，该数据集经过精心策划以增强可靠性并最大程度地减少隐私问题，同时通过创新的训练方法进行专门的微调以优化对话交互并确保 AI 对齐。


    从 LLaMA 到 LLaMA 2 的演变不仅展示了 Meta 对推进 AI 技术的承诺，也强调了其让强大的 LLM 更易于访问并适用于各种用途的意图，为语言模型的开发和部署树立了新标准。


    ### LaMDA


    LaMDA 由 Google 在 2020 年作为 Meena 的下一代产品推出，于 2021 年的 Google I/O 主题演讲中首次亮相，其进展在随后的年份中得以揭示。这种对话式
    AI 模型以其能够进行无限制对话的能力而著称。


    LaMDA 的开发涉及全面而详细的训练流程，利用了包含超过 1.56 万亿个单词的庞大文档、对话和口头交流集合。这个庞大的数据集促进了 LaMDA 对多样化对话动态的理解。


    人类评估员对于完善 LaMDA 的性能至关重要，他们评估模型的输出。这些评估基于搜索引擎验证，有助于提高 LaMDA 的精确性和信息准确性。这些评估基于回复的有用性、准确性和对事实的遵循程度。


    LaMDA 的优势源于其能够生成不限于特定任务的自发对话。它擅长识别和适应各种用户意图，应用强化学习技术，并在看似无关的主题之间流畅切换。


    LaMDA 建立在 Google 的 BERT 和 Transformer 模型之上，特别侧重于对话驱动的任务。它通过训练来自真实交互的多样化对话数据（包括文本和音频记录），与依赖书面文本的传统
    NLP 模型区分开来。


    LaMDA 的一个突出特点是其擅长生成针对开放式问题上下文的回复。它能理解用户问题的潜在意图，并生成反映当前对话上下文的回复。例如，LaMDA 可以通过考虑用户过去的交互和偏好以及更广泛的对话上下文，来定制关于某部特定电影的回复。


    除了对话系统，Google 还设想 LaMDA 的实用性扩展到搜索和信息检索领域，有望提供更相关、更具上下文感知的结果。


    LaMDA 标志着对话式 AI 的一次飞跃，有望显著提升人机交互质量。然而，它也引发了关于隐私和潜在意外后果的担忧，强调了对其开发和应用的警惕性监督的必要性。


    LaMDA 采用基于 Transformer 的架构，专为对话建模而设计，包含用于输入处理的编码器和用于回复生成的解码器。编码器利用自注意力层来理解文本关系，捕捉即时和整体的对话上下文。解码器根据输入，通过一个额外的注意力机制（专注于相关的输入文本片段）来生成特定于上下文的回复。


    通过融入多轮对话处理和命名实体识别等功能，LaMDA 旨在实现更丰富、更相关的对话交互。其架构促进了细微差别的对话，为对话式 AI 树立了新标准。


    Google 在 2022 年的开发者大会上宣布了 LaMDA 2，展示了该 AI 系统的增强版本。LaMDA 2 在大量对话数据上进行了训练，有望实现更自然、更准确、更安全的对话。演示突出了其创造性和切题的回复能力，以及“List
    It”功能，该功能可将复杂主题分解为可操作的见解。


    Google 还推出了 Bard，一个实验性的 AI 聊天服务，通过直接从互联网获取数据来区别于竞争对手，承诺提供新鲜、高质量的答案。Bard 基于 Transformer
    架构，采用了 LaMDA 的精简版本，旨在实现广泛的可访问性，同时利用互联网数据生成回复。'
  raw: '### LLaMA


    Meta AI initiated the LLaMA (Large Language Model Meta AI) project in February
    2023, introducing a series of autoregressive large language models (LLMs) that
    marked a significant advancement in the field. The initial launch featured models
    of varying complexities, including those with 7, 13, 33, and 65 billion parameters.


    Impressively, the 13-billion-parameter version outperformed the vastly larger
    GPT-3, which consists of 175 billion parameters, across numerous NLP benchmarks,
    while the largest LLaMA model showed competitive results against leading models
    like PaLM and Chinchilla.^([^(45)](#fn45)) Unlike previous high-capacity LLMs
    that were typically available through restricted APIs, Meta took an unprecedented
    step by making LLaMA’s models openly accessible to researchers under a noncommercial
    license, although the model weights were leaked online shortly after their release.


    In July 2023, Meta further expanded its LLaMA offerings with the introduction
    of LLaMA 2, developed in collaboration with Microsoft. This next iteration included
    models with 7, 13, and 70 billion parameters,^([^(46)](#fn46)) and although the
    architectural foundation remained similar to the first version, the data used
    for training was expanded by 40%. Meta’s strategy involved not only releasing
    foundational models but also versions fine-tuned for dialog, dubbed LLaMA-2 Chat,
    which were made available for broad commercial use, albeit with certain restrictions
    that stirred debate regarding their open source status.


    An evaluation by Patronus AI in November 2023 compared LLaMA 2 with other prominent
    AI models like GPT-4 and Anthropic’s Claude 2 in a specialized test, revealing
    strengths and weaknesses in their abilities to process and interpret complex financial
    documents.


    Leveraging the transformer architecture, LLaMA incorporates unique features such
    as the SwiGLU activation function,^([^(47)](#fn47)) rotary positional embeddings,^([^(48)](#fn48))
    and root-mean-squared layer normalization^([^(49)](#fn49)) to enhance its performance,
    instead of standard layer normalization. The LLaMA 2 series further increased
    its context length capability, underscoring Meta’s continuous efforts to push
    the boundaries of LLM efficiency and effectiveness.


    Training for these models prioritized the augmentation of data volume over parameter
    count, with the LLaMA 1 models being trained on a dataset comprising 1.4 trillion
    tokens from diverse and publicly accessible sources. The LLaMA 2 models benefited
    from an even larger dataset, meticulously curated to enhance reliability and minimize
    privacy concerns, alongside specialized fine-tuning to optimize dialog interactions
    and ensure AI alignment through innovative training methods.


    This evolution from LLaMA to LLaMA 2 not only showcases Meta’s commitment to advancing
    AI technology but also emphasizes its intention to make powerful LLMs more accessible
    and applicable across a range of uses, setting a new standard in the development
    and deployment of language models.


    ### LaMDA


    Introduced by Google as the next iteration following Meena in 2020, LaMDA made
    its debut at the Google I/O keynote in 2021, with its advancement revealed in
    the subsequent year. This conversational AI model distinguishes itself by its
    capacity for engaging in unrestricted dialogues.


    The development of LaMDA involved a comprehensive and detailed training regime,
    utilizing an enormous collection of documents, dialogues, and verbal exchanges
    that total over 1.56 trillion words. This extensive dataset facilitated LaMDA’s
    understanding of diverse conversational dynamics.


    Critical to refining LaMDA’s performance were human evaluators, who assessed the
    model’s outputs. Their assessments, grounded in search engine validations, were
    instrumental in enhancing LaMDA’s precision and informational accuracy. These
    evaluations were based on the responses’ usefulness, accuracy, and adherence to
    facts.


    LaMDA’s prowess emerges from its capacity to produce spontaneous conversations
    that aren’t limited to specific tasks. It is adept at recognizing and adapting
    to various user intents, applying reinforcement learning techniques, and fluidly
    moving between topics without any apparent connection.


    LaMDA builds upon **Google’s BERT and transformer models**, with a specific emphasis
    on dialogue-driven tasks. It diverges from traditional NLP models that rely on
    written texts by training on a varied set of conversational data, including both
    text and audio recordings from real-life interactions.


    A standout feature of LaMDA is its adeptness at generating responses tailored
    to the context of open-ended inquiries. It comprehends the underlying intent of
    user questions and crafts replies that reflect the ongoing conversation’s context.
    For instance, LaMDA can tailor its responses about a particular movie by considering
    the user’s past interactions and preferences alongside the broader conversational
    context.


    Beyond dialogue systems, Google envisions LaMDA’s utility extending to search
    and information retrieval, promising more pertinent, context-aware outcomes.


    LaMDA signifies a leap forward in conversational AI, poised to markedly enhance
    human-machine interaction quality. Nevertheless, it raises concerns regarding
    privacy and the potential for unforeseen consequences, underscoring the need for
    vigilant oversight of its development and application.


    LaMDA employs a transformer-based architecture tailored for dialogue modeling,
    consisting of an encoder for input processing and a decoder for response generation.
    The encoder utilizes self-attention layers to understand text relationships, capturing
    both immediate and overarching conversational contexts. The decoder, informed
    by the input, crafts context-specific replies through an additional attention
    mechanism focusing on relevant input text segments.


    Incorporating features like multi-turn conversation handling and named entity
    recognition, LaMDA is engineered for richer, more relevant dialogue interactions.
    Its architecture facilitates nuanced conversations, setting a new standard for
    dialogue AI.


    Google announced LaMDA 2 at its 2022 developer conference, showcasing an enhanced
    version of the AI system. Trained on extensive dialogue data, LaMDA 2 promises
    more natural, accurate, and safe conversations. Demonstrations highlighted its
    creative and on-topic response capabilities, alongside “List It,” a feature for
    breaking down complex topics into actionable insights.


    Google also introduced Bard, an experimental AI chat service, distinguishing itself
    from competitors by sourcing data directly from the Internet, promising fresh,
    high-quality answers. Based on the transformer architecture, Bard employs a streamlined
    version of LaMDA, aiming for widespread accessibility while leveraging Internet
    data for responses.'
