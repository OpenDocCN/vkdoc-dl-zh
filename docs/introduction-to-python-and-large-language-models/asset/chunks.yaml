  trans: '

    # 首个聊天机器人：`ELIZA`


    语言模型的探索可追溯至 20 世纪 50 年代，当时研究人员致力于研究基于规则的语言处理系统。早期的尝试因需要手动构建语法规则而受阻。


    1966 年，约瑟夫·维森鲍姆^(⁴)推出了“`ELIZA`”程序（图 1-1），这标志着一次重大突破。`ELIZA` 是最早能够通过聊天和问答与人类互动的计算机程序之一。作为一个模拟罗杰斯式心理治疗师的程序，`ELIZA`
    通过文本对话与用户交流，堪称对话模拟的开创性范例。然而，`ELIZA` 的交互严重依赖预定义模式，缺乏对语言细微差别的真正理解。


    ![](img/613844_1_En_1_Fig1_HTML.jpg)


    图 1-1


    “`ELIZA`”程序，来源：维基百科


    `ELIZA` 于 1966 年诞生于麻省理工学院，使用 `LISP-MAD` 语言编写。它利用知识数据库，在响应用户查询时识别排名最高的关键词，然后通过脚本提供的转换规则对句子模式进行处理。一个流行的脚本示例名为
    `DOCTOR`。`ELIZA` 的成功激励了研究人员扩展这一思路，并开发其他基于规则的聊天机器人系统。


    在 `ELIZA` 问世后的一段时间里，研究人员对基于规则的聊天机器人程序给予了显著关注。随后几年中，出现了多个类似系统，如 `PARRY`、`ALICE`、`CLEVER`、`SHRDLU`
    等。这些早期的基于规则聊天机器人系统的特点是简单，且依赖手动编写的规则和脚本中定义的句子模式。因此，这些程序的知识库和功能仅限于预定义的规则和信息。


    在随后的几十年里，随着更复杂的基于规则系统的发展，语言理解能力的提升取得了进展。尽管有所进步，但这些系统仍难以应对人类语言的复杂性，无法捕捉上下文细微差别并适应多样化的语言表达。研究人员日益认识到，必须从僵化的基于规则方法转向能够从数据中学习和泛化的模型。这一转变催生了统计语言处理技术，如
    n-gram 和隐马尔可夫模型，为更精细的语言分析打开了大门。


    这一区别也凸显了早期基于规则的聊天机器人程序与基于神经网络和大语言模型（LLM）的当代先进模型之间的显著差异。另一类早期语言模型依赖于信息检索（IR）技术。在这种方法中，聊天机器人通过匹配预构建对话对数据库中的模式来生成回复。以
    20 世纪 80 年代末的 `CleverBot` 为例的基于信息检索的聊天机器人，受益于词频-逆文档频率（`TF-IDF`）、余弦相似度以及词级别的状态空间模型等技术。


    ## 统计语言处理


    尽管语言建模领域的一些早期设计和模型在当今先进的架构中已显过时，但某些基础技术已成为当代语言模型及更广泛机器学习方法中不可或缺的组成部分。自然语言处理的关键构建模块包括
    n-gram、词袋（`BOW`）和 `TF-IDF`。


    ### N-gram


    n-gram 模型在 20 世纪 90 年代和 21 世纪初的引入，标志着统计语言建模的关键进步。这些模型基于一个简单而强大的概念，通过检查序列中前一个词来评估某个词出现的可能性。


    尽管本质简单，n-gram 模型为理解语言中的上下文提供了一种关键机制。它们表示数据样本中 n 个相邻项目的序列，例如句子中的单词。通过关注词与词之间的局部关系，这些模型开始捕捉构成有意义语言表达的内在依赖关系。


    尽管简单，n-gram 在基于前 n-1 个词预测第 n 个词的概率方面发挥了关键作用。这一概念在基础语言建模和更复杂模型的发展中都至关重要。


    注意


    谷歌 PageRank 算法


    *n-gram 的一个显著应用出现在 1996 年谷歌开创性的 PageRank*^(⁵) *算法中。该算法通过使用 n-gram 分析评估网页中词语的共现情况，从而有效排序网页的相关性，彻底改变了网络搜索。这一创新应用展示了
    n-gram 模型在超越语言处理的现实场景中的多功能性。N-gram 模型不仅强调了上下文信息在语言中的重要性，还为开发能够捕捉更广泛语言细微差别的更复杂技术铺平了道路。*

    '
- fmt: '### Bag-of-Words (BOW)


    Another fundamental technique in language modeling is the bag-of-words (BOW).
    This simple approach represents elements of language as numerical values based
    on word frequency in a document. Essentially, BOW^([⁶](#fn6)) utilizes word frequency
    to create fixed-length vectors for document representation.


    Although straightforward, BOW has been a foundational vectorization or embedding
    technique. Modern language models often build upon advanced word embedding and
    tokenization techniques.


    The BOW model represents a method for converting a document into numerical form,
    a prerequisite before employing it in a machine learning algorithm. In any natural
    language processing task, this initial conversion is essential as machine learning
    algorithms cannot operate on raw text; thus, we must transform the text into a
    numerical representation, a process known as `text embedding`.


    Text embedding involves two primary approaches: word vectors and document vectors.
    In the word vectors approach, each word in the text is represented as a vector
    (a sequence of numbers), and the entire document is then converted into a sequence
    of these word vectors. Conversely, document vectors embed the entire document
    as a single vector, simplifying the process compared to individual word embedding.


    Moreover, it ensures that all documents are embedded in the same size, a convenience
    for machine learning algorithms that often require a fixed-size input. For instance,
    with a vocabulary of 1000 words, the document is expressed as a 1000-dimensional
    vector, where each entry signifies the frequency of the corresponding vocabulary
    word in the document.


    While this technique may be limited for complex tasks, it serves well for simpler
    classification problems. Its simplicity and ease of use make it an appealing choice
    for embedding a set of documents and applying various machine learning algorithms.
    The BOW model offers easy implementation and swift execution.


    Unlike other embedding methods that often demand specialized domain knowledge
    or extensive pre-training, this approach avoids such complexities or even manual
    feature engineering. It essentially works out of the box. However, its efficacy
    is limited to relatively simple tasks that do not rely on understanding the contextual
    nuances of words.


    The typical application of the bag-of-words model is in embedding documents for
    classifier training. Classification tasks involve categorizing documents into
    multiple types, and the model’s features are particularly effective for tasks
    like spam filtering, sentiment analysis, and language identification.


    For instance, spam emails can be identified based on the frequency of key phrases
    like “act now” and “urgent reply,” while sentiment analysis can discern positive
    or negative tones using terms like “boring” and “awful” vs. “beautiful” and “spectacular.”
    Additionally, language identification becomes straightforward when examining the
    vocabulary.


    Once documents are embedded, they can be fed into a classification algorithm.
    Common choices include the naive Bayes classifier, logistic regression, or decision
    trees/random forests `–` options that are relatively straightforward to implement
    and understand compared to more complex neural network solutions.


    ### TF-IDF (Term Frequency-Inverse Document Frequency)


    TF-IDF^([⁷](#fn7)) is yet another statistical measure that leverages word frequency
    to evaluate the relevance of a word in a given set of documents. In comparison
    to bag-of-words, TF-IDF is more advanced as it employs two distinct metrics to
    quantify the relationship between words and documents in a more precise manner.


    TF-IDF finds applications in information retrieval and text mining, particularly
    in tasks like searching for keywords in documents. It is also a valuable tool
    in natural language processing applications and language models. Term frequency-inverse
    document frequency (TF-IDF) also stands as a widely employed statistical method
    in gauging the significance of a term within a document relative to an entire
    document collection, known as a corpus.


    In the process of text vectorization, words within a text document are converted
    into importance scores, and TF-IDF represents one of the most prevalent scoring
    schemes. Essentially, TF-IDF scores a word by multiplying its term frequency (TF)
    with the inverse document frequency (IDF).


    Term frequency (TF) measures the frequency of a term within a document relative
    to the total number of words in that document.


    ![](images/613844_1_En_1_Chapter/613844_1_En_1_Figa_HTML.png)


    On the other hand, inverse document frequency (IDF) assesses the proportion of
    documents in the corpus that contain the term. Terms unique to a small percentage
    of documents, such as technical jargon terms, receive higher IDF values compared
    to common words found across all documents, like “a,” “the,” and “and.”


    ![](images/613844_1_En_1_Chapter/613844_1_En_1_Figb_HTML.png)


    The TF-IDF score for a term is determined by the multiplication of its TF and
    IDF scores. In simpler terms, a term holds high importance when it appears frequently
    in a specific document but infrequently across others. This balance between commonality
    within a document, measured by TF, and rarity between documents, measured by IDF,
    results in the TF-IDF score, indicating the term’s significance for a document
    in the corpus.


    ![](images/613844_1_En_1_Chapter/613844_1_En_1_Figc_HTML.png)


    TF-IDF finds applications in various natural language processing tasks, including
    search engines, where it is used to rank document relevance for a query. It is
    also applied in text classification, text summarization, and topic modeling.


    It is important to note that different approaches exist for calculating the IDF
    score. The calculation often involves using the base 10 logarithm, although some
    libraries may opt for a natural logarithm. Additionally, adding one to the denominator
    is a common practice to prevent division by zero.'
