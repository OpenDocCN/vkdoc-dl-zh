- fmt: "# Python File Opening\n\nBefore performing any file operations, such as reading\
    \ or writing, the initial step is to open the file. To achieve this, Python provides\
    \ the built-in function `open()`. However, during the file’s opening, it is crucial\
    \ to specify the mode, which indicates the purpose of opening the file.\n\n**Example:**\n\
    \nCreate and put the file `example.txt` in the same folder of your `.py` file.\n\
    \n**My `example.txt` contains the following:**\n\n> *Lorem Ipsum is simply dummy\
    \ text of the printing and typesetting industry. Lorem Ipsum has been the industry’s\
    \ standard dummy text ever since the 1500s, when an unknown printer took a galley\
    \ of type and scrambled it to make a type specimen book. It has survived not only\
    \ five centuries, but also the leap into electronic typesetting, remaining essentially\
    \ unchanged. It was popularised in the 1960s with the release of Letraset sheets\
    \ containing Lorem Ipsum passages, and more recently with desktop publishing software\
    \ like Aldus PageMaker including versions of Lorem Ipsum.*\n\nIf we follow the\
    \ tree structure, then the files should be as follows:\n\n```\n├── example.txt\n\
    └── test.py\n```\n\n```\n# Specify the file path (replace with the actual file\
    \ path)\nfile_path = \"example.txt\"\ntry:\n    # Open the file and read its contents\n\
    \    file = open(file_path, 'r')\n    file_contents = file.read()\n    # Print\
    \ the file contents\n    print(file_contents)\n    # Close the file\n    file.close()\n\
    except FileNotFoundError:\n    print(f\"The file '{file_path}' was not found.\"\
    )\nexcept IOError:\n    print(f\"An error occurred while reading the file '{file_path}'.\"\
    )\n```\n\n**Output:**\n\n```\nLorem Ipsum is simply dummy text of the printing\
    \ and typesetting industry. Lorem Ipsum has been the industry's standard dummy\
    \ text ever since the 1500s, when an unknown printer took a galley of type and\
    \ scrambled it to make a type specimen book. It has survived not only five centuries,\
    \ but also the leap into electronic typesetting, remaining essentially unchanged.\
    \ It was popularized in the 1960s with the release of Letraset sheets containing\
    \ Lorem Ipsum passages, and more recently with desktop publishing software like\
    \ Aldus PageMaker including versions of Lorem Ipsum.\n```\n\n**The following modes\
    \ are supported:**\n\n*   `r`: Opens an existing file for reading.\n*   `w`: Opens\
    \ an existing file for writing. If the file already contains data, it will be\
    \ overwritten. If the file doesn’t exist, it will be created.\n*   `a`: Opens\
    \ an existing file for append operation. It won’t overwrite existing data.\n*\
    \   `r+`: Allows reading and writing data into the file. Existing data in the\
    \ file will be overwritten.\n*   `w+`: Enables writing and reading data. It will\
    \ overwrite existing data.\n*   `a+`: Permits appending and reading data from\
    \ the file. It won’t overwrite existing data.\n\n## Working in Read Mode\n\nThere\
    \ are multiple approaches to reading from a file in Python. Let’s explore how\
    \ we can retrieve the contents of a file when it’s opened in read mode.\n\n**In\
    \ the following example, we’ll open the file `test.txt` with the following content:**\n\
    \n*Lorem Ipsum is simply dummy text of the printing and typesetting industry.\
    \ Lorem Ipsum has been the industry’s standard dummy text ever since the 1500s,\
    \ when an unknown printer took a galley of type and scrambled it to make a type\
    \ specimen book. It has survived not only five centuries, but also the leap into\
    \ electronic typesetting, remaining essentially unchanged. It was popularised\
    \ in the 1960s with the release of Letraset sheets containing Lorem Ipsum passages,\
    \ and more recently with desktop publishing software like Aldus PageMaker including\
    \ versions of Lorem Ipsum.*\n\n**Example:**\n\n```\n# Open a file named \"test.txt\"\
    \ in reading mode ('r')\nfile = open('test.txt', 'r')\n# Print each line from\
    \ the file one by one\nfor line in file:\n    print(line, end='')  # Print each\
    \ line without adding extra newlines\n# Close the file\nfile.close()\n```\n\n\
    **Output:**\n\n```\nLorem Ipsum is simply dummy text of the printing and typesetting\
    \ industry. Lorem Ipsum has been the industry's standard dummy text ever since\
    \ the 1500s, when an unknown printer took a galley of type and scrambled it to\
    \ make a type specimen book. It has survived not only five centuries, but also\
    \ the leap into electronic typesetting, remaining essentially unchanged. It was\
    \ popularised in the 1960s with the release of Letraset sheets containing Lorem\
    \ Ipsum passages, and more recently with desktop publishing software like Aldus\
    \ PageMaker including versions of Lorem Ipsum.\n```\n\n**Example:**\n\n```\n#\
    \ Python code to demonstrate the read() mode\nfile = open(\"test.txt\", \"r\"\
    )\nprint(file.read())\n```\n\n**Output:**\n\n```\nLorem Ipsum is simply dummy\
    \ text of the printing and typesetting industry. Lorem Ipsum has been the industry's\
    \ standard dummy text ever since the 1500s, when an unknown printer took a galley\
    \ of type and scrambled it to make a type specimen book. It has survived not only\
    \ five centuries, but also the leap into electronic typesetting, remaining essentially\
    \ unchanged. It was popularised in the 1960s with the release of Letraset sheets\
    \ containing Lorem Ipsum passages, and more recently with desktop publishing software\
    \ like Aldus PageMaker including versions of Lorem Ipsum.\n```\n\n**Example:**\n\
    \n```\n# Python code to illustrate with()\nwith open(\"geeks.txt\") as file:\n\
    \    data = file.read()\nprint(data)\n```\n\n**Output:**\n\n```\nLorem Ipsum is\
    \ simply dummy text of the printing and typesetting industry. Lorem Ipsum has\
    \ been the industry's standard dummy text ever since the 1500s, when an unknown\
    \ printer took a galley of type and scrambled it to make a type specimen book.\
    \ It has survived not only five centuries, but also the leap into electronic typesetting,\
    \ remaining essentially unchanged. It was popularized in the 1960s with the release\
    \ of Letraset sheets containing Lorem Ipsum passages, and more recently with desktop\
    \ publishing software like Aldus PageMaker including versions of Lorem Ipsum.\n\
    ```\n\nIn Python, it’s possible to split lines while reading files. The `split()`\
    \ function is used to divide a string into parts when a space is encountered by\
