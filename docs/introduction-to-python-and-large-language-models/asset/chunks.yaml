  trans: "\n# 字符串定界符与特性\n\n在 Python 中，你可以使用单引号或双引号来定义字符串字面量。起始定界符与对应结束定界符之间包含的任何字符都被视为字符串的一部分。Python\
    \ 对字符串的长度没有严格限制，只要机器内存资源允许，它可以包含任意数量的字符。此外，字符串甚至可以是空的。\n\n*当需要将引号本身作为字符串的一部分包含进来时，该如何处理？*\
    \ 正如你所见，直接的方法会遇到问题。在给定的示例中，字符串以单引号开头，导致 Python 将括号内的下一个单引号解释为结束定界符，无意中将其视为字符串的一部分。因此，最后一个单引号变成了多余的字符，导致语法错误：\n\
    \n```\n>>> print('This is a single quote (') character.')\nSyntaxError: invalid\
    \ syntax\n```\n\n要在字符串中包含任何一种引号，一个简单有效的方法是使用相反类型的引号将字符串括起来。*如果你想包含单引号，就用双引号将字符串括起来；反之，如果需要包含双引号，就用单引号将字符串括起来。*\
    \ 这种方法可以确保所需的引号被正确解释为字符串的一部分。\n\n```\n>>> print(\"This contains a single quote\
    \ (') character.\")\nThis string contains a single quote (') character.\n>>> print('This\
    \ contains a double quote (\") character.')\nThis string contains a double quote\
    \ (\") character.\n```\n\n## 处理字符串中的特殊字符\n\n在某些情况下，你可能需要 Python 以不同的方式解释字符串中的特定字符。\n\
    \n**这可以通过两种方式实现：**\n\n- **抑制特殊解释：** 你可能希望阻止某些字符在字符串中具有其通常的特殊含义。\n- **应用特殊解释：**\
    \ 或者，你可能希望赋予通常按字面意义处理的字符以特殊含义。\n\n为此，你可以使用反斜杠（`\\`）字符。当反斜杠出现在字符串中时，它表示紧随其后的一个或多个字符应以特殊方式处理。这种机制被称为“转义序列”，因为反斜杠导致后续字符序列偏离其标准解释。\n\
    \n```\n>>> print('String contains a single quote (') character.')\nSyntaxError:\
    \ invalid syntax\n>>> print('String contains a single quote (\\') character.')\n\
    This string contains a single quote (') character.\n```\n\n### 原始字符串\n\n要表示原始字符串字面量，你可以使用前缀\
    \ `r` 或 `R`，这表示字符串中的转义序列将保持不变。这意味着反斜杠字符不会被解释为转义字符：\n\n**原始字符串：**\n\n```\nprint(r'foo\\\
    nbar')\nfoo\\nbar\n```\n\n**原始字符串：**\n\n```\nprint(R'foo\\\\bar')\nfoo\\\\bar\n\
    ```\n\n在原始字符串中，反斜杠不被视为转义字符，从而保留其字面表示。\n\n## Python 中的三引号字符串\n\nPython 提供了另一种定义字符串的方法，称为三引号字符串。这些字符串由三个连续的单引号（`'''`）或三个连续的双引号（`\"\
    \"\"`）括起来。虽然转义序列在三引号字符串中仍然有效，但你可以包含单引号、双引号甚至换行符而无需转义。此功能简化了包含单引号和双引号的字符串的创建：\n\
    \n例如：\n\n```\nprint('''This string has a single (') and a double (\") quote.''')\n\
    This string has a single (') and a double (\") quote.\n```\n\n在三引号字符串中，包含单引号和双引号不需要转义字符，使其成为此类场景的便捷选择。\n\
    \n# 布尔值与运算符\n\n## 布尔值\n\nPython 布尔类型是 Python 编程语言中内置的基本数据类型之一。其主要目的是传达给定表达式的真值，辅助逻辑评估。例如，表达式\
    \ `1 <= 2` 计算结果为 `True`，而 `0 == 1` 计算结果为 `False`。*全面理解 Python 布尔值的工作原理对于有效的 Python\
    \ 编程至关重要。*\n\n**Python 的布尔类型仅包含两个可能的值：**\n\n- `True`\n- `False`\n\nPython 中没有其他值属于\
    \ `bool` 类型。你可以通过使用内置的 `type()` 函数来确定 `True` 和 `False` 的类型：\n\n```\n>>> type(False)\n\
    <class 'bool'>\n>>> type(True)\n<class 'bool'>\n```\n\n*输出 `<class 'bool'>` 表明该变量是布尔数据类型。*\
    \ 值得注意的是，`bool` 类型是 Python 的内在组成部分，无需导入外部库。然而，名称 `bool` 本身并不是 Python 语言中的保留关键字。\n\
    \n**注意**\n\nPython 中的 `True` 和 `False`\n\n*Python 中的关键字 `True` 和 `False` 必须始终以大写字母开头。尝试使用小写的\
    \ `true` 或 `false` 会导致错误。*\n\n```\n>>> x = true\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'true' is not defined\n\
    ```\n\n## 将整数和浮点数转换为布尔值\n\n在 Python 中，你可以通过使用内置的 `bool()` 函数将整数和浮点数转换为布尔值。当整数、浮点数或复数的值为零时，它会产生布尔结果\
    \ `False`。相反，如果该数字设置为任何其他非零值（无论是正数还是负数），它都会计算为 `True`。\n\n**例如：**\n\n```\nzero_int\
    \ = 0\nbool(zero_int)\n# 输出: False\npos_int = 1\nbool(pos_int)\n# 输出: True\nneg_flt\
    \ = -5.1\nbool(neg_flt)\n# 输出: True\n```\n\n## 布尔运算符\n\n布尔运算围绕对真值和假值逻辑值的操作与组合展开。在\
    \ Python 中，布尔值表示为 `True` 或 `False`，你可以使用布尔运算符对它们执行操作。\n\n**Python 中常用的布尔运算符如下：**\n\
    \n- `or`\n- `and`\n- `not`\n- `==`（等于）\n- `!=`（不等于）\n\n在以下代码段中，两个变量 `A` 和 `B`\
    \ 分别被赋值为布尔值 `True` 和 `False`。随后，使用布尔运算符对这些布尔值执行各种操作：\n\n```\nA = True\nB = False\n\
    A or B       # 结果: True\nA and B      # 结果: False\nnot A        # 结果: False\n\
    not B        # 结果: True\nA == B       # 结果: False\nA != B       # 结果: True\n```\n\
    \n此外，你可以通过组合布尔运算符并使用括号确定优先级来创建复杂的布尔表达式：\n\n```\nC = False\nA or (C and B)    #\
    \ 结果: True\n(A and B) or C    # 结果: False\n```\n\n表 3-2 总结了布尔运算和布尔运算符。\n\n**表\
    \ 3-2** 布尔运算\n\n| A | B | 非 A | 非 B | A == B | A != B | A 或 B | A 与 B |\n|---|---|---|---|---|---|---|---|\n\
    | T | F | F | T | F | T | T | F |\n| F | T | T | F | F | T | T | F |\n| T | T\
    \ | F | F | T | F | T | T |\n| F | F | T | T | T | F | F | F |\n\n## Python 运算符\n\
    \n运算符是用于对值和变量执行操作的特殊符号。它们包含一组专用于执行算术和逻辑计算的独特符号。运算符作用的对象称为操作数。\n"
- fmt: '#### Arithmetic Operators


    In Table [3-3](#613844_1_En_3_Chapter.xhtml#Tab3), Python arithmetic operators
    serve the purpose of executing mathematical operations, including addition, subtraction,
    multiplication, and division.


    **Table 3-3** Python arithmetic operators


    | Operator | Description | Syntax |

    | --- | --- | --- |

    | `+` | Addition: adds two operands | `x + y` |

    | `–` | Subtraction: subtracts two operands | `x – y` |

    | `*` | Multiplication: multiplies two operands | `x * y` |

    | `/` | Division (float): divides the first operand by the second | `x / y` |

    | `//` | Division (floor): divides the first operand by the second | `x // y`
    |

    | `%` | Modulus: returns the remainder when the first operand is divided by the
    second | `x % y` |

    | `**` | Power (Exponent): Returns first raised to power second | `x ** y` |


    **Example:**


    ```

    >>> a = 3

    >>> b = 2

    >>> print(a + b)

    >>> print(a - b)

    >>> print(a * b)

    >>> print(a % b)

    >>> print(a ** b)

    ```


    **There are two types of division operators:**


    - Float division

    - Floor division


    **Float Division Example:**


    ```

    >>> print(5/5)

    >>> print(10/2)

    >>> print(-10/2)

    >>> print(20.0/2)

    ```


    **Output:**


    ```

    1.0

    5.0

    -5.0

    10.0

    ```


    **Floor Division Example:**


    ```

    >>> print(10//3)

    >>> print(-5//2)

    >>> print(5.0//2)

    >>> print(-5.0//2)

    ```


    **Output:**


    ```

    2.0

    -3.0

    ```


    #### Comparison Operators


    Table [3-4](#613844_1_En_3_Chapter.xhtml#Tab4) shows a comparison using relational
    operators involving evaluating values and produces a result of either `True` or
    `False`, depending on whether the condition is met or not.


    **Table 3-4** Relational operators comparison


    | Operator | Description | Syntax |

    | --- | --- | --- |

    | `>` | Greater than: `True` if the left operand is greater than the right | `x
    > y` |

    | `<` | Less than: `True` if the left operand is less than the right | `x < y`
    |

    | `==` | Equal to: `True` if both operands are equal | `x == y` |

    | `!=` | Not equal to: `True` if operands are not equal | `x != y` |

    | `>=` | Greater than or equal to: `True` if the left operand is greater than
    or equal to the right | `x >= y` |

    | `<=` | Less than or equal to: `True` if the left operand is less than or equal
    to the right | `x <= y` |


    **Example:**


    ```

    >>> a = 5

    >>> b = 3

    >>> print(a > b)

    True

    >>> print(a < b)

    False

    >>> print(a == b)

    False

    >>> print(a != b)

    True

    >>> print(a >= b)

    True

    >>> print(a <= b)

    False

    ```


    #### Logical Operators


    Within the realm of Python, logical operators come into play when handling conditional
    statements, which typically revolve around either `True` or `False` outcomes,
    presented in Table [3-5](#613844_1_En_3_Chapter.xhtml#Tab5). These operators are
    responsible for executing logical AND, logical OR, and logical NOT operations.


    **Table 3-5** Python logical operators


    | Operator | Description | Syntax | Example |

    | --- | --- | --- | --- |

    | `and` | Returns `True` if both the operands are true | `x and y` | `x>5 and
    x>7` |

    | `or` | Returns `True` if either of the operands is true | `x or y` | `x<7 or
    x>21` |

    | `not` | Returns `True` if the operand is false | `not x` | `not(x>11 and x>21)`
    |


    **Example:**


    ```

    >>> a = True

    >>> b = False

    >>> print(a and b)

    False

    >>> print(a or b)

    True

    >>> print(not a)

    False

    ```


    #### Bitwise Operators


    Python’s bitwise operators, presented in Table [3-6](#613844_1_En_3_Chapter.xhtml#Tab6),
    function at the level of individual bits and execute operations that involve the
    manipulation of bits themselves. They find their utility in working with binary
    numbers.


    **Table 3-6** Bitwise operators


    | Operator | Description | Syntax |

    | --- | --- | --- |

    | `&` | Bitwise AND | `x & y` |

    | `|` | Bitwise OR | `x | y` |

    | `~` | Bitwise NOT | `~x` |

    | `^` | Bitwise XOR | `x ^ y` |

    | `>>` | Bitwise right shift | `x>>` |

    | `<<` | Bitwise left shift | `x<<` |


    **Example:**


    ```

    >>> a = 10

    >>> b = 4

    >>> print(a & b)

    >>> print(a | b)

    >>> print(~a)

    >>> print(a ^ b)

    >>> print(a >> 2)

    >>> print(a << 2)

    ```


    #### Assignment Operators


    Assignment operators in Python, represented in Table [3-7](#613844_1_En_3_Chapter.xhtml#Tab7),
    serve the purpose of assigning values to variables.


    **Table 3-7** Assignment operators


    | Operator | Description | Syntax |

    | --- | --- | --- |

    | `=` | Assign the value of the right side of the expression to the left-side
    operand | `x = y + z` |

    | `+=` | Add AND: Add right-side operand with left-side operand and then assign
    to left operand | `a+=b` `a=a+b` |

    | `-=` | Subtract AND: Subtract right operand from left operand and then assign
    to left operand | `a-=b` `a=a-b` |

    | `*=` | Multiply AND: Multiply right operand with left operand and then assign
    to left operand | `a*=b` `a=a*b` |

    | `/=` | Divide AND: Divide left operand with right operand and then assign to
    left operand | `a/=b` `a=a/b` |

    | `%=` | Modulus AND: Take modulus using left and right operands and assign the
    result to left operand | `a%=b` `a=a%b` |

    | `//=` | Divide(floor) AND: Divide left operand with right operand and then assign
    the value(floor) to left operand | `a//=b` `a=a//b` |

    | `**=` | Exponent AND: Calculate exponent(raise power) value using operands and
    assign value to left operand | `a**=b` `a=a**b` |

    | `&=` | Perform Bitwise AND on operands and assign value to left operand | `a&=b`
    `a=a&b` |

    | `|=` | Perform Bitwise OR on operands and assign value to left operand | `a|=b`
    `a=a|b` |

    | `^=` | Perform Bitwise XOR on operands and assign value to left operand | `a^=b`
    `a=a^b` |

    | `>>=` | Perform Bitwise right shift on operands and assign value to left operand
    | `a>>=b` `a=a>>b` |

    | `<<=` | Perform Bitwise left shift on operands and assign value to left operand
    | `a <<= b` `a= a << b` |


    **Example:**


    ```

    >>> a = 10

    >>> b = a

    >>> print(b)

    >>> b += a

    >>> print(b)

    >>> b -= a

    >>> print(b)

    >>> b *= a

    >>> print(b)

    >>> b >>= a

    >>> print(b)

    ```


    #### Identity Operators


    In Python, `is` and `is not` are identity operators employed to verify whether
    two values occupy the same memory location as shown in Table [3-8](#613844_1_En_3_Chapter.xhtml#Tab8).
    It’s important to note that equality between two variables does not necessarily
    imply their identity.


    **Table 3-8** Identity operators


    | Operator | Description |

    | --- | --- |

    | `is` | `True` if the operands are identical |

    | `is not` | `True` if the operands are not identical |


    **Example:**


    ```

    >>> a = 10

    >>> b = 20

    >>> c = a

    >>> print(a is not b)

    True

    >>> print(a is c)

    True

    ```


    #### Membership Operators


    Within Python, the `in` and `not in` operators are categorized as membership operators
    (Table [3-9](#613844_1_En_3_Chapter.xhtml#Tab9)), and their primary function is
    to assess whether a particular value or variable exists within a given sequence.


    **Table 3-9** Membership operators


    | Operator | Description |

    | --- | --- |

    | `in` | `True` if value is found in the sequence |

    | `not in` | `True` if value is not found in the sequence |


    **Example:**


    ```

    >>> x = 21

    >>> y = 10

    >>> list = [10, 20, 30, 40, 50]

    >>> if (x not in list):

    ...    print("x is NOT present in given list")

    >>> else:

    ...    print("x is present in given list")

    >>> x is NOT present in given list

    >>> if (y in list):

    ...    print("y is present in given list")

    >>> else:

    ...    print("y is NOT present in given list")

    >>> y is present in given list

    ```


    #### Ternary Operator


    A Ternary operator, also referred to as conditional expressions, is an operator
    designed to assess a condition as either true or false. It was introduced to Python
    starting from version 2.5. It is a concise way to evaluate a condition in a single
    line, thus replacing the need for a multiline `if-else` statement and resulting
    in more compact code.


    **Syntax:** `[on_true] if [expression] else [on_false]`


    **Example:**


    ```

    >>> a, b = 10, 20

    >>> min = a if a < b else b

    >>> print(min)

    >>> 10

    ```'
