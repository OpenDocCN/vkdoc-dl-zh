  trans: "\n### OpenAI API 的行业应用\n\nOpenAI API 的多功能性体现在其跨行业的广泛应用中：\n\n-   **聊天机器人与虚拟助手：**\
    \ 利用 `GPT-4` 等模型，该 API 能够驱动对话式代理，提供逼真且引人入胜的用户交互，适用于客户服务和互动应用。\n\n-   **情感分析：**\
    \ 通过分析客户反馈或社交媒体帖子等文本数据，该 API 能够提供关于公众情绪和客户满意度的宝贵见解。\n\n-   **图像识别：** 借助 `CLIP`\
    \ 等模型，该 API 将其能力扩展到视觉任务，实现物体检测和图像分类，在从零售到医疗保健等领域都有应用。\n\n-   **文本比较：** OpenAI\
    \ API 提供了一项文本比较功能，该功能利用 `text-embedding-ada-002` 模型，这是一个先进的第二代嵌入模型。该模型通过将文本映射到向量空间并测量这些向量之间的距离，来评估文本片段之间的相似性或差异性。距离越大，文本被认为越不相似。此嵌入功能支持多种应用，包括文本聚类、识别文本间的差异和相关性、生成推荐、分析情感以及执行文本分类，其成本基于处理的文本量计算。虽然\
    \ OpenAI 的文档承认存在第一代嵌入模型，但它强调了最新模型卓越的效率和成本效益。然而，它也提醒用户注意，该模型可能对某些群体表现出社会偏见，这一点已在各种测试中被发现。\n\
    \n-   **代码补全：** 在代码开发方面，OpenAI API 包含一项由 OpenAI Codex 驱动的代码补全服务。OpenAI Codex 是一个先进的模型，在大量的自然语言语料库和来自公开来源的数十亿行代码上进行了训练。该服务目前处于有限的测试阶段，并且在撰写本文时是免费提供的，它支持多种编程语言。该服务依赖\
    \ `code-davinci-002` 和 `code-cushman-001` 等模型，以便根据用户提供的提示插入代码行或生成代码块。虽然 `code-cushman-001`\
    \ 模型以其速度著称，但 `code-davinci-002` 模型因其全面的能力而脱颖而出，尤其是在代码自动补全方面。\n\n-   **游戏与强化学习：**\
    \ 该 API 支持开发能够在游戏环境中导航的 AI，无论是自主游戏还是辅助人类玩家，展示了其在强化学习应用中的潜力。\n\n-   **图像生成：** 这是\
    \ OpenAI API 最直观的功能之一。基于 `DALL-E` 图像模型，OpenAI API 的图像功能提供了用于根据自然语言提示生成、编辑和创建图像变体的端点。虽然它还没有高级功能，但其输出比\
    \ Midjourney 和 Stable Diffusion 等生成式艺术模型更令人印象深刻。在调用图像生成端点时，您只需提供提示词、图像大小和图像数量。但图像编辑端点要求您除了其他参数外，还要包含您希望编辑的图像和一个标记编辑点的\
    \ RGBA 蒙版。另一方面，变体端点只需要目标图像、变体数量和输出尺寸。图像生成端点能够根据文本描述创建独特的视觉效果。使用 `DALL-E 3`，这些图像可以生成为\
    \ `1024x1024`、`1024x1792` 或 `1792x1024` 像素的尺寸。\n\nOpenAI API 是将先进 AI 集成到众多项目中的强大工具，它使机器学习创新得以普及，并促进了智能、响应式和个性化技术的发展。\n\
    \n### 连接到 OpenAI API 的简单示例\n\n该应用程序利用 OpenAI 平台生成指定人物的摘要传记。用户输入他们感兴趣的人名，应用程序向\
    \ OpenAI 的聊天 API 发送请求。该 API 使用 `GPT-4` 模型来理解用户的请求，并生成该人物传记的简洁摘要。然后，摘要传记会显示给用户，为他们提供该人物生平和成就的快速概览。\n\
    \n**示例应用：**\n\n```\npip install openai\nfrom openai import OpenAI\nclient = OpenAI(\n\
    api_key='YOUR API KEY'  # 这也是默认值，可以省略\n)\nperson = input() # 输入您感兴趣的人名。\nresponse\
    \ = client.chat.completions.create(\nmodel=\"gpt-4\",\nmessages=[\n{\"role\":\
    \ \"system\", \"content\": \"你是一个人物传记摘要生成器。\"},\n{\"role\": \"user\", \"content\"\
    : f\"为我总结一下{person}的传记\"},\n]\n)\nprint(response.choices[0].message.content)\n\
    ```\n\n**操作说明**\n\n1.  **使用 pip 安装 OpenAI 包：**\n\n    `pip install openai==1.35.7`\n\
    \n2.  **导入 OpenAI 模块：**\n\n    `from openai import OpenAI`\n\n3.  **使用您的 API 密钥设置\
    \ OpenAI 客户端：**\n\n    ```\n    client = OpenAI(\n    api_key='YOUR API KEY' \
    \ # 这也是默认值，可以省略\n    )\n    ```\n\n4.  **提示用户输入他们感兴趣的人名：**\n\n    `person = input()\
    \ # 输入您感兴趣的人名。`\n\n5.  **向 OpenAI 的聊天 API 发送请求，以总结指定人物的传记：**\n\n    ```\n    response\
    \ = client.chat.completions.create(\n    model=\"gpt-4\",\n    messages=[\n  \
    \  {\"role\": \"system\", \"content\": \"你是一个人物传记摘要生成器。\"},\n    {\"role\": \"\
    user\", \"content\": f\"为我总结一下{person}的传记\"},\n    ]\n    )\n    ```\n\n    使用\
    \ API 密钥设置好 OpenAI 客户端后，Python 脚本会向 OpenAI 的聊天 API 发送请求，以生成指定人物的传记摘要。\n\n    **以下是该请求的详细说明：**\n\
    \    -   **模型选择：** `model` 参数设置为 `\"gpt-4\"`，表示用于生成摘要的 GPT（生成式预训练 Transformer）模型版本。在此例中，指定为\
    \ `\"gpt-4\"`。\n    -   **消息：** `messages` 参数是一个包含两个字典的列表，每个字典代表用户与系统之间对话中的一条消息。\n\
    \        -   第一个字典代表来自系统的一条消息，`role` 设置为 `\"system\"`，`content` 为 `\"你是一个人物传记摘要生成器。\"\
    `。此消息告知 AI 模型对话的上下文。\n        -   第二个字典代表来自用户的一条消息，`role` 设置为 `\"user\"`，`content`\
    \ 使用 f-string 格式化动态生成。它提示 AI 总结指定人物的传记。人物的名字包含在消息的内容中。\n\n    一旦请求发送到 OpenAI API，响应将包含生成的摘要，然后使用\
    \ `print` 语句提取并打印该摘要。\n\n6.  **打印摘要传记：**\n\n    ```\n    print(response.choices[0].message.content)\n\
    \    ```\n"
- fmt: "# Cohere\n\nCohere, established in 2019 and headquartered across Toronto and\
    \ San Francisco with additional offices in Palo Alto and London, operates as a\
    \ global technology enterprise with a focus on artificial intelligence solutions\
    \ for businesses, particularly through the development of sophisticated large\
    \ language models. The company’s inception was the collective effort of founders\
    \ `Aidan Gomez`, `Ivan Zhang`, and `Nick Frosst`, all of whom share an academic\
    \ background from the University of Toronto.\n\nThe roots of Cohere trace back\
    \ to a transformative moment in AI research when, in 2017, Gomez, as part of the\
    \ Google Brain team, co-authored the groundbreaking paper “Attention is All You\
    \ Need,” introducing the transformer model that revolutionized natural language\
    \ processing tasks. This pioneering work laid the groundwork for Cohere’s establishment\
    \ by Gomez, Frosst, and Zhang, who previously collaborated at `FOR.ai`.\n\nSince\
    \ its launch, Gomez has led Cohere as CEO, with the company marking a significant\
    \ milestone by appointing Martin Kon, the former CFO of YouTube, as president\
    \ and COO in late 2022. Cohere’s technological advancements have garnered significant\
    \ support, including a strategic partnership with Google Cloud in 2021 to leverage\
    \ Google’s infrastructure and TPUs for product development.\n\nCohere’s commitment\
    \ to innovation is further evident in the June 2022 establishment of Cohere For\
    \ AI, a nonprofit research initiative aimed at advancing open source machine learning\
    \ research under the leadership of Sara Hooker, formerly of `Google Brain`. The\
    \ company also made strides in language processing with a multilingual model capable\
    \ of understanding over 100 languages, a significant achievement in making non-English\
    \ language processing more accessible.\n\nCollaborations with Oracle, McKinsey,\
    \ and LivePerson throughout 2023 have expanded Cohere’s footprint in offering\
    \ generative AI services and customized language models to businesses, enhancing\
    \ automation and operational efficiency across various industries. Furthermore,\
    \ Cohere’s proactive engagement with ethical AI practices is demonstrated by its\
    \ adherence to voluntary measures laid out by the White House and Canada’s code\
    \ of conduct for AI development and management.\n\nPositioned as a contender to\
    \ OpenAI, Cohere’s technology suite serves enterprises seeking to implement AI\
    \ for a range of applications, from chatbots and search engines to content moderation\
    \ and data analysis. The platform’s API facilitates integration with major cloud\
    \ services, ensuring versatility and broad application.\n\n## Cohere Models\n\n\
    Cohere offers a diverse array of models tailored to meet a broad spectrum of needs.\
    \ For those seeking a more bespoke solution, there is the option to custom-train\
    \ a model to align precisely with particular requirements.\n\n### Command\n\n\
    The Command model serves as Cohere’s primary generation tool, designed to interpret\
    \ and execute textual commands or prompts from users. This model is not only adept\
    \ at generating text in response to instructions but also possesses conversational\
    \ abilities, making it ideal for powering chat-based applications.\n\n### Embed\n\
    \nThe Embed models provide functionality for generating text embeddings or for\
    \ classifying text according to a set of criteria. These embeddings are useful\
    \ for a range of tasks, such as measuring the semantic similarity between sentences,\
    \ selecting the sentence most likely to succeed another, or sorting user feedback\
    \ into categories.\n\nAdditionally, the Classify function within the Embed models\
    \ supports various classification or analytical tasks. The Representation model\
    \ enhances these capabilities with additional support functions, including language\
    \ detection for inputs.\n\n### Rerank\n\nLastly, the Rerank model is designed\
    \ to refine and optimize the outputs of existing models by reordering their results\
    \ based on specific criteria. This functionality is particularly beneficial for\
    \ enhancing the efficacy of search algorithms.\n\n#### Example App for Sentiment\
    \ Analysis\n\nSign up on the Cohere website and get your API key, then install\
    \ Cohere SDK in your notebook or terminal with the following command: `pip install\
    \ cohere`, then use the following code:\n\n```python\nimport cohere\nfrom cohere.responses.classify\
    \ import Example\nco = cohere.Client('GHviIR5p9NC7kNzRf383ykOxU2Y9LQVbSAvAdNSj')\n\
    examples=[\nExample(\"Dermatologists don't like her!\", \"Spam\"),\nExample(\"\
    'Hello, open to this?'\", \"Spam\"),\nExample(\"I need help please wire me $1000\
    \ right now\", \"Spam\"),\nExample(\"Nice to know you ;)\", \"Spam\"),\nExample(\"\
    Please help me?\", \"Spam\"),\nExample(\"Your parcel will be delivered today\"\
    , \"Not spam\"),\nExample(\"Review changes to our Terms and Conditions\", \"Not\
    \ spam\"),\nExample(\"Weekly sync notes\", \"Not spam\"),\nExample(\"'Re: Follow\
    \ up from today's meeting'\", \"Not spam\"),\nExample(\"Pre-read for tomorrow\"\
    , \"Not spam\"),\n]\nuser_input = input()\ninputs=[\nuser_input\n]\nresponse =\
    \ co.classify(\nmodel = 'large',\ninputs=inputs,\nexamples=examples,\n)\nprint(response.classifications)\n\
    ```\n\n**Output:**\n\n```\nLooking forward to your email\n[Classification]\n```\n\
    \nThis Python code uses the `cohere` library to perform sentiment analysis. Here’s\
    \ a breakdown of what the code does:\n\n1. **Import necessary modules:**\n   -\
    \ `cohere`: The main library for interfacing with the Cohere API.\n   - `Example`\
    \ from `cohere.responses.classify`: This is used to define example inputs with\
    \ their corresponding labels for training the model.\n\n2. **Create a `cohere.Client`\
    \ object:**\n   - A client object is created to interact with the Cohere API.\
    \ It requires an API key for authentication.\n\n3. **Define a list of example\
    \ inputs with their corresponding labels:**\n   - Each example is an instance\
    \ of the `Example` class from the `cohere.responses.classify` module.\n   - These\
    \ examples are used for training the classification model. They are labeled as\
    \ either `Spam` or `Not spam`.\n\n4. **Prompt the user for input:**\n   - The\
    \ `input()` function prompts the user to enter some text, which will be classified\
    \ as either `Spam` or `Not spam`.\n\n5. **Create a list containing the user’s\
    \ input:**\n   - The user’s input is stored in a list called `inputs`.\n\n6. **Use\
    \ the `co.classify()` method to classify the user’s input:**\n   - The `co.classify()`\
    \ method takes several parameters:\n   - `model`: Specifies the model to be used\
    \ for classification. Here, it’s set to `large`.\n   - `inputs`: The list of inputs\
    \ to be classified. In this case, it contains only the user’s input.\n   - `examples`:\
    \ The list of example inputs and their labels used to train the model.\n   - This\
    \ method returns a response object.\n\n7. **Print the classifications:**\n   -\
    \ The `response.classifications` attribute contains the classifications for the\
    \ input text.\n   - This will print out the classification result, indicating\
    \ whether the input is categorized as `Spam` or `Not spam`.\n\n# Pinecone\n\n\
    In today’s digital era, where rapid access to and storage of diverse information\
    \ forms are paramount, traditional relational databases fall short in managing\
    \ varied data types like documents, key-value pairs, and graphs. Enter the era\
    \ of vector databases, a cutting-edge solution that employs vectorization for\
    \ enhanced search capabilities, efficient storage, and in-depth data analysis.\n\
    \nAmong these innovative databases, Pinecone stands out as a leading vector database\
    \ widely recognized for its ability to tackle issues related to complexity and\
    \ dimensionality. Pinecone, a vector database engineered for the cloud, excels\
    \ in managing high-dimensional vector data. At its core, Pinecone leverages the\
    \ Approximate Nearest Neighbor (ANN) search algorithm to swiftly find and rank\
    \ the closest matches within vast datasets.\n\nThis guide will delve into the\
    \ intricacies of Pinecone, highlighting its key features, challenges it addresses,\
    \ and practical applications."
