  trans: '

    # `Summary`


    Python 的语法设计注重可读性与简洁性，遵循“完成每项任务应有明确方式”的哲学。这种设计选择，加上使用英文关键词而非标点符号，使得 Python 代码清晰易懂。


    **在下一章中，我们将讨论以下内容：**


    - 大型语言模型架构中不同类型的层

    - 注意力机制

    - 大型语言模型中的分词策略

    - 什么是零样本学习和少样本学习

    - 关于大语言模型幻觉的更多内容

    - 流行大语言模型架构示例


    # 5. 大语言模型架构组件基础概述


    本章深入探讨构成大语言模型（LLM）架构的复杂组件。理解这些要素对于领会 LLM 如何将原始文本数据转化为有意义、具备上下文感知能力的输出至关重要。本章讨论的关键组件包括**嵌入层、前馈层、循环层和注意力机制**。每一个组件在使
    LLM 能够处理和生成类人语言方面都发挥着关键作用。


    `嵌入`层是 LLM 的基础，它将单词等离散标记转换为连续的向量表示。这些层中的`嵌入`矩阵最初填充随机值，是一个可在训练过程中调整的可学习组件。该矩阵的每一行对应模型词汇表中的一个唯一标记。`嵌入`层会获取这些行来创建向量表示，这些表示即为模型对标记含义的理解。各种嵌入算法增强了模型捕捉位置和上下文细微差别的能力，使其能够有效处理多样化的语言场景。


    `前馈`神经网络（FFN）是一种简单直接的人工神经网络，其特点是数据通过隐藏层从输入节点单向流向输出节点。这些层中的每个神经元都通过加权连接与相邻层的神经元相连。FFN
    通过计算加权和、应用激活函数并生成输出来处理输入数据。在 LLM 中，前馈层对于识别和吸收复杂模式至关重要，从而增强了模型的理解能力。


    `循环`层对于处理序列数据（尤其是在自然语言处理中）至关重要。这些层维护隐藏状态，将序列中先前元素的信息向前传递，使得模型在解释当前单词时能够考虑前面单词的上下文。训练循环层涉及诸如随时间反向传播（BPTT）等技术，该技术根据模型在整个序列上的表现来调整权重。诸如长短期记忆（LSTM）单元和门控循环单元（GRU）等变体被用来更有效地管理长期依赖关系。


    `注意力`机制是现代 LLM 的基石，它使模型能够聚焦于输入文本中与当前任务最相关的特定部分。注意力机制通过两阶段方法运作：在注意力阶段，单词会寻找并与上下文中的相关单词交换信息；在前馈阶段，它们处理这些累积的信息。Transformer
    是一种 LLM，它利用多个注意力头并行执行各种信息交换任务，从而增强了高效处理长文本的能力。


    `自注意力`机制允许句子中的每个单词关注所有其他单词，从而捕捉它们之间的上下文关系。`多头注意力`机制在此基础上扩展，使模型能够同时关注句子的不同部分，从而提升其对句法和语义关系的理解。这些机制对于需要全面理解文本的任务（如翻译和摘要）至关重要。


    `分词`是将文本分解为称为标记的可管理单元的过程，这些标记随后被转换为称为嵌入的数值表示。这种分割是 LLM 高效处理和学习大型数据集的基础。这些标记的分布和处理，尤其是预测序列中的下一个标记，构成了许多
    LLM 任务（包括文本生成和翻译）的基础。


    ## `嵌入`层


    神经网络（包括大型语言模型）中的`嵌入`层在将离散输入（如单词或标记）转换为连续向量形式方面发挥着关键作用。这种转换的核心是**嵌入矩阵**，它是该层的一个可学习组件，初始时包含随机值。


    该矩阵的行对应模型词汇表中的唯一标记。在操作中，`嵌入`层会对每个输入标记进行查找，从矩阵中获取相应的行。这些获取的行即为**标记的连续向量表示，或称嵌入（图**
    **5-1****）**。这概述了`嵌入`层的基本操作，尽管每种嵌入算法可能有所不同，会融入句子的位置和上下文。这些差异使得不同模型在不同场景下能够以不同的有效性执行任务。


    ![](img/613844_1_En_5_Fig1_HTML.jpg)


    图 5-1


    词嵌入可视化（来源：[*http://medium.com*](http://medium.com)）


    词嵌入（图 5-2）将文本中的单个单词表示为向量，这些向量由为此目的设计的专门模型生成。每个单词都被分配一个独特的向量，本质上是一个填充了数字的数组，用于唯一标识该单词。这些向量是多维实体，每个维度代表该单词特定的一个数值分量。这些向量的唯一性使得文档中的每个单词都能得到独特的表示。


    词嵌入的原理是将含义相似的单词在向量空间中映射到彼此接近的位置。例如，分配给“apple”的向量与“orange”的向量会比与“violin”的向量更相似，这反映了水果之间比与乐器之间更紧密的关系。向量之间的这种相似性反映了单词之间的语义接近度。


    ![](img/613844_1_En_5_Fig2_HTML.jpg)


    图 5-2


    嵌入（来源：[*http://medium.com*](http://medium.com)）


    需要指出的是，这些向量的维度选择由模型架构师决定。以 `Word2Vec` 为例，它使用 300 维的向量，用 300 个不同的数字来表示每个单词。在此上下文中，我们旨在仅使用两个维度来构建一个基本的词嵌入模型。

    '
- fmt: '### Stage 1: Nodes


    The initial phase involves establishing a series of nodes grouped within a “hidden
    layer” (Figure [5-3](#613844_1_En_5_Chapter.xhtml#Fig3)). Each node is linked
    to an input word through a weighted connection. Nodes are structured in two segments.
    The first segment aggregates the weighted inputs from each word. This aggregated
    sum is then forwarded to the second segment, the activation function. The role
    of the activation function is to determine the node’s output based on its specific
    process. In this scenario, the activation functions act as simple identity functions,
    leaving the input unchanged.


    The total number of nodes determines the vector dimensionality, as previously
    discussed. This means it sets the quantity of numbers (or vector components) assigned
    to each input word. Typically, in practical applications, the count of nodes ranges
    from tens to hundreds.


    Every word in the dataset is fed into each node with a specific weight, aiming
    to facilitate the model’s learning of word relationships without increasing the
    system’s complexity.


    ![](images/613844_1_En_5_Chapter/613844_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Input words are processed through a hidden layer in a neural network (Source:
    [*http://medium.com*](http://medium.com))


    In the initial stage, as outlined, each word is linked to nodes through weighted
    connections, represented as (`w₁`, `w₂`, ... `w[n]`). These weights are initially
    set to random values by the models to kick-start the learning process. The objective
    is to adjust and refine these weights through numerous iterations to enhance model
    accuracy. Naturally, it’s not feasible to perform mathematical operations like
    multiplication between a string (word) and a number directly. Hence, a binary
    approach is employed where words are encoded as 0 or 1. Specifically, the word
    immediately preceding the target word for prediction is assigned a value of 1.


    ### Stage 2: Returning to the Words


    During this second stage, the outputs generated by each node are allocated back
    to the words (Figure [5-4](#613844_1_En_5_Chapter.xhtml#Fig4)), utilizing weights
    that have been assigned randomly.


    ![](images/613844_1_En_5_Chapter/613844_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Detailed neural network diagram with a focus on the hidden layer and includes
    specific weights for connections


    ### Stage 3: Implementing the Softmax Layer


    In this third stage, we incorporate a softmax layer into our model. This layer
    functions as an activation mechanism, predominantly used in the concluding output
    layer for multiclass classification scenarios. The purpose of the softmax layer
    (Figure [5-5](#613844_1_En_5_Chapter.xhtml#Fig5)) is to convert a series of numerical
    values into a distribution of probabilities. It processes a numerical value associated
    with each category (or word, in our context), performs calculations, and generates
    a probability score for each category. Unlike previous layers that might use randomly
    assigned weights, the softmax layer employs a specific formula for its operations.


    This function processes an input vector, applying its formula to each element
    within the vector. For instance, given an input vector like `[3, 5, 7]`, the softmax
    layer would output a vector such as `[0.016, 0.117, 0.867]`, where the sum of
    the output vector’s elements equals 1, indicating a probability distribution.


    ![](images/613844_1_En_5_Chapter/613844_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Softmax function calculation


    ### Feedforward Layers


    Feedforward layers in a neural network are layers where the connections between
    nodes do not form cycles. Each node in one layer connects only to nodes in the
    next layer, allowing information to flow in one direction – from input to output.
    This structure is fundamental in neural networks for tasks like classification
    and regression.


    #### What Is a Feedforward Neural Network?


    A feedforward neural network (or, as they are often called, “FFNs”) stands as
    one of the simplest types of artificial neural networks, characterized by the
    unidirectional flow of data from input to output nodes, traversing through hidden
    nodes without any cycles or loops. This straightforward design distinguishes it
    from more complex networks such as recurrent neural networks (RNNs) and convolutional
    neural networks (CNNs), due to its absence of feedback loops, making it easier
    to build.


    Its architecture is structured around three main components: input layers, hidden
    layers, and output layers. Each layer is composed of units known as neurons, with
    each neuron in one layer fully connected to neurons in the subsequent layer through
    weighted connections.


    In operation, neurons in the input layer receive data and pass it forward. The
    number of neurons in the input layer matches the size of the input data. The hidden
    layers, situated between the input and output, perform computations while remaining
    hidden from both the input and output.


    Neurons within these layers calculate a weighted sum from the preceding layer’s
    outputs, apply an activation function to introduce nonlinearity, and forward the
    result onward. This process is iterative until the output layer is reached, which
    then generates the network’s final output. The connectivity between neurons across
    layers renders feedforward neural networks fully connected, with weights symbolizing
    the connection strength that the network adjusts during learning to minimize output
    errors.


    The operation of feedforward neural networks unfolds in two critical phases: the
    feedforward and the backpropagation phases.


    #### Feedforward Phase


    During this phase, the network processes the input by advancing it through the
    layers. Hidden layers calculate the weighted sum of inputs and then apply an activation
    function (e.g., `ReLU`, `Sigmoid`, `TanH`) to incorporate nonlinearity, continually
    forwarding the data until the output layer is reached and a prediction is made.


    #### Backpropagation Phase


    Following a prediction, the network evaluates the discrepancy between the actual
    output and the expected output. This error is then propagated backward through
    the network. To reduce the error, the network employs a gradient descent optimization
    technique, adjusting the weights across connections accordingly.'
