- fmt: '#### Document Parsing and Preparation


    The process begins with loading and parsing documents of varied formats, such
    as text, PDFs, or database entries. Documents are segmented into manageable units,
    ranging from paragraphs to sentences, with the aid of natural language processing
    (NLP) packages like `NLTK`. These tools streamline tasks and handle intricacies
    like newlines and special characters, allowing engineers to focus on more advanced
    aspects.


    #### Text Embedding and Indexing


    Each textual unit undergoes conversion from character format to numerical vectors,
    generating embeddings that encapsulate semantic meaning. Models such as the `Universal
    Sentence Encoder`, `DRAGON+`, and `Instructor` are utilized to generate customized
    embeddings, either based on specific prompts or by leveraging the capabilities
    of large language models.


    These embeddings are stored in a vector database, forming a searchable index for
    efficient information retrieval. Tools like `NumPy`, `Faiss`, or `Elasticsearch`/`OpenSearch`
    aid in this process, facilitating various algorithms for building indexes and
    managing retrieval tasks.


    #### Query Processing and Context Retrieval


    Upon user query submission, embedding techniques are applied to align with indexed
    data, facilitating context retrieval based on similarity metrics like cosine similarity.


    The system retrieves the most pertinent textual units, establishing a contextual
    framework for generating answers.


    #### Answer Generation


    Functioning as a generative model, the LLM utilizes retrieved contexts alongside
    the query to formulate responses. By calculating conditional probabilities of
    word sequences, it generates contextually accurate and insightful answers.


    This systematic approach underscores how generative QA (GQA) systems, augmented
    with LLMs, not only retrieve relevant information but also produce responses that
    deepen query understanding. These systems epitomize the next evolution in information
    retrieval, fostering interactive exchanges akin to conversing with a knowledgeable
    entity, delivering precise and insightful answers to specific inquiries.


    ### Practical Applications and Use Cases of Generative Question Answering


    Generative question answering (GQA) leverages advanced AI to provide detailed,
    context-aware responses to user queries, enhancing various real-world applications.
    GQA aids content creation, automating the generation of informative articles and
    reports. This versatility demonstrates GQA’s transformative potential across multiple
    sectors, driving efficiency and innovation.


    #### Enhanced Customer Support Through Automated Responses


    Generative QA is reshaping customer support by enabling automated yet contextually
    aware responses. Leveraging LLMs, customer support systems deliver accurate answers
    tailored to individual query nuances, streamlining the support process with faster
    response times and reduced reliance on human agents for routine inquiries.


    #### Efficient Search in Reports and Unstructured Documents


    GQA is revolutionizing internal document search processes within organizations,
    particularly in handling complex documents like manufacturing reports, logistics
    records, and sales notes. Integration of vector databases enables efficient indexing
    and retrieval of relevant information, facilitating human-like interaction for
    employees. This approach ensures quick access to precise information, ranging
    from production data analysis to customer care insights.


    #### Knowledge Management for Large Organizations


    Generative QA systems provide significant benefits for large organizations with
    extensive knowledge repositories. Constructing comprehensive indexes of internal
    knowledge sources simplifies information retrieval, aiding in decision-making
    processes with insights drawn from the latest data. Whether querying company policies,
    historical records, or project reports, GQA systems offer an efficient means of
    managing and retrieving knowledge, streamlining organizational operations.


    ### Question Answering Chatbot over Documents with Sources


    Let’s delve into the realm of advanced artificial intelligence applications by
    constructing a sophisticated question answering (QA) chatbot tailored to operate
    over documents and furnish sources for its responses. Our QA chatbot harnesses
    a specialized mechanism known as the `RetrievalQAWithSourcesChain`, empowering
    it to meticulously navigate through a corpus of documents, discerning pertinent
    information to address inquiries.


    This chain orchestrates structured prompts directed toward the underlying language
    model to elicit responses. These prompts are meticulously formulated to steer
    the language model’s output, thereby enhancing the precision and relevance of
    the answers provided. Furthermore, the retrieval chain is intricately engineered
    to meticulously trace the origins of the information it retrieves, furnishing
    the capability to substantiate responses with credible references.


    **In our journey, we shall master the following techniques:**


    1.  Scrape online articles provided by the user and archive the textual content
    along with the corresponding URLs.


    2.  Employ an embedding model to compute embeddings for these documents and archive
    them within Deep Lake, a vector database.


    3.  Segment the article texts into manageable fragments while meticulously noting
    the source of each segment.


    4.  Employ the `RetrievalQAWithSourcesChain` to craft a chatbot proficient in
    retrieving answers and concurrently tracking their sources.


    5.  Formulate responses to queries utilizing the chain, presenting the answer
    alongside its corroborative sources.


    Before proceeding, ensure you have installed the necessary packages by executing
    the following command:


    ```

    pip install langchain==0.1.4 deeplake==3.9.11 openai==0.27.8 tiktoken==0.7.0 newspaper3k==0.2.8

    ```


    This command will install the required packages, including `langchain` version
    `0.1.4`, `deeplake`, `openai` version `0.27.8`, and `tiktoken`. Additionally,
    it will install `newspaper3k` package version `0.2.8`.


    Next, it’s essential to incorporate your OpenAI and Deep Lake API keys into the
    environment variables. The `LangChain` library will then access these tokens and
    employ them for the integrations:


    ```

    import os

    os.environ["OPENAI_API_KEY"] = ""

    os.environ["ACTIVELOOP_TOKEN"] = ""

    ```'
