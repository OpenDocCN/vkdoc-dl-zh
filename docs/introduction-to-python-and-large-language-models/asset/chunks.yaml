  trans: '

    ### 传统 NLP 技术与 LLM 的对比


    传统 NLP 技术与 LLM 之间的根本区别在于它们各自的方法和能力范围。传统 NLP 方法通常专为特定任务而设计，例如机器翻译、情感分析或命名实体识别。这些方法依赖于为每个特定任务精心设计的特征和算法。虽然这种方法对于定义明确的任务可能非常有效，但通常需要大量人工来设计必要的特征和算法。


    相比之下，LLM 采用了一种更广泛、数据驱动的 NLP 方法。LLM 并非针对特定任务进行显式编程，而是在海量文本数据上进行训练，并学习识别语言中的模式和关系。这使得它们能够执行广泛的任务，甚至包括那些未经明确训练的任务。例如，LLM
    可用于文本生成、问答、摘要，甚至创意写作。


    然而，这种多功能性是有代价的。LLM 需要的计算资源和数据远多于传统 NLP 方法。训练 LLM 通常需要使用大规模数据集和强大的硬件，例如图形处理单元（GPU）。此外，LLM
    可能难以控制，有时会生成无意义或有偏见的输出。


    表 1-2 总结了传统 NLP 技术与 LLM 之间的主要区别。


    **表 1-2** 传统 NLP 技术与 LLM 的对比


    | 特征 | 传统 NLP 技术 | LLM |

    | --- | --- | --- |

    | 方法 | 任务特定，工程化特征和算法 | 数据驱动，从文本中学习模式 |

    | 范围 | 限于特定任务 | 广泛的任务范围 |

    | 计算资源 | 计算成本较低 | 计算成本较高 |

    | 数据需求 | 较小的数据集 | 较大的数据集 |

    | 可控性 | 更可控 | 可控性较低 |


    尽管存在这些挑战，LLM 仍代表了 NLP 领域的重大突破，并在许多应用中迅速推进了技术发展水平。随着这些模型的不断发展和改进，预计它们将在我们的生活中扮演越来越重要的角色。


    虽然 NLP 的基础为处理语言任务提供了必要的核心技术和基础知识，但 LLM 预示着一次突破性的飞跃。LLM 在广泛的任务中提供了无与伦比的通用性和卓越的性能。然而，重要的是要承认
    LLM 有其自身独特的要求和挑战。


    对于那些渴望踏上语言处理和人工智能迷人领域之旅的人来说，全面理解 NLP 原理和 LLM 的能力至关重要。通过掌握 NLP 的基础知识，人们可以深入了解促进人类语言处理、理解和生成的基本技术、算法和数学基础。


    另一方面，探索 LLM 的世界揭示了它们从海量文本语料库中学习的非凡能力，使它们能够执行从文本生成和翻译到问答和摘要等多种与语言相关的任务。LLM 在医疗、金融和客户服务等各个领域都展示了令人印象深刻的结果，展现了它们革新行业的潜力。


    然而，认识到 LLM 并非没有局限性至关重要。它们可能表现出从训练数据中继承的偏见，在常识推理方面存在困难，并且偶尔会生成不准确或无意义的回答。理解这些挑战对于在现实世界应用中负责任且有效地部署
    LLM 至关重要。


    通过培养对 NLP 基础和 LLM 能力的深刻理解，有抱负的从业者和研究人员将能够很好地驾驭语言处理的复杂性，为该领域的持续进步做出贡献，并释放 LLM 在推动创新和解决现实问题方面的全部潜力。


    ### 总结


    本章全面概述了大型语言模型（LLM）在人工智能领域内的发展和影响。本章追溯了从早期统计和基于规则的模型到当代拥有数十亿参数的基于 Transformer 的模型的演进过程。它讨论了诸如
    OpenAI 的 ChatGPT、Google Bard 和 Meta 的 LLaMA 等著名 LLM 的出现和成就，突出了它们对自然语言处理（NLP）的贡献。


    本章最后讨论了多模态学习时代，其中 LLM 与文本、图像和音频等多种数据类型集成。


    **在下一章中，我们将详细探讨以下内容：**


    - 大型语言模型的工作原理

    - LLM 在各个领域的优势与挑战

    - 为什么 LLM 如此受欢迎？


