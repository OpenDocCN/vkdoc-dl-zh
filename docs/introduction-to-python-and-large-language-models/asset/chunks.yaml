- fmt: '# Sentence Boundary Detection


    Sentence breaking, or sentence boundary detection, entails the task of identifying
    and marking sentence boundaries within lengthy textual passages. For example,
    when a natural language processing algorithm is presented with the text, “I played
    the game. I called Bill,” it can discern the period as a marker that separates
    the two sentences, effectively breaking them apart.


    # Morphological Segmentation


    Morphological segmentation dissects words into smaller units known as morphemes.
    For instance, the word “untestably” would be deconstructed into `[[un[[test]able]]ly]`,
    with the algorithm recognizing `un`, `test`, `able`, and `ly` as distinct morphemes.
    This technique proves particularly valuable in applications like machine translation
    and speech recognition.


    # Stemming


    Stemming aims to isolate the root forms of words, especially those that contain
    inflections. For instance, in the sentence, “The boy played with the ball,” the
    algorithm can identify that the root form of the word “played” is `play`. This
    functionality proves useful when users seek to analyze a text for all occurrences
    of a specific word, including its various conjugations. The algorithm recognizes
    that these conjugated forms essentially represent the same word, despite variations
    in their lettering.


    Employing this text-processing technique proves valuable in addressing issues
    of sparsity and standardizing vocabulary. It not only aids in minimizing redundancy,
    as inflected words and their word stems typically convey the same meaning, but
    it also enables NLP models to establish connections between inflected words and
    their corresponding word stems. This linkage enhances the model’s comprehension
    of how these words are utilized in analogous contexts.


    Stemming algorithms operate by identifying common prefixes and suffixes encountered
    in inflected words and truncating them from the word. Occasionally, this may yield
    word stems that do not correspond to actual words. Consequently, while this approach
    undoubtedly offers advantages, it is not exempt from its inherent limitations.


    # Named Entity Recognition (NER)


    Named entity recognition (NER) stands as a pivotal subtask within the realm of
    natural language processing (NLP) and falls under the broader scope of information
    extraction. NER is dedicated to the classification of named entities into predefined
    categories, encompassing a wide array of entities such as personal names, organizations,
    geographic locations, medical codes, temporal expressions, quantities, monetary
    values, and more. In the field of NLP, comprehending these entities holds paramount
    importance, as they frequently encapsulate the most crucial pieces of information
    within a given text.


    Named entity recognition (NER) operates as a vital intermediary that connects
    unstructured text with structured data, empowering machines to navigate extensive
    textual content and unearth valuable data fragments that are systematically categorized.
    By singling out specific entities from the vast expanse of words, NER revolutionizes
    the manner in which textual data is processed and leveraged.


    The core mission of NER is to meticulously scan unstructured text, pinpoint distinct
    segments as named entities, and subsequently assign them to predefined categories.
    This transformation of unprocessed text into organized information enhances data’s
    utility, facilitating various tasks such as data analysis, information retrieval,
    and the construction of knowledge graphs.


    ## How Entities Are Recognized


    The inner workings of named entity recognition (NER) can be deconstructed into
    several sequential stages:


    - **Tokenization:** Before delving into entity identification, the text undergoes
    tokenization, which involves segmenting it into tokens, which can take the form
    of words, phrases, or even entire sentences.

    - **Entity Identification:** The next step entails the identification of potential
    named entities within the text. This process relies on various linguistic rules
    or statistical methods to detect entities. It encompasses recognizing patterns
    such as capitalization in names (e.g., “Bill Gates”) or adherence to specific
    formats, such as dates.

    - **Entity Classification:** Once entities are pinpointed, they are systematically
    categorized into predefined classes such as `Person`, `Organization`, or `Location`.
    This classification is often achieved through machine learning models that have
    been trained on annotated datasets. For instance, “Bill Gates” would be classified
    as a `Person`, while “Microsoft” would be designated as an `Organization`.

    - **Contextual Analysis:** NER systems frequently take into account the contextual
    surroundings to enhance accuracy. For example, in the sentence “Apple released
    a new iPhone,” the contextual cues assist the system in recognizing `Apple` as
    an organization rather than a fruit.

    - **Postprocessing:** Following the initial recognition and classification phases,
    postprocessing techniques may be employed to refine the results. This can encompass
    the resolution of ambiguities, consolidation of multi-token entities, or the utilization
    of knowledge bases to augment entity information.


    # NLP and Feature Engineering


    Feature extraction in NLP is a critical process where raw textual content is converted
    into numerical representations that are more accessible for machine learning models.
    There is a range of methods for feature extraction in NLP, each offering unique
    advantages and limitations. For data scientists, it is imperative to be well versed
    in these various techniques and understand when to apply them effectively.


    This step is vital in NLP as feature engineering plays an essential role in natural
    language processing (NLP) applications. It involves defining features that characterize
    an NLP task, shaping the way a machine learning algorithm understands and processes
    text data, and it greatly influences the performance of the models designed for
    specific tasks.


    # Python and the Natural Language Toolkit (NLTK)


    The Python programming language offers a diverse array of tools and libraries
    tailored for addressing specific natural language processing (NLP) tasks. Within
    this landscape, you’ll find the Natural Language Toolkit, commonly known as NLTK,
    which stands as an open source assemblage of libraries, utilities, and educational
    resources designed to facilitate the construction of NLP applications.


    The NLTK encompasses libraries catering to various NLP tasks mentioned previously,
    and it also includes specialized libraries for subtasks such as sentence parsing,
    word segmentation, stemming, lemmatization (techniques for reducing words to their
    root forms), and tokenization (breaking down phrases, sentences, paragraphs, and
    passages into tokens that enhance the computer’s comprehension of the text). Additionally,
    the NLTK houses libraries that enable the implementation of advanced capabilities
    like semantic reasoning, which involves deriving logical conclusions from facts
    extracted from textual sources.


    In the next paragraphs, some examples of feature engineering are provided.


    Install the latest version of NLTK by typing `pip install nltk`. This is valid
    for all examples with NLTK as shown here.


    ## Tokenization


    ```

    import nltk

    from nltk.tokenize import word_tokenize

    nltk.download(''punkt'')

    text = "The quick brown fox jumped over the lazy dog."

    tokens = word_tokenize(text)

    print(tokens)

    Output:

    [''The'', ''quick'', ''brown'', ''fox'', ''jumped'', ''over'', ''the'', ''lazy'',
    ''dog'', ''.'']

    ```'
