- fmt: "### Function Arguments in Python\n\nIn Python, function arguments are values\
    \ passed to a function when it is called. These arguments are used by the function\
    \ to perform operations or produce results based on the input. Python supports\
    \ various types of arguments, making functions highly flexible in handling inputs.\
    \ Here are the main types.\n\n#### Positional Arguments\n\nThese are the most\
    \ common type of arguments, where the order in which the arguments are passed\
    \ matters. The number of positional arguments in the call must match the number\
    \ expected by the function definition.\n\n**Example:**\n\n```\ndef add(a, b):\n\
    \    return a + b\n# Calling function with positional arguments\nresult = add(2,\
    \ 3)  # 2 and 3 are positional arguments\nprint(result)\n```\n\n**Output:**\n\n\
    ```\n5\n```\n\n#### Keyword Arguments\n\nThese are arguments passed to a function\
    \ by explicitly specifying the name of the parameter and the value. Keyword arguments\
    \ can be listed in any order when calling the function. This makes your code more\
    \ readable and allows you to call functions with the parameters in a different\
    \ order than they were defined.\n\n**Example:**\n\n```\ndef greet(name, message):\n\
    \    return f\"{message}, {name}!\"\n# Calling function with keyword arguments\n\
    greeting = greet(message=\"Hello\", name=\"Alice\")\n```\n\n#### Default Arguments\n\
    \nA function can have default values for parameters. If the caller does not provide\
    \ a value for such an argument, the function uses the default value. Default arguments\
    \ make certain parameters optional.\n\n**Example:**\n\n```\ndef log(message, level='INFO'):\n\
    \    print(f\"[{level}] {message}\")\n# Calling function without specifying level\n\
    log(\"User logged in\")  # Uses default level INFO\n```\n\n#### Variable-Length\
    \ Arguments (`*args` and `**kwargs`)\n\n- `*args` allows a function to accept\
    \ an arbitrary number of positional arguments. It is used when you are not sure\
    \ how many arguments might be passed to your function.\n- `**kwargs` allows for\
    \ an arbitrary number of keyword arguments. It is used when you want to handle\
    \ named arguments that you have not explicitly defined in advance.\n\n**Example:**\n\
    \n```\ndef make_sentence(*words, **punctuation):\n    sentence = ' '.join(words)\
    \ + punctuation.get('mark', '.')\n    return sentence.capitalize()\n# Using *args\
    \ for words and **kwargs for punctuation\nsentence = make_sentence('hello', 'world',\
    \ mark='!')\n```\n\nFunction arguments increase the flexibility and reusability\
    \ of your functions, allowing you to write more generalized and powerful code.\n\
    \n### Anonymous Functions in Python\n\nAnonymous functions in Python, also known\
    \ as lambda functions, are functions defined without a name. They are created\
    \ using the `lambda` keyword, which is why they are often referred to as lambda\
    \ functions. Anonymous functions are typically used for short, simple operations\
    \ that are easier to read when written inline, particularly as arguments to higher-order\
    \ functions (functions that take other functions as inputs).\n\n**The basic syntax\
    \ of an anonymous function is**\n\n```\nlambda arguments: expression\n```\n\n\
    This syntax allows the lambda function to take any number of arguments, but it\
    \ can only have one expression. The expression is evaluated and returned when\
    \ the lambda function is called.\n\n**Characteristics of Lambda Functions**\n\n\
    - **Single Expression**: Unlike standard functions defined with `def`, which can\
    \ consist of multiple expressions and statements, a lambda function is limited\
    \ to a single expression.\n- **Automatically Returned**: The result of the expression\
    \ is automatically returned by the lambda function.\n- **No Need for a Return\
    \ Statement**: Unlike normal functions, there’s no need to explicitly return the\
    \ result; the expression’s outcome is automatically the return value.\n- **Versatile\
    \ Usage**: Lambda functions can be used anywhere a function is expected, and they\
    \ are often used in combination with functions like `map()`, `filter()`, and `reduce()`,\
    \ as well as in GUI event handlers and other short callback functions.\n\n**Example:**\n\
    \n```\nsquare = lambda x: x * x\nprint(square(5))  # Output: 25\n```\n\n**Output:**\n\
    \n```\n25\n```\n\nAnd here’s an example of using a lambda function with the `filter()`\
    \ function to filter out even numbers from a list:\n\n```\nnumbers = [1, 2, 3,\
    \ 4, 5, 6]\neven_numbers = list(filter(lambda x: x % 2 == 0, numbers))\nprint(even_numbers)\
    \  # Output: [2, 4, 6]\n```\n\n**Output:**\n\n```\n[2, 4, 6]\n```\n\nLambda functions\
    \ are particularly useful for simple operations that can be expressed in a single\
    \ line. However, for complex operations, it’s recommended to use named functions\
    \ for the sake of clarity and readability.\n\n## Summary\n\nPython is a general-purpose,\
    \ high-level programming language, an ideal choice for scripting and rapid application\
    \ development across various domains and platforms. In this chapter, we reviewed\
    \ Python’s syntax and semantics and noted its similarity to other programming\
    \ languages while highlighting its unique features. In the next chapter, we’ll\
    \ see how Python supports various programming approaches, including structured,\
    \ object-oriented, and functional programming.\n\nFootnotes [1](#613844_1_En_3_Chapter.xhtml#Fn1_source)\n\
    \n# 4. Python and Other Programming Approaches\n\nPython’s rich NLP ecosystem,\
    \ active community support, readability, integration with data science and machine\
    \ learning tools, availability of pre-trained models, open source nature, wide\
    \ adoption, versatility, and cross-platform compatibility make it an ideal choice\
    \ for natural language processing tasks. Its popularity and robust ecosystem have\
    \ made Python the de facto language for NLP research and development.\n\n## Object-Oriented\
    \ Programming in Python\n\nObject-Oriented Programming (OOP) in Python is a coding\
    \ approach that models complex issues using objects. This approach is grounded\
    \ in a theoretical framework that guides problem-solving strategies.\n\nIn the\
    \ context of OOP, this involves employing a suite of principles and design patterns\
    \ to address challenges through the lens of objects. In Python, an object is an\
    \ encapsulation of data (known as attributes) and functions (referred to as methods)\
    \ into a single entity. Objects can be likened to tangible entities in the real\
    \ world.\n\nAttributes, in this scheme, are typically nouns, signifying the object’s\
    \ properties, while methods are actions, expressed as verbs, that define what\
    \ the object can do.\n\nThis division into data storage and operational functionality\
    \ forms the core of Object-Oriented Programming. It involves crafting objects\
    \ that not only hold information but also embody specific behaviors."
  raw: '### Function Arguments in Python


    In Python, function arguments are values passed to a function when it is called.
    These arguments are used by the function to perform operations or produce results
    based on the input. Python supports various types of arguments, making functions
    highly flexible in handling inputs. Here are the main types.


    #### Positional Arguments


    These are the most common type of arguments, where the order in which the arguments
    are passed matters. The number of positional arguments in the call must match
    the number expected by the function definition.


    **Example:**


    ```

    def add(a, b):

    return a + b

    # Calling function with positional arguments

    result = add(2, 3)  # 2 and 3 are positional arguments

    print(result)

    ```


    **Output:**


    ```


    ```


    #### Keyword Arguments


    These are arguments passed to a function by explicitly specifying the name of
    the parameter and the value. Keyword arguments can be listed in any order when
    calling the function. This makes your code more readable and allows you to call
    functions with the parameters in a different order than they were defined.


    **Example:**


    ```

    def greet(name, message):

    return f"{message}, {name}!"

    # Calling function with keyword arguments

    greeting = greet(message="Hello", name="Alice")

    ```


    #### Default Arguments


    A function can have default values for parameters. If the caller does not provide
    a value for such an argument, the function uses the default value. Default arguments
    make certain parameters optional.


    **Example:**


    ```

    def log(message, level=''INFO''):

    print(f"[{level}] {message}")

    # Calling function without specifying level

    log("User logged in")  # Uses default level INFO

    ```


    #### Variable-Length Arguments (*args and **kwargs)


    *   `*args` allows a function to accept an arbitrary number of positional arguments.
    It is used when you are not sure how many arguments might be passed to your function.


    *   `**kwargs` allows for an arbitrary number of keyword arguments. It is used
    when you want to handle named arguments that you have not explicitly defined in
    advance.


    **Example:**


    ```

    def make_sentence(*words, **punctuation):

    sentence = '' ''.join(words) + punctuation.get(''mark'', ''.'')

    return sentence.capitalize()

    # Using *args for words and **kwargs for punctuation

    sentence = make_sentence(''hello'', ''world'', mark=''!'')

    ```


    Function arguments increase the flexibility and reusability of your functions,
    allowing you to write more generalized and powerful code.


    #### Anonymous Functions in Python


    Anonymous functions in Python, also known as lambda functions, are functions defined
    without a name. They are created using the “lambda” keyword, which is why they
    are often referred to as lambda functions. Anonymous functions are typically used
    for short, simple operations that are easier to read when written inline, particularly
    as arguments to higher-order functions (functions that take other functions as
    inputs).


    **The basic syntax of an anonymous function is**


    ```

    lambda arguments: expression

    ```


    This syntax allows the lambda function to take any number of arguments, but it
    can only have one expression. The expression is evaluated and returned when the
    lambda function is called.


    **Characteristics of Lambda Functions**


    *   **Single Expression**: Unlike standard functions defined with “def”, which
    can consist of multiple expressions and statements, a lambda function is limited
    to a single expression.


    *   **Automatically Returned**: The result of the expression is automatically
    returned by the lambda function.


    *   **No Need for a Return Statement**: Unlike normal functions, there’s no need
    to explicitly return the result; the expression’s outcome is automatically the
    return value.


    *   **Versatile Usage**: Lambda functions can be used anywhere a function is expected,
    and they are often used in combination with functions like “map()”, “filter()”,
    and “reduce()”, as well as in GUI event handlers and other short callback functions.


    **Example:**


    ```

    square = lambda x: x * x

    print(square(5))  # Output: 25

    ```


    **Output:**


    ```


    ```


    And here’s an example of using a lambda function with the “filter()” function
    to filter out even numbers from a list:


    ```

    numbers = [1, 2, 3, 4, 5, 6]

    even_numbers = list(filter(lambda x: x % 2 == 0, numbers))

    print(even_numbers)  # Output: [2, 4, 6]

    ```


    **Output:**


    ```

    [2,4,6]

    ```


    Lambda functions are particularly useful for simple operations that can be expressed
    in a single line. However, for complex operations, it’s recommended to use named
    functions for the sake of clarity and readability.


    ## Summary


    Python is a general-purpose, high-level programming language, an ideal choice
    for scripting and rapid application development across various domains and platforms.
    In this chapter, we reviewed Python’s syntax and semantics and noted its similarity
    to other programming languages while highlighting its unique features. In the
    next chapter, we’ll see how Python supports various programming approaches, including
    structured, object-oriented, and functional programming.


    Footnotes [1](#613844_1_En_3_Chapter.xhtml#Fn1_source)


    # 4. Python and Other Programming Approaches


    Python’s rich NLP ecosystem, active community support, readability, integration
    with data science and machine learning tools, availability of pre-trained models,
    open source nature, wide adoption, versatility, and cross-platform compatibility
    make it an ideal choice for natural language processing tasks. Its popularity
    and robust ecosystem have made Python the de facto language for NLP research and
    development.


    ## Object-Oriented Programming in Python


    Object-Oriented Programming (OOP) in Python is a coding approach that models complex
    issues using objects. This approach is grounded in a theoretical framework that
    guides problem-solving strategies.


    In the context of OOP, this involves employing a suite of principles and design
    patterns to address challenges through the lens of objects. In Python, an object
    is an encapsulation of data (known as attributes) and functions (referred to as
    methods) into a single entity. Objects can be likened to tangible entities in
    the real world.


    Attributes, in this scheme, are typically nouns, signifying the object’s properties,
    while methods are actions, expressed as verbs, that define what the object can
    do.


    This division into data storage and operational functionality forms the core of
    Object-Oriented Programming. It involves crafting objects that not only hold information
    but also embody specific behaviors.'
  trans: "\n### Python 中的函数参数\n\n在 Python 中，函数参数是在调用函数时传递给函数的值。函数利用这些参数根据输入执行操作或生成结果。Python\
    \ 支持多种类型的参数，使得函数在处理输入时具有高度的灵活性。以下是主要类型。\n\n#### 位置参数\n\n这是最常见的参数类型，参数的传递顺序至关重要。调用时位置参数的数量必须与函数定义中期望的数量相匹配。\n\
    \n**示例：**\n\n```\ndef add(a, b):\n    return a + b\n# 使用位置参数调用函数\nresult = add(2,\
    \ 3)  # 2 和 3 是位置参数\nprint(result)\n```\n\n**输出：**\n\n```\n5\n```\n\n#### 关键字参数\n\
    \n这类参数通过显式指定参数名称和值传递给函数。调用函数时，关键字参数可以按任意顺序列出。这使代码更具可读性，并允许你以与定义时不同的顺序调用函数。\n\n\
    **示例：**\n\n```\ndef greet(name, message):\n    return f\"{message}, {name}!\"\n\
    # 使用关键字参数调用函数\ngreeting = greet(message=\"Hello\", name=\"Alice\")\n```\n\n####\
    \ 默认参数\n\n函数可以为参数设置默认值。如果调用者未提供该参数的值，函数将使用默认值。默认参数使某些参数变为可选。\n\n**示例：**\n\n```\n\
    def log(message, level='INFO'):\n    print(f\"[{level}] {message}\")\n# 未指定 level\
    \ 时调用函数\nlog(\"User logged in\")  # 使用默认级别 INFO\n```\n\n#### 可变长度参数（`*args` 和\
    \ `**kwargs`）\n\n- `*args` 允许函数接受任意数量的位置参数。当你无法确定会向函数传递多少个参数时使用。\n- `**kwargs`\
    \ 允许接受任意数量的关键字参数。当你希望处理未提前显式定义的命名参数时使用。\n\n**示例：**\n\n```\ndef make_sentence(*words,\
    \ **punctuation):\n    sentence = ' '.join(words) + punctuation.get('mark', '.')\n\
    \    return sentence.capitalize()\n# 使用 *args 表示单词，**kwargs 表示标点\nsentence = make_sentence('hello',\
    \ 'world', mark='!')\n```\n\n函数参数提高了函数的灵活性和可重用性，使你能够编写更通用、更强大的代码。\n\n### Python\
    \ 中的匿名函数\n\nPython 中的匿名函数，也称为 lambda 函数，是没有名称的函数。它们使用 `lambda` 关键字创建，因此常被称为 lambda\
    \ 函数。匿名函数通常用于简短、简单的操作，这些操作以内联方式编写更易读，特别是作为高阶函数（接受其他函数作为输入的函数）的参数时。\n\n**匿名函数的基本语法是**\n\
    \n```\nlambda arguments: expression\n```\n\n此语法允许 lambda 函数接受任意数量的参数，但只能包含一个表达式。当调用\
    \ lambda 函数时，该表达式会被求值并返回。\n\n**Lambda 函数的特性**\n\n- **单一表达式**：与使用 `def` 定义的标准函数（可包含多个表达式和语句）不同，lambda\
    \ 函数仅限于单个表达式。\n- **自动返回**：表达式的结果由 lambda 函数自动返回。\n- **无需 return 语句**：与普通函数不同，无需显式返回结果；表达式的结果自动成为返回值。\n\
    - **用途广泛**：Lambda 函数可用于任何需要函数的地方，通常与 `map()`、`filter()` 和 `reduce()` 等函数结合使用，也用于\
