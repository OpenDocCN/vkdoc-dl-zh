- fmt: "### Prompting/Utilization\n\nPrompting is a method for querying trained LLMs\
    \ to generate responses. LLMs can be prompted in various setups, adapting to instructions\
    \ either without fine-tuning or with fine-tuning on data containing different\
    \ prompt styles:\n\n- **Zero-Shot Prompting:**^([^(30)](#fn30)) LLMs exhibit zero-shot\
    \ learning capabilities, answering queries without having seen any examples in\
    \ the prompt.\n- **In-Context Learning:**^([^(31)](#fn31)) Also known as few-shot\
    \ learning, this approach involves presenting multiple input-output demonstration\
    \ pairs to the model to generate the desired response.\n- **Reasoning in LLMs:**^([^(32)](#fn32))\
    \ LLMs can act as zero-shot reasoners, providing answers to logical problems,\
    \ task planning, critical thinking, etc., with reasoning. Different prompting\
    \ styles are used to provoke reasoning, and methods train LLMs on reasoning datasets\
    \ to enhance their performance. Various prompting techniques for reasoning include\
    \ the following:\n  - **Chain-of-Thought (CoT):**^([^(33)](#fn33)) A special prompting\
    \ case where demonstrations include reasoning information aggregated with inputs\
    \ and outputs, guiding the model to generate outcomes with step-by-step reasoning.\n\
    \  - **Self-consistency:** Improves CoT performance by generating multiple responses\
    \ and selecting the most frequent answer.\n  - **Tree of Thought (ToT):** Explores\
    \ multiple reasoning paths with possibilities to look ahead and backtrack for\
    \ problem-solving.\n- **Single-Turn Instructions:**^([^(34)](#fn34)) In this setup,\
    \ LLMs are queried only once, with all relevant information in the prompt. LLMs\
    \ generate responses by understanding the context, either in a zero-shot or few-shot\
    \ setting.\n- **Multi-turn Instructions:**^([^(35)](#fn35)) Solving complex tasks\
    \ requires multiple interactions with LLMs, where feedback and responses from\
    \ other tools are given as input to the LLM for subsequent rounds. This style\
    \ of using LLMs in the loop is common in autonomous agents.\n\n## Training of\
    \ LLMs\n\nDeveloping large language models encompasses several essential steps\
    \ crucial for their successful training. The process typically initiates with\
    \ the gathering and preprocessing of an extensive volume of text data from diverse\
    \ sources, including books, articles, websites, and various textual corpora. The\
    \ meticulously curated dataset forms the cornerstone for the training of large\
    \ language models (LLMs). The training procedure itself revolves around unsupervised\
    \ learning, wherein the model acquires the ability to predict the subsequent word\
    \ in a sequence based on the preceding context. This particular task is commonly\
    \ known as language modeling.\n\nLLMs employ advanced neural network architectures,\
    \ such as transformers, enabling them to capture intricate patterns and dependencies\
    \ within language. The primary training objective is to optimize the model’s parameters,\
    \ aiming to maximize the likelihood of generating the correct next word within\
    \ a given context. This optimization is typically achieved through an algorithm\
    \ known as stochastic gradient descent (SGD) or its variants, coupled with backpropagation,\
    \ which iteratively computes gradients to update the model’s parameters.\n\n##\
    \ Benefits and Challenges of LLMs in Various Domains\n\nLLMs have a broad spectrum\
    \ of applications, and this discussion focuses on their impactful roles in medicine,\
    \ education, finance, and engineering. These fields were selected due to their\
    \ significant influence and the transformative potential of LLMs within these\
    \ domains. The versatility and capability of LLMs to tackle complex challenges,\
    \ like the ones in Figure [2-3](#613844_1_En_2_Chapter.xhtml#Fig3), and aid human\
    \ efforts are well demonstrated through these applications.\n\n![](images/613844_1_En_2_Chapter/613844_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\n\nTop four benefits of large language models\n\n### General Purpose\n\
    \nLLMs stand out as versatile tools capable of handling a diverse array of tasks,\
    \ even those beyond their specific training. Their proficiency lies in their capacity\
    \ to comprehend, produce, and modify text in ways that are contextually appropriate\
    \ and human-like. This versatility enables them to undertake a range of functions,\
    \ from straightforward language translation and answering questions to more intricate\
    \ activities like text summarization, creative writing, and programming assistance.\
    \ LLMs’ adaptability extends to mimicking the style and tone of the text they\
    \ are working with, resulting in outputs that are both user-centric and context-sensitive.\n\
    \nIn everyday scenarios, LLMs find utility as virtual personal assistants, aiding\
    \ in tasks such as composing emails or organizing meetings. They are also increasingly\
    \ employed in customer service, handling routine inquiries and thereby allowing\
    \ human staff to focus on more complex matters. Additionally, LLMs are being used\
    \ in content creation for digital platforms, generating human-like text based\
    \ on specified prompts. Another significant role of LLMs is in data analysis,\
    \ where they can sift through and summarize large volumes of text data, identifying\
    \ patterns and key points more rapidly than human analysts.\n\nDespite their broad\
    \ utility, it’s crucial to acknowledge that LLMs, like any AI technology, are\
    \ limited by the quality of their training data. As such, they need to be utilized\
    \ cautiously, given that they may inadvertently reflect biases present in their\
    \ training data, leading to potentially skewed or inaccurate outcomes."
  raw: "### Prompting/Utilization\n\nPrompting is a method for querying trained LLMs\
    \ to generate responses. LLMs can be prompted in various setups, adapting to instructions\
    \ either without fine-tuning or with fine-tuning on data containing different\
    \ prompt styles:\n\n*   **Zero-Shot Prompting:**^([^(30)](#fn30)) LLMs exhibit\
    \ zero-shot learning capabilities, answering queries without having seen any examples\
    \ in the prompt.\n\n*   **In-Context Learning:**^([^(31)](#fn31)) Also known as\
    \ few-shot learning, this approach involves presenting multiple input-output demonstration\
    \ pairs to the model to generate the desired response.\n\n*   **Reasoning in LLMs:**^([^(32)](#fn32))\
    \ LLMs can act as zero-shot reasoners, providing answers to logical problems,\
    \ task planning, critical thinking, etc., with reasoning. Different prompting\
    \ styles are used to provoke reasoning, and methods train LLMs on reasoning datasets\
    \ to enhance their performance. Various prompting techniques for reasoning include\
    \ the following:\n    *   **Chain-of-Thought (CoT)****:**^([^(33)](#fn33)) A special\
    \ prompting case where demonstrations include reasoning information aggregated\
    \ with inputs and outputs, guiding the model to generate outcomes with step-by-step\
    \ reasoning.\n\n    *   **Self-consistency:** Improves CoT performance by generating\
    \ multiple responses and selecting the most frequent answer\n\n    *   **Tree\
    \ of Thought (ToT)****:** Explores multiple reasoning paths with possibilities\
    \ to look ahead and backtrack for problem-solving\n\n*   **Single-Turn Instructions:**^([^(34)](#fn34))\
    \ In this setup, LLMs are queried only once, with all relevant information in\
    \ the prompt. LLMs generate responses by understanding the context, either in\
    \ a zero-shot or few-shot setting.\n\n*   **Multi-turn Instructions:**^([^(35)](#fn35))\
    \ Solving complex tasks requires multiple interactions with LLMs, where feedback\
    \ and responses from other tools are given as input to the LLM for subsequent\
    \ rounds. This style of using LLMs in the loop is common in autonomous agents.\n\
    \n## Training of LLMs\n\nDeveloping large language models encompasses several\
    \ essential steps crucial for their successful training. The process typically\
    \ initiates with the gathering and preprocessing of an extensive volume of text\
    \ data from diverse sources, including books, articles, websites, and various\
    \ textual corpora. The meticulously curated dataset forms the cornerstone for\
    \ the training of large language models (LLMs). The training procedure itself\
    \ revolves around unsupervised learning, wherein the model acquires the ability\
    \ to predict the subsequent word in a sequence based on the preceding context.\
    \ This particular task is commonly known as language modeling.\n\nLLMs employ\
    \ advanced neural network architectures, such as transformers, enabling them to\
    \ capture intricate patterns and dependencies within language. The primary training\
    \ objective is to optimize the model’s parameters, aiming to maximize the likelihood\
    \ of generating the correct next word within a given context. This optimization\
    \ is typically achieved through an algorithm known as stochastic gradient descent\
    \ (SGD) or its variants, coupled with backpropagation, which iteratively computes\
    \ gradients to update the model’s parameters.\n\n## Benefits and Challenges of\
    \ LLMs in Various Domains\n\nLLMs have a broad spectrum of applications, and this\
    \ discussion focuses on their impactful roles in medicine, education, finance,\
    \ and engineering. These fields were selected due to their significant influence\
    \ and the transformative potential of LLMs within these domains. The versatility\
    \ and capability of LLMs to tackle complex challenges, like the ones in Figure\
    \ [2-3](#613844_1_En_2_Chapter.xhtml#Fig3), and aid human efforts are well demonstrated\
    \ through these applications.\n\n![](images/613844_1_En_2_Chapter/613844_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\n\nTop four benefits of large language models\n\n### General Purpose\n\
    \nLLMs stand out as versatile tools capable of handling a diverse array of tasks,\
    \ even those beyond their specific training. Their proficiency lies in their capacity\
    \ to comprehend, produce, and modify text in ways that are contextually appropriate\
    \ and human-like. This versatility enables them to undertake a range of functions,\
    \ from straightforward language translation and answering questions to more intricate\
    \ activities like text summarization, creative writing, and programming assistance.\
    \ LLMs’ adaptability extends to mimicking the style and tone of the text they\
    \ are working with, resulting in outputs that are both user-centric and context-sensitive.\n\
    \nIn everyday scenarios, LLMs find utility as virtual personal assistants, aiding\
    \ in tasks such as composing emails or organizing meetings. They are also increasingly\
    \ employed in customer service, handling routine inquiries and thereby allowing\
    \ human staff to focus on more complex matters. Additionally, LLMs are being used\
    \ in content creation for digital platforms, generating human-like text based\
    \ on specified prompts. Another significant role of LLMs is in data analysis,\
    \ where they can sift through and summarize large volumes of text data, identifying\
    \ patterns and key points more rapidly than human analysts.\n\nDespite their broad\
    \ utility, it’s crucial to acknowledge that LLMs, like any AI technology, are\
    \ limited by the quality of their training data. As such, they need to be utilized\
    \ cautiously, given that they may inadvertently reflect biases present in their\
    \ training data, leading to potentially skewed or inaccurate outcomes."
  trans: "\n### 提示/利用\n\n提示是一种向训练好的大语言模型（LLM）查询以生成响应的方法。LLM 可以在多种设置下被提示，通过适应指令（无需微调或基于包含不同提示风格的数据进行微调）来工作：\n\
    \n- **零样本提示：**^((30)) LLM 展现出零样本学习能力，能够在提示中未提供任何示例的情况下回答查询。\n- **上下文学习：**^((31))\
    \ 也称为少样本学习，这种方法涉及向模型提供多个输入-输出演示对，以生成期望的响应。\n- **LLM 中的推理：**^((32)) LLM 可以作为零样本推理器，通过推理为逻辑问题、任务规划、批判性思维等提供答案。不同的提示风格被用来激发推理，并且有方法在推理数据集上训练\
    \ LLM 以提升其性能。用于推理的各种提示技术包括：\n  - **思维链（CoT）：**^((33)) 一种特殊的提示情况，其中演示包含与输入和输出聚合的推理信息，引导模型通过逐步推理生成结果。\n\
    \  - **自洽性：** 通过生成多个响应并选择最频繁的答案来改进 CoT 的性能。\n  - **思维树（ToT）：** 探索多个推理路径，具备前瞻和回溯的可能性以解决问题。\n\
    - **单轮指令：**^((34)) 在这种设置下，LLM 仅被查询一次，所有相关信息都包含在提示中。LLM 通过理解上下文来生成响应，无论是在零样本还是少样本设置下。\n\
    - **多轮指令：**^((35)) 解决复杂任务需要与 LLM 进行多次交互，其中来自其他工具的反馈和响应作为输入提供给 LLM 以进行后续轮次。这种在循环中使用\
    \ LLM 的风格在自主智能体中很常见。\n\n## LLM 的训练\n\n开发大型语言模型包含几个对其成功训练至关重要的基本步骤。该过程通常从收集和预处理来自不同来源（包括书籍、文章、网站和各种文本语料库）的大量文本数据开始。精心策划的数据集构成了训练大型语言模型（LLM）的基石。训练过程本身围绕无监督学习展开，其中模型学会根据前面的上下文预测序列中的下一个单词。这个特定任务通常被称为语言建模。\n\
    \nLLM 采用先进的神经网络架构，例如 Transformer，使它们能够捕捉语言中复杂的模式和依赖关系。主要的训练目标是优化模型的参数，旨在最大化在给定上下文中生成正确下一个单词的可能性。这种优化通常通过一种称为随机梯度下降（SGD）或其变体的算法来实现，并结合反向传播，该算法迭代计算梯度以更新模型的参数。\n\
    \n## LLM 在各领域的优势与挑战\n\nLLM 具有广泛的应用范围，本次讨论聚焦于它们在医学、教育、金融和工程领域的重要作用。选择这些领域是因为它们具有显著的影响力以及\
    \ LLM 在这些领域内的变革潜力。LLM 应对复杂挑战（如图 2-3 所示）的多功能性和能力，以及辅助人类工作的潜力，通过这些应用得到了充分展示。\n\n\
    ![](img/613844_1_En_2_Fig3_HTML.jpg)\n\n图 2-3\n\n大型语言模型的四大优势\n\n### 通用用途\n\nLLM\
    \ 作为多功能工具脱颖而出，能够处理各种任务，甚至包括那些超出其特定训练范围的任务。它们的能力在于能够以符合上下文且类人的方式理解、生成和修改文本。这种多功能性使它们能够承担一系列功能，从简单的语言翻译和回答问题，到更复杂的活动，如文本摘要、创意写作和编程辅助。LLM\
    \ 的适应性还延伸到模仿其所处理文本的风格和语气，从而产生既以用户为中心又对上下文敏感的输出。\n\n在日常场景中，LLM 可作为虚拟个人助理使用，协助完成诸如撰写电子邮件或安排会议等任务。它们也越来越多地应用于客户服务，处理常规查询，从而使人类员工能够专注于更复杂的事务。此外，LLM\
    \ 正被用于数字平台的内容创作，根据指定的提示生成类人文本。LLM 的另一个重要作用是数据分析，它们可以筛选和总结大量文本数据，比人类分析师更快地识别模式和关键点。\n\
    \n尽管 LLM 用途广泛，但必须认识到，与任何 AI 技术一样，它们受到训练数据质量的限制。因此，需要谨慎使用它们，因为它们可能无意中反映出训练数据中存在的偏见，导致结果可能带有偏差或不准确。\n"
- fmt: '### Medical Applications


    In healthcare, LLMs such as `ChatGPT` have shown remarkable promise across various
    medical applications. They have been effectively used in medical education, radiology
    decision-making, clinical genetics, and patient care, as evidenced by numerous
    studies. In medical education, for instance, `ChatGPT` has become a valuable interactive
    learning and problem-solving tool. Its performance on the United States Medical
    Licensing Exam (`USMLE`) has been notably proficient, achieving scores that meet
    or surpass the passing criteria, showcasing its deep understanding of medical
    knowledge without needing specific training.


    Studies point toward the future development of AI-driven clinical decision-making
    tools. `ChatGPT`, for instance, has shown potential in radiological decision-making,
    enhancing clinical workflows and the responsible use of radiology services. Research
    by `Kung` and others has indicated that LLMs like `ChatGPT` could significantly
    improve personalized, compassionate, and scalable healthcare delivery, aiding
    both in education and clinical decision-making.


    A study on clinical genetics found `ChatGPT`’s performance comparable to human
    responses in answering genetics-related questions, excelling in memory-based queries
    but less so in critical thinking tasks. This research also noted `ChatGPT`’s ability
    to provide varied, plausible explanations for both correct and incorrect responses.
    Additionally, research evaluating `ChatGPT`’s accuracy in life support and resuscitation
    questions found it to be largely accurate, especially in questions from the American
    Heart Association’s Basic Life Support and Advanced Cardiovascular Life Support
    exams.


    In neurosurgical research and patient care, the potential roles of `ChatGPT` have
    been explored in patient data collection, survey administration, and providing
    care and treatment information. However, the deployment of such technologies requires
    careful consideration to ensure their effectiveness and safety. A comprehensive
    study encompassing a range of AI applications in life sciences, including decision
    support, `NLP`, data mining, and machine learning, emphasizes the importance of
    reproducibility in AI model development and addresses ongoing research challenges.


    AI-driven chatbots like `ChatGPT` are poised to improve patient outcomes by facilitating
    better communication between patients and healthcare providers. Using `NLP`, these
    chatbots can offer patients easily understandable information about their care
    and treatment. Additionally, AI is being utilized in developing databases for
    COVID-19 drug repurposing, and existing tools like `Ada Health`, `Babylon Health`,
    and `Buoy Health` already facilitate patient interaction. The rise of LLMs could
    further boost patient confidence in these chatbots and enhance the services they
    offer. For example, tools like `XrayGPT` are being developed for automated analysis
    of X-ray images, allowing patients to engage in interactive dialogues about their
    condition.


    In the realm of artificial intelligence, large language models (LLMs) like `GPT-4`
    have revolutionized how machines understand and generate human language. Their
    capabilities extend beyond mere text generation, impacting various sectors including
    technology, education, business, healthcare, and creative arts.


    ### Healthcare Communication and Management


    LLMs are revolutionizing healthcare communication. They assist in patient interaction,
    providing clear explanations of medical conditions and treatments. LLMs can also
    help in drafting patient information leaflets, ensuring they are understandable
    and accessible. In hospital management, they assist in organizing patient records,
    scheduling, and handling administrative tasks, thus improving overall efficiency.


    ### Enhanced Natural Language Processing


    LLMs are the backbone of advanced natural language processing (`NLP`). They excel
    in understanding context, generating coherent responses, and improving communication
    interfaces. This is evident in chatbots, virtual assistants, and customer service
    applications where LLMs provide more natural, human-like interactions. For instance,
    they can handle complex customer queries, offer personalized recommendations,
    and automate routine tasks, significantly improving efficiency and user experience.


    ### Education


    Recent discussions have highlighted the transformative role of artificial intelligence
    (AI) in education, particularly concerning student assignments and examinations.
    Since `OpenAI` introduced `ChatGPT`, there has been a noticeable shift in how
    students engage with educational content, assignments, and coursework.


    One significant benefit of incorporating `ChatGPT` and AI bots in educational
    settings is the enhancement of assignment completion efficiency. `ChatGPT`, for
    instance, is adept at producing high-quality answers across diverse prompts, thereby
    saving students considerable time and effort in their academic work. Furthermore,
    AI bots have the potential to streamline the grading process, lightening the load
    on educators while affording them the opportunity to offer more comprehensive
    feedback to students.


    Another key advantage of these AI tools is their ability to deliver tailored learning
    experiences. AI bots can assess a student’s performance on past assignments and
    tests, using this data to tailor future learning recommendations. This approach
    helps students identify their academic strengths and weaknesses, allowing them
    to concentrate on areas needing improvement.


    `Khan Academy`, a renowned educational non-profit, has expressed interest in leveraging
    `ChatGPT` through its AI chatbot, `Khanmigo`. This virtual tutor and classroom
    assistant aims to enrich tutoring and coaching by facilitating direct interactions
    with students. Such initiatives reflect the optimism surrounding AI’s potential
    in education, challenging the misconception that its primary use is for cheating.
    AI technology, though still evolving, is seen as promising for catering to diverse
    student needs.


    Nevertheless, the use of `ChatGPT` and AI bots in education is not without potential
    downsides. A primary concern is the risk of diminishing creativity and critical
    thinking skills among students. Overreliance on AI for assignments and exams might
    hinder the development of essential skills needed for independent problem-solving
    and critical analysis.


    ### Content Creation and Augmentation


    One of the most prominent uses of LLMs is in content creation. They assist in
    generating articles, reports, essays, and creative writing, reducing the time
    and effort required for these tasks. LLMs like `GPT-4` can produce content on
    a wide range of topics, adhering to specified styles and guidelines. Moreover,
    they assist in editing and refining text, enhancing quality and coherence.


    ### Language Translation and Localization


    LLMs have made significant strides in breaking language barriers. They offer real-time,
    accurate translation services, enabling seamless communication across different
    languages. This capability is crucial for global businesses, travel, and cross-cultural
    interactions. Additionally, LLMs assist in localization, ensuring that content
    is culturally appropriate and resonates with local audiences.


    ### Research and Data Analysis


    Researchers utilize LLMs for literature reviews, hypothesis generation, and data
    interpretation. These models can process vast amounts of information rapidly,
    identifying patterns and insights that might be missed by human researchers. This
    capability is invaluable in fields like medicine, where LLMs can assist in diagnosing
    diseases or suggesting treatments based on medical literature.'
