- fmt: "# String Delimiters and Characteristics\n\nIn Python, you can define string\
    \ literals using either single or double quotes. Any characters enclosed between\
    \ the opening delimiter and the corresponding closing delimiter are considered\
    \ part of the string. There’s no strict limit on the length of a string in Python.\
    \ It can contain as many characters as your machine’s memory resources permit.\
    \ Furthermore, a string can even be empty.\n\n*How do you handle situations where\
    \ you need to include a quotation mark as part of the string itself?* As you can\
    \ observe, the straightforward approach encounters issues. In the given example,\
    \ the string begins with a single quote, leading Python to interpret the following\
    \ single quote within the parentheses as the closing delimiter, unintentionally\
    \ treating it as part of the string. Consequently, the final single quote becomes\
    \ an extraneous character, resulting in a syntax error:\n\n```\n>>> print('This\
    \ is a single quote (') character.')\nSyntaxError: invalid syntax\n```\n\nTo include\
    \ either type of quotation mark within the string, a simple and effective method\
    \ is to enclose the string with the opposite type of quotation marks. *If you\
    \ wish to incorporate a single quote, surround the string with double quotes,\
    \ and conversely, if you need to include a double quote, enclose the string within\
    \ single quotes.* This approach ensures that the desired quotation mark is correctly\
    \ interpreted as part of the string.\n\n```\n>>> print(\"This contains a single\
    \ quote (') character.\")\nThis string contains a single quote (') character.\n\
    >>> print('This contains a double quote (\") character.')\nThis string contains\
    \ a double quote (\") character.\n```\n\n## Handling Special Characters in Strings\n\
    \nIn certain situations, you may need Python to interpret specific characters\
    \ within a string differently.\n\n**This can happen in two ways:**\n\n- **Suppressing\
    \ Special Interpretation:** You might want to prevent certain characters from\
    \ having their usual special meaning within a string.\n- **Applying Special Interpretation:**\
    \ Alternatively, you may wish to give special meaning to characters that are typically\
    \ treated literally.\n\nTo achieve this, you can use the backslash (`\\`) character.\
    \ When a backslash appears in a string, it signals that one or more characters\
    \ immediately following it should be treated in a special manner. This mechanism\
    \ is known as an “escape sequence” because the backslash causes the subsequent\
    \ character sequence to deviate from its standard interpretation.\n\n```\n>>>\
    \ print('String contains a single quote (') character.')\nSyntaxError: invalid\
    \ syntax\n>>> print('String contains a single quote (\\') character.')\nThis string\
    \ contains a single quote (') character.\n```\n\n### Raw Strings\n\nTo denote\
    \ a raw string literal, you use the prefix `r` or `R`, indicating that escape\
    \ sequences within the string will remain unaltered. This means the backslash\
    \ character will not be interpreted as an escape character:\n\n**Raw String:**\n\
    \n```\nprint(r'foo\\nbar')\nfoo\\nbar\n```\n\n**Raw String:**\n\n```\nprint(R'foo\\\
    \\bar')\nfoo\\\\bar\n```\n\nIn a raw string, backslashes are not treated as escape\
    \ characters, preserving their literal representation.\n\n## Triple-Quoted Strings\
    \ in Python\n\nPython offers an alternative method for defining strings known\
    \ as triple-quoted strings. These strings are enclosed by three consecutive single\
    \ quotes (`'''`) or three consecutive double quotes (`\"\"\"`). While escape sequences\
    \ remain functional within triple-quoted strings, you can include single quotes,\
    \ double quotes, and even newlines without needing to escape them. This feature\
    \ simplifies the creation of strings containing both single and double quotes:\n\
    \nFor instance:\n\n```\nprint('''This string has a single (') and a double (\"\
    ) quote.''')\nThis string has a single (') and a double (\") quote.\n```\n\nIn\
    \ triple-quoted strings, the inclusion of single and double quotes does not necessitate\
    \ escape characters, making it a convenient choice for such scenarios.\n\n# Booleans\
    \ and Operators\n\n## Booleans\n\nThe Python Boolean type stands as one of the\
    \ integral built-in data types within the Python programming language. Its primary\
    \ purpose is to convey the truth value of a given expression, aiding in logical\
    \ evaluations. For instance, the expression `1 <= 2` evaluates to `True`, while\
    \ `0 == 1` evaluates to `False`. *A comprehensive understanding of how Python\
    \ Boolean values operate is crucial for effective Python programming.*\n\n**Python’s\
    \ Boolean type encompasses just two possible values:**\n\n- `True`\n- `False`\n\
    \nNo other value within Python assumes the `bool` type. You can ascertain the\
    \ type of `True` and `False` by employing the built-in `type()` function:\n\n\
    ```\n>>> type(False)\n<class 'bool'>\n>>> type(True)\n<class 'bool'>\n```\n\n\
    *The output `<class 'bool'>` indicates the variable is a Boolean data type.* It’s\
    \ worth noting that the `bool` type is an intrinsic component of Python, eliminating\
    \ the need for importing external libraries. However, the name `bool` itself is\
    \ not a reserved keyword in the Python language.\n\n**Note**\n\n`True` and `False`\
    \ in Python\n\n*The keywords `True` and `False` in Python must always begin with\
    \ an uppercase letter. Attempting to use a lowercase `true` or `false` will result\
    \ in an error.*\n\n```\n>>> x = true\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nNameError: name 'true' is not defined\n```\n\
    \n## Converting Integers and Floats into Booleans\n\nIn Python, you can transform\
    \ integers and floating-point numbers into Boolean values by utilizing the built-in\
    \ `bool()` function. When an integer, float, or complex number is assigned a value\
    \ of zero, it yields a boolean outcome of `False`. Conversely, if the number is\
    \ set to any other nonzero value, whether positive or negative, it evaluates to\
    \ `True`.\n\n**For example:**\n\n```\nzero_int = 0\nbool(zero_int)\n# Output:\
    \ False\npos_int = 1\nbool(pos_int)\n# Output: True\nneg_flt = -5.1\nbool(neg_flt)\n\
    # Output: True\n```\n\n## Boolean Operators\n\nBoolean arithmetic revolves around\
    \ the manipulation and combination of true and false logic values. In Python,\
    \ boolean values are represented as either `True` or `False`, and you can perform\
    \ operations on them using boolean operators.\n\n**The commonly used boolean operators\
    \ in Python are as follows:**\n\n- `or`\n- `and`\n- `not`\n- `==` (equivalent)\n\
    - `!=` (not equivalent)\n\nIn the following code segment, two variables, `A` and\
    \ `B`, are assigned boolean values of `True` and `False`, respectively. Subsequently,\
    \ these boolean values are subjected to various operations using boolean operators:\n\
    \n```\nA = True\nB = False\nA or B       # Result: True\nA and B      # Result:\
    \ False\nnot A        # Result: False\nnot B        # Result: True\nA == B   \
    \    # Result: False\nA != B       # Result: True\n```\n\nFurthermore, you can\
    \ create complex boolean expressions by combining boolean operators and using\
    \ parentheses for precedence:\n\n```\nC = False\nA or (C and B)    # Result: True\n\
    (A and B) or C    # Result: False\n```\n\nTable 3-2 represents a summary of boolean\
    \ arithmetic and boolean operators.\n\n**Table 3-2** Boolean arithmetic\n\n| A\
    \ | B | Not A | Not B | A == B | A != B | A or B | A and B |\n|---|---|---|---|---|---|---|---|\n\
    | T | F | F | T | F | T | T | F |\n| F | T | T | F | F | T | T | F |\n| T | T\
    \ | F | F | T | F | T | T |\n| F | F | T | T | T | F | F | F |\n\n## Python Operators\n\
    \nOperators are specialized symbols employed to execute operations on both values\
    \ and variables. They encompass a set of unique symbols dedicated to carrying\
    \ out arithmetic and logical computations. The item upon which the operator acts\
    \ is referred to as the operand."
