- fmt: '#### Data Preprocessing


    Data preprocessing is a crucial step in machine and deep learning that involves
    cleaning, transforming, and organizing raw data into a usable format. This process
    enhances data quality, ensures consistency, and prepares the dataset for effective
    analysis and model training, ultimately leading to more accurate and reliable
    results.


    The data preprocessing techniques utilized in the training of large language models
    (LLMs) include the following:


    - **Quality Filtering:** Ensuring the quality of training data is crucial for
    optimal results. Two approaches to filter data are employed: (1) classifier based
    and (2) heuristics based. Classifier-based methods train a classifier on high-quality
    data to predict the text’s quality for filtering. On the other hand, heuristics-based
    approaches utilize predefined rules, including language, metrics, statistics,
    and keywords, for data filtering.


    - **Data Deduplication:** Duplicated data can negatively impact model performance
    and lead to data memorization. Therefore, data deduplication is a crucial preprocessing
    step in training LLMs. This process can be applied at various levels, such as
    sentences, documents, and entire datasets.


    - **Privacy Reduction:** The majority of training data for LLMs is sourced from
    the web, containing private information. To address privacy concerns, many LLMs
    employ heuristics-based methods to filter out sensitive information like names,
    addresses, and phone numbers, preventing the model from learning personal details.


    ## Architectures


    In this section, different variants of transformer architectures are explored
    at a higher level, which stem from variations in attention application and the
    interconnection of transformer blocks. Figure [2-2](#613844_1_En_2_Chapter.xhtml#Fig2)
    illustrates the attention patterns of these architectures.


    ![](images/613844_1_En_2_Chapter/613844_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Causal decoder vs. non-causal decoder vs. encoder-decoder architectures (Source:
    [`https://arxiv.org/`](https://arxiv.org/))


    ### Encoder-Decoder


    Originally designed for sequence transduction models, transformers adopted the
    encoder-decoder architecture, particularly for tasks like machine translation.
    This architectural design involves an encoder that encodes input sequences into
    variable-length context vectors. These vectors are then passed to the decoder,
    aiming to minimize the discrepancy between predicted token labels and the actual
    target token labels.


    ### Causal Decoder


    The primary goal of an LLM is to predict the next token based on the input sequence.
    While the encoder provides additional context, it has been observed that LLMs
    can perform well even without an encoder, relying solely on the decoder. Similar
    to the original encoder-decoder architecture’s decoder block, this decoder limits
    information flow backward. In other words, the predicted token `tk` depends only
    on the tokens preceding it, up to `tk−1`. This variant is widely utilized in state-of-the-art
    LLMs.


    ### Prefix Decoder


    Causal masked attention is justifiable in encoder-decoder architectures, where
    the encoder can attend to all tokens in the sentence from any position using self-attention.
    However, when the encoder is removed, and only the decoder is retained, this flexibility
    in attention is lost. A variation in decoder-only architectures involves changing
    the mask from strictly causal to fully visible on a portion of the input sequence.
    The Prefix decoder is also referred to as the non-causal decoder architecture.


    ### Pre-training Objectives


    The pre-training objectives of large language models (LLMs) include the following:


    - **Full Language Modeling:** This entails an autoregressive language modeling
    objective where the model is tasked with predicting future tokens based on preceding
    tokens.


    - **Prefix Language Modeling:** Introducing a non-causal training objective, this
    approach involves randomly selecting a prefix, and the loss is calculated based
    on the remaining target tokens.


    - **Masked Language Modeling:** In this training objective, tokens or spans (a
    sequence of tokens) are randomly masked, and the model is required to predict
    the masked tokens considering the past and future context.


    - **Unified Language Modeling:** Unified language modeling combines causal, non-causal,
    and masked language training objectives. In masked language modeling within this
    framework, attention is unidirectional, flowing either from left-to-right or right-to-left
    context.


    ## Model Adaptation


    This section provides an overview of the fundamental stages of large language
    models (LLMs) adaptation, spanning from pre-training to fine-tuning for downstream
    tasks and practical application. The term “alignment-tuning” is used to denote
    aligning with human preferences, while the literature may occasionally employ
    the term “alignment” for different purposes.


    ### Pre-training


    In the initial stage, the model undergoes self-supervised training on a large
    corpus, predicting the next tokens based on the input. The design choices for
    LLMs encompass a range of architectures, including encoder-decoder and decoder-only,
    employing diverse building blocks and loss functions.


    ### Fine-Tuning


    Fine-tuning LLMs can be achieved through various approaches:


    - **Transfer Learning:** Pre-trained LLMs demonstrate robust performance across
    various tasks. However, to enhance performance for a specific downstream task,
    pre-trained models undergo fine-tuning with task-specific data, a process known
    as transfer learning.


    - **Instruction-Tuning:** To enable effective responses to user queries, pre-trained
    models are fine-tuned on instruction-formatted data, consisting of instructions
    and corresponding input-output pairs. Instructions typically encompass multitask
    data in plain natural language, guiding the model to respond appropriately to
    the prompt and input. This fine-tuning strategy improves zero-shot generalization
    and downstream task performance.


    - **Alignment-Tuning:** LLMs may generate false, biased, or harmful text. To rectify
    this, models are aligned using human feedback to ensure helpful, honest, and harmless
    outputs. Alignment-tuning involves prompting LLMs to generate unexpected responses,
    and their parameters are then updated to avoid such responses.^([^(29)](#fn29))


    ### Alignment Verification and Utilization


    Ensuring that large language models (LLMs) align with human intentions and values
    is crucial. A model is considered “aligned” if it satisfies the three criteria
    of being helpful, honest, and harmless (HHH).


    Researchers employ Reinforcement Learning with Human Feedback (RLHF) for model
    alignment. In RLHF, a fine-tuned model on demonstrations undergoes further training
    with reward modeling (RM) and reinforcement learning (RL). The following provides
    a brief discussion of the RM and RL pipelines in RLHF.


    - **Reward Modeling:** This process trains a model to rank generated responses
    based on human preferences using a classification objective. Humans annotate responses
    generated by LLMs, providing feedback based on the HHH criteria.


    - **Reinforcement Learning:** Combined with the reward model, reinforcement learning
    is used for alignment in the subsequent stage. The previously trained reward model
    ranks LLM-generated responses as preferred or dispreferred, aiding in aligning
    the model with proximal policy optimization (PPO). This iterative process continues
    until convergence.'
