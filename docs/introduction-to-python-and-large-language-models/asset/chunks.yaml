  trans: "\n# 条件语句与循环\n\n条件语句和循环是编程中的基本结构，使开发者能够创建动态、高效且响应迅速的应用程序。条件语句，也称为决策语句，允许程序根据特定标准执行不同的操作。通过评估布尔表达式，诸如\
    \ `if`、`else if` 和 `else` 之类的条件语句决定了执行流程，使程序能够适应不同的输入和条件。\n\n另一方面，循环是迭代控制结构，只要给定条件为真，就会重复执行一段代码块。常见的循环类型包括\
    \ `for` 循环和 `while` 循环。这些结构对于需要重复操作的任务至关重要，例如处理数组中的元素、处理用户输入直到收到有效响应，或迭代执行复杂计算。通过利用条件语句和循环，程序员可以设计出健壮且灵活的代码，能够处理各种场景并提高整体程序效率。\n\
    \n## 条件语句\n\n在迄今为止的示例中，你已经积累了相当多的 Python 编程知识，重点关注按线性顺序执行的代码。这意味着每条命令都会按照它们排列的精确顺序依次处理。\n\
    \n然而，现实世界中的场景通常需要更高的灵活性。程序可能需要跳过某些指令、重复执行一组语句，或者根据不同的条件从不同的指令集中进行选择。\n\n这就是**控制结构**概念变得至关重要的地方。控制结构在引导程序内的执行流程（也称为其**控制流**）方面起着重要作用。\n\
    \n在 Python 的上下文中，`if` 语句是进行决策的基本机制。它允许根据表达式的评估结果，有条件地执行单个语句或一组语句。\n\n**示例：**\n\
    \n```\nif <expr>:\n    <statement>\n```\n\n**在此代码片段中：**\n\n*   `\"<expr>\"` 代表一个表达式，Python\
    \ 会对其进行评估以确定其真值，这一概念在 Python 运算符和表达式教程中关于逻辑运算符的讨论中有详细阐述。\n\n*   `\"<statement>\"\
    ` 指遵循缩进规则的任何有效 Python 代码行。\n\n*   当 `<expr>` 产生一个真值结果（意味着 Python 将其解释为真）时，则会执行\
    \ `<statement>`。相反，如果 `<expr>` 产生一个假值（解释为假），则 `<statement>` 会被跳过且不执行。\n\n*   需要注意的是，`<expr>`\
    \ 后面必须要有**冒号（`:`）**。与某些要求将 `<expr>` 括在括号内的语言不同，Python 没有这样的要求。\n\n**示例：**\n\n\
    ```\n>>> x = 0\n>>> y = 5\n>>> if x < y:   # 真值\n...     print('yes')\nyes\n```\n\
    \n### 语句分组\n\n正如本章前面所述，Python 采用了一种称为“越位规则”的编程原则。此规则的特点是使用缩进来界定代码块。Python 属于实现越位规则的相对小众的语言群体。\n\
    \n缩进的作用不仅仅是风格上的，**在 Python 代码中具有功能上的意义**。其原因现在很清楚了：缩进用于界定复合语句或代码块。**因此，在 Python\
    \ 中，具有相同缩进级别的代码行被视为同一代码块的一部分。**\n\n因此，Python 中复合 `if` 语句的结构是通过缩进来定义的：\n\n```\n\
    1| if <expr>:\n2|    <statement>\n3|    <statement>\n4|    <statement>\n...\n\
    5| <following_statement>\n```\n\n在这种情况下，具有相同缩进级别的语句（第 2 行到第 4 行）被分组为一个代码块。如果 `<expr>`\
    \ 评估为真，则执行整个代码块；如果 `<expr>` 为假，则跳过该代码块。处理完此代码块后，程序继续执行 `<following_statement>`。\n\
    \n### 嵌套代码块\n\nPython 中的代码块可以嵌套到任意深度，其中每增加一个缩进级别都表示一个新代码块的开始，而每减少一个缩进级别则表示当前代码块的结束。这种代码块的层次结构创建了一种简单、统一且易于理解的结构。\n\
    \n**示例：**\n\n```\nage = 20\nhas_license = True\nif age >= 18:\n    if has_license:\n\
    \        print(\"你有资格驾驶。\")\n    else:\n        print(\"你未达到驾驶年龄。\")\n```\n\n\
    ### Else 和 Elif 子句\n\n你已经学会了使用 `if` 语句根据条件执行单个指令或一组指令。现在，让我们探索更多的功能。有时，你可能需要评估一个情况，并在条件成立时采取一种行动方案，同时在条件不成立时定义另一种不同的方案。这种情况可以通过添加一个\
    \ `else` 子句来有效管理。\n\n```\nif <expr>:\n    <statement(s)>\nelse:\n    <statement(s)>\n\
    ```\n\n当 `<expr>` 评估为真时，**程序执行第一组语句并跳过第二组**。相反，如果 `<expr>` 为假，程序跳过第一组并**继续执行第二组**。完成这些条件分支后，程序的流程将继续执行第二组语句之后的代码。\n\
    \n**示例：**\n\n```\ntemperature = 30\nif temperature > 25:\n    print(\"今天很热。\"\
    )\nelse:\n    print(\"今天不热。\")\n```\n\nPython 提供了一种通过使用一个或多个 `elif` 子句（代表 `else\
    \ if`）来导航多个条件路径的方法。该语言会顺序评估每个条件（`<expr>`），并执行与第一个评估为真的条件相关联的代码块。如果所有条件都为假，并且存在\
    \ `else` 子句，则将执行 `else` 子句下的代码块。\n\n**示例：**\n\n```\nscore = 75  # 假设这是百分制分数\n\
    if score >= 90:\n    print(\"等级：A\")\nelif score >= 80:\n    print(\"等级：B\")\n\
    elif score >= 70:\n    print(\"等级：C\")\nelif score >= 60:\n    print(\"等级：D\"\
    )\nelse:\n    print(\"等级：F\")\n```\n\n### 单行 if 语句\n\n通常，`if` 语句中的 `<expr>` 写在一行，而\
    \ `<statement>` 缩进在下一行。然而，也可以将整个 `if` 语句构建在一行上，实现相同的功能。\n\n**语法：**\n\n```\nif\
    \ <expr>: <statement>\n```\n\n可以通过使用分号分隔多个 `<statement>` 来将它们包含在一行中：\n\n**语法：**\n\
    \n```\nif <expr>: <statement>; <statement>; ...; <statement>\n```\n\n## Python\
    \ 循环（For 和 While）\n\n编程中的循环是一个基本概念，它允许根据条件或直到满足某个条件重复执行一段代码块。循环用于自动化重复性任务，使得可以对数据集合执行操作、生成序列或等待特定事件，而无需多次编写相同的代码行。\n\
    \n**循环有几种类型，但最常见的包括以下几种：**\n\n*   **For 循环**：遍历一个序列（例如列表、元组、字典、集合或字符串），并为序列中的每个项目执行一段代码块。当迭代次数已知或有限时，通常使用它。\n\
    \n*   **While 循环**：只要指定的条件保持为真，就继续执行一段代码块。当循环开始前迭代次数未知，并且取决于某个条件何时改变时，使用它。\n\n\
    循环可以包含各种控制语句来修改其执行流程，例如使用 `break` 提前退出循环，使用 `continue` 跳过当前迭代并继续下一次迭代，或者使用 `else`\
    \ 在循环条件不再为真时执行一段代码块（适用于 Python）。\n"
- fmt: "### While Loop in Python\n\nIn Python, a `while` loop repeatedly executes\
    \ a set of statements as long as a specified condition remains true. Once the\
    \ condition evaluates to false, the program resumes execution with the line immediately\
    \ following the loop.\n\n**Syntax:**\n\n```\nwhile expression:\n    statement(s)\n\
    ```\n\nLike with the `if` conditionals, Python groups statements into a single\
    \ block of code based on the uniform indentation level following a programming\
    \ construct. The same number of spaces used to indent statements determines their\
    \ inclusion in the same code block.\n\n**Example:**\n\n```\ncounter = 0  # Initialize\
    \ counter\nwhile counter < 5:\n    print(\"Counter is\", counter)\n    counter\
    \ += 1  # Increment counter\nprint(\"Loop finished\")\n```\n\n**Output:**\n\n\
    ```\nCounter is 0\nCounter is 1\nCounter is 2\nCounter is 3\nCounter is 4\nLoop\
    \ finished\n```\n\n### Else Statement with while Loop\n\nIn Python, `else` statement\
    \ could be used along with the `while` loops. Here is an example:\n\n```\ncount\
    \ = 0  # Initialize count\nwhile count < 3:\n    print(\"Count is\", count)\n\
    \    count += 1  # Increment count\nelse:\n    print(\"Count is no longer less\
    \ than 3\")\n```\n\nIn this example, the `while` loop executes as long as `count`\
    \ is less than 3. It prints the current value of `count` and then increments `count`\
    \ by 1 each time through the loop. When `count` reaches 3, the loop condition\
    \ `count < 3` becomes false, causing the loop to exit. At this point, the `else`\
    \ block is executed, printing \"Count is no longer less than 3\". The `else` part\
    \ of a `while` loop runs when the loop condition becomes false naturally, meaning\
    \ it wasn't exited through a `break` statement.\n\n### Creating an Infinite Loop\
    \ with Python while Loop\n\nTo repeatedly execute a code block an indefinite number\
    \ of times, Python `while` loop can be employed for such a purpose. This approach\
    \ involves utilizing a `while` loop with the condition `(count == 0)`. The loop\
    \ is designed to continue executing as long as the value of `count` remains 0.\
    \ Given that `count` is initially set to 0, this leads to a loop that will run\
    \ endlessly, as its condition perpetually holds true.\n\n**Caution**\n\nEmploying\
    \ such an endless loop is generally advised against because it creates a loop\
    \ with no natural conclusion, where the condition remains perpetually true, necessitating\
    \ a forced termination of the program's execution.\n\n### For Loops in Python\n\
    \n`for` loops facilitate iterative processing, allowing for the orderly iteration\
    \ over structures like lists, strings, or arrays. Python employs a `for in` loop,\
    \ akin to the `foreach` loop found in various other programming languages.\n\n\
    **Syntax:**\n\n```\nfor iterator_var in sequence:\n    statements(s)\n```\n\n\
    **Example:**\n\n```\nn = 5\nfor i in range(0, n):\n    print(i)\n```\n\n**Output:**\n\
    \n```\n0\n1\n2\n3\n4\n```\n\n**Note**\n\n`range()` function and loops\n\nWhen\
    \ using the `range()` function in conjunction with `for` loops in Python, it's\
    \ important to remember that the function generates numbers up to, but not including,\
    \ the end index. This means if you use `range()` to iterate up to 5, the loop\
    \ will execute with the numbers 0 through 4, resulting in a total of 5 iterations.\
    \ The end index (in this case, 5) is exclusive.\n\n### Else Statement with for\
    \ Loop\n\nSimilar to the `while` loop, the `for` loop in Python can be paired\
    \ with an `else` statement. However, since the `for` loop doesn't terminate based\
    \ on a conditional expression but rather completes its iteration over a sequence,\
    \ the `else` block is executed right after the `for` loop concludes.\n\n**Example:**\n\
    \n```\nfor i in range(3):\n    print(f\"i is {i}\")\nelse:\n    print(\"Loop completed\
    \ without break\")\n```\n\nIn this example, the `for` loop iterates over a sequence\
    \ generated by `range(3)`, which produces the numbers 0, 1, and 2. For each iteration,\
    \ the value of `i` is printed out. Once the loop has iterated over all items in\
    \ the sequence (i.e., after printing 0, 1, and 2), the loop naturally concludes,\
    \ and control passes to the `else` block. The `else` block then executes, printing\
    \ \"Loop completed without break\".\n\n### Nested Loops in Python\n\nThe Python\
    \ programming language supports the inclusion of one loop within another, a concept\
    \ referred to as nested loops. The following examples are provided to demonstrate\
    \ this concept in action.\n\n**Syntax:**\n\n**For loop:**\n\n```\nfor iterator_var\
    \ in sequence:\n    for iterator_var in sequence:\n        statements(s)\n   \
    \ statements(s)\n```\n\n**While loop:**\n\n```\nwhile expression:\n    while expression:\n\
    \        statement(s)\n    statement(s)\n```\n\n**Example:**\n\n```\n# Outer loop\n\
    for i in range(3):  # Will iterate over 0, 1, 2\n    # Inner loop\n    for j in\
    \ range(2):  # Will iterate over 0, 1\n        print(f\"i = {i}, j = {j}\")\n\
    ```\n\nIn this example, there are two loops: an outer loop and an inner loop.\
    \ The outer loop iterates through a range of numbers from 0 to 2 (inclusive),\
    \ and for each iteration of the outer loop, the inner loop iterates through a\
    \ range of numbers from 0 to 1 (inclusive).\n\nThe outer loop starts with `i =\
    \ 0`. Then, the inner loop begins its execution, iterating with `j` taking values\
    \ 0 and then 1. For each iteration of the inner loop, it prints the current values\
    \ of `i` and `j`.\n\nAfter the inner loop completes its iterations for `j = 0`\
    \ and `j = 1`, control returns to the outer loop, incrementing `i` to the next\
    \ value.\n\nThis process repeats until the outer loop has completed all its iterations\
    \ (for `i = 0`, `i = 1`, and `i = 2`).\n\nThe result is a series of prints showing\
    \ each combination of `i` and `j`, demonstrating how nested loops can be used\
    \ to generate or iterate over a Cartesian product of two ranges. This pattern\
    \ is commonly used in scenarios requiring iteration over multiple dimensions,\
    \ such as processing the cells in a 2D matrix or grid.\n\n**Output:**\n\n```\n\
    i = 0, j = 0\ni = 0, j = 1\ni = 1, j = 0\ni = 1, j = 1\ni = 2, j = 0\ni = 2, j\
    \ = 1\n```\n\n### Loop Control Statements\n\nControl statements in loops alter\
    \ the normal flow of execution. Exiting a scope results in the destruction of\
    \ all automatically created objects within that scope. Python offers several control\
    \ statements for this purpose:\n\n- **Continue Statement:** This statement redirects\
    \ the flow back to the start of the loop, effectively skipping the remainder of\
    \ the loop's body for the current iteration.\n- **Break Statement:** Utilizing\
    \ this statement exits the loop entirely, transferring control to the statement\
    \ immediately following the loop.\n- **Pass Statement:** The `pass` statement\
    \ is used in Python to define a syntactical placeholder, allowing for the creation\
    \ of empty loops, as well as placeholders within control structures, functions,\
    \ and classes, without affecting the flow of execution.\n\n**Example demonstrating\
    \ `continue`, `break`, and `pass`:**\n\n```\nfor num in range(1, 10):  # Loop\
    \ from 1 to 9\n    if num % 2 == 0:\n        continue  # Skip the rest of the\
    \ loop for even numbers\n    if num == 5:\n        pass  # Do nothing for num\
    \ == 5, placeholder for future code\n    if num == 7:\n        break  # Exit the\
    \ loop when num is 7\n    print(num)\n```\n\n## Python Data Structures: Lists,\
    \ Sets, Tuples, Dictionaries\n\nPython offers a variety of built-in data structures\
    \ that provide versatile ways to store and manipulate data:\n\n- **Lists** are\
    \ ordered collections that allow duplicate elements and support indexing.\n- **Sets**\
    \ are unordered collections that automatically remove duplicates and provide fast\
    \ membership testing.\n- **Tuples** are immutable, ordered collections ideal for\
    \ fixed data sequences.\n- **Dictionaries** are key-value pairs, allowing efficient\
    \ data retrieval based on unique keys.\n\nEach data structure has distinct characteristics\
    \ and use cases, making Python a powerful and flexible language for managing data.\n\
    \n### What Is a Data Structure?\n\nData organization, management, and storage\
    \ play a crucial role in making data access and modification more efficient. **Data\
    \ structures** provide a framework for arranging data in a manner that facilitates\
    \ storing data collections, establishing relationships among them, and efficiently\
    \ executing operations on them."
  raw: '### While Loop in Python


    In Python, a “while” loop repeatedly executes a set of statements as long as a
    specified condition remains true. Once the condition evaluates to false, the program
    resumes execution with the line immediately following the loop.


    **Syntax:**


    ```

    while expression:

    statement(s)

    ```


    Like with the if conditionals, Python groups statements into a single block of
    code based on the uniform indentation level following a programming construct.
    The same number of spaces used to indent statements determines their inclusion
    in the same code block.


    **Example:**


    ```

    counter = 0  # Initialize counter

    while counter < 5:

    print("Counter is", counter)

    counter += 1  # Increment counter

    print("Loop finished")

    ```


    **Output:**


    ```

    Counter is 0

    Counter is 1

    Counter is 2

    Counter is 3

    Counter is 4

    Loop finished

    ```


    ### Else Statement with while Loop


    In Python, `else` statement could be used along with the while loops. Here is
    an example:


    ```

    count = 0  # Initialize count

    while count < 3:

    print("Count is", count)

    count += 1  # Increment count

    else:

    print("Count is no longer less than 3")

    ```


    In this example, the while loop executes as long as count is less than 3\. It
    prints the current value of count and then increments count by 1 each time through
    the loop. When count reaches 3, the loop condition count < 3 becomes false, causing
    the loop to exit. At this point, the else block is executed, printing “Count is
    no longer less than 3”. **The else part of a while loop runs when the loop condition
    becomes false naturally, meaning it wasn’t exited through a break statement.**


    ### Creating an Infinite Loop with Python while Loop


    To repeatedly execute a code block an indefinite number of times, Python “while”
    loop can be employed for such a purpose. This approach involves utilizing a “while”
    loop with the condition “(count == 0)”. The loop is designed to continue executing
    as long as the value of “count” remains 0\. Given that “count” is initially set
    to 0, this leads to a loop that will run endlessly, as its condition perpetually
    holds true.


    Caution


    Employing such an endless loop is generally advised against because it creates
    a loop with no natural conclusion, where the condition remains perpetually true,
    necessitating a forced termination of the program''s execution.


    ### For Loops in Python


    For loops facilitate iterative processing, allowing for the orderly iteration
    over structures like lists, strings, or arrays. Python employs a “for in” loop,
    akin to the foreach loop found in various other programming languages.


    **Syntax:**


    ```

    for iterator_var in sequence:

    statements(s)

    ```


    **Example:**


    ```

    n = 5

    for i in range(0, n):

    print(i)

    ```


    **Output:**


    ```


    ```


    Note


    range( ) function and loops


    *When using the range( ) function in conjunction with for loops in Python, it’s
    important to remember that the function generates numbers up to, but not including,
    the end index. This means if you use range( ) to iterate up to 5, the loop will
    execute with the numbers 0 through 4, resulting in a total of 5 iterations. The
    end index (in this case, 5) is exclusive.*


    ### Else Statement with for Loop


    Similar to the “`while`” loop, the “`for`” loop in Python can be paired with an
    “else” statement. However, since the “for” loop doesn’t terminate based on a conditional
    expression but rather completes its iteration over a sequence, **the “else” block
    is executed right after the “for” loop concludes.**


    **Example:**


    ```

    for i in range(3):

    print(f"i is {i}")

    else:

    print("Loop completed without break")

    ```


    In this example, the for loop iterates over a sequence generated by range(3),
    which produces the numbers 0, 1, and 2\. For each iteration, the value of i is
    printed out. Once the loop has iterated over all items in the sequence (i.e.,
    after printing 0, 1, and 2), the loop naturally concludes, and control passes
    to the else block. The else block then executes, printing “Loop completed without
    break”.


    ### Nested Loops in Python


    The Python programming language supports the inclusion of one loop within another,
    a concept referred to as nested loops. The following examples are provided to
    demonstrate this concept in action.


    **Syntax:**


    **For loop:**


    ```

    for iterator_var in sequence:

    for iterator_var in sequence:

    statements(s)

    statements(s)

    ```


    **While loop:**


    ```

    while expression:

    while expression:

    statement(s)

    statement(s)

    ```


    **Example:**


    ```

    # Outer loop

    for i in range(3):  # Will iterate over 0, 1, 2

    # Inner loop

    for j in range(2):  # Will iterate over 0, 1

    print(f"i = {i}, j = {j}")

    ```


    In this example, there are two loops: an outer loop and an inner loop. The outer
    loop iterates through a range of numbers from 0 to 2 (inclusive), and for each
    iteration of the outer loop, the inner loop iterates through a range of numbers
    from 0 to 1 (inclusive).


    The outer loop starts with i = 0\. Then, the inner loop begins its execution,
    iterating with j taking values 0 and then 1\. For each iteration of the inner
    loop, it prints the current values of i and j.


    After the inner loop completes its iterations for j = 0 and j = 1, control returns
    to the outer loop, incrementing i to the next value.


    This process repeats until the outer loop has completed all its iterations (for
    i = 0, i = 1, and i = 2).


    The result is a series of prints showing each combination of i and j, demonstrating
    how nested loops can be used to generate or iterate over a Cartesian product of
    two ranges. This pattern is commonly used in scenarios requiring iteration over
    multiple dimensions, such as processing the cells in a 2D matrix or grid.


    **Output:**


    ```

    i = 0, j = 0

    i = 0, j = 1

    i = 1, j = 0

    i = 1, j = 1

    i = 2, j = 0

    i = 2, j = 1

    ```


    ### Loop Control Statements


    Control statements in loops alter the normal flow of execution. Exiting a scope
    results in the destruction of all automatically created objects within that scope.
    Python offers several control statements for this purpose:


    *   **Continue Statement:** This statement redirects the flow back to the start
    of the loop, effectively skipping the remainder of the loop’s body for the current
    iteration.


    *   **Break Statement:** Utilizing this statement exits the loop entirely, transferring
    control to the statement immediately following the loop.


    *   **Pass Statement:** The pass statement is used in Python to define a syntactical
    placeholder, allowing for the creation of empty loops, as well as placeholders
    within control structures, functions, and classes, without affecting the flow
    of execution.


    **Example demonstrating** **continue, break, and pass****:**


    ```

    for num in range(1, 10):  # Loop from 1 to 9

    if num % 2 == 0:

    continue  # Skip the rest of the loop for even numbers

    if num == 5:

    pass  # Do nothing for num == 5, placeholder for future code

    if num == 7:

    break  # Exit the loop when num is 7

    print(num)

    ```


    ## Python Data Structures: Lists, Sets, Tuples, Dictionaries


    Python offers a variety of built-in data structures that provide versatile ways
    to store and manipulate data:


    *   Lists are ordered collections that allow duplicate elements and support indexing.


    *   Sets are unordered collections that automatically remove duplicates and provide
    fast membership testing.


    *   Tuples are immutable, ordered collections ideal for fixed data sequences.


    *   Dictionaries are key-value pairs, allowing efficient data retrieval based
    on unique keys.


    Each data structure has distinct characteristics and use cases, making Python
    a powerful and flexible language for managing data.


    ### What Is a Data Structure?


    Data organization, management, and storage play a crucial role in making data
    access and modification more efficient. **Data structures** provide a framework
    for arranging data in a manner that facilitates storing data collections, establishing
    relationships among them, and efficiently executing operations on them.'
  trans: "\n### Python 中的 while 循环\n\n在 Python 中，`while` 循环会在指定条件保持为真时，重复执行一组语句。一旦条件求值为假，程序将继续执行循环之后紧接着的代码行。\n\
    \n**语法：**\n\n```\nwhile expression:\n    statement(s)\n```\n\n与 `if` 条件语句类似，Python\
    \ 根据编程结构后统一的缩进级别，将语句组合成单个代码块。用于缩进语句的空格数量决定了它们是否属于同一个代码块。\n\n**示例：**\n\n```\ncounter\
    \ = 0  # 初始化计数器\nwhile counter < 5:\n    print(\"Counter is\", counter)\n    counter\
    \ += 1  # 递增计数器\nprint(\"Loop finished\")\n```\n\n**输出：**\n\n```\nCounter is 0\n\
    Counter is 1\nCounter is 2\nCounter is 3\nCounter is 4\nLoop finished\n```\n\n\
    ### while 循环中的 else 语句\n\n在 Python 中，`else` 语句可以与 `while` 循环一起使用。以下是一个示例：\n\n\
    ```\ncount = 0  # 初始化计数\nwhile count < 3:\n    print(\"Count is\", count)\n  \
    \  count += 1  # 递增计数\nelse:\n    print(\"Count is no longer less than 3\")\n\
    ```\n\n在此示例中，只要 `count` 小于 3，`while` 循环就会执行。它会打印 `count` 的当前值，然后在每次循环中将 `count`\
    \ 递增 1。当 `count` 达到 3 时，循环条件 `count < 3` 变为假，导致循环退出。此时，`else` 代码块被执行，打印 \"Count\
    \ is no longer less than 3\"。`while` 循环的 `else` 部分在循环条件自然变为假时运行，这意味着它不是通过 `break`\
    \ 语句退出的。\n\n### 使用 Python while 循环创建无限循环\n\n为了无限次地重复执行代码块，可以使用 Python 的 `while`\
    \ 循环来实现此目的。这种方法涉及使用条件为 `(count == 0)` 的 `while` 循环。只要 `count` 的值保持为 0，循环就会继续执行。鉴于\
    \ `count` 初始设置为 0，这会导致一个无限运行的循环，因为其条件永远为真。\n\n**警告**\n\n通常不建议使用这种无限循环，因为它创建了一个没有自然结束的循环，其中的条件永远为真，需要强制终止程序的执行。\n\
    \n### Python 中的 for 循环\n\n`for` 循环便于进行迭代处理，允许对列表、字符串或数组等结构进行有序迭代。Python 使用 `for\
    \ in` 循环，类似于其他各种编程语言中的 `foreach` 循环。\n\n**语法：**\n\n```\nfor iterator_var in sequence:\n\
    \    statements(s)\n```\n\n**示例：**\n\n```\nn = 5\nfor i in range(0, n):\n    print(i)\n\
    ```\n\n**输出：**\n\n```\n0\n1\n2\n3\n4\n```\n\n**注意**\n\n`range()` 函数与循环\n\n在 Python\
    \ 中将 `range()` 函数与 `for` 循环结合使用时，务必记住该函数会生成从 0 开始到（但不包括）结束索引的数字。这意味着如果你使用 `range()`\
    \ 迭代到 5，循环将使用数字 0 到 4 执行，总共进行 5 次迭代。结束索引（在此例中为 5）是不包含在内的。\n\n### for 循环中的 else\
    \ 语句\n\n与 `while` 循环类似，Python 中的 `for` 循环也可以与 `else` 语句配对使用。然而，由于 `for` 循环不是基于条件表达式终止，而是完成对序列的迭代，因此\
    \ `else` 代码块会在 `for` 循环结束后立即执行。\n\n**示例：**\n\n```\nfor i in range(3):\n    print(f\"\
    i is {i}\")\nelse:\n    print(\"Loop completed without break\")\n```\n\n在此示例中，`for`\
    \ 循环迭代由 `range(3)` 生成的序列，该序列产生数字 0、1 和 2。每次迭代都会打印出 `i` 的值。一旦循环迭代完序列中的所有项（即打印完\
    \ 0、1 和 2 之后），循环自然结束，控制权传递给 `else` 代码块。然后 `else` 代码块执行，打印 \"Loop completed without\
    \ break\"。\n\n### Python 中的嵌套循环\n\nPython 编程语言支持将一个循环包含在另一个循环内部，这种概念称为嵌套循环。以下示例用于演示此概念的实际应用。\n\
    \n**语法：**\n\n**For 循环：**\n\n```\nfor iterator_var in sequence:\n    for iterator_var\
    \ in sequence:\n        statements(s)\n    statements(s)\n```\n\n**While 循环：**\n\
    \n```\nwhile expression:\n    while expression:\n        statement(s)\n    statement(s)\n\
    ```\n\n**示例：**\n\n```\n# 外层循环\nfor i in range(3):  # 将迭代 0, 1, 2\n    # 内层循环\n\
    \    for j in range(2):  # 将迭代 0, 1\n        print(f\"i = {i}, j = {j}\")\n```\n\
    \n在此示例中，有两个循环：一个外层循环和一个内层循环。外层循环迭代从 0 到 2（包含）的数字范围，对于外层循环的每次迭代，内层循环都会迭代从 0 到 1（包含）的数字范围。\n\
    \n外层循环从 `i = 0` 开始。然后，内层循环开始执行，`j` 依次取值 0 和 1。对于内层循环的每次迭代，它都会打印 `i` 和 `j` 的当前值。\n\
    \n在内层循环完成 `j = 0` 和 `j = 1` 的迭代后，控制权返回到外层循环，将 `i` 递增到下一个值。\n\n此过程重复进行，直到外层循环完成其所有迭代（对于\
    \ `i = 0`、`i = 1` 和 `i = 2`）。\n\n结果是打印出一系列显示 `i` 和 `j` 每种组合的输出，演示了如何使用嵌套循环生成或迭代两个范围的笛卡尔积。这种模式常用于需要迭代多个维度的场景，例如处理二维矩阵或网格中的单元格。\n\
    \n**输出：**\n\n```\ni = 0, j = 0\ni = 0, j = 1\ni = 1, j = 0\ni = 1, j = 1\ni =\
    \ 2, j = 0\ni = 2, j = 1\n```\n\n### 循环控制语句\n\n循环中的控制语句会改变正常的执行流程。退出作用域会导致该作用域内所有自动创建的对象被销毁。Python\
    \ 为此提供了几种控制语句：\n\n- **Continue 语句：** 此语句将流程重定向回循环的开头，有效地跳过当前迭代中循环体的剩余部分。\n- **Break\
    \ 语句：** 使用此语句会完全退出循环，将控制权转移到循环之后紧接着的语句。\n- **Pass 语句：** Python 中的 `pass` 语句用于定义语法占位符，允许创建空循环，以及在控制结构、函数和类中创建占位符，而不会影响执行流程。\n\
    \n**演示 `continue`、`break` 和 `pass` 的示例：**\n\n```\nfor num in range(1, 10):  #\
    \ 从 1 循环到 9\n    if num % 2 == 0:\n        continue  # 对于偶数，跳过循环的剩余部分\n    if\
    \ num == 5:\n        pass  # 对于 num == 5 不做任何操作，作为未来代码的占位符\n    if num == 7:\n\
    \        break  # 当 num 为 7 时退出循环\n    print(num)\n```\n\n## Python 数据结构：列表、集合、元组、字典\n\
    \nPython 提供了多种内置数据结构，为存储和操作数据提供了灵活的方式：\n\n- **列表** 是有序集合，允许重复元素并支持索引。\n- **集合**\
    \ 是无序集合，会自动移除重复项并提供快速的成员资格测试。\n- **元组** 是不可变的有序集合，非常适合固定数据序列。\n- **字典** 是键值对，允许基于唯一键进行高效的数据检索。\n\
    \n每种数据结构都有不同的特性和用例，使 Python 成为管理数据的强大且灵活的语言。\n\n### 什么是数据结构？\n\n数据的组织、管理和存储在提高数据访问和修改效率方面起着至关重要的作用。**数据结构**\
    \ 提供了一种框架，用于以促进数据集合存储、建立数据间关系以及高效执行操作的方式来排列数据。\n"
- fmt: '### Python’s Built-In Data Structures


    Python inherently supports a variety of data structures that allow for effective
    data storage and retrieval. These include `Lists`, `Dictionaries`, `Tuples`, and
    `Sets`, each offering unique capabilities for data manipulation.


    #### Custom Data Structures in Python


    Python also empowers its users to design their own data structures, giving them
    complete control over their functionality. Common data structures such as `Stacks`,
    `Queues`, `Trees`, and `Linked Lists`, familiar to those versed in other programming
    languages, can be implemented in Python as well. With an understanding of the
    available data structures, we can now proceed to explore how to implement and
    utilize these structures in Python.


    ### Built-In Data Structures


    #### Lists


    `Lists` are versatile data structures in Python that allow you to store a sequence
    of items of various data types. Each item in a list is assigned a unique index,
    which is used to access the element. Indexing starts at 0 for the first element,
    known as positive indexing, and there’s also negative indexing, beginning at -1,
    to access elements starting from the end of the list backward.


    ##### Creating Lists


    You can create a list by enclosing your elements within square brackets. Leaving
    the brackets empty will result in an empty list.


    **Example:**


    ```

    my_list = [1, "Hello", 3.14]

    # Creating an empty list

    empty_list = []

    print("My list:", my_list)

    print("Empty list:", empty_list)

    ```


    **Output:**


    ```

    My list: [1, ''Hello'', 3.14]

    Empty list: []

    ```


    ##### Adding Elements


    To add elements to a list, Python provides methods such as the following:


    - The `append()` method adds its argument as a single element to the end of a
    list.

    - The `extend()` method unfolds its argument, adding each element to the list
    individually.

    - The `insert()` method inserts a given element at a specified index, thereby
    increasing the list’s length.


    **Example:**


    ```

    # Start with an empty list

    fruits = []

    # Adding elements to the list using append()

    fruits.append("Apple")

    fruits.append("Banana")

    fruits.append("Cherry")

    print("Fruits List:", fruits)

    ```


    **Output:**


    ```

    Fruits List: [''Apple'', ''Banana'', ''Cherry'']

    ```


    ##### Deleting Elements


    Elements can be removed from a list using several techniques:


    - The `del` statement removes elements by index but does not return them.

    - The `pop()` method removes and returns an element at a given index.

    - To remove an element by value, you use the `remove()` method.


    **Example:**


    ```

    # Creating a list of numbers

    numbers = [10, 20, 30, 40, 50]

    # Deleting an element by index using del

    del numbers[1]  # Deletes 20, which is at index 1

    print("After del:", numbers)

    # Deleting an element by value using remove()

    numbers.remove(30)  # Removes the first occurrence of 30

    print("After remove():", numbers)

    # Deleting an element and returning it using pop()

    popped_element = numbers.pop(2)  # Pops the element at index 2 (which is now 50)

    print("After pop():", numbers)

    print("Popped Element:", popped_element)

    ```


    **Output:**


    ```

    After del: [10, 30, 40, 50]

    After remove(): [10, 40, 50]

    After pop(): [10, 40]

    Popped Element: 50

    ```


    ##### Accessing Elements


    Accessing elements in a list is straightforward and similar to accessing characters
    in a string; you use the index to obtain the desired element.


    **Example:**


    ```

    # Creating a list of fruits

    fruits = ["Apple", "Banana", "Cherry", "Date", "Elderberry"]

    # Accessing elements by positive indexing

    print("First fruit:", fruits[0])  # Apple

    print("Third fruit:", fruits[2])  # Cherry

    # Accessing elements by negative indexing

    print("Last fruit:", fruits[-1])  # Elderberry

    print("Second to last fruit:", fruits[-2])  # Date

    # Accessing a slice of the list

    slice_of_fruits = fruits[1:4]  # From index 1 (inclusive) to index 4 (exclusive)

    print("Slice of fruits:", slice_of_fruits)  # [''Banana'', ''Cherry'', ''Date'']

    ```


    In this example:


    - We create a list named `fruits` with five elements.

    - We access individual elements using both positive and negative indexes. Positive
    indexing starts from the beginning of the list (0), and negative indexing starts
    from the end of the list (-1).

    - We also demonstrate how to access a slice (subsection) of the list using the
    slicing `syntax list[start:stop]`, where `start` is the index to begin the slice
    (inclusive) and `stop` is the index to end the slice (exclusive). This returns
    a new list containing the specified section.


    #### Additional List Operations


    Lists come with a suite of useful methods for manipulation and inquiry:


    - `len()` returns the number of items in a list.

    - `index()` searches for a given value and returns the index of its first occurrence.

    - `count()` counts the occurrences of a given value within the list.

    - Both `sorted()` and `sort()` are used for sorting lists. `sorted()` returns
    a new sorted list, leaving the original list unchanged, while `sort()` sorts the
    list in place.


    **Example:**


    ```

    my_numbers = [5, 2, 8, 10, 25, 10]

    print(len(my_numbers))          # Find the length of the list

    print(my_numbers.index(10))     # Find the index of the first occurrence of an
    element

    print(my_numbers.count(10))     # Find the count of a specific element

    print(sorted(my_numbers))       # Print a sorted version of the list without changing
    the original

    my_numbers.sort(reverse=False)  # Sort the original list in ascending order

    print(my_numbers)

    ```


    **Output:**


    ```

    6

    3

    2

    [2, 5, 8, 10, 10, 25]

    [2, 5, 8, 10, 10, 25]

    ```


    Understanding these fundamentals of lists will enhance your ability to manage
    and manipulate data effectively in Python.


    ### Dictionaries in Python


    `Dictionaries` in Python are collections that store data as key-value pairs, akin
    to a phone directory where each name (key) is associated with a phone number (value).
    Keys are unique identifiers that map to values, allowing for efficient data retrieval.
    This structure is akin to looking up a name in a phone book to find the corresponding
    number.


    #### Creating a Dictionary


    You can create dictionaries by enclosing key-value pairs within curly braces `{}`,
    or by using the `dict()` constructor. Each key-value pair is added to the dictionary
    in this manner.


    **Example:**


    ```

    # Creating a dictionary with key-value pairs

    person_info = {"name": "John Doe", "age": 30, "city": "New York"}

    # Creating an empty dictionary

    empty_dict = {}

    print("Person Information:", person_info)

    print("Empty Dictionary:", empty_dict)

    ```


    **Output:**


    ```

    Person Information: {''name'': ''John Doe'', ''age'': 30, ''city'': ''New York''}

    Empty Dictionary: {}

    ```


    #### Modifying and Adding Key-Value Pairs


    To modify an existing entry, you reference the key and assign a new value to it.
    Adding a new key-value pair is as simple as assigning a value to a new key in
    the dictionary.


    **Example:**


    ```

    # Initial dictionary

    car = {"make": "Ford", "model": "Mustang", "year": 1964}

    # Modifying an existing key-value pair

    car["year"] = 2020

    # Adding a new key-value pair

    car["color"] = "blue"

    print("Updated Car Dictionary:", car)

    ```


    **Output:**


    ```

    Updated Car Dictionary: {''make'': ''Ford'', ''model'': ''Mustang'', ''year'':
    2020, ''color'': ''blue''}

    ```'
