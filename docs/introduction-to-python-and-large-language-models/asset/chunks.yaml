- fmt: "### Creating a File Using the `write()` Function\n\nSimilar to reading a file\
    \ in Python, there are various methods to write to a file. Here, we will demonstrate\
    \ how to write content to a file using the `write()` function in Python.\n\n**Example:**\n\
    \n```python\n# Specify the file path (replace with the desired file path)\nfile_path\
    \ = \"new_file.txt\"\ntry:\n    # Open the file in write mode ('w')\n    with\
    \ open(file_path, 'w') as file:\n        # Write content to the file\n       \
    \ file.write(\"This is the first line.\\n\")\n        file.write(\"This is the\
    \ second line.\\n\")\n        file.write(\"This is the third line.\\n\")\n   \
    \ print(f\"File '{file_path}' created and content written successfully.\")\nexcept\
    \ IOError:\n    print(f\"An error occurred while creating or writing to the file\
    \ '{file_path}'.\")\n```\n\n**Output:**\n\n```\nFile 'example.txt' created and\
    \ content written successfully.\n```\n\n**Now if you open the file, you’ll see\
    \ the following:**\n\n```\nThis is the first line.\nThis is the second line.\n\
    This is the third line.\n```\n\n### Working in Append Mode\n\n```python\n# Python\
    \ code to illustrate append() mode\nfile = open('test.txt', 'a')\nfile.write(\"\
    This will add this line\")\nfile.close()\n```\n\n**And now in the file, you’ll\
    \ see the following:**\n\n```\nThis is the first line.\nThis is the second line.\n\
    This is the third line.\nThis will add this line\n```\n\n## The Powerful Features\
    \ of Python 3.11\n\nPython 3.11 made its debut on October 24, 2022, boasting increased\
    \ speed and enhanced user-friendliness. Following 17 months of intensive development,\
    \ it is now poised for widespread adoption.\n\nLike its predecessors, Python 3.11\
    \ introduces a plethora of enhancements and modifications. While a comprehensive\
    \ list of these can be found in the documentation, this chapter will delve into\
    \ the most exciting and influential new features.\n\n### TypedDicts\n\n`TypedDict`\
    \ was specified in PEP 589 and introduced in Python 3.8. On older versions of\
    \ Python, you can install it from `typing_extensions` (`pip install typing_extensions`).\
    \ In Python 3.11, it is directly imported from `typing`.\n\n#### `TypedDict` or\
    \ Just a `Dict`?\n\n- The `dict[key: value]` type lets you declare uniform dictionary\
    \ types, where every value has non-defined type, and arbitrary keys are supported.\n\
    - But the `TypedDict` allows us to describe a structured dictionary where the\
    \ type of each dictionary value depends on the key.\n\n**Example:**\n\n```python\n\
    from typing import TypedDict, List\n\nclass SalesSummary(TypedDict):\n    sales:\
    \ int\n    country: str\n    product_codes: List[str]\n\ndef get_sales_summary()\
    \ -> SalesSummary:\n    return {\n        \"sales\": 1_000,\n        \"country\"\
    : \"UK\",\n        \"product_codes\": [\"SUYDT\"],\n    }\n```\n\n**`TypedDict`\
    \ cannot inherit from both a `TypedDict` type and a non-`TypedDict` base class.**\n\
    \n### `Required[]` and `NotRequired[]`\n\n**Example:**\n\n```python\nfrom typing\
    \ import TypedDict, NotRequired\n\nclass User(TypedDict):\n    name: str\n   \
    \ age: int\n    married: NotRequired[bool]\n\nmarie: User = {'name': 'Marie',\
    \ 'age': 29, 'married': True}\nfredrick: User = {'name': 'Fredrick', 'age': 17}\
    \  # 'married' is not required\n```\n\n**Example:**\n\n```python\nfrom typing\
    \ import TypedDict, Required\n\n# 'total=False' means all fields are not required\
    \ by default\nclass User(TypedDict, total=False):\n    name: Required[str]\n \
    \   age: Required[int]\n    married: bool  # now this is optional\n\nmarie: User\
    \ = {'name': 'Marie', 'age': 29, 'married': True}\nfredrick: User = {'name': 'Fredrick',\
    \ 'age': 17}  # 'married' is not required\nthomas: User = {'age': 29, 'married':\
    \ True}  # Will be highlighted because a key is missing!\n```\n\n**Unary operators\
    \ `+` / `-` / `~` as `Required`/`NotRequired` example:**\n\n```python\nclass MyThing(TypedDict,\
    \ total=False):\n    req1: +int    # + means a required key, or Required[]\n \
    \   opt1: str\n    req2: +float\n\nclass MyThing(TypedDict):\n    req1: int\n\
    \    opt1: -str    # - means a potentially-missing key, or NotRequired[]\n   \
    \ req2: float\n\nclass MyThing(TypedDict):\n    req1: int\n    opt1: ~str    #\
    \ ~ means a opposite-of-normal-totality key\n    req2: float\n```\n\n### Self\
    \ Type\n\nPreviously, if you had to define a class method that returned an object\
    \ of the class itself, it would look something like this:\n\n```python\nfrom typing\
    \ import TypeVar\n\nT = TypeVar('T', bound=type)\n\nclass Circle:\n    def __init__(self,\
    \ radius: int) -> None:\n        self.radius = radius\n\n    @classmethod\n  \
    \  def from_diameter(cls: T, diameter) -> T:\n        circle = cls(radius=diameter/2)\n\
    \        return circle\n```\n\nTo be able to say that a method returns the same\
    \ type as the class itself, you had to define a `TypeVar` and say that the method\
    \ returns the same type `T` as the current class itself.\n\n#### With Self Type\n\
    \nThanks to its straightforward and compact syntax, as specified in PEP 673, the\
    \ `Self` type serves as the recommended annotation for methods returning an instance\
    \ of their class. Starting from Python version 3.11 and onward, you can directly\
    \ import the `Self` type from Python’s `typing` module. For Python versions prior\
    \ to 3.11, you can access the `Self` type via the `typing_extensions` module.\n\
    \n```python\nfrom typing import Self\n\nclass Language:\n    def __init__(self,\
    \ name, version, release_date):\n        self.name = name\n        self.version\
    \ = version\n        self.release_date = release_date\n\n    def change_version(self,\
    \ version) -> Self:\n        self.version = version\n        return Language(self.name,\
    \ self.version, self.release_date)\n\nlang = Language(\"Python\", 3.11, \"November\"\
    )\nlang.change_version(3.12)\nprint(lang.version)\n```\n\n**Output:**\n\n```\n\
    3.12\n```\n\n### Improved Exceptions\n\n#### Better Error Messages\n\nUntil now,\
    \ in a traceback, the only information you got about where an exception got raised\
    \ was the line. In Python 3.11, the exact error locations in tracebacks are showed:\n\
    \n```\nTraceback (most recent call last):\n  File \"asd.py\", line 15, in <module>\n\
    \    print(get_margin(data))\n          ^^^^^^^^^^^^^^^^\n  File \"asd.py\", line\
    \ 2, in print_margin\n    margin = data['profits']['monthly'] / 10 + data['profits']['yearly']\
    \ / 2\n             ~~~~~~~~~~~~~~~~~~~~~~~~~~^~~\nTypeError: unsupported operand\
    \ type(s) for /: 'NoneType' and 'int'\n```\n\n#### Exception Notes\n\nPython 3.11\
    \ introduces exception notes (PEP 678). Now, inside your `except` clauses, you\
    \ can call the `add_note()` function and pass a custom message when you raise\
    \ an error.\n\n**Example:**\n\n```python\nimport math\n\ntry:\n    math.sqrt(-1)\n\
    except ValueError as e:\n    e.add_note(\"Negative value passed! Please try again.\"\
    )\n    raise\n```\n\n#### Another Way to Add Exception Notes: Define It As an\
    \ Attribute to a Custom-Defined Exception Class\n\n**Example:**\n\n```python\n\
    import math\n\nclass MyOwnError(Exception):\n    __notes__ = [\"This is a custom\
    \ error!\"]\n\ntry:\n    math.sqrt(-1)\nexcept:\n    raise MyOwnError\n```\n\n\
    #### Exception Groups\n\nOne way to think about exception groups (Figure 4-1)\
    \ is that they’re regular exceptions wrapping several other regular exceptions.\
    \ However, while exception groups behave like regular exceptions in many respects,\
    \ they also support special syntax that helps you handle each of the wrapped exceptions\
    \ effectively. In Python 3.11, we group exceptions with `ExceptionGroup()`.\n\n\
    **Example:**\n\n```python\ndef exceptionGroup():\n    exec_gr = ExceptionGroup('ExceptionGroup\
    \ Message!',\n                             [FileNotFoundError(\"This File is not\
    \ found\"),\n                              ValueError(\"Invalid Value Provided\"\
    ),\n                              ZeroDivisionError(\"Trying to divide by 0\"\
    )])\n    raise exec_gr\n```\n\n![Figure 4-1](images/613844_1_En_4_Chapter/613844_1_En_4_Fig1_HTML.jpg)\n\
    \n**Figure 4-1** Grouped exceptions in Python"
