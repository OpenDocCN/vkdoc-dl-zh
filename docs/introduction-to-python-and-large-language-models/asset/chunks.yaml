  trans: '

    ### 向量空间模型与状态空间模型


    值得注意的是，词袋（BOW）模型被认为是一种基础的词嵌入技术，它将词语与向量关联起来。然而，将词语嵌入向量空间的广泛应用取得了显著进展，尤其是在 21 世纪初的突破之后，以及随后在
    2013 年和 2014 年分别出现的`Word2Vec`^(⁸)和`GloVe`。词嵌入技术已成为语言建模中不可或缺的一部分，并被其他各种模型广泛采用。


    向量空间模型和状态空间模型是语言建模中的基本概念。向量空间模型涉及用代数方法将语言元素表示为嵌入到特定向量空间中的向量。


    向量空间由向量组成，这些向量是词语、句子甚至文档的数值表示。虽然基本向量（如地图坐标）只有两个维度，但自然语言处理中使用的向量可能包含数千个维度。


    将词语表示为向量的概念（通常称为词嵌入或词向量化）自 20 世纪 80 年代以来就已存在。^(⁹)这简化了评估词语之间的相似度或搜索查询与文档相关性的过程。余弦相似度通常用于衡量向量之间的相似度。通过使用非二元词项权重的线性代数，向量空间模型能够计算两个对象（例如查询和文档）之间的连续相似度，从而实现部分匹配。


    **注意**


    **状态空间模型**


    *尽管向量空间模型已在自然语言处理（NLP）领域得到深入研究和广泛应用，但最近 NLP 领域对状态空间模型的兴趣激增。尽管如此，状态空间模型已在包括信号处理和控制理论在内的多个领域的序列建模中证明了其价值。鉴于状态空间模型在处理长序列方面的有效性，这些模型为在语言建模中构建创新架构以及改进现有技术提供了广阔前景。*


    ### 神经语言模型——大语言模型的崛起


    2001 年，约书亚·本吉奥及其同事引入了最早的神经语言模型之一，标志着语言建模新时代的开端。值得注意的是，本吉奥^(¹⁰)、杰弗里·辛顿和扬·勒昆因其开创性贡献荣获
    2018 年 ACM 图灵奖，他们被广泛认为使深度神经网络成为计算领域的关键组成部分。


    传统的 n-gram 模型在学习能力上存在局限性。常规方法是通过平滑方法从语料库中估计条件概率`p(wi|wi-n+1, wi-n+2, ···, wi-1)`。然而，随着`n`值的增加，模型参数以`O(V^n)`的速度呈指数增长，其中`V`代表词汇量大小。这种指数增长，加上训练数据的稀疏性，阻碍了模型参数的准确学习。


    本吉奥等人的神经语言模型通过两项关键改进增强了 n-gram 模型。首先，它引入了一个称为词嵌入的实值向量来表示单个词语或词语组合。与词语的“独热向量”表示（其中对应元素为
    1，其余为 0）相比，词嵌入的维度显著降低。


    作为一种“分布式表示”形式，词嵌入与独热向量相比，具有更高的效率、更强的泛化能力、鲁棒性和可扩展性。其次，该语言模型被构建为神经网络，从而大幅减少了模型中的参数数量。


    人工神经网络（ANN）已成为自然语言处理以及各种机器学习和人工智能模型开发中广泛采用的方法。


    在本吉奥及其同事的贡献之后，涌现了大量关于词嵌入和神经语言建模的技术，并从不同角度引入了改进。


    21 世纪后期见证了一个关键转变，其标志是对神经网络（尤其是深度学习技术的出现）重新燃起的兴趣。利用循环神经网络（RNN）和长短期记忆网络（LSTM）^(¹¹)处理序列数据，在推动语言理解和生成方面发挥了关键作用。这一变革时期出现了显著的应用，尤其是在机器翻译领域。谷歌在
    2016 年推出的“神经机器翻译”系统就是这一进步的例证，它通过利用深度学习技术进行语言翻译，超越了传统方法。


    这一时期的一个显著里程碑是 2013 年由托马斯·米科洛夫及其在谷歌的团队发布的`Word2Vec`模型。该模型通过学习基于词语在大型文本数据集中上下文使用的分布式词表示，彻底改变了语言表示方式。`Word2Vec`模型为捕捉词语之间的语义关系奠定了基础，将语言理解提升到了超越单纯统计关联的水平。


    #### 循环神经网络


    循环神经网络（RNN）（图 1-2）代表了继基本统计模型和基于规则的模型之后语言模型的关键进步。RNN 起源于 20 世纪 80 年代，在处理序列和时间序列数据方面发挥了重要作用。虽然
    RNN 促进了语言模型的发展，但它在处理长期依赖关系^(¹²)方面面临挑战，例如梯度消失和梯度爆炸问题。研究人员一直在寻求改进的解决方案，以解决这些局限性并增强处理长序列的能力。


    在循环神经网络（RNN）领域，一个关键方面是中间表示或状态的概念。词语之间的相互依赖关系通过 RNN 模型中状态之间的关系得以体现。虽然模型的参数在不同位置是共享的，但生成的表示会根据其各自位置而有所不同。


    ![](img/613844_1_En_1_Fig2_HTML.jpg)


    **图 1-2** RNN 层的基本架构


    在 RNN 的每个位置，每一层都存在一个中间表示，它体现了到该位置为止的词语序列的“状态”。当前位置当前层的中间表示由前一位置同一层的中间表示以及当前位置下一层的中间表示共同决定。当前位置的最终中间表示在计算下一个词语的概率时起着关键作用。

    '
- fmt: '# Long Short-Term Memory


    Long Short-Term Memory (LSTM) networks represent a type of deep learning sequential
    neural network designed to address the challenge of information retention. Functioning
    as a specialized form of recurrent neural network (RNN), LSTMs effectively tackle
    the vanishing gradient problem encountered by traditional RNNs, a significant
    issue in machine learning algorithms. `Hochreiter and Schmidhuber`^([^(13)](#fn13))
    `developed LSTM to overcome limitations inherent in conventional RNNs`, presenting
    a solution that enhances the performance of machine learning models. Implementation
    of the LSTM model can be carried out using the `Keras` library in Python.


    To illustrate, consider the experience of recalling a prior scene while watching
    a video or passage of a music song, or just remembering events from an earlier
    chapter while reading a book. Analogously, RNNs operate by retaining previous
    information and utilizing it for processing current input. However, RNNs `face
    a limitation in remembering long-term dependencies` due to the vanishing gradient
    problem. LSTMs, on the other hand, are expressly crafted to circumvent these challenges
    associated with long-term dependencies.


    Differing from conventional neural networks, Long Short-Term Memory (LSTM) integrates
    feedback connections, enabling it to process entire sequences of data rather than
    individual data points. This distinctive capability makes it highly proficient
    in comprehending and predicting patterns within sequential data, including time
    series, text, and speech.


    In the realm of artificial intelligence and deep learning, LSTM has emerged as
    a potent tool, contributing to breakthroughs across various fields by extracting
    valuable insights from sequential data.


    At a broad level, the functioning of LSTM closely resembles that of an RNN cell.
    The internal mechanism of the LSTM network involves three key components, each
    with a distinct function:


    - Forget Gate

    - Input Gate

    - Output Gate


    The initial part decides whether information from the previous timestamp is relevant
    and should be retained or deemed irrelevant and discarded. The second segment
    focuses on learning new information from the input. Finally, in the third section,
    the updated information from the current timestamp is passed to the subsequent
    timestamp, constituting a single time step in the LSTM cycle.


    These three components are also known as `gates`. The gates govern the flow of
    information in and out of the memory cell or LSTM cell. The Forget Gate, the Input
    Gate, and the Output Gate regulate these flows. An LSTM unit, comprising these
    gates along with a memory cell or LSTM cell, can be likened to a layer of neurons
    in a `traditional feedforward neural network`, where each neuron encompasses a
    hidden layer and a current state.


    Similar to a basic RNN, LSTM possesses a hidden state denoted as `H(t-1)` for
    the previous timestamp and `H(t)` for the current timestamp. Additionally, LSTM
    incorporates a cell state represented by `C(t-1)` and `C(t)` for the previous
    and current timestamps, respectively. The hidden state is identified as `Short-Term
    Memory`, while the cell state is termed `Long-Term Memory`.


    **Example:** *Consider two sentences separated by a full stop: “John is a nice
    person,” followed by “Allison, on the other hand, is bad.” As we transition from
    the first sentence to the second, the LSTM network, utilizing the Forget Gate,
    can appropriately disregard information about John and acknowledge that the focus
    has shifted to Allison.*


    > **Note**

    >

    > **Bidirectional LSTMs**

    >

    > *Moving beyond LSTM, bidirectional LSTMs represent a type of recurrent neural
    network (RNN) architecture that processes input data in both forward and backward
    directions. Unlike traditional LSTMs that consider only past-to-future information
    flow, bidirectional LSTMs incorporate* `future-to-past context`, enhancing their
    ability to capture dependencies in both directions.

    >

    > *Comprising two LSTM layers—one for forward processing and the other for backward
    processing—this architecture proves particularly effective in tasks requiring
    a comprehensive understanding of input sequences, such as* `sentiment analysis`,
    `machine translation`, and `named entity recognition`. The bidirectional LSTMs’
    incorporation of information from both directions enhances their capacity to capture
    `long-term dependencies`, leading to more accurate predictions in complex sequential
    data.


    # Gated Recurrent Units


    Gated Recurrent Units (GRUs), introduced by Cho et al. in 2014,^([^(14)](#fn14))
    present another approach to mitigate the vanishing gradient problem in RNNs. GRUs
    share similarities with LSTM networks by incorporating additional gates to handle
    the gradient challenge. However, GRUs utilize only two gates (`update` and `reset`)
    and lack an extra cell present in LSTMs. Consequently, GRUs boast a simpler architecture
    with fewer parameters, resulting in faster training. Nevertheless, LSTMs and GRUs
    each have distinct strengths and weaknesses, making them suitable for different
    applications. Notably, `LSTM networks may excel in scenarios with long-term dependencies
    in the data`.'
