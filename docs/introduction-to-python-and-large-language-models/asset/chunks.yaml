- fmt: "### Use Cases of LangChain\n\nLangChain’s capabilities in harnessing large\
    \ language models (LLMs) unlock a vast array of sophisticated applications across\
    \ numerous sectors and industries. Here are some illustrative examples and use\
    \ cases:\n\n- **Customer Support Chatbots:** LangChain facilitates the creation\
    \ of advanced chatbots that can manage intricate inquiries and even conduct transactions.\
    \ These bots are designed to grasp and remember the context of a user’s conversation,\
    \ similar to how ChatGPT operates, enhancing customer service and experience.\n\
    \n- **Coding Assistants:** Leveraging LangChain, alongside APIs from platforms\
    \ like OpenAI, enables the development of tools that aid software developers and\
    \ tech professionals in refining their coding capabilities and boosting productivity.\n\
    \n- **Healthcare Innovations:** In the healthcare domain, applications built with\
    \ LangChain are revolutionizing the way diagnoses are made and streamlining administrative\
    \ tasks such as scheduling appointments. This automation allows healthcare professionals\
    \ to dedicate more time to critical patient care.\n\n- **Marketing and E-commerce\
    \ Tools:** LLM-powered applications are transforming e-commerce and marketing\
    \ by understanding consumer behavior, purchasing patterns, and product details.\
    \ This enables the generation of personalized product recommendations and engaging\
    \ product descriptions, helping businesses attract and retain customers.\n\nThese\
    \ examples underscore LangChain’s versatility in creating solutions that address\
    \ complex needs across a wide range of fields, from improving customer interactions\
    \ to supporting healthcare providers and enhancing e-commerce strategies.\n\n\
    ### Example of a LangChain App – Article Summarizer\n\n**Workflow**\n\n- **Install\
    \ Essential Packages:** Begin with installing the required packages: `requests`,\
    \ `newspaper3k`, and `langchain`.\n\n- **Data Collection:** Use the `requests`\
    \ package to retrieve content from specific article URL.\n\n- **Extract Information:**\
    \ Leverage the `newspaper` package to parse the collected HTML, isolating article\
    \ titles and body text.\n\n- **Preprocess Text:** Clean and structure the extracted\
    \ content to prepare it for input into ChatGPT.\n\n- **Generate Summaries:** Employ\
    \ ChatGPT to produce concise summaries of the article’ content.\n\n- **Display\
    \ Results:** Present the summaries alongside the original titles, offering a quick\
    \ insight into each article’s main points.\n\nThis application utilizing ChatGPT\
    \ enables you to quickly grasp essential information from articles with the help\
    \ of AI summarization. It is designed to keep you well informed without dedicating\
    \ extensive time to reading full articles, showcasing the practicality of AI in\
    \ enhancing information consumption efficiency.\n\nStart by securing your OpenAI\
    \ API key, a prerequisite for utilizing the summarizer. This involves creating\
    \ an account on the OpenAI website and gaining API access. Once your account is\
    \ set up, locate the API keys section to retrieve your key.\n\nEnsure the installation\
    \ of necessary libraries by executing the following command: `pip install langchain==0.1.4\
    \ deeplake openai==1.10.0 tiktoken`. It’s also important to install the `newspaper3k`\
    \ library, specifically version `0.2.8`, as it is the version verified for compatibility\
    \ in this tutorial.\n\nIn your Python script or notebook, assign your API key\
    \ to an environment variable named `OPENAI_API_KEY`. To accomplish this using\
    \ a `.env` file, employ the `load_dotenv` function.\n\n**In the following app:**\n\
    \n1.  You need to select an article’s URL to create a summary. Add it to the variable\
    \ with value `YOUR-URL`.\n\n2.  The subsequent script retrieves the article from\
    \ a set of URLs utilizing the `requests` library alongside a personalized `User-Agent`\
    \ header.\n\n3.  It subsequently isolates the title and content of each article\
    \ using the `newspaper` library.\n\n4.  You need to install Python Dotenv using\
    \ the command `pip install python-dotenv`.\n\n5.  To generate a `.env` file, go\
    \ to your project directory using the terminal and execute the `touch` command\
    \ in the following manner: `touch .env`.\n\n6.  Add there your API key in the\
    \ form of a `variable = OPEN_AI_KEY = Your API Key`.\n\n7.  Then load the environmental\
    \ variables:\n\n    ```\n    from dotenv import load_dotenv\n    load_dotenv()\n\
    \    ```\n\n**Then use the following code:**\n\n```\nimport json\nfrom dotenv\
    \ import load_dotenv\nload_dotenv()\nimport requests\nfrom newspaper import Article\n\
    headers = {\n'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36\
    \ (KHTML, like Gecko) Chrome/89.0.4389.82 Safari/537.36'\n}\narticle_url = \"\
    YOUR-URL\"\nsession = requests.Session()\ntry:\nresponse = session.get(article_url,\
    \ headers=headers, timeout=10)\nif response.status_code == 200:\narticle = Article(article_url)\n\
    article.download()\narticle.parse()\nprint(f\"Title: {article.title}\")\nprint(f\"\
