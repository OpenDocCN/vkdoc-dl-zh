- fmt: '# In-Depth Architecture of the LLMs


    At their core, large language models (LLMs) represent a form of artificial intelligence
    designed to emulate human intelligence. They operate by employing sophisticated
    statistical models and deep learning techniques to analyze extensive volumes of
    text data. These models learn intricate patterns and relationships inherent in
    the data, enabling them to produce new content that closely mimics the style and
    characteristics of a particular author or genre.


    The process commences with pre-training, where the LLM is exposed to a vast corpus
    of text from diverse sources like books, articles, and websites. Through unsupervised
    learning, the model predicts the next word in a sentence based on the context
    of preceding words, fostering an understanding of grammar, syntax, and semantic
    relationships.


    The LLM’s pre-training pipeline involves the first step of collecting corpus sources,
    categorized into general and specialized data. Subsequently, data preprocessing
    becomes crucial to generate the pre-training corpus, involving the removal of
    noisy, redundant, unnecessary, and potentially harmful material.


    The second stage encompasses quality filtering to eliminate low-quality and undesired
    data using techniques like language filtering, statistical filtering, and keyword
    filtering. The third stage involves deduplication, addressing the finding that
    duplicate data reduces diversity in LMs, impacting training stability and model
    performance.


    The fourth stage focuses on privacy reduction, acknowledging concerns related
    to privacy breaches when using web-based data. Privacy reduction measures are
    implemented to remove personally identifiable information (PII) from the pre-training
    corpus. The final step, tokenization, segments raw text into individual tokens,
    which are then input into LLMs.


    Following pre-training, the LLM undergoes fine-tuning, involving training on a
    specific task or domain. Labeled examples guide the model to generate more accurate
    and contextually appropriate responses for the target task. Fine-tuning enables
    LLMs to specialize in applications like language translation, question answering,
    or text generation.


    LLMs excel due to their ability to capture statistical patterns and linguistic
    nuances in the training data. By processing vast amounts of text, they develop
    a comprehensive understanding of language, producing coherent and contextually
    relevant responses.


    During the inference stage, when interacting with an LLM, a user inputs a prompt
    or query, and the model generates a response based on learned knowledge and context.
    This response is generated using probabilistic methods that consider the likelihood
    of various words or phrases given the input context, showcasing the data preprocessing
    pipelines for pre-training LLMs.


    ## Tokenization


    In the training of LLMs to predict text, a fundamental preprocessing step is tokenization,
    a common practice in natural language processing systems. Tokenization aims to
    break down the text into nondecomposing units known as tokens, with these tokens
    being characters, subwords, symbols, or words depending on the model’s size and
    type.


    * **WordPiece**: Initially introduced as a novel text segmentation technique for
    Japanese and Korean languages to enhance language models for voice search systems,
    WordPiece selects tokens that increase the likelihood of an n-gram-based language
    model trained on a vocabulary composed of tokens.


    * **BPE**: Originating from compression algorithms, `byte pair encoding (BPE)`
    is an iterative process that generates tokens by replacing pairs of adjacent symbols
    with a new symbol. This approach involves merging occurrences of the most frequently
    appearing symbols in the input text.


    * **UnigramLM**: In this tokenization method, a basic unigram language model (LM)
    is trained using an initial vocabulary of subword units. The vocabulary undergoes
    iterative pruning by removing the least probable items from the list, identified
    as the underperforming elements in the unigram LM.


    ## Attention


    The concept of attention, particularly selective attention, has been extensively
    examined within the realms of perception, psychophysics, and psychology. Selective
    attention can be understood as “the programming by the O of which stimuli will
    be processed or encoded and in what order this will occur.”


    While this definition originates from visual perception, it bears striking resemblances
    to the recently formulated attention mechanisms^([^(25)](#fn25)) (determining
    which stimuli will be processed) and positional encoding (deciding the order of
    processing) in LLMs.


    ### Attention Mechanisms in LLMs


    The attention mechanism plays a crucial role in computing a representation of
    input sequences by establishing relationships between different positions (tokens)
    within these sequences. Various approaches exist for calculating and implementing
    attention, and some well-known types are outlined here:


    * **Self-attention:** Also referred to as intra-attention, self-attention involves
    all queries, keys, and values originating from the same block (either encoder
    or decoder). This layer establishes connections between all sequence positions
    with `O(1)` space complexity, making it highly effective for learning long-range
    dependencies in the input.


    * **Cross-Attention:** In encoder-decoder architectures, the outputs of encoder
    blocks serve as queries for the intermediate representation of the decoder. This
    setup provides keys and values to compute a representation of the decoder conditioned
    on the encoder, and it is termed cross-attention.


    * **Full Attention:** The straightforward implementation of self-attention is
    known as full attention.


    * **Sparse Attention:** Self-attention has a time complexity of `O(n^2)`, which
    becomes impractical when scaling LLMs to handle large context windows. An approximation
    to self-attention was proposed, significantly improving the ability of GPT series
    LLMs to process a greater number of input tokens within a reasonable timeframe.


    * **Flash Attention:** The bottleneck in calculating attention using GPUs lies
    in memory access rather than computational speed. Flash Attention utilizes the
    classical input tiling approach to process input blocks in GPU on-chip SRAM instead
    of performing I/O for each token from High Bandwidth Memory (HBM). Extending this
    approach to sparse attention replicates the speed gains seen in full attention
    implementation. This innovation allows LLMs to handle even larger context-length
    windows compared to those using sparse attention.'
