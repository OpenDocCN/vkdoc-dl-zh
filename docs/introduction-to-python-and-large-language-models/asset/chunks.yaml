  trans: '

    ### 自然语言生成


    自然语言生成（NLG）致力于以类似人类交流的方式，根据特定关键词或主题来构建对话文本。例如，一个具备 NLG 能力的智能聊天机器人，能够像人类客服人员一样与客户互动。


    ### 统计自然语言处理、机器学习与深度学习


    最早的 NLP 应用是人工构建的、基于规则的系统，能够执行特定的 NLP 功能。然而，它们难以适应日益增长的例外情况以及不断扩大的文本和语音数据量。


    这时，统计自然语言处理应运而生，它将计算机算法与机器学习和深度学习模型相结合。它能够自动提取、分类和标记文本及语音数据中的组成部分，并为这些组成部分的潜在含义分配统计概率。


    在当代，基于卷积神经网络（`CNN`s）和循环神经网络（`RNN`s）的深度学习模型和学习技术，使 NLP 系统能够在运行过程中逐步“学习”，从大量未经处理、非结构化且未标记的文本和语音数据集中提取出越来越精确的含义。


    ### NLP 面临的挑战


    尽管取得了进展，但由于人类语言的复杂性和微妙性，自然语言处理（NLP）仍面临着几个严峻的挑战。以下是其中一些突出的 NLP 挑战：


    *   **歧义性：** 人类语言常常存在歧义，即一个词语有多种含义。这种复杂性给 NLP 模型在不同语境中准确判断词语含义带来了巨大障碍。

    *   **语境：** 准确理解依赖于把握词语使用的语境。NLP 在有效解读语言使用背后的语境细微差别方面，一直面临挑战。

    *   **精确性：** 传统计算要求人类使用一种精确、清晰且结构化的编程语言进行交流。与此形成鲜明对比的是，人类语言往往缺乏精确性，常因俚语、地域方言和社会语境等因素而充满歧义。

    *   **语气与语调：** NLP 在语气、语调及语义分析方面仍有待完善。检测诸如讽刺等元素颇具挑战性，因为这需要理解词语选择和语境。此外，口语中微妙但重要的语气变化可能逃过
    NLP 算法的识别。单词重音或音节强调对句子含义的影响，以及不同口音导致的语音语调变化，都给算法解析带来了更多复杂性。

    *   **语言用法的演变：** 语言的动态特性，即其使用模式不断演变，给 NLP 带来了持续的挑战。尽管语言遵循既定规则，但这些规则并非一成不变，会随时间推移而改变。当前相关的计算规则，可能会随着现实世界语言的演变而过时。


    ### 区分 NLP 基础与 LLM 能力


    区分 NLP 的基本原理与大语言模型（LLM）的卓越能力至关重要。传统 NLP 涵盖了多种技术，从依赖人工构建规则的基于规则的系统，到利用概率模型和机器学习算法从数据中学习模式的统计方法。这些传统
    NLP 技术旨在针对特定的 NLP 任务（如命名实体识别、机器翻译或情感分析）进行设计和优化。


    相比之下，LLM 是 NLP 模型的一个子集，其特点是采用深度学习架构，通常包含多层人工神经网络。这种深度学习方法使 LLM 能够从庞大的数据语料库中学习，并将其知识泛化到广泛的任务中。与传统
    NLP 技术不同，LLM 无需为每个特定任务进行显式编程或特征工程。相反，它们可以直接从数据中学习复杂的关系和模式，因此具有非凡的多功能性。


    然而，这种多功能性是有代价的。LLM 计算密集，需要大量资源进行训练和部署。此外，它们对数据的需求量很大，依赖海量文本数据才能达到最佳性能。这些因素在计算基础设施和数据可用性方面带来了挑战，在实际应用中使用
    LLM 时必须仔细权衡。


    理解传统 NLP 技术与 LLM 之间的区别，对于为特定任务选择最合适的方法至关重要。当任务定义明确且所需数据有限时，传统 NLP 技术可能更合适。另一方面，LLM
    提供了无与伦比的多功能性，并有潜力处理更广泛的任务，尽管其计算需求和数据要求更高。

    '
- fmt: '### Contrasting Traditional NLP Techniques with LLMs


    The fundamental distinction between conventional NLP techniques and LLMs lies
    in their respective approaches and the scope of their capabilities. Traditional
    NLP methods are typically designed to excel at specific tasks, such as machine
    translation, sentiment analysis, or named entity recognition. These methods rely
    on carefully crafted features and algorithms that are tailored to each particular
    task. While this approach can be highly effective for well-defined tasks, it often
    requires substantial manual effort to engineer the necessary features and algorithms.


    In contrast, LLMs take a much broader, data-driven approach to NLP. Instead of
    being explicitly programmed for specific tasks, LLMs are trained on vast amounts
    of text data and learn to identify patterns and relationships within the language.
    This allows them to perform a wide range of tasks, even those for which they were
    not explicitly trained. For example, an LLM can be used for text generation, question
    answering, summarization, and even creative writing.


    However, this versatility comes at a price. LLMs require significantly more computational
    resources and data than traditional NLP methods. Training an LLM typically involves
    using large-scale datasets and powerful hardware, such as graphical processing
    units (GPUs). Additionally, LLMs can be challenging to control and can sometimes
    generate nonsensical or biased output.


    Table [1-2](#613844_1_En_1_Chapter.xhtml#Tab2) summarizes the key differences
    between conventional NLP techniques and LLMs.


    **Table 1-2** Conventional NLP techniques vs. LLMs


    | Feature | Conventional NLP Techniques | LLMs |

    | --- | --- | --- |

    | Approach | Task-specific, engineered features and algorithms | Data-driven,
    learns patterns from text |

    | Scope | Limited to specific tasks | Wide range of tasks |

    | Computational resources | Less computationally expensive | More computationally
    expensive |

    | Data requirements | Smaller datasets | Larger datasets |

    | Controllability | More controllable | Less controllable |


    Despite these challenges, LLMs represent a major breakthrough in the field of
    NLP and are rapidly advancing the state of the art in many applications. As these
    models continue to develop and improve, it is expected to see them play an increasingly
    important role in our lives.


    While the bedrock of NLP provides the core techniques and foundational knowledge
    necessary for tackling language processing tasks, LLMs herald a groundbreaking
    leap forward. LLMs offer an unrivaled breadth of versatility and exceptional performance
    across a diverse spectrum of tasks. However, it is important to acknowledge that
    LLMs come with their own set of unique requirements and challenges.


    For those aspiring to embark on a journey into the captivating realm of language
    processing and artificial intelligence, a comprehensive understanding of both
    NLP principles and the capabilities of LLMs is of paramount importance. By mastering
    the fundamentals of NLP, one gains insights into the essential techniques, algorithms,
    and mathematical underpinnings that facilitate the processing, understanding,
    and generation of human language.


    On the other hand, exploring the world of LLMs unveils their remarkable ability
    to learn from vast text corpora, enabling them to perform a multitude of language-related
    tasks, ranging from text generation and translation to question answering and
    summarization. LLMs have demonstrated impressive results in various domains, such
    as healthcare, finance, and customer service, showcasing their potential to revolutionize
    industries.


    However, it is crucial to recognize that LLMs are not without limitations. They
    may exhibit biases inherited from the training data, struggle with common-sense
    reasoning, and occasionally generate inaccurate or nonsensical responses. Understanding
    these challenges is essential for responsible and effective deployment of LLMs
    in real-world applications.


    By cultivating a deep understanding of both NLP fundamentals and LLM capabilities,
    aspiring practitioners and researchers will be well equipped to navigate the complexities
    of language processing, contribute to the ongoing advancements in the field, and
    unlock the full potential of LLMs in driving innovation and solving real-world
    problems.


    ### Summary


    This chapter provides a comprehensive overview of the development and impact of
    large language models (LLMs) within the field of artificial intelligence. The
    chapter traces the progression from early statistical and rule-based models to
    contemporary transformer-based models with billions of parameters. It discusses
    the emergence and achievements of notable LLMs such as OpenAI’s ChatGPT, Google
    Bard, and Meta’s LLaMA, highlighting their contributions to natural language processing
    (NLP).


    The chapter concludes by discussing the era of multimodal learning, where LLMs
    are integrated with diverse data types such as text, images, and audio.


    **In the following chapter, we will explore in detail the following:**


    - How large language models work

    - Benefits and challenges of LLMs in various domains

    - Why are LLMs so popular?


