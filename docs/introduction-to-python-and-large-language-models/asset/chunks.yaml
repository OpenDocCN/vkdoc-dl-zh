  trans: '

    # 长短期记忆网络


    长短期记忆网络（LSTM）是一种深度学习序列神经网络，旨在解决信息保留的挑战。作为循环神经网络（RNN）的一种特殊形式，LSTM 有效解决了传统 RNN 遇到的梯度消失问题，这是机器学习算法中的一个重要难题。`Hochreiter
    和 Schmidhuber`^(¹³) `开发了 LSTM 以克服传统 RNN 固有的局限性`，提出了一种提升机器学习模型性能的解决方案。LSTM 模型的实现可通过
    Python 中的`Keras`库来完成。


    举例来说，想象一下在观看视频或听一首歌时回忆起之前的场景，或者在读书时记起前几章的情节。类似地，RNN 通过保留先前信息并利用其处理当前输入来运作。然而，由于梯度消失问题，RNN`在记住长期依赖关系方面存在局限`。而
    LSTM 则专门设计用于规避这些与长期依赖相关的挑战。


    与传统神经网络不同，长短期记忆网络（LSTM）集成了反馈连接，使其能够处理整个数据序列，而非单个数据点。这一独特能力使其在理解和预测序列数据（包括时间序列、文本和语音）中的模式方面表现出色。


    在人工智能和深度学习领域，LSTM 已成为一种强大工具，通过从序列数据中提取有价值的见解，为各个领域的突破做出了贡献。


    从广义上讲，LSTM 的运作方式与 RNN 单元非常相似。LSTM 网络的内部机制包含三个关键组件，每个组件都有不同的功能：


    - 遗忘门

    - 输入门

    - 输出门


    第一部分决定来自上一时间戳的信息是否相关，应予以保留，还是被视为无关而丢弃。第二部分专注于从输入中学习新信息。最后，在第三部分中，来自当前时间戳的更新信息被传递到下一个时间戳，构成
    LSTM 循环中的一个时间步。


    这三个组件也被称为`门`。这些门控制着信息进出记忆单元或 LSTM 单元的流动。遗忘门、输入门和输出门调节着这些流动。一个 LSTM 单元由这些门以及一个记忆单元或
    LSTM 单元组成，可以类比为`传统前馈神经网络`中的一层神经元，其中每个神经元都包含一个隐藏层和一个当前状态。


    与基本 RNN 类似，LSTM 具有一个隐藏状态，记为上一时间戳的`H(t-1)`和当前时间戳的`H(t)`。此外，LSTM 还包含一个单元状态，分别用`C(t-1)`和`C(t)`表示上一时间戳和当前时间戳。隐藏状态被称为`短期记忆`，而单元状态则被称为`长期记忆`。


    **示例：** *考虑两个以句号分隔的句子：“约翰是个好人，”接着是“另一方面，艾莉森很坏。”当我们从第一个句子过渡到第二个句子时，LSTM 网络利用遗忘门，可以恰当地忽略关于约翰的信息，并意识到焦点已转移到艾莉森身上。*


    > **注意**

    >

    > **双向 LSTM**

    >

    > *超越 LSTM，双向 LSTM 是一种循环神经网络（RNN）架构，它以前向和后向两个方向处理输入数据。与仅考虑从过去到未来信息流的传统 LSTM 不同，双向
    LSTM 融入了* `未来到过去的上下文`，增强了其捕捉双向依赖关系的能力。

    >

    > *该架构由两个 LSTM 层组成——一层用于前向处理，另一层用于后向处理——在需要全面理解输入序列的任务中尤其有效，例如* `情感分析`、`机器翻译`和`命名实体识别`。双向
    LSTM 从两个方向整合信息，增强了其捕捉`长期依赖关系`的能力，从而在复杂的序列数据中实现更准确的预测。


    # 门控循环单元


    门控循环单元（GRU）由 Cho 等人于 2014 年提出，^(¹⁴) 是缓解 RNN 中梯度消失问题的另一种方法。GRU 与 LSTM 网络相似，通过引入额外的门来处理梯度挑战。然而，GRU
    仅使用两个门（`更新门`和`重置门`），并且缺少 LSTM 中存在的额外单元。因此，GRU 拥有更简单的架构和更少的参数，从而训练速度更快。尽管如此，LSTM
    和 GRU 各有其独特的优势和劣势，使其适用于不同的应用场景。值得注意的是，`在数据具有长期依赖关系的情况下，LSTM 网络可能表现更优`。

    '
- fmt: "# Sequence-to-Sequence Language Models\n\nA significant advancement in the\
    \ development of language models is marked by the inception of sequence-to-sequence\
    \ (`seq2seq`) models. The primary impetus behind this family of language models\
    \ lies in addressing machine translation challenges. Tasks related to machine\
    \ translation commonly involve solving sequence-to-sequence or sequence modeling\
    \ problems. In these scenarios, the objective is to create models capable of mapping\
    \ a sequence from one domain to a corresponding sequence in another domain, exemplified\
    \ by translating a sentence from English to Italian, for example.\n\nA prevalent\
    \ strategy in designing `seq2seq` models^([^(15)](#fn15)) involves employing encoder-decoder\
    \ architectures, where both the encoder and decoder are based on recurrent neural\
    \ network (RNN) architectures like `LSTM` or `GRU`. The encoder processes the\
    \ input sequence, generating a vector representation, or context vector, of the\
    \ input. The decoder then utilizes this context vector to generate the output\
    \ sequence.\n\nAlthough `Seq2Seq` models gained popularity in machine translation\
    \ tasks, they exhibited limitations, primarily due to their reliance on RNN-based\
    \ architectures such as `LSTM`s or `GRU`s. A notable drawback of `Seq2Seq` architectures\
    \ was their inability to discern the importance of different parts within a sequence.\
    \ In other words, they processed a sequence without recognizing whether specific\
    \ segments held more significance than others.\n\nThis deficiency prompted researchers\
    \ to explore methods for enabling models to selectively focus on crucial parts\
    \ of a sequence. This exploration gave rise to attention-based language models\
    \ and, subsequently, the transformer architecture.\n\n> **Note**  \n> **Conditional\
    \ Language Model**  \n> Language models serve a dual purpose: they can compute\
    \ the probability of a language (word sequence) or generate language itself. In\
    \ the latter scenario, natural language sentences or articles are produced, often\
    \ through random sampling from language models. It’s well established that `LSTM`\
    \ language models, trained on substantial datasets, exhibit the capability to\
    \ generate highly natural sentences.  \n>  \n> An extension of the language model\
    \ concept is the conditional language model, which assesses the conditional probability\
    \ of a word sequence given a specific condition. When this condition is another\
    \ word sequence, the task transforms into what is commonly known as the sequence-to-sequence\
    \ problem. This problem is evident in tasks like machine translation, text summarization,\
    \ and generative dialogue. Alternatively, if the condition is an image, the challenge\
    \ becomes transforming an image into a word sequence, exemplified by tasks like\
    \ image captioning.  \n>  \n> Conditional language models find applications across\
    \ a diverse range of tasks:  \n> - In machine translation, these systems convert\
    \ sentences from one language to another while preserving the semantics.  \n>\
    \ - In dialogue generation, the system crafts a response to the user’s input,\
    \ constituting one round of dialogue.  \n> - Text summarization involves transforming\
    \ a lengthy text into a concise representation that encapsulates the essence of\
    \ the original content.  \n>  \n> The semantics embodied in the conditional probability\
    \ distributions of these models vary based on the specific application and are\
    \ acquired through data-driven learning within each application context.\n\n##\
    \ Attention-Based Language Models\n\nAttention-based language models are a type\
    \ of neural network architecture designed to handle sequential data by focusing\
    \ on the most relevant parts of the input for each output. They use attention\
    \ mechanisms like self-attention to weigh the importance of different words in\
    \ a sentence, enabling them to capture long-range dependencies and context more\
    \ effectively than traditional models. This approach has significantly improved\
    \ performance in natural language processing tasks, such as translation and text\
    \ generation.\n\n### Attention Mechanism\n\nFor decades, researchers have endeavored\
    \ to develop artificial systems and integrate elements of the human visual system\
    \ and brain mechanisms into these systems. A significant stride toward achieving\
    \ this objective occurred in 2014, where researchers introduced a fundamental\
    \ yet ingenious concept: the incorporation of an attention mechanism^([^(16)](#fn16))\
    \ into encoder-decoder architectures.\n\nThe key proposition was that the relative\
    \ importance of elements within a sequence could be encoded and assigned during\
    \ sequence processing. The attention technique proposed an alignment model to\
    \ compute scores, which were then subjected to a `softmax` function to generate\
    \ weights. Subsequently, a context vector was derived through a weighted sum of\
    \ the encoder’s hidden states.\n\nThe integration of the attention mechanism stands\
    \ as a pivotal concept in advancing artificial neural networks and, more broadly,\
    \ machine learning models. Notably, it served as inspiration for several influential\
    \ breakthroughs in natural language processing (NLP), including the renowned transformer\
    \ architecture. This transformer architecture, in turn, paved the way for various\
    \ innovative developments such as the vision transformer (`ViT`), the `BERT` model,\
    \ and `GPT` models, leading to the creation of powerful chatbot programs like\
    \ `ChatGPT`."
  raw: '#### Sequence-to-Sequence Language Models


    A significant advancement in the development of language models is marked by the
    inception of sequence-to-sequence (***seq2seq***) models. The primary impetus
    behind this family of language models lies in addressing machine translation challenges.
    Tasks related to machine translation commonly involve solving **sequence-to-sequence
    or sequence modeling problems**. In these scenarios, the objective is to create
    models capable of mapping a sequence from one domain to a corresponding sequence
    in another domain, exemplified by translating a sentence from English to Italian,
    for example.


    A prevalent strategy in designing seq2seq models^([^(15)](#fn15)) involves employing
    **encoder-decoder architectures**, where both the encoder and decoder are based
    on **recurrent neural network (RNN) architectures like LSTM or GRU**. The encoder
    processes the input sequence, **generating a vector representation, or context
    vector, of the input**. The decoder then utilizes this context vector to generate
    the output sequence.


    Although Seq2Seq models gained popularity in machine translation tasks, they exhibited
    limitations, primarily due to their reliance on RNN-based architectures such as
    LSTMs or GRUs. A notable drawback of Seq2Seq architectures was their **inability
    to discern the importance of different parts within a sequence**. In other words,
    they processed a sequence without recognizing whether specific segments held more
    significance than others.


    This deficiency prompted researchers to explore methods for enabling models to
    selectively focus on crucial parts of a sequence. This exploration gave rise to
    attention-based language models and, subsequently, the transformer architecture.


    Note


    Conditional Language Model


    *Language models serve a dual purpose: they can compute the probability of a language
    (word sequence) or generate language itself. In the latter scenario, natural language
    sentences or articles are produced, often through random sampling from language
    models. It’s well established that LSTM language models, trained on substantial
    datasets, exhibit the capability to generate highly natural sentences.*


    An extension of the language model concept is the conditional language model,
    which assesses the conditional probability of a word sequence given a specific
    condition. When this condition is another word sequence, the task transforms into
    what is commonly known as the sequence-to-sequence problem. This problem is evident
    in tasks like machine translation, text summarization, and generative dialogue.
    Alternatively, if the condition is an image, the challenge becomes transforming
    an image into a word sequence, exemplified by tasks like image captioning.


    **Conditional language models** **find applications across a diverse range of
    tasks:**


    *   In machine translation, these systems convert sentences from one language
    to another while preserving the semantics.


    *   In dialogue generation, the system crafts a response to the user’s input,
    constituting one round of dialogue.


    *   Text summarization involves transforming a lengthy text into a concise representation
    that encapsulates the essence of the original content.


    The semantics embodied in the conditional probability distributions of these models
    vary based on the specific application and are acquired through data-driven learning
    within each application context.


    ### Attention-Based Language Models


    Attention-based language models are a type of neural network architecture designed
    to handle sequential data by focusing on the most relevant parts of the input
    for each output. They use attention mechanisms like self-attention to weigh the
    importance of different words in a sentence, enabling them to capture long-range
    dependencies and context more effectively than traditional models. This approach
    has significantly improved performance in natural language processing tasks, such
    as translation and text generation.


    #### Attention Mechanism


    For decades, researchers have endeavored to develop artificial systems and integrate
    elements of the human visual system and brain mechanisms into these systems. A
    significant stride toward achieving this objective occurred in 2014, where researchers
    introduced a fundamental yet ingenious concept: **the incorporation of an** **attention
    mechanism**^([^(16)](#fn16)) **into encoder-decoder architectures**.


    The key proposition was that the relative importance of elements within a sequence
    could be encoded and assigned during sequence processing. The attention technique
    proposed an alignment model to compute scores, which were then **subjected to
    a softmax function to generate weights**. Subsequently, a context vector was derived
    through a weighted sum of the encoder’s hidden states.


    The integration of the attention mechanism stands as a pivotal concept in advancing
    artificial neural networks and, more broadly, machine learning models. Notably,
    it served as inspiration for several influential breakthroughs in natural language
    processing (NLP), including the **renowned transformer architecture**. This transformer
    architecture, in turn, paved the way for various innovative developments such
    as the **vision transformer (ViT), the BERT model, and GPT models**, leading to
    the creation of powerful chatbot programs like ChatGPT.'
  trans: "\n# 序列到序列语言模型\n\n语言模型发展中的一个重要里程碑是序列到序列（`seq2seq`）模型的诞生。这类语言模型的主要推动力在于解决机器翻译的挑战。与机器翻译相关的任务通常涉及解决序列到序列或序列建模问题。在这些场景中，目标是创建能够将一个领域的序列映射到另一个领域对应序列的模型，例如将句子从英语翻译成意大利语。\n\
    \n设计`seq2seq`模型^(¹⁵)的一种常见策略是采用编码器-解码器架构，其中编码器和解码器都基于循环神经网络（RNN）架构，如`LSTM`或`GRU`。编码器处理输入序列，生成输入序列的向量表示（或称上下文向量）。解码器随后利用这个上下文向量生成输出序列。\n\
    \n尽管`Seq2Seq`模型在机器翻译任务中广受欢迎，但它们也表现出局限性，这主要是由于它们依赖于基于 RNN 的架构（如`LSTM`或`GRU`）。`Seq2Seq`架构的一个显著缺陷是它们无法辨别序列中不同部分的重要性。换句话说，它们在处理序列时，无法识别特定片段是否比其他片段更重要。\n\
    \n这一缺陷促使研究人员探索如何让模型有选择性地关注序列中的关键部分。这一探索催生了基于注意力的语言模型，并最终引出了 Transformer 架构。\n\n\
    > **注意**  \n> **条件语言模型**  \n> 语言模型具有双重用途：它们可以计算语言（词序列）的概率，也可以生成语言本身。在后一种情况下，通常会通过从语言模型中随机采样来生成自然语言句子或文章。众所周知，在大型数据集上训练的`LSTM`语言模型具备生成高度自然句子的能力。\
    \  \n>  \n> 语言模型概念的一个扩展是条件语言模型，它评估在特定条件下词序列的条件概率。当这个条件是另一个词序列时，任务就变成了通常所说的序列到序列问题。这个问题在机器翻译、文本摘要和生成式对话等任务中显而易见。或者，如果条件是图像，挑战就变成了将图像转换为词序列，例如图像描述任务。\
    \  \n>  \n> 条件语言模型广泛应用于各种任务：  \n> - 在机器翻译中，这些系统将句子从一种语言转换为另一种语言，同时保留语义。  \n> -\
    \ 在对话生成中，系统对用户的输入生成回复，构成一轮对话。  \n> - 文本摘要涉及将长文本转换为简洁的表示，以概括原始内容的精髓。  \n>  \n>\
    \ 这些模型的条件概率分布所体现的语义因具体应用而异，并通过每个应用上下文中的数据驱动学习获得。\n\n## 基于注意力的语言模型\n\n基于注意力的语言模型是一种神经网络架构，通过关注输入中每个输出最相关的部分来处理序列数据。它们使用自注意力等注意力机制来权衡句子中不同词语的重要性，从而比传统模型更有效地捕捉长距离依赖关系和上下文。这种方法显著提升了自然语言处理任务（如翻译和文本生成）的性能。\n\
    \n### 注意力机制\n\n几十年来，研究人员一直致力于开发人工系统，并将人类视觉系统和大脑机制的元素融入这些系统。2014 年，研究人员朝着实现这一目标迈出了重要一步，他们引入了一个基本而巧妙的概念：在编码器-解码器架构中加入注意力机制^(¹⁶)。\n\
    \n其关键主张是，序列中元素的相对重要性可以在序列处理过程中被编码并分配权重。注意力技术提出了一种对齐模型来计算分数，然后通过`softmax`函数生成权重。随后，通过编码器隐藏状态的加权和得出上下文向量。\n\
    \n注意力机制的整合是推动人工神经网络以及更广泛的机器学习模型发展的关键概念。值得注意的是，它为自然语言处理（NLP）领域的多个重大突破提供了灵感，包括著名的\
    \ Transformer 架构。而 Transformer 架构又为各种创新开发铺平了道路，例如视觉 Transformer（`ViT`）、`BERT`模型和`GPT`模型，最终催生了像`ChatGPT`这样强大的聊天机器人程序。\n"
- fmt: '### The Transformer Architecture


    A pivotal development in the evolution of language models is the introduction
    of the transformer architecture in 2017. Drawing inspiration from the encoder-decoder
    architecture, the transformer architecture derives its potency from the attention
    mechanism, alongside other components like word embedding and positional encoding.


    The principal distinction between the transformer architecture and earlier RNN-based
    architectures lies in its nonsequential data processing approach. Notably, the
    transformer cleverly combines word embedding and positional encoding techniques,
    facilitating parallel data processing. This attribute contributes to the transformer’s
    effectiveness, enabling benefits from parallelization and expediting training.


    Prior to 2017, recurrent networks, particularly Long Short-Term Memory (LSTM),
    stood as the prevalent architecture for language modeling. LSTMs boasted theoretically
    infinite context size, incorporating both past and future words through a bidirectional
    approach. Despite the theoretical advantages, the practical benefits were limited,
    and the recurrent structure incurred higher training costs and time consumption,
    particularly challenging for parallelization on GPUs. It was primarily due to
    these challenges that transformers emerged as a replacement for LSTMs.


    Transformers leverage the attention mechanism, where the model learns to assign
    weights to words based on contextual relevance. In contrast to recurrent models,
    where the most recent word has the most immediate impact on predicting the next
    word, attention allows all words in the current context to be accessible, empowering
    the model to discern which words to prioritize.


    In their aptly titled paper, “Attention is All You Need,”^([^(17)](#fn17)) Google
    researchers introduced the Transformer sequence-to-sequence architecture. This
    revolutionary model abandons recurrent connections, utilizing its own output as
    context during text generation. This design choice facilitates easy parallelization
    of training, enabling the scaling of models and training data to unprecedented
    sizes.


    For classification tasks, the Bidirectional Encoder Representations from Transformers^([^(18)](#fn18))
    (BERT) emerged as the preferred model. In the realm of text generation, the focus
    shifted toward scaling up models.


    Widely recognized as a foundational model for artificial intelligence (AI), the
    transformer architecture has exerted substantial influence across diverse domains
    of artificial intelligence, including natural language understanding (e.g., BERT),
    computer vision (e.g., ViT), and speech recognition.


    In essence, the transformer architecture serves as a versatile neural computer
    applicable in various downstream NLP technologies and multimodal AI applications.
    It is particularly well suited for deployment in multimodal large language models
    capable of processing diverse data types such as text, images, and videos.


    ### Large Language Models (LLMs)


    The culmination of breakthroughs in artificial neural networks and advancements
    in natural language processing models has given rise to a variety of large language
    models (LLMs), showcasing remarkable capabilities in NLP tasks. Prominent examples
    of these LLMs include OpenAI’s ChatGPT and GPT-4, Google’s Bard, Meta’s LLaMA,
    Anthropic’s Claude, and BloombergGPT.


    The potency and success of most large language models can be attributed to preceding
    innovations in the evolution of language models. The transformer architecture,
    built upon the encoder-decoder model and incorporating the attention mechanism,
    represents a significant advancement that has paved the way for powerful large
    language models.


    Additional contributing factors include the utilization of extensive datasets
    for model training. While LLMs have demonstrated significant efficacy in specific
    NLP tasks such as question answering and text summarization, there remain various
    aspects in which LLMs need further improvement.


    ### The Era of Multimodal Learning


    Multimodal deep learning refers to the exploration of computer algorithms that
    enhance their performance by learning from diverse datasets that incorporate multiple
    modalities.


    In the realm of machine learning, multimodal deep learning is a specialized subfield
    focused on training artificial intelligence models to analyze and establish connections
    among various types of data, known as modalities. These modalities often include
    images, video, audio, and text. Through the integration of different modalities,
    a deep learning model can gain a more comprehensive understanding of its surroundings,
    as certain cues are exclusive to specific modalities.


    To illustrate, consider the task of emotion recognition; while visual cues from
    a human face (visual modality) are crucial, the tone and pitch of a person’s voice
    (audio modality) carry significant information about their emotional state, which
    may not be evident from facial expressions alone, even when they are synchronized.


    While Unimodal or Monomodal models, which process only a single modality, have
    undergone extensive research and yielded impressive results in areas such as computer
    vision and natural language processing, they possess inherent limitations. As
    a result, there is a growing necessity for multimodal models.


    Multimodal models frequently leverage deep neural networks, although earlier research
    has integrated other machine learning models like hidden Markov models (HMM) or
    Restricted Boltzmann Machines (RBM).


    In the domain of multimodal deep learning, the prevalent modalities typically
    encompass visual elements (such as images and videos), textual information, and
    auditory components (including voice, sounds, and music). Nonetheless, less conventional
    modalities also play a role, such as 3D visual data, depth sensor data, and LiDAR
    data, particularly in applications like self-driving cars.


    Nevertheless, the most prevalent combinations involve the four primary modalities:


    - Image + Text

    - Image + Audio

    - Image + Text + Audio

    - Text + Audio


    #### Multimodal Learning Challenges


    Multimodal deep learning is dedicated to addressing five fundamental challenges
    that currently serve as active research domains. The resolution or enhancement
    of any of these challenges holds the potential to propel forward the field of
    multimodal AI research and application.


    Representation, the first challenge, involves the encoding of data from diverse
    modalities into a vector or tensor. The creation of effective representations
    that encapsulate the semantic information of raw data is crucial for the success
    of machine learning models. However, the difficulty lies in extracting features
    from heterogeneous data in a manner that optimally exploits their synergies. It
    is equally essential to fully harness complementarity among different modalities
    while avoiding the inclusion of redundant information.


    Multimodal representations can be categorized into two types:


    1.  **Joint Representation:** Each individual modality undergoes encoding and
    is subsequently placed into a shared high-dimensional space. This direct approach
    may be effective, especially when modalities exhibit similar natures.

    2.  **Coordinated Representation:** Individual modalities are independently encoded,
    but their representations are coordinated through the imposition of restrictions.
    For instance, their linear projections should exhibit maximal correlation. This
    approach facilitates the integration of disparate modalities while maintaining
    coordination.'
