  trans: '

    # 未来影响


    尽管大型语言模型（LLM）有望变革众多行业，但认识到其局限性及引发的伦理问题至关重要。企业和专业人士应权衡实施 LLM 的潜在收益与风险。此外，模型开发者必须持续优化设计，以减少偏见并增强其在多样化场景中的适用性。


    在探索大型语言模型（LLM）现有边界的过程中，对人工智能下一次突破的追寻正引导研究人员走上创新之路。推动这一进程的关键洞察在于：人类日常交互的大部分数据几乎未被数字化，而其中文本数据占比更小。


    多模态学习的研究正成为一个关键方向，它将文本数据与图像、视频和音频等其他形式相融合。这种整合有望解锁更丰富、更复杂的信息理解能力，使 AI 系统能够以前所未有的深度和细腻度掌握并解读人类语言。


    要实现这种增强的理解力，需要在计算机视觉和视频分析等专业领域取得进展，这可能会彻底改变语音识别技术，从而带来更具参与感和整体性的 AI 交互体验。然而，转向多模态方法也带来了新的挑战，尤其是在处理日益增长的数据规模和复杂性方面，这需要创新的解决方案来简化和优化训练过程。


    为应对这些挑战，开发更高效、更环保的训练方法已成为焦点。少样本学习、迁移学习和元学习等技术正被用来减少对海量数据集和计算能力的依赖，从而推动更可持续、更易获取的
    AI 发展格局。这些策略利用现有知识，将其应用于不同领域，以培育不仅性能卓越，而且注重能源使用和环境影响的人工智能应用。


    与这些努力并行的是，通过将符号人工智能与深度学习相结合，人们越来越重视增强 AI 的语境理解和泛化能力，由此催生了混合人工智能。这种方法旨在将联结主义的数据驱动洞察与符号人工智能的结构化推理相结合——后者曾因可扩展性挑战而被边缘化，但现在人们认识到其与统计模型协同作用的潜力。


    混合人工智能旨在从海量数据集中自动提取符号规则，将手动定义这些系统的艰巨任务转变为由机器主导的简化流程。这种融合不仅提升了 AI 的认知和问题解决能力，还通过将决策建立在明确定义的规则和逻辑之上，解决了深度学习模型固有的可解释性和可理解性问题。


    展望未来，尽管当前 AI 领域的热潮主要集中在生成式模型和 LLM 上，但有迹象表明它们的性能可能很快会达到饱和点。然而，AI 的疆域远不止于此，多模态学习、可持续实践和混合人工智能将有望定义下一代
    AI 系统。这些进步将迎来一个更加多功能、更可持续、且能够以更高效率和更强泛化能力应对更广泛挑战的人工智能时代。


    # 大型语言模型架构示例


    大型语言模型（LLM）凭借其理解和生成类人文本的能力，彻底改变了自然语言处理领域。关键示例包括由 OpenAI 开发的 GPT（生成式预训练变换器），它利用变换器架构根据给定提示生成连贯且上下文相关的文本。另一个著名例子是由谷歌创建的
    BERT（来自变换器的双向编码器表示），它专注于理解双向（左右）上下文，适用于问答和情感分析等任务。此外，同样由谷歌开发的 T5（文本到文本迁移变换器）将所有
    NLP 任务转换为文本到文本格式，从而为各种语言任务提供了统一的方法。这些架构利用变换器的强大能力，在多样化的 NLP 应用中实现了最先进的性能。

    '
- fmt: '### GPT-4


    The fourth iteration in the series of foundational models by OpenAI, the Generative
    Pre-trained Transformer 4 (`GPT-4`), is a multimodal language model that was introduced
    on March 14, 2023. It is accessible through the subscription-based ChatGPT Plus,
    OpenAI’s API, and Microsoft Copilot, a free chatbot service. `GPT-4` employs a
    transformer architecture, leveraging a combination of publicly available data
    and data obtained under license from third-party providers for pre-training. This
    process involves predicting subsequent tokens, which is then refined through fine-tuning
    with human and AI-generated reinforcement learning feedback to ensure alignment
    with human values and adherence to policy guidelines.


    Compared to its predecessor, `GPT-3.5`, the `GPT-4` version of ChatGPT is seen
    as an enhancement, though it still shares some limitations of its earlier versions.
    A distinctive feature of `GPT-4`, referred to as `GPT-4V`, includes the ability
    to process image inputs in ChatGPT. Despite its advancements, OpenAI has chosen
    not to disclose specific technical details and metrics about the model, including
    its exact size.


    ### Model Characteristics


    - **Scale and Architecture of GPT-4:** `GPT-4` boasts approximately **1.8 trillion
    parameters** distributed over **120 layers**, significantly surpassing `GPT-3`
    by more than a factor of ten.

    - **Expertise Integration Through MoE:** The architecture employs 16 specialized
    experts, each with around **111 billion parameters** dedicated to multilayer perceptrons
    (MLP). For each forward pass, two experts are selected, optimizing cost efficiency.

    - **Training Dataset Composition:** The model’s training regimen encompassed around
    13 trillion tokens, sourced from a mix of textual and coding data, supplemented
    by fine-tuning contributions from **ScaleAI** and internal resources.

    - **Diversity of Training Data:** Its dataset amalgamated content from **Common
    Crawl and RefinedWeb**, among other speculated sources such as **Twitter, Reddit,
    YouTube**, and extensive textbook collections, amounting to a total of 13 trillion
    tokens.

    - **Cost of Development:** The financial investment in `GPT-4`’s development reached
    approximately $63 million, reflecting the extensive computational resources and
    time commitment required.

    - **Operational Expenses for Inference:** Operating `GPT-4` incurs thrice the
    expense of its predecessor, the 175-billion-parameter Davinci model, attributed
    to the necessity for larger computing clusters and reduced efficiency in resource
    utilization.

    - **Inference Process:** The model’s inference mechanism operates over a network
    of 128 GPUs, leveraging 8-way tensor parallelism and 16-way pipeline parallelism
    for efficient processing.

    - **Enhanced Vision Capabilities:** `GPT-4` integrates a vision encoder, akin
    to the Flamingo architecture, enabling the model to interpret web pages and transcribe
    imagery and video content. This feature introduces additional parameters and is
    further refined with about 2 trillion tokens of fine-tuning data, enriching its
    multimodal capabilities.

    - **Training Compute:** Trained on ~25,000 Nvidia A100 GPUs over 90–100 days.

    - **Training Data:** Trained on a dataset of ~13 trillion tokens.

    - **Context Length:** Supports up to 32,000 tokens of context.


    `GPT-4` is capable of handling over **25,000 words of text**, allowing for use
    cases like long form content creation, extended conversations, and document search
    and analysis.


    #### GPT-4 Limitations


    Similar to its forerunners, `GPT-4` sometimes produces information that is either
    not present in its training data or contradicts the input provided by users, a
    phenomenon often referred to as “hallucination.” Additionally, the model operates
    with a lack of transparency regarding its decision-making process. Although it
    can offer explanations for its responses, these are generated after the fact and
    may not accurately represent the underlying reasoning process. Frequently, the
    explanations provided by `GPT-4` can be inconsistent with its prior responses.


    In an evaluation using **ConceptARC**, a benchmark designed for assessing abstract
    reasoning, `GPT-4`’s performance was significantly lower than expected, scoring
    under 33% across all categories. This was in stark contrast to specialized models
    and human performance, which scored around 60% and at least 91%, respectively.


    This outcome suggests that abstract reasoning, which involves understanding complex
    relationships and patterns, remains a challenging domain for general-purpose AI
    models like `GPT-4`. This benchmark focuses on abstract reasoning, a critical
    aspect of human cognition that involves identifying patterns, logical rules, and
    relationships among objects. `GPT-4`’s sub-33% performance indicates its struggles
    in this domain.


    The specialized models, designed with specific architectures or trained on datasets
    tailored for abstract reasoning, showed much better performance, scoring at 60%,
    emphasizing the importance of domain-specific training and optimization.


    Specialized models refer to those specifically designed and optimized to handle
    particular types of tasks or domains. In the context of abstract reasoning and
    the ConceptARC benchmark, specialized models demonstrated superior performance
    compared to `GPT-4`. Here are details about these specialized models.


    Table 5-1 compares the performance of humans, the top two ARC-Kaggle competition
    entries, and `GPT-4` on various conceptual tasks. Each task is evaluated based
    on the accuracy or success rate of completing the task.


    **Table 5-1** Performance comparison across conceptual tasks


    | -![](images/613844_1_En_5_Chapter/613844_1_En_5_Figa_HTML.jpg) |


    1. **ARC-Kaggle Challenge Winners**: The first- and second-place programs from
    the ARC-Kaggle challenge were evaluated on the ConceptARC benchmark. These models
    were designed explicitly for solving the Abstraction and Reasoning Corpus (ARC)
    tasks, which involve abstract reasoning similar to those in ConceptARC. Their
    design likely includes algorithms optimized for recognizing and manipulating abstract
    patterns and concepts.

    2. **Human Performance**: For context, human participants, tested on the same
    tasks via platforms like Amazon Mechanical Turk and Prolific, consistently outperformed
    both `GPT-4` and the specialized models, highlighting the complexity of abstract
    reasoning tasks and the gap between current AI capabilities and human cognition.


    The specialized models (first and second place in ARC-Kaggle) outperformed `GPT-4`
    across various concept groups in the ConceptARC benchmark. Here are some examples
    of their performance.


    - **Above and Below**: First Place ARC-Kaggle scored 70%, while `GPT-4` scored
    23%.

    - **Extend to Boundary**: First Place ARC-Kaggle scored 77%, compared to `GPT-4`’s
    7%.

    - **Filled and Not Filled**: First Place ARC-Kaggle scored 73%, while `GPT-4`
    scored 17%.'
