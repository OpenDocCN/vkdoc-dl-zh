- fmt: '### NLP Tasks


    Human language is rife with complexities that pose significant challenges when
    it comes to developing software capable of accurately discerning the intended
    meaning from text or spoken data. Homonyms, homophones, sarcasm, idioms, metaphors,
    exceptions in grammar and usage, and variations in sentence structures are just
    a few of the intricacies of human language. While humans may take years to master
    these nuances, programmers must instill the ability to recognize and understand
    them accurately from the outset in natural language-driven applications, if these
    applications are to be truly effective.


    Various NLP tasks are employed to deconstruct human text and voice data in ways
    that facilitate the computer’s comprehension. Some of these tasks encompass:


    - **Speech recognition**, also known as speech-to-text, involves the reliable
    conversion of voice data into textual form. Speech recognition is a fundamental
    requirement for applications that rely on voice commands or provide responses
    to spoken queries. What adds to the challenge of speech recognition is the way
    people speak – rapidly, with words blended together, varying emphasis and intonation,
    different accents, and often employing incorrect grammar.


    - **Part-of-speech tagging**, also referred to as grammatical tagging, entails
    determining the grammatical classification of a specific word or piece of text
    based on its usage and context. Part-of-speech tagging identifies, for instance,
    “make” as a verb in “I can make a paper plane” and as a noun in “What make of
    car do you own?”


    - **Word sense disambiguation** involves selecting the correct meaning of a word
    when it possesses multiple meanings, achieved through a process of semantic analysis
    to determine the most appropriate interpretation in the given context. For instance,
    word sense disambiguation helps distinguish the meaning of the verb “make” in
    “make the grade” (achieve) vs. “make a bet” (place).


    - **Named entity recognition (NER)**, also known as NEM, identifies words or phrases
    as entities with specific roles. NER recognizes “Kentucky” as a location or “Fred”
    as a male name.


    - **Coreference** resolution involves identifying whether two words refer to the
    same entity and is typically applied to determining the referent of a pronoun
    (e.g., “she” referring to “Mary”). It can also extend to identifying metaphors
    or idioms in the text, such as when “bear” refers not to the animal but to a large,
    hairy person.


    - **Sentiment analysis** endeavors to extract subjective aspects such as attitudes,
    emotions, sarcasm, confusion, and suspicion from text.


    - **Natural language generation**, often considered the counterpart of speech
    recognition or speech-to-text, revolves around the task of transforming structured
    information into human language.


    ### Text Preprocessing and Feature Engineering


    In the realm of analyzing and comprehending human language, natural language processing
    (NLP) employs an array of techniques and approaches. In the following, some foundational
    techniques commonly utilized in NLP are highlighted.


    #### Tokenization


    This process entails the segmentation of text into individual words, phrases,
    symbols, or other meaningful units known as tokens. Tokenization serves as a fundamental
    objective: to convey text in a format that retains its context while making it
    comprehensible to machines. Through the transformation of text into tokens, algorithms
    gain the capability to discern patterns effectively.


    This capacity for pattern recognition is pivotal as it empowers machines to interpret
    and react to human inputs. For instance, when confronted with the word “running,”
    a machine doesn’t perceive it as a solitary entity; instead, it views it as a
    composition of tokens that it can dissect and extract meaning from.


    Tokenization methods can vary depending on the level of granularity required and
    the specific demands of the task. These methods encompass a spectrum, ranging
    from disassembling text into individual words to breaking it down into characters
    or even smaller units:


    - **Word Tokenization:** This method dissects text into discrete words, representing
    the most prevalent and effective approach. It works exceptionally well for languages
    like English, which have well-defined word boundaries.


    - **Character Tokenization:** In character tokenization, the text is fragmented
    into individual characters. This approach proves valuable for languages lacking
    distinct word boundaries or for tasks demanding intricate analysis, such as spelling
    correction.


    - **Subword Tokenization:** Striking a balance between word and character tokenization,
    subword tokenization divides text into units that are larger than a single character
    but smaller than a complete word. For example, “Chatbots” could be tokenized into
    “Chat” and “bots.” This method finds particular utility in languages where meaning
    derives from combining smaller units or when handling words that are not found
    in the standard vocabulary in NLP tasks.


    ##### Parsing


    In natural language processing (NLP), parsing refers to the process of analyzing
    the grammatical structure of a sentence or a piece of text to determine its syntactic
    and grammatical elements. The primary goal of parsing is to understand the hierarchical
    relationships between words and phrases within a sentence, identifying how they
    function within the sentence’s structure.


    **Parsing involves the following key tasks:**


    - **Tokenization:** The text is first segmented into individual words or tokens.


    - **Part-of-Speech Tagging:** Each token is tagged with its grammatical part of
    speech (e.g., noun, verb, adjective), which helps establish the role of each word
    in the sentence.


    - **Dependency Parsing:** This step identifies the grammatical relationships between
    words in the sentence, establishing which words depend on or modify others. It
    creates a tree-like structure known as a dependency parse tree, where words are
    nodes connected by labeled edges representing grammatical relationships.


    Parsing is essential in NLP for various applications, such as machine translation,
    information retrieval, sentiment analysis, and question answering. It enables
    computers to understand the syntactic structure of sentences, making it possible
    to extract meaningful information from text and generate coherent responses in
    natural language.


    ##### Lemmatization


    This technique aims to reduce words to their base or root form, facilitating the
    grouping of various word forms with a common root. Lemmatization aims to find
    the base or dictionary form of a word, known as the “lemma,” while preserving
    the word’s actual meaning. It involves considering the word’s part of speech (e.g.,
    noun, verb, adjective) and context in order to perform a more accurate transformation.


    Lemmatization results in valid words that can be found in a dictionary, making
    it suitable for tasks where the interpretability and meaningfulness of words are
    crucial. For example, the word “running” would be lemmatized to “run,” and “better”
    would be lemmatized to “good.”


    ##### Word Segmentation


    Word segmentation involves the process of extracting individual words from a given
    text string. For instance, when a person scans a handwritten document into a computer,
    an algorithm can be employed to analyze the page and identify word boundaries,
    typically indicated by spaces between words.


    ##### Word Sense Disambiguation


    Word sense disambiguation is a technique used to ascertain the intended meaning
    of a word within a given context. For instance, let’s examine the sentence “The
    pig is in the pen.” In this context, the word “pen” can have multiple meanings.
    An algorithm employing this approach can discern that in this instance, “pen”
    refers to a fenced-in enclosure for animals, as opposed to its alternative meaning,
    which denotes a writing instrument.'
