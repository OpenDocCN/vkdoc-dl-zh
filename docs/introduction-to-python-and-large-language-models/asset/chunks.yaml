- fmt: '### Positional Encoding


    The attention modules, as designed, do not inherently account for the order of
    processing. To address this, transformers introduced “positional encodings” to
    incorporate information about the positions of tokens in input sequences. Various
    positional encoding variants have been proposed. Intriguingly, a recent study^([^(26)](#fn26))
    suggests that incorporating this information may not significantly impact state-of-the-art
    decoder-only transformers.


    - **Absolute:** The most direct method involves adding sequence order information
    by assigning a unique identifier to each position in the sequence before presenting
    it to the attention module.

    - **Relative:** To convey information about the relative dependencies among tokens
    appearing at different locations in the sequence, a relative positional encoding
    is computed through some form of learning.


    **Two notable types of relative encodings are as follows:**


    - **Alibi:** This approach subtracts a scalar bias from the attention score calculated
    using two tokens, and this bias increases with the distance between the positions
    of the tokens. This learned method effectively favors recent tokens for attention.

    - **RoPE:** In LLMs, keys, queries, and values are all vectors. `RoPE` involves
    rotating the query and key representations at an angle proportional to their absolute
    positions in the input sequence. This rotation results in a relative positional
    encoding scheme that diminishes with the distance between the tokens.


    ### Activation Functions


    Activation functions play a crucial role in enhancing the curve-fitting capabilities
    of neural networks. The contemporary activation functions employed in LLMs differ
    from earlier squashing functions but are integral to the success of LLMs.


    #### ReLU


    The Rectified Linear Unit (`ReLU`) is defined as `ReLU(x) = max(0, x)` (1).


    #### GELU


    The Gaussian Error Linear Unit (`GELU`) combines `ReLU`, dropout, and zoneout.
    It stands out as the most widely utilized activation function in current LLM literature.


    #### GLU Variants


    The Gated Linear Unit is a neural network layer involving an element-wise product
    (⊗) of a linear transformation and a sigmoid-transformed (σ) linear projection
    of the input, given by the equation:


    ```

    GLU(x,W,V,b,c)=(xW+b)⊗σ(xV+c) (2)

    ```


    *Here, `x` represents the input of the layer, and `W`, `b`, `V`, and `c` are learned
    parameters.*


    `GLU` was modified to assess the impact of various variations in the training
    and testing of transformers, leading to improved empirical results. The following
    are different `GLU` variations introduced^([^(27)](#fn27)) and utilized in LLMs:


    - `ReGLU(x,W,V,b,c)=max(0,xW+b)`⊗

    - `GEGLU(x,W,V,b,c)=GELU(xW+b)`⊗`(xV+c)`

    - `SwiGLU(x,W,V,b,c,`β`)=Swish`β`(xW+b)`⊗`(xV+c)`


    ### Layer Normalization


    Layer normalization facilitates quicker convergence and is a prevalent component
    in transformers. In this section, we explore various normalization techniques
    extensively employed in LLM literature.


    #### LayerNorm


    Layer normalization calculates statistics across all the hidden units within a
    layer (`l`) using the following formula:


    ![$$ {u}^l=\frac{1}{n}\sum \limits_i^n{a}_i^l\kern1.5em {\sigma}^l=\sqrt{\frac{1}{n}\sum
    \limits_i^n{\left({a}_i^l-{u}^l\right)}^2} $$](images/613844_1_En_2_Chapter/613844_1_En_2_Chapter_TeX_Equa.png)


    In this equation, where `n` represents the number of neurons in layer `l` and
    ![$$ {a}_i^l $$](images/613844_1_En_2_Chapter/613844_1_En_2_Chapter_TeX_IEq1.png)
    is the aggregated input of the *i-th* neuron in layer `l`, `LayerNorm` offers
    invariance to both weight rescaling and distribution re-centering.


    #### RMSNorm


    `RMSNorm` challenges the presumed invariance properties of `LayerNorm`. It suggests
    that comparable performance benefits to those of `LayerNorm` can be achieved through
    a computationally efficient normalization technique that compromises re-centering
    invariance for speed. The normalized summed input to layer `l` in `LayerNorm`
    is expressed as follows:


    ![$$ \overline{a_i^l}=\frac{a_i^l-{u}^l}{\sigma }{g}_i^l $$](images/613844_1_En_2_Chapter/613844_1_En_2_Chapter_TeX_Equb.png)


    #### Pre-norm and Post-norm


    In the realm of large language models (LLMs), the transformer architecture serves
    as the foundation with certain variations. The original implementation incorporated
    layer normalization after the residual connection, commonly known as post-LN.
    This sequence follows the order of Multi-head attention–Residual–LN. An alternative
    sequence, referred to as pre-LN, involves placing the normalization step before
    the self-attention layer, following the order of LN–Multi-head attention–Residual.
    Pre-LN is recognized for providing increased stability in training.


    #### DeepNorm


    Despite the advantages of pre-LN over post-LN training, pre-LN training can inadvertently
    impact gradients,^([^(28)](#fn28)) leading to larger gradients in the earlier
    layers compared to those at the bottom. `DeepNorm` is introduced as a solution
    to mitigate these adverse effects on gradients. Its formulation is expressed as


    ![$$ {\mathrm{x}}^{l_f}= LN\Big(\alpha {\mathrm{x}}^{l_p}+{G}^{l_p}\left({\mathrm{x}}^{l_p},{\theta}^{l_p}\right)
    $$](images/613844_1_En_2_Chapter/613844_1_En_2_Chapter_TeX_Equc.png)


    In this expression, `α` denotes a constant, and `θ_lp` represents the parameters
    of layer `lp`. These parameters undergo scaling by another constant `β`. Both
    of these constants are architecture dependent.


    #### Distributed Training of Large Language Models (LLMs)


    Distributed training of large language models (LLMs) involves leveraging multiple
    computing resources simultaneously to efficiently process and learn from vast
    datasets. It accelerates training times and enables the handling of models with
    billions of parameters, ensuring scalability and enhanced performance. By distributing
    the workload, it becomes feasible to train complex models that would otherwise
    be computationally prohibitive.


    **There are various distributed training approaches for LLMs:**


    - **Data Parallelism:** This approach involves replicating the model across multiple
    devices, with batch data divided among these devices. At the conclusion of each
    training iteration, weights are synchronized across all devices.

    - **Tensor Parallelism:** Tensor parallelism distributes tensor computations across
    devices, also known as horizontal parallelism or intra-layer model parallelism.

    - **Pipeline Parallelism:** In pipeline parallelism, model layers are distributed
    across different devices, also termed vertical parallelism.

    - **Model Parallelism:** Model parallelism is a combination of tensor and pipeline
    parallelism.

    - **3D Parallelism:** This approach integrates data, tensor, and model parallelism.

    - **Optimizer Parallelism:** Also known as zero redundancy optimizer, optimizer
    parallelism implements optimizer state partitioning, gradient partitioning, and
    parameter partitioning across devices. This reduces memory consumption while minimizing
    communication costs.'
