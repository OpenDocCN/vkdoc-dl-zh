  raw: '#### Inheritance


    Inheritance is the mechanism by which classes can derive characteristics and behaviors
    from pre-existing classes. This principle supports the Don’t Repeat Yourself (DRY)
    philosophy, enabling the reuse of code by incorporating shared attributes and
    methods into base classes (superclasses). This concept mirrors biological inheritance,
    where subclasses inherit traits and behaviors from their parents (superclasses),
    showcasing shared attributes and potentially shared methods.


    **Example:**


    ```

    # Parent class (superclass)

    class Animal:

    def __init__(self, name):

    self.name = name

    def speak(self):

    pass  # Placeholder for the speak method

    # Child class (subclass) inheriting from Animal

    class Dog(Animal):

    def speak(self):

    return f"{self.name} says Woof!"

    # Child class (subclass) inheriting from Animal

    class Cat(Animal):

    def speak(self):

    return f"{self.name} says Meow!"

    # Create instances of the child classes

    dog = Dog("Buddy")

    cat = Cat("Whiskers")

    # Call the speak method for each instance

    print(dog.speak())  # Output: Buddy says Woof!

    print(cat.speak())  # Output: Whiskers says Meow!

    ```


    **Output:**


    ```

    Buddy says Woof!

    Whiskers says Meow!

    ```


    #### Polymorphism


    Polymorphism permits the tailoring of methods and attributes in subclasses that
    were initially defined in a superclass, embodying the concept of “many forms.”
    It allows for the creation of methods with the same name but differing implementations
    across classes. Reflecting on our real-life analogy, children (subclasses) may
    share a common behavior like getting hungry (a method) from their parents, but
    the specifics, such as frequency of hunger, can vary, demonstrating polymorphism.


    **Example:**


    ```

    # Parent class (superclass)

    class Animal:

    def __init__(self, name):

    self.name = name

    def speak(self):

    pass  # Placeholder for the speak method

    # Child class (subclass) inheriting from Animal

    class Dog(Animal):

    def speak(self):

    return f"{self.name} says Woof!"

    # Child class (subclass) inheriting from Animal

    class Cat(Animal):

    def speak(self):

    return f"{self.name} says Meow!"

    # Function that takes an Animal object and calls its speak method

    def animal_sound(animal):

    return animal.speak()

    # Create instances of the child classes

    dog = Dog("Buddy")

    cat = Cat("Whiskers")

    # Call the animal_sound function with different objects

    print(animal_sound(dog))  # Output: Buddy says Woof!

    print(animal_sound(cat))  # Output: Whiskers says Meow!

    ```


    **Output:**


    ```

    Buddy says Woof!

    Whiskers says Meow!

    ```


    #### Encapsulation


    Encapsulation ensures the safekeeping of a class’s internal data, safeguarding
    the integrity and privacy of the data within. Although Python does not explicitly
    support private attributes through syntax, it achieves encapsulation through name
    mangling and by using **getter and setter methods** for controlled access and
    modification of data.


    **Example:**


    ```

    class Human:

    def __init__(self, name, age):

    self.__name = name  # Private attribute

    self.__age = age    # Private attribute

    # Getter method for name

    def get_name(self):

    return self.__name

    # Setter method for age

    def set_age(self, age):

    if age > 0 and age < 150:  # Adding validation

    self.__age = age

    else:

    print("Invalid age")

    # Method to display information

    def display_info(self):

    print(f"Name: {self.__name}, Age: {self.__age}")

    # Create an instance of the Human class

    person = Human("Alice", 30)

    # Accessing attributes directly (not recommended)

    # This will raise an error: AttributeError: ''Human'' object has no attribute
    ''__name''

    # print(person.__name)

    # Accessing attributes using getter method

    print("Name:", person.get_name())  # Output: Name: Alice

    # Setting age using setter method (with validation)

    person.set_age(35)

    person.display_info()  # Output: Name: Alice, Age: 35

    # Setting an invalid age

    person.set_age(200)  # Output: Invalid age

    ```


    **Output:**


    ```

    Name: Alice

    Name: Alice, Age: 35

    Invalid age

    ```


    ### Modules and File Handling


    #### Python Modules


    A Python module is essentially a file that houses a collection of built-in functions,
    classes, and variables, each serving a specific purpose. Python boasts numerous
    modules, each tailored to handle distinct tasks. In this article, we will delve
    into the realm of Python modules, exploring topics such as creating custom modules,
    importing modules in Python, utilizing aliases for module names, and more.


    #### Understanding Python Modules


    A Python module represents a container for Python definitions and statements,
    encompassing functions, classes, variables, and even executable code. Organizing
    related code within a module enhances code comprehension, logical organization,
    and reusability.


    #### Creating a Python Module


    To craft a Python module, you simply write the desired code and save it in a file
    bearing the .py extension with the name math_operations.


    **Example:**


    ```

    # math_operations.py

    # Function to add two numbers

    def add(x, y):

    return x + y

    # Function to subtract two numbers

    def subtract(x, y):

    return x - y

    ```


    #### Importing Modules in Python


    Python enables us to import functions and classes defined within a module into
    another module using the import statement within the source file. When the interpreter
    encounters an import statement, it imports the module if it resides in the search
    path.


    Note


    Search path


    *The search path is essentially a list of directories that the interpreter scans
    when searching for a module.*


    If you keep the previous file we created and create a new one to call it, you
    should have the following structure:


    ```

    ├── calc.py

    └── math_operations.py

    ```


    Now, to import the module named “math_operations.py,” include the following command
    at the beginning of your script:


    **Example:**


    ```

    # Import the math_operations module

    import math_operations

    # Use the functions from the module

    result_add = math_operations.add(5, 3)

    result_subtract = math_operations.subtract(10, 4)

    print("Addition result:", result_add)

    print("Subtraction result:", result_subtract)

    ```


    **Output:**


    ```

    Addition result: 8

    Subtraction result: 6

    ```


    Note


    The dot operator


    *This imports the module itself, not its functions or classes. To access the contents
    of the module, you use the dot (.) operator.*


    ##### Python Import Using “from” Statement


    Python “from” statement allows for the selective import of specific attributes
    from a module without importing the entire module.


    **Example:**


    ```

    # Importing the math module and specifically importing the sqrt function

    from math import sqrt

    # Using the imported function to calculate the square root

    number = 25

    result = sqrt(number)

    # Displaying the result

    print(f"The square root of {number} is {result}")

    ```


    **Output:**


    ```

    The square root of 25 is 5.0

    ```


    ##### Importing Specific Attributes from a Python Module


    **Example:**


    ```

    # Importing specific attributes from the built-in "math" library

    from math import pi, sqrt

    # Using the imported attributes

    print(f"The value of pi is approximately: {pi}")

    number = 25

    result = sqrt(number)

    print(f"The square root of {number} is: {result}")

    ```


    **Output:**


    ```

    The value of pi is approximately: 3.141592653589793

    The square root of 25 is: 5.0

    ```


    ##### Importing All Names


    The asterisk (*) symbol, when used in conjunction with the import statement, imports
    all names from a module into the current namespace.


    **Syntax:**


    ```

    from module_name import *

    ```


    The use of “*” has its advantages and disadvantages. It is not recommended to
    use it if you know precisely what you need from the module. Use it judiciously.'
  trans: "\n### 继承\n\n继承是类从已有类中派生特征和行为的机制。这一原则支持“不要重复自己”（DRY）的理念，通过将共享属性和方法纳入基类（超类）来实现代码复用。这个概念类似于生物遗传，子类从父类（超类）继承特征和行为，展示共享的属性以及可能共享的方法。\n\
    \n**示例：**\n\n```python\n# 父类（超类）\nclass Animal:\n    def __init__(self, name):\n\
    \        self.name = name\n    def speak(self):\n        pass  # speak 方法的占位符\n\
    \n# 从 Animal 继承的子类\nclass Dog(Animal):\n    def speak(self):\n        return f\"\
    {self.name} 说 汪汪！\"\n\n# 从 Animal 继承的子类\nclass Cat(Animal):\n    def speak(self):\n\
    \        return f\"{self.name} 说 喵喵！\"\n\n# 创建子类的实例\ndog = Dog(\"Buddy\")\ncat\
    \ = Cat(\"Whiskers\")\n\n# 为每个实例调用 speak 方法\nprint(dog.speak())  # 输出：Buddy 说\
    \ 汪汪！\nprint(cat.speak())  # 输出：Whiskers 说 喵喵！\n```\n\n**输出：**\n\n```\nBuddy 说\
    \ 汪汪！\nWhiskers 说 喵喵！\n```\n\n### 多态\n\n多态允许在子类中定制最初在超类中定义的方法和属性，体现了“多种形态”的概念。它允许在不同类中创建同名但实现不同的方法。回顾我们现实生活中的类比，孩子（子类）可能从父母那里继承了一个共同的行为，比如感到饥饿（一个方法），但具体细节，比如饥饿的频率，可能有所不同，这就展示了多态性。\n\
    \n**示例：**\n\n```python\n# 父类（超类）\nclass Animal:\n    def __init__(self, name):\n\
    \        self.name = name\n    def speak(self):\n        pass  # speak 方法的占位符\n\
    \n# 从 Animal 继承的子类\nclass Dog(Animal):\n    def speak(self):\n        return f\"\
    {self.name} 说 汪汪！\"\n\n# 从 Animal 继承的子类\nclass Cat(Animal):\n    def speak(self):\n\
    \        return f\"{self.name} 说 喵喵！\"\n\n# 接受 Animal 对象并调用其 speak 方法的函数\ndef\
    \ animal_sound(animal):\n    return animal.speak()\n\n# 创建子类的实例\ndog = Dog(\"\
    Buddy\")\ncat = Cat(\"Whiskers\")\n\n# 使用不同的对象调用 animal_sound 函数\nprint(animal_sound(dog))\
    \  # 输出：Buddy 说 汪汪！\nprint(animal_sound(cat))  # 输出：Whiskers 说 喵喵！\n```\n\n**输出：**\n\
    \n```\nBuddy 说 汪汪！\nWhiskers 说 喵喵！\n```\n\n### 封装\n\n封装确保类内部数据的安全，保护数据的完整性和隐私。尽管\
    \ Python 没有通过语法显式支持私有属性，但它通过名称修饰以及使用 getter 和 setter 方法来实现对数据的受控访问和修改，从而达到封装的目的。\n\
    \n**示例：**\n\n```python\nclass Human:\n    def __init__(self, name, age):\n   \
    \     self.__name = name  # 私有属性\n        self.__age = age    # 私有属性\n\n    #\
    \ name 的 getter 方法\n    def get_name(self):\n        return self.__name\n\n  \
    \  # age 的 setter 方法\n    def set_age(self, age):\n        if age > 0 and age\
    \ < 150:  # 添加验证\n            self.__age = age\n        else:\n            print(\"\
    无效的年龄\")\n\n    # 显示信息的方法\n    def display_info(self):\n        print(f\"姓名：{self.__name}，年龄：{self.__age}\"\
    )\n\n# 创建 Human 类的实例\nperson = Human(\"Alice\", 30)\n\n# 直接访问属性（不推荐）\n# 这将引发错误：AttributeError:\
    \ 'Human' object has no attribute '__name'\n# print(person.__name)\n\n# 使用 getter\
    \ 方法访问属性\nprint(\"姓名：\", person.get_name())  # 输出：姓名：Alice\n\n# 使用 setter 方法设置年龄（带验证）\n\
    person.set_age(35)\nperson.display_info()  # 输出：姓名：Alice，年龄：35\n\n# 设置无效年龄\nperson.set_age(200)\
    \  # 输出：无效的年龄\n```\n\n**输出：**\n\n```\n姓名：Alice\n姓名：Alice，年龄：35\n无效的年龄\n```\n\n\
    ## 模块与文件处理\n\n### Python 模块\n\nPython 模块本质上是一个包含内置函数、类和变量集合的文件，每个元素都有特定用途。Python\
    \ 拥有众多模块，每个模块都针对处理不同的任务而定制。在本文中，我们将深入探讨 Python 模块的领域，探索诸如创建自定义模块、在 Python 中导入模块、为模块名称使用别名等主题。\n\
    \n### 理解 Python 模块\n\nPython 模块是 Python 定义和语句的容器，包含函数、类、变量甚至可执行代码。将相关代码组织在一个模块中，有助于增强代码的可理解性、逻辑组织性和可重用性。\n\
    \n### 创建 Python 模块\n\n要创建一个 Python 模块，你只需编写所需的代码，并将其保存为扩展名为 `.py` 的文件，命名为 `math_operations`。\n\
    \n**示例：**\n\n```python\n# math_operations.py\n# 将两个数相加的函数\ndef add(x, y):\n  \
    \  return x + y\n\n# 将两个数相减的函数\ndef subtract(x, y):\n    return x - y\n```\n\n\
    ### 在 Python 中导入模块\n\nPython 允许我们使用源文件中的 `import` 语句，将在一个模块中定义的函数和类导入到另一个模块中。当解释器遇到\
    \ `import` 语句时，如果该模块位于搜索路径中，它就会导入该模块。\n\n> **注意：** 搜索路径  \n> *搜索路径本质上是解释器在搜索模块时扫描的目录列表。*\n\
    \n如果你保留我们之前创建的文件，并创建一个新文件来调用它，你应该具有以下结构：\n\n```\n├── calc.py\n└── math_operations.py\n\
    ```\n\n现在，要导入名为 `math_operations.py` 的模块，请在脚本开头包含以下命令：\n\n**示例：**\n\n```python\n\
    # 导入 math_operations 模块\nimport math_operations\n\n# 使用模块中的函数\nresult_add = math_operations.add(5,\
    \ 3)\nresult_subtract = math_operations.subtract(10, 4)\n\nprint(\"加法结果：\", result_add)\n\
    print(\"减法结果：\", result_subtract)\n```\n\n**输出：**\n\n```\n加法结果：8\n减法结果：6\n```\n\
    \n> **注意：** 点运算符  \n> *这会导入模块本身，而不是其函数或类。要访问模块的内容，你需要使用点（`.`）运算符。*\n\n#### 使用\
    \ `from` 语句进行 Python 导入\n\nPython 的 `from` 语句允许从模块中选择性地导入特定属性，而无需导入整个模块。\n\n**示例：**\n\
    \n```python\n# 导入 math 模块，并专门导入 sqrt 函数\nfrom math import sqrt\n\n# 使用导入的函数计算平方根\n\
    number = 25\nresult = sqrt(number)\n\n# 显示结果\nprint(f\"{number} 的平方根是 {result}\"\
    )\n```\n\n**输出：**\n\n```\n25 的平方根是 5.0\n```\n\n#### 从 Python 模块导入特定属性\n\n**示例：**\n\
    \n```python\n# 从内置的 \"math\" 库中导入特定属性\nfrom math import pi, sqrt\n\n# 使用导入的属性\n\
    print(f\"圆周率 pi 的值约为：{pi}\")\nnumber = 25\nresult = sqrt(number)\nprint(f\"{number}\
    \ 的平方根是：{result}\")\n```\n\n**输出：**\n\n```\n圆周率 pi 的值约为：3.141592653589793\n25\
    \ 的平方根是：5.0\n```\n\n#### 导入所有名称\n\n星号（`*`）符号与 `import` 语句结合使用时，会将模块中的所有名称导入到当前命名空间。\n\
    \n**语法：**\n\n```python\nfrom module_name import *\n```\n\n使用 `*` 有其优点和缺点。如果你确切知道需要从模块中获取什么，不建议使用它。请谨慎使用。\n"
- fmt: "### Locating Python Modules\n\nWhen a module is imported in Python, the interpreter\
    \ searches for it in various locations. Initially, it checks for built-in modules;\
    \ if not found, it explores a list of directories defined in the `sys.path` variable.\
    \ The `sys.path` variable consists of a list of directories where Python searches\
    \ for the required module.\n\n**Example:**\n\n```python\nimport sys\nimport importlib\n\
