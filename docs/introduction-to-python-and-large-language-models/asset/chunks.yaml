  raw: "### Use Cases of LangChain\n\nLangChain’s capabilities in harnessing large\
    \ language models (LLMs) unlock a vast array of sophisticated applications across\
    \ numerous sectors and industries. Here are some illustrative examples and use\
    \ cases:\n\n*   **Customer Support Chatbots:** LangChain facilitates the creation\
    \ of advanced chatbots that can manage intricate inquiries and even conduct transactions.\
    \ These bots are designed to grasp and remember the context of a user’s conversation,\
    \ similar to how ChatGPT operates, enhancing customer service and experience.\n\
    \n*   **Coding Assistants:** Leveraging LangChain, alongside APIs from platforms\
    \ like OpenAI, enables the development of tools that aid software developers and\
    \ tech professionals in refining their coding capabilities and boosting productivity.\n\
    \n*   **Healthcare Innovations:** In the healthcare domain, applications built\
    \ with LangChain are revolutionizing the way diagnoses are made and streamlining\
    \ administrative tasks such as scheduling appointments. This automation allows\
    \ healthcare professionals to dedicate more time to critical patient care.\n\n\
    *   **Marketing and E-commerce Tools:** LLM-powered applications are transforming\
    \ e-commerce and marketing by understanding consumer behavior, purchasing patterns,\
    \ and product details. This enables the generation of personalized product recommendations\
    \ and engaging product descriptions, helping businesses attract and retain customers.\n\
    \nThese examples underscore LangChain’s versatility in creating solutions that\
    \ address complex needs across a wide range of fields, from improving customer\
    \ interactions to supporting healthcare providers and enhancing e-commerce strategies.\n\
    \n### Example of a LangChain App – Article Summarizer\n\n**Workflow**\n\n*   **Install\
    \ Essential Packages:** Begin with installing the required packages: requests,\
    \ newspaper3k, and langchain.\n\n*   **Data Collection:** Use the requests package\
    \ to retrieve content from specific article URL.\n\n*   **Extract Information:**\
    \ Leverage the newspaper package to parse the collected HTML, isolating article\
    \ titles and body text.\n\n*   **Preprocess Text:** Clean and structure the extracted\
    \ content to prepare it for input into ChatGPT.\n\n*   **Generate Summaries:**\
    \ Employ ChatGPT to produce concise summaries of the article’ content.\n\n*  \
    \ **Display Results:** Present the summaries alongside the original titles, offering\
    \ a quick insight into each article’s main points.\n\nThis application utilizing\
    \ ChatGPT enables you to quickly grasp essential information from articles with\
    \ the help of AI summarization. It is designed to keep you well informed without\
    \ dedicating extensive time to reading full articles, showcasing the practicality\
    \ of AI in enhancing information consumption efficiency.\n\nStart by securing\
    \ your OpenAI API key, a prerequisite for utilizing the summarizer. This involves\
    \ creating an account on the OpenAI website and gaining API access. Once your\
    \ account is set up, locate the API keys section to retrieve your key.\n\nEnsure\
    \ the installation of necessary libraries by executing the following command:\
    \ `pip install langchain==0.1.4 deeplake openai==1.10.0 tiktoken`. It’s also important\
    \ to install the newspaper3k library, specifically version **0.2.8**, as it is\
    \ the version verified for compatibility in this tutorial.\n\nIn your Python script\
    \ or notebook, assign your API key to an environment variable named “OPENAI_API_KEY”.\
    \ To accomplish this using a “.env” file, employ the “load_dotenv” function.\n\
    \n**In the following app:**\n\n1.  You need to select an article’s URL to create\
    \ a summary. Add it to the variable with value “YOUR-URL”.\n\n2.  The subsequent\
    \ script retrieves the article from a set of URLs utilizing the requests library\
    \ alongside a personalized User-Agent header.\n\n3.  It subsequently isolates\
    \ the title and content of each article using the newspaper library.\n\n4.  You\
    \ need to install Python Dotenv using the command `pip install python-dotenv.`\n\
    \n5.  To generate a .env file, go to your project directory using the terminal\
    \ and execute the touch command in the following manner: `touch .env.`\n\n6. \
    \ Add there your API key in the form of a `variable = OPEN_AI_KEY = Your API Key.`\n\
    \n7.  Then load the environmental variables:\n\n    ```\n    from dotenv import\
    \ load_dotenv\n    load_dotenv()\n    ```\n\n**Then use the following code:**\n\
    \n```\nimport json\nfrom dotenv import load_dotenv\nload_dotenv()\nimport requests\n\
    from newspaper import Article\nheaders = {\n'User-Agent': 'Mozilla/5.0 (Windows\
    \ NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/89.0.4389.82\
    \ Safari/537.36'\n}\narticle_url = \"YOUR-URL\"\nsession = requests.Session()\n\
    try:\nresponse = session.get(article_url, headers=headers, timeout=10)\nif response.status_code\
    \ == 200:\narticle = Article(article_url)\narticle.download()\narticle.parse()\n\
    print(f\"Title: {article.title}\")\nprint(f\"Text: {article.text}\")\nelse:\n\
    print(f\"Failed to fetch article at {article_url}\")\nexcept Exception as e:\n\
    print(f\"Error occurred while fetching article at {article_url}: {e}\")\n```\n\
    \n**Sample output:**\n\n```\nTitle: Meta claims its new AI supercomputer will\
    \ set records\nText: Ryan is a senior editor at TechForge Media with over a decade\
    \ of experience covering the latest technology and interviewing leading industry\
    \ figures. He can often be sighted at tech conferences with a strong coffee in\
    \ one hand and a laptop in the other. If it's geeky, he’s probably into it. Find\
    \ him on Twitter (@Gadget_Ry) or Mastodon (@gadgetry@techhub.social)\nMeta (formerly\
    \ Facebook) has unveiled an AI supercomputer that it claims will be the world’s\
    \ fastest.\n```\n\n## Hugging Face\n\nWhile the term “Hugging Face” might evoke\
    \ images of a friendly emoji ![](images/613844_1_En_7_Chapter/613844_1_En_7_Figa_HTML.gif)\
    \ for many, within the technological community, it represents something far more\
    \ significant: a central hub akin to the “GitHub” for machine learning (ML), dedicated\
    \ to the collaborative development, training, and deployment of natural language\
    \ processing (NLP) and ML models through open source collaboration.\n\nThe standout\
    \ feature of Hugging Face lies in its provision of **pre-trained models**. This\
    \ key innovation means that developers no longer need to initiate their projects\
    \ from the ground up; instead, they can leverage these ready-made models, adjusting\
    \ them to fit their specific requirements, thereby streamlining the development\
    \ workflow.\n\nHugging Face serves as a vital gathering place for data scientists,\
    \ researchers, and ML engineers to share insights, solicit support, and contribute\
    \ to the broader open source movement. Identifying itself as “*the AI community\
    \ for building the future*,” Hugging Face’s ethos is deeply rooted in community-driven\
    \ advancement.\n\nThe platform’s rapid expansion can also be attributed to its\
    \ user-friendly design, which welcomes both beginners and seasoned professionals\
    \ alike. By striving to amass the most extensive collection of NLP and ML resources,\
    \ Hugging Face is on a mission to democratize AI technology, making it widely\
    \ available to an international audience."
  trans: "\n### LangChain 的应用场景\n\nLangChain 在利用大型语言模型（LLM）方面的能力，为众多行业和领域解锁了广泛的高级应用。以下是一些示例和应用场景：\n\
    \n- **客户支持聊天机器人：** LangChain 有助于创建能够处理复杂咨询甚至执行交易的先进聊天机器人。这些机器人旨在理解和记住用户对话的上下文，类似于\
    \ ChatGPT 的运作方式，从而提升客户服务与体验。\n\n- **编程助手：** 利用 LangChain，结合 OpenAI 等平台的 API，可以开发出帮助软件开发者和技术专业人士提升编码能力、提高生产力的工具。\n\
    \n- **医疗健康创新：** 在医疗领域，基于 LangChain 构建的应用正在革新诊断方式，并简化预约安排等行政任务。这种自动化让医疗专业人员能够将更多时间投入到关键的患者护理中。\n\
    \n- **营销与电商工具：** 由 LLM 驱动的应用通过理解消费者行为、购买模式和产品细节，正在改变电商和营销领域。这使得生成个性化产品推荐和引人入胜的产品描述成为可能，帮助企业吸引并留住客户。\n\
    \n这些示例凸显了 LangChain 在创建解决方案方面的多功能性，这些方案能够满足从改善客户互动到支持医疗保健提供者、再到增强电商策略等广泛领域的复杂需求。\n\
    \n### LangChain 应用示例 – 文章摘要生成器\n\n**工作流程**\n\n- **安装必要包：** 首先安装所需的包：`requests`、`newspaper3k`\
    \ 和 `langchain`。\n\n- **数据收集：** 使用 `requests` 包从特定文章 URL 获取内容。\n\n- **提取信息：**\
    \ 利用 `newspaper` 包解析收集到的 HTML，提取文章标题和正文。\n\n- **预处理文本：** 清理并结构化提取的内容，为输入到 ChatGPT\
    \ 做准备。\n\n- **生成摘要：** 使用 ChatGPT 生成文章内容的简洁摘要。\n\n- **显示结果：** 将摘要与原始标题一同呈现，快速了解每篇文章的要点。\n\
    \n这个利用 ChatGPT 的应用，能让你借助 AI 摘要功能快速掌握文章的关键信息。它旨在让你无需花费大量时间阅读全文即可保持信息灵通，展示了 AI 在提升信息消费效率方面的实用性。\n\
    \n首先，获取你的 OpenAI API 密钥，这是使用摘要生成器的前提。这需要在 OpenAI 网站上创建一个账户并获取 API 访问权限。账户设置完成后，找到\
    \ API 密钥部分以获取你的密钥。\n\n通过执行以下命令确保安装必要的库：`pip install langchain==0.1.4 deeplake\
    \ openai==1.10.0 tiktoken`。同时，安装 `newspaper3k` 库也很重要，特别是版本 `0.2.8`，因为本教程已验证该版本的兼容性。\n\
    \n在你的 Python 脚本或笔记本中，将你的 API 密钥分配给名为 `OPENAI_API_KEY` 的环境变量。要使用 `.env` 文件实现此操作，请使用\
    \ `load_dotenv` 函数。\n\n**在以下应用中：**\n\n1.  你需要选择一篇文章的 URL 来创建摘要。将其添加到值为 `YOUR-URL`\
    \ 的变量中。\n\n2.  随后的脚本利用 `requests` 库和自定义的 `User-Agent` 头从一组 URL 中获取文章。\n\n3.  接着，它使用\
    \ `newspaper` 库分离每篇文章的标题和内容。\n\n4.  你需要使用命令 `pip install python-dotenv` 安装 Python\
    \ Dotenv。\n\n5.  要生成 `.env` 文件，请使用终端进入你的项目目录，并按如下方式执行 `touch` 命令：`touch .env`。\n\
    \n6.  在那里以 `variable = OPEN_AI_KEY = Your API Key` 的形式添加你的 API 密钥。\n\n7.  然后加载环境变量：\n\
    \n    ```\n    from dotenv import load_dotenv\n    load_dotenv()\n    ```\n\n\
    **然后使用以下代码：**\n\n```\nimport json\nfrom dotenv import load_dotenv\nload_dotenv()\n\
    import requests\nfrom newspaper import Article\nheaders = {\n'User-Agent': 'Mozilla/5.0\
    \ (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/89.0.4389.82\
    \ Safari/537.36'\n}\narticle_url = \"YOUR-URL\"\nsession = requests.Session()\n\
    try:\nresponse = session.get(article_url, headers=headers, timeout=10)\nif response.status_code\
    \ == 200:\narticle = Article(article_url)\narticle.download()\narticle.parse()\n\
    print(f\"Title: {article.title}\")\nprint(f\"Text: {article.text}\")\nelse:\n\
    print(f\"Failed to fetch article at {article_url}\")\nexcept Exception as e:\n\
    print(f\"Error occurred while fetching article at {article_url}: {e}\")\n```\n\
    \n**示例输出：**\n\n```\nTitle: Meta claims its new AI supercomputer will set records\n\
    Text: Ryan is a senior editor at TechForge Media with over a decade of experience\
    \ covering the latest technology and interviewing leading industry figures. He\
    \ can often be sighted at tech conferences with a strong coffee in one hand and\
    \ a laptop in the other. If it's geeky, he’s probably into it. Find him on Twitter\
    \ (@Gadget_Ry) or Mastodon (@gadgetry@techhub.social)\nMeta (formerly Facebook)\
    \ has unveiled an AI supercomputer that it claims will be the world’s fastest.\n\
    ```\n\n## Hugging Face\n\n虽然“Hugging Face”这个词可能会让许多人联想到一个友好的表情符号 ![](img/613844_1_En_7_Figa_HTML.gif)，但在技术社区中，它代表着更为重要的东西：一个类似于机器学习（ML）领域的“GitHub”的中心枢纽，致力于通过开源协作进行自然语言处理（NLP）和机器学习模型的协同开发、训练与部署。\n\
    \nHugging Face 的突出特点在于它提供了**预训练模型**。这一关键创新意味着开发者不再需要从零开始启动项目；相反，他们可以利用这些现成的模型，根据自身特定需求进行调整，从而简化开发流程。\n\
    \nHugging Face 是数据科学家、研究人员和机器学习工程师分享见解、寻求支持并为更广泛的开源运动做出贡献的重要聚集地。Hugging Face 将自己定位为“*构建未来的人工智能社区*”，其理念深深植根于社区驱动的进步。\n\
    \n该平台的快速扩张也归功于其用户友好的设计，无论是初学者还是经验丰富的专业人士都能轻松上手。通过努力积累最广泛的 NLP 和 ML 资源，Hugging\
    \ Face 的使命是让 AI 技术大众化，使其广泛惠及全球用户。\n"
- fmt: '### History of Hugging Face


    Hugging Face began its journey in 2016 as a joint American-French venture, initially
    focusing on creating an AI-driven chatbot designed to engage with teenagers. The
    turning point for the company came when it decided to share the underlying model
    of its chatbot with the world, a move that shifted its trajectory toward providing
    the AI field with robust, easily accessible tools.


    The release of the transformative `Transformers` library in 2018 stands as a milestone
    in Hugging Face’s history, introducing the AI community to pre-trained models
    such as `BERT` and `GPT`, which quickly became foundational tools for NLP tasks.


    In the years that followed, Hugging Face has profoundly reshaped the machine learning
    landscape. Its commitment to open source collaboration has spurred a wave of innovation
    in NLP, fostering a culture of shared growth and technological advancement.


    Hugging Face has evolved into a central hub for the exchange of models and datasets,
    accelerating both research and practical advancements in AI.


    ### Key Components of Hugging Face


    Hugging Face has emerged as a foundational pillar in the field of natural language
    processing (NLP), offering a suite of tools and resources that cater to diverse
    linguistic processing requirements. Here’s an overview of its core components
    and functionalities.


    #### Transformers Library


    At the heart of Hugging Face is the `Transformers` library, a collection of cutting-edge
    machine learning models tailored for NLP tasks. This library includes a wide range
    of pre-trained models designed for text analysis, content generation, language
    translation, and summary creation, among other applications. The introduction
    of the `pipeline()` method simplifies the application of these complex models
    to practical scenarios, offering an intuitive API for a variety of NLP tasks.
    This library is pivotal for democratizing access to advanced NLP technologies,
    allowing users to easily customize and deploy sophisticated models.


    #### Hugging Face Hub


    The Hugging Face Hub serves as a dynamic online repository, boasting an impressive
    collection of more than 350,000 models, 75,000 datasets, and 150,000 demonstration
    applications (known as Spaces) at the time of writing the book, all of which are
    open source and freely accessible. This platform is designed as a collaborative
    ecosystem, enabling individuals to discover, experiment, work together, and develop
    machine learning technologies. Acting as a pivotal gathering spot, the Hub facilitates
    the exploration and creation of machine learning projects, encouraging open collaboration
    and innovation within the community.


    The Hugging Face Hub incorporates Git-based repositories for version-controlled
    management of all related files. This includes the following:


    - **Models:** A comprehensive collection of cutting-edge models tailored for NLP,
    vision, and audio processing tasks

    - **Datasets:** An extensive assortment of data across various fields and types,
    supporting diverse machine learning projects

    - **Spaces:** Interactive applications that allow for the direct demonstration
    of machine learning models within a web browser


    Additionally, the Hub is equipped with features such as versioning, commit history,
    diffs, branches, and integration with over a dozen libraries. For a deeper understanding
    of these functionalities, the Repositories documentation provides detailed insights.


    #### Model Hub


    Serving as the community’s hub, the Model Hub (Figure 7-1) is where users can
    explore and share a plethora of models and datasets. This feature promotes a collaborative
    environment for NLP development, enabling practitioners to contribute their own
    models and benefit from the collective wisdom of the community. The Model Hub
    is easily navigable on the Hugging Face website, featuring various filters to
    help users find models suited to specific tasks. This hub is instrumental in fostering
    a dynamic, evolving ecosystem where new models are regularly added and refined.


    ![Figure 7-1](images/613844_1_En_7_Chapter/613844_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1** Model Hub - Hugging Face available models


    Within the extensive library of over 200,000 models, you have access to a broad
    spectrum of functionalities, including the following:


    - **Natural Language Processing (NLP):** This encompasses a variety of tasks such
    as language translation, content summarization, and the creation of text. These
    capabilities form the essence of what platforms like OpenAI’s GPT-3 provide through
    ChatGPT.

    - **Audio Processing:** Here, you can engage in operations like automatic speech
    recognition, detecting when someone is speaking (voice activity detection), or
    converting text into speech.

    - **Computer Vision:** These models enable computers to interpret and understand
    visual information from the world. Applications include estimating the distance
    to objects (depth estimation), categorizing images, and transforming one image
    to another. Such technology is crucial for developments like autonomous vehicles.

    - **Multimodal Models:** These advanced models are capable of processing and generating
    outputs from multiple data types – text, images, and audio. This versatility allows
    for a wide range of applications across different media.


    #### Tokenizers


    Essential for the preprocessing of text, tokenizers break down language into manageable
    pieces, or tokens, which are then used by machine learning models to understand
    and generate human language. These tokens can represent words, subwords, or characters
    and are crucial for converting text into a machine-readable format. Hugging Face’s
    tokenizers are optimized for compatibility with the `Transformers` library, ensuring
    efficient text preprocessing for a variety of languages and text formats.'
