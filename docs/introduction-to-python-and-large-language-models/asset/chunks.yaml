    #### TOML 支持


    `TOML` 是 Tom''s Obvious Minimal Language 的缩写。这是一种在过去十年中流行起来的配置文件格式。Python 社区已将
    `TOML` 作为指定包和项目元数据的首选格式。


    `TOML` 的设计目标是既易于人类阅读，也易于计算机解析。虽然许多工具多年来一直在使用 `TOML`，但 Python 此前并未内置对 `TOML` 的支持。这一情况在
    Python 3.11 中发生了改变，`tomllib` 被添加到了标准库中。这个新模块构建在流行的第三方库 `tomli` 之上，允许你解析 `TOML`
    文件。


    **示例：**


    ```

    [second]

    label   = { singular = "second", plural = "seconds" }

    aliases = ["s", "sec", "seconds"]

    [minute]

    label      = { singular = "minute", plural = "minutes" }

    aliases    = ["min", "minutes"]

    multiplier = 60

    to_unit    = "second"

    [day]

    label      = { singular = "day", plural = "days" }

    aliases    = ["d", "days"]

    multiplier = 24

    to_unit    = "hour"

    [year]

    label      = { singular = "year", plural = "years" }

    aliases    = ["y", "yr", "years", "julian_year", "julian years"]

    multiplier = 365.25

    to_unit    = "day"

    ```


    新的 `tomllib` 库提供了对解析 `TOML` 文件的支持。`tomllib` 不支持写入 `TOML`。它基于 `tomli` 库。使用 `tomllib.load()`
    时，你需要传入一个文件对象，并且必须通过指定 `mode="rb"` 以二进制模式打开该文件。


    **`tomllib` 中的两个主要函数如下：**


    *   `load()`: 从文件加载字节

    *   `loads()`: 从字符串加载


    **示例：**


    ```

    import tomllib

    # 会引发 TypeError，必须使用二进制模式

    with open(''t.toml'') as f:

    tomllib.load(f)

    # 正确用法

    with open(''t.toml'', ''rb'') as f:

    tomllib.load(f)

    ```


