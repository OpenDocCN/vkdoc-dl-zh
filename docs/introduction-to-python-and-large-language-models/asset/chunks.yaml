    ### 处理文档长度


    在语言建模中，其目标是根据前面的词元生成文本，从数据集中排除过短的文档（词元数量少于约 100 个的文档）可以减少干扰，从而促进对文本依赖关系进行更连贯的建模。鉴于当代语言模型普遍采用
    Transformer 架构，进行预处理以将长文档分割成一致且可管理的片段是有益的。以下来自 `datasets` 库的代码片段展示了如何将大型文档分割成离散的、不重叠的部分：


    **简单示例：**


    ```

    def segment_text(examples):

    segmented_texts = []

    for text in examples[''text'']:

    # 将文本分割成 70 个字符的片段

    segmented_texts += [text[j:j + 70] for j in range(0, len(text), 70)]

    return {''segmented_texts'': segmented_texts}

    ```

