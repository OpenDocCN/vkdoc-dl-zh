- fmt: '### Text Produced by Machines


    A primary objective in the development of language models is to accurately represent
    the spectrum of human language. Nevertheless, datasets derived from web crawls
    often incorporate a significant amount of text produced by machines. This includes
    output from existing language models, text digitized via Optical Character Recognition
    (`OCR`), and content that has been machine-translated.


    For example, the `C4` corpus significantly incorporates data from `patents.google.com`,
    which relies on machine translation to convert patents from global patent offices
    into English. Furthermore, web-based datasets frequently include `OCR` text from
    scanned books and documents. Given the inherent imperfections of `OCR` technology,
    the resulting text often deviates from the natural distribution of English, exhibiting
    predictable errors like misspellings and omissions.


    Identifying text generated by machines poses considerable challenges and is an
    area of ongoing research. Nonetheless, tools like the `ctrl-detector` offer some
    capability for detecting such machine-generated content. It’s crucial, when preparing
    a dataset for language modeling, to identify, characterize, and document any machine-generated
    text it may contain.


    ### Removing Duplicate Content


    When collecting text data from the Web, it’s common to encounter repeated instances
    of the same text. For instance, research highlighted in “Deduplicating Training
    Data Makes Language Models Better” discovered that a particular 50-word text sequence
    appeared in the `C4` dataset 60,000 times. Training language models on datasets
    from which duplicates have been removed not only speeds up the process but also
    reduces the risk of the models memorizing specific sequences.


    Moreover, recent studies indicate that models trained on data containing duplicates
    are vulnerable to privacy breaches, wherein attackers can prompt the model to
    reproduce specific sequences, thereby revealing which data it has memorized. The
    study “Deduplicating Training Data Mitigates Privacy Risks in Language Models”
    illustrates that the frequency with which models reproduce specific sequences
    from their training data increases superlinearly with the sequence’s prevalence
    within that data. For example, a sequence appearing ten times is more likely to
    be generated by the model at a rate 1000 times higher than one that appears only
    once.


    The process of removing duplicates, or deduplication, can be implemented at different
    levels of specificity, from identifying exact matches to applying more nuanced,
    fuzzy matching techniques. Tools such as `deduplicate-text-datasets` and `datasketch`
    are effective in minimizing the redundancy in datasets by removing duplicate content.
    It is essential to acknowledge, as noted by researchers, that deduplication is
    resource-intensive, requiring significant computational power (both CPU and memory),
    especially given the substantial size of web-crawled datasets. Consequently, executing
    these operations in a distributed computing environment is often advisable to
    manage the demands efficiently.


    **Simple example:**


    ```

    import pandas as pd

    # Example list of content with duplicates

    content = ["Example text", "Unique content", "Example text", "Another unique piece",
    "Unique content"]

    # Convert the list to a DataFrame

    df = pd.DataFrame(content, columns=[''Text''])

    # Drop duplicates

    df = df.drop_duplicates()

    # Convert back to a list if needed

    unique_content = df[''Text''].tolist()

    print(unique_content)

    ```


    **Output:**


    ```

    [''Example text'', ''Unique content'', ''Another unique piece'']

    ```


    ### Data Decontamination


    Ensuring the cleanliness and integrity of data in machine learning involves straightforward
    practices like separating training and testing datasets. Yet, for large language
    models (`LLMs`) drawing both training and evaluation data from the expansive terrain
    of the Internet, maintaining a clear distinction becomes a complex challenge.


    For instance, the effectiveness of an `LLM` in understanding and responding to
    question-answer pairs during evaluation might be overstated if those very pairs
    were part of the model’s training data. The practice of decontamination is crucial
    in this context, aiming to exclude any elements from the training data that are
    already part of benchmark datasets used for model evaluation. OpenAI, for example,
    intentionally omitted Wikipedia content from their `WebText` dataset training
    materials, given Wikipedia’s extensive use in benchmark datasets. Similarly, EleutherAI
    introduced methods for benchmark dataset decontamination through their `lm-eval
    harness` package, accommodating scenarios where training data decontamination
    wasn’t practical.


    **Decontamination addresses two main issues:**


    - **Input-and-output contamination**, where the model might simply replicate answers
    from its training data rather than generating insights, particularly relevant
    for tasks like abstractive summarization where the desired output might already
    exist within the training corpus.

    - **Input contamination**, where the presence of evaluation examples, sans labels,
    in training data could artificially inflate the model’s performance metrics in
    zero-shot or few-shot evaluations.


    **Simple example:**


    ```

    import pandas as pd

    # Sample DataFrame with a mix of sensitive and non-sensitive rows

    data = {''Text'': ["User email is example@example.com",

    "Contact us at contact@example.net",

    "Our support email is support@example.org"],

    ''IsSensitive'': [True, True, False]}

    df = pd.DataFrame(data)

    # Remove sensitive rows directly without creating an intermediate slice

    df_non_sensitive = df.loc[~df[''IsSensitive'']].copy()

    # Now df_non_sensitive contains only non-sensitive rows, and we''ve avoided the
    warning

    print(df_non_sensitive)

    ```


    **Output:**


    ```

    Text  IsSensitive

    2  Our support email is support@example.org        False

    ```


    **The provided code performs the following actions:**


    - **Imports the Pandas Library:** This is a popular Python library used for data
    manipulation and analysis.

    - **Creates a Sample DataFrame:** It uses a dictionary where keys represent column
    names (`''Text''` and `''IsSensitive''`) and values are lists containing the rows
    for each column. The `''Text''` column contains strings, and the `''IsSensitive''`
    column contains Boolean values (`True` or `False`) indicating whether the corresponding
    row is considered sensitive.

    - **Filters Out Sensitive Rows:** The code uses `df.loc[~df[''IsSensitive'']]`
    to select only the rows where the `''IsSensitive''` column is `False` (i.e., nonsensitive
    rows). The tilde (`~`) is a bitwise NOT operator used here to invert the Boolean
    series, thus selecting rows that are not marked as sensitive.

    - **Creates a Copy of the Filtered DataFrame:** By calling `.copy()` on the filtered
    DataFrame, it ensures that `df_non_sensitive` is a new DataFrame independent of
    the original `df`. This step is crucial to avoid any `SettingWithCopy` warnings
    from pandas, which can occur when modifying a DataFrame that is a slice of another
    DataFrame.

    - **Prints the Nonsensitive DataFrame:** Finally, it prints `df_non_sensitive`,
    which now contains only the rows from the original DataFrame that were marked
    as nonsensitive. The sensitive rows have been removed.'
