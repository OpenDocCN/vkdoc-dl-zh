- fmt: '### Operations on Sets


    Various set operations like union and intersection are demonstrated here. These
    operations allow you to manipulate and combine sets as needed.


    **Example:**


    ```python

    # Creating two sets

    my_set = {1, 2, 3, 4}

    my_set_2 = {3, 4, 5, 6}

    # Performing set operations and comparing them using union and | operator

    union_result = my_set.union(my_set_2)

    union_operator_result = my_set | my_set_2

    # Performing set operations and comparing them using intersection and & operator

    intersection_result = my_set.intersection(my_set_2)

    intersection_operator_result = my_set & my_set_2

    # Performing set operations and comparing them using difference and - operator

    difference_result = my_set.difference(my_set_2)

    difference_operator_result = my_set - my_set_2

    # Performing set operations and comparing them using symmetric_difference and
    ^ operator

    symmetric_difference_result = my_set.symmetric_difference(my_set_2)

    symmetric_difference_operator_result = my_set ^ my_set_2

    # Clearing the first set

    my_set.clear()

    # Printing the results with added comments

    print("Union Result:", union_result, ''is equivalent to'', union_operator_result)

    print("Intersection Result:", intersection_result, ''is equivalent to'', intersection_operator_result)

    print("Difference Result:", difference_result, ''is equivalent to'', difference_operator_result)

    print("Symmetric Difference Result:", symmetric_difference_result, ''is equivalent
    to'', symmetric_difference_operator_result)

    print("Cleared Set:", my_set)  # The set is now empty

    ```


    **Output:**


    ```

    Union Result: {1, 2, 3, 4, 5, 6} is equivalent to {1, 2, 3, 4, 5, 6}

    Intersection Result: {3, 4} is equivalent to {3, 4}

    Difference Result: {1, 2} is equivalent to {1, 2}

    Symmetric Difference Result: {1, 2, 5, 6} is equivalent to {1, 2, 5, 6}

    Cleared Set: set()

    ```


    **In this example:**


    - **Union:** The `union()` function combines the data from both sets, creating
    a new set that contains all unique elements from both sets.

    - **Intersection:** The `intersection()` function finds the data that is common
    to both sets. It returns a new set containing only the elements that exist in
    both sets.

    - **Difference:** The `difference()` function removes the data that is common
    to both sets from the first set and outputs a new set containing only the data
    present in the first set but not in the second set.

    - **Symmetric Difference:** The `symmetric_difference()` function is similar to
    the `difference()` function but with a twist. It removes the data that is common
    to both sets from both sets and outputs a new set containing the data that remains
    unique in each set.


    These functions allow you to perform various set operations and manipulate sets
    to get specific subsets of data as needed.


    ## Regular Functions and Lambda Functions


    ### What Is a Function in Python?


    In programming, functions are utilized to group together a series of steps that
    you either need to execute multiple times or that are sufficiently complex to
    warrant encapsulation in a distinct subprogram for invocation as required. Essentially,
    a function is a segment of code designed to perform a particular action. Depending
    on the nature of this action, a function may require several inputs to operate,
    and upon completion, it has the capability to return outcomes, either singular
    or multiple.


    **Python distinguishes three categories of functions:**


    - **Built-in functions**, like `help()` for requesting assistance, `min()` for
    determining the smallest value, and `print()` for outputting an object to the
    terminal, among others. A more comprehensive list of these functions is available.

    - **User-Defined Functions (UDFs)**, which are custom functions crafted by users
    to facilitate their tasks.

    - **Anonymous functions**, often referred to as lambda functions, are unique in
    that they are defined without employing the conventional `def` keyword.


    **Creating a User-Defined Function (UDF) in Python involves four primary steps:**


    1. Start by using the `def` keyword to signal the creation of a function, followed
    by the chosen name for the function.

    2. Specify any parameters the function requires, placing them inside the parentheses
    next to the function name. Conclude this line with a colon.

    3. Incorporate the instructions that you want the function to carry out.

    4. Conclude the function with a `return` statement if you intend for the function
    to produce a result. Omitting the `return` statement means the function will yield
    a `None` object by default.


    **Example:**


    ```python

    def add_numbers(a, b):

    return a + b

    # Example of calling the function

    result = add_numbers(3, 5)

    print(result)  # This will print 8

    ```


    **Output:**


    ```

    8

    ```


    ### The `return` Statement


    The `return` statement in Python is used within a function to exit it and pass
    back a value to the caller. A function can return a value, including data types
    like integers, floats, strings, lists, tuples, dictionaries, or even other functions
    and objects. If a function doesn''t explicitly end with a `return` statement,
    Python automatically returns `None`, indicating that the function doesn''t provide
    any specific value.


    **The `return` statement can be used to:**


    - Return a specific result calculated or processed within the function

    - Exit the function at a certain point before the end of its block of code

    - Pass control back to the point in the program where the function was called,
    optionally passing data back to that point


    ### `return` or `print` in a Function


    In Python, `return` and `print` within a function serve different purposes:


    - `return` sends a value back to the caller and **exits the function**. It allows
    the function to output a result, which can then be used elsewhere in your program.
    The returned value can be stored in a variable, used in expressions, or passed
    to other functions.

    - `print()`, on the other hand, simply displays a value to the console. It does
    not exit the function or send any value back to the caller. `print` is used for
    logging or debugging purposes, allowing developers to see outputs without affecting
    the flow or output of the function.


    In short, use `return` when you want to output a value from a function and use
    it further, and use `print` when you want to display something to the console
    without affecting the function''s output to its caller.


    ### Methods vs. Functions


    A method is a type of function that is associated with a class and is accessed
    via an instance or object of that class. On the other hand, a function is a stand-alone
    entity without the requirement of being linked to a class. Therefore, while every
    method qualifies as a function, the reverse does not hold true for all functions.


    Take this scenario as an illustration: initially, you create a function named
    `plus()`, followed by the establishment of a `Summation` class that encompasses
    a `sum()` method. To utilize the `sum()` method that is integrated into the `Summation`
    class, it''s imperative to instantiate an object or instance of this class. Let''s
    proceed to construct such an object.


    ### How to Call a Function in Python


    To call a function in Python, you simply use the function''s name followed by
    parentheses. If the function requires arguments, you place them inside the parentheses,
    separated by commas. Here''s the basic syntax:


    **Syntax:**


    ```python

    function_name(arguments)

    ```


    **For example:**


    ```python

    result = add_numbers(5, 3)

    ```


    This executes the `add_numbers` function with `5` and `3` as its arguments and
    stores the return value in the variable `result`. If the function does not require
    any arguments, you still need to use parentheses, but leave them empty:


    ```python

    function_name()

    ```


    This syntax is straightforward and is the same for both built-in functions and
    user-defined functions.'
