    ```

    from langchain.output_parsers import PydanticOutputParser

    from pydantic import field_validator

    from pydantic import BaseModel, Field

    from typing import List

    from langchain.prompts import PromptTemplate

    from langchain.llms import OpenAI

    import requests

    from newspaper import Article

    openai_key = ''YOUR-API-KEY''

    headers = {

    ''User-Agent'': ''Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
    (KHTML, like Gecko) Chrome/89.0.4389.82 Safari/537.36''

    }

    article_url = input("Enter Article URL To Be Summarized: ")

    session = requests.Session()

    try:

    response = session.get(article_url, headers=headers, timeout=10)

    if response.status_code == 200:

    article = Article(article_url)

    article.download()

    article.parse()

    else:

    print(f"Failed to fetch article at {article_url}")

    except Exception as e:

    print(f"Error occurred while fetching article at {article_url}: {e}")

    article_title = article.title

    article_text = article.text

    # create output parser class

    class ArticleSummary(BaseModel):

    title: str = Field(description="Title of the article")

    summary: List[str] = Field(description="Bulleted list summary of the article")

    # validating whether the generated summary has at least three lines

    @field_validator(''summary'')

    def has_three_or_more_lines(cls, list_of_lines):

    if len(list_of_lines) < 3:

    raise ValueError("Generated summary has less than three bullet points!")

    return list_of_lines

    # set up output parser

    parser = PydanticOutputParser(pydantic_object=ArticleSummary)

    # create prompt template

    # notice that we are specifying the "partial_variables" parameter

    template = """

    You are an experienced content writing assistant that summarizes online articles.

    Here''s the article you want to summarize.

    ==================

    Title: {article_title}

    {article_text}

    ==================

    {format_instructions}

    """

    prompt = PromptTemplate(

    template=template,

    input_variables=["article_title", "article_text"],

    partial_variables={"format_instructions": parser.get_format_instructions()}

    )

    # Format the prompt using the article title and text obtained from scraping

    formatted_prompt = prompt.format_prompt(article_title=article_title, article_text=article_text)

    # Instantiate model class

    model = OpenAI(openai_api_key = openai_key, model_name="gpt-3.5-turbo-instruct",
    temperature=0.0)

    # Use the model to generate a summary

    output = model(formatted_prompt.to_string())

    # Parse the output into the Pydantic model

    parsed_output = parser.parse(output.split("\"]}")[0] + "\"]}")

    print("Title:", parsed_output.title)

    print("Article Summary:")

    for item in parsed_output.summary:

    print("-", item)

    ```


    **Sample output:**


    ```

    Enter Article URL To Be Summarized: https://www.techtarget.com/whatis/definition/large-language-model-LLM

    Title: What are Large Language Models?

    Article Summary:

    - LLMs are becoming increasingly important to businesses as AI continues to grow
    and dominate the business setting.

    - LLMs take a complex approach involving multiple components, including training
    on large volumes of data and using self-supervised learning and deep learning
    techniques.

    - LLMs have a wide range of uses, including text generation, translation, content
    summary, rewriting, classification, sentiment analysis, and conversational AI.

    - LLMs offer numerous advantages, such as extensibility, flexibility, performance,
    accuracy, and ease of training.

    - However, there are also challenges and limitations to using LLMs, such as high
    development and operational costs, potential bias, lack of explainability, hallucination,
    complexity, and vulnerability to glitch tokens.

    ```


    **Explanation**


    This app is an extended version of the summarizing online articles app from the
    previous chapter using the OpenAI GPT-3.5 model. Before using it, you need to
    install the following packages:


    *   `Langchain==0.1.4`

    *   `deeplake==3.9.11`

    *   `Openai==1.10.0`

    *   `Tiktoken==0.7.0`

    *   `Newspaper3k==0.2.8`

    *   `Pydantic==2.7.4`


    This is something you can do by executing the following command in your notebook
    or terminal: `pip install langchain==0.1.4 deeplake openai==1.10.0 tiktoken newspaper3k
    pydantic`. You also need an API key for OpenAI.


    **Here''s a breakdown of what happens in the code:**


    1.  It imports necessary modules and classes including `PydanticOutputParser`,
    `BaseModel`, `Field`, `List`, `PromptTemplate`, `OpenAI`, `requests`, and `Article`.

    2.  It prompts the user to input the URL of the article to be summarized.

    3.  It makes a request to fetch the article content from the provided URL and
    parses it using the `newspaper` library.

    4.  It defines a Pydantic model class called `ArticleSummary` with two fields:
    `title` and `summary`. The `summary` field is defined with a validator `has_three_or_more_lines`
    ensuring that the generated summary has at least three bullet points.

    5.  It sets up an output parser using `PydanticOutputParser` for the `ArticleSummary`
    class.

    6.  It defines a template for the prompt using the article’s title and text obtained
    from scraping.

    7.  It formats the prompt using the article title and text.

    8.  It instantiates the OpenAI model class with the specified API key and model
    name.

    9.  It uses the OpenAI model to generate a summary based on the formatted prompt.

    10.  It parses the output into the `ArticleSummary` Pydantic model.

    11.  It prints the parsed output, displaying the title and summary of the article.


    **Note**


    OpenAI summarization


    *The actual summarization happens within the OpenAI model, where the input prompt
    is provided along with the article details, and the model generates a summary
    based on that. The Pydantic model is used to ensure the structure and validation
    of the output summary.*


    ## Question-Answering Systems: Knowledge at Your Fingertips


    ### Enhancing Question-Answering Capabilities Through Large Language Models (LLMs)


    The advent of large language models (LLMs) such as OpenAI’s GPT has revolutionized
    the field of question answering (QA). These models elevate generative QA to new
    heights by facilitating a profound comprehension of both the query and its contextual
    nuances. LLMs possess the ability to craft interactions akin to human conversation,
    generating responses that align closely with the user’s underlying intent. Moreover,
    they excel in providing intelligent and insightful summaries based on the underlying
    contexts they retrieve.


    At its most basic level, a straightforward generative QA system requires only
    a user’s textual query and an LLM. However, more sophisticated systems may undergo
    additional training on specialized domain knowledge. They may also integrate with
    search and recommendation engines to not only answer questions but also to seamlessly
    link relevant information sources. Through such advancements, these models transcend
    conventional search paradigms, evolving toward a more dynamic, responsive, and
    interactive mode of information retrieval.


    ### Utilizing Large Language Models for Advanced Document Analysis


    The integration of generative question answering models into information retrieval
    systems marks a significant advancement in document analysis. Leveraging large
    language models (LLMs) allows for the creation of more dynamic and intuitive systems
    capable of not only searching for data but also comprehending and interpreting
    it. This integration revolutionizes the processing of complex queries across diverse
    domains, fundamentally altering the way information is interacted with and retrieved.


