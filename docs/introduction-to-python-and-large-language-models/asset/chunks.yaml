    Pass

    ```


    如图所示，对于三个维度，我们必须定义三个类型及其各自的类，这不够简洁，并且代表了我们应该警惕的高度重复。Python 3.11 引入了 `TypeVarTuple`，它允许你使用多种类型创建泛型。


    ```

    from typing import Generic, TypeVarTuple

