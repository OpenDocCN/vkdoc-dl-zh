    *   **Multimodal Models****:** These advanced models are capable of processing
    and generating outputs from multiple data types `–` text, images, and audio. This
    versatility allows for a wide range of applications across different media.


    #### Tokenizers


    Essential for the preprocessing of text, tokenizers break down language into manageable
    pieces, or tokens, which are then used by machine learning models to understand
    and generate human language. These tokens can represent **words, subwords, or
    characters** and are crucial for converting text into a machine-readable format.
    Hugging Face’s tokenizers are optimized for compatibility with the Transformers
    library, ensuring efficient text preprocessing for a variety of languages and
    text formats.'
  trans: '

    ### Hugging Face 的发展历程


    Hugging Face 于 2016 年作为一家美法合资企业起步，最初专注于打造一款面向青少年的 AI 驱动聊天机器人。公司的转折点出现在它决定将聊天机器人的底层模型向全球开源，这一举措使其发展轨迹转向为
    AI 领域提供强大且易于使用的工具。


    2018 年发布的变革性 `Transformers` 库是 Hugging Face 发展史上的里程碑，它将 `BERT` 和 `GPT` 等预训练模型引入
    AI 社区，这些模型迅速成为 NLP 任务的基础工具。


    在随后的几年里，Hugging Face 深刻重塑了机器学习格局。其对开源协作的承诺激发了 NLP 领域的创新浪潮，培育了共同成长与技术进步的社区文化。


    Hugging Face 已发展成为模型与数据集交换的核心枢纽，加速了 AI 领域的研究进展与实际应用。


    ### Hugging Face 的核心组件


    Hugging Face 已成为自然语言处理（NLP）领域的基石，提供了一套满足多样化语言处理需求的工具和资源。以下是其核心组件与功能的概述。


    #### Transformers 库


    Hugging Face 的核心是 `Transformers` 库，这是一个专为 NLP 任务量身定制的尖端机器学习模型集合。该库包含大量预训练模型，适用于文本分析、内容生成、语言翻译和摘要创建等应用。`pipeline()`
    方法的引入简化了将这些复杂模型应用于实际场景的过程，为各种 NLP 任务提供了直观的 API。该库对于普及先进 NLP 技术至关重要，使用户能够轻松定制和部署复杂的模型。


    #### Hugging Face Hub


    Hugging Face Hub 是一个动态的在线仓库，在撰写本书时，它拥有超过 35 万个模型、7.5 万个数据集和 15 万个演示应用（称为 Spaces）的惊人收藏，所有这些资源都是开源且免费访问的。该平台被设计为一个协作生态系统，使个人能够发现、实验、协作和开发机器学习技术。作为关键的聚集地，Hub
    促进了机器学习项目的探索与创建，鼓励社区内的开放协作与创新。


    Hugging Face Hub 采用基于 Git 的仓库来对所有相关文件进行版本控制管理。这包括以下内容：


    - **模型：** 专为 NLP、视觉和音频处理任务量身定制的全面尖端模型集合

    - **数据集：** 涵盖各种领域和类型的广泛数据集合，支持多样化的机器学习项目

    - **Spaces：** 允许在网页浏览器中直接演示机器学习模型的交互式应用


    此外，Hub 还配备了版本控制、提交历史、差异对比、分支以及与十多个库的集成等功能。如需深入了解这些功能，可查阅仓库文档。


    #### 模型中心


    作为社区的枢纽，模型中心（图 7-1）是用户探索和分享大量模型与数据集的地方。该功能促进了 NLP 开发的协作环境，使从业者能够贡献自己的模型，并从社区的集体智慧中受益。模型中心在
    Hugging Face 网站上易于导航，提供多种筛选器帮助用户找到适合特定任务的模型。该中心对于培育一个动态、不断发展的生态系统至关重要，新模型在此定期添加和优化。


    ![图 7-1](img/613844_1_En_7_Fig1_HTML.jpg)


    **图 7-1** 模型中心 - Hugging Face 可用模型


    在超过 20 万个模型的庞大库中，你可以访问广泛的功能，包括以下内容：


    - **自然语言处理（NLP）：** 涵盖语言翻译、内容摘要和文本生成等多种任务。这些能力构成了 OpenAI 的 GPT-3 通过 ChatGPT 提供的核心功能。

    - **音频处理：** 你可以在此进行自动语音识别、检测说话（语音活动检测）或将文本转换为语音等操作。

    - **计算机视觉：** 这些模型使计算机能够解释和理解来自世界的视觉信息。应用包括估计物体距离（深度估计）、图像分类以及图像到图像的转换。此类技术对于自动驾驶汽车等发展至关重要。

    - **多模态模型：** 这些高级模型能够处理多种数据类型（文本、图像和音频）并生成输出。这种多功能性使其能够跨不同媒体实现广泛的应用。


    #### 分词器


    作为文本预处理的关键，分词器将语言分解为可管理的片段（即 token），机器学习模型随后使用这些 token 来理解和生成人类语言。这些 token 可以代表单词、子词或字符，对于将文本转换为机器可读格式至关重要。Hugging
    Face 的分词器针对与 `Transformers` 库的兼容性进行了优化，确保了对各种语言和文本格式的高效文本预处理。

