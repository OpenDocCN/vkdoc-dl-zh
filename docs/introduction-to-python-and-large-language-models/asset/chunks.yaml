    \ `Lamini` 库的一部分。\n\n3.  **创建 LaminiClassifier 实例**\n\n`llm = LaminiClassifier()`\
    \ 创建了 `LaminiClassifier` 类的一个实例，该实例将用于文本分类任务。\n\n4.  **定义提示词**\n    -   `prompts`\
    \ 是一个字典，包含与不同类别关联的示例文本。字典中的每个键值对代表一个类别标签及其对应的示例文本。\n    -   在本例中，有两个类别：`\"cat\"\
    ` 和 `\"dog\"`，示例文本描述了每个类别相关的特征或行为。\n\n5.  **向类别添加数据**\n    -   `llm.add_data_to_class()`\
    \ 方法用于向每个类别添加训练数据。它将提供的文本示例与相应的类别标签关联起来。\n    -   例如，`llm.add_data_to_class(\"\
    dog\", [\"woof\", \"group oriented\"])` 将提供的文本 `\"woof\"` 和 `\"group oriented\"\
    ` 添加到 `\"dog\"` 类别。\n    -   类似地，`llm.add_data_to_class(\"cat\", [\"Oh, I prefer\
    \ to do stuff on my own than dogs\", \"meow\"])` 将提供的文本添加到 `\"cat\"` 类别。\n\n6.\
    \  **使用提示词训练模型**\n\n`llm.prompt_train(prompts)` 使用提供的提示词和关联的示例文本训练 `Lamini` 分类器。此步骤涉及训练模型识别文本数据中的模式，并学习根据提供的示例将新的文本输入分类到适当的类别中。\n\
    \n7.  **进行预测**\n    -   `llm.predict([\"I'm more independent than dogs\", \"woof\"\
    ])` 对提供的文本输入进行预测。\n    -   在本例中，模型根据使用提示词和示例文本进行的训练，为给定的文本 `\"I'm more independent\
    \ than dogs\"` 和 `\"woof\"` 预测类别标签。\n\n**注意**\n\n环境变量\n\n*出于安全考虑，建议将你的 API 密钥添加为环境变量。*\n"
- fmt: '# Data Collection, Cleaning, and Preparation of Python Libraries


    The effectiveness of large language models (LLMs) can be attributed significantly
    to their vast size, as they are developed using extensive datasets. This extensive
    training allows them to grasp a wide array of themes, genres, and languages more
    comprehensively than smaller models limited by less diverse data.


    The principle guiding this approach is simple: more data equates to better performance.
    Datasets like `C4`, `The Pile`, `The Bigscience Roots Corpus`, and `OpenWebText`
    have played pivotal roles in expanding the volume of training data by aggregating
    and refining vast text collections from web crawls, aimed at enhancing LLM pre-training.


    However, the sheer cost of manually reviewing and refining such large datasets
    means many contain quality issues. The significance of this extends beyond just
    technical performance metrics such as perplexity and validation loss; it also
    means that the models can inadvertently learn and propagate the biases present
    in their training materials. Consequently, understanding the nature and composition
    of these datasets is not just a technical necessity but a research challenge of
    its own.


    As data acts as the cornerstone for LLM development, comprehending and cataloging
    the specifics of training datasets becomes imperative. This is vital for assessing
    the value of data in the models’ predictions and decisions, especially since the
    suitability of training data can vary greatly depending on the context of the
    application. The recommended strategy is to document the potentially problematic
    aspects of datasets rather than attempting to eliminate them entirely.


    In the realm of machine learning, there’s typically a similarity or congruence
    between training and testing (evaluation) data. However, LLMs are trained on what
    is essentially “raw text,” leading to unique challenges in creating non-overlapping
    training, validation, and test splits, especially in relation to benchmark datasets.


    With this understanding, let’s explore the management of the colossal datasets
    necessary for training these advanced models!


    ## Gathering and Preparing Data for Large Language Models


    The foundation of large language models (LLMs) lies in the quality and preparation
    of their pre-training data. Unlike smaller counterparts, the effectiveness and
    the capabilities of LLMs are largely determined by the richness of their pre-training
    corpus and the meticulousness of its preprocessing.


    ### Data Acquisition


    The journey to developing a robust LLM begins with the collection of a comprehensive
    natural language corpus, sourced from a wide array of platforms. The diversity
    and volume of data collected from these sources directly influence the model’s
    proficiency.


    **Types of Data Used**


    - **General Data:** The bulk of pre-training corpora for current LLMs comprises
    general data, which includes content from web pages, books, and dialogues. This
    type of data is preferred due to its vast availability, variety, and the ease
    with which it can be accessed, fostering the model’s ability to understand and
    generate human-like text.


    - **Specialized Data:** To equip LLMs with the ability to tackle niche problems,
    researchers also incorporate specialized datasets into the training mix. These
    can include datasets rich in multilingual content, scientific literature, and
    programming code, aiming to refine the model’s expertise in specific domains.


    ### What Is Data Preprocessing?


    Data cleansing, often referred to as data preprocessing, stands as a pivotal phase
    within the realms of data analysis and the development of machine learning models.
    This stage is dedicated to the meticulous examination, modification, and rectification
    of raw data to elevate its quality, precision, and uniformity.


    The essence of data cleansing lies in its ability to identify and amend inaccuracies,
    noise, missing elements, duplications, inconsistencies, and other flaws within
    the dataset. This refinement process is imperative to prepare the data for subsequent
    steps in analysis, modeling, and knowledge discovery. The value of a dataset is
    significantly enhanced when it is relevant to the specific objectives of the model,
    exhibits diversity, and maintains a high standard of quality.


    Given the prevalence of challenges such as missing values, duplications, and noise,
    large datasets cannot be employed in their raw form for training sophisticated
    language models. Such datasets necessitate undergoing rigorous cleansing and labeling
    procedures to render them apt for use in training large language models.


    This transformation is crucial for leveraging the full potential of algorithms,
    computational resources, and other technological advancements in the development
    of these models. For instance, the initial dataset for GPT-3 spanned an impressive
    45TB; however, only 570GB of data, representing about 1% of the original volume,
    met the high-quality standards required for inclusion in the training corpus after
    the cleansing process.


    ### Preparing Datasets for Training


    The goal of training language models can differ based on their intended use cases,
    yet there are several crucial practices to adopt to guarantee the training data
    for LLMs is both clean and reliable.


    **These practices encompass**


    - Managing unwanted data

    - Deduplication

    - Decontamination

    - Toxicity and bias control

    - Personally identifiable information control

    - Prompt control

    - Tokenization and vectorization

    - Handling of missing data

    - Data augmentation'
  raw: '## Data Collection, Cleaning, and Preparation of Python Libraries


    The effectiveness of large language models (LLMs) can be attributed significantly
    to their vast size, as they are developed using extensive datasets. This extensive
    training allows them to grasp a wide array of themes, genres, and languages more
    comprehensively than smaller models limited by less diverse data.


    The principle guiding this approach is simple: more data equates to better performance.
    Datasets like C4, The Pile, The Bigscience Roots Corpus, and OpenWebText have
    played pivotal roles in expanding the volume of training data by aggregating and
    refining vast text collections from web crawls, aimed at enhancing LLM pre-training.


    However, the sheer cost of manually reviewing and refining such large datasets
    means many contain quality issues. The significance of this extends beyond just
    technical performance metrics such as perplexity and validation loss; it also
    means that the models can inadvertently learn and propagate the biases present
    in their training materials. Consequently, understanding the nature and composition
    of these datasets is not just a technical necessity but a research challenge of
    its own.


    As data acts as the cornerstone for LLM development, comprehending and cataloging
    the specifics of training datasets becomes imperative. This is vital for assessing
    the value of data in the models’ predictions and decisions, especially since the
    suitability of training data can vary greatly depending on the context of the
    application. The recommended strategy is to document the potentially problematic
    aspects of datasets rather than attempting to eliminate them entirely.


    In the realm of machine learning, there’s typically a similarity or congruence
    between training and testing (evaluation) data. However, LLMs are trained on what
    is essentially “raw text,” leading to unique challenges in creating non-overlapping
    training, validation, and test splits, especially in relation to benchmark datasets.


    With this understanding, let’s explore the management of the colossal datasets
    necessary for training these advanced models!


    ### Gathering and Preparing Data for Large Language Models


    The foundation of large language models (LLMs) lies in the quality and preparation
    of their pre-training data. Unlike smaller counterparts, the effectiveness and
    the capabilities of LLMs are largely determined by the richness of their pre-training
    corpus and the meticulousness of its preprocessing.


    ### Data Acquisition


    The journey to developing a robust LLM begins with the collection of a comprehensive
    natural language corpus, sourced from a wide array of platforms. The diversity
    and volume of data collected from these sources directly influence the model’s
    proficiency.


    **Types of Data Used**


    *   **General Data:** The bulk of pre-training corpora for current LLMs comprises
    general data, which includes content from web pages, books, and dialogues. This
    type of data is preferred due to its vast availability, variety, and the ease
    with which it can be accessed, fostering the model’s ability to understand and
    generate human-like text.


    *   **Specialized Data:** To equip LLMs with the ability to tackle niche problems,
    researchers also incorporate specialized datasets into the training mix. These
    can include datasets rich in multilingual content, scientific literature, and
    programming code, aiming to refine the model’s expertise in specific domains.


    ### What Is Data Preprocessing?


    Data cleansing, often referred to as data preprocessing, stands as a pivotal phase
    within the realms of data analysis and the development of machine learning models.
    This stage is dedicated to the meticulous examination, modification, and rectification
    of raw data to elevate its quality, precision, and uniformity.


    The essence of data cleansing lies in its ability to identify and amend inaccuracies,
    noise, missing elements, duplications, inconsistencies, and other flaws within
    the dataset. This refinement process is imperative to prepare the data for subsequent
    steps in analysis, modeling, and knowledge discovery. The value of a dataset is
    significantly enhanced when it is relevant to the specific objectives of the model,
    exhibits diversity, and maintains a high standard of quality.


    Given the prevalence of challenges such as missing values, duplications, and noise,
    large datasets cannot be employed in their raw form for training sophisticated
    language models. Such datasets necessitate undergoing rigorous cleansing and labeling
    procedures to render them apt for use in training large language models.


    This transformation is crucial for leveraging the full potential of algorithms,
    computational resources, and other technological advancements in the development
    of these models. For instance, the initial dataset for GPT-3 spanned an impressive
    45TB; however, only 570GB of data, representing about 1% of the original volume,
    met the high-quality standards required for inclusion in the training corpus after
    the cleansing process.


    ### Preparing Datasets for Training


    The goal of training language models can differ based on their intended use cases,
    yet there are several crucial practices to adopt to guarantee the training data
    for LLMs is both clean and reliable.


    **These practices encompass**


    *   Managing unwanted data


    *   Deduplication


    *   Decontamination


    *   Toxicity and bias control


    *   Personally identifiable information control


    *   Prompt control


    *   Tokenization and vectorization


    *   Handling of missing data


    *   Data augmentation'
  trans: '

    # Python 库的数据收集、清洗与准备


    大型语言模型（LLM）的有效性在很大程度上可归功于其庞大的规模，因为它们是基于海量数据集开发的。这种广泛的训练使它们能够比受限于数据多样性不足的小型模型更全面地掌握各种主题、体裁和语言。


    指导这一方法的原则很简单：数据越多，性能越好。像 `C4`、`The Pile`、`The Bigscience Roots Corpus` 和 `OpenWebText`
    这样的数据集，通过聚合和精炼来自网络爬虫的大量文本集合，在扩大训练数据量方面发挥了关键作用，旨在增强 LLM 的预训练。


    然而，人工审查和精炼如此庞大数据集的成本高昂，意味着许多数据集存在质量问题。其重要性不仅体现在困惑度和验证损失等技术性能指标上；还意味着模型可能会无意中学习并传播其训练材料中存在的偏见。因此，理解这些数据集的性质和构成不仅是一项技术需求，其本身也是一个研究挑战。


    由于数据是 LLM 发展的基石，理解和编目训练数据集的细节变得至关重要。这对于评估数据在模型预测和决策中的价值至关重要，尤其是因为训练数据的适用性会因应用场景的不同而有很大差异。推荐的策略是记录数据集中潜在的问题方面，而不是试图完全消除它们。


    在机器学习领域，训练数据和测试（评估）数据之间通常存在相似性或一致性。然而，LLM 是在本质上是“原始文本”的数据上进行训练的，这在创建不重叠的训练集、验证集和测试集分割时带来了独特的挑战，尤其是在涉及基准数据集时。


    基于这种理解，让我们来探讨管理训练这些先进模型所需的庞大数据集的方法！


    ## 大型语言模型的数据收集与准备


    大型语言模型（LLM）的基础在于其预训练数据的质量和准备。与较小的模型不同，LLM 的有效性和能力在很大程度上取决于其预训练语料库的丰富程度以及预处理的细致程度。


    ### 数据获取


    开发一个强大的 LLM 始于收集一个全面的自然语言语料库，该语料库来源于各种平台。从这些来源收集的数据的多样性和数量直接影响模型的熟练程度。


    **使用的数据类型**


    - **通用数据：** 当前 LLM 的大部分预训练语料库由通用数据组成，包括来自网页、书籍和对话的内容。这类数据因其广泛的可用性、多样性和易于获取而受到青睐，有助于模型理解和生成类似人类的文本。


    - **专业数据：** 为了使 LLM 具备解决特定问题的能力，研究人员还会将专业数据集纳入训练组合中。这些数据集可以包括富含多语言内容、科学文献和编程代码的数据集，旨在提升模型在特定领域的专业知识。


    ### 什么是数据预处理？


    数据清洗，通常被称为数据预处理，是数据分析和机器学习模型开发领域中的一个关键阶段。这一阶段致力于对原始数据进行细致的检查、修改和纠正，以提升其质量、精确性和一致性。


    数据清洗的本质在于能够识别并修正数据集中的错误、噪声、缺失元素、重复、不一致以及其他缺陷。这个精炼过程对于准备数据以进行后续的分析、建模和知识发现步骤至关重要。当数据集与模型的特定目标相关、具有多样性并保持高质量标准时，其价值会显著提升。


    鉴于缺失值、重复和噪声等挑战普遍存在，大型数据集不能以其原始形式用于训练复杂的语言模型。此类数据集需要经过严格的清洗和标注程序，才能适用于训练大型语言模型。


    这种转换对于在开发这些模型时充分利用算法、计算资源和其他技术进步的潜力至关重要。例如，GPT-3 的初始数据集达到了惊人的 45TB；然而，在清洗过程之后，只有
    570GB 的数据（约占原始数据量的 1%）达到了纳入训练语料库所需的高质量标准。


    ### 准备用于训练的数据集


    语言模型的训练目标可能因其预期用途而异，但有一些关键实践需要采用，以确保 LLM 的训练数据既干净又可靠。


    **这些实践包括**


    - 管理不需要的数据

    - 去重

    - 去污染

    - 毒性和偏见控制

    - 个人身份信息控制

    - 提示控制

    - 分词与向量化

    - 缺失数据处理

    - 数据增强

    '
- fmt: '### Managing Unwanted Data


    Large datasets, despite their extensive size, often contain a significant amount
    of non-useful content, including nonsensical text and standard template material,
    such as HTML code or placeholder text (e.g., Lorem ipsum). When gathering text
    from the Web for the purpose of language model training, particularly for datasets
    that include multiple languages, filtering out this “junk” data is critical. Before
    training a model to predict subsequent tokens based on previous ones, it’s essential
    to purify the dataset of such elements.


    Tools and methods like `justext` and `trafilatura` are effective for eliminating
    standard web page filler while maintaining a balance between minimizing irrelevant
    content (precision) and retaining all pertinent content (recall). Additionally,
    leveraging metadata associated with web content can serve as an effective filter.


    **A simple example with `trafilatura`:**


    ```

    import trafilatura

    def filter_unwanted_data(url, output_file, unwanted_keywords):

    # Download and extract text content from the web page

    downloaded_data = trafilatura.fetch_url(url)

    extracted_text = trafilatura.extract(downloaded_data)

    # Open output file for writing

    with open(output_file, ''w'') as output_f:

    # Filter out unwanted data based on specified keywords

    for line in extracted_text.split(''\n''):

    if not any(keyword in line for keyword in unwanted_keywords):

    output_f.write(line + ''\n'')

    if __name__ == "__main__":

    # Define URL of the web page to extract content from

    url = ''https://example.com''

    # Define output file path

    output_file_path = ''filtered_content.txt''

    # Define list of unwanted keywords

    unwanted_keywords = [''unwanted1'', ''unwanted2'', ''unwanted3'']

    # Call filter_unwanted_data function to filter unwanted data

    filter_unwanted_data(url, output_file_path, unwanted_keywords)

    print("Unwanted data filtered successfully!")

