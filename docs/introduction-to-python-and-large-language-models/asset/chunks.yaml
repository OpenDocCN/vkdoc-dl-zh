    \ type, and arbitrary keys are supported.\n\n*   But The TypedDict allows us to\
    \ describe a structured dictionary where the type of each dictionary value depends\
    \ on the key.\n\n**Example:**\n\n```\nfrom typing import TypedDict, List\nclass\
    \ SalesSummary(TypedDict):\nsales: int\ncountry: str\nproduct_codes: List[str]\n\
    def get_sales_summary() -> SalesSummary:\nreturn {\n\"sales\": 1_000,\n\"country\"\
    : \"UK\",\n\"product_codes\": [\"SUYDT\"],\n}\n```\n\n**TypedDict cannot inherit\
    \ from both a TypedDict type and a non-TypedDict base class.**\n\n#### Required[ ]\
    \ and NotRequired[ ]\n\n**Example:**\n\n```\nfrom typing import TypedDict, NotRequired\n\
    class User(TypedDict):\nname: str\nage: int\nmarried: NotRequired[bool]\nmarie:\
    \ User = {'name': 'Marie', 'age': 29, 'married': True}\nfredrick : User = {'name':\
    \ 'Fredrick', 'age': 17}  # 'married' is not required\n```\n\n**Example:**\n\n\
    ```\nfrom typing import TypedDict, Required\n# 'total=False' means all fields\
    \ are not required by default\nclass User(TypedDict, total=False):\nname: Required[str]\n\
    age: Required[int]\nmarried: bool  # now this is optional\nmarie: User = {'name':\
    \ 'Marie', 'age': 29, 'married': True}\nfredrick : User = {'name': 'Fredrick',\
    \ 'age': 17}  # 'married' is not required\nthomas: User = {'age': 29, 'married':\
    \ True} # Will be highlighted because a key is missing!\n```\n\n**Unary operators\
    \ + / - / ~ as Required/NotRequired example:**\n\n```\nclass MyThing(TypedDict,\
    \ total=False):\nreq1: +int    # + means a required key, or Required[]\nopt1:\
    \ str\nreq2: +float\nclass MyThing(TypedDict):\nreq1: int\nopt1: -str    # - means\
    \ a potentially-missing key, or NotRequired[]\nreq2: float\nclass MyThing(TypedDict):\n\
    req1: int\nopt1: ~str    # ~ means a opposite-of-normal-totality key\nreq2: float\n\
    ```\n\n#### Self Type\n\nPreviously, if you had to define a class method that\
    \ returned an object of the class itself, it would look something like this:\n\
    \n```\nfrom typing import TypeVar\nT = TypeVar('T', bound=type)\nclass Circle:\n\
    def __init__(self, radius: int) -> None:\nself.radius = radius\n@classmethod\n\
    def from_diameter(cls: T, diameter) -> T:\ncircle = cls(radius=diameter/2)\nreturn\
    \ circle\n```\n\nTo be able to say that a method returns the same type as the\
    \ class itself, you had to define a TypeVar and say that the method returns the\
    \ same type T as the current class itself.\n\n#### With Self Type\n\nThanks to\
    \ its straightforward and compact syntax, as specified in PEP 673, the “Self”\
    \ type serves as the recommended annotation for methods returning an instance\
    \ of their class. Starting from Python version 3.11 and onward, you can directly\
    \ import the “Self” type from Python’s “typing” module. For Python versions prior\
    \ to 3.11, you can access the “Self” type via the “typing_extensions” module.\n\
    \n```\nfrom typing import Self\nclass Language:\ndef __init__(self, name, version,\
    \ release_date):\nself.name = name\nself.version = version\nself.release_date\
    \ = release_date\ndef change_version(self, version) -> Self:\nself.version = version\n\
    return Language(self.name, self.version, self.release_date)\nlang = Language(\"\
    Python\", 3.11, \"November\")\nlang.change_version(3.12)\nprint(lang.version)\n\
    ```\n\n**Output:**\n\n```\n3.12\n```\n\n#### Improved Exceptions\n\n##### Better\
    \ Error Messages\n\nUntil now, in a traceback, the only information you got about\
    \ where an exception got raised was the line. In Python 3.11, the exact error\
    \ locations in tracebacks are showed:\n\n```\nTraceback (most recent call last):\n\
    File \"asd.py\", line 15, in \nprint(get_margin(data))\n^^^^^^^^^^^^^^^^\nFile\
    \ \"asd.py\", line 2, in print_margin\nmargin = data['profits']['monthly'] / 10\
    \ + data['profits']['yearly'] / 2\n~~~~~~~~~~~~~~~~~~~~~~~~~~^~~\nTypeError: unsupported\
    \ operand type(s) for /: 'NoneType' and 'int'\n```\n\n##### Exception Notes\n\n\
    Python 3.11 introduces exception notes (PEP 678). Now, inside your except clauses,\
    \ you can call the add_note() function and pass a custom message when you raise\
    \ an error.\n\n**Example:**\n\n```\nimport math\ntry:\nmath.sqrt(-1)\nexcept ValueError\
    \ as e:\ne.add_note(\"Negative value passed! Please try again.\")\nraise\n```\n\
    \n##### Another Way to Add Exception Notes: Define It As an Attribute to a Custom-Defined\
    \ Exception Class\n\n**Example:**\n\n```\nimport math\nclass MyOwnError(Exception):\n\
    __notes__ = [\"This is a custom error!\"]\ntry:\nmath.sqrt(-1)\nexcept:\nraise\
    \ MyOwnError\n```\n\n##### Exception Groups\n\nOne way to think about exception\
    \ groups (Figure [4-1](#613844_1_En_4_Chapter.xhtml#Fig1)) is that they’re regular\
    \ exceptions wrapping several other regular exceptions. However, while exception\
    \ groups behave like regular exceptions in many respects, they also support special\
    \ syntax that helps you handle each of the wrapped exceptions effectively. In\
    \ Python 3.11, we group exceptions with ExceptionGroup().\n\n**Example:**\n\n\
    ```\ndef exceptionGroup():\nexec_gr = ExceptionGroup('ExceptionGroup Message!',\n\
    [FileNotFoundError(\"This File is not found\"),\nValueError(\"Invalid Value Provided\"\
    ),\nZeroDivisionError(\"Trying to divide by 0\")])\nraise exec_gr\n```\n\n![](images/613844_1_En_4_Chapter/613844_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1\n\nGrouped exceptions in Python"
