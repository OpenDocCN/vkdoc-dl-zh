  raw: '### How to Install Python and Your First Python Program


    Installing Python may differ depending on the operating system you are using.
    Therefore, installation instructions for the following operating systems have
    been provided:


    *   Windows


    *   macOS


    *   Linux


    Note


    Python Installation on Different Operating Systems


    *Please note that the installation steps can vary depending on your specific operating
    system and its version. To install Python on your particular platform, follow
    the instructions provided here for your respective operating system.*


    #### Installing Python on Windows


    This section provides a step-by-step guide for installing Python on a Windows
    operating system. Follow these instructions to successfully set up Python on your
    Windows computer:


    **Step 1: Download the Python Installer**


    First, visit the official Python website to procure the latest Python 3.x version
    tailored for Windows. The website will automatically detect your operating system
    and offer the suitable installer (32-bit or 64-bit) for your system.


    **Step 2: Launch the Installer**


    Locate the downloaded installer file, typically found in your Downloads folder,
    and double-click on it to initiate the installation process. You might encounter
    a User Account Control (UAC) prompt asking for permission to proceed. Click “Yes”
    to continue.


    **Step 3: Customize the Installation (Optional)**


    Upon reaching the installer’s welcome screen, you’ll encounter two options: “Install
    Now” and “Customize installation” (Figure [3-1](#613844_1_En_3_Chapter.xhtml#Fig1)).


    > ***If you prefer a default installation, with standard settings, simply click
    “Install Now.”***


    ![](images/613844_1_En_3_Chapter/613844_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Step 1 of the installation process of Python


    For a customized installation where you can modify parameters such as the installation
    directory or select specific components, click “Customize installation” (Figure
    [3-2](#613844_1_En_3_Chapter.xhtml#Fig2)).


    ![](images/613844_1_En_3_Chapter/613844_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Optional features during installation


    **This choice presents the following options:**


    *   **Documentation:** This includes Python’s documentation file alongside the
    installation.


    *   **pip:** This option installs pip, enabling you to install additional Python
    packages as needed.


    *   **Tkinter and IDLE** (tcl/tk and IDLE): This option installs tkinter and IDLE.


    *   **Python test suite:** Selecting this option installs the standard library
    test suite, helpful for testing your code.


    *   **py launcher (for all users):** These options allow you to launch Python
    from the command line.


    **Once you’ve made your selections, click “Next.” A new dialog box with advanced
    options will appear, offering further choices as shown in** **Figure** [**3-3**](#613844_1_En_3_Chapter.xhtml#Fig3)**.**


    ![](images/613844_1_En_3_Chapter/613844_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    First Python program in Python Shell


    ![](images/613844_1_En_3_Chapter/613844_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Advanced options during installation


    *   Install Python 3.11 for all users.


    *   Associate files with Python (requires the “py” launcher).


    *   Create shortcuts for installed applications.


    *   Add Python to environment variables.


    *   Precompile standard library.


    *   Download debugging symbols.


    *   Download debug binaries (requires VS 2017 or later).


    Ensure that the chosen installation directory is correct, then proceed to the
    next step.


    **Step 4: Commence Python Installation**


    After configuring your preferred installation settings, click “Install” to initiate
    the installation procedure. The installer will copy essential files to your computer
    and configure Python. This process may take a few minutes.


    **Step 5: Confirm the Installation**


    Once the installation concludes, confirm that Python has been successfully installed
    by opening the Command Prompt (search for “cmd” in the Start menu) and entering
    the following command:


    ```

    python --version

    ```


    ### Install Python on macOS


    **Step 1: Verify the Existing Python Version on Your macOS**


    Before proceeding with the Python installation on macOS, it’s wise to confirm
    the current Python version on your system. macOS typically includes an older Python
    version (Python 2.x) as a default installation. To determine your system’s Python
    version, access the Terminal app (locate it through Spotlight search or under
    Applications ➤ Utilities). Then, input the following command:


    ```

    python --version

    ```


    Press “Enter,” and the version number will appear in the output, displayed as
    follows:


    ```

    Python 2.7.x

    ```


    If Python 3.x is already installed on your system, you can ascertain its version
    by executing the subsequent command:


    ```

    python3 --version

    ```


    **Step 2: Visit the Python Site and Download the macOS installer**


    Navigate to the download page, where you’ll find the macOS installer package in
    the form of a .pkg file, corresponding to the latest Python release. Proceed to
    download the installer to your computer.


    Locate the installer file you’ve downloaded, typically located in your Downloads
    folder, and double-click it to initiate the installation procedure. Subsequently,
    follow the on-screen instructions as prompted.


    **Step 3: Verify Python and IDLE Are Installed Correctly**


    After the installation process is finished, a folder will open on your desktop.
    Inside this folder, click on the “IDLE” application. IDLE is the stand-alone development
    environment that comes bundled with Python. Upon launching IDLE, the Python shell
    should open automatically.


    **To verify that it’s functioning correctly, you can test it by entering a print
    command as shown here:**


    ```

    print("Test message")

    ```


    Press “Enter,” and you should observe the text “Test message” appearing on the
    subsequent line within the IDLE environment. You can also confirm the installation
    through the Terminal application. Open Terminal and input the following com mand:


    ```

    python3 --version

    ```


    Press “Enter,” and you should see the version of Python that you recently installed
    displayed in the output. This serves as confirmation that Python has been successfully
    installed on your Mac.


    ### Installing Python on Linux – Ubuntu/Debian and Fedora


    **Step 1: Checking for Pre-installed Python**


    To determine whether Python is already installed on your system, open a terminal
    window and execute the following command:


    ```

    python --version

    ```


    **Step 2: Installing Python via Package Manager**


    The most straightforward method to install Python on a Linux system is by utilizing
    the Package Manager that corresponds to your distribution. Here are a couple of
    commonly used commands for popular distributions:


    **For Ubuntu/Debian, use**


    ```

    sudo apt-get install python3

    ```


    **For Fedora, execute**


    ```

    sudo dnf install python3

    ```


    These commands will help you effortlessly install Python on your Linux distribution
    using the respective Package Manager.'
