    ### Feedforward Layers


    Feedforward layers in a neural network are layers where the connections between
    nodes do not form cycles. Each node in one layer connects only to nodes in the
    next layer, allowing information to flow in one direction `–` from input to output.
    This structure is fundamental in neural networks for tasks like classification
    and regression.


    #### What Is a Feedforward Neural Network?


    A **feedforward neural network** (or, as they are often called, “FFNs”) stands
    as one of the simplest types of artificial neural networks, characterized by the
    unidirectional flow of data from input to output nodes, traversing through hidden
    nodes without any cycles or loops. This straightforward design distinguishes it
    from more complex networks such as recurrent neural networks (RNNs) and convolutional
    neural networks (CNNs), due to its absence of feedback loops, making it easier
    to build.


    Its architecture is structured around three main components: **input layers, hidden
    layers, and output layers**. Each layer is composed of units known as neurons,
    with each neuron in one layer fully connected to neurons in the subsequent layer
    through weighted connections.


    In operation, neurons in the input layer receive data and pass it forward. The
    number of neurons in the input layer matches the size of the input data. The hidden
    layers, situated between the input and output, perform computations while remaining
    hidden from both the input and output.


    Neurons within these layers calculate a weighted sum from the preceding layer’s
    outputs, apply an activation function to introduce nonlinearity, and forward the
    result onward. This process is iterative until the output layer is reached, which
    then generates the network’s final output. The connectivity between neurons across
    layers renders feedforward neural networks fully connected, with weights symbolizing
    the connection strength that the network adjusts during learning to minimize output
    errors.


    The operation of feedforward neural networks unfolds in two critical phases: **the
    feedforward and the backpropagation phases**.


    #### Feedforward Phase


    During this phase, the network processes the input by advancing it through the
    layers. Hidden layers calculate the weighted sum of inputs and then apply an activation
    function (e.g., ReLU, Sigmoid, TanH) to incorporate nonlinearity, continually
    forwarding the data until the output layer is reached and a prediction is made.


    #### Backpropagation Phase


    Following a prediction, the network evaluates the discrepancy between the actual
    output and the expected output. This error is then propagated backward through
    the network. To reduce the error, the network employs a **gradient descent optimization
    technique**, adjusting the weights across connections accordingly.'
  trans: '

    ### 阶段 1：节点


    初始阶段涉及建立一系列节点，这些节点分组在一个“隐藏层”中（图 5-3）。每个节点通过加权连接与一个输入词相关联。节点分为两个部分。第一部分聚合来自每个词的加权输入。这个聚合后的总和随后被传递到第二部分，即激活函数。激活函数的作用是根据其特定过程确定节点的输出。在此场景中，激活函数充当简单的恒等函数，保持输入不变。


    如前所述，节点的总数决定了向量的维度。这意味着它设定了分配给每个输入词的数字（或向量分量）的数量。通常，在实际应用中，节点的数量从几十到几百不等。


    数据集中的每个词都以特定的权重输入到每个节点中，旨在帮助模型学习词之间的关系，同时不增加系统的复杂性。


    ![](img/613844_1_En_5_Fig3_HTML.jpg)


    图 5-3


    输入词通过神经网络中的隐藏层进行处理（来源：[*http://medium.com*](http://medium.com)）


    在初始阶段，如上所述，每个词通过加权连接与节点相连，表示为（`w₁`，`w₂`，... `w[n]`）。这些权重最初由模型设置为随机值，以启动学习过程。目标是通过多次迭代调整和优化这些权重，以提高模型的准确性。当然，直接对字符串（词）和数字进行乘法等数学运算并不可行。因此，采用了一种二进制方法，将词编码为
    0 或 1。具体来说，紧邻待预测目标词之前的词被赋值为 1。


    ### 阶段 2：返回至词


    在第二阶段，每个节点生成的输出被分配回各个词（图 5-4），使用的是随机分配的权重。


    ![](img/613844_1_En_5_Fig4_HTML.jpg)


    图 5-4


    详细的神经网络图，重点展示隐藏层，并包含连接的特定权重


    ### 阶段 3：实现 Softmax 层


    在第三阶段，我们在模型中引入一个 softmax 层。该层作为一种激活机制，主要用于多分类场景的最终输出层。Softmax 层（图 5-5）的目的是将一系列数值转换为概率分布。它处理与每个类别（在我们的上下文中是每个词）相关联的数值，执行计算，并为每个类别生成一个概率分数。与之前可能使用随机分配权重的层不同，softmax
    层使用特定的公式进行操作。


    该函数处理一个输入向量，对其中的每个元素应用其公式。例如，给定一个输入向量如 `[3, 5, 7]`，softmax 层会输出一个向量如 `[0.016,
    0.117, 0.867]`，其中输出向量的元素之和等于 1，表示一个概率分布。


    ![](img/613844_1_En_5_Fig5_HTML.jpg)


    图 5-5


    Softmax 函数计算


    ### 前馈层


    神经网络中的前馈层是指节点之间的连接不形成循环的层。一层中的每个节点仅连接到下一层的节点，允许信息单向流动——从输入到输出。这种结构是神经网络中用于分类和回归等任务的基础。


    #### 什么是前馈神经网络？


    前馈神经网络（通常称为“FFN”）是最简单的人工神经网络类型之一，其特点是数据从输入节点到输出节点单向流动，经过隐藏节点，没有任何循环或回路。这种简单的设计使其区别于更复杂的网络，如循环神经网络（RNN）和卷积神经网络（CNN），因为它没有反馈回路，所以更容易构建。


    其架构围绕三个主要组成部分构建：输入层、隐藏层和输出层。每一层由称为神经元的单元组成，一层中的每个神经元通过加权连接与下一层中的神经元完全连接。


    在操作中，输入层的神经元接收数据并将其向前传递。输入层中神经元的数量与输入数据的大小相匹配。位于输入和输出之间的隐藏层执行计算，同时对输入和输出保持隐藏。


    这些层中的神经元计算来自前一层输出的加权和，应用激活函数引入非线性，并将结果向前传递。这个过程是迭代的，直到到达输出层，然后生成网络的最终输出。跨层的神经元之间的连接使得前馈神经网络完全连接，权重象征着连接强度，网络在学习过程中调整权重以最小化输出误差。


    前馈神经网络的操作分为两个关键阶段：前馈阶段和反向传播阶段。


    #### 前馈阶段


    在此阶段，网络通过将输入逐层推进来处理输入。隐藏层计算输入的加权和，然后应用激活函数（例如，`ReLU`、`Sigmoid`、`TanH`）来引入非线性，持续向前传递数据，直到到达输出层并做出预测。


    #### 反向传播阶段


    在做出预测之后，网络评估实际输出与预期输出之间的差异。然后，这个误差通过网络向后传播。为了减少误差，网络采用梯度下降优化技术，相应地调整连接上的权重。

    '
- fmt: '# LLMs and Feedforward Layers


    Large language models include feedforward layers, which are composed of multiple
    interconnected layers that execute nonlinear transformations on the input data.
    This structure helps the model to recognize and assimilate complex patterns hidden
    in the input text, enhancing its comprehension of the material. These layers assist
    the model in interpreting the user’s intended message in the text by extracting
    more complex concepts.


    In a feedforward network (Figure [5-6](#613844_1_En_5_Chapter.xhtml#Fig6)), the
    system processes each word vector independently, aiming to forecast the subsequent
    word without any interaction between words at this point. The feedforward layer
    examines each word separately but can utilize any data previously captured by
    an attention mechanism. The architecture of the feedforward layer within GPT-3’s
    most extensive model is designed to function in this manner.


    ![](images/613844_1_En_5_Chapter/613844_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Feedforward neural network


    The colored circles represent neurons, which are essentially mathematical functions
    calculating a weighted sum of their inputs. The strength of the feedforward layer
    lies in its extensive network of connections. Although illustrated with a modest
    number of neurons, the actual scale in GPT-3’s feedforward layers is vastly larger,
    featuring 12,288 neurons in the output layer to match its 12,288-dimensional word
    vectors, and a staggering 49,152 neurons in the hidden layer.


    In GPT-3’s most comprehensive version, the hidden layer alone comprises 49,152
    neurons, each receiving 12,288 inputs, equating to the same number of weight parameters
    per neuron. The output layer contains 12,288 neurons, each with 49,152 inputs,
    resulting in 49,152 weight parameters per neuron. This configuration results in
    over 1.2 billion weight parameters per feedforward layer, and with 96 such layers,
    the total parameter count reaches 116 billion. This massive number represents
    nearly two-thirds of GPT-3’s total parameter count of 175 billion.


    Research by Tel Aviv University in 2020^([^(39)](#fn39)) revealed that feedforward
    layers function through pattern recognition: each neuron in the hidden layer identifies
    specific patterns within the input text. For instance, in a 16-layer GPT-2 model,
    neurons were found to recognize patterns ranging from word sequences ending with
    "substitutes" to those pertaining to military bases, time intervals, and television
    shows, showcasing an increase in the abstraction level of recognized patterns
    across layers. Early layers pinpointed specific words, while deeper layers identified
    phrases within broader semantic fields.


    This insight is particularly fascinating given that the feedforward layer processes
    each word individually. For example, when identifying a phrase as television related,
    it relies on the vector for "archived" without direct access to associated words
    like "NBC" or "daytime". This suggests that attention mechanisms preceding the
    feedforward layer integrate contextual information into the vector, enabling pattern
    recognition.


    Upon recognizing a pattern, a neuron enriches the word vector with additional
    information, which, while sometimes abstract, can often hint at a probable following
    word.


    ## Recurrent Layers


    The last layer of large language models (LLMs) is known as the recurrent layer.
    This layer is responsible for understanding the words in the input text sequence,
    enabling it to grasp the connections among various words within the sequence presented
    in user prompts.


    Recurrent layers in large language models (LLMs) are pivotal for processing sequential
    data, particularly in the domain of natural language processing (NLP). These layers
    enable LLMs to handle temporal dependencies and contextual nuances in text data,
    leveraging the sequential nature of language.


    ### Here’s a Closer Look at How Recurrent Layers Function Within LLMs


    #### Sequential Data Processing


    Unlike feedforward layers that process inputs independently, recurrent layers
    are adept at handling sequential data. They achieve this by looping through each
    element of the input sequence, carrying forward a state that contains information
    about previously seen elements. This state acts as a memory that influences the
    processing of future elements, allowing the model to consider the context of earlier
    words when interpreting the current word.


    ##### Hidden States


    At the core of a recurrent layer is the hidden state, which is updated at each
    step of the sequence. When a new input is received, the recurrent layer combines
    it with the existing hidden state to produce a new hidden state. This mechanism
    enables the model to accumulate knowledge about the entire sequence up to the
    current point, which is essential for understanding the structure and meaning
    of the text.


    #### Backpropagation Through Time


    Training recurrent layers involves a technique known as backpropagation through
    time (BPTT). This method unfolds the recurrent network across each time step,
    treating it as a deep feedforward network where each layer corresponds to a time
    step in the sequence. BPTT allows the model to learn long-term dependencies by
    adjusting weights based on the gradient of the loss function, which considers
    the performance of the model across the entire sequence.


    #### Challenges and Solutions


    One challenge with recurrent layers is the difficulty in learning long-term dependencies
    due to issues like vanishing and exploding gradients. LLMs often incorporate advanced
    variants of recurrent layers, such as Long Short-Term Memory (LSTM) units or Gated
    Recurrent Units (GRUs), to mitigate these problems. These variants introduce gates
    that regulate the flow of information, making it easier to remember or forget
    certain information, thereby enhancing the model’s ability to learn from long
    sequences.


    In the context of LLMs, recurrent layers contribute to tasks like text generation,
    translation, and sentiment analysis by providing a nuanced understanding of the
    sequence’s context. They enable the model to generate coherent and contextually
    relevant text by remembering what has been said previously and using that information
    to influence what comes next.


    The components of the architecture of LLMs also emphasize the significance of
    the attention mechanism. Large language models (LLMs) employ this mechanism to
    concentrate on specific segments of the input text that are pertinent to the task
    at hand. The inclusion of a self-attention mechanism layer aids the model in producing
    outputs of higher precision.'
