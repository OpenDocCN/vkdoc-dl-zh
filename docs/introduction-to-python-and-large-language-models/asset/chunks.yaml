- fmt: '### Guanaco-65B


    `Guanaco`，一个大型语言模型（LLM），采用了一种名为`LoRA`的微调技术，由华盛顿大学自然语言处理组的`Tim Dettmers`及其同事创建。该方法利用`QLoRA`，能够在48GB
    GPU上微调多达650亿参数的模型，且性能与16位模型相当，无退化。


    `Guanaco`系列模型在`Vicuna`基准测试中超越了所有先前模型的性能。然而，由于其基于`LLaMA`模型家族，其在商业环境中的使用受到限制。


    `QLoRA`是一种突破性的微调技术，旨在显著降低内存需求，使得在单个48GB GPU上微调多达650亿参数的模型成为可能，同时不牺牲16位微调任务的质量。该方法创新性地将梯度反向传播通过一个静态量化的4位预训练语言模型，导向低秩适配器（`LoRA`）。


    名为`Guanaco`的顶级模型套件树立了新标准，在`Vicuna`基准测试中超越了所有先前可用的模型，仅通过在单个GPU上微调24小时就达到了`ChatGPT`性能的99.3%。`QLoRA`的内存效率通过几项关键创新实现：引入了`4-bit
    NormalFloat`（`NF4`），一种针对正态分布权重的最优高效数据类型；`Double Quantization`，通过量化量化常数进一步降低内存需求；以及`Paged
    Optimizers`，旨在平滑内存使用峰值。


    ### Orca


    微软研究院发布了`Orca 2`，这是`LLaMA 2`语言模型的进阶版本，其性能与参数数量十倍于它的模型相当甚至更优。这一效率飞跃归功于一种新颖的训练方法，涉及合成数据集和一种称为`Prompt
    Erasure`的技术。


    在`Orca 2`的开发中，采用了教师-学生学习框架，其中更大、更熟练的语言模型（教师）引导更小、更简单的模型（学生）达到与显著更大的模型相媲美的性能水平。


    这种方法允许较小的模型学习各种推理策略，并为任何给定问题选择最合适的策略。教师模型使用复杂提示来引发特定的推理行为，但通过`Prompt Erasure`，这些提示不会传递给学生模型。相反，学生模型仅接收任务规范和预期结果。


    这种方法使得一个130亿参数的`Orca 2`模型在基准测试中比同等规模的`LLaMA 2`模型高出47.54%。此外，70亿参数版本的`Orca 2`在推理任务中表现“优于或相当于”700亿参数的`LLaMA
    2`。


    ### StableLM


    `Stability AI`推出了`StableLM`，标志着在机器学习领域增强语言理解方面迈出了重要一步。此次发布包含两个版本的`StableLM`，一个配备30亿参数，另一个配备70亿参数。


    `StableLM`的alpha版本邀请用户探索和评估模型性能，提供有助于完善其能力的见解。`Stability AI`正准备推出另外两个模型，分别拥有150亿和650亿参数，以进一步推动语言处理能力的边界。


    `StableLM`作为一个自回归模型运行，擅长识别语言模式并根据提供的输入生成响应。它包含一个可靠预测后续标记的基础模型，以及一个经过微调以遵循明确指令的更专门化模型。此微调过程利用了多种数据集，如`Alpaca`、`GPT4All`、`Dolly`和`HH`，增强了模型在提供定制化响应和指令方面的能力。


    `StableLM`的设计使其能够适应各种上下文和语言风格，使其成为广泛语言处理和生成任务的灵活工具。


    `Stability AI`推出的`StableLM`因其对自然语言处理领域的贡献而值得关注，特别是由于该模型透明的架构和训练方法。这种开放性使其与竞争模型区分开来，鼓励开发和创新社区扩展和完善`Stability
    AI`的产品，从而促进该领域的协作进步。


    此外，`Stability AI`致力于拓宽语言模型的可访问性。通过创建能够在消费级硬件（如智能手机和个人电脑）上运行的模型，`Stability AI`正在使先进的语言处理工具民主化。这一举措不仅拓宽了潜在应用的范围，还使个人和小型实体能够使用最先进的语言模型进行各种用途。


    ### Palmyra


    `Palmyra Base`的主要训练阶段侧重于英语文本，尽管其训练数据集中也包含来自`Common Crawl`的一小部分非英语内容。`Palmyra Base`采用因果语言建模（CLM）策略进行预训练，与`GPT-3`等模型一致，其架构中仅包含解码器组件。这种以自监督因果语言建模为核心的训练方法，与`GPT-3`类似，包括使用类似的提示和实验框架进行评估。


    `Palmyra Base`以其卓越的速度和能力脱颖而出，在多种复杂任务中表现出色，包括情感分析和内容摘要。


    模型`Palmyra Base (5b)`是使用`Writer`策划的专有数据集开发的。


    `Palmyra Base`旨在内化和表示英语，使其成为提取适用于一系列下游应用的特征的宝贵工具。然而，其主要优势在于基于提示的文本生成，这是其最初设计和训练的任务。'
  raw: '### Guanaco-65B


    Guanaco, a large language model (LLM), employs a fine-tuning technique known as
    LoRA, created by Tim Dettmers and colleagues within the University of Washington’s
    Natural Language Processing group. Leveraging QLoRA, this approach enables the
    fine-tuning of models with as many as 65 billion parameters on a 48GB GPU, matching
    the performance of 16-bit models without degradation.


    The Guanaco series of models surpasses the performance of all prior models on
    the Vicuna benchmark. However, due to their foundation on the LLaMA model family,
    their use in commercial settings is restricted.


    QLoRA is a groundbreaking fine-tuning technique designed to significantly reduce
    memory requirements, enabling the fine-tuning of models with up to 65 billion
    parameters on a single 48GB GPU without compromising the quality of 16-bit fine-tuning
    tasks. This method innovatively directs gradient backpropagation through a statically
    quantized, 4-bit version of a pre-trained language model into Low Rank Adapters
    (LoRA).


    The premier model suite, dubbed Guanaco, sets a new standard by outshining all
    previously available models on the Vicuna benchmark, achieving 99.3% of ChatGPT’s
    performance with just 24 hours of fine-tuning on a solitary GPU. QLoRA’s memory
    efficiency is achieved through several key innovations: the introduction of 4-bit
    NormalFloat (NF4), an optimally efficient data type for normally distributed weights;
    Double Quantization, which further reduces memory demands by quantizing quantization
    constants; and Paged Optimizers, designed to smooth out memory usage spikes.


    ### Orca


    Microsoft Research unveiled Orca 2, an advanced version of the LLaMA 2 language
    model, demonstrating performance on par with or surpassing models with ten times
    its parameter count. This leap in efficiency is attributed to a novel training
    approach involving a synthetic dataset and a technique known as Prompt Erasure.


    In the development of Orca 2, a teacher-student learning framework is employed,
    where a larger, more adept language model (the teacher) guides a smaller, less
    complex model (the student) toward achieving performance levels akin to those
    of significantly larger counterparts.


    This method allows the smaller model to learn various reasoning strategies and
    select the most suitable one for any given problem. The teacher model uses complex
    prompts to elicit specific reasoning behaviors, but with Prompt Erasure, these
    prompts are not passed to the student model. Instead, the student model receives
    only the task specifications and the expected outcome.


    This approach enabled a 13-billion-parameter Orca 2 model to outshine a similarly
    sized LLaMA 2 model by 47.54% in benchmark tests. Moreover, the 7-billion-parameter
    version of Orca 2 was found to perform on a level “better or comparable” to a
    70-billion-parameter LLaMA 2, particularly in reasoning tasks.


    ### StableLM


    Stability AI has introduced StableLM, marking a significant step forward in enhancing
    language comprehension within the realm of machine learning. The launch features
    two versions of StableLM, one equipped with 3 billion parameters and the other
    with 7 billion parameters.


    The alpha release of StableLM invites users to explore and evaluate the model’s
    performance, offering insights that will aid in refining its capabilities. Stability
    AI is gearing up to unveil two additional models, boasting 15 billion and 65 billion
    parameters, to further push the boundaries of language processing capabilities.


    StableLM functions as a self-regressive model, adept at recognizing language patterns
    and crafting responses based on provided inputs. It comprises a foundational model
    that reliably predicts subsequent tokens and a more specialized model fine-tuned
    to adhere to explicit instructions. This fine-tuning process utilizes diverse
    datasets like Alpaca, GPT4All, Dolly, and HH, enhancing the model’s proficiency
    in delivering customized responses and instructions.


    The design of StableLM enables it to adjust to various contexts and linguistic
    styles, positioning it as a flexible asset for a wide array of language processing
    and generation tasks.


    The unveiling of StableLM by Stability AI is noteworthy for its contribution to
    the natural language processing domain, particularly due to the model’s transparent
    architecture and training approach. This openness sets it apart from competing
    models, encouraging the development and innovation community to expand and refine
    Stability AI’s offerings, thereby promoting collaborative progress in the field.


    Additionally, Stability AI is committed to broadening the accessibility of language
    models. By creating models capable of operating on consumer-grade hardware, such
    as smartphones and PCs, Stability AI is democratizing access to sophisticated
    language processing tools. This move not only widens the scope of potential applications
    but also empowers individuals and smaller entities to employ state-of-the-art
    language models for a variety of uses.


    ### Palmyra


    Palmyra Base underwent its primary training phase focusing on English language
    texts, although a small proportion of non-English content from Common Crawl was
    also included in its training dataset. Employing a causal language modeling (CLM)
    strategy for pretraining, Palmyra Base aligns with models like GPT-3 by incorporating
    only a decoder component in its architecture. This approach to training, centered
    on self-supervised causal language modeling, mirrors that of GPT-3, including
    the use of similar prompts and experimental frameworks for evaluation.


    Palmyra Base distinguishes itself through its remarkable speed and capability,
    proving adept across a variety of sophisticated tasks, including sentiment analysis
    and content summarization.


    The model, Palmyra Base (5b), was developed using a proprietary dataset curated
    by Writer.


    Palmyra Base is engineered to internalize and represent the English language,
    making it a valuable tool for deriving features applicable to a range of downstream
    applications. Nonetheless, its primary strength lies in text generation based
    on prompts, the task for which it was originally designed and trained.'
