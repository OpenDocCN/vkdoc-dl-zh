    #### 抓取用户提供的文章


    首先，我们来收集一些关于人工智能新闻的文章。我们的重点是获取每篇文章的文本内容及其对应的发布网址。


    在代码中，你将看到以下组成部分：


    1.  **导入模块：** 我们首先导入必要的 Python 库。`requests` 用于发送 HTTP 请求，`newspaper` 在从网页中提取和组织文章方面非常有用，而
    `time` 则帮助我们在网络抓取过程中加入暂停。


    2.  **请求头：** 某些网站可能会屏蔽缺少正确 `User-Agent` 请求头的请求，将其视为机器人活动。因此，我们定义一个 `User-Agent`
    字符串来模拟真实的浏览器请求。


    3.  **文章网址：** 一系列在线文章的网址列表。


    4.  **网络抓取：** 通过 `requests.Session()` 建立一个 HTTP 会话，使我们能够在同一会话中执行多个请求。此外，我们初始化一个空列表
    `pages_content`，用于存储抓取到的文章。


    ```python

    import requests

    from newspaper import Article # https://github.com/codelucas/newspaper

    import time

    headers = {

    ''User-Agent'': ''Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
    (KHTML, like Gecko) Chrome/89.0.4389.82 Safari/537.36''

    }

    article_urls = [

    "https://www.site.com/2023/05/16/page-one/",

    "https://www.site.com/2023/05/16/page-two/",

    "https://www.site.com/2023/05/16/page-three/",

    添加你的网址…

    ]

    session = requests.Session()

    pages_content = [] # 用于保存抓取的文章

    for url in article_urls:

    try:

    time.sleep(2) # 暂停两秒以实现温和抓取

    response = session.get(url, headers=headers, timeout=10)

    if response.status_code == 200:

    article = Article(url)

    article.download()

    article.parse()

    pages_content.append({ "url": url, "text": article.text })

    else:

    print(f"获取文章失败：{url}")

    except Exception as e:

    print(f"获取文章时出错：{url}: {e}")

    ```


    接下来，我们将使用一个嵌入模型来计算文档的嵌入向量，并将其保存到 Deep Lake（一个能够处理多模态向量的数据库）中。`OpenAIEmbeddings`
    将作为生成文档向量表示的工具。


    这些嵌入向量由高维向量组成，能够很好地封装文档的语义本质。在初始化 Deep Lake 类的实例时，我们提供一个以 `hub://...` 开头的路径，用于指定数据库名称，该数据库随后将托管在云端。


    ```python

    from langchain.embeddings.openai import OpenAIEmbeddings

    from langchain.vectorstores import DeepLake

    embeddings = OpenAIEmbeddings(model="text-embedding-ada-002")

    my_activeloop_org_id = "你的组织 ID - 通常是你的用户名"

    my_activeloop_dataset_name = "qabot_with_source"

    dataset_path = f"hub://{my_activeloop_org_id}/{my_activeloop_dataset_name}"

    db = DeepLake(dataset_path=dataset_path, embedding=embeddings)

    ```


    这一部分对于配置系统以根据语义内容存储和检索文档至关重要。这种功能是后续阶段的关键，其目标是找出最相关的文档来回答用户的问题。


    随后，我们将把这些文章分割成更小的片段，每个片段对应的网址将作为参考点保存下来。这种分割有助于简化数据处理，使检索任务更易于管理，并在回答问题时将注意力集中在最相关的文本片段上。


    `RecursiveCharacterTextSplitter` 被实例化，其块大小为 1000 个字符，相邻块之间有 100 个字符的重叠。`chunk_size`
    参数定义了每个文本片段的长度，而 `chunk_overlap` 则指定了相邻片段之间共享的字符数。对于 `pages_content` 中的每个文档，文本都使用
    `.split_text()` 方法进行分割。


    ```python

    from langchain.text_splitter import RecursiveCharacterTextSplitter

    text_splitter = RecursiveCharacterTextSplitter(chunk_size=1000, chunk_overlap=100)

    all_texts, all_metadatas = [], []

    for d in pages_content:

    chunks = text_splitter.split_text(d["text"])

    for chunk in chunks:

    all_texts.append(chunk)

    all_metadatas.append({ "source": d["url"] })

    ```


    在元数据字典中，我们使用 `source` 键来符合 `RetrievalQAWithSourcesChain` 类的预期，该类会自动从元数据中检索这个 `source`
    项。随后，我们将这些分割后的块及其对应的元数据添加到 Deep Lake 数据库中。


    ```python

    db.add_texts(all_texts, all_metadatas)

    ```


    让我们进入构建问答聊天机器人的激动人心的阶段。我们将着手开发一个 `RetrievalQAWithSourcesChain`，这是一个不仅能够检索相关文档片段来回答问题，还能记录这些文档来源的链。


    ##### 启动链的设置


    首先，我们使用 `from_chain_type` 方法实例化一个 `RetrievalQAWithSourcesChain`。该方法需要以下参数：


    1.  `LLM`：此参数需要一个模型实例，例如 GPT-3，其温度为 0。温度参数控制模型输出的随机程度——温度越高，随机性越大；温度越低，输出越确定。


    2.  `chain_type="stuff"`：此参数定义了所使用的链的类型，影响模型如何处理检索到的文档并生成响应。


    3.  `retriever=db.as_retriever()`：此步骤建立了负责从 Deep Lake 数据库中获取相关文档的检索器。在这里，Deep
    Lake 数据库实例（称为 `db`）通过其 `as_retriever` 方法被转换为检索器。


    ```python

    from langchain.chains import RetrievalQAWithSourcesChain

    from langchain import OpenAI

    llm = OpenAI(model_name="gpt-3.5-turbo-instruct", temperature=0)

    chain = RetrievalQAWithSourcesChain.from_chain_type(llm=llm,

    chain_type="stuff",

    retriever=db.as_retriever())

    ```


    最后，我们将使用这个链来生成对问题的回答。这个响应将包含问题的答案及其相关来源。


    ```python

    d_response = chain({"question": "杰弗里·辛顿对近期人工智能趋势有何看法？"})

    print("响应：")

    print(d_response["answer"])

    print("来源：")

    for source in d_response["sources"].split(", "):

    print("- " + source)

    ```

