    recently with desktop publishing software like Aldus PageMaker including versions
    of Lorem Ipsum.

    ```


    **The following modes are supported:**


    *   `r`: Opens an existing file for reading.


    *   `w`: Opens an existing file for writing. If the file already contains data,
    it will be overwritten. If the file doesn’t exist, it will be created.


    *   `a`: Opens an existing file for append operation. It won’t overwrite existing
    data.


    *   `r+`: Allows reading and writing data into the file. Existing data in the
    file will be overwritten.


    *   `w+`: Enables writing and reading data. It will overwrite existing data.


    *   `a+`: Permits appending and reading data from the file. It won’t overwrite
    existing data.


    #### Working in Read Mode


    There are multiple approaches to reading from a file in Python. Let’s explore
    how we can retrieve the contents of a file when it’s opened in read mode.


    **In the following example, we’ll open the file test.txt with the following content:**


    *Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem
    Ipsum has been the industry’s standard dummy text ever since the 1500s, when an
    unknown printer took a galley of type and scrambled it to make a type specimen
    book. It has survived not only five centuries, but also the leap into electronic
    typesetting, remaining essentially unchanged. It was popularised in the 1960s
    with the release of Letraset sheets containing Lorem Ipsum passages, and more
    recently with desktop publishing software like Aldus PageMaker including versions
    of Lorem Ipsum.*


    **Example:**


    ```

    # Open a file named "test.txt" in reading mode (''r'')

    file = open(''test.txt'', ''r'')

    # Print each line from the file one by one

    for line in file:

    print(line, end='''')  # Print each line without adding extra newlines

    # Close the file

    file.close()

    ```


    **Output:**


    ```

    Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem
    Ipsum has been the industry''s standard dummy text ever since the 1500s, when
    an unknown printer took a galley of type and scrambled it to make a type specimen
    book. It has survived not only five centuries, but also the leap into electronic
    typesetting, remaining essentially unchanged. It was popularised in the 1960s
    with the release of Letraset sheets containing Lorem Ipsum passages, and more
    recently with desktop publishing software like Aldus PageMaker including versions
    of Lorem Ipsum.

    ```


    **Example:**


    ```

    # Python code to demonstrate the read() mode

    file = open("test.txt", "r")

    print (file.read())

    ```


    **Output:**


    ```

    Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem
    Ipsum has been the industry''s standard dummy text ever since the 1500s, when
    an unknown printer took a galley of type and scrambled it to make a type specimen
    book. It has survived not only five centuries, but also the leap into electronic
    typesetting, remaining essentially unchanged. It was popularised in the 1960s
    with the release of Letraset sheets containing Lorem Ipsum passages, and more
    recently with desktop publishing software like Aldus PageMaker including versions
    of Lorem Ipsum.

    ```


    **Example:**


    ```

    # Python code to illustrate with()

    with open("geeks.txt") as file:

    data = file.read()

    print(data)

    ```


    **Output:**


    ```

    Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem
    Ipsum has been the industry''s standard dummy text ever since the 1500s, when
    an unknown printer took a galley of type and scrambled it to make a type specimen
    book. It has survived not only five centuries, but also the leap into electronic
    typesetting, remaining essentially unchanged. It was popularized in the 1960s
    with the release of Letraset sheets containing Lorem Ipsum passages, and more
    recently with desktop publishing software like Aldus PageMaker including versions
    of Lorem Ipsum.

    ```


    In Python, it’s possible to split lines while reading files. The split() function
    is used to divide a string into parts when a space is encountered by default.
    However, you can customize the splitting character to be any character of your
    choice.


    **Example:**


    ```

    # Python code to illustrate split() function

    with open("test.txt", "r") as file:

    data = file.readlines()

    for line in data:

    word = line.split()

    print (word)

    ```


    **Output:**


    ```

    [''Lorem'', ''Ipsum'', ''is'', ''simply'', ''dummy'', ''text'', ''of'', ''the'',
    ''printing'', ''and'', ''typesetting'', ''industry.'', ''Lorem'', ''Ipsum'', ''has'',
