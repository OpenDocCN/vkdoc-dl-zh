    ```\n\n**Output:**\n\n```\nOriginal DataFrame:\n   Feature1  Feature2  Feature3\n\
    0       1.0       NaN       1.0\n1       2.0       2.0       NaN\n2       NaN\
    \       3.0       3.0\n3       4.0       4.0       4.0\n\nDataFrame after removing\
