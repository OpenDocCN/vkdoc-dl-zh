  此应用是上一章中使用 OpenAI GPT-3.5 模型进行在线文章摘要应用的扩展版本。在使用之前，你需要安装以下软件包：


  *   `Langchain==0.1.4`

  *   `deeplake==3.9.11`

  *   `Openai==1.10.0`

  *   `Tiktoken==0.7.0`

