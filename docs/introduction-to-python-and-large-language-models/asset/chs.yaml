  \ | 将表达式右侧的值赋给左侧操作数 | `x = y + z` |\n| `+=` | 加后赋值：将右侧操作数与左侧操作数相加，然后赋值给左侧操作数 | `a+=b`\
  \ `a=a+b` |\n| `-=` | 减后赋值：从左侧操作数中减去右侧操作数，然后赋值给左侧操作数 | `a-=b` `a=a-b` |\n| `*=`\
  \ | 乘后赋值：将右侧操作数与左侧操作数相乘，然后赋值给左侧操作数 | `a*=b` `a=a*b` |\n| `/=` | 除后赋值：将左侧操作数除以右侧操作数，然后赋值给左侧操作数\
  \ | `a/=b` `a=a/b` |\n| `%=` | 取模后赋值：使用左右操作数取模，并将结果赋值给左侧操作数 | `a%=b` `a=a%b` |\n\
  | `//=` | 向下取整除后赋值：将左侧操作数除以右侧操作数，然后将值（向下取整）赋值给左侧操作数 | `a//=b` `a=a//b` |\n| `**=`\
  \ | 幂运算后赋值：使用操作数计算指数（幂）值，并将值赋值给左侧操作数 | `a**=b` `a=a**b` |\n| `&=` | 对操作数执行按位与运算，并将值赋值给左侧操作数\
  \ | `a&=b` `a=a&b` |\n| `|=` | 对操作数执行按位或运算，并将值赋值给左侧操作数 | `a|=b` `a=a|b` |\n| `^=`\
  \ | 对操作数执行按位异或运算，并将值赋值给左侧操作数 | `a^=b` `a=a^b` |\n| `>>=` | 对操作数执行按位右移运算，并将值赋值给左侧操作数\
  \ | `a>>=b` `a=a>>b` |\n| `<<=` | 对操作数执行按位左移运算，并将值赋值给左侧操作数 | `a <<= b` `a= a <<\
  \ b` |\n\n**示例：**\n\n```\n>>> a = 10\n>>> b = a\n>>> print(b)\n>>> b += a\n>>> print(b)\n\
  >>> b -= a\n>>> print(b)\n>>> b *= a\n>>> print(b)\n>>> b >>= a\n>>> print(b)\n\
  ```\n\n#### 身份运算符\n\n在 Python 中，`is` 和 `is not` 是身份运算符，用于验证两个值是否占用相同的内存位置，如表 3-8\
  \ 所示。需要注意的是，两个变量相等并不一定意味着它们相同。\n\n**表 3-8** 身份运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n\
  | `is` | 如果操作数相同，则为 `True` |\n| `is not` | 如果操作数不相同，则为 `True` |\n\n**示例：**\n\n```\n\
  >>> a = 10\n>>> b = 20\n>>> c = a\n>>> print(a is not b)\nTrue\n>>> print(a is c)\n\
  True\n```\n\n#### 成员运算符\n\n在 Python 中，`in` 和 `not in` 运算符被归类为成员运算符（表 3-9），其主要功能是评估特定值或变量是否存在于给定的序列中。\n\
  \n**表 3-9** 成员运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| `in` | 如果在序列中找到该值，则为 `True`\
  \ |\n| `not in` | 如果在序列中未找到该值，则为 `True` |\n\n**示例：**\n\n```\n>>> x = 21\n>>> y =\
  \ 10\n>>> list = [10, 20, 30, 40, 50]\n>>> if (x not in list):\n...    print(\"\
  x is NOT present in given list\")\n>>> else:\n...    print(\"x is present in given\
  \ list\")\n>>> x is NOT present in given list\n>>> if (y in list):\n...    print(\"\
  y is present in given list\")\n>>> else:\n...    print(\"y is NOT present in given\
  \ list\")\n>>> y is present in given list\n```\n\n#### 三元运算符\n\n三元运算符，也称为条件表达式，是一种用于评估条件为真或假的运算符。它从\
  \ Python 2.5 版本开始引入。它是一种在一行内评估条件的简洁方式，从而取代了多行 `if-else` 语句的需要，使代码更紧凑。\n\n**语法：**\
  \ `[on_true] if [expression] else [on_false]`\n\n**示例：**\n\n```\n>>> a, b = 10,\
  \ 20\n>>> min = a if a < b else b\n>>> print(min)\n>>> 10\n```\n\n\n\n"
- "# 条件语句与循环\n\n条件语句和循环是编程中的基本结构，使开发者能够创建动态、高效且响应迅速的应用程序。条件语句，也称为决策语句，允许程序根据特定标准执行不同的操作。通过评估布尔表达式，诸如\
  \ `if`、`else if` 和 `else` 之类的条件语句决定了执行流程，使程序能够适应不同的输入和条件。\n\n另一方面，循环是迭代控制结构，只要给定条件为真，就会重复执行一段代码块。常见的循环类型包括\
  \ `for` 循环和 `while` 循环。这些结构对于需要重复操作的任务至关重要，例如处理数组中的元素、处理用户输入直到收到有效响应，或迭代执行复杂计算。通过利用条件语句和循环，程序员可以设计出健壮且灵活的代码，能够处理各种场景并提高整体程序效率。\n\
  \n## 条件语句\n\n在迄今为止的示例中，你已经积累了相当多的 Python 编程知识，重点关注按线性顺序执行的代码。这意味着每条命令都会按照它们排列的精确顺序依次处理。\n\
  \n然而，现实世界中的场景通常需要更高的灵活性。程序可能需要跳过某些指令、重复执行一组语句，或者根据不同的条件从不同的指令集中进行选择。\n\n这就是**控制结构**概念变得至关重要的地方。控制结构在引导程序内的执行流程（也称为其**控制流**）方面起着重要作用。\n\
  \n在 Python 的上下文中，`if` 语句是进行决策的基本机制。它允许根据表达式的评估结果，有条件地执行单个语句或一组语句。\n\n**示例：**\n\n\
  ```\nif <expr>:\n    <statement>\n```\n\n**在此代码片段中：**\n\n*   `\"<expr>\"` 代表一个表达式，Python\
  \ 会对其进行评估以确定其真值，这一概念在 Python 运算符和表达式教程中关于逻辑运算符的讨论中有详细阐述。\n\n*   `\"<statement>\"\
  ` 指遵循缩进规则的任何有效 Python 代码行。\n\n*   当 `<expr>` 产生一个真值结果（意味着 Python 将其解释为真）时，则会执行 `<statement>`。相反，如果\
  \ `<expr>` 产生一个假值（解释为假），则 `<statement>` 会被跳过且不执行。\n\n*   需要注意的是，`<expr>` 后面必须要有**冒号（`:`）**。与某些要求将\
  \ `<expr>` 括在括号内的语言不同，Python 没有这样的要求。\n\n**示例：**\n\n```\n>>> x = 0\n>>> y = 5\n\
  >>> if x < y:   # 真值\n...     print('yes')\nyes\n```\n\n### 语句分组\n\n正如本章前面所述，Python\
  \ 采用了一种称为“越位规则”的编程原则。此规则的特点是使用缩进来界定代码块。Python 属于实现越位规则的相对小众的语言群体。\n\n缩进的作用不仅仅是风格上的，**在\
  \ Python 代码中具有功能上的意义**。其原因现在很清楚了：缩进用于界定复合语句或代码块。**因此，在 Python 中，具有相同缩进级别的代码行被视为同一代码块的一部分。**\n\
  \n因此，Python 中复合 `if` 语句的结构是通过缩进来定义的：\n\n```\n1| if <expr>:\n2|    <statement>\n\
  3|    <statement>\n4|    <statement>\n...\n5| <following_statement>\n```\n\n在这种情况下，具有相同缩进级别的语句（第\
  \ 2 行到第 4 行）被分组为一个代码块。如果 `<expr>` 评估为真，则执行整个代码块；如果 `<expr>` 为假，则跳过该代码块。处理完此代码块后，程序继续执行\
  \ `<following_statement>`。\n\n### 嵌套代码块\n\nPython 中的代码块可以嵌套到任意深度，其中每增加一个缩进级别都表示一个新代码块的开始，而每减少一个缩进级别则表示当前代码块的结束。这种代码块的层次结构创建了一种简单、统一且易于理解的结构。\n\
  \n**示例：**\n\n```\nage = 20\nhas_license = True\nif age >= 18:\n    if has_license:\n\
  \        print(\"你有资格驾驶。\")\n    else:\n        print(\"你未达到驾驶年龄。\")\n```\n\n###\
  \ Else 和 Elif 子句\n\n你已经学会了使用 `if` 语句根据条件执行单个指令或一组指令。现在，让我们探索更多的功能。有时，你可能需要评估一个情况，并在条件成立时采取一种行动方案，同时在条件不成立时定义另一种不同的方案。这种情况可以通过添加一个\
  \ `else` 子句来有效管理。\n\n```\nif <expr>:\n    <statement(s)>\nelse:\n    <statement(s)>\n\
  ```\n\n当 `<expr>` 评估为真时，**程序执行第一组语句并跳过第二组**。相反，如果 `<expr>` 为假，程序跳过第一组并**继续执行第二组**。完成这些条件分支后，程序的流程将继续执行第二组语句之后的代码。\n\
  \n**示例：**\n\n```\ntemperature = 30\nif temperature > 25:\n    print(\"今天很热。\")\n\
  else:\n    print(\"今天不热。\")\n```\n\nPython 提供了一种通过使用一个或多个 `elif` 子句（代表 `else if`）来导航多个条件路径的方法。该语言会顺序评估每个条件（`<expr>`），并执行与第一个评估为真的条件相关联的代码块。如果所有条件都为假，并且存在\
  \ `else` 子句，则将执行 `else` 子句下的代码块。\n\n**示例：**\n\n```\nscore = 75  # 假设这是百分制分数\nif\
  \ score >= 90:\n    print(\"等级：A\")\nelif score >= 80:\n    print(\"等级：B\")\nelif\
  \ score >= 70:\n    print(\"等级：C\")\nelif score >= 60:\n    print(\"等级：D\")\nelse:\n\
  \    print(\"等级：F\")\n```\n\n### 单行 if 语句\n\n通常，`if` 语句中的 `<expr>` 写在一行，而 `<statement>`\
  \ 缩进在下一行。然而，也可以将整个 `if` 语句构建在一行上，实现相同的功能。\n\n**语法：**\n\n```\nif <expr>: <statement>\n\
  ```\n\n可以通过使用分号分隔多个 `<statement>` 来将它们包含在一行中：\n\n**语法：**\n\n```\nif <expr>: <statement>;\
  \ <statement>; ...; <statement>\n```\n\n## Python 循环（For 和 While）\n\n编程中的循环是一个基本概念，它允许根据条件或直到满足某个条件重复执行一段代码块。循环用于自动化重复性任务，使得可以对数据集合执行操作、生成序列或等待特定事件，而无需多次编写相同的代码行。\n\
  \n**循环有几种类型，但最常见的包括以下几种：**\n\n*   **For 循环**：遍历一个序列（例如列表、元组、字典、集合或字符串），并为序列中的每个项目执行一段代码块。当迭代次数已知或有限时，通常使用它。\n\
  \n*   **While 循环**：只要指定的条件保持为真，就继续执行一段代码块。当循环开始前迭代次数未知，并且取决于某个条件何时改变时，使用它。\n\n循环可以包含各种控制语句来修改其执行流程，例如使用\
  \ `break` 提前退出循环，使用 `continue` 跳过当前迭代并继续下一次迭代，或者使用 `else` 在循环条件不再为真时执行一段代码块（适用于\
  \ Python）。\n\n\n\n### Python 中的 while 循环\n\n在 Python 中，`while` 循环会在指定条件保持为真时，重复执行一组语句。一旦条件求值为假，程序将继续执行循环之后紧接着的代码行。\n\
  \n**语法：**\n\n```\nwhile expression:\n    statement(s)\n```\n\n与 `if` 条件语句类似，Python\
  \ 根据编程结构后统一的缩进级别，将语句组合成单个代码块。用于缩进语句的空格数量决定了它们是否属于同一个代码块。\n\n**示例：**\n\n```\ncounter\
  \ = 0  # 初始化计数器\nwhile counter < 5:\n    print(\"Counter is\", counter)\n    counter\
  \ += 1  # 递增计数器\nprint(\"Loop finished\")\n```\n\n**输出：**\n\n```\nCounter is 0\n\
  Counter is 1\nCounter is 2\nCounter is 3\nCounter is 4\nLoop finished\n```\n\n###\
  \ while 循环中的 else 语句\n\n在 Python 中，`else` 语句可以与 `while` 循环一起使用。以下是一个示例：\n\n```\n\
  count = 0  # 初始化计数\nwhile count < 3:\n    print(\"Count is\", count)\n    count\
  \ += 1  # 递增计数\nelse:\n    print(\"Count is no longer less than 3\")\n```\n\n在此示例中，只要\
  \ `count` 小于 3，`while` 循环就会执行。它会打印 `count` 的当前值，然后在每次循环中将 `count` 递增 1。当 `count`\
  \ 达到 3 时，循环条件 `count < 3` 变为假，导致循环退出。此时，`else` 代码块被执行，打印 \"Count is no longer less\
  \ than 3\"。`while` 循环的 `else` 部分在循环条件自然变为假时运行，这意味着它不是通过 `break` 语句退出的。\n\n### 使用\
  \ Python while 循环创建无限循环\n\n为了无限次地重复执行代码块，可以使用 Python 的 `while` 循环来实现此目的。这种方法涉及使用条件为\
  \ `(count == 0)` 的 `while` 循环。只要 `count` 的值保持为 0，循环就会继续执行。鉴于 `count` 初始设置为 0，这会导致一个无限运行的循环，因为其条件永远为真。\n\
  \n**警告**\n\n通常不建议使用这种无限循环，因为它创建了一个没有自然结束的循环，其中的条件永远为真，需要强制终止程序的执行。\n\n### Python\
  \ 中的 for 循环\n\n`for` 循环便于进行迭代处理，允许对列表、字符串或数组等结构进行有序迭代。Python 使用 `for in` 循环，类似于其他各种编程语言中的\
  \ `foreach` 循环。\n\n**语法：**\n\n```\nfor iterator_var in sequence:\n    statements(s)\n\
  ```\n\n**示例：**\n\n```\nn = 5\nfor i in range(0, n):\n    print(i)\n```\n\n**输出：**\n\
  \n```\n0\n1\n2\n3\n4\n```\n\n**注意**\n\n`range()` 函数与循环\n\n在 Python 中将 `range()`\
  \ 函数与 `for` 循环结合使用时，务必记住该函数会生成从 0 开始到（但不包括）结束索引的数字。这意味着如果你使用 `range()` 迭代到 5，循环将使用数字\
  \ 0 到 4 执行，总共进行 5 次迭代。结束索引（在此例中为 5）是不包含在内的。\n\n### for 循环中的 else 语句\n\n与 `while`\
  \ 循环类似，Python 中的 `for` 循环也可以与 `else` 语句配对使用。然而，由于 `for` 循环不是基于条件表达式终止，而是完成对序列的迭代，因此\
  \ `else` 代码块会在 `for` 循环结束后立即执行。\n\n**示例：**\n\n```\nfor i in range(3):\n    print(f\"\
  i is {i}\")\nelse:\n    print(\"Loop completed without break\")\n```\n\n在此示例中，`for`\
  \ 循环迭代由 `range(3)` 生成的序列，该序列产生数字 0、1 和 2。每次迭代都会打印出 `i` 的值。一旦循环迭代完序列中的所有项（即打印完 0、1\
  \ 和 2 之后），循环自然结束，控制权传递给 `else` 代码块。然后 `else` 代码块执行，打印 \"Loop completed without break\"\
  。\n\n### Python 中的嵌套循环\n\nPython 编程语言支持将一个循环包含在另一个循环内部，这种概念称为嵌套循环。以下示例用于演示此概念的实际应用。\n\
  \n**语法：**\n\n**For 循环：**\n\n```\nfor iterator_var in sequence:\n    for iterator_var\
  \ in sequence:\n        statements(s)\n    statements(s)\n```\n\n**While 循环：**\n\
  \n```\nwhile expression:\n    while expression:\n        statement(s)\n    statement(s)\n\
  ```\n\n**示例：**\n\n```\n# 外层循环\nfor i in range(3):  # 将迭代 0, 1, 2\n    # 内层循环\n \
  \   for j in range(2):  # 将迭代 0, 1\n        print(f\"i = {i}, j = {j}\")\n```\n\n\
  在此示例中，有两个循环：一个外层循环和一个内层循环。外层循环迭代从 0 到 2（包含）的数字范围，对于外层循环的每次迭代，内层循环都会迭代从 0 到 1（包含）的数字范围。\n\
  \n外层循环从 `i = 0` 开始。然后，内层循环开始执行，`j` 依次取值 0 和 1。对于内层循环的每次迭代，它都会打印 `i` 和 `j` 的当前值。\n\
  \n在内层循环完成 `j = 0` 和 `j = 1` 的迭代后，控制权返回到外层循环，将 `i` 递增到下一个值。\n\n此过程重复进行，直到外层循环完成其所有迭代（对于\
  \ `i = 0`、`i = 1` 和 `i = 2`）。\n\n结果是打印出一系列显示 `i` 和 `j` 每种组合的输出，演示了如何使用嵌套循环生成或迭代两个范围的笛卡尔积。这种模式常用于需要迭代多个维度的场景，例如处理二维矩阵或网格中的单元格。\n\
  \n**输出：**\n\n```\ni = 0, j = 0\ni = 0, j = 1\ni = 1, j = 0\ni = 1, j = 1\ni = 2,\
  \ j = 0\ni = 2, j = 1\n```\n\n### 循环控制语句\n\n循环中的控制语句会改变正常的执行流程。退出作用域会导致该作用域内所有自动创建的对象被销毁。Python\
  \ 为此提供了几种控制语句：\n\n- **Continue 语句：** 此语句将流程重定向回循环的开头，有效地跳过当前迭代中循环体的剩余部分。\n- **Break\
  \ 语句：** 使用此语句会完全退出循环，将控制权转移到循环之后紧接着的语句。\n- **Pass 语句：** Python 中的 `pass` 语句用于定义语法占位符，允许创建空循环，以及在控制结构、函数和类中创建占位符，而不会影响执行流程。\n\
  \n**演示 `continue`、`break` 和 `pass` 的示例：**\n\n```\nfor num in range(1, 10):  # 从\
  \ 1 循环到 9\n    if num % 2 == 0:\n        continue  # 对于偶数，跳过循环的剩余部分\n    if num\
  \ == 5:\n        pass  # 对于 num == 5 不做任何操作，作为未来代码的占位符\n    if num == 7:\n     \
  \   break  # 当 num 为 7 时退出循环\n    print(num)\n```\n\n## Python 数据结构：列表、集合、元组、字典\n\
  \nPython 提供了多种内置数据结构，为存储和操作数据提供了灵活的方式：\n\n- **列表** 是有序集合，允许重复元素并支持索引。\n- **集合**\
  \ 是无序集合，会自动移除重复项并提供快速的成员资格测试。\n- **元组** 是不可变的有序集合，非常适合固定数据序列。\n- **字典** 是键值对，允许基于唯一键进行高效的数据检索。\n\
  \n每种数据结构都有不同的特性和用例，使 Python 成为管理数据的强大且灵活的语言。\n\n### 什么是数据结构？\n\n数据的组织、管理和存储在提高数据访问和修改效率方面起着至关重要的作用。**数据结构**\
  \ 提供了一种框架，用于以促进数据集合存储、建立数据间关系以及高效执行操作的方式来排列数据。\n\n\n\n### Python 的内置数据结构\n\nPython\
  \ 原生支持多种数据结构，能够高效地存储和检索数据。这些结构包括 `列表`、`字典`、`元组` 和 `集合`，每种都提供了独特的数据操作能力。\n\n####\
  \ Python 中的自定义数据结构\n\nPython 还允许用户设计自己的数据结构，从而完全控制其功能。其他编程语言中常见的诸如 `栈`、`队列`、`树`\
  \ 和 `链表` 等数据结构，同样可以在 Python 中实现。在了解了可用的数据结构之后，我们现在可以继续探索如何在 Python 中实现和使用这些结构。\n\
  \n### 内置数据结构\n\n#### 列表\n\n`列表` 是 Python 中一种通用的数据结构，允许你存储包含多种数据类型的元素序列。列表中的每个元素都被分配了一个唯一的索引，用于访问该元素。第一个元素的索引从\
  \ 0 开始，这被称为正索引；此外还有负索引，从 -1 开始，用于从列表末尾向前访问元素。\n\n##### 创建列表\n\n你可以通过将元素放在方括号内来创建列表。如果方括号内为空，则会创建一个空列表。\n\
  \n**示例：**\n\n```\nmy_list = [1, \"Hello\", 3.14]\n# 创建一个空列表\nempty_list = []\nprint(\"\
  我的列表:\", my_list)\nprint(\"空列表:\", empty_list)\n```\n\n**输出：**\n\n```\n我的列表: [1,\
  \ 'Hello', 3.14]\n空列表: []\n```\n\n##### 添加元素\n\n要向列表中添加元素，Python 提供了以下方法：\n\n- `append()`\
  \ 方法将其参数作为单个元素添加到列表末尾。\n- `extend()` 方法展开其参数，将每个元素逐个添加到列表中。\n- `insert()` 方法在指定索引处插入一个给定元素，从而增加列表的长度。\n\
  \n**示例：**\n\n```\n# 从一个空列表开始\nfruits = []\n# 使用 append() 向列表添加元素\nfruits.append(\"\
  苹果\")\nfruits.append(\"香蕉\")\nfruits.append(\"樱桃\")\nprint(\"水果列表:\", fruits)\n\
  ```\n\n**输出：**\n\n```\n水果列表: ['苹果', '香蕉', '樱桃']\n```\n\n##### 删除元素\n\n可以使用多种技术从列表中删除元素：\n\
  \n- `del` 语句按索引删除元素，但不返回该元素。\n- `pop()` 方法删除并返回指定索引处的元素。\n- 要按值删除元素，可以使用 `remove()`\
  \ 方法。\n\n**示例：**\n\n```\n# 创建一个数字列表\nnumbers = [10, 20, 30, 40, 50]\n# 使用 del 按索引删除元素\n\
  del numbers[1]  # 删除索引为 1 的 20\nprint(\"使用 del 后:\", numbers)\n# 使用 remove() 按值删除元素\n\
  numbers.remove(30)  # 删除第一次出现的 30\nprint(\"使用 remove() 后:\", numbers)\n# 使用 pop()\
  \ 删除元素并返回它\npopped_element = numbers.pop(2)  # 弹出索引为 2 的元素（现在是 50）\nprint(\"使用 pop()\
  \ 后:\", numbers)\nprint(\"弹出的元素:\", popped_element)\n```\n\n**输出：**\n\n```\n使用 del\
  \ 后: [10, 30, 40, 50]\n使用 remove() 后: [10, 40, 50]\n使用 pop() 后: [10, 40]\n弹出的元素:\
  \ 50\n```\n\n##### 访问元素\n\n访问列表中的元素非常直接，类似于访问字符串中的字符：使用索引来获取所需的元素。\n\n**示例：**\n\n\
  ```\n# 创建一个水果列表\nfruits = [\"苹果\", \"香蕉\", \"樱桃\", \"枣\", \"接骨木莓\"]\n# 通过正索引访问元素\n\
  print(\"第一个水果:\", fruits[0])  # 苹果\nprint(\"第三个水果:\", fruits[2])  # 樱桃\n# 通过负索引访问元素\n\
  print(\"最后一个水果:\", fruits[-1])  # 接骨木莓\nprint(\"倒数第二个水果:\", fruits[-2])  # 枣\n#\
  \ 访问列表的一个切片\nslice_of_fruits = fruits[1:4]  # 从索引 1（包含）到索引 4（不包含）\nprint(\"水果切片:\"\
  , slice_of_fruits)  # ['香蕉', '樱桃', '枣']\n```\n\n在这个示例中：\n\n- 我们创建了一个名为 `fruits`\
  \ 的列表，包含五个元素。\n- 我们使用正索引和负索引访问单个元素。正索引从列表开头（0）开始，负索引从列表末尾（-1）开始。\n- 我们还演示了如何使用切片语法\
  \ `list[start:stop]` 访问列表的一个子部分（切片），其中 `start` 是切片开始的索引（包含），`stop` 是切片结束的索引（不包含）。这会返回一个包含指定部分的新列表。\n\
  \n#### 其他列表操作\n\n列表附带了一系列有用的方法，用于操作和查询：\n\n- `len()` 返回列表中的项目数。\n- `index()` 搜索给定值并返回其第一次出现的索引。\n\
  - `count()` 统计给定值在列表中出现的次数。\n- `sorted()` 和 `sort()` 都用于对列表进行排序。`sorted()` 返回一个新的已排序列表，原列表保持不变；而\
  \ `sort()` 则就地排序列表。\n\n**示例：**\n\n```\nmy_numbers = [5, 2, 8, 10, 25, 10]\nprint(len(my_numbers))\
  \          # 查找列表的长度\nprint(my_numbers.index(10))     # 查找元素第一次出现的索引\nprint(my_numbers.count(10))\
  \     # 查找特定元素的出现次数\nprint(sorted(my_numbers))       # 打印列表的排序版本，不改变原列表\nmy_numbers.sort(reverse=False)\
  \  # 将原列表按升序排序\nprint(my_numbers)\n```\n\n**输出：**\n\n```\n6\n3\n2\n[2, 5, 8, 10,\
  \ 10, 25]\n[2, 5, 8, 10, 10, 25]\n```\n\n理解这些列表的基础知识将增强你在 Python 中有效管理和操作数据的能力。\n\
  \n### Python 中的字典\n\nPython 中的 `字典` 是一种以键值对形式存储数据的集合，类似于电话簿，其中每个名字（键）都与一个电话号码（值）相关联。键是映射到值的唯一标识符，允许高效的数据检索。这种结构类似于在电话簿中查找名字以找到对应的号码。\n\
  \n#### 创建字典\n\n你可以通过将键值对放在花括号 `{}` 内来创建字典，或者使用 `dict()` 构造函数。每个键值对都以这种方式添加到字典中。\n\
  \n**示例：**\n\n```\n# 使用键值对创建字典\nperson_info = {\"name\": \"张三\", \"age\": 30, \"\
  city\": \"纽约\"}\n# 创建一个空字典\nempty_dict = {}\nprint(\"人员信息:\", person_info)\nprint(\"\
  空字典:\", empty_dict)\n```\n\n**输出：**\n\n```\n人员信息: {'name': '张三', 'age': 30, 'city':\
  \ '纽约'}\n空字典: {}\n```\n\n#### 修改和添加键值对\n\n要修改现有条目，你可以引用该键并为其分配一个新值。添加新的键值对就像为字典中的新键分配一个值一样简单。\n\
  \n**示例：**\n\n```\n# 初始字典\ncar = {\"make\": \"福特\", \"model\": \"野马\", \"year\":\
  \ 1964}\n# 修改现有的键值对\ncar[\"year\"] = 2020\n# 添加新的键值对\ncar[\"color\"] = \"蓝色\"\n\
  print(\"更新后的汽车字典:\", car)\n```\n\n**输出：**\n\n```\n更新后的汽车字典: {'make': '福特', 'model':\
  \ '野马', 'year': 2020, 'color': '蓝色'}\n```\n\n\n\n### 删除键值对\n\n- `pop()` 方法根据键删除键值对，并返回被删除键的值。\n\
  - `popitem()` 方法删除并返回最后一个键值对，以元组形式呈现。\n- `clear()` 方法清空整个字典，移除其所有内容。\n\n**示例：**\n\
  \n```python\n# 初始字典\nbook = {\"title\": \"The Great Gatsby\", \"author\": \"F. Scott\
  \ Fitzgerald\", \"year\": 1925}\n# 使用 pop() 删除键值对\nremoved_year = book.pop(\"year\"\
  )\nprint(\"被删除的年份:\", removed_year)\nprint(\"执行 pop() 后的书籍字典:\", book)\n# 使用 del\
  \ 删除键值对\ndel book[\"author\"]\nprint(\"执行 del 后的书籍字典:\", book)\n# 使用 popitem() 删除最后插入的键值对\n\
  removed_item = book.popitem()\nprint(\"被删除的项:\", removed_item)\nprint(\"执行 popitem()\
  \ 后的书籍字典:\", book)\n# 使用 clear() 清空整个字典\nbook.clear()\nprint(\"执行 clear() 后的书籍字典:\"\
  , book)\n```\n\n**输出：**\n\n```\n被删除的年份: 1925\n执行 pop() 后的书籍字典: {'title': 'The Great\
  \ Gatsby', 'author': 'F. Scott Fitzgerald'}\n执行 del 后的书籍字典: {'title': 'The Great\
  \ Gatsby'}\n被删除的项: ('title', 'The Great Gatsby')\n执行 popitem() 后的书籍字典: {}\n执行 clear()\
  \ 后的书籍字典: {}\n```\n\n### 访问元素\n\n元素通过其键进行访问。你可以直接通过键引用值，或使用 `get()` 方法，该方法返回与给定键关联的值。\n\
  \n**示例：**\n\n```python\n# 创建一个字典\nstudent_info = {\n\"name\": \"Alice\",\n\"age\"\
  : 25,\n\"grade\": \"A\"\n}\n# 直接通过键访问元素\nname = student_info[\"name\"]\nage = student_info[\"\
  age\"]\nprint(\"姓名:\", name)\nprint(\"年龄:\", age)\n# 使用 get() 方法访问元素\ngrade = student_info.get(\"\
  grade\")\nprint(\"成绩:\", grade)\n```\n\n**输出：**\n\n```\n姓名: Alice\n年龄: 25\n成绩: A\n\
  ```\n\n### 其他函数\n\n字典提供了几种与其中包含的数据进行交互的方法：\n\n- `keys()` 方法返回字典键的视图。\n- `values()`\
  \ 方法提供值的视图。\n- `items()` 方法返回键值对（以元组形式）的视图。\n\n本概述介绍了 Python 字典可用的基本操作和方法，展示了它们在组织和访问数据方面的灵活性和强大功能。\n\
  \n**示例：**\n\n```python\n# 创建一个字典\nstudent_info = {\n\"name\": \"Alice\",\n\"age\"\
  : 25,\n\"grade\": \"A\"\n}\n# 使用 keys() 方法获取键\nkeys = student_info.keys()\nprint(\"\
  键:\", keys)\n# 使用 values() 方法获取值\nvalues = student_info.values()\nprint(\"值:\",\
  \ values)\n# 使用 items() 方法获取键值对\nitems = student_info.items()\nprint(\"项:\", items)\n\
  # 使用 items() 遍历键值对\nprint(\"遍历键值对:\")\nfor key, value in items:\nprint(key, \":\"\
  , value)\n```\n\n**输出：**\n\n```\n键: dict_keys(['name', 'age', 'grade'])\n值: dict_values(['Alice',\
  \ 25, 'A'])\n项: dict_items([('name', 'Alice'), ('age', 25), ('grade', 'A')])\n遍历键值对:\n\
  name : Alice\nage : 25\ngrade : A\n```\n\n## Python 中的元组\n\nPython 中的元组在很多方面与列表相似，但有一个关键区别：一旦数据被添加到元组中，就不能再更改或修改。不过，有一个例外：当元组中包含的数据本身是可变的时，则可以更改。\n\
  \n### 创建元组\n\n你可以使用圆括号 `()` 或 `tuple()` 函数来创建元组。\n\n**示例：**\n\n```python\n# 使用圆括号创建元组\n\
  fruits_tuple = (\"Apple\", \"Banana\", \"Cherry\", \"Date\")\n# 使用 tuple() 构造函数创建元组\n\
  colors_tuple = tuple((\"Red\", \"Green\", \"Blue\"))\nprint(\"水果元组:\", fruits_tuple)\n\
  print(\"颜色元组:\", colors_tuple)\n```\n\n**输出：**\n\n```\n水果元组: ('Apple', 'Banana',\
  \ 'Cherry', 'Date')\n颜色元组: ('Red', 'Green', 'Blue')\n```\n\n### 访问元素\n\n访问元组中的元素与访问列表中的值完全相同。\n\
  \n**示例：**\n\n```python\n# 创建一个元组\nfruits_tuple = (\"Apple\", \"Banana\", \"Cherry\"\
  , \"Date\")\n# 通过索引访问元素\nfirst_fruit = fruits_tuple[0]\nsecond_fruit = fruits_tuple[1]\n\
  print(\"第一个水果:\", first_fruit)\nprint(\"第二个水果:\", second_fruit)\n# 使用负索引访问元素\nlast_fruit\
  \ = fruits_tuple[-1]\nsecond_last_fruit = fruits_tuple[-2]\nprint(\"最后一个水果:\", last_fruit)\n\
  print(\"倒数第二个水果:\", second_last_fruit)\n```\n\n**输出：**\n\n```\n第一个水果: Apple\n第二个水果:\
  \ Banana\n最后一个水果: Date\n倒数第二个水果: Cherry\n```\n\n### 追加元素\n\n要向元组追加值，可以使用 `+` 运算符，它允许你将另一个元组连接到当前元组上。\n\
  \n**示例：**\n\n```python\n# 创建两个元组\ntuple1 = (1, 2, 3)\ntuple2 = (4, 5, 6)\n# 通过创建新元组来追加元素\n\
  appended_tuple = tuple1 + tuple2\nprint(\"元组 1:\", tuple1)\nprint(\"元组 2:\", tuple2)\n\
  print(\"追加后的元组:\", appended_tuple)\n```\n\n**输出：**\n\n```\n元组 1: (1, 2, 3)\n元组 2:\
  \ (4, 5, 6)\n追加后的元组: (1, 2, 3, 4, 5, 6)\n```\n\n### 其他函数\n\n元组可用的函数与列表类似，因为元组在数据访问和操作方面与列表共享许多特性。\n\
  \n**示例：**\n\n```python\n# 创建一个包含整数和可变列表的元组\nmy_tuple = (1, 2, 3, ['hindi', 'python'])\n\
  # 修改元组内的元素（一个列表元素）\nmy_tuple[3][0] = 'english'\n# 打印修改后的元组\nprint(\"修改后的元组:\", my_tuple)\n\
  # 统计元组中某个元素出现的次数\ncount_2 = my_tuple.count(2)\n# 查找元组中特定元素（修改后的列表）的索引\nindex_element\
  \ = my_tuple.index(['english', 'python'])\n# 打印计数和索引结果\nprint(\"元组中 '2' 的个数:\",\
  \ count_2)\nprint(\"元组中 ['english', 'python'] 的索引:\", index_element)\n```\n\n**输出：**\n\
  \n```\n修改后的元组: (1, 2, 3, ['english', 'python'])\n元组中 '2' 的个数: 1\n元组中 ['english',\
  \ 'python'] 的索引: 3\n```\n\n## Python 中的集合\n\nPython 中的集合是唯一且无序元素的集合。这意味着即使数据重复多次，它在集合中也只会出现一次，类似于数学中的集合。集合支持类似于算术集合中使用的操作。\n\
  \n### 创建集合\n\n要在 Python 中创建集合，需要使用花括号 `{}`。与字典不同，你只需提供值，而不是键值对。\n\n**示例：**\n\n```python\n\
  # 创建一个包含唯一元素的集合\nmy_set = {1, 2, 3, 4, 4, 5}\n# 打印集合\nprint(\"我的集合:\", my_set)\n\
  ```\n\n**输出：**\n\n```\n我的集合: {1, 2, 3, 4, 5}\n```\n\n### 添加元素\n\n要向集合中添加元素，可以使用\
  \ `add()` 函数并传入你想要添加的值。\n\n**示例：**\n\n```python\n# 创建一个空集合\nmy_set = set()\n# 使用\
  \ add() 方法向集合添加元素\nmy_set.add(1)\nmy_set.add(2)\nmy_set.add(3)\n# 打印更新后的集合\nprint(\"\
  更新后的集合:\", my_set)\n```\n\n**输出：**\n\n```\n更新后的集合: {1, 2, 3}\n```\n\n\n\n### 集合运算\n\
  \n此处演示了并集、交集等多种集合运算。这些运算允许你根据需要操作和组合集合。\n\n**示例：**\n\n```python\n# 创建两个集合\nmy_set\
  \ = {1, 2, 3, 4}\nmy_set_2 = {3, 4, 5, 6}\n# 执行集合运算，并使用 union 和 | 运算符进行比较\nunion_result\
  \ = my_set.union(my_set_2)\nunion_operator_result = my_set | my_set_2\n# 执行集合运算，并使用\
  \ intersection 和 & 运算符进行比较\nintersection_result = my_set.intersection(my_set_2)\n\
  intersection_operator_result = my_set & my_set_2\n# 执行集合运算，并使用 difference 和 - 运算符进行比较\n\
  difference_result = my_set.difference(my_set_2)\ndifference_operator_result = my_set\
  \ - my_set_2\n# 执行集合运算，并使用 symmetric_difference 和 ^ 运算符进行比较\nsymmetric_difference_result\
  \ = my_set.symmetric_difference(my_set_2)\nsymmetric_difference_operator_result\
  \ = my_set ^ my_set_2\n# 清空第一个集合\nmy_set.clear()\n# 打印结果并添加注释\nprint(\"并集结果:\",\
  \ union_result, '等价于', union_operator_result)\nprint(\"交集结果:\", intersection_result,\
  \ '等价于', intersection_operator_result)\nprint(\"差集结果:\", difference_result, '等价于',\
  \ difference_operator_result)\nprint(\"对称差集结果:\", symmetric_difference_result, '等价于',\
  \ symmetric_difference_operator_result)\nprint(\"已清空的集合:\", my_set)  # 该集合现在为空\n\
  ```\n\n**输出：**\n\n```\n并集结果: {1, 2, 3, 4, 5, 6} 等价于 {1, 2, 3, 4, 5, 6}\n交集结果: {3,\
  \ 4} 等价于 {3, 4}\n差集结果: {1, 2} 等价于 {1, 2}\n对称差集结果: {1, 2, 5, 6} 等价于 {1, 2, 5, 6}\n\
  已清空的集合: set()\n```\n\n**在此示例中：**\n\n- **并集：** `union()` 函数合并两个集合中的数据，创建一个包含两个集合中所有唯一元素的新集合。\n\
  - **交集：** `intersection()` 函数找出两个集合共有的数据。它返回一个仅包含两个集合中都存在的元素的新集合。\n- **差集：** `difference()`\
  \ 函数从第一个集合中移除两个集合共有的数据，并输出一个仅包含第一个集合中存在但第二个集合中不存在的数据的新集合。\n- **对称差集：** `symmetric_difference()`\
  \ 函数与 `difference()` 函数类似，但略有不同。它从两个集合中移除共有的数据，并输出一个包含每个集合中独有数据的新集合。\n\n这些函数允许你执行各种集合运算，并根据需要操作集合以获取特定的数据子集。\n\
  \n## 常规函数与 Lambda 函数\n\n### Python 中的函数是什么？\n\n在编程中，函数用于将一系列步骤组合在一起，这些步骤要么需要多次执行，要么足够复杂，需要封装在一个独立的子程序中以便按需调用。本质上，函数是一段旨在执行特定操作的代码。根据此操作的性质，函数可能需要多个输入才能运行，并且在完成时，它能够返回一个或多个结果。\n\
  \n**Python 区分了三类函数：**\n\n- **内置函数**，例如用于请求帮助的 `help()`、用于确定最小值的 `min()` 以及用于将对象输出到终端的\
  \ `print()` 等。这些函数的更完整列表是可用的。\n- **用户自定义函数 (UDF)**，即用户为方便其任务而创建的自定义函数。\n- **匿名函数**，通常称为\
  \ lambda 函数，其独特之处在于它们无需使用传统的 `def` 关键字即可定义。\n\n**在 Python 中创建用户自定义函数 (UDF) 涉及四个主要步骤：**\n\
  \n1.  首先使用 `def` 关键字表示要创建一个函数，后跟所选函数名。\n2.  指定函数所需的任何参数，将它们放在函数名旁边的括号内。此行以冒号结尾。\n\
  3.  加入你希望函数执行的指令。\n4.  如果你希望函数产生结果，则使用 `return` 语句结束函数。省略 `return` 语句意味着函数将默认返回一个\
  \ `None` 对象。\n\n**示例：**\n\n```python\ndef add_numbers(a, b):\nreturn a + b\n# 调用函数的示例\n\
  result = add_numbers(3, 5)\nprint(result)  # 这将打印 8\n```\n\n**输出：**\n\n```\n8\n\
  ```\n\n### `return` 语句\n\nPython 中的 `return` 语句在函数内部使用，用于退出函数并将值返回给调用者。函数可以返回一个值，包括整数、浮点数、字符串、列表、元组、字典等数据类型，甚至其他函数和对象。如果函数没有显式地以\
  \ `return` 语句结束，Python 会自动返回 `None`，表示该函数不提供任何特定值。\n\n**`return` 语句可用于：**\n\n- 返回在函数内计算或处理得到的特定结果\n\
  - 在函数代码块结束之前的某个点退出函数\n- 将控制权传递回程序中调用函数的位置，并可选择将数据传递回该位置\n\n### 函数中的 `return` 与 `print`\n\
  \n在 Python 中，函数内的 `return` 和 `print` 用途不同：\n\n- `return` 将一个值发送回调用者并**退出函数**。它允许函数输出一个结果，该结果随后可在程序的其他地方使用。返回的值可以存储在变量中、在表达式中使用或传递给其他函数。\n\
  - 另一方面，`print()` 只是将一个值显示到控制台。它不会退出函数，也不会将任何值发送回调用者。`print` 用于日志记录或调试目的，允许开发者查看输出，而不会影响函数的流程或输出。\n\
  \n简而言之，当你想要从函数输出一个值并进一步使用它时，使用 `return`；当你想要在控制台显示某些内容而不影响函数对其调用者的输出时，使用 `print`。\n\
  \n### 方法与函数\n\n方法是与类关联并通过该类的实例或对象访问的一种函数。另一方面，函数是一个独立的实体，不需要与类关联。因此，虽然每个方法都算作一个函数，但反过来并非所有函数都成立。\n\
  \n以下述场景为例：首先，你创建一个名为 `plus()` 的函数，然后建立一个包含 `sum()` 方法的 `Summation` 类。要使用 `Summation`\
  \ 类中集成的 `sum()` 方法，必须实例化该类的对象或实例。让我们继续构建这样一个对象。\n\n### 如何在 Python 中调用函数\n\n要在 Python\
  \ 中调用函数，只需使用函数名后跟括号。如果函数需要参数，则将它们放在括号内，用逗号分隔。以下是基本语法：\n\n**语法：**\n\n```python\n\
  function_name(arguments)\n```\n\n**例如：**\n\n```python\nresult = add_numbers(5, 3)\n\
  ```\n\n这将执行 `add_numbers` 函数，以 `5` 和 `3` 作为其参数，并将返回值存储在变量 `result` 中。如果函数不需要任何参数，你仍然需要使用括号，但将其留空：\n\
  \n```python\nfunction_name()\n```\n\n此语法非常直接，对于内置函数和用户自定义函数都是相同的。\n\n\n\n### Python\
  \ 中的函数参数\n\n在 Python 中，函数参数是在调用函数时传递给函数的值。函数利用这些参数根据输入执行操作或生成结果。Python 支持多种类型的参数，使得函数在处理输入时具有高度的灵活性。以下是主要类型。\n\
  \n#### 位置参数\n\n这是最常见的参数类型，参数的传递顺序至关重要。调用时位置参数的数量必须与函数定义中期望的数量相匹配。\n\n**示例：**\n\n\
  ```\ndef add(a, b):\n    return a + b\n# 使用位置参数调用函数\nresult = add(2, 3)  # 2 和 3\
  \ 是位置参数\nprint(result)\n```\n\n**输出：**\n\n```\n5\n```\n\n#### 关键字参数\n\n这类参数通过显式指定参数名称和值传递给函数。调用函数时，关键字参数可以按任意顺序列出。这使代码更具可读性，并允许你以与定义时不同的顺序调用函数。\n\
  \n**示例：**\n\n```\ndef greet(name, message):\n    return f\"{message}, {name}!\"\n\
  # 使用关键字参数调用函数\ngreeting = greet(message=\"Hello\", name=\"Alice\")\n```\n\n####\
  \ 默认参数\n\n函数可以为参数设置默认值。如果调用者未提供该参数的值，函数将使用默认值。默认参数使某些参数变为可选。\n\n**示例：**\n\n```\n\
  def log(message, level='INFO'):\n    print(f\"[{level}] {message}\")\n# 未指定 level\
  \ 时调用函数\nlog(\"User logged in\")  # 使用默认级别 INFO\n```\n\n#### 可变长度参数（`*args` 和 `**kwargs`）\n\
  \n- `*args` 允许函数接受任意数量的位置参数。当你无法确定会向函数传递多少个参数时使用。\n- `**kwargs` 允许接受任意数量的关键字参数。当你希望处理未提前显式定义的命名参数时使用。\n\
  \n**示例：**\n\n```\ndef make_sentence(*words, **punctuation):\n    sentence = ' '.join(words)\
  \ + punctuation.get('mark', '.')\n    return sentence.capitalize()\n# 使用 *args 表示单词，**kwargs\
  \ 表示标点\nsentence = make_sentence('hello', 'world', mark='!')\n```\n\n函数参数提高了函数的灵活性和可重用性，使你能够编写更通用、更强大的代码。\n\
  \n### Python 中的匿名函数\n\nPython 中的匿名函数，也称为 lambda 函数，是没有名称的函数。它们使用 `lambda` 关键字创建，因此常被称为\
  \ lambda 函数。匿名函数通常用于简短、简单的操作，这些操作以内联方式编写更易读，特别是作为高阶函数（接受其他函数作为输入的函数）的参数时。\n\n**匿名函数的基本语法是**\n\
  \n```\nlambda arguments: expression\n```\n\n此语法允许 lambda 函数接受任意数量的参数，但只能包含一个表达式。当调用\
  \ lambda 函数时，该表达式会被求值并返回。\n\n**Lambda 函数的特性**\n\n- **单一表达式**：与使用 `def` 定义的标准函数（可包含多个表达式和语句）不同，lambda\
  \ 函数仅限于单个表达式。\n- **自动返回**：表达式的结果由 lambda 函数自动返回。\n- **无需 return 语句**：与普通函数不同，无需显式返回结果；表达式的结果自动成为返回值。\n\
  - **用途广泛**：Lambda 函数可用于任何需要函数的地方，通常与 `map()`、`filter()` 和 `reduce()` 等函数结合使用，也用于\
  \ GUI 事件处理程序和其他简短的回调函数。\n\n**示例：**\n\n```\nsquare = lambda x: x * x\nprint(square(5))\
  \  # 输出：25\n```\n\n**输出：**\n\n```\n25\n```\n\n以下是一个将 lambda 函数与 `filter()` 函数结合使用，从列表中过滤出偶数的示例：\n\
  \n```\nnumbers = [1, 2, 3, 4, 5, 6]\neven_numbers = list(filter(lambda x: x % 2\
  \ == 0, numbers))\nprint(even_numbers)  # 输出：[2, 4, 6]\n```\n\n**输出：**\n\n```\n\
  [2, 4, 6]\n```\n\nLambda 函数特别适用于可以用单行表达式的简单操作。然而，对于复杂操作，建议使用命名函数以保证清晰度和可读性。\n\n\
  ## 总结\n\nPython 是一种通用、高级编程语言，是跨多个领域和平台进行脚本编写和快速应用程序开发的理想选择。在本章中，我们回顾了 Python 的语法和语义，指出了它与其他编程语言的相似之处，同时强调了其独特特性。在下一章中，我们将了解\
  \ Python 如何支持多种编程方法，包括结构化编程、面向对象编程和函数式编程。\n\n脚注 1\n\n"
- "# 4. Python 与其他编程方法\n\nPython 丰富的自然语言处理生态系统、活跃的社区支持、可读性、与数据科学和机器学习工具的集成、预训练模型的可用性、开源特性、广泛采用、多功能性以及跨平台兼容性，使其成为自然语言处理任务的理想选择。其流行度和强大的生态系统使\
  \ Python 成为自然语言处理研究和开发的事实标准语言。\n\n## Python 中的面向对象编程\n\nPython 中的面向对象编程是一种使用对象对复杂问题进行建模的编码方法。这种方法基于一个指导问题解决策略的理论框架。\n\
  \n在面向对象编程的背景下，这涉及运用一套原则和设计模式，通过对象的视角来应对挑战。在 Python 中，对象是将数据（称为属性）和函数（称为方法）封装到一个单一实体中。对象可以类比为现实世界中的有形实体。\n\
  \n在这种方案中，属性通常是名词，表示对象的属性；而方法是动作，用动词表示，定义了对象能做什么。\n\n这种将数据存储和操作功能分开的方式构成了面向对象编程的核心。它涉及创建不仅包含信息，而且体现特定行为的对象。\n\
  \n\n\n### 为什么要在 Python 中使用面向对象编程？\n\n我们在 Python 中使用面向对象编程（OOP），是为了将代码组织成可复用、模块化的单元，这些单元被称为对象，它们将数据与功能结合在一起。这种方法简化了复杂的软件开发，使代码更易于理解、维护和扩展。\n\
  \n**面向对象编程**\n\n-   通过**继承**增强代码复用性。\n-   通过**多态**实现灵活的代码交互。\n-   通过将问题分解为可管理的对象来改进问题解决能力。\n\
  -   促进**数据封装**，确保代码管理安全且结构清晰。这种方法论与 Python 追求清晰、逻辑化代码的理念高度契合，适用于从小型到大型的各种项目。\n\n\
  **OOP 与结构化编程的对比**\n\n-   **维护性：** OOP 通常比结构化编程更易于维护，后者维护起来可能更具挑战性。\n-   **代码重复：**\
  \ OOP 遵循“不要重复自己”（DRY）原则，最大限度地减少代码重复；而结构化编程可能涉及代码在多个位置重复。\n-   **代码复用性：** 在 OOP 中，小而可复用的代码段很常见，这与结构化编程中大型代码块集中化的特点不同。\n\
  -   **编程模型：** OOP 采用基于对象的模型，而结构化编程依赖于顺序执行的代码块模型。\n-   **调试：** 由于其模块化特性，OOP 中的调试通常更直接，而在结构化编程中可能更复杂。\n\
  -   **学习曲线：** OOP 的学习曲线较陡，而结构化编程通常被认为对初学者更友好。\n-   **项目适用性：** OOP 更适合复杂的大型项目，而结构化编程更适用于简单的小型程序。\n\
  \n#### Python 中一切都是对象\n\n这里有一个内行才知道的小知识：在你学习 Python 的整个过程中，你其实一直沉浸在面向对象编程（OOP）中，也许你自己都没有意识到。在\
  \ Python 中，无论你使用哪种编程范式，你几乎在每一个操作中都在与对象打交道。\n\n这源于 Python 的核心原则：**Python 中的一切都被视为对象**。回想一下对象的构成：在\
  \ Python 中，一个对象封装了数据（称为属性）和功能（称为方法）。这个概念完美地适用于 Python 中的每一种数据类型。\n\n以字符串为例；它本质上是一个数据集合（其中的字符）加上一组功能或行为（如\
  \ `upper()`、`lower()` 等方法）。这个原则同样适用于其他数据类型，如整数、浮点数、布尔值、列表和字典。\n\n**示例：**\n\n```\n\
  text = \"Hello, Python!\"\nprint(text.upper())  # 使用 upper() 方法\n```\n\n**输出：**\n\
  \n```\nHELLO PYTHON\n```\n\n#### 属性和方法\n\n**在继续之前，回顾一下我们所说的属性和方法会很有帮助：**\n\n-  \
  \ **属性**类似于对象内部的变量，用于保存与该对象相关的数据。\n-   **方法**类似于函数，区别在于它们绑定在对象本身上，提供了可以对对象数据执行或操作的特定行为或动作。\n\
  \n### 你的第一个 Python 对象\n\n让我们通过创建一个“Book”类，然后实例化它来创建一个“Book”对象，以此考虑一个简单的 Python 对象示例。这个示例将说明\
  \ Python 如何将一切视为对象，包括属性（数据）和方法（功能）。\n\n#### 定义 'Book' 类\n\n首先，我们定义一个名为“Book”的类，它就像创建“Book”对象的蓝图。这个类将拥有存储数据（如书名和作者）的属性，以及一个显示这些信息的方法。\n\
  \n```\nclass Book:\n    def __init__(self, title, author):\n        self.title =\
  \ title\n        self.author = author\n\n    def display_info(self):\n        print(f\"\
  Book Title: {self.title}\\nAuthor: {self.author}\")\n```\n\n**解释：**\n\n-   `__init__`\
  \ 是 Python 中的一个特殊方法，称为构造函数。它从类中初始化新对象，设置它们的初始状态。在这个例子中，它接收 `title` 和 `author` 作为参数，并将它们赋值给对象的属性（`self.title`\
  \ 和 `self.author`）。每次我们实例化一个对象时，它都会被调用。\n-   `display_info` 是一个定义好的方法，用于执行与对象相关的操作，即显示书的标题和作者。\n\
  \n#### 创建并使用一个 “Book” 对象\n\n现在，让我们使用“Book”类蓝图创建一个实际的“Book”对象，然后使用它的方法。\n\n```\n\
  # 创建一个 Book 对象\nmy_book = Book(\"The Catcher in the Rye\", \"J.D. Salinger\")\n\n\
  # 使用 Book 对象的 display_info 方法\nmy_book.display_info()\n```\n\n**这将输出：**\n\n```\n\
  Book Title: The Catcher in the Rye\nAuthor: J.D. Salinger\n```\n\n`my_book` 实例是\
  \ `Book` 类的一个对象。它封装了数据（书名和作者属性），并通过一个方法（`display_info`）提供了功能。这个对象是 Python 中 OOP\
  \ 原则的一个实际体现，展示了数据和相关行为是如何捆绑在一起的。每个 `Book` 对象可以保存不同的数据，展示了对象在以结构化方式管理状态和行为方面的强大能力。\n\
  \n### Python 中的面向对象编程（OOP）建立在四个基本概念之上\n\n#### 抽象\n\n抽象涉及隐藏系统的复杂现实，以简化用户（可能是最终用户或其他开发者）与它的交互。这类似于知道如何操作智能手机，却无需了解其内部过程的复杂细节，或者使用\
  \ Python 开发应用程序，却无需掌握其底层机制。在编程中，抽象允许将通用功能提炼到类中，从而使对象及其交互的管理更加直接。\n\n**示例：**\n\n\
  ```\nfrom abc import ABC, abstractmethod\n\n# 定义一个抽象基类 (ABC)\nclass Shape(ABC):\n\
  \    @abstractmethod\n    def area(self):\n        pass\n\n# 创建一个继承自 Shape 的具体类\n\
  class Circle(Shape):\n    def __init__(self, radius):\n        self.radius = radius\n\
  \n    def area(self):\n        return 3.1415 * self.radius ** 2\n\n# 创建一个继承自 Shape\
  \ 的具体类\nclass Rectangle(Shape):\n    def __init__(self, width, height):\n      \
  \  self.width = width\n        self.height = height\n\n    def area(self):\n   \
  \     return self.width * self.height\n\n# 实例化对象并计算面积\ncircle = Circle(5)\nrectangle\
  \ = Rectangle(4, 6)\n\nprint(\"Circle Area:\", circle.area())  # 输出: Circle Area:\
  \ 78.53750000000001\nprint(\"Rectangle Area:\", rectangle.area())  # 输出: Rectangle\
  \ Area: 24\n```\n\n**输出：**\n\n```\nCircle Area: 78.53750000000001\nRectangle Area:\
  \ 24\n```\n\n\n\n### 继承\n\n继承是类从已有类中派生特征和行为的机制。这一原则支持“不要重复自己”（DRY）的理念，通过将共享属性和方法纳入基类（超类）来实现代码复用。这个概念类似于生物遗传，子类从父类（超类）继承特征和行为，展示共享的属性以及可能共享的方法。\n\
  \n**示例：**\n\n```python\n# 父类（超类）\nclass Animal:\n    def __init__(self, name):\n\
  \        self.name = name\n    def speak(self):\n        pass  # speak 方法的占位符\n\n\
  # 从 Animal 继承的子类\nclass Dog(Animal):\n    def speak(self):\n        return f\"{self.name}\
  \ 说 汪汪！\"\n\n# 从 Animal 继承的子类\nclass Cat(Animal):\n    def speak(self):\n      \
  \  return f\"{self.name} 说 喵喵！\"\n\n# 创建子类的实例\ndog = Dog(\"Buddy\")\ncat = Cat(\"\
  Whiskers\")\n\n# 为每个实例调用 speak 方法\nprint(dog.speak())  # 输出：Buddy 说 汪汪！\nprint(cat.speak())\
  \  # 输出：Whiskers 说 喵喵！\n```\n\n**输出：**\n\n```\nBuddy 说 汪汪！\nWhiskers 说 喵喵！\n```\n\
  \n### 多态\n\n多态允许在子类中定制最初在超类中定义的方法和属性，体现了“多种形态”的概念。它允许在不同类中创建同名但实现不同的方法。回顾我们现实生活中的类比，孩子（子类）可能从父母那里继承了一个共同的行为，比如感到饥饿（一个方法），但具体细节，比如饥饿的频率，可能有所不同，这就展示了多态性。\n\
  \n**示例：**\n\n```python\n# 父类（超类）\nclass Animal:\n    def __init__(self, name):\n\
  \        self.name = name\n    def speak(self):\n        pass  # speak 方法的占位符\n\n\
  # 从 Animal 继承的子类\nclass Dog(Animal):\n    def speak(self):\n        return f\"{self.name}\
  \ 说 汪汪！\"\n\n# 从 Animal 继承的子类\nclass Cat(Animal):\n    def speak(self):\n      \
  \  return f\"{self.name} 说 喵喵！\"\n\n# 接受 Animal 对象并调用其 speak 方法的函数\ndef animal_sound(animal):\n\
  \    return animal.speak()\n\n# 创建子类的实例\ndog = Dog(\"Buddy\")\ncat = Cat(\"Whiskers\"\
  )\n\n# 使用不同的对象调用 animal_sound 函数\nprint(animal_sound(dog))  # 输出：Buddy 说 汪汪！\nprint(animal_sound(cat))\
  \  # 输出：Whiskers 说 喵喵！\n```\n\n**输出：**\n\n```\nBuddy 说 汪汪！\nWhiskers 说 喵喵！\n```\n\
  \n### 封装\n\n封装确保类内部数据的安全，保护数据的完整性和隐私。尽管 Python 没有通过语法显式支持私有属性，但它通过名称修饰以及使用 getter\
  \ 和 setter 方法来实现对数据的受控访问和修改，从而达到封装的目的。\n\n**示例：**\n\n```python\nclass Human:\n \
  \   def __init__(self, name, age):\n        self.__name = name  # 私有属性\n       \
  \ self.__age = age    # 私有属性\n\n    # name 的 getter 方法\n    def get_name(self):\n\
  \        return self.__name\n\n    # age 的 setter 方法\n    def set_age(self, age):\n\
  \        if age > 0 and age < 150:  # 添加验证\n            self.__age = age\n     \
  \   else:\n            print(\"无效的年龄\")\n\n    # 显示信息的方法\n    def display_info(self):\n\
  \        print(f\"姓名：{self.__name}，年龄：{self.__age}\")\n\n# 创建 Human 类的实例\nperson\
  \ = Human(\"Alice\", 30)\n\n# 直接访问属性（不推荐）\n# 这将引发错误：AttributeError: 'Human' object\
  \ has no attribute '__name'\n# print(person.__name)\n\n# 使用 getter 方法访问属性\nprint(\"\
  姓名：\", person.get_name())  # 输出：姓名：Alice\n\n# 使用 setter 方法设置年龄（带验证）\nperson.set_age(35)\n\
  person.display_info()  # 输出：姓名：Alice，年龄：35\n\n# 设置无效年龄\nperson.set_age(200)  # 输出：无效的年龄\n\
  ```\n\n**输出：**\n\n```\n姓名：Alice\n姓名：Alice，年龄：35\n无效的年龄\n```\n\n## 模块与文件处理\n\n###\
  \ Python 模块\n\nPython 模块本质上是一个包含内置函数、类和变量集合的文件，每个元素都有特定用途。Python 拥有众多模块，每个模块都针对处理不同的任务而定制。在本文中，我们将深入探讨\
  \ Python 模块的领域，探索诸如创建自定义模块、在 Python 中导入模块、为模块名称使用别名等主题。\n\n### 理解 Python 模块\n\n\
  Python 模块是 Python 定义和语句的容器，包含函数、类、变量甚至可执行代码。将相关代码组织在一个模块中，有助于增强代码的可理解性、逻辑组织性和可重用性。\n\
  \n### 创建 Python 模块\n\n要创建一个 Python 模块，你只需编写所需的代码，并将其保存为扩展名为 `.py` 的文件，命名为 `math_operations`。\n\
  \n**示例：**\n\n```python\n# math_operations.py\n# 将两个数相加的函数\ndef add(x, y):\n    return\
  \ x + y\n\n# 将两个数相减的函数\ndef subtract(x, y):\n    return x - y\n```\n\n### 在 Python\
  \ 中导入模块\n\nPython 允许我们使用源文件中的 `import` 语句，将在一个模块中定义的函数和类导入到另一个模块中。当解释器遇到 `import`\
  \ 语句时，如果该模块位于搜索路径中，它就会导入该模块。\n\n> **注意：** 搜索路径  \n> *搜索路径本质上是解释器在搜索模块时扫描的目录列表。*\n\
  \n如果你保留我们之前创建的文件，并创建一个新文件来调用它，你应该具有以下结构：\n\n```\n├── calc.py\n└── math_operations.py\n\
  ```\n\n现在，要导入名为 `math_operations.py` 的模块，请在脚本开头包含以下命令：\n\n**示例：**\n\n```python\n\
  # 导入 math_operations 模块\nimport math_operations\n\n# 使用模块中的函数\nresult_add = math_operations.add(5,\
  \ 3)\nresult_subtract = math_operations.subtract(10, 4)\n\nprint(\"加法结果：\", result_add)\n\
  print(\"减法结果：\", result_subtract)\n```\n\n**输出：**\n\n```\n加法结果：8\n减法结果：6\n```\n\n\
  > **注意：** 点运算符  \n> *这会导入模块本身，而不是其函数或类。要访问模块的内容，你需要使用点（`.`）运算符。*\n\n#### 使用 `from`\
  \ 语句进行 Python 导入\n\nPython 的 `from` 语句允许从模块中选择性地导入特定属性，而无需导入整个模块。\n\n**示例：**\n\n\
  ```python\n# 导入 math 模块，并专门导入 sqrt 函数\nfrom math import sqrt\n\n# 使用导入的函数计算平方根\n\
  number = 25\nresult = sqrt(number)\n\n# 显示结果\nprint(f\"{number} 的平方根是 {result}\"\
  )\n```\n\n**输出：**\n\n```\n25 的平方根是 5.0\n```\n\n#### 从 Python 模块导入特定属性\n\n**示例：**\n\
  \n```python\n# 从内置的 \"math\" 库中导入特定属性\nfrom math import pi, sqrt\n\n# 使用导入的属性\n\
  print(f\"圆周率 pi 的值约为：{pi}\")\nnumber = 25\nresult = sqrt(number)\nprint(f\"{number}\
  \ 的平方根是：{result}\")\n```\n\n**输出：**\n\n```\n圆周率 pi 的值约为：3.141592653589793\n25 的平方根是：5.0\n\
  ```\n\n#### 导入所有名称\n\n星号（`*`）符号与 `import` 语句结合使用时，会将模块中的所有名称导入到当前命名空间。\n\n**语法：**\n\
  \n```python\nfrom module_name import *\n```\n\n使用 `*` 有其优点和缺点。如果你确切知道需要从模块中获取什么，不建议使用它。请谨慎使用。\n\
  \n\n\n### 定位 Python 模块\n\n在 Python 中导入模块时，解释器会在多个位置进行搜索。首先，它会检查内置模块；如果未找到，则会探索 `sys.path`\
  \ 变量中定义的目录列表。`sys.path` 变量包含一个目录列表，Python 会在此列表中搜索所需的模块。\n\n**示例：**\n\n```python\n\
  import sys\nimport importlib\n# 向模块搜索路径添加自定义目录\ncustom_module_path = \"/path/to/custom_module_directory\"\
  \nsys.path.append(custom_module_path)\n# 尝试从自定义目录导入模块\nmodule_name = \"custom_module\"\
  \ntry:\n    custom_module = importlib.import_module(module_name)\n    print(f\"\
  成功从 {custom_module.__file__} 导入 {module_name}\")\nexcept ImportError:\n    print(f\"\
  导入 {module_name} 失败\")\n# 打印当前模块搜索路径\nprint(\"当前模块搜索路径：\")\nfor path in sys.path:\n\
  \    print(path)\n```\n\n**我的电脑上的输出：**\n\n```\nFailed to import custom_module\n\
  Current module search path:\nC:\\Users\\didog\\OneDrive\\Desktop\\test\\test\nC:\\\
  Users\\didog\\OneDrive\\Desktop\\test\\test\nC:\\Program Files\\JetBrains\\PyCharm\
  \ 2023.2\\plugins\\python\\helpers\\pycharm_display\nC:\\Users\\didog\\AppData\\\
  Local\\Programs\\Python\\Python311\\python311.zip\nC:\\Users\\didog\\AppData\\Local\\\
  Programs\\Python\\Python311\\DLLs\nC:\\Users\\didog\\AppData\\Local\\Programs\\\
  Python\\Python311\\Lib\nC:\\Users\\didog\\AppData\\Local\\Programs\\Python\\Python311\n\
  C:\\Users\\didog\\OneDrive\\Desktop\\test\\test\\.venv\nC:\\Users\\didog\\OneDrive\\\
  Desktop\\test\\test\\.venv\\Lib\\site-packages\nC:\\Program Files\\JetBrains\\PyCharm\
  \ 2023.2\\plugins\\python\\helpers\\pycharm_matplotlib_backend\n/path/to/custom_module_directory\n\
  ```\n\n### 重命名 Python 模块\n\n在导入模块时，可以使用 `as` 关键字为其重命名。\n\n**语法：**\n\n```python\n\
  import 模块名 as 别名\n```\n\n### Python 内置模块\n\nPython 提供了大量内置模块，这些模块提供了各种功能和特性。Python\
  \ 中一些最流行的内置模块包括：\n\n- **math：** 提供数学函数和常量，例如 `sqrt`、`sin`、`cos`、`pi` 等。\n- **os：**\
  \ 允许与操作系统交互，支持文件和目录操作、环境变量以及进程管理等任务。\n- **sys：** 提供对 Python 解释器变量和函数的访问，例如命令行参数和系统特定设置。\n\
  - **datetime：** 简化日期和时间的处理，允许你创建、操作和格式化日期及时间间隔。\n- **random：** 提供生成随机数和执行随机抽样的函数。\n\
  - **json：** 支持 JSON（JavaScript 对象表示法）数据的编码和解码，便于处理 JSON 文件和 Web API。\n- **re：**\
  \ 支持用于模式匹配和文本操作的正则表达式。\n- **collections：** 提供专门的数据结构，如 `Counter`、`defaultdict` 和\
  \ `namedtuple`，用于更高级的数据处理。\n- **urllib：** 提供处理 URL 和从网络资源获取数据的工具，常用于网络爬虫和网络请求。\n\
  - **csv：** 提供用于读写 CSV（逗号分隔值）文件的实用程序，常用于数据存储和交换。\n- **sqlite3：** 允许与 SQLite 数据库交互，适用于轻量级数据库操作。\n\
  - **argparse：** 通过解析命令行参数和生成帮助信息，简化命令行界面（CLI）的创建。\n- **os.path：** 提供操作文件路径以及检查文件和目录是否存在的方法。\n\
  - **logging：** 提供一个灵活且可配置的日志记录框架，用于调试和监控代码。\n- **socket：** 提供网络通信能力，包括创建和操作用于网络连接的套接字。\n\
  - **multiprocessing：** 通过提供更高级别的进程管理接口，促进并行和并发编程。\n\n这些只是 Python 中一些流行的内置模块。Python\
  \ 庞大的标准库包含更多模块，每个模块都有特定的用途，使 Python 成为适用于广泛应用程序的多功能语言。\n\n### Python 文件处理\n\nPython\
  \ 提供了强大的文件处理能力，使用户能够与文件进行交互，涵盖读取、写入以及一系列其他与文件相关的操作。虽然文件处理的概念存在于各种编程语言中，但 Python\
  \ 以其直接而简洁的实现方式脱颖而出。在进行文件操作时，Python 会根据文件是文本格式还是二进制格式进行不同处理，这是一个需要牢记的关键区别。\n\n在 Python\
  \ 中，每一行代码都由一系列字符组成，实际上形成了一个文本文件。值得注意的是，文本文件中的每一行都以一个称为行尾（EOL）的特殊字符结束，该字符可以是逗号 `{,}`\
  \ 或换行符。这个 EOL 字符标志着当前行的结束，并向解释器指示新的一行即将开始。让我们深入探讨在 Python 中读写文件的基本要点。\n\n\n\n"
- "# Python 文件打开\n\n在执行任何文件操作（如读取或写入）之前，第一步是打开文件。为此，Python 提供了内置函数 `open()`。然而，在打开文件时，必须指定模式，该模式指明了打开文件的目的。\n\
  \n**示例：**\n\n创建文件 `example.txt` 并将其放在与你的 `.py` 文件相同的文件夹中。\n\n**我的 `example.txt`\
  \ 包含以下内容：**\n\n> *Lorem Ipsum 是印刷和排版行业的简单占位文本。自 16 世纪以来，Lorem Ipsum 一直是行业标准的占位文本，当时一位不知名的印刷商取了一盘铅字并打乱它们，制作了一本字体样本册。它不仅存活了五个世纪，还成功进入了电子排版时代，基本保持不变。它在\
  \ 20 世纪 60 年代因包含 Lorem Ipsum 段落的 Letraset 纸张的发布而普及，最近又随着像 Aldus PageMaker 这样的桌面出版软件（包含各种版本的\
  \ Lorem Ipsum）而流行。*\n\n如果我们遵循树形结构，那么文件应如下所示：\n\n```\n├── example.txt\n└── test.py\n\
  ```\n\n```\n# 指定文件路径（请替换为实际文件路径）\nfile_path = \"example.txt\"\ntry:\n    # 打开文件并读取其内容\n\
  \    file = open(file_path, 'r')\n    file_contents = file.read()\n    # 打印文件内容\n\
  \    print(file_contents)\n    # 关闭文件\n    file.close()\nexcept FileNotFoundError:\n\
  \    print(f\"未找到文件 '{file_path}'。\")\nexcept IOError:\n    print(f\"读取文件 '{file_path}'\
  \ 时发生错误。\")\n```\n\n**输出：**\n\n```\nLorem Ipsum is simply dummy text of the printing\
  \ and typesetting industry. Lorem Ipsum has been the industry's standard dummy text\
  \ ever since the 1500s, when an unknown printer took a galley of type and scrambled\
  \ it to make a type specimen book. It has survived not only five centuries, but\
  \ also the leap into electronic typesetting, remaining essentially unchanged. It\
  \ was popularized in the 1960s with the release of Letraset sheets containing Lorem\
  \ Ipsum passages, and more recently with desktop publishing software like Aldus\
  \ PageMaker including versions of Lorem Ipsum.\n```\n\n**支持以下模式：**\n\n*   `r`：以读取模式打开现有文件。\n\
  *   `w`：以写入模式打开现有文件。如果文件已包含数据，则会被覆盖。如果文件不存在，则会创建它。\n*   `a`：以追加模式打开现有文件。它不会覆盖现有数据。\n\
  *   `r+`：允许读取和写入文件中的数据。文件中的现有数据将被覆盖。\n*   `w+`：允许写入和读取数据。它会覆盖现有数据。\n*   `a+`：允许追加和读取文件中的数据。它不会覆盖现有数据。\n\
  \n## 在读取模式下工作\n\n在 Python 中，有多种方法可以从文件中读取内容。让我们探讨一下当文件以读取模式打开时，如何检索文件内容。\n\n**在以下示例中，我们将打开包含以下内容的文件\
  \ `test.txt`：**\n\n*Lorem Ipsum 是印刷和排版行业的简单占位文本。自 16 世纪以来，Lorem Ipsum 一直是行业标准的占位文本，当时一位不知名的印刷商取了一盘铅字并打乱它们，制作了一本字体样本册。它不仅存活了五个世纪，还成功进入了电子排版时代，基本保持不变。它在\
  \ 20 世纪 60 年代因包含 Lorem Ipsum 段落的 Letraset 纸张的发布而普及，最近又随着像 Aldus PageMaker 这样的桌面出版软件（包含各种版本的\
  \ Lorem Ipsum）而流行。*\n\n**示例：**\n\n```\n# 以读取模式（'r'）打开名为 \"test.txt\" 的文件\nfile =\
  \ open('test.txt', 'r')\n# 逐行打印文件中的每一行\nfor line in file:\n    print(line, end='')\
  \  # 打印每一行，不添加额外的换行符\n# 关闭文件\nfile.close()\n```\n\n**输出：**\n\n```\nLorem Ipsum is\
  \ simply dummy text of the printing and typesetting industry. Lorem Ipsum has been\
  \ the industry's standard dummy text ever since the 1500s, when an unknown printer\
  \ took a galley of type and scrambled it to make a type specimen book. It has survived\
