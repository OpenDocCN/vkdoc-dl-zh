  \nHugging Face 的突出特点在于它提供了**预训练模型**。这一关键创新意味着开发者不再需要从零开始启动项目；相反，他们可以利用这些现成的模型，根据自身特定需求进行调整，从而简化开发流程。\n\
  \nHugging Face 是数据科学家、研究人员和机器学习工程师分享见解、寻求支持并为更广泛的开源运动做出贡献的重要聚集地。Hugging Face 将自己定位为“*构建未来的人工智能社区*”，其理念深深植根于社区驱动的进步。\n\
  \n该平台的快速扩张也归功于其用户友好的设计，无论是初学者还是经验丰富的专业人士都能轻松上手。通过努力积累最广泛的 NLP 和 ML 资源，Hugging Face\
  \ 的使命是让 AI 技术大众化，使其广泛惠及全球用户。\n\n\n\n### Hugging Face 的发展历程\n\nHugging Face 于 2016\
  \ 年作为一家美法合资企业起步，最初专注于打造一款面向青少年的 AI 驱动聊天机器人。公司的转折点出现在它决定将聊天机器人的底层模型向全球开源，这一举措使其发展轨迹转向为\
  \ AI 领域提供强大且易于使用的工具。\n\n2018 年发布的变革性 `Transformers` 库是 Hugging Face 发展史上的里程碑，它将\
  \ `BERT` 和 `GPT` 等预训练模型引入 AI 社区，这些模型迅速成为 NLP 任务的基础工具。\n\n在随后的几年里，Hugging Face 深刻重塑了机器学习格局。其对开源协作的承诺激发了\
  \ NLP 领域的创新浪潮，培育了共同成长与技术进步的社区文化。\n\nHugging Face 已发展成为模型与数据集交换的核心枢纽，加速了 AI 领域的研究进展与实际应用。\n\
  \n### Hugging Face 的核心组件\n\nHugging Face 已成为自然语言处理（NLP）领域的基石，提供了一套满足多样化语言处理需求的工具和资源。以下是其核心组件与功能的概述。\n\
  \n#### Transformers 库\n\nHugging Face 的核心是 `Transformers` 库，这是一个专为 NLP 任务量身定制的尖端机器学习模型集合。该库包含大量预训练模型，适用于文本分析、内容生成、语言翻译和摘要创建等应用。`pipeline()`\
  \ 方法的引入简化了将这些复杂模型应用于实际场景的过程，为各种 NLP 任务提供了直观的 API。该库对于普及先进 NLP 技术至关重要，使用户能够轻松定制和部署复杂的模型。\n\
  \n#### Hugging Face Hub\n\nHugging Face Hub 是一个动态的在线仓库，在撰写本书时，它拥有超过 35 万个模型、7.5\
  \ 万个数据集和 15 万个演示应用（称为 Spaces）的惊人收藏，所有这些资源都是开源且免费访问的。该平台被设计为一个协作生态系统，使个人能够发现、实验、协作和开发机器学习技术。作为关键的聚集地，Hub\
  \ 促进了机器学习项目的探索与创建，鼓励社区内的开放协作与创新。\n\nHugging Face Hub 采用基于 Git 的仓库来对所有相关文件进行版本控制管理。这包括以下内容：\n\
  \n- **模型：** 专为 NLP、视觉和音频处理任务量身定制的全面尖端模型集合\n- **数据集：** 涵盖各种领域和类型的广泛数据集合，支持多样化的机器学习项目\n\
  - **Spaces：** 允许在网页浏览器中直接演示机器学习模型的交互式应用\n\n此外，Hub 还配备了版本控制、提交历史、差异对比、分支以及与十多个库的集成等功能。如需深入了解这些功能，可查阅仓库文档。\n\
  \n#### 模型中心\n\n作为社区的枢纽，模型中心（图 7-1）是用户探索和分享大量模型与数据集的地方。该功能促进了 NLP 开发的协作环境，使从业者能够贡献自己的模型，并从社区的集体智慧中受益。模型中心在\
  \ Hugging Face 网站上易于导航，提供多种筛选器帮助用户找到适合特定任务的模型。该中心对于培育一个动态、不断发展的生态系统至关重要，新模型在此定期添加和优化。\n\
  \n![图 7-1](img/613844_1_En_7_Fig1_HTML.jpg)\n\n**图 7-1** 模型中心 - Hugging Face 可用模型\n\
  \n在超过 20 万个模型的庞大库中，你可以访问广泛的功能，包括以下内容：\n\n- **自然语言处理（NLP）：** 涵盖语言翻译、内容摘要和文本生成等多种任务。这些能力构成了\
  \ OpenAI 的 GPT-3 通过 ChatGPT 提供的核心功能。\n- **音频处理：** 你可以在此进行自动语音识别、检测说话（语音活动检测）或将文本转换为语音等操作。\n\
  - **计算机视觉：** 这些模型使计算机能够解释和理解来自世界的视觉信息。应用包括估计物体距离（深度估计）、图像分类以及图像到图像的转换。此类技术对于自动驾驶汽车等发展至关重要。\n\
  - **多模态模型：** 这些高级模型能够处理多种数据类型（文本、图像和音频）并生成输出。这种多功能性使其能够跨不同媒体实现广泛的应用。\n\n#### 分词器\n\
  \n作为文本预处理的关键，分词器将语言分解为可管理的片段（即 token），机器学习模型随后使用这些 token 来理解和生成人类语言。这些 token 可以代表单词、子词或字符，对于将文本转换为机器可读格式至关重要。Hugging\
  \ Face 的分词器针对与 `Transformers` 库的兼容性进行了优化，确保了对各种语言和文本格式的高效文本预处理。\n\n\n\n"
- '# 数据集库


  Hub 拥有超过 5,000 个数据集的丰富集合，涵盖 100 多种语言，适用于 NLP、计算机视觉和音频分析等广泛的应用领域。它简化了发现、下载和贡献数据集的过程。为了提升用户体验，每个数据集都通过数据集卡片提供全面的文档，并配有交互式数据集预览，支持在浏览器中直接探索。


  数据集库提供了一种编程方式来与这些数据集交互，使它们能够轻松集成到您的项目中。该库支持高效的数据处理，通过流式技术，即使数据集超出本地存储容量，也能访问其中最大的数据集。


  ## 示例应用


  首先，在 Hugging Face 上注册一个账户，然后安装所需的软件包（请注意，这些软件包是所选模型所必需的，对于其他模型可能有所不同）。


  代码首先使用 `pip` 安装必要的 Python 包。这些包包括 `torch` (PyTorch)、`huggingface_hub`、`torch accelerate`、`torchaudio`、`datasets`、`transformers`
  和 `pillow` (PIL – Python 图像库)。这些包对于处理深度学习模型、数据集和图像处理至关重要。


  ```

  !pip install torch

  !pip install --upgrade huggingface_hub

  !pip install torch accelerate torchaudio datasets

  !pip install --upgrade transformers

  !pip install git+https://github.com/huggingface/transformers.git

  !pip install pillow

  ```


  安装所需的软件包后，代码会从这些包中导入必要的模块和函数。关键导入包括用于与 Hugging Face 模型 Hub 交互的 `huggingface_hub`、用于访问预训练模型的
  `transformers`、用于处理图像的 `PIL.Image`、用于发起 HTTP 请求获取图像的 `requests`、用于神经网络操作的 `torch.nn`
  以及用于绘制图像的 `matplotlib.pyplot`。


  ```

  from transformers import SegformerImageProcessor, AutoModelForSemanticSegmentation

  from PIL import Image

  import requests

  import matplotlib.pyplot as plt

  import torch.nn as nn

  ```


  **登录 Hugging Face 模型 Hub：** 代码使用 `login()` 函数登录 Hugging Face 模型 Hub。如果您计划使用 Hugging
  Face 平台上托管的私有模型或数据集，则需要执行此步骤。


  ```

  from huggingface_hub import login

  login()

  ```


  **应用代码的后续步骤：**


  - **初始化图像处理器和模型：** 它初始化一个图像处理器（`SegformerImageProcessor`）和一个语义分割模型（`AutoModelForSemanticSegmentation`）。这些模型使用指定的模型名称（`mattmdjaga/segformer_b2_clothes`）从
  Hugging Face 模型 Hub 加载。这些模型在大型数据集上进行了预训练，可以针对语义分割等推理任务进行微调或直接使用。


  - **获取图像：** 代码使用 `requests` 模块从指定的 URL 获取图像，并使用 PIL 的 `Image.open()` 函数打开它。


  - **预处理图像：** 它使用初始化的图像处理器（`processor`）对获取的图像进行预处理。此步骤准备图像以输入到语义分割模型。


  - **模型推理：** 预处理后的图像作为输入馈送到语义分割模型（`model`）以获得分割预测。`model()` 函数返回 logits，它表示模型在应用任何激活函数之前的原始预测。


  - **上采样 Logits：** 使用双线性插值将获得的 logits 上采样到原始图像大小。这确保了分割预测与原始图像的尺寸匹配。


  - **提取分割掩码：** 代码通过对上采样后的 logits 沿通道维度执行 argmax 操作来提取预测的分割掩码。这会为每个像素识别出概率最高的类别，从而有效地生成分割掩码。


  - **显示分割掩码：** 最后，使用 `matplotlib.pyplot.imshow()` 显示预测的分割掩码。这可视化了分割掩码，突出显示了原始图像中与衣物对应的区域。


  ```

  processor = SegformerImageProcessor.from_pretrained("mattmdjaga/segformer_b2_clothes")

  model = AutoModelForSemanticSegmentation.from_pretrained("mattmdjaga/segformer_b2_clothes")

  url = "https://www.telegraph.co.uk/content/dam/luxury/2018/09/28/L1010137_trans_NvBQzQNjv4BqZgEkZX3M936N5BQK4Va8RWtT0gK_6EfZT336f62EI5U.JPG"

  image = Image.open(requests.get(url, stream=True).raw)

  inputs = processor(images=image, return_tensors="pt")

  outputs = model(**inputs)

  logits = outputs.logits.cpu()

  upsampled_logits = nn.functional.interpolate(

  logits,

  size=image.size[::-1],

  mode="bilinear",

  align_corners=False,

  )

  pred_seg = upsampled_logits.argmax(dim=1)[0]

  plt.imshow(pred_seg)

  ```


  总之，该代码段演示了如何使用预训练的语义分割模型对从 URL 获取的图像中的衣物进行分割，并可视化分割结果。


