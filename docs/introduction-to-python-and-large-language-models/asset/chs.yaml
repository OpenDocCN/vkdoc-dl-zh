  \ 文件）。继续将安装程序下载到你的电脑。\n\n找到你下载的安装程序文件（通常位于“下载”文件夹中），然后双击它以启动安装过程。随后，按照屏幕上的提示进行操作。\n\
  \n**步骤 3：验证 Python 和 IDLE 是否正确安装**\n\n安装过程完成后，你的桌面上会打开一个文件夹。在此文件夹内，点击“IDLE”应用程序。IDLE\
  \ 是 Python 自带的独立开发环境。启动 IDLE 后，Python shell 应会自动打开。\n\n**要验证其是否正常运行，你可以通过输入如下所示的打印命令进行测试：**\n\
  \n```\nprint(\"Test message\")\n```\n\n按下“回车”键，你应该会看到文本“Test message”出现在 IDLE 环境中的下一行。你也可以通过“终端”应用程序确认安装。打开“终端”并输入以下命令：\n\
  \n```\npython3 --version\n```\n\n按下“回车”键，你应该会在输出中看到你最近安装的 Python 版本。这确认了 Python\
  \ 已成功安装到你的 Mac 上。\n\n### 在 Linux 上安装 Python – Ubuntu/Debian 和 Fedora\n\n**步骤 1：检查是否已预装\
  \ Python**\n\n要确定你的系统上是否已安装 Python，请打开一个终端窗口并执行以下命令：\n\n```\npython --version\n\
  ```\n\n**步骤 2：通过包管理器安装 Python**\n\n在 Linux 系统上安装 Python 最直接的方法是使用与你发行版对应的包管理器。以下是针对流行发行版的一些常用命令：\n\
  \n**对于 Ubuntu/Debian，使用**\n\n```\nsudo apt-get install python3\n```\n\n**对于 Fedora，执行**\n\
  \n```\nsudo dnf install python3\n```\n\n这些命令将帮助你使用相应的包管理器轻松地在你的 Linux 发行版上安装 Python。\n\
  \n\n\n"
- '# 你的第一个 Python 程序


  你可以选择使用名为 IDLE 的简易代码编辑器，或者集成开发环境（IDE），后者是 Python 安装包的一部分。有多种方式可以交互式地运行 Python。你可以选择系统控制台、Python
  IDLE（图 3-4）或 Python Shell，所有这些都包含在 [`www.python.org`](http://www.python.org) 提供的标准
  Python 安装包中。


  要编写你的第一个程序，请打开它并输入以下代码行，然后按回车键：


  ```

  print("Hello, from IDLE!")

  ```


  你可以通过打开操作系统的终端应用程序并输入 `python3` 来激活 Python 解释器。此命令将在你的终端中启动 Python 解释器，使你能够直接从命令行与
  Python 进行交互。


  Python 在使用上具有多功能性，允许你以两种主要模式使用它：交互模式和脚本模式。你安装的 Python 程序本质上就是一个解释器。解释器会处理文本命令并在你输入时立即执行，这使得它特别适合实验和快速测试。


  '
- '# 变量与数据类型、数字、字符串和类型转换


  变量是我们在程序中想要存储和操作的数据的标签。让我们看一个例子：假设你的程序需要保存用户的姓名。为此，我们可以创建一个名为 `user_name` 的变量，并使用以下语句进行初始化：


  ```

  user_name = "John"

  ```


  一旦你定义了 `user_name` 变量，你的程序就会在计算机内存中分配一个特定区域来保存这些数据。随后，你可以通过其年龄 `user_age` 来访问和修改这些数据。在引入新变量时，你必须为其提供一个初始值。在这个例子中，我们为其赋值为
  `John`。需要注意的是，你之后随时可以在程序中更改这个值。


  此外，你还可以一步定义多个变量。只需这样写：


  ```

  use_rage, user_name = 30, ''Peter''

  ```


  ## 命名变量


  在 Python 中，变量名必须遵循一定的规则和约定：


  1. 变量名可以包含字母（大小写均可）、数字和下划线（`_`）。但是，它们必须以字母或下划线开头，第一个字符不能是数字。例如，有效的变量名有 `userName`、`user_name`
  或 `userName2`，但 `2userName` 是不允许的。


  2. 某些单词在 Python 中是保留字，因为它们在语言中已有预定义的含义。这些保留字包括 `print`、`input`、`if`、`while` 以及之前提到的所有保留关键字。你不能将这些保留字用作变量名。我们将在后续章节中更详细地探讨这些保留字。


  3. Python 中的变量名是区分大小写的。这意味着 `username` 和 `userName` 被视为不同的变量。


  在 Python 中命名变量时，有两种常见的约定可供遵循：


  - **驼峰式命名法：** 这种做法涉及使用大小写混合的复合词，其中除第一个单词外，每个单词都以大写字母开头。例如，`thisIsAVariableName`。本书的其余部分将使用此约定。


  - **下划线分隔法：** 另一种约定是使用下划线（`_`）来分隔变量名中的单词。对于喜欢这种风格的人来说，你可以将变量命名为 `this_is_a_variable_name`。


  - **帕斯卡命名法：** 与驼峰式命名法相同，但第一个单词也大写。例如：`NumberOfUsers`。


  最终，遵循这些规则和约定可以确保你的变量名在 Python 编程语言中既有效又具有可读性。


  使用下划线分隔变量名中的单词，也称为蛇形命名法，是 Python 变量命名约定中更广泛使用的一种。这种约定由官方 Python 风格指南 PEP 8 推荐，并被
  Python 社区广泛遵循。蛇形命名法被认为更符合 Python 风格，是大多数 Python 项目和库中变量名的首选风格。


  '
- '# 数据类型


  ## Python 中的数字


  Python 中有三种数字类型：


  - `int`

  - `float`

  - `complex`


  ```

  x = 10  # int

  y = 2.8 # float

  z = 3 + 2j # complex

  ```


  ### 整数


  整数表示整数，无论是正数还是负数，都没有小数部分。例如，在神经科学领域，研究人员可能会使用整数来统计特定时刻活跃神经元的数量。


  ### 浮点数


  浮点数，也称为浮点实数值，包含可以包含小数点的实数。例如，记录参与者完成特定任务的反应时间（以毫秒为单位）会用到浮点数。


  ### 复数


  在 Python 中，复数是一种内置数据类型，用于表示形式为 `a + bj` 的数字，其中 `a` 和 `b` 是实数，`j` 代表虚数单位，等于 -1 的平方根。复数通常用于需要同时处理实部和虚部的数学和科学计算中。


  你可以对 Python 中的复数执行各种运算，包括加法、减法、乘法、除法等。Python 的标准库提供了用于处理复数的函数和方法。


  **注意**


  数值变量


  当你为它们赋值时，它们会自动生成，这使得常规编码变得简单直接。因此，你可以为变量赋值，而无需关心指定它们的数据类型。


  ### 字符串


  字符串是字符的集合，可以包括字母、数字、符号或空格，在 Python 中用单引号或双引号括起来。需要注意的是，Python 中的字符串是不可变的，这意味着一旦创建了字符串，你就不能直接修改其内容；相反，你只能通过重新定义变量来覆盖它。


  ```

  >>> a = "Hello World!"

  >>> print(a)

  >>> Hello World!

  ```


  你可以使用 `print` 函数在屏幕上显示字符串。在 Python 中，字符串是字节序列，你可以使用索引（在 Python 中称为切片）来访问字符串中的特定字符，如代码示例所示：


  ```

  >>> a = "Hello World!"

  >>> print(a[0:2])

  >>> He

  ```


  请注意，切片字符串时，最后一个字符是不包含在内的！


  Python 中有许多用于操作字符串的内置函数；部分如下所示：


  - `split()`：按字符或空格分割字符串并将其转换为列表

  - `replace()`：将字符串中的一个字符替换为另一个字符

  - `upper()`：将字符串中的所有字符转换为大写

  - `lower()`：将字符串中的所有字符转换为小写

  - `len()`：获取字符串的长度




  '
- '# 字符串定界符与特性


  在 Python 中，你可以使用单引号或双引号来定义字符串字面量。起始定界符与对应结束定界符之间包含的任何字符都被视为字符串的一部分。Python 对字符串的长度没有严格限制，只要机器内存资源允许，它可以包含任意数量的字符。此外，字符串甚至可以是空的。


  *当需要将引号本身作为字符串的一部分包含进来时，该如何处理？* 正如你所见，直接的方法会遇到问题。在给定的示例中，字符串以单引号开头，导致 Python 将括号内的下一个单引号解释为结束定界符，无意中将其视为字符串的一部分。因此，最后一个单引号变成了多余的字符，导致语法错误：


  ```

  >>> print(''This is a single quote ('') character.'')

  SyntaxError: invalid syntax

  ```


  要在字符串中包含任何一种引号，一个简单有效的方法是使用相反类型的引号将字符串括起来。*如果你想包含单引号，就用双引号将字符串括起来；反之，如果需要包含双引号，就用单引号将字符串括起来。*
  这种方法可以确保所需的引号被正确解释为字符串的一部分。


  ```

  >>> print("This contains a single quote ('') character.")

  This string contains a single quote ('') character.

  >>> print(''This contains a double quote (") character.'')

  This string contains a double quote (") character.

  ```


  ## 处理字符串中的特殊字符


  在某些情况下，你可能需要 Python 以不同的方式解释字符串中的特定字符。


  **这可以通过两种方式实现：**


  - **抑制特殊解释：** 你可能希望阻止某些字符在字符串中具有其通常的特殊含义。

  - **应用特殊解释：** 或者，你可能希望赋予通常按字面意义处理的字符以特殊含义。


  为此，你可以使用反斜杠（`\`）字符。当反斜杠出现在字符串中时，它表示紧随其后的一个或多个字符应以特殊方式处理。这种机制被称为“转义序列”，因为反斜杠导致后续字符序列偏离其标准解释。


  ```

  >>> print(''String contains a single quote ('') character.'')

  SyntaxError: invalid syntax

  >>> print(''String contains a single quote (\'') character.'')

  This string contains a single quote ('') character.

  ```


  ### 原始字符串


  要表示原始字符串字面量，你可以使用前缀 `r` 或 `R`，这表示字符串中的转义序列将保持不变。这意味着反斜杠字符不会被解释为转义字符：


  **原始字符串：**


  ```

  print(r''foo\nbar'')

  foo\nbar

  ```


  **原始字符串：**


  ```

  print(R''foo\\bar'')

  foo\\bar

  ```


  在原始字符串中，反斜杠不被视为转义字符，从而保留其字面表示。


  ## Python 中的三引号字符串


  Python 提供了另一种定义字符串的方法，称为三引号字符串。这些字符串由三个连续的单引号（`''''''`）或三个连续的双引号（`"""`）括起来。虽然转义序列在三引号字符串中仍然有效，但你可以包含单引号、双引号甚至换行符而无需转义。此功能简化了包含单引号和双引号的字符串的创建：


  例如：


  ```

  print(''''''This string has a single ('') and a double (") quote.'''''')

  This string has a single ('') and a double (") quote.

  ```


  在三引号字符串中，包含单引号和双引号不需要转义字符，使其成为此类场景的便捷选择。


  '
- "# 布尔值与运算符\n\n## 布尔值\n\nPython 布尔类型是 Python 编程语言中内置的基本数据类型之一。其主要目的是传达给定表达式的真值，辅助逻辑评估。例如，表达式\
  \ `1 <= 2` 计算结果为 `True`，而 `0 == 1` 计算结果为 `False`。*全面理解 Python 布尔值的工作原理对于有效的 Python\
  \ 编程至关重要。*\n\n**Python 的布尔类型仅包含两个可能的值：**\n\n- `True`\n- `False`\n\nPython 中没有其他值属于\
  \ `bool` 类型。你可以通过使用内置的 `type()` 函数来确定 `True` 和 `False` 的类型：\n\n```\n>>> type(False)\n\
  <class 'bool'>\n>>> type(True)\n<class 'bool'>\n```\n\n*输出 `<class 'bool'>` 表明该变量是布尔数据类型。*\
  \ 值得注意的是，`bool` 类型是 Python 的内在组成部分，无需导入外部库。然而，名称 `bool` 本身并不是 Python 语言中的保留关键字。\n\
  \n**注意**\n\nPython 中的 `True` 和 `False`\n\n*Python 中的关键字 `True` 和 `False` 必须始终以大写字母开头。尝试使用小写的\
  \ `true` 或 `false` 会导致错误。*\n\n```\n>>> x = true\nTraceback (most recent call last):\n\
  \  File \"<stdin>\", line 1, in <module>\nNameError: name 'true' is not defined\n\
  ```\n\n## 将整数和浮点数转换为布尔值\n\n在 Python 中，你可以通过使用内置的 `bool()` 函数将整数和浮点数转换为布尔值。当整数、浮点数或复数的值为零时，它会产生布尔结果\
  \ `False`。相反，如果该数字设置为任何其他非零值（无论是正数还是负数），它都会计算为 `True`。\n\n**例如：**\n\n```\nzero_int\
  \ = 0\nbool(zero_int)\n# 输出: False\npos_int = 1\nbool(pos_int)\n# 输出: True\nneg_flt\
  \ = -5.1\nbool(neg_flt)\n# 输出: True\n```\n\n## 布尔运算符\n\n布尔运算围绕对真值和假值逻辑值的操作与组合展开。在\
  \ Python 中，布尔值表示为 `True` 或 `False`，你可以使用布尔运算符对它们执行操作。\n\n**Python 中常用的布尔运算符如下：**\n\
  \n- `or`\n- `and`\n- `not`\n- `==`（等于）\n- `!=`（不等于）\n\n在以下代码段中，两个变量 `A` 和 `B` 分别被赋值为布尔值\
  \ `True` 和 `False`。随后，使用布尔运算符对这些布尔值执行各种操作：\n\n```\nA = True\nB = False\nA or B \
  \      # 结果: True\nA and B      # 结果: False\nnot A        # 结果: False\nnot B   \
  \     # 结果: True\nA == B       # 结果: False\nA != B       # 结果: True\n```\n\n此外，你可以通过组合布尔运算符并使用括号确定优先级来创建复杂的布尔表达式：\n\
  \n```\nC = False\nA or (C and B)    # 结果: True\n(A and B) or C    # 结果: False\n\
  ```\n\n表 3-2 总结了布尔运算和布尔运算符。\n\n**表 3-2** 布尔运算\n\n| A | B | 非 A | 非 B | A == B |\
  \ A != B | A 或 B | A 与 B |\n|---|---|---|---|---|---|---|---|\n| T | F | F | T |\
  \ F | T | T | F |\n| F | T | T | F | F | T | T | F |\n| T | T | F | F | T | F |\
  \ T | T |\n| F | F | T | T | T | F | F | F |\n\n## Python 运算符\n\n运算符是用于对值和变量执行操作的特殊符号。它们包含一组专用于执行算术和逻辑计算的独特符号。运算符作用的对象称为操作数。\n\
  \n\n\n#### 算术运算符\n\n如表 3-3 所示，Python 算术运算符用于执行数学运算，包括加法、减法、乘法和除法。\n\n**表 3-3** Python\
  \ 算术运算符\n\n| 运算符 | 描述 | 语法 |\n| --- | --- | --- |\n| `+` | 加法：将两个操作数相加 | `x + y`\
  \ |\n| `–` | 减法：将两个操作数相减 | `x – y` |\n| `*` | 乘法：将两个操作数相乘 | `x * y` |\n| `/` | 除法（浮点）：第一个操作数除以第二个操作数\
  \ | `x / y` |\n| `//` | 除法（向下取整）：第一个操作数除以第二个操作数 | `x // y` |\n| `%` | 取模：返回第一个操作数除以第二个操作数的余数\
  \ | `x % y` |\n| `**` | 幂运算（指数）：返回第一个操作数的第二个操作数次幂 | `x ** y` |\n\n**示例：**\n\n```\n\
  >>> a = 3\n>>> b = 2\n>>> print(a + b)\n>>> print(a - b)\n>>> print(a * b)\n>>>\
  \ print(a % b)\n>>> print(a ** b)\n```\n\n**有两种类型的除法运算符：**\n\n- 浮点除法\n- 向下取整除法\n\
  \n**浮点除法示例：**\n\n```\n>>> print(5/5)\n>>> print(10/2)\n>>> print(-10/2)\n>>> print(20.0/2)\n\
  ```\n\n**输出：**\n\n```\n1.0\n5.0\n-5.0\n10.0\n```\n\n**向下取整除法示例：**\n\n```\n>>> print(10//3)\n\
  >>> print(-5//2)\n>>> print(5.0//2)\n>>> print(-5.0//2)\n```\n\n**输出：**\n\n```\n\
  2.0\n-3.0\n```\n\n#### 比较运算符\n\n表 3-4 展示了使用关系运算符进行的比较，涉及对值的评估，并根据条件是否满足产生 `True`\
  \ 或 `False` 的结果。\n\n**表 3-4** 关系运算符比较\n\n| 运算符 | 描述 | 语法 |\n| --- | --- | --- |\n\
  | `>` | 大于：如果左操作数大于右操作数，则为 `True` | `x > y` |\n| `<` | 小于：如果左操作数小于右操作数，则为 `True`\
