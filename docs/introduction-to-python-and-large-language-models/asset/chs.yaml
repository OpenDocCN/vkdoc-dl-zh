  \ 2/2 [00:01<00:00,  1.62it/s]\n['cat', 'dog']\n```\n\n**解释**\n\n上述代码利用 `Lamini`\
  \ 库进行文本分类，具体是将文本分类到不同的类别中。以下是代码各部分作用的详细说明：\n\n1.  **安装 Lamini**\n\n前两行（`\"!pip install\
  \ lamini\"` 和 `\"!pip install --upgrade lamini\"`）使用 Python 的包管理系统 `pip` 来安装 `Lamini`\
  \ 库并确保其为最新版本。\n\n2.  **导入 LaminiClassifier**\n\n`from lamini import LaminiClassifier`\
  \ 从 `lamini` 模块中导入 `LaminiClassifier` 类，该类是 `Lamini` 库的一部分。\n\n3.  **创建 LaminiClassifier\
  \ 实例**\n\n`llm = LaminiClassifier()` 创建了 `LaminiClassifier` 类的一个实例，该实例将用于文本分类任务。\n\
  \n4.  **定义提示词**\n    -   `prompts` 是一个字典，包含与不同类别关联的示例文本。字典中的每个键值对代表一个类别标签及其对应的示例文本。\n\
  \    -   在本例中，有两个类别：`\"cat\"` 和 `\"dog\"`，示例文本描述了每个类别相关的特征或行为。\n\n5.  **向类别添加数据**\n\
  \    -   `llm.add_data_to_class()` 方法用于向每个类别添加训练数据。它将提供的文本示例与相应的类别标签关联起来。\n    -\
  \   例如，`llm.add_data_to_class(\"dog\", [\"woof\", \"group oriented\"])` 将提供的文本 `\"\
  woof\"` 和 `\"group oriented\"` 添加到 `\"dog\"` 类别。\n    -   类似地，`llm.add_data_to_class(\"\
  cat\", [\"Oh, I prefer to do stuff on my own than dogs\", \"meow\"])` 将提供的文本添加到\
  \ `\"cat\"` 类别。\n\n6.  **使用提示词训练模型**\n\n`llm.prompt_train(prompts)` 使用提供的提示词和关联的示例文本训练\
  \ `Lamini` 分类器。此步骤涉及训练模型识别文本数据中的模式，并学习根据提供的示例将新的文本输入分类到适当的类别中。\n\n7.  **进行预测**\n\
  \    -   `llm.predict([\"I'm more independent than dogs\", \"woof\"])` 对提供的文本输入进行预测。\n\
  \    -   在本例中，模型根据使用提示词和示例文本进行的训练，为给定的文本 `\"I'm more independent than dogs\"` 和\
  \ `\"woof\"` 预测类别标签。\n\n**注意**\n\n环境变量\n\n*出于安全考虑，建议将你的 API 密钥添加为环境变量。*\n\n\n\n"
- "# Python 库的数据收集、清洗与准备\n\n大型语言模型（LLM）的有效性在很大程度上可归功于其庞大的规模，因为它们是基于海量数据集开发的。这种广泛的训练使它们能够比受限于数据多样性不足的小型模型更全面地掌握各种主题、体裁和语言。\n\
  \n指导这一方法的原则很简单：数据越多，性能越好。像 `C4`、`The Pile`、`The Bigscience Roots Corpus` 和 `OpenWebText`\
  \ 这样的数据集，通过聚合和精炼来自网络爬虫的大量文本集合，在扩大训练数据量方面发挥了关键作用，旨在增强 LLM 的预训练。\n\n然而，人工审查和精炼如此庞大数据集的成本高昂，意味着许多数据集存在质量问题。其重要性不仅体现在困惑度和验证损失等技术性能指标上；还意味着模型可能会无意中学习并传播其训练材料中存在的偏见。因此，理解这些数据集的性质和构成不仅是一项技术需求，其本身也是一个研究挑战。\n\
  \n由于数据是 LLM 发展的基石，理解和编目训练数据集的细节变得至关重要。这对于评估数据在模型预测和决策中的价值至关重要，尤其是因为训练数据的适用性会因应用场景的不同而有很大差异。推荐的策略是记录数据集中潜在的问题方面，而不是试图完全消除它们。\n\
  \n在机器学习领域，训练数据和测试（评估）数据之间通常存在相似性或一致性。然而，LLM 是在本质上是“原始文本”的数据上进行训练的，这在创建不重叠的训练集、验证集和测试集分割时带来了独特的挑战，尤其是在涉及基准数据集时。\n\
  \n基于这种理解，让我们来探讨管理训练这些先进模型所需的庞大数据集的方法！\n\n## 大型语言模型的数据收集与准备\n\n大型语言模型（LLM）的基础在于其预训练数据的质量和准备。与较小的模型不同，LLM\
  \ 的有效性和能力在很大程度上取决于其预训练语料库的丰富程度以及预处理的细致程度。\n\n### 数据获取\n\n开发一个强大的 LLM 始于收集一个全面的自然语言语料库，该语料库来源于各种平台。从这些来源收集的数据的多样性和数量直接影响模型的熟练程度。\n\
  \n**使用的数据类型**\n\n- **通用数据：** 当前 LLM 的大部分预训练语料库由通用数据组成，包括来自网页、书籍和对话的内容。这类数据因其广泛的可用性、多样性和易于获取而受到青睐，有助于模型理解和生成类似人类的文本。\n\
  \n- **专业数据：** 为了使 LLM 具备解决特定问题的能力，研究人员还会将专业数据集纳入训练组合中。这些数据集可以包括富含多语言内容、科学文献和编程代码的数据集，旨在提升模型在特定领域的专业知识。\n\
  \n### 什么是数据预处理？\n\n数据清洗，通常被称为数据预处理，是数据分析和机器学习模型开发领域中的一个关键阶段。这一阶段致力于对原始数据进行细致的检查、修改和纠正，以提升其质量、精确性和一致性。\n\
  \n数据清洗的本质在于能够识别并修正数据集中的错误、噪声、缺失元素、重复、不一致以及其他缺陷。这个精炼过程对于准备数据以进行后续的分析、建模和知识发现步骤至关重要。当数据集与模型的特定目标相关、具有多样性并保持高质量标准时，其价值会显著提升。\n\
  \n鉴于缺失值、重复和噪声等挑战普遍存在，大型数据集不能以其原始形式用于训练复杂的语言模型。此类数据集需要经过严格的清洗和标注程序，才能适用于训练大型语言模型。\n\
  \n这种转换对于在开发这些模型时充分利用算法、计算资源和其他技术进步的潜力至关重要。例如，GPT-3 的初始数据集达到了惊人的 45TB；然而，在清洗过程之后，只有\
  \ 570GB 的数据（约占原始数据量的 1%）达到了纳入训练语料库所需的高质量标准。\n\n### 准备用于训练的数据集\n\n语言模型的训练目标可能因其预期用途而异，但有一些关键实践需要采用，以确保\
  \ LLM 的训练数据既干净又可靠。\n\n**这些实践包括**\n\n- 管理不需要的数据\n- 去重\n- 去污染\n- 毒性和偏见控制\n- 个人身份信息控制\n\
  - 提示控制\n- 分词与向量化\n- 缺失数据处理\n- 数据增强\n\n\n\n### 管理无用数据\n\n大型数据集尽管规模庞大，但通常包含大量无用的内容，例如无意义的文本和标准模板材料，如\
  \ HTML 代码或占位符文本（例如 Lorem ipsum）。当从网络收集文本用于语言模型训练时，特别是对于包含多种语言的数据集，过滤掉这些“垃圾”数据至关重要。在训练模型根据前一个词元预测下一个词元之前，必须从数据集中清除此类元素。\n\
  \n像 `justext` 和 `trafilatura` 这样的工具和方法能有效消除标准网页填充内容，同时保持最小化无关内容（精确率）和保留所有相关内容（召回率）之间的平衡。此外，利用与网页内容相关的元数据也可以作为一种有效的过滤手段。\n\
  \n**一个使用 `trafilatura` 的简单示例：**\n\n```\nimport trafilatura\ndef filter_unwanted_data(url,\
  \ output_file, unwanted_keywords):\n# 从网页下载并提取文本内容\ndownloaded_data = trafilatura.fetch_url(url)\n\
  extracted_text = trafilatura.extract(downloaded_data)\n# 打开输出文件进行写入\nwith open(output_file,\
  \ 'w') as output_f:\n# 根据指定的关键词过滤掉无用数据\nfor line in extracted_text.split('\\n'):\n\
  if not any(keyword in line for keyword in unwanted_keywords):\noutput_f.write(line\
  \ + '\\n')\nif __name__ == \"__main__\":\n# 定义要提取内容的网页 URL\nurl = 'https://example.com'\n\
  # 定义输出文件路径\noutput_file_path = 'filtered_content.txt'\n# 定义无用关键词列表\nunwanted_keywords\
  \ = ['unwanted1', 'unwanted2', 'unwanted3']\n# 调用 filter_unwanted_data 函数过滤无用数据\n\
  filter_unwanted_data(url, output_file_path, unwanted_keywords)\nprint(\"无用数据已成功过滤！\"\
  )\nimport trafilatura\ndef filter_unwanted_data(url, output_file, unwanted_keywords):\n\
  # 从网页下载并提取文本内容\ndownloaded_data = trafilatura.fetch_url(url)\nextracted_text = trafilatura.extract(downloaded_data)\n\
  # 打开输出文件进行写入\nwith open(output_file, 'w') as output_f:\n# 根据指定的关键词过滤掉无用数据\nfor line\
  \ in extracted_text.split('\\n'):\nif not any(keyword in line for keyword in unwanted_keywords):\n\
  output_f.write(line + '\\n')\nif __name__ == \"__main__\":\n# 定义要提取内容的网页 URL - 可随意更改\
  \ URL\nurl = 'https://blog.hootsuite.com/what-is-discord/'\n# 定义输出文件路径\noutput_file_path\
  \ = 'filtered_content.txt'\n# 定义无用关键词列表，可随意添加\nunwanted_keywords = ['platform',\
  \ 'business', 'marketing']\n# 调用 filter_unwanted_data 函数过滤无用数据\nfilter_unwanted_data(url,\
  \ output_file_path, unwanted_keywords)\nprint(\"无用数据已成功过滤！\")\n```\n\n**文件中的内容：**\n\
