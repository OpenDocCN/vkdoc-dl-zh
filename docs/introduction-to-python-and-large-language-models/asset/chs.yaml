- '# 文本摘要与文档理解


  在大数据时代，海量文本数据凸显了高效文本摘要方法的关键意义。文本摘要技术能将冗长文档或文章提炼为清晰简洁的摘要，同时保留核心含义与关键信息，在信息检索、内容生成等多个领域具有重要价值。摘要已成为自然语言处理应用中不可或缺的组成部分。


  文本摘要是自然语言处理中的核心任务，旨在将大量文本压缩为更短但连贯的表述，同时保留关键信息。


  文本摘要主要有三种方法：*直接式*、*抽象式*和*抽取式*摘要。


  - **直接式摘要：** 这是最直接的方法，直接要求大语言模型提供文档摘要。虽然快速简便，但处理长文本或复杂文本时可能遇到困难。

  - **抽象式摘要：** 通过生成包含源文本中未直接出现的词语、短语或句子的简洁摘要。该方法依赖上下文理解与类人语言生成能力来阐述核心思想。借助大语言模型等先进技术，抽象式摘要技术旨在将内容提炼并改写为更简洁的形式。

  - **抽取式摘要：** 直接从源文本中选择并提取最相关的句子或短语组成摘要。该方法不涉及重写或生成新句子。抽取式摘要采用句子评分、排序等技术来定位并提取最重要的内容。




  ### 使用用户提供的 URL 进行文章摘要的应用


  ```

  from langchain.output_parsers import PydanticOutputParser

  from pydantic import field_validator

  from pydantic import BaseModel, Field

  from typing import List

  from langchain.prompts import PromptTemplate

  from langchain.llms import OpenAI

  import requests

  from newspaper import Article

  openai_key = ''YOUR-API-KEY''

  headers = {

  ''User-Agent'': ''Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
  like Gecko) Chrome/89.0.4389.82 Safari/537.36''

  }

  article_url = input("Enter Article URL To Be Summarized: ")

  session = requests.Session()

  try:

  response = session.get(article_url, headers=headers, timeout=10)

  if response.status_code == 200:

  article = Article(article_url)

  article.download()

  article.parse()

  else:

  print(f"Failed to fetch article at {article_url}")

  except Exception as e:

  print(f"Error occurred while fetching article at {article_url}: {e}")

  article_title = article.title

  article_text = article.text

  # create output parser class

  class ArticleSummary(BaseModel):

  title: str = Field(description="Title of the article")

  summary: List[str] = Field(description="Bulleted list summary of the article")

  # validating whether the generated summary has at least three lines

  @field_validator(''summary'')

  def has_three_or_more_lines(cls, list_of_lines):

  if len(list_of_lines) < 3:

  raise ValueError("Generated summary has less than three bullet points!")

  return list_of_lines

  # set up output parser

  parser = PydanticOutputParser(pydantic_object=ArticleSummary)

  # create prompt template

  # notice that we are specifying the "partial_variables" parameter

  template = """

  You are an experienced content writing assistant that summarizes online articles.

  Here''s the article you want to summarize.

  ==================

  Title: {article_title}

  {article_text}

  ==================

  {format_instructions}

  """

  prompt = PromptTemplate(

  template=template,

  input_variables=["article_title", "article_text"],

  partial_variables={"format_instructions": parser.get_format_instructions()}

  )

  # Format the prompt using the article title and text obtained from scraping

  formatted_prompt = prompt.format_prompt(article_title=article_title, article_text=article_text)

  # Instantiate model class

  model = OpenAI(openai_api_key = openai_key, model_name="gpt-3.5-turbo-instruct",
  temperature=0.0)

  # Use the model to generate a summary

  output = model(formatted_prompt.to_string())

  # Parse the output into the Pydantic model

  parsed_output = parser.parse(output.split("\"]}")[0] + "\"]}")

  print("Title:", parsed_output.title)

  print("Article Summary:")

  for item in parsed_output.summary:

  print("-", item)

  ```


  **示例输出：**


  ```

  Enter Article URL To Be Summarized: https://www.techtarget.com/whatis/definition/large-language-model-LLM

  Title: What are Large Language Models?

  Article Summary:

  - LLMs are becoming increasingly important to businesses as AI continues to grow
  and dominate the business setting.

  - LLMs take a complex approach involving multiple components, including training
  on large volumes of data and using self-supervised learning and deep learning techniques.

  - LLMs have a wide range of uses, including text generation, translation, content
  summary, rewriting, classification, sentiment analysis, and conversational AI.

  - LLMs offer numerous advantages, such as extensibility, flexibility, performance,
  accuracy, and ease of training.

  - However, there are also challenges and limitations to using LLMs, such as high
  development and operational costs, potential bias, lack of explainability, hallucination,
  complexity, and vulnerability to glitch tokens.

  ```


