- "# 3. Python 与 LLMs\n\n`Python`是一种用户友好且功能强大的编程语言，以其高级、高效的数据结构和简洁的面向对象编程方法而闻名。其精炼的语法、动态类型以及可解释的特性，使得`Python`成为跨多个平台、在众多领域进行脚本编写和快速应用开发的理想选择。\n\
  \n在本章中，我们将回顾`Python`对于大语言模型（`LLMs`）的重要性。本章还将深入探讨`Python`的语法和语义，指出其与`Perl`、`C`和`Java`等语言的相似之处，同时强调其独特特性。但首先，让我们从一个快速入门开始。\n\
  \n## Python 概览\n\n在使用计算机的过程中，我们常常会意识到自动化某些任务是非常有益的。例如，你可能希望自动化编辑多个文本文件的过程；其他任务可能包括创建一个基本数据库、一个独特的\
  \ GUI 应用程序、构建一个简单的游戏，或者在日常工作中处理数据科学、机器学习和人工智能。\n\n专业软件开发人员经常需要与各种`C`/`C++`/`Java`库进行交互，但标准的编写、编译、测试和重新编译周期可能效率低下。为这些库编写测试套件，以及为程序添加扩展语言，是其他一些期望实现自动化和简洁性的常见任务。在这些场景下，`Python`成为了理想的解决方案。\n\
  \n另一方面，`Python`不仅更易于使用，而且可在包括 Windows、Mac OS X 和 Unix 在内的多种操作系统上使用。其简洁性并未削弱其作为真正编程语言的能力，与\
  \ shell 脚本或批处理文件相比，它为大型程序提供了更多的结构和支持。\n\n`Python`的模块化特性允许代码在其他程序中重用，从而提高了效率。它附带大量标准模块，这些模块可以作为你程序的基础，或者作为学习`Python`编程的示例。这些模块涵盖了广泛的功能，包括文件\
  \ I/O、系统调用、套接字以及与`Tk`等 GUI 工具包的接口。\n\n作为一种解释型语言，`Python`缩短了开发时间，因为它不需要编译和链接。其交互特性便于轻松试验语言特性、编写临时程序，或以自底向上的方式测试函数以进行程序开发。`Python`还可以作为一个方便的桌面计算器。\n\
  \n`Python`能够编写紧凑且可读性强的程序，这是其关键优势之一。用`Python`编写的程序通常比用`C`、`C++`或`Java`编写的等效程序更短。这种简洁性源于几个因素：高级数据类型允许在单个语句中执行复杂操作；使用缩进而非括号来分组语句；以及无需声明变量或参数。\n\
  \n### Python 语法与语义\n\n管理`Python`程序编写和解释（无论是计算机还是人类读者）的规则和约定，构成了`Python`编程语言的语法。`Python`与`Perl`、`C`和`Java`等语言共享一些特性，但也表现出明显的差异。它支持多种编程方法，如结构化编程、面向对象编程和函数式编程，非常灵活。此外，`Python`以其动态类型和自动内存管理而闻名。\n\
  \n`Python`以其简单统一的语法而著称，其指导哲学是：完成一项任务应该有一种——且最好只有一种——显而易见的方法。该语言集成了原生数据类型、控制结构、一等函数和模块，增强了代码重用和组织性。与许多严重依赖标点符号的语言不同，`Python`选择使用英文关键字，这有助于其代码外观清晰易懂。\n\
  \n`Python`在错误管理方面表现出色，拥有全面的异常处理机制，并在其标准库中包含调试器，从而简化了调试过程。`Python`语法的设计强调清晰性和用户友好性，使其成为新手和经验丰富的程序员的共同首选。\n\
  \n有趣的是，`Python`的名字来源于 BBC 的节目“蒙提·派森的飞行马戏团”，与蛇毫无关联。事实上，在文档中引用蒙提·派森短剧的内容不仅是允许的，而且是积极鼓励的。\n\
  \n### 语法设计原则\n\n`Python`被认为是一种可读性极高的编程语言。`Python`语法设计的简洁性和一致性是其核心，其指导原则是“*应该有一种——并且最好只有一种——显而易见的方法来完成它*”，这一原则源自\
  \ Python 之禅。^(³⁸)\n\n\n\n### Python 之禅\n\n- *优美胜于丑陋。*\n- *显式胜于隐式。*\n- *简单胜于复杂。*\n\
  - *复杂胜于凌乱。*\n- *扁平胜于嵌套。*\n- *稀疏胜于密集。*\n- *可读性至关重要。*\n- *特殊情况也不足以特殊到打破规则。*\n- *尽管实用性胜过纯粹性。*\n\
  - *错误不应被无声地忽略。*\n- *除非明确需要沉默。*\n- *面对歧义，拒绝猜测的诱惑。*\n- *应该有一种——最好只有一种——显而易见的方法来做这件事。*\n\
  - *尽管这种方法一开始可能并不明显，除非你是荷兰人。*\n- *现在做总比永远不做好。*\n- *虽然“永远不做”通常比“立刻做”要好。*\n- *如果实现难以解释，那它就是个坏主意。*\n\
  - *如果实现易于解释，那它可能是个好主意。*\n- *命名空间是一个绝妙的主意——让我们更多地使用它们吧！*\n\n### Python 标识符\n\n在 Python\
  \ 中，标识符指的是赋予变量、函数、类、模块或其他对象等实体的名称。它以字母（A-Z 或 a-z）或下划线（`_`）开头，后跟字母、下划线和数字（0-9）的任意组合。Python\
  \ 标识符不能包含特殊字符，例如 `@`、`$` 或 `%`。\n\nPython 是**区分大小写**的，这意味着像 `\"Hello\"` 和 `\"hello\"\
  ` 这样的标识符被视为不同的。\n\n**Python 遵循特定的标识符命名约定：**\n\n- Python 中的类名以大写字母开头，而所有其他标识符以小写字母开头。\n\
  - 以单下划线开头的标识符被视为私有。\n- 以双下划线开头的标识符被视为强私有。\n- 以双下划线开头和结尾的标识符保留给语言定义的特殊名称。\n\n**表\
  \ 3-1** 列出了 35 个不能用作标识符的关键字或保留字。\n\n**表 3-1** Python 保留字\n\n| `and` | `as` | `assert`\
  \ | `async` | `await` | `break` | `class` |\n|-------|------|----------|---------|---------|---------|---------|\n\
  | `continue` | `def` | `del` | `elif` | `else` | `except` | `False` |\n| `finally`\
  \ | `for` | `from` | `global` | `if` | `import` | `in` |\n| `is` | `lambda` | `None`\
  \ | `nonlocal` | `not` | `or` | `pass` |\n| `raise` | `return` | `True` | `try`\
  \ | `while` | `with` | `yield` |\n\n### Python 缩进\n\nPython 使用空白字符来定义控制流块，遵循 off-side\
  \ 规则。这种使用缩进而非标点或关键字来表示代码块范围的特征，继承自其前身语言 ABC。\n\n在计算机编程中，如果一种语言的代码块结构由缩进决定，则称其遵循\
  \ off-side 规则语法。这个术语由**彼得·兰丁**引入，被认为是对足球中越位规则（offside rule）的文字游戏。这个概念不同于自由格式语言，尤其是那些使用花括号的语言，在这些语言中缩进没有计算意义，纯粹是编码风格和格式的问题。应用**off-side\
  \ 规则**的语言通常以其有意义的缩进为特征。\n\n相比之下，在从 ALGOL 块结构演变而来的“自由格式”语言中，代码块使用花括号（`{ }`）或特定关键字来界定。通常，在这些语言中，程序员会按照惯例缩进块的内容，以便在视觉上将其与相邻代码区分开来。\n\
  \n**示例：**\n\n```\ndef greetings():\nprint(\"hello world\")\nfor i in range(10)\n\
  print(i)\n```\n\n**在 Python 中，代码缩进遵循特定规则至关重要：**\n\n- 避免使用反斜杠（`\\`）字符将缩进分割到多行。\n\
  - 不得缩进 Python 代码的第一行；否则会导致`Indentation Error`。\n- 在缩进时选择制表符还是空格，一致性是关键。在整个代码中坚持使用你偏好的缩进方式。混用制表符和空格可能导致缩进错误。\n\
  - 通常建议对第一级缩进使用一个制表符或四个空格，对于更深层次的缩进，则再增加四个空格（或再增加一个制表符）。\n\n### Python 多行语句\n\n在\
  \ Python 中，语句通常以换行符结束。然而，Python 提供了使用行连接符（`\\`）的灵活性，以指示一行应该继续。\n\n**示例：**\n\n```\n\
  total = one + \\\ntwo + \\\nthree\n```\n\n包含在方括号 `[]`、花括号 `{}` 或圆括号 `()` 内的语句不需要行连接符。例如，以下语句在\
  \ Python 中是有效的：\n\n**示例：**\n\n```\ndays = ['Monday', 'Tuesday', 'Wednesday',\n'Thursday',\
  \ 'Friday']\n```\n\n### Python 中的引号\n\n在 Python 中，字符串字面量可以使用单引号（`'`）、双引号（`\"`）或三引号（`'''`\
  \ 或 `\"\"\"`）来表示，前提是使用相同类型的引号来开始和结束字符串。\n\n另一方面，三引号用于包含跨越多行的字符串。例如，以下示例在 Python\
  \ 中都是有效的：\n\n**示例：**\n\n```\nname = 'Alice'\nprint(f\"My name is {name}.\")\nquote\
  \ = \"To be or not to be, that is the question.\"\nprint(f\"Shakespeare once said,\
  \ '{quote}'\")\nstory = \"\"\"Once upon a time,\nthere was a brave knight\nwho embarked\
  \ on a grand adventure.\"\"\"\nprint(story)\n```\n\n**输出：**\n\n```\nMy name is Alice.\n\
  Shakespeare once said, 'To be or not to be, that is the question.'\nOnce upon a\
  \ time,\nthere was a brave knight\nwho embarked on a grand adventure.\n```\n\n###\
  \ Python 注释\n\n在 Python 中，注释是源代码中供程序员阅读的解释或注解。它们被包含进来是为了增强代码对人类读者的可理解性，并且会被 Python\
  \ 解释器忽略。\n\n与许多现代编程语言一样，Python 支持单行（行尾）注释和多行（块）注释。Python 注释的结构与 PHP、BASH 和 Perl\
  \ 等语言中的注释非常相似。\n\n要在 Python 中创建注释，请使用井号（`#`）。任何不在字符串字面量中的井号都标志着注释的开始。`#` 符号之后直到该物理行末尾的所有内容都被视为注释的一部分，Python\
  \ 解释器会忽略它。\n\n```\n# 第一个注释\nprint (\"Hello, World!\") # 第二个注释\n```\n\n**你可以在语句或表达式之后在同一行输入注释：**\n\
  \n```\nName = \"John\" # 同一行上的注释\n```\n\n**你可以像下面这样注释多行：**\n\n```\n# 注释 1\n# 注释\
  \ 2\n# 注释 3\n```\n\n**Python 解释器也会忽略紧随其后的三引号字符串，使其可以作为多行注释：**\n\n```\n'''\n这是我的第一个多行\n\
  注释。\n'''\n```\n\n#### 在 Python 代码中使用空行\n\nPython 代码中的空行是指仅包含空白字符或可能包含注释的行，Python\
  \ 会完全忽略它。在交互式解释器会话中工作时，你必须输入一个空的物理行来结束一个多行语句。\n\n#### 在一行中组合多个语句\n\n你可以使用分号（`;`）在一行中包含多个语句，前提是这些语句中没有一个会启动一个新的代码块。以下是一个演示分号用法的示例片段：\n\
  \n**示例：**\n\n```\nx = 5; y = 10; z = x + y; print(z)\n```\n\n\n\n### 如何安装 Python\
  \ 及编写你的第一个 Python 程序\n\n安装 Python 的方式可能因你使用的操作系统而异。因此，本文提供了以下操作系统的安装说明：\n\n- Windows\n\
  - macOS\n- Linux\n\n**注意：** 不同操作系统上的 Python 安装  \n*请注意，安装步骤可能因你的具体操作系统及其版本而异。要在你的特定平台上安装\
  \ Python，请按照此处为你相应操作系统提供的说明进行操作。*\n\n#### 在 Windows 上安装 Python\n\n本节提供了在 Windows\
  \ 操作系统上安装 Python 的分步指南。请按照以下说明在你的 Windows 电脑上成功设置 Python。\n\n**步骤 1：下载 Python 安装程序**\n\
  \n首先，访问 Python 官方网站，获取适用于 Windows 的最新 Python 3.x 版本。该网站会自动检测你的操作系统，并提供适合你系统的安装程序（32\
  \ 位或 64 位）。\n\n**步骤 2：启动安装程序**\n\n找到下载的安装程序文件（通常位于“下载”文件夹中），然后双击它以启动安装过程。你可能会遇到用户账户控制\
  \ (UAC) 提示，要求你授予权限。点击“是”继续。\n\n**步骤 3：自定义安装（可选）**\n\n进入安装程序的欢迎界面后，你会看到两个选项：“立即安装”和“自定义安装”（图\
  \ 3-1）。\n\n> *如果你希望使用默认设置进行标准安装，只需点击“立即安装”。*\n\n![](img/613844_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1：Python 安装过程的步骤 1\n\n如需自定义安装，你可以修改安装目录或选择特定组件等参数，请点击“自定义安装”（图 3-2）。\n\n![](img/613844_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2：安装过程中的可选功能\n\n**此选择提供以下选项：**\n\n- **文档：** 此选项随安装包一起包含 Python 的文档文件。\n- **pip：**\
  \ 此选项安装 `pip`，使你能够根据需要安装其他 Python 包。\n- **Tkinter 和 IDLE** (tcl/tk 和 IDLE)：此选项安装\
  \ `tkinter` 和 IDLE。\n- **Python 测试套件：** 选择此选项将安装标准库测试套件，有助于测试你的代码。\n- **py launcher\
  \ (for all users)：** 这些选项允许你从命令行启动 Python。\n\n**完成选择后，点击“下一步”。将出现一个包含高级选项的新对话框，提供更多选择，如图\
