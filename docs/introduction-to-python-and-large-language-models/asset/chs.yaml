  \ Python 3.11。\n- 将文件与 Python 关联（需要 `py` 启动器）。\n- 为已安装的应用程序创建快捷方式。\n- 将 Python 添加到环境变量。\n\
  - 预编译标准库。\n- 下载调试符号。\n- 下载调试二进制文件（需要 VS 2017 或更高版本）。\n\n确保选择的安装目录正确，然后进入下一步。\n\n\
  **步骤 4：开始安装 Python**\n\n配置好你偏好的安装设置后，点击“安装”以启动安装过程。安装程序会将必要的文件复制到你的电脑并配置 Python。此过程可能需要几分钟。\n\
  \n**步骤 5：确认安装**\n\n安装完成后，通过打开命令提示符（在“开始”菜单中搜索 `cmd`）并输入以下命令，确认 Python 已成功安装：\n\n\
  ```\npython --version\n```\n\n### 在 macOS 上安装 Python\n\n**步骤 1：验证 macOS 上现有的 Python\
  \ 版本**\n\n在 macOS 上开始安装 Python 之前，明智的做法是确认系统上当前的 Python 版本。macOS 通常默认包含一个较旧的 Python\
  \ 版本（Python 2.x）。要确定你系统的 Python 版本，请打开“终端”应用程序（通过 Spotlight 搜索或在“应用程序”➤“实用工具”下找到它）。然后，输入以下命令：\n\
