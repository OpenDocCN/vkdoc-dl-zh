  \ `True` | `x != y` |\n| `>=` | 大于或等于：如果左操作数大于或等于右操作数，则为 `True` | `x >= y` |\n|\
  \ `<=` | 小于或等于：如果左操作数小于或等于右操作数，则为 `True` | `x <= y` |\n\n**示例：**\n\n```\n>>> a =\
  \ 5\n>>> b = 3\n>>> print(a > b)\nTrue\n>>> print(a < b)\nFalse\n>>> print(a ==\
  \ b)\nFalse\n>>> print(a != b)\nTrue\n>>> print(a >= b)\nTrue\n>>> print(a <= b)\n\
  False\n```\n\n#### 逻辑运算符\n\n在 Python 领域，逻辑运算符在处理条件语句时发挥作用，这些条件语句通常围绕 `True` 或 `False`\
  \ 结果展开，如表 3-5 所示。这些运算符负责执行逻辑与、逻辑或和逻辑非运算。\n\n**表 3-5** Python 逻辑运算符\n\n| 运算符 | 描述\
