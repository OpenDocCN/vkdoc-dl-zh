  \ Q 学习的智能体。首先，按如下方式声明环境：\n\n```python\nENV_NAME = 'CartPole-v0'\nenv = gym.make(ENV_NAME)\n\
  ```\n\n由于我们想要实现深度 Q 学习，我们使用参数来初始化卷积神经网络（CNN）。我们还使用激活函数来传播神经网络。我们保持其顺序结构。\n\n```python\n\
  model = Sequential()\nmodel.add(Flatten(input_shape=(1,) + env.observation_space.shape))\n\
  model.add(Dense(16))\nmodel.add(Activation('relu'))\nmodel.add(Dense(16))\nmodel.add(Activation('relu'))\n\
  model.add(Dense(16))\nmodel.add(Activation('relu'))\nmodel.add(Dense(nb_actions))\n\
  model.add(Activation('linear'))\n```\n\n你也可以打印模型详情，如下所示：\n\n```python\nprint(model.summary())\n\
  ```\n\n接下来，配置模型并借助一个函数使用所有强化学习选项。\n\n```python\nimport numpy as np\nimport gym\n\
  from keras.models import Sequential\nfrom keras.layers import Dense, Activation,\
  \ Flatten\nfrom keras.optimizers import Adam\nfrom rl.agents.dqn import DQNAgent\n\
  from rl.policy import BoltzmannQPolicy\nfrom rl.memory import SequentialMemory\n\
  \nENV_NAME = 'CartPole-v0'\n# 获取环境并提取动作数量。\nenv = gym.make(ENV_NAME)\nnp.random.seed(123)\n\
  env.seed(123)\nnb_actions = env.action_space.n\n\n# 接下来，我们构建一个非常简单的模型。\nmodel =\
  \ Sequential()\nmodel.add(Flatten(input_shape=(1,) + env.observation_space.shape))\n\
  model.add(Dense(16))\nmodel.add(Activation('relu'))\nmodel.add(Dense(16))\nmodel.add(Activation('relu'))\n\
  model.add(Dense(16))\nmodel.add(Activation('relu'))\nmodel.add(Dense(nb_actions))\n\
  model.add(Activation('linear'))\nprint(model.summary())\n\n# 最后，我们配置并编译我们的智能体。你可以使用任何内置的\
  \ Keras 优化器，\n# 甚至包括评估指标！\nmemory = SequentialMemory(limit=50000, window_length=1)\n\
  policy = BoltzmannQPolicy()\ndqn = DQNAgent(model=model, nb_actions=nb_actions,\
  \ memory=memory, nb_steps_warmup=10,\n               target_model_update=1e-2, policy=policy)\n\
  dqn.compile(Adam(lr=1e-3), metrics=['mae'])\n\n# 好了，现在是时候学习一些东西了！我们在此可视化训练过程以供展示，但这会\n\
  # 大大降低训练速度。你随时可以使用 Ctrl + C 安全地提前中止训练。\ndqn.fit(env, nb_steps=50000, visualize=True,\
  \ verbose=2)\n\n# 训练完成后，我们保存最终的权重。\ndqn.save_weights('dqn_{}_weights.h5f'.format(ENV_NAME),\
  \ overwrite=True)\n\n# 最后，在 5 个 episode 上评估我们的算法。\ndqn.test(env, nb_episodes=5,\
  \ visualize=True)\n```\n\n要获得 Keras-rl 的所有功能，你需要在 Keras-rl 文件夹内运行 `setup.py` 文件，如下所示：\n\
