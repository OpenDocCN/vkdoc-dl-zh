  \n## 安装 OpenAI Gym 和 OpenAI Universe\n\n在本节中，你将学习如何在运行 Ubuntu 16.04 版本的机器上安装 OpenAI\
  \ Gym 和 OpenAI Universe。进入 Anaconda 环境，从 GitHub 安装 OpenAI Gym。见图 3-5。你可以使用以下命令从\
  \ GitHub 克隆并安装 OpenAI Gym：\n\n```\n$ source activate universe\n(universe) $ cd ∼\n\
  (universe) $ git clone https://github.com/openai/gym.git\n(universe) $ cd gym\n\
  (universe) $ pip install -e '.[all]'\n```\n\n![A454310_1_En_3_Fig5_HTML.jpg](img/A454310_1_En_3_Fig5_HTML.jpg)\
