  \ 图 3-14. 打开一个新的 Python 文件\n\n你现在可以开始使用 Gym 界面，并开始导入 Gym 库，如图 3-15 所示。![A454310_1_En_3_Fig15_HTML.jpg](img/A454310_1_En_3_Fig15_HTML.jpg)\
  \ 图 3-15. 在 jupyter notebook 中使用 Gym\n\n该过程持续进行，直到程序流程完成。图 3-16 展示了流程。![A454310_1_En_3_Fig16_HTML.jpg](img/A454310_1_En_3_Fig16_HTML.jpg)\
  \ 图 3-16. 程序的流程\n\n重置后，环境会显示一个数组，如图 3-17 所示。![A454310_1_En_3_Fig17_HTML.jpg](img/A454310_1_En_3_Fig17_HTML.jpg)\
  \ 图 3-17. 正在创建一个数组\n\n图 3-18 展示了模拟过程。小车-杆移动的幅度由数组的值反映出来。![A454310_1_En_3_Fig18_HTML.jpg](img/A454310_1_En_3_Fig18_HTML.jpg)\
  \ 图 3-18. 模拟进行中\n\n\n\n## 更多模拟\n\n本节将展示如何尝试不同的模拟。OpenAI 中包含多种环境类型，其中一种是对数类型，接下来将对此进行讨论。算法涉及多种任务。运行以下代码即可在\
