  \ 图 4-25. Rastrigin 函数 PNG 文件\n\n\n\n### Python 中的群体智能\n\n本节将介绍一个运用群体智能概念的 Python\
  \ 程序。因此，你将了解如何在 Python 中实现粒子群优化（PSO）。你可以借助一个名为 `PySwarms` 的研究工具包来实现这一点。`PySwarms`\
  \ 是一个很好的工具，可用于实现基于 PSO 方法的优化算法，例如：\n\n*   星形拓扑\n*   环形拓扑\n\n首先，你需要安装 `PySwarms`。打开终端，并使用以下命令激活\
  \ Anaconda 环境。\n\n```\nabhi@ubuntu:∼$ source activate universe\n(universe) abhi@ubuntu:∼$\n\
  ```\n\n安装 `PySwarms` 之前的依赖项如下：\n\n*   `numpy >= 1.13.0`\n*   `scipy >= 0.17.0`\n\
  *   `matplotlib >= 1.3.1`\n\n现在按如下方式安装 `PySwarms`：\n\n```\n(universe) abhi@ubuntu:∼$\
