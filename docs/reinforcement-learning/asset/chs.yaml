  (universe) $ git clone https://github.com/openai/universe.git\n(universe) $ cd universe\n\
  (universe) $ pip install -e\n```\n\n正在安装这些包。图 3-6 展示了 OpenAI Universe 的克隆过程。![A454310_1_En_3_Fig6_HTML.jpg](img/A454310_1_En_3_Fig6_HTML.jpg)\
  \ 图 3-6. 克隆 OpenAI Universe\n\n包含所有重要文件的整个流程已下载完成，如图 3-7 所示。![A454310_1_En_3_Fig7_HTML.jpg](img/A454310_1_En_3_Fig7_HTML.jpg)\
