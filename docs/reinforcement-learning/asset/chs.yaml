  \ 图 3-8. 安装过程的更多步骤\n\n在下一节中，你将学习如何开始在 OpenAI Gym 和 OpenAI 环境中工作。\n\n## 使用 OpenAI\
  \ Gym 和 OpenAI\n\n示例过程的 OpenAI 循环如图 3-9 所示。![A454310_1_En_3_Fig9_HTML.jpg](img/A454310_1_En_3_Fig9_HTML.jpg)\
  \ 图 3-9. 基本的 OpenAI Gym 结构\n\n该过程的工作方式如下。我们正在处理一个简单的 Gym 项目。这里选择的语言是 Python，但我们更关注环境如何被使用的逻辑。\n\
  \n1. 我们导入 Gym 库。\n2. 我们使用 `make` 函数创建一个要执行的模拟实例。\n3. 我们重置模拟，以便将要应用的条件得以实现。\n4. 我们进行循环，然后渲染。\n\
  \n输出是使用 OpenAI 强化学习技术对环境进行模拟的结果。这里展示了使用 Python 编写的程序，我们使用了小车-杆模拟示例：\n\n```\nimport\
  \ gym\nenv = gym.make('CartPole-v0')\nenv.reset()\nfor _ in range(1000):\n    env.render()\n\
  \    env.step(env.action_space.sample()) # 执行一个随机动作\n```\n\n我们创建的程序在终端中运行；我们也可以在\
  \ jupyter notebook 上运行该程序。Jupyter notebook 是一个可以非常轻松运行 Python 代码的特殊环境。要使用 OpenAI\
  \ 的属性或文件结构，你需要位于 `universe` 目录中，如图 3-10 所示。![A454310_1_En_3_Fig10_HTML.jpg](img/A454310_1_En_3_Fig10_HTML.jpg)\
  \ 图 3-10. 在 `universe` 目录内部\n\n要使用 Gym 组件，你需要进入 `gym` 目录，如图 3-11 所示。![A454310_1_En_3_Fig11_HTML.jpg](img/A454310_1_En_3_Fig11_HTML.jpg)\
  \ 图 3-11. 在 `gym` 目录内部\n\n然后你需要打开 jupyter notebook。在终端中输入以下命令以打开 jupyter notebook（见图\
  \ 3-12）：\n\n```\njupyter notebook\n```\n\n![A454310_1_En_3_Fig12_HTML.jpg](img/A454310_1_En_3_Fig12_HTML.jpg)\
  \ 图 3-12. 使用 jupyter notebook\n\n当你发出该命令时，jupyter notebook 引擎会侧加载基本组件，以便加载所有与 jupyter\
