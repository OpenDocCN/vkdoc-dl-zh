- "# 4. 将 Python 应用于强化学习\n\nAbhishek Nandy¹ 和 Manisha Biswas²\n\n(1) 印度西孟加拉邦加尔各答 Swaranika\
  \ Co-Opt HSG 大楼 HIG L-2/4 室  \n(2) 印度西孟加拉邦北 24 帕尔加纳区\n\n本章从 Python 的角度探索强化学习的世界。首先，我们通过\
  \ Python 学习 Q 学习，然后对强化学习进行更深入的分析。我们从 Python 中的 Q 学习开始。然后，我们描述 Python 中的群体智能，并介绍群体智能究竟是什么。本章还涵盖了马尔可夫决策过程（MDP）工具箱。最后，你将实现一个游戏\
  \ AI，并对其应用强化学习。本章将是一次很好的体验，让我们开始吧！\n\n## 使用 Python 进行 Q 学习\n\n让我们从一个迷宫问题开始。游戏的目标是避开黑色方块，到达黄色圆圈。图\
  \ 4-1 展示了这个迷宫。在此示例中，我们使用 `numpy` 库。\n\n![A454310_1_En_4_Fig1_HTML.jpg](img/A454310_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 演示 Q 学习的迷宫\n\n我们必须根据 Q 表选择一个动作，这就是我们拥有名为 `choose_action` 的函数的原因。当我们想从一个状态移动到另一个状态时，我们将决策过程应用于\
  \ `choose_action` 方法，如下所示：\n\n```\ndef choose_action(self, observation):\n```\n\n\
  学习过程函数接收从状态、奖励、奖赏的转换，并进入下一个状态：\n\n```\ndef check_State_exist(self, state):\n```\n\
  \n`check_State_exist` 函数允许我们检查状态是否存在，如果存在则将其追加到 Q 表中。我们讨论的函数内容实际上属于 `RL_brain`，它是该项目的基础。Q\
  \ 学习的规则已更新，如 `run_this.py` 文件所示。\n\n### 迷宫环境 Python 文件\n\n\n\n## 迷宫环境与强化学习\n\n此处展示的迷宫环境\
  \ Python 文件列出了进行移动所需的所有概念。我们声明了奖励以及执行下一步的能力。\n\n```python\n\"\"\"\n强化学习迷宫示例。\n\n\
  红色矩形：          探索者。\n黑色矩形：          地狱       [奖励 = -1]。\n黄色圆形：          天堂     \
  \  [奖励 = +1]。\n其他所有状态：      地面       [奖励 = 0]。\n\n此脚本是该示例的环境部分。\n强化学习部分在 RL_brain.py\
  \ 中。\n\n更多内容请访问我的教程页面：https://morvanzhou.github.io/tutorials/\n\"\"\"\n\nimport\
  \ numpy as np\nimport time\nimport sys\n\nif sys.version_info.major == 2:\n    import\
  \ Tkinter as tk\nelse:\n    import tkinter as tk\n\nUNIT = 40   # 像素\nMAZE_H = 4\
  \  # 网格高度\nMAZE_W = 4  # 网格宽度\n\n\nclass Maze(tk.Tk, object):\n    def __init__(self):\n\
  \        super(Maze, self).__init__()\n        self.action_space = ['u', 'd', 'l',\
  \ 'r']\n        self.n_actions = len(self.action_space)\n        self.title('maze')\n\
  \        self.geometry('{0}x{1}'.format(MAZE_H * UNIT, MAZE_H * UNIT))\n       \
  \ self._build_maze()\n\n    def _build_maze(self):\n        self.canvas = tk.Canvas(self,\
  \ bg='white',\n                           height=MAZE_H * UNIT,\n              \
  \             width=MAZE_W * UNIT)\n\n        # 创建网格\n        for c in range(0,\
  \ MAZE_W * UNIT, UNIT):\n            x0, y0, x1, y1 = c, 0, c, MAZE_H * UNIT\n \
  \           self.canvas.create_line(x0, y0, x1, y1)\n        for r in range(0, MAZE_H\
  \ * UNIT, UNIT):\n            x0, y0, x1, y1 = 0, r, MAZE_H * UNIT, r\n        \
  \    self.canvas.create_line(x0, y0, x1, y1)\n\n        # 创建原点\n        origin =\
  \ np.array([20, 20])\n\n        # 地狱\n        hell1_center = origin + np.array([UNIT\
  \ * 2, UNIT])\n        self.hell1 = self.canvas.create_rectangle(\n            hell1_center[0]\
  \ - 15, hell1_center[1] - 15,\n            hell1_center[0] + 15, hell1_center[1]\
  \ + 15,\n            fill='black')\n\n        # 地狱\n        hell2_center = origin\
  \ + np.array([UNIT, UNIT * 2])\n        self.hell2 = self.canvas.create_rectangle(\n\
  \            hell2_center[0] - 15, hell2_center[1] - 15,\n            hell2_center[0]\
  \ + 15, hell2_center[1] + 15,\n            fill='black')\n\n        # 创建椭圆\n   \
  \     oval_center = origin + UNIT * 2\n        self.oval = self.canvas.create_oval(\n\
  \            oval_center[0] - 15, oval_center[1] - 15,\n            oval_center[0]\
  \ + 15, oval_center[1] + 15,\n            fill='yellow')\n\n        # 创建红色矩形\n \
  \       self.rect = self.canvas.create_rectangle(\n            origin[0] - 15, origin[1]\
  \ - 15,\n            origin[0] + 15, origin[1] + 15,\n            fill='red')\n\n\
  \        # 打包所有\n        self.canvas.pack()\n\n    def reset(self):\n        self.update()\n\
  \        time.sleep(0.5)\n        self.canvas.delete(self.rect)\n        origin\
  \ = np.array([20, 20])\n        self.rect = self.canvas.create_rectangle(\n    \
  \        origin[0] - 15, origin[1] - 15,\n            origin[0] + 15, origin[1]\
  \ + 15,\n            fill='red')\n        # 返回观察值\n        return self.canvas.coords(self.rect)\n\
  \n    def step(self, action):\n        s = self.canvas.coords(self.rect)\n     \
  \   base_action = np.array([0, 0])\n        if action == 0:   # 上\n            if\
  \ s[1] > UNIT:\n                base_action[1] -= UNIT\n        elif action == 1:\
  \   # 下\n            if s[1] < (MAZE_H - 1) * UNIT:\n                base_action[1]\
  \ += UNIT\n        elif action == 2:   # 右\n            if s[0] < (MAZE_W - 1) *\
  \ UNIT:\n                base_action[0] += UNIT\n        elif action == 3:   # 左\n\
  \            if s[0] > UNIT:\n                base_action[0] -= UNIT\n\n       \
  \ self.canvas.move(self.rect, base_action[0], base_action[1])  # 移动智能体\n       \
  \ s_ = self.canvas.coords(self.rect)  # 下一个状态\n\n        # 奖励函数\n        if s_ ==\
  \ self.canvas.coords(self.oval):\n            reward = 1\n            done = True\n\
  \        elif s_ in [self.canvas.coords(self.hell1), self.canvas.coords(self.hell2)]:\n\
  \            reward = -1\n            done = True\n        else:\n            reward\
  \ = 0\n            done = False\n\n        return s_, reward, done\n\n    def render(self):\n\
  \        time.sleep(0.1)\n        self.update()\n\n\ndef update():\n    for t in\
  \ range(10):\n        s = env.reset()\n        while True:\n            env.render()\n\
  \            a = 1\n            s, r, done = env.step(a)\n            if done:\n\
  \                break\n\n\nif __name__ == '__main__':\n    env = Maze()\n    env.after(100,\
  \ update)\n    env.mainloop()\n```\n\n### RL_Brain Python 文件\n\n接下来是 `RL_brain`\
  \ Python 文件。我们定义了在从一个状态移动到另一个状态时生成的 Q 学习表格结构。在 `QLearningTable` 类中，我们构建了整个迷宫学习的方式。我们还在下一段代码中声明了学习超参数，并确定了程序的学习速率：\n\
  \n```python\nimport numpy as np\nimport pandas as pd\n\n\nclass QLearningTable:\n\
  \    def __init__(self, actions, learning_rate=0.01, reward_decay=0.9, e_greedy=0.9):\n\
  \        self.actions = actions  # 一个列表\n        self.lr = learning_rate\n     \
  \   self.gamma = reward_decay\n        self.epsilon = e_greedy\n        self.q_table\
  \ = pd.DataFrame(columns=self.actions)\n\n    def choose_action(self, observation):\n\
  \        self.check_state_exist(observation)\n        # 动作选择\n        if np.random.uniform()\
  \ < self.epsilon:\n            # 选择最佳动作\n            state_action = self.q_table.ix[observation,\
  \ :]\n            state_action = state_action.reindex(np.random.permutation(state_action.index))\
  \     # 某些动作具有相同值\n            action = state_action.argmax()\n        else:\n \
  \           # 选择随机动作\n            action = np.random.choice(self.actions)\n    \
  \    return action\n\n    def learn(self, s, a, r, s_):\n        self.check_state_exist(s_)\n\
  \        q_predict = self.q_table.ix[s, a]\n        if s_ != 'terminal':\n     \
  \       q_target = r + self.gamma * self.q_table.ix[s_, :].max()  # 下一个状态不是终止状态\n\
  \        else:\n            q_target = r  # 下一个状态是终止状态\n        self.q_table.ix[s,\
  \ a] += self.lr * (q_target - q_predict)  # 更新\n\n    def check_state_exist(self,\
  \ state):\n        if state not in self.q_table.index:\n            # 向 q 表追加新状态\n\
  \            self.q_table = self.q_table.append(\n                pd.Series(\n \
  \                   [0]*len(self.actions),\n                    index=self.q_table.columns,\n\
  \                    name=state,\n                )\n            )\n```\n\n### 更新函数\n\
  \n这段代码声明了一个函数，该函数接收迷宫内从一个状态到另一个状态的移动更新。当玩家从一个状态转换到另一个状态时，它也会给出奖励。\n\n```python\n\
  from maze_env import Maze\nfrom RL_brain import QLearningTable\n\n\ndef update():\n\
  \    for episode in range(100):\n        # 初始观察值\n        observation = env.reset()\n\
  \n        while True:\n            # 刷新环境\n            env.render()\n\n        \
  \    # 强化学习基于观察值选择动作\n            action = RL.choose_action(str(observation))\n\n\
  \            # 强化学习执行动作并获取下一个观察值和奖励\n            observation_, reward, done = env.step(action)\n\
  \n            # 强化学习从此次转换中学习\n            RL.learn(str(observation), action, reward,\
  \ str(observation_))\n\n            # 交换观察值\n            observation = observation_\n\
  \n            # 当本回合结束时跳出循环\n            if done:\n                break\n\n   \
  \ # 游戏结束\n    print('game over')\n    env.destroy()\n\n\nif __name__ == \"__main__\"\
  :\n    env = Maze()\n    RL = QLearningTable(actions=list(range(env.n_actions)))\n\
  \    env.after(100, update)\n    env.mainloop()\n```\n\n如果你进入文件夹，会看到 `run_this.py`\
  \ 文件，并可以获得输出，如图 4-2 所示。\n\n![A454310_1_En_4_Fig2_HTML.jpg](img/A454310_1_En_4_Fig2_HTML.jpg)\n\
