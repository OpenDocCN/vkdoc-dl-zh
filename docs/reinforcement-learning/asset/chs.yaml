  \n图 2-29. 测试 Docker\n\n## 使用 Python 进行强化学习的示例\n\n本节将介绍一个强化学习的示例，并解释算法的流程。你将看到强化学习是如何应用的。本节使用了一个开源的\
  \ GitHub 仓库，其中包含一个非常好的强化学习示例。你需要克隆该仓库才能使用它。该 GitHub 仓库链接为 [`github.com/MorvanZhou/Reinforcement-learning-with-tensorflow`](https://github.com/MorvanZhou/Reinforcement-learning-with-tensorflow)。在\
  \ Ubuntu 模块中，进入终端并开始克隆仓库，如图 2-30 所示。\n\n![A454310_1_En_2_Fig30_HTML.jpg](img/A454310_1_En_2_Fig30_HTML.jpg)\n\
  \n图 2-30. 克隆仓库\n\n图 2-31 展示了仓库的复制过程。\n\n![A454310_1_En_2_Fig31_HTML.jpg](img/A454310_1_En_2_Fig31_HTML.jpg)\n\
  \n图 2-31. 仓库的复制\n\n接下来，你需要进入所使用的文件夹，如图 2-32 所示。\n\n![A454310_1_En_2_Fig32_HTML.jpg](img/A454310_1_En_2_Fig32_HTML.jpg)\n\
  \n图 2-32. 进入文件夹\n\n我们正在处理一个强化学习的场景，其中我们将字母 O 应用为一个漫游者。这个漫游者想要尽快获得宝藏 T。条件如下所示：\n\n\
  ```\nO-----T\n```\n\n漫游者试图找到到达宝藏的最快路径。在每一轮（episode）中，漫游者到达宝藏所走的步数都会被记录下来。随着每一轮的进行，条件会得到改善，步数也会减少。以下是强化学习中的一些基本步骤：\n\
  \n*   程序尝试处理动作，因为动作在强化学习中非常重要。\n*   这个漫游者可用的动作是向左或向右移动：`ACTIONS = ['left','right']`\n\
  *   漫游者可以被视为智能体（agent）。\n*   在这个例子中，状态数量（也称为步数）被限制为 6：`N_States = 6`\n\n现在你需要为强化学习应用超参数。\n\
  \n### 什么是超参数？\n\n超参数是在设置模型参数之前就已经设定好的变量。通常，它们与分析中的底层系统的模型参数不同。我们引入 epsilon、alpha\
  \ 和 gamma。\n\n*   Epsilon 是贪婪因子\n*   Alpha 是学习率\n*   Gamma 是折扣因子\n\n本例中最大的轮数（episodes）是\
  \ 13。刷新率是指场景被刷新的频率。\n\n### 编写代码\n\n\n\n为了构建计算机学习的过程，我们需要制定一个表格。这个过程被称为 Q 学习，该表格称为\
  \ Q 表（你将在下一章中了解更多关于 Q 学习的内容）。所有关键元素都存储在 Q 表中，所有决策都基于 Q 表做出。\n\n```\ndef build_q_table(n_states,\
  \ actions):\n    table = pd.DataFrame(\n        np.zeros((n_states, len(actions))),\
  \     # q_table initial values\n        columns=actions,    # actions's name\n \
  \   )\n    # print(table)    # show table\n    return table\n```\n\n现在我们需要采取行动。为此，我们使用以下代码：\n\
  \n```\ndef choose_action(state, q_table):\n    # This is how to choose an action\n\
  \    state_actions = q_table.iloc[state, :]\n    if (np.random.uniform() > EPSILON)\
  \ or (state_actions.all() == 0):  # act non-greedy or state-action have no value\n\
  \        action_name = np.random.choice(ACTIONS)\n    else:   # act greedy\n   \
  \     action_name = state_actions.argmax()\n    return action_name\n```\n\n现在我们创建环境，并确定智能体将如何在环境中工作：\n\
  \n```\ndef get_env_feedback(S, A):\n    # This is how the agent will interact with\
  \ the environment\n    if A == 'right':    # move right\n        if S == N_STATES\
  \ - 2:   # terminate\n            S_ = 'terminal'\n            R = 1\n        else:\n\
  \            S_ = S + 1\n            R = 0\n    else:   # move left\n        R =\
  \ 0\n        if S == 0:\n            S_ = S  # reach the wall\n        else:\n \
  \           S_ = S - 1\n    return S_, R\n```\n\n此函数打印漫游者和寻宝条件：\n\n```\ndef update_env(S,\
  \ episode, step_counter):\n    # This is how the environment be updated\n    env_list\
  \ = ['-']*(N_STATES-1) + ['T']   # '---------T' our environment\n    if S == 'terminal':\n\
  \        interaction = 'Episode %s: total_steps = %s' % (episode+1, step_counter)\n\
  \        print('\\r{}'.format(interaction), end='')\n        time.sleep(2)\n   \
  \     print('\\r                                ', end='')\n    else:\n        env_list[S]\
  \ = 'o'\n        interaction = ''.join(env_list)\n        print('\\r{}'.format(interaction),\
  \ end='')\n        time.sleep(FRESH_TIME)\n```\n\n`rl()` 方法调用 Q 学习场景，我们将在下一章中讨论：\n\
  \n```\ndef rl():\n    # main part of RL loop\n    q_table = build_q_table(N_STATES,\
  \ ACTIONS)\n    for episode in range(MAX_EPISODES):\n        step_counter = 0\n\
  \        S = 0\n        is_terminated = False\n        update_env(S, episode, step_counter)\n\
  \        while not is_terminated:\n            A = choose_action(S, q_table)\n \
  \           S_, R = get_env_feedback(S, A)  # take action & get next state and reward\n\
  \            q_predict = q_table.ix[S, A]\n            if S_ != 'terminal':\n  \
  \              q_target = R + GAMMA * q_table.iloc[S_, :].max()   # next state is\
  \ not terminal\n            else:\n                q_target = R     # next state\
  \ is terminal\n                is_terminated = True    # terminate this episode\n\
  \            q_table.ix[S, A] += ALPHA * (q_target - q_predict)  # update\n    \
  \        S = S_  # move to next state\n            update_env(S, episode, step_counter+1)\n\
  \            step_counter += 1\n    return q_table\n\nif __name__ == \"__main__\"\
  :\n    q_table = rl()\n    print('\\r\\nQ-table:\\n')\n    print(q_table)\n```\n\
  \n完整的代码如下所示：\n\n```\nimport numpy as np\nimport pandas as pd\nimport time\n\nnp.random.seed(2)\
  \  # reproducible\n\nN_STATES = 6   # the length of the 1 dimensional world\nACTIONS\
  \ = ['left', 'right']     # available actions\nEPSILON = 0.9   # greedy police\n\
  ALPHA = 0.1     # learning rate\nGAMMA = 0.9    # discount factor\nMAX_EPISODES\
  \ = 13   # maximum episodes\nFRESH_TIME = 0.3    # fresh time for one move\n\ndef\
  \ build_q_table(n_states, actions):\n    table = pd.DataFrame(\n        np.zeros((n_states,\
  \ len(actions))),     # q_table initial values\n        columns=actions,    # actions's\
  \ name\n    )\n    # print(table)    # show table\n    return table\n\ndef choose_action(state,\
  \ q_table):\n    # This is how to choose an action\n    state_actions = q_table.iloc[state,\
  \ :]\n    if (np.random.uniform() > EPSILON) or (state_actions.all() == 0):  # act\
  \ non-greedy or state-action have no value\n        action_name = np.random.choice(ACTIONS)\n\
  \    else:   # act greedy\n        action_name = state_actions.argmax()\n    return\
  \ action_name\n\ndef get_env_feedback(S, A):\n    # This is how agent will interact\
  \ with the environment\n    if A == 'right':    # move right\n        if S == N_STATES\
  \ - 2:   # terminate\n            S_ = 'terminal'\n            R = 1\n        else:\n\
  \            S_ = S + 1\n            R = 0\n    else:   # move left\n        R =\
  \ 0\n        if S == 0:\n            S_ = S  # reach the wall\n        else:\n \
  \           S_ = S - 1\n    return S_, R\n\ndef update_env(S, episode, step_counter):\n\
  \    # This is how environment be updated\n    env_list = ['-']*(N_STATES-1) + ['T']\
  \   # '---------T' our environment\n    if S == 'terminal':\n        interaction\
  \ = 'Episode %s: total_steps = %s' % (episode+1, step_counter)\n        print('\\\
  r{}'.format(interaction), end='')\n        time.sleep(2)\n        print('\\r   \
  \                             ', end='')\n    else:\n        env_list[S] = 'o'\n\
  \        interaction = ''.join(env_list)\n        print('\\r{}'.format(interaction),\
  \ end='')\n        time.sleep(FRESH_TIME)\n\ndef rl():\n    # main part of RL loop\n\
  \    q_table = build_q_table(N_STATES, ACTIONS)\n    for episode in range(MAX_EPISODES):\n\
  \        step_counter = 0\n        S = 0\n        is_terminated = False\n      \
  \  update_env(S, episode, step_counter)\n        while not is_terminated:\n    \
  \        A = choose_action(S, q_table)\n            S_, R = get_env_feedback(S,\
  \ A)  # take action & get next state and reward\n            q_predict = q_table.ix[S,\
  \ A]\n            if S_ != 'terminal':\n                q_target = R + GAMMA * q_table.iloc[S_,\
  \ :].max()   # next state is not terminal\n            else:\n                q_target\
  \ = R     # next state is terminal\n                is_terminated = True    # terminate\
  \ this episode\n            q_table.ix[S, A] += ALPHA * (q_target - q_predict) \
  \ # update\n            S = S_  # move to next state\n            update_env(S,\
  \ episode, step_counter+1)\n            step_counter += 1\n    return q_table\n\n\
  if __name__ == \"__main__\":\n    q_table = rl()\n    print('\\r\\nQ-table:\\n')\n\
  \    print(q_table)\n```\n\n现在让我们运行程序并分析输出。你需要进入克隆的 GitHub 仓库并进入所需的文件夹，如图 2-33 所示。\n\
  \n![A454310_1_En_2_Fig33_HTML.jpg](img/A454310_1_En_2_Fig33_HTML.jpg)\n\n图 2-33.\
  \ 进入克隆的仓库\n\n现在你需要进入目录来运行程序，如图 2-34 所示。\n\n![A454310_1_En_2_Fig34_HTML.jpg](img/A454310_1_En_2_Fig34_HTML.jpg)\n\
  \n图 2-34. 检查目录\n\n现在你必须运行名为 `treasure_on_right.py` 的程序，该程序将宝藏放置在智能体的右侧。见图 2-35。\n\
  \n![A454310_1_En_2_Fig35_HTML.jpg](img/A454310_1_En_2_Fig35_HTML.jpg)\n\n图 2-35.\
  \ 运行 Python 文件\n\n程序正在运行迭代，如图 2-36 所示。\n\n![A454310_1_En_2_Fig36_HTML.jpg](img/A454310_1_En_2_Fig36_HTML.jpg)\n\
  \n图 2-36. 迭代进行中\n\n当程序和模拟完成后，最终结果被解释为一个 Q 表，在完成循环的每一步中，这些值反映了它在左右方向上花费的时间。图 2-37\
  \ 显示了完成的 Q 表。\n\n![A454310_1_En_2_Fig37_HTML.jpg](img/A454310_1_En_2_Fig37_HTML.jpg)\n\
  \n图 2-37. 作为结果创建的 Q 表\n\n\n\n## 什么是 MDP？\n\n`MDP`（马尔可夫决策过程）是一个框架，它涉及为决策过程创建数学模型和公式，其中一部分是随机的，另一部分则由决策者掌控。`MDP`\
  \ 有许多不同的应用，如图 2-38 所示。![A454310_1_En_2_Fig38_HTML.jpg](img/A454310_1_En_2_Fig38_HTML.jpg)\
  \ 图 2-38. MDP 及其应用 `MDP` 中的每个状态都满足马尔可夫性质。\n\n### 马尔可夫性质\n\n在强化学习领域，马尔可夫性质指的是一种随机的无记忆性质。随机性是指一个由随机变量构成的通用数学对象。当我们不存储某个变量的值，因为它在每次迭代中都会发生变化时，我们称之为随机性。见图\
  \ 2-39。![A454310_1_En_2_Fig39_HTML.jpg](img/A454310_1_En_2_Fig39_HTML.jpg) 图 2-39.\
  \ 马尔可夫性质过程 我们将在下一节讨论马尔可夫链。\n\n### 马尔可夫链\n\n如果一个数学性质具有离散的状态空间或离散的索引集，则称之为马尔可夫链。马尔可夫链以两种方式工作，如图\
  \ 2-40 所示。![A454310_1_En_2_Fig40_HTML.jpg](img/A454310_1_En_2_Fig40_HTML.jpg) 图\
  \ 2-40. 马尔可夫链 让我们通过一个例子来了解马尔可夫链。这个例子比较了 Rin 洗衣液与市场上其他洗衣液的销售情况。假设 Rin 的销售额占洗衣液总销售额的\
  \ 20%，这意味着其他品牌占 80%。使用 Rin 洗衣液的人定义为 `A`；其他人定义为 `A¢`。现在我们定义一个规则。在使用 Rin 洗衣液的人中，90%\
  \ 的人在一周后会继续使用，而 10% 的人会转向其他品牌。同样，使用其他洗衣液的人中，70% 的人在一周后会转向 Rin，其余的人继续使用其他洗衣液。为了分析这些情况，我们需要一个状态图。见图\
  \ 2-41。![A454310_1_En_2_Fig41_HTML.jpg](img/A454310_1_En_2_Fig41_HTML.jpg) 图 2-41.\
  \ Rin 洗衣液状态图 在状态图中，我们创建了一个场景，其中圆形点代表状态。根据这个状态图，我们必须分配一个转移概率矩阵。从状态图中得到的转移概率矩阵如图 2-42\
  \ 所示。![A454310_1_En_2_Fig42_HTML.jpg](img/A454310_1_En_2_Fig42_HTML.jpg) 图 2-42.\
  \ 转移概率矩阵 要确定两周后 Rin 的使用情况，我们必须应用一个原则。这个原则对于你尝试的每一个过程都是通用的。它可以表示为一条线连接，如图 2-43 所示。![A454310_1_En_2_Fig43_HTML.jpg](img/A454310_1_En_2_Fig43_HTML.jpg)\
  \ 图 2-43. 一个连通图 从起点出发，我们有两条路径——一条用于 Rin 洗衣液（通过 `A`），另一条用于其他品牌（即 `A¢`）。路径的创建方式如下。\n\
  \n1. 从起点出发，我们为 `A` 创建一条路径，因此我们必须关注转移概率矩阵。\n2. 我们追踪 `A` 的路径。\n3. 从初始市场份额来看，Rin 洗衣液的市场价值为\
  \ 20%。\n4. 从起点 `A` 出发，我们关注转移概率矩阵。\n\n停留在 `A` 的概率为 90%，因此另外 10% 会转向替代路径（到 `A¢`）。图\
  \ 2-44 以图形方式展示了这条路径的计算。![A454310_1_En_2_Fig44_HTML.jpg](img/A454310_1_En_2_Fig44_HTML.jpg)\
  \ 图 2-44. 路径计算 总路径概率计算如下：`P = .2 * .9 + .8 * .7 = .18 + .56 = .74`。这是一周后使用 Rin 的人数百分比。这个公式也可以理解为当前市场份额（`SO`）乘以转移概率（`P`）：`S0\
  \ * P = 一周后的市场份额` 见图 2-45。![A454310_1_En_2_Fig45_HTML.jpg](img/A454310_1_En_2_Fig45_HTML.jpg)\
  \ 图 2-45. 为下一周创建的矩阵 计算过程为 `.2 * .9 + .8 * .7 = .74` `.2 * .1 + .8 * .3 = .26` `[\
  \ .74 .26 ] = S1` 让我们处理第一个状态矩阵。一周后，Rin 洗衣液的销售额占市场的 74%。其他品牌则占市场的 26%。现在尝试找出两周后使用\
  \ Rin 洗衣液的人数百分比。图 2-46 展示了两周后我们需要进行的计算。![A454310_1_En_2_Fig46_HTML.jpg](img/A454310_1_En_2_Fig46_HTML.jpg)\
  \ 图 2-46. 下一个转移矩阵 所以结果是：`A   A’ = [ .848 .152 ]` 两周后，84.8% 的人会使用 Rin，15.2% 的人会使用其他洗衣液。你可能会问的一个问题是，Rin\
  \ 的销售额是否会最大化到 100% 的市场份额。随着我们继续，矩阵在经过一定次数的迭代后会变得稳定，并最终稳定在：`A  A’ = [ .75 .25]` 在了解了马尔可夫状态和马尔可夫链的基础知识之后，是时候再次关注\
  \ `MDP` 了。\n\n### MDP\n\n几乎所有的强化学习问题都可以形式化为 `MDP`。`MDP` 创造了一种适用于应用强化学习的普遍条件。`MDP`\
  \ 的本质是一个连续的马尔可夫过程。一个状态（`St`）是马尔可夫的，当且仅当它满足图 2-47 所示的条件。![A454310_1_En_2_Fig47_HTML.jpg](img/A454310_1_En_2_Fig47_HTML.jpg)\
  \ 图 2-47. 马尔可夫状态性质 该状态从历史中捕获所有相关信息。我们不必保留历史中的所有信息，因为只有前一个状态决定了现在会发生什么。对于一个马尔可夫状态（`s`）和后继状态（`s’`），状态转移概率的定义如图\
  \ 2-48 所示。![A454310_1_En_2_Fig48_HTML.jpg](img/A454310_1_En_2_Fig48_HTML.jpg) 图\
  \ 2-48. 转移概率 `MDP` 是一个包含决策因素的马尔可夫奖励过程。它是一种所有状态都是马尔可夫的环境类型。一个 `MDP` 是一个五元组 `< S,\
  \ A, P, R, Gamma>`：\n\n* `S` 代表状态\n* `A` 代表动作\n* `P` 是一个策略\n* `R` 代表奖励\n\n策略（`π`）是在给定状态下动作的分布。策略是一个函数或决策过程，允许从一个状态转移到另一个状态。\n\
  \n### SARSA\n\n`SARSA` 代表状态-动作-奖励-下一状态-下一动作。它是一种不同类型的强化学习方法，通常源自时序差分学习。我们将首先讨论时序差分学习。\n\
  \n#### 时序差分学习\n\n这种类型的学习基于其自身的邻近范围或自身范围。当我们处于一个状态并想知道后续状态中发生了什么时，我们通常会应用时序差分学习。总体思路是我们希望预测一段时间内的最佳路径。我们从状态\
  \ `S0` 到状态 `SF`。我们在每个状态中获得奖励。我们将尝试预测奖励的折扣总和。见图 2-49。![A454310_1_En_2_Fig49_HTML.jpg](img/A454310_1_En_2_Fig49_HTML.jpg)\
  \ 图 2-49. 状态转移 我们首先查看马尔可夫链，如图 2-50 所示。![A454310_1_En_2_Fig50_HTML.jpg](img/A454310_1_En_2_Fig50_HTML.jpg)\
  \ 图 2-50. 马尔可夫链 ![A454310_1_En_2_Fig51_HTML.jpg](img/A454310_1_En_2_Fig51_HTML.jpg)\
  \ 图 2-51. 价值函数 该方程表明，价值函数将状态映射到某个数值。如果处于最终状态，该数值设为 0（见图 2-51）。对于任何状态，其价值是奖励（`r`）的期望值与结束状态的折扣价值之和。\n\
  \n\n\n#### SARSA 的工作原理\n\n现在我们进入 SARSA 部分。SARSA 被称为一种同策略强化学习。同策略意味着我们只能看到自身的经验。它通过一步或多步累积更新，并学习从自身经验中进行更新。从当前状态出发，我们选择一个动作，然后进入下一个状态。在下一个状态，我们选择另一个动作，并将当前状态和当前动作与下一个状态和下一个动作结合使用。然后，我们将所有这些值一起更新为\
  \ Q 值。算法如下：\n\n1.  任意初始化 `Q(s, a)`。\n2.  初始化 `s`。\n3.  根据从 `Q` 派生的策略，从 `s` 中选择 `a`。对每个情节重复这两个步骤。\n\
  4.  执行动作 `a`，并观察 `r` 和 `s'`。\n5.  根据从 `Q` 派生的策略（例如，ε-贪婪策略），从 `s'` 中选择 `a'`。`Q(s,\
  \ a) ← Q(s, a) + α[r + γQ(s', a') - Q(s, a)]`；`s ← s'`；`a ← a'`。\n6.  对每个情节重复这些步骤，直到\
  \ `s` 为终止状态。\n\n### Q 学习\n\nQ 学习是一种无模型的强化学习技术。图 2-52 展示了 Q 学习的一般流程。\n\n![A454310_1_En_2_Fig52_HTML.jpg](img/A454310_1_En_2_Fig52_HTML.jpg)\
  \  \n图 2-52. Q 学习过程\n\n#### 什么是 Q？\n\n`Q` 可以表述为一个包含两个参数——`s` 和 `a`——的函数。参数 `a` 也可以被看作一张表格。`Q`\
  \ 表示在状态 `s` 下执行动作 `a` 所获得的价值。`Q[s, a] = 即时奖励 + 折扣奖励`。即时奖励是智能体在执行动作时从一个状态转移到另一个状态所获得的分数。折扣奖励是为未来参考而给出的分数。\n\
  \n#### 如何使用 Q\n\n我们通常会遇到需要找出在何处利用 Q 表格值或 Q 值的情况，因此 Q 在此过程中得以实现。我们关注的是，当处于状态 `s`\
  \ 时，应该采取什么动作或实施哪种策略。我们使用 Q 表格来获得最佳结果。如果我们处于状态 `s`，需要确定哪个动作是最佳的。我们不改变 `s`，而是遍历 `a`\
  \ 的所有值，并确定哪个值最大。那将是我们应该采取的动作。数学上，这个想法如图 2-53 和 2-54 所示。\n\n![A454310_1_En_2_Fig53_HTML.jpg](img/A454310_1_En_2_Fig53_HTML.jpg)\
  \  \n图 2-53. 策略方程\n\n![A454310_1_En_2_Fig54_HTML.jpg](img/A454310_1_En_2_Fig54_HTML.jpg)\
  \  \n图 2-54. 策略如何工作\n\n对于 MDP，我们应实施的策略取决于当前状态。我们最大化奖励以获得最优解。\n\n#### 在 Python 中实现\
  \ SARSA\n\n\n\n回顾一下，`SARSA`是一种同策略强化学习方法。例如，`SARSA`可用于解决迷宫问题。使用`SARSA`方法时，我们无法比较两个不同的迷宫环境。必须坚持使用同一个迷宫，我们以前者为例。同样，我们也不能将这个迷宫与外部其他迷宫进行比较；必须专注于当前正在处理的迷宫。`SARSA`最大的优点在于，它可以从当前状态与下一个状态或后续状态的比较中进行学习。我们积累所有经验并从中学习。\n\
  \n让我们进一步分解这个想法。该场景表明，可以通过比较后续步骤中的变化，然后在`Q`表上进行更新并做出决策。图 2-55 展示了这一想法。![A454310_1_En_2_Fig55_HTML.jpg](img/A454310_1_En_2_Fig55_HTML.jpg)\
  \ 图 2-55. 使用 SARSA 表更新结果\n\n`SARSA`在 Python 中的学习方法有所不同。它看起来像这样：`def learn(self,\
  \ s, a, r, s_, a_)`。此方法依赖于状态、动作、奖励、下一个状态和下一个动作。如果我们比较该算法并将其转换为 Python，该方程式的构造如图\
  \ 2-56 所示。![A454310_1_En_2_Fig56_HTML.jpg](img/A454310_1_En_2_Fig56_HTML.jpg) 图\
  \ 2-56. SARSA 方程\n\n它被转换为以下代码：`q_target = r + self.gamma * self.q_table.ix [s_,\
  \ a_]`。该方程与 Q 学习的区别在于此方程的变化：`q_target = r + self.gamma * self.q_table.ix [s_, :].max()`。`max()`值存在于\
  \ Q 学习中，但`SARSA`中没有。\n\n使用`SARSA`实现策略的逻辑如下所示：\n\n```python\n##### on-policy\nclass\
  \ SarsaTable(RL):\n    def __init__(self, actions, learning_rate=0.01, reward_decay=0.9,\
  \ e_greedy=0.9):\n        super(SarsaTable, self).__init__(actions, learning_rate,\
  \ reward_decay, e_greedy)\n\n    def learn(self, s, a, r, s_, a_):\n        self.check_state_exist(s_)\n\
  \        q_predict = self.q_table.ix[s, a]\n        if s_ != 'terminal':\n     \
  \       q_target = r + self.gamma * self.q_table.ix[s_, a_]  # next state is not\
  \ terminal\n        else:\n            q_target = r  # next state is terminal\n\
  \        self.q_table.ix[s, a] += self.lr * (q_target - q_predict)  # update\n```\n\
  \n学习过程与 Q 学习有些不同。其逻辑遵循前面讨论的原则。我们将当前状态和动作与下一个状态和下一个动作结合起来。这反过来更新了`Q`表。这就是学习的工作方式。\n\
  \n```python\ndef update():\n    for episode in range(100):\n        # initial observation\n\
  \        observation = env.reset()\n        # RL choose action based on observation\n\
  \        action = RL.choose_action(str(observation))\n        while True:\n    \
  \        # fresh env\n            env.render()\n            # RL take action and\
  \ get next observation and reward\n            observation_, reward, done = env.step(action)\n\
  \            # RL choose action based on next observation\n            action_ =\
  \ RL.choose_action(str(observation_))\n            # RL learn from this transition\
  \ (s, a, r, s, a) ==> Sarsa\n            RL.learn(str(observation), action, reward,\
  \ str(observation_), action_)\n            # swap observation and action\n     \
  \       observation = observation_\n            action = action_\n            #\
  \ break while loop when end of this episode\n            if done:\n            \
  \    break\n```\n\n以下是创建迷宫的代码：\n\n```python\nimport numpy as np\nimport time\nimport\
  \ sys\nif sys.version_info.major == 2:\n    import Tkinter as tk\nelse:\n    import\
  \ tkinter as tk\n\nUNIT = 40   # pixels\nMAZE_H = 4  # grid height\nMAZE_W = 4 \
  \ # grid width\n\nclass Maze(tk.Tk, object):\n    def __init__(self):\n        super(Maze,\
  \ self).__init__()\n        self.action_space = ['u', 'd', 'l', 'r']\n        self.n_actions\
  \ = len(self.action_space)\n        self.title('maze')\n        self.geometry('{0}x{1}'.format(MAZE_H\
  \ * UNIT, MAZE_H * UNIT))\n        self._build_maze()\n\n    def _build_maze(self):\n\
  \        self.canvas = tk.Canvas(self, bg='white',\n                           height=MAZE_H\
  \ * UNIT,\n                           width=MAZE_W * UNIT)\n        # create grids\n\
  \        for c in range(0, MAZE_W * UNIT, UNIT):\n            x0, y0, x1, y1 = c,\
  \ 0, c, MAZE_H * UNIT\n            self.canvas.create_line(x0, y0, x1, y1)\n   \
  \     for r in range(0, MAZE_H * UNIT, UNIT):\n            x0, y0, x1, y1 = 0, r,\
  \ MAZE_H * UNIT, r\n            self.canvas.create_line(x0, y0, x1, y1)\n      \
  \  # create origin\n        origin = np.array([20, 20])\n        # hell\n      \
  \  hell1_center = origin + np.array([UNIT * 2, UNIT])\n        self.hell1 = self.canvas.create_rectangle(\n\
  \            hell1_center[0] - 15, hell1_center[1] - 15,\n            hell1_center[0]\
  \ + 15, hell1_center[1] + 15,\n            fill='black')\n        # hell\n     \
  \   hell2_center = origin + np.array([UNIT, UNIT * 2])\n        self.hell2 = self.canvas.create_rectangle(\n\
  \            hell2_center[0] - 15, hell2_center[1] - 15,\n            hell2_center[0]\
  \ + 15, hell2_center[1] + 15,\n            fill='black')\n        # create oval\n\
  \        oval_center = origin + UNIT * 2\n        self.oval = self.canvas.create_oval(\n\
  \            oval_center[0] - 15, oval_center[1] - 15,\n            oval_center[0]\
  \ + 15, oval_center[1] + 15,\n            fill='yellow')\n        # create red rect\n\
  \        self.rect = self.canvas.create_rectangle(\n            origin[0] - 15,\
  \ origin[1] - 15,\n            origin[0] + 15, origin[1] + 15,\n            fill='red')\n\
  \        # pack all\n        self.canvas.pack()\n\n    def reset(self):\n      \
  \  self.update()\n        time.sleep(0.5)\n        self.canvas.delete(self.rect)\n\
  \        origin = np.array([20, 20])\n        self.rect = self.canvas.create_rectangle(\n\
  \            origin[0] - 15, origin[1] - 15,\n            origin[0] + 15, origin[1]\
  \ + 15,\n            fill='red')\n        # return observation\n        return self.canvas.coords(self.rect)\n\
  \n    def step(self, action):\n        s = self.canvas.coords(self.rect)\n     \
  \   base_action = np.array([0, 0])\n        if action == 0:   # up\n           \
  \ if s[1] > UNIT:\n                base_action[1] -= UNIT\n        elif action ==\
  \ 1:   # down\n            if s[1] < (MAZE_H - 1) * UNIT:\n                base_action[1]\
  \ += UNIT\n        elif action == 2:   # right\n            if s[0] < (MAZE_W -\
  \ 1) * UNIT:\n                base_action[0] += UNIT\n        elif action == 3:\
  \   # left\n            if s[0] > UNIT:\n                base_action[0] -= UNIT\n\
  \        self.canvas.move(self.rect, base_action[0], base_action[1])  # move agent\n\
  \        s_ = self.canvas.coords(self.rect)  # next state\n        # reward function\n\
  \        if s_ == self.canvas.coords(self.oval):\n            reward = 1\n     \
  \       done = True\n        elif s_ in [self.canvas.coords(self.hell1), self.canvas.coords(self.hell2)]:\n\
  \            reward = -1\n            done = True\n        else:\n            reward\
  \ = 0\n            done = False\n        return s_, reward, done\n\n    def render(self):\n\
  \        time.sleep(0.1)\n        self.update()\n```\n\n#### Python 中的完整强化学习逻辑\n\
  \n\n\n当你在 Python 中实现该算法时，其结构如下所示。相关内容位于代码仓库中。\n\n```python\nimport numpy as np\n\
  import pandas as pd\n\nclass RL(object):\n    def __init__(self, action_space, learning_rate=0.01,\
  \ reward_decay=0.9, e_greedy=0.9):\n        self.actions = action_space  # a list\n\
  \        self.lr = learning_rate\n        self.gamma = reward_decay\n        self.epsilon\
  \ = e_greedy\n        self.q_table = pd.DataFrame(columns=self.actions)\n\n    def\
