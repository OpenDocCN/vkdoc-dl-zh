  \n本章介绍了如何将 Keras 与强化学习结合使用，并定义了如何将 Keras 用于深度 Q 学习。\n\n\n\n## 什么是 Keras？\n\nKeras\
  \ 是一个用于神经网络的**开源**前端库。我们可以说它充当了神经网络的骨干，因为它具有非常强大的激活函数构建能力。Keras 可以将不同的深度学习框架作为后端运行。Keras\
  \ 可与众多深度学习框架协同工作。从一个框架切换到另一个框架的方法是修改 `keras.json` 文件，该文件位于 Keras 的安装目录中。需要按如下方式修改\
  \ `backend` 参数：`{ \"backend\" : \"tensorflow\" }`。如果你愿意，可以将该参数从 TensorFlow 更改为其他框架。在\
