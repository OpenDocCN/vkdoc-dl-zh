  \ 进行强化学习\n\n首先，你需要导入重要的库。`TFLearn` 创建了原型，使程序能够非常快速地实现强化学习。添加一个学习率。通过初始化一个模拟环境，然后使用以下命令指示运动模式：`action\
  \ = env.action_space.sample()`。此示例将观察结果与平衡车杆（向左或向右移动）的运动配对。在给定的问题中，强化学习的基础是我们所参考的分数。应用强化学习后，我们使用\
  \ `TFLearn` 训练模型，这是一个用于 `TensorFlow` 的模块，用于创建全连接神经网络并产生更快的训练过程。\n\n```python\nimport\
  \ gym\nimport random\nimport numpy as np\nimport tflearn\nfrom tflearn.layers.core\
  \ import input_data, dropout, fully_connected\nfrom tflearn.layers.estimator import\
  \ regression\nfrom statistics import median, mean\nfrom collections import Counter\n\
  \nLR = 1e-3\nenv = gym.make(\"CartPole-v0\")\nenv.reset()\ngoal_steps = 500\nscore_requirement\
  \ = 50\ninitial_games = 10000\n\ndef some_random_games_first():\n    # 每个循环都是一个独立的游戏。\n\
  \    for episode in range(5):\n        env.reset()\n        # 这是每一帧，最多 200 帧...但我们不会跑那么远。\n\
  \        for t in range(200):\n            # 这将显示环境\n            # 只有当你真的想看到它时才显示。\n\
  \            # 显示它会花费更长的时间。\n            env.render()\n            # 这将在任何环境中创建一个样本动作。\n\
  \            # 在这个环境中，动作可以是 0 或 1，分别代表左或右\n            action = env.action_space.sample()\n\
  \            # 这使用一个动作执行环境，\n            # 并返回环境的观察结果、\n            # 奖励、环境是否结束以及其他信息。\n\
  \            observation, reward, done, info = env.step(action)\n            if\
  \ done:\n                break\n\nsome_random_games_first()\n\ndef initial_population():\n\
  \    # [观察结果, 动作]\n    training_data = []\n    # 所有分数：\n    scores = []\n    # 仅达到阈值的分数：\n\
  \    accepted_scores = []\n    # 遍历我们想要的任意数量的游戏：\n    for _ in range(initial_games):\n\
  \        score = 0\n        # 专门针对此环境的动作：\n        game_memory = []\n        # 我们看到的先前观察结果\n\
  \        prev_observation = []\n        # 对于 200 帧中的每一帧\n        for _ in range(goal_steps):\n\
  \            # 选择随机动作（0 或 1）\n            action = random.randrange(0,2)\n     \
  \       # 执行它！\n            observation, reward, done, info = env.step(action)\n\
  \            # 注意，观察结果是从动作返回的\n            # 所以我们将在此处存储先前的观察结果，将\n            #\
  \ 先前的观察结果与我们将要采取的动作配对。\n            if len(prev_observation) > 0 :\n           \
  \     game_memory.append([prev_observation, action])\n            prev_observation\
  \ = observation\n            score+=reward\n            if done: break\n       \
  \ # 如果我们的分数高于阈值，我们希望保存\n        # 我们所做的每一步\n        # 注意这里的强化学习方法。\n        # 我们所做的只是强化分数，我们并不试图\n\
  \        # 以任何方式影响机器如何达到该分数。\n        if score >= score_requirement:\n         \
  \   accepted_scores.append(score)\n            for data in game_memory:\n      \
  \          # 转换为独热编码（这是我们神经网络的输出层）\n                if data[1] == 1:\n         \
  \           output = [0,1]\n                elif data[1] == 0:\n               \
  \     output = [1,0]\n                # 保存我们的训练数据\n                training_data.append([data[0],\
  \ output])\n        # 重置环境以再次游戏\n        env.reset()\n        # 保存所有分数\n       \
  \ scores.append(score)\n    # 以防你以后想参考\n    training_data_save = np.array(training_data)\n\
  \    np.save('saved.npy',training_data_save)\n    # 一些统计数据，进一步说明神经网络的魔力！\n    print('平均接受分数:',mean(accepted_scores))\n\
  \    print('接受分数的中位数:',median(accepted_scores))\n    print(Counter(accepted_scores))\n\
  \    return training_data\n\ndef neural_network_model(input_size):\n    network\
  \ = input_data(shape=[None, input_size, 1], name='input')\n    network = fully_connected(network,\
  \ 128, activation='relu')\n    network = dropout(network, 0.8)\n    network = fully_connected(network,\
  \ 256, activation='relu')\n    network = dropout(network, 0.8)\n    network = fully_connected(network,\
  \ 512, activation='relu')\n    network = dropout(network, 0.8)\n    network = fully_connected(network,\
  \ 256, activation='relu')\n    network = dropout(network, 0.8)\n    network = fully_connected(network,\
  \ 128, activation='relu')\n    network = dropout(network, 0.8)\n    network = fully_connected(network,\
  \ 2, activation='softmax')\n    network = regression(network, optimizer='adam',\
  \ learning_rate=LR, loss='categorical_crossentropy', name='targets')\n    model\
  \ = tflearn.DNN(network, tensorboard_dir='log')\n    return model\n\ndef train_model(training_data,\
  \ model=False):\n    X = np.array([i[0] for i in training_data]).reshape(-1,len(training_data[0][0]),1)\n\
  \    y = [i[1] for i in training_data]\n    if not model:\n        model = neural_network_model(input_size\
  \ = len(X[0]))\n        x = np.reshape(x, (-1, 30, 9))\n    model.fit({'input':\
  \ X}, {'targets': y}, n_epoch=5, snapshot_step=500, show_metric=True, run_id='openai_learning')\n\
  \    return model\n\nmodel = train_model(training_data)\n\nscores = []\nchoices\
  \ = []\nfor each_game in range(10):\n    score = 0\n    game_memory = []\n    prev_obs\
  \ = []\n    env.reset()\n    for _ in range(goal_steps):\n        env.render()\n\
  \        if len(prev_obs)==0:\n            action = random.randrange(0,2)\n    \
  \    else:\n            action = np.argmax(model.predict(prev_obs.reshape(-1,len(prev_obs),1))[0])\n\
  \        choices.append(action)\n        new_observation, reward, done, info = env.step(action)\n\
  \        prev_obs = new_observation\n        game_memory.append([new_observation,\
  \ action])\n        score+=reward\n        if done: break\n    scores.append(score)\n\
  \nprint('平均分数:',sum(scores)/len(scores))\nprint('选择 1:{}  选择 0:{}'.format(choices.count(1)/len(choices),choices.count(0)/len(choices)))\n\
  print(score_requirement)\n```\n\n以下是输出结果：\n\n```\n平均分数: 195.9\n选择 1:0.5074017355793773\
  \  选择 0:0.49259826442062277\n50\n已解决。\n```\n\n## 结论\n\n本章涉及了 Q 学习，然后展示了一些示例。它还涵盖了\
  \ MDP 工具箱、群体智能和游戏 AI，并以一个完整的示例结束。第 5 章介绍了使用 Keras、TensorFlow 和 ChainerRL 进行强化学习。\n\
