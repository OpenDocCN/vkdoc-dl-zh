- "# 3. OpenAI 基础\n\nAbhishek Nandy^(1 ) and Manisha Biswas² (1) 印度西孟加拉邦加尔各答 Swaranika\
  \ Co-Opt HSG 大楼 HIG L-2/4 室 (2) 印度西孟加拉邦北 24 帕尔加纳区\n\n本章将介绍 OpenAI 的世界，并将其应用于强化学习。首先，我们探讨对强化学习至关重要的环境。我们讨论两个对强化学习有用的支持平台——Google\
  \ DeepMind 和 OpenAI，后者由 Elon Musk 支持。本章将讨论完全开源的 OpenAI，而 Google DeepMind 将在第 6 章中讨论。本章首先介绍\
  \ OpenAI 的基础知识，然后进行详细描述，并讨论 OpenAI Gym 和 OpenAI Universe 环境。接着，我们介绍在 Ubuntu 和 Anaconda\
  \ 发行版上安装 OpenAI Gym 和 OpenAI Universe。最后，我们讨论如何使用 OpenAI Gym 和 OpenAI Universe 进行强化学习。\n\
  \n\n\n## 认识 OpenAI\n\n首先，你需要访问 OpenAI 网站 [`openai.com/`](https://openai.com/)。该网站如图\
  \ 3-1 所示。![A454310_1_En_3_Fig1_HTML.jpg](img/A454310_1_En_3_Fig1_HTML.jpg) 图 3-1.\
  \ OpenAI 网站\n\nOpenAI 网站内容丰富，资源众多。它提供了大量资源供你学习和研究。让我们概览一下 OpenAI Gym 和 OpenAI Universe\
  \ 是如何连接的。见图 3-2。![A454310_1_En_3_Fig2_HTML.jpg](img/A454310_1_En_3_Fig2_HTML.jpg)\
  \ 图 3-2. OpenAI Gym 和 OpenAI Universe\n\n图 3-2 通过图标展示了 OpenAI Gym 和 OpenAI Universe\
  \ 的连接方式。该网站的 OpenAI Gym 页面如图 3-3 所示。![A454310_1_En_3_Fig3_HTML.jpg](img/A454310_1_En_3_Fig3_HTML.jpg)\
  \ 图 3-3. OpenAI Gym 网站\n\nOpenAI Gym 是一个工具包，可帮助你运行模拟游戏和场景，以应用强化学习以及强化学习算法。它支持训练智能体执行多种活动，例如玩耍、行走等。\n\
  \nOpenAI Universe 网站如图 3-4 所示。![A454310_1_En_3_Fig4_HTML.jpg](img/A454310_1_En_3_Fig4_HTML.jpg)\
