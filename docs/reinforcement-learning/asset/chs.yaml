  \n图 3-20. 运行渲染函数后的输出\n\n本节将以经典街机游戏为例。首先，使用以下命令打开所需的 Anaconda 环境：\n\n```\nsource\
  \ activate universe\n```\n\n然后进入相应目录，例如 gym：\n\n```\ncd gym\n```\n\n在终端中，使用以下命令启动\
  \ Jupyter Notebook：\n\n```\njupyter notebook\n```\n\n这样你就可以开始使用 Python 选项了。图 3-21\
  \ 展示了使用经典街机游戏的过程。\n\n![A454310_1_En_3_Fig21_HTML.jpg](img/A454310_1_En_3_Fig21_HTML.jpg)\n\
  \n图 3-21. 使用经典街机游戏\n\n使用 `env.reset()` 后，会生成一个数组，如图 3-22 所示。\n\n![A454310_1_En_3_Fig22_HTML.jpg](img/A454310_1_En_3_Fig22_HTML.jpg)\n\
  \n图 3-22. 正在创建数组\n\n如果使用 `env.render()`，将生成如图 3-23 所示的输出。\n\n![A454310_1_En_3_Fig23_HTML.jpg](img/A454310_1_En_3_Fig23_HTML.jpg)\n\
  \n图 3-23. 渲染输出\n\n此示例只是模拟不同类型的游戏环境，并将其设置为强化学习环境。以下是模拟《太空侵略者》游戏的代码：\n\n```\nimport\
  \ gym\nenv = gym.make('SpaceInvaders-v0')\nenv.reset()\nenv.render()\n```\n\n在下一节中，你将学习如何使用\
  \ OpenAI Universe。\n\n### OpenAI Universe\n\n在此示例中，你将使用 Jupyter Notebook 模拟一个游戏环境，然后对其应用强化学习。进入\
  \ universe 目录并启动 Jupyter Notebook。\n\n```\nimport gym\nimport universe  # 注册 universe\
  \ 环境\nenv = gym.make('flashgames.DuskDrive-v0')\nenv.configure(remotes=1)  # 自动创建一个本地\
  \ Docker 容器\nobservation_n = env.reset()\nwhile True:\n    action_n = [[('KeyEvent',\
  \ 'ArrowUp', True)] for ob in observation_n]  # 你的智能体在此处\n    observation_n, reward_n,\
  \ done_n, info = env.step(action_n)\n    env.render()\n```\n\n图 3-24 展示了为 DuskDrive\
  \ 游戏设置环境所需的代码。\n\n![A454310_1_En_3_Fig24_HTML.jpg](img/A454310_1_En_3_Fig24_HTML.jpg)\n\
  \n图 3-24. 为 DuskDrive 游戏设置环境\n\n现在它将访问镜像并远程启动镜像。它将运行游戏，并在智能体的帮助下开始远程游戏。见图 3-25。\n\
  \n![A454310_1_En_3_Fig25_HTML.jpg](img/A454310_1_En_3_Fig25_HTML.jpg)\n\n图 3-25.\
  \ 智能体运行的游戏\n\n首先，导入 `gym` 库，这是 OpenAI Universe 构建的基础。你还必须导入 `universe`，它会注册所有 Universe\
  \ 环境。你导入 `gym` 库，因为你将在 OpenAI Gym 和 Universe 上进行模拟：\n\n```\nimport gym\nimport universe\
  \  # 注册 universe 环境\n```\n\n之后，创建一个用于加载将要模拟的 Flash 游戏的环境（本例中为 DuskDrive 游戏）。\n\n\
  ```\nenv = gym.make('flashgames.DuskDrive-v0')\n```\n\n调用 `configure`，它会创建一个 Docker\
  \ 化环境，用于在本地运行模拟。\n\n```\nenv.configure(remotes=1)\n```\n\n然后调用 `env.reset()` 来异步实例化适当的模拟环境：\n\
  \n```\nobservation_n = env.reset()\n```\n\n然后定义 `KeyEvent` 和 `ArrowUp` 动作，以在模拟环境中移动汽车：\n\
  \n```\naction_n = [[('KeyEvent', 'ArrowUp', True)] for ob in observation_n]\n```\n\
  \n为了获取奖励并检查回合状态，你使用以下代码并进行相应渲染：\n\n```\nobservation_n, reward_n, done_n, info =\
  \ env.step(action_n)\nenv.render()\n```\n\n## 结论\n\n本章详细介绍了 OpenAI。首先，它从总体上描述了 OpenAI，然后描述了\
  \ OpenAI Gym 和 OpenAI Universe。我们涉及了安装 OpenAI Gym 和 OpenAI Universe，然后开始使用 Python\
  \ 语言为它们编写代码。最后，我们看了一些 OpenAI Gym 和 OpenAI Universe 的示例。\n\n© Abhishek Nandy and\
  \ Manisha Biswas 2018  \nAbhishek Nandy and Manisha Biswas  \n《强化学习》  \n`doi.org/10.1007/978-1-4842-3285-9_4`\n\
