  ```\n\n图 5-10 显示了结果。\n\n![A454310_1_En_5_Fig10_HTML.jpg](img/A454310_1_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10. 克隆 ChainerRL\n\n然后进入 `chainerrl` 文件夹，如图 5-11 所示。\n\n![A454310_1_En_5_Fig11_HTML.jpg](img/A454310_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11. 进入 `chainerrl` 文件夹\n\n\n\n#### 使用 ChainerRL 的流程\n\n由于该库基于 Python，因此首选语言自然是\
  \ Python。请按照以下步骤设置 ChainerRL：\n\n1.  导入 `gym`、`numpy` 和支持性的 `chainerrl` 库。\n\n```python\n\
  import chainer\nimport chainer.functions as F\nimport chainer.links as L\nimport\
  \ chainerrl\nimport gym\nimport numpy as np\n```\n\n你需要建模一个环境，以便使用 OpenAI Gym（见图\
  \ 5-12）。该环境包含两个空间：\n-   观测空间\n-   动作空间\n\n它们必须包含两个方法：`reset` 和 `step`。\n\n![A454310_1_En_5_Fig12_HTML.jpg](img/A454310_1_En_5_Fig12_HTML.jpg)\
  \  \n图 5-12. ChainerRL 如何使用状态转换\n\n2.  从 OpenAI 模拟环境中获取一个模拟环境，例如 `Cartpole-v0`。\n\
  \n```python\nenv = gym.make('CartPole-v0')\nprint('observation space:', env.observation_space)\n\
  print('action space:', env.action_space)\nobs = env.reset()\nenv.render()\nprint('initial\
  \ observation:', obs)\naction = env.action_space.sample()\nobs, r, done, info =\
  \ env.step(action)\nprint('next observation:', obs)\nprint('reward:', r)\nprint('done:',\
  \ done)\nprint('info:', info)\n```\n\n3.  现在定义一个智能体，它将通过与环境的交互来运行。这里使用的是 `QFunction`（`chainer.Chain`）类：\n\
  \n```python\ndef __init__(self, obs_size, n_actions, n_hidden_channels=50):\n  \
  \  super().__init__(\n        l0=L.Linear(obs_size, n_hidden_channels),\n      \
  \  l1=L.Linear(n_hidden_channels, n_hidden_channels),\n        l2=L.Linear(n_hidden_channels,\
  \ n_actions))\n\ndef __call__(self, x, test=False):\n    \"\"\"\n    Args:\n   \
  \     x (ndarray or chainer.Variable): An observation\n        test (bool): a flag\
  \ indicating whether it is in test mode\n    \"\"\"\n    h = F.tanh(self.l0(x))\n\
  \    h = F.tanh(self.l1(h))\n    return chainerrl.action_value.DiscreteActionValue(self.l2(h))\n\
  \nobs_size = env.observation_space.shape[0]\nn_actions = env.action_space.n\nq_func\
  \ = QFunction(obs_size, n_actions)\n```\n\n我们应用 Q 学习等。我们从智能体开始。\n\n```python\ngamma\
  \ = 0.95\n\n## 使用 epsilon-greedy 进行探索\nexplorer = chainerrl.explorers.ConstantEpsilonGreedy(\n\
  \    epsilon=0.3, random_action_func=env.action_space.sample)\n\n# DQN 使用经验回放。\n\
  # 指定一个回放缓冲区及其容量。\nreplay_buffer = chainerrl.replay_buffer.ReplayBuffer(capacity=10\
  \ ** 6)\n\n# 由于 CartPole-v0 的观测值是 numpy.float64 类型，而\n# Chainer 默认只接受 numpy.float32\
  \ 类型，因此\n# 指定一个转换器作为特征提取函数 phi。\nphi = lambda x: x.astype(np.float32, copy=False)\n\
  \n# 现在创建一个将与环境交互的智能体。\nagent = chainerrl.agents.DoubleDQN(\n    q_func, optimizer,\
  \ replay_buffer, gamma, explorer,\n    replay_start_size=500, update_interval=1,\n\
  \    target_update_interval=100, phi=phi)\n```\n\n4.  开始强化学习过程。你首先需要在 Universe 环境中打开\
  \ jupyter notebook，如图 5-13 所示。\n\n![A454310_1_En_5_Fig13_HTML.jpg](img/A454310_1_En_5_Fig13_HTML.jpg)\
