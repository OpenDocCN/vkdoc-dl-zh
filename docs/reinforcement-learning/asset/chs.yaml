  \n图 2-59. 运行 `run_this.py`\n\n要从终端运行程序，请使用以下命令：`python run_this.py`\n\n运行代码后，程序将开始玩迷宫游戏，如图\
  \ 2-60 所示。\n\n![A454310_1_En_2_Fig60_HTML.jpg](img/A454310_1_En_2_Fig60_HTML.jpg)\n\
  \n图 2-60. 程序正在玩迷宫游戏\n\n### 强化学习中的动态规划\n\n顺序性或时间性问题可以通过动态规划来解决。如果你遇到一个复杂问题，必须将其分解为子问题。动态规划就是将问题分解为子问题、求解这些子问题，最后将它们组合起来解决整体问题的过程。最优子结构和最优性原理在此适用。解决方案可以被缓存并重复使用。参见图\
  \ 2-61。\n\n![A454310_1_En_2_Fig61_HTML.jpg](img/A454310_1_En_2_Fig61_HTML.jpg)\n\
  \n图 2-61. 动态问题求解方法\n\n## 结论\n\n本章介绍了与强化学习相关的不同算法。你还看到了一个使用 Python 实现的简单强化学习示例。接着，你通过一个\
  \ Python 示例学习了 SARSA 算法。本章最后讨论了动态规划的基础知识。© Abhishek Nandy and Manisha Biswas 2018\
  \ Abhishek Nandy and Manisha Biswas Reinforcement Learning `doi.org/10.1007/978-1-4842-3285-9_3`\n\
