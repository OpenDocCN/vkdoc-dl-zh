  \            # append new state to q table\n            self.q_table = self.q_table.append(\n\
  \                pd.Series(\n                    [0]*len(self.actions),\n      \
  \              index=self.q_table.columns,\n                    name=state,\n  \
  \              )\n            )\n\n    def choose_action(self, observation):\n \
  \       self.check_state_exist(observation)\n        # action selection\n      \
  \  if np.random.rand() < self.epsilon:\n            # choose best action\n     \
  \       state_action = self.q_table.ix[observation, :]\n            state_action\
  \ = state_action.reindex(np.random.permutation(state_action.index))     # some actions\
  \ have the same value\n            action = state_action.argmax()\n        else:\n\
  \            # choose random action\n            action = np.random.choice(self.actions)\n\
  \        return action\n\n    def learn(self, *args):\n        Pass\n\n##### off-policy\n\
  class QLearningTable(RL):\n    def __init__(self, actions, learning_rate=0.01, reward_decay=0.9,\
  \ e_greedy=0.9):\n        super(QLearningTable, self).__init__(actions, learning_rate,\
  \ reward_decay, e_greedy)\n\n    def learn(self, s, a, r, s_):\n        self.check_state_exist(s_)\n\
  \        q_predict = self.q_table.ix[s, a]\n        if s_ != 'terminal':\n     \
  \       q_target = r + self.gamma * self.q_table.ix[s_, :].max()  # next state is\
  \ not terminal\n        else:\n            q_target = r  # next state is terminal\n\
  \        self.q_table.ix[s, a] += self.lr * (q_target - q_predict)  # update\n\n\
  ##### on-policy\nclass SarsaTable(RL):\n    def __init__(self, actions, learning_rate=0.01,\
  \ reward_decay=0.9, e_greedy=0.9):\n        super(SarsaTable, self).__init__(actions,\
  \ learning_rate, reward_decay, e_greedy)\n\n    def learn(self, s, a, r, s_, a_):\n\
  \        self.check_state_exist(s_)\n        q_predict = self.q_table.ix[s, a]\n\
  \        if s_ != 'terminal':\n            q_target = r + self.gamma * self.q_table.ix[s_,\
  \ a_]  # next state is not terminal\n        else:\n            q_target = r  #\
  \ next state is terminal\n        self.q_table.ix[s, a] += self.lr * (q_target -\
  \ q_predict)  # update\n```\n\n完整的训练过程在代码（`RL_brain.py`）中如下所示：\n\n```python\nfrom\
  \ maze_env import Maze\nfrom RL_brain import SarsaTable\n\ndef update():\n    for\
