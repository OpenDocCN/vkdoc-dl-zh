    \ = q_table.iloc[state, :]\n    if (np.random.uniform() > EPSILON) or (state_actions.all()\
    \ == 0):  # act non-greedy or state-action have no value\n        action_name\
    \ = np.random.choice(ACTIONS)\n    else:   # act greedy\n        action_name =\
    \ state_actions.argmax()\n    return action_name\n```\n\n现在我们创建环境，并确定智能体将如何在环境中工作：\n\
    \n```\ndef get_env_feedback(S, A):\n    # This is how the agent will interact\
    \ with the environment\n    if A == 'right':    # move right\n        if S ==\
    \ N_STATES - 2:   # terminate\n            S_ = 'terminal'\n            R = 1\n\
    \        else:\n            S_ = S + 1\n            R = 0\n    else:   # move\
    \ left\n        R = 0\n        if S == 0:\n            S_ = S  # reach the wall\n\
    \        else:\n            S_ = S - 1\n    return S_, R\n```\n\n此函数打印漫游者和寻宝条件：\n\
    \n```\ndef update_env(S, episode, step_counter):\n    # This is how the environment\
