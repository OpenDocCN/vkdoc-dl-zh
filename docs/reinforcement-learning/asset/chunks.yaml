  trans: "\n# 在 Python 中使用 MDP 工具箱\n\nMDP 工具箱提供了用于解决离散时间马尔可夫决策过程的类和函数。已实现的算法列表包括逆向归纳法、线性规划、策略迭代、Q\
    \ 学习和值迭代，以及它们的几种变体。以下是 MDP 工具箱的特性（见图 4-4）：\n\n- 八种 MDP 算法\n- 使用 NumPy 进行快速数组操作\n\
    - 使用 Scipy 的稀疏包提供完整的稀疏矩阵支持\n- 使用 `cvxopt` 提供可选的线性规划支持\n\n![A454310_1_En_4_Fig4_HTML.jpg](img/A454310_1_En_4_Fig4_HTML.jpg)\
    \ 图 4-4. MDP 工具箱特性\n\n接下来，你将看到如何为 Python 安装和配置 MDP 工具箱。首先，切换到 Anaconda 环境，如图 4-5\
    \ 所示。\n\n![A454310_1_En_4_Fig5_HTML.jpg](img/A454310_1_En_4_Fig5_HTML.jpg) 图 4-5.\
    \ 激活 Anaconda 环境\n\n现在使用以下命令安装依赖项（见图 4-6）：\n\n```\nsudo apt-get install python3-numpy\
    \ python3-scipy liblapack-dev libatlas-base-dev libgsl0-dev fftw-dev libglpk-dev\
    \ libdsdp-dev\n```\n\n![A454310_1_En_4_Fig6_HTML.jpg](img/A454310_1_En_4_Fig6_HTML.jpg)\
    \ 图 4-6. 安装依赖项\n\n当询问是否安装依赖项时，选择“是”，如图 4-7 所示。\n\n![A454310_1_En_4_Fig7_HTML.jpg](img/A454310_1_En_4_Fig7_HTML.jpg)\
    \ 图 4-7. 选择“是”以继续\n\n然后所有依赖项都会被安装，如图 4-8 所示。\n\n![A454310_1_En_4_Fig8_HTML.jpg](img/A454310_1_En_4_Fig8_HTML.jpg)\
    \ 图 4-8. 依赖项已安装\n\n现在你可以继续安装 MDP 工具箱，如图 4-9 所示。\n\n![A454310_1_En_4_Fig9_HTML.jpg](img/A454310_1_En_4_Fig9_HTML.jpg)\
    \ 图 4-9. 安装 MDP 工具箱\n\n重要的包正在安装中，如图 4-10 所示。\n\n![A454310_1_En_4_Fig10_HTML.jpg](img/A454310_1_En_4_Fig10_HTML.jpg)\
    \ 图 4-10. 安装重要包\n\n如果一切顺利，你将获得所有已安装的包，如图 4-11 所示。\n\n![A454310_1_En_4_Fig11_HTML.jpg](img/A454310_1_En_4_Fig11_HTML.jpg)\
    \ 图 4-11. 所有包已安装\n\n现在你需要从 GitHub 克隆仓库（见图 4-12）：\n\n```\ngit clone https://github.com/sawcordwell/pymdptoolbox.git\n\
    ```\n\n![A454310_1_En_4_Fig12_HTML.jpg](img/A454310_1_En_4_Fig12_HTML.jpg) 图 4-12.\
    \ 克隆仓库\n\n切换到 `mdptoolbox` 文件夹以查看详细信息，如图 4-13 所示。\n\n![A454310_1_En_4_Fig13_HTML.jpg](img/A454310_1_En_4_Fig13_HTML.jpg)\
    \ 图 4-13. 进入文件夹\n\n你现在需要切换到 Python 模式，如图 4-14 所示。\n\n![A454310_1_En_4_Fig14_HTML.jpg](img/A454310_1_En_4_Fig14_HTML.jpg)\
    \ 图 4-14. 进入 Python 模式\n\n我们现在将用一个例子来演示 MDP 工具箱如何工作。首先，导入 MDP 示例，如图 4-15 所示。\n\
    \n![A454310_1_En_4_Fig15_HTML.jpg](img/A454310_1_En_4_Fig15_HTML.jpg) 图 4-15.\
    \ 导入模块\n\n马尔可夫问题假设未来状态仅取决于当前状态，而不取决于之前发生的事件。我们将使用折扣值 0.8 来设置一个马尔可夫问题示例。要使用 MDP\
    \ 工具箱中的内置示例，你需要导入 `mdptoolbox.example` 并使用值迭代算法求解。然后你需要检查最优策略。最优策略是一个函数，它允许状态以最大奖励转移到下一个状态。你可以使用\
    \ `vi.policy` 命令检查策略，如图 4-16 所示。\n\n![A454310_1_En_4_Fig16_HTML.jpg](img/A454310_1_En_4_Fig16_HTML.jpg)\
    \ 图 4-16. 执行操作\n\n策略的输出是 `(0,0,0)`。结果显示已实施策略的折扣奖励。以下是完整程序：\n\n```\nimport mdptoolbox.example\n\
    P, R = mdptoolbox.example.forest()\nvi = mdptoolbox.mdp.ValueIteration(P, R, 0.8)\n\
    vi.run()\nvi.policy # 结果是 (0, 0, 0)\n```\n\n让我们考虑另一个例子。首先你需要导入工具箱和工具箱示例。通过使用导入示例，你引入了\
    \ MDP 工具箱中的内置示例（见图 4-17）。\n\n```\nimport mdptoolbox, mdptoolbox.example\n```\n\
    \n![A454310_1_En_4_Fig17_HTML.jpg](img/A454310_1_En_4_Fig17_HTML.jpg) 图 4-17.\
    \ MDP 的另一个示例\n\n我们在上一个示例中启用了详细模式，以便显示当前阶段和策略转置。\n\n```\n>>> import mdptoolbox,\
    \ mdptoolbox.example\n>>> P, R = mdptoolbox.example.forest()\n>>> fh = mdptoolbox.mdp.FiniteHorizon(P,\
    \ R, 0.9, 3)\n>>> fh.run()\n>>> fh.V\narray([[ 2.6973, 0.81  , 0.    , 0.    ],\n\
    \       [ 5.9373, 3.24  , 1.    , 0.    ],\n       [ 9.9373, 7.24  , 4.    , 0.\
    \    ]])\n>>> fh.policy\narray([[0, 0, 0],\n       [0, 0, 1],\n       [0, 0, 0]])\n\
    ```\n\n下一个示例也处于详细模式，每次迭代都会显示策略 n-1 和 n 之间不同动作的数量（见图 4-18）。\n\n![A454310_1_En_4_Fig18_HTML.jpg](img/A454310_1_En_4_Fig18_HTML.jpg)\
    \ 图 4-18. n-1 和 n 之间的策略\n\n我们借助 MDP 的内置示例，尝试使用值迭代来求解折扣 MDP。与 MDP 的情况一样，一些值通过使用\
    \ `rand(10,3)` 随机生成，另一些值则由决策过程提供。在此示例中，我们尝试通过应用强化学习结合值迭代来求解 MDP：\n\n```\n>>> import\
    \ mdptoolbox, mdptoolbox.example\n>>> P, R = mdptoolbox.example.rand(10, 3)\n\
    >>> pi = mdptoolbox.mdp.PolicyIteration(P, R, 0.9)\n>>> pi.run()\n>>> P, R = mdptoolbox.example.forest()\n\
    >>> pi = mdptoolbox.mdp.PolicyIteration(P, R, 0.9)\n>>> pi.run()\n>>> expected\
    \ = (26.244000000000014, 29.484000000000016, 33.484000000000016)\n>>> all(expected[k]\
    \ - pi.V[k] < 1e-12 for k in range(len(expected)))\n    True\n```\n\n8.2. 马尔可夫决策过程\
    \ (MDP) 工具箱：`mdp` 模块 21 Python 马尔可夫决策过程工具箱文档，版本 4.0-b4\n\n```\n>>> pi.policy\n\
    (0, 0, 0)\n```\n\n# 理解群体智能\n\n群体智能是人工智能的重要组成部分。它是一个去中心化、自组织系统的集体行为，无论是自然的还是人工的。群体智能通常由一群简单的智能体或人工生命程序组成，它们彼此之间以及与其环境进行局部交互，如图\
    \ 4-19 所示。\n\n![A454310_1_En_4_Fig19_HTML.jpg](img/A454310_1_En_4_Fig19_HTML.jpg)\
    \ 图 4-19. 群体智能交互\n\n## 群体智能的应用\n\n图 4-20 展示了群体智能的一些应用。\n\n![A454310_1_En_4_Fig20_HTML.jpg](img/A454310_1_En_4_Fig20_HTML.jpg)\
    \ 图 4-20. 群体智能的应用\n\n### 基于蚂蚁的路由\n\n当你处理类似于电信网络的问题时，这被称为基于蚂蚁的路由。基于蚂蚁的路由的思想基于强化学习，因为沿着特定网络数据包（可称为蚂蚁）有大量的向前和向后移动。这会导致整个网络被淹没。\n\
    \n### 人群模拟\n\n在电影中，人群模拟是借助群体优化来完成的。\n"
- fmt: "### Human Swarming\n\nThe concept of human swarming is based on the collective\
    \ usage of different minds to predict an answer. It’s when all of the brains of\
    \ different human beings attempt to find a particular solution to a complex problem.\
    \ Using collective brains in the form of human swarming results in more accurate\
    \ results.\n\n### Swarm Grammars\n\nSwarm grammars are particular characteristics\
    \ that act as different swarms working together to get varied results. The results\
    \ can be similar to art or architecture.\n\n#### Swarmic Art\n\nCombining different\
    \ characteristics of swarm behaviors between different species of birds and fish\
    \ can lead to swarmic art that shows patterns in swarm behavior. Before we cover\
    \ swarm intelligence in more detail, we touch on the Rastrigin function. Swarm\
    \ optimization is based on different functions, one of which is the Rastrigin\
    \ function, so you need to understand how it works.\n\n### The Rastrigin Function\n\
    \nIn mathematical optimization problems, the Rastrigin function is a nonconvex\
    \ function used as a performance test problem for optimization algorithms. The\
    \ formula is shown in Figure [4-21](#A454310_1_En_4_Chapter.xhtml#Fig21) and Figure\
    \ [4-22](#A454310_1_En_4_Chapter.xhtml#Fig22) shows its typical output. ![A454310_1_En_4_Fig21_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig21_HTML.jpg)\
    \ Figure 4-21. Depiction of the Rastrigin function ![A454310_1_En_4_Fig22_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig22_HTML.jpg)\
    \ Figure 4-22. Rastrigin function output\n\nLet’s get started with using the Rastrigin\
    \ function in Python. You need to activate the Anaconda environment first:\n\n\
    ```\nabhi@ubuntu:∼$ source activate universe\n(universe) abhi@ubuntu:∼$\n```\n\
    \nNow switch to Python mode:\n\n```\n(universe) abhi@ubuntu:∼$ python\nPython\
    \ 3.5.3 |Anaconda custom (64-bit)| (default, Mar  6 2017, 11:58:13) \n[GCC 4.4.7\
    \ 20120313 (Red Hat 4.4.7-1)] on linux\nType \"help\", \"copyright\", \"credits\"\
    \ or \"license\" for more information.\n>>>\n```\n\nAs we start building important\
    \ libraries, Python will cache them if they are not created, as shown in Figure\
    \ [4-23](#A454310_1_En_4_Chapter.xhtml#Fig23). ![A454310_1_En_4_Fig23_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig23_HTML.jpg)\
    \ Figure 4-23. Cache being created\n\nThe entire flow of the Python program is\
    \ as follows:\n\n```\npython\nPython 3.5.3 |Anaconda custom (64-bit)| (default,\
    \ Mar  6 2017, 11:58:13) \n[GCC 4.4.7 20120313 (Red Hat 4.4.7-1)] on linux\nType\
    \ \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> from matplotlib import cm\n>>> from mpl_toolkits.mplot3d import Axes3D\n/home/abhi/anaconda3/envs/universe/lib/python3.5/site-packages/matplotlib/font_manager.py:280:\
    \ UserWarning: Matplotlib is building the font cache using fc-list. This may take\
    \ a moment.\n  'Matplotlib is building the font cache using fc-list. '\n>>> import\
    \ math\n>>> import matplotlib.pyplot as plt\n>>> import numpy as np\n>>> def rastrigin(*X,\
