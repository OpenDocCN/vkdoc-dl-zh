- fmt: "# Maze Environment and Reinforcement Learning\n\nThe maze environment Python\
    \ file, shown here, lists all the concepts for making moves. We declare rewards\
    \ as well as ability to take the next step.\n\n```python\n\"\"\"\nReinforcement\
    \ learning maze example.\n\nRed rectangle:          explorer.\nBlack rectangles:\
    \       hells       [reward = -1].\nYellow bin circle:      paradise    [reward\
    \ = +1].\nAll other states:       ground      [reward = 0].\n\nThis script is\
    \ the environment part of this example.\nThe RL is in RL_brain.py.\n\nView more\
    \ on my tutorial page: https://morvanzhou.github.io/tutorials/\n\"\"\"\n\nimport\
    \ numpy as np\nimport time\nimport sys\n\nif sys.version_info.major == 2:\n  \
    \  import Tkinter as tk\nelse:\n    import tkinter as tk\n\nUNIT = 40   # pixels\n\
    MAZE_H = 4  # grid height\nMAZE_W = 4  # grid width\n\n\nclass Maze(tk.Tk, object):\n\
    \    def __init__(self):\n        super(Maze, self).__init__()\n        self.action_space\
    \ = ['u', 'd', 'l', 'r']\n        self.n_actions = len(self.action_space)\n  \
