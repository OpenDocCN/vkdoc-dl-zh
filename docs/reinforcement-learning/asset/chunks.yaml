  trans: '

    在运行示例之前，你需要执行一些步骤来安装软件。本书中的示例使用的是 Anaconda 版本的 Python，因此本节将介绍如何查找并下载它。


    首先，你需要打开一个终端。启动终端的过程如图 2-4 所示。


    ![A454310_1_En_2_Fig4_HTML.jpg](img/A454310_1_En_2_Fig4_HTML.jpg) 图 2-4. 打开终端


    接下来，你需要更新软件包。在终端中输入以下命令即可完成此操作。参见图 2-5。


    ```

    sudo apt-get update

    ```


    ![A454310_1_En_2_Fig5_HTML.jpg](img/A454310_1_En_2_Fig5_HTML.jpg) 图 2-5. 更新软件包


    运行更新命令后，所需的安装内容即被安装，如图 2-6 所示。


    ![A454310_1_En_2_Fig6_HTML.jpg](img/A454310_1_En_2_Fig6_HTML.jpg) 图 2-6. 所有内容已更新


    现在你可以使用另一个命令来安装所需的软件包。图 2-7 展示了这一过程。


    ```

    sudo apt-get install golang python3-dev python-dev libcupti-dev libjpeg-turbo8-dev
    make tmux htop chromium-browser git cmake zlib1g-dev libjpeg-dev xvfb libav-tools
    xorg-dev python-opengl libboost-all-dev libsdl2-dev swig

    ```


    ![A454310_1_En_2_Fig7_HTML.jpg](img/A454310_1_En_2_Fig7_HTML.jpg) 图 2-7. 获取更新


    如图 2-8 所示，你需要输入 `y`，然后按回车键继续。


    ![A454310_1_En_2_Fig8_HTML.jpg](img/A454310_1_En_2_Fig8_HTML.jpg) 图 2-8. 继续安装


    下一步，必要的软件包将被下载并相应更新，如图 2-9 所示。


    ![A454310_1_En_2_Fig9_HTML.jpg](img/A454310_1_En_2_Fig9_HTML.jpg) 图 2-9. 下载并解压软件包


    现在你已经安装了 Anaconda 发行版的 Python。接下来，你需要为 Ubuntu 打开一个浏览器窗口。本示例使用的是 Mozilla Firefox。搜索
    Anaconda 安装程序，如图 2-10 所示。


    ![A454310_1_En_2_Fig10_HTML.jpg](img/A454310_1_En_2_Fig10_HTML.jpg) 图 2-10. 下载
    Anaconda


    现在你需要找到适合你特定操作系统的下载版本。Anaconda 页面如图 2-11 所示。


    ![A454310_1_En_2_Fig11_HTML.jpg](img/A454310_1_En_2_Fig11_HTML.jpg) 图 2-11. Anaconda
    页面


    选择合适的 Anaconda 发行版，如图 2-12 所示。


    ![A454310_1_En_2_Fig12_HTML.jpg](img/A454310_1_En_2_Fig12_HTML.jpg) 图 2-12. 选择
    Anaconda 版本


    接下来保存文件，如图 2-13 所示。


    ![A454310_1_En_2_Fig13_HTML.jpg](img/A454310_1_En_2_Fig13_HTML.jpg) 图 2-13. 保存文件


    现在，你需要使用终端进入下载文件夹。你还应该检查正在保存的文件。参见图 2-14。


    ![A454310_1_En_2_Fig14_HTML.jpg](img/A454310_1_En_2_Fig14_HTML.jpg) 图 2-14. 进入下载文件夹


    现在你需要使用 `bash` 命令来运行 shell 脚本（参见图 2-15）：


    ```

    bash Anaconda3-4.4.0-Linux-x86_64.sh

    ```


    ![A454310_1_En_2_Fig15_HTML.jpg](img/A454310_1_En_2_Fig15_HTML.jpg) 图 2-15. 运行
    shell 脚本


    要选择平台，请输入 `yes` 并按回车键。Anaconda 将被安装到主目录位置，如图 2-16 所示。


    ![A454310_1_En_2_Fig16_HTML.jpg](img/A454310_1_En_2_Fig16_HTML.jpg) 图 2-16. 设置
    Anaconda 环境


    下一步，如图 2-17 所示，将安装 Anaconda 的所有重要软件包，以便其正确配置。


    ![A454310_1_En_2_Fig17_HTML.jpg](img/A454310_1_En_2_Fig17_HTML.jpg) 图 2-17. 安装
    Anaconda 的关键软件包


    Anaconda 安装完成后，你需要打开一个新的终端来设置你的 Anaconda 环境。你必须使用 `conda create` 命令为 Anaconda
    创建一个新环境（参见图 2-18）。此命令将所有软件包保存在一个隔离的位置。


    ```

    conda create --name universe python=3.6 anaconda

    ```


    ![A454310_1_En_2_Fig18_HTML.jpg](img/A454310_1_En_2_Fig18_HTML.jpg) 图 2-18. 创建环境


    下一步，Anaconda 环境将安装必要的软件包。参见图 2-19。


    ![A454310_1_En_2_Fig19_HTML.jpg](img/A454310_1_En_2_Fig19_HTML.jpg) 图 2-19. 用于安装或更新
    Anaconda 的软件包


    输入 `y`，然后按回车键继续。然后，在环境中的每个软件包都更新后，整个过程将完成。现在你可以激活该环境。参见图 2-20。


    ![A454310_1_En_2_Fig20_HTML.jpg](img/A454310_1_En_2_Fig20_HTML.jpg) 图 2-20. 用于安装或更新
    Anaconda 的软件包


    可能还需要安装一些额外的更新。你还需要安装 Swig，如图 2-21 所示。


    ```

    conda install pip six libgcc swig

    ```


    ![A454310_1_En_2_Fig21_HTML.jpg](img/A454310_1_En_2_Fig21_HTML.jpg) 图 2-21. 也安装
    Swig


    你还需要安装 OpenCV 以更新某些软件包，如图 2-22 所示。


    ![A454310_1_En_2_Fig22_HTML.jpg](img/A454310_1_En_2_Fig22_HTML.jpg) 图 2-22. 安装
    OpenCV


    如果 OpenCV 有更新，请输入 `y` 也安装它们。参见图 2-23。


    ![A454310_1_En_2_Fig23_HTML.jpg](img/A454310_1_En_2_Fig23_HTML.jpg) 图 2-23. 安装
    OpenCV


    接下来，你需要安装 TensorFlow。本章介绍如何安装 CPU 版本。参见图 2-24。


    ```

    pip install --upgrade tensorflow

    ```


    ![A454310_1_En_2_Fig24_HTML.jpg](img/A454310_1_En_2_Fig24_HTML.jpg) 图 2-24. 安装
    TensorFlow


    图 2-25 显示了正在为 TensorFlow 安装的软件包。


    ![A454310_1_En_2_Fig25_HTML.jpg](img/A454310_1_En_2_Fig25_HTML.jpg) 图 2-25. TensorFlow
    安装软件包


    下一步，如图 2-26 所示，请求安装其他软件包的权限。输入 `y` 继续。


    ![A454310_1_En_2_Fig26_HTML.jpg](img/A454310_1_En_2_Fig26_HTML.jpg) 图 2-26. 软件包安装进行中


    在下一节中，我们将安装 Docker。我们将首先了解什么是 Docker。

    '
- fmt: "# Installing Docker\n\nWhen you want to keep your containers in the cloud,\
    \ Docker is the best option. Developers generally use Docker to minimize workloads\
    \ on a single machine, because the entire architecture can be hosted on the developer\
    \ environment. Enterprises use Docker to maintain an agile environment. Operators\
    \ generally use Docker to keep an eye on apps and to run and manage them effectively.\
    \ Now you will install Docker, as it is essential for OpenAI Gym and Universe\
    \ to work. You need to install Docker because, when you are training an environment,\
    \ Docker is very responsive to simulations since it runs with low resources. The\
    \ command to be entered in the terminal is shown here:\n\n```\n$ sudo apt-get\
    \ install \\\n    apt-transport-https \\\n    ca-certificates \\\n    curl \\\n\
    \    software-properties-common\n```\n\nThe next command to enter is:\n\n```\n\
    $ curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -\n\
    ```\n\nYou use `curl` and the http link so that Docker can access these trusted\
    \ key values. Now download the Docker type using this command:\n\n```\n$ sudo\
    \ add-apt-repository \\\n   \"deb [arch=amd64] https://download.docker.com/linux/ubuntu\
    \ \\\n   $(lsb_release -cs) \\\n   stable\"\n```\n\nType this command to update\
    \ Docker, as shown in Figure [2-27](#A454310_1_En_2_Chapter.xhtml#Fig27):\n\n\
    ```\n$ sudo apt-get update\n```\n\n![A454310_1_En_2_Fig27_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig27_HTML.jpg)\n\
    \nFigure 2-27. Updating the package\n\nType this command to install Docker, as\
    \ shown in Figure [2-28](#A454310_1_En_2_Chapter.xhtml#Fig28):\n\n```\n$ sudo\
    \ apt-get install docker-ce\n```\n\n![A454310_1_En_2_Fig28_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig28_HTML.jpg)\n\
    \nFigure 2-28. Docker installation\n\nTo test Docker, use this command (see Figure\
    \ [2-29](#A454310_1_En_2_Chapter.xhtml#Fig29)):\n\n```\n$ sudo service docker\
    \ start\n$ sudo docker run hello-world\n```\n\n![A454310_1_En_2_Fig29_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig29_HTML.jpg)\n\
    \nFigure 2-29. Testing docker\n\n# An Example of Reinforcement Learning with Python\n\
    \nThis section goes through an example of Reinforcement Learning and explains\
    \ the flow of the algorithm. You’ll see how Reinforcement Learning can be applied.\
    \ This section uses an open source GitHub repo that has a very good example of\
    \ Reinforcement Learning. You will need to clone it to work with it. The GitHub\
    \ repo link is [https://github.com/MorvanZhou/Reinforcement-learning-with-tensorflow](https://github.com/MorvanZhou/Reinforcement-learning-with-tensorflow).\
    \ Within the Ubuntu module, get inside the terminal and start cloning the repo,\
    \ as shown in Figure [2-30](#A454310_1_En_2_Chapter.xhtml#Fig30).\n\n![A454310_1_En_2_Fig30_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig30_HTML.jpg)\n\
    \nFigure 2-30. Cloning the repo\n\nFigure [2-31](#A454310_1_En_2_Chapter.xhtml#Fig31)\
    \ shows how the repo is replicated.\n\n![A454310_1_En_2_Fig31_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig31_HTML.jpg)\n\
    \nFigure 2-31. Replication of the repo\n\nYou will next get inside the folder\
    \ that you used, as shown in Figure [2-32](#A454310_1_En_2_Chapter.xhtml#Fig32).\n\
    \n![A454310_1_En_2_Fig32_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig32_HTML.jpg)\n\
    \nFigure 2-32. Getting inside the folder\n\nWe are working with a scenario of\
    \ Reinforcement Learning where we are applying the letter O as a wanderer. That\
    \ wanderer wants to get the treasure T as fast as it can. The condition looks\
    \ like this:\n\n```\nO-----T\n```\n\nThe wanderer tries to find the quickest path\
    \ to reach the treasure. During each episode, the steps the wanderer takes to\
    \ reach the treasure are counted. With each episode, the condition improves and\
    \ the number of steps declines. Here are some of the basic steps in terms of Reinforcement\
    \ Learning:\n\n*   The program tries to work with actions, as actions are very\
    \ important in terms of Reinforcement Learning.\n*   The available actions for\
    \ this wanderer is moving left or right: `ACTIONS = ['left','right']`\n*   The\
    \ wanderer can be considered the agent.\n*   The number of states (also called\
    \ the number of steps) is limited to 6 in this example: `N_States = 6`\n\nNow\
    \ you need to apply hyperparameters for Reinforcement Learning.\n\n## What Are\
    \ Hyperparameters?\n\nHyperparameters are variables that were set before setting\
    \ the model’s parameters. Generally, they are different from the parameters of\
    \ the model for the underlying system under analysis. We introduce epsilon, alpha,\
    \ and gamma.\n\n*   Epsilon is the greedy factor\n*   Alpha is the learning rate\n\
    *   Gamma is the discount factor\n\nThe maximum number of episodes in this case\
    \ is 13. The refresh rate is when the scenario is refreshed.\n\n## Writing the\
    \ Code"
  raw: '## Installing Docker


    When you want to keep your containers in the cloud, Docker is the best option.
    Developers generally use Docker to minimize workloads on a single machine, because
    the entire architecture can be hosted on the developer environment. Enterprises
    use Docker to maintain an agile environment. Operators generally use Docker to
    keep an eye on apps and to run and manage them effectively. Now you will install
    Docker, as it is essential for OpenAI Gym and Universe to work. You need to install
    Docker because, when you are training an environment, Docker is very responsive
