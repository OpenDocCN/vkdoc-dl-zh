- fmt: "### Swarm Intelligence in Python\n\nThis section looks at a program in Python\
    \ that works with the concept of swarm intelligence. You will therefore get to\
    \ know particle swarm optimization (PSO) within Python. You can achieve this with\
    \ the help of a research toolkit known as `PySwarms`. `PySwarms` is a good tool\
    \ to implement optimization algorithms with the PSO method, such as:\n\n*   Star\
    \ topology\n*   Ring topology\n\nFirst, you need to install `PySwarms`. Get inside\
    \ the terminal and activate the Anaconda environment using the following command.\n\
    \n```\nabhi@ubuntu:∼$ source activate universe\n(universe) abhi@ubuntu:∼$\n```\n\
    \nThe dependencies prior to installing `PySwarms` are as follows:\n\n*   `numpy\
    \ >= 1.13.0`\n*   `scipy >= 0.17.0`\n*   `matplotlib >= 1.3.1`\n\nNow install\
    \ `PySwarms` as follows:\n\n```\n(universe) abhi@ubuntu:∼$ pip install pyswarms\n\
    ```\n\nNow the process is complete. Figure [4-26](#A454310_1_En_4_Chapter.xhtml#Fig26)\
    \ shows that `PySwarms` is completely installed.\n\n![A454310_1_En_4_Fig26_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig26_HTML.jpg)\n\
    \n**Figure 4-26.** PySwarms are installed\n\nNow we move to Python mode.\n\n```\n\
    (universe) abhi@ubuntu:∼$ python\nPython 3.5.3 |Anaconda custom (64-bit)| (default,\
    \ Mar  6 2017, 11:58:13)\n[GCC 4.4.7 20120313 (Red Hat 4.4.7-1)] on linux\nType\
    \ \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>>\n```\n\nFirst, you need to import the `PySwarms` utilities as follows:\n\n\
    ```\n>>> import pyswarms as ps\n```\n\nThere are different functions that you\
    \ can use in `PySwarms` for that you have to import:\n\n```\n>>> from pyswarms.utils.functions\
    \ import single_obj as fx\n```\n\nNext, you need to declare these hyperparameters:\n\
    \n```\n>>> options = {'c1': 0.5, 'c2': 0.3, 'w':0.9}\n```\n\nIn this case, we\
    \ are configuring the swarm as a dictionary, so call it a dictionary. In the next\
    \ step, you create the instance of the optimizer by passing the dictionary with\
    \ the necessary arguments.\n\n```\n>>> optimizer = ps.single.GlobalBestPSO(n_particles=10,\
    \ dimensions=2, options=options)\n```\n\nAfter that, call the optimizer method\
    \ and store the optimal cost and position after optimization. Figure [4-27](#A454310_1_En_4_Chapter.xhtml#Fig27)\
    \ shows the results.\n\n![A454310_1_En_4_Fig27_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig27_HTML.jpg)\n\
    \n**Figure 4-27.** Showing the result\n\nAfter going through the results, you\
    \ can see that optimizer was able to find a good minima. You will now do the same\
    \ using the local best PSO. You configure and similarly declare a dictionary as\
    \ follows:\n\n```\n>>> options = {'c1': 0.5, 'c2': 0.3, 'w':0.9, 'k': 2, 'p':\
    \ 2}\n```\n\nCreate the instance of the optimizer:\n\n```\n>>> optimizer = ps.single.LocalBestPSO(n_particles=10,\
    \ dimensions=2, options=options)\n```\n\nNow you call the optimize method to store\
    \ the value as you did before. By using the `verbose` argument, you can control\
    \ the verbosity of the argument and use `print_step` to count after a certain\
    \ number of steps.\n\n```\n>>> cost, pos = optimizer.optimize(fx.sphere_func,\
    \ print_step=50, iters=1000, verbose=3)\n```\n\nThe output is shown in Figure\
    \ [4-28](#A454310_1_En_4_Chapter.xhtml#Fig28).\n\n![A454310_1_En_4_Fig28_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig28_HTML.jpg)\n\
    \n**Figure 4-28.** The output of the swarm optimization\n\n## Building a Game\
    \ AI\n\nWe have already discussed the game AI with OpenAI Gym and environment\
    \ simulation, but we take it further in this section. First, we will clone one\
    \ of the most important and simplest examples of game AI, as shown in Figure [4-29](#A454310_1_En_4_Chapter.xhtml#Fig29).\n\
    \n![A454310_1_En_4_Fig29_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig29_HTML.jpg)\n\
    \n**Figure 4-29.** Cloning the repo\n\nYou first need to set up the environment.\
    \ The requirements are as follows:\n\n*   `TensorFlow`\n*   `OpenAI Gym`\n*  \
    \ `virtualenv`\n*   `TFLearn`\n\nThere is one dependency to install—the virtual\
    \ environment. You install it using this command:\n\n```\nconda install -c anaconda\
    \ virtualenv\n```\n\nIt will ask you whether you want to install the new `virtualenv`\
    \ package, as shown in Figure [4-30](#A454310_1_En_4_Chapter.xhtml#Fig30). Choose\
    \ yes.\n\n![A454310_1_En_4_Fig30_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig30_HTML.jpg)\n\
    \n**Figure 4-30.** Getting the virtualenv package\n\nWhen the package installation\
    \ is successful and complete, you’ll see the screen in Figure [4-31](#A454310_1_En_4_Chapter.xhtml#Fig31).\n\
    \n![A454310_1_En_4_Fig31_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig31_HTML.jpg)\n\
    \n**Figure 4-31.** Package installation is complete\n\nNow you can install `TFLearn`\
    \ using this command:\n\n```\nconda install -c derickl tflearn\n```\n\nWhen you\
    \ attempt to install `TFLearn`, you may get this error about an OS version mismatch:\n\
    \n```\nconda install -c derickl tflearn\nFetching package metadata .........\n\
    Solving package specifications: .\nPackageNotFoundError: Package not found: ''\n\
    Package missing in current linux-64 channels:\n  - tflearn\n\nYou can search for\
    \ packages on anaconda.org with\n    anaconda search -t conda tflearn\n\n(universe)\
    \ abhi@ubuntu:∼$ anaconda search -t conda tflearn\nUsing Anaconda API: https://api.anaconda.org\n\
    Run 'anaconda show <USER/PACKAGE>' to get more details:\nPackages:\n     Name\
    \                      |  Version | Package Types   | Platforms\n     -------------------------\
    \ |   ------ | --------------- | ---------------\n     asherp/tflearn        \
    \    |    0.2.2 | conda           | osx-64\n     contango/tflearn          | \
    \   0.3.2 | conda           | linux-64\n     derickl/tflearn           |    0.2.2\
    \ | conda           | osx-64\nFound 3 packages\n```\n\nIf this happens, be sure\
    \ to install the one that’s for `linux-64`:\n\n```\n(universe) abhi@ubuntu:∼$\
    \ anaconda show contango/tflearn\nUsing Anaconda API: https://api.anaconda.org\n\
    Name:    tflearn\nSummary:\nAccess:  public\nPackage Types:  conda\nVersions:\n\
    \   + 0.3.2\n\nTo install this package with Anaconda, run the following command\
    \ :\nconda install --channel https://conda.anaconda.org/contango tflearn\n```\n\
    \nIt will ask for installation of other packages, as shown in Figure [4-32](#A454310_1_En_4_Chapter.xhtml#Fig32).\n\
    \n![A454310_1_En_4_Fig32_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig32_HTML.jpg)\n\
    \n**Figure 4-32.** Installation of other packages\n\nNow import the relevant libraries\
    \ using this command:\n\n```\n(universe) abhi@ubuntu:∼$ python\nPython 3.5.3 |Anaconda\
    \ custom (64-bit)| (default, Mar  6 2017, 11:58:13)\n[GCC 4.4.7 20120313 (Red\
    \ Hat 4.4.7-1)] on linux\nType \"help\", \"copyright\", \"credits\" or \"license\"\
    \ for more information.\n>>> import gym\n>>> import random\n>>> import numpy as\
    \ np\n>>> import tflearn\n>>> from tflearn.layers.core import input_data, dropout,\
    \ fully_connected\n>>> from tflearn.layers.estimator import regression\n>>> from\
    \ statistics import median, mean\n>>> from collections import Counter\n>>> LR\
    \ = 1e-3\n>>> env = gym.make(\"CartPole-v0\")\n[2017-09-22 08:22:15,933] Making\
    \ new env: CartPole-v0\n>>> env.reset()\narray([-0.03283849, -0.04877971,  0.0408221\
    \ , -0.01600674])\n```\n\n### The Entire TFLearn Code"
