- fmt: '# Theoretical Basis of Reinforcement Learning


    This section touches on the theoretical basis of Reinforcement Learning. Figure
    [2-1](#A454310_1_En_2_Chapter.xhtml#Fig1) shows how you are going to implement
    `MDP`, which is described later. ![A454310_1_En_2_Fig1_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig1_HTML.jpg)
    Figure 2-1. Theoretical basis of `MDP` Environments in Reinforcement Learning
    are represented by the Markov Decision Process (discussed later in this chapter).


    - `SS` is a finite set of states. `AA` is a finite set of actions.

    - `T:S×A×S→[0,1]` is a transition model that maps `(state, action, state)` triples
    to probabilities.

    - `T(s,a,s'')` is the probability that you’ll land in state `s''` if you were
    in state `s` and took action `a`.


    In terms of conditional probabilities, the following is true: `T(s,a,s'') = P(s''|s,a)`.
    `R:S×S→R` is a reward function that gives a real number that represents the amount
    of reward (or punishment) the environment will grant for a state transition. `R(s,s'')`
    is the reward received after transitioning to state `s''` from state `s`. If the
    transition model is known to the agent, i.e., the agent knows where it would probably
    go from where it stands, it’s fairly easy for the agent to know how to act in
    a way that maximizes its expected utility from its experience with the environment.
    We can define the expected utility for the agent to be the accumulated rewards
    it gets throughout its experience with the environment. If the agent goes through
    the states `s0, s1, …, sn-1, sn`, you could formally define its expected utility
    as follows: `∑_{t=1}^{n} γ^t E[R(s_{t-1}, s_t)]` where `γ` is a discount factor
    used to decrease the values (and hence the importance) of past rewards, and `E`
    is the [expected value](https://en.wikipedia.org/wiki/Expected_value#_blank).
    The problem arises when the agents have no clue about the probabilistic model
    behind the transitions, and this where RL comes in. The RL problem can formally
    be defined now as the problem of learning a set of parameters in order to maximize
    the expected utility. RL comes in two flavors:


    - **Model-based**: The agent attempts to sample and learn the probabilistic model
    and use it to determine the best actions it can take. In this flavor, the set
    of parameters that was vaguely referred to is the `MDP` model.

    - **Model-free**: The agent doesn’t bother with the `MDP` model and instead attempts
    to develop a control function that looks at the state and decides the best action
    to take. In that case, the parameters to be learned are the ones that define the
    control function.


    ## Where Reinforcement Learning Is Used


    This section discusses the different fields of Reinforcement Learning, as shown
    in Figure [2-2](#A454310_1_En_2_Chapter.xhtml#Fig2). ![A454310_1_En_2_Fig2_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig2_HTML.jpg)
    Figure 2-2. Different fields of Reinforcement Learning


    ### Manufacturing


    In manufacturing, factory robots use Reinforcement Learning to move an object
    from one box and then keep it in another container. If it fails or finds success
    upon delivering, the robot remembers the object and learns again, with the end
    result to get the best results with the greatest accuracy.


    ### Inventory Management


    In terms of inventory management, Reinforcement Learning can be used to reduce
    transit time in stocking and can be applied to placing products in warehouses
    for utilizing space optimally.


    ### Delivery Management


    Reinforcement Learning is applied to solve the problem of split delivery vehicle
    routing. `Q Learning` is used to serve appropriate customers with one vehicle.


    ### Finance Sector


    Reinforcement Learning is being used for accounting, using trading strategies.


    ## Why Is Reinforcement Learning Difficult?


    One of the toughest parts of Reinforcement Learning is having to map the environment
    and include all possible moves. For example, consider a board game. You have to
    apply artificial intelligence to what is learned. In theory, Reinforcement Learning
    should work perfectly because there are a lot of state jumps and complex moves
    in a board game. However, applying Reinforcement Learning by itself becomes difficult.
    To get the best results, we apply a rule-based engine with Reinforcement Learning.
    If we don’t apply a rule-based engine, there are so many options in board games
    that the agent will take forever to discover the path. First of all, we apply
    simple rules so that the AI learns quickly and then, as the complexity increases,
    we apply Reinforcement Learning. Figure [2-3](#A454310_1_En_2_Chapter.xhtml#Fig3)
    shows how applying Reinforcement Learning can be difficult. ![A454310_1_En_2_Fig3_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig3_HTML.jpg)
    Figure 2-3. Reinforcement Learning with rules


    ## Preparing the Machine'
