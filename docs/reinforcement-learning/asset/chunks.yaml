  trans: '

    # 强化学习的多面性


    正如你在图 1-5 的维恩图中看到的，强化学习处于许多不同科学领域的交叉点。![A454310_1_En_1_Fig5_HTML.jpg](img/A454310_1_En_1_Fig5_HTML.jpg)
    图 1-5. 强化学习的各个侧面 这些交叉点揭示了强化学习的一个非常强大的特性——它展示了决策的科学性。如果我们有两条路径，并且需要决定走哪条路径才能达到某个目标，那么就可以设计一个科学的决策过程。强化学习是最优决策的基础科学。如果我们关注图
    1-5 中维恩图的计算机科学部分，我们会发现，如果我们想要学习，它就属于机器学习的范畴，而机器学习又具体映射到强化学习。强化学习可以应用于许多不同的科学领域。在工程学中，我们有主要关注最优控制的设备。在神经科学中，我们关心大脑作为决策刺激物是如何工作的，并研究作用于大脑的奖励系统（多巴胺系统）。心理学家可以应用强化学习来确定动物如何做出决策。在数学中，我们有大量将强化学习应用于运筹学的数据。


    # 强化学习的流程


    图 1-6 连接了智能体和环境。![A454310_1_En_1_Fig6_HTML.jpg](img/A454310_1_En_1_Fig6_HTML.jpg)
    图 1-6. 强化学习结构 交互从一个状态到另一个状态发生。确切的连接始于智能体和环境之间。奖励是定期发生的。我们采取适当的行动从一个状态移动到另一个状态。在详细了解细节后，需要考虑的关键点如下：


    - 强化学习循环以相互连接的方式工作。

    - 智能体和环境之间存在明确的通信。

    - 这种明确的通信是围绕奖励进行的。

    - 对象或机器人从一个状态移动到另一个状态。

    - 采取行动以从一个状态移动到另一个状态。


    图 1-7 简化了交互过程。![A454310_1_En_1_Fig7_HTML.jpg](img/A454310_1_En_1_Fig7_HTML.jpg)
    图 1-7. 整个交互过程 智能体总是在学习，并最终做出决策。智能体是一个学习者，这意味着可能存在不同的路径。当智能体开始训练时，它开始适应并智能地从其周围环境中学习。智能体也是一个决策者，因为它试图采取能够获得最大奖励的行动。当智能体开始与环境交互时，它可以选择一个行动并做出相应的响应。从那时起，新的场景就被创建出来。当智能体在环境中从一个地方移动到另一个地方时，每一次变化都会导致某种形式的修改。这些变化被描述为场景。每一步发生的状态转换有助于智能体更有效地解决强化学习问题。让我们看看状态转换的另一个场景，如图
    1-8 和 1-9 所示。![A454310_1_En_1_Fig8_HTML.jpg](img/A454310_1_En_1_Fig8_HTML.jpg)
    图 1-8. 状态变化场景 ![A454310_1_En_1_Fig9_HTML.jpg](img/A454310_1_En_1_Fig9_HTML.jpg)
    图 1-9. 状态转换过程 学会选择能够最大化以下值的行动：`r0 + γr1 + γ²r2 + ...`，其中 `0 < γ < 1`。在每次状态转换时，奖励都是一个不同的值，因此我们用每一步中变化的值来描述奖励，例如
    `r0`、`r1`、`r2` 等。伽马（`γ`）被称为折扣因子，它决定了我们获得什么样的未来奖励类型：


    - 伽马值为 0 意味着奖励仅与当前状态相关。

    - 伽马值为 1 意味着奖励是长期的。


    # 强化学习中的不同术语


    现在我们介绍一些与强化学习相关的常见术语。在这种情况下，有两个常数很重要——伽马（`γ`）和兰布达（`λ`），如图 1-10 所示。![A454310_1_En_1_Fig10_HTML.jpg](img/A454310_1_En_1_Fig10_HTML.jpg)
    图 1-10. 显示常数值 伽马在强化学习问题中很常见，但兰布达通常用于时序差分问题。


    ## 伽马


    伽马用于每次状态转换，并且在每次状态变化时是一个常数值。伽马允许你提供关于在每个状态下你将获得何种奖励的信息。通常，这些值决定了我们是只寻找每个状态下的奖励值（在这种情况下，值为
    0），还是寻找长期奖励值（在这种情况下，值为 1）。


    ## 兰布达


    兰布达通常在我们处理时序差分问题时使用。它更多地涉及连续状态下的预测。在每个状态下增加兰布达的值表明我们的算法学习速度很快。在使用强化学习技术时，更快的算法能产生更好的结果。正如你稍后将学到的，时序差分可以推广到我们称之为
    `TD(Lambda)` 的方法。我们稍后会更深入地讨论它。


    # 与强化学习的交互


    现在让我们谈谈强化学习及其交互。如图 1-11 所示，智能体和环境之间的交互伴随着奖励发生。我们需要采取行动从一个状态移动到另一个状态。![A454310_1_En_1_Fig11_HTML.jpg](img/A454310_1_En_1_Fig11_HTML.jpg)
    图 1-11. 强化学习交互 强化学习是一种实现如何将情境映射到行动，以便最大化并找到获得最高奖励的方法。与其他形式的机器学习不同，机器或机器人不会被告诉要采取哪些行动，而是必须通过尝试来发现哪些行动能产生最大奖励。在最有趣和最具挑战性的情况下，行动不仅影响即时奖励，还影响下一个情境以及所有后续奖励。


    ## 强化学习的特点


    接下来我们讨论特点。这些特点通常是指智能体为了进入下一个状态所做的事情。智能体会考虑哪种方法最适合进行下一步行动。这两个特点是：


    - 试错搜索。

    - 延迟奖励。


    你可能已经了解到，强化学习基于三个要素的组合：`(S, A, R)`，其中 `S` 代表状态，`A` 代表行动，`R` 代表奖励。如果你处于状态 `S`，你执行行动
    `A`，以便在时间帧 `t+1` 获得奖励 `R`。现在，最重要的部分是你移动到下一个状态时。在这种情况下，我们不使用刚刚获得的奖励来决定下一步移动到哪里。每次转换都有一个独特的奖励，并且不使用任何先前状态的奖励来确定下一步行动。参见图
    1-12。![A454310_1_En_1_Fig12_HTML.jpg](img/A454310_1_En_1_Fig12_HTML.jpg) 图 1-12.
    随时间变化的状态 `T` 变化（时间帧）在强化学习方面很重要。我们所做的每一次发生，总是我们在状态、行动和奖励方面所执行内容的组合。参见图 1-13。![A454310_1_En_1_Fig13_HTML.jpg](img/A454310_1_En_1_Fig13_HTML.jpg)
    图 1-13. 表示状态转换的另一种方式


    ## 奖励如何运作


    奖励是当我们从一个状态转换到另一个状态时收到的某种激励因素。它可以是分数，就像在视频游戏中一样。我们训练得越多，就越准确，获得的奖励也就越大。

    '
- fmt: '### Agents


    In terms of Reinforcement Learning, agents are the software programs that make
    intelligent decisions. Agents should be able to perceive what is happening in
    the environment. Here are the basic steps of the agents:


    1. When the agent can perceive the environment, it can make better decisions.

    2. The decision the agents take results in an action.

    3. The action that the agents perform must be the best, the optimal, one.


    Software agents might be autonomous or they might work together with other agents
    or with people. Figure [1-14](#A454310_1_En_1_Chapter.xhtml#Fig14) shows how the
    agent works. ![A454310_1_En_1_Fig14_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig14_HTML.jpg)
    Figure 1-14. The flow of the environment


    ### RL Environments


    The environments in the Reinforcement Learning space are comprised of certain
    factors that determine the impact on the Reinforcement Learning agent. The agent
    must adapt accordingly to the environment. These environments can be 2D worlds
    or grids or even a 3D world. Here are some important features of environments:


    - Deterministic

    - Observable

    - Discrete or continuous

    - Single or multiagent.


    #### Deterministic


    If we can infer and predict what will happen with a certain scenario in the future,
    we say the scenario is deterministic. It is easier for RL problems to be deterministic
    because we don’t rely on the decision-making process to change state. It’s an
    immediate effect that happens with state transitions when we are moving from one
    state to another. The life of a Reinforcement Learning problem becomes easier.
    When we are dealing with RL, the state model we get will be either deterministic
    or non-deterministic. That means we need to understand the mechanisms behind how
    DFA and NDFA work.


    ##### DFA (Deterministic Finite Automata)


    DFA goes through a finite number of steps. It can only perform one action for
    a state. See Figure [1-15](#A454310_1_En_1_Chapter.xhtml#Fig15). ![A454310_1_En_1_Fig15_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig15_HTML.jpg)
    Figure 1-15. Showing DFA We are showing a state transition from a start state
    to a final state with the help of a diagram. It is a simple depiction where we
    can say that, with some input value that is assumed as 1 and 0, the state transition
    occurs. The self-loop is created when it gets a value and stays in the same state.


    ##### NDFA (Nondeterministic Finite Automaton)


    If we are working in a scenario where we don’t know exactly which state a machine
    will move into, this is a case of NDFA. See Figure [1-16](#A454310_1_En_1_Chapter.xhtml#Fig16).
    ![A454310_1_En_1_Fig16_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig16_HTML.jpg) Figure
    1-16. NDFA The working principle of the state diagram in Figure [1-16](#A454310_1_En_1_Chapter.xhtml#Fig16)
    can be explained as follows. In NDFA the issue is when we are transitioning from
    one state to another, there is more than one option available, as we can see in
    Figure [1-16](#A454310_1_En_1_Chapter.xhtml#Fig16). From State S0 after getting
    an input such as 0, it can stay in state S0 or move to state S1. There is decision-making
    involved here, so it becomes difficult to know which action to take.


    #### Observable


    If we can say that the environment around us is fully observable, we have a perfect
    scenario for implementing Reinforcement Learning. An example of perfect observability
    is a chess game. An example of partial observability is a poker game, where some
    of the cards are unknown to any one player.


    #### Discrete or Continuous


    If there is more than one choice for transitioning to the next state, that is
    a continuous scenario. When there are a limited number of choices, that’s called
    a discrete scenario.


    #### Single Agent and Multiagent Environments


    Solutions in Reinforcement Learning can be of single agent types or multiagent
    types. Let’s take a look at multiagent Reinforcement Learning first. When we are
    dealing with complex problems, we use multiagent Reinforcement Learning. Complex
    problems might have different environments where the agent is doing different
    jobs to get involved in RL and the agent also wants to interact. This introduces
    different complications in determining transitions in states. Multiagent solutions
    are based on the non-deterministic approach. They are non-deterministic because
    when the multiagents interact, there might be more than one option to change or
    move to the next state and we have to make decisions based on that ambiguity.
    In multiagent solutions, the agent interactions between different environments
    are enormous. They are enormous because the amount of activity involved in references
    to environments is very large. This is because the environments might be different
    types and the multiagents might have different tasks to do in each state transition.
    The difference between single-agent and multiagent solutions are as follows:


    - Single-agent scenarios involve intelligent software in which the interaction
    happens in one environment only. If there is another environment simultaneously,
    it cannot interact with the first environment.

    - When there is little bit of convergence in Reinforcement Learning. Convergence
    is when the agent needs to interact far more often in different environments to
    make a decision. This scenario is tackled by multiagents, as single agents cannot
    tackle convergence. Single agents cannot tackle convergence because it connects
    to other environments when there might be different scenarios involving simultaneous
    decision-making.

    - Multiagents have dynamic environments compared to single agents. Dynamic environments
    can involve changing environments in the places to interact with.


    Figure [1-17](#A454310_1_En_1_Chapter.xhtml#Fig17) shows the single-agent scenario.
    ![A454310_1_En_1_Fig17_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig17_HTML.jpg) Figure
    1-17. Single agent Figure [1-18](#A454310_1_En_1_Chapter.xhtml#Fig18) shows how
    multiagents work. There is an interaction between two agents in order to make
    the decision. ![A454310_1_En_1_Fig18_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig18_HTML.jpg)
    Figure 1-18. Multiagent scenario


    ## Conclusion


    This chapter touched on the basics of Reinforcement Learning and covered some
    key concepts. We covered states and environments and how the structure of Reinforcement
    Learning looks. We also touched on the different kinds of interactions and learned
    about single-agent and multiagent solutions. The next chapter covers algorithms
    and discusses the building blocks of Reinforcement Learning.© Abhishek Nandy and
    Manisha Biswas 2018 Abhishek Nandy and Manisha BiswasReinforcement Learning [https://doi.org/10.1007/978-1-4842-3285-9_2](#A454310_1_En_2_Chapter.xhtml)


    # 2. RL Theory and Algorithms


    Abhishek Nandy^(1 ) and Manisha Biswas² (1) Rm HIG L-2/4, Bldg Swaranika Co-Opt
    HSG, Kolkata, West Bengal, India (2) North 24 Parganas, West Bengal, India


    This chapter covers how Reinforcement Learning works and explains the concepts
    behind it, including the different algorithms that form the basis of Reinforcement
    Learning. The chapter explains these algorithms, but to start with, you will learn
    why Reinforcement Learning can be hard and see some different scenarios. The chapter
    also covers different ways that Reinforcement Learning can be implemented. Along
    the way, the chapter formulates the Markov Decision Process (MDP) and describes
    it. The chapter also covers SARSA and touches on temporal differences. Then, the
    chapter touches on Q Learning and dynamic programming.'
