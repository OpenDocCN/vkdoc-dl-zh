- fmt: "# Reinforcement Learning Basics\n\nAbhishek Nandy¹ and Manisha Biswas²  \n\
    (1) Rm HIG L-2/4, Bldg Swaranika Co-Opt HSG, Kolkata, West Bengal, India  \n(2)\
    \ North 24 Parganas, West Bengal, India\n\nThis chapter is a brief introduction\
    \ to Reinforcement Learning (RL) and includes some key concepts associated with\
    \ it. In this chapter, we talk about Reinforcement Learning as a core concept\
    \ and then define it further. We show a complete flow of how Reinforcement Learning\
    \ works. We discuss exactly where Reinforcement Learning fits into artificial\
    \ intelligence (AI). After that we define key terms related to Reinforcement Learning.\
    \ We start with agents and then touch on environments and then finally talk about\
    \ the connection between agents and environments.\n\n## What Is Reinforcement\
    \ Learning?\n\nWe use Machine Learning to constantly improve the performance of\
    \ machines or programs over time. The simplified way of implementing a process\
    \ that improves machine performance with time is using Reinforcement Learning\
    \ (RL). Reinforcement Learning is an approach through which intelligent programs,\
    \ known as agents, work in a known or unknown environment to constantly adapt\
    \ and learn based on giving points. The feedback might be positive, also known\
    \ as rewards, or negative, also called punishments. Considering the agents and\
    \ the environment interaction, we then determine which action to take. In a nutshell,\
    \ Reinforcement Learning is based on rewards and punishments.\n\nSome important\
    \ points about Reinforcement Learning:\n\n- It differs from normal Machine Learning,\
    \ as we do not look at training datasets.\n- Interaction happens not with data\
    \ but with environments, through which we depict real-world scenarios.\n- As Reinforcement\
    \ Learning is based on environments, many parameters come in to play. It takes\
    \ lots of information to learn and act accordingly.\n- Environments in Reinforcement\
    \ Learning are real-world scenarios that might be 2D or 3D simulated worlds or\
    \ game-based scenarios.\n- Reinforcement Learning is broader in a sense because\
    \ the environments can be large in scale and there might be a lot of factors associated\
    \ with them.\n- The objective of Reinforcement Learning is to reach a goal.\n\
    - Rewards in Reinforcement Learning are obtained from the environment.\n\nThe\
    \ Reinforcement Learning cycle is depicted in Figure 1-1 with the help of a robot.\n\
    \n![A454310_1_En_1_Fig1_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1. Reinforcement Learning cycle\n\nA maze is a good example that can\
    \ be studied using Reinforcement Learning, in order to determine the exact right\
    \ moves to complete the maze (see Figure 1-2).\n\n![A454310_1_En_1_Fig2_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2. Reinforcement Learning can be applied to mazes\n\nIn Figure 1-3,\
    \ we are applying Reinforcement Learning and we call it the Reinforcement Learning\
    \ box because within its vicinity the process of RL works. RL starts with an intelligent\
    \ program, known as agents, and when they interact with environments, there are\
    \ rewards and punishments associated. An environment can be either known or unknown\
    \ to the agents. The agents take actions to move to the next state in order to\
    \ maximize rewards.\n\n![A454310_1_En_1_Fig3_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3. Reinforcement Learning flow\n\nIn the maze, the centralized concept\
    \ is to keep moving. The goal is to clear the maze and reach the end as quickly\
    \ as possible. The following concepts of Reinforcement Learning and the working\
    \ scenario are discussed later this chapter.\n\n- The agent is the intelligent\
    \ program\n- The environment is the maze\n- The state is the place in the maze\
    \ where the agent is\n- The action is the move we take to move to the next state\n\
    - The reward is the points associated with reaching a particular state. It can\
    \ be positive, negative, or zero\n\nWe use the maze example to apply concepts\
    \ of Reinforcement Learning. We will be describing the following steps:\n\n1.\
    \ The concept of the maze is given to the agent.\n2. There is a task associated\
    \ with the agent and Reinforcement Learning is applied to it.\n3. The agent receives\
    \ (a-1) reinforcement for every move it makes from one state to other.\n4. There\
    \ is a reward system in place for the agent when it moves from one state to another.\n\
    \nThe rewards predictions are made iteratively, where we update the value of each\
    \ state in a maze based on the value of the best subsequent state and the immediate\
    \ reward obtained. This is called the update rule. The constant movement of the\
    \ Reinforcement Learning process is based on decision-making. Reinforcement Learning\
    \ works on a trial-and-error basis because it is very difficult to predict which\
    \ action to take when it is in one state. From the maze problem itself, you can\
    \ see that in order get the optimal path for the next move, you have to weigh\
    \ a lot of factors. It is always on the basis of state action and rewards. For\
    \ the maze, we have to compute and account for probability to take the step. The\
    \ maze also does not consider the reward of the previous step; it is specifically\
    \ considering the move to the next state. The concept is the same for all Reinforcement\
    \ Learning processes.\n\nHere are the steps of this process:\n\n1. We have a problem.\n\
    2. We have to apply Reinforcement Learning.\n3. We consider applying Reinforcement\
    \ Learning as a Reinforcement Learning box.\n4. The Reinforcement Learning box\
    \ contains all essential components needed for applying the Reinforcement Learning\
    \ process.\n5. The Reinforcement Learning box contains agents, environments, rewards,\
    \ punishments, and actions.\n\nReinforcement Learning works well with intelligent\
    \ program agents that give rewards and punishments when interacting with an environment.\
    \ The interaction happens between the agents and the environments, as shown in\
    \ Figure 1-4.\n\n![A454310_1_En_1_Fig4_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig4_HTML.jpg)\n\
    \nFigure 1-4. Interaction between agents and environments\n\nFrom Figure 1-4,\
    \ you can see that there is a direct interaction between the agents and its environments.\
    \ This interaction is very important because through these exchanges, the agent\
    \ adapts to the environments. When a Machine Learning program, robot, or Reinforcement\
    \ Learning program starts working, the agents are exposed to known or unknown\
    \ environments and the Reinforcement Learning technique allows the agents to interact\
    \ and adapt according to the environment’s features. Accordingly, the agents work\
    \ and the Reinforcement Learning robot learns. In order to get to a desired position,\
    \ we assign rewards and punishments. Now, the program has to work around the optimal\
    \ path to get maximum rewards if it fails (that is, it takes punishments or receives\
    \ negative points). In order to reach a new position, which also is known as a\
    \ state, it must perform what we call an action. To perform an action, we implement\
    \ a function, also known as a policy. A policy is therefore a function that does\
    \ some work."
  raw: '# 1. Reinforcement Learning Basics


    Abhishek Nandy^(1 ) and Manisha Biswas² (1) Rm HIG L-2/4, Bldg Swaranika Co-Opt
    HSG, Kolkata, West Bengal, India (2) North 24 Parganas, West Bengal, India   This
    chapter is a brief introduction to Reinforcement Learning (RL) and includes some
    key concepts associated with it. In this chapter, we talk about Reinforcement
    Learning as a core concept and then define it further. We show a complete flow
    of how Reinforcement Learning works. We discuss exactly where Reinforcement Learning
    fits into artificial intelligence (AI). After that we define key terms related
    to Reinforcement Learning. We start with agents and then touch on environments
    and then finally talk about the connection between agents and environments.


    ## What Is Reinforcement Learning?


    We use Machine Learning to constantly improve the performance of machines or programs
    over time. The simplified way of implementing a process that improves machine
    performance with time is using Reinforcement Learning (RL). Reinforcement Learning
    is an approach through which intelligent programs, known as agents, work in a
    known or unknown environment to constantly adapt and learn based on giving points.
    The feedback might be positive, also known as rewards, or negative, also called
    punishments. Considering the agents and the environment interaction, we then determine
    which action to take. In a nutshell, Reinforcement Learning is based on rewards
    and punishments . Some important points about Reinforcement Learning:


    *   It differs from normal Machine Learning, as we do not look at training datasets.

    *   Interaction happens not with data but with environments, through which we
    depict real-world scenarios.

    *   As Reinforcement Learning is based on environments, many parameters come in
    to play. It takes lots of information to learn and act accordingly.

    *   Environments in Reinforcement Learning are real-world scenarios that might
    be 2D or 3D simulated worlds or game-based scenarios .

    *   Reinforcement Learning is broader in a sense because the environments can
    be large in scale and there might be a lot of factors associated with them.

    *   The objective of Reinforcement Learning is to reach a goal.

    *   Rewards in Reinforcement Learning are obtained from the environment.


    The Reinforcement Learning cycle is depicted in Figure [1-1](#A454310_1_En_1_Chapter.xhtml#Fig1)
    with the help of a robot. ![A454310_1_En_1_Fig1_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig1_HTML.jpg)
    Figure 1-1. Reinforcement Learning cycle A maze is a good example that can be
    studied using Reinforcement Learning , in order to determine the exact right moves
    to complete the maze (see Figure [1-2](#A454310_1_En_1_Chapter.xhtml#Fig2)). ![A454310_1_En_1_Fig2_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig2_HTML.jpg)
    Figure 1-2. Reinforcement Learning can be applied to mazes In Figure [1-3](#A454310_1_En_1_Chapter.xhtml#Fig3),
    we are applying Reinforcement Learning and we call it the Reinforcement Learning
    box because within its vicinity the process of RL works. RL starts with an intelligent
    program, known as agents, and when they interact with environments, there are
    rewards and punishments associated. An environment can be either known or unknown
    to the agents. The agents take actions to move to the next state in order to maximize
    rewards. ![A454310_1_En_1_Fig3_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig3_HTML.jpg)
    Figure 1-3. Reinforcement Learning flow In the maze, the centralized concept is
    to keep moving. The goal is to clear the maze and reach the end as quickly as
    possible. The following concepts of Reinforcement Learning and the working scenario
    are discussed later this chapter.


    *   The agent is the intelligent program

    *   The environment is the maze

    *   The state is the place in the maze where the agent is

    *   The action is the move we take to move to the next state

    *   The reward is the points associated with reaching a particular state. It can
    be positive, negative, or zero


    We use the maze example to apply concepts of Reinforcement Learning. We will be
    describing the following steps :


    1.  1. The concept of the maze is given to the agent.  

    2.  2. There is a task associated with the agent and Reinforcement Learning is
    applied to it.  

    3.  3. The agent receives (a-1) reinforcement for every move it makes from one
    state to other.  

    4.  4. There is a reward system in place for the agent when it moves from one
    state to another.


    The rewards predictions are made iteratively, where we update the value of each
    state in a maze based on the value of the best subsequent state and the immediate
    reward obtained. This is called the update rule. The constant movement of the
    Reinforcement Learning process is based on decision-making. Reinforcement Learning
    works on a trial-and-error basis because it is very difficult to predict which
    action to take when it is in one state. From the maze problem itself, you can
    see that in order get the optimal path for the next move, you have to weigh a
    lot of factors. It is always on the basis of state action and rewards. For the
    maze, we have to compute and account for probability to take the step. The maze
    also does not consider the reward of the previous step; it is specifically considering
    the move to the next state. The concept is the same for all Reinforcement Learning
    processes. Here are the steps of this process:


    1.  1. We have a problem.  

    2.  2. We have to apply Reinforcement Learning.  

    3.  3. We consider applying Reinforcement Learning as a Reinforcement Learning
    box.  

    4.  4. The Reinforcement Learning box contains all essential components needed
    for applying the Reinforcement Learning process.  

    5.  5. The Reinforcement Learning box contains agents, environments, rewards,
    punishments, and actions.


    Reinforcement Learning works well with intelligent program agents that give rewards
    and punishments when interacting with an environment. The interaction happens
    between the agents and the environments, as shown in Figure [1-4](#A454310_1_En_1_Chapter.xhtml#Fig4).
    ![A454310_1_En_1_Fig4_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig4_HTML.jpg) Figure
    1-4. Interaction between agents and environments From Figure [1-4](#A454310_1_En_1_Chapter.xhtml#Fig4),
    you can see that there is a direct interaction between the agents and its environments.
    This interaction is very important because through these exchanges, the agent
    adapts to the environments. When a Machine Learning program, robot, or Reinforcement
    Learning program starts working, the agents are exposed to known or unknown environments
    and the Reinforcement Learning technique allows the agents to interact and adapt
    according to the environment’s features. Accordingly, the agents work and the
    Reinforcement Learning robot learns. In order to get to a desired position, we
    assign rewards and punishments. Now, the program has to work around the optimal
    path to get maximum rewards if it fails (that is, it takes punishments or receives
    negative points). In order to reach a new position, which also is known as a state,
    it must perform what we call an action. To perform an action, we implement a function,
    also known as a policy. A policy is therefore a function that does some work.'
  trans: "\n# 强化学习基础\n\nAbhishek Nandy¹ 和 Manisha Biswas²  \n(1) 印度西孟加拉邦加尔各答 Swaranika\
    \ Co-Opt HSG 大楼 HIG L-2/4 室  \n(2) 印度西孟加拉邦北 24 区\n\n本章是对强化学习的简要介绍，并包含与之相关的一些关键概念。在本章中，我们将强化学习作为一个核心概念进行讨论，并对其进行进一步定义。我们展示了强化学习的完整工作流程，并精确阐述了强化学习在人工智能中的定位。之后，我们定义了与强化学习相关的关键术语。我们从智能体开始，然后涉及环境，最后讨论智能体与环境之间的联系。\n\
    \n## 什么是强化学习？\n\n我们使用机器学习来持续提升机器或程序随时间推移的性能。实现随时间推移提升机器性能的简化方法就是使用强化学习。强化学习是一种方法，通过该方法，被称为智能体的智能程序能够在已知或未知的环境中，基于评分机制不断适应和学习。反馈可能是正向的（称为奖励），也可能是负向的（称为惩罚）。结合智能体与环境的交互，我们随后决定采取何种行动。简而言之，强化学习基于奖励和惩罚。\n\
    \n关于强化学习的一些要点：\n\n-   它不同于普通的机器学习，因为我们不关注训练数据集。\n-   交互并非与数据发生，而是与环境发生，通过环境我们模拟现实世界的场景。\n\
    -   由于强化学习基于环境，因此涉及许多参数。它需要大量信息来学习并做出相应行动。\n-   强化学习中的环境是现实世界的场景，可能是 2D 或 3D 模拟世界，也可能是基于游戏的场景。\n\
    -   从某种意义上说，强化学习范围更广，因为环境规模可能很大，并且可能与之关联许多因素。\n-   强化学习的目标是达成一个目标。\n-   强化学习中的奖励来自环境。\n\
    \n图 1-1 借助一个机器人展示了强化学习的循环过程。\n\n![A454310_1_En_1_Fig1_HTML.jpg](img/A454310_1_En_1_Fig1_HTML.jpg)\n\
    \n图 1-1. 强化学习循环\n\n迷宫是一个可以使用强化学习来研究的绝佳示例，目的是确定完成迷宫所需的精确正确移动（见图 1-2）。\n\n![A454310_1_En_1_Fig2_HTML.jpg](img/A454310_1_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2. 强化学习可应用于迷宫\n\n在图 1-3 中，我们正在应用强化学习，并将其称为强化学习盒子，因为在其范围内，强化学习的过程得以运作。强化学习始于一个被称为智能体的智能程序，当它们与环境交互时，会关联奖励和惩罚。环境对于智能体而言可以是已知的或未知的。智能体采取行动移动到下一个状态，以最大化奖励。\n\
    \n![A454310_1_En_1_Fig3_HTML.jpg](img/A454310_1_En_1_Fig3_HTML.jpg)\n\n图 1-3.\
    \ 强化学习流程\n\n在迷宫中，核心概念是持续移动。目标是尽快走出迷宫并到达终点。以下关于强化学习的概念和工作场景将在本章后面讨论。\n\n-   智能体是智能程序\n\
    -   环境是迷宫\n-   状态是智能体在迷宫中所处的位置\n-   行动是我们为了移动到下一个状态所采取的移动\n-   奖励是与到达特定状态相关的分数。它可以是正的、负的或零\n\
    \n我们使用迷宫示例来应用强化学习的概念。我们将描述以下步骤：\n\n1.  迷宫的概念被提供给智能体。\n2.  有一个与智能体相关联的任务，并对其应用强化学习。\n\
    3.  智能体每从一个状态移动到另一个状态，就会收到一次强化。\n4.  当智能体从一个状态移动到另一个状态时，存在一个奖励系统。\n\n奖励预测是迭代进行的，我们根据最佳后续状态的值和获得的即时奖励来更新迷宫中每个状态的值。这被称为更新规则。强化学习过程的持续运动基于决策制定。强化学习基于试错原则运作，因为当处于某个状态时，很难预测应采取哪个行动。从迷宫问题本身可以看出，为了获得下一步的最优路径，必须权衡许多因素。它始终基于状态、行动和奖励。对于迷宫，我们必须计算并考虑采取步骤的概率。迷宫也不考虑前一步的奖励；它专门考虑移动到下一个状态。这个概念适用于所有强化学习过程。\n\
    \n以下是此过程的步骤：\n\n1.  我们有一个问题。\n2.  我们必须应用强化学习。\n3.  我们将应用强化学习视为一个强化学习盒子。\n4.  强化学习盒子包含应用强化学习过程所需的所有基本组件。\n\
    5.  强化学习盒子包含智能体、环境、奖励、惩罚和行动。\n\n强化学习与智能程序智能体配合良好，这些智能体在与环境交互时给予奖励和惩罚。交互发生在智能体与环境之间，如图\
    \ 1-4 所示。\n\n![A454310_1_En_1_Fig4_HTML.jpg](img/A454310_1_En_1_Fig4_HTML.jpg)\n\
    \n图 1-4. 智能体与环境之间的交互\n\n从图 1-4 可以看出，智能体与其环境之间存在直接交互。这种交互非常重要，因为通过这些交换，智能体适应了环境。当机器学习程序、机器人或强化学习程序开始工作时，智能体暴露于已知或未知的环境中，强化学习技术允许智能体根据环境的特征进行交互和适应。相应地，智能体工作，强化学习机器人进行学习。为了达到期望的位置，我们分配奖励和惩罚。现在，程序必须围绕最优路径工作，以在失败时（即受到惩罚或获得负分）获得最大奖励。为了到达一个新位置（也称为状态），它必须执行我们称之为行动的操作。为了执行行动，我们实现一个函数，也称为策略。因此，策略是一个执行某些工作的函数。\n"
- fmt: '# Faces of Reinforcement Learning


    As you see from the Venn diagram in Figure [1-5](#A454310_1_En_1_Chapter.xhtml#Fig5),
    Reinforcement Learning sits at the intersection of many different fields of science.
    ![A454310_1_En_1_Fig5_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig5_HTML.jpg) Figure
    1-5. All the faces of Reinforcement Learning The intersection points reveal a
    very strong feature of Reinforcement Learning—it shows the science of decision-making.
    If we have two paths and have to decide which path to take so that some point
    is met, a scientific decision-making process can be designed. Reinforcement Learning
    is the fundamental science of optimal decision-making. If we focus on the computer
    science part of the Venn diagram in Figure [1-5](#A454310_1_En_1_Chapter.xhtml#Fig5),
    we see that if we want to learn, it falls under the category of Machine Learning,
    which is specifically mapped to Reinforcement Learning. Reinforcement Learning
    can be applied to many different fields of science. In engineering, we have devices
    that focus mostly on optimal control. In neuroscience, we are concerned with how
    the brain works as a stimulant for making decisions and study the reward system
    that works on the brain (the dopamine system). Psychologists can apply Reinforcement
    Learning to determine how animals make decisions. In mathematics, we have a lot
    of data applying Reinforcement Learning in operations research.


    # The Flow of Reinforcement Learning


    Figure [1-6](#A454310_1_En_1_Chapter.xhtml#Fig6) connects agents and environments.
    ![A454310_1_En_1_Fig6_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig6_HTML.jpg) Figure
    1-6. RL structure The interaction happens from one state to another. The exact
    connection starts between an agent and the environment. Rewards are happening
    on a regular basis. We take appropriate actions to move from one state to another.
    The key points of consideration after going through the details are the following:


    - The Reinforcement Learning cycle works in an interconnected manner.

    - There is distinct communication between the agent and the environment.

    - The distinct communication happens with rewards in mind.

    - The object or robot moves from one state to another.

    - An action is taken to move from one state to another.


    Figure [1-7](#A454310_1_En_1_Chapter.xhtml#Fig7) simplifies the interaction process.
    ![A454310_1_En_1_Fig7_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig7_HTML.jpg) Figure
    1-7. The entire interaction process An agent is always learning and finally makes
    a decision. An agent is a learner, which means there might be different paths.
    When the agent starts training, it starts to adapt and intelligently learns from
    its surroundings. The agent is also a decision maker because it tries to take
    an action that will get it the maximum reward. When the agent starts interacting
    with the environment, it can choose an action and respond accordingly. From then
    on, new scenes are created. When the agent changes from one place to another in
    an environment, every change results in some kind of modification. These changes
    are depicted as scenes. The transition that happens in each step helps the agent
    solve the Reinforcement Learning problem more effectively. Let’s look at another
    scenario of state transitioning, as shown in Figures [1-8](#A454310_1_En_1_Chapter.xhtml#Fig8)
    and [1-9](#A454310_1_En_1_Chapter.xhtml#Fig9). ![A454310_1_En_1_Fig8_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig8_HTML.jpg)
    Figure 1-8. Scenario of state changes ![A454310_1_En_1_Fig9_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig9_HTML.jpg)
    Figure 1-9. The state transition process Learn to choose actions that maximize
    the following: `r0 + γr1 + γ²r2 + ...` where `0 < γ < 1`. At each state transition,
    the reward is a different value, hence we describe reward with varying values
    in each step, such as `r0`, `r1`, `r2`, etc. Gamma (`γ`) is called a discount
    factor and it determines what future reward types we get:


    - A gamma value of 0 means the reward is associated with the current state only.

    - A gamma value of 1 means that the reward is long-term.


    # Different Terms in Reinforcement Learning


    Now we cover some common terms associated with Reinforcement Learning. There are
    two constants that are important in this case—gamma (`γ`) and lambda (`λ`), as
    shown in Figure [1-10](#A454310_1_En_1_Chapter.xhtml#Fig10). ![A454310_1_En_1_Fig10_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig10_HTML.jpg)
    Figure 1-10. Showing values of constants Gamma is common in Reinforcement Learning
    problems but lambda is used generally in terms of temporal difference problems.


    ## Gamma


    Gamma is used in each state transition and is a constant value at each state change.
    Gamma allows you to give information about the type of reward you will be getting
    in every state. Generally, the values determine whether we are looking for reward
    values in each state only (in which case, it’s 0) or if we are looking for long-term
    reward values (in which case it’s 1).


    ## Lambda


    Lambda is generally used when we are dealing with temporal difference problems.
    It is more involved with predictions in successive states. Increasing values of
    lambda in each state shows that our algorithm is learning fast. The faster algorithm
    yields better results when using Reinforcement Learning techniques. As you’ll
    learn later, temporal differences can be generalized to what we call `TD(Lambda)`.
    We discuss it in greater depth later.


    # Interactions with Reinforcement Learning


    Let’s now talk about Reinforcement Learning and its interactions. As shown in
    Figure [1-11](#A454310_1_En_1_Chapter.xhtml#Fig11), the interactions between the
    agent and the environment occur with a reward. We need to take an action to move
    from one state to another. ![A454310_1_En_1_Fig11_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig11_HTML.jpg)
    Figure 1-11. Reinforcement Learning interactions Reinforcement Learning is a way
    of implementing how to map situations to actions so as to maximize and find a
    way to get the highest rewards. The machine or robot is not told which actions
    to take, as with other forms of Machine Learning, but instead the machine must
    discover which actions yield the maximum reward by trying them. In the most interesting
    and challenging cases, actions affect not only the immediate reward but also the
    next situation and all subsequent rewards.


    ## RL Characteristics


    We talk about characteristics next. The characteristics are generally what the
    agent does to move to the next state. The agent considers which approach works
    best to make the next move. The two characteristics are:


    - Trial and error search.

    - Delayed reward.


    As you probably have gathered, Reinforcement Learning works on three things combined:
    `(S, A, R)` where `S` represents state, `A` represents action, and `R` represents
    reward. If you are in a state `S`, you perform an action `A` so that you get a
    reward `R` at time frame `t+1`. Now, the most important part is when you move
    to the next state. In this case, we do not use the reward we just earned to decide
    where to move next. Each transition has a unique reward and no reward from any
    previous state is used to determine the next move. See Figure [1-12](#A454310_1_En_1_Chapter.xhtml#Fig12).
    ![A454310_1_En_1_Fig12_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig12_HTML.jpg) Figure
    1-12. State change with time The `T` change (the time frame) is important in terms
    of Reinforcement Learning. Every occurrence of what we do is always a combination
    of what we perform in terms of states, actions, and rewards. See Figure [1-13](#A454310_1_En_1_Chapter.xhtml#Fig13).
    ![A454310_1_En_1_Fig13_HTML.jpg](OEBPS/Images/A454310_1_En_1_Fig13_HTML.jpg) Figure
    1-13. Another way of representing the state transition


    ## How Reward Works


    A reward is some motivator we receive when we transition from one state to another.
    It can be points, as in a video game. The more we train, the more accurate we
    become, and the greater our reward.'
