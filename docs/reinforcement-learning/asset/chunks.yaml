    \ 类中，我们构建了整个迷宫学习的方式。我们还在下一段代码中声明了学习超参数，并确定了程序的学习速率：\n\n```python\nimport numpy\
    \ as np\nimport pandas as pd\n\n\nclass QLearningTable:\n    def __init__(self,\
    \ actions, learning_rate=0.01, reward_decay=0.9, e_greedy=0.9):\n        self.actions\
    \ = actions  # 一个列表\n        self.lr = learning_rate\n        self.gamma = reward_decay\n\
    \        self.epsilon = e_greedy\n        self.q_table = pd.DataFrame(columns=self.actions)\n\
    \n    def choose_action(self, observation):\n        self.check_state_exist(observation)\n\
    \        # 动作选择\n        if np.random.uniform() < self.epsilon:\n            #\
    \ 选择最佳动作\n            state_action = self.q_table.ix[observation, :]\n       \
    \     state_action = state_action.reindex(np.random.permutation(state_action.index))\
    \     # 某些动作具有相同值\n            action = state_action.argmax()\n        else:\n\
    \            # 选择随机动作\n            action = np.random.choice(self.actions)\n \
    \       return action\n\n    def learn(self, s, a, r, s_):\n        self.check_state_exist(s_)\n\
    \        q_predict = self.q_table.ix[s, a]\n        if s_ != 'terminal':\n   \
    \         q_target = r + self.gamma * self.q_table.ix[s_, :].max()  # 下一个状态不是终止状态\n\
    \        else:\n            q_target = r  # 下一个状态是终止状态\n        self.q_table.ix[s,\
    \ a] += self.lr * (q_target - q_predict)  # 更新\n\n    def check_state_exist(self,\
    \ state):\n        if state not in self.q_table.index:\n            # 向 q 表追加新状态\n\
    \            self.q_table = self.q_table.append(\n                pd.Series(\n\
    \                    [0]*len(self.actions),\n                    index=self.q_table.columns,\n\
    \                    name=state,\n                )\n            )\n```\n\n##\
    \ 更新函数\n\n这段代码声明了一个函数，该函数接收迷宫内从一个状态到另一个状态的移动更新。当玩家从一个状态转换到另一个状态时，它也会给出奖励。\n\n\
    ```python\nfrom maze_env import Maze\nfrom RL_brain import QLearningTable\n\n\n\
    def update():\n    for episode in range(100):\n        # 初始观察值\n        observation\
    \ = env.reset()\n\n        while True:\n            # 刷新环境\n            env.render()\n\
    \n            # 强化学习基于观察值选择动作\n            action = RL.choose_action(str(observation))\n\
    \n            # 强化学习执行动作并获取下一个观察值和奖励\n            observation_, reward, done =\
    \ env.step(action)\n\n            # 强化学习从此次转换中学习\n            RL.learn(str(observation),\
    \ action, reward, str(observation_))\n\n            # 交换观察值\n            observation\
    \ = observation_\n\n            # 当本回合结束时跳出循环\n            if done:\n        \
    \        break\n\n    # 游戏结束\n    print('game over')\n    env.destroy()\n\n\n\
    if __name__ == \"__main__\":\n    env = Maze()\n    RL = QLearningTable(actions=list(range(env.n_actions)))\n\
    \    env.after(100, update)\n    env.mainloop()\n```\n\n如果你进入文件夹，会看到 `run_this.py`\
    \ 文件，并可以获得输出，如图 4-2 所示。\n\n![A454310_1_En_4_Fig2_HTML.jpg](img/A454310_1_En_4_Fig2_HTML.jpg)\n\
    \n**图 4-2.** 运行文件\n\n图 4-3 显示了代码的运行情况。\n\n![A454310_1_En_4_Fig3_HTML.jpg](img/A454310_1_En_4_Fig3_HTML.jpg)\n\
    \n**图 4-3.** 正在运行的迷宫文件\n"
- fmt: "# Using the MDP Toolbox in Python\n\nThe MDP toolbox provides classes and\
    \ functions for the resolution of discrete time Markov decision processes. The\
    \ list of algorithms that have been implemented includes backwards induction,\
    \ linear programming, policy iteration, Q learning, and value iteration along\
    \ with several variations. The following are the features of the MDP toolbox (see\
    \ Figure [4-4](#A454310_1_En_4_Chapter.xhtml#Fig4)):\n\n- Eight MDP algorithms\n\
    - Fast array manipulation using NumPy\n- Full sparse matrix support using Scipy's\
    \ sparse package\n- Optional linear programming support using `cvxopt`\n\n![A454310_1_En_4_Fig4_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig4_HTML.jpg)\
    \ Figure 4-4. MDP toolbox features\n\nNext, you see how to install and configure\
    \ MDP toolbox for Python. First, switch to the Anaconda environment, as shown\
    \ in Figure [4-5](#A454310_1_En_4_Chapter.xhtml#Fig5).\n\n![A454310_1_En_4_Fig5_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig5_HTML.jpg)\
    \ Figure 4-5. Activating the Anaconda environment\n\nNow install the dependencies\
    \ using this command (see Figure [4-6](#A454310_1_En_4_Chapter.xhtml#Fig6)):\n\
    \n```\nsudo apt-get install python3-numpy python3-scipy liblapack-dev libatlas-base-dev\
    \ libgsl0-dev fftw-dev libglpk-dev libdsdp-dev\n```\n\n![A454310_1_En_4_Fig6_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig6_HTML.jpg)\
    \ Figure 4-6. Installing the dependencies\n\nWhen it asks you if it should install\
    \ the dependencies, choose yes, as shown in Figure [4-7](#A454310_1_En_4_Chapter.xhtml#Fig7).\n\
    \n![A454310_1_En_4_Fig7_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig7_HTML.jpg) Figure\
    \ 4-7. Choose yes to proceed\n\nAll the dependencies are then installed, as shown\
    \ in Figure [4-8](#A454310_1_En_4_Chapter.xhtml#Fig8).\n\n![A454310_1_En_4_Fig8_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig8_HTML.jpg)\
    \ Figure 4-8. The dependencies are installed\n\nNow you can go ahead and install\
    \ the MDP toolbox, as shown in Figure [4-9](#A454310_1_En_4_Chapter.xhtml#Fig9).\n\
    \n![A454310_1_En_4_Fig9_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig9_HTML.jpg) Figure\
    \ 4-9. Installing the MDP toolbox\n\nThe important packages are being installed,\
    \ as shown in Figure [4-10](#A454310_1_En_4_Chapter.xhtml#Fig10).\n\n![A454310_1_En_4_Fig10_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig10_HTML.jpg)\
    \ Figure 4-10. Installing the important packages\n\nIf everything works as expected,\
    \ you'll get all the packages installed, as shown in Figure [4-11](#A454310_1_En_4_Chapter.xhtml#Fig11).\n\
    \n![A454310_1_En_4_Fig11_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig11_HTML.jpg)\
    \ Figure 4-11. All the packages have been installed\n\nNow you need to clone the\
    \ repo from GitHub (see Figure [4-12](#A454310_1_En_4_Chapter.xhtml#Fig12)):\n\
    \n```\ngit clone https://github.com/sawcordwell/pymdptoolbox.git\n```\n\n![A454310_1_En_4_Fig12_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig12_HTML.jpg)\
    \ Figure 4-12. Cloning the repo\n\nSwitch to the `mdptoolbox` folder to see the\
    \ details shown in Figure [4-13](#A454310_1_En_4_Chapter.xhtml#Fig13).\n\n![A454310_1_En_4_Fig13_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig13_HTML.jpg)\
    \ Figure 4-13. Getting inside the folder\n\nYou now need to switch to Python mode,\
    \ as shown in Figure [4-14](#A454310_1_En_4_Chapter.xhtml#Fig14).\n\n![A454310_1_En_4_Fig14_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig14_HTML.jpg)\
    \ Figure 4-14. Inside Python mode\n\nWe will now use an example to see how the\
    \ MDP toolbox works. First, import the MDP example, as shown in Figure [4-15](#A454310_1_En_4_Chapter.xhtml#Fig15).\n\
    \n![A454310_1_En_4_Fig15_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig15_HTML.jpg)\
    \ Figure 4-15. Importing the modules\n\nA Markov problem assumes that future states\
    \ depend only on the current state, not on the events that occurred before. We\
    \ will set up an example Markov problem using a discount value of 0.8. To use\
    \ the built-in examples in the MDP toolbox, you need to import the `mdptoolbox.example`\
    \ and solve it using a value iteration algorithm. Then you'll need to check the\
    \ optimal policy. The optimal policy is a function that allows the state to transition\
    \ to the next state with maximum rewards. You can check the policy with the `vi.policy`\
    \ command, as shown in Figure [4-16](#A454310_1_En_4_Chapter.xhtml#Fig16).\n\n\
    ![A454310_1_En_4_Fig16_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig16_HTML.jpg) Figure\
    \ 4-16. Doing operations\n\nThe output for the policy is `(0,0,0)`. The results\
    \ show the discounted reward for the implemented policy. Here is the full program:\n\
    \n```\nimport mdptoolbox.example\nP, R = mdptoolbox.example.forest()\nvi = mdptoolbox.mdp.ValueIteration(P,\
    \ R, 0.8)\nvi.run()\nvi.policy # result is (0, 0, 0)\n```\n\nLet's consider another\
    \ example. First you need to import the toolbox and the toolbox example. Using\
    \ the import example, you are bringing in the built-in examples that are in the\
    \ MDP toolbox (see Figure [4-17](#A454310_1_En_4_Chapter.xhtml#Fig17)).\n\n```\n\
    import mdptoolbox, mdptoolbox.example\n```\n\n![A454310_1_En_4_Fig17_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig17_HTML.jpg)\
    \ Figure 4-17. Another example of MDP\n\nWe implemented verbose mode in the previous\
    \ example so we can display the current stage and policy transpose.\n\n```\n>>>\
    \ import mdptoolbox, mdptoolbox.example\n>>> P, R = mdptoolbox.example.forest()\n\
    >>> fh = mdptoolbox.mdp.FiniteHorizon(P, R, 0.9, 3)\n>>> fh.run()\n>>> fh.V\n\
    array([[ 2.6973, 0.81  , 0.    , 0.    ],\n       [ 5.9373, 3.24  , 1.    , 0.\
    \    ],\n       [ 9.9373, 7.24  , 4.    , 0.    ]])\n>>> fh.policy\narray([[0,\
    \ 0, 0],\n       [0, 0, 1],\n       [0, 0, 0]])\n```\n\nThe next example is also\
    \ in verbose mode and each iteration displays the number of different actions\
    \ between policy n-1 and n (see Figure [4-18](#A454310_1_En_4_Chapter.xhtml#Fig18)).\n\
    \n![A454310_1_En_4_Fig18_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig18_HTML.jpg)\
    \ Figure 4-18. Policy between n-1 and n\n\nWe are getting help from the built-in\
    \ example of MDP, where we are trying to find the discounted MDP using a value\
    \ iteration. As is the case with MDP, some of the values are randomly generated\
    \ by using `rand(10,3)` and some of the values are provided by the decision-making\
    \ process. We try to solve an MDP by applying RL with a value iteration in this\
    \ example:\n\n```\n>>> import mdptoolbox, mdptoolbox.example\n>>> P, R = mdptoolbox.example.rand(10,\
    \ 3)\n>>> pi = mdptoolbox.mdp.PolicyIteration(P, R, 0.9)\n>>> pi.run()\n>>> P,\
    \ R = mdptoolbox.example.forest()\n>>> pi = mdptoolbox.mdp.PolicyIteration(P,\
    \ R, 0.9)\n>>> pi.run()\n>>> expected = (26.244000000000014, 29.484000000000016,\
    \ 33.484000000000016)\n>>> all(expected[k] - pi.V[k] < 1e-12 for k in range(len(expected)))\n\
    \    True\n```\n\n8.2. Markov Decision Process (MDP) Toolbox: `mdp` module 21\
    \ Python Markov Decision Process Toolbox Documentation, Release 4.0-b4\n\n```\n\
    >>> pi.policy\n(0, 0, 0)\n```\n\n# Understanding Swarm Intelligence\n\nSwarm intelligence\
    \ is an important part of AI. It is the collective behavior of a decentralized,\
    \ self-organized system, whether it be natural or artificial. Swarm intelligence\
    \ typically consists of a population of simple agents or boids (artificial life\
    \ programs) interacting locally with one another and with their environment, as\
    \ illustrated in Figure [4-19](#A454310_1_En_4_Chapter.xhtml#Fig19).\n\n![A454310_1_En_4_Fig19_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig19_HTML.jpg)\
    \ Figure 4-19. Swarm intelligence interactions\n\n## Applications of Swarm Intelligence\n\
    \nFigure [4-20](#A454310_1_En_4_Chapter.xhtml#Fig20) shows some applications of\
    \ swarm intelligence.\n\n![A454310_1_En_4_Fig20_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig20_HTML.jpg)\
    \ Figure 4-20. Applications of swarm intelligence\n\n### Ant-Based Routing\n\n\
    When you are dealing with something similar to telecommunication networks, this\
    \ is called ant-based routing. The idea of ant based routing is based on RL, as\
    \ there is lot of forward and backward movement along a particular network packet,\
    \ which can be called the ant. This results in flooding the entire network.\n\n\
    ### Crowd Simulations\n\nIn the movies, crowd simulations are done with the help\
    \ of swarm optimization."
