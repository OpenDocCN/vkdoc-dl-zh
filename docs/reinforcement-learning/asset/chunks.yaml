  trans: '

    # 强化学习的理论基础


    本节将探讨强化学习的理论基础。图 2-1 展示了你将如何实现稍后描述的 `MDP`。![A454310_1_En_2_Fig1_HTML.jpg](img/A454310_1_En_2_Fig1_HTML.jpg)
    图 2-1. `MDP` 的理论基础 强化学习中的环境由马尔可夫决策过程（本章稍后讨论）表示。


    - `SS` 是一个有限的状态集合。`AA` 是一个有限的动作集合。

    - `T:S×A×S→[0,1]` 是一个转移模型，它将 `(状态, 动作, 状态)` 三元组映射为概率。

    - `T(s,a,s'')` 表示如果你处于状态 `s` 并执行了动作 `a`，那么你将进入状态 `s''` 的概率。


    用条件概率来表示，即：`T(s,a,s'') = P(s''|s,a)`。`R:S×S→R` 是一个奖励函数，它返回一个实数，表示环境因状态转移而给予的奖励（或惩罚）量。`R(s,s'')`
    是从状态 `s` 转移到状态 `s''` 后获得的奖励。如果转移模型对智能体是已知的，即智能体知道它从当前位置可能去往何处，那么智能体就很容易知道如何行动，才能在与环境交互的经验中最大化其期望效用。我们可以将智能体的期望效用定义为其在与环境交互的整个过程中获得的累积奖励。如果智能体经历了状态序列
    `s0, s1, …, sn-1, sn`，那么可以将其期望效用正式定义为：`∑_{t=1}^{n} γ^t E[R(s_{t-1}, s_t)]`，其中
    `γ` 是一个折扣因子，用于降低过去奖励的价值（从而降低其重要性），而 `E` 是[期望值](https://en.wikipedia.org/wiki/Expected_value#_blank)。当智能体对转移背后的概率模型一无所知时，问题就出现了，而这正是强化学习发挥作用的地方。现在可以将强化学习问题正式定义为：学习一组参数以最大化期望效用的问题。强化学习有两种类型：


    - **基于模型**：智能体尝试采样并学习概率模型，然后利用该模型确定它可以采取的最佳动作。在这种类型中，前面模糊提及的参数集就是 `MDP` 模型。

    - **无模型**：智能体不关心 `MDP` 模型，而是尝试开发一个控制函数，该函数观察状态并决定要采取的最佳动作。在这种情况下，需要学习的参数就是定义该控制函数的参数。


    ## 强化学习的应用领域


    本节讨论强化学习的不同领域，如图 2-2 所示。![A454310_1_En_2_Fig2_HTML.jpg](img/A454310_1_En_2_Fig2_HTML.jpg)
    图 2-2. 强化学习的不同领域


    ### 制造业


    在制造业中，工厂机器人使用强化学习将一个物体从一个箱子中取出，然后放入另一个容器中。如果它在递送时失败或成功，机器人会记住该物体并重新学习，最终目标是获得最佳结果并达到最高精度。


    ### 库存管理


    在库存管理方面，强化学习可用于减少库存周转时间，并可应用于仓库中产品的摆放，以优化空间利用。


    ### 配送管理


    强化学习被用于解决拆分配送的车辆路径问题。`Q Learning` 被用来用一辆车为合适的客户提供服务。


    ### 金融领域


    强化学习被用于会计领域，采用交易策略。


    ## 为什么强化学习很困难？


    强化学习最困难的部分之一在于必须映射环境并包含所有可能的移动。例如，考虑一个棋盘游戏。你必须将人工智能应用于所学到的知识。理论上，强化学习应该完美运行，因为棋盘游戏中存在大量的状态跳转和复杂移动。然而，单独应用强化学习会变得困难。为了获得最佳结果，我们将基于规则的引擎与强化学习结合使用。如果我们不应用基于规则的引擎，棋盘游戏中的选项太多，智能体将花费无穷无尽的时间来发现路径。首先，我们应用简单的规则，以便人工智能快速学习，然后随着复杂性的增加，我们再应用强化学习。图
    2-3 展示了应用强化学习可能遇到的困难。![A454310_1_En_2_Fig3_HTML.jpg](img/A454310_1_En_2_Fig3_HTML.jpg)
    图 2-3. 结合规则的强化学习


    ## 准备机器

    '
- fmt: 'Before you can run the examples, you need to perform certain steps to install
    the software. The examples in this book use the Anaconda version of Python, so
    this section explains how to find and download it.


    First, you need to open a terminal. The process of starting the terminal is shown
    in Figure [2-4](#A454310_1_En_2_Chapter.xhtml#Fig4).


    ![A454310_1_En_2_Fig4_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig4_HTML.jpg) Figure
    2-4. Opening the terminal


    Next, you need to update the packages. Write the following command in the terminal
    to do so. See Figure [2-5](#A454310_1_En_2_Chapter.xhtml#Fig5).


    ```

    sudo apt-get update

    ```


    ![A454310_1_En_2_Fig5_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig5_HTML.jpg) Figure
    2-5. Updating the packages


    After you run the update command, the required installation content is installed,
    as shown in Figure [2-6](#A454310_1_En_2_Chapter.xhtml#Fig6).


    ![A454310_1_En_2_Fig6_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig6_HTML.jpg) Figure
    2-6. Everything has been updated


    Now you can use another command for installing the required packages. Figure [2-7](#A454310_1_En_2_Chapter.xhtml#Fig7)
    shows the process.


    ```

    sudo apt-get install golang python3-dev python-dev libcupti-dev libjpeg-turbo8-dev
    make tmux htop chromium-browser git cmake zlib1g-dev libjpeg-dev xvfb libav-tools
    xorg-dev python-opengl libboost-all-dev libsdl2-dev swig

    ```


    ![A454310_1_En_2_Fig7_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig7_HTML.jpg) Figure
    2-7. Fetching the updates


    As shown in Figure [2-8](#A454310_1_En_2_Chapter.xhtml#Fig8), you’ll need to type
    `y` and then press Enter to continue.


    ![A454310_1_En_2_Fig8_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig8_HTML.jpg) Figure
    2-8. Continue with the installation


    In the next step, the essential packages are downloaded and updated accordingly,
    as shown in Figure [2-9](#A454310_1_En_2_Chapter.xhtml#Fig9).


    ![A454310_1_En_2_Fig9_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig9_HTML.jpg) Figure
    2-9. Downloading and extracting the packages


    You have now installed the Anaconda distribution of Python. Next, you need to
    open a browser window for Ubuntu. This example shows Mozilla Firefox. Search for
    the Anaconda installation, as shown in Figure [2-10](#A454310_1_En_2_Chapter.xhtml#Fig10).


    ![A454310_1_En_2_Fig10_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig10_HTML.jpg) Figure
    2-10. Downloading Anaconda


    Now you have to find the download that’s appropriate for your particular operating
    system. The Anaconda page is shown in Figure [2-11](#A454310_1_En_2_Chapter.xhtml#Fig11).


    ![A454310_1_En_2_Fig11_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig11_HTML.jpg) Figure
    2-11. Anaconda page


    Select the appropriate distribution of Anaconda, as shown in Figure [2-12](#A454310_1_En_2_Chapter.xhtml#Fig12).


    ![A454310_1_En_2_Fig12_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig12_HTML.jpg) Figure
    2-12. Selecting the Anaconda version


    Save the file next, as shown in Figure [2-13](#A454310_1_En_2_Chapter.xhtml#Fig13).


    ![A454310_1_En_2_Fig13_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig13_HTML.jpg) Figure
    2-13. Saving the file


    Now, using the terminal, you have to get inside the downloads folder. You should
    also check for the file that was being saved. See Figure [2-14](#A454310_1_En_2_Chapter.xhtml#Fig14).


    ![A454310_1_En_2_Fig14_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig14_HTML.jpg) Figure
    2-14. Getting inside the downloads folder


    You now have to use the `bash` command to run the shell script (see Figure [2-15](#A454310_1_En_2_Chapter.xhtml#Fig15)):


    ```

    bash Anaconda3-4.4.0-Linux-x86_64.sh

    ```


    ![A454310_1_En_2_Fig15_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig15_HTML.jpg) Figure
    2-15. Running the shell script


    To select the platform, type `yes` and press Enter. Anaconda will be installed
    into the home location, as shown in Figure [2-16](#A454310_1_En_2_Chapter.xhtml#Fig16).


    ![A454310_1_En_2_Fig16_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig16_HTML.jpg) Figure
    2-16. Setting up the Anaconda environment


    The next step, shown in Figure [2-17](#A454310_1_En_2_Chapter.xhtml#Fig17), will
    install all the important packages for Anaconda so that it is configured properly.


    ![A454310_1_En_2_Fig17_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig17_HTML.jpg) Figure
    2-17. Installing the key packages for Anaconda


    After the Anaconda installation is complete, you need to open a new terminal to
    set up your Anaconda environment. You have to create a new environment for Anaconda
    using the `conda create` command (see Figure [2-18](#A454310_1_En_2_Chapter.xhtml#Fig18)).
    This command keeps all the packages in an isolated place.


    ```

    conda create --name universe python=3.6 anaconda

    ```


    ![A454310_1_En_2_Fig18_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig18_HTML.jpg) Figure
    2-18. Creating an environment


    In the next step, the Anaconda environment will install the necessary packages.
    See Figure [2-19](#A454310_1_En_2_Chapter.xhtml#Fig19).


    ![A454310_1_En_2_Fig19_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig19_HTML.jpg) Figure
    2-19. The packages for installing or updating Anaconda


    Type `y` and then press Enter to continue. Then the entire process will be complete
    after every package is updated in the environment. You can now activate the environment.
    See Figure [2-20](#A454310_1_En_2_Chapter.xhtml#Fig20).


    ![A454310_1_En_2_Fig20_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig20_HTML.jpg) Figure
    2-20. The packages for installing or updating Anaconda


    Some additional updates might need to be installed. You also need to install Swig,
    as shown in Figure [2-21](#A454310_1_En_2_Chapter.xhtml#Fig21).


    ```

    conda install pip six libgcc swig

    ```


    ![A454310_1_En_2_Fig21_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig21_HTML.jpg) Figure
    2-21. Installing Swig too


    You will also have to install OpenCV in order to update certain packages, as shown
    in Figure [2-22](#A454310_1_En_2_Chapter.xhtml#Fig22).


    ![A454310_1_En_2_Fig22_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig22_HTML.jpg) Figure
    2-22. Installing OpenCV


    If there are updates to OpenCV, type `y` to install them too. See Figure [2-23](#A454310_1_En_2_Chapter.xhtml#Fig23).


    ![A454310_1_En_2_Fig23_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig23_HTML.jpg) Figure
    2-23. Installing OpenCV


    Next, you need to install TensorFlow. This chapter shows how to install the CPU
    version. See Figure [2-24](#A454310_1_En_2_Chapter.xhtml#Fig24).


    ```

    pip install --upgrade tensorflow

    ```


    ![A454310_1_En_2_Fig24_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig24_HTML.jpg) Figure
    2-24. Installing TensorFlow


    Figure [2-25](#A454310_1_En_2_Chapter.xhtml#Fig25) shows the packages being installed
    for TensorFlow.


    ![A454310_1_En_2_Fig25_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig25_HTML.jpg) Figure
    2-25. TensorFlow installs the packages


    The next step, shown in Figure [2-26](#A454310_1_En_2_Chapter.xhtml#Fig26), asks
    for the privileges to install the other packages. Type `y` to continue.


    ![A454310_1_En_2_Fig26_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig26_HTML.jpg) Figure
    2-26. Package installation happens


    In the next section, we install Docker. We will first learn what Docker is.'
