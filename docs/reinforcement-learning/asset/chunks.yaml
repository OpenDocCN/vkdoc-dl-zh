    \ Q 表中，所有决策都基于 Q 表做出。\n\n```\ndef build_q_table(n_states, actions):\n    table\
    \ = pd.DataFrame(\n        np.zeros((n_states, len(actions))),     # q_table initial\
    \ values\n        columns=actions,    # actions's name\n    )\n    # print(table)\
    \    # show table\n    return table\n```\n\n现在我们需要采取行动。为此，我们使用以下代码：\n\n```\ndef\
