- fmt: "# Reinforcement Learning with Keras, TensorFlow, and ChainerRL\n\nTo start\
    \ with, you need to import the important libraries. `TFLearn` creates the prototyping\
    \ so the program can implement RL very quickly. Add a learning rate. You do this\
    \ by initializing a simulated environment and then indicating the movement pattern\
    \ with the following command: `action = env.action_space.sample()`. This example\
    \ pairs the observation with the movement of the balanced cart-pole (moving left\
    \ or right). In the given problem, the basis of RL is the score that we are referencing.\
    \ After applying the RL, we are training the model with `TFLearn`, a module for\
    \ `TensorFlow` that’s used to create a fully connected neural network and produce\
    \ a faster training process.\n\n```python\nimport gym\nimport random\nimport numpy\
    \ as np\nimport tflearn\nfrom tflearn.layers.core import input_data, dropout,\
    \ fully_connected\nfrom tflearn.layers.estimator import regression\nfrom statistics\
    \ import median, mean\nfrom collections import Counter\n\nLR = 1e-3\nenv = gym.make(\"\
    CartPole-v0\")\nenv.reset()\ngoal_steps = 500\nscore_requirement = 50\ninitial_games\
    \ = 10000\n\ndef some_random_games_first():\n    # Each of these is its own game.\n\
    \    for episode in range(5):\n        env.reset()\n        # this is each frame,\
    \ up to 200...but we wont make it that far.\n        for t in range(200):\n  \
    \          # This will display the environment\n            # Only display if\
    \ you really want to see it.\n            # Takes much longer to display it.\n\
    \            env.render()\n            # This will just create a sample action\
    \ in any environment.\n            # In this environment, the action can be 0\
    \ or 1, which is left or right\n            action = env.action_space.sample()\n\
    \            # this executes the environment with an action,\n            # and\
    \ returns the observation of the environment,\n            # the reward, if the\
    \ env is over, and other info.\n            observation, reward, done, info =\
    \ env.step(action)\n            if done:\n                break\n\nsome_random_games_first()\n\
    \ndef initial_population():\n    # [OBS, MOVES]\n    training_data = []\n    #\
    \ all scores:\n    scores = []\n    # just the scores that met our threshold:\n\
    \    accepted_scores = []\n    # iterate through however many games we want:\n\
    \    for _ in range(initial_games):\n        score = 0\n        # moves specifically\
    \ from this environment:\n        game_memory = []\n        # previous observation\
    \ that we saw\n        prev_observation = []\n        # for each frame in 200\n\
    \        for _ in range(goal_steps):\n            # choose random action (0 or\
    \ 1)\n            action = random.randrange(0,2)\n            # do it!\n     \
    \       observation, reward, done, info = env.step(action)\n            # notice\
    \ that the observation is returned FROM the action\n            # so we'll store\
    \ the previous observation here, pairing\n            # the prev observation to\
    \ the action we'll take.\n            if len(prev_observation) > 0 :\n       \
    \         game_memory.append([prev_observation, action])\n            prev_observation\
    \ = observation\n            score+=reward\n            if done: break\n     \
    \   # IF our score is higher than our threshold, we'd like to save\n        #\
    \ every move we made\n        # NOTE the reinforcement methodology here.\n   \
    \     # all we're doing is reinforcing the score, we're not trying\n        #\
    \ to influence the machine in any way as to HOW that score is\n        # reached.\n\
    \        if score >= score_requirement:\n            accepted_scores.append(score)\n\
    \            for data in game_memory:\n                # convert to one-hot (this\
    \ is the output layer for our neural network)\n                if data[1] == 1:\n\
    \                    output = [0,1]\n                elif data[1] == 0:\n    \
    \                output = [1,0]\n                # saving our training data\n\
    \                training_data.append([data[0], output])\n        # reset env\
    \ to play again\n        env.reset()\n        # save overall scores\n        scores.append(score)\n\
    \    # just in case you wanted to reference later\n    training_data_save = np.array(training_data)\n\
    \    np.save('saved.npy',training_data_save)\n    # some stats here, to further\
    \ illustrate the neural network magic!\n    print('Average accepted score:',mean(accepted_scores))\n\
    \    print('Median score for accepted scores:',median(accepted_scores))\n    print(Counter(accepted_scores))\n\
    \    return training_data\n\ndef neural_network_model(input_size):\n    network\
    \ = input_data(shape=[None, input_size, 1], name='input')\n    network = fully_connected(network,\
    \ 128, activation='relu')\n    network = dropout(network, 0.8)\n    network =\
    \ fully_connected(network, 256, activation='relu')\n    network = dropout(network,\
    \ 0.8)\n    network = fully_connected(network, 512, activation='relu')\n    network\
    \ = dropout(network, 0.8)\n    network = fully_connected(network, 256, activation='relu')\n\
    \    network = dropout(network, 0.8)\n    network = fully_connected(network, 128,\
    \ activation='relu')\n    network = dropout(network, 0.8)\n    network = fully_connected(network,\
    \ 2, activation='softmax')\n    network = regression(network, optimizer='adam',\
    \ learning_rate=LR, loss='categorical_crossentropy', name='targets')\n    model\
    \ = tflearn.DNN(network, tensorboard_dir='log')\n    return model\n\ndef train_model(training_data,\
    \ model=False):\n    X = np.array([i[0] for i in training_data]).reshape(-1,len(training_data[0][0]),1)\n\
    \    y = [i[1] for i in training_data]\n    if not model:\n        model = neural_network_model(input_size\
    \ = len(X[0]))\n        x = np.reshape(x, (-1, 30, 9))\n    model.fit({'input':\
    \ X}, {'targets': y}, n_epoch=5, snapshot_step=500, show_metric=True, run_id='openai_learning')\n\
    \    return model\n\nmodel = train_model(training_data)\n\nscores = []\nchoices\
    \ = []\nfor each_game in range(10):\n    score = 0\n    game_memory = []\n   \
    \ prev_obs = []\n    env.reset()\n    for _ in range(goal_steps):\n        env.render()\n\
    \        if len(prev_obs)==0:\n            action = random.randrange(0,2)\n  \
    \      else:\n            action = np.argmax(model.predict(prev_obs.reshape(-1,len(prev_obs),1))[0])\n\
    \        choices.append(action)\n        new_observation, reward, done, info =\
    \ env.step(action)\n        prev_obs = new_observation\n        game_memory.append([new_observation,\
    \ action])\n        score+=reward\n        if done: break\n    scores.append(score)\n\
    \nprint('Average Score:',sum(scores)/len(scores))\nprint('choice 1:{}  choice\
    \ 0:{}'.format(choices.count(1)/len(choices),choices.count(0)/len(choices)))\n\
    print(score_requirement)\n```\n\nHere is the output:\n\n```\nAverage Score: 195.9\n\
    choice 1:0.5074017355793773  choice 0:0.49259826442062277\n50\nSolved.\n```\n\n\
    ## Conclusion\n\nThis chapter touched on Q learning and then showed some examples.\
    \ It also covered the MDP toolbox, swarm intelligence, and game AI, and ended\
    \ with a full example. Chapter [5](#A454310_1_En_5_Chapter.xhtml) covers Reinforcement\
    \ Learning with Keras, TensorFlow, and ChainerRL.\n\n© Abhishek Nandy and Manisha\
    \ Biswas 2018  \nAbhishek Nandy and Manisha Biswas  \nReinforcement Learning \
    \ \n[https://doi.org/10.1007/978-1-4842-3285-9_5](#A454310_1_En_5_Chapter.xhtml)\n\
    \n# 5. Reinforcement Learning with Keras, TensorFlow, and ChainerRL\n\nAbhishek\
    \ Nandy^(1) and Manisha Biswas²  \n(1) Rm HIG L-2/4, Bldg Swaranika Co-Opt HSG,\
    \ Kolkata, West Bengal, India  \n(2) North 24 Parganas, West Bengal, India\n\n\
    This chapter covers using Keras with Reinforcement Learning and defines how Keras\
    \ can be used for Deep Q Learning as well."
