    dense_2 (Dense)              (None, 16)                272\n_________________________________________________________________\n\
    activation_2 (Activation)    (None, 16)                0\n_________________________________________________________________\n\
    dense_3 (Dense)              (None, 16)                272\n_________________________________________________________________\n\
    activation_3 (Activation)    (None, 16)                0\n_________________________________________________________________\n\
    dense_4 (Dense)              (None, 2)                 34\n_________________________________________________________________\n\
    activation_4 (Activation)    (None, 2)                 0\n=================================================================\n\
    Total params: 658\nTrainable params: 658\nNon-trainable params: 0\n_________________________________________________________________\n\
    None\n2017-09-24 09:36:27.932219: W tensorflow/core/platform/cpu_feature_guard.cc:45]\
    \ The TensorFlow library wasn't compiled to use AVX instructions, but these are\
    \ available on your machine and could speed up CPU computations.\n...\n    712/50000:\
    \ episode: 38, duration: 0.243s, episode steps: 14, steps per second: 58, episode\
    \ reward: 14.000, mean reward: 1.000 [1.000, 1.000], mean action: 0.500 [0.000,\
    \ 1.000], mean observation: 0.105 [-0.568, 0.957], loss: 0.291389, mean_absolute_error:\
    \ 3.054634, mean_q: 5.816398\n```\n\nThe episodes are iterations for the simulations.\
    \ The `cartpole.py` code is discussed next. You need to import the utilities first.\
    \ The utilities included are very useful, as they have built-in agents for applying\
    \ Deep Q Learning. First, declare the environment as follows:\n\n```python\nENV_NAME\
    \ = 'CartPole-v0'\nenv = gym.make(ENV_NAME)\n```\n\nSince we want to implement\
    \ Deep Q Learning, we use parameters for initializing the Convolution Neural Network\
    \ (CNN). We also use an activation function to propagate the neural network. We\
    \ keep it sequential.\n\n```python\nmodel = Sequential()\nmodel.add(Flatten(input_shape=(1,)\
    \ + env.observation_space.shape))\nmodel.add(Dense(16))\nmodel.add(Activation('relu'))\n\
    model.add(Dense(16))\nmodel.add(Activation('relu'))\nmodel.add(Dense(16))\nmodel.add(Activation('relu'))\n\
    model.add(Dense(nb_actions))\nmodel.add(Activation('linear'))\n```\n\nYou can\
    \ print the model details too, as follows:\n\n```python\nprint(model.summary())\n\
    ```\n\nNext, configure the model and use all the Reinforcement Learning options\
    \ with the help of a function.\n\n```python\nimport numpy as np\nimport gym\n\
    from keras.models import Sequential\nfrom keras.layers import Dense, Activation,\
    \ Flatten\nfrom keras.optimizers import Adam\nfrom rl.agents.dqn import DQNAgent\n\
    from rl.policy import BoltzmannQPolicy\nfrom rl.memory import SequentialMemory\n\
    \nENV_NAME = 'CartPole-v0'\n# Get the environment and extract the number of actions.\n\
    env = gym.make(ENV_NAME)\nnp.random.seed(123)\nenv.seed(123)\nnb_actions = env.action_space.n\n\
    \n# Next, we build a very simple model.\nmodel = Sequential()\nmodel.add(Flatten(input_shape=(1,)\
    \ + env.observation_space.shape))\nmodel.add(Dense(16))\nmodel.add(Activation('relu'))\n\
    model.add(Dense(16))\nmodel.add(Activation('relu'))\nmodel.add(Dense(16))\nmodel.add(Activation('relu'))\n\
    model.add(Dense(nb_actions))\nmodel.add(Activation('linear'))\nprint(model.summary())\n\
    \n# Finally, we configure and compile our agent. You can use every built-in Keras\
    \ optimizer and\n# even the metrics!\nmemory = SequentialMemory(limit=50000, window_length=1)\n\
    policy = BoltzmannQPolicy()\ndqn = DQNAgent(model=model, nb_actions=nb_actions,\
    \ memory=memory, nb_steps_warmup=10,\n               target_model_update=1e-2,\
    \ policy=policy)\ndqn.compile(Adam(lr=1e-3), metrics=['mae'])\n\n# Okay, now it's\
    \ time to learn something! We visualize the training here for show, but this\n\
    # slows down training quite a lot. You can always safely abort the training prematurely\
    \ using\n# Ctrl + C.\ndqn.fit(env, nb_steps=50000, visualize=True, verbose=2)\n\
    \n# After training is done, we save the final weights.\ndqn.save_weights('dqn_{}_weights.h5f'.format(ENV_NAME),\
    \ overwrite=True)\n\n# Finally, evaluate our algorithm for 5 episodes.\ndqn.test(env,\
    \ nb_episodes=5, visualize=True)\n```\n\nTo get all the capabilities of Keras-rl,\
    \ you need to run the `setup.py` file within the Keras-rl folder, as follows:\n\
    \n```\n(universe) abhi@ubuntu:∼/keras-rl$ python setup.py install\n```\n\nYou\
    \ will see that all the dependencies are being installed, one by one:\n\n```\n\
