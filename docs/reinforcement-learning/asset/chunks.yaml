    ## About the Authors and About the Technical Reviewer


    ### About the Authors


    **Abhishek Nandy** ![A454310_1_En_BookFrontmatter_Figb_HTML.jpg](OEBPS/Images/A454310_1_En_BookFrontmatter_Figb_HTML.jpg)
    has a B.Tech. in information technology and considers himself a constant learner.
    He is a Microsoft MVP in the Windows platform, an Intel Black Belt Developer,
    as well as an Intel software innovator. Abhishek has a keen interest in artificial
    intelligence, IoT, and game development. He is currently serving as an application
    architect at an IT firm and consults in AI and IoT, as well does projects in AI,
    Machine Learning, and deep learning. He is also an AI trainer and drives the technical
    part of Intel AI student developer program. He was involved in the first Make
    in India initiative, where he was among the top 50 innovators and was trained
    in IIMA.


    **Manisha Biswas** ![A454310_1_En_BookFrontmatter_Figc_HTML.jpg](OEBPS/Images/A454310_1_En_BookFrontmatter_Figc_HTML.jpg)
    has a B.Tech. in information technology and currently works as a software developer
    at InSync Tech-Fin Solutions Ltd in Kolkata, India. She is involved in several
    areas of technology, including web development, IoT, soft computing, and artificial
    intelligence. She is an Intel Software innovator and was awarded the Shri Dewang
    Mehta IT Awards 2016 by NASSCOM, a certificate of excellence for top academic
    scores. She very recently formed a “Women in Technology” community in Kolkata,
    India to empower women to learn and explore new technologies. She likes to invent
    things, create something new, and invent a new look for the old things. When not
    in front of her terminal, she is an explorer, a foodie, a doodler, and a dreamer.
    She is always very passionate to share her knowledge and ideas with others. She
    is following her passion currently by sharing her experiences with the community
    so that others can learn, which lead her to become Google Women Techmakers, Kolkata
    Chapter Lead.


    ### About the Technical Reviewer


    **Avirup Basu** ![A454310_1_En_BookFrontmatter_Figd_HTML.jpg](OEBPS/Images/A454310_1_En_BookFrontmatter_Figd_HTML.jpg)
    is an IoT application developer at Prescriber360 Solutions. He is a researcher
    in robotics and has published papers through the IEEE.


    © Abhishek Nandy and Manisha Biswas 2018


