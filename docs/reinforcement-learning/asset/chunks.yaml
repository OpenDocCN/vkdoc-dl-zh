    \ visualize_log.py\nabhi@ubuntu:∼/keras-rl/examples$\n```\n\n![A454310_1_En_5_Fig24_HTML.jpg](OEBPS/Images/A454310_1_En_5_Fig24_HTML.jpg)\
    \ Figure 5-24. Getting inside the Keras-rl directory\n\nNow you can run one of\
    \ the examples:\n\n```\nabhi@ubuntu:∼/keras-rl/examples$ python dqn_cartpole.py\n\
    ```\n\nActivating the anaconda environment (universe)\n\n```\nabhi@ubuntu:∼/keras-rl/examples$\
    \ python dqn_cartpole.py\n```\n\nSee Figure [5-25](#A454310_1_En_5_Chapter.xhtml#Fig25).\n\
    \n![A454310_1_En_5_Fig25_HTML.jpg](OEBPS/Images/A454310_1_En_5_Fig25_HTML.jpg)\
    \ Figure 5-25. Using the TensorFlow backend\n\nThe simulation will now begin,\
    \ as shown in Figure [5-26](#A454310_1_En_5_Chapter.xhtml#Fig26).\n\n![A454310_1_En_5_Fig26_HTML.jpg](OEBPS/Images/A454310_1_En_5_Fig26_HTML.jpg)\
    \ Figure 5-26. Simulation happens\n\nThe simulation occurs and trains the model\
    \ using Deep Q Learning. With practice, the cart-pole will balance along the rope;\
    \ its stability increases with learning. The entire process creates the following\
    \ log:\n\n```\n(universe) abhi@ubuntu:∼/keras-rl/examples$ python dqn_cartpole.py\n\
    Using TensorFlow backend.\n[2017-09-24 09:36:27,476] Making new env: CartPole-v0\n\
    _________________________________________________________________\nLayer (type)\
    \                 Output Shape              Param #\n=================================================================\n\
