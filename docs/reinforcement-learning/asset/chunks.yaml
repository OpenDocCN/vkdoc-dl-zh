  trans: "\n# 什么是 Keras？\n\nKeras 是一个用于神经网络的**开源**前端库。我们可以说它充当了神经网络的骨干，因为它具有非常强大的激活函数构建能力。Keras\
    \ 可以将不同的深度学习框架作为后端运行。Keras 可与众多深度学习框架协同工作。从一个框架切换到另一个框架的方法是修改 `keras.json` 文件，该文件位于\
    \ Keras 的安装目录中。需要按如下方式修改 `backend` 参数：`{ \"backend\" : \"tensorflow\" }`。如果你愿意，可以将该参数从\
    \ TensorFlow 更改为其他框架。在 JSON 文件中，如果你想将其与 Theano 或 CNTK 一起使用，可以通过更改 `backend` 参数来实现。`keras.json`\
    \ 文件的结构如下所示：\n\n```\n{\n    \"image_data_format\": \"channels_last\",\n    \"\
    epsilon\": 1e-07,\n    \"floatx\": \"float32\",\n    \"backend\": \"tensorflow\"\
    \n}\n```\n\n所有 Keras 框架的流程如图 5-1 所示。\n\n![A454310_1_En_5_Fig1_HTML.jpg](img/A454310_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1. Keras 及其在不同框架下的修改\n\n# 使用 Keras 进行强化学习\n\n本节介绍如何安装 Keras，并展示一个强化学习的示例。首先需要安装依赖项。依赖项如下：\n\
    \n- Python\n- Keras 1.0\n- Pygame\n- Scikit-image\n\n让我们开始安装 Keras 1.0。以下示例展示了如何从\
    \ Anaconda 环境中安装 Keras：\n\n```\nconda install -c jaikumarm keras\n```\n\n系统会请求许可安装新包。选择“是”以继续，如图\
    \ 5-2 所示。\n\n![A454310_1_En_5_Fig2_HTML.jpg](img/A454310_1_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2. 待安装的更新\n\n当包安装成功并完成后，你将看到如图 5-3 所示的信息。\n\n![A454310_1_En_5_Fig3_HTML.jpg](img/A454310_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3. 包安装完成\n\n你也可以通过其他方式安装 Keras。以下示例展示了如何使用 `pip3` 进行安装。首先，使用 `sudo apt update`\
    \ 命令，如下所示：\n\n```\n(universe) abhi@ubuntu:∼$ sudo apt-get update\n```\n\n然后安装\
    \ `pip3`，如下所示：\n\n```\nsudo apt-get -y install python3-pip\n```\n\n图 5-4 展示了安装过程。\n\
    \n![A454310_1_En_5_Fig4_HTML.jpg](img/A454310_1_En_5_Fig4_HTML.jpg)\n\n图 5-4.\
    \ 安装 `pip3`\n\n安装完依赖项后，你需要安装 Keras（见图 5-5）：\n\n```\n(universe) abhi@ubuntu:∼$\
    \ sudo pip3 install keras\n```\n\n![A454310_1_En_5_Fig5_HTML.jpg](img/A454310_1_En_5_Fig5_HTML.jpg)\n\
    \n图 5-5. 安装 Keras\n\n现在我们将检查 Keras 是否使用了 TensorFlow 后端。从你之前启用的终端 Anaconda 环境中，需要切换到\
    \ Python 模式。如果导入 Keras 时得到以下结果，则说明一切正常（见图 5-6）。\n\n```\n(universe) abhi@ubuntu:∼$\
    \ python\nPython 3.5.3 |Anaconda custom (64-bit)| (default, Mar  6 2017, 11:58:13)\n\
    [GCC 4.4.7 20120313 (Red Hat 4.4.7-1)] on linux\nType \"help\", \"copyright\"\
    , \"credits\" or \"license\" for more information.\n>>> import keras\nUsing TensorFlow\
    \ backend.\n```\n\n![A454310_1_En_5_Fig6_HTML.jpg](img/A454310_1_En_5_Fig6_HTML.jpg)\n\
    \n图 5-6. 使用 TensorFlow 后端的 Keras\n\n# 使用 ChainerRL\n\n本节介绍 ChainerRL，并解释如何使用它应用强化学习。ChainerRL\
    \ 是一个深度强化学习库，特别借助 Chainer 框架构建。见图 5-7。\n\n![A454310_1_En_5_Fig7_HTML.jpg](img/A454310_1_En_5_Fig7_HTML.jpg)\n\
    \n图 5-7. ChainerRL\n\n## 安装 ChainerRL\n\n我们将首先从终端窗口安装 ChainerRL。图 5-8 展示了 Anaconda\
    \ 环境。\n\n![A454310_1_En_5_Fig8_HTML.jpg](img/A454310_1_En_5_Fig8_HTML.jpg)\n\n\
    图 5-8. 激活 Anaconda 环境\n\n现在你可以安装 ChainerRL。为此，在终端中输入以下命令：\n\n```\npip install\
    \ chainerrl\n```\n\n图 5-9 显示了安装结果。\n\n![A454310_1_En_5_Fig9_HTML.jpg](img/A454310_1_En_5_Fig9_HTML.jpg)\n\
    \n图 5-9. 安装 ChainerRL\n\n现在你可以 `git clone` 该仓库。使用以下命令：\n\n```\ngit clone https://github.com/chainer/chainerrl.git\n\
    ```\n\n图 5-10 显示了结果。\n\n![A454310_1_En_5_Fig10_HTML.jpg](img/A454310_1_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10. 克隆 ChainerRL\n\n然后进入 `chainerrl` 文件夹，如图 5-11 所示。\n\n![A454310_1_En_5_Fig11_HTML.jpg](img/A454310_1_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11. 进入 `chainerrl` 文件夹\n"
- fmt: "### Pipeline for Using ChainerRL\n\nSince the library is based on Python,\
    \ the obvious language of choice is Python. Follow these steps to set up ChainerRL:\n\
    \n1. Import the `gym`, `numpy`, and supportive `chainerrl` libraries.\n\n```python\n\
    import chainer\nimport chainer.functions as F\nimport chainer.links as L\nimport\
    \ chainerrl\nimport gym\nimport numpy as np\n```\n\nYou have to model an environment\
    \ so that you can use OpenAI Gym (see Figure [5-12](#A454310_1_En_5_Chapter.xhtml#Fig12)).\
    \ The environment has two spaces:\n- Observation space\n- Action space\n\nThey\
    \ must have two methods, `reset` and `step`.\n\n![A454310_1_En_5_Fig12_HTML.jpg](OEBPS/Images/A454310_1_En_5_Fig12_HTML.jpg)\
    \  \nFigure 5-12. How ChainerRL uses state transitions\n\n2. Take a simulation\
    \ environment such as `Cartpole-v0` from the OpenAI simulation environment.\n\n\
    ```python\nenv = gym.make('CartPole-v0')\nprint('observation space:', env.observation_space)\n\
    print('action space:', env.action_space)\nobs = env.reset()\nenv.render()\nprint('initial\
    \ observation:', obs)\naction = env.action_space.sample()\nobs, r, done, info\
    \ = env.step(action)\nprint('next observation:', obs)\nprint('reward:', r)\nprint('done:',\
    \ done)\nprint('info:', info)\n```\n\n3. Now define an agent that will run from\
    \ interactions with the environment. Here, it’s the `QFunction` (`chainer.Chain`)\
    \ class:\n\n```python\ndef __init__(self, obs_size, n_actions, n_hidden_channels=50):\n\
    \    super().__init__(\n        l0=L.Linear(obs_size, n_hidden_channels),\n  \
    \      l1=L.Linear(n_hidden_channels, n_hidden_channels),\n        l2=L.Linear(n_hidden_channels,\
    \ n_actions))\n\ndef __call__(self, x, test=False):\n    \"\"\"\n    Args:\n \
    \       x (ndarray or chainer.Variable): An observation\n        test (bool):\
    \ a flag indicating whether it is in test mode\n    \"\"\"\n    h = F.tanh(self.l0(x))\n\
    \    h = F.tanh(self.l1(h))\n    return chainerrl.action_value.DiscreteActionValue(self.l2(h))\n\
    \nobs_size = env.observation_space.shape[0]\nn_actions = env.action_space.n\n\
    q_func = QFunction(obs_size, n_actions)\n```\n\nWe apply Q learning etc. We start\
    \ with the Agent.\n\n```python\ngamma = 0.95\n\n# Use epsilon-greedy for exploration\n\
    explorer = chainerrl.explorers.ConstantEpsilonGreedy(\n    epsilon=0.3, random_action_func=env.action_space.sample)\n\
