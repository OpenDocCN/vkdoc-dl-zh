    \nFigure 2-35. Running the Python file\n\nThe program is running iterations, as\
    \ shown in Figure [2-36](#A454310_1_En_2_Chapter.xhtml#Fig36).\n\n![A454310_1_En_2_Fig36_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig36_HTML.jpg)\n\
    \nFigure 2-36. As the iteration happens\n\nAs the program and the simulation complete,\
    \ the final result is interpreted as a Q table, where on each step of completing\
