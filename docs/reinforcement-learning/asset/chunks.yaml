    \ Abhishek Nandy and Manisha Biswas Reinforcement Learning `doi.org/10.1007/978-1-4842-3285-9_3`\n\
    \n# 3. OpenAI 基础\n\nAbhishek Nandy^(1 ) and Manisha Biswas² (1) 印度西孟加拉邦加尔各答 Swaranika\
    \ Co-Opt HSG 大楼 HIG L-2/4 室 (2) 印度西孟加拉邦北 24 帕尔加纳区\n\n本章将介绍 OpenAI 的世界，并将其应用于强化学习。首先，我们探讨对强化学习至关重要的环境。我们讨论两个对强化学习有用的支持平台——Google\
    \ DeepMind 和 OpenAI，后者由 Elon Musk 支持。本章将讨论完全开源的 OpenAI，而 Google DeepMind 将在第 6\
    \ 章中讨论。本章首先介绍 OpenAI 的基础知识，然后进行详细描述，并讨论 OpenAI Gym 和 OpenAI Universe 环境。接着，我们介绍在\
    \ Ubuntu 和 Anaconda 发行版上安装 OpenAI Gym 和 OpenAI Universe。最后，我们讨论如何使用 OpenAI Gym\
    \ 和 OpenAI Universe 进行强化学习。\n"
- fmt: "# Getting to Know OpenAI\n\nTo start, you need to access the OpenAI web site\
    \ at [https://openai.com/](https://openai.com/). The web site is shown in Figure\
    \ 3-1. ![A454310_1_En_3_Fig1_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig1_HTML.jpg)\
    \ Figure 3-1. The OpenAI web site\n\nThe OpenAI web site is full of content and\
    \ resources. It has lots of resources for you to learn and research accordingly.\
    \ Let’s see schematically how OpenAI Gym and OpenAI Universe are connected. See\
    \ Figure 3-2. ![A454310_1_En_3_Fig2_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig2_HTML.jpg)\
    \ Figure 3-2. OpenAI Gym and OpenAI Universe\n\nFigure 3-2 shows how OpenAI Gym\
    \ and OpenAI Universe are connected, by using their icons. The OpenAI Gym page\
    \ of the web site is shown in Figure 3-3. ![A454310_1_En_3_Fig3_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig3_HTML.jpg)\
    \ Figure 3-3. OpenAI Gym web site\n\nOpenAI Gym is a toolkit that helps you run\
    \ simulation games and scenarios to apply Reinforcement Learning as well as to\
    \ apply Reinforcement Learning algorithms. It supports teaching agents for doing\
    \ lots of activities, such as playing, walking, etc.\n\nThe OpenAI Universe web\
    \ site is shown in Figure 3-4. ![A454310_1_En_3_Fig4_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig4_HTML.jpg)\
    \ Figure 3-4. The OpenAI Universe web site\n\nOpenAI Universe is a software platform\
    \ that measures and trains an AI’s general intelligence across different kinds\
    \ of games and applications.\n\n# Installing OpenAI Gym and OpenAI Universe\n\n\
    In this section, you learn how to install OpenAI Gym and OpenAI Universe in an\
    \ Ubuntu machine using version 16.04. Go into the Anaconda environment to install\
    \ OpenAI Gym from GitHub. See Figure 3-5. You can clone and install OpenAI Gym\
    \ from GitHub using this command:\n\n```\n$ source activate universe\n(universe)\
    \ $ cd ∼\n(universe) $ git clone https://github.com/openai/gym.git\n(universe)\
    \ $ cd gym\n(universe) $ pip install -e '.[all]'\n```\n\n![A454310_1_En_3_Fig5_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig5_HTML.jpg)\
    \ Figure 3-5. Cloning OpenAI Gym\n\nNow install OpenAI Universe as follows:\n\n\
    ```\n(universe) $ cd ∼\n(universe) $ git clone https://github.com/openai/universe.git\n\
    (universe) $ cd universe\n(universe) $ pip install -e\n```\n\nThe packages are\
    \ being installed. Figure 3-6 shows the cloning process for OpenAI Universe. ![A454310_1_En_3_Fig6_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig6_HTML.jpg)\
    \ Figure 3-6. Cloning OpenAI Universe\n\nThe entire process, with all the important\
    \ files, is downloaded, as shown in Figure 3-7. ![A454310_1_En_3_Fig7_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig7_HTML.jpg)\
    \ Figure 3-7. Important steps of the installation process\n\nThe process installation\
    \ continues, as shown in Figure 3-8. ![A454310_1_En_3_Fig8_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig8_HTML.jpg)\
    \ Figure 3-8. More steps of the installation process\n\nIn the next section, you\
    \ learn how to start working in the OpenAI Gym and OpenAI environment.\n\n# Working\
    \ with OpenAI Gym and OpenAI\n\nThe OpenAI cycle for a sample process is shown\
    \ in Figure 3-9. ![A454310_1_En_3_Fig9_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig9_HTML.jpg)\
    \ Figure 3-9. The basic OpenAI Gym structure\n\nThe process works this way. We\
    \ are dealing with a simple Gym project. The language of choice here is Python,\
    \ but we are more focused on the logic of how an environment is being utilized.\n\
    \n1. We import the Gym library.\n2. We create an instance of the simulation to\
    \ perform using the `make` function.\n3. We reset the simulation so that the condition\
    \ that we are going to apply can be realized.\n4. We do looping and then render.\n\
    \nThe output is a simulated result of the environment using OpenAI Reinforcement\
    \ Learning techniques. The program using Python is shown here, whereby we are\
    \ using the cart-pole simulation example:\n\n```\nimport gym\nenv = gym.make('CartPole-v0')\n\
    env.reset()\nfor _ in range(1000):\n    env.render()\n    env.step(env.action_space.sample())\
    \ # take a random action\n```\n\nThe program that we created runs from the terminal;\
    \ we can also run the program on a jupyter notebook. Jupyter notebook is a special\
    \ place where you can run Python code very easily. To use the properties or the\
    \ file structure of OpenAI, you need to be in the `universe` directory, as shown\
    \ in Figure 3-10. ![A454310_1_En_3_Fig10_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig10_HTML.jpg)\
    \ Figure 3-10. Inside the `universe` directory\n\nTo work with the Gym components,\
    \ you need to get inside the `gym` directory, as shown in Figure 3-11. ![A454310_1_En_3_Fig11_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig11_HTML.jpg)\
    \ Figure 3-11. Inside the `gym` directory\n\nYou then need to open the jupyter\
    \ notebook. Enter this command from the terminal to open the jupyter notebook\
    \ (see Figure 3-12):\n\n```\njupyter notebook\n```\n\n![A454310_1_En_3_Fig12_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig12_HTML.jpg)\
    \ Figure 3-12. Using the jupyter notebook\n\nWhen you issue the command, the jupyter\
    \ notebook engine side-loads essential components so that everything related to\
    \ the jupyter notebook is loaded, as shown in Figure 3-13. ![A454310_1_En_3_Fig13_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig13_HTML.jpg)\
    \ Figure 3-13. The essential components of jupyter notebooks\n\nOnce the jupyter\
    \ notebook is loaded, you will see that the interface has an option for working\
    \ with Python files. The type of distribution you have for Python is shown in\
    \ the interface. Figure 3-14 shows that Python 3 is installed in this case. ![A454310_1_En_3_Fig14_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig14_HTML.jpg)\
    \ Figure 3-14. Opening a new Python file\n\nYou can now start working with the\
    \ Gym interface and start importing Gym libraries, as shown in Figure 3-15. ![A454310_1_En_3_Fig15_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig15_HTML.jpg)\
    \ Figure 3-15. Working with Gym inside the jupyter notebook\n\nThe process continues\
    \ until the program flow is completed. Figure 3-16 shows the process flow. ![A454310_1_En_3_Fig16_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig16_HTML.jpg)\
    \ Figure 3-16. The flow of the program\n\nAfter being reset, the environment shows\
    \ an array, as shown in Figure 3-17. ![A454310_1_En_3_Fig17_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig17_HTML.jpg)\
    \ Figure 3-17. An array is being created\n\nFigure 3-18 shows the simulation.\
    \ The cart-pole shifts by a margin that’s reflected by the array’s values. ![A454310_1_En_3_Fig18_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig18_HTML.jpg)\
    \ Figure 3-18. The simulation in action"
  raw: '## Getting to Know OpenAI


    To start, you need to access the OpenAI web site at [https://openai.com/](https://openai.com/)
    . The web site is shown in Figure [3-1](#A454310_1_En_3_Chapter.xhtml#Fig1). ![A454310_1_En_3_Fig1_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig1_HTML.jpg)
    Figure 3-1. The OpenAI web site The OpenAI web site is full of content and resources.
    It has lots of resources for you to learn and research accordingly. Let’s see
    schematically how OpenAI Gym and OpenAI Universe are connected. See Figure [3-2](#A454310_1_En_3_Chapter.xhtml#Fig2).
    ![A454310_1_En_3_Fig2_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig2_HTML.jpg) Figure
    3-2. OpenAI Gym and OpenAI Universe Figure [3-2](#A454310_1_En_3_Chapter.xhtml#Fig2)
    shows how OpenAI Gym and OpenAI Universe are connected, by using their icons.
    The OpenAI Gym page of the web site is shown in Figure [3-3](#A454310_1_En_3_Chapter.xhtml#Fig3).
    ![A454310_1_En_3_Fig3_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig3_HTML.jpg) Figure
    3-3. OpenAI Gym web site OpenAI Gym is a toolkit that helps you run simulation
    games and scenarios to apply Reinforcement Learning as well as to apply Reinforcement
    Learning algorithms. It supports teaching agents for doing lots of activities,
    such as playing, walking, etc. The OpenAI Universe web site is shown in Figure
    [3-4](#A454310_1_En_3_Chapter.xhtml#Fig4). ![A454310_1_En_3_Fig4_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig4_HTML.jpg)
    Figure 3-4. The OpenAI Universe web site OpenAI Universe is a software platform
    that measures and trains an AI’s general intelligence across different kinds of
    games and applications.


    ## Installing OpenAI Gym and OpenAI Universe


    In this section, you learn how to install OpenAI Gym and OpenAI Universe in an
    Ubuntu machine using version 16.04. Go into the Anaconda environment to install
    OpenAI Gym from GitHub. See Figure [3-5](#A454310_1_En_3_Chapter.xhtml#Fig5).
    You can clone and install OpenAI Gym from GitHub using this command: $ source
    activate universe (universe) $ cd ∼ (universe) $ git clone https://github.com/openai/gym.git
    (universe) $ cd gym (universe) $ pip install -e ''.[all]'' ![A454310_1_En_3_Fig5_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig5_HTML.jpg)
    Figure 3-5. Cloning OpenAI Gym Now install OpenAI Universe as follows: (universe)
    $ cd ∼ (universe) $ git clone https://github.com/openai/universe.git (universe)
    $ cd universe (universe) $ pip install -e The packages are being installed. Figure
    [3-6](#A454310_1_En_3_Chapter.xhtml#Fig6) shows the cloning process for OpenAI
    Universe. ![A454310_1_En_3_Fig6_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig6_HTML.jpg)
    Figure 3-6. Cloning OpenAI Universe The entire process, with all the important
    files, is downloaded, as shown in Figure [3-7](#A454310_1_En_3_Chapter.xhtml#Fig7).
    ![A454310_1_En_3_Fig7_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig7_HTML.jpg) Figure
    3-7. Important steps of the installation process The process installation continues,
    as shown in Figure [3-8](#A454310_1_En_3_Chapter.xhtml#Fig8). ![A454310_1_En_3_Fig8_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig8_HTML.jpg)
    Figure 3-8. More steps of the installation process In the next section, you learn
    how to start working in the OpenAI Gym and OpenAI environment.


    ## Working with OpenAI Gym and OpenAI


    The OpenAI cycle for a sample process is shown in Figure [3-9](#A454310_1_En_3_Chapter.xhtml#Fig9).
    ![A454310_1_En_3_Fig9_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig9_HTML.jpg) Figure
    3-9. The basic OpenAI Gym structure The process works this way. We are dealing
    with a simple Gym project. The language of choice here is Python, but we are more
    focused on the logic of how an environment is being utilized.


    1.  1. We import the Gym library.  

    2.  2. We create an instance of the simulation to perform using the make function.
     

    3.  3. We reset the simulation so that the condition that we are going to apply
    can be realized.  

    4.  4. We do looping and then render.  


    The output is a simulated result of the environment using OpenAI Reinforcement
    Learning techniques. The program using Python is shown here, whereby we are using
    the cart-pole simulation example: import gym  env = gym.make(''CartPole-v0'')
    env.reset() for _ in range(1000): env.render() env.step(env.action_space.sample())
    # take a random action The program that we created runs from the terminal; we
    can also run the program on a jupyter notebook. Jupyter notebook is a special
    place where you can run Python code very easily. To use the properties or the
    file structure of OpenAI, you need to be in the universe directory, as shown in
    Figure [3-10](#A454310_1_En_3_Chapter.xhtml#Fig10). ![A454310_1_En_3_Fig10_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig10_HTML.jpg)
    Figure 3-10. Inside the universe directory To work with the Gym components, you
    need to get inside the gym directory, as shown in Figure [3-11](#A454310_1_En_3_Chapter.xhtml#Fig11).
    ![A454310_1_En_3_Fig11_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig11_HTML.jpg) Figure
    3-11. Inside the gym directory You then need to open the jupyter notebook. Enter
    this command from the terminal to open the jupyter notebook (see Figure [3-12](#A454310_1_En_3_Chapter.xhtml#Fig12)):
    jupyter notebook ![A454310_1_En_3_Fig12_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig12_HTML.jpg)
    Figure 3-12. Using the jupyter notebook When you issue the command, the jupyter
    notebook engine side-loads essential components so that everything related to
    the jupyter notebook is loaded, as shown in Figure [3-13](#A454310_1_En_3_Chapter.xhtml#Fig13).
    ![A454310_1_En_3_Fig13_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig13_HTML.jpg) Figure
    3-13. The essential components of jupyter notebooks Once the jupyter notebook
    is loaded, you will see that the interface has an option for working with Python
    files. The type of distribution you have for Python is shown in the interface.
    Figure [3-14](#A454310_1_En_3_Chapter.xhtml#Fig14) shows that Python 3 is installed
    in this case. ![A454310_1_En_3_Fig14_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig14_HTML.jpg)
    Figure 3-14. Opening a new Python file You can now start working with the Gym
    interface and start importing Gym libraries, as shown in Figure [3-15](#A454310_1_En_3_Chapter.xhtml#Fig15).
    ![A454310_1_En_3_Fig15_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig15_HTML.jpg) Figure
    3-15. Working with Gym inside the jupyter notebook The process continues until
    the program flow is completed. Figure [3-16](#A454310_1_En_3_Chapter.xhtml#Fig16)
    shows the process flow. ![A454310_1_En_3_Fig16_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig16_HTML.jpg)
    Figure 3-16. The flow of the program After being reset, the environment shows
    an array, as shown in Figure [3-17](#A454310_1_En_3_Chapter.xhtml#Fig17). ![A454310_1_En_3_Fig17_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig17_HTML.jpg)
    Figure 3-17. An array is being created Figure [3-18](#A454310_1_En_3_Chapter.xhtml#Fig18)
    shows the simulation. The cart-pole shifts by a margin that’s reflected by the
    array’s values. ![A454310_1_En_3_Fig18_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig18_HTML.jpg)
    Figure 3-18. The simulation in action'
  trans: "\n# 认识 OpenAI\n\n首先，你需要访问 OpenAI 网站 [`openai.com/`](https://openai.com/)。该网站如图\
    \ 3-1 所示。![A454310_1_En_3_Fig1_HTML.jpg](img/A454310_1_En_3_Fig1_HTML.jpg) 图 3-1.\
    \ OpenAI 网站\n\nOpenAI 网站内容丰富，资源众多。它提供了大量资源供你学习和研究。让我们概览一下 OpenAI Gym 和 OpenAI\
    \ Universe 是如何连接的。见图 3-2。![A454310_1_En_3_Fig2_HTML.jpg](img/A454310_1_En_3_Fig2_HTML.jpg)\
    \ 图 3-2. OpenAI Gym 和 OpenAI Universe\n\n图 3-2 通过图标展示了 OpenAI Gym 和 OpenAI Universe\
    \ 的连接方式。该网站的 OpenAI Gym 页面如图 3-3 所示。![A454310_1_En_3_Fig3_HTML.jpg](img/A454310_1_En_3_Fig3_HTML.jpg)\
    \ 图 3-3. OpenAI Gym 网站\n\nOpenAI Gym 是一个工具包，可帮助你运行模拟游戏和场景，以应用强化学习以及强化学习算法。它支持训练智能体执行多种活动，例如玩耍、行走等。\n\
    \nOpenAI Universe 网站如图 3-4 所示。![A454310_1_En_3_Fig4_HTML.jpg](img/A454310_1_En_3_Fig4_HTML.jpg)\
    \ 图 3-4. OpenAI Universe 网站\n\nOpenAI Universe 是一个软件平台，用于衡量和训练 AI 在不同类型游戏和应用中的通用智能。\n\
    \n# 安装 OpenAI Gym 和 OpenAI Universe\n\n在本节中，你将学习如何在运行 Ubuntu 16.04 版本的机器上安装 OpenAI\
    \ Gym 和 OpenAI Universe。进入 Anaconda 环境，从 GitHub 安装 OpenAI Gym。见图 3-5。你可以使用以下命令从\
    \ GitHub 克隆并安装 OpenAI Gym：\n\n```\n$ source activate universe\n(universe) $ cd\
    \ ∼\n(universe) $ git clone https://github.com/openai/gym.git\n(universe) $ cd\
    \ gym\n(universe) $ pip install -e '.[all]'\n```\n\n![A454310_1_En_3_Fig5_HTML.jpg](img/A454310_1_En_3_Fig5_HTML.jpg)\
    \ 图 3-5. 克隆 OpenAI Gym\n\n现在按如下方式安装 OpenAI Universe：\n\n```\n(universe) $ cd ∼\n\
    (universe) $ git clone https://github.com/openai/universe.git\n(universe) $ cd\
    \ universe\n(universe) $ pip install -e\n```\n\n正在安装这些包。图 3-6 展示了 OpenAI Universe\
    \ 的克隆过程。![A454310_1_En_3_Fig6_HTML.jpg](img/A454310_1_En_3_Fig6_HTML.jpg) 图 3-6.\
    \ 克隆 OpenAI Universe\n\n包含所有重要文件的整个流程已下载完成，如图 3-7 所示。![A454310_1_En_3_Fig7_HTML.jpg](img/A454310_1_En_3_Fig7_HTML.jpg)\
    \ 图 3-7. 安装过程的重要步骤\n\n安装过程继续进行，如图 3-8 所示。![A454310_1_En_3_Fig8_HTML.jpg](img/A454310_1_En_3_Fig8_HTML.jpg)\
    \ 图 3-8. 安装过程的更多步骤\n\n在下一节中，你将学习如何开始在 OpenAI Gym 和 OpenAI 环境中工作。\n\n# 使用 OpenAI\
    \ Gym 和 OpenAI\n\n示例过程的 OpenAI 循环如图 3-9 所示。![A454310_1_En_3_Fig9_HTML.jpg](img/A454310_1_En_3_Fig9_HTML.jpg)\
    \ 图 3-9. 基本的 OpenAI Gym 结构\n\n该过程的工作方式如下。我们正在处理一个简单的 Gym 项目。这里选择的语言是 Python，但我们更关注环境如何被使用的逻辑。\n\
    \n1. 我们导入 Gym 库。\n2. 我们使用 `make` 函数创建一个要执行的模拟实例。\n3. 我们重置模拟，以便将要应用的条件得以实现。\n4.\
    \ 我们进行循环，然后渲染。\n\n输出是使用 OpenAI 强化学习技术对环境进行模拟的结果。这里展示了使用 Python 编写的程序，我们使用了小车-杆模拟示例：\n\
    \n```\nimport gym\nenv = gym.make('CartPole-v0')\nenv.reset()\nfor _ in range(1000):\n\
    \    env.render()\n    env.step(env.action_space.sample()) # 执行一个随机动作\n```\n\n\
    我们创建的程序在终端中运行；我们也可以在 jupyter notebook 上运行该程序。Jupyter notebook 是一个可以非常轻松运行 Python\
    \ 代码的特殊环境。要使用 OpenAI 的属性或文件结构，你需要位于 `universe` 目录中，如图 3-10 所示。![A454310_1_En_3_Fig10_HTML.jpg](img/A454310_1_En_3_Fig10_HTML.jpg)\
    \ 图 3-10. 在 `universe` 目录内部\n\n要使用 Gym 组件，你需要进入 `gym` 目录，如图 3-11 所示。![A454310_1_En_3_Fig11_HTML.jpg](img/A454310_1_En_3_Fig11_HTML.jpg)\
    \ 图 3-11. 在 `gym` 目录内部\n\n然后你需要打开 jupyter notebook。在终端中输入以下命令以打开 jupyter notebook（见图\
    \ 3-12）：\n\n```\njupyter notebook\n```\n\n![A454310_1_En_3_Fig12_HTML.jpg](img/A454310_1_En_3_Fig12_HTML.jpg)\
    \ 图 3-12. 使用 jupyter notebook\n\n当你发出该命令时，jupyter notebook 引擎会侧加载基本组件，以便加载所有与\
    \ jupyter notebook 相关的内容，如图 3-13 所示。![A454310_1_En_3_Fig13_HTML.jpg](img/A454310_1_En_3_Fig13_HTML.jpg)\
    \ 图 3-13. jupyter notebook 的基本组件\n\n一旦 jupyter notebook 加载完成，你将看到界面中有一个用于处理 Python\
    \ 文件的选项。界面中会显示你所拥有的 Python 发行版类型。图 3-14 显示在此情况下安装了 Python 3。![A454310_1_En_3_Fig14_HTML.jpg](img/A454310_1_En_3_Fig14_HTML.jpg)\
    \ 图 3-14. 打开一个新的 Python 文件\n\n你现在可以开始使用 Gym 界面，并开始导入 Gym 库，如图 3-15 所示。![A454310_1_En_3_Fig15_HTML.jpg](img/A454310_1_En_3_Fig15_HTML.jpg)\
    \ 图 3-15. 在 jupyter notebook 中使用 Gym\n\n该过程持续进行，直到程序流程完成。图 3-16 展示了流程。![A454310_1_En_3_Fig16_HTML.jpg](img/A454310_1_En_3_Fig16_HTML.jpg)\
    \ 图 3-16. 程序的流程\n\n重置后，环境会显示一个数组，如图 3-17 所示。![A454310_1_En_3_Fig17_HTML.jpg](img/A454310_1_En_3_Fig17_HTML.jpg)\
    \ 图 3-17. 正在创建一个数组\n\n图 3-18 展示了模拟过程。小车-杆移动的幅度由数组的值反映出来。![A454310_1_En_3_Fig18_HTML.jpg](img/A454310_1_En_3_Fig18_HTML.jpg)\
    \ 图 3-18. 模拟进行中\n"
- fmt: "# More Simulations\n\nThis section shows you how to try different simulations.\
    \ There are many different environment types in OpenAI. One of them is the logarithmic\
    \ type, discussed next. There is variety of tasks involved in algorithms. Run\
    \ this code to include the environment in the jupyter notebook (see Figure [3-19](#A454310_1_En_3_Chapter.xhtml#Fig19)):\n\
    \n```\nimport gym\nenv = gym.make('Copy-v0')\nenv.reset()\nenv.render()\n```\n\
    \n![A454310_1_En_3_Fig19_HTML.jpg](OEBPS/Images/A454310_1_En_3_Fig19_HTML.jpg)\n\
