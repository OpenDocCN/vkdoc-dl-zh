- fmt: "To create the process from which the computer learns, we have to formulate\
    \ a table. This process is known as Q Learning and the table is called a Q table\
    \ (You will learn more about Q Learning in the next chapter.) All the key elements\
    \ are stored in the Q table and all the decisions are made based on the Q table.\n\
    \n```\ndef build_q_table(n_states, actions):\n    table = pd.DataFrame(\n    \
    \    np.zeros((n_states, len(actions))),     # q_table initial values\n      \
    \  columns=actions,    # actions's name\n    )\n    # print(table)    # show table\n\
    \    return table\n```\n\nNow we have to take actions. To do so, we use this code:\n\
    \n```\ndef choose_action(state, q_table):\n    # This is how to choose an action\n\
    \    state_actions = q_table.iloc[state, :]\n    if (np.random.uniform() > EPSILON)\
    \ or (state_actions.all() == 0):  # act non-greedy or state-action have no value\n\
    \        action_name = np.random.choice(ACTIONS)\n    else:   # act greedy\n \
    \       action_name = state_actions.argmax()\n    return action_name\n```\n\n\
    Now we create the environment and determine how the agents will work within the\
    \ environment:\n\n```\ndef get_env_feedback(S, A):\n    # This is how the agent\
    \ will interact with the environment\n    if A == 'right':    # move right\n \
    \       if S == N_STATES - 2:   # terminate\n            S_ = 'terminal'\n   \
    \         R = 1\n        else:\n            S_ = S + 1\n            R = 0\n  \
    \  else:   # move left\n        R = 0\n        if S == 0:\n            S_ = S\
    \  # reach the wall\n        else:\n            S_ = S - 1\n    return S_, R\n\
    ```\n\nThis function prints the wanderer and treasure hunt conditions:\n\n```\n\
    def update_env(S, episode, step_counter):\n    # This is how the environment be\
    \ updated\n    env_list = ['-']*(N_STATES-1) + ['T']   # '---------T' our environment\n\
    \    if S == 'terminal':\n        interaction = 'Episode %s: total_steps = %s'\
    \ % (episode+1, step_counter)\n        print('\\r{}'.format(interaction), end='')\n\
    \        time.sleep(2)\n        print('\\r                                ', end='')\n\
    \    else:\n        env_list[S] = 'o'\n        interaction = ''.join(env_list)\n\
    \        print('\\r{}'.format(interaction), end='')\n        time.sleep(FRESH_TIME)\n\
    ```\n\nThe `rl()` method calls the Q Learning scenario, which we discuss in next\
    \ chapter:\n\n```\ndef rl():\n    # main part of RL loop\n    q_table = build_q_table(N_STATES,\
    \ ACTIONS)\n    for episode in range(MAX_EPISODES):\n        step_counter = 0\n\
    \        S = 0\n        is_terminated = False\n        update_env(S, episode,\
    \ step_counter)\n        while not is_terminated:\n            A = choose_action(S,\
    \ q_table)\n            S_, R = get_env_feedback(S, A)  # take action & get next\
    \ state and reward\n            q_predict = q_table.ix[S, A]\n            if S_\
    \ != 'terminal':\n                q_target = R + GAMMA * q_table.iloc[S_, :].max()\
    \   # next state is not terminal\n            else:\n                q_target\
    \ = R     # next state is terminal\n                is_terminated = True    #\
    \ terminate this episode\n            q_table.ix[S, A] += ALPHA * (q_target -\
    \ q_predict)  # update\n            S = S_  # move to next state\n           \
    \ update_env(S, episode, step_counter+1)\n            step_counter += 1\n    return\
    \ q_table\n\nif __name__ == \"__main__\":\n    q_table = rl()\n    print('\\r\\\
    nQ-table:\\n')\n    print(q_table)\n```\n\nThe full code looks like this:\n\n\
    ```\nimport numpy as np\nimport pandas as pd\nimport time\n\nnp.random.seed(2)\
    \  # reproducible\n\nN_STATES = 6   # the length of the 1 dimensional world\n\
    ACTIONS = ['left', 'right']     # available actions\nEPSILON = 0.9   # greedy\
    \ police\nALPHA = 0.1     # learning rate\nGAMMA = 0.9    # discount factor\n\
    MAX_EPISODES = 13   # maximum episodes\nFRESH_TIME = 0.3    # fresh time for one\
    \ move\n\ndef build_q_table(n_states, actions):\n    table = pd.DataFrame(\n \
    \       np.zeros((n_states, len(actions))),     # q_table initial values\n   \
    \     columns=actions,    # actions's name\n    )\n    # print(table)    # show\
    \ table\n    return table\n\ndef choose_action(state, q_table):\n    # This is\
    \ how to choose an action\n    state_actions = q_table.iloc[state, :]\n    if\
    \ (np.random.uniform() > EPSILON) or (state_actions.all() == 0):  # act non-greedy\
    \ or state-action have no value\n        action_name = np.random.choice(ACTIONS)\n\
    \    else:   # act greedy\n        action_name = state_actions.argmax()\n    return\
    \ action_name\n\ndef get_env_feedback(S, A):\n    # This is how agent will interact\
    \ with the environment\n    if A == 'right':    # move right\n        if S ==\
    \ N_STATES - 2:   # terminate\n            S_ = 'terminal'\n            R = 1\n\
    \        else:\n            S_ = S + 1\n            R = 0\n    else:   # move\
    \ left\n        R = 0\n        if S == 0:\n            S_ = S  # reach the wall\n\
    \        else:\n            S_ = S - 1\n    return S_, R\n\ndef update_env(S,\
    \ episode, step_counter):\n    # This is how environment be updated\n    env_list\
    \ = ['-']*(N_STATES-1) + ['T']   # '---------T' our environment\n    if S == 'terminal':\n\
    \        interaction = 'Episode %s: total_steps = %s' % (episode+1, step_counter)\n\
    \        print('\\r{}'.format(interaction), end='')\n        time.sleep(2)\n \
    \       print('\\r                                ', end='')\n    else:\n    \
    \    env_list[S] = 'o'\n        interaction = ''.join(env_list)\n        print('\\\
    r{}'.format(interaction), end='')\n        time.sleep(FRESH_TIME)\n\ndef rl():\n\
    \    # main part of RL loop\n    q_table = build_q_table(N_STATES, ACTIONS)\n\
    \    for episode in range(MAX_EPISODES):\n        step_counter = 0\n        S\
    \ = 0\n        is_terminated = False\n        update_env(S, episode, step_counter)\n\
    \        while not is_terminated:\n            A = choose_action(S, q_table)\n\
    \            S_, R = get_env_feedback(S, A)  # take action & get next state and\
    \ reward\n            q_predict = q_table.ix[S, A]\n            if S_ != 'terminal':\n\
    \                q_target = R + GAMMA * q_table.iloc[S_, :].max()   # next state\
    \ is not terminal\n            else:\n                q_target = R     # next\
    \ state is terminal\n                is_terminated = True    # terminate this\
    \ episode\n            q_table.ix[S, A] += ALPHA * (q_target - q_predict)  # update\n\
    \            S = S_  # move to next state\n            update_env(S, episode,\
    \ step_counter+1)\n            step_counter += 1\n    return q_table\n\nif __name__\
    \ == \"__main__\":\n    q_table = rl()\n    print('\\r\\nQ-table:\\n')\n    print(q_table)\n\
    ```\n\nLet’s now run the program and analyze the output. You need to get inside\
    \ the cloned GitHub repo and into the required folder, as shown in Figure [2-33](#A454310_1_En_2_Chapter.xhtml#Fig33).\n\
    \n![A454310_1_En_2_Fig33_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig33_HTML.jpg)\n\
    \nFigure 2-33. Getting inside the cloned repo\n\nNow you need to get inside the\
