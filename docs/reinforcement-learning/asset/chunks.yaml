    \ for more information.\n>>>\n```\n\n当我们开始构建重要的库时，如果这些库尚未创建，Python 会缓存它们，如图 4-23\
    \ 所示。![A454310_1_En_4_Fig23_HTML.jpg](img/A454310_1_En_4_Fig23_HTML.jpg) 图 4-23.\
    \ 正在创建缓存\n\nPython 程序的完整流程如下：\n\n```\npython\nPython 3.5.3 |Anaconda custom (64-bit)|\
    \ (default, Mar  6 2017, 11:58:13) \n[GCC 4.4.7 20120313 (Red Hat 4.4.7-1)] on\
