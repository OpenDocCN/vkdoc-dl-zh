    \ Figure [2-37](#A454310_1_En_2_Chapter.xhtml#Fig37) shows the completed Q table.\n\
    \n![A454310_1_En_2_Fig37_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig37_HTML.jpg)\n\
