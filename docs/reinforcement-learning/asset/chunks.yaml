    ## An Example of Reinforcement Learning with Python


    This section goes through an example of Reinforcement Learning and explains the
    flow of the algorithm. You’ll see how Reinforcement Learning can be applied. This
    section uses an open source GitHub repo that has a very good example of Reinforcement
    Learning. You will need to clone it to work with it. The GitHub repo link is [https://github.com/MorvanZhou/Reinforcement-learning-with-tensorflow](https://github.com/MorvanZhou/Reinforcement-learning-with-tensorflow)
    . Within the Ubuntu module, get inside the terminal and start cloning the repo,
    as shown in Figure [2-30](#A454310_1_En_2_Chapter.xhtml#Fig30). ![A454310_1_En_2_Fig30_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig30_HTML.jpg)
    Figure 2-30. Cloning the repo Figure [2-31](#A454310_1_En_2_Chapter.xhtml#Fig31)
    shows how the repo is replicated. ![A454310_1_En_2_Fig31_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig31_HTML.jpg)
    Figure 2-31. Replication of the repo You will next get inside the folder that
    you used, as shown in Figure [2-32](#A454310_1_En_2_Chapter.xhtml#Fig32). ![A454310_1_En_2_Fig32_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig32_HTML.jpg)
    Figure 2-32. Getting inside the folder We are working with a scenario of Reinforcement
    Learning where we are applying the letter O as a wanderer. That wanderer wants
    to get the treasure T as fast as it can. The condition looks like this: O-----T
    The wanderer tries to find the quickest path to reach the treasure. During each
    episode, the steps the wanderer takes to reach the treasure are counted. With
    each episode, the condition improves and the number of steps declines. Here are
    some of the basic steps in terms of Reinforcement Learning:


    *   The program tries to work with actions, as actions are very important in terms
    of Reinforcement Learning.

    *   The available actions for this wanderer is moving left or right: ACTIONS =
    [''left'',''right'']

    *   The wanderer can be considered the agent.

    *   The number of states (also called the number of steps) is limited to 6 in
    this example: N_States = 6;


    Now you need to apply hyperparameters for Reinforcement Learning.


    ### What Are Hyperparameters ?


    Hyperparameters are variables that were set before setting the model’s parameters.
    Generally, they are different from the parameters of the model for the underlying
    system under analysis. We introduce epsilon, alpha, and gamma.


    *   Epsilon is the greedy factor

    *   Alpha is the learning rate

    *   Gamma is the discount factor


    The maximum number of episodes in this case is 13\. The refresh rate is when the
    scenario is refreshed.


