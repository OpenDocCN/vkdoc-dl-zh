    import single_obj as fx Next, you need to declare these hyperparameters: >>> options
    = {''c1'': 0.5, ''c2'': 0.3, ''w'':0.9} In this case, we are configuring the swarm
    as a dictionary, so call it a dictionary. In the next step, you create the instance
    of the optimizer by passing the dictionary with the necessary arguments. >>> optimizer
    = ps.single.GlobalBestPSO(n_particles=10, dimensions=2, options=options) After
    that, call the optimizer method and store the optimal cost and position after
    optimization. Figure [4-27](#A454310_1_En_4_Chapter.xhtml#Fig27) shows the results.
    ![A454310_1_En_4_Fig27_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig27_HTML.jpg) Figure
    4-27. Showing the result After going through the results, you can see that optimizer
