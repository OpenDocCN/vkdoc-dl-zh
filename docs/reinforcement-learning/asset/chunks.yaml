  trans: "\n回顾一下，`SARSA`是一种同策略强化学习方法。例如，`SARSA`可用于解决迷宫问题。使用`SARSA`方法时，我们无法比较两个不同的迷宫环境。必须坚持使用同一个迷宫，我们以前者为例。同样，我们也不能将这个迷宫与外部其他迷宫进行比较；必须专注于当前正在处理的迷宫。`SARSA`最大的优点在于，它可以从当前状态与下一个状态或后续状态的比较中进行学习。我们积累所有经验并从中学习。\n\
    \n让我们进一步分解这个想法。该场景表明，可以通过比较后续步骤中的变化，然后在`Q`表上进行更新并做出决策。图 2-55 展示了这一想法。![A454310_1_En_2_Fig55_HTML.jpg](img/A454310_1_En_2_Fig55_HTML.jpg)\
    \ 图 2-55. 使用 SARSA 表更新结果\n\n`SARSA`在 Python 中的学习方法有所不同。它看起来像这样：`def learn(self,\
    \ s, a, r, s_, a_)`。此方法依赖于状态、动作、奖励、下一个状态和下一个动作。如果我们比较该算法并将其转换为 Python，该方程式的构造如图\
    \ 2-56 所示。![A454310_1_En_2_Fig56_HTML.jpg](img/A454310_1_En_2_Fig56_HTML.jpg)\
    \ 图 2-56. SARSA 方程\n\n它被转换为以下代码：`q_target = r + self.gamma * self.q_table.ix [s_,\
    \ a_]`。该方程与 Q 学习的区别在于此方程的变化：`q_target = r + self.gamma * self.q_table.ix [s_,\
    \ :].max()`。`max()`值存在于 Q 学习中，但`SARSA`中没有。\n\n使用`SARSA`实现策略的逻辑如下所示：\n\n```python\n\
    # on-policy\nclass SarsaTable(RL):\n    def __init__(self, actions, learning_rate=0.01,\
    \ reward_decay=0.9, e_greedy=0.9):\n        super(SarsaTable, self).__init__(actions,\
    \ learning_rate, reward_decay, e_greedy)\n\n    def learn(self, s, a, r, s_, a_):\n\
    \        self.check_state_exist(s_)\n        q_predict = self.q_table.ix[s, a]\n\
    \        if s_ != 'terminal':\n            q_target = r + self.gamma * self.q_table.ix[s_,\
    \ a_]  # next state is not terminal\n        else:\n            q_target = r \
    \ # next state is terminal\n        self.q_table.ix[s, a] += self.lr * (q_target\
    \ - q_predict)  # update\n```\n\n学习过程与 Q 学习有些不同。其逻辑遵循前面讨论的原则。我们将当前状态和动作与下一个状态和下一个动作结合起来。这反过来更新了`Q`表。这就是学习的工作方式。\n\
    \n```python\ndef update():\n    for episode in range(100):\n        # initial\
