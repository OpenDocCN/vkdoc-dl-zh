    \     if s[0] < (MAZE_W - 1) * UNIT:\n                base_action[0] += UNIT\n\
    \        elif action == 3:   # left\n            if s[0] > UNIT:\n           \
    \     base_action[0] -= UNIT\n        self.canvas.move(self.rect, base_action[0],\
    \ base_action[1])  # move agent\n        s_ = self.canvas.coords(self.rect)  #\
    \ next state\n        # reward function\n        if s_ == self.canvas.coords(self.oval):\n\
    \            reward = 1\n            done = True\n        elif s_ in [self.canvas.coords(self.hell1),\
    \ self.canvas.coords(self.hell2)]:\n            reward = -1\n            done\
    \ = True\n        else:\n            reward = 0\n            done = False\n  \
    \      return s_, reward, done\n\n    def render(self):\n        time.sleep(0.1)\n\
    \        self.update()\n```\n\n### Python 中的完整强化学习逻辑\n"
- fmt: "When you are implementing the algorithm in Python, the structure looks like\
    \ the following. The content is in the repo.\n\n```python\nimport numpy as np\n\
    import pandas as pd\n\nclass RL(object):\n    def __init__(self, action_space,\
    \ learning_rate=0.01, reward_decay=0.9, e_greedy=0.9):\n        self.actions =\
    \ action_space  # a list\n        self.lr = learning_rate\n        self.gamma\
    \ = reward_decay\n        self.epsilon = e_greedy\n        self.q_table = pd.DataFrame(columns=self.actions)\n\
    \n    def check_state_exist(self, state):\n        if state not in self.q_table.index:\n\
    \            # append new state to q table\n            self.q_table = self.q_table.append(\n\
    \                pd.Series(\n                    [0]*len(self.actions),\n    \
    \                index=self.q_table.columns,\n                    name=state,\n\
    \                )\n            )\n\n    def choose_action(self, observation):\n\
    \        self.check_state_exist(observation)\n        # action selection\n   \
    \     if np.random.rand() < self.epsilon:\n            # choose best action\n\
    \            state_action = self.q_table.ix[observation, :]\n            state_action\
    \ = state_action.reindex(np.random.permutation(state_action.index))     # some\
    \ actions have the same value\n            action = state_action.argmax()\n  \
    \      else:\n            # choose random action\n            action = np.random.choice(self.actions)\n\
    \        return action\n\n    def learn(self, *args):\n        Pass\n\n# off-policy\n\
    class QLearningTable(RL):\n    def __init__(self, actions, learning_rate=0.01,\
    \ reward_decay=0.9, e_greedy=0.9):\n        super(QLearningTable, self).__init__(actions,\
    \ learning_rate, reward_decay, e_greedy)\n\n    def learn(self, s, a, r, s_):\n\
    \        self.check_state_exist(s_)\n        q_predict = self.q_table.ix[s, a]\n\
    \        if s_ != 'terminal':\n            q_target = r + self.gamma * self.q_table.ix[s_,\
    \ :].max()  # next state is not terminal\n        else:\n            q_target\
    \ = r  # next state is terminal\n        self.q_table.ix[s, a] += self.lr * (q_target\
    \ - q_predict)  # update\n\n# on-policy\nclass SarsaTable(RL):\n    def __init__(self,\
    \ actions, learning_rate=0.01, reward_decay=0.9, e_greedy=0.9):\n        super(SarsaTable,\
    \ self).__init__(actions, learning_rate, reward_decay, e_greedy)\n\n    def learn(self,\
    \ s, a, r, s_, a_):\n        self.check_state_exist(s_)\n        q_predict = self.q_table.ix[s,\
    \ a]\n        if s_ != 'terminal':\n            q_target = r + self.gamma * self.q_table.ix[s_,\
    \ a_]  # next state is not terminal\n        else:\n            q_target = r \
    \ # next state is terminal\n        self.q_table.ix[s, a] += self.lr * (q_target\
    \ - q_predict)  # update\n```\n\nThe learning process in its entirety looks like\
    \ this in the code (`RL_brain.py`):\n\n```python\nfrom maze_env import Maze\n\
    from RL_brain import SarsaTable\n\ndef update():\n    for episode in range(100):\n\
    \        # initial observation\n        observation = env.reset()\n        # RL\
    \ choose action based on observation\n        action = RL.choose_action(str(observation))\n\
    \        while True:\n            # fresh env\n            env.render()\n    \
    \        # RL take action and get next observation and reward\n            observation_,\
    \ reward, done = env.step(action)\n            # RL choose action based on next\
    \ observation\n            action_ = RL.choose_action(str(observation_))\n   \
    \         # RL learn from this transition (s, a, r, s, a) ==> Sarsa\n        \
    \    RL.learn(str(observation), action, reward, str(observation_), action_)\n\
    \            # swap observation and action\n            observation = observation_\n\
    \            action = action_\n            # break while loop when end of this\
    \ episode\n            if done:\n                break\n    # end of game\n  \
    \  print('game over')\n    env.destroy()\n\nif __name__ == \"__main__\":\n   \
    \ env = Maze()\n    RL = SarsaTable(actions=list(range(env.n_actions)))\n    env.after(100,\
    \ update)\n    env.mainloop()\n```\n\nLet’s run the program and check it. You\
    \ can do this in the Anaconda environment, as shown in Figure [2-57](#A454310_1_En_2_Chapter.xhtml#Fig57).\n\
    \n![A454310_1_En_2_Fig57_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig57_HTML.jpg)\n\
    \nFigure 2-57. Activating the environment\n\nYou then have to consider the SARSA\
    \ maze, as shown in Figure [2-58](#A454310_1_En_2_Chapter.xhtml#Fig58).\n\n![A454310_1_En_2_Fig58_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig58_HTML.jpg)\n\
    \nFigure 2-58. Considering the SARSA maze\n\nNow you have to call the `run_this.py`\
    \ file to get the program running, as shown in Figure [2-59](#A454310_1_En_2_Chapter.xhtml#Fig59).\n\
    \n![A454310_1_En_2_Fig59_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig59_HTML.jpg)\n\
    \nFigure 2-59. Running `run_this.py`\n\nTo run the program from the terminal,\
    \ use this command: `python run_this.py`\n\nAfter running the code, the program\
    \ will play the maze, as shown in Figure [2-60](#A454310_1_En_2_Chapter.xhtml#Fig60).\n\
    \n![A454310_1_En_2_Fig60_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig60_HTML.jpg)\n\
    \nFigure 2-60. The program playing maze\n\n## Dynamic Programming in Reinforcement\
    \ Learning\n\nProblems that are sequential or temporal can be solved using dynamic\
    \ programming. If you have a complex problem, you have to break it down into subproblems.\
    \ Dynamic programming is the process of breaking a problem into subproblems, solving\
    \ those subproblems, and finally combining them to solve the overall problem.\
    \ The optimal substructure and the principle of optimality apply. The solution\
    \ can be cached and reused. See Figure [2-61](#A454310_1_En_2_Chapter.xhtml#Fig61).\n\
    \n![A454310_1_En_2_Fig61_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig61_HTML.jpg)\n\
    \nFigure 2-61. Dynamic problem-solving approach\n\n## Conclusion\n\nThis chapter\
    \ went through different algorithms related to Reinforcement Learning. You also\
    \ saw a simple example of Reinforcement Learning using Python. You then learned\
    \ about SARSA with the help of an example in Python. The chapter ended by discussing\
    \ dynamic programming basics.© Abhishek Nandy and Manisha Biswas 2018 Abhishek\
    \ Nandy and Manisha Biswas Reinforcement Learning [https://doi.org/10.1007/978-1-4842-3285-9_3](#A454310_1_En_3_Chapter.xhtml)\n\
    \n# 3. OpenAI Basics\n\nAbhishek Nandy^(1 ) and Manisha Biswas² (1) Rm HIG L-2/4,\
    \ Bldg Swaranika Co-Opt HSG, Kolkata, West Bengal, India (2) North 24 Parganas,\
    \ West Bengal, India\n\nThis chapter introduces the world of OpenAI and uses it\
    \ in relation to Reinforcement Learning. First, we go through environments that\
    \ are important to Reinforcement Learning. We talk about two supportive platforms\
    \ that are useful for Reinforcement Learning—Google DeepMind and OpenAI, the latter\
    \ of which is supported by Elon Musk. The completely open sourced OpenAI is discussed\
    \ in this chapter and Google DeepMind is discussed in Chapter [6](#A454310_1_En_6_Chapter.xhtml).\
    \ The chapter first covers OpenAI basics and then moves toward describing them\
    \ and discusses the OpenAI Gym and OpenAI Universe environments. Then we cover\
    \ installing OpenAI Gym and OpenAI Universe on the Ubuntu and Anaconda distributions.\
    \ Finally, we discuss using OpenAI Gym and OpenAI Universe for the purpose of\
    \ Reinforcement Learning."
