    \    if S == 'terminal':\n        interaction = 'Episode %s: total_steps = %s'\
    \ % (episode+1, step_counter)\n        print('\\r{}'.format(interaction), end='')\n\
    \        time.sleep(2)\n        print('\\r                                ', end='')\n\
    \    else:\n        env_list[S] = 'o'\n        interaction = ''.join(env_list)\n\
    \        print('\\r{}'.format(interaction), end='')\n        time.sleep(FRESH_TIME)\n\
    ```\n\n`rl()` 方法调用 Q 学习场景，我们将在下一章中讨论：\n\n```\ndef rl():\n    # main part of RL\
    \ loop\n    q_table = build_q_table(N_STATES, ACTIONS)\n    for episode in range(MAX_EPISODES):\n\
    \        step_counter = 0\n        S = 0\n        is_terminated = False\n    \
    \    update_env(S, episode, step_counter)\n        while not is_terminated:\n\
    \            A = choose_action(S, q_table)\n            S_, R = get_env_feedback(S,\
    \ A)  # take action & get next state and reward\n            q_predict = q_table.ix[S,\
    \ A]\n            if S_ != 'terminal':\n                q_target = R + GAMMA *\
    \ q_table.iloc[S_, :].max()   # next state is not terminal\n            else:\n\
    \                q_target = R     # next state is terminal\n                is_terminated\
    \ = True    # terminate this episode\n            q_table.ix[S, A] += ALPHA *\
    \ (q_target - q_predict)  # update\n            S = S_  # move to next state\n\
    \            update_env(S, episode, step_counter+1)\n            step_counter\
    \ += 1\n    return q_table\n\nif __name__ == \"__main__\":\n    q_table = rl()\n\
    \    print('\\r\\nQ-table:\\n')\n    print(q_table)\n```\n\n完整的代码如下所示：\n\n```\n\
    import numpy as np\nimport pandas as pd\nimport time\n\nnp.random.seed(2)  # reproducible\n\
    \nN_STATES = 6   # the length of the 1 dimensional world\nACTIONS = ['left', 'right']\
    \     # available actions\nEPSILON = 0.9   # greedy police\nALPHA = 0.1     #\
    \ learning rate\nGAMMA = 0.9    # discount factor\nMAX_EPISODES = 13   # maximum\
    \ episodes\nFRESH_TIME = 0.3    # fresh time for one move\n\ndef build_q_table(n_states,\
