    \ python\nPython 3.5.3 |Anaconda custom (64-bit)| (default, Mar  6 2017, 11:58:13)\n\
    [GCC 4.4.7 20120313 (Red Hat 4.4.7-1)] on linux\nType \"help\", \"copyright\"\
    , \"credits\" or \"license\" for more information.\n>>>\n```\n\n![A454310_1_En_5_Fig20_HTML.jpg](img/A454310_1_En_5_Fig20_HTML.jpg)\
    \  \n图 5-20. 切换到 Python 模式\n\n当你切换到 Python 模式时，首先导入工具：\n\n```python\nimport gym\n\
    import numpy as np\n```\n\n为了在冰冻湖模拟中获取观测值，你需要按如下方式构建 Q 表：\n\n```python\nQ = np.zeros([env.observation_space.n,\
    \ env.action_space.n])\n```\n\n之后，声明学习率并创建列表以包含每个状态的奖励。\n\n```python\nimport gym\n\
    import numpy as np\n\nenv = gym.make('FrozenLake-v0')\n\n# 用全零初始化表格\nQ = np.zeros([env.observation_space.n,\
    \ env.action_space.n])\n\n# 设置学习参数\nlr = .8\ny = .95\nnum_episodes = 2000\n\n\
    # 创建列表以包含每幕的总奖励和步数\n# jList = []\nrList = []\n\nfor i in range(num_episodes):\n\
    \    # 重置环境并获取第一个新观测值\n    s = env.reset()\n    rAll = 0\n    d = False\n    j\
    \ = 0\n    # Q-表学习算法\n    while j < 99:\n        j += 1\n        # 通过贪婪（带噪声）从\
    \ Q 表中选择一个动作\n        a = np.argmax(Q[s, :] + np.random.randn(1, env.action_space.n)\
    \ * (1. / (i + 1)))\n        # 从环境获取新状态和奖励\n        s1, r, d, _ = env.step(a)\n\
    \        # 用新知识更新 Q-表\n        Q[s, a] = Q[s, a] + lr * (r + y * np.max(Q[s1,\
    \ :]) - Q[s, a])\n        rAll += r\n        s = s1\n        if d == True:\n \
    \           break\n    # jList.append(j)\n    rList.append(rAll)\n\nprint(\"Score\
    \ over time: \" + str(sum(rList) / num_episodes))\nprint(\"Final Q-Table Values\"\
    )\nprint(Q)\n```\n\n完成所有步骤后，你最终可以打印 Q 表。每一行都应放入 Python 模式。\n\n## 深度 Q 学习：使用 Keras\
    \ 和 TensorFlow\n\n我们将涉及使用 Keras 的深度 Q 学习。我们将克隆一个重要的强化学习库，即 `Keras-rl`。它包含深度 Q\
    \ 学习算法的多种状态。见图 5-21。\n\n![A454310_1_En_5_Fig21_HTML.jpg](img/A454310_1_En_5_Fig21_HTML.jpg)\
    \  \n图 5-21. Keras-rl 表示\n\n### 安装 Keras-rl\n\n安装 `Keras-rl` 的命令如下（见图 5-22）：\n\
    \n```\npip install keras-rl\n```\n\n![A454310_1_En_5_Fig22_HTML.jpg](img/A454310_1_En_5_Fig22_HTML.jpg)\
    \  \n图 5-22. 安装 Keras-rl\n\n如果尚未安装 `h5py`，你还需要安装它，然后克隆仓库，如图 5-23 所示。\n\n![A454310_1_En_5_Fig23_HTML.jpg](img/A454310_1_En_5_Fig23_HTML.jpg)\
    \  \n图 5-23. 克隆 git 仓库\n\n### 使用 Keras-rl 进行训练\n"
- fmt: "You will see how to run a program in this section. First, get inside the `rl`\
    \ folder, as shown in Figure [5-24](#A454310_1_En_5_Chapter.xhtml#Fig24).\n\n\
    ```\nabhi@ubuntu:∼$ cd keras-rl\nabhi@ubuntu:∼/keras-rl$ dir\nassets  examples\
    \           LICENSE     pytest.ini  rl         setup.py\ndocs    ISSUE_TEMPLATE.md\
