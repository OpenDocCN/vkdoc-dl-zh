    \ A * np.cos(2 * math.pi * x)) for x in X])\n...\n>>> if __name__ == '__main__':\n\
    ...     X = np.linspace(-4, 4, 200)\n...     Y = np.linspace(-4, 4, 200)\n...\n\
    >>>     X, Y = np.meshgrid(X, Y)\n  File \"<stdin>\", line 1\n    X, Y = np.meshgrid(X,\
    \ Y)\n    ^\nIndentationError: unexpected indent\n>>>\n>>>     Z = rastrigin(X,\
    \ Y, A=10)\n  File \"<stdin>\", line 1\n    Z = rastrigin(X, Y, A=10)\n    ^\n\
    IndentationError: unexpected indent\n>>>\n>>>     fig = plt.figure()\n  File \"\
    <stdin>\", line 1\n    fig = plt.figure()\n    ^\nIndentationError: unexpected\
    \ indent\n>>>     ax = fig.gca(projection='3d')\n  File \"<stdin>\", line 1\n\
    \    ax = fig.gca(projection='3d')\n    ^\nIndentationError: unexpected indent\n\
    >>>\n>>>     ax.plot_surface(X, Y, Z, rstride=1, cstride=1, cmap=cm.plasma, linewidth=0,\
