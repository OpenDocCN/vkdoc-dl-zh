    3.  3. From the starting market share, the detergent Rin has a market value of
    20%.  

    4.  4. From the starting point A, we focus on the transition probability matrix.


    There is a 90% probability of staying on A, so the other 10% change to the alternate
    path (to A¢). Figure [2-44](#A454310_1_En_2_Chapter.xhtml#Fig44) shows this path
    calculation graphically . ![A454310_1_En_2_Fig44_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig44_HTML.jpg)
    Figure 2-44. Path calculation The total path probability is determined as so:
    P = .2 *.9 + .8*.7  = .18 + .56  = .74. This is the percentage of people using
    Rin after one week. This formula can also be conceptualized as the current market
    share (SO) and transition probability (P): S0 * P = market share after one week
    See Figure [2-45](#A454310_1_En_2_Chapter.xhtml#Fig45). ![A454310_1_En_2_Fig45_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig45_HTML.jpg)
    Figure 2-45. The matrix created for the next week The calculation is .2 * .9 +
    .8*.7 = .74 .2*.1 + .8*.3 =.26 [ .74 .26 ] = S1 Let’s work on a first state matrix.
    After one week, the sale of Rin detergent is 74% of the market. The other brands
    then make up 26% of the market. Now try to find the percentage of people using
    Rin detergent after two weeks. Figure [2-46](#A454310_1_En_2_Chapter.xhtml#Fig46)
    shows the calculation that we need to do after two weeks. ![A454310_1_En_2_Fig46_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig46_HTML.jpg)
    Figure 2-46. The next transition matrix So the result is: A   A’ = [ .848 .152
    ] After two weeks, 84.8% of the people will use Rin and 15.2% will use other detergents.
    One question you might have is whether the sale of Rin will ever maximize to 100%
    of the market. As we go along, the matrix will become stationary after a certain
    number of iterations and finally settle at: A  A’ = [ .75 .25] After going through
    the basics of the Markov state and the Markov Chain, it’s time to focus on MDPs
    again.


    ### MDPs


    Almost all Reinforcement Learning problems can be formalized as MDPs. MDPs create
    a condition that’s prevalent for applying Reinforcement Learning. The essentials
    of MDPs are a continued Markov process. A state (St) is Markov if and only if
    it meets the criteria shown in Figure [2-47](#A454310_1_En_2_Chapter.xhtml#Fig47).
    ![A454310_1_En_2_Fig47_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig47_HTML.jpg) Figure
    2-47. The Markov state property The state captures all relevant information from
    the history. We do not have to retain everything in history because only the previous
    state determines what will happen now. For a Markov state (s) and successor state
    (s’), the state transition probability is defined in Figure [2-48](#A454310_1_En_2_Chapter.xhtml#Fig48).
    ![A454310_1_En_2_Fig48_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig48_HTML.jpg) Figure
    2-48. The transitive probability MDP is a Markov reward process with a decision
    factor in it. It is a type of environment where all the states are Markov. An
    MDP is a five tuple < S, A, P, R, Gamma>:


    *   S stands for state

    *   A stands for action

    *   P is a policy

    *   R stands for reward


    Policy (π) is a distribution over actions in a given state. A policy is a function
    or a decision-making process that allows transitions from one state to another
    .


    ## SARSA


    SARSA stands for State Action Reward next State and next Action. It is a different
    kind of Reinforcement Learning approach and is generally derived from temporal
    difference learning. We’ll discuss temporal difference learning first.


    ### Temporal Difference Learning


    This type of learning is based on its own vicinity or its own range. We generally
    apply temporal difference learning when we are in a state and want to know what
    is happening in successive states. The general idea is that we want to predict
    the best path over a period of time. We go from state S0 to state SF. We get rewards
    in each state. We will be trying to predict the discounted sum of rewards. See
    Figure [2-49](#A454310_1_En_2_Chapter.xhtml#Fig49). ![A454310_1_En_2_Fig49_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig49_HTML.jpg)
    Figure 2-49. State transition We start by looking at the Markov Chain, as shown
    in Figure [2-50](#A454310_1_En_2_Chapter.xhtml#Fig50). ![A454310_1_En_2_Fig50_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig50_HTML.jpg)
    Figure 2-50. The Markov Chain ![A454310_1_En_2_Fig51_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig51_HTML.jpg)
    Figure 2-51. The value function The equation states that the value function maps
    the state to some number. This number is set to 0 if it is in the final state
    (see Figure [2-51](#A454310_1_En_2_Chapter.xhtml#Fig51)). For any state, the value
    is the expected value of the reward (r) and the discounted value of the ending
    state.'
  trans: '

    # 什么是 MDP？


    `MDP`（马尔可夫决策过程）是一个框架，它涉及为决策过程创建数学模型和公式，其中一部分是随机的，另一部分则由决策者掌控。`MDP` 有许多不同的应用，如图
    2-38 所示。![A454310_1_En_2_Fig38_HTML.jpg](img/A454310_1_En_2_Fig38_HTML.jpg) 图
    2-38. MDP 及其应用 `MDP` 中的每个状态都满足马尔可夫性质。


    ## 马尔可夫性质


    在强化学习领域，马尔可夫性质指的是一种随机的无记忆性质。随机性是指一个由随机变量构成的通用数学对象。当我们不存储某个变量的值，因为它在每次迭代中都会发生变化时，我们称之为随机性。见图
    2-39。![A454310_1_En_2_Fig39_HTML.jpg](img/A454310_1_En_2_Fig39_HTML.jpg) 图 2-39.
    马尔可夫性质过程 我们将在下一节讨论马尔可夫链。


    ## 马尔可夫链


    如果一个数学性质具有离散的状态空间或离散的索引集，则称之为马尔可夫链。马尔可夫链以两种方式工作，如图 2-40 所示。![A454310_1_En_2_Fig40_HTML.jpg](img/A454310_1_En_2_Fig40_HTML.jpg)
    图 2-40. 马尔可夫链 让我们通过一个例子来了解马尔可夫链。这个例子比较了 Rin 洗衣液与市场上其他洗衣液的销售情况。假设 Rin 的销售额占洗衣液总销售额的
    20%，这意味着其他品牌占 80%。使用 Rin 洗衣液的人定义为 `A`；其他人定义为 `A¢`。现在我们定义一个规则。在使用 Rin 洗衣液的人中，90%
    的人在一周后会继续使用，而 10% 的人会转向其他品牌。同样，使用其他洗衣液的人中，70% 的人在一周后会转向 Rin，其余的人继续使用其他洗衣液。为了分析这些情况，我们需要一个状态图。见图
    2-41。![A454310_1_En_2_Fig41_HTML.jpg](img/A454310_1_En_2_Fig41_HTML.jpg) 图 2-41.
    Rin 洗衣液状态图 在状态图中，我们创建了一个场景，其中圆形点代表状态。根据这个状态图，我们必须分配一个转移概率矩阵。从状态图中得到的转移概率矩阵如图 2-42
    所示。![A454310_1_En_2_Fig42_HTML.jpg](img/A454310_1_En_2_Fig42_HTML.jpg) 图 2-42.
    转移概率矩阵 要确定两周后 Rin 的使用情况，我们必须应用一个原则。这个原则对于你尝试的每一个过程都是通用的。它可以表示为一条线连接，如图 2-43 所示。![A454310_1_En_2_Fig43_HTML.jpg](img/A454310_1_En_2_Fig43_HTML.jpg)
    图 2-43. 一个连通图 从起点出发，我们有两条路径——一条用于 Rin 洗衣液（通过 `A`），另一条用于其他品牌（即 `A¢`）。路径的创建方式如下。


    1. 从起点出发，我们为 `A` 创建一条路径，因此我们必须关注转移概率矩阵。

    2. 我们追踪 `A` 的路径。

    3. 从初始市场份额来看，Rin 洗衣液的市场价值为 20%。

    4. 从起点 `A` 出发，我们关注转移概率矩阵。


    停留在 `A` 的概率为 90%，因此另外 10% 会转向替代路径（到 `A¢`）。图 2-44 以图形方式展示了这条路径的计算。![A454310_1_En_2_Fig44_HTML.jpg](img/A454310_1_En_2_Fig44_HTML.jpg)
    图 2-44. 路径计算 总路径概率计算如下：`P = .2 * .9 + .8 * .7 = .18 + .56 = .74`。这是一周后使用 Rin 的人数百分比。这个公式也可以理解为当前市场份额（`SO`）乘以转移概率（`P`）：`S0
    * P = 一周后的市场份额` 见图 2-45。![A454310_1_En_2_Fig45_HTML.jpg](img/A454310_1_En_2_Fig45_HTML.jpg)
    图 2-45. 为下一周创建的矩阵 计算过程为 `.2 * .9 + .8 * .7 = .74` `.2 * .1 + .8 * .3 = .26` `[
    .74 .26 ] = S1` 让我们处理第一个状态矩阵。一周后，Rin 洗衣液的销售额占市场的 74%。其他品牌则占市场的 26%。现在尝试找出两周后使用
    Rin 洗衣液的人数百分比。图 2-46 展示了两周后我们需要进行的计算。![A454310_1_En_2_Fig46_HTML.jpg](img/A454310_1_En_2_Fig46_HTML.jpg)
    图 2-46. 下一个转移矩阵 所以结果是：`A   A’ = [ .848 .152 ]` 两周后，84.8% 的人会使用 Rin，15.2% 的人会使用其他洗衣液。你可能会问的一个问题是，Rin
    的销售额是否会最大化到 100% 的市场份额。随着我们继续，矩阵在经过一定次数的迭代后会变得稳定，并最终稳定在：`A  A’ = [ .75 .25]` 在了解了马尔可夫状态和马尔可夫链的基础知识之后，是时候再次关注
    `MDP` 了。


    ## MDP


    几乎所有的强化学习问题都可以形式化为 `MDP`。`MDP` 创造了一种适用于应用强化学习的普遍条件。`MDP` 的本质是一个连续的马尔可夫过程。一个状态（`St`）是马尔可夫的，当且仅当它满足图
    2-47 所示的条件。![A454310_1_En_2_Fig47_HTML.jpg](img/A454310_1_En_2_Fig47_HTML.jpg)
    图 2-47. 马尔可夫状态性质 该状态从历史中捕获所有相关信息。我们不必保留历史中的所有信息，因为只有前一个状态决定了现在会发生什么。对于一个马尔可夫状态（`s`）和后继状态（`s’`），状态转移概率的定义如图
    2-48 所示。![A454310_1_En_2_Fig48_HTML.jpg](img/A454310_1_En_2_Fig48_HTML.jpg) 图
    2-48. 转移概率 `MDP` 是一个包含决策因素的马尔可夫奖励过程。它是一种所有状态都是马尔可夫的环境类型。一个 `MDP` 是一个五元组 `< S,
    A, P, R, Gamma>`：


    * `S` 代表状态

    * `A` 代表动作

    * `P` 是一个策略

    * `R` 代表奖励


    策略（`π`）是在给定状态下动作的分布。策略是一个函数或决策过程，允许从一个状态转移到另一个状态。


    ## SARSA


    `SARSA` 代表状态-动作-奖励-下一状态-下一动作。它是一种不同类型的强化学习方法，通常源自时序差分学习。我们将首先讨论时序差分学习。


    ### 时序差分学习


    这种类型的学习基于其自身的邻近范围或自身范围。当我们处于一个状态并想知道后续状态中发生了什么时，我们通常会应用时序差分学习。总体思路是我们希望预测一段时间内的最佳路径。我们从状态
    `S0` 到状态 `SF`。我们在每个状态中获得奖励。我们将尝试预测奖励的折扣总和。见图 2-49。![A454310_1_En_2_Fig49_HTML.jpg](img/A454310_1_En_2_Fig49_HTML.jpg)
    图 2-49. 状态转移 我们首先查看马尔可夫链，如图 2-50 所示。![A454310_1_En_2_Fig50_HTML.jpg](img/A454310_1_En_2_Fig50_HTML.jpg)
    图 2-50. 马尔可夫链 ![A454310_1_En_2_Fig51_HTML.jpg](img/A454310_1_En_2_Fig51_HTML.jpg)
    图 2-51. 价值函数 该方程表明，价值函数将状态映射到某个数值。如果处于最终状态，该数值设为 0（见图 2-51）。对于任何状态，其价值是奖励（`r`）的期望值与结束状态的折扣价值之和。

    '
- fmt: "### How SARSA Works\n\nNow we get into SARSA. SARSA is known as an own policy\
    \ Reinforcement Learning. An own policy means that we can see only our own experiences.\
    \ It accumulates updates in one or more steps and learns to update from its experiences.\
    \ From the current state, we choose an action and then get to the next state.\
    \ At the next state, we choose another state and use the current state and the\
    \ current action with the next state and next action. We then update all the values\
    \ together as a Q value. Here is the algorithm:\n\n1. Initialize `Q(s, a)` arbitrarily.\n\
    2. Initialize `s`.\n3. Choose `a` from `s` using the policy derived from `Q`.\
    \ Repeat these two steps for each episode.\n4. Take action `a` and observe `r`\
    \ and `s'`.\n5. Choose `a'` from `s'` using the policy derived from `Q` (for example,\
    \ ε-greedy). `Q(s, a) ← Q(s, a) + α[r + γQ(s', a') - Q(s, a)]`; `s ← s'`; `a ←\
    \ a'`.\n6. Repeat these steps for each episode until `s` is terminal.\n\n## Q\
    \ Learning\n\nQ Learning is a model-free Reinforcement Learning technique. Figure\
    \ [2-52](#A454310_1_En_2_Chapter.xhtml#Fig52) illustrates the general procedure\
    \ for Q Learning.\n\n![A454310_1_En_2_Fig52_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig52_HTML.jpg)\
    \  \nFigure 2-52. The Q Learning process\n\n### What Is Q?\n\n`Q` can be stated\
    \ as a function that consists of two parameters — `s` and `a`. The `a` parameter\
    \ can also be referred to as a table. `Q` represents the value that an action\
    \ `a` takes with state `s`. `Q[s, a] = Immediate reward + discounted reward`.\
    \ The immediate reward is the point given when the agent moves from one state\
    \ to another while doing an action. The discounted reward is the point given for\
    \ future references.\n\n### How to Use Q\n\nWe generally come up with scenarios\
    \ where we have to find out where we can utilize the Q table values or the Q value\
    \ so Q is implemented in this process. We are looking at what action to take or\
    \ which policy to implement when we are in state `s`. We use the Q table to get\
    \ the best result. If we are in state `s`, we need to determine which action is\
    \ the best. We do not change `s`, but we go through all the values of `a` and\
    \ determine which one is the largest. That will be the action we should take.\
    \ Mathematically, this idea is represented as shown in Figures [2-53](#A454310_1_En_2_Chapter.xhtml#Fig53)\
    \ and [2-54](#A454310_1_En_2_Chapter.xhtml#Fig54).\n\n![A454310_1_En_2_Fig53_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig53_HTML.jpg)\
    \  \nFigure 2-53. The policy equation\n\n![A454310_1_En_2_Fig54_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig54_HTML.jpg)\
    \  \nFigure 2-54. How policy works\n\nFor MDP, the policy we should implement\
    \ depends on the current state. We maximize the rewards to get the optimal solution.\n\
    \n### SARSA Implementation in Python"
  raw: '### How SARSA Works


    Now we get into SARSA. SARSA is known as an own policy Reinforcement Learning.
    An own policy means that we can see only our own experiences. It accumulates updates
    in one or more steps and learns to update from its experiences. From the current
    state, we choose an action and then get to the next state. At the next state,
    we choose another state and use the current state and the current action with
    the next state and next action. We then update all the values together as a Q
    value . Here is the algorithm:


    1.  1. Initialize Q(s, a) arbitrarily.  

    2.  2. Initialize s.  

    3.  3. Choose a from s using the policy derived from Q. Repeat these two steps
    for each episode.  

    4.  4. Take action a and observe r and s’.  

    5.  5. Choose a’ from s’ using the policy derived from Q (for example, ----E-greedy).
    Q(s, a) ß----- Q(s, a) + α[r +γQ(s'', a'') - Q(s,a)] Sß---s''; aß-- a'';  

    6.  6. Repeat these steps for each episode until s is terminal.


    ## Q Learning


    Q Learning is a model-free Reinforcement Learning technique. Figure [2-52](#A454310_1_En_2_Chapter.xhtml#Fig52)
    illustrates the general procedure for Q Learning. ![A454310_1_En_2_Fig52_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig52_HTML.jpg)
    Figure 2-52. The Q Learning process


    ### What Is Q?


    Q can be stated as a function that consists of two parameters —s and a. The a
    parameter can also be referred to as a table. Q represents the value that an action
    a takes with state s. Q[s, a] = Immediate reward + discounted reward The immediate
    reward is the point given when the agent moves from one state to another while
    doing an action. The discounted reward is the point given for future references.


    ### How to Use Q


    We generally come up with scenarios where we have to find out where we can utilize
    the Q table values or the Q value so Q is implemented in this process. We are
    looking at what action to take or which policy to implement when we are in state
    s. We use the Q table to get the best result. If we are in state s, we need to
    determine which action is the best. We do not change s, but we go through all
    the values of a and determine which one is the largest. That will be the action
    we should take. Mathematically, this idea is represented as shown in Figures [2-53](#A454310_1_En_2_Chapter.xhtml#Fig53)
    and [2-54](#A454310_1_En_2_Chapter.xhtml#Fig54). ![A454310_1_En_2_Fig53_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig53_HTML.jpg)
    Figure 2-53. The policy equation ![A454310_1_En_2_Fig54_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig54_HTML.jpg)
    Figure 2-54. How policy works For MDP, the policy we should implement depends
    on the current state. We maximize the rewards to get the optimal solution.


    ### SARSA Implementation in Python'
  trans: "\n### SARSA 的工作原理\n\n现在我们进入 SARSA 部分。SARSA 被称为一种同策略强化学习。同策略意味着我们只能看到自身的经验。它通过一步或多步累积更新，并学习从自身经验中进行更新。从当前状态出发，我们选择一个动作，然后进入下一个状态。在下一个状态，我们选择另一个动作，并将当前状态和当前动作与下一个状态和下一个动作结合使用。然后，我们将所有这些值一起更新为\
    \ Q 值。算法如下：\n\n1.  任意初始化 `Q(s, a)`。\n2.  初始化 `s`。\n3.  根据从 `Q` 派生的策略，从 `s` 中选择\
    \ `a`。对每个情节重复这两个步骤。\n4.  执行动作 `a`，并观察 `r` 和 `s'`。\n5.  根据从 `Q` 派生的策略（例如，ε-贪婪策略），从\
    \ `s'` 中选择 `a'`。`Q(s, a) ← Q(s, a) + α[r + γQ(s', a') - Q(s, a)]`；`s ← s'`；`a\
    \ ← a'`。\n6.  对每个情节重复这些步骤，直到 `s` 为终止状态。\n\n## Q 学习\n\nQ 学习是一种无模型的强化学习技术。图 2-52\
    \ 展示了 Q 学习的一般流程。\n\n![A454310_1_En_2_Fig52_HTML.jpg](img/A454310_1_En_2_Fig52_HTML.jpg)\
    \  \n图 2-52. Q 学习过程\n\n### 什么是 Q？\n\n`Q` 可以表述为一个包含两个参数——`s` 和 `a`——的函数。参数 `a`\
    \ 也可以被看作一张表格。`Q` 表示在状态 `s` 下执行动作 `a` 所获得的价值。`Q[s, a] = 即时奖励 + 折扣奖励`。即时奖励是智能体在执行动作时从一个状态转移到另一个状态所获得的分数。折扣奖励是为未来参考而给出的分数。\n\
    \n### 如何使用 Q\n\n我们通常会遇到需要找出在何处利用 Q 表格值或 Q 值的情况，因此 Q 在此过程中得以实现。我们关注的是，当处于状态 `s`\
    \ 时，应该采取什么动作或实施哪种策略。我们使用 Q 表格来获得最佳结果。如果我们处于状态 `s`，需要确定哪个动作是最佳的。我们不改变 `s`，而是遍历\
    \ `a` 的所有值，并确定哪个值最大。那将是我们应该采取的动作。数学上，这个想法如图 2-53 和 2-54 所示。\n\n![A454310_1_En_2_Fig53_HTML.jpg](img/A454310_1_En_2_Fig53_HTML.jpg)\
    \  \n图 2-53. 策略方程\n\n![A454310_1_En_2_Fig54_HTML.jpg](img/A454310_1_En_2_Fig54_HTML.jpg)\
    \  \n图 2-54. 策略如何工作\n\n对于 MDP，我们应实施的策略取决于当前状态。我们最大化奖励以获得最优解。\n\n### 在 Python 中实现\
    \ SARSA\n"
- fmt: "Recall that `SARSA` is as self policy Reinforcement Learning approach. For\
    \ example, `SARSA` can be used to solve a maze. Using the `SARSA` approach, we\
    \ cannot compare two different maze environments. We have to stick to one maze\
    \ and we’ll use the previous as an example. Also, we cannot compare this maze\
    \ with another outside maze; we have to stick to the maze that we are working\
    \ on. The best thing about `SARSA` is that it can learn from the current state\
    \ compared to the next state or to subsequent states. We accumulate all the experiences\
    \ and learn from them.\n\nLet’s break this idea down more. This scenario states\
    \ that the update can be done on a `Q` table by comparing the changes in subsequent\
    \ steps and then making a decision. This idea is illustrated in Figure [2-55](#A454310_1_En_2_Chapter.xhtml#Fig55).\
    \ ![A454310_1_En_2_Fig55_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig55_HTML.jpg)\
    \ Figure 2-55. Updating results using the SARSA table\n\nThe learning method in\
    \ Python is different for `SARSA`. It looks like this: `def learn(self, s, a,\
    \ r, s_, a_)`. This method depends on the state, the action, the reward, the next\
    \ state, and the next action. If we compare the algorithm and convert it to Python,\
    \ the construct for this equation is shown in Figure [2-56](#A454310_1_En_2_Chapter.xhtml#Fig56).\
    \ ![A454310_1_En_2_Fig56_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig56_HTML.jpg)\
    \ Figure 2-56. The SARSA equation\n\nIt’s converted to the following: `q_target\
    \ = r + self.gamma * self.q_table.ix [s_, a_]`. The difference between this equation\
    \ and Q Learning is the change in this equation: `q_target = r + self.gamma *\
    \ self.q_table.ix [s_, :].max()`. The `max()` value is present in Q Learning but\
    \ not in `SARSA`.\n\nThe logic for implementing a policy using `SARSA` is shown\
    \ here:\n\n```python\n# on-policy\nclass SarsaTable(RL):\n    def __init__(self,\
    \ actions, learning_rate=0.01, reward_decay=0.9, e_greedy=0.9):\n        super(SarsaTable,\
    \ self).__init__(actions, learning_rate, reward_decay, e_greedy)\n\n    def learn(self,\
    \ s, a, r, s_, a_):\n        self.check_state_exist(s_)\n        q_predict = self.q_table.ix[s,\
    \ a]\n        if s_ != 'terminal':\n            q_target = r + self.gamma * self.q_table.ix[s_,\
    \ a_]  # next state is not terminal\n        else:\n            q_target = r \
    \ # next state is terminal\n        self.q_table.ix[s, a] += self.lr * (q_target\
    \ - q_predict)  # update\n```\n\nThe learning process is somewhat different than\
    \ with Q Learning. The logic works according to the principle discussed previously.\
    \ We combine the state and action of the current status with the next state and\
    \ next action. This in turn updates the `Q` table. This is the way the learning\
    \ works.\n\n```python\ndef update():\n    for episode in range(100):\n       \
    \ # initial observation\n        observation = env.reset()\n        # RL choose\
    \ action based on observation\n        action = RL.choose_action(str(observation))\n\
    \        while True:\n            # fresh env\n            env.render()\n    \
    \        # RL take action and get next observation and reward\n            observation_,\
    \ reward, done = env.step(action)\n            # RL choose action based on next\
    \ observation\n            action_ = RL.choose_action(str(observation_))\n   \
    \         # RL learn from this transition (s, a, r, s, a) ==> Sarsa\n        \
    \    RL.learn(str(observation), action, reward, str(observation_), action_)\n\
    \            # swap observation and action\n            observation = observation_\n\
    \            action = action_\n            # break while loop when end of this\
    \ episode\n            if done:\n                break\n```\n\nHere is the code\
    \ for creating the maze:\n\n```python\nimport numpy as np\nimport time\nimport\
    \ sys\nif sys.version_info.major == 2:\n    import Tkinter as tk\nelse:\n    import\
    \ tkinter as tk\n\nUNIT = 40   # pixels\nMAZE_H = 4  # grid height\nMAZE_W = 4\
    \  # grid width\n\nclass Maze(tk.Tk, object):\n    def __init__(self):\n     \
    \   super(Maze, self).__init__()\n        self.action_space = ['u', 'd', 'l',\
    \ 'r']\n        self.n_actions = len(self.action_space)\n        self.title('maze')\n\
    \        self.geometry('{0}x{1}'.format(MAZE_H * UNIT, MAZE_H * UNIT))\n     \
    \   self._build_maze()\n\n    def _build_maze(self):\n        self.canvas = tk.Canvas(self,\
    \ bg='white',\n                           height=MAZE_H * UNIT,\n            \
    \               width=MAZE_W * UNIT)\n        # create grids\n        for c in\
    \ range(0, MAZE_W * UNIT, UNIT):\n            x0, y0, x1, y1 = c, 0, c, MAZE_H\
    \ * UNIT\n            self.canvas.create_line(x0, y0, x1, y1)\n        for r in\
    \ range(0, MAZE_H * UNIT, UNIT):\n            x0, y0, x1, y1 = 0, r, MAZE_H *\
    \ UNIT, r\n            self.canvas.create_line(x0, y0, x1, y1)\n        # create\
    \ origin\n        origin = np.array([20, 20])\n        # hell\n        hell1_center\
    \ = origin + np.array([UNIT * 2, UNIT])\n        self.hell1 = self.canvas.create_rectangle(\n\
    \            hell1_center[0] - 15, hell1_center[1] - 15,\n            hell1_center[0]\
    \ + 15, hell1_center[1] + 15,\n            fill='black')\n        # hell\n   \
    \     hell2_center = origin + np.array([UNIT, UNIT * 2])\n        self.hell2 =\
    \ self.canvas.create_rectangle(\n            hell2_center[0] - 15, hell2_center[1]\
    \ - 15,\n            hell2_center[0] + 15, hell2_center[1] + 15,\n           \
    \ fill='black')\n        # create oval\n        oval_center = origin + UNIT *\
    \ 2\n        self.oval = self.canvas.create_oval(\n            oval_center[0]\
    \ - 15, oval_center[1] - 15,\n            oval_center[0] + 15, oval_center[1]\
    \ + 15,\n            fill='yellow')\n        # create red rect\n        self.rect\
    \ = self.canvas.create_rectangle(\n            origin[0] - 15, origin[1] - 15,\n\
    \            origin[0] + 15, origin[1] + 15,\n            fill='red')\n      \
    \  # pack all\n        self.canvas.pack()\n\n    def reset(self):\n        self.update()\n\
    \        time.sleep(0.5)\n        self.canvas.delete(self.rect)\n        origin\
    \ = np.array([20, 20])\n        self.rect = self.canvas.create_rectangle(\n  \
    \          origin[0] - 15, origin[1] - 15,\n            origin[0] + 15, origin[1]\
    \ + 15,\n            fill='red')\n        # return observation\n        return\
    \ self.canvas.coords(self.rect)\n\n    def step(self, action):\n        s = self.canvas.coords(self.rect)\n\
    \        base_action = np.array([0, 0])\n        if action == 0:   # up\n    \
    \        if s[1] > UNIT:\n                base_action[1] -= UNIT\n        elif\
    \ action == 1:   # down\n            if s[1] < (MAZE_H - 1) * UNIT:\n        \
    \        base_action[1] += UNIT\n        elif action == 2:   # right\n       \
    \     if s[0] < (MAZE_W - 1) * UNIT:\n                base_action[0] += UNIT\n\
    \        elif action == 3:   # left\n            if s[0] > UNIT:\n           \
    \     base_action[0] -= UNIT\n        self.canvas.move(self.rect, base_action[0],\
    \ base_action[1])  # move agent\n        s_ = self.canvas.coords(self.rect)  #\
    \ next state\n        # reward function\n        if s_ == self.canvas.coords(self.oval):\n\
    \            reward = 1\n            done = True\n        elif s_ in [self.canvas.coords(self.hell1),\
    \ self.canvas.coords(self.hell2)]:\n            reward = -1\n            done\
    \ = True\n        else:\n            reward = 0\n            done = False\n  \
    \      return s_, reward, done\n\n    def render(self):\n        time.sleep(0.1)\n\
    \        self.update()\n```\n\n### The Entire Reinforcement Logic in Python"
