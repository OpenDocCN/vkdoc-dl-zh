- fmt: '# What Is MDP?


    `MDP` (Markov Decision Process) is a framework that involves creating mathematical
    formulas and models for decision making where part of it is random and part of
    it remains in the hands of a decision maker. `MDPs` have many different applications,
    as shown in Figure [2-38](#A454310_1_En_2_Chapter.xhtml#Fig38). ![A454310_1_En_2_Fig38_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig38_HTML.jpg)
    Figure 2-38. MDP and its applications Every state in `MDP` satisfies the Markov
    property.


    ## The Markov Property


    In the world of Reinforcement Learning, the Markov property refers to a memory-less
    property that is stochastic. Stochastic means a general mathematical object consisting
    of random variables. When we are not storing a value of a variable because in
    each iteration there is a change, we call it stochastic. See Figure [2-39](#A454310_1_En_2_Chapter.xhtml#Fig39).
    ![A454310_1_En_2_Fig39_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig39_HTML.jpg) Figure
    2-39. The Markov property process We talk about the Markov Chain in the next section.


    ## The Markov Chain


    If a mathematical property has either a discrete state space or a discrete index
    set, it is known as a Markov Chain. The Markov Chain works in two ways, as shown
    in Figure [2-40](#A454310_1_En_2_Chapter.xhtml#Fig40). ![A454310_1_En_2_Fig40_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig40_HTML.jpg)
    Figure 2-40. Markov Chain Let’s look at Markov Chains using an example. This example
    compares sales of Rin detergent versus the other detergents in the market. Assume
    that sales of Rin is 20 percent of the total detergent sales, which means the
    rest comprise 80 percent. People who use Rin detergent are defined as `A`; the
    others are `A¢`. Now we define a rule. Of the people who use Rin detergent, 90%
    of them continue to use it after a week whereas 10% shift to another brand. Similarly,
    70% of the people who use another detergent shift to Rin after a week, and the
    rest continue to use the other detergent. To analyze these conditions, we need
    a state diagram. See Figure [2-41](#A454310_1_En_2_Chapter.xhtml#Fig41). ![A454310_1_En_2_Fig41_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig41_HTML.jpg)
    Figure 2-41. Rin detergent state diagram In the state diagram, we have created
    a scenario where the circular points represent states. From this state diagram,
    we have to assign a transition probability matrix. The transition probability
    matrix we get from the state diagram is shown in Figure [2-42](#A454310_1_En_2_Chapter.xhtml#Fig42).
    ![A454310_1_En_2_Fig42_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig42_HTML.jpg) Figure
    2-42. The transition probability matrix To determine the use of Rin after two
    weeks, we have to apply a principle. This principle is common for each and every
    process you try. It can be shown as a line connection, as shown in Figure [2-43](#A454310_1_En_2_Chapter.xhtml#Fig43).
    ![A454310_1_En_2_Fig43_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig43_HTML.jpg) Figure
    2-43. A connected graph From the origin, we have two paths—one for Rin detergent
    (through `A`) and the other for the rest (that is `A¢`). Here is how the path
    is created.


    1. From the origin, we create a path for `A`, so we have to focus on the transition
    probability matrix.

    2. We trace the path of `A`.

    3. From the starting market share, the detergent Rin has a market value of 20%.

    4. From the starting point `A`, we focus on the transition probability matrix.


    There is a 90% probability of staying on `A`, so the other 10% change to the alternate
    path (to `A¢`). Figure [2-44](#A454310_1_En_2_Chapter.xhtml#Fig44) shows this
    path calculation graphically. ![A454310_1_En_2_Fig44_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig44_HTML.jpg)
    Figure 2-44. Path calculation The total path probability is determined as so:
    `P = .2 * .9 + .8 * .7 = .18 + .56 = .74`. This is the percentage of people using
    Rin after one week. This formula can also be conceptualized as the current market
    share (`SO`) and transition probability (`P`): `S0 * P = market share after one
    week` See Figure [2-45](#A454310_1_En_2_Chapter.xhtml#Fig45). ![A454310_1_En_2_Fig45_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig45_HTML.jpg)
    Figure 2-45. The matrix created for the next week The calculation is `.2 * .9
    + .8 * .7 = .74` `.2 * .1 + .8 * .3 = .26` `[ .74 .26 ] = S1` Let’s work on a
    first state matrix. After one week, the sale of Rin detergent is 74% of the market.
    The other brands then make up 26% of the market. Now try to find the percentage
    of people using Rin detergent after two weeks. Figure [2-46](#A454310_1_En_2_Chapter.xhtml#Fig46)
    shows the calculation that we need to do after two weeks. ![A454310_1_En_2_Fig46_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig46_HTML.jpg)
    Figure 2-46. The next transition matrix So the result is: `A   A’ = [ .848 .152
    ]` After two weeks, 84.8% of the people will use Rin and 15.2% will use other
    detergents. One question you might have is whether the sale of Rin will ever maximize
    to 100% of the market. As we go along, the matrix will become stationary after
    a certain number of iterations and finally settle at: `A  A’ = [ .75 .25]` After
    going through the basics of the Markov state and the Markov Chain, it’s time to
    focus on `MDPs` again.


    ## MDPs


    Almost all Reinforcement Learning problems can be formalized as `MDPs`. `MDPs`
    create a condition that’s prevalent for applying Reinforcement Learning. The essentials
    of `MDPs` are a continued Markov process. A state (`St`) is Markov if and only
    if it meets the criteria shown in Figure [2-47](#A454310_1_En_2_Chapter.xhtml#Fig47).
    ![A454310_1_En_2_Fig47_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig47_HTML.jpg) Figure
    2-47. The Markov state property The state captures all relevant information from
    the history. We do not have to retain everything in history because only the previous
    state determines what will happen now. For a Markov state (`s`) and successor
    state (`s’`), the state transition probability is defined in Figure [2-48](#A454310_1_En_2_Chapter.xhtml#Fig48).
    ![A454310_1_En_2_Fig48_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig48_HTML.jpg) Figure
    2-48. The transitive probability `MDP` is a Markov reward process with a decision
    factor in it. It is a type of environment where all the states are Markov. An
    `MDP` is a five tuple `< S, A, P, R, Gamma>`:


    * `S` stands for state

    * `A` stands for action

    * `P` is a policy

    * `R` stands for reward


    Policy (`π`) is a distribution over actions in a given state. A policy is a function
    or a decision-making process that allows transitions from one state to another.


    ## SARSA


    `SARSA` stands for State Action Reward next State and next Action. It is a different
    kind of Reinforcement Learning approach and is generally derived from temporal
    difference learning. We’ll discuss temporal difference learning first.


    ### Temporal Difference Learning


    This type of learning is based on its own vicinity or its own range. We generally
    apply temporal difference learning when we are in a state and want to know what
    is happening in successive states. The general idea is that we want to predict
    the best path over a period of time. We go from state `S0` to state `SF`. We get
    rewards in each state. We will be trying to predict the discounted sum of rewards.
    See Figure [2-49](#A454310_1_En_2_Chapter.xhtml#Fig49). ![A454310_1_En_2_Fig49_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig49_HTML.jpg)
    Figure 2-49. State transition We start by looking at the Markov Chain, as shown
    in Figure [2-50](#A454310_1_En_2_Chapter.xhtml#Fig50). ![A454310_1_En_2_Fig50_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig50_HTML.jpg)
    Figure 2-50. The Markov Chain ![A454310_1_En_2_Fig51_HTML.jpg](OEBPS/Images/A454310_1_En_2_Fig51_HTML.jpg)
    Figure 2-51. The value function The equation states that the value function maps
    the state to some number. This number is set to 0 if it is in the final state
    (see Figure [2-51](#A454310_1_En_2_Chapter.xhtml#Fig51)). For any state, the value
    is the expected value of the reward (`r`) and the discounted value of the ending
    state.'
