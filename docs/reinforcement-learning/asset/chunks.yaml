  trans: "\n### Python 中的群体智能\n\n本节将介绍一个运用群体智能概念的 Python 程序。因此，你将了解如何在 Python 中实现粒子群优化（PSO）。你可以借助一个名为\
    \ `PySwarms` 的研究工具包来实现这一点。`PySwarms` 是一个很好的工具，可用于实现基于 PSO 方法的优化算法，例如：\n\n*   星形拓扑\n\
    *   环形拓扑\n\n首先，你需要安装 `PySwarms`。打开终端，并使用以下命令激活 Anaconda 环境。\n\n```\nabhi@ubuntu:∼$\
    \ source activate universe\n(universe) abhi@ubuntu:∼$\n```\n\n安装 `PySwarms` 之前的依赖项如下：\n\
    \n*   `numpy >= 1.13.0`\n*   `scipy >= 0.17.0`\n*   `matplotlib >= 1.3.1`\n\n\
    现在按如下方式安装 `PySwarms`：\n\n```\n(universe) abhi@ubuntu:∼$ pip install pyswarms\n\
    ```\n\n现在安装过程已完成。图 4-26 显示 `PySwarms` 已完全安装。\n\n![A454310_1_En_4_Fig26_HTML.jpg](img/A454310_1_En_4_Fig26_HTML.jpg)\n\
    \n**图 4-26.** PySwarms 已安装\n\n现在我们进入 Python 模式。\n\n```\n(universe) abhi@ubuntu:∼$\
    \ python\nPython 3.5.3 |Anaconda custom (64-bit)| (default, Mar  6 2017, 11:58:13)\n\
    [GCC 4.4.7 20120313 (Red Hat 4.4.7-1)] on linux\nType \"help\", \"copyright\"\
    , \"credits\" or \"license\" for more information.\n>>>\n```\n\n首先，你需要按如下方式导入\
    \ `PySwarms` 工具：\n\n```\n>>> import pyswarms as ps\n```\n\n`PySwarms` 中有多种函数可供使用，为此你需要导入：\n\
    \n```\n>>> from pyswarms.utils.functions import single_obj as fx\n```\n\n接下来，你需要声明这些超参数：\n\
    \n```\n>>> options = {'c1': 0.5, 'c2': 0.3, 'w':0.9}\n```\n\n在本例中，我们将群体配置为一个字典，因此称之为字典。下一步，通过传递包含必要参数的字典来创建优化器的实例。\n\
    \n```\n>>> optimizer = ps.single.GlobalBestPSO(n_particles=10, dimensions=2, options=options)\n\
    ```\n\n之后，调用优化器方法，并存储优化后的最优成本和位置。图 4-27 显示了结果。\n\n![A454310_1_En_4_Fig27_HTML.jpg](img/A454310_1_En_4_Fig27_HTML.jpg)\n\
    \n**图 4-27.** 显示结果\n\n查看结果后，你可以看到优化器能够找到一个良好的最小值。现在你将使用局部最优 PSO 执行相同操作。你按如下方式配置并类似地声明一个字典：\n\
    \n```\n>>> options = {'c1': 0.5, 'c2': 0.3, 'w':0.9, 'k': 2, 'p': 2}\n```\n\n\
    创建优化器的实例：\n\n```\n>>> optimizer = ps.single.LocalBestPSO(n_particles=10, dimensions=2,\
    \ options=options)\n```\n\n现在，像之前一样调用优化方法来存储值。通过使用 `verbose` 参数，你可以控制参数的详细程度，并使用\
    \ `print_step` 来设置在特定步数后进行计数。\n\n```\n>>> cost, pos = optimizer.optimize(fx.sphere_func,\
    \ print_step=50, iters=1000, verbose=3)\n```\n\n输出结果如图 4-28 所示。\n\n![A454310_1_En_4_Fig28_HTML.jpg](img/A454310_1_En_4_Fig28_HTML.jpg)\n\
    \n**图 4-28.** 群体优化的输出结果\n\n## 构建游戏 AI\n\n我们已经讨论过使用 OpenAI Gym 和环境模拟的游戏 AI，但本节我们将进一步深入。首先，我们将克隆游戏\
    \ AI 中最重要且最简单的示例之一，如图 4-29 所示。\n\n![A454310_1_En_4_Fig29_HTML.jpg](img/A454310_1_En_4_Fig29_HTML.jpg)\n\
    \n**图 4-29.** 克隆仓库\n\n你首先需要设置环境。要求如下：\n\n*   `TensorFlow`\n*   `OpenAI Gym`\n\
    *   `virtualenv`\n*   `TFLearn`\n\n有一个依赖项需要安装——虚拟环境。你可以使用以下命令安装它：\n\n```\nconda\
    \ install -c anaconda virtualenv\n```\n\n它会询问你是否要安装新的 `virtualenv` 包，如图 4-30 所示。选择是。\n\
    \n![A454310_1_En_4_Fig30_HTML.jpg](img/A454310_1_En_4_Fig30_HTML.jpg)\n\n**图 4-30.**\
    \ 获取 virtualenv 包\n\n当包安装成功并完成后，你将看到图 4-31 所示的界面。\n\n![A454310_1_En_4_Fig31_HTML.jpg](img/A454310_1_En_4_Fig31_HTML.jpg)\n\
