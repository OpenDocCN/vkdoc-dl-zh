    \ Figure 4-25. The Rastrigin function PNG file"
  raw: '#### Human Swarming


    The concept of human swarming is based on the collective usage of different minds
    to predict an answer. It’s when all of the brains of different human beings attempt
    to find a particular solution to a complex problem. Using collective brains in
    the form of human swarming results in more accurate results.


    ### Swarm Grammars


    Swarm grammars are particular characteristics that act as different swarms working
    together to get varied results. The results can be similar to art or architecture.


    #### Swarmic Art


    Combining different characteristics of swarm behaviors between different species
    of birds and fish can lead to swarmic art that shows patterns in swarm behavior.
    Before we cover swarm intelligence in more detail, we touch on the Rastrigin function.
    Swarm optimization is based on different functions, one of which is the Rastrigin
    function, so you need to understand how it works.


    ### The Rastrigin Function


