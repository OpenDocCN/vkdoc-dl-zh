    >>> ax.plot_surface(X, Y, Z, rstride=1, cstride=1, cmap=cm.plasma, linewidth=0,\
    \ antialiased=False)\n<mpl_toolkits.mplot3d.art3d.Poly3DCollection object at 0x7f79cfc73780>\n\
    >>> plt.savefig('rastrigin.png')\n>>>\n```\n\nIf you go back to the folder, you\
    \ can see that the `rastrigin.png` file was created, as shown in Figure [4-24](#A454310_1_En_4_Chapter.xhtml#Fig24).\
    \ ![A454310_1_En_4_Fig24_HTML.jpg](OEBPS/Images/A454310_1_En_4_Fig24_HTML.jpg)\
