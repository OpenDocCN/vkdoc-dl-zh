  trans: '

    # 增强现实与虚拟现实


    讨论人工智能将如何改变我们与机器交互的方式时，若不涉及增强现实（AR）和虚拟现实（VR），便是不完整的。


    AR 指的是通过可穿戴设备（如眼镜）或手机屏幕等界面，将数字信息叠加在我们对现实世界的视野之上。与众多技术一样，其使用程度是一个连续谱。你可以从在现实视野中仅添加少量额外信息开始，例如建筑物的名称或一张包含附加信息的小卡片，一直到创建通常被称为混合现实（MR）的环境，其中数字层内容丰富且可被操控。


    另一方面，VR 则创造了一个全新的世界，并将我们置于其中。AR 或 MR 是对我们当前所见进行增强，而 VR 则是用完全数字化的世界取代了现实世界。用户通常佩戴一个头戴设备，使其沉浸于虚拟世界，并手持交互设备来管理场景，或者他们的手势通过外部设备被“读取”和解析。


    尽管这些技术相比对话式界面距离主流应用更远，但临界点正在临近。更强大的计算能力、更优秀的硬件，以及以机器视觉、自然语言等形式应用的人工智能技术，这些“魔法配方”将再次催生出有潜力成为我们当前行为自然延伸的解决方案。然而，成功绝非必然。即使所有必要的技术要素都已具备，使用场景仍需仔细考量。


    例如，还有人记得谷歌眼镜吗？该设备于 2012 年高调发布，被誉为 AR 时代的先驱。佩戴者通过自然语言语音指令或触摸眼镜侧面与设备进行交互，眼镜能够在视线正上方叠加相关的数字信息。所有要素都已齐备：自然语言、可穿戴设备，以及大量确保一切流畅运行的自动化技术。但它却是一个彻底的失败品。


    谷歌眼镜失败的原因有很多，此处并非进行深入分析的场合。从我们的角度来看，有趣的是，许多问题与技术本身关系不大。换句话说，即使谷歌眼镜从技术能力角度看是“完美”的设备，它仍然会失败。它价格昂贵，造成了尴尬的社交局面（例如，担心人们会在不知情的情况下被眼镜拍照，导致其在多个场所被禁用），并且没有解决人们迫在眉睫的问题。


    与使用我们立即熟悉的界面范式的语音或文本对话不同，AR 技术增加了一个我们需要去适应的新层面。这意味着，除非设计得当，否则它就成了又一个需要学习的界面。如果该界面能带来足够的好处，即使它并不十分契合，人们也会投入时间去学习。如果不能，那么在最初的兴奋过后，人们就会放弃。事实上，称谷歌眼镜为彻底的失败并不公平。它在工业环境中找到了用途，那里有明确的用例，可以帮助熟练工人在完成任务时提高效率。


    从消费者角度来看，我们有一些强有力的例子表明，当 AR 被有效利用时，它可以非常成功。游戏行业的《精灵宝可梦 GO》或许是最著名的例子。《精灵宝可梦 GO》让配备智能手机的用户在现实世界中搜索并捕捉数字宝可梦。游戏会指示用户需要去哪里寻找宝可梦，从而具备了将人们引导至特定地点的能力。将现实世界寻宝与数字游戏玩法相结合的兴奋感席卷了全球，在
    2016 年的几个月里，你不可能不遇到正在玩或讨论这款游戏的人。虽然最初的兴奋感已经平息，我们也不再在新闻报道中听到《精灵宝可梦 GO》，但该游戏仍有数千万用户，并创造了数亿美元的收入。^(⁴⁰)


    从业者通过这些成功与失败不断学习，并且由于 AR 的吸引力显而易见，它最终将取得突破，成为帮助我们完成办公室工作的工具的一部分。然而，第一个应用领域更可能是工业领域，而非办公室工作。工业环境中的成本/收益比要明显得多，且操作领域定义明确。一家名为
    UpSkill.io 的公司就是一个很好的例子。他们使用 AR 眼镜帮助现场技术人员接收来自远程专家支持人员的信息。AR 眼镜在操作复杂设备（如钻机）的现场技术人员与专家支持人员之间建立了双向信息流。^(⁴¹)
    后端专家可以与现场技术人员交谈，精确看到技术人员所看到的画面，并将相关信息流式传输到眼镜上。这使得专家技术人员能够扩大服务范围，同时支持多名现场技术人员，为公司带来明显的成本节约。


    如果说 AR 因其引入了新的做事方式而具有挑战性，那么 VR 则将这一挑战提升到了全新的高度。VR 技术需要上演终极魔术。它需要让我们相信自己身处一个全新的世界，同时又感觉它像现实世界一样自然。多年来，挑战仅仅在于如何将足够的计算能力集成到一个便携式设备中，以便你能够真正佩戴并随身携带。一个催化时刻是
    Facebook 在 2014 年以 20 亿美元收购了最有前途的 VR 头显制造商之一——Oculus VR。这项技术的前景加上 Facebook 的覆盖范围，让人们相信我们很快就能在客厅里拥有
    VR 设备。几年后，热情已经消退，但技术仍在前进。Oculus 现在拥有无需任何线缆且价格显著降低的产品。


    最终，这项技术的前景将确保其持续发展。对于日益分散的办公室，大型团队需要在复杂项目上进行紧密协作，能够改善协作体验的工具至关重要。VR 的圣杯之一就是改善会议室体验，让会议室内的与会者和远程拨入者都感觉身处同一空间。所有大型科技公司和无数初创公司都在开发
    VR/AR 平台，这些平台将工具交到开发者手中，让他们能够探索这一领域，找到可行的用户体验解决方案和商业模式。一些值得关注的平台包括：


    *   微软的 Hololens 2^(⁴²) 平台提供了基础要素，允许开发者在其之上构建应用程序。目前，它主要面向工业应用进行营销。

