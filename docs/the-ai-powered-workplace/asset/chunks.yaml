    # 数据驱动技术


    关于数据及其所能实现的功能的讨论，占据了人工智能技术领域绝大部分的思考空间。各种愿景声明层出不穷，宣称每一个行为都可以被测量、存储，然后用于预测我们的欲望、需求和意图，并影响我们的下一个行为。有时，数据的使用方式近乎天真幼稚。你点赞了一张朋友骑自行车的照片？那就给你推送广告，让你自己也买一辆自行车！访问了一个卖鞋的网站？我们会在接下来几周内对你进行“重定向”，用同一家网站的广告淹没你（即便你其实已经在那家网站买过那双鞋了，这种情况也屡见不鲜！）。你今天走了足够的步数吗？如果没有，我们明天可能就需要给你一些温和的“推动”，让你能赶上进度。


    对数据时代持愤世嫉俗的态度很容易（尤其是如果你像我一样，对大多数事情都倾向于持怀疑态度的话！）。然而，重要的是不要低估数据驱动技术现在和未来对我们的重要性。虽然模型驱动技术能带给我们确定性和安全性，并展示人类直觉如何能穿透噪音，凭借基本规则专注于真正重要的事情，但数据驱动技术则将我们从自身心智所能发现的局限中解放出来，赋予我们一种超能力：能够在事先不知道如何创造的情况下创造出某些东西。我们建造机器，让它们为我们探索和创造。也许在其中的某台机器里，最终会包含我们迫切需要的、用于修复气候和治愈身体的大部分答案。


    在思考数据驱动技术时，我决定避免罗列各种架构和方法的长篇清单，况且它们也在不断演变。网络上信息浩如烟海，如果有人想深入研究，很容易就能找到大量优秀的例子。相反，我想强调的是三种核心方法及其相对差异。我们将探讨如何通过机器学习，使用监督学习、无监督学习和强化学习来发现模型。唯一的例外是，我们会简要介绍一下人工神经网络和深度学习。严格来说，它们可以被归类到监督学习或无监督学习之下，但由于它们被频繁提及，因此值得直接讨论。


    ## 监督学习


    目前，大部分应用机器学习都集中在监督学习技术上。监督学习试图使用已经标记好的数据来构建模型。这里的“监督”指的是参考这些标签，以向算法指示其预测是否正确。通过一个迭代过程，算法不断调整其决策方式，你希望最终能得出一个可作为可靠预测器的模型。


    监督学习指的是算法使用已标注数据（即已提供“正确”期望答案的数据）的技术。在训练过程中，响应是*被监督的*，算法会被告知其答案是否正确。这些信息被用来调整模型。


    让我们通过一个例子来突出监督学习过程的关键阶段。假设你面临更新公司文档库的任务。经过几次并购、软件升级和人员变动，你的文档库已经一团糟。你知道那里有宝贵的历史数据，但你无法恰当地整理这些文档。你决定，第一个有用的步骤是将这些文档按对每个人都有意义的宽泛类别进行分类（例如，销售文档、项目报告、团队评估）。


    在监督学习过程中，你通常需要经历以下几个阶段：


    *   收集并准备数据。

    *   选择合适的机器学习算法并进行微调。

    *   使用上一阶段得到的模型进行预测。


    让我们逐一考虑每个阶段。


    ### 收集和准备数据


    你已经费了九牛二虎之力，求了很多人，才把所有文档集中到一个地方。永远不要低估仅仅获取数据这件事可能有多复杂。部门流程、内部政治、对监管的恐惧，以及许多其他因素，很容易在你开始之前就终结你的自动化梦想。在投入其他资源之前，仔细规划这个阶段总是值得的。没有什么比让一位高技能的机器学习专家或数据科学家干等着，而你却需要再开一个会议来确定该找谁去获取数据更没效率的了。不过，你是幸运儿之一。你的数据都在那里。所有文档都准备好被分类了。


    在监督学习场景中，你需要选择一部分数据并进行适当的标注，以便用于训练。你需要识别出能够帮助确定文档类型的关键特征（标题、摘要、作者、部门、日期、词频^(²⁴)等），然后用正确的答案或目标变量对你的数据进行分类。请注意，这些决策中的每一个都伴随着一系列复杂的考量。你是否选择了具有适当代表性的数据子集？如果没有，那么你的模型将无法在整个数据集上正确运行。你可能引入了多种不同的偏差，因为你的模型会偏向于与训练数据相似的数据。假设数据具有代表性，你是否选择了合适的特征集来关注？选择错误的特征同样会导致不必要的偏差。整个机器学习社区正在制定最佳实践来防范其中一些问题，但不存在万无一失的方法。这需要耐心和经验，你需要真正拥抱失败并将其视为学习——你正在探索一个未知的世界，并使用软件来帮助你构建一个理解它的模型。像任何探索者和科学家一样，你需要接受随之而来的固有风险。当然，这个过程最终回报巨大。成功地将一项艰巨的任务自动化，会为你的组织带来显著的竞争优势。

    '
- fmt: '#### Choosing a Machine Learning Algorithm, Training, and Fine-Tuning


    With data in hand, your next task is to determine what machine learning algorithm
    you should use to help you build a prediction engine. As we’ve already mentioned,
    there is a wide range of choices coming from mathematics, statistics, or computer
    science, and new approaches and architectures are invented at a breathtaking pace.
    It is the task of the machine learning expert to identify what would be the most
    fruitful or promising approach given your specific problem and type of data. Once
    more, you need to keep in mind that there is no simple answer or simple set of
    steps to arrive at an answer. Choosing and refining a machine learning architecture
    is a process of experimentation. For our text classification problem, solutions
    can range from something as “simple” as a `Naive Bayes` classifier to complex
    convolutional neural network architectures or to something novel that is created
    exclusively for your dataset. A good rule of thumb is to try the simpler approaches
    first and only move up in terms of complexity if you are convinced that the additional
    effort is justified given the potential benefit gains. The typical question is
    whether the cost of getting a hypothetical additional 2% boost in performance
    will justify the costs it will take to get there.


    Training is the process of feeding the algorithm data, allowing it to adjust its
    various “weights” as it searches for a “combination” that will enable it to provide
    correct predictions. Annotated data is typically split between a training set
    (i.e., what will actually be used to develop a model), and a test set, which will
    be used to validate the model. Even here you can see how important it is to properly
    distribute your annotated data between the training set and the validation so
    that they are each a good representation of the mix of data that your model needs
    to be able to handle.


    Fine-tuning the model (or parameter tuning as it is often called) is the process
    of adjusting factors that affect how the machine learning algorithm behaves, to
    identify what that might do to the results. You might change how many times you
    pass the training data through, or how significant a wrong prediction at any given
    point is considered and how much that should impact the change of parameters.
    Once more, we need to accept that this is a process of experimentation and you
    need to constantly be reassessing how much more effort it is worth investing in
    the overall process.


    #### Predicting


    Finally, with a working model now discovered through machine learning, we are
    ready to deploy it and do prediction on completely new data. There are two types
    of prediction that machine learning models tend to do. On the one hand, you have
    classification tasks, such as what we would need in order to classify our documents.
    The input document would be assigned a category based on what the model believes
    the document is discussing. On the other hand, you have what are termed regression
    tasks. A typical regression task is to predict the value of a specific item given
    some input characteristics, such as to predict the value of a house given its
    location, size, configuration, what other features it has, and so on.


    ### Unsupervised Learning


    What happens if you don’t have any labels for your data? Well, to start with there
    are some things that you will simply not be able to teach an algorithm. You can’t
    teach something what a cat is without actually showing it a cat. Having said that,
    there is a lot that algorithms can do to uncover potential correlations or groupings
    in our data that can teach us something.


    Unsupervised learning analyzes data to uncover possible groupings or associations,
    without the need of any annotated data.


    A typical application is to use it to segment or cluster datasets in closely related
    groups. Unsupervised learning can, for example, be applied to customer purchase
    data to identify if your customer base can be split into groups that can provide
    you with some insight about that group. Something along the lines of “customers
    who purchase product A tend to purchase product C as well” or “customers who purchase
    product D all tend to come from a specific geographical area.”


    Unsupervised learning is also, at times, used in combination with supervised learning.
    Under appropriate conditions, a model can be generated using training data that
    is a mixture of both labeled and unlabeled data. Simplistically, you can consider
    unsupervised learning to be doing some of the potential classification for us
    and that is then mixed with supervised learning. Although, in general, this should
    be considered a relatively risky and unreliable strategy, there is a promising
    growing body of research about it. In the coming years unsupervised learning will
    start playing an increasingly more important role, as machine learning engineers
    are constantly faced with the problem of having a lot of data in general but not
    enough labeled data.'
