    In Chapter [6](#472369_1_En_6_Chapter.xhtml) we take a brief look at what we mean
    by the “digital workplace.” This helps define the space we will be looking at
    when thinking of applications of AI in the workplace and strategies of how to
    transform that workplace.


    In Chapter [7](#472369_1_En_7_Chapter.xhtml) we consider interface paradigms.
    The way we interact with digital machines is changing as digital machines are
    able to support richer and more natural interactions. Whether we are dealing with
    augmented reality; virtual reality; voice; or plainly but perhaps most effectively,
    text AI, plays a key role. Understanding how the rise of AI and the emergence
    of a new set of paradigms are interlinked is crucial in helping you understand
    how it may impact your workplace and why conversational collaboration platforms
    accelerate the adoption of AI.


    In Chapters [8](#472369_1_En_8_Chapter.xhtml) and [9](#472369_1_En_9_Chapter.xhtml)
    we take a deep dive into conversational collaboration platforms, their components,
    the considerations that come into play, and what it means to build chatbots, or
    better still, conversational applications. We examine how applications such as
    Slack, Microsoft Teams, and Facebook Workplace are not only changing how teams
    work, but also how automation and intelligent services can be introduced in the
    workplace. We outline a few different ways of thinking about conversational applications
    and provide an overall conceptual framework that ties it all together.


    ## Building Your AI-Powered Workplace


    The goal of the last three chapters is to provide us with some practical and directly
    actionable ways to approach the strategic development of our AI-powered workplace.


    In Chapter [10](#472369_1_En_10_Chapter.xhtml) we discuss data, what role it plays,
    how various challenges around it can be approached, and through a practical example
    give some directions of how you can develop your own data strategy. We eschew
    consultancy-speak, with lofty visions and fancy terms focusing instead on pragmatic
    steps you can take.


    In a similar fashion, Chapter [11](#472369_1_En_11_Chapter.xhtml) looks at useful
    elements to consider when devising a wider strategy for AI applications. Once
    more, the objective is to provide actionable insights that recognize that each
    organization needs to develop their own strategy, specific to their own context.
    As such we look at overarching principles and a set of methods that I have seen
    work successfully in the past.


    Finally, in Chapter [12](#472369_1_En_12_Chapter.xhtml) we look at the ethical
    considerations of building AI applications. We start by explaining why these issues
    need to be considered specifically and explicitly within the context of AI-powered
    applications and then consider overall guidelines to get us started on the process.
    These are crucial issues, and it is down to our individual and collective responsibility
    to ensure that we critically consider them as we introduce increasing levels of
    automation and autonomy in our teams.


    In all, I hope this is going to be an interesting journey for everyone. If you
    have never dealt with AI subjects before, this should give you a solid primer
    and a way to start taking practical actions while researching further. If you
    have some experience, this book could help round out some specific subjects and
    give you a couple of different perspectives on how to consider AI tools in the
    context of conversational platforms, as well as how to go about defining an approach
    that you can apply in your own organization.


    Acknowledgments


    Huge thanks to Shiva for getting in touch with the idea of writing a book. Quite
    simply this would not have happened if she did not kick-start the process. Rita
    Fernando and Shivangi Ramachandran from Apress have been a huge help throughout
    the entire process, gently nudging along and encouraging where required or equally
    gently but more directly telling me to “get it done” where that was required!
    Thanks to both of you for your patience and enthusiasm throughout.


    I got involved with AI because of Prof. Michael Luck. A little over 20 years ago
    I walked into his office at Warwick University to meet the lecturer who would
    be my tutor. From that first day, through supervision of my PhD degree, to research
    work afterward, and then on to a long friendship, he has always given me invaluable
    advice, support, and help.


    Tim Deeson, my cofounder at GreenShoot Labs, is the person to whom a lot of the
    ideas in this book should be attributed. It is through countless discussions with
    him about conversational applications and AI and the challenges of introducing
    new ideas in organizations that the concepts got their current shape and form.
    Thanks for the trust he showed in me from the start.


    Ultimately, however, none of this would have been possible for me without the
    unquestioning support, enthusiasm, and love of my wife Katia and the love and
    joy that our children, Sofia and Leo, bring to us daily. Thanks to the three of
    you for your patience while I locked myself away and wrote, and your support as
    I went through the ups and downs of this process.


    ### About the Author


    # Part IUnderstanding AI'
  trans: '

    # 人工智能在工作场所的应用


    在第 6 章中，我们将简要探讨“数字化工作场所”的含义。这有助于界定我们在思考人工智能在工作场所的应用以及如何转型工作场所的策略时，所关注的领域。


    在第 7 章中，我们探讨交互范式。随着数字机器能够支持更丰富、更自然的交互，我们与数字机器的交互方式正在发生变化。无论是增强现实、虚拟现实、语音，还是简单但或许最有效的文本，人工智能都扮演着关键角色。理解人工智能的崛起与新范式的出现如何相互关联，对于帮助你理解它可能如何影响你的工作场所，以及为什么对话式协作平台能加速人工智能的采用至关重要。


    在第 8 章和第 9 章中，我们深入探讨对话式协作平台、其组成部分、需要考虑的因素，以及构建聊天机器人（或者更准确地说，构建对话式应用）的意义。我们研究了诸如`Slack`、`Microsoft
    Teams`和`Facebook Workplace`等应用如何不仅改变团队的工作方式，还改变了自动化和智能服务在工作场所的引入方式。我们概述了几种思考对话式应用的不同方式，并提供了一个将这一切联系起来的总体概念框架。


    # 构建你的人工智能驱动工作场所


    最后三章的目标是提供一些实用且可直接操作的方法，来帮助我们战略性地发展人工智能驱动的工作场所。


    在第 10 章中，我们讨论数据、数据的作用、如何应对围绕数据的各种挑战，并通过一个实际示例，为你制定自己的数据策略提供一些方向。我们摒弃咨询行业那种充满宏大愿景和花哨术语的套话，而是专注于你可以采取的务实步骤。


    类似地，第 11 章探讨了在为人工智能应用制定更广泛策略时需要考虑的有用要素。同样，目标是提供可操作的见解，并认识到每个组织都需要根据自身具体情况制定自己的策略。因此，我们着眼于总体原则和一套我过去曾见证过成功实践的方法。


    最后，在第 12 章中，我们探讨了构建人工智能应用时的伦理考量。我们首先解释为什么需要在人工智能驱动的应用背景下，具体且明确地考虑这些问题，然后考虑总体指导原则，以帮助我们开启这一过程。这些都是至关重要的问题，随着我们在团队中引入更高水平的自动化和自主性，确保我们批判性地思考这些问题，是我们个人和集体的责任。


    总而言之，我希望这对每个人来说都是一次有趣的旅程。如果你以前从未接触过人工智能主题，这本书应该能为你提供一个扎实的入门基础，并让你在进一步研究的同时，开始采取实际行动。如果你有一定经验，这本书可以帮助你深入了解某些特定主题，并为你提供一些不同的视角，让你了解如何在对话式平台的背景下考虑人工智能工具，以及如何定义一种可以在自己组织中应用的方法。


    # 致谢


    衷心感谢 Shiva 提出写一本书的想法。如果没有她启动这个过程，这本书根本不可能问世。Apress 出版社的 Rita Fernando 和 Shivangi
    Ramachandran 在整个过程中提供了巨大帮助，她们在需要时温和地推动和鼓励，或者在必要时同样温和但更直接地告诉我“把它搞定”！感谢你们两位在整个过程中的耐心和热情。


    我之所以涉足人工智能领域，是因为 Michael Luck 教授。大约 20 多年前，我走进他在华威大学的办公室，见到了这位将成为我导师的讲师。从第一天起，到指导我的博士学业，再到之后的研究工作，直至我们建立长久的友谊，他一直给予我宝贵的建议、支持和帮助。


    Tim Deeson，我在 GreenShoot Labs 的联合创始人，这本书中的许多想法都应归功于他。正是通过与他无数次关于对话式应用、人工智能以及在组织中引入新思想所面临挑战的讨论，这些概念才得以形成现在的形态。感谢他从一开始就给予我的信任。


    然而，归根结底，如果没有我妻子 Katia 毫无保留的支持、热情和爱，以及我们的孩子 Sofia 和 Leo 每天带给我们的爱与欢乐，这一切对我来说都是不可能的。感谢你们三位的耐心，在我把自己关起来写作时，以及在我经历这个过程的起起伏伏时，你们给予我的支持。


    ## 关于作者


    # 第一部分：理解人工智能

    '
- fmt: '# The Search for Thinking Machines


    The wish to construct machines that can perform tasks just like us or better than
    us is as old as our ability to reason about the world and question how things
    work.


    In the *Iliad*, when Thetis goes to ask Hephaestus for replacement armor for her
    son Achilles, Homer describes Hephaestus’s lab as a veritable den of robotics.
    There are machines on tripods whose task is to attend meetings of the gods (yes,
    even the gods hated going to meetings themselves), robotic voice-controlled assembly
    lines, and robots made out of gold to help their master.


    > *They were made of gold but looked like real girls and could not only speak
    and use their limbs but were also endowed with intelligence and had learned their
    skills from the immortal gods. While they scurried around to support their lord,
    Hephaestus moved unsteadily to where Thetis was seated.*^([¹](#fn1))


    Building robots was the job of gods. They breathed life into machines. Homer was
    telling us that the ability to create thinking machines could bestow on us god-like
    status.


    The challenge we had back then, and still have, is understanding exactly how we
    might go about building such machines. While we could imagine their existence,
    we didn’t have the tools or methods that would allow us to chart a path to an
    actual machine. It is no wonder that very often when solutions were imagined,
    they included secret potions and alchemy that would magically breathe life into
    Frankenstein-like figures not entirely under our control.


    Step by step, though, we have put some of the pieces of the puzzle together. At
    the mechanical level, humans managed to build very convincing automatons. Through
    clever tricks, the creators of these automatons even fooled people into believing
    they were magically endowed with intelligent thought. From the ancient Greeks
    to the Han dynasty in China, the water-operated automatons of al-Jazarī in Mesopotamia,
    and Leonardo da Vinci’s knight, we have always tried to figure out how to get
    mechanical objects to move like real-life objects while tricking the observer
    into thinking there is an intelligent force within them causing action.


    From a reasoning perspective, we went from the beginnings of formal reasoning,
    such as Aristotle’s syllogisms, to understanding how we can describe complex processes
    through algorithms (the work of al-Khwārizmī around 820 A.D.), through to Boole’s
    *The Laws of Thought*, which gave us formal mathematical rigor.


    Nevertheless, we were still woefully ill-equipped to create complex systems. While
    lay people could be fooled through smoke and mirrors, the practitioners of the
    field knew that their systems where nowhere near close to the level of complexity
    of human (or any form of natural) intelligence.


    As advances marched on and we got to the 19th century, the field of computer science
    started taking shape. With Charles Babbage’s Analytical Engine and Ada Lovelace’s
    work on programming, the outlines of a path from imagination to realization started
    emerging. Ada Lovelace speculated that the Analytical Engine, with her programming,
    “might compose elaborate and scientific pieces of music of any degree of complexity
    or extent.”


    By the end of the Second World War, we had progress in computing that was the
    result of efforts to build large code-breaking machines for the war, and the theoretical
    advances made by Alan Turing. A few years later (1950), Alan Turing even provided
    us with a test to apply to machines that claim to be able to think. The test calls
    for a human being to hold a conversation with a machine while a third observer
    is able to follow the conversation (by seeing what was said printed out). If the
    third observer cannot distinguish between the human and the machine, the machine
    passes the test.^([²](#fn2))


    The path toward artificial intelligence was getting increasingly clearer.


    ## The Birth of a New Field of Study


    On August 31, 1955 a group of researchers in the United States produced a brief
    document^([³](#fn3)) asking for funding for a summer research project. The opening
    paragraph is a testament to the unbounded optimism of humans and a lesson in what
    the phrase “hindsight is everything” means.


    Here it is:


    > *We propose that a 2 month, 10 man study of artificial intelligence be carried
    out during the summer of 1956 at Dartmouth College in Hanover, New Hampshire.
    The study is to proceed on the basis of the conjecture that every aspect of learning
    or any other feature of intelligence can in principle be so precisely described
    that a machine can be made to simulate it. An attempt will be made to find how
    to make machines use language, form abstractions and concepts, solve kinds of
    problems now reserved for humans, and improve themselves. We think that a significant
    advance can be made in one or more of these problems if a carefully selected group
    of scientists work on it together for a summer.*


    The most striking phrase, to a 21st century reader, is the very last one. It claims
    that a significant advance can be made after just a single summer of work. Keep
    in mind that this was with 1956 computing technology. The first integrated transistor
    was 4 years away. Computers occupied entire rooms and logic modules used vacuum
    tubes.


    Now, to be fair, the group of scientists in question was exceptional. The proposal
    was co-signed by four very influential computer scientists. Claude Shannon, the
    father of information theory; Marvin Minsky, one of the first to build a randomly
    wired neural network; Nathaniel Rochester, the lead designer of the IBM 701, the
    first general-purpose, mass produced computer; and John McCarthy, widely credited
    with coining the term “artificial intelligence” and the creator of the Lisp programming
    language. If any group of people stood a chance of making a significant breakthrough
    in 1956, this was certainly it.


    This meeting in Dartmouth is generally credited as the first conference on AI.
    It shaped academic thought around the range of issues to be dealt with in order
    to create machines that exhibit intelligence. It also produced a lot of excitement
    and *buzz* and led to several years of funding for AI, largely based on the trust
    people had in people like Minsky to pull the proverbial rabbit out of the hat.


    Those *golden* (in an almost literal sense) years laid the foundations of the
    field of AI. From 1955 to the early 1970s, a whole range of subfields was created,
    and problems and their challenges stated. From different ways to reason to a start
    at natural language understanding, the first neural networks, and so much more,
    the field was booming.


    As ever, however, buzz and excitement, unaccompanied by the results that people
    expected or predicted, led to what was known as the first AI winter. People, initially
    bedazzled by hyperbolic claims, were eventually disillusioned with AI and lost
    hope in its ability to produce results. AI was sidelined, funding was reduced,
    and focus turned to other issues.


    It’s important to note that research in AI did not stop over this period. It may
    have been less visible to the public eye, and overall resources were reduced,
    but interest remained. Research grants used the term “AI” less often, but they
    were still trying to solve the same problems.'
