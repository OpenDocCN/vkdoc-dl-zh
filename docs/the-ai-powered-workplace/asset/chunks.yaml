  trans: '

    #### 可解释的数据


    最后，即使所有数据都触手可及，通常只需点击几下或输入几个词就能获取，但作为人类，我们并不擅长在脑海中处理复杂且相互关联的数据。我们尤其不擅长查看不同的报告，并有效地找出它们之间的联系。


    对话式应用可以发挥变革性的作用，作为一种更有帮助的界面，我们不仅可以通过它检索数据，还能对数据进行质询。与其必须分析图表来了解情况，或许我们只需提问：


    “今天发生了什么异常情况？”


    然后我们可以接着问：


    “这种情况以前发生过吗？”


    我们不必记住如何关联数据和制作图表，而是可以问：


    “你能将这些数据与去年同期进行比较吗？”


    那些现在投资于提供人性化解释工具的组织，正在为未来构建基础设施，并为自己奠定显著的竞争优势。利用自然语言生成技术围绕数据提供叙述，使用户无需解读复杂的图表和相关数字，这可以使整个组织内的信息获取变得更加民主化。


    为了实现这些丰富的叙述，有必要以一致、连贯且低成本的方式整合数据源，并捕获影响数据结果的活动。在讨论 AI 策略的第 11 章中，我们将深入探讨开发类似上述解决方案所需的条件。此时，对您来说，进行一次思维练习可能会很有帮助。要在您自己的组织内将所有必要的信息集中在一个地方，需要做些什么？如果您能针对数据集（从营销数据到财务数据以及您需要衡量的任何其他数据）构建清晰的叙述，那么与需要费力挖掘信息相比，这能节省多少时间？


    ### 支持与协作


    正如我们已经讨论过的，与对话式协作平台的集成可以让我们直接通过该平台完成活动，从而省去切换上下文的麻烦。一个简单但极其有效的例子是 Google Drive
    与 Slack 的集成。当用户请求访问某个文档时，集成功能会通过一个专用机器人发送通知。在同一通知中，它允许您选择要授予的访问级别并批准请求。以前，这个操作涉及在一堆电子邮件中查找通知（前提是您及时查看了邮件），然后访问文档以授予访问权限。在大多数情况下，请求者必须明确发送消息，因为他们时间紧迫，急需信息。


    从自动化的角度来看，我们的挑战是确定如何支持更多的活动，并简化和自动化这些活动中的特定环节。我们将看三个不同的例子，以了解可能的自动化程度。


    #### 自动化服务台


    在面向消费者的业务中，对话式 AI 最广泛地用于服务台支持自动化。这里有一个明确的需求：人们希望在任何时候都能尽快获得支持。同时，投资回报也很明确：降低了支持中心成本，并提高了服务用户数量的能力。


    同样的原则可以应用于组织内各个层级的内部支持：从 IT 问题——“我们支持哪些浏览器？”、“Wi-Fi 密码是什么？”——到人力资源问题——“我们关于病假的政策是什么？”、“我遇到同事问题该联系谁？”等等。部署一个作为内部支持第一联系点的对话式应用，意味着各个团队可以减少直接向他们提出的问题，从而专注于更复杂的案例。


    #### 捕获决策与完成任务


    我们进行对话是为了探索问题、分享信息、做出决策，然后规划如何完成工作。对话式应用以及我们的对话平台与项目管理工具（`Trello`、`Jira`、`Asana`、内部解决方案等）之间的深度集成，意味着我们可以将这些信息直接输入到管理任务的工具中，反之亦然。


    这可以简单到能够右键单击消息并将其转换为任务（Slack 已经支持此功能），也可以是一个更复杂的过程，其中对话式应用主动介入，创建讨论摘要，识别关键决策点，并捕获任务。


    #### 捕获与分享流程知识


    能够捕获单个任务并监控其进展是非常有益的。从组织的角度来看，更有价值的是能够捕获、分享并帮助执行多步骤的流程知识。任何组织都必然拥有一些流程，或者简单地说，“完成事情的方法”。能够创建和管理这些流程，即使只是像清单这样简单的东西，也具有很大的价值。^(⁴⁹)


    对话式应用在帮助我们捕获流程、随时间管理流程以及更广泛地分享流程方面，可以非常有效。想象一个场景：一位新同事第一次需要组织与客户的会议，他能够通过简单的请求“我如何组织与客户的会议？”调出一份清单。然后，这位同事不仅获得了必要的信息（如何预订房间、告诉前台什么、如何订餐和咖啡），还会有一个自动化的*助手*与他一起联系相关人员（前台、房间预订、安保等）、发送提醒等等。

    '
- fmt: '# Organizational Collaboration Operations


    Conversational applications are the means through which we can connect to the
    rest of the world and extend our conversational collaboration platform with functionality
    that is specific to our needs. In this chapter we’ve discussed the range of issues
    to consider, as well as given examples of the types of application one could develop.


    Something that each organization should now start considering more deeply is what
    processes they will put in place in order to constantly be thinking about how
    they can improve and extend their digital environment. Organizations that fail
    to do so will be less efficient and effective, and far more likely to lose their
    competitive advantage as a result.


    It is quite easy to run a few pilots within any company that demonstrate how value
    could be created. It is much harder to do this in a consistent manner over time.
    There are at least two avenues to follow to tackle this challenge.


    First, it is about creating a culture that supports constant introspection into
    how things are done and enables people to take issues into their own hands in
    order to improve the way they work. This is a bottom-up approach that is a crucial
    precondition to anything else. People have to be open and welcoming to change,
    and they have to be able to instigate change.


    Second, the organization as a whole needs to ensure that it invests the necessary
    time and financial resources to provide people the space to implement change.


    Inspiration can be drawn from the technical space, where investing in development
    operations (`DevOps`) is now a well-established practice. `DevOps` describes the
    processes that support development teams in creating code and releasing new features.
    It focuses on providing as smooth an experience as possible, since it recognizes
    that that will lead to better outcomes. Organizations need collaboration ops that
    focus on ensuring that people have the best possible experience when collaborating
    with each other. Investing in conversational collaboration platforms and conversational
    applications can be a significant aspect of that effort.


