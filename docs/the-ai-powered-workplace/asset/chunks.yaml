    what happened to the travel documents (lost, damaged, stolen, etc.). However,
    when it came to understanding what the appropriate response should be for each
    type of problem, they realized that it was always the same. No matter what caused
    the issue, the way to deal with it always consisted of filling out the same form
    or getting in touch via phone for urgent cases. All the up-front effort in recognizing
    the cause of the problem was not required. This was a problem that could be resolved
    with improved information architecture on the web site, and did not require the
    use of any AI technology.


    ### There Is No “True” AI Test to Pass


    Similar to the previous principle, this one is a result of another common pitfall.
    When people embark on AI projects, one of the main concerns is to do something
    that is “real” AI. In many ways, it’s only natural to have this concern. We are
    dealing with new technologies with definitions that are incredibly fluid. People
    feel they need to ensure they are doing the “right thing” in the face of a lot
    of conflicting information. Whether hiring or looking outside for help, organizations
    want to ensure that they are not “cheated” with “fake” AI.


    The result often is that solutions to problems are overengineered, or perfectly
    suitable solutions are discarded because they don’t meet some unclear “AI” test.
    When dealing with virtual assistants, this often involves discussions around what
    is a sophisticated enough conversation that *feels* human-like. Simple, to-the-point
    conversations are replaced with open-ended conversations that would mimic natural
    language more in order to meet this human-like standard. With prediction algorithms
    and machine learning it is often about discarding advice that calls for the use
    of standard and well-established techniques from statistics in favor of techniques
    that involve the direct use of deep learning because deep learning *feels* like
    truer AI.


    The challenge with these issues is that they are hard to deal with. The end solution
    works. A problem has been solved. But it is a much more brittle solution because
    more AI technology was imposed than what was really required. Everyone feels excited
    because it feels more futuristic but, in reality, they are only setting themselves
    up for more pain as the solution evolves.


    A comprehensive AI strategy needs to include checkpoints where an honest discussion
    is had about whether the solution is the best one for the problem at hand, or
    whether it is simply a solution that satisfies the need to demonstrate the use
    of AI as opposed to reaping the true benefits of the technology.'
  trans: '

    ### 适度扩展


    我们当然希望快速扩展。自动化决策的一大吸引力在于，它能让组织运转得更快。


    然而，恰恰是因为自动化能够快速扩展的特性，以及自动化本身的性质，我们才需要对扩展的速度保持谨慎。在这种情况下，自动化依赖于利用过往数据和知识，来编码工作场所中某个特定方面的运作规则。最终生成的软件程序，其优劣程度完全取决于我们对自身问题的理解以及所使用的数据。在将用户从一千扩展到一万，或者从一个地区扩展到另一个地区之前，我们需要确保其底层假设保持不变。如果急于将自动化模型扩展到测试环境之外，却没有设置检查机制来确保其按预期运行，就可能导致意想不到的后果，例如在决策中表现出偏见，或引入难以察觉的错误。


    ### 切实成果至关重要


    人工智能战略，如同任何其他计划一样，需要考虑其发展的更广泛环境。太多时候，任何新事物都会被隔离起来，放进创新实验室里研究和试验，但在现实业务中却难以见到天日。像人工智能这样的技术尤其如此。


    创新实验室本身并非坏主意。有能力组建专门团队进行试验的组织是幸运的，他们应该充分利用这些可能性。然而，创新的经验教训需要接受现实情况的严酷考验。除非你处理了问题的全部现实，否则你并没有解决整个问题。这就好比你说想造一辆火星车去探索火星，却只在自家附近的道路上测试它。


    一项人工智能战略，如果没有规划好技术如何从创新团队的“茧房”走向实际业务，就不是一个完整的战略。这包括说服那些背负日常运营优先事项、压力重重的业务部门采纳新技术；包括确保解决方案能带来可衡量的收益，从而对部门的预算产生实质性影响；还包括处理员工对于被自动化取代的担忧，并制定培训计划来应对工作方式的变革。如果这些要素都不具备，你就无法真正衡量这项努力的成败。


    ### 人工智能战略无关人工智能


    这个标题是故意反直觉的。


    人工智能战略并非要不惜一切代价使用人工智能。我见过太多公司迷失在“无论如何都要让 AI 发挥作用”的尝试中，以至于我觉得这一点必须从一开始就讲清楚。


    正如我们在本书中反复强调的，人工智能有助于我们将决策权委托给机器。同时，正如本章引言所述，人工智能帮助我们满足用户的需求和期望。然而，人工智能本身并不是目的。目标从来都不应该是，也绝不应该仅仅是“使用人工智能”。人工智能战略的目标是创造必要的先决条件和流程，使组织能够：


    1.  确定人工智能技术是否适用，以及能否帮助以更好的方式解决问题。

    2.  确保组织在人工智能技术适用的情况下，有能力抓住机遇。


    如果流程的最终结果是，使用人工智能技术来解决某个特定问题根本不是一个好主意，那也完全没问题。


    这正是某个对话式人工智能项目中所发生的情况。该组织希望实施一个聊天机器人，来处理那些在国外遇到旅行证件问题的客户的咨询。他们投入精力思考，应该采用什么样的语言理解方案来识别旅行证件发生了什么（丢失、损坏、被盗等）。然而，当需要理解针对每种问题类型应该给出什么恰当回应时，他们意识到回应总是相同的。无论问题原因是什么，处理方式始终是填写同一张表格，或者在紧急情况下通过电话联系。所有前期用于识别问题原因的努力都是不必要的。这是一个可以通过改进网站信息架构来解决的问题，根本不需要使用任何人工智能技术。


    ### 不存在需要通过的“真正”人工智能测试


    与上一条原则类似，这条原则也是源于另一个常见的陷阱。当人们开始人工智能项目时，主要担忧之一就是要做一些“真正”的人工智能。从很多方面来看，有这种担忧是很自然的。我们正在处理定义极其模糊的新技术。人们觉得，面对大量相互矛盾的信息，他们需要确保自己是在做“正确的事情”。无论是招聘还是寻求外部帮助，组织都希望确保自己不会被“假”人工智能“欺骗”。


    结果往往是，问题的解决方案被过度设计，或者完全合适的解决方案被弃用，因为它们没有通过某个模糊的“人工智能”测试。在处理虚拟助手时，这通常涉及讨论什么样的对话才算足够复杂，*感觉*像人类。简单、直击要点的对话被开放式对话所取代，后者为了达到这种类人标准而模仿更自然的语言。对于预测算法和机器学习，则常常是抛弃那些建议使用标准、成熟的统计学技术的建议，转而采用直接使用深度学习的技术，因为深度学习*感觉*更像是真正的人工智能。


    这些问题的挑战在于它们难以处理。最终的解决方案是有效的。问题得到了解决。但这是一个脆弱得多的解决方案，因为强加了比实际需求更多的人工智能技术。每个人都感到兴奋，因为它感觉更未来化，但实际上，随着解决方案的演进，他们只会给自己带来更多麻烦。


    一个全面的人工智能战略需要包含一些检查点，在这些节点上，要诚实地讨论：该解决方案是否是解决当前问题的最佳方案，或者它是否仅仅是为了满足展示人工智能应用的需求，而不是为了真正收获这项技术的益处。

