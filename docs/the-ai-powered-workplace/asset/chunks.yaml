    # 规划对话式应用


    从不同维度考量对话式应用，能帮助我们界定问题范围。由此，我们才能更准确地判断需要哪些方法和工具来解决问题。接下来，我们将探讨五个不同维度及其对应用可能产生的影响。


    ## 能力范围


    首先要考虑的是对话式应用需要实现什么功能。在能力范围的一端，是专注于单一任务的应用。例如，一个仅用于审批或拒绝休假申请的机器人。而在另一端，则是更像 Siri
    那样的通用型助手。


    专用机器人可以缩小可能的交互范围，从而提供更稳健的行为。由于可能性有限，它们能持续引导用户达成预期结果。相比之下，通用型助手仅是在理解用户试图完成的具体活动时就面临挑战（就像我们可能都经历过的那样：想用
    Siri 或 Google Assistant 播放一首歌，结果它却以为我们要打电话给某个联系人）。当你发现提供单一入口能带来更多好处时，智能助手的方法就颇具吸引力——这也正是大型科技公司如此青睐它们的原因。


    以 Alexa 为例，你可以看到它的混合模式。关键词 "Alexa" 唤醒通用助手，然后根据用户所说的话，激活特定的 *技能*。然而，一旦进入某个技能，你就在与一个单一的机器人交互，这个机器人可能来自在
    Alexa 生态系统中发布其 *技能* 的提供商——就像应用开发者在 Google Play 商店或 iOS 商店发布应用一样。


    ## 交互风格


    正如我们之前讨论的，对话式应用的交互风格可能非常重要。我们是否要支持完全开放式的交互？目的是什么？这能帮助用户完成特定任务吗？如果用户试图描述一个复杂问题，允许他们以开放式方式描述问题会非常强大。这正是对话式应用区别于那些被美化的交互式语音应答系统（IVR）的地方。人人都讨厌
    IVR，因为它们只是强迫我们在无尽的选项树中导航。然而，当我们的应用需要特定答案，而用户实际上并没有太多选择时，假装他们可以进行开放式交互也同样令人厌烦。如果用户唯一能说的是"是"或"否"，那么让他们觉得可能的交互更开放是毫无意义的。


    ## 处理复杂问题描述


    我们在 GreenShoot Labs 开发的一个对话式应用，其任务是帮助网络犯罪受害者从攻击中恢复。这个聊天机器人的目标是尝试理解用户经历了哪种类型的攻击，如果成功识别，则提供适当的补救措施。该对话式应用的初始设计围绕复杂的对话流程展开，我们向用户提出一系列不同的问题，试图收集识别攻击所需的所有信息片段。所有这些方法都让交互对用户来说过于复杂。最终，我们决定让他们做最简单的事："向我们描述发生了什么。"


    这样，用户可以像对任何人讲述一样叙述他们的故事，然后应用利用自然语言处理和网络攻击信息知识图谱来识别攻击。如果攻击类型不明确，它还可以向用户提出澄清性问题。这样一来，繁重的工作就不会通过让用户回答大量不同问题而转嫁给他们。相反，是机器需要提升自身能力，处理更复杂的文本描述。


    与应用的其他交互（引导用户找到处理攻击的适当指南并收集反馈）都是结构化的。通过在需要的地方结合开放式交互，并结构化其余对话，我们能够在应用中保持一条清晰的路径，并确保用户始终清楚自己处于流程的哪个阶段。


    ## 上下文


    上下文对于自动化至关重要。从用户体验的角度来看，如果人们觉得应用"不理解"他们，他们会很快放弃。这里的"理解"涉及建立那些依赖于上下文信息的联系，并减少我们必须显式输入到应用中的信息量。


    想象一下，使用一个共享汽车应用，你不能简单地输入目的地；你还需要说明你当前在哪里；而且你无法知道司机是否在路上。支付也不会自动进行。是的，我意识到这正是过去出租车的工作方式！我们喜欢现代共享汽车应用的所有功能，都是因为该应用利用上下文信息使任务对我们来说更简单。


    如果仅仅因为应用无法访问那些被认为唾手可得的信息（例如日历空闲情况），就让用户费尽周折，那么他们理所当然不会看到使用对话式应用的好处。


    在谈论新产品时，尤其是在初创公司的背景下，我们经常谈论 *最小可行产品*。产品需要具备哪些最小功能集才能为用户提供价值？当你处理流程自动化时，你可以将这个概念转化为
    *最小可行自动化流程*。你自动化了流程的多少部分？这能为用户提供真正的价值吗？


    例如，考虑一个旨在帮助用户找到共同会议时间的对话式应用。该应用在用户之间来回沟通以找到那个时间方面做得很好，但它没有与日历集成到可以实际创建会议的程度。应用发布了，令你失望的是，经过最初的一些使用后，你发现人们停止了与它的交互。进一步调查后，你意识到日历应用提供了一个功能较弱但仍然有用的方式来比较每个人的日历并找到合适的会议时间。由于人们无论如何都必须打开日历应用来插入会议，他们更倾向于在那里完成所有操作。


    因此，考虑应用需要"知道"或"做"什么，以便它能够真正解决问题并提供价值，这一点至关重要。思考最小可行自动化流程以及你的应用为实现这一目标所需的上下文信息，可以避免后续出现严重的延误和失望。

    '
- fmt: '### Platforms


    What conversational platforms will the conversational application need to operate
    on? Will it be just a single platform (e.g., just `Slack`), or do you require
    an application that is made available in multiple platforms that might potentially
    span voice, `SMS`, `Slack`, etc.?


    You may need multiplatform support to reach more users or because you are bridging
    a gap between users on different platforms. For example, messages sent via `SMS`
    from customers can be piped into `Slack` for support workers to deal with and
    then sent back via `SMS` to the user. Teams that are mobile might be best served
    by a different application than teams that are in the office.


    If you are considering an experience that will need to span or integrate platforms,
    you will need to consider how well conversations can translate across platforms.
    If parts of your team are on `Slack` but a new team that was merged in is still
    on `Skype for Business`, what will a single solution for both look like? Each
    platform enables different types of interactions, and it is up to the designer
    to find that minimum common denominator that is applicable across both.


    ### Analytics and Improvement


    No conversational application will get it right on the first day of launch. While
    analytics and ongoing improvement are strategically important for any application,
    they are particularly important when it comes to conversational applications.


    There are two dimensions to consider here. First, are the types of “improvements”
    and “learning” the application might be doing automatically as it interacts with
    users. Are you confident that the behavior cannot be derailed and that there are
    checks and balances to allow real-time improvement to happen? Second, if you are
    planning to do offline review and further training (which is the case for most
    conversational applications), have you made sure your team will have the time
    and resources to do this?


    I’ve seen successful deployments of chatbots forced to stop because there wasn’t
    the capability to maintain and monitor the interactions with them. Delegating
    decision-making to machines can free up resources, but it is best considered as
    an enhancement to the current team that allows it to scale as they move toward
    focusing on the harder cases *and* in maintaining the automated software.


    ## Where to Use Conversational Applications


    Now, let us start connecting everything that we’ve discussed so far by reviewing
    some examples of conversational applications and the implications of introducing
    such applications into your own conversational platforms. These examples illustrate
    both what people are already doing today and how that can be enhanced via further
    automation. These examples are a way to get you thinking about what you could
    develop and apply in your organization.


    Just a note of caution: as we review interesting and fun features, keep in mind
    that we should not be enamored by the technological capabilities. At every step
    of the way the hardest question is not if something is possible. The hardest question
    is if something possible is worth doing. The most important thing to identify
    is what feature would bring most value to your users.


    We will look at examples across three broad areas that conversational platforms
    are well suited to tackle.


    *   Notifications

    *   Monitoring of key data

    *   Support and collaboration


    ### Intelligent Notifications


    Yes, notifications are very likely the least favorite thing for any knowledge
    worker. There are too many of them, and I have yet to sit in a meeting where someone
    said they would like to receive more. Nevertheless, notifications are still necessary.
    Our challenge is, sadly, not to eliminate them but to determine how we can marshal
    notifications so that we get the most amount of useful information in the least
    distracting way possible.


    The first part of a solution is setting up notifications in a way that we can
    more effectively control them. This can be achieved by fine-tuning what applications
    have the right to distract us and by making it easy to tweak settings to fit both
    our individual and team needs. The second part is to increasingly delegate the
    decision-making about whether a notification is useful or not (and when it is
    most useful) to software, so that it helps us be more efficient.


    The first part of the challenge is something that conversational collaboration
    platforms can definitely help with. They are likely the first app we log in to
    in the morning, as well as the app that we can carry on all different work devices,
    mobile and not. True to their role as an organizational operating system, they
    can become the conduit through which all notifications get to us.


    In addition, these environments provide us with tools to manage notifications
    in a variety of ways. One can set hours of the day where they should not be disturbed
    at all, as well as specific rules on a per-channel basis or based on keywords.


    The second part of the challenge is the essence of this book: the use of AI techniques
    to delegate decision-making to software. In this case the decision-making we want
    to delegate is when and how we should be notified about something. In addition,
    it is worth exploring what else might be useful to have a conversational application
    provide in the context of notifications. One of the limitations of notifications
    is that it is hard to “action them.” We get told something but we are not provided
    with the tools to do something about it right there and then. With customized
    notifications, we can integrate the functionality that we need to perform actions
    as well.


    #### Basic Notifications


    The example we will use throughout this section is based on the `Slack` integration
    with `Google Calendar`. At the time of this writing it provided some key notification
    capabilities out of the box that already proved the value of basic notifications
    through conversational collaboration platforms.


    The first thing a conversational application can do is notify you and allow you
    to take action directly from within the conversational environment. Through the
    `Slack`/`Google Calendar` integration, if a colleague creates a new meeting you
    will be notified and can choose to accept or reject the meeting through the notification.
    As meetings are about to start you can also be notified in `Slack`, and any relevant
    information, such as link to join an online video call, is provided in that same
    context.


    Furthermore, since your conversational collaboration platform is where you also
    provide presence and overall status information for colleagues, the calendar integration
    edits your status and, as such, indirectly notifies others about whether you are
    in a meeting or not. This means colleagues can quickly see what you are up to,
    which can help them decide whether to send you a message or delay it, or whether
    it’s worth getting up and walking over to your desk or not.


    Finally, the integration also sends a daily summary at the start of the day with
    all the events of the day. This means you can stop other applications and e-mail
    notifications doing the same.


    These capabilities are basic and don’t involve much beyond usefully taking advantage
    of the environment and exposing the required functionality. Nevertheless, it is
    a fantastic starting point from which to go on to build more self-direction into
    the system.'
