- fmt: '# Giving Data Purpose


    In considering the purpose of data it is useful to take a look back at how we
    data got elevated to be considered the most valuable commodity, and how that position
    is now being reconsidered or, at least, should be reconsidered.


    Being able to store information has always been useful. However, for a long time
    the potential opportunities were tempered by the cost associated with storing
    and dealing with data. When data storage was counted in a few megabytes and the
    devices to handle it took up entire floors in company buildings, you had to carefully
    consider why you were doing it. As such, retaining data was something most organizations
    would avoid beyond what was necessary to enable the proper functioning of the
    organization. The purpose of data had to be very specific, because holding on
    to it and usefully exploiting it had a very noticeable cost.


    As our capability to store data increased and the cost of doing so decreased,
    the attitude shifted to one where we would simply avoid the question of what purpose
    and value specific pieces of data were bringing. We started using terms such as
    “raw” data. Instead of storing summaries and aggregations we would store every
    single piece of data. Organizations started shifting into a mindset where they
    would store as much of it as possible, with the thinking being “you never know
    how it might be useful in the future, so best to hold on to it.” This is also
    evident in the terminology we use. We purchase “data warehouses” where we keep
    and organize data, or “data lakes” where we just let data flow in like into a
    large dam; to be collected and used at some later point. We argue about what is
    “big data” and what is just “data,” with some experts relishing in explaining
    that what most people think of as a lot of data is simply not that much. We celebrate
    companies that make no profit because they are accumulating useful data. We talk
    about how we “strongly believe” that data will prove valuable.


    Over the past couple of years, however, cracks are beginning to appear in data’s
    absolute reign. Yes, we can simply store huge amounts of data at marginal extra
    cost, but we recognize there are other challenges. Storing data does not carry
    a technical cost but it carries a regulatory and risk cost. With regulations such
    as the GDPR^([^(54)](#fn54)) in place, all organizations are forced to be mindful
    of why and how they are keeping data. They cannot simply dump it somewhere “just
    in case” it might at some point be useful. Furthermore, as consumers are getting
    increasingly more wary of the risks of cybercrime or other forms of digital manipulation
    (e.g., shaping opinions for political gain), they are looking for organizations
    that can prove they are worthy custodians of their data. Data carries with it
    opportunity but it can also be a liability, so clearly defining the purpose of
    data is once more important.


    Now, if holding on to data needs to serve a purpose, what is that purpose in the
    context of AI-powered applications? Well, to start with we need to define what
    sort of AI-powered applications we are looking to build. What decision-making
    do we want to delegate to machines and what model of how the world works will
    we need to have in place in order to enable that decision-making? Based on the
    model we need and the way in which we can go about creating it, we can figure
    out what types of data we should be using.


    As we discussed in Chapter [3](#472369_1_En_3_Chapter.xhtml) there are two ways
    for us to uncover the necessary decision-making model that we would need to implement
    in order to automate processes. We can use our own knowledge of a domain to develop
    hypotheses and create appropriate models of behavior, or we can look for patterns
    in data and use algorithms that will explore that data in order to discover a
    possible model.


    For the latter, data serves a very clear purpose. Data is the terrain that we
    explore to uncover correlations. If we want to be able to build a document classifier
    of different types of documents, we need lots of examples of those different types
    of documents. If we want to uncover patterns of behavior for our teams, clients,
    or partners, we need data that captures that behavior. But does this mean that
    we should store every little piece of data potentially available to us?


    That can be quite a hard question to answer outside of a specific context. My
    guideline right now would be to err on the side of caution and only increase your
    data retention capabilities alongside an increased maturity of your data governance
    capabilities. In other words, if you are just starting out and exploring how you
    could use AI techniques, don’t start by mandating that every single piece of data
    should be stored for potential future exploitation, no matter how tempting that
    may be. Start by building out structures within the organization that can ensure
    that you have proper data governance in place. Start by building your confidence
    that you are doing the right things when it comes to employees and clients and
    how their data is treated. The more confident you are about how well data is managed,
    the bolder you can be about how much data is stored.


    For model-driven techniques it may feel that data is less of an important element.
    We are, after all, not going to require huge amounts of data in order to build
    our models. Don’t forget, however, that those model-driven techniques are there
    to manipulate data. They may require less data, but the data they will need requires
    more structure. For example, let’s suppose you’ve built an ontology that describes
    how the different types of products you produce relate to each other and the skills
    that are required to develop them or the materials that are required to produce
    them. In order to use this ontology to power queries, you would need a database
    where these different pieces of information are appropriately stored and annotated.
    To achieve this you will need a more disciplined approach to data management that
    ensures, for example, that as data is updated it continues to conform to your
    structure’s data needs.


    Whatever AI technique you use, the ability to *govern* data is crucial. To get
    that in place you need a data strategy. In the next section we look at some practical
    methods to employ.


    ## Developing a Data Strategy—from Theory to Practice


    Something that I often come across as I sit down with teams to advise them on
    their data strategy is that initial conversations or workshops are split into
    two phases.


    There is the first phase, where the “important” stakeholders like to get involved
    and dedicate some of their precious time. Here we get to define vision, goals,
    and “high-level” strategy. Things are upbeat in this phase. The world is going
    to be amazing and everyone is excited.


    Then in the practical second phase, once “they” leave the room, the practicalities
    of getting things done start being discussed. Here things quickly go downhill.
    In organizations that are not tech-driven and transparent in their methods from
    the start, simple tasks can become incredibly challenging. This is not because
    of lack of will but because of how complex it is to navigate the various layers
    of responsibility and departmentalization of data in order to get to something
    useful.


    I will work through an example as a way to highlight some of these issues and
    put in place strategies that are cognizant of these.'
  raw: '## Giving Data Purpose


    In considering the purpose of data it is useful to take a look back at how we
    data got elevated to be considered the most valuable commodity, and how that position
    is now being reconsidered or, at least, should be reconsidered.


    Being able to store information has always been useful. However, for a long time
    the potential opportunities were tempered by the cost associated with storing
    and dealing with data. When data storage was counted in a few megabytes and the
    devices to handle it took up entire floors in company buildings, you had to carefully
    consider why you were doing it. As such, retaining data was something most organizations
    would avoid beyond what was necessary to enable the proper functioning of the
    organization. The purpose of data had to be very specific, because holding on
    to it and usefully exploiting it had a very noticeable cost.


    As our capability to store data increased and the cost of doing so decreased,
    the attitude shifted to one where we would simply avoid the question of what purpose
    and value specific pieces of data were bringing. We started using terms such as
    “raw” data. Instead of storing summaries and aggregations we would store every
    single piece of data. Organizations started shifting into a mindset where they
    would store as much of it as possible, with the thinking being “you never know
    how it might be useful in the future, so best to hold on to it.” This is also
    evident in the terminology we use. We purchase “data warehouses” where we keep
    and organize data, or “data lakes” where we just let data flow in like into a
    large dam; to be collected and used at some later point. We argue about what is
    “big data” and what is just “data,” with some experts relishing in explaining
    that what most people think of as a lot of data is simply not that much. We celebrate
    companies that make no profit because they are accumulating useful data. We talk
    about how we “strongly believe” that data will prove valuable.


    Over the past couple of years, however, cracks are beginning to appear in data’s
    absolute reign. Yes, we can simply store huge amounts of data at marginal extra
    cost, but we recognize there are other challenges. Storing data does not carry
    a technical cost but it carries a regulatory and risk cost. With regulations such
    as the GDPR^([^(54)](#fn54)) in place, all organizations are forced to be mindful
    of why and how they are keeping data. They cannot simply dump it somewhere “just
    in case” it might at some point be useful. Furthermore, as consumers are getting
    increasingly more wary of the risks of cybercrime or other forms of digital manipulation
    (e.g., shaping opinions for political gain), they are looking for organizations
    that can prove they are worthy custodians of their data. Data carries with it
    opportunity but it can also be a liability, so clearly defining the purpose of
    data is once more important.


    Now, if holding on to data needs to serve a purpose, what is that purpose in the
    context of AI-powered applications? Well, to start with we need to define what
    sort of AI-powered applications we are looking to build. What decision-making
    do we want to delegate to machines and what model of how the world works will
    we need to have in place in order to enable that decision-making? Based on the
    model we need and the way in which we can go about creating it, we can figure
    out what types of data we should be using.


    As we discussed in Chapter [3](#472369_1_En_3_Chapter.xhtml) there are two ways
    for us to uncover the necessary decision-making model that we would need to implement
    in order to automate processes. We can use our own knowledge of a domain to develop
    hypotheses and create appropriate models of behavior, or we can look for patterns
    in data and use algorithms that will explore that data in order to discover a
    possible model.


    For the latter, data serves a very clear purpose. Data is the terrain that we
    explore to uncover correlations. If we want to be able to build a document classifier
    of different types of documents, we need lots of examples of those different types
    of documents. If we want to uncover patterns of behavior for our teams, clients,
    or partners, we need data that captures that behavior. But does this mean that
    we should store every little piece of data potentially available to us?


    That can be quite a hard question to answer outside of a specific context. My
    guideline right now would be to err on the side of caution and only increase your
    data retention capabilities alongside an increased maturity of your data governance
    capabilities. In other words, if you are just starting out and exploring how you
    could use AI techniques, don’t start by mandating that every single piece of data
    should be stored for potential future exploitation, no matter how tempting that
    may be. Start by building out structures within the organization that can ensure
    that you have proper data governance in place. Start by building your confidence
    that you are doing the right things when it comes to employees and clients and
    how their data is treated. The more confident you are about how well data is managed,
    the bolder you can be about how much data is stored.


    For model-driven techniques it may feel that data is less of an important element.
    We are, after all, not going to require huge amounts of data in order to build
    our models. Don’t forget, however, that those model-driven techniques are there
    to manipulate data. They may require less data, but the data they will need requires
    more structure. For example, let’s suppose you’ve built an ontology that describes
    how the different types of products you produce relate to each other and the skills
    that are required to develop them or the materials that are required to produce
    them. In order to use this ontology to power queries, you would need a database
    where these different pieces of information are appropriately stored and annotated.
    To achieve this you will need a more disciplined approach to data management that
    ensures, for example, that as data is updated it continues to conform to your
    structure’s data needs.


    Whatever AI technique you use, the ability to *govern* data is crucial. To get
    that in place you need a data strategy. In the next section we look at some practical
    methods to employ.


    ## Developing a Data Strategy—from Theoryto Practice


    Something that I often come across as I sit down with teams to advise them on
    their data strategy is that initial conversations or workshops are split into
    two phases.


    There is the first phase, where the “important” stakeholders like to get involved
    and dedicate some of their precious time. Here we get to define vision, goals,
    and “high-level” strategy. Things are upbeat in this phase. The world is going
    to be amazing and everyone is excited.


    Then in the practical second phase, once “they” leave the room, the practicalities
    of getting things done start being discussed. Here things quickly go downhill.
    In organizations that are not tech-driven and transparent in their methods from
    the start, simple tasks can become incredibly challenging. This is not because
    of lack of will but because of how complex it is to navigate the various layers
    of responsibility and departmentalization of data in order to get to something
    useful.


    I will work through an example as a way to highlight some of these issues and
    put in place strategies that are cognizant of these.'
  trans: '

    # 赋予数据以目的


    在思考数据的目的时，回顾一下数据是如何被提升为最有价值的商品，以及这一地位如今如何被重新审视——或者至少应该被重新审视，是很有益的。


    能够存储信息一直很有用。然而，在很长一段时间里，存储和处理数据相关的成本制约了其潜在机遇。当数据存储量以几兆字节计算，而处理数据的设备要占据公司大楼整整一层时，你必须仔细斟酌为什么要这么做。因此，大多数组织都会避免保留超出正常运营所需的数据。数据的目的必须非常明确，因为保留并有效利用数据需要付出非常显著的成本。


    随着我们存储数据能力的提升和成本的下降，态度发生了转变，我们干脆回避了“特定数据带来什么目的和价值”这个问题。我们开始使用“原始”数据这样的术语。我们不再存储摘要和汇总，而是存储每一条数据。组织开始转向一种思维模式：尽可能多地存储数据，认为“你永远不知道它将来会有什么用，所以最好留着它。”这一点在我们使用的术语中也显而易见。我们购买“数据仓库”来存放和组织数据，或者“数据湖”，让数据像流入大坝一样涌入，待日后收集和使用。我们争论什么是“大数据”，什么只是“数据”，一些专家乐于解释大多数人认为的大量数据其实根本不算多。我们赞美那些不盈利却因积累有用数据而受到追捧的公司。我们谈论如何“坚信”数据终将证明其价值。


    然而，在过去几年里，数据的绝对统治地位开始出现裂痕。是的，我们可以以微乎其微的额外成本存储海量数据，但我们认识到还有其他挑战。存储数据没有技术成本，却带来了监管和风险成本。随着
    GDPR^(⁵⁴) 等法规的实施，所有组织都被迫关注自己为何以及如何保存数据。他们不能仅仅为了“以防万一”有用就把数据随意丢弃在某个地方。此外，随着消费者对网络犯罪或其他形式的数字操纵（例如，为政治利益塑造舆论）的风险越来越警惕，他们正在寻找能够证明自己是数据可靠保管者的组织。数据带来机遇，但也可能成为负担，因此，明确定义数据的目的再次变得重要。


    现在，如果保留数据需要服务于某个目的，那么在人工智能驱动的应用中，这个目的是什么？首先，我们需要定义我们想要构建什么样的人工智能驱动应用。我们想把哪些决策权委托给机器？为了实现这种决策，我们需要建立什么样的世界运行模型？根据我们所需的模型以及创建该模型的方式，我们可以确定应该使用哪些类型的数据。


    正如我们在第 3 章中讨论的，有两种方法可以揭示实现流程自动化所需的决策模型。我们可以利用自身对某个领域的知识来提出假设并创建适当的行为模型，或者我们可以在数据中寻找模式，并使用算法探索这些数据以发现可能的模型。


    对于后者，数据的目的非常明确。数据是我们探索以发现相关性的“地形”。如果我们想构建一个能分类不同类型文档的文档分类器，就需要大量不同类型文档的示例。如果我们想发现团队、客户或合作伙伴的行为模式，就需要能够捕捉这些行为的数据。但这是否意味着我们应该存储所有可能获取到的每一点数据呢？


    在特定背景之外，这可能是一个很难回答的问题。我目前的指导原则是宁可谨慎，只有在数据治理能力成熟度提高的同时，才增加数据保留能力。换句话说，如果你刚刚起步，正在探索如何使用人工智能技术，不要一开始就强制要求存储每一条数据以备将来利用，无论这多么诱人。先从在组织内部建立能够确保你拥有适当数据治理的结构开始。先从建立信心开始，确保你在员工和客户数据方面，以及如何处理这些数据上，做的是正确的事情。你对数据管理得越好越有信心，就越能大胆地决定存储多少数据。


    对于模型驱动技术来说，数据可能感觉不那么重要。毕竟，我们不需要海量数据来构建模型。但不要忘记，这些模型驱动技术是用来处理数据的。它们可能需要的数据量较少，但所需的数据需要更多的结构。例如，假设你构建了一个本体，描述了所生产的不同类型产品之间的关系，以及开发它们所需的技能或生产它们所需的材料。为了利用这个本体来驱动查询，你需要一个数据库，其中这些不同的信息被适当地存储和标注。要实现这一点，你需要一种更规范的数据管理方法，例如，确保数据在更新时能持续符合你结构的数据需求。


    无论你使用哪种人工智能技术，*治理*数据的能力都至关重要。要做到这一点，你需要一个数据策略。在下一节中，我们将探讨一些实用的方法。


    ## 制定数据策略——从理论到实践


    在我与团队坐下来就他们的数据策略提供建议时，经常遇到的情况是，最初的讨论或研讨会分为两个阶段。


    第一阶段，“重要”的利益相关者喜欢参与其中，并投入他们宝贵的时间。在这里，我们定义愿景、目标和“高层”策略。这个阶段气氛乐观。世界将变得美妙，每个人都兴奋不已。


    然后进入务实的第二阶段，一旦“他们”离开房间，就开始讨论完成工作的实际细节。在这里，事情很快急转直下。在那些并非技术驱动且从一开始方法就不透明的组织中，简单的任务可能变得极具挑战性。这并非因为缺乏意愿，而是因为要穿越数据责任和部门化的层层壁垒，最终得到有用的东西，其过程极其复杂。


    我将通过一个例子来突出其中一些问题，并制定能够意识到这些问题的策略。

    '
- fmt: '### The Challenge


    The company is a large engineering company that builds complex widgets for clients.
    It spans several geographical sites and services multiple industries. It has highly
    specialized personnel, and projects are considered mission-critical for clients.
    We are looking to build a tool that will support project managers in doing the
    initial planning around putting together teams, schedules, and raising any other
    considerations that may be relevant as the company is gearing up to take on a
    new project.


    Projects always require a variety of different skills, are expected to span several
    months, and will occupy different roles in different ways throughout their lifetime.


    Given just this brief outline, if you had to do some initial planning for a challenge
    like this, what types of knowledge would you need? Here is my tentative list:


    - A list of who is in the organization and what their skills and past experiences
    are—this will allow us to figure out who might be a good fit for a given project.

    - A view into their day-to-day calendars in order to set up some initial exploratory
    meetings

    - A view into their longer term commitments to understand how viable their participation
    in the project is. There are bound to be several combinations of suitable teams,
    so we need to have the teams discuss and square that against their long-term commitments.

    - The ability to search through past projects on the same domain for any potential
    areas of concerns—perhaps something someone documented in the past that could
    inform our current actions


    This is, of course, a very high-level list but it gives us enough to explore what
    strategies we can put in place to tackle the task from a data perspective. Let
    us take each requirement in turn and explore what demands it places on our data
    capabilities.


    ### A Data Strategy in Support of Communication and Collaboration


    In order to know who is in the organization and what their skills are, we need
    an up-to-date database of people in the organization. That is obvious enough and
    one would think it should never be a big ask for any organization. A list should
    exist somewhere! Everyone presumably gets paid at the end of the month so, worst-case
    scenario, Finance/HR will have something.


    Well, the list does exist but, as it turns out, it is not accessible in a way
    that you can build an application that uses it. The only way you would get it
    would be in printed format. It turns out that the HR system is quite outdated
    and only works on their machines. The IT department absolutely refuses to provide
    any access, as that would require skills that they simply don’t have anymore.
    They cannot guarantee the safety of data if they start tinkering with the system,
    so they simply leave it as it is. It’s not all bad news though. We learn that
    HR is planning to replace the current system with a new one—the new system is
    going to be rolled out in about 6 months.


    Being the optimist that you are, you see that as an opportunity. “Fantastic,”
    you think, “let us make sure that the new system is going to be able to provide
    us with rich profiles of the people within the company so that we can build AI
    applications that can answer complex questions about who is able to do what.”
    Nice idea, but it turns out that HR has finished the requirements spec with the
    vendor, and they can’t change what was already planned now. Contracts have been
    signed and development has started.


    You are not one who gives up easily though. You push back, get people in meetings,
    and passionately argue your point. You explain how this system is going to hold
    data that is valuable to the entire company, not just for HR purposes. You argue
    for strategic thinking that ensures that the company is thinking about data in
    a more general sense and not just within the context of specific projects. You
    explain how every system that is the source of data needs to enable other systems
    to easily access that data.


    Finally, it clicks for everyone. A more general vision and strategy for data is
    required and should be developed in support of the organizational vision and strategy.
    Organizational goals such as “renew HR capabilities” and “improve project planning”
    are not isolated. Their data needs intersect.


    A principle for data management should be that data is never locked into a single
    system; it has to be accessible by other systems.


    Having multiple parties being able to access the same data is a great step in
    the right direction. Ensuring that that data is always accessible to your organization
    even as you may change vendors of software is a sensible insurance policy always,
    irrespective of your AI ambitions.


    Coupled to ensuring that access to data is possible is ensuring that the way data
    is described is widely usable. Teams should work together to develop common models
    of how to describe key aspects of organizational behavior such as roles and skills
    of people. That starts giving you superpowers. It can be a point of differentiation
    from the competition because you have a better handle on all the different things
    your teams can achieve. The better your knowledge representation capabilities,
    the more sophisticated your AI-powered planning tool can be. To achieve that you
    need teams that are all switched on to the power of data and talk across team
    and departmental boundaries to coordinate and uncover opportunities. It is not
    a one-off thing either. It requires a culture change that ensures that these conversations
    keep happening. Just as everything else is subject to change, so are the ways
    you will use to describe things.


    Make sure that discussions around the handling and description of data happen
    consistently across the entire organization, to enable you to capture opportunities
    and identify where multiple stakeholders should have a say into how data is described.'
