  trans: '

    ### 平台


    对话应用需要在哪些对话平台上运行？是仅需单一平台（例如仅限`Slack`），还是需要一个能在多个平台（可能涵盖语音、`SMS`、`Slack`等）上使用的应用？


    你可能需要多平台支持来触达更多用户，或者因为你正在弥合不同平台用户之间的鸿沟。例如，客户通过`SMS`发送的消息可以导入`Slack`，供客服人员处理，然后再通过`SMS`回复给用户。移动办公的团队与在办公室的团队相比，可能更适合使用不同的应用。


    如果你正在考虑需要跨平台或整合平台的体验，就需要考虑对话如何在各平台间顺畅转换。如果你的部分团队成员使用`Slack`，但新并入的团队仍在使用`Skype
    for Business`，那么一个适用于双方的统一解决方案会是什么样？每个平台都支持不同类型的交互，设计者的任务就是找到适用于两者的最小公分母。


    ### 分析与改进


    没有哪个对话应用能在上线第一天就做到完美。虽然分析和持续改进对任何应用都具有战略意义，但对于对话应用而言，这一点尤为重要。


    这里需要考虑两个维度。首先，应用在与用户交互时，可能会自动进行哪些类型的“改进”和“学习”。你是否确信其行为不会偏离正轨，并且有制衡机制来确保实时改进得以实现？其次，如果你计划进行离线审查和进一步训练（这是大多数对话应用的常见做法），你是否确保你的团队有时间和资源来完成这项工作？


    我曾见过一些成功部署的聊天机器人被迫停止运行，原因就是缺乏维护和监控交互的能力。将决策权委托给机器可以释放资源，但最好将其视为对现有团队的增强，使其能够扩展规模，从而专注于处理更棘手的案例*并*维护自动化软件。


    ## 对话应用的使用场景


    现在，让我们通过回顾一些对话应用的示例，以及将此类应用引入你自己的对话平台所带来的影响，来将我们目前讨论的所有内容串联起来。这些示例既展示了人们当前的做法，也说明了如何通过进一步自动化来增强这些做法。这些示例旨在启发你思考可以在自己的组织中开发和应用什么。


    需要提醒一点：在我们审视这些有趣且酷炫的功能时，请记住，我们不应被技术能力所迷惑。在整个过程中，最困难的问题不是某件事是否可行。最困难的问题是，某件可行的事是否值得去做。最重要的是要确定哪些功能能为你的用户带来最大价值。


    我们将从对话平台特别适合处理的三大领域来审视示例。


    *   通知

    *   关键数据监控

    *   支持与协作


    ### 智能通知


    是的，通知很可能是所有知识工作者最不喜欢的东西。通知太多了，我还没见过哪个会议上有人说希望收到更多通知。尽管如此，通知仍然是必要的。遗憾的是，我们的挑战不是消除通知，而是确定如何组织通知，以便我们能以干扰最小的方式获取最多有用的信息。


    解决方案的第一部分是以一种能让我们更有效控制通知的方式来设置它们。这可以通过微调哪些应用有权打扰我们，以及通过简化设置调整来满足个人和团队需求来实现。第二部分则是将判断通知是否有用（以及何时最有用）的决策权越来越多地委托给软件，从而帮助我们提高效率。


    挑战的第一部分正是对话协作平台可以大显身手的地方。它很可能是我们早上登录的第一个应用，也是我们可以在所有不同的工作设备（包括移动设备和电脑）上使用的应用。作为组织操作系统的角色，它们可以成为所有通知到达我们的渠道。


    此外，这些环境为我们提供了多种管理通知的工具。我们可以设置一天中完全不应被打扰的时段，也可以基于每个频道或关键词设置特定规则。


    挑战的第二部分是本书的核心：利用人工智能技术将决策权委托给软件。在这种情况下，我们希望委托的决策是何时以及如何就某事通知我们。此外，值得探讨的是，在通知的背景下，对话应用还能提供哪些其他有用的功能。通知的一个局限性在于很难“对其采取行动”。我们被告知了某事，但当时当地却没有提供处理它的工具。通过定制通知，我们也可以集成执行操作所需的功能。


    #### 基础通知


    本节中使用的示例基于`Slack`与`Google Calendar`的集成。在撰写本文时，它开箱即用地提供了一些关键的通知功能，这些功能已经证明了通过对话协作平台进行基础通知的价值。


    对话应用能做的第一件事就是通知你，并允许你直接在对话环境中采取行动。通过`Slack`/`Google Calendar`集成，如果同事创建了新会议，你会收到通知，并可以通过通知选择接受或拒绝会议。当会议即将开始时，你也会在`Slack`中收到通知，并且相关的信息（例如加入在线视频通话的链接）会在同一上下文中提供。


    此外，由于你的对话协作平台也是你向同事提供在线状态和整体状态信息的地方，日历集成会更新你的状态，从而间接地通知其他人你是否在会议中。这意味着同事可以快速了解你在做什么，这有助于他们决定是立即给你发消息还是稍后再发，或者是否值得起身走到你的办公桌前。


    最后，该集成还会在每天开始时发送一份包含当天所有事件的每日摘要。这意味着你可以关闭其他执行相同功能的应用和邮件通知。


    这些功能是基础性的，除了有效利用环境并暴露所需功能外，并没有太多复杂之处。尽管如此，它是一个极好的起点，可以在此基础上为系统构建更多的自主性。

    '
- fmt: '### Active Notifications


    Attending a meeting requires a certain amount of preparation before the meeting
    from a number of different perspectives. How do you get there, who is attending,
    what is the agenda, what do you need to prepare before the meeting?


    The calendar application can act as an active assistant that provides, within
    the context of the notification, useful information to help you get work done.
    It can provide travel information, highlight if a room or a location needs to
    be booked, and provide a checklist of tasks to do in advance.


    In order for this functionality to be made possible, our application would need
    to be able to reason and understand about such things as the location of a meeting,
    the agenda, checking traffic reports, and more. It should be actively working
    (through a conversation) with users as they set up meetings, to ensure that it
    collects information such as the agenda and premeeting tasks. A simple question
    such as “Would you like to add an agenda for this meeting?” or “Is there anything
    attendees should prepare in advance?” can help people set up better meetings,
    help the meeting be more efficient, and establish cultural norms within the team
    (in this case around better meetings) that improve working life for everyone.
    A favorite of mine would be something along the lines of “Are you absolutely sure
    you need this meeting?”!


    ### Team Notifications


    Finally, since we are in a team collaboration environment, we can also consider
    how notifications could be best served if they went out to a team rather than
    single individuals. What if I could set up a meeting, but rather than mandate
    which specific people should attend I could request a specific role (e.g., someone
    from the user experience team, the development team, or finance to help us sort
    through specific issues)? The notification can then go out to the appropriate
    team channels and it is left to those teams to identify who is best suited to
    attend a meeting.


    Of course, throughout you need to be thinking how the use of notifications works
    within the context of a specific organization and its culture and policies. Teams
    that have a culture of being active and accountable would have a better chance
    of being able to collectively react, while teams that are more individualistic
    and focused on their single tasks would not be a good fit for such a feature.


    ## Monitoring Key Data


    Tools to collect, collate, analyze, and compare data abound. It has never been
    easier to create charts and make them available in beautiful dashboards. However,
    as the chief marketing officer of a large multinational once told me “We’ve built
    them, but nobody is coming.” Nobody is looking at those beautiful dashboards or,
    if they are looking at them, there is no confidence in whether the various marketing
    teams are interpreting data in a consistent way. We have just built ourselves
    a more elaborate treadmill to run on, but we are still not getting anywhere. What
    teams need are tools that they can trust to let them know when something interesting
    has happened and, ideally, explain why that has happened.


    Reports typically provide an updated chart or a straightforward piece of information
    such as “Visits to your site today are 20% more than average.” The interpretation
    of that data is left to the receiver of the notification. Why are visits up on
    the site? Which section of the site? Is it because a new paid ad campaign started?
    Is it because a newsletter was sent out? Did our product get a mention in the
    press? Is 20% above average usual when a marketing campaign kicks in? Should I
    be expecting more?


    There are three obstacles that stop these tools from being more helpful. We need
    to connect data, contextualize data, and explain data.


    ### Connected Data


    First, the tools crunching data and generating reports simply don’t have access
    to all the pieces of information required so as to create a more complete narrative.
    At best, what happens is that someone will notice a change and a hunt will start
    across different groups and departments to attempt to understand why the change
    has happened. This generates questions, interrupts people who were performing
    other tasks, and can often lead nowhere.


    To achieve richer narratives, multiple data sources need to be more tightly integrated
    and, crucially, the activities *behind* the generated data also need to be surfaced.
    For example, if you are building a product you should be able to see a timeline
    of how major releases connect to changes to your key performance indicators.


    A path toward more useful activity data collection and integration is through
    the project management tools or technical code deployment tools. They can already
    broadcast their activities. If those messages are treated as *activity data sources,*
    you can start connecting key pieces of information through more careful overall
    knowledge management. Conversational applications can also assist by proactively
    reaching out to people and asking for that information, and identifying key moments
    that could be connected.


    Now, don’t get me wrong. None of this is easy or simple. It will take effort to
    marshal the resources needed (not just financial) to put in places applications
    like this. We will discuss approaches in the upcoming chapters. For now, let’s
    enjoy the possible bright futures.


    ### Contextual Data


    We talked about notifications in the previous section and how it is so hard to
    get them under control. Notifications about key data and metrics is certainly
    one of the reasons we are inundated with information. There are so many metrics
    to follow, and we get hit with so many reports, that it all becomes a bit of a
    blur. The irony is that when we then actually need a piece of data, either because
    we are discussing next actions with a colleague or are planning activities for
    the next quarter or we just got asked by our boss about a report, we can’t find
    it.


    Conversational applications can help by acting as our assistant to interact with
    business intelligence tools in order to provide us with the reports we need when
    we need them—namely, in the context of a conversation.


    Requests such as “Can we see sales over the past 6 months for product Y” that
    lead to a report delivered in a group within our conversational collaboration
    platform for the entire team to see are within our grasp technologically. However,
    they require organizations to invest in identifying where they can best benefit
    from these opportunities. It is no surprise that large tech companies such as
    Microsoft are directly investing in adding conversational capabilities to their
    business intelligence tooling. Simply asking for the data we need when we need
    it in natural language is incredibly powerful and much better suited to how we
    work and think as humans.'
  raw: '#### Active Notifications


    Attending a meeting requires a certain amount of preparation before the meeting
    from a number of different perspectives. How do you get there, who is attending,
    what is the agenda , what do you need to prepare before the meeting?


    The calendar application can act as an active assistant that provides, within
    the context of the notification, useful information to help you get work done.
    It can provide travel information, highlight if a room or a location needs to
    be booked, and provide a checklist of tasks to do in advance.


    In order for this functionality to be made possible, our application would need
    to be able to reason and understand about such things as the location of a meeting,
    the agenda, checking traffic reports, and more. It should be actively working
    (through a conversation) with users as they set up meetings, to ensure that it
    collects information such as the agenda and premeeting tasks. A simple question
    such as “Would you like to add an agenda for this meeting?” or “Is there anything
    attendees should prepare in advance?” can help people set up better meetings,
    help the meeting be more efficient, and establish cultural norms within the team
    (in this case around better meetings) that improve working life for everyone.
    A favorite of mine would be something along the lines of “Are you absolutely sure
    you need this meeting?”!


    #### Team Notifications


    Finally, since we are in a team collaboration environment, we can also consider
    how notifications could be best served if they went out to a team rather than
    single individuals. What if I could set up a meeting, but rather than mandate
    which specific people should attend I could request a specific role (e.g., someone
    from the user experience team, the development team, or finance to help us sort
    through specific issues)? The notification can then go out to the appropriate
    team channels and it is left to those teams to identify who is best suited to
    attend a meeting.


    Of course, throughout you need to be thinking how the use of notifications works
    within the context of a specific organization and its culture and policies. Teams
    that have a culture of being active and accountable would have a better chance
    of being able to collectively react, while teams that are more individualistic
    and focused on their single tasks would not be a good fit for such a feature.


    ### Monitoring Key Data


    Tools to collect, collate, analyze, and compare data abound. It has never been
    easier to create charts and make them available in beautiful dashboards. However,
    as the chief marketing officer of a large multinational once told me “We’ve built
