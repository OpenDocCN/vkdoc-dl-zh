- fmt: "# Model-Driven Techniques\n\nModel-driven techniques are a celebration of\
    \ human ingenuity. It is us looking at the world and inside our brains, identifying\
    \ the core pieces that are important and connecting them in a way that allows\
    \ us to make predictions. Because they are the result of our own mind elaborating\
    \ on concepts, we can also fully understand them and explain them to others, something\
    \ that is incredibly valuable. When a model-driven technique is correct, it is\
    \ often the most efficient path through a problem, as it captures just what it\
    \ requires and allows us to build on solid foundations. Think of the core rules\
    \ of thermodynamics, chemistry’s periodic table, or the three laws of biology:\
    \ incredibly powerful statements that govern large swaths of how nature behaves.\n\
    \nThe model-driven techniques we review in the following have been actively used\
    \ in applications for decades now. They are the techniques that have allowed companies\
    \ to optimize the coordination of their transport fleets, led to better search\
    \ results on the Web, improved manufacturing processes, helped cure more people,\
    \ and so much more. They are not the techniques that people typically refer to\
    \ when talking about this current moment of AI renaissance, but they are nevertheless\
    \ crucial in building sophisticated applications that can efficiently and robustly\
    \ make decisions.\n\nIn looking at model-driven techniques, we will examine three\
    \ core aspects: how to represent information, how to reason over it, and finally\
    \ how to plan.\n\n## Knowledge Representation\n\nThe goal of knowledge representation\
    \ is to provide us with tools and techniques to describe data in a way that allows\
    \ us to more easily manipulate it with computers. That refers both to single items\
    \ (e.g., how to describe a stand-alone document) as well as the relationship between\
    \ items (e.g., how does a specific document relate to a project).\n\nNo matter\
    \ what organizational context you operate in, you undoubtedly produce documents\
    \ about meetings, proposals for clients, project reports, and so on. Typically,\
    \ you will have some sort of document management system where all this data gets\
    \ stored. Maybe it is as simple as a shared hard drive on a local network or a\
    \ shared Dropbox or Google Drive environment. Now, imagine that all the documents\
    \ were dropped in the same folder, called “OUR STUFF” and were all named in inconsistent\
    \ ways:\n\n*   OUR STUFF\n    *   sales-rep.doc\n    *   client-abc-preso.pdf\n\
    \    *   my-cool-thoughts-on-stuff.pdf\n    *   projections.xls\n    *   …\n\n\
    As the documents grow to hundreds and then thousands, a significant amount of\
    \ organizational effort would be going into simply searching through this unmanageable\
    \ folder to find something.\n\nHopefully, in your organization things look a bit\
    \ more like this:\n\n*   Documents\n    *   Sales\n        *   Client ABC\n  \
    \          *   Presentations\n            *   Offers\n            *   Final Contract\n\
    \    *   Project Work\n        *   Client ABC\n            *   Project Reports\n\
    \            *   Deliverables\n\nSimply by managing folder structure and imposing\
    \ some rules around where documents should go, you have introduced knowledge representation\
    \ to your team. This simple hierarchical structure makes it easier for people\
    \ and machines to find information.\n\nIn general, knowledge representation is\
    \ the effort to identify an appropriate model to capture what we know about the\
    \ world, together with means to manipulate that model in order to infer new things.\n\
    \nLet us consider another simple example. Suppose you are the HR department of\
    \ a very large organization and you receive hundreds of CVs daily from people\
    \ with all sorts of skills. You would like to be able to automatically categorize\
    \ those CVs based on the skills that people mention, so that you can contact the\
    \ appropriate subject matter experts within the organization who would need to\
    \ evaluate them. You have five high-level groups with titles such as front-end\
    \ engineers (people who specialize in building the user interfaces and visual\
    \ aspect of digital tools), back-end engineers (people who specialize in data\
    \ management, algorithms and systems integration), project managers, quality assurance\
    \ and testing, and site reliability engineers (the ones who make sure all systems\
    \ run smoothly).\n\nHowever, you have a challenge. The terms people use in their\
    \ CVs to describe these skills keep changing and, especially, the technologies\
    \ that are related to these skills keep evolving. New programming languages, frameworks,\
    \ and so on are constantly being introduced. How can you automate the process\
    \ of sorting through CVs in an appropriate fashion?\n\nYou get together with your\
    \ team and decide that you are going to build a tool that will capture terms that\
    \ are used to describe these skills and relate them to your high-level groups.\
    \ The subject matter experts across the organization will be able to use the tool\
    \ to enter keywords that they are interested in and then software will refer to\
    \ that “knowledge” to sort through CVs. Following is an example of the type of\
    \ information captured:\n\n*   Front-end engineer\n    *   Core Skills\n     \
    \   *   JavaScript\n        *   HTML\n        *   CSS\n    *   Frameworks\n  \
    \      *   React\n        *   Vue.js\n        *   Node.js\n    *   General Skills\n\
    \        *   Version Control\n        *   Testing / Debugging\n\nCongratulations,\
    \ you have just built a rudimentary knowledge graph^([^(23)](#fn23)) or ontology!\
    \ An ontology is a more structured description of the elements that make up a\
    \ certain domain, together with relationships that connect those elements together\
    \ and a way to reason about the implications of certain connections.\n\nOntologies\
    \ capture our understanding of the world and they can come in many different forms,\
    \ from simple thesauri to hierarchical taxonomies like the preceding example to\
    \ far more sophisticated networks of interconnected entities. Knowledge representation\
    \ and knowledge reasoning techniques focus on formalizing the way we build and\
    \ describe things such as ontologies, so that we can capture increasingly more\
    \ sophisticated types of information in a way that remains tractable for machines\
    \ to reason over. The aim is to enable us, given a set of facts, to infer additional\
    \ knowledge. If I know it is furry, and it has four legs, and it makes a purring\
    \ sound, can I assume it is a cat? A good ontology should be able to tell you\
    \ that there is actually a range of animals (very likely all feline) that would\
    \ fit that description, so you cannot simply assume it is a cat.\n\nWe now have\
    \ a rich and sophisticated toolset to work with; ontologies at scale and applications\
    \ can be found across a variety of fields from medicine to e-commerce. Ontologies\
    \ can be created and populated “manually” by subject matter experts, but they\
    \ can also be created automatically using data-driven techniques to identify and\
    \ extract the relevant entities and relationships and can then be further curated\
    \ by experts.\n\nUltimately, any sufficiently complex automated system—whether\
    \ through formal means or through informal, ad hoc implementations—will end up\
    \ representing knowledge in a way that machines can manipulate. As such, knowledge\
    \ representation and management becomes a core technique for most applications."
