- fmt: '# Vision


    Vision refers to a machine’s ability to process visual data and interpret it appropriately.
    It can range from something as “simple” as scanning a bar code to identifying
    objects within a photograph.


    The advancement in the interpretation of images, as we discussed in Chapter [3](#472369_1_En_3_Chapter.xhtml),
    is what opened the floodgates for more general applications of AI. Unlocking the
    ability to correctly interpret an image enables so many applications, from autonomous
    driving to the ability to better monitor and manage the growth of crops across
    large areas.


    The toolsets to enable training of data-driven models (the overwhelming majority
    being deep learning models) is potentially the most evolved across AI capabilities.
    This is a combination of the incredible amount of work that has gone into machine
    vision^([^(32)](#fn32)) coupled with the suitability of deep learning architectures
    to handle raw image data.


    There are powerful tools to label or annotate images that can then be used to
    train models and, unsurprisingly, there are several possibilities within a work
    environment.


    - *Authentication and authorization*: Face recognition can be used to identify
    people and provide access to work office spaces. It is not without its challenges,
    though. It can offer a more seamless experience and, under the right conditions,
    a more reliable security environment. However, it comes with risks, as companies
    will need to store biometric data.^([^(33)](#fn33))


    - *Fraud detection*: In industries such as hospitality and retail machine vision
    can be used to detect when items are not properly processed at point of sales
    systems. They can monitor employees or clients as they are passing objects over
    barcode readers.^([^(34)](#fn34))


    - *Asset monitoring and management*: The analysis of images of physical assets
    can reveal where faults are close to occurring and optimize the maintenance of
    workspaces.


    - *Digitization and categorization of analog documents*: We are a long way away
    from becoming entirely digital, and we have a swath of historical documentation
    that we still need to deal with. Machine vision can be applied both to categorize
    documents (e.g., identify receipts, sales reports, pay slips) and also digitize
    them so that the information within them is immediately accessible.^([^(35)](#fn35))


    Just as with NLP, there are powerful tools readily available to test out ideas
    with machine vision. A great example I’ve encountered, that tells the story of
    how accessible tooling has become, is of an intern building a fully digitized
    system for monitoring parking availability for the entire workforce over a single
    summer. They used the data coming from security cameras to figure out what parking
    spaces where available based on the movement of cars, exposed that information
    in the company intranet, and set up parking boards for everyone to see. This improved
    everyone’s experience of coming to work and required, all said, minimal effort.


    As with everything else, care needs to be taken to ensure that the capability
    you think you have developed can translate to wider deployment. Machine vision
    is notorious for providing false positives or completely missing the target. When
    dealing with life and death situations, such as autonomous driving, that is simply
    not acceptable. However, when the goal is to make an existing process more efficient
    (such as letting people know whether there is a parking space), some errors can
    be tolerated. Similarly, if we are using images to detect people in pictures in
    order to better classify a catalogue of media images, we are saving ourselves
    time and don’t mind some errors. If we are using face detection technologies coupled
    with emotion recognition to determine the emotional state of a workforce,^([^(36)](#fn36))
    we are definitely overstepping what the technology can usefully achieve and risk
    alienating users.


    # Custom Capabilities


    Language and Vision are generic capabilities with wide applicability across different
    domains. Exploiting them appropriately across your organization can give you a
    significant advantage. There is space to innovate in how you use them and where
    you apply them, but it will become increasingly harder to complete with others
    on building better NLP or vision systems. The effort required will likely not
    justify the potential benefits for most companies. Ultimately, we can expect powerful
    NLP and vision capabilities to become the minimum standard necessary, rather than
    a competitive differentiator.


    Instead, an area where there is possibility for your organization to differentiate
    and create more of a moat around your competitive advantage is in creating your
    own “custom” capabilities. These are ways you can represent, reason, and act in
    the world in a way that is specific to your organization because it is a result
    of models that you have devised and data that only you own. I like to think of
    these as your organizational superpowers. Just like hero superpowers, they are
    the things that separate you from the other superheroes. Some heroes can see better,
    while some can jump higher or pack a mightier punch. Those are their super capabilities.
    The question is: what is your organization’s superpower when it comes to AI capabilities?


    To develop a custom capability, you need to create the right circumstances. Just
    like the Hulk, Ironman, or Spiderman, you need to walk into a lab and mess around
    with the different ingredients to see what can come out of them.


    For example, there may be something specific in the way you collect customer data
    that allows you to model and reason about the behavior of your clients in a way
    that others simply can’t. You may have developed a culture and put in a place
    a process that means your team provides structured feedback in a consistent manner.
    This enables you to get a better overall understanding of team well-being and
    what needs to change, leading to a happier and better performing workforce.


    Perhaps, just like Superman coming from a different planet, you are entering a
    new market and can bring a perspective to it and new capabilities, in terms of
    how a process can be automated, that incumbents have simply not considered or
    are too comfortable to care about. The way fintech start-ups are disrupting traditional
    banks is a good example of this. They don’t carry any baggage and are approaching
    the problem from a technology-first perspective in a way that the incumbents find
    hard to achieve.


    The crucial element is to recognize that what you are looking to develop is a
    capability: a way to understand and reason about a specific aspect of the world.
    Starting from there you can then explore the techniques available and start combining
    them to get to a specific solution.'
