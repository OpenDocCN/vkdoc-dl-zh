- fmt: '# Conversational Collaboration Platforms


    In Chapter [7](#472369_1_En_7_Chapter.xhtml) we talked about the rise of messaging
    applications both within organizations and as a means for organizations to communicate
    with users. We touched on how messaging applications are the fastest growing application
    type and how that creates an opportunity for business to talk to consumers (and
    their employees) in a whole new way.


    In the same way that messaging applications on our phones such as `WhatsApp` or
    `Telegram` are much more than just a means to exchange messages between two users,
    messaging applications in the work environment have evolved and matured to support
    a range of activities. In fact, the evolution is such that calling them simply
    messaging applications or chat applications doesn’t capture what they are really
    doing. It is far more appropriate to call them *conversational collaboration platforms*.


    They are ***conversational*** because the primary means of interaction with other
    users on the platform (and quite often other applications) is through the exchange
    of messages. This gives us, the humans, the upper hand. We are very used to conversations,
    since it is how we already communicate and collaborate outside the digital domain.
    Conversations on these platforms can take different forms. From free-flowing conversations
    with colleagues in private 1-1 communication, to group discussions, to conversations
    with applications that will use a mix of natural language and more structured
    actions.


    They are all about ***collaboration***. The only reason we introduce this software
    into our organization is because we think it will make it easier for us to get
    things done. If they fail in that task, they’ve failed their goal. As we discussed
    in Chapter [3](#472369_1_En_3_Chapter.xhtml), we can consider to what extent they
    are passive in helping us achieve this goal or they are active participants. A
    simple messaging application that does nothing other than facilitate the exchange
    of messages is a passive participant. Increasingly, however, these tools are becoming
    active participants. Whether it is `Slack`, `Microsoft Teams`, or `Facebook Workplace`,
    their product development teams include AI experts that are working to make these
    tools more useful by introducing various forms of automation. `Slack`, for example,
    will highlight what it considers important messages, and it gives you the ability
    to sort messages you have missed “scientifically” in addition to more common choices
    like “newest” or “oldest.” What they mean by “scientifically” is that a machine
    learning algorithm helped them order messages based on some measure of importance
    that they derived by monitoring your interactions in your `Slack` environment.
    The hope is that this will allow you to focus on the important things first, which,
    in turn, will facilitate collaboration with the entire team.


    Finally, they are ***platforms*** because they offer a rich set of ways to add
    functionality to them. We can install applications that can redirect our e-mail
    to show up in a shared message board, help us better integrate with project management
    tools, or help us plan and coordinate meetings. We can also develop our own applications,
    unique to our organization, that can expose custom functionality to everyone,
    such as the ability to cause actions to happen in other applications.


    As such, these conversational collaboration platforms can become the glue that
    connects all the different aspects of our organization (people, processes, and
    tools) and the interface through which we access them. They can become our organization’s
    operating system.


    Conversational collaboration platforms can become our organizational operating
    system, one that more closely resembles our organization and on top of which we
    can combine people, process, and tools to achieve our goals.


    In the next section we will take a closer look at exactly what a conversational
    collaboration platform looks like in an office environment and why it is becoming
    such a popular tool. We will use `Slack` as our starting point, as it represents
    both a good example of the type of environment we are exploring and a simple one.
    We will also reference `Facebook Workplace`, since it expands the paradigm with
    some more “traditional” social networking ideas.


    As a slight aside, `Slack` is also interesting as a company and startup. Their
    rise is exemplary of the significance of the space of conversational collaboration
    platforms. When `Slack` was originally announced, as a pivot from a different
    operational and business model, people had a lukewarm reaction. It was going after
    a space that most would describe as not particularly exciting. Why would you want
    to build yet another instant messaging application and compete with the likes
    of `Skype`, `Google Talk`, the old and trusted `IRC` (Internet Relay Chat) and
    the myriad of apps out there that allowed people to chat? What people failed to
    see, though, is that `Slack` was never trying to build “just” an instant messaging
    application. `Slack` was working on a conversational collaboration platform for
    the office.


    `Slack` realized that while there were a lot of ways to solve the instant communication
    problem, there were few that were tackling the broader problem of collaboration
    in a way that teams could self-manage. This relentless focus on supporting work
    in a more general sense (and not just messaging) coupled to great marketing techniques,
    easy sign-up processes for teams, and effective design made `Slack` the darling
    of many office teams.


    `Slack` was so successful that even teams that were already provided with an officially
    approved communications tool (usually `Skype for Business`) would install `Slack`
    “under the radar” because it represented a better, more fun way for them to collaborate.
    The company grew in just a few years to revenues of $401 million in 2019 and a
    market value of $15 billion. In the meantime, `Microsoft` has responded with `Microsoft
    for Teams` (the “Slack” of the Office Suite) and as of 2019 was claiming more
    users than `Slack`, since they could exploit their enormous reach into all types
    of organizations. `Facebook`, on the other hand, has a quiet (in media terms)
    but huge (in numbers terms) success story on its hands with `Facebook Workplace`,
    which is exactly what the name betrays. Its promise is that it provides all the
    familiarity and power of the most popular social network and messaging infrastructure
    exclusively for your business. Companies like `Walmart`, `Spotify`, `Starbucks`,
    and `Heineken` are using it as the common platform for their entire workforce.


    ## Core Features


    Conversational collaboration platforms need to tackle at least six key areas to
    act as a strong starting point for the organization’s digital OS. They need to:


    * Provide a way for us to find and interact with everyone else in the organization.

    * Indicate what the team is doing and who is available.

    * Support 1-1 as well as group conversations in a variety of configurations based
    on project needs.

    * Support the exchange and display of documents and links.

    * Allow search across both conversations and documents.

    * Provide the means to integrate with the outside world (i.e., the rest of the
    organization’s digital estate as well as outside partners and service providers).'
  raw: '## Conversational Collaboration Platforms


    In Chapter [7](#472369_1_En_7_Chapter.xhtml) we talked about the rise of messaging
    applications both within organizations and as a means for organizations to communicate
    with users. We touched on how messaging applications are the fastest growing application
    type and how that creates an opportunity for business to talk to consumers (and
    their employees) in a whole new way.


    In the same way that messaging applications on our phones such as WhatsApp or
    Telegram are much more than just a means to exchange messages between two users,
    messaging applications in the work environment have evolved and matured to support
    a range of activities. In fact, the evolution is such that calling them simply
    messaging applications or chat applications doesn’t capture what they are really
    doing. It is far more appropriate to call them *conversational collaboration platforms*.


    They are ***conversational*** because the primary means of interaction with other
    users on the platform (and quite often other applications) is through the exchange
    of messages. This gives us, the humans, the upper hand. We are very used to conversations,
    since it is how we already communicate and collaborate outside the digital domain
    . Conversations on these platforms can take different forms. From free-flowing
    conversations with colleagues in private 1-1 communication, to group discussions,
    to conversations with applications that will use a mix of natural language and
    more structured actions.


    They are all about ***collaboration*** . The only reason we introduce this software
    into our organization is because we think it will make it easier for us to get
    things done. If they fail in that task, they’ve failed their goal. As we discussed
    in Chapter [3](#472369_1_En_3_Chapter.xhtml), we can consider to what extent they
    are passive in helping us achieve this goal or they are active participants. A
    simple messaging application that does nothing other than facilitate the exchange
    of messages is a passive participant. Increasingly, however, these tools are becoming
    active participants. Whether it is Slack, Microsoft Teams, or Facebook Workplace,
    their product development teams include AI experts that are working to make these
    tools more useful by introducing various forms of automation. Slack, for example,
    will highlight what it considers important messages, and it gives you the ability
    to sort messages you have missed “scientifically” in addition to more common choices
    like “newest” or “oldest.” What they mean by “scientifically” is that a machine
    learning algorithm helped them order messages based on some measure of importance
    that they derived by monitoring your interactions in your Slack environment. The
    hope is that this will allow you to focus on the important things first, which,
    in turn, will facilitate collaboration with the entire team.


    Finally, they are ***platforms*** because they offer a rich set of ways to add
    functionality to them. We can install applications that can redirect our e-mail
    to show up in a shared message board, help us better integrate with project management
    tools, or help us plan and coordinate meetings. We can also develop our own applications,
    unique to our organization, that can expose custom functionality to everyone,
    such as the ability to cause actions to happen in other applications.


    As such, these conversational collaboration platforms can become the glue that
    connects all the different aspects of our organization (people, processes, and
    tools) and the interface through which we access them. They can become our organization’s
    operating system.


    Conversational collaboration platforms can become our organizational operating
    system, one that more closely resembles our organization and on top of which we
    can combine people, process, and tools to achieve our goals.


    In the next section we will take a closer look at exactly what a conversational
    collaboration platform looks like in an office environment and why it is becoming
    such a popular tool. We will use Slack as our starting point, as it represents
    both a good example of the type of environment we are exploring and a simple one.
    We will also reference Facebook Workplace, since it expands the paradigm with
    some more “traditional” social networking ideas.


    As a slight aside, Slack is also interesting as a company and startup. Their rise
    is exemplary of the significance of the space of conversational collaboration
    platforms. When Slack was originally announced, as a pivot from a different operational
    and business model, people had a lukewarm reaction. It was going after a space
    that most would describe as not particularly exciting. Why would you want to build
    yet another instant messaging application and compete with the likes of Skype,
    Google Talk, the old and trusted IRC (Internet Relay Chat) and the myriad of apps
    out there that allowed people to chat? What people failed to see, though, is that
    Slack was never trying to build “just” an instant messaging application. Slack
    was working on a conversational collaboration platform for the office.


    Slack realized that while there were a lot of ways to solve the instant communication
    problem, there were few that were tackling the broader problem of collaboration
    in a way that teams could self-manage. This relentless focus on supporting work
    in a more general sense (and not just messaging) coupled to great marketing techniques,
    easy sign-up processes for teams, and effective design made Slack the darling
    of many office teams.


    Slack was so successful that even teams that were already provided with an officially
    approved communications tool (usually Skype for Business) would install Slack
    “under the radar” because it represented a better, more fun way for them to collaborate.
    The company grew in just a few years to revenues of $401 million in 2019 and a
    market value of $15 billion. In the meantime, Microsoft has responded with Microsoft
    for Teams (the “Slack” of the Office Suite) and as of 2019 was claiming more users
    than Slack, since they could exploit their enormous reach into all types of organizations.
    Facebook, on the other hand, has a quiet (in media terms) but huge (in numbers
    terms) success story on its hands with Facebook Workplace, which is exactly what
    the name betrays. Its promise is that it provides all the familiarity and power
    of the most popular social network and messaging infrastructure exclusively for
    your business. Companies like Walmart, Spotify, Starbucks, and Heineken are using
    it as the common platform for their entire workforce.


    ### Core Features


    Conversational collaboration platforms need to tackle at least six key areas to
    act as a strong starting point for the organization’s digital OS. They need to


    *   Provide a way for us to find and interact with everyone else in the organization.


    *   Indicate what the team is doing and who is available.


    *   Support 1-1 as well as group conversations in a variety of configurations
    based on project needs.


    *   Support the exchange and display of documents and links.


    *   Allow search across both conversations and documents.


    *   Provide the means to integrate with the outside world (i.e., the rest of the
    organization’s digital estate as well as outside partners and service providers).'
  trans: '

    # 对话式协作平台


    在第 7 章中，我们讨论了即时通讯应用在组织内部以及作为组织与用户沟通手段的兴起。我们简要介绍了即时通讯应用为何是增长最快的应用类型，以及这如何为企业以全新方式与消费者（及其员工）沟通创造了机遇。


    正如我们手机上的`WhatsApp`或`Telegram`等即时通讯应用远不止是用户之间交换信息的工具，工作环境中的即时通讯应用也已发展成熟，能够支持一系列活动。事实上，其演变程度之大，以至于简单地称其为即时通讯应用或聊天应用已无法涵盖其实际功能。更恰当的说法是，应称其为*对话式协作平台*。


    它们是***对话式***的，因为与平台上其他用户（以及通常还有其他应用）互动的主要方式是通过信息交换。这赋予了我们人类优势。我们非常习惯于对话，因为这是我们在数字领域之外进行沟通与协作的方式。这些平台上的对话可以采取不同形式，从私密的一对一沟通中与同事的自由交流，到群组讨论，再到与使用自然语言和更结构化操作相结合的应用进行对话。


    它们完全关乎***协作***。我们将此类软件引入组织的唯一原因，是我们认为它能让我们更轻松地完成任务。如果它未能实现这一目标，那便辜负了其使命。正如我们在第
    3 章中讨论的，我们可以思考它们在帮助我们实现目标时是处于被动地位，还是主动参与者。一个仅促进信息交换的简单即时通讯应用是被动参与者。然而，这些工具正日益成为主动参与者。无论是`Slack`、`Microsoft
    Teams`还是`Facebook Workplace`，其产品开发团队都包含人工智能专家，他们正致力于通过引入各种形式的自动化来让这些工具更有用。例如，`Slack`会高亮显示其认为重要的信息，并让你能够除了“最新”或“最旧”等常见排序选项外，还能“科学地”排序你错过的信息。这里“科学地”的含义是，机器学习算法根据通过监控你在`Slack`环境中的互动而推导出的重要性指标，对信息进行排序。其希望是，这能让你优先关注重要事项，从而促进与整个团队的协作。


    最后，它们是***平台***，因为它们提供了丰富的方式来为其添加功能。我们可以安装应用，将电子邮件重定向到共享留言板，帮助我们更好地与项目管理工具集成，或帮助我们规划和协调会议。我们还可以开发自己组织独有的应用，向所有人开放自定义功能，例如触发其他应用执行操作的能力。


    因此，这些对话式协作平台可以成为连接组织各个不同方面（人员、流程和工具）的粘合剂，以及我们访问这些方面的界面。它们可以成为我们组织的操作系统。


    对话式协作平台可以成为我们组织的操作系统，一个更贴近我们组织形态的系统，在其之上我们可以整合人员、流程和工具来实现目标。


    在下一节中，我们将更深入地探讨对话式协作平台在办公环境中的具体形态，以及它为何成为如此受欢迎的工具。我们将以`Slack`为起点，因为它既是我们正在探索的环境类型的一个良好范例，也是一个简单的范例。我们还将提及`Facebook
    Workplace`，因为它通过一些更“传统”的社交网络理念扩展了这一范式。


    顺便提一下，`Slack`作为一家公司和初创企业也很有趣。它的崛起堪称对话式协作平台领域重要性的典范。当`Slack`最初宣布从不同的运营和商业模式转型时，人们的反应并不热烈。它瞄准的是一个大多数人认为并不特别令人兴奋的领域。为什么要构建又一个即时通讯应用，与`Skype`、`Google
    Talk`、老牌且值得信赖的`IRC`（互联网中继聊天）以及众多允许人们聊天的应用竞争呢？然而，人们未能看到的是，`Slack`从未试图构建“仅仅”一个即时通讯应用。`Slack`一直在为办公环境打造一个对话式协作平台。


    `Slack`意识到，虽然解决即时通讯问题的方法很多，但很少有方法能以团队能够自我管理的方式解决更广泛的协作问题。这种对支持更广义工作（而不仅仅是消息传递）的不懈关注，加上出色的营销技巧、简便的团队注册流程和有效的设计，使`Slack`成为众多办公团队的宠儿。


    `Slack`非常成功，以至于即使团队已经配备了官方批准的通讯工具（通常是`Skype for Business`），他们也会“暗中”安装`Slack`，因为它代表了一种更好、更有趣的协作方式。该公司在短短几年内发展壮大，2019
    年收入达到 4.01 亿美元，市值达到 150 亿美元。与此同时，`微软`推出了`Microsoft for Teams`（Office 套件中的“Slack”）作为回应，并自
    2019 年起声称用户数超过`Slack`，因为他们可以利用其庞大的触角覆盖各类组织。另一方面，`Facebook`凭借`Facebook Workplace`取得了（媒体层面）低调但（数字层面）巨大的成功，其名称已说明一切。它的承诺是，为你的企业独家提供最流行的社交网络和消息基础设施的所有熟悉感和强大功能。像`沃尔玛`、`Spotify`、`星巴克`和`喜力`这样的公司正在将其用作整个员工队伍的通用平台。


    ## 核心功能


    对话式协作平台至少需要解决六个关键领域，才能作为组织数字操作系统的坚实起点。它们需要：


    * 提供一种方式，让我们能够找到并与组织中的其他人互动。

    * 指示团队正在做什么以及谁有空。

    * 支持基于项目需求的各种配置下的一对一及群组对话。

    * 支持文档和链接的交换与展示。

    * 允许跨对话和文档进行搜索。

    * 提供与外部世界（即组织其余的数字资产以及外部合作伙伴和服务提供商）集成的手段。

    '
- fmt: '#### People


    The first step is, of course, to gather the people on the platform and be able
    to discover them in useful ways. In this context, it is informative to consider
    the differences between Slack and Facebook Workplace. Slack starts out as a messaging
    platform and grows into a conversational collaboration platform. Facebook Workplace
    starts out as a social network and grows into a conversational collaboration platform.
    The different starting points are evident in how they handle people information.


    On Slack, each member has a profile with some very basic information (photo, e-mail,
    a “what I do” field). Users can add additional fields, and Slack offers both “built-in”
    fields such as a link to your LinkedIn profile or the ability to create custom
    fields. Workplace, on the other hand, betrays its origins by starting out with
    a much richer profile including fields for things such as skills and departmental
    information.


    In either case, what is significant is the ability to create profiles with *structured*
    information so that software can take advantage of that information in automation
    processes. Going back to the AI techniques mentioned in Chapter [4](#472369_1_En_4_Chapter.xhtml),
    this structured information can, for example, power a broader knowledge graph
    of people and their skills. Depending on your specific needs, you can add fields
    that describe information that your organization cares about. Through the platform,
    people can self-manage their part of the knowledge graph, which can then be aggregated
    and reasoned over.


    You could either contain all relevant information within the conversational collaboration
    platform or integrate it with a more powerful external tool that pulls information
    from the platform. This information can then be used to power searches to find
    people in the organization, based on a variety of parameters such as skills, departments,
    geographical location, and so on.


    #### Presence


    The green dot next to a person’s name, indicating whether they are logged into
    their messaging application or not, is the digital equivalent of glancing across
    the office to see if Sarah is at her desk. However, unlike the analog world, we
    can make that green dot more interesting by posting a specific status update next
    to it such as: “please don’t disturb,” “happy to chat,” “trying to focus,” “having
    lunch,” etc. We are providing context that in the analog world could be hard to
    replicate. This is useful information that both colleagues and automated programs
    can exploit to determine how best and when best to interact with someone. A simple
    example of utilizing this is integrating your calendar with your status information.
    Now people can know that even though you are at your desk you are actually in
    an online meeting, or you are working through time you blocked on your calendar
    for a specific task.


    These types of integrations are the building blocks for increasingly more intelligent
    and interesting automation. Automation needs a clear as possible model of the
    world it is trying to automate. Presence information is a piece of that puzzle.


    In addition, it is not just information that is useful to describe the current
    state of things. Presence information *over time* also gives valuable information
    about the ebb and flow of work in an organization. When do people log on, how
    long do they stay logged on, how do other events (company meetings, conferences,
    etc.) influence the availability of people?


    #### Conversations


    Conversations are, of course, at the heart of any messaging application. The key
    aspect here is the application’s ability to support the richness of different
    types of conversations that may be required. In the same way that in an analog
    office we congregate in different places for different reasons, the digital space
    must allow it. You *can* have digital watercoolers, kitchenettes, private meeting
    rooms, and town hall assemblies.


    There are three dimensions to consider: the structure of groups, the type of conversations,
    and control of access to groups.


    First, in what configurations of groups (or channels) are we able to converse?
    We need to be able to have 1-1 conversations, ad hoc group conversations as well
    as longer-term topic-based conversations. The different configurations will end
    up being a reflection of how your organization operates. At times it may be a
    truer reflection of the real groupings than what your official organizational
    chart reveals.


    Second, what type of conversation should be taking place? One example is the difference
    between a free-for-all open-ended conversation and a more Facebook-like interface
    with a main long-form post and comments below that. In Slack that is partly replicated
    with threads, where a user can reply directly to a specific message within a channel,
    making that top message the equivalent of a post in Facebook. There are also applications
    that attempt to marshal conversations so that clear outputs can be highlighted
    and specific decisions are pulled out of the flow of input.


    Finally, from a security perspective you need to consider


    *   Who is able to join or leave groups?


    *   When a new member joins a group, do they have access to the historical information
    in that group or not?


    *   Who can create private groups and what are the rules that govern these behaviors?
    If an organization is striving for transparency but people realize that there
    are numerous private groups that they cannot join, what does that say about the
    organization?


    *   In general, are conversations to be considered truly private (even 1-1 conversations)
    or is the organization planning to access that information. In simple terms, if
    I am chatting away with a colleague in a private conversation on the organizational
    conversational platform, who might eventually view that information?


    Different situations and different types of groups will call for different approaches.
    What works best is something that each team needs to explore and experiment with.
    The one fundamental point here is that these issues should not be considered minor
    details or secondary. In just the same way that one would not allow physical spaces
    to be arbitrarily designed, your digital spaces need the same care and attention.
    As we discussed in Chapter [6](#472369_1_En_6_Chapter.xhtml), everything feeds
    into what defines you as a group. If you are not intentional about what culture
    is being developed, you may end up with a culture and processes that are not only
    unsuitable but also very hard to change.


    Next, I outline some examples of different types of groups, based on configurations
    I’ve seen across multiple environments, to give you a more concrete view of what
    different setups can look like.


    *   *Community of practice groups*: These groups support people working in the
    same field across an organization (e.g., all front-end developers, all project
    managers, all digital marketing people) to share information and chat about the
    way they do their work.


    *   *Project groups*: Project groups provide a space for a cross-functional team
    working on a project to gather and focus on just that work. They last as long
    as the project requires them, and the participants can change as people join and
    leave the project.'
