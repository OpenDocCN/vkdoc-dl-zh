  trans: '

    ### 强化学习


    最后，我们来到强化学习，它是机器学习三兄弟中最有趣的一个。强化学习最接近人们直觉上对自然界中训练与学习的理解。


    当我们训练宠物做某事，比如听到呼唤就过来，或听到指令就坐下时，我们并不会向它展示大量关于“过来”或“坐下”的正确与错误示例！相反，我们会尝试引导宠物做出我们期望的行为，一旦它做到了，就给予丰厚的奖励。这种奖励强化了“这是正确行为”的认知。我们不断重复这个过程，直到宠物明确地将“过来，麦克斯！”这样的特定指令与奖励，并最终与期望的行为联系起来。同样，并且希望是经过深思熟虑的，当发现错误行为时，我们会惩罚宠物（理想情况下，不过是用严厉的声音或锐利的眼神）。这教会了宠物哪些是不被期望的行为，因为它们会导致惩罚而非奖励。


    这些正是强化学习带入数字世界的原则。通常的设置是：定义一个某种环境，智能体可以在其中行动，而环境设计者在达到期望状态时提供惩罚或奖励。研究人员在训练智能体时可以采取多种方法，例如持续提供反馈，或者仅仅在游戏结束时给予奖励（或惩罚）。例如，你可以让一个智能体下国际象棋，除了教它如何移动棋子之外，不教它任何关于国际象棋实际运作的知识，只在游戏结束时提供反馈。智能体可以运行数百万局游戏，这意味着即使它最初对游戏一无所知，最终也可能偶然发现一种有趣的、能导致胜利的棋局策略。


    强化学习的重大时刻出现在谷歌成功构建了`AlphaGo`系统，该系统击败了围棋世界冠军。围棋被认为比国际象棋难解决得多，因为智能体可能处于的状态多得多，这使得持续计算和搜索下一步最优棋步几乎成为一个棘手的问题。因此，在
    IBM 的`Deep Blue`征服国际象棋之后，许多人工智能研究者将目光投向了围棋。最终，谷歌 DeepMind 团队获胜了。他们结合了监督学习和强化学习来训练深度神经网络，并辅以新颖的搜索策略^(²⁵)，从而提出了获胜的方法。有趣的是，这种技术组合意味着`AlphaGo`能够比`Deep
    Blue`更具“战略性”，后者依赖于更暴力的技术，即评估从特定位置出发的所有可能对局结果。此外，`AlphaGo`通过监督学习和强化学习发现了正确的下法，而不是依赖提供给它的更明确的评估函数。


    强化学习对于人工智能研究来说仍然是一片非常肥沃的土壤，还有许多东西等待我们去发现。虽然赢得围棋等游戏是为了追求人工智能研究的重大挑战，但它在从机器人技术到制造业、交通运输、交易等众多行业中都有着非常实际的应用。


    ### 深度学习与人工神经网络


    深度学习（DL）和人工神经网络（ANN）是在人工智能语境中被频繁提及的术语，因此有必要在此澄清它们的确切定位和本质。首先，让我们明确，人工神经网络是实现监督学习或无监督学习的一种方式。还有其他几种方式可以实现这一点，但人工神经网络是近年来最令人兴奋的发展领域，也是取得诸多进步的源泉。


    人工神经网络的基本前提是，做出决策的方式是将数据输入到一个由多层连接的“神经元”组成的网络中。^(²⁶) 每个神经元接收一个输入，通过与该输入相关的*激活*函数（一个给定若干输入后能给出输出的方程）进行处理，然后沿着一条加权路径，向下一层中与之相连的一个或多个神经元触发后续输入。见图
    4-1。


    ![../images/472369_1_En_4_Chapter/472369_1_En_4_Fig1_HTML.jpg](img/472369_1_En_4_Fig1_HTML.jpg)


    图 4-1. 单个人工神经元


    大体上，每一层都专门负责识别输入信息的某些特征，并将这些信息前馈给后续的层。内部可以有任意数量的神经元和层，但最终都会导向一个输出层，在该层中，最终被激活的一组神经元将为我们提供答案。见图
    4-2。


    ![../images/472369_1_En_4_Chapter/472369_1_En_4_Fig2_HTML.jpg](img/472369_1_En_4_Fig2_HTML.jpg)


    图 4-2. 具有多个隐藏层的人工神经网络


    当我们训练一个人工神经网络时，我们使用一个训练模型来操纵与每个神经元上各个激活函数相关的参数（或偏置），以及神经元之间连接的参数，直到最终层开始提供期望的结果。这些参数在每个训练周期后如何变化，以及这一切最终如何导向一个好的结果，正是深度学习专家们关注的焦点。


    深度学习是一个总括性术语，用于描述使用人工神经网络的技术，通常采用高度多层化的架构，其中层可以向前和向后连接，并且多种架构可以组合成一个整体。


    深度学习技术的主要优势在于，它们显著减少了确定需要向人工神经网络输入哪些特征以进行训练的需求。例如，如果你试图训练一个模型来正确识别人脸，你可能会先将图像中的物体分解为基本的几何形状，然后将这些信息输入到人工神经网络中。而使用深度学习，这项工作将由网络本身完成。我们只需输入所有原始数据：图像中每个像素的值。人工神经网络将根据其架构和训练数据自行提取特征，每一层“学习”一个特征，后续层则将这些特征聚合为更高层次的概念。


    然而，这里有一个问题：我们需要*大量的数据*才能发现合适的特征。此外，最终得到的网络对我们来说非常不透明。我们并不确切知道它决定“关注”图像的哪些部分，从而将一张图像或图像的一部分归类为猫而不是狗。事实上，人工智能文献中充斥着有趣的例子，说明人工神经网络如何会出错，或者只关注极少数特征，从而导致非常脆弱的解决方案。这就是输入数据非常重要的原因。例如，假设你想区分不同的物体，比如汽车和自行车。如果你向人工神经网络展示的所有汽车图片都是城市中的汽车，而所有自行车图片都是乡村中的自行车，那么当你向它展示一辆乡村中的汽车时，你的网络很可能无法正常工作。它很可能将出现多棵树或大量绿色作为判断某物是自行车的指标，就像它会使用物体本身的特征一样。

    '
- fmt: '# The key is to remember that although ANNs may impress us with their results,
    they have no semantic understanding of the data they are processing. They are
    simply looking for any patterns that they can use to classify input data one way
    or another. We quite often mistakenly attribute meaning to results and assume
    that our ANN has discovered something relevant to what we asked. We should never
    assume that. Instead, we need to thoroughly test ANNs with an appropriate variety
    of data and put in place governance to limit the impact of wrong automated decision-making
    so that there is enough confidence that the overall system will work within satisfactory
    parameters.


    ## From Techniques to Capabilities


    In this chapter we reviewed the core artificial intelligence techniques that allow
    us to develop specific capabilities. These are the building blocks, the techniques
    that emerge out of research labs and can then be combined and applied to give
    us complete systems.


    The most important takeaways are:


    1. The core problem is that of finding a model that allows us to describe and
    predict what will happen in a given scenario so we can enable decision-making.


    2. We should not place limitations in terms of where that model can come from.
    We can explicitly design it (model-driven) but we can also use data to helps us
    discover it (data-driven).


    3. Although this is a fast-paced field, the core concepts do not change that quickly.
    Even ANNs, which are viewed as cutting-edge, have been around for decades. Having
    a basic understanding of the key principles behind different techniques helps
    when picking a tool or discussing potential solutions with a team.


    4. Keep an open mind about how techniques can combine to lead to a final result.
    When evaluating potential tools for your own problems, don’t be distracted by
    discussions about the purity or authenticity of one approach vs. another. Focus
    instead on the quality of the final capability that you get.


    As we will see in the next chapter and in subsequent sections, a complete application
    is always the combination of a number of different techniques.


    Footnotes [1](#472369_1_En_4_Chapter.xhtml#Fn1_source) [2](#472369_1_En_4_Chapter.xhtml#Fn2_source)
    [3](#472369_1_En_4_Chapter.xhtml#Fn3_source) [4](#472369_1_En_4_Chapter.xhtml#Fn4_source)


    # 5. Core AI Capabilities


    In the previous chapter we saw that there are lots of different techniques we
    can use and combine to model aspects of intelligent behavior. On their own, however,
    they will not get us far. These techniques only have value in as much as they
    allow us to do something specific and clearly identifiable: transcribing speech
    to text, classifying a document, or recognizing objects in an image. To achieve
    these tasks, we typically need to combine techniques into capabilities.


    AI capabilities represent a concrete thing we can do to better understand the
    world and affect change within it. They are analogous to the human senses. Humans
    can see, hear, smell, touch, and taste. Each one of these senses involves a number
    of subsystems (techniques) that combine to provide the final result.


    Take the ability to see, as an example. Light passes through the cornea and lens
    of our eyes to form an image on the photoreceptors. From there, via the optical
    nerve it reaches our brain to the primary visual cortex. Information there gets
    processed again, and is eventually mapped to specific concepts. We employ different
    techniques for collecting light, transforming it, and processing the results in
    support of a single capability: sight.


    In this chapter we will focus on three broad classes of capabilities that represent
    the most frequent types we encounter in a work environment. They are also the
    most likely to provide immediate benefits in any work environment:


    - The ability to understand and manipulate language (both voice and text) and
    generate language

    - The ability to manipulate images, classify them, and identify specific objects
    in images

    - The ability to combine organizational-specific knowledge and data to create
    organizational-specific capabilities—our very own *superpowers* that can be incredibly
    hard for others to replicate


    The aim of the chapter is to give you a high-level understanding of how these
    capabilities work and examples of their application, so as to demystify the processes
    and allow you to more clearly consider how you could exploit them in your own
    work environment.


    ## Language


    Language is a critical capability that organizations should be looking to exploit
    as much as possible. As knowledge workers our currency, in many ways, is words.
    Whatever the end result of the activity of any office, the way to collaborate
    with colleagues and share ideas is through language.


    Language has some fascinating idiosyncrasies and calls from the outset for a rich
    and interdisciplinary approach. It would be impossible to cover all the challenges
    here, but I think it is useful to consider a few so as to better comprehend the
    scale of the task and realize what an incredible amount of progress has taken
    place.


    To start with, there are obviously multiple languages to deal with. Luckily, different
    languages present several similar characteristics, which means that techniques
    developed to handle one language can often be applied to others, with the main
    caveat being the availability of large enough data in the language we are looking
    to analyze.^([^(27)](#fn27)) Language, however, is not static. The English spoken
    in the UK today is very different from that of past centuries, and the English
    spoken in the United States or Australia is sufficiently different from that of
    the UK that different language models and datasets may be required. Language also
    morphs as it moves from one domain to another. If two experts in civil engineering
    listen in on the conversation of two experts in aerospace engineering, they may
    understand most of the individual words but the overall meaning will be lost to
    them. Words take on new meanings, acronyms are introduced, and quite often, especially
    in spoken language, slang is used that only makes sense in very specific contexts
    and time periods. I am sure that if I asked my dad to “Slack me” he would have
    a very puzzled look, but if I said, “Skype me” he would understand and likely
    reply with “Why don’t we just use FaceTime, shall we?”


    Then there is the issue of understanding what we say when we speak and transcribing
    that to text. Our accent, the acoustics of the space, whether we have a cold or
    not, background noise, or other people talking at the same time all come into
    play to influence what sounds will reach the machine, which needs to then isolate
    the specific data it cares about and transform that into words. Once more, it’s
    not just about a faithful transcription of the sounds into words. We *structure*
    things differently when we speak. We add “ums” and “ahs” and stop and start in
    strange ways that somehow all make sense to us but are not the same way we write.


    As you can see, the challenges are considerable, and it is amazing that we now
    have readily available AI tools that allow us to recognize speech, transcribe
    that to text, understand its meaning, and even generate language. We haven’t solved
    all the problems, but we’ve solved enough of them to make these tools viable for
    use in the development of AI-powered applications.


    We briefly consider the implications of all this in the next section across speech
    recognition, natural language processing (NLP), translation, and natural language
    generation.'
  raw: 'The key is to remember that although ANNs may impress us with their results,
    they have no semantic understanding of the data they are processing. They are
    simply looking for any patterns that they can use to classify input data one way
    or another. We quite often mistakenly attribute meaning to results and assume
    that our ANN has discovered something relevant to what we asked. We should never
    assume that. Instead, we need to thoroughly test ANNs with an appropriate variety
    of data and put in place governance to limit the impact of wrong automated decision-making
    so that there is enough confidence that the overall system will work within satisfactory
    parameters.


    ## From Techniques to Capabilities


    In this chapter we reviewed the core artificial intelligence techniques that allow
    us to develop specific capabilities. These are the building blocks, the techniques
    that emerge out of research labs and can then be combined and applied to give
    us complete systems.


    The most important takeaways are:


    1.  The core problem is that of finding a model that allows us to describe and
    predict what will happen in a given scenario so we can enable decision-making.


    2.  We should not place limitations in terms of where that model can come from.
    We can explicitly design it (model-driven) but we can also use data to helps us
    discover it (data-driven).


    3.  Although this is a fast-paced field, the core concepts do not change that
    quickly. Even ANNs, which are viewed as cutting-edge, have been around for decades.
    Having a basic understanding of the key principles behind different techniques
    helps when picking a tool or discussing potential solutions with a team.


    4.  Keep an open mind about how techniques can combine to lead to a final result.
    When evaluating potential tools for your own problems, don’t be distracted by
    discussions about the purity or authenticity of one approach vs. another. Focus
    instead on the quality of the final capability that you get.


    As we will see in the next chapter and in subsequent sections, a complete application
    is always the combination of a number of different techniques.


    Footnotes [1](#472369_1_En_4_Chapter.xhtml#Fn1_source)   [2](#472369_1_En_4_Chapter.xhtml#Fn2_source)
      [3](#472369_1_En_4_Chapter.xhtml#Fn3_source)   [4](#472369_1_En_4_Chapter.xhtml#Fn4_source)


    # 5. Core AI Capabilities


    In the previous chapter we saw that there are lots of different techniques we
    can use and combine to model aspects of intelligent behavior. On their own, however,
    they will not get us far. These techniques only have value in as much as they
    allow us to do something specific and clearly identifiable: transcribing speech
    to text, classifying a document, or recognizing objects in an image. To achieve
    these tasks, we typically need to combine techniques into capabilities.


    AI capabilities represent a concrete thing we can do to better understand the
    world and affect change within it. They are analogous to the human senses. Humans
    can see, hear, smell, touch, and taste. Each one of these senses involves a number
    of subsystems (techniques) that combine to provide the final result.


    Take the ability to see, as an example. Light passes through the cornea and lens
    of our eyes to form an image on the photoreceptors. From there, via the optical
    nerve it reaches our brain to the primary visual cortex. Information there gets
    processed again, and is eventually mapped to specific concepts. We employ different
    techniques for collecting light, transforming it, and processing the results in
    support of a single capability: sight.


    In this chapter we will focus on three broad classes of capabilities that represent
    the most frequent types we encounter in a work environment. They are also the
    most likely to provide immediate benefits in any work environment:


    *   The ability to understand and manipulate language (both voice and text) and
    generate language


    *   The ability to manipulate images, classify them, and identify specific objects
    in images


    *   The ability to combine organizational-specific knowledge and data to create
    organizational-specific capabilities—our very own *superpowers* that can be incredibly
    hard for others to replicate


    The aim of the chapter is to give you a high-level understanding of how these
    capabilities work and examples of their application, so as to demystify the processes
    and allow you to more clearly consider how you could exploit them in your own
    work environment.


    ## Language


    Language is a critical capability that organizations should be looking to exploit
    as much as possible. As knowledge workers our currency, in many ways, is words.
    Whatever the end result of the activity of any office, the way to collaborate
    with colleagues and share ideas is through language.


