- fmt: '# Structure of Conversational Applications


    What makes up a conversational application? While we don’t want to delve into
    the specifics of implementing applications, it is useful to understand the environment
    within which we are operating. This will help you visualize how you could integrate
    conversational applications (both off-the-shelf and custom ones) into your own
    conversational collaboration platforms.


    The diagram in Figure [9-1](#472369_1_En_9_Chapter.xhtml#Fig1) provides an overview
    of the main components, and we will look at each in turn.


    ![../images/472369_1_En_9_Chapter/472369_1_En_9_Fig1_HTML.jpg](Images/472369_1_En_9_Fig1_HTML.jpg)


    Figure 9-1. Elements of a conversational application


    Central to it all is, of course, the bot itself. The bot is the identity that
    our application assumes in order to interact with users in a conversational platform.
    Just like every other user, it has a name, an avatar to represent it, and can
    provide presence information. It is, for all intents and purposes, another participant
    in our platform. Through the bot engine, the bot can interact with data sources
    and services in order to provide relevant information and carry out tasks.


    Users can interact with bots either within groups (where multiple people can exchange
    messages and collaborate) or through direct 1-1 chats (where just a single user
    and the bot participate). If it is part of a group it can, depending on the granularity
    of settings for applications within a platform, “listen in” on all conversations
    happening in that channel just like any other member. This can be useful if the
    bot is meant to proactively participate in discussions, but if the bot is only
    supposed to provide information and reply when it is directly engaged, it is best
    to look for ways to limit the flow of information to the bot.


    Keep in mind the security implications of allowing a bot to participate in channels
    where sensitive information may be shared. If a bot can listen in on everything,
    this means that necessarily all the information is flowing back to the bot engine.
    If that bot engine is a component that is internal to your organization, that
    may be OK or at least easier to manage. But what if that bot engine is actually
    an SaaS product? Who is the provider and what guarantees do you have that they
    will treat your data appropriately? You need to carefully consider what information
    you are potentially sharing with them and what the terms and conditions are that
    govern this.


    Allowing a bot onto your conversational collaboration platform and giving it permission
    to listen in on all conversations is the same as allowing a stranger to walk into
    your office and listen in.


    Having a bot in a channel can also be useful for a group of people to see the
    results of an interaction with a bot. For example, when someone asks for the latest
    sales numbers from a bot, everyone can see that report. Conversely, you need to
    consider whether that is too much noise for a team or simply not relevant. Often
    the route that conversational applications take is for notifications to arrive
    in a channel, while the execution of operations, actions, or the request for further
    information happens with 1-1 messages.^([^(47)](#fn47))


    Messages that the bot receives make it back to some sort of “bot engine” where
    reasoning will take place about how the bot should reply. Depending on the type
    of message, this is where we would be employing natural language processing to
    extract specific meaning from a user phrase and map that specific meaning to a
    response or action.


    However, not every message will need to be treated as a natural language phrase.
    The bot can present the user with a variety of standard interface elements such
    as buttons, dropdown form elements, checkboxes, and links. Just like when we interact
    with forms on any application, interactions with these elements (e.g., the user
    clicking on a button called “Approve”) provide our bot with unambiguous information
    that it can act on. Consider Figure [9-2](#472369_1_En_9_Chapter.xhtml#Fig2) as
    an example. In the open-ended interaction scenario, the user is asked whether
    they want to renew their membership, and the application is expecting the user
    to type a response in the same way they would reply to a friend. Indeed, the user
    decides to answer with “Sure, why not!” Will the NLP system helping us identify
    responses be able to map that to a yes? It might manage that, but imagine all
    the different ways a human can answer. They could say: “No, no, yeah, go for it.”
    In the structured interaction the user is instead presented with actual options
    that our system will understand: “Yes,” “No,” “Remind me in a week.” That leaves
    much less space for things to go wrong.


    ![../images/472369_1_En_9_Chapter/472369_1_En_9_Fig2_HTML.jpg](Images/472369_1_En_9_Fig2_HTML.jpg)


    Figure 9-2. Open-ended vs. structured interactions


    I have often found myself debating with people about the *authenticity* of a chat
    experience on the premise that structured exchanges, where people can press a
    button or select an option from a dropdown menu are considered *inauthentic*.
    “That’s not a proper chatbot; it’s just a glorified form experience,” the argument
    goes. While I can understand where that thinking is coming from, the first consideration
    must be the ease through which a user can flow through the interactions. If you
    can clarify options for a user with a couple of buttons, then that has to be the
    right thing to do. While we are taking advantage of the conversational nature
    of the interaction, we should not lose sight of the fact that we are in a richer
    digital environment and we have access to a wide range of options.


    In general, it may be useful to consider interactions with conversational applications
    as potentially lying across a broad spectrum of possibilities, as Figure [9-3](#472369_1_En_9_Chapter.xhtml#Fig3)
    illustrates.


    ![../images/472369_1_En_9_Chapter/472369_1_En_9_Fig3_HTML.jpg](Images/472369_1_En_9_Fig3_HTML.jpg)


    Figure 9-3. Interactions with a conversational application


    The more socially oriented and open-ended the interactions are, the more “NLP”
    (in a very general sense) we will need to keep track of context and maintain a
    realistic dialog. A good example of such a bot is Microsoft’s Xiaoice bot.^([^(48)](#fn48))
    It operates within the Chinese WeChat platform and has over 660 million “friends.”
    It is specifically developed to be able to act as a companion and display empathy
    and social skills. The bot has a strong personality and will engage in conversation
    on any topic. It even has its own TV show!


    Alternatively, we may have bots that do allow open-ended interactions, but the
    object is to support a specific task. Intercom’s AnswerBot would fit here. AnswerBot
    will allow users to type in any open-ended question, which it will try to answer
    (by diving into FAQs and articles it was provided). If it fails to get an answer,
    however, or if the user wants to ask a follow-on question on the same topic, it
    quickly hands over to a human. It will not try to keep a conversation going beyond
    that point. The aim is to ensure that interactions are either clearly useful or
    they should swiftly come to an end to allow a human to take over.


    What sort of interactions will your conversational application need to support?
    To what extend do they need to be open-ended vs. structured? What is the bot attempting
    to achieve in general? In the next section I will present a simple set of considerations
    that allows you to map the various dimensions of your conversational application,
    and we will then go on to consider some specific examples of applications.'
