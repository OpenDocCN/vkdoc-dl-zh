  trans: '

    # 人工智能需要什么


    在上一章中，我们将人工智能定义为将决策权委托给机器的过程。在本节中，让我们通过一个示例来揭示实现这种委托可能需要什么。


    你被指派为公司引入自动化流程。经过评估，公司决定值得将员工提交的费用报销审核流程自动化。现在将由软件来决定报销申请是应被批准还是被质疑。这是财务团队讨厌的任务，但对于确保费用得到控制且只有合理项目通过审核却是必要的。你不知道如何着手，于是决定去与财务团队中负责此项工作的两位同事交谈。


    你交谈的第一个人，我们称她为玛丽，她说她们遵循着非常精确的流程。玛丽会查看每张收到的收据，并将其分类为差旅、招待、教育等。然后，玛丽会考虑总花费以及各个明细项目，并将这些信息与提交收据的人当时应该从事的工作，以及围绕其个人和团队在各类别上的最高消费限额的相关规定进行交叉核对。如果所有规定都符合，玛丽就会批准该笔费用。


    第二个人，我们称他为多诺万，听完玛丽的描述后惊讶地退后一步说："哇！这真是太细致了，但我发现规定变化太快或太不明确，我根本跟不上。我的做法是评估提交费用的人，根据他们的整体可靠性和提交的总金额快速做出判断。我还会记录哪些人在年终审计时容易在费用方面出现问题。如果他们通常不惹麻烦，而且我认为他们可靠，我就假定他们做的是对的。如果他们经常惹麻烦，我就会驳回申请，让他们自己再仔细检查一遍，以防万一。"


    "等等！"玛丽震惊地说。"但那样你最终可能会做重复工作或错误分类。" "是啊，我不否认，"多诺万回答。"这种情况可能发生，有些人会抱怨，但我节省了大量时间，不用纠结于每个小细节，最终整体效率反而更高。"


    你离开后思考着听到的内容。玛丽有一套非常精确的规则，并且能准确解释每个决策是如何做出的。多诺万似乎依赖过往数据和历史行为来快速判断是否应该进一步调查。虽然多诺万可能会遗漏一些事情或导致一些重复工作，但整体结果非常高效。玛丽依赖于在任何给定时刻尽可能清晰地理解现行规则，而多诺万则认为规则永远不够清晰，因此他依赖输入（费用报销单）和输出（审计结果）的数据来做判断。


    这对你如何构建自动化系统意味着什么？系统需要做出决策。这一点你非常确定。似乎你可以像玛丽那样明确列出所有规则，或者像多诺万那样，以某种方式教会系统查看历史数据并以此为基础做出决策。你的
    AI 系统需要一种方法，基于某些输入来确定适当的输出是什么。它需要一种推理世界的方式，但事实证明，实现这一点有多种不同的方法。


    好吧，你并不孤单。这正是 AI 研究人员几十年来一直苦苦思索的难题。第一种方法我们可以称之为模型驱动方法。它有一个关于世界如何运作的清晰模型，包含明确的规则和条例来支配它。我们收集所有数据输入点，通过我们的规则集进行处理，然后做出决定。第二种方法则更偏向数据驱动。它认识到我们往往无法明确列出所有规则。我们只知道输入系统的数据和系统输出的数据，然后尝试构建能够复制这种输入/输出关系的程序。我们将无法明确解释为什么某笔费用被批准或质疑，但我们相信数据会指引方向。


    或许还有第三种解决费用报销问题的方法。我们可以结合这两种方法，试图在保留模型驱动方法的清晰性和可靠性的同时，受益于数据驱动方法的效率。不过，在我们探讨如何实现这一点之前，让我们先进一步探索模型驱动和数据驱动的
    AI。


    ## 模型驱动与数据驱动的 AI


    人们可以从无数个角度来划分 AI 工作。从形式逻辑到统计学、进化或涌现行为方法，再到疯狂而奇妙的深度神经网络世界，描述和组合 AI 技术的方式无穷无尽。然而，或许最重要且最持久的区分之一，就是数据驱动
    AI 与模型驱动 AI 之间的区别。


    ### 模型驱动 AI


    模型驱动 AI 描述的是那些依赖于对某个领域、该领域内实体之间的关系以及支配整体行为的规则进行明确描述的技术。


    这种方法在需要能够用确定性规则表达的深度专业知识的领域中尤为适用。基于模型的系统的一个例子是使用牛顿经典力学来模拟现实世界中的运动。我们已经有一套清晰的方程，可以帮助我们预测在给定环境条件下，对物理物体施加力将如何导致该物体运动。没有必要寻找其他方式来学习将会发生什么。既然我们对世界上的现象有了足够好的模型，我们就可以直接使用它。

    '
- fmt: '### So Newton’s Rules are AI!?


    I am well aware that I keep challenging what you may have typically considered
    as AI. That is precisely the point.


    AI is no single thing. Just like math, it is a collection of techniques. The objective
    is to enable us to build machines that can help us make useful deductions about
    the behavior of real-world objects and automate decision-making. It’s best not
    to limit the range of possible solutions to any single technique or group of techniques.


    Imagine a world where Newton’s laws where not understood but, amazingly, data-driven
    machine learning was deeply understood. Equipped only with the tools of neural
    nets and data analysis, you can picture scientists recording hundreds of thousands
    of runs of apples falling from trees to collect data in order to correctly train
    a predictive neural net model of how the apples would bounce off the ground. Newtonian
    physics manages to do it with a small set of easy to understand equations. This
    is precisely the difference between model-driven decision making and data-driven
    decision-making.^([^(19)](#fn19))


    There are many domains in which we need experts to describe the reasoning behind
    decision-making processes. Consider the task of making a diagnosis for many diseases.
    Although data plays a key role, it needs to start from a knowledge base of medical
    understanding that the system can use. Companies such as Babylon Health and Ada,
    which are changing the healthcare landscape by offering large-scale automated
    primary healthcare, employ specialists to build up their models of the medical
    domain.


    Model-based AI is also essential when you need a clear path from inputs to the
    decision the AI system took. As we will discuss further on, one of the biggest
    challenges of heavily data-driven systems is the lack of transparency of how the
    system went from inputs to outputs. With model-driven AI, that process is often
    much more explicit.


    Where model-driven AI fails us, however, is when we have to deal with situations
    wherein we cannot explicitly state what the decision-making process was that we
    ourselves used to get to a result. Try this experiment: what set of rules would
    you use to build a system that can recognize a cat whenever it sees one?


    Using model-driven techniques, we might start by saying that a cat is a four-legged
    animal (what are the rules for describing an animal?), with two eyes (what are
    eyes?), a nose and a mouth. A cat is furry (except when not) and kind of medium-sized
    (except when not and, by the way, compared to what?). A model-based system would
    look at an image, deconstruct it into lines and shapes and colors, and then compare
    against the set of rules we’ve supplied about how lines and shapes and colors
    combine in the world to give us different animals.


    As you can probably already guess, this approach falls apart quickly. There are
    so many rules to describe and so many edge cases, that a model-driven approach
    is not sufficient. This is where data-driven AI steps in.


    ### Data-Driven AI


    With data-driven AI, instead of describing rules or providing straightforward
    mathematical formulas, we build systems that can derive the appropriate rules
    themselves. We essentially take a step back from trying to model a solution and
    build a system that can discover a solution on its own. It does this by analyzing
    large amounts of data that (most frequently) has already been annotated with the
    “correct” and “wrong” examples of the thing we are trying to learn. The principle
    is incredibly simple, but the resulting systems are some of the most complex we
    have created.


    In order to train a system to correctly identify cats, we “show” it a large number
    of pictures (with and without cats) and let it know when it guessed correctly.
    At every turn, the system uses a number of techniques to realign itself so that
    it is more likely to guess correctly again. This process is repeated until it
    is reliably guessing things correctly.


    This is what neural networks do, and after decades of research we have reached
    a level of sophistication and complexity in the architecture that means that,
    for certain domains, we can have impressively reliable predictions.


    There were two turning points along this path that exemplify the achievements
    of what are called deep neural networks and what they need in order to work.


    #### Standing on the Shoulders of Data


    The first turning point was about data.


    In 2009, Professor Fei-Fei Li and her group released a dataset called `ImageNet`.^([^(20)](#fn20))
    It is an annotated database of over 14 million objects. The dataset distinguishes
    specific objects and places them in about 1,000 categories such as animal (~2.8
    million examples), bird (~800,000 examples), food (~1 million examples), and people
    (~ 1 million examples).


    The `ImageNet` data sparked an annual competition for who would be able to build
    an algorithm that performed best in predicting what objects were in an image.


    Up until 2011, the best performing algorithm got to about a 25% error rate. One
    out of four times it got it wrong. Then a new algorithm was introduced that changed
    things definitively.


    #### Give Me Enough Data and the Right Algorithm and I Will Move the World


    Geoffrey Hinton and his group published a seminal paper in 2012,^([^(21)](#fn21))
    wherein they introduced a series of improvements to deep convolutional neural
    networks. Through these changes they achieved an error rate of 17%, a significant
    improvement. The neural network had 60 million parameters and 650,000 neurons.
    It used the work of Andrew Ng et al.^([^(22)](#fn22)) (which we mentioned in Chapter
    [1](#472369_1_En_1_Chapter.xhtml)), taking advantage of GPUs to efficiently handle
    all this complexity.


    This new approach marked a qualitative step change. Over the next few years the
    error rate went down to just a few percentage points. Some hailed that as neural
    networks getting better than humans (since we get it wrong about 5% of the time).
    Cooler minds reminded people that the competition only needs to be accurate across
    1,000 categories, whereas humans can recognize a much bigger range of categories
    as well as complex context.


    The point, however, is that deep neural networks finally got us to a point where
    we could do interesting things reliably enough, in ways that model-based AI cannot
    support.


    The deal does not come without costs. We sacrifice a lot of clarity and explainability
    along the way. We don’t actually know why those 650,000 neurons light up in a
    particular way (and neural nets nowadays can be orders of magnitude bigger). There
    is no chain of decisions to point to. We don’t know what features from the input
    data are the ones that are determining specific choices. This can present important
    ethical and legal challenges, as we will explore in subsequent chapters.'
  raw: '### So Newton’s Rules are AI!?


    I am well aware that I keep challenging what you may have typically considered
    as AI. That is precisely the point.


    AI is no single thing. Just like math, it is a collection of techniques. The objective
    is to enable us to build machines that can help us make useful deductions about
    the behavior of real-world objects and automate decision-making. It’s best not
    to limit the range of possible solutions to any single technique or group of techniques.


    Imagine a world where Newton’s laws where not understood but, amazingly, data-driven
    machine learning was deeply understood. Equipped only with the tools of neural
    nets and data analysis, you can picture scientists recording hundreds of thousands
    of runs of apples falling from trees to collect data in order to correctly train
    a predictive neural net model of how the apples would bounce off the ground. Newtonian
    physics manages to do it with a small set of easy to understand equations. This
    is precisely the difference between model-driven decision making and data-driven
    decision- making.^([^(19)](#fn19))


    There are many domains in which we need experts to describe the reasoning behind
    decision-making processes. Consider the task of making a diagnosis for many diseases.
    Although data plays a key role, it needs to start from a knowledge base of medical
    understanding that the system can use. Companies such as Babylon Health and Ada,
    which are changing the healthcare landscape by offering large-scale automated
    primary healthcare, employ specialists to build up their models of the medical
    domain.


    Model-based AI is also essential when you need a clear path from inputs to the
    decision the AI system took. As we will discuss further on, one of the biggest
    challenges of heavily data-driven systems is the lack of transparency of how the
    system went from inputs to outputs. With model-driven AI, that process is often
    much more explicit.


    Where model-driven AI fails us, however, is when we have to deal with situations
    wherein we cannot explicitly state what the decision-making process was that we
    ourselves used to get to a result. Try this experiment: what set of rules would
    you use to build a system that can recognize a cat whenever it sees one?


    Using model-driven techniques, we might start by saying that a cat is a four-legged
    animal (what are the rules for describing an animal?), with two eyes (what are
    eyes?), a nose and a mouth. A cat is furry (except when not) and kind of medium-sized
    (except when not and, by the way, compared to what?). A model-based system would
    look at an image, deconstruct it into lines and shapes and colors, and then compare
    against the set of rules we’ve supplied about how lines and shapes and colors
    combine in the world to give us different animals.


    As you can probably already guess, this approach falls apart quickly. There are
    so many rules to describe and so many edge cases, that a model-driven approach
    is not sufficient. This is where data-driven AI steps in.


    #### Data-Driven AI


