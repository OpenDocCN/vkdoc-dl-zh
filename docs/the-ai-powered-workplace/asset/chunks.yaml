- fmt: '# An Agent-Based View of AI


    Perspective has the powerful capability to define how you are able to understand
    a problem. Approaching AI from an agent-oriented view liberates us from many of
    the challenges of definition that AI presents while providing us with a solid
    conceptual framework to guide us throughout.


    A simple way to describe agent-based software engineering is that it is a combination
    of software engineering and AI. It studies how AI practitioners have been building
    software and attempts to identify common traits and patterns to inform the practice
    of building AI applications.


    It concerns itself with how intelligent programs (agents) can be structured and
    provides ways to model and reason about the behavior of single agents and the
    interactions between agents. Although we are not dealing specifically with software
    engineering in this book, the concepts and abstractions help us understand any
    AI technology and, crucially, the impact it can have on our processes.


    A key reason for taking an agent-based view is that we can consider *what* the
    agent is doing without having to consider *how* it achieves it. In other words,
    we don’t need to wonder about what specific AI technique the agent is using to
    achieve its task. Too often, discussions get lost in the details of what neural
    network or what statistical technique or what symbolic logics or, worse still,
    what programming language is being used and whether that counts as AI or not.
    This allows camps to be formed about what is “true” AI and what is not. Very often
    in these cases, “true” AI is whatever technique the person claiming truth is most
    fond of or familiar with, and everything else is somehow lesser.


    An agent-based view of AI applications allows us to consider ***what*** the application
    is doing, without having to concern ourselves with ***how*** it is achieving it.


    While we will look at some of the basics of these approaches, in general we shouldn’t
    care *how* the problem is solved. Technologies evolve and ways to solve problems
    change. If you follow AI developments, even tangentially, you soon realize that
    every day, week, and month brings forth new announcements and new amazing architectures.
    Trying to keep track of it all, unless you are a practitioner in that specific
    subfield, is a losing game.


    We should always distinguish the *what* from the *how* and focus on the important
    aspects for us. If you are researching neural net architectures, solving a problem
    with neural nets is the important aspect. If you simply want to know if there
    is a cat in a picture, the most important aspect is that you get reliable answers.
    How you get there is secondary.


    The other reason an agent-based view helps is that we don’t need to actually define
    intelligence. As we’ve mentioned a few times, that is not an easy task anyway.
    If every time we talk about the behavior of a system, we get distracted by discussions
    about whether it is really intelligent or not, we will not get anywhere anytime
    soon. We will, instead, focus on what agents are trying to achieve and their interaction
    with the rest of their environment (including other agents).


    ## Agents


    One of the classic textbooks on AI^([^(16)](#fn16)) describes agents as “anything
    that can be viewed as perceiving its environment through sensors and acting on
    the environment through effectors.” It helps if you think of it as a physical
    robot (Figure [2-1](#472369_1_En_2_Chapter.xhtml#Fig1)). A robot will use sensors
    (cameras, GPS, etc.) to figure out where it is and what is around it, and based
    on that it will cause its motors (its effectors) to act in a way that will take
    it closer to where it needs to be. Crucially, *how* the robot decided to go left
    or right is not important at this point. The internal process that led from sensing
    to acting does not need to be known to describe what the robot is attempting to
    achieve.


    ![../images/472369_1_En_2_Chapter/472369_1_En_2_Fig1_HTML.jpg](Images/472369_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. Agent as a robot receiving inputs and effecting change


    Of course, the robot is moving in a certain way because it is trying to achieve
    something. There is some *desirable* *state of affairs* that it is trying to bring
    about, such as exit a room or transport an object. We call this desirable state
    of affairs its *goal*.


    A **goal** is a desirable state of affairs in the environment—a state that we
    can describe using attributes of that environment.


    Goals are crucial in defining agency. It is the *why* that drives *what* we are
    doing. Why did the robot turn left? Well, it is trying to get to an object that
    is to its left, and so on. As such, the definition of an agent for our purposes
    is that an agent is something that is attempting to achieve a goal through its
    capabilities to effect change in the environment it is in.


    An **agent** is something that is attempting to achieve a **goal** through its
    **capabilities** to effect change in the environment it is in.


    The originators of this agent-based perspective, Professors Michael Luck and Mark
    d’Inverno, give a conceptual and fun example to illustrate this viewpoint. In
    a paper titled “A Formal Framework for Agency and Autonomy,”^([^(17)](#fn17))
    they use the example of a simple coffee cup as something that can be an agent.
    A cup, they propose, can be considered an agent in certain circumstances where
    we can ascribe it a specific purpose (i.e., a goal). For example, when the cup
    is being used to hold liquid, it is achieving our goal of having somewhere to
    keep our coffee. Once it stops serving that purpose, it stops being an agent for
    us.


    I was very attracted by this viewpoint of agency as I was starting out my own
    PhD research, precisely because it provided a solid foothold and avoided vague
    definitions. As a result, I further delved into their original framework in an
    attempt to construct a methodology that would help us not only describe agent
    systems but also build them.


    In my work, I extended the overall framework to provide a few more categories
    that would allow us to more easily describe software as agents. The coffee cup
    is an example of what I called a *passive* agent. It is passive because it has
    no internal representation of the goal it is attempting to achieve. In fact, it
    is the *owner* of the coffee cup who recognizes that the coffee cup can play a
    useful role because of its capability to hold liquid in one place, and it is the
    owner of the coffee cup who knows how to manipulate the coffee cup (pour liquid
    in, hold it upright, and raise it to take a sip).


    A passive agent has no internal representation of a goal. It is left entirely
    to the user to understand how to manipulate the passive agent’s capabilities in
    order to achieve a goal.


    Passive agents are our baseline. It is the software that doesn’t take any initiative,
    and doesn’t do anything unless we explicitly start manipulating it. While this
    may sound like a purely theoretical concept with little practical application,
    it actually describes the majority of software we use right now. Most applications
    are not actively aware of what we are trying to achieve. They provide us their
    myriad menus and submenus, buttons, and forms to fill out and it is left to us
    to understand how we should manipulate them to achieve our goals. Setting this
    baseline and having it as a starting point that describes most software today
    gives us something to build on to describe software that is powered by AI techniques.'
