  trans: '

    #### 人员


    第一步自然是汇聚平台上的成员，并能够以有效的方式发现他们。在此背景下，比较 Slack 和 Facebook Workplace 的差异会很有启发。Slack
    最初是一个消息平台，后来发展成对话式协作平台。Facebook Workplace 最初是一个社交网络，后来也发展成对话式协作平台。两者在人员信息处理方式上的不同起点显而易见。


    在 Slack 上，每个成员都有一个包含一些基本信息的个人资料（照片、电子邮件、“我的工作”字段）。用户可以添加额外字段，Slack 既提供“内置”字段（例如指向你的
    LinkedIn 个人资料的链接），也支持创建自定义字段。而 Workplace 则暴露了其出身，它从一开始就提供更丰富的个人资料，包含技能和部门信息等字段。


    无论哪种情况，关键在于能够创建包含*结构化*信息的个人资料，以便软件在自动化流程中利用这些信息。回到第 4 章提到的人工智能技术，这种结构化信息可以为更广泛的人员及其技能知识图谱提供支持。根据你的具体需求，你可以添加描述组织所关注信息的字段。通过平台，成员可以自行管理自己在知识图谱中的部分，这些信息随后可以被聚合和推理。


    你可以将所有相关信息都包含在对话式协作平台内，也可以将其与一个更强大的、能从平台提取信息的外部工具集成。然后，这些信息可用于支持搜索功能，根据技能、部门、地理位置等多种参数来查找组织内的人员。


    #### 在线状态


    人名旁边的绿色圆点，表示他们是否登录了消息应用，这相当于在数字世界中瞥一眼办公室，看看 Sarah 是否在她的工位上。然而，与现实世界不同，我们可以通过在该圆点旁发布特定的状态更新，使其更有趣，例如：“请勿打扰”、“乐于交谈”、“正在专注”、“吃午饭”等。我们提供了在现实世界中可能难以复制的上下文信息。这些信息很有用，同事和自动化程序都可以利用它来确定与某人互动的最佳方式和最佳时机。利用这一点的一个简单示例是将你的日历与状态信息集成。这样，即使你坐在工位上，人们也能知道你实际上正在参加在线会议，或者你正在处理日历上为特定任务预留的时间。


    这类集成是构建日益智能和有趣的自动化的基石。自动化需要一个尽可能清晰的、关于它试图自动化的世界的模型。在线状态信息就是该拼图的一部分。


    此外，这不仅仅是描述事物当前状态的有用信息。*随时间推移*的在线状态信息还能提供关于组织工作起伏的宝贵信息。人们何时登录，登录多长时间，其他事件（公司会议、大会等）如何影响人员的可用性？


    #### 对话


    当然，对话是任何消息应用的核心。这里的关键方面是应用支持可能需要的不同类型对话的丰富性。就像在现实办公室中，我们会因不同原因聚集在不同地方一样，数字空间也必须允许这样做。你*可以*拥有数字茶水间、小厨房、私人会议室和全体大会。


    需要考虑三个维度：群组结构、对话类型以及对群组访问的控制。


    首先，我们能够在哪些群组（或频道）配置中进行对话？我们需要能够进行一对一对话、临时群组对话以及基于话题的长期对话。不同的配置最终会反映出你组织的运作方式。有时，它可能比官方组织架构图更能真实反映实际的群体划分。


    其次，应该进行什么类型的对话？一个例子是自由开放的开放式对话与更像 Facebook 界面的、包含一篇主要长帖和下方评论的对话之间的区别。在 Slack 中，这通过话题回复部分实现，用户可以直接回复频道中的特定消息，使该顶部消息相当于
    Facebook 中的帖子。也有一些应用试图引导对话，以便突出显示清晰的输出，并从输入流中提取出具体的决策。


    最后，从安全角度考虑，你需要关注：


    *   谁可以加入或离开群组？

    *   当新成员加入群组时，他们能否访问该群组的历史信息？

    *   谁可以创建私密群组，管理这些行为的规则是什么？如果一个组织追求透明度，但成员发现存在许多他们无法加入的私密群组，这又说明了什么？

    *   总的来说，对话是否应被视为真正的私密（即使是一对一对话），还是组织计划访问这些信息？简单来说，如果我在组织对话平台上与一位同事进行私密对话，最终谁可能会看到这些信息？


    不同的情况和不同类型的群组需要不同的方法。每个团队都需要探索和试验，以找到最适合自己的方式。这里的一个基本点是，这些问题不应被视为次要细节或次要问题。就像人们不会允许随意设计物理空间一样，你的数字空间也需要同样的关怀和关注。正如我们在第
    6 章中讨论的，一切都融入了定义你作为一个群体的要素。如果你没有刻意去塑造正在发展的文化，你最终可能会得到一种不仅不合适而且很难改变的文化和流程。


    接下来，我根据在多个环境中看到的配置，概述一些不同类型群组的示例，以便让你更具体地了解不同设置可能的样子。


    *   *实践社区群组*：这些群组支持组织中同一领域的成员（例如，所有前端开发人员、所有项目经理、所有数字营销人员）分享信息并讨论他们的工作方式。

    *   *项目群组*：项目群组为从事某个项目的跨职能团队提供了一个聚集并专注于该工作的空间。它们的存在时间与项目所需时间相同，参与者会随着人员的加入和离开而变化。

    '
- fmt: '### 公告群组

    这些群组旨在发布团队公告，并尽量减少其他类型的互动。这使人们能够轻松追踪这些公告，而不会在更繁忙频道的聊天流中丢失，同时也方便当时不在场的人快速跟上进度。根据您使用的平台，这些群组还可以设置为只读，这样人们就不会试图在相同语境下讨论公告，从而使信息更清晰易懂。


    ### 兴趣与爱好群组

    您的团队中有很多狂热的猫爱好者，或者也许是酒吧问答迷或体育迷吗？为他们创建单独的群组，让他们围绕自己喜爱的话题畅聊，并通过讨论共同兴趣，在实践社区、项目团队和组织部门之间建立联系。


    ### 共享群组

    这是`Slack`的一个特定功能，但我认为它非常令人兴奋。在`Slack`中，您可以创建一个跨不同`Slack`组织共享的群组（或`Slack`特指为频道）。这意味着来自公司A和公司B的人员可以访问一个共享群组进行协作，而`Slack`会处理所有前端的身份验证和授权问题。这是为您和您的合作伙伴创建共享空间、共同协作的好方法。


    除了上述命名分组外，还有其他几种选项和变体，但我希望您能明白，像这样组织数字空间是多么有用。如前所述，关键在于要有意为之，并确保团队考虑（并不断重新考虑）应管理这些群组创建的规范和规则。让我再重复一次：就像在物理空间中，您不希望人们随意移动办公桌或拆墙一样，您需要确保在数字空间中也不会发生这种情况。


    最后，与状态信息一样，了解人们属于哪些群组以及这些群组如何随时间演变，可以非常强大。组织内部花费了大量精力来理解网络动态。像`Slack`这样的协作工具可以提供迄今为止最清晰的信号，表明实际正在发生的事情，供组织利用。您可以直接映射谁在和谁交谈，人们属于哪些团队，甚至可以探索人们协作的方式。他们是建设性的还是批评性的？他们在不同团队和情境下的行为如何变化？


    ### 文档交换

    协作的另一个方面是交换相关文档。像`Slack`这样的工具使这变得极其容易，因为它们允许您直接将文件拖放到对话流中，并附带一条消息。现在，有人可能会说这有点过于简单了，我可以证明它有时会变得多么混乱。想象一下，您正在处理一个文档并与团队讨论，而新版本的文档不断被丢入对话流中。要跟踪您应该关注什么，会变得很累。以这种方式共享文档的理由是，文档是对话和工作的一部分，因此您可以将所有内容保持在上下文中。对话式协作平台的承诺是，搜索和集成将能够再次将这些文档呈现出来。


    确实，已经取得了一些进展。例如，`Slack`与`Google Documents`有一个非常有用的集成。当您共享一个`Google`文档时，您共享的不是实际文档，而是指向当前版本文档的链接，这至少消除了您是否在处理最新版本的问题。然而，问题在于，当您随后进入文档时，您会发现文档内部正在进行另一场对话！`Google
    Documents`允许用户在`Google Documents`内交换评论和聊天。所以现在您有两场对话在进行。一场在`Slack`中，可能没有直接处理文档的人说了一些有趣的话；另一场在`Google
    Documents`中。这显然不是一个理想的情况。


    总的来说，我还没有看到一个真正解决了如何妥善处理这个问题的应用程序。我们正在处理不同的协作工具以及可能不同的协作模式。有时我们共享文档链接，而有时我们共享文档本身。这些文档和链接成为对话的一部分，但搜索并不总是能有效地找到我们真正需要的内容；虽然集成可以提供帮助，但它们也可能增加复杂性。


    规范可以再次在这里提供帮助，因为团队可以明确他们应该如何工作。然而，这绝对是一个需要更多工作的领域，以提供我们真正需要的协作空间。看看像`Dropbox`这样的工具是很有启发性的，它们现在也提供了一个协作环境，但一个更加以文档为中心的环境（因为这是它们的传统）。最终，我们应该看到对话式协作平台发展，以封装一个对文档更友好的工具集。


    ### 搜索

    跨人员、对话和文档的搜索可以将所有内容联系在一起，这是任何对话式协作平台的关键功能。知道您可以依赖强大的搜索是令人解放的，因为它鼓励更高水平的分享和参与，因为人们相信他们能够再次找到这些信息。


    当前的搜索能力令人印象深刻。例如，在`Slack`上，您可以创建一个搜索，查找在“2019年度会议规划频道”中由`Tim`或`Mariola`在特定日期范围内共享的、且包含关键字“`Sponsors`”的文件。响应速度几乎是即时的，结果质量也很高。


    然而，尽管这类搜索功能强大，但它们也需要用户投入精力并集中注意力来构建。用户很容易在众多选择中迷失，或者忘记哪些组合是可能的。总的来说，虽然搜索已经非常有用，但仍有很长的路要走，并且（毫不意外地）这是人工智能技术的进一步应用将使我们取得进展的主要领域之一。


    最终，我希望看到更加对话式的搜索，并且能够从单一位置访问多个不同的文档来源。它应该更加对话式，这样我们就可以以与我们思考相同的方式进行搜索，而不必调整我们的思维以适应工具提供的过滤器和选项。我们应该能够使用自然语言来描述我们需要的，并依靠对话式应用程序的组合来帮助我们浏览可能的选项。它还需要考虑到信息分布在许多不同的地方，从我们的电子邮件到我们的文档存储库以及我们的对话式协作平台。我们需要从平台到外部世界的路径，以便将所有内容连接起来。'
  raw: '*   *Announcement groups*: These groups are meant for team-wide announcements
    and minimal other types of interaction. It makes it easy for people to track these
    announcements without them getting lost in the chat flow of busier channels, and
    also makes it easy for people who were not around to catch up. Depending on the
    platform you are using, these groups can also be made read-only so that people
    are not tempted to discuss the announcements in that same context, making information
    clearer to follow.


    *   *Fun and hobby groups*: Are there a lot of ardent cat lovers in your team,
    or perhaps pub quiz aficionados or sport nuts? Create separate groups for them
    and let them enjoy the chit-chat around their favorite topics, and build bonds
    across communities of practice, project teams, and organizational divisions by
    discussing their favorite topics.


    *   *Shared groups*: This is a Slack-specific feature, but one that I believe
    is very exciting. Within Slack you can create a group (or channel, as Slack specifically
    calls it) that is shared across different Slack organizations. What this means
    is that people from company A and company B can access a shared group to collaborate,
    with Slack handling all the upfront authentication and authorization issues. This
    is a great way to create shared spaces for you and your partners to come together
    and collaborate.


    There are several other options and variations to the aforenamed groupings, but
    I hope you can see how incredibly useful it can be to organize a digital space
    like this. As mentioned earlier, the key is to be intentional and make sure that
    the team considers (and keeps reconsidering) what the norms and regulations are
    that should govern the creation of these groups. Let me repeat it once more: in
    the same way that in a physical space you wouldn’t want people moving desks ad
    hoc or knocking down walls, you need to ensure that it doesn’t happen in the digital
    space.


    Finally, as with presence information, the understanding of what groups people
    belong to and how the shifts evolve over time can be incredibly powerful. A lot
    of effort is spent in understanding the network dynamics within organizations.
    Collaboration tools like Slack can provide the strongest signal yet of what is
    actually happening in the clearest way for organizations to exploit. You can directly
    map who is talking to whom, what teams people belong to, and you can even explore
    the ways people are collaborating. Are they being constructive or critical? How
    does their behavior change across different teams and contexts?


    #### Document Exchange


    Another aspect of collaboration is exchanging relevant documents. Tools like Slack
    make that extremely easy, since they allow you to simply drop files in the flow
    of a conversation with an associated message. Now, one could argue that this is
    a bit too easy, and I can attest to how confusing it can get at times. Imagine
    working on a document and discussing it with a team with new versions of that
    document constantly being dropped into the flow of a conversation. It becomes
    tiring to keep track of what you should be focusing on. The reasoning for sharing
    documents this way is that documents are part of the conversation and work, so
    you can keep everything in context. The promise of conversational collaboration
    platforms is that search and integrations will then be able to surface those documents
    once more.


    Indeed, some progress is being made. For example, Slack has a very useful integration
    with Google Documents. When you share a Google Document you are not sharing the
    actual document but a link to the current version of the document, which at least
    removes the question mark of whether you are working on the latest version. The
    catch, however, is that when you then go to the document, you discover that there
    is a whole other conversation taking place within the document itself! Google
    Documents allows users to exchange comments and chat within Google Documents.
    So now you have two conversations going on. The one in Slack, where perhaps people
    who are not directly working on the document had some interesting things to say
    and then one in Google Documents. That’s clearly not an ideal situation.


    Overall, I have yet to see an application that has really cracked how to properly
    deal with this. We are dealing with separate collaboration tools and potentially
    different modes of collaboration. At times we share links to documents while at
    other times we share the document itself. These documents and links become part
    of a conversation, but search is not always as effective in finding what we really
    need; and while integrations can help, they can also add complexity.


    Norms can once more help here, since teams can clarify how they are supposed to
    work. However, this is definitely an area where more work is required to give
    us the type of collaboration space we really need. It is informative to look at
    tools like Dropbox that now also offer a collaboration environment, but one that
    is much more document-centric (since that is their heritage). Ultimately, we should
    see conversational collaboration platforms evolve to encapsulate a much more document-friendly
    toolset.


    #### Search


    Search across people, conversations, and documents is what can tie it all together,
    and it’s a crucial function for any conversational collaboration platform. Knowing
    that you can rely on powerful search is liberating because it encourages higher
    levels of sharing and engagement, since people are confident that they will be
    able to find that information again.


    Current search capabilities are impressive. For example, on Slack, you can create
    a search that is looking for a file that was shared in the “2019 Annual Conference
    Planning Channel” by Tim or Mariola, within a certain date range, and has the
    keyword “Sponsors” associated with it. The speed of response is near instant and
    the quality of results is high.


    Nevertheless, while these types of searches are impressively powerful, they also
    require consideration and focus from the user to construct. It is too easy for
    users to get lost in all the choices or forget what combinations are even possible.
    Overall, while search is already very useful, there is a long way to go still
    and (unsurprisingly) it is one of the main areas where the further application
    of artificial intelligence techniques will allow us to make progress.


    Ultimately, I would hope to see search that is much more conversational and combines
    access to a number of different document sources from a single location. It should
    be more conversational, so we can search in the same way that we think rather
    than have to adapt our thinking to the filters and options that the tool provides.
    We should be able to use natural language to describe what we need, and rely on
    a combination of conversational applications to help guide us through the possible
    options. It also needs to take into consideration the fact that information lies
    across many different places, from our e-mails to our document stores and our
    conversational collaboration platform. We need paths from the platform to the
    outside world so that we can connect it all together.'
  trans: '

