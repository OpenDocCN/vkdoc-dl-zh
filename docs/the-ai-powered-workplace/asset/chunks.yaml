  trans: '

    #### 四星——通过有文档记录的 API 获取数据


    在这种情况下，我们处理的是可通过有文档记录且维护良好的 API（应用程序编程接口）获取的结构化数据。这意味着另一端有一个团队负责管理数据访问，并且已经建立了更完善的数据治理流程。


    #### 五星——跨数据集链接数据以提供上下文


    对于五星级数据，我们不仅能够通过文档完善的 API 进行访问，这些数据还与组织内的其他数据集相互关联，使我们能够对数据的上下文做出更有趣的推断。


    发现数据集并对其进行排序，可以绘制出一张地图，指明最佳起点在哪里。我们可以从质量最高的数据入手，证明 AI 驱动的自动化的价值，并激励我们改进其余数据集。


    ### 连接各项活动


    AI 战略的制定和执行不应被视为与其他活动孤立进行的事情。至关重要的是，它要从一开始就为思考提供信息。你可以将 AI 能力视为一个工具箱，在问题出现时从中取出有用的工具来帮助解决。你可能会认为，既然
    AI 是一种技术、一种解决问题的方式，那么在定义总体战略时就不需要它登场。只有当你需要构建解决方案时，才开始探索 AI 技术和能力的领域，看看哪些适用于你的问题。


    我认为这种方法是存在缺陷的。它未能充分利用战略最重要的方面之一：协调各项活动，使整体大于部分之和。AI 战略不能也不应该与更广泛的数字战略孤立开来，而数字战略又应与你的总体战略相连接。三者相互支持，为整体的成功奠定基础。如果你将
    AI 仅仅视为另一种可以使用的工具，你就会错过制定那些只有借助 AI 能力才能实现的战略。


    将你的总体战略、数字战略和 AI 战略连接起来至关重要。三者相互启发，能够实现那些如果各方面孤立处理就无法达成的目标和行动方案。


    在更具体的层面上，连接活动还意味着确定如何最佳地安排项目的时间和协调项目，以便整体上获得积极成果。一个典型的*未能*做到这一点的例子是：当组织内的一个团队正在开发自动预测能力时，而生成该预测所依赖数据的软件却已被计划替换——这无异于给第一个团队釜底抽薪。


    你要避免出现下面这样的对话：


    - “新的 CRM 项目进展顺利——新系统将在明年初上线运行。”

    - “新 CRM 能否提供我们进行预测所需的关系数据和历史销售数据？”

    - “我不知道。一年前向供应商发出招标书时，这并不在需求范围内。”

    - *“……”*


    牢牢掌握流程、数据流以及会影响这些的活动，对于协调成功的 AI 实施至关重要。这确实需要在规划阶段付出努力，并且表明需要更广泛的相关方参与，以便每个人都了解变化将如何影响整个团队的活动。


    ### 构建你的路线图


    一旦我们更好地掌握了当前所处的位置，就可以开始规划通往目标所需的步骤。在最高层面上，我发现考虑三种宽泛的可能性很有用。在某种程度上，这三种方法可以被视为 AI
    能力演进过程中的阶段，但最终它们是三条可以同时推进的路径，有时你也可以决定从一条路径转向另一条。这三条路径是：


    - **采购内置 AI 的工具。** 在这种情况下，我们寻找的是已经内置 AI 能力的工具。我们不需要从头开发任何东西。只需利用现有的工具即可。

    - **使用预构建的 AI 组件构建解决方案。** 在这里，我们开发自己的定制解决方案，但在使用 AI 技术或能力时，我们并不训练或开发自己的模型。相反，我们使用经过预训练或以某种方式预先打包的
    AI 服务，来提供我们所需的功能。

    - **构建 AI 组件和基础设施。** 最后，我们可以考虑构建自己的 AI 模型，并将其纳入更广泛的解决方案中。这一步可以进一步细分为：使用现有技术构建
    AI 模型，或开发新技术来帮助我们推导模型。


    我们将在接下来的章节中更详细地讨论每个选项。

    '
- fmt: '#### Hire Tools with AI Built In


    A very straightforward choice is to “hire” services with AI capabilities built
    in. This provides an immediate step on the AI evolution ladder without having
    to dedicate significant resources to build something internally. There are thousands
    of vendors vying to provide intelligent capabilities to businesses, and taking
    advantage of this innovation is a great way to see how AI capabilities can enhance
    your current workflows.


    From a practical, implementation perspective it means adding another dimension
    to your purchasing decisions, whereby you explicitly evaluate the possibilities
    that a service creates around automation and how those possibilities can address
    your needs. There are two key questions to be considered:


    Is it addressing a real need within the organization? Is it solving a real problem
    we are facing that would benefit from automation? This seems like an obvious question,
    but it protects against “checklist purchasing”—where purchase decisions are done
    by a separate department within an organization, and all that department is looking
    to do is tick off the “AI capabilities” on their list. As we have already said
    numerous times in this book, AI techniques vary greatly. In many ways simply specifying
    “AI capabilities” is about as useful as specifying that a computer program should
    use a programming language! Instead, we have to address the specific capability
    or set of capabilities we are looking for with respect to the problem we are trying
    to solve.


    How is the underlying data treated? Will you be able to use the data without that
    product? Will data produced be able to be fed back in the virtuous cycle we described
    at the start of this chapter? I believe this is crucial. Going back to the data
    rating scheme we described earlier, we can judge what type of data will be produced
    from the system we are hiring and what level of lock-in to a specific vendor this
    creates. The understanding generated through your own activities is valuable intellectual
    property that ideally should be closely guarded. In a situation where all competitors
    are using the same tool, it is the data and process configuration of that tool
    that can give you a competitive advantage.


    All the major vendors offer interesting solutions that allow you to “hire” solutions
    with AI built-in. For example, the major CRM vendors (Salesforce, Oracle, SAP,
    Adobe, Microsoft) have all bundled AI capabilities within their CRM tools. Let’s
    briefly consider what Salesforce has done, as it is a real-life example of the
    type of tactics we are discussing here. The first step was to recognize that offering
    AI capabilities within their CRM would represent a key competitive advantage and
    potential differentiator. Then, in order to quickly build up their AI capabilities
    they went on an acquiring spree, purchasing AI startups that either provided specific
    functionality such as intelligent meeting management (so tools with AI built in).
    Then they purchased companies that borough lower-level techniques into the mix
    so that they can, for example, create a machine learning platform - enabling building
    with AI. All these startups were eventually combined into a comprehensive solution
    called Einstein, enabling Salesforce to build new AI techniques and capabilities.
    Einstein provides features such as accounts insights, leads prioritization, and
    automated data entry.


    #### Build with AI


    The next approach to take is to build solutions using easily accessible AI components.
    In this case you are not hiring the final functionality with its predefined UI
    and feature list outright. Instead you are building your own tool (say a dashboard
    to be able to view potential candidates ranked) and you are using an external
    AI platform to provide you with the necessary capabilities (e.g., natural language
    processing).


    Once more, all the major technology providers offer easily accessible APIs along
    these lines. Microsoft’s cognitive services include tools to enable Decision,
    Vision, Speech, Search, and Language. Amazon AWS calls theirs Recommendations,
    Forecasting, Image and Video Analysis, Advanced Text Analytics, Document Analysis,
    etc. As you can see just by the names of the services, these are broad capabilities
    that can be fed with your own data and composed to provide more comprehensive
    solutions


    Of course it’s not just about cloud-based services from the big providers. There
    is a wealth of open source tools such as `spaCy` for natural language understanding
    that provide incredible capabilities and require little effort to get started.


    The appeal of these ready-made capabilities is that you can plug into your solutions
    without requiring specialist in-house skills to understand them. Your differentiator,
    once more, is in how you compose the solution and the quality of the data and
    overall problem understanding that you bring to the table.


    #### Build AI


    The last step is to actually invest in building basic AI internally. This makes
    sense once you have more clarity about the state of your processes and data and
    can start building your own models, combining foundational techniques such as
    neural networks, reasoning, etc. It will mean building out AI skills in-house
    and requires a bigger investment, but it is also the space that is likely to bring
    the most interesting returns because this is the area that you can truly differentiate
    what you do. The balancing act to handle here is ensuring that you are investing
    in the right direction in building your own AI and are not simply trying to compete
    with technology behemoths.'
