    Then there is the issue of understanding what we say when we speak and transcribing
    that to text. Our accent, the acoustics of the space, whether we have a cold or
    not, background noise, or other people talking at the same time all come into
    play to influence what sounds will reach the machine, which needs to then isolate
    the specific data it cares about and transform that into words. Once more, it’s
    not just about a faithful transcription of the sounds into words. We *structure*
    things differently when we speak. We add “ums” and “ahs” and stop and start in
    strange ways that somehow all make sense to us but are not the same way we write.


    As you can see, the challenges are considerable, and it is amazing that we now
    have readily available AI tools that allow us to recognize speech, transcribe
    that to text, understand its meaning, and even generate language. We haven’t solved
    all the problems, but we’ve solved enough of them to make these tools viable for
    use in the development of AI-powered applications.


    We briefly consider the implications of all this in the next section across speech
