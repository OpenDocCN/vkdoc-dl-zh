  raw: '# 13. Epilogue


    A Day at Work in 2035


    It’s 9:15am, Monday morning in London. Leo logs into his company’s online collaboration
    space, AugmentOS. The presence map gives him an overview upon login. Most of the
    European team is already online. He waves it away. AugmentOS can recognize gestures
    as well as listen for voice commands. You can also go old-school and type in what
    you need it to do. Leo’s usually not interested in who is online at any given
    moment, although it’s nice to get a quick look. Also, he has to admit that he
    gets a kick from looking at the beautiful 3-D map with the people indicators lighting
    up all around the world.


    He chuckles as he recalls the days of Slack or Skype and their green presence
    dots. How rudimentary those interfaces look now and how amazingly more powerful
    AugmentOS is. Slack and its cohorts were a key part of the transformation that
    brought workplace tools to where they are now. These days, work without tools
    like AugmentOS cannot even be conceived of. To think that just 15 years ago only
    a few tens of thousands of organizations used conversational collaboration environments!
    How did he get anything done back then?


    His attention is drawn to a message that zooms in from the back of the virtual
    space on his VR/AR headset. He prefers the concentration afforded by VR to the
    mixed reality the headset also supports. The message must be important if his
    automated personal assistant let it through.  He’s been working with this AI for
    a year now, and it knows he values an interruption-free start more than anything.


    It’s his boss, Sofia. She lives on the west coast of the United States, so the
    message is a few hours old. Last night they received an unusually high number
    of support requests. The automated support system had to route more than 30% of
    all questions to human operators, and the European team will have to help with
    the load.


    Leo pulls up their data analysis tools and has it run a few tests on all the messages.
    It looks like most people are frustrated. Lots of different phrases, all describing
    the same problem, keep popping up. The automated language understanding system
    is confused, but to Leo it’s obvious. It’s all about the new feature they released
    last week. Leo has been training the company’s language tools for some time now.
    He knows their limitations. The words people are using to describe the problems
    they are facing vary too widely. The automated classifier hasn’t been able to
    figure it out on its own. But now they have more data. They can train it to better
    handle the way actual customers describe the issue.


    The VR space goes dim and a reminder pops up. Leo has been so focused on analyzing
    data that more than 2 hours have gone by. It’s time for a break and catching up
    with the outside world. Leo likes to disconnect completely on his breaks. Most
    people use the break as an opportunity to check in with friends in virtual space
    and tinker with their avatars. He prefers the calmness that switching off affords
    though. A button on his watch turns off all notifications except a very select
    list of close family and friends. He goes for a short walk in the park.


    After his break, Leo has a virtual meeting with the rest of the NLP team. AugmentOS
    has been tracking the work Leo did on this problem as well as that of a couple
    of other people and can provide an accurate synopsis for everyone. They discuss
    how they can improve future releases to avoid similar issues and what needs to
    be done to train the system for the current problem. Work assignments and meeting
    records are automatically generated, and the work will be routed to the next available
    experts. AugmentOS has an excellent understanding of the skills required and access
    to a worldwide pool of talent. This means lots of people can pick up where Leo
    and his team left off.


    It’s already 12:45 pm. Leo is done for the day. He logs off to go pick up his
    kids from school. He spends the rest of the day with his family. They need to
    prepare for their little road trip tomorrow. The kids have been asking to do something
    fun, so they planned a family day at the beach. An impromptu trip is no problem,
    as he and his partner only work on Mondays, Wednesdays, and Fridays after all.
    He has no idea how he managed to work five straight 8-hour days when he started
    out. The early 2000s were just crazy!


    This book talks about how we can use AI techniques in the workplace to delegate
    aspects of decision-making to machines. It does not discuss what the implications
    of that will be for society. In Leo’s story it sounds like we made a lot of good
    choices. People get to work less and spend more time with people they care about.
    However, we do not know how things will evolve.


    What we do know is that the way we work and the way we live our lives will change
    dramatically over the next decades. The defining story will center on how we decide
    to organize society and apply the opportunities afforded by technological advancement,
    such as AI, toward solving the great issues of our time.


    It is down to each one of us to decide what role we want to play in how we shape
    and deal with these changes. Will we be passive observers, allowing developments
    to manipulate us, or active participants contributing to shaping what the overarching
    goal should be?


