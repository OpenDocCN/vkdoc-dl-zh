- fmt: '# 排版后的内容


    Finally, think of the underlying process of designing a physical space. You will
    contract an architectural firm, discuss a whole host of issues around what organization
    you are, what image you want to project, and what needs you have now and for a
    long time in the future. This is a big investment with a long-term plan. You then
    go through a number of ideas and finally start working on that new building. Have
    you ever had that in-depth planning process for your digital space? Can you pull
    a master plan out of a drawer that shows how all the pieces fit together to form
    a strategy? Do you have a process to shape how the choices around a digital environment
    get made?


    I hope this illustrates the kind of thinking that should go into planning a digital
    workplace. Of course, the analogy is not a perfect match. The digital space in
    many different ways allows for much cheaper experimentation and exploration. You
    can’t build and tear down numerous buildings, or keep moving the walls around.
    Well, you could, but it’s not the most cost-effective way of doing things! You
    can, however, keep trying and evolving approaches in digital spaces. It is not
    without cost, but it is a cost that is far more easily justifiable.


    ## Understanding Your Digital Workspace


    In Chapter [3](#472369_1_En_3_Chapter.xhtml) we talked about what makes AI tick.
    We talked about the need to have a model of how the world works that will allow
    us to decide what capabilities we should apply in order to affect change in a
    way that is desirable for us.


    When we are considering the application of AI to the workplace, the model of the
    world we are referring to is, naturally, the digital workplace. What are the components
    that make it tick? How do people, tools, processes, policies, and culture combine
    to make work happen?


    It is worth reiterating here that when we talk about an understanding of the digital
    workspace for the purposes of applying AI techniques, we are not referring to
    some vague deeper meaning that may live in the head of a visionary CEO. We are
    instead referring to a very concrete digital representation of the workspace that
    can be manipulated through software for the purposes of automation. We need a
    model of the world that combines explicit knowledge together with knowledge we
    may uncover by analyzing data—a model that will enable us to predict future states
    that can be exploited through software to provide solutions that are useful for
    people.


    In the next few pages we will look at the components that come together to form
    this model, and some of the dimensions that you should be considering in order
    to create your own model of your digital environment.


    Before we start, here’s a simple disclaimer. There is no single model that will
    just work. There are outlines that are more widely applicable, there is knowledge
    that we can transfer from one organization to the next, but ultimately you will
    need to explore your own space to understand what makes it tick and how to model
    it.


    ### People and Teams


    Unsurprisingly, it all starts with people and the teams that they form. What we
    mostly do within a workspace is interact with the rest of our team to jointly
    solve problems together. At least that is what we ought to be doing!


    As such, having a clear model of the basic questions of who are our people, where
    are they, what are they doing, what can they do (skills), what do they know about
    (knowledge), how are they doing it, and even why are they doing it is essential.
    We can also take this one step further and say that we would also like to know
    the wider network that our people create when their connections to other organizations
    and people within those organizations are all mapped out.


    There may well be a lot of pieces of data available, but they are often spread
    across different departments and teams and in different, often incompatible, pieces
    of software. The question to ask is whether there is a unifying way to represent
    people and teams within an organization. However, as we mentioned, the task can
    often seem daunting so we need a way in—a hook to get us started.


    A useful way to start exploring how sophisticated your representation is of people
    and teams in the digital world within an organization is by picking clear use
    cases that you know would solve current problems, and then examining whether your
    current digital environment could support a solution.


    #### Exploring People Data


    For example, say you wanted to introduce an automated tool so that a group of
    people can set up a meeting simply by sending it a request. Something like: “Akeel,
    Barry, and Jasmine need to meet in a room within the next 2 days for 1 hour.”


    Is the information around people and teams available through your digital systems
    enough to make this happen? Think the problem through and make a quick mental
    checklist.


    *   Is it possible to check the diaries of everyone within a group?

    *   Do you have access to the meeting room calendars and their availability?

    *   Can you cross-reference people availability to meeting room availability?

    *   Could you include some geographical considerations and personal preferences
    around meetings, and then go ahead and book the meeting?


    Few companies already do this. More have systems that could support it but are
    not doing so yet. And most wouldn’t be able to even make use of such a tool because
    people’s calendars are not accessible, meeting room timetables are not digitized,
    and there is no way of having a clear idea of who is where.


    Here is another scenario. Your sales team just got in a touch with an exciting
    new client. They want to put together the best proposal possible and it would
    be amazing if someone internally already had a relationship with the client organization.
    So the question to ask would be “Hey, has anyone ever worked with client Y, knows
    someone from there, or has some sort of relationship with this potential client?”
    How would that play out now? How can you access the relationships and history
    of your own people? Would it have to be a company-wide e-mail? An announcement
    on a chat channel? Is there a less noisy way to ask the same question, facilitated
    by a system that more efficiently handles the communication exchange or access
    to relationship networks?


    Here is a third example. Say you are facing a major challenge in the development
    of a new feature for a product. It requires specialist knowledge, and you are
    convinced that there must be someone who has expertise or access to expertise
    within the wider organization. Can you search for people based on their expertise?
    Is there a “people search” tool that would allow you to type in a person’s skill
    and it can produce a list of people who have that skill?


    Here is a final example. You are at the start of the year and would like to have
    a map of the availability of key people across dozens of teams throughout the
    year. Is there a model that would reliably predict the potential distribution
    of vacation time, sickness, or any other of the many events that means someone
    will not be available? If you would like to build such a model, do you have historical
    data that could be examined and analyzed to provide this information?


    If the answer to all of the preceding scenarios is that it will probably be very
    hard to achieve within your own company, don’t worry. That is the usual starting
    point. It’s a wonderful opportunity. It means there is already low-hanging fruit
    that you can reach out and grab, and prove the power of automation to make the
    work environment a more helpful one for people and teams.'
