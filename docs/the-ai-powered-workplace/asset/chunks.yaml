    # AI 无处不在


    与任何高层战略工作一样，制定并定义你自己的 AI 策略是一项充满挑战但最终回报丰厚的活动。这意味着你需要深入挖掘自己的动机，以及同事和整个组织的动机。这意味着要审视你解决问题的方式，并尝试推导出明确的规则和清晰的思路。这个过程本身就极具价值。为了向其他人记录而审视流程是一回事，而审视同样的流程并试图向机器描述它则完全是另一回事。这会迫使你达到一种清晰度，有时甚至可能让人感到不适或别扭。然而，其结果无疑将非常有价值。


    我们已经看到，在从雇佣 AI、用 AI 构建到构建 AI 的旅程中，有相当多的选择可以起步。每种选择都有其优缺点，虽然它们可能像是进化阶梯上的不同步骤，但它们并非相互排斥。它们可以共存，并且你可以为组织内的不同用例做出不同的选择。这也意味着你可以快速起步，并尽早展示
    AI 策略带来的好处，这反过来会推动进一步的支持，并使后续步骤更容易向团队其他成员推广。


    AI 技术和能力将影响工作场所的方方面面。我希望通过本书已经证明，我不是一个会被潮流和炒作所激动的人。鉴于当前 AI 技术被炒得如此火热，可能很难透过这些看清它们的真正影响。然而，正如我们在前几章中所论证的，AI
    的影响将是深远的。将其与火和电相提并论（正如微软和谷歌等公司所做的那样）可能听起来有些牵强。但这些说法中确实有道理。就像火或电一样，AI 有能力改变我们做一切事情的方式。如果你从一个既务实看待挑战、又认识到机遇的立场出发，你就可以对你组织内的工作方式产生持久的影响。着手制定
    AI 策略可能是关乎你组织未来的最重要决策之一。


    脚注 1 2 3 4


    # 12. AI 驱动应用的伦理


    为什么我们需要在 AI 驱动应用的背景下讨论伦理？它难道不就像任何其他软件或任何其他机器一样吗？现有的规则难道不足以覆盖我们吗？这是关于机器统治世界吗！？


    让我们从最后一个问题开始。不，这不是关于机器统治世界。毫无疑问，如果我们真的到了拥有具备人工通用智能的自主行动机器的那一天，我们将不得不应对极其有趣的伦理考量。然而，正如我们在第
    2 章中已经讨论过的，目前无需担心这种情况会发生，即使它真的发生了，这本书也不是用来解决由此引发的伦理问题的。我们在这里关心的问题并非机器统治世界。我们关心的是机器以不安全的方式运行，其行为无法解释，并导致人们受到不公平对待而无法纠正。


    AI 驱动应用值得特别考虑，因为执行自动化决策的软件与其他类型的软件有本质区别。正如我们在第 3 章中讨论的，我们面对的是在如何实现目标方面具有一定程度的自我导向性，并且可能在其生成的目标方面具有自主性的软件。大多数其他软件是被动的，等待我们操作它才能让事情发生。


    此外，AI 软件的复杂性意味着我们需要明确考虑如何为决策提供解释，并在软件本身中构建这些流程。在这种复杂程度下，导致特定决策的路径很容易丢失。对于数据驱动的
    AI 技术尤其如此，我们面对的是成千上万甚至数百万个中间决策点（例如，人工神经网络中的神经元），所有这些都指向一个单一结果。


    因此，正是因为 AI 驱动软件不同于其他软件，我们必须明确地解决伦理考量，它们如何融入软件，以及我们如何发现并处理它们。使用 AI，我们不是在编程具体的规则和结果。相反，我们是在开发具有推断能力，并基于这种推断做出选择的软件。简单来说，它是编写软件的软件。作为创造者，我们与最终结果之间隔了一层。由于我们不是在编程最终结果，我们需要建立保障措施，以确保它将是理想的结果。

