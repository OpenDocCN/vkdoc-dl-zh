    “*Remind me to drop off the kids at school then go collect groceries, pass by
    the pharmacy, and then meet Julia for late breakfast.*”


    Siri gets it word for word correct and so does Google Assistant. I didn’t even
    have to enunciate too carefully, something that I did do in the previous example.


    Clearly, they work well for exactly what they were designed: to help us handle
    everyday life, rather than transcribe domain specific information. It is no surprise
    that one of the leading transcription software companies, Nuance, provides different
    software solutions for different industries such as legal, professional, and law
    enforcement. Each solution advertises the fact that it has been trained for that
    industry’s specific vocabulary, precisely because that is a necessary precondition
    for effective operation in that industry.


    In summary, although speech recognition has come a long way, it is important to
    keep a realistic view of where it can currently help, especially in an office
    setting. It can be extremely effective and less onerous to train if we want to
    use voice to issue straightforward commands or directions to a machine. In these
    cases, we are only uttering smaller phrases with a specific intent, such as “Open
    Microsoft Word” or “Call my HR contact.” It becomes more challenging if we are
    trying to use it to transcribe complex phrases with domain specific (and especially
    acronym heavy) content.


    ### Natural Language Processing


    With speech recognition we go from sound to text. Once we do have text, how do
    we understand what we can do with it, though? This is where NLP comes into play.
    Let’s look at some of the key stages to both understand what is possible and as
    a way to inspire ideas of how you can use it in your own work environment.


    #### Analysis and Entity Extraction


    The first stage is, typically, the syntactic analysis of the text we want to understand
    and something called entity extraction. Consider just a simple phrase such as:


    “This is a book on the use of artificial intelligence in the office. It’s published
    by Apress, part of Springer Nature.”


    To start with, we need to break up the text into its individual components; understand
    what constitutes punctuation and what does not, and how that affects the sentence
    structure.


    Using Google’s NLP demo^([^(29)](#fn29)) we get an analysis such as the one in
    Figure [5-1](#472369_1_En_5_Chapter.xhtml#Fig1).


    ![../images/472369_1_En_5_Chapter/472369_1_En_5_Fig1_HTML.jpg](Images/472369_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    Syntax analysis of a phrase using Google’s NLP API


    You can see there is quite a bit going on. The NLP system has been able to successfully
    identify all the different words, including where we’ve used apostrophes such
    as “it’s.” It is also identifying nouns, verbs, punctuation, adjectives, and more.


    Entity extraction is able to tell us that *book*, *Apress*, *Springer Nature*,
    and *artificial intelligence* are all salient entities in this piece of text and
    for some, such as “Springer Nature” and “Apress,” it is able to say that they
    are organizations and provide links to their websites.


    With just this information we can start thinking of a search powered by NLP that
    can be so much more effective than a “normal” search that only compares strings
    without any contextual information—a search that will, for example, be able to
    distinguish between when a specific organization is mentioned, such as Apple,
    instead of simply the fruit apple. Imagine being able to search through your document
    store and then filter against mentions of a specific company, product, or coworker
    names just the same way you filter against different brands on Amazon.com, without
    having had to painstakingly annotate those documents up front. The NLP system
    can do the heavy lifting for us.'
  trans: '

    ### 语音识别


    语音识别涉及我们将说话时产生的声音转换为文本的能力。它通常也被称为`ASR`，即自动语音识别。这本身就是一个完整的研究领域，融合了一系列令人惊叹的技术。


    一个`ASR`系统首先通过麦克风拾取我们的声音信号。该信号经过清理和处理，旨在仅分离出代表人类声音的频率。这些模拟连续声波随后被采样并转换为所谓的*语音帧*（几十毫秒的采样波形信息）。语音帧随后用于帮助我们理解用户发出了哪些*音素*。音素是组合成单词的声音单位，用于区分不同的单词——相当于语言学家所说的语法音节。^(²⁸)
    语言学家定义了每种语言的具体音素及其组合成单词的方式；这些知识随后被`ASR`系统使用。这些信息再与发音模型和语言模型（如今主要基于深度学习）进一步结合，以生成最终的文本。


    语音识别系统，尤其是在改进的神经网络算法带来巨大提升之后，提供了令人印象深刻的准确率（所有主要科技公司都报告达到人类水平或更优的准确率，错误率接近或低于 5%）。然而，这并不意味着我们可以假设它们能轻松应对任何情况。需要考虑具体的上下文，并对使用语音识别解决特定问题的可行性进行现实评估。你可能已经注意到，语音助手在挤满说话者的拥挤房间里效果不佳，而在隔绝外部噪音的汽车中则表现得更可靠。


    话语领域也非常重要。这里有一个非常简单的实验，你可以自己尝试，以了解它如何影响语音识别。调用你智能手机上的任何语音助手，无论是 Siri、Cortana 还是
    Google Assistant。首先，尝试告诉它们一些可能在工作场景中使用的、带有领域特定术语的句子，然后尝试一个关于处理更普遍生活任务的日常短语。查看文本转录结果，看看各自的准确度如何。


    我使用了以下与工作相关的句子：


    “*任务 1 的高层目标是创建一个聊天机器人，能够帮助用户搜索通过联合搜索服务访问的多个文档库。*”


    这是一个相对友好的测试。其中有一些领域特定的关键词，但并非过于晦涩。我相信作为读者的你，对单个单词不会有困难，尽管你可能对整体含义有些疑问；例如，什么是联合搜索服务？


    Google Assistant 返回的结果是：


    “*任务 1 的高层目标是要产生一个聊天但表格以协助用户搜索通过联合搜索服务访问的多个文档库。*”


    Siri 给我的结果是：


    “*任务 1 的高层目标是制作一个黑板，能够协助用户搜索通过联合搜索服务访问的其他多个文档库。*”


    这些努力值得赞赏，但不太实用。


    然而，如果我尝试以下句子：


    “*提醒我送孩子上学，然后去取杂货，路过药店，再和朱莉娅吃个晚早餐。*”


    Siri 一字不差地正确识别，Google Assistant 也是如此。我甚至不需要像前一个例子那样刻意清晰地发音。


    显然，它们恰好在其设计用途上表现出色：帮助我们处理日常生活，而不是转录领域特定信息。毫不奇怪，领先的转录软件公司之一 Nuance 为法律、专业和执法等不同行业提供了不同的软件解决方案。每个解决方案都宣传其已针对该行业的特定词汇进行了训练，这正是因为这是在该行业有效运作的必要前提。


    总之，尽管语音识别已经取得了长足进步，但对其当前能提供帮助的领域保持现实看法仍然很重要，尤其是在办公环境中。如果我们想用语音向机器发出简单的命令或指示，它可以非常有效且训练起来不那么费力。在这些情况下，我们只说出带有特定意图的较短短语，例如“打开
    Microsoft Word”或“呼叫我的 HR 联系人”。如果我们试图用它来转录带有领域特定（尤其是大量缩写）内容的复杂短语，则会更具挑战性。


    ### 自然语言处理


    通过语音识别，我们从声音转换为文本。但一旦我们有了文本，我们如何理解可以用它做什么呢？这就是`NLP`发挥作用的地方。让我们看看一些关键阶段，以了解其可能性，并激发如何在自己的工作环境中使用它的灵感。


    #### 分析与实体提取


    第一阶段通常是对我们要理解的文本进行句法分析，以及所谓的实体提取。考虑一个简单的短语，例如：


    “这是一本关于在办公室中使用人工智能的书。它由施普林格·自然旗下的 Apress 出版。”


    首先，我们需要将文本分解成其各个组成部分；理解什么构成标点符号，什么不构成，以及这如何影响句子结构。


    使用 Google 的`NLP`演示^(²⁹)，我们得到了如图 5-1 所示的分析结果。


    ![../images/472369_1_En_5_Chapter/472369_1_En_5_Fig1_HTML.jpg](img/472369_1_En_5_Fig1_HTML.jpg)


    图 5-1.


    使用 Google 的`NLP` API 对短语进行句法分析


    你可以看到其中涉及不少内容。`NLP`系统已成功识别出所有不同的单词，包括我们使用撇号的地方，例如“it’s”。它还能识别名词、动词、标点符号、形容词等。


    实体提取能够告诉我们，*书*、*Apress*、*施普林格·自然*和*人工智能*都是这段文本中的显著实体，并且对于某些实体，例如“施普林格·自然”和“Apress”，它能够指出它们是组织，并提供指向其网站的链接。


    仅凭这些信息，我们就可以开始思考由`NLP`驱动的搜索，它可以比仅比较字符串而无任何上下文信息的“普通”搜索有效得多——例如，这种搜索能够区分何时提到特定组织（如苹果公司）与仅仅指水果苹果。想象一下，能够搜索你的文档库，然后像在
    Amazon.com 上按不同品牌筛选一样，按特定公司、产品或同事姓名进行筛选，而无需事先费力地标注这些文档。`NLP`系统可以为我们完成繁重的工作。

    '
- fmt: '#### Classification


    What is the document about? Is it a sales report, meeting notes, or a pitch to
    win a new contract? Are the sentiments expressed within a document positive, negative,
    or neutral? Is the content sensitive or potentially offensive?


    Classification, and in particular classification that is relevant to your specific
    needs, is one of the most frequent applications of NLP.


    NLP tools have become particularly adept at this, and the good news is that it
    is already possible to train your own organization-specific classifiers with minimal
    specialized expertise. This is possible because you can base your classifier on
    existing language models (that have been prepared on much larger datasets) and
    specialize them with either rule-based classification or with data-driven approaches
    that work as a layer on top of the existing models.


    #### Intent Extraction


    When we are using language to communicate, especially when we are asking someone
    to do something for us, our words can be mapped to a specific intent. For example,
    if I say:


    “Could you please open the window?”


    The intent is quite clear. I am asking someone to open the window for me.


    However, I could also say:


    “It’s hot; can you let some air come through?”


    Although I didn’t explicitly say “open the window,” the intent is the same.


    The job of intent extraction is to help us understand what action is conveyed
    in the words. As you can imagine, it is particularly important in conversational
    engines that power chatbots. They need to be able to map all the myriad ways we,
    as humans, can say something to a specific response or action. In addition, they
    need to do that while taking contextual information into consideration. Consider
    the following dialog.


    *   Human: “I’d like two pizzas, a Coke, and some garlic bread.”


    *   Bot: “Thanks, what type of pizzas would you like?”


    *   Human: “A pepperoni pizza and a margherita. Oh, make that Coke a Sprite.”


    What to us is a very simple dialog is quite a challenge for a bot. It asked the
    user for the types of pizzas but it also got some information about a change in
    the order of the drinks. It needs to understand that the phrase the user uttered
    carried two intents, that the second intent was a reference to the previous phrase
    about drinks, and it’s about changing the existing Coke to a Sprite!


    Nowadays there is a wide range of tooling to help organizations develop applications
    that can handle such conversations, and problems like the preceding one can be
    solved in well-defined domains. The key is to clearly weigh where intent extraction
    and conversations would be most effective. It is a balancing act between the complexity
    of the NLP problem to be solved and the value the solution is going to generate.


    #### Translation


    We’ve probably all seen AI-powered translation at work. It is what makes possible
    those links on Twitter, LinkedIn, and Facebook that say “See Translation.” It’s
    what powers the translation feature of Google Chrome that translates an entire
    web page.


    According to Google Research,^([^(30)](#fn30)) automated translation systems,
    under some circumstances, are approaching or even surpassing the translation quality
    that you would expect from human translators. It is important to take such claims
    with a healthy pinch of salt though. Those “circumstances” are important. If we
    are dealing with single words, short phrases, or web pages with small sections
    and not too complex concepts, automated translation can do an impressively effective
    job. The more sophisticated the concepts and the more layered the text, however,
    the less effective the translation.


    A recent contest in South Korea pitching automated systems against professionals
    translating text from Korean to English and vice-versa concluded that about 90%
    of the automatically translated text was “grammatically awkward” and not comparable
    with what a skilled translator would produce.^([^(31)](#fn31))


    As such, the same limitations that we discussed so far apply here. Generic automated
    translation capabilities are impressive, but the more specific the domain the
    less efficient the translation model will be. If we are dealing with single words,
    simple commands, or small text, automated translation offers a viable avenue.
    For more complex scenarios, organizations need to evaluate the tools available
    and consider where they can invest in their own tooling if commercially available
    translators are not enough.


    ### Natural Language Generation


    The mirror image of natural language processing is the automated generation of
    new text.


    We are far more likely to digest information and understand its implications if
    it is set in an appropriate narrative for us. We have all gone through that feeling
    of blanking out when presented with walls and walls of tabular data. Even with
    more pleasing graphs and charts, after a while it can feel like one blurs into
    the other. What we care about is the story that those tables and chart tell. Natural
    language generation (NLG) allows us to input structured, labeled data and get
    a natural language document that provides an appropriate narrative around that
    data as a result.


    A particular strength of NLG is that it can produce multiple narratives from a
    single set of data, adapted or personalized to a specific situation. Take, for
    example, financial data. Analysts need to provide reports for all their different
    clients following the reporting of performance of a particular company or the
    release of data around a specific sector. The inputs, in this example, would be
    something like the annual company report and the portfolio situation of a specific
    client. An NLG system can then produce a narrative that describes what happened
    and how it affects a specific portfolio.


    There are several levels of analysis that the NLG system performs to get to a
    final structured document. It needs to determine the relevant input data points
    that should be mentioned in the generated document. For example, did the company
    make a profit or a loss? What are the biggest expenditures? Where did sales mostly
    come from? The NLG system then manipulates what can be imagined as a very complex
    template that provides rules around the structure of the overall document and
    the structure of individual phrases. The end result is a document that is not
    only grammatically correct but structured in a way that is comfortable and natural
    for us to read.


    Another example is weather reporting. From a single weather data set, a news organization
    can produce localized weather reports for all its affiliates without requiring
    a writer to go through the data and come up with appropriate narratives.


    Within organizations, NLG is increasingly being used to provide the narrative
    around how the company is reporting in a more efficient and impactful way than
    charts and purely numerical reports. This can be particularly empowering for users
    who do not have the skills to do the necessary data analysis on their own.'
