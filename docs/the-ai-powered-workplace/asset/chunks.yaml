  trans: '

    # 视觉


    视觉是指机器处理视觉数据并恰当解读的能力。其范围可从"简单"如扫描条形码，到识别照片中的物体。


    正如我们在第 3 章中讨论的，图像解读方面的进步为人工智能更广泛的应用打开了大门。解锁正确解读图像的能力，催生了众多应用，从自动驾驶到更好地监测和管理大面积农作物的生长。


    支持数据驱动模型（绝大多数是深度学习模型）训练的工具集，可能是人工智能各项能力中发展最为成熟的。这得益于机器视觉领域投入的巨量工作^(³²)，以及深度学习架构在处理原始图像数据方面的适用性。


    目前已有强大的工具可以对图像进行标记或注释，进而用于训练模型。毫不意外，在工作环境中存在多种应用可能。


    -   **身份验证与授权**：人脸识别可用于识别人员身份，并授予进入办公场所的权限。但这并非没有挑战。它可以提供更无缝的体验，并在适当条件下营造更可靠的安全环境。然而，这也伴随着风险，因为公司需要存储生物特征数据。^(³³)


    -   **欺诈检测**：在酒店和零售等行业，机器视觉可用于检测销售点系统中商品未被正确处理的情况。它可以监控员工或客户在条形码阅读器上扫描物品的过程。^(³⁴)


    -   **资产监控与管理**：对实物资产图像的分析可以揭示故障即将发生的位置，并优化工作场所的维护。


    -   **模拟文档的数字化与分类**：我们距离完全数字化还有很长的路要走，并且仍有大量历史文档需要处理。机器视觉既可用于对文档进行分类（例如，识别收据、销售报告、工资单），也可用于将其数字化，以便文档中的信息能够被即时访问。^(³⁵)


    与自然语言处理一样，现在有现成的强大工具可用于测试机器视觉的想法。我遇到的一个很好的例子，说明了工具的可及性已发展到何种程度：一名实习生在一个夏天内，为整个员工队伍构建了一个完全数字化的停车位监控系统。他们利用来自安防摄像头的数据，根据车辆移动情况判断哪些停车位可用，在公司内网上公开这些信息，并设置了停车信息板供所有人查看。这改善了每个人的上班体验，而且据说所需工作量极小。


    与其他所有事情一样，需要谨慎确保你认为已经开发出的能力能够转化为更广泛的部署。机器视觉因容易产生误报或完全遗漏目标而闻名。在处理生死攸关的情况（如自动驾驶）时，这是完全不可接受的。然而，当目标是提高现有流程的效率（例如让人们知道是否有停车位）时，一些错误是可以容忍的。同样，如果我们使用图像来检测图片中的人物，以便更好地对媒体图像目录进行分类，我们是在节省时间，并且不介意一些错误。如果我们使用人脸检测技术结合情绪识别来确定员工队伍的情绪状态，^(³⁶)
    那我们就绝对超出了该技术能够有效实现的范围，并有可能疏远用户。


    # 定制能力


    语言和视觉是通用能力，在不同领域具有广泛的适用性。在您的组织中恰当地利用它们可以为您带来显著优势。在如何使用它们以及将它们应用于何处方面，仍有创新空间，但在构建更好的自然语言处理或视觉系统方面，与他人竞争将变得越来越困难。对大多数公司而言，所需的努力可能无法证明潜在收益的合理性。最终，我们可以预期强大的自然语言处理和视觉能力将成为必要的最低标准，而非竞争差异化因素。


    相反，您的组织有可能实现差异化并围绕竞争优势建立更深护城河的领域，在于创建您自己的"定制"能力。这些是您以特定于您组织的方式在世界上进行表征、推理和行动的方法，因为它们是您设计的模型以及您独有的数据的结果。我喜欢将这些视为您组织的超能力。就像英雄的超能力一样，它们是让您与其他超级英雄区别开来的东西。有些英雄看得更清楚，而有些跳得更高或出拳更有力。这些就是他们的超级能力。问题是：在人工智能能力方面，您组织的超能力是什么？


    要开发定制能力，您需要创造合适的条件。就像绿巨人、钢铁侠或蜘蛛侠一样，您需要走进实验室，摆弄不同的成分，看看能产生什么结果。


    例如，您收集客户数据的方式可能有一些独特之处，使您能够以他人无法做到的方式对客户行为进行建模和推理。您可能已经建立了一种文化并落实了一套流程，确保您的团队以一致的方式提供结构化反馈。这使您能够更好地全面了解团队健康状况以及需要改变之处，从而打造一个更快乐、表现更出色的员工队伍。


    也许，就像来自不同星球的超人一样，您正在进入一个新市场，并且能够带来一种新的视角和新的能力——关于如何自动化某个流程——而现有企业要么从未考虑过，要么过于安逸而不屑一顾。金融科技初创公司颠覆传统银行的方式就是一个很好的例子。它们没有历史包袱，并且以技术优先的视角来处理问题，这是现有企业难以做到的。


    关键要素在于认识到您要开发的是**一种能力**：一种理解和推理世界特定方面的方法。以此为起点，您可以探索可用的技术，并开始将它们组合起来，以得出具体的解决方案。

    '
- fmt: '# From Capabilities to Applications


    AI capabilities are the ways that you can understand and manipulate your environment.
    Core capabilities such as Language and Vision offer a wide array of opportunities
    to organizations. There are easy to access tools making the barrier to entry low.
    The challenge lies in identifying the most fruitful ways of using them, cognizant
    of their limitations. Ultimately, these core capabilities will become part of
    everyone’s toolkit. What is important is to grow the skills and experience to
    use them effectively now, in order to gain some first-mover advantage.


    In addition, you can start thinking of what custom capabilities you can develop.
    These organizational “superpowers” can be exclusively yours because they depend
    solely on how you exploit the innovation capability of your people and your understanding
    of the world (your knowledge and your data). The more mature AI-powered applications
    become, the more important these custom capabilities become, as they are the ones
    that will provide true differentiation.


