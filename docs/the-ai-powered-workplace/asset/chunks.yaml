  trans: '

    ## 实际应用


    到了 20 世纪 80 年代，人工智能迎来了复苏。它找到了一个能够为企业解决问题、且应用广泛、回报清晰的领域。那时，多个研究团队，尤其是斯坦福启发式编程项目，意识到与其试图创建通用问题求解器，不如专注于需要专家知识的受限领域。这些*专家系统*利用了前几十年关于如何编码知识和进行推理的所有研究成果，并将其聚焦于特定领域内的具体用例。


    专家系统可以广义地描述为：将知识编码为一组规则，并创建一个推理引擎，该引擎能够接收对事物状态的描述并推导出一些结论。大致上，你会有一组规则，例如“如果温度低于
    60°F，就穿一件保暖外套”，以及诸如“夹克是外套的一种”这样的关系。通过组合大量的此类规则和关系，专家系统能够捕捉某个特定领域内专家高度复杂的知识，并作为辅助手段来增强人类专业知识。到
    20 世纪 80 年代中期，已经形成了一个完整的产业，众多公司专注于提供运行专家系统的技术。这些软件巨头使用诸如`Lisp`之类的编程语言来封装知识，并使用专用机器来快速处理这些规则。


    20 世纪 80 年代一个标志性的专家系统例子是`XCON`（专家配置器），它为数字设备公司（DEC）而构建。`XCON`的任务是协助 DEC 计算机的订单配置。其输入是客户的需求，输出是必要的计算机系统组件。`XCON`基于
    DEC 专家的知识构建，拥有大约 2500 条规则。它最终每年节省高达 2500 万美元，因为它处理订单的准确率（在 95%到 98%之间）高于技术人员，从而减少了
    DEC 因错误配置而必须发送的免费组件数量。


    借助专家系统，企业家们看到了机遇；人工智能找到了它的杀手级应用，商业再次繁荣起来。然而，炒作再次冲昏了所有人的头脑。人们做出了宏大的声明，尽管确实构建并有效使用了许多有用的软件，但期望值被设定得过高。结果，这个行业崩溃了，几家公司消失了。人工智能再次被打入冷宫。


    这第二次人工智能寒冬中一个较少被提及的特点是，该行业的很大一部分（即涉及的大量资金）都集中在构建能够运行专家系统的专用机器上。需要记住的是，当时的个人电脑行业仍然局限于爱好者群体。专家系统行业未能预见到个人电脑的崛起。个人电脑变得流行起来，并被公认为有效且有用的商业机器，这使得昂贵的专家系统机器显得不那么有吸引力了。


    简单来说，根本不需要一个庞大的产业来制造运行专家系统的专用计算机，因为人们可以用普通且更便宜的个人电脑完成大量工作。企业可以通过引入个人电脑，以更敏捷的方式实现数字化转型。^(⁴)
    给每个人配备文字处理器和灵活的数字计算工具，让他们自己想办法充分利用这些工具，在当时看来似乎是一种更好的投资方式。因此，这个故事的一部分是，技术格局发生了变化，而人工智能行业未能足够快地适应。


    企业利用技术来获得竞争优势。当时，投资于庞大而复杂的人工智能系统风险很高。让整个公司跟上计算技术的步伐，并让公司内更多的人员从通用计算的进步中受益，这要合理得多。


    理解这些潮起潮落，对于学习区分噪音和信号至关重要。在这 40 年间（从 20 世纪 60 年代初到 21 世纪初），有能力的人构建了能够解决实际问题的、有能力的软件，这些软件使用了人工智能。他们还推动了科学进步，让我们知道如何用计算机解决复杂问题。这场战斗并非真正在这个层面上进行或衡量。人工智能的寒冬或春天，是通过人们吸引资金的能力（这诱使人们做出夸大的声明）以及人工智能与其他争夺投资的技术类型之间的竞争来衡量的。到
    20 世纪 90 年代初，人工智能的名声普遍受损，而有许多新的、令人兴奋的、且更具直接应用价值的技术（比如一个叫做万维网的小东西）值得投资。


    ## 人工智能转入地下


    鉴于上述所有情况，人工智能研究人员制定了一种不同的生存策略。他们不再说自己在研究人工智能，而是专注于谈论自己所从事的具体子领域。从多智能体系统（我作为博士生和研究员所从事的领域）到知识管理、业务规则管理、机器学习、规划等等，涌现出了一系列不同的领域。我们所有人都在试图构建能够以更好方式解决问题的机器。我们只是不再那么强调人工智能这部分了。即使是那些直接专注于最艰巨任务——利用计算机理解或重现人类行为——的研究人员，也将其称为“认知计算”或“认知科学”，而不是称之为人工智能研究。


    在幕后，像国际人工智能联合会议（从 1969 年到 2015 年每两年举办一次，现在则改为每年举办）这样的集会依然存在。那些在申请资金时不愿谈论人工智能的人仍然会参加。每个人都知道他们在研究人工智能，但他们不会过分炒作它。


    我个人的 AI 之路让我想起人工智能曾经是多么不受待见。1999 年，我在华威大学读本科时，必须获得计算机科学系的“特别”许可才能参加一门认知计算课程，因为这门课是由心理学系开设的！我最终在我的本科学习中塞满了太多与人工智能相关的课程，以至于我被叫去解释这仍然是一个有效的计算机科学学位。幸运的是，所有那些“潜伏”的人工智能学者都支持我，最终我赢得了这场争论。快进到
    2019 年，大学们争相开设人工智能学位，而学者们则重新宣称自己是人工智能教授，而仅仅五年前，他们还只是“普通的”计算机科学教授。


    所有这些有助于说明，并且当你听到人工智能以前经历过周期、人工智能只是炒作时，必须牢记的一点是：人工智能是一个非常宽泛的术语。它宽泛到可以说几乎毫无用处——除非它能激发投资者和大众媒体的想象力。然而，它试图解决的问题是无法消失的。它们是人类必须面对的真实科学问题或真实挑战。将媒体的噪音和让投资者兴奋的炒作与真正重要的事情区分开来，对于接近人工智能至关重要。在下一节中，我将解释为什么我认为我们已经到了一个讨论人工智能周期不太有用的节点，而在下一章中，我们将更好地理解人工智能的实际含义。

    '
- fmt: '# The New Eternal Spring


    Since the late 2000s to now, 2019, excitement about AI feels like it has reached
    fever pitch and will need to settle down a bit. At the same time, a lot of other
    things have been happening in the world of technology and outside of it. These
    other elements have fundamentally changed the landscape once more.


    This time around, unlike the 1980s, I believe that the way the landscape is changing
    is in favor of the long-term growth of AI and the growing industry of AI-related
    technologies. The changes are not only going to help spread AI, they are going
    to make AI a necessity. AI will stop being a novelty application that is occasionally
    introduced. Instead, it will be one of the fundamental pillars woven into the
    fabric of everything that we do.


    We may call it different names and investors may lose interest once more, but
    the tools and the solutions to problems they provide will remain. We can already
    see this happening explicitly with smartphones, where dedicated chips for AI calculations
    are introduced. If those were switched off, we wouldn’t be able to even open the
    phones (face recognition) or type on them (predictive typing).


    At the most basic level, there are at least three forces in play here that are
    going to necessitate the adoption of AI techniques:


    1.  We have an unprecedented increase in the amount of data we handle, and the
    need to carefully curate it and base decisions on it.


    2.  Processing power, which has followed Moore’s law for the past 50 years, is
    making it possible to apply complex algorithms to data. The performance of these
    algorithms for well-defined domains is equaling or surpassing human abilities.
    At the very least, these make the tools useful companions, augmenting human capabilities.


    3.  Cloud computing is making both storage and processing power widely available
    with an added layer of sophistication, so that anyone can access and make use
    of complex AI tools. Open source tooling is doing the same in terms of the lower
    level capabilities. AI is being democratized in a way that was never possible
    before.


    ## Flooded in Data


    The first fundamental shift is the extent to which what we can do with data has
    changed. Data has always been produced. The question is whether it could be captured,
    stored, retrieved, and analyzed. In that respect, the past years have introduced
    magnitudes of change. We can now, very cost effectively, store huge amounts of
    data (although most of it is still unstructured data), and we can process huge
    chunks of the data that we do store.


    It is hard to say exactly how much data we store daily. Here are some numbers
    presented by IBM in 2018:


    *   80,000,000 MRIs taken every year

    *   600,000,000 forms of malware introduced daily

    *   2,200,000,000 locations generating hyperlocal weather forecasts every 15 minutes


    If you head over to `internetlivestats.com`, you will see a dizzying number of
    counters ticking up. When I checked it one mid-morning in September 2019 from
    Central Europe, the numbers that stood out were:


    *   Over 115,000,000,000 emails sent in the day already

    *   Over 35,000,000 photos uploaded to Instagram

    *   Over 3,000,000,000 searches on Google already


    For once it is no exaggeration to use terms like “flooded” or “inundated” to describe
    the situation with data. According to research done by *Raconteur*, we are likely
    to reach 463 exabytes of data produced daily by 2025. That is going to be driven
    to a large extent by the increase in devices that are connected to the Internet
    of Things (IoT) in wearables, smart devices around the home, and in industry.


    The AI opportunity is simply that humans can in no way, shape, or form expect
    to analyze even a tiny fraction of this data without automation. Applying large-scale
    data analysis to it is our only hope. Taking this a step further, we can also
    expect that unless we embed automated decision-making into systems, we will not
    be able to cope with the growth in demand for decision making and action.


    To consider some of the staggering needs humanity has, here is one example from
    education. According to goals adopted by the UN General Assembly, in order to
    meet a 2030 education goal of providing every child with primary and secondary
    education, an additional 69 million teachers will be needed across the world.
    As of 2018, there were 64 million teachers around the world (this is ignoring
    quality issues such as level of training of the teachers themselves). We would
    need to double the number of existing teachers worldwide in 12 years. To train
    enough teachers to meet our goals, we need a huge amount of support from technology
    to scale teacher training, scale pupil education, and more accurately measure
    results. All of this will depend on effectively managing data and automating processes,
    to allow human resources to focus on what they can do best—person-to-person interactions.


    In China, a company called Squirrel AI has managed in 2 years to build over 700
    schools for K–12 education, catering to over 1 million students. The entire system
    depends on sophisticated algorithms that are able to adapt a teaching program
    to a student’s individual needs. While it is healthy to be skeptical about how
    such systems will really impact children and education, we have to, at the same
    time, accept that the exploration of such solutions is the only way to manage
    a growing population and growing needs for education.


    ## Raw Processing Power and Better Algorithms


    What do first-person shooter games and AI have in common?


    Believe it or not, without the former we might not have had quite the resurgence
    of the latter. In 2009, at the International Conference on Machine Learning, Raina
    et al. presented a paper on the use of graphics processors applied to large-scale
    deep belief networks. Raina’s research group at Stanford, led at the time by the
    now well-known Andrew Ng, figured out how to effectively use graphical processing
    units (GPUs), specifically through NVidia’s CUDA programming model, to dramatically
    decrease the time it took to train machine learning models by exploiting the parallelization
    afforded by GPUs. By that time, GPUs were so efficient *and* very cost-effective
    because of the increase in sales of GPUs to power the needs of the computer gaming
    industry for, point in question, better graphics for first-person shooter games.


    The use of GPUs, coupled with advances in algorithm design (in particular from
    Geoffrey Hinton’s group at the University of Toronto), led to a step change in
    the quality of results and the effort it took to arrive at those results.


    In many ways, these two advances have released the genie out of the bottle. AI
    as an industry may suffer at some point, investors may complain, and we may not
    get all the things that are being promised. The techniques developed so far, however,
    will always be available, and because of their wide applicability they will always
    be used to solve problems—even more so as we see access to AI democratized through
    cloud computing and open source software.'
