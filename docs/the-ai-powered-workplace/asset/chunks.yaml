- fmt: '### Processes


    Following on from an understanding of who is part of the team is how the team
    gets things done. As I am sure many of you have experienced, sometimes all the
    information is there, and even the right tools are there, but there is a “rule”
    that things should be done in “a certain way.” That becomes the blocker that stops
    something from being properly automated. Processes are what define these steps
    and the rules that dictate the steps.


    Creating a map of all the relevant processes, what data is required at each stage,
    who is involved, and how information flows from one step to the other can seem
    like a laborious exercise to start with. Nevertheless, it is critical in allowing
    us to move with confidence in changing, improving, and automating them.


    #### Mapping Processes


    There is a wealth of systems to support business process mapping, from simple
    flow charts to elaborate techniques such as Six Sigma. As ever, there is no single
    solution. It is important to explore what will work best within your own organization.
    A simple way to start, which will also provide a definite lasting benefit if you
    have no structured information on processes already, is to create a company handbook.


    A company handbook is a living document that is meant for anyone within the company
    to access to find out how things get done. From how to ask for holidays and time
    off to getting new equipment, training, or personal development, it can contain,
    in simple language, all the processes to achieve that. It does not require specialist
    knowledge to put together, and can be a collaborative effort across a team or
    organization as different people tackle different aspects of the handbook. With
    an explanation of the key issues in plain language, one can then identify what
    can potentially be improved or automated and then dig in and create more formal
    flow charts and process diagrams of those aspects.


    Here’s a final word on the mapping process. Try to avoid any references to specific
    software or tools in general when doing this. For example, saying something like
    “In order to request a vacation, one must submit a request via the HR vacation
    planning tool” is a representation of what happens but not of the real process
    behind it. What we are really interested in is what happens to that request after
    it has been submitted to the HR tool. Does it go to a line manager, the COO, the
    CEO? What should they do in response? That is the real process we are trying to
    map, so that we can then implement the process in any number of different ways
    and using different tools.


    ### Tools


    With an understanding of what is an appropriate model to represent people in your
    teams and organization, and a mapping out of processes, we can move to tooling.


    What are the pieces of software that hold data and perform actions, and how are
    they connected? Once more, starting from specific use cases is typically more
    fruitful than starting with a blanket cataloguing of every single tool. The use
    cases will allow you to uncover specific information that is relevant to solving
    a real problem, and from there you can expand to map back to processes, people,
    and finally, the solution.


    #### Demystifying Tooling


    Tooling, I think, takes particular patience. More than anything else it can often
    be the trickiest mystery. When looking at a piece of software and trying to understand
    why it is the way it is, you are looking at a long history of decisions, power
    plays, limitations, and short-term solutions (hacks) that have produced what is
    currently in front of you.


    Trying to untangle it all can often feel like too much effort to be worth the
    while. This is why it’s important to have a clear understanding of the process
    you are actually trying to support (without reference to a specific tool) and
    how the data within the tool can support that process. You can then move with
    more confidence and swap out tools, knowing that the processes you care about
    will still be supported.


    ## The Next Destination


    The digital workplace is the digital environment that facilitates work. It is
    the sum of interactions between the people and teams that make up an organization,
    the processes that are followed, and the tools that are there to support these
    processes. Throughout, data flows from one place to the other, gets stored, manipulated,
    acted on, and transformed.


    The digital environment should also be an expression of your culture and values.
    As cheesy as it sounds, it should be in harmony with your value statements. There
    is no point stating that you are an open organization, only for people to then
    find out that tools compartmentalize activity and do not allow people to freely
    collaborate.


    A necessary precondition to introducing automation in the workplace is to understand
    your digital environment. A solid understanding of why things are the way they
    are allows you to move with confidence in introducing change.


    In the next chapters we turn our attention to how AI and messaging platforms can
    be combined to give your digital environment an underlying operating system and
    user interface. We will see how messaging platforms can act as glue between disparate
    systems and as a window into the entire digital environment.


    # 7. AI Is the New UI


    Artificial intelligence is often, and rightly so, brought up in the context of
    solving hard problems like discovering new genes, curing cancer, or enabling autonomous
    driving. There is, however, a far more mundane but as challenging set of problems
    that AI is already playing a key role in solving. AI is increasingly the magic
    sauce behind the software that manages our interactions with any computing device.


    The aim of this chapter is to illustrate and motivate the links between AI and
    user interfaces (UIs), and demonstrate how AI-powered UIs are going to be important
    not just for consumer products but for the workplace as well. AI-powered interfaces
    will become a source of competitive advantage for organizations that use them
    correctly.'
