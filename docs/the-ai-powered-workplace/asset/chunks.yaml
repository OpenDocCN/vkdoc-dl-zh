    # Defining an AI Strategy


    In 2017 at the annual Google I/O conference, Sundar Pichai, Google’s CEO, stood
    up on stage and announced that the opportunities afforded by AI were such that
    Google was moving from a mobile-first to an AI-first strategy. That statement
    really brought the message home to many about the importance of AI and the need
    to formulate an AI strategy. Google, the technology behemoth, was turning into
    a full-blown AI company. They had alluded to it in the past; everyone knew that
    Google was heavily invested in AI and using it extensively, but this was different.
    It left no space for doubt. AI-first.


    If we stop for a second and analyze it, what does the move from mobile-first to
    AI-first really mean though? Well, the mobile-first strategy was one that recognized
    that the primary way people access digital services is through mobile devices.
    As such, any product Google produced needed to work on mobiles, first and foremost.
    A desktop-only product was simply not an option. Google’s hypothesis behind the
    mobile-first strategy was that if it provided the smoothest and fastest mobile
    experience, users would flock to their products. The challenge was that mobile-first
    development at the time required a focused effort and presented technical challenges.
    It needed support from the top, as it created additional product development resource
    demands. That Google strategy soon became the norm across technology companies.
    These days it is not a strategy to say that you are mobile-first. Mobile-first
    is simply one of the sensible pillars of anything digital and not a huge achievement.
    There is no need to have it be the defining, outward facing strategic statement
    of the company. It’s business as usual.


    With the 2017 AI-first announcement, Google was recognizing publicly that there
    was a new opportunity on the horizon and new challenges to overcome. The opportunity
    revolves, once more, around meeting users’ expectations and demands. Users are
    now savvy digital citizens. We all expect a whole new level of sophistication
    from our devices, especially as we catch glimpses of how things can work better
    and are no longer mystified by digital services. It’s not enough to simply have
    access to the service from any device or for that service to be reliable. The
    more technologically savvy tech companies are demonstrating how smart interconnected
    services can be and that, in turn, leads us to want all our services to work in
    the same way. When you can order any meal and have it show up at your front door
    in 20 minutes or buy any item and have it delivered that same day, it creates
    a certain set of expectations. This in turn creates a feedback loop that forces
    companies to upgrade everything else that they do. To stay ahead of the competition
    and satisfy users, services have to be far more aware of our context and our needs
    and react appropriately to them, or even proactively anticipate them. If an app
    doesn’t “get it” we are quick to call it useless, complain in frustration, and
    move on to the next one. The path to more user-friendly services though is paved
    with AI techniques. This is what an AI-first strategy means: recognizing that
    the next evolution of your products and services will depend heavily on your ability
    to enhance them through the use of AI techniques. It also acknowledges that integrating
    AI techniques will require concentrated effort and focus, to overcome some of
    the challenges that will inevitably present themselves. It is not business as
    usual.


    An AI-first strategy acknowledges that the path to smarter and better services
    depends on an organization’s ability to effectively exploit AI techniques and
    capabilities.


    It’s not just Google, of course. Every major technology company has a significant
    AI effort underway, transforming both how it does work internally and the products
    it offers. IBM has been promoting the IBM Watson brand since 2010, even briefly
    turning it into a household name in 2011 when it won the *Jeopardy!* TV game show
    in the United States. SAP has the Leonardo platform, what they call an all-encompassing
    digital innovation system with machine learning and other AI techniques at its
    core. Salesforce has Einstein, an AI platform that weaves AI across its CRM offerings.
    Amazon is arguably as advanced as Google in considering how AI can transform every
    single aspect of their business. With Apple the strategy is all-encompassing,
    with services being enhanced through AI *and* their hardware evolving to better
    support AI through dedicated chips able to speed up AI-specific computations on
    devices.


    One can’t help but feel somewhat overwhelmed by the efforts of the technology
    behemoths. The effort has reached such a fever pitch that universities are complaining
    that they can’t staff their own AI research groups because companies are hiring
    people as fast as they can find them.^([^(55)](#fn55))


    How can other organizations develop their own thinking around AI in straightforward
    terms? Are we all supposed to move to an AI-first strategy and join the race?
    Do we need to start hiring AI-experts?


    One of the main aims of this chapter is to give you a practical approach to developing
    your own AI strategy. It’s not about joining the AI race (unless there are extremely
    good reasons to do so). It’s about identifying the principles to adhere to and
    tactics to apply at different stages and for different needs for your particular
    journey, so that you make sure you are making the most out of what AI technologies
    can offer your business.'
