- fmt: '# 8. Conversational Collaboration Platforms


    I vividly remember the first time I saw a `Telex` machine in action. It was the
    late 1980s on a visit to my dad’s office. The machine noisily disrupted a quiet
    office by spurting out paper, furiously printing text as it went along, with someone
    hovering on top of it in anticipation of what the message was about to say. “It’s
    a message from the office in Heidelberg,” that person shouted. This weird machine,
    in an office in the UK, was woken up by a machine hundreds of miles away because
    someone was typing in Germany. Once the entire message made it through, it was
    read out loud, the team had an impromptu meeting to plan the response, and then
    that was sent back using the keyboard attached to the machine itself. As this
    was the late 1980s, it was probably one of the last few `Telex` machines in use.
    Nevertheless, it was my first experience of such a form of communication and I
    thought it was the coolest thing ever! It mixed the instant nature of voice calling
    without requiring synchronization between the participants as a voice call does.
    For an “Internetless” kid of the 80s, this was as close to magic as I could imagine.


    Of course, fax, e-mail, and now modern instant messaging applications have made
    the noisy `Telex` technology redundant. `Telex`, however, was the technology that
    proved the value of (almost) instant written communication in offices around the
    world for over 50 years.


    Nowadays, e-mail together with messaging-based collaboration applications like
    `Skype`, `Microsoft Teams`, `Slack`, and `Facebook Workplace` are an integral
    part of the digital work environment. In many ways they are as important as the
    building you work in or the desk you sit at. In fact, messaging applications are
    likely the only stable “environment” in a world where people are often on the
    move and remote working is on the increase.


    In this chapter we will explore how the combination of messaging applications
    and conversational AI is going to lead to a new way of working and thinking about
    work. We will start with an overview of the state of messaging applications and
    how they have evolved to become much more than just a way to exchange messages.
    These new conversational collaboration platforms, enhanced with AI-powered applications,
    can have a lasting impact in how we get work done.


    ## Better User Experiences Are a Competitive Advantage


    For a long time, software built for the office simply did not consider the user
    experience as an important feature. Enterprise software was serious software for
    serious people, and that meant that if you had to click through ten screens and
    memorize twenty shortcuts to get your job done, well that is just what you would
    have to do.


    Thankfully, we are now not arguing that point anymore. Although a lot of software
    is still terrible, there is an understanding that easy-to-use software leads to
    better work due to less training for users, fewer things going wrong, and increased
    user satisfaction. Beautifully designed consumer electronics and positive user
    experiences with tools such as `Instagram` or `Facebook` also make workers demand
    better experiences at work as well.


    The next phase is going to be about how we can introduce more automation into
    our software solutions and how we can further reduce the friction of interacting
    with them. This will become especially true as the problems we are trying to solve
    increase in complexity and the volume of work increases as well.


    AI techniques combined with interface paradigms such as conversation, AR, and
    VR will play a key role here. No matter what the UI of the future is ultimately
    going to look like, it is clear that the organizations that are able to provide
    the smoothest interactions between their systems and their staff, clients, and
    partners will have a competitive advantage.


    - `MagicLeap`, although a startup, has already built an amazing headset and platform
    to allow developers to build solutions on. They are focusing on entertainment
    experiences but also building the tools to create an AR experience for office
    work.

    - `Facebook`, as we already mentioned, is heavily developing its `Oculus` platform.

    - `Apple` has a mature AR development kit for the iPhone, and rumors abound about
    `Apple AR` glasses. Of course, no one can be sure until the official announcements
    come, but undoubtedly `Apple` with its existing AR platform will look to make
    the next move, which may well include some form of wearable device.

    - `Google` has not given up on AR and VR technologies; it is simply taking its
    time to apply the learnings of the first attempt.


    Overall, the promise of AR and VR is such that people simply cannot give up. What
    is interesting from an office work perspective is that in order to fully take
    advantage of these platforms once they are widely available, you will need automation
    to allow users to really interact with your organization’s data and processes.


    Footnotes [1](#472369_1_En_7_Chapter.xhtml#Fn1_source) [2](#472369_1_En_7_Chapter.xhtml#Fn2_source)
    [3](#472369_1_En_7_Chapter.xhtml#Fn3_source) [4](#472369_1_En_7_Chapter.xhtml#Fn4_source)
