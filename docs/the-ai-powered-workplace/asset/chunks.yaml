  trans: '

    ### 主动通知


    参加会议需要在会前从多个不同角度进行一定程度的准备。如何到达会场、谁将出席、议程是什么、会前需要准备什么？


    日历应用可以充当一个主动助手，在通知的上下文中提供有用的信息来帮助你完成工作。它可以提供出行信息，突出显示是否需要预订房间或地点，并提供一份需要提前完成的任务清单。


    为了实现这一功能，我们的应用需要能够推理和理解诸如会议地点、议程、查看交通报告等信息。它应该在用户设置会议时主动（通过对话）与用户协作，以确保收集到议程和会前任务等信息。像“您想为本次会议添加议程吗？”或“与会者需要提前准备什么吗？”这样简单的问题，可以帮助人们组织更好的会议，提高会议效率，并在团队内部建立文化规范（在此例中是关于更高效会议的规范），从而改善每个人的工作生活。我个人最喜欢的一个问题是：“您真的确定需要开这个会吗？！”


    ### 团队通知


    最后，由于我们处于团队协作环境中，我们还可以考虑，如果通知是发送给团队而非个人，如何才能最好地发挥作用。如果我可以设置一个会议，但并非指定具体哪些人参加，而是请求某个特定角色（例如，来自用户体验团队、开发团队或财务部门的人来帮助我们解决特定问题）的人参加，那会怎样？然后，通知可以发送到相应的团队频道，由这些团队自行决定谁最适合参加会议。


    当然，在整个过程中，你需要思考如何在特定组织及其文化和政策的背景下使用通知。那些拥有积极主动、尽职尽责文化的团队，更有可能集体做出反应；而那些更注重个人主义、专注于单一任务的团队，则不太适合这种功能。


    ## 监控关键数据


    用于收集、整理、分析和比较数据的工具比比皆是。创建图表并将其展示在精美的仪表盘上从未如此简单。然而，正如一家大型跨国公司的首席营销官曾对我说的：“我们建好了，但没人来看。”没有人去看那些精美的仪表盘，或者即使有人看了，也无法确信各个营销团队是否以一致的方式解读数据。我们只是为自己建造了一个更复杂的跑步机，但依然在原地踏步。团队需要的是他们可以信赖的工具，这些工具能在有趣的事情发生时通知他们，并且理想情况下，能解释事情发生的原因。


    报告通常提供更新的图表或一条直白的信息，例如“今天您网站的访问量比平均水平高出 20%”。对数据的解读则留给了通知的接收者。为什么网站访问量上升了？是网站的哪个部分？是因为新的付费广告活动开始了吗？是因为发送了新闻简报吗？我们的产品在媒体上被提及了吗？当营销活动启动时，20%的增幅是高于平均水平的常态吗？我是否应该期待更多？


    有三个障碍阻碍了这些工具发挥更大的作用。我们需要连接数据、将数据置于上下文中，并解释数据。


    ### 连接数据


    首先，处理数据和生成报告的工具根本无法获取所有必要的信息片段，以构建一个更完整的叙述。最好的情况是，有人注意到某个变化，然后开始跨不同小组和部门进行搜寻，试图理解变化发生的原因。这会产生问题，打断正在执行其他任务的人，并且常常毫无结果。


    为了实现更丰富的叙述，需要更紧密地集成多个数据源，而且至关重要的是，生成数据*背后*的活动也需要被呈现出来。例如，如果你正在构建一个产品，你应该能够看到一个时间线，了解主要版本发布如何与关键绩效指标的变化相关联。


    通往更有用的活动数据收集和集成的途径，是通过项目管理工具或技术代码部署工具。它们已经能够广播自己的活动。如果将这些消息视为*活动数据源*，你就可以通过更仔细的整体知识管理，开始连接关键信息片段。对话式应用也可以通过主动联系人们并询问这些信息，以及识别可能被关联的关键时刻来提供帮助。


    现在，请不要误解我的意思。这些都不容易或简单。需要付出努力来调配所需资源（不仅仅是财务资源），才能将这样的应用部署到位。我们将在接下来的章节中讨论具体方法。现在，让我们先畅想一下可能的、光明的未来。


    ### 上下文数据


    我们在上一节讨论了通知，以及控制它们是多么困难。关于关键数据和指标的通知，无疑是我们被信息淹没的原因之一。需要跟踪的指标太多，收到的报告也太多，以至于一切都变得模糊不清。具有讽刺意味的是，当我们真正需要某条数据时——无论是与同事讨论下一步行动，还是规划下个季度的活动，或是刚被老板问及某个报告——我们却找不到它。


    对话式应用可以充当我们的助手，与商业智能工具交互，从而在我们需要的时候——即在对话的上下文中——提供我们所需的报告。


    像“我们能看看产品 Y 过去 6 个月的销售情况吗？”这样的请求，会生成一份报告并发送到我们对话式协作平台内的一个群组中，供整个团队查看，这在技术上是可行的。然而，这需要组织进行投资，以确定他们能从这些机会中获得最大收益的地方。毫不意外，像微软这样的大型科技公司正在直接投入资金，为其商业智能工具添加对话功能。在我们需要的时候，直接用自然语言询问所需的数据，这是非常强大的，也更符合我们作为人类的工作和思考方式。

    '
- fmt: '#### Explainable Data


    Finally, even if all the data was accessible and always not more than a few clicks
    or words away, we as humans are really bad at handling complex, interrelated pieces
    of data in our head. We are particularly bad at looking at different reports and
    effectively drawing the links between them.


    Conversational applications can play a transformative role, acting as a more helpful
    interface through which we not only retrieve data but interrogate data. Rather
    than having to analyze charts to see what is going on, perhaps we should just
    ask the question:


    “What happened today that was out of the norm?”


    We could then follow that up with:


    “Has this happened before?”


    Instead of having to remember how to correlate information and build charts, we
    can ask:


    “Can you compare this data to the same period last year?”


    Organizations that are investing now in tooling to provide humane explanations
    are building the infrastructure for their future and setting themselves up with
    a significant competitive advantage. The use of natural language generation to
    provide narratives around data so that users don’t need to interpret complex charts
    and related figures can make access to information far more democratic across
    an organization.


    To achieve these rich narratives, it will be necessary to combine data sources
    and also capture activities that influence data results in a consistent, coherent,
    and low-cost way. In Chapter [11](#472369_1_En_11_Chapter.xhtml), where we discuss
    AI strategy, we will delve deeper into what it takes to enable solutions such
    as the preceding one to develop. What could be useful at this point is a thought
    exercise for yourselves. What would it take to have all the necessary pieces of
    information in one place within your own organization? If you could construct
    clear narratives over sets of data (from marketing data to financial data and
    anything else you need to measure), how much time would that save in terms of
    having to go dig for the information?


    ### Support and Collaboration


    As we already discussed, integrations with conversational collaboration platforms
    can allow us to complete activities directly through the platform, saving us the
    need to change context. A simple, yet incredibly effective, demonstration comes
    with the Google Drive integration with Slack. When a user requests access to a
    document, the integration sends a notification via a dedicated bot. Within that
    same notification it allows you to select the level of access you want to give
    and approve the request. Previously, this action involved finding the notification
    within a heap of e-mails (provided one reviewed e-mail in a timely fashion) and
    then accessing the document in order to provide access. In most cases, the person
    requesting would have to message explicitly, as they were running out of time
    and needed the information urgently.


    Our challenge, from an automation perspective, is to identify how to support more
    activities and streamline and automate specific junctions in those activities.
    We will look at three different examples to provide a sense of the level of automation
    possible.


    #### Automated Helpdesk


    With business to consumer interactions, conversational AI is most widely used
    for helpdesk support automation. There is a clear need, with people wanting support
    as quickly as possible at any time of day. There is also a clear return on investment,
    with support center costs reduced and the ability to increase the number of users
    served.


    The same principles can apply to internal support across all levels of the organization:
    from IT questions—“what browsers do we support?,” “what is the Wi-Fi password?”—to
    HR questions—“what is our policy around sick days?,” “who do I contact about issues
    with colleagues?,” and so on. Putting in place a conversational application that
    acts as the first port of call for internal support means that the various teams
    can reduce the questions that come directly to them and instead focus on the more
    complicated cases.


    #### Capturing Decisions and Completing Tasks


    We converse so that we can explore a problem, share information, come to a decision,
    and then plan out how we will get work done. Conversational applications and deep
    integration between our conversational platforms and project management tools
    (`Trello`, `Jira`, `Asana`, in-house solutions, etc.) means that we can directly
    feed that information into the tools that manage tasks and vice-versa.


    It can be as simple as being able to right-click on a message to convert that
    into a task (something that Slack already supports), or it can be a more sophisticated
    process where the conversational application proactively intervenes to create
    discussion summaries, identify key decision points, and capture tasks.


    #### Capturing and Sharing Process Knowledge


    Being able to capture single tasks and monitor their progress can be very beneficial.
    What is even more valuable from an organizational perspective is the ability to
    capture, share, and help enact multistep process knowledge. Any organization necessarily
    has a number of processes or, simply, “ways it get things done.” There is a lot
    of value in being able to create and curate these processes, even in something
    as simple as checklists.^([^(49)](#fn49))


    Conversational applications can be incredibly effective in helping us both capture
    processes, curate them over time, and share them more widely. Imagine a scenario
    where a new colleague is looking to organize a meeting with clients for the first
    time and is able to call up a checklist with the simple request “How do I organize
    a meeting with clients?” Then the colleague not only gets the necessary information
    (here is how you book a room, what to tell reception, how to order food and coffee)
    but also has an automated *assistant* that will work with them to contact the
    appropriate people (reception, room booking, security, etc.), send out reminders,
    and more.'
