  trans: "\n# 模型驱动技术\n\n模型驱动技术是人类智慧的结晶。它让我们审视世界与自身思维，识别出关键核心要素，并以能够进行预测的方式将它们联系起来。由于这些模型是我们大脑精心构思概念的结果，我们能够完全理解它们并向他人解释，这具有极高的价值。当模型驱动技术正确时，它往往是解决问题最高效的路径，因为它精准捕捉所需内容，让我们得以在坚实的基础上构建。想想热力学的基本定律、化学元素周期表或生物学三大法则：这些极其强大的陈述支配着自然界大部分行为方式。\n\
    \n我们在下文回顾的模型驱动技术已在各类应用中活跃了数十年。正是这些技术让企业优化了运输车队的调度协调，带来了更好的网络搜索结果，改进了制造流程，帮助治愈了更多人，以及更多成就。它们并非人们谈论当前\
    \ AI 复兴浪潮时通常提及的技术，但在构建能够高效、稳健做出决策的复杂应用时，它们至关重要。\n\n在审视模型驱动技术时，我们将探讨三个核心方面：如何表示信息、如何基于信息进行推理，以及最终如何制定规划。\n\
    \n## 知识表示\n\n知识表示的目标是提供工具和技术，以更便于计算机处理的方式来描述数据。这既涉及单个项目（例如，如何描述一份独立文档），也涉及项目之间的关系（例如，某份特定文档与某个项目有何关联）。\n\
    \n无论你身处何种组织环境，你无疑都会生成会议记录、客户提案、项目报告等文档。通常，你会使用某种文档管理系统来存储所有这些数据。它可能简单到本地网络上的共享硬盘，或是共享的\
    \ Dropbox 或 Google Drive 环境。现在，想象一下所有文档都被丢进同一个名为“我们的资料”的文件夹，且命名方式毫无章法：\n\n*  \
    \ 我们的资料\n    *   sales-rep.doc\n    *   client-abc-preso.pdf\n    *   my-cool-thoughts-on-stuff.pdf\n\
    \    *   projections.xls\n    *   …\n\n当文档数量增长到成百上千时，大量组织精力将耗费在从这个混乱的文件夹中搜索所需内容上。\n\
    \n幸运的是，在你的组织中，情况可能更像这样：\n\n*   文档\n    *   销售\n        *   客户 ABC\n          \
    \  *   演示文稿\n            *   报价单\n            *   最终合同\n    *   项目工作\n       \
    \ *   客户 ABC\n            *   项目报告\n            *   交付物\n\n仅仅通过管理文件夹结构并制定文档存放规则，你就已经为团队引入了知识表示。这种简单的层级结构使人机和机器都能更轻松地找到信息。\n\
    \n总的来说，知识表示旨在确定一个合适的模型来捕捉我们对世界的认知，并配备操作该模型以推断新信息的手段。\n\n让我们再考虑一个简单的例子。假设你是某大型组织的人力资源部门，每天都会收到数百份来自拥有各种技能求职者的简历。你希望能够根据人们提到的技能自动对这些简历进行分类，以便联系组织内需要评估这些简历的相应领域专家。你有五个高级别分组，名称包括：前端工程师（专门构建数字工具用户界面和视觉方面的人员）、后端工程师（专门从事数据管理、算法和系统集成的人员）、项目经理、质量保证与测试人员，以及站点可靠性工程师（确保所有系统平稳运行的人员）。\n\
    \n然而，你面临一个挑战。人们在简历中用来描述这些技能的术语不断变化，尤其是与这些技能相关的技术也在持续演进。新的编程语言、框架等层出不穷。你如何才能以恰当的方式自动化简历分类流程呢？\n\
    \n你与团队商议后决定构建一个工具，该工具将捕捉用于描述这些技能的术语，并将其与你的高级别分组关联起来。组织内的领域专家将能够使用该工具输入他们感兴趣的关键词，然后软件将参考这些“知识”对简历进行分类。以下是所捕获信息类型的一个示例：\n\
    \n*   前端工程师\n    *   核心技能\n        *   JavaScript\n        *   HTML\n        *\
    \   CSS\n    *   框架\n        *   React\n        *   Vue.js\n        *   Node.js\n\
    \    *   通用技能\n        *   版本控制\n        *   测试/调试\n\n恭喜，你刚刚构建了一个基础的知识图谱^(²³)或本体！本体是对构成特定领域的元素、连接这些元素的关系以及基于特定连接进行推理的方式，所进行的更结构化描述。\n\
    \n本体捕捉了我们对世界的理解，其形式多种多样，从简单的同义词词典，到像前述示例那样的层级分类法，再到更为复杂的互联实体网络。知识表示与知识推理技术专注于将我们构建和描述本体之类事物的方式形式化，从而能够以机器可进行推理的方式，捕捉日益复杂的信息类型。其目标是使我们能够根据一组已知事实推断出额外的知识。如果我知道某个东西毛茸茸的、有四条腿、还会发出咕噜声，我能假定它是一只猫吗？一个好的本体应该能告诉你，实际上有一系列动物（很可能都是猫科动物）符合这个描述，因此你不能简单地假定它就是一只猫。\n\
    \n如今，我们拥有丰富而精良的工具集可供使用；大规模的本体及其应用遍布从医学到电子商务的各个领域。本体可以由领域专家“手动”创建和填充，也可以使用数据驱动技术自动创建，以识别和提取相关实体与关系，然后由专家进一步整理。\n\
    \n最终，任何足够复杂的自动化系统——无论是通过正式手段还是非正式的临时实现——都会以机器可操作的方式来表示知识。因此，知识表示与管理成为大多数应用的核心技术。\n"
- fmt: '### Logic


    Logic is at the heart of everything we do with computers. The building blocks
    of the processors at the core of our machines are logic gates that combine in
    a variety of ways to give rise to the complex behavior we need. When we program,
    we typically use predicate logic to define what should happen. Consider the following
    one-line statement:


    “If temperature reading is over 25 degrees Celsius, switch off heating.”


    This is a simple program using predicate logic to determine how to deal with heating
    in a certain environment. Now, imagine that in order to switch off something,
    say a component in a nuclear plant system, you would have to consider hundreds
    of statements (or propositions) that need to be satisfied and not just a single
    one. Further, suppose that those statements are not simple yes/no answers, that
    they in turn can kick off other processes, and that the order in which things
    take place is also important. How can you systematically step through the reasoning
    process and come to an outcome that allows you to take an action? This is what
    logic systems are all about.


    Logics, in the broadest sense, concerns itself with providing appropriate formal
    structures to reason about different situations in the world.


    There are different forms of logic that tackle different aspects of reasoning
    about the world. For example, epistemic logic tries to tackle the problem of what
    is known, and especially what is known among a group of agents that are sharing
    statements and beliefs. Temporal logic helps us reason about temporal events and
    the nature of time. It is the type of logic a machine will need to be able to
    reason about statements such as “My alarm will ring for 30 seconds unless I stop
    it earlier and will start again after 5 minutes if I press the snooze button.”
    Deontic logic tackles the problems of what is appropriate, expected, and permitted.
    There are numerous other formal logic systems and combinations of them trying
    to capture and codify all the different aspects of life and what we as humans
    so effortlessly handle every day.


    Logics will play a big part in providing the types of behaviors we will come to
    expect from more self-directed or autonomous software. Consider the following
    example. A user visits the web site of a car manufacturer and engages an automated
    conversational agent (a chatbot) to determine what sort of car they should purchase.
    The user, prompted by the conversational agent, might provide information along
    the lines of: they like to go outdoors, they have a large family, they have a
    pet, and so on. The conversational agent in return starts offering some options
    of possible cars. There’s nothing particularly strange so far. The differentiation,
    however, comes when the prospective client rejects a proposed choice. Our logic-powered
    agent is able to ask why that choice was rejected. For example, the user might
    say: “Because, I don’t think it will be able to fit all our equipment for a trip
    to the mountains.” A simple agent would not be able to counteract that argument,
    and would simply move on. An agent that uses logic, though, might be able to offer
    a counterargument. Something like: “Well, did you consider that you can fold down
    the back seats or add a roof rack and carry large equipment that way?” For an
    automated agent to achieve this, it needs knowledge of how a car behaves, coupled
    with logic that will describe the effects of actions. This way it can deduce that
    folding seats creates more space, which is a valid counterargument to present
    to the user. Software that is able to offer facts and counterarguments can become
    a much more active assistant for us, not only helping us complete a task but also
    offering choices on how to complete the task.


    Logics have another key role to play. As automation takes over more aspects of
    our lives, we will have to be able to offer more concrete assurances that they
    will behave in certain ways and that we can trust the decision-making done. Logic
    and model-based reasoning, in general, will play a large part in helping us ensure
    that systems are safe and that they can be trusted.


    ### Planning


    With knowledge representation we can describe our world and, using logics, we
    can reason about it. That is great, but how do we set in motion actions that will
    help us achieve a goal? This is where planning comes into play.


    An easy way to conceptualize planning is to think of an actual robot trying to
    work out how to solve a problem. Imagine a robot that has a number of different
    capabilities such as moving backward and forward (or even sideways), jumping,
    going up stairs, picking things up and moving them around and so on. These are
    the *actions* it can perform to change its state in the world, using *sensors*
    to understand what state the world is in.


    Now, imagine that the robot is told that it has to move a chair from one point
    in a building to another. This represents its *goal*, the desirable state of affairs.
    It can’t just start aimlessly doing things until the chair is where it is supposed
    to be (which would be quite entertaining but not very useful). Instead, the robot
    needs to formulate a plan, potentially with intermediate goals and the actions
    that will achieve those intermediate goals until it completes the final goal.
    A plan would look something like this:


    1.  Locate chair

    2.  Move to chair

    3.  Pick up chair

    4.  Move chair to desired location

    5.  Place chair in desired location


    Planning software would have to be able to come up with this plan, monitor its
    progress, and replan as things change, such as someone moving the chair from its
    original location or something getting in the way of reaching a destination.


    Planning is the process of identifying what actions, and sequences of actions,
    will enable automated software to achieve a specific goal given its current context.


    Anyone who has ever had the “joy” of having to schedule work, or plan activities
    or a course of action is painfully aware of what a daunting task this can be as
    the number of activities increases, interdependencies emerge, and you are constantly
    having to replan. Planning techniques allow teams to handle large pieces of work
    and ensure adherence to constraints across thousands of individual items with
    complex constraint reasoning and hundreds or thousands of rules. Commercial software
    using these techniques plays a key role in building bridges, launching spacecraft,
    and producing airplanes.'
