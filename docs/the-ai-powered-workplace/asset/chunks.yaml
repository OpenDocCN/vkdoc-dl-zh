  trans: '

    ### 挑战


    该公司是一家大型工程企业，为客户构建复杂的定制化产品。其业务覆盖多个地理区域，服务于多个行业。公司拥有高度专业化的员工，且项目对客户而言具有关键任务性质。我们正在寻求构建一款工具，以支持项目经理在组建团队、制定时间表以及提出其他相关考量因素时进行初步规划——这些工作在公司准备承接新项目时尤为重要。


    项目始终需要多种不同的技能，预计将持续数月，并在整个生命周期中以不同方式占用不同角色的资源。


    仅凭这份简要概述，如果你必须为这样的挑战进行初步规划，你需要哪些类型的知识？以下是我初步列出的清单：


    -   一份组织内人员名单及其技能和过往经验——这将帮助我们确定谁可能适合某个特定项目。

    -   查看他们的日常日程，以便安排一些初步的探索性会议。

    -   了解他们的长期承诺，以评估他们参与项目的可行性。合适的团队组合必然有多种可能，因此我们需要让团队进行讨论，并根据其长期承诺来权衡。

    -   能够搜索同一领域的过往项目，以发现任何潜在问题——也许有人过去记录过某些内容，可以为我们当前行动提供参考。


    当然，这只是一个非常粗略的清单，但它足以让我们探索可以采取哪些策略，从数据角度来应对这项任务。让我们逐一分析每个需求，并探讨它对我们的数据能力提出了哪些要求。


    ### 支持沟通与协作的数据策略


    为了了解组织内的人员及其技能，我们需要一个最新的人员数据库。这显而易见，人们可能会认为这对任何组织来说都不应是什么大问题。名单肯定存在于某处！毕竟每个人月底都要领薪水，所以最坏的情况下，财务/人力资源部门也会有相关记录。


    好吧，名单确实存在，但事实证明，它无法以构建应用程序的方式来访问。获取它的唯一途径是打印版。原来，人力资源系统非常陈旧，只能在他们自己的机器上运行。IT 部门坚决拒绝提供任何访问权限，因为那需要他们早已不具备的技能。如果他们开始对系统进行改动，就无法保证数据安全，所以他们干脆维持现状。不过，也不全是坏消息。我们得知人力资源部正计划用新系统替换现有系统——新系统大约在
    6 个月后上线。


    作为一个乐观主义者，你把这视为一个机会。“太棒了，”你想，“让我们确保新系统能够提供公司内部人员的丰富档案，这样我们就能构建 AI 应用程序，回答关于谁能做什么的复杂问题。”好主意，但事实证明，人力资源部已经与供应商完成了需求规格说明，现在无法更改已规划好的内容。合同已经签署，开发工作也已启动。


    不过，你可不是轻易放弃的人。你据理力争，召集人员开会，并充满激情地阐述你的观点。你解释了这个系统将保存对整个公司都有价值的数据，而不仅仅是为了人力资源目的。你主张进行战略性思考，确保公司从更广义的角度思考数据，而不仅仅局限于特定项目的背景。你解释了每个作为数据来源的系统，都需要让其他系统能够轻松访问这些数据。


    最终，所有人都明白了。需要制定并发展一个更通用的数据愿景和策略，以支持组织的愿景和战略。诸如“更新人力资源能力”和“改进项目规划”这样的组织目标并非孤立存在。它们的数据需求是相互交叉的。


    数据管理的一个原则应该是：数据永远不应被锁定在单一系统中；它必须能被其他系统访问。


    让多方能够访问同一数据，是朝着正确方向迈出的一大步。确保你的组织始终能够访问这些数据，即使你更换了软件供应商，这始终是一项明智的保险策略，无论你是否有 AI
    方面的雄心。


    在确保数据可访问的同时，还要确保数据的描述方式能被广泛使用。团队应共同努力，开发通用的模型来描述组织行为的关键方面，例如人员的角色和技能。这将赋予你超能力。它可以成为你与竞争对手的差异化优势，因为你更清楚地了解你的团队所能实现的各种可能性。你的知识表示能力越强，你的
    AI 驱动规划工具就能越复杂。要实现这一点，你需要所有团队都认识到数据的力量，并跨越团队和部门边界进行沟通与协调，以发现机遇。这也不是一劳永逸的事情。它需要一种文化变革，以确保这些对话持续进行。正如其他一切事物都会变化一样，你用来描述事物的方式也会变化。


    请确保关于数据处理和描述的讨论在整个组织内持续进行，以便你能够抓住机遇，并识别出哪些利益相关方应在数据描述方式上拥有发言权。

    '
- fmt: '#### A Data Strategy That Enables Connection and Aggregation


    The next challenge is about accessing people’s calendars and understanding their
    day-to-day commitments. Your optimistic side kept telling you that this shouldn’t
    be a huge problem. Calendars are “standardized” technology, so surely you would
    be able to simply get access to it all.


    However, it seems that calendars aren’t quite as standard as one would think.
    The company recently acquired two smaller companies and their infrastructure is
    very different. They don’t allow any “external” systems to access calendar information.
    You discuss the possibility of moving them to the common platform, but that triggers
    a cascade of dependencies on other systems they should update. There is no easy
    short-term solution. It will take time for everyone to align on the same systems.
    At this point you are faced with two options: give up on being able to integrate
    calendar data or tackle the problem in a different way.


    Giving up, as you’ve already proved, is not what you do. You argue for building
    dedicated tools whose only task will be to act as a bridge between the two systems.
    They will extract information from the internal calendar systems and provide a
    safe way for external systems to access that information and make it more widely
    available.


    This was another aha moment for the wider organization and something that can
    form another pillar of the overall data strategy. Sometimes change cannot be forced
    through alignment on the tooling used. It isn’t because of unwillingness to do
    so. Change sometimes need time and there are only so many things that you can
    change at once. A new acquisition has a number of issues to work through. Not
    having to worry about upgrading their calendar systems immediately might just
    be the point to let go.


    A better way to deal with the issue is to adapt to the situation with tooling
    that allows you to transform and aggregate data. It will be more costly in the
    short term, and it will mean you are building tooling that you will eventually
    throw away. But you have to balance that against the organizational cost of forcing
    people to move too quickly on too many fronts, and the opportunity cost of not
    having joined up data as early as possible.


    Better handling of data also means supporting the creation of tooling with the
    explicit purpose of extracting and transforming data. At times it is simpler to
    remove the data management problem from the department, team, or specific software
    that holds the data and instead build a tool on top of that.


    #### A Data Strategy to Unify Information through Standards


    The next set of requirements is around understanding people’s long-term commitments,
    both historically and in the future. Once more, the optimist in you was hoping
    to find a single centralized tool everyone uses to plan their schedule that would
    give you all the information in an easy to understand way. Reality, as ever, is
    very messy. There is no single way that people manage their availability and commitments.
    Project teams tend to pick a tool for a specific project, and there is a lot of
    heterogeneity across teams and across projects.


    The challenge this creates with data management is that data is lost as it is
    spread across a variety of different tools, and there is no overall unifying approach
    to it. At the same time, it is important that teams are empowered to choose the
    best tools they want for specific projects rather than being forced to a single
    tool that may not always be the best fit. Do you force a single tool and eventually
    get the data you need but risk upsetting the teams, or do you resign to the fact
    that you will not have access to this data?


    This is where standards can play a role. You don’t have to impose a top-down solution;
    you can simply mandate that certain capabilities should be met by any tool that
    project teams pick. For example, in the case of planning and resource allocation
    data, a standard could stipulate that any tool used to capture where time is spent
    is able to export its data in a format that provides the information the organization
    needs to plan. This means you would have to define a format (even something as
    simple as an Excel spreadsheet with specific fields can do the job) and provide
    teams with guidelines and ways to check that their chosen tool would conform with
    and output to that standard.


    Introducing standards across a variety of activities allows teams to still move
    with a certain degree of autonomy, creates a useful discussion around what should
    and shouldn’t be included in the standard, and has the effect of getting everyone
    considering the impact of storing data in specific types of tools.


    There is value is being able to change tooling and meet the specific needs of
    a project or team, but there is also value in consistency. Standards provide a
    way to navigate those two aspects.


    #### A Data strategy to Iteratively Improve Tooling


    The final requirement is around being able to develop the company’s capability
    to extract learnings from past projects in order to be able to inform future projects.


    There is a trove of information about past projects, but it is all spread across
    different systems and there is no way to search across everything. In addition,
    there are different file formats and different conventions used within the files.
    We would need to collect it all together, place it in a search engine of some
    form, and build an interface that would allow us to search through it effectively.
    Furthermore, in order for this search to be efficient, we need to be able to search
    the documents using generic terms that are appropriately expanded to terms that
    may be related to what we need but that we are not necessarily aware of.


    For example, if someone searches for projects that involved “metal-joining” the
    search engine should be able to expand that to “soldering,” “brazing,” and “flux,”
    since those are related terms. To achieve this, you would have to settle on a
    company-wide way of describing all these different things and then build tools
    that would classify documents appropriately so as to power search.


    At this point everyone is starting to realize that this is not going to be a simple
    task, and they are baulking at the potential scope and cost of it. Once more you
    need to gather the various stakeholders and produce a convincing plan that will
    keep everyone on board. The key here is to break the problem down into manageable
    phases, with each step delivering value so that it can justify the next step of
    investment. In the best tradition of start-up culture, you need to think big,
    start small, and scale quickly.


    You explain how you can start quickly by collecting data behind a standard search
    engine. It may not provide the full benefit of an NLP-powered engine, but it is
    a more manageable task that will deliver immediate value. At the same time, a
    cross-functional team is created to start developing appropriate models of the
    type of knowledge that a more powerful search engine can start manipulating. Finally,
    company guidelines can be developed to ensure that every project adds to their
    list of debriefing tasks the transfer of project knowledge into datastores that
    can be accessed by the search engine.


    At a second phase you can start applying automation via the introduction of NLP
    to better understand the types of documents available and make search better for
    users. You will integrate this functionality with your collaboration environment
    so that people can run searches through natural language questions. It is now
    starting to look like a fun project to do and one that is actually manageable.
    While challenges will always exist, there is less initial fear to get things started.


    Data needs to be prepared in order for it to be useful, and projects need to be
    broken down into iterative steps that provide value at each phase. As with any
    new venture, take a think big, start small, and scale fast approach to problem
    solving.'
