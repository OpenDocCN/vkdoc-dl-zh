- fmt: '## A Practical Application


    In the 1980s there was a resurgence. AI had found a problem that it could solve
    for businesses in a manner that was widely applicable and where returns were clear.
    By that time, several research groups, but in particular the Stanford Heuristic
    Programming Project, came to the realization that instead of trying to create
    general problem solvers, they could instead focus on constrained domains that
    required expert knowledge. These *expert systems* used all the research that happened
    in the previous decades about how to codify knowledge and reason about it, and
    focused it on specific use cases within restricted domains.


    Expert systems can broadly be described as the combination of codifying knowledge
    as a set of rules and creating an inference engine that can take in a description
    of the state of things and derive some conclusions. Roughly, you would have a
    collection of rules such as “If temperature is below 60°F, wear a warm coat” and
    relationships such as “A jacket is a type of coat.” Combining large numbers of
    such rules and relationships, expert systems can capture an expert’s highly complicated
    knowledge in a specific field and act as an aid to augment human-based expertise.
    By the mid-1980s there was a whole industry of companies focused on supplying
    technology to run expert systems. These software behemoths used programming languages
    such as `Lisp` to encapsulated knowledge, and used dedicated machines to be able
    to crunch through the rules.


    The iconic expert system example from the 1980s was called `XCON` (the eXpert
    CONfigurer), built for Digital Equipment Corporation. `XCON`’s job was to assist
    in the ordering of DEC computers. The inputs were the client’s requirements and
    the outputs were the necessary computer system components. `XCON` was built based
    on the knowledge of DEC’s experts and had around 2,500 rules. It ended up saving
    up to 25 million dollars a year because it processed orders with a higher level
    of accuracy (between 95% and 98%) than technicians, thereby reducing the number
    of free components DEC had to send out following a mistaken configuration.


    With expert systems, entrepreneurs saw an opportunity; AI had found its killer
    feature, and business was booming again. Once more though, hype got the better
    of everyone. Big claims were made and, while a lot of useful software was built
    and was effectively being used, the expectations were set too high. As a result,
    that industry crashed and several companies disappeared. AI was in the doghouse
    once more.


    What is a less-often mentioned feature of this second AI winter is that a lot
    of the industry (i.e., a lot of the money involved) was focused on building specialized
    machines able to run expert systems. It’s important to keep in mind that the PC
    industry was still confined to hobbyists at this time. What the expert systems
    industry did not foresee was the rise of PCs. They became popular and were recognized
    as valid and useful business machines, making the expensive expert systems machines
    seem less attractive.


    Quite simply, there was no need for a large industry building actual computers
    to run expert systems, because people could get a lot done with normal and cheaper
    PCs. Business could do digital transformation in a much more agile way by introducing
    PCs.^([⁴](#fn4)) Giving everyone a word processor and a flexible number cruncher
    and letting them figure out how to make good use of them seemed like a much better
    way to invest money at the time. Part of the story, therefore, is that the technological
    landscape changed, and the AI industry failed to adapt quickly enough.


    Businesses use technology to gain a competitive advantage. At the time, investing
    in large and complicated AI systems was risky. It made much more sense to bring
    the entire company up to date with computing technology and empower many more
    people within the company to benefit from general computing improvements.


    Understanding these ebbs and flows is fundamental in learning to distinguish noise
    from signal. All through those 40 years (from the early 1960s to the early 2000s)
    capable people built capable software that solved real problems using AI. They
    also advanced the science of how we could solve complex problems with computers.
    The battle was not really fought or measured in that respect. The AI winters or
    springs were measured in the ability of people to attract funding (which induces
    people into making lofty claims) and the competition AI had from other types of
    technologies vying for investment. By the early 1990s AI generally had a tarnished
    name, and there were so many new, exciting, and much more immediately applicable
    technologies to invest in (like a little something called the World Wide Web).


    ## AI Goes into Hiding


    As a result of all of this, AI researchers devised a different survival strategy.
    Instead of saying they were working on AI, they would focus on talking about the
    specific subfield they worked in. A whole range of different fields emerged, from
    multiagent systems (the field I worked on as a PhD student and researcher) to
    knowledge management, business rules management, machine learning, planning, and
    much more. What we were all doing was trying to build machines that solve problems
    in a better way. We just stopped emphasizing the AI part that much. Even the researchers
    who were directly focused on the hardest task of them all, using computers to
    understand or recreate human behavior, labeled it as “cognitive computing” or
    “cognitive sciences” rather than calling it research in artificial intelligence.


    In the background, gatherings such as the International Joint Conference on Artificial
    Intelligence (running every 2 years from 1969 to 2015 and now, incidentally, running
    yearly) remained. The people who were reticent to talk about AI on funding proposals
    still attended. Everyone knew they were working on AI, but they would not necessarily
    hype it as much.


    My own personal path to AI reminds me of just how much AI was out of favor. As
    an undergraduate at Warwick University, in 1999, I had to get “special” permission
    from the Computer Science department to attend a cognitive computing course because
    it was taught in the Psychology department! I ended up loading my undergrad studies
    with so many AI-related courses that I was called in to justify it as still a
    valid degree in Computer Science. Luckily, all the AI academics-in-hiding had
    my back and the argument was won. Fast-forward to 2019 and universities are rushing
    to introduce Artificial Intelligence degrees while academics are reclaiming titles
    such as Professor of Artificial Intelligence, when only 5 years ago they were
    “plain” Professors of Computer Science.


    What all this helps illustrate and what is essential to keep in mind when you
    hear about AI having gone through cycles before and AI being just hype, is that
    AI is an extremely broad term. It is such a broad term that it is arguably close
    to useless—unless, that is, it captures the imagination of investors and the popular
    press. The problems it is trying to solve, however, can’t go away. They are real
    scientific questions or real challenges that humanity has to tackle. Separating
    the noise of the press and the hype that gets investors excited from what matters
    is crucial in approaching AI. In the next section, I will explain why I think
    we have reached a point where talking about cycles of AI is not very useful, and
    in the next chapter we will get a better handle on what AI actually means.'
