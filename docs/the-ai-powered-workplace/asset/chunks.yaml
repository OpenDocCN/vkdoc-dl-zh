  trans: '

    ### 所以牛顿定律也是人工智能！？


    我很清楚，我一直在挑战你可能通常认为的人工智能的定义。而这正是关键所在。


    人工智能并非单一事物。就像数学一样，它是一系列技术的集合。其目标是让我们能够构建机器，帮助我们针对现实世界物体的行为做出有用的推断，并实现决策自动化。最好不要将可能的解决方案范围局限于任何单一技术或技术组。


    想象一个世界，在那里牛顿定律不为人知，但令人惊讶的是，数据驱动的机器学习却被深刻理解。仅凭神经网络和数据分析工具，科学家们可以设想记录数十万次苹果从树上掉落的过程来收集数据，以便正确训练一个预测性神经网络模型，模拟苹果落地后如何弹起。而牛顿物理学却能用一组简单易懂的方程做到这一点。这正是模型驱动决策与数据驱动决策之间的区别。^(¹⁹)


    在许多领域，我们需要专家来描述决策过程背后的推理。以许多疾病的诊断任务为例。尽管数据起着关键作用，但它需要从一个系统可以使用的医学知识库开始。像 Babylon
    Health 和 Ada 这样的公司，通过提供大规模自动化初级医疗保健服务来改变医疗格局，它们雇佣专家来构建其医学领域的模型。


    当你需要从输入到人工智能系统所做决策之间有清晰的路径时，基于模型的人工智能也至关重要。正如我们将在后面进一步讨论的，重度数据驱动系统面临的最大挑战之一是缺乏从输入到输出过程的透明度。而借助模型驱动的人工智能，这个过程通常要明确得多。


    然而，当我们不得不处理那些无法明确陈述我们自己用来得出结果的决策过程的情况时，模型驱动的人工智能就失效了。试试这个实验：你会用哪一套规则来构建一个能够识别猫的系统？


    使用模型驱动技术，我们可能会从描述猫是一种四条腿的动物（描述动物的规则是什么？）、有两只眼睛（什么是眼睛？）、一个鼻子和一张嘴开始。猫有毛（除非没有毛），体型中等（除非不是，而且，与什么相比？）。一个基于模型的系统会查看图像，将其分解为线条、形状和颜色，然后与我们提供的关于线条、形状和颜色如何在世界中组合以呈现不同动物的规则集进行比较。


    你可能已经猜到，这种方法很快就会崩溃。需要描述的规则太多，边缘情况也太多，以至于模型驱动的方法是不够的。这就是数据驱动的人工智能介入的地方。


    ### 数据驱动的人工智能


    借助数据驱动的人工智能，我们不再描述规则或提供直接的数学公式，而是构建能够自行推导出适当规则的系统。我们基本上退后一步，不再试图对解决方案进行建模，而是构建一个能够自行发现解决方案的系统。它通过分析大量数据来实现这一点，这些数据（最常见的是）已经用我们试图学习的事物的“正确”和“错误”示例进行了标注。原理极其简单，但由此产生的系统却是我们创造过的最复杂的系统之一。


    为了训练一个系统正确识别猫，我们向它“展示”大量图片（有猫的和没有猫的），并在它猜对时让它知道。在每一次迭代中，系统都会使用多种技术进行自我调整，以便更有可能再次猜对。这个过程不断重复，直到它能够可靠地正确猜测。


    这就是神经网络所做的，经过数十年的研究，我们在架构上已经达到了相当复杂和精密的水平，这意味着在某些领域，我们可以获得令人印象深刻的可靠预测。


    在这条道路上，有两个转折点体现了所谓的深度神经网络的成就以及它们运作所需的条件。


    #### 站在数据的肩膀上


    第一个转折点与数据有关。


    2009 年，李飞飞教授和她的团队发布了一个名为 `ImageNet` 的数据集。^(²⁰) 这是一个包含超过 1400 万个对象的注释数据库。该数据集区分特定对象，并将它们归入大约
    1000 个类别，例如动物（约 280 万个示例）、鸟类（约 80 万个示例）、食物（约 100 万个示例）和人物（约 100 万个示例）。


    `ImageNet` 数据引发了一场年度竞赛，看谁能构建出在预测图像中物体方面表现最佳的算法。


    直到 2011 年，表现最佳的算法错误率约为 25%。每四次就有一次出错。随后，一种新算法的引入彻底改变了局面。


    #### 给我足够的数据和正确的算法，我就能撬动世界


    杰弗里·辛顿和他的团队在 2012 年发表了一篇开创性论文，^(²¹) 其中他们介绍了对深度卷积神经网络的一系列改进。通过这些改变，他们实现了 17%的错误率，这是一个显著的进步。该神经网络拥有
    6000 万个参数和 65 万个神经元。它利用了吴恩达等人的工作成果^(²²)（我们在第 1 章中提到过），借助 GPU 来高效处理所有这些复杂性。


    这种新方法标志着质的飞跃。在接下来的几年里，错误率下降到了只有几个百分点。一些人欢呼神经网络已经超越了人类（因为人类大约有 5%的时间会出错）。更冷静的人提醒大家，竞赛只需要在
    1000 个类别中保持准确，而人类可以识别更广泛的类别以及复杂的上下文。


    然而，关键在于，深度神经网络最终让我们达到了一个点，即我们可以足够可靠地做一些有趣的事情，而这是基于模型的人工智能无法支持的。


    但这种交易并非没有代价。在此过程中，我们牺牲了很多清晰度和可解释性。我们实际上并不知道那 65 万个神经元为何会以特定方式被激活（而如今的神经网络规模可能要大几个数量级）。没有可以指明的决策链。我们不知道输入数据中的哪些特征是决定特定选择的关键。这可能会带来重要的伦理和法律挑战，我们将在后续章节中探讨。

    '
- fmt: '# Techniques, Capabilities, and Applications


    As I am sure you can begin to see, there is a dizzying array of techniques and
    approaches to solving the problem of delegating decision-making capabilities to
    software.


    In order to try and bring some order to thinking and rein in all the disparate
    approaches under a simple model, I break down the task of building AI-powered
    applications into three parts.


    It starts with the **techniques** that enable us to reason about the world either
    by allowing us to explicitly **model** an aspect of intelligence or by helping
    us **discover** it. These techniques are divided into model-driven or data-driven.


    Techniques combine to provide **capabilities.** Capabilities are specific systems
    that empower us to understand an aspect of the world or to effect change. Capabilities
    are things such as machine vision, speech processing, and natural language processing.
    Whether model-based, data-based, or a hybrid combination, a capability is a “super-power”
    that a machine has that enables it to do something.


    Finally, capabilities combine to give us complete **applications**. An application
    is the finished tool to which we ultimately delegate decision-making powers. It
    is our expense claims adjudicator, our chatbot virtual assistant, our financial
    markets predictor, etc.


    The relationships between techniques, capabilities, and applications are illustrated
    in Figure [3-1](#472369_1_En_3_Chapter.xhtml#Fig1). To me, this provides a clear
    way to differentiate between different levels of work within AI. Obviously, within
    a business setting we ultimately care about the applications that are enabled.
    For those applications, we need specific capabilities—specific ways of understanding
    and changing the world. These capabilities are made possible because, at the level
    of AI, researchers are working on a whole host of different techniques from logic-based
    reasoning to data-driven deep learning architectures. Identifying where to focus
    while not losing sight of the bigger picture is crucial. Too often, people are
    stuck on a single technique (typically neural networks because that is what gets
    talked about most) and forget that what really counts is a solid capability or
    a finished application. Vice-versa, a business may be calling for an application
    to be built without realizing that the necessary capabilities are simply not there,
    so they would need to be investing in primary research to develop the techniques
    that could lead to the necessary capabilities.


    ![../images/472369_1_En_3_Chapter/472369_1_En_3_Fig1_HTML.jpg](Images/472369_1_En_3_Fig1_HTML.jpg)


    Figure 3-1. From techniques to capabilities and applications


    ## Experts and Machines Working Together


    In the next couple of chapters we will look more closely at some of these capabilities
    and techniques, but before we dive in, let us return to the application we have
    to build for this chapter: our expense claims adjudicator.


    Ultimately, what we need is a combination of approaches. We need model-driven
    knowledge representation that encapsulates the core rules and regulations. We
    can then back that up with data-driven decision-making that references past data
    to uncover patterns that our explicit model does not capture faithfully enough.


    Real-world AI applications are almost always a combination of a model-driven approach
    together with a data-driven approach. Mapping technology is one of my favorite
    examples. Consider the `Google Maps` application on your phone. On one hand, you
    have a very explicit representation of roads, buildings, and the rules that govern
    how you can get from A to B based on road signals, speed limits, etc. On the other
    hand, `Google Maps` relies heavily on data-based predictions to reason about what
    is the best course to take given the time of day, inputs from other users, etc.


    Every project needs to ensure that it understands the problem and objectives,
    takes into account the knowledge of experts who deal with the subject every day,
    and formulates a plan about how to make best use of all the tools available. If
    an explicit model can be derived, it can provide the most efficient path from
    question to answer. Sometimes, however, the features are so many and the process
    so unclear, that only a data-centric approach can work.


    At each step, we must be realistic about the feasibility of either approach. Is
    it a fool’s errand to try and build a model of a situation that is simply too
    complex to describe with rules? How much data will we need, what is the state
    of the data we currently have, and how reliable will the end result be? How can
    we prove to ourselves that we are heading in the right direction? How can we build
    fail-safes in the solution by combining techniques?


    Over the next few chapters we are going to delve into these questions as we explore
    more specific technologies and discuss how you can formulate a strategy that exploits
    AI for your workplace.


    Footnotes [1](#472369_1_En_3_Chapter.xhtml#Fn1_source) [2](#472369_1_En_3_Chapter.xhtml#Fn2_source)
    [3](#472369_1_En_3_Chapter.xhtml#Fn3_source) [4](#472369_1_En_3_Chapter.xhtml#Fn4_source)


    # 4. Core AI Techniques


    How does one even start to capture the processes that lead to what we recognize
    as “intelligent” behavior? More appropriately for our definition of AI, how does
    one begin to program machines so that *they* can make decisions instead of us?


    As we already discussed in Chapter [3](#472369_1_En_3_Chapter.xhtml), there are
    two broad approaches. We can either develop explicit models that govern the behavior
    of our system or we can attempt to discover those models by analyzing data and
    looking for patterns. In this chapter we provide a very high-level overview of
    what the main techniques are. Understanding the thinking behind these core techniques
    enables you to reason about the pros and cons of different approaches and the
    needs they might place on your products and teams.


    Artificial Intelligence is a fast-paced field and it feels like there are “new”
    things every week. This can make someone think that it is pointless trying to
    “catch up”; that it is best to leave everything to the experts. While it may be
    true that there are constant developments in the field, and setting yourself a
    goal of being always up to date is a losing battle, it is equally true that the
    core concepts have been around for decades. Whether it is semantic knowledge modeling
    or artificial neural networks, the ideas have been around since the 1960s. It
    is the specific algorithms and approaches that have evolved in the meantime. Having
    a clear understanding of the overarching concepts is what will provide the most
    value in the long term and will allow you to reason about what appropriate strategic
    direction to take.'
