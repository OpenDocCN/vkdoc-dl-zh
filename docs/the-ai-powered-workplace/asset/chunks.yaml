    # What Is AI?


    Artificial intelligence (AI) is notoriously hard to define, and this has been
    both a boon and a curse. The broadness of the term has allowed for a very wide
    and disparate set of techniques to inhabit the same space, from data-intensive
    machine learning techniques such as neural networks to model-based deduction logics,
    and from the incorporation of techniques from statistics to the use of psychological
    models of the mind. At the same time, all these attempts to emulate existing forms
    of intelligence or create new ones has allowed for debates to flourish about what
    is actual intelligence. While in some contexts these debates are useful, they
    can also be distracting and confusing. They can lead people to set expectations
    or express concerns about AI that are not founded in what the technology is currently
    capable of or what we can confidently say it will be capable of, but rather extrapolations
    that are based more on beliefs and hunches.


    In this chapter we are going to focus on a more practical interpretation of AI.
    To set the scene, we start by briefly looking at one of the biggest traps of defining
    AI, what is often referred to as its magical “disappearing act.” We then distinguish
    between general AI and domain-specific AI, and move on to provide a way of thinking
    of domain-specific AI that focusses on the *what* without concerning itself with
    the *how*. By focusing on outcomes and observable behavior, we can largely sidestep
    the problem of having to even use a term as fluid as intelligence, and certainly
    we will not be trying to pin it to a definition. Instead, we ground our thinking
    in how our organizational processes are affected by the introduction of software
    that has been delegated some aspect of decision-making and, by consequence, the
    automation of action. All of the aforementioned provides the necessary groundwork
    to support the next chapter around building AI-powered applications.'
  raw: '### The Democratization of AI


    Up until 2015, actually using AI technologies was generally hard. Unless you had
    AI experts in your team, you couldn’t realistically attempt to apply any of these
    technologies. A lot has changed since then.


    In November 2015, TensorFlow^([^(12)](#fn12)) (Google’s framework for building
    machine learning applications) was released as an open source tool. Since then,
    the open source space of AI tooling has exploded. Online courses abound, both
    paid for and free, and the main blocker to learning about AI techniques is your
    time availability and access to bandwidth.


    In addition, by 2019 we have an unprecedented level of access to sophisticated
    machine learning services through simplified application programming interfaces.
    Amazon, Microsoft, Google, IBM, and many others offer access to their tools, allowing
    organizations to upload data, train models, and deploy solutions within their
    applications.


    Microsoft, in particular, talks directly about democratizing AI.^([^(13)](#fn13))
    The aim is to make it available to all software engineers in the same way database
    technologies or raw computing power is available via cloud-based solutions.


    The wide availability of these technologies as cloud solutions doesn’t just reduce
    the level of expertise required to implement an AI-powered application. It also
    reduces the amount of time it takes to go from idea to prototype to production-level
    roll-out. As we will see later on, the ability to iterate, experiment, and learn
    while doing is just as important as having the technologies readily available.


    ## Moving Forward


    In the last section we laid out the case for why AI cannot simply disappear. Please
    note that this is not about the economics of the AI industry. It is not about
    the venture capitalists, startups, or large corporation and government politics
    of who gets more attention and funding. The argument is about the fundamentals
    of how the digital world is evolving and the needs of the analog world. The problems
    are getting bigger, and we are running out of ways to scale systems unless we
    introduce automation.


    Whether it is agriculture, education, health, or work in the office, we cannot
    just keep working longer and stressing out more. Something has to give and something
    has to change. My hope is that what is going to change is more efficient use of
    technology to allow us to focus on what is more important. Yes, along the way
    we will go through booms and busts. However, do not confuse press coverage or
    funding news about unicorn startups with the fundamentals. The goal of AI should
    not be to make us all more like machines or to create unicorn startups.


    The goal of AI, as that of any technology, should be to lift us up from our current
    condition and give us back the time to explore what it means to be human.


