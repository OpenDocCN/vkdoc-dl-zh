  trans: '

    # 从数据到理解


    归根结底，我们围绕数据所做的一切，都是为了达成理解。没有人应该为自己存储了多少 TB 的信息、耗费了多少计算能力来分析它们而感到自豪。这其中并无内在价值。真正的价值在于，你是否有能力以某种方式利用数据，从而获得洞见并完成目标。


    在本章中，我们探讨了数据驱动和模型驱动技术中数据的高层目的，并讨论了随着数据越来越多地用于驱动自动化决策，必须同步增强对数据治理的信心。


    最后，我们介绍了几种可用于解决实际问题的不同策略。决定先解决一个具体问题，并以此为基础来制定更广泛的组织战略，是一个很好的起步方式。每个团队的经验教训各不相同，获得实践经验至关重要。这种自下而上的学习与自上而下的投资意愿相结合，可以形成一种制胜之道。


    一旦第一个问题被成功解决，整个组织就会获得更多信心，这个过程便可以重复进行，直到它成为标准流程的一部分，而不再是一次性实验。只有当这个过程融入组织文化，不再是一项新奇活动时，真正的变革才会发生。


    脚注 1 2 3 4 5


    # 定义人工智能战略


    2017 年，在一年一度的 Google I/O 大会上，谷歌首席执行官桑达尔·皮查伊登台宣布，人工智能带来的机遇如此巨大，以至于谷歌正从“移动优先”战略转向“人工智能优先”战略。这一声明真正向许多人传达了人工智能的重要性以及制定人工智能战略的必要性。这家科技巨头谷歌，正在转型为一家全面的人工智能公司。他们过去曾暗示过这一点；每个人都知道谷歌在人工智能领域投入巨大并广泛使用，但这次不同。它不容置疑：人工智能优先。


    如果我们停下来稍作分析，从“移动优先”转向“人工智能优先”究竟意味着什么？嗯，“移动优先”战略认识到，人们访问数字服务的主要方式是通过移动设备。因此，谷歌生产的任何产品，首先且最重要的是必须在移动设备上运行良好。仅限桌面的产品根本不是一个选项。谷歌“移动优先”战略背后的假设是，如果它能提供最流畅、最快的移动体验，用户就会蜂拥而至使用其产品。当时的挑战在于，“移动优先”开发需要集中精力，并面临技术挑战。它需要高层的支持，因为它产生了额外的产品开发资源需求。谷歌的这一战略很快成为了科技公司的常态。如今，宣称自己是“移动优先”已不再是一项战略。“移动优先”仅仅是任何数字产品的一个合理基石，而非一项巨大成就。没有必要将其作为公司定义性的、面向外部的战略声明。这已是常规操作。


    随着 2017 年“人工智能优先”的宣布，谷歌公开承认，新的机遇和挑战即将到来。这个机遇再次围绕着满足用户的期望和需求。用户现在是精明的数字公民。我们都期望我们的设备能达到一个全新的复杂水平，尤其是当我们瞥见事物可以如何更好地运作，并且不再对数字服务感到神秘时。仅仅能从任何设备访问服务，或者服务可靠，已经不够了。技术更先进的科技公司正在展示智能互联服务可以有多智能，这反过来又让我们希望所有服务都能以同样的方式运作。当你可以点任何餐食并在
    20 分钟内送到家门口，或者购买任何商品并在当天送达时，这就会产生一套特定的期望。这反过来又形成了一个反馈循环，迫使公司升级他们所做的一切。为了在竞争中保持领先并满足用户，服务必须更加了解我们的环境和需求，并做出适当的反应，甚至主动预测它们。如果一个应用程序“不理解”我们，我们会很快称其无用，沮丧地抱怨，然后转向下一个。然而，通往更友好用户服务的道路是由人工智能技术铺就的。这就是“人工智能优先”战略的含义：认识到你的产品和服务下一次演进将在很大程度上取决于你通过使用人工智能技术来增强它们的能力。它也承认，整合人工智能技术需要集中精力和专注，以克服那些必然会出现的挑战。这并非常规操作。


    “人工智能优先”战略承认，通往更智能、更优质服务的道路，取决于一个组织有效利用人工智能技术和能力的能力。


    当然，这不仅仅是谷歌。每一家主要的科技公司都在进行重大的人工智能投入，既在改变内部工作方式，也在改变其提供的产品。IBM 自 2010 年以来一直在推广 IBM
    Watson 品牌，甚至在 2011 年因其在美国的电视游戏节目《危险边缘！》中获胜而一度使其家喻户晓。SAP 拥有 Leonardo 平台，他们称之为一个以机器学习和其他人工智能技术为核心的全方位数字创新系统。Salesforce
    拥有 Einstein，这是一个将人工智能融入其 CRM 产品的人工智能平台。可以说，亚马逊在考虑如何利用人工智能改变其业务的每一个方面方面，与谷歌一样先进。苹果的战略则是全方位的，通过人工智能增强服务，*并且*其硬件也在进化，通过专用芯片更好地支持人工智能，这些芯片能够加速设备上特定的人工智能计算。


    面对这些科技巨头的努力，人们不禁感到有些不知所措。这种努力已经达到了白热化的程度，以至于大学抱怨他们无法为自己的 AI 研究团队配备足够的人员，因为公司正在以他们能找到的最快速度招聘人才。^(⁵⁵)


    其他组织如何以简单明了的方式发展自己对人工智能的思考？我们是否都应该转向“人工智能优先”战略并加入这场竞赛？我们是否需要开始招聘人工智能专家？


    本章的主要目标之一，是为你提供一种制定自己人工智能战略的实用方法。这不是关于加入人工智能竞赛（除非有极其充分的理由这样做）。而是关于确定要遵循的原则，以及在你特定的旅程中，针对不同阶段和不同需求要应用的策略，从而确保你能够充分利用人工智能技术为你的业务带来的价值。

