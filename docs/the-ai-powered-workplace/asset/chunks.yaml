  trans: '

    ### 自主智能体


    到目前为止，我们所描述的提醒智能体，无论其自主程度如何，都只能在非常具体的目标范围内运作：决定何时以及如何向用户显示消息。


    还有另一种值得考虑的智能体层级：在这种层级中，智能体不仅为了实现明确界定的目标而运作，实际上还能自行生成目标。


    想象一下，你的工作场所刚刚配备了最新的“智能”办公能源管理系统。该系统的目标是确保你每周的能源消耗不超过 100 “单位”，并让工作场所内的人员从这些能源单位中获得最大程度的舒适感。为了实现这一目标，它会参考所有关于高效能源使用和舒适度的可用数据、偏好和规则，然后开始采取行动。它开始制定自己想要实现的具体目标（理想的环境状态）。


    例如，它可能决定关闭某些设备，因为它们似乎被遗忘了——处于开启状态但并未被积极使用。它也可能决定将办公室温度略微降低以节约能源。这些都是源于它试图达成更高层级目标的不同目标。这是一种拥有“自身”议程和目标的软件，它利用自身拥有的任何能力来实现该议程。


    让我们再看一个例子。假设你有一个“健康”智能体，其目标是确保团队中的所有成员都有机会参与公司活动。这个健康智能体被赋予了某些能力，例如访问和推理人们日程的能力，或者根据电子邮件或聊天软件中的互动来绘制人际关系图的能力。利用这些信息，它可以根据自己的发现决定采取行动。它必须做出如下决策：


    “我是应该推迟那个项目评审会议，影响五个人的日程安排，以便让亚历克西斯能参加瑜伽课，还是让亚历克西斯在办公室待到某个时间点之后再做瑜伽？”


    这些是由更高层级目标驱动的不同目标。我们将这些更高层级的目标称为*动机*，而智能体为了满足其动机而选择目标的能力称为*自主性*。


    自主智能体利用更高阶的动机来生成或在不同目标之间进行选择。


    自主性描述了智能体在决定实现哪个目标时改变其决策的能力。与目前讨论的其他概念一样，自主性也是一个连续谱。以之前的健康智能体为例。我们说它可以监控日程，以确保每个人都充分参与社交活动。然而，如果有人没有参与社交活动，它应该怎么做？这将取决于该智能体的自主程度。例如，它可以简单地通知相关人员的直属经理以强调问题，然后就此作罢。或者，它可以决定更改某位员工的工作日程，以便该员工可以借此机会预约时间参加社交活动。它甚至可以更改工作日程*并*预订社交活动，而无需征求任何人的许可。


    随着我们将人工智能引入工作流程，我们需要仔细考虑究竟赋予了多少自主性。更多的自主性意味着我们将更多的决策权委托给计算机软件，并且我们可能会从中获得更高的效率。这也意味着我们可能会遭受并不得不处理意想不到的后果。


    一个具有启发性的例子是现在臭名昭著的、在推特上发布的微软 Tay 聊天机器人。Tay 在它可以生成什么消息方面被赋予了相当大的自主性，这导致了微软的尴尬。当网络喷子“教”Tay
    种族主义和极端主义短语时，该聊天机器人在与其他人的互动中使用了这些短语。微软不得不召回该机器人，并将其归咎于一个“漏洞”——这个漏洞在于 Tay 对其能说什么没有约束，对其所学内容的质量也没有指导。


    在继续之前，我想重申一下不同的层级。我们将在本书中通篇使用这些术语，因此确保我们把这些概念都梳理清楚是很有用的。


    -   *智能体*是具有一定*能力*的软件程序，并能通过这些能力在其环境中实现改变。期望的改变称为*目标*。

    -   *被动智能体*的目标由其用户赋予。是用户操纵被动智能体的能力。我们使用的大多数软件都像被动智能体一样运作。

    -   *主动智能体*具有要达成的目标的显式表示，并能操纵自身能力来实现目标。

    -   *自我导向*指的是智能体改变其实现目标方式的能力。

    -   *自主性*指的是智能体在服务于更高阶目标或*动机*时，在不同目标之间进行选择的能力。


    ### 会学习的智能体


    到目前为止，我们已经讨论了被动、主动甚至自主的智能体。另一个关键维度是智能体从过去经验中学习的能力。


    回到健康智能体，我们可以设想，当它尝试不同的策略来让用户更积极地参与时，它会“学习”哪些策略对哪些用户最有效。这种基于先前行动和历史数据，使其行为适应不同情境的能力，就是我们所说的学习。


    这种学习活动背后可能隐藏着任意数量的复杂层次。智能体为用户的不同反应和结果分配分数的方式可以变得越来越复杂。它可能不仅能够从单个人的反应中学习，还能从长期内成千上万用户的数据中学习。如果数据增长且需要考虑的变量众多，它将需要特殊的工具和日益复杂的人工智能技术来理解这些数据。

    '
- fmt: '### Agent Communities


    For the sake of completeness, let us also briefly consider multiple interacting
    agents. This is an aspect of automation that is not often discussed but is crucial.
    No problem can be solved by a standalone piece of software. We always need to
    interact and integrate with other components in order to achieve our goals. This
    trend will only continue to accelerate.


    In the near term, it is more likely that an autonomous piece of software, for
    example, your Siri-like phone assistant, will interact with passive services (e.g.,
    using a timetable API to understand when the next train is coming). However, it
    is reasonable to assume that this will change. We will get to the point where
    multiple autonomous software programs will regularly interact in our daily lives
    and make decisions for us. At that point, we not only have to deal with how single
    agents arrive at a decision but also what are the *emergent* behaviors of multiple
    agents.


    It might be a group of autonomous vehicles distributing themselves in a road network
    or two meeting booking agents negotiating based on their owners’ agendas. Returning
    to our wellness example, assume that there is an agent community with the common
    goal of “get employees to interact more within the company.” Each individual agent,
    however, has differing capabilities and motivations. One agent is the Social agent
    with a particular focus on social activities, while a Health agent is more concerned
    with helping users maintain a healthy lifestyle in and out of work. The Social
    agent may suggest that a user should take one less trip to the gym and spend that
    time instead doing a more social activity. The Health agent would then have to
    weigh the pros and cons of this. Perhaps they even enter a negotiation to decide
    how to settle the issue. They might settle on setting up a game of tennis to satisfy
    both social and health needs!


    A lot of research in agent-based computing focuses on how to get agents to coordinate
    to collectively solve problems, and how we can reason about the behavior of a
    group of agents. The more heterogeneous the types of agents interacting, the more
    complex the problems can become.


    ## Moving Beyond Intelligence


    In this chapter we explored the very concept of AI, provided some examples of
    the challenges around trying to pin it to any single definition, and also distinguished
    between general AI and domain-specific AI.


    We then referred to agent-based computing as a source of a conceptual grounding
    for thinking about AI, with a focus on the observable behavior and not the specific
    techniques that will allow us to create those behaviors. This grounding allows
    us to consider the task at hand, the delegation of decision-making to machines,
    without having to make explicit reference to notions of intelligence. Moving past
    vague notions of intelligence clarifies thinking.


    At the same time, the agent-based perspective we introduced here needs some time
    to embed. Take an application you consider to be an example of AI and try to classify
    it from the viewpoint of agents. What goals is it trying to achieve? What information
    is it using? What decisions can it make? To what extent can it autonomously effect
    change? Does it interact with any other applications? In what ways does it interact?


    I find these sorts of exercises extremely useful to start reasoning about problems
    and the extent to which we are really delegating decision-making power and automating.
    The more confident you become in analyzing problems through this lens, the more
    adept you will be in talking with AI practitioners about what you need to see
    happen.


    Your business goal is unlikely to ever be to have an application built that uses
    the latest neural network architecture.^([^(18)](#fn18)) It will hopefully be
    defined according to a specific problem you are facing in the workplace and associated
    to clear objectives about how to improve the way things get done. That is the
    *what* we most care about. Concepts such as active and passive agency, self-direction,
    and autonomy help us capture the what in clear terms across a range of different
    domains. The *how* comes next and will be the subject of the next couple of chapters.


    Footnotes [1](#472369_1_En_2_Chapter.xhtml#Fn1_source)   [2](#472369_1_En_2_Chapter.xhtml#Fn2_source)
      [3](#472369_1_En_2_Chapter.xhtml#Fn3_source)   [4](#472369_1_En_2_Chapter.xhtml#Fn4_source)
      [5](#472369_1_En_2_Chapter.xhtml#Fn5_source)


    # 3. Building AI-Powered Applications


    What does it mean to build an AI-powered application? In the previous chapter
    we started shaping our thinking around the types of behavior that AI software
    may exhibit, such as the proactive accomplishment of goals and autonomous goal
    setting. We did not, however, discuss how such behavior is achieved. We purposely
    did not refer to any specific technology. Technologies, of course, do matter.
    Technologies, though, are also constantly changing. That is why it was crucial
    to be able to think about AI applications without reference to specific technologies.
    At the same time, we need to be able to consider what technologies may be required
    in order to make informed choices. This chapter begins to lay the foundations
    in that direction. It digs deeper into the question of how AI-powered applications
    are constructed, and it attempts to do this in a way that hopefully anyone should
    be able to follow.


    AI is an incredibly fast-moving space; the buzzwords and trends of today will
    not necessarily be the same ones of tomorrow. We could do a deep dive into the
    most fashionable machine learning techniques, talk about the finer details of
    the latest natural language processing developments, or spend countless hours
    over the hottest vision developments. It would be a losing battle. By the time
    this book is in your hands, the content of such a discussion would already be
    obsolete. As such, we will focus on some of the underlying core concepts that
    are more likely to outlast any specific technique, architecture, or tool.


    We will take a broad view, starting from the fundamental question of what any
    AI technology would need, and present a framework that divides things into techniques,
    capabilities, and applications and allows you to navigate between those three
    different areas and draw connections, to help you make better informed choices.'
