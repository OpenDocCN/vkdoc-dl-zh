  trans: '

    ### 逻辑


    逻辑是我们用计算机所做一切的核心。机器核心处理器的构建模块是逻辑门，它们以多种方式组合，从而产生我们所需的复杂行为。在编程时，我们通常使用谓词逻辑来定义应该发生什么。考虑下面这一行语句：


    “如果温度读数超过 25 摄氏度，则关闭加热。”


    这是一个使用谓词逻辑来确定在特定环境中如何处理加热的简单程序。现在，想象一下，为了关闭某个东西，比如核电站系统中的一个组件，你需要考虑数百条需要被满足的语句（或命题），而不仅仅是一条。此外，假设这些语句并非简单的“是/否”答案，它们本身可能触发其他进程，并且事情发生的顺序也很重要。你如何才能系统地逐步完成推理过程，并得出一个允许你采取行动的结论？这就是逻辑系统所要解决的问题。


    从最广泛的意义上讲，逻辑关注的是提供适当的形式化结构，以推理世界中的不同情境。


    存在不同形式的逻辑，它们处理关于世界推理的不同方面。例如，认知逻辑试图解决“已知什么”的问题，特别是共享陈述和信念的智能体群体中“已知什么”的问题。时态逻辑帮助我们推理时间事件和时间的本质。机器需要能够使用这种逻辑来推理诸如“我的闹钟会响
    30 秒，除非我提前关掉它；如果我按下贪睡按钮，它会在 5 分钟后再次响起”之类的陈述。道义逻辑则处理什么是合适的、预期的和允许的问题。还有无数其他形式逻辑系统及其组合，它们试图捕捉并编码生活的所有不同方面，以及我们人类每天毫不费力就能处理的事情。


    逻辑将在提供我们对更自主或自动化软件所期望的行为类型方面发挥重要作用。考虑以下示例。用户访问一家汽车制造商的网站，并与一个自动对话代理（聊天机器人）互动，以确定他们应该购买哪种汽车。在对话代理的提示下，用户可能会提供如下信息：他们喜欢户外活动，他们有一个大家庭，他们有一只宠物，等等。作为回应，对话代理开始提供一些可能的汽车选项。到目前为止，这并没有什么特别奇怪之处。然而，区别在于当潜在客户拒绝一个推荐选项时。我们基于逻辑的代理能够询问为什么拒绝该选项。例如，用户可能会说：“因为，我认为它装不下我们去山区旅行所需的所有装备。”一个简单的代理无法反驳这个论点，只会继续推荐下一个。然而，一个使用逻辑的代理或许能够提出一个反驳论点。比如：“嗯，您是否考虑过可以折叠后排座椅，或者加装一个车顶行李架，这样就能携带大型装备了？”为了让自动化代理实现这一点，它需要了解汽车的行为方式，并结合能够描述行动效果的逻辑。这样，它就能推断出折叠座椅创造了更多空间，这是一个可以向用户提出的有效反驳论点。能够提供事实和反驳论点的软件可以成为我们更积极的助手，不仅帮助我们完成任务，还能提供如何完成任务的选择。


    逻辑还有另一个关键作用。随着自动化接管我们生活的更多方面，我们将必须能够提供更具体的保证，确保它们会以特定方式运行，并且我们可以信任其做出的决策。总的来说，逻辑和基于模型的推理将在帮助我们确保系统安全且值得信赖方面发挥重要作用。


    ### 规划


    通过知识表示，我们可以描述我们的世界；利用逻辑，我们可以对其进行推理。这很棒，但我们如何启动能够帮助我们实现目标的行动呢？这就是规划发挥作用的地方。


    将规划概念化的一种简单方法是想象一个实际的机器人试图找出如何解决问题。想象一个拥有多种不同能力的机器人，例如前后移动（甚至侧向移动）、跳跃、上楼梯、拾取物品并移动它们等等。这些是它可以执行的*行动*，用以改变其在世界中的状态，同时使用*传感器*来理解世界所处的状态。


    现在，想象一下，机器人被告知必须将一把椅子从建筑物中的一个点移动到另一个点。这代表了它的*目标*，即期望的事态。它不能只是漫无目的地做事情，直到椅子到达它应该在的位置（这虽然很有趣，但没什么用）。相反，机器人需要制定一个计划，可能包含中间目标以及实现这些中间目标的行动，直到它完成最终目标。一个计划看起来会像这样：


    1.  定位椅子

    2.  移动到椅子处

    3.  拿起椅子

    4.  将椅子移动到目标位置

    5.  将椅子放置在目标位置


    规划软件必须能够提出这个计划，监控其进展，并在情况发生变化时重新规划，例如有人将椅子从其原始位置移开，或者有东西挡住了到达目的地的路。


    规划是一个过程，用于识别哪些行动以及行动序列，能够使自动化软件在其当前环境下实现特定目标。


    任何曾经体验过“乐趣”——比如必须安排工作、规划活动或行动路线——的人，都痛苦地意识到，随着活动数量的增加、相互依赖关系的出现以及需要不断重新规划，这可能是一项多么艰巨的任务。规划技术使团队能够处理大型工作任务，并通过复杂的约束推理以及成百上千条规则，确保在数千个独立项目之间遵守约束。使用这些技术的商业软件在建造桥梁、发射航天器和生产飞机方面发挥着关键作用。'
- fmt: '# Data-Driven Techniques


    Discussions about data and what it can enable occupy the overwhelming majority
    of thinking in the AI techniques space. Visionary statements abound of how every
    action can be measured, stored, and then used to predict our desires, needs, and
    intentions and influence our next action. Sometimes the use of data feels almost
    child-like in its naïve simplicity. You liked a picture of a friend riding a bicycle?
    Here are ads so that you can buy a bicycle yourself! Visited a site that sells
    shoes? We shall “retarget” you and inundate you with ads from that very same site
    for the next few weeks (quite often even if you actually already bought those
    shoes from that very same site!). Have you walked enough steps today? If not,
    we might need to give you some gentle “nudges” tomorrow so you can catch up.


    It’s easy to be cynical about the data age (especially if, like me, you tend to
    be cynical about most things!). However, it is important to not underestimate
    just how important data-driven techniques are for us now and in the future. While
    model-driven techniques can give us certainty and safety and demonstrate how human
    intuition can cut through the noise and focus on just what is really important
    with fundamental rules, data-driven techniques release us from the limitations
    of what our own mind can discover and give us the superpower of being able to
    create something without having had prior knowledge of how to create it. We build
    machines that explore and create for us. Perhaps within one of these machines
    there will eventually be large portions of the answers we so desperately need
    to fix our climate and heal our bodies.


    In considering data-driven techniques I decided to avoid going through a long
    list of all the various architectures and approaches that are, anyway, in constant
    evolution. The Web is awash with information, and if one wants to delve more deeply,
    they can easily find a lot of great examples. Instead, what I want to highlight
    are the three core approaches and their relative differences. We will look at
    how we can discover models through machine learning using supervised, unsupervised,
    and reinforcement learning. The one exception to this rule is a brief look at
    artificial neural networks and deep learning. Strictly speaking, they could be
    categorized under supervised or unsupervised learning but since they are so often
    referred to, it is worth addressing them directly.


    ## Supervised Learning


    The bulk of applied machine learning is currently focused on supervised learning
    techniques. Supervised learning attempts to build a model using data that is already
    labeled. The “supervision” consists of referring to those labels in order to indicate
    to an algorithm whether its prediction was correct or not. Through an iterative
    process during which the algorithm adjusts its decision-making process, you hope
    to arrive at a final model that will act as a reliable predictor.


    Supervised learning refers to techniques wherein algorithms use annotated data
    (i.e., data with the “correct” desired answer already provided). In training,
    the responses are *supervised,* and the algorithm is informed on whether it got
    the right answer. This information is used to adjust the model.


    Let’s work through an example to highlight the key phases of a supervised learning
    process. Assume that you are tasked with the problem of renewing the company document
    store. After several mergers, software upgrades, and personnel changes your document
    store is in a mess. You know there is valuable historical data there, but you
    cannot sort through documents appropriately. You decide that a first useful step
    would be to classify those documents along broad categories that would make sense
    for everyone (e.g., sales documents, project reports, team evaluations).


    The phases you typically would need to go through in a supervised learning process
    are:


    * Gather and prepare data.

    * Choose an appropriate machine learning algorithm and fine-tune it.

    * Use the resulting model from the previous phase to predict.


    Let’s consider each phase in turn.


    ### Gathering and Preparing Data


    You’ve kicked up enough dust and leaned on enough people to get all the documents
    in a single place. Never underestimate just how complicated it can be to simply
    get to the data. Departmental processes, internal politics, fear of regulation,
    and so many other factors can easily spell an end to your automation dreams before
    you even get started. It is always worth carefully planning for this phase before
    committing other resources. There is nothing quite as inefficient as having a
    highly skilled machine learning specialist or data scientist sitting around while
    you need to have yet another meeting to determine who you need to talk with to
    get access to data. You are one of the lucky ones, however. Your data is all there.
    All the documents are ready to be classified.


    In a supervised learning scenario you need to select a part of your data and annotate
    it appropriately so that you can use it in training. You need to identify key
    features (title, summary, author, department, date, word frequency,^([^(24)](#fn24))
    etc) that can help determine the type of document, and then you classify your
    data with the correct answer or target variable. Please note that each one of
    these decisions carries with it a complex set of considerations. Have you selected
    an appropriately representative subset of data? If not, then your model is not
    going to behave correctly with the entire dataset. You may have introduced a number
    of different biases, since your model is going to favor data similar to the one
    that was used to train it. Assuming the data is representative, have you selected
    an appropriate set of features to focus on? Choice of a wrong feature can once
    again lead to unwanted bias. The machine learning community as a whole is developing
    best practices in order to guard against some of these issues, but there is no
    fail-safe approach. It requires patience and experience, and you need to truly
    embrace failure as learning— you are exploring an unknown world and using software
    to help you craft a model that makes sense of it. Like any explorer and scientist,
    you need to embrace the inherent risk that comes with it. Of course, the payoff
    at the end of the process is huge. Having successfully automated a hard task,
    you give your organization a marked competitive advantage.'
  raw: '## Data-Driven Techniques


    Discussions about data and what it can enable occupy the overwhelming majority
    of thinking in the AI techniques space. Visionary statements abound of how every
    action can be measured, stored, and then used to predict our desires, needs, and
    intentions and influence our next action. Sometimes the use of data feels almost
    child-like in its naïve simplicity. You liked a picture of a friend riding a bicycle?
    Here are ads so that you can buy a bicycle yourself! Visited a site that sells
    shoes? We shall “retarget” you and inundate you with ads from that very same site
    for the next few weeks (quite often even if you actually already bought those
    shoes from that very same site!). Have you walked enough steps today? If not,
    we might need to give you some gentle “nudges” tomorrow so you can catch up.


    It’s easy to be cynical about the data age (especially if, like me, you tend to
    be cynical about most things!). However, it is important to not underestimate
    just how important data-driven techniques are for us now and in the future. While
    model-driven techniques can give us certainty and safety and demonstrate how human
    intuition can cut through the noise and focus on just what is really important
    with fundamental rules, data-driven techniques release us from the limitations
    of what our own mind can discover and give us the superpower of being able to
    create something without having had prior knowledge of how to create it. We build
    machines that explore and create for us. Perhaps within one of these machines
    there will eventually be large portions of the answers we so desperately need
    to fix our climate and heal our bodies.


    In considering data-driven techniques I decided to avoid going through a long
    list of all the various architectures and approaches that are, anyway, in constant
    evolution. The Web is awash with information, and if one wants to delve more deeply,
    they can easily find a lot of great examples. Instead, what I want to highlight
    are the three core approaches and their relative differences. We will look at
    how we can discover models through machine learning using supervised, unsupervised,
    and reinforcement learning. The one exception to this rule is a brief look at
    artificial neural networks and deep learning. Strictly speaking, they could be
    categorized under supervised or unsupervised learning but since they are so often
    referred to, it is worth addressing them directly.


    ### Supervised Learning


    The bulk of applied machine learning is currently focused on supervised learning
    techniques. Supervised learning attempts to build a model using data that is already
    labeled. The “supervision” consists of referring to those labels in order to indicate
    to an algorithm whether its prediction was correct or not. Through an iterative
    process during which the algorithm adjusts its decision-making process, you hope
    to arrive at a final model that will act as a reliable predictor.


    Supervised learning refers to techniques wherein algorithms use annotated data
    (i.e., data with the “correct” desired answer already provided). In training,
    the responses are *supervised,* and the algorithm is informed on whether it got
    the right answer. This information is used to adjust the model.


    Let’s work through an example to highlight the key phases of a supervised learning
    process. Assume that you are tasked with the problem of renewing the company document
    store. After several mergers, software upgrades, and personnel changes your document
    store is in a mess. You know there is valuable historical data there, but you
    cannot sort through documents appropriately. You decide that a first useful step
    would be to classify those documents along broad categories that would make sense
    for everyone (e.g., sales documents, project reports, team evaluations).


    The phases you typically would need to go through in a supervised learning process
    are


    *   Gather and prepare data.


    *   Choose an appropriate machine learning algorithm and fine-tune it.


    *   Use the resulting model from the previous phase to predict.


    Let’s consider each phase in turn.


    #### Gathering and Preparing Data


    You’ve kicked up enough dust and leaned on enough people to get all the documents
    in a single place. Never underestimate just how complicated it can be to simply
    get to the data. Departmental processes, internal politics, fear of regulation,
    and so many other factors can easily spell an end to your automation dreams before
    you even get started. It is always worth carefully planning for this phase before
    committing other resources. There is nothing quite as inefficient as having a
    highly skilled machine learning specialist or data scientist sitting around while
    you need to have yet another meeting to determine who you need to talk with to
    get access to data. You are one of the lucky ones, however. Your data is all there.
    All the documents are ready to be classified.


    In a supervised learning scenario you need to select a part of your data and annotate
    it appropriately so that you can use it in training. You need to identify key
    features (title, summary, author, department, date, word frequency,^([^(24)](#fn24))
    etc) that can help determine the type of document, and then you classify your
    data with the correct answer or target variable. Please note that each one of
    these decisions carries with it a complex set of considerations. Have you selected
    an appropriately representative subset of data? If not, then your model is not
    going to behave correctly with the entire dataset. You may have introduced a number
    of different biases, since your model is going to favor data similar to the one
    that was used to train it. Assuming the data is representative, have you selected
    an appropriate set of features to focus on? Choice of a wrong feature can once
    again lead to unwanted bias. The machine learning community as a whole is developing
    best practices in order to guard against some of these issues, but there is no
    fail-safe approach. It requires patience and experience, and you need to truly
    embrace failure as learning— you are exploring an unknown world and using software
    to help you craft a model that makes sense of it. Like any explorer and scientist,
    you need to embrace the inherent risk that comes with it. Of course, the payoff
    at the end of the process is huge. Having successfully automated a hard task,
    you give your organization a marked competitive advantage.'
