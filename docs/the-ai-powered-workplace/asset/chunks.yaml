    # Part II The Applications of AI in the Workplace


    # 6. The Digital Workplace


    Digital transformation.


    Did the mere mention of this darling catch-all phrase of consultants generate
    a slight inner groan? I know it has that effect on me, and I *am* one of those
    consultants, working for consulting companies that invariably mention “digital
    transformation” on their web site’s home page.


    There is nothing inherently wrong with the phrase itself. Deep down we all know
    that. To transform processes through the effective use of digital technologies
    is a very sensible thing to do. It is something that every organization should
    always be doing. The reason the phrase produces dread is that it has been thrown
    around so much by earnest marketers of consulting services that it now carries
    a certain amount of baggage. Buzzwords like digital transformation, and its cousin,
    digital strategy, conjure up images of armies of consultants producing lengthy
    reports about what one ought to do to improve their workplace, with little practical
    advice about how to go about achieving that.


    For the purposes of this chapter and what is coming next in the book, I ask you
    to put all that baggage aside. In this chapter, we are going to discuss the digital
    workplace, what that means, and how an understanding of the digital workplace
    forms the foundations of a strategy for the AI-powered workplace.


    ## What Is the Digital Workplace?


    Let’s start by giving ourselves a working definition of what we are dealing with.


    What is the digital workplace?


    A simple way of defining it would be to say that the digital workplace is the
    list of all the digital tools that people use to get their job done. From the
    systems that run HR to e-mail systems, document sharing, reporting systems, laptops,
