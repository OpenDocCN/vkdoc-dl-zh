- fmt: '# Augmented Reality and Virtual Reality


    No discussion of how AI will change the way we interact with machines could be
    complete without dealing with augmented reality (AR) and virtual reality (VR).


    AR refers to interfaces that overlay digital information on our view of the real
    world, either through wearable devices like glasses or simply through the screen
    of our phone. As with so many technologies, the level of usage forms a continuum.
    You can go from adding just a couple of extra pieces of information to my real-world
    view, such as the name of a building or a small card with extra information, all
    the way to creating what are often called mixed reality (MR) environments where
    the digital layer is rich and can be manipulated.


    VR, on the other hand, creates an entire new world and places us in it. Whereas
    AR or MR augments what we currently see, VR replaces the analog world with an
    entirely digital one. The user typically wears a head device that immerses them
    in the virtual world and holds interface devices in their hands to manage what
    is going on, or their gestures are “read” and interpreted through an external
    device.


    Although these technologies are further away from hitting the mainstream than
    conversational interfaces, the inflection point is getting closer. Once more the
    magic sauce of better computing capabilities, better hardware, and the application
    of AI techniques in the form of machine vision, natural language, and much more
    will lead to solutions that have the potential to feel like a natural extension
    of what we currently do. Success, however, is by no means a foregone conclusion.
    Even when all the required technological elements are there, the use cases still
    need to be carefully considered.


    For example, does anyone remember Google Glass? Released in 2012 to great fanfare,
    the device was hailed as the harbinger of the AR age. The wearer of the Google
    Glasses communicated with the device using natural language voice commands or
    by touching the side of the glasses, and the glasses were able to overlay relevant
    digital information just above your line of vision. All the ingredients were there:
    natural language, a wearable device, and tons of automation to make everything
    work smoothly. It was also a complete failure.


    There are multiple reasons for why Google Glass failed, and this is not the place
    to perform an in-depth analysis. What is interesting from our perspective is that
    a lot of the problems had little to do with the technology itself. In other words,
    even if Google Glasses were the “perfect” device from a technical capability perspective,
    they still would have failed. They were expensive, created awkward social situations
    (e.g., concerns that people would be photographed through the glasses without
    being aware of it led to them being banned in various locations), and didn’t solve
    an immediate pressing problem for people.


    Unlike voice or text-based conversations that use an interface paradigm we are
    immediately familiar with, AR technologies add a new layer that we need to get
    used to. This means that unless it is done right, it becomes yet another interface
    to learn. If that interface offers sufficient benefits, people will invest the
    time to learn it even if it is not a great fit. If not, after the initial excitement,
    people will just give up. Indeed, calling Google Glass a complete failure is not
    fair. It has found uses in industrial settings where there are clear use cases
    of helping skilled workers as they are completing tasks.


    From a consumer perspective we have some strong examples of how AR can be very
    successful when it is used effectively. Pokémon Go from the gaming industry is
    perhaps the most well-known example. Pokémon Go gets users, equipped with smartphones,
    searching for and capturing digital Pokémon in the physical world. The game indicates
    to users where they need to go to find the Pokémon, thus giving it the ability
    to direct people to specific locations. The excitement of mixing real world treasure
    hunts with digital game play took the world by storm, and for a few months in
    2016 it was impossible not to come across people either playing the game or discussing
    it. While that initial excitement has settled and we don’t hear about Pokémon
    Go on news reports anymore, the game is still played by tens of millions of users
    and generates hundreds of millions of dollars in revenue.^([^(40)](#fn40))


    Practitioners learn through these successes and failures, and because the appeal
    of AR is clear, it will eventually break through and become part of the tooling
    that helps us get work done in an office. The first area of application, however,
    is more likely to be industrial rather than office-based work. The mix of costs/benefits
    in an industrial setting is far more obvious and the domains to operate in are
    well defined. A great example is from a company called UpSkill.io. They use AR
    glasses to help field technicians receive information from remote specialist support
    staff. The AR glasses create a two-way feed between the field technician manipulating
    a complex device such as a drilling machine and the specialist support person.^([^(41)](#fn41))
    The back-end specialist can talk to the field technician, see exactly what the
    technician is seeing, and stream relevant information to the glasses. This allows
    the specialist technician to scale and support multiple field technicians, providing
    clear savings for the company.


    Now, if AR is challenging because it introduces a new way of doing things, VR
    takes that challenge to a whole new level. VR technology needs to play the ultimate
    magic trick. It needs to make us think that we are in a completely new world but
    feel as though it is as natural as the physical world. For years the struggle
    was simply around packing enough computing into a portable unit so that you could
    actually wear the device and carry it around. A catalyzing moment was when Facebook
    purchased one of the most promising producers of VR headsets—Oculus VR—for two
    billion USD in 2014. The promise of the technology paired to the reach of Facebook
    convinced people we would all have VR sets in our living rooms in a short amount
    of time. Several years later the enthusiasm has settled but the technology has
    marched on. Oculus now has products that don’t require any wires, and at a significantly
    lower price point.


    Ultimately, the promise of the technology is such that developments will continue.
    For our increasingly distributed offices, where large teams need to collaborate
    intensely on complex projects, tools that make that experience better are crucial.
    One of the VR holy grails is fixing the meeting room experience to make those
    in the room and those calling in all feel as if they are in the same place. All
    the large technology companies and countless startups are working on VR/AR platforms
    that will put the tools in the hands of developers, to allow them to explore the
    space and find the user experience solutions and business models that will work.
    Some of the platforms to look out for are:


    *   Microsoft with its Hololens 2^([^(42)](#fn42)) platform is providing the raw
    ingredients to allow developers to build applications on top of it. It is currently
    predominantly marketed for use in industrial applications.'
