    #### 集成


    到目前为止，我们一直在讨论协作环境，将其视为团队讨论问题并做出决策的场所。而与外部世界的集成则意味着，这些相同的协作环境也可以成为执行操作和推动变革的场所。


    让我们以一个简单的任务为例，思考一下在有集成和无集成的情况下，它会呈现出多么不同的面貌。目标是：当有人申请休假时，能够知晓该请求，并批准、拒绝该请求，或在做出决定前要求提供更多信息。


    在没有集成的协作空间中，你或许会通过电子邮件收到通知，或者那位知道你一天只查看几次邮件的热心同事，会发消息告诉你他们已经提交了申请。毕竟，他们急于得到答复，以便继续规划假期！一旦你看到了请求，你很可能要打开浏览器，登录到人力资源软件（希望是单点登录；否则你需要找回密码并进行双重身份验证）。终于登录成功后，你开始四处点击，试图弄清楚如何批准它。最终你找到了方法。然后你意识到，你还需要和几个人核实一下。于是又发出了一连串的电子邮件，你还要费心确保及时跟进，将所有信息串联起来，最终做出决定。现在，你还得回想一下，在整个流程开始之前，你原本打算做什么，然后才能回到正轨。


    有了集成，你会在你的对话式协作环境中收到一条消息。你立刻就知道这是关于休假申请的，因为它来自`VacationBot`。消息中包含了你需要的所有信息，你可以点击“批准”、“拒绝”或“讨论”。点击“讨论”会创建一个私密频道，并将你和申请休假的人拉入其中。在那里，你可以快速询问几个规划问题，或许还可以邀请其他需要发表意见的人。整个对话，连同相关的参与者，都集中在一个地方。最终满意后，你点击“批准”，讨论发生的频道和机器人就会消失。


    集成可以非常强大，能够将协作工具转变为一个功能完备的操作系统，用于管理你的组织运作。所有主要的消息协作环境都提供了专门的应用商店，你可以在其中找到种类繁多的应用程序和集成。


    这类应用程序我称之为对话式应用程序，它们是第 9 章的重点。不过在此之前，我还想讨论另一种类型的对话平台。


    ## 自定义对话平台


    到目前为止，我们讨论对话平台时，都隐含了一个假设，即我们处理的是来自大型科技公司（如 Slack、微软或 Facebook）的软件。然而，在继续之前，有必要指出，对话平台可以有多种多样的形式和规模。它们可以涵盖从专注于特定垂直领域（例如金融、医疗）的平台，到为特定组织和应用的独特需求而开发的完全可定制的对话平台。


    需要采用不同方法的行业是金融行业。交易员，和其他任何职业一样，可以从即时通讯和协作中受益，但他们需要的安全性和合规性程度超出了大多数行业的要求。这为专门服务于金融行业的消息应用垂直领域创造了蓬勃发展的条件。诸如`Symphony`^(⁴⁴)之类的工具，提供了所需的安全级别，并具备诸如适当的审计追踪、跨组织的可信身份管理以及数据所有权等功能。


    同样，如果问题足够大，从头构建一个完全自定义的对话协作平台也是合理的。作为我的团队为会计师事务所 BDO 所做工作的一部分，我们构建了一个自定义的对话协作平台，正是因为只有通过定制化的工具，我们才能解决这个问题。


    ### 用于审计的对话工具


    BDO 希望解决的问题是如何简化其审计流程。来自 BDO 的专家审计师会与客户进行长期互动，并从多个不同来源收集数据以完成审计。虽然有一些工具可以帮助完成这一流程，例如共享文档存储，但最终仍涉及大量临时的来回沟通、电子邮件，并且对整个团队的协调提出了相当大的要求，以避免混乱。


    经过初步实验后，我们决定最佳行动方案是构建一个专用工具，用于设计和完成审计。该工具是一个对话协作平台，它允许审计师和被审计方在审计过程中交换消息，并设置特定的群组来处理审计的不同方面。所有审计信息都通过应用程序以适当的方式收集（使用自定义表单和字段）。此外，一个自动化工具——一个对话式应用程序——充当协调者，在审计师和被审计方进行流程时，为他们提供主动和被动的支持。它可以响应求助请求（例如，“在这个地区我应该如何处理增值税？”），也可以根据输入的数据类型主动提供建议。整个平台还与其他
    BDO 系统对接，以简化数据传输。


    最终的结果是：


    *   一个更加用户友好的审计流程，从而带来更高质量的审计

    *   对审计数据有更深入的理解，因为数据是以结构化的方式收集的

    *   通过完全自有的平台，对审计数据进行完全的控制和安全保障

    *   BDO 有机会利用降低完成审计所需总体工作量、同时提高审计本身可靠性的优势


    从头构建一个自定义聊天应用并非不切实际的想法，即使对于较小的组织也是如此。如果你认为完全控制平台上的信息流和行为能带来足够多的好处，那么就可以结合多种现有技术，来创建一个由你掌控且完全归你组织所有的环境。

    '
- fmt: '# Your Organizational OS


    In this chapter we’ve dissected what it means to have a conversational collaboration
    platform and how it can act as an operating system layer for your organization.
    These platforms can delineate the space within which your digital environment
    can grow.


    With features such as people management, presence information, group management,
    and so on, these platforms can allow you to structure how work is done. As with
    anything, it is important to ensure that you proceed with specific purpose, so
    that the resulting processes are a reflection of the type of team and culture
    you are looking to have.


    By integrating these collaboration platforms into other aspects of your organization,
    you convert them into the interface through which potentially every other aspect
    of work can be accessed.


    These integrations, or conversational applications, can be a key differentiator
    for your organization and through automation they can provide significant gains.
    In the next chapter we examine in more detail what conversational applications
    are and how you can use them within conversational collaboration platforms.


    Footnotes [1](#472369_1_En_8_Chapter.xhtml#Fn1_source) [2](#472369_1_En_8_Chapter.xhtml#Fn2_source)


    # 9. Conversational Applications


    In 2016, Microsoft CEO Satya Nadella declared that “Bots are the new apps.”^([^(45)](#fn45))
    The world at the time was riding a wave of optimism around what chatbots would
    be able to do. It was clear that messaging applications were growing faster than
    social media, and users were suffering from app fatigue.^([^(46)](#fn46))


    Chatbots looked like the ideal way for companies to position themselves where
    users were (i.e., within messaging applications). In addition, since adding a
    chatbot was as simple as adding any other contact to your messaging app, it meant
    that you didn’t have to download and install something separate.


    Others took this optimism further still, declaring that *web sites* were done
    for as well. Why have a web site when you can directly talk to a brand on Facebook
    Messenger? Chatbots were going to take over the world and nothing could stop them.


    By 2018, people were singing a different tune. The impending takeover of chatbots
    did not quite go that way. Web sites were doing just fine, and so were applications
    on our phones. People had interacted enough with chatbots to realize that they
    were not that smart after all. Actually, quite a lot of chatbots where ineffective
    and would trip up at the slightest problem. What happened?


    Well, chatbot technology, like any other technology, went through a natural cycle
    of maturity. The initial enthusiasm, necessary for anything to get any traction,
    met the harsh problems of the real world. People tried out different approaches
    because there were no established best practices yet. Just like those web sites
    of the late 1990s and early 2000s, we added the equivalent of blinking cursors
    and rotating GIFs. Everyone did things slightly differently, and users were trying
    to figure out what on earth was going on. Inevitably, people got disappointed
    and some dropped away.


    At the same time, however, practitioners learned from their mistakes. Conferences
    and meetups took place and lessons were shared. Some made it through the dark
    times and the process starts over. This time, however, experience and redimensioned
    expectations can lead to more practical applications.


    By 2019, chatbots were no longer considered the savior of all things digital.
    Far more sensibly, they were considered another useful tool to apply with due
    consideration. My experience with chatbots tracked this trajectory. I recall sitting
    down with Tim Deeson in 2016, my now cofounder at GreenShoot Labs, and discussing
    what technologies would be interesting to explore. Chatbots and conversational
    AI were at the top of my list. By 2017, we decided that it was time to do something
    practical. We started building some experimental chatbots to see what the technology
    was capable of and discussed the possibilities with clients.


    What we learned over the next year is that although there was a lot of activity
    around consumer-facing chatbots, there was also a very interesting but less explored
    opportunity with enterprise chatbots: chatbots specifically built to help people
    within organizations to get work done. We went ahead and built a product for Slack,
    a bot called `TeamChecklist` that allowed users to store useful checklists and
    manage them as a team. Through that process we discovered just how many different
    applications of chatbots there were, but we also clarified our ideas about how
    we should think about the space.


    Ultimately, the more interesting product we built was not `TeamChecklist` but
    the tool we used to build `TeamChecklist`! `OpenDialog.ai` is an open source conversation
    management platform. It expresses a very specific way of both designing and building
    chatbots. GreenShoot Labs eventually pivoted into a conversational AI consultancy
    that helps clients figure out what solutions are useful for their specific situation
    and, where required, uses `OpenDialog.ai` to implement those solutions.


    In this chapter we are going to present some of the ideas that underpin our understanding
    of applications that use


    1. Conversations as their main interaction paradigm

    2. Conversational AI to provide users with a more natural way of exchanging messages


    As with all the other chapters, I feel that clarity around concepts and the relationships
    between them is crucial in order to be able to plot an effective strategy.


    ## From Chatbots to Conversational Applications


    One of the problems of chatbots is that they suffer from a lack of a clear definition.
    At the core of this “identity” issue is the conflation of issues surrounding the
    use of artificial intelligence with a mode of interaction between humans and machine.
    When people try out something that responds “like a human,” the almost knee-jerk
    reaction is to test the limits of its capability to respond. Admit it. We’ve all
    messed around with `Siri` or `Google Assistant`: asked them questions they had
    no business being able to answer and giggled at their responses. This overlaying
    of different issues (how intelligent is it? what can I do with it? how does it
    interact with me?) can be distracting though. It is for these reasons that I prefer
    to call what we are building “conversational applications.” The use of the term
    application reminds people that we are trying to address a specific need, and
    it just so happens that the predominant mode of interaction is via a conversation.


    A conversational application is one that is meant to operate within a conversational
    environment, such as Slack, where the predominant mode of interaction is the exchange
    of messages.


    Using the term conversational application makes it clearer that we are attempting
    to build a tool to complete specific tasks, as opposed to a more consumer-facing
    chatbot that might be just as equally employed in simply entertaining the user
    with chit-chat. Broadly, it is the same distinction I would draw between more
    general web sites (e.g., a news web site or a social media web site) where the
    goals are more open-ended and more specific web applications like `Xero` for accounting
    or `Google Docs` for online document collaboration.'
  raw: '## Your Organizational OS


    In this chapter we’ve dissected what it means to have a conversational collaboration
    platform and how it can act as an operating system layer for your organization.
    These platforms can delineate the space within which your digital environment
    can grow.


    With features such as people management, presence information, group management,
    and so on, these platforms can allow you to structure how work is done. As with
    anything, it is important to ensure that you proceed with specific purpose, so
    that the resulting processes are a reflection of the type of team and culture
    you are looking to have.


    By integrating these collaboration platforms into other aspects of your organization,
    you convert them into the interface through which potentially every other aspect
    of work can be accessed.


    These integrations, or conversational applications, can be a key differentiator
    for your organization and through automation they can provide significant gains.
    In the next chapter we examine in more detail what conversational applications
    are and how you can use them within conversational collaboration platforms.


    Footnotes [1](#472369_1_En_8_Chapter.xhtml#Fn1_source)   [2](#472369_1_En_8_Chapter.xhtml#Fn2_source)


    # 9. Conversational Applications


    In 2016, Microsoft CEO Satya Nadella declared that “Bots are the new apps.”^([^(45)](#fn45))
    The world at the time was riding a wave of optimism around what chatbots would
    be able to do. It was clear that messaging applications were growing faster than
    social media, and users were suffering from app fatigue.^([^(46)](#fn46))


    Chatbots looked like the ideal way for companies to position themselves where
    users were (i.e., within messaging applications). In addition, since adding a
    chatbot was as simple as adding any other contact to your messaging app, it meant
    that you didn’t have to download and install something separate.


    Others took this optimism further still, declaring that *web sites* were done
    for as well. Why have a web site when you can directly talk to a brand on Facebook
    Messenger? Chatbots were going to take over the world and nothing could stop them.


    By 2018, people were singing a different tune. The impending takeover of chatbots
    did not quite go that way. Web sites were doing just fine, and so were applications
    on our phones. People had interacted enough with chatbots to realize that they
    were not that smart after all. Actually, quite a lot of chatbots where ineffective
    and would trip up at the slightest problem. What happened?


    Well, chatbot technology, like any other technology, went through a natural cycle
    of maturity. The initial enthusiasm, necessary for anything to get any traction,
    met the harsh problems of the real world. People tried out different approaches
    because there were no established best practices yet. Just like those web sites
    of the late 1990s and early 2000s, we added the equivalent of blinking cursors
    and rotating GIFs. Everyone did things slightly differently, and users were trying
    to figure out what on earth was going on. Inevitably, people got disappointed
    and some dropped away.


    At the same time, however, practitioners learned from their mistakes. Conferences
    and meetups took place and lessons were shared. Some made it through the dark
    times and the process starts over. This time, however, experience and redimensioned
    expectations can lead to more practical applications.


    By 2019, chatbots were no longer considered the savior of all things digital.
    Far more sensibly, they were considered another useful tool to apply with due
    consideration. My experience with chatbots tracked this trajectory. I recall sitting
    down with Tim Deeson in 2016, my now cofounder at GreenShoot Labs, and discussing
    what technologies would be interesting to explore. Chatbots and conversational
    AI were at the top of my list. By 2017, we decided that it was time to do something
    practical. We started building some experimental chatbots to see what the technology
    was capable of and discussed the possibilities with clients.


    What we learned over the next year is that although there was a lot of activity
    around consumer-facing chatbots, there was also a very interesting but less explored
    opportunity with enterprise chatbots: chatbots specifically built to help people
    within organizations to get work done. We went ahead and built a product for Slack,
    a bot called TeamChecklist that allowed users to store useful checklists and manage
    them as a team. Through that process we discovered just how many different applications
    of chatbots there were, but we also clarified our ideas about how we should think
    about the space.


    Ultimately, the more interesting product we built was not TeamChecklist but the
    tool we used to build TeamChecklist! OpenDialog.ai is an open source conversation
    management platform. It expresses a very specific way of both designing and building
    chatbots. GreenShoot Labs eventually pivoted into a conversational AI consultancy
    that helps clients figure out what solutions are useful for their specific situation
    and, where required, uses OpenDialog.ai to implement those solutions.


    In this chapter we are going to present some of the ideas that underpin our understanding
    of applications that use


    1.  Conversations as their main interaction paradigm


    2.  Conversational AI to provide users with a more natural way of exchanging messages


    As with all the other chapters, I feel that clarity around concepts and the relationships
    between them is crucial in order to be able to plot an effective strategy.


    ## From Chatbots to Conversational Applications


    One of the problems of chatbots is that they suffer from a lack of a clear definition.
    At the core of this “identity” issue is the conflation of issues surrounding the
    use of artificial intelligence with a mode of interaction between humans and machine.
    When people try out something that responds “like a human,” the almost knee-jerk
    reaction is to test the limits of its capability to respond. Admit it. We’ve all
    messed around with Siri or Google Assistant: asked them questions they had no
    business being able to answer and giggled at their responses. This overlaying
    of different issues (how intelligent is it? what can I do with it? how does it
    interact with me?) can be distracting though. It is for these reasons that I prefer
    to call what we are building “conversational applications.” The use of the term
    application reminds people that we are trying to address a specific need, and
    it just so happens that the predominant mode of interaction is via a conversation.


     A conversational application is one that is meant to operate within a conversational
    environment, such as Slack, where the predominant mode of interaction is the exchange
    of messages.


    Using the term conversational application makes it clearer that we are attempting
    to build a tool to complete specific tasks, as opposed to a more consumer-facing
    chatbot that might be just as equally employed in simply entertaining the user
    with chit-chat. Broadly, it is the same distinction I would draw between more
    general web sites (e.g., a news web site or a social media web site) where the
    goals are more open-ended and more specific web applications like Xero for accounting
    or Google Docs for online document collaboration.'
  trans: '

    # 你的组织操作系统


    在本章中，我们剖析了拥有一个对话式协作平台意味着什么，以及它如何充当组织的操作系统层。这些平台可以划定数字环境的发展空间。


    借助人员管理、状态信息、群组管理等功能，这些平台能让你构建工作流程。与任何事物一样，确保带着明确目标推进至关重要，这样最终形成的流程才能反映出你期望的团队类型和文化。


    通过将这些协作平台与组织的其他方面集成，你可以将其转化为一个界面，通过它几乎可以访问工作的所有其他方面。


    这些集成（即对话式应用）可以成为你组织的关键差异化优势，并通过自动化带来显著收益。在下一章中，我们将更详细地探讨什么是对话式应用，以及如何在对话式协作平台中使用它们。


    脚注 1 2


    # 9. 对话式应用


    2016 年，微软 CEO 萨提亚·纳德拉宣称“机器人就是新的应用程序”。^(⁴⁵) 当时，全世界正对聊天机器人所能实现的功能充满乐观。很明显，消息应用的增长速度超过了社交媒体，而用户正遭受应用疲劳。^(⁴⁶)


    聊天机器人看起来是公司将自己定位在用户所在之处（即消息应用内）的理想方式。此外，由于添加聊天机器人就像在消息应用中添加任何其他联系人一样简单，这意味着你无需单独下载和安装其他东西。


    其他人则更进一步，宣称*网站*也大势已去。当你可以直接在 Facebook Messenger 上与品牌对话时，为什么还要有网站？聊天机器人将接管世界，没有什么能阻止它们。


    到了 2018 年，人们的态度发生了变化。聊天机器人即将接管世界的局面并未真正实现。网站依然运行良好，手机上的应用也是如此。人们与聊天机器人的互动足够多，以至于意识到它们其实并没有那么智能。实际上，相当多的聊天机器人效率低下，遇到最轻微的问题就会出错。发生了什么？


    嗯，聊天机器人技术和其他任何技术一样，经历了一个自然的成熟周期。最初让任何事物获得发展动力的热情，遭遇了现实世界的严峻问题。由于还没有成熟的最佳实践，人们尝试了不同的方法。就像
    20 世纪 90 年代末和 21 世纪初的网站一样，我们添加了相当于闪烁光标和旋转 GIF 的东西。每个人的做法都略有不同，用户则试图弄清楚到底发生了什么。不可避免地，人们感到失望，有些人退出了。


    然而，与此同时，实践者从错误中吸取了教训。会议和聚会得以举办，经验得以分享。一些人挺过了艰难时期，过程重新开始。但这一次，经验和调整后的期望可以带来更实际的应用。


    到 2019 年，聊天机器人不再被视为所有数字事物的救星。更明智的是，它们被视为另一种有用的工具，需要谨慎应用。我自己的聊天机器人经历也遵循了这一轨迹。我记得
    2016 年与蒂姆·迪森（我现在在 GreenShoot Labs 的联合创始人）坐下来讨论哪些技术值得探索。聊天机器人和对话式 AI 在我的清单上名列前茅。到
    2017 年，我们决定是时候做些实际的事情了。我们开始构建一些实验性的聊天机器人，看看这项技术能做什么，并与客户讨论各种可能性。


    在接下来的一年里，我们了解到，尽管面向消费者的聊天机器人活动很多，但企业聊天机器人也存在一个非常有趣但探索较少的机会：专门为帮助组织内人员完成工作而构建的机器人。我们继续为
    Slack 构建了一个产品，一个名为`TeamChecklist`的机器人，它允许用户存储有用的清单并作为团队进行管理。通过这个过程，我们发现了聊天机器人有多少种不同的应用，但也澄清了我们关于如何思考这个领域的想法。


    最终，我们构建的更有趣的产品不是`TeamChecklist`，而是我们用来构建`TeamChecklist`的工具！`OpenDialog.ai`是一个开源对话管理平台。它表达了一种非常具体的设计和构建聊天机器人的方式。GreenShoot
    Labs 最终转型为一家对话式 AI 咨询公司，帮助客户找出适合其特定情况的解决方案，并在需要时使用`OpenDialog.ai`来实施这些解决方案。


    在本章中，我们将介绍一些支撑我们对应用理解的观点，这些应用使用：


    1. 对话作为其主要交互范式

    2. 对话式 AI 为用户提供更自然的消息交换方式


    与所有其他章节一样，我认为清晰理解概念及其之间的关系对于制定有效策略至关重要。


    ## 从聊天机器人到对话式应用


    聊天机器人的问题之一是缺乏清晰的定义。这种“身份”问题的核心在于，将围绕人工智能使用的问题与人与机器之间的交互模式混为一谈。当人们尝试某种“像人一样”回应的事物时，几乎本能的反应就是测试其回应能力的极限。承认吧。我们都曾摆弄过`Siri`或`Google
    Assistant`：问它们一些本不该能回答的问题，然后对它们的回答咯咯笑。然而，这种对不同问题（它有多智能？我能用它做什么？它如何与我互动？）的叠加可能会分散注意力。正是出于这些原因，我更喜欢将我们正在构建的东西称为“对话式应用”。使用“应用”一词提醒人们，我们正试图解决一个特定的需求，而主要的交互模式恰好是通过对话进行。


    对话式应用是指旨在对话式环境（如 Slack）中运行的应用，其主要交互模式是消息交换。


    使用“对话式应用”这一术语更清楚地表明，我们正试图构建一个完成特定任务的工具，而不是一个可能同样用于通过闲聊来娱乐用户的面向消费者的聊天机器人。广义上讲，这与我在更通用的网站（例如新闻网站或社交媒体网站，其目标更开放）和更具体的网络应用（如用于会计的`Xero`或用于在线文档协作的`Google
    Docs`）之间所做的区分相同。

