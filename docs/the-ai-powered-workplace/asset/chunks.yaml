    At each step, we must be realistic about the feasibility of either approach. Is
    it a fool’s errand to try and build a model of a situation that is simply too
    complex to describe with rules? How much data will we need, what is the state
    of the data we currently have, and how reliable will the end result be? How can
    we prove to ourselves that we are heading in the right direction? How can we build
    fail-safes in the solution by combining techniques?


    Over the next few chapters we are going to delve into these questions as we explore
    more specific technologies and discuss how you can formulate a strategy that exploits
    AI for your workplace.


    Footnotes [1](#472369_1_En_3_Chapter.xhtml#Fn1_source)   [2](#472369_1_En_3_Chapter.xhtml#Fn2_source)
      [3](#472369_1_En_3_Chapter.xhtml#Fn3_source)   [4](#472369_1_En_3_Chapter.xhtml#Fn4_source)


    # 4. Core AI Techniques


    How does one even start to capture the processes that lead to what we recognize
    as “intelligent” behavior? More appropriately for our definition of AI, how does
    one begin to program machines so that *they* can make decisions instead of us?


    As we already discussed in Chapter [3](#472369_1_En_3_Chapter.xhtml), there are
    two broad approaches. We can either develop explicit models that govern the behavior
    of our system or we can attempt to discover those models by analyzing data and
    looking for patterns. In this chapter we provide a very high-level overview of
    what the main techniques are. Understanding the thinking behind these core techniques
    enables you to reason about the pros and cons of different approaches and the
    needs they might place on your products and teams.


    Artificial Intelligence is a fast-paced field and it feels like there are “new”
    things every week. This can make someone think that it is pointless trying to
    “catch up”; that it is best to leave everything to the experts. While it may be
    true that there are constant developments in the field, and setting yourself a
    goal of being always up to date is a losing battle, it is equally true that the
    core concepts have been around for decades. Whether it is semantic knowledge modeling
    or artificial neural networks, the ideas have been around since the 1960s. It
    is the specific algorithms and approaches that have evolved in the meantime. Having
    a clear understanding of the overarching concepts is what will provide the most
    value in the long term and will allow you to reason about what appropriate strategic
    direction to take.'
  trans: '

    # 技术、能力与应用


    我相信你已经开始意识到，将决策能力委托给软件这一问题的解决，涉及令人眼花缭乱的技术和方法。


    为了在思考中建立秩序，并将各种不同的方法纳入一个简单的模型，我将构建人工智能驱动的应用这一任务分解为三个部分。


    首先是**技术**，它使我们能够推理世界，要么通过允许我们显式地**建模**智能的某个方面，要么通过帮助我们**发现**它。这些技术分为模型驱动或数据驱动。


    技术组合起来提供**能力**。能力是特定的系统，使我们能够理解世界的某个方面或实现改变。能力包括机器视觉、语音处理和自然语言处理等。无论是基于模型、基于数据，还是两者的混合，能力都是机器拥有的“超能力”，使其能够执行某些任务。


    最后，能力组合起来形成完整的**应用**。应用是我们最终委托决策权的成品工具。它可以是我们的费用报销审核器、聊天机器人虚拟助手、金融市场预测器等。


    技术、能力和应用之间的关系如图 3-1 所示。对我来说，这提供了一种清晰的方式来区分人工智能领域内不同层次的工作。显然，在商业环境中，我们最终关心的是所启用的应用。对于这些应用，我们需要特定的能力——理解和改变世界的特定方式。这些能力之所以成为可能，是因为在人工智能层面，研究人员正在研究从基于逻辑的推理到数据驱动的深度学习架构等各种各样的技术。在关注大局的同时确定重点至关重要。人们常常陷入单一技术（通常是神经网络，因为这是最常被讨论的）而忘记真正重要的是扎实的能力或完整的应用。反之亦然，企业可能要求构建一个应用，却没有意识到必要的能力根本不存在，因此他们需要投资于基础研究，以开发能够带来必要能力的技术。


    ![../images/472369_1_En_3_Chapter/472369_1_En_3_Fig1_HTML.jpg](img/472369_1_En_3_Fig1_HTML.jpg)


    图 3-1. 从技术到能力再到应用


    ## 专家与机器协同工作


    在接下来的几章中，我们将更深入地探讨其中一些能力和技术，但在深入之前，让我们回到本章需要构建的应用：我们的费用报销审核器。


    最终，我们需要的是多种方法的结合。我们需要模型驱动的知识表示，它封装了核心规则和法规。然后，我们可以用数据驱动的决策来支持它，通过参考过去的数据来发现我们的显式模型未能足够准确捕捉的模式。


    现实世界的人工智能应用几乎总是模型驱动方法和数据驱动方法的结合。地图技术是我最喜欢的例子之一。想想你手机上的`Google Maps`应用。一方面，它有一个非常显式的道路、建筑以及基于道路信号、限速等从
    A 到 B 的规则表示。另一方面，`Google Maps`严重依赖基于数据的预测来推理在一天中的特定时间、结合其他用户的输入等情况下，最佳路线是什么。


    每个项目都需要确保理解问题和目标，考虑每天处理该主题的专家的知识，并制定如何最好地利用所有可用工具的计划。如果可以推导出显式模型，它就能提供从问题到答案的最有效路径。然而，有时特征太多、过程太不清晰，以至于只有以数据为中心的方法才能奏效。


    在每一步，我们都必须对每种方法的可行性保持现实态度。试图为一个过于复杂而无法用规则描述的情况构建模型，是否是一项徒劳的任务？我们需要多少数据？我们当前数据的状况如何？最终结果有多可靠？我们如何向自己证明我们正朝着正确的方向前进？我们如何通过结合技术来构建解决方案中的故障安全机制？


    在接下来的几章中，我们将深入探讨这些问题，同时探索更具体的技术，并讨论如何制定利用人工智能为你的工作场所服务的策略。


    脚注 1 2 3 4


    # 4. 核心人工智能技术


    一个人究竟如何开始捕捉那些导致我们称之为“智能”行为的过程？更符合我们对人工智能的定义，一个人如何开始编程机器，以便*它们*能够代替我们做决策？


    正如我们在第 3 章中已经讨论过的，有两种主要方法。我们可以开发控制系统行为的显式模型，或者我们可以尝试通过分析数据和寻找模式来发现这些模型。在本章中，我们提供了一个非常高层的主要技术概述。理解这些核心技术背后的思考，使你能够推理不同方法的优缺点，以及它们可能对你的产品和团队提出的需求。


    人工智能是一个快速发展的领域，感觉每周都有“新”东西出现。这可能会让人认为试图“赶上”是徒劳的；最好把所有事情都交给专家。虽然该领域确实在不断发展，并且设定一个始终保持最新状态的目标是一场必败之战，但同样真实的是，核心概念已经存在了几十年。无论是语义知识建模还是人工神经网络，这些想法自
    20 世纪 60 年代以来就已存在。演变的是具体的算法和方法。清晰理解总体概念将在长期内提供最大价值，并让你能够推理出合适的战略方向。

