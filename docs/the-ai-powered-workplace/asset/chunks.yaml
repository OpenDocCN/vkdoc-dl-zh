  trans: '

    ### 主动型智能体


    现在，让我们更进一步。既然存在被动型智能体，那必然也存在主动型智能体。主动型智能体是指那些对理想状态拥有内部表征的智能体。它们会*主动*尝试达成某个目标。最简单的此类智能体可以是恒温器。恒温器能感知房间温度（感知环境），并在达到目标温度时关闭暖气（对环境造成改变）。


    主动型智能体拥有目标的内部表征，并利用自身能力去实现该目标。


    主动型智能体让我们踏上了通往我们感兴趣的那类人工智能的道路，在这类人工智能中，我们将决策权委托给机器。在这种情况下，我们让恒温器决定何时开启或关闭暖气，以达到目标温度。


    “等等，”我听到你说，“恒温器也算人工智能？我以为人工智能是解决难题的！？”这个说法很有道理。但请记住，我们正在尝试构建一个框架，这个框架能帮助我们处理各种情况，而不对“复杂性”做任何模糊的假设。不要纠结于“难题”或“复杂情况”。一切事物都处在一个连续谱上，我们迟早会到达那里。恒温器的关键在于它能感知环境，并通过开关暖气来对环境变化做出反应。帮助它决定何时做出反应的，可能是一个简单的开关（`如果室温高于
    25 摄氏度则关闭暖气`），也可能是一个经过精细调校的神经网络模型，该模型学会了应该以何种百分比增加或减少热量输出，以便在优化舒适度的同时最大化能源利用效率。记住，我们关心的是“做什么”，而不是“怎么做”。


    从业务流程的角度来看，最有价值的一点是，管理温度的任务已被委托给一个自动化流程。不再需要人类持续检查温度，并据此决定是否应该开启或关闭暖气，或者增加或减少热量输出。


    从商业角度来看，主动型智能体或主动型软件，指的是我们可以将决策任务委托给它们的工具。


    这或许是本章最重要的一课。决定在工作环境中使用人工智能，就是决定将一项决策任务委托给一个软件程序。其核心与大多数公司不假思索地将财务预测的关键方面委托给电子表格，或将资源规划的关键方面委托给
    ERP（企业资源规划）软件并无不同。简而言之，人工智能是实现自动化的一种方式。人工智能与许多现有软件的不同之处在于，它拓宽了我们可以自动化的任务类型范围。之所以能做到这一点，是因为人工智能技术使我们能够构建出越来越擅长在以往不可能的场景中识别正确决策的软件程序。


    在工作环境中引入人工智能，就是识别哪些决策可以委托给软件智能体的过程。


    当我们在一个环境中引入人工智能时，我们也就引入了以自动化方式做出决策的软件智能体。在本节中，我们讨论了作为主动型智能体的恒温器，以及它既可以是一个非常简单的设备，也可以是一个更复杂的系统。该智能体都朝着同一个目标（调节温度）前进，但能力各不相同。我们将智能体为达成特定目标而灵活运用自身能力的能力称为*自我导向*。


    ### 自我导向型智能体


    为了更好地理解自我导向，让我们考虑一下手机上的通知系统。你可以将其概念化为一个软件智能体，其任务是接收通知（来自环境的输入）并将该消息传递给你（对环境产生影响以实现其目标）。


    这个通知智能体的一个简单版本是，每当有消息到达你的手机（针对你手机上的任何应用）时，它就直接显示在屏幕上。仅此而已。我相信大多数人都会同意，就人工智能而言，这绝对属于光谱的低端。


    现在考虑一个智能体，当消息到达你的设备时，它会参考你的通知偏好，考虑你当前的上下文（例如，是否过了某个时间点，你是否在某个地点，这是什么类型的消息，谁在发送消息？）。基于所有这些信息，该智能体决定最合适的行动方案（例如，在屏幕上显示、播放声音、在手表等其他设备上显示消息）。希望你能同意，在这种情况下，存在大量“智能”行动的机会。这是对情境的主动考量，可以导致多种不同的结果。


    这两个智能体服务于相同的目的，即通知用户消息。然而，有些智能体可能无论当前或过去的行为、用户偏好或上下文如何，都执行相同的操作。其他智能体则做出许多决策，并拥有多种选择来实现其目标。软件程序不再是一个被动的管道，而是变成了流程中的积极参与者。这就是为什么我们将这种基于内部决策来改变行动和输出的能力称为*自我导向*。


    自我导向是智能体改变其实现目标方式的能力。


    我们对智能体要求的自我导向程度越高，就需要运用越多的人工智能技术来实现它。我们需要具备推理世界、审查潜在大量数据，并基于所有这些信息决定执行哪个行动的能力。


    即便如此，这也不是一个简单的开/关切换。现在你有人工智能了；现在你又没有了。一切事物都处在一个连续谱上，如图 2-2 所示。我们在这个决策过程中引入的复杂性越多，需要考虑的上下文和历史信息就越多，需要使用的
    AI 技术也就越多。


    ![../images/472369_1_En_2_Chapter/472369_1_En_2_Fig2_HTML.jpg](img/472369_1_En_2_Fig2_HTML.jpg)


    图 2-2. 自我导向连续谱


    此时，关键是要认识到，从某个高层流程的视角来看，这并非复杂程度不同的问题。从流程的角度来看，任务只是被委托给了软件智能体。有一段代码负责在消息到达时通知我们。我们已经将那个决策委托给了软件，无论是通过明确的规则和我们的偏好，还是通过基于上下文和过去行为的更概率性的推理。那么问题就变成了，为了高效且有益地为我们执行任务，这个软件需要具备何种程度的自我导向。


    人工智能是将决策技能识别并编码到软件程序中的过程，以便它们能够有效地执行委托给它们的任务。

    '
- fmt: '### Autonomous Agents


    The notifier agent we have been describing so far, at any level of self-direction,
    can only operate within the bounds of a very specific goal: to decide when and
    how to display a message to the user.


    There is another level of agency that is useful to consider: one where the agents
    do not just operate to achieve well-defined goals but can actually generate their
    own goals.


    Imagine your workplace has just been outfitted with the latest “intelligent” office
    energy management system. This system has a target of ensuring you don’t spend
    more than 100 “units” of energy per week and that the occupants of the workplace
    get the maximum amount of comfort out of those energy units. To achieve this target,
    it references all the available data, preferences, and rules around what constitutes
    efficient energy use and comfort and begins taking action. It begins formulating
    specific goals (desirable environmental states) that it wishes to achieve.


    For example, it may decide that it should switch off certain devices because they
    seem to have been forgotten—switched on but not actively being used. It may also
    decide to just ever so slightly drop the office temperature so as to conserve
    energy. These are different goals that stem from its attempt to meet its higher
    level target. This is software with its “own” agenda and goals that is using whatever
    capabilities it has in order to fulfil that agenda.


    Let us look at another example. Suppose you have a “wellness” agent whose target
    is to ensure that all members of a team get a chance to participate in company
    activities. This wellness agent is given certain capabilities such as access to
    and the ability to reason about people’s diaries, or the ability to map out relationships
    based on interactions through e-mails or in chat software. Using that information,
    it can then decide to act based on its findings. It will have to make decision
    such as:


    “Do I move that project review meeting and affect the schedules of five people
    so that Alexis can join a yoga session, or do I have Alexis stay past a certain
    time in the office to do yoga?”


    These are different goals driven by a higher level target. We call these higher
    level targets *motivations*, and the ability of agents to pick a goal in order
    to satisfy their motivations *autonomy*.


    Autonomous agents generate or choose between different goals, using higher order
    motivations.


    Autonomy describes an agent’s ability to vary its decisions about what goal to
    achieve. As with the other concepts discussed so far, autonomy lies on a continuum.
    Take, for example, the wellness agent from before. We said that it can monitor
    diaries to ensure that everyone is participating adequately in social activities.
    What should it do, however, if someone is not participating in social activities?
    This will depend on how autonomous the agent is. It could, for example, simply
    notify the line manager of the person in question to highlight the issue and leave
    it at that. Alternatively, it could decide to change an employee’s work schedule
    so that the employee can then take the opportunity to book some time for a social
    activity. It could change the work schedule *and* book the social activity without
    asking anyone’s permission.


    As we introduce AI in our work processes, we need to carefully consider exactly
    how much autonomy we are providing. More autonomy means we are delegating more
    decision-making power to computer software, and we will potentially reap more
    efficiency out of it. It also means that we may suffer and have to deal with unintended
    consequences.


    An informative example of this is the now infamous Microsoft Tay chatbot released
    on Twitter. Tay was given considerable autonomy in terms of what messages it could
    produce and that led to an embarrassment for Microsoft. As trolls “taught” Tay
    racist and extremist phrases, the chatbot used those phrases in interactions with
    other people. Microsoft had to recall the bot, blaming a “vulnerability”— the
    vulnerability was that Tay had no constraints on what it could say and no guidance
    as to the quality of what it learned.


    Before moving on, I want to reiterate the different levels. We will use this terminology
    throughout the book, so it’s useful to make sure we have it all well laid out.


    - *Agents* are software programs that have some *capabilities* and can effect
    change in their environment through those capabilities. The desired change is
    called a *goal*.

    - *Passive agents* are ascribed goals by their user. It is the user that manipulates
    a passive agent’s capabilities. Most software we use behaves like passive agents.

    - *Active agents* have an explicit representation of a goal to achieve and can
    manipulate their own capabilities to achieve a goal.

    - *Self-direction* refers to the agent’s ability to vary the ways in which it
    achieves a goal.

    - *Autonomy* refers to the agent’s ability to choose between different goals,
    in service of a higher order target or *motivation*.


    ### Agents That Learn


    So far, we have talked about agents that are passive, active, and even autonomous.
    Another key dimension is the agent’s ability to learn from past experiences.


    Returning to the wellness agent, we can envision how, as it tries different strategies
    with users to get them more actively involved, it “learns” which strategies work
    best with which users. This adaption of its behavior to different contexts based
    on previous action and historical data is what we will consider as learning.


    There can be any number of layers of complexity hidden behind this learning activity.
    The ways the agent assigns scores to different reactions and outcomes from users
    can become increasingly more sophisticated. It may be able to draw not just from
    the reaction of a single person but that of thousands of users over a long period
    of time. If the data grows and the variables to consider are multiple, it will
    need special tools and increasingly more sophisticated AI techniques to make sense
    of them.'
