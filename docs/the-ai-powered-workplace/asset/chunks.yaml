    when they step into your offices? What does it say about your organization and
    what sort of organization do you want it to be? People probably spend quite some
    time thinking about what the lobby of a building says about the company. They
    make huge investments in artwork or sophisticated fixtures. Typically, the older
    and larger an organization is the more impressive their lobby. However, it is
