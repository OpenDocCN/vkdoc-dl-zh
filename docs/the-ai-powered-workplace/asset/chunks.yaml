  trans: '

    ### 流程


    在了解团队由哪些成员组成之后，接下来要关注的是团队如何完成任务。我相信你们中的许多人都曾经历过这样的情况：有时所有信息都已齐备，甚至正确的工具也已到位，但总有一条“规则”要求事情必须“以某种特定方式”完成。这便成了阻碍实现恰当自动化的绊脚石。流程正是定义这些步骤以及支配这些步骤的规则。


    绘制所有相关流程的地图，明确每个阶段需要哪些数据、涉及哪些人员、信息如何在步骤之间流转，起初可能看起来是一项费力的工作。然而，这对于我们能够自信地改变、改进和自动化这些流程至关重要。


    #### 绘制流程


    有大量系统支持业务流程绘制，从简单的流程图到诸如六西格玛之类的复杂技术。一如既往，没有单一的解决方案。探索哪种方法最适合你所在的组织至关重要。一个简单的起步方式——如果你还没有关于流程的结构化信息，这也能带来明确的长期益处——就是创建一本公司手册。


    公司手册是一份动态文档，旨在供公司内任何人查阅，以了解事情如何完成。从如何申请假期和休假，到获取新设备、培训或个人发展，它可以用简单的语言包含实现这些目标的所有流程。它不需要专业知识来编写，并且可以成为团队或组织内的协作成果，因为不同的人负责手册的不同方面。通过用通俗语言解释关键问题，人们就能识别出哪些方面可能得到改进或自动化，然后深入挖掘，为这些方面创建更正式的流程图和流程图表。


    关于流程绘制，最后要提一点：在此过程中，尽量避免提及任何特定的软件或工具。例如，说“为了申请假期，必须通过 HR 假期规划工具提交请求”只是描述了发生的事情，而非其背后的真实流程。我们真正感兴趣的是，该请求提交到
    HR 工具后发生了什么。它会发送给直线经理、首席运营官还是首席执行官？他们应该做出什么回应？这才是我们试图绘制的真实流程，这样我们才能以多种不同方式、使用不同工具来实现该流程。


    ### 工具


    在理解了如何用合适的模型来代表团队和组织中的人员，并绘制出流程之后，我们就可以转向工具了。


    哪些软件承载数据并执行操作？它们之间如何连接？同样，从具体用例入手通常比从全面罗列每一个工具开始更有成效。用例能让你发现与解决实际问题相关的具体信息，然后你可以由此扩展，回溯到流程、人员，最终找到解决方案。


    #### 揭开工具的神秘面纱


    我认为，工具需要特别的耐心。它往往比其他任何东西都更像一个棘手的谜团。当你审视一款软件，试图理解它为何是现在这个样子时，你实际上是在审视一段漫长的决策史、权力博弈、限制条件以及短期解决方案（权宜之计），正是这些因素造就了你眼前的一切。


    试图理清这一切，常常会让人觉得付出太多努力而得不偿失。这就是为什么清楚理解你实际试图支持的流程（不参照特定工具）以及工具中的数据如何支持该流程至关重要。这样你就能更自信地行动，更换工具，同时知道你所关心的流程仍能得到支持。


    ## 下一站


    数字工作场所是促进工作的数字环境。它是构成组织的个人与团队之间的互动、遵循的流程以及支持这些流程的工具的总和。在整个过程中，数据从一个地方流向另一个地方，被存储、处理、操作和转换。


    数字环境也应该是你文化和价值观的体现。尽管听起来有些老套，但它应与你的价值观声明相协调。如果你宣称自己是一个开放的组织，但人们却发现工具将活动分隔开来，不允许自由协作，那便毫无意义。


    在工作场所引入自动化的一个必要前提是理解你的数字环境。扎实理解事物为何如此，能让你自信地引入变革。


    在接下来的章节中，我们将把注意力转向如何将人工智能与消息平台相结合，为你的数字环境提供底层操作系统和用户界面。我们将看到消息平台如何充当不同系统之间的粘合剂，并成为整个数字环境的窗口。


    # 7. 人工智能即新用户界面


    人工智能常常（而且理所当然地）被提及用于解决诸如发现新基因、治愈癌症或实现自动驾驶等难题。然而，还有一系列更平凡但同样具有挑战性的问题，人工智能已经在其中扮演着关键角色。人工智能正日益成为管理我们与任何计算设备交互的软件背后的神奇配方。


    本章旨在阐述并激发人工智能与用户界面之间的联系，并展示由人工智能驱动的用户界面不仅对消费产品重要，对工作场所也同样重要。由人工智能驱动的界面将成为正确使用它们的组织的竞争优势来源。

    '
- fmt: '# Moving beyond “point and click”


    Since the widespread introduction of the graphical interface with the Macintosh
    computer in 1984, the predominant interaction paradigm with computers has been
    to point a cursor at something and click to select it.


    Innovations along the way upgraded this basic experience, making it richer and
    smoother, but they haven’t radically changed it. Yes, we can now use our fingers
    instead of a mouse. Yes, we can “pinch and zoom” with two fingers or “swipe” with
    more fingers. With some trackpads and smartphones we can even use pressure to
    cause different reactions. We went from tiny, underpowered processors with very
    little memory on grayscale screens to blazingly fast machines, virtually unlimited
    memory, and millions of colors. That’s thirty-five odd years of improvements.
    Nevertheless, we are still pointing and clicking.


    Don’t get me wrong. All of these developments are amazing. The technology necessary
    to provide a smooth pinch and zoom experience is staggering. The fundamental paradigm,
    however, remains the same. You are manipulating objects on a screen (buttons,
    links, text, images) by using a device (a mouse, pen, trackpad, or your hands)
    to indicate to the machine what should happen to the object you are pointing at.


    Interestingly, AI already plays a huge role in today’s interfaces. A prime example
    is the virtual keyboard on your smartphone. It is constantly predicting the most
    likely letter you would have wanted to touch, which one you are likely to touch
    next, as well as what words and phrases you are trying to type overall. It is
    learning to adapt its predictions to your specific manner of touching keys and
    writing. If all of that was switched off, we would find it very hard to type any
    message on our phones. It is no exaggeration to say that the introduction of the
    iPhone was only made possible because it used enough AI techniques to make the
    UI possible.


    These days, all the top-of-the-line smartphones have either facial recognition
    or fingerprint recognition. That is a feature that heavily depends on AI techniques
    to interpret the inputs it gets (your facial characteristics or fingerprint) to
    the ones it has stored in memory. The fact that they can do it in a seamless motion
    with practically no delay is nothing short of magic.


    We are at a tipping point, however. It is time to move on from the point and click
    interface to something else. Additional AI technologies will allow us to take
    the next step, and there are three key underlying drivers.


    First, as computing spreads to every aspect of our life and every device, the
    interface quite simply disappears or is not an immediate option. If you are multitasking,
    such as driving a car or preparing a meal in your kitchen, your hands are already
    occupied. Being able to speak to a computer is the only choice. If you are interacting
    with a device that is on your wrist, or embedded in your clothes or furniture,
    voice commands are the natural choice.


    Second, it is about time we turned the tables on computers and the way we interact
    with them. So far, we have had to learn the “magic incantations”: the sequences
    of clicks that will help us achieve our goal. Where in the endless layers of menus
    is the option we are looking for buried? Which of the various left-button, right-button,
    one-finger, two-finger, or three-finger with pressure click combinations should
    we evoke to make things happen? Why can’t we simply tell computers what we want
    and have them do it? This has always been the vision, but now interface designers
    finally have tools to help them realize pragmatic versions of that vision.


    The third driver centers on competition and how external forces make it inevitable
    for others to react. When a set of technologies reaches a tipping point and enables
    a new way of doing things, it provides a competitive advantage. This, in turn,
    causes competitors to look for ways to neutralize the advantage, which inevitably
    drives further technological innovation. The iPhone is a prime example of that.
    In that first presentation of the iPhone, Steve Jobs showed the state of the art
    in phones at the time: bulky, clunky, with physical keyboards. The iPhone changed
    all of that. In a few years the bulky and clunky phones were all gone. iPhone
    became the new standard by which smartphones were judged. Fast forward to 2019
    and the iPhone is now competing to keep up with innovations that others are spearheading.


    Now, imagine a support team that is able to provide a better customer experience
    because they can focus on the more complex cases while their automated virtual
    assistants, powered by conversational AI, are dealing with the simple and repeatable
    problems. As a result, all of their competitors will look to provide similar support
    interfaces for users, and the use of conversational AI becomes the minimum entry
    point.


    As AI influences so many different aspects of what we do, these forces will cause
    change in many different ways. From a business perspective a great user experience
    cuts right to the heart of the efficiency issue. Imagine your sales team having
    to compete with a team that has ten times better and more efficient access to
    data, and the ability to create new visualizations and ask new questions of their
    data. While your team is trying to borrow the time of a software developer in
    order to write a new query to pull out a report, the other team can simply type
    or speak what they need in a conversational interface and have the results show
    up in the team messaging tool for everyone to share. We are past the point where
    a good user experience was a luxury to be added later, and we are quickly getting
    to the point where a good user experience will equate to active, smart interfaces
    that collaborate with users to solve problems. In other words, the interfaces
    of the future will be entirely dependent on AI.


    In the rest of the chapter I will introduce some of the technologies that are
    enabling this change, and the interaction paradigms that they are making possible.


    ## Conversational Interfaces


    Our brains are hardwired for language. As toddlers we get to the point where we
    are learning new words every hour of our life, and often we just need to hear
    a word once and we can already start using it. Listening and conversing (whether
    through voice or gestures) is what humans do.


    Now, compare that to navigating a web site or interacting with an app on the phone.
    That requires specific effort and training. We need to learn it explicitly and
    the rules keep changing on us. Different applications put buttons in different
    places, icons are different, etc. Conversations, however, remain simple: question,
    reply, response, repeat. From a human perspective, conversational interfaces as
    a way forward are a no-brainer. It’s what we do all the time.


    Conversational interfaces are digital interfaces where the main mode of interaction
    is a conversation — a repeating pattern of reply response.


    A conversational interface can use purely written exchanges (e.g., within Facebook
    Messenger or via SMS); voice-based (e.g., with the Amazon Alexa service), or a
    hybrid (e.g., Siri or Cortana, where we use voice but receive replies in a combination
    of voice and text). Conversational interfaces can also provide rich replies that
    mix text with media, or simplify the conversation by giving us a set of options
    to choose the reply from.


    In the next few pages I take a look at what is happening with voice and written
    conversational interfaces, and explain why I think we are at the start of a very
    significant change for both.'
