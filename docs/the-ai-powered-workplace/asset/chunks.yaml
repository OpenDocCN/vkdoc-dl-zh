    *To Katia, Sofia, and Leo.*


    Introduction


    What does the phrase “The AI-powered workplace” mean? Is it a blatant attempt
    to ride a wave of interest in artificial intelligence (AI) or does it describe
    a set of tools, techniques, and methods that can provide real value and lead to
    a different kind of workplace? In a broader sense, are we at the start of a fundamental
    shift in how office work is done, with AI as one of the central pillars, or are
    we in the throes of the latest fad?


    Unsurprisingly, I don’t think that AI is a fad. I believe that we are at the start
    of what will be a far-reaching and fast-paced journey, one that will lead us to
    a radically different workplace from what we’ve had for most of the second half
    of the 20th century and a good chunk of the 21st.


    The tools to help us get there are broadly, and confusingly, referred to as AI
    technologies . These technologies will prove to be a fundamental game-changer
    in how we do work. Indeed, AI will be a significant game-changer in all aspects
    of life, from manufacturing to agriculture and from healthcare to, sadly, also
    warfare.


    Our focus for this book, however, will stick to the office. We will explore what
    changes are already underway and which are next on the horizon. These changes
    will affect the type of work we do when we are staring at a computer screen (and
    how we will hopefully be doing much less staring as time goes by) and coordinating
    with our coworkers to get things done. More specifically, we will explore how
    the rise of messaging and collaboration platforms such as Slack, Microsoft Teams,
    or Facebook Workplace provide fertile ground for the growth of increasingly more
    sophisticated applications that work with us in a proactive manner to help us
    solve problems. These messaging platforms or, as we will more appropriately term
    them later on, conversational collaboration platforms, will turn into the operating
    system of our digital workplace. Understanding how AI and these platforms intersect
    can provide you with a jump-start toward an AI-powered workplace.


    The goal of this book is very practical: to equip you with a solid understanding
    of what AI is and provide you with decision-making tools that will allow you to
    chart a plan of action for your team that takes into account and exploits what
    AI technologies coupled with messaging platforms can offer.


    The book is divided into broadly three sections. First, we provide an introduction
    to AI and a way to think of AI-powered applications that will stand us in good
    stead now and in the future. We then turn our focus to the application of AI in
    the workplace, with a specific emphasis on how conversational collaboration platforms
    motivate and facilitate the introduction of AI-powered applications . Finally,
    we deal with the strategic thinking that is required to help you build your own
    AI-powered workplace by looking at useful principles and methods to develop strategies
    around data and AI in general. We close with a look at the ethical issues that
    are raised by the use of AI and discuss some of the guidelines that are being
    developed to tackle those.


    ## Understanding AI


    In Chapter [1](#472369_1_En_1_Chapter.xhtml) we trace the rise of AI and its trusty
    friends Data and Processing Power. This will help us better appreciate why we
    are where we are now, what the critical phases were in getting here, and how those
    will influence future developments.


    In Chapter [2](#472369_1_En_2_Chapter.xhtml) we tackle the big question. What
    is AI and how does it do what it does? Don’t worry; I am not about to put on a
    philosopher’s hat and ponder the meaning of intelligence. My goal is to provide
    a set of practical ways of thinking about AI, demystifying the technologies and
    allowing you to recognize what can be practically useful in your situation. In
    particular, I will describe a way of thinking about*what* AI-powered applications
    do that is separate and distinct from the techniques that they use to achieve
    it.


    Equipped with an understanding of what AI is, in Chapter [3](#472369_1_En_3_Chapter.xhtml)
    , we look at what it means to build an AI-powered application. We look at what
    it takes to come up with a model of reasoning that will empower automated decision-making.
    In particular, we explore two distinct approaches: model-driven AI techniques
    and data-driven techniques. Both are required for complete applications, so it
    is useful to have a clear understanding of the implications, benefits, and disadvantages
    of each.


    Chapters [4](#472369_1_En_4_Chapter.xhtml) and [5](#472369_1_En_5_Chapter.xhtml)
    build on the framework introduced in Chapter [3](#472369_1_En_3_Chapter.xhtml)
    . They are the most “technical” chapters, in that they provide us with an overview
    of the range of AI techniques and capabilities currently available and widely
    used. The purpose of these chapters is to give us a handle on various terms we
    will inevitably encounter, such as supervised or unsupervised learning and natural
    language processing, so that they can be considered in the context of solutions.'
