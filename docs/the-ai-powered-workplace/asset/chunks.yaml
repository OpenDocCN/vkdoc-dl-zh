    workplace: imagine yourself having to build a new physical space for your organization.
    What sort of questions would you ask yourself in that case?


    Where will it be? The location (or lack of a single location if you choose to
    go distributed) will define how people interact with each other and with the outside
    world. What changes for your organization if you are in a science park close to
    Oxford, in the center of London close to startups and large tech companies, or
    in a Tuscan farmhouse holding video calls with your team spread throughout the
    world? In a digital environment, one analogous choice would be to consider the
    digital spaces that people use to communicate and collaborate (your e-mail systems,
    your project management tools, and your messaging infrastructure). Different types
    of digital locations will enable different possibilities.


