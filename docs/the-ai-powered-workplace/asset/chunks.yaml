- fmt: "# A Practical Approach to AI Strategy\n\n> *“[Strategy is] strength applied\
    \ to the most promising opportunity.”*\n> \n> —Richard P. Rumelt, *Good Strategy\
    \ Bad Strategy*^([^(56)](#fn56))\n\nDeveloping a strategy for anything is an incredibly\
    \ challenging task. The only information you have to act on is what has happened\
    \ in the past. Everything that will happen in the future is, ultimately, a guess.\
    \ In the same way AI techniques work, a strategy depends on you having a model\
    \ of how the world works, based on the information you’ve had so far, and devising\
    \ a set of rules that will allow you to make a prediction about the future. However,\
    \ unlike the problems AI can currently help us solve, you need to deal with an\
    \ almost unlimited set of variables. To make matters worse, there is no one-size-fits-all\
    \ solution. You have to craft the strategy that is right for your organization,\
    \ and the best strategy for your team will, almost by definition, be an unsuitable\
    \ strategy for a different place.\n\nAs such, there is no single true recipe that\
    \ will lead to your ideal AI strategy. Only you know what the real ingredients\
    \ are. What I can do is talk about general principles, ways to prepare and specific\
    \ methods to apply. Like a chef in a kitchen presented with a mystery box of ingredients,\
    \ it is your task to open the box, figure out what you have available, and make\
    \ the best possible use of each ingredient.\n\n## Principles\n\nPrinciples for\
    \ a strategy act as guiding stars to help us choose one direction rather than\
    \ another when the ground truths don’t clearly point to a choice. The principles\
    \ I present here are the distillation of numerous conversations with large and\
    \ small organizations about what has and hasn’t worked for them, and what is important\
    \ to focus on and what instead is more of a distraction.\n\n### Think Big, Start\
    \ Realistically, Scale Appropriately\n\nThose of you familiar with the lean startup\
    \ movement will see the seeds of that movement’s mantra in the heading. It usually\
    \ goes: “think big, start small, scale fast.” The lean startup movement was started\
    \ by Eric Reis, who, through his book *The Lean Startup*^([^(57)](#fn57)) described\
    \ a methodology for doing business that embraces uncertainty and minimizes risk\
    \ by testing the viability of business models through the execution of carefully\
    \ managed and cost-effective experiments. The experiments are designed to test\
    \ the most critical hypothesis behind a new feature or product before scaling\
    \ that product to full-blown production. For lean startupers, it is important\
    \ to have a big far-reaching vision but then start with small experiments that\
    \ are not that costly, before moving on to scaling as fast as possible in order\
    \ to capture market value. A strategy for applying AI techniques to your workplace\
    \ can benefit from the same sort of thinking. At the same time, there are a couple\
    \ of things to keep in mind—which is why I distorted the mantra to “Think Big,\
    \ Start Realistically, Scale Appropriately.”\n\n#### Think Big\n\nThe potential\
    \ of the application of AI techniques to how we do work is transformational. It\
    \ is necessary to think big in order to understand the true scope and assign it\
    \ appropriate importance. Just like Google with their public AI-first strategy\
    \ statement, it is about giving the entire mission enough importance so that people\
    \ pay attention and prioritize it appropriately.\n\nThinking big is also about\
    \ recognizing that automation is not just about more of the same but at a lower\
    \ cost or higher speed. Don’t think of the introduction of automation in a business\
    \ as akin to a factory line, where component A can be attached to component B\
    \ in a faster and less error-prone way. Automation through AI also enables entire\
    \ new ways of doing things. It enables new business models. It is a circle whereby\
    \ the need for automation leads to digitalization of information and process,\
    \ which in turn generates more information that can be further exploited and leads\
    \ to completely new ways of solving a problem.\n\nFor example, automating support\
    \ handling doesn’t just mean that you will need fewer resources to deal with the\
    \ same amount of support requests. It also means that you can better understand\
    \ support issues as each support request is carefully analyzed by increasingly\
    \ more sophisticated natural language-understanding capabilities. The resulting\
    \ data can be fed directly into product development, and the results of product\
    \ improvements can be traced back to the types of questions that come through\
    \ support after a release. It means that you can evolve your support teams to\
    \ become customer success teams that engage with clients in a completely different\
    \ way. The introduction of automation in support handling can affect the business\
    \ all the way through to how product design and development take place and customer\
    \ relationships are managed. However, to realize the full benefits of the effort,\
    \ you need the big vision version so that you put in place the right stepping\
    \ stones at each phase to be able to get to the top of the hill.\n\nFigure [11-1](#472369_1_En_11_Chapter.xhtml#Fig1)\
    \ illustrates this flow for any process. We start from a place with historical\
    \ data and understanding of our processes (1) and do the work to augment our standard\
    \ processes through automation (2). This, if done carefully and with a mind to\
    \ the future, can lead to enhanced data and understanding (3). This enhanced understanding\
    \ starts creating a virtuous feedback loop that can go back into augmenting existing\
    \ processes (2) but also into creating additional opportunities (4) and even new\
    \ processes (5).\n\n![../images/472369_1_En_11_Chapter/472369_1_En_11_Fig1_HTML.jpg](Images/472369_1_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1. The AI virtuous process enhancement flow\n\n#### Start (and Evolve)\
    \ Realistically\n\nApplying new technologies always involves a high amount of\
    \ risk. It is not business as usual. You need to be able to absorb and react to\
    \ a lot of learnings, and things will not turn out as you would expect them. The\
    \ lean startup approach has made it popular for people to push to start with small\
    \ experiments (minimum viable products) that will test a key hypothesis before\
    \ committing additional resources. Overall, that’s a very sensible approach. The\
    \ crucial question, of course, is exactly how minimal a minimum viable product\
    \ can be. It has to be enough to give you information about whether it is worth\
    \ scaling the entire effort. If the product is too simple and too minimal, it\
    \ is not going to be useful.\n\nWith AI techniques we are in a very similar situation.\
    \ If you are attempting to deploy a prediction algorithm, you need to ensure that\
    \ you are giving enough space for people to prepare enough data and try enough\
    \ approaches to have a firm understanding of whether the problem can be solved.\
    \ Think of it as the equivalent of the escape velocity for a space launch. Engineers\
    \ know that unless a launch missile is able to develop a velocity of 25,000 km/h\
    \ it will not be able to escape the earth’s gravitational pull. If you know that\
    \ your investment in engineering will not be enough to surpass that minimum threshold,\
    \ you are better off spending that money elsewhere altogether.\n\nNow, recognizing\
    \ where that threshold lies requires a combination of experience and willingness\
    \ to have some false starts. As such, I believe that there are two key tests that\
    \ a plan must pass. The first is to ensure that the individual steps in the roadmap\
    \ have enough clarity that there can be some preliminary research into their feasibility,\
    \ and that no step is so big that if it fails there is no space for a change of\
    \ direction. The second is to ensure that each step is fed the appropriate level\
    \ of inputs, a sort of readiness gate that ensures you are doing enough for it\
    \ to be useful without doing too much. If coming out of one step you do not meet\
    \ the readiness gate to move into the next step, you can stop and reconsider."
  raw: "## A Practical Approach to AI Strategy\n\n> *“[Strategy is] strength applied\
    \ to the most promising opportunity.”*\n> \n> —Richard P. Rumelt, *Good Strategy\
    \ Bad Strategy*^([^(56)](#fn56))\n\nDeveloping a strategy for anything is an incredibly\
    \ challenging task. The only information you have to act on is what has happened\
    \ in the past. Everything that will happen in the future is, ultimately, a guess.\
    \ In the same way AI techniques work, a strategy depends on you having a model\
    \ of how the world works, based on the information you’ve had so far, and devising\
    \ a set of rules that will allow you to make a prediction about the future. However,\
    \ unlike the problems AI can currently help us solve, you need to deal with an\
    \ almost unlimited set of variables. To make matters worse, there is no one-size-fits-all\
    \ solution. You have to craft the strategy that is right for your organization,\
    \ and the best strategy for your team will, almost by definition, be an unsuitable\
    \ strategy for a different place.\n\nAs such, there is no single true recipe that\
    \ will lead to your ideal AI strategy. Only you know what the real ingredients\
    \ are. What I can do is talk about general principles, ways to prepare and specific\
    \ methods to apply. Like a chef in a kitchen presented with a mystery box of ingredients,\
    \ it is your task to open the box, figure out what you have available, and make\
    \ the best possible use of each ingredient.\n\n## Principles\n\nPrinciples for\
    \ a strategy act as guiding stars to help us choose one direction rather than\
    \ another when the ground truths don’t clearly point to a choice. The principles\
    \ I present here are the distillation of numerous conversations with large and\
    \ small organizations about what has and hasn’t worked for them, and what is important\
    \ to focus on and what instead is more of a distraction.\n\n### Think Big, Start\
    \ Realistically, Scale Appropriately\n\nThose of you familiar with the lean startup\
    \ movement will see the seeds of that movement’s mantra in the heading. It usually\
    \ goes: “think big, start small, scale fast.” The lean startup movement was started\
    \ by Eric Reis, who, through his book *The Lean Startup*^([^(57)](#fn57)) described\
    \ a methodology for doing business that embraces uncertainty and minimizes risk\
    \ by testing the viability of business models through the execution of carefully\
    \ managed and cost-effective experiments. The experiments are designed to test\
    \ the most critical hypothesis behind a new feature or product before scaling\
    \ that product to full-blown production. For lean startupers, it is important\
    \ to have a big far-reaching vision but then start with small experiments that\
    \ are not that costly, before moving on to scaling as fast as possible in order\
    \ to capture market value. A strategy for applying AI techniques to your workplace\
    \ can benefit from the same sort of thinking. At the same time, there are a couple\
    \ of things to keep in mind—which is why I distorted the mantra to “Think Big,\
    \ Start Realistically, Scale Appropriately.”\n\n#### Think Big\n\nThe potential\
    \ of the application of AI techniques to how we do work is transformational. It\
    \ is necessary to think big in order to understand the true scope and assign it\
    \ appropriate importance. Just like Google with their public AI-first strategy\
    \ statement, it is about giving the entire mission enough importance so that people\
    \ pay attention and prioritize it appropriately.\n\nThinking big is also about\
    \ recognizing that automation is not just about more of the same but at a lower\
    \ cost or higher speed. Don’t think of the introduction of automation in a business\
    \ as akin to a factory line, where component A can be attached to component B\
    \ in a faster and less error-prone way. Automation through AI also enables entire\
    \ new ways of doing things. It enables new business models. It is a circle whereby\
    \ the need for automation leads to digitalization of information and process,\
    \ which in turn generates more information that can be further exploited and leads\
    \ to completely new ways of solving a problem.\n\nFor example, automating support\
    \ handling doesn’t just mean that you will need fewer resources to deal with the\
    \ same amount of support requests. It also means that you can better understand\
    \ support issues as each support request is carefully analyzed by increasingly\
    \ more sophisticated natural language-understanding capabilities. The resulting\
    \ data can be fed directly into product development, and the results of product\
    \ improvements can be traced back to the types of questions that come through\
    \ support after a release. It means that you can evolve your support teams to\
    \ become customer success teams that engage with clients in a completely different\
    \ way. The introduction of automation in support handling can affect the business\
    \ all the way through to how product design and development take place and customer\
    \ relationships are managed. However, to realize the full benefits of the effort,\
    \ you need the big vision version so that you put in place the right stepping\
    \ stones at each phase to be able to get to the top of the hill.\n\nFigure [11-1](#472369_1_En_11_Chapter.xhtml#Fig1)\
    \ illustrates this flow for any process. We start from a place with historical\
    \ data and understanding of our processes (1) and do the work to augment our standard\
    \ processes through automation (2). This, if done carefully and with a mind to\
    \ the future, can lead to enhanced data and understanding (3). This enhanced understanding\
    \ starts creating a virtuous feedback loop that can go back into augmenting existing\
    \ processes (2) but also into creating additional opportunities (4) and even new\
    \ processes (5).\n\n![../images/472369_1_En_11_Chapter/472369_1_En_11_Fig1_HTML.jpg](Images/472369_1_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1.\n\nThe AI virtuous process enhancment flow\n\n#### Start (and Evolve)\
    \ Realistically\n\nApplying new technologies always involves a high amount of\
    \ risk. It is not business as usual. You need to be able to absorb and react to\
    \ a lot of learnings, and things will not turn out as you would expect them. The\
    \ lean startup approach has made it popular for people to push to start with small\
    \ experiments (minimum viable products) that will test a key hypothesis before\
    \ committing additional resources. Overall, that’s a very sensible approach. The\
    \ crucial question, of course, is exactly how minimal a minimum viable product\
    \ can be. It has to be enough to give you information about whether it is worth\
    \ scaling the entire effort. If the product is too simple and too minimal, it\
    \ is not going to be useful.\n\nWith AI techniques we are in a very similar situation.\
    \ If you are attempting to deploy a prediction algorithm, you need to ensure that\
    \ you are giving enough space for people to prepare enough data and try enough\
    \ approaches to have a firm understanding of whether the problem can be solved.\
    \ Think of it as the equivalent of the escape velocity for a space launch. Engineers\
    \ know that unless a launch missile is able to develop a velocity of 25,000 km/h\
    \ it will not be able to escape the earth’s gravitational pull. If you know that\
    \ your investment in engineering will not be enough to surpass that minimum threshold,\
    \ you are better off spending that money elsewhere altogether.\n\nNow, recognizing\
    \ where that threshold lies requires a combination of experience and willingness\
    \ to have some false starts. As such, I believe that there are two key tests that\
    \ a plan must pass. The first is to ensure that the individual steps in the roadmap\
    \ have enough clarity that there can be some preliminary research into their feasibility,\
    \ and that no step is so big that if it fails there is no space for a change of\
    \ direction. The second is to ensure that each step is fed the appropriate level\
    \ of inputs, a sort of readiness gate that ensures you are doing enough for it\
    \ to be useful without doing too much. If coming out of one step you do not meet\
    \ the readiness gate to move into the next step, you can stop and reconsider."
  trans: "\n# AI 战略的实用方法\n\n> *“[战略是]将力量应用于最有希望的机会。”*\n> \n> ——理查德·P·鲁梅尔特，《好战略，坏战略》^(⁵⁶)\n\
    \n为任何事物制定战略都是一项极其艰巨的任务。你唯一能依据的信息是过去发生的事情。未来将要发生的一切，归根结底都是一种猜测。与 AI 技术的工作原理类似，战略依赖于你基于迄今为止所掌握的信息，建立一个关于世界如何运作的模型，并设计一套规则，使你能够对未来做出预测。然而，与\
    \ AI 目前能帮助我们解决的问题不同，你需要处理几乎无限多的变量。更糟糕的是，没有一种放之四海而皆准的解决方案。你必须制定适合你所在组织的战略，而最适合你团队的战略，几乎必然地，对另一个地方来说是不合适的。\n\
    \n因此，不存在一个能让你获得理想 AI 战略的单一秘诀。只有你自己知道真正的“食材”是什么。我能做的是讨论一般原则、准备方法以及具体的应用方法。就像厨房里的厨师面对一个神秘的食材盒子一样，你的任务是打开盒子，弄清楚你有哪些可用之物，并尽可能充分利用每一种食材。\n\
    \n## 原则\n\n战略的原则就像指路明灯，当基本事实没有明确指向某个选择时，帮助我们选择一条方向而非另一条。我在此提出的原则，是浓缩了与众多大小型组织的无数次对话，探讨了哪些方法对他们有效、哪些无效，以及哪些是值得关注的重点，哪些又是分散注意力的干扰项。\n\
    \n### 大处着眼，现实起步，适度扩展\n\n熟悉精益创业运动的人会在这个标题中看到该运动口号的影子。它通常是：“大处着眼，小处起步，快速扩展。”精益创业运动由埃里克·莱斯发起，他通过其著作《精益创业》^(⁵⁷)描述了一种拥抱不确定性、通过执行精心管理且成本有效的实验来测试商业模式可行性，从而将风险降至最低的商业方法论。这些实验旨在测试新功能或新产品背后最关键的核心假设，然后再将该产品扩展到全面生产。对于精益创业者来说，拥有一个宏大的长远愿景很重要，但要从成本不高的小实验开始，然后再尽可能快地扩展以获取市场价值。将\
    \ AI 技术应用于工作场所的战略，可以从同样的思维方式中受益。同时，有几点需要牢记——这也是我为何将这句口号改为“大处着眼，现实起步，适度扩展”的原因。\n\
    \n#### 大处着眼\n\n将 AI 技术应用于我们工作方式的潜力是变革性的。为了理解其真正的范围并赋予其适当的重要性，必须大处着眼。就像谷歌公开宣称其“AI\
    \ 优先”战略一样，关键在于赋予整个使命足够的重要性，以便人们能够重视并恰当地优先处理它。\n\n大处着眼也意味着要认识到，自动化不仅仅是“以更低的成本或更快的速度做更多同样的事情”。不要将企业中引入自动化等同于工厂流水线，在那里部件\
    \ A 可以以更快、更不易出错的方式连接到部件 B。通过 AI 实现的自动化还能开启全新的做事方式。它催生了新的商业模式。这是一个循环：自动化的需求导致信息和流程的数字化，而数字化又产生了更多可供进一步利用的信息，并最终带来全新的解决问题的方法。\n\
    \n例如，自动化支持处理不仅仅意味着你将需要更少的资源来处理相同数量的支持请求。它还意味着，随着每个支持请求被日益复杂的自然语言理解能力仔细分析，你可以更好地理解支持问题。由此产生的数据可以直接反馈到产品开发中，而产品改进的结果可以追溯到发布后通过支持渠道提出的问题类型。这意味着你可以将你的支持团队转变为客户成功团队，以完全不同的方式与客户互动。在支持处理中引入自动化，可以影响从产品设计和开发方式到客户关系管理的整个业务环节。然而，要充分发挥这项工作的全部效益，你需要一个宏大的愿景版本，以便在每个阶段设置正确的垫脚石，从而能够到达山顶。\n\
    \n图 11-1 展示了任何流程的这种流转。我们从拥有历史数据并理解自身流程的地方开始（1），然后通过自动化来增强我们的标准流程（2）。如果做得仔细并着眼于未来，这可以带来增强的数据和理解（3）。这种增强的理解开始形成一个良性的反馈循环，它不仅可以反馈到增强现有流程（2）中，还可以创造额外的机会（4），甚至催生新的流程（5）。\n\
    \n![../images/472369_1_En_11_Chapter/472369_1_En_11_Fig1_HTML.jpg](img/472369_1_En_11_Fig1_HTML.jpg)\n\
    \n图 11-1. AI 良性流程增强循环\n\n#### 现实起步（并逐步演进）\n\n应用新技术总是伴随着高风险。这不是常规业务。你需要能够吸收并应对大量的学习成果，事情也不会像你预期的那样发展。精益创业方法使得人们倾向于从小实验（最小可行产品）开始，在投入额外资源之前测试一个关键假设。总的来说，这是一个非常明智的方法。当然，关键问题在于，一个最小可行产品究竟可以“最小”到什么程度。它必须足以提供信息，让你判断是否值得将整个努力扩展。如果产品过于简单和微小，它将毫无用处。\n\
    \n在使用 AI 技术时，我们处于非常相似的情况。如果你试图部署一个预测算法，你需要确保给予足够的空间，让人们准备足够的数据并尝试足够多的方法，以便对问题是否能够解决有一个坚实的理解。可以将其视为太空发射的逃逸速度。工程师们知道，除非发射导弹能够达到\
    \ 25,000 公里/小时的速度，否则它将无法摆脱地球的引力。如果你知道你在工程上的投入不足以超过这个最低门槛，那么你最好将这笔钱花在别处。\n\n现在，认识到这个门槛在哪里，需要结合经验以及接受一些失败尝试的意愿。因此，我认为一个计划必须通过两个关键测试。第一个是确保路线图中的各个步骤有足够的清晰度，以便能够对其可行性进行一些初步研究，并且没有任何一个步骤大到一旦失败就没有调整方向的空间。第二个是确保每个步骤都获得适当水平的输入，这是一种“就绪门”，确保你做得足够多使其有用，但又不会做得过多。如果完成一个步骤后，你未能达到进入下一个步骤的“就绪门”，那么你可以停下来重新考虑。\n"
- fmt: '### Scale Appropriately


    We, of course, want to scale fast. A large part of the appeal of automated decision-making
    is that it can enable organizations to move much faster.


    However, it is precisely because of the ability of automation to scale quickly
    and the nature of the automation taking place that we need to be cautious about
    the speed at which we scale. Automation, in this case, depends on use of past
    data and knowledge to encode the rules of how a certain aspect of the workplace
    operates. The resulting software program is only as good as our own understanding
    of our problem and the data that we used. Before scaling from one thousand to
    ten thousand users, or from one geographical location to another, we need to ensure
    that the underlying assumptions remain the same. Rushing to scale an automation
    model beyond the confines of its test environment without checks in place to ensure
    that it is behaving as it’s supposed to can lead to unintended consequences, such
    as exhibiting bias in its decision-making or introducing errors that are hard
    to catch.


    ### Tangible Outcomes Matter


    An AI strategy, like any other plan, needs to take into account the wider environment
    within which it will develop. Too often anything new is cornered off and placed
    with an innovation lab where it will be studied and experimented on, but where
    it faces a hard time to see the light of day in the real world of the business.
    This is especially true of technologies like AI.


    Innovation labs are not, by default, a bad idea. Organizations that can afford
    to set up dedicated teams to experiment are lucky, and they should fully take
    advantage of the possibilities. The learnings of innovation, however, need to
    be put up against the cold, hard light of the real situation. You are not solving
    the entire problem unless you have dealt with the entire reality of it. It’s like
    saying you want to build a rover to explore Mars, but you only test it on your
    local neighborhood roads.


    An AI strategy that does not plan for how a technology is going to move from the
    cocoon of an innovation team to the actual business is not a complete strategy.
    This involves convincing stressed business units with day-to-day operational priorities
    that they should adopt new technologies. It involves ensuring that the solution
    brings measurable benefits that will make a difference to a division’s budget.
    It involves dealing with concerns of staff that they are going to be replaced
    by automation, and putting in place training programs to deal with the change
    in the way things are done. If those elements are not there, you have no real
    measure of the success of the effort.


    ### An AI strategy Is Not About AI


    This heading is counterintuitive on purpose.


    An AI strategy is not about using AI at all costs. I’ve seen enough companies
    get lost in trying to make AI work no matter what, that I feel this really needs
    to be driven home from the very start.


    As we said repeatedly in this book, AI is useful in helping us delegate decision-making
    to machines. Also, as we said in the intro to this chapter, AI helps us meet user
    needs and expectations. AI, however, is not a goal in and of itself. The objective
    is never and should never be simply to “use AI.” The goal of an AI strategy is
    to create the necessary preconditions and processes that will allow an organization
    to


    1. Determine whether AI techniques are applicable and can help solve problems
    in a better way.


    2. Ensure that the organization is in a position to exploit the opportunity, provided
    that AI techniques are applicable.


    It is perfectly OK if the outcome of the process is that the use of AI techniques
    is simply not a good idea for solving a specific problem.


    This is exactly what happened in a particular conversational AI project. The organization
    was looking to implement a chatbot to handle queries from clients who had issues
    with their travel documents while not in their own country. Effort went into thinking
    about what the appropriate language understanding solution would be to identify
    what happened to the travel documents (lost, damaged, stolen, etc.). However,
    when it came to understanding what the appropriate response should be for each
    type of problem, they realized that it was always the same. No matter what caused
    the issue, the way to deal with it always consisted of filling out the same form
    or getting in touch via phone for urgent cases. All the up-front effort in recognizing
    the cause of the problem was not required. This was a problem that could be resolved
    with improved information architecture on the web site, and did not require the
    use of any AI technology.


    ### There Is No “True” AI Test to Pass


    Similar to the previous principle, this one is a result of another common pitfall.
    When people embark on AI projects, one of the main concerns is to do something
    that is “real” AI. In many ways, it’s only natural to have this concern. We are
    dealing with new technologies with definitions that are incredibly fluid. People
    feel they need to ensure they are doing the “right thing” in the face of a lot
    of conflicting information. Whether hiring or looking outside for help, organizations
    want to ensure that they are not “cheated” with “fake” AI.


    The result often is that solutions to problems are overengineered, or perfectly
    suitable solutions are discarded because they don’t meet some unclear “AI” test.
    When dealing with virtual assistants, this often involves discussions around what
    is a sophisticated enough conversation that *feels* human-like. Simple, to-the-point
    conversations are replaced with open-ended conversations that would mimic natural
    language more in order to meet this human-like standard. With prediction algorithms
    and machine learning it is often about discarding advice that calls for the use
    of standard and well-established techniques from statistics in favor of techniques
    that involve the direct use of deep learning because deep learning *feels* like
    truer AI.


    The challenge with these issues is that they are hard to deal with. The end solution
    works. A problem has been solved. But it is a much more brittle solution because
    more AI technology was imposed than what was really required. Everyone feels excited
    because it feels more futuristic but, in reality, they are only setting themselves
    up for more pain as the solution evolves.


    A comprehensive AI strategy needs to include checkpoints where an honest discussion
    is had about whether the solution is the best one for the problem at hand, or
    whether it is simply a solution that satisfies the need to demonstrate the use
    of AI as opposed to reaping the true benefits of the technology.'
