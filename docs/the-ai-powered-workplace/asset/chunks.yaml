  trans: '

    # 基于智能体的 AI 视角


    视角具有强大的能力，能够定义你如何理解一个问题。从面向智能体的视角来探讨 AI，能让我们摆脱 AI 定义带来的诸多挑战，同时为我们提供一个坚实的概念框架来指引整个过程。


    描述基于智能体的软件工程的一个简单方式是：它是软件工程与 AI 的结合。它研究 AI 从业者如何构建软件，并试图识别出共同的特征和模式，从而为构建 AI 应用的实践提供指导。


    它关注的是智能程序（智能体）如何被构建，并提供了对单个智能体行为以及智能体之间交互进行建模和推理的方法。尽管本书并非专门讨论软件工程，但这些概念和抽象方法能帮助我们理解任何
    AI 技术，更重要的是，理解它可能对我们的流程产生的影响。


    采用基于智能体视角的一个关键原因是，我们可以考虑智能体*在做什么*，而无需考虑它*如何*做到。换句话说，我们不需要去探究智能体具体使用了哪种 AI 技术来完成其任务。很多时候，讨论会迷失在细节中，比如用了什么神经网络、什么统计技术、什么符号逻辑，更糟的是，用了什么编程语言，以及这算不算
    AI。这会导致形成关于什么是“真正”AI、什么不是的阵营。在这些情况下，“真正”的 AI 往往就是声称者最喜欢或最熟悉的技术，而其他一切则相形见绌。


    基于智能体的 AI 应用视角，让我们能够考虑应用***在做什么***，而无需关心它是***如何***实现的。


    虽然我们会探讨这些方法的一些基础知识，但总的来说，我们不应该关心问题是*如何*解决的。技术在发展，解决问题的方式也在变化。如果你关注 AI 的发展，哪怕只是间接关注，你很快就会发现，每天、每周、每月都有新的公告和令人惊叹的新架构出现。除非你是该特定子领域的从业者，否则试图跟上这一切是一场必输的游戏。


    我们应该始终区分*做什么*和*如何做*，并专注于对我们重要的方面。如果你在研究神经网络架构，那么用神经网络解决问题就是重要的方面。如果你只是想知道图片里有没有猫，最重要的方面是你能得到可靠的答案。如何得到答案是次要的。


    采用基于智能体视角的另一个原因是，我们实际上不需要定义智能。正如我们多次提到的，这本身就不是一件容易的事。如果每次讨论系统行为时，我们都被关于它是否真正智能的讨论所分心，那么我们将永远无法取得进展。相反，我们将专注于智能体试图实现的目标，以及它们与环境中其他部分（包括其他智能体）的交互。


    ## 智能体


    一本经典的 AI 教科书^(¹⁶)将智能体描述为“任何可以通过传感器感知其环境并通过执行器作用于环境的事物”。你可以把它想象成一个物理机器人（图 2-1），这有助于理解。机器人会使用传感器（摄像头、GPS
    等）来确定自己的位置和周围环境，并据此驱动其电机（执行器）以某种方式行动，使其更接近目标位置。关键在于，机器人*如何*决定向左或向右在这一点上并不重要。描述机器人试图实现什么目标时，无需知道从感知到行动的内部过程。


    ![../images/472369_1_En_2_Chapter/472369_1_En_2_Fig1_HTML.jpg](img/472369_1_En_2_Fig1_HTML.jpg)


    图 2-1. 智能体如同一个接收输入并产生变化的机器人


    当然，机器人以某种方式移动是因为它试图实现某个目标。它试图达成某种*理想的事态*，例如离开房间或搬运物体。我们将这种理想的事态称为它的*目标*。


    一个**目标**是环境中一种理想的事态——一种我们可以使用该环境的属性来描述的状态。


    目标对于定义智能体至关重要。它是驱动我们*做什么*的*原因*。机器人为什么向左转？嗯，它试图到达它左边的一个物体，等等。因此，就我们的目的而言，智能体的定义是：智能体是通过其能力来改变其所处环境，从而试图实现某个目标的事物。


    一个**智能体**是通过其**能力**来改变其所处环境，从而试图实现某个**目标**的事物。


    这种基于智能体视角的创始人，Michael Luck 教授和 Mark d''Inverno 教授，给出了一个概念性且有趣的例子来说明这一观点。在一篇题为“智能体与自主性的形式化框架”^(¹⁷)的论文中，他们用一个简单的咖啡杯作为可以成为智能体的例子。他们提出，在某些情况下，我们可以赋予杯子一个特定的目的（即一个目标），此时它可以被视为一个智能体。例如，当杯子被用来盛放液体时，它实现了我们想要一个地方放咖啡的目标。一旦它不再服务于这个目的，它就不再是我们的智能体了。


    在我刚开始自己的博士研究时，我就被这种关于智能体的观点深深吸引，正是因为它提供了一个坚实的立足点，并避免了模糊的定义。因此，我进一步深入研究了他们最初的框架，试图构建一种方法论，不仅帮助我们描述智能体系统，还能帮助我们构建它们。


    在我的工作中，我扩展了整体框架，增加了更多类别，使我们能够更容易地将软件描述为智能体。咖啡杯是我称之为*被动*智能体的一个例子。它是被动的，因为它对其试图实现的目标没有内部表征。事实上，是咖啡杯的*主人*认识到咖啡杯因其将液体保持在一个地方的能力而可以发挥有用的作用，也是咖啡杯的主人知道如何操作咖啡杯（倒入液体、保持直立、举起来喝一口）。


    被动智能体对目标没有内部表征。完全由用户来理解如何操作被动智能体的能力以实现目标。


    被动智能体是我们的基线。它是那种不采取任何主动行动的软件，除非我们明确开始操作它，否则它什么也不做。虽然这听起来像是一个几乎没有实际应用的理论概念，但它实际上描述了我们目前使用的大多数软件。大多数应用程序并不主动了解我们试图实现什么。它们向我们提供无数的菜单和子菜单、按钮和表单供我们填写，而我们需要自己去理解如何操作它们来实现我们的目标。设定这个基线，并将其作为描述当今大多数软件的起点，为我们描述由
    AI 技术驱动的软件提供了基础。

    '
- fmt: '### Active Agents


    Now, let us take it a step further. If we have passive agents, it means that we
    must also have active agents. Active agents are those that do have an internal
    representation of a desirable state of affairs. They are *actively* trying to
    achieve something. The simplest such agent could be a thermostat. A thermostat
    can sense the temperature of a room (perceives the environment) and switches off
    the heating when the desired temperature is reached (causes a change to the environment).


    An active agent has an internal representation of a goal and uses its capabilities
    to achieve that goal.


    Active agents put us on the path of the type of AI we are interested in, where
    we are delegating decision-making to machines. In this case, we are letting the
    thermostat decide when to switch the heating on or off in order to get to a desired
    temperature.


    “Hold on there,” I hear you say. “A thermostat is AI? I thought AI is about hard
    problems!?” That is a very sensible statement. Remember, however, that we are
    trying to build a framework that will help us deal with all sorts of situations
    without any vague assumptions of “complexity.” Do not get hung up on “hard problems”
    or “complicated situations.” Everything lies on a continuum, and we will get there
    in time. The important thing about the thermostat is that it perceives its environment
    and reacts to changes in the environment by switching the heating on and off.
    What helps it decide exactly when to react may be a dumb switch (`if room temperature
    greater than 25 Celsius switch the heating off`) or it could be the most finely
    tuned neural network model that has learned the percentage by which it should
    increase or decrease heat output so as to maximize energy usage while optimizing
    comfort. Remember, we don’t care about the how, just the what.


    From a business process perspective, the most valuable thing is that the task
    of managing the temperature has been delegated to an automated process. It is
    no longer required that a human being keeps checking on the temperature and, based
    on that, decide whether the heating should be switched on or off or the heat output
    increased or decreased.


    From a business perspective, active agents or active software indicates tools
    that we can delegate decision-making tasks to.


    This is perhaps the single most important lesson of this chapter. Deciding to
    use AI in a work environment is deciding to delegate a decision-making task to
    a software program. At its core it is no different than the decision most companies
    make without blinking about delegating key aspects of financial forecasting to
    spreadsheets or key aspects of resource planning to ERP (enterprise resource planning)
    software. In plain words, AI is a way to achieve automation. Where AI differs
    from a lot of the existing software is that it broadens the scope of the type
    of tasks we can automate. It does that because AI technologies allow us to build
    software programs that are increasingly better at identifying what the correct
    decisions are in scenarios where it was not previously possible.


    The introduction of AI in a work environment is the process of identifying what
    decisions can be delegated to a software agent.


    When we introduce AI in an environment, we introduce software agents that make
    decisions in an automated fashion. In this section we talked about the thermostat
    acting as an active agent and how it could either be a very simple device or a
    more complex system. The agent is moving toward the same goal (regulate temperature)
    but with differing capabilities. We call the ability of an agent to vary how to
    employ its capabilities to achieve a specific goal *self-direction*.


    ### Self-Directed Agents


    To better understand self-direction, let us consider the notification system on
    our phones. You can conceptualize it as a software agent whose task is to receive
    a notification (input from the environment) and pass that message on to you (effecting
    change in the environment that achieves its goal).


    A simple version of this notifier agent is one where every time a message reaches
    your phone (for any application on your phone) it simply gets displayed on the
    screen. That is it. I am sure most would agree that as far as AI goes, this is
    definitely on the lower end of the spectrum.


    Now consider an agent that, when the message arrives to your device, refers to
    your notification preferences, considers your current context (e.g., is it past
    a certain time, are you at a certain location, what type of message is it, who
    is sending the message?). Based on all of that, the agent decides the most appropriate
    course of action (e.g., show on screen, play a sound, show message on a different
    device like a watch). Hopefully, you agree that there are plenty of opportunities
    for “intelligent” action in this scenario. There is an active consideration of
    the situation, which can lead to a number of different outcomes.


    Both agents serve the same purpose. Namely, notify the user of messages. Some
    agents, however, may perform the same action irrespective of current or past behavior,
    user preferences, or context. Other agents make a number of decisions and have
    a number of choices as to how to achieve their goal. The software program stops
    being a dumb pipe and turns into an active participant in the process. That is
    why we call this ability to vary action and outputs based on internal decision-making
    *self-direction*.


    Self-direction is the ability of an agent to vary the ways in which it achieves
    its goals.


    The more self-direction we require of an agent, the more AI techniques we will
    need to employ to achieve it. We need the ability to reason about the world, review
    potentially large amounts of data, and decide which action to perform based on
    all of that.


    Even then, it is not a simple on/off switch. Now you have AI; now you don’t. Everything
    lies on a continuum, as Figure [2-2](#472369_1_En_2_Chapter.xhtml#Fig2) illustrates.
    The more complexity we introduce into this decision-making process, the more contextual
    and historical information we need to take into account, and the more AI techniques
    we will have to use.


    ![../images/472369_1_En_2_Chapter/472369_1_En_2_Fig2_HTML.jpg](Images/472369_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. The self-direction continuum


    What is essential at this point is to appreciate that from a certain high-level
    process perspective, it is not a question of differing levels of complexity. From
    a process perspective, the task has simply been delegated to a software agent.
    There is a piece of code that is responsible for notifying us when a message arrives.
    We have delegated that decision-making to software, either through explicit rules
    and our preferences or through more probabilistic reasoning based on context and
    past behavior. The question then becomes what level of self-direction is necessary
    from this software in order to perform its task efficiently and usefully for us.


    AI is the process of identifying and coding decision-making skills into software
    programs so that they can effectively carry out the tasks that have been delegated
    to them.'
