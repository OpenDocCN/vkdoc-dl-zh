    # Part III: Building Your AI-Powered Workplace


    ## 10. From Data to Understanding


    In 2015, Margaret Sullivan penned a great column for *The New York Times* titled
    “Awash in Data, Thirsting for Truth.”^([^(50)](#fn50)) The column asked the question
    of how important is data to news reporting and to what extend can it obscure or
    reveal the truth? The answer, as you might expect, was not clear cut.


    Lack of data when reporting may lead to people claiming that your story simply
    does not have the necessary “hard” proof. A focus on narratives of how individuals
    were affected by events personalizes the story and makes it more compelling and
    heartwarming. However, such narratives are not necessarily an indication of a
    larger trend or the experience of the majority.


    Overly relying on data may not reveal the entire story either. Instead, it can
    be accused of ignoring smaller but still very serious issues. In addition, the
    way you use your data to tell a story may lead you to entirely wrong conclusions.


    These are the exact same questions and issues that we have in organizations when
    trying to define our path from data to understanding.


    Despite the possible pitfalls, over the past 15 years we have collectively become
    obsessed with data. This data-centric thinking is largely a product of Silicon
    Valley companies, with the likes of Google leading the charge. The classic anecdote
    that symbolizes their reliance on data is how Google ran an experiment to collect
    data on what shade of blue (out of 41 candidates^([^(51)](#fn51))) would be most
    appropriate for a button. A designer who left Google because of these types of
    behavior said it was an indication of the lack of appreciation of intuition and
    creativity, necessary preconditions for innovation in design.^([^(52)](#fn52))


    Data-driven AI techniques have only exasperated the issue and strengthened the
    argument of those who call for every decision to be data driven. A favorite statement
    to throw around in these data-obsessed times is that data is the new oil.^([^(53)](#fn53))
    It should be treated as a commodity that an organization drills for, extracts,
    transforms, and uses to generate value for itself. Thankfully, at the same time
    there are more balanced voices that caution us to not adopt such a data-centric
    view of the world. In this chapter we are going to follow that more balanced approach
    to how we can think of data within an organization.


    The aim of this chapter is to provide some starting points and useful strategies
    about how to think of data in your own organization. Despite voicing concerns
    about overly relying on data, I strongly believe that data is crucial. It is a
    valuable resource and we need to treat it as such. We should always, however,
    question and challenge the notion that data is valuable *intrinsically*, outside
    of a specific context and purpose. This will ensure that what effort we put into
    data management and curation is directed and efficient.'
