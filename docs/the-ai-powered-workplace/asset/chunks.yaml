    协作的另一个方面是交换相关文档。像`Slack`这样的工具使这变得极其容易，因为它们允许您直接将文件拖放到对话流中，并附带一条消息。现在，有人可能会说这有点过于简单了，我可以证明它有时会变得多么混乱。想象一下，您正在处理一个文档并与团队讨论，而新版本的文档不断被丢入对话流中。要跟踪您应该关注什么，会变得很累。以这种方式共享文档的理由是，文档是对话和工作的一部分，因此您可以将所有内容保持在上下文中。对话式协作平台的承诺是，搜索和集成将能够再次将这些文档呈现出来。


    确实，已经取得了一些进展。例如，`Slack`与`Google Documents`有一个非常有用的集成。当您共享一个`Google`文档时，您共享的不是实际文档，而是指向当前版本文档的链接，这至少消除了您是否在处理最新版本的问题。然而，问题在于，当您随后进入文档时，您会发现文档内部正在进行另一场对话！`Google
    Documents`允许用户在`Google Documents`内交换评论和聊天。所以现在您有两场对话在进行。一场在`Slack`中，可能没有直接处理文档的人说了一些有趣的话；另一场在`Google
    Documents`中。这显然不是一个理想的情况。


    总的来说，我还没有看到一个真正解决了如何妥善处理这个问题的应用程序。我们正在处理不同的协作工具以及可能不同的协作模式。有时我们共享文档链接，而有时我们共享文档本身。这些文档和链接成为对话的一部分，但搜索并不总是能有效地找到我们真正需要的内容；虽然集成可以提供帮助，但它们也可能增加复杂性。


    规范可以再次在这里提供帮助，因为团队可以明确他们应该如何工作。然而，这绝对是一个需要更多工作的领域，以提供我们真正需要的协作空间。看看像`Dropbox`这样的工具是很有启发性的，它们现在也提供了一个协作环境，但一个更加以文档为中心的环境（因为这是它们的传统）。最终，我们应该看到对话式协作平台发展，以封装一个对文档更友好的工具集。


    ### 搜索

    跨人员、对话和文档的搜索可以将所有内容联系在一起，这是任何对话式协作平台的关键功能。知道您可以依赖强大的搜索是令人解放的，因为它鼓励更高水平的分享和参与，因为人们相信他们能够再次找到这些信息。


    当前的搜索能力令人印象深刻。例如，在`Slack`上，您可以创建一个搜索，查找在“2019 年度会议规划频道”中由`Tim`或`Mariola`在特定日期范围内共享的、且包含关键字“`Sponsors`”的文件。响应速度几乎是即时的，结果质量也很高。


    然而，尽管这类搜索功能强大，但它们也需要用户投入精力并集中注意力来构建。用户很容易在众多选择中迷失，或者忘记哪些组合是可能的。总的来说，虽然搜索已经非常有用，但仍有很长的路要走，并且（毫不意外地）这是人工智能技术的进一步应用将使我们取得进展的主要领域之一。


    最终，我希望看到更加对话式的搜索，并且能够从单一位置访问多个不同的文档来源。它应该更加对话式，这样我们就可以以与我们思考相同的方式进行搜索，而不必调整我们的思维以适应工具提供的过滤器和选项。我们应该能够使用自然语言来描述我们需要的，并依靠对话式应用程序的组合来帮助我们浏览可能的选项。它还需要考虑到信息分布在许多不同的地方，从我们的电子邮件到我们的文档存储库以及我们的对话式协作平台。我们需要从平台到外部世界的路径，以便将所有内容连接起来。

    '
- fmt: '#### Integrations


    So far, we’ve talked about collaboration environments as the place where a team
    discusses issues and make decisions. Integrations with the outside world means
    that these same collaboration environments can also become the place within which
    actions are performed and change is affected.


    Let us take one simple task and consider how different it can look with and without
    integration. The objective is to know when someone has asked for some vacation
    time and approve that request, reject it, or ask for more information before making
    a decision.


    Without integration in your collaboration space, you are hopefully going to get
    that notification via e-mail or the eager colleague, who knows you only check
    e-mail a few times a day, will message you to say that they’ve put in a request.
    After all they are anxious to get an answer so that they can continue planning
    their vacation! Once you do see the request, you will likely head to your browser
    and log in to the HR software (hopefully it is single sign-on; otherwise you will
    need to retrieve the password and do a 2-factor authentication). Finally logged
    in, you start clicking around a bit to figure out how to get it approved. Eventually
    you get there. You then realize that you are going to have to check in with a
    couple of people. Other e-mail chains are fired off and you have the mental load
    of ensuring you check in time, connect all the pieces together, and eventually
    make a decision. Now you have to remember what it was you were actually trying
    to do before this entire process started and get back to that.


    With integration you will get a message in your conversational collaboration environment.
    You immediately know that it is about a vacation request since it is coming for
    `VacationBot`. The message contains all the information you need, and you can
    click “Approve,” “Reject,” or “Discuss.” Clicking “Discuss” creates a private
    channel and drops both you and the person requesting time off into it. There you
    can quickly ask a couple of planning questions and perhaps invite anyone else
    who needs to have a say. The entire conversation, with the relevant participants,
    is in one place. Eventually satisfied, you click “Approve” and the channel the
    discussion happened in and the bot go away.


    Integrations can be incredibly powerful and can transform the collaboration tool
    into a full-blown operating system for how you run your organization. All the
    main messaging collaboration environments provide dedicated app stores where you
    can find a very wide range of applications and integrations.


    These types of applications are what I call conversational applications and they
    are the focus of Chapter [9](#472369_1_En_9_Chapter.xhtml). There is just one
    other type of conversational platform that I would like to discuss before though.


    ## Custom Conversational Platforms


    So far, we’ve talked about conversational platforms with the underlying assumption
    that we were dealing with software that came from large technology companies (such
    as Slack, Microsoft, or Facebook). Before we move on, it’s important to note,
    however, that conversational platforms can come in a variety of sizes and shapes.
    They can range from platforms that focus on specific verticals (e.g., finance,
    health) to fully customizable conversational platforms developed for the unique
    needs of a particular organization and application.


    An industry requiring a different approach is the finance industry. Traders, just
    like any other profession, can benefit from instant messaging and collaboration
    but require a degree of security and conformance to regulations that goes beyond
    what most industries require. This has created the conditions for a thriving vertical
    of messaging applications that specifically cater to the finance industry. Tools
    such as `Symphony`,^([^(44)](#fn44)) offer the required level of security coupled
    to features such as appropriate audit paths, trusted identify management across
    organizations, and data ownership.


    Similarly, given a large enough problem, it might also make sense to build a completely
    custom conversational collaboration platform from the ground up. As part of work
    that my team has been doing for the accountancy firm BDO, we built a custom conversational
    collaboration platform precisely because it is only through a customized tool
    that we could tackle the problem.


    ### Conversational Tools for Audits


    The problem that BDO was looking to address was how to streamline their audit
    process. Expert auditors from BDO interact with the client over a long period
    of time, and data is gathered from a number of different sources in order to complete
    the audit. While there was some tooling available to help with the process, such
    as a shared document store, ultimately it involved a lot of ad hoc back and forth,
    e-mails, and placed considerable demands on the entire team to coordinate so as
    to avoid confusion.


    After some initial experimentation we decided that the best course of action would
    be to build a dedicated tool that would allow audits to be designed and completed.
    The tool is a conversational collaboration platform in that it allows the auditors
    and the auditees to exchange messages during the audit process, with specific
    groups set up to handle the different aspects of the audit. All the audit information
    is collected in appropriate ways through the application (with custom forms and
    fields). In addition, an automated tool—a conversational application—acts as the
    coordinator, providing proactive and reactive support to both auditors and auditees
    as they are going through the process. It can react to requests for help (e.g.,
    “how should I be handling VAT in this region?”) but it can also proactively offer
    suggestions based on the type of data that is entered. The overall platform also
    interfaces with other BDO systems so as to streamline the transfer of data.


    The end results were


    *   A much more user-friendly audit process, which leads to higher quality audits

    *   A much better understanding of audit data, as it is collected in a structured
    way

    *   Complete control and security over audit data through a wholly-owned platform

    *   The opportunity for BDO to capitalize on the advantage of having lowered the
    overall effort required to complete an audit while increasing the reliability
    of the audit itself


    Building a custom chat application from the ground up is not an unrealistic proposition,
    even for smaller organizations. If you feel that there are enough benefits to
    be gained from completely controlling information flows and behavior on the platform,
    then it is possible to combine a number of different existing technologies in
    order to create an environment that is within your control and entirely owned
    by your organization.'
