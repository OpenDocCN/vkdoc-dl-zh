- fmt: '### Reinforcement Learning


    Finally, we come to reinforcement learning, the fun cousin in this trio of machine
    learning approaches. Reinforcement learning is the closest to how one would intuitively
    think of training and learning in nature.


    When we are training our pet to do something such as coming when called or sitting
    when instructed to do so, we don’t present it with lots of correct and wrong examples
    of what coming or sitting looks like! Instead, what we do is try to coax the pet
    into doing what we would like it to do and once it does it, reward the pet heavily.
    This rewarding reinforces that this is the correct behavior. We keep repeating
    the process until the pet clearly associates the specific command like “Come,
    Max!” to the reward and ultimately the desired behavior. Similarly, and hopefully
    very thoughtfully, when a wrong behavior is identified we punish the pet (ideally
    with not much more than the use of a firm voice or a sharp look). This teaches
    the pet what the undesired behaviors are, because they will lead to punishments
    and not rewards.


    These are the principles that reinforcement learning takes into the digital world.
    The usual setup is that some sort of environment is defined in which an agent
    can act, and the environment designer provides punishments or rewards when desired
    states are achieved. There is a wide variety of approaches researchers can take
    in training an agent, such as constantly providing feedback or simply providing
    a reward (or a punishment) at the end of a game. For example, you can have an
    agent playing chess, teach it nothing about how chess actually works (other than
    how it can move the pieces) and only provide feedback at the end of a game. The
    fact that the agent can run through millions of games means that eventually it
    might just stumble on an interesting chess strategy that leads to winning even
    though it started out with no knowledge of the game.


    The big moment for reinforcement learning came when Google managed to build a
    system, `AlphaGo`, that defeated the world champions in Go. Go is considered a
    much harder problem to solve than chess, since there are many more states that
    the agent can find itself in, making constant calculations and searching for the
    next optimal move an almost intractable problem. As such, after IBM’s `Deep Blue`
    conquered chess, many AI researchers turned their sights on Go. Ultimately, the
    team at Google DeepMind won. They used a combination of supervised learning and
    reinforcement learning to train deep neural networks alongside novel search strategies^([^(25)](#fn25))
    to deliver the winning approach. Interestingly, this combination of techniques
    meant that `AlphaGo` was able to be much more “strategic” than `Deep Blue`, which
    relied on more brute force techniques of evaluating all possible outcomes of a
    game from a specific position. In addition, `AlphaGo` discovered the correct ways
    to play through supervised and reinforcement learning, rather than having more
    explicit evaluation functions provided to it.


    Reinforcement learning is still very fertile ground for artificial intelligence
    research and there is much for us to discover. While winning at games such as
    Go is about going after the grand challenges of AI research, there are very practical
    applications across a number of industries from robotics to manufacturing, transport,
    trading, and more.


    ### Deep Learning and Artificial Neural Networks


    Deep learning (DL) and artificial neural networks (ANNs) are terms that are mentioned
    heavily within the context of AI, so it is worth providing some clarity here as
    to exactly where they fit and what they are. To start with, let us clarify that
    ANNs are a way to achieve mostly supervised or unsupervised learning. There are
    several other ways to achieve that, but ANNs are the most exciting area of development
    and the source of much progress in recent years.


    The fundamental premise of ANNs is that the way to reach a decision is by feeding
    data into a network of “neurons” connected in layers.^([^(26)](#fn26)) Each neuron
    accepts an input, which it processes via an *activation* function associated to
    that input (an equation that, given a number of inputs, will give us an output)
    and will then fire off a subsequent input to the neuron or neurons it is connected
    with in the next layer along a weighted path. See Figure [4-1](#472369_1_En_4_Chapter.xhtml#Fig1).


    ![../images/472369_1_En_4_Chapter/472369_1_En_4_Fig1_HTML.jpg](Images/472369_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. Single artificial neuron


    Each layer, broadly, specializes in identifying some feature of the input information
    and that information is fed forward to subsequent layers. There may be any number
    of neurons and layers internally, but it will all eventually lead to an output
    layer where the final set of neurons that gets activated will provide us with
    the answer. See Figure [4-2](#472369_1_En_4_Chapter.xhtml#Fig2).


    ![../images/472369_1_En_4_Chapter/472369_1_En_4_Fig2_HTML.jpg](Images/472369_1_En_4_Fig2_HTML.jpg)


    Figure 4-2. Artificial neural network with multiple hidden layers


    When we train an ANN, we are using a training model to manipulate parameters (or
    biases) associated with individual activation functions on each neuron, as well
    as on the connections between neurons, until the final layer starts providing
    the desired results. The way these parameters change after each training cycle
    and how it all leads to a good result in the end is what DL experts focus on.


    DL is a catch-all term for techniques that use ANNs, typically in heavily multilayered
    architectures where layers can be connected both forward and backward and where
    multiple architectures can combine to form a whole.


    The main advantage of DL techniques is that they significantly reduce the need
    to identify what features one should input into the ANN in order to train it.
    For example, if you are trying to train a model to correctly recognize a face,
    you might start by decomposing objects in an image into basic geometric shapes
    and input that information into an ANN. With DL, it is the network itself that
    will do the work. We just input all the raw data: the value of every single pixel
    in the image. The ANN will extract its own features based on its architecture
    and the training data, with each layer “learning” a feature and the subsequent
    layers aggregating those features into higher level concepts.


    However, and here is the catch, we need *a lot of data* in order for appropriate
    features to be discovered. Furthermore, the resulting network is very opaque to
    us. We do not know exactly what it decided to “focus” on in order to classify
    an image or part of an image as a cat rather than a dog. In fact, AI literature
    is littered with fun examples of how ANNs can get it wrong or focus on just a
    very small number of features that lead to very brittle solutions. This is why
    input data is very important. For example, suppose you want to distinguish between
    different objects, say cars and bicycles. If all the pictures of cars you show
    your ANN are of cars in a city, whereas the bicycles are in the countryside, your
    ANN is likely not going to work if you show it a car in the countryside. It is
    just as likely to use the appearance of multiple trees or lots of green as an
    indicator that something is a bicycle as it will use features of the object itself.'
