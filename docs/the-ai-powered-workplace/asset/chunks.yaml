- fmt: '# Planning for Conversational Applications


    Considering a conversational application across different dimensions gives us
    a way of framing and scoping the problem. We can then better identify what methods
    and tools we will need to solve it. We’ll look at five different dimensions and
    the impact these can have on the application.


    ## Capabilities


    The first aspect to consider is what our conversational application needs to do.
    On one end of the scale we have applications that focus on a single task. For
    example, a bot that only helps us to approve or reject vacation requests. On the
    other end we can have applications that behave more like a Siri-like general assistant.


    Specialized bots can narrow in on the range of possible interactions and provide
    more robust behavior. They can keep driving the user toward the appropriate outcome
    because there are only a few possibilities. More generic assistants, instead,
    have a challenge just in trying to understand what specific activity the user
    is trying to complete (as we’ve probably all experienced with something like Siri
    or Google Assistant when we wanted to play a song and instead it thought that
    we wanted to call a contact). The intelligent assistant approach is attractive
    when you can see more benefits from providing a single entry point, which is what
    makes them so popular with the large technology companies.


    If you consider Alexa in this context, you can see its hybrid approach. The keyword
    Alexa wakes up the general assistant that then, based on what was said, will activate
    a specific *skill*. Once you are in a skill, however, you are interacting with
    a single bot that is potentially coming from a provider publishing their *skills*
    in the Alexa ecosystem—just like an app creator publishes an app on the Google
    Play store or the iOS store.


    ## Interaction Style


    As we discussed earlier, the interaction style of our conversational application
    can be quite important. Are we looking to support fully open-ended interactions?
    To what purpose? Is that helping our users to complete a specific task? If a user
    is trying to describe a complex problem, allowing them to describe that problem
    in an open-ended way can be amazingly powerful. It is the thing that differentiates
    conversational applications from glorified interactive voice response systems
    (IVRs). Everyone hates those because they are simply forcing us to navigate through
    an endless tree of choices. However, when our application needs specific answers
    and the user doesn’t actually have wide choices, pretending that they can interact
    in an open-ended way is as annoying. If the only thing a user can say is “yes”
    or “no,” it is pointless to make them think that the possible interactions are
    more open-ended.


    ## Dealing with Complex Problem Descriptions


    A conversational application we worked on at GreenShoot Labs had the task of helping
    victims of cybercrime to recover from the attack. The aim of the chatbot was to
    attempt to understand what type of attack the user experienced and, if successful,
    provide appropriate remedies. Initial designs of the conversational application
    centered on complex conversational flows wherein we were asking users a number
    of different questions to attempt to collect all the pieces of information we
    needed in order to identify the attack. All those approaches made the interactions
    too complicated for users. In the end, we decided to ask them to do the simplest
    thing: “Describe to us what happened.”


    This way, the users can recount their story just as they would say it to anyone
    else, and the application then uses natural language processing and a knowledge
    graph of cyberattack information to identify the attack. It can also ask clarifying
    questions of the users if the attack type is not immediately clear. This way,
    the hard work is not passed back to the user by having them answer lots of different
    questions. Instead, it is the machine that needs to up its game and handle a more
    complex textual description.


    The rest of the interactions with the application, which lead the user to the
    appropriate guide to deal with the attack and collect feedback, are all structured.
    By combining open-ended interactions where needed and structuring the rest of
    the conversation, we are able to keep a focused path through the application and
    ensure that the user is always clear about where they are in the process.


    ## Context


    Context is essential for automation. From a user experience perspective, if people
    feel that the application does not “get it” they will quickly abandon it. “Getting
    it” in this case involves making those connections that depend on contextual information
    and lessen the amount of information we have to explicitly input in an application.


    Imagine having to use a car-sharing application in which you can’t simply plug
    in the destination; where you also need to explain where you are currently; and
    where you have no way of knowing whether the driver is on their way. Payment wouldn’t
    automatically happen. Yes, I realize that is exactly how taxis used to work! All
    the things that we enjoy about modern car-sharing applications are a result of
    that application using contextual information to make the task simpler for us.


    If users are made to jump through hoops just because applications don’t have access
    to information that is considered readily available (e.g., calendar availability)
    they will, rightly so, not see the benefit in using a conversational application.


    When talking about new products, especially in the context of startups, we often
    talk about *minimum viable products.* What is the minimum set of features that
    should be covered for the product to provide value to the user? When you are dealing
    with automating processes, you can transform that concept into a *minimum viable
    automated process*. How much of a process are you automating, and is that offering
    real value to the user?


    For example, consider a conversational application that is supposed to help users
    find a common time to meet. The application does a great job going back and forth
    between users to find that time, but it does not integrate with the calendar in
    a way that it can actually create the meeting. The application is released and,
    to your disappointment, after some initial usage you find that people stopped
    interacting with it. Investigating further, you realize that the calendar app
    provides a less powerful but still useful way of comparing everyone’s calendar
    and finding an appropriate meeting time. Since people had to bring up the calendar
    app anyway to insert the meeting, they just preferred doing everything there.


    As such, it is important to consider what the application will need to “know”
    or “do” in order for it to be able to really solve a problem and offer value.
    Thinking about the minimum viable automated process and the contextual needs of
    your application in order to achieve that can save considerable delays and disappointment
    further down the line.'
