    are more likely to outlast any specific technique, architecture, or tool.


    We will take a broad view, starting from the fundamental question of what any
    AI technology would need, and present a framework that divides things into techniques,
    capabilities, and applications and allows you to navigate between those three
    different areas and draw connections, to help you make better informed choices.'
  trans: '

    ### 智能体社区


    为了完整性起见，我们还需简要考虑多个相互交互的智能体。这是自动化中一个不常被讨论但至关重要的方面。没有任何问题能由单一软件独立解决。为了实现目标，我们始终需要与其他组件进行交互和集成。这一趋势只会持续加速。


    在短期内，更可能出现的情况是，一个自主软件（例如，你手机中类似 Siri 的助手）将与被动服务进行交互（例如，使用时刻表 API 来了解下一班列车何时到达）。然而，我们有理由相信这种情况将会改变。我们终将迎来这样一个时代：多个自主软件程序将在我们的日常生活中定期交互，并为我们做出决策。到那时，我们不仅需要处理单个智能体如何做出决策，还需要关注多个智能体之间会产生怎样的*涌现*行为。


    这可能是一群自动驾驶汽车在道路网络中自行分布，也可能是两个会议预约智能体根据其主人的日程进行协商。回到我们之前的健康管理示例，假设存在一个智能体社区，其共同目标是“让员工在公司内部增加互动”。然而，每个智能体都有不同的能力和动机。其中一个智能体是社交智能体，特别关注社交活动；而健康智能体则更关心帮助用户在工作和生活中保持健康的生活方式。社交智能体可能会建议用户少去一次健身房，将这段时间用于更具社交性的活动。健康智能体则必须权衡此建议的利弊。它们甚至可能进入协商，以决定如何解决这个问题。最终，它们可能会决定安排一场网球比赛，同时满足社交和健康需求！


    基于智能体的计算领域的大量研究，都聚焦于如何让智能体协调合作以共同解决问题，以及我们如何推理一组智能体的行为。交互的智能体类型越多样化，问题就可能变得越复杂。


    ## 超越智能


    在本章中，我们探讨了人工智能（AI）的概念本身，举例说明了将其局限于单一定义所面临的挑战，并区分了通用人工智能和特定领域人工智能。


    随后，我们引入了基于智能体的计算，将其作为思考 AI 的概念基础，重点关注可观察的行为，而非用于创造这些行为的具体技术。这一基础使我们能够考虑手头的任务——将决策权委托给机器——而无需明确提及智能的概念。超越模糊的智能概念，有助于理清思路。


    同时，我们在此介绍的基于智能体的视角需要一些时间来消化。请找一个你认为属于 AI 的应用示例，并尝试从智能体的角度对其进行分类。它试图实现什么目标？它使用了哪些信息？它能做出哪些决策？它在多大程度上能自主地促成改变？它是否与其他应用交互？它以何种方式交互？


    我发现这类练习对于开始推理问题，以及评估我们在多大程度上真正下放了决策权和实现了自动化，极为有用。你越能熟练地通过这个视角分析问题，就越能与 AI 从业者有效沟通，说明你希望看到什么结果。


    你的业务目标几乎不可能是构建一个使用最新神经网络架构的应用。^(¹⁸) 更有可能的是，它会根据你在工作中遇到的具体问题来定义，并与如何改进工作方式的明确目标相关联。这才是我们最关心的*是什么*。诸如主动与被动智能体、自我导向和自主性等概念，帮助我们跨越不同领域，清晰地把握这个“是什么”。接下来才是*怎么做*，这将是接下来几章的主题。


    脚注 1   2   3   4   5


    # 3. 构建 AI 驱动的应用


    构建一个 AI 驱动的应用意味着什么？在上一章中，我们开始围绕 AI 软件可能表现出的行为类型来塑造我们的思维，例如主动达成目标和自主设定目标。然而，我们并未讨论这些行为是如何实现的。我们有意没有提及任何具体技术。技术当然很重要。但技术也在不断变化。这就是为什么能够在不依赖特定技术的情况下思考
    AI 应用至关重要。同时，我们也需要能够考虑可能需要哪些技术，以便做出明智的选择。本章开始为此奠定基础。它将更深入地探讨 AI 驱动应用是如何构建的，并试图以一种希望任何人都能理解的方式来阐述。


    AI 是一个发展极其迅速的领域；今天的流行语和趋势未必是明天的。我们可以深入探讨最时髦的机器学习技术，讨论最新自然语言处理发展的细节，或者花无数时间研究最热门的视觉发展成果。但这将是一场必败之战。当这本书到你手中时，这类讨论的内容可能已经过时了。因此，我们将聚焦于一些更有可能比任何特定技术、架构或工具都更持久的基础核心概念。


    我们将采取一个广阔的视角，从任何 AI 技术都需要解决的基本问题出发，并呈现一个框架，将事物划分为技术、能力和应用。这个框架能让你在这三个不同领域之间导航并建立联系，从而帮助你做出更明智的选择。

    '
- fmt: '# What AI Needs


    In the previous chapter we referred to AI as the process of delegating decision-making
    to machines. Let’s work through an example in this section to uncover what it
    is we might need in order to achieve such delegation.


    You have been tasked with introducing automation to your company. A review has
    taken place, and it has been decided that it would be worthwhile to automate the
    process of evaluating expense claims submitted by employees. Software is now to
    decide whether the claims should be accepted or contested. It is a task that the
    finance team hates, but it is necessary to ensure that expenses are kept in check
    and only the right things go through. You don’t know how to get started, so you
    decide to go talk to the two people in the finance team who deal with this activity.


    The first person you talk to, let’s call her Mary, says that they have a very
    precise process they follow. Mary looks at each incoming receipt and categorizes
    it as travel, entertainment, education, etc. Mary then considers the totals spent
    as well as the individual line items and cross-references those to what the person
    submitting the receipt was supposed to be doing at the time, as well as any rules
    surrounding their and their team’s maximum spending levels across categories.
    If all rules pass, Mary will approve the expense.


    The second person, let’s call him Donovan, stands back in amazement upon hearing
    that description and says: “Wow! That is incredibly thorough, but I find that
    the rules change so often or are so unclear that I can’t keep up. What I do is
    size up the person submitting their expenses and make a quick judgement call about
    their overall reliability and the overall amounts that come in. I also keep a
    record of who tends to have complaints at year-end audits about their expenses
    or not. If they generally don’t cause trouble and I think they are reliable, I
    just assume that they are doing the right thing. If they tend to get into trouble
    often, I will push back and have them double-check themselves, just in case.”


    “Hold on!” says Mary in shock. “But that way you can end up doing duplicate work
    or wrongly categorizing things.” “Yeah, I won’t lie,” answers Donovan. “It can
    happen and some people will complain, but I save so much time not worrying about
    every little detail that it all ends up being efficient in the end.”


    You go away and think about what you’ve heard. Mary has a very precise set of
    rules that she applies and can exactly explain how every decision is reached.
    Donovan seems to depend on past data and past behavior to make a quick determination
    about whether they should investigate further or not. While Donovan might miss
    a few things or end up with some duplicate work, the overall result is very efficient.
    Mary relies on having a clear as possible understanding of the governing rules
    at any given moment, while Donovan feels the rules are never clear enough, so
    he instead relies on the data going in (expense claims) and out (audit results)
    to make judgement calls.


    Where does this leave things in terms of how you could build your automated system?
    It needs to make decisions. That much you are sure of. It seems that you can either
    explicitly list all the rules, like Mary does, or you can somehow teach it to
    look at past data and use that to base its decisions on, like Donovan does. Your
    AI system needs a way to make a determination, based on some inputs, about what
    the appropriate outputs are. It needs a way to reason about the world, but it
    turns out there are different ways of doing this.


    Well, you are in good company. This is exactly the conundrum that AI researchers
    have been grappling with for decades. The first approach is what we would describe
    as a model-driven approach. There is a clear model of how the world behaves, with
    explicit rules and regulations that govern it. We collect all the data input points,
    pass them through our set of rules, and make a determination. The second approach
    is a more data-driven approach. It recognizes that often we simply can’t explicitly
    list all the rules. All we know is what data went in and what data came out of
    the system, and we attempt to build programs that replicate that input/output
    relationship. We will not be able to explicitly articulate exactly why an expense
    was accepted or contested, but we trust that data will guide the way.


    There is, perhaps, a third way to solve the expense claim problem. We could use
    a combination of the two approaches that tries to benefit from the efficiency
    of the data-driven approach while retaining the clarity and reliability of the
    model-driven one. Before we look at how we might do that, though, let us explore
    model-driven and data-driven AI a bit further.


    ## Model-Driven and Data-Driven AI


    There is any number of borders one can draw around AI work. From formal logics
    to statistics, evolutionary or emergent behavior approaches, and the wild and
    crazy world of deep neural nets, the ways you can describe and combine AI technologies
    are endless. Perhaps one of the most important and long-lasting distinctions,
    however, is that between data-driven and model-driven AI.


    ### Model-Driven AI


    Model-driven AI describes techniques that depend on explicit descriptions of a
    domain, the relationships between entities in that domain, and the rules that
    govern the overall behavior.


    This approach is particularly relevant when a domain requires deep expertise that
    can be expressed in definitive rules. One example of a model-based system is the
    use of Newtonian classical mechanics to model movement in the real world. We already
    have a clear set of equations that can help us predict in which way the application
    of force on a physical object will cause that object to move given the surrounding
    conditions. There is no need to seek some alternative way of learning what will
    happen. Since we have a good enough model of what happens in the world, we can
    use that.'
