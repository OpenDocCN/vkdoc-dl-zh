  raw: '## The Consequences of Automated Decision-making


    All of that introductory reasoning may have felt a bit abstract, so let’s try
    and make it more real with a practical example.


    A subject that, thankfully, is being discussed increasingly more frequently within
    technology circles is how to address the huge inequalities that exist within the
    workplace. Gender, religion, ethnicity and socio-economic status all impact what
    job you are able to get and how you are treated and compensated once you do get
    it. The ways this happens are varied, with some being very explicit and some more
    subtle.


    Here is an example of a very explicit type of discrimination that was recounted
    to me by an engineer living in Paris. He explained how a friend asked the favor
    to use his address in job applications. When asked why, the friend explained that
    if he used his own address the job application stood a higher chance of being
    rejected. The friend lived in a suburb that was considered poor and rife with
    crime. It turns out that recruiters used the postcode as a signal to determine
    the applicant’s socio-economic status.


    Now, assume that those same companies decide that they should build an automated
    AI-powered tool to help do an initial sift through job applications. As we discussed
    in previous chapters, the way to do it would be to collect examples of job applications
    from the past that met the “criteria” and examples of job applications that did
    not. The AI team will feed all the data into a machine learning algorithm and
    that algorithm will adjust its weights so as to get the “right” answer. While
    individual members of the team preparing the tool are not necessarily biased,
    or looking to codify bias, they will end up introducing bias because the data
    itself is biased.


    The algorithm will eventually latch on to the fact that postcodes carry some weight
    in decision-making. These algorithms are, after all, explicitly designed to look
    for features that will enable them to differentiate between different types of
    data. Somewhere in a neural network, values will be adjusted so that postcodes
    from economically disadvantaged areas negatively affect the outcome of the application.
    The bias and inequality have now been codified—not because someone explicitly
    said it should be so, but because the past behaviors of human beings were used
    to inform the discovery of a data-driven AI-based reasoning model.


    This hypothetical scenario became a very real one for Amazon in 2018. The machine
    learning team at Amazon had been working on building tools to help with recruitment
    since 2014\. The CV selection tool was using 10 years’ worth of data and the team
    realized that it favored men over women. The algorithm simply codified what it
    saw in data. The overwhelming proportion of engineers was male. “Gender must play
    a role,” the algorithm deduced. It penalized resumes that included the word “women’s,”
    such as “women’s chess club captain.” It also downgraded graduates of two all-women’s
    colleges.^([^(59)](#fn59)) Even if the program could be corrected to compensate
    for these particular instances, Amazon was too concerned that they would not be
    able to identify all the ways in which the predictions may be influenced.


    You can imagine in how many different scenarios similar biases can be introduced.
    Using past data to inform decisions about whether someone should get a mortgage
    or not, what type of health insurance coverage one should have, whether one gets
    approved for a business loan, or a visa application, and the list goes on. In
    the workplace, what are the consequences of automating end-of-year bonuses calculations
    or how remuneration is awarded in general?


    Even seemingly less innocuous things can end up codifying and amplifying preexisting
    patterns of discrimination. In 2017, a video went viral that showed how an automated
    soap dispenser in a hotel bathroom only worked for lighter skin tones.^([^(60)](#fn60))
    The soap dispenser used near-infrared technology to detect hand motion. Since
    darker skin tones absorb more light, the dispenser didn’t work for them. Not enough
    light was reflected back to activate the soap dispenser. It was not the intention
    of the designer of the soap dispenser to racially discriminate. But the model
    of behavior they encoded for this relatively simple decision did not take into
    account darker skin tone. It was a faulty model, and at no point from inception
    to actual installation in bathrooms was the consideration made about whether it
    would work for all skin tones even though it depended on the hand’s ability to
    reflect light.^([^(61)](#fn61)) Now, assume you’ve just made a significant investment
    in your own organization to improve the workplace, one that included an upgrade
    of all the physical facilities. To great fanfare the new working space is inaugurated;
    big words are uttered about inclusion, well-being, and so forth. Colleagues with
    darker skin tones then realize that the bathrooms will not work for them. Even
    if people decide to approach this lightly and not feel excluded, that sense of
    exclusion at some level is inevitable. It reminds them of the wider injustices
    in everyday life and the lack of diversity and consideration of diversity.


    Automated decision-making will encode the bias that is in your data and the diversity
    that is in your teams. If there is a lot of bias and very little diversity, that
    will eventually come through in one form or another. As such, you need to explicitly
    consider these issues. In addition, you need to consider them while appreciating
    that the solution is not just technological. The solution, as with so many other
    things, is about tools, processes, and people.


    In the next section we will explore some guidelines we can refer to in order to
    avoid some of these issues.


    ## Guidelines for Ethical AI systems


    In order to avoid scenarios such as the ones described previously, we need to
    ensure that the systems that we build meet certain basic requirements and follow
    specific guidelines.


    The first step is the hardest but the simplest. We need to recognize that this
    *is* an issue. We need to accept that automated decisions-making systems can encode
    biases and that it is our responsibility to attempt to counter that bias. In addition,
    we also have to accept that if we cannot eliminate bias, perhaps the only solution
    is to eliminate the system itself.


    That last statement is actually a particularly hard statement for a technologist
    like me to make. I am an optimist and strongly believe that we need technology
    in order to overcome some of the huge challenges we are faced with. At the same
    time, I have to accept that we have reached a level of technological progress
    that is perhaps out of step with our ability to ensure that technology is safe
    and fair. In such cases, as much as it feels like a step backward, we have to
    consider delaying introducing certain technological solutions. Unless we have
    a high degree of confidence that some basic guidelines are met, that may be our
    only choice.


    Between 2018 and 2019 the European Union tasked a high-level expert group on artificial
    intelligence with the mission of producing Ethics Guidelines for Trustworthy AI.^([^(62)](#fn62))
    The resulting framework produced is a viable starting point for anyone considering
    the introduction of automation in the workplace. We will provide a brief overview
    of the results here, but it is worth delving into the complete document as well.'
  trans: '

    # 自动化决策的后果


    前面所有的介绍性推理可能显得有些抽象，那么让我们通过一个实际例子来让它变得更具体。


    值得庆幸的是，科技界越来越多地讨论的一个话题是如何解决工作场所中存在的巨大不平等。性别、宗教、民族和社会经济地位都会影响你能获得什么样的工作，以及你获得工作后如何被对待和获得报酬。这些影响方式多种多样，有些非常明显，有些则更为微妙。


    以下是一个住在巴黎的工程师向我讲述的非常明显的歧视例子。他解释说，一位朋友请求在求职申请中使用他的地址。当被问及原因时，这位朋友解释说，如果使用他自己的地址，求职申请被拒绝的可能性更高。这位朋友住在一个被认为是贫穷且犯罪猖獗的郊区。事实证明，招聘人员使用邮政编码作为判断申请人社会经济地位的信号。


    现在，假设这些公司决定构建一个自动化的 AI 驱动工具来帮助初步筛选求职申请。正如我们在前几章讨论的那样，做法是收集过去符合“标准”的求职申请例子和不符合标准的例子。AI
    团队会将所有数据输入机器学习算法，该算法会调整其权重以获得“正确”答案。虽然准备该工具的团队成员个人不一定有偏见，或者试图将偏见编码化，但他们最终会引入偏见，因为数据本身就有偏见。


    算法最终会抓住邮政编码在决策中具有一定权重这一事实。毕竟，这些算法被明确设计用于寻找能够区分不同类型数据的特征。在神经网络的某个地方，数值会被调整，使得来自经济落后地区的邮政编码对申请结果产生负面影响。偏见和不平等现在被编码化了——不是因为有人明确表示应该如此，而是因为人类过去的行为被用来指导发现一个基于数据的
    AI 推理模型。


    这个假设场景在 2018 年对亚马逊来说变成了非常现实的问题。亚马逊的机器学习团队自 2014 年以来一直致力于构建帮助招聘的工具。这个简历筛选工具使用了
    10 年的数据，团队发现它偏向男性而非女性。该算法只是将它在数据中看到的内容编码化了。工程师中绝大多数是男性。“性别一定起了作用，”算法推断道。它惩罚了包含“女性”一词的简历，例如“女子国际象棋俱乐部主席”。它还降低了来自两所女子学院的毕业生的评分。^(⁵⁹)
    即使可以修正程序来补偿这些特定情况，亚马逊也非常担心他们无法识别预测可能受到的所有影响方式。


    你可以想象在多少种不同的场景中会引入类似的偏见。使用过去的数据来决定某人是否应该获得抵押贷款、应该拥有哪种类型的健康保险、是否获得商业贷款批准或签证申请等等，不胜枚举。在工作场所，自动化年终奖金计算或一般薪酬分配方式会带来什么后果？


    即使是看似不那么有害的事情，最终也可能编码并放大已有的歧视模式。2017 年，一段视频在网上疯传，显示酒店浴室里的自动皂液器只对肤色较浅的人有效。^(⁶⁰)
    该皂液器使用近红外技术检测手部动作。由于较深的肤色会吸收更多光线，皂液器对他们不起作用。没有足够的光线反射回来激活皂液器。皂液器的设计者并非有意进行种族歧视。但他们为这个相对简单的决策编码的行为模型没有考虑到较深的肤色。这是一个有缺陷的模型，从最初设计到实际安装在浴室中，从未考虑过它是否适用于所有肤色，尽管它依赖于手部反射光线的能力。^(⁶¹)
    现在，假设你刚刚为自己的组织投入巨资改善工作场所，其中包括升级所有物理设施。新的工作空间在万众瞩目中启用；关于包容性、福祉等的大话被说出。然后，肤色较深的同事意识到浴室对他们来说无法使用。即使人们决定对此轻描淡写，不感到被排斥，但在某种程度上，这种排斥感是不可避免的。这让他们想起日常生活中更广泛的不公正，以及缺乏多样性和对多样性的考虑。


    自动化决策将编码你数据中的偏见和你团队中的多样性。如果存在大量偏见而多样性极少，这最终会以某种形式表现出来。因此，你需要明确考虑这些问题。此外，你需要在认识到解决方案不仅仅是技术性的同时考虑它们。与许多其他事情一样，解决方案涉及工具、流程和人。


    在下一节中，我们将探讨一些我们可以参考的指南，以避免其中一些问题。


    ## 合乎道德的 AI 系统指南


    为了避免前面描述的场景，我们需要确保我们构建的系统满足某些基本要求并遵循特定指南。


    第一步是最困难但也是最简单的。我们需要认识到这*确实*是一个问题。我们需要接受自动化决策系统可以编码偏见，并且我们有责任尝试对抗这种偏见。此外，我们还必须接受，如果我们无法消除偏见，也许唯一的解决方案就是消除系统本身。


    最后这句话对于像我这样的技术人员来说，实际上是一句特别难说的话。我是一个乐观主义者，坚信我们需要技术来克服我们面临的一些巨大挑战。同时，我必须承认，我们的技术进步水平可能已经与我们确保技术安全公平的能力脱节了。在这种情况下，尽管感觉像是倒退，但我们不得不考虑推迟引入某些技术解决方案。除非我们有很高的信心满足某些基本指南，否则这可能是我们唯一的选择。


    在 2018 年至 2019 年间，欧盟委托一个人工智能高级别专家组制定可信赖 AI 的伦理指南。^(⁶²) 由此产生的框架对于任何考虑在工作场所引入自动化的人来说都是一个可行的起点。我们在此提供结果的简要概述，但也值得深入研究完整文档。

    '
- fmt: '### Trustworthy AI


    Trustworthiness is considered the overarching ambition of these guidelines. In
    order for AI technologies to really grow, they need to be considered trustworthy
    and the systems that underpin the monitoring and regulation of AI technologies
    need to be trusted as well. We already have models of how this can work. It is
    enough to think of the aviation industry—there is a well-defined set of actors
    from the manufacturers to the aviation companies, airports, aviation authorities,
    and so on, backed up by a solid set of rules and regulations. The entire system
    is designed to ensure that people trust flying. We need to understand, as a society,
    how we want the analogous AI system to be.


    For trustworthy systems to exist, the EU expert group identified three pillars.
    AI should be lawful, ethical, and robust. We look at each in turn.


    #### Lawful AI


    First, AI should be **lawful**. Whatever automated decision-making process is
    taking place we should ensure that it complies with all relevant legal requirements.
    This should go without saying. Adherence to laws and regulations is the minimum
    entry requirement. What specifically needs to be considered is what processes
    are in place to achieve this. Companies in industries that are not heavily regulated
    may not be accustomed to questioning the legality of the technical processes they
    use.


    #### Ethical AI


    Second, AI should be **ethical**. Ethics is, clearly, a very complex subject and
    one that cannot be entirely reduced to a set of specific concepts. The expert
    group grounded their approach to identifying a set of principles for ethical AI
    through the recognition of some fundamental rights, as set in EU Treaties and
    international human rights law. These are:


    - **Respect for human dignity**: Every human being has an intrinsic worth that
    should be respected and should not be diminished, compromised, or repressed by
    others, including automated systems. Humans are not objects to be manipulated,
    exploited, sifted, and sorted. They have an identity and cultural and physical
    needs that should be acknowledged, respected, and served.

    - **Freedom of the individual**: Humans should be free to make decisions for themselves.
    AI systems should not be looking to manipulate, deceive, coerce, or unjustifiably
    survey.

    - **Respect for democracy, justice, and the rule of law**: In the same way that
    AI systems should respect individual freedom, they need to respect societal processes
    that govern how we manage ourselves. For example, AI systems should not act in
    a way that undermines our ability to have trust in democratic processes and voting
    systems.

    - **Equality, nondiscrimination, and solidarity**: This speaks directly to the
    need for AI systems to avoid bias. Society, in general, has been woefully inadequate
    in addressing these issues. It is enough to look at something like equal pay for
    men and women to admit that such issues cannot be resolved simply by saying people
    should act with respect for each other and lawfully. As such, it is important
    that we reiterate the point of equality and solidarity, in addition to the ones
    mentioned before.

    - **Citizens’ rights**: In this book we focused on how AI systems can improve
    life in the workplace. Similarly, AI systems can improve life for all of us as
    citizens, as we go about interacting with government administration at various
    levels. Equally, however, AI systems can make those interactions opaque and difficult.
    Specific consideration needs to be paid to ensure that that does not happen.


    Building on these rights, they went on to define four ethical principles, namely:


    1. **Respect for human autonomy**: AI systems should not look to manipulate humans
    in any way that reduces their autonomy. Some aspects, such as an automated system
    forcing a human being to do something, are “easier” to identify. Things become
    more challenging when we are designing systems that more subtly influence behavior.
    Are the goals and purposes of our system transparent, or is it trying to manipulate
    behavior in order to achieve a goal that is not clearly stated upfront?

    2. **Prevention of harm**: Harm in this context is not referring simply to physical
    harm, which might be easier to pinpoint and justify. This is also referring to
    mental harm and both individual and collective societal harm. For example, some
    AI tools can be incredibly resource hungry. The amount of calculations required
    means that significant amounts of energy are expended^([^(63)](#fn63)). If you
    were to develop an AI-powered tool that required an inordinate amount of energy,
    are you considering that cost (that is less obvious) as something that is causing
    harm? It is not that different from considering what your organization does with
    respect to energy efficiency in general, and whether that is not only a financially
    sound thing to do but also an ethical principle of not causing harm to the environment.
    Obviously, none of these questions have easy answers. The first step is to consider
    them and have honest discussions about what can be done.

    3. **Fairness**: There are no simple answers or a single definition of fairness.
    Basing our thinking on the rights defined earlier, however, we can say that fairness
    should be a core principle at the heart of the design on any AI system, since
    lack of fairness would, at the very least, lead to discrimination. We could also
    take it a step further and say that AI systems should try to improve fairness
    and actively work to avoid deceiving people or impair their freedom of choice.

    4. **Explicability**: If a decision of an automated system is challenged, can
    we explain why that decision was made? This goes right to the heart of the matter.
    Without explicability, decisions cannot be challenged and trust will very quickly
    erode. Is it enough to say that the reason someone was denied a vacation request
    or a pay rise is because a system trained using data from past years decided that
    it was not an appropriate course of action, without being able to specifically
    point to the elements relevant to that person’s situation that contributed to
    that decision?


    It is understandable if the sum of all these issues seems like an insurmountable
    mountain to climb. Do we really need to go into the depths of ethical debates
    if all we want to build is a more intelligent meeting scheduler for our company?
    My personal opinion is that we do need to, at the very least, consider the issues.
    We need to shift our thinking away from considering ethical considerations as
    a burden or an overhead.


    This is about building workplaces that are fairer and more inclusive. Such workplaces
    also tend to lead to better outputs from everyone, which means a better overall
    result for an organization. This is not about fairness and inclusivity being better
    for the bottom line of the company though. It is about whether you consider it
    a better way to be and act in society.


    The more aware we are of the issues and the more questions we pose, the less likely
    we are to build systems that deal with people unfairly. Even an innocuous meeting
    scheduler has the capacity to discriminate. It might not take into account the
    needs of parents or people with disabilities, by consistently scheduling meetings
    at 9 a.m. or scheduling consecutive meetings in locations that are hard to get
    to.


    There are no easy answers to these questions, and there is constant tension between
    the different principles. The EU expert group on AI set out a number of high-level
    requirements to help navigate this space, all leading to more robust AI.'
