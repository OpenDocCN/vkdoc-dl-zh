- fmt: '# The Consequences of Automated Decision-making


    All of that introductory reasoning may have felt a bit abstract, so let’s try
    and make it more real with a practical example.


    A subject that, thankfully, is being discussed increasingly more frequently within
    technology circles is how to address the huge inequalities that exist within the
    workplace. Gender, religion, ethnicity and socio-economic status all impact what
    job you are able to get and how you are treated and compensated once you do get
    it. The ways this happens are varied, with some being very explicit and some more
    subtle.


    Here is an example of a very explicit type of discrimination that was recounted
    to me by an engineer living in Paris. He explained how a friend asked the favor
    to use his address in job applications. When asked why, the friend explained that
    if he used his own address the job application stood a higher chance of being
    rejected. The friend lived in a suburb that was considered poor and rife with
    crime. It turns out that recruiters used the postcode as a signal to determine
    the applicant’s socio-economic status.


    Now, assume that those same companies decide that they should build an automated
    AI-powered tool to help do an initial sift through job applications. As we discussed
    in previous chapters, the way to do it would be to collect examples of job applications
    from the past that met the “criteria” and examples of job applications that did
    not. The AI team will feed all the data into a machine learning algorithm and
    that algorithm will adjust its weights so as to get the “right” answer. While
    individual members of the team preparing the tool are not necessarily biased,
    or looking to codify bias, they will end up introducing bias because the data
    itself is biased.


    The algorithm will eventually latch on to the fact that postcodes carry some weight
    in decision-making. These algorithms are, after all, explicitly designed to look
    for features that will enable them to differentiate between different types of
    data. Somewhere in a neural network, values will be adjusted so that postcodes
    from economically disadvantaged areas negatively affect the outcome of the application.
    The bias and inequality have now been codified—not because someone explicitly
    said it should be so, but because the past behaviors of human beings were used
    to inform the discovery of a data-driven AI-based reasoning model.


    This hypothetical scenario became a very real one for Amazon in 2018. The machine
    learning team at Amazon had been working on building tools to help with recruitment
    since 2014. The CV selection tool was using 10 years’ worth of data and the team
    realized that it favored men over women. The algorithm simply codified what it
    saw in data. The overwhelming proportion of engineers was male. “Gender must play
    a role,” the algorithm deduced. It penalized resumes that included the word “women’s,”
    such as “women’s chess club captain.” It also downgraded graduates of two all-women’s
    colleges.^([^(59)](#fn59)) Even if the program could be corrected to compensate
    for these particular instances, Amazon was too concerned that they would not be
    able to identify all the ways in which the predictions may be influenced.


    You can imagine in how many different scenarios similar biases can be introduced.
    Using past data to inform decisions about whether someone should get a mortgage
    or not, what type of health insurance coverage one should have, whether one gets
    approved for a business loan, or a visa application, and the list goes on. In
    the workplace, what are the consequences of automating end-of-year bonuses calculations
    or how remuneration is awarded in general?


    Even seemingly less innocuous things can end up codifying and amplifying preexisting
    patterns of discrimination. In 2017, a video went viral that showed how an automated
    soap dispenser in a hotel bathroom only worked for lighter skin tones.^([^(60)](#fn60))
    The soap dispenser used near-infrared technology to detect hand motion. Since
    darker skin tones absorb more light, the dispenser didn’t work for them. Not enough
    light was reflected back to activate the soap dispenser. It was not the intention
    of the designer of the soap dispenser to racially discriminate. But the model
    of behavior they encoded for this relatively simple decision did not take into
    account darker skin tone. It was a faulty model, and at no point from inception
    to actual installation in bathrooms was the consideration made about whether it
    would work for all skin tones even though it depended on the hand’s ability to
    reflect light.^([^(61)](#fn61)) Now, assume you’ve just made a significant investment
    in your own organization to improve the workplace, one that included an upgrade
    of all the physical facilities. To great fanfare the new working space is inaugurated;
    big words are uttered about inclusion, well-being, and so forth. Colleagues with
    darker skin tones then realize that the bathrooms will not work for them. Even
    if people decide to approach this lightly and not feel excluded, that sense of
    exclusion at some level is inevitable. It reminds them of the wider injustices
    in everyday life and the lack of diversity and consideration of diversity.


    Automated decision-making will encode the bias that is in your data and the diversity
    that is in your teams. If there is a lot of bias and very little diversity, that
    will eventually come through in one form or another. As such, you need to explicitly
    consider these issues. In addition, you need to consider them while appreciating
    that the solution is not just technological. The solution, as with so many other
    things, is about tools, processes, and people.


    In the next section we will explore some guidelines we can refer to in order to
    avoid some of these issues.


    ## Guidelines for Ethical AI systems


    In order to avoid scenarios such as the ones described previously, we need to
