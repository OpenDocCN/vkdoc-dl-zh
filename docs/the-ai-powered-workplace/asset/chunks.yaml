- fmt: '### Decide If You Really Want It


    Talking about how things ought to be is easy. Nobody can disagree with those slick
    diagrams that have the user at the center with concentric circles spanning out,
    neatly featuring words such as collaboration, communication, and connection. Bringing
    about actual change is hard though. Reality very rarely matches these idealized
    approaches. Reality is messy, with layers of processes, data, tools, and people
    having evolved and changed over time. Reality also doesn’t take a break. You can’t
    hit the pause button, figure out what you want to do, put it in place, and then
    hit play again. Decisions will be interconnected, and the current state and future
    state will need constant understanding and untangling.


    It’s for this reason that the biggest challenge in realizing an AI strategy (and
    any other strategy really) is to get firm commitment from all stakeholders that
    it is a mission worth going on. That includes you, the AI pioneer in your organization.
    Both at a personal and organizational level, there needs to be acceptance that
    it will be a long and complex process to get to a place where the digital workplace
    begins to align with what your vision and mission are. There are no simple solutions,
    no silver bullets, and it’s not about how much money you can throw at the problem
    (although obviously resources will be needed).


    As such, the first real question to ask is whether you, individually, and the
    entire team, as a group, want to embark on the journey of changing and improving
    things. Depending on the organization it may start out as a lonely trip, and you
    may need to state your case multiple times to different stakeholders that all
    need to sign up for the effort. However, as cliched as it sounds, deciding that
    the journey is one worth taking is the most significant step.


    ## Methods


    The previous section gave us some principles to help us judge and steer our plan.
    The next step is to look at some more specific methods that will help us to get
    started and realize a plan.


    ### Find Your Place


    In developing a plan that introduces automation through AI techniques you will
    always end up asking three very specific questions.


    1.  How do we currently solve a problem? What steps do we go through to deal with
    an issue, and where are the rules that define the process?

    2.  What data do we have about the problem? What historical data do we have and
    in what condition is it to help us better understand the problem?

    3.  What current activities are taking place that would enhance or hinder our
    ability to use AI techniques to solve a specific problem?


    #### How Do We Currently Solve a Problem?


    Mapping out processes is a fundamental task of any organization and there are
    numerous techniques that can help with that, from business process modeling to
    data flow modeling. It is not the task of this chapter to provide an introduction
    to those techniques. Instead, it highlights some of the issues that are relevant
    to understanding processes with a view of applying AI techniques to those processes.


    ##### Uncover the Real Process


    One of the first lessons that most customer service support automation problem
    solvers learn is that the way people on the front lines deal with issues will
    differ from what the manual describes, and it does so for a very good reason.
    The manual is wrong.


    The humans, as the intelligent and extremely adaptive beings that they are, have
    figured out all the shortcuts, hacks, and workarounds to the processes to make
    them actually work. They’ve crossed out the wrong information in the manual, stuck
    a post-it note on their screen with the fix and moved on. When we attempt to introduce
    automation, we need to ensure that *that* knowledge is captured and included in
    the automated process.


    Automation means spending time with the people actually doing the tasks, to learn
    what the real process looks like right now. This will give invaluable information
    about what can effectively be fully automated and what can be done to augment
    and assist the people involved in the process.


    ##### Simulate Processes with Humans


    Whether attempting to automate an existing process or looking to introduce a new
    one, it is useful to consider whether you can simulate the process: put simply,
    whether you can fake it using humans. As tedious as it may seem, I would advise
    you to get a volunteer who will *be* that process to start with. Have a human
    sit behind a keyboard and *pretend* to be an automated procurement information
    service answering questions about the status of various invoices from across the
    organization.


    This gives you invaluable information about how people will interact with an automated
    service without having to build the service itself. Those interactions can in
    turn inform how the service gets developed and uncover issues around the integration
    of the service into the organization. Dedicating a few days to learn how people
    are likely to use the service is the most cost-effective way of doing it.


    ##### Don’t Ignore Experience


    Of course, not every solution can be simulated by a human being. If you want to
    identify the best sales prospects to contact based on data analysis of information
    in your CRM, you will have to do that data analysis. You should, however, introduce
    the subject matter experts as soon as possible, to interpret the data and see
    if their intuition matches what the data is saying or whether there is a significant
    mismatch. If there is a mismatch it needs to be examined. It doesn’t mean the
    data is wrong, or the experts are wrong. You simply need to recognize that data
    analysis will uncover correlations, but not all correlations translate to actual
    valid causal effects. An expert will be able to smoke out some of the more obvious
    misleading results.


    #### What Data Do We Have?


    We’ve already discussed data in the previous chapter. One issue we left out, though,
    is mapping out what data is currently there. To provide a simple framework for
    describing your data, I will borrow from ideas that were developed by the open
    data movement. Tim Berners-Lee (yes, that Tim—the inventor of the Web) suggested
    a five-star scheme for describing open data^([^(58)](#fn58)) to share publicly.
    However, it is also a useful guide for describing data within an organization,
    especially as we think of data being shared between different groups and departments.


    ##### One-Star—Data Available for Use in Whatever Format


    The first step is to simply have data available for use in whatever format is
    possible, in a way that is accessible to the wider organization. The test for
    one-star data within an organization is that people can actually find it and are
    able to trace who is responsible for it and what rules govern access to it. The
    data is very likely to be unstructured data in PDF documents, but at least it
    is findable. You will need to deploy more heavyweight techniques such as text
    mining to extract data.


    ##### Two-Star—Data Available in a Structured Format


    A step up is to have this findable and attributable data in a structured format
    that is more machine friendly. It could be an Excel spreadsheet, for example,
    as opposed to a scan of a table. Structured data means that it is easier to get
    to, but you may still be dealing with file formats that are not in use by any
    software right now or where the schema behind them is not well understood or documented.


    ##### Three-Star—Data Available in a Well-Understood Structured Format


    Three-star data is data that you can access in a well-understood structured format.
    We may be dealing with a CSV (comma-separated values) file or a database table.
    You will still need to uncover information around the schema and access to the
    data.'
