    new client. They want to put together the best proposal possible and it would
    be amazing if someone internally already had a relationship with the client organization.
    So the question to ask would be “Hey, has anyone ever worked with client Y, knows
    someone from there, or has some sort of relationship with this potential client?”
    How would that play out now? How can you access the relationships and history
    of your own people? Would it have to be a company-wide e-mail? An announcement
    on a chat channel? Is there a less noisy way to ask the same question, facilitated
    by a system that more efficiently handles the communication exchange or access
    to relationship networks?


    Here is a third example. Say you are facing a major challenge in the development
    of a new feature for a product. It requires specialist knowledge, and you are
    convinced that there must be someone who has expertise or access to expertise
    within the wider organization. Can you search for people based on their expertise?
    Is there a “people search” tool that would allow you to type in a person’s skill
    and it can produce a list of people who have that skill?


    Here is a final example. You are at the start of the year and would like to have
    a map of the availability of key people across dozens of teams throughout the
    year. Is there a model that would reliably predict the potential distribution
    of vacation time, sickness, or any other of the many events that means someone
    will not be available? If you would like to build such a model, do you have historical
    data that could be examined and analyzed to provide this information?


    If the answer to all of the preceding scenarios is that it will probably be very
    hard to achieve within your own company, don’t worry. That is the usual starting
    point. It’s a wonderful opportunity. It means there is already low-hanging fruit
    that you can reach out and grab, and prove the power of automation to make the
    work environment a more helpful one for people and teams.'
  trans: '

    # 排版后的内容


    最后，思考一下设计物理空间的基本流程。你会与一家建筑公司签约，讨论一系列关于你所在组织的性质、你想塑造的形象，以及你现在和未来长期需求的问题。这是一项基于长期规划的重大投资。然后，你会经历多个方案的讨论，最终开始着手建设新大楼。你是否曾为你的数字空间进行过如此深入的规划？你能从抽屉里拿出一份总体规划，展示所有部分如何组合在一起形成战略吗？你是否有一个流程来塑造数字环境相关决策的制定方式？


    我希望这能说明规划数字工作场所时应有的思维方式。当然，这个类比并非完全吻合。数字空间在许多方面允许进行成本低得多的试验和探索。你无法建造并拆除无数栋大楼，也不能一直移动墙壁。嗯，你可以这么做，但这并非最具成本效益的方式！然而，你可以在数字空间中不断尝试和演进各种方法。这并非没有成本，但这是一个更容易被证明合理的成本。


    ## 理解你的数字工作空间


    在第 3 章中，我们讨论了人工智能的运作原理。我们谈到需要建立一个关于世界如何运作的模型，这个模型将使我们能够决定应用哪些能力，以便以对我们有利的方式推动变革。


    当我们考虑将人工智能应用于工作场所时，我们所说的世界模型自然就是数字工作场所。它的运作由哪些组件构成？人员、工具、流程、政策和文化如何结合在一起，使工作得以开展？


    这里值得重申的是，当我们谈论为了应用人工智能技术而理解数字工作空间时，我们指的不是某位富有远见的 CEO 脑海中可能存在的某种模糊的深层含义。相反，我们指的是工作空间的一个非常具体的数字表示，它可以通过软件进行操作以实现自动化。我们需要一个世界模型，它将显性知识与我们可能通过分析数据发现的知识结合起来——这个模型将使我们能够预测未来状态，并通过软件加以利用，为人们提供有用的解决方案。


    在接下来的几页中，我们将探讨构成这个模型的各个组件，以及为了创建你自己的数字环境模型，你应该考虑的一些维度。


    在开始之前，这里有一个简单的免责声明。没有一个模型是放之四海而皆准的。有些框架适用范围更广，有些知识可以从一个组织转移到另一个组织，但最终，你需要探索你自己的空间，以理解它的运作方式以及如何为其建模。


    ### 人员与团队


    毫不意外，一切都始于人员以及他们组成的团队。在工作空间中，我们主要做的事情就是与团队其他成员互动，共同解决问题。至少，这应该是我们正在做的事情！


    因此，建立一个清晰的模型来回答以下基本问题至关重要：我们的人员是谁？他们在哪里？他们在做什么？他们能做什么（技能）？他们了解什么（知识）？他们如何做？甚至他们为什么这样做？我们还可以更进一步，说我们也希望了解我们的人员在与其他组织及其内部人员建立联系时所创造的更广泛的网络。


    很可能存在大量可用的数据，但它们通常分散在不同的部门和团队中，并且存在于不同且通常不兼容的软件中。需要问的问题是，是否存在一种统一的方式来描述组织内的人员和团队。然而，正如我们提到的，这项任务往往看起来令人生畏，所以我们需要一个切入点——一个让我们开始行动的抓手。


    一个有用的方法是，挑选你知道能解决当前问题的明确用例，然后检查你当前的数字环境是否能够支持解决方案，从而开始探索你对组织内数字世界中人员和团队的描述有多复杂。


    #### 探索人员数据


    例如，假设你想引入一个自动化工具，让一群人只需发送一个请求就能安排会议。就像这样：“Akeel、Barry 和 Jasmine 需要在未来 2 天内找一个房间开会
    1 小时。”


    你的数字系统中关于人员和团队的信息是否足以实现这一点？仔细思考这个问题，并在脑海中快速列一个清单。


    *   是否可以查看组内每个人的日程？

    *   你是否能访问会议室日历及其可用性？

    *   你是否能将人员可用性与会议室可用性进行交叉比对？

    *   你是否能考虑一些地理因素和个人对会议的偏好，然后继续预订会议？


    很少有公司已经能做到这一点。更多的公司拥有可以支持它的系统，但尚未实施。而大多数公司甚至无法使用这样的工具，因为人们的日历无法访问，会议室时间表没有数字化，也无法清晰了解谁在哪里。


    再来看另一个场景。你的销售团队刚刚接触到一个令人兴奋的新客户。他们想拼凑出最好的提案，如果公司内部已经有人与客户组织有关系，那就太棒了。所以需要问的问题是：“嘿，有没有人曾经与
    Y 客户合作过，认识那里的某个人，或者与这个潜在客户有某种关系？”目前这种情况会如何处理？你如何获取自己员工的关系和过往经历？是否需要发一封全公司范围的电子邮件？在聊天频道上发布公告？有没有一种不那么嘈杂的方式来提出同样的问题，通过一个能更高效处理沟通交流或访问关系网络的系统来实现？


    这是第三个例子。假设你在开发产品新功能时面临一个重大挑战。这需要专业知识，你确信在更大的组织内一定有人拥有专业知识或能接触到专业知识。你能根据他们的专长搜索人员吗？是否存在一个“人员搜索”工具，允许你输入一个人的技能，然后它能生成一个拥有该技能的人员列表？


    最后一个例子。年初，你想了解全年数十个团队中关键人员的可用性情况。是否存在一个模型能够可靠地预测假期、病假或任何其他导致某人无法工作的潜在事件分布？如果你想建立这样一个模型，你是否有可供检查和分析的历史数据来提供这些信息？


    如果对上述所有场景的回答是，在你的公司内部实现这些可能非常困难，请不要担心。这是通常的起点。这是一个绝佳的机会。这意味着已经有唾手可得的成果等着你去摘取，并证明自动化的力量，让工作环境对人员和团队更有帮助。

