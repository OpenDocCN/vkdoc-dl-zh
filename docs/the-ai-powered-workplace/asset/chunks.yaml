    My personal opinion is that we do need to, at the very least, consider the issues.
    We need to shift our thinking away from considering ethical considerations as
    a burden or an overhead.


    This is about building workplaces that are fairer and more inclusive. Such workplaces
    also tend to lead to better outputs from everyone, which means a better overall
    result for an organization. This is not about fairness and inclusivity being better
    for the bottom line of the company though. It is about whether you consider it
    a better way to be and act in society.


    The more aware we are of the issues and the more questions we pose, the less likely
    we are to build systems that deal with people unfairly. Even an innocuous meeting
    scheduler has the capacity to discriminate. It might not take into account the
    needs of parents or people with disabilities, by consistently scheduling meetings
    at 9 a.m. or scheduling consecutive meetings in locations that are hard to get
    to.


    There are no easy answers to these questions, and there is constant tension between
    the different principles. The EU expert group on AI set out a number of high-level
    requirements to help navigate this space, all leading to more robust AI.'
  trans: '

    ### 值得信赖的人工智能


    可信赖性被视为这些指导方针的首要目标。为了让人工智能技术真正发展，它们必须被认为是值得信赖的，而支撑人工智能技术监控与监管的系统也同样需要获得信任。我们已有可行的模式。只需想想航空业——从制造商到航空公司、机场、航空管理局等，有一系列明确的参与者，并辅以一套坚实的规则与法规。整个系统的设计就是为了确保人们信任飞行。作为一个社会，我们需要理解我们希望与之类似的人工智能系统应如何构建。


    为了建立值得信赖的系统，欧盟专家组确定了三大支柱。人工智能应当合法、合乎伦理且稳健。我们逐一来看。


    #### 合法的人工智能


    首先，人工智能应当是**合法的**。无论发生何种自动化决策过程，我们都应确保其符合所有相关法律要求。这应是不言而喻的。遵守法律法规是最低准入门槛。具体需要考虑的是，为实现这一目标，已建立了哪些流程。那些不受严格监管行业的公司，可能不习惯质疑其使用的技术流程的合法性。


    #### 合乎伦理的人工智能


    其次，人工智能应当是**合乎伦理的**。伦理显然是一个非常复杂的主题，无法完全简化为一系列具体概念。专家组通过承认欧盟条约和国际人权法中规定的一些基本权利，确立了识别合乎伦理的人工智能原则的方法。这些权利包括：


    - **尊重人的尊严**：每个人都具有内在价值，这种价值应受到尊重，不应被他人（包括自动化系统）削弱、损害或压制。人不是被操纵、剥削、筛选和分类的物体。他们拥有身份以及文化和生理需求，这些都应得到承认、尊重和服务。

    - **个人自由**：人类应能自由地为自己做决定。人工智能系统不应试图操纵、欺骗、胁迫或不正当地监视他人。

    - **尊重民主、正义与法治**：正如人工智能系统应尊重个人自由，它们也需要尊重管理我们自身的社会进程。例如，人工智能系统不应以削弱我们对民主进程和投票系统信任的方式行事。

    - **平等、非歧视与团结**：这直接指向人工智能系统需要避免偏见。总体而言，社会在解决这些问题上一直严重不足。只需看看男女同工同酬之类的问题，就能承认这些问题不能仅仅通过说人们应相互尊重并合法行事来解决。因此，除了之前提到的几点，重申平等与团结这一点也很重要。

    - **公民权利**：在本书中，我们重点关注了人工智能系统如何改善工作场所的生活。同样，人工智能系统也能改善我们作为公民的生活，因为我们与各级政府的互动日益增多。然而，人工智能系统同样可能使这些互动变得不透明且困难重重。需要特别关注以确保这种情况不会发生。


    在这些权利的基础上，他们进一步定义了四项伦理原则，即：


    1.  **尊重人的自主性**：人工智能系统不应试图以任何削弱人类自主性的方式操纵人类。某些方面，例如自动化系统强迫人类做某事，相对“容易”识别。但当我们设计那些更微妙地影响行为的系统时，事情就变得更具挑战性。我们系统的目标和目的是透明的，还是它试图通过操纵行为来实现一个事先未明确说明的目标？

    2.  **防止伤害**：此处的伤害不仅仅指可能更容易确定和证明的身体伤害。它还指精神伤害以及个人和集体的社会伤害。例如，一些人工智能工具可能极其消耗资源。所需的计算量意味着会消耗大量能源^(⁶³)。如果你开发一个需要消耗过多能源的人工智能工具，你是否会考虑这种（不那么明显的）成本是造成伤害的因素？这与考虑你的组织在整体能效方面的做法，以及这不仅是财务上合理的行为，也是不损害环境的伦理原则，并无太大不同。显然，这些问题都没有简单的答案。第一步是思考这些问题，并就我们能做些什么进行坦诚的讨论。

    3.  **公平性**：对于公平，没有简单的答案或单一的定义。然而，基于前面定义的权利，我们可以说公平应是任何人工智能系统设计的核心原则，因为缺乏公平至少会导致歧视。我们甚至可以更进一步说，人工智能系统应努力提升公平性，并积极避免欺骗他人或损害他们的选择自由。

    4.  **可解释性**：如果自动化系统的决策受到质疑，我们能否解释为何做出该决定？这直击问题的核心。没有可解释性，决策就无法被质疑，信任也会迅速瓦解。仅仅说某人被拒绝休假请求或加薪，是因为一个使用过去多年数据训练的系统认为这不是一个合适的行动方案，而无法具体指出与该人情况相关的哪些要素导致了该决定，这足够吗？


    如果所有这些问题的总和看起来像一座难以攀登的高山，这是可以理解的。如果我们只是想为公司构建一个更智能的会议安排程序，真的需要深入伦理辩论的深处吗？我个人认为，我们至少需要思考这些问题。我们需要转变思维，不再将伦理考量视为一种负担或额外开销。


    这关乎建立更公平、更具包容性的工作场所。这样的工作场所也往往能让每个人产出更好的成果，这意味着组织能获得更好的整体结果。然而，这并非仅仅关乎公平和包容性对公司利润更有利。而是关乎你是否认为这是在社会中生存和行动的更好方式。


    我们对这些问题认识得越深，提出的问题越多，我们就越不可能构建出不公平对待人的系统。即使是一个无害的会议安排程序，也可能具有歧视能力。它可能没有考虑到父母或残疾人士的需求，例如总是将会议安排在上午
    9 点，或者将连续的会议安排在难以到达的地点。


    这些问题没有简单的答案，不同的原则之间也始终存在张力。欧盟人工智能专家组提出了一系列高层次要求，以帮助驾驭这一领域，所有这些都旨在实现更稳健的人工智能。

    '
- fmt: '# Robust AI


    Robust AI refers to our ability to build systems that are safe, secure, and reliable.
    Let’s quickly review some of the key requirements to give a sense of the types
    of things that we should or could be concerning ourselves with.


    - **Human agency and oversight**: We discussed autonomy in Chapter [3](#472369_1_En_3_Chapter.xhtml)
    as the ability of a (software) agent to generate its own goals. The limitation
    on software agency is that it should not hamper the goals of a human, within appropriate
    context, either directly or indirectly. Oversight, on the other hand, refers to
    the ability for humans to influence, intervene, and monitor an automated system.


    - **Technical robustness and safety**: Planning for when things go wrong and being
    able to recover or fail gracefully is a key component of any sufficiently complex
    system, and AI-powered applications are no different. They should be secure, resilient
    to attacks, and fallback plans should be in place for when things go wrong. In
    addition, they should be reliable, accurate, and their behavior should be reproducible.
    Just like any solid engineering system, you need to be able to rely on it to behave
    consistently.


    - **Privacy and data governance**: In this post-Cambridge Analytica^([^(64)](#fn64))
    world we are all hopefully far more aware of how important robust privacy and
    data governance are. Because of the reliance of AI capabilities on access to data,
    it is also a hotly contested issue of debate. With the release of the GDPR regulations
    in Europe, many said that this would sound the death knell on AI research in the
    continent. Such regulations hamper access to data, which in turn reduces the speed
    with which AI research can be done and the final performance of those systems.
    At the same time, it was heartening to see voices from within large tech companies
    (e.g., Microsoft’s CEO Satya Nadella^([^(65)](#fn65))) accept that GDPR is ultimately
    a positive thing and invite wider scrutiny. Most recently, Facebook has been proactively
    asking governments to introduce more regulations (although not everyone is convinced
    of the motivations behind that). Overall, I think more people are beginning to
    appreciate that governance is required at all levels, and lack of it will lead
    to a potentially too strong backlash against technology—a backlash that may prove
    far more costly than having to adhere to regulations upfront.


    - **Accountability for societal and environmental well-being**: Society is coming
    to the realization that everything that we do has an impact that is not directly
    visible in our profit and loss statements, and that we carry an ethical responsibility
    to consider that. In particular, the societal and environmental impact of the
    systems that we build should no longer be dismissed, and the responsibility for
    it cannot be offloaded somewhere else. That is one aspect of being accountable,
    with the other being a much more formal way of tracing accountability and putting
    in place ways to audit AI-powered applications.


    ## Ethical AI Applications


    To build ethical AI applications, the rights, principles, and requirements previously
    described need to be supported with specific techniques. There is a burgeoning
    community of researchers and practitioners who are working specifically in this
    direction.


    From a technical perspective there is research toward explainable AI, and methods
    are being considered to help us marshal the behavior of the immense reasoning
    machines and neural networks that we are building. There is also much needed interdisciplinary
    work to get technologists talking more closely with other professions. It’s only
    through a more well-rounded approach that considers all the different dimensions
    of human existence that we will be able to move forward more confidently.


    From a societal perspective, governments (and we as citizens) have to look for
    the necessary structures to put in place in order to support trustworthy AI. We
    will need appropriate governance frameworks, regulatory bodies, standardization,
    certification, codes of conduct, and educational programs.


    As we think about how to introduce AI in our workplace, we also play a role and
    carry a responsibility in this context. The first step is about educating ourselves
    and becoming more aware of the issues. The second step is about building these
    considerations into our process and allowing discussions to take place.


    It is not an easy process, and it does require specific effort. However, this
    is the time for us start working toward a future where the impact of the technologies
    we develop is much more carefully considered. If we do not invest the necessary
    effort in building trustworthy AI, we risk having to deal with the far more serious
    aftermath of disillusioned societies and people. The workplace is a large component
    of our lives. We, hopefully, do not want to build workplaces where people feel
    surveilled and controlled.


    Technology can be liberating as much as it can be disempowering. It can create
    a more fair and equitable society, but it can also consolidate and amplify injustice.
    We are already seeing how people feel marginalized by the introduction of wide-scale
    automation in manufacturing. The broad application of artificial intelligence
    techniques in every aspect of our lives will be transformative. It is up to us
    to ensure that that transformation is positive.


    An AI-powered workplace can be a happier, more positive, more inclusive, and more
    equitable workspace. We will not get there, however, without carefully considering
    the ethical implications of what we are doing. There is no free lunch, even in
    a fully automated office. We need to put in the extra time and resources required
    to ensure that we build a better workplace for today and contribute to a better
    society and a healthier environment for tomorrow.


