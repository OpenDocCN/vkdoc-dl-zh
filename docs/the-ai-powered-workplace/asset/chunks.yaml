  trans: '

    # 新的永恒之春


    从 2000 年代末至今（2019 年），人们对人工智能的热情似乎已达到白热化程度，需要适当降温。与此同时，科技领域内外也发生了许多其他变化。这些新元素再次从根本上改变了格局。


    与 20 世纪 80 年代不同，我认为这次格局的变化有利于人工智能的长期发展以及相关技术产业的成长。这些变化不仅会推动人工智能的普及，更会使其成为必需品。人工智能将不再是一种偶尔引入的新奇应用，而是会成为我们一切活动的基本支柱之一。


    我们可能会给它冠以不同的名称，投资者也可能再次失去兴趣，但它所提供的工具和问题解决方案将留存下来。这一点在智能手机上已经显而易见——手机中引入了专用于 AI
    计算的芯片。如果关闭这些芯片，我们甚至无法解锁手机（人脸识别）或进行文字输入（预测输入）。


    在最基本的层面上，至少有三种力量在推动人工智能技术的采用：


    1.  我们处理的数据量出现了前所未有的增长，需要精心管理这些数据并以此为基础做出决策。

    2.  过去 50 年遵循摩尔定律发展的处理能力，使得将复杂算法应用于数据成为可能。这些算法在明确定义的领域中的表现已能与人类能力媲美甚至超越。至少，这些工具能成为有用的伙伴，增强人类的能力。

    3.  云计算使存储和处理能力得以广泛普及，并增加了复杂的服务层，任何人都可以访问和使用复杂的人工智能工具。开源工具在底层能力方面也发挥着同样的作用。人工智能正以前所未有的方式走向大众化。


    ## 数据洪流


    第一个根本性转变在于我们利用数据的能力发生了巨大变化。数据一直在产生，关键在于能否被捕获、存储、检索和分析。在这方面，过去几年带来了量级上的变化。如今，我们可以非常经济高效地存储海量数据（尽管其中大部分仍是非结构化数据），并且能够处理我们所存储的大量数据。


    很难确切说出我们每天存储多少数据。以下是 IBM 在 2018 年公布的一些数据：


    *   每年进行 8000 万次核磁共振成像

    *   每天出现 6 亿种恶意软件

    *   每 15 分钟生成 22 亿个地点的超本地天气预报


    如果你访问`internetlivestats.com`网站，会看到令人眼花缭乱的计数器在不断跳动。2019 年 9 月中旬的一个上午，我在中欧地区查看时，突出的数字包括：


    *   当天已发送超过 1150 亿封电子邮件

    *   超过 3500 万张照片上传到 Instagram

    *   谷歌上已进行超过 30 亿次搜索


    用“泛滥”或“淹没”这样的词来形容数据现状，这一次毫不夸张。根据*Raconteur*的研究，到 2025 年，我们每天产生的数据量可能达到 463 艾字节。这将在很大程度上由连接到物联网的设备数量增长所驱动，包括可穿戴设备、家庭智能设备以及工业设备。


    人工智能带来的机遇很简单：人类无论如何都无法指望在没有自动化的情况下分析哪怕一小部分数据。对此应用大规模数据分析是我们唯一的希望。更进一步，我们可以预见，除非我们将自动化决策嵌入系统，否则我们将无法应对决策和行动需求的增长。


    考虑到人类面临的一些惊人需求，这里举一个教育领域的例子。根据联合国大会通过的目标，为了实现 2030 年让每个儿童都能接受中小学教育的目标，全球将需要额外增加
    6900 万名教师。截至 2018 年，全球共有 6400 万名教师（这还未考虑教师自身培训水平等质量问题）。我们需要在 12 年内将全球现有教师数量翻一番。为了培训足够的教师以实现目标，我们需要技术的大力支持来扩大教师培训规模、扩大学生教育规模，并更准确地衡量成果。所有这些都将依赖于有效的数据管理和流程自动化，以便人力资源能够专注于他们最擅长的事情——人与人之间的互动。


    在中国，一家名为松鼠 AI 的公司用 2 年时间建立了超过 700 所 K-12 教育学校，服务超过 100 万名学生。整个系统依赖于能够根据学生个人需求调整教学计划的复杂算法。虽然对这类系统将如何真正影响儿童和教育持怀疑态度是健康的，但与此同时，我们必须承认，探索此类解决方案是应对不断增长的人口和教育需求的唯一途径。


    ## 原始处理能力与更优算法


    第一人称射击游戏和人工智能有什么共同点？


    信不信由你，没有前者，后者可能就不会有如此强劲的复兴。2009 年，在国际机器学习大会上，Raina 等人发表了一篇关于使用图形处理器应用于大规模深度信念网络的论文。由如今著名的吴恩达领导的斯坦福大学
    Raina 研究小组，找到了有效利用图形处理单元的方法，特别是通过英伟达的 CUDA 编程模型，利用 GPU 提供的并行化能力，大幅缩短了训练机器学习模型所需的时间。到那时，由于计算机游戏行业（正是为了满足第一人称射击游戏对更好画质的需求）对
    GPU 需求的增长，GPU 已经变得非常高效*且*成本效益极高。


    GPU 的使用，加上算法设计的进步（特别是多伦多大学杰弗里·辛顿团队的贡献），导致了结果质量以及获得这些结果所需付出的努力发生了阶跃式变化。


    从很多方面来看，这两项进步已经让“精灵”从瓶子里跑了出来。作为一个产业，人工智能可能会在某个时候遭遇挫折，投资者可能会抱怨，我们可能无法实现所有被承诺的东西。然而，迄今为止开发的技术将始终可用，并且由于其广泛的适用性，它们将一直被用来解决问题——尤其是在我们看到通过云计算和开源软件实现人工智能大众化之后。

    '
- fmt: '### The Democratization of AI


    Up until 2015, actually using AI technologies was generally hard. Unless you had
    AI experts in your team, you couldn’t realistically attempt to apply any of these
    technologies. A lot has changed since then.


    In November 2015, `TensorFlow` (Google’s framework for building machine learning
    applications) was released as an open source tool. Since then, the open source
    space of AI tooling has exploded. Online courses abound, both paid for and free,
    and the main blocker to learning about AI techniques is your time availability
    and access to bandwidth.


    In addition, by 2019 we have an unprecedented level of access to sophisticated
    machine learning services through simplified application programming interfaces.
    Amazon, Microsoft, Google, IBM, and many others offer access to their tools, allowing
    organizations to upload data, train models, and deploy solutions within their
    applications.


    Microsoft, in particular, talks directly about democratizing AI. The aim is to
    make it available to all software engineers in the same way database technologies
    or raw computing power is available via cloud-based solutions.


    The wide availability of these technologies as cloud solutions doesn’t just reduce
    the level of expertise required to implement an AI-powered application. It also
    reduces the amount of time it takes to go from idea to prototype to production-level
    roll-out. As we will see later on, the ability to iterate, experiment, and learn
    while doing is just as important as having the technologies readily available.


    ## Moving Forward


    In the last section we laid out the case for why AI cannot simply disappear. Please
    note that this is not about the economics of the AI industry. It is not about
    the venture capitalists, startups, or large corporation and government politics
    of who gets more attention and funding. The argument is about the fundamentals
    of how the digital world is evolving and the needs of the analog world. The problems
    are getting bigger, and we are running out of ways to scale systems unless we
    introduce automation.


    Whether it is agriculture, education, health, or work in the office, we cannot
    just keep working longer and stressing out more. Something has to give and something
    has to change. My hope is that what is going to change is more efficient use of
    technology to allow us to focus on what is more important. Yes, along the way
    we will go through booms and busts. However, do not confuse press coverage or
    funding news about unicorn startups with the fundamentals. The goal of AI should
    not be to make us all more like machines or to create unicorn startups.


    The goal of AI, as that of any technology, should be to lift us up from our current
    condition and give us back the time to explore what it means to be human.


