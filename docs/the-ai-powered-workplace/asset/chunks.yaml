    # AI 的隐身术


    根据我们在前一章中看到的 AI 历史，可以合理地说，人工智能中的“人工”指的是“智能”的起源是人类有目的努力的结果，而非自然进化或某种形式的神灵干预。它之所以是“人工的”，仅仅是因为我们通常认为智能源于自然，而通过
    AI，我们以某种方式欺骗了自然，自己创造了它。


    我喜欢把它比作元素周期表中的人造元素。如果你还记得化学课上的内容，人造元素就是那些被人工创造出来的元素，即由人类创造。你通常不会在周围发现锿或镄。然而，对于这些合成元素和
    AI 来说，重要的是，一旦被创造出来，它们与自然界中存在的元素（或智能）相比，既不更不真实，也不更真实。换句话说，“人工”指的是达到智能的过程，*而非*最终结果。


    那么，什么是智能呢？这几乎是一个你能想到的最开放的问题，而更糟糕的是，我们通过不断改变目标来让事情变得更复杂。每当我们构建出能够完成以前不可能完成的事情的东西时——从简单的计算器到击败国际象棋大师，从在《危险边缘！》中获胜到检测癌症——那个我们刚刚使其变得可处理的棘手问题就会被降级。与那些声称某物并非真正智能的人的典型对话大致如下：


    - 它*看起来*需要智能才能解决，但我想其实不需要。

    - 等等，什么？那如果不是 AI，现在是怎么解决的？

    - 嗯，它用了大量的计算和大量的算法，不是吗？其中并没有什么真正聪明或神奇的东西。

    - ……


    一旦把戏被揭穿，魔法就失效了，它不再是魔法。这只是手法技巧，一个精心设计的把戏，一个更复杂的歌唱鸟自动机版本。


    也许这是因为我们实际上并不知道自己的智能从何而来、如何产生，再加上对任何声称可能像我们一样智能的事物有一种与生俱来的威胁感。毕竟，我们早已习惯了在这个星球上称王称霸。我们自身对智能的探索，是唯一感觉可能威胁到它的东西。^(¹⁴)
    当我们成功解决了那些我们“认为”需要智能的问题时，我们就去神秘化了它们，这使它们变得不那么有趣。直到我们完全去神秘化整个过程之前，我们总能退到更高的立场，宣称自己的优越性。


    然而，对于解决实际问题的日常任务来说，这类讨论往往会分散注意力并令人沮丧。人们是否称其为智能，最终并不重要。最平凡的道理是，通往解决方案的旅程才是关键。这段旅程带领我们穿越
    AI 提供的广阔工具集，让我们发现哪些技术适用于我们的情况。我们是否用“真正的”智能解决了问题，这是存在主义者争论的话题。现实情况是，我们现在拥有一个能做有用之事的工具。


    正是这种对 AI 的实用观点，我们将在本章中进一步阐述。然而，在此之前，我们将区分对通用 AI（这无疑是一种存在主义的追求）与特定领域 AI 的探索。


    ## 通用 AI vs. 特定领域 AI


    当我们走向对 AI 的实用理解，以便用它来思考如何最好地利用它时，首先区分人工通用智能（或称强 AI）和特定领域 AI（或称弱 AI）是很有用的。


    强 AI 指的是努力创造能够通过运用其技能处理任何问题的机器。就像人类一样，它们可以审视情况，并充分利用手头的资源来实现目标。


    花点时间想想这意味着什么。假设目标是准备一杯咖啡。想象一下在陌生人的家里做这件事。你被允许进入，然后你扫视各个房间，试图找出厨房可能在哪里。多年的先前经验告诉你，厨房可能在一楼，朝向房子的后面。无论如何，当你看到它时，你能认出来，对吧？然后你四处寻找咖啡机。它用研磨咖啡粉、咖啡豆还是速溶咖啡？是意式咖啡机，还是法式压滤壶？水在哪里？他们把杯子放在哪里？勺子呢？糖呢？奶油呢？牛奶呢？我们毫不费力地处理所有这些难题。


    现在想象一下，必须建造一台能完成这些工作的机器。它将需要导航技能、机器视觉技能、处理不同类型物体的灵巧性，以及一个图书馆规模的关于如何煮咖啡和房屋如何布局的规则。你可能开始体会到强
    AI 所面临的挑战了。


    这个煮咖啡的场景是史蒂夫·沃兹尼亚克（是的，苹果公司的史蒂夫·沃兹尼亚克）为测试强 AI 机器而设计的一个挑战。就像我们在前一章提到的图灵测试一样，这是一种验证是否达到了接近人类水平的智能的方法。关键在于，即使你真的造出了一台能够进入任何房子并准备一杯咖啡的机器（顺便说一句，我们离实现这一点还差得很远），当你让它换一个灯泡时，它也会惨败。事实上，许多人认为即使这个测试也不是一个足够好的强
    AI 测试。通用智能的一个关键技能是将知识从一个领域迁移到另一个领域的能力，这是人类似乎特别擅长的事情。来自《人工智能伦理学》的这段引文很好地捕捉了这一点。


    > *蜜蜂表现出建造蜂巢的能力；河狸表现出建造水坝的能力；但蜜蜂不会建造*[*水*]*坝，河狸也学不会建造蜂巢。而人类，通过观察，可以学会做这两件事；但这是生物生命形式中独一无二的能力。*^(¹⁵)


    强 AI 试图解决那些直指我们作为人类核心的问题。不用说，如果我们真的建造出如此强大的机器，我们将面临一系列非常有趣的后续问题需要回答。


    因此，从哲学、政治和社会的角度来看，这场辩论是引人入胜的。从科学的角度来看，这种探索当然是有价值的。从“AI 如何能帮助我完成今天手头的工作？”的角度来看，强
    AI 并不是我们需要关注的重点。


    相反，我们将专注于弱 AI 或狭义 AI。这种 AI 试图构建能够解决明确定义领域内问题的机器。类似于 20 世纪 80 年代早期拥有“区区”数千条规则的专家系统，这些
    AI 机器的目标是解决有限的问题，并尽早、清晰地展示其价值。与 20 世纪 80 年代不同的是，我们现在拥有计算能力、数据和技术来构建系统，这些系统无需我们明确阐述所有规则就能解决问题。


    此外，我们不会直接深入技术并给出不同类型的机器学习或符号推理方法的分类，而是会走一条不同的路。由于智能是如此难以界定，我们将着眼于系统展现出的品质或行为，并用这些来理解它。我们将借鉴智能体导向计算的思想，这是
    AI 的一个领域，致力于构建以智能体为核心抽象单元的软件。我们将探索我们的智能体（即我们的软件）可以拥有哪些行为，以及这些行为如何组合起来，从而产生越来越复杂的软件。

