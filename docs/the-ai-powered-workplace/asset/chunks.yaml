    # 关键在于要记住，尽管人工神经网络（ANN）的结果可能令我们印象深刻，但它们对其处理的数据并无语义理解。它们只是在寻找任何可以用来以某种方式对输入数据进行分类的模式。我们常常错误地将意义归因于结果，并假设我们的
    ANN 发现了与我们提问相关的某些内容。我们绝不应做此假设。相反，我们需要使用适当多样的数据对 ANN 进行彻底测试，并建立治理机制以限制错误自动化决策的影响，从而确保我们有足够的信心，使整个系统能在令人满意的参数范围内运行。


    ## 从技术到能力


    在本章中，我们回顾了核心的人工智能技术，这些技术使我们能够开发特定的能力。它们是构建模块，是从研究实验室中涌现出来的技术，可以组合并应用于构建完整的系统。


    最重要的要点如下：


    1.  核心问题是找到一个模型，使我们能够描述和预测在特定场景中会发生什么，从而支持决策制定。


    2.  我们不应在模型来源方面设置限制。我们可以显式地设计它（模型驱动），但也可以利用数据来帮助我们发现它（数据驱动）。


    3.  尽管这是一个快速发展的领域，但核心概念的变化并不那么迅速。即使是被视为前沿的 ANN，也已经存在了几十年。了解不同技术背后的关键原理，有助于在选择工具或与团队讨论潜在解决方案时做出明智判断。


    4.  对于技术如何组合以产生最终结果，请保持开放的心态。在评估解决自身问题的潜在工具时，不要被关于某种方法相对于另一种方法的纯粹性或真实性的讨论所分心。相反，应专注于你所获得的最终能力的质量。


    正如我们将在下一章及后续章节中看到的，一个完整的应用程序总是多种不同技术的组合。


    脚注 1 2 3 4


    # 5. 核心人工智能能力


    在上一章中，我们看到有许多不同的技术可以用来建模智能行为的各个方面，并且可以组合使用。然而，仅凭这些技术本身，我们无法走得很远。这些技术只有在能够让我们完成特定且明确可辨的任务时才有价值：例如将语音转录为文本、对文档进行分类，或识别图像中的物体。为了实现这些任务，我们通常需要将多种技术组合成能力。


    人工智能能力代表了我们能够更好地理解世界并对其施加影响的具体事物。它们类似于人类的感官。人类能够看、听、闻、触摸和品尝。每一种感官都涉及多个子系统（技术），这些子系统组合起来提供最终的结果。


    以视觉能力为例。光线穿过我们眼睛的角膜和晶状体，在感光细胞上形成图像。从那里，通过视神经到达我们大脑的初级视觉皮层。信息在那里被再次处理，并最终映射到特定的概念。我们运用不同的技术来收集光线、转换光线并处理结果，以支持单一的视觉能力。


    在本章中，我们将重点关注三大类能力，它们代表了我们在工作环境中遇到的最常见类型。它们也是最有可能在任何工作环境中立即带来益处的：


    -   理解和操作语言（包括语音和文本）以及生成语言的能力

    -   操作图像、对图像进行分类以及识别图像中特定物体的能力

    -   结合组织特定知识和数据，以创建组织特定能力——我们自己的*超能力*，这些能力对于其他人来说极难复制


    本章旨在让你对这些能力如何运作有一个高层次的理解，并提供其应用示例，从而揭开这些过程的神秘面纱，让你能够更清晰地思考如何在自身工作环境中利用它们。


    ## 语言


    语言是组织应尽可能利用的关键能力。作为知识工作者，从很多方面来说，我们的货币就是文字。无论任何办公室活动的最终结果是什么，与同事协作和分享想法的方式都是通过语言。


    语言具有一些迷人的特质，从一开始就需要一种丰富且跨学科的方法。这里不可能涵盖所有挑战，但我认为考虑其中几点是有益的，以便更好地理解任务的规模，并认识到已经取得了多么惊人的进展。


    首先，显然需要处理多种语言。幸运的是，不同的语言呈现出若干相似的特征，这意味着为处理一种语言而开发的技术通常可以应用于其他语言，主要限制在于我们想要分析的语言是否有足够大的可用数据集。^(²⁷)
    然而，语言并非一成不变。今天英国所说的英语与过去几个世纪大不相同，而美国或澳大利亚所说的英语与英国英语也存在显著差异，以至于可能需要不同的语言模型和数据集。语言从一个领域转移到另一个领域时也会发生变化。如果两位土木工程专家旁听两位航空航天工程专家的对话，他们可能理解大部分单个词汇，但整体含义对他们来说将是缺失的。词汇被赋予新的含义，引入了缩写词，而且很多时候，尤其是在口语中，会使用只在非常特定的语境和时间段才有意义的俚语。我敢肯定，如果我让我父亲“给我发个
    Slack”，他会一脸困惑，但如果我说“给我发个 Skype”，他会明白，并很可能回答：“我们干嘛不用 FaceTime 呢？”


    此外，还有理解我们说话内容并将其转录为文本的问题。我们的口音、空间的声学效果、我们是否感冒、背景噪音，或者其他人同时说话，所有这些因素都会影响到达机器的声音，机器需要从中分离出它关心的特定数据并将其转换为文字。再次强调，这不仅仅是忠实地将声音转录为文字。我们说话时的*结构*方式也不同。我们会加入“嗯”和“啊”，并以奇怪的方式停顿和开始，这些方式在某种程度上对我们来说都很有意义，但与我们写作的方式不同。


    正如你所见，挑战是巨大的，而我们现在拥有现成的人工智能工具，能够识别语音、将其转录为文本、理解其含义，甚至生成语言，这真是令人惊叹。我们还没有解决所有问题，但我们已经解决了足够多的问题，使得这些工具可用于开发基于人工智能的应用程序。


    在下一节中，我们将简要探讨这一切在语音识别、自然语言处理（NLP）、翻译和自然语言生成方面的影响。

    '
- fmt: '### Speech Recognition


    Speech recognition deals with our ability to transform the sounds that we produce
    when we speak to text. It is often also referred to as `ASR`, which stands for
    automatic speech recognition. Quite easily an entire field of study on its own,
    it combines a breathtaking set of technologies.


    An `ASR` system starts by picking up the sound of our voice through a microphone.
    That signal gets cleaned and processed in the hope of isolating only those frequencies
    that represent a human voice. Those analogue continuous sound waves are then sampled
    and translated into what are referred to as *speech frames* (a couple of dozen
    milliseconds of sampled waveform information). Speech frames are then used to
    help us understand what *phonemes* the user has uttered. Phonemes are units of
    sound that combine to give us words and are used to differentiate between words—the
    linguist’s equivalent to a grammatical syllable.^([^(28)](#fn28)) Linguists define
    the specific phonemes of each language and how they combine into words; that knowledge
    is then used by `ASR` systems. This information is then further combined with
    a pronunciation model and a language model, nowadays largely based on deep learning,
    to produce the final text.


    Speech recognition systems, especially after the huge enhancements that improved
    neural network algorithms introduced, provide an impressive amount of accuracy
    (all major technology companies report human level or better accuracy with error
    rates close to or below 5%). That does not mean, however, that we can assume that
    they will be able to tackle any situation with ease. The specific context needs
    to be taken into account, and a realistic investigation needs to happen into the
    viability of using speech recognition in order to solve a given problem. You probably
    already noticed how voice assistants are not that effective in crowded rooms with
    lots of other people speaking, whereas they perform much more reliably in a car
    where outside sounds are cut out.


    The domain of discourse is also very important. Here is a very simple experiment
    you can run on your own to understand how it can affect speech recognition. Call
    up whatever voice assistant you have on your smartphone, be it Siri, Cortana,
    or the Google Assistant. First try telling them something that might be said in
    your work setting using domain-specific terminology, and then try an everyday
    phrase that is about dealing with more general life tasks. Look at the transcription
    of the text to see how accurate each got it.


    I used the following work-related sentence:


    “*The high-level objective for Task 1 is to produce a chatbot that is able to
    assist a user to search through multiple document repositories that are accessed
    through a federated search service.*”


    This is a relatively friendly test. There are some domain specific keywords, but
    they are not too arcane. I am sure you, the reader, will have no difficulty with
    the individual words although you may have some questions about the overall meaning;
    for example, what exactly is a federated search service?


    Google Assistant came back with:


    “T*he high-level objectives for task wants to produce a chat but the table to
    sister user to search through multiple document repositories access with federated
    search service.*”


    Siri gave me:


    “*The high-level objective for task one is to produce a chalkboard that is able
    to sister user to search through multiple document repository other access through
    federated search service.*”


    Those are admirable efforts, but not very usable.


    However, if I try the following sentence:


    “*Remind me to drop off the kids at school then go collect groceries, pass by
    the pharmacy, and then meet Julia for late breakfast.*”


    Siri gets it word for word correct and so does Google Assistant. I didn’t even
    have to enunciate too carefully, something that I did do in the previous example.


    Clearly, they work well for exactly what they were designed: to help us handle
    everyday life, rather than transcribe domain specific information. It is no surprise
    that one of the leading transcription software companies, Nuance, provides different
    software solutions for different industries such as legal, professional, and law
    enforcement. Each solution advertises the fact that it has been trained for that
    industry’s specific vocabulary, precisely because that is a necessary precondition
    for effective operation in that industry.


    In summary, although speech recognition has come a long way, it is important to
    keep a realistic view of where it can currently help, especially in an office
    setting. It can be extremely effective and less onerous to train if we want to
    use voice to issue straightforward commands or directions to a machine. In these
    cases, we are only uttering smaller phrases with a specific intent, such as “Open
    Microsoft Word” or “Call my HR contact.” It becomes more challenging if we are
    trying to use it to transcribe complex phrases with domain specific (and especially
    acronym heavy) content.


    ### Natural Language Processing


    With speech recognition we go from sound to text. Once we do have text, how do
    we understand what we can do with it, though? This is where `NLP` comes into play.
    Let’s look at some of the key stages to both understand what is possible and as
    a way to inspire ideas of how you can use it in your own work environment.


    #### Analysis and Entity Extraction


    The first stage is, typically, the syntactic analysis of the text we want to understand
    and something called entity extraction. Consider just a simple phrase such as:


    “This is a book on the use of artificial intelligence in the office. It’s published
    by Apress, part of Springer Nature.”


    To start with, we need to break up the text into its individual components; understand
    what constitutes punctuation and what does not, and how that affects the sentence
    structure.


    Using Google’s `NLP` demo^([^(29)](#fn29)) we get an analysis such as the one
    in Figure [5-1](#472369_1_En_5_Chapter.xhtml#Fig1).


    ![../images/472369_1_En_5_Chapter/472369_1_En_5_Fig1_HTML.jpg](Images/472369_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    Syntax analysis of a phrase using Google’s `NLP` API


    You can see there is quite a bit going on. The `NLP` system has been able to successfully
    identify all the different words, including where we’ve used apostrophes such
    as “it’s.” It is also identifying nouns, verbs, punctuation, adjectives, and more.


    Entity extraction is able to tell us that *book*, *Apress*, *Springer Nature*,
    and *artificial intelligence* are all salient entities in this piece of text and
    for some, such as “Springer Nature” and “Apress,” it is able to say that they
    are organizations and provide links to their websites.


    With just this information we can start thinking of a search powered by `NLP`
    that can be so much more effective than a “normal” search that only compares strings
    without any contextual information—a search that will, for example, be able to
    distinguish between when a specific organization is mentioned, such as Apple,
    instead of simply the fruit apple. Imagine being able to search through your document
    store and then filter against mentions of a specific company, product, or coworker
    names just the same way you filter against different brands on Amazon.com, without
    having had to painstakingly annotate those documents up front. The `NLP` system
    can do the heavy lifting for us.'
