    ### 确定你是否真的想要它


    谈论事情应该如何是很容易的。没有人会反对那些精美的图表，它们将用户置于中心，周围环绕着同心圆，整齐地标注着协作、沟通和连接等词汇。然而，带来真正的改变却很难。现实很少能与这些理想化的方法相匹配。现实是混乱的，层层叠叠的流程、数据、工具和人员随着时间的推移不断演变和变化。现实也不会暂停。你无法按下暂停键，想清楚要做什么，将其落实到位，然后再按下播放键。决策将是相互关联的，当前状态和未来状态需要持续的理解和梳理。


    正因如此，实现人工智能战略（实际上也包括任何其他战略）的最大挑战，是获得所有利益相关者的坚定承诺，让他们相信这是一项值得投入的使命。这包括你——你所在组织中的人工智能先驱。在个人和组织层面，都需要接受这样一个事实：要让数字化工作场所开始与你的愿景和使命保持一致，将是一个漫长而复杂的过程。没有简单的解决方案，没有银弹，问题也不在于你能投入多少钱（尽管显然需要资源）。


    因此，首先要问的真正问题是：你个人以及整个团队，是否愿意踏上改变和改善事物的旅程？根据组织的不同，这趟旅程开始时可能很孤独，你可能需要多次向不同的利益相关者陈述你的理由，而他们都需要为这项努力做出承诺。然而，尽管听起来像陈词滥调，但决定这趟旅程值得一走，是最重要的一步。


    ## 方法


    上一节为我们提供了一些原则，帮助我们判断和引导计划。下一步是研究一些更具体的方法，帮助我们启动并实现计划。


    ### 找到你的位置


    在制定通过人工智能技术引入自动化的计划时，你最终总会问三个非常具体的问题。


    1.  我们目前如何解决问题？我们处理问题要经历哪些步骤，定义流程的规则在哪里？

    2.  我们拥有关于这个问题的哪些数据？我们有哪些历史数据，这些数据的状况如何，能否帮助我们更好地理解问题？

    3.  目前有哪些活动正在进行，它们会增强还是阻碍我们使用人工智能技术解决特定问题的能力？


    #### 我们目前如何解决问题？


    绘制流程图是任何组织的一项基本任务，有许多技术可以帮助实现这一点，从业务流程建模到数据流建模。本章的任务不是介绍这些技术。相反，它着重强调了一些与理解流程相关的问题，目的是将人工智能技术应用于这些流程。


    ##### 揭示真实流程


    大多数客户服务支持自动化问题的解决者学到的第一课是，一线人员处理问题的方式会与手册描述的不同，而且这样做有充分的理由：手册是错的。


    人类作为聪明且适应性极强的生物，已经找到了流程中的所有捷径、技巧和变通方法，使它们真正发挥作用。他们划掉了手册中的错误信息，在屏幕上贴上一张写着修正方法的便利贴，然后继续工作。当我们尝试引入自动化时，需要确保*这些*知识被捕获并纳入自动化流程中。


    自动化意味着要花时间与真正执行任务的人在一起，了解当前真实的流程是什么样的。这将提供宝贵的信息，告诉我们哪些可以有效地完全自动化，以及可以做些什么来增强和协助流程中的人员。


    ##### 用人类模拟流程


    无论是尝试自动化现有流程，还是引入新流程，考虑是否能够模拟该流程都是有用的：简单来说，就是能否用人类来“假装”实现它。尽管这看起来可能很繁琐，但我建议你找一位志愿者，让他*充当*这个流程的起点。让一个人坐在键盘后面，*假装*是一个自动化的采购信息服务系统，回答来自组织内部关于各种发票状态的问题。


    这为你提供了宝贵的信息，让你了解人们将如何与自动化服务交互，而无需实际构建该服务本身。这些交互反过来可以为服务的开发提供信息，并揭示服务与组织集成方面的问题。花几天时间了解人们可能如何使用该服务，是成本效益最高的方式。


    ##### 不要忽视经验


    当然，并非所有解决方案都能由人类模拟。如果你想根据 CRM 中的信息进行数据分析，找出最佳销售线索进行联系，那么你必须进行数据分析。然而，你应该尽快引入领域专家，让他们解读数据，看看他们的直觉是否与数据所说的一致，或者是否存在显著的不匹配。如果存在不匹配，就需要进行审查。这并不意味着数据错了，或者专家错了。你只需要认识到，数据分析会发现相关性，但并非所有相关性都能转化为实际有效的因果关系。专家能够排除一些更明显的误导性结果。


    #### 我们拥有哪些数据？


    我们已经在上一章讨论过数据。不过，我们遗漏了一个问题：梳理当前存在哪些数据。为了提供一个描述数据的简单框架，我将借鉴开放数据运动提出的想法。蒂姆·伯纳斯-李（是的，就是那位蒂姆——万维网的发明者）提出了一个五星级方案，用于描述公开共享的开放数据^(⁵⁸)。然而，它也是描述组织内部数据的有用指南，尤其是当我们考虑数据在不同群体和部门之间共享时。


    ##### 一星——数据以任何格式可供使用


    第一步很简单，就是让数据以任何可能的格式可供使用，并且能够被更广泛的组织访问。组织内一星数据的检验标准是，人们能够实际找到它，并能追溯谁负责它，以及管理访问权限的规则是什么。这些数据很可能是
    PDF 文档中的非结构化数据，但至少是可查找的。你需要部署更复杂的技术，如文本挖掘，来提取数据。


    ##### 二星——数据以结构化格式可用


    更进一步，是让这些可查找且可归属的数据以更机器友好的结构化格式存在。例如，它可以是 Excel 电子表格，而不是表格的扫描件。结构化数据意味着更容易获取，但你仍然可能处理的是当前没有任何软件使用的文件格式，或者其背后的模式未被充分理解或记录。


    ##### 三星——数据以被充分理解的结构化格式可用


    三星数据是指你可以以被充分理解的结构化格式访问的数据。我们可能处理的是 CSV（逗号分隔值）文件或数据库表。你仍然需要挖掘有关模式和数据访问的信息。

    '
- fmt: '#### Four-Star—Data Available via Documented API


    In this case we are dealing with structured data available via a documented and
    well-maintained API (application programming interface). This indicates that there
    is a team on the other end that is curating access to the data and that more well-thought
    out data governance processes are in place.


    #### Five-Star—Data Linked Across Sets to Provide Context


    With five-star data we are not only able to gain access via a well-documented
    API, that data is interlinked to other data sets within the organization, allowing
    us to make more interesting inferences about the context of the data.


    Discovering and ranking datasets provides a map that can indicate where the best
    starting point is. We can start from where data is of the best quality to prove
    the value of AI-powered automation and motivate the improvement of the rest of
    our datasets.


    ### Connect Activities


    The development and execution of an AI strategy should not be viewed as something
    that happens in isolation to other activities. It is crucial that it informs thought
    from the very start. You could view AI capabilities as simply a toolbox you reach
    into and pull out useful tools to help solve problems as they appear. You could
    argue that since AI is a technology, a way of solving a problem, it doesn’t need
    to feature when defining overarching strategies. Only once you get to the point
    where you need to build a solution do you start exploring the space of AI techniques
    and capabilities to see what applies to your problem.


    I think that approach is flawed. It fails to capitalize on one of the most significant
    aspects of strategy: the orchestration of activities so that the whole is greater
    than the sum of its parts. An AI strategy cannot and should not stand in isolation
    from your wider digital strategy, which should be connected to your overall strategy.
    Each supports the other and lays the groundwork for the whole to succeed. If you
    view AI as simply another tool you can apply, you miss out on defining strategies
    that are only possible because of the capabilities of AI.


    It is crucial to connect your overall strategy to your digital strategy and your
    AI strategy. Each informs the other and enables objectives and courses of action
    that would not be possible if the different aspects were dealt with in isolation.


    At a more mundane level, connecting activities also means determining how to best
    time and coordinate projects so that you get a positive outcome overall. A typical
    example of *not* doing this is that as one group within an organization is working
    to develop capabilities for automated prediction, the software that produces the
    data that that prediction depends on is already planned to be replaced—the equivalent
    of pulling the carpet under the feet of the first team.


    You want to avoid conversations like the one below:


    - “- The new CRM project is well underway—the new system will be up and running
    by early next year.”

    - “- Will the new CRM be able to supply the relationship data and historical sales
    data that we need to enable prediction?”

    - “- I don’t know. That wasn’t part of the requirements a year ago when the request
    for proposals went out to vendors.”

    - *“…”*


    Getting a firm grasp on process, data flows, and activities that will influence
    these is crucial for coordinating a successful AI implementation. It does require
    effort at the planning stage and it points to the need for wider stakeholder participation
    so that everyone is aware of how changes will affect activities across the team.


    ### Build Your Roadmap


    Once we have a better grasp of where we are, we can start planning out the steps
    that will take us to where we want to be. At the very highest level I find it
    useful to consider three broad possibilities. In part, these three approaches
    can be viewed as stages along the evolution of your AI capabilities, but ultimately
    they are three streams that you can follow concurrently and at times you can decide
    to move from one to the other. These three streams are:


    - **Hire tools with AI built in.** In this case we are looking for tools with
    AI capabilities already built in. We don’t need to develop anything from scratch.
    Simply take advantage of what is available.

    - **Build solutions with prebuilt AI components.** Here we are developing our
    own custom solutions, but when it comes to using AI techniques or capabilities,
    we don’t train or develop our own models. Instead we use AI services that are
    pretrained or in some way prepackaged to give us the functionality we need.

    - **Build AI components and infrastructure.** Finally, we can consider building
    our own AI models to include within wider solutions. This step could be further
    divided into building AI models using existing techniques or developing new techniques
    to help us derive models.


    We will consider each of the options in more detail in the next sections.'
