  trans: '

    # 超越“指向点击”


    自 1984 年麦金塔电脑普及图形界面以来，人与计算机的主要交互范式一直是将光标指向某物并点击以进行选择。


    此间的创新升级了这一基础体验，使其更丰富、更流畅，但并未带来根本性变革。诚然，我们现在可以用手指代替鼠标；诚然，我们可以用两根手指“捏合缩放”或用更多手指“滑动”。借助某些触控板和智能手机，我们甚至能通过压力触发不同反应。我们从灰度屏幕上内存极小、性能低下的处理器，发展到速度飞快、内存近乎无限、支持数百万色彩的机器。这是三十五年来的改进。尽管如此，我们依然在指向点击。


    别误会我的意思。所有这些发展都令人惊叹。实现流畅捏合缩放体验所需的技术极其复杂。然而，基本范式并未改变。你通过使用设备（鼠标、触控笔、触控板或双手）来操作屏幕上的对象（按钮、链接、文本、图像），向机器指示你指向的对象应发生什么。


    有趣的是，人工智能已在当今界面中扮演着重要角色。一个典型例子是智能手机上的虚拟键盘。它不断预测你最可能想触摸的字母、接下来可能触摸的字母，以及你整体上试图输入的单词和短语。它正在学习根据你特定的按键和书写方式来调整其预测。如果关闭所有这些功能，我们会发现在手机上输入任何信息都非常困难。毫不夸张地说，iPhone
    的推出之所以成为可能，正是因为它运用了足够多的人工智能技术来实现用户界面。


    如今，所有顶级智能手机都具备面部识别或指纹识别功能。这项功能高度依赖人工智能技术，将获取的输入（你的面部特征或指纹）与内存中存储的数据进行比对。它们能够以几乎无延迟的无缝动作完成这一过程，堪称魔法。


    然而，我们正处在一个转折点。是时候从指向点击界面转向其他形式了。更多人工智能技术将使我们能够迈出下一步，这背后有三个关键驱动力。


    首先，随着计算技术渗透到我们生活的方方面面以及各种设备，界面要么完全消失，要么不再是即时选项。如果你正在处理多项任务，例如开车或在厨房准备饭菜，你的双手已被占用。能够与计算机对话是唯一的选择。如果你与手腕上的设备、或嵌入衣物或家具中的设备交互，语音命令自然是首选。


    其次，我们早该扭转计算机及其交互方式的主导地位。迄今为止，我们不得不学习“魔法咒语”：一系列能帮助我们达成目标的点击操作。在无尽的菜单层级中，我们寻找的选项究竟埋藏在哪里？我们应该调用哪种左键、右键、单指、双指或三指加压力的点击组合来触发操作？为什么我们不能直接告诉计算机我们想要什么，然后让它们去执行？这一直是愿景，但现在界面设计师终于拥有了帮助他们实现该愿景实用化版本的工具。


    第三个驱动力围绕竞争展开，以及外部力量如何使其他方不得不做出反应。当一组技术达到临界点并催生出新的做事方式时，它便提供了竞争优势。这反过来又促使竞争对手寻找方法来抵消这种优势，从而不可避免地推动进一步的技术创新。iPhone
    就是一个典型例子。在 iPhone 的首次发布会上，史蒂夫·乔布斯展示了当时手机技术的最高水平：笨重、粗陋，带有实体键盘。iPhone 改变了这一切。几年之内，那些笨重粗陋的手机便销声匿迹。iPhone
    成为评判智能手机的新标准。快进到 2019 年，iPhone 正竞相追赶其他公司引领的创新。


    现在，想象一个支持团队能够提供更好的客户体验，因为他们可以专注于更复杂的案例，而由对话式人工智能驱动的自动化虚拟助手则处理简单且重复的问题。结果，他们所有的竞争对手都会寻求为用户提供类似的交互界面，使用对话式人工智能便成为最低准入门槛。


    由于人工智能影响着我们所做事情的诸多不同方面，这些力量将以多种不同方式引发变革。从商业角度来看，卓越的用户体验直击效率问题的核心。想象一下，你的销售团队必须与一个团队竞争，后者拥有十倍更好、更高效的数据访问能力，并且能够创建新的可视化图表并对其数据提出新问题。当你的团队还在试图借用软件开发人员的时间来编写新查询以生成报告时，另一个团队只需在对话界面中输入或说出他们需要的内容，结果就会显示在团队通讯工具中供所有人共享。我们早已过了“良好的用户体验是事后添加的奢侈品”的阶段，并且正迅速接近这样一个阶段：良好的用户体验将等同于主动、智能的界面，与用户协作解决问题。换句话说，未来的界面将完全依赖于人工智能。


    在本章的其余部分，我将介绍一些正在促成这一变革的技术，以及它们使之成为可能的交互范式。


    ## 对话式界面


    我们的大脑天生为语言而设。作为幼儿，我们在生命的每个小时都在学习新单词，而且往往只需听一次就能开始使用。倾听和交谈（无论是通过语音还是手势）是人类的本能。


    现在，将其与浏览网站或与手机上的应用交互进行比较。这需要特定的努力和训练。我们需要明确地学习它，而且规则不断变化。不同的应用将按钮放在不同的位置，图标也不同，等等。然而，对话依然简单：提问、回答、回应、重复。从人类的角度来看，对话式界面作为前进方向是显而易见的。这正是我们一直在做的事情。


    对话式界面是一种数字界面，其主要交互模式是对话——一种重复的“回答-回应”模式。


    对话式界面可以纯粹使用书面交流（例如，在 Facebook Messenger 内或通过短信）；基于语音（例如，使用 Amazon Alexa 服务）；或混合形式（例如，Siri
    或 Cortana，我们使用语音但接收语音和文本混合的回复）。对话式界面还可以提供丰富的回复，将文本与媒体混合，或通过提供一组选项供我们选择回复来简化对话。


    在接下来的几页中，我将探讨语音和书面对话式界面的发展现状，并解释为什么我认为我们正处于两者都将发生重大变革的起点。

    '
- fmt: '### Voice


    I remember as a teenager being completely enthralled by the technological achievements
    of the 1990s, arguing with my dad about voice recognition. A new software solution
    called `Dragon NaturallySpeaking` was making waves at the time. It was the first
    commercial software that claimed to effectively recognize continuous speech (at
    100 words a minute!). It felt as though the days where we would only ever talk
    to computers were just around the corner. My dad was far more skeptical. While
    dictation software was impressive, he could see all the challenges of voice recognition
    in busy office environments with multiple accents from different cultural backgrounds.
    He could not see how voice could be the main interface with a computer anytime
    soon.


    `Dragon NaturallySpeaking` was first introduced in 1997. I was convinced that
    by the time we got to 2000 it would be the dominant interaction paradigm for computing.
    I was a bit too optimistic. My dad was right. Natural language recognition was
    not anywhere near the required level of capability.


    The history of voice-assisted products goes back even further. In 1962 IBM presented
    the first commercially minded solution at the Seattle World Fair. It was called
    `Shoebox` and could recognize 16 spoken words and perform mathematical functions.
    We’ve been trying to crack the voice challenge for at least the past 60 years!


    Eventually, however, algorithms, data, and computing power advanced sufficiently.
    Now is the time to stand on the side of natural language and voice in the argument.
    There is still a lot of ground to cover but the ingredients are there. Anyone
    with a smartphone has a voice assistant in their pocket. `Siri` was integrated
    into Apple’s iOS in October 2011. Amazon released `Alexa` in November 2014. `Google
    Assistant` launched in 2016, but the technology was gestating as `Google Now`
    since 2012. Every large tech company has a “voice” platform. IBM has `Watson`,
    Microsoft has `Cortana`, and Samsung has `Bixby`.


    By early 2019 over 100 million products with Amazon `Alexa` built into them were
    sold.^([^(37)](#fn37)) This level of adoption is critical. Voice applications
    have many challenges to overcome before they become a stable part of our digital
    environment. The two main ones, however, are getting us into the habit of using
    voice to achieve tasks (even very simple ones) and doing this reliably in any
    number of different situations. Both challenges require broad adoption before
    we see results. Broad adoption means that we are going to be increasingly more
    accustomed to having them around, which will feed enough data back to developers
    in order to improve them so that they can perform reliably. This is why these
    devices are so cheap. The large tech companies know what they need to get the
    ball rolling, and the only way right now is to make it a no-brainer for us to
    purchase the devices. It is such a low price that we simply reason that, worst-case,
    they are a decent speaker or alarm clock!


    Through this mass adoption strategy, the tipping point is getting increasingly
    closer. We finally have:


    1. Natural language recognition technologies (both for going from voice to text
    and then understanding the meaning of that text) that are good enough and widely
    available enough to deal with well-delineated domains

    2. Devices that can support conversation-driven interaction that are cheap enough
    and widely available enough

    3. Development platforms that allow anyone to create conversational applications
    that can be released and reach a mass audience


    This means that we will see an explosion in voice-driven applications as companies
    begin to explore the problem space and find those killer applications.


    ### Text


    The same elements that are driving voice-based conversational applications are
    also driving text-based applications, but currently text has a few significant
    advantages. First, it is very easy to add text-based conversational interfaces
    to web sites and, second, messaging applications are the new kings and queens
    of the digital world.


    The top four messaging applications have at least 4.1 billion monthly active users
    and on average we spend 12 minutes a day within messaging apps^([^(38)](#fn38))
    (the fact that your most likely reaction to that number is that it seems low is
    further proof of how popular messaging apps are!).


    Messaging applications are widely used in business as well of course, with `Skype`,
    `Microsoft Teams`, `Slack`, and many others used daily by millions of people.


    The asynchronous but immediate nature of text-based interactions is particularly
    suitable for a very wide range of everyday tasks. From checking flight details,
    banking issues, to the latest updates from your kid’s school, a text-based message
    is incredibly well suited. According to a Twillio survey^([^(39)](#fn39)) of users
    across the United States, UK, Germany, India, Japan, Singapore, and South Korea,
    89% of users would like to be able to use messaging to communicate with businesses.
    For 18- to 44-year-olds messaging is preferred over e-mail or phone communications.


    We are going to look much more closely at text-based conversational interfaces,
    the technologies behind them, and how they can be transformational for work in
    organizations in Chapters [8](#472369_1_En_8_Chapter.xhtml) and [9](#472369_1_En_9_Chapter.xhtml),
    so I will skip a more lengthy discussion here. The main takeaway, however, is
    that with messaging applications we are past the tipping point. It is where people
    are now and what they like using. Now, the question is if you are looking to take
    advantage of opportunities afforded.'
  raw: '### Voice


    I remember as a teenager being completely enthralled by the technological achievements
    of the 1990s, arguing with my dad about voice recognition. A new software solution
    called Dragon NaturallySpeaking was making waves at the time. It was the first
    commercial software that claimed to effectively recognize continuous speech (at
    100 words a minute!). It felt as though the days where we would only ever talk
    to computers were just around the corner. My dad was far more skeptical. While
    dictation software was impressive, he could see all the challenges of voice recognition
    in busy office environments with multiple accents from different cultural backgrounds.
    He could not see how voice could be the main interface with a computer anytime
    soon.


    Dragon NaturallySpeaking was first introduced in 1997\. I was convinced that by
    the time we got to 2000 it would be the dominant interaction paradigm for computing.
    I was a bit too optimistic. My dad was right. Natural language recognition was
    not anywhere near the required level of capability.


    The history of voice-assisted products goes back even further. In 1962 IBM presented
    the first commercially minded solution at the Seattle World Fair. It was called
    Shoebox and could recognize 16 spoken words and perform mathematical functions.
    We’ve been trying to crack the voice challenge for at least the past 60 years!


    Eventually, however, algorithms, data, and computing power advanced sufficiently.
    Now is the time to stand on the side of natural language and voice in the argument.
    There is still a lot of ground to cover but the ingredients are there. Anyone
    with a smartphone has a voice assistant in their pocket. Siri was integrated into
    Apple’s iOS in October 2011\. Amazon released Alexa in November 2014\. Google
    Assistant launched in 2016, but the technology was gestating as Google Now since
    2012\. Every large tech company has a “voice” platform. IBM has Watson, Microsoft
    has Cortana, and Samsung has Bixby.


    By early 2019 over 100 million products with Amazon Alexa built into them were
    sold.^([^(37)](#fn37)) This level of adoption is critical. Voice applications
    have many challenges to overcome before they become a stable part of our digital
    environment. The two main ones, however, are getting us into the habit of using
    voice to achieve tasks (even very simply ones) and doing this reliably in any
    number of different situations. Both challenges require broad adoption before
    we see results. Broad adoption means that we are going to be increasingly more
    accustomed to having them around, which will feed enough data back to developers
    in order to improve them so that they can perform reliably. This is why these
    devices are so cheap. The large tech companies know what they need to get the
    ball rolling, and the only way right now is to make it a no-brainer for us to
    purchase the devices. It is such a low price that we simply reason that, worst-case,
    they are a decent speaker or alarm clock!


    Through this mass adoption strategy, the tipping point is getting increasingly
    closer. We finally have:


    1.  Natural language recognition technologies (both for going from voice to text
    and then understanding the meaning of that text) that are good enough and widely
    available enough to deal with well-delineated domains


    2.  Devices that can support conversation-driven interaction that are cheap enough
    and widely available enough


    3.  Development platforms that allow anyone to create conversational applications
    that can be released and reach a mass audience


    This means that we will see an explosion in voice-driven applications as companies
    begin to explore the problem space and find those killer applications.


    ### Text


    The same elements that are driving voice-based conversational applications are
    also driving text-based applications, but currently text has a few significant
    advantages. First, it is very easy to add text-based conversational interfaces
    to web sites and, second, messaging applications are the new kings and queens
    of the digital world.


    The top four messaging applications have at least 4.1 billion monthly active users
    and on average we spend 12 minutes a day within messaging apps^([^(38)](#fn38))
    (the fact that your most likely reaction to that number is that is seems low is
    further proof of how popular messaging apps are!).


    Messaging applications are widely used in business as well of course, with Skype,
    Microsoft Teams, Slack, and many others used daily by millions of people.


    The asynchronous but immediate nature of text-based interactions is particularly
    suitable for a very wide range of everyday tasks. From checking flight details,
    banking issues, to the latest updates from your kid’s school, a text-based message
    is incredibly well suited. According to a Twillio survey^([^(39)](#fn39)) of users
    across the United States, UK, Germany, India, Japan, Singapore, and South Korea,
    89% of users would like to be able to use messaging to communicate with businesses.
    For 18- to 44-year-olds messaging is preferred over e-mail or phone communications.


    We are going to look much more closely at text-based conversational interfaces,
    the technologies behind them, and how they can be transformational for work in
    organizations in Chapters [8](#472369_1_En_8_Chapter.xhtml) and [9](#472369_1_En_9_Chapter.xhtml),
    so I will skip a more lengthy discussion here. The main takeaway, however, is
    that with messaging applications we are past the tipping point. It is where people
    are now and what they like using. Now, the question is if you are looking to take
    advantage of opportunities afforded .'
