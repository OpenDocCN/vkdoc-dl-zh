    that can be fed with your own data and composed to provide more comprehensive
    solutions


    Of course it’s not just about cloud-based services from the big providers. There
    is a wealth of open source tools such as spaCy for natural language understanding
    that provide incredible capabilities and require little effort to get started.


    The appeal of these ready-made capabilities is that you can plug into your solutions
    without requiring specialist in-house skills to understand them. Your differentiator,
    once more, is in how you compose the solution and the quality of the data and
    overall problem understanding that you bring to the table.


    #### Build AI


    The last step is to actually invest in building basic AI internally. This makes
    sense once you have more clarity about the state of your processes and data and
    can start building your own models, combining foundational techniques such as
    neural networks, reasoning, etc. It will mean building out AI skills in-house
    and requires a bigger investment, but it is also the space that is likely to bring
    the most interesting returns because this is the area that you can truly differentiate
    what you do. The balancing act to handle here is ensuring that you are investing
    in the right direction in building your own AI and are not simply trying to compete
    with technology behemoths.'
  trans: '

    #### 雇佣内置 AI 的工具


    一个非常直接的选择是“雇佣”那些内置了 AI 能力的服务。这能让你在 AI 进化阶梯上立即迈出一步，而无需投入大量资源进行内部开发。有成千上万的供应商竞相为企业提供智能能力，利用这种创新是观察
    AI 能力如何增强你当前工作流程的绝佳方式。


    从实际落地的角度来看，这意味着为你的采购决策增加一个新的维度，即明确评估某项服务在自动化方面创造的可能性，以及这些可能性如何满足你的需求。有两个关键问题需要考虑：


    它是否解决了组织内的真实需求？它是否解决了我们面临的一个真正问题，并且这个问题能从自动化中受益？这看似是一个显而易见的问题，但它能防止“清单式采购”——即采购决策由组织内的某个独立部门完成，而该部门所做的只是勾选清单上的“AI
    能力”选项。正如我们在本书中多次提到的，AI 技术千差万别。在很多方面，仅仅指定“AI 能力”几乎就像指定计算机程序应该使用某种编程语言一样笼统！相反，我们必须针对我们试图解决的问题，去寻找我们需要的特定能力或能力组合。


    底层数据是如何处理的？你能否在不使用该产品的情况下使用这些数据？产生的数据能否反馈回我们在本章开头描述的那个良性循环中？我认为这一点至关重要。回到我们之前描述的数据评级方案，我们可以判断我们雇佣的系统将产生什么类型的数据，以及这会导致对特定供应商的何种锁定程度。通过自身活动所产生的理解是宝贵的知识产权，理想情况下应严格保护。当所有竞争对手都使用相同的工具时，正是该工具的数据和流程配置能为你带来竞争优势。


    所有主要的供应商都提供了有趣的解决方案，让你能够“雇佣”内置 AI 的解决方案。例如，主要的 CRM 供应商（Salesforce、Oracle、SAP、Adobe、Microsoft）都已将
    AI 能力捆绑到其 CRM 工具中。让我们简要看看 Salesforce 的做法，因为它正是我们在此讨论的策略类型的真实案例。第一步是认识到，在其 CRM
    中提供 AI 能力将代表一个关键的竞争优势和潜在的差异化因素。然后，为了快速建立其 AI 能力，他们开始了收购狂潮，购买那些提供特定功能（如智能会议管理，即内置
    AI 的工具）的 AI 初创公司。接着，他们收购了将底层技术融入其中的公司，以便能够创建机器学习平台——从而实现“用 AI 构建”。所有这些初创公司最终被整合成一个名为
    Einstein 的综合解决方案，使 Salesforce 能够构建新的 AI 技术和能力。Einstein 提供了诸如账户洞察、潜在客户优先级排序和自动数据录入等功能。


    #### 用 AI 构建


    接下来的方法是利用易于获取的 AI 组件来构建解决方案。在这种情况下，你不是直接雇佣带有预定义用户界面和功能列表的最终功能。相反，你是在构建自己的工具（例如，一个能够查看潜在候选人排名的仪表板），并使用外部
    AI 平台为你提供必要的能力（例如，自然语言处理）。


    同样，所有主要技术提供商都提供了易于访问的 API。微软的认知服务包括支持决策、视觉、语音、搜索和语言的工具。亚马逊 AWS 将其命名为推荐、预测、图像和视频分析、高级文本分析、文档分析等。正如你从这些服务的名称中看到的，这些都是广泛的能力，可以用你自己的数据来喂养，并组合起来提供更全面的解决方案。


    当然，这不仅仅关乎大供应商的云服务。还有大量开源工具，例如用于自然语言理解的`spaCy`，它们提供了令人难以置信的能力，并且几乎不需要什么努力就能上手。


    这些现成能力的吸引力在于，你可以将它们接入你的解决方案，而无需内部专家来理解它们。你的差异化优势，再次体现在你如何组合解决方案，以及你所带来的数据质量和整体问题理解能力上。


    #### 构建 AI


    最后一步是真正投资于内部构建基础 AI。一旦你对自身流程和数据的状况有了更清晰的认识，并能够开始构建自己的模型，结合神经网络、推理等基础技术时，这一步就变得有意义了。这意味着要在内部培养
    AI 技能，需要更大的投资，但这也是最有可能带来最有趣回报的领域，因为这是你能够真正实现差异化的地方。这里需要把握的平衡是，确保你正朝着正确的方向投资于构建自己的
    AI，而不是简单地试图与技术巨头竞争。

    '
- fmt: '# AI Everywhere


    Developing and defining your own AI strategy, as with any high-level strategic
    work, is a challenging but ultimately highly rewarding activity. It means that
    you will need to dig deep into understanding your own motivations and the motivations
    of your colleagues and organization as a whole. It means looking at how you solve
    problems and attempting to derive explicit rules and clarity. That process alone
    is incredibly valuable. It is one thing to look at processes for the purpose of
    documenting them for other humans and quite another to look at that same process
    and attempt to describe it to a machine. It forces a level of clarity that at
    times may even feel uncomfortable or awkward. The outcome, however, will undoubtedly
    be very valuable.


    We’ve seen that there are quite a few options about how to get started on the
    journey from hiring AI, building with AI, and building AI. Each has its own advantages
    and disadvantages and while they may feel like different steps along an evolutionary
    ladder, they are not mutually exclusive. They can coexist, and you can make different
    choices for different use cases within your organization. It also means that you
    can get started quickly and you can start showing the benefits of an AI strategy
    early on, which in turn will fuel further support and make the next steps easier
    to sell to the rest of the team.


    AI techniques and capabilities will influence every aspect of the workplace. I
    hope I have demonstrated throughout this book that I am not one to get excited
    by fads and hype. Given how hyped AI technologies are at this point in time, it
    may be hard to see through that to what their real impact can be. However, as
    we argued in the first chapters, the impact of AI will be far-reaching. Comparing
    it to fire and electricity (as companies such as Microsoft and Google are doing)
    may sound far-fetched. There is truth in those statements though. Just like fire
    or electricity, AI has the ability to change how we do everything. If you start
    from a position that is pragmatic about the challenges but also recognizes the
    opportunities, you can make a lasting impact on how work is done in your organization.
    Getting started on an AI strategy may be one of the most significant decisions
    for the future of your organization.


    Footnotes [1](#472369_1_En_11_Chapter.xhtml#Fn1_source) [2](#472369_1_En_11_Chapter.xhtml#Fn2_source)
    [3](#472369_1_En_11_Chapter.xhtml#Fn3_source) [4](#472369_1_En_11_Chapter.xhtml#Fn4_source)


    # 12. The Ethics of AI-Powered Applications


    Why do we need to talk about ethics in the context of AI-powered applications?
    Isn’t it just like any other piece of software or any other machine? Aren’t the
    rules that are already in place enough to cover us? Is this about machines taking
    over the world!?


    Let’s start with the last question. No, this is not about machines taking over
    the world. There are, undoubtedly, hugely interesting ethical considerations that
    we will have to tackle if and when we get to the point of having machines that
    act autonomously with artificial general intelligence. However, as we already
    discussed in Chapter [2](#472369_1_En_2_Chapter.xhtml), there is no immediate
    worry of that happening and even if it somehow did happen, this is not the book
    that is going to tackle the ethical concerns raised. The issues we are concerned
    with here are not around machines taking over the world. We are concerned with
    machines behaving in ways that are not safe, where their actions cannot be explained,
    and that lead to people being treated unfairly without any way to rectify that.


    AI-powered applications merit specific consideration because software that performs
    automated decision-making is materially different from other types of software.
    As we discussed in Chapter [3](#472369_1_En_3_Chapter.xhtml), we are dealing with
    software that has a certain level of self-direction in how it achieves its goals
    and potentially autonomy in what goals it generates. Most other software is passive,
    waiting for us to manipulate it in order for things to happen.


    Furthermore, the level of complexity of AI software means that we need to explicitly
    consider how we will provide explanations for decisions and build those processes
    in the software itself. At this level of complexity, the path that led to a specific
    decision can easily be lost. This is especially true of data-driven AI techniques,
    where we are dealing with hundreds of thousands or millions of intermediate decision
    points (e.g., neurons in an artificial neural network) all leading to a single
    outcome.


    Therefore, precisely because AI-powered software is not like other software, we
    have to explicitly address ethical considerations, how they can weave themselves
    into software, and how we uncover and deal with them. With AI we are not programming
    specific rules and outcomes. Instead we are developing software with the capability
    to infer, and based on that inference make choices. Put simplistically, it is
    software that writes software. We, as the creators, are a step away from the final
    outcome. Since we are not programming the final outcome, we need to build safeguards
    to ensure it will be a desirable one.'
