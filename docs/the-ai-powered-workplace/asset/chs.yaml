- "# 定义人工智能战略\n\n2017 年，在一年一度的 Google I/O 大会上，谷歌首席执行官桑达尔·皮查伊登台宣布，人工智能带来的机遇如此巨大，以至于谷歌正从“移动优先”战略转向“人工智能优先”战略。这一声明真正向许多人传达了人工智能的重要性以及制定人工智能战略的必要性。这家科技巨头谷歌，正在转型为一家全面的人工智能公司。他们过去曾暗示过这一点；每个人都知道谷歌在人工智能领域投入巨大并广泛使用，但这次不同。它不容置疑：人工智能优先。\n\
  \n如果我们停下来稍作分析，从“移动优先”转向“人工智能优先”究竟意味着什么？嗯，“移动优先”战略认识到，人们访问数字服务的主要方式是通过移动设备。因此，谷歌生产的任何产品，首先且最重要的是必须在移动设备上运行良好。仅限桌面的产品根本不是一个选项。谷歌“移动优先”战略背后的假设是，如果它能提供最流畅、最快的移动体验，用户就会蜂拥而至使用其产品。当时的挑战在于，“移动优先”开发需要集中精力，并面临技术挑战。它需要高层的支持，因为它产生了额外的产品开发资源需求。谷歌的这一战略很快成为了科技公司的常态。如今，宣称自己是“移动优先”已不再是一项战略。“移动优先”仅仅是任何数字产品的一个合理基石，而非一项巨大成就。没有必要将其作为公司定义性的、面向外部的战略声明。这已是常规操作。\n\
  \n随着 2017 年“人工智能优先”的宣布，谷歌公开承认，新的机遇和挑战即将到来。这个机遇再次围绕着满足用户的期望和需求。用户现在是精明的数字公民。我们都期望我们的设备能达到一个全新的复杂水平，尤其是当我们瞥见事物可以如何更好地运作，并且不再对数字服务感到神秘时。仅仅能从任何设备访问服务，或者服务可靠，已经不够了。技术更先进的科技公司正在展示智能互联服务可以有多智能，这反过来又让我们希望所有服务都能以同样的方式运作。当你可以点任何餐食并在\
  \ 20 分钟内送到家门口，或者购买任何商品并在当天送达时，这就会产生一套特定的期望。这反过来又形成了一个反馈循环，迫使公司升级他们所做的一切。为了在竞争中保持领先并满足用户，服务必须更加了解我们的环境和需求，并做出适当的反应，甚至主动预测它们。如果一个应用程序“不理解”我们，我们会很快称其无用，沮丧地抱怨，然后转向下一个。然而，通往更友好用户服务的道路是由人工智能技术铺就的。这就是“人工智能优先”战略的含义：认识到你的产品和服务下一次演进将在很大程度上取决于你通过使用人工智能技术来增强它们的能力。它也承认，整合人工智能技术需要集中精力和专注，以克服那些必然会出现的挑战。这并非常规操作。\n\
  \n“人工智能优先”战略承认，通往更智能、更优质服务的道路，取决于一个组织有效利用人工智能技术和能力的能力。\n\n当然，这不仅仅是谷歌。每一家主要的科技公司都在进行重大的人工智能投入，既在改变内部工作方式，也在改变其提供的产品。IBM\
  \ 自 2010 年以来一直在推广 IBM Watson 品牌，甚至在 2011 年因其在美国的电视游戏节目《危险边缘！》中获胜而一度使其家喻户晓。SAP 拥有\
  \ Leonardo 平台，他们称之为一个以机器学习和其他人工智能技术为核心的全方位数字创新系统。Salesforce 拥有 Einstein，这是一个将人工智能融入其\
  \ CRM 产品的人工智能平台。可以说，亚马逊在考虑如何利用人工智能改变其业务的每一个方面方面，与谷歌一样先进。苹果的战略则是全方位的，通过人工智能增强服务，*并且*其硬件也在进化，通过专用芯片更好地支持人工智能，这些芯片能够加速设备上特定的人工智能计算。\n\
  \n面对这些科技巨头的努力，人们不禁感到有些不知所措。这种努力已经达到了白热化的程度，以至于大学抱怨他们无法为自己的 AI 研究团队配备足够的人员，因为公司正在以他们能找到的最快速度招聘人才。^(⁵⁵)\n\
  \n其他组织如何以简单明了的方式发展自己对人工智能的思考？我们是否都应该转向“人工智能优先”战略并加入这场竞赛？我们是否需要开始招聘人工智能专家？\n\n本章的主要目标之一，是为你提供一种制定自己人工智能战略的实用方法。这不是关于加入人工智能竞赛（除非有极其充分的理由这样做）。而是关于确定要遵循的原则，以及在你特定的旅程中，针对不同阶段和不同需求要应用的策略，从而确保你能够充分利用人工智能技术为你的业务带来的价值。\n\
  \n\n\n## AI 战略的实用方法\n\n> *“[战略是]将力量应用于最有希望的机会。”*\n> \n> ——理查德·P·鲁梅尔特，《好战略，坏战略》^(⁵⁶)\n\
  \n为任何事物制定战略都是一项极其艰巨的任务。你唯一能依据的信息是过去发生的事情。未来将要发生的一切，归根结底都是一种猜测。与 AI 技术的工作原理类似，战略依赖于你基于迄今为止所掌握的信息，建立一个关于世界如何运作的模型，并设计一套规则，使你能够对未来做出预测。然而，与\
  \ AI 目前能帮助我们解决的问题不同，你需要处理几乎无限多的变量。更糟糕的是，没有一种放之四海而皆准的解决方案。你必须制定适合你所在组织的战略，而最适合你团队的战略，几乎必然地，对另一个地方来说是不合适的。\n\
  \n因此，不存在一个能让你获得理想 AI 战略的单一秘诀。只有你自己知道真正的“食材”是什么。我能做的是讨论一般原则、准备方法以及具体的应用方法。就像厨房里的厨师面对一个神秘的食材盒子一样，你的任务是打开盒子，弄清楚你有哪些可用之物，并尽可能充分利用每一种食材。\n\
  \n### 原则\n\n战略的原则就像指路明灯，当基本事实没有明确指向某个选择时，帮助我们选择一条方向而非另一条。我在此提出的原则，是浓缩了与众多大小型组织的无数次对话，探讨了哪些方法对他们有效、哪些无效，以及哪些是值得关注的重点，哪些又是分散注意力的干扰项。\n\
  \n#### 大处着眼，现实起步，适度扩展\n\n熟悉精益创业运动的人会在这个标题中看到该运动口号的影子。它通常是：“大处着眼，小处起步，快速扩展。”精益创业运动由埃里克·莱斯发起，他通过其著作《精益创业》^(⁵⁷)描述了一种拥抱不确定性、通过执行精心管理且成本有效的实验来测试商业模式可行性，从而将风险降至最低的商业方法论。这些实验旨在测试新功能或新产品背后最关键的核心假设，然后再将该产品扩展到全面生产。对于精益创业者来说，拥有一个宏大的长远愿景很重要，但要从成本不高的小实验开始，然后再尽可能快地扩展以获取市场价值。将\
  \ AI 技术应用于工作场所的战略，可以从同样的思维方式中受益。同时，有几点需要牢记——这也是我为何将这句口号改为“大处着眼，现实起步，适度扩展”的原因。\n\n\
  ##### 大处着眼\n\n将 AI 技术应用于我们工作方式的潜力是变革性的。为了理解其真正的范围并赋予其适当的重要性，必须大处着眼。就像谷歌公开宣称其“AI\
  \ 优先”战略一样，关键在于赋予整个使命足够的重要性，以便人们能够重视并恰当地优先处理它。\n\n大处着眼也意味着要认识到，自动化不仅仅是“以更低的成本或更快的速度做更多同样的事情”。不要将企业中引入自动化等同于工厂流水线，在那里部件\
  \ A 可以以更快、更不易出错的方式连接到部件 B。通过 AI 实现的自动化还能开启全新的做事方式。它催生了新的商业模式。这是一个循环：自动化的需求导致信息和流程的数字化，而数字化又产生了更多可供进一步利用的信息，并最终带来全新的解决问题的方法。\n\
  \n例如，自动化支持处理不仅仅意味着你将需要更少的资源来处理相同数量的支持请求。它还意味着，随着每个支持请求被日益复杂的自然语言理解能力仔细分析，你可以更好地理解支持问题。由此产生的数据可以直接反馈到产品开发中，而产品改进的结果可以追溯到发布后通过支持渠道提出的问题类型。这意味着你可以将你的支持团队转变为客户成功团队，以完全不同的方式与客户互动。在支持处理中引入自动化，可以影响从产品设计和开发方式到客户关系管理的整个业务环节。然而，要充分发挥这项工作的全部效益，你需要一个宏大的愿景版本，以便在每个阶段设置正确的垫脚石，从而能够到达山顶。\n\
  \n图 11-1 展示了任何流程的这种流转。我们从拥有历史数据并理解自身流程的地方开始（1），然后通过自动化来增强我们的标准流程（2）。如果做得仔细并着眼于未来，这可以带来增强的数据和理解（3）。这种增强的理解开始形成一个良性的反馈循环，它不仅可以反馈到增强现有流程（2）中，还可以创造额外的机会（4），甚至催生新的流程（5）。\n\
  \n![../images/472369_1_En_11_Chapter/472369_1_En_11_Fig1_HTML.jpg](img/472369_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1. AI 良性流程增强循环\n\n##### 现实起步（并逐步演进）\n\n应用新技术总是伴随着高风险。这不是常规业务。你需要能够吸收并应对大量的学习成果，事情也不会像你预期的那样发展。精益创业方法使得人们倾向于从小实验（最小可行产品）开始，在投入额外资源之前测试一个关键假设。总的来说，这是一个非常明智的方法。当然，关键问题在于，一个最小可行产品究竟可以“最小”到什么程度。它必须足以提供信息，让你判断是否值得将整个努力扩展。如果产品过于简单和微小，它将毫无用处。\n\
  \n在使用 AI 技术时，我们处于非常相似的情况。如果你试图部署一个预测算法，你需要确保给予足够的空间，让人们准备足够的数据并尝试足够多的方法，以便对问题是否能够解决有一个坚实的理解。可以将其视为太空发射的逃逸速度。工程师们知道，除非发射导弹能够达到\
  \ 25,000 公里/小时的速度，否则它将无法摆脱地球的引力。如果你知道你在工程上的投入不足以超过这个最低门槛，那么你最好将这笔钱花在别处。\n\n现在，认识到这个门槛在哪里，需要结合经验以及接受一些失败尝试的意愿。因此，我认为一个计划必须通过两个关键测试。第一个是确保路线图中的各个步骤有足够的清晰度，以便能够对其可行性进行一些初步研究，并且没有任何一个步骤大到一旦失败就没有调整方向的空间。第二个是确保每个步骤都获得适当水平的输入，这是一种“就绪门”，确保你做得足够多使其有用，但又不会做得过多。如果完成一个步骤后，你未能达到进入下一个步骤的“就绪门”，那么你可以停下来重新考虑。\n\
  \n\n\n##### 适度扩展\n\n我们当然希望快速扩展。自动化决策的一大吸引力在于，它能让组织运转得更快。\n\n然而，恰恰是因为自动化能够快速扩展的特性，以及自动化本身的性质，我们才需要对扩展的速度保持谨慎。在这种情况下，自动化依赖于利用过往数据和知识，来编码工作场所中某个特定方面的运作规则。最终生成的软件程序，其优劣程度完全取决于我们对自身问题的理解以及所使用的数据。在将用户从一千扩展到一万，或者从一个地区扩展到另一个地区之前，我们需要确保其底层假设保持不变。如果急于将自动化模型扩展到测试环境之外，却没有设置检查机制来确保其按预期运行，就可能导致意想不到的后果，例如在决策中表现出偏见，或引入难以察觉的错误。\n\
  \n#### 切实成果至关重要\n\n人工智能战略，如同任何其他计划一样，需要考虑其发展的更广泛环境。太多时候，任何新事物都会被隔离起来，放进创新实验室里研究和试验，但在现实业务中却难以见到天日。像人工智能这样的技术尤其如此。\n\
  \n创新实验室本身并非坏主意。有能力组建专门团队进行试验的组织是幸运的，他们应该充分利用这些可能性。然而，创新的经验教训需要接受现实情况的严酷考验。除非你处理了问题的全部现实，否则你并没有解决整个问题。这就好比你说想造一辆火星车去探索火星，却只在自家附近的道路上测试它。\n\
  \n一项人工智能战略，如果没有规划好技术如何从创新团队的“茧房”走向实际业务，就不是一个完整的战略。这包括说服那些背负日常运营优先事项、压力重重的业务部门采纳新技术；包括确保解决方案能带来可衡量的收益，从而对部门的预算产生实质性影响；还包括处理员工对于被自动化取代的担忧，并制定培训计划来应对工作方式的变革。如果这些要素都不具备，你就无法真正衡量这项努力的成败。\n\
  \n#### 人工智能战略无关人工智能\n\n这个标题是故意反直觉的。\n\n人工智能战略并非要不惜一切代价使用人工智能。我见过太多公司迷失在“无论如何都要让\
  \ AI 发挥作用”的尝试中，以至于我觉得这一点必须从一开始就讲清楚。\n\n正如我们在本书中反复强调的，人工智能有助于我们将决策权委托给机器。同时，正如本章引言所述，人工智能帮助我们满足用户的需求和期望。然而，人工智能本身并不是目的。目标从来都不应该是，也绝不应该仅仅是“使用人工智能”。人工智能战略的目标是创造必要的先决条件和流程，使组织能够：\n\
  \n1.  确定人工智能技术是否适用，以及能否帮助以更好的方式解决问题。\n2.  确保组织在人工智能技术适用的情况下，有能力抓住机遇。\n\n如果流程的最终结果是，使用人工智能技术来解决某个特定问题根本不是一个好主意，那也完全没问题。\n\
  \n这正是某个对话式人工智能项目中所发生的情况。该组织希望实施一个聊天机器人，来处理那些在国外遇到旅行证件问题的客户的咨询。他们投入精力思考，应该采用什么样的语言理解方案来识别旅行证件发生了什么（丢失、损坏、被盗等）。然而，当需要理解针对每种问题类型应该给出什么恰当回应时，他们意识到回应总是相同的。无论问题原因是什么，处理方式始终是填写同一张表格，或者在紧急情况下通过电话联系。所有前期用于识别问题原因的努力都是不必要的。这是一个可以通过改进网站信息架构来解决的问题，根本不需要使用任何人工智能技术。\n\
  \n#### 不存在需要通过的“真正”人工智能测试\n\n与上一条原则类似，这条原则也是源于另一个常见的陷阱。当人们开始人工智能项目时，主要担忧之一就是要做一些“真正”的人工智能。从很多方面来看，有这种担忧是很自然的。我们正在处理定义极其模糊的新技术。人们觉得，面对大量相互矛盾的信息，他们需要确保自己是在做“正确的事情”。无论是招聘还是寻求外部帮助，组织都希望确保自己不会被“假”人工智能“欺骗”。\n\
  \n结果往往是，问题的解决方案被过度设计，或者完全合适的解决方案被弃用，因为它们没有通过某个模糊的“人工智能”测试。在处理虚拟助手时，这通常涉及讨论什么样的对话才算足够复杂，*感觉*像人类。简单、直击要点的对话被开放式对话所取代，后者为了达到这种类人标准而模仿更自然的语言。对于预测算法和机器学习，则常常是抛弃那些建议使用标准、成熟的统计学技术的建议，转而采用直接使用深度学习的技术，因为深度学习*感觉*更像是真正的人工智能。\n\
  \n这些问题的挑战在于它们难以处理。最终的解决方案是有效的。问题得到了解决。但这是一个脆弱得多的解决方案，因为强加了比实际需求更多的人工智能技术。每个人都感到兴奋，因为它感觉更未来化，但实际上，随着解决方案的演进，他们只会给自己带来更多麻烦。\n\
  \n一个全面的人工智能战略需要包含一些检查点，在这些节点上，要诚实地讨论：该解决方案是否是解决当前问题的最佳方案，或者它是否仅仅是为了满足展示人工智能应用的需求，而不是为了真正收获这项技术的益处。\n\
  \n\n\n#### 确定你是否真的想要它\n\n谈论事情应该如何是很容易的。没有人会反对那些精美的图表，它们将用户置于中心，周围环绕着同心圆，整齐地标注着协作、沟通和连接等词汇。然而，带来真正的改变却很难。现实很少能与这些理想化的方法相匹配。现实是混乱的，层层叠叠的流程、数据、工具和人员随着时间的推移不断演变和变化。现实也不会暂停。你无法按下暂停键，想清楚要做什么，将其落实到位，然后再按下播放键。决策将是相互关联的，当前状态和未来状态需要持续的理解和梳理。\n\
  \n正因如此，实现人工智能战略（实际上也包括任何其他战略）的最大挑战，是获得所有利益相关者的坚定承诺，让他们相信这是一项值得投入的使命。这包括你——你所在组织中的人工智能先驱。在个人和组织层面，都需要接受这样一个事实：要让数字化工作场所开始与你的愿景和使命保持一致，将是一个漫长而复杂的过程。没有简单的解决方案，没有银弹，问题也不在于你能投入多少钱（尽管显然需要资源）。\n\
  \n因此，首先要问的真正问题是：你个人以及整个团队，是否愿意踏上改变和改善事物的旅程？根据组织的不同，这趟旅程开始时可能很孤独，你可能需要多次向不同的利益相关者陈述你的理由，而他们都需要为这项努力做出承诺。然而，尽管听起来像陈词滥调，但决定这趟旅程值得一走，是最重要的一步。\n\
  \n### 方法\n\n上一节为我们提供了一些原则，帮助我们判断和引导计划。下一步是研究一些更具体的方法，帮助我们启动并实现计划。\n\n#### 找到你的位置\n\
  \n在制定通过人工智能技术引入自动化的计划时，你最终总会问三个非常具体的问题。\n\n1.  我们目前如何解决问题？我们处理问题要经历哪些步骤，定义流程的规则在哪里？\n\
  2.  我们拥有关于这个问题的哪些数据？我们有哪些历史数据，这些数据的状况如何，能否帮助我们更好地理解问题？\n3.  目前有哪些活动正在进行，它们会增强还是阻碍我们使用人工智能技术解决特定问题的能力？\n\
  \n##### 我们目前如何解决问题？\n\n绘制流程图是任何组织的一项基本任务，有许多技术可以帮助实现这一点，从业务流程建模到数据流建模。本章的任务不是介绍这些技术。相反，它着重强调了一些与理解流程相关的问题，目的是将人工智能技术应用于这些流程。\n\
  \n###### 揭示真实流程\n\n大多数客户服务支持自动化问题的解决者学到的第一课是，一线人员处理问题的方式会与手册描述的不同，而且这样做有充分的理由：手册是错的。\n\
  \n人类作为聪明且适应性极强的生物，已经找到了流程中的所有捷径、技巧和变通方法，使它们真正发挥作用。他们划掉了手册中的错误信息，在屏幕上贴上一张写着修正方法的便利贴，然后继续工作。当我们尝试引入自动化时，需要确保*这些*知识被捕获并纳入自动化流程中。\n\
  \n自动化意味着要花时间与真正执行任务的人在一起，了解当前真实的流程是什么样的。这将提供宝贵的信息，告诉我们哪些可以有效地完全自动化，以及可以做些什么来增强和协助流程中的人员。\n\
  \n###### 用人类模拟流程\n\n无论是尝试自动化现有流程，还是引入新流程，考虑是否能够模拟该流程都是有用的：简单来说，就是能否用人类来“假装”实现它。尽管这看起来可能很繁琐，但我建议你找一位志愿者，让他*充当*这个流程的起点。让一个人坐在键盘后面，*假装*是一个自动化的采购信息服务系统，回答来自组织内部关于各种发票状态的问题。\n\
  \n这为你提供了宝贵的信息，让你了解人们将如何与自动化服务交互，而无需实际构建该服务本身。这些交互反过来可以为服务的开发提供信息，并揭示服务与组织集成方面的问题。花几天时间了解人们可能如何使用该服务，是成本效益最高的方式。\n\
  \n###### 不要忽视经验\n\n当然，并非所有解决方案都能由人类模拟。如果你想根据 CRM 中的信息进行数据分析，找出最佳销售线索进行联系，那么你必须进行数据分析。然而，你应该尽快引入领域专家，让他们解读数据，看看他们的直觉是否与数据所说的一致，或者是否存在显著的不匹配。如果存在不匹配，就需要进行审查。这并不意味着数据错了，或者专家错了。你只需要认识到，数据分析会发现相关性，但并非所有相关性都能转化为实际有效的因果关系。专家能够排除一些更明显的误导性结果。\n\
  \n##### 我们拥有哪些数据？\n\n我们已经在上一章讨论过数据。不过，我们遗漏了一个问题：梳理当前存在哪些数据。为了提供一个描述数据的简单框架，我将借鉴开放数据运动提出的想法。蒂姆·伯纳斯-李（是的，就是那位蒂姆——万维网的发明者）提出了一个五星级方案，用于描述公开共享的开放数据^(⁵⁸)。然而，它也是描述组织内部数据的有用指南，尤其是当我们考虑数据在不同群体和部门之间共享时。\n\
  \n###### 一星——数据以任何格式可供使用\n\n第一步很简单，就是让数据以任何可能的格式可供使用，并且能够被更广泛的组织访问。组织内一星数据的检验标准是，人们能够实际找到它，并能追溯谁负责它，以及管理访问权限的规则是什么。这些数据很可能是\
  \ PDF 文档中的非结构化数据，但至少是可查找的。你需要部署更复杂的技术，如文本挖掘，来提取数据。\n\n###### 二星——数据以结构化格式可用\n\n\
  更进一步，是让这些可查找且可归属的数据以更机器友好的结构化格式存在。例如，它可以是 Excel 电子表格，而不是表格的扫描件。结构化数据意味着更容易获取，但你仍然可能处理的是当前没有任何软件使用的文件格式，或者其背后的模式未被充分理解或记录。\n\
  \n###### 三星——数据以被充分理解的结构化格式可用\n\n三星数据是指你可以以被充分理解的结构化格式访问的数据。我们可能处理的是 CSV（逗号分隔值）文件或数据库表。你仍然需要挖掘有关模式和数据访问的信息。\n\
  \n\n\n###### 四星——通过有文档记录的 API 获取数据\n\n在这种情况下，我们处理的是可通过有文档记录且维护良好的 API（应用程序编程接口）获取的结构化数据。这意味着另一端有一个团队负责管理数据访问，并且已经建立了更完善的数据治理流程。\n\
  \n###### 五星——跨数据集链接数据以提供上下文\n\n对于五星级数据，我们不仅能够通过文档完善的 API 进行访问，这些数据还与组织内的其他数据集相互关联，使我们能够对数据的上下文做出更有趣的推断。\n\
  \n发现数据集并对其进行排序，可以绘制出一张地图，指明最佳起点在哪里。我们可以从质量最高的数据入手，证明 AI 驱动的自动化的价值，并激励我们改进其余数据集。\n\
  \n#### 连接各项活动\n\nAI 战略的制定和执行不应被视为与其他活动孤立进行的事情。至关重要的是，它要从一开始就为思考提供信息。你可以将 AI 能力视为一个工具箱，在问题出现时从中取出有用的工具来帮助解决。你可能会认为，既然\
  \ AI 是一种技术、一种解决问题的方式，那么在定义总体战略时就不需要它登场。只有当你需要构建解决方案时，才开始探索 AI 技术和能力的领域，看看哪些适用于你的问题。\n\
  \n我认为这种方法是存在缺陷的。它未能充分利用战略最重要的方面之一：协调各项活动，使整体大于部分之和。AI 战略不能也不应该与更广泛的数字战略孤立开来，而数字战略又应与你的总体战略相连接。三者相互支持，为整体的成功奠定基础。如果你将\
  \ AI 仅仅视为另一种可以使用的工具，你就会错过制定那些只有借助 AI 能力才能实现的战略。\n\n将你的总体战略、数字战略和 AI 战略连接起来至关重要。三者相互启发，能够实现那些如果各方面孤立处理就无法达成的目标和行动方案。\n\
  \n在更具体的层面上，连接活动还意味着确定如何最佳地安排项目的时间和协调项目，以便整体上获得积极成果。一个典型的*未能*做到这一点的例子是：当组织内的一个团队正在开发自动预测能力时，而生成该预测所依赖数据的软件却已被计划替换——这无异于给第一个团队釜底抽薪。\n\
  \n你要避免出现下面这样的对话：\n\n- “新的 CRM 项目进展顺利——新系统将在明年初上线运行。”\n- “新 CRM 能否提供我们进行预测所需的关系数据和历史销售数据？”\n\
  - “我不知道。一年前向供应商发出招标书时，这并不在需求范围内。”\n- *“……”*\n\n牢牢掌握流程、数据流以及会影响这些的活动，对于协调成功的 AI 实施至关重要。这确实需要在规划阶段付出努力，并且表明需要更广泛的相关方参与，以便每个人都了解变化将如何影响整个团队的活动。\n\
  \n#### 构建你的路线图\n\n一旦我们更好地掌握了当前所处的位置，就可以开始规划通往目标所需的步骤。在最高层面上，我发现考虑三种宽泛的可能性很有用。在某种程度上，这三种方法可以被视为\
  \ AI 能力演进过程中的阶段，但最终它们是三条可以同时推进的路径，有时你也可以决定从一条路径转向另一条。这三条路径是：\n\n- **采购内置 AI 的工具。**\
  \ 在这种情况下，我们寻找的是已经内置 AI 能力的工具。我们不需要从头开发任何东西。只需利用现有的工具即可。\n- **使用预构建的 AI 组件构建解决方案。**\
  \ 在这里，我们开发自己的定制解决方案，但在使用 AI 技术或能力时，我们并不训练或开发自己的模型。相反，我们使用经过预训练或以某种方式预先打包的 AI 服务，来提供我们所需的功能。\n\
  - **构建 AI 组件和基础设施。** 最后，我们可以考虑构建自己的 AI 模型，并将其纳入更广泛的解决方案中。这一步可以进一步细分为：使用现有技术构建 AI\
  \ 模型，或开发新技术来帮助我们推导模型。\n\n我们将在接下来的章节中更详细地讨论每个选项。\n\n\n\n##### 雇佣内置 AI 的工具\n\n一个非常直接的选择是“雇佣”那些内置了\
  \ AI 能力的服务。这能让你在 AI 进化阶梯上立即迈出一步，而无需投入大量资源进行内部开发。有成千上万的供应商竞相为企业提供智能能力，利用这种创新是观察 AI\
  \ 能力如何增强你当前工作流程的绝佳方式。\n\n从实际落地的角度来看，这意味着为你的采购决策增加一个新的维度，即明确评估某项服务在自动化方面创造的可能性，以及这些可能性如何满足你的需求。有两个关键问题需要考虑：\n\
  \n它是否解决了组织内的真实需求？它是否解决了我们面临的一个真正问题，并且这个问题能从自动化中受益？这看似是一个显而易见的问题，但它能防止“清单式采购”——即采购决策由组织内的某个独立部门完成，而该部门所做的只是勾选清单上的“AI\
  \ 能力”选项。正如我们在本书中多次提到的，AI 技术千差万别。在很多方面，仅仅指定“AI 能力”几乎就像指定计算机程序应该使用某种编程语言一样笼统！相反，我们必须针对我们试图解决的问题，去寻找我们需要的特定能力或能力组合。\n\
  \n底层数据是如何处理的？你能否在不使用该产品的情况下使用这些数据？产生的数据能否反馈回我们在本章开头描述的那个良性循环中？我认为这一点至关重要。回到我们之前描述的数据评级方案，我们可以判断我们雇佣的系统将产生什么类型的数据，以及这会导致对特定供应商的何种锁定程度。通过自身活动所产生的理解是宝贵的知识产权，理想情况下应严格保护。当所有竞争对手都使用相同的工具时，正是该工具的数据和流程配置能为你带来竞争优势。\n\
  \n所有主要的供应商都提供了有趣的解决方案，让你能够“雇佣”内置 AI 的解决方案。例如，主要的 CRM 供应商（Salesforce、Oracle、SAP、Adobe、Microsoft）都已将\
  \ AI 能力捆绑到其 CRM 工具中。让我们简要看看 Salesforce 的做法，因为它正是我们在此讨论的策略类型的真实案例。第一步是认识到，在其 CRM\
  \ 中提供 AI 能力将代表一个关键的竞争优势和潜在的差异化因素。然后，为了快速建立其 AI 能力，他们开始了收购狂潮，购买那些提供特定功能（如智能会议管理，即内置\
  \ AI 的工具）的 AI 初创公司。接着，他们收购了将底层技术融入其中的公司，以便能够创建机器学习平台——从而实现“用 AI 构建”。所有这些初创公司最终被整合成一个名为\
  \ Einstein 的综合解决方案，使 Salesforce 能够构建新的 AI 技术和能力。Einstein 提供了诸如账户洞察、潜在客户优先级排序和自动数据录入等功能。\n\
  \n##### 用 AI 构建\n\n接下来的方法是利用易于获取的 AI 组件来构建解决方案。在这种情况下，你不是直接雇佣带有预定义用户界面和功能列表的最终功能。相反，你是在构建自己的工具（例如，一个能够查看潜在候选人排名的仪表板），并使用外部\
  \ AI 平台为你提供必要的能力（例如，自然语言处理）。\n\n同样，所有主要技术提供商都提供了易于访问的 API。微软的认知服务包括支持决策、视觉、语音、搜索和语言的工具。亚马逊\
  \ AWS 将其命名为推荐、预测、图像和视频分析、高级文本分析、文档分析等。正如你从这些服务的名称中看到的，这些都是广泛的能力，可以用你自己的数据来喂养，并组合起来提供更全面的解决方案。\n\
  \n当然，这不仅仅关乎大供应商的云服务。还有大量开源工具，例如用于自然语言理解的`spaCy`，它们提供了令人难以置信的能力，并且几乎不需要什么努力就能上手。\n\
  \n这些现成能力的吸引力在于，你可以将它们接入你的解决方案，而无需内部专家来理解它们。你的差异化优势，再次体现在你如何组合解决方案，以及你所带来的数据质量和整体问题理解能力上。\n\
  \n##### 构建 AI\n\n最后一步是真正投资于内部构建基础 AI。一旦你对自身流程和数据的状况有了更清晰的认识，并能够开始构建自己的模型，结合神经网络、推理等基础技术时，这一步就变得有意义了。这意味着要在内部培养\
  \ AI 技能，需要更大的投资，但这也是最有可能带来最有趣回报的领域，因为这是你能够真正实现差异化的地方。这里需要把握的平衡是，确保你正朝着正确的方向投资于构建自己的\
  \ AI，而不是简单地试图与技术巨头竞争。\n\n\n\n## AI 无处不在\n\n与任何高层战略工作一样，制定并定义你自己的 AI 策略是一项充满挑战但最终回报丰厚的活动。这意味着你需要深入挖掘自己的动机，以及同事和整个组织的动机。这意味着要审视你解决问题的方式，并尝试推导出明确的规则和清晰的思路。这个过程本身就极具价值。为了向其他人记录而审视流程是一回事，而审视同样的流程并试图向机器描述它则完全是另一回事。这会迫使你达到一种清晰度，有时甚至可能让人感到不适或别扭。然而，其结果无疑将非常有价值。\n\
  \n我们已经看到，在从雇佣 AI、用 AI 构建到构建 AI 的旅程中，有相当多的选择可以起步。每种选择都有其优缺点，虽然它们可能像是进化阶梯上的不同步骤，但它们并非相互排斥。它们可以共存，并且你可以为组织内的不同用例做出不同的选择。这也意味着你可以快速起步，并尽早展示\
  \ AI 策略带来的好处，这反过来会推动进一步的支持，并使后续步骤更容易向团队其他成员推广。\n\nAI 技术和能力将影响工作场所的方方面面。我希望通过本书已经证明，我不是一个会被潮流和炒作所激动的人。鉴于当前\
  \ AI 技术被炒得如此火热，可能很难透过这些看清它们的真正影响。然而，正如我们在前几章中所论证的，AI 的影响将是深远的。将其与火和电相提并论（正如微软和谷歌等公司所做的那样）可能听起来有些牵强。但这些说法中确实有道理。就像火或电一样，AI\
  \ 有能力改变我们做一切事情的方式。如果你从一个既务实看待挑战、又认识到机遇的立场出发，你就可以对你组织内的工作方式产生持久的影响。着手制定 AI 策略可能是关乎你组织未来的最重要决策之一。\n\
  \n脚注 1 2 3 4\n\n"
- '# 12. AI 驱动应用的伦理


  为什么我们需要在 AI 驱动应用的背景下讨论伦理？它难道不就像任何其他软件或任何其他机器一样吗？现有的规则难道不足以覆盖我们吗？这是关于机器统治世界吗！？


  让我们从最后一个问题开始。不，这不是关于机器统治世界。毫无疑问，如果我们真的到了拥有具备人工通用智能的自主行动机器的那一天，我们将不得不应对极其有趣的伦理考量。然而，正如我们在第
  2 章中已经讨论过的，目前无需担心这种情况会发生，即使它真的发生了，这本书也不是用来解决由此引发的伦理问题的。我们在这里关心的问题并非机器统治世界。我们关心的是机器以不安全的方式运行，其行为无法解释，并导致人们受到不公平对待而无法纠正。


  AI 驱动应用值得特别考虑，因为执行自动化决策的软件与其他类型的软件有本质区别。正如我们在第 3 章中讨论的，我们面对的是在如何实现目标方面具有一定程度的自我导向性，并且可能在其生成的目标方面具有自主性的软件。大多数其他软件是被动的，等待我们操作它才能让事情发生。


  此外，AI 软件的复杂性意味着我们需要明确考虑如何为决策提供解释，并在软件本身中构建这些流程。在这种复杂程度下，导致特定决策的路径很容易丢失。对于数据驱动的 AI
  技术尤其如此，我们面对的是成千上万甚至数百万个中间决策点（例如，人工神经网络中的神经元），所有这些都指向一个单一结果。


  因此，正是因为 AI 驱动软件不同于其他软件，我们必须明确地解决伦理考量，它们如何融入软件，以及我们如何发现并处理它们。使用 AI，我们不是在编程具体的规则和结果。相反，我们是在开发具有推断能力，并基于这种推断做出选择的软件。简单来说，它是编写软件的软件。作为创造者，我们与最终结果之间隔了一层。由于我们不是在编程最终结果，我们需要建立保障措施，以确保它将是理想的结果。




  ## 自动化决策的后果


  前面所有的介绍性推理可能显得有些抽象，那么让我们通过一个实际例子来让它变得更具体。


  值得庆幸的是，科技界越来越多地讨论的一个话题是如何解决工作场所中存在的巨大不平等。性别、宗教、民族和社会经济地位都会影响你能获得什么样的工作，以及你获得工作后如何被对待和获得报酬。这些影响方式多种多样，有些非常明显，有些则更为微妙。


  以下是一个住在巴黎的工程师向我讲述的非常明显的歧视例子。他解释说，一位朋友请求在求职申请中使用他的地址。当被问及原因时，这位朋友解释说，如果使用他自己的地址，求职申请被拒绝的可能性更高。这位朋友住在一个被认为是贫穷且犯罪猖獗的郊区。事实证明，招聘人员使用邮政编码作为判断申请人社会经济地位的信号。


  现在，假设这些公司决定构建一个自动化的 AI 驱动工具来帮助初步筛选求职申请。正如我们在前几章讨论的那样，做法是收集过去符合“标准”的求职申请例子和不符合标准的例子。AI
  团队会将所有数据输入机器学习算法，该算法会调整其权重以获得“正确”答案。虽然准备该工具的团队成员个人不一定有偏见，或者试图将偏见编码化，但他们最终会引入偏见，因为数据本身就有偏见。


  算法最终会抓住邮政编码在决策中具有一定权重这一事实。毕竟，这些算法被明确设计用于寻找能够区分不同类型数据的特征。在神经网络的某个地方，数值会被调整，使得来自经济落后地区的邮政编码对申请结果产生负面影响。偏见和不平等现在被编码化了——不是因为有人明确表示应该如此，而是因为人类过去的行为被用来指导发现一个基于数据的
  AI 推理模型。


  这个假设场景在 2018 年对亚马逊来说变成了非常现实的问题。亚马逊的机器学习团队自 2014 年以来一直致力于构建帮助招聘的工具。这个简历筛选工具使用了 10
  年的数据，团队发现它偏向男性而非女性。该算法只是将它在数据中看到的内容编码化了。工程师中绝大多数是男性。“性别一定起了作用，”算法推断道。它惩罚了包含“女性”一词的简历，例如“女子国际象棋俱乐部主席”。它还降低了来自两所女子学院的毕业生的评分。^(⁵⁹)
  即使可以修正程序来补偿这些特定情况，亚马逊也非常担心他们无法识别预测可能受到的所有影响方式。


  你可以想象在多少种不同的场景中会引入类似的偏见。使用过去的数据来决定某人是否应该获得抵押贷款、应该拥有哪种类型的健康保险、是否获得商业贷款批准或签证申请等等，不胜枚举。在工作场所，自动化年终奖金计算或一般薪酬分配方式会带来什么后果？


  即使是看似不那么有害的事情，最终也可能编码并放大已有的歧视模式。2017 年，一段视频在网上疯传，显示酒店浴室里的自动皂液器只对肤色较浅的人有效。^(⁶⁰) 该皂液器使用近红外技术检测手部动作。由于较深的肤色会吸收更多光线，皂液器对他们不起作用。没有足够的光线反射回来激活皂液器。皂液器的设计者并非有意进行种族歧视。但他们为这个相对简单的决策编码的行为模型没有考虑到较深的肤色。这是一个有缺陷的模型，从最初设计到实际安装在浴室中，从未考虑过它是否适用于所有肤色，尽管它依赖于手部反射光线的能力。^(⁶¹)
  现在，假设你刚刚为自己的组织投入巨资改善工作场所，其中包括升级所有物理设施。新的工作空间在万众瞩目中启用；关于包容性、福祉等的大话被说出。然后，肤色较深的同事意识到浴室对他们来说无法使用。即使人们决定对此轻描淡写，不感到被排斥，但在某种程度上，这种排斥感是不可避免的。这让他们想起日常生活中更广泛的不公正，以及缺乏多样性和对多样性的考虑。


  自动化决策将编码你数据中的偏见和你团队中的多样性。如果存在大量偏见而多样性极少，这最终会以某种形式表现出来。因此，你需要明确考虑这些问题。此外，你需要在认识到解决方案不仅仅是技术性的同时考虑它们。与许多其他事情一样，解决方案涉及工具、流程和人。


  在下一节中，我们将探讨一些我们可以参考的指南，以避免其中一些问题。


  ## 合乎道德的 AI 系统指南


  为了避免前面描述的场景，我们需要确保我们构建的系统满足某些基本要求并遵循特定指南。


  第一步是最困难但也是最简单的。我们需要认识到这*确实*是一个问题。我们需要接受自动化决策系统可以编码偏见，并且我们有责任尝试对抗这种偏见。此外，我们还必须接受，如果我们无法消除偏见，也许唯一的解决方案就是消除系统本身。


  最后这句话对于像我这样的技术人员来说，实际上是一句特别难说的话。我是一个乐观主义者，坚信我们需要技术来克服我们面临的一些巨大挑战。同时，我必须承认，我们的技术进步水平可能已经与我们确保技术安全公平的能力脱节了。在这种情况下，尽管感觉像是倒退，但我们不得不考虑推迟引入某些技术解决方案。除非我们有很高的信心满足某些基本指南，否则这可能是我们唯一的选择。


  在 2018 年至 2019 年间，欧盟委托一个人工智能高级别专家组制定可信赖 AI 的伦理指南。^(⁶²) 由此产生的框架对于任何考虑在工作场所引入自动化的人来说都是一个可行的起点。我们在此提供结果的简要概述，但也值得深入研究完整文档。




  ### 值得信赖的人工智能


  可信赖性被视为这些指导方针的首要目标。为了让人工智能技术真正发展，它们必须被认为是值得信赖的，而支撑人工智能技术监控与监管的系统也同样需要获得信任。我们已有可行的模式。只需想想航空业——从制造商到航空公司、机场、航空管理局等，有一系列明确的参与者，并辅以一套坚实的规则与法规。整个系统的设计就是为了确保人们信任飞行。作为一个社会，我们需要理解我们希望与之类似的人工智能系统应如何构建。


  为了建立值得信赖的系统，欧盟专家组确定了三大支柱。人工智能应当合法、合乎伦理且稳健。我们逐一来看。


  #### 合法的人工智能


  首先，人工智能应当是**合法的**。无论发生何种自动化决策过程，我们都应确保其符合所有相关法律要求。这应是不言而喻的。遵守法律法规是最低准入门槛。具体需要考虑的是，为实现这一目标，已建立了哪些流程。那些不受严格监管行业的公司，可能不习惯质疑其使用的技术流程的合法性。


  #### 合乎伦理的人工智能


  其次，人工智能应当是**合乎伦理的**。伦理显然是一个非常复杂的主题，无法完全简化为一系列具体概念。专家组通过承认欧盟条约和国际人权法中规定的一些基本权利，确立了识别合乎伦理的人工智能原则的方法。这些权利包括：


  - **尊重人的尊严**：每个人都具有内在价值，这种价值应受到尊重，不应被他人（包括自动化系统）削弱、损害或压制。人不是被操纵、剥削、筛选和分类的物体。他们拥有身份以及文化和生理需求，这些都应得到承认、尊重和服务。

  - **个人自由**：人类应能自由地为自己做决定。人工智能系统不应试图操纵、欺骗、胁迫或不正当地监视他人。

  - **尊重民主、正义与法治**：正如人工智能系统应尊重个人自由，它们也需要尊重管理我们自身的社会进程。例如，人工智能系统不应以削弱我们对民主进程和投票系统信任的方式行事。

  - **平等、非歧视与团结**：这直接指向人工智能系统需要避免偏见。总体而言，社会在解决这些问题上一直严重不足。只需看看男女同工同酬之类的问题，就能承认这些问题不能仅仅通过说人们应相互尊重并合法行事来解决。因此，除了之前提到的几点，重申平等与团结这一点也很重要。

  - **公民权利**：在本书中，我们重点关注了人工智能系统如何改善工作场所的生活。同样，人工智能系统也能改善我们作为公民的生活，因为我们与各级政府的互动日益增多。然而，人工智能系统同样可能使这些互动变得不透明且困难重重。需要特别关注以确保这种情况不会发生。


  在这些权利的基础上，他们进一步定义了四项伦理原则，即：


  1.  **尊重人的自主性**：人工智能系统不应试图以任何削弱人类自主性的方式操纵人类。某些方面，例如自动化系统强迫人类做某事，相对“容易”识别。但当我们设计那些更微妙地影响行为的系统时，事情就变得更具挑战性。我们系统的目标和目的是透明的，还是它试图通过操纵行为来实现一个事先未明确说明的目标？

  2.  **防止伤害**：此处的伤害不仅仅指可能更容易确定和证明的身体伤害。它还指精神伤害以及个人和集体的社会伤害。例如，一些人工智能工具可能极其消耗资源。所需的计算量意味着会消耗大量能源^(⁶³)。如果你开发一个需要消耗过多能源的人工智能工具，你是否会考虑这种（不那么明显的）成本是造成伤害的因素？这与考虑你的组织在整体能效方面的做法，以及这不仅是财务上合理的行为，也是不损害环境的伦理原则，并无太大不同。显然，这些问题都没有简单的答案。第一步是思考这些问题，并就我们能做些什么进行坦诚的讨论。

  3.  **公平性**：对于公平，没有简单的答案或单一的定义。然而，基于前面定义的权利，我们可以说公平应是任何人工智能系统设计的核心原则，因为缺乏公平至少会导致歧视。我们甚至可以更进一步说，人工智能系统应努力提升公平性，并积极避免欺骗他人或损害他们的选择自由。

  4.  **可解释性**：如果自动化系统的决策受到质疑，我们能否解释为何做出该决定？这直击问题的核心。没有可解释性，决策就无法被质疑，信任也会迅速瓦解。仅仅说某人被拒绝休假请求或加薪，是因为一个使用过去多年数据训练的系统认为这不是一个合适的行动方案，而无法具体指出与该人情况相关的哪些要素导致了该决定，这足够吗？


  如果所有这些问题的总和看起来像一座难以攀登的高山，这是可以理解的。如果我们只是想为公司构建一个更智能的会议安排程序，真的需要深入伦理辩论的深处吗？我个人认为，我们至少需要思考这些问题。我们需要转变思维，不再将伦理考量视为一种负担或额外开销。


  这关乎建立更公平、更具包容性的工作场所。这样的工作场所也往往能让每个人产出更好的成果，这意味着组织能获得更好的整体结果。然而，这并非仅仅关乎公平和包容性对公司利润更有利。而是关乎你是否认为这是在社会中生存和行动的更好方式。


  我们对这些问题认识得越深，提出的问题越多，我们就越不可能构建出不公平对待人的系统。即使是一个无害的会议安排程序，也可能具有歧视能力。它可能没有考虑到父母或残疾人士的需求，例如总是将会议安排在上午
  9 点，或者将连续的会议安排在难以到达的地点。


  这些问题没有简单的答案，不同的原则之间也始终存在张力。欧盟人工智能专家组提出了一系列高层次要求，以帮助驾驭这一领域，所有这些都旨在实现更稳健的人工智能。




  ## 稳健人工智能


  稳健人工智能指的是我们构建安全、可靠且值得信赖的系统之能力。让我们快速回顾一些关键要求，以了解我们应该或可能关注哪些方面。


  -   **人类代理与监督**：我们在第 3 章中讨论了自主性，即（软件）代理生成自身目标的能力。对软件代理的限制在于，在适当的背景下，它不应直接或间接地妨碍人类的目标。另一方面，监督指的是人类影响、干预和监控自动化系统的能力。


  -   **技术稳健性与安全性**：为意外情况做好规划，并能够优雅地恢复或失败，是任何足够复杂系统的关键组成部分，人工智能应用也不例外。它们应当是安全的，能够抵御攻击，并且当出现问题时应有备用计划。此外，它们还应可靠、准确，且其行为应可复现。正如任何可靠的工程系统一样，你需要能够依赖其保持一致的行为。


  -   **隐私与数据治理**：在这个后剑桥分析公司^(⁶⁴)时代，我们所有人都希望能更清楚地认识到稳健的隐私和数据治理有多么重要。由于人工智能能力依赖于对数据的访问，这也成为一个激烈争论的问题。随着欧洲《通用数据保护条例》的发布，许多人表示这将为欧洲的人工智能研究敲响丧钟。此类法规阻碍了对数据的访问，从而降低了人工智能研究的进展速度以及这些系统的最终性能。与此同时，令人欣慰的是，大型科技公司内部（例如微软首席执行官萨提亚·纳德拉^(⁶⁵)）也出现了声音，承认《通用数据保护条例》最终是一件积极的事情，并欢迎更广泛的审视。最近，Facebook
  一直在主动要求政府引入更多法规（尽管并非所有人都相信其背后的动机）。总的来说，我认为越来越多的人开始认识到，治理需要在各个层面进行，缺乏治理将可能导致对技术的过度强烈抵制——这种抵制的代价可能远比事先遵守法规要高昂得多。


  -   **对社会和环境福祉的责任**：社会正在认识到，我们所做的一切都会产生无法直接体现在损益表中的影响，并且我们负有考虑这一点的道德责任。特别是，我们构建的系统对社会和环境的影响不应再被忽视，其责任也不能转嫁到别处。这是负责任的一个方面，另一方面则是以更正式的方式追溯责任，并建立审计人工智能应用的机制。


  ## 合乎道德的人工智能应用


  为了构建合乎道德的人工智能应用，前述的权利、原则和要求需要得到具体技术的支持。目前有一个新兴的研究人员和实践者社群正专门朝这个方向努力。


  从技术角度来看，针对可解释人工智能的研究正在进行，并且正在考虑各种方法来帮助我们规范正在构建的庞大推理机器和神经网络的行为。此外，还需要大量的跨学科工作，让技术人员与其他专业领域的人士进行更密切的交流。只有通过更全面的方法，考虑到人类存在的各个不同维度，我们才能更有信心地向前迈进。


  从社会角度来看，政府（以及作为公民的我们）必须寻找必要的结构来支持值得信赖的人工智能。我们将需要适当的治理框架、监管机构、标准化、认证、行为准则以及教育项目。


  当我们思考如何在工作场所引入人工智能时，我们在此背景下也扮演着角色并承担着责任。第一步是自我教育，提高对这些问题的认识。第二步是将这些考量纳入我们的流程中，并允许进行讨论。


  这并非易事，确实需要付出具体的努力。然而，现在正是我们开始努力，迈向一个我们开发技术的影响得到更审慎考量的未来的时候。如果我们不投入必要的努力来构建值得信赖的人工智能，我们可能将不得不面对幻想破灭的社会和民众所带来的更严重后果。工作场所是我们生活的重要组成部分。我们大概不希望建造一个让人们感到被监视和控制的工作场所。


  技术既能带来解放，也能带来剥夺感。它可以创造一个更公平、更公正的社会，但也可能巩固和放大不公。我们已经看到人们因制造业大规模自动化的引入而感到被边缘化。人工智能技术在我们生活方方面面的广泛应用将是变革性的。确保这种变革是积极的，取决于我们自己。


  一个由人工智能驱动的工作场所可以是一个更快乐、更积极、更具包容性和更公平的工作空间。然而，如果不仔细考虑我们正在做的事情的道德影响，我们就无法实现这一目标。即使在一个全自动化的办公室里，也没有免费的午餐。我们需要投入额外的时间和资源，以确保我们今天能构建一个更好的工作场所，并为明天贡献一个更美好的社会和更健康的环境。


