- '# 6. 数字化工作场所


  数字化转型。


  光是提到这个咨询顾问们钟爱的万能术语，是否就让你内心微微叹息？我知道它对我有这种效果，而我*正是*其中一员——为那些总在官网首页提及"数字化转型"的咨询公司工作。


  这个短语本身并无不妥。我们心知肚明。通过有效运用数字技术来改造流程，是极为明智的做法。这是每个组织都应持续进行的工作。这个短语之所以令人畏惧，是因为它被咨询服务的营销人员过度滥用，如今已背负了某种包袱。像"数字化转型"及其近亲"数字战略"这样的流行词，会让人联想到成群的顾问撰写冗长报告，告诉人们应该做什么来改善工作场所，却很少提供关于如何实现目标的实用建议。


  为了本章及本书后续内容，我恳请你暂且放下这些成见。在本章中，我们将探讨数字化工作场所的含义，以及理解数字化工作场所如何为人工智能驱动的工作场所战略奠定基础。


  ## 什么是数字化工作场所？


  首先，让我们为所讨论的内容给出一个工作定义。


  什么是数字化工作场所？


  一个简单的定义是：数字化工作场所是人们用来完成工作的所有数字工具的清单。从人力资源系统到电子邮件系统、文档共享、报告系统、笔记本电脑、手机和会议室系统，这份清单很长。


  列出所有相关工具本身就极具价值，也是一项任务，但这足够吗？我认为不够。这个定义的问题在于，它未能真正捕捉数字化工作场所的本质。诚然，在某种程度上它是一份物品清单——将软件和硬件整合在一起，使组织成员能够实现目标。然而，它没有说明这对组织*意味着*什么，也没有提供统一的视角，这使得制定整体战略更加困难。这就好比将工作的物理空间定义为家具和房间的清单。


  数字化工作场所是完成工作的数字环境。


  一个更有趣的思考方式是：数字化工作场所是完成工作的数字环境。它与物理环境相辅相成，两者共享同一个总体目标——即根据组织的愿景、使命、目标、核心价值观和原则来促进工作。后者在我看来至关重要。无论你正在开发什么流程来解决问题，或选择什么工具来支持该流程，你都应该问自己：这符合我们作为组织的身份吗？它是否反映并支持正确的愿景和使命？它是否支持我们的目标以及实现这些目标的战略？


  这里有一个有用的练习，可以帮助你建立思考数字化工作场所的正确心态：想象你必须为组织建造一个新的物理空间。在这种情况下，你会问自己什么样的问题？


  它将在哪里？地点（或者如果你选择分布式办公，则没有单一地点）将决定人们如何相互互动以及与外界互动。如果你的组织位于牛津附近的科学园、伦敦市中心靠近初创公司和大型科技公司的地方，或者托斯卡纳农舍里与遍布全球的团队进行视频通话，这对你的组织意味着什么？在数字环境中，一个类似的选择是考虑人们用来沟通和协作的数字空间（你的电子邮件系统、项目管理工具和消息传递基础设施）。不同类型的数字地点将带来不同的可能性。


  它将如何支持在那里工作的人？人们踏入你的办公室时会有怎样的体验？这说明了你的组织是什么样的，以及你希望它成为什么样的组织？人们可能会花相当多的时间思考建筑大堂能说明公司什么。他们在艺术品或精致装置上投入巨资。通常，组织越老越大，其大堂就越令人印象深刻。然而，人们与你的组织的第一次互动更可能是通过你的网站。它是否像你的大堂一样令人印象深刻？


  你会配备什么样的家具和设施？人们能轻松煮咖啡吗？是否有支持偶遇和思想交流的区域？是否有设计精良、能促进创造性工作的会议室？那么，如果他们需要举行在线会议呢？他们是否被困在外部客户无法使用的企业工具中，还是像分享链接一样简单就能运行会议？是否有办法为在线会议做笔记、轻松共享屏幕或录制会议？




  ## 排版后的内容


  最后，思考一下设计物理空间的基本流程。你会与一家建筑公司签约，讨论一系列关于你所在组织的性质、你想塑造的形象，以及你现在和未来长期需求的问题。这是一项基于长期规划的重大投资。然后，你会经历多个方案的讨论，最终开始着手建设新大楼。你是否曾为你的数字空间进行过如此深入的规划？你能从抽屉里拿出一份总体规划，展示所有部分如何组合在一起形成战略吗？你是否有一个流程来塑造数字环境相关决策的制定方式？


  我希望这能说明规划数字工作场所时应有的思维方式。当然，这个类比并非完全吻合。数字空间在许多方面允许进行成本低得多的试验和探索。你无法建造并拆除无数栋大楼，也不能一直移动墙壁。嗯，你可以这么做，但这并非最具成本效益的方式！然而，你可以在数字空间中不断尝试和演进各种方法。这并非没有成本，但这是一个更容易被证明合理的成本。


  ## 理解你的数字工作空间


  在第 3 章中，我们讨论了人工智能的运作原理。我们谈到需要建立一个关于世界如何运作的模型，这个模型将使我们能够决定应用哪些能力，以便以对我们有利的方式推动变革。


  当我们考虑将人工智能应用于工作场所时，我们所说的世界模型自然就是数字工作场所。它的运作由哪些组件构成？人员、工具、流程、政策和文化如何结合在一起，使工作得以开展？


  这里值得重申的是，当我们谈论为了应用人工智能技术而理解数字工作空间时，我们指的不是某位富有远见的 CEO 脑海中可能存在的某种模糊的深层含义。相反，我们指的是工作空间的一个非常具体的数字表示，它可以通过软件进行操作以实现自动化。我们需要一个世界模型，它将显性知识与我们可能通过分析数据发现的知识结合起来——这个模型将使我们能够预测未来状态，并通过软件加以利用，为人们提供有用的解决方案。


  在接下来的几页中，我们将探讨构成这个模型的各个组件，以及为了创建你自己的数字环境模型，你应该考虑的一些维度。


  在开始之前，这里有一个简单的免责声明。没有一个模型是放之四海而皆准的。有些框架适用范围更广，有些知识可以从一个组织转移到另一个组织，但最终，你需要探索你自己的空间，以理解它的运作方式以及如何为其建模。


  ### 人员与团队


  毫不意外，一切都始于人员以及他们组成的团队。在工作空间中，我们主要做的事情就是与团队其他成员互动，共同解决问题。至少，这应该是我们正在做的事情！


  因此，建立一个清晰的模型来回答以下基本问题至关重要：我们的人员是谁？他们在哪里？他们在做什么？他们能做什么（技能）？他们了解什么（知识）？他们如何做？甚至他们为什么这样做？我们还可以更进一步，说我们也希望了解我们的人员在与其他组织及其内部人员建立联系时所创造的更广泛的网络。


  很可能存在大量可用的数据，但它们通常分散在不同的部门和团队中，并且存在于不同且通常不兼容的软件中。需要问的问题是，是否存在一种统一的方式来描述组织内的人员和团队。然而，正如我们提到的，这项任务往往看起来令人生畏，所以我们需要一个切入点——一个让我们开始行动的抓手。


  一个有用的方法是，挑选你知道能解决当前问题的明确用例，然后检查你当前的数字环境是否能够支持解决方案，从而开始探索你对组织内数字世界中人员和团队的描述有多复杂。


  #### 探索人员数据


  例如，假设你想引入一个自动化工具，让一群人只需发送一个请求就能安排会议。就像这样：“Akeel、Barry 和 Jasmine 需要在未来 2 天内找一个房间开会
  1 小时。”


  你的数字系统中关于人员和团队的信息是否足以实现这一点？仔细思考这个问题，并在脑海中快速列一个清单。


  *   是否可以查看组内每个人的日程？

  *   你是否能访问会议室日历及其可用性？

  *   你是否能将人员可用性与会议室可用性进行交叉比对？

  *   你是否能考虑一些地理因素和个人对会议的偏好，然后继续预订会议？


  很少有公司已经能做到这一点。更多的公司拥有可以支持它的系统，但尚未实施。而大多数公司甚至无法使用这样的工具，因为人们的日历无法访问，会议室时间表没有数字化，也无法清晰了解谁在哪里。


  再来看另一个场景。你的销售团队刚刚接触到一个令人兴奋的新客户。他们想拼凑出最好的提案，如果公司内部已经有人与客户组织有关系，那就太棒了。所以需要问的问题是：“嘿，有没有人曾经与
  Y 客户合作过，认识那里的某个人，或者与这个潜在客户有某种关系？”目前这种情况会如何处理？你如何获取自己员工的关系和过往经历？是否需要发一封全公司范围的电子邮件？在聊天频道上发布公告？有没有一种不那么嘈杂的方式来提出同样的问题，通过一个能更高效处理沟通交流或访问关系网络的系统来实现？


  这是第三个例子。假设你在开发产品新功能时面临一个重大挑战。这需要专业知识，你确信在更大的组织内一定有人拥有专业知识或能接触到专业知识。你能根据他们的专长搜索人员吗？是否存在一个“人员搜索”工具，允许你输入一个人的技能，然后它能生成一个拥有该技能的人员列表？


  最后一个例子。年初，你想了解全年数十个团队中关键人员的可用性情况。是否存在一个模型能够可靠地预测假期、病假或任何其他导致某人无法工作的潜在事件分布？如果你想建立这样一个模型，你是否有可供检查和分析的历史数据来提供这些信息？


  如果对上述所有场景的回答是，在你的公司内部实现这些可能非常困难，请不要担心。这是通常的起点。这是一个绝佳的机会。这意味着已经有唾手可得的成果等着你去摘取，并证明自动化的力量，让工作环境对人员和团队更有帮助。




  ### 流程


  在了解团队由哪些成员组成之后，接下来要关注的是团队如何完成任务。我相信你们中的许多人都曾经历过这样的情况：有时所有信息都已齐备，甚至正确的工具也已到位，但总有一条“规则”要求事情必须“以某种特定方式”完成。这便成了阻碍实现恰当自动化的绊脚石。流程正是定义这些步骤以及支配这些步骤的规则。


  绘制所有相关流程的地图，明确每个阶段需要哪些数据、涉及哪些人员、信息如何在步骤之间流转，起初可能看起来是一项费力的工作。然而，这对于我们能够自信地改变、改进和自动化这些流程至关重要。


  #### 绘制流程


  有大量系统支持业务流程绘制，从简单的流程图到诸如六西格玛之类的复杂技术。一如既往，没有单一的解决方案。探索哪种方法最适合你所在的组织至关重要。一个简单的起步方式——如果你还没有关于流程的结构化信息，这也能带来明确的长期益处——就是创建一本公司手册。


  公司手册是一份动态文档，旨在供公司内任何人查阅，以了解事情如何完成。从如何申请假期和休假，到获取新设备、培训或个人发展，它可以用简单的语言包含实现这些目标的所有流程。它不需要专业知识来编写，并且可以成为团队或组织内的协作成果，因为不同的人负责手册的不同方面。通过用通俗语言解释关键问题，人们就能识别出哪些方面可能得到改进或自动化，然后深入挖掘，为这些方面创建更正式的流程图和流程图表。


  关于流程绘制，最后要提一点：在此过程中，尽量避免提及任何特定的软件或工具。例如，说“为了申请假期，必须通过 HR 假期规划工具提交请求”只是描述了发生的事情，而非其背后的真实流程。我们真正感兴趣的是，该请求提交到
  HR 工具后发生了什么。它会发送给直线经理、首席运营官还是首席执行官？他们应该做出什么回应？这才是我们试图绘制的真实流程，这样我们才能以多种不同方式、使用不同工具来实现该流程。


  ### 工具


  在理解了如何用合适的模型来代表团队和组织中的人员，并绘制出流程之后，我们就可以转向工具了。


  哪些软件承载数据并执行操作？它们之间如何连接？同样，从具体用例入手通常比从全面罗列每一个工具开始更有成效。用例能让你发现与解决实际问题相关的具体信息，然后你可以由此扩展，回溯到流程、人员，最终找到解决方案。


  #### 揭开工具的神秘面纱


  我认为，工具需要特别的耐心。它往往比其他任何东西都更像一个棘手的谜团。当你审视一款软件，试图理解它为何是现在这个样子时，你实际上是在审视一段漫长的决策史、权力博弈、限制条件以及短期解决方案（权宜之计），正是这些因素造就了你眼前的一切。


  试图理清这一切，常常会让人觉得付出太多努力而得不偿失。这就是为什么清楚理解你实际试图支持的流程（不参照特定工具）以及工具中的数据如何支持该流程至关重要。这样你就能更自信地行动，更换工具，同时知道你所关心的流程仍能得到支持。


  ## 下一站


  数字工作场所是促进工作的数字环境。它是构成组织的个人与团队之间的互动、遵循的流程以及支持这些流程的工具的总和。在整个过程中，数据从一个地方流向另一个地方，被存储、处理、操作和转换。


  数字环境也应该是你文化和价值观的体现。尽管听起来有些老套，但它应与你的价值观声明相协调。如果你宣称自己是一个开放的组织，但人们却发现工具将活动分隔开来，不允许自由协作，那便毫无意义。


  在工作场所引入自动化的一个必要前提是理解你的数字环境。扎实理解事物为何如此，能让你自信地引入变革。


  在接下来的章节中，我们将把注意力转向如何将人工智能与消息平台相结合，为你的数字环境提供底层操作系统和用户界面。我们将看到消息平台如何充当不同系统之间的粘合剂，并成为整个数字环境的窗口。


  '
- '# 7. 人工智能即新用户界面


  人工智能常常（而且理所当然地）被提及用于解决诸如发现新基因、治愈癌症或实现自动驾驶等难题。然而，还有一系列更平凡但同样具有挑战性的问题，人工智能已经在其中扮演着关键角色。人工智能正日益成为管理我们与任何计算设备交互的软件背后的神奇配方。


  本章旨在阐述并激发人工智能与用户界面之间的联系，并展示由人工智能驱动的用户界面不仅对消费产品重要，对工作场所也同样重要。由人工智能驱动的界面将成为正确使用它们的组织的竞争优势来源。




  ## 超越“指向点击”


  自 1984 年麦金塔电脑普及图形界面以来，人与计算机的主要交互范式一直是将光标指向某物并点击以进行选择。


  此间的创新升级了这一基础体验，使其更丰富、更流畅，但并未带来根本性变革。诚然，我们现在可以用手指代替鼠标；诚然，我们可以用两根手指“捏合缩放”或用更多手指“滑动”。借助某些触控板和智能手机，我们甚至能通过压力触发不同反应。我们从灰度屏幕上内存极小、性能低下的处理器，发展到速度飞快、内存近乎无限、支持数百万色彩的机器。这是三十五年来的改进。尽管如此，我们依然在指向点击。


  别误会我的意思。所有这些发展都令人惊叹。实现流畅捏合缩放体验所需的技术极其复杂。然而，基本范式并未改变。你通过使用设备（鼠标、触控笔、触控板或双手）来操作屏幕上的对象（按钮、链接、文本、图像），向机器指示你指向的对象应发生什么。


  有趣的是，人工智能已在当今界面中扮演着重要角色。一个典型例子是智能手机上的虚拟键盘。它不断预测你最可能想触摸的字母、接下来可能触摸的字母，以及你整体上试图输入的单词和短语。它正在学习根据你特定的按键和书写方式来调整其预测。如果关闭所有这些功能，我们会发现在手机上输入任何信息都非常困难。毫不夸张地说，iPhone
  的推出之所以成为可能，正是因为它运用了足够多的人工智能技术来实现用户界面。


  如今，所有顶级智能手机都具备面部识别或指纹识别功能。这项功能高度依赖人工智能技术，将获取的输入（你的面部特征或指纹）与内存中存储的数据进行比对。它们能够以几乎无延迟的无缝动作完成这一过程，堪称魔法。


  然而，我们正处在一个转折点。是时候从指向点击界面转向其他形式了。更多人工智能技术将使我们能够迈出下一步，这背后有三个关键驱动力。


  首先，随着计算技术渗透到我们生活的方方面面以及各种设备，界面要么完全消失，要么不再是即时选项。如果你正在处理多项任务，例如开车或在厨房准备饭菜，你的双手已被占用。能够与计算机对话是唯一的选择。如果你与手腕上的设备、或嵌入衣物或家具中的设备交互，语音命令自然是首选。


  其次，我们早该扭转计算机及其交互方式的主导地位。迄今为止，我们不得不学习“魔法咒语”：一系列能帮助我们达成目标的点击操作。在无尽的菜单层级中，我们寻找的选项究竟埋藏在哪里？我们应该调用哪种左键、右键、单指、双指或三指加压力的点击组合来触发操作？为什么我们不能直接告诉计算机我们想要什么，然后让它们去执行？这一直是愿景，但现在界面设计师终于拥有了帮助他们实现该愿景实用化版本的工具。


  第三个驱动力围绕竞争展开，以及外部力量如何使其他方不得不做出反应。当一组技术达到临界点并催生出新的做事方式时，它便提供了竞争优势。这反过来又促使竞争对手寻找方法来抵消这种优势，从而不可避免地推动进一步的技术创新。iPhone
  就是一个典型例子。在 iPhone 的首次发布会上，史蒂夫·乔布斯展示了当时手机技术的最高水平：笨重、粗陋，带有实体键盘。iPhone 改变了这一切。几年之内，那些笨重粗陋的手机便销声匿迹。iPhone
  成为评判智能手机的新标准。快进到 2019 年，iPhone 正竞相追赶其他公司引领的创新。


  现在，想象一个支持团队能够提供更好的客户体验，因为他们可以专注于更复杂的案例，而由对话式人工智能驱动的自动化虚拟助手则处理简单且重复的问题。结果，他们所有的竞争对手都会寻求为用户提供类似的交互界面，使用对话式人工智能便成为最低准入门槛。


  由于人工智能影响着我们所做事情的诸多不同方面，这些力量将以多种不同方式引发变革。从商业角度来看，卓越的用户体验直击效率问题的核心。想象一下，你的销售团队必须与一个团队竞争，后者拥有十倍更好、更高效的数据访问能力，并且能够创建新的可视化图表并对其数据提出新问题。当你的团队还在试图借用软件开发人员的时间来编写新查询以生成报告时，另一个团队只需在对话界面中输入或说出他们需要的内容，结果就会显示在团队通讯工具中供所有人共享。我们早已过了“良好的用户体验是事后添加的奢侈品”的阶段，并且正迅速接近这样一个阶段：良好的用户体验将等同于主动、智能的界面，与用户协作解决问题。换句话说，未来的界面将完全依赖于人工智能。


  在本章的其余部分，我将介绍一些正在促成这一变革的技术，以及它们使之成为可能的交互范式。


  ## 对话式界面


  我们的大脑天生为语言而设。作为幼儿，我们在生命的每个小时都在学习新单词，而且往往只需听一次就能开始使用。倾听和交谈（无论是通过语音还是手势）是人类的本能。


  现在，将其与浏览网站或与手机上的应用交互进行比较。这需要特定的努力和训练。我们需要明确地学习它，而且规则不断变化。不同的应用将按钮放在不同的位置，图标也不同，等等。然而，对话依然简单：提问、回答、回应、重复。从人类的角度来看，对话式界面作为前进方向是显而易见的。这正是我们一直在做的事情。


  对话式界面是一种数字界面，其主要交互模式是对话——一种重复的“回答-回应”模式。


  对话式界面可以纯粹使用书面交流（例如，在 Facebook Messenger 内或通过短信）；基于语音（例如，使用 Amazon Alexa 服务）；或混合形式（例如，Siri
  或 Cortana，我们使用语音但接收语音和文本混合的回复）。对话式界面还可以提供丰富的回复，将文本与媒体混合，或通过提供一组选项供我们选择回复来简化对话。


  在接下来的几页中，我将探讨语音和书面对话式界面的发展现状，并解释为什么我认为我们正处于两者都将发生重大变革的起点。




  ### 语音


  我记得自己十几岁时，完全被 20 世纪 90 年代的技术成就所吸引，曾与父亲就语音识别展开争论。当时，一款名为`Dragon NaturallySpeaking`的新软件解决方案正掀起波澜。它是首款声称能有效识别连续语音（每分钟
  100 个单词！）的商业软件。感觉我们只需与电脑对话的日子似乎近在咫尺。而我父亲则对此深表怀疑。尽管听写软件令人印象深刻，但他看到了在嘈杂的办公环境中，面对来自不同文化背景的多种口音时，语音识别所面临的所有挑战。他认为语音不可能很快成为与电脑交互的主要方式。


  `Dragon NaturallySpeaking`于 1997 年首次推出。我曾坚信，到 2000 年时，它将成为计算领域的主导交互范式。我有点过于乐观了。父亲是对的。自然语言识别远未达到所需的能力水平。


  语音辅助产品的历史甚至更早。1962 年，IBM 在西雅图世界博览会上展示了首款面向商业的解决方案。它被称为`Shoebox`，能够识别 16 个口语单词并执行数学运算。至少在过去
  60 年里，我们一直在努力攻克语音识别这一挑战！


  然而，算法、数据和计算能力最终取得了足够的进步。如今，在这场争论中，是时候站在自然语言和语音这一边了。虽然仍有大量工作要做，但基本要素已经具备。任何拥有智能手机的人，口袋里都装着一个语音助手。`Siri`于
  2011 年 10 月集成到苹果的 iOS 系统中。亚马逊于 2014 年 11 月发布了`Alexa`。`Google Assistant`于 2016 年推出，但其技术自
  2012 年起就以`Google Now`的形式孕育。每家大型科技公司都拥有一个“语音”平台。IBM 有`Watson`，微软有`Cortana`，三星有`Bixby`。


  到 2019 年初，内置亚马逊`Alexa`的产品已售出超过 1 亿台。^(³⁷) 这种普及程度至关重要。语音应用在成为我们数字环境中稳定的一部分之前，还有许多挑战需要克服。然而，两个主要挑战是：让我们养成使用语音完成任务的习惯（即使是非常简单的任务），并在各种不同情况下可靠地做到这一点。这两个挑战都需要广泛普及才能看到成效。广泛普及意味着我们将越来越习惯于它们的存在，这将为开发者反馈足够的数据以改进它们，从而使它们能够可靠地运行。这就是这些设备如此便宜的原因。大型科技公司知道他们需要什么来推动这一进程，而目前唯一的方法就是让我们毫不犹豫地购买这些设备。价格如此之低，以至于我们简单地认为，最坏的情况下，它们也是一个不错的扬声器或闹钟！


  通过这种大规模普及策略，临界点正越来越近。我们终于拥有了：


  1.  足够好且广泛可用的自然语言识别技术（既包括将语音转换为文本，也包括理解文本含义），能够处理定义明确的领域

  2.  足够便宜且广泛可用的、支持对话驱动交互的设备

  3.  允许任何人创建可发布并触达大众受众的对话应用的开发平台


  这意味着，随着公司开始探索问题空间并寻找那些杀手级应用，我们将看到语音驱动应用的爆发式增长。


  ### 文本


  推动基于语音的对话应用的相同要素也在推动基于文本的应用，但目前文本具有几个显著优势。首先，向网站添加基于文本的对话界面非常容易；其次，消息应用是数字世界的新霸主。


  排名前四的消息应用每月至少有 41 亿活跃用户，我们平均每天在消息应用上花费 12 分钟^(³⁸)（你对这个数字最可能的反应是它似乎很低，这进一步证明了消息应用的流行程度！）。


  当然，消息应用也广泛用于商业领域，`Skype`、`Microsoft Teams`、`Slack`以及许多其他应用每天被数百万人使用。


  基于文本的交互具有异步但即时的特性，特别适合非常广泛的日常任务。从查询航班详情、处理银行业务，到获取孩子学校的最新动态，基于文本的消息都非常适合。根据 Twillio
  对美国、英国、德国、印度、日本、新加坡和韩国用户的一项调查^(³⁹)，89%的用户希望能够使用消息应用与企业沟通。对于 18 至 44 岁的人群来说，消息应用比电子邮件或电话沟通更受欢迎。


  我们将在第 8 章和第 9 章中更深入地探讨基于文本的对话界面、其背后的技术，以及它们如何能够改变组织中的工作方式，因此我在此不再赘述。然而，主要的结论是，对于消息应用，我们已经越过了临界点。这是人们现在所处的位置，也是他们喜欢使用的工具。现在的问题是，你是否希望利用这些机遇。




  ## 增强现实与虚拟现实


  讨论人工智能将如何改变我们与机器交互的方式时，若不涉及增强现实（AR）和虚拟现实（VR），便是不完整的。


  AR 指的是通过可穿戴设备（如眼镜）或手机屏幕等界面，将数字信息叠加在我们对现实世界的视野之上。与众多技术一样，其使用程度是一个连续谱。你可以从在现实视野中仅添加少量额外信息开始，例如建筑物的名称或一张包含附加信息的小卡片，一直到创建通常被称为混合现实（MR）的环境，其中数字层内容丰富且可被操控。


  另一方面，VR 则创造了一个全新的世界，并将我们置于其中。AR 或 MR 是对我们当前所见进行增强，而 VR 则是用完全数字化的世界取代了现实世界。用户通常佩戴一个头戴设备，使其沉浸于虚拟世界，并手持交互设备来管理场景，或者他们的手势通过外部设备被“读取”和解析。


  尽管这些技术相比对话式界面距离主流应用更远，但临界点正在临近。更强大的计算能力、更优秀的硬件，以及以机器视觉、自然语言等形式应用的人工智能技术，这些“魔法配方”将再次催生出有潜力成为我们当前行为自然延伸的解决方案。然而，成功绝非必然。即使所有必要的技术要素都已具备，使用场景仍需仔细考量。


  例如，还有人记得谷歌眼镜吗？该设备于 2012 年高调发布，被誉为 AR 时代的先驱。佩戴者通过自然语言语音指令或触摸眼镜侧面与设备进行交互，眼镜能够在视线正上方叠加相关的数字信息。所有要素都已齐备：自然语言、可穿戴设备，以及大量确保一切流畅运行的自动化技术。但它却是一个彻底的失败品。


  谷歌眼镜失败的原因有很多，此处并非进行深入分析的场合。从我们的角度来看，有趣的是，许多问题与技术本身关系不大。换句话说，即使谷歌眼镜从技术能力角度看是“完美”的设备，它仍然会失败。它价格昂贵，造成了尴尬的社交局面（例如，担心人们会在不知情的情况下被眼镜拍照，导致其在多个场所被禁用），并且没有解决人们迫在眉睫的问题。


  与使用我们立即熟悉的界面范式的语音或文本对话不同，AR 技术增加了一个我们需要去适应的新层面。这意味着，除非设计得当，否则它就成了又一个需要学习的界面。如果该界面能带来足够的好处，即使它并不十分契合，人们也会投入时间去学习。如果不能，那么在最初的兴奋过后，人们就会放弃。事实上，称谷歌眼镜为彻底的失败并不公平。它在工业环境中找到了用途，那里有明确的用例，可以帮助熟练工人在完成任务时提高效率。


  从消费者角度来看，我们有一些强有力的例子表明，当 AR 被有效利用时，它可以非常成功。游戏行业的《精灵宝可梦 GO》或许是最著名的例子。《精灵宝可梦 GO》让配备智能手机的用户在现实世界中搜索并捕捉数字宝可梦。游戏会指示用户需要去哪里寻找宝可梦，从而具备了将人们引导至特定地点的能力。将现实世界寻宝与数字游戏玩法相结合的兴奋感席卷了全球，在
  2016 年的几个月里，你不可能不遇到正在玩或讨论这款游戏的人。虽然最初的兴奋感已经平息，我们也不再在新闻报道中听到《精灵宝可梦 GO》，但该游戏仍有数千万用户，并创造了数亿美元的收入。^(⁴⁰)


  从业者通过这些成功与失败不断学习，并且由于 AR 的吸引力显而易见，它最终将取得突破，成为帮助我们完成办公室工作的工具的一部分。然而，第一个应用领域更可能是工业领域，而非办公室工作。工业环境中的成本/收益比要明显得多，且操作领域定义明确。一家名为
  UpSkill.io 的公司就是一个很好的例子。他们使用 AR 眼镜帮助现场技术人员接收来自远程专家支持人员的信息。AR 眼镜在操作复杂设备（如钻机）的现场技术人员与专家支持人员之间建立了双向信息流。^(⁴¹)
  后端专家可以与现场技术人员交谈，精确看到技术人员所看到的画面，并将相关信息流式传输到眼镜上。这使得专家技术人员能够扩大服务范围，同时支持多名现场技术人员，为公司带来明显的成本节约。


  如果说 AR 因其引入了新的做事方式而具有挑战性，那么 VR 则将这一挑战提升到了全新的高度。VR 技术需要上演终极魔术。它需要让我们相信自己身处一个全新的世界，同时又感觉它像现实世界一样自然。多年来，挑战仅仅在于如何将足够的计算能力集成到一个便携式设备中，以便你能够真正佩戴并随身携带。一个催化时刻是
  Facebook 在 2014 年以 20 亿美元收购了最有前途的 VR 头显制造商之一——Oculus VR。这项技术的前景加上 Facebook 的覆盖范围，让人们相信我们很快就能在客厅里拥有
  VR 设备。几年后，热情已经消退，但技术仍在前进。Oculus 现在拥有无需任何线缆且价格显著降低的产品。


  最终，这项技术的前景将确保其持续发展。对于日益分散的办公室，大型团队需要在复杂项目上进行紧密协作，能够改善协作体验的工具至关重要。VR 的圣杯之一就是改善会议室体验，让会议室内的与会者和远程拨入者都感觉身处同一空间。所有大型科技公司和无数初创公司都在开发
  VR/AR 平台，这些平台将工具交到开发者手中，让他们能够探索这一领域，找到可行的用户体验解决方案和商业模式。一些值得关注的平台包括：


  *   微软的 Hololens 2^(⁴²) 平台提供了基础要素，允许开发者在其之上构建应用程序。目前，它主要面向工业应用进行营销。




