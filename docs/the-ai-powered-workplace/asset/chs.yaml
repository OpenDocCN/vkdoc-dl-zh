- '# 追寻会思考的机器


  渴望制造出能像我们一样甚至比我们更出色地完成任务的机器，这种愿望与我们对世界进行推理、探究事物运作原理的能力一样古老。


  在《伊利亚特》中，当忒提斯去找赫菲斯托斯为她的儿子阿喀琉斯索取新的盔甲时，荷马将赫菲斯托斯的工坊描绘成一个名副其实的机器人巢穴。那里有三脚架机器，其任务是参加众神的会议（是的，连神自己也讨厌去开会）、机器人语音控制流水线，以及由黄金制成的、能帮助主人的机器人。


  > *它们由黄金制成，却看起来像真实的少女，不仅能说话、活动四肢，还被赋予了智慧，并从永生的众神那里学会了技艺。当它们忙碌地四处奔走服侍主人时，赫菲斯托斯蹒跚地走向忒提斯就座的地方。*^(¹)


  建造机器人是神的工作。他们为机器注入了生命。荷马在告诉我们，创造会思考的机器的能力，能赋予我们神一般的地位。


  我们当时面临的挑战，至今依然存在，那就是确切理解究竟该如何着手建造这样的机器。虽然我们可以想象它们的存在，但我们缺乏能够指引我们通往真实机器之路的工具或方法。难怪在想象解决方案时，常常会包含神秘的药水和炼金术，它们能神奇地赋予那些不完全受我们控制的弗兰肯斯坦式造物以生命。


  不过，我们一步一步地拼凑起了这个谜题的一些碎片。在机械层面，人类成功建造了非常逼真的自动机。通过巧妙的把戏，这些自动机的创造者甚至愚弄了人们，让他们相信这些机器被神奇地赋予了智能思维。从古希腊到中国汉朝，从美索不达米亚的贾扎里发明的水力自动机，到达芬奇的机械骑士，我们一直在试图弄清楚如何让机械物体像真实物体一样运动，同时欺骗观察者，让他们以为其中存在某种智能力量在驱动着行动。


  从推理的角度来看，我们从形式推理的起源，如亚里士多德的三段论，发展到理解如何通过算法（公元 820 年左右花拉子米的著作）来描述复杂过程，再到布尔所著的《思维定律》，它为我们提供了形式化的数学严谨性。


  尽管如此，我们在创建复杂系统方面仍然严重准备不足。虽然外行人可能被障眼法所迷惑，但该领域的实践者知道，他们的系统距离人类（或任何形式的自然）智能的复杂程度还差得很远。


  随着科技进步，我们进入了 19 世纪，计算机科学领域开始成形。随着查尔斯·巴贝奇的分析机和阿达·洛芙莱斯在编程方面的工作，一条从想象通往实现的道路轮廓开始显现。阿达·洛芙莱斯推测，通过她的编程，分析机“或许能够创作出结构复杂、具有科学性的音乐作品，其复杂程度和篇幅可以任意。”


  到第二次世界大战结束时，我们在计算方面取得了进展，这既是战时建造大型密码破译机努力的结果，也归功于艾伦·图灵的理论突破。几年后（1950 年），艾伦·图灵甚至为我们提供了一个测试，用于检验那些声称能够思考的机器。该测试要求一个人与一台机器进行对话，同时第三位观察者能够看到对话内容（通过查看打印出来的对话记录）。如果第三位观察者无法区分人类和机器，那么机器就通过了测试。^(²)


  通往人工智能的道路变得越来越清晰。


  ## 新研究领域的诞生


  1955 年 8 月 31 日，美国的一组研究人员撰写了一份简短的文档^(³)，为一个夏季研究项目申请资金。开篇段落证明了人类无限的乐观主义，也是对“事后诸葛亮”这句话含义的一个教训。


  内容如下：


  > *我们提议，在 1956 年夏季于新罕布什尔州汉诺威的达特茅斯学院，进行一项为期两个月、由十人参与的人工智能研究。这项研究将基于一个猜想展开，即学习的每一个方面或智能的任何其他特征，原则上都可以被精确地描述，以至于可以制造一台机器来模拟它。我们将尝试寻找如何让机器使用语言、形成抽象概念和概念、解决目前专属于人类的各类问题，并实现自我改进。我们认为，如果精心挑选一组科学家，共同为此工作一个夏天，那么在这些问题中的一个或多个方面，就能取得重大进展。*


  对于 21 世纪的读者来说，最引人注目的短语是最后一句。它声称仅仅经过一个夏天的工作就能取得重大进展。请记住，这是在 1956 年的计算技术背景下。第一块集成晶体管还要等
  4 年才出现。计算机占据整个房间，逻辑模块使用的是真空管。


  当然，平心而论，所涉及的这组科学家确实出类拔萃。该提案由四位极具影响力的计算机科学家共同签署。信息论之父克劳德·香农；最早构建随机连接神经网络的马文·明斯基；第一台通用、大规模生产的计算机
  IBM 701 的首席设计师纳撒尼尔·罗切斯特；以及被广泛认为是“人工智能”一词的创造者、Lisp 编程语言的发明者约翰·麦卡锡。如果说在 1956 年有哪一组人有可能取得重大突破，那无疑就是他们了。


  这次达特茅斯会议被普遍认为是第一届人工智能会议。它塑造了学术界关于为了创造展现智能的机器而需要处理的一系列问题的思考。它也引发了巨大的兴奋和*热潮*，并导致了人工智能领域持续数年的资金支持，这在很大程度上基于人们对明斯基等人能从帽子里变出兔子（创造奇迹）的信任。


  那些*黄金*（几乎字面意义上的）岁月奠定了人工智能领域的基础。从 1955 年到 1970 年代初，创建了各种各样的子领域，并阐述了其中的问题和挑战。从不同的推理方式到自然语言理解的起步，再到第一批神经网络等等，这个领域蓬勃发展。


  然而，一如既往，缺乏人们期望或预测的结果相伴的热潮和兴奋，导致了所谓的第一个人工智能寒冬。人们最初被夸大的说法所迷惑，最终对人工智能感到失望，并对其产生成果的能力失去了信心。人工智能被边缘化，资金减少，焦点转向了其他问题。


  值得注意的是，人工智能的研究在此期间并未停止。它可能不那么为公众所见，总体资源也有所减少，但兴趣依然存在。研究经费中较少使用“人工智能”这个术语，但他们仍在努力解决同样的问题。




  ## 实际应用


  到了 20 世纪 80 年代，人工智能迎来了复苏。它找到了一个能够为企业解决问题、且应用广泛、回报清晰的领域。那时，多个研究团队，尤其是斯坦福启发式编程项目，意识到与其试图创建通用问题求解器，不如专注于需要专家知识的受限领域。这些*专家系统*利用了前几十年关于如何编码知识和进行推理的所有研究成果，并将其聚焦于特定领域内的具体用例。


  专家系统可以广义地描述为：将知识编码为一组规则，并创建一个推理引擎，该引擎能够接收对事物状态的描述并推导出一些结论。大致上，你会有一组规则，例如“如果温度低于
  60°F，就穿一件保暖外套”，以及诸如“夹克是外套的一种”这样的关系。通过组合大量的此类规则和关系，专家系统能够捕捉某个特定领域内专家高度复杂的知识，并作为辅助手段来增强人类专业知识。到
  20 世纪 80 年代中期，已经形成了一个完整的产业，众多公司专注于提供运行专家系统的技术。这些软件巨头使用诸如`Lisp`之类的编程语言来封装知识，并使用专用机器来快速处理这些规则。


  20 世纪 80 年代一个标志性的专家系统例子是`XCON`（专家配置器），它为数字设备公司（DEC）而构建。`XCON`的任务是协助 DEC 计算机的订单配置。其输入是客户的需求，输出是必要的计算机系统组件。`XCON`基于
  DEC 专家的知识构建，拥有大约 2500 条规则。它最终每年节省高达 2500 万美元，因为它处理订单的准确率（在 95%到 98%之间）高于技术人员，从而减少了
  DEC 因错误配置而必须发送的免费组件数量。


  借助专家系统，企业家们看到了机遇；人工智能找到了它的杀手级应用，商业再次繁荣起来。然而，炒作再次冲昏了所有人的头脑。人们做出了宏大的声明，尽管确实构建并有效使用了许多有用的软件，但期望值被设定得过高。结果，这个行业崩溃了，几家公司消失了。人工智能再次被打入冷宫。


  这第二次人工智能寒冬中一个较少被提及的特点是，该行业的很大一部分（即涉及的大量资金）都集中在构建能够运行专家系统的专用机器上。需要记住的是，当时的个人电脑行业仍然局限于爱好者群体。专家系统行业未能预见到个人电脑的崛起。个人电脑变得流行起来，并被公认为有效且有用的商业机器，这使得昂贵的专家系统机器显得不那么有吸引力了。


  简单来说，根本不需要一个庞大的产业来制造运行专家系统的专用计算机，因为人们可以用普通且更便宜的个人电脑完成大量工作。企业可以通过引入个人电脑，以更敏捷的方式实现数字化转型。^(⁴)
  给每个人配备文字处理器和灵活的数字计算工具，让他们自己想办法充分利用这些工具，在当时看来似乎是一种更好的投资方式。因此，这个故事的一部分是，技术格局发生了变化，而人工智能行业未能足够快地适应。


  企业利用技术来获得竞争优势。当时，投资于庞大而复杂的人工智能系统风险很高。让整个公司跟上计算技术的步伐，并让公司内更多的人员从通用计算的进步中受益，这要合理得多。


  理解这些潮起潮落，对于学习区分噪音和信号至关重要。在这 40 年间（从 20 世纪 60 年代初到 21 世纪初），有能力的人构建了能够解决实际问题的、有能力的软件，这些软件使用了人工智能。他们还推动了科学进步，让我们知道如何用计算机解决复杂问题。这场战斗并非真正在这个层面上进行或衡量。人工智能的寒冬或春天，是通过人们吸引资金的能力（这诱使人们做出夸大的声明）以及人工智能与其他争夺投资的技术类型之间的竞争来衡量的。到
  20 世纪 90 年代初，人工智能的名声普遍受损，而有许多新的、令人兴奋的、且更具直接应用价值的技术（比如一个叫做万维网的小东西）值得投资。


  ## 人工智能转入地下


  鉴于上述所有情况，人工智能研究人员制定了一种不同的生存策略。他们不再说自己在研究人工智能，而是专注于谈论自己所从事的具体子领域。从多智能体系统（我作为博士生和研究员所从事的领域）到知识管理、业务规则管理、机器学习、规划等等，涌现出了一系列不同的领域。我们所有人都在试图构建能够以更好方式解决问题的机器。我们只是不再那么强调人工智能这部分了。即使是那些直接专注于最艰巨任务——利用计算机理解或重现人类行为——的研究人员，也将其称为“认知计算”或“认知科学”，而不是称之为人工智能研究。


  在幕后，像国际人工智能联合会议（从 1969 年到 2015 年每两年举办一次，现在则改为每年举办）这样的集会依然存在。那些在申请资金时不愿谈论人工智能的人仍然会参加。每个人都知道他们在研究人工智能，但他们不会过分炒作它。


  我个人的 AI 之路让我想起人工智能曾经是多么不受待见。1999 年，我在华威大学读本科时，必须获得计算机科学系的“特别”许可才能参加一门认知计算课程，因为这门课是由心理学系开设的！我最终在我的本科学习中塞满了太多与人工智能相关的课程，以至于我被叫去解释这仍然是一个有效的计算机科学学位。幸运的是，所有那些“潜伏”的人工智能学者都支持我，最终我赢得了这场争论。快进到
  2019 年，大学们争相开设人工智能学位，而学者们则重新宣称自己是人工智能教授，而仅仅五年前，他们还只是“普通的”计算机科学教授。


  所有这些有助于说明，并且当你听到人工智能以前经历过周期、人工智能只是炒作时，必须牢记的一点是：人工智能是一个非常宽泛的术语。它宽泛到可以说几乎毫无用处——除非它能激发投资者和大众媒体的想象力。然而，它试图解决的问题是无法消失的。它们是人类必须面对的真实科学问题或真实挑战。将媒体的噪音和让投资者兴奋的炒作与真正重要的事情区分开来，对于接近人工智能至关重要。在下一节中，我将解释为什么我认为我们已经到了一个讨论人工智能周期不太有用的节点，而在下一章中，我们将更好地理解人工智能的实际含义。




  '
- '# 新的永恒之春


  从 2000 年代末至今（2019 年），人们对人工智能的热情似乎已达到白热化程度，需要适当降温。与此同时，科技领域内外也发生了许多其他变化。这些新元素再次从根本上改变了格局。


  与 20 世纪 80 年代不同，我认为这次格局的变化有利于人工智能的长期发展以及相关技术产业的成长。这些变化不仅会推动人工智能的普及，更会使其成为必需品。人工智能将不再是一种偶尔引入的新奇应用，而是会成为我们一切活动的基本支柱之一。


  我们可能会给它冠以不同的名称，投资者也可能再次失去兴趣，但它所提供的工具和问题解决方案将留存下来。这一点在智能手机上已经显而易见——手机中引入了专用于 AI 计算的芯片。如果关闭这些芯片，我们甚至无法解锁手机（人脸识别）或进行文字输入（预测输入）。


  在最基本的层面上，至少有三种力量在推动人工智能技术的采用：


  1.  我们处理的数据量出现了前所未有的增长，需要精心管理这些数据并以此为基础做出决策。

  2.  过去 50 年遵循摩尔定律发展的处理能力，使得将复杂算法应用于数据成为可能。这些算法在明确定义的领域中的表现已能与人类能力媲美甚至超越。至少，这些工具能成为有用的伙伴，增强人类的能力。

  3.  云计算使存储和处理能力得以广泛普及，并增加了复杂的服务层，任何人都可以访问和使用复杂的人工智能工具。开源工具在底层能力方面也发挥着同样的作用。人工智能正以前所未有的方式走向大众化。


  ## 数据洪流


  第一个根本性转变在于我们利用数据的能力发生了巨大变化。数据一直在产生，关键在于能否被捕获、存储、检索和分析。在这方面，过去几年带来了量级上的变化。如今，我们可以非常经济高效地存储海量数据（尽管其中大部分仍是非结构化数据），并且能够处理我们所存储的大量数据。


  很难确切说出我们每天存储多少数据。以下是 IBM 在 2018 年公布的一些数据：


  *   每年进行 8000 万次核磁共振成像

  *   每天出现 6 亿种恶意软件

  *   每 15 分钟生成 22 亿个地点的超本地天气预报


  如果你访问`internetlivestats.com`网站，会看到令人眼花缭乱的计数器在不断跳动。2019 年 9 月中旬的一个上午，我在中欧地区查看时，突出的数字包括：


  *   当天已发送超过 1150 亿封电子邮件

  *   超过 3500 万张照片上传到 Instagram

  *   谷歌上已进行超过 30 亿次搜索


  用“泛滥”或“淹没”这样的词来形容数据现状，这一次毫不夸张。根据*Raconteur*的研究，到 2025 年，我们每天产生的数据量可能达到 463 艾字节。这将在很大程度上由连接到物联网的设备数量增长所驱动，包括可穿戴设备、家庭智能设备以及工业设备。


  人工智能带来的机遇很简单：人类无论如何都无法指望在没有自动化的情况下分析哪怕一小部分数据。对此应用大规模数据分析是我们唯一的希望。更进一步，我们可以预见，除非我们将自动化决策嵌入系统，否则我们将无法应对决策和行动需求的增长。


  考虑到人类面临的一些惊人需求，这里举一个教育领域的例子。根据联合国大会通过的目标，为了实现 2030 年让每个儿童都能接受中小学教育的目标，全球将需要额外增加
  6900 万名教师。截至 2018 年，全球共有 6400 万名教师（这还未考虑教师自身培训水平等质量问题）。我们需要在 12 年内将全球现有教师数量翻一番。为了培训足够的教师以实现目标，我们需要技术的大力支持来扩大教师培训规模、扩大学生教育规模，并更准确地衡量成果。所有这些都将依赖于有效的数据管理和流程自动化，以便人力资源能够专注于他们最擅长的事情——人与人之间的互动。


  在中国，一家名为松鼠 AI 的公司用 2 年时间建立了超过 700 所 K-12 教育学校，服务超过 100 万名学生。整个系统依赖于能够根据学生个人需求调整教学计划的复杂算法。虽然对这类系统将如何真正影响儿童和教育持怀疑态度是健康的，但与此同时，我们必须承认，探索此类解决方案是应对不断增长的人口和教育需求的唯一途径。


  ## 原始处理能力与更优算法


  第一人称射击游戏和人工智能有什么共同点？


  信不信由你，没有前者，后者可能就不会有如此强劲的复兴。2009 年，在国际机器学习大会上，Raina 等人发表了一篇关于使用图形处理器应用于大规模深度信念网络的论文。由如今著名的吴恩达领导的斯坦福大学
  Raina 研究小组，找到了有效利用图形处理单元的方法，特别是通过英伟达的 CUDA 编程模型，利用 GPU 提供的并行化能力，大幅缩短了训练机器学习模型所需的时间。到那时，由于计算机游戏行业（正是为了满足第一人称射击游戏对更好画质的需求）对
  GPU 需求的增长，GPU 已经变得非常高效*且*成本效益极高。


  GPU 的使用，加上算法设计的进步（特别是多伦多大学杰弗里·辛顿团队的贡献），导致了结果质量以及获得这些结果所需付出的努力发生了阶跃式变化。


  从很多方面来看，这两项进步已经让“精灵”从瓶子里跑了出来。作为一个产业，人工智能可能会在某个时候遭遇挫折，投资者可能会抱怨，我们可能无法实现所有被承诺的东西。然而，迄今为止开发的技术将始终可用，并且由于其广泛的适用性，它们将一直被用来解决问题——尤其是在我们看到通过云计算和开源软件实现人工智能大众化之后。




  ### AI 的民主化


  直到 2015 年，实际运用 AI 技术通常还非常困难。除非你的团队中有 AI 专家，否则你几乎无法真正尝试应用这些技术。自那以后，情况发生了巨大变化。


  2015 年 11 月，`TensorFlow`（谷歌用于构建机器学习应用的框架）作为开源工具发布。自那时起，AI 工具的开源领域呈现爆发式增长。在线课程也层出不穷，既有付费的也有免费的，学习
  AI 技术的主要障碍变成了你的时间安排和网络带宽。


  此外，到 2019 年，通过简化的应用程序编程接口，我们能够以前所未有的程度访问复杂的机器学习服务。亚马逊、微软、谷歌、IBM 等众多公司都提供了对其工具的访问权限，使组织能够上传数据、训练模型，并在其应用程序内部署解决方案。


  特别是微软，直接提出了 AI 民主化的理念。其目标是让所有软件工程师都能像通过云解决方案获取数据库技术或原始计算能力一样，轻松使用 AI。


  这些技术作为云解决方案的广泛可用性，不仅降低了实现 AI 驱动应用所需的专业水平，还缩短了从创意到原型再到生产级部署所需的时间。正如我们稍后将看到的，在实践过程中迭代、实验和学习的能力，与拥有现成的技术同样重要。


  ## 展望未来


  在上一节中，我们阐述了 AI 为何不可能轻易消失的理由。请注意，这并非关乎 AI 产业的经济学，也不是风险投资家、初创公司、大型企业或政府政治中谁获得更多关注和资金的问题。这里的论点关乎数字世界如何演化的基本原理以及现实世界的需求。问题正变得越来越大，除非我们引入自动化，否则我们已快穷尽扩展系统的方法。


  无论是农业、教育、健康还是办公室工作，我们都不能只是延长工作时间并承受更大压力。必须有所妥协，必须有所改变。我希望改变的方向是更有效地利用技术，让我们能够专注于更重要的事情。是的，在此过程中，我们会经历繁荣与萧条。但是，请不要将媒体报道或关于独角兽初创公司的融资新闻与基本面混为一谈。AI
  的目标不应该是让我们都变得更像机器，或者创造独角兽初创公司。


  与任何技术一样，AI 的目标应该是将我们从当前的境况中提升出来，并归还我们时间去探索作为人类的意义。


