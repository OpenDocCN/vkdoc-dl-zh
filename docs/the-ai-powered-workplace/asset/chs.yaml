  ## 对话式协作平台


  在第 7 章中，我们讨论了即时通讯应用在组织内部以及作为组织与用户沟通手段的兴起。我们简要介绍了即时通讯应用为何是增长最快的应用类型，以及这如何为企业以全新方式与消费者（及其员工）沟通创造了机遇。


  正如我们手机上的`WhatsApp`或`Telegram`等即时通讯应用远不止是用户之间交换信息的工具，工作环境中的即时通讯应用也已发展成熟，能够支持一系列活动。事实上，其演变程度之大，以至于简单地称其为即时通讯应用或聊天应用已无法涵盖其实际功能。更恰当的说法是，应称其为*对话式协作平台*。


  它们是***对话式***的，因为与平台上其他用户（以及通常还有其他应用）互动的主要方式是通过信息交换。这赋予了我们人类优势。我们非常习惯于对话，因为这是我们在数字领域之外进行沟通与协作的方式。这些平台上的对话可以采取不同形式，从私密的一对一沟通中与同事的自由交流，到群组讨论，再到与使用自然语言和更结构化操作相结合的应用进行对话。


  它们完全关乎***协作***。我们将此类软件引入组织的唯一原因，是我们认为它能让我们更轻松地完成任务。如果它未能实现这一目标，那便辜负了其使命。正如我们在第 3
  章中讨论的，我们可以思考它们在帮助我们实现目标时是处于被动地位，还是主动参与者。一个仅促进信息交换的简单即时通讯应用是被动参与者。然而，这些工具正日益成为主动参与者。无论是`Slack`、`Microsoft
  Teams`还是`Facebook Workplace`，其产品开发团队都包含人工智能专家，他们正致力于通过引入各种形式的自动化来让这些工具更有用。例如，`Slack`会高亮显示其认为重要的信息，并让你能够除了“最新”或“最旧”等常见排序选项外，还能“科学地”排序你错过的信息。这里“科学地”的含义是，机器学习算法根据通过监控你在`Slack`环境中的互动而推导出的重要性指标，对信息进行排序。其希望是，这能让你优先关注重要事项，从而促进与整个团队的协作。


  最后，它们是***平台***，因为它们提供了丰富的方式来为其添加功能。我们可以安装应用，将电子邮件重定向到共享留言板，帮助我们更好地与项目管理工具集成，或帮助我们规划和协调会议。我们还可以开发自己组织独有的应用，向所有人开放自定义功能，例如触发其他应用执行操作的能力。


  因此，这些对话式协作平台可以成为连接组织各个不同方面（人员、流程和工具）的粘合剂，以及我们访问这些方面的界面。它们可以成为我们组织的操作系统。


  对话式协作平台可以成为我们组织的操作系统，一个更贴近我们组织形态的系统，在其之上我们可以整合人员、流程和工具来实现目标。


  在下一节中，我们将更深入地探讨对话式协作平台在办公环境中的具体形态，以及它为何成为如此受欢迎的工具。我们将以`Slack`为起点，因为它既是我们正在探索的环境类型的一个良好范例，也是一个简单的范例。我们还将提及`Facebook
  Workplace`，因为它通过一些更“传统”的社交网络理念扩展了这一范式。


  顺便提一下，`Slack`作为一家公司和初创企业也很有趣。它的崛起堪称对话式协作平台领域重要性的典范。当`Slack`最初宣布从不同的运营和商业模式转型时，人们的反应并不热烈。它瞄准的是一个大多数人认为并不特别令人兴奋的领域。为什么要构建又一个即时通讯应用，与`Skype`、`Google
  Talk`、老牌且值得信赖的`IRC`（互联网中继聊天）以及众多允许人们聊天的应用竞争呢？然而，人们未能看到的是，`Slack`从未试图构建“仅仅”一个即时通讯应用。`Slack`一直在为办公环境打造一个对话式协作平台。


  `Slack`意识到，虽然解决即时通讯问题的方法很多，但很少有方法能以团队能够自我管理的方式解决更广泛的协作问题。这种对支持更广义工作（而不仅仅是消息传递）的不懈关注，加上出色的营销技巧、简便的团队注册流程和有效的设计，使`Slack`成为众多办公团队的宠儿。


  `Slack`非常成功，以至于即使团队已经配备了官方批准的通讯工具（通常是`Skype for Business`），他们也会“暗中”安装`Slack`，因为它代表了一种更好、更有趣的协作方式。该公司在短短几年内发展壮大，2019
  年收入达到 4.01 亿美元，市值达到 150 亿美元。与此同时，`微软`推出了`Microsoft for Teams`（Office 套件中的“Slack”）作为回应，并自
  2019 年起声称用户数超过`Slack`，因为他们可以利用其庞大的触角覆盖各类组织。另一方面，`Facebook`凭借`Facebook Workplace`取得了（媒体层面）低调但（数字层面）巨大的成功，其名称已说明一切。它的承诺是，为你的企业独家提供最流行的社交网络和消息基础设施的所有熟悉感和强大功能。像`沃尔玛`、`Spotify`、`星巴克`和`喜力`这样的公司正在将其用作整个员工队伍的通用平台。


  ### 核心功能


  对话式协作平台至少需要解决六个关键领域，才能作为组织数字操作系统的坚实起点。它们需要：


  * 提供一种方式，让我们能够找到并与组织中的其他人互动。

  * 指示团队正在做什么以及谁有空。

  * 支持基于项目需求的各种配置下的一对一及群组对话。

  * 支持文档和链接的交换与展示。

  * 允许跨对话和文档进行搜索。

  * 提供与外部世界（即组织其余的数字资产以及外部合作伙伴和服务提供商）集成的手段。




  #### 人员


  第一步自然是汇聚平台上的成员，并能够以有效的方式发现他们。在此背景下，比较 Slack 和 Facebook Workplace 的差异会很有启发。Slack
  最初是一个消息平台，后来发展成对话式协作平台。Facebook Workplace 最初是一个社交网络，后来也发展成对话式协作平台。两者在人员信息处理方式上的不同起点显而易见。


  在 Slack 上，每个成员都有一个包含一些基本信息的个人资料（照片、电子邮件、“我的工作”字段）。用户可以添加额外字段，Slack 既提供“内置”字段（例如指向你的
  LinkedIn 个人资料的链接），也支持创建自定义字段。而 Workplace 则暴露了其出身，它从一开始就提供更丰富的个人资料，包含技能和部门信息等字段。


  无论哪种情况，关键在于能够创建包含*结构化*信息的个人资料，以便软件在自动化流程中利用这些信息。回到第 4 章提到的人工智能技术，这种结构化信息可以为更广泛的人员及其技能知识图谱提供支持。根据你的具体需求，你可以添加描述组织所关注信息的字段。通过平台，成员可以自行管理自己在知识图谱中的部分，这些信息随后可以被聚合和推理。


  你可以将所有相关信息都包含在对话式协作平台内，也可以将其与一个更强大的、能从平台提取信息的外部工具集成。然后，这些信息可用于支持搜索功能，根据技能、部门、地理位置等多种参数来查找组织内的人员。


  #### 在线状态


  人名旁边的绿色圆点，表示他们是否登录了消息应用，这相当于在数字世界中瞥一眼办公室，看看 Sarah 是否在她的工位上。然而，与现实世界不同，我们可以通过在该圆点旁发布特定的状态更新，使其更有趣，例如：“请勿打扰”、“乐于交谈”、“正在专注”、“吃午饭”等。我们提供了在现实世界中可能难以复制的上下文信息。这些信息很有用，同事和自动化程序都可以利用它来确定与某人互动的最佳方式和最佳时机。利用这一点的一个简单示例是将你的日历与状态信息集成。这样，即使你坐在工位上，人们也能知道你实际上正在参加在线会议，或者你正在处理日历上为特定任务预留的时间。


  这类集成是构建日益智能和有趣的自动化的基石。自动化需要一个尽可能清晰的、关于它试图自动化的世界的模型。在线状态信息就是该拼图的一部分。


  此外，这不仅仅是描述事物当前状态的有用信息。*随时间推移*的在线状态信息还能提供关于组织工作起伏的宝贵信息。人们何时登录，登录多长时间，其他事件（公司会议、大会等）如何影响人员的可用性？


  #### 对话


  当然，对话是任何消息应用的核心。这里的关键方面是应用支持可能需要的不同类型对话的丰富性。就像在现实办公室中，我们会因不同原因聚集在不同地方一样，数字空间也必须允许这样做。你*可以*拥有数字茶水间、小厨房、私人会议室和全体大会。


  需要考虑三个维度：群组结构、对话类型以及对群组访问的控制。


  首先，我们能够在哪些群组（或频道）配置中进行对话？我们需要能够进行一对一对话、临时群组对话以及基于话题的长期对话。不同的配置最终会反映出你组织的运作方式。有时，它可能比官方组织架构图更能真实反映实际的群体划分。


  其次，应该进行什么类型的对话？一个例子是自由开放的开放式对话与更像 Facebook 界面的、包含一篇主要长帖和下方评论的对话之间的区别。在 Slack 中，这通过话题回复部分实现，用户可以直接回复频道中的特定消息，使该顶部消息相当于
  Facebook 中的帖子。也有一些应用试图引导对话，以便突出显示清晰的输出，并从输入流中提取出具体的决策。


  最后，从安全角度考虑，你需要关注：


  *   谁可以加入或离开群组？

  *   当新成员加入群组时，他们能否访问该群组的历史信息？

  *   谁可以创建私密群组，管理这些行为的规则是什么？如果一个组织追求透明度，但成员发现存在许多他们无法加入的私密群组，这又说明了什么？

  *   总的来说，对话是否应被视为真正的私密（即使是一对一对话），还是组织计划访问这些信息？简单来说，如果我在组织对话平台上与一位同事进行私密对话，最终谁可能会看到这些信息？


  不同的情况和不同类型的群组需要不同的方法。每个团队都需要探索和试验，以找到最适合自己的方式。这里的一个基本点是，这些问题不应被视为次要细节或次要问题。就像人们不会允许随意设计物理空间一样，你的数字空间也需要同样的关怀和关注。正如我们在第
  6 章中讨论的，一切都融入了定义你作为一个群体的要素。如果你没有刻意去塑造正在发展的文化，你最终可能会得到一种不仅不合适而且很难改变的文化和流程。


  接下来，我根据在多个环境中看到的配置，概述一些不同类型群组的示例，以便让你更具体地了解不同设置可能的样子。


  *   *实践社区群组*：这些群组支持组织中同一领域的成员（例如，所有前端开发人员、所有项目经理、所有数字营销人员）分享信息并讨论他们的工作方式。

  *   *项目群组*：项目群组为从事某个项目的跨职能团队提供了一个聚集并专注于该工作的空间。它们的存在时间与项目所需时间相同，参与者会随着人员的加入和离开而变化。




  ### 公告群组

  这些群组旨在发布团队公告，并尽量减少其他类型的互动。这使人们能够轻松追踪这些公告，而不会在更繁忙频道的聊天流中丢失，同时也方便当时不在场的人快速跟上进度。根据您使用的平台，这些群组还可以设置为只读，这样人们就不会试图在相同语境下讨论公告，从而使信息更清晰易懂。


  ### 兴趣与爱好群组

  您的团队中有很多狂热的猫爱好者，或者也许是酒吧问答迷或体育迷吗？为他们创建单独的群组，让他们围绕自己喜爱的话题畅聊，并通过讨论共同兴趣，在实践社区、项目团队和组织部门之间建立联系。


  ### 共享群组

  这是`Slack`的一个特定功能，但我认为它非常令人兴奋。在`Slack`中，您可以创建一个跨不同`Slack`组织共享的群组（或`Slack`特指为频道）。这意味着来自公司
  A 和公司 B 的人员可以访问一个共享群组进行协作，而`Slack`会处理所有前端的身份验证和授权问题。这是为您和您的合作伙伴创建共享空间、共同协作的好方法。


  除了上述命名分组外，还有其他几种选项和变体，但我希望您能明白，像这样组织数字空间是多么有用。如前所述，关键在于要有意为之，并确保团队考虑（并不断重新考虑）应管理这些群组创建的规范和规则。让我再重复一次：就像在物理空间中，您不希望人们随意移动办公桌或拆墙一样，您需要确保在数字空间中也不会发生这种情况。


  最后，与状态信息一样，了解人们属于哪些群组以及这些群组如何随时间演变，可以非常强大。组织内部花费了大量精力来理解网络动态。像`Slack`这样的协作工具可以提供迄今为止最清晰的信号，表明实际正在发生的事情，供组织利用。您可以直接映射谁在和谁交谈，人们属于哪些团队，甚至可以探索人们协作的方式。他们是建设性的还是批评性的？他们在不同团队和情境下的行为如何变化？


  ### 文档交换

  协作的另一个方面是交换相关文档。像`Slack`这样的工具使这变得极其容易，因为它们允许您直接将文件拖放到对话流中，并附带一条消息。现在，有人可能会说这有点过于简单了，我可以证明它有时会变得多么混乱。想象一下，您正在处理一个文档并与团队讨论，而新版本的文档不断被丢入对话流中。要跟踪您应该关注什么，会变得很累。以这种方式共享文档的理由是，文档是对话和工作的一部分，因此您可以将所有内容保持在上下文中。对话式协作平台的承诺是，搜索和集成将能够再次将这些文档呈现出来。


  确实，已经取得了一些进展。例如，`Slack`与`Google Documents`有一个非常有用的集成。当您共享一个`Google`文档时，您共享的不是实际文档，而是指向当前版本文档的链接，这至少消除了您是否在处理最新版本的问题。然而，问题在于，当您随后进入文档时，您会发现文档内部正在进行另一场对话！`Google
  Documents`允许用户在`Google Documents`内交换评论和聊天。所以现在您有两场对话在进行。一场在`Slack`中，可能没有直接处理文档的人说了一些有趣的话；另一场在`Google
  Documents`中。这显然不是一个理想的情况。


  总的来说，我还没有看到一个真正解决了如何妥善处理这个问题的应用程序。我们正在处理不同的协作工具以及可能不同的协作模式。有时我们共享文档链接，而有时我们共享文档本身。这些文档和链接成为对话的一部分，但搜索并不总是能有效地找到我们真正需要的内容；虽然集成可以提供帮助，但它们也可能增加复杂性。


  规范可以再次在这里提供帮助，因为团队可以明确他们应该如何工作。然而，这绝对是一个需要更多工作的领域，以提供我们真正需要的协作空间。看看像`Dropbox`这样的工具是很有启发性的，它们现在也提供了一个协作环境，但一个更加以文档为中心的环境（因为这是它们的传统）。最终，我们应该看到对话式协作平台发展，以封装一个对文档更友好的工具集。


  ### 搜索

  跨人员、对话和文档的搜索可以将所有内容联系在一起，这是任何对话式协作平台的关键功能。知道您可以依赖强大的搜索是令人解放的，因为它鼓励更高水平的分享和参与，因为人们相信他们能够再次找到这些信息。


  当前的搜索能力令人印象深刻。例如，在`Slack`上，您可以创建一个搜索，查找在“2019 年度会议规划频道”中由`Tim`或`Mariola`在特定日期范围内共享的、且包含关键字“`Sponsors`”的文件。响应速度几乎是即时的，结果质量也很高。


  然而，尽管这类搜索功能强大，但它们也需要用户投入精力并集中注意力来构建。用户很容易在众多选择中迷失，或者忘记哪些组合是可能的。总的来说，虽然搜索已经非常有用，但仍有很长的路要走，并且（毫不意外地）这是人工智能技术的进一步应用将使我们取得进展的主要领域之一。


  最终，我希望看到更加对话式的搜索，并且能够从单一位置访问多个不同的文档来源。它应该更加对话式，这样我们就可以以与我们思考相同的方式进行搜索，而不必调整我们的思维以适应工具提供的过滤器和选项。我们应该能够使用自然语言来描述我们需要的，并依靠对话式应用程序的组合来帮助我们浏览可能的选项。它还需要考虑到信息分布在许多不同的地方，从我们的电子邮件到我们的文档存储库以及我们的对话式协作平台。我们需要从平台到外部世界的路径，以便将所有内容连接起来。




  #### 集成


  到目前为止，我们一直在讨论协作环境，将其视为团队讨论问题并做出决策的场所。而与外部世界的集成则意味着，这些相同的协作环境也可以成为执行操作和推动变革的场所。


  让我们以一个简单的任务为例，思考一下在有集成和无集成的情况下，它会呈现出多么不同的面貌。目标是：当有人申请休假时，能够知晓该请求，并批准、拒绝该请求，或在做出决定前要求提供更多信息。


  在没有集成的协作空间中，你或许会通过电子邮件收到通知，或者那位知道你一天只查看几次邮件的热心同事，会发消息告诉你他们已经提交了申请。毕竟，他们急于得到答复，以便继续规划假期！一旦你看到了请求，你很可能要打开浏览器，登录到人力资源软件（希望是单点登录；否则你需要找回密码并进行双重身份验证）。终于登录成功后，你开始四处点击，试图弄清楚如何批准它。最终你找到了方法。然后你意识到，你还需要和几个人核实一下。于是又发出了一连串的电子邮件，你还要费心确保及时跟进，将所有信息串联起来，最终做出决定。现在，你还得回想一下，在整个流程开始之前，你原本打算做什么，然后才能回到正轨。


  有了集成，你会在你的对话式协作环境中收到一条消息。你立刻就知道这是关于休假申请的，因为它来自`VacationBot`。消息中包含了你需要的所有信息，你可以点击“批准”、“拒绝”或“讨论”。点击“讨论”会创建一个私密频道，并将你和申请休假的人拉入其中。在那里，你可以快速询问几个规划问题，或许还可以邀请其他需要发表意见的人。整个对话，连同相关的参与者，都集中在一个地方。最终满意后，你点击“批准”，讨论发生的频道和机器人就会消失。


  集成可以非常强大，能够将协作工具转变为一个功能完备的操作系统，用于管理你的组织运作。所有主要的消息协作环境都提供了专门的应用商店，你可以在其中找到种类繁多的应用程序和集成。


  这类应用程序我称之为对话式应用程序，它们是第 9 章的重点。不过在此之前，我还想讨论另一种类型的对话平台。


  ## 自定义对话平台


  到目前为止，我们讨论对话平台时，都隐含了一个假设，即我们处理的是来自大型科技公司（如 Slack、微软或 Facebook）的软件。然而，在继续之前，有必要指出，对话平台可以有多种多样的形式和规模。它们可以涵盖从专注于特定垂直领域（例如金融、医疗）的平台，到为特定组织和应用的独特需求而开发的完全可定制的对话平台。


  需要采用不同方法的行业是金融行业。交易员，和其他任何职业一样，可以从即时通讯和协作中受益，但他们需要的安全性和合规性程度超出了大多数行业的要求。这为专门服务于金融行业的消息应用垂直领域创造了蓬勃发展的条件。诸如`Symphony`^(⁴⁴)之类的工具，提供了所需的安全级别，并具备诸如适当的审计追踪、跨组织的可信身份管理以及数据所有权等功能。


  同样，如果问题足够大，从头构建一个完全自定义的对话协作平台也是合理的。作为我的团队为会计师事务所 BDO 所做工作的一部分，我们构建了一个自定义的对话协作平台，正是因为只有通过定制化的工具，我们才能解决这个问题。


  ### 用于审计的对话工具


  BDO 希望解决的问题是如何简化其审计流程。来自 BDO 的专家审计师会与客户进行长期互动，并从多个不同来源收集数据以完成审计。虽然有一些工具可以帮助完成这一流程，例如共享文档存储，但最终仍涉及大量临时的来回沟通、电子邮件，并且对整个团队的协调提出了相当大的要求，以避免混乱。


  经过初步实验后，我们决定最佳行动方案是构建一个专用工具，用于设计和完成审计。该工具是一个对话协作平台，它允许审计师和被审计方在审计过程中交换消息，并设置特定的群组来处理审计的不同方面。所有审计信息都通过应用程序以适当的方式收集（使用自定义表单和字段）。此外，一个自动化工具——一个对话式应用程序——充当协调者，在审计师和被审计方进行流程时，为他们提供主动和被动的支持。它可以响应求助请求（例如，“在这个地区我应该如何处理增值税？”），也可以根据输入的数据类型主动提供建议。整个平台还与其他
  BDO 系统对接，以简化数据传输。


  最终的结果是：


  *   一个更加用户友好的审计流程，从而带来更高质量的审计

  *   对审计数据有更深入的理解，因为数据是以结构化的方式收集的

  *   通过完全自有的平台，对审计数据进行完全的控制和安全保障

  *   BDO 有机会利用降低完成审计所需总体工作量、同时提高审计本身可靠性的优势


  从头构建一个自定义聊天应用并非不切实际的想法，即使对于较小的组织也是如此。如果你认为完全控制平台上的信息流和行为能带来足够多的好处，那么就可以结合多种现有技术，来创建一个由你掌控且完全归你组织所有的环境。




  ## 你的组织操作系统


  在本章中，我们剖析了拥有一个对话式协作平台意味着什么，以及它如何充当组织的操作系统层。这些平台可以划定数字环境的发展空间。


  借助人员管理、状态信息、群组管理等功能，这些平台能让你构建工作流程。与任何事物一样，确保带着明确目标推进至关重要，这样最终形成的流程才能反映出你期望的团队类型和文化。


  通过将这些协作平台与组织的其他方面集成，你可以将其转化为一个界面，通过它几乎可以访问工作的所有其他方面。


  这些集成（即对话式应用）可以成为你组织的关键差异化优势，并通过自动化带来显著收益。在下一章中，我们将更详细地探讨什么是对话式应用，以及如何在对话式协作平台中使用它们。


