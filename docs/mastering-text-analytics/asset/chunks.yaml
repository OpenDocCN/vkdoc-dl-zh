    ''to'', ''the'', ''broad'', ''one'', ''from'', ''WordNet'', ''.'', ''NLTK'', ''’'',
    ''s'', ''POS'', ''tagger'', ''provide'', ''the'', ''necessary'', ''contextual'',
    ''information'', ''.'', ''Converting'', ''NLTK'', ''’'', ''s'', ''detail'', ''tag'',
    ''to'', ''WordNet'', "''s", ''simpler'', ''POS'', ''tag'', ''ensure'', ''that'',
    ''the'', ''lemmatizer'', ''have'', ''the'', ''necessary'', ''context'', ''.'']

    combined_df.columns

    Index([''CONTENT'', ''CLASS'', ''text_lower_case'', ''frequent_removed'', ''rare_removed''],
    dtype=''object'')

    # We will aplly the lemmatize diectly on combined_df[''text_lower_case''] as its
    a necessary step in our case.

    # First write a function to lemmatize text.

    def lemmatize_text(text):

    tokens = word_tokenize(text)

    pos_tags = pos_tag(tokens)

    lemmatized_tokens = [lemmatizer.lemmatize(token, get_wordnet_pos(pos)) for token,
    pos in pos_tags]

    return '' ''.join(lemmatized_tokens)

    # Apply the lemmatization function directly to combined_df[''text_lower_case''].

    combined_df[''text_lower_case''] = combined_df[''text_lower_case''].apply(lemmatize_text)

    # Display the DataFrame with the new lemmatized column

    print(combined_df[[''CLASS'',''text_lower_case'']])

