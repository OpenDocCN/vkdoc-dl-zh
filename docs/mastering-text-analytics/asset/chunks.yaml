    """This program shows how to use LangChain and OpenAI''s chat models to create
    a smart assistant. It combines user input with instructions for the AI to give
    helpful answers."""

    # You could store the openai key in the form of a string in a .txt file

    # This way of storing the API key is not very secure, but suitable for your personal
    projects on local computers

    # Below example will make it more clear for you

    # Install the essential libraries if not done already

    # !pip install openai langchain

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    # Test of api_key is copied correctly

    # api_key

    from langchain.chat_models import ChatOpenAI

    from langchain.prompts.chat import (

    ChatPromptTemplate,

    HumanMessagePromptTemplate,

    SystemMessagePromptTemplate

    )

    from langchain.schema import AIMessage, HumanMessage, SystemMessage

    """

    Step 1: Import Necessary Modules

    - `ChatOpenAI`: Enables interaction with OpenAI''s language models like GPT-3.5
    Turbo.

    - `ChatPromptTemplate`: Combines system and human message templates into a conversation
    format.

    - `HumanMessagePromptTemplate`: Represents the user''s input.

    - `SystemMessagePromptTemplate`: Represents instructions for the model, such as
    its role or behavior.

    - `AIMessage`, `HumanMessage`, `SystemMessage`: Define different types of messages
    exchanged in the chat.

    """

    # Initialize the Chat Model

    chat_model = ChatOpenAI(model="gpt-3.5-turbo", temperature=0.7, openai_api_key=api_key)

    """

    Step 2: Initialize the Chat Model

    - `model`: Specifies the OpenAI model to use (e.g., `gpt-3.5-turbo`).

    - `temperature`: Controls the randomness of the model''s output (lower = more
    deterministic).

    - `openai_api_key`: Passes the OpenAI API key to authenticate requests.

    """

    # Define the Chat Prompt Template

    system_message = SystemMessagePromptTemplate.from_template(

    "You are a helpful assistant that provides concise and accurate answers."

    )

    """

    Step 3a: Define the System Message

    - This message provides context or instructions to the AI, guiding its behavior.

    - Here, the AI is instructed to act as a helpful and concise assistant.

    """

    human_message = HumanMessagePromptTemplate.from_template("{user_input}")

    """

    Step 3b: Define the Human Message

    - A placeholder `{user_input}` represents the user''s input dynamically.

    - It will later be replaced with actual text provided by the user.

    """

    chat_prompt = ChatPromptTemplate.from_messages([system_message, human_message])

    """

    Step 3c: Combine the Messages

    - Combines `system_message` and `human_message` into a single structured prompt.

    - This ensures the AI has instructions for the user''s query.

    """

    # Prepare User Input

    user_input = "Explain the difference between our solar system and one other well-known
    one"

    """

    Step 4: Define the User Input

    - The user''s query is stored in a variable to dynamically populate the human
    message template.

    """

    # Format the Prompt

    messages = chat_prompt.format_messages(user_input=user_input)

    """

    Step 5: Format the Prompt

    - Replaces `{user_input}` in the human message template with the actual user query.

    - Creates a structured message format combining the system and human messages.

    """

    # Get Model Response

    response = chat_model(messages)

    """

    Step 6: Get the AI''s Response

    - Sends the formatted prompt to the model using the `chat_model` instance.

    - Receives the AI''s response, stored in the `response` variable.

    """

    # Display the AI Response

    print("AI Response:", response.content)

    """

    Step 7: Display the AI Response

    - Extracts the generated text (from the `content` attribute of `response`).

    - Prints the AI''s response to the console for the user to review.

    """

    >>> OUTPUT

    AI Response: Our solar system consists of the Sun, eight planets (Mercury, Venus,
    Earth, Mars, Jupiter, Saturn, Uranus, Neptune), and various smaller celestial
    objects like moons, asteroids, and comets. It is located in the Milky Way galaxy.

    One other well-known solar system is the TRAPPIST-1 system. TRAPPIST-1 is a star
    system located about 39 light-years away from Earth. It is known for having seven
    Earth-sized planets, three of which are located in the habitable zone where conditions
    might be right for liquid water to exist on the surface. This system is smaller
    and cooler than our Sun, and its planets are much closer to their star compared
    to the planets in our solar system.

    "\nStep 7: Display the AI Response\n- Extracts the generated text (from the `content`
    attribute of `response`).\n- Prints the AI''s response to the console for the
