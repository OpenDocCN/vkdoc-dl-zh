  trans: '

    ### 1.5.3 跨语言与多语言模型：处理多种语言


    跨语言 NLP 模型能够理解多种语言，并且还能在它们之间迁移知识。这可以快速实现机器翻译和跨语言理解等任务。虽然多语言模型（`MLM`）也能同时处理多种语言，但这种理解并不一定需要在多种语言之间迁移知识。`MLM`
    可以执行许多不同的 NLP 任务，而无需为每种语言配备单独的语言模型。单个 `MLM` 可以并行处理多种语言。


    跨语言 NLP 模型能够执行的任务包括机器翻译、社交媒体情感分析、跨语言信息检索、多语言文本分类、跨语言问答、实体识别和语言推理。同时，`MLM` 在文本分类、语言检测、命名实体识别、词性标注、情感分析、机器翻译、问答和文本摘要等任务中也很有用。


    多语言 NLP 模型（`MLM`）的实际应用案例包括谷歌翻译、微软翻译器、亚马逊 Comprehend、Facebook 的 `M2M-100` 以及 IBM
    Watson 语言翻译器。相比之下，跨语言 NLP 模型的代表有 `XLM-R`（跨语言语言模型–RoBERTa）、`mBERT`（多语言 BERT）、`M2M-100`（多对多
    100）、`LASER`（语言无关句子表示）和 `T5`（文本到文本迁移转换器）。


    ### 1.5.4 可解释 NLP：解释模型结果


    简单来说，可解释 NLP 就像有一位同事，她会解释自己为什么认为某件事是真的，以便你能理解她的推理过程。正如 Søgaard（2021）在其 NLP 著作中所提出的，可解释
    NLP 是一个新兴领域，近来正受到全球科技界的广泛关注。包括医疗和法律在内的许多行业，都要求 NLP 开发人员对其所开发模型的预测结果进行解释。事实上，这在许多国家是一项法律要求。


    了解可解释 NLP 至关重要，原因有二：一是确认 AI 驱动的解决方案充分符合本地和国际法规，尤其是在金融以及医疗和法律等其他敏感领域。另一个原因是，如果我们能更好地理解模型的工作原理，就能减少错误，并培养预测模型优缺点的能力。最重要的是，深入理解
    NLP 模型的内部工作机制（即可解释 NLP）有助于避免已投入生产的 NLP 模型出现意外行为。这种知识还有助于消除许多 NLP 及其他机器学习模型所表现出的社会偏见的影响。偏见可能因使用有偏见的训练数据而出现在模型中。因此，了解可解释
    NLP 意味着在将 NLP 驱动的解决方案部署到生产环境时，能够增强信任和信心。


    ### 1.5.5 NLP 的新兴领域


    NLP 研究的边界正在日益扩展。情感 AI 正在兴起，其中 NLP 模型可以分析文本和语音模式来识别人类情感。使用像 ChatGPT 这样的大语言模型进行多语言处理的发展正在打破语言障碍，促进全球交流。NLP
    模型正与包括图像和语音在内的其他模态进行整合（多模态 NLP）。NLP 正与增强现实技术融合，使得不同的 NLP 技术能够在沉浸式环境中进行交互。借助实时和交互式
    NLP，NLP 模型的速度和响应能力将得到提升。这将改善诸如实时语言翻译（例如国际 VIP 对话中的翻译）、视频字幕以及类似 Alexa 的交互式语音助手等应用的能力和响应时间。


    道德和负责任的 AI 是另一个备受关注的研究领域。研究人员正不断致力于解决偏见、确保数据隐私以及维护 AI 系统的透明度。未来的 NLP 模型，包括生成式
    AI 领域的模型，预计将展现出更好的泛化能力。它们将更加可靠，需要更少的微调数据来适应新任务。在未来几年，我们可以期待更大、更强大、更可靠的语言模型（包括大语言模型）。这些模型对上下文有更深刻的理解，从而能够生成更精确且符合语境的响应。


    ## 1.6 简短商业案例 1：NLP 在医学文本分析中的应用


    在全球范围内，医疗保健行业以临床记录、患者病历、研究文章等形式产生了海量的文本数据。从这些文本数据中提取可操作的见解是一项具有挑战性但至关重要的任务。这些宝贵的见解有助于改善患者护理、推进医学研究以及简化运营流程。如今存在许多强大的基于
    NLP 的解决方案，能够分析和解释不同语言的医学文本——将非结构化数据转化为有价值的信息。


    NLP 应用可以通过从电子健康记录中提取关键信息，为患者医疗保健业务带来显著价值。例如，NLP 可以通过识别症状、诊断和治疗中的模式来提供帮助。这最终有助于疾病的早期诊断和更个性化的治疗方案。一个
    NLP 辅助系统可以对具有特定症状模式和实验室结果的患者发出潜在的糖尿病诊断预警。这可以促使医疗专业人员及时进行进一步的干预。


    ### 1.6.1 简化临床研究


    医学研究人员经常需要翻阅大量电子及其他健康记录（相关研究、患者数据和临床试验结果）来进行调查。NLP 应用可以自动从研究文章、临床试验数据库和患者记录中提取相关信息。例如，这些应用可以快速识别符合其标准的研究，或为针对性试验找到具有特定遗传标记的患者。


    ### 1.6.2 提高行政效率


    许多行政任务，如编码、计费和文档记录，可能非常费力、耗时，并且容易出错。NLP 应用可以通过自动化提取和分类计费代码、患者保险索赔以及必要的法规遵从所需的信息，来简化这些业务流程。例如，NLP
    系统能够读取和解释医生的笔记及其他医疗记录，以自动提取计费代码。这可以大大减轻医疗保健提供者的行政负担，同时最大限度地降低出错风险。


    ### 1.6.3 增强数据可访问性


    手动存储和检索患者及其他健康记录是一项非常费力且耗时的工作。NLP 应用可以自动化整个流程。事实上，如今大多数医疗机构已经在使用这些应用。通过将非结构化文本记录转换为结构化数据，NLP
    应用能够创建可搜索的医疗记录数据库。这使得能够快速访问患者病史和治疗结果，从而促进医疗专业人员之间的快速决策和协调。此外，NLP 还可用于创建患者友好的复杂医疗信息摘要（如有需要，可使用其母语）。这些本地语言的摘要可以提高患者对其护理的理解和参与度。

