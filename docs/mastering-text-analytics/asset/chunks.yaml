    #### Lancaster Stemmer


    The Lancaster stemmer is one of the most aggressive stemming approaches because
    it works on a set of straightforward, recursive rules to cut the input words to
    their root forms. It is predominantly useful in NLP applications requiring a high
    level of generalization. For this purpose, it can sacrifice some precision by
    over-stemming. Applications like topic modeling focus more on broad themes rather
    than exact word forms. In such cases, the Lancaster stemmer is applied to generalize
    terms to their root forms to help identify common topics. Listing [5-2](#649581_1_En_5_Chapter.xhtml#PC8)
    is its code demo with the Porter stemmer.


    ```

    import nltk

    from nltk.tokenize import word_tokenize

    from nltk.stem import PorterStemmer, LancasterStemmer

    # Download resources.

    nltk.download(''punkt'')

    # Initialize both the stemmers.

    porter_stemmer = PorterStemmer()

    lancaster_stemmer = LancasterStemmer()

    # Sample text.

    sample_text = "scientific methodologies used by researchers were aimed at improving
    accuracy in predictive analytics."

    # Tokenize the text

    tokens = word_tokenize(sample_text)

    # Apply Porter Stemmer.

    porter_tokens = [porter_stemmer.stem(token) for token in tokens]

    # Apply Lancaster Stemmer.

    lancaster_tokens = [lancaster_stemmer.stem(token) for token in tokens]

    # Print output.

    print("Original Tokens: ", tokens)

    print("Porter Stemmed Tokens: ", porter_tokens)

    print("Lancaster Stemmed Tokens: ", lancaster_tokens)

