    # GloVe：用于词表示的全局向量


    GloVe 是一种[无监督机器学习](https://www.geeksforgeeks.org/supervised-unsupervised-learning/)算法，于
    2014 年在卡塔尔多哈举行的一次会议上首次提出。GloVe 用于生成单词的向量表示（词嵌入）。GloVe 包含针对约 60 亿个英语单词的预定义稠密向量，其中涵盖一些常用字符，如逗号、大括号和分号。用户可以根据计算资源的可用性和任务需求，使用不同维度的预训练
    GloVe 嵌入，例如 50 维、100 维、200 维或 300 维向量。这里，`d` 表示*维度*。50-d 表示大小为 50 的向量，以此类推。


    `Word2Vec` 和 `GloVe` 的主要区别在于，`Word2Vec` 通过使用 skip-gram 或 CBOW 模型（利用大型语料库）预测上下文单词来学习词嵌入（或词向量）。其重点在于局部上下文。`GloVe`
    则利用全局词共现统计信息，在其嵌入中捕捉单词的整体关系。`GloVe` 模型同时强调全局和局部上下文。`Word2Vec` 通常更快，对于特定上下文的 NLP
    任务更高效，因为它能在训练过程中动态捕捉单词关系。`GloVe` 在捕捉整个文本数据集中单词的整体关系方面表现出色，因为它从全局词共现（即单词在多个句子中共同出现的频率）中学习。通过这种方式，`GloVe`
    能够更广泛地理解词义及其关系。


    与 `Word2Vec` 类似，`GloVe` 提供的词嵌入可用于多种 NLP 任务，如命名实体识别、机器翻译、问答系统、文档相似度计算和文档聚类。


    下面是一个代码演示（列表 7-6），它利用预训练的 `GloVe` 嵌入来查找相似单词。


    1. 访问 GloVe 项目页面。

    2. 下载 `glove.6B.zip` 文件。该文件包含多种维度的词嵌入，如 50d、100d 等。

    3. 解压文件，查看 `glove.6B.50d.txt`。

    4. 将 `glove.6B.50d.txt` 放在与代码文件相同的目录中，如果文件位于其他位置，请在代码中指定正确的路径。


    ```

    # 使用预训练的 GloVe 嵌入来查找相似单词。

    # 运行代码前需要完成的必要步骤

    ```


    ```

    # 导入必要的库

    import numpy as np  # 用于数值运算

    from sklearn.metrics.pairwise import cosine_similarity  # 用于相似度计算

    # 加载 GloVe 嵌入

    # GloVe 文件的路径（确保该文件在目录中，或提供正确的路径）

    embeddings_index = {}  # 用于存储词向量的字典

    # 打开并读取 GloVe 文件

    with open(''glove.6B.50d.txt'', encoding=''utf-8'') as f:

    for line in f:

    values = line.split()  # 将每一行拆分为多个部分

    word = values[0]  # 第一个元素是单词

    vector = np.asarray(values[1:], dtype=''float32'')  # 其余元素是向量值

    embeddings_index[word] = vector  # 将单词及其向量添加到字典中

    # 检查 "scholar" 是否存在于 GloVe 词汇表中

    if "scholar" in embeddings_index:

    scholar_vector = embeddings_index["scholar"]  # 获取 "scholar" 的向量

    # 计算 "scholar" 与所有其他单词之间的余弦相似度

    similar_words = {}  # 用于存储单词及其相似度分数的字典

    for word, vector in embeddings_index.items():

    similarity = cosine_similarity([scholar_vector], [vector])[0][0]  # 计算相似度

    similar_words[word] = similarity  # 将单词和相似度分数添加到字典中

    # 按相似度分数降序排列单词

    sorted_similar_words = sorted(similar_words.items(), key=lambda x: x[1], reverse=True)

    # 打印与 "scholar" 最相似的 10 个单词

    print("与 ''scholar'' 最相似的单词：")

    # 跳过第一个单词，因为它将是 "scholar" 本身

    for word, similarity in sorted_similar_words[1:11]:

    print(f"{word}: {similarity}")

