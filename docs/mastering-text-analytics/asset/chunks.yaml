    ### 8.4.4 Parsing and Serialization


    When LangChain and LLMs are in the background, we use parsing to structure and
    process user input queries. This way, AI models can better understand user queries.
    In input parsing, we break the user queries into more manageable pieces, which
    make it easier for LLMs from OpenAI or others to process. Input parsing may include
    tasks such as converting the input text to lowercase, splitting it into tokens
    (words), or removing unwanted text or other undesired information.


    There exists output parsing that is employed to extract relevant and usable information
    from the LLM response. Output parsing ensures the easy understanding and consumption
    of LLM responses down the line. One useful example of output parsing can be summarization
    and extraction of only the key parts of the LLM’s response. Next, let’s examine
    demo programs to illustrate these concepts.


    #### Input and Output Parsing in LangChain and OpenAI


    The program shown in Listing [8-11](#649581_1_En_8_Chapter.xhtml#PC15) demonstrates
    how to use Pydantic, Datetime, CommaSeparatedList, and OutputFixing parsers in
    LangChain. Each section validates or corrects input data and outputs the results
    clearly and understandably.


    The program parses with and without the LLM.'
  raw: '### 8.4.3 Working with Prompt Templates and Few-Shot Templates


    Prompt templates and few-shot templates are indispensable tools that guide AI
    models to produce precise responses. Both these templates offer a structured method
    to frame inputs. Prompt templates and few-shot templates improve the model’s comprehension
    of your exact requirements. The following describes the use of these templates.


    *   **Prompt templates** are pre-designed formats to ask questions or give instructions
    to your AI model. They ensure the given input is clear and organized; for example,
    *“Interpret the text to German: {text}”*. In this example, *{text}* is simply
    a placeholder where you can add any input. This arrangement supports your AI model
    answer accurately.


    *   **Few-shot templates** give examples to the AI before asking a question. This
    shows the AI how to respond. For instance, *Question: What is generative AI? Answer:
    Generative AI is a smart computer system that can generate text and images. Now
    your turn: Question: {question}”*. In this example, *{question}* is a placeholder
    where you can input your own question. The AI uses this type of construct to give
    better answers.


    Next, let’s look at a demo program to show the usage of prompt templates and few-shot
    templates. AI model’s responses with and without templates are also compared with
    comments.


    #### Guiding AI Responses with and Without Templates


    The following is a Python demo using LangChain to show the difference between
    using no templates and using prompt templates.


    ```

    # Read the open ai api key from your text filr

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    ```


    ##### Without Templates


    *   Response without template: The answer is longer, detailed, and covers multiple
    aspects.


    *   Issue: The AI is freeform, which may result in verbose or inconsistent responses.
    The tone and content might vary depending on the question.


    ```

    # Import the ChatOpenAI class for interacting with OpenAI''s language models

    from langchain.chat_models import ChatOpenAI

    # Initialize the OpenAI model with default settings

    llm = ChatOpenAI(temperature=0, openai_api_key=api_key)

    # Ask the AI a simple question without using a template

    response = llm.predict("Explain what Generative AI is.")

    print(response)  # Print the AI''s response

    OUTPUT:

    Generative AI refers to a type of artificial intelligence that is capable of creating
    new content, such as images, text, or music, that is original and not based on
    existing data. This type of AI uses algorithms to generate new content by learning
    patterns and structures from a dataset and then creating new content based on
    those patterns. Generative AI can be used in a variety of applications, such as
    creating realistic images, generating text for chatbots, or composing music. It
    has the potential to revolutionize creative industries by automating the process
    of content creation and enabling new forms of artistic expression.

    ```


    ##### With Prompt Template


    ```

    # Import necessary components

    from langchain.prompts import PromptTemplate  # For creating structured prompts

    from langchain.chat_models import ChatOpenAI  # For interacting with OpenAI''s
    language models

    # Define a prompt template with placeholders

    template = PromptTemplate(

    input_variables=["topic"],  # Define the placeholder ''topic''

    template="Explain what {topic} is in simple terms.",  # Structure the input

    )

    # Initialize the OpenAI model with default settings

    llm = ChatOpenAI(temperature=0, openai_api_key=api_key)

    # Fill in the placeholder with a specific topic

    prompt = template.format(topic="Generative AI")  # Replace ''topic'' with "Generative
    AI"

    # Get the AI''s response using the formatted prompt

    response = llm.predict(prompt)

    print(response)  # Print the AI''s response

    OUTPUT:

    Generative AI is a type of artificial intelligence that can create new content,
    such as images, text, or music, based on patterns it has learned from existing
    data. It uses algorithms to generate new, original content that is similar to
    what it has been trained on. This technology can be used in a variety of applications,
    such as creating realistic images, generating personalized recommendations, or
    even composing music.

    ```


    ##### With Few-Shot Template


    Listing [8-10](#649581_1_En_8_Chapter.xhtml#PC14) depicts the program for working
    with a few-shot template.


    *   **Response with the template**: The answer is concise and aligns with the
    examples provided.


    *   **Benefit**: The examples serve as a guide, instructing the AI on how to respond
    in a specific style, resulting in output that is focused, consistent, and simpler.


    ```

    # Import necessary components

    from langchain.prompts import FewShotPromptTemplate, PromptTemplate  # For few-shot
    and regular prompts

    from langchain.chat_models import ChatOpenAI  # For interacting with OpenAI''s
    language models

    # Define examples to show the AI how to respond

    examples = [

    {"question": "What is Machine Learning?", "answer": "Machine Learning is a system
    where computers learn from data."},

    {"question": "What is AI?", "answer": "AI is a field of computer science that
    makes machines smart."},

    ]

    # Create a PromptTemplate for each example

    example_prompt = PromptTemplate(

    input_variables=["question", "answer"],  # Define the placeholders

    template="Question: {question}\nAnswer: {answer}",  # Format for each example

    )

    # Define the prefix and suffix for the few-shot template

    prefix = "You are an expert in technology. Answer the following questions in simple
    terms:"

    suffix = "Now your turn: Question: {question}"

    # Create a FewShotPromptTemplate

    few_shot_template = FewShotPromptTemplate(

    examples=examples,  # Provide the examples

    example_prompt=example_prompt,  # Use the PromptTemplate for examples

    prefix=prefix,  # Add the prefix text

    suffix=suffix,  # Add the suffix text

    input_variables=["question"],  # Define the placeholder for the final question

    )

    # Initialize the OpenAI model

    llm = ChatOpenAI(temperature=0, openai_api_key=api_key)  # Provide your API key

    # Fill in the placeholder with your question

    prompt = few_shot_template.format(question="What is Generative AI?")  # Replace
    ''question'' with your query

    # Get the AI''s response using the few-shot template

    response = llm.predict(prompt)

    print(response)  # Print the AI''s response

    OUTPUT:

    Answer: Generative AI is a type of artificial intelligence that can create new
    content, such as images, music, or text, based on patterns it has learned from
    existing data.

    Listing 8-10

    Code demo for working with a ew-shot template

    ```


