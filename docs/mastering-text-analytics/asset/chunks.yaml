    ### 8.1.6 Text-to-Image Search Using OpenAI’s CLIP Model


    Listing [8-3](#649581_1_En_8_Chapter.xhtml#PC3) demonstrates text-to-image search
    using OpenAI’s CLIP model. It matches a given text description with a set of images
    by computing cosine similarity between their embeddings. The most relevant image
    is then identified and displayed, highlighting CLIP’s capability to understand
    the connection between text and images.


    ```

    import torch

    from transformers import CLIPProcessor, CLIPModel

    from PIL import Image

    # Load the CLIP model and processor

    model = CLIPModel.from_pretrained("openai/clip-vit-base-patch16")

    processor = CLIPProcessor.from_pretrained("openai/clip-vit-base-patch16")

    # Example images and text description for text-to-image search

    images = ["dog_with_person_on_beach.jpg", "empire_state.jpg", "running_dog_on_beach.jpg",
    "dog_play.jpg", "example_image.jpg"]

    text_description = "A dog running on the beach in the sunshine"

    # Preprocess the text

    inputs_text = processor(text=[text_description], return_tensors="pt", padding=True)

    # List to store similarities for each image

    image_similarities = []

    # Loop through images

    for image_path in images:

    # Open image

    image = Image.open(image_path)

    # Preprocess the image and get features

    inputs_image = processor(text=[text_description], images=image, return_tensors="pt",
    padding=True)

    with torch.no_grad():

    outputs = model(**inputs_image)

    # Calculate similarity

    image_features = outputs.image_embeds

    text_features = outputs.text_embeds

    similarity = torch.cosine_similarity(image_features, text_features)

    image_similarities.append((image_path, similarity.item()))

    # Sort images by similarity score

    sorted_images = sorted(image_similarities, key=lambda x: x[1], reverse=True)

    # Display the most relevant image

    best_image_path = sorted_images[0][0]

    # Assuming display_image is a function to display the image. Replace with your
    own method if needed.

    display_image(best_image_path)

    print(f"The most relevant image based on the description is: {best_image_path}")

