- fmt: '### 4.2.9 Word Sense Disambiguation Using NLTK


    You have seen that many words have multiple meanings depending on the context
    in which it is being used. Word sense disambiguation (WSD) is a technique to find
    out which meaning of a word is being used in a sentence. WSD figures out which
    meaning is the best fit depending on the context.


    Let’s figure it out with a simple example word: “bat.” It can refer to a flying
    mammal or a piece of sports kit used in baseball or cricket. WSD determines whether
    “bat” means the animal or the equipment depending on the context of the sentence.
    You might be wondering how a machine (read) computer does all of it. The machine’s
    NLP software simply analyzes the surrounding words to clarify the intended meaning
    of a specific word under consideration (see Figure [4-4](#649581_1_En_4_Chapter.xhtml#Fig4)).


    ![Flow chart illustrating the "Word Sense Disambiguation Process Using NLTK."
    It consists of five sequential steps: \\n\\n1\. "Input Word and Context" - The
    initial word and its context are identified.\\n2\. "Preprocessing Step" - The
    input data undergoes preprocessing for analysis.\\n3\. "Sense Identification"
    - The system identifies possible senses for the word.\\n4\. "Disambiguation Algorithm"
    - An algorithm selects the most appropriate sense.\\n5\. "Output Selected Sense"
    - The final selected sense is outputted as the result.\\n\\nEach step is represented
    with an icon and a brief description.](images/649581_1_En_4_Chapter/649581_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    WSD using NLTK


    NLTK again leverages its lexical resource WordNet for WSD. WordNet is equipped
    with definitions and relationships between words. NLTK uses algorithms that automatically
    choose the correct meaning of a word depending on its context in a sentence. Listing
    [4-9](#649581_1_En_4_Chapter.xhtml#PC9) is the code demo for this important NLP
    data preprocessing operation.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    import nltk

    from nltk.corpus import wordnet

    from nltk.wsd import lesk

    # Ensure required data is downloaded

    nltk.download(''wordnet'')

    nltk.download(''omw-1.4'')

    def disambiguate_word(sentence, word):

    # Apply the Lesk algorithm to disambiguate the word

    sense = lesk(nltk.word_tokenize(sentence), word)

    return sense.definition() if sense else "No sense found."

    # Example usage 1

    sentence = "He uses a bank to deposit his lard earned money."

    word_for_WSD1 = "bank"

    sense_definition1 = disambiguate_word(sentence, word_for_WSD1)

    print(f"Sense of ''{word}'': {sense_definition1}")

    Sense of ''bank'': a container (usually with a slot in the top) for keeping money
    at home

    # Example usage 2

    sentence = "The US baseball players usually show great skills with bat."

    word_for_WSD2 = "bat"

    sense_definition2 = disambiguate_word(sentence, word_for_WSD2)

    print(f"Sense of ''{word}'': {sense_definition2}")

    OUTPUT:

    Sense of ''bank'': strike with, or as if with a baseball bat

    Listing 4-9

    WSD Using NLTK

    ```


    ### 4.2.10 Keyword Extraction with NLTK


    In simple words, keyword extraction is getting the most important words or phrases
    from a given text corpus. Keywords capture the crux of the content. These keywords
    can be used for other NLP tasks like text summarization, search engine optimization,
    and retrieval of important information. Let’s take an example from our own tech
    world. In a technical document about machine learning or deep learning models,
    keywords might include “neural networks,” “deep learning,” “machine learning,”
    “model accuracy,” and “model accuracy.” These are keywords that describe the core
    concepts and methods described in the tech document.


    Keyword extraction is done by analyzing the frequency and relevance of words in
    a given text document. Standard techniques like term frequency (TF) and term frequency–inverse
    document frequency (TF–IDF) are often used for this purpose. These techniques
    highlight the significant words for the text under consideration. As such, simple
    tokenization of the text and computing word frequencies can identify the most
    important words. Combining it with advanced techniques like TF–IDF makes more
    sophisticated keyword extraction possible. This chapter only uses these techniques
    (as used in NLTK), but we formally discuss them in later chapters. Listing [4-10](#649581_1_En_4_Chapter.xhtml#PC10)
    is the code demo of this important NLP data preprocessing task.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    # Import necessary libraries/ resources.

    import nltk

    from nltk.tokenize import word_tokenize

    from nltk.probability import FreqDist

    from nltk.corpus import stopwords

    # Download required data.

    nltk.download(''punkt'')

    nltk.download(''stopwords'')

    def keywords_extractor(text, num_keywords=3):

    # Tokenize the input text.

    tokens = word_tokenize(text.lower())  # lowercase for consistency.

    # Eliminate stopwords and non-alphanumeric tokens.

    stop_words = set(stopwords.words(''english''))

    filtered_tokens = [word for word in tokens if word.isalnum() and word not in stop_words]

    # Calculate the input word frequencies.

    freq_dist = FreqDist(filtered_tokens)

    # Extract the most frequent keywords.

    keywords = [word for word, _ in freq_dist.most_common(num_keywords)]

    return keywords

    # Example usage

    sample_text = "The bank is on the city river bank. State Bank is the best bank
    in the city."

    keywords = keywords_extractor(sample_text)

    print(f"Extracted keywords: {keywords}")

    OUTPUT:

    Extracted keywords: [''bank'', ''city'', ''river'']

    Listing 4-10

    Construct a Keyword Extractor Using NLTK

    ```


    This section offered an inclusive overview of some essential NLP data preprocessing
    tasks using NLTK. We explored common techniques such as tokenization, stop word
    removal, stemming, lemmatization, and sentence segmentation to prepare text for
    analysis. Adding to these basic NLP techniques, we also covered WFD, synonym and
    antonym detection, word similarity calculation, and WSD. Finally, we looked into
    keyword extraction techniques to get key terms out of any input text document.
    All the techniques discussed in this section are vital for transforming raw text
    information into actionable insights and improving the effectiveness of NLP applications.
    The next section discusses some important NLP techniques beyond the basic preprocessing
    tasks.


    ## 4.3 NLP Tasks Beyond Preprocessing


    This section delves into some new NLP techniques. We start with part-of-speech/POS
    tagging, a process used to label every word in a given input sentence considering
    its grammatical role, which can be a noun, verb, or adjective. Next, let’s explore
    named entity recognition, which identifies proper names (in a given sentence),
    like the name of a person, organizations, and locations, including cities and
    countries. We then move to a relatively known term, *text classification*, which
    categorizes text into predefined labels, such as categorizing emails as junk or
    legitimate. Following that, we discuss *sentiment analysis*, which determines
    the emotional tone behind words; examples are classifying tweets about a famous
    movie into labels: positive or negative.


    Finally, we cover a bit of advanced NLP applications like *language translation*,
    which adapts text from one language to another. The next process, *text summarization*,
    condenses long text documents into their condensed versions while preserving key
    information. *Word cloud generation* is a visual illustration of word frequency.
    It highlights the most important terms in a given text document. All these techniques
    together allow a deeper and more nuanced understanding of the input text information.
    For each of these techniques, we give a hands-on, NLTK-based code demonstration,
    which is the primary focus of this book.'
