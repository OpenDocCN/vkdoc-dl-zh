    \ 文件中提取文本。它是一个流行的 Python 库，用于从网络抓取数据。\n\n## 2.5 从 JSON 中提取数据\n\n与 HTML 文本类似，JSON\
    \ 文件也提供了一种结构化的数据格式，用于存储和交换数据。JSON（JavaScript Object Notation）文件轻量且易于解析。这使得它们几乎成为处理\
    \ NLP 项目中常见大型数据集的理想选择。JSON 文件具有嵌套结构，可以相对轻松地支持复杂的数据表示。它允许有效地组织文本、文本注释及其元数据。JSON\
    \ 文件的所有这些特性使其成为文本预处理和分析时的首选。\n\n让我们创建一个示例 JSON 文件，然后提供一个文档完善的代码用于数据提取。\n\n###\
    \ 2.5.1 从 JSON 文件中提取数据\n\n首先，我们创建一个 JSON 文件，以便稍后从中提取文本（参见清单 2-5）。要充分利用本节内容，您需要具备一些\
    \ JSON 文件的基础知识。\n\n*   现在让我们提取其内容。\n\n    ```\n    import json # 导入 json。\n  \
    \  # 读取 JSON 文件。\n    with open('sample_jason.json', 'r') as file:  # 以只读模式打开\
    \ JASON 文件。\n        data = json.load(file)  # 将 JSON 文件加载到 'data' 变量中。\n    #\
    \ 提取各种元素。\n    title = data[\"title\"]  # 提取 \"title\"。\n    description = data[\"\
    description\"]  # 提取 \"description\"。\n    sections = data[\"sections\"]  # 提取\
    \ \"sections\"。\n    footer = data[\"footer\"]  # 提取 \"footer\"。\n    # 打印提取的文本数据。\n\
    \    print(\"Title:\", title)  # 打印标题。\n    print(\"Description:\", description)\
    \  # 打印描述。\n    for section in sections:  # 遍历 sections 列表。\n        print(f\"\
    Section Heading: {section['heading']}\")  # 打印章节标题。\n        print(f\"Section\
    \ Content: {section['content']}\")  # 打印章节内容。\n    print(\"Footer:\", footer)\
    \  # 打印页脚文本。\n    OUTPUT:\n    Title: Sample JSON File\n    Description: This\
    \ is a sample JSON file containing various elements.\n    Section Heading: Introduction\
    \ to the World of JASON\n    Section Content: This is your introduction to the\
    \ content of a sample JSON file.\n    Section Heading: Details of JASON\n    Section\
    \ Content: Put your details about the JSON file content here.\n    Section Heading:\
    \ Conclusion\n    Section Content: Put your concluding remarks here.\n    Footer:\
    \ Put your footer text here.\n    ```\n\n```\nimport json # 导入创建 JASON 文件所需的 Python\
    \ 库。\n# 让我们创建一个包含一些数据的示例字典。\ndata = {\n    \"title\": \"Sample JSON File\",\n\
    \    \"description\": \"This is a sample JSON file containing various elements.\"\
    ,\n    \"sections\": [\n        {\n            \"heading\": \"Introduction to\
    \ the World of JASON\",\n            \"content\": \"This is your introduction\
    \ to the content of a sample JSON file.\"\n        },\n        {\n           \
    \ \"heading\": \"Details of JASON\",\n            \"content\": \"Put your details\
    \ about the JSON file content here.\"\n        },\n        {\n            \"heading\"\
    : \"Conclusion\",\n            \"content\": \"Put your concluding remarks here.\"\
    \n        }\n    ],\n    \"footer\": \"Put your footer text here.\"\n}\n# 保存示例\
    \ JSON 文件，\nwith open('sample_jason.json', 'w') as file:\n    json.dump(data,\
    \ file, indent=4)\n清单 2-5\n从 JSON 文件中提取数据\n```\n\n## 2.6 从 PDF 中提取数据\n\nPDF 文件常用于分发和存档文档。它们以一致的格式包含富文本数据。PDF\
    \ 文本通常包含结构化文本、图像以及文本的元数据，这些对于提取和后续分析文本内容非常有帮助。几乎每个业务领域，包括金融、法律和学术界，都依赖于 PDF 格式的文件。这使得它们成为许多\
    \ NLP 任务的重要数据源。图 2-3 是从 PDF 文件中提取文本数据的简化示意图。\n\n![流程图说明“PDF 数据提取过程”。中心圆圈标有“PDF”，连接到三个部分：CSV、JSON\
    \ 和 XLSX 格式。CSV 被描述为带有逗号分隔值的纯文本文件。JSON 是带有键值对的结构化数据文件。XLSX 是带有单元格和公式的电子表格文件。每个部分都包含一个代表该格式的图标。](img/649581_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3\n\n从 PDF 文件中提取文本数据\n"
