    ### 8.4.2 Using Chat Models with LLMs


    Let’s discuss its background theory and description aspects of LangChain with
    OpenAI chat models. Let’s first consider the following terms.


    - `ChatPromptTemplate` is used for creating an end-to-end complete conversation
    prompt. `ChatPromptTemplate` combines various message types to make sure the conversation
    is structured properly for the LLM. For example, it can contain a system instruction
    like “You are a helpful assistant” and also have a user input like “How do I prepare
    Paneer Butter Masala, a popular Indian dish?”

    - `HumanMessagePromptTemplate` outlines the user’s input in a two-way conversation.
    For example, for a user query, “What is the commercial capital of the US?” this
    template captures the given query and then passes it on to the LLM like OpenAI
    Chatbot. `HumanMessagePromptTemplate` facilitates user interactions to be dynamic
    and easy to handle.

    - `SystemMessagePromptTemplate` is responsible for setting the rules (commands)
    for the AI. For instance, the role or behavior of AI. Let’s construct this instruction
    to AI, “You are a popular math professor who makes even complex concepts as easy
    to understand.” Such instruction(s) prompt the LLM to answer in an explicit style.
    It also makes sure the AI remains on track (task) all through the chat.


    These three templates combined together to structure conversations with LLMs.
    The following sections look into the usage of these templates.


    - `SystemMessagePromptTemplate` sets the AI’s role or behavior.

    - `HumanMessagePromptTemplate` captures the user’s input.

    - `ChatPromptTemplate` combines these messages to create a full conversation for
    the AI to process.


    Now, it is time to look into various available (popular) OpenAI Models for our
    use. Each one is created with a specific purpose in mind. For instance, use `gpt-3.5-turbo`
    to create a chatbot or `davinci` for writing essays. The following are the more
    popular ones.


    - `gpt-4` is best for complex reasoning tasks.

    - `gpt-3.5-turbo` is efficient and cost-effective for most applications.

    - `text-davinci-003` is great for creative writing or summarization.

    - `text-curie-001` is faster and cheaper and ideal for simple tasks.'
