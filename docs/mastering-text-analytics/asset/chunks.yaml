  trans: "\n# 1.3 自然语言处理面临的挑战\n\n自然语言处理及其相关分支学科凭借其计算词语和文本的能力，正持续飞速发展。然而，人类语言极其复杂、多变且不一致。包括英语在内的所有自然语言，都带来了自然语言处理研究者们不断试图克服的重大挑战。一篇\
    \ 2016 年的研究论文相对完整地描绘了这些主要挑战。该论文将这些挑战分为以下五项。\n\n*   **挑战 1**：处理多样化和非同质数据源时存在的多样性和复杂性。我们处理的文本文档（在任何文本语料库中）都以多种形式和格式存在。这种多样性可能来自许多方面，例如以不同格式编码的文档；文本长度也可能因文档而异。文档可能以多种语言提供，等等。\n\
    \n*   **挑战 2**：许多商业和工业应用领域的自然语言处理算法必须处理简短且稀疏的文本。与自然语言处理研究者使用的大型标准语料库相比，此类文本片段无法提供足够的统计冗余性。\n\
    \n    自然语言处理算法无法从这类文本文档的内容中获得可靠的统计证据。在监督式自然语言处理技术中使用的数据标签的类别不平衡可能是另一个问题；例如，在银行卡交易数据中，只有不到\
    \ 1%的交易是欺诈性的。\n\n*   **挑战 3**：由于某些商业应用中固有的主观性，评估和解释自然语言处理算法的结果可能具有挑战性。例如，考虑推文的情感分析、文本分类和文本聚类。学术研究中使用的黄金标准数据集在工业和现实生活场景中很少可用。\n\
    \n    一个相关的挑战是缺乏用于训练监督式机器学习模型（用于文本分类问题和情感分析等应用）的标记数据。\n\n*   **挑战 4**：人类在处理自然语言时的表现近乎完美。鉴于自然语言处理研究的当前状态，计算机程序无法达到这种\
    \ 100%的完美。在某些情况下，例如处理航天航空领域时，这些局限性可能构成挑战。在许多自然语言处理应用（如文本分类）中，一个日益增长的趋势是使用主动学习来改进自然语言处理过程并获得更好的结果。\n\
    \n    顺便提一下，主动学习是一种机器学习方法，其中算法以交互方式向用户（或其他来源）查询，以用期望的输出标记新的数据点。想象一个计算机程序正在学习识别不同的汽车型号。当程序在照片中识别出某个特定车型但无法命名时，它可能会请求人工干预。这类人工或外部代理的干预可以提高程序的整体性能。\n\
    \n*   **挑战 5**：处理某些商业场景中遇到的真实、动态的文本数据时。这种情况出现在支持关键任务事件决策的应用中。在此类情况下，需要及时高效地处理包含文本的数据并获取结果。\n\
    \n    一个相关的挑战可能是某些数据流中数据生成的速度。例如，在某些短消息应用（推文）中，平均每秒生成约 6000 条消息。准确处理如此高速的文本流极具挑战性，因为它们需要及时分析，以从其内容中提取相关且有价值的信息。\n\
    \n这些挑战可以从多个角度看待，并且可以为自然语言处理项目识别出更多挑战。本节仅作为介绍性章节。随着我们深入阅读本书，您将遇到许多其他挑战及其解决方案。\n\
    \n## 1.4 自然语言处理的应用\n\n自然语言处理既适用于文本也适用于语音，并且同样适用于所有人类语言——无论是口语还是书面语。因此，自然语言处理有着众多的应用。由于篇幅限制，我们只能介绍其中一小部分。我们大多数人几乎每天都在有意或无意地与自然语言处理互动。您可能熟悉一些应用，例如文字处理器中的拼写检查器、`iPhone`上的`Siri`个人助理、亚马逊的`Alexa`等等。其中一些应用处理人类语音数据并帮助解决常见问题。还有许多其他您可能已经熟悉的、由自然语言处理驱动的工具示例。例如，电子邮件垃圾邮件过滤器、人工智能驱动的网络搜索引擎、文本或语音的机器翻译、自动文档摘要、社交媒体情感分析等等。\n\
    \n许多行业都在使用自然语言处理应用。它已成为许多工业流程中不可或缺的一部分。自然语言处理正在彻底改变客户与机构互动的方式；例如，由自然语言处理驱动的客户服务聊天机器人。许多业务流程包含大量非结构化的文本数据，包括社交媒体消息、调查问卷和电子邮件。由自然语言处理驱动的技术可以相对轻松地自动化这些流程。以下是一些自然语言处理如何帮助业务流程的示例。图\
    \ 1-5 描绘了自然语言处理的一些有趣用例。\n\n![标题为“语言处理技术”的图表，显示一个分为八个扇区的圆形流程图。每个扇区代表一种不同的技术：文本摘要、自动化聊天机器人、文本分类、机器翻译、命名实体识别、自然语言生成、问答和词义消歧。该图表围绕一个中心圆直观地组织了这些技术。](img/649581_1_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5\n\n自然语言处理用例\n\n### 1.4.1 银行与金融业\n\n该行业广泛使用由自然语言处理驱动的聊天机器人，以及能够提供即时和个性化服务的数字虚拟助手。许多银行和金融机构正在使用由自然语言处理驱动的金融欺诈检测系统。当这些系统检测到任何可疑活动（例如欺诈性的大额信用卡交易）时，会立即向后台工作人员发出警报。自然语言处理可以分析大量文本文档，并仅提取维护制药和银行等行业监管合规性所必需的相关信息。自然语言处理引擎可以从财务报告、股票市场数据和新闻文章等文档中提取见解，使行业能够分析风险并实现更好的决策。许多技术驱动的金融机构正在利用自然语言处理在贷款和信用卡申请、保险理赔文件和合同等领域进行快速决策（和自动化）。\n\
    \n### 1.4.2 医疗保健\n\n该行业会遇到大量非结构化的文本数据，包括医疗记录和其他监管文件。许多医疗保健公司正在使用由自然语言处理驱动的引擎来分析此类文档中的大量信息，以获取有用的见解，并在管理层级的各个层面做出数据驱动的决策。该行业正在利用临床聊天机器人来协助医生诊断疾病。自然语言处理分析患者反馈、在线健康论坛数据和相关的社交媒体消息，以监测患者情绪，并在社区医疗环境中识别新兴的健康趋势。这种分析有时是实时进行的，可以为公共卫生响应提供及时的警报。这种来自相关专业人员的快速响应提高了患者满意度，因为他们的关切得到了及时处理。\n"
- fmt: '### 1.4.3 Legal


    Law professionals spend a large portion of their time searching for relevant information
    in the heap of a large collection of legal documents. This kind of legal research
    data can be a deciding factor in litigations, be it criminal or civil. `NLP` engines
    can automate a large portion of this legal discovery process, and legal professionals
    can spare more time to focus on another critical part of their cases. `NLP` can
    do document categorization by analyzing a vast amount of documents. This way,
    legal professionals can efficiently manage and organize large volumes of documents,
    enabling quick retrieval of relevant information.


    These were just a few examples. `NLP` has applications in many other areas. We
    discuss a few next.


    ### 1.4.4 Automate Routine Business Processes


    Chatbots and digital personal assistants, such as `Siri` from Apple and `Alexa`
    from Amazon, can recognize queries spoken in the form of human voice. They can
    match it to the appropriate entries from corporate or government databases to
    fetch the relevant information for users. After gathering the necessary information,
    digital assistants can formulate a response that is an appropriate answer to the
    user’s query. In business operations, `NLP` automates data entry and extraction
    from word processors, email applications, and spreadsheets by processing and understanding
    unstructured data from emails, reports, and forms. They can even prioritize tasks
    based on content analysis, ensuring timely and organized execution. `NLP`-based
    applications can automate many other routine, repetitive tasks to help organizations
    improve accuracy, reduce costs, and allocate resources more effectively.


    ### 1.4.5 Improve Search


    `NLP`-based applications can improve keyword searches from a document or the Internet.
    They can help in the retrieval of relevant information for FAQ by disambiguating
    word senses based on context. For example, the English word spelled as “bat” can
    have different meanings based on the given context. `NLP` has the capability to
    resolve this ambiguity, and it is capable of fetching the right meaning of a word(s)
    based on the context. This can be very useful in identifying and resolving customer
    queries in FAQ applications and chatbots. Additionally, `NLP`-powered search engines
    can handle voice search effectively. It allows users to interact with search systems
    through spoken language to further enhance accessibility and convenience. For
    search engines, `NLP` can analyze user behavior and preferences based on past
    searches, nature of interactions, and demographics to personalize search recommendations.
    This customization capability helps in predicting user intent and delivering custom-tailored
    results that align with individual preferences and interests.


    ### 1.4.6 Search Engine Optimization


    Search engine optimization (`SEO`) is the art of optimizing websites and their
    content to advance a website’s visibility and ranking in search engine results
    pages (`SERPs`). The `SEO` process involves guessing which words people use the
    most when they search for the content of their interest (keyword research). It
    makes sure the content on websites is set up well for search engines, like Google
    Search, to understand. It is called on-page optimization. Another process, off-page
    optimization in `SEO`, involves activities outside the website to enhance the
    site’s authority and credibility by increasing online mentions and search engine
    rankings.


    Overall, `SEO` helps websites to appear higher in search results, which makes
    it more likely for people to click on them. `NLP` is a great tool in the entire
    `SEO` process as it can understand and analyze the intent behind user queries.
    Integrating `NLP` in `SEO` helps businesses cater to user needs more accurately
    and ultimately helps boost search engine rankings and drive more organic traffic
    to websites. To understand it better, organic traffic is the visitors who come
    to a website through unpaid search engine results, which excludes paid advertisements.


    ### 1.4.7 Machine Translation: Translating Languages Automatically Using NLP


    This technology has been under development till recently. Now, it has become quite
    sophisticated. `NLP` applications can produce quite accurate translations over
    a wide variety of natural languages. `NLP` is capable of processing both text
    and speech data and translating it accurately from one language to the other.
    Such machine translations are grammatically correct, and they can properly convey
    the meaning in the proper context.


    Figure [1-6](#649581_1_En_1_Chapter.xhtml#Fig6) illustrates a simplified `NLP`
    model.


    ![Flow chart illustrating a machine translation system in NLP. The process begins
    with "Input Processing," which prepares text for translation. It then moves to
    the "Translation Engine," where text is converted using algorithms. Finally, "Post-Processing"
    refines and corrects the output. The central component is the "Machine Translation
    System," described as the core of NLP for language conversion. Each stage is connected
    by arrows, indicating the flow of information.](images/649581_1_En_1_Chapter/649581_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Machine translation model


    To a large extent, state-of-the-art `NLP` technology has overcome challenges such
    as handling ambiguous meanings of words in different contexts, preserving the
    original document’s style and tone, and preserving the exactness of specialized
    domains. Machine translation is still an evolving field application of `NLP`.


    ### 1.4.8 Text Summarization: Condensing Large Text Information


    A variety of test condensing definitions put the extent of summarization from
    10% to 50% (see Figure [1-7](#649581_1_En_1_Chapter.xhtml#Fig7)). Text summarization
    applications use deep learning architectures, more specifically transformers.
    We discuss a few deep learning `NLP` techniques later in this book, but a detailed
    treatment of transformers is out of the scope. Extractive summarization techniques
    extract unchanged sentences from the original text corpus. These techniques are
    widely used by news aggregators, legal document reviewers, and academic researchers.
    The aim is to swiftly convey the important points of lengthy text documents to
    save readers time and effort.


    Another category is `LLMs` like `ChatGPT`, which can generate original summaries
    using their own sentences (innovative) and are not available in the original text
    documents. They also use complex deep learning architectures based on transformer
    models. `LLMs` are very recent innovations that came up after 2020. Currently,
    such `LLMs`, though useful, can sometimes form some false innovative text on their
    own, a phenomenon known as hallucination. There is very serious research going
    on in the `LLM` domain, and their capabilities are improving with every new model
    release from the likes of Google and `OpenAI`.


    ![Flow chart illustrating the process of creating a unified summary. It includes
    three main steps: "Text Extraction" with an icon of an open book, "Key Point Identification"
    with a lightbulb and book icon, and "Summary Generation" with a printer icon.
    These steps converge into "Document Summarization" represented by a document and
    magnifying glass icon. Arrows connect each step to the final outcome, emphasizing
    the flow and integration of the process.](images/649581_1_En_1_Chapter/649581_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Document summarization'
