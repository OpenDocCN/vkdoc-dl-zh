    as single units as per the given `mwe_list`.

    - Other task-specific tokenizers include Penn Treebank/default tokenization, spaCy,
    Moses, and Subword. They are not covered in this book.

    - `Penn Treebank/default tokenization` is used for splitting the input text into
    tokens depending on linguistic rules. This tokenizer is used for syntactic parsing
    in the Penn Treebank corpus, which is a popular annotated text dataset that contains
