    \n# 步骤 1：使用详细的提示模板定义输入定制\n# 此提示为 LLM 提供了清晰的指令和特定的上下文。\n`prompt_template = PromptTemplate(\n\
    \    input_variables=[\"topic\", \"word_limit\"],\n    template=\"\"\"\n    You\
    \ are an expert content writer. Write a summary about \"{topic}\" in {word_limit}\
    \ words.\n    Focus on the key points, avoid unnecessary details, and ensure readability\
    \ for a general audience.\n    \"\"\"\n)`\n\n# 步骤 2：提供你的 OpenAI API 密钥\n# 将 YOUR_API_KEY_HERE\
    \ 替换为你实际的 OpenAI API 密钥。\n`api_key = api_key`\n\n# 步骤 3：使用 LangChain 创建 OpenAI\
    \ 的 GPT-3.5-Turbo 模型实例\n`llm = ChatOpenAI(\n    model=\"gpt-3.5-turbo\",  # 指定\
    \ turbo 模型\n    temperature=0.7,  # 控制创造性\n    max_tokens=300,  # 最大响应长度\n   \
    \ openai_api_key=api_key  # 传入你的 API 密钥\n)`\n\n# 步骤 4：为主题和字数限制提供输入值\n`input_data\
    \ = {\n    \"topic\": \"The impact of climate change on global agriculture\",\n\
    \    \"word_limit\": 50\n}`\n\n# 步骤 5：使用输入值格式化提示\n`formatted_input = prompt_template.format(**input_data)`\
    \  # 使用 input_data 格式化提示\n\n# 步骤 6：使用格式化后的输入执行模型\n`response = llm(formatted_input)`\n\
    \n# 步骤 7：处理并定制输出\n# 使用 .content 访问 AIMessage 对象的内容\n`raw_output = response.content`\
    \  # 访问响应内容的正确方式\n\n# 后处理输出以提取和格式化关键点。\n```\ndef refine_output(raw_output):\n\
    \    \"\"\"\n    此函数提取关键点并格式化输出以提高可读性。\n    \"\"\"\n    key_points = [point.strip()\
    \ for point in raw_output.split(\".\") if point.strip()]\n    return \"\\n\".join(f\"\
    - {point}.\" for point in key_points)\n```\n\n# 精炼原始输出\n`refined_output = refine_output(raw_output)`\n\
    \n# 步骤 8：显示输入和最终输出\n`print(\"Customized Input:\")`\n`print(formatted_input)` \
    \ # 打印最终定制的输入\n`print(\"\\nRefined Output:\")`\n`print(refined_output)`  # 显示精炼并格式化后的响应\n\
    \n**程序输出：**\n```\nCustomized Input:\nYou are an expert content writer. Write a\
    \ summary about \"The impact of climate change on global agriculture\" in 50 words.\n\
    Focus on the key points, avoid unnecessary details, and ensure readability for\
    \ a general audience.\n\nRefined Output:\n- Climate change has profound effects\
    \ on global agriculture, leading to shifts in growing seasons, increased extreme\
    \ weather events, and threats to crop yields.\n- Rising temperatures, changing\
    \ precipitation patterns, and more frequent pests and diseases pose significant\
    \ challenges to food security and agricultural sustainability worldwide.\n```\n\
    \n**清单 8-13** 使用 LangChain 和 OpenAI 进行输入和输出定制\n\n## 8.4.6 在不同 LLM 之间切换\n\n如今，许多\
    \ NLP 应用需要在多个大型语言模型（LLM）之间切换。LLM 每天都在不断发展和改进——显著增强了它们处理多样化任务的能力。有多家公司提供了各种各样的\
    \ LLM。每个模型都有其独特的优势，也同样有其独特的局限性。为正确的任务选择合适的模型至关重要。在此背景下，在 LLM 之间无缝切换的能力增强了 NLP\
    \ 应用的灵活性、效率和整体性能。\n\n在选择 LLM 时，基础架构和训练数据集是首要考虑因素。这些因素深刻影响着任何 LLM 理解语言的能力、模型响应质量以及计算资源需求。基于\
    \ GPT 的模型在对话式 AI 方面表现出色，而 BERT 更适用于文档分类任务。如果开发者能够动态地在这些模型之间切换，他们就能为各种任务优化 NLP\
    \ 应用。这样，开发者可以恰当地利用每个模型的优势。这些结合了多个 LLM 的混合策略，可以进一步提高复杂工作流程的准确性和可靠性。\n\n尽管有诸多优势，但在\
    \ LLM 之间切换也带来了多项技术挑战，特别是关于模型兼容性和资源管理方面的挑战。开发者需要建立一个有效的集成策略，以处理输入输出格式、分词技术和 LLM\
    \ 特定参数的变化。随着 NLP 领域持续发展，掌握在多个 LLM 之间切换的艺术，对于充分发挥 AI 驱动语言技能的潜力将变得越来越不可或缺。\n\n目前，LLM\
    \ 切换技术仍处于早期发展阶段。尽管如此，在 LLM 之间实现无缝过渡以及跨多个模型优化资源管理，目前仍是需要改进的领域。在这种情况下，接下来我们将提供一个基本的代码演示，展示如何通过\
    \ API 集成和切换不同的 LLM。涉及无缝模型切换和资源优化的高级演示通常需要自定义架构和额外的工具。\n\n### 通过 OpenAI API 在 GPT-4\
    \ 和 GPT-3.5 之间切换\n\n清单 8-14 中的程序演示了如何使用各自的 API 集成和切换两个不同的 LLM——OpenAI 的 GPT 和\
    \ Hugging Face 的 BERT。它允许用户为特定任务选择一个模型，处理输入，并接收相应的输出。\n\n*   该程序允许用户在 OpenAI 的\
    \ GPT（用于文本生成）和 Hugging Face 的 BERT（用于情感分析）之间进行选择，使他们能够根据所选模型处理输入。\n*   根据所选任务接受用户输入，并使用所选模型进行处理。\n\
    *   输出生成的文本（来自 GPT）或情感分析结果（来自 BERT）。\n\n**注意** 此演示在 `openai==0.28` 环境下完成。因此，要运行代码，你需要运行\
    \ `!pip install openai==0.28`。你可以创建一个单独的 Python 环境并在其中运行。\n\n```\n# !pip install\
    \ openai==0.28\n# 从文本文件中读取 OpenAI API 密钥\nf = open('C:\\\\Users\\\\Shailendra\
    \ Kadre\\\\Desktop\\\\OPEN_AI_KEY.txt')\napi_key = f.read()\n\nimport openai\n\
    # 设置你的 API 密钥\nopenai.api_key = api_key\n\n# 使用模型切换生成响应的函数\ndef generate_response(model=\"\
    gpt-3.5-turbo\"):\n    try:\n        # 使用选定的模型生成响应\n        response = openai.ChatCompletion.create(\n\
    \            model=model,  # 在此处选择模型\n            messages=[{\"role\": \"user\"\
    , \"content\": \"Hello, world!\"}]\n        )\n        # 提取并打印响应\n        print(f\"\
    来自 {model} 的响应: {response['choices'][0]['message']['content']}\")\n    except\
    \ Exception as e:\n        print(f\"发生错误: {e}\")\n\n# 在不同模型之间切换\nmodels = [\"\
    gpt-3.5-turbo\", \"gpt-4\"]\nfor model in models:\n    print(f\"\\n 切换到模型: {model}\"\
    )\n    generate_response(model)\n\n切换到模型: gpt-3.5-turbo\n来自 gpt-3.5-turbo 的响应:\
    \ Hello there! How can I assist you today?\n\n切换到模型: gpt-4\n来自 gpt-4 的响应: Hello!\
    \ How can I assist you today?\n```\n\n**清单 8-14** 通过 OpenAI API 在 GPT-4 和 GPT-3.5\
    \ 之间切换\n"
- fmt: '## 8.5 Chapter Recap


    This chapter examined the transformative world of contemporary NLP, which originated
    with the surge of transformers. The chapter began with self- and cross-attention
    mechanisms and the evolution of NLP from traditional methods to revolutionary
    models like BERT. We discussed DistilBERT and then extended the journey to multimodal
    NLP. Then, we showcased how OpenAI''s CLIP seamlessly integrates text, images,
    and audio, which allows NLP tasks like text-to-image search with amazing accuracy.


    The chapter then delves into the evolution of text generation, from RNNs to GPT,
    revealing the intelligent processes behind GenAI models. All of it highlights
    the adaptability of GPT in its real-life applications. Later, we examined the
    emergent trends in AI-driven creativity. Building on this groundwork, we conducted
    multiple code demos using LangChain and OpenAI APIs, which are revolutionizing
    the technology world. Using these powerful tools, we demonstrated dynamic chat
    assistants and advanced query handling. The chapter later worked with examples
    of seamless interfacing with LLMs and built innovative applications in text embeddings,
    vector-based search, and context-aware responses.


    Toward the end of this chapter, learners are also steered through prompt crafting,
    serialization techniques, and customization of inputs and outputs (to and from
    LLMs) for custom-made applications. A step-by-step walkthrough of switching between
    GPT-4 and GPT-3.5 illustrates the flexibility of LLMs. This chapter opens the
    door to the future of NLP, combining theoretical insights with real-world applications
    for aspiring AI practitioners.


    # 9. Advancing with LangChain and OpenAI


    The evolution of AI is significantly adding to the ability of business applications
    to handle complex workflows, retrieve relevant data efficiently, and maintain
    context across interactions. LangChain''s cutting-edge framework delivers critical
    tools for the integration of external data sources, constructing multi-step AI
    workflows, and deploying scalable AI-powered solutions. This chapter explores
    how LangChain empowers seamless data connections, structured processing through
    chains, effective memory management, interactive agents, and scalable deployment
    strategies.


    The first section looks into **data connection**. It specifies how LangChain relates
    to both structured and unstructured data through the use of document loaders,
    transformers, vector databases like ChromaDB, and multimodal sources. Next, we
    attend to **chains** and describe how to design and develop simple and multi-step
    AI workflows, handle function calls, and optimize error handling. **Memory management**
    in LangChain is critical for AI-powered applications, and this chapter explores
    several memory types, tracking interactions, and improving conversational context.
    Later, we discuss how AI agents can dynamically select tools, automate tasks,
    and adapt to complex domains. Toward the end of this chapter, we examine various
    aspects of **deployment and scalability** for LangChain applications. This section
    offers insights into deploying LangChain applications in production environments
    while ensuring system performance and long-term system maintainability.


    After completing this chapter, developers should be able to build AI-powered applications
    that are intelligent, efficient, context-aware, and adaptable to diverse business
    and other use cases. This chapter focuses chiefly on practical code examples,
    prevalent industry best practices, and optimization techniques that can streamline
    development and support the development and deployment of increasingly real-world
    AI executions.


    ## 9.1 Data Connection with Application-Specific Data Sources


    In natural language processing (NLP) applications or any application for that
    matter, effective data connection is critical for retrieving, processing, and
    using text or other data types from multiple sources. This section explores the
    vital components of integrating AP-powered applications into specific data sources
    to ensure seamless document loading, transformation, and embedding for advanced
    analytics. Let''s start with document loaders and integration.


    ### 9.1.1 Document Loading, Transformation, and Integration


    LangChain document loaders process and extract text (and other information) from
    a variety of input file formats like CSV, HTML, PDFs, Word docs, and web pages.
    Using document loaders, we can easily import data into NLP systems or other AI
    applications. Every loader in LangChain is equipped to handle a specific document
    type. This ensures efficient extraction and pre-processing of text. For instance,
    `PyMuPDFLoader` is specially designed to work with PDF files, while `UnstructuredLoader`
    can work with a variety of formats.


    These LangChain loaders are used for a variety of NLP tasks, including conversational
    chatbots, text summarization tools, and search engines. They are designed for
    converting unstructured text data into a structured format that can be understood
    and analyzed by NLP models. A couple of loaders also have support for chunking.
    Document loaders in LangChain significantly save time and effort in NLP developments
    by simplifying data handling.


    Next, we demonstrate three basic document loaders.'
