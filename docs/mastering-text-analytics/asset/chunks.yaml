    ### 8.4.5 自定义模型输入与处理输出


    自定义输入和处理输出远不止简单的解析。虽然 LLM 解析过程的重点是将输入和输出（进出 LLM）分解为结构化格式，但自定义则侧重于调整输入和输出以满足精确目标。LLM
    输入的自定义涉及塑造提示，使其清晰、相关且具有上下文。这包括添加全面的指令并利用示例来引导模型，或者包括格式化文本以提高理解度。例如，在处理用户向 LLM
    发出的总结一段文本的查询时，自定义过程可以包含关键点，或者可以在提示本身中指定字数限制，以确保更准确的结果。自定义远不止上一节讨论的解析。自定义 LLM 输入和输出的精确目标是精心设计它们，以有效地引导模型朝着预期的结果前进，并以期望的格式提供所需的信息。例如，由
    LLM 驱动的聊天机器人可能需要裁剪输出以适应设计的字符限制。在这种情况下，自定义过程甚至可能重新措辞输出，以保持期望的语气一致性。类似地，像报告生成器这样的应用程序通常需要根据结构化模板对输出进行精确格式化。输入/输出自定义过程确保
    LLM 的响应是可用的，并与计划的目的保持一致。


    自定义和处理通常需要迭代策略，即根据输出质量来测试和完善输入。创建反馈循环以发现差距并改进性能。对 LLM 输入和输出进行深思熟虑的自定义有助于最大限度地提高文本摘要、社交媒体情感分析和客户服务等任务的效率。自定义是一种全面的方法，可在利用
    LLM 进行商业和其他实际应用时带来准确性、相关性和效率。


    #### 使用 LangChain 和 OpenAI 进行输入与输出自定义


    以下描述了清单 8-13 程序的工作原理。


    1.  **导入所需库。** 从 LangChain 加载必要的库以与 OpenAI 的模型进行交互。

    2.  **定义 PromptTemplate。** 设置一个提示模板，以指示模型如何在指定的字数限制内总结给定的主题。

    3.  **设置 API 密钥。** 准备用于访问 OpenAI 的 API 密钥。

    4.  **创建 LLM（语言模型）实例。** 使用特定设置（如温度和最大令牌数）初始化 OpenAI 的 GPT-3.5-Turbo 模型。

    5.  **输入数据。** 为摘要定义 `topic`（主题）和 `word_limit`（字数限制）。

    6.  **格式化提示。** 使用 `PromptTemplate` 将 `topic` 和 `word_limit` 插入到提示中。

