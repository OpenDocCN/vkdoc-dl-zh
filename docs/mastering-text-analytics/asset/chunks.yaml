    ## 3.3.2 Search and Replace


    Any person who has used a spreadsheet or word processing application is familiar
    with the term "Search and Replace". Many other applications also make use of this
    functionality. This is handy when you need to make consistent changes across documents
    or codebases. Python `RegEx` module provides us with advanced search and replace
    functionality that enables accurate and flexible data manipulation (see Listing
    [3-6](#649581_1_En_3_Chapter.xhtml#PC6)).


    ```

    import re

