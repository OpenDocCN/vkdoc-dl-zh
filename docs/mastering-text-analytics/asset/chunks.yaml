    # 6.1 为何要阅读本章


    本章介绍句法分析中的一些基础概念，例如如何分解和分析句子结构。理解这些概念对于提升你在自然语言处理（NLP）方面的技能至关重要。掌握词性标注和句法分析技术，将有助于你构建更优秀的
    NLP 模型。`POS` 标注是构建聊天机器人、搜索引擎优化（SEO）以及机器翻译的一项基本技能。本章包含大量实用示例，并附有一份完整的教程，旨在为你提供该领域的实践技能。句法分析技能能够增强
    NLP 系统，使其掌握语言的基本结构，从而在虚拟助手和客服聊天机器人等应用中，生成更细致入微、语境更准确的回复。


    此外，本章所学的技能将帮助你适应并创新 NLP 领域的最新发展。在深入探讨句法和语义分析的主题之前，最好先用简单的语言正式理解它们，并弄清两者之间的关系。最后，本节将解释为何你应该掌握这些主题。


    句法分析和语义分析是 NLP 的重要组成部分。`句法分析` 的主要着力点在于句子的语法结构，以确保它们遵循规定的句法规则。句法分析将输入的句子分解成片段，例如短语和从句，并利用解析树等结构来表示它们的层级关系。例如，句子“The
    dog barked loudly”将“The dog”归类为名词短语，将“barked loudly”归类为动词短语。这有助于 NLP 应用理解句子中的词语在结构上是如何相互关联的。句法分析对于
    NLP 任务至关重要，例如语法检查、句子解析，以及将非结构化文本转换为机器可读和可理解的格式。


    另一方面，`语义分析` 则探究输入文本中词语、短语和句子的确切含义。该技术推断词语之间的关系，并解决同一词语在不同语境中含义的不确定性。例如，“bank”一词可以指金融机构，也可以指河岸，含义不同。语义分析还探索文本的逻辑表示。诸如词义消歧（WSD）、命名实体识别和语义角色标注等语义分析技术，使
    NLP 应用能够在其特定语境中提取词语和短语的含义。例如，语义分析技术可以解释“Flying planes can be dangerous”是指驾驶飞机这一行为，还是指飞机（作为机器）本身具有危险性。语义分析对于社交媒体或电子邮件情感分析、问答聊天机器人以及跨语言机器翻译等
    NLP 系统至关重要。


    句法分析和语义分析技术是相辅相成的。前者确保语法的准确性和结构的一致性。而后者（语义分析）则确保 NLP 应用中任何给定输入文本中的词语、短语和句子都能得到有意义的解释。一个在句法上正确的句子，如果没有适当的语境，从语义角度来看可能仍然存在歧义。当这两种技术结合使用时，能够提升
    NLP 应用的精确度和正确性。正确应用这两种技术，可以确保在拥有正确语境含义的同时，也具备恰当的结构正确性。


    学习这两个主题对于任何从事 NLP 系统工作的人来说都至关重要。这些技术构成了语言应用的支柱，这些应用既需要语法正确性，也需要恰当的语境理解。正确理解句法和语义技术，可以帮助你设计出能够准确解析文本，并恰当解释语境含义的稳健语言模型。这些知识对于开发尖端的
    AI 系统至关重要，例如高级的特定领域聊天机器人、像 Alexa 这样的虚拟助手，以及能够与英语、德语和印地语等人类语言无缝交互的自动文本摘要应用。


    ## 6.2 结构技术概述


    本章涵盖的关键概念，如 `POS` 标注、句法分析和语法树，是理解句子结构和含义的基础。`POS` 标注用于找出句子中每个词的角色。它使得对文本的解读更加准确，这在语法纠正等许多
    NLP 任务中至关重要。


    依存分析和成分分析等句法分析技术，能够将句子分解成各自的语法组成部分。这有助于更精确地分析词语关系，对于从输入文本中准确提取信息至关重要。


    语法树是一种可视化表示句子结构的方式。它们清晰地展示了任何输入句子中词语的组织方式。语法树在文本处理任务中非常有用，例如句法解析，这能提升 NLP 模型在现实场景（如问答系统、文本摘要和语音识别）中的有效性和可靠性。


    如果不提及一些相关的商业或行业应用，我们本节的讨论就不算完整。让我们以机器翻译这样的实时应用为例：句法分析在此处有助于准确解析源语言的输入句子，以识别潜在的语法结构和词语之间的依赖关系。这些信息有助于
    NLP 模型在保留原始句子结构的同时，生成目标语言中语法正确的翻译。许多 NLP 应用中的信息提取系统使用句法分析来解析句子，并提取关键实体、关系和动作。在另一个现实场景中，例如法律合同，句法分析可以识别并结构化重要的法律条款及其关联。这有助于自动提取相关的条款和义务。接下来，让我们逐一审视本章的关键概念，并尝试在每个概念上培养出概念性和实践性的技能。

    '
- fmt: '### 6.2.1 Part-of-Speech Tagging


    `Part-of-speech` (POS) tagging is a fundamental step in greater NLP tasks. It
    labels each word in a sentence with its corresponding role within the context
    of the sentence. These roles can be nouns, verbs, adjectives, or adverbs. POS
    tagging helps us understand the grammatical structure of a sentence.


    POS tagging lays the foundation for more advanced NLP tasks, such as parsing,
    information extraction, and text summarization. The POS tagging step typically
    uses algorithms that analyze the context of words by leveraging statistical models
    or rule-based systems to assign the correct tags.


    POS tagging can be resourcefully done using popular NLP libraries like `NLTK`,
    `spaCy`, and `StanfordNLP`. These libraries use pre-built models and tools that
    simplify the process of POS tagging. `NLTK` is ideal for educational purposes
    and comparatively simpler projects. `spaCy`, on the other hand, is known for its
    speed and accuracy. It is popularly used in production environments. `spaCy` also
    provides advanced features such as dependency parsing along with POS tagging,
    which makes it suitable for complex tasks. `StanfordNLP` is another powerful library
    offering high-accuracy POS tagging through its deep learning–based models. It
    supports multiple languages, making it a versatile choice for diverse NLP applications.
    All these libraries load a pre-trained model and pass a sentence or document through
    the model to get the POS tags for every word in an input sentence. The ease of
    use in these libraries allows NLP developers to integrate POS tagging into larger
    NLP pipelines to increase the text processing capabilities of their applications.


    In the English language, words fall into one of eight or nine parts of speech
    as follows.


    *   Noun

    *   Verb

    *   Adjective

    *   Adverb

    *   Pronoun

    *   Preposition

    *   Conjunction

    *   Interjection

    *   Determiner


    We do not explain each POS tag. You are encouraged to use any English language
    grammar books. The nine POS tags are the most basic ones. In practice, the list
    of POS tags is much larger. For example, Table [6-1](#649581_1_En_6_Chapter.xhtml#Tab1)
    features the POS tags used by a CMU tagger. This tagger uses a total of 37 POS
    tags, as listed in Table [6-1](#649581_1_En_6_Chapter.xhtml#Tab1). A CMU tagger
    is a part-of-speech tagging tool specially designed for accurate and efficient
    POS tagging. Carnegie Mellon University developed it.


    **Table 6-1** POS Tags Used by CMU Tagger


    | ![Table listing tags and their descriptions for parts of speech and other linguistic
    elements. The table includes tags like "CC" for coordinating conjunction, "NN"
    for noun, singular or mass, "VB" for verb, base form, and "URL" for Universal
    Resource Locator, among others. Each tag is paired with a brief description of
    its function or meaning.](images/649581_1_En_6_Chapter/649581_1_En_6_Figa_HTML.jpg)
    |


    Table [6-1](#649581_1_En_6_Chapter.xhtml#Tab1) lists 37 POS tags; such a large
    number is required to capture the nuanced grammatical distinctions in language.
    More accurate parsing of sentences requires this level of detail. It allows the
    understanding of complex sentence structures by differentiating between similar
    but distinct word roles. Figure [6-1](#649581_1_En_6_Chapter.xhtml#Fig1) depicts
    a simple example of POS tagging.


    ![A table displaying a sentence with each word labeled by its part of speech.
    The sentence reads, "I ''ve been waiting for a good time." The parts of speech
    are labeled as follows: "I" is a pronoun (PRON), "''ve" is an auxiliary verb (AUX),
    "been" is an auxiliary verb (AUX), "waiting" is a verb (VERB), "for" is an adposition
    (ADP), "a" is a determiner (DET), "good" is an adjective (ADJ), and "time" is
    a noun (NOUN). The background is orange.](images/649581_1_En_6_Chapter/649581_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** A simple example of POS tagging


    ### 6.2.2 POS Tagging Tutorials


    The following are coding tutorials for POS tagging with `NLTK` and `spaCy`.


    #### POS Tagging with NLTK


    ```

    !pip install nltk # Do it, if you gve not done lt already.

    import nltk

    nltk.download(''punkt'') # This we have seen n prevous chapters.

    nltk.download(''averaged_perceptron_tagger'') # Tagger based on averaged perceptron
    algorithm.

    sentence = "nltk it ideal for educational purposes and comparatively simpler projects."

    tokens = nltk.word_tokenize(sentence)

    pos_tags = nltk.pos_tag(tokens)

    print(pos_tags)

    OUTPUT:

    [(''nltk'', ''IN''), (''it'', ''PRP''), (''ideal'', ''VB''), (''for'', ''IN''),
    (''educational'', ''JJ''), (''purposes'', ''NNS''), (''and'', ''CC''), (''comparatively'',
    ''RB''), (''simpler'', ''JJ''), (''projects'', ''NNS''), (''.'', ''.'')]

    ```


    #### POS Tagging with spaCy


    Listing [6-1](#649581_1_En_6_Chapter.xhtml#PC2) contains the code for POS tagging
    using `spaCy`.


    ```

    !pip install spacy # Do it, if you gve not done lt already.

    # "en_core_web_sm" is a small, lightweight English language model in spaCy.

    # It is ideal for quick NLP tasks.

    !python -m spacy download en_core_web_sm

    import spacy

    nlp = spacy.load("en_core_web_sm")

    Sample_doc = nlp("""Spacy, on the other hand, is known for its

    speed and accuracy. It is popularly used in production environments. """)

    for token in Sample_doc:

    print(token.text, token.pos_)

    OUTPUT:

    Spacy NOUN

    , PUNCT

    on ADP

    the DET

    other ADJ

    hand NOUN

    , PUNCT

    is AUX

    known VERB

    for ADP

    its PRON

    speed NOUN

    and CCONJ

    accuracy NOUN

    . PUNCT

    SPACE

    It PRON

    is AUX

    popularly ADV

    used VERB

    in ADP

    production NOUN

    environments NOUN

    . PUNCT

    Listing 6-1

    POS tagging

    ```


    **Note:** The `StanfordNLP` demo is not included as its dependencies installing
    was taking much longer than reasonably expected.


    Many NLP professionals use more complex LSTM-based POS tagging or other deep learning
    methods for the same because they may offer better performance for complex or
    specialized tasks. `spaCy` provides a faster and more user-friendly POS tagging
    approach, so it is better suited for general-purpose applications. The choice
    of POS tagging technique depends upon the specific needs of your project. Stay
    tuned!


    We close this section on POS tagging by putting forward their immediate uses,
    which you will see in this book.


    *   POS tagging plays an important role in building lemmatizes, which are used
    to reduce a word to its root form.

    *   POS tags are useful for building parse trees and extracting relations between
    words, which are discussed in the next section.

    *   POS tags find use in NERs. Examples of NER are names of people, organizations,
    locations, and dates. Keep in mind that most named entities are Nouns.


    ### 6.2.3 Parsing Techniques


    Parsing is breaking down a sentence into its constituent components and analyzing
    the relationships between words. Parsing allows machines to infer and process
    human languages more effectively. Parsing techniques provide the required framework
    for understanding the grammatical structure of sentences. Parsing techniques are
    divided into constituency parsing and dependency parsing. Constituency parsing
    finds the structure of a sentence by dividing it into nested phrases or constituents.
    Dependency parsing, on the other hand, keeps its focus on the relationships between
    words. It determines how each word depends on another within the sentence. With
    a proper understanding of how sentences are structured and how words relate to
    each other, NLP developers can produce systems that can better capture the delicacies
    of human language for building effective NLP solutions. Next, let’s look at dependency
    and constituency parsing in the details, just enough to understand them. Then,
    we go through a hands-on example.'
  raw: '### 6.2.1 Part-of-Speech Tagging


    Part-of-speech (POS) tagging is a fundamental step in greater NLP tasks. It labels
    each word in a sentence with its corresponding role within the context of the
    sentence. These roles can be nouns, verbs, adjectives, or adverbs. POS tagging
    helps us understand the grammatical structure of a sentence.


    POS tagging lays the foundation for more advanced NLP tasks, such as parsing,
    information extraction, and text summarization. The POS tagging step typically
    uses algorithms that analyze the context of words by leveraging statistical models
    or rule-based systems to assign the correct tags.


    POS tagging can be resourcefully done using popular NLP libraries like NLTK, spaCy,
    and StanfordNLP. These libraries use pre-built models and tools that simplify
    the process of POS tagging. NLTK is ideal for educational purposes and comparatively
    simpler projects. spaCy, on the other hand, is known for its speed and accuracy.
    It is popularly used in production environments. spaCy also provides advanced
    features such as dependency parsing along with POS tagging, which makes it suitable
    for complex tasks. StanfordNLP is another powerful library offering high-accuracy
    POS tagging through its deep learning–based models. It supports multiple languages,
    making it a versatile choice for diverse NLP applications. All these libraries
    load a pre-trained model and pass a sentence or document through the model to
    get the POS tags for every word in an input sentence. The ease of use in these
    libraries allows NLP developers to integrate POS tagging into larger NLP pipelines
    to increase the text processing capabilities of their applications.


    In the English language, words fall into one of eight or nine parts of speech
    as follows.


    *   Noun


    *   Verb


    *   Adjective


    *   Adverb


    *   Pronoun


    *   Preposition


    *   Conjunction


    *   Interjection


    *   Determiner


    We do not explain each POS tag. You are encouraged to use any English language
    grammar books. The nine POS tags are the most basic ones. In practice, the list
    of POS tags is much larger. For example, Table [6-1](#649581_1_En_6_Chapter.xhtml#Tab1)
    features the POS tags used by a CMU tagger. This tagger uses a total of 37 POS
    tags, as listed in Table [6-1](#649581_1_En_6_Chapter.xhtml#Tab1). A CMU tagger
    is a part-of-speech tagging tool specially designed for accurate and efficient
    POS tagging. Carnegie Mellon University developed it.


    Table 6-1


    POS Tags Used by CMU Tagger


    | ![Table listing tags and their descriptions for parts of speech and other linguistic
    elements. The table includes tags like "CC" for coordinating conjunction, "NN"
    for noun, singular or mass, "VB" for verb, base form, and "URL" for Universal
    Resource Locator, among others. Each tag is paired with a brief description of
    its function or meaning.](images/649581_1_En_6_Chapter/649581_1_En_6_Figa_HTML.jpg)
    |


    Table [6-1](#649581_1_En_6_Chapter.xhtml#Tab1) lists 37 POS tags; such a large
    number is required to capture the nuanced grammatical distinctions in language.
    More accurate parsing of sentences requires this level of detail. It allows the
    understanding of complex sentence structures by differentiating between similar
    but distinct word roles. Figure [6-1](#649581_1_En_6_Chapter.xhtml#Fig1) depicts
    a simple example of POS tagging.


    ![A table displaying a sentence with each word labeled by its part of speech.
    The sentence reads, "I ''ve been waiting for a good time." The parts of speech
    are labeled as follows: "I" is a pronoun (PRON), "''ve" is an auxiliary verb (AUX),
    "been" is an auxiliary verb (AUX), "waiting" is a verb (VERB), "for" is an adposition
    (ADP), "a" is a determiner (DET), "good" is an adjective (ADJ), and "time" is
    a noun (NOUN). The background is orange.](images/649581_1_En_6_Chapter/649581_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    A simple example of POS tagging


    ### 6.2.2 POS Tagging Tutorials


    The following are coding tutorials for POS tagging with NLTK and spaCy.


    #### **POS Tagging with** NLTK


    ```

    !pip install nltk # Do it, if you gve not done lt already.

    import nltk

    nltk.download(''punkt'') # This we have seen n prevous chapters.

    nltk.download(''averaged_perceptron_tagger'') # Tagger based on averaged perceptron
    algorithm.

    sentence = "nltk it ideal for educational purposes and comparatively simpler projects."

    tokens = nltk.word_tokenize(sentence)

    pos_tags = nltk.pos_tag(tokens)

    print(pos_tags)

    OUTPUT:

    [(''nltk'', ''IN''), (''it'', ''PRP''), (''ideal'', ''VB''), (''for'', ''IN''),
    (''educational'', ''JJ''), (''purposes'', ''NNS''), (''and'', ''CC''), (''comparatively'',
    ''RB''), (''simpler'', ''JJ''), (''projects'', ''NNS''), (''.'', ''.'')]

    ```


    #### POS Tagging with **spaCy**


    Listing [6-1](#649581_1_En_6_Chapter.xhtml#PC2) contains the code for POS tagging
    using spaCy.


    ```

    !pip install spacy # Do it, if you gve not done lt already.

    # "en_core_web_sm" is a small, lightweight English language model in spaCy.

    # It is ideal for quick NLP tasks.

    !python -m spacy download en_core_web_sm

    import spacy

    nlp = spacy.load("en_core_web_sm")

    Sample_doc = nlp("""Spacy, on the other hand, is known for its

    speed and accuracy. It is popularly used in production environments. """)

    for token in Sample_doc:

    print(token.text, token.pos_)

    OUTPUT:

    Spacy NOUN

    , PUNCT

    on ADP

    the DET

    other ADJ

    hand NOUN

    , PUNCT

    is AUX

    known VERB

    for ADP

    its PRON

    speed NOUN

    and CCONJ

    accuracy NOUN

    . PUNCT

    SPACE

    It PRON

    is AUX

    popularly ADV

    used VERB

    in ADP

    production NOUN

    environments NOUN

    . PUNCT

    Listing 6-1

    POS tagging

    ```


    Note


    The StanfordNLP demo is not included as its dependencies installing was taking
    much longer than reasonably expected.


    Many NLP professionals use more complex LSTM-based POS tagging or other deep learning
    methods for the same because they may offer better performance for complex or
    specialized tasks. spaCy provides a faster and more user-friendly POS tagging
    approach, so it is better suited for r general-purpose applications. The choice
    of POS tagging technique depends upon the specific needs of your project. Stay
    tuned!


    We close this section on POS tagging by putting forward their immediate uses,
    which you will see in this book.


    *   POS tagging plays an important role in building lemmatizes, which are used
    to reduce a word to its root form.


    *   POS tags are useful for building parse trees and extracting relations between
    words, which are discussed in the next section.


    *   POS tags find use in NERs. Examples of NER are names of people, organizations,
    locations, and dates. Keep in mind that most named entities are Nouns.


    ### 6.2.3 Parsing Techniques


    Parsing is breaking down a sentence into its constituent components and analyzing
    the relationships between words. Parsing allows machines to infer and process
    human languages more effectively. Parsing techniques provide the required framework
    for understanding the grammatical structure of sentences. Parsing techniques are
    divided into constituency parsing and dependency parsing. Constituency parsing
    finds the structure of a sentence by dividing it into nested phrases or constituents.
    Dependency parsing, on the other hand, keeps its focus on the relationships between
    words. It determines how each word depends on another within the sentence. With
    a proper understanding of how sentences are structured and how words relate to
    each other, NLP developers can produce systems that can better capture the delicacies
    of human language for building effective NLP solutions. Next, let’s look at dependency
    and constituency parsing in the details, just enough to understand them. Then,
    we go through a hands-on example.'
  trans: '

    ### 6.2.1 词性标注


    `词性`（POS）标注是更高级自然语言处理任务中的基础步骤。它根据单词在句子语境中的对应角色，为句子中的每个单词进行标注。这些角色可以是名词、动词、形容词或副词。词性标注有助于我们理解句子的语法结构。


    词性标注为更高级的自然语言处理任务（如句法分析、信息抽取和文本摘要）奠定了基础。词性标注步骤通常使用算法，通过利用统计模型或基于规则的系统来分析单词的上下文，从而分配正确的标签。


    使用流行的自然语言处理库（如 `NLTK`、`spaCy` 和 `StanfordNLP`）可以高效地完成词性标注。这些库使用预构建的模型和工具，简化了词性标注的过程。`NLTK`
    非常适合教育目的和相对简单的项目。另一方面，`spaCy` 以其速度和准确性而闻名，广泛应用于生产环境。`spaCy` 还提供高级功能，例如在词性标注的同时进行依存句法分析，使其适用于复杂任务。`StanfordNLP`
    是另一个强大的库，通过其基于深度学习的模型提供高精度的词性标注。它支持多种语言，使其成为多样化自然语言处理应用的多功能选择。所有这些库都会加载一个预训练模型，并将一个句子或文档传入该模型，以获取输入句子中每个单词的词性标签。这些库的易用性使得自然语言处理开发者能够将词性标注集成到更大的自然语言处理流程中，从而增强其应用的文本处理能力。


    在英语中，单词可分为以下八或九种词性。


    *   名词

    *   动词

    *   形容词

    *   副词

    *   代词

    *   介词

    *   连词

    *   感叹词

    *   限定词


    我们不会逐一解释每个词性标签。建议你参考任何英语语法书籍。这九种词性标签是最基础的。在实践中，词性标签的列表要大得多。例如，表 6-1 列出了 CMU 标注器使用的词性标签。该标注器总共使用了
    37 个词性标签，如表 6-1 所示。CMU 标注器是一种专门为准确高效地进行词性标注而设计的工具，由卡内基梅隆大学开发。


    **表 6-1** CMU 标注器使用的词性标签


    | ![表格列出了词性及其他语言元素的标签及其描述。该表格包含诸如 "CC"（并列连词）、"NN"（名词，单数或不可数）、"VB"（动词，原形）和 "URL"（统一资源定位符）等标签。每个标签都附有对其功能或含义的简要描述。](img/649581_1_En_6_Figa_HTML.jpg)
    |


    表 6-1 列出了 37 个词性标签；需要如此庞大的数量才能捕捉语言中细微的语法区别。更精确的句子分析需要这种详细程度。它通过区分相似但不同的单词角色，从而能够理解复杂的句子结构。图
    6-1 展示了一个简单的词性标注示例。


    ![一个表格显示了一个句子，其中每个单词都标有其词性。句子内容是："I ''ve been waiting for a good time." 词性标注如下："I"
    是代词 (PRON)，"''ve" 是助动词 (AUX)，"been" 是助动词 (AUX)，"waiting" 是动词 (VERB)，"for" 是介词
    (ADP)，"a" 是限定词 (DET)，"good" 是形容词 (ADJ)，"time" 是名词 (NOUN)。背景为橙色。](img/649581_1_En_6_Fig1_HTML.jpg)


    **图 6-1** 一个简单的词性标注示例


    ### 6.2.2 词性标注教程


    以下是使用 `NLTK` 和 `spaCy` 进行词性标注的编码教程。


    #### 使用 NLTK 进行词性标注


    ```

    !pip install nltk # 如果尚未安装，请执行此操作。

    import nltk

    nltk.download(''punkt'') # 我们在之前的章节中已经见过这个。

    nltk.download(''averaged_perceptron_tagger'') # 基于平均感知器算法的标注器。

    sentence = "nltk it ideal for educational purposes and comparatively simpler projects."

    tokens = nltk.word_tokenize(sentence)

    pos_tags = nltk.pos_tag(tokens)

    print(pos_tags)

    输出:

    [(''nltk'', ''IN''), (''it'', ''PRP''), (''ideal'', ''VB''), (''for'', ''IN''),
    (''educational'', ''JJ''), (''purposes'', ''NNS''), (''and'', ''CC''), (''comparatively'',
    ''RB''), (''simpler'', ''JJ''), (''projects'', ''NNS''), (''.'', ''.'')]

    ```


    #### 使用 spaCy 进行词性标注


    代码清单 6-1 包含了使用 `spaCy` 进行词性标注的代码。


    ```

    !pip install spacy # 如果尚未安装，请执行此操作。

    # "en_core_web_sm" 是 spaCy 中一个轻量级的英语模型。

    # 它非常适合快速的自然语言处理任务。

    !python -m spacy download en_core_web_sm

    import spacy

    nlp = spacy.load("en_core_web_sm")

    Sample_doc = nlp("""Spacy, on the other hand, is known for its

    speed and accuracy. It is popularly used in production environments. """)

    for token in Sample_doc:

    print(token.text, token.pos_)

    输出:

    Spacy NOUN

    , PUNCT

    on ADP

    the DET

    other ADJ

    hand NOUN

    , PUNCT

    is AUX

    known VERB

    for ADP

    its PRON

    speed NOUN

    and CCONJ

    accuracy NOUN

    . PUNCT

    SPACE

    It PRON

    is AUX

    popularly ADV

    used VERB

    in ADP

    production NOUN

    environments NOUN

    . PUNCT

    代码清单 6-1

    词性标注

    ```


    **注意：** 未包含 `StanfordNLP` 的演示，因为其依赖项的安装时间远超合理预期。


    许多自然语言处理专业人士会使用更复杂的基于 LSTM 的词性标注或其他深度学习方法，因为它们可能为复杂或专门的任务提供更好的性能。`spaCy` 提供了一种更快、更用户友好的词性标注方法，因此更适合通用型应用。词性标注技术的选择取决于项目的具体需求。敬请期待！


    我们通过提出词性标注的直接用途来结束本节，这些用途你将在本书中看到。


    *   词性标注在构建词形还原器中起着重要作用，词形还原器用于将单词还原为其词根形式。

    *   词性标签对于构建句法分析树和提取单词之间的关系非常有用，这将在下一节中讨论。

    *   词性标签在命名实体识别中也有应用。命名实体的例子包括人名、组织名、地点名和日期。请记住，大多数命名实体都是名词。


    ### 6.2.3 句法分析技术


    句法分析是将句子分解为其组成成分，并分析单词之间的关系。句法分析使机器能够更有效地推断和处理人类语言。句法分析技术为理解句子的语法结构提供了必要的框架。句法分析技术分为短语结构分析和依存句法分析。短语结构分析通过将句子划分为嵌套的短语或成分来发现句子的结构。另一方面，依存句法分析则侧重于单词之间的关系，确定句子中每个单词如何依赖于另一个单词。通过正确理解句子的结构以及单词之间的相互关系，自然语言处理开发者可以构建出能够更好地捕捉人类语言微妙之处的系统，从而建立有效的自然语言处理解决方案。接下来，让我们详细了解依存句法分析和短语结构分析，足以理解它们即可。然后，我们将进行一个动手实践示例。

