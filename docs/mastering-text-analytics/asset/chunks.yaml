- fmt: '### 1.2.4 Collocation


    Let’s again start with a simple example. Suppose you are a cook in a five-star
    hotel. Over the years of cooking, you noticed that certain ingredients are often
    used together in recipes. Examples of such ingredients include “peanut butter”
    and “jelly,” or “salt” and “pepper”. Such pairs of ingredients are called *collocations*
    in the cooking domain. When it comes to text or language, collocations are pairs
    or groups of words that often go together and sound natural to native speakers.


    “Make a choice”, “Take a break”, “Heavy rain”, and “Do homework” are a few examples
    of English collocations. Understanding and using collocations can make your language
    sound more natural and fluent. As the words naturally fit together, collocations
    can help in both writing and speaking.


    `Word2Vec` is a deep learning-based model that learns collocation word associations
    from large corpora (large bodies of text data). The key here is that words that
    often appear together have similar vector representations. We discuss this and
    many other techniques in the chapters to come.


    ### 1.2.5 Concordance (Computing Word Frequencies)


    As usual, let’s again start with a simple example. Suppose you are attempting
    to write a relatively long article. In this article, you want to see how many
    times a specific word, say `rain`, has appeared. A concordance helps you do just
    that. The entire process of finding concordance (or word frequencies) is done
    with the help of computer programs. So, in the context of NLP, concordance is
    the process of finding the occurrences of a word or phrase in a text corpus, along
    with their contexts.


    NLP-specific Python libraries like `Natural Language Toolkit (NLTK)` can be used
    to create concordances by processing and analyzing text data. We discuss this
    library in the early part of this book. Some other software tools are also capable
    of providing visual representations of word frequencies and their contexts.


    ### 1.2.6 Text Extraction


    In the context of NLP-specific computer programs, text extraction simply means
    pulling out specific information of interest from a large amount of text corpus.
    Let’s try to understand with the help of a simple example. Imagine you are reading
    a book and you only need the paragraphs that discuss your hobby, such as tennis.
    Text extraction is like using a highlighter to mark just those parts. Under text
    extraction, the main topics that are covered in this book are as follows.


    *   **Named entity recognition (NER)**: Extracting various entities like names,
    dates, locations, and other specific items from a text corpus.


    *   **Keyword extraction**: Extracting important keywords or phrases that summarize
    the main theme of the document or text corpus.


    *   **Part-of-speech tagging**: Labeling words in a text corpus, including various
    nouns, verbs, and adjectives. It helps in understanding the structure and extracting
    relevant information.


    *   **Regular expressions (RegEx)**: Using patterns to extract explicit text strings,
    such as finding addresses or phone numbers from the body of emails.


    *   **Text summarization**: Producing a summary of a longer text document and
    highlighting the key points.


    ### 1.2.7 Stop Word Removal


    As usual, let’s again start with a simple example. Consider the sentence, “The
    cat is on a mat.” If all the stop words are removed, we are left with only “cat”
    and “mat,” which are the keywords. Stop word removal is a process used in NLP
    that filters out commonly occurring words. The type of words that are removed
    can be “and”, “the”, “is”, “in”, and so forth. These kinds of words don’t add
    much meaning to sentences. We call words like “and,” “the,” “is,” and “in” *stop
    words* in the context of NLP. Removing these words helps computers focus on the
    more important words in a text corpus.


    The stop word removal process begins by tokenizing the text. Tokenizing is breaking
    a text document (a document in the context of NLP is a complete piece of text)
    into individual words. The next step is to compare each word against a predefined
    list of stop words. If any word matches one on the list, it is to be removed from
    the text. This step helps reduce the dataset size (of individual words) and keeps
    the focus of analysis on the more significant words.


    Popular libraries for stop word removal in NLP contain `NLTK` (Natural Language
    Toolkit), `spaCy`, `Gensim`, `scikit-learn`, and `TextBlob`. These libraries offer
    comprehensive functions for general text processing, including stop word removal.
    We introduce most of these libraries in the early part of this book. These libraries
    are utilized throughout this book when we discuss our case studies with code.


    ### 1.2.8 Word Sense Disambiguation (WSD)


    Consider the simple sentence: “John noticed a bat flying in the sky.” Here, the
    word “bat” could have two distinct meanings. The first one is the nocturnal animal,
    and the second is equipment used in baseball, tennis, or cricket. WSD program
    analyzes the words surrounding “bat” and the syntactic structure of the entire
    sentence. It uses this information to find out which meaning of “bat” is most
    appropriate. This type of analysis is crucial to various NLP applications, including
    machine translation, sentiment analysis, and information retrieval. In this type
    of task, precise understanding of word meanings can enhance the performance and
    reliability of NLP-based computer programs. The WSD process (approximated in Figure
    [1-4](#649581_1_En_1_Chapter.xhtml#Fig4)) [[8](#649581_1_En_1_Chapter.xhtml#CR8)]
    can be summarized as follows.


    *   **Context analysis**: Focus on the target word and analyze its surrounding
    context within the sentence.


    *   **Sense inventory**: For context analysis, generally, a predefined inventory
    or dictionary is used that lists different meanings (senses) of the target word.


    *   **Feature extraction**: Extract relevant features such as neighboring words,
    part-of-speech tags, and various syntactic dependencies.


    *   **Disambiguation algorithm**: Apply appropriate machine learning algorithms
    to determine the most likely sense (of the target word).


    *   **Evaluation**: Determine accuracy using various classification metrics like
    precision, recall, and F1 score against annotated data.


    *   **Application**: Integrate WSD techniques into NLP tasks that include the
    likes of machine translation and sentiment analysis.


    This process may seem unfamiliar right now, but don’t worry. You can just read
    it once and proceed even if you don’t understand fully. We have included a code-based
    case study later in this book.


    ![Flow chart titled "Alternative Word Sense Disambiguation Scheme." It consists
    of five nodes connected by arrows. The nodes are labeled: "Lexical Knowledge,"
    "World Knowledge (Machine Learning)," "Sense Knowledge," "Contextual Features,"
    and "WSD (Matching)." Arrows indicate the flow from "Lexical Knowledge" and "World
    Knowledge (Machine Learning)" to "Sense Knowledge," which then connects to "WSD
    (Matching)." "Contextual Features" also connects to "WSD (Matching)." The chart
    illustrates the process of word sense disambiguation using various types of knowledge.](images/649581_1_En_1_Chapter/649581_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Workings of a WSD program'
