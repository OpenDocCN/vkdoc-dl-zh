    ## 文档转换器：为 NLP 处理拆分文本


    - **概述**：演示如何使用 `LangChain` 将文本拆分为句子、单词和字符。

    - **文件处理**：使用 `LangChain` 的 `TextLoader` 从 `sample_text.txt` 加载文本。

    - **句子拆分**：使用带有句点分隔符的 `CharacterTextSplitter`。

    - **令牌拆分**：根据空白字符拆分单词。

    - **字符拆分**：将文本转换为单个字符，以便进行细粒度分析。


