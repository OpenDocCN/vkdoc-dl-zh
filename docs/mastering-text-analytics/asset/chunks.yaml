    ### 像 BERT 和 GPT 这样的进步


    近年来，自然语言处理（NLP）领域取得了显著进展。`BERT` 代表来自变换器的双向编码器表示。它于 2018 年首次被提出。GPT 类别中最流行的模型是
    `ChatGPT`，它于 2022 年首次发布。`BERT` 和 `GPT` 都属于大型语言模型（LLM）的范畴，并且都基于变换器模型。LLM 在大量数据上进行训练，只需极少的微调就能执行各种任务，例如文本翻译和文本生成。本章重点介绍
    `BERT`；后续章节将专门介绍基于 GPT 的模型。


    `BERT` 是一种基于变换器架构的神经网络。它是一个预训练模型，只需在 `BERT` 架构之上添加一个新层或一个小型网络，就可以针对特定的 NLP 任务进行微调。`BERT`
    模型有多种尺寸，以适应不同的计算资源能力。以下是实践中使用的 `BERT` 模型。


    - **BERT-Base** 是一个较小的 `BERT` 模型。它由 12 层和 1.1 亿个参数组成。它在通用 NLP 任务的性能和速度之间取得了平衡。

    - **BERT-Large** 是 `BERT` 的一个更大版本。它由 24 层和 3.4 亿个参数组成。这个 `BERT` 模型提供了更高的准确性，但需要更多的计算资源。

    - **DistilBERT** 是 `BERT` 的一个更小、更快的变体，其大小约为 `BERT` 的 66%。这个 `BERT` 模型在保持高准确性的同时，实现了更快的处理速度。

    - **TinyBERT** 是一个紧凑的 `BERT` 模型。它专为快速性能和低内存使用而设计。它具有更少的网络层和隐藏单元。

    - **ALBERT** 是 `BERT` 的一个轻量级版本。它在各层之间共享参数，从而在保持性能的同时减小了模型大小。


    `BERT-Base` 模型是一个广泛使用的通用 `BERT` 模型，适用于各种 NLP 任务。它的广泛用途是合理的，因为它在消耗更少计算资源的同时，保持了合理的性能和速度。


    Hugging Face 框架简化了与预训练模型（如 `BERT`、`GPT` 等）的协作。清单 7-7 是一个代码演示，展示了如何利用 Hugging Face
    框架进行 NLP 任务。为此，我们使用了 `bert-base-uncased` 模型。它是 `BERT-Base` 的一个版本，不区分大小写。本书更侧重于
    `BERT` 和 `GPT` 的使用，而非其内部架构。


    ```

    """

    使用 Hugging Face 和 BERT 对句子 "Ramesh is my friend and he is a great scholar" 进行情感分析的代码演示。

    """

    import torch

    from transformers import BertTokenizer, BertForSequenceClassification, pipeline

    # 设置随机种子以确保可重复性

    torch.manual_seed(42)

    # 加载预训练的 BERT 模型和分词器

    model = BertForSequenceClassification.from_pretrained(''bert-base-uncased'', num_labels=2)

    tokenizer = BertTokenizer.from_pretrained(''bert-base-uncased'')

    # 创建情感分析管道

    nlp = pipeline(''sentiment-analysis'', model=model, tokenizer=tokenizer)

    # 测试句子

    sentence = "Ramesh is my friend and he is a great scholar."

    # 获取情感预测

    result = nlp(sentence)

    # 打印结果

    print(result)

