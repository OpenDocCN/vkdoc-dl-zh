    由清单 4-13 的代码生成的词云


    ## 4.4.2 语言翻译


    语言翻译（或机器翻译）在在线翻译服务、多语言客户支持和全球内容可访问性等应用中非常有用。此外，机器翻译支持国际业务运营，促进跨文化交流，并让人们能够广泛访问数字内容。在机器翻译中，准确理解原文对于在目标语言中再现原文的细微差别至关重要。


    清单 4-14 使用 `translator` 库来翻译输入文本，因为 NLTK 不具备此功能。


    ```

    # 如果尚未安装 translate，请先安装。

    !pip install translate

    from translate import Translator

    def text_translator(text, from_lang=''en'', to_lang=''es''):

    # 初始化 Translator。

    translator = Translator(from_lang=from_lang, to_lang=to_lang)

    # 将文本从英语翻译成西班牙语。

    translated_text = translator.translate(text)

    return translated_text

    # 示例用法 1。

    Original_input_text = "Hello, how are you today? I hope you''re doing well."

    translated_text = text_translator(Original_input_text)

    print(f"原始输入文本: {Original_input_text}")

    print(f"翻译后的文本: {translated_text}")

    输出 1:

    原始输入文本: Hello, how are you today? I hope you''re doing well.

    翻译后的文本: Hola, ¿cómo estás hoy? Espero que lo estés haciendo bien.

    # 示例用法 2。

    original_text = "Hello, we won the baseball game today and received the prize
    money."

    translated_text = text_translator(original_text)

    print(f"原始文本: {original_text}")

    print(f"翻译后的文本: {translated_text}")

    输出 2:

    原始文本: Hello, we won the baseball game today and received the prize money.

    翻译后的文本: Hola, hoy ganamos el juego de béisbol y recibimos el dinero del premio.

    清单 4-14

    使用 Translator 库创建机器翻译器

    ```


