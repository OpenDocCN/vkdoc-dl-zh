  trans: "\n### 3.3.7 分词\n\n`Tokenization`（分词）是任何自然语言处理任务中的核心步骤。在此过程中，较大的文本块会被分解为单词或句子，以简化文本分析。`Tokenization`\
    \ 主要是一个文本预处理步骤，为词频分析、情感分析和语言建模等预处理任务提供了基础。Python 的 `RegEx` 可用于 `tokenization`，方法是首先定义模式，根据空格、标点符号或其他分隔符将文本块分割成更小的单元（即词元）。清单\
    \ 3-11 演示了一种简单方法和一种专业方法的代码。\n\n```\n•    更简单的分词方法。\nimport re # 更简单的分词方法。\n# 以下是随机选取用于分词的示例文本块。\n\
    sample_text = \"\"\" Tokenization is a central step in any NLP task.\nIn this\
    \ process, larger text chunk is broken down into words\nor sentences, to keep\
    \ text analysis simple.\n\"\"\"\n# 用于将文本块分割成词元（单词）的 RegEx 模式。\ntokens = re.findall(r'\\\
    b\\w+\\b', sample_text)\nprint(tokens)\n['Tokenization', 'is', 'a', 'central',\
    \ 'step', 'in', 'any', 'NLP', 'task', 'In', 'this', 'process', 'larger', 'text',\
    \ 'chunk', 'is', 'broken', 'down', 'into', 'words', 'or', 'sentences', 'to', 'keep',\
    \ 'text', 'analysis', 'simple']\n•    以下是更专业的分词方法。\nimport re # 更专业的分词方法。\ndef\
    \ text_tokenizer(text_to_tokenize): # 编写一个分词函数。\n\"\"\"\n该函数通过按非单词字符分割，将任何输入文本块分词为单词。\n\
    参数:\ntext (str): 要分词的输入字符串。\n返回:\nlist: 从输入文本中提取的词元（单词）列表。\n\"\"\"\n# 用于分割文本的\
    \ RegEx 模式\ntokens = re.split(r'\\W+', text_to_tokenize)\n# 过滤掉分割可能产生的任何空词元。\n\
    tokens = [token for token in tokens if token]\nreturn tokens\n# 用于分词的示例文本\nsample_text\
    \ = \"\"\" Tokenization is a central step in any NLP task.\nIn this process, larger\
    \ text chunk is broken down into words\nor sentences, to keep text analysis simple.\n\
    \"\"\"\n# 对示例文本进行分词。\ntokens = text_tokenizer(sample_text)\n# 输出词元以列表形式呈现。\nprint(tokens)\n\
    ['Tokenization', 'is', 'a', 'central', 'step', 'in', 'any', 'NLP', 'task', 'In',\
    \ 'this', 'process', 'larger', 'text', 'chunk', 'is', 'broken', 'down', 'into',\
    \ 'words', 'or', 'sentences', 'to', 'keep', 'text', 'analysis', 'simple']\n清单\
    \ 3-11\n用于对较大文本块进行分词的 Python RegEx\n```\n\n### 3.3.8 文本规范化\n\n从形式上讲，*文本规范化*是指将较大的文本块转换为标准、一致的格式，以尽量减少可能使文本分析任务复杂化的变体。文本规范化包括数据清洗任务，例如将文本转换为小写、删除标点符号、扩展缩写以及替换特殊字符。文本规范化确保单词或短语的不同形式得到相同处理。文本规范化将文本数据清洗为一致的格式，以确保使用此类清洗后的数据训练自然语言处理模型时能获得更好的准确性。清单\
    \ 3-12 是文本演示。\n\n```\nimport re\ndef text_normalizer(text_to_normalize):\n\"\"\
    \"\n该函数通过转换为小写、删除标点符号以及用空格替换特殊字符来规范化任何输入文本。\n参数:\ntext (str): 要规范化的输入字符串。\n返回:\n\
    str: 规范化后的文本。\n\"\"\"\n# 首先将输入文本转换为小写。\ntext_to_normalize = text_to_normalize.lower()\n\
    # 用空格替换特殊字符和标点符号。\ntext_to_normalize = re.sub(r'[^\\w\\s]', ' ', text_to_normalize)\n\
    # 删除任何多余的空格。\ntext_to_normalize = re.sub(r'\\s+', ' ', text_to_normalize).strip()\n\
    return text_to_normalize\n# 示例输入文本。\nsample_text = \"Hi!!! This is Stella here.\
    \ I'll come this Evening with you to market!!!!!!\"\n# 规范化文本\nnormalized_text\
    \ = text_normalizer(sample_text)\n# 打印输出。\nprint(normalized_text)\nhi this is\
    \ stella here i ll come this evening with you to market\n清单 3-12\n用于文本规范化的 Python\
    \ RegEx\n```\n\n本节揭示了 `RegEx` 的实用性。这些 `RegEx` 代码演示可以帮助你看到 `RegEx` 在现实生活中的无数应用。然而，在我们迄今为止演示的每一个\
    \ `RegEx` 应用中，我们都没有讨论如何为任何特定任务裁剪特定的 `RegEx` 模式。我们建议你参考 W3school 网站。互联网上也有很多优秀的文章可以教你。\n\
