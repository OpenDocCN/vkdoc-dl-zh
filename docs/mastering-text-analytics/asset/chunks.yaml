  trans: '

    #### 依存句法分析代码演示


    清单 6-2 和图 6-2 是依存句法分析的示例。


    ![一张句法依存流程图，用于说明句子“She sells seashells by the seashore.”。箭头表示语法关系：“She”作为“sells”的名词性主语（nsubj），“seashells”作为直接宾语（dobj），“by”作为介词（prep）引出“the
    seashore”作为介词宾语（pobj），其中“the”作为限定词（det）。每个单词下方标注了其词性：PRON、VERB、NOUN、ADP、DET、NOUN。](img/649581_1_En_6_Fig2_HTML.jpg)


    **图 6-2** 示例句子“She sells seashells by the seashore.”的依存树。


    ```

    """

    强烈建议您在尝试安装或导入 spaCy 之前，先在 Anaconda 命令提示符下运行以下 conda 命令。

    """

    conda install pytorch torchvision torchaudio pytorch-cuda=11.8 -c pytorch -c nvidia

    conda install pytorch torchvision torchaudio cpuonly -c pytorch

    import spacy

    # Displacy 是 SpaCy 的可视化工具，用于以 HTML 格式渲染句法依存分析结果。

    from spacy import displacy

    # 加载所需的预训练 SpaCy 模型。

    nlp = spacy.load(''en_core_web_sm'')

    # 创建一个用于处理的示例句子。

    sample_sentence = "She sells seashells by the seashore."

    doc = nlp(sample_sentence)

    # 打印依存句法分析结果

    for token in doc:

    print(f"Token: {token.text}, Head: {token.head.text}, Dependency: {token.dep_}")

    # 设置可视化选项（适应页面）。

    options = {

    "compact": True,  # 使可视化更紧凑。

    "color": "blue",  # 更改依存线的颜色。

    "bg": "white",    # 背景颜色。

    "font": "Source Sans Pro",  # 字体样式。

    "arrow_stroke": 2,  # 箭头的粗细。

    "arrow_stretch": 8,  # 箭头的拉伸程度。

    "distance": 100      # 标记之间的距离。

    }

    # 使用上述选项渲染依存句法分析器。

    displacy.render(doc, style=''dep'', options=options, jupyter=True)

    OUTPUT:

    Token: She, Head: sells, Dependency: nsubj

    Token: sells, Head: sells, Dependency: ROOT

    Token: seashells, Head: sells, Dependency: dobj

    Token: by, Head: sells, Dependency: prep

    Token: the, Head: seashore, Dependency: det

    Token: seashore, Head: by, Dependency: pobj

    Token: ., Head: sells, Dependency: punct

    ```


    **清单 6-2** 依存句法分析


    以下是相关解释。


    *   根节点（`sells`）：动词 `sells` 是核心动作，构成了树的根。

    *   主语（`She`）：`She` 是主语，执行“卖”这个动作。

    *   直接宾语（`seashells`）：`Seashells` 是被出售的物体，直接与动词相连。

    *   介词短语（`by the seashore`）：`By` 引出地点，修饰动词 `sells`。

    *   修饰语（`the`）：`the` 限定名词 `seashore`，充当限定词。


    ### 6.2.5 句法分析中的挑战


    输入的句子通常可以有多种理解方式。其解释取决于上下文、词序，甚至文化差异。因此，构建能够为复杂句子生成准确句法结构并保持一致性的解析器始终是一项挑战。复杂的句子结构可能包含嵌套从句、习语表达和非标准语法，这些足以让句法解析器感到困惑。为了应对这些复杂性，人们开发了多种精密的算法。这些算法内置了广泛的语言知识和复杂的数学方法，能够准确分析并攻克这些难题。


    资源限制问题是句法分析器必须应对的另一个障碍。高质量的句法解析通常需要巨大的计算资源和大量带标签的数据集。无论是计算资源还是带标签的数据集，获取成本都既高昂又耗时。当涉及不同语言或专业领域时，句法解析器通常需要大量的定制化工作，这进一步增加了为多样化
    NLP 应用实现有效句法分析的复杂性。让我们通过以下示例句子来理解这一点。


    “He told his friend that he will win the race.”


    你可能已经猜到了其中的歧义。代词 `he` 既可以指代“他”，也可以指代“他的朋友”，从而导致两种可能的解释：


    *   他（原主语）将赢得比赛。

    *   他的朋友将赢得比赛。


    解析器需要借助上下文或一些额外信息来解决歧义，从而正确推断出谁将赢得比赛。可能是说话者本人，也可能是说话者的朋友，这取决于上下文。


    我们可以通过为同一个句子生成多个解析树来提供帮助。每个树都可以代表一种不同的可能结构，每种结构都描述了短语和从句之间的相互关系。然后，解析器使用语法规则来评估这些树，最终确定最连贯的结构。


    解析器还会采用统计模型和专门的消歧算法来进一步优化其分析。这些统计模型已经在大型相关数据集上进行了训练，能够根据历史使用模式预测（并给出概率）哪种解释最有可能。此外，还会使用概率上下文无关文法来比较多个解析树，并选择概率最大的解释。


    更先进的解析器会结合使用这些技术，利用上下文、语法规则和统计数据来有效处理歧义，并解决与复杂句子相关的问题。

    '
- fmt: '# 6.3 Introduction to Semantics


    Semantic analysis concentrates on understanding the meaning of words, sentences,
    and entire texts. In lexical analysis, the focus is on breaking down text into
    words or basic units of tokens. And syntactic analysis involves the structure
    and grammar of sentences. Unlike syntactic analysis, semantic analysis probes
    into the understanding of the meaning (of words and sentences) so that machines
    can comprehend human language in a contextually accurate and meaningful manner.
    Under semantic analysis, we examine a few key concepts, including chunking and
    term frequency–inverse document frequency, which are classically linked to syntactic
    techniques.


    `Word sense disambiguation` (`WSD`) is a pivotal technique in semantic analysis.
    It gets us the correct meaning of a word based on its context. For instance, consider
    a sample sentence, “The Bank of London is situated on the east bank of the River
    Thames.” Here, the word “bank” could refer to a financial institution or the side
    of a river. `WSD` helps in resolving such ambiguities and finds the appropriate
    context-based meaning of a word(s) in a given input sentence.


    The semantic similarity technique is used to find out how similar or different
    two pieces of text are in terms of meaning. It helps in understanding the meaning
    and context of the text, allowing documents with similar themes or topics to be
    clustered accurately, a process known as document clustering.


    `NER` techniques identify and classify entities in text. Entities are names of
    people, organizations, locations, dates, and so forth. So, in a way, `NER` extracts
    structured information from unstructured text.


    Chunking or shallow parsing focuses on breaking sentences into smaller, syntactically
    related chunks such as noun or verb phrases. It helps in understanding the structure
    of a sentence by breaking it down into its component parts.


    A term-document matrix (or co-occurrence matrix) captures the frequency of various
    terms across the input documents. It is concerned with how often words appear.
    Term frequency–inverse document frequency (`TF–IDF`) is built on a term-document
    matrix because it further hones the importance of these terms. `TF–IDF` considers
    both the frequency of terms (in a given input document) and their rarity across
    the entire input corpus. `TF–IDF` offers a more nuanced understanding of word
    significance.


    These techniques help bridge the gap between words and their meaning to build
    a deeper understanding of language.


    ## 6.3.1 Chunking in NLP


    Chunking breaks down an input sentence into smaller, meaningful units, which can
    be as simple as noun phrases (`NP`) or verb phrases (`VP`). Grouping words into
    chunks helps to grasp the syntactic structure of a sentence. Chunking makes it
    simpler to analyze the roles played by individual words. In chunking, the focus
    is on extracting essential information quickly (partial parsing). Full parsing,
    on the other hand, seeks to analyze the complete grammatical structure of input
    sentences. Chunking finds uses in specific tasks, such as `NER` and question-answering
    systems, in which quickly extracting specific phrases is more important than analyzing
    the entire grammatical structure of a sentence.


    Let’s apply chunking to the first sentence of this paragraph. The following repeats
    it for convenience.


    > *“ “ “*

    >

    > *Chunking, as we talked earlier, is breaking down an input sentence into smaller,
    meaningful units, which can be as simple as noun phrases (`NP`) or verb phrases
    (`VP`). Grouping of words into chunks, helps to grasp the syntactic structure
    of a sentence.*

    >

    > *” ” ”*


    We can extract the following six chunks out of this sentence:


    1.  Chunking, (`NP`)

    2.  as we talked earlier, (`PP`: prepositional phrase)

    3.  is breaking down (`VP`: verb phrase)

    4.  an input sentence (`NP`: noun phrase)

    5.  into smaller, meaningful units, (`PP`)

    6.  which can be as simple as noun phrases (`NP`) or verb phrases (`VP`). (Clause)


    In this example, noun phrases (`NP`), verb phrases (`VP`), and prepositional phrases
    (`PP`) have been recognized as the significant chunks of the sentence.


    Let’s take one more example as follows.


    > *“””*

    >

    > *Full parsing**, on the other hand, seeks to analyze the complete grammatical
    structure of input sentences.*

    >

    > *“””*


    We can extract the following five chunks out of this second example.


    1.  Full parsing, (`NP`: noun phrase)

    2.  on the other hand, (`PP`: prepositional phrase)

    3.  seeks to analyze (`VP`: verb phrase)

    4.  the complete grammatical structure (`NP`: noun phrase)

    5.  of input sentences. (`PP`: prepositional phrase)


    Noun phrases (`NP`), verb phrases (`VP`), and prepositional phrases (`PP`) have
    been found as the key components (chunks) of the sentence.


    With these examples, chunks and chunking might be pretty clear to you. If not,
    you can refer to any standard `NLP` book for additional examples.


    For chunking, the algorithm(s) groups together syntactically related units (words)
    like noun phrases (`NP`) or verb phrases (`VP`). During chunking, the input text
    is skimmed through for these patterns. On finding a match, the corresponding words
    are grouped together to form a chunk. Chunking avoids a full syntactic analysis,
    but it still breaks the sentence into its most meaningful components. This makes
    chunking a fast and efficient technique to parse input text for further processing.


    The foremost challenge in chunking is the ambiguity in language. Words have multiple
    roles depending on context. This makes it difficult to accurately recognize and
    group them into the correct chunks. Another challenge in chunking is dealing with
    exceptions and variations in sentence structure. Additionally, chunking finds
    it difficult to deal with out-of-vocabulary words and uncommon phrases. These
    challenges can be handled to some extent using models that employ a combination
    of rule-based and machine learning approaches.


    `NLTK`, `spaCy`, and `TextBlob` are the popular Python libraries that professionals
    and researchers use for chunking. These standard libraries are convenient and
    powerful, but custom deep learning solutions may be required for scalability and
    specialized `NLP` tasks. Advanced models using transformer models can further
    enhance chunking capabilities. Such custom models may sometimes offer better precision,
    flexibility, and scalability. We include a code demo of chunking toward the end
    of this chapter. Stay tuned!'
