    ### Punctuation-Based Tokenizer


    This tokenizer splits the input text on whitespace and punctuations while retaining
    the punctuations. Punctuation-based tokenization overcomes issues and provides
    a meaningful token. Punctuation-based tokenization solves the problem of simply
    splitting the input text on whitespace. The following is a simple code demo.


    ```

    #import wordpunct_tokenize from nltk.

    from nltk.tokenize import wordpunct_tokenize

    text = "Mr.Johnson owns three houses in New York on: 22nd street, downton,and
    42nd street."

    tokens = wordpunct_tokenize(text)

    tokens

