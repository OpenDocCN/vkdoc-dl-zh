    4-9 是这一重要的 NLP 数据预处理操作的代码演示。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    import nltk

    from nltk.corpus import wordnet

    from nltk.wsd import lesk

    # 确保已下载所需数据

    nltk.download(''wordnet'')

    nltk.download(''omw-1.4'')

    def disambiguate_word(sentence, word):

    # 应用 Lesk 算法来消歧单词

    sense = lesk(nltk.word_tokenize(sentence), word)

    return sense.definition() if sense else "未找到词义。"

    # 示例用法 1

    sentence = "He uses a bank to deposit his lard earned money."

    word_for_WSD1 = "bank"

    sense_definition1 = disambiguate_word(sentence, word_for_WSD1)

    print(f"''{word}'' 的词义: {sense_definition1}")

    Sense of ''bank'': a container (usually with a slot in the top) for keeping money
    at home

    # 示例用法 2

    sentence = "The US baseball players usually show great skills with bat."

    word_for_WSD2 = "bat"

    sense_definition2 = disambiguate_word(sentence, word_for_WSD2)

    print(f"''{word}'' 的词义: {sense_definition2}")

    输出:

    Sense of ''bank'': strike with, or as if with a baseball bat

    代码清单 4-9

    使用 NLTK 进行 WSD

    ```


    ### 4.2.10 使用 NLTK 进行关键词提取


    简单来说，关键词提取就是从给定的文本语料中获取最重要的单词或短语。关键词捕捉了内容的精髓。这些关键词可用于其他 NLP 任务，如文本摘要、搜索引擎优化和重要信息检索。让我们从我们自己的技术领域举一个例子。在一份关于机器学习或深度学习模型的技术文档中，关键词可能包括“神经网络”、“深度学习”、“机器学习”、“模型准确率”和“模型准确率”。这些是描述技术文档中核心概念和方法的关键词。


    关键词提取是通过分析给定文本文档中单词的频率和相关性来完成的。诸如词频（TF）和词频-逆文档频率（TF-IDF）之类的标准技术通常用于此目的。这些技术突出了所考虑文本中的重要单词。因此，对文本进行简单的分词并计算词频可以识别出最重要的单词。将其与
    TF-IDF 等高级技术相结合，可以实现更复杂的关键词提取。本章仅使用这些技术（如 NLTK 中所用），但我们将在后续章节中正式讨论它们。代码清单 4-10
    是这一重要的 NLP 数据预处理任务的代码演示。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    # 导入必要的库/资源。

    import nltk

    from nltk.tokenize import word_tokenize

    from nltk.probability import FreqDist

    from nltk.corpus import stopwords

    # 下载所需数据。

    nltk.download(''punkt'')

    nltk.download(''stopwords'')

    def keywords_extractor(text, num_keywords=3):

    # 对输入文本进行分词。

    tokens = word_tokenize(text.lower())  # 转换为小写以保持一致性。

    # 消除停用词和非字母数字标记。

    stop_words = set(stopwords.words(''english''))

    filtered_tokens = [word for word in tokens if word.isalnum() and word not in stop_words]

    # 计算输入单词的频率。

    freq_dist = FreqDist(filtered_tokens)

    # 提取最频繁的关键词。

    keywords = [word for word, _ in freq_dist.most_common(num_keywords)]

    return keywords

    # 示例用法

    sample_text = "The bank is on the city river bank. State Bank is the best bank
    in the city."

    keywords = keywords_extractor(sample_text)

    print(f"提取的关键词: {keywords}")

    输出:

    Extracted keywords: [''bank'', ''city'', ''river'']

    代码清单 4-10

    使用 NLTK 构建关键词提取器

    ```


    本节全面概述了使用 NLTK 进行的一些基本 NLP 数据预处理任务。我们探讨了常见的技术，如分词、停用词移除、词干提取、词形还原和句子分割，以准备文本进行分析。除了这些基本的
    NLP 技术，我们还涵盖了词频分布、同义词和反义词检测、单词相似度计算以及词义消歧。最后，我们研究了关键词提取技术，以从任何输入文本文档中获取关键术语。本节讨论的所有技术对于将原始文本信息转化为可操作的见解以及提高
    NLP 应用的有效性都至关重要。下一节将讨论一些超越基本预处理任务的重要 NLP 技术。


    ## 4.3 超越预处理的 NLP 任务


    本节深入探讨一些新的 NLP 技术。我们从词性标注开始，这是一个用于根据语法角色（可以是名词、动词或形容词）标记给定输入句子中每个单词的过程。接下来，让我们探索命名实体识别，它识别（给定句子中的）专有名称，如人名、组织以及包括城市和国家在内的地点。然后，我们转向一个相对知名的术语——*文本分类*，它将文本分类到预定义的标签中，例如将电子邮件分类为垃圾邮件或合法邮件。接着，我们讨论*情感分析*，它确定词语背后的情感基调；示例包括将关于一部著名电影的推文分类为正面或负面标签。


    最后，我们涵盖一些高级 NLP 应用，如*语言翻译*，它将文本从一种语言转换到另一种语言。下一个过程，*文本摘要*，将长文本文档压缩为精简版本，同时保留关键信息。*词云生成*是词频的可视化展示。它突出显示给定文本文档中最重要的术语。所有这些技术共同允许对输入文本信息进行更深入、更细致的理解。对于每种技术，我们都会提供基于
    NLTK 的动手代码演示，这是本书的主要重点。'
- fmt: '### 4.3.1 Part-of-Speech Tagging


    Part-of-speech, or `POS`, tagging labels each word in a given input sentence with
    its grammatical role, such as noun, verb, adjective, or adverb. `POS` tagging
    helps in a proper understanding of the structure and meaning of an input text
    by analyzing the role of each word within the sentence. For example, in the sentence
    “She reads a book every night,” `POS` tagging assigns “she” as a pronoun, “reads”
    as a verb, “a” as an article, “book” as a noun, and “every” as an adjective. This
    helps us (read computers) recognize the role of each word in the sentence. In
    simple words, by accurately tagging words, `POS` tagging offers insights into
    the syntax and grammar of a given input text document. For example, `POS` tagging
    helps in disambiguating words having diverse meanings based on their role in a
    sentence; `POS` tagging also lays the foundation for more advanced tasks like
    parsing, sentiment analysis, and named entity recognition (see Figure [4-5](#649581_1_En_4_Chapter.xhtml#Fig5)).
    Consider the following two sample sentences.


    ![Flow chart titled "POS Tagging Process with NLTK" showing four steps: "Input
    Text," "Tokenization," "POS Tagging," and "Output Tagged Text." Each step is represented
    by an arrow with icons and descriptions. "Input Text" involves providing a sentence
    for analysis. "Tokenization" divides the sentence into words. "POS Tagging" assigns
    grammatical tags to each word. "Output Tagged Text" displays the tagged sentence.](images/649581_1_En_4_Chapter/649581_1_En_4_Fig5_HTML.jpg)


    **Figure 4-5** POS tagging using NLTK


    - Sample 1: “The light in the room was bright.”

    - Sample 2: “She carried a light bag.”


    In sample 1, “light” serves as a noun (meaning something that illuminates), while
    in sample 2, “light” acts as an adjective (meaning something that is not heavy).
    This difference is made clear to machines (running NLP software) through `POS`
    tagging, which helps them to realize the word’s role in different contexts. `POS`
    tagging is the groundwork for more advanced NLP tasks that include parsing, sentiment
    analysis, and NER. Listing [4-11](#649581_1_En_4_Chapter.xhtml#PC11) is a demo
    that uses `NLTK` to accomplish `POS` tagging.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    # Import libraries.

    import nltk

    from nltk.tokenize import word_tokenize

    # Download required data.

    nltk.download(''punkt'')

    nltk.download(''averaged_perceptron_tagger'')

    def pos_tagging(text):

    # Tokenize the text.

    tokens = word_tokenize(text)

    # Perform POS tagging.

    tagged_words = nltk.pos_tag(tokens)

    return tagged_words

    # Usage demo.

    sentence = "The school girl quickly ran across the park to catch the ice cream
    truck."

    tagged_sentence = pos_tagging(sentence)

    print(f"POS tagging result: {tagged_sentence}")

    OUTPUT:

    POS tagging result: [(''The'', ''DT''), (''school'', ''NN''), (''girl'', ''NN''),
    (''quickly'', ''RB''), (''ran'', ''VBD''), (''across'', ''IN''), (''the'', ''DT''),
    (''park'', ''NN''), (''to'', ''TO''), (''catch'', ''VB''), (''the'', ''DT''),
    (''ice'', ''NN''), (''cream'', ''NN''), (''truck'', ''NN''), (''.'', ''.'')]

    ```


    **Listing 4-11** POS Tagging Using NLTK


    In Listing [4-11](#649581_1_En_4_Chapter.xhtml#PC11) output, notice that several
    `POS` tags (coded as `''DT''`, `''NN''`, etc.) are used. For your convenience,
    Table [4-1](#649581_1_En_4_Chapter.xhtml#Tab1) lists the meaning of each tag used
    in the output.


    **Table 4-1** POS Tags Used in the Output of Code Demo


    | ![Table displaying parts of speech (POS) tags and their meanings. The table
    includes two columns: "POS Tags" and "Meaning." The tags listed are: DT, NN, RB,
    VBD, IN, TO, VB, and a colon (:). Each tag is followed by its description, such
    as "Determiner - Introduces a noun" for DT, and "Noun, Singular or Mass - Represents
    a person, place, thing, or idea" for NN. The table is organized with alternating
    row colors for clarity.](images/649581_1_En_4_Chapter/649581_1_En_4_Figa_HTML.gif)
    |


    ### 4.3.2 Named Entity Recognition with NLTK


    Named entity recognition (NER) is a NLP technique that involves finding and categorizing
    explicit entities or objects within a given input text document (see Figure [4-6](#649581_1_En_4_Chapter.xhtml#Fig6)).
    These named entities can be an individual person, establishments, time or date
    expressions, locations, quantity expressions, money, percentages, and alike. NER
    benefits in extracting meaningful information from unstructured text. For example,
    consider the following sentence.


    ![Flow chart illustrating the Named Entity Recognition process with NLTK. The
    process includes five steps: "Input Text" where the initial text is prepared,
    "Tokenization" dividing text into tokens, "Part-of-Speech Tagging" tagging tokens
    with grammatical roles, "Chunking" grouping tokens into syntactic chunks, and
    "Named Entity Recognition" identifying and classifying entities. The final step
    is "Output Entities" where recognized entities are displayed. Each step is represented
    by a colored circle with icons and descriptions.](images/649581_1_En_4_Chapter/649581_1_En_4_Fig6_HTML.jpg)


    **Figure 4-6** Named entity recognition with NLTK


    For example, let’s consider the sentence: “Dr. Jonson attended the University
    of London and now resides in Liverpool.” Here, the named entities on a high level
    are as follows.


    - Person: “Dr. Johnson”

    - Organization: “University of London”

    - Location: “Liverpool”


    One direct usage of NER is it can be upfront used by different NLP applications
    such as chatbots. Suppose any user asks the chatbot, “Which university did Dr.
    Jonson attend?” It has a ready answer by virtue of extracted entities. This way,
    NER makes it easier to analyze and categorize the content.


    Let’s take one more example as follows.


    Consider the sentence: “Bill Gates founded Microsoft and resides in Washington.”


    In this sentence, the NER can tell us the high-level entities as follows.


    - Person: “Bill Gates”

    - Organization: “Microsoft”

    - Location: “Washington”


    Listing [4-12](#649581_1_En_4_Chapter.xhtml#PC12) is a NER code demo using NLTK.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    import nltk

    from nltk import word_tokenize, pos_tag, ne_chunk

    nltk.download(''punkt'')

    nltk.download(''maxent_ne_chunker'')

    nltk.download(''words'')

    def named_entity_extractor(text):

    # Tokenize.

    tokens = word_tokenize(text)

    # Perform POS tagging first.

    pos_tags = pos_tag(tokens)

    # Apply NER.

    named_entities = ne_chunk(pos_tags)

    return named_entities

    # Sample usage 1.

    sample_sentence1 = "Bill Gates founded Microsoft and resides in Washington."

    ner_result = named_entity_extractor(sample_sentence1)

    print(f"NER result: {ner_result}")

    OUTPUT1:

    NER result: (S

    (PERSON Bill/NNP)

    (PERSON Gates/NNP)

    founded/VBD

    (PERSON Microsoft/NNP)

    and/CC

    resides/NNS

    in/IN

    (GPE Washington/NNP)

    ./.)

    # Sample usage 2.

    sample_sentence2 = "Dr. Jonson attended University of London and now resides in
    Liverpool."

    ner_result = named_entity_extractor(sample_sentence2)

    print(f"NER result: {ner_result}")

    OUTPUT2:

    NER result: (S

    Dr./NNP

    (PERSON Jonson/NNP)

    attended/VBD

    (ORGANIZATION University/NNP)

    of/IN

    (GPE London/NNP)

    and/CC

    now/RB

    resides/VBZ

    in/IN

    (GPE Liverpool/NNP)

    ./.)

    ```


    **Listing 4-12** NER Using NLTK


    You can decode NER codes, including `NNP`, `VBD`, `NNP`, and `VBZ`, on the Penn
    Treebank Project webpage at [`www.ling.upenn.edu/courses/Fall_2003/ling001/penn_treebank_pos.html`](http://www.ling.upenn.edu/courses/Fall_2003/ling001/penn_treebank_pos.html).'
