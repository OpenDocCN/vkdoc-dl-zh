    0       16.99  1.01  Female     No  Sun  Dinner     2\n1       10.34  1.66   \
    \ Male     No  Sun  Dinner     3\n2       21.01  3.50    Male     No  Sun  Dinner\
    \     3\n3       23.68  3.31    Male     No  Sun  Dinner     2\n```\n\nListing\
