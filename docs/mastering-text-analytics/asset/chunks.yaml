- fmt: '### 6.4.8 Integration into Text Processing Pipelines


    Any number of NLP techniques can be combined into a cohesive and convenient workflow
    pipeline to handle complex tasks more efficiently. By modularizing multiple functions,
    such as POS tagging, NER, and polysemy detection, we can create a comprehensive
    system (pipeline) that helps process and analyze text in a structured manner.


    Such modular workflow integration pipelines permit seamless data flow between
    multiple stages of text analysis. Such workflow pipelines ensure that each next
    text processing step is built upon the results of the previous ones. Professional
    NLP application developers often use such pipelines. Next, Listing [6-5](#649581_1_En_6_Chapter.xhtml#PC22)
    demonstrates a simple text processing pipeline in just three steps.


    #### Demonstrating Text Preprocessing Pipelines Using POS Tagging, NER, and Polysemy


    ```

    import nltk

    from nltk.corpus import wordnet as wn

    from nltk.tokenize import word_tokenize

    from nltk import pos_tag, ne_chunk

    # Ensure necessary nltk resources are downloaded.

    nltk.download(''punkt'')

    nltk.download(''averaged_perceptron_tagger'')

    nltk.download(''maxent_ne_chunker'')

    nltk.download(''words'')

    nltk.download(''wordnet'')

    # Function for POS tagging.

    def pos_tagging(tokens):

    return pos_tag(tokens)

    # Function for NER.

    def named_entity_recognition(pos_tags):

    return ne_chunk(pos_tags)

    # Function for polysemy.

    def find_polysemy(word):

    synsets = wn.synsets(word)

    return len(synsets) > 1

    # Function to run the complete text processing pipeline.

    def text_processing_pipeline(text):

    # Step 1: Tokenize the text

    tokens = word_tokenize(text)

    # Step 2: POS tagging

    pos_tags = pos_tagging(tokens)

    print("POS Tagging:")

    for word, tag in pos_tags:

    print(f"{word}: {tag}")

    # Step 3: Named Entity Recognition

    ner_tree = named_entity_recognition(pos_tags)

    print("\nNamed Entity Recognition:")

    for subtree in ner_tree:

    if hasattr(subtree, ''label''):

    print(f"{'' ''.join(c[0] for c in subtree)}: {subtree.label()}")

    # Step 4: Polysemy detection

    print("\nPolysemy Detection:")

    for token in tokens:

    if find_polysemy(token):

    print(f"''{token}'' has multiple meanings.")

    # Sample article text.

    article_text = """

    The lead engineer for the new bridge project made a breakthrough in New York.
    The team is now looking at the potential impacts of their findings on the new
    soil. Meanwhile, Virat Kohli hit his double ton in sports news last night. The
    lead engineer of the project team is highly respected.

    """

    # Run the complete text processing pipeline.

    text_processing_pipeline(article_text)

