    \ between Sentence 3 and Sentence 3: 1.00\n```\n\nInterpretation of the output\
    \ consists of the following.\n\n*   **Interpreting the scores**: Higher scores\
    \ specify more cohesive sentences with a shared vocabulary and similar content.\n\
    *   **Low inter-sentence similarity**: The highest is 0.32. It shows limited shared\
    \ content or vocabulary.\n*   **Minimal overlap**: Low similarity scores of 0.10\
    \ and 0.19 indicate minimal thematic or lexical overlap between the sentences.\n\
    \nA similarity score of 1.00 indicates perfect similarity with itself. Similarity\
    \ scores of 0 indicate no shared vocabulary and similarity of content between\
    \ sentences.\n\n### Temporal Relation Identification (Code Demo)\n\nTemporal relation\
    \ identification is the process of finding time-based relationships between events\
    \ in an input text. For instance, take the sentence “I want to complete this chapter\
    \ before lunch;” the word “before” indicates the time-based connection between\
    \ two events. It describes finishing work earlier than lunch.\n\nOur code demo\
    \ (Listing 7-1) for temporal relation identification would first perform dependency\
    \ parsing to extract events and detect temporal signals, which include words like\
    \ “before,” “after,” “during,” “until,” and “while.” Following this, the classification\
    \ of events is performed using rule-based methods or machine learning models.\
    \ This approach aims to find the sequence and timing of actions in a given input\
    \ text. We utilize `spaCy` to extract events.\n\nOur program follows these five\
    \ steps.\n\n1.  Import libraries and load models.\n2.  Feature extraction from\
    \ sentences.\n3.  Prepare training data.\n4.  Train random forest classifier.\n\
    5.  Predict temporal relations in new sentences.\n\n```python\n# Required Libraries\n\
    import spacy\nfrom sklearn.ensemble import RandomForestClassifier\nimport numpy\
    \ as np\n\n# Load the spaCy model for dependency parsing\nnlp = spacy.load(\"\
    en_core_web_sm\")\n\n# Sample sentences with temporal relations\nsentences = [\n\
    \    \"She finished her work before going to lunch.\",\n    \"He went to the gym\
    \ after work.\",\n    \"They waited until the show started.\",\n    \"The meeting\
    \ was delayed during the storm.\"\n]\n\n# Temporal signals\ntemporal_signals =\
    \ [\"before\", \"after\", \"during\", \"until\", \"while\"]\n\n# Feature extraction\
    \ - identifying events and temporal signals\ndef extract_features(sent):\n   \
    \ doc = nlp(sent)\n    events = []\n    temporal_relation = \"\"\n    for token\
    \ in doc:\n        if token.dep_ == \"ROOT\":  # Event (verb) extraction\n   \
    \         events.append(token.lemma_)\n        if token.text in temporal_signals:\
    \  # Temporal signal detection\n            temporal_relation = token.text\n \
    \   return events, temporal_relation\n\n# Prepare training data - sentences, events,\
    \ and labels (1 for temporal relation present, 0 otherwise)\nX = []\ny = []\n\
    for sentence in sentences:\n    events, signal = extract_features(sentence)\n\
    \    if signal:  # If temporal signal is present, we classify as 1\n        X.append([len(events)])\
    \  # Simple feature: number of events\n        y.append(1)\n    else:\n      \
    \  X.append([0])\n        y.append(0)\n\n# Convert to numpy arrays\nX = np.array(X)\n\
    y = np.array(y)\n\n# Train a Random Forest Classifier\nclf = RandomForestClassifier(n_estimators=10,\
    \ random_state=42)\nclf.fit(X, y)\n\n# Predict on new sentences\nnew_sentences\
    \ = [\"John started his project before the deadline.\",\n                 \"She\
    \ arrived after the party had begun.\"]\n\nfor new_sent in new_sentences:\n  \
    \  events, signal = extract_features(new_sent)\n    prediction = clf.predict([[len(events)]])\n\
    \    print(f\"Sentence: {new_sent}\")\n    print(f\"Detected Temporal Signal:\
    \ {signal}, Prediction: {'Temporal relation' if prediction == 1 else 'No temporal\
    \ relation'}\\n\")\n\n# Sentence: John started his project before the deadline.\n\
    # Detected Temporal Signal: before, Prediction: Temporal relation\n# Sentence:\
    \ She arrived after the party had begun.\n# Detected Temporal Signal: after, Prediction:\
    \ Temporal relation\n```\n\n**Listing 7-1** Temporal Relation Identification\n\
    \nFunction for better understanding.\n\n*   `extract_features(sent)` processes\
    \ each sentence using `spaCy`. The function returns the list of events (verbs)\
    \ and the temporal relation signal (if present).\n*   `doc = nlp(sent)` prepares\
    \ the sentence and puts it into a structured format for analysis.\n*   `for token\
    \ in doc` loops through each word in the sentence.\n*   `token.dep_ == \"ROOT\"\
    ` checks if the word is the main verb (the root action) and stores it.\n*   `if\
    \ token.text in temporal_signals`: If a word is found in the list of temporal\
    \ signals, it is stored as a temporal signal.\n\nConverting words into ML model\
    \ format: Without vectorizing the entire sentence, the logic uses a simple logic\
    \ for converting words into numbers. It counts the number of verbs (events) as\
    \ features in `X` and puts a binary label (1 or 0) for `y` based on the presence\
    \ of temporal signals. This keeps the dataset simple and in numerical format without\
    \ using a vectorizer.\n\nThe output confirms that the code is effectively detecting\
    \ temporal signals present in the input sentences. The model also correctly predicts\
    \ the existence of temporal relations based on these signals."
