    ### 4.2.7 Antonym and Synonym Detection Using NLTK


    NLTK provides tools for these operations through WordNet, which is a lexical database
    to organize words into synsets (groups of synonyms). We leverage WordNet to find
    out antonyms as well. Listing [4-7](#649581_1_En_4_Chapter.xhtml#PC7) demonstrates
    how easily implement NLTK functions to detect both synonyms and antonyms.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    import nltk

    from nltk.corpus import wordnet

    # Ensure that the WordNet data is downloaded

    nltk.download(''wordnet'')

    def get_synonyms_and_antonyms(word):

    synonyms = set()

    antonyms = set()

    # Get synsets for the given word

    for syn in wordnet.synsets(word):

    # Add synonyms

    for lemma in syn.lemmas():

    synonyms.add(lemma.name())

    # Add antonyms

    if lemma.antonyms():

    antonyms.add(lemma.antonyms()[0].name())

    return synonyms, antonyms

