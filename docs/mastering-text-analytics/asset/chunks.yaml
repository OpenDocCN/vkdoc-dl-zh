    # 运行一个浅层神经网络程序来演示 CBOW。

    # 忽略弃用警告，使输出更整洁。

    import warnings

    warnings.filterwarnings("ignore", category=DeprecationWarning)

    # 导入库

    import numpy as np

    import tensorflow as tf

    from tensorflow.keras.models import Sequential  # 序贯模型

    from tensorflow.keras.layers import Dense, Embedding, Flatten  # 神经网络层

    from tensorflow.keras.preprocessing.text import Tokenizer  # 文本预处理分词器

    from tensorflow.keras.preprocessing.sequence import pad_sequences  # 用于填充序列

    # 示例句子语料库（训练语料库）

    sentences = [

    "he is a great scholar",

    "a great scholar writes great papers",

    "the scholar is very great",

    "great ideas come from great minds"

    ]

    # 对句子进行分词

    tokenizer = Tokenizer()

    tokenizer.fit_on_texts(sentences)  # 在句子上拟合分词器

    total_words = len(tokenizer.word_index) + 1  # 语料库中唯一单词总数

    # 初始化 CBOW 输入-输出对的列表

    input_data = []  # 上下文单词

    output_data = []  # 目标单词

    # 定义上下文窗口大小

    window_size = 2

    # 为 CBOW 创建输入-输出对

    for sentence in sentences:

    words = sentence.split()

    # 遍历单词

    for i in range(window_size, len(words) - window_size):

    context = []

    for j in range(i - window_size, i + window_size + 1):

    if j != i:  # 跳过目标单词

    context.append(tokenizer.word_index[words[j]])  # 添加上下文单词索引

    input_data.append(context)  # 将上下文添加到输入数据

    output_data.append(tokenizer.word_index[words[i]])  # 将目标单词添加到输出数据

    # 填充输入序列以确保长度一致

    input_data = pad_sequences(input_data, padding=''post'')

    # 对输出数据进行独热编码，用于分类标签

    output_data = np.array(output_data)

    output_data = np.eye(total_words)[output_data]  # 转换为独热编码

    # 构建 CBOW 模型

    model = Sequential()

    model.add(Embedding(input_dim=total_words, output_dim=10, input_length=window_size
    * 2))  # 嵌入层

    model.add(Flatten())  # 展平为一维

    # 使用 softmax 的输出层进行单词预测

    model.add(Dense(total_words, activation=''softmax''))

    # 使用优化器、损失函数和评估指标编译模型

    model.compile(optimizer=''adam'', loss=''categorical_crossentropy'', metrics=[''accuracy''])

    # 在输入-输出对上训练模型

    model.fit(input_data, output_data, epochs=20, verbose=1)

    # 提取单词"great"的嵌入向量

    # "great"在词汇表中的索引

    great_index = tokenizer.word_index[''great'']

    great_embedding = model.layers[0].get_weights()[0][great_index]  # 提取嵌入向量

    print("Embedding for ''great'':", great_embedding)

