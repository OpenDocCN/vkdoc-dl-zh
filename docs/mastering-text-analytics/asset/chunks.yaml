    #### Topic Modeling (Code Demo)


    Topic modeling techniques use word patterns and groupings to identify the key
    themes or topics in a large collection of texts. This chapter presents a simple
    demo of topic modeling using the TF–IDF technique. (We covered this technique
    in earlier chapters.) Professional topic modeling code is often written using
    advanced techniques like Latent Dirichlet allocation (LDA) or non-negative matrix
    factorization. It leverages Python packages like Gensim or scikit-learn. LDA is
    covered in the upcoming chapters.


    We follow these five simple steps to write our code.


    1.  Prepare documents. Start with a list of text documents you want to analyze.


    2.  Initialize vectorizer. Create a TfidfVectorizer object. A TF–IDF score converts
    the input text documents into numerical data. This process ignores stop words.


    3.  Transform text. Use the vectorizer to convert the input text documents into
    a TF–IDF matrix.


    4.  Get feature names. Extract the list of words that were considered in the TF–IDF
    analysis.


    5.  Display scores. For each document, print the words and their TF–IDF scores.


