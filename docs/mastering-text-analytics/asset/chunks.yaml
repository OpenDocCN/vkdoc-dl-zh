    family of models like GPT-2, GPT-3, and GPT-4 have come up (comparatively) recently
    with the development efforts of OpenAI. These models demonstrate remarkable capabilities
    in NLP tasks, including text generation, summarization, and machine translation.
    These and many other such models (by multiple companies) are popularly known as
    GenAI (generative AI) models.


    Let’s start with a brief paragraph on the evolution of GenAI systems, starting
    with RNNs.'
