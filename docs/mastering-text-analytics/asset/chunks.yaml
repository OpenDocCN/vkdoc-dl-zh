- fmt: "# 1.3 Challenges in NLP\n\nNLP and its allied branches are continually growing\
    \ in huge leaps and bounds with their ability to compute words and text. Given\
    \ that, human language is unbelievably complex, fluid, and inconsistent. All natural\
    \ languages, including English, present serious challenges that NLP researchers\
    \ are continuously trying to overcome. A 2016 research paper presents a relatively\
    \ complete picture of the major challenges. This paper divides these challenges\
    \ into five items as follows.\n\n* **Challenge 1**: It’s listed as the variety\
    \ and complexity in dealing with diverse and nonhomogeneous data sources. The\
    \ text documents (in any text corpus) that we deal with are available in diverse\
    \ forms and formats. This variety can come from many sources, such as documents\
    \ encoded in different formats; the text length can also vary depending on the\
    \ document. Documents can be available in multiple languages, and so on.\n\n*\
    \ **Challenge 2**: NLP algorithms in many business and industrial application\
    \ domains must deal with short and sparse texts. Such pieces of text do not offer\
    \ adequate statistical redundancy, in contrast to bigger, standard corpora that\
    \ NLP researchers employ.\n\n    NLP algorithms are unable to obtain dependable\
    \ statistical evidence from the contents of such text documents. Class imbalance\
    \ in data labels used in supervised NLP techniques can be another problem; for\
    \ example, in card transaction data, fewer than 1% of transactions are fraudulent.\n\
    \n* **Challenge 3**: Evaluating and interpreting the results of NLP algorithms\
    \ can be challenging due to the inherent subjectivity in certain business applications.\
    \ For example, consider sentiment analysis of tweets, text classification, and\
    \ text clustering. Gold-standard datasets used in academic research are rarely\
    \ available in industrial and real-life situations.\n\n    A related challenge\
    \ is the lack of labeled data for training supervised machine learning modes for\
    \ applications such as text categorization problems and sentiment analysis.\n\n\
    * **Challenge 4**: Human performance while dealing with natural languages is close\
    \ to perfection. Given the current state of NLP research, computer programs cannot\
    \ achieve this kind of 100% perfection. These limitations can be a challenge in\
    \ certain situations, like dealing with space and aviation domains. A rising trend\
    \ in many NLP applications, like text classification, is to use active learning\
    \ to improve the NLP process and to get better results.\n\n    By the way, active\
    \ learning is a machine learning method where algorithms interactively query the\
    \ user (or another source) to label new data points with the desired outputs.\
    \ Imagine a computer program is learning to recognize different car models. The\
    \ program might ask for human intervention when it identifies a specific car model\
    \ in the photos, and it is not able to name it. These types of human or external\
    \ agent interventions can improve the overall performance of the program.\n\n\
    * **Challenge 5**: While dealing with real-live and dynamic text data, as dealt\
    \ with in certain business situations. This type of situation arises in applications\
    \ that support decision-making in mission-critical events. In such cases, data\
    \ containing text is required to be processed and get results in a timely and\
    \ efficient way.\n\n    A related challenge can be the rate at which data is generated\
    \ in certain data streams. For example, in certain short messaging applications\
    \ (tweets), around 6000 messages are generated every second on average. Accurately\
    \ processing such high-paced text streams can be extremely challenging, as they\
    \ demand a timely analysis to extract relevant and meaningful information from\
    \ their contents.\n\nThese challenges can be viewed from multiple angles, and\
    \ many more challenges can be identified for the NLP projects. This section serves\
    \ the purpose of an introductory section. You will encounter many other challenges\
    \ and their solutions as we progress through the book.\n\n## 1.4 Applications\
    \ of NLP\n\nNLP applies to both text and speech, and it is equally applicable\
    \ to all human languages—both spoken and written. So, there are numerous applications\
    \ of NLP. Due to space limitations, we can only present a small fraction of them.\
    \ Most of us interact with NLP almost on a daily basis, knowingly or otherwise.\
    \ You might be familiar with applications like `Siri` personal assistant on spell\
    \ checkers in word processors, `iPhone`, `Alexa` by Amazon, and many others. Some\
    \ of these applications process human voice data and help resolve common queries.\
    \ There are many other examples of NLP-powered tools that you may already be familiar\
    \ with. Examples include email spam filters, AI-powered web search engines, machine\
    \ translation of text or speech, automatic document summarization, social media\
    \ sentiment analysis, and so on.\n\nNLP applications are used by many industries.\
    \ It has become an integral part of many industrial processes. NLP is revolutionizing\
    \ the way customers interact with establishments; examples include NLP-driven\
    \ customer service chatbots. Many business processes contain a substantial amount\
    \ of unstructured text data, including social media messages, surveys, and emails.\
    \ NLP-driven techniques can automate such processes with relative ease. The following\
    \ are some examples of how NLP is helping business processes. Figure [1-5](#649581_1_En_1_Chapter.xhtml#Fig5)\
    \ depicts some interesting use cases of NLP.\n\n![Diagram titled \"Language Processing\
    \ Technologies\" showing a circular flow chart divided into eight segments. Each\
    \ segment represents a different technology: Text Summarization, Automated Chatbots,\
    \ Text Classification, Machine Translation, Named Entity Recognition, Natural\
    \ Language Generation, Question Answering, and Word Sense Disambiguation. The\
    \ chart visually organizes these technologies around a central circle.](images/649581_1_En_1_Chapter/649581_1_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5\n\nNLP use cases\n\n### 1.4.1 Banking and Financial Industry (BFSI)\n\
    \nThis industry widely utilizes NLP-driven chatbots, and digital virtual assistants\
    \ are capable of providing instant and personalized services. Many banks and financial\
    \ institutes are using NLP-driven financial fraud detection systems. Such systems\
    \ immediately alert the back office staff when they detect any suspicious activity,\
    \ such as fraudulent high-value credit card transactions. NLP can analyze a vast\
    \ amount of text documents and extract only the relevant information necessary\
    \ for maintaining regulatory compliance in industries such as pharmaceuticals\
    \ and banking. NLP engines can extract insights from documents like financial\
    \ reports, stock market data, and news articles that enable the industry to analyze\
    \ risk and enable better decision-making. Many technologies-driven financial institutions\
    \ are utilizing NLP in swift decision-making (and automation) in areas like loan\
    \ and credit card applications, insurance claim documents, and contracts.\n\n\
    ### 1.4.2 Healthcare\n\nThis industry encounters a large amount of unstructured\
    \ text data, including medical records and other regulatory documents. Many healthcare\
    \ companies are using NLP-driven engines to analyze the vast amount of information\
    \ available in such documents to gain useful insights and to make data-driven\
    \ decisions at all levels of the management hierarchy. The industry is utilizing\
    \ clinical chatbots that assist doctors in diagnosing diseases. NLP analyzes patient\
    \ feedback, online health forum data, and related social media messages to monitor\
    \ patient sentiment and identify emerging health trends in community healthcare\
    \ settings. This type of analysis is sometimes conducted in real-time, which can\
    \ provide timely alerts for public health responses. This kind of swift response\
    \ from the concerned professionals improves patient satisfaction as their concerns\
    \ get addressed promptly."
