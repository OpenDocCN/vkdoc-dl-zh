  trans: '

    ### 使用 LangChain 和 GPT-3.5-Turbo 构建一个友好的聊天助手


    代码清单 8-6 是一个演示代码，涵盖了本节介绍的概念。该程序使用 LangChain 的模板来构建与 `GPT-3.5-Turbo` 的对话。`SystemMessagePromptTemplate`
    将 AI 的角色设定为友好的助手，而 `HumanMessagePromptTemplate` 则动态捕获用户输入。这些模板通过 `ChatPromptTemplate`
    组合成一个完整的提示。AI 处理此提示，并根据用户的查询生成清晰简洁的回复。


    ```

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    from langchain.chat_models import ChatOpenAI

    from langchain.prompts.chat import (

    ChatPromptTemplate,

    HumanMessagePromptTemplate,

    SystemMessagePromptTemplate,

    )

    # 初始化聊天模型

    chat_model = ChatOpenAI(model="gpt-3.5-turbo", temperature=0.7, openai_api_key=api_key)

    # 定义系统消息模板

    system_message = SystemMessagePromptTemplate.from_template(

    "你是一个友好且能清晰简洁回答问题的助手。"

    )

    # 定义人类消息模板

    human_message = HumanMessagePromptTemplate.from_template("{user_input}")

    # 组合成聊天提示模板

    chat_prompt = ChatPromptTemplate.from_messages([system_message, human_message])

    # 示例用户输入

    user_input = "有哪些适合孩子的有趣周末活动？"

    # 格式化提示

    messages = chat_prompt.format_messages(user_input=user_input)

    # 获取模型回复

    response = chat_model(messages)

    # 显示 AI 回复

    print("AI 回复:", response.content)

    AI 回复: 一些适合孩子的有趣周末活动包括去公园、参观动物园或水族馆、野餐、进行自然徒步、去儿童博物馆、在家举办电影或游戏之夜，或者一起做手工或科学项目。

    代码清单 8-6

    使用 LangChain 和 GPT-3.5-Turbo 构建一个友好的聊天助手

    ```


    现在，我们来了解几个新概念。


    - **文档加载器** 用于从 PDF、Word 文档或网页等文件中读取和加载数据。文档加载器将内容重新格式化为 AI 模型可用的形式。例如，我们可以上传一个
    Microsoft Word 文档，并将其用于问答应用。

    - **文档集成加载器** 集成来自多个文档的数据，以创建一个单一的文档。这样，大量信息就可以在一个地方轻松处理。例如，文档集成加载器可以合并文件夹中的多个文件，为
    AI 生成一个单一的知识库。

    - **文档转换器** 处理、清理并可能重新格式化已加载的内容，使其适用于 AI。例如，文档转换器可用于清理原始输入文本、消除多余部分，甚至总结较大的文档。这有助于
    AI 模型更高效地处理数据。


    #### 为 AI 应用准备业务数据


    代码清单 8-7 展示了文档和数据准备功能的演示代码。该程序从一个 PDF 文件和一个文本文件中读取数据。它将数据合并为一个集合以便于处理。它通过将数据分割成更小的块来处理和清理数据。最后，清理后的数据可供
    AI 使用，例如用于回答问题。该程序演示了如何为 AI 使用准备数据。


    - **文档加载器**：使用 `PyPDFLoader` 和 `TextLoader` 读取 PDF 和文本文件。

    - **文档集成**：所有加载的文件被合并到一个 `list` 中，以便于管理。

    - **文档转换器**：数据被清理并分割成 AI 模型可管理的块。


    ```

    # 如果尚未安装，请先安装。

    #!pip install pypdf

    # 导入必要的库

    from langchain.document_loaders import PyPDFLoader  # 用于加载和读取 PDF 文件

    from langchain.document_loaders import TextLoader  # 用于加载和读取文本文件

    from langchain.text_splitter import CharacterTextSplitter  # 用于将文本分割成更小的块

    # 定义一个简单的文本清理函数

    def clean_text(text):

    """移除不必要的字符和多余空格。"""

    import re

    text = re.sub(r"\s+", " ", text)  # 将多个空格替换为单个空格

    text = re.sub(r"[^a-zA-Z0-9.,!? ]", "", text)  # 移除特殊字符

    return text.strip()

    # 步骤 1：加载文档

    pdf_loader = PyPDFLoader("business_report.pdf")  # 替换为您的业务 PDF 文件

    pdf_documents = pdf_loader.load()  # 加载并解析 PDF 内容

    text_loader = TextLoader("meeting_notes.txt")  # 替换为您的业务文本文件

    text_documents = text_loader.load()  # 加载并解析文本文件内容

    # 步骤 2：集成文档

    all_documents = pdf_documents + text_documents

    # 步骤 3：转换文档

    splitter = CharacterTextSplitter(chunk_size=500, chunk_overlap=50)

    transformed_docs = []

    for doc in all_documents:

    chunks = splitter.split_text(doc.page_content)  # 使用 ''page_content'' 而非 ''content''

    cleaned_chunks = [clean_text(chunk) for chunk in chunks]  # 清理每个块

    transformed_docs.extend(cleaned_chunks)

    # 步骤 4：将转换后的数据用于 AI（示例：问答）

    print("转换并清理后的文档块已准备好供 AI 处理：")

    for doc in transformed_docs[:5]:  # 打印几个示例

    print(doc)

    输出：

    转换并清理后的文档块已准备好供 AI 处理：

    Adobe Acrobat PDF 文件 Adobe 可移植文档格式 PDF 是一种通用文件格式，无论创建源文档的应用程序和平台是什么，它都能保留所有字体、格式、颜色和图形。............
    紧凑的 PDF 文件比其源文件更小，并且可以逐页下载，以便在 Web 上快速显示。步骤 2 集成文档 将加载的 PDF 和文本文档合并到一个列表中。

    代码清单 8-7

    为 AI 应用准备业务数据

    ```


    接下来，我们回顾几个更有用的概念，并像往常一样编写一个演示程序来展示它们的用法。


    - **文本嵌入** 将单词或句子转换为数值向量。我们这样做是因为机器（算法）需要数字格式的数据。例如，“car”和“vehicle”可能有相似的嵌入或向量，因为它们是相关的。AI
    模型使用嵌入来比较和分析文本。

    - **向量存储** 保存并对嵌入进行分类，以便 AI 模型可以搜索相关的含义。例如，向量存储保存“car”的嵌入，以查找“truck”或“automobile”等相似术语。向量存储使文本搜索更高效。

    - **向量存储检索器** 从向量存储中发现相似（匹配）的向量。向量存储检索器有助于快速搜索答案（或相关文本）。例如，如果您搜索单词“train”，它会检索“railway”或“locomotive”的嵌入。此过程可加速
    AI 应用中的搜索。接下来，我们看一个使用这些概念的演示程序。

    '
- fmt: '#### Text Embedding Search with Vector Store and Retriever


    The program shown in Listing [8-8](#649581_1_En_8_Chapter.xhtml#PC9) creates text
    embeddings to represent words as numbers. It stores the embeddings in a vector
    store for easy access. Using a vector store retriever, it finds related words
    based on their meanings. This demonstrates how AI can understand and compare text
    efficiently.


    - **Text embeddings**: Words like “car” and “bicycle” are turned into numbers
    using a model.

    - **Vector store**: These numbers are saved for future searches.

    - **Vector store retriever**: Finds the closest matches to a query like “automobile.”

    - **Purpose**: Shows how AI connects related words using embeddings and vector
    search.


    ```

    # Install the library needed to turn text into numbers (embeddings) for the program.

    # !pip install sentence-transformers

    # FAISS (Facebook AI Similarity Search) is a library for efficient similarity
    search and clustering of dense vectors.

    # Install the FAISS library optimized for CPU usage

    # !pip install faiss-cpu

    # Suppress a specific warning when using Hugging Face models in environments that
    don’t support symlinks (like on Windows).

    import os

    os.environ["HF_HUB_DISABLE_SYMLINKS_WARNING"] = "1"

    # Import necessary libraries

    from sentence_transformers import SentenceTransformer  # For creating text embeddings

    from langchain.vectorstores import FAISS  # To create and manage a vector store

    from langchain.schema import Document  # For creating Document objects

    from langchain.embeddings import HuggingFaceEmbeddings  # Use HuggingFace for
    embeddings

    # Step 1: Create a text embedding model using HuggingFaceEmbeddings

    embedding_model = HuggingFaceEmbeddings(model_name="sentence-transformers/all-MiniLM-L6-v2")

    # Sample text data

    texts = ["car", "vehicle", "train", "bicycle", "airplane"]  # Words to embed and
    compare

    # Step 2: Convert text to Document objects

    documents = [Document(page_content=text) for text in texts]  # Wrap texts in Document
    objects

    # Step 3: Create a vector store using HuggingFaceEmbeddings

    vector_store = FAISS.from_documents(documents, embedding_model)  # Create vector
    store with embeddings

    # Step 4: Use a vector store retriever

    query = "automobile"  # Input to find related terms

    query_embedding = embedding_model.embed_documents([query])  # Create embedding
    for the query

    # Step 5: Use the retriever to get relevant documents using `invoke` (not deprecated)

    retriever = vector_store.as_retriever()  # Initialize retriever from the vector
    store

    results = retriever.invoke(query)  # Use invoke to find matches (replaces get_relevant_documents)

    # Step 6: Display results

    print(f"Query: {query}")

    print("Top matches:")

    for result in results:

    print(result.page_content)  # Print the matching document content

