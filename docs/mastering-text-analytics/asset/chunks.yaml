- fmt: '### Creating a String


    A string can be created using single or double quotes, as shown in Listing [3-1](#649581_1_En_3_Chapter.xhtml#PC1).


    ```

    # Creating a demo string using single quotes.

    string_single_quotes = ''This is a single quote string for demo''

    print(string_single_quotes)

    This is a single quote string for demo

    # Creating a demo string using double quotes.

    string_double_quotes = "This is a single quote string for demo"

    print(string_double_quotes)

    This is a double quote string for demo

    Listing 3-1

    String Creation in Python

    ```


    You can create a multiline string (like a paragraph) using triple quotes (`"""`
    or `''''''`). You can try its Python code on your own. It’s simple. If you are
    unable to crack it, refer to the W3Schools website. The following code demonstrations
    show how to create and manipulate text strings. These code snippets can be useful
    in data preprocessing for text analytics (NLP) steps.


    ### Accessing Different Characters in a String


    A string is represented as an array in Python. Figure [3-3](#649581_1_En_3_Chapter.xhtml#Fig3)
    takes a string, `"Python"`, and indexes its characters with numbers. The index
    position `0` represents the first character of the string, `P`. The last character,
