    # 2.4 从 HTML 中提取数据


    大量结构化和非结构化的文本数据以 HTML 文档的形式存在。网站、博客和在线文章通常采用 HTML 格式。在这种情况下，HTML 文档成为提取真实世界语言用法和模式的重要主要来源之一。解析
    HTML 文本可以访问大量多样化的文本数据，这对于训练 NLP 模型至关重要。


    HTML 文档的结构化特性使得提取适当信息相对容易。HTML 文档固有的元数据，例如标签和属性（如 `<title>`、`<h1>` 和 `<p>`），为文本提供了额外的背景信息。HTML
    文档通常包含超链接，这有助于跨网络进行探索。清单 2-4 首先创建一个用于演示的示例 HTML 文件，然后我们提供注释良好的代码来提取示例 HTML 文档的各种元素。图
    2-2 描述了从 HTML 文档中提取数据的过程。


    ![流程图展示了从 HTML 文档中提取文本数据的过程。中心节点标记为“HTML 文档”，连接到五种方法：“按标签名称提取”（绿色）用于识别标签并解析内容，“按类名提取”（紫色）用于识别类并过滤内容，“按文本内容提取”（粉色）用于文本分析和内容提取，“按
    ID 提取”（黄色）用于识别 ID 并访问内容，以及“提取 HREF”（红色）用于链接和 URL 提取。每种方法都通过图标和颜色编码在视觉上加以区分。](img/649581_1_En_2_Fig2_HTML.jpg)


