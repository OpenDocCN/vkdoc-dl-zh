  trans: '

    # 3.1 为何要阅读本章


    首先，我们来明确一下最高层级的目标。简单来说，我们将学习一项文本分析/自然语言处理（NLP）领域全新的实践技能。这项技能目前在全球就业市场上需求旺盛，因为它对所有公司都有用，无论其业务领域如何。如果我们只学习理论方面或进行概念性研究，就无法获得我们想要的
    NLP 实践技能。


    我们需要工具和技术来分析大多数机构中大量存在的海量文本数据。我们使用 NLP 专用库和其他 Python 库作为工具，从大量非结构化文本数据中获取迫切需要的可操作洞察。这些
    Python 库广泛使用相关的统计模型来分析和评估结果。为了获得实践技能，我们必须熟悉这些 Python 库和数学算法。这一切都归结为使用 Python 进行编码，而如果你不亲自动手实践，就无法掌握它。所以，准备好迎接本章接下来一些有趣的操作吧。


    # 3.2 用于语言处理的 Python


    在过去几年中，Python 已成为 NLP 的关键语言，这得益于其易用性、广泛的 NLP 专用库以及庞大的全球用户社区。它的语法简单易学易用。所有这些，加上
    Python 代码易于阅读的特点，使其成为新手和经验丰富的程序员的绝佳选择。Python 可以高效地处理大量文本数据。有许多实例表明 Python 被用于文本分类、情感分析、语言翻译等
    NLP 任务。Python 提供了足够的灵活性，可以与各种其他机器学习模型集成，从而进一步提高其在 NLP 任务中的实用性。


    NLP 社区使用多个 Python 库，这些库因其强大的功能和易用性而成为 NLP 任务的支柱。`NLTK`（自然语言工具包）就是我们经常使用的一个这样的
    Python 库。它为各种 NLP 任务（如分词、词干提取和词性标注）提供了易于使用的工具。`spaCy` 是另一个用于 NLP 应用的 Python 库，以其速度和效率而闻名。`spaCy`
    在工业级 NLP 应用中占有一席之地。它支持深度学习工作流。`TextBlob` 是另一个被初学者使用的库，因为它为常见的 NLP 任务提供了一个简单的 API。


    其他 Python 库，如 `Genism`，专门用于主题建模和文档相似度。`Hugging Face` 以其最先进的模型（如 Transformer 模型）而闻名，这些模型广泛用于高级
    NLP 项目，包括生成式 AI。本段中使用的许多术语对你来说可能是新的。我们将在本章或后续章节的适当位置介绍所有内容。


    ## 3.2.1 文本分析项目生命周期（通用 NLP 流水线）


    在一个典型的机器学习（ML）项目中，有数据收集、预处理、特征提取、模型训练、评估和部署等步骤。这些步骤按顺序一个接一个地执行时，通常被称为 ML 流水线。在
    ML 项目中，数据通常是结构化的，由数值数据和非数值（分类）数据组合而成。此类数据通常需要预处理步骤，如归一化、缩放和转换。数据准备好后，就可以在此处理过的数据上训练
    ML 模型。然后使用准确率或 F1 分数等指标评估模型结果。最后一步是将模型部署到生产环境中进行实际预测。ML 流水线需要持续的监控和维护。流水线中的许多步骤是循环过程的一部分。图
    3-1 描述了一个通用的 ML 流水线。


    ![流程图标题为“机器学习项目流水线”，展示了机器学习项目中的顺序步骤。该过程从“问题定义”开始，依次经过“数据收集”、“数据清洗”、“探索性数据分析”、“特征工程”、“模型训练”和“超参数调优”，最后以“部署与监控”结束。每个步骤由一个彩色菱形表示，箭头指示从一个阶段到下一个阶段的流程。](img/649581_1_En_3_Fig1_HTML.jpg)


    **图 3-1** 一个通用的 ML 项目流水线（步骤）


    另一方面，NLP 项目流水线处理的是文本数据。NLP 流水线也涉及数据预处理步骤，例如分词、词干提取、词形还原和停用词移除。我们将在后续的适当位置逐一学习这些步骤。在这些独特的数据预处理步骤之后，文本被转换为数值表示，这与
    ML 流水线类似。然而，NLP 流水线中使用的技术是不同的。它们通常是词频-逆文档频率、词嵌入或 Transformer 模型。你将在本书后面学习所有这些内容。处理过的文本数据（转换为数值表示）随后被适当的机器学习或深度学习模型用于训练。一个训练有素的模型可以准确地执行各种
    NLP 任务，例如文本分类、情感分析或命名实体识别。


    到现在，你可能已经注意到，在 ML 和 NLP 模型的训练和部署中，许多步骤是相似的。NLP 流水线通常包括几个处理文本数据的步骤。在这两个过程中，对训练好的模型（在生产环境中）的操作和维护是相似的，并且涉及许多循环重复执行的过程。我们建议你参考标准的机器学习运维（MLOps）书籍，以获取有关生产环境中模型维护和操作的更多详细信息。图
    3-2 描述了一个通用的 NLP 流水线。你可以比较图 3-2 和图 3-1，以注意两种情况下流水线的异同。


    ![流程图说明了 NLP 流水线过程。它从左侧的“原始文本数据”开始，随后是顺序阶段：“问题定义”、“数据收集”、“文本清洗”、“EDA”（探索性数据分析）、“特征工程”和“模型训练”。每个阶段由一个彩色菱形表示，箭头指示数据流向。该过程最终在右侧形成一个“改进的
    NLP 模型”。](img/649581_1_En_3_Fig2_HTML.jpg)


    **图 3-2** 一个通用的 NLP 项目流水线（步骤）


    许多术语，尤其是 NLP 流水线中的术语，现在对你来说可能听起来很陌生。然而，本章及后续章节将重点解释这些术语，并提供创建和处理此类流水线的实践技能。


    接下来，让我们从基本的字符串处理开始，然后进入本章相对高级的主题。


    ## 3.2.2 Python 中的字符串处理


    `String` 是 Python 语言中的一种数据结构类型。它表示一个字符序列。字符串是 Python 中的一种不可变数据类型。一旦创建了字符串，就无法修改。Python
    字符串在大多数文本应用程序中被广泛使用。字符串用于存储和操作文本数据，这些数据可以是人名、本地地址、城市名称以及其他可以表示为文本的数据。学习高效地处理字符串操作是任何
    NLP 任务的基础。以下示例使用 Python 代码演示了基本的字符串操作。W3Schools 网站提供了极好的资源来学习和练习使用 Python 进行字符串操作。

