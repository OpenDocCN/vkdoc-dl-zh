  trans: '

    # 2.3 从 Word 文件中提取数据


    Microsoft Word 文档在专业、研究和学术环境中应用广泛。Word 文件通常包含文本格式的宝贵数据，例如商业报告、文学文章和研究论文。这些数据可用于多种
    NLP 项目，包括信息提取、情感分析和文本分类。处理 Word 文件可以获得丰富、结构化和非结构化的文本内容，有助于构建全面的 NLP 模型。此类模型可用于自动化和简化业务流程，从而实现快速洞察和数据驱动的决策。


    这种格式的信息可以与来自数据库、网站和其他文本格式（或来源）的数据相结合。来自不同来源的数据集成可以增强 NLP 应用的有效性和功能性。


    清单 2-3 演示了如何创建一个示例文件。我们将使用此文件来提取数据。我们将使用 `python-docx` 库来写入和读取 Word 文件。


    ## 2.3.1 从 MS Word 文件中提取数据


    创建一个示例文件。


    ```

    # 如果尚未安装 python-docx，请先安装。

    # 由于篇幅限制，此处不包含此代码的输出。

    !pip install python-docx

    ```


    以下脚本创建一个示例 Word 演示文档，其中包含标题、多个段落、项目符号列表和一个表格。


    ```

    from docx import Document

    from docx.shared import Pt

    # 创建一个新的空白文档。

    doc = Document()

    # 添加一个标题

    doc.add_heading(''用于 NLP 分析的示例文档'', level=1)

    # 添加几个段落。

    doc.add_paragraph(''此示例 Word 演示文档包含多个段落。'')

    doc.add_paragraph(''这是另一个包含更多文本的段落。'')

    # 添加几个项目符号。

    doc.add_paragraph(''示例项目符号 1'', style=''List Bullet'')

    doc.add_paragraph(''示例项目符号 2'', style=''List Bullet'')

    doc.add_paragraph(''示例项目符号 3'', style=''List Bullet'')

    # 添加一个演示表格。

    table = doc.add_table(rows=3, cols=2)

    table.style = ''Table Grid''

    # 添加标题行

    hdr_cells = table.rows[0].cells

    hdr_cells[0].text = ''标题示例 1''

    hdr_cells[1].text = ''标题示例 2''

    # 添加几行数据

    row_cells = table.rows[1].cells

    row_cells[0].text = ''示例行 1''

    row_cells[1].text = ''数据点 1''

