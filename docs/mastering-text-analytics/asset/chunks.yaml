    the focus of the LLM parsing process is to break inputs and outputs (to and from
    LLMs) into structured formats, customization focuses on adapting inputs and outputs
    to meet precise goals. Customization of LLM inputs involves shaping prompts for
    clarity, relevance, and context. This involves adding comprehensive instructions
    and utilizing examples to guide the model, or it can involve formatting text for
    improved understanding. For example, while processing a user query to LLM for
    summarizing a piece of text, the customization process can include key points,
    or it can specify word limits in the prompt itself to ensure more accurate results.
    Customization goes much beyond parsing, which is discussed in the previous section.
    The precise goal of customizing inputs and outputs for LLMs is to craft them to
    guide the model efficiently toward the anticipated result with the desired information
    in the desired format. For instance, LLM-driven chatbots may need trimming of
    output to fit the designed character limits. The customization process, in this
    case, may even rephrase the output to maintain the desired consistency in tone.
    Similarly, applications like report generators often require precise formatting
    of outputs according to structured templates. The input/output customization process
    makes sure that the LLM responses are usable and aligned with the planned purpose.


    Customization and handling often require iterative strategies, where inputs are
    tested and refined based on the output quality. Feedback loops are created to
    find gaps and improve performance. Thoughtful customization of inputs and outputs
    for LLMs can help maximize efficiency for tasks such as text summarization, social
    media sentiment analysis, and customer service. Customization is a comprehensive
    approach that brings accuracy, relevance, and efficiency in leveraging LLMs for
    business and other real-life applications.


    #### Input and Output Customization with LangChain and OpenAI


    The following describes how the Listing [8-13](#649581_1_En_8_Chapter.xhtml#PC17)
    program works.


    1.  **Imports required libraries.** Loads necessary libraries from LangChain to
    interact with OpenAI’s model.


    2.  **Defines a PromptTemplate.** Sets up a prompt template to instruct the model
    on how to summarize a given topic in a specified word limit.


    3.  **Sets up API key.** Prepares the API key for OpenAI access.


    4.  **Creates a LLM (language model) instance.** Initializes OpenAI’s GPT-3.5-Turbo
    model with specific settings like temperature and max tokens.


    5.  **Inputs data.** Defines the `topic` and `word_limit` for the summary.


    6.  **Formats the prompt.** Uses the `PromptTemplate` to insert the `topic` and
    `word_limit` into the prompt.


    7.  **Generates a response.** Sends the formatted prompt to the GPT-3.5 model
    and receives a response.


    8.  **Refines the output.** Processes the model’s response by breaking it down
    into key points for improved readability.


    9.  **Displays the output.** Prints both the formatted input and the refined output
    in bullet points.'
