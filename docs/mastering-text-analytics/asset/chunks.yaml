    count_vectorizer.fit(demo_text2) # Fit the demo text

    print(count_vectorizer.vocabulary_) # Print results

    {''the'': 5, ''sky'': 4, ''is'': 3, ''blue'': 0, ''wish'': 7, ''to'': 6, ''fly'':
    1, ''in'': 2}

    # encode document

    demo_vector = count_vectorizer.transform(demo_text2)

    print(demo_vector.shape)

    print(demo_vector.toarray())

    (1, 8)

    [[2 1 1 1 2 2 1 1]]

    ```


    We are simply counting the repetition of words and putting it in the vector. The
    words “the”, “sky”, and “blue” have a frequency of two each in the `demo_text2`.
    So, these three words are represented by two each in the demo vector `[[2 1 1
    1 2 2 1 1]]`.'
