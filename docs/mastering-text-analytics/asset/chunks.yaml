- fmt: '### 10.3.2 AI Initiatives of Fujitsu


    On October 23, 2024, Fujitsu launched the `Fujitsu Kozuchi AI Agent`, a proprietary
    cloud-based AI service that can engage in numerous AI services by working independently
    and in collaboration with humans.


    `Kozuchi`, in Japanese, means “magic hammer,” referring to a legendary Japanese
    hammer that can create anything wished for. `Kozuchi AI Agent` represents AI capabilities,
    which Fujitsu claims can fulfill any business requirement. The following seven
    AI services are offered by the `Kozuchi AI Agent` (see Figure [10-1](#649581_1_En_10_Chapter.xhtml#Fig1)).


    ![Flow chart illustrating the integration of various AI technologies into the
    Fujitsu Kozuchi AI Agent. The chart includes six components: Generative AI, AutoML,
    Predictive Analytics, Text Processing, Vision Processing, and AI Trust. Each component
    is represented by an icon and connected by arrows converging into the AI Agent,
    symbolizing the combination of these technologies.](images/649581_1_En_10_Chapter/649581_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Fujitsu Kozuchi AI Agent (this pictorial representation has been created by the
    authors using napkin.ai)


    - **Fujitsu Kozuchi Generative AI**: Like other GenAI tools, it enhances human
    productivity and creativity by acting as a bridge between humans and computers
    for natural language and unstructured data.

    - **Fujitsu Kozuchi AutoML**: This service helps generate high-precision machine
    learning models in a very short span of time. `Fujitsu Kozuchi AutoML` helps automatically
    generate AI functions for customer businesses when provided with business issues
    in natural language. It has the ability to convert business issues into the most
    suitable mathematical models. The mathematical model is then converted into an
    appropriate AI function for the customer’s business.

    - **Fujitsu Kozuchi Predictive Analytics**: This service creates high-accuracy
    demand forecasting models using available data to cater to the changing requirements
    of customers for various products and aligning it automatically without the need
    for any human being to intervene.

    - **Fujitsu Kozuchi for Text**: This service helps analyze text after it has been
    digitized using NLP techniques. Later in this chapter, we focus on `Fujitsu Kozuchi
    for Text`, along with other services of the `Fujitsu Kozuchi AI Agent`, to understand
    how the AI Agent performs semantic analysis that goes beyond text analytics.

    - **Fujitsu Kozuchi for Vision**: This service converts visual elements through
    a list of 100 pre-trained basic actin models and behavior recognition rules to
    recognize complex human behaviors.

    - **Fujitsu Kozuchi AI Trust**: This service allows verification of AI fairness,
    quality, and security with just a few clicks from a web browser. It also provides
    the much-needed service of quality and ethical standards met by the AI tools.
    It improves the AI literacy of the users, helping them assess accuracy, fairness,
    copyright compliance, data management, and misuse prevention.

    - **Fujitsu Kozuchi XAI**: This service deciphers the causal relationships behind
    AI-generated results. Through comprehensive computation of huge datasets, `Kozuchi
    Explainable AI` ensures that no meaningful causal relationships are missed, thereby
    delivering reliable insights every time.


    ### 10.3.3 Fujitsu Kozuchi for Semantic Analysis


    `Fujitsu Kozuchi` is a proprietary cloud-based AI platform offering wide-ranging
    solutions across seven AI domains to help business transformation. This section
    examines one critical analytical function of the platform: semantic analysis capabilities.
    Semantic analysis capabilities enable organizations to derive meaningful insights
    from unstructured textual data.


    `Fujitsu Kozuchi`’s approach to semantic analysis goes beyond basic text processing
    by integrating with other services in the `Kozuchi` platform, thereby creating
    an all-inclusive ecosystem that can handle large volumes of unstructured text
    data. This service demonstrates Fujitsu’s remarkable advancement from interactive
    to proactive AI capabilities, excelling at transforming abstract conversational
    concepts into actionable tasks. It integrates the proprietary processing logic
    of the `Kozuchi AI Agent` with advanced AI models, including `Takane`, a large
    language model for enterprises that offers the highest Japanese language proficiency
    in the world,[⁸](#649581_1_En_10_Chapter.xhtml#Sec24) `Fujitsu AutoML`, and also
    leverages Microsoft’s `Semantic Kernel`. This open-source development kit enables
    users to easily build AI agents and integrate the latest AI models into their
    `C#`, `Python`, or `Java` codebase.


    `Fujitsu Kozuchi` enhances business decision-making and boosts productivity. This
    integration helps `Kozuchi` to execute complex semantic interpretations of natural
    language inputs, beyond the literal content to the contextual meaning, purpose,
    and relationships between concepts expressed in text, all of which are achieved
    without any human input.


    To understand how the `Kozuchi AI Agent` works, let us look at the following example,
    where the `Kozuchi AI Agent` is attending a meeting with some humans and listening
    to the conversations between humans. It proactively gives its suggestions.


    #### 10.3.3.1 Exhibit X.1: Kozuchi AI Agent Attending a Meeting: An Example


    - **Miriam Graham**: *“Today, I’d like to review business trends. Recently, I’ve
    been hearing that deals in Asia are not going well.”*

    - **Alex Wilber**: *“No, I think Asia is fine. I’ve heard we lost a few small
    deals, but I don’t think it’s affecting the big picture.”*

    - **Miriam Graham**: *“I know Dan, the head of Asia, has said as much, but apparently,
    the numbers show otherwise.”*

    - **Alex Wilber**: *“Oh, you’re right. The numbers are different. Maybe the large
    deal we recently secured hasn’t been accounted for yet. Let me check with Dan
    right away.”*


    While the two executives were talking, `Kozuchi AI Agent`, who was unobtrusively
    present in the meeting, came up with additional data. It analyzed available data
    and proactively directed the team to perform sales analysis in the Asia region.
    The result presented clear, logical reasons for discrepancy across the two divergent
    views. The AI agent comes up with the following.


    - **Fujitsu Kozuchi AI Agent**: *“Let’s get a more accurate understanding of the
    current situation by checking the actual number of business negotiations and changes
    in sales figures in the Asia region. The graphical representation showed that
    the sales revenue in the Asia region became half in 2024 as compared to 2023.”*


    The AI Agent does not stop at this. Instead, it conducts an in-depth analysis
    to examine what is happening in other regions. For example, it provides a graphical
    representation of sales revenue for the same quarter of both the current and previous
    financial years for all other regions in which the company operates. This way,
    much better-informed decisions can be made during the meeting. Depending on the
    discussions, `Kozuchi` may also assist with other data to determine the reason
    behind this revenue decline. `Kozuchi` handles all these tasks autonomously, supporting
    the uninterrupted flow of the meeting and contributing to increased productivity.'
