    recommendation engines, and news aggregators. In all these applications, delivering
    concise information is critical. Summarization is challenged to accurately identify
    the most relevant content to keep the text summary contextually appropriate. Listing
    [4-15](#649581_1_En_4_Chapter.xhtml#PC16) is a code demonstration of automatic
    text summarization.


    ```

    # Install sumy if you have not done already.

    !pip install sumy

    # Import the required libraries.

    from sumy.parsers.plaintext import PlaintextParser

    from sumy.nlp.tokenizers import Tokenizer

    from sumy.summarizers.lsa import LsaSummarizer

    def text_summarizer(text, sentence_count=2):

    """

    Summarize the input text using the LSA algorithm.

    Args:

    text (str): The input text.

    sentence_count (int): The count of sentences to include in the final summary.

    Returns:

    str: The summarized text.

    """

    parser = PlaintextParser.from_string(text, Tokenizer("english"))

    summarizer = LsaSummarizer()

    summary = summarizer(parser.document, sentence_count)

    return '' ''.join(str(sentence) for sentence in summary)

    def main():

    # Sample text

    sample_text = """ Text summarization is predominantly useful in quickly understanding
    the main points of long articles, reports, or documents without reading them in
    completely. Text summarization is a key skill in the fields like journalism, legal
    work, and academic research. Summarization has increasingly become central in
    automated systems like chatbots, recommendation engines, and news aggregators.
    In all these applications delivering concise information is critical. Summarization
    challenged to accurately identifying the most relevant content to keep the text
    summary

    contextually appropriate. Below is code demonstration of automatic text summarization.

    """

    # Generate the summary

    summary = text_summarizer(sample_text)

    print("Original Text:")

    print(sample_text)

    print("\nSummary:")

    print(summary)

    if __name__ == "__main__":

    main()

