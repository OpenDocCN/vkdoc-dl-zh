- fmt: '### 9.1.2 Chains: Construct Sequences of Calls for Specific Tasks


    The `LLM Chains` framework offers automation and optimization of workflows by
    connecting several AI-driven steps to perform complex tasks. In simple words,
    `LLM Chains` are used to connect different steps when using LLMs. `LLM Chains`
    help developers by breaking down big and complex tasks into more maintainable,
    smaller parts; this makes AI more accurate and useful in business applications,
    such as customer-facing chatbots, search engines, and work automation tools. `LangChain`
    helps developers integrate LLMs competently with any structured logic—be it technical
    or business applications. Modular applications, as in `LLM Chains`, enable better
    control and customization in applications by streamlining workflows.


    AI application developers utilize `LLM Chains` to empower step-wise reasoning,
    prompt engineering, and contextual memory across interactions, thereby creating
    more reliable and adaptive AI solutions. Businesses leverage `LLM Chains` for
    developing personalized recommendations, predictive analytics, and fraud detection.
    With its fast-growing adoption, `LLM Chains` is poised to transform multiple domains,
    including finance, healthcare, and e-commerce, with scalable AI-driven solutions.
    Figure [9-1](#649581_1_En_9_Chapter.xhtml#Fig1) is an easy-to-understand schematic
    of how `LLM Chains` work in the context of business and scientific applications.


    ![Flow chart titled "LLM Chain Process" illustrating four stages: Input, Prompt
    Template, LLM, and Output. Each stage is represented by an icon and a description.
    "Input" shows initial data or query provision. "Prompt Template" structures the
    input into a prompt. "LLM" indicates the language model processing the prompt.
    "Output" represents the generation of the final response or result.](images/649581_1_En_9_Chapter/649581_1_En_9_Fig1_HTML.jpg)


    **Figure 9-1** Schematic of LLM Chains


    Next, we examine code demos that use `LLM Chains` for the development of useful
    applications for businesses.


    #### Business Document Processing: Summarization, Keyword Extraction, and Sentiment
    Analysis


    This section focuses on processing different types of business documents to help
    understand their content quickly. It uses advanced tools to summarize important
    information from files like PDFs and spreadsheets. It also finds key words that
    highlight important topics for business decisions. Additionally, it analyzes customer
    feedback to understand their feelings and satisfaction levels. These automated
    methods make handling large amounts of business data faster and more accurate.
    The code demo of Business Document Processing is given in Listing [9-3](#649581_1_En_9_Chapter.xhtml#PC3).


    - Loads and processes diverse business documents (PDF, HTML, CSV) for analysis.

    - Summarizes document content for quick business insights using GPT-3.5.

    - Extracts key business-relevant keywords to aid decision-making.

    - Performs sentiment analysis on customer feedback to gauge satisfaction.

    - Provides efficient business document analysis through automated text processing.


    ```

    # Read the open ai api key from your text file

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    import os

    from langchain.document_loaders import PyPDFLoader, UnstructuredHTMLLoader, CSVLoader

    from langchain.text_splitter import CharacterTextSplitter

    from langchain_openai import ChatOpenAI  # Correct import for OpenAI Chat model

    from langchain.prompts import PromptTemplate

    from langchain.chains import LLMChain

    # Load and parse documents

    pdf_loader = PyPDFLoader("sample_pdf.pdf")

    pdf_docs = pdf_loader.load()

    html_loader = UnstructuredHTMLLoader("sample_html.html")

    html_docs = html_loader.load()

    csv_loader = CSVLoader("sample_csv.csv")

    csv_docs = csv_loader.load()

    # Text Splitting for Processing

    splitter = CharacterTextSplitter(chunk_size=500, chunk_overlap=50)

    pdf_chunks = splitter.split_documents(pdf_docs)

    html_chunks = splitter.split_documents(html_docs)

    csv_chunks = splitter.split_documents(csv_docs)

    # Initialize the ChatOpenAI model with API key

    llm = ChatOpenAI(model="gpt-3.5-turbo", openai_api_key=api_key)

    # Summarization using OpenAI (Using LLMChain directly)

    summary_prompt = PromptTemplate(

    input_variables=["text"],

    template="Summarize the following business document:\n{text}"

    )

    summary_chain = LLMChain(llm=llm, prompt=summary_prompt)

    # Using .invoke() instead of .run()

    pdf_summary = summary_chain.invoke({"text": pdf_chunks[0].page_content})

    html_summary = summary_chain.invoke({"text": html_chunks[0].page_content})

    csv_summary = summary_chain.invoke({"text": csv_chunks[0].page_content})

    print("\n--- PDF Summary ---\n", pdf_summary)

    print("\n--- HTML Summary ---\n", html_summary)

    print("\n--- CSV Summary ---\n", csv_summary)

    # Keyword Extraction using OpenAI (Using LLMChain directly)

    keyword_prompt = PromptTemplate(

    input_variables=["text"],

    template="Extract the top 5 keywords from the following document:\n{text}"

    )

    keyword_chain = LLMChain(llm=llm, prompt=keyword_prompt)

    # Using .invoke() instead of .run()

    pdf_keywords = keyword_chain.invoke({"text": pdf_chunks[0].page_content})

    html_keywords = keyword_chain.invoke({"text": html_chunks[0].page_content})

    csv_keywords = keyword_chain.invoke({"text": csv_chunks[0].page_content})

    print("\n--- PDF Keywords ---\n", pdf_keywords)

    print("\n--- HTML Keywords ---\n", html_keywords)

    print("\n--- CSV Keywords ---\n", csv_keywords)

    # Sentiment Analysis for Business Insights (Using LLMChain directly)

    sentiment_prompt = PromptTemplate(

    input_variables=["text"],

    template="Analyze the sentiment of the following customer feedback and rate as
    Positive, Neutral, or Negative:\n{text}"

    )

    sentiment_chain = LLMChain(llm=llm, prompt=sentiment_prompt)

    csv_sentiment = sentiment_chain.invoke({"text": csv_chunks[0].page_content})

    # Print the sentiment analysis output

    print("\n--- CSV Sentiment Analysis ---\n", csv_sentiment[''text''])

