    #### Converting Emoticons to Words


    We can map emoticons to their corresponding descriptions, like "smiley face" or
    "grinning face." This conversion helps preserve the sentiments conveyed by emoticons
    in the form of simple text words, which are easier to analyze compared to plain
    emoticons. It helps improve the accuracy and effectiveness of NLP tasks.


    ```

    # Map the common emoticons to words.

    emoticon_to_word = {

    '':)'': ''smiley face'',

    '':D'': ''grinning face'',

    '':P'': ''playful face'',

    '':-)'': ''smiley face'',

    '':-D'': ''grinning face'',

    '':-P'': ''playful face''

    }

    # Function to replace emoticons with words.

    def emoticons_to_word_converter(text):

    for emoticon, word in emoticon_to_word.items():

    text = text.replace(emoticon, word)

    return text

    # Sample sentence.

    sample_sentence = "Hello there! :) How are you? :P I hope you''re doing well.
    :D"

    # Convert emoticons to words.

    converted_sentence = emoticons_to_word_converter(sample_sentence)

    # Print the output.

    print("Original Sentence:", sample_sentence)

    print("Converted Sentence:", converted_sentence)

    Original Sentence: Hello there! :) How are you? :P I hope you''re doing well.
    :D

    Converted Sentence: Hello there! smiley face How are you? playful face I hope
    you''re doing well. grinning face

    # Apply the function directly on combined_df[''text_lower_case'']

    # Its likely to be useful in increasing the accuracy of our analysis.

    # Apply the function to the ''text_lower_case'' column

    combined_df[''text_lower_case''] = combined_df[''text_lower_case''].apply(convert_emoticons_to_words)

