    ### 基于规则的分词


    基于规则的分词在需要保留精确结构或格式的文本预处理任务中特别有用。正则表达式可用于微调，以处理各种语言细微差别或特定的文本格式。以下使用了 NLTK 中的
    `RegexpTokenizer` 以及所需的正则表达式模式。


    ```

    from nltk.tokenize import RegexpTokenizer

    from typing import List

    def rule_based_tokenizer(text: str) -> List[str]:

    """

    根据正则表达式对输入文本进行分词。

    参数:


    text : str

    输入字符串。

    返回:


    List[str]

    分词后的列表。

    """

    # 为特定任务定义正则表达式。

    # 规则 1：匹配缩写，如 "U.K."、"Dr."

    # 规则 2：匹配包含撇号的单词，如 "she''s"、"haven''t"

    # 规则 3：单独匹配标点符号。

    pattern = r''''''(?x)               # 设置标志以允许详细正则表达式

    (?:[A-Za-z]\.)+    # 缩写，如 U.K.

    | \w+(?:''\w+)?       # 带撇号的单词

    | [^\w\s]            # 单独的标点符号

    ''''''

    # 创建一个 RegexpTokenizer。

    tokenizer = RegexpTokenizer(pattern)

    # 进行分词。

    tokens = tokenizer.tokenize(text)

    return tokens

    # 使用示例

    if __name__ == "__main__":

    sample_text = """Dr. John''s a rocket engineer in the U.K.

    U.A.E. govt. has awarded him many awards."""

    tokens = rule_based_tokenizer(sample_text)

    print("Tokens:", tokens)

    OUTPUT:

    Tokens: [''Dr'', ''.'', "John''s", ''a'', ''rocket'', ''engineer'', ''in'', ''the'',
    ''U.K.'', ''U.A.E.'', ''govt'', ''.'', ''has'', ''awarded'', ''him'', ''many'',
    ''awards'', ''.'']

    ```


    - 请注意，在 `''Dr''`、`''U.K.''` 和 `''U.A.E.''` 中，分词器保留了常见的缩写和首字母缩略词，并将它们视为单个词元。

    - `''govt''`：这被视为单个词元，保留了书面英语中常用的缩写。

    - 对于 `"John''s"`，分词器保留了撇号及其后的 `''s''` 作为词元的一部分。


    ### 基于标点符号的分词器


    此分词器在保留标点符号的同时，根据空格和标点符号对输入文本进行分割。基于标点符号的分词克服了问题并提供了有意义的词元。基于标点符号的分词解决了简单按空格分割输入文本的问题。以下是一个简单的代码演示。


    ```

    #import wordpunct_tokenize from nltk.

    from nltk.tokenize import wordpunct_tokenize

    text = "Mr.Johnson owns three houses in New York on: 22nd street, downton,and
    42nd street."

    tokens = wordpunct_tokenize(text)

    tokens

    OUTPUT:

    [''Mr'',

    ''.'',

    ''Johnson'',

    ''owns'',

    ''three'',

    ''houses'',

    ''in'',

    ''New'',

    ''York'',

    ''on'',

    '':'',

    ''22nd'',

    ''street'',

    '','',

    ''downton'',

    '','',

    ''and'',

    ''42nd'',

    ''street'',

    ''.'']

    ```


    注意


    输出将标点符号保留为独立的词元。这有助于理解句子结构。标点符号词元的存在有助于保留原始句子的含义和上下文。


    ### 推文分词器


    推文可以像其他几种特殊文本一样被处理，因为它们具有典型的结构。当应用于包含推文的数据集时，通用分词器可能无法生成可行的词元。NLTK 为此类情况提供了一个特殊的分词器。推文分词器是一种基于规则的分词器，可用于移除问题字符、HTML
    代码和 Twitter 用户名。此分词器可以通过减少重复字母的出现来规范化输入文本的长度。此外，推文分词器能够有效处理话题标签和提及，同时保留其重要性。该分词器还能有效管理表情符号和特殊符号。请注意，话题标签和表情符号在推文中很常见。以下是使用此分词器的简短但可复用的代码演示。


    ```

    from nltk.tokenize import TweetTokenizer

    def punctuation_based_tokenizer(text):

    """

    使用 NLTK 的 TweetTokenizer 对输入文本进行分词，该分词器处理推文中常见的标点符号和特殊字符。

    参数:

    text (str): 要分词的输入文本。

    返回:

    list: 包含单词和标点符号的词元列表。

    """

    # 初始化分词器。

    tokenizer = TweetTokenizer()

    # 进行分词。

    tokens = tokenizer.tokenize(text)

    return tokens

    # 使用示例

    if __name__ == "__main__":

    Sample_text = """Mr.Johnson owns three houses in New York!

    22nd street, downton,and 42nd street." #marvelous @Rita"

    """

    tokens = punctuation_based_tokenizer(Sample_text)

    print(tokens)

    OUTPUT:

    [''Mr.Johnson'', ''owns'', ''three'', ''houses'', ''in'', ''New'', ''York'', ''!'',
    ''22nd'', ''street'', '','', ''downton'', '','', ''and'', ''42nd'', ''street'',
    ''.'', ''"'', ''#marvelous'', ''@Rita'', ''"'']

    ```


    - 请注意：像 `!`、`,` 和 `.` 这样的标点符号被保留为独立的词元。

    - 话题标签（`#marvelous`）和提及（`@Rita`）被保留为不同的词元。

    - `Mr.Johnson` 保持完整。

    - 这些示例旨在强调 `TweetTokenizer` 是专门为社交媒体文本的细微差别而量身定制的。


    ### MWE 分词器


    多词表达式（MWE）分词器处理在输入文本中充当单个单元的单词序列。示例包括习语短语、复合名词和固定表达，如果将它们分词为单独的单词，可能会被误解。将这些表达式视为单个词元可以保留其预期含义，并有助于进行准确的文本分析。列表
    5-1 是该分词器的一个文本演示，包含一个可复用的函数。


    ```

    from nltk.tokenize import MWETokenizer

    def mwe_tokenizer(text, mwe_list):

    """

    在分词时保留指定的多词表达式（MWE）。

    参数:

    text (str): 输入文本。

    mwe_list (元组列表): 要视为单个词元的 MWE 列表。

    返回:

    list: 包含词元的列表，其中 MWE 被保留为单个词元。

    """

    # 使用提供的 MWE 初始化 MWETokenizer

    tokenizer = MWETokenizer(mwe_list)

    # 对输入文本进行分词

    tokens = tokenizer.tokenize(text.split())

    return tokens

    if __name__ == "__main__":

    # 定义多词表达式。

    mwe_list = [

    (''M'', ''W'', ''E''),

    (''Multi'', ''Word'', ''Tokenizer''),

    (''Natural'', ''Language'', ''Processing''),

    (''pre'', ''processing'')

    ]

    # 输入文本

    text = "M W E Tokenizer is an advanced tokenizer in Natural Language Processing
    pre processing tasks"

    # 使用 MWE 进行分词

    tokenized = mwe_tokenizer(text, mwe_list)

    # 打印结果。

    print(tokenized)

    OUTPUT:

    [''M_W_E'', ''Tokenizer'', ''is'', ''an'', ''advanced'', ''tokenizer'', ''in'',
    ''Natural_Language_Processing'', ''pre_processing'', ''tasks'']

    列表 5-1.

    演示 MWE 分词器的程序

    ```


    - 请注意，根据给定的 `mwe_list`，`M_W_E`、`natural language processing` 和 `preprocessing`
    被组合为单个单元。

    - 其他特定任务的分词器包括 Penn Treebank/默认分词、spaCy、Moses 和子词分词。本书不涉及这些内容。

    - `Penn Treebank/默认分词` 用于根据语言规则将输入文本分割成词元。该分词器用于 Penn Treebank 语料库中的句法分析，该语料库是一个流行的带注释文本数据集，包含经过句法分析的句子和词性标注。它主要用于训练和评估
    NLP 模型。

    - `Spacy 分词器` 旨在提供高效的基于规则的分词，支持复杂的语言结构。它是 spaCy NLP 库的默认分词器。

    - `Moses 分词器` 用于机器翻译任务。它可以处理标点符号和特殊字符，以促进对齐并提高翻译质量。

    - `子词分词` 将单词分解为更小的单元或子词。它专门用于处理词汇表外的单词。

