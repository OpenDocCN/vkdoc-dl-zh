  trans: '

    ### 8.2.3 生成式人工智能的应用与未来趋势


    像 ChatGPT 这样的生成式人工智能模型的应用几乎数不胜数。这些应用涵盖了众多行业，包括医疗保健、酒店业、信息技术、制造业、银行与金融业（BFSI）、广告、营销、销售以及媒体和娱乐业。事实上，已有专门著作论述生成式人工智能（以及广义上的人工智能）在各职能领域的应用。


    在医疗保健和制药行业，生成式人工智能应用于所有职能领域。这些应用包括药物发现、个性化治疗、预测性诊断、增强医学影像，以及通过患者笔记和信息简化任务。生成式人工智能在营销、销售和广告行业的应用包括生成营销文案和图像、创建个性化推荐、撰写产品描述以及提升搜索引擎优化效果。在制造业领域，生成式人工智能被用于代码生成、编程语言翻译、代码文档编写和自动化测试。银行与金融业（BFSI）则利用生成式人工智能来制定盈利的投资策略、进行投资组合管理、与客户和投资者沟通及教育、起草文档以及监控法规合规性。由于篇幅限制，本书不提供这些应用的详细描述；请参考任何关于人工智能在职能领域应用的标准文本。


    人工智能和大型语言模型（通常称为 LLM）在协助人类完成广泛任务方面拥有巨大潜力。但与此同时，生成式人工智能模型也要求其被负责任且合乎道德地使用。生成式人工智能可能产生与现实相去甚远的内容，这通常被称为“幻觉”。幻觉引发了关于生成式人工智能的伦理问题，包括与真实性、信任和隐私相关的问题。除此之外，与生成式人工智能模型相关的其他挑战还包括算法偏见、数据隐私、版权侵权、错误信息和岗位替代。全球许多研究团队正在致力于解决生成式人工智能带来的这些挑战。当前这一方向的发展趋势包括负责任地开发、提高透明度和确保公平性。


    生成式人工智能正以极快的速度发展，力求创造出个性化和类人化的输出与交互。研究人员正在探索生成式人工智能与边缘计算和物联网（IoT）的交互。这有助于实现实时和本地化的内容生成。


    在未来的基于人工智能的产品中，我们可以期待更少的偏见和更少的幻觉。随着生成式人工智能模型的进步，我们可以期待增强的创造力以及自动化处理复杂和重复性任务的能力。这些在不久的将来的发展，很可能会提高各行业领域的效率并降低成本。与人工智能工具和机器人协作将成为每个人日常生活的一部分。


    **注意**


    边缘计算在数据产生的位置附近处理数据。它就像在你的手机或附近的计算设备上处理本地化数据，而不是将数据发送到远程服务器进行处理。以能够分析心跳而无需联网的高级智能手表为例。现在，我们简要谈谈物联网。它是一个由互联设备（如智能灯泡、汽车或机器）组成的复杂系统，这些设备借助互联网相互通信并（双向）交换数据。物联网设备可以存在于任何地方，包括家庭、车辆、工厂等等。例如，一个智能恒温器（用于家用中央空调）利用互联网定期接收天气更新（全部自动进行），并将室内温度调节到居住者感到舒适的范围内。


    ## 8.3 LangChain 与 OpenAI 的（生成式人工智能）API


    `LangChain` 与 OpenAI 最先进的生成式人工智能 API 相结合，标志着一种构建面向各种业务场景和复杂工作流的智能动态应用的有影响力方式。`LangChain`
    是由 Harrison Chase 于 2022 年 10 月发起的一个开源项目。它提供了一个全面的框架，用于通过集成大型语言模型（LLM）来构建高级工作流。`LangChain`
    可以无缝连接 OpenAI（及其他提供商）的 LLM，以及外部数据、工具和逻辑。这种组合能够产生最先进的对话式应用，生成类人响应。这些应用在自然语言处理任务中也很有用，例如内容生成和决策支持。


    如前所述，OpenAI API 充当了开发者的工具，使其能够在自己的应用和工作流（可以管理多步骤流程）中利用像 ChatGPT 这样的先进 AI 模型。此类应用能够理解输入文本以创建所需内容，为特定领域开发问答型机器人，执行文本摘要，甚至协助翻译。OpenAI
    API 用户友好，有助于开发者将智能 AI 功能添加到日常业务应用中。通过将 OpenAI API 与 `LangChain` 结合开发的应用支持记忆功能，可以记住之前的对话和处理步骤，帮助应用更好地处理上下文。这为创建聊天机器人、交互式系统和决策工具等应用奠定了完美的基础。`LangChain`
    还支持类人的流行 AI 代理（有时也称为代理式 AI），它们可以自主采取行动来完成各种任务，本章稍后将对此进行讨论。


    `LangChain` 本质上是一个模块化的结构架构。它允许无缝集成各种组件，包括提示、记忆和链。这些是 `LangChain` 特有的术语，将在本章后面讨论。`LangChain`
    的模块化特性允许在保持清晰性和简单性的同时创建灵活的应用。此外，`LangChain` 支持一系列 LLM，包括来自 OpenAI、Azure、Anthropic
    和 Google Cloud 的模型。OpenAI 的 LLM 是最受欢迎的模型之一，因此本书将重点介绍。


    你无需成为 AI 专家即可使用 OpenAI API。具备像 Python 这样的编程语言的基础知识，就足以利用这些 API 创建具有 AI 功能的时尚且复杂的应用。

