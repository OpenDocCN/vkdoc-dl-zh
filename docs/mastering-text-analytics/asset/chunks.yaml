- fmt: '# 7.1 Why You Should Read This Chapter


    Pragmatic analysis in NLP delves into understanding language in context. It goes
    beyond the literal meanings of words to interpret the intended message. Pragmatic
    analysis aims to discern the correct speaker’s intent and the social or situational
    context from the input speech or text, taking into account factors such as speaker
    intent, tone, and the listener’s perspective. Pragmatic analysis is essential
    for almost every serious NLP task, including more common ones like sentiment analysis,
    chatbot development, and conversational AI. In short, pragmatic analysis is responsible
    for the accurate interpretation of spoken or written text while considering the
    contexts of both listener and speaker.


    Pragmatic analysis enables NLP applications to grasp the implied meanings, sarcasm,
    and indirect requests that are not directly conveyed by the literal meanings of
    words but are understood through context. NLP applications integrated with pragmatic
    analysis are closely able to mimic human understanding. It leads to more natural
    and context-aware interactions between humans and machines (computers). Pragmatic
    analysis plays a pivotal role in NLP tasks dealing with dialogue systems and machine
    translation. Without learning pragmatic analysis, your aim of gaining any serious
    NLP skills is far from complete.


    So far, you have learned about lexical, syntactic analysis, and semantic analysis.
    How do they relate to pragmatic analysis?


    Lexical, syntactic, and semantic analyses are foundational steps that feed into
    pragmatic analysis in NLP. Lexical analysis is concerned with breaking down the
    text into words or tokens. After that, the syntactic analysis step categorizes
    these tokens into grammatical structures to enable grammatically correct sentence
    formation. Semantic analysis interprets only the literal meaning of these sentence
    structures while concentrating on the relationships between words. Pragmatic analysis
    is the final step, which incorporates input from the previous three layers and
    integrates context, speaker intent, and situational factors to accurately interpret
    the intended meaning of the text. Together, these four steps form a hierarchy,
    as shown in Figure [7-1](#649581_1_En_7_Chapter.xhtml#Fig1). This chapter touches
    on discourse integration along with the nuances of pragmatic analysis.


    ![Flow chart illustrating the "NLP Application Process" with five stages: Lexical
    Analysis, Syntactic Analysis, Semantic Analysis, Discourse Integration, and Pragmatic
    Analysis. Each stage is represented by an icon and includes a brief description.
    Lexical Analysis involves breaking down text into tokens. Syntactic Analysis focuses
    on analyzing grammar structure. Semantic Analysis applies semantic rules. Discourse
    Integration ensures coherence, and Pragmatic Analysis incorporates contextual
    information.](images/649581_1_En_7_Chapter/649581_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1** The general process of most NLP applications


    # 7.2 Overview of Pragmatic Analysis Techniques


    Let’s discuss pragmatic analysis key concepts. We begin with distributional semantics
    and word embeddings, which are useful in understanding how words interact with
    one another in dynamic contexts. We study latent semantic analysis along with
    its real-world applications and practical applications to help us in the extraction
    of meaningful word relationships from large datasets. Word embeddings, such as
    `Word2Vec`, `GloVe`, `CBOW`, and `skip-gram`, are fundamental in representing
    words in continuous vector spaces. `BERT` and `GPT` further enhance word embeddings
    by integrating the surrounding context. It allows NLP algorithms to capture delicate
    shifts in word meanings. Topic modeling and techniques like Latent Dirichlet allocation
    help identify underlying themes in the text, which is pivotal to pragmatic analysis,
    especially while dealing with large corpora.


    Finally, techniques such as ensemble methods and word similarity help us further
    improve the effectiveness of pragmatic analysis. They combine different models
    and measure contextual word relationships. Toward the end of this section, we
    introduce coreference resolution and its integration into NLP pipelines to further
    establish the importance of recognizing references.


    # 7.3 Discourse Integration in NLP


    In discourse integration, we keep track of an ongoing conversation to ensure that
    all the sentences fit together properly such that, as a collection, they make
    sense. In discourse integration, the focus is not on understanding just one sentence
    at a time. Before trying to make any sense, we integrate all the sentences and
    look at how each sentence connects with others. After that, we try to ensure that,
    together as a set, they make sense.


    Let’s try to solidify this concept with an example of a virtual assistant (e.g.,
    Amazon’s Alexa). You instruct your virtual assistant, “Turn on the TV,” and then
    say, “Also, make it louder.” The second sentence doesn’t explicitly use the word
    “TV,” but the assistant still analyzes what you are talking about. This is discourse
    integration; we are trying to make sense of this short conversation in totality.
    Without this, the assistant might get confused as we didn’t mention “TV” in the
    second sentence.


    In real life, we use discourse integration all the time. If your friend says,
    “I’m hungry,” and then, “Let’s get pizza,” you know both sentences are related.
    In a similar fashion, discourse integration techniques help machines to follow
    and respond to conversations, just like humans. We often use pronouns (he, she,
    it) in our regular conversations. Discourse integration techniques used in NLP
    applications help to resolve how these pronouns are linked to the correct noun
    previously mentioned in the discourse. It also helps to interpret implied meanings
    and how context dynamically changes during a conversation. In another example,
    in automated customer service applications (chatbots), discourse integration helps
    the application to track the user’s queries even over long conversations and respond
    in a relevant manner.'
