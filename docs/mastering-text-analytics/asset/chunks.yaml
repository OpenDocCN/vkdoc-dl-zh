- fmt: '# 4.4 Some Useful Functionalities Outside NLTK


    This section explores a few prevailing NLP text processing functionalities that
    go outside the capabilities currently available in NLTK. These important functionalities
    include word cloud generation, language translation, and text summarization.


    `Word Cloud Generation` is a NLP tool that highlights the words with the most
    frequencies from the input text. Just a glance at word cloud can reveal the key
    themes discussed in the input text document. Language translation (or machine
    translation) allows the automatic conversion of input text from one language to
    another to make content accessible to a global audience. `Text Summarization`
    condenses large volumes of text into concise summaries that preserve the main
    ideas. These functionalities further enhance the utility of NLP applications to
    the international audience. Next, we begin by explaining word cloud generation
    with a code demo.


    ## 4.4.1 Word Cloud Generation


    Word cloud generation (WSG) is an influential visual tool that is used in text
    analytics. It represents the most frequent words available within an input text
    document. Words appearing more frequently are displayed in larger, bolder fonts.
    This type of visual representation of words helps to quickly categorize the central
    themes and key terms. Word clouds are often used by the NLP community for exploratory
    data analysis (EDA). Word clouds are predominantly used in summarizing large text
    documents. However, word clouds do not reveal the context in which words appear.
    Despite this major limitation, word clouds are popular for initial text exploration.
    Listing [4-13](#649581_1_En_4_Chapter.xhtml#PC13) contains a sample code of WSG.


    ```

    # Install wordcloud if you do not have it already.

    !pip install wordcloud

    # Import required libraries.

    import nltk

    from wordcloud import WordCloud

    import matplotlib.pyplot as plt

    from nltk.corpus import stopwords

    from nltk.tokenize import word_tokenize

    # Download data.

    nltk.download(''punkt'')

    nltk.download(''stopwords'')

    # Write necessary functions.

    def text_preprocessor(text):

    """

    Tokenize and remove stopwords.

    Args:

    text (str): The imput text.

    Returns:

    str: The preprocessed text.

    """

    tokens = word_tokenize(text.lower())

    filtered_tokens = [word for word in tokens if word.isalnum() and word not in stopwords.words(''english'')]

    return '' ''.join(filtered_tokens)

    def word_cloud_generator(text):

    """

    Generate and display word cloud.

    Args:

    text (str): The preprocessed text.

    """

    wordcloud = WordCloud(width=800, height=400, background_color=''white'').generate(text)

    plt.figure(figsize=(8, 5))

    plt.imshow(wordcloud, interpolation=''bilinear'')

    plt.axis(''off'')

    plt.show()

    def main():

    # Sample text document.

    sample_text = """

    Word Cloud Generation (WSG) is an influential visual tool that is used in text
    analytics.

    It represents the most frequent words available within an input text document.

    Words appearing more frequently are displayed in larger, bolder fonts.

    This type of visual representation of words helps to quickly categorize the central
    themes and key terms.

    Word clouds are often used by the NLP community for exploratory data analysis
    EDA).

    Word clouds are predominantly used in summarizing large texts documents.

    However, word clouds do not reveal the context in which words appear.

    Despite this major limitation, word clouds are popularly for initial text exploration
    (EDA).

    """

    # Preprocess the sample text.

    pre_processed_text = text_preprocessor(sample_text)

    # Generate the word cloud.

    word_cloud_generator(pre_processed_text)

    Listing 4-13

    Word Cloud Generation (currently not available in NLTK)

    ```


    ```

    if __name__ == "__main__":

    main()

    ```


    ![Word cloud with prominent words like "word," "cloud," "used," and "text" in
    varying sizes and colors. Smaller words include "document," "analytics," "visual,"
    "generation," "influential," and "tool," among others. The size of each word indicates
    its frequency or importance in the context. The colors range from blue to green,
    adding visual distinction.](images/649581_1_En_4_Chapter/649581_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    The Word Cloud generated by the code of Listing 4-13


    ## 4.4.2 Language Translation


    Language translation (or machine translation) is useful in applications like online
    translation services, multilingual customer support, and global content accessibility.
    Further, machine translation supports international business operations, permits
    cross-cultural exchanges, and gives broad access to digital content. In machine
    translation, accurate interpretation of the original text is critical to replicate
    the nuances of the original text in the target language.


    Listing [4-14](#649581_1_En_4_Chapter.xhtml#PC15) uses the `translator` library
    for translating the input text because NLTK does not have this functionality.


    ```

    # Install translate if you have not done it already.

    !pip install translate

    from translate import Translator

    def text_translator(text, from_lang=''en'', to_lang=''es''):

    # Initialize the Translator.

    translator = Translator(from_lang=from_lang, to_lang=to_lang)

    # Translate the text from English to Spanish.

    translated_text = translator.translate(text)

    return translated_text

    # Example usage 1.

    Original_input_text = "Hello, how are you today? I hope you''re doing well."

    translated_text = text_translator(Original_input_text)

    print(f"Original input text: {Original_input_text}")

    print(f"Translated text: {translated_text}")

    OUTPUT1:

    Original input text: Hello, how are you today? I hope you''re doing well.

    Translated text: Hola, ¿cómo estás hoy? Espero que lo estés haciendo bien.

    # Example usage 2.

    original_text = "Hello, we won the baseball game today and received the prize
    money."

    translated_text = text_translator(original_text)

    print(f"Original text: {original_text}")

    print(f"Translated text: {translated_text}")

    OUTPUT2:

    Original text: Hello, we won the baseball game today and received the prize money.

    Translated text: Hola, hoy ganamos el juego de béisbol y recibimos el dinero del
    premio.

    Listing 4-14

    Creating a Machine Translator with Translator Library

    ```


    By the way, if you happen to know Spanish, you can judge the quality of this translation.
    Doing this, you may discover that probably the Spanish text in both the cases
    in the demo is understandable, but improvements are still possible for better
    clarity and correctness.'
