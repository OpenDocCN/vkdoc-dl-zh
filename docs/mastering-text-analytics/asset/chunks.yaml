    The spaCy lemmatizer is known for its high speed and efficiency. It is optimized
    to swiftly process large amounts of text data. NLTK also stands for a solid performance
    but tends to be slower as compared to spaCy when processing huge of text data.
    The following is a code demo.


    ```

    import spacy

    # These English pipelines have an inbuilt rule-based lemmatizer.

    nlp = spacy.load("en_core_web_sm")

    lemmatizer = nlp.get_pipe("lemmatizer")

    print(lemmatizer.mode)  # ''rule''

    sample_doc = nlp(""" The SpaCy lemmatizer is designed using a combination of rule-based
    and statistical methods to find the

    base forms of words. It comes integrated with the SpaCy NLP library.""")

    print([token.lemma_ for token in sample_doc])

