- fmt: '### 4.2.6 Word Frequency Distribution


    Word frequency distribution (WFD) comprises counting how often each word appears
    in an input text corpus. WFD is useful in understanding the importance of different
    words. It also helps in finding trends within the text. By exploring WFD, analysts
    can gain insights into the content and themes of the text.


    In practical applications, WFDs are used in various NLP preprocessing tasks like
    keyword extraction, topic modeling, and sentiment analysis. We talk about these
    newly introduced terms later in this book. By knowing WFDs in an input text corpus,
    we can highlight important concepts or terms contained in that input text document.
    Comparing word frequencies across different input texts reveals the differences
    in their vocabulary and style (see Figure [4-3](#649581_1_En_4_Chapter.xhtml#Fig3)).


    ![Flow chart titled "Word Frequency Distribution Process" illustrating four steps:
    \n\n1\. "Input Text" with an icon of a document, described as providing the initial
    text for analysis.\n2\. "Tokenization" with an icon of a word document, where
    text is divided into individual words.\n3\. "Frequency Counting" with a dotted
    circle icon, indicating the counting of each word''s occurrence.\n4\. "Frequency
    Distribution" with a bar chart icon, where counted frequencies are organized into
    a distribution. \n\nEach step is represented by an arrow pointing to the next,
    highlighting the sequential process.](images/649581_1_En_4_Chapter/649581_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    WFD using `nltk`


    We can use the `NLTK FreqDist` class to create a frequency distribution for a
    list of words and analyze the most commonly occurring words in a given text corpus.
    This functionality is predominantly needed for processing large text corpora and
    extracting meaningful patterns contained in them. Listing [4-6](#649581_1_En_4_Chapter.xhtml#PC6)
    is a code demo for WFD. You can utilize this code directly in your NLP data preprocessing
    tasks.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    import nltk

    from nltk.probability import FreqDist

    from nltk.tokenize import word_tokenize

    nltk.download(''punkt'')

    def word_frequency_finder(text):

    """

    Computes the WFD.

    Parameters:

    text (str): The input text.

    Returns:

    FreqDist: An WFD for given input words.

    """

    # Tokenize the text.

    words = word_tokenize(text)

    # Create WFD.

    freq_dist = FreqDist(words)

    return freq_dist

    # The output of this code not included as it is irrelavent.

    # Create sample text.

    sample_text = """

    In practical applications, WFDs are used in various NLP pre-processing tasks

    like keyword extraction, topic modeling, and sentiment analysis. We will talk

    about these newly introduces terms later in this book.

    """

    # Compute WFD.

    frequency_distribution = word_frequency_finder(sample_text)

    # Print the output.

    for word, frequency in frequency_distribution.items():

    print(f"Word: {word}, Frequency: {frequency}")

