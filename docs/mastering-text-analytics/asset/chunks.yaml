    # 图 1-1：2010–2025 年全球数据生成量


    图 1-1 展示了自 2020 年以来每年的数据量。毋庸置疑，这些数据中包含了大量结构化和非结构化的语音数据。企业通过运用各种机器学习技术分析这些数据，创造了巨大价值。这些数据可转化为宝贵的商业洞察，用于数据驱动的业务决策。许多用于数据分析的机器学习技术都被归入`NLP`（自然语言处理）这一范畴，该技术用于从结构化和非结构化文本数据中自动提取有价值的洞察。企业利用文本分析技术，快速消化从众多来源生成和收集的在线数据及文档，并将其转化为可执行的洞察。像亚马逊、谷歌和微软这样的全球科技公司在这方面已遥遥领先于其他企业。


    *机器学习是计算机算法的一个发展分支，它能够通过从周边环境（包括文本和数值数据）中学习来模拟人类智能。[6]*


    ![折线图，标题为“全球每年生成的数据量”，展示了从 2010 年到 2025 年的上升趋势。X 轴代表年份，范围从 2010 年到 2025 年；Y 轴代表以泽字节为单位的数据生成量，范围从
    0 到 200。图表显示，随着时间的推移，数据生成量显著增加，尤其是在 2020 年之后急剧上升。](img/649581_1_En_1_Fig1_HTML.jpg)


    **图 1-1** 2010 年至 2025 年全球数据生成量


    `NLP`将在以下章节中讨论。


    ## 1.2.1 NLP 技术


    更正式地说，`NLP`是从文本数据中提取高质量、可执行信息的过程。大量的文本数据存在于网站、电子邮件、评论（如亚马逊和 X 平台，原推特上的评论）、书籍和研究论文中。这些数据需要经过提取、清洗、格式化以及其他数据处理步骤。数据处理是一项费力的工作，可能占据整个`NLP`项目总时间的
    80%。最后，使用统计算法来推导文本数据中的模式。根据具体任务，会用到机器学习和深度学习算法。最终结果经过评估和解释，用于数据驱动的决策。典型的`NLP`任务包括文本分类与聚类、实体提取、精细目录开发、文本摘要等。社交媒体数据的情感分析是使用`NLP`技术执行的常见任务之一。


    `NLP`使用了许多基础及高级技术。较简单的技术包括文本分类、词频计算、文本提取与聚类、词性标注、情感分析、搭配与索引、停用词移除以及词义消歧。接下来，我们简要了解一下这些较简单的技术。我们将在后续章节中探讨更复杂的`NLP`技术。


    ## 1.2.2 文本分类


    文本分类是一种分析方法，专业人员用它来将文本归类或排序到不同的预定义组中。例如，一条推文可以代表正面或负面情感（正面表示为`1`，负面表示为`0`）。现在，假设你有一千条这样的推文，全部预先标记为正面或负面。然后，你可以训练一个简单的机器学习算法，即`逻辑回归`。虽然仅有一千条推文可能不足以充分训练任何机器学习算法，但它仍然可以作为一个演示示例。


    一旦`逻辑回归`模型训练完成，它就可以用于将任何新的推文分类为正面或负面。这类项目属于文本分类的范畴。`逻辑回归`属于机器学习算法中的线性家族，它可能是我们工具包中最简单的一种。为了完整性，还有其他非线性和更复杂的分类算法，如`随机森林`、`XGBoost`以及神经网络家族的算法。只要数据根据文本分类项目的要求进行了适当的清洗和预处理，所有这些复杂算法都可以部署在文本分类项目中。在某些情况下，这些非线性和更复杂的算法可能比`逻辑回归`更准确。算法的选择取决于许多因素，例如任务的性质、计算资源的可用性、技能储备以及可用时间。图
    1-2 描述了一个简单电子邮件分类器的工作原理。


    ![流程图，说明“电子邮件过滤过程”。图表呈漏斗状，从左侧的“传入电子邮件”开始。该过程包括三个阶段：“主题分类”、“垃圾邮件识别”和“正常邮件确认”，每个阶段都用图标表示。漏斗向右逐渐变窄，最终到达右侧的“已整理邮件文件夹”。该流程图直观地展示了过滤和组织电子邮件的步骤。](img/649581_1_En_1_Fig2_HTML.jpg)


    **图 1-2** 主题分类用于标记传入的垃圾邮件，这些邮件会被过滤到垃圾邮件文件夹中


    ## 1.2.3 聚类


    让我们通过一个简单的例子来理解聚类。假设你有十个关于不同主题的文本段落。目前，你没有得到任何段落的标题。在阅读过程中，你发现有些是关于线性代数的，有些是关于欧洲历史的，还有些是关于量子力学的。你根据这些主题将文本段落分组。这就是文本聚类的一个完美例子！


    了解了文本聚类之后，现在我们来看一个它如何帮助我们的例子。假设你管理着大量已知标题的文本数据。使用机器学习算法进行文本聚类可以自动将这些数据组织成有意义的组。这使得查找和分析信息变得更加容易，而无需通读所有内容。


    用于文本聚类的常用算法有`K 均值聚类`、`层次聚类`、`基于密度的噪声应用空间聚类（DBSCAN）`、`潜在狄利克雷分配（LDA）`、`GloVe（用于词表示的全局向量）`、`来自变换器的双向编码器表示（BERT）`等等。其中一些技术单独使用，而另一些则根据手头任务组合使用。其中一些技术将在后续章节中介绍。


    图 1-3 描述了聚类过程，其中一篇文章的内容被归类为医疗、技术和体育等主题簇。如图所示，通常在文档及其簇之间，有一个`NLP`聚类处理器（或像`k-means`这样的算法），它将广义的文章内容分组到所述组中。


    ![流程图，描绘了“主文章”被分为三个类别：健康、技术和体育。主文章在顶部被表示为一叠文件，通过线条连接到下方三个分别标有类别名称的堆叠。健康和技术类别各有两个堆叠，而体育类别有一个。该图表说明了内容的组织和分类过程。](img/649581_1_En_1_Fig3_HTML.png)


    **图 1-3** 一篇通用文章的主题聚类

