    \n*   **det** (determiner): A word like “the” or “a” that modifies a noun.\n\n\
    *   **conj** (conjunction): A word that connects other words or phrases, like\
    \ “and” or “but”.\n\n*   **cc** (coordinating conjunction): A word that connects\
    \ words or phrases of the same type.\n\n*   **nmod** (nominal modifier): A noun\
    \ that modifies another noun.\n\n*   **aux** (auxiliary verb): A verb that helps\
    \ form different tenses, moods, or voices of the main verb.\n\n*   **expl** (expletive):\
    \ A word like “there” that does not have a substantive meaning but serves a grammatical\
    \ function.\n\nThis method (dependency parsing) helps machines (read computers)\
    \ realize input sentences by breaking them down into the connections depicted\
    \ in the preceding tree. This process makes it easier for computers to figure\
    \ out the meaning of the sentence. This way, instead of just recognizing the words,\
    \ machines learn how the words fit together and work together in a sentence.\n\
    \nDependency parsing involves breaking down an input sentence into the word level\
    \ and then identifying the grammatical relationships between those words. In short,\
    \ dependency parsing shows how each word connects to others by detecting the sentence\
    \ structure.\n\n#### Constituency Parsing\n\nThe constituency parsing technique\
    \ builds a hierarchical tree that depicts how words group together into phrases.\
    \ Dependency parsing, on the other hand, involves breaking down sentences to the\
    \ word level.\n\nLet’s take an example sentence, “The cat sat on the mat.”\n\n\
    First, identify the phrases.\n\n*   “The cat” is a noun phrase (NP) that serves\
    \ as the subject.\n\n*   “sat on the mat” is a verb phrase (VP) that tells about\
    \ the action and its details.\n\n*   “on the mat” is a prepositional phrase (PP)\
    \ that modifies the verb.\n\nNext, build the tree.\n\n*   The main verb phrase\
    \ “sat on the mat” is at the root of the tree.\n\n*   “The cat” will serve as\
    \ the subject.\n\n*   “on the mat” is connected to the verb phrase as an additional\
    \ detail.\n\nThe formal tree resembles the following.\n\n```\n(S\n(NP The cat)\n\
    (VP\n(V sat)\n(PP\n(P on)\n(NP the mat)\n)\n)\n)\n```\n\nIn this tree,\n\n*  \
    \ S represents the entire sentence.\n\n*   NP for noun phrases.\n\n*   VP represents\
    \ verb phrases.\n\n*   PP stands for prepositional phrases.\n\nThe following are\
    \ common tags used in constituency parsing.\n\n*   **S** (sentence): Stands for\
    \ the complete sentence.\n\n*   **NP** (noun phrase): It groups nouns and their\
    \ modifiers.\n\n*   **VP** (verb phrase): It stands for the main verb and its\
    \ arguments.\n\n*   **PP** (prepositional phrase): Includes a preposition and\
    \ its object.\n\n*   **AdjP** (adjective Phrase): It contains adjectives and their\
    \ modifiers.\n\n*   **AdvP** (adverb phrase): It groups adverbs and their modifiers.\n\
    \n*   **Det** (determiner): It stands for the words like “the,” “a,” or “an” that\
    \ modify nouns.\n\n*   **N** (noun): Stands for nouns.\n\n*   **V** (verb): Represents\
    \ verbs.\n\n*   **P** (preposition): Stands for prepositions.\n\nConstituency\
    \ parsing and dependency parsing use different tags because they serve different\
    \ purposes. POS tags are also different from the tags used in constituency and\
    \ dependency parsing\n\n### 6.2.4 Hands-on Example Covering for Parsing\n\nConstituency\
    \ parsing and dependency parsing are two different approaches to parsing. The\
    \ first one emphasizes hierarchical structure, while the second focuses on grammatical\
    \ relations. Which one has more prevalence in practice? Dependency parsing is\
    \ more prevalent in practice. The reason is as follows. Dependency parsing is\
    \ often aligned with the needs of many NLP tasks as its focus is on grammatical\
    \ relationships, which plays a pivotal role in understanding sentence meaning.\
    \ Dependency parsing is also generally more computationally efficient and flexible\
    \ across languages. For these reasons, the code demo in the following section\
    \ only uses a dependency parser."
  trans: "\n### 依存句法分析\n\n让我们从一个例句开始：“她把书给了他。”依存句法分析器通过检测单词之间的语法关系，并将其组织成树状结构来分解句子。其工作原理如下。\n\
    \n1.  核心：分析器识别出主要动词`“gave”`，这构成了句子的核心。\n2.  主语（`nsubj`）：分析器将`“She”`识别为动词`“gave”`的主语。\n\
    3.  直接宾语（`dobj`）：接着，分析器检测到`“book”`是`“gave”`的直接宾语。\n4.  介词短语（`prep`）：最后，分析器将`“to\
    \ him”`定性为介词短语。\n\n最终，依存句法分析器会切分出如下结构，以直观地展示给定输入句子“She gave the book to him”的语法结构。\n\
    \n*   `“gave”` (核心)\n    *   `“She”` (`nsubj`)\n    *   `“book”` (`dobj`)\n  \
    \  *   `“to”` (`prep`)\n        *   `“him”` (`pobj`)\n\n依存句法分析中常用的标签如下：\n\n* \
    \  `nsubj` (名词性主语)：作为动词主语的名词或名词短语。\n*   `dobj` (直接宾语)：直接承受动词动作的名词或名词短语。\n*   `iobj`\
    \ (间接宾语)：间接承受动词动作的名词或名词短语。\n*   `attr` (属性)：描述名词的形容词或形容词短语。\n*   `amod` (形容词修饰语)：修饰名词的形容词。\n\
    *   `advmod` (副词修饰语)：修饰动词、形容词或其他副词的副词。\n*   `prep` (介词修饰语)：引导介词短语的介词。\n*   `pobj`\
    \ (介词宾语)：跟在介词后面的名词或名词短语。\n*   `det` (限定词)：像“the”或“a”这样修饰名词的词。\n*   `conj` (连词)：连接其他单词或短语的词，例如“and”或“but”。\n\
    *   `cc` (并列连词)：连接同类型单词或短语的词。\n*   `nmod` (名词修饰语)：修饰另一个名词的名词。\n*   `aux` (助动词)：帮助构成主要动词不同时态、语态或语气的动词。\n\
    *   `expl` (填充词)：像“there”这样没有实质意义但具有语法功能的词。\n\n这种方法（依存句法分析）通过将输入句子分解为前述树状结构中描绘的连接关系，帮助机器（即计算机）理解输入句子。这个过程使计算机更容易理解句子的含义。通过这种方式，机器不仅识别单词，还能学习单词如何在句子中相互配合、协同工作。\n\
    \n依存句法分析涉及将输入句子分解到单词级别，然后识别这些单词之间的语法关系。简而言之，依存句法分析通过检测句子结构来展示每个单词如何与其他单词连接。\n\n\
    ### 成分句法分析\n\n成分句法分析技术构建一个层级树状结构，描述单词如何组合成短语。而依存句法分析则是将句子分解到单词级别。\n\n让我们看一个例句：“猫坐在垫子上。”\n\
    \n首先，识别短语。\n\n*   “The cat”是一个名词短语（`NP`），充当主语。\n*   “sat on the mat”是一个动词短语（`VP`），描述了动作及其细节。\n\
    *   “on the mat”是一个介词短语（`PP`），修饰动词。\n\n接下来，构建树状结构。\n\n*   主要动词短语“sat on the mat”位于树的根部。\n\
    *   “The cat”充当主语。\n*   “on the mat”作为附加细节连接到动词短语。\n\n正式的树状结构如下所示。\n\n```\n(S\n\
    (NP The cat)\n(VP\n(V sat)\n(PP\n(P on)\n(NP the mat)\n)\n)\n)\n```\n\n在这棵树中，\n\
    \n*   `S` 代表整个句子。\n*   `NP` 代表名词短语。\n*   `VP` 代表动词短语。\n*   `PP` 代表介词短语。\n\n以下是成分句法分析中常用的标签。\n\
    \n*   `S` (句子)：代表完整的句子。\n*   `NP` (名词短语)：将名词及其修饰语组合在一起。\n*   `VP` (动词短语)：代表主要动词及其论元。\n\
    *   `PP` (介词短语)：包含一个介词及其宾语。\n*   `AdjP` (形容词短语)：包含形容词及其修饰语。\n*   `AdvP` (副词短语)：将副词及其修饰语组合在一起。\n\
    *   `Det` (限定词)：代表像“the”、“a”或“an”这样修饰名词的词。\n*   `N` (名词)：代表名词。\n*   `V` (动词)：代表动词。\n\
    *   `P` (介词)：代表介词。\n\n成分句法分析和依存句法分析使用不同的标签，因为它们服务于不同的目的。词性标注（POS）标签也不同于成分句法分析和依存句法分析中使用的标签。\n\
    \n### 6.2.4 句法分析实战示例\n\n成分句法分析和依存句法分析是两种不同的句法分析方法。前者强调层级结构，而后者侧重于语法关系。哪一种在实践中更普遍？依存句法分析在实践中更普遍。原因如下：依存句法分析通常与许多自然语言处理任务的需求相一致，因为它侧重于语法关系，而语法关系在理解句子含义中起着关键作用。此外，依存句法分析通常在计算上更高效，且跨语言灵活性更强。基于这些原因，下一节的代码演示仅使用依存句法分析器。\n"
- fmt: '#### Dependency Parsing Code Demo


    Listing [6-2](#649581_1_En_6_Chapter.xhtml#PC4) and Figure [6-2](#649581_1_En_6_Chapter.xhtml#Fig2)
    are examples of dependency parsing.


    ![A syntactic dependency flow chart illustrating the sentence "She sells seashells
    by the seashore." Arrows indicate grammatical relationships: "She" as the nominal
    subject (nsubj) of "sells," "seashells" as the direct object (dobj), "by" as a
    preposition (prep) leading to "the seashore" as the prepositional object (pobj)
    with "the" as a determiner (det). Below each word, its part of speech is labeled:
    PRON, VERB, NOUN, ADP, DET, NOUN.](images/649581_1_En_6_Chapter/649581_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2** Dependency tree for the sample, “She sells seashells by the seashore.”


    ```

    """

    You are strongly advised to run the following conda commands

    on Anaconda command prompt before attempting to install or import spaCy.

    """

    conda install pytorch torchvision torchaudio pytorch-cuda=11.8 -c pytorch -c nvidia

    conda install pytorch torchvision torchaudio cpuonly -c pytorch

    import spacy

    # Displacy is SpaCy''s visualization tool for rendering syntactic dependency parses
    in HTML format.

    from spacy import displacy

    # Load the required pre-trained SpaCy model.

    nlp = spacy.load(''en_core_web_sm'')

    # Create a sample sentence for processing.

    sample_sentence = "She sells seashells by the seashore."

    doc = nlp(sample_sentence)

    # Print the dependency parsing result

    for token in doc:

    print(f"Token: {token.text}, Head: {token.head.text}, Dependency: {token.dep_}")

    # Set up options for visualization (fit in page).

    options = {

    "compact": True,  # Makes the visualization more compact.

    "color": "blue",  # Changes color of the dependency lines.

    "bg": "white",    # Background color.

    "font": "Source Sans Pro",  # Font style.

    "arrow_stroke": 2,  # Thickness of the arrows.

    "arrow_stretch": 8,  # Stretch of the arrows.

    "distance": 100      # Distance between tokens.

    }

    # Render the dependency parser with the options set above.

    displacy.render(doc, style=''dep'', options=options, jupyter=True)

    OUTPUT:

    Token: She, Head: sells, Dependency: nsubj

    Token: sells, Head: sells, Dependency: ROOT

    Token: seashells, Head: sells, Dependency: dobj

    Token: by, Head: sells, Dependency: prep

    Token: the, Head: seashore, Dependency: det

    Token: seashore, Head: by, Dependency: pobj

    Token: ., Head: sells, Dependency: punct

    ```


    **Listing 6-2** Dependency Parcing


    The following are explanations.


    *   Root node (`sells`): The verb `sells` is the central action. It forms the
    root of the tree.

    *   Subject (`She`): `She` is the subject. It performs the action of selling.

    *   Direct object (`seashells`): `Seashells` is the object being sold. It is linked
    directly to the verb.

    *   Prepositional phrase (`by the seashore`): `By` introduces the location. It
    modifies the verb `sells`.

    *   Modifiers (`the`): `The` specifies the noun `seashore`. It acts as a determiner.


    ### 6.2.5 Challenges in Syntactic Analysis


    Input sentences can often be understood in several ways. The interpretation depends
    upon the context, word order, or even cultural nuances. So, it is always challenging
    to construct parsers that are able to maintain consistency in terms of producing
    accurate syntactic structures for complex sentences. Complex sentence structures
    can include nested clauses, idiomatic expressions, and non-standard grammar. All
    of it can be enough to confuse syntactic parsers. Several sophisticated algorithms
    are developed to deal with such complexities. These algorithms have built-in extensive
    linguistic knowledge and complex mathematics to accurately analyze and crack these
    challenges.


    The issue of resource limitations is an additional roadblock that syntactic analyzers
    have to deal with. High-quality syntactic parsing typically needs huge computational
    resources and large labeled datasets. Both, the computing resources and labeled
    datasets, are costly and time-consuming to acquire. When it comes to different
    languages or specialized domains, syntactic parsers often require significant
    customization. It further adds to the complexity in the way of effective syntactic
    analysis for diverse NLP applications. Let’s try to understand this with a sample
    sentence as follows.


    “He told his friend that he will win the race.”


    You might have guessed the ambiguity by now. The pronoun `he` could refer to either
    `he` or `his friend`, leading to two possible interpretations:


    *   He (the original subject) will win the race.

    *   His friend will win the race.


    The parser needs to take the help of context or some extra information to resolve
    the disambiguate to correctly infer who is expected to win the race. It could
    either be the speaker or the speaker’s friend. It is dependent on the context.


    We can take the help by generating several parse trees for the same sentence.
    Every tree can represent a different possible structure. Each structure depicts
    how the phrases and clauses relate to each other. The parser then uses grammatical
    rules to assess each of these trees and finally resolve the most coherent structure.


    Parsers also employ statistical models and special disambiguation algorithms to
    further refine their analysis. Such statistical models are already trained on
    large relevant datasets. These models can predict (with a probability) which interpretation
    is most likely based on historical usage patterns. A probabilistic context-free
    grammar is also employed to compare several parse trees and select the most probabilistic
    interpretation.


    More sophisticated parsers use a combination of these techniques, using context,
    grammatical rules, and statistical data to effectively handle ambiguities and
    resolve issues related to complex sentences.'
