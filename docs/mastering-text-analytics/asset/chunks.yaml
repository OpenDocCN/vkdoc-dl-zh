    ### 4.2.9 使用 NLTK 进行词义消歧


    你已经看到，许多单词根据其使用的上下文具有多种含义。词义消歧（WSD）是一种用于确定句子中单词使用哪种含义的技术。WSD 会根据上下文找出最合适的含义。


    让我们用一个简单的示例词“bat”来理解它。它可以指一种会飞的哺乳动物，也可以指棒球或板球中使用的一种运动器材。WSD 会根据句子的上下文来确定“bat”是指动物还是器材。你可能想知道机器（即计算机）是如何完成这一切的。机器的
    NLP 软件只需分析周围的单词，就能澄清所考虑的特定单词的预期含义（见图 4-4）。


    ![流程图展示了“使用 NLTK 的词义消歧过程”。它包含五个顺序步骤：\n\n1. “输入单词和上下文” - 识别初始单词及其上下文。\n2. “预处理步骤”
    - 对输入数据进行预处理以供分析。\n3. “词义识别” - 系统识别单词可能的词义。\n4. “消歧算法” - 算法选择最合适的词义。\n5. “输出选定的词义”
    - 最终选定的词义作为结果输出。\n\n 每个步骤都用一个图标和简要描述表示。](img/649581_1_En_4_Fig4_HTML.jpg)


