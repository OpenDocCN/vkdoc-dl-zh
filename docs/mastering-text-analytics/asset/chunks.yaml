- fmt: "# 5.2 Morphological Analysis Revisited\n\nWe discussed morphological analysis\
    \ at the start of this chapter. By learning how morphemes combine to form words,\
    \ we can understand language patterns and enable several language processing tasks\
    \ like stemming and lemmatization. Let’s try to understand morphemes with the\
    \ help of the following three familiar words.\n\n- The word “unhappiness” has\
    \ three morphemes. The prefix “un-” (meaning “not”), the root word “happy” (meaning\
    \ “joyful”), and finally the suffix “-ness” (meaning “state of being”). Combined,\
    \ they form the word “unhappiness.”\n- “Replayed” has two morphemes. The prefix\
    \ “re-” (meaning “again”) and the root word “played” (meaning “engaged in a game\
    \ or activity”).\n- Similarly, the word “cats” contains two morphemes: the base\
    \ noun “cat” and the suffix “-s” (representing the plural form).\n\nBy analyzing\
    \ the structure of words, we can efficiently extract meaningful features and develop\
    \ more effective language models.\n\nThere are two major categories of morphemes.\n\
    \n- **Free morphemes** can exist and stand alone as independent words with meaning.\
    \ Examples are “book,” “run,” and “happy.” These morphemes convey meaning even\
    \ if they are not attached to any other word.\n- **Bound morphemes** must be attached\
    \ to a free morpheme to have meaning. Consider our familiar example, “unhappy.”\
    \ Here, prefixes like “un-” in the base word “happy” modify the meaning of the\
    \ base word. This way, bound morphemes further add nuances or grammatical context\
    \ to words.\n\nFree morphemes represent the basic vocabulary units of a language,\
    \ while bound morphemes, such as prefixes, suffixes, and infixes, help us to understand\
