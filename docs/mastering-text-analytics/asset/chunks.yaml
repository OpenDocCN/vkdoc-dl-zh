- fmt: '# GloVe: Global Vectors for Word Representation


    GloVe is an [unsupervised machine learning](https://www.geeksforgeeks.org/supervised-unsupervised-learning/)
    algorithm that was first presented in 2014 at a conference organized in Doha,
    Qatar. GloVe is used to generate vector representations (word embeddings) of words.
    GloVe contains pre-defined dense vectors for approximately over 6 billion words
    of English literature, including some general-use characters like commas, braces,
    and semicolons. Users can utilize a pre-trained GloVe embedding in various dimensions,
    such as 50-d, 100-d, 200-d, or 300-d vectors, depending on the availability of
    computational resources and the task requirements. Here, `d` represents *dimension*.
    50-d would indicate a vector of size 50, and so on.


    The main difference between `Word2Vec` and `GloVe` is that `Word2Vec` learns word
    embeddings (or word vectors) by predicting context words using skip-gram or CBOW
    models (utilizing large corpora). Its focus is on the local context. `GloVe` utilizes
    global word co-occurrence statistics to seize overall word relationships in its
    embeddings. `GloVe` model emphasizes global as well as local context. `Word2Vec`
    is generally faster and more efficient for context-specific NLP tasks because
    it dynamically captures word relationships during training. `GloVe` works great
    for capturing overall word relationships across an entire text dataset because
    it learns from global word co-occurrences (meaning how often words appear together
    across many sentences). This way, `GloVe` captures a broader understanding of
    word meanings and their relationships.


    Like `Word2Vec`, the word embeddings provided by `GloVe` can be used in multiple
    NLP tasks like NER, machine translation, question-answering systems, document
    similarity, and document clustering.


    Below is a code demo (Listing [7-6](#649581_1_En_7_Chapter.xhtml#PC16)) that utilizes
    pre-trained `GloVe` embeddings to find similar words.


    1. Go to the GloVe project page.

    2. Download the `glove.6B.zip` file. It contains word embeddings of multiple dimensions
    like 50d, 100d, and so on.

    3. Unzip the file to see `glove.6B.50d.txt`.

    4. Place `glove.6B.50d.txt` in the same directory as your code file, or specify
    the correct path in the code if it’s located elsewhere.


    ```

    # Using pre-trained GloVe embeddings to find similar words.

    # Necessary steps before you run the the code

    ```


    ```

    # Import necessary libraries

    import numpy as np  # For numerical operations

    from sklearn.metrics.pairwise import cosine_similarity  # For similarity calculation

    # Load GloVe embeddings

    # Path to GloVe file (ensure this file is in the directory or provide the correct
    path)

    embeddings_index = {}  # Dictionary to store word vectors

    # Open and read the GloVe file

