  raw: '### 5.6.8 Lemmatization


    We can perform lemmatization in two ways.


    *   Without POS tagging: It is less accurate as this way, the lemmatizer often
    assumes that words are nouns, which can lead to potential errors.


    *   With POS tagging: It is more accurate as it takes the word’s role in the sentence
    into account while performing lemmatization. Taking POS tags in to account reduces
    the likelihood of errors.


    The following code focuses on the second process. A note on the coding approach:
    POS tags from NLTK are more detailed compared to the broader ones from WordNet.
    NLTK’s POS tagger provides the necessary contextual information. Converting NLTK’s
    detailed tags to WordNet’s simpler POS tags ensures that the lemmatizer has the
    necessary context.


    ```

    import nltk

    from nltk.corpus import wordnet

    from nltk.stem import WordNetLemmatizer

    from nltk import pos_tag, word_tokenize

    # Convert NLTK POS tags to WordNet POS tags as explained above.

    def get_wordnet_pos(treebank_tag):

    if treebank_tag.startswith(''J''):

    return wordnet.ADJ

    elif treebank_tag.startswith(''V''):

    return wordnet.VERB

    elif treebank_tag.startswith(''N''):

    return wordnet.NOUN

    elif treebank_tag.startswith(''R''):

    return wordnet.ADV

    else:

    return wordnet.NOUN  # Assume nounun if no match is found.

    # Test on sample text.

    text = """Note on the approach of coding: POS tags from NLTK''s are more detailed

    compared to the broader ones from WordNet. NLTK''s POS tagger provides the necessary
    contextual information.

    Converting NLTK''s detailed tags to WordNet'' simpler s

    POS tags ensures that the lemmatizer has the necessary context.

    """

    # Tokenize and find the POS tags.

    tokens = word_tokenize(text)

    pos_tags = pos_tag(tokens)

    # Initialize the lemmatizer.

    lemmatizer = WordNetLemmatizer()

    # Lemmatize with POS tags

    lemmatized_words = [lemmatizer.lemmatize(token, get_wordnet_pos(pos)) for token,
    pos in pos_tags]

    print(lemmatized_words)

    [''Note'', ''on'', ''the'', ''approach'', ''of'', ''coding'', '':'', ''POS'',
