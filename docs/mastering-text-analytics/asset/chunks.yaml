    ## Skip-gram Model


    Skip-gram models are also unsupervised methods. Like CBOW, they are also based
    on shallow neural networks with only one or two hidden layers. But skip-gram is
    exactly the opposite of CBOW. Skip-gram models predict context words (surrounding
    words) given a target word. If we choose `window_size=2` in the sample sentence,
    “he is a great scholar”, we get the following possible pairs.


    *   (he, is) (is, he)

    *   (is, a) (a, is)

    *   (a, great) (great, a)

    *   (great, scholar) (scholar, great)


    Each pair has a central word as input and a context word as output. For the first
    pair (he, is), the central word is “he,” and the context word is “is.” When we
    decide which is the target, the remaining one automatically becomes the surrounding.
    Similarly, in (great, scholar), if we decide “great” as the central or target
    word, “scholar” automatically becomes the context or the output word. It is for
    a 2-gram model. In a 3-gram model, sequences of three consecutive words are formed.


    If we choose a `window_size = 3`, the valid 3-gram groups are as follows.


    *   (he, is, a), (he, a, is)

    *   (is, a, great), (is, great, a)

    *   (a, great, scholar), (a, scholar, great)


    Each group consists of a central word with context before and after it. For instance,
    in the group (a, great, scholar), the central word is “great,” and the context
    words are “a” and “scholar.”


    Next, let’s create and run a sample neural network-based skip-gram model for demonstration
    (Listing [7-4](#649581_1_En_7_Chapter.xhtml#PC12)), following these broad steps.


