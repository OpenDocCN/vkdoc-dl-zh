  trans: '

    ### 1.4.3 法律领域


    法律专业人士花费大量时间在堆积如山的法律文档中搜寻相关信息。这类法律研究数据可能成为诉讼（无论是刑事还是民事）中的决定性因素。`NLP`引擎可以自动化法律发现过程中的大部分工作，使法律专业人士能够腾出更多时间专注于案件的其他关键部分。`NLP`能够通过分析海量文档进行文档分类。这样一来，法律专业人士可以高效地管理和组织大量文档，从而快速检索到相关信息。


    以上仅是几个例子。`NLP`在许多其他领域也有应用。接下来我们将讨论其中几个。


    ### 1.4.4 自动化常规业务流程


    聊天机器人和数字个人助理，例如苹果公司的`Siri`和亚马逊公司的`Alexa`，能够识别以人类语音形式提出的查询。它们可以将查询与企业或政府数据库中的相应条目进行匹配，从而为用户获取相关信息。在收集到必要信息后，数字助理可以生成一个针对用户查询的恰当回复。在业务运营中，`NLP`通过处理和理解来自电子邮件、报告和表单的非结构化数据，自动化了文字处理器、电子邮件应用程序和电子表格中的数据录入和提取工作。它们甚至可以根据内容分析来对任务进行优先级排序，确保任务得到及时有序的执行。基于`NLP`的应用程序可以自动化许多其他常规、重复性的任务，帮助组织提高准确性、降低成本并更有效地分配资源。


    ### 1.4.5 改进搜索


    基于`NLP`的应用程序可以改进对文档或互联网的关键词搜索。它们能够通过根据上下文消除词义歧义，帮助检索常见问题解答（FAQ）中的相关信息。例如，拼写为“bat”的英文单词根据上下文可以有不同的含义。`NLP`有能力解决这种歧义，并能根据上下文获取词语的正确含义。这在识别和解决
    FAQ 应用及聊天机器人中的客户查询时非常有用。此外，由`NLP`驱动的搜索引擎可以有效处理语音搜索。它允许用户通过口语与搜索系统交互，从而进一步增强可访问性和便利性。对于搜索引擎而言，`NLP`可以根据用户过去的搜索记录、交互性质以及人口统计信息来分析用户行为和偏好，从而个性化搜索推荐。这种定制能力有助于预测用户意图，并提供符合个人偏好和兴趣的定制化结果。


    ### 1.4.6 搜索引擎优化


    搜索引擎优化（`SEO`）是一门优化网站及其内容的艺术，旨在提升网站在搜索引擎结果页面（`SERPs`）中的可见性和排名。`SEO`过程包括猜测用户在搜索感兴趣的内容时最常使用的词语（关键词研究）。它确保网站内容设置得当，便于像谷歌搜索这样的搜索引擎理解。这被称为站内优化。`SEO`中的另一个过程——站外优化，则涉及网站外部的活动，通过增加在线提及次数和搜索引擎排名来提升网站的权威性和可信度。


    总体而言，`SEO`有助于网站在搜索结果中排名更高，从而增加用户点击的可能性。`NLP`在整个`SEO`过程中是一个强大的工具，因为它能够理解和分析用户查询背后的意图。将`NLP`整合到`SEO`中，有助于企业更准确地满足用户需求，最终帮助提升搜索引擎排名，并为网站带来更多自然流量。为了更好地理解，自然流量是指通过非付费的搜索引擎结果访问网站的访客，不包括付费广告。


    ### 1.4.7 机器翻译：使用 NLP 自动翻译语言


    这项技术直到最近仍在发展之中。如今，它已经变得相当成熟。`NLP`应用程序能够对多种自然语言进行相当准确的翻译。`NLP`能够处理文本和语音数据，并将其准确地从一种语言翻译成另一种语言。这种机器翻译在语法上是正确的，并且能够在恰当的上下文中正确传达含义。


    图 1-6 展示了一个简化的`NLP`模型。


    ![流程图展示了 NLP 中的机器翻译系统。过程始于“输入处理”，为翻译准备文本。然后进入“翻译引擎”，在此使用算法转换文本。最后，“后处理”对输出进行优化和校正。核心组件是“机器翻译系统”，被描述为
    NLP 进行语言转换的核心。每个阶段由箭头连接，指示信息流。](img/649581_1_En_1_Fig6_HTML.jpg)


    图 1-6


    机器翻译模型


    在很大程度上，最先进的`NLP`技术已经克服了诸多挑战，例如处理词语在不同语境中的歧义含义、保留原始文档的风格和语气，以及保持专业领域的精确性。机器翻译仍然是`NLP`一个不断发展的应用领域。


    ### 1.4.8 文本摘要：浓缩大量文本信息


    各种文本浓缩定义将摘要的篇幅设定在原文的 10%到 50%之间（见图 1-7）。文本摘要应用使用深度学习架构，更具体地说是 Transformer 模型。我们将在本书后面讨论一些深度学习的`NLP`技术，但对
    Transformer 模型的详细讨论超出了本书范围。抽取式摘要技术从原始文本语料库中提取未经改动的句子。这些技术被新闻聚合器、法律文档审阅者和学术研究人员广泛使用。其目的是快速传达长篇文本文件中的要点，以节省读者的时间和精力。


    另一类是像`ChatGPT`这样的`LLMs`（大型语言模型），它们能够使用自己的句子生成原创性摘要（创新性），这些句子在原始文本中并不存在。它们也使用基于
    Transformer 模型的复杂深度学习架构。`LLMs`是 2020 年之后才出现的非常新的创新。目前，这类`LLMs`虽然有用，但有时会自行生成一些虚假的创新性文本，这种现象被称为“幻觉”。在`LLM`领域正在进行非常严肃的研究，并且随着谷歌和`OpenAI`等公司发布每一个新模型，它们的能力都在不断提升。


    ![流程图展示了创建统一摘要的过程。它包括三个主要步骤：“文本提取”（带有一本打开的书图标）、“关键点识别”（带有灯泡和书图标）以及“摘要生成”（带有打印机图标）。这些步骤汇聚到“文档摘要”（由文档和放大镜图标表示）。箭头连接每个步骤到最终结果，强调了过程的流程和整合。](img/649581_1_En_1_Fig7_HTML.jpg)


    图 1-7


    文档摘要

    '
- fmt: '# 1.5 Recent Trends and Future Directions


    `NLP` is a constantly evolving field. Many researchers from the domains of computer
    science and engineering, artificial intelligence and machine learning, and linguistics
    have actively contributed to the `NLP`. The main factors that have contributed
    immensely to the rapid developments in `NLP` are innovations in the fields of
    machine learning and an increase in computing power. Many recent trends seen in
    the `NLP` domain are made possible by deep learning and transformer models like
    `BERT` and `GPT`. These models have considerably improved the `NLP` capabilities
    of machines, particularly language understanding, translation, and generation.
    In recent years, the focus of `NLP` research has shifted to more context-aware
    and human-like communications. These developments are finding applications in
    enhancing the capabilities of chatbots and personal digital assistants, making
    them interact like humans. Other `NLP` areas that are gaining momentum are explainable
    `NLP`, bias mitigation, and ethical considerations of `NLP` programs.


    Generally, the training of `NLP` models can consume a considerable amount of resources,
    requiring a huge text corpus for training and other software and hardware computing
    resources. The efforts are for developing low-resource language processing capabilities.
    Another focus area is automatic multilingual language processing. These recent
    developments are shaping to improve the way machines comprehend and interact with
    human language. The following are some examples of notable `NLP` trends.


    ## 1.5.1 Transfer Learning: Advantages of Pre-Training


    Pre-trained models (or transfer learning models) are deep learning models that
    are trained on a huge corpus of data, which may be the data available on the entire
    accessible Internet. In other words, the models have learning stored in them in
    the form of deep learning parameters of weights, biases, and maybe other tunable
    parameters. This learning can be transferred to the other use cases as well by
    simply changing the last couple of layers in the original neural network architecture.
    This arrangement saves the model training time and the training data for the new
    uses. It’s a huge saving on the overall resources as such. This phenomenon is
    popularly called transfer learning. They are complex pre-trained deep learning
    models with uses in multiple use cases.


    Transfer learning has revolutionized the `NLP` domain. They allow the model developers
    to transfer the pre-learned knowledge to other tasks, even if the tasks differ
    from those at the original training time. `BERT`, `ELMo`, `GPT`, `ERNIE`, `ELECTRA`,
    and `RoBERTa` are some of the popular pre-trained `NLP` models. These models were
    pre-trained on large corpora of text and other data and can be fine-tuned for
    other, more specific tasks. These models save huge time and resources for `NLP`
    programmers as they can eliminate the need to develop and train the `NLP` model
    code from scratch. Such pre-trained models require less labeled data for training
    while hugely saving on computing resources like memory, storage, and CPU power.
    These pre-trained models are attractive options for developers for specific tasks
    like language translation, chatbots, social media sentiment analysis, topic modeling,
    and text summarization. Figure [1-8](#649581_1_En_1_Chapter.xhtml#Fig8) compares
    transfer learning with the traditional approach.


    ![Flow chart titled "Machine Learning vs. Transfer Learning" illustrating two
    processes. The first process starts with "Problem Identification," leading to
    "Data Collection," "Model Training," "Model Evaluation," and "Deployment." The
    second process begins with "Problem Identification," followed by "Pre-trained
    Model Selection," "Adaptation to New Task," "Model Evaluation," and "Deployment."
    Each step is connected by arrows, indicating the flow of tasks.](images/649581_1_En_1_Chapter/649581_1_En_1_Fig8_HTML.jpg)


    **Figure 1-8** Traditional machine learning and pre-trained models


    `Wang et al. (2022)` have given a complete review of the methods and frameworks
    of transfer learning models. They first give a short introduction to transfer
    learning models, which is followed by representative methods and applicable frameworks.
    This paper then goes on to analyze the effects and challenges of transfer learning
    models. Finally, the paper briefly concludes by reporting future research trends
    in the domain of pre-trained or (transfer learning models).


    ## 1.5.2 LLMs: Human-like Interactions


    A large number of research papers are available that discuss the applications
    of `LLMs`, like `ChatGPT`, in education, medicine, and many other domains. Not
    surprisingly, almost everyone around knows about `ChatGPT`, and there is a large
    probability that they might have even used it for their benefit. `Enkelejda et
    al.` discuss specifically the current state of `ChatGPT` (and related software)
    and its applications in the education domain. They discuss how `ChatGPT` can be
    used to develop quality educational content that can improve student engagement
    and interaction and provide more personalized learning experiences. The paper
    argues that, before using it, students and teachers must understand about the
    limitations and (at times) unanticipated brittleness of such systems. Continuous
    human oversight is necessary to deal with the expected bias of output from such
    `LLMs`. The paper finally concludes with recommendations for how to resolve the
    common challenges posed by `LLMs`.


    By definition, `LLMs` are complex deep learning models that can understand and
    generate human language text. They can interact just like humans and can talk
    on almost any subject under the sun, though they can make serious mistakes at
    times (called hallucination). `LLMs` are trained on huge datasets, so the name
    is large. The size of `LLM` training datasets can range from a thousand to a million
    gigabytes or even larger. `LLMs` can be further trained via tuning: they can be
    fine-tuned to a particular task or domain. For example, `LLMs` can be fine-tuned
    to perform finance, healthcare, or education-related tasks. `LLMs` can be used
    in almost every domain, including chatbots, sentiment analysis, customer service,
    DNA research, and online search.


    Some examples of popular `LLMs` include GitHub’s `Copilot`, OpenAI’s `ChatGPT`,
    `Bard` from Google, `Llama` from Meta, and Microsoft’s `Bing Chat`. More specific
    tasks that these `LLMs` can perform include text generation, summarization, translation,
    question answering, code generation (`Copilot`), and sentiment analysis.'
