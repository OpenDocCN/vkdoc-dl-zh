    ‘VERB’, ‘PRON’, ‘VERB’, ‘PART’, ‘VERB’, ‘ADP’, ‘DET’, ‘NOUN’, ‘PUNCT’] PRON (Pronoun):
    ‘She’, ‘her’, ‘they’ CCONJ (Coordinating Conjunction): ‘and’ NOUN (Noun): ‘spouse’,
    ‘holiday’ VERB (Verb): ‘decided’, ‘needed, ‘go’ PART (Particle): ‘to’ ADP (Adposition):
    ‘on’ DET (Determiner): ‘a’ PUNCT (Punctuation): ‘.’


    *   Dependencies: (‘She’, ‘nsubj’): ‘She’ is the nominal subject of the main verb
    ‘decided’. (‘and’, ‘cc’): ‘and’ is a coordinating conjunction linking ‘She’ and
    ‘her spouse’. (‘her’, ‘nmod:poss’): ‘her’ is a possessive modifier for ‘spouse’.
    (‘spouse’, ‘conj’): ‘spouse’ is a conjunct connected to ‘She’ by ‘and’. (‘decided’,
    ‘root’): ‘decided’ is the main verb (root) of the sentence. (‘they’, ‘nsubj’):
    ‘they’ is the subject of the embedded verb ‘needed’. (‘needed’, ‘ccomp’): ‘needed’
    is a clausal complement of ‘decided’. (‘to’, ‘mark’): ‘to’ is a marker for the
    infinitive verb ‘go’. (‘go’, ‘xcomp’): ‘go’ is an open clausal complement of ‘needed’.
    (‘on’, ‘case’): ‘on’ is a preposition marking the case of ‘holiday’. (‘a’, ‘det’):
    ‘a’ is a determiner for ‘holiday’. (‘holiday’, ‘obl’): ‘holiday’ is the oblique
    object of the preposition ‘on’. (‘.’, ‘punct’): ‘.’ is punctuation marking the
    end of the sentence.


    Having this information in your folds, you can now apply RST principles and manually
    complete the process of RST. More advanced tools are available to complete the
    RST process for you. Stanza provides valuable syntactic information. However,
    an end-to-end RST analysis would need additional steps or tools to explicitly
    categorize and recognize the rhetorical relationships between different text parts.
    To this date, a Python library for RST is unavailable to our knowledge.'
