    ''22nd'', ''street'', '','', ''downton'', '','', ''and'', ''42nd'', ''street'',
    ''.'', ''"'', ''#marvelous'', ''@Rita'', ''"'']

    ```


    - Please note: Punctuation marks like `!`, `,`, and `.` are preserved as separate
    tokens.

    - Hashtags (`#marvelous`) and mentions (`@Rita`) are preserved as distinct tokens.

    - `Mr.Johnson` is kept intact.

    - These are examples to put an emphasis on the fact that `TweetTokenizer` is specifically
    tailored for the nuances of social media text.


    ### MWE Tokenizer


    A multi-word expression (MWE) tokenizer handles sequences of words that act as
    a single unit in the input text. Examples include idiomatic phrases, compound
    nouns, and fixed expressions that can be misunderstood if tokenized into separate
    words. Treating these expressions as single tokens preserves their intended meaning
    and helps in accurate text analysis. Listing [5-1](#649581_1_En_5_Chapter.xhtml#PC6)
    is a text demo of this tokenizer with a reusable function.


    ```

    from nltk.tokenize import MWETokenizer

