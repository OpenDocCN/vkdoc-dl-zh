    ### 4.2.6 词频分布


    词频分布（WFD）是指统计输入文本语料库中每个单词出现的频率。WFD 有助于理解不同单词的重要性，也有助于发现文本中的趋势。通过分析 WFD，分析师可以深入了解文本的内容和主题。


    在实际应用中，WFD 被用于各种 NLP 预处理任务，例如关键词提取、主题建模和情感分析。我们将在本书后面讨论这些新引入的术语。通过了解输入文本语料库中的
    WFD，我们可以突出显示该输入文本文档中包含的重要概念或术语。比较不同输入文本中的词频，可以揭示它们在词汇和风格上的差异（见图 4-3）。


    ![流程图标题为“词频分布过程”，展示了四个步骤：\n\n1. “输入文本”，带有一个文档图标，描述为提供用于分析的初始文本。\n2. “分词”，带有一个文字文档图标，将文本分割成单个单词。\n3.
    “频率计数”，带有一个虚线圆圈图标，表示统计每个单词出现的次数。\n4. “频率分布”，带有一个柱状图图标，将统计的频率组织成分布。\n\n 每个步骤都由一个指向下一步的箭头表示，突出了顺序过程。](img/649581_1_En_4_Fig3_HTML.jpg)


    图 4-3


    使用 `nltk` 进行 WFD


    我们可以使用 `NLTK FreqDist` 类为单词列表创建频率分布，并分析给定文本语料库中最常出现的单词。此功能主要用于处理大型文本语料库并提取其中包含的有意义的模式。代码清单
    4-6 是 WFD 的代码演示。你可以直接在 NLP 数据预处理任务中使用此代码。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    import nltk

    from nltk.probability import FreqDist

    from nltk.tokenize import word_tokenize

    nltk.download(''punkt'')

    def word_frequency_finder(text):

    """

    计算 WFD。

    参数：

    text (str)：输入文本。

    返回：

    FreqDist：给定输入单词的 WFD。

    """

    # 对文本进行分词。

    words = word_tokenize(text)

    # 创建 WFD。

    freq_dist = FreqDist(words)

    return freq_dist

    # 此代码的输出未包含，因为它不相关。

    # 创建示例文本。

    sample_text = """

    In practical applications, WFDs are used in various NLP pre-processing tasks

    like keyword extraction, topic modeling, and sentiment analysis. We will talk

    about these newly introduces terms later in this book.

    """

    # 计算 WFD。

    frequency_distribution = word_frequency_finder(sample_text)

    # 打印输出。

    for word, frequency in frequency_distribution.items():

    print(f"Word: {word}, Frequency: {frequency}")

