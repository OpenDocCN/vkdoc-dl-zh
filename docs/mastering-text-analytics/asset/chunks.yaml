- fmt: '#### Input and Output with Serialization in LangChain and OpenAI


    Listing [8-12](#649581_1_En_8_Chapter.xhtml#PC16) shows how to save and reload
    a setup for a language model (an AI that understands and generates text). It uses
    a tool called LangChain and OpenAI’s API to do the following.


    1.  Create a task where the AI translates English text into French.

    2.  Save the setup (like a recipe) into a file so it can be reused later.

    3.  Load the saved setup back from the file.

    4.  Test the loaded setup by asking the AI to translate a sentence.


    It’s like writing down a recipe, storing it, and then using it again later to
    cook the same dish!


    ```python

    # Read the open ai API key from your text file

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    import json

    from langchain.prompts import PromptTemplate

    from langchain_openai import ChatOpenAI

    from langchain.schema.runnable import RunnableSequence

    # Step 1: Provide your OpenAI API key

    #api_key = "your_openai_api_key_here"  # Replace with your actual OpenAI API key

    # Step 2: Initialize the ChatOpenAI model

    llm = ChatOpenAI(model="gpt-3.5-turbo", temperature=0, openai_api_key=api_key)

    # Step 3: Create a prompt template

    prompt = PromptTemplate(

    input_variables=["text"],

    template="Translate this to French: {text}"

    )

    # Step 4: Create a RunnableSequence (replaces LLMChain)

    chain = prompt | llm

    # Step 5: Serialize the RunnableSequence manually

    serialization_path = "llm_chain.json"

    # Save the necessary configuration parameters for reconstruction

    chain_dict = {

    "llm": {

    "model": "gpt-3.5-turbo",

    "temperature": 0,

    "openai_api_key": api_key

    },

    "prompt": {

    "template": prompt.template,

    "input_variables": prompt.input_variables

    }

    }

    with open(serialization_path, "w") as f:

    json.dump(chain_dict, f)

    print("Serialized RunnableSequence saved to llm_chain.json.")

    # Step 6: Load the serialized data

    with open(serialization_path, "r") as f:

    chain_data = json.load(f)

    # Step 7: Reconstruct the RunnableSequence manually

    # Recreate the ChatOpenAI instance

    loaded_llm = ChatOpenAI(

    model=chain_data["llm"]["model"],

    temperature=chain_data["llm"]["temperature"],

    openai_api_key=chain_data["llm"]["openai_api_key"]

    )

    # Recreate the PromptTemplate instance

    loaded_prompt = PromptTemplate(

    input_variables=chain_data["prompt"]["input_variables"],

    template=chain_data["prompt"]["template"]

    )

    # Recreate the RunnableSequence

    loaded_chain = loaded_prompt | loaded_llm

    print("Loaded RunnableSequence successfully!")

    # Step 8: Use the loaded chain to process input

    input_text = {"text": "Hello, how are you?"}

    output = loaded_chain.invoke(input_text)

    # Extract only the main content from the output

    if isinstance(output, dict) and "content" in output:

    output_text = output["content"]

    else:

    output_text = output.content if hasattr(output, "content") else str(output)

    # Step 9: Print concise output

    print(f"Output: {output_text}")

    Serialized RunnableSequence saved to llm_chain.json.

    Loaded RunnableSequence successfully!

    Output: Bonjour, comment vas-tu ?

    Listing 8-12

    Input and Output with Serialization in LangChain and OpenAI

    ```


    ### 8.4.5 Customizing Model Inputs and Handling Outputs


    Customizing inputs and handling outputs goes much beyond simple parsing. While
    the focus of the LLM parsing process is to break inputs and outputs (to and from
    LLMs) into structured formats, customization focuses on adapting inputs and outputs
    to meet precise goals. Customization of LLM inputs involves shaping prompts for
    clarity, relevance, and context. This involves adding comprehensive instructions
    and utilizing examples to guide the model, or it can involve formatting text for
    improved understanding. For example, while processing a user query to LLM for
    summarizing a piece of text, the customization process can include key points,
    or it can specify word limits in the prompt itself to ensure more accurate results.
    Customization goes much beyond parsing, which is discussed in the previous section.
    The precise goal of customizing inputs and outputs for LLMs is to craft them to
    guide the model efficiently toward the anticipated result with the desired information
    in the desired format. For instance, LLM-driven chatbots may need trimming of
    output to fit the designed character limits. The customization process, in this
    case, may even rephrase the output to maintain the desired consistency in tone.
    Similarly, applications like report generators often require precise formatting
    of outputs according to structured templates. The input/output customization process
    makes sure that the LLM responses are usable and aligned with the planned purpose.


    Customization and handling often require iterative strategies, where inputs are
    tested and refined based on the output quality. Feedback loops are created to
    find gaps and improve performance. Thoughtful customization of inputs and outputs
    for LLMs can help maximize efficiency for tasks such as text summarization, social
    media sentiment analysis, and customer service. Customization is a comprehensive
    approach that brings accuracy, relevance, and efficiency in leveraging LLMs for
    business and other real-life applications.


    #### Input and Output Customization with LangChain and OpenAI


    The following describes how the Listing [8-13](#649581_1_En_8_Chapter.xhtml#PC17)
    program works.


    1.  **Imports required libraries.** Loads necessary libraries from LangChain to
    interact with OpenAI’s model.

    2.  **Defines a PromptTemplate.** Sets up a prompt template to instruct the model
    on how to summarize a given topic in a specified word limit.

    3.  **Sets up API key.** Prepares the API key for OpenAI access.

    4.  **Creates a LLM (language model) instance.** Initializes OpenAI’s GPT-3.5-Turbo
    model with specific settings like temperature and max tokens.

    5.  **Inputs data.** Defines the `topic` and `word_limit` for the summary.

    6.  **Formats the prompt.** Uses the `PromptTemplate` to insert the `topic` and
    `word_limit` into the prompt.

    7.  **Generates a response.** Sends the formatted prompt to the GPT-3.5 model
    and receives a response.

    8.  **Refines the output.** Processes the model’s response by breaking it down
    into key points for improved readability.

    9.  **Displays the output.** Prints both the formatted input and the refined output
    in bullet points.'
