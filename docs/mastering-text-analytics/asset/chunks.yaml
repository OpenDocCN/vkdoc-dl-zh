- fmt: '### 4.2.2 Stop Word Removal


    Stop word removal involves filtering out commonly used words (in sentences) that
    are often irrelevant to NLP tasks. These words are known as *stop words*. Examples
    of English stop words include “is,” “the,” and “and,” which typically do not contribute
    much to the meaning of sentences. By removing these words, the text analysis process
    can focus on more meaningful words. Removing stop words improves the efficiency
    and effectiveness of text analytics tasks such as text classification and sentiment
    analysis.


    `NLTK` includes a list of English stop words. You can get them at [`https://gist.github.com/sebleier/554280`](https://gist.github.com/sebleier/554280).
    Stop words can vary depending on the language and context. The list of stop words
    provided in earlier sentences is a standard set of stop words for English. Stop
    word removal provides a clear advantage by reducing the dimensionality of text
    data and allows the analyst to focus on the most relevant words for analysis.
    Listing [4-2](#649581_1_En_4_Chapter.xhtml#PC2) is a code demo of stop word removal
    using `NLTK`.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    # Important required libaries.

    import nltk

    from nltk.corpus import stopwords

    from nltk.tokenize import word_tokenize

    # Ensure required resources.

    nltk.download(''stopwords'')

    nltk.download(''punkt'')

    def stopwords_remover(text, language=''english''):

    """

    This functions filters out stop words from the input text.

    Args:

    text (str): The Sample text to remove stop words.

    language (str): The target language.

    Returns:

    list: A list of words with stop words removed.

    """

    # Tokenize the text.

    words = word_tokenize(text)

    # Retrieve the list of stop words for English.

    stop_words = set(stopwords.words(language))

    # Remove stop words.

    ouput_text = [word for word in words if word.lower() not in stop_words]

    return ouput_text

