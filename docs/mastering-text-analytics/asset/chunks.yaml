    #### 使用向量存储与检索器进行文本嵌入搜索


    清单 8-8 所示的程序创建了文本嵌入，将单词表示为数字。它将嵌入存储在向量存储中以便于访问。通过使用向量存储检索器，它可以根据单词的含义找到相关的单词。这展示了人工智能如何高效地理解和比较文本。


    -   **文本嵌入**：使用模型将“car”和“bicycle”等单词转换为数字。

    -   **向量存储**：保存这些数字以供将来搜索。

    -   **向量存储检索器**：查找与“automobile”等查询最接近的匹配项。

    -   **目的**：展示人工智能如何使用嵌入和向量搜索来连接相关单词。


    ```

    # 安装将文本转换为数字（嵌入）所需的库。

    # !pip install sentence-transformers

    # FAISS（Facebook AI 相似度搜索）是一个用于高效相似度搜索和密集向量聚类的库。

    # 安装针对 CPU 使用优化的 FAISS 库

    # !pip install faiss-cpu

    # 在不支持符号链接的环境（如 Windows）中使用 Hugging Face 模型时，抑制特定警告。

    import os

    os.environ["HF_HUB_DISABLE_SYMLINKS_WARNING"] = "1"

    # 导入必要的库

    from sentence_transformers import SentenceTransformer  # 用于创建文本嵌入

    from langchain.vectorstores import FAISS  # 用于创建和管理向量存储

    from langchain.schema import Document  # 用于创建 Document 对象

    from langchain.embeddings import HuggingFaceEmbeddings  # 使用 HuggingFace 进行嵌入

    # 步骤 1：使用 HuggingFaceEmbeddings 创建文本嵌入模型

    embedding_model = HuggingFaceEmbeddings(model_name="sentence-transformers/all-MiniLM-L6-v2")

    # 示例文本数据

    texts = ["car", "vehicle", "train", "bicycle", "airplane"]  # 要嵌入和比较的单词

    # 步骤 2：将文本转换为 Document 对象

    documents = [Document(page_content=text) for text in texts]  # 将文本包装在 Document
    对象中

    # 步骤 3：使用 HuggingFaceEmbeddings 创建向量存储

    vector_store = FAISS.from_documents(documents, embedding_model)  # 使用嵌入创建向量存储

    # 步骤 4：使用向量存储检索器

    query = "automobile"  # 用于查找相关术语的输入

    query_embedding = embedding_model.embed_documents([query])  # 为查询创建嵌入

    # 步骤 5：使用检索器通过 `invoke`（未弃用）获取相关文档

    retriever = vector_store.as_retriever()  # 从向量存储初始化检索器

    results = retriever.invoke(query)  # 使用 invoke 查找匹配项（替代 get_relevant_documents）

    # 步骤 6：显示结果

    print(f"Query: {query}")

    print("Top matches:")

    for result in results:

    print(result.page_content)  # 打印匹配的文档内容

    OUTPUT:

    Query: automobile

    Top matches:

    car

    vehicle

    bicycle

    airplane

    清单 8-8

    使用向量存储与检索器进行文本嵌入搜索

    ```


    多查询检索器通过创建输入的多个查询变体来提高搜索精度，而上下文压缩则通过总结输入来高效处理长上下文。以下是简要说明。


    -   **多查询检索器** 通过生成查询的多样化版本来帮助提高搜索精度。例如，如果用户输入查询是“Best books”，多查询检索器也会生成相关的版本，如“Top
    books to read”或“Popular books”。此过程有助于获得更完整的搜索结果。这就像用多种方式询问同一个问题，以便从 LLM 中获得最佳答案。

    -   **上下文压缩** 压缩长输入文本，使焦点集中在最重要的部分。例如，对于一个十页的输入文档，上下文压缩组件可以将其压缩成几个关键段落。这在因大小限制而无法处理完整文档时特别有用。这类似于为长篇故事撰写摘要以节省时间。


    接下来，让我们分析一个演示程序，展示多查询检索器和上下文压缩的用法。


    #### 使用 LangChain 和 OpenAI 的智能查询助手


    清单 8-9 所示的程序接收一个主要问题，并将其拆分为更小的问题，以便使用多查询检索器找到更好的答案。它还将结果合并压缩成一个简短清晰的摘要。它使用 LangChain
    和 OpenAI 来构建该助手。目标是让搜索更智能、更快速！


    -   将一些示例文本保存在名为 `sample_text.txt` 的文件中。

    -   运行此程序以询问有关该文本的问题。

    -   该程序会检索并总结相关信息，同时提供来源！


    ```

    # 从您的文本文件中读取 OpenAI API 密钥

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    from langchain.chains import RetrievalQAWithSourcesChain

    from langchain.chat_models import ChatOpenAI

    from langchain.vectorstores import FAISS

    from langchain.embeddings.openai import OpenAIEmbeddings  # 导入 OpenAI 的嵌入

    from langchain.text_splitter import RecursiveCharacterTextSplitter

    from langchain.document_loaders import TextLoader

    # 步骤 1：加载一些示例文本数据

    loader = TextLoader(''sample_text.txt'')

    documents = loader.load()

    # 步骤 2：将文本分割成可管理的块

    text_splitter = RecursiveCharacterTextSplitter(chunk_size=500, chunk_overlap=50)

    docs = text_splitter.split_documents(documents)

    # 步骤 3：使用 FAISS 作为检索器，并搭配 OpenAI 嵌入

    embeddings = OpenAIEmbeddings(openai_api_key=api_key)  # 在此处传递 API 密钥

    retriever = FAISS.from_documents(docs, embeddings).as_retriever()

    # 步骤 4：使用 API 密钥设置 ChatOpenAI 模型

    llm = ChatOpenAI(temperature=0, openai_api_key=api_key)  # 在此处传递 API 密钥

    # 步骤 5：组合检索器和模型

    qa_chain = RetrievalQAWithSourcesChain.from_chain_type(

    llm=llm, retriever=retriever, return_source_documents=True

    )

    # 步骤 6：提出一个复杂问题并获得智能答案

    # 将查询作为字典传递，使用正确的键：''question''

    query = {"question": "How does AI help teachers save time in their daily tasks?"}

    result = qa_chain(query)  # 使用正确的输入格式

    # 显示压缩后的答案和来源

    print("Summary Answer:", result[''answer''])

    print("\nSources:", result[''sources''])

    Summary Answer: AI helps teachers save time in their daily tasks by automating
    repetitive tasks such as grading assignments and creating quizzes, allowing educators
    to focus more on teaching. AI chatbots can also assist students by providing instant
    feedback and answering questions, making learning more interactive and engaging.

