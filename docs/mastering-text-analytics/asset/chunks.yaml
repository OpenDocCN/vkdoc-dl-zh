    #### Building Vectors


    The words contained in every tweet are a good pointer of whether they are about
    a real disaster or not. In theory, this is not totally correct. We will still
    use it as our starting point in our first NLP tutorial.


    The following uses scikit-learn’s `CountVectorizer` to count the words in each
    tweet and then turn them into a data format that our machine learning model can
    understand. A vector is, in this context, a set of numbers that a machine learning
    algorithm can understand. The example shows the related code, its usage, and output.


    ```

    demo_text = ["Stella is a good girl. She loves to swim"] # Demo sentence

    count_vectorizer = feature_extraction.text.CountVectorizer() # Instrantiate CountVectorizer()

    count_vectorizer.fit(demo_text) # Fit the demo text

    print(count_vectorizer.vocabulary_) # Print results

    {''stella'': 5, ''is'': 2, ''good'': 1, ''girl'': 0, ''she'': 4, ''loves'': 3,
    ''to'': 7, ''swim'': 6}

    # encode document

    demo_vector = count_vectorizer.transform(demo_text)

    print(demo_vector.shape)

    print(demo_vector.toarray())

    (1, 8)

    [[1 1 1 1 1 1 1 1]]

    ```


    There are eight number elements in the vector representing `demo_text` `[[1 1
    1 1 1 1 1 1]]` (0 to 7) and the number of distinct words is also eight.


    All the entries in the vector are 1 as no word in the `demo_text` is repeating
    (frequency of all words is 1).


    For more information on `CountVectorizer` in Python, see [`https://www.educative.io/answers/countvectorizer-in-python`](https://www.educative.io/answers/countvectorizer-in-python).


