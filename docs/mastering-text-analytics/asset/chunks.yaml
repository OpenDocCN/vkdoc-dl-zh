    ### 4.4.3 文本摘要


    文本摘要主要用于在不完全阅读长篇文章、报告或文档的情况下，快速理解其要点。这是新闻、法律工作和学术研究等领域的一项关键技能。摘要功能在聊天机器人、推荐引擎和新闻聚合器等自动化系统中日益成为核心。在所有这些应用中，提供简洁的信息至关重要。摘要面临的挑战是准确识别最相关的内容，以保持文本摘要的上下文恰当性。代码清单
    4-15 展示了自动文本摘要的代码示例。


    ```

    # 如果尚未安装 sumy，请先安装。

    !pip install sumy

    # 导入所需的库。

    from sumy.parsers.plaintext import PlaintextParser

    from sumy.nlp.tokenizers import Tokenizer

    from sumy.summarizers.lsa import LsaSummarizer

    def text_summarizer(text, sentence_count=2):

    """

    使用 LSA 算法对输入文本进行摘要。

    参数：

    text (str)：输入文本。

    sentence_count (int)：最终摘要中包含的句子数量。

    返回：

    str：摘要后的文本。

    """

    parser = PlaintextParser.from_string(text, Tokenizer("english"))

    summarizer = LsaSummarizer()

    summary = summarizer(parser.document, sentence_count)

    return '' ''.join(str(sentence) for sentence in summary)

    def main():

    # 示例文本

    sample_text = """ 文本摘要主要用于在不完全阅读长篇文章、报告或文档的情况下，快速理解其要点。文本摘要是新闻、法律工作和学术研究等领域的一项关键技能。摘要功能在聊天机器人、推荐引擎和新闻聚合器等自动化系统中日益成为核心。在所有这些应用中，提供简洁的信息至关重要。摘要面临的挑战是准确识别最相关的内容，以保持文本摘要的上下文恰当性。以下是自动文本摘要的代码演示。

    """

    # 生成摘要

    summary = text_summarizer(sample_text)

    print("原始文本：")

    print(sample_text)

    print("\n 摘要：")

    print(summary)

    if __name__ == "__main__":

    main()

