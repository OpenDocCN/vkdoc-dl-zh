- fmt: "### 8.3.1 Setting Up the Environment\n\nBefore you use `LangChain` to work\
    \ with OpenAI functions, a suitable environment for development purposes needs\
    \ to be created. The following four simple steps serve as a guide for you to create\
    \ a Python environment with the required libraries installed.\n\n1. **Create a\
    \ virtual environment for your project.**\n\n   First, you need to navigate to\
    \ the project folder on your Windows machine and create the virtual environment\
    \ using the following environment.\n\n   Activate the environment using the following\
    \ command on the prompt.\n\n   **Windows:** `myenv\\Scripts\\activate`\n\n   **macOS/Linux:**\
    \ `source langchain-env/bin/activate`\n\n   We use the Anaconda Python distribution,\
    \ so we executed these commands on the Anaconda Prompt.\n\n2. **Install required\
    \ packages.** Run the following command on the prompt to install `LangChain` and\
    \ OpenAI Python client. All the following commands are run the same way.\n\n3.\
    \ **Get an OpenAI key.** An OpenAI key is required to seamlessly interact with\
    \ the OpenAI models. Follow these steps.\n   1. Open an OpenAI account on the\
    \ OpenAI official website.\n   2. Navigate to the API section on your dashboard,\
    \ where you can generate and also manage your OpenAI API keys.\n   3. Keep these\
    \ API keys for security reasons.\n\n4. **Set the API key in the required environment.**\
    \ To get the OpenAI API keys, follow these simple steps.\n   1. Hardcoding the\
    \ API key into your code is not advisable for the security and integrity of your\
    \ newly created key.\n   2. The best practice is to set your API key as an environment\
    \ variable as follows.\n   3. Execute the following commands on your terminal.\
    \ It temporarily sets the environment variable for the existing terminal session.\n\
    \n   **Windows**: `set OPENAI_API_KEY=′my-openai-api-key′`\n\n   **macOS/Linux**:\
    \ `export OPENAI_API_KEY=′my-openai-api-key′`\n\nCongratulations! Now, you are\
    \ ready to create your favorite application using `LangChain` and OpenAI models.\
    \ We develop the following sections step by step to create your dream AI applications.\n\
    \n## 8.4 Model I/O: Easily Interface with Language Models\n\nModel input/output\
    \ (I/O) serves as a framework within the `LangChain` system. It provides a structured\
    \ approach to interacting with LLMs, such as OpenAI and others. Model I/O controls\
    \ the flow of data to and from the models. It includes preparing input prompts\
    \ and processing model outputs. This section focuses on the basic functions and\
    \ syntax of `LangChain` to demonstrate how to create input prompt requests and\
    \ handle the model outputs effectively. Advanced techniques like few-shot prompt\
    \ templates are also covered. Few-shot prompt templates improve model responses\
    \ by providing contextual examples. Additionally, we discuss serialization methods\
    \ for efficiently saving and loading prompts. By mastering these tools, you can\
    \ build more robust and flexible applications that leverage the full potential\
    \ of advanced AI models like ChatGPT from OpenAI.\n\n`Listing [8-4](#649581_1_En_8_Chapter.xhtml#PC5)`\
    \ is our first demo program portraying `LangChain` with OpenAI chat models. Chat\
    \ models are more popular, so we are taking it as our first demo program."
