    def split_by_character(text):

    return list(text)  # 将字符串转换为字符列表

    # 演示拆分结果

    print("\n--- 按句点（句子）拆分 ---")

    print(split_by_sentence(document_text))

    print("\n--- 按令牌（单词）拆分 ---")

    print(split_by_word(document_text))

    print("\n--- 按字符拆分 ---")

