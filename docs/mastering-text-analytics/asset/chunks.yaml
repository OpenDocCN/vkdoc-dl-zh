    [''M_W_E'', ''Tokenizer'', ''is'', ''an'', ''advanced'', ''tokenizer'', ''in'',
    ''Natural_Language_Processing'', ''pre_processing'', ''tasks'']

    Listing 5-1.

    Program to Demonstrate MWE Tokenizer

