    \ = [wsd_example(\"apple\", doc.text) for doc in docs_spacy]\nprint(\"WSD Results:\"\
    , wsd_results)\nWSD Results: ['The fruit', 'The tech company', 'The tech company']\n\
    Listing 6-3\nContext-Based Interpretation\n```\n\n## 6.4 词汇语义学\n\n在自然语言处理中，理解词语及其关系属于词汇语义学的范畴。这一概念与确定句子中每个单词的含义相关。词汇语义学还关注词语之间通过同义词、反义词等建立的关系，同时也涉及词语在不同语境中含义的变化。词汇语义学有助于完成诸如词义消歧和机器翻译等自然语言处理任务。词汇语义学在开发能够更准确地处理人类语言（非常类似于人类推理）的算法中起着关键作用。本节讨论词汇语义学的关键概念，如同义词、反义词、同音异义词和多义词。以下描述有意义且简洁。\n\
    \n### 6.4.1 同义词\n\n除了相似的含义之外，同义词在自然语言处理中还有更多作用。自然语言处理支持创建灵活且准确的语言模型。对于每个自然语言处理模型，理解单个词语或短语在不同语境中传达不同思想是必要的。\n\
    \n以下示例展示了单词`\"bright\"`的用法，它在不同情境下可以有不同的含义。\n\n- 语境1：`\"The sun is very \"bright\"\
    \ today.\"`\n- 语境2：`\"Sarah is a \"bright\" student.\"`\n\n在语境1中，`\"bright\"`意为明亮的，而在语境2中，单词`\"\
    bright\"`意为聪明的。\n\n许多实际的自然语言处理任务，例如处理客户交互的自动化应用，需要正确识别不同语境中的同义词，否则可能导致对句子不完整或不准确的解释。同义词在扩展训练数据方面也很有用。可以通过用同义词替换单词来使可用的训练数据多样化，从而泛化机器学习模型。当我们遇到不平衡数据集时，这种数据增强技术非常有用。未能正确识别不同语境中的同义词，可能导致对句子不完整或不准确的解释，从而影响自然语言处理任务（如处理客户交互的自动化应用）。\n\
    \n语音助手和聊天机器人是实际应用，在这些应用中，正确识别同义词对于在人们使用不同词语表达相同意思（即使他们在新语言中使用略有不同的词语）的情况下做出正确响应至关重要。例如，如果一个英文单词如`\"\
    tired\"`被翻译成西班牙语，翻译者可能会根据情况在`\"cansado\"`或`\"agotado\"`之间选择。这两个词都表示累，但它们在不同语境中更合适。\n\
    \n同义词的另一个重要方面是，它们能够通过使用表达相同含义的不同词语来生成多样化的文本。这种灵活性允许应用程序（尤其是创意写作或自动客户回复中的应用程序）创建更多样化和更具吸引力的内容。通过整合一系列同义词，自然语言处理系统可以生成感觉更自然、重复性更低的文本，从而确保生成的文本与预期的语气和风格一致。\n\
    \n另一种处理基于语境同义词的技术是词义消歧。在这种技术中，通过分析语境来确定词语的正确含义，从而选择最合适的同义词。为此，采用计算方法来量化两个词语在含义上的语义相似度。这些方法可用于执行多种自然语言处理任务，如文档聚类和检索。词语的向量表示属于高级自然语言处理模型。这些方法更复杂，有助于理解词语（和同义词）之间的关系，并实现更复杂的语言理解和生成。词语的向量表示将在后续章节中介绍。我们有效地利用这些向量将文本（词语）转换为数值表示，以便在我们的自然语言处理模型中使用。"
