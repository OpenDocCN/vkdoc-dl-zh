    ### 7.3.1 语篇整合技术


    语篇整合下的关键技术包括：指代消解、回指消解、连贯性建模、修辞结构理论、语篇解析、实体追踪、词汇链、主题建模、衔接分析以及时序关系识别。


    指代消解使自然语言处理应用能够将词语与其所指对象联系起来。例如，它能确保“他”、“她”或“它”正确指向对应的人或物。比如在一篇新闻文章中，如果写道“玛丽走进了教室。她坐了下来”，指代消解的任务就是将“她”与玛丽关联起来。另一方面，回指消解则专注于向后的指代关系。它解决诸如“这个”或“那个”等短语与其前文提及内容之间的关联。例如，在句子“我买了一辆新车。这是我最喜欢的机器”中，回指消解将“这”与“车”联系起来。


    连贯性建模就像一根无形的线，帮助保持对话或故事的连贯性和流畅性。想象一下你在读一本书，其中一章描述了一个角色开始冒险。接着，下一章讲述了该角色面临的挑战。连贯性建模有助于将这些章节联系起来，这样你就能跟随旅程而不迷失方向。例如，在聊天机器人中，如果你问“今天天气怎么样？”，然后问“我应该带伞吗？”，连贯性建模能帮助系统理解这两个问题都与天气相关。


    让我们通过一个例子来讨论下一项技术。在一篇文章中，开头段落描述了气候变化的危险，并进一步解释了可能的解决方案。修辞结构理论揭示了第二部分是对第一部分的阐述。修辞结构理论深入解释了对话或文本中不同部分之间的关系。它在解释因果、对比或解释等语言结构时发挥作用。


    让我们研究一下两个朋友之间的对话案例。第一个人可能会问一个问题，另一个人给出答案。语篇解析就是用于将这些内容分割成“问题”和“答案”单元的技术。语篇解析相当于生成对话或文本的蓝图。它将对话或输入文本分解成更小的、有意义的单元，以观察它们如何协同工作。还有几项与语篇整合相关的额外技术，了解它们会很有帮助。本章将简要解释这些技术，并为每项技术关联一个实际案例以便更好地理解。


    实体追踪涉及在整个故事中追踪名词，如人物或事物。例如，在一部悬疑故事中，如果你能正确记住前几章提到的所有嫌疑人及其行为，这会很有帮助。因此，如果第一章讨论了一个名叫约翰的嫌疑人，而另一章谈到了亚历克斯的朋友玛丽，在这个例子中，实体追踪的任务就是将这些细节在整个故事中联系起来，以便机器对叙事有清晰的理解。


    让我们考察一个不同的用例。你正在读一个关于家养狗的故事。词汇链技术用于连接所有相关的词语，如“狗”、“小狗”和“宠物”，这些词可能出现在书的不同部分。保持这种联系有助于你跟上内容，而不会对所谈论的内容感到困惑。词汇链将整个演讲或输入文本中相关的词语连接起来，确保所有内容都围绕同一主题。我们再用另一个例子来讨论主题建模技术。假设你在网上阅读几篇新闻文章。主题建模可以将所有关于气候变化的报道归为一组。这可以帮助你轻松找到并阅读所有关于同一主题的文章。


    在另一个例子中，如果一篇文章先讨论一个问题，然后过渡到解决方案，衔接分析就是帮助机器确保这种转换清晰且合乎逻辑的技术。最后，时序关系识别有助于按照事件发生的顺序（在演讲或文本中）排列事件。在一本历史书中，它有助于将战争和革命等事件按时间顺序排列。例如，它会指出第一次世界大战发生在第二次世界大战之前。


    我们在本节讨论了不少技术。由于篇幅限制，我们可能无法对每一项都进行详细说明。


    ### 7.3.2 语篇整合技术演示


    让我们回顾所有技术，并使用 Python 代码来演示这些过程。


    #### 指代消解（代码演示）


    这些技术大多使用 Python 中流行的自然语言处理库，例如 `spaCy`、`NLTK`、`Transformers` 和 `Gensim` 等。


    以下是每项技术如何通过代码进行演示的简要思路。


    ```python

    # 安装指代消解所需的包。

    # 如果您的系统上未安装 coreferee，请取消注释。

    !python -m pip install coreferee

    # 为 coreferee 包安装英文指代消解模型。

    !python -m coreferee install en

    # 为 spaCy 下载大型英文模型（''en_core_web_lg''）。

    # 该模型包含词向量，对于命名实体识别和词性标注更准确。

    # 它比小型模型（如 ''en_core_web_sm''）更大、更强大，但可能占用大量内存。

    # 我们并未在主代码体中加载它，但如果没有这一步，代码会报错。

    # 因此这是一个必需的步骤。

    !python -m spacy download en_core_web_lg

    # 忽略警告的代码。

    import warnings

    warnings.filterwarnings("ignore", category=FutureWarning)

    # 导入所需包。

    import spacy

    # 加载基于 Transformer 的英文模型。

    # 目前我们先使用它。我们将在后续章节中详细讨论。

    nlp = spacy.load(''en_core_web_trf'')

    """

    将 ''coreferee'' 添加到管道中。

    ''coreferee'' 是 spaCy 的一个扩展，用于识别和链接文本中的指代关系。

    将其添加到管道中，以便在完成分词和句法分析等其他自然语言处理任务后执行指代消解。

    """

    nlp.add_pipe(''coreferee'')

    # 创建用于演示的示例文本。

    sample_doc = nlp(""" Although she was very busy at office work, Mary felt she
    had had enough of it.

    he and her spouse decided they needed to go on a holiday.

    They travelled by train to France because they had enough friends in the country.""")

    print("")

    print("OUTPUT \n")

    sample_doc._.coref_chains.print()

    OUTPUT

    0: she(2), Mary(10), she(12), She(20), her(22)

    1: work(8), it(17)

    2: [She(20); spouse(23)], they(25), They(34), they(41)

    3: France(39), country(47)

    ```


    输出结果看起来不太容易理解。第一行输出（索引 0）告诉我们，代词 `she(2)`、`she(12)`、`She(20)` 和 `her(22)` 都指向同一个名字
    `Mary(10)`。类似地，第二行（索引 1）让我们明白 `it(17)` 代表 `work(8)`。在索引 2 位置，`they(25)`、`They(34)`、`they(41)`
    指向 `[She(20); spouse(23)]`。最后，在索引 3 处，`country(47)` 代表 `France(39)`。请注意，在此输出中，`sample_doc`
    中的所有代词都被解析为其对应的专有名词（指代消解过程）。

