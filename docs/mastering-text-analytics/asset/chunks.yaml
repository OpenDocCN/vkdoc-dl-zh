    #### LSA 的代码演示


    清单 7-2 是使用简化文本语料库的 LSA 代码演示。在此演示中，我们使用了 TF–IDF 矩阵。


    ```python

    # 以下是 LSA 的简化代码演示

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    from sklearn.feature_extraction.text import TfidfVectorizer

    from sklearn.decomposition import TruncatedSVD

    # 示例通用文本语料库

    documents = [

    "The cat sat on the mat.",

    "Dogs are great companions.",

    "The sun is bright today.",

    "Cats and dogs are popular pets.",

    "The weather is nice for a walk."

    ]

    # 步骤 1：数据清洗与格式化以进行分析，

    # 由于数据已清洗，跳过此步骤。

    # 步骤 2：构建 TF-IDF 矩阵

    vectorizer = TfidfVectorizer()

    tfidf_matrix = vectorizer.fit_transform(documents)

    # 步骤 3：应用 SVD 降维

    svd = TruncatedSVD(n_components=2)

    lsa_matrix = svd.fit_transform(tfidf_matrix)

    # 步骤 4：分析结果

    # 创建 DataFrame 以便查看

    lsa_df = pd.DataFrame(lsa_matrix, columns=[''概念 1'', ''概念 2''])

    print("降维后的结果（潜在概念）：")

    print(lsa_df)

    降维后的结果（潜在概念）：

    概念 1       概念 2

    0  6.263182e-01  1.932910e-16

    1 -4.140572e-16  8.096747e-01

    2  7.173435e-01 -7.926662e-15

    3 -1.891549e-16  8.096747e-01

    4  6.985829e-01  8.989044e-15

    清单 7-2

    LSA 代码演示

    ```


    我们来解读这个输出矩阵。


    - 在输出矩阵中，行代表各个文档。

    - 列代表潜在概念或主题。

    - 数值表示每个文档与这些概念之间的关联强度。

    - 负值表示该文档与该概念（列）缺乏相关性。

    - 高值表示该文档（行）与该概念（列）的相关性更强。

    - 第一个和第三个文档（第 1 列）显示高值，表明它们与概念 1 有很强的相关性。

    - 第二个文档（第 2 列）有一个显著的值，表明它与概念 2 有很强的相关性。

    - 两列中的其他文档相关性较低。

    - 第一个和第三个文档可能共享一个主题。

    - 第二个文档涉及一个不同的主题。

    - 较高的分数表示文档之间的主题相似性，有助于聚类和主题识别。

    - 查看每个概念中哪些文档具有更高的值，然后检查它们的内容。

    - 然后，你可以根据它们的主题相似性来解码概念 1 和概念 2 代表什么。


    ### 7.4.2 流行的词嵌入


    词嵌入利用大量文本来学习单词之间的关系。流行的词嵌入，如 `Word2Vec`、`GloVe` 和 `FastText`，能够捕捉上下文、相似性和语义细微差别，从而将单词映射为数值向量。这些数值向量本质上捕捉了单词的含义以及单词之间的关系。接下来，我们将这些词嵌入分为传统的和基于上下文词表示的新兴词嵌入，如
    `BERT` 和 `GPT`。


    #### 传统词嵌入


    传统词嵌入将单词映射为固定大小的向量。它们是 NLP 中基于大型文本数据集中单词共现模式的早期技术。传统技术，如 `Word2Vec` 和 `GloVe`，通过分析单词在大型训练数据集中共同出现的频率和上下文，来捕捉单词之间的关系，并以词向量的形式创建单词表示。


    ##### Word2Vec


    `Word2Vec`（词到向量）将单词转换为机器可读的数值向量，这些向量在多维空间中表示特定的单词（作为一个向量）。这些向量帮助机器捕捉单词的含义、语义相似性以及与周围文本的关系。`Word2Vec`
    本质上是一个预训练模型。它利用一个浅层神经网络模型，从大量（训练）文本语料库中获取单词的含义。为了使处理过程快速、高效且透明，`Word2Vec` 神经网络仅使用一个或两个隐藏层。这些神经网络使用大型文本数据库进行训练。`Word2Vec`
    算法使用连续词袋或跳元模型方法来生成词嵌入。


    ###### 连续词袋模型


    连续词袋（CBOW）模型是一种寻找词嵌入的无监督方法。它通过利用目标单词周围的单词（上下文单词）来预测目标单词。为此，它使用了一个浅层神经网络程序（CBOW
    模型）。该程序学习在给定的上下文窗口中，利用目标单词前后出现的单词来预测任何目标单词。通过关注周围的上下文单词，CBOW 模型能够以数值向量（嵌入）的形式捕捉单词（在给定上下文中）的含义。


    例如，在句子 `“he is a great scholar”` 中，如果我们想要单词 “great” 的词嵌入，我们首先取一个上下文窗口。假设这个上下文窗口包含两个单词，那么我们会考虑目标单词
    “great” 之前的两个单词以及之后的两个单词。因此，对于我们的示例句子，上下文单词如下所示。


    - 目标单词 “great” 之前的两个单词 – (“is”, “a”)

    - 目标单词 “great” 之后的两个单词 – (“scholar”)


    利用这个上下文窗口，CBOW 模型学习计算目标单词 “great” 的词嵌入。清单 7-3 是 CBOW 的代码演示，这是一个文档完善的浅层神经网络。

