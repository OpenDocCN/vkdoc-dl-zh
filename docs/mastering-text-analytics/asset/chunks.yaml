  trans: "\n# 1.11 练习\n\n1.  我们在本章中使用分类技术解决了教程问题。尝试应用聚类算法（例如 `k-means`）根据相似性将文本样本组织成簇。\n\
    \    1.  聚类能否帮助识别隐藏模式，或发现训练数据集中的某些主题？\n    2.  进行演示：两组将分别展示他们的分类和聚类结果，并解释其过程以及遇到的任何挑战。\n\
    \    3.  讨论要点\n        1.  文本分类和聚类如何帮助组织数据？\n        2.  在此练习中遇到的主要挑战是什么？\n  \
    \      3.  这些技术如何应用于现实场景？\n\n2.  阅读本章中给出的两个简短商业案例，并准备一个简短的演示，在课堂上讨论以下内容。\n   \
    \ 1.  不同行业中最常用的 NLP 技术有哪些？\n    2.  在每个案例研究中，NLP 如何提高效率和效果？\n    3.  这些行业在 NLP\
    \ 方面有哪些潜在的未来发展？\n\n3.  应用 `TF–IDF`（词频-逆文档频率）并将其应用于 Python 教程问题。你看到结果有任何改进吗？此技术将在后续章节中介绍。\n\
    \n# 2. 为 NLP 项目收集和提取数据\n\n## 2.1 为什么你应该学习 NLP\n\n如今，每个领域的数据可用性都呈爆炸式增长。全球每天产生的平均数据量达数百艾字节。无论以何种标准衡量，这都是一个庞大的数据量，其中美国贡献了相当大的一部分。只有当这些数据被正确分析并最终转化为可执行的行动项时，才对政府和企业有用。在这个数据驱动的世界中，自然语言处理（NLP）是一种推荐工具，它支持各个领域的企业分析基于文本的结构化和非结构化数据。\n\
    \n企业可用的文本数据主要来源通常包括通过社交媒体、客户反馈以及许多其他类似来源的互动。对数据的正确分析通过分析市场趋势来支持更好地了解客户，并最终做出明智的决策。通过实施基于\
    \ NLP 的文本分析技术，公司可以从提高运营效率中受益，并显著支持其战略决策过程。\n\n在企业中有效实施 NLP 可以减少员工和管理层的体力劳动，并提高整体效率。大量文本数据的处理是完全自动化的。成功实施\
    \ NLP 的结果是及早发现潜在问题，然后生成针对动态变化市场所需的最合适的行动项。这减少了整体反应时间，为管理层节省了大量宝贵的时间，这些时间可以分配给其他关键业务活动。\n\
    \n因此，企业可以从 NLP 的预测能力中受益，以预测客户需求和相关的市场变化。公司通过自动生成这些有价值的预见以及由此产生的主动战略调整来获得竞争优势。因此，可以认识到\
    \ NLP 是一个关键工具，它可以生成可操作的商业洞察，有助于在当今快速发展的市场中高效运营并改善公司的利润。\n\n提供一个案例研究或商业示例，说明某知名公司如何通过收集和处理\
    \ NLP 数据获得洞察。\n\n## 2.2 在哪里为 NLP 项目查找数据（文本语料库）\n\n实时的 NLP 商业项目通常利用大量的语言数据。在 NLP\
    \ 社区中，此类数据被称为*文本语料库*。还有一个相关术语：*词汇资源*。让我们讨论一下它是什么，以及它与文本语料库这个术语的关系。\n\n文本语料库是大量书面文本的集合。许多语料库被设计为包含跨不同类别的深思熟虑的内容组合。这种特殊的语料库用于研究不同的专业社会如何使用语言。另一方面，词汇资源类似于词典，有助于理解在不同文本语料库中发现的单词的含义。结合起来，文本语料库和词汇资源提供了一种分析和学习任何语言的综合方法。\n\
    \n文本语料库包含了人类在不同语境中如何使用语言的真实示例。词汇资源提供了文本语料库中包含的单词的定义和解释。两者结合，学习者可以看到单词的实际用法，同时理解单词的含义、它们在实际句子中的用法以及它们之间的关系。这使得语言学习及其分析更加有效。图\
    \ 2-1 展示了一些用于情感分析教程的数据处理技术。我们将在后续章节中定义、讨论和使用这些数据处理技术。敬请期待！\n\n![流程图说明了情感分析的数据预处理。中心框标有“数据预处理技术”，连接到两个主要过程：“数据清洗”和“语言处理”。在“数据清洗”下，步骤包括识别噪声、去除噪声、字符规范化和数据掩码。“语言处理”涉及分词、词性标注、词形还原和命名实体识别。该过程以标有原始数据输入的“源文本”开始，以最终处理输出的“准备文本”结束。](img/649581_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1\n\n一些常见的文本预处理技术顺序\n\n在图 2-1 中，源文本是项目特定的文本语料库，如果项目需要，可以将其与所需的词汇资源一起使用。接下来，让我们讨论概念，并使用\
    \ Python 代码插入它们的实时用法。\n\n本章的主要目标是解释可用于 NLP 项目的文本数据来源。让我们从一些熟悉的例子开始。如果你熟悉 Python\
    \ 中的 `Seaborn` 库，你可能遇到过 `Seaborn` 库中可用的以下一个或多个数据集（不一定是文本）。\n\n- `Tips`\n- `Iris`\n\
    - `Penguins`\n- `Flights`\n- `Diamonds`\n- `Titanic`\n- `Exercise`\n- `MPG`\n\
    - `Planets`\n\n这些是 `Seaborn` 内置的数据集。它们易于加载和使用。让我们考虑清单 2-1 中的 Python 代码；你可能注意到，它不是一个\
    \ 100% 的文本数据集。但这只是一个示例，用于演示上传数据并在后续代码中使用它是多么容易。否则，在正常情况下，你会加载一个 `.csv`、一个 `.xlxs`\
    \ 文件，或使用其他方法（如网络爬虫）来上传数据。与此示例类似，Python 中特定于 NLP 的库（如 `NLTK`）也内置了文本数据（文本语料库），以便在\
    \ NLP 项目中轻松使用。\n\n```\nimport seaborn as sns\ntips = sns.load_dataset(\"tips\"\
    )\nprint(tips.head())\ntotal_bill   tip     sex smoker  day    time  size\n0 \
    \      16.99  1.01  Female     No  Sun  Dinner     2\n1       10.34  1.66    Male\
    \     No  Sun  Dinner     3\n2       21.01  3.50    Male     No  Sun  Dinner \
    \    3\n3       23.68  3.31    Male     No  Sun  Dinner     2\n```\n\n清单 2-1\n\
    \n从 Python `Seaborn` 轻松上传内部数据\n"
- fmt: "# Parallel to the Seaborn Example\n\nParallel to the Seaborn example, let’s\
    \ now discuss some built-in text corpora from the NLTK Python library. You can\
    \ readily use this text data in your analytics (NLP) projects.\n\n`NLTK` is a\
    \ leading NLP platform for building Python programs that work with natural languages,\
    \ such as English, and others. `NLTK` has built-in, easy-to-use interfaces to\
    \ more than 50 corpora and lexical resources. Some popular ones include `Brown`,\
    \ `Gutenberg`, `Reuters`, `Inaugural Address Corpus`, and `WordNet 3.0` (English).\
    \ The following code (Listing [2-2](#649581_1_En_2_Chapter.xhtml#PC222)) deals\
    \ with accessing popular text corpora and lexical resources that are built into\
    \ `NLTK`.\n\n## 2.2.1 Accessing Some Popular NLTK Text Corpora\n\n```\n# You can\
    \ skip this code if you have already installed nltk Python library\n# You can\
    \ run this. I am not including the output here for space saving.\n!pip install\
    \ nltk\n# Once you install nltk, you need to download the data.\n# You can run\
    \ this. I am not including the output here for space saving.\nimport nltk\nnltk.download('all')\n\
    Listing 2-2\nAccessing popular text corpora and lexical resources\n```\n\n## 2.2.2\
    \ Accessing Gutenberg Corpus\n\n```\nfrom nltk.corpus import gutenberg\nprint(gutenberg.fileids())\n\
    ['austen-emma.txt', 'austen-persuasion.txt', 'austen-sense.txt', 'bible-kjv.txt',\
    \ 'blake-poems.txt', 'bryant-stories.txt', 'burgess-busterbrown.txt', 'carroll-alice.txt',\
    \ 'chesterton-ball.txt', 'chesterton-brown.txt', 'chesterton-thursday.txt', 'edgeworth-parents.txt',\
    \ 'melville-moby_dick.txt', 'milton-paradise.txt', ….continued]\n```\n\nThe code\
    \ output represents the collection of file IDs (file identifiers) that are available\
    \ in the Gutenberg text corpus of `NLTK`.\n\nEach file ID represents a text file\
    \ that contains a literary work included in the Gutenberg text corpora.\n\n```\n\
    # This code reads the text of a particular file\nhamlet = gutenberg.words('austen-persuasion.txt')\n\
    print(hamlet[:50])\n['[', 'Persuasion', 'by', 'Jane', 'Austen', '1818', ']', 'Chapter',\
    \ '1', 'Sir', 'Walter', 'Elliot', ',', 'of', 'Kellynch', 'Hall', ',', 'in', 'Somersetshire',\
    \ ',', 'was', 'a', 'man', 'who', ',', 'for', 'his', 'own', 'amusement', ',', 'never',\
    \ 'took', 'up', 'any', 'book', 'but', 'the', 'Baronetage', ';', 'there', 'he',\
    \ 'found', 'occupation', 'for', 'an', 'idle', 'hour', ',', 'and', 'consolation']\n\
    ```\n\nLet's access a few more such text corpora.\n\n## 2.2.3 Accessing Reuters\
    \ Corpus\n\n```\nfrom nltk.corpus import reuters\nfile_ids = reuters.fileids()[:10]\n\
    print(file_ids)\n[....., 'test/14833', 'test/14839', 'test/14840', 'test/14841',\
    \ 'test/14842', ....continued]\n```\n\nCategories in the Reuters corpus are not\
    \ mutually exclusive. We can request the multiple topics covered by many documents.\
    \ We can also request multiple documents included in several categories.\n\n```\n\
    # The corpus procedures can accept a single or a multiple file IDs at a time.\n\
    reuters.categories(['test/14828', 'test/14829'])\n['crude', 'grain', 'nat-gas']\n\
    file_ids = reuters.fileids(['crude', 'grain'])[:10]\nprint(file_ids)\n['test/14828',\
    \ 'test/14829', 'test/14832', ...continued]\nreuters.words('test/14843')[:5]\n\
    ['SUMITOMO', 'BANK', 'AIMS', 'AT', 'QUICK']\nreuters.words(categories=['crude',\
    \ 'grain', 'nat-gas'])\n['CHINA', 'DAILY', 'SAYS', 'VERMIN', 'EAT', '7', '-',\
    \ ...]\n```\n\n## 2.2.4 Accessing Brown Corpus\n\nFor accessing Brown Corpus,\
    \ the following code can be used.\n\n```\nfrom nltk.corpus import brown\ncategories\
    \ = brown.categories()[:5]\nprint(categories)\n[...., 'editorial', 'fiction',\
    \ ...continued]\nsentences = brown.sents(categories=['adventure', 'belles_lettres'])[:2]\n\
    for sentence in sentences:\nprint(' '.join(sentence))\nNorthern liberals are the\
    \ chief supporters of civil rights and of integration .\nThey have also led the\
    \ nation in the direction of a welfare state .\n```\n\n## 2.2.5 Accessing Gutenberg\
    \ Corpus\n\nReuters Corpus has 25,000 free ebooks hosted on its website.\n\nWe\
    \ can run `nltk.corpus.gutenberg.fileids()` to get the file IDs in the corpus.\n\
    \n```\nimport nltk\nfile_ids = gutenberg.fileids()[:3]\nprint(file_ids)\n['austen-emma.txt',\
    \ .... continued]\n# We will take the text — \"Emma by Jane Austen\"\n# We will\
    \ be then named as \"emma_text\".\n# After that we will find out the number of\
    \ words in it.\nemma_text_sample = nltk.corpus.gutenberg.words('austen-emma.txt')\n\
    len(emma_text_sample)\n```\n\n## 2.2.6 Accessing Web and Chat Text\n\nThis corpus\
    \ includes content from a Firefox discussion forum, the movie script for *Pirates\
    \ of the Caribbean*, conversations overheard in New York, customized commercials,\
    \ and reviews of wines.\n\nFor accessing Web and Chat Text, the following code\
    \ can be used.\n\n```\nfrom nltk.corpus import webtext\nfor fileid in webtext.fileids():\n\
    print(fileid, webtext.raw(fileid)[:30], '...')\nfirefox.txt Cookie Manager: \"\
    Don't allow s ...\ngrail.txt SCENE 1: [wind] [clop clop clo ...\n...\n...\npirates.txt\
    \ PIRATES OF THE CARRIBEAN: DEAD ...\nsingles.txt 25 SEXY MALE, seeks attrac old\
    \ ...\nwine.txt Lovely delicate, fragrant Rhon ...\n# A corpus of instant messaging\
    \ chat sessions is also available in nltk\n# This corpus is organized into 15\
    \ files\nfrom nltk.corpus import nps_chat\nchatroom = nps_chat.posts('10-19-20s_706posts.xml')\n\
    first_10_messages = chatroom[123][:10]\nprint(first_10_messages)\n```\n\n## 2.2.7\
    \ Accessing NLTK Lexical Resources\n\nThe following are some key points.\n\n*\
    \   `NLTK` contains multiple lexical resources.\n*   The most significant one\
    \ is `WordNet`.\n*   `WordNet` is a huge lexical database of English.\n*   It\
    \ groups words into multiple sets of synonyms.\n\n    ```\n    from nltk.corpus\
    \ import wordnet as wn\n    synonyms = wn.synsets('book')\n    print(synonyms)\n\
    \    [Synset('book.n.01'), Synset('book.n.02'), ....continued.\n    ```\n\n* \
    \  The output represents a list of synonym sets (called synsets) for the word\
    \ `\"book\"`.\n*   `book` represents the word for which the synonym set is defined.\n\
    *   `n` represents the part of speech (`\"n\"` stands for noun in this specific\
    \ example).\n*   `01` represents the sense number that differentiates the different\
    \ meanings of the word.\n\n    ```\n    # Get definitions and examples. Printing\
    \ only the first five.\n    for i, syn in enumerate(synonyms):\n    if i >= 5:\n\
    \    break\n    print(syn.definition())\n    print(syn.examples())\n    a written\
    \ work or composition that has been published (printed on pages bound together)\n\
    \    ['I am reading a good book on economics']\n    physical objects consisting\
    \ of a number of pages bound together\n    ['he used a large book as a doorstop']\n\
    \    a compilation of the known facts regarding something or someone\n    [\"\
    Al Smith used to say, `Let's look at the record'\", 'his name is in all the record\
    \ books']\n    a written version of a play or other dramatic composition; used\
    \ in preparing for a performance\n    []\n    a record in which commercial accounts\
    \ are recorded\n    ['they got a subpoena to examine our books']\n    ```\n\n\
    *   The output gives the definitions and example sentences for each sense of the\
    \ word *book*.\n*   It is retrieved from `WordNet`.\n*   It also illustrates the\
    \ various contexts in which we can use the word.\n\n*>>> Code Snippet 2-2*\n\n\
    There are many methods available with `NLTK` that deal with basic corpus functionality.\
    \ These methods can be found at `nltk.corpus.reader` and [`www.nltk.org/howto`](http://www.nltk.org/howto).\
    \ You are strongly advised to visit these sites to get full details."
