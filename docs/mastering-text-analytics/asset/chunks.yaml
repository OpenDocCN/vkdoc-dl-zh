    ''roue'', ''origin''}

    Chain 5: {''scholarly_person'', ''bookman'', ''pupil'', ''educatee'', ''student'',
    ''scholar''}

    Chain 6: {''Indiana'', ''atomic_number_49'', ''In'', ''IN'', ''inward'', ''Hoosier_State'',
    ''inch'', ''inwards'', ''indium'', ''in''}

    Chain 7: {''execute'', ''division'', ''incline'', ''family'', ''outpouring'',
    ''bleed'', ''runnel'', ''consort'', ''running_play'', ''bunk'', ''pass'', ''persist'',
    ''social_class'', ''be_given'', ''campaign'', ''run_for'', ''escape'', ''hunt_down'',
    ''discharge'', ''running_game'', ''ply'', ''lam'', ''guide'', ''trial'', ''hightail_it'',
    ''classify'', ''category'', ''go'', ''lead'', ''head_for_the_hills'', ''rivulet'',
    ''sort'', ''rill'', ''lean'', ''carry'', ''unravel'', ''turn_tail'', ''course_of_study'',
    ''melt_down'', ''move'', ''streak'', ''separate'', ''foot_race'', ''political_campaign'',
    ''ravel'', ''fly_the_coop'', ''stratum'', ''scat'', ''race'', ''running'', ''course_of_instruction'',
    ''melt'', ''run_away'', ''scarper'', ''streamlet'', ''function'', ''work'', ''endure'',
    ''draw'', ''hunt'', ''test'', ''black_market'', ''tally'', ''operate'', ''sort_out'',
    ''track_down'', ''play'', ''run'', ''break_away'', ''tend'', ''ladder'', ''form'',
    ''grade'', ''feed'', ''die_hard'', ''footrace'', ''class'', ''flow'', ''assort'',
    ''extend'', ''take_to_the_woods'', ''socio-economic_class'', ''course'', ''year'',
    ''prevail'', ''range''}

    Chain 8: {''atomic_number_2'', ''helium'', ''He'', ''he''}

    Chain 9: {''very'', ''real'', ''really'', ''selfsame'', ''rattling'', ''identical''}

    ```


    The output characterizes lexical chains as groups of semantically related words
    from the input text. Sometimes, you see a couple of unrelated terms (not given
    in the input text) in these lexical chains. This is an example of how lexical
    chaining can bring in terms that aren’t explicitly present but are linked conceptually
    in the word database. The algorithm sometimes needs fine-tuning to limit the chain
    generation to the terms that more closely match your input text.


    # Topic Modeling (Code Demo)


    Topic modeling techniques use word patterns and groupings to identify the key
    themes or topics in a large collection of texts. This chapter presents a simple
    demo of topic modeling using the TF–IDF technique. (We covered this technique
    in earlier chapters.) Professional topic modeling code is often written using
    advanced techniques like Latent Dirichlet allocation (LDA) or non-negative matrix
    factorization. It leverages Python packages like `Gensim` or `scikit-learn`. LDA
    is covered in the upcoming chapters.


    We follow these five simple steps to write our code.


    1.  Prepare documents. Start with a list of text documents you want to analyze.


    2.  Initialize vectorizer. Create a `TfidfVectorizer` object. A TF–IDF score converts
    the input text documents into numerical data. This process ignores stop words.


    3.  Transform text. Use the vectorizer to convert the input text documents into
    a TF–IDF matrix.


    4.  Get feature names. Extract the list of words that were considered in the TF–IDF
    analysis.


    5.  Display scores. For each document, print the words and their TF–IDF scores.


    ```

    from sklearn.feature_extraction.text import TfidfVectorizer

    # Sample text data (documents)

    documents =   ["Although she was very busy with office work, Mary felt she had
    had enough of it.",

    "She and her spouse decided they needed to go on a holiday.",

    "They travelled by train to France because they had enough friends in the country."]

    # Initialize the TF-IDF Vectorizer

    tfidf_vectorizer = TfidfVectorizer(stop_words=''english'')

    # Fit and transform the documents into a TF-IDF matrix

    tfidf_matrix = tfidf_vectorizer.fit_transform(documents)

    # Get the feature names (terms) from the TF-IDF model

    feature_names = tfidf_vectorizer.get_feature_names_out()

    # Display the TF-IDF scores for each document

    for doc_idx, doc in enumerate(documents):

    print(f"\nDocument {doc_idx + 1}: {doc}")

    # Get the TF-IDF scores for each word in the document

    for word_idx in tfidf_matrix[doc_idx].nonzero()[1]:

    print(f"{feature_names[word_idx]}: {tfidf_matrix[doc_idx, word_idx]:.4f}")

    Document 1: Although she was very busy with office work, Mary felt she had had
    enough of it.

    felt: 0.4472

    mary: 0.4472

    work: 0.4472

    office: 0.4472

    busy: 0.4472

    Document 2: She and her spouse decided they needed to go on a holiday.

    holiday: 0.5000

    needed: 0.5000

    decided: 0.5000

    spouse: 0.5000

    Document 3: They travelled by train to France because they had enough friends
    in the country.

    country: 0.4472

    friends: 0.4472

    france: 0.4472

    train: 0.4472

    travelled: 0.4472

    ```


    The output addresses the TF–IDF scores for the words in documents 1, 2, and 3.
    The higher the score, the more relevant the word is to the content of the document.
    In the case of document 2, each of these words has a high score of 0.5000. It
    means all the words are equally important in this document. If a word has a high
    TF–IDF score, it means that the word is exclusive to that document, and it could
    be a strong pointer of its topic or content. Note that this was a simplified analysis.
    Better results can be obtained using advanced techniques like LDA.'
