  trans: '

    # 4.1 为何要阅读本章


    `Natural Language Toolkit`（`NLTK`）是最流行且实用的自然语言处理（`NLP`）平台之一，可用于开发处理自然语言（如英语、德语等）的
    Python 程序。`NLTK` 提供了友好的用户界面，可访问超过 50 个文本语料库及其他词汇资源。`NLTK` 资源包括 `WordNet`，以及一系列文本处理库，这些库可用于文本分类、分词、词干提取、词性标注、句法分析和语义推理。此外，还有一个活跃的讨论论坛，能够提供有力支持，并针对常见技术问题给出解决方案。


    `NLTK` 是免费且开源的。它被语言学家、行业工程师、研究人员、大学生以及教育工作者广泛使用。网络上存在大量支持 `NLTK` 的论坛、教程和示例代码。`NLTK`
    对英语提供了全面支持，但对西班牙语或法语等其他语言的支持并不广泛。


    专业人士通常将 `NLTK` 与其他实用的 Python 库（如开源的 `scikit-learn` 和谷歌开源的 `TensorFlow`）结合使用。这使得能够利用深度学习及其他机器学习算法进行更复杂的语言建模。本章将介绍
    `NLTK`（使用 Python 代码）在数据预处理及其他 `NLP` 任务中的一些应用。在每个案例中，我们都在解释说明与所需 Python 代码之间保持了平衡。


    本章还介绍了一些可以使用 `NLTK` 执行的简单 `NLP` 任务。


    ## 4.2 NLP 数据预处理任务


    `NLP` 数据预处理任务包括为 `NLP` 模型训练准备原始文本数据所需的步骤。预处理任务包括数据清洗、结构化以及转换原始文本，以确保一致性并维持所需的数据质量。这一步使原始文本数据准备好用于模型训练及其他更复杂的
    `NLP` 操作。常见的预处理任务包括分词、去除停用词、词干提取和词形还原。分词将较大的文本块拆分为单个单词或句子。另一项操作——去除停用词，则过滤掉常见但无关的词语。词干提取和词形还原将单词还原为其基本形式或词根形式。这确保了在文本分析过程中，同一单词的多种变体能够被统一处理。


    让我们从使用 `NLTK` 进行分词开始。像往常一样，我们为所有过程都提供了可运行的代码演示。


    ### 4.2.1 使用 NLTK 进行分词


    既然你已经了解了使用 `RegEx` 进行分词的一些知识，你会注意到使用 `NLTK` 进行分词要容易得多。


    分词是 `NLP` 数据预处理中的一个关键过程。它涉及将较大的文本数据分解为较小的单词或句子单元。这一操作进一步有助于识别较大文本块中的有意义元素。


    分词可以在单个单词级别（单词分词）或句子级别（句子分词）进行。分词操作有助于对非结构化的原始文本数据进行适当的结构化，使其更易于处理后续的 `NLP` 任务。清单
    4-1 展示了如何仅用 `NLTK` 中的几步代码来执行分词。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处不包含代码输出。

    import nltk

    from nltk.tokenize import word_tokenize, sent_tokenize

    # 创建示例文本。

    sample_text = """

    我们之前在 RegEx 部分已经讨论过分词。

    分词是 NLP 数据预处理中的一个关键过程。

    它涉及将较大的文本数据分解为较小的单词或句子单元。

    这一操作进一步有助于识别较大文本块中的有意义元素。

    """

    # 首先执行单词级分词。

    words = word_tokenize(sample_text)

    print("单词分词结果:", words)

    # 然后执行句子级分词。

    sentences = sent_tokenize(sample_text)

    print("\n 句子分词结果:", sentences)

