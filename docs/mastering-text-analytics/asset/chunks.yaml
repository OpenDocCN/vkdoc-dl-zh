  raw: '### 9.1.3 Text Embeddings and Vector Databases


    The NLP eco space has been transformed since the advent of text embeddings. Embeddings
    have changed the way machines interpret and process language. Conversion of text
    into high-dimensional numeric vectors helps to capture semantic relationships.
    This facilitates sophisticated text comprehension. NLP applications can’t capture
    contextual meanings using traditional keyword-based searches. But embeddings have
    successfully filled this gap. Text embeddings allow NLP models to retrieve information
    based on intent rather than exact wording. Understanding context becomes indispensable
    when it comes to tasks like semantic search, document similarity analysis, and
    intelligent retrieval systems.


    Vector databases like ChromaDB can efficiently store and manage these text embeddings
    with adequate scaling capabilities. Vector databases help us in enabling quick
    and accurate similarity searches. This makes them best suited for retrieval-augmented
    generation (RAG) systems that are useful in AI-powered assistants and knowledge
    management systems. By integrating LangChain with OpenAI models, developers can
    effortlessly generate, store, and query embeddings for advanced NLP tasks. AI-driven
    applications are still evolving. Text embeddings and vector databases are going
    to have a central role in progressing smart search, recommender systems, and conversational
    AI.


    #### Text Similarity Using OpenAI Embeddings and Cosine Similarity


    Listing [9-4](#649581_1_En_9_Chapter.xhtml#PC4) below dipicts the program for
    Calculating Text Similarity Using OpenAI Embeddings and Cosine Similarity


    ```

    # A simple demo of **text embeddings and similarity search using `OpenAI` embeddings
    **without using ChromaDB.

    # This will show how text embeddings work without requiring a vector database.

    """

    - Program: Text Embeddings & Similarity Search (No ChromaDB)

    - Steps:

    1\. Convert text into **embeddings** using `OpenAI` API.

    2\. Store embeddings in a list (instead of ChromaDB).

    3\. Use **Cosine Similarity** to find similar texts.

    """

    ''\n\n- Program: Text Embeddings & Similarity Search (No ChromaDB)\n- Steps:  \n1\.
    Convert text into **embeddings** using `OpenAI` API.  \n2\. Store embeddings in
    a list (instead of ChromaDB).  \n3\. Use **Cosine Similarity** to find similar
    texts.\n\n''

    # Read the open ai API key from your text file

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    # Importing necessary libraries

    import openai  # OpenAI''s Python client library to interact with its API

    import numpy as np  # NumPy for handling numerical computations and arrays

    from sklearn.metrics.pairwise import cosine_similarity  # Function to compute
    similarity between vectors

    # Set your OpenAI API key (Replace ''api_key'' with your actual API key)

    openai.api_key = api_key  # This allows access to OpenAI''s services

    # Function to generate text embeddings using OpenAI''s embedding model

    def get_embedding(text):

    response = openai.embeddings.create(  # Request embeddings from OpenAI

    model="text-embedding-ada-002",  # Specify the embedding model

    input=[text]  # Input text must be passed as a list

    )

    return np.array(response.data[0].embedding)  # Extract and return the embedding
    as a NumPy array

    # List of sample text data for embedding generation

    texts = [

    "Artificial Intelligence is transforming industries.",  # AI-related sentence

    "Machine learning helps in predictive analytics.",  # ML-related sentence

    "Deep learning is a subset of machine learning.",  # DL-related sentence

    "I love pizza and Italian food."  # Unrelated topic (food preference)

    ]

    # Convert each text in the list into an embedding using the get_embedding function

    embeddings = [get_embedding(text) for text in texts]

    # Convert the list of embeddings into a NumPy array for efficient processing

    embeddings_matrix = np.array(embeddings)

    # Compute cosine similarity between the first text embedding and all other embeddings

    similarities = cosine_similarity([embeddings_matrix[0]], embeddings_matrix)

    # Print similarity scores for each text compared to the first text

    print("Similarity Scores with First Text:")

    for i, score in enumerate(similarities[0]):  # Iterate over similarity scores

    print(f"{i}: {score:.4f} → {texts[i]}")  # Print index, similarity score, and
    corresponding text

    Similarity Scores with First Text:

    0: 1.0000 → Artificial Intelligence is transforming industries.

    1: 0.8563 → Machine learning helps in predictive analytics.

    2: 0.8294 → Deep learning is a subset of machine learning.

    3: 0.7261 → I love pizza and Italian food.

    """

