    # 7.4 分布语义学与词嵌入


    分布语义学通过词语的“同伴”来发现词义。出现在相似语境中的词语，其含义往往相互关联。我们来看一个例子。“医生”和“护士”经常在医院和医疗保健文档中一起出现；我们可以推断它们在含义上是相关的。再看另一个例子：“国王”和“王后”经常出现在与皇室、宫殿或权威相关的语境中。因此，它们被视为相似的词。分布语义学基于**分布假说**，该假说指出：“观其伴，知其意。”


    为了识别词义，每个词都被赋予一个唯一的向量，该向量表现为一串数字。这些**词向量**是通过大量文本数据创建的。如果两个词含义相近，它们的向量就会彼此接近。相似的词，其向量之间的欧几里得距离或余弦相似度（稍后讨论）会更小。有了这些数值形式的词，我们就可以衡量相似性。这些词向量有时与“词嵌入”同义使用。


    让我们来看看词向量（词嵌入）。像“king”、“man”、“woman”和“queen”这些词的词嵌入的实际数值，会根据所使用的词嵌入模型类型而变化。目前有许多词嵌入模型在使用；例如
    `Word2Vec`、`GloVe` 和 `FastText`。为了让你有个概念，我们使用 `king`、`man` 和 `woman` 的假设词嵌入如下。


    *   `king`: 0.6, 0.4, 0.1, –0.2, 0.3, 0.5, –0.10

    *   `man`: 0.3, 0.5, 0.2, –0.1, 0.1, 0.4, 0.00

    *   `woman`: 0.4, 0.3, 0.5, 0.0, 0.2, 0.6, 0.1


    如果你做一个简单的数学运算 `(king – man) + woman`，你会得到 `queen` 的计算值。


    *   `Queen[c]`: 0.7, 0.2, 0.4, –0.1, 0.4, 0.7, 0.0


    计算出的向量 `Queen[c]` 与下面 `queen` 的假设向量 (`Queen[h]`) 非常接近。


    *   `Queen[h]`: 0.7, 0.5, 0.3, 0.1, 0.4, 0.8, 0.2


    这里，我们使用了 `queen ≈ king – man + woman` 这个经典例子，它展示了词嵌入如何通过数学运算捕捉词语之间的关系。词嵌入对于各种自然语言处理任务（如机器翻译和情感分析）非常有用。


    **欧几里得距离** 是空间中两个词向量之间的距离。让我们看一个简单的例子，两个词向量具有如下假设数值。为简单起见，每个词向量只取三个数字。


    *   `king`: [0.8, 0.5, 0.6]

    *   `queen`: [0.7, 0.6, 0.5]

    *   `apple`: [0.2, 0.1, 0.3]


    `king` 和 `queen` 之间的欧几里得距离计算如下。


    ```

    欧几里得距离 (king, queen) = 平方根((0.8−0.7)² + (0.5−0.6)² + (0.6−0.5)²) = 0.173

    ```


    ```

    欧几里得距离 (king, apple) = 平方根((0.8−0.2)² + (0.5−0.1)² + (0.6−0.3)²) = 0.781

    ```


    正如预期的那样，`欧几里得距离 (king, queen)` 小于 `欧几里得距离 (king, apple)`。原因很简单：`king` 和 `queen`
    含义相似，因为两者都属于皇室家族，而 `king` 和 `apple` 含义不同。


    与欧几里得距离类似，余弦相似度也衡量词向量的接近程度或相似程度。欧几里得距离基于计算向量之间的实际距离，而余弦相似度衡量它们之间的角度。**余弦相似度**
    关注的是方向而非大小。让我们通过一个例子来计算两个词之间的余弦相似度。下面使用与之前相同的 `king`、`queen` 和 `apple` 词向量，并采用相同的假设数值。


    以下步骤计算单词 `king` 和 `queen` 之间的余弦相似度。


    *   `king` 和 `queen` 词向量的点积 = `(0.8×0.7) + (0.5×0.6) + (0.6×0.5) = 1.16`

    *   `king` 词向量的模长 = `平方根((0.8)² + (0.5)² + (0.6)²) = 1.118`

    *   `queen` 词向量的模长 = `平方根((0.7)² + (0.6)² + (0.5)²) = 1.049`

    *   余弦相似度 = `1.16 / (1.118 × 1.049) = 0.989`


    类似地，如果我们计算 `king` 和 `apple` 之间的余弦相似度，结果为 `0.933`。请注意，`king` 和 `queen` 的余弦相似度 (`0.989`)
    大于 `king` 和 `apple` 的余弦相似度 (`0.933`)。这表明前者之间的关系比后者更紧密。余弦相似度的取值范围是 –1 到 1。


    *   `1` 表示完全相似（指向同一方向的平行向量）。

    *   `0` 表示不相似（向量正交）。

    *   `–1` 表示完全不相似（向量指向相反方向）。


    余弦相似度常用于信息检索，以评估两个文档或单词在含义上的相关程度。欧几里得距离则常用于文档聚类等自然语言处理任务。


    ## 7.4.1 潜在语义分析


    词嵌入使机器能够逐词处理自然语言。它们将单词转换为机器（通常是计算机）能够理解的数值表示。这样，机器就能更有效地解释和处理语言。多年来，已经出现了多种开发词嵌入的模型，包括
    `Word2Vec` 和 `GloVe`，以及上下文嵌入，如 `BERT` 和 `GPT`。这些方法有助于模拟语言的微妙细微差别，使自然语言处理应用能够识别语义相似性、上下文和更深层次的语言结构。本节将探讨这些技术，从传统的嵌入到最新的进展，以理解它们如何为自然语言处理应用中的语言理解做出贡献。本节讨论潜在语义分析（LSA），这是一种开发词嵌入的基础技术。


    LSA 是一种根据上下文确定单词含义的技术。它检查大型文本语料库，以识别显示单词之间如何关联的模式。这里，*模式* 指的是单词在相似语境中频繁共现的方式。这种频率揭示出，当单词出现在相似语境中时，它们通常传达相关的想法或主题。


    我们可以使用词项-文档矩阵（TDM）或 TF–IDF 矩阵进行 LSA，但它们的用途不同。TF–IDF 更受青睐，因为它有助于 LSA 聚焦于文档中最重要的单词。TF–IDF
    对特殊单词赋予更高的权重，这有助于我们把握主要思想。（TDM 和 TF–IDF 已在本书前面介绍过。）以下步骤使用 TF–IDF 执行 LSA。


    1.  清理并格式化数据以供分析。

    2.  根据清理后的文档构建 TF–IDF 矩阵。

    3.  对 TF–IDF 矩阵应用奇异值分解（SVD），以降低其维度并识别文本中的潜在主题。

    4.  分析结果，以弄清词项-文档关系，并识别突出的主题或话题。

    5.  可视化降维后的矩阵或 LSA 的结果，以更好地理解数据中的模式和含义。

