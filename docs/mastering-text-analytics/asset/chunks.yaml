- fmt: '### Building a Friendly Chat Assistant with LangChain and GPT-3.5-Turbo


    Listing [8-6](#649581_1_En_8_Chapter.xhtml#PC7) is demo code covering the concepts
    covered in this section. This program uses LangChain’s templates to structure
    a conversation with `GPT-3.5-Turbo`. The `SystemMessagePromptTemplate` sets the
    AI’s role as a friendly assistant, while the `HumanMessagePromptTemplate` dynamically
    captures user input. These are combined using a `ChatPromptTemplate` to create
    a full prompt. The AI processes this prompt and generates a clear and concise
    response based on the user’s query.


    ```

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    from langchain.chat_models import ChatOpenAI

    from langchain.prompts.chat import (

    ChatPromptTemplate,

    HumanMessagePromptTemplate,

    SystemMessagePromptTemplate,

    )

    # Initialize the Chat Model

    chat_model = ChatOpenAI(model="gpt-3.5-turbo", temperature=0.7, openai_api_key=api_key)

    # Define the System Message Template

    system_message = SystemMessagePromptTemplate.from_template(

    "You are a friendly assistant that answers questions clearly and concisely."

    )

    # Define the Human Message Template

    human_message = HumanMessagePromptTemplate.from_template("{user_input}")

    # Combine into a Chat Prompt Template

    chat_prompt = ChatPromptTemplate.from_messages([system_message, human_message])

    # Example User Input

    user_input = "What are some fun weekend activities for kids?"

    # Format the Prompt

    messages = chat_prompt.format_messages(user_input=user_input)

    # Get the Model Response

    response = chat_model(messages)

    # Display the AI Response

    print("AI Response:", response.content)

    AI Response: Some fun weekend activities for kids include going to the park, visiting
    a zoo or aquarium, having a picnic, going on a nature hike, going to a children''s
    museum, having a movie or game night at home, or doing a craft or science project
    together.

    Listing 8-6

    Building a Friendly Chat Assistant with LangChain and GPT-3.5-Turbo

    ```


    Let’s now turn to a couple of new concepts.


    - **Document loaders** are deployed to read and load data from files like PDFs,
    Word documents, or web pages. Document loaders reformat the content into a form
    that works with AI models. For example, we can upload a Microsoft Word document
    and use it for question answering applications.

    - **Document integration loaders** integrate data from many documents to create
    a single document. This way, large sets of information can be easily handled in
    one place. For instance, Document Integration Loaders can combine multiple files
    from a folder to generate a single knowledge base for the AI.

    - **Document transformers** process, clean, and maybe reformat the loaded content
    to make it work for the AI. For example, document transformers can be used to
    clean the raw input text, eliminate superfluous parts, or even summarize bigger
    documents. This way helps the AI models to work more proficiently with the data.


    #### Business Data Preparation for AI Applications


    Listing [8-7](#649581_1_En_8_Chapter.xhtml#PC8) examines the demo code for the
    document and data preparation functions. This program reads data from a PDF and
    a text file. It combines the data into one set for easier handling. It processes
    and cleans the data by splitting it into smaller chunks. Finally, the cleaned
    data is ready for AI to use, such as answering questions. This program demonstrates
    how to prepare data for AI use.


    - **Document Loader**: PDF and text files are read using `PyPDFLoader` and `TextLoader`.

    - **Document Integration**: All loaded files are combined into one `list` for
    easy management.

    - **Document transformers**: Data is cleaned and split into manageable chunks
    for AI models.


    ```

    # Install it if not done already.

    #!pip install pypdf

    # Importing necessary libraries

    from langchain.document_loaders import PyPDFLoader  # To load and read PDF files

    from langchain.document_loaders import TextLoader  # To load and read text files

    from langchain.text_splitter import CharacterTextSplitter  # To split text into
    smaller chunks

    # Define a simple text-cleaning function

    def clean_text(text):

    """Remove unnecessary characters and extra spaces."""

    import re

    text = re.sub(r"\s+", " ", text)  # Replace multiple spaces with a single space

    text = re.sub(r"[^a-zA-Z0-9.,!? ]", "", text)  # Remove special characters

    return text.strip()

    # Step 1: Load documents

    pdf_loader = PyPDFLoader("business_report.pdf")  # Replace with your business
    PDF file

    pdf_documents = pdf_loader.load()  # Load and parse the PDF content

    text_loader = TextLoader("meeting_notes.txt")  # Replace with your business text
    file

    text_documents = text_loader.load()  # Load and parse the text file content

    # Step 2: Integrate documents

    all_documents = pdf_documents + text_documents

    # Step 3: Transform documents

    splitter = CharacterTextSplitter(chunk_size=500, chunk_overlap=50)

    transformed_docs = []

    for doc in all_documents:

    chunks = splitter.split_text(doc.page_content)  # Use ''page_content'' instead
    of ''content''

    cleaned_chunks = [clean_text(chunk) for chunk in chunks]  # Clean each chunk

    transformed_docs.extend(cleaned_chunks)

    # Step 4: Use the transformed data for AI (Example: Question Answering)

    print("Transformed and cleaned document chunks ready for AI processing:")

    for doc in transformed_docs[:5]:  # Print a few examples

    print(doc)

    OUTPUT:

    Transformed and cleaned document chunks ready for AI processing:

    Adobe Acrobat PDF Files Adobe Portable Document Format PDF is a universal file
    format that preserves all of the fonts, formatting, colours and graphics of any
    source document, regardless of the application and platform used to create it.
    ............  Compact PDF files are smaller than their source files and download
    a page at a time for fast display on the Web. Step 2 Integrate documents Combine
    the loaded PDF and text documents into a single list.

    Listing 8-7

    Business Data Preparation for AI Applications

    ```


    Let’s go over a few more useful concepts and write a demo program demonstrating
    their use as usual.


    - **Text embeddings** convert words or sentences into numeric vectors. We do so
    as machines (algorithms) need data in number format. For instance, “car” and “vehicle”
    may have similar embeddings or vectors since they are related. AI models consume
    embeddings to compare and analyze text.

    - A **vector store** saves and categorizes embeddings so that AI models can search
    for related meanings. For example, a vector store saves the embedding of “car”
    to find similar terms like “truck” or “automobile.” Vector stores make searching
    text more efficient.

    - A **vector store retriever** discovers similar (matching) vectors from the vector
    store. A vector store retriever helps to search for answers (or related text)
    swiftly. For instance, if you search for the word “train,” it recovers embeddings
    for “railway” or “locomotive.” This process speeds up searches in AI applications.
    Next, we look at a demo program using these concepts.'
