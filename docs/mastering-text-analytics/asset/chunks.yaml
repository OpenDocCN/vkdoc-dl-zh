    ### 7.4.3 Case Studies and Applications


    Let’s examine a business case and demonstrate its code implementation.


    The owner of a large customer service platform (a large e-commerce company) wants
    to analyze incoming customer queries with an aim to improve response times and
    accuracy. He is a technology enthusiast, and he wants to test `BERT` and Hugging
    Face in this customer service application. With the help of this application,
    he wants to categorize customer queries into returns, product inquiries, and complaints.
    It allows him to route specific customer queries directly to the specialized teams.
    He wants to use `BERT` to pick up the context and content of each query and provide
    targeted responses. He hopes with such an implementation, his establishment can
    streamline customer service, cut operational costs, and enable more efficient
    handling of high query volumes.


    Our code demo (Listing [7-8](#649581_1_En_7_Chapter.xhtml#PC18)) does the following
    tasks.


    - Loads pre-trained `BERT` models and tokenizers

    - Tokenizes sample data queries

    - Sets up minimal training to fine-tune `BERT` on sample data

    - Uses fine-tuned model in Hugging Face pipeline for predictions

    - Maps prediction results to defined categories


    ```

    # Code demo for the business case.

    # Install these libraries if not dopne already.

    !pip install transformers torch

    from transformers import BertTokenizer, BertForSequenceClassification, Trainer,
    TrainingArguments, pipeline

    import torch

    from torch.utils.data import DataLoader, Dataset

    import numpy as np

    # Define sample data

    data = [

    {"text": "I want to return my order", "label": 0},  # returns

    {"text": "Can I know the delivery status?", "label": 1},  # product inquiries

    {"text": "My product is defective", "label": 2}  # complaints

    ]

    # Map label indices to categories

    label_map = {0: "returns", 1: "product inquiries", 2: "complaints"}

    # Load pre-trained BERT tokenizer and model

    tokenizer = BertTokenizer.from_pretrained(''bert-base-uncased'')

    model = BertForSequenceClassification.from_pretrained(''bert-base-uncased'', num_labels=3)

    # Tokenize and preprocess data

    class SampleDataset(Dataset):

    def __init__(self, data, tokenizer):

    self.data = data

    self.tokenizer = tokenizer

    def __len__(self):

    return len(self.data)

    def __getitem__(self, idx):

    item = self.data[idx]

    inputs = self.tokenizer(item["text"], truncation=True, padding=''max_length'',
    max_length=32, return_tensors="pt")

    inputs = {k: v.squeeze() for k, v in inputs.items()}  # Squeeze to remove extra
    dimension

    inputs[''labels''] = torch.tensor(item["label"], dtype=torch.long)

    return inputs

    # Create Dataset and DataLoader

    dataset = SampleDataset(data, tokenizer)

    # Set up minimal training for fine-tuning

    training_args = TrainingArguments(

    output_dir="./results",

    evaluation_strategy="no",

    per_device_train_batch_size=2,

    num_train_epochs=20,

    )

    trainer = Trainer(

    model=model,

    args=training_args,

    train_dataset=dataset,

    )

    # Train the model (this is minimal; actual fine-tuning requires more data and
    epochs)

    trainer.train()

    # Use Hugging Face pipeline for prediction

    nlp_pipeline = pipeline("text-classification", model=model, tokenizer=tokenizer)

    # Predict categories for new queries

    new_queries = ["I received the wrong item", "Where is my package?", "Can I return
    this?", "I received a defective product"]

    for query in new_queries:

    result = nlp_pipeline(query)[0]

    predicted_label = int(result[''label''].split(''_'')[-1])  # Get label index from
    ''LABEL_0'', ''LABEL_1'', etc.

    category = label_map[predicted_label]  # Map label to category

    print(f"Query: ''{query}''\nPredicted Category: {category}\n")

    OUTPUT >>>

    Query: ''I received the wrong item''

    Predicted Category: complaints

    Query: ''Where is my package?''

    Predicted Category: product inquiries

    Query: ''Can I return this?''

    Predicted Category: product inquiries

    Query: ''I received a defective product''

    Predicted Category: complaints

    Listing 7-8

    Program for the business case

    ```


    In this code, Hugging Face is used to do the following.


    - Loads the pre-trained `BERT` model

    - Provides a tokenizer for text preprocessing

    - Sets up text classification (`pipeline` function)

    - Encapsulates the prediction process in a single call

    - Maps results to the defined categories'
