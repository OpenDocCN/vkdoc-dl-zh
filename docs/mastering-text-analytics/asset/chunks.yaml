  trans: '

    # 词袋模型


    词袋（`BoW`）模型通常在分词之后使用，用于创建`BoW`表示。`BoW`模型是自然语言处理（NLP）中的主要技术之一。`BoW`用于将文本数据表示为单词的集合，忽略输入文本中的语法和单词顺序。`BoW`基于单词在文本中的出现频率或存在情况来工作。它正是通过这种技术将文本转换为对进一步分析至关重要的数值特征。`BoW`技术将每个单词视为独立的标记，并创建一个“袋子”，其中频繁出现的单词被视为主导词。


    `BoW`与分词是相关概念。标记是`BoW`模型的构建块。该模型随后会统计每个标记在输入文本中的出现次数和频率。`BoW`模型广泛应用于许多 NLP 任务，例如文本分类和情感分析。该技术将文本转换为机器可读的数值格式。我们通过一个示例来演示`BoW`模型。


    一旦文本预处理中的分词步骤完成，我们就会得到长度可变的文本序列（每个句子的单词数量不同）。然而，机器学习算法需要针对较大输入文本中的每个句子提供固定长度的数值向量。`BoW`模型为我们解决了这一难题。它统计每个单词在包含多个句子的输入文本文档中出现的次数（见图
    5-1）。这就像将所有标记放入一个袋子中，忽略单词的顺序。我们只关心某个单词是否出现。


    ![表格展示了以单词为列的句子二元表示。行列出句子：“the red dog”、“cat eats dog”、“dog eats food”和“red cat
    eats”。列标记为“the”、“red”、“dog”、“cat”、“eats”和“food”。每个单元格包含一个二元值，表示该单词在句子中存在（1）或不存在（0）。箭头从句子指向其对应的二元行。](img/649581_1_En_5_Fig1_HTML.jpg)


    图 5-1


    `BoW`示例


    图 5-1 左侧编号显示了四个输入句子。这四个句子总共只包含五个唯一的单词，如表头行所示。对于第一个句子“the red dog”，只有对应单词“the”、“red”和“dog”的单元格的条目为数字‘1’。其余所有单元格的条目均为数字“0”。我们对剩下的三个句子也进行了同样的操作。一旦`BoW`过程完成，所有输入句子都会得到数值型且长度相同的向量。


    在第一个句子“the red dog”中，对应的数值向量是`[1,1,1,0,0,0]`；类似地，对于“cat eats dog”，对应的向量是`[0,0,1,1,1,0]`。句子
    3 和句子 4 也有类似的向量。


    在这个过程中实现了两件事。


    *   文本句子被转换为机器可读的数值格式。

    *   所有向量都被标准化为机器学习算法所需的精确长度。


    `BoW`模型这种方法背后有语言学原理支撑：相似的文本文档共享相似的领域特定词汇。例如，所有与足球相关的文章经常使用“得分”、“传球”和“球队”等词。另一方面，天气预报则使用完全不同的词汇，如“雨”、“太阳”和“伞”。


    请记住移除停用词，以便更容易识别相似的文档，因为停用词在几乎所有文档中都很常见。


    现在，你已经到了本节的末尾，我们探讨了几种分词器和`BoW`模型，以处理特殊情况和特定的文本处理需求。空格分词是最直接的方法，它基于空格来分割文本。它适用于较简单的应用。基于字典的分词器利用预定义的单词列表来保证准确的标记分割。这类分词器用于处理已知术语和专有名词。基于规则的分词器应用预定义的语言规则，以适应各种文本模式和例外情况。


    基于标点的分词器将标点符号列为分隔符。这在文本标点扮演不同角色的情况下很有用。推文分词器旨在处理社交媒体推文的特有方面，包括话题标签、提及和表情符号。最后，多词表达式（MWE）分词器处理多词表达的挑战，确保常见短语和惯用表达被视为单个标记。我们通过定义几个更具体的分词器来结束本节。每个分词器都是为特定情况设计的。在选择分词器时必须谨慎。这个选择取决于文本的要求和手头的任务。


    ## 5.4 词干提取再探


    分词将文本分割成单词，`BoW`随后统计它们的频率，而词干提取则将它们缩减为词根形式——这三个步骤都有助于将原始输入文本转换为适用于 NLP 模型的特征。前一章在我们的代码演示中使用了波特词干提取器。它是最早的词干提取算法之一。波特词干提取器因其在将单词分解为词根形式方面的效率和简单性，已在各种
    NLP 应用中得到广泛测试和使用。其广泛流行和使用的另一个原因是它的词干提取规则结构良好，可以避免过度词干提取和欠词干提取。过度词干提取是指不同的（不同的）单词被错误地缩减为相同的词干。欠词干提取则相反，是指密切相关的单词没有被缩减到所需的共同词干。


    还有其他一些词干提取器可用，每个都针对特定目的或原因而设计。它们包括 Snowball 词干提取器和 Lancaster 词干提取器。


    ### 5.4.1 多种词干提取器的代码演示


    让我们检查一下这些词干提取器中每一个的代码演示。该代码提供了简短描述及其设计目的。

    '
- fmt: '### Snowball or Porter2 Stemmer


    The Snowball stemmer is also called the Porter2 Stemmer as it’s a modification
    over the original Porter algorithm. Snowball stemmer has improved rules for greater
    accuracy and consistency. It can be used across multiple languages, avoiding over-
    and under-stemming.


    The following is a code demo that demonstrates the difference between Porter and
    Snowball stemmers.


    - Please note: From the original sentence, for the word “various”, Snowball stemmer
    it as “various”, which better keeps its meaning. Porter stemmer, on the other
    hand, reduces the same word as ‘variou’.


    ```

    # Import necessary libraries

    from nltk.tokenize import word_tokenize

    from nltk.stem import PorterStemmer, SnowballStemmer

    import nltk

    # Download usual nltk resources.

    nltk.download(''punkt'')

    # Initialize the stemmers.

    porter_stemmer = PorterStemmer()

    snowball_stemmer = SnowballStemmer("english")

    # Create the sample text.

    text = "In the summer, the researchers were analyzing various hypotheses about
    the future development."

    # Tokenize the sample text.

    tokens = word_tokenize(text)

    # Apply stemmers.

    porter_tokens = [porter_stemmer.stem(token) for token in tokens]

    snowball_tokens = [snowball_stemmer.stem(token) for token in tokens]

    # Print results.

    print("Original Tokens: ", tokens)

    print("Porter Stemmed Tokens: ", porter_tokens)

    print("Snowball Stemmed Tokens: ", snowball_tokens)

    OUTPUT:

    Original Tokens:  [''In'', ''the'', ''summer'', '','', ''the'', ''researchers'',
    ''were'', ''analyzing'', ''various'', ''hypotheses'', ''about'', ''the'', ''future'',
    ''development'', ''.'']

    Porter Stemmed Tokens:  [''in'', ''the'', ''summer'', '','', ''the'', ''research'',
    ''were'', ''analyz'', ''variou'', ''hypothes'', ''about'', ''the'', ''futur'',
    ''develop'', ''.'']

    Snowball Stemmed Tokens:  [''in'', ''the'', ''summer'', '','', ''the'', ''research'',
    ''were'', ''analyz'', ''various'', ''hypothes'', ''about'', ''the'', ''futur'',
    ''develop'', ''.'']

    [nltk_data] Downloading package punkt to C:\Users\Shailendra

    [nltk_data]     Kadre\AppData\Roaming\nltk_data...

    [nltk_data]   Package punkt is already up-to-date!

    ```


    ### Lancaster Stemmer


    The Lancaster stemmer is one of the most aggressive stemming approaches because
    it works on a set of straightforward, recursive rules to cut the input words to
    their root forms. It is predominantly useful in NLP applications requiring a high
    level of generalization. For this purpose, it can sacrifice some precision by
    over-stemming. Applications like topic modeling focus more on broad themes rather
    than exact word forms. In such cases, the Lancaster stemmer is applied to generalize
    terms to their root forms to help identify common topics. Listing [5-2](#649581_1_En_5_Chapter.xhtml#PC8)
    is its code demo with the Porter stemmer.


    ```

    import nltk

    from nltk.tokenize import word_tokenize

    from nltk.stem import PorterStemmer, LancasterStemmer

    # Download resources.

    nltk.download(''punkt'')

    # Initialize both the stemmers.

    porter_stemmer = PorterStemmer()

    lancaster_stemmer = LancasterStemmer()

    # Sample text.

    sample_text = "scientific methodologies used by researchers were aimed at improving
    accuracy in predictive analytics."

    # Tokenize the text

    tokens = word_tokenize(sample_text)

    # Apply Porter Stemmer.

    porter_tokens = [porter_stemmer.stem(token) for token in tokens]

    # Apply Lancaster Stemmer.

    lancaster_tokens = [lancaster_stemmer.stem(token) for token in tokens]

    # Print output.

    print("Original Tokens: ", tokens)

    print("Porter Stemmed Tokens: ", porter_tokens)

    print("Lancaster Stemmed Tokens: ", lancaster_tokens)

    OUTPUT:

    Original Tokens:  [''The'', ''scientific'', ''methodologies'', ''used'', ''by'',
    ''researchers'', ''were'', ''aimed'', ''at'', ''improving'', ''accuracy'', ''in'',
    ''predictive'', ''analytics'', ''.'']

    Porter Stemmed Tokens:  [''the'', ''scientif'', ''methodolog'', ''use'', ''by'',
    ''research'', ''were'', ''aim'', ''at'', ''improv'', ''accuraci'', ''in'', ''predict'',
    ''analyt'', ''.'']

    Lancaster Stemmed Tokens:  [''the'', ''sci'', ''methodolog'', ''us'', ''by'',
    ''research'', ''wer'', ''aim'', ''at'', ''improv'', ''acc'', ''in'', ''predict'',
    ''analys'', ''.'']

    [nltk_data] Downloading package punkt to C:\Users\Shailendra

    [nltk_data]     Kadre\AppData\Roaming\nltk_data...

    [nltk_data]   Package punkt is already up-to-date!

    Listing 5-2.

    Program to Demonstrate Lancaster Stemmer

    ```


    - ‘were’ to ‘were’ only. It preserves more of the original word form.

    - At the same time, the Lancaster stemmer applies a more aggressive reduction
    to other words like “were” to “wer.”

    - The same difference you can notice for ‘accuracy.’ Porter stemmer reduces it
    to ‘accuraci’ while Lancaster stemmer makes it ‘acc.’


    So far, we have covered the Porter stemmer, Snowball stemmer, and Lancaster stemmer.
    Porter stemmer is a foundational tool in NLP, while other more specialized stemmers
    like the Snowball and Lancaster address specific cases. The Snowball stemmer is
    an improved version of the Porter stemmer, specially designed for handling a broader
    range of languages with greater accuracy. In contrast, Lancaster stemmer takes
    an aggressive stemming approach, which makes it particularly effective in environments
    requiring a high level of generalization. Each of these stemmers handles a specialized
    use case. Having said that, let’s turn our focus to lemmatization.


    ## 5.5 Lemmatization Revisited


    As a recap, tokenization breaks down the input text into words (tokens), BoW counts
    them, and stemming simplifies the tokens to roots. Lemmatization further refines
    them to accurate base forms for better extraction of NLP features aimed at NLP
    models. The previous chapter discussed lemmatization and its Python code demo
    at an introductory level. This section focuses on the major challenges faced by
    this foundational NLP technique and explores other lemmatizers that may help.


    Lemmatization is faced with several challenges. First, it depends heavily on the
    availability and quality of lexical resources. If the lexical database does not
    contain specific entries or it has inaccuracies, the lemmatization process may
    yield incorrect or incomplete results. The second challenge can be polysemy, where
    a single word has multiple meanings. The lemmatizer must be able to resolve the
    correct meaning depending on context, which is a challenge without advanced semantic
    understanding. Additionally, lemmatization is generally a resource-intensive process
    when compared to stemming. This can be a major challenge when the focus is to
    improve performance, like in real-time NLP applications that involve large datasets,
    and processing speed is critical. There are rule-based, dictionary-based, and
    machine learning–based lemmatizations, each with its own advantages. We do not
    go into detail here, but you can explore further.


    There are many popular lemmatizers available in the NLP domain. These include
    the WordNet lemmatizer (NLTK), spaCy lemmatizer, TextBlob lemmatizer, Pattern
    lemmatizer, Stanford NLP lemmatizer, and Gensim lemmatizer. Each stands for a
    different purpose. The following section delve straights into the code.


    ### 5.5.1 Code Demo for Multiple Lemmatizers


    Due to space constraints, the code demos are only for spaCy lemmatizer and TextBlob
    lemmatizer. As usual, we provide a brief explanation and purpose of each of these
    three lemmatizers in the code demos itself.'
  raw: '#### Snowball or Porter2 Stemmer


    The Snowball stemmer is also called the Porter2 Stemmer as it’s a modification
    over the original Porter algorithm. Snowball stemmer has improved rules for greater
    accuracy and consistency. It can be used across multiple languages, avoiding over-
    and under-stemming.


    The following is a code demo that demonstrates the difference between Porter and
    Snowball stemmers.


    *   Please note: From the original sentence, for the word “various”, Snowball
