  trans: '

    ### 4.3.1 词性标注


    词性标注（`POS` tagging）为给定输入句子中的每个单词标注其语法角色，例如名词、动词、形容词或副词。`POS` 标注通过分析句子中每个单词的角色，有助于正确理解输入文本的结构和含义。例如，在句子“She
    reads a book every night”中，`POS` 标注将“she”标注为代词，“reads”标注为动词，“a”标注为冠词，“book”标注为名词，“every”标注为形容词。这有助于我们（以及计算机）识别句子中每个单词的角色。简而言之，通过准确标注单词，`POS`
    标注能够洞察给定输入文本文档的句法和语法。例如，`POS` 标注有助于根据单词在句子中的角色消除具有多种含义的歧义；`POS` 标注也为更高级的任务（如句法分析、情感分析和命名实体识别）奠定了基础（见图
    4-5）。请考虑以下两个示例句子。


    ![流程图标题为“使用 NLTK 进行词性标注流程”，展示四个步骤：“输入文本”、“分词”、“词性标注”和“输出标注文本”。每个步骤由带图标和描述的箭头表示。“输入文本”涉及提供待分析的句子。“分词”将句子分割成单词。“词性标注”为每个单词分配语法标签。“输出标注文本”显示标注后的句子。](img/649581_1_En_4_Fig5_HTML.jpg)


    **图 4-5** 使用 NLTK 进行词性标注


    - 示例 1：“The light in the room was bright.”

    - 示例 2：“She carried a light bag.”


    在示例 1 中，“light”充当名词（意为照明物），而在示例 2 中，“light”充当形容词（意为不重的）。这种差异通过 `POS` 标注向机器（运行
    NLP 软件）明确展示，帮助它们理解单词在不同语境中的角色。`POS` 标注是更高级 NLP 任务（包括句法分析、情感分析和 NER）的基础。代码清单 4-11
    是一个使用 `NLTK` 完成 `POS` 标注的演示。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    # 导入库。

    import nltk

    from nltk.tokenize import word_tokenize

    # 下载所需数据。

    nltk.download(''punkt'')

    nltk.download(''averaged_perceptron_tagger'')

    def pos_tagging(text):

    # 对文本进行分词。

    tokens = word_tokenize(text)

    # 执行词性标注。

    tagged_words = nltk.pos_tag(tokens)

    return tagged_words

    # 使用演示。

    sentence = "The school girl quickly ran across the park to catch the ice cream
    truck."

    tagged_sentence = pos_tagging(sentence)

    print(f"POS tagging result: {tagged_sentence}")

    输出：

    POS tagging result: [(''The'', ''DT''), (''school'', ''NN''), (''girl'', ''NN''),
    (''quickly'', ''RB''), (''ran'', ''VBD''), (''across'', ''IN''), (''the'', ''DT''),
    (''park'', ''NN''), (''to'', ''TO''), (''catch'', ''VB''), (''the'', ''DT''),
    (''ice'', ''NN''), (''cream'', ''NN''), (''truck'', ''NN''), (''.'', ''.'')]

    ```


    **代码清单 4-11** 使用 NLTK 进行词性标注


    在代码清单 4-11 的输出中，请注意使用了多个 `POS` 标签（编码为 `''DT''`、`''NN''` 等）。为方便您查阅，表 4-1 列出了输出中使用的每个标签的含义。


    **表 4-1** 代码演示输出中使用的词性标签


    | ![表格显示词性标签及其含义。表格包含两列：“词性标签”和“含义”。列出的标签有：DT、NN、RB、VBD、IN、TO、VB 和冒号 (:)。每个标签后跟其描述，例如
    DT 为“限定词 - 引出名词”，NN 为“名词，单数或不可数 - 表示人、地点、事物或概念”。表格使用交替行颜色以便清晰阅读。](img/649581_1_En_4_Figa_HTML.gif)
    |


    ### 4.3.2 使用 NLTK 进行命名实体识别


    命名实体识别（NER）是一种 NLP 技术，涉及在给定的输入文本文档中查找并分类明确的实体或对象（见图 4-6）。这些命名实体可以是个人、机构、时间或日期表达式、地点、数量表达式、金钱、百分比等。NER
    有助于从非结构化文本中提取有意义的信息。例如，考虑以下句子。


    ![流程图说明使用 NLTK 进行命名实体识别的过程。该过程包括五个步骤：“输入文本”准备初始文本，“分词”将文本分割成标记，“词性标注”为标记分配语法角色，“组块分析”将标记分组为句法块，以及“命名实体识别”识别和分类实体。最后一步是“输出实体”，显示识别出的实体。每个步骤由带图标和描述的彩色圆圈表示。](img/649581_1_En_4_Fig6_HTML.jpg)


    **图 4-6** 使用 NLTK 进行命名实体识别


    例如，让我们考虑句子：“Dr. Jonson attended the University of London and now resides in Liverpool.”
    这里，高级别的命名实体如下。


    - 人物：“Dr. Johnson”

    - 组织：“University of London”

    - 地点：“Liverpool”


    NER 的一个直接用途是它可以被不同的 NLP 应用（如聊天机器人）直接使用。假设任何用户问聊天机器人：“Dr. Jonson 上过哪所大学？” 它凭借提取的实体就能准备好答案。这样，NER
    使得分析和分类内容变得更加容易。


    让我们再举一个例子如下。


    考虑句子：“Bill Gates founded Microsoft and resides in Washington.”


    在这个句子中，NER 可以告诉我们如下高级别实体。


    - 人物：“Bill Gates”

    - 组织：“Microsoft”

    - 地点：“Washington”


    代码清单 4-12 是一个使用 NLTK 的 NER 代码演示。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    import nltk

    from nltk import word_tokenize, pos_tag, ne_chunk

    nltk.download(''punkt'')

    nltk.download(''maxent_ne_chunker'')

    nltk.download(''words'')

    def named_entity_extractor(text):

    # 分词。

    tokens = word_tokenize(text)

    # 首先执行词性标注。

    pos_tags = pos_tag(tokens)

    # 应用 NER。

    named_entities = ne_chunk(pos_tags)

    return named_entities

    # 示例用法 1。

    sample_sentence1 = "Bill Gates founded Microsoft and resides in Washington."

    ner_result = named_entity_extractor(sample_sentence1)

    print(f"NER result: {ner_result}")

    输出 1：

    NER result: (S

    (PERSON Bill/NNP)

    (PERSON Gates/NNP)

    founded/VBD

    (PERSON Microsoft/NNP)

    and/CC

    resides/NNS

    in/IN

    (GPE Washington/NNP)

    ./.)

    # 示例用法 2。

    sample_sentence2 = "Dr. Jonson attended University of London and now resides in
    Liverpool."

    ner_result = named_entity_extractor(sample_sentence2)

    print(f"NER result: {ner_result}")

    输出 2：

    NER result: (S

    Dr./NNP

    (PERSON Jonson/NNP)

    attended/VBD

    (ORGANIZATION University/NNP)

    of/IN

    (GPE London/NNP)

    and/CC

    now/RB

    resides/VBZ

    in/IN

    (GPE Liverpool/NNP)

    ./.)

    ```


    **代码清单 4-12** 使用 NLTK 进行 NER


    您可以在宾夕法尼亚树库项目网页 [`www.ling.upenn.edu/courses/Fall_2003/ling001/penn_treebank_pos.html`](http://www.ling.upenn.edu/courses/Fall_2003/ling001/penn_treebank_pos.html)
    上解码 NER 代码，包括 `NNP`、`VBD`、`NNP` 和 `VBZ`。

