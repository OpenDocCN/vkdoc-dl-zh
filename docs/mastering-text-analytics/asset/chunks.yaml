- fmt: '### 4.2.4 Lemmatization


    `Lemmatization` is an NLP data preprocessing technique that reduces input words
    to their base or root form. The base form of lemmatization is known as a lemma.
    `Lemmatization` is similar to stemming in a way. `Lemmatization` is crucial in
    NLP data preprocessing tasks like text normalization, where preserving the semantic
    meaning of original input words is critical (see Figure [4-2](#649581_1_En_4_Chapter.xhtml#Fig2)).


    ![Flow chart illustrating the lemmatization process using NLTK. It consists of
    five stages: Input Text, Tokenization, Part-of-Speech Tagging, Lemmatization,
    and Output Text. Each stage is represented by an icon and a brief description.
    Input Text is prepared for processing. Tokenization divides text into words or
    tokens. Part-of-Speech Tagging assigns grammatical roles. Lemmatization transforms
    tokens to base forms. Output Text compiles and displays the processed text.](images/649581_1_En_4_Chapter/649581_1_En_4_Fig2_HTML.jpg)


    **Figure 4-2** Lemmatization using NLTK


    While stemming simply truncates input words to remove only suffixes, lemmatization
    also considers the context and morphological analysis of words. Let’s try to understand
    it better with an example. The input words `"running"`, `"ran"`, and `"runs"`
    can all be reduced to their lemma, `"run"`. Consider the following paired text
    bullet sets.


    *   Original: `running`, stemmed: `run`

    *   Original: `ran`, stemmed: `ran`

    *   Original: `runs`, stemmed: `run`


    and


    *   Original: `running`, Lemmatized: `run`

    *   Original: `ran`, Lemmatized: `run`

    *   Original: `runs`, Lemmatized: `run`


    Let’s repeat it with different examples.


    *   Original: `easily`, Stemmed: `easili`

    *   Original: `fairly`, Stemmed: `fairli`

    *   Original: `happiness`, Stemmed: `happi`


    and


    *   Original: `easily`, Lemmatized: `easily`

    *   Original: `fairly`, Lemmatized: `fairly`

    *   Original: `happiness`, Lemmatized: `happiness`


    With this example, you now have a clear picture of the difference between `"stemming"`
    and `"lemmatization"`.


    Now it’s time to jump straight to our code demo on lemmatization works. The following
    code uses POS (part of speech), which means the role any word plays in a sentence.
    The role of a word (in a given sentence) may be a noun, verb, adjective, or adverb.


    Considering POS during lemmatization is critical as it can have different base
    forms depending on their role/POS in a sentence. Let’s take an example; `"running"`
    as a verb, becomes `"run"`, but as a noun, it stays `"running"`. In another example,
    if we use `"better"` as an adjective, it stays `"better"`, but when used as a
    verb, it becomes `"improve"`. Using POS, a lemmatizer can choose the correct base
    form. It preserves the meaning of the original input word. Listing [4-4](#649581_1_En_4_Chapter.xhtml#PC4)
    is a code demo for this operation. You can utilize this code directly in your
    NLP data preprocessing tasks.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    import nltk # Import necessary libraries.

    from nltk.stem import WordNetLemmatizer

    from nltk.corpus import wordnet

    # Import other required resources.

    nltk.download(''wordnet'')

    nltk.download(''omw-1.4'')

    nltk.download(''averaged_perceptron_tagger'')

    # Initialize the WordNet Lemmatizer.

    lemmatizer = WordNetLemmatizer()

    # Let''s write a function to get part of speech for accurate lemmatization

    def get_wordnet_pos(word):

    tag = nltk.pos_tag([word])[0][1][0].upper()

    tag_dict = {"J": wordnet.ADJ,

    "N": wordnet.NOUN,

    "V": wordnet.VERB,

    "R": wordnet.ADV}

    return tag_dict.get(tag, wordnet.NOUN)

    # The output of this code is not included here being irrelavent.

    # Sample imput words.

    words = ["easily", "fairly", "happiness"]

    # Lemmatization with considering part of speech (POS).

    lemmatized_words = [lemmatizer.lemmatize(word, get_wordnet_pos(word)) for word
    in words]

    # Print the output.

    for word, lemma in zip(words, lemmatized_words):

    print(f"Original: {word}, Lemmatized: {lemma}")

    OUTPUT:

    Original: easily, Lemmatized: easily

    Original: fairly, Lemmatized: fairly

    Original: happiness, Lemmatized: happiness

    ```


    **Listing 4-4** Lemmatization Using NLTK


    ### 4.2.5 Sentence Segmentation


    `Sentence segmentation` involves breaking an input text corpus into its component
    sentences. This process is an NLP data preprocessing task. It is useful where
    understanding the structure of the text is necessary. After the sentence segmentation
    process, the input text can be processed in the form of individual sentences.
    This operation helps in effective analysis (understanding meaning and context)
    of text corpora at the sentence level.


    In sentence segmentation, sentence boundaries are determined by punctuation marks
    such as periods, exclamation points, and questions. However, special cases like
    abbreviations, decimal numbers, and names with punctuation marks do not indicate
    the end of a sentence.


    The Python NLTK library can deal with sentence segmentation using its `sent_tokenize`
    function. The `sent_tokenize` function uses pre-trained NLP models to split text
    into sentences. It can deal with complicated sentence structures and edge cases.
    Listing [4-5](#649581_1_En_4_Chapter.xhtml#PC5) is a code demo for sentence segmentation.
    You can utilize this code directly in your NLP data preprocessing tasks.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    import nltk

    from nltk.tokenize import sent_tokenize

    nltk.download(''punkt'')

    def sentences_segmenter(text):

    """

    Segments a given input text corpora into sentences.

    Parameters:

    text (str): The input text corpora to be segmented.

    Returns:

    list: A list of sentences extracted from the input text.

    """

    return sent_tokenize(text)

    # The output of this code is not included here being irrelavent.

    # Example text

    text = """

    Sentence segmentation is involves breaking an input text corpus into its component
    sentences.

    This process is NLP data preprocessing task. It us useful where

    understanding the structure of the text is necessary. After sentence segmentation
    process, the input text can

    be processed in the form of individual sentences. This operation helps in effective
    analysis (understanding meaning

    and context) of text corpora at the sentence level.

    """

    # Segment the text corpus.

    sentences = sentences_segmenter(text)

    # Print output.

    for i, sentence in enumerate(sentences, 1):

    print(f"Sentence {i}: {sentence}")

    OUTPUT:

    Sentence 1: Sentence segmentation is involves breaking an input text corpus into
    its component sentences.

    Sentence 2: This process is NLP data pre-processing task.

    Sentence 3: It us useful where understanding the

    structure of the text is necessary.

    Sentence 4: After sentence segmentation process, the input

    text can be processed in the form of individual sentences.

    Sentence 5: This operation helps in effective analysis

    (understanding meaning and context) of text corpora at the sentence level.

    ```


    **Listing 4-5** Sentence Segmentation Using NLTK'
