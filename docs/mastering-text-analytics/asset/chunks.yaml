- fmt: "### Dependency Parsing\n\nLet’s start with an example sentence, “She gave\
    \ the book to him.” A dependency parser breaks it down by detecting the grammatical\
    \ relationships between the words and organizing them into a tree-like structure.\
    \ This is how it works.\n\n1.  Root: The parser identifies the main verb `“gave”`,\
    \ which gives us the root of the sentence.\n2.  Subject (`nsubj`): The parser\
    \ identifies `“She”` as the subject of the verb `“gave.”`\n3.  Direct object (`dobj`):\
    \ Next, the parser detects `“book”` as the direct object of `“gave.”`\n4.  Prepositional\
    \ phrase (`prep`): The parser finally characterizes `“to him”` as a prepositional\
    \ phrase.\n\nAt the end, the dependency parser cuts the following structure to\
    \ visually represent the grammatical structure of the given input sentence “She\
    \ gave the book to him.”\n\n*   `“gave”` (root)\n    *   `“She”` (`nsubj`)\n \
    \   *   `“book”` (`dobj`)\n    *   `“to”` (`prep`)\n        *   `“him”` (`pobj`)\n\
    \nCommon tags used in dependency parsing are as follows:\n\n*   `nsubj` (nominal\
    \ subject): The noun or noun phrase, which is the subject of the verb.\n*   `dobj`\
    \ (direct object): The noun or noun phrase, which directly receives the action\
    \ of the verb.\n*   `iobj` (indirect object): The noun or noun phrase, which indirectly\
    \ receives the action of the verb.\n*   `attr` (attribute): An adjective or adjective\
    \ phrase that describes a noun.\n*   `amod` (adjectival modifier): An adjective\
    \ modifying a noun.\n*   `advmod` (adverbial modifier): An adverb modifying a\
    \ verb, adjective, or another adverb.\n*   `prep` (prepositional modifier): A\
    \ preposition introducing a prepositional phrase.\n*   `pobj` (prepositional object):\
    \ The noun or noun phrase that follows a preposition.\n*   `det` (determiner):\
    \ A word like “the” or “a” that modifies a noun.\n*   `conj` (conjunction): A\
    \ word that connects other words or phrases, like “and” or “but”.\n*   `cc` (coordinating\
    \ conjunction): A word that connects words or phrases of the same type.\n*   `nmod`\
    \ (nominal modifier): A noun that modifies another noun.\n*   `aux` (auxiliary\
    \ verb): A verb that helps form different tenses, moods, or voices of the main\
    \ verb.\n*   `expl` (expletive): A word like “there” that does not have a substantive\
    \ meaning but serves a grammatical function.\n\nThis method (dependency parsing)\
    \ helps machines (read computers) realize input sentences by breaking them down\
    \ into the connections depicted in the preceding tree. This process makes it easier\
    \ for computers to figure out the meaning of the sentence. This way, instead of\
    \ just recognizing the words, machines learn how the words fit together and work\
    \ together in a sentence.\n\nDependency parsing involves breaking down an input\
    \ sentence into the word level and then identifying the grammatical relationships\
    \ between those words. In short, dependency parsing shows how each word connects\
    \ to others by detecting the sentence structure.\n\n### Constituency Parsing\n\
    \nThe constituency parsing technique builds a hierarchical tree that depicts how\
    \ words group together into phrases. Dependency parsing, on the other hand, involves\
    \ breaking down sentences to the word level.\n\nLet’s take an example sentence,\
    \ “The cat sat on the mat.”\n\nFirst, identify the phrases.\n\n*   “The cat” is\
    \ a noun phrase (`NP`) that serves as the subject.\n*   “sat on the mat” is a\
    \ verb phrase (`VP`) that tells about the action and its details.\n*   “on the\
    \ mat” is a prepositional phrase (`PP`) that modifies the verb.\n\nNext, build\
    \ the tree.\n\n*   The main verb phrase “sat on the mat” is at the root of the\
    \ tree.\n*   “The cat” will serve as the subject.\n*   “on the mat” is connected\
    \ to the verb phrase as an additional detail.\n\nThe formal tree resembles the\
    \ following.\n\n```\n(S\n(NP The cat)\n(VP\n(V sat)\n(PP\n(P on)\n(NP the mat)\n\
    )\n)\n)\n```\n\nIn this tree,\n\n*   `S` represents the entire sentence.\n*  \
    \ `NP` for noun phrases.\n*   `VP` represents verb phrases.\n*   `PP` stands for\
    \ prepositional phrases.\n\nThe following are common tags used in constituency\
    \ parsing.\n\n*   `S` (sentence): Stands for the complete sentence.\n*   `NP`\
    \ (noun phrase): It groups nouns and their modifiers.\n*   `VP` (verb phrase):\
    \ It stands for the main verb and its arguments.\n*   `PP` (prepositional phrase):\
    \ Includes a preposition and its object.\n*   `AdjP` (adjective Phrase): It contains\
    \ adjectives and their modifiers.\n*   `AdvP` (adverb phrase): It groups adverbs\
    \ and their modifiers.\n*   `Det` (determiner): It stands for the words like “the,”\
    \ “a,” or “an” that modify nouns.\n*   `N` (noun): Stands for nouns.\n*   `V`\
    \ (verb): Represents verbs.\n*   `P` (preposition): Stands for prepositions.\n\
    \nConstituency parsing and dependency parsing use different tags because they\
    \ serve different purposes. POS tags are also different from the tags used in\
    \ constituency and dependency parsing.\n\n### 6.2.4 Hands-on Example Covering\
    \ for Parsing\n\nConstituency parsing and dependency parsing are two different\
    \ approaches to parsing. The first one emphasizes hierarchical structure, while\
    \ the second focuses on grammatical relations. Which one has more prevalence in\
    \ practice? Dependency parsing is more prevalent in practice. The reason is as\
    \ follows. Dependency parsing is often aligned with the needs of many NLP tasks\
    \ as its focus is on grammatical relationships, which plays a pivotal role in\
    \ understanding sentence meaning. Dependency parsing is also generally more computationally\
    \ efficient and flexible across languages. For these reasons, the code demo in\
    \ the following section only uses a dependency parser."
