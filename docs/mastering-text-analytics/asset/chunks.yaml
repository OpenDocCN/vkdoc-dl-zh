    ### 8.4.2 使用聊天模型与大语言模型


    我们来讨论一下 LangChain 与 OpenAI 聊天模型相关的背景理论和描述方面。首先，让我们了解以下术语。


    - `ChatPromptTemplate` 用于创建端到端的完整对话提示。`ChatPromptTemplate` 结合了多种消息类型，以确保对话结构适合大语言模型处理。例如，它可以包含一条系统指令，如“你是一个乐于助人的助手”，同时也可以包含用户输入，如“如何制作印度名菜黄油奶酪咖喱？”

    - `HumanMessagePromptTemplate` 概述了双向对话中用户的输入。例如，对于用户查询“美国的商业首都是哪里？”，该模板会捕获给定的查询，然后将其传递给像
    OpenAI 聊天机器人这样的大语言模型。`HumanMessagePromptTemplate` 使得用户交互变得动态且易于处理。

    - `SystemMessagePromptTemplate` 负责为 AI 设定规则（指令）。例如，AI 的角色或行为。让我们为 AI 构建这样一条指令：“你是一位著名的数学教授，能让即使复杂的概念也变得易于理解。”这样的指令会促使大语言模型以明确的风格作答。它还能确保
    AI 在整个对话过程中始终保持在正确的轨道（任务）上。


    这三个模板共同作用，为大语言模型构建结构化的对话。以下各节将探讨这些模板的用法。


    - `SystemMessagePromptTemplate` 设定 AI 的角色或行为。

    - `HumanMessagePromptTemplate` 捕获用户的输入。

    - `ChatPromptTemplate` 结合这些消息，为 AI 创建一个完整的对话以供处理。


    现在，是时候看看可供我们使用的各种（流行的）OpenAI 模型了。每个模型都有其特定的设计目的。例如，使用 `gpt-3.5-turbo` 创建聊天机器人，或使用
    `davinci` 撰写文章。以下是更受欢迎的几种模型。


    - `gpt-4` 最适合复杂的推理任务。

    - `gpt-3.5-turbo` 对于大多数应用来说高效且经济。

    - `text-davinci-003` 非常适合创意写作或摘要生成。

    - `text-curie-001` 速度更快、成本更低，是简单任务的理想选择。

