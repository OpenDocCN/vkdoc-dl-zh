    文本预处理任务经常需要清洗文本字符串。例如，一条推文包含像 `Hello@John!` 这样的文本字符串，我们的数据清洗任务要求我们移除所有特殊字符，使其可用于文本分析。我们也可以在这里使用
    Python `RegEx`。使用 `RegEx`，你可以移除特殊字符、空白或 URL，以清理文本字符串供进一步分析。清单 3-10 是一个演示。


    ```

    import re

    # 下面是一个示例文本字符串，我们在一条推文中找到的。

    sample_text = "Hi!!! I am John. Welcome @my house. You can get more info @ www.sk.com"

    # 用于从 sample_text 中移除特殊字符和 URL 的正则表达式。

    # 移除特殊字符

    usable_text = re.sub(r"[!@#%&*:]", "", sample_text)  usable_text = re.sub(r"http\S+|www\.\S+",
    "", usable_text)  # 清理 URL。

    print(usable_text)

    Hi I am John. Welcome my house. You can get more info

