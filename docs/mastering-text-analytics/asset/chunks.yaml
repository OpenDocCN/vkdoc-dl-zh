    ### 8.4.3 使用提示模板与少样本模板


    提示模板和少样本模板是引导 AI 模型生成精准响应的必备工具。这两种模板都提供了结构化的输入构建方法。提示模板和少样本模板能提升模型对你确切需求的理解能力。下文将介绍这些模板的使用方法。


    - **提示模板**是用于向 AI 模型提问或下达指令的预设计格式。它们能确保输入内容清晰有序；例如，`"Interpret the text to German:
    {text}"`。在此示例中，`{text}` 是一个占位符，你可以在此处添加任意输入。这种结构有助于 AI 模型准确作答。


    - **少样本模板**在提问前会向 AI 提供示例。这向 AI 展示了应如何回应。例如，`"Question: What is generative AI?
    Answer: Generative AI is a smart computer system that can generate text and images.
    Now your turn: Question: {question}"`。在此示例中，`{question}` 是一个占位符，你可以在此处输入自己的问题。AI
    利用这种结构来给出更优质的答案。


    接下来，让我们看一个演示程序，展示提示模板和少样本模板的用法。同时，还会通过注释对比 AI 模型在使用和不使用模板时的响应。


    #### 使用与不使用模板引导 AI 响应


    以下是一个使用 LangChain 的 Python 演示，展示了不使用模板和使用提示模板之间的区别。


    ```python

    # 从文本文件中读取 OpenAI API 密钥

    f = open(''C:\\Users\\Shailendra Kadre\\Desktop\\OPEN_AI_KEY.txt'')

    api_key = f.read()

    ```


    ##### 不使用模板


    - 无模板的响应：答案更长、更详细，且涵盖多个方面。

    - 问题：AI 的回答是自由形式的，可能导致冗长或不一致的响应。语气和内容可能因问题而异。


    ```python

    # 导入 ChatOpenAI 类以与 OpenAI 的语言模型交互

    from langchain.chat_models import ChatOpenAI

    # 使用默认设置初始化 OpenAI 模型

    llm = ChatOpenAI(temperature=0, openai_api_key=api_key)

    # 在不使用模板的情况下向 AI 提出一个简单问题

    response = llm.predict("Explain what Generative AI is.")

    print(response)  # 打印 AI 的响应

    输出：

    Generative AI refers to a type of artificial intelligence that is capable of creating
    new content, such as images, text, or music, that is original and not based on
    existing data. This type of AI uses algorithms to generate new content by learning
    patterns and structures from a dataset and then creating new content based on
    those patterns. Generative AI can be used in a variety of applications, such as
    creating realistic images, generating text for chatbots, or composing music. It
    has the potential to revolutionize creative industries by automating the process
    of content creation and enabling new forms of artistic expression.

    ```


    ##### 使用提示模板


    ```python

    # 导入必要的组件

    from langchain.prompts import PromptTemplate  # 用于创建结构化提示

    from langchain.chat_models import ChatOpenAI  # 用于与 OpenAI 的语言模型交互

    # 定义包含占位符的提示模板

    template = PromptTemplate(

    input_variables=["topic"],  # 定义占位符 ''topic''

    template="Explain what {topic} is in simple terms.",  # 结构化输入

    )

    # 使用默认设置初始化 OpenAI 模型

    llm = ChatOpenAI(temperature=0, openai_api_key=api_key)

    # 用特定主题填充占位符

    prompt = template.format(topic="Generative AI")  # 将 ''topic'' 替换为 "Generative
    AI"

    # 使用格式化后的提示获取 AI 响应

    response = llm.predict(prompt)

    print(response)  # 打印 AI 的响应

    输出：

    Generative AI is a type of artificial intelligence that can create new content,
    such as images, text, or music, based on patterns it has learned from existing
    data. It uses algorithms to generate new, original content that is similar to
    what it has been trained on. This technology can be used in a variety of applications,
    such as creating realistic images, generating personalized recommendations, or
    even composing music.

    ```


    ##### 使用少样本模板


    清单 8-10 展示了使用少样本模板的程序。


    - **使用模板的响应**：答案简洁，并与提供的示例保持一致。

    - **优势**：示例作为指南，指示 AI 以特定风格进行响应，从而产生聚焦、一致且更简单的输出。


    ```python

    # 导入必要的组件

    from langchain.prompts import FewShotPromptTemplate, PromptTemplate  # 用于少样本和常规提示

    from langchain.chat_models import ChatOpenAI  # 用于与 OpenAI 的语言模型交互

    # 定义示例以向 AI 展示如何响应

    examples = [

    {"question": "What is Machine Learning?", "answer": "Machine Learning is a system
    where computers learn from data."},

    {"question": "What is AI?", "answer": "AI is a field of computer science that
    makes machines smart."},

    ]

    # 为每个示例创建一个 PromptTemplate

    example_prompt = PromptTemplate(

    input_variables=["question", "answer"],  # 定义占位符

    template="Question: {question}\nAnswer: {answer}",  # 每个示例的格式

    )

    # 定义少样本模板的前缀和后缀

    prefix = "You are an expert in technology. Answer the following questions in simple
    terms:"

    suffix = "Now your turn: Question: {question}"

    # 创建一个 FewShotPromptTemplate

    few_shot_template = FewShotPromptTemplate(

    examples=examples,  # 提供示例

    example_prompt=example_prompt,  # 对示例使用 PromptTemplate

    prefix=prefix,  # 添加前缀文本

    suffix=suffix,  # 添加后缀文本

    input_variables=["question"],  # 定义最终问题的占位符

    )

    # 初始化 OpenAI 模型

    llm = ChatOpenAI(temperature=0, openai_api_key=api_key)  # 提供你的 API 密钥

    # 用你的问题填充占位符

    prompt = few_shot_template.format(question="What is Generative AI?")  # 将 ''question''
    替换为你的查询

    # 使用少样本模板获取 AI 响应

    response = llm.predict(prompt)

    print(response)  # 打印 AI 的响应

    输出：

    Answer: Generative AI is a type of artificial intelligence that can create new
    content, such as images, music, or text, based on patterns it has learned from
    existing data.

    清单 8-10

    使用少样本模板的代码演示

    ```


    ### 8.4.4 解析与序列化


    当 LangChain 和 LLM 在后台运行时，我们使用解析来结构化和处理用户输入查询。这样，AI 模型可以更好地理解用户查询。在输入解析中，我们将用户查询分解成更易于管理的部分，这使得来自
    OpenAI 或其他提供商的 LLM 更容易处理。输入解析可能包括将输入文本转换为小写、将其拆分为标记（单词）或移除不需要的文本或其他不必要信息等任务。


    还存在输出解析，用于从 LLM 响应中提取相关且有用的信息。输出解析确保后续环节能够轻松理解和消费 LLM 响应。输出解析的一个有用示例是总结并仅提取 LLM
    响应的关键部分。接下来，让我们检查演示程序以说明这些概念。


