  trans: '

    # 1.5 近期趋势与未来方向


    `NLP` 是一个不断发展的领域。来自计算机科学与工程、人工智能与机器学习以及语言学领域的众多研究者为 `NLP` 做出了积极贡献。推动 `NLP` 快速发展的主要因素是机器学习领域的创新以及计算能力的提升。深度学习以及像
    `BERT` 和 `GPT` 这样的 Transformer 模型，使得 `NLP` 领域的许多近期趋势成为可能。这些模型显著提升了机器的 `NLP` 能力，尤其是在语言理解、翻译和生成方面。近年来，`NLP`
    研究的焦点已转向更具上下文感知能力和更类人的交流方式。这些发展正被应用于增强聊天机器人和个人数字助手的能力，使其能够像人类一样进行交互。其他势头渐起的 `NLP`
    领域包括可解释 `NLP`、偏见缓解以及 `NLP` 程序的伦理考量。


    通常，`NLP` 模型的训练会消耗大量资源，需要庞大的文本语料库用于训练，以及其他软件和硬件计算资源。当前的努力方向是开发低资源语言处理能力。另一个重点领域是自动多语言处理。这些最新发展正在改善机器理解和交互人类语言的方式。以下是
    `NLP` 领域一些值得关注的趋势示例。


    ## 1.5.1 迁移学习：预训练的优势


    预训练模型（或称迁移学习模型）是在海量数据（可能是整个可访问互联网上的数据）上训练而成的深度学习模型。换句话说，这些模型以权重、偏置以及其他可调参数的深度学习参数形式存储了学习成果。通过简单地更改原始神经网络架构的最后几层，这种学习成果也可以迁移到其他用例中。这种安排节省了新用途的模型训练时间和训练数据。这极大地节省了整体资源。这种现象通常被称为迁移学习。它们是复杂的预训练深度学习模型，可用于多种用例。


    迁移学习彻底改变了 `NLP` 领域。它允许模型开发者将预先学到的知识迁移到其他任务中，即使这些任务与原始训练时的任务不同。`BERT`、`ELMo`、`GPT`、`ERNIE`、`ELECTRA`
    和 `RoBERTa` 是一些流行的预训练 `NLP` 模型。这些模型在大型文本和其他数据语料库上进行了预训练，并且可以针对其他更具体的任务进行微调。这些模型为
    `NLP` 程序员节省了大量时间和资源，因为它们消除了从头开发和训练 `NLP` 模型代码的需要。此类预训练模型在训练时需要更少的标记数据，同时极大地节省了内存、存储和
    CPU 算力等计算资源。对于语言翻译、聊天机器人、社交媒体情感分析、主题建模和文本摘要等特定任务，这些预训练模型对开发者来说是极具吸引力的选择。图 1-8
    比较了迁移学习与传统方法。


    ![流程图标题为“机器学习 vs. 迁移学习”，展示了两个过程。第一个过程从“问题识别”开始，接着是“数据收集”、“模型训练”、“模型评估”和“部署”。第二个过程从“问题识别”开始，接着是“预训练模型选择”、“适应新任务”、“模型评估”和“部署”。每个步骤由箭头连接，指示任务流程。](img/649581_1_En_1_Fig8_HTML.jpg)


    **图 1-8** 传统机器学习与预训练模型


    `Wang et al. (2022)` 对迁移学习模型的方法和框架进行了全面综述。他们首先简要介绍了迁移学习模型，随后介绍了代表性方法和适用框架。该论文接着分析了迁移学习模型的效果和挑战。最后，论文简要总结了预训练模型（或迁移学习模型）领域的未来研究趋势。


    ## 1.5.2 大语言模型：类人交互


    已有大量研究论文讨论了像 `ChatGPT` 这样的 `LLMs` 在教育、医学及许多其他领域的应用。毫不意外，几乎所有人都知道 `ChatGPT`，并且他们很可能已经使用过它并从中受益。`Enkelejda
    等人` 专门讨论了 `ChatGPT`（及相关软件）的当前状态及其在教育领域的应用。他们讨论了如何使用 `ChatGPT` 开发高质量的教育内容，以提高学生的参与度和互动性，并提供更个性化的学习体验。该论文认为，在使用之前，学生和教师必须了解此类系统的局限性以及（有时）意想不到的脆弱性。持续的人工监督对于处理此类
    `LLMs` 输出中预期的偏见是必要的。论文最后就如何解决 `LLMs` 带来的常见挑战提出了建议。


    根据定义，`LLMs` 是能够理解和生成人类语言文本的复杂深度学习模型。它们可以像人类一样进行交互，并且几乎可以谈论世界上任何话题，尽管它们有时会犯严重错误（称为幻觉）。`LLMs`
    是在庞大的数据集上训练的，因此得名“大”。`LLM` 训练数据集的大小可以从一千 GB 到一百万 GB 甚至更大。`LLMs` 可以通过调优进行进一步训练：它们可以针对特定任务或领域进行微调。例如，`LLMs`
    可以被微调以执行金融、医疗或教育相关的任务。`LLMs` 几乎可以应用于所有领域，包括聊天机器人、情感分析、客户服务、DNA 研究和在线搜索。


    一些流行的 `LLMs` 示例包括 GitHub 的 `Copilot`、OpenAI 的 `ChatGPT`、Google 的 `Bard`、Meta 的
    `Llama` 以及 Microsoft 的 `Bing Chat`。这些 `LLMs` 可以执行的更具体任务包括文本生成、摘要、翻译、问答、代码生成（`Copilot`）和情感分析。

    '
- fmt: '### 1.5.3 Cross-Lingual and Multiple-Lingual Models: Handling Multiple Languages


    Cross-lingual NLP models can comprehend multiple languages, and they are also
    capable of transferring knowledge between them. This can swiftly enable tasks
    like machine translation and cross-lingual understanding. Although a multiple-lingual
    model (`MLM`) models can also handle multiple languages simultaneously, this understanding
    comes without necessarily transferring knowledge between multiple languages. `MLM`s
    can perform many different NLP tasks without the need to have separate language
    models for each language. A single `MLM` can handle multiple languages parallelly.


    The tasks that can be performed by cross-lingual NLP models include machine translation,
    social media sentiment analysis, cross-lingual information retrieval, multilingual
    text classification, cross-lingual question answering, entity recognition, and
    language inference. At the same time, `MLM`s are useful in tasks like text classification,
    language detection, named entity recognition, part-of-speech tagging, sentiment
    analysis, machine translation, question answering, and text summarization.


    The real-world examples of multilingual NLP models (`MLM`s) include Google Translate,
    Microsoft Translator, Amazon Comprehend, Facebook `M2M-100`, and IBM Watson Language
    Translator. In contrast, cross-lingual NLP models are represented by `XLM-R` (Cross-lingual
    Language Model–RoBERTa), `mBERT` (multilingual BERT), `M2M-100` (Many-to-Many
    100), `LASER` (Language-Agnostic SEntence Representations), and `T5` (Text-To-Text
    Transfer Transformer).


    ### 1.5.4 Explainable NLP: Reason Model Results


    In simple words, explainable NLP is like having a colleague who explains why she
    thinks something is true so that you can understand her reasoning. As put forward
    by Søgaard (2021) in his NLP book, explainable NLP is an emerging field that is
    lately getting a lot of attention from the tech community worldwide. Many industries,
    including healthcare and law, require the NLP developers to reason the predictions
    made by the models developed by them. In fact, it’s a legal requirement in many
    countries.


    The knowledge of explainable NLP is essential for two reasons: one is confirming
    that the AI-driven solutions duly comply with local and international regulations,
    particularly in finance and other sensitive fields like healthcare and legal.
    Another reason is that if we better understand how a model works, it can translate
    to reduce errors and develop capabilities anticipating the strengths and weaknesses
    of the model. Most importantly, a deep understanding of the inner workings of
    NLP models (explainable NLP) can help in avoiding unexpected behaviors of the
    NLP models that are already in production. This knowledge can also help in eliminating
    the impact of social biases, shown by many NLP and other machine learning models.
    Bias can appear in models because of the use of biased training data. Thus, the
    knowledge of explainable NLP translates into enhanced trust and confidence when
    deploying an NLP-powered solution in production.


    ### 1.5.5 Emergent Areas in NLP


    The boundaries of NLP research are expanding with every passing day. Emotional
    AI is emerging, where NLP models can analyze text and speech patterns to realize
    human emotions. Developments in multilingual processing using LLMs like ChatGPT
    are defying language barriers and promoting global communication. The NLP models
    are getting integrated with other modalities that include images and speech (Multimodal
    NLP). NLP is getting integrated with augmented reality, which allows different
    NLP technologies to interact within immersive environments. With real-time and
    interactive NLP, the speed and responsiveness of NLP models will progress. This
    improves the capabilities and response time in applications like real-time language
    translation (like those in international VIP conversations), video captioning,
    and Alexa-like interactive voice assistants.


    Ethical and responsible AI is another research area that is getting considerable
    attention. Researchers are constantly working toward addressing biases, ensuring
    data privacy, and maintaining transparency in AI systems. Future NLP models, including
    those in the GenAI domain, are expected to show better generalization capabilities.
    They are more reliable, requiring less fine-tuning data to adjust to new tasks.
    In the coming years, we can expect even larger, more powerful, and more reliable
    language models (LLMs included). These models have a sophisticated understanding
    of context, which allows them to produce more precise and contextually appropriate
    responses.


    ## 1.6 Short Business Case 1: Application of NLP in Medical Text Analysis


    Around the globe, a vast amount of text data is generated by the healthcare industry
    in the form of including clinical notes, patient records, research articles, and
    much more. Extracting actionable insights from such text data is a challenging
    but essential task. These valuable insights can be helpful in improving patient
    care, advancing medical research, and streamlining operations. Many powerful NLP-based
    solutions exist today to enable the analysis and interpretation of medical texts
    in different languages—transforming unstructured data into valuable information.


    NLP applications can considerably add value to the patient healthcare business
    by extraction of critical information from electronic health records. For example,
    NLP can help by identifying patterns in symptoms, diagnoses, and treatments. This
    can ultimately help in early-stage disease diagnosis and more customized treatment
    plans. An NLP-assisted system could give an early warning for a potential diagnosis
    of diabetes in patients with specific symptom patterns and lab results. It can
    lead to the instigation of further and timely intervention by medical professionals.


    ### 1.6.1 Streamlining Clinical Research


    Medical research professionals often dig through large piles of electronic and
    other health records (relevant research, patient data, and results of clinical
    trials) for their investigations. NLP applications can automate the extraction
    of relevant information from research articles, clinical trial databases, and
    patient records. For example, these applications can quickly identify studies
    that match their criteria or find patients with specific genetic markers for targeted
    trials.


    ### 1.6.2 Improving Administrative Efficiency


    Many administrative tasks, like coding, billing, and documentation, can be very
    laborious, time-consuming, and prone to errors at the same time. NLP applications
    can streamline these business processes by automating the extraction and classification
    of information needed for billing codes, patient insurance claims, and essential
    regulatory compliance. For example, NLP systems are capable of reading and interpreting
    doctors’ notes and other medical records to automatically extract billing codes.
    This can considerably reduce the administrative burden on healthcare providers
    and, at the same time, minimize the risk of errors.


    ### 1.6.3 Enhancing Data Accessibility


    Manual storage and retrieval of patient and other health records is a very laborious
    and time-consuming task. NLP applications can automate the entire process. In
    fact, most healthcare establishments these days are already use these applications.
    By converting unstructured text records into structured data, NLP applications
    are capable of creating searchable databases of medical records. This enables
    quick access to patient histories and treatment outcomes, enabling quick decision-making
    and coordination among healthcare professionals. Additionally, NLP can also be
    used to create patient-friendly summaries (in their mother tongues, if required)
    of complex medical information. Such summaries in local languages can improve
    patient understanding and engagement in their care.'
  raw: '### 1.5.3 Cross-Lingual and Multiple-Lingual Models: Handling Multiple Languages


    Cross-lingual NLP models can comprehend multiple languages, and they are also
    capable of transferring knowledge between them. This can swiftly enable tasks
    like machine translation and cross-lingual understanding. Although a multiple-lingual
    model (MLM) models can also handle multiple languages simultaneously, this understanding
    comes without necessarily transferring knowledge between multiple languages. MLMs
    can perform many different NLP tasks without the need to have separate language
    models for each language. A single MLM can handle multiple languages parallelly.


    The tasks that can be performed by cross-lingual NLP models include machine translation,
    social media sentiment analysis, cross-lingual information retrieval, multilingual
    text classification, cross-lingual question answering, entity recognition, and
    language inference. At the same time, MLMs are useful in tasks like text classification,
    language detection, named entity recognition, part-of-speech tagging, sentiment
    analysis, machine translation, question answering, and text summarization.


    The real-world examples of multilingual NLP models (MLMs) include Google Translate,
    Microsoft Translator, Amazon Comprehend, Facebook M2M-100, and IBM Watson Language
    Translator. In contrast, cross-lingual NLP models are represented by XLM-R (Cross-lingual
    Language Model–RoBERTa), mBERT (multilingual BERT), M2M-100 (Many-to-Many 100),
    LASER (Language-Agnostic SEntence Representations), and T5 (Text-To-Text Transfer
    Transformer).


    ### 1.5.4 Explainable NLP: Reason Model Results


    In simple words, explainable NLP is like having a colleague who explains why she
    thinks something is true so that you can understand her reasoning. As put forward
    by Søgaard (2021) in his NLP book, explainable NLP is an emerging field that is
    lately getting a lot of attention from the tech community worldwide. Many industries,
    including healthcare and law, require the NLP developers to reason the predictions
    made by the models developed by them. In fact, it’s a legal requirement in many
    countries.


    The knowledge of explainable NLP is essential for two reasons: one is confirming
    that the AI-driven solutions duly comply with local and international regulations,
    particularly in finance and other sensitive fields like healthcare and legal.
    Another reason is that if we better understand how a model works, it can translate
    to reduce errors and develop capabilities anticipating the strengths and weaknesses
    of the model. Most importantly, a deep understanding of the inner workings of
