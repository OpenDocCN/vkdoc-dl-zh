    # 引言


    本书面向所有希望学习和掌握自然语言处理（NLP）与生成式 AI（GenAI）领域实践技能的专业人士、学者和学生。


    本书假定读者具备机器学习、深度学习，尤其是 Python 的中级技能。本书从基础知识开始，逐步深入到 Transformer 模型和生成式 AI 的高级概念。


    作者希望您在阅读本书时，在一台性能尚可的计算设备上打开 Python 编辑器，最好配备 8 GB 内存和 I5（或以上）或同等 CPU。这是一本实践性书籍，只有您在阅读过程中亲自编写书中给出的代码片段，才能从中受益。


    本书使用的所有代码和数据集均可在[`https://github.com/Apress/Mastering-Text-Analytics`](https://github.com/Apress/Mastering-Text-Analytics)获取。


    作者在本书中引用的任何源代码或其他补充材料均可在此处找到：https://www.apress.com/gp/services/source-code。


    # 关于作者


    # 关于技术审校者


    # 1. 自然语言处理：导论


    ## 1.1 为何要阅读本章


    本章作为本书其余部分的引言，探讨如何借助计算机和机器人等机器进行语言处理。为什么自然语言处理（NLP）很重要？


    NLP 能够分析语言的含义。在这里，*语言*指的是人类在日常交流中使用的语言，如英语、德语、法语和印地语。借助机器（主要是计算机系统），NLP 长期以来一直发挥着有用的作用。此类系统可以纠正语法、将语音转换为文本，甚至进行语言间的翻译。谷歌翻译就是这类翻译工具的最佳范例之一。NLP
    可以帮助机器用人类的语言与人类交流。借助这项技术，机器可以自动阅读文本、听取并解释语音，并在 Twitter（现为 X）等社交媒体平台上执行公众情感分析（针对任何主题，如新产品发布和政治）。


    ## 1.2 自然语言处理简介


    现在是时候正式介绍 NLP 了。亚马逊将其定义为“一种机器学习技术，使计算机能够解释、操作和理解人类语言”。同样，IBM 将其定义为“计算机科学和人工智能（AI）的一个子领域，它利用机器学习使计算机能够理解人类语言并与之交流”。


    NLP 领域的研究使得像 ChatGPT 和许多其他平台这样的生成式 AI（GenAI）新时代成为可能。这类软件被称为大型语言模型（LLM）。GenAI 软件可以生成文本、图像甚至视频。NLP
    已经成为许多人日常生活的一部分。这类用户不仅集中在发达国家，全球许多发展中国家也无法想象没有 NLP 和 GenAI 软件的日常工作。NLP 的一些常见应用包括：为谷歌和微软等搜索引擎提供动力、驱动用于客户服务的聊天机器人、基于语音的
    GPS 系统，甚至包括苹果的 Siri 和亚马逊的 Alexa 等数字助手。


    数据科学和机器学习领域相对较新的进展极大地促进了 NLP 这门艺术和科学的发展。NLP 领域主要分为三个部分。


    * **理解语音**：将英语等口语语言翻译成人类可读的文本。


    * **理解自然语言**：机器（通常是计算机或同等设备）理解语言的能力。


    * **生成自然语言**：这指向了像 ChatGPT 这样的应用，它们使计算机能够生成自然语言。


    对人类使用的自然语言进行处理之所以特殊，原因有很多。首先，一个词在句子或段落中的含义是上下文相关的，这意味着同一个词在不同的上下文中可以有不同的含义。


    根据斯坦福大学 AI 教授 Chris Manning 的说法，NLP 是一个信号系统，其中的符号本质上是离散的、象征性的和分类性的。相同的含义可以通过不同的方式传达。可以是语音、手势或符号。每种方式都是独特且模糊的。其他使其变得困难的挑战包括拼写错误的单词、口语和俚语、过多的本地语言和方言（例如，仅在非洲大陆就有超过
    3000 种语言）等等。


    尽管 NLP 科学有其局限性，但它仍然为人类带来了广泛的益处。随着新技术的快速发展，许多这些障碍正以前所未有的速度被消除。


    让我们考虑一下全球产生的数据量。Srinivasa-Desikan 提供了一些具体数据：谷歌每年处理超过 1 万亿次查询，Twitter 每天有 16 亿次查询，WhatsApp
    每天处理超过 300 亿条帖子。让我们看看以下数字。


    * 全球每天大约产生 4.0274 亿 TB 的数据


    * 2024 年大约产生了 147 泽字节的数据


    * 2025 年大约将产生 181 泽字节的数据

