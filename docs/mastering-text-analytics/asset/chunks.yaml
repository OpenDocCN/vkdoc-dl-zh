    ### 4.2.3 使用 NLTK 进行词干提取


    如果你之前没有学习过自然语言处理，词干提取对大多数人来说可能是一个新词。这是一种数据预处理技术，属于更广泛的规范化范畴。此操作将单词（如它们在文本语料库的句子中出现的那样）缩减为其词基或词根形式。转换后的单词称为词干。词干提取涉及剥离像“ing”、“ed”和“ly”这样的后缀，以将单词转换为其基本形式。词干提取确保在文本分析过程中，一个单词的变体被视为相同。词干提取也降低了数据的维度，类似于停用词移除的操作（见图
    4-1）。


    ![流程图展示了“使用 NLTK 的词干提取过程”。它包含四个顺序步骤：“输入文本”、“分词”、“应用词干提取算法”和“输出词干化单词”。每个步骤都由一个箭头表示，并附有图标和描述。该过程从准备初始文本开始，将其分割成单个单词，应用词干提取算法将单词缩减为其词根形式，最后编译并显示词干化单词。](img/649581_1_En_4_Fig1_HTML.jpg)


    **图 4-1** 使用 NLTK 的词干提取过程


    词干提取有时会产生非词典单词，如下例所示。


    *   “Caring” 可以被词干化为 “car”，而不是其词根 “care”。

    *   “Happiness” 可以被词干化为 “happi”，而不是其词根 “happy”。


    尽管存在这种近似，词干提取仍然是提高文本处理效率和实用性的强大工具。你可以直接从 IBM 的网站 [`www.ibm.com/think/topics/stemming`](http://www.ibm.com/think/topics/stemming)
    访问更多示例。


    清单 4-3 演示了使用 `NLTK` 进行词干提取的操作。此函数可以直接在你的自然语言处理项目中用作主要的数据预处理步骤之一。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    # 导入所需的库。

    import nltk

    from nltk.stem import PorterStemmer

    from nltk.tokenize import word_tokenize

    # 导入其他必要的资源。

    nltk.download(''punkt'')

    def stemmer(text):

    """

    使用 Porter 词干提取器对输入单词进行词干提取。

    参数:

    text (str): 要进行词干提取的原始文本。

    返回:

    list: 词干化后的单词列表。

    """

    # 初始化 Porter 词干提取器。

    stemmer = PorterStemmer()

    # 对输入文本进行分词。

    words = word_tokenize(text)

    # 对输入文本中的每个单词应用词干提取器。

    stemmed_words = [stemmer.stem(word) for word in words]

    return stemmed_words

