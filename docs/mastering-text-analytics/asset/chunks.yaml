    *   “Happiness” can be stemmed to “happi” in place of its root word, “happy”.


    In spite of this approximation, stemming still remains a powerful tool for cultivating
    the efficiency and usefulness of text processing. You can access more examples
    directly from IBM’s website at [`www.ibm.com/think/topics/stemming`](http://www.ibm.com/think/topics/stemming).


    Listing [4-3](#649581_1_En_4_Chapter.xhtml#PC3) demonstrates stemming operation
