    ### 4.2.8 词语相似度计算


    词语相似度计算衡量两个词在含义上的相似程度。它利用单词在文本中的定义或用法来比较它们的相似性。让我们通过一个简单的例子来更好地理解它：“car”和“automobile”是相似的，因为它们都指代同一类型的车辆；“cat”和“kitten”是相似的，因为它们指代动物类型。类似地，“computer”和“laptop”是相关的，因为它们代表相似的计算设备。通过比较含义，可以找出哪些词是相似的（甚至是同义的）。


    词语相似度可以通过多种方式衡量：检查单词定义、分析它们在文本中的用法，或使用正式的数学模型。正式衡量词语相似度使系统能够更有效地理解和处理人类语言。不相似的词具有较低的词语相似度分数。代码清单
    4-8 是这个重要的 NLP 数据预处理步骤的 Python 演示。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    # 加载所需的库

    import nltk

    from nltk.corpus import wordnet

    # 下载 WordNet。

    nltk.download(''wordnet'')

    def word_similarity(word1, word2):

    # 获取两个单词的同义词集

    synsets1 = wordnet.synsets(word1)

    synsets2 = wordnet.synsets(word2)

    if not synsets1 or not synsets2:

    return "一个或两个单词未在 WordNet 中找到。"

    # 计算所有同义词集对的相似度。

    similarities = []

    for syn1 in synsets1:

    for syn2 in synsets2:

    similarity = syn1.wup_similarity(syn2)

    if similarity is not None:

    similarities.append(similarity)

    # 返回最高相似度分数。

    return max(similarities, default="无可用相似度分数")

    # 示例 1。

    sample_word1 = "dog"

    sample_word2 = "puppy"

    similarity_score = word_similarity(sample_word1, sample_word2)

    print(f"Similarity score between ''{ sample_word1 }'' and ''{ sample_word2}'':
    {similarity_score}")

    OUTPUT 1:

    Similarity score between ''dog'' and ''puppy'': 0.896551724137931

    # 示例 2。

    sample_word1 = "Canon"

    sample_word2 = "House"

    similarity_score = word_similarity(sample_word1, sample_word2)

    print(f"Similarity score between ''{ sample_word1 }'' and ''{ sample_word2 }'':
    {similarity_score}")

    OUTPUT 2:

    Similarity score between ''Canon'' and ''House'': 0.42857142857142855

    代码清单 4-8

    使用 NLTK 进行词语相似度测量

    ```

