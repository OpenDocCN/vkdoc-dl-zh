    AI Agent with advanced AI models, including Takane, a large language model for
    enterprises that offers the highest Japanese language proficiency in the world,[⁸](#649581_1_En_10_Chapter.xhtml#Sec24)
    Fujitsu AutoML, and also leverages Microsoft’s Semantic Kernel. This open-source
    development kit enables users to easily build AI agents and integrate the latest
    AI models into their C#, Python, or Java codebase.


    Fujitsu Kozuchi enhances business decision-making and boosts productivity. This
    integration helps Kozuchi to execute complex semantic interpretations of natural
    language inputs, beyond the literal content to the contextual meaning, purpose,
    and relationships between concepts expressed in text, all of which are achieved
    without any human input.


    To understand how the Kozuchi AI Agent works, let us look at the following example,
    where the Kozuchi AI Agent is attending a meeting with some humans and listening
    to the conversations between humans. It proactively gives its suggestions.


    #### 10.3.3.1 Exhibit X.1: Kozuchi AI Agent Attending a Meeting: An Example


    *   **Miriam Graham**: *“Today, I’d like to review business trends. Recently,
    I’ve been hearing* *that deals in Asia are not going well.”*


    *   **Alex Wilber**: *“No, I think Asia is fine. I’ve heard we lost a few small
    deals, but I don’t think it’s affecting the big picture.”*


    *   **Miriam Graham**: *“I know Dan, the head of Asia, has said as much, but apparently,
    the numbers show otherwise.”*


    *   **Alex Wilber**: *“Oh, you’re right. The numbers are different. Maybe the
    large deal we recently secured hasn’t been accounted for yet. Let me check with
    Dan right away.”*


    While the two executives were talking, Kozuchi AI Agent, who was unobtrusively
    present in the meeting, came up with additional data. It analyzed available data
    and proactively directed the team to perform sales analysis in the Asia region.
    The result presented clear, logical reasons for discrepancy across the two divergent
    views. The AI agent comes up with the following.


    *   **Fujitsu Kozuchi AI Agent**: *“Let’s get a more accurate understanding of
    the current situation by checking the actual number of business negotiations and
    changes in sales figures in the Asia region. The graphical representation showed
    that the sales revenue in the Asia region became half in 2024 as compared to 2023.”*


    The AI Agent does not stop at this. Instead, it conducts an in-depth analysis
    to examine what is happening in other regions. For example, it provides a graphical
    representation of sales revenue for the same quarter of both the current and previous
    financial years for all other regions in which the company operates. This way,
    much better-informed decisions can be made during the meeting. Depending on the
    discussions, Kozuchi may also assist with other data to determine the reason behind
    this revenue decline. Kozuchi handles all these tasks autonomously, supporting
    the uninterrupted flow of the meeting and contributing to increased productivity.'
  trans: '

    ### 10.3.2 富士通的 AI 举措


    2024 年 10 月 23 日，富士通推出了`Fujitsu Kozuchi AI Agent`，这是一款专有的云端 AI 服务，能够通过独立工作以及与人类协作的方式，参与众多
    AI 服务。


    `Kozuchi`在日语中意为“魔法锤”，指的是一种传说中的日本锤子，可以创造出任何想要的东西。`Kozuchi AI Agent`代表了 AI 能力，富士通声称它可以满足任何业务需求。`Kozuchi
    AI Agent`提供以下七项 AI 服务（见图 10-1）。


    ![流程图展示了各种 AI 技术如何集成到 Fujitsu Kozuchi AI Agent 中。该图表包含六个组件：生成式 AI、AutoML、预测分析、文本处理、视觉处理和
    AI 信任。每个组件都由一个图标表示，并通过箭头汇聚到 AI Agent，象征着这些技术的组合。](img/649581_1_En_10_Fig1_HTML.jpg)


    图 10-1


    Fujitsu Kozuchi AI Agent（此图示由作者使用 napkin.ai 创建）


    - **Fujitsu Kozuchi 生成式 AI**：与其他生成式 AI 工具一样，它通过充当人类与计算机之间处理自然语言和非结构化数据的桥梁，来提高人类的生产力和创造力。

    - **Fujitsu Kozuchi AutoML**：该服务有助于在极短时间内生成高精度的机器学习模型。`Fujitsu Kozuchi AutoML`在收到用自然语言描述的业务问题时，能够自动为客户业务生成
    AI 功能。它有能力将业务问题转化为最合适的数学模型。然后，该数学模型会被转化为适合客户业务的 AI 功能。

    - **Fujitsu Kozuchi 预测分析**：该服务利用现有数据创建高精度的需求预测模型，以满足客户对各种产品不断变化的需求，并自动进行调整，无需任何人工干预。

    - **Fujitsu Kozuchi 文本处理**：该服务在文本通过 NLP 技术数字化后，帮助分析文本。在本章后面，我们将重点介绍`Fujitsu Kozuchi
    for Text`以及`Fujitsu Kozuchi AI Agent`的其他服务，以了解 AI Agent 如何执行超越文本分析的语义分析。

    - **Fujitsu Kozuchi 视觉处理**：该服务通过 100 个预训练的基本动作模型和行为识别规则列表来转换视觉元素，以识别复杂的人类行为。

    - **Fujitsu Kozuchi AI 信任**：该服务允许通过 Web 浏览器只需点击几下即可验证 AI 的公平性、质量和安全性。它还提供了 AI
    工具所需的质量和道德标准验证服务。它提高了用户的 AI 素养，帮助他们评估准确性、公平性、版权合规性、数据管理和滥用预防。

    - **Fujitsu Kozuchi XAI**：该服务解读 AI 生成结果背后的因果关系。通过对海量数据集的全面计算，`Kozuchi Explainable
    AI`确保不会遗漏任何有意义的因果关系，从而每次都提供可靠的见解。


    ### 10.3.3 用于语义分析的 Fujitsu Kozuchi


    `Fujitsu Kozuchi`是一个专有的云端 AI 平台，提供横跨七个 AI 领域的广泛解决方案，以帮助业务转型。本节将探讨该平台的一个关键分析功能：语义分析能力。语义分析能力使组织能够从非结构化文本数据中获取有意义的见解。


    `Fujitsu Kozuchi`的语义分析方法超越了基本的文本处理，通过与`Kozuchi`平台中的其他服务集成，从而创建一个能够处理大量非结构化文本数据的全方位生态系统。该服务展示了富士通从交互式
    AI 到主动式 AI 的显著进步，擅长将抽象的对话概念转化为可执行的任务。它集成了`Kozuchi AI Agent`专有的处理逻辑与先进的 AI 模型，包括`Takane`（一个为企业提供全球最高日语水平的大语言模型⁸）、`Fujitsu
    AutoML`，并且还利用了微软的`Semantic Kernel`。这个开源开发工具包使用户能够轻松构建 AI 代理，并将最新的 AI 模型集成到他们的`C#`、`Python`或`Java`代码库中。


    `Fujitsu Kozuchi`增强了业务决策并提高了生产力。这种集成帮助`Kozuchi`对自然语言输入执行复杂的语义解释，超越字面内容，理解上下文含义、目的以及文本中表达的概念之间的关系，所有这些都在无需任何人工输入的情况下完成。


    为了理解`Kozuchi AI Agent`的工作原理，让我们看下面的例子，其中`Kozuchi AI Agent`正在参加一个有人类参与的会议，并聆听人类之间的对话。它会主动提出自己的建议。


    #### 10.3.3.1 示例 X.1：Kozuchi AI Agent 参加会议：一个例子


    - **米里亚姆·格雷厄姆**：*“今天，我想回顾一下业务趋势。最近，我听说亚洲的交易进展不顺利。”*

    - **亚历克斯·威尔伯**：*“不，我认为亚洲没问题。我听说我们丢了一些小单子，但我不认为这会影响大局。”*

    - **米里亚姆·格雷厄姆**：*“我知道亚洲负责人丹也这么说过，但显然数据表明并非如此。”*

    - **亚历克斯·威尔伯**：*“哦，你说得对。数据确实不同。也许我们最近获得的大单还没有被计入。让我马上和丹确认一下。”*


    当两位高管交谈时，一直低调地出现在会议中的`Kozuchi AI Agent`提供了额外的数据。它分析了现有数据，并主动引导团队对亚洲地区进行销售分析。结果清晰地展示了导致两种不同观点存在差异的逻辑原因。AI
    代理提出了以下内容。


    - **Fujitsu Kozuchi AI Agent**：*“让我们通过查看亚洲地区实际商务谈判次数和销售额数据的变化，来更准确地了解当前情况。图表显示，与
    2023 年相比，2024 年亚洲地区的销售收入减少了一半。”*


    AI 代理并未止步于此。相反，它进行了深入分析，以检查其他地区的情况。例如，它提供了公司运营的所有其他地区当前和上一财年同季度的销售收入图表。这样，会议期间就可以做出更明智的决策。根据讨论情况，`Kozuchi`还可能协助提供其他数据，以确定收入下降的原因。`Kozuchi`自主处理所有这些任务，支持会议不间断地进行，并有助于提高生产力。

