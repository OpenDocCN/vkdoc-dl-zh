    ```python

    # The following is a simplified code demo of LSA

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    from sklearn.feature_extraction.text import TfidfVectorizer

    from sklearn.decomposition import TruncatedSVD

    # Sample common text corpus

    documents = [

    "The cat sat on the mat.",

    "Dogs are great companions.",

    "The sun is bright today.",

    "Cats and dogs are popular pets.",

    "The weather is nice for a walk."

    ]

    # Step 1: Data Cleaning and Formatting for Analysis,

    # Skipping this step as the data has already been cleaned.

    # Step 2: Construct the TF-IDF matrix

    vectorizer = TfidfVectorizer()

    tfidf_matrix = vectorizer.fit_transform(documents)

    # Step 3: Apply SVD to reduce dimensions

    svd = TruncatedSVD(n_components=2)

    lsa_matrix = svd.fit_transform(tfidf_matrix)

    # Step 4: Analyze the results

    # Create a DataFrame for viewing

    lsa_df = pd.DataFrame(lsa_matrix, columns=[''Concept 1'', ''Concept 2''])

    print("Reduced Dimensions (Latent Concepts):")

    print(lsa_df)

    Reduced Dimensions (Latent Concepts):

    Concept 1     Concept 2

    0  6.263182e-01  1.932910e-16

    1 -4.140572e-16  8.096747e-01

    2  7.173435e-01 -7.926662e-15

    3 -1.891549e-16  8.096747e-01

    4  6.985829e-01  8.989044e-15

    Listing 7-2

    LSA Code Demo

    ```


    Let’s interpret this output matrix.


    - In the output matrix, rows represent individual documents.

    - Columns represent latent concepts or themes.

    - Values indicate the strength of each document’s relationship to those concepts.

    - Negative values indicate a lack of relevance of that document to that concept
    (column).

    - High values indicate more relevance of that document (row) to that concept (column).

    - The first and third documents (column 1) show high values. It shows strong relevance
    to Concept 1.

    - The second document has a significant value (column 2). It shows strong relevance
    to Concept 2.

    - Other documents in both columns are less relevant.

    - The first and third documents may share a theme.

    - The second document relates to a different topic.

    - Higher scores indicate thematic similarities among documents. It helps in clustering
    and topic identification.

    - Look at which documents have higher values for each concept and then check their
    content.

    - You can then decode what concept 1 and concept 2 represent based on their thematic
    similarities.


    ### 7.4.2 Popular Word Embeddings


    Word embeddings use large amounts of text to learn the relationship between the
    words. Popular word embeddings, such as `Word2Vec`, `GloVe`, and `FastText`, capture
    context, similarity, and semantic nuances to map words into numerical vectors.
    These numerical vectors essentially capture their meaning and relationships between
    words. Next, let’s divide these word embeddings into traditional and newer ones,
    like `BERT` and `GPT`, based on contextual word representations.


    #### Traditional Word Embeddings


    Traditional word embeddings map words to fixed-size vectors. They were the early
    techniques in NLP based on word co-occurrence patterns in large text datasets.
    Traditional techniques, such as `Word2Vec` and `GloVe`, analyze how frequently
    and in what context words appear together in large training datasets to capture
    relationships between words and create word representations in the form of word
    vectors.


    ##### Word2Vec


    `Word2Vec` (word to vector) converts words to machine readable numeric vectors,
    which represent a specific word (as a vector) in multidimensional space. These
    vectors help machines to capture word meaning, semantic similarity, and relationship
    with surrounding text. `Word2Vec` is essentially a pre-trained model. It utilizes
    a shallow neural network model to acquire the meaning of words from a large corpus
    of (training) texts. To make the processing prompt, fast, and transparent, `Word2Vec`
    neural networks use only one or two hidden layers. These neural networks are trained
    using large databases of texts. The `Word2Vec` algorithm uses either continuous
    bag of words or skip-gram approaches to generate word embeddings.


    ###### Continuous Bag of Words Model


    The continuous bag of words (CBOW) model is an unsupervised method of finding
    word embeddings. It predicts the target word by utilizing the words surrounding
    it (context words). For this purpose, it utilizes a shallow neural network program
    (CBOW model). This program learns to predict any target word by utilizing the
    words that appear before and after it in a given context window. By concentrating
    on the surrounding context words, the CBOW model is able to capture the meaning
    of a word (in a given context) in the form of numerical vectors (embeddings).


    For instance, in the sentence, `“he is a great scholar,”` if we want the word
    embeddings of the word “great,” we first take a context window. Assuming this
    context window has two words, then we consider two words before the target word
    “great” and also consider two words after it. So, for our example sentence, the
    context words are as follows.


    - Two words before the target word “great” – (“is”, “a”)

    - Two words after the target word “great” – (“scholar”)


    Using this context window, the CBOW model learns to calculate the word embeddings
    of the target word “great.” Listing [7-3](#649581_1_En_7_Chapter.xhtml#PC10) is
    a code demonstration of CBOW, a well-documented shallow neural network.'
