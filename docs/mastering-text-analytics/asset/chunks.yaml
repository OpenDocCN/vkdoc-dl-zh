    ## 3.2.3 Introducing Regular Expressions for Text Processing


    Regular expressions (RegEx) are essential tools in the preprocessing of text data.
    RegEx can extract specific patterns and clean text data in preparing data for
    training NLP models. This section introduces regular expressions and demonstrates
    how they can be used in data preprocessing.


    A regular expression is cut by a sequence of characters that formulates a search
    pattern. They can be used to determine if a text string matches the specified
    search pattern. Now, it is time to jump into code examples to understand RegEx
    better.


    First, visit [`www.w3schools.com/python/python_regex.asp`](http://www.w3schools.com/python/python_regex.asp)
    to get a list of RegEx metacharacters. Without these metacharacters, you will
    not be able to write or understand any RegEx code. Listing [3-4](#649581_1_En_3_Chapter.xhtml#PC4)
    is about only the Python RegEx methods.


    ```

    Python RegEx examples.

    # A list of all matches.

    import re # the RegEx library.

    # Below is a demo sentence.

    demo_txt = "The referee had to match the players'' skills to ensure a fair match."

    # Find all occurrences of the word "match".

    list = re.findall("match", demo_txt)

    print(list)

    [''match'', ''match'']

    # Split the string at each black space.

    demo_txt = "The referee had to match the players'' skills to ensure a fair match."

    list = re.split("\s", demo_txt)

    print(list)

    [''The'', ''referee'', ''had'', ''to'', ''match'', ''the'', "players''", ''skills'',
    ''to'', ''ensure'', ''a'', ''fair'', ''match.'']

    # Let''s now print the part of the string with a match.

    demo_txt = "Last week I visited Spain"

    # Visit W3school to find meaning of metacharacter "\bS\w+"

    match = re.search(r"\bS\w+", demo_txt)

    print(match.group())

    Spain

    # The search functions. Search for the first white-space.

