    ### 4.2.8 Word Similarity Calculation


    Word similarity calculation measures with how two words are similar in meaning.
    It uses definitions or usage of a word in text to compare their similarities.
    Let’s try to understand it better with a simple example: “car” and “automobile”
    are similar as they both refer to the same type of vehicle; “cat” and “kitten”
    are similar as they refer to types of animals. Similarly, “computer” and “laptop”
    are related as they represent similar computing devices. Comparing the meanings,
    one can find out which words are similar (or even synonymous).


    Word similarity can be measured in multiple ways: by checking word definitions,
    by analysis of their usage in texts, or by using formal mathematical models. Formally
    measuring word similarities enables systems to understand and process human languages
    more effectively. Dissimilar words have lower word similarity scores. Listing
    [4-8](#649581_1_En_4_Chapter.xhtml#PC8) is a Python demo of this important NLP
    data preprocessing step.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    # Load the reqi

    import nltk

    from nltk.corpus import wordnet

    # Download that WordNet.

    nltk.download(''wordnet'')

    def word_similarity(word1, word2):

    # Get synsets for both words

    synsets1 = wordnet.synsets(word1)

    synsets2 = wordnet.synsets(word2)

    if not synsets1 or not synsets2:

    return "One or both words are not found in WordNet."

    # Calculate similarity with all pairs of synsets.

    similarities = []

    for syn1 in synsets1:

    for syn2 in synsets2:

    similarity = syn1.wup_similarity(syn2)

    if similarity is not None:

    similarities.append(similarity)

    # Return the highest similarity score.

    return max(similarities, default="No similarity score available")

    # Example 1.

    sample_word1 = "dog"

    sample_word2 = "puppy"

    similarity_score = word_similarity(sample_word1, sample_word2)

    print(f"Similarity score between ''{ sample_word1 }'' and ''{ sample_word2}'':
    {similarity_score}")

    OUTPUT 1:

    Similarity score between ''dog'' and ''puppy'': 0.896551724137931

    # Example 2.

    sample_word1 = "Canon"

    sample_word2 = "House"

    similarity_score = word_similarity(sample_word1, sample_word2)

    print(f"Similarity score between ''{ sample_word1 }'' and ''{ sample_word2 }'':
    {similarity_score}")

    OUTPUT 2:

    Similarity score between ''Canon'' and ''House'': 0.42857142857142855

    Listing 4-8

    Word Similarity Measurements Using NLTK

    ```'
