    ## 4.5 本章回顾


    本章深入探讨了各种 NLP 技术。原始文本数据的预处理是 NLP 的核心，旨在使原始数据可用于进一步分析。我们从文本分词开始本章，这涉及将文本分解为可管理的片段。接着，我们处理了无关词汇（即停用词）的移除，以便将重点放在更有意义的内容上。我们还探讨了词干提取和词形还原。这些技术将单词简化为其词根形式，从而可以将相似的单词分组，以改进分析过程。


    句子分割（以及查找 WFD）使我们能够更好地理解输入文本的结构。查找词频也帮助我们分类文档中的关键术语。此外，我们探讨了如何检测同义词和反义词，这对于释义等
    NLP 任务至关重要。接着，我们进展到更复杂的任务，如计算词语相似度。查找相似度使机器能够比较和对比不同的文本片段。探索 WSD 帮助我们学习如何解决词语歧义。WSD
    根据输入文本中的上下文找出词语的正确含义。关键词提取是另一个关键重点。它使我们能够专注于大型文本语料库中最相关的术语。


    超越文本预处理，我们探讨了诸如词性标注和命名实体识别等任务。词性标注为每个单词分配正确的语法角色，而命名实体识别则对给定文本语料库中的实体（如人名、组织和地点）进行分类。这些工具使得更深入的文本分析和更好的文本理解成为可能。


    在本章的最后部分，我们探讨了 NLTK 之外的一些重要功能。其中包括用于文本数据探索性分析的词云生成。我们还研究了用于内容全球化的机器翻译，以及用于将长文本压缩为简洁摘要的文本摘要。本章旨在为你提供
    NLP 技术，并提供一个用于处理和分析文本数据的综合工具包。本章讨论的每种技术都附有代码演示，以便你可以直接将所给代码用于各种 NLP 应用，从学术研究到核心商业应用。


    ## 4.6 练习


    1.  在任何文本分析任务中，例如文本分类或 Twitter 情感分析（关于产品或电影），比较包含和排除停用词的结果。如果你不熟悉文本分类或 Twitter
    情感分析，可以在 [Kaggle.​com](http://kaggle.com) 或许多其他文章中找到教程。这些文本分析项目将在后续章节中介绍。


    2.  为一个相对较大的文本文档（至少两页）生成文本摘要和词云，并观察词云中突出显示的所有重要词汇是否都出现在你的摘要中。


    # 5. 词法分析


    ## 5.1 为何要阅读本章


    为了让机器能够理解和结构化输入文本，将文本分解为更小的单元并进行分类是一个基本过程。词法分析正是执行此操作；它涉及将输入文本分解为最基本的单元，如单词、词素和词元。词素是语言中意义的最小单位。它们代表不同的单词，例如“dog”或“read”。词素也包括单词的组成部分，如前缀（`"un-"`）、后缀（`"-ing"`）或词根（`"tele-"`，如
    `"telecommunication"` 中的）。词素是任何语言结构中的基本构建块。


    词法分析将非结构化文本转换为结构化数据，这对于解析、语义分析和信息检索等高级 NLP 任务至关重要。使用词法分析准确识别和分类语言组件，有助于提高多个实际
    NLP 应用的效率和效果。词法分析最终使计算机能够更好地理解人类的语言和文字。

