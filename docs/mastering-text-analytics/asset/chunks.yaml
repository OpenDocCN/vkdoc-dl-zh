    spaCy 词形还原器结合了基于规则和统计的方法来查找单词的原形。它已集成到 spaCy NLP 库中。该词形还原器在将单词还原为其原形方面准确性高，因此在高性能和上下文感知的词形还原任务中效果显著。命名实体识别、依存句法分析、高级文本分析以及大规模数据处理等
    NLP 应用尤其会利用此词形还原器。以下是代码演示。


