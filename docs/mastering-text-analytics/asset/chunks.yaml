    \ 在庞大的文本数据上进行训练。通过这种方式，它对其训练的语言形成了深刻的理解。之后，我们可以稍微修改 `BERT`，并用我们自己的数据（新的特定于问题的数据）对其进行训练，以高效地执行\
    \ NLP 任务，如文本分类、命名实体识别、语言翻译、摘要和释义检测。这种对已训练好的 `BERT` 模型的重新训练或微调，可以使用非常少量的数据来完成。\n"
- fmt: '### 8.1.4 Multimodal NLP: Combining Text with Images, Audio, and More


    Multimodal NLP combines diverse forms of information, such as text, speech, images,
    and videos, as inputs to make NLP tasks smarter. By combining different types
    of information as input, machines can better understand the communication between
    humans, as humans are also having similar capabilities. For example, to comprehend
    the class lessons, one may utilize class lectures, written texts, pictures, and
    videos for support. Another example of this is in face-to-face meetings. Facial
    expressions are also available, which can help better in another person’s mood
    detection. In a similar fashion, machines can enhance language tasks, such as
    translation, by incorporating pictures and videos to convey meanings more effectively.
    Multimodal NLP is a relatively new area of research.


    The following are some of the tools available for multimodal NLP.


    - **OpenAI CLIP** links images and text. Its usage is mainly in image search or
    visual language understanding.

    - **Google Vision transformer (ViT)** links vision and language tasks. This tool
    refines the model’s performance in image classification and the generation of
    automatic captions.

    - **Multimodal BERT (ViLBERT)** extends BERT so that it can process both visual
    and textual data. This tool is especially useful for NLP tasks such as visual
    question answering and automatic image captioning.

    - **DeepMind Perceiver** is a versatile model capable of handling various input
    data types, including text, images, and audio. It is highly effective in multimodal
    learning.

    - **TensorFlow Multimodal Toolkit (TF-MMT)** is an all-inclusive framework for
    developing and training multimodal NLP models. It is useful for NLP tasks such
    as emotion detection and the analysis of multimedia content.


    ### 8.1.5 Demonstrating the Use of OpenAI CLIP for Multimodal Understanding


    The theme of Listing [8-2](#649581_1_En_8_Chapter.xhtml#PC2) demonstrates the
    use of OpenAI CLIP for multimodal understanding, specifically to compute text-to-image
    similarity. The program assesses the degree to which various text descriptions
    align with a given image by utilizing CLIP’s capability to integrate textual and
    visual representations.


    ```

    import torch

    from transformers import CLIPProcessor, CLIPModel

    from PIL import Image

    import matplotlib.pyplot as plt

    # Load the CLIP model and processor

    model = CLIPModel.from_pretrained("openai/clip-vit-base-patch16")

    processor = CLIPProcessor.from_pretrained("openai/clip-vit-base-patch16")

    # Function to display the image

    def display_image(image_path):

    img = Image.open(image_path)

    plt.imshow(img)

    plt.axis(''off'')

    plt.show()

    # Example image and text for image-to-text search

    image_path = ''dog_with_person_on_beach.jpg''  # Replace with your image path

    text_descriptions = ["A dog running on the beach",

    "A golden retriever in a park",

    "A person surfing on a beach",

    "A sunset over the ocean"]

    # Preprocess image and text

    image = Image.open(image_path)

    inputs = processor(text=text_descriptions, images=image, return_tensors="pt",
    padding=True)

    # Get image and text features

    with torch.no_grad():

    outputs = model(**inputs)

    # Calculate similarity

    image_features = outputs.image_embeds

    text_features = outputs.text_embeds

    similarities = torch.cosine_similarity(image_features, text_features)

    # Show similarity scores

    for i, text in enumerate(text_descriptions):

    print(f"Text: ''{text}'' | Similarity: {similarities[i]:.4f}")

    # Display the image

    display_image(image_path)

