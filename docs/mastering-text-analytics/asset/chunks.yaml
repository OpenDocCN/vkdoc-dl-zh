    ## 4.5 Chapter Recap


    This chapter provided an in-depth exploration of various NLP techniques. Preprocessing
    of the raw text data is at the core of NLP to make the raw data usable for further
    analysis. We began the chapter by text tokenization, which involves breaking down
    text into manageable pieces. Following this, we tackled the removal of irrelevant
    words, called stop words, to keep the focus on more meaningful content. We also
    explored stemming and lemmatization. These are the techniques that simplify words
    to their root forms so that similar words can be grouped together to improve the
    analysis process.


    Sentence segmentation (along with finding WFD) permitted us to better understand
    the input text structures. Finding word frequencies also helped us to categorize
    key terms within a document. Further, we explored how to detect synonyms and antonyms
    that are crucial for NLP tasks like paraphrasing. We then progressed to more complex
    tasks like calculating word similarity. Finding similarity allows machines to
    compare and contrast different pieces of text. Exploring WSD helped us learn how
    to resolve word ambiguities. WSD finds the correct meaning of a word based on
    its context in the input text. Keyword extraction was another key focus. It enabled
    us to focus on the most relevant terms within a large text corpus.


    Moving beyond text preprocessing, we explored tasks such as POS tagging and NER.
    POS tagging assigns the proper grammatical role to every word, while NER categorizes
    entities like names, organizations, and locations within a given text corpus.
    These tools make possible deeper text analysis and a better understanding of text.


    In the last leg of this chapter, we explored some important functionalities outside
    of NLTK. It included word cloud generation for exploratory analysis of text data.
    We also studied machine translation for content globalization and text summarization
    for condensing lengthy texts into concise summaries. The aim of this chapter was
    to equip you with NLP techniques and provide a comprehensive toolkit for handling
    and analyzing text data. Code demos are given with every technique discussed in
    this chapter so that you can directly use the given code for a variety of NLP
    applications, ranging from academic research to hardcore business applications.


    ## 4.6 Exercises


    1. In any text analytics task, such as text classification or Twitter sentiment
    analysis (about a product or a movie), compare the results with and without the
    stop words. If you are new to text classification or Twitter sentiment analysis,
    you can get the tutorials on [Kaggle.​com](http://kaggle.com) or with many other
    articles. These text analytics projects are covered in the upcoming chapters.


    2. Generate the text summary and word cloud for a relatively large text document
    (minimum two pages) and observe if all the prominent words highlighted in the
    word cloud appear in your summary.


    # 5. Lexical Analysis


    ## 5.1 Why You Should Read This Chapter


    For machines to understand and structure the input text, breaking down text into
    smaller units and categorizing them is an essential process. Lexical analysis
    exactly does this; it involves breaking down the input text into its utmost basic
    units like words, morphemes, and tokens. Morphemes are the smallest units of meaning
    in a language. They represent distinct words, like “dog” or “read.” Morphemes
    also includes parts of words, such as prefixes (`"un-"`), suffixes (`"-ing"`),
    or roots (`"tele-"` as in `"telecommunication"`). Morphemes are fundamental blocks
    in the structure of any language.


    Lexical analysis transforms unstructured text into structured data, which is essential
    for advanced NLP tasks like parsing, semantic analysis, and information retrieval.
    Accurate identification and categorization of language components using lexical
    analysis helps in improving the efficiency and effectiveness of several real-life
    NLP applications. Lexical analysis ultimately enables computers to better understand
    what humans speak and write.'
