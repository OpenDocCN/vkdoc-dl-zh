    ### 5.6.9 Removal of Emojis


    In text preprocessing, we need to remove emojis to simplify text data. Removing
    emojis lets models focus on the most relevant content. Removing emojis helps us
    to standardize the input data and makes it more uniform and easier to process.


    ```

    # We will use regular expressions to remove emojis directly from combined_df[''text_lower_case''].

    import pandas as pd

