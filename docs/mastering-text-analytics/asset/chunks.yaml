- fmt: "### 8.1.1 Evolution of NLP: From Traditional Models to Transformers\n\nThe\
    \ first significant foundational stone in NLP was laid by the Georgetown-IBM experiment\
    \ in 1954, which successfully translated 60 Russian sentences into English using\
    \ rule-based techniques. Until the 1970s, it was considered an era of rule-based\
    \ NLP systems, mainly deployed for machine translation. During this period, researchers\
    \ developed complex sets of linguistic rules, enabling computers of the era to\
    \ process human language. The 1980s and 1990s are marked as an era of development\
    \ in statistical methods and machine learning algorithms for the machine processing\
    \ of human languages. `Hidden Markov Models` and `support vector machines` especially\
    \ prevailed during this period in the NLP domain. These techniques allowed more\
    \ flexible and data-driven approaches to NLP.\n\nFrom the early 2000s to the present,\
    \ deep learning-based models have become mainstream for processing human languages.\
    \ In fact, neural networks have revolutionized the field of NLP by enabling complex\
    \ tasks such as speech processing, improved machine translations, and social media\
    \ sentiment analysis. Neural network models, such as recurrent neural networks\
    \ (`RNNs`), long short-term memory (`LSTM`) networks, and transformers have played\
    \ a key role in these advancements. Figure [8-2](#649581_1_En_8_Chapter.xhtml#Fig2)\
    \ depicts these advances in the NLP domain from the 1950s until 2020. From 2020\
    \ onward, we have all witnessed the emergence of game-changing GenAI models, such\
    \ as `ChatGPT`, and many more.\n\n![Timeline and flow chart illustrating the evolution\
    \ of NLP models from the 1950s to the present. Key stages include:\\n\\n1. **1950s-1980s**:\
    \ Early NLP Models focused on rule-based systems for translation and speech recognition.\\\
    n2. **1980s-2000s**: Statistical Models introduced probabilistic methods, shifting\
    \ towards data-driven approaches.\\n3. **2000s-2010s**: Traditional Machine Learning\
    \ Models leveraged increased computational power and internet data for model improvement.\\\
    n4. **2010s-2017**: Deep Learning Models utilized CNNs and RNNs to enhance text\
    \ generation and summarization tasks.\\n5. **2017-Present**: Transformer Models\
    \ revolutionized NLP with attention mechanisms and GPU advancements.\\n\\nThe\
    \ chart visually represents these stages with icons and descriptions, highlighting\
    \ the transition from rule-based to transformer models.](images/649581_1_En_8_Chapter/649581_1_En_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2**  \nThe evolution of NLP models from translation (early 1950s)\
    \ to transformers (2017)\n\n### 8.1.2 Overview of BERT by Google\n\n`BERT` (Bidirectional\
    \ Encoder Representations from Transformers) was made available for general public\
    \ usage in 2018. `BERT` was released as an open-source license by Google. `BERT`\
    \ is a widely used transformer-based model. It is grounded on the transformer\
    \ model architecture, explicitly its encoder module. `BERT` is designed to recognize\
    \ the context of words in sentences. `BERT` processes words in the context of\
    \ entire input sentences and does not look at words one by one, as done by some\
    \ techniques employed for NLP tasks. This way, `BERT` can pick up the word’s meaning\
    \ even if it appears to be vague. `BERT` excels in tasks such as sentiment analysis,\
    \ question answering, and text classification. Fine-tuned `BERT` variants are\
    \ also available for specialized domains, such as biology, data science, and medicine.\
    \ Today, `BERT` is available in many variants, each designed with a specific trait.\
    \ Some of its variants are as follows.\n\n*   **RoBERTa** advances `BERT`’s training\
    \ by altering vital hyperparameters.\n*   **DistilBERT** reduces `BERTBASE` to\
    \ a model having fewer number parameters, whereas it preserves most of its benchmark\
    \ scores while doing so.\n*   **TinyBERT** is a reduced model with even fewer\
    \ parameters compared to `DistilBERT`.\n*   **ALBERT** utilizes a shared parameter\
    \ across layers and substitutes the subsequent sentence prediction task with the\
    \ sentence-order prediction task.\n*   **ELECTRA** applies the clues of GAN (generative\
    \ adversarial networks) to the masked language model task. `ELECTRA` learns faster\
    \ by having one model create fake words and another model detect if they are real\
    \ or fake.\n\n`RoBERTa` is widely considered suitable for general-purpose NLP\
    \ tasks. It is the best for tasks that require high accuracy and strong language\
    \ comprehension. To use `RoBERTa`, resource availability should not be a constraint.\
    \ `DistilBERT` is much smaller in size than `RoBERTa`, and it is the most popular\
    \ variant of `BERT` because it balances finely between performance and efficiency.\
    \ `DistilBERT` needs much fewer computational resources (than `RoBERTa`) and still\
    \ maintains around 97% of `BERT`’s accuracy. Due to these advantages, `DistilBERT`\
    \ is used for many practical applications across domains. `DistilBERT` is especially\
    \ useful when resources are limited. Our code demo uses `DistilBERT` as the sample\
    \ program is being developed and run on a modest business computer.\n\n> **Note**\
    \  \n> Masked language modeling (`MLM`) is a technique where certain words in\
    \ an input sentence are randomly masked. The model is then trained to predict\
    \ the missing words based on the surrounding context. A `GAN` is an AI variant\
    \ that uses two competing models: one produces false data and the other detects\
    \ if the fake data produced by the first model is real or fake. `ELECTRA` advances\
    \ learning speed by substituting masked words with fake ones and then training\
    \ the model to spot them. It permits `ELECTRA` to learn from every word and not\
    \ by just the limited words it guesses.\n\n### 8.1.3 Code to Demonstrate the Use\
    \ of DistilBERT Using PyTorch\n\n`Listing 8-1` depicts the Code Example on How\
    \ to Use `DistilBERT` with `PyTorch`."
  raw: '### 8.1.1 Evolution of NLP: From Traditional Models to Transformers


    The first significant foundational stone in NLP was laid by the Georgetown-IBM
    experiment in 1954, which successfully translated 60 Russian sentences into English
    using rule-based techniques. Until the 1970s, it was considered an era of rule-based
    NLP systems, mainly deployed for machine translation. During this period, researchers
    developed complex sets of linguistic rules, enabling computers of the era to process
    human language. The 1980s and 1990s are marked as an era of development in statistical
    methods and machine learning algorithms for the machine processing of human languages.
    Hidden Markov Models and support vector machines especially prevailed during this
    period in the NLP domain. These techniques allowed more flexible and data-driven
    approaches to NLP.


    From the early 2000s to the present, deep learning-based models have become mainstream
    for processing human languages. In fact, neural networks have revolutionized the
    field of NLP by enabling complex tasks such as speech processing, improved machine
    translations, and social media sentiment analysis. Neural network models, such
    as recurrent neural networks (RNNs), long short-term memory (LSTM) networks, and
    transformers have played a key role in these advancements. Figure [8-2](#649581_1_En_8_Chapter.xhtml#Fig2)
    depicts these advances in the NLP domain from the 1950s until 2020\. From 2020
    onward, we have all witnessed the emergence of game-changing GenAI models, such
    as ChatGPT, and many more.


    ![Timeline and flow chart illustrating the evolution of NLP models from the 1950s
    to the present. Key stages include:\\n\\n1\. **1950s-1980s**: Early NLP Models
    focused on rule-based systems for translation and speech recognition.\\n2\. **1980s-2000s**:
    Statistical Models introduced probabilistic methods, shifting towards data-driven
    approaches.\\n3\. **2000s-2010s**: Traditional Machine Learning Models leveraged
    increased computational power and internet data for model improvement.\\n4\. **2010s-2017**:
    Deep Learning Models utilized CNNs and RNNs to enhance text generation and summarization
    tasks.\\n5\. **2017-Present**: Transformer Models revolutionized NLP with attention
    mechanisms and GPU advancements.\\n\\nThe chart visually represents these stages
    with icons and descriptions, highlighting the transition from rule-based to transformer
    models.](images/649581_1_En_8_Chapter/649581_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    The evolution of NLP models from translation (early 1950s) to transformers (2017)


    ### 8.1.2 Overview of BERT by Google


    BERT (Bidirectional Encoder Representations from Transformers) was made available
    for general public usage in 2018\. BERT was released as an open-source license
    by Google. BERT is a widely used transformer-based model. It is grounded on the
    transformer model architecture, explicitly its encoder module. BERT is designed
    to recognize the context of words in sentences. BERT processes words in the context
    of entire input sentences and does not look at words one by one, as done by some
    techniques employed for NLP tasks. This way, BERT can pick up the word’s meaning
    even if it appears to be vague. BERT excels in tasks such as sentiment analysis,
    question answering, and text classification. Fine-tuned BERT variants are also
    available for specialized domains, such as biology, data science, and medicine.
    Today, BERT is available in many variants, each designed with a specific trait.
    Some of its variants are as follows.


    *   **RoBERTa** advances BERT’s training by altering vital hyperparameters.


    *   **DistilBERT** reduces BERTBASE to a model having fewer number parameters,
    whereas it preserves most of its benchmark scores while doing so.


    *   **TinyBERT** is a reduced model with even fewer parameters compared to DistilBERT.


    *   **ALBERT** utilizes a shared parameter across layers and substitutes the subsequent
    sentence prediction task with the sentence-order prediction task.


    *   **ELECTRA** applies the clues of GAN (generative adversarial networks) to
    the masked language model task. ELECTRA learns faster by having one model create
    fake words and another model detect if they are real or fake.


    RoBERTa is widely considered suitable for general-purpose NLP tasks. It is the
    best for tasks that require high accuracy and strong language comprehension. To
    use RoBERTa, resource availability should not be a constraint. DistilBERT is much
    smaller in size than RoBERTa, and it is the most popular variant of BERT because
    it balances finely between performance and efficiency. DistilBERT needs much fewer
    computational resources (than RoBERTa) and still maintains around 97% of BERT’s
    accuracy. Due to these advantages, DistilBERT is used for many practical applications
    across domains. DistilBERT is especially useful when resources are limited. Our
    code demo uses DistilBERT as the sample program is being developed and run on
    a modest business computer.


    Note


    Masked language modeling (MLM) is a technique where certain words in an input
    sentence are randomly masked. The model is then trained to predict the missing
    words based on the surrounding context. A GAN is an AI variant that uses two competing
    models: one produces false data and the other detects if the fake data produced
    by the first model is real or fake. ELECTRA advances learning speed by substituting
    masked words with fake ones and then training the model to spot them. It permits
    ELECTRA to learn from every word and not by just the limited words it guesses.


    ### 8.1.3 Code to Demonstrate the Use of DistilBERT Using PyTorch


    Listing 8-1 depicts the Code Example on How to Use DistilBERT with PyTorch'
  trans: "\n### 8.1.1 自然语言处理的演进：从传统模型到 Transformer\n\n自然语言处理领域的第一块重要基石，是 1954 年由乔治城-IBM\
    \ 实验奠定的。该实验利用基于规则的技术，成功地将 60 个俄语句子翻译成了英语。直到 20 世纪 70 年代，这都被认为是基于规则的自然语言处理系统时代，这些系统主要用于机器翻译。在此期间，研究人员开发了复杂的语言规则集，使当时的计算机能够处理人类语言。20\
    \ 世纪 80 年代和 90 年代，标志着机器处理人类语言的统计方法和机器学习算法发展的时代。`隐马尔可夫模型`和`支持向量机`在此期间尤其盛行于自然语言处理领域。这些技术为自然语言处理提供了更灵活、更数据驱动的方法。\n\
    \n从 21 世纪初至今，基于深度学习的模型已成为处理人类语言的主流。事实上，神经网络通过实现诸如语音处理、改进机器翻译和社交媒体情感分析等复杂任务，彻底改变了自然语言处理领域。诸如循环神经网络（`RNN`）、长短期记忆网络（`LSTM`）和\
    \ Transformer 等神经网络模型在这些进步中发挥了关键作用。图 8-2 描绘了从 20 世纪 50 年代到 2020 年自然语言处理领域的这些进展。从\
    \ 2020 年起，我们都见证了像`ChatGPT`等颠覆性生成式 AI 模型的出现。\n\n![一张时间线和流程图，展示了从 20 世纪 50 年代至今自然语言处理模型的演进过程。关键阶段包括：1.\
    \ **20 世纪 50 年代-80 年代**：早期自然语言处理模型，专注于基于规则的翻译和语音识别系统。2. **20 世纪 80 年代-2000 年代**：统计模型引入了概率方法，转向数据驱动的方法。3.\
    \ **2000 年代-2010 年代**：传统机器学习模型利用增强的计算能力和互联网数据来改进模型。4. **2010 年代-2017 年**：深度学习模型利用\
    \ CNN 和 RNN 来增强文本生成和摘要任务。5. **2017 年至今**：Transformer 模型通过注意力机制和 GPU 的进步彻底改变了自然语言处理。该图表使用图标和描述直观地展示了这些阶段，突出了从基于规则模型到\
    \ Transformer 模型的转变。](img/649581_1_En_8_Fig2_HTML.jpg)\n\n**图 8-2**  \n自然语言处理模型从翻译（20\
    \ 世纪 50 年代初）到 Transformer（2017 年）的演进\n\n### 8.1.2 Google BERT 概述\n\n`BERT`（来自\
    \ Transformer 的双向编码器表示）于 2018 年向公众开放使用。`BERT`由 Google 以开源许可证形式发布。`BERT`是一个广泛使用的基于\
    \ Transformer 的模型。它基于 Transformer 模型架构，特别是其编码器模块。`BERT`旨在识别句子中单词的上下文。`BERT`在整个输入句子的上下文中处理单词，而不是像某些用于自然语言处理任务的技术那样逐个查看单词。通过这种方式，即使单词含义模糊，`BERT`也能捕捉其意义。`BERT`在情感分析、问答和文本分类等任务中表现出色。针对专业领域，如生物学、数据科学和医学，也有微调后的`BERT`变体可用。如今，`BERT`有多种变体，每种都针对特定特性而设计。其中一些变体如下：\n\
    \n*   **RoBERTa** 通过改变关键超参数来改进`BERT`的训练。\n*   **DistilBERT** 将`BERTBASE`缩减为参数数量更少的模型，同时保留了其大部分基准分数。\n\
    *   **TinyBERT** 是一个精简模型，其参数甚至比`DistilBERT`更少。\n*   **ALBERT** 在层间使用共享参数，并用句子顺序预测任务替代了下一句预测任务。\n\
    *   **ELECTRA** 将 GAN（生成对抗网络）的思路应用于掩码语言模型任务。`ELECTRA`通过让一个模型生成假词，另一个模型检测这些词是真是假，从而学习得更快。\n\
    \n`RoBERTa`被广泛认为适用于通用自然语言处理任务。它最适合需要高精度和强语言理解能力的任务。使用`RoBERTa`时，资源可用性不应成为限制因素。`DistilBERT`的规模比`RoBERTa`小得多，它是`BERT`最流行的变体，因为它在性能和效率之间取得了良好的平衡。`DistilBERT`需要的计算资源（比`RoBERTa`）少得多，同时仍能保持`BERT`约\
    \ 97%的准确率。由于这些优势，`DistilBERT`被用于跨领域的许多实际应用中。当资源有限时，`DistilBERT`尤其有用。我们的代码演示使用了`DistilBERT`，因为示例程序是在一台普通的商用计算机上开发和运行的。\n\
    \n> **注意**  \n> 掩码语言建模（`MLM`）是一种技术，其中输入句子中的某些单词被随机掩码。然后训练模型根据周围上下文预测缺失的单词。`GAN`是一种\
    \ AI 变体，它使用两个相互竞争的模型：一个生成虚假数据，另一个检测第一个模型生成的虚假数据是真是假。`ELECTRA`通过用假词替换掩码词，然后训练模型识别它们，从而提高了学习速度。这使得`ELECTRA`能够从每个单词中学习，而不仅仅是从它猜测的有限单词中学习。\n\
    \n### 8.1.3 使用 PyTorch 演示 DistilBERT 用法的代码\n\n`代码清单 8-1` 展示了如何使用`PyTorch`使用`DistilBERT`的代码示例。\n"
- fmt: "# Install the following libraries if not done already.\n```python\n#!pip install\
    \ transformers datasets torch\n# Install PyTorch for CPU-only support\n#!pip install\
    \ torch torchvision torchaudio\n#!pip install --user \"accelerate>=0.26.0\"\n\
    # For GPU Support (NVIDIA CUDA)\n#!pip install torch torchvision torchaudio --index-url\
    \ https://download.pytorch.org/whl/cu118\n#!pip install --user \"accelerate>=0.26.0\"\
    \n```\n\nThis program shows how to fine-tune and use the `DistilBERT` model for\
    \ sentiment analysis on the IMDb dataset. It involves:\n\n1. Loading the IMDb\
    \ dataset and preparing it.\n2. Tokenizing the text data using `DistilBERT`'s\
    \ tokenizer.\n3. Fine-tuning the pre-trained `DistilBERT` model for binary classification.\n\
    4. Evaluating the fine-tuned model and making predictions on new text.\n\nExplanation\
    \ of imports:\n- `DistilBertTokenizer`: Used to tokenize input text into the format\
    \ required by the `DistilBERT` model.\n- `DistilBertForSequenceClassification`:\
    \ Pre-trained `DistilBERT` model tailored for sequence classification tasks.\n\
    - `Trainer`: High-level API for training and evaluating Hugging Face models.\n\
    - `TrainingArguments`: Configuration for the `Trainer`, including batch size,\
    \ epochs, learning rate, etc.\n- `load_dataset`: Part of the `datasets` library,\
    \ used to load and manage datasets like IMDb for training and evaluation.\n\n\
    ```python\nfrom transformers import DistilBertTokenizer, DistilBertForSequenceClassification,\
    \ Trainer, TrainingArguments\nfrom datasets import load_dataset\n```\n\n## Final\
    \ code follows\n\n### Step 1: Load Dataset\n\n```python\nfrom datasets import\
    \ load_dataset\ndataset = load_dataset(\"imdb\")\n# Split into training and validation\
    \ sets\ntrain_data = dataset[\"train\"].shuffle(seed=42).select(range(2000)) \
    \ # Select smaller subset for demo\nval_data = dataset[\"test\"].shuffle(seed=42).select(range(500))\n\
    ```\n\n### Step 2: Load Tokenizer\n\n```python\nfrom transformers import DistilBertTokenizer\n\
    tokenizer = DistilBertTokenizer.from_pretrained(\"distilbert-base-uncased\")\n\
    # Tokenize the data\ndef tokenize_function(examples):\n    return tokenizer(examples[\"\
    text\"], padding=\"max_length\", truncation=True)\n\ntrain_data = train_data.map(tokenize_function,\
    \ batched=True)\nval_data = val_data.map(tokenize_function, batched=True)\n# Set\
    \ format for PyTorch\ntrain_data.set_format(type=\"torch\", columns=[\"input_ids\"\
