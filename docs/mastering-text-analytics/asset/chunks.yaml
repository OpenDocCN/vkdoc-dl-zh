    ### 4.2.3 Stemming Using NLTK


    Stemming might be a new word for most of you if you have not studied NLP before.
    This is a data preprocessing technique, and it comes under the broader category
    of normalization. This operation reduces words (as they appear in sentences of
    text corpora) to their base or root form. The transformed words are known as the
    stem. Stemming involves stripping suffixes like “ing,” “ed,” and “ly” to transform
    words into their base form. Stemming ensures that variations of a word are treated
    as the same during text analysis. Stemming also reduces the dimensionality of
    the data, like the operation of stop word removal (see Figure [4-1](#649581_1_En_4_Chapter.xhtml#Fig1)).


    ![Flow chart illustrating the "Stemming Process with NLTK." It consists of four
    sequential steps: "Input Text," "Tokenization," "Stemming Algorithm Application,"
    and "Output Stemmed Words." Each step is represented by an arrow with accompanying
    icons and descriptions. The process begins with preparing the initial text, dividing
    it into individual words, applying the stemming algorithm to reduce words to their
    root form, and finally compiling and displaying the stemmed words.](images/649581_1_En_4_Chapter/649581_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** Stemming process with NLTK


    Stemming can sometimes produce non-dictionary words, as demonstrated in the following
    examples.


    *   “Caring” can be stemmed to “car” in place of its root word, “care”.

    *   “Happiness” can be stemmed to “happi” in place of its root word, “happy”.


    In spite of this approximation, stemming still remains a powerful tool for cultivating
    the efficiency and usefulness of text processing. You can access more examples
    directly from IBM’s website at [`www.ibm.com/think/topics/stemming`](http://www.ibm.com/think/topics/stemming).


    Listing [4-3](#649581_1_En_4_Chapter.xhtml#PC3) demonstrates stemming operation
    with `NLTK`. This function can be directly utilized in your NLP projects as one
    of the primary data preprocessing steps.


    ```

    # Install nltk if you have not done it already.

    !pip install nltk # The code output not included here.

    # Import required libraries.

    import nltk

    from nltk.stem import PorterStemmer

    from nltk.tokenize import word_tokenize

    # Import other necessary resources.

    nltk.download(''punkt'')

    def stemmer(text):

    """

    Stems the input words using the Porter stemmer.

    Args:

    text (str): The original text to be stemmed.

    Returns:

    list: A list of stemmed words.

    """

    # Initialize the Porter Stemmer.

    stemmer = PorterStemmer()

    # Tokenize the input text.

    words = word_tokenize(text)

    # Apply stemmer to every word in the input text.

    stemmed_words = [stemmer.stem(word) for word in words]

    return stemmed_words

