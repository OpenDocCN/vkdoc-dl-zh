    suggest that future NLP researchers will likely focus more on areas such as AI
    in communication, cross-cultural interaction, the ethics of interaction, technological
    advancements, and digital literacy.


    # 8. Transformers, Generative AI, and LangChain


    ## 8.1 Introduction to Transformers in NLP


    The transformer architecture was introduced in 2017 by Vaswani et al. in their
    groundbreaking paper, *“Attention Is All You Need.”*


    This paper revolutionized the fields of neural network architectures and natural
    language processing (NLP). This introductory paper on transformer architectures
    explores the basic architecture and workings of transformers. Transformers use
    self-attention mechanisms to change one complete sentence into another. Transformer
    models are fundamentally different from conventional deep learning models, such
    as RNNs and LSTMs, which process a text sentence word by word. Take the example
    of a simple English sentence, “I left my book on the left side of the table.”
    The word `left` has entirely different meanings in the same sentence. As RNNs
    and LSTMs process the sentence word by word, they may fail to pick up the context-specific
    meanings of the word `left`. Transformers process entire sentences using self-attention,
    which enables them to understand any input text more quickly and accurately grasp
    the context-specific meaning of words. This way, transformer models can efficiently
    handle comparatively long sentences and complex relationships in any given input
    text. By the way, self-attention helps models to work out the important words
    (for meaning), no matter how far they are apart in the input sentence. Self-attention
    mechanisms help the models to better handle NLP tasks that involve language translation
    and text generation.


    Let’s briefly discuss the basics of the otherwise complex architecture of a transformer
    model. It comprises mainly an encoder, decoder, self-attention mechanism, and
    feed-forward neural network layers. If you need the full details, we suggest you
    refer to the [original paper](https://arxiv.org/abs/1706.03762) that introduces
    the transformer models to the world (see Figure [8-1](#649581_1_En_8_Chapter.xhtml#Fig1)).


    ![Diagram of a transformer model architecture, showing two main sections: the
    encoder on the left and the decoder on the right. Both sections include layers
    of "Add & Normalize," "Multi-head Attention," and "Feed Forward" processes. The
    encoder processes input embeddings with positional encoding, while the decoder
    processes output embeddings with masked multi-head attention. The final output
    probabilities are generated through a linear layer followed by a softmax function.
    The diagram highlights the flow of data and the repeated application of layers,
    denoted by "Nx."](images/649581_1_En_8_Chapter/649581_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Transformer model architecture ([source](https://www.researchgate.net/figure/The-transformer-model-architecture_fig3_362829106))


    Before discussing the four layers of a transformer model, let’s focus on the following
    basic terminology in this connection.


    - **Self-attention**: It helps the model to have a global look at all the words
    in any input sentence to understand how the words in the sentence relate to each
    other in the proper context. It helps the transformer model to focus on important
    words, irrespective of their position in the input sentence.


    - **Cross-attention**: It facilitates the transformer model to connect the input
    sentence to the output sentence being generated by the model. Cross-attentions
    ensure the output sentence is created based on the right parts of the input sentence.


    The following is a brief description of the basic elements of a transformer model.


    - **Embedding**: It converts the given input words into numerical vectors (also
    called embeddings) that can be interpreted (understood) by the transformer model.


    - **Encoder**: The input is put in the form of sentences to the encoder. It processes
    it through layers. Each of these layers employs a self-attention mechanism to
    focus on important words in any given input sentence. Then, the same self-attention
    mechanism takes the input sentence through the feed-forward networks. This whole
    process transforms the data into meaningful representations.


    - **Decoder**: The final output sentence is generated by the decoder. It takes
    the input from the processed data of the encoder. The decoder also employs the
    self-attention mechanism to comprehend the generated words. It uses cross-attention
    to line up with the encoder’s input.


    - **Self-attention mechanism**: (This concept was discussed before introducing
    the model layers.)


    - **Feed-forward neural network**: It is a basic artificial neural network (ANN)
    that works with each encoder and decoder layer to transform input data. This helps
    identify complex patterns in the data as it is processed.


    To summarize the workings of transformer models, all these elements work together
    to convert any given input sentence into an output sentence. It is the job of
    the embedding layer to convert input words to numerical vector formats. Then comes
    the encoder that uses self-attention to retrieve the important words, their relationships,
    and the context. Feed-forward networks help encode in this process that finally
    extracts meaningful patterns from the input sentence. Next comes the decoder,
    which takes inputs from the data processed by the encoder to refine the output
    sentence step by step. Elements such as cross-attention and self-attention aid
    the decoder in this process. Now comes the output layer that transforms the processed
    data into the final words that are presented in the form of the output sentence.'
