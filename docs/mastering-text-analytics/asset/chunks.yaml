- fmt: '# Bag-of-Words Model


    The bag-of-words (`BoW`) model is classically done after tokenization, which is
    then used to create the `BoW` representation. The `BoW` model is one of the primary
    techniques in NLP. `BoW` is used to represent text data as a collection of words,
    regardless of grammar and order of words in the input text. `BoW` works on the
    frequency or presence of words in a text. This is the technique it employs to
    convert text into numerical features that are essential for further analysis.
    `BoW` technique treats every word as an individual token and creates a “bag,”
    in which words appearing frequently are considered to be dominating.


    `BoW` and tokenization are related concepts. Tokens are the building blocks for
    the `BoW` model. The model then counts the occurrence and frequency of each token
    across the input text. The `BoW` model is widely used for many NLP tasks, such
    as text classification and sentiment analysis. This technique transforms text
    into a machine-readable numeric format. We demonstrate the `BoW` model with an
    example.


    Once the tokenization step in text preprocessing is complete, we are left with
    variable-length sequences of text (each sentence has a different number of words).
    However, machine learning algorithms need fixed-length vectors of numbers for
    each sentence in the larger input text. The `BoW` model overcomes this challenge
    for us. It counts how many times every word appears in an input text document
    with multiple sentences (see Figure [5-1](#649581_1_En_5_Chapter.xhtml#Fig1)).
    It is like keeping all tokens in a bag where the order of the words is ignored.
    We were only concerned about whether a word appeared or not.


    ![Table illustrating binary representation of sentences with words as columns.
    Rows list sentences: "the red dog," "cat eats dog," "dog eats food," and "red
    cat eats." Columns are labeled "the," "red," "dog," "cat," "eats," and "food."
    Each cell contains a binary value indicating the presence (1) or absence (0) of
    the word in the sentence. Arrows point from sentences to their corresponding binary
    row.](images/649581_1_En_5_Chapter/649581_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    `BoW` example


    Figure [5-1](#649581_1_En_5_Chapter.xhtml#Fig1) has four inputs sentenced as numbered
    toward the left. All these four sentences combined only five unique words, as
    shown in the table heading row. For the first sentence, “the red dog,” only the
    cells corresponding to the words “the,” “red,” and “dog” have an entry of number
    ‘1’ each. All the remaining cells have an entry of numeric “0.” We did the same
    for all the remaining three sentences. Once the `BoW` process is complete, there
    are numeric and common length vectors for all the input sentences.


    In the first sentence,” the red dog,” the corresponding numeric vector is `[1,1,1,0,0,0]`,
    and similarly, for “cat eats dog,” there are the corresponding vector `[0,0,1,1,1,0]`.
    There are similar vectors for the sentences 3 and 4 as well.


    Two things were achieved in this process.


    *   Text sentences were converted to machine-readable numeric format.

    *   All vectors were standardized to the exact length as required by machine learning
    algorithms.


    There is linguistic reasoning behind this approach of the `BoW` model: similar
    text documents share similar domain-specific vocabularies. For instance, all football-related
    articles frequently use words like score, pass, and team. Weather reports, on
    the other hand, use an entirely different set of words, such as rain, sun, and
    umbrella.


    Remember to remove stop words to make it easier to identify similar documents,
    as stop words are common in almost all documents.


    Now, you have come to the end of this section, where we explored several tokenizers
    and the `BoW` model to deal with special cases and specific text processing needs.
    Whitespace tokenization is the most upfront approach, which breaks text based
    on spaces. It works well for simpler applications. Dictionary-based tokenizers
    leverage predefined word lists to guarantee accurate token segmentation. Such
    tokenizers are used to handle known terms and proper nouns. Rule-based tokenizers
    apply predefined language rules to accommodate various text patterns and exceptions.


    Punctuation-based tokenizers list punctuation marks as delimiters. It’s useful
    in cases where text punctuations play a different role. Tweet Tokenizers are designed
    to handle exclusive aspects of social media tweets that include hashtags, mentions,
    and emojis. Finally, the MWE tokenizers deal with the challenge of multi-word
    expressions to ensure that common phrases and idiomatic expressions are treated
    as single tokens. We closed this section by defining a few more specific tokenizers.
    Every tokenizer is designed for a specific case. One has to be careful while choosing
    tokenizers. This choice is dependent on the requirements of the text and the task
    at hand.


    ## 5.4 Stemming Revisited


    Tokenization separates text into words, `BoW` then counts their frequency, and
    stemming cuts them to root forms—all three steps help to convert raw input text
    into usable features intended for NLP models. The previous chapter used the Porter
    stemmer for our code demo. It is one of the earliest stemming algorithms. Porter
    stemmer has been widely tested and used across various NLP applications for its
    efficiency and simplicity in breaking words into their root forms. One more reason
    for this widespread popularity and use is that its stemming rules are well structured
    to avoid over-stemming and under-stemming. Over-stemming is where different (distinct)
    words are wrongly reduced to the same stem. Under-stemming is the opposite, where
    closely related words are not reduced to a desired common stem.


    A few other stemmers are available, each designed for a specific purpose or cause.
    They include the Snowball stemmer and the Lancaster stemmer.


    ### 5.4.1 Code Demo for Multiple Stemmers


    Let’s examine a code demo for each of these stemmers. The code provides a short
    description and purpose for why it is designed.'
