    # 1. Natural Language Processing: An Introduction


    ## 1.1 Why You Should Read This Chapter


    This chapter serves as an introduction to the rest of the book, which explores
    language processing with the aid of machines, such as computers and robots. Why
    is natural language processing (NLP) important?


    NLP can analyze language for its meaning. Here, by *language*, we mean the lingos
    like English, German, French, and Hindi, which humans use in their day-to-day
    transactions. NLP, with the aid of machines (primarily computer systems), has
    long fulfilled useful roles. Such systems can correct grammar, convert speech
    to text, and even translate between languages. Google Translator is one of the
    best examples of such translators. NLP can help machines communicate with humans
    in their language. With the help of this technology, machines can automatically
    read text, hear and interpret speech, and perform public sentiment analysis (on
    any topic, such as new product introductions and politics) on social media platforms
    like Twitter (now X).


    ## 1.2 Introduction to Natural Language Processing


    It’s time to formally introduce NLP. Amazon defines it as “a machine learning
    technology that gives computers the ability to interpret, manipulate, and comprehend
    human language.” Similarly, IBM defines it as “a subfield of computer science
    and artificial intelligence (AI) that uses machine learning to enable computers
    to understand and communicate with human language.”


    Research in the field of NLP has made possible the new era of generative AI (GenAI)
    platforms like ChatGPT and many others. These types of software are called large
    language models (LLMs). GenAI software can generate text, images, and even videos.
    NLP is already a routine part of life for many. This kind of users are not only
    concentrated in developed countries, but many developing countries across the
    globe can’t imagine their day-to-day working without NLP and GenAI software. Some
    common applications of NLP are powering search engines like those from Google
    and Microsoft, prompting chatbots used for customer service, speech-based GPS
    systems, and even digital assistants like Siri by Apple and Amazon’s Alexa.


    The comparatively recent advances in the fields of data sciences and machine learning
    have greatly benefited the art and science of NLP. The field of NLP is largely
    divided into three areas.


    * **Understanding speech**: The translation of spoken languages like English and
    many others into human-readable text.


    * **Understanding natural languages**: A machine’s (usually computers or equivalent)
    capability to understand language.


    * **Generation of natural languages**: This points us to ChatGPT-like applications
    that make natural language generation by computers.


    The processing of natural languages used by humans is special for many reasons.
    First of all, the meaning of a word in a sentence or a paragraph is contextual,
    meaning the same word can have different meanings in different contexts.


    According to Chris Manning, an AI professor at Stanford, NLP is a signaling system
    where symbols are discrete, symbolic, and categorical in nature. The same meaning
    can be conveyed in different ways. It can be speech, gesture, or signs. Each of
    these ways is unique and ambiguous. Other challenges that make it difficult are
    misspelled words, colloquialisms and slang, too many local languages and dialects
    (like there are over 3,000 languages in the African continent alone), and so on.


    While the science of NLP has its limitations, it still offers widespread benefits
    to humanity. With rapid developments in new technologies, many of these blocks
    are getting removed at an unprecedented rate.


    Let’s consider the amount of data generated globally. Srinivasa-Desikan gives
    some concrete data: Google handles more than 1 trillion queries per year, Twitter
    has 1.6 billion queries every day, and WhatsApp handles more than 30 billion posts
    per day. Let’s look at the following figures.


    * About 402.74 million terabytes of data are produced worldwide each day


    * Approximately 147 zettabytes of data were produced in 2024


    * Roughly 181 zettabytes of data will be produced in 2025'
