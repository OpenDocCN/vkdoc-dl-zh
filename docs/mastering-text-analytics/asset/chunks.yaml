    基于描述的最相关图像是 `running_dog_on_beach.jpg`。清单 8-3 的输出。


    ## 8.2 GPT 概述


    GPT 是 *生成式预训练变换器* 的缩写，是自然语言处理和人工智能领域一个值得注意的飞跃。该模型采用先进的机器学习技术，在给出适当提示时能够生成类似人类的对话。GPT
    系列模型，如 GPT-2、GPT-3 和 GPT-4，是 OpenAI 近期开发努力的成果。这些模型在自然语言处理任务中展现出卓越的能力，包括文本生成、摘要和机器翻译。这些模型以及许多其他类似模型（由多家公司开发）被广泛称为
    GenAI（生成式人工智能）模型。


    让我们从一段关于 GenAI 系统演变的简短介绍开始，从 RNN 说起。

    '
- fmt: '### 8.2.1 Evolution of Text Generation Models: From RNNs to GPT


    `RNNs` (early 1980s) were one of the significant steps in text processing. `RNNs`
    are capable of processing text serially while preserving hidden steps across many
    timesteps. `RNNs` typically struggle with processing long queues of text data
    (long-term dependencies due to the problem of vanishing gradients). The development
    of `LSTMs` and `GRUs`, as improvements over `RNNs`, enables them to handle long-term
    dependencies. Then, `Seq2Seq` models with attention mechanisms were introduced,
    allowing NLP models to focus on specific important parts of the input text. This
    innovation revolutionized NLP tasks, including text summarization and machine
    translation. Despite these milestone developments, NLP models still lacked the
    capability to handle longer contexts, and they were not scalable to the required
    extent. This book does not delve into the fine details of neural networks and
    deep learning.


    Following a breakthrough in the development of transformer models in 2017, text
    processing, particularly text generation, has made significant progress. The self-attention
    mechanisms of transformer models not only enabled parallel processing but also
    made it possible to deal with longer contexts, a capability that was missing in
    the earlier models. The introduction of transformer models laid a strong foundation
    for the development of `GPT` models by OpenAI. `GPT` models were pre-trained on
    massive NLP datasets, and they could be fine-tuned for specific tasks. A few years
    later, the development of `GPT2`, `GPT-3`, and more recently `GPT-4` scaled up
    the capabilities of earlier such models by manifolds. These models are state-of-the-art
    when it comes to consistency and reasoning. Figure [8-3](#649581_1_En_8_Chapter.xhtml#Fig3)
    depicts this evolution.


    ![Flow chart illustrating milestones in AI and NLP evolution. Key events include:
    1936, Turing Machines proposed by Alan Turing; 1950, Turing Test introduced; 1964,
    ELIZA chatbot developed; 1966, Hidden Markov Model introduced; 1982, Recurrent
    Neural Network developed; 1997, Long Short-Term Memory introduced; 2014, Generative
    Adversarial Network introduced; 2017, Transformers introduced; 2018, GPT-1 and
    BERT launched; 2023, GPT-4 and LLaMA released. Each milestone is represented with
    icons and connected by a winding path.](images/649581_1_En_8_Chapter/649581_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    The evolution of NLP models from RNNs to GPT-4


    More recently, many other AI-focused companies, like Meta (Facebook’s parent company),
    have come up with their text generation models. Despite this, OpenAI’s models
    remain one of the most popular.


    ### 8.2.2 A Short Note on the Working of GenAI (LLMs) Models


    `GenAI` models, like `LLMs`, are based on cutting-edge neural networks trained
    to generate human-like text. `GenAI` models use a transformer architecture that
    depends on self-attention mechanisms, and they use embeddings to process the input
    text in a given context. These models analyze large datasets to learn patterns,
    grammar, and even factual knowledge. It enables them to accomplish NLP tasks like
    predicting the next word in a sentence or articulating (generating) text from
    prompts. Examples of `GenAI` models contain `GPT` and `BERT`-based `LLMs`.


    These models first transform the input text into numerical vectors. These vectors
    are passed through multiple layers of the advanced neural network. Each layer
    works to refine the understanding of the text. These layers can capture relationships
    between words and phrases of the input text. The attention mechanisms in the model
    focus on the most relevant parts of the input. These mechanisms ensure a context-aware
    output. Training `GenAI` models involves predicting masked or next words, and
    further refining the fluency and accuracy of the models.


    `GenAI` models contain billions of parameters (weights and biases). The enormous
    size of the parameters makes the models capable of diverse tasks, such as text
    summarization, translation, and creative writing. While `GenAI` models are extremely
    effective, they need vast computational resources. They can sometimes produce
    biased or factually incorrect outputs (called hallucinations) depending on the
    training data. A more detailed theoretical explanation of the workings of `GenAI`
    models is beyond the scope of this volume; the main focus of this book remains
    the application of concepts rather than going in-depth into the underlying theory.'
