  trans: '

    ## 8.5 章节回顾


    本章探讨了当代自然语言处理（NLP）的变革世界，其起源于 Transformer 的兴起。本章从自注意力机制和交叉注意力机制开始，讲述了 NLP 从传统方法到
    BERT 等革命性模型的演变。我们讨论了 DistilBERT，并将旅程延伸至多模态 NLP。随后，我们展示了 OpenAI 的 CLIP 如何无缝整合文本、图像和音频，从而以惊人的准确度实现文本到图像搜索等
    NLP 任务。


    接着，本章深入探讨了文本生成的演变，从 RNN 到 GPT，揭示了生成式 AI 模型背后的智能过程。所有这些都凸显了 GPT 在实际应用中的适应性。之后，我们审视了
    AI 驱动创造力领域的新兴趋势。在此基础之上，我们使用正在革新技术世界的 LangChain 和 OpenAI API 进行了多个代码演示。利用这些强大的工具，我们演示了动态聊天助手和高级查询处理。本章随后通过示例展示了如何与大型语言模型（LLM）无缝交互，并在文本嵌入、基于向量的搜索和上下文感知响应方面构建了创新应用。


    在本章末尾，学习者还将了解提示词设计、序列化技术，以及为定制化应用对（进出 LLM 的）输入和输出进行自定义。通过逐步演示在 GPT-4 和 GPT-3.5
    之间切换，展示了 LLM 的灵活性。本章为有志于 AI 的从业者打开了 NLP 的未来之门，将理论见解与实际应用相结合。


    # 9. 使用 LangChain 和 OpenAI 进阶


    AI 的演进显著增强了商业应用处理复杂工作流、高效检索相关数据以及在交互中维护上下文的能力。LangChain 的前沿框架提供了关键工具，用于集成外部数据源、构建多步骤
    AI 工作流以及部署可扩展的 AI 驱动解决方案。本章探讨了 LangChain 如何实现无缝数据连接、通过链进行结构化处理、有效的内存管理、交互式代理以及可扩展的部署策略。


    第一部分着眼于**数据连接**。它详细说明了 LangChain 如何通过使用文档加载器、转换器、像 ChromaDB 这样的向量数据库以及多模态源，来关联结构化和非结构化数据。接下来，我们关注**链**，并描述如何设计和开发简单及多步骤的
    AI 工作流、处理函数调用以及优化错误处理。LangChain 中的**内存管理**对于 AI 驱动的应用至关重要，本章探讨了多种内存类型、交互追踪以及改进对话上下文。之后，我们讨论了
    AI 代理如何动态选择工具、自动化任务并适应复杂领域。在本章末尾，我们审视了 LangChain 应用的**部署与可扩展性**的各个方面。本节提供了关于在生产环境中部署
    LangChain 应用，同时确保系统性能和长期可维护性的见解。


    完成本章后，开发者应能够构建智能、高效、具有上下文感知能力并能适应多样化业务及其他用例的 AI 驱动应用。本章主要侧重于实用的代码示例、流行的行业最佳实践以及优化技术，这些技术可以简化开发流程，并支持日益增多的真实世界
    AI 应用的开发与部署。


    ## 9.1 与应用特定数据源的数据连接


    在自然语言处理（NLP）应用或任何相关应用中，有效的数据连接对于从多个来源检索、处理和使用文本或其他数据类型至关重要。本节探讨了将 AI 驱动应用集成到特定数据源的关键组件，以确保无缝的文档加载、转换和嵌入，以支持高级分析。让我们从文档加载器和集成开始。


    ### 9.1.1 文档加载、转换与集成


    LangChain 文档加载器处理并从多种输入文件格式（如 CSV、HTML、PDF、Word 文档和网页）中提取文本（及其他信息）。使用文档加载器，我们可以轻松地将数据导入
    NLP 系统或其他 AI 应用。LangChain 中的每个加载器都专门处理一种特定的文档类型，这确保了文本的高效提取和预处理。例如，`PyMuPDFLoader`
    专为处理 PDF 文件而设计，而 `UnstructuredLoader` 则可以处理多种格式。


    这些 LangChain 加载器用于各种 NLP 任务，包括对话式聊天机器人、文本摘要工具和搜索引擎。它们旨在将非结构化文本数据转换为 NLP 模型可以理解和分析的结构化格式。一些加载器还支持分块。LangChain
    中的文档加载器通过简化数据处理，显著节省了 NLP 开发中的时间和精力。


    接下来，我们将演示三个基本的文档加载器。

    '
- fmt: '# LangChain File Loaders for PDF, HTML, and CSV


    This code in Listing [9-1](#649581_1_En_9_Chapter.xhtml#PC1) loads and extracts
    content from PDF, HTML, and CSV files using specific loaders for each file type.
    It prints the first 500 characters of the content from each document to the console
    for preview. The process is repeated for all file types: PDF, HTML, and CSV.


    ```

    # Install these packages if not done already

    #!pip install pymupdf

    #!pip install Unstructured

    from langchain.document_loaders import PyMuPDFLoader  # Import PDF loader

    from langchain.document_loaders import UnstructuredHTMLLoader  # Import HTML loader

    from langchain.document_loaders import CSVLoader  # Import CSV loader

    # Paths for sample csv, pdf, and html files

    csv_path = "sample_csv.csv"

    pdf_path = "sample_pdf.pdf"

    html_path = "sample_html.pdf"

    def load_and_display_pdf(pdf_path):

    # Initialize the PDF loader with the file path

    loader = PyMuPDFLoader(pdf_path)

    # Load the document into a list of pages

    documents = loader.load()

    # Iterate through each page and print the first 500 characters

    for i, doc in enumerate(documents):

    print(f"--- Page {i + 1} ---\n")

    print(doc.page_content[:500])  # Print extracted text snippet

    print("\n" + "-" * 40 + "\n")  # Separator for readability

    def load_and_display_html(html_path):

    # Initialize the HTML loader with the file path

    loader = UnstructuredHTMLLoader(html_path)

    # Load the document

    documents = loader.load()

    # Iterate through each document and print the first 500 characters

    for i, doc in enumerate(documents):

    print(f"--- HTML Document {i + 1} ---\n")

    print(doc.page_content[:500])  # Print extracted text snippet

    print("\n" + "-" * 40 + "\n")  # Separator for readability

    def load_and_display_csv(csv_path):

    # Initialize the CSV loader with the file path

    loader = CSVLoader(csv_path)

    # Load the document into rows

    documents = loader.load()

