    You might be wondering the difference between emojis and emoticons. Emojis are
    colorful, digital icons like ![A pie chart displaying the distribution of various
    categories, each represented by a different colored segment. The chart includes
    labels and percentages for each segment, indicating the proportion of each category
    within the whole. The purpose is to visually compare the relative sizes of these
    categories.](images/649581_1_En_5_Chapter/649581_1_En_5_Figb_HTML.gif) (smiling
    face) or ![A detailed astronomical image depicting a distant galaxy cluster. The
    image showcases numerous galaxies of varying shapes and sizes, with some spiral
    and elliptical forms visible. Bright stars are scattered throughout the scene,
    some with diffraction spikes. The background is a deep black, highlighting the
    luminous celestial bodies. The image captures the vastness and complexity of the
    universe, emphasizing the diversity and distribution of galaxies in space.](images/649581_1_En_5_Chapter/649581_1_En_5_Figc_HTML.gif)
    (rocket). They stand for objects or emotions. While emoticons are text-based symbols
    like `:-)` (smiley face) or `<3` (heart). Emoticons are created with keyboard
    characters to express feelings.


    ```

    import re

    # Apply RegEx to remove emoticons. Write a function first.

    def remove_emoticons(text):

    # RegEx pattern to match commonly used emoticons.

    emoticon_pattern = re.compile(

    r''[:;=8][\-o\*]?[)\]\(\[dDpP\||/\\\^]'',

    re.UNICODE)

    return emoticon_pattern.sub(r'''', text)

    # Sample sentence with emoticons.

