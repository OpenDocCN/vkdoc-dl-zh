  trans: '

    ### 8.2.1 文本生成模型的演进：从 RNN 到 GPT


    `RNN`（20 世纪 80 年代初）是文本处理领域的重要里程碑之一。`RNN` 能够串行处理文本，同时在多个时间步中保留隐藏状态。`RNN` 通常难以处理长序列文本数据（由于梯度消失问题导致的长期依赖）。作为
    `RNN` 的改进，`LSTM` 和 `GRU` 的发展使其能够处理长期依赖关系。随后，引入了带有注意力机制的 `Seq2Seq` 模型，使 NLP 模型能够聚焦于输入文本中特定的重要部分。这一创新彻底改变了
    NLP 任务，包括文本摘要和机器翻译。尽管取得了这些里程碑式的发展，NLP 模型仍然缺乏处理更长上下文的能力，并且无法扩展到所需的程度。本书不深入探讨神经网络和深度学习的细节。


    2017 年，随着 Transformer 模型发展的突破，文本处理，尤其是文本生成，取得了显著进展。Transformer 模型的自注意力机制不仅实现了并行处理，还使得处理更长上下文成为可能，这是早期模型所不具备的能力。Transformer
    模型的引入为 OpenAI 开发 `GPT` 模型奠定了坚实的基础。`GPT` 模型在海量 NLP 数据集上进行了预训练，并且可以针对特定任务进行微调。几年后，`GPT-2`、`GPT-3`
    以及最近的 `GPT-4` 的发展，将早期此类模型的能力提升了数倍。这些模型在一致性和推理方面处于领先地位。图 8-3 描绘了这一演进过程。


    ![展示 AI 和 NLP 演进里程碑的流程图。关键事件包括：1936 年，艾伦·图灵提出图灵机；1950 年，图灵测试提出；1964 年，ELIZA 聊天机器人开发；1966
    年，隐马尔可夫模型提出；1982 年，循环神经网络开发；1997 年，长短期记忆网络提出；2014 年，生成对抗网络提出；2017 年，Transformer
    提出；2018 年，GPT-1 和 BERT 发布；2023 年，GPT-4 和 LLaMA 发布。每个里程碑都用图标表示，并通过一条蜿蜒的路径连接。](img/649581_1_En_8_Fig3_HTML.jpg)


    图 8-3


    NLP 模型从 RNN 到 GPT-4 的演进


    最近，许多其他专注于 AI 的公司，例如 Meta（Facebook 的母公司），也推出了自己的文本生成模型。尽管如此，OpenAI 的模型仍然是最受欢迎的之一。


    ### 8.2.2 关于生成式 AI（大语言模型）工作原理的简要说明


    `GenAI` 模型，如 `LLM`，基于最先进的神经网络，经过训练可以生成类似人类的文本。`GenAI` 模型采用依赖于自注意力机制的 Transformer
    架构，并使用嵌入（embeddings）在给定上下文中处理输入文本。这些模型分析大型数据集以学习模式、语法甚至事实知识。这使得它们能够完成 NLP 任务，例如预测句子中的下一个单词或根据提示生成文本。`GenAI`
    模型的示例包括基于 `GPT` 和 `BERT` 的 `LLM`。


    这些模型首先将输入文本转换为数值向量。这些向量通过高级神经网络的多个层进行处理。每一层都致力于细化对文本的理解。这些层可以捕捉输入文本中单词和短语之间的关系。模型中的注意力机制聚焦于输入中最相关的部分。这些机制确保了上下文感知的输出。训练
    `GenAI` 模型涉及预测被遮蔽的单词或下一个单词，并进一步优化模型的流畅性和准确性。


    `GenAI` 模型包含数十亿个参数（权重和偏置）。参数的巨大规模使模型能够执行多种任务，例如文本摘要、翻译和创意写作。虽然 `GenAI` 模型非常有效，但它们需要大量的计算资源。根据训练数据的不同，它们有时可能会产生有偏见或事实不正确的输出（称为幻觉）。关于
    `GenAI` 模型工作原理的更详细理论解释超出了本书的范围；本书的主要重点仍然是概念的应用，而不是深入探讨底层理论。

    '
- fmt: '### 8.2.3 Applications and Future Trends in Generative AI


    The applications of GenAI models like ChatGPT are literally countless. These applications
    span diverse industries, including healthcare, hospitality, information technology,
    manufacturing, banking and finance (BFSI), advertising, marketing, sales, and
    media and entertainment. In fact, separate volumes are written on applications
    of GenAI (and AI in general) in functional areas.


    In the healthcare and pharmaceutical industries, GenAI finds applications in all
    functional areas. These applications include drug discovery, personalized treatments,
    predictive diagnosis, enhancing medical images, and simplifying tasks with patient
    notes and information. The applications of GenAI in the marketing, sales, and
    advertising industries include generating marketing text and images, creating
    personalized recommendations, crafting product descriptions, and enhancing search
    engine optimization. In the manufacturing domain, GenAI is utilized for code generation,
    programming language translation, code documentation, and automated testing. The
    BFSI domain utilizes GenAI for creating profitable investment strategies, portfolio
    management, communicating and educating clients and investors, drafting documentation,
    and monitoring regulatory compliance. This book does not provide a detailed description
    of these applications due to space constraints; refer to any standard text on
    the application of AI in functional areas.


    AI and large language models, commonly referred to as LLMs, have immense potential
    to assist humanity in a wide range of tasks. But at the same time, GenAI models
    demand their responsible and ethical usage. Generative AI can produce content
    that is far removed from reality, commonly referred to as a hallucination. Hallucination
    raises ethical concerns about GenAI, including those related to truth, trust,
    and privacy. Apart from this, other challenges associated with GenAI models include
    algorithmic bias, data privacy, copyright infringement, misinformation, and job
    displacement. Many research groups across the globe are working on the challenges
    of GenAI. The current trends in this direction include responsible development,
    transparency, and fairness.


    Generative AI is evolving at a rapid rate in its quest to create output and interactions
    that are personalized and human-like. Researchers are exploring GenAI interactions
    with edge computing and the Internet of Things (IoT). This can aid in real-time
    and localized content creation.


    In future AI-based products, we can expect reduced bias and lesser hallucination.
    With advancements in GenAI models, we can expect augmented creativity and capabilities
    to automate both complex and repetitive tasks. These developments in the near
    future are likely to advance efficiencies and reduce costs across the industry
    domains. Collaborating with AI tools and robots will become an everyday part of
    everyone’s lives.


    **Note**


    Edge computing processes data close to where it’s created. It is like processing
    localized data on your phone or a nearby computing device, rather than sending
    it to a remote server for processing. Let’s take an example of premium smartwatches
    that are capable of analyzing your heartbeat without the need for the Internet.
    Now let’s talk in brief about IoT. It is a complex system of interconnected devices,
    such as smart bulbs, cars, or machines, that communicate with each other and exchange
    data (both ways) with the help of the Internet. IoT devices can be present anywhere,
    including homes, vehicles, factories, and many more. For example, a smart thermostat
    (for a home central air conditioner) utilizes the Internet to periodically receive
    weather updates (all automatically) and regulate your home’s temperature within
    the comfortable limits of its inhabitants.


    ## 8.3 LangChain and OpenAI’s (GenAI) APIs


    `LangChain`, when combined with the state-of-the-art GenAI APIs from OpenAI, signifies
    an influential way to build intelligent and dynamic applications for various business
    scenarios and complex workflows. `LangChain` is an open-source project launched
    in October 2022 by Harrison Chase. It offers a comprehensive framework for building
    advanced workflows by integrating large language models (LLMs). `LangChain` can
    seamlessly connect with LLMs from OpenAI (and others) along with external data,
    tools, and logic. This combination is capable of producing state-of-the-art conversational
    applications that generate human-like responses. These applications are also useful
    in NLP tasks, such as content generation and decision support.


    As discussed, OpenAI APIs act as tools for developers to utilize advanced AI models,
    like ChatGPT, in their applications and workflows (that can manage multistep processes).
    Such applications can comprehend input texts to create desired content, develop
    question-answer type bots for specific domains, perform text summarization, and
    even assist in translations. OpenAI APIs are user-friendly, and help developers
    add smart AI features to routine business applications. Applications (apps) developed
    by combining OpenAI APIs with `LangChain` support memory can remember previous
    conversations and process steps, helping the apps to better handle contexts. It
    creates a perfect foundation for creating applications such as chatbots, interactive
    systems, and decision-making tools. `LangChain` also supports human-like trendy
    AI agents (sometimes also referred to as agentic AI) that can take autonomous
    actions to complete a variety of tasks, as discussed later in this chapter.


    `LangChain` is fundamentally a modular structure architecture. It permits the
    seamless integration of a variety of components that include prompts, memories,
    and chains. These are `LangChain`-specific terms, which is discussed later in
    this chapter. The modularity aspect of `LangChain` allows the creation of flexible
    applications while preserving clarity and simplicity. Additionally, `LangChain`
    supports a range of LLMs, including those from OpenAI, Azure, Anthropic, and Google
    Cloud. OpenAI’s LLMs, being one of the most popular, are featured in this book.


    You need not be an AI expert to work with OpenAI APIs. Basic knowledge of programming
    with languages like Python is sufficient to produce trendy and sophisticated applications
    with AI features using these APIs.'
