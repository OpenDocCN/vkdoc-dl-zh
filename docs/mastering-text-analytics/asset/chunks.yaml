  trans: "\n### 9.1.3 文本嵌入与向量数据库\n\n自文本嵌入技术问世以来，自然语言处理（NLP）生态领域发生了翻天覆地的变化。嵌入技术改变了机器解释和处理语言的方式。将文本转换为高维数值向量有助于捕捉语义关系，从而促进对文本的深度理解。传统的基于关键词的搜索无法让\
    \ NLP 应用捕捉到上下文含义，而嵌入技术成功填补了这一空白。文本嵌入允许 NLP 模型根据意图而非精确措辞来检索信息。在语义搜索、文档相似度分析和智能检索系统等任务中，理解上下文变得不可或缺。\n\
    \n像 `ChromaDB` 这样的向量数据库能够高效地存储和管理这些文本嵌入，并具备足够的扩展能力。向量数据库帮助我们实现快速准确的相似性搜索，这使得它们非常适合用于检索增强生成（RAG）系统，这类系统在\
    \ AI 驱动的助手和知识管理系统中非常有用。通过将 `LangChain` 与 OpenAI 模型集成，开发者可以轻松地为高级 NLP 任务生成、存储和查询嵌入。AI\
    \ 驱动的应用仍在不断发展，文本嵌入和向量数据库将在推进智能搜索、推荐系统和对话式 AI 方面发挥核心作用。\n\n#### 使用 OpenAI 嵌入和余弦相似度进行文本相似度分析\n\
    \n下面的清单 9-4 展示了使用 OpenAI 嵌入和余弦相似度计算文本相似度的程序。\n\n```\n# 一个简单的文本嵌入和相似度搜索演示，使用 OpenAI\
    \ 嵌入，不涉及 ChromaDB。\n# 这将展示无需向量数据库时文本嵌入的工作原理。\n\"\"\"\n- 程序：文本嵌入与相似度搜索（无 ChromaDB）\n\
    - 步骤：\n1. 使用 OpenAI API 将文本转换为嵌入。\n2. 将嵌入存储在一个列表中（代替 ChromaDB）。\n3. 使用余弦相似度查找相似文本。\n\
    \"\"\"\n# 从文本文件中读取 OpenAI API 密钥\nf = open('C:\\\\Users\\\\Shailendra Kadre\\\\\
    Desktop\\\\OPEN_AI_KEY.txt')\napi_key = f.read()\n# 导入必要的库\nimport openai  # OpenAI\
    \ 的 Python 客户端库，用于与其 API 交互\nimport numpy as np  # NumPy，用于处理数值计算和数组\nfrom sklearn.metrics.pairwise\
    \ import cosine_similarity  # 用于计算向量之间相似度的函数\n# 设置你的 OpenAI API 密钥（将 'api_key'\
    \ 替换为你的实际 API 密钥）\nopenai.api_key = api_key  # 允许访问 OpenAI 的服务\n# 使用 OpenAI 的嵌入模型生成文本嵌入的函数\n\
    def get_embedding(text):\n    response = openai.embeddings.create(  # 向 OpenAI\
    \ 请求嵌入\n        model=\"text-embedding-ada-002\",  # 指定嵌入模型\n        input=[text]\
    \  # 输入文本必须以列表形式传递\n    )\n    return np.array(response.data[0].embedding)  #\
    \ 提取并以 NumPy 数组形式返回嵌入\n# 用于生成嵌入的示例文本数据列表\ntexts = [\n    \"人工智能正在改变各行各业。\",  #\
    \ 与 AI 相关的句子\n    \"机器学习有助于预测分析。\",  # 与 ML 相关的句子\n    \"深度学习是机器学习的一个子集。\",  #\
    \ 与 DL 相关的句子\n    \"我喜欢披萨和意大利菜。\"  # 不相关的话题（食物偏好）\n]\n# 使用 get_embedding 函数将列表中的每个文本转换为嵌入\n\
    embeddings = [get_embedding(text) for text in texts]\n# 将嵌入列表转换为 NumPy 数组以便高效处理\n\
    embeddings_matrix = np.array(embeddings)\n# 计算第一个文本嵌入与所有其他嵌入之间的余弦相似度\nsimilarities\
    \ = cosine_similarity([embeddings_matrix[0]], embeddings_matrix)\n# 打印每个文本与第一个文本相比的相似度分数\n\
    print(\"与第一个文本的相似度分数：\")\nfor i, score in enumerate(similarities[0]):  # 遍历相似度分数\n\
    \    print(f\"{i}: {score:.4f} → {texts[i]}\")  # 打印索引、相似度分数和对应的文本\n与第一个文本的相似度分数：\n\
    0: 1.0000 → 人工智能正在改变各行各业。\n1: 0.8563 → 机器学习有助于预测分析。\n2: 0.8294 → 深度学习是机器学习的一个子集。\n\
    3: 0.7261 → 我喜欢披萨和意大利菜。\n\"\"\"\n- 工作原理：\n1. 使用 OpenAI 的 `text-embedding-ada-002`\
    \ 为每个文本获取嵌入。\n2. 将嵌入存储在一个列表中（代替 ChromaDB）。\n3. 使用 `sklearn` 中的 `cosine_similarity()`\
    \ 计算相似度。\n4. 打印相似度分数，显示哪些文本最相似。\n\"\"\"\n\"\"\"\n- 预期输出：\n与第一个文本的相似度分数：\n0: 1.0000\
    \ → 人工智能正在改变各行各业。\n1: 0.8643 → 机器学习有助于预测分析。\n2: 0.7892 → 深度学习是机器学习的一个子集。\n3: 0.1125\
    \ → 我喜欢披萨和意大利菜。\n```\n- 分数越高表示越相似。不相关的文本（披萨）得分较低。\n\"\"\"\n清单 9-4\n使用 OpenAI 嵌入和余弦相似度进行文本相似度分析\n\
    ```\n\n## 9.2 AI 智能体\n\n基于大语言模型（LLM）的 AI 智能体是由 LLM 驱动的智能系统，能够理解、生成和处理人类语言。它们可以自动化任务、提供见解，并以自然的方式与用户交互。这类\
    \ AI 智能体可用于开发高级聊天机器人、代码助手、自动化内容生成器、客户支持、数据分析、个性化推荐以及流程自动化。这些自主 AI 智能体提高了效率，降低了成本，并实现了更智能的决策。接下来，我们将通过一个代码演示来展示这些智能体的工作方式。该代码演示在代码解释方面是自足的，提供了足够详细的说明。"
- fmt: "### LangChain-Based Stock Analysis Agent\n\n- **IMPORT MODULES** loads required\
    \ modules for environment setup, data handling, and AI integration.\n- **SET API\
    \ KEY** stores the OpenAI API key in an environment variable.\n- **DEFINE STOCK\
    \ LIST** contains 50 real-world stock symbols.\n- **GENERATE STOCK DATA** creates\
    \ randomized stock market data for 10 days.\n- **CREATE DATAFRAME** stores stock\
    \ data in a pandas dataframe.\n- **FETCH STOCK DATA** is a function that returns\
    \ historical data for a given stock.\n- **ANALYZE STOCK TREND** computes a simple\
    \ moving average (SMA) and generates a buy/sell/hold signal.\n- **DEFINE LANGCHAIN\
    \ TOOLS**\n  - tool to fetch stock data\n  - tool to analyze stock trends\n- **INITIALIZE\
    \ OPENAI LLM** creates an AI model instance with a set temperature.\n- **CREATE\
    \ AI AGENT** integrates LLM with the defined tools using LangChain.\n- **EXECUTE\
    \ QUERY** runs an agent command to analyze stock trends for a specific symbol\
    \ (e.g., `AAPL`).\n\n```\n# Read the open ai API key from your text file\nf =\
    \ open('C:\\\\Users\\\\Shailendra Kadre\\\\Desktop\\\\OPEN_AI_KEY.txt')\napi_key\
    \ = f.read()\nimport os  # Import the os module to set environment variables\n\
    import random  # Import random module for generating dummy stock prices\nfrom\
    \ datetime import datetime, timedelta  # Import datetime for handling dates\n\
    from langchain.llms import OpenAI  # Import OpenAI LLM from LangChain\nfrom langchain.agents\
    \ import initialize_agent, AgentType  # Import agent tools from LangChain\nfrom\
    \ langchain.tools import Tool  # Import Tool class to create custom LangChain\
    \ tools\nimport pandas as pd  # Import pandas for data handling and analysis\n\
    # Set up your OpenAI API key (replace with your actual key)\nos.environ[\"OPENAI_API_KEY\"\
    ] = api_key\n# List of 50 real-world stock symbols\nstocks = [\"AAPL\", \"GOOGL\"\
    , \"AMZN\", \"TSLA\", \"MSFT\", \"NFLX\", \"META\", \"NVDA\", \"BABA\", \"DIS\"\
    , \"V\", \"JPM\", \"PYPL\", \"MA\", \"INTC\", \"IBM\", \"ORCL\", \"CSCO\", \"\
    ADBE\", \"AMD\", \"UBER\", \"LYFT\", \"SQ\", \"SHOP\", \"TWTR\", \"SNAP\", \"\
    PINS\", \"ZM\", \"DOCU\", \"ROKU\", \"BA\", \"GE\", \"CAT\", \"MMM\", \"F\", \"\
    GM\", \"NKE\", \"KO\", \"PEP\", \"MCD\",\"WMT\", \"TGT\", \"HD\", \"LOW\", \"\
    COST\", \"PG\", \"JNJ\", \"MRNA\", \"PFE\", \"BMY\"\n]\n# Generate dummy stock\
    \ market data\nnum_days = 10  # Number of days per stock\nstart_date = datetime(2024,\
    \ 1, 1)  # Start date\ndata = []  # Initialize empty list to store stock data\n\
    # Generate data for each stock over 10 days\nfor stock in stocks:\nfor i in range(num_days):\n\
    date = start_date + timedelta(days=i)  # Increment date\nopen_price = round(random.uniform(100,\
    \ 1000), 2)  # Random open price\nhigh_price = round(open_price + random.uniform(5,\
    \ 50), 2)  # High slightly above open\nlow_price = round(open_price - random.uniform(5,\
    \ 50), 2)  # Low slightly below open\nclose_price = round(random.uniform(low_price,\
    \ high_price), 2)  # Close within range\nvolume = random.randint(500000, 50000000)\
    \  # Random trading volume\n# This line adds a new row to a list called data\n\
    data.append([date.strftime(\"%Y-%m-%d\"), stock, open_price, high_price, low_price,\
    \ close_price, volume])\n# date.strftime(\"%Y-%m-%d\") - Formats the date object\
    \ into a YYYY-MM-DD string.\n# Create DataFrame\ndf = pd.DataFrame(data, columns=[\"\
    Date\", \"Stock\", \"Open\", \"High\", \"Low\", \"Close\", \"Volume\"])\n# Function\
    \ to get stock data for a specific symbol\ndef get_stock_data(symbol: str):\n\
    return df[df[\"Stock\"] == symbol].reset_index(drop=True)\n# Filter DataFrame\
    \ for the given stock symbol\n# Function to analyze stock trends based on SMA\
    \ (Simple Moving Average)\ndef analyze_trend(stock_data):\nstock_data[\"SMA\"\
    ] = stock_data[\"Close\"].rolling(window=3).mean()  # Calculate Simple Moving\
    \ Average (SMA)\nlatest_price = stock_data[\"Close\"].iloc[-1]  # Get the latest\
    \ closing price\nlatest_sma = stock_data[\"SMA\"].iloc[-1]  # Get the latest SMA\
    \ value\n\"\"\"\n`latest_price = stock_data[\"Close\"].iloc[-1]`\n### Explanation:\n\
    - `stock_data[\"Close\"]`: Extracts the \"Close\" column from the `stock_data`\
    \ DataFrame, which contains closing prices of the stock.\n- `.iloc[-1]`: Selects\
    \ the last row of the \"Close\" column, retrieving the most recent closing price.\n\
    ### Purpose:\nThis line gets the latest closing price of a stock from the given\
    \ dataset.\n\"\"\"\n# Generate trading signal based on SMA comparison\nif latest_price\
    \ > latest_sma:\nreturn \"Buy signal: Price is above SMA\"\nelif latest_price\
    \ < latest_sma:\nreturn \"Sell signal: Price is below SMA\"\nelse:\nreturn \"\
    Hold signal: Price is equal to SMA\"\n# Define LangChain tools\nstock_data_tool\
    \ = Tool(\nname=\"Stock Data Fetcher\",\nfunc=get_stock_data,\ndescription=\"\
    Fetches stock data for a given symbol\"\n)\ntrend_analysis_tool = Tool(\nname=\"\
    Stock Trend Analyzer\",\nfunc=analyze_trend,\ndescription=\"Analyzes stock trends\
    \ based on SMA\"\n)\n# Initialize the OpenAI LLM\nllm = OpenAI(api_key=os.environ[\"\
    OPENAI_API_KEY\"], temperature=0.7)\n# Create an AI agent with the tools\nagent\
    \ = initialize_agent(\ntools=[stock_data_tool, trend_analysis_tool],\nllm=llm,\n\
    agent=AgentType.ZERO_SHOT_REACT_DESCRIPTION,\nverbose=True\n)\n# Run the agent\
    \ to analyze a stock trend\nresult = agent.run(\"Analyze the trend for AAPL\"\
    )\nprint(result)\n```\n\n**Output:**\n```\n> Entering new AgentExecutor chain...\n\
    I should use the Stock Data Fetcher to get the stock data for AAPL\nAction: Stock\
