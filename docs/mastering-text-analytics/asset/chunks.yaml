    \ TF-IDF 矩阵\ntfidf_matrix = vectorizer.fit_transform(sentences)\n\n# 计算余弦相似度矩阵\n\
    cosine_sim_matrix = cosine_similarity(tfidf_matrix)\n\n# 显示余弦相似度矩阵\nprint(\"Cosine\
    \ Similarity Matrix:\")\nfor i in range(len(sentences)):\n    for j in range(len(sentences)):\n\
    \        print(f\"Similarity between Sentence {i + 1} and Sentence {j + 1}: {cosine_sim_matrix[i,\
    \ j]:.2f}\")\n\n# Cosine Similarity Matrix:\n# Similarity between Sentence 1 and\
    \ Sentence 1: 1.00\n# Similarity between Sentence 1 and Sentence 2: 0.32\n# Similarity\
    \ between Sentence 1 and Sentence 3: 0.19\n# Similarity between Sentence 2 and\
    \ Sentence 1: 0.32\n# Similarity between Sentence 2 and Sentence 2: 1.00\n# Similarity\
    \ between Sentence 2 and Sentence 3: 0.10\n# Similarity between Sentence 3 and\
    \ Sentence 1: 0.19\n# Similarity between Sentence 3 and Sentence 2: 0.10\n# Similarity\
    \ between Sentence 3 and Sentence 3: 1.00\n```\n\n对输出的解释如下。\n\n*   **解读分数**：分数越高，表示句子间共享词汇和内容越相似，衔接性越强。\n\
    *   **低句子间相似度**：最高分为 0.32，表明共享内容或词汇有限。\n*   **重叠度极低**：0.10 和 0.19 的低相似度分数表明句子之间的主题或词汇重叠度极低。\n\
    \n相似度分数为 1.00 表示与自身完全相似。相似度分数为 0 表示句子之间没有共享词汇和内容相似性。\n\n### 时间关系识别（代码演示）\n\n时间关系识别是在输入文本中查找事件之间基于时间的关系的过程。例如，考虑句子“我想在午饭前完成这一章”；单词“前”表示两个事件之间基于时间的联系。它描述了在午餐前完成工作。\n\
    \n我们用于时间关系识别的代码演示（列表 7-1）将首先执行依存句法分析以提取事件并检测时间信号，这些信号包括“前”、“后”、“期间”、“直到”和“当”等词。随后，使用基于规则的方法或机器学习模型对事件进行分类。此方法旨在找出给定输入文本中动作的顺序和时间。我们利用\
    \ `spaCy` 来提取事件。\n\n我们的程序遵循以下五个步骤。\n\n1.  导入库并加载模型。\n2.  从句子中提取特征。\n3.  准备训练数据。\n\
    4.  训练随机森林分类器。\n5.  预测新句子中的时间关系。\n\n```python\n# 所需库\nimport spacy\nfrom sklearn.ensemble\
    \ import RandomForestClassifier\nimport numpy as np\n\n# 加载用于依存句法分析的 spaCy 模型\n\
    nlp = spacy.load(\"en_core_web_sm\")\n\n# 包含时间关系的示例句子\nsentences = [\n    \"She\
    \ finished her work before going to lunch.\",\n    \"He went to the gym after\
    \ work.\",\n    \"They waited until the show started.\",\n    \"The meeting was\
    \ delayed during the storm.\"\n]\n\n# 时间信号\ntemporal_signals = [\"before\", \"\
    after\", \"during\", \"until\", \"while\"]\n\n# 特征提取 - 识别事件和时间信号\ndef extract_features(sent):\n\
    \    doc = nlp(sent)\n    events = []\n    temporal_relation = \"\"\n    for token\
    \ in doc:\n        if token.dep_ == \"ROOT\":  # 事件（动词）提取\n            events.append(token.lemma_)\n\
    \        if token.text in temporal_signals:  # 时间信号检测\n            temporal_relation\
    \ = token.text\n    return events, temporal_relation\n\n# 准备训练数据 - 句子、事件和标签（1\
    \ 表示存在时间关系，0 表示不存在）\nX = []\ny = []\nfor sentence in sentences:\n    events, signal\
    \ = extract_features(sentence)\n    if signal:  # 如果存在时间信号，则分类为 1\n        X.append([len(events)])\
    \  # 简单特征：事件数量\n        y.append(1)\n    else:\n        X.append([0])\n      \
    \  y.append(0)\n\n# 转换为 numpy 数组\nX = np.array(X)\ny = np.array(y)\n\n# 训练随机森林分类器\n\
    clf = RandomForestClassifier(n_estimators=10, random_state=42)\nclf.fit(X, y)\n\
    \n# 对新句子进行预测\nnew_sentences = [\"John started his project before the deadline.\"\
    ,\n                 \"She arrived after the party had begun.\"]\n\nfor new_sent\
    \ in new_sentences:\n    events, signal = extract_features(new_sent)\n    prediction\
    \ = clf.predict([[len(events)]])\n    print(f\"Sentence: {new_sent}\")\n    print(f\"\
    Detected Temporal Signal: {signal}, Prediction: {'Temporal relation' if prediction\
    \ == 1 else 'No temporal relation'}\\n\")\n\n# Sentence: John started his project\
    \ before the deadline.\n# Detected Temporal Signal: before, Prediction: Temporal\
    \ relation\n# Sentence: She arrived after the party had begun.\n# Detected Temporal\
    \ Signal: after, Prediction: Temporal relation\n```\n\n**列表 7-1** 时间关系识别\n\n便于理解的函数说明。\n\
    \n*   `extract_features(sent)` 使用 `spaCy` 处理每个句子。该函数返回事件（动词）列表和时间关系信号（如果存在）。\n\
    *   `doc = nlp(sent)` 准备句子并将其转换为结构化格式以供分析。\n*   `for token in doc` 遍历句子中的每个单词。\n\
    *   `token.dep_ == \"ROOT\"` 检查该单词是否是主要动词（根动作）并将其存储。\n*   `if token.text in temporal_signals`：如果在时间信号列表中找到某个单词，则将其存储为时间信号。\n\
    \n将单词转换为机器学习模型格式：无需对整个句子进行向量化，该逻辑使用一种简单的方法将单词转换为数字。它将动词（事件）的数量作为特征计数到 `X` 中，并根据时间信号的存在与否为\
    \ `y` 设置一个二元标签（1 或 0）。这使得数据集保持简单且为数字格式，无需使用向量化器。\n\n输出结果证实，该代码能够有效检测输入句子中存在的时间信号。模型还基于这些信号正确预测了时间关系的存在。\n"
- fmt: '# 7.4 Distributional Semantics and Word Embeddings


    Distributional semantics deals with discovering word meanings based on the company
    they keep. Words appearing in similar contexts often have interrelated meanings.
    Let’s look at an example. “Doctor” and “nurse” are often used together in hospital
    and healthcare documents; we can assume they are related in meaning. Let’s look
    at another example: the words “king” and “queen” are often found together in contexts
    related to royalty, palaces, or authority. This way, they are seen as similar.
    Distributional semantics works based on the **distributional hypothesis**, which
    states, “You shall know a word by the company it keeps.”


    To recognize word meanings, each word is assigned a unique vector, which appears
    as a list of numbers. These **word vectors** are created using a large amount
    of text data. If two words have meanings, the vectors for both are close to each
    other. Similar words have less Euclidean distance or cosine similarity (discussed
    later) between the vectors. With these numerical forms of words, we can measure
    similarity. These word vectors are sometimes used interchangeably in meaning with
    “word embeddings.”


    Let’s look at word vectors (word embeddings). The actual numerical values of word
    embeddings for words like “king,” “man,” “woman,” and “queen” can change depending
    on the type of word embedding model used. There are many word embedding models
    in use; a few examples are `Word2Vec`, `GloVe`, and `FastText`. To give you an
    idea, we use the hypothetical word embeddings of `king`, `man`, and `woman` as
    follows.


    *   `king`: 0.6, 0.4, 0.1, –0.2, 0.3, 0.5, –0.10

    *   `man`: 0.3, 0.5, 0.2, –0.1, 0.1, 0.4, 0.00

    *   `woman`: 0.4, 0.3, 0.5, 0.0, 0.2, 0.6, 0.1


    If you do a simple math `(king – man) + woman`, you get the calculated value of
    `queen`.


    *   `Queen[c]`: 0.7, 0.2, 0.4, –0.1, 0.4, 0.7, 0.0


    The calculated vector `Queen[c]` is close to the following hypothetical vector
    of `queen` (`Queen[h]`).


    *   `Queen[h]`: 0.7, 0.5, 0.3, 0.1, 0.4, 0.8, 0.2


    Here, we used the classic example of `queen ≈ king – man + woman`, which demonstrates
    how word embeddings can capture relationships between words through mathematical
    operations. Word embeddings are useful for various NLP tasks like machine translation
    and sentiment analysis.


    **Euclidean distance** is the distance between two-word vectors in space. Let’s
    look at a simple example of two-word vectors with hypothetical numerical values
    as follows. To keep it simple, we take only three numbers in each word vector.


    *   `king`: [0.8, 0.5, 0.6]

    *   `queen`: [0.7, 0.6, 0.5]

    *   `apple`: [0.2, 0.1, 0.3]


    The Euclidean distance between `king` and `queen` is calculated as follows.


    ```

    Euclidean distance (king, queen) = SQUARE ROOT((0.8−0.7)² + (0.5−0.6)² + (0.6−0.5)²)
    = 0.173

    ```


    ```

    Euclidean distance (king, apple) = SQUARE ROOT((0.8−0.2)² + (0.5−0.1)² + (0.6−0.3)²)
    = 0.781

    ```


    As expected, `Euclidean distance (king, queen)` is lesser than `Euclidean distance
    (king, apple)`. The reason is simple: `king` and `queen` are similar in meaning
    because both belong to a royal family, but `king` and `apple` have different meanings.


    Similar to Euclidean distance, cosine similarity also measures how close or similar
    word vectors are. Euclidean distance is based on calculating the actual distance
    between vectors, while cosine similarity measures the angle between them. **Cosine
    similarity** focuses on direction rather than magnitude. Let’s calculate the cosine
    similarity between two words through an example. The following uses the same word
    vectors of `king`, `queen`, and `apple` with the same hypothetical numerical values.


    The following steps calculate the cosine similarity between the words `king` and
    `queen`.


    *   Dot product of `king` and `queen` word vectors = `(0.8×0.7) + (0.5×0.6) +
    (0.6×0.5) = 1.16`

    *   Magnitude of `king` word vector = `SQUARE ROOT((0.8)² + (0.5)² + (0.6)²) =
    1.118`

    *   Magnitude of `queen` word vector = `SQUARE ROOT((0.7)² + (0.6)² + (0.5)²)
    = 1.049`

    *   Cosine similarity = `1.16 / (1.118 × 1.049) = 0.989`


    Similarly, if we compute the cosine similarity between `king` and `apple`, it
    comes out as `0.933`. Note that the cosine similarity of `king` and `queen` (`0.989`)
    is more than the cosine similarity of `king` and `apple` (`0.933`). It indicates
    a closer relationship between the former pair compared to the latter. Cosine similarity
    ranges from –1 to 1.


    *   `1` indicates perfect similarity (parallel vectors that point in the same
    direction).

    *   `0` means no similarity (vectors are orthogonal).

    *   `–1` indicates perfect dissimilarity (vectors point in opposite directions).


    Cosine similarity is often used in information retrieval to assess the degree
    to which two documents or words are related in meaning. Euclidean distance is
    frequently used in NLP tasks such as document clustering.


    ## 7.4.1 Latent Semantic Analysis


    Word embeddings enable machines to process natural languages word by word. They
    convert words into numerical representations, which machines (often computers)
    understand. This way, machines can interpret and process language more effectively.
    Over the years, several models have emerged to develop word embeddings, including
    `Word2Vec` and `GloVe`, as well as contextualized embeddings such as `BERT` and
    `GPT`. These approaches help model the delicate nuances of language, enabling
    NLP applications to identify semantic similarity, context, and deeper language
    structures. This section explores these techniques, from traditional embeddings
    to the latest advancements, to understand how they contribute to language understanding
    in NLP applications. This section discusses latent semantic analysis (LSA), which
    is a foundational technique to develop word embeddings.


    LSA is a technique used to determine the meaning of words based on their context.
    It examines large text corpora to identify patterns showing how words relate to
    each other. Here, *patterns* refer to the ways words are frequently found together
    in similar contexts. This frequency reveals that words often convey related ideas
    or themes when they appear in similar contexts.


    We can use either the term-document matrix (TDM) or the TF–IDF matrix for LSA,
    but they serve different purposes. TF–IDF is preferred because it helps LSA focus
    on the most important words in documents. TF–IDF puts more weight on exceptional
    words, and it helps us realize the main ideas. (TDM and TF–IDF were covered earlier
    in this book.) The following steps perform LSA using TF–IDF.


    1.  Clean and format the data for analysis.

    2.  Construct the TF–IDF matrix from the cleaned documents.

    3.  Apply singular value decomposition (SVD) to the TF–IDF matrix to reduce its
    dimensions and to identify latent topics within the text.

    4.  Analyze the results to figure out term-document relationships and identify
    prominent themes or topics.

    5.  Visualize the reduced matrix or the results of the LSA to better understand
    patterns and meanings in the data.'
