    ## 2.8 Recap of Key Concepts


    NLP is an extremely influential tool used to analyze and comprehend large volumes
    of text data, which is abundantly available in all business domains. Text analysis
    using modern NLP techniques can reveal patterns, trends, and insights to make
    data-driven decisions across various fields, including business, legal, and social
    media.


    Finding the right data, both in quality and quantity is one of the most challenging
    tasks in any NLP project. This chapter discussed various text data sources (corpora)
    and demonstrated how to extract meaningful data from them. This chapter is just
    a starting point for any NLP professional. Much more detailed and advanced techniques
    are available to source quality data for NLP projects. Internet and standard NLP
    textbooks are the best sources if you need more information on this topic. Web
    scraping is one of the most important processes because many large-scale AI (read
    GenAI) projects use it as their primary source of data for training their massive
    NLP models.


    The chapter also discussed other techniques to source the quality data and techniques
    to extract text data from Word files, HTML documents, JSON files, and PDFs. We
    noticed that each format requires different method(s) to get the data into a usable
    format. Mastering these techniques is important for every NLP engineer as it’s
    the starting point of any NLP project that they may indulge in.


    ## 2.9 Practice Exercises


    1.  Access the Gutenberg text Corpus that is distributed with NLTK. List all the
    book titles included in it. Practice text extraction and summarization with any
    two of its books.


    2.  Create a demo Microsoft Word document containing a few paragraphs of text
    data. Use a proper Python library to extract the text and print the data contained
    in it.


    3.  Repeat all the steps given in question 2 for an HTML file.


    4.  Practice data extraction from a real-time JSON file and a real web URL.


    # 3. NLP Data Preprocessing Tasks Involving Strings and Python Regular Expressions'
