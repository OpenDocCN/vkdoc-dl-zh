  raw: '## 5.2 Morphological Analysis Revisited


    We discussed morphological analysis at the start of this chapter. By learning
    how morphemes combine to form words, we can understand language patterns and enable
    several language processing tasks like stemming and lemmatization. Let’s try to
    understand morphemes with the help of the following three familiar words.


    *   The word “unhappiness” has three morphemes. The prefix “un-” (meaning “not”),
    the root word “happy” (meaning “joyful”), and finally the suffix “-ness” (meaning
    “state of being”). Combined, they form the word “unhappiness.”


    *   “Replayed” has two morphemes. The prefix “re-” (meaning “again”) and the root
    word “played” (meaning “engaged in a game or activity”).


    *   Similarly, the word “cats” contains two morphemes: the base noun “cat” and
    the suffix “-s” (representing the plural form).


    By analyzing the structure of words, we can efficiently extract meaningful features
    and develop more effective language models.


    There are two major categories of morphemes.


    *   **Free morphemes** can exist and stand alone as independent words with meaning.
    Examples are “book,” “run,” and “happy.” These morphemes convey meaning even if
    they are not attached to any other word.


    *   **Bound morphemes** must be attached to a free morpheme to have meaning. Consider
    our familiar example, “unhappy.” Here, prefixes like “un-” in the base word “happy”
    modify the meaning of the base word. This way, bound morphemes further add nuances
    or grammatical context to words.


    Free morphemes represent the basic vocabulary units of a language, while bound
    morphemes, such as prefixes, suffixes, and infixes, help us to understand how
    words are modified and related to each other. Understanding bound morphemes is
    helpful in stemming and lemmatization because both processes aim to reduce words
    to their base or root forms. This knowledge can be useful in search engines, which
    need different forms of a word (e.g., “run,” “running,” “runner”) to be recognized
    as related. Additionally, knowledge morphemes allow more accurate matching of
    words and phrases, even if they appear in different forms. For example, knowing
    that the following three words, “running,” “runner,” and “runs,” come from the
    same morpheme (base), “run” can improve the grouping of connected texts.


    Reading this, you can imagine that morphological analysis can find its uses in
    almost all the NLP techniques that we studied in Chapter [4](#649581_1_En_4_Chapter.xhtml).
    For example, morphological analysis is useful in stemming and lemmatization, part-of-speech
    (POS) tagging, named entity recognition (NER), machine translation, text normalization,
    sentiment analysis, and several other NLP tasks.


    The code demos for the morphological analysis are presented in the following sections,
    which contain the related techniques.


    ## 5.3 Tokenization Revisited


    We studied basic tokenization in the previous chapter. We also studied how the
    word_tokenize() and sent_tokenize() methods from Python’s NLTK library can be
    utilized to break a larger text corpus (or text document) at sentence level or
    word level, respectively. Gensim and Keras are a two other Python open source
    libraries that are available for tokenization.


    ### 5.3.1 Code Demos


    Let’s discuss some other tokenizers: whitespace, dictionary-based, rule-based,
    punctuation-based, tweets, and multi-word expressions. Each tokenizer serves a
    different purpose. We provide a bit of theory about each tokenizer in the code
    itself.


    #### Whitespace Tokenization


    Whitespace tokenization breaks a text document based on spaces and line breaks.
    It considers every section of input text divided by whitespace as a distinct token.
    Whitespace tokenization serves as a quick way to break down text into words or
    phrases. This method is especially used for processing structured data, including
    log files or code, in which whitespaces have specific meanings.


    Whitespace tokenization is less worried about the grammatical structure of input
    texts. Its main focus is on the visual separation of text. Whitespace tokenization
    is used in the NLP tasks where sentence boundaries are not as important. Examples
    include keyword extraction or simple text preprocessing, where the focus is on
    quickly splitting the input text into smaller and more manageable tasks. The following
    is a code demo.


    ```

    from nltk.tokenize import WhitespaceTokenizer

    from typing import List

    def whitespace_tokenizer(text: str) -> List[str]:

    """

    Tokenizes the input text based on whitespace characters (spaces, tabs, newlines).

    Parameters:


    text : str

    The input text to be tokenized.

    Returns:


    List[str]

    A list of tokens.

    """

    tokenizer = WhitespaceTokenizer()

    tokens = tokenizer.tokenize(text)

    return tokens

    # Example usage

    if __name__ == "__main__":

    sample_text = """Whitespace tokenization breaks a text document based on spaces
    and line breaks. It considers every section of input text divided by whitespace
    as a distinct token. Whitespace tokenization serves as a quick way to break down
    text into words or phrases. This method is especially used for processing structured
    data including logs files or code, in which whitespaces have specific meaning.

    """

    tokens = whitespace_tokenize(sample_text)

    print("Tokens:", tokens)

    OUTPUT:

    Tokens: [''Whitespace'', ''tokenization'', ''breaks'', ''a'', ''text'', ''document'',
    ''based'', ''on'', ''spaces'', ''and'', ''line'', ''breaks.'', ''It'', ''considers'',
    ''every'', ''section'', ''of'', ''input'', ''text'', ''divided'', ''by'', ''whitespace'',
    ''as'', ''a'', ''distinct'', ''token.'', ''Whitespace'', ''tokenization'', ''serves'',
    ''as'', ''a'', ''quick'', ''way'', ''to'', ''break'', ''down'', ''text'', ''into'',
    ''words'', ''or'', ''phrases.'', ''This'', ''method'', ''is'', ''especially'',
    ''used'', ''for'', ''processing'', ''structured'', ''data'', ''including'', ''logs'',
    ''files'', ''or'', ''code,'', ''in'', ''which'', ''whitespaces'', ''have'', ''specific'',
    ''meaning.'']

    ```


    #### Dictionary-Based Tokenization


    In dictionary-based tokenization, the tokens are based on the words that are already
    available in the dictionary. In case the token is not found in the dictionary,
    special rules are applied to tokenize it.


    Dictionary-based tokenization is used where identifying and extracting predefined
    phrases or terms is more important. It ensures use in domain-specific texts, where
    consistency in recognizing specific tokens is more important than simple tokens.
    This method is particularly useful in NLP tasks like medical text processing and
    parsing of legal documents, where precise recognition of terms is critical.


    ```

    import nltk

    from nltk.tokenize import MWETokenizer

    from typing import List

    # NLTK data

    nltk.download(''punkt'')

    def dictionary_based_tokenizer(text: str, dictionary: List[List[str]]) -> List[str]:

    """

    Tokenizes the input text based on a predefined dictionary.

    Parameters:


    text : str

    The input text string.

    dictionary : List[List[str]]

    A list of expressions, recognized as single tokens.

    Returns:


    List[str]

    A list of tokens.

    """

    # The ''_'' argument joinS the words with an underscore (_).

    tokenizer = MWETokenizer(dictionary, separator=''_'')

    tokens = tokenizer.tokenize(nltk.word_tokenize(text))

    return tokens

    # Example usage

    if __name__ == "__main__":

    # Define a dictionary of multi-word expressions

    dictionary = [

    [''heart'', ''attack''],

    [''machine'', ''learning''],

    [''New'', ''York''],

    ]

    sample_text = "John suffered a messive heart attack. He was enrolled in machine
    learning in Washington DC."

    tokens = dictionary_based_tokenizer(sample_text, dictionary)

    print("Tokens:", tokens)

    OUTPUT:

    Tokens: [''John'', ''suffered'', ''a'', ''messive'', ''heart_attack'', ''.'',
    ''He'', ''was'', ''enrolled'', ''in'', ''machine_learning'', ''in'', ''Washington'',
    ''DC'', ''.'']

    ```


    Note


    You may notice in the output that ‘heart attack’ appears as ‘heart_attack’ and
    ‘machine learning’ as ‘machine_learning’.'
  trans: "\n# 5.2 重新审视形态学分析\n\n我们在本章开头讨论了形态学分析。通过学习语素如何组合成词，我们可以理解语言模式，并实现词干提取和词形还原等语言处理任务。让我们借助以下三个熟悉的单词来理解语素。\n\
    \n- 单词“unhappiness”包含三个语素。前缀“un-”（意为“不”）、词根“happy”（意为“快乐的”）以及后缀“-ness”（意为“……的状态”）。组合起来，它们构成了单词“unhappiness”。\n\
    - “Replayed”包含两个语素。前缀“re-”（意为“再次”）和词根“played”（意为“参与游戏或活动”）。\n- 类似地，单词“cats”包含两个语素：基础名词“cat”和后缀“-s”（表示复数形式）。\n\
    \n通过分析单词的结构，我们可以高效地提取有意义的特征，并开发更有效的语言模型。\n\n语素主要有两大类。\n\n- **自由语素**可以作为独立的单词存在并具有意义。例如“book”、“run”和“happy”。这些语素即使不依附于其他单词也能传达意义。\n\
    - **粘着语素**必须依附于自由语素才能具有意义。以我们熟悉的例子“unhappy”为例。在这里，像“un-”这样的前缀附加在基础词“happy”上，修饰了基础词的含义。通过这种方式，粘着语素进一步为单词增添了细微差别或语法语境。\n\
    \n自由语素代表了一种语言的基本词汇单位，而粘着语素（如前缀、后缀和中缀）则帮助我们理解单词是如何被修饰以及彼此之间如何关联的。理解粘着语素有助于词干提取和词形还原，因为这两个过程都旨在将单词还原为其基础形式或词根形式。这种知识在搜索引擎中很有用，搜索引擎需要识别出单词的不同形式（例如“run”、“running”、“runner”）并将其视为相关。此外，语素知识允许更精确地匹配单词和短语，即使它们以不同的形式出现。例如，知道“running”、“runner”和“runs”这三个单词都来自同一个语素（基础词）“run”，可以改进对相关文本的分组。\n\
    \n读到此处，你可以想象，形态学分析几乎可以应用于我们在第 4 章学习的所有 NLP 技术中。例如，形态学分析在词干提取和词形还原、词性标注、命名实体识别、机器翻译、文本规范化、情感分析以及其他若干\
    \ NLP 任务中都很有用。\n\n形态学分析的代码演示将在后续章节中给出，其中包含相关技术。\n\n## 5.3 重新审视分词\n\n我们在前一章学习了基本的分词。我们还学习了如何利用\
    \ Python NLTK 库中的`word_tokenize()`和`sent_tokenize()`方法，分别将较大的文本语料库（或文本文档）按句子级别或单词级别进行拆分。Gensim\
    \ 和 Keras 是另外两个可用于分词的 Python 开源库。\n\n### 5.3.1 代码演示\n\n让我们讨论一些其他的分词器：空白分词器、基于词典的分词器、基于规则的分词器、基于标点的分词器、推文分词器和多词表达式分词器。每个分词器服务于不同的目的。我们在代码本身中提供了关于每个分词器的一些理论说明。\n\
    \n#### 空白分词\n\n空白分词根据空格和换行符来拆分文本文档。它将输入文本中由空白分隔的每个部分视为一个独立的词元。空白分词提供了一种将文本快速分解为单词或短语的方法。这种方法特别适用于处理结构化数据，包括日志文件或代码，在这些数据中空白具有特定含义。\n\
    \n空白分词不太关注输入文本的语法结构。其主要关注点是文本的视觉分隔。空白分词用于句子边界不那么重要的 NLP 任务中。例如关键词提取或简单的文本预处理，这些任务的重点是快速将输入文本拆分成更小、更易于管理的部分。以下是代码演示。\n\
    \n```python\nfrom nltk.tokenize import WhitespaceTokenizer\nfrom typing import\
    \ List\n\ndef whitespace_tokenizer(text: str) -> List[str]:\n    \"\"\"\n    根据空白字符（空格、制表符、换行符）对输入文本进行分词。\n\
    \    参数：\n    text : str\n        要分词的输入文本。\n    返回：\n    List[str]\n        词元列表。\n\
    \    \"\"\"\n    tokenizer = WhitespaceTokenizer()\n    tokens = tokenizer.tokenize(text)\n\
    \    return tokens\n\n# 使用示例\nif __name__ == \"__main__\":\n    sample_text =\
    \ \"\"\"Whitespace tokenization breaks a text document based on spaces and line\
    \ breaks. It considers every section of input text divided by whitespace as a\
    \ distinct token. Whitespace tokenization serves as a quick way to break down\
    \ text into words or phrases. This method is especially used for processing structured\
    \ data including logs files or code, in which whitespaces have specific meaning.\n\
    \    \"\"\"\n    tokens = whitespace_tokenize(sample_text)\n    print(\"Tokens:\"\
    , tokens)\n    OUTPUT:\n    Tokens: ['Whitespace', 'tokenization', 'breaks', 'a',\
    \ 'text', 'document', 'based', 'on', 'spaces', 'and', 'line', 'breaks.', 'It',\
    \ 'considers', 'every', 'section', 'of', 'input', 'text', 'divided', 'by', 'whitespace',\
    \ 'as', 'a', 'distinct', 'token.', 'Whitespace', 'tokenization', 'serves', 'as',\
    \ 'a', 'quick', 'way', 'to', 'break', 'down', 'text', 'into', 'words', 'or', 'phrases.',\
    \ 'This', 'method', 'is', 'especially', 'used', 'for', 'processing', 'structured',\
    \ 'data', 'including', 'logs', 'files', 'or', 'code,', 'in', 'which', 'whitespaces',\
    \ 'have', 'specific', 'meaning.']\n```\n\n#### 基于词典的分词\n\n在基于词典的分词中，词元基于词典中已有的单词。如果词元在词典中未找到，则会应用特殊规则对其进行分词。\n\
    \n基于词典的分词用于识别和提取预定义短语或术语更为重要的场景。它确保在领域特定的文本中使用，在这些文本中，一致地识别特定词元比识别简单词元更重要。此方法在诸如医学文本处理和解析法律文档等\
    \ NLP 任务中特别有用，因为这些任务中术语的精确识别至关重要。\n\n```python\nimport nltk\nfrom nltk.tokenize\
    \ import MWETokenizer\nfrom typing import List\n\n# NLTK 数据\nnltk.download('punkt')\n\
    \ndef dictionary_based_tokenizer(text: str, dictionary: List[List[str]]) -> List[str]:\n\
    \    \"\"\"\n    基于预定义词典对输入文本进行分词。\n    参数：\n    text : str\n        输入文本字符串。\n\
    \    dictionary : List[List[str]]\n        一个表达式列表，这些表达式将被识别为单个词元。\n    返回：\n\
    \    List[str]\n        词元列表。\n    \"\"\"\n    # '_' 参数用下划线 (_) 连接单词。\n    tokenizer\
    \ = MWETokenizer(dictionary, separator='_')\n    tokens = tokenizer.tokenize(nltk.word_tokenize(text))\n\
    \    return tokens\n\n# 使用示例\nif __name__ == \"__main__\":\n    # 定义一个多词表达式词典\n\
    \    dictionary = [\n        ['heart', 'attack'],\n        ['machine', 'learning'],\n\
    \        ['New', 'York'],\n    ]\n    sample_text = \"John suffered a massive\
    \ heart attack. He was enrolled in machine learning in Washington DC.\"\n    tokens\
    \ = dictionary_based_tokenizer(sample_text, dictionary)\n    print(\"Tokens:\"\
    , tokens)\n    OUTPUT:\n    Tokens: ['John', 'suffered', 'a', 'massive', 'heart_attack',\
    \ '.', 'He', 'was', 'enrolled', 'in', 'machine_learning', 'in', 'Washington',\
    \ 'DC', '.']\n```\n\n**注意**\n\n你可能会在输出中注意到，‘heart attack’显示为`heart_attack`，而‘machine\
    \ learning’显示为`machine_learning`。\n"
- fmt: '### Rule-based Tokenization


    Rule-based tokenization is particularly useful in text preprocessing tasks where
    precise structures or formats must be preserved. Regular expressions can be used
    to fine-tune to handle various linguistic nuances or specific text formats. The
    following uses `RegexpTokenizer` from the NLTK along with required regular expression
    patterns.


    ```

    from nltk.tokenize import RegexpTokenizer

    from typing import List

    def rule_based_tokenizer(text: str) -> List[str]:

    """

    Tokenizes the input text based on regular expressions.

    Parameters:


    text : str

    The input string.

    Returns:


    List[str]

    A list of tokens.

    """

    # Define a regular expressions for specific tasks.

    # Rule 1: Match abbreviations like "U.K.", "Dr."

    # Rule 2: Match words including those with apostrophes like "she''s", "haven''t")

    # Rule 3: Separately match punctuations.

    pattern = r''''''(?x)               # Set flag to allow verbose regex

    (?:[A-Za-z]\.)+    # Abbreviations like U.K.

    | \w+(?:''\w+)?       # Words with apostrophes

    | [^\w\s]            # Separate punctuations

    ''''''

    # Write a RegexpTokenizer.

    tokenizer = RegexpTokenizer(pattern)

    # Tokenize.

    tokens = tokenizer.tokenize(text)

    return tokens

    # Example usage

    if __name__ == "__main__":

    sample_text = """Dr. John''s a rocket engineer in the U.K.

    U.A.E. govt. has awarded him many awards."""

    tokens = rule_based_tokenizer(sample_text)

