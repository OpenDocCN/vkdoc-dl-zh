- fmt: '### Advances like BERT and GPT


    There have been significant advances in NLP in recent years. `BERT` stands for
    Bidirectional Encoder Representations from Transformers. It was first introduced
    in 2018. The most popular model in the GPT category is `ChatGPT`. It was first
    released in 2022. Both `BERT` and `GPT` come under the category of large language
    models (LLM) and are based on transformer models. LLMs are trained on massive
    amounts of data and can perform various tasks, such as text translation and text
    generation, with minimal fine-tuning. This chapter focuses on `BERT`; an upcoming
    is dedicated to GPT-based models.


    `BERT` is a kind of neural network based on transformer architecture. It’s a pre-trained
    model that can be fine-tuned for specific NLP tasks by simply adding a new layer
    or a small network on top of `BERT`’s architecture. The `BERT` model is available
    in various sizes to accommodate different computational resource capacities. The
    following are the `BERT` models used in practice.


    - **BERT-Base** is a smaller `BERT` model. It consists of 12 layers and 110 million
    parameters. It strikes a balance between performance and speed for general NLP
    tasks.

    - **BERT-Large** is a larger version of `BERT`. It consists of 24 layers and 340
    million parameters. This `BERT` model offers higher accuracy, but it requires
    more computational resources.

    - **DistilBERT** is a smaller and faster variant of `BERT` with around 66% of
    `BERT`’s size. This `BERT` model maintains high accuracy while enabling faster
    processing time.

    - **TinyBERT** is a compact `BERT` model. It is designed for fast performance
    and low memory usage. It has fewer network layers and hidden units.

    - **ALBERT** is a lightweight version of `BERT`. It shares parameters across layers,
    thereby reducing model size while maintaining performance.


    The `BERT-Base` model is a widely used general-purpose `BERT` model for a variety
    of NLP tasks. Its wide range of uses is justified because it maintains a reasonable
    performance and speed while consuming fewer computational resources.


    The Hugging Face framework streamlines working with pre-trained models, such as
    `BERT`, `GPT`, and others. Listing [7-7](#649581_1_En_7_Chapter.xhtml#PC17) is
    a code demo on how the Hugging Face framework can be utilized for NLP tasks. For
    this purpose, we utilize the `bert-base-uncased` model. It is a version of `BERT-Base`,
    which does not differentiate between uppercase and lowercase letters. This book
    concentrates more on the usage of `BERT` and `GPT` rather than their internal
    architecture.


    ```

    """

    Code demo for sentiment analysis using the sentence "Ramesh is my friend and he
    is a great scholar" with Hugging Face and BERT.

    """

    import torch

    from transformers import BertTokenizer, BertForSequenceClassification, pipeline

    # Set random seed for reproducibility

    torch.manual_seed(42)

    # Load pre-trained BERT model and tokenizer

    model = BertForSequenceClassification.from_pretrained(''bert-base-uncased'', num_labels=2)

    tokenizer = BertTokenizer.from_pretrained(''bert-base-uncased'')

    # Create a sentiment-analysis pipeline

    nlp = pipeline(''sentiment-analysis'', model=model, tokenizer=tokenizer)

    # Test sentence

    sentence = "Ramesh is my friend and he is a great scholar."

    # Get sentiment prediction

    result = nlp(sentence)

    # Print result

    print(result)

