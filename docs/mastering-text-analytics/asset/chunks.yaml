    \ only the first five.\n    for i, syn in enumerate(synonyms):\n    if i >= 5:\n\
    \    break\n    print(syn.definition())\n    print(syn.examples())\n    a written\
    \ work or composition that has been published (printed on pages bound together)\n\
    \    ['I am reading a good book on economics']\n    physical objects consisting\
    \ of a number of pages bound together\n    ['he used a large book as a doorstop']\n\
    \    a compilation of the known facts regarding something or someone\n    [\"\
    Al Smith used to say, `Let's look at the record'\", 'his name is in all the record\
    \ books']\n    a written version of a play or other dramatic composition; used\
    \ in preparing for a performance\n    []\n    a record in which commercial accounts\
    \ are recorded\n    ['they got a subpoena to examine our books']\n    ```\n\n\
    *   The output gives the definitions and example sentences for each sense of the\
    \ word *book*.\n\n*   It is retrieved from WordNet.\n\n*   It also illustrates\
    \ the various contexts in which we can use the word.\n\n*   It also illustrates\
    \ the various contexts in which we can use the word.\n\n*>>> Code Snippet 2-2*\n\
    \nThere are many methods available with NLTK that deal with basic corpus functionality.\
    \ These methods can be found at nltk.corpus.reader and [`www.nltk.org/howto`](http://www.nltk.org/howto).\
    \ You are strongly advised to visit these sites to get full details."
  trans: "\n# 与 Seaborn 示例并行\n\n与 Seaborn 示例类似，我们现在来讨论 NLTK Python 库中一些内置的文本语料库。你可以直接在分析（NLP）项目中使用这些文本数据。\n\
    \n`NLTK` 是一个领先的 NLP 平台，用于构建处理自然语言（如英语等）的 Python 程序。`NLTK` 拥有内置且易于使用的接口，可访问超过 50\
    \ 个语料库和词汇资源。其中一些流行的包括 `Brown`、`Gutenberg`、`Reuters`、`Inaugural Address Corpus`\
    \ 和 `WordNet 3.0`（英语）。以下代码（清单 2-2）涉及访问 `NLTK` 内置的流行文本语料库和词汇资源。\n\n## 2.2.1 访问一些流行的\
    \ NLTK 文本语料库\n\n```\n# 如果你已经安装了 nltk Python 库，可以跳过此代码\n# 你可以运行此代码。为节省空间，此处不包含输出。\n\
    !pip install nltk\n# 安装 nltk 后，你需要下载数据。\n# 你可以运行此代码。为节省空间，此处不包含输出。\nimport nltk\n\
    nltk.download('all')\n清单 2-2\n访问流行的文本语料库和词汇资源\n```\n\n## 2.2.2 访问 Gutenberg 语料库\n\
    \n```\nfrom nltk.corpus import gutenberg\nprint(gutenberg.fileids())\n['austen-emma.txt',\
    \ 'austen-persuasion.txt', 'austen-sense.txt', 'bible-kjv.txt', 'blake-poems.txt',\
    \ 'bryant-stories.txt', 'burgess-busterbrown.txt', 'carroll-alice.txt', 'chesterton-ball.txt',\
    \ 'chesterton-brown.txt', 'chesterton-thursday.txt', 'edgeworth-parents.txt',\
    \ 'melville-moby_dick.txt', 'milton-paradise.txt', ….continued]\n```\n\n代码输出代表了\
    \ `NLTK` 的 Gutenberg 文本语料库中可用的文件 ID（文件标识符）集合。\n\n每个文件 ID 代表一个文本文件，其中包含 Gutenberg\
    \ 文本语料库中的一部文学作品。\n\n```\n# 此代码读取特定文件的文本\nhamlet = gutenberg.words('austen-persuasion.txt')\n\
    print(hamlet[:50])\n['[', 'Persuasion', 'by', 'Jane', 'Austen', '1818', ']', 'Chapter',\
    \ '1', 'Sir', 'Walter', 'Elliot', ',', 'of', 'Kellynch', 'Hall', ',', 'in', 'Somersetshire',\
    \ ',', 'was', 'a', 'man', 'who', ',', 'for', 'his', 'own', 'amusement', ',', 'never',\
    \ 'took', 'up', 'any', 'book', 'but', 'the', 'Baronetage', ';', 'there', 'he',\
    \ 'found', 'occupation', 'for', 'an', 'idle', 'hour', ',', 'and', 'consolation']\n\
    ```\n\n让我们再访问一些类似的文本语料库。\n\n## 2.2.3 访问 Reuters 语料库\n\n```\nfrom nltk.corpus import\
    \ reuters\nfile_ids = reuters.fileids()[:10]\nprint(file_ids)\n[....., 'test/14833',\
    \ 'test/14839', 'test/14840', 'test/14841', 'test/14842', ....continued]\n```\n\
    \nReuters 语料库中的类别并非互斥。我们可以请求许多文档涵盖的多个主题。我们也可以请求多个类别中包含的多个文档。\n\n```\n# 语料库程序可以一次接受单个或多个文件\
    \ ID。\nreuters.categories(['test/14828', 'test/14829'])\n['crude', 'grain', 'nat-gas']\n\
    file_ids = reuters.fileids(['crude', 'grain'])[:10]\nprint(file_ids)\n['test/14828',\
    \ 'test/14829', 'test/14832', ...continued]\nreuters.words('test/14843')[:5]\n\
    ['SUMITOMO', 'BANK', 'AIMS', 'AT', 'QUICK']\nreuters.words(categories=['crude',\
    \ 'grain', 'nat-gas'])\n['CHINA', 'DAILY', 'SAYS', 'VERMIN', 'EAT', '7', '-',\
    \ ...]\n```\n\n## 2.2.4 访问 Brown 语料库\n\n要访问 Brown 语料库，可以使用以下代码。\n\n```\nfrom nltk.corpus\
    \ import brown\ncategories = brown.categories()[:5]\nprint(categories)\n[....,\
    \ 'editorial', 'fiction', ...continued]\nsentences = brown.sents(categories=['adventure',\
    \ 'belles_lettres'])[:2]\nfor sentence in sentences:\nprint(' '.join(sentence))\n\
    Northern liberals are the chief supporters of civil rights and of integration\
    \ .\nThey have also led the nation in the direction of a welfare state .\n```\n\
    \n## 2.2.5 访问 Gutenberg 语料库\n\nReuters 语料库在其网站上托管了 25,000 本免费电子书。\n\n我们可以运行 `nltk.corpus.gutenberg.fileids()`\
    \ 来获取语料库中的文件 ID。\n\n```\nimport nltk\nfile_ids = gutenberg.fileids()[:3]\nprint(file_ids)\n\
    ['austen-emma.txt', .... continued]\n# 我们将获取文本 — \"Emma by Jane Austen\"\n# 然后将其命名为\
    \ \"emma_text\"。\n# 之后我们将找出其中的单词数量。\nemma_text_sample = nltk.corpus.gutenberg.words('austen-emma.txt')\n\
    len(emma_text_sample)\n```\n\n## 2.2.6 访问 Web 和聊天文本\n\n该语料库包含来自 Firefox 讨论论坛的内容、电影剧本《加勒比海盗》、在纽约偷听到的对话、定制广告以及葡萄酒评论。\n\
    \n要访问 Web 和聊天文本，可以使用以下代码。\n\n```\nfrom nltk.corpus import webtext\nfor fileid\
    \ in webtext.fileids():\nprint(fileid, webtext.raw(fileid)[:30], '...')\nfirefox.txt\
    \ Cookie Manager: \"Don't allow s ...\ngrail.txt SCENE 1: [wind] [clop clop clo\
    \ ...\n...\n...\npirates.txt PIRATES OF THE CARRIBEAN: DEAD ...\nsingles.txt 25\
    \ SEXY MALE, seeks attrac old ...\nwine.txt Lovely delicate, fragrant Rhon ...\n\
    # nltk 中也提供了即时通讯聊天会话的语料库\n# 该语料库组织成 15 个文件\nfrom nltk.corpus import nps_chat\n\
    chatroom = nps_chat.posts('10-19-20s_706posts.xml')\nfirst_10_messages = chatroom[123][:10]\n\
    print(first_10_messages)\n```\n\n## 2.2.7 访问 NLTK 词汇资源\n\n以下是一些关键点。\n\n*   `NLTK`\
    \ 包含多个词汇资源。\n*   其中最重要的是 `WordNet`。\n*   `WordNet` 是一个庞大的英语词汇数据库。\n*   它将单词分组为多个同义词集。\n\
    \n    ```\n    from nltk.corpus import wordnet as wn\n    synonyms = wn.synsets('book')\n\
    \    print(synonyms)\n    [Synset('book.n.01'), Synset('book.n.02'), ....continued.\n\
    \    ```\n\n*   输出表示单词 `\"book\"` 的同义词集（称为 synsets）列表。\n*   `book` 表示为其定义同义词集的单词。\n\
    *   `n` 表示词性（在此特定示例中，`\"n\"` 代表名词）。\n*   `01` 表示义项编号，用于区分单词的不同含义。\n\n    ```\n\
    \    # 获取定义和示例。仅打印前五个。\n    for i, syn in enumerate(synonyms):\n    if i >= 5:\n\
    \    break\n    print(syn.definition())\n    print(syn.examples())\n    a written\
    \ work or composition that has been published (printed on pages bound together)\n\
    \    ['I am reading a good book on economics']\n    physical objects consisting\
    \ of a number of pages bound together\n    ['he used a large book as a doorstop']\n\
    \    a compilation of the known facts regarding something or someone\n    [\"\
    Al Smith used to say, `Let's look at the record'\", 'his name is in all the record\
    \ books']\n    a written version of a play or other dramatic composition; used\
    \ in preparing for a performance\n    []\n    a record in which commercial accounts\
    \ are recorded\n    ['they got a subpoena to examine our books']\n    ```\n\n\
    *   输出给出了单词 *book* 每个义项的定义和例句。\n*   这些信息是从 `WordNet` 中检索得到的。\n*   它还说明了我们可以使用该单词的各种上下文。\n\
    \n*>>> 代码片段 2-2*\n\n`NLTK` 提供了许多处理基本语料库功能的方法。这些方法可以在 `nltk.corpus.reader` 和 [`www.nltk.org/howto`](http://www.nltk.org/howto)\
    \ 找到。强烈建议你访问这些网站以获取完整详细信息。\n"
- fmt: '# 2.3 Extracting Data from Word Files


    The use of Microsoft Word documents is widespread in professional, research, and
    academic environments. Word files often contain valuable data in textual formats.
    Word files can include business reports, literary articles, and research papers.
    This data can be used for multiple NLP projects, including information extraction,
    sentiment analysis, and text classification. Processing of Word files can yield
    rich, structured, and unstructured text content, which can be useful in building
    comprehensive NLP models. Such models can be used to automate and streamline business
    workflows to enable quick insights and data-driven decision-making.


    The information in this format can be combined with data from databases, websites,
    and other text formats (or sources). Data integration from various sources can
    enhance the effectiveness and functionality of NLP applications.


    Listing [2-3](#649581_1_En_2_Chapter.xhtml#PC14) demonstrates the creation of
    a sample file. We will use this file to extract data. We will use the `python-docx`
    library for both writing to and reading from the Word file.


    ## 2.3.1 Extracting Data from MS Word Files


    Create a sample file.


    ```

    # Install python-docx if you haven''t done it already.

    # I am not including the output of this code due to space constraints.

    !pip install python-docx

    ```


    The following script creates a sample Word demo document containing a title, multiple
    paragraphs, bullet points, and a table.


    ```

    from docx import Document

    from docx.shared import Pt

    # Create a new blank Document.

    doc = Document()

    # Add a title

    doc.add_heading(''Sample Document For NLP Analysis'', level=1)

    # Add a couple of paragraphs.

    doc.add_paragraph(''This sample Word demo document contains multiple paragraphs.'')

    doc.add_paragraph(''Here is another paragraph with more text.'')

    # Add few bullet points.

    doc.add_paragraph(''Sample bullet 1'', style=''List Bullet'')

    doc.add_paragraph(''Sample bullet 2'', style=''List Bullet'')

    doc.add_paragraph(''Sample bullet 3'', style=''List Bullet'')

    # Add a table for demo.

    table = doc.add_table(rows=3, cols=2)

    table.style = ''Table Grid''

    # Add header row

    hdr_cells = table.rows[0].cells

    hdr_cells[0].text = ''Header Sample 1''

    hdr_cells[1].text = ''Header Sample 2''

    # Add a couple of data rows

    row_cells = table.rows[1].cells

    row_cells[0].text = ''Sample Row 1''

    row_cells[1].text = ''Data Point 1''

    row_cells = table.rows[2].cells

    row_cells[0].text = ''Sample Row 1''

    row_cells[1].text = ''Data Point 2''

    # Save the newly created document.

    doc.save(''NLP_demo_sample_file.docx'')

    ```


    The following script loads this Word document. Then, it extracts and prints various
    elements of the document, like the title, paragraphs, bullet points, and table
    data.


    ```

    from docx import Document

    # First load the Word document created above.

    doc = Document(''NLP_demo_sample_file.docx'')

    # Extract and print the title

    # Assume it to be the opening paragraph.

    print(f"Title: {doc.paragraphs[0].text}")

    # Extract and print all paragraphs.

    print("\nParagraphs:")

    for para in doc.paragraphs:

    print(para.text)

    # Extract and print bullet points (assuming they are in a list)

    print("\nBullet Points:")

    for para in doc.paragraphs:

    if para.style.name == ''List Bullet'':

    print(para.text)

    # Extract and print table data

    print("\nTable Data:")

    for table in doc.tables:

    for row in table.rows:

    for cell in row.cells:

    print(cell.text, end='' | '')

    print()

    Title: Sample Document For NLP Analysis

    Paragraphs:

    Sample Document For NLP Analysis

    This sample Word demo document contains multiple paragraphs.

    Here is another paragraph with more text.

    Sample bullet 1

    Sample bullet 2

    Sample bullet 3

    Bullet Points:

    Sample bullet 1

    Sample bullet 2

    Sample bullet 3

    Table Data:

    Header Sample 1 | Header Sample 2 |

    Sample Row 1 | Data Point 1 |

    Sample Row 1 | Data Point 2 |

    Listing 2-3

    Extracting Data from MS Word Files

    ```


    # 2.4 Extracting Data from HTML


    A vast amount of structured and unstructured text data exists in the form of HTML
    documents. Websites, blogs, and online articles are often in HTML format. In such
    cases, HTML documents become one important primary source to extract real-world
    language usage and patterns. Parsing of HTML text can give access to a wealth
    of diverse textual data that is crucial for training NLP models.


    This structured nature of HTML documents makes it relatively easier to extract
    appropriate information. The inherent metadata of HTML documents, such as tags
    and attributes (e.g., `<title>`, `<h1>`, and `<p>`), provide additional background
    to the text. HTML documents frequently include hyperlinks, which facilitates the
    exploration across the web. Listing [2-4](#649581_1_En_2_Chapter.xhtml#PC16) first
    creates a sample HTML file for the demo, and then we present well-commented code
    to extract various elements of the sample HTML document. Figure [2-2](#649581_1_En_2_Chapter.xhtml#Fig2)
    depicts the data extraction from HTML documents.


    ![Flow chart illustrating text data extraction from an HTML document. Central
    node labeled "HTML Document" connects to five methods: "Extract by Tag Names"
    (green) for identifying tags and parsing content, "Extract by Class Names" (purple)
    for identifying classes and filtering content, "Extract by Text Content" (pink)
    for text analysis and content extraction, "Extract by ID" (yellow) for identifying
    IDs and accessing content, and "Extract HREF" (red) for link and URL extraction.
    Each method is visually distinct with icons and color coding.](images/649581_1_En_2_Chapter/649581_1_En_2_Fig2_HTML.jpg)


    **Figure 2-2** The process of text extraction from HTML using the Beautiful Soup
    Python library'
