- fmt: '### 7.3.1 Techniques for Discourse Integration


    The key techniques under discourse integration include coreference resolution,
    anaphora resolution, coherence modeling, rhetorical structure theory, discourse
    parsing, entity tracking, lexical chains, topic modeling, cohesion analysis, and
    temporal relation identification.


    Coreference resolution enables NLP applications to connect the dots between words
    and their referents. For example, it ensures that “he,” “she,” or “it” connect
    to the right person or thing. For instance, in a news article, if it says, “Mary
    entered the class. She sat down,” coreference resolution’s job is to link “She”
    back to Mary. Anaphora resolution, on the other hand, zooms in on backward references.
    It resolves phrases like “this” or “that” to their earlier mentions. For example,
    in the sentence, “I bought a new car. This is my favorite machine,” anaphora resolution
    links “this” to “car.”


    Coherence modeling is like an invisible thread that helps keep a conversation
    or story connected and flowing smoothly. Imagine you’re reading a book, and one
    chapter describes a character embarking on an adventure. Then, in the next chapter,
    it addresses the challenges the character faces. Coherence modeling helps link
    those chapters together so you can follow the journey without getting lost. For
    example, in a chatbot, if you ask, “What’s the weather today?” and then, “Should
    I bring an umbrella?” coherence modeling helps the system understand that both
    questions are related to the weather.


    Let’s discuss the next technique with an example. In an essay, the opening paragraph
    describes the dangers of climate change and further explains possible solutions.
    Rhetorical structure theory (RST) reveals that the second part describes the first.
    RST delves to explain to us how different parts of a conversation or text are
    related. The RST role comes into play in explaining language constructs such as
    cause and effect, contrast, or explanation.


    Let’s study the case of a conversation between two friends. The first person might
    ask a question, and the other gives an answer. Discourse parsing is the technique
    that comes into play in separating these into “question” and “answer” units. Discourse
    parsing is equivalent to generating a blueprint of a conversation or text. It
    breaks the conversation or input text down into smaller, meaningful units to see
    how they work together. There are a couple of additional techniques related to
    discourse integration that are useful if you are aware of them. They are briefly
    explained in this chapter, and we link each technique with a real-world example
    for better understanding.


    Entity tracking deals with keeping track of nouns, like people or things, throughout
    a story. For example, in a suspense story, it helps if you properly remember all
    the suspects and their actions that were mentioned in previous chapters. So, if
    the first chapter discusses a suspect named John and the other chapter talks about
    Alex’s friend, Mary, in this example, the job of entity tracking is to connect
    these details throughout the story so that machines have a clear understanding
    of the narrative.


    Let’s examine a different use case. You are reading a story about a family dog.
    Lexical chain techniques are used to connect all the related words like “dog,”
    “puppy,” and “pet” that may have mentioned different parts of the book. Keeping
    this link helps you to follow along without getting confused about what’s being
    talked about. Lexical chains link connected words throughout the speech or input
    text to make sure everything sticks to the same topic. We use another example
    to discuss the topic modeling technique. Suppose you’re reading a few news articles
    online. Topic modeling can group all the stories about climate change together.
    This can help you to easily find and read all the articles about the same topic.


    In another instance, if an article starts by discussing a problem and then transitions
    to a solution, cohesion analysis is the technique that helps the machine ensure
    the changeover is clear and logical. Finally, Temporal relation identification
    helps to arrange events (in speech or text) in the order they occurred. In a history
    book, it helps to place events like wars and revolutions in chronological order.
    For example, it would indicate that World War I preceded World War II.


    We discussed quite a few techniques in this section. We may not detail each one
    of them due to space constraints.


    ### 7.3.2 Demonstrating Techniques for Discourse Integration


    Let’s go over all the techniques and use Python code to demonstrate these processes.


    #### Coreference Resolution (Code Demo)


    Most of these techniques use popular NLP libraries in Python, such as `spaCy`,
    `NLTK`, `Transformers`, and `Gensim`, among others.


    Here’s a brief idea of how each technique can be demonstrated with code.


    ```python

    # Install the package needed for coreference resolution.

    # Uncomment it if coreferee is not installed on your system.

    !python -m pip install coreferee

    # Installs the English coreference resolution model for the coreferee package.

    !python -m coreferee install en

    # Download the large English model (''en_core_web_lg'') for spaCy.

    # This model includes word vectors and is more accurate for NER and POS tagging.

    # It''s larger and more powerful than the smaller models lke ''en_core_web_sm''),
    but it may take up large memory.

    # We have not loaded it in the main code body but without this step, the code
    was throwing error.

    # So it''s a required step.

    !python -m spacy download en_core_web_lg

    # Code to ignore warnings.

    import warnings

    warnings.filterwarnings("ignore", category=FutureWarning)

    # Import the required package.

    import spacy

    # Load the transformer-based English model.

    # As of now let''s use it. We will take it up in detail in the later chapters.

    nlp = spacy.load(''en_core_web_trf'')

    """

    Add ''coreferee'' to the pipeline.

    ''coreferee'' is a spaCy extension that enables the identification and linking
    of coreferences in a text.

    Adding it to the pipeline so that coreference resolution can be performed after
    other NLP tasks like tokenization and parsing.

    """

    nlp.add_pipe(''coreferee'')

    # Create the sample text for demo.

    sample_doc = nlp(""" Although she was very busy at office work, Mary felt she
    had had enough of it.

    he and her spouse decided they needed to go on a holiday.

    They travelled by train to France because they had enough friends in the country.""")

    print("")

    print("OUTPUT \n")

    sample_doc._.coref_chains.print()

    OUTPUT

    0: she(2), Mary(10), she(12), She(20), her(22)

    1: work(8), it(17)

    2: [She(20); spouse(23)], they(25), They(34), they(41)

    3: France(39), country(47)

    ```


    The output does not appear to be easy to understand. The first line of the production
    (indexed 0) tells us that the pronouns `she(2)`, `she(12)`, `She(20)`, and `her(22)`
    refer to the same name, `Mary(10)`. Similarly, the second line (indexed 1) makes
    us understand that `it(17)` stands for `work(8)`. At index 2 position, `they(25)`,
    `They(34)`, `they(41)` refer to `[She(20); spouse(23)]`. Finally, at index 3,
    `country(47)` stands for `France(39)`. Notice that in this output, all the pronouns
    in the `sample_doc` are resolved to their proper nouns (coreference resolution
    process).'
