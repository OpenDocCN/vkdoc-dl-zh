    ''on'',

    '':'',

    ''22nd'',

    ''street'',

    '','',

    ''downton'',

    '','',

    ''and'',

    ''42nd'',

    ''street'',

    ''.'']

    ```


    Note


    The output retains punctuation marks as separate tokens. It helps in understanding
    the sentence structure. The presence of punctuation tokens helps preserve the
    meaning and context of the original sentence.


    ### Tweet Tokenizer


    Tweets can be treated as special texts like several others because they have a
    typical structure. The generic tokenizers may fail to produce feasible tokens
    when applied to the datasets containing tweets. NLTK has a special tokenizer for
    such cases. The Tweet tokenizer is a rule-based tokenizer that can be used to
    remove problematic characters, HTML code, and Twitter handles. This tokenizer
    can normalize the length of input text by reducing the occurrence of repeated
    letters. Additionally, the tweet tokenizer is equipped to effectively deal with
    hashtags and mentions while preserving their significance. The tokenizer can also
    effectively manage emoticons and special symbols. Note that hashtags and emoticons
    are common in tweets. The following is a short but reusable code demo using this
    tokenizer.


    ```

    from nltk.tokenize import TweetTokenizer

    def punctuation_based_tokenizer(text):

    """

    Tokenizes the input text using NLTK''s TweetTokenizer, which handles punctuation
    and special characters

    commonly found in tweets.

    Parameters:

    text (str): The input text to be tokenized.

    Returns:

    list: A list of tokens, including words and punctuation marks.

    """

    # Initialize the tokenizer.

    tokenizer = TweetTokenizer()

    # Tokenize.

    tokens = tokenizer.tokenize(text)

    return tokens

    # Example usage

    if __name__ == "__main__":

    Sample_text = """Mr.Johnson owns three houses in New York!

    22nd street, downton,and 42nd street." #marvelous @Rita"

    """

    tokens = punctuation_based_tokenizer(Sample_text)

    print(tokens)

    OUTPUT:

