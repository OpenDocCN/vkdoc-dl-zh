  trans: '

    # 4.4 NLTK 之外的一些实用功能


    本节将探讨一些超越 NLTK 当前能力的、主流的 NLP 文本处理功能。这些重要功能包括词云生成、语言翻译和文本摘要。


    `词云生成` 是一种 NLP 工具，它能从输入文本中突出显示出现频率最高的词汇。只需看一眼词云，就能揭示输入文本文档中讨论的关键主题。语言翻译（或机器翻译）允许将输入文本从一种语言自动转换为另一种语言，使内容能够被全球受众所理解。`文本摘要`
    则将大量文本浓缩为保留主要思想的简洁摘要。这些功能进一步增强了 NLP 应用对国际受众的实用性。接下来，我们通过一个代码演示来讲解词云生成。


    ## 4.4.1 词云生成


    词云生成（WSG）是一种在文本分析中颇具影响力的可视化工具。它展示了输入文本文档中出现频率最高的词汇。出现频率越高的词，会以更大、更粗的字体显示。这种词汇的可视化表示有助于快速归类核心主题和关键术语。NLP
    社区常将词云用于探索性数据分析（EDA）。词云主要用于总结大型文本文档。然而，词云无法揭示词汇出现的上下文语境。尽管存在这一主要局限，词云在初步文本探索中仍然很受欢迎。清单
    4-13 包含了一个词云生成的示例代码。


    ```

    # 如果尚未安装 wordcloud，请先安装。

    !pip install wordcloud

    # 导入所需库。

    import nltk

    from wordcloud import WordCloud

    import matplotlib.pyplot as plt

    from nltk.corpus import stopwords

    from nltk.tokenize import word_tokenize

    # 下载数据。

    nltk.download(''punkt'')

    nltk.download(''stopwords'')

    # 编写必要的函数。

    def text_preprocessor(text):

    """

    分词并移除停用词。

    参数:

    text (str): 输入的文本。

    返回:

    str: 预处理后的文本。

    """

    tokens = word_tokenize(text.lower())

    filtered_tokens = [word for word in tokens if word.isalnum() and word not in stopwords.words(''english'')]

    return '' ''.join(filtered_tokens)

    def word_cloud_generator(text):

    """

    生成并显示词云。

    参数:

    text (str): 预处理后的文本。

    """

    wordcloud = WordCloud(width=800, height=400, background_color=''white'').generate(text)

    plt.figure(figsize=(8, 5))

    plt.imshow(wordcloud, interpolation=''bilinear'')

    plt.axis(''off'')

    plt.show()

    def main():

    # 示例文本文档。

    sample_text = """

    Word Cloud Generation (WSG) is an influential visual tool that is used in text
    analytics.

    It represents the most frequent words available within an input text document.

    Words appearing more frequently are displayed in larger, bolder fonts.

    This type of visual representation of words helps to quickly categorize the central
    themes and key terms.

    Word clouds are often used by the NLP community for exploratory data analysis
    EDA).

    Word clouds are predominantly used in summarizing large texts documents.

    However, word clouds do not reveal the context in which words appear.

    Despite this major limitation, word clouds are popularly for initial text exploration
    (EDA).

    """

    # 预处理示例文本。

    pre_processed_text = text_preprocessor(sample_text)

    # 生成词云。

    word_cloud_generator(pre_processed_text)

    清单 4-13

    词云生成（目前 NLTK 中不可用）

    ```


    ```

    if __name__ == "__main__":

    main()

    ```


