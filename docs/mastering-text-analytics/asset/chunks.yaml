- fmt: '# 9.3 Chapter Recap


    This chapter explains the advanced techniques for creating various NLP applications
    using `LangChain` and `OpenAI`. At the beginning of this chapter, the significance
    of connecting to various data sources is discussed. A detailed explanation is
    included for integrating document loaders, transforming documents, and working
    with text embeddings and vector databases like `ChromaDB`. For building NLP applications,
    data is available in multimodal data sources. This can include both text and images.
    Efficient handling of these multimodal data sources is required for optimal data
    retrieval from multiple data sources. This is achieved by pre-processing and indexing
    for more efficient querying.


    Next, this chapter introduces the concept of *chains*, which are the sequence
    of tasks that are designed to achieve specific goals. In this section, the creation
    of different types of chains, simple and multi-step chains are explained. `LangChain`
    is used to handle function calls. Various approaches are also discussed to optimize
    chains and to handle errors. For showcasing automatic workflows, practical examples
    are also provided.


    In the later part of this chapter, the concept of memory and its management is
    discussed to allow the applications to retain their state between different runs.
    Various types of memory are also discussed, along with the management of user
    and AI interactions. Implementing both short-term and long-term memory solutions
    improves conversational applications by enhancing contextual understanding.


    At the end of the chapter, a separate focus is provided on agents—dynamic tools
    capable of performing tasks automatically. A detailed explanation is provided
    for agents on how interactive AI agents work and methods for building domain-specific
    agents to tackle complex tasks. Detailed guidelines are provided on deploying
    `LangChain` applications in production. Their key aspects related to scaling them
    for high demand and ensuring their reliability through monitoring and maintenance
    are also covered in this chapter.


    # 10. Case Study on Symantec Analysis


    ## 10.1 Introduction


    Since 2006, the world has witnessed a data explosion, which finds an explanation
    in the “humanity and technology on the second half of the chessboard” (Brynjolfsson
    and McAfee 2011).[¹](#649581_1_En_10_Chapter.xhtml#Sec24) Data proliferation has
    led to an increasing shift in marketing communications, as witnessed on online
    platforms (Sheth and Kellstadt 2020),[²](#649581_1_En_10_Chapter.xhtml#Sec24)
    along with advocacy by the user community in the form of reviews. This has led
    to an explosion of unstructured data, primarily in the form of text messages,
    resulting in inferential statistics being increasingly supplemented by non-inferential
    approaches, such as natural language processing (NLP), a technique used by computers
    to understand and generate human language so that large amounts of text data can
    be analyzed for insights.


    This chapter, however, examines semantic analysis—a crucial component of NLP,
    which helps humans understand the intended meaning of words, moving beyond a mere
    analysis of a sentence’s composition and how companies are leveraging this. Semantic
    analysis helps in the understanding of the text’s main idea, highlighting the
    relationships between the words used and the sentences constructed. In other words,
    it helps humans comprehend written text beyond its grammatical structure by examining
    context and word relationships to derive deeper insights from the written language.


    Finding the intended meaning of words, phrases, and sentences beyond their obvious
    meaning is nothing new. Semantics finds its roots in the thinking of Plato. In
    his dialogue `Cratylus`,[³](#649581_1_En_10_Chapter.xhtml#Sec24) Plato talks about
    words as “symbols of ideas” associated with them instead of being “crude imitations
    of other natural sounds.” He discussed the idea that words have a natural connection
    to the things they signify. The formal study of semantics began to take shape
    in the late 19th and early 20th centuries. Michel Bréal, a French philologist,
    is credited with coining the term “semantics” in 1883.[⁴](#649581_1_En_10_Chapter.xhtml#Sec24)
    He explored the structure of languages, their evolution over time, and the relationships
    between them. In simple terms, semantics focuses on the study of language and
    its meaning. At the same time, semantic analysis enables computers to accurately
    determine the context of words or phrases that can be interpreted in multiple
    ways.


    In the mid-20th century, the formalization of the study of semantics began to
    take shape in the field of linguistics. Noam Chomsky’s work on generative grammar
    in the 1950s laid the groundwork for understanding how syntax (the structure of
    sentences) and semantics (the meaning of sentences) are related. Around the same
    time, Richard Montague[⁵](#649581_1_En_10_Chapter.xhtml#Sec24) applied mathematical
    logic to the study of natural language semantics. He proposed Montague semantics,
    a theory based on natural language semantics and its relation to syntax.


    The advent of computers and the development of programming languages in the middle
    of the 20th century opened new possibilities for the study of semantics. Robert
    W. Floyd’s 1967 paper[⁶](#649581_1_En_10_Chapter.xhtml#Sec24) on programming language
    semantics is often given credit for introducing the field of programming language
    semantics. Floyd explained programming languages as having two parts: semantics
    (i.e., meaning and syntax), and emphasized the importance of precisely encoding
    these elements so that computers could process them automatically.


    It was not until the late 1990s that the Semantic Web concept was proposed by
    Tim Berners-Lee. This was a major advancement in the field of semantic analysis.
    The Semantic Web was the first attempt to make web content accessible to machines
    through structured metadata descriptions and ontologies to give meaning to data.
    This formed the basis for the development of standards such as the Resource Description
    Framework (RDF) and the Web Ontology Language (OWL), which are used to represent
    and reason about data on the web.


    It is important to mention that owing to the explosion of text messages, analyzing
    them to derive meaningful conclusions is not that easy. This is because data proliferation
    has occurred on a scale where data is in search of techniques, rather than techniques
    in search of data (Sheth and Kellstadt, 2020).


    This is despite advances made in natural language processing in recent years,
    which have boosted the field of semantic analysis, enabling computers to understand
    and generate human language, and making it possible to analyze large volumes of
    text data for valuable insights. Machine learning algorithms, especially deep
    learning models such as transformers, have significantly improved the accuracy
    and efficiency of semantic analysis.


    Despite techniques trying to catch up with data, there are successful models of
    companies that use semantic analysis to make insightful decisions. This chapter
    attempts to explore the future of semantic analysis, which is likely to be more
    robust and scalable, shaped by advancements in AI and machine learning.


    ## 10.2 Methods of Semantic Analysis


    Semantic analysis allows computers to understand the right meaning of words or
    phrases with more than one meaning, which is crucial to the accuracy of text-based
    NLP applications. The technology not only processes information but also recognizes
    the connections between pieces of information to decipher massive amounts of data
    and implement them in the real world. Semantic analysis uses a variety of methods
    to interpret the meaning of text data. Among the most prominent ones is latent
    semantic analysis.'
