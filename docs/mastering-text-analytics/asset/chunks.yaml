    The Beautiful Soup library is used to extract text from this HTML file. It is\
    \ a popular Python library to scrape data from the web.\n\n## 2.5 Extracting Data\
    \ from JSON\n\nLike HTML text, JSON files also provide a structured data format\
    \ for storing and exchanging data. JSON (JavaScript Object Notation) files are\
    \ lightweight and easy to parse. It makes them almost a perfect option for handling\
    \ large datasets that are typical in NLP projects. JSON files have a nested structure\
    \ that supports complex data representations with relative ease. It allows for\
    \ the effective organization of text, text annotations, and its metadata. All\
    \ these properties of JSON files make them a preferred option when it comes to\
    \ text preprocessing and analysis.\n\nLet’s create a sample JSON file and then\
    \ present a well-documented code for data extraction.\n\n### 2.5.1 Extracting\
    \ Data from JSON Files\n\nFirst, let’s create JSON for use later for extracting\
    \ text out of it (see Listing [2-5](#649581_1_En_2_Chapter.xhtml#PC17)). You should\
    \ have some basic knowledge of JSON files to extract the best out of this section.\n\
    \n*   Now let's extract its content.\n\n    ```\n    import json # Import json.\n\
    \    # Read the JSON file.\n    with open('sample_jason.json', 'r') as file: \
    \ # Open the JASON file in read mode.\n        data = json.load(file)  # Load\
    \ the JSON file into the 'data' variable.\n    # Extract various elements.\n \
    \   title = data[\"title\"]  # Extract \"title\".\n    description = data[\"description\"\
    ]  # Extract \"description\".\n    sections = data[\"sections\"]  # Extract \"\
    sections\".\n    footer = data[\"footer\"]  # Extract \"footer\".\n    # Print\
    \ the extracted text data.\n    print(\"Title:\", title)  # Print the title.\n\
    \    print(\"Description:\", description)  # Print the description.\n    for section\
    \ in sections:  # Loop through the sections list.\n        print(f\"Section Heading:\
    \ {section['heading']}\")  # Print the section heading.\n        print(f\"Section\
    \ Content: {section['content']}\")  # Print the section content.\n    print(\"\
    Footer:\", footer)  # Print the footer text.\n    OUTPUT:\n    Title: Sample JSON\
    \ File\n    Description: This is a sample JSON file containing various elements.\n\
    \    Section Heading: Introduction to the World of JASON\n    Section Content:\
    \ This is your introduction to the content of a sample JSON file.\n    Section\
    \ Heading: Details of JASON\n    Section Content: Put your details about the JSON\
    \ file content here.\n    Section Heading: Conclusion\n    Section Content: Put\
    \ your concluding remarks here.\n    Footer: Put your footer text here.\n    ```\n\
    \n```\nimport json # import the required Python library to create the JASON file.\n\
    # Let's create a sample dictionary with some data.\ndata = {\n    \"title\": \"\
    Sample JSON File\",\n    \"description\": \"This is a sample JSON file containing\
    \ various elements.\",\n    \"sections\": [\n        {\n            \"heading\"\
    : \"Introduction to the World of JASON\",\n            \"content\": \"This is\
    \ your introduction to the content of a sample JSON file.\"\n        },\n    \
    \    {\n            \"heading\": \"Details of JASON\",\n            \"content\"\
    : \"Put your details about the JSON file content here.\"\n        },\n       \
    \ {\n            \"heading\": \"Conclusion\",\n            \"content\": \"Put\
    \ your concluding remarks here.\"\n        }\n    ],\n    \"footer\": \"Put your\
    \ footer text here.\"\n}\n# Save the sample JSON file,\nwith open('sample_jason.json',\
    \ 'w') as file:\n    json.dump(data, file, indent=4)\nListing 2-5\nExtracting\
    \ Data from JSON Files\n```\n\n## 2.6 Extracting Data from PDFs\n\nPDF files are\
    \ used for distributing and archiving documents quite often. They contain rich\
