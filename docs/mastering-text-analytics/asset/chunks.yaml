    \ or add content to a blog.\nContinued...\n```\n\n**代码清单 2-7** NLP 任务中的网络爬取\n\n\
    ## 2.8 关键概念回顾\n\nNLP 是一个极具影响力的工具，用于分析和理解海量文本数据，这些数据在所有业务领域都极为丰富。使用现代 NLP 技术进行文本分析，可以揭示模式、趋势和见解，从而在商业、法律和社交媒体等各个领域做出数据驱动的决策。\n\
    \n在任何 NLP 项目中，找到质量和数量都合适的数据是最具挑战性的任务之一。本章讨论了各种文本数据源（语料库），并演示了如何从中提取有意义的数据。本章只是任何\
    \ NLP 专业人士的起点。还有更详细、更高级的技术可用于为 NLP 项目获取高质量数据。如果您需要更多关于此主题的信息，互联网和标准的 NLP 教科书是最好的来源。网络爬取是最重要的过程之一，因为许多大规模\
    \ AI（即 GenAI）项目将其作为训练其庞大 NLP 模型的主要数据来源。\n\n本章还讨论了获取高质量数据的其他技术，以及从 Word 文件、HTML\
    \ 文档、JSON 文件和 PDF 中提取文本数据的技术。我们注意到，每种格式都需要不同的方法来将数据转换为可用格式。掌握这些技术对每位 NLP 工程师来说都很重要，因为这是他们可能参与的任何\
    \ NLP 项目的起点。\n\n## 2.9 实践练习\n\n1.  访问 NLTK 附带的 Gutenberg 文本语料库。列出其中包含的所有书名。选择其中任意两本书，练习文本提取和摘要生成。\n\
    2.  创建一个包含几段文本数据的演示 Microsoft Word 文档。使用合适的 Python 库提取文本并打印其中包含的数据。\n3.  针对一个\
    \ HTML 文件，重复问题 2 中给出的所有步骤。\n4.  练习从一个实时的 JSON 文件和一个真实的网页 URL 中提取数据。\n\n# 3. 涉及字符串和\
    \ Python 正则表达式的 NLP 数据预处理任务\n"
- fmt: '# 3.1 Why You Should Read This Chapter


    First, let’s address our top-level objective. To keep it simple, we are looking
    at a new, hands-on skill in text analytics/natural language processing (NLP).
    This skill is currently in high demand in the global job market, as it’s useful
    to all companies, regardless of their business domain. If we learn only the theoretical
    aspects or conduct a conceptual study, it does not provide us with the desired
    hands-on skills in NLP.


    We need tools and techniques to analyze the large volumes of text data abundantly
    available in most establishments. We use NLP-specific and other Python libraries
    as a tool to get much-wanted actionable insights from volumes of unstructured
    text data. These Python libraries extensively use relevant statistical models
    for the analysis and evaluation of results. To gain hands-on skills, we must familiarize
    ourselves with these Python libraries and math algorithms. It all boils down to
    coding with Python, which you cannot master unless you get your hands dirty with
    it. So, get ready for some interesting action ahead in this chapter.


    # 3.2 Python for Language Processing


    Over the past few years, Python has emerged as a critical language for NLP due
    to its ease of use, wide range of NLP-specific libraries, and large global user
    community. Its syntax is simple to learn and use. All of this, combined with the
    easy readability of Python code, makes it a brilliant choice for both novices
    and experienced programmers. Python can efficiently handle large volumes of text
    data. A large number of instances are available where Python is used for NLP tasks
    such as text classification, sentiment analysis, language translation, and more.
    Python offers enough flexibility for integration with a variety of other machine
    learning models to further increase its utility in NLP tasks.


    The NLP community uses several Python libraries that have become the backbone
    of NLP tasks due to their robust features and ease of use. `NLTK` (Natural Language
    Toolkit) is one such Python library that we use often. It provides easy-to-use
    tools for various NLP tasks such as tokenization, stemming, and tagging. `spaCy`
    is another Python library for NLP applications that is known for its speed and
    efficiency. `spaCy` finds its place in industrial-grade NLP applications. It supports
    deep learning workflows. `TextBlob` is another library used by beginners because
    it offers a simple API for common NLP tasks.


    Other Python libraries, such as `Genism`, specialize in topic modeling and document
    similarity. `Hugging Face` is known for its state-of-the-art models, such as transformer
    models, which are extensively used in advanced NLP projects, including GenAI.
    Many of the terminology used in this paragraph may be new to you. We will cover
    everything either in this chapter or at appropriate places in the following chapters.


    ## 3.2.1 A Text Analytics Project Life Cycle (Generic NLP Pipeline)


    In a typical machine learning (ML) project, there are steps such as data collection,
    preprocessing, feature extraction, model training, evaluation, and deployment.
    These steps, when done in series, one after the other, are often called an ML
    pipeline. In ML projects, data is frequently structured and consists of a combination
    of numerical and non-numeric (categorical) data. Such data typically requires
    preprocessing steps like normalization, scaling, and transformation. Once the
    data is ready, the ML model can be trained on this processed data. The model results
    are then evaluated using metrics like accuracy or F1 score. The final step is
    the deployment of the model into production for real-world predictions. An ML
    pipeline requires continuous monitoring and maintenance. Many steps in the pipeline
    are part of a cyclic process. Figure [3-1](#649581_1_En_3_Chapter.xhtml#Fig1)
    depicts a general ML pipeline.


    ![Flow chart titled "Machine Learning Project Pipeline" illustrating the sequential
    steps in a machine learning project. The process begins with "Problem Definition"
    and progresses through "Data Collection," "Data Cleaning," "Exploratory Data Analysis,"
    "Feature Engineering," "Model Training," and "Hyperparameter Tuning," ending with
    "Deployment & Monitoring." Each step is represented by a colored diamond shape
    with arrows indicating the flow from one stage to the next.](images/649581_1_En_3_Chapter/649581_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** A generic ML project pipeline (steps)


    An NLP project pipeline, on the other hand, deals with textual data. An NLP pipeline
    also involves data preprocessing steps, such as tokenization, stemming, lemmatization,
    and stop word removal. We will study each of these steps later at appropriate
    places. After these unique data preprocessing steps, text is converted into numerical
    representations, which is similar to ML pipelines. However, the techniques used
    in NLP pipelines are different. They are typically term frequency–inverse document
    frequency, word embeddings, or transformer models. You will learn about all of
    it later in this book. The processed textual data (converted to numeric representations)
    is then consumed by appropriate machine learning or deep learning models for training.
    A well-trained model can then accurately perform various NLP tasks, such as text
    classification, sentiment analysis, or named entity recognition.


    By now, you might have noticed that many steps are similar in the training and
    deployment of ML and NLP models. The NLP pipeline typically includes several steps
    for processing text data. Operations and maintenance of trained models (in production)
    in both processes are similar and involve many processes done cyclically and repeatedly.
    We recommend that you refer to standard ML operations (MLOps) books for more details
    on the maintenance and operation of models in production use. Figure [3-2](#649581_1_En_3_Chapter.xhtml#Fig2)
    depicts a generic NLP pipeline. You can compare Figures [3-2](#649581_1_En_3_Chapter.xhtml#Fig2)
    and [3-1](#649581_1_En_3_Chapter.xhtml#Fig1) to note similarities and differences
    in pipelines in both cases.


    ![Flow chart illustrating the NLP Pipeline Process. It begins with "Raw Text Data"
    on the left, followed by sequential stages: "Problem Definition," "Data Collection,"
    "Text Cleaning," "EDA" (Exploratory Data Analysis), "Feature Engineering," and
    "Model Training." Each stage is represented by a colored diamond shape with arrows
    indicating the flow of data. The process culminates in an "Improved NLP Model"
    on the right.](images/649581_1_En_3_Chapter/649581_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** A generic NLP project pipeline (steps)


    Many terms, especially in NLP pipelines, may sound unfamiliar to you at this moment.
    However, this chapter and the subsequent chapters focus on explaining these terms
    and providing hands-on skills to create and handle such pipelines.


    Next, let’s start with a basic piece of string handling and then proceed to relatively
    advanced topics of this chapter.


    ## 3.2.2 String Handling in Python


    A `String` is a type of data structure in Python language. It characterizes a
    sequence of characters. A string is an immutable data type in Python. Once a string
    is created, it cannot be modified. Python strings are used extensively in most
    text applications. A string is used in storing and manipulating text data, which
    can be in the form of person names, local addresses, city names, and other data
    that can be denoted as text. Learning to handle string operations efficiently
    is basic to any NLP task. The following example uses Python code to demonstrate
    basic string manipulation operations. The W3Schools website provides excellent
    resources to learn and practice string operations using Python.'
