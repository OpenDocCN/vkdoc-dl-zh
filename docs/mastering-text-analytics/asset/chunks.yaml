    ## Skip-gram 模型


    Skip-gram 模型也是一种无监督方法。与 CBOW 类似，它们同样基于仅有一到两个隐藏层的浅层神经网络。但 skip-gram 与 CBOW 正好相反。Skip-gram
    模型根据给定的目标单词来预测上下文单词（周围单词）。如果在示例句子“he is a great scholar”中选择`window_size=2`，我们会得到以下可能的配对。


    *   (he, is) (is, he)

    *   (is, a) (a, is)

    *   (a, great) (great, a)

    *   (great, scholar) (scholar, great)


    每个配对都有一个中心词作为输入，一个上下文词作为输出。对于第一个配对(he, is)，中心词是“he”，上下文词是“is”。当我们确定哪个是目标词时，剩下的那个自动成为周围词。类似地，在(great,
    scholar)中，如果我们确定“great”为中心词或目标词，那么“scholar”自动成为上下文词或输出词。这适用于 2-gram 模型。在 3-gram
    模型中，会形成三个连续单词的序列。


    如果我们选择`window_size = 3`，有效的 3-gram 组如下所示。


    *   (he, is, a), (he, a, is)

    *   (is, a, great), (is, great, a)

    *   (a, great, scholar), (a, scholar, great)


    每组由一个中心词及其前后的上下文词组成。例如，在组(a, great, scholar)中，中心词是“great”，上下文词是“a”和“scholar”。


    接下来，让我们创建并运行一个基于神经网络的示例 skip-gram 模型进行演示（列表 7-4），遵循以下主要步骤。


    1.  导入库。

    2.  定义语料库。

    3.  初始化分词器。

    4.  生成词汇表。

    5.  转换为序列。

    6.  创建 skip-gram 配对。

    7.  准备输入/输出数据。

    8.  构建模型。

    9.  编译模型。

    10. 训练模型。

    11. 提取嵌入向量。

