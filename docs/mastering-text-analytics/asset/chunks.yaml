    Multi-query retrievers advance search accuracy by creating multiple query variations
    of the input, while context compression summarizes input to handle long contexts
    efficiently. The following are brief descriptions.


    - **Multi-query retriever** helps improve search precision by creating diverse
    versions of a query. For instance, if the user input query is “Best books,” Multi-Query
    Retriever also produces associated versions like “Top books to read” or “Popular
    books.” This process aids in getting more complete search results. It’s like requesting
    the same question in multiple ways to get the best answer from LLMs.

    - **Context compression** condenses long input texts so that the focus remains
    on the most important parts. For example, for a ten-page input document, the context
    compression component can compress it into a few key paragraphs. This comes in
    handy, especially when a full document can’t be because of size limitations. It’s
    analogous to writing a summary of a lengthy story to save time.


