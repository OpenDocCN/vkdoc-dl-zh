- fmt: '# 3.3 Real-life (NLP) Applications of RegEx


    `RegEx` is handy when it comes to pattern matching and string manipulation in
    text analytics (or NLP) tasks. Python `RegEx` offers a quick method for matching,
    searching, and manipulating text based on predefined patterns. The following are
    selected real-life applications of Python `RegEx`. These code snippets can be
    used in data preprocessing and data cleaning steps to prepare data for the training
    of NLP models.


    ## 3.3.1 Validate Formatting of Phone Numbers


    You can validate a list of phone numbers using `RegEx` to confirm they are in
    a precise format. For example, `''234-567-9873''`. Listing [3-5](#649581_1_En_3_Chapter.xhtml#PC5)
    is the Python code for this application.


    ```

    import re

    # Let''s create a sample list of phone numbers.

    # The valid phone number format is "123-456-789". Rest are invalid.

