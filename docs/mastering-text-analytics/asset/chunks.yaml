    LLM 时连接不同的步骤。`LLM Chains` 通过将庞大复杂的任务分解为更易于维护的较小部分来帮助开发者；这使得 AI 在面向客户的聊天机器人、搜索引擎和工作自动化工具等商业应用中更加准确和实用。`LangChain`
