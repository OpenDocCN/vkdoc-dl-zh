    ### 4.2.7 使用 NLTK 进行反义词和同义词检测


    NLTK 通过 WordNet 为这些操作提供了工具，WordNet 是一个词汇数据库，用于将单词组织成同义词集（同义词组）。我们也利用 WordNet 来查找反义词。代码清单
    4-7 演示了如何轻松实现 NLTK 函数来检测同义词和反义词。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    import nltk

    from nltk.corpus import wordnet

    # 确保已下载 WordNet 数据

    nltk.download(''wordnet'')

    def get_synonyms_and_antonyms(word):

    synonyms = set()

    antonyms = set()

    # 获取给定单词的同义词集

    for syn in wordnet.synsets(word):

    # 添加同义词

    for lemma in syn.lemmas():

    synonyms.add(lemma.name())

    # 添加反义词

    if lemma.antonyms():

    antonyms.add(lemma.antonyms()[0].name())

    return synonyms, antonyms

