    \ for NLP Projects\n\n## 2.1 Why You Should Learn NLP\n\nThere has been an explosion\
    \ in the availability of data in every domain these days. The average amount of\
    \ daily data generated globally is in the hundreds of exabytes. It is an enormous\
    \ amount of data by any standard, with a substantial contribution coming from\
    \ the United States. This data is useful to government and businesses only when\
    \ it is analyzed properly and ultimately results in actionable items. In this\
    \ data-driven world, natural language processing, or NLP, is a recommended tool\
    \ that supports businesses across various domains in analyzing text-based, structured,\
    \ and unstructured data.\n\nThe primary sources of text data available to businesses\
    \ typically include interactions through social media, customer feedback, and\
    \ numerous other similar sources. The proper analysis of data supports a better\
    \ understanding of customers by analyzing market trends and finally making informed\
    \ decisions. By implementing NLP-based text analytical techniques, companies can\
    \ benefit from improved operational efficiency and significantly support their\
    \ strategic decision-making processes.\n\nThe effective implementation of NLP\
    \ in businesses can reduce manual work for employees and management and improve\
    \ overall efficiency. The handling of a large volume of text data is completely\
    \ automatic. The outcome of successful NLP implementation is the early detection\
    \ of potential issues followed by the generation of the most appropriate action\
    \ items required for dynamically changing markets. This reduces the overall reaction\
    \ time, saving a significant amount of valuable time for management, which can\
    \ be allocated to other critical business activities.\n\nSo, businesses can benefit\
    \ from the predictive capabilities of NLP to forecast customer needs and related\
    \ market shifts. The companies gain a competitive edge through the automatic generation\
    \ of these valuable foresights and the resultant proactive strategy adjustments.\
    \ So, it can be appreciated that NLP is a crucial tool that can generate actionable\
    \ business insights that can help to run efficient operations and improve the\
    \ company’s bottom line in today’s rapidly evolving marketplace.\n\nProvide a\
    \ case study or business example of how some well-known corporation achieved insights\
    \ by collecting and processing NLP data.\n\n## 2.2 Where to Find the Data (Text\
    \ Corpora) for NLP Projects\n\nReal-time business projects in NLP typically utilize\
    \ vast amounts of linguistic data. Such data is called *text corpora* in the NLP\
    \ community. There is another related term: *lexical resources*. Let’s discuss\
    \ what it is and how it is related to the term text corpora.\n\nText corpora are\
    \ large collections of written texts. Many corpora are designed to comprise a\
    \ thoughtful mix of content across different categories. Such special corpora\
    \ are used to study how different specialized societies use language. Lexical\
    \ resources, on the other hand, resemble dictionaries that are helpful in understanding\
    \ the meanings of words found in different text corpora. Combined, text corpora\
    \ and lexical resources provide a comprehensive means to analyze and learn any\
    \ language.\n\nText corpora contain real-world examples of how humans use language\
    \ in different contexts. Lexical resources offer definitions and explanations\
    \ of words contained in text corpora. Together, the two learners can see words\
    \ in real usage and, at the same time, understand the meanings of words, their\
    \ usage in actual sentences, and the relationships between them. It makes the\
    \ learning of language and its analysis more effective. Figure [2-1](#649581_1_En_2_Chapter.xhtml#Fig1)\
    \ illustrates some data processing techniques that were used for a sentiment analysis\
    \ tutorial. We define, discuss, and use each of these data processing techniques\
    \ in the upcoming chapters. Stay tuned!\n\n![Flow chart illustrating data pre-processing\
    \ for sentiment analysis. Central box labeled \"Data Pre-processing Techniques\"\
    \ connects to two main processes: \"Data Cleaning\" and \"Linguistic Processing.\"\
    \ Under \"Data Cleaning,\" steps include identifying noise, noise removal, character\
    \ normalization, and data masking. \"Linguistic Processing\" involves tokenization,\
    \ POS tagging, lemmatization, and name entity recognition. The process starts\
    \ with \"Source Text\" labeled as raw data input and ends with \"Prepared Text\"\
    \ as the final processed output.](images/649581_1_En_2_Chapter/649581_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1\n\nSome common text preprocessing techniques in order\n\nIn Figure\
    \ [2-1](#649581_1_En_2_Chapter.xhtml#Fig1), the source text is project-specific\
    \ text corpora that can be used along with the required lexical resources if a\
    \ project needs it. Next, let’s discuss concepts and insert their real-time usage\
    \ using Python code.\n\nOur main objective in this chapter is to explain the sources\
    \ of text data that you can use for NLP projects. Let’s start with some familiar\
    \ examples. If you are familiar with the `Seaborn` library in Python, probably\
    \ you might have come across one or many of the following datasets (not necessarily\
    \ text) available in the `Seaborn` library.\n\n- `Tips`\n- `Iris`\n- `Penguins`\n\
    - `Flights`\n- `Diamonds`\n- `Titanic`\n- `Exercise`\n- `MPG`\n- `Planets`\n\n\
    These are the datasets built into `Seaborn`. They are easy to load and use. Let’s\
    \ consider the Python code in Listing [2-1](#649581_1_En_2_Chapter.xhtml#PC1);\
    \ as you may appreciate, it is not a 100% text dataset. But it was just an example\
