    #### TextBlob Lemmatizer


    TextBlob performs faster when compared to NLTK. It can be easily deployed with
    fewer computing resources. TextBlob is simpler to use, and it supports many functions
    that are not available in NLTK. Listing [5-3](#649581_1_En_5_Chapter.xhtml#PC11)
    is its code demo.


    ```

    # First install TextBlob.

    !pip install textblob

    from textblob import TextBlob, Word

    # Create sample text.

    text = """ TextBlob performs faster when compared to nltk. It can be easily deployed
    with lesser computing resources.

    TextBlob is simpler to use and it supports many functions that are not available
    in nltk.

    """

    # Create a TextBlob object.

    blob = TextBlob(text)

    # Tokenize the sample text.

    words = blob.words

    # Lemmatize.

    lemmatized_words = [Word(word).lemmatize() for word in words]

    # Print the output.

    print("Original sample words:", words)

    print("Lemmatized words:", lemmatized_words)

