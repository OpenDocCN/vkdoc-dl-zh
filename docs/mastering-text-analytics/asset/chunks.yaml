    ### 4.2.4 词形还原


    `Lemmatization`（词形还原）是一种 NLP 数据预处理技术，可将输入单词还原为其基本形式或词根形式。词形还原的基本形式称为词元（lemma）。`Lemmatization`在某种程度上与词干提取类似。`Lemmatization`在文本规范化等
    NLP 数据预处理任务中至关重要，因为在这些任务中，保留原始输入单词的语义含义至关重要（见图 4-2）。


    ![流程图展示了使用 NLTK 进行词形还原的过程。它包含五个阶段：输入文本、分词、词性标注、词形还原和输出文本。每个阶段都由一个图标和简要描述表示。输入文本准备进行处理。分词将文本分割成单词或标记。词性标注分配语法角色。词形还原将标记转换为基本形式。输出文本编译并显示处理后的文本。](img/649581_1_En_4_Fig2_HTML.jpg)


    **图 4-2** 使用 NLTK 进行词形还原


    词干提取只是简单地截断输入单词以去除后缀，而词形还原还会考虑单词的上下文和形态分析。让我们通过一个例子来更好地理解它。输入单词`"running"`、`"ran"`和`"runs"`都可以还原为其词元`"run"`。请考虑以下成对的文本要点集。


    *   原文：`running`，词干提取后：`run`

    *   原文：`ran`，词干提取后：`ran`

    *   原文：`runs`，词干提取后：`run`


    以及


    *   原文：`running`，词形还原后：`run`

    *   原文：`ran`，词形还原后：`run`

    *   原文：`runs`，词形还原后：`run`


    我们用不同的例子重复一下。


    *   原文：`easily`，词干提取后：`easili`

    *   原文：`fairly`，词干提取后：`fairli`

    *   原文：`happiness`，词干提取后：`happi`


    以及


    *   原文：`easily`，词形还原后：`easily`

    *   原文：`fairly`，词形还原后：`fairly`

    *   原文：`happiness`，词形还原后：`happiness`


    通过这个例子，你现在对`"stemming"`（词干提取）和`"lemmatization"`（词形还原）之间的区别有了清晰的认识。


    现在，我们直接进入关于词形还原工作原理的代码演示。以下代码使用了词性（POS），即任何单词在句子中所扮演的角色。单词（在给定句子中）的角色可以是名词、动词、形容词或副词。


    在词形还原过程中考虑词性至关重要，因为单词根据其在句子中的角色/词性可能具有不同的基本形式。举个例子；`"running"`作为动词时，变成`"run"`，但作为名词时，它保持为`"running"`。在另一个例子中，如果我们把`"better"`用作形容词，它保持为`"better"`，但当用作动词时，它变成`"improve"`。使用词性，词形还原器可以选择正确的基本形式。它保留了原始输入单词的含义。代码清单
    4-4 是该操作的代码演示。你可以直接在 NLP 数据预处理任务中使用此代码。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    import nltk # 导入必要的库。

    from nltk.stem import WordNetLemmatizer

    from nltk.corpus import wordnet

    # 导入其他所需资源。

    nltk.download(''wordnet'')

    nltk.download(''omw-1.4'')

    nltk.download(''averaged_perceptron_tagger'')

    # 初始化 WordNet 词形还原器。

    lemmatizer = WordNetLemmatizer()

    # 让我们编写一个函数来获取词性，以实现准确的词形还原

    def get_wordnet_pos(word):

    tag = nltk.pos_tag([word])[0][1][0].upper()

    tag_dict = {"J": wordnet.ADJ,

    "N": wordnet.NOUN,

    "V": wordnet.VERB,

    "R": wordnet.ADV}

    return tag_dict.get(tag, wordnet.NOUN)

    # 此代码的输出与此处无关，故未包含。

    # 示例输入单词。

    words = ["easily", "fairly", "happiness"]

    # 考虑词性（POS）进行词形还原。

    lemmatized_words = [lemmatizer.lemmatize(word, get_wordnet_pos(word)) for word
    in words]

    # 打印输出。

    for word, lemma in zip(words, lemmatized_words):

    print(f"原文: {word}, 词形还原后: {lemma}")

    输出:

    原文: easily, 词形还原后: easily

    原文: fairly, 词形还原后: fairly

    原文: happiness, 词形还原后: happiness

    ```


    **代码清单 4-4** 使用 NLTK 进行词形还原


    ### 4.2.5 句子分割


    `Sentence segmentation`（句子分割）涉及将输入文本语料库分解为其组成的句子。此过程是一项 NLP 数据预处理任务。它在需要理解文本结构的情况下非常有用。经过句子分割过程后，输入文本可以以单个句子的形式进行处理。此操作有助于在句子级别对文本语料库进行有效分析（理解含义和上下文）。


    在句子分割中，句子边界由标点符号（如句号、感叹号和问号）确定。然而，特殊情况（如缩写、小数点和带有标点符号的名称）并不表示句子的结束。


    Python NLTK 库可以使用其`sent_tokenize`函数处理句子分割。`sent_tokenize`函数使用预训练的 NLP 模型将文本分割成句子。它可以处理复杂的句子结构和边缘情况。代码清单
    4-5 是句子分割的代码演示。你可以直接在 NLP 数据预处理任务中使用此代码。


    ```

    # 如果尚未安装 nltk，请先安装。

    !pip install nltk # 此处未包含代码输出。

    import nltk

    from nltk.tokenize import sent_tokenize

    nltk.download(''punkt'')

    def sentences_segmenter(text):

    """

    将给定的输入文本语料库分割成句子。

    参数:

    text (str): 要分割的输入文本语料库。

    返回:

    list: 从输入文本中提取的句子列表。

    """

    return sent_tokenize(text)

    # 此代码的输出与此处无关，故未包含。

    # 示例文本

    text = """

    句子分割涉及将输入文本语料库分解为其组成的句子。

    这个过程是 NLP 数据预处理任务。它在需要理解文本结构的情况下非常有用。

    经过句子分割过程后，输入文本可以以单个句子的形式进行处理。

    此操作有助于在句子级别对文本语料库进行有效分析（理解含义和上下文）。

    """

    # 分割文本语料库。

    sentences = sentences_segmenter(text)

    # 打印输出。

    for i, sentence in enumerate(sentences, 1):

    print(f"句子 {i}: {sentence}")

    输出:

    句子 1: 句子分割涉及将输入文本语料库分解为其组成的句子。

    句子 2: 这个过程是 NLP 数据预处理任务。

    句子 3: 它在需要理解文本结构的情况下非常有用。

    句子 4: 经过句子分割过程后，输入文本可以以单个句子的形式进行处理。

    句子 5: 此操作有助于在句子级别对文本语料库进行有效分析（理解含义和上下文）。

    ```


    **代码清单 4-5** 使用 NLTK 进行句子分割

