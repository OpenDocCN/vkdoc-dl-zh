    ## 7.5 章节回顾


    本章探讨了语用分析的本质。我们主要关注了语篇整合、分布语义学和词嵌入。我们从概念、实现和实际应用的角度深入讨论了这些广泛的主题。这些见解可以帮助你应用这些实践，并助力你未来的自然语言处理工作。


    当前自然语言处理的重点领域包括理解多模态性、特定平台的沟通风格、身份与社群构建，以及数字互动中的礼貌动态。多模态性关注文本、图像、视频和表情符号如何协同作用，在网络上传达意义。像
    X 和 Instagram 这样的流行网络平台已经发展出自己独特的沟通风格、语言使用方式和思想分享模式。一些顶尖研究人员正专注于研究每个平台如何影响用户的沟通风格。当前的自然语言处理研究领域也关注自然语言的礼貌和伦理方面。所有这些研究都聚焦于群体之间的在线和社交媒体交流。当前趋势表明，未来的自然语言处理研究者可能会更多地关注诸如人工智能在沟通中的应用、跨文化互动、互动伦理、技术进步和数字素养等领域。


    # 8. Transformer、生成式人工智能与 LangChain


    ## 8.1 Transformer 在自然语言处理中的介绍


    Transformer 架构由 Vaswani 等人在 2017 年发表的开创性论文《*注意力就是一切*》中首次提出。


    这篇论文彻底革新了神经网络架构和自然语言处理领域。这篇关于 Transformer 架构的介绍性文章探讨了 Transformer 的基本架构和工作原理。Transformer
    使用自注意力机制将整个句子转换为另一个句子。Transformer 模型从根本上不同于传统的深度学习模型，如 RNN 和 LSTM，后者是逐词处理文本句子的。以简单的英文句子“I
    left my book on the left side of the table.”为例。单词 `left` 在同一句子中具有完全不同的含义。由于 RNN
    和 LSTM 是逐词处理句子，它们可能无法捕捉到单词 `left` 的上下文特定含义。Transformer 使用自注意力处理整个句子，这使得它们能够更快地理解任何输入文本，并更准确地把握单词的上下文特定含义。这样，Transformer
    模型就能高效地处理任何给定输入文本中相对较长的句子和复杂关系。顺便提一下，自注意力帮助模型找出（对含义）重要的单词，无论它们在输入句子中相隔多远。自注意力机制帮助模型更好地处理涉及语言翻译和文本生成的自然语言处理任务。


    让我们简要讨论一下 Transformer 模型（其架构本身较为复杂）的基础知识。它主要由编码器、解码器、自注意力机制和前馈神经网络层组成。如果你需要完整的细节，我们建议你参考向世界介绍
    Transformer 模型的[原始论文](https://arxiv.org/abs/1706.03762)（见图 8-1）。


    ![Transformer 模型架构图，显示两个主要部分：左侧的编码器和右侧的解码器。两个部分都包含“加与归一化”、“多头注意力”和“前馈”处理层。编码器处理带有位置编码的输入嵌入，而解码器处理带有掩码多头注意力的输出嵌入。最终输出概率通过线性层和
    softmax 函数生成。该图突出了数据流和层的重复应用，用“Nx”表示。](img/649581_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Transformer 模型架构（[来源](https://www.researchgate.net/figure/The-transformer-model-architecture_fig3_362829106)）


    在讨论 Transformer 模型的四个层之前，让我们先关注一下与此相关的基本术语。


    - **自注意力**：它帮助模型全局审视任何输入句子中的所有单词，以理解句子中的单词在恰当的上下文中如何相互关联。它帮助 Transformer 模型关注重要的单词，无论它们在输入句子中的位置如何。


    - **交叉注意力**：它帮助 Transformer 模型将输入句子与模型正在生成的输出句子连接起来。交叉注意力确保输出句子是基于输入句子的正确部分生成的。


    以下是 Transformer 模型基本元素的简要描述。


    - **嵌入**：它将给定的输入单词转换为可以被 Transformer 模型解释（理解）的数值向量（也称为嵌入）。


    - **编码器**：输入以句子的形式送入编码器。编码器通过多个层对其进行处理。这些层中的每一层都使用自注意力机制来关注任何给定输入句子中的重要单词。然后，同一个自注意力机制将输入句子送入前馈网络。整个过程将数据转换为有意义的表示。


    - **解码器**：最终的输出句子由解码器生成。它接收来自编码器处理后的数据作为输入。解码器也使用自注意力机制来理解已生成的单词。它使用交叉注意力来与编码器的输入对齐。


    - **自注意力机制**：（这个概念在介绍模型层之前已经讨论过。）


    - **前馈神经网络**：它是一个基本的人工神经网络，与每个编码器和解码器层协同工作，以转换输入数据。这有助于在处理数据时识别其中的复杂模式。


    总结 Transformer 模型的工作原理，所有这些元素协同工作，将任何给定的输入句子转换为输出句子。嵌入层的工作是将输入单词转换为数值向量格式。然后是编码器，它使用自注意力来提取重要的单词、它们之间的关系以及上下文。前馈网络在此过程中帮助编码，最终从输入句子中提取有意义的模式。接下来是解码器，它接收编码器处理后的数据作为输入，逐步优化输出句子。交叉注意力和自注意力等元素在此过程中辅助解码器。最后是输出层，它将处理后的数据转换为最终的单词，并以输出句子的形式呈现。

