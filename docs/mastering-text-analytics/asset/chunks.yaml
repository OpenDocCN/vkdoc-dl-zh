    print(f"Similarity between Sentence {i + 1} and Sentence {j + 1}: {cosine_sim_matrix[i,
    j]:.2f}")

    Cosine Similarity Matrix:

    Similarity between Sentence 1 and Sentence 1: 1.00

    Similarity between Sentence 1 and Sentence 2: 0.32

    Similarity between Sentence 1 and Sentence 3: 0.19

    Similarity between Sentence 2 and Sentence 1: 0.32

    Similarity between Sentence 2 and Sentence 2: 1.00

    Similarity between Sentence 2 and Sentence 3: 0.10

    Similarity between Sentence 3 and Sentence 1: 0.19

    Similarity between Sentence 3 and Sentence 2: 0.10

    Similarity between Sentence 3 and Sentence 3: 1.00

    ```


    Interpretation of the output consists of the following.


    *   **Interpreting the scores**: Higher scores specify more cohesive sentences
    with a shared vocabulary and similar content.


    *   **Low inter-sentence similarity**: The highest is 0.32\. It shows limited
    shared content or vocabulary.


    *   **Minimal overlap**: Low similarity scores of 0.10 and 0.19 indicate minimal
    thematic or lexical overlap between the sentences.


    A similarity score of 1.00 indicates perfect similarity with itself. Similarity
    scores of 0 indicate no shared vocabulary and similarity of content between sentences.


    #### Temporal Relation Identification (Code Demo)


    Temporal relation identification is the process of finding time-based relationships
    between events in an input text. For instance, take the sentence “I want to complete
    this chapter before lunch;” the word “before” indicates the time-based connection
    between two events. It describes finishing work earlier than lunch.


    Our code demo (Listing [7-1](#649581_1_En_7_Chapter.xhtml#PC8)) for temporal relation
    identification would first perform dependency parsing to extract events and detect
    temporal signals, which include words like “before,” “after,” “during,” “until,”
    and “while.” Following this, the classification of events is performed using rule-based
    methods or machine learning models. This approach aims to find the sequence and
    timing of actions in a given input text. We utilize spaCy to extract events.


    Our program follows these five steps.


    1.  Import libraries and load models.


    2.  Feature extraction from sentences.


    3.  Prepare training data.


    4.  Train random forest classifier.


    5.  Predict temporal relations in new sentences.


    ```

    # Required Libraries

    import spacy

    from sklearn.ensemble import RandomForestClassifier

    import numpy as np

    # Load the spaCy model for dependency parsing

    nlp = spacy.load("en_core_web_sm")

    # Sample sentences with temporal relations

    sentences = [

    "She finished her work before going to lunch.",

    "He went to the gym after work.",

    "They waited until the show started.",

    "The meeting was delayed during the storm."

    ]

    # Temporal signals

    temporal_signals = ["before", "after", "during", "until", "while"]

    # Feature extraction - identifying events and temporal signals

    def extract_features(sent):

    doc = nlp(sent)

    events = []

    temporal_relation = ""

    for token in doc:

    if token.dep_ == "ROOT":  # Event (verb) extraction

    events.append(token.lemma_)

    if token.text in temporal_signals:  # Temporal signal detection

    temporal_relation = token.text

    return events, temporal_relation

    # Prepare training data - sentences, events, and labels (1 for temporal relation
    present, 0 otherwise)

    X = []

    y = []

    for sentence in sentences:

    events, signal = extract_features(sentence)

    if signal:  # If temporal signal is present, we classify as 1

    X.append([len(events)])  # Simple feature: number of events

    y.append(1)

    else:

    X.append([0])

    y.append(0)

    # Convert to numpy arrays

    X = np.array(X)

    y = np.array(y)

    # Train a Random Forest Classifier

    clf = RandomForestClassifier(n_estimators=10, random_state=42)

    clf.fit(X, y)

    # Predict on new sentences

    new_sentences = ["John started his project before the deadline.",

    "She arrived after the party had begun."]

    for new_sent in new_sentences:

    events, signal = extract_features(new_sent)

    prediction = clf.predict([[len(events)]])

    print(f"Sentence: {new_sent}")

    print(f"Detected Temporal Signal: {signal}, Prediction: {''Temporal relation''
    if prediction == 1 else ''No temporal relation''}\n")

    Sentence: John started his project before the deadline.

    Detected Temporal Signal: before, Prediction: Temporal relation

    Sentence: She arrived after the party had begun.

    Detected Temporal Signal: after, Prediction: Temporal relation

    Listing 7-1

    Temporal Relation Identification

    ```


    function for better understanding.


    *   **extract_features(sent)** processes each sentence using spaCy. The function
    returns the list of events (verbs) and the temporal relation signal (if present).


    *   **doc = nlp(sent)** prepares the sentence and puts it into a structured format
    for analysis.


    *   **for token in doc** loops through each word in the sentence.


    *   **token.dep_ == “ROOT”** checks if the word is the main verb (the root action)
    and stores it.


    *   **if token.text in temporal_signals**: If a word is found in the list of temporal
    signals, it is stored as a temporal signal.


    Converting words into ML model format: Without vectorizing the entire sentence,
    the logic uses a simple logic for converting words into numbers. It counts the
    number of verbs (events) as features in X and puts a binary label (1 or 0) for
    y based on the presence of temporal signals. This keeps the dataset simple and
    in numerical format without using a vectorizer.


    The output confirms that the code is effectively detecting temporal signals present
    in the input sentences. The model also correctly predicts the existence of temporal
    relations based on these signals.'
  trans: "\n### 衔接性分析（代码演示）\n\n衔接性分析有两个目标。首先，它考察文本不同部分之间的契合程度。其次，它分析这些部分如何相互连接，使文本流畅且富有意义。下面的演示引入了一个新概念——余弦相似度，它用于衡量两个向量之间的相似度。文中给出了相似度分数的解释。我们将在本章后续部分深入探讨这一概念。\n\
    \n我们在代码演示中使用了基础的 TF-IDF 技术。专业人士用于获取衔接性洞察的更高级向量化技术包括词嵌入，例如 `Word2Vec` 和 `GloVe`，以捕捉文本相似度和衔接性方面更细微的见解。我们将在本章后续部分讨论这些技术。\n\
    \n```python\nfrom sklearn.feature_extraction.text import TfidfVectorizer\nfrom\
    \ sklearn.metrics.pairwise import cosine_similarity\n\n# 修订后的句子\nsentences = [\n\
    \    \"Mary is feeling overwhelmed with her busy office job but finds some relief\
    \ in her evening walks.\",\n    \"Mary feels overwhelmed with her hectic work\
