- fmt: "### Discourse Parsing (Code Demo)\n\nA direct discourse parsing library is\
    \ currently unavailable in Python. Professionals who write code often use advanced\
    \ NLP libraries like `spaCy` or `AllenNLP`, along with deep learning techniques.\
    \ We stick to `spaCy` for a simplified demo. The code is based on the following\
    \ steps.\n\n1.  Load the `spaCy` model.\n    *   Initialize `spaCy`’s English\
    \ language model.\n2.  Define sample text.\n    *   Set a string variable with\
    \ the sample text.\n3.  Process text.\n    *   Use `spaCy` to analyze the sample\
    \ text.\n    *   Split the text into sentences.\n4.  Define a function to extract\
    \ discourse information.\n    *   Do the following for each sentence in the processed\
    \ text.\n        1.  Print the sentence.\n        2.  Extract and print named\
    \ entities (if any).\n        3.  Extract and print syntactic dependencies for\
    \ each token.\n        4.  Infer basic discourse relations based on keywords.\n\
    \            *   If the sentence contains the word `\"because\"`, record that\
    \ this sentence provides a reason for the previous sentence.\n            *  \
    \ If the sentence contains the word `\"although\"`, record that this sentence\
    \ contrasts with the previous sentence.\n5.  Call a function to extract and display\
    \ discourse information.\n    *   Print inferred discourse relations.\n\n```\n\
    !python -m spacy download en_core_web_sm\nimport spacy\n# Load SpaCy's English\
    \ model.\nnlp = spacy.load('en_core_web_sm')\n# Sample text.\ntext = \"\"\"\n\
    Although she was very busy with office work, Mary felt she had had enough of it.\n\
    She and her spouse decided they needed to go on a holiday.\nThey travelled by\
    \ train to France because they had enough friends in the country.\n\"\"\"\n# Process\
    \ the text with SpaCy.\ndoc = nlp(text)\n# Function to extract and display discourse-like\
    \ information\ndef extract_discourse_info(doc):\nsentences = list(doc.sents)\n\
    relations = []\nfor i, sent in enumerate(sentences):\nprint(f\"Sentence {i+1}:\
    \ {sent.text}\")\n# Extract named entities.\nentities = [(ent.text, ent.label_)\
    \ for ent in sent.ents]\nif entities:\nprint(\"  Named Entities:\", entities)\n\
    # Extract syntactic dependencies\ndependencies = [(token.text, token.dep_, token.head.text)\
    \ for token in sent]\nprint(\"  Dependencies:\", dependencies)\n# Basic inference\
    \ of discourse relations.\nif i > 0:\nprevious_sent = sentences[i-1]\nif \"because\"\
    \ in sent.text.lower():\nrelations.append(f\"Sentence {i+1} provides a reason\
    \ for Sentence {i}\")\nelif \"although\" in sent.text.lower():\nrelations.append(f\"\
    Sentence {i+1} contrasts with Sentence {i}\")\nreturn relations\n# Extract and\
    \ print discourse information.\nrelations = extract_discourse_info(doc)\nprint(\"\
    \\nInferred Discourse Relations:\")\nfor relation in relations:\nprint(relation)\n\
    Sentence 1:\nDependencies: [('\\n', 'dep', '\\n')]\nSentence 2: Although she was\
    \ very busy with office work, Mary felt she had had enough of it.\nNamed Entities:\
    \ [('Mary', 'PERSON')]\nDependencies: [('Although', 'mark', 'was'), ('she', 'nsubj',\
    \ 'was'), ('was', 'advcl', 'felt'), ('very', 'advmod', 'busy'), ('busy', 'acomp',\
    \ 'was'), ('with', 'prep', 'busy'), ('office', 'compound', 'work'), ('work', 'pobj',\
    \ 'with'), (',', 'punct', 'felt'), ('Mary', 'nsubj', 'felt'), ('felt', 'ROOT',\
    \ 'felt'), ('she', 'nsubj', 'had'), ('had', 'aux', 'had'), ('had', 'ccomp', 'felt'),\
    \ ('enough', 'dobj', 'had'), ('of', 'prep', 'enough'), ('it', 'pobj', 'of'), ('.',\
    \ 'punct', 'felt'), ('\\n', 'dep', '.')]\nSentence 3: She and her spouse decided\
    \ they needed to go on a holiday.\nNamed Entities: [('a holiday', 'DATE')]\nDependencies:\
    \ [('She', 'nsubj', 'decided'), ('and', 'cc', 'She'), ('her', 'poss', 'spouse'),\
    \ ('spouse', 'conj', 'She'), ('decided', 'ROOT', 'decided'), ('they', 'nsubj',\
    \ 'needed'), ('needed', 'ccomp', 'decided'), ('to', 'aux', 'go'), ('go', 'xcomp',\
    \ 'needed'), ('on', 'prep', 'go'), ('a', 'det', 'holiday'), ('holiday', 'pobj',\
    \ 'on'), ('.', 'punct', 'decided'), ('\\n', 'dep', '.')]\nSentence 4: They travelled\
    \ by train to France because they had enough friends in the country.\nNamed Entities:\
    \ [('France', 'GPE')]\nDependencies: [('They', 'nsubj', 'travelled'), ('travelled',\
    \ 'ROOT', 'travelled'), ('by', 'prep', 'travelled'), ('train', 'pobj', 'by'),\
    \ ('to', 'prep', 'travelled'), ('France', 'pobj', 'to'), ('because', 'mark', 'had'),\
    \ ('they', 'nsubj', 'had'), ('had', 'advcl', 'travelled'), ('enough', 'amod',\
    \ 'friends'), ('friends', 'dobj', 'had'), ('in', 'prep', 'friends'), ('the', 'det',\
    \ 'country'), ('country', 'pobj', 'in'), ('.', 'punct', 'travelled'), ('\\n',\
    \ 'dep', '.')]\nInferred Discourse Relations:\nSentence 2 contrasts with Sentence\
    \ 1\nSentence 4 provides a reason for Sentence 3\n```\n\nDiscourse parsing deals\
    \ with how different parts of a text are related to one another. It can be through\
    \ logical and communicative connections. The main part of the output is the “discourse\
    \ information.”\n\nThe following input text is labeled by sentence numbers.\n\n\
    *   (sentence 1) Although she was very busy with office work.\n*   (sentence 2)\
    \ Mary felt she had had enough of it.\n*   (sentence 3) She and her spouse decided\
    \ they needed to go on a holiday.\n*   (sentence 4) They traveled by train to\
    \ France because they had enough friends in the country.\n\nThe following is the\
    \ summary of discourse relations.\n\n*   **Contrasting relation**: Sentence 2\
    \ seems to contrast with sentence 1. The word `\"Although\"` in sentence 1 talks\
    \ about a contrast with the decision pronounced in sentence 2.\n*   **Reason relation**:\
    \ Sentence 4 seems to give a reason for the decision made in sentence 3. The word\
    \ `\"because\"` specifies that sentence 4 explains why they traveled to France.\n\
    \n### Entity Tracking (Code Demo)\n\nEntity tracking deals with keeping track\
    \ of the entities (like people, places, or objects) mentioned throughout a text.\
    \ It’s like keeping track of characters throughout a novel. Here’s a simple code\
    \ demo using `spaCy` for named entity recognition (NER) and tracking those entities.\n\
    \n```\nimport spacy\n# Load the English NLP model\nnlp = spacy.load('en_core_web_sm')\n\
    # Sample text.\ntext = \"\"\"\nAlthough she was very busy with office work, Mary\
    \ felt she had had enough of it.\nShe and her spouse decided they needed to go\
    \ on a holiday.\nThey travelled by train to France because they had enough friends\
    \ in the country.\n\"\"\"\n# Process the text with spaCy\ndoc = nlp(text)\n# Dictionary\
    \ to track entities\nentity_tracking = {}\n# Iterate through the sentences in\
    \ the doc\nfor sent in doc.sents:\nprint(f\"Sentence: {sent}\")\n# Iterate through\
    \ named entities in the sentence\nfor ent in sent.ents:\nprint(f\"Entity: {ent.text},\
    \ Label: {ent.label_}\")\n# Track entities and update if seen again\nif ent.text\
    \ in entity_tracking:\nentity_tracking[ent.text] += 1\nelse:\nentity_tracking[ent.text]\
    \ = 1\n# Output tracked entities\nprint(\"\\nEntity Tracking:\")\nfor entity,\
    \ count in entity_tracking.items():\nprint(f\"{entity}: mentioned {count} times\"\
    )\nSentence:\nSentence: Although she was very busy with office work, Mary felt\
    \ she had had enough of it.\nEntity: Mary, Label: PERSON\nSentence: She and her\
    \ spouse decided they needed to go on a holiday.\nEntity: a holiday, Label: DATE\n\
    Sentence: They travelled by train to France because they had enough friends in\
    \ the country.\nEntity: France, Label: GPE\nEntity Tracking:\nMary: mentioned\
    \ 1 times\na holiday: mentioned 1 times\nFrance: mentioned 1 times\n```\n\nMore\
    \ professional code for entity tracking is written using packages like `spaCy`,\
    \ `AllenNLP`, or `Hugging Face Transformers`. Entity code functions first detect,\
    \ classify, and link entities across texts. These systems utilize NER and coreference\
    \ resolution to track entities, even when they are pronouns or synonyms. Professional\
    \ code is often part of larger NLP pipelines that integrate with databases or\
    \ knowledge graphs to establish entity relationships and maintain the required\
    \ accuracy across long input documents or conversations."
