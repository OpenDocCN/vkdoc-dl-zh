- fmt: '# Figure 1-1: Global Data Generation 2010–2025


    Figure [1-1](#649581_1_En_1_Chapter.xhtml#Fig1) highlights the amount of data
    every year since 2020. Needless to say, much of this data consists of both structured
    and unstructured speech data. Companies generate immense value by analyzing this
    data using various machine learning techniques. They are valuable business insights
    that can be used in data-driven business decision-making. Many machine learning
    techniques for analyzing data are bundled under the banner of `NLP`, which is
    used to automatically extract valuable insights from both structured and unstructured
    text data. Companies utilize text analysis techniques to swiftly digest online
    data and documents generated and collected from numerous sources and transform
    them into actionable insights. Global tech companies like Amazon, Google, and
    Microsoft have taken a considerable lead over others in this direction.


    *Machine learning is a developing branch of computer algorithms that can emulate
    human intellect by learning from the neighboring environment (both text and numeric
    data). [6]*


    ![Line chart titled "Global Data Generated Annually" showing an upward trend from
    2010 to 2025. The x-axis represents the year, ranging from 2010 to 2025, and the
    y-axis represents data generated in zettabytes, ranging from 0 to 200. The chart
    indicates a significant increase in data generation over time, with a steep rise
    after 2020.](images/649581_1_En_1_Chapter/649581_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1** Global data generation 2010 to 2025


    `NLP` is discussed in the following sections.


    ## 1.2.1 NLP Techniques


    More formally, `NLP` is extracting high-quality and actionable information from
    text data. A vast amount of text data is available on websites, emails, reviews
    like those on Amazon and X (formerly Twitter), books, and research papers. This
    data is extracted, cleaned, formatted, and undergoes other data processing steps.
    This data processing is a laborious process, and it can account for up to 80%
    of the total time spent on the entire `NLP` project. Then, finally, statistical
    algorithms are used to derive patterns within the text data. Both machine learning
    and deep learning algorithms are utilized depending on the task at hand. The results
    are finally evaluated and interpreted for use in data-driven decision-making.
    Typical `NLP` tasks comprise text categorization and clustering, entity extraction,
    development of granular catalogs, text summarization, and many others. Sentiment
    analysis of social media data is one of the popular tasks performed using `NLP`
    techniques.


    `NLP` uses many basic advanced techniques. Simpler ones include text classification,
    computing word frequencies, text extraction and clustering, part-of-speech tagging,
    sentiment analysis, collocation and concordance, stop word removal, and word sense
    disambiguation. Next, let’s briefly look at each of these simpler techniques.
    We examine more complex `NLP` techniques in later chapters.


    ## 1.2.2 Text Classification


    Text classification is an analytical method used by professionals to categorize
    or sort text into different predefined groups. For example, a tweet can represent
    a positive or negative sentiment (positive is represented as `1` and negative
    as `0`). Now, suppose you have one thousand such tweets, all prelabelled labeled
    as either positive or negative. Now, you possibly train a machine simple machine
    learning algorithm, `logistic regression`. Though only one thousand tweets can
    be slightly insufficient data to properly train any machine learning algorithm,
    it can still work as a demonstrative example.


    Once the `logistic regression` model is trained, it can be used to classify any
    new tweet(s) as positive or negative. This type of project comes under the category
    of text classification. `Logistic regression` belongs to the linear family of
    machine learning algorithms, and it is probably the simplest in our kit of such
    tools. For completeness, there are other non-linear and more complex classification
    algorithms like `random forests`, `XGBoost`, and those from the neural networks
    family. All these complex algorithms can be deployed in text classification projects,
    provided the data is properly cleaned and preprocessed to the requirements of
    such text classification projects. These non-linear and more complex algorithms
    can be more accurate than `logistic regression` in some cases. The choice of algorithms
    depends upon many factors, like the nature of the task, availability of computing
    resources, skill availability, and available time. Figure [1-2](#649581_1_En_1_Chapter.xhtml#Fig2)
    depicts the working of a simple email classifier.


    ![Flow chart illustrating the "Email Filtering Process." The chart is shaped like
    a funnel, starting with "Incoming Emails" on the left. The process includes three
    stages: "Topic Classification," "Spam Identification," and "Ham Confirmation,"
    each represented by icons. The funnel narrows to "Organized Email Folders" on
    the right. The flow chart visually represents the steps involved in filtering
    and organizing emails.](images/649581_1_En_1_Chapter/649581_1_En_1_Fig2_HTML.jpg)


    **Figure 1-2** Topic classification is used to flag incoming spam emails, which
    are filtered into a spam folder


    ## 1.2.3 Clustering


    Let’s try to understand clustering with a simple example. Imagine you have ten
    different text paragraphs about a variety of topics. As of now, you are not given
    the titles of any of the text paragraphs. While reading, you discover that some
    are about linear algebra, some about the history of Europe, and some about quantum
    mechanics. You group the text paragraphs based on these topics. That’s a perfect
    example of text clustering!


    Having learned about text clustering, now let’s look at an example of how it can
    help us. Imagine you have managing large amounts of text data whose titles are
    known. Text clustering using machine learning algorithms can automatically organize
    such data into meaningful groups. This makes it easier to find and analyze information
    without having to read through everything.


    The popularly used algorithms for text clustering are `k-means clustering`, `hierarchical
    clustering`, `density-based spatial clustering of applications with noise (DBSCAN)`,
    `Latent Dirichlet allocation (LDA)`, `GloVe (global vectors for word representation)`,
    `bidirectional encoder representations from transformers (BERT)`, and many more.
    Some of these techniques are used alone, while others are used in combination,
    depending on the task at hand. Some of these techniques are covered in the upcoming
    chapters.


    Figure [1-3](#649581_1_En_1_Chapter.xhtml#Fig3) depicts the clustering process
    in which an article’s content is categorized into the topic clusters of medical,
    technology, and sports. As shown, usually between the document and its clusters,
    there is an `NLP` clustering processor (or algorithm like `k-means`) that groups
    the generalized article’s content into the said groups.


    ![Flow chart depicting the distribution of a "Main Article" into three categories:
    Health, Technology, and Sports. The main article is represented as a stack of
    papers at the top, with lines connecting it to three stacks below, each labeled
    with a category. The Health and Technology categories have two stacks each, while
    Sports has one. The chart illustrates the organization and categorization of content.](images/649581_1_En_1_Chapter/649581_1_En_1_Fig3_HTML.png)


