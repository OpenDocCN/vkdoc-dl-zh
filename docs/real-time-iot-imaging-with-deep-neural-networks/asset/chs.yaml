  \ 1 章相同。作为练习，尝试添加一个断点，在运行调试后暂停程序执行，然后为 `System.getProperty()` 添加一个监视表达式，以显示 `java.vm.vendor`\
  \ 的值。由于我们现在是在树莓派上运行，该值应为 `Raspbian`，如图 3-35 所示。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig35_HTML.jpg](img/490964_1_En_3_Fig35_HTML.jpg)\n\
  \n图 3-35\n\n调试并显示 `java.vm.vendor`\n\n## 改为在 Linux 或 AWS 虚拟机上运行\n\n那么，如果你实际上不是在树莓派上运行，而是在远程\
  \ Linux 服务器或云虚拟机上运行呢？\n\n到目前为止你所做的所有设置实际上都非常通用，因此只要你拥有 SSH 访问权限，就可以连接到任何运行 Linux\
  \ 的标准机器。\n\n例如，在图 3-36 中，你可以看到相同的设置连接到了一个远程 Linux 机器，并运行着我最喜欢的桌面发行版 Manjaro Linux。\n\
  \n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig36_HTML.jpg](img/490964_1_En_3_Fig36_HTML.jpg)\n\
  \n图 3-36\n\n远程连接到正在运行的 Linux 机器\n\n为了给你提供更多创意，我也使用相同的设置来连接 Amazon Web Services 上的远程机器。\n\
  \n\n\n## 捕获视频直播流\n\n如果您的网络摄像头已通过 USB 端口正确连接，那么现在就可以编写代码，直接从您的物联网设备捕获视频流了。\n\n我们使用两个基础组件来开始。\n\
  \n- OpenCV 的 `VideoCapture` Java 类，用于将硬件连接到软件（更准确地说，是从视频流连接到 OpenCV 的 `Mat` 对象）。在此示例中，`VideoCapture`\
  \ 对象接受一个 `int` 值作为要使用的视频捕获设备的 ID。\n- `ImShow` 类，它不属于 OpenCV Java 核心包。这是一个类似于 OpenCV\
  \ 的 `HighGui` 类（[`https://docs.opencv.org/master/javadoc/org/opencv/highgui/HighGui.html`](https://docs.opencv.org/master/javadoc/org/opencv/highgui/HighGui.html)）的小型类，但它能更轻松地接入视频流并在屏幕上显示。\n\
  \n我们还使用一个名为 `Origami.init()` 的便捷方法来 `init` OpenCV，该方法会为我们搜索并加载正确的 OpenCV 二进制库。\n\
  \n清单 3-1 展示了这个首个流式示例的完整代码。\n\n```\npackage hello;\nimport org.opencv.core.Mat;\n\
  import org.opencv.videoio.VideoCapture;\nimport origami.ImShow;\nimport origami.Origami;\n\
  public class Webcam {\npublic static void main(String[] args) {\nOrigami.init();\n\
  VideoCapture cap = new VideoCapture(0);\nMat matFrame = new Mat();\nImShow ims =\
  \ new ImShow(\"Camera\", 800, 600);\nwhile (cap.grab()) {\ncap.retrieve(matFrame);\n\
  ims.showImage(matFrame);\n}\ncap.release();\n}\n}\n清单 3-1\n访问并显示视频流\n```\n\n这段代码是非常标准的\
  \ OpenCV 代码。运行代码后，应该会得到如图 3-37 所示的画面（不显示帧率）。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig37_HTML.jpg](img/490964_1_En_3_Fig37_HTML.jpg)\n\
  \n图 3-37\n\n不带帧率的视频流\n\n您会注意到速度非常接近实时。可以将清单 3-2 中的代码添加到帧循环中，以显示帧率，如图 3-38 所示。\n\n\
  ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig38_HTML.jpg](img/490964_1_En_3_Fig38_HTML.jpg)\n\
  \n图 3-38\n\n带帧率的视频流\n\n```\nlong now = System.currentTimeMillis();\nframe++;\nImgproc.putText(matFrame,\
  \ \"FPS \" + (frame / (1 + (now - start) / 1000)), new Point(50, 50),\nImgproc.FONT_HERSHEY_COMPLEX,\
  \ 2.0, new Scalar(255, 255, 255));\n清单 3-2\n在帧上添加每秒帧数\n```\n\n对于这个练习，通常期望的帧率在每秒\
  \ 15 到 20 帧之间。\n\n在运行前面的示例时，您可能遇到了问题。有时程序会崩溃，并显示清单 3-3 中的堆栈跟踪信息。\n\n```\nException\
  \ in thread \"main\" java.awt.HeadlessException:\nNo X11 DISPLAY variable was set,\
  \ but this program performed an operation which requires it.\nat java.desktop/java.awt.GraphicsEnvironment.checkHeadless(GraphicsEnvironment.java:208)\n\
  at java.desktop/java.awt.Window.(Window.java:548)\nat java.desktop/java.awt.Frame.(Frame.java:423)\n\
  at java.desktop/java.awt.Frame.(Frame.java:388)\nat java.desktop/javax.swing.JFrame.(JFrame.java:180)\n\
  at origami.ImShow.(ImShow.java:52)\nat hello.Webcam.main(Webcam.java:22)\n清单 3-3\n\
  未设置 X11 DISPLAY\n```\n\n要通过 SSH 运行图形程序（就像您现在正在做的那样），Java 需要设置一个系统环境变量。正如您所见，这个变量的名称是\
  \ `DISPLAY`。您可以在终端标签页中使用以下命令检查其值：\n\n```\necho $DISPLAY\n```\n\n根据此变量的值，您可能处于三种主要状态，如下所示：\n\
  \n- `<empty>`，这不太好。您需要自己设置该值。\n- `:0` 或 `localhost:0`，这意味着任何视觉帧都将显示在树莓派的屏幕上。这对于调试设置是可以的，但通常不是您在电脑上工作时想要的状态。\n\
  - `:10` 或 `localhost:10`，这意味着帧将显示在您的电脑上。在 macOS 上，这是通过 XQuartz 应用程序完成的，它运行一个与树莓派兼容的图形环境。在\
  \ Windows 上，等效的软件是 Xming：[`https://sourceforge.net/projects/xming/`](https://sourceforge.net/projects/xming/)。\n\
  \n如果您正确设置了该变量，那么流将显示在您的电脑屏幕上，如图 3-39 所示。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig39_HTML.jpg](img/490964_1_En_3_Fig39_HTML.jpg)\n\
  \n图 3-39\n\n远程树莓派流直接传输到您的电脑\n\n您已经了解了设置树莓派进行远程开发的所有知识。接下来，让我们看一些分析视频流内容的技巧。\n\n\
  ### 播放视频\n\n您可能并不总能访问视频流，有时需要回放录制的视频。使用 `VideoCapture` 类也可以实现这一点。您可以向其提供要播放的视频文件的路径，如下所示：\n\
  \n```\npublic class PlayVideo {\npublic static void main(String[] args) {\nOrigami.init();\n\
  VideoCapture cap = new VideoCapture(\"marcel_1.mp4\");\nMat matFrame = new Mat();\n\
  ImShow ims = new ImShow(\"Camera\", 400, 300);\nlong start = System.currentTimeMillis();\n\
  long frame = 0;\nwhile (cap.grab()) {\ncap.retrieve(matFrame);\nlong now = System.currentTimeMillis();\n\
  frame++;\nImgproc.putText(matFrame, \"FPS \" + (frame / (1 + (now - start) / 1000)),\
  \ new Point(50, 50),\nImgproc.FONT_HERSHEY_COMPLEX, 2.0, new Scalar(255, 255, 255));\n\
  ims.showImage(matFrame);\n}\ncap.release();\n}\n}\n```\n\n这段代码与播放来自网络摄像头的流相同，只是文件名作为参数传递给\
  \ `VideoCapture` 构造函数。\n\n请注意，您还可以在以下网站上找到一些免费的示例视频：\n\n```\nhttps://sample-videos.com/index.php\n\
  ```\n\n图 3-40 展示了 Marcel 早晨的一些活动。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig40_HTML.jpg](img/490964_1_En_3_Fig40_HTML.jpg)\n\
  \n图 3-40\n\n早晨的 Marcel\n\n如果您尝试输入一个 `http://` URL 作为 `VideoCapture` 的路径，您会发现事情并不像预期的那样工作。您想要播放的远程视频将无法加载。\n\
  \n路径中的 URL 用于播放来自网络摄像头的流，而不是静态文件。如果您手头有网络摄像头，那么将网络摄像头的 Web URL 直接插入 `VideoCapture`\
  \ 对象是一个很好的练习。\n\n## 在树莓派上分析视频流\n\n在本章中，您将学习如何使用函数式编程的概念来分析视频流。具体来说，您将使用 `Filter`\
  \ 接口，并将其与 `Pipeline` 对象结合，然后将它们应用于视频流。\n\n我们将从过滤器的概述开始。然后，我们将研究不同的基本、有趣的过滤器，并逐步过渡到使用不同视觉技术的对象检测。最后，我们将讨论神经网络。\n\
  \n\n\n## 应用滤镜概述\n\n在 Clojure 语言中，你可以直接将一组变换应用于视频流的 `Mat` 对象，而无需使用任何额外的样板代码。我强烈建议你即使只看一下\
  \ origami 示例中最基础的部分，这些示例可在 README 中找到：\n\n```\nhttps://github.com/hellonico/origami/blob/master/README.md#support-for-opencv-412-is-in\n\
  ```\n\n清单 4-1 展示了如何在一个管道中加载图片、将其转换为灰度图并应用 `canny` 函数。这甚至可能让你想尝试 OpenCV 的 Clojure\
  \ 版本。\n\n```\n(require\n'[opencv4.utils :as u]\n'[opencv4.core :refer :all])\n(->\n\
  (imread \"doc/cat_in_bowl.jpeg\")\n(cvt-color! COLOR_RGB2GRAY)\n(canny! 300.0 100.0\
  \ 3 true)\n(bitwise-not!)\n(u/resize-by 0.5)\n(imwrite \"doc/canny-cat.jpg\"))\n\
  清单 4-1\n读取、转灰度、Canny 边缘检测、调整大小并保存\n```\n\n不过，这是一本关于 Java 的书，所以让我们看看如何在 Java 中应用相同的概念。\n\
  \n这里我们引入了滤镜管道的概念，其中每个滤镜对 `Mat` 对象执行一项操作。\n\n以下是滤镜可以执行的一些操作示例：\n\n- 将 `Mat` 对象转换为灰度图\n\
  - 应用 Canny 效果\n- 寻找边缘\n- 铅笔素描\n- Instagram 滤镜，如棕褐色或复古风格\n- 进行背景减除\n- 使用 Haar 目标检测或颜色检测来检测猫或人脸\n\
  - 运行神经网络并识别物体\n\n以下是我们将引入的两种 Java 类型，用于实现这些概念：\n\n- `Filter` 接口，仅包含一个函数 `apply(Mat\
  \ in)`，并返回一个 `Mat` 对象，就像函数式编程中一样。\n- `Pipeline` 类，它本身也是一个 `Filter`，接受一个类列表或已实例化的滤镜列表。当调用\
  \ `apply` 时，它会逐个应用这些类。\n\n清单 4-2 展示了（简单的）`Filter` 接口。\n\n```\nimport org.opencv.core.Mat;\n\
  public interface Filter {\npublic Mat apply(Mat in);\n}\n清单 4-2\nFilter 接口\n```\n\
  \n清单 4-3 展示了实现 `Pipeline` 类的示例，你只需通过逐个调用不同的滤镜来组合它们。\n\n```\nimport java.util.Arrays;\n\
  import java.util.List;\nimport java.util.stream.Collectors;\nimport org.opencv.core.Mat;\n\
  public class Pipeline implements Filter {\nList filters;\npublic Pipeline(Class...\
  \ __filters) {\nList> _filters = (List) Arrays.asList(__filters);\nthis.filters\
  \ = _filters.stream().map(i -> {\ntry {\nreturn (Filter) Class.forName(i.getName()).newInstance();\n\
  } catch (Exception e) {\nreturn null;\n}\n}).collect(Collectors.toList());\n}\n\
  public Pipeline(Filter... __filters) {\nthis.filters = (List) Arrays.asList(__filters);\n\
  }\n@Override\npublic Mat apply(Mat in) {\nMat dst = in.clone();\nfor (Filter f :\
  \ filters) {\ndst = f.apply(dst);\n}\nreturn dst;\n}\n}\n清单 4-3\n多个滤镜\n```\n\n请注意，这里直接在类中使用了已弃用版本的\
  \ `newInstance` 函数。这可能不会调用你真正想要的构造函数，但对于本书中的示例来说，它已经足够好了。\n\n当然，到目前为止，`Filter` 和\
  \ `Pipeline` 还没有做太多事情，所以让我们在接下来的部分中回顾一些基本示例。\n\n### 应用基础滤镜\n\n在本节中，我们将介绍几个基础滤镜的示例。\n\
  \n#### 灰度滤镜\n\n滤镜最明显的用途是将 `Mat` 对象从彩色转换为灰度。在 OpenCV 中，这是通过使用 `Imgproc` 类中的 `cvtColor`\
  \ 函数完成的。\n\n省略包定义，我们将几页前的网络摄像头代码与标准的 `cvtColor` 包装器结合在一个类中，该类实现了前面介绍的 `Filter` 接口（清单\
  \ 4-4）。\n\n```\nimport org.opencv.core.Mat;\nimport org.opencv.imgproc.Imgproc;\n\
  import org.opencv.videoio.VideoCapture;\nimport origami.ImShow;\nimport origami.Origami;\n\
  清单 4-4\n流上的灰度滤镜\n```\n\n```\npublic class WebcamWithFilters {\npublic static void\
  \ main(final String[] args) {\nOrigami.init();\nfinal VideoCapture cap = new VideoCapture(0);\n\
  final ImShow ims = new ImShow(\"Camera\", 800, 600);\nfinal Mat buffer = new Mat();\n\
  Filter gray = new Gray();\nwhile (cap.read(buffer)) {\nims.showImage(gray.apply(buffer));\n\
  }\ncap.release();\n}\n}\nclass Gray implements Filter {\npublic Mat apply(final\
  \ Mat img) {\nfinal Mat mat1 = new Mat();\nImgproc.cvtColor(img, mat1, Imgproc.COLOR_RGB2GRAY);\n\
  return mat1;\n}\n}\n```\n\n你可以直接在树莓派上运行此代码，如果你站在网络摄像头前，你会得到类似图 4-1 中我得到的结果。\n\n\
  ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig1_HTML.jpg](img/490964_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\n不仅我的头发，整张图片都变成了灰色\n\n#### 边缘保留滤镜\n\n以同样的方式，我们可以为 OpenCV 的 `Photo` 类中的\
  \ `EdgePreserving` 函数实现一个包装器。这在许多不同的应用中用于平滑和去除图片中不需要的线条。例如，清单 4-5 实际上只是对 `edgePreservingFilter`\
  \ 函数的一个基本调用。\n\n```\nimport org.opencv.photo.Photo;\nclass EdgePreserving implements\
  \ Filter {\npublic int flags = Photo.RECURS_FILTER;\n// int flags = NORMCONV_FILTER;\n\
  public float sigma_s = 60;\npublic float sigma_r = 0.4f;\npublic Mat apply(Mat in)\
  \ {\nMat dst = new Mat();\nPhoto.edgePreservingFilter(in, dst, flags, sigma_s, sigma_r);\n\
  return dst;\n}\n}\n清单 4-5\n重新实现为 Filter 的 EdgePreservering 类\n```\n\n你可以通过修改 `WebcamWithFilters`\
  \ 的 main 方法来使用这个新滤镜，如清单 4-6 所示。\n\n```\nFilter filter = new EdgePreserving();\n\
  while (cap.read(buffer)) {\nims.showImage(filter.apply(buffer));\n}\n清单 4-6\n修改后的主函数以使用边缘保留滤镜\n\
  ```\n\n现在让我们继续执行新代码。同样，如果你正对着网络摄像头，你应该会得到类似于图 4-2 中我的样子。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig2_HTML.jpg](img/490964_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n边缘保留滤镜\n\n#### Canny 边缘检测\n\nOpenCV 世界中另一个有用的滤镜是应用 Canny 效果，这是一种快速有效的方法，用于在\
  \ `Mat` 对象中查找轮廓和形状。将 `Canny` 作为滤镜的快速实现如清单 4-7 所示。\n\n```\nclass Canny implements\
  \ Filter {\npublic boolean inverted = true;\npublic int threshold1 = 100;\npublic\
  \ int threshold2 = 200;\n@Override\npublic Mat apply(Mat in) {\nMat dst = new Mat();\n\
  Imgproc.Canny(in, dst, threshold1, threshold2);\nif (inverted) {\nCore.bitwise_not(dst,\
  \ dst, new Mat());\n}\nImgproc.cvtColor(dst, dst, Imgproc.COLOR_GRAY2RGB);\nreturn\
  \ dst;\n}\n}\n清单 4-7\nFilter 中的 OpenCV Canny 边缘检测\n```\n\n图 4-3 显示了将 Canny 滤镜应用于主循环的结果。\n\
  \n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig3_HTML.jpg](img/490964_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\n网络摄像头流上的 Canny 滤镜\n\n\n\n#### 调试（再谈）\n\n我们再次来谈谈调试的注意事项。如果在 `WebcamWithFilters`\
  \ 的主捕获循环中添加断点，你将能够访问过滤器的所有不同字段。如图 4-4 所示，让我们将反转布尔值改为 `false`。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig4_HTML.jpg](img/490964_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4：实时更新过滤器参数\n\n然后，让我们移除断点并正常重新启动代码执行。图 4-5 展示了直接更改过滤器值如何立即改变正在运行的代码以及屏幕上显示的\
  \ `Mat` 对象的颜色。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig5_HTML.jpg](img/490964_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5：非反转的 Canny 过滤器\n\n在实现你自己的过滤器时，最好将最有影响力的变量作为类的字段保留，这样你就不会被大量数值淹没，但仍能访问到重要的变量。\n\
  \n#### 组合过滤器\n\n你可能在前面的章节中已经意识到，你会想要了解每个过滤器的性能。\n\n性能实际上取决于从视频文件或直接从摄像头设备读取时，每秒能处理的帧数。\n\
  \n接下来我们将执行以下操作：\n\n- 直接在图像上显示帧率\n- 使用本章前面定义的 `Pipeline` 类，将灰度过滤器与帧率过滤器组合起来\n\n我们已经有了灰度过滤器的代码，因此我们将直接进入显示每秒帧数（FPS）的代码。\n\
  \n我一直以为可以通过 OpenCV 的 `VideoCapture` 属性集来访问帧率值。不幸的是，我们几乎总是只能使用一个硬编码的值，而不是屏幕上实际显示的值。\n\
  \n因此，清单 4-8 中的 FPS 实现是一个小的变通方法，它基于自过滤器生命周期开始以来已显示的帧数进行简单的算术运算。\n\n最后，它使用 `putText`\
  \ 将文本直接应用到帧上。对于简单的用例来说，这已经足够好了。\n\n```\nclass FPS implements Filter {\nlong start\
  \ = System.currentTimeMillis();\nint count = 0;\nPoint org = new Point(50, 50);\n\
  int fontFace = Imgproc.FONT_HERSHEY_PLAIN;\ndouble fontScale = 4.0;\nScalar color\
  \ = new Scalar(0, 0, 0);\nint thickness = 3;\npublic Mat apply(Mat in) {\ncount++;\n\
  String text = \"FPS: \" + count / (1 + ((System.currentTimeMillis() - start) / 1000));\n\
  Imgproc.putText(in, text, org, fontFace, fontScale, color, thickness);\nreturn in;\n\
  }\n}\n```\n\n清单 4-8：FPS 过滤器\n\n现在让我们回到将流上显示的 FPS 与灰度过滤器组合起来的问题。\n\n你会很高兴地知道，在 `WebcamWithFilters`\
  \ 的 `main()` 函数中，唯一需要更新的行是实例化过滤器的那一行，如下所示：\n\n```\nFilter filter = new Pipeline(Gray.class,\
  \ FPS.class);\n```\n\n当你再次从树莓派上运行示例时，你将得到类似于图 4-6 所示的结果。将两个过滤器一起应用，我在树莓派上通常能得到大约每秒\
  \ 15 帧。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig6_HTML.jpg](img/490964_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6：灰度过滤器与 FPS 的组合\n\n### 应用类似 Instagram 的滤镜\n\n严肃的工作到此为止。让我们稍作休息，用一些类似 Instagram\
  \ 的滤镜来玩一玩。\n\n#### 颜色映射\n\n让我们从使用 `ImgProc` 中的 OpenCV `colormap` 函数开始这个有趣的章节。我们将\
  \ `colormap` 的参数移到构造函数中，如清单 4-9 所示，这样我们就可以通过调试屏幕来更新它。\n\n```\nclass Color implements\
  \ Filter {\nint colormap = 0;\npublic Color(int colormap) {\nthis.colormap = colormap;\n\
  }\npublic Color() {\nthis.colormap = Imgproc.COLORMAP_INFERNO;\n}\npublic Mat apply(Mat\
  \ img) {\nMat threshed = new Mat();\nImgproc.applyColorMap(img, threshed, colormap);\n\
  return threshed;\n}\n}\n```\n\n清单 4-9：颜色映射\n\n要实例化过滤器，我们需要传入想要使用的颜色映射，因此这直接在构造函数中完成。这里我们需要的是实例化后的过滤器，而不仅仅是它的类，因此我们使用\
  \ `Pipeline` 类的第二个构造函数，将实例化后的 `Filter` 对象传递给构造函数。\n\n```\nFilter filter = new Pipeline(new\
  \ Color(Imgproc.COLORMAP_INFERNO), new FPS());\n```\n\n当你执行此代码时，你会得到类似于图 4-7 的结果。\n\
  \n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig7_HTML.jpg](img/490964_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7：地狱火\n\n#### 阈值\n\n阈值是另一个有趣的滤镜，通过应用 `Imgproc` 的 `threshold` 函数实现。它对 `Mat`\
  \ 对象的每个数组元素应用一个固定级别的阈值。\n\n阈值滤镜最初的目的是分割图片中的元素，例如通过移除不需要的元素来去除图片的噪点。它通常不用于 Instagram\
  \ 滤镜，但效果看起来不错，并且可以给你带来一些创意灵感。\n\n清单 4-10 展示了如何实现阈值滤镜。\n\n```\nclass Thresh implements\
  \ Filter{\nint sensitivity = 100;\nint maxVal = 255;\npublic Thresh() {\n}\npublic\
  \ Thresh(int _sensitivity) {\nthis.sensitivity = _sensitivity;\n}\npublic Mat apply(Mat\
  \ img) {\nMat threshed = new Mat();\nImgproc.threshold(img, threshed, sensitivity,\
  \ maxVal, Imgproc.THRESH_BINARY);\nreturn threshed;\n}\n}\n```\n\n清单 4-10：应用阈值\n\
  \n图 4-8 显示了结果。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig8_HTML.jpg](img/490964_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8：应用阈值产生燃烧效果\n\n#### 棕褐色\n\n让我们再次使用古老的（双关语）棕褐色效果，如清单 4-11 所示。\n\n```\nclass\
  \ Sepia implements Filter {\npublic Mat apply(Mat source) {\nMat kernel = new Mat(3,\
  \ 3, CvType.CV_32F);\nkernel.put(0, 0,\n0.272, 0.534, 0.131,\n0.349, 0.686, 0.168,\n\
  0.393, 0.769, 0.189);\nMat destination = new Mat();\nCore.transform(source, destination,\
  \ kernel);\nreturn destination;\n}\n}\n```\n\n清单 4-11：棕褐色\n\n当与视频流一起使用时，棕褐色效果会给你带来如图\
  \ 4-9 所示的输出。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig9_HTML.jpg](img/490964_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9：棕褐色效果\n\n\n\n#### 卡通效果\n\n这种卡通效果的简单实现会提取原始图像中定义特征的重要线条，在应用平滑和模糊效果后，对每个像素值进行阈值处理。然后将这些操作的结果进行组合，如代码清单\
  \ 4-12 所示。\n\n```\nclass Cartoon implements Filter {\npublic int d = 17;\npublic\
  \ int sigmaColor = d;\npublic int sigmaSpace = 7;\npublic int ksize = 7;\npublic\
  \ double maxValue = 255;\npublic int blockSize = 19;\npublic int C = 2;\npublic\
  \ Mat apply(Mat inputFrame) {\nMat gray = new Mat();\nMat co = new Mat();\nMat m\
  \ = new Mat();\nMat mOutputFrame = new Mat();\nImgproc.cvtColor(inputFrame, gray,\
  \ Imgproc.COLOR_BGR2GRAY);\nImgproc.bilateralFilter(gray, co, d, sigmaColor, sigmaSpace);\n\
  Mat blurred = new Mat();\nImgproc.blur(co, blurred, new Size(ksize, ksize));\nImgproc.adaptiveThreshold(blurred,\
  \ blurred, maxValue, Imgproc.ADAPTIVE_THRESH_MEAN_C, Imgproc.THRESH_BINARY,\nblockSize,\
  \ C);\nImgproc.cvtColor(blurred, m, Imgproc.COLOR_GRAY2BGR);\nCore.bitwise_and(inputFrame,\
  \ m, mOutputFrame);\nreturn mOutputFrame;\n}\n}\n代码清单 4-12\n卡通滤镜\n```\n\n将卡通滤镜应用于视频流，会得到如图\
  \ 4-10 所示的效果。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig10_HTML.jpg](img/490964_1_En_4_Fig10_HTML.jpg)\n\
