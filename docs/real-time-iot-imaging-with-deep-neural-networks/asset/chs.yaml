  \n### 执行目标检测\n\n*目标检测* 是指使用不同的编程算法在图片中查找物体的概念。这是一项长期以来由人类完成的任务，对于没有大脑的计算机来说相当困难。但随着技术的进步，这种情况最近已经发生了变化。\n\
  \n在本章的这部分内容中，我们将回顾不同的计算机视觉技术，以识别图像中的物体，而无需任何关于其内容的先验信息。具体来说，我们将回顾以下内容：\n\n*   使用简单的轮廓绘制滤镜\n\
  *   通过颜色检测物体\n*   使用 Haar 分类器\n*   使用模板匹配\n*   使用像 Yolo 这样的神经网络\n\n这些示例的难度大致是递增的，因此最好按照列表顺序尝试。\n\
  \n#### 移除背景\n\n移除背景是一种可以用来移除场景中不必要杂物的技术。你试图寻找的物体可能不是静止的，并且很可能在一组图片或视频流中移动。为了有效地移除杂物，算法需要能够区分两个\
  \ `Mat` 对象，并使用某种短期记忆来区分移动的物体（前景）和背景中的标准场景物体。\n\n在 OpenCV 中，有两个易于使用的 `BackgroundSubtractor`\
  \ 类可供使用。它们的介绍和完整解释可以在以下网站上找到：\n\n```\nhttps://docs.opencv.org/master/d1/dc5/tutorial_background_subtraction.html\n\
  ```\n\n基本上，你向背景减法器提供越来越多的帧，它就能检测出哪些是前景中移动的物体，哪些不是。\n\n代码清单 4-14 非常容易理解；只需注意不要将 `subtractor`\
  \ 类中的 `apply` 函数与我们 `Filter` 接口中的 `apply` 函数混淆。\n\n```\nclass BackgroundSubtractor\
  \ implements Filter {\nboolean useMOG2 = true;\nBackgroundSubtractor backSub;\n\
  double learningRate = 1.0;\nboolean showMask = true;\npublic BackgroundSubtractor()\
  \ {\nif (useMOG2) {\nbackSub = Video.createBackgroundSubtractorMOG2();\n} else {\n\
  backSub = Video.createBackgroundSubtractorKNN();\n}\n}\n@Override\npublic Mat apply(Mat\
  \ in) {\nMat mask = new Mat();\nbackSub.apply(in, mask);\nMat result = new Mat();\n\
  if (showMask) {\nImgproc.cvtColor(mask, result, Imgproc.COLOR_GRAY2RGB);\nreturn\
  \ result;\n} else {\nin.copyTo(result, mask);\nreturn result;\n}\n}\n}\n代码清单 4-14\n\
  BackgroundSubtractor 类\n```\n\n通过调用构造函数加载滤镜，你应该会得到类似于图 4-12 的结果。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig12_HTML.jpg](img/490964_1_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12\n\n移除背景\n\n使用 KNN 背景减法器\n\n一旦这个滤镜运行起来，尝试切换到基于 KNN 的 `BackgroundSubtractor`，看看速度（观察帧率）和结果准确性的差异。\n\
  \n#### 通过轮廓检测\n\nOpenCV 第二个最基本的功能是能够在图像中找到轮廓。轮廓滤镜使用了 `Imgproc` 类中的 `findContours`\
  \ 函数。\n\n`findContours` 通常在你先执行以下步骤时效果更好：\n\n*   将输入的 `Mat` 对象转换为灰度图\n*   应用 Canny\
  \ 滤镜\n\n这两个步骤已添加到代码清单 4-15 中；然后我们在一个使用 `zeros` 函数创建的黑色 `Mat` 对象上绘制轮廓。\n\n```\nclass\
  \ Contours implements Filter {\nprivate int threshold = 100;\npublic Mat apply(Mat\
  \ srcImage) {\nMat cannyOutput = new Mat();\nMat srcGray = new Mat();\nImgproc.cvtColor(srcImage,\
  \ srcGray, Imgproc.COLOR_BGR2GRAY);\nImgproc.Canny(srcGray, cannyOutput, threshold,\
  \ threshold * 2);\nList contours = new ArrayList();\nMat hierarchy = new Mat();\n\
  Imgproc.findContours(cannyOutput, contours, hierarchy, Imgproc.RETR_TREE, Imgproc.CHAIN_APPROX_SIMPLE);\n\
  Mat drawing = Mat.zeros(cannyOutput.size(), CvType.CV_8UC3);\nfor (int i = 0; i\
  \ < contours.size(); i++) {\nScalar color = new Scalar(256, 150, 0);\nImgproc.drawContours(drawing,\
  \ contours, i, color, 2, 8, hierarchy, 0, new Point());\n}\nreturn drawing;\n}\n\
  }\n代码清单 4-15\n检测轮廓\n```\n\n为轮廓使用管道\n\n细心的读者会注意到，由于前面的代码使用了 `Pipeline` 类，实际上写成下面这样会更优雅：\n\
  \n```\nPipeline(new Canny(), new Gray(), new Contours())\n```\n\n其中 `Contours` 滤镜只负责提取轮廓。试试看！\n\
  \n将轮廓滤镜应用于 Marcel 的视频会得到一种艺术效果（图 4-13）。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig13_HTML.jpg](img/490964_1_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13\n\n使用 OpenCV 的轮廓检测功能\n\n移除第一个 Canny 滤镜并比较\n\n这里有一个练习给你：尝试移除转换为灰度图和应用 Canny\
  \ 滤镜这两个步骤，然后将结果与原始结果进行比较。\n\n\n\n#### 通过颜色检测\n\n在 OpenCV 中，一张图片或一个 `Mat` 对象通常采用红/绿/蓝（RGB）色彩空间（实际上在\
  \ OpenCV 中准确来说是蓝/绿/红）。如果你理解为每个像素的每个通道都被赋予了一个值，这就很容易理解了。要查看这些通道的可能值，你可以查阅以下网站：\n\n\
  ```\nhttps://www.rapidtables.com/web/color/RGB_Color.html\n```\n\n这种色彩空间的问题在于，亮度和对比度的信息与颜色本身的信息混杂在一起。\n\
  \n当在 `Mat` 对象中寻找特定颜色时，我们会切换到一个名为 HSV（色相、饱和度、明度）的色彩空间。在这个色彩空间中，颜色直接对应色相值。\n\n色相值通常在\
  \ 0 到 360 之间，类似于一个圆柱体上的度数。OpenCV 的方案略有不同，其范围被除以了 2（这样在内存中占用更少空间）。表 4-1 列出了色相值的范围。\n\
  \n**表 4-1** OpenCV 中的色相值\n\n| 颜色 | 色相范围 |\n| --- | --- |\n| 红色 | 0 到 30 *以及* 150\
  \ 到 180 |\n| 绿色 | 30 到 90 |\n| 蓝色 | 90 到 150 |\n\n清单 4-16 转换了色彩空间，并使用 `inRange`\
  \ 检查目标颜色范围内的色相值，并在示例末尾再次使用 `findContours` 添加了一些魔法来正确绘制形状。\n\n```\nclass ColorDetector\
  \ implements Filter {\nScalar minColor, maxColor;\npublic ColorDetector(Scalar minColor,\
  \ Scalar maxColor) {\nthis.minColor = minColor;\nthis.maxColor = maxColor;\n}\n\
  @Override\npublic Mat apply(Mat input) {\nMat array255 = new Mat(input.height(),\
  \ input.width(), CvType.CV_8UC1);\narray255.setTo(new Scalar(255));\nMat distance\
  \ = new Mat(input.height(), input.width(), CvType.CV_8UC1);\nList lhsv = new ArrayList(3);\n\
  Mat circles = new Mat();\nMat hsv_image = new Mat();\nMat thresholded = new Mat();\n\
  Mat thresholded2 = new Mat();\nImgproc.cvtColor(input, hsv_image, Imgproc.COLOR_BGR2HSV);\n\
  Core.inRange(hsv_image, minColor, maxColor, thresholded);\nImgproc.erode(thresholded,\
  \ thresholded, Imgproc.getStructuringElement(Imgproc.MORPH_RECT, new Size(8, 8)));\n\
  Imgproc.dilate(thresholded, thresholded, Imgproc.getStructuringElement(Imgproc.MORPH_RECT,\
  \ new Size(8, 8)));\nCore.split(hsv_image, lhsv);\nMat S = lhsv.get(1);\nMat V =\
  \ lhsv.get(2);\nCore.subtract(array255, S, S);\nCore.subtract(array255, V, V);\n\
  S.convertTo(S, CvType.CV_32F);\nV.convertTo(V, CvType.CV_32F);\nCore.magnitude(S,\
  \ V, distance);\nCore.inRange(distance, new Scalar(0.0), new Scalar(200.0), thresholded2);\n\
  Core.bitwise_and(thresholded, thresholded2, thresholded);\nImgproc.GaussianBlur(thresholded,\
  \ thresholded, new Size(9, 9), 0, 0);\nList contours = new ArrayList();\nImgproc.HoughCircles(thresholded,\
  \ circles, Imgproc.CV_HOUGH_GRADIENT, 2, thresholded.height() / 8, 200, 100, 0,\
  \ 0);\nImgproc.findContours(thresholded, contours, thresholded2, Imgproc.RETR_LIST,\
  \ Imgproc.CHAIN_APPROX_SIMPLE);\nImgproc.drawContours(input, contours, -2, new Scalar(10,\
  \ 0, 0), 4);\nreturn input;\n}\n}\nclass RedDetector extends ColorDetector {\npublic\
  \ RedDetector() {\nsuper(new Scalar(0, 100, 100), new Scalar(10, 255, 255));\n}\n\
  }\n清单 4-16\n检测红色\n```\n\n将此滤镜应用于玫瑰视频的结果如图 4-14 所示。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig14_HTML.jpg](img/490964_1_En_4_Fig14_HTML.jpg)\n\
  \n**图 4-14** 检测红玫瑰\n\n**实现一个检测蓝色的滤镜**\n\n查看表 4-1 中的色相值，你会发现实现一个搜索蓝色的滤镜并不困难。这留作练习供你完成。\n\
  \n#### 通过 Haar 检测\n\n正如你在第 1 章中所见，你可以使用基于 Haar 的分类器来识别 `Mat` 对象中的物体和/或人物。代码与你之前看到的几乎相同，只是额外强调了我们要寻找的形状的数量和大小。\n\
  \n具体来说，以下代码展示了如何使用两个尺寸作为参数来指定我们寻找物体的最小尺寸和最大尺寸。\n\n```\nclassifier.detectMultiScale(input,\
  \ faces, 1.1, 2, -1, new Size(100, 100), new Size(500, 500));\n```\n\n因此，清单 4-17\
  \ 附带了一个额外的 main 示例函数，展示了如何使用不同的 XML 文件作为 Haar 分类器检测的参数。\n\n```\npublic class DetectWithHaar\
  \ {\npublic static void main(String[] args) {\nOrigami.init();\nVideoCapture cap\
  \ = new VideoCapture(0);\nMat buffer = new Mat();\nImShow ims = new ImShow(\"Camera\"\
  , 800, 600);\nFilter filter = new Pipeline(new Haar(\"haarcascades/haarcascade_frontalface_default.xml\"\
  ), new FPS());\nwhile (cap.grab()) {\ncap.retrieve(buffer);\nims.showImage(filter.apply(buffer));\n\
  }\ncap.release();\n}\n}\nclass Haar implements Filter {\nprivate CascadeClassifier\
  \ classifier;\nScalar white = new Scalar(255, 255, 255);\npublic Haar(String path)\
  \ {\nclassifier = new CascadeClassifier(path);\n}\npublic Mat apply(Mat input) {\n\
  MatOfRect faces = new MatOfRect();\nclassifier.detectMultiScale(input, faces, 1.1,\
  \ 2, -1, new Size(100, 100), new Size(500, 500));\nfor (Rect rect : faces.toArray())\
  \ {\nImgproc.putText(input, \"Face\", new Point(rect.x, rect.y - 5), 3, 5, white);\n\
  Imgproc.rectangle(input, new Point(rect.x, rect.y), new Point(rect.x + rect.width,\
  \ rect.y + rect.height),\nwhite, 5);\n}\nreturn input;\n}\n}\n清单 4-17\n基于 Haar 分类器的检测\n\
  ```\n\n如果你家里有猫，或者正在使用示例中的猫视频，当你将其应用于网络摄像头流时，应该会得到如图 4-15 所示的结果。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig15_HTML.jpg](img/490964_1_En_4_Fig15_HTML.jpg)\n\
  \n**图 4-15** 寻找猫\n\n**使用其他 Haar 定义**\n\n示例中还有其他用于 Haar 级联的 XML 文件。请随意使用其中一个来检测人物、眼睛或笑脸作为练习。\n\
  \n\n\n#### 检测上的透明叠加层\n\n在前面的示例中绘制矩形时，您可能想知道是否可以在检测到的形状上绘制矩形以外的其他内容。\n\n清单 4-18 展示了如何通过加载一个将叠加在检测到的形状位置上的遮罩来实现这一点。这基本上就是您在智能手机应用中一直使用的功能。\n\
  \n请注意，在 `drawTransparency` 函数中，关于透明度层有一个技巧。叠加层的遮罩是使用 `IMREAD_UNCHANGED` 作为加载标志加载的；您必须使用此标志，否则透明度层会丢失。\n\
  \n一旦您获得了透明度层，就可以在复制叠加层时将其用作遮罩，从而复制您想要的 `Mat` 对象的精确像素。\n\n```\nclass FunWithHaar\
  \ implements Filter {\nCascadeClassifier classifier;\nMat mask;\nScalar white =\
  \ new Scalar(255, 255, 255);\npublic FunWithHaar(String path) {\nclassifier = new\
  \ CascadeClassifier(path);\nmask = Imgcodecs.imread(\"masquerade_mask.png\", Imgcodecs.IMREAD_UNCHANGED);\n\
  }\nvoid drawTransparency(Mat frame, Mat transp, int xPos, int yPos) {\nList layers\
  \ = new ArrayList();\nCore.split(transp, layers);\nMat mask = layers.remove(3);\n\
  Core.merge(layers, transp);\nMat submat = frame.submat(yPos, yPos + transp.rows(),\
  \ xPos, xPos + transp.cols());\ntransp.copyTo(submat, mask);\n}\npublic Mat apply(Mat\
  \ input) {\nMatOfRect faces = new MatOfRect();\nclassifier.detectMultiScale(input,\
  \ faces);\nMat maskResized = new Mat();\nfor (Rect rect : faces.toArray()) {\nImgproc.resize(mask,\
  \ maskResized, new Size(rect.width, rect.height));\nint adjusty = (int) (rect.y\
  \ - rect.width * 0.2);\ntry {\ndrawTransparency(input, maskResized, rect.x, adjusty);\n\
  } catch (Exception e) {\ne.printStackTrace();\n}\n}\nreturn input;\n}\n}\n清单 4-18\n\
  添加叠加层\n```\n\n根据所使用的透明 `Mat` 对象，您可能需要调整位置，否则您应该会得到类似图 4-16 所示的结果。最后，您可以为您的视频流增添一些威尼斯狂欢节的感觉！\n\
  \n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig16_HTML.jpg](img/490964_1_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16\n\n添加一个神秘面具作为叠加层\n\n使用蝙蝠侠面具\n\n我实际上尝试过，但没能找到一个合适的蝙蝠侠面具用作视频流的叠加层。也许您可以发送给我一个包含适当\
  \ `Mat` 叠加层的代码来帮助我！\n\n#### 通过模板匹配进行检测\n\n使用 OpenCV 进行模板匹配非常简单。它简单到可能应该更早地出现在检测方法的顺序中。模板匹配意味着在一个\
  \ `Mat` 中寻找另一个 `Mat`。OpenCV 有一个名为 `matchTemplate` 的超强函数可以做到这一点。\n\n清单 4-19 主要围绕使用\
  \ `matchTemplate`。请注意在从 `matchTemplate` 返回的结果上使用 `Core.minMaxLoc`。它用于定位最佳得分的索引，并且在运行神经网络时会再次使用。\n\
  \n```\nclass Template implements Filter {\nMat template;\npublic Template(String\
  \ path) {\nthis.template = Imgcodecs.imread(path);\n}\n@Override\npublic Mat apply(Mat\
  \ in) {\nMat outputImage = new Mat();\nImgproc.matchTemplate(in, template, outputImage,\
  \ Imgproc.TM_CCOEFF);\nMinMaxLocResult mmr = Core.minMaxLoc(outputImage);\nPoint\
  \ matchLoc = mmr.maxLoc;\nImgproc.rectangle(in, matchLoc, new Point(matchLoc.x +\
  \ template.cols(), matchLoc.y + template.rows()),\nnew Scalar(255, 255, 255), 3);\n\
  return in;\n}\n}\n清单 4-19\n模式匹配\n```\n\n现在，让我们找一个装有 ReSpeaker 的盒子，就像图 4-17 中所示的那样，因为我们在下一章中会用到这个扬声器，而我现在找不到它了。让我们用\
  \ OpenCV 来帮我们找到它。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig17_HTML.jpg](img/490964_1_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17\n\n模板\n\n通过 OpenCV 的模板匹配进行检测出奇地快速和准确，如图 4-18 所示。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig18_HTML.jpg](img/490964_1_En_4_Fig18_HTML.jpg)\n\
  \n图 4-18\n\n找到扬声器的盒子\n\n在图 4-18 中很难看到帧率，但在 Raspberry Pi 4 上，它实际上大约在每秒 10 到 15 帧之间。\n\
  \n#### 通过 Yolo 进行检测\n\n这是本章介绍的最后一个检测方法。假设我们想要应用一个训练好的神经网络来识别流中的物体。在经过一些计算能力有限的硬件测试后，我使用\
  \ Yolo/Darknet 以及在 Coco 数据集上训练的可免费获取的 Darknet 网络获得了相当快速的结果。\n\n在随机输入上使用神经网络的优势在于，大多数训练好的网络都相当稳健，并且能给出良好的结果，在接近实时的流上准确率达到\
  \ 80% 到 90%。\n\n训练是使用神经网络最困难的部分。在本书中，我们将仅限于在 Raspberry Pi 上运行检测代码，而不是训练。您可以在 Darknet/Yolo\
  \ 网站上找到如何组织图片以重新训练网络的步骤。\n\n在 OpenCV 中使用 Darknet 实现物体检测的步骤如下：\n\n1.  从配置文件和权重文件中加载网络。\n\
  2.  找到该网络的输出层/节点，因为结果将在这里产生。输出层是指那些没有连接到更多输出层的层。\n3.  将 `Mat` 对象转换为网络所需的 blob。Blob\
  \ 是一个图像或一组图像，经过调整以匹配网络在大小、通道顺序等方面期望的格式。\n4.  然后我们运行网络，这意味着我们将 blob 输入网络，并检索标记为输出层的层的值。\n\
  5.  对于结果中的每一行，我们实际上会获得每个预期可识别特征的置信度值。在 Coco 中，网络被训练为能够识别 80 种不同的可能物体，例如人、自行车、汽车等。\n\
  6.  然后我们再次使用 `MinMaxLocResult` 来获取最可能被识别物体的索引，如果该索引的值大于 0，我们就保留它。\n7.  每个结果行中的前四个值实际上是描述检测到物体所在框的四个值，因此我们提取这四个值，并保留矩形及其标签的索引。\n\
  8.  在绘制所有框之前，我们通常还会使用 `NMSBoxes`，它会移除重叠的框。大多数情况下，重叠的框是对同一物体多次阳性检测的多个版本。\n9.  最后，我们绘制剩余的矩形，并添加识别出的物体的标签。\n\
  \n清单 4-20 展示了作为过滤器实现的基类 `YoloDetector` 的完整代码。\n\n\n\n```java\nclass YoloDetector\
  \ implements Filter {\n    final static Size sz = new Size(416, 416);\n    List\
  \ outBlobNames;\n    Net net;\n    List layers;\n    List labels;\n\n    List getOutputsNames(Net\
  \ net) {\n        List layersNames = net.getLayerNames();\n        return net.getUnconnectedOutLayers().toList().stream().map(i\
  \ -> i - 1).map(layersNames::get)\n                .collect(Collectors.toList());\n\
  \    }\n\n    public YoloDetector(String modelWeights, String modelConfiguration)\
  \ {\n        net = Dnn.readNetFromDarknet(modelConfiguration, modelWeights);\n \
  \       layers = getOutputsNames(net);\n        try {\n            labels = Files.readAllLines(Paths.get(LABEL_FILE));\n\
  \        } catch (Exception e) {\n            throw new RuntimeException(e);\n \
  \       }\n    }\n\n    @Override\n    public Mat apply(Mat in) {\n        findShapes(in);\n\
  \        return in;\n    }\n\n    final int IN_WIDTH = 416;\n    final int IN_HEIGHT\
  \ = 416;\n    final double IN_SCALE_FACTOR = 0.00392157;\n    final int MAX_RESULTS\
  \ = 20;\n    final boolean SWAP_RGB = true;\n    final String LABEL_FILE = \"yolov3/coco.names\"\
  ;\n\n    void findShapes(Mat frame) {\n        Mat blob = Dnn.blobFromImage(frame,\
  \ IN_SCALE_FACTOR, new Size(IN_WIDTH, IN_HEIGHT), new Scalar(0, 0, 0),\n       \
  \         SWAP_RGB);\n        net.setInput(blob);\n        List outputs = new ArrayList();\n\
  \        for (int i = 0; i < layers.size(); i++) {\n            outputs.add(new\
  \ Mat());\n        }\n        net.forward(outputs, layers);\n        postProcess(frame,\
  \ outputs);\n    }\n\n    private void postProcess(Mat frame, List outs) {\n   \
  \     List tmpLocations = new ArrayList();\n        List tmpClasses = new ArrayList();\n\
  \        List tmpConfidences = new ArrayList();\n        int w = frame.width();\n\
  \        int h = frame.height();\n        for (Mat out : outs) {\n            final\
  \ float[] data = new float[(int) out.total()];\n            out.get(0, 0, data);\n\
  \            int k = 0;\n            for (int j = 0; j < out.height(); j++) {\n\
  \                Mat result = out.row(j);\n                Core.MinMaxLocResult\
  \ mm = Core.minMaxLoc(result);\n                if (mm.maxVal > 0) {\n         \
  \           float center_x = data[k + 0] * w;\n                    float center_y\
  \ = data[k + 1] * h;\n                    float width = data[k + 2] * w;\n     \
  \               float height = data[k + 3] * h;\n                    float left\
  \ = center_x - width / 2;\n                    float top = center_y - height / 2;\n\
  \                    tmpClasses.add((int) mm.maxLoc.x);\n                    tmpConfidences.add((float)\
  \ mm.maxVal);\n                    tmpLocations.add(new Rect((int) left, (int) top,\
  \ (int) width, (int) height));\n                }\n                k += out.width();\n\
  \            }\n        }\n        annotateFrame(frame, tmpLocations, tmpClasses,\
  \ tmpConfidences);\n    }\n\n    private void annotateFrame(Mat frame, List tmpLocations,\
  \ List tmpClasses,\n                               List tmpConfidences) {\n    \
  \    MatOfRect locMat = new MatOfRect();\n        MatOfFloat confidenceMat = new\
  \ MatOfFloat();\n        MatOfInt indexMat = new MatOfInt();\n        locMat.fromList(tmpLocations);\n\
  \        confidenceMat.fromList(tmpConfidences);\n        Dnn.NMSBoxes(locMat, confidenceMat,\
  \ 0.1f, 0.1f, indexMat);\n        for (int i = 0; i < indexMat.total() && i < MAX_RESULTS;\
  \ ++i) {\n            int idx = (int) indexMat.get(i, 0)[0];\n            int labelId\
  \ = tmpClasses.get(idx);\n            Rect box = tmpLocations.get(idx);\n      \
  \      String label = labels.get(labelId);\n            annotateOne(frame, box,\
  \ label);\n        }\n    }\n\n    private void annotateOne(Mat frame, Rect box,\
  \ String label) {\n        Imgproc.rectangle(frame, box, new Scalar(0, 0, 0), 2);\n\
  \        Imgproc.putText(frame, label, new Point(box.x, box.y), Imgproc.FONT_HERSHEY_PLAIN,\
  \ 4.0, new Scalar(0, 0, 0), 3);\n    }\n}\n```\n*清单 4-20* 基于神经网络的检测\n\n现在，你可以使用不同的可用网络运行自己的一组目标检测和实验。清单\
  \ 4-21 展示了如何加载每个主要的基于 Yolo 的网络。\n\n```java\nclass Yolov2 extends YoloDetector {\n\
  \    public Yolov2() {\n        super(\"yolov2/yolov2.weights\", \"yolov2/yolov2.cfg\"\
  );\n    }\n}\n\nclass TinyYolov2 extends YoloDetector {\n    public TinyYolov2()\
  \ {\n        super(\"yolov2-tiny/yolov2-tiny.weights\", \"yolov2-tiny/yolov2-tiny.cfg\"\
  );\n    }\n}\n\nclass Yolov3 extends YoloDetector {\n    public Yolov3() {\n   \
  \     super(\"yolov3/yolov3.weights\", \"yolov3/yolov3.cfg\");\n    }\n}\n\nclass\
  \ TinyYolov3 extends YoloDetector {\n    public TinyYolov3() {\n        super(\"\
  yolov3-tiny/yolov3-tiny.weights\", \"yolov3-tiny/yolov3-tiny.cfg\");\n    }\n}\n\
  ```\n*清单 4-21* 不同 Yolo 网络的 Java 类和构造函数\n\n在树莓派上运行时，Yolo v3 可以检测里斯本繁忙街道上的汽车和行人（图\
  \ 4-19），以及更多的猫（图 4-20）。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig20_HTML.jpg](img/490964_1_En_4_Fig20_HTML.jpg)\n\
  \n*图 4-20* Yolo v3 检测猫\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig19_HTML.jpg](img/490964_1_En_4_Fig19_HTML.jpg)\n\
  \n*图 4-19* Yolo v3 检测汽车和行人\n\n如你所见，标准 Yolo v3 的帧率实际上非常低。\n\n当使用 Yolo v3 Tiny 进行此实验时，你实际上可以达到接近每秒\
  \ 5 到 6 帧，这仍然略低于实时要求，但结果仍然具有非常好的准确性。参见图 4-21。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig21_HTML.jpg](img/490964_1_En_4_Fig21_HTML.jpg)\n\
  \n*图 4-21* TinyYoloV3 检测猫\n\n> *你知道我的方法。它是建立在对琐事的观察之上的。*\n> \n> ——阿瑟·柯南·道尔，《博斯科姆比溪谷秘案》（1891）\n\
  \n你已经读到了本章的最后几行，这是一段漫长的旅程，你了解了在树莓派上使用 Java 和 OpenCV 进行目标检测的大部分概念。\n\n具体来说，你学习了以下内容：\n\
  \n- 如何设置树莓派以进行实时目标检测编程\n- 如何使用过滤器和管道执行图像和实时视频处理\n- 如何为 `Mat` 实现一些基本过滤器，直接用于来自外部设备和基于文件的视频的实时视频流\n\
  - 如何通过类似 Instagram 的过滤器增加一些趣味\n- 如何使用过滤器和管道实现多种目标检测技术\n- 如何运行一个在 Coco 数据集上训练、可在树莓派上实时使用的神经网络\n\
  \n在下一章中，你将了解 Rhasspy（一个语音识别系统），以连接本章介绍的概念，并将其应用于家庭、办公室或猫舍的自动化。\n\n\n"
- "# 5. 视觉与家庭自动化\n\n> *家，是你年轻时渴望离开，年老时渴望回归的地方。*\n> \n> ——约翰·埃德·皮尔斯\n\n本书前四章向你展示了如何接入各种视频流，并先在计算机上进行分析，随后在树莓派这一小型受限设备上进行分析。\n\
  \n最后一章通过将视频部分与语音部分连接起来，在开启各种可能性的同时，弥合了二者之间的差距。\n\n随着苹果 Siri、谷歌助手、亚马逊 Alexa 和微软 Cortona\
  \ 等语音平台的出现，语音辅助服务正遍地开花。人类是语言生物；我们需要表达自己。与设备交互的另一种方式是绘图，就像电影《少数派报告》中那样，但老实说，要做到那样，你需要相当大且昂贵的屏幕。语音则无处不在，而且我们不需要昂贵的工具就能使用它。使用语音直观且赋权。\n\
  \n我个人有很多关于语音助手如何在日常生活中应用的例子。比如，走进一家咖啡店，说“请来一杯双份浓缩肉桂卡布奇诺，送到前露台”，然后当你坐在外面晒太阳时，咖啡就自动做好并送到你面前。\n\
  \n另一个简单的例子：我希望能够走到自动取款机前说：“请从我的主账户取 100 美元，要 5 张 20 美元的钞票。”语音助手能识别你的声音，所以你无需滚动浏览无尽的确认屏幕；直接拿到钞票就行。（我知道，如今有了各种虚拟货币，你其实根本不需要再去自动取款机了，对吧？）\n\
  \n这些是一些日常例子，但你也可以看看科幻电影，里面既有声控的宇宙飞船，也有声控的咖啡机。这意义重大。\n\n那么，我们为什么不使用现有的软件助手（如 Siri）来进行语音识别呢？嗯，所有的大公司基本上都控制着你所有的用户数据，并且可以随时访问通过其管道传输的任何数据。作为最终用户，这可能会很烦人——在创建和设计你自己的解决方案时也同样烦人。但是，你希望能够尽可能多地控制你的数据流向哪里，或者更确切地说，不流向哪里。\n\
  \n因此，在本章中，我们将介绍 Rhasspy（[`https://github.com/synesthesiam/rhasspy`](https://github.com/synesthesiam/rhasspy)）。\n\
  \nRhasspy 是为那些希望拥有家庭助手的语音界面，但又重视隐私和自由的高级用户而创建的。Rhasspy 是免费/开源的，并且可以做到以下几点：\n\n*\
  \ 完全离线运行\n* 与 Home Assistant、Hass.io 和 Node-RED 良好配合\n\n在本章中，我们将执行以下操作：\n\n* 我们将安装并学习如何与\
  \ MQTT 协议和 Mosquitto（一个可用于发送 Rhasspy 识别消息的代理）进行交互。\n* 我们将设置 Rhasspy 界面来监听意图，并在 MQTT\
  \ 队列中查看这些消息。\n* 我们将把这些消息与前几章的内容集成，运行实时视频分析，更新对象检测参数，并使用从 Rhasspy 接收到的语音命令。\n\n##\
  \ Rhasspy 消息流\n\n基本上，Rhasspy 会持续寻找“唤醒词”。当被这些词之一唤醒时，它会记录接下来的句子并将其转换为文字。然后，它会根据它能识别的模式来分析这个句子。最后，如果句子与已知句子匹配，它会返回一个带有概率的结果。\n\
  \n从应用的角度来看，在构建语音应用时，你需要与之交互的主要是消息队列，在大多数物联网场景中，这是一个 MQTT 服务器。MQTT 的开发侧重于遥测测量，因此必须轻量级且尽可能接近实时。Mosquitto\
  \ 是 MQTT 协议的一个开源实现；它轻量、安全，并且专门为服务物联网应用和小型设备而设计。\n\n要进行语音识别，你首先要创建 Rhasspy 命令，或称*意图*，并附带一组句子。每个句子当然是一组单词，并且可以包含一个或多个变量。变量是可以被其他词替换的词，一旦语音引擎完成语音检测，它们就会被赋予相应的值。\n\
  \n在一个简单的天气服务示例中，以下句子：\n\n* 明天*的天气怎么样？\n\n将被定义如下：\n\n* `<when:=datetime>` 的天气怎么样？\n\
  \n这里，`when` 是 `datetime` 类型，可以是诸如*今天*、*明天*、*今天早上*或*下个月第一个星期二*之类的任何内容。\n\n“的天气怎么样”在该命令的上下文中是固定的，永远不会改变。但\
  \ `<datetime>` 位置是一个变量，所以我们给引擎提供其类型的提示，以便更好地识别。\n\n一旦一个意图被识别，Rhasspy 就会在与该意图关联的\
  \ Mosquitto 主题中发布一条 JSON 消息。\n\n我们将在本章中构建的示例是，要求应用高亮显示视频流中检测到的某些对象。\n\n例如，在以下句子中，*猫*是变量容器，我们指定要检测的对象：\n\
  \n* 只显示*猫*！\n\n在这个例子中，当意图被识别后，发送的消息将是一条基于 JSON 的消息，包含以下主要部分：\n\n* 一些消息头，特别是识别出的输入。\n\
  * 自动语音识别（ASR）令牌，或句子中每个单词的置信度。\n* 整体 ASR 置信度。\n* 被识别的意图及其置信度分数。\n* 每个“槽位”（句子中定义的变量）的值及其相关的置信度分数。\n\
  * 还提供了备选意图，尽管我发现它们在大多数情况下不是很有用；因此，寻找次优选择并试图恢复流程通常不值得。\n\n清单 5-1 展示了 JSON 消息的一个示例。\n\
  \n```\n{\n\"sessionId\": \"9d355e0e-218b-4efa-bf36-9c8b13a7df42\",\n...\n\"input\"\
  : \"show me only cats\",\n\"asrTokens\": [\n[\n{\n\"value\": \"show\",\n\"confidence\"\
  : 1,\n\"rangeStart\": 0,\n\"rangeEnd\": 4,\n\"time\": {\n\"start\": 0,\n\"end\"\
  : 0.98999995\n}\n},\n...\n]\n],\n\"asrConfidence\": 0.9476952,\n\"intent\": {\n\"\
  intentName\": \"hellonico:highlight\",\n\"confidenceScore\": 1\n},\n\"slots\": [\n\
  {\n\"rawValue\": \"cats\",\n\"value\": {\n\"kind\": \"Custom\",\n\"value\": \"cats\"\
  \n},\n\"alternatives\": [],\n\"range\": {\n\"start\": 13,\n\"end\": 17\n},\n\"entity\"\
  : \"string\",\n\"slotName\": \"object\",\n\"confidenceScore\": 0.80663073\n}\n],\n\
  \"alternatives\": [\n{\n\"intentName\": \"hellonico:hello\",\n\"confidenceScore\"\
  : 0.28305322,\n\"slots\": []\n},\n...\n]\n}\n清单 5-1\nJSON 消息\n```\n\n来自意图的 JSON\
  \ 消息被发送到 MQTT 代理中一个指定的命名消息队列，每个意图对应一个队列。用于发送意图消息的队列名称遵循以下模式：\n\n```\nhermes/intent/:\n\
  ```\n\n所以，在我们的示例中，它看起来像这样：\n\n```\nhermes/intent/hellonico:highlight\n```\n\n总结一下，图\
  \ 5-1 展示了一个简单的消息流。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig1_HTML.jpg](img/490964_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\nRhasspy 消息流\n\n由于系统的主要交互点是系统队列，让我们先看看如何安装队列代理，然后与之交互。\n\n## MQTT 消息队列\n\
  \n为了能够使用消息队列并接收来自 Rhasspy 的消息，我们将安装消息代理 Mosquitto，这是最广泛使用的 MQTT 代理之一。MQTT 是一种轻量级且节能的协议，可以在消息级别设置不同级别的服务质量。Mosquitto\
  \ 是 MQTT 的一个非常轻量级的实现。\n\n\n\n## 安装 Mosquitto\n\nMosquitto 的安装说明适用于所有平台，下载页面提供了安装程序的链接。\n\
  \n```\nhttps://mosquitto.org/download/\n```\n\n在 Windows 上，你应该下载基于 `.exe` 的安装程序，但其他平台可以通过常规的包管理器获取软件，如下所示：\n\
  \n```\n### 在 macOS 上\nbrew install mosquitto\n### 在 Debian/Ubuntu 上\napt install\
  \ mosquitto\n### 使用 snap\nsnap install mosquitto\n```\n\n安装 Mosquitto 后，你应该检查 Mosquitto\
  \ 服务是否已正确启动并准备好转发消息。例如，在 Mac 上，使用以下命令：\n\n```\n$ brew services list mosquitto\n\
  Name         Status    User   Plist\nmosquitto    started   niko   /Users/niko/Library/LaunchAgents/homebrew.mxcl.mosquitto.plist\n\
  ```\n\n在命令行中，你已经可以使用两个命令：一个用于在指定主题上发布消息，另一个用于订阅指定主题的消息。\n\n## 其他 MQTT 代理的比较\n\n\
  供你参考，你可以在此处找到其他几个 MQTT 代理的比较：[`https://github.com/mqtt/mqtt.github.io/wiki/server-support`](https://github.com/mqtt/mqtt.github.io/wiki/server-support)。\n\
  \nRabbitMQ 是一个强大的开源竞争者，但尽管其集群支持非常稳健，其设置却并不简单。\n\n## 命令行中的 MQTT 消息\n\n安装 Mosquitto\
  \ 后，在命令行中使用 `mosquitto_pub` 命令向代理发送关于任何主题的消息相当容易。例如，以下命令在主题 `hello` 上向位于主机 `0.0.0.0`\
  \ 的代理发送消息 \"I am a MQTT message\"：\n\n```\nmosquitto_pub -h 0.0.0.0 -t hello -m\
  \ \"I am a MQTT message\"\n```\n\n当然，你也有对应的订阅者命令 `mosquitto_sub`，如下所示：\n\n```\n\
  $ mosquitto_sub -h 0.0.0.0 -t hello\nI am a MQTT message\n```\n\n### 发送消息到树莓派\n\n\
  最佳实践是在树莓派上启动队列并从计算机读取消息，反之亦然。\n\n主要问题在于要知道目标机器、计算机或树莓派的 IP 地址或主机名，但发送消息的方式与使用 `mosquitto_pub`\
  \ 和 `mosquitto_sub` 命令相同。\n\n更进一步，你甚至可以在云端运行你的 Mosquitto MQTT 代理，例如，从 [`https://www.cloudmqtt.com/`](https://www.cloudmqtt.com/)\
  \ 这样的服务创建并集成一个队列。\n\n通常，我最喜欢的图形化查看消息方式是使用 MQTT Explorer，这是一个 MQTT 的图形化客户端，如图 5-2\
  \ 所示。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig2_HTML.jpg](img/490964_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n\nMQTT Explorer，I am a MQTT message\n\n你可以从以下位置下载 MQTT Explorer：\n\n```\n\
  https://github.com/thomasnordquist/MQTT-Explorer/releases\n```\n\n它也应该可以通过你喜欢的包管理器获得。\n\
  \n让我们回到发送完整意图消息的等价操作。你可以使用命令行直接将 JSON 文件发送到目标意图队列，正如我们刚刚看到的：`hermes/intent/hellonico:highlight`。\n\
  \n因此，使用 `mosquitto_pub`，可以得到以下命令：\n\n```\nmosquitto_pub -f onlycats.json -h 0.0.0.0\
  \ -t hermes/intent/hellonico:highlight\n```\n\n其中 `onlycats.json` 是包含我们在清单 5-1 中刚刚看到的内容的\
  \ JSON 文件。\n\n如果你仍在运行 MQTT Explorer，你将在相应的队列中看到该消息，如图 5-3 所示。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig3_HTML.jpg](img/490964_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n从命令行发送类似 Rhasspy 的意图消息\n\n我们已经了解了如何从命令行使用 MQTT 进行交互、发布和订阅消息。现在让我们用 Java\
  \ 来做同样的事情。\n\n## Java 中的 MQTT 消息传递\n\n在本节中，我们将向我们的 Java/Visual Studio Code 设置发送消息以及从中接收消息。这将帮助你更轻松地理解消息流。\n\
  \n### 依赖项设置\n\n无论是使用前几章的项目，还是基于项目模板创建一个新项目，我们都将添加一些 Java 库来与 MQTT 消息队列交互并解析 JSON\
  \ 内容。\n\n`pom.xml` 文件中的依赖项部分应如清单 5-2 所示。\n\n```\norg.eclipse.paho\norg.eclipse.paho.client.mqttv3\n\
  1.1.0\n\norigami\norigami\n4.1.2-5\n\norg.json\njson\n\norigami\nfilters\n1.3\n\n\
  清单 5-2\nJava 依赖项\n```\n\n基本上，我们将使用以下第三方库：\n\n*   `origami` 和 `origami-filters` 用于实时视频处理\n\
  *   `org.json` 用于 JSON 内容解析\n*   `mqttv3` 用于与 MQTT 代理交互并处理消息\n\n### 发送基本 MQTT 消息\n\
  \n由于我是在飞越俄罗斯上空的飞机上撰写本书的这一部分，我们将使用 MQTT 协议向我们的俄罗斯间谍同行发送一条快速的 \"hello\" 消息。\n\n为此，我们将执行以下步骤：\n\
  \n1.  创建一个 MQTT 客户端对象，连接到代理运行的主机。\n2.  使用该对象通过 `connect` 方法连接到代理。\n3.  创建一个 MQTT\
  \ 消息，其有效负载由转换为字节的字符串组成。\n4.  发布消息。\n5.  最后，干净地断开连接。\n\n清单 5-3 展示了相当简短的代码片段。\n\n\
  ```\npackage practice;\nimport org.eclipse.paho.client.mqttv3.MqttClient;\nimport\
  \ org.eclipse.paho.client.mqttv3.MqttMessage;\npublic class MqttZero {\npublic static\
  \ void main(String... args) throws Exception {\nMqttClient client = new MqttClient(\"\
  tcp://localhost:1883\", MqttClient.generateClientId());\nclient.connect();\nMqttMessage\
  \ message = new MqttMessage();\nmessage.setPayload(new String(\"good morning Russia\"\
  ).getBytes());\nclient.publish(\"hello\", message);\nclient.disconnect();\n}\n}\n\
  清单 5-3\n你好，俄罗斯\n```\n\n要检查一切是否就绪，请验证消息是否显示在你正在运行的 MQTT Explorer 实例中，如图 5-4 所示。\n\
  \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig4_HTML.jpg](img/490964_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\n\n俄罗斯的 MQTT Explorer\n\n请注意，你当然应该首先监听 `hello` 主题。\n\n### 模拟 Rhasspy 消息\n\
  \n发送等效的 Rhasspy 消息并不会困难太多；我们只需将 JSON 文件的内容读入一个字符串，然后像处理简单字符串一样发送它，如清单 5-4 所示。\n\n\
  ```\npackage practice;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
  import java.util.List;\nimport java.util.stream.Collectors;\nimport org.eclipse.paho.client.mqttv3.MqttClient;\n\
  import org.eclipse.paho.client.mqttv3.MqttMessage;\npublic class Client {\npublic\
  \ static void main(String... args) throws Exception {\nMqttClient client = new MqttClient(\"\
  tcp://localhost:1883\", MqttClient.generateClientId());\nclient.connect();\nList\
  \ nekos = Files.readAllLines(Paths.get(\"onlycats.json\"));\nString neko = nekos.stream().collect(Collectors.joining(\"\
  \\n\"));\nMqttMessage message = new MqttMessage();\nmessage.setPayload(neko.getBytes());\n\
  client.publish(\"hermes/intent/hellonico:highlight\", message);\nclient.disconnect();\n\
  }\n}\n清单 5-4\n来自 Java 的意图消息处理\n\n我们对猫咪永无止境的爱再次在图 5-5 的 MQTT Explorer 窗口中展现。\n\n\
  ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig5_HTML.jpg](img/490964_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n\nMQTT Explorer 窗口中显示的 JSON 文件\n\n\n\n#### JSON 趣谈\n\n在处理来自 MQTT 主题的 Rhasspy\
  \ 消息之前，我们需要先掌握一些 JSON 解析技巧。\n\n显然，在 Java 中有很多解析方法：我们可以手动解析（提示：别这么做），或者使用不同的库。这里我们将使用\
  \ `org.json` 库，因为它处理传入的 MQTT 消息速度相当快。\n\n以下是使用 `org.json` 库解析字符串以获取所需值的步骤：\n\n1.\
  \  使用 JSON 消息的字符串版本创建一个 `JSONObject`。\n2.  使用以下函数之一来导航 JSON 文档：\n    *   `get()`\n\
  \    *   `getJSONObject()`\n    *   `getJSONArray()`\n3.  使用 `getInt`、`getBoolean`、`getString`\
  \ 等方法获取所需的值。\n\n##### 过度设计\n\n大多数时候，Java 被认为很复杂，是因为在某个层级中引入了一个复杂的中件间。实际上，我觉得这门语言如今相当简洁，并且借助各种自动补全和重构工具，开发效率很高。\n\
  \n无论如何，这里我们只是提取消息中的一个值，但你也可以将整个 JSON 消息解组为 Java 对象……甚至为我们创建一个开源库。准备好后请告诉我！\n\n就是这样。应用到我们之前用过的\
  \ `somecats.json` 文件上，如果我们想检索 Rhasspy 识别的值，可以按照清单 5-5 的思路操作。\n\n```\npackage practice;\n\
  import java.nio.file.Files;\nimport java.nio.file.Paths;\nimport java.util.List;\n\
  import java.util.stream.Collectors;\nimport org.json.JSONObject;\npublic class JSONFun\
  \ {\npublic static String whatObject(String json) {\nJSONObject obj = new JSONObject(json);\n\
  JSONObject slot = ((JSONObject) obj.getJSONArray(\"slots\").get(0)).getJSONObject(\"\
  value\");\nString cats = slot.getString(\"value\");\nreturn cats;\n}\npublic static\
  \ void main(String... args) throws Exception {\nList nekos = Files.readAllLines(Paths.get(\"\
  onlycats.json\"));\nString json = nekos.stream().collect(Collectors.joining(\"\\\
  n\"));\nSystem.out.println(whatObject(json));\n}\n}\n清单 5-5\n解析 JSON 内容\n```\n\n\
  ### 监听基本 MQTT 消息\n\n监听消息，或称*订阅*，通过以下步骤完成：\n\n1.  订阅一个主题或父主题。\n2.  添加一个实现 `IMqttMessageListener`\
  \ 接口的监听器。\n\n最简单的订阅代码如清单 5-6 所示。\n\n```\npackage practice;\nimport org.eclipse.paho.client.mqttv3.IMqttMessageListener;\n\
  import org.eclipse.paho.client.mqttv3.MqttClient;\nimport org.eclipse.paho.client.mqttv3.MqttMessage;\n\
  public class Sub0 {\npublic static void main(String... args) throws Exception {\n\
  MqttClient client = new MqttClient(\"tcp://localhost:1883\", MqttClient.generateClientId());\n\
  client.connect();\nclient.subscribe(\"hello\", new IMqttMessageListener() {\n@Override\n\
  public void messageArrived(String topic, MqttMessage message) throws Exception {\n\
  String hello = new String(message.getPayload(), \"UTF-8\");\nSystem.out.println(hello);\n\
  }\n});\n}\n}\n清单 5-6\n来自俄罗斯的爱\n```\n\n请注意，消息处理部分当然可以用 Java lambda 表达式替换，从而使其更具可读性，如清单\
  \ 5-7 所示。\n\n```\nMqttClient client = new MqttClient(\"tcp://localhost:1883\", MqttClient.generateClientId());\n\
  client.connect();\nclient.subscribe(\"hello\", (topic, message) -> {\nString hello\
  \ = new String(message.getPayload(), \"UTF-8\");\nSystem.out.println(hello);\n});\n\
  清单 5-7\n使用 Java Lambda 处理消息\n```\n\n如果你在树莓派上运行所有内容，那么以下 Visual Studio Code 设置将正确完成所有操作并显示俄语消息，如图\
  \ 5-6 所示。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig6_HTML.jpg](img/490964_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6  \n来自俄罗斯的爱\n\n#### 从 Java 向树莓派发送消息\n\n显然，乐趣在于拥有一个分布式系统并处理来自不同地方的消息。这里，尝试在树莓派上运行代理。在发送方代码中设置好树莓派的\
  \ IP 地址后，从你的计算机用 Java 向树莓派发送一条消息。\n\n或者，从树莓派用 Java 向远程代理（或云端）发送一条消息。\n\n### 监听 MQTT\
  \ JSON 消息\n\n那么，现在是时候在 Java 中监听并解析 JSON 消息的内容了，这主要是监听基本消息和实现前面 JSON 趣谈部分的结合。代码片段见清单\
  \ 5-8。\n\n```\npackage practice;\nimport org.eclipse.paho.client.mqttv3.IMqttMessageListener;\n\
  import org.eclipse.paho.client.mqttv3.MqttClient;\nimport org.eclipse.paho.client.mqttv3.MqttMessage;\n\
  import org.json.JSONObject;\npublic class Sub {\npublic static void main(String...\
  \ args) throws Exception {\nMqttClient client = new MqttClient(\"tcp://localhost:1883\"\
  , MqttClient.generateClientId());\nclient.connect();\nclient.subscribe(\"hermes/intent/#\"\
  , new IMqttMessageListener() {\n@Override\npublic void messageArrived(String topic,\
  \ MqttMessage message) throws Exception {\nString json = new String(message.getPayload(),\
  \ \"UTF-8\");\nJSONObject obj = new JSONObject(json);\nJSONObject slot = ((JSONObject)\
  \ obj.getJSONArray(\"slots\").get(0)).getJSONObject(\"value\");\nString cats = slot.getString(\"\
  value\");\nSystem.out.println(cats);\n}\n});\n}\n}\n清单 5-8\n猫咪来了\n```\n\n现在你已经了解了关于键和代理的一切，是时候获取并安装\
  \ Rhasspy 了。\n\n## 语音与 Rhasspy 设置\n\nRhasspy 语音平台需要运行一组服务，才能部署带有意图的应用程序。在本节中，你将首先了解如何安装该平台，然后了解如何创建带有意图的应用程序。\n\
  \n安装 Rhasspy 最简单的方法是通过 Docker（[`https://www.docker.com/`](https://www.docker.com/)），这是一个容器引擎，你可以在其上运行镜像。Rhasspy\
  \ 的维护者已经创建了一个现成的 Rhasspy Docker 镜像，因此我们将利用这一点。\n\n### 准备扬声器\n\n在执行任何语音命令之前，你需要一个可用的麦克风设置。\n\
  \n我们推荐使用 ReSpeaker。如果你有它，可以在这里找到安装说明：\n\n```\nhttp://wiki.seeedstudio.com/ReSpeaker_4_Mic_Array_for_Raspberry_Pi/\n\
  ```\n\n假设你已将扬声器插入树莓派，你可以通过以下简短的 shell 脚本执行必要的模块安装：\n\n```\nsudo apt-get update\n\
  sudo apt-get upgrade\ngit clone https://github.com/respeaker/seeed-voicecard.git\n\
  cd seeed-voicecard\nsudo ./install.sh\nreboot\n```\n\n标准的 USB 麦克风应该是即插即用的，我一直在使用会议室麦克风，效果相当不错。\n\
  \n所以，如果一切正常，麦克风应该会出现在这个 `arecord` 命令的输出列表中：\n\n```\narecord -L\n```\n\n你的 ReSpeaker/树莓派设置应该类似于图\
  \ 5-7 所示。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig7_HTML.jpg](img/490964_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7  \nReSpeaker 指示灯\n\n\n\n### 安装 Docker\n\nDocker 官网最近发布了一篇关于如何在树莓派上设置 Docker\
  \ 的文章；你可以在这里找到它：\n\n```\nhttps://www.docker.com/blog/happy-pi-day-docker-raspberry-pi/\n\
  ```\n\n所有步骤在以下代码中重复列出：\n\n```\n"
- '#   a. 安装以下先决条件。

  sudo apt-get install apt-transport-https ca-certificates software-properties-common
  -y

  '
- '#   b. 下载并安装 Docker。

  curl -fsSL get.docker.com -o get-docker.sh && sh get-docker.sh

  '
- '#   c. 授予 ''pi'' 用户运行 Docker 的权限。

  sudo usermod -aG docker pi

  '
- '#   d. 导入 Docker CPG 密钥。

  sudo curl https://download.docker.com/linux/raspbian/gpg

  '
- '#   e. 设置 Docker 仓库。

  sudo echo "deb https://download.docker.com/linux/raspbian/ stretch stable" >> /etc/apt/sources.list

  '
- '#   f. 修补并更新你的树莓派。

  sudo apt-get update

  sudo apt-get upgrade

  '
- '#   g. 启动 Docker 服务。

  systemctl start docker.service

  '
