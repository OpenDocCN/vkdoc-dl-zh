  \ OpenCV/Java 程序了。\n\n#### 运行第一个 OpenCV 示例\n\n闲话少叙，让我们点击“运行”按钮来执行程序。\n\n点击“运行”按钮会执行与第\
  \ 1 章相同的程序，但这次程序是在树莓派上运行的。输出结果会显示熟悉的 3×3 矩阵，如图 3-34 所示。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig34_HTML.jpg](img/490964_1_En_3_Fig34_HTML.jpg)\n\
