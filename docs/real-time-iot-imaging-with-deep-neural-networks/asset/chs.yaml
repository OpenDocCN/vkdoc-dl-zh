  \n**图 3-1** 树莓派 4、电源适配器、摄像头、屏幕等\n\n### 下载操作系统\n\n没有操作系统，树莓派甚至不会看一眼像马塞尔这样漂亮的猫。树莓派官方网站上提供了几个现成的操作系统。\n\
  \n以下是主要操作系统的简短列表：\n\n*   Ubuntu Mate\n*   Ubuntu Core\n*   Windows 10 IoT Core\n\
  *   Noobs\n*   Raspbian（官方操作系统）\n\nUbuntu Mate 和 Ubuntu Core 是新的不错选择，但我们将专注于官方操作系统\
  \ Raspbian，因为大多数树莓派的文档都基于它。而且它上手也非常简单。\n\nRaspbian 是一个基于 Debian 的操作系统，因此大多数 Linux\
  \ 爱好者会对其感到熟悉，包括其内置的 `aptitude` 包管理器。尽管软件包必须专门为树莓派的 ARM 架构 CPU 编译，但软件包列表非常新，并且大部分与主线\
  \ Debian 保持同步。\n\n为了能够将操作系统用作树莓派可启动的镜像，我们首先需要将镜像文件下载到本地计算机，并创建一个专门用于树莓派的可启动磁盘。\n\
  \n要下载这个非常大的操作系统文件（不要在用手机热点时尝试），请访问 [`https://www.raspberrypi.org/downloads/`](https://www.raspberrypi.org/downloads/)\
  \ 并找到图 3-2 中所示的 Raspbian 图标。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig2_HTML.jpg](img/490964_1_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2** Raspbian 图标\n\n点击该图标。你将进入 Raspbian 专属的下载页面，如图 3-3 所示，你可以在其中找到要下载的 zip\
  \ 文件链接。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig3_HTML.jpg](img/490964_1_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3** Raspbian 的种子或 zip 文件\n\n我们不需要完整的桌面安装和所有推荐的软件，但为了简化操作，“带桌面的 Raspbian\
  \ Buster”版本目前对我们来说就足够了。\n\n### 创建可启动 SD 卡\n\n将操作系统文件下载到计算机后，你就可以创建可启动设备了。正如树莓派网站上所述，将操作系统安装到树莓派上最简单的方法是使用\
