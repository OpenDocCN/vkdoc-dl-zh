  \n图 3-31\n\n再次查找 Java 扩展包\n\n现在，你的编辑器应该会直接显示熟悉的“运行”和“调试”链接，如图 3-33 所示。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig33_HTML.jpg](img/490964_1_En_3_Fig33_HTML.jpg)\n\
