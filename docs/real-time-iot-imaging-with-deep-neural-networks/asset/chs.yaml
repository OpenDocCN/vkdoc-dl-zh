  \n**图 3-9** 别害怕……\n\n卡已经准备好了，现在让我们插上树莓派的线缆吧。\n\n\n\n#### 连接线缆\n\n> *电是危险的。我的侄子曾试图把一枚硬币塞进插座。说“一分钱走不远”的人，真该看看他当时被弹飞出去的样子。我告诉他，他被“接地”了。*\n\
  > \n> ——蒂姆·艾伦\n\n我发现把各种线缆插接在一起既有趣又放松，实际上，这甚至可以用于个人心理治疗，来应对我们所处的这个艰难世界。\n\n表 3-2\
