    *This book is dedicated to three very special cats: Marcel, Otto, and Mofu.*


    *They probably will never read this book…but maybe they will sleep on it.*


    # Introduction


    My grandfather, of Polish origins, used to cook, make, build, plant, grow, and
    create everything with his own two hands. He also loved to share with adults and
    children alike how he was doing all these creative tasks. As a child, I was always
    impressed by his “If I don’t have it, I will try to make it myself” attitude.
    He put in the time and the effort to make something original all the time.


    One of the cutest memories I have is of us walking in the garden in the cold winter.
    We saw some birds looking for tiny pieces of food. We tried to give them French
    bread and grains, but they would not, or maybe could not, get to them because
    of the freezing winter cold. So, he proposed we build a wooden house for the birds
    so they could come and eat the grains while being protected from the winds. And
    so we did. We spent the day grabbing dry wood around the nearby river and cleaning,
    drying, sawing, polishing, and assembling it so it would eventually look like
    the house in Figure [I-1](#490964_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig1).


    ![../images/490964_1_En_BookFrontmatter_Fig1_HTML.jpg](images/490964_1_En_BookFrontmatter_Fig1_HTML.jpg)


    Figure I-1 Bird house


    This book is not actually about building bird houses, but it is about making things
    by yourself or, indeed, coming up with ideas and shaping them into something useful
    for other people (instead of birds).


    With the Internet of Things (IoT), you can use an existing development kit to
    empower you to create something in no time. In fact, big tech companies have provided
    so many of these development kits that it’s hard to choose one and get started.


    Those kits, while easy to use, create a dependency on the whole kit environment,
    such that working without one is hard. Moving away from them is almost impossible
    unless you redesign and rebuild everything you created from scratch.


    Speaking of “scratch,” a few years ago, Arduino came out. It’s a small Italian-made
    embedded board that you can easily connect to sensors, rotors, motors, and wireless
    networks. You can use Arduino to easily write the custom logic needed to interact
    with all the development kits previously mentioned (Figure [I-2](#490964_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig2)).


    ![../images/490964_1_En_BookFrontmatter_Fig2_HTML.jpg](images/490964_1_En_BookFrontmatter_Fig2_HTML.jpg)


    Figure I-2 Arduino


    Arduino can be programmed in C, Scratch4Arduino, or S4A ([`http://s4a.cat`](http://s4a.cat)),
    which is a modified version of the Scratch graphical environment that compiles
    code for Arduino and is shown in Figure [I-3](#490964_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig3).


    ![../images/490964_1_En_BookFrontmatter_Fig3_HTML.jpg](images/490964_1_En_BookFrontmatter_Fig3_HTML.jpg)


    Figure I-3 Scratch for Arduino


    In the world of dedicated hobbyists, Arduino was a breath of fresh air. It created
    an open source, free, unified ecosystem of libraries and connectors to plug things
    together. Users of the platform exchanged and competed for ideas in newly created
    labs within universities or renovated factory buildings.


    I remember many years ago going to my friend’s open source, open hardware lab
    in Shanghai where they were moving robots around and re-creating arcade game rooms
    with old-school games.


    While that was fun for real geeks, others may have felt they were left out a bit.
    The learning curve was just a bit high, and the power of Arduino made it so that
    running anything but C code was not practical.


    Then, from England came the Raspberry Pi, a full-blown computer that could be
    held in your hands. At around $40 USD, it was an expensive purchase for students,
    but it provided some massively capable hardware. Hobbyists bought tons of those
    little devices. The Raspberry Pi 2 was quite a big jump in specifications compared
    to the Arduino. The biggest difference for the end user, aside from the connectors,
    was that you could finally run a full-blown operating system and get some standardization
    between the different components. Raspberry 3, especially model B, had 1Gb of
    memory, meaning you could run Java applications nicely with good performance.
    The underlying ARM-based processor was still quite limited in real-time computation,
    though.


    Fast-forward to 2019: the Raspberry 4, a small computer with the same size and
    tag price, is a beast. In fact, Japan, not an EU member yet, bought a license
    in September 2019 to officially make the device usable within its borders. The
    Japan government went through the effort mostly because the Wi-Fi and Bluetooth
    modules embedded in the device allow for military-level spying and should be monitored
    carefully. Just kidding. But some extra checks are still officially required on
    those small devices.


    So, what’s new with version 4? The main difference is power, both CPU and memory-wise;
    it also has various video-rendering upgrades. But isn’t that what every salesperson
    will tell you to get you to buy their latest and greatest version?


    Well, yes and no. While in previous versions you could run Java processes and
    enjoy quite a bit of speed, the Raspberry Pi 4 is fast enough and powerful enough
    that you can run real-time object detection on real-time video streams. That is
    a game-changer and the very reason for this book: it is now possible to have some
    video fun by simply using the Java wrappers for OpenCV.


    OpenCV ([`https://opencv.org/`](https://opencv.org/)), as you may know or not
    know, is one of the most used open source imaging libraries. Its license, Berkley
    Software Distribution (BSD), is permissive enough that you can deploy OpenCV in
    source or binary form anywhere. OpenCV is also widely available for the Android
    operating system, where similar Java bindings are also heavily in use. The main
    supported code for OpenCV is C, and there is support for every other programming
    language to access OpenCV by simply creating bindings around the OpenCV native
    binaries, so in theory the small overhead introduced by the Java wrapping layer
    should not cause additional problems of speed.


    So, now we have a rather cheap device that can be coded using the Java language
    and therefore connect to most of the available libraries and still run real-time
    processing on videos.'
