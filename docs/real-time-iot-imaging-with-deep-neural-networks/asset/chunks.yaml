- fmt: "### Watch an Expression\n\nYou may have noticed the `Watch` tab on the left\
    \ side of the editor and may already have wondered what it is for.\n\nOn the top-left\
    \ `Variables` tab, you can see the direct values of objects and fields, but on\
    \ the `Watch` tab you can add function calls on all the available objects, in\
    \ what is called a *watch expression*. Watch expressions can be defined before\
    \ the variable or the object is instantiated.\n\nIn object vision, and while doing\
    \ direct rendering, you can use a watch expression to produce some side effects,\
    \ create functions to, for example, turn the input picture from colored to black\
    \ and white, or quickly create a contour-only version of an image. You can, of\
    \ course, do all this in real time, but in the coming chapters we will be working\
    \ with low processing power and memory, so briefly pausing the code execution\
    \ and using a one-off call to a watch expression is definitely better to keep\
    \ the extra memory and computation to a minimum.\n\nIn this first chapter, we\
    \ will add simple computations on the watch expression—one with no side effect\
    \ directly returning a value based on the input parameters and one with a side\
    \ effect printing to a log file.\n\nWe’ll start from the code sample in Listing\
    \ [1-3](#490964_1_En_1_Chapter.xhtml#PC5), which is simply looping over a value\
    \ that is incremented in a `while` loop. We do not want to burn up the computer\
    \ while doing this, so we’ll add a short sleep call inside the loop to give some\
    \ time to the execution loop.\n\n```\npublic class Second {\npublic static void\
    \ main(final String[] args) throws Exception {\nint i = 0;\nwhile (true) {\ni++;\n\
    Thread.sleep(500);\n}\n}\n}\nListing 1-3\nThe Incredible Loop Over an Integer\n\
    ```\n\nWe’ll add the expression `i+2` in the watch expression and start the debugging\
    \ session without actually setting a breakpoint yet.\n\nAfter waiting some time,\
    \ let’s click to add a breakpoint on line 6 and see the editor stop as if we had\
    \ set the breakpoint before starting the execution.\n\nThe Visual Studio Code\
    \ layout will look like Figure [1-28](#490964_1_En_1_Chapter.xhtml#Fig28).\n\n\
    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig28_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig28_HTML.jpg)\n\
    \nFigure 1-28\n\nThe incredible loop in Debug mode\n\nBy clicking and creating\
    \ a breakpoint, you have just stopped the execution, and the debug layout appears.\
    \ As you can see, the variable `i` already has a value of 7, and the watch expression\
    \ of `i+2` is showing the correct value of 9.\n\nNice.\n\nNow for some exercises\
    \ that you can try on your own. Try implementing two functions and use them inside\
    \ two watch expressions.\n\n*   One function will just do a basic computation\
    \ on the variable `i` and display it.\n\n*   Another function will not return\
    \ anything but append a value to an external file.\n\nThis should take around\
    \ 5–10 minutes of your time. Good luck! Once you’re finished, you can read and\
    \ compare your code with Listing [1-4](#490964_1_En_1_Chapter.xhtml#PC6).\n\n\
    ```\nimport java.io.BufferedWriter;\nimport java.io.FileWriter;\nimport java.io.Writer;\n\
    public class SecondFinal {\nstatic int myfunction1(final int i) {\nreturn 3 +\
    \ i + 2;\n}\nfinal static String filePath = \"my.log\";\nstatic void myfunction2(final\
    \ int i) {\ntry (Writer writer = new BufferedWriter(new FileWriter(filePath)))\
    \ {\nwriter.write(String.format(\">> %d\\n\", i));\n} catch (Exception e) {\n\
    }\n}\npublic static void main(final String[] args) throws Exception {\nint i =\
    \ 0;\nwhile (true) {\ni++;\nThread.sleep(500);\n}\n}\n}\nListing 1-4\nWatched\
    \ Expressions with Side Effects, and No Side Effect\n```\n\nThe different watch\
    \ expressions are showing as expected on the left side in the debugging layout\
    \ of Visual Studio Code (Figure [1-29](#490964_1_En_1_Chapter.xhtml#Fig29)).\n\
    \n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig29_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig29_HTML.jpg)\n\
    \nFigure 1-29\n\nWatch expression\n\nThat wasn’t so hard, was it? Now the good\
    \ news is that you can reuse those techniques when working with the imaging library\
    \ OpenCV. For example, you can do the following:\n\n*   Output the width and height,\
    \ as well as the number of color channels of an image\n\n*   Output the Hough\
    \ lines of an image in an external file\n\n*   Output the number of detected faces\
    \ in an image\n\nRemember, you can add watch expressions after starting the code\
    \ execution in Debug mode, so add them any time you need them.\n\n### Change a\
    \ Variable Value\n\nOne last thing to know about debugging in Visual Studio Code\
    \ before being done is that you can change the value of a variable in real time,\
    \ straight from the `Variables` tab.\n\nNow that is some superpower!\n\nYou can\
    \ do this by double-clicking the variable value you would like to change, as shown\
    \ in Figure [1-30](#490964_1_En_1_Chapter.xhtml#Fig30).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig30_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig30_HTML.jpg)\n\
    \nFigure 1-30\n\nUpdating a variable value\n\nObserve how the related watch expressions\
    \ are being recomputed for you in Figure [1-31](#490964_1_En_1_Chapter.xhtml#Fig31).\n\
    \n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig31_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig31_HTML.jpg)\n\
    \nFigure 1-31\n\nYou can see the related watch values being updated\n\nSweet.\
    \ In the context of imaging and neural networks, you can directly update alpha,\
    \ gamma, contrast, etc., directly and have the recomputed images or detection\
    \ happen in real time.\n\n### Wrapping Things Up\n\nWe spent a bit of time learning\
    \ about debugging, so picture how much can be done by reusing the techniques you\
    \ have just seen in the context of imaging and object detection.\n\nFor example,\
    \ Figure [1-32](#490964_1_En_1_Chapter.xhtml#Fig32) shows how a well-designed\
    \ debugging layout can be used as a full user interface to update values for a\
    \ sepia conversion.\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig32_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig32_HTML.jpg)\n\
    \nFigure 1-32\n\nMarcel the cat in sepia\n\nIn this layout, you can see the following:\n\
    \n*   The array of values used to recompute the sepia has been extracted in the\
    \ main code as a double array.\n\n*   While debugging, the `rgb` array and its\
    \ values are available on the `Variables` tab and can be updated at will.\n\n\
    *   The `sepia` function here is used only as a debugging function, not in the\
    \ main code.\n\n*   That `sepia` function outputs a picture in a file named `sepia.jpg`.\n\
    \n*   A watch expression is added, making a simple call to the `sepia` function\
    \ defined earlier.\n\n*   The `sepia.jpg` picture is opened within Visual Studio\
    \ Code, and any update of values in the `rgb` array will output a new picture\
    \ in real time.\n\nNow that you have an idea of how things can be worked on from\
    \ within Visual Code Studio, let’s move on to some OpenCV fun.\n\n# 2. Object\
    \ Detection in Video Streams\n\nMost of the available how-to guides for working\
    \ with OpenCV in Java require you to have an insane amount of knowledge before\
    \ getting started. The good news for you is that with what you have learned up\
    \ to now with this book, you can get started with OpenCV in Java in seconds.\n\
    \n## Going Sepia: OpenCV Java Primer\n\n> *Choosing sepia is all to do with trying\
    \ to make the image look romantic and idealistic. It’s sort of a soft version\
    \ of propaganda.*\n> \n> —Martin Paar^([¹](#fn1))\n\nIn this section, you will\
    \ be introduced to some basic OpenCV concepts. You’ll learn how to add the files\
    \ needed for working with OpenCV in Java, and you’ll work on a few simple OpenCV\
    \ applications, like smoothing, blurring images, or indeed turning them into sepia\
    \ images."
