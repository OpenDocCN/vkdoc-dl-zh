  raw: 'In this book, we will perform some basic OpenCV analysis first, in Java, and
    then we will move on to analyzing real-time videos. The goal of this book is to
    get you started working on small devices and connecting the different pieces,
    such as the code, the language, the connectivity setup, together. Then we’ll move
    on to the fun things.


    One other novelty in this book is that instead of accessing the Raspberry Pi physically
    and running on top of it, we will go through a Secure Shell (SSH) connection to
    do our coding.


    What does that mean, and why would we do that?


    This means we want the editor where we write the Java code to be running somewhere
    other than on the Raspberry Pi itself. We want to do this to keep as many Raspberry
    Pi resources as possible doing the image and video processing for the device while
    running only the minimum amount of software.


    At the same time, we want to have the ease of not recompiling everything, like
    is often necessary in Java, while having everything seem to be executing directly
    from our editor. This part is being made possible by the excellent work done by
    Microsoft in the Visual Studio Code Editor and its latest plug-in, the Remote
    SSH plugin (Figure [I-4](#490964_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig4) ).


    ![../images/490964_1_En_BookFrontmatter_Fig4_HTML.jpg](images/490964_1_En_BookFrontmatter_Fig4_HTML.jpg)


    Figure I-4


    Visual Studio Code Remote SSH plugin


    Finally, we will look into connecting to home automation software, especially
    via voice.


    Rhasspy ( [`https://rhasspy.readthedocs.io`](https://rhasspy.readthedocs.io) )
    will be our open source software of choice. You will be using your newly acquired
    video streams knowledge to plug in voice commands and object detection. You eventually
    will be able to start automating your home by recognizing when your cat enters
    the kitchen, turning on the light for the kids when they wake up in the morning,
    or automatically starting the vacuuming robot when you leave the house.


    This book is divided broadly into five chapters, with progressive challenges.


    Chapter [1](#490964_1_En_1_Chapter.xhtml) focuses on getting the pieces working
    on a standard computer, writing the Java code to run basic image processing with
    OpenCV, and understanding how the different pieces of software fit together.


    Chapter [2](#490964_1_En_2_Chapter.xhtml) takes you from processing images to
    analyzing video streams, while running feature-based and network-based object
    detection on pictures and videos.


    Chapter [3](#490964_1_En_3_Chapter.xhtml) shows how to run code on the Raspberry
    Pi and will thus focus on doing the bare minimum needed to get the setup functional.


    Chapter [4](#490964_1_En_4_Chapter.xhtml) helps you run on-board applications,
    focusing mostly on object detection in real-time video streams, both recorded
    and live.


    Finally, Chapter [5](#490964_1_En_5_Chapter.xhtml) expands the Raspberry Pi setup
    to a home automation application, where we plug in voice commands to video streaming
    analyses.


    Acknowledgments


    Thank you to Mei and Manon, for your love, energy, and smiles.


    Thank you to my grandparents, because you are the source of life and the profound
    inspiration for this book.


    Thank you to all my family—parents, brothers, sisters, faraway cousins, aunts,
    and uncles; even though I’m so far away, you always give invaluable love, care,
    and support.


    Thank you, Parrain; I have one special line for you, because I’m trying to live
    by your high moral standards, and it is f∗∗∗ hard.


    Thank you, Diyya; I could feel you looking over my shoulder to see whether I was
    working on this or not. Wait, are you still looking?


    Thank you, Nikhil, for kick-starting this.


    Thank you, David, for your patience through all those “Nico, ca marche pas ton
    truc.”


    Thank you, Rita, for your support, understanding, and letting me keep all those
    carefully chosen quotes.


    Thank you, Lemons, because you musically squeeze so well.


    Thank you, soccer friends, because I would be fat and lazy if you were not there.


    Thank you, Karabiner team, because you make me realize everyone is so different,
    but everyone has an important part to play to win the game.


    Thank you to friends around the world—the ones still here but also the ones who
    parted. Each encounter is an inspiration.


    Finally, thank you, Yoko, for spitting wine on my brand new costume and still
    managing to make it so beautifully romantic.


    About the Author About the Technical Reviewer


    # 1. Getting Started


    One of the goals of this book is to get you ready to perform real-time IoT imaging
    quickly, avoiding a lengthy installation process. Being ready quickly doesn’t
    mean we are going to take any shortcuts, it means we will get the tooling part
    out of the way so we can focus on the creation process.


    In this chapter, you’ll run your first example.'
  trans: '

    # 在本书中，我们将首先使用 Java 执行一些基础的 OpenCV 分析，然后继续分析实时视频。本书的目标是让你能够在小设备上开展工作，并将代码、语言、连接设置等不同部分整合起来。接着，我们将进入更有趣的部分。


    本书的另一项创新在于，我们不会直接在树莓派上物理访问并运行程序，而是通过安全外壳（SSH）连接来进行编码。


    这意味着什么？我们为什么要这样做？


    这意味着我们希望编写 Java 代码的编辑器运行在树莓派之外的其他地方。我们这样做是为了尽可能多地保留树莓派的资源，用于设备上的图像和视频处理，同时只运行最少的软件。


    同时，我们希望避免像 Java 中常见的那样需要重新编译所有内容，同时让一切看起来像是直接从我们的编辑器中执行。这部分得益于微软在 Visual Studio
    Code 编辑器及其最新插件——远程 SSH 插件（图 I-4）中的出色工作。


    ![../images/490964_1_En_BookFrontmatter_Fig4_HTML.jpg](img/490964_1_En_BookFrontmatter_Fig4_HTML.jpg)


    **图 I-4** Visual Studio Code 远程 SSH 插件


    最后，我们将探讨如何连接到家庭自动化软件，尤其是通过语音。


    Rhasspy（[`https://rhasspy.readthedocs.io`](https://rhasspy.readthedocs.io)）将是我们选择的开源软件。你将利用新获得的视频流知识，接入语音命令和物体检测。最终，你将能够通过识别猫咪何时进入厨房、在孩子早上醒来时为他们开灯，或者在你离开家时自动启动扫地机器人，来开始实现家庭自动化。


    本书大致分为五个章节，挑战难度逐步递增。


    第 1 章侧重于让各个部分在标准计算机上运行，编写 Java 代码以使用 OpenCV 进行基础图像处理，并理解不同软件组件如何协同工作。


    第 2 章将带你从处理图像过渡到分析视频流，同时在图片和视频上运行基于特征和基于网络的物体检测。


    第 3 章展示了如何在树莓派上运行代码，因此将重点放在使设置功能正常所需的最基本操作上。


    第 4 章帮助你运行板载应用程序，主要关注实时视频流（包括录制的和实时的）中的物体检测。


    最后，第 5 章将树莓派的设置扩展到家庭自动化应用，我们将语音命令接入视频流分析。


    ## 致谢


    感谢 Mei 和 Manon，感谢你们的爱、活力和笑容。


    感谢我的祖父母，因为你们是生命的源泉，也是本书的深刻灵感来源。


    感谢我所有的家人——父母、兄弟、姐妹、远方的表亲、阿姨和叔叔们；尽管我离得很远，你们总是给予我无价的爱、关怀和支持。


    感谢你，Parrain；我为你留了特别的一行，因为我正努力遵循你高尚的道德标准，而这真的**非常**困难。


    感谢你，Diyya；我能感觉到你在我身后探头，看我是否在写这本书。等等，你还在看吗？


    感谢你，Nikhil，是你启动了这一切。


    感谢你，David，感谢你忍受了所有那些“Nico，你的东西又不行了”的抱怨。


    感谢你，Rita，感谢你的支持、理解，并允许我保留所有那些精心挑选的引语。


    感谢你，Lemons，因为你的音乐如此美妙地融入其中。


    感谢我的足球朋友们，因为如果没有你们，我可能会变得又胖又懒。


    感谢 Karabiner 团队，因为你们让我意识到每个人都是如此不同，但每个人在赢得比赛中都扮演着重要的角色。


    感谢世界各地的朋友们——那些还在身边的，以及那些已经离去的。每一次相遇都是一次灵感。


    最后，感谢你，Yoko，谢谢你把我崭新的衣服喷上了红酒，却依然让它变得如此浪漫美好。


    ## 关于作者

    ## 关于技术审校


    # 1. 入门指南


    本书的目标之一是让你能够快速进行实时物联网成像，避免冗长的安装过程。快速上手并不意味着我们会走任何捷径，而是意味着我们将扫清工具配置方面的障碍，以便专注于创作过程。


    在本章中，你将运行第一个示例。

