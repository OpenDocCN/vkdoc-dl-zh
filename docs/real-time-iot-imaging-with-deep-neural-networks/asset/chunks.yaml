    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig25_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig25_HTML.jpg)


    Figure 1-25


    Expanded variables


    In Figure [1-25](#490964_1_En_1_Chapter.xhtml#Fig25) you can see for yourself
    that the `Date` object has a field named `cdate`, and you can see recursively
    all the fields of that field.


    ### Resume Execution


    To resume or finish the execution from the breakpoint, you have a few options
    that are available in the runtime bar located at the top of the editor while doing
    a debugging session (Figure [1-26](#490964_1_En_1_Chapter.xhtml#Fig26)).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig26_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig26_HTML.jpg)


    Figure 1-26


    Execution commands


    From left to right you can perform actions explained in Table [1-1](#490964_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    Debugging Actions


    | Icon | Action | Comments |

    | --- | --- | --- |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figa_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Figa_HTML.jpg)
    | Resume | This will tell the execution to go to either the end of the program
    or the next breakpoint without stopping. |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figb_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Figb_HTML.jpg)
    | Step Over | This executes all the code on the current line, goes to the next
    line of code, and then stops again. |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figc_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Figc_HTML.jpg)
    | Step Inside | This goes inside each block of execution, so in the previous example,
    on the first stop, the execution will go inside the format function and then stop.
    |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figd_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Figd_HTML.jpg)
    | Step outside | This goes to the outer part of the code, so if you were currently
    in the format function, then this goes back to the original `main()` function.
    |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fige_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fige_HTML.jpg)
    | Restart | This stops all the debugging and restarts from scratch. |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figf_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Figf_HTML.jpg)
    | Stop | This stops the code execution. |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figg_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Figg_HTML.jpg)
    | Hot Code Replace | This updates the code in the runtime, with code from the
    editor. Real-time coding! |


    The action you will use most of the time is Step Over, which just executes the
    code line by line. This gives you a good overview of the variables that have been
    changed and the newly assigned variables and their values. See Figure [1-27](#490964_1_En_1_Chapter.xhtml#Fig27).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig27_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig27_HTML.jpg)


    Figure 1-27


    Next line


    Going to the next line and then to the next one will eventually finish the program
    execution, ideally with the proper message printed in the terminal window.'
  trans: '

    ### 添加断点


    顾名思义，断点就是一个暂停的时间点。当鼠标移动到行号左侧时，它会在编辑器中显示为一个红点（图 1-21）。


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig21_HTML.jpg](img/490964_1_En_1_Fig21_HTML.jpg)


    图 1-21 断点


    要创建断点，只需单击你想要停止执行的那一行代码的行号。请注意，断点会在该行代码执行之前停止代码，因此，在第 5 行添加断点，当执行停止时不会显示 `Date`
    对象，但在第 6 行添加一个点则会显示，如图 1-21 所示。


    ### 逐步执行代码


    单击“调试”链接将以调试模式启动执行，并在第一个断点处（即你刚刚在第 6 行添加的那个）停止，此时编辑器将显示一个略有不同的布局，如图 1-22 所示。


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig22_HTML.jpg](img/490964_1_En_1_Fig22_HTML.jpg)


    图 1-22 暂停


    在左侧，你可以在小的“调用堆栈”选项卡上看到代码执行停止的位置；这里是在 `First` 类的 `main` 方法中的第 6 行（图 1-23）。


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig23_HTML.jpg](img/490964_1_En_1_Fig23_HTML.jpg)


    图 1-23 我在哪里？


    你还可以看到变量 `d` 的值，它是一个 `Date` 对象；如果程序有输入参数，你也可以看到它们；这里你看到的是一个空数组（图 1-24）。


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig24_HTML.jpg](img/490964_1_En_1_Fig24_HTML.jpg)


    图 1-24 变量


    当然，你可以使用不同的箭头来逐个递归地展开每个变量的内容及其字段，如图 1-25 所示。


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig25_HTML.jpg](img/490964_1_En_1_Fig25_HTML.jpg)


    图 1-25 展开的变量


    在图 1-25 中，你可以亲眼看到 `Date` 对象有一个名为 `cdate` 的字段，并且你可以递归地看到该字段的所有子字段。


    ### 恢复执行


    要从断点处恢复或完成执行，你可以在调试会话期间编辑器顶部的运行时栏中找到几个可用选项（图 1-26）。


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig26_HTML.jpg](img/490964_1_En_1_Fig26_HTML.jpg)


    图 1-26 执行命令


    从左到右，你可以执行表 1-1 中说明的操作。


    表 1-1 调试操作


    | 图标 | 操作 | 说明 |

    | --- | --- | --- |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figa_HTML.jpg](img/490964_1_En_1_Figa_HTML.jpg)
    | 恢复 | 这将指示执行继续，直到程序结束或遇到下一个断点，中间不会停止。 |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figb_HTML.jpg](img/490964_1_En_1_Figb_HTML.jpg)
    | 单步跳过 | 这将执行当前行的所有代码，然后转到下一行代码并再次停止。 |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figc_HTML.jpg](img/490964_1_En_1_Figc_HTML.jpg)
    | 单步进入 | 这将进入每个执行块内部。因此，在前面的例子中，在第一次停止时，执行将进入 `format` 函数内部然后停止。 |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figd_HTML.jpg](img/490964_1_En_1_Figd_HTML.jpg)
    | 单步跳出 | 这将跳转到代码的外部部分。因此，如果你当前在 `format` 函数内部，那么这将返回到原始的 `main()` 函数。 |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fige_HTML.jpg](img/490964_1_En_1_Fige_HTML.jpg)
    | 重启 | 这将停止所有调试并从零开始重新启动。 |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figf_HTML.jpg](img/490964_1_En_1_Figf_HTML.jpg)
    | 停止 | 这将停止代码执行。 |

    | ![../images/490964_1_En_1_Chapter/490964_1_En_1_Figg_HTML.jpg](img/490964_1_En_1_Figg_HTML.jpg)
    | 热代码替换 | 这将使用编辑器中的代码更新运行时的代码。实时编码！ |


    你最常使用的操作是“单步跳过”，它只是逐行执行代码。这可以让你很好地概览哪些变量已被更改，以及新分配的变量及其值。见图 1-27。


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig27_HTML.jpg](img/490964_1_En_1_Fig27_HTML.jpg)


    图 1-27 下一行


    继续执行下一行，再下一行，最终将完成程序的执行，理想情况下，终端窗口中会打印出正确的消息。

