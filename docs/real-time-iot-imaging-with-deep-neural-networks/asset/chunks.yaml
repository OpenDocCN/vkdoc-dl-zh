    ## 应用类似 Instagram 的滤镜


    严肃的工作到此为止。让我们稍作休息，用一些类似 Instagram 的滤镜来玩一玩。


    ### 颜色映射


    让我们从使用 `ImgProc` 中的 OpenCV `colormap` 函数开始这个有趣的章节。我们将 `colormap` 的参数移到构造函数中，如清单
    4-9 所示，这样我们就可以通过调试屏幕来更新它。


    ```

    class Color implements Filter {

    int colormap = 0;

    public Color(int colormap) {

    this.colormap = colormap;

    }

    public Color() {

    this.colormap = Imgproc.COLORMAP_INFERNO;

    }

    public Mat apply(Mat img) {

    Mat threshed = new Mat();

    Imgproc.applyColorMap(img, threshed, colormap);

    return threshed;

    }

    }

    ```


    清单 4-9：颜色映射


    要实例化过滤器，我们需要传入想要使用的颜色映射，因此这直接在构造函数中完成。这里我们需要的是实例化后的过滤器，而不仅仅是它的类，因此我们使用 `Pipeline`
    类的第二个构造函数，将实例化后的 `Filter` 对象传递给构造函数。


    ```

    Filter filter = new Pipeline(new Color(Imgproc.COLORMAP_INFERNO), new FPS());

    ```


