- fmt: '### Cartoon


    This naïve implementation of a Cartoon effect takes the important feature-defining
    lines of the base picture and, after applying a smoothing effect and a blur effect,
    applies a threshold on each pixel value. Then it combines the result of those
    operations, as shown in Listing [4-12](#490964_1_En_4_Chapter.xhtml#PC16).


    ```

    class Cartoon implements Filter {

    public int d = 17;

    public int sigmaColor = d;

    public int sigmaSpace = 7;

    public int ksize = 7;

    public double maxValue = 255;

    public int blockSize = 19;

    public int C = 2;

    public Mat apply(Mat inputFrame) {

    Mat gray = new Mat();

    Mat co = new Mat();

    Mat m = new Mat();

    Mat mOutputFrame = new Mat();

    Imgproc.cvtColor(inputFrame, gray, Imgproc.COLOR_BGR2GRAY);

    Imgproc.bilateralFilter(gray, co, d, sigmaColor, sigmaSpace);

    Mat blurred = new Mat();

    Imgproc.blur(co, blurred, new Size(ksize, ksize));

    Imgproc.adaptiveThreshold(blurred, blurred, maxValue, Imgproc.ADAPTIVE_THRESH_MEAN_C,
    Imgproc.THRESH_BINARY,

    blockSize, C);

    Imgproc.cvtColor(blurred, m, Imgproc.COLOR_GRAY2BGR);

    Core.bitwise_and(inputFrame, m, mOutputFrame);

    return mOutputFrame;

    }

    }

    Listing 4-12

    Cartoon Filter

    ```


    Applying the Cartoon filter on the video stream gives you an effect like in Figure
    [4-10](#490964_1_En_4_Chapter.xhtml#Fig10).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig10_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Cartoon effect


    ### Pencil Effect


    I love the Pencil effect, obtained by calling the `pencilSketch` method from the
    core OpenCV `Photo` class. Unfortunately, it is much too slow to apply in real
    time on the Raspberry Pi. It does give some pretty results with hardly any implementation
    effort, though. See for yourself in Listing [4-13](#490964_1_En_4_Chapter.xhtml#PC17).


    ```

    class PencilSketch implements Filter {

    float sigma_s = 60;

    float sigma_r = 0.07f;

    float shade_factor = 0.05f;

    boolean gray = false;

    @Override

    public Mat apply(Mat in) {

    Mat dst = new Mat();

    Mat dst2 = new Mat();

    pencilSketch(in, dst, dst2, sigma_s, sigma_r, shade_factor);

    return gray ? dst : dst2;

    }

    }

