- fmt: "# Visual Studio Code Primer\n\n> *You can’t knock on opportunity’s door and\
    \ not be ready.*\n> \n> —Bruno Mars\n\nThe playground setup introduced in this\
    \ book is fairly standard for people who are used to writing code. It also has\
    \ a little bit of a “new kid on the block” feeling—only the cool kids use it.\
    \ The *stack*, or the environment, we will use consists of the following:\n\n\
    * Visual Studio Code, a small but pluggable text editor\n* The Java Development\
    \ Kit and its runtime, so we can write Java code and run it\n* A Java plugin to\
    \ Visual Studio Code so that the editor understands the Java code and runs it\n\
    \nBasically, that’s all.\n\nIt does not really matter whether you’re using Windows,\
    \ Mac, or Linux. All the different pieces of XX are made to run anywhere. To install\
    \ Visual Studio Code, you need to head to [`https://code.visualstudio.com/`](https://code.visualstudio.com/).\n\
    \nClick the download button on the top-right side of the page. After you click\
    \ the button, you’ll be presented with options for the different packages, one\
    \ for each computer platform, as shown in Figure [1-1](#490964_1_En_1_Chapter.xhtml#Fig1).\n\
    \n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig1_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1\n\nChoosing your download\n\nAt the time of writing, the current\
    \ version is 1.40, but newer versions would only be better.\n\nRunning the installer\
    \ and opening Visual Studio Code for the first time gives you a screen similar\
    \ to the one in Figure [1-2](#490964_1_En_1_Chapter.xhtml#Fig2).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig2_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2\n\nVisual Studio Code\n\nThe second step is to install Java, if it\
    \ is not already installed. You can either head to the OpenJDK web site ([`https://jdk.java.net/`](https://jdk.java.net/))\
    \ and download a zip file or go to the Oracle web site and download a ready-to-use\
    \ installer for your machine (see Figure [1-3](#490964_1_En_1_Chapter.xhtml#Fig3)\
    \ and Figure [1-4](#490964_1_En_1_Chapter.xhtml#Fig4)). Specifically, you can\
    \ go to [`https://www.oracle.com/technetwork/java/javase/downloads/index.html`](https://www.oracle.com/technetwork/java/javase/downloads/index.html).\n\
    \n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig4_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig4_HTML.jpg)\n\
    \nFigure 1-4\n\nJava download link\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig3_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3\n\nOracle Java download page\n\nLet the installer run to the end,\
    \ and do not stop it even if it tries to open another installer while running.\
    \ Java, being a development kit, does not come with a fancy application to check\
    \ that it has been installed properly, so after the Java installation is finished,\
    \ a quick way to check that things are in place is to open a terminal in Visual\
    \ Studio Code and check the Java version.\n\nYou can press `Ctrl+Shift+@` to open\
    \ a terminal inside Visual Studio Code, or you can open it from the menu, as shown\
    \ in Figure [1-5](#490964_1_En_1_Chapter.xhtml#Fig5).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig5_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5\n\nOpening a terminal window from within Visual Studio Code\n\nThis\
    \ will pop up a small tab, usually at the bottom of the editor, as shown in Figure\
    \ [1-6](#490964_1_En_1_Chapter.xhtml#Fig6).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig6_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6\n\nThe Terminal tab\n\nThen inside the terminal, type the following\
    \ command:\n\n```\njava -version\n```\n\nFigure [1-7](#490964_1_En_1_Chapter.xhtml#Fig7)\
    \ shows the expected version output if you have installed the OpenJDK version.\n\
    \n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig7_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7\n\nJava version\n\nNote that the Java version itself is not important;\
    \ any version between 8 and 14 is expected to work. Heck, let’s be optimistic—things\
    \ should also work for the foreseeable future.\n\nWe are almost there with all\
    \ the setup, so bear with me for a few more seconds. In Visual Studio Code, everything\
    \ you write will be handled as simple text. Basically, if you do not tell a computer\
    \ what to do with text, it will not do anything.\n\nLet’s tell Visual Studio Code\
    \ to understand our Java files by installing the Java plugin.\n\nThe left sidebar\
    \ of the editor has a set of rather cute icons, and if you click the one at the\
    \ bottom of Figure [1-8](#490964_1_En_1_Chapter.xhtml#Fig8), you can access the\
    \ Visual Studio Code Marketplace.\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig8_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8\n\nVisual Studio Code Marketplace\n\nFrom here, you can install plug-ins\
    \ in the editor to extend it in many different ways. We are going to make heavy\
    \ use of plugins in this book, and build a setup which you can reuse and enhance\
    \ for other situations.\n\nFor now, we want to install Java support from within\
    \ the editor, which is done by searching for the Java extension using the search\
    \ bar (see Figure [1-9](#490964_1_En_1_Chapter.xhtml#Fig9)).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig9_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9\n\nIn search of the perfect Java plugin\n\nSelecting the plugin on\
    \ the left gives an extensive description on a tab on the right, as shown in Figure\
    \ [1-10](#490964_1_En_1_Chapter.xhtml#Fig10).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig10_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10\n\nDescription of the Java plugin\n\nThe Java extension is actually\
    \ a collection of plugins, and there is a full entry and description available\
    \ in the Visual Studio Code documentation, available here:\n\n```\nhttps://code.visualstudio.com/docs/java/extensions\n\
    ```\n\nBasically, the following plugins will be installed when you install the\
    \ Java Extension Pack:\n\n* Language Support for Java by Red Hat: [`https://marketplace.visualstudio.com/items?itemName=redhat.java`](https://marketplace.visualstudio.com/items%253FitemName%253Dredhat.java)\n\
    * Debugger for Java: [`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-debug`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-debug)\n\
    * Java Test Runner: [`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-test`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-test)\n\
    * Maven for Java: [`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-maven`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-maven)\n\
    * Java Dependency Viewer: [`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-dependency`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-dependency)\n\
    * Visual Studio IntelliCode: [`https://marketplace.visualstudio.com/items?itemName=VisualStudioExptTeam.vscodeintellicode`](https://marketplace.visualstudio.com/items%253FitemName%253DVisualStudioExptTeam.vscodeintellicode)\n\
    \nThese plugins will allow you to perform all the tasks that are useful when writing\
    \ code, such as autocompletion, code inspection, debugging, and more.\n\nAt this\
    \ stage, after reloading the editor, you are essentially done with the installation\
    \ steps. The fun development environment is ready; it hasn’t cost you a penny,\
    \ and almost no personal data has been leaked."
