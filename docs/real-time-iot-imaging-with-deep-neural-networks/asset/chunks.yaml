  trans: "\n### JSON 趣谈\n\n在处理来自 MQTT 主题的 Rhasspy 消息之前，我们需要先掌握一些 JSON 解析技巧。\n\n显然，在\
    \ Java 中有很多解析方法：我们可以手动解析（提示：别这么做），或者使用不同的库。这里我们将使用 `org.json` 库，因为它处理传入的 MQTT\
    \ 消息速度相当快。\n\n以下是使用 `org.json` 库解析字符串以获取所需值的步骤：\n\n1.  使用 JSON 消息的字符串版本创建一个 `JSONObject`。\n\
    2.  使用以下函数之一来导航 JSON 文档：\n    *   `get()`\n    *   `getJSONObject()`\n    *  \
    \ `getJSONArray()`\n3.  使用 `getInt`、`getBoolean`、`getString` 等方法获取所需的值。\n\n####\
    \ 过度设计\n\n大多数时候，Java 被认为很复杂，是因为在某个层级中引入了一个复杂的中件间。实际上，我觉得这门语言如今相当简洁，并且借助各种自动补全和重构工具，开发效率很高。\n\
    \n无论如何，这里我们只是提取消息中的一个值，但你也可以将整个 JSON 消息解组为 Java 对象……甚至为我们创建一个开源库。准备好后请告诉我！\n\n\
    就是这样。应用到我们之前用过的 `somecats.json` 文件上，如果我们想检索 Rhasspy 识别的值，可以按照清单 5-5 的思路操作。\n\n\
    ```\npackage practice;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
    import java.util.List;\nimport java.util.stream.Collectors;\nimport org.json.JSONObject;\n\
    public class JSONFun {\npublic static String whatObject(String json) {\nJSONObject\
    \ obj = new JSONObject(json);\nJSONObject slot = ((JSONObject) obj.getJSONArray(\"\
    slots\").get(0)).getJSONObject(\"value\");\nString cats = slot.getString(\"value\"\
    );\nreturn cats;\n}\npublic static void main(String... args) throws Exception\
    \ {\nList nekos = Files.readAllLines(Paths.get(\"onlycats.json\"));\nString json\
    \ = nekos.stream().collect(Collectors.joining(\"\\n\"));\nSystem.out.println(whatObject(json));\n\
    }\n}\n清单 5-5\n解析 JSON 内容\n```\n\n### 监听基本 MQTT 消息\n\n监听消息，或称*订阅*，通过以下步骤完成：\n\n\
    1.  订阅一个主题或父主题。\n2.  添加一个实现 `IMqttMessageListener` 接口的监听器。\n\n最简单的订阅代码如清单 5-6\
    \ 所示。\n\n```\npackage practice;\nimport org.eclipse.paho.client.mqttv3.IMqttMessageListener;\n\
    import org.eclipse.paho.client.mqttv3.MqttClient;\nimport org.eclipse.paho.client.mqttv3.MqttMessage;\n\
    public class Sub0 {\npublic static void main(String... args) throws Exception\
    \ {\nMqttClient client = new MqttClient(\"tcp://localhost:1883\", MqttClient.generateClientId());\n\
    client.connect();\nclient.subscribe(\"hello\", new IMqttMessageListener() {\n\
    @Override\npublic void messageArrived(String topic, MqttMessage message) throws\
    \ Exception {\nString hello = new String(message.getPayload(), \"UTF-8\");\nSystem.out.println(hello);\n\
    }\n});\n}\n}\n清单 5-6\n来自俄罗斯的爱\n```\n\n请注意，消息处理部分当然可以用 Java lambda 表达式替换，从而使其更具可读性，如清单\
    \ 5-7 所示。\n\n```\nMqttClient client = new MqttClient(\"tcp://localhost:1883\"\
    , MqttClient.generateClientId());\nclient.connect();\nclient.subscribe(\"hello\"\
    , (topic, message) -> {\nString hello = new String(message.getPayload(), \"UTF-8\"\
    );\nSystem.out.println(hello);\n});\n清单 5-7\n使用 Java Lambda 处理消息\n```\n\n如果你在树莓派上运行所有内容，那么以下\
    \ Visual Studio Code 设置将正确完成所有操作并显示俄语消息，如图 5-6 所示。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig6_HTML.jpg](img/490964_1_En_5_Fig6_HTML.jpg)\n\
    \n图 5-6  \n来自俄罗斯的爱\n\n#### 从 Java 向树莓派发送消息\n\n显然，乐趣在于拥有一个分布式系统并处理来自不同地方的消息。这里，尝试在树莓派上运行代理。在发送方代码中设置好树莓派的\
    \ IP 地址后，从你的计算机用 Java 向树莓派发送一条消息。\n\n或者，从树莓派用 Java 向远程代理（或云端）发送一条消息。\n\n### 监听\
    \ MQTT JSON 消息\n\n那么，现在是时候在 Java 中监听并解析 JSON 消息的内容了，这主要是监听基本消息和实现前面 JSON 趣谈部分的结合。代码片段见清单\
    \ 5-8。\n\n```\npackage practice;\nimport org.eclipse.paho.client.mqttv3.IMqttMessageListener;\n\
    import org.eclipse.paho.client.mqttv3.MqttClient;\nimport org.eclipse.paho.client.mqttv3.MqttMessage;\n\
    import org.json.JSONObject;\npublic class Sub {\npublic static void main(String...\
    \ args) throws Exception {\nMqttClient client = new MqttClient(\"tcp://localhost:1883\"\
    , MqttClient.generateClientId());\nclient.connect();\nclient.subscribe(\"hermes/intent/#\"\
    , new IMqttMessageListener() {\n@Override\npublic void messageArrived(String topic,\
    \ MqttMessage message) throws Exception {\nString json = new String(message.getPayload(),\
    \ \"UTF-8\");\nJSONObject obj = new JSONObject(json);\nJSONObject slot = ((JSONObject)\
    \ obj.getJSONArray(\"slots\").get(0)).getJSONObject(\"value\");\nString cats =\
    \ slot.getString(\"value\");\nSystem.out.println(cats);\n}\n});\n}\n}\n清单 5-8\n\
    猫咪来了\n```\n\n现在你已经了解了关于键和代理的一切，是时候获取并安装 Rhasspy 了。\n\n## 语音与 Rhasspy 设置\n\nRhasspy\
    \ 语音平台需要运行一组服务，才能部署带有意图的应用程序。在本节中，你将首先了解如何安装该平台，然后了解如何创建带有意图的应用程序。\n\n安装 Rhasspy\
    \ 最简单的方法是通过 Docker（[`https://www.docker.com/`](https://www.docker.com/)），这是一个容器引擎，你可以在其上运行镜像。Rhasspy\
    \ 的维护者已经创建了一个现成的 Rhasspy Docker 镜像，因此我们将利用这一点。\n\n### 准备扬声器\n\n在执行任何语音命令之前，你需要一个可用的麦克风设置。\n\
    \n我们推荐使用 ReSpeaker。如果你有它，可以在这里找到安装说明：\n\n```\nhttp://wiki.seeedstudio.com/ReSpeaker_4_Mic_Array_for_Raspberry_Pi/\n\
    ```\n\n假设你已将扬声器插入树莓派，你可以通过以下简短的 shell 脚本执行必要的模块安装：\n\n```\nsudo apt-get update\n\
    sudo apt-get upgrade\ngit clone https://github.com/respeaker/seeed-voicecard.git\n\
    cd seeed-voicecard\nsudo ./install.sh\nreboot\n```\n\n标准的 USB 麦克风应该是即插即用的，我一直在使用会议室麦克风，效果相当不错。\n\
    \n所以，如果一切正常，麦克风应该会出现在这个 `arecord` 命令的输出列表中：\n\n```\narecord -L\n```\n\n你的 ReSpeaker/树莓派设置应该类似于图\
    \ 5-7 所示。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig7_HTML.jpg](img/490964_1_En_5_Fig7_HTML.jpg)\n\
    \n图 5-7  \nReSpeaker 指示灯\n"
- fmt: "### Installing Docker\n\nThe Docker web site has a recent entry on how to\
    \ set up Docker for the Raspberry Pi; you can find it here:\n\n```\nhttps://www.docker.com/blog/happy-pi-day-docker-raspberry-pi/\n\
    ```\n\nAll the steps are repeated in the following code:\n\n```\n#   a. Install\
    \ the following prerequisites.\nsudo apt-get install apt-transport-https ca-certificates\
    \ software-properties-common -y\n#   b. Download and install Docker.\ncurl -fsSL\
    \ get.docker.com -o get-docker.sh && sh get-docker.sh\n#   c. Give the 'pi' user\
    \ the ability to run Docker.\nsudo usermod -aG docker pi\n#   d. Import Docker\
    \ CPG key.\nsudo curl https://download.docker.com/linux/raspbian/gpg\n#   e. Setup\
    \ the Docker Repo.\nsudo echo \"deb https://download.docker.com/linux/raspbian/\
    \ stretch stable\" >> /etc/apt/sources.list\n#   f. Patch and update your Pi.\n\
    sudo apt-get update\nsudo apt-get upgrade\n#   g. Start the Docker service.\n\
    systemctl start docker.service\n#   h. To verify that Docker is installed and\
    \ running.\ndocker info\n#    i. You should now some information in regards to\
    \ versioning, runtime,etc.\n```\n\n### Installing Rhasspy with Docker\n\nThe whole\
    \ Rhasspy suite can be started by running the prepared container, and this is\
    \ done by executing the following command on the Raspberry Pi, provided you have\
    \ installed Docker properly.\n\nYou use `docker run` to start the image itself;\
    \ you can picture the image as being a small OS containing prepackaged software\
    \ and configuration and thus being easy to deploy.\n\n```\ndocker run -d -p 12101:12101\
    \ \\\n--restart unless-stopped \\\n-v \"$HOME/.config/rhasspy/profiles:/profiles\"\
    \ \\\n--device /dev/snd:/dev/snd \\\nsynesthesiam/rhasspy-server:latest \\\n--user-profiles\
    \ /profiles \\\n--profile en\n```\n\nHere’s a breakdown of the code:\n\n*   `docker`:\
    \ This is the command-line executable that communicates with the Docker daemon\
    \ and sends commands to start and stop the container.\n\n*   `-d`: This tells\
    \ Docker to run the image as a daemon, not waiting for the execution of the image\
    \ to finish and starting the container as a background process.\n\n*   `-p 12101:12101`:\
    \ This does port mapping between Docker and the host; without this, open ports\
    \ within the container cannot be viewed from the outside world. Here we tell Docker\
    \ to map port 12101 of the container to port 12101 of the Raspberry Pi.\n\n* \
    \  `--restart unless-stopped`: This speaks for itself, meaning even if the container\
    \ is dying because of an internal exception or error, the Docker daemon will automatically\
    \ restart the image.\n\n*   `-v \"$HOME/.config/rhasspy/profiles:/profiles\"`:\
    \ Here we want to “mount” a folder of the Raspberry Pi and make it available to\
    \ the Docker container, and vice versa. This is kind of a shared-network folder.\
    \ It will be used to store files downloaded by Rhasspy for us.\n\n*   `--device\
    \ /dev/snd:/dev/snd`: This is pretty neat; it maps the raw data coming to the\
    \ sound system of the Raspberry Pi and makes it available to the Docker container.\n\
    \n*   `synesthesiam/rhasspy-server:latest`: This is the name of the image used\
    \ to start the container. Think of this image as a verbatim copy of the file system\
    \ used to start the container.\n\n*   The next two are parameters that the Rhasspy\
    \ image understands:\n    *   `--user-profiles /profiles`: This is where to store\
    \ the profiles, and this is the path of the folder we are sharing with the Raspberry\
    \ Pi.\n\n    *   `--profile en`: This is the language to use.\n\nTo check that\
    \ the container is started properly, let’s verify its status with the `docker`\
    \ command, as shown here:\n\n```\ndocker ps --format \"table {{.Status}}\\t{{.Ports}}\\\
    t{{.Image}}\\t{{.ID}}\"\n```\n\nThis should show something similar to the following;\
    \ make sure to especially check the status field, which we have put up front:\n\
    \n```\nSTATUS           PORTS                       IMAGE                    \
    \            CONTAINER ID\nUp 22 minutes    0.0.0.0:12101->12101/tcp    synesthesiam/rhasspy-server:latest\
    \   af7c56961d5c\n```\n\nThe Rhasspy server and its console are ready, so let’s\
    \ go back to the main computer and access the Raspberry Pi via the browser-based\
    \ IDE.\n\n### Starting the Rhasspy Console\n\nTo access the console, go to [`http://192.168.1.104:12101/`](http://192.168.1.104:12101/),\
    \ where 192.168.1.104 is the IP address of the Raspberry Pi.\n\nYou’re then presented\
    \ with the lively screen shown in Figure [5-8](#490964_1_En_5_Chapter.xhtml#Fig8).\n\
    \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig8_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig8_HTML.jpg)\n\
    \nFigure 5-8\n\nThe Rhasspy console\n\nThe console makes it quite obvious for\
    \ you on first start that it should go and fetch some remote files, so provided\
    \ your Raspberry Pi is connected to the Internet, just click the Download Now\
    \ button.\n\nThe operation takes a few minutes to complete, so don’t lose your\
    \ patience here. Wait for the dialog box shown in Figure [5-9](#490964_1_En_5_Chapter.xhtml#Fig9).\n\
    \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig9_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9\n\nDownload complete\n\nThe console refreshes by itself, and we’re\
    \ now being greeted with Figure [5-10](#490964_1_En_5_Chapter.xhtml#Fig10).\n\n\
    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig10_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10\n\nRefreshed Rhasspy console\n\nBut we seem to still have some markers\
    \ telling us something is missing, as shown in Figure [5-11](#490964_1_En_5_Chapter.xhtml#Fig11)\
    \ and Figure [5-12](#490964_1_En_5_Chapter.xhtml#Fig12).\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig12_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12\n\nThe setup problems are nicely explained\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig11_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11\n\nRed markers\n\nFortunately, and for now, clicking the top-right\
    \ green Train button makes our console shiny and free of red markers, as in Figure\
    \ [5-13](#490964_1_En_5_Chapter.xhtml#Fig13). We are now ready to use the Rhasspy\
    \ console.\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig13_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13\n\nThe console is ready!"
