- fmt: "### Connecting the Cables\n\n> *Electricity can be dangerous. My nephew tried\
    \ to stick a penny into a plug. Whoever said a penny doesn’t go far didn’t see\
    \ him shoot across that floor. I told him he was grounded.*\n> \n> —Tim Allen\n\
    \nI have found plugging things together to be quite fun and relaxing and could\
    \ actually be used in personal therapy for the tough world we live in.\n\nTable\
    \ [3-2](#490964_1_En_3_Chapter.xhtml#Tab2) provides a nonexhaustive list of the\
    \ connections that have to be made.\n\n**Table 3-2** What to Plug Where Checklist\n\
    \n| From | To | Why |   |\n| --- | --- | --- | --- |\n| Power AC | Power adapter\
    \ | Get some power | □ |\n| USB-A | Power adapter | Power to the Pi | □ |\n| Webcam\
    \ | Pi USB port | Get some video stream | □ |\n| Mouse | Pi USB port | Use a pointer\
    \ | □ |\n| Keyboard | Pi USB port | Use a keyboard | □ |\n| Screen HDMI | Pi Micro\
    \ HDMI | Display | □ |\n| USB-C | Raspberry Pi | Power to the Pi | □ |\n\n**Note**\n\
    \nMake sure to plug either the power adapter or the USB-C to Raspberry adapter\
    \ in last; otherwise, the power will turn the board on without anything to do.\n\
    \nThings usually are easier to understand with a picture, so make sure to refer\
    \ to Figure [3-10](#490964_1_En_3_Chapter.xhtml#Fig10) to see where things fit\
    \ together on the actual board.\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig10_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig10_HTML.jpg)\n\
    \n**Figure 3-10** Original blueprints of the Raspberry Pi 4 and what to connect\
    \ to\n\nFinally, with the micro SD card inserted into the Raspberry Pi 4, you\
    \ are ready to power things on (or have you already?).\n\n### First Boot\n\nThe\
    \ first boot is quite fast. The boot process includes a step where the file system\
    \ needs to be resized, which is now handled automatically by Raspbian on first\
    \ boot. You should get a welcome screen like the one shown in Figure [3-11](#490964_1_En_3_Chapter.xhtml#Fig11).\n\
    \n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig11_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11** First boot\n\nWith the keyboard, mouse, and screen plugged in,\
    \ you can do quite a bit, but for most of the tasks we are going to do in this\
    \ chapter, we want to work over SSH, which requires a network connection.\n\n\
    You can plug an Ethernet cable into the Ethernet port of the Pi, but WiFi works\
    \ quite well. On the top right, click the WiFi icon and enter your WiFi settings\
    \ in the dialog box, as shown in Figure [3-12](#490964_1_En_3_Chapter.xhtml#Fig12).\n\
    \n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig12_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig12_HTML.jpg)\n\
    \n**Figure 3-12** Setting up the WiFi\n\nOne last step is required before we can\
    \ connect via SSH, which is to enable the Raspberry Pi–embedded OpenSSH server,\
    \ which can be enabled via the following menu:\n\n```\nPreferences ➤ Raspberry\
    \ Pi Configuration ➤ Interfaces\n```\n\nClick to enable the SSH server, as shown\
    \ in Figure [3-13](#490964_1_En_3_Chapter.xhtml#Fig13).\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig13_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig13_HTML.jpg)\n\
    \n**Figure 3-13** Enabling the installed SSH server\n\nNow let’s connect to the\
    \ Raspberry via SSH.\n\n### Finding Your Raspberry Using `nmap`\n\nAs you probably\
    \ know, to remotely connect to the Raspberry Pi, you need its IP address, which\
    \ you can find from within the Raspberry Pi by opening a terminal and typing the\
    \ following:\n\n```\nip addr\n```\n\nThis will display the IP address you need\
    \ to use to connect to the Raspberry Pi.\n\nIf you’re out of luck and without\
    \ a keyboard, a screen, a mouse, or all of these, you can revert to some simple\
    \ commando countermeasures and use `nmap` to find all the Raspberry Pis on the\
    \ network (and all the computers and Chinese smartphones for that matter).\n\n\
    This is done by running a command similar to the following one from the main computer:\n\
    \n```\nsudo nmap -O -p 22 192.168.1.*\n```\n\nHere, `192.168.1.*` is the start\
    \ of your own desktop IP address and where the Raspberry would be. Note that for\
    \ this to work, we’re assuming that your computer and the Raspberry are on the\
    \ same network.\n\nWhat does the command actually do? In short, `nmap` simply\
    \ scans the local network for available machines and open ports.\n\nThe `-p` switch\
    \ scans for a given port, and the `-O` switch says to gather as much information\
    \ as possible about each found host.\n\nRunning the previous `nmap` command on\
    \ the local network gives us something like Figure [3-14](#490964_1_En_3_Chapter.xhtml#Fig14).\n\
    \n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig14_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig14_HTML.jpg)\n\
    \n**Figure 3-14** Looking for your Raspberry Pi\n\nA Raspberry (hopefully yours!)\
    \ has been found on the network. You can now SSH through it using the default\
    \ username/password, which should still be `pi / raspberry`, with the following\
    \ command:\n\n```\nssh pi@192.16.1.17\n```\n\nand then get connected, as shown\
    \ in Figure [3-15](#490964_1_En_3_Chapter.xhtml#Fig15).\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig15_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig15_HTML.jpg)\n\
    \n**Figure 3-15** Starting an SSH connection\n\nWe made one connection, but we’re\
    \ going to have to repeat those connection steps over and over, so let’s save\
    \ a few SSH settings for later by modifying a configuration file both locally\
    \ and on the remote Raspberry."
