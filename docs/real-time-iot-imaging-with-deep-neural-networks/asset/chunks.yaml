  trans: "\n### 创建高亮意图\n\n现在，我们需要创建一个小的意图，用于告诉主目标检测应用我们要关注哪个物体。\n\n该意图将按照以下规则指定：\n\
    \n- **名称：** `highlight`\n- **命令：** `show me only <something>`，其中 `<something>`\
    \ 是 `cat` 或 `person`\n- **槽位名称：** `only`\n\n在继续阅读之前，你最好先自己尝试一下……\n\n要放入句子文件中的意图代码如下：\n\
    \n```\n[highlight]\nobject = (cats | person) {only}\nshow me only \n```\n\n最好的测试方式当然是说出以下指令：\n\
    \n- “Snowboy”\n- “Show me only cats”\n\n这样意图 JSON 就会被发布到 `hermes/intent/highlight`\
    \ 队列中，其内容如图 5-29 所示。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig29_HTML.jpg](img/490964_1_En_5_Fig29_HTML.jpg)\n\
    \n**图 5-29** 只显示猫，Snowboy\n\n*好了*，Rhasspy 和语音命令部分基本完成，现在我们可以回到实时检测物体、猫和人的任务上了。\n\
    \n## 语音与实时目标检测\n\n本章的这一部分将把前面章节的视频分析与使用 Rhasspy 的语音识别结合起来。\n\n首先，让我们通过一个简单的 `origami`\
    \ 项目设置做好准备，该项目会接收 Rhasspy 发送的消息。\n\n### 简单设置：Origami + 语音\n\n在本节中，我们将执行以下操作：\n\
    \n1.  在新线程中，以全屏模式启动主摄像头的视频流。\n2.  视频流使用 `origami` 核心过滤器 `annotate`，你可以在画面上添加一些文字。\n\
    3.  在主线程上连接到 MQTT。\n4.  收到新的意图消息时，更新 `annotate` 的文字。\n\n这里使用的意图是之前定义的 `highlight`\
    \ 意图，其槽位用于识别来自 COCO 数据集物体类别的名称。\n\n清单 5-9 的其余部分应该很容易理解。\n\n```\npackage practice;\n\
    import org.eclipse.paho.client.mqttv3.IMqttMessageListener;\nimport org.eclipse.paho.client.mqttv3.MqttClient;\n\
    import org.eclipse.paho.client.mqttv3.MqttMessage;\nimport org.json.JSONObject;\n\
    import origami.Camera;\nimport origami.Origami;\nimport origami.filters.Annotate;\n\
    public class Consumer {\npublic static void main(String... args) throws Exception\
    \ {\nOrigami.init();\nAnnotate myText = new Annotate();\nnew Thread(() -> {\n\
    new Camera().device(0).filter(myText).fullscreen().run();\n}).start();\nMqttClient\
    \ client = new MqttClient(\"tcp://localhost:1883\", MqttClient.generateClientId());\n\
    client.connect();\nclient.subscribe(\"hermes/intent/#\", new IMqttMessageListener()\
    \ {\n@Override\npublic void messageArrived(String topic, MqttMessage message)\
    \ throws Exception {\nString json = new String(message.getPayload(), \"UTF-8\"\
    );\nJSONObject obj = new JSONObject(json);\nJSONObject slot = ((JSONObject) obj.getJSONArray(\"\
    slots\").get(0)).getJSONObject(\"value\");\nString cats = slot.getString(\"value\"\
    );\nmyText.setText(cats);\n}\n});\n}\n}\n```\n\n**清单 5-9** Origami + Rhasspy\n\
    \n如果一切正常，你说出“Show me only cats”，`annotate` 过滤器就会更新左上角的文字，如图 5-30 所示。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig30_HTML.jpg](img/490964_1_En_5_Fig30_HTML.jpg)\n\
    \n**图 5-30** 网络摄像头视频流\n\n现在，让我们将这个设置与物体识别以及实时视频流部分连接起来。\n\n### Origami 实时视频分析设置\n\
    \n从上一章你会记得，我们使用了一个名为 Yolo 的 `origami` 过滤器来执行目标检测。就像 `annotate` 过滤器一样，Yolo 过滤器包含在\
    \ `origami-filters` 库中，并且以非常 Java 的方式，你只需扩展基础过滤器即可高亮检测到的物体。\n\nYolo 过滤器可在 `origami-filter`\
    \ 库中找到，它允许你使用网络规范按需下载和获取网络。例如，`networks.yolo:yolov3-tiny:1.0.0` 会根据你使用的设备下载 `yolov3-tiny`\
    \ 并 `缓存` 以供后续使用。这是 `origami` 框架的一个特性。\n\n对于 Yolo，以下网络规范可用于在 Coco 数据集上训练 Yolo 网络：\n\
    \n- `networks.yolo:yolov3-tiny:1.0.0`\n- `networks.yolo:yolov3:1.0.0`\n- `networks.yolo:yolov2:1.0.0`\n\
    - `networks.yolo:yolov2-tiny:1.0.0`\n\n每个网络要么比前一个更快，要么更精确。\n\n#### 创建 Yolo 过滤器\n\
    \n在清单 5-10 中，我们准备了基础工作，用于通过 `annotateWithTotal` 显示所有检测到的物体数量，或通过 `only` 开关仅显示特定物体。请注意，入口点在\
    \ `annotateAll` 函数中，该函数决定是显示所有边界框还是显示其中的子集。\n\n清单 5-10 展示了 MyYolo 过滤器的代码。\n\n\
    ```\npackage filters;\nimport org.opencv.core.Mat;\nimport org.opencv.core.Point;\n\
    import org.opencv.core.Rect;\nimport org.opencv.core.Scalar;\nimport org.opencv.imgproc.Imgproc;\n\
    import origami.filters.detect.Yolo;\nimport java.util.List;\npublic class MyYolo\
    \ extends Yolo {\nScalar color = new Scalar(110.0D, 220.0D, 0.0D);\nString only\
    \ = null;\nboolean annotateWithTotal = false;\npublic MyYolo(String spec) {\n\
    super(spec);\n}\npublic MyYolo annotateWithTotal() {\nthis.annotateWithTotal =\
    \ true;\nreturn this;\n}\npublic MyYolo annotateAll() {\nthis.annotateWithTotal\
    \ = false;\nreturn this;\n}\npublic MyYolo only(String only) {\nthis.only = only;\n\
    return this;\n}\npublic MyYolo color(Scalar color) {\nthis.color = color;\nreturn\
    \ this;\n}\n@Override\npublic void annotateAll(Mat frame, List results) {\nif\
    \ (only == null) {\nif (annotateWithTotal)\nannotateWithCount(frame, results.size());\n\
    else\nsuper.annotateAll(frame, results);\n} else {\nif (!annotateWithTotal)\n\
    results.stream().filter(result -> result.get(1).equals(only)).forEach(r -> {\n\
    annotateOne(frame, (Rect) r.get(0), (String) r.get(1));\n});\nelse\nannotateWithCount(frame,\
    \ (int) results.stream().filter(result -> result.get(1).equals(only)).count());\n\
    }\n}\npublic void annotateWithCount(Mat frame, int count) {\nImgproc.putText(frame,\
    \ (only == null ? \"ALL\" : only) + \" (\" + count + \")\", new Point(50, 500),\
    \ 1, 4.0D, color, 3);\n}\npublic void annotateOne(Mat frame, Rect box, String\
    \ label) {\nif (only == null || only.equals(label)) {\nImgproc.putText(frame,\
    \ label, new Point(box.x, box.y), 1, 3.0D, color, 3);\nImgproc.rectangle(frame,\
    \ box, color, 2);\n}\n}\n}\n```\n\n**清单 5-10** MyYolo 过滤器\n\n过滤器准备就绪后，我们就可以再次开始进行分析了。\n"
- fmt: "### Running the Video Analysis Alone\n\nIn this short section, we’ll play\
    \ a video by starting the camera on one thread and in another thread updating\
    \ the selection of shown objects of the `Yolo` filter in real time. The second\
    \ main thread directly calls the only function of the `MyYolo` filter, which we\
    \ just defined in the previous section. Listing [5-11](#490964_1_En_5_Chapter.xhtml#PC40)\
    \ shows the full code for this.\n\n```\npackage practice;\nimport origami.Camera;\n\
    import origami.Filter;\nimport origami.Filters;\nimport origami.Origami;\nimport\
    \ origami.filters.FPS;\nimport filters.MyYolo;\npublic class YoloAgain {\npublic\
    \ static void main(String[] args) {\nOrigami.init();\nString video = \"mei/597842788.852328.mp4\"\
    ;\n//        Filter filter = new Filters(new MyYolo(\"networks.yolo:yolov3-tiny:1.0.0\"\
    ).only(\"car\"), new FPS());\nMyYolo yolo = new MyYolo(\"networks.yolo:yolov3-tiny:1.0.0\"\
    ); //.only(\"person\");\nyolo.thresholds(0.4f, 1.0f);\nyolo.annotateWithTotal();\n\
    Filter filter = new Filters(yolo, new FPS());\nnew Thread(() -> {\nnew Camera().device(video).filter(filter).run();\n\
    }).start();\nnew Thread(() -> {\ntry {\nThread.sleep(5000);\nSystem.out.println(\"\
    only cat\");\nyolo.only(\"cat\");\nThread.sleep(5000);\nSystem.out.println(\"\
    only person\");\nyolo.only(\"person\");\n} catch (InterruptedException e) {\n\
    //e.printStackTrace();\n}\n}).start();\n}\n}\nListing 5-11\nRunning Yolo on a\
    \ Video, Updating Parameters in Real Time\n```\n\nYou can probably tell where\
    \ we are heading now, linking the message received from `Rhasspy` to update the\
    \ selection of the `Yolo` analysis.\n\n### Integrating with Voice\n\nIn this final\
    \ section, we will highlight a subset of objects based on the input received from\
    \ the `Rhasspy` intent.\n\nTo get this working, we have to do the following:\n\
    \n1.  Start a video streaming on the main camera in full screen, in a new thread.\n\
    2.  The video streaming is using a `MyYolo` filter loading the `Yolo` network.\n\
    3.  Connect to `MQTT` on the main thread.\n4.  On a new message, we update the\
    \ annotate text.\n5.  When a message arrives in the highlight queue, we do the\
    \ following:\n    *   Parse the `JSON` object.\n    *   Retrieve the `only` value.\n\
    \    *   Update the selection of the `MyYolo` filter.\n\nThe final code snippet\
    \ of this book shows how to put all of this together; see Listing [5-12](#490964_1_En_5_Chapter.xhtml#PC41).\n\
    \n```\nimport filters.MyYolo;\nimport org.eclipse.paho.client.mqttv3.MqttClient;\n\
    import org.json.JSONObject;\nimport origami.Camera;\nimport origami.Origami;\n\
    import static java.nio.charset.StandardCharsets.*;\npublic class Chapter05 {\n\
    public static String whatObject(String json) {\nJSONObject obj = new JSONObject(json);\n\
    JSONObject slot = ((JSONObject) obj.getJSONArray(\"slots\").get(0)).getJSONObject(\"\
    value\");\nString cats = slot.getString(\"value\");\nreturn cats;\n}\npublic static\
    \ void main(String... args) throws Exception {\nOrigami.init();\n//        String\
    \ video = \"mei/597842788.852328.mp4\";\nString video = \"mei/597842788.989592.mp4\"\
    ;\nMyYolo yolo = new MyYolo(\"networks.yolo:yolov3-tiny:1.0.0\");\nyolo.thresholds(0.2f,\
    \ 1.0f);\n//        yolo.only(\"cat\");\nnew Thread(() -> {\n//            new\
    \ Camera().device(0).filter(yolo).run();\nnew Camera().device(video).filter(yolo).run();\n\
    }).start();\nMqttClient client = new MqttClient(\"tcp://localhost:1883\", MqttClient.generateClientId());\n\
    client.connect();\nclient.subscribe(\"hermes/intent/hellonico:highlight\", (topic,\
    \ message) -> {\nyolo.only(whatObject(new String(message.getPayload(), \"UTF-8\"\
    )));\n});\n}\n}\nListing 5-12\nReal-Time Detection, Integrating with the Rhasspy\
    \ Queue\n```\n\nIn the different sample videos or directly in the video stream\
    \ of the webcam of the Raspberry Pi, you can directly update the objects to be\
    \ detected.\n\nWe could have look for cats in this final example, but in a timely\
    \ manner my daughter Mei just sent me videos of her at school and out with friends\
    \ at night. See her highlighted by our `YOLO` setup while she’s in action in Figure\
    \ [5-31](#490964_1_En_5_Chapter.xhtml#Fig31) and Figure [5-32](#490964_1_En_5_Chapter.xhtml#Fig32).\n\
    \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig32_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig32_HTML.jpg)\n\
    \nFigure 5-32: Mei at night\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig31_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig31_HTML.jpg)\n\
    \nFigure 5-31: Mei at school\n\nIn this chapter, you learned about the following:\n\
    \n- The `Rhasspy` message flow\n- How to interact from Java with `MQTT` for IoT\
    \ messaging\n- How to set up `Rhasspy` and intents\n- How to connect messages\
    \ sent by `Rhasspy` to our Java code\n- How to update the real-time video analysis\
    \ running on the Raspberry Pi by interpreting voice sent by `Rhasspy` with custom\
    \ intents\n\nThis short book has come to an end, so now it’s your turn to change\
    \ the world. We’ve only scratched the surface of what is possible, but I really\
    \ hope this gives you some ideas to try to implement."
