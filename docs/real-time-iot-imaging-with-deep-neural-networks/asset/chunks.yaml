- fmt: "# In this book, we will perform some basic OpenCV analysis first, in Java,\
    \ and then we will move on to analyzing real-time videos. The goal of this book\
    \ is to get you started working on small devices and connecting the different\
    \ pieces, such as the code, the language, the connectivity setup, together. Then\
    \ we’ll move on to the fun things.\n\nOne other novelty in this book is that instead\
    \ of accessing the Raspberry Pi physically and running on top of it, we will go\
    \ through a Secure Shell (SSH) connection to do our coding.\n\nWhat does that\
    \ mean, and why would we do that?\n\nThis means we want the editor where we write\
    \ the Java code to be running somewhere other than on the Raspberry Pi itself.\
    \ We want to do this to keep as many Raspberry Pi resources as possible doing\
    \ the image and video processing for the device while running only the minimum\
    \ amount of software.\n\nAt the same time, we want to have the ease of not recompiling\
    \ everything, like is often necessary in Java, while having everything seem to\
    \ be executing directly from our editor. This part is being made possible by the\
    \ excellent work done by Microsoft in the Visual Studio Code Editor and its latest\
    \ plug-in, the Remote SSH plugin (Figure [I-4](#490964_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig4)).\n\
    \n![../images/490964_1_En_BookFrontmatter_Fig4_HTML.jpg](images/490964_1_En_BookFrontmatter_Fig4_HTML.jpg)\n\
    \n**Figure I-4** Visual Studio Code Remote SSH plugin\n\nFinally, we will look\
    \ into connecting to home automation software, especially via voice.\n\nRhasspy\
    \ ( [`https://rhasspy.readthedocs.io`](https://rhasspy.readthedocs.io) ) will\
    \ be our open source software of choice. You will be using your newly acquired\
