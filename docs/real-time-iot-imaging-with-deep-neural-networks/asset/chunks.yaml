- fmt: '# Overview of Applying Filters


    In the Clojure language, you can apply a set of transformations directly to the
    `Mat` object of a video stream without using any extra boilerplate code. I seriously
    recommend taking a look at even the most basic of the origami examples, available
    in the README:


    ```

    https://github.com/hellonico/origami/blob/master/README.md#support-for-opencv-412-is-in

    ```


    Listing [4-1](#490964_1_En_4_Chapter.xhtml#PC2) shows how to load a picture, change
    it to gray, and apply a `canny` function all in one pipeline. This might even
    make you want to try the Clojure version of OpenCV.


    ```

    (require

    ''[opencv4.utils :as u]

    ''[opencv4.core :refer :all])

    (->

    (imread "doc/cat_in_bowl.jpeg")

    (cvt-color! COLOR_RGB2GRAY)

    (canny! 300.0 100.0 3 true)

    (bitwise-not!)

    (u/resize-by 0.5)

    (imwrite "doc/canny-cat.jpg"))

    Listing 4-1

    Read, Turn to Gray, Canny Resize, and Save

    ```


    This is a Java book, though, so let’s see how we can apply the same concepts in
    Java.


    Here we introduce the concept of a pipeline of filters, where each filter performs
    one operation on the `Mat` object.


    Here are a few examples of what filters can do:


    - Turning a `Mat` object to gray

    - Applying a Canny effect

    - Looking for edges

    - Pencil sketching

    - Instagram filters, like sepia or vintage

    - Doing background subtraction

    - Detecting cat or people faces using Haar objection detection or color detection

    - Running a neural network and identifying objects


    The following are the two Java types that we’ll introduce to implement these concepts:


    - The `Filter` interface, which consists of only one function, `apply(Mat in)`,
    and returns a `Mat` object, just like in functional programming.

    - The `Pipeline` class, itself a `Filter`, that takes a list of classes or already
    instantiated filters. When `apply` is called, it applies the classes one by one.


    Listing [4-2](#490964_1_En_4_Chapter.xhtml#PC3) shows the (simple) `Filter` interface.


    ```

    import org.opencv.core.Mat;

    public interface Filter {

    public Mat apply(Mat in);

    }

    Listing 4-2

    The Filter Interface

    ```


    Listing [4-3](#490964_1_En_4_Chapter.xhtml#PC4) shows an example of implementing
    the `Pipeline` class, where you simply combine the different filters by calling
    them one by one.


    ```

    import java.util.Arrays;

    import java.util.List;

    import java.util.stream.Collectors;

    import org.opencv.core.Mat;

    public class Pipeline implements Filter {

    List filters;

    public Pipeline(Class... __filters) {

    List> _filters = (List) Arrays.asList(__filters);

    this.filters = _filters.stream().map(i -> {

    try {

    return (Filter) Class.forName(i.getName()).newInstance();

    } catch (Exception e) {

    return null;

    }

    }).collect(Collectors.toList());

    }

    public Pipeline(Filter... __filters) {

    this.filters = (List) Arrays.asList(__filters);

    }

    @Override

    public Mat apply(Mat in) {

    Mat dst = in.clone();

    for (Filter f : filters) {

    dst = f.apply(dst);

    }

    return dst;

    }

    }

    Listing 4-3

    Many Filters

    ```


    Note here the usage of the deprecated version of the `newInstance` function directly
    in the class. This may not be calling the constructor you really want, but it
    works well enough for the examples in this book.


    So far, `Filter` and `Pipeline` haven’t done a lot, of course, so let’s review
    some basic examples in the upcoming section.


    ## Applying Basic Filters


    In this section, we’ll look at several examples of basic filters.


    ### Gray Filter


    The most obvious use of a filter is to turn a `Mat` object from color to gray.
    In OpenCV, this is done using the function `cvtColor` from the `Imgproc` class.


    Omitting the package definition, we combine the webcam code from a few pages ago
    with the standard `cvtColor` wrapper in a class that implements the recently introduced
    `Filter` interface (Listing [4-4](#490964_1_En_4_Chapter.xhtml#PC5)).


    ```

    import org.opencv.core.Mat;

    import org.opencv.imgproc.Imgproc;

    import org.opencv.videoio.VideoCapture;

    import origami.ImShow;

    import origami.Origami;

    Listing 4-4

    Gray Filter on the Stream

    ```


    ```

    public class WebcamWithFilters {

    public static void main(final String[] args) {

    Origami.init();

    final VideoCapture cap = new VideoCapture(0);

    final ImShow ims = new ImShow("Camera", 800, 600);

    final Mat buffer = new Mat();

    Filter gray = new Gray();

    while (cap.read(buffer)) {

    ims.showImage(gray.apply(buffer));

    }

    cap.release();

    }

    }

    class Gray implements Filter {

    public Mat apply(final Mat img) {

    final Mat mat1 = new Mat();

    Imgproc.cvtColor(img, mat1, Imgproc.COLOR_RGB2GRAY);

    return mat1;

    }

    }

    ```


    You can run this directly on the Pi, and if you stand in front of your webcam,
    you will get something like I did in Figure [4-1](#490964_1_En_4_Chapter.xhtml#Fig1).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig1_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Not only my hair, but the whole picture, is turning gray


    ### Edge Preserving Filter


    In the same fashion, we can implement a wrapper around the `EdgePreserving` function
    of OpenCV’s `Photo` class. This is used in many different applications to smooth
    and remove unwanted lines in pictures. For example, Listing [4-5](#490964_1_En_4_Chapter.xhtml#PC7)
    is really just a basic call of the function `edgePreservingFilter`.


    ```

    import org.opencv.photo.Photo;

    class EdgePreserving implements Filter {

    public int flags = Photo.RECURS_FILTER;

    // int flags = NORMCONV_FILTER;

    public float sigma_s = 60;

    public float sigma_r = 0.4f;

    public Mat apply(Mat in) {

    Mat dst = new Mat();

    Photo.edgePreservingFilter(in, dst, flags, sigma_s, sigma_r);

    return dst;

    }

    }

    Listing 4-5

    EdgePreservering Class Re-implemented as a Filter

    ```


    You can use this new filter by modifying the main method of `WebcamWithFilters`,
    as shown in Listing [4-6](#490964_1_En_4_Chapter.xhtml#PC8).


    ```

    Filter filter = new EdgePreserving();

    while (cap.read(buffer)) {

    ims.showImage(filter.apply(buffer));

    }

    Listing 4-6

    Modified Main Function to Use Edge Preserving Filter

    ```


    Now let’s move on to executing the new code. Again, if you’re facing your webcam,
    you should get something similar to what I look like in Figure [4-2](#490964_1_En_4_Chapter.xhtml#Fig2).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig2_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Edge Preserving filter


    ### Canny


    Another useful filter in the OpenCV world is to apply a Canny effect, which is
    a fast and effective way to find contours and shapes in a `Mat` object. A quick
    implementation of `Canny` as a filter is shown in Listing [4-7](#490964_1_En_4_Chapter.xhtml#PC9).


    ```

    class Canny implements Filter {

    public boolean inverted = true;

    public int threshold1 = 100;

    public int threshold2 = 200;

    @Override

    public Mat apply(Mat in) {

    Mat dst = new Mat();

    Imgproc.Canny(in, dst, threshold1, threshold2);

    if (inverted) {

    Core.bitwise_not(dst, dst, new Mat());

    }

    Imgproc.cvtColor(dst, dst, Imgproc.COLOR_GRAY2RGB);

    return dst;

    }

    }

    Listing 4-7

    OpenCV’s Canny in a Filter

    ```


    Figure [4-3](#490964_1_En_4_Chapter.xhtml#Fig3) shows the result of applying the
    Canny filter to the main loop.


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig3_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Canny filter on webcam stream'
