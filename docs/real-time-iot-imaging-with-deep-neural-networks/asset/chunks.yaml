    ### Combining Filters


    You probably realized in the previous sections that you will want to find out
    the performance of each filter.


    Performance actually results from how many frames per seconds you can handle when
    reading from the video file or directly from the webcam device.


    Here we’re going to do the following:


    - Display the frame rate directly on the image

    - Combine a Gray filter with the Framerate filter using the `Pipeline` class we
    defined earlier in this chapter


    We already have the code for the Gray filter, so we’ll move directly to the code
    for displaying the frame rate per second (FPS).


    I always thought I could access the value of the frame rate using OpenCV’s set
    of properties on `VideoCapture`. Unfortunately, we’re pretty much always stuck
    with a hard-coded value and not what is actually showing on the screen.


    So, the implementation of FPS in Listing [4-8](#490964_1_En_4_Chapter.xhtml#PC10)
    is a small work-around that does some simple arithmetic based on how many frames
    have been displayed since the beginning of the filter’s life.


    Finally, it uses `putText` to apply the text directly onto the frame. It works
    well enough for simple use cases.


    ```

    class FPS implements Filter {

    long start = System.currentTimeMillis();

    int count = 0;

    Point org = new Point(50, 50);

    int fontFace = Imgproc.FONT_HERSHEY_PLAIN;

    double fontScale = 4.0;

    Scalar color = new Scalar(0, 0, 0);

    int thickness = 3;

    public Mat apply(Mat in) {

    count++;

    String text = "FPS: " + count / (1 + ((System.currentTimeMillis() - start) / 1000));

    Imgproc.putText(in, text, org, fontFace, fontScale, color, thickness);

    return in;

    }

    }

    ```


    Listing 4-8: FPS Filter


    Now let’s get back to combining the FPS showing on the stream with the Gray filter.


    You’ll be happy to know that the only line you have to update in the `main()`
    function of `WebcamWithFilters` is the one where the filter is instantiated, as
    shown here:


    ```

    Filter filter = new Pipeline(Gray.class, FPS.class);

    ```


    When you run the sample again from your Raspberry Pi, you’ll get something that
    looks like what’s shown in Figure [4-6](#490964_1_En_4_Chapter.xhtml#Fig6). Applying
    the two filters together, I usually get around 15 frames per second on the Raspberry
    Pi.


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig6_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig6_HTML.jpg)


    Figure 4-6: Combined Gray filter with FPS


    ## Applying Instagram-like Filters


    Enough serious work for now. Let’s take a short break and have a bit of fun with
    some Instagram-like filters.


    ### Color Map


    Let’s start this fun section by using OpenCV’s `colormap` function from `ImgProc`.
    We move the parameter of the `colormap` to the constructor, as shown in Listing
    [4-9](#490964_1_En_4_Chapter.xhtml#PC12), so that we can update it via the debug
    screen.


    ```

    class Color implements Filter {

    int colormap = 0;

    public Color(int colormap) {

    this.colormap = colormap;

    }

    public Color() {

    this.colormap = Imgproc.COLORMAP_INFERNO;

    }

    public Mat apply(Mat img) {

    Mat threshed = new Mat();

    Imgproc.applyColorMap(img, threshed, colormap);

    return threshed;

    }

    }

    ```


    Listing 4-9: Color Map


    To instantiate the filter, we need to pass in the color map we want to use, so
    this is done directly in the constructor. Here we need to have the instantiated
    filter instead of just its class, so we use the second constructor of the `Pipeline`
    class, with the instantiated `Filter` objects passed to the constructor.


    ```

    Filter filter = new Pipeline(new Color(Imgproc.COLORMAP_INFERNO), new FPS());

    ```


    When you execute this, you get something like Figure [4-7](#490964_1_En_4_Chapter.xhtml#Fig7).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig7_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig7_HTML.jpg)


    Figure 4-7: Inferno


    ### Thresh


    Thresh is another fun filter made by applying the `threshold` function of `Imgproc`.
    It applies a fixed-level threshold to each array element of the `Mat` object.


    The original purpose of the Thresh filter was to segment elements of a picture,
    such as to remove the noise of a picture by removing unwanted elements. It is
    not usually used for Instagram filtering, but it does look nice and can give you
    some creative ideas.


    Listing [4-10](#490964_1_En_4_Chapter.xhtml#PC14) shows how the Thresh filter
    can be implemented.


    ```

    class Thresh implements Filter{

    int sensitivity = 100;

    int maxVal = 255;

    public Thresh() {

    }

    public Thresh(int _sensitivity) {

    this.sensitivity = _sensitivity;

    }

    public Mat apply(Mat img) {

    Mat threshed = new Mat();

    Imgproc.threshold(img, threshed, sensitivity, maxVal, Imgproc.THRESH_BINARY);

    return threshed;

    }

    }

    ```


    Listing 4-10: Applying Threshold


    Figure [4-8](#490964_1_En_4_Chapter.xhtml#Fig8) shows the result.


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig8_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig8_HTML.jpg)


    Figure 4-8: Applying Thresh for a burning effect


    ### Sepia


    Let’s use the old (pun intended) Sepia effect again here, as implemented in Listing
    [4-11](#490964_1_En_4_Chapter.xhtml#PC15).


    ```

    class Sepia implements Filter {

    public Mat apply(Mat source) {

    Mat kernel = new Mat(3, 3, CvType.CV_32F);

    kernel.put(0, 0,

    0.272, 0.534, 0.131,

    0.349, 0.686, 0.168,

    0.393, 0.769, 0.189);

    Mat destination = new Mat();

    Core.transform(source, destination, kernel);

    return destination;

    }

    }

    ```


    Listing 4-11: Sepia


    When used with the video stream, the Sepia effect gives you output that looks
    like Figure [4-9](#490964_1_En_4_Chapter.xhtml#Fig9).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig9_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig9_HTML.jpg)


    Figure 4-9: Sepia effect'
