  trans: "\n### 安装 Docker\n\nDocker 官网最近发布了一篇关于如何在树莓派上设置 Docker 的文章；你可以在这里找到它：\n\n\
    ```\nhttps://www.docker.com/blog/happy-pi-day-docker-raspberry-pi/\n```\n\n所有步骤在以下代码中重复列出：\n\
    \n```\n#   a. 安装以下先决条件。\nsudo apt-get install apt-transport-https ca-certificates\
    \ software-properties-common -y\n#   b. 下载并安装 Docker。\ncurl -fsSL get.docker.com\
    \ -o get-docker.sh && sh get-docker.sh\n#   c. 授予 'pi' 用户运行 Docker 的权限。\nsudo\
    \ usermod -aG docker pi\n#   d. 导入 Docker CPG 密钥。\nsudo curl https://download.docker.com/linux/raspbian/gpg\n\
    #   e. 设置 Docker 仓库。\nsudo echo \"deb https://download.docker.com/linux/raspbian/\
    \ stretch stable\" >> /etc/apt/sources.list\n#   f. 修补并更新你的树莓派。\nsudo apt-get\
    \ update\nsudo apt-get upgrade\n#   g. 启动 Docker 服务。\nsystemctl start docker.service\n\
    #   h. 验证 Docker 是否已安装并运行。\ndocker info\n#    i. 你现在应该能看到一些关于版本、运行时等信息。\n```\n\
    \n### 使用 Docker 安装 Rhasspy\n\n通过运行准备好的容器即可启动整个 Rhasspy 套件，只需在树莓派上执行以下命令（前提是你已正确安装\
    \ Docker）。\n\n使用 `docker run` 来启动镜像本身；你可以将镜像想象成一个包含预打包软件和配置的小型操作系统，因此易于部署。\n\n\
    ```\ndocker run -d -p 12101:12101 \\\n--restart unless-stopped \\\n-v \"$HOME/.config/rhasspy/profiles:/profiles\"\
    \ \\\n--device /dev/snd:/dev/snd \\\nsynesthesiam/rhasspy-server:latest \\\n--user-profiles\
    \ /profiles \\\n--profile en\n```\n\n以下是代码的详细说明：\n\n*   `docker`：这是一个命令行可执行文件，用于与\
    \ Docker 守护进程通信，并发送启动和停止容器的命令。\n\n*   `-d`：这告诉 Docker 以守护进程模式运行镜像，即不等待镜像执行完毕，而是将容器作为后台进程启动。\n\
    \n*   `-p 12101:12101`：这执行 Docker 与主机之间的端口映射；没有这个映射，容器内开放的端口将无法从外部访问。这里我们告诉 Docker\
    \ 将容器的 12101 端口映射到树莓派的 12101 端口。\n\n*   `--restart unless-stopped`：顾名思义，即使容器因内部异常或错误而终止，Docker\
    \ 守护进程也会自动重启该镜像。\n\n*   `-v \"$HOME/.config/rhasspy/profiles:/profiles\"`：这里我们希望“挂载”树莓派的一个文件夹，使其对\
    \ Docker 容器可用，反之亦然。这类似于一个共享网络文件夹。它将用于存储 Rhasspy 为我们下载的文件。\n\n*   `--device /dev/snd:/dev/snd`：这非常巧妙；它将传入树莓派音频系统的原始数据进行映射，并使其对\
    \ Docker 容器可用。\n\n*   `synesthesiam/rhasspy-server:latest`：这是用于启动容器的镜像名称。可以将此镜像视为用于启动容器的文件系统的逐字副本。\n\
    \n*   接下来的两个是 Rhasspy 镜像能够识别的参数：\n    *   `--user-profiles /profiles`：这是存储配置文件的位置，也是我们与树莓派共享的文件夹路径。\n\
    \n    *   `--profile en`：这是要使用的语言。\n\n要检查容器是否已正确启动，让我们使用 `docker` 命令验证其状态，如下所示：\n\
    \n```\ndocker ps --format \"table {{.Status}}\\t{{.Ports}}\\t{{.Image}}\\t{{.ID}}\"\
    \n```\n\n这应该会显示类似以下内容；请务必检查我们放在最前面的状态字段：\n\n```\nSTATUS           PORTS      \
    \                 IMAGE                                CONTAINER ID\nUp 22 minutes\
    \    0.0.0.0:12101->12101/tcp    synesthesiam/rhasspy-server:latest   af7c56961d5c\n\
    ```\n\nRhasspy 服务器及其控制台已准备就绪，现在让我们回到主计算机，通过基于浏览器的 IDE 访问树莓派。\n\n### 启动 Rhasspy\
    \ 控制台\n\n要访问控制台，请转到 [`http://192.168.1.104:12101/`](http://192.168.1.104:12101/)，其中\
    \ 192.168.1.104 是树莓派的 IP 地址。\n\n然后你会看到如图 5-8 所示的生动界面。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig8_HTML.jpg](img/490964_1_En_5_Fig8_HTML.jpg)\n\
    \n图 5-8\n\nRhasspy 控制台\n\n首次启动时，控制台会非常明确地提示你应该去获取一些远程文件，因此，只要你的树莓派已连接到互联网，只需点击“立即下载”按钮即可。\n\
    \n该操作需要几分钟才能完成，所以请耐心等待。等待如图 5-9 所示的对话框出现。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig9_HTML.jpg](img/490964_1_En_5_Fig9_HTML.jpg)\n\
    \n图 5-9\n\n下载完成\n\n控制台会自动刷新，现在我们看到的是图 5-10。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig10_HTML.jpg](img/490964_1_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10\n\n刷新后的 Rhasspy 控制台\n\n但我们似乎仍然看到一些标记，提示我们缺少某些东西，如图 5-11 和图 5-12 所示。\n\
    \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig12_HTML.jpg](img/490964_1_En_5_Fig12_HTML.jpg)\n\
    \n图 5-12\n\n设置问题得到了很好的解释\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig11_HTML.jpg](img/490964_1_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11\n\n红色标记\n\n幸运的是，就目前而言，点击右上角的绿色“训练”按钮，我们的控制台就会变得闪亮且没有红色标记，如图 5-13 所示。我们现在可以开始使用\
    \ Rhasspy 控制台了。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig13_HTML.jpg](img/490964_1_En_5_Fig13_HTML.jpg)\n\
    \n图 5-13\n\n控制台已准备就绪！\n"
- fmt: '### The Rhasspy Console


    Let’s take a look at the Rhasspy menu in more detail. Figure [5-14](#490964_1_En_5_Chapter.xhtml#Fig14)
    shows the different sections for configuring the home assistant.


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig14_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig14_HTML.jpg)


    **Figure 5-14** More configuration options


    The usage of each tab is explained in the following list:


    - **Speech:** This is where you can try your assistant.

    - **Sentences:** This is where you define what your vocal assistant can detect
    and recognize.

    - **Slots:** Sentences have variables in them. Each possible value for a variable
    can be defined in a line in the `Sentences` section, or you can create lists of
    possible values in the `Slots` section.

    - **Words:** This is the section where you define how to pronounce words. This
    is especially useful for names, as the English engine is sometimes not so well
    prepared for French people’s pronunciations!

    - **Settings:** This is an all-encompassing screen where you can configure the
    way engines work and what to do with recognized intents.

    - **Advanced:** This is the same as `Settings` except the configuration is exposed
    as a text file that can be edited directly in the browser.

    - **Log:** This is where engine logs can be viewed in real time.


    A few notes…


    The browser IDE (to be correct, the processes inside the Docker container) will
    ask you to restart Rhasspy each time you change a configuration setting.


    It will also ask you to train Rhasspy each time you make changes to either the
    `Sentences` or `Words` section.


    There is no specific reason to not do this, unless you’re in the middle of surgery
    and need to ask your assistant for immediate help.


    We know how to navigate the console now, so let’s make our vocal assistant recognize
    something for us.


    ### First Voice Command


    To create a voice command that generates an intent, we need to make some edits
    in the `Sentences` section. As just explained, the `Sentences` section is where
    we define the sentences our engine can recognize.


    #### First Command, Full Sentence


    For once, the grammar used to define intents is quite simple and is inserted via
    an `.ini` file (which comes from the good old Windows 95 days).


    The pattern is as follows:


    ```

    [IntentName]

    Sentence1

    ```


    So, if it is Monday morning and you are really in need of coffee, you could write
    something like this:


    ```

    [Coffee]

    I need coffee

    ```


    Let’s try it. Let’s start by deleting the content of that `.ini` file and adding
    just the previous coffee intent, so the `Sentences` section now looks like Figure
    [5-15](#490964_1_En_5_Chapter.xhtml#Fig15).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig15_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig15_HTML.jpg)


    **Figure 5-15** I do really need coffee


    If you click the nicely visible `Save Sentences` button, you’ll get the training
    reminder shown in Figure [5-16](#490964_1_En_5_Chapter.xhtml#Fig16).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig16_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig16_HTML.jpg)


    **Figure 5-16** First Rhasspy training


    #### Speech Section and Trying Your Intent


    The Rhasspy engine is now trained, and you can try it by heading to the `Speech`
    section, shown again in Figure [5-17](#490964_1_En_5_Chapter.xhtml#Fig17).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig17_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig17_HTML.jpg)


    **Figure 5-17** Speech section


    The `Speech` section is where you can either speak or write a sentence and see
    whether and what intent is recognized.


    Supposed we type “I need coffee” in the `Sentence` field; the engine should recognize
    and generate the “Coffee” response that we just defined, as in Figure [5-18](#490964_1_En_5_Chapter.xhtml#Fig18).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig18_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig18_HTML.jpg)


    **Figure 5-18** I…need…coffee


    The voice command “Coffee” is recognized, and an associated generated JSON document
    is attached to it, with various inputs on confidence and raw values.


    Since we’re focusing on voice commands here, you can also just tap and hold the
    “Hold to record” button, say “I need coffee,” and see the spoken sentence being
    turned into text first, then displayed in the `Sentence` field, and then analyzed
    as was just done.


    This is probably the time to plug in the ReSpeaker or your USB microphone.


    If you have installed `eSpeak` ([`http://espeak.sourceforge.net/`](http://espeak.sourceforge.net/)),
    which is a text-to-speech command-line tool, you can also generate a WAV file
    and feed it to Rhasspy.


    ```

    espeak "I need coffee" --stdout >> ineedcoffee.wav

    ```


    Upload that `ineedcoffee.wav` file and click the `Get Intent` button.


    #### Fine-Tuned Intents


    It is of course possible to just pop in optional words, variables, and placeholders
    in the commands defined in the `Sentences` section. Let’s improve our game here
    and add details to our intent so as to create better voice commands.


    ##### Optional Words


    It is of course possible to make words optional in the sentence to make the commands
    more natural to users.


    In the previous coffee example, you could have an optional urgency embedded into
    the intent, as in you may *really* need coffee at times. This is done by putting
    the optional words inside square brackets, as shown here:


    ```

    [Coffee]

    I [really] need coffee

    ```


    After training, you see in Figure [5-19](#490964_1_En_5_Chapter.xhtml#Fig19) and
    Figure [5-20](#490964_1_En_5_Chapter.xhtml#Fig20) how the same `Coffee` intent
    is being properly recognized by Rhasspy.


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig20_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig20_HTML.jpg)


    **Figure 5-20** Coffee intent with the optional word, which is really


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig19_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig19_HTML.jpg)


    **Figure 5-19** Coffee intent without the optional word'
