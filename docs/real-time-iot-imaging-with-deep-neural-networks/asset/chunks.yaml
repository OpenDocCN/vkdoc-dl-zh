- fmt: "### Finding Cat Faces in Pictures Using the Yolo Neural Network\n\nWe have\
    \ not really seen how to train cascade classifiers to recognize things we want\
    \ them to recognize (because it’s beyond the scope of this book). The thing is,\
    \ most classifiers have a tendency to recognize some things better than others,\
    \ for example, people more than cars, turtles, or signs.\n\nDetection systems\
    \ based on those classifiers apply the model to an image at multiple locations\
    \ and scales. High-scoring regions of the image are considered detections.\n\n\
    The neural network Yolo uses a totally different approach. It applies a neural\
    \ network to the full image. This network divides the image into regions and predicts\
    \ bounding boxes and probabilities for each region. These bounding boxes are weighted\
    \ by the predicted probabilities.\n\nYolo has proven fast in real-time object\
    \ detection and is going to be our neural network of choice to run in real time\
    \ on the Raspberry Pi in Chapter [3](#490964_1_En_3_Chapter.xhtml).\n\nLater,\
    \ you will see how to train a custom Yolo-based model to recognize new objects\
    \ that you are looking for, but to bring this chapter to a nice and exciting end,\
    \ let’s quickly run one of the provided default Yolo networks, trained on the\
    \ COCO image set, that can detect a large set of 80 objects, cats, bicycle, cars,\
    \ etc., among other objects.\n\nAs for us, let’s see whether Marcel is up to the\
    \ task of being detected as a cat even through the eyes of a modern neural network.\n\
    \nThe final sample introduces a few more OpenCV concepts around deep neural networks\
    \ and is a great closure for this chapter.\n\nYou probably know already what a\
    \ neural network is; it is modeled on how the connections in the brain work, simulating\
    \ threshold-based neurons triggered by incoming electrical signals. If my highly\
    \ neuron-dense brain were a drawing, it would look something like Figure [2-17](#490964_1_En_2_Chapter.xhtml#Fig17).\n\
    \n![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig17_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig17_HTML.jpg)\n\
    \nFigure 2-17\n\nMy brain\n\nI actually do hope reality is slightly different\
    \ and my brain is way more colorful.\n\nWhat you see in Figure [2-17](#490964_1_En_2_Chapter.xhtml#Fig17)\
    \ at first sight is the configuration of the network. Figure [2-17](#490964_1_En_2_Chapter.xhtml#Fig17)\
    \ shows only one hidden layer in between the input and output layers, but standard\
    \ deep neural networks have around 60 to 100 hidden layers and of course way more\
    \ dots for inputs and outputs.\n\nIn many cases, the network maps the image, with\
    \ a hard-coded size specific to that network, from one pixel to one dot. The output\
    \ is actually slightly more complicated, containing among other things probabilities\
    \ and names, or at least an index of names in a list.\n\nDuring the training phase,\
    \ each of the arrows in the diagram, or each neuron connection in the network,\
    \ is slowly getting a weight, which is something that impacts the value of the\
    \ next neuron, which is a circle, in the next hidden or output layer.\n\nWhen\
    \ running the code sample, we will need both a config file for the graphic representation\
    \ of the network, with the number of hidden layers and output layers, and a file\
    \ for the weights, which includes a number for each connection between the circles.\n\
    \nLet’s move from theory to practice now with some Java coding. We want to give\
    \ some file as the input to this Yolo-based network and recognize, you guessed\
    \ it, our favorite cat.\n\nThe Yolo example is split into several steps, listed\
    \ here:\n\n1.  Load the network as an OpenCV object using two files. As you have\
    \ seen, this needs both a weight file and a config file.\n\n2.  In the loaded\
    \ network, find out the unconnected layers, meaning the layers that do not have\
    \ an output. Those will be output layers themselves. After running the network,\
    \ we are interested in the values contained in those layers.\n\n3.  Convert the\
    \ image we would like to detect objects from to a blob, something that the network\
    \ can understand. This is done using the OpenCV function `blobFromImage`, which\
    \ has many parameters but is quite easy to grasp.\n\n4.  Feed this beautiful blob\
    \ into the loaded network, and ask OpenCV to run the network using the function\
    \ `forward`. We also tell it the nodes we are interested in retrieving values\
    \ from, which are the output layers we computed before.\n\n5.  Each output returned\
    \ by the Yolo model is a set of the following:\n    *   Four values for the location\
    \ (basically four values to describe the rectangle)\n    *   Values representing\
    \ the confidence for each possible object that our network can recognize, in our\
    \ case, 80\n\n6.  We move to a postprocess step where we extract and construct\
    \ sets of boxes and confidences from the outputs returned by the network.\n\n\
    7.  Yolo has a tendency to send many boxes for the same results; we use another\
    \ OpenCV function, `Dnn.NMSBoxes`, that removes overlapping by keeping the box\
    \ with the highest confidence score. This is called *nonmaximum suppression* (NMS).\n\
    \n8.  We display all this on the picture using annotated rectangles and text,\
    \ as is the case for many object detection samples.\n\nSee Listing [2-10](#490964_1_En_2_Chapter.xhtml#PC26)\
    \ for the full code. Java, being verbose, results in quite a few lines, but this\
    \ is not something you should be afraid of anymore. Right?"
