    and you can think of `C1` as channel 1, which basically means one integer per
    cell of the matrix.


    The naming scheme for types is as follows:


    ```

    CV_{U|S|F}C

    ```


    Understanding the types used in `Mat` is important, so be sure to review the most
    common types shown in Table [2-1](#490964_1_En_2_Chapter.xhtml#Tab1).


    Table 2-1


    OpenCV Types for OpenCV Mat Object


    | Name | Type | Bytes | Signed | Range |

    | --- | --- | --- | --- | --- |

    | `CV_8U` | Integer | 1 | No | 0 to 255 |

    | `CV_8S` | Integer | 1 | Yes | −128 to 127 |

    | `CV_16S` | Integer | 2 | Yes | −32768 to 32767 |

    | `CV_16U` | Integer | 2 | No | 0 to 65535 |

    | `CV_32S` | Integer | 4 | Yes | −2147483648 to 2147483647 |

    | `CV_16F` | Float | 2 | Yes | −6.10 × 10^(-5) to 6.55 × 10⁴ |

    | `CV_32F` | Float | 4 | Yes | −1.17 × 10^(-38) to 3.40 × 10^(38) |


    The number of channels in a `Mat` is also important because each pixel in an image
    can be described by a combination of multiple values. For example, in RGB (the
    most common channel combination in images), there are three integer values between
    0 and 256 per pixel. One value is for red, one is for green, and one is for blue.


    See for yourself in Listing [2-2](#490964_1_En_2_Chapter.xhtml#PC9), where we
    show a 50×50 blue `Mat`.


    ```

    public class HelloCv2 {

    public static void main(String[] args) throws Exception {

    NativeLoader.loadLibrary(Core.NATIVE_LIBRARY_NAME);

    Mat hello = Mat.eye(50, 50, CvType.CV_8UC3);

    hello.setTo(new Scalar(190, 119, 0));

    HighGui.imshow("rgb", hello);

    HighGui.waitKey();

    System.exit(0);

    }

    }

    Listing 2-2

    Some Blue…

