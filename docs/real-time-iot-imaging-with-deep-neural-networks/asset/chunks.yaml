    made of three channels, meaning three values, but note that in OpenCV, RGB values
    are reversed by design (why, oh, why?), so it is actually BGR. The value for blue
    comes first in the code.


    So, before the value of all the pixels, set using the function `setTo`, is B:190,
    G:119, Red:0, which gives the nice ocean sea blue shown in Figure [2-3](#490964_1_En_2_Chapter.xhtml#Fig3).


