  trans: '

    ### 轻松设置 SSH


    通常，在通过 SSH 连接时，你会禁用密码认证，尤其是树莓派的默认认证方式，然后从本地机器设置一个密钥来连接远程机器，再将该远程机器配置为只接受一个或有限数量的密钥，以防止随机的安全攻击。


    其工作原理如下：


    1.  创建你个人使用的 SSH 密钥对。一个私钥保留在你的电脑上，一个公钥作为已知实体添加到远程机器上。在量子计算到来之前，这种密钥对被认为是安全的，并且仅通过公钥几乎不可能猜出某人的私钥。有关更多信息，请阅读
    Joshua Davies 在 [`https://commandlinefanatic.com/cgi-bin/showarticle.cgi?article=art054`](https://commandlinefanatic.com/cgi-bin/showarticle.cgi%253Farticle%253Dart054)
    上发表的文章。


    2.  将生成的公钥注册到远程设备（此处为树莓派）上。你可以随意将公钥提供给任意多的人；默认情况下，这是以 `.pub` 扩展名结尾的文件。


    3.  添加一些 SSH 配置，以便在通过快捷方式连接到树莓派时使用生成的私钥。不过，那个私钥是属于你的，请确保不要将其提供给任何人！


    在亚马逊云服务（AWS）上，你通常会得到一个 `.pem` 文件来连接新的运行实例。该 `.pem` 文件会自动为你注册到新的虚拟机上，因此只有你能访问这个新创建的虚拟机，从而确保对你云端机器的安全访问。


    要在你自己的本地机器上创建密钥，请使用 `ssh-keygen` 命令，配合 `-t` 参数指定算法，以及 `-b` 参数指定位数（目前，4096 位被认为是相当安全的）。


    ```

    % ssh-keygen -t rsa -b 4096

    Generating public/private rsa key pair.

    Enter file in which to save the key (~/.ssh/id_rsa):

    ```


    命令成功运行后，会生成两个文件：`id_rsa.pub` 文件和 `id_rsa` 文件。`pub` 文件是你的公钥，可以提供给任何人；`id_rsa` 是你的私钥，必须极其小心地处理。


    为了让树莓派知道你的公钥并识别你，你需要将其作为一行内容添加到 `/home/pi/.ssh/authorized_keys` 文件中，如果必要的话，还需创建该文件及其父文件夹
    `.ssh`。


    完成后，在你的电脑上，就该将 SSH 连接的详细信息添加到 `$HOME/.ssh/config` 文件中，同样，如果该文件不存在，则创建它。


    ```

    Host pi4

    User pi

    IdentityFile ~/.ssh/id_rsa

    HostName 192.168.1.17

    ForwardX11 yes

    ForwardX11Trusted yes

    ```


    以下是这些连接设置的含义：


    - `pi4` 是我们从现在开始用来连接树莓派的快捷方式。

    - `User` 是树莓派上的默认用户，通常是 `pi`。

    - `IdentifyFile` 是你电脑上用于验证你身份的私钥路径；这是你刚才创建的文件。

    - `HostName` 是树莓派的 IP 地址。如果你忘记了，可以再次使用 `nmap` 查找。

    - `ForwardX11` 和 `ForwardX11Trusted` 是必需的，因为我们稍后会将视频流重定向到主电脑。


    有了所有这些设置，你可能会想这一切是否值得。让我们立即获得一点成就感来证明它是值得的。通过 SSH 连接，我们现在将打开一个带有用户界面的应用程序，例如内置的
    Chromium 浏览器。


    你可以通过更改 `DISPLAY` 变量的设置来切换树莓派屏幕上的窗口显示。


    - 要显示树莓派屏幕，请使用 `export DISPLAY=:0`。

    - 要显示本地电脑屏幕，请使用 `export DISPLAY=:10`。


    以下是命令列表：


    ```

    ssh pi4

    export DISPLAY=:10

    chromium-browser

    ```


    图 3-16 展示了 Chromium 如何在树莓派上执行，但其窗口却打开在电脑上。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig16_HTML.jpg](img/490964_1_En_3_Fig16_HTML.jpg)


    图 3-16


    打开远程应用程序


    ## 为远程使用设置 Visual Studio Code


    本书的主要概念之一是，你将能够在一台大屏幕的机器上编写代码，然后让其在远程设备上运行，并将视觉输出重定向到大屏幕上。


    到目前为止，你一直在 Visual Studio Code 中编写代码并在本地运行。从现在开始，你将在本地编写代码，并在远程运行它。


    本章前面所有的 SSH 设置工作都是因为 Visual Studio Code 有一个名为 Remote-SSH 的插件，一旦你完成了 SSH 设置，它就会为你完成所有其余工作，并与编辑器的生态系统完全集成。


    让我们首先安装 Remote-SSH 插件，如图 3-17 所示。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig17_HTML.jpg](img/490964_1_En_3_Fig17_HTML.jpg)


    图 3-17


    安装 Remote-SSH 插件


    插件安装完毕并快速刷新编辑器后，你可以从命令启动器中启动“连接到主机”命令，如图 3-18 所示。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig18_HTML.jpg](img/490964_1_En_3_Fig18_HTML.jpg)


    图 3-18


    连接到主机


    注意


    如果当前项目文件过多，Remote-SSH 插件可能无法正常工作。如果出现这种情况，请确保在打开新的 Remote-SSH 会话之前，先在 Visual Studio
    Code 中打开一个空白的全新窗口。


    图 3-19、图 3-20 和图 3-21 向你展示了连接到树莓派所需的步骤。请注意，`pi4` 这个快捷方式取自你刚才在 `$HOME/.ssh/config`
    文件中设置的那个。如果你使用了其他快捷方式，这里会有所不同。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig21_HTML.jpg](img/490964_1_En_3_Fig21_HTML.jpg)


    图 3-21


    从 Visual Studio Code 连接到树莓派


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig20_HTML.jpg](img/490964_1_En_3_Fig20_HTML.jpg)


    图 3-20


    设置 SSH 主机


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig19_HTML.jpg](img/490964_1_En_3_Fig19_HTML.jpg)


    图 3-19


    选择 pi4


    此时，在 Visual Studio Code 内部，你拥有一个远程连接到树莓派的终端。这意味着你可以随意启动远程命令，而且你还可以拔掉树莓派上的键盘和鼠标；其余大部分工作都将在你的本地电脑上完成。


    作为第一次检查，我们可以运行一个命令来检查树莓派的 IP 地址，如下所示：


    ```

    ip addr

    ```


    输出将显示在 Visual Studio Code 的“终端”选项卡中，如图 3-22 所示。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig22_HTML.jpg](img/490964_1_En_3_Fig22_HTML.jpg)


    图 3-22


    在“终端”选项卡上确认 IP 地址


    输出 IP 地址显然不是我们能用那个终端做的主要事情，所以让我们继续，现在安装所需的 Java 开发工具包。

    '
- fmt: '### Setting Up the Java OpenJDK


    All the code in this book is Java code, so we’ll need to install the Java Development
    Kit and runtime on the Raspberry Pi.


    As an optional dependency, you can also install Maven. Maven is not really required
    for most of the examples of the book, but this will stop Visual Studio Code from
    displaying annoying messages that it cannot find the (unnecessary) Maven executable.


    So, on the Terminal tab of Visual Studio Code, let’s get the software package
    installer, `apt`, to install Java for us. This is done via the small snippet shown
    here:


    ```

    sudo apt update

    sudo apt install openjdk-11-jdk

    ```


    Optionally, also run the following command to install Maven:


    ```

    sudo apt install maven

    ```


    `sudo` at the start of each command line is used to get the required escalated
    privileges to install new software with `apt`.


    The output of the previous commands should be similar to Figure [3-23](#490964_1_En_3_Chapter.xhtml#Fig23).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig23_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Installing Java


    ### Alternative to Setting Up the Java SDK


    The current selection of JDK on Raspberry Pi 4 running Buster (the latest Raspbian
    version) is quite impressive. Sometimes, however, especially on older versions
    of Raspbian, you could be stuck with an outdated JDK for quite some time.


    It’s worth noting that companies like Azul and Bellsoft have released up-to-date
    versions of the JDK specifically compiled for the ARM CPU, the processor running
    on the Raspberry Pi.


    Visit these two sites for direct links to the JDK packages:


    ```

    https://bell-sw.com/pages/java-11.0.5%20for%20Embedded/

    https://www.azul.com/downloads/zulu-community/

    ```


    The following short snippet will download and install the JDK 11 from Bellsoft:


    ```

    sudo wget https://download.bell-sw.com/java/11.0.5+11/bellsoft-jdk11.0.5+11-linux-arm32-vfp-hflt.deb

    sudo dpkg -i bellsoft-jdk11.0.5+11-linux-arm32-vfp-hflt.deb

    ```


    The available version is indeed Java 11, as shown in the following output:


    ```

    pi@raspberrypi:~ $ java -version

    openjdk version "11.0.5-BellSoft" 2019-10-15

    OpenJDK Runtime Environment (build 11.0.5-BellSoft+11)

    OpenJDK 32-Bit Server VM (build 11.0.5-BellSoft+11, mixed mode)

    ```


    With the Java Development Kit now installed on your Raspberry Pi, let’s move on
    to the meat of this chapter, running OpenCV code in Java and on the Pi.


    ### Checking Out the OpenCV/Java Template


    We’ll start by checking out the OpenCV/Java project template directly on the Raspberry.
    There are a few ways to do this; the three main ones are as follows:


    - Directly perform a Git clone of the template

    - Download the zip file from the Git project template

    - Generate the templated project using Maven


    Let’s quickly review these three one by one.


    #### Performing a Git Clone


    It is possible and convenient to simply check out code from Visual Studio Code
    straight to your Pi. This is done via the command palette and typing anything
    starting with `git`.


    You will get a few options, one of them being Git: Clone, as shown in Figure [3-24](#490964_1_En_3_Chapter.xhtml#Fig24).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig24_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig24_HTML.jpg)


    Figure 3-24


    Git:Clone option in Visual Studio Code


    From here, enter the location of the template repository as follows, as shown
    in Figure [3-25](#490964_1_En_3_Chapter.xhtml#Fig25):


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig25_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig25_HTML.jpg)


    Figure 3-25


    Entering the template URL


    ```

    https://github.com/hellonico/opencv-java-template.git

    ```


    Finally, confirm by clicking Open in the dialog box (Figure [3-26](#490964_1_En_3_Chapter.xhtml#Fig26)).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig26_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig26_HTML.jpg)


    Figure 3-26


    Of course, open the cloned repository


    The project is now checked out on the Raspberry and ready to be executed.


    #### Downloading the Zip File


    Alternatively, you can download the zip file from the project template. This can
    be done using the `wget` command in the terminal in case you do not want to use
    Git at all.


    ```

    wget https://github.com/hellonico/opencv-java-template/archive/master.zip

    unzip master.zip

    ```


    Figure [3-27](#490964_1_En_3_Chapter.xhtml#Fig27) shows the Terminal tab of Visual
    Code Studio.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig27_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig27_HTML.jpg)


    Figure 3-27


    Downloading the zip file from the Pi


    This has the advantage of not being reliant on Git but has the consequence that
    it is harder to share updates between different Raspberry Pis.


    #### Using Maven


    A third way to set up the project is the same technique that was used to originally
    create the Git template repository: using the build tool Maven. In the Java ecosystem,
    quite a few people are a bit afraid of going the Maven way, but for a set of given
    tasks, Maven is a pretty solid choice.


    Maven, once installed, can create a project for you with all the required files
    through the Maven archetypes.


    The following command, once copied and pasted onto the Terminal tab, will generate
    the project structure for you, as shown here:


    ```

    mvn org.apache.maven.plugins:maven-archetype-plugin:2.4:generate \

    -DarchetypeArtifactId=maven-archetype \

    -DarchetypeGroupId=origami \

    -DarchetypeVersion=1.0 \

    -DarchetypeCatalog=https://repository.hellonico.info/repository/hellonico/ \

    -Dversion=1.0-SNAPSHOT \

    -DgroupId=hello \

    -DartifactId=opencv-java-template

    ```


    The important parameters of the command have been highlighted in the previous
    snippet and are explained here:


    - `archetypeVersion`: This is the version of the project structure, here 1.0.
    There may be a few updates soon, but don’t expected too many. It’s better to create
    your own.

    - `version`: This is the version of your project; it usually starts at `1.0-SNAPSHOT`.

    - `groupId`: This is the Maven group of your project, like `com.google`, etc.

    - `artifactId`: This is the name of the project within the `groupId`. It must
    be unique.


    Here we are using an older version of the archetype plugin; with this version,
    it is easier to retrieve artifacts from the custom Maven repository at [`repository.hellonico.info`](http://repository.hellonico.info).


    Later versions of the archetype plugin require a deeper knowledge of the Maven
    framework, which is out of the scope of this book.


    Whichever technique you use, you can now open the remote folder. You should see
    something similar to the tree in Figure [3-28](#490964_1_En_3_Chapter.xhtml#Fig28).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig28_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig28_HTML.jpg)


    Figure 3-28


    Project files on the Raspberry Pi


    Again, the files are located on the Raspberry Pi, the Java code will be executed
    on the Raspberry Pi, but the editor is effectively running on your local computer.'
