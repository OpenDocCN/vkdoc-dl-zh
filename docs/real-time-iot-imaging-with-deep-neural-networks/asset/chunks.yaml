    \nFigure 1-32\n\nMarcel the cat in sepia\n\nIn this layout, you can see the following:\n\
    \n*   The array of values used to recompute the sepia has been extracted in the\
    \ main code as a double array.\n\n*   While debugging, the `rgb` array and its\
    \ values are available on the Variables tab and can be updated at will.\n\n* \
    \  The `sepia` function here is used only as a debugging function, not in the\
    \ main code.\n\n*   That `sepia` function outputs a picture in a file named `sepia.jpg`.\n\
    \n*   A watch expression is added, making a simple call to the `sepia` function\
    \ defined earlier.\n\n*   The `sepia.jpg` picture is opened within Visual Studio\
    \ Code, and any update of values in the `rgb` array will output a new picture\
    \ in real time.\n\nNow that you have an idea of how things can be worked on from\
    \ within Visual Code Studio, let’s move on to some OpenCV fun.\n\n# 2. Object\
    \ Detection in Video Streams\n\nMost of the available how-to guides for working\
    \ with OpenCV in Java require you to have an insane amount of knowledge before\
    \ getting started. The good news for you is that with what you have learned up\
    \ to now with this book, you can get started with OpenCV in Java in seconds.\n\
    \n## Going Sepia: OpenCV Java Primer\n\n> *Choosing sepia is all to do with trying\
    \ to make the image look romantic and idealistic. It’s sort of a soft version\
    \ of propaganda.*\n> \n> —Martin Paar^([¹](#fn1))\n\nIn this section, you will\
    \ be introduced to some basic OpenCV concepts . You’ll learn how to add the files\
    \ needed for working with OpenCV in Java, and you’ll work on a few simple OpenCV\
    \ applications, like smoothing, blurring images, or indeed turning them into sepia\
    \ images."
  trans: "\n### 监视表达式\n\n你可能已经注意到编辑器左侧的`Watch`（监视）选项卡，并且可能已经好奇它的用途。\n\n在左上角的`Variables`（变量）选项卡中，你可以看到对象和字段的直接值，但在`Watch`选项卡中，你可以对所有可用的对象添加函数调用，这被称为*监视表达式*。监视表达式可以在变量或对象被实例化之前定义。\n\
    \n在对象视图中，以及在进行直接渲染时，你可以使用监视表达式来产生一些副作用，创建函数，例如，将输入图片从彩色转换为黑白，或者快速创建图像的仅轮廓版本。当然，你可以实时完成所有这些操作，但在接下来的章节中，我们将使用较低的处理能力和内存，因此，短暂暂停代码执行并使用一次性调用监视表达式，绝对是保持额外内存和计算量最小化的更好方法。\n\
    \n在本章的第一部分，我们将在监视表达式中添加简单的计算——一个没有副作用，直接根据输入参数返回值的表达式；另一个有副作用，会将内容打印到日志文件中。\n\n\
    我们将从代码示例 1-3 开始，该示例只是在一个`while`循环中对一个递增的值进行循环。我们不想在这个过程中让计算机过载，所以我们在循环内部添加一个短暂的休眠调用，以便给执行循环一些时间。\n\
    \n```\npublic class Second {\npublic static void main(final String[] args) throws\
    \ Exception {\nint i = 0;\nwhile (true) {\ni++;\nThread.sleep(500);\n}\n}\n}\n\
    代码清单 1-3\n令人难以置信的整数循环\n```\n\n我们将在监视表达式中添加表达式`i+2`，然后启动调试会话，但暂时不设置断点。\n\n等待一段时间后，我们点击在第\
    \ 6 行添加一个断点，然后观察编辑器停止，就好像我们在开始执行之前就已经设置了断点一样。\n\nVisual Studio Code 的布局将如图 1-28\
    \ 所示。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig28_HTML.jpg](img/490964_1_En_1_Fig28_HTML.jpg)\n\
    \n图 1-28\n\n调试模式下的令人难以置信的循环\n\n通过点击并创建一个断点，你刚刚停止了执行，调试布局出现了。如你所见，变量`i`的值已经是 7，而监视表达式`i+2`显示正确的值\
    \ 9。\n\n不错。\n\n现在是一些你可以自己尝试的练习。尝试实现两个函数，并在两个监视表达式中使用它们。\n\n*   一个函数将对变量`i`进行基本的计算并显示结果。\n\
    *   另一个函数不返回任何值，但会将一个值追加到外部文件中。\n\n这应该会花费你大约 5-10 分钟的时间。祝你好运！完成后，你可以阅读并将你的代码与代码清单\
    \ 1-4 进行比较。\n\n```\nimport java.io.BufferedWriter;\nimport java.io.FileWriter;\n\
    import java.io.Writer;\npublic class SecondFinal {\nstatic int myfunction1(final\
    \ int i) {\nreturn 3 + i + 2;\n}\nfinal static String filePath = \"my.log\";\n\
    static void myfunction2(final int i) {\ntry (Writer writer = new BufferedWriter(new\
    \ FileWriter(filePath))) {\nwriter.write(String.format(\">> %d\\n\", i));\n} catch\
    \ (Exception e) {\n}\n}\npublic static void main(final String[] args) throws Exception\
    \ {\nint i = 0;\nwhile (true) {\ni++;\nThread.sleep(500);\n}\n}\n}\n代码清单 1-4\n\
    有副作用和无副作用的监视表达式\n```\n\n不同的监视表达式按预期显示在 Visual Studio Code 调试布局的左侧（图 1-29）。\n\n\
    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig29_HTML.jpg](img/490964_1_En_1_Fig29_HTML.jpg)\n\
    \n图 1-29\n\n监视表达式\n\n这并不难，对吧？好消息是，在处理图像库 OpenCV 时，你可以重用这些技术。例如，你可以执行以下操作：\n\n\
    *   输出图像的宽度、高度以及颜色通道数\n*   将图像的霍夫线输出到外部文件\n*   输出图像中检测到的人脸数量\n\n请记住，你可以在调试模式下启动代码执行后添加监视表达式，因此可以在任何需要的时候添加它们。\n\
    \n### 更改变量值\n\n在结束之前，关于 Visual Studio Code 调试的最后一点是，你可以直接从`Variables`选项卡实时更改变量的值。\n\
    \n这可是一项超能力！\n\n你可以通过双击想要更改的变量值来实现，如图 1-30 所示。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig30_HTML.jpg](img/490964_1_En_1_Fig30_HTML.jpg)\n\
    \n图 1-30\n\n更新变量值\n\n观察图 1-31 中相关的监视表达式是如何为你重新计算的。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig31_HTML.jpg](img/490964_1_En_1_Fig31_HTML.jpg)\n\
    \n图 1-31\n\n你可以看到相关的监视值正在被更新\n\n太棒了。在图像处理和神经网络的背景下，你可以直接更新 alpha、gamma、对比度等参数，并实时获得重新计算的图像或检测结果。\n\
    \n### 总结\n\n我们花了一些时间学习调试，所以想象一下，通过在你刚刚看到的图像处理和对象检测的背景下重用这些技术，可以完成多少工作。\n\n例如，图\
    \ 1-32 展示了如何将一个设计良好的调试布局用作完整的用户界面，来更新用于棕褐色转换的值。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig32_HTML.jpg](img/490964_1_En_1_Fig32_HTML.jpg)\n\
    \n图 1-32\n\n棕褐色调的马塞尔猫\n\n在此布局中，你可以看到以下内容：\n\n*   用于重新计算棕褐色调的值数组已在主代码中提取为一个双精度数组。\n\
    *   调试时，`rgb`数组及其值在`Variables`选项卡中可用，并且可以随意更新。\n*   这里的`sepia`函数仅用作调试函数，不在主代码中使用。\n\
    *   该`sepia`函数将图片输出到一个名为`sepia.jpg`的文件中。\n*   添加了一个监视表达式，简单地调用之前定义的`sepia`函数。\n\
    *   `sepia.jpg`图片在 Visual Studio Code 中打开，并且`rgb`数组中任何值的更新都会实时输出一张新图片。\n\n现在你已经了解了如何在\
    \ Visual Studio Code 中进行操作，让我们继续探索一些 OpenCV 的乐趣吧。\n\n# 2. 视频流中的对象检测\n\n大多数关于在\
    \ Java 中使用 OpenCV 的可用指南都要求你在开始之前拥有大量的知识。对你来说，好消息是，凭借你到目前为止从本书中学到的知识，你可以在几秒钟内开始在\
    \ Java 中使用 OpenCV。\n\n## 棕褐色调入门：OpenCV Java 基础\n\n> *选择棕褐色调完全是为了让图像看起来浪漫和理想化。这有点像一种柔和的宣传形式。*\n\
    > \n> —马丁·帕尔^(¹)\n\n在本节中，你将了解一些基本的 OpenCV 概念。你将学习如何添加在 Java 中使用 OpenCV 所需的文件，并将处理一些简单的\
    \ OpenCV 应用程序，例如平滑、模糊图像，或者实际上将它们转换为棕褐色图像。\n"
- fmt: '### A Few Files to Make Things Easier…


    Visual Studio Code is clever, but to understand the code related to the OpenCV
    library, it needs some instructions. Those instructions are included in a project’s
    metadata file, which specifies what library and what version to include to run
    the code.


    A template for OpenCV/Java has been prepared for you, so to get started, you can
    simply clone the project template found here:


    ```

    git clone git@github.com:hellonico/opencv-java-template.git

    ```


    Or you can use the zip file, found here:


    ```

    https://github.com/hellonico/opencv-java-template/archive/master.zip

    ```


    This will give you the minimum set of files required, as shown here:


    ```

    .

    ├── pom.xml

    └── src

    ├── main

    │   └── java

    │       └── hello

    │           └── HelloCv.java

    └── test

    └── java

    └── hello

    └── AppTest.java

    ```


    There are seven directories and three files. Since this setup can be autogenerated,
    let’s focus on the template content, listed here:


    *   `HelloCv.java`, which contains the main Java code

    *   `AppTest.java`, which contains the bare minimum Java test file

    *   `pom.xml`, which is a project descriptor that Visual Studio Code can use to
    pull in external Java dependencies


    You can open that top folder from the project template from within Visual Studio
    Code, which gives you a familiar view, as shown in Figure [2-1](#490964_1_En_2_Chapter.xhtml#Fig1).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig1_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Project layout


    Figure [2-1](#490964_1_En_2_Chapter.xhtml#Fig1) shows the two Java files, so you
    can see the content of each; in addition, the project layout has been expanded
    so all the files are listed on the left.


    This view should look familiar to you from the previous chapter, and you can immediately
    try running the `HelloCv.java` code using the Run or Debug link at the top of
    the main function.


    The output in the terminal should look like the following code, which is an OpenCV
    `Mat` object. To put it simply, it’s a matrix of size 3×3, with 1 on the top-left,
    bottom-right diagonal.


    ```

    [  1,   0,   0;

    0,   1,   0;

    0,   0,   1]

    ```


    Listing [2-1](#490964_1_En_2_Chapter.xhtml#PC5) probably looks familiar to users
    of OpenCV.


    ```

    package hello;

    import org.opencv.core.Core;

    import org.opencv.core.CvType;

    import org.opencv.core.Mat;

    import org.scijava.nativelib.NativeLoader;

    public class HelloCv {

    public static void main(String[] args) throws Exception {

    NativeLoader.loadLibrary(Core.NATIVE_LIBRARY_NAME);

    Mat hello = Mat.eye(3, 3, CvType.CV_8UC1);

    System.out.println(hello.dump());

    }

    }

    ```


    **Listing 2-1** First OpenCV Mat


    Let’s go through the code line by line to understand what is happening behind
    the scenes.


    First, we use the `NativeLoader` class to load a native library, as shown here:


    ```

    NativeLoader.loadLibrary(Core.NATIVE_LIBRARY_NAME);

    ```


    This step is required because OpenCV is not a Java library; it is a binary compiled
    especially for your environment.


    Usually in Java, you load a native library with `System.loadLibrary`, but that
    requires these two things:


    *   You have a library compiled for your machine.

    *   The library is placed somewhere where the Java runtime on your computer can
    find it.


    In this book, we will rely on some packaging magic, where the library is downloaded
    and loaded automatically for you and where, along the way, the library is placed
    in a location that `NativeLoader` handles for you. So, there’s nothing to do here
    except to add that one-liner to the start of each of your OpenCV programs; it’s
    best to put it at the top of the main function.


    Now, let’s move on to the second line of the program, as shown here:


    ```

    Mat hello = Mat.eye(3, 3, CvType.CV_8UC1);

    ```


    That second line creates a `Mat` object. A `Mat` object is, as explained a few
    seconds ago, a matrix. All image manipulation, all video handling, and all the
    networking are done using that `Mat` object. It wouldn’t be too much of a stretch
    to say that the main thing OpenCV is programmatically doing is proposing a great
    programming interface to work with optimized matrices, in other words, this `Mat`
    object.


    In Visual Studio Code, you can already access operations directly using the autocompletion
    feature, as shown in Figure [2-2](#490964_1_En_2_Chapter.xhtml#Fig2).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig2_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig2_HTML.jpg)


    **Figure 2-2** Inline documentation for the OpenCV Mat object


    Within the one-liner, you create a 3×3 matrix, and the internal type of each element
    in the matrix is of type `CV_8UC1`. You can think of `8U` as 8 bits unsigned,
    and you can think of `C1` as channel 1, which basically means one integer per
    cell of the matrix.


    The naming scheme for types is as follows:


    ```

    CV_{U|S|F}C

    ```


    Understanding the types used in `Mat` is important, so be sure to review the most
    common types shown in Table [2-1](#490964_1_En_2_Chapter.xhtml#Tab1).


    **Table 2-1** OpenCV Types for OpenCV Mat Object


    | Name | Type | Bytes | Signed | Range |

    | --- | --- | --- | --- | --- |

    | `CV_8U` | Integer | 1 | No | 0 to 255 |

    | `CV_8S` | Integer | 1 | Yes | −128 to 127 |

    | `CV_16S` | Integer | 2 | Yes | −32768 to 32767 |

    | `CV_16U` | Integer | 2 | No | 0 to 65535 |

    | `CV_32S` | Integer | 4 | Yes | −2147483648 to 2147483647 |

    | `CV_16F` | Float | 2 | Yes | −6.10 × 10^(-5) to 6.55 × 10⁴ |

    | `CV_32F` | Float | 4 | Yes | −1.17 × 10^(-38) to 3.40 × 10^(38) |


    The number of channels in a `Mat` is also important because each pixel in an image
    can be described by a combination of multiple values. For example, in RGB (the
    most common channel combination in images), there are three integer values between
    0 and 256 per pixel. One value is for red, one is for green, and one is for blue.


    See for yourself in Listing [2-2](#490964_1_En_2_Chapter.xhtml#PC9), where we
    show a 50×50 blue `Mat`.


    ```

    public class HelloCv2 {

    public static void main(String[] args) throws Exception {

    NativeLoader.loadLibrary(Core.NATIVE_LIBRARY_NAME);

    Mat hello = Mat.eye(50, 50, CvType.CV_8UC3);

    hello.setTo(new Scalar(190, 119, 0));

    HighGui.imshow("rgb", hello);

    HighGui.waitKey();

    System.exit(0);

    }

    }

    ```


    **Listing 2-2** Some Blue…


    Executing the previous code will give you this 50×50 `Mat`, where each pixel is
    made of three channels, meaning three values, but note that in OpenCV, RGB values
    are reversed by design (why, oh, why?), so it is actually BGR. The value for blue
    comes first in the code.


    So, before the value of all the pixels, set using the function `setTo`, is B:190,
    G:119, Red:0, which gives the nice ocean sea blue shown in Figure [2-3](#490964_1_En_2_Chapter.xhtml#Fig3).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig3_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** Sea blue


    Operations on `Mat` objects are usually done using the `org.opencv.core.Core`
    class. For example, adding two `Mat` objects is done using the `Core.add` function,
    two input objects, two `Mat` objects, and a receiver for the result of the addition,
    which is another `Mat`.


    To understand this, we can use a 1×1 `Mat` object. You can see that when adding
    two `Mat` objects together, you get a resulting `Mat` where each cell value is
    the result of the addition of the same location in the first `Mat` and the second
    `Mat`. Finally, the result is stored in `dest Mat`, as shown in Listing [2-3](#490964_1_En_2_Chapter.xhtml#PC10).


    ```

    Mat hello = Mat.eye(1, 1, CvType.CV_8UC3);

    hello.setTo(new Scalar(190, 119, 0));

    Mat hello2 = Mat.eye(1, 1, CvType.CV_8UC3);

    hello2.setTo(new Scalar(0, 0, 100));

    Mat dest = new Mat();

    Core.add(hello, hello2, dest);

    System.out.println(dest.dump());

    ```


    **Listing 2-3** Adding Two Mat Objects Together'
