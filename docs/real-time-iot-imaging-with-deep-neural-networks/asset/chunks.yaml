  trans: "\n### 连接线缆\n\n> *电是危险的。我的侄子曾试图把一枚硬币塞进插座。说“一分钱走不远”的人，真该看看他当时被弹飞出去的样子。我告诉他，他被“接地”了。*\n\
    > \n> ——蒂姆·艾伦\n\n我发现把各种线缆插接在一起既有趣又放松，实际上，这甚至可以用于个人心理治疗，来应对我们所处的这个艰难世界。\n\n表 3-2\
    \ 列出了需要进行的连接（并非详尽清单）。\n\n**表 3-2** 插接清单\n\n| 从 | 到 | 原因 |   |\n| --- | --- | ---\
    \ | --- |\n| 电源交流电 | 电源适配器 | 获取电力 | □ |\n| USB-A | 电源适配器 | 为树莓派供电 | □ |\n| 网络摄像头\
    \ | 树莓派 USB 端口 | 获取视频流 | □ |\n| 鼠标 | 树莓派 USB 端口 | 使用指针 | □ |\n| 键盘 | 树莓派 USB 端口\
    \ | 使用键盘 | □ |\n| 屏幕 HDMI | 树莓派 Micro HDMI | 显示画面 | □ |\n| USB-C | 树莓派 | 为树莓派供电\
    \ | □ |\n\n**注意**\n\n请务必最后再插入电源适配器或 USB-C 转树莓派适配器；否则，通电后主板将启动，但无事可做。\n\n有图通常更容易理解，因此请务必参考图\
    \ 3-10，了解各部件在实际主板上的连接位置。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig10_HTML.jpg](img/490964_1_En_3_Fig10_HTML.jpg)\n\
    \n**图 3-10** 树莓派 4 的原始蓝图及连接示意图\n\n最后，将 micro SD 卡插入树莓派 4 后，你就可以准备通电启动了（或者你已经启动了？）。\n\
    \n### 首次启动\n\n首次启动非常快。启动过程包括一个需要调整文件系统大小的步骤，现在 Raspbian 系统会在首次启动时自动处理。你应该会看到一个欢迎屏幕，如图\
    \ 3-11 所示。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig11_HTML.jpg](img/490964_1_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11** 首次启动\n\n连接好键盘、鼠标和屏幕后，你可以做很多事情，但对于本章要完成的大多数任务，我们需要通过 SSH 进行操作，这需要网络连接。\n\
    \n你可以将以太网线插入树莓派的以太网端口，但使用 WiFi 效果也很好。在右上角，点击 WiFi 图标，并在对话框中输入你的 WiFi 设置，如图 3-12\
    \ 所示。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig12_HTML.jpg](img/490964_1_En_3_Fig12_HTML.jpg)\n\
    \n**图 3-12** 设置 WiFi\n\n在通过 SSH 连接之前，还需要最后一步：启用树莓派内置的 OpenSSH 服务器。可以通过以下菜单启用：\n\
    \n```\n首选项 ➤ 树莓派配置 ➤ 接口\n```\n\n点击启用 SSH 服务器，如图 3-13 所示。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig13_HTML.jpg](img/490964_1_En_3_Fig13_HTML.jpg)\n\
    \n**图 3-13** 启用已安装的 SSH 服务器\n\n现在，让我们通过 SSH 连接到树莓派。\n\n### 使用 `nmap` 查找你的树莓派\n\
    \n你可能知道，要远程连接到树莓派，你需要它的 IP 地址。你可以在树莓派上打开终端并输入以下命令来找到它：\n\n```\nip addr\n```\n\n\
    这将显示你需要用来连接树莓派的 IP 地址。\n\n如果你运气不佳，没有键盘、屏幕、鼠标，或者这些都没有，你可以采用一些简单的命令行应对措施，使用 `nmap`\
    \ 来查找网络上的所有树莓派（以及所有电脑和国产智能手机）。\n\n这可以通过在主计算机上运行类似以下的命令来完成：\n\n```\nsudo nmap -O\
    \ -p 22 192.168.1.*\n```\n\n这里，`192.168.1.*` 是你自己桌面 IP 地址的开头部分，也是树莓派可能所在的网段。请注意，要使此命令生效，我们假设你的计算机和树莓派在同一个网络上。\n\
    \n这个命令实际上是做什么的？简而言之，`nmap` 会扫描本地网络，查找可用的机器和开放的端口。\n\n`-p` 参数用于扫描指定端口，`-O` 参数则表示尽可能多地收集每个找到的主机的信息。\n\
    \n在本地网络上运行上述 `nmap` 命令，会得到类似图 3-14 的结果。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig14_HTML.jpg](img/490964_1_En_3_Fig14_HTML.jpg)\n\
    \n**图 3-14** 查找你的树莓派\n\n已在网络上找到一台树莓派（希望是你的！）。现在，你可以使用默认用户名/密码（应该仍然是 `pi / raspberry`）通过\
    \ SSH 连接到它，命令如下：\n\n```\nssh pi@192.16.1.17\n```\n\n然后即可连接成功，如图 3-15 所示。\n\n![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig15_HTML.jpg](img/490964_1_En_3_Fig15_HTML.jpg)\n\
    \n**图 3-15** 启动 SSH 连接\n\n我们建立了一次连接，但后续需要反复执行这些连接步骤，因此，让我们通过修改本地和远程树莓派上的配置文件，来保存一些\
    \ SSH 设置以备后用。\n"
- fmt: '### Setting Up SSH Easily


    Usually when connecting via SSH, you disable password authentication, especially
    the default authentication of the Raspberry Pi, and set up a key from your local
    machine to connect to the remote machine and then set up that remote machine to
    accept only one key, or a limited number of them, so as to prevent random security
    attacks.


    This works like this:


    1. Create your personal key pair to use with SSH. One private key stays on your
    computer, and one public key is added as a known entity on the remote machine.
    Until quantum computing comes in, that key pair is said to be secure, and it’s
    close to impossible to guess one’s private key by just knowing the public key.
    For more information on this, read Joshua Davies’ article at [`https://commandlinefanatic.com/cgi-bin/showarticle.cgi?article=art054`](https://commandlinefanatic.com/cgi-bin/showarticle.cgi%253Farticle%253Dart054).


    2. Register the public key that got generated on the remote device, here the Raspberry
    Pi. Go ahead and give the public key to as many people as you want; by default,
    this is the file ending with the `.pub` extension.


    3. Add some configuration for SSH to use that generated private key when connecting
    to the Raspberry through a shortcut. That private key, though, is yours, so make
    sure you don’t give it to anyone!


    On Amazon Web Services (AWS), you usually get a `.pem` file to connect through
    a new running instance. That `.pem` file is automatically registered for you on
    the new VM, so only you can access that newly created VM, thus allowing a secure
    access to your in-the-cloud machines.


    To create your key on your own local machine, you use `ssh-keygen` with the `-t`
    switch to specify the algorithm and the `-b` switch to specify the number of bits
    (nowadays, 4,096 is considered very secure).


    ```

    % ssh-keygen -t rsa -b 4096

    Generating public/private rsa key pair.

    Enter file in which to save the key (~/.ssh/id_rsa):

    ```


    Once the command has run successfully, two files are generated: an `id_rsa.pub`
    file and an `id_rsa` file. `pub` is your public key that you can give to anyone,
    and `id_rsa` is your private key and should be handled with the utmost care.


    To tell the Raspberry Pi about your public key and recognize you, you add it as
    a one-liner to the `/home/pi/.ssh/authorized_keys` file, creating the file and
    the `.ssh` parent folder if needed.


    Once this is done, on your computer, it’s time to add details of the SSH connection
    settings to the `$HOME/.ssh/config` file, again creating the file if you don’t
    have it.


    ```

    Host pi4

    User pi

    IdentityFile ~/.ssh/id_rsa

    HostName 192.168.1.17

    ForwardX11 yes

    ForwardX11Trusted yes

    ```


    Here is what the connection settings mean:


    - `pi4` is the shortcut that we will use to connect to the Raspberry from now
    on.

    - `User` is the default user on the Raspberry Pi and usually is `pi`.

    - `IdentifyFile` is the path to the private key of your computer that will be
    used to authenticate you; this is the file you created a few moments ago.

    - `HostName` is the IP address of the Raspberry. Use `nmap` again if you forgot
    it.

    - `ForwardX11` and `ForwardX11Trusted` are required because we will redirect the
    video stream to the main computer in a few seconds.


    With all these settings, you may be wondering if this was all worth it. Let’s
    get a bit of instant gratification to prove that it was. Via an SSH connection,
    we will now open an application with a UI, for example the included Chromium browser.


    You can switch the display of the windows on the Raspberry screen by changing
    the setting of the `DISPLAY` variable.


    - To display the Raspberry Pi screen, use `export DISPLAY=:0`.

    - To display the local computer screen, use `export DISPLAY=:10`.


    Here’s the list of commands:


    ```

    ssh pi4

    export DISPLAY=:10

    chromium-browser

    ```


    Figure [3-16](#490964_1_En_3_Chapter.xhtml#Fig16) shows how Chromium is executing
    on the Pi but opening its window on the computer.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig16_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Opening a remote application


    ## Setting Up Visual Code Studio for Remote Use


    One of the main concepts of this book is that you will be able to write code on
    a machine with a big screen and then get it to run on a remote device, redirecting
    the visual output to the big screen.


    Up to now, you have been writing code in Visual Studio Code and running it locally.
    From now on, you’ll write code locally and run it remotely.


    All those SSH setup efforts earlier in the chapter were made because Visual Studio
    Code has a plugin named Remote-SSH that, once you have the SSH setup done, does
    all the rest for you and fully integrates with the editor’s ecosystem.


    Let’s first install the Remote-SSH plugin, as shown in Figure [3-17](#490964_1_En_3_Chapter.xhtml#Fig17).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig17_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    Installing the Remote-SSH plugin


    Once the plugin is installed and after a quick refresh of the editor, you can
    start the Connect to Host command available from the Command launcher, as shown
    in Figure [3-18](#490964_1_En_3_Chapter.xhtml#Fig18).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig18_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    Connecting to the host


    Caution


    The Remote-SSH plugin may not work properly if the current project has too many
    files. If that seems to be the case, make sure to open a new blank window in Visual
    Studio Code before opening a new Remote-SSH session.


    Figure [3-19](#490964_1_En_3_Chapter.xhtml#Fig19), Figure [3-20](#490964_1_En_3_Chapter.xhtml#Fig20),
    and Figure [3-21](#490964_1_En_3_Chapter.xhtml#Fig21) show you the steps necessary
    to get connected to your Raspberry Pi. Note that the `pi4` shortcut is taken from
    the one you just set up in the `$HOME/.ssh/config` file. This will be different
    if you used another shortcut.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig21_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig21_HTML.jpg)


