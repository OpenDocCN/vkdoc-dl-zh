    ## OpenCV Primer 2: Loading, Resizing, and Adding Pictures


    You’ve seen how to add super small `Mat` objects together, but let’s see how things
    work when adding two pictures, specifically, two big `Mat` objects, together.


    My sister has a beautiful cat, named Marcel, and she very nicely agreed to provide
    a few pictures of Marcel to use for this book. Figure [2-5](#490964_1_En_2_Chapter.xhtml#Fig5)
    shows Marcel taking a nap.


