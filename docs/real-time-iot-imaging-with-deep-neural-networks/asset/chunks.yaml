    Before adding a breakpoint, we can see that the Marcel `Mat` is indeed 2304×1728,
    while the beach `Mat` is smaller at 333×500, so we definitely need to resize the
    second `Mat` to match that of Marcel. If we do not perform this resizing step,
    OpenCV does not know how to compute the result of the `add` function and gives
    the error message shown earlier.


    Our second try produces the code in Listing [2-5](#490964_1_En_2_Chapter.xhtml#PC14),
    where we use the `resize` function of class `Imgproc` to change the beach `Mat`
    to be the same size as the Marcel `Mat`.


    ```

    Mat marcel = Imgcodecs.imread("marcel.jpg");

    Mat beach = Imgcodecs.imread("beach.jpeg");

    Mat dest = new Mat();

    Imgproc.resize(beach, dest, marcel.size());

    Core.add(marcel, dest, dest);

    Imgcodecs.imwrite("marcelOnTheBeach.jpg", dest);

    Listing 2-5

    Resizing

    ```


    Running this code, the output image looks similar to Figure [2-8](#490964_1_En_2_Chapter.xhtml#Fig8).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig8_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    White, white, very white Marcel at the beach


    Hmm. It’s certainly better because the program runs to the end without error,
    but something is not quite right. The output picture gives an impression of being
    over-exposed, and looks way too bright. And indeed, if you look, most of the output
    image pixels have maximum RGB values of 255,255,255, which is the RGB value for
    white.


    We should do an addition in a way that keeps the feeling of each `Mat` but still
    not goes over the maximum 255,255,255 value.


    ### Weighted Addition


    Preserving meaningful values in `Mat` objects is certainly something that OpenCV
    can do. The `Core` class comes with a weighted version of the `add` function that
    is conveniently named `addWeighted`. What `addWeighted` does is multiply values
    of each `Mat` object, each by a different scaling factor. It’s even possible to
    adjust the result value with a parameter called `gamma`.


    The function `addWeighted` takes no less than six parameters; let’s review them
    one by one.


    *   The input `image1`


    *   `alpha`, the factor to apply to `image1`’s pixel values


    *   The input `image2`


    *   `beta`, the factor to apply to `image2`’s pixel values


    *   `gamma`, the value to add to the sum


    *   The destination `Mat`


    So, to compute each pixel of the result `Mat` object, `addWeighted` does the following:


    ```

    image1 x alpha + image2 x beta + gamma = dest

    ```


    Replacing `Core.add` with `Core.addWeighted` and using some meaningful parameter
    values, we now get the code shown in Listing [2-6](#490964_1_En_2_Chapter.xhtml#PC16).


    ```

    Mat marcel = Imgcodecs.imread("marcel.jpg");

    Mat beach = Imgcodecs.imread("beach.jpeg");

    Mat dest = new Mat();

    Imgproc.resize(beach, dest, marcel.size());

    Core.addWeighted(marcel, 0.8, dest, 0.2, 0.5, dest);

    Listing 2-6

    Marcel Goes to the Beach

    ```


    The output of the program execution gives something much more useful, as shown
    in Figure [2-9](#490964_1_En_2_Chapter.xhtml#Fig9).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig9_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    addWeighted. Marcel can finally relax at the beach'
