    you can search for the same plugin that was installed before, the Java Extension
    Pack. Note in Figure [3-30](#490964_1_En_3_Chapter.xhtml#Fig30) how Visual Studio
    Code nicely asks you if you want to install the plugin on the Raspberry.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig30_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig30_HTML.jpg)


