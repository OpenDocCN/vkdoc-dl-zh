  trans: "\n```java\nstatic final String OUTFOLDER = \"out/\";\nstatic final Scalar\
    \ BLACK = new Scalar(0, 0, 0);\nstatic {\nnew File(OUTFOLDER).mkdirs();\n}\npublic\
    \ static void main(String[] args) throws Exception {\nNativeLoader.loadLibrary(Core.NATIVE_LIBRARY_NAME);\n\
    runDarknet(new String[] { \"marcel.jpg\", \"marcel2.jpg\", \"chats.jpg\", });\n\
    }\nprivate static void runDarknet(String[] sourceImageFile) throws IOException\
    \ {\n// 读取标签\nList labels = Files.readAllLines(Paths.get(\"yolov3/coco.names\"\
    ));\n// 从配置文件和权重文件加载网络\nNet net = Dnn.readNetFromDarknet(\"yolov3/yolov3.cfg\"\
    , \"yolov3/yolov3.weights\");\n// 查找输出层\n// 这取决于网络配置\nList layersNames = net.getLayerNames();\n\
    List outLayers = net.getUnconnectedOutLayers().toList().stream().map(i -> i -\
    \ 1).map(layersNames::get)\n.collect(Collectors.toList());\n// 对每个输入执行推理\nfor\
    \ (String image : sourceImageFile) {\nrunInference(net, outLayers, labels, image);\n\
    }\n}\nprivate static void runInference(Net net, List layers, List labels, String\
    \ filename) {\nfinal Size BLOB_SIZE = new Size(416, 416);\nfinal double IN_SCALE_FACTOR\
    \ = 0.00392157;\nfinal int MAX_RESULTS = 20;\n// 加载图像，将其转换为 blob，然后输入网络\nMat frame\
    \ =\nImgcodecs.imread(filename, Imgcodecs.IMREAD_COLOR);\nMat blob = Dnn.blobFromImage(frame,\
    \ IN_SCALE_FACTOR, BLOB_SIZE, new Scalar(0, 0, 0), false);\nnet.setInput(blob);\n\
    // 用于接收网络运行输出的胶水代码\nList outputs = layers.stream().map(s -> {\nreturn new Mat();\n\
    }).collect(Collectors.toList());\n// 执行推理\nnet.forward(outputs, layers);\nList\
    \ labelIDs = new ArrayList();\nList probabilities = new ArrayList();\nList locations\
    \ = new ArrayList();\npostprocess(filename, frame, labels, outputs, labelIDs,\
    \ probabilities, locations, MAX_RESULTS);\n}\nprivate static void postprocess(String\
    \ filename, Mat frame, List labels, List outs,\nList classIds, List confidences,\
    \ List locations, int nResults) {\nList tmpLocations = new ArrayList();\nList\
    \ tmpClasses = new ArrayList();\nList tmpConfidences = new ArrayList();\nint w\
    \ = frame.width();\nint h = frame.height();\nfor (Mat out : outs) {\nfinal float[]\
    \ data = new float[(int) out.total()];\nout.get(0, 0, data);\nint k = 0;\nfor\
    \ (int j = 0; j  0) {\nfloat center_x = data[k + 0] * w;\nfloat center_y = data[k\
    \ + 1] * h;\nfloat width = data[k + 2] * w;\nfloat height = data[k + 3] * h;\n\
    float left = center_x - width / 2;\nfloat top = center_y - height / 2;\ntmpClasses.add((int)\
    \ result.maxLoc.x);\ntmpConfidences.add((float) result.maxVal);\ntmpLocations.add(\n\
    new Rect(\n(int) left,\n(int) top,\n(int) width,\n(int) height));\n}\nk += out.width();\n\
    }\n}\nannotateFrame(frame, labels, classIds, confidences, nResults, tmpLocations,\
    \ tmpClasses, tmpConfidences);\nImgcodecs.imwrite(OUTFOLDER + new File(filename).getName(),\
    \ frame);\n}\nprivate static void annotateFrame(Mat frame, List labels, List classIds,\
    \ List confidences,\nint nResults, List tmpLocations, List tmpClasses, List tmpConfidences)\
    \ {\n// 执行非极大值抑制，以消除置信度较低的重叠冗余框，并按置信度排序\n// Yolo 会产生大量重叠结果，因此必须使用此方法\nMatOfRect\
    \ locMat = new MatOfRect();\nlocMat.fromList(tmpLocations);\nMatOfFloat confidenceMat\
    \ = new MatOfFloat();\nconfidenceMat.fromList(tmpConfidences);\nMatOfInt indexMat\
    \ = new MatOfInt();\nDnn.NMSBoxes(locMat, confidenceMat, 0.1f, 0.1f, indexMat);\n\
    // 此时我们只保留非重叠且置信度最高的框\n// 因此将它们绘制在图片上\nfor (int i = 0; i < indexMat.total() &&\
    \ i < nResults; ++i) {\nint idx = (int) indexMat.get(i, 0)[0];\nclassIds.add(tmpClasses.get(idx));\n\
    confidences.add(tmpConfidences.get(idx));\nRect box = tmpLocations.get(idx);\n\
    String label = String.format(\"%s [%.0f%%]\", labels.get(classIds.get(i)), 100\
    \ * tmpConfidences.get(idx));\nImgproc.rectangle(frame, box, BLACK, 2);\nImgproc.putText(frame,\
    \ label, new Point(box.x, box.y), Imgproc.FONT_HERSHEY_PLAIN, 5.0, BLACK, 3);\n\
    }\n}\n```\n**清单 2-10** 在图像上运行 Yolo\n\n在 Marcel 的图像上运行该示例，实际上会得到非常高的置信度分数，这些分数接近完美定位，如图\
    \ 2-18 所示。\n\n![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig18_HTML.jpg](img/490964_1_En_2_Fig18_HTML.jpg)\n\
    \n**图 2-18** 基于 Yolo 的检测确认 Marcel 是一只可爱的猫\n\n对多只猫进行推理也能得到很好的结果，但在第二次运行时，我们遗漏了一只猫，因为它与另一只被检测到的猫位置过于接近，并且由于我们引入了后处理步骤，该步骤会移除重叠的匹配框。参见图\
    \ 2-19。\n\n![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig19_HTML.jpg](img/490964_1_En_2_Fig19_HTML.jpg)\n\
    \n**图 2-19** 多只猫\n\n现在，你可以尝试修改 `Dnn.NMSBoxes` 函数调用的参数，看看能否让两个框同时显示。\n\n静态图像的问题在于，我们很难获得现实生活中存在的额外上下文信息。当处理来自实时视频流的输入图像集时，这个缺点就会消失。\n\
    \n因此，在完成第 2 章后，你现在可以对图片进行目标检测了。第 3 章将在此基础上，使用树莓派教你进行设备端检测。\n\n脚注 1\n\n# 3. 树莓派\
    \ 4 上的视觉处理\n\n> *想象一个世界，你唯一的财产是一颗覆盆子，而你把它送给了朋友。*\n> \n> ——格尔达·韦斯曼·克莱因，《除了我的生命》（Hill\
    \ and Wang，1995）\n\n在第 1 章和第 2 章中，你了解了如何在普通台式计算机上使用 Java 启动并运行计算机视觉。设置过程有些手动，但所有不同的构建模块都是免费提供的，因此只需将这些模块组合在一起即可。\n\
    \n在本章中，你将向组合中添加另一个模块——树莓派 4。本章的首要目标是执行与在计算机上相同的任务，但尽可能在物联网设备上运行，同时从本地桌面输入代码并控制代码执行。换句话说，你将在计算机上编写代码，但在树莓派上执行。\n\
    \n对于代码执行部分，你需要一些特定的硬件和线缆，因此你应该准备好去购物。我们将提供一份购物清单，然后继续设置。\n\n具体来说，我们将介绍如何创建 SD\
    \ 卡和设置树莓派，但假设这些步骤中的大部分已在其他书籍和博客中充分介绍过，因此如果你需要比此处介绍的基础知识更多的内容，可以阅读那些资料。\n\n在本章结束时，你将很好地掌握树莓派在运行不同视觉操作和检测算法时的速度及能耗。你还将准备好将此功能大规模集成到你设计的语音控制家庭助手中，从而扩展你的个人家庭或工作办公室自动化。\n"
- fmt: '# Bringing the Raspberry to Life


    *“Man,” I cried, “how ignorant art thou in thy pride of wisdom!”*


    —Mary Shelley, *Frankenstein* (1818)


    We’re no Doctor Frankenstein, but to bring the Pi to life, we will have to work
    as if we are designing one: plugging in the cables, assembling, and turning on
    the power of the little device. Some shopping will be needed, and we have to gather
    the physical hardware before doing anything useful. Luckily, most of the things
    to buy are cheap and can be reused from other people’s old computers or from your
    grandma’s attic. She won’t notice.


    Once the shopping is done and the Raspberry Pi and all the essential parts are
    assembled, we will move to putting in place the same vision setup on Visual Studio
    Code as in Chapter [1](#490964_1_En_1_Chapter.xhtml) and learn how to program
    OpenCV in Java again.


    ## Shopping


    While the Raspberry Pi is a solid computer on its own, most of the time you will
    not be able to do anything with it without a few other extra pieces. In this chapter,
    you will need a few accessories.


    Table [3-1](#490964_1_En_3_Chapter.xhtml#Tab1) provides a shopping list, but you
    can decide what type and where to buy things.


    **Careful**


    There are a wide range of cables and power adapters these days. Be sure to buy
    a power adapter that gets around 4.8A to 5A output if you want to do overclocking.
    Your chosen USB cable should also be able to carry the electrical current, but
    these days most of them do.


    **Table 3-1** Shopping List


    | Name | What | Approximate Price (USD) | Required? | Always Needed? |   |

    | --- | --- | --- | --- | --- | --- |

    | Raspberry Pi 4 4GB | Main computer | $55 | Yes | Yes | □ |

    | USB-C to USB-A cable | Connect the computer to power | $6 | Yes | Yes | □ |

    | Power adapter with USB-A (at least 4.8A or even 5A for overclocking) | Electric
    power | $10 | Yes | Yes | □ |

    | HDMI cable | Connect to screen | $7 | Yes | No | □ |

    | SD card 128GB | Hard disk | $10 | Yes | Yes | □ |

    | ReSpeaker microphone | Recommended microphone for snips (Chapter [3](#490964_1_En_3_Chapter.xhtml))
    | $25 | No | If bought, yes | □ |

    | Display with HDMI port | Display for initial debugging | $25 | Yes | No | □
    |

    | USB webcam | Record video | $20 | Yes | Yes | □ |

    | Keyboard and mouse |   | $20 | Maybe | No | □ |

    | Total |   | $180 |   |   |   |


    Once you have gathered all the parts (Figure [3-1](#490964_1_En_3_Chapter.xhtml#Fig1)),
    it’s time to get the software running on the Pi.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig1_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** Raspberry Pi 4, power adapter, webcam, screen, etc


    ## Downloading the OS


    The Raspberry Pi will refuse to even look at a beautiful cat like Marcel without
    an operating system. There are a few operating systems readily available on the
    Raspberry web site.


    Here’s a short list of the main ones:


    *   Ubuntu Mate

    *   Ubuntu Core

    *   Windows 10 IoT Core

    *   Noobs

    *   Raspbian (the official operating system)


    Ubuntu Mate and Ubuntu Core are new and good alternatives, but we will focus on
    the official operating system, Raspbian, because most of the documentation available
    for the Raspberry is based on it. It’s also quite easy to get started with it.


    Raspbian is a Debian-based operating system, so most Linux aficionados will be
    at ease with it and its included `aptitude` package manager. Even though packages
    have to be compiled specifically for the ARM-based CPU of the Raspberry, the package
    list is quite up-to-date and mostly in sync with the main Debian line.


    To be able to use the operating system as a bootable image that the Raspberry
    can use, we first need to download the image file onto a local computer and create
    a bootable disk specifically for the Raspberry Pi.


    To download the very big OS file (don’t try this while tethering on your phone),
    head to [`https://www.raspberrypi.org/downloads/`](https://www.raspberrypi.org/downloads/)
    and look for the Raspbian icon shown in Figure [3-2](#490964_1_En_3_Chapter.xhtml#Fig2).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig2_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** Raspbian icon


    Click the icon. You will then land on the Raspbian-specific download page, as
    shown in Figure [3-3](#490964_1_En_3_Chapter.xhtml#Fig3), where you can find the
    link to the zip file to retrieve.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig3_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig3_HTML.jpg)


    **Figure 3-3** Torrent or zip file for Raspbian


    We don’t need a full desktop install and all the proposed software, but we will
    aim for simplify so “Raspbian Buster with desktop” will be sufficient for us now.


    ## Creating the Bootable SD Card


    With the OS file on your computer, you are ready to create the bootable device.
    As noted on the Raspberry web site, the easiest way to get the OS on the Pi is
    by using Etcher, which is software to create the bootable SD card from a zip file
    or an `.img` file.


    Etcher is available from [`https://www.balena.io/etcher/`](https://www.balena.io/etcher/),
    and it can run on any platform, such as macOS, Windows, and Linux. The screenshots
    in this book were taken on Windows.


    The first step after starting the application is to select the downloaded zip
    file, as shown in Figure [3-4](#490964_1_En_3_Chapter.xhtml#Fig4).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig4_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig4_HTML.jpg)


    **Figure 3-4** Selecting the image file


    With the image file selected and the SD card inserted into an SD slot of your
    computer, let’s select the SD card you want to write the OS onto, as shown in
    Figure [3-5](#490964_1_En_3_Chapter.xhtml#Fig5).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig5_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig5_HTML.jpg)


    **Figure 3-5** Selecting the micro SD card


    The card used here was specifically chosen because it’s so big, so you ignore
    the message shown about its size, as shown in Figure [3-6](#490964_1_En_3_Chapter.xhtml#Fig6).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig6_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig6_HTML.jpg)


    **Figure 3-6** The SD card is big


    Finally, let’s go ahead and “flash” the card, in other words, write the files
    onto the card. The progress is shown and should take no more than two to three
    minutes, as shown in Figure [3-7](#490964_1_En_3_Chapter.xhtml#Fig7).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig7_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig7_HTML.jpg)


    **Figure 3-7** Flashing


    In the last step, Etcher will check the integrity of the copied data, as shown
    in Figure [3-8](#490964_1_En_3_Chapter.xhtml#Fig8).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig8_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig8_HTML.jpg)


    **Figure 3-8** Validating


    Once the flashing and the validation are done, Windows will try to use the drive
    as before, but the format of the SD card is now not readable without a specific
    driver, as shown in Figure [3-9](#490964_1_En_3_Chapter.xhtml#Fig9). You can safely
    ignore the message and click Cancel.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig9_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig9_HTML.jpg)


    **Figure 3-9** Don’t be scared…


    The card is here, so let’s now plug in the cables of the Pi.'
