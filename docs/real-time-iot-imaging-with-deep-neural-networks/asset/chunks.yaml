- fmt: '# Capturing a Video Live Stream


    If your webcam is plugged in properly via the USB port, you are now ready to write
    some code to capture the video stream straight from your IoT device.


    We use two building blocks here to get us started.


    - OpenCV’s `VideoCapture` Java class to get the hardware to the software (or more
    precisely, from the video stream to the OpenCV `Mat` objects). In this example,
    the `VideoCapture` object takes an `int` as the ID of the video capture device
    to use.

    - The `ImShow` class, which is not part of the core OpenCV Java package. It’s
    a small class similar to OpenCV’s `HighGui` class ([`https://docs.opencv.org/master/javadoc/org/opencv/highgui/HighGui.html`](https://docs.opencv.org/master/javadoc/org/opencv/highgui/HighGui.html)),
    but it makes it easier to just plug into video streams and show them on the screen.


    We also use `init` OpenCV with a convenient method called `Origami.init()`, which
    searches for and loads the proper binary OpenCV library for us.


    Listing [3-1](#490964_1_En_3_Chapter.xhtml#PC17) shows the full code for this
    first streaming example.


    ```

    package hello;

    import org.opencv.core.Mat;

    import org.opencv.videoio.VideoCapture;

    import origami.ImShow;

    import origami.Origami;

    public class Webcam {

    public static void main(String[] args) {

    Origami.init();

    VideoCapture cap = new VideoCapture(0);

    Mat matFrame = new Mat();

    ImShow ims = new ImShow("Camera", 800, 600);

    while (cap.grab()) {

    cap.retrieve(matFrame);

    ims.showImage(matFrame);

    }

    cap.release();

    }

    }

    Listing 3-1

    Accessing and Displaying the Video Stream

    ```


    The code is pretty standard OpenCV code. Running the code should give a picture
    like in Figure [3-37](#490964_1_En_3_Chapter.xhtml#Fig37) (without the frame rate
    showing).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig37_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig37_HTML.jpg)


    Figure 3-37


    Video stream without frame rate


    You’ll notice the speed is very close to real-time. The code in Listing [3-2](#490964_1_En_3_Chapter.xhtml#PC18)
    can be added to the frame loop to show the frame rate, as in Figure [3-38](#490964_1_En_3_Chapter.xhtml#Fig38).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig38_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig38_HTML.jpg)


    Figure 3-38


    Video stream with the frame rate


    ```

    long now = System.currentTimeMillis();

    frame++;

    Imgproc.putText(matFrame, "FPS " + (frame / (1 + (now - start) / 1000)), new Point(50,
    50),

    Imgproc.FONT_HERSHEY_COMPLEX, 2.0, new Scalar(255, 255, 255));

    Listing 3-2

    Adding the Frame per Second on the Frame

    ```


    Usually between 15 and 20 frames per second is an expected value for this exercise.


    You may have run into problems while running the previous example. Sometimes the
    program dies with the stack trace shown in Listing [3-3](#490964_1_En_3_Chapter.xhtml#PC19).


    ```

    Exception in thread "main" java.awt.HeadlessException:

    No X11 DISPLAY variable was set, but this program performed an operation which
    requires it.

    at java.desktop/java.awt.GraphicsEnvironment.checkHeadless(GraphicsEnvironment.java:208)

    at java.desktop/java.awt.Window.(Window.java:548)

    at java.desktop/java.awt.Frame.(Frame.java:423)

    at java.desktop/java.awt.Frame.(Frame.java:388)

    at java.desktop/javax.swing.JFrame.(JFrame.java:180)

    at origami.ImShow.(ImShow.java:52)

    at hello.Webcam.main(Webcam.java:22)

    Listing 3-3

    No X11 DISPLAY Set

    ```


    To run a graphic program via SSH, like you are doing right now, Java requires
    a system environment variable to be set. The name of this variable, as you can
    see, is `DISPLAY`. You can check its value on the Terminal tab with the following:


    ```

    echo $DISPLAY

    ```


    There are three main states you could be in depending on the value of this variable,
    as listed here:


    - `<empty>`, which is not so good. You need to set the value yourself.

    - `:0`, or `localhost:0`, which means any visual frame will be shown in the Raspberry
    screen. This is OK for debugging the setup, but it’s not the one you usually want
    when working from your computer.

    - `:10`, or `localhost:10`, which means the frames will be shown on your computer.
    On macOS, this is done via the XQuartz application, which runs a graphical environment
    compatible with the one from the Raspberry Pi. On Windows, the equivalent is Xming:
    [`https://sourceforge.net/projects/xming/`](https://sourceforge.net/projects/xming/).


    If you set up the variable properly, then the stream will display on your computer
    screen, as in Figure [3-39](#490964_1_En_3_Chapter.xhtml#Fig39).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig39_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig39_HTML.jpg)


    Figure 3-39


    Remote Raspberry Pi stream straight to your computer


    You know everything about setting up the Pi for remote development. Let’s move
    on to some recipes to analyze the content of video streams.


    ## Playing a Video


    You may not always have access to a video stream and may have to revert to playing
    recorded footage. That works too with the `VideoCapture` class. You can give it
    the path to the video file you want to play, as shown here:


    ```

    public class PlayVideo {

    public static void main(String[] args) {

    Origami.init();

    VideoCapture cap = new VideoCapture("marcel_1.mp4");

    Mat matFrame = new Mat();

    ImShow ims = new ImShow("Camera", 400, 300);

    long start = System.currentTimeMillis();

    long frame = 0;

    while (cap.grab()) {

    cap.retrieve(matFrame);

    long now = System.currentTimeMillis();

    frame++;

    Imgproc.putText(matFrame, "FPS " + (frame / (1 + (now - start) / 1000)), new Point(50,
    50),

    Imgproc.FONT_HERSHEY_COMPLEX, 2.0, new Scalar(255, 255, 255));

    ims.showImage(matFrame);

    }

    cap.release();

    }

    }

    ```


    This code is the same as playing a stream taken from a webcam, except the file
    name is a parameter to the `VideoCapture` constructor.


    Note that you can also find some free sample videos on the following web site:


    ```

    https://sample-videos.com/index.php

    ```


    Figure [3-40](#490964_1_En_3_Chapter.xhtml#Fig40) shows some of Marcel’s morning
    activities.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig40_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig40_HTML.jpg)


    Figure 3-40


    Marcel in the morning


    If you try to enter an `http://` URL as a path to `VideoCapture`, you will see
    that things do not work as you probably expected. The remote video you wanted
    to play will not load.


    A URL in the path is used to play streams from a network webcam, not static files.
    If you have one on hand, it’s a good exercise to plug the web URL of the webcam
    directly into the `VideoCapture` object.


    # Analyzing Video Streams on the Raspberry Pi


    In this chapter, you’ll learn how to analyze video streams using concepts taken
    from functional programming. Specifically, you’ll use the `Filter` interface and
    combine it with a `Pipeline` object and then apply them to the video stream.


    We will start with an overview of filters. Then we’ll look at different basic,
    fun filters, and we’ll gradually move on to object detection using different vision
    techniques. Finally, we’ll talk about neural networks.'
