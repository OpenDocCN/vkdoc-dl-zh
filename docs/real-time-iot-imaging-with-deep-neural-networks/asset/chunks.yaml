- fmt: "### JSON Fun\n\nBefore being able to handle Rhasspy messages from the MQTT\
    \ topic, we need to be able to do a bit of JSON parsing.\n\nObviously, there are\
    \ many ways to do parsing in Java; we can parse manually (hint, don’t do this)\
    \ or use different libraries. Here we are going to use the `org.json` library\
    \ because it’s pretty fast at handling incoming MQTT messages.\n\nHere are the\
    \ steps for parsing a string to get the wanted value with the `org.json` library:\n\
    \n1.  Create a `JSONObject` using the string version of the JSON message.\n2.\
    \  Use one of the following functions to navigate the JSON document:\n    *  \
    \ `get()`\n    *   `getJSONObject()`\n    *   `getJSONArray()`\n3.  Get the wanted\
    \ value with `getInt`, `getBoolean`, `getString`, etc.\n\n#### Overengineering\n\
    \nMost of the time, Java is seen as complicated because somewhere in the layers\
    \ a complicated piece of middleware was introduced. I actually find the language\
    \ pretty succinct these days and fast to work with given all the autocompletion\
    \ and refactoring tooling.\n\nAnyway, here we are just pulling out one value of\
    \ the message, but you could also unmarshal the whole JSON message into a Java\
    \ object...and also create an open source library for us. Let me know when it\
    \ is ready to use!\n\nThat’s it. Applied to the `somecats.json` file we have used\
    \ before, if we want to retrieve the value that was recognized by Rhasspy, we\
    \ will do something along the lines of Listing [5-5](#490964_1_En_5_Chapter.xhtml#PC14).\n\
    \n```\npackage practice;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
    import java.util.List;\nimport java.util.stream.Collectors;\nimport org.json.JSONObject;\n\
    public class JSONFun {\npublic static String whatObject(String json) {\nJSONObject\
    \ obj = new JSONObject(json);\nJSONObject slot = ((JSONObject) obj.getJSONArray(\"\
    slots\").get(0)).getJSONObject(\"value\");\nString cats = slot.getString(\"value\"\
    );\nreturn cats;\n}\npublic static void main(String... args) throws Exception\
    \ {\nList nekos = Files.readAllLines(Paths.get(\"onlycats.json\"));\nString json\
    \ = nekos.stream().collect(Collectors.joining(\"\\n\"));\nSystem.out.println(whatObject(json));\n\
    }\n}\nListing 5-5\nParsing JSON Content\n```\n\n### Listening to MQTT Basic Messages\n\
    \nListening to messages, or *subscribing*, is done via the following steps:\n\n\
    1.  Subscribe to a topic or parent topic.\n2.  Add a listener that implements\
    \ the `IMqttMessageListener` interface.\n\nThe simplest code for subscribing is\
    \ shown in Listing [5-6](#490964_1_En_5_Chapter.xhtml#PC15).\n\n```\npackage practice;\n\
    import org.eclipse.paho.client.mqttv3.IMqttMessageListener;\nimport org.eclipse.paho.client.mqttv3.MqttClient;\n\
    import org.eclipse.paho.client.mqttv3.MqttMessage;\npublic class Sub0 {\npublic\
    \ static void main(String... args) throws Exception {\nMqttClient client = new\
    \ MqttClient(\"tcp://localhost:1883\", MqttClient.generateClientId());\nclient.connect();\n\
    client.subscribe(\"hello\", new IMqttMessageListener() {\n@Override\npublic void\
    \ messageArrived(String topic, MqttMessage message) throws Exception {\nString\
    \ hello = new String(message.getPayload(), \"UTF-8\");\nSystem.out.println(hello);\n\
    }\n});\n}\n}\nListing 5-6\nFrom Russia with Love\n```\n\nNote that the message-handling\
    \ part can of course be replaced with Java lambdas, thus making it even more readable,\
    \ as in Listing [5-7](#490964_1_En_5_Chapter.xhtml#PC16).\n\n```\nMqttClient client\
    \ = new MqttClient(\"tcp://localhost:1883\", MqttClient.generateClientId());\n\
    client.connect();\nclient.subscribe(\"hello\", (topic, message) -> {\nString hello\
    \ = new String(message.getPayload(), \"UTF-8\");\nSystem.out.println(hello);\n\
    });\nListing 5-7\nMessages with Java Lambdas\n```\n\nIf you’re running everything\
    \ from your Raspberry Pi, then the following Visual Studio Code setup will do\
    \ everything properly and display the Russian message, as shown in Figure [5-6](#490964_1_En_5_Chapter.xhtml#Fig6).\n\
    \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig6_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6  \nFrom Russia with love\n\n#### Sending a Message From Java To The\
    \ Raspberry Pi\n\nObviously, the fun is in having a distributed system and handling\
    \ messages coming from different places. Here, try to run the broker on the Raspberry\
    \ Pi. After setting up the IP address of your Raspberry Pi in the sender listing,\
    \ send a message from your computer to the Raspberry Pi in Java.\n\nOr send a\
    \ message in Java from the Raspberry Pi to a broker located remotely or, again,\
    \ in the cloud.\n\n### Listening to MQTT JSON Messages\n\nSo, now it is the time\
    \ to listen for and parse the content of the JSON message from within Java, which\
    \ is mostly a combination of listening to basic messages and implementing the\
    \ JSON fun you had in the previous pages. The code snippet is in Listing [5-8](#490964_1_En_5_Chapter.xhtml#PC17).\n\
    \n```\npackage practice;\nimport org.eclipse.paho.client.mqttv3.IMqttMessageListener;\n\
    import org.eclipse.paho.client.mqttv3.MqttClient;\nimport org.eclipse.paho.client.mqttv3.MqttMessage;\n\
    import org.json.JSONObject;\npublic class Sub {\npublic static void main(String...\
    \ args) throws Exception {\nMqttClient client = new MqttClient(\"tcp://localhost:1883\"\
    , MqttClient.generateClientId());\nclient.connect();\nclient.subscribe(\"hermes/intent/#\"\
    , new IMqttMessageListener() {\n@Override\npublic void messageArrived(String topic,\
    \ MqttMessage message) throws Exception {\nString json = new String(message.getPayload(),\
    \ \"UTF-8\");\nJSONObject obj = new JSONObject(json);\nJSONObject slot = ((JSONObject)\
    \ obj.getJSONArray(\"slots\").get(0)).getJSONObject(\"value\");\nString cats =\
    \ slot.getString(\"value\");\nSystem.out.println(cats);\n}\n});\n}\n}\nListing\
    \ 5-8\nCats Coming\n```\n\nNow that you know everything about keys and brokers,\
    \ it is time to get and install Rhasspy.\n\n## Voice and Rhasspy Setup\n\nThe\
    \ Rhasspy voice platform needs a set of services running to be able to deploy\
    \ applications with intents. In this section, you will see how to install the\
    \ platform first and then how to create applications with intents.\n\nThe easiest\
    \ way to install Rhasspy is actually via Docker ([`https://www.docker.com/`](https://www.docker.com/)),\
    \ which is a container engine on which you can run images. The Rhasspy maintainer\
    \ has created a ready-to-use Docker image for Rhasspy, so we will take advantage\
    \ of that.\n\n### Preparing the Speaker\n\nYou do need a working microphone setup\
    \ before executing any of the voice commands.\n\nWe recommend ReSpeaker. If you\
    \ have it, you can find the installation instructions here:\n\n```\nhttp://wiki.seeedstudio.com/ReSpeaker_4_Mic_Array_for_Raspberry_Pi/\n\
    ```\n\nProvided you have plugged in the speaker on the Pi, you can perform the\
    \ necessary module installation with the following short shell script:\n\n```\n\
    sudo apt-get update\nsudo apt-get upgrade\ngit clone https://github.com/respeaker/seeed-voicecard.git\n\
    cd seeed-voicecard\nsudo ./install.sh\nreboot\n```\n\nStandard USB microphones\
    \ should be plug-and-play, and I have been using conference room microphones with\
    \ pretty good results.\n\nSo, if things are working, the microphone should show\
    \ up in the list output from this `arecord` command:\n\n```\narecord -L\n```\n\
    \nYour ReSpeaker/Raspberry Pi setup should look like the one in Figure [5-7](#490964_1_En_5_Chapter.xhtml#Fig7).\n\
    \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig7_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig7_HTML.jpg)\n\
    \nFigure 5-7  \nReSpeaker lights"
