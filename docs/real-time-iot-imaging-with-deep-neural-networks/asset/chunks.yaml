    ## Debugging Lesson


    This is your book, so you can skip this section on debugging and come back to
    it later if you want. I decided to add this section on debugging now, when we’re
    working with some simple code, because getting this part done up front allows
    you to master the OpenCV code better and go through each OpenCV computation step
    in a nice and easy-to-understand way.


    If you decided to keep reading this part, then great! We are going to spend just
    a little bit of time looking at how to debug Java code from within Visual Studio
    Code.


    As you have seen, executing the code was quite simple from within the editor.
    In Java and with this setup, we also get a free debugger. You even get free debuggers
    in browsers nowadays when running JavaScript code from web pages.


    Why is a debugger that important? A debugger allows you to stop the execution
    at any point in the code and then locally inspect it and act from the position
    of the stopped code.


    That means you can start executing the code but also ask the runtime to stop wherever
    you want. Also, you do not have to choose where to stop code execution before
    starting it. Let’s say you do video processing in real time, and at some stage,
    you would like to know why the code analyzing the camera feed is not finding objects
    as you would expect it to do. In that case, you can stop the code execution right
    in the frame capture loop and either dump the picture or rerun the analysis step-by-step
    so you can find out if the model is wrong or if the picture is still in an unexpected
    size or color mode.


    Java itself does not have a really useful read-eval-print-loop (REPL). A REPL
    allows you to execute code line by line, and it works quite well with my favorite
    language, Clojure, and even with Kotlin and of course Python. Java does not make
    it easy to run and add things line by line, which can be almost forgiven now that
    debugging has been made so easy from Visual Studio Code.


    Enough talking, let’s see how to use the debugger to perform basic debugging tasks:


    *   Add a breakpoint


    *   Execute the code step-by-step


    *   Watch a variable


    *   Change a variable value'
