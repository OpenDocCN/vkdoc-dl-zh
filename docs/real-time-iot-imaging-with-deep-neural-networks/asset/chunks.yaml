    ### 通过模板匹配进行检测


    使用 OpenCV 进行模板匹配非常简单。它简单到可能应该更早地出现在检测方法的顺序中。模板匹配意味着在一个 `Mat` 中寻找另一个 `Mat`。OpenCV
