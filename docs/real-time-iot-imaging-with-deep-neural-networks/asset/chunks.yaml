  trans: '

    ### Rhasspy 控制台


    让我们更详细地了解一下 Rhasspy 菜单。图 5-14 展示了用于配置家庭助手的各个部分。


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig14_HTML.jpg](img/490964_1_En_5_Fig14_HTML.jpg)


    **图 5-14** 更多配置选项


    每个选项卡的用途在以下列表中说明：


    - **语音：** 您可以在此处测试您的助手。

    - **句子：** 您可以在此处定义您的语音助手能够检测和识别的内容。

    - **槽位：** 句子中包含变量。每个变量的可能值可以在`句子`部分的一行中定义，或者您可以在`槽位`部分创建可能值的列表。

    - **词汇：** 这是您定义单词发音的部分。这对于人名尤其有用，因为英语引擎有时对法语发音的准备不够充分！

    - **设置：** 这是一个包罗万象的界面，您可以在此配置引擎的工作方式以及如何处理已识别的意图。

    - **高级：** 这与`设置`相同，只是配置以文本文件形式呈现，可以直接在浏览器中编辑。

    - **日志：** 这是可以实时查看引擎日志的地方。


    几点说明……


    浏览器 IDE（准确地说，是 Docker 容器内的进程）会在您每次更改配置设置时要求您重启 Rhasspy。


    每当您对`句子`或`词汇`部分进行更改时，它还会要求您训练 Rhasspy。


    除非您正在进行手术并需要立即向助手求助，否则没有理由不这样做。


    我们现在知道如何操作控制台了，那么就让我们的语音助手为我们识别一些内容吧。


    ### 第一条语音命令


    要创建一条能生成意图的语音命令，我们需要在`句子`部分进行一些编辑。正如刚才所解释的，`句子`部分是我们定义引擎可以识别的句子的地方。


    #### 第一条命令，完整句子


    这一次，用于定义意图的语法非常简单，并通过一个`.ini`文件（源自古老的 Windows 95 时代）插入。


    模式如下：


    ```

    [IntentName]

    Sentence1

    ```


    所以，如果是在周一早上，您真的需要咖啡，您可以这样写：


    ```

    [Coffee]

    I need coffee

    ```


    让我们试试看。首先删除该`.ini`文件的内容，只添加上面那条咖啡意图，这样`句子`部分现在看起来就像图 5-15 所示。


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig15_HTML.jpg](img/490964_1_En_5_Fig15_HTML.jpg)


    **图 5-15** 我真的需要咖啡


    如果您点击醒目的`保存句子`按钮，您将看到图 5-16 所示的训练提醒。


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig16_HTML.jpg](img/490964_1_En_5_Fig16_HTML.jpg)


    **图 5-16** 首次 Rhasspy 训练


    #### 语音部分与测试您的意图


    Rhasspy 引擎现已训练完毕，您可以前往`语音`部分进行测试，如图 5-17 所示。


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig17_HTML.jpg](img/490964_1_En_5_Fig17_HTML.jpg)


    **图 5-17** 语音部分


    `语音`部分是您可以说话或输入句子，并查看是否识别出意图以及识别出什么意图的地方。


    假设我们在`句子`字段中输入“I need coffee”；引擎应该会识别并生成我们刚刚定义的“Coffee”响应，如图 5-18 所示。


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig18_HTML.jpg](img/490964_1_En_5_Fig18_HTML.jpg)


    **图 5-18** 我……需要……咖啡


    语音命令“Coffee”被识别，并附带一个生成的 JSON 文档，其中包含关于置信度和原始值的各种输入。


    由于我们这里专注于语音命令，您也可以长按“按住录音”按钮，说“I need coffee”，然后观察所说的句子首先被转换为文本，显示在`句子`字段中，然后像刚才一样被分析。


    现在可能是时候插入 ReSpeaker 或您的 USB 麦克风了。


    如果您已经安装了 `eSpeak` ([`http://espeak.sourceforge.net/`](http://espeak.sourceforge.net/))（一个文本转语音的命令行工具），您也可以生成一个
    WAV 文件并将其输入到 Rhasspy。


    ```

    espeak "I need coffee" --stdout >> ineedcoffee.wav

    ```


    上传该 `ineedcoffee.wav` 文件，然后点击`获取意图`按钮。


    #### 微调意图


    当然，也可以在`句子`部分定义的命令中轻松插入可选词、变量和占位符。让我们改进一下，为我们的意图添加细节，以创建更好的语音命令。


    ##### 可选词


    当然，可以使句子中的单词成为可选项，以使命令对用户更自然。


    在之前的咖啡示例中，您可以在意图中嵌入一个可选的紧迫性，比如您有时可能*真的*需要咖啡。这是通过将可选词放在方括号内来实现的，如下所示：


    ```

    [Coffee]

    I [really] need coffee

    ```


    训练后，您可以在图 5-19 和图 5-20 中看到相同的 `Coffee` 意图是如何被 Rhasspy 正确识别的。


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig20_HTML.jpg](img/490964_1_En_5_Fig20_HTML.jpg)


    **图 5-20** 带有可选词（即 really）的咖啡意图


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig19_HTML.jpg](img/490964_1_En_5_Fig19_HTML.jpg)


    **图 5-19** 不带可选词的咖啡意图

    '
- fmt: '### Adding Alternatives


    But what about when it’s a day where you feel really good about yourself and you
    don’t really need that addicting black stuff to wake you up? Let’s rewrite our
    coffee intent so it can recognize both when you need coffee and when you don’t.


    ```

    [Coffee]

    I (need | don''t need) coffee

    ```


    Training and using this new intent, you can now tell your coffee assistant that
    you do not need coffee. Back on the Speech tab, you would get the intent shown
    in Figure [5-21](#490964_1_En_5_Chapter.xhtml#Fig21).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig21_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig21_HTML.jpg)


    Figure 5-21


    I don’t need coffee (although, to be honest, that’s not true)


    You probably already noticed one problem with this generated intent. Yes, it’s
    not very useful as is, because the same intent is generated whether we want coffee
    or not.


    We could of course parse the received string or write two different intents, but
    what if we simply give a name to that list of possibilities? This is done with
    round brackets, as shown here:


    ```

    [Coffee]

    I ((need | don''t need) {need}) coffee

    ```


    Now, our Coffee intent will add a slot named `need` to the JSON document, and
    its value will be either `need` or `don''t need`.


    Let’s try again; see the result in Figure [5-22](#490964_1_En_5_Chapter.xhtml#Fig22).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig22_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Maybe I don’t need coffee


    You should notice several things here. First, the summary of the intent is now
    showing more details, the intent is marked in red, and each slot is nicely shown
    in a list with its associated value (here, `need = don''t need`).


    Second, the full JSON document of the intent contains an `entities` section, and
    each entity has an entity name and associated value.


    As a side note, the JSON document also contains a `slots` section, with a simple
    list of all the slots of the intent.


    ### Making Intents with Slots More Readable


    You probably noticed that if we add one too many slots, then the whole sentence
    becomes messy quite quickly.


    We can move the slot definition right below the intent name and assign possible
    values with `=`.


    For example, the same coffee intent can be rewritten as shown here:


    ```

    [Coffee]

    need = ((need | don''t need) {need})

    I  coffee

    ```


    Nothing has changed, and the intent behaves the same as before, but it is now
    vastly more readable.


    ### Defining Reusable Slots


    Yes, defining slots inline also brings extra complexity to our sentence definitions,
    so it is possible to move them out and define them on the Slots tab.


    Slots are defined in a simple JSON file, and to move our coffee need to the Slots
    tab, you would write the JSON file shown here:


    ```

    {

    "need": [

    "need",

    "don''t need"

    ]

    }

    ```


    This shows up in the browser as in Figure [5-23](#490964_1_En_5_Chapter.xhtml#Fig23).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig23_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Slots of coffee needs


    To use that in the sentence file, you would now have to write the intent, as shown
    here:


    ```

    [Coffee]

    myneed = $need {need}

    I  coffee

    ```


    Here is a breakdown of the code:


    - `myneed`: This is the placeholder in the sentence, meaning its definition can
    be seen as being inlined at training time.

    - `$need`: The dollar sign specifies that this is coming from the slots JSON file.

    - `{need}`: This is the name of the slot within that intent, meaning you can reuse
    the same list in different intents, each time with a different slot name.


    Great. Now we have highly configurable intents, with a complex list of options
    on hand.


    Let’s move to the section where the external system can make use of the generated
    JSON file when an intent is recognized.


    ## Settings: Get That Intent in the Queue


    The generated JSON file looks like it could be useful, but we want to have it
    external to Rhasspy and in the MQTT queue so that we can do more processing.


    Let’s head to the Settings section of the console, as shown in Figure [5-24](#490964_1_En_5_Chapter.xhtml#Fig24).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig24_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig24_HTML.jpg)


    Figure 5-24


    Rhasspy Settings section


    Here we get an overview of how the system is configured. There are zillions of
    configurable options for Rhasspy, but we will focus on the following:


    - **MQTT**: This sends the JSON to the MQTT queue.

    - **Wake word**: The background process is always listening for possible “wake-up”
    keywords; this is your “Hey, Siri” or “Hey, Google” spy here.


    Let’s look at the MQTT interaction first. If you click the MQTT link, you’ll be
    taken to the corresponding section, where you can enter the details of your running
    MQTT daemon, as shown in Figure [5-25](#490964_1_En_5_Chapter.xhtml#Fig25).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig25_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig25_HTML.jpg)


    Figure 5-25


    MQTT settings


    Make sure to fill in the hostname or the IP address of your Raspberry Pi here.
    Restart Rhasspy when asked, and that’s it. Now let’s try to get some coffee on
    MQTT.


    Back on the Speech tab, we can now trigger a new coffee intent, as in Figure [5-26](#490964_1_En_5_Chapter.xhtml#Fig26).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig26_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig26_HTML.jpg)


    Figure 5-26


    One more coffee?


    Let’s now take a look at the MQTT Explorer window of Figure [5-27](#490964_1_En_5_Chapter.xhtml#Fig27).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig27_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig27_HTML.jpg)


    Figure 5-27


    Rhasspy and MQTT


    What do you see? We see a message being sent to the `hermes/intent/coffee` topic,
    which is something similar to what you saw in the previous sections of this chapter.


    Yes, you can feel it too—this is going to work.


    You can also see that there is a simple MQTT message sent to `Rhasspy/intent/coffee`,
    with just the slot’s name and value in the message body. If you don’t need to
    play with the confidence and other details, this is the best alternative. Working
    with this message is left as an exercise for you.


    Hint


    This is easy.


    You can get some instant gratification by trying a few messages specifying whether
    you want or don’t want coffee; just make sure to not drink too much of it.


    ## Settings: Wake-Up Word


    It’s nice to go back to speech every now and then, but it would be nice to just
    leave the Raspberry Pi by itself, and when saying a given word, or set of words,
    get Rhasspy to listen for intents.


    This is done by using *wake-up words*, which are defined in the Settings section.


    I have been having some luck with enabling the Snowboy kit ([`https://snowboy.kitt.ai/`](https://snowboy.kitt.ai/))
    in the configuration, as shown in Figure [5-28](#490964_1_En_5_Chapter.xhtml#Fig28).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig28_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig28_HTML.jpg)


    Figure 5-28


    Snowboy configuration


    There is a default UMDL file downloaded locally for you when you enable Snowboy;
    it will be at the following location on the Raspberry Pi:


    ```

    /home/pi/.config/rhasspy/profiles/en/snowboy/snowboy.umdl

    ```


    You can create your own files and keywords easily by recording your keyword and
    uploading the audio files to the Snowboy web site, as detailed here:


    ```

    http://docs.kitt.ai/snowboy/

    ```


    Now, when you say “Snowboy,” Rhasspy will wake up, as if you were holding the
    Record button.


    So, now, we just have to say the following:


    - “Snowboy”

    - “I need coffee”


    We’re getting there, aren’t we?'
