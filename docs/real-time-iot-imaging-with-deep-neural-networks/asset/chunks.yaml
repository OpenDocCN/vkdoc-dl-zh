  trans: '

    ### 安装 Java OpenJDK


    本书中的所有代码均为 Java 代码，因此我们需要在树莓派上安装 Java 开发工具包和运行时环境。


    作为可选依赖项，你还可以安装 Maven。本书中的大部分示例并不真正需要 Maven，但这可以阻止 Visual Studio Code 显示烦人的消息，提示它找不到（非必需的）Maven
    可执行文件。


    因此，在 Visual Studio Code 的终端标签页中，让我们使用软件包安装程序 `apt` 来为我们安装 Java。这通过下面显示的小代码片段完成：


    ```

    sudo apt update

    sudo apt install openjdk-11-jdk

    ```


    可选地，也可以运行以下命令来安装 Maven：


    ```

    sudo apt install maven

    ```


    每个命令行开头的 `sudo` 用于获取所需的提升权限，以便使用 `apt` 安装新软件。


    前面命令的输出应类似于图 3-23。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig23_HTML.jpg](img/490964_1_En_3_Fig23_HTML.jpg)


    图 3-23


    安装 Java


    ### 安装 Java SDK 的替代方案


    当前在运行 Buster（最新的 Raspbian 版本）的树莓派 4 上可选的 JDK 相当丰富。然而，有时，尤其是在较旧版本的 Raspbian 上，你可能会长时间困于过时的
    JDK。


    值得注意的是，像 Azul 和 Bellsoft 这样的公司已经发布了专门为 ARM CPU（树莓派上运行的处理器）编译的最新版本 JDK。


    访问这两个网站以获取 JDK 软件包的直接链接：


    ```

    https://bell-sw.com/pages/java-11.0.5%20for%20Embedded/

    https://www.azul.com/downloads/zulu-community/

    ```


    以下简短代码片段将从 Bellsoft 下载并安装 JDK 11：


    ```

    sudo wget https://download.bell-sw.com/java/11.0.5+11/bellsoft-jdk11.0.5+11-linux-arm32-vfp-hflt.deb

    sudo dpkg -i bellsoft-jdk11.0.5+11-linux-arm32-vfp-hflt.deb

    ```


    可用的版本确实是 Java 11，如下面的输出所示：


    ```

    pi@raspberrypi:~ $ java -version

    openjdk version "11.0.5-BellSoft" 2019-10-15

    OpenJDK Runtime Environment (build 11.0.5-BellSoft+11)

    OpenJDK 32-Bit Server VM (build 11.0.5-BellSoft+11, mixed mode)

    ```


    现在，Java 开发工具包已安装在你的树莓派上，让我们进入本章的核心内容：在 Java 和树莓派上运行 OpenCV 代码。


    ### 检出 OpenCV/Java 模板


    我们将从直接在树莓派上检出 OpenCV/Java 项目模板开始。有几种方法可以做到这一点；主要的三种如下：


    - 直接对模板执行 Git 克隆

    - 从 Git 项目模板下载 zip 文件

    - 使用 Maven 生成模板项目


    让我们逐一快速回顾这三种方法。


    #### 执行 Git 克隆


    直接从 Visual Studio Code 将代码检出到你的树莓派是可行且方便的。这通过命令面板并输入任何以 `git` 开头的内容来完成。


    你将看到几个选项，其中之一是 Git: Clone，如图 3-24 所示。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig24_HTML.jpg](img/490964_1_En_3_Fig24_HTML.jpg)


    图 3-24


    Visual Studio Code 中的 Git:Clone 选项


    在此处，输入模板仓库的位置，如下所示，如图 3-25 所示：


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig25_HTML.jpg](img/490964_1_En_3_Fig25_HTML.jpg)


    图 3-25


    输入模板 URL


    ```

    https://github.com/hellonico/opencv-java-template.git

    ```


    最后，在对话框中点击“打开”进行确认（图 3-26）。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig26_HTML.jpg](img/490964_1_En_3_Fig26_HTML.jpg)


    图 3-26


    当然，要打开克隆的仓库


    现在项目已检出到树莓派上，可以执行了。


    #### 下载 Zip 文件


    或者，你可以从项目模板下载 zip 文件。如果你根本不想使用 Git，可以在终端中使用 `wget` 命令来完成此操作。


    ```

    wget https://github.com/hellonico/opencv-java-template/archive/master.zip

    unzip master.zip

    ```


    图 3-27 显示了 Visual Code Studio 的终端标签页。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig27_HTML.jpg](img/490964_1_En_3_Fig27_HTML.jpg)


    图 3-27


    从树莓派下载 zip 文件


    这样做的好处是不依赖 Git，但后果是在不同的树莓派之间共享更新比较困难。


    #### 使用 Maven


    设置项目的第三种方法与最初创建 Git 模板仓库所使用的技术相同：使用构建工具 Maven。在 Java 生态系统中，相当多的人对使用 Maven 的方式有些畏惧，但对于一组给定的任务来说，Maven
    是一个相当可靠的选择。


    Maven 一旦安装，就可以通过 Maven 原型为你创建一个包含所有必需文件的项目。


    以下命令，一旦复制并粘贴到终端标签页，将为你生成项目结构，如下所示：


    ```

    mvn org.apache.maven.plugins:maven-archetype-plugin:2.4:generate \

    -DarchetypeArtifactId=maven-archetype \

    -DarchetypeGroupId=origami \

    -DarchetypeVersion=1.0 \

    -DarchetypeCatalog=https://repository.hellonico.info/repository/hellonico/ \

    -Dversion=1.0-SNAPSHOT \

    -DgroupId=hello \

    -DartifactId=opencv-java-template

    ```


    命令的重要参数已在之前的代码片段中突出显示，并在此处进行说明：


    - `archetypeVersion`：这是项目结构的版本，此处为 1.0。可能很快会有一些更新，但不要期望太多。最好创建你自己的版本。

    - `version`：这是你项目的版本；通常以 `1.0-SNAPSHOT` 开头。

    - `groupId`：这是你项目的 Maven 组，例如 `com.google` 等。

    - `artifactId`：这是 `groupId` 内项目的名称。它必须是唯一的。


    这里我们使用的是较旧版本的原型插件；使用此版本，更容易从 [`repository.hellonico.info`](http://repository.hellonico.info)
    的自定义 Maven 仓库中检索工件。


    较新版本的原型插件需要对 Maven 框架有更深入的了解，这超出了本书的范围。


    无论你使用哪种技术，现在都可以打开远程文件夹。你应该会看到类似于图 3-28 中的树状结构。


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig28_HTML.jpg](img/490964_1_En_3_Fig28_HTML.jpg)


    图 3-28


    树莓派上的项目文件


    再次强调，文件位于树莓派上，Java 代码将在树莓派上执行，但编辑器实际上是在你的本地计算机上运行。

    '
- fmt: '### Installing the Visual Code Java Extension Pack Remotely


    If you remember from Chapter [1](#490964_1_En_1_Chapter.xhtml), we installed plugins
    to get Visual Studio Code to understand and run Java. We’ll do the same here,
    but this time on the Raspberry Pi.


    Figure [3-29](#490964_1_En_3_Chapter.xhtml#Fig29) shows the Marketplace tab, where
    you can search for the same plugin that was installed before, the Java Extension
    Pack. Note in Figure [3-30](#490964_1_En_3_Chapter.xhtml#Fig30) how Visual Studio
    Code nicely asks you if you want to install the plugin on the Raspberry.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig30_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig30_HTML.jpg)


    Figure 3-30


    Looking for the Java Extension Pack again


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig29_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig29_HTML.jpg)


    Figure 3-29


    “SSH. PI4” has no extension yet


    Figure [3-31](#490964_1_En_3_Chapter.xhtml#Fig31) and Figure [3-32](#490964_1_En_3_Chapter.xhtml#Fig32)
    show the last two steps of installing the Visual Code Java plugin on the Raspberry
    Pi.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig32_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig32_HTML.jpg)


    Figure 3-32


    Editor reload required again


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig31_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig31_HTML.jpg)


    Figure 3-31


    Finding the Java Extension Pack again


    You should now have your editor showing the familiar Run and Debug links straight
    in the editor, as shown in Figure [3-33](#490964_1_En_3_Chapter.xhtml#Fig33).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig33_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig33_HTML.jpg)


    Figure 3-33


    Familiar Run and Debug buttons showing


    All the steps were quite long the first time around, but now you’re ready for
    some good times. You are all set up for running some OpenCV/Java on the Raspberry
    Pi.


    ### Running the First OpenCV Example


    Without further ado, let’s click the Run button and get the program to execute.


    Clicking the Run button runs the same program as in Chapter [1](#490964_1_En_1_Chapter.xhtml),
    but the program is executed on the Raspberry Pi this time. The output shows the
    familiar 3×3 matrix, as in Figure [3-34](#490964_1_En_3_Chapter.xhtml#Fig34).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig34_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig34_HTML.jpg)


    Figure 3-34


    The code has executed on the Raspberry Pi


    Note that various downloads are done in the background on the first run, so the
    command takes a bit of time. On the second run, things are quicker.


    As a reminder, debugging works here in the same way as in Chapter [1](#490964_1_En_1_Chapter.xhtml).
    As an exercise, try adding a breakpoint to pause the program execution after running
    Debug and then add a watch expression on `System.getProperty()` to show the `java.vm.vendor`
    value. Since we are now running on the Raspberry Pi, the value should be `Raspbian`,
    as shown in Figure [3-35](#490964_1_En_3_Chapter.xhtml#Fig35).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig35_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig35_HTML.jpg)


    Figure 3-35


    Debugging and displaying `java.vm.vendor`


