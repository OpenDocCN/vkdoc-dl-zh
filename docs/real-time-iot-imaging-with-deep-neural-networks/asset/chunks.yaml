    \nFigure 1-3\n\nOracle Java download page\n\nLet the installer run to the end,\
    \ and do not stop it even if it tries to open another installer while running.\
    \ Java, being a development kit, does not come with a fancy application to check\
    \ that it has been installed properly, so after the Java installation is finished,\
    \ a quick way to check that things are in place is to open a terminal in Visual\
    \ Studio Code and check the Java version.\n\nYou can press Ctrl+Shift+@ to open\
    \ a terminal inside Visual Studio Code, or you can open it from the menu, as shown\
    \ in Figure [1-5](#490964_1_En_1_Chapter.xhtml#Fig5).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig5_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5\n\nOpening a terminal window from within Visual Studio Code\n\nThis\
    \ will pop up a small tab, usually at the bottom of the editor, as shown in Figure\
    \ [1-6](#490964_1_En_1_Chapter.xhtml#Fig6).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig6_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6\n\nThe Terminal tab\n\nThen inside the terminal, type the following\
    \ command:\n\n```\njava -version\n```\n\nFigure [1-7](#490964_1_En_1_Chapter.xhtml#Fig7)\
    \ shows the expected version output if you have installed the OpenJDK version.\n\
    \n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig7_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7\n\nJava version\n\nNote that the Java version itself is not important;\
    \ any version between 8 and 14 is expected to work. Heck, let’s be optimistic—things\
    \ should also work for the foreseeable future.\n\nWe are almost there with all\
    \ the setup, so bear with me for a few more seconds. In Visual Studio Code, everything\
    \ you write will be handled as simple text. Basically, if you do not tell a computer\
    \ what to do with text, it will not do anything.\n\nLet’s tell Visual Studio Code\
    \ to understand our Java files by installing the Java plugin.\n\nThe left sidebar\
    \ of the editor has a set of rather cute icons, and if you click the one at the\
    \ bottom of Figure [1-8](#490964_1_En_1_Chapter.xhtml#Fig8), you can access the\
    \ Visual Studio Code Marketplace.\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig8_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8\n\nVisual Studio Code Marketplace\n\nFrom here, you can install plug-ins\
    \ in the editor to extend it in many different ways. We are going to make heavy\
    \ use of plugins in this book, and build a setup which you can reuse and enhance\
    \ for other situations.\n\nFor now, we want to install Java support from within\
    \ the editor, which is done by searching for the Java extension using the search\
    \ bar (see Figure [1-9](#490964_1_En_1_Chapter.xhtml#Fig9)).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig9_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9\n\nIn search of the perfect Java plugin\n\nSelecting the plugin on\
    \ the left gives an extensive description on a tab on the right, as shown in Figure\
    \ [1-10](#490964_1_En_1_Chapter.xhtml#Fig10).\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig10_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10\n\nDescription of the Java plugin\n\nThe Java extension is actually\
    \ a collection of plugins, and there is a full entry and description available\
    \ in the Visual Studio Code documentation, available here:\n\n```\nhttps://code.visualstudio.com/docs/java/extensions\n\
    ```\n\nBasically, the following plugins will be installed when you install the\
    \ Java Extension Pack:\n\n*   Language Support for Java by Red Hat:\n\n[`https://marketplace.visualstudio.com/items?itemName=redhat.java`](https://marketplace.visualstudio.com/items%253FitemName%253Dredhat.java)\n\
    \n*   Debugger for Java:\n\n[`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-debug`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-debug)\n\
    \n*   Java Test Runner:\n\n[`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-test`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-test)\n\
    \n*   Maven for Java:\n\n[`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-maven`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-maven)\n\
    \n*   Java Dependency Viewer:\n\n[`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-dependency`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-dependency)\n\
    \n*   Visual Studio IntelliCode:\n\n[`https://marketplace.visualstudio.com/items?itemName=VisualStudioExptTeam.vscodeintellicode`](https://marketplace.visualstudio.com/items%253FitemName%253DVisualStudioExptTeam.vscodeintellicode)\n\
    \nThese plugins will allow you to perform all the tasks that are useful when writing\
    \ code, such as autocompletion, code inspection, debugging, and more.\n\nAt this\
    \ stage, after reloading the editor, you are essentially done with the installation\
    \ steps. The fun development environment is ready; it hasn’t cost you a penny,\
    \ and almost no personal data has been leaked."
  trans: "\n# Visual Studio Code 入门指南\n\n> *机会来敲门时，你必须做好准备。*\n> \n> ——布鲁诺·马尔斯\n\n\
    本书介绍的开发环境搭建方法，对于习惯编写代码的人来说相当标准。不过它也有点“新潮”的感觉——只有酷孩子才会用。我们将使用的*技术栈*（即开发环境）包含以下组件：\n\
    \n* Visual Studio Code，一款小巧但可扩展的文本编辑器\n* Java 开发工具包及其运行时，用于编写和运行 Java 代码\n* Visual\
    \ Studio Code 的 Java 插件，使编辑器能够识别并运行 Java 代码\n\n基本上，就这些了。\n\n无论你使用的是 Windows、Mac\
    \ 还是 Linux 系统，都没有关系。XX 的所有组件都设计为跨平台运行。要安装 Visual Studio Code，你需要访问 [`https://code.visualstudio.com/`](https://code.visualstudio.com/)。\n\
    \n点击页面右上角的下载按钮。点击后，你会看到针对不同平台的软件包选项，每个计算机平台对应一个，如图 1-1 所示。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig1_HTML.jpg](img/490964_1_En_1_Fig1_HTML.jpg)\n\
    \n图 1-1\n\n选择下载版本\n\n在撰写本文时，当前版本是 1.40，但更新的版本只会更好。\n\n运行安装程序并首次打开 Visual Studio\
    \ Code 后，你会看到类似图 1-2 的界面。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig2_HTML.jpg](img/490964_1_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2\n\nVisual Studio Code\n\n第二步是安装 Java（如果尚未安装）。你可以访问 OpenJDK 网站 ([`https://jdk.java.net/`](https://jdk.java.net/))\
    \ 下载 zip 文件，或者前往 Oracle 网站下载适用于你机器的即用安装程序（见图 1-3 和图 1-4）。具体来说，你可以访问 [`https://www.oracle.com/technetwork/java/javase/downloads/index.html`](https://www.oracle.com/technetwork/java/javase/downloads/index.html)。\n\
    \n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig4_HTML.jpg](img/490964_1_En_1_Fig4_HTML.jpg)\n\
    \n图 1-4\n\nJava 下载链接\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig3_HTML.jpg](img/490964_1_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3\n\nOracle Java 下载页面\n\n让安装程序运行至结束，即使它在运行过程中试图打开另一个安装程序，也不要停止。Java 作为一个开发工具包，并没有附带一个花哨的应用程序来检查它是否已正确安装，因此在\
    \ Java 安装完成后，快速检查一切就绪的方法是：在 Visual Studio Code 中打开一个终端，并检查 Java 版本。\n\n你可以按 `Ctrl+Shift+@`\
    \ 在 Visual Studio Code 中打开终端，或者从菜单中打开，如图 1-5 所示。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig5_HTML.jpg](img/490964_1_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5\n\n从 Visual Studio Code 内部打开终端窗口\n\n这将会弹出一个小的选项卡，通常位于编辑器底部，如图 1-6 所示。\n\
    \n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig6_HTML.jpg](img/490964_1_En_1_Fig6_HTML.jpg)\n\
    \n图 1-6\n\n终端选项卡\n\n然后在终端中输入以下命令：\n\n```\njava -version\n```\n\n图 1-7 显示了如果你安装了\
    \ OpenJDK 版本，预期的版本输出。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig7_HTML.jpg](img/490964_1_En_1_Fig7_HTML.jpg)\n\
    \n图 1-7\n\nJava 版本\n\n请注意，Java 版本本身并不重要；8 到 14 之间的任何版本都应该可以正常工作。嘿，让我们乐观一点——在可预见的未来，事情也应该能正常运行。\n\
    \n所有设置工作就快完成了，请再耐心等待几秒钟。在 Visual Studio Code 中，你编写的所有内容都将作为纯文本处理。基本上，如果你不告诉计算机如何处理文本，它就不会做任何事情。\n\
    \n让我们通过安装 Java 插件来告诉 Visual Studio Code 识别我们的 Java 文件。\n\n编辑器左侧的侧边栏有一组相当可爱的图标，如果你点击图\
    \ 1-8 底部的那个，就可以访问 Visual Studio Code 市场。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig8_HTML.jpg](img/490964_1_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8\n\nVisual Studio Code 市场\n\n在这里，你可以安装编辑器插件，以多种方式扩展其功能。在本书中，我们将大量使用插件，并构建一个你可以重复使用并针对其他情况进行增强的开发环境。\n\
    \n现在，我们想要在编辑器中安装 Java 支持，这可以通过使用搜索栏搜索 Java 扩展来实现（见图 1-9）。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig9_HTML.jpg](img/490964_1_En_1_Fig9_HTML.jpg)\n\
    \n图 1-9\n\n寻找完美的 Java 插件\n\n在左侧选择该插件后，右侧选项卡会显示详细的描述，如图 1-10 所示。\n\n![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig10_HTML.jpg](img/490964_1_En_1_Fig10_HTML.jpg)\n\
    \n图 1-10\n\nJava 插件描述\n\nJava 扩展实际上是一个插件集合，Visual Studio Code 文档中提供了完整的条目和描述，可在此处访问：\n\
    \n```\nhttps://code.visualstudio.com/docs/java/extensions\n```\n\n基本上，当你安装 Java\
    \ 扩展包时，将安装以下插件：\n\n* Red Hat 提供的 Java 语言支持：[`https://marketplace.visualstudio.com/items?itemName=redhat.java`](https://marketplace.visualstudio.com/items%253FitemName%253Dredhat.java)\n\
    * Java 调试器：[`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-debug`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-debug)\n\
    * Java 测试运行器：[`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-test`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-test)\n\
    * Maven for Java：[`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-maven`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-maven)\n\
    * Java 依赖查看器：[`https://marketplace.visualstudio.com/items?itemName=vscjava.vscode-java-dependency`](https://marketplace.visualstudio.com/items%253FitemName%253Dvscjava.vscode-java-dependency)\n\
    * Visual Studio IntelliCode：[`https://marketplace.visualstudio.com/items?itemName=VisualStudioExptTeam.vscodeintellicode`](https://marketplace.visualstudio.com/items%253FitemName%253DVisualStudioExptTeam.vscodeintellicode)\n\
    \n这些插件将允许你执行编写代码时所有有用的任务，例如自动补全、代码检查、调试等。\n\n此时，重新加载编辑器后，安装步骤就基本完成了。有趣的开发环境已经准备就绪；它没有花费你一分钱，而且几乎没有泄露任何个人数据。\n"
- fmt: '# Running Your First Java Application


    So, with the editor open, let’s create a file, write some Java code in it, and
    see how to run the code directly from within the editor.


    Running code in Java usually implies a compilation step, where the Java text file
    is converted to a form that the computer, and here the Java runtime, can execute.


    In our setup, all those steps are being handled in the background by Visual Studio
    Code.


    Our first example will just output a greeting, as is usually the case with any
    well-behaved computer program.


    First, let’s create a file named `First.java` and drop in some very basic Java
    code. The code will output some basic greeting text; this will also help us check
    that the setup is fully working.


    Let’s write the content in Listing [1-1](#490964_1_En_1_Chapter.xhtml#PC3) in
    the Java file.


    ```

    public class First {

    public static void main(String[] args) {

    System.out.println("Hello Java");

    }

    }

    Listing 1-1

    Your First Java Program

    ```


    After entering this code (or just opening the sample provided), you will notice
    a few dynamic refreshes happening in the editor itself. The editor will highlight
    the code for you and associate the different Java features to your typing, as
    shown in Figure [1-11](#490964_1_En_1_Chapter.xhtml#Fig11).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig11_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Editor magic


    Autocompletion of the code is included for free and can be triggered by using
    the `Tab` key, as shown in Figure [1-12](#490964_1_En_1_Chapter.xhtml#Fig12).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig12_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Autocompletion


    You can also access the Java documentation when available, as shown in Figure
    [1-13](#490964_1_En_1_Chapter.xhtml#Fig13), by using the keyboard combination
    `Ctrl+spacebar`.


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig13_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig13_HTML.jpg)


    Figure 1-13


    Inline documentation


    You have also probably already noticed the `Run` and `Debug` links at the top
    of the main Java method, as shown in Figure [1-14](#490964_1_En_1_Chapter.xhtml#Fig14).
    You can click these links or trigger them with keyboard shortcuts. Press `F5`
    for debugging and press `Ctrl+F5` to run the code.


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig14_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Run and Debug links


    Clicking the `Run` button will, as you would expect, trigger the execution of
    the code inside the editor and display some text in the `Terminal` tab we opened
    earlier (Figure [1-15](#490964_1_En_1_Chapter.xhtml#Fig15)).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig15_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig15_HTML.jpg)


    Figure 1-15


    Running some Java code for real


    # Importing Core Java Packages


    You will need to have external classes loaded eventually, and this can be done
    for you using the editor’s import function. This seems trivial at this stage,
    but when using OpenCV in Java, some of the packages are hard to figure out, especially
    when a lot of the code samples do not bother writing the imports for conciseness.


    First, let’s write a piece of code that displays the current time. The easiest
    way to do this is to simply use a `Date` object, as shown in Listing [1-2](#490964_1_En_1_Chapter.xhtml#PC4).


    ```

    public class First {

    public static void main(String[] args) {

    Date d = new Date();

    System.out.println(String.format("hello java. it is %s", d));

    }

    }

    Listing 1-2

    Before Imports

    ```


    In the print version of this book, everything looks OK, but in Visual Studio the
    editor rightfully highlights the parts of the code that cannot be compiled properly.
    In Figure [1-16](#490964_1_En_1_Chapter.xhtml#Fig16), notice how the code cannot
    be understood by the compiler and is being underlined.


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig16_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Missing `Date` class import


    To import the class, you can click the small light bulb next to the `Date` word
    that is underlined in Red (Figure [1-17](#490964_1_En_1_Chapter.xhtml#Fig17)).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig17_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig17_HTML.jpg)


    Figure 1-17


    Importing using the light bulb


    Alternatively, you can trigger the Visual Studio command menu by pressing `Ctrl+Shift+P`
    or `Command+Shift+P` and start typing `Organize Imports` in the bar (see Figure
    [1-18](#490964_1_En_1_Chapter.xhtml#Fig18)).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig18_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig18_HTML.jpg)


    Figure 1-18


    Organizing imports


    You can select the exact Java class that needs to be imported in the current file,
    which here is `java.util.Date` (see Figure [1-19](#490964_1_En_1_Chapter.xhtml#Fig19)).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig19_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig19_HTML.jpg)


    Figure 1-19


    Selecting the proper class


    Now that the code is fixed, it is ready to be executed again. Let’s click the
    same `Run` link or use the `F5` keyboard shortcut to start the execution.


    The execution output is once again shown in the terminal, as shown in Figure [1-20](#490964_1_En_1_Chapter.xhtml#Fig20).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig20_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig20_HTML.jpg)


    Figure 1-20


    Wow. That code was written and executed in November 2019


    # Debugging Lesson


    This is your book, so you can skip this section on debugging and come back to
    it later if you want. I decided to add this section on debugging now, when we’re
    working with some simple code, because getting this part done up front allows
    you to master the OpenCV code better and go through each OpenCV computation step
    in a nice and easy-to-understand way.


    If you decided to keep reading this part, then great! We are going to spend just
    a little bit of time looking at how to debug Java code from within Visual Studio
    Code.


    As you have seen, executing the code was quite simple from within the editor.
    In Java and with this setup, we also get a free debugger. You even get free debuggers
    in browsers nowadays when running JavaScript code from web pages.


    Why is a debugger that important? A debugger allows you to stop the execution
    at any point in the code and then locally inspect it and act from the position
    of the stopped code.


    That means you can start executing the code but also ask the runtime to stop wherever
    you want. Also, you do not have to choose where to stop code execution before
    starting it. Let’s say you do video processing in real time, and at some stage,
    you would like to know why the code analyzing the camera feed is not finding objects
    as you would expect it to do. In that case, you can stop the code execution right
    in the frame capture loop and either dump the picture or rerun the analysis step-by-step
    so you can find out if the model is wrong or if the picture is still in an unexpected
    size or color mode.


    Java itself does not have a really useful read-eval-print-loop (REPL). A REPL
    allows you to execute code line by line, and it works quite well with my favorite
    language, Clojure, and even with Kotlin and of course Python. Java does not make
    it easy to run and add things line by line, which can be almost forgiven now that
    debugging has been made so easy from Visual Studio Code.


    Enough talking, let’s see how to use the debugger to perform basic debugging tasks:


    *   Add a breakpoint

    *   Execute the code step-by-step

    *   Watch a variable

    *   Change a variable value'
