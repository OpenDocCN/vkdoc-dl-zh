    \ 5.0, BLACK, 3);\n}\n}\n```\n**Listing 2-10** Running Yolo on Images\n\nRunning\
    \ the example on images of Marcel actually brings really high confidence scores\
    \ that are close to a perfect location, as shown in Figure [2-18](#490964_1_En_2_Chapter.xhtml#Fig18).\n\
    \n![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig18_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig18_HTML.jpg)\n\
    \n**Figure 2-18** Yolo based detection confirms Marcel is a cute cat\n\nRunning\
    \ the inference on many cats also gives great results, but on the second run we\
    \ are missing one of the cats because of its close position to another detected\
    \ cat and because of our introduction of the postprocessing step, which removes\
    \ overlapping matching boxes. See Figure [2-19](#490964_1_En_2_Chapter.xhtml#Fig19).\n\
    \n![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig19_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig19_HTML.jpg)\n\
    \n**Figure 2-19** Many cats\n\nAn exercise for you at this point is to change\
    \ the parameters of the `Dnn.NMSBoxes` function call to see whether you can get\
    \ the two boxes to show at the same time.\n\nThe problem with static images is\
    \ that it is difficult to get the extra context that we have in real life. This\
    \ is a shortcoming that goes away when dealing with sets of input images coming\
    \ from a live video stream.\n\nSo, with Chapter [2](#490964_1_En_2_Chapter.xhtml)\
    \ wrapped up, you can now do object detection on pictures. Chapter [3](#490964_1_En_3_Chapter.xhtml)\
    \ will take it from here and use the Raspberry Pi to teach you about on-device\
    \ detection.\n\nFootnotes [1](#490964_1_En_2_Chapter.xhtml#Fn1_source)\n\n# 3.\
    \ Vision on Raspberry Pi 4\n\n> *Imagine a world in which your entire possession\
    \ is one raspberry, and you give it to your friend.*\n> \n> —Gerda Weissmann Klein,\
    \ *All But My Life* (Hill and Wang, 1995)\n\nIn Chapters [1](#490964_1_En_1_Chapter.xhtml)\
    \ and [2](#490964_1_En_2_Chapter.xhtml), you saw how to get up and running with\
    \ computer vision using Java on a regular desktop computer. The setup was a bit\
    \ manual, but all the different building blocks were freely available, so it was\
    \ just a matter of putting those blocks together.\n\nIn this chapter, you’ll add\
    \ one more block to the mix, the Raspberry Pi 4. The first goal of the chapter\
    \ is to perform the same kinds of tasks that you did on a computer but run as\
    \ much as possible on the IoT device, while typing code and controlling the code\
    \ execution from your local desktop. In other words, you’ll write on your computer\
    \ but execute on the Raspberry.\n\nFor the code execution part, you need to have\
    \ some specific hardware and cabling, so you should prepare yourself to go shopping.\
    \ We’ll provide a shopping list and then move on to the setup.\n\nSpecifically,\
    \ we will go through creating the SD card and setting up the Raspberry Pi, but\
    \ it is assumed that most of those steps are already properly covered in other\
    \ books and blogs, so you can go and read those if you need more than the basics\
    \ presented here.\n\nAt the end of this chapter, you will have good grasp of the\
    \ Raspberry, its speed, and its energy consumption while running the different\
    \ vision operation and detection algorithms. You will also be ready to integrate\
    \ this functionality on a larger scale into a voice-controlled home assistant\
    \ of your design and thus expand your personal home or work office automation."
