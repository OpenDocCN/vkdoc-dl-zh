    Adding these two pictures together properly is going to take just a bit of work
    the first time, but it will be useful to understand how OpenCV works.


    ### Simple Addition


    Loading a picture is done using the `imread` function from the `Imgcodec` class.
    Calling `imread` with a path returns a `Mat` object, the same kind of object you
    have been working with so far. Adding the two `Mat`s (the Marcel `Mat` and the
    beach `Mat`) is as simple as using the same `Core.add` function as used earlier,
    as shown in Listing [2-4](#490964_1_En_2_Chapter.xhtml#PC12).


    ```

    Mat marcel = Imgcodecs.imread("marcel.jpg");

    Mat beach = Imgcodecs.imread("beach.jpeg");

    Mat dest = new Mat();

    Core.add(marcel, beach, dest);

    Listing 2-4

    First Try at Adding Two Mats

    ```


