    ## Finding Marcel: Detecting Objects Primer


    Let’s talk about how to detect objects using Marcel the cat.


    ### Finding Cat Faces in Pictures Using a Classifier


    Before processing speeds got faster and neural networks were making the front
    pages of all the IT magazines and books, OpenCV implemented a way to use classifiers
    to detect objects within pictures.


    Classifiers are trained with only a few pictures, using a method that feeds the
    classifier with training pictures and the features you want the classifier to
    detect during the detection phase.


    The three main types of classifiers in OpenCV, named depending on the type of
    features they are extracting from the input images during the training phase,
    are as follows:


    *   Haar features


    *   Hog features


    *   Local binary pattern (LBP) features


    The OpenCV documentation on cascade classifiers ([`https://docs.opencv.org/4.1.1/db/d28/tutorial_cascade_classifier.html`](https://docs.opencv.org/4.1.1/db/d28/tutorial_cascade_classifier.html))
    is full of extended details when you want to get some more background information.
    For now, the goal here is not to repeat this freely available documentation.'
  trans: '

    # 回到棕褐色效果


    现在，你已经对 OpenCV 中的 `Mat` 计算有了足够了解，可以回到前面几页介绍的棕褐色示例了。


    在棕褐色示例中，我们创建了一个核（另一个 `Mat` 对象），用于 `Core.transform` 函数。


    `Core.transform` 对输入图像应用变换，其规则如下：


    -   输出图像中每个像素的通道数等于核的行数。

    -   核的列数必须等于输入的通道数，或者比通道数多 1。

    -   每个像素的输出值是一个矩阵变换，该变换作用于数组 `src` 的每个元素，并将结果存储在 `dst` 中，其中 `dst[ I ] = m x src[
    I ]`。


    关于其工作原理的示例，请参见表 2-2。


    **表 2-2** `Core.transform` 示例


    | 源数据 | 核 | 输出 | 计算过程 |

    | --- | --- | --- | --- |

    | `[2 3]` | `[5]` | `[10 15]` | `10 = 2 × 5` `15 = 3 × 5` |

    | `[2 3]` | `[5 1]` | `[11 16]` | `11 = 2 × 5 + 1` `16 = 3 × 5 + 1` |

    | `[2 3]` | `[5 10]` | `[(10, 20) (15, 30)]` | `(10 = 2 × 5` `20 = 2 × 10)` `(15
    = 3 × 5` `30 = 3 × 10)` |

    | `[2]` | `[1 2; 3 4]` | `[(4 10)]` | `4 = 2 × 1 + 2` `10 = 3 × 2 + 4` |

    | `[2 3]` | `[1 2; 3 4]` | `[(4 10) (5 13)]` | `4 = 2 × 1 + 2` `10 = 2 × 3 + 4`
    `5 = 3 × 1 + 2` `13 = 3 × 3 + 4` |

    | `[2]` | `[1; 2; 3]` | `[(2 4 6)]` | `2 = 2 × 1` `4 = 2 × 2` `6 = 2 × 3` |

    | `[2]` | `[1 2; 3 4; 5 6]` | `[(4 10 16)]` | `4 = 2 × 2 + 1` `10 = 2 × 3 + 4`
    `16 = 2 × 5 + 6` |

    | `[(190 119 10)]` | `[0.5 0.2 0.3]` | `[122]` | `122 = 190 × 0.5 + 119 × 0.2
    + 10 × 0.3` |


    OpenCV 的 `Core.transform` 函数可用于多种场景，也是将彩色图像转换为棕褐色图像的基础。


    让我们看看能否将马塞尔变成棕褐色。我们使用一个 3×3 的核进行直接变换，其中每个值的计算方式如上所述。


    最简单且最著名的棕褐色变换使用具有以下值的核：


    ```

    [     0.272 0.534 0.131

    0.349 0.686 0.168

    0.393 0.769 0.189]

    ```


    因此，对于每个生成的像素，蓝色的值如下：


    ```

    0.272 x 源蓝色 + 0.534 x 源绿色 + 0.131 x 源红色

    ```


    绿色的目标值如下：


    ```

    0.349 x 源蓝色 + 0.686 x 源绿色 + 0.168 x 源红色

    ```


    最后，红色的值如下：


    ```

    0.393 x 源蓝色 + 0.769 x 源绿色 + 0.189 x 源红色

    ```


    如你所见，红色的值被大幅压低，每个乘数都在 0.1 左右，而绿色对生成的 `Mat` 对象的像素值影响最大。


    这次马塞尔的输入图像如图 2-10 所示。


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig10_HTML.jpg](img/490964_1_En_2_Fig10_HTML.jpg)


    **图 2-10** 马塞尔还不知道自己即将变成棕褐色


    要将马塞尔变成棕褐色，首先我们使用 `imread` 读取一张图片，然后应用棕褐色核，如代码清单 2-7 所示。


    ```

    Mat marcel = Imgcodecs.imread("marcel.jpg");

    Mat sepiaKernel = new Mat(3, 3, CvType.CV_32F);

    sepiaKernel.put(0, 0,

    // bgr -> 蓝色

    0.272, 0.534, 0.131,

    // bgr -> 绿色

    0.349, 0.686, 0.168,

    // bgr -> 红色

    0.393, 0.769, 0.189);

    Mat destination = new Mat();

    Core.transform(marcel, destination, sepiaKernel);

    Imgcodecs.imwrite("sepia.jpg", destination);

    ```


    **代码清单 2-7** 棕褐色马塞尔


    如你所见，每个像素的 BGR 输出是根据输入中同一像素的每个通道的值计算得出的。


    运行代码后，Visual Studio Code 将图片输出到名为 `sepia.jpg` 的文件中，如图 2-11 所示。


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig11_HTML.jpg](img/490964_1_En_2_Fig11_HTML.jpg)


    **图 2-11** 变成棕褐色的马塞尔


    这有点偏黄的棕褐色。如果我们想要更多红色呢？请继续尝试。


    增加红色意味着增加 R 通道的值，即核矩阵的第三行。


    将 `kernel[3,3]` 的值从 0.189 提高到 0.589，会使得输入中的红色对输出中的红色产生更大影响。因此，使用以下核，马塞尔会变成更红的色调，如图
    2-12 所示：


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig12_HTML.jpg](img/490964_1_En_2_Fig12_HTML.jpg)


    **图 2-12** 马塞尔的红色棕褐色版本


    ```

    // bgr -> 蓝色

    0.272, 0.534, 0.131,

    // bgr -> 绿色

    0.349, 0.686, 0.168,

    // bgr -> 红色

    0.393, 0.769, 0.589

    ```


    你可以尝试为核设置其他一些值，使棕褐色变得更绿或更蓝……当然，如果你有猫的话，也可以用自己的猫试试。但是，你能比马塞尔更可爱吗？


    # 寻找马塞尔：对象检测入门


    让我们来谈谈如何使用猫咪马塞尔来检测对象。


    ## 使用分类器在图片中查找猫脸


    在处理速度变得更快、神经网络登上所有 IT 杂志和书籍封面之前，OpenCV 就已经实现了一种使用分类器在图片中检测对象的方法。


    分类器仅使用少量图片进行训练，其方法是在训练阶段向分类器提供训练图片以及你希望分类器在检测阶段检测的特征。


    OpenCV 中三种主要的分类器类型（根据它们在训练阶段从输入图像中提取的特征类型命名）如下：


    -   Haar 特征

    -   Hog 特征

    -   局部二值模式（LBP）特征


    当你需要获取更多背景信息时，OpenCV 关于级联分类器的文档（`https://docs.opencv.org/4.1.1/db/d28/tutorial_cascade_classifier.html`）提供了大量详细说明。目前，我们的目标不是重复这些免费提供的文档。

    '
- fmt: '### What Is a Feature?


    Features are key points extracted from a set of digital pictures used for training,
    something that can be reused for matching on totally new digital inputs.


    For example, an ORB classifier, nicely explained in “Object recognition with ORB
    and its Implementation on FPGA” (`http://citeseerx.ist.psu.edu/viewdoc/download?doi=10.1.1.405.9932&rep=rep1&type=pdf`)
    is a very fast binary descriptor based on BRIEF. The other famous feature-based
    algorithms are Scale Invariant Feature Transform (SIFT) and Speed Up Robust Features
    (SURF); all these are looking to match features for a set of known images (what
    we are looking for) on new inputs.


    Listing [2-8](#490964_1_En_2_Chapter.xhtml#PC23) shows a super-brief example of
    how feature extraction is done. Here we are using an ORB detector to find the
    key points of a picture.


    ```

    Mat src = Imgcodecs.imread("marcel2.jpg", Imgcodecs.IMREAD_GRAYSCALE);

    ORB detector = ORB.create();

    MatOfKeyPoint keypoints = new MatOfKeyPoint();

    detector.detect(src, keypoints);

    Mat target = src.clone();

    target.setTo(new Scalar(255, 255, 255));

    Features2d.drawKeypoints(target, keypoints, target);

    Imgcodecs.imwrite("orb.png", target);

    Listing 2-8

    ORB Feature Extraction

    ```


    Basically, the features are extracted into a set of points. We don’t do that usually,
    but drawing the key points here gives something like Figure [2-13](#490964_1_En_2_Chapter.xhtml#Fig13).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig13_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Extracting ORB features on Marcel


    Cascade classifiers are called that because they internally have a set of different
    classifiers, each of them getting a deeper, more detailed chance of a match at
    a cost of speed. So, the first classifier will be very fast and get a positive
    or a negative, and if positive, it will pass the task on to the next classifier
    for some more advanced processing, and so on.


    Haar-based classifiers, as proposed by Paul Viola and Michael Jones, are based
    on analyzing four main features, as shown in Figure [2-14](#490964_1_En_2_Chapter.xhtml#Fig14).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig14_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Haar feature types


    Since the features are easily computed, the number of images required for training
    Haar-based object detection is quite low. Most importantly, up until recently,
    with low CPU speeds on embedded systems, those classifiers had the advantage of
    being very fast.


    ### Where in the World Is Marcel?


    So, enough talking and reading about research papers. In short, a Haar-based cascade
    classifier is good at finding features of faces, of humans or animals, and can
    even focus on eyes, noses, and smiles, as well as on features of a full body.


    The classifiers can also be used to count the number of moving heads in video
    streams and find out whether anyone is stealing things from the fridge after bedtime.


    OpenCV makes it a no-brainer to use a cascade classifier and get some instant
    gratification. The way to put cascade classifiers into action is as follows:


    1.  Load the classifier from an XML definition file containing values describing
    the features to look for.


    2.  Access a `Mat` object called `detectMultiScale` directly on the input `Mat`
    object, and a `Mat` object called `MatOfRect`, which is a specific OpenCV object
    designed to handle lists of rectangles nicely.


    3.  Once the previous call is finished, `MatOfRect` is filled with a number of
    rectangles, each of them describing a zone of the input image, where a positive
    has been found.


    4.  Do some artsy drawing on the original picture to highlight what was found
    by the classifier.


    5.  Save the output.


    The Java code for this is actually rather simple and just barely longer than the
    equivalent Python code. See Listing [2-9](#490964_1_En_2_Chapter.xhtml#PC24).


    ```

    String classifier

    = "haarcascade_frontalcatface.xml";

    CascadeClassifier cascadeFaceClassifier

    = new CascadeClassifier(classifier);

    Mat cat = Imgcodecs.imread("marcel.jpg");

    MatOfRect faces = new MatOfRect();

    cascadeFaceClassifier.detectMultiScale(cat, faces);

    for (Rect rect : faces.toArray()) {

    Imgproc.putText(

    cat,

    "Chat",

    new Point(rect.x, rect.y - 5),

    Imgproc.FONT_HERSHEY_PLAIN, 10,

    new Scalar(255, 0, 0), 5);

    Imgproc.rectangle(

    cat,

    new Point(rect.x, rect.y),

    new Point(rect.x + rect.width, rect.y + rect.height),

    new Scalar(255, 0, 0),

    5);

    }

    Imgcodecs.imwrite("marcel_blunt_haar.jpg", cat);

    Listing 2-9

    Calling a Cascade Classifier on an Image

    ```


    After running the code in Listing [2-9](#490964_1_En_2_Chapter.xhtml#PC24), you
    will realize quickly what the problem is with the slightly naïve approach. The
    classifier is finding a lot of extra positives, as shown in Figure [2-15](#490964_1_En_2_Chapter.xhtml#Fig15).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig15_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    Too many Marcels…


    There are two techniques to reduce the number of detected objects.


    *   Filter the rectangles based on their sizes in the loop on rectangles. While
    this is often used thanks to its simplicity, this adds a chance to focus on false
    positives.


    *   Pass in extra parameters to `detectMultiScale`, specifying, among other things,
    a certain number of required neighbors to get a positive or indeed a minimum size
    for the returned rectangles.


    The full version has all the parameters shown in Table [2-3](#490964_1_En_2_Chapter.xhtml#Tab3).


    Table 2-3


    `detectMultiScale` Parameters


    | Parameter | Description |

    | --- | --- |

    | `image` | Matrix of the type `CV_8U` containing an image where objects are detected.
    |

    | `objects` | Vector of rectangles where each rectangle contains the detected
    object; the rectangles may be partially outside the original image. |

    | `scaleFactor` | Parameter specifying how much the image size is reduced at each
    image scale. |

    | `minNeighbors` | Parameter specifying how many neighbors each potential candidate
    rectangle should have to be retained. |

    | `flags` | Not used for a new cascade. |

    | `minSize` | Minimum possible object size. Objects smaller than this value are
    ignored. |

    | `maxSize` | Maximum possible object size. Objects larger than this value are
    ignored if the `maxSize == minSize` model is evaluated on a single scale. |


    Based on the information from Table [2-3](#490964_1_En_2_Chapter.xhtml#Tab3),
    let’s apply some sensible parameters to `detectMultiScale`, as shown here:


    *   `scaleFactor=2`


    *   `minNeighbors=3`


    *   `flags=-1` (ignored)


    *   `size=300x300`


    Building on the code in Listing [2-9](#490964_1_En_2_Chapter.xhtml#PC24), let’s
    replace the line containing `detectMultiScale` with this updated one:


    ```

    cascadeFaceClassifier.detectMultiScale(cat, faces, 2, 3, -1, new Size(300, 300));

    ```


    Applying the new parameters, and (why not?) running a debug session on the new
    code, gives you the layout shown in Figure [2-16](#490964_1_En_2_Chapter.xhtml#Fig16).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig16_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Debugging session while looking for Marcel


    The output is already included in the layout, but you will notice the found rectangles
    are now limited to only one rectangle, and the output gives only one picture (and,
    yes, there can be only one Marcel).'
