- fmt: '### Transparent Overlay on Detection


    When drawing the rectangles in the previous examples, you might have wondered
    whether it is possible to draw something other than rectangles on the detected
    shapes.


    Listing [4-18](#490964_1_En_4_Chapter.xhtml#PC26) shows how to do this by loading
    a mask that will be overlaid at the location of the detected shape. This is pretty
    much what you use in your smartphone applications all the time.


    Note that there is a trick here with the transparency layer in the `drawTransparency`
    function. The mask for the overlay is loaded using `IMREAD_UNCHANGED` as the loading
    flag; you have to use this or the transparency layer is lost.


    Once you have the transparency layer, you then use it as a mask while copying
    the overlay so as to copy the exact pixels of the `Mat` object you want.


    ```

    class FunWithHaar implements Filter {

    CascadeClassifier classifier;

    Mat mask;

    Scalar white = new Scalar(255, 255, 255);

    public FunWithHaar(String path) {

    classifier = new CascadeClassifier(path);

    mask = Imgcodecs.imread("masquerade_mask.png", Imgcodecs.IMREAD_UNCHANGED);

    }

    void drawTransparency(Mat frame, Mat transp, int xPos, int yPos) {

    List layers = new ArrayList();

    Core.split(transp, layers);

    Mat mask = layers.remove(3);

    Core.merge(layers, transp);

    Mat submat = frame.submat(yPos, yPos + transp.rows(), xPos, xPos + transp.cols());

    transp.copyTo(submat, mask);

    }

    public Mat apply(Mat input) {

    MatOfRect faces = new MatOfRect();

    classifier.detectMultiScale(input, faces);

    Mat maskResized = new Mat();

    for (Rect rect : faces.toArray()) {

    Imgproc.resize(mask, maskResized, new Size(rect.width, rect.height));

    int adjusty = (int) (rect.y - rect.width * 0.2);

    try {

    drawTransparency(input, maskResized, rect.x, adjusty);

    } catch (Exception e) {

    e.printStackTrace();

    }

    }

    return input;

    }

    }

    Listing 4-18

    Adding an Overlay

    ```


    Depending on the transparent `Mat` object used, you may need to adjust the location,
    but otherwise you should get something that looks like Figure [4-16](#490964_1_En_4_Chapter.xhtml#Fig16).
    Finally you can add some Venice Carnival feeling to your video streams!


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig16_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    Adding a mysterious mask as an overlay


    Use a Batman Mask


    I actually tried and could not find a proper Batman mask to use as an overlay
    to the video stream. Maybe you can help me by sending me the code with an appropriate
    `Mat` overlay to use!


    ### Detecting by Template Matching


    Template matching with OpenCV is just plain simple. It’s so simple that this should
    maybe have come earlier in the order of detection methods. Template matching means
    looking for a `Mat` within another `Mat`. OpenCV has a superpower function named
    `matchTemplate` that does this.


    Listing [4-19](#490964_1_En_4_Chapter.xhtml#PC27) mostly revolves around using
    `matchTemplate`. Look for the usage of `Core.minMaxLoc` on the result received
    from `matchTemplate`. It is used to locate the index of the best score and will
    be used again when running neural networks.


    ```

    class Template implements Filter {

    Mat template;

    public Template(String path) {

    this.template = Imgcodecs.imread(path);

    }

    @Override

    public Mat apply(Mat in) {

    Mat outputImage = new Mat();

    Imgproc.matchTemplate(in, template, outputImage, Imgproc.TM_CCOEFF);

    MinMaxLocResult mmr = Core.minMaxLoc(outputImage);

    Point matchLoc = mmr.maxLoc;

    Imgproc.rectangle(in, matchLoc, new Point(matchLoc.x + template.cols(), matchLoc.y
    + template.rows()),

    new Scalar(255, 255, 255), 3);

    return in;

    }

    }

    Listing 4-19

    Pattern Matching

    ```


    Now, let’s find a box containing a ReSpeaker like the one shown in Figure [4-17](#490964_1_En_4_Chapter.xhtml#Fig17)
    because we are going to need this speaker in the next chapter, and I just can’t
    find it right now. Let’s use OpenCV to find it for us.


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig17_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    The template


    Detecting through OpenCV’s template matching is surprisingly fast and accurate,
    as shown in Figure [4-18](#490964_1_En_4_Chapter.xhtml#Fig18).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig18_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Finding the box for the speaker


    It’s a bit hard to see the frame rate in Figure [4-18](#490964_1_En_4_Chapter.xhtml#Fig18),
    but it is actually around 10 to 15 frames per second on the Raspberry Pi 4.


    ### Detecting by Yolo


    This is the final detection method presented in this chapter. Let’s say we want
    to apply a trained neural network to identify objects in a stream. After some
    testing on the hardware with little computing power, I got quite speedy results
    with Yolo/Darknet and the freely available Darknet networks trained on the Coco
    dataset.


    The advantage of using neural networks on random inputs is that most of the trained
    networks are quite resilient and give good results, with 80 percent to 90 percent
    accuracy on close to real-time streams.


    Training is the hardest part of using neural networks. In this book, we’ll restrict
    ourselves to running detection code on the Raspberry Pi, not training. You can
    find the steps for how to organize your pictures for re-training networks on the
    Darknet/Yolo web site.


    The sequence of steps to achieve object detection with Darknet in OpenCV are as
    follows:


    1.  Load a network from its configuration file and weight file.

    2.  Find the output layers/nodes of that network, because this is where the results
    will be. The output layers are the layers that are not connected to more output
    layers.

    3.  Transform a `Mat` object into a blob for the network. A blob is an image,
    or a set of images, tuned to match the format expected by the network in terms
    of size, channel orders, etc.

    4.  We then run the network, meaning we feed it the blob and retrieve the values
    for the layers marked as output layers.

    5.  For each line in the results, we actually get a confidence value for each
    of the expected possible recognizable features. In Coco, the network is trained
    to be able to recognize 80 different possible objects, such as people, bicycles,
    cars, etc.

    6.  We then use `MinMaxLocResult` again to get the index for the most probable
    recognized object, and if the value for that index is more than 0, we keep it.

    7.  The first four values in each result line are actually the four values describing
    a box where the detected object was found, so we extract those four values and
    keep the rectangle and the index for its label.

    8.  Before drawing all the boxes, we also usually make use of `NMSBoxes`, which
    removes overlapping boxes. Most of the time overlapping boxes are multiple versions
    of the same positive detection on the same object.

    9.  Finally, we draw the remaining rectangle and add the label for the recognized
    object.


    Listing [4-20](#490964_1_En_4_Chapter.xhtml#PC28) shows the full code for the
    base `YoloDetector` implemented as a filter.'
