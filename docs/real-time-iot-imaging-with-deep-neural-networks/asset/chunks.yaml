    A breakpoint is, as its name implies, a point in time to take a break. It is shown
    as a red dot in the editor while moving the mouse on the left side of the line
    numbers (Figure [1-21](#490964_1_En_1_Chapter.xhtml#Fig21)).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig21_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig21_HTML.jpg)


    Figure 1-21 Breakpoint


    To create a breakpoint, simply click the line number on which you want to stop
    the execution. Note that the breakpoint will stop the code before any of the code
    on that line is executed, so adding a breakpoint on line 5 will not show the `Date`
    object when the execution stops, but adding a dot on line 6 will, as shown in
    Figure [1-21](#490964_1_En_1_Chapter.xhtml#Fig21).


    ### Execute the Code Step-by-Step


    Clicking the Debug link will start the execution in Debug mode and will stop it
    at the first breakpoint, the one you just added on line 6, and the editor will
    display a slightly different layout, as shown in Figure [1-22](#490964_1_En_1_Chapter.xhtml#Fig22).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig22_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig22_HTML.jpg)


    Figure 1-22 Taking a break


    On the left side, you can see on the small Call Stack tab where the code execution
    has been stopped; here it’s on line 6 in the class `First` in the main method
    (Figure [1-23](#490964_1_En_1_Chapter.xhtml#Fig23)).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig23_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig23_HTML.jpg)


    Figure 1-23 Where am I?


    You can also see the value of the variable `d`, which is a `Date` object, and
    you can also see the input parameters given to the program if there are any; here
    you see an empty array (Figure [1-24](#490964_1_En_1_Chapter.xhtml#Fig24)).


    ![../images/490964_1_En_1_Chapter/490964_1_En_1_Fig24_HTML.jpg](images/490964_1_En_1_Chapter/490964_1_En_1_Fig24_HTML.jpg)


