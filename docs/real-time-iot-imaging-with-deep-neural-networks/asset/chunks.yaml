- fmt: "### Creating the Highlight Intent\n\nNow, we have to create a small intent\
    \ that we will use to tell our main object detection application which object\
    \ we want to focus on.\n\nThe intent will be specified according to the following\
    \ rules:\n\n- **Name:** `highlight`\n- **Command:** `show me only <something>`,\
    \ where `<something>` is either `cat` or `person`\n- **Name of the slot:** `only`\n\
    \nYou should definitely try this on your own before reading ahead…\n\nThe resulting\
    \ code for the intent to put in the sentence file is as follows:\n\n```\n[highlight]\n\
    object = (cats | person) {only}\nshow me only \n```\n\nThe best way to try is\
    \ of course by saying the following:\n\n- “Snowboy”\n- “Show me only cats”\n\n\
    to have the intent JSON be published in the `hermes/intent/highlight` queue, with\
    \ the content as shown in Figure [5-29](#490964_1_En_5_Chapter.xhtml#Fig29).\n\
    \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig29_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig29_HTML.jpg)\n\
    \n**Figure 5-29** Show me only cats, Snowboy\n\n*Voilà*, we’re mostly done with\
    \ the Rhasspy and voice command section, so we can now go back to detecting objects,\
    \ cats, and people in real time.\n\n## Voice and Real-Time Object Detection\n\n\
    This is the part of the chapter where we bridge it all, meaning the video analyses\
    \ from previous chapters and the voice recognition using Rhasspy.\n\nFirst, let’s\
    \ get ready with a simple `origami` project setup, with messages being sent by\
    \ Rhasspy.\n\n### Simple Setup: Origami + Voice\n\nIn this section, we will do\
    \ the following:\n\n1. Start a video streaming on the main camera in full-screen,\
    \ in a new thread.\n2. The video streaming is using the `origami` core filter\
    \ `annotate`, where you can just add some text to the picture.\n3. Connect to\
    \ MQTT on the main thread.\n4. On a new intent message, we update the `annotate`\
    \ text.\n\nThe intent used here is the `highlight` intent that was defined earlier,\
    \ with a slot to recognize the names taken from the object categories of the COCO\
    \ dataset.\n\nThe rest of Listing [5-9](#490964_1_En_5_Chapter.xhtml#PC38) should\
    \ be easy to follow.\n\n```\npackage practice;\nimport org.eclipse.paho.client.mqttv3.IMqttMessageListener;\n\
    import org.eclipse.paho.client.mqttv3.MqttClient;\nimport org.eclipse.paho.client.mqttv3.MqttMessage;\n\
    import org.json.JSONObject;\nimport origami.Camera;\nimport origami.Origami;\n\
    import origami.filters.Annotate;\npublic class Consumer {\npublic static void\
    \ main(String... args) throws Exception {\nOrigami.init();\nAnnotate myText =\
    \ new Annotate();\nnew Thread(() -> {\nnew Camera().device(0).filter(myText).fullscreen().run();\n\
    }).start();\nMqttClient client = new MqttClient(\"tcp://localhost:1883\", MqttClient.generateClientId());\n\
    client.connect();\nclient.subscribe(\"hermes/intent/#\", new IMqttMessageListener()\
    \ {\n@Override\npublic void messageArrived(String topic, MqttMessage message)\
    \ throws Exception {\nString json = new String(message.getPayload(), \"UTF-8\"\
    );\nJSONObject obj = new JSONObject(json);\nJSONObject slot = ((JSONObject) obj.getJSONArray(\"\
    slots\").get(0)).getJSONObject(\"value\");\nString cats = slot.getString(\"value\"\
    );\nmyText.setText(cats);\n}\n});\n}\n}\n```\n\n**Listing 5-9** Origami + Rhasspy\n\
    \nIf things are all good and you say “Show me only cats,” the `annotate` filter\
    \ will update the upper-left text, as shown in Figure [5-30](#490964_1_En_5_Chapter.xhtml#Fig30).\n\
    \n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig30_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig30_HTML.jpg)\n\
    \n**Figure 5-30** Webcam streaming\n\nNow let’s connect this setup with object\
    \ recognition and with the real-time video streaming part.\n\n### Origami Real-Time\
    \ Video Analysis Setup\n\nFrom the previous chapter, you will remember that we\
    \ were using an `origami` filter, called Yolo, to perform object detection. Just\
    \ like the `annotate` filter, the Yolo filter is included in the `origami-filters`\
    \ library, and in a very Java way, you just have to extend the base filter to\
    \ highlight the detected objects.\n\nAvailable in the `origami-filter` library,\
    \ the Yolo filter allows you to download and retrieve networks on demand using\
    \ a network specification. So, for example, `networks.yolo:yolov3-tiny:1.0.0`\
    \ will download `yolov3-tiny` and `cache` for further usage, depending on which\
    \ device you’re on. This is a feature of the `origami` framework.\n\nFor Yolo,\
    \ the following network specs are available for training Yolo networks on the\
    \ Coco data set:\n\n- `networks.yolo:yolov3-tiny:1.0.0`\n- `networks.yolo:yolov3:1.0.0`\n\
    - `networks.yolo:yolov2:1.0.0`\n- `networks.yolo:yolov2-tiny:1.0.0`\n\nEach one\
    \ is either faster or more precise than the one before it.\n\n#### Creating the\
    \ Yolo Filter\n\nIn Listing [5-10](#490964_1_En_5_Chapter.xhtml#PC39), we prepare\
    \ the groundwork for showing either the number of all the objects detected, using\
    \ `annotateWithTotal`, or the display only, via the `only` switch. Note that the\
    \ entry point is in the function `annotateAll`, where it is decided whether to\
    \ display all the boxes or a subset of them.\n\nListing [5-10](#490964_1_En_5_Chapter.xhtml#PC39)\
    \ shows the code for the MyYolo filter.\n\n```\npackage filters;\nimport org.opencv.core.Mat;\n\
    import org.opencv.core.Point;\nimport org.opencv.core.Rect;\nimport org.opencv.core.Scalar;\n\
    import org.opencv.imgproc.Imgproc;\nimport origami.filters.detect.Yolo;\nimport\
    \ java.util.List;\npublic class MyYolo extends Yolo {\nScalar color = new Scalar(110.0D,\
    \ 220.0D, 0.0D);\nString only = null;\nboolean annotateWithTotal = false;\npublic\
    \ MyYolo(String spec) {\nsuper(spec);\n}\npublic MyYolo annotateWithTotal() {\n\
    this.annotateWithTotal = true;\nreturn this;\n}\npublic MyYolo annotateAll() {\n\
    this.annotateWithTotal = false;\nreturn this;\n}\npublic MyYolo only(String only)\
    \ {\nthis.only = only;\nreturn this;\n}\npublic MyYolo color(Scalar color) {\n\
    this.color = color;\nreturn this;\n}\n@Override\npublic void annotateAll(Mat frame,\
    \ List results) {\nif (only == null) {\nif (annotateWithTotal)\nannotateWithCount(frame,\
    \ results.size());\nelse\nsuper.annotateAll(frame, results);\n} else {\nif (!annotateWithTotal)\n\
    results.stream().filter(result -> result.get(1).equals(only)).forEach(r -> {\n\
    annotateOne(frame, (Rect) r.get(0), (String) r.get(1));\n});\nelse\nannotateWithCount(frame,\
    \ (int) results.stream().filter(result -> result.get(1).equals(only)).count());\n\
    }\n}\npublic void annotateWithCount(Mat frame, int count) {\nImgproc.putText(frame,\
    \ (only == null ? \"ALL\" : only) + \" (\" + count + \")\", new Point(50, 500),\
    \ 1, 4.0D, color, 3);\n}\npublic void annotateOne(Mat frame, Rect box, String\
    \ label) {\nif (only == null || only.equals(label)) {\nImgproc.putText(frame,\
    \ label, new Point(box.x, box.y), 1, 3.0D, color, 3);\nImgproc.rectangle(frame,\
    \ box, color, 2);\n}\n}\n}\n```\n\n**Listing 5-10** MyYolo Filter\n\nWith the\
    \ filter now ready, we can start doing analysis again."
