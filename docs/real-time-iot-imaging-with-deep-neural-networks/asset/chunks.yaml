    yolov3-tiny/yolov3-tiny.weights\", \"yolov3-tiny/yolov3-tiny.cfg\");\n    }\n\
    }\n```\n*清单 4-21* 不同 Yolo 网络的 Java 类和构造函数\n\n在树莓派上运行时，Yolo v3 可以检测里斯本繁忙街道上的汽车和行人（图\
    \ 4-19），以及更多的猫（图 4-20）。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig20_HTML.jpg](img/490964_1_En_4_Fig20_HTML.jpg)\n\
    \n*图 4-20* Yolo v3 检测猫\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig19_HTML.jpg](img/490964_1_En_4_Fig19_HTML.jpg)\n\
    \n*图 4-19* Yolo v3 检测汽车和行人\n\n如你所见，标准 Yolo v3 的帧率实际上非常低。\n\n当使用 Yolo v3 Tiny 进行此实验时，你实际上可以达到接近每秒\
    \ 5 到 6 帧，这仍然略低于实时要求，但结果仍然具有非常好的准确性。参见图 4-21。\n\n![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig21_HTML.jpg](img/490964_1_En_4_Fig21_HTML.jpg)\n\
    \n*图 4-21* TinyYoloV3 检测猫\n\n> *你知道我的方法。它是建立在对琐事的观察之上的。*\n> \n> ——阿瑟·柯南·道尔，《博斯科姆比溪谷秘案》（1891）\n\
    \n你已经读到了本章的最后几行，这是一段漫长的旅程，你了解了在树莓派上使用 Java 和 OpenCV 进行目标检测的大部分概念。\n\n具体来说，你学习了以下内容：\n\
    \n- 如何设置树莓派以进行实时目标检测编程\n- 如何使用过滤器和管道执行图像和实时视频处理\n- 如何为 `Mat` 实现一些基本过滤器，直接用于来自外部设备和基于文件的视频的实时视频流\n\
    - 如何通过类似 Instagram 的过滤器增加一些趣味\n- 如何使用过滤器和管道实现多种目标检测技术\n- 如何运行一个在 Coco 数据集上训练、可在树莓派上实时使用的神经网络\n\
    \n在下一章中，你将了解 Rhasspy（一个语音识别系统），以连接本章介绍的概念，并将其应用于家庭、办公室或猫舍的自动化。"
- fmt: "# 5. Vision and Home Automation\n\n> *Home is a place you grow up wanting\
    \ to leave and grow old wanting to get back to.*\n> \n> —John Ed Pearce\n\nThe\
    \ first four chapters of this book showed you how to bring in video streams of\
    \ all sorts and analyze them first on a computer and then on the small limited\
    \ device that is the Raspberry Pi.\n\nThis last chapter closes the gap while opening\
    \ up the possibilities by linking the video part to the voice part.\n\nWith the\
    \ advent of voice platforms such as Apple Siri, Google Assistant, Amazon Alexa,\
    \ and Microsoft Cortona, voice-assisted services are popping up everywhere. Humans\
    \ are language creatures; we have to express ourselves. Drawing is also an option\
    \ to interact with devices, like was done in the movie *Minority Report*, but\
    \ to be honest, you need pretty big and expensive screens to do something like\
    \ that. Voice works everywhere, and we don’t need expensive tooling to use it.\
    \ Using voice is intuitive and empowering.\n\nI personally have many examples\
    \ of how voice assistants could be used in everyday life. Start by entering a\
    \ coffee shop and asking for a “double-shot cappuccino with cinnamon on top, on\
    \ the front terrace, please”, and then it is automatically made and delivered\
    \ to you while you’re sitting in the sun outside.\n\nHere’s another simple example:\
    \ I wish it were possible to go to an ATM and say, “Please withdraw $100 from\
    \ my main account, in five notes of $20.” The voice assistant recognizes your\
    \ voice so you do not need to scroll through endless confirmation screens; you\
    \ just get your bills. (I know, with all the virtual currencies nowadays, you\
    \ don’t really even need to go to the ATM anymore, do you?)\n\nThose are some\
    \ day-to-day examples, but you can also look to science-fiction movies to see\
    \ voice-controlled spaceships as well as coffee machines. This is big.\n\nSo,\
    \ why don’t we use one of the existing software assistants for voice recognition,\
    \ like Siri? Well, all of the big players basically control all of your user data\
    \ and can access whatever data is going through their pipelines at any time. This\
    \ can be annoying as an end user—just about as annoying when creating and engineering\
    \ your own solutions. But, as much as possible, you want to be able to control\
    \ where your data flows or, indeed, doesn’t flow.\n\nIn this chapter, we thus\
    \ introduce Rhasspy ([`https://github.com/synesthesiam/rhasspy`](https://github.com/synesthesiam/rhasspy)).\n\
    \nRhasspy was created for advanced users who want to have a voice interface to\
    \ a home assistant but who value privacy and freedom. Rhasspy is free/open source\
    \ and can do the following:\n\n* Function completely disconnected from the Internet\n\
    * Work well with Home Assistant, Hass.io, and Node-RED\n\nIn this chapter, we’ll\
    \ do the following:\n\n* We will install and learn how to interact with the MQTT\
    \ protocol and Mosquitto, a broker that can be used to send recognized messages\
    \ from Rhasspy.\n* We will set up the Rhasspy interface to listen to intents and\
    \ view those messages in the MQTT queue.\n* We will integrate those messages with\
    \ the content of the previous chapters and run real-time video analysis, updating\
    \ the object detection parameters and using the voice commands received from Rhasspy.\n\
    \n## Rhasspy Message Flow\n\nBasically, Rhasspy continuously looks for “wake-up\
    \ words.” It wakes up when it’s called by one of these words and records the next\
    \ sentence and turns it into words. Then it analyzes the sentence against what\
    \ it can recognize. Finally, if the sentence matches against known sentences,\
    \ it returns a result with probabilities.\n\nFrom an application point of view,\
    \ the main thing you need to interact with when building a voice application is\
    \ the messaging queue, which in most IoT cases is an MQTT server. MQTT was developed\
    \ to focus on telemetry measures and thus had to be lightweight and as close to\
    \ real time as possible. Mosquitto is an open source implementation of the MQTT\
    \ protocol; it is lightweight and secure and was designed specifically to service\
    \ IoT applications and small devices.\n\nTo do voice recognition, you start by\
    \ creating Rhasspy commands, or *intents*, with a set of sentences. Each sentence\
    \ is of course a set of words and can contain one or more variables. Variables\
    \ are words that can be replaced by others and are assigned corresponding values\
    \ once the voice detection has been performed by the voice engine.\n\nIn a simple\
    \ weather service example, the following sentence:\n\n* What is the weather *tomorrow*?\n\
    \nwould be defined as follows:\n\n* What is the weather `<when:=datetime>`?\n\n\
    Here, `when` is of type `datetime` and could be anything like *today*, *tomorrow*,\
    \ *this morning*, or *the first Tuesday of next month*.\n\n“What is the weather”\
    \ is fixed within the context of that command and will never change. But the `<datetime>`\
    \ location is a variable, so we give the engine hints on its type for better recognition.\n\
    \nOnce an intent is recognized, Rhasspy posts a JSON message in a Mosquitto topic\
    \ associated with the intent.\n\nThe example we will build in this chapter is\
    \ to ask the application to highlight certain objects detected in the video stream.\n\
    \nFor example, in the following sentence, where *cats* is the variable container,\
    \ we specify which object to detect:\n\n* Show me only *cats*!\n\nIn this example,\
    \ when the intent has been recognized, the message sent will be a JSON-based message\
    \ with the following main sections:\n\n* Some message headers, notably the recognized\
    \ input.\n* Automatic speech recognition (ASR) tokens, or the confidence of each\
    \ word of the sentence.\n* The overall ASR confidence.\n* The intent that was\
    \ recognized and its confidence score.\n* The value for each of the “slots,” the\
    \ variable defined within the sentence, and their associated confidence scores.\n\
    * Alternatives intents are also provided, although I found them to not be very\
    \ useful in most contexts; therefore, looking for second best choice and trying\
    \ to recover the flow is usually not worth it.\n\nListing [5-1](#490964_1_En_5_Chapter.xhtml#PC1)\
    \ shows a sample of the JSON message.\n\n```\n{\n\"sessionId\": \"9d355e0e-218b-4efa-bf36-9c8b13a7df42\"\
    ,\n...\n\"input\": \"show me only cats\",\n\"asrTokens\": [\n[\n{\n\"value\":\
    \ \"show\",\n\"confidence\": 1,\n\"rangeStart\": 0,\n\"rangeEnd\": 4,\n\"time\"\
    : {\n\"start\": 0,\n\"end\": 0.98999995\n}\n},\n...\n]\n],\n\"asrConfidence\"\
    : 0.9476952,\n\"intent\": {\n\"intentName\": \"hellonico:highlight\",\n\"confidenceScore\"\
    : 1\n},\n\"slots\": [\n{\n\"rawValue\": \"cats\",\n\"value\": {\n\"kind\": \"\
    Custom\",\n\"value\": \"cats\"\n},\n\"alternatives\": [],\n\"range\": {\n\"start\"\
    : 13,\n\"end\": 17\n},\n\"entity\": \"string\",\n\"slotName\": \"object\",\n\"\
    confidenceScore\": 0.80663073\n}\n],\n\"alternatives\": [\n{\n\"intentName\":\
    \ \"hellonico:hello\",\n\"confidenceScore\": 0.28305322,\n\"slots\": []\n},\n\
    ...\n]\n}\nListing 5-1\nJSON Message\n```\n\nJSON messages from intents are sent\
    \ to a given named message queue, one queue per intent, in the MQTT broker. The\
    \ queue name used to send the intent message follows this pattern:\n\n```\nhermes/intent/:\n\
    ```\n\nSo, this is what it looks like in our example:\n\n```\nhermes/intent/hellonico:highlight\n\
    ```\n\nTo summarize, Figure [5-1](#490964_1_En_5_Chapter.xhtml#Fig1) shows a simple\
    \ message flow.\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig1_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nRhasspy message flow\n\nSince the main point of interaction for\
    \ the system is the system queue, let’s see first how we can install the queue\
    \ broker and then interact with it.\n\n## MQTT Message Queues\n\nTo be able to\
    \ use the message queue and receive messages from Rhasspy, we will install the\
    \ message broker Mosquitto, one of the most widely used MQTT brokers. MQTT is\
    \ a lightweight and energy-efficient protocol, with different levels of quality\
    \ of service that can be set at the message level. Mosquitto is a very lightweight\
    \ implementation of MQTT."
