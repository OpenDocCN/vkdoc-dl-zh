  trans: "\n# 5. 视觉与家庭自动化\n\n> *家，是你年轻时渴望离开，年老时渴望回归的地方。*\n> \n> ——约翰·埃德·皮尔斯\n\n本书前四章向你展示了如何接入各种视频流，并先在计算机上进行分析，随后在树莓派这一小型受限设备上进行分析。\n\
    \n最后一章通过将视频部分与语音部分连接起来，在开启各种可能性的同时，弥合了二者之间的差距。\n\n随着苹果 Siri、谷歌助手、亚马逊 Alexa 和微软\
    \ Cortona 等语音平台的出现，语音辅助服务正遍地开花。人类是语言生物；我们需要表达自己。与设备交互的另一种方式是绘图，就像电影《少数派报告》中那样，但老实说，要做到那样，你需要相当大且昂贵的屏幕。语音则无处不在，而且我们不需要昂贵的工具就能使用它。使用语音直观且赋权。\n\
    \n我个人有很多关于语音助手如何在日常生活中应用的例子。比如，走进一家咖啡店，说“请来一杯双份浓缩肉桂卡布奇诺，送到前露台”，然后当你坐在外面晒太阳时，咖啡就自动做好并送到你面前。\n\
    \n另一个简单的例子：我希望能够走到自动取款机前说：“请从我的主账户取 100 美元，要 5 张 20 美元的钞票。”语音助手能识别你的声音，所以你无需滚动浏览无尽的确认屏幕；直接拿到钞票就行。（我知道，如今有了各种虚拟货币，你其实根本不需要再去自动取款机了，对吧？）\n\
    \n这些是一些日常例子，但你也可以看看科幻电影，里面既有声控的宇宙飞船，也有声控的咖啡机。这意义重大。\n\n那么，我们为什么不使用现有的软件助手（如 Siri）来进行语音识别呢？嗯，所有的大公司基本上都控制着你所有的用户数据，并且可以随时访问通过其管道传输的任何数据。作为最终用户，这可能会很烦人——在创建和设计你自己的解决方案时也同样烦人。但是，你希望能够尽可能多地控制你的数据流向哪里，或者更确切地说，不流向哪里。\n\
    \n因此，在本章中，我们将介绍 Rhasspy（[`https://github.com/synesthesiam/rhasspy`](https://github.com/synesthesiam/rhasspy)）。\n\
    \nRhasspy 是为那些希望拥有家庭助手的语音界面，但又重视隐私和自由的高级用户而创建的。Rhasspy 是免费/开源的，并且可以做到以下几点：\n\n\
    * 完全离线运行\n* 与 Home Assistant、Hass.io 和 Node-RED 良好配合\n\n在本章中，我们将执行以下操作：\n\n* 我们将安装并学习如何与\
    \ MQTT 协议和 Mosquitto（一个可用于发送 Rhasspy 识别消息的代理）进行交互。\n* 我们将设置 Rhasspy 界面来监听意图，并在\
    \ MQTT 队列中查看这些消息。\n* 我们将把这些消息与前几章的内容集成，运行实时视频分析，更新对象检测参数，并使用从 Rhasspy 接收到的语音命令。\n\
    \n## Rhasspy 消息流\n\n基本上，Rhasspy 会持续寻找“唤醒词”。当被这些词之一唤醒时，它会记录接下来的句子并将其转换为文字。然后，它会根据它能识别的模式来分析这个句子。最后，如果句子与已知句子匹配，它会返回一个带有概率的结果。\n\
    \n从应用的角度来看，在构建语音应用时，你需要与之交互的主要是消息队列，在大多数物联网场景中，这是一个 MQTT 服务器。MQTT 的开发侧重于遥测测量，因此必须轻量级且尽可能接近实时。Mosquitto\
    \ 是 MQTT 协议的一个开源实现；它轻量、安全，并且专门为服务物联网应用和小型设备而设计。\n\n要进行语音识别，你首先要创建 Rhasspy 命令，或称*意图*，并附带一组句子。每个句子当然是一组单词，并且可以包含一个或多个变量。变量是可以被其他词替换的词，一旦语音引擎完成语音检测，它们就会被赋予相应的值。\n\
    \n在一个简单的天气服务示例中，以下句子：\n\n* 明天*的天气怎么样？\n\n将被定义如下：\n\n* `<when:=datetime>` 的天气怎么样？\n\
    \n这里，`when` 是 `datetime` 类型，可以是诸如*今天*、*明天*、*今天早上*或*下个月第一个星期二*之类的任何内容。\n\n“的天气怎么样”在该命令的上下文中是固定的，永远不会改变。但\
    \ `<datetime>` 位置是一个变量，所以我们给引擎提供其类型的提示，以便更好地识别。\n\n一旦一个意图被识别，Rhasspy 就会在与该意图关联的\
    \ Mosquitto 主题中发布一条 JSON 消息。\n\n我们将在本章中构建的示例是，要求应用高亮显示视频流中检测到的某些对象。\n\n例如，在以下句子中，*猫*是变量容器，我们指定要检测的对象：\n\
    \n* 只显示*猫*！\n\n在这个例子中，当意图被识别后，发送的消息将是一条基于 JSON 的消息，包含以下主要部分：\n\n* 一些消息头，特别是识别出的输入。\n\
    * 自动语音识别（ASR）令牌，或句子中每个单词的置信度。\n* 整体 ASR 置信度。\n* 被识别的意图及其置信度分数。\n* 每个“槽位”（句子中定义的变量）的值及其相关的置信度分数。\n\
    * 还提供了备选意图，尽管我发现它们在大多数情况下不是很有用；因此，寻找次优选择并试图恢复流程通常不值得。\n\n清单 5-1 展示了 JSON 消息的一个示例。\n\
    \n```\n{\n\"sessionId\": \"9d355e0e-218b-4efa-bf36-9c8b13a7df42\",\n...\n\"input\"\
    : \"show me only cats\",\n\"asrTokens\": [\n[\n{\n\"value\": \"show\",\n\"confidence\"\
    : 1,\n\"rangeStart\": 0,\n\"rangeEnd\": 4,\n\"time\": {\n\"start\": 0,\n\"end\"\
    : 0.98999995\n}\n},\n...\n]\n],\n\"asrConfidence\": 0.9476952,\n\"intent\": {\n\
    \"intentName\": \"hellonico:highlight\",\n\"confidenceScore\": 1\n},\n\"slots\"\
    : [\n{\n\"rawValue\": \"cats\",\n\"value\": {\n\"kind\": \"Custom\",\n\"value\"\
    : \"cats\"\n},\n\"alternatives\": [],\n\"range\": {\n\"start\": 13,\n\"end\":\
    \ 17\n},\n\"entity\": \"string\",\n\"slotName\": \"object\",\n\"confidenceScore\"\
    : 0.80663073\n}\n],\n\"alternatives\": [\n{\n\"intentName\": \"hellonico:hello\"\
    ,\n\"confidenceScore\": 0.28305322,\n\"slots\": []\n},\n...\n]\n}\n清单 5-1\nJSON\
    \ 消息\n```\n\n来自意图的 JSON 消息被发送到 MQTT 代理中一个指定的命名消息队列，每个意图对应一个队列。用于发送意图消息的队列名称遵循以下模式：\n\
    \n```\nhermes/intent/:\n```\n\n所以，在我们的示例中，它看起来像这样：\n\n```\nhermes/intent/hellonico:highlight\n\
    ```\n\n总结一下，图 5-1 展示了一个简单的消息流。\n\n![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig1_HTML.jpg](img/490964_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n\nRhasspy 消息流\n\n由于系统的主要交互点是系统队列，让我们先看看如何安装队列代理，然后与之交互。\n\n## MQTT 消息队列\n\
    \n为了能够使用消息队列并接收来自 Rhasspy 的消息，我们将安装消息代理 Mosquitto，这是最广泛使用的 MQTT 代理之一。MQTT 是一种轻量级且节能的协议，可以在消息级别设置不同级别的服务质量。Mosquitto\
    \ 是 MQTT 的一个非常轻量级的实现。\n"
- fmt: '# Installing Mosquitto


    Mosquitto install instructions are available for every platform, and the download
    page has the links to the installers.


    ```

    https://mosquitto.org/download/

    ```


    On Windows, you should download the `.exe`-based installer, but other platforms
    have software available through the usual package managers, as shown here:


    ```

    # on mac os

    brew install mosquitto

    # on debian/ubuntu

    apt install mosquitto

    # with snap

    snap install mosquitto

    ```


    Once Mosquitto is installed, you should check that the Mosquito service has started
    properly and is ready to relay messages. For example, on a Mac, use this:


    ```

    $ brew services list mosquitto

    Name         Status    User   Plist

    mosquitto    started   niko   /Users/niko/Library/LaunchAgents/homebrew.mxcl.mosquitto.plist

    ```


    On the command line, you already have two commands available to you: one to publish
    messages on given topics and one to subscribe to messages on given topics.


    ## Comparison of Other MQTT Brokers


    For your reference, you can find a comparison of a few other MQTT brokers here:
    [`https://github.com/mqtt/mqtt.github.io/wiki/server-support`](https://github.com/mqtt/mqtt.github.io/wiki/server-support).


    RabbitMQ is a strong open source contender, but while clustering support is definitely
    robust, the setup is not quite easy.


    ## MQTT Messages on the Command Line


    Once Mosquitto is installed, on the command line it’s rather easy to send messages
    about any topic to the broker using the `mosquitto_pub` command. For example,
    the following command sends the message "I am a MQTT message" on the topic `hello`
    to the broker located on host `0.0.0.0`:


    ```

    mosquitto_pub -h 0.0.0.0 -t hello -m "I am a MQTT message"

    ```


    You, of course, have an equivalent subscriber command with `mosquitto_sub`, as
    follows:


    ```

    $ mosquitto_sub -h 0.0.0.0 -t hello

    I am a MQTT message

    ```


    ### Message To Raspberry


    It’s good practice to start the queue on the Raspberry Pi and read messages from
    the computer, or vice versa.


    The main problem is simply in knowing the IP address or the hostname of the target
    machine, computer, or Raspberry, but sending messages is done in the same way
    using the `mosquitto_pub` and `mosquitto_sub` commands.


    As an extra step, you could even run your Mosquitto MQTT broker in the cloud,
    for example, creating and integrating a queue from a service like [`https://www.cloudmqtt.com/`](https://www.cloudmqtt.com/).


    Usually, my favorite graphical way to see messages is to use MQTT Explorer, a
    graphical client to MQTT, as shown in Figure [5-2](#490964_1_En_5_Chapter.xhtml#Fig2).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig2_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    MQTT Explorer, I am a MQTT message


    You can download MQTT Explorer from the following location:


    ```

    https://github.com/thomasnordquist/MQTT-Explorer/releases

    ```


    It should also be available through your favorite package manager.


    Let’s get back to sending the full equivalent of an intent message. You can use
    the command line to send a JSON file directly to the target intent queue, which
    as we have just seen is as follows: `hermes/intent/hellonico:highlight`.


    So, using `mosquitto_pub`, this gives you the following:


    ```

    mosquitto_pub -f onlycats.json -h 0.0.0.0 -t hermes/intent/hellonico:highlight

    ```


    where `onlycats.json` is the JSON file with the content we have just seen in Listing
    [5-1](#490964_1_En_5_Chapter.xhtml#PC1).


    If you still have MQTT Explorer running, you will see the message in the corresponding
    queue, as shown in Figure [5-3](#490964_1_En_5_Chapter.xhtml#Fig3).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig3_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Sending Rhasspy-like intent messages from the command line


    We have seen how to interact, publish, and subscribe to messages with MQTT from
    the command line. Let’s do the same using Java now.


    # MQTT Messaging in Java


    In this section, we will send and receive messages to and from our Java/Visual
    Studio Code setup. This will help you understand the message flow more easily.


    ## Dependencies Setup


    Either using the project from previous chapters or creating a new one based on
    the project template, we are going to add some Java libraries to interact with
    the MQTT messaging queue and to parse JSON content.


    The dependencies section in the `pom.xml` file should look like Listing [5-2](#490964_1_En_5_Chapter.xhtml#PC11).


    ```

    org.eclipse.paho

    org.eclipse.paho.client.mqttv3

    1.1.0


    origami

    origami

    4.1.2-5


    org.json

    json


    origami

    filters

    1.3


    Listing 5-2

    Java Dependencies

    ```


    Basically, we will make use of the following third-party libraries:


    *   `origami` and `origami-filters` for real-time video processing

    *   `org.json` for JSON content parsing

    *   `mqttv3` for interacting with the MQTT broker and handling messages


    ## Sending a Basic MQTT Message


    Since I’m writing part of this book on a plane flying over Russia, we will send
    a quick "hello" message to our fellow Russian spies using the MQTT protocol.


    To do this, we will go through the following steps:


    1.  Create an MQTT client object, connecting to the host where the broker is running.

    2.  Use that object to connect to the broker using the `connect` method.

    3.  Create an MQTT message with a payload made of a string converted to bytes.

    4.  Publish the message.

    5.  Finally, cleanly disconnect.


    Listing [5-3](#490964_1_En_5_Chapter.xhtml#PC12) shows the rather short code snippet.


    ```

    package practice;

    import org.eclipse.paho.client.mqttv3.MqttClient;

    import org.eclipse.paho.client.mqttv3.MqttMessage;

    public class MqttZero {

    public static void main(String... args) throws Exception {

    MqttClient client = new MqttClient("tcp://localhost:1883", MqttClient.generateClientId());

    client.connect();

    MqttMessage message = new MqttMessage();

    message.setPayload(new String("good morning Russia").getBytes());

    client.publish("hello", message);

    client.disconnect();

    }

    }

    Listing 5-3

    Hello, Russia

    ```


    To check that things are in place, verify that the message is showing in your
    running MQTT Explorer instance, as shown in Figure [5-4](#490964_1_En_5_Chapter.xhtml#Fig4).


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig4_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    MQTT Explorer in Russia


    Note that you should of course be listening to the `hello` topic first.


    ## Simulating a Rhasspy Message


    Sending the equivalent of a Rhasspy message is not going to be that much more
    difficult; we just read the content of the JSON file into a string and then send
    it like we just did with a simple string, as shown in Listing [5-4](#490964_1_En_5_Chapter.xhtml#PC13).


    ```

    package practice;

    import java.nio.file.Files;

    import java.nio.file.Paths;

    import java.util.List;

    import java.util.stream.Collectors;

    import org.eclipse.paho.client.mqttv3.MqttClient;

    import org.eclipse.paho.client.mqttv3.MqttMessage;

    public class Client {

    public static void main(String... args) throws Exception {

    MqttClient client = new MqttClient("tcp://localhost:1883", MqttClient.generateClientId());

    client.connect();

    List nekos = Files.readAllLines(Paths.get("onlycats.json"));

    String neko = nekos.stream().collect(Collectors.joining("\n"));

    MqttMessage message = new MqttMessage();

    message.setPayload(neko.getBytes());

    client.publish("hermes/intent/hellonico:highlight", message);

    client.disconnect();

    }

    }

    Listing 5-4

    Intent message handling from Java

    ```


    Our never-ending love of cats is again showing in Figure [5-5](#490964_1_En_5_Chapter.xhtml#Fig5)
    in the MQTT Explorer window.


    ![../images/490964_1_En_5_Chapter/490964_1_En_5_Fig5_HTML.jpg](images/490964_1_En_5_Chapter/490964_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    JSON files showing in the MQTT Explorer window'
