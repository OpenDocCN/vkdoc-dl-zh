- fmt: '### Detecting by Color


    A picture, or a `Mat` object, in OpenCV is usually in a red/green/blue (RGB) color
    space (actually blue/green/red in OpenCV to be accurate). This is easy to understand
    if you think of it that each pixel is assigned a value for each channel. To see
    the possible values for those channels, you can review the following site:


    ```

    https://www.rapidtables.com/web/color/RGB_Color.html

    ```


    The problem with this color space is that the amount of luminosity and contrast
    are mingled with the amount of color itself.


    When looking for specific colors in `Mat` objects, we switch to a color space
    named HSV (for hue, saturation, value). In this color space, the color directly
    translates to the Hue value.


    The values for Hue are usually between 0 and 360, like the number of degrees in
    a cylinder. OpenCV has a slightly different scheme, with a range divided by 2
    (so it takes less space in memory). Table [4-1](#490964_1_En_4_Chapter.xhtml#Tab1)
    lists the Hue value ranges.


    **Table 4-1** Hue Values in OpenCV


    | Color | Hue Range |

    | --- | --- |

    | Red | 0 to 30 *and* 150 to 180 |

    | Green | 30 to 90 |

    | Blue | 90 to 150 |


    Listing [4-16](#490964_1_En_4_Chapter.xhtml#PC23) converts the color space and
    checks for Hue values in the range of the wanted color using `inRange`, with some
    added magic to draw the shapes properly using `findContours` again at the end
    of the example.


    ```

    class ColorDetector implements Filter {

    Scalar minColor, maxColor;

    public ColorDetector(Scalar minColor, Scalar maxColor) {

    this.minColor = minColor;

    this.maxColor = maxColor;

    }

    @Override

    public Mat apply(Mat input) {

    Mat array255 = new Mat(input.height(), input.width(), CvType.CV_8UC1);

    array255.setTo(new Scalar(255));

    Mat distance = new Mat(input.height(), input.width(), CvType.CV_8UC1);

    List lhsv = new ArrayList(3);

    Mat circles = new Mat();

    Mat hsv_image = new Mat();

    Mat thresholded = new Mat();

    Mat thresholded2 = new Mat();

    Imgproc.cvtColor(input, hsv_image, Imgproc.COLOR_BGR2HSV);

    Core.inRange(hsv_image, minColor, maxColor, thresholded);

    Imgproc.erode(thresholded, thresholded, Imgproc.getStructuringElement(Imgproc.MORPH_RECT,
    new Size(8, 8)));

    Imgproc.dilate(thresholded, thresholded, Imgproc.getStructuringElement(Imgproc.MORPH_RECT,
    new Size(8, 8)));

    Core.split(hsv_image, lhsv);

    Mat S = lhsv.get(1);

    Mat V = lhsv.get(2);

    Core.subtract(array255, S, S);

    Core.subtract(array255, V, V);

    S.convertTo(S, CvType.CV_32F);

    V.convertTo(V, CvType.CV_32F);

    Core.magnitude(S, V, distance);

    Core.inRange(distance, new Scalar(0.0), new Scalar(200.0), thresholded2);

    Core.bitwise_and(thresholded, thresholded2, thresholded);

    Imgproc.GaussianBlur(thresholded, thresholded, new Size(9, 9), 0, 0);

    List contours = new ArrayList();

    Imgproc.HoughCircles(thresholded, circles, Imgproc.CV_HOUGH_GRADIENT, 2, thresholded.height()
    / 8, 200, 100, 0, 0);

    Imgproc.findContours(thresholded, contours, thresholded2, Imgproc.RETR_LIST, Imgproc.CHAIN_APPROX_SIMPLE);

    Imgproc.drawContours(input, contours, -2, new Scalar(10, 0, 0), 4);

    return input;

    }

    }

    class RedDetector extends ColorDetector {

    public RedDetector() {

    super(new Scalar(0, 100, 100), new Scalar(10, 255, 255));

    }

    }

    Listing 4-16

    Detecting Red

    ```


    The result of applying this filter to a video of roses looks something like Figure
    [4-14](#490964_1_En_4_Chapter.xhtml#Fig14).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig14_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig14_HTML.jpg)


    **Figure 4-14** Detecting red roses


    **Implement a Detect Blue Filter**


    Looking at the values for Hue in Table [4-1](#490964_1_En_4_Chapter.xhtml#Tab1),
    you can see it would not be so difficult to implement a filter that searches for
    blue colors. This is left as an exercise for you.


    ### Detecting by Haar


    As you saw in Chapter [1](#490964_1_En_1_Chapter.xhtml), you can use a Haar-based
    classifier to identify objects and/or people in a `Mat` object. The code is pretty
    much the same as you have seen, with an added emphasis on the number and size
    of shapes we are looking for.


    Specifically, the following code shows how two sizes are used as parameters to
    specify the minimum size and the maximum size of the objects we are looking for.


    ```

    classifier.detectMultiScale(input, faces, 1.1, 2, -1, new Size(100, 100), new
    Size(500, 500));

    ```


    So, Listing [4-17](#490964_1_En_4_Chapter.xhtml#PC25), with an extra main example
    function, shows how to use different XML files as parameters to the Haar classifier
    detection.


    ```

    public class DetectWithHaar {

    public static void main(String[] args) {

    Origami.init();

    VideoCapture cap = new VideoCapture(0);

    Mat buffer = new Mat();

    ImShow ims = new ImShow("Camera", 800, 600);

    Filter filter = new Pipeline(new Haar("haarcascades/haarcascade_frontalface_default.xml"),
    new FPS());

    while (cap.grab()) {

    cap.retrieve(buffer);

    ims.showImage(filter.apply(buffer));

    }

    cap.release();

    }

    }

    class Haar implements Filter {

    private CascadeClassifier classifier;

    Scalar white = new Scalar(255, 255, 255);

    public Haar(String path) {

    classifier = new CascadeClassifier(path);

    }

    public Mat apply(Mat input) {

    MatOfRect faces = new MatOfRect();

    classifier.detectMultiScale(input, faces, 1.1, 2, -1, new Size(100, 100), new
    Size(500, 500));

    for (Rect rect : faces.toArray()) {

    Imgproc.putText(input, "Face", new Point(rect.x, rect.y - 5), 3, 5, white);

    Imgproc.rectangle(input, new Point(rect.x, rect.y), new Point(rect.x + rect.width,
    rect.y + rect.height),

    white, 5);

    }

    return input;

    }

    }

    Listing 4-17

    Haar Classifier–Based Detection

    ```


    If you have a cat at home or are using a cat video from the examples, when you
    apply this to a webcam stream, you should get a result that looks like Figure
    [4-15](#490964_1_En_4_Chapter.xhtml#Fig15).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig15_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig15_HTML.jpg)


    **Figure 4-15** Finding cats


    **Using Other Haar Definitions**


    There are other XML files for Haar cascades in the samples. Feel free to use one
    to detect people, eyes, or smiling faces as an exercise.'
