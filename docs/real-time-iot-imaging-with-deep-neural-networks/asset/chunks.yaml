    Connected to the Raspberry Pi from Visual Studio Code


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig20_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig20_HTML.jpg)


    Figure 3-20


    Setting up the SSH host


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig19_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig19_HTML.jpg)


    Figure 3-19


    Choosing pi4


    At this stage, from inside Visual Studio Code, you have a terminal remotely connected
    to your Raspberry Pi. That means you can launch remote commands at will, but you
    can also unplug the keyboard and the mouse from your Raspberry Pi; the rest will
    pretty much be done from your local computer.


    As a first check, we can run a command to check the IP address of the Pi, as shown
    here:


    ```

    ip addr

    ```


    The output will be shown on the Terminal tab of Visual Studio Code, as shown in
    Figure [3-22](#490964_1_En_3_Chapter.xhtml#Fig22).


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig22_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig22_HTML.jpg)


    Figure 3-22


    Confirming the IP address on the Terminal tab


    Outputting the IP address is obviously not the main thing we can do with that
    terminal, so let’s move on and install the required Java Development Kit now.'
  raw: '### Setting Up SSH Easily


    Usually when connecting via SSH , you disable password authentication, especially
    the default authentication of the Raspberry Pi, and set up a key from your local
    machine to connect to the remote machine and then set up that remote machine to
    accept only one key, or a limited number of them, so as to prevent random security
    attacks.


    This works like this:


    1.  Create your personal key pair to use with SSH. One private key stays on your
    computer, and one public key is added as a known entity on the remote machine.
    Until quantum computing comes in, that key pair is said to be secure, and it’s
    close to impossible to guess one’s private key by just knowing the public key.
    For more information on this, read Joshua Davies’ article at [`https://commandlinefanatic.com/cgi-bin/showarticle.cgi?article=art054`](https://commandlinefanatic.com/cgi-bin/showarticle.cgi%253Farticle%253Dart054).


    2.  Register the public key that got generated on the remote device, here the
    Raspberry Pi. Go ahead and give the public key to as many people as you want;
    by default, this is the file ending with the `.pub` extension.


    3.  Add some configuration for SSH to use that generated private key when connecting
    to the Raspberry through a shortcut. That private key, though, is yours, so make
    sure you don’t give it to anyone!


    On Amazon Web Services (AWS), you usually get a `.pem` file to connect through
    a new running instance. That `.pem` file is automatically registered for you on
    the new VM, so only you can access that newly created VM, thus allowing a secure
    access to your in-the-cloud machines.


    To create your key on your own local machine, you use `ssh-keygen` with the `-t`
    switch to specify the algorithm and the `-b` switch to specify the number of bits
    (nowadays, 4,096 is considered very secure).


    ```

    % ssh-keygen -t rsa -b 4096

    Generating public/private rsa key pair.

    Enter file in which to save the key (~/.ssh/id_rsa):

    ```


    Once the command has run successfully, two files are generated: an `id_rsa.pub`
    file and an `id_rsa` file. `pub` is your public key that you can give to anyone,
    and `id_rsa` is your private key and should be handled with the utmost care.


    To tell the Raspberry Pi about your public key and recognize you, you add it as
    a one-liner to the `/home/pi/.ssh/authorized_keys` file, creating the file and
    the `.ssh` parent folder if needed.


    Once this is done, on your computer, it’s time to add details of the SSH connection
    settings to the `$HOME/.ssh/config` file, again creating the file if you don’t
    have it.


    ```

    Host pi4

    User pi

    IdentityFile ~/.ssh/id_rsa

    HostName 192.168.1.17

    ForwardX11 yes

    ForwardX11Trusted yes

    ```


    Here is what the connection settings mean :


    *   `pi4` is the shortcut that we will use to connect to the Raspberry from now
    on.


    *   `User` is the default user on the Raspberry Pi and usually is `pi`.


    *   `IdentifyFile` is the path to the private key of your computer that will be
    used to authenticate you; this is the file you created a few moments ago.


    *   `HostName` is the IP address of the Raspberry. Use `nmap` again if you forgot
    it.


    *   `ForwardX11` and `ForwardX11Trusted` are required because we will redirect
    the video stream to the main computer in a few seconds.


    With all these settings, you may be wondering if this was all worth it. Let’s
    get a bit of instant gratification to prove that it was. Via an SSH connection,
    we will now open an application with a UI, for example the included Chromium browser.


    You can switch the display of the windows on the Raspberry screen by changing
    the setting of the `DISPLAY` variable .


    *   To display the Raspberry Pi screen, use `export DISPLAY=:0`.


    *   To display the local computer screen, use `export DISPLAY=:10`.


    Here’s the list of commands:


    ```

    ssh pi4

    export DISPLAY=:10

    chromium-browser

    ```


    Figure [3-16](#490964_1_En_3_Chapter.xhtml#Fig16) shows how Chromium is executing
    on the Pi but opening its window on the computer.


    ![../images/490964_1_En_3_Chapter/490964_1_En_3_Fig16_HTML.jpg](images/490964_1_En_3_Chapter/490964_1_En_3_Fig16_HTML.jpg)


