    ## Performing Object Detection


    *Object detection* is the concept of finding an object within a picture using
    different programming algorithms. It is a task that has long been done by human
    beings and that was quite hard for brain-less computers to do. But that has changed
    recently with advances in technology.


    In this section of this chapter, we’ll review different computer vision techniques
    to identify objects within an image, without any information about its content.
    Specifically, we’ll review the following:


    *   Using a simple contours-drawing filter

    *   Detecting objects by colors

    *   Using Haar classifiers

    *   Using template matching

    *   Using a neural network like Yolo


    The examples go in somewhat progressive order of difficulty, so it’s best to try
    them in the order of this list.


    ### Removing the Background


    Removing the background is a technique you can use to remove unnecessary artifacts
    from a scene. The objects you are trying to find are probably not static and are
    likely to be moving across the set of pictures or video streams. To remove artefacts
    efficiently the algorithm needs to be able to differentiate two `Mat` objects
    and use some kind of short-term memory to differentiate moving things (in the
    foreground) from standard scene objects in the background.


    In OpenCV, two easy-to-use `BackgroundSubtractor` classes are available for you
    to use. Their introduction and full explanation can be found on the following
    web site:


    ```

    https://docs.opencv.org/master/d1/dc5/tutorial_background_subtraction.html

    ```


    Basically, you give more and more frames to the background subtractor, which can
    then detect what is moving in the foreground and what is not.


    Listing [4-14](#490964_1_En_4_Chapter.xhtml#PC19) is pretty easy to follow; just
    be careful not to mistake the `apply` function from the `subtractor` class with
    the one we have in the `Filter` interface.


    ```

    class BackgroundSubtractor implements Filter {

    boolean useMOG2 = true;

    BackgroundSubtractor backSub;

    double learningRate = 1.0;

    boolean showMask = true;

    public BackgroundSubtractor() {

    if (useMOG2) {

    backSub = Video.createBackgroundSubtractorMOG2();

    } else {

    backSub = Video.createBackgroundSubtractorKNN();

    }

    }

    @Override

    public Mat apply(Mat in) {

    Mat mask = new Mat();

    backSub.apply(in, mask);

    Mat result = new Mat();

    if (showMask) {

    Imgproc.cvtColor(mask, result, Imgproc.COLOR_GRAY2RGB);

    return result;

    } else {

    in.copyTo(result, mask);

    return result;

    }

    }

    }

    Listing 4-14

    BackgroundSubtractor Class

    ```


    The filter is loaded by calling the constructor, and you should get a result similar
    to Figure [4-12](#490964_1_En_4_Chapter.xhtml#Fig12).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig12_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Removing the background


    Use KNN Background Subtractor


    Once you have this filter running, try switching to the KNN-based `BackgroundSubtractor`
    and see the difference in speed (looking at the frame rate) and the accuracy of
    the results.


    ### Detecting by Contours


    The second most basic OpenCV feature is to be able to find the contours in an
    image. The Contours filter uses the `findContours` function from the `Imgproc`
    class.


    `findContours` usually brings better results when you first do the following:


    *   Turn the input `Mat` object to gray

    *   Apply a Canny filter


    Those two steps are added in Listing [4-15](#490964_1_En_4_Chapter.xhtml#PC20);
    then we draw the contours on a black `Mat` object, created with the `zeros` function.


    ```

    class Contours implements Filter {

    private int threshold = 100;

    public Mat apply(Mat srcImage) {

    Mat cannyOutput = new Mat();

    Mat srcGray = new Mat();

    Imgproc.cvtColor(srcImage, srcGray, Imgproc.COLOR_BGR2GRAY);

    Imgproc.Canny(srcGray, cannyOutput, threshold, threshold * 2);

    List contours = new ArrayList();

    Mat hierarchy = new Mat();

    Imgproc.findContours(cannyOutput, contours, hierarchy, Imgproc.RETR_TREE, Imgproc.CHAIN_APPROX_SIMPLE);

    Mat drawing = Mat.zeros(cannyOutput.size(), CvType.CV_8UC3);

    for (int i = 0; i < contours.size(); i++) {

    Scalar color = new Scalar(256, 150, 0);

    Imgproc.drawContours(drawing, contours, i, color, 2, 8, hierarchy, 0, new Point());

    }

    return drawing;

    }

    }

    Listing 4-15

    Detecting Contours

    ```


    Use a Pipeline For Contours


    The careful reader will notice that since the previous code is using the `Pipeline`
    class, it would actually be nicer if it were written like this:


    ```

    Pipeline(new Canny(), new Gray(), new Contours())

    ```


    with a Contours filter that just extracts contours. Try it!


    Applying the Contours filter on a video of Marcel gives an artistic look (Figure
    [4-13](#490964_1_En_4_Chapter.xhtml#Fig13)).


    ![../images/490964_1_En_4_Chapter/490964_1_En_4_Fig13_HTML.jpg](images/490964_1_En_4_Chapter/490964_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Using OpenCV’s detecting contours feature


    Remove The First Canny Filter and Compare


    Here’s an exercise for you: try removing the two steps of converting to gray and
    applying the Canny filter and then compare the results to the original.'
