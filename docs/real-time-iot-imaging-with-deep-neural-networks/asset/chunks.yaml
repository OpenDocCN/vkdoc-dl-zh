- fmt: '# Back to Sepia


    At this stage, you know enough about `Mat` computation in OpenCV that we can go
    back to the sepia example presented a few pages earlier.


    In the sepia sample, we were creating a kernel, another `Mat` object, to use with
    the `Core.transform` function.


    `Core.transform` applies a transformation to the input image where:


    - The number of channels of each pixel in the output equals the number of rows
    of the kernel.

    - The number of columns in the kernel must be equal to the number of channels
    of the input, or +1.

    - The output value of each pixel is a matrix transformation, and the matrix transformation
    of every element of the array `src` stores the results in `dst`, where `dst[ I
    ] = m x src[ I ]`.


    See Table [2-2](#490964_1_En_2_Chapter.xhtml#Tab2) for examples of how this works.


    **Table 2-2** `Core.transform` Samples


    | Source | Kernel | Output | Computation |

    | --- | --- | --- | --- |

    | `[2 3]` | `[5]` | `[10 15]` | `10 = 2 × 5` `15 = 3 × 5` |

    | `[2 3]` | `[5 1]` | `[11 16]` | `11 = 2 × 5 + 1` `16 = 3 × 5 + 1` |

    | `[2 3]` | `[5 10]` | `[(10, 20) (15, 30)]` | `(10 = 2 × 5` `20 = 2 × 10)` `(15
    = 3 × 5` `30 = 3 × 10)` |

    | `[2]` | `[1 2; 3 4]` | `[(4 10)]` | `4 = 2 × 1 + 2` `10 = 3 × 2 + 4` |

    | `[2 3]` | `[1 2; 3 4]` | `[(4 10) (5 13)]` | `4 = 2 × 1 + 2` `10 = 2 × 3 + 4`
    `5 = 3 × 1 + 2` `13 = 3 × 3 + 4` |

    | `[2]` | `[1; 2; 3]` | `[(2 4 6)]` | `2 = 2 × 1` `4 = 2 × 2` `6 = 2 × 3` |

    | `[2]` | `[1 2; 3 4; 5 6]` | `[(4 10 16)]` | `4 = 2 × 2 + 1` `10 = 2 × 3 + 4`
    `16 = 2 × 5 + 6` |

    | `[(190 119 10)]` | `[0.5 0.2 0.3]` | `[122]` | `122 = 190 × 0.5 + 119 × 0.2
    + 10 × 0.3` |


    The OpenCV `Core.transform` function can be used in many situations and is also
    at the root of turning a color image into a sepia one.


    Let’s see whether Marcel can be turned into sepia. We apply a straightforward
    transform with a 3×3 kernel, where each value is computed as was just explained.


    The simplest and most famous sepia transform uses a kernel with the following
    values:


    ```

    [     0.272 0.534 0.131

    0.349 0.686 0.168

    0.393 0.769 0.189]

    ```


    So, for each resulting pixel, the value for blue is as follows:


    ```

    0.272 x Source Blue + 0.534 x Source Green + 0.131 x Source Red

    ```


    The target value for green is as follows:


    ```

    0.349 x Source Blue + 0.686 x Source Green + 0.168 x Source Red

    ```


    Finally, the value for red is as follows:


    ```

    0.393 x Source Blue + 0.769 x Source Green + 0.189 x Source Red

    ```


    As you can see, the values for red are largely pinned down, with each multiplier
    around 0.1, and green has the most impact on the pixel values for the resulting
    `Mat` objects.


    The input image of Marcel this time is shown in Figure [2-10](#490964_1_En_2_Chapter.xhtml#Fig10).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig10_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig10_HTML.jpg)


    **Figure 2-10** Marcel does not know he’s going to turn into sepia soon


    To turn Marcel into sepia, first we read a picture using `imread`, and then we
    apply the sepia kernel, as shown in Listing [2-7](#490964_1_En_2_Chapter.xhtml#PC21).


    ```

    Mat marcel = Imgcodecs.imread("marcel.jpg");

    Mat sepiaKernel = new Mat(3, 3, CvType.CV_32F);

    sepiaKernel.put(0, 0,

    // bgr -> blue

    0.272, 0.534, 0.131,

    // bgr -> green

    0.349, 0.686, 0.168,

    // bgr -> red

    0.393, 0.769, 0.189);

    Mat destination = new Mat();

    Core.transform(marcel, destination, sepiaKernel);

    Imgcodecs.imwrite("sepia.jpg", destination);

    ```


    **Listing 2-7** Sepia Marcel


    As you can see, the BGR output of each pixel is computed from the value of each
    channel of the same pixel in the input.


    After we run the code, Visual Studio Code outputs the picture in a file named
    `sepia.jpg`, as in Figure [2-11](#490964_1_En_2_Chapter.xhtml#Fig11).


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig11_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig11_HTML.jpg)


    **Figure 2-11** Marcel turned into sepia


    That was a bit of yellowish sepia. What if we need more red? Go ahead and try
    it.


    Increasing the red means increasing the values of the R channel, which is the
    third row of the kernel matrix.


    Upping the value of `kernel[3,3]` from 0.189 to 0.589 gives more power to the
    red in the input to the red in the output. So, with the following kernel, Marcel
    turns into something redder, as shown in Figure [2-12](#490964_1_En_2_Chapter.xhtml#Fig12):


    ![../images/490964_1_En_2_Chapter/490964_1_En_2_Fig12_HTML.jpg](images/490964_1_En_2_Chapter/490964_1_En_2_Fig12_HTML.jpg)


    **Figure 2-12** Red sepia version of Marcel


    ```

    // bgr -> blue

    0.272, 0.534, 0.131,

    // bgr -> green

    0.349, 0.686, 0.168,

    // bgr -> red

    0.393, 0.769, 0.589

    ```


    You can play around and try a few other values for the kernel so that the sepia
    turns greener or bluer…and of course try it with your own cat if you have one.
    But, can you beat the cuteness of Marcel?


    # Finding Marcel: Detecting Objects Primer


    Let’s talk about how to detect objects using Marcel the cat.


    ## Finding Cat Faces in Pictures Using a Classifier


    Before processing speeds got faster and neural networks were making the front
    pages of all the IT magazines and books, OpenCV implemented a way to use classifiers
    to detect objects within pictures.


    Classifiers are trained with only a few pictures, using a method that feeds the
    classifier with training pictures and the features you want the classifier to
    detect during the detection phase.


    The three main types of classifiers in OpenCV, named depending on the type of
    features they are extracting from the input images during the training phase,
    are as follows:


    - Haar features

    - Hog features

    - Local binary pattern (LBP) features


    The OpenCV documentation on cascade classifiers (`https://docs.opencv.org/4.1.1/db/d28/tutorial_cascade_classifier.html`)
    is full of extended details when you want to get some more background information.
    For now, the goal here is not to repeat this freely available documentation.'
