- "# 3. 深度伪造骗局\n\n当眼见不再为实，我们该相信什么？\n\n> *在这个假新闻时代，这段视频展示了……一项新人工智能技术的应用，它能像`Photoshop`处理数字图像一样处理音频和视频：允许对现实进行篡改。*\n\
  > \n> ——布鲁克·博雷尔，《科学美国人》\n\n上一章讨论的用于创建合成照片的深度学习生成对抗网络（`GANs`）也已应用于视频合成与编辑。如今可以制作出视频片段，让片中人物做出他们在现实生活中从未做过的事、说出从未说过的话。这给社会辨别真相带来了双重挑战：虚假视频在互联网上传播，使人们相信从未发生过的事件；同时，真实视频被诬称为深度伪造，导致人们怀疑现实本身。在本章中，你将看到深度伪造视频如何影响政治与新闻业，它们所引发的混乱与以往几代图像和视频篡改手段有何关联，以及法律和技术层面正在采取哪些措施来加以遏制。\n\
  \n## 敲响警钟\n\n2019 年 6 月 13 日，美国众议院就深度伪造问题举行了有史以来的首次听证会^(⁴⁷)。时任众议院情报委员会主席仅六个月的亚当·希夫在开场陈述中发出了坚定的警告：\n\
  \n> 人工智能和机器学习的进步催生了高级数字篡改媒体类型，即所谓的“深度伪造”，使恶意行为者能够煽动混乱、分裂或危机，并具备扰乱整个竞选活动（包括总统竞选）的能力。人工智能算法的快速进步使得篡改媒体（视频、图像、音频和文本）成为可能，且效果惊人、几乎难以察觉。只要有足够的训练数据，这些强大的深度伪造生成算法就能描绘出一个真实人物做出从未做过的事，或说出从未说过的话。这些工具易于获取，专家和新手都能使用，这意味着将深度伪造归因于特定作者——无论是敌对情报机构还是单个网络喷子——将始终是一个挑战。\n\
  \n在展示了几位专家制作的深度伪造视频示例以说明该技术后，希夫继续说道：“展望 2020 年及以后，无需任何想象力就能预见到更可怕的场景，这些场景将使政府、媒体和公众难以辨别真假。”\n\
  \n为了强调恶意篡改视频传播速度之惊人，希夫提到了一段视频，其中看似醉酒的众议院议长南希·佩洛西言语含糊——这段视频在短短两天内迅速传播，获得了数百万次观看。但希夫正确指出，这段被篡改的佩洛西视频并非深度伪造，而是有些人所称的“廉价伪造”或“浅层伪造”。其所用技术并非尖端人工智能，而是与电影本身一样古老：佩洛西的片段只是被放慢到大约\
  \ 75%的速度，以制造出醉态言语和动作的印象。\n\n如果人工智能驱动的深度伪造对社会和国家安全构成如此严重的威胁，为什么希夫没有提供它们在虚假信息宣传活动中实际使用的真实案例？它们是否曾在政治领域被使用过？我们如何检测并规范其使用？围绕深度伪造的反乌托邦恐惧是合理的，还是人工智能又一次制造了无法兑现的炒作？深度伪造视频到底是什么，它们又是如何制作的？这些是我将在本章探讨的问题。但首先，让我退一步，简要回顾一下政治领域篡改视觉媒体的历史；这有助于理解深度伪造所带来的当代威胁。\n\
  \n## 浅层伪造简史\n\n政治领域篡改视觉媒体的历史出奇地悠久。19 世纪 60 年代的一张版画将亚伯拉罕·林肯的头像移植到了狂热的奴隶制倡导者约翰·C·卡尔霍恩的身体上，据称是为了给瘦长的林肯增添更英勇的姿态；这一伪造直到\
  \ 20 世纪 50 年代末才被揭露。一张著名的内战照片显示尤利西斯·S·格兰特将军在弗吉尼亚州城市角骑马，实际上是三张独立照片的合成品；这一点直到 2007\
  \ 年才被发现。阿道夫·希特勒、菲德尔·卡斯特罗、毛泽东和约瑟夫·斯大林都曾篡改照片，以从照片中——进而也从历史书中——清除他们的敌人。\n\n约瑟夫·麦卡锡的手下分发了一张伪造的合成照片，将参议员米勒德·泰丁斯置于与美国共产党领袖厄尔·布劳德交谈的场景中，企图给泰丁斯贴上同情共产主义的标签；一些人认为这在他\
  \ 1950 年选举失败中起了关键作用。2004 年，在参议员约翰·克里竞选民主党总统候选人期间，一张伪造的合成照片浮出水面，显示他与简·方达一起出现在反越战示威活动中，甚至被《纽约时报》一篇关于克里早年反战活动的文章转载；当原始照片被出示时，一些右翼反对者谎称克里-方达的照片才是真实的，而原始独立照片是伪造品。图像具有强大的力量；篡改图像是篡改现实和历史的一种方法。\n\
  \n利用照片或视频制造虚假信息的一种常用手法就是简单地错误标注内容：声称某地发生的事件实际发生在别处，声称某一群人实际上是另一群人，等等。2018 年，特朗普反复对一群途经墨西哥前往美国的洪都拉斯移民进行恐吓之后，Facebook\
  \ 上出现了一篇病毒式传播的帖子，展示了一名墨西哥警察血迹斑斑的脸，配文是“墨西哥警察正遭到这支移民大篷车成员的野蛮对待，因为他们试图强行进入墨西哥。”这张照片与大篷车毫无关系——它是在欧洲新闻图片社网站上找到的，拍摄于\
  \ 2012 年的一次学生抗议活动。^(⁴⁸)\n\n2020 年 7 月，特朗普竞选广告中并排展示了两张照片——一张是特朗普与警方领导人会面的有序场景，配文“公共安全”；另一张是防暴警察似乎遭到一群抗议者暴力袭击的令人震惊的场景，配文“混乱与暴力”。广告没有明确说明第二张照片的拍摄时间和地点，但广告的发布时间强烈暗示它来自当时美国各地正在进行的“黑人的命也是命”抗议活动。然而，事实证明，这张照片来自\
  \ 2014 年乌克兰的一场亲民主抗议活动。^(⁴⁹) 在另一个例子中，^(⁵⁰) 一段某人被活活烧死的视频被科特迪瓦、南苏丹、肯尼亚和缅甸的不同群体虚假地声称是暴行的证据和采取行动的理由——在每一个案例中，这都导致了地区动荡和暴力。\n\
  \n\n\n"
- '# 浅伪造（Shallowfake）与深度伪造（Deepfake）的起源


  “浅伪造”一词没有官方定义，但本质上它指的是任何不需要人工智能、具有欺骗意图的直接视频编辑形式。南希·佩洛西（Nancy Pelosi）的慢速视频就是其中一个例子。通常，浅伪造视频中的人物确实是其所声称的人，但视频通过非常原始的手段被修改，以误导性地描绘这些人物，使其显得负面。2018
  年 7 月，保守派评论（Conservative Review）的一位电视主持人在 Facebook 上发布了一段对当时民主党国会候选人亚历山德里娅·奥卡西奥-科尔特斯（Alexandria
  Ocasio-Cortez）的采访视频，视频中奥卡西奥-科尔特斯似乎对所有采访者的问题都给出了令人尴尬的糟糕回答。该视频在一周内获得了近 350 万次观看，然而这只是一个简单的拼接剪辑：奥卡西奥-科尔特斯的片段是真实镜头，只是它们并非她对采访者问题的回答——那些问题是单独录制的，然后被策略性地拼接在各个奥卡西奥-科尔特斯片段之间。^(⁵¹)
  采访者后来为这一假新闻行为辩护，称其为讽刺；浏览视频下方的评论可以清楚地看到，许多观众并未意识到这一点。


  有时，浅伪造编辑可能相当微妙且模棱两可。2018 年 11 月，一段视频片段在网上疯传，显示在特朗普的一次新闻发布会上，CNN 记者吉姆·阿科斯塔（Jim Acosta）与一名白宫女助手发生冲突。片段显示，该女助手伸手去拿阿科斯塔右手握着的麦克风，当她靠近时，阿科斯塔的左臂用力推开了女助手伸出的手臂，这看起来是一种明显的身体攻击行为。（顺便提一下，这次冲突的背景是，阿科斯塔质疑总统将穿越墨西哥的移民大篷车——即前几段提到的那个——描述为“入侵”，在几句口头交锋后，特朗普愤怒地回应“够了”，以此示意白宫女助手重新控制麦克风。）这段视频最初由保罗·约瑟夫·沃森（Paul
  Joseph Watson）在推特上发布，他是《信息战争》（*InfoWars*）（一个阴谋论频道，我将在下一章关于 YouTube 的内容中再次提到）的编辑。随后，白宫新闻秘书萨拉·赫卡比·桑德斯（Sarah
  Huckabee Sanders）转发了该视频，将其作为阿科斯塔“对一名只想做好本职工作的年轻女子动手”的证据，这为视频增添了一种合法性和官方性的光环。不仅如此，桑德斯还以此视频为由，暂时吊销了阿科斯塔的白宫记者证。


  这段阿科斯塔视频的“浅伪造”之处在哪里？一些观察者认为，在阿科斯塔的手臂伸向女助手伸出的手臂的那一刻，视频似乎被稍微加速了，将一个突然但不一定具有攻击性的动作变成了更像是一记轻微的手刀。其他观众指出，视频可能并没有被加速，但在关键时刻放大时，似乎切换到了低帧率的动画
  GIF 格式——而低帧率使得阿科斯塔的手臂动作看起来比原始未编辑视频中更突然、更有力。沃森是明知故犯地使用动画 GIF 格式来达到这种误导效果，还是这只是一个无意的副产品？动画
  GIF 是社交媒体上流行的视频格式，但在需要高质量细节时，它们通常不是首选格式。CNN 高管表示该视频是“真正的假新闻”，而沃森则否认对视频进行了篡改或编辑，除了放大之外。


  《BuzzFeed 新闻》提供了^(⁵²) 对阿科斯塔视频的深入分析，发现视频并未被加速，但在放大时确实切换到了降低的帧率。沃森解释说，他自己并没有进行 GIF
  转换：“事实是，Daily Wire 上传了一个 GIF，我下载了那个 GIF，放大了它，然后将其保存为`mt2`文件——接着转换成了`mp4`。经过处理和放大后，数字上看起来会有一点点不同，但我绝对没有故意‘加速’或‘扭曲’视频。那完全是胡说八道。”这是一个特别令人困惑的情况。从很多方面来看，每个相关方都是正确且诚实的，只是很难知道该如何理解这一切。在这种微妙的情况下，更大的背景可以成为在真相与谎言、真实视频与浅伪造之间狭窄通道中导航的有用指南针。用《BuzzFeed
  新闻》分析的话来说：“总结一下：一个历史上不可靠的叙述者，为一个阴谋网站工作，发布了一段视频……该片段迅速走红。白宫采纳并传播了那段视频……一场关于篡改视频的复杂技术细节的争论爆发了。”这就是我们所生活的令人困惑的世界——而且，你很快就会看到，当深度伪造登场时，情况只会变得更糟。


  书中最古老的把戏之一就是断章取义地引用某人的话，不出所料，这种简单技巧也出现在视频编辑中，或许可以将其视为浅伪造的另一种形式。在 2020 年总统大选前夕，马乔丽·泰勒·格林（Marjorie
  Taylor Greene）——当时以即将上任的美国众议员而臭名昭著，其竞选活动主要基于古怪的 QAnon 阴谋论——在推特上发布了一段视频片段^(⁵³)，并配文如下：“乔·拜登在视频中说，民主党人建立了历史上最大的‘选民欺诈’行动。我们现在正亲眼目睹这一切！”该片段源自一位共和党全国委员会官员，并很快被埃里克·特朗普（Eric
  Trump）和白宫新闻秘书等人转发。在片段中，拜登确实谈到了组建“美国政治史上最广泛、最包容的选民欺诈组织”。然而，从原始完整背景中可以清楚地看出，他指的是一个*防止*选民欺诈的组织，但这段病毒式传播的片段当然故意使其看起来相反。


  现在，舞台已经为我们熟悉的主角——人工智能——的登场做好了准备。


  ### 深度伪造的起源


  “深度伪造”一词源自 Reddit 上一位匿名用户，他使用了用户名“deepfakes”，这是“深度学习”（deep learning）和“伪造”（fake）的合成词。2017
  年底，他^(⁵⁴) 应用了当时可用的深度学习算法，将以色列女演员盖尔·加朵（Gal Gadot）（她凭借 2017 年夏季大片《神奇女侠》*Wonder Woman*
  刚刚获得国际声誉）的面容换到了一部色情视频中女演员的身体上，并将这一未经同意的结果发布到了 Reddit。这一事件标志着人工智能历史上一个黑暗篇章的不祥开端，这一篇章至今仍在继续展开。不幸的是，他的帖子非常受欢迎，他很快又发布了几位其他名人的类似内容。




  ### 一些技术细节


  在 2017 年 12 月接受《Vice》杂志的一次采访中^(⁵⁵)，Reddit 用户“deepfakes”表示，他并非专业研究人员，只是一名对机器学习感兴趣的计算机程序员。他解释说，他用来制作这些视频的软件基于多个开源库（包括使用`TensorFlow`后端的`Keras`，懂的人自然明白这意味着什么——不懂也没关系，这不重要，关键在于这些都是深度学习社区广泛使用的公开资源）。他利用谷歌图片搜索、图库照片和
  YouTube 视频来收集算法所需的训练数据。


  如今，由深度学习驱动的视频编辑程序种类繁多（稍后你将接触到其中一些），因此“deepfake”一词不再仅指最初 Reddit 帖子中使用的那种换脸技术。而且，有许多不同的深度学习架构已被成功应用——即使是针对换脸这一单一任务也是如此。为了避免用所有这些技术细节淹没你，我在此仅解释一种特定换脸深度伪造方法背后的主要思路，以便让你了解上一章机器学习速成课中的概念是如何在此应用的；那些异常好奇且雄心勃勃、想了解更多信息的读者可以查阅一篇近期的学术综述论文^(⁵⁶)，但阅读本书完全无需如此。为了具体说明，假设我们的目标是将尼古拉斯·凯奇的脸换到《神奇女侠》中盖尔·加朵的身体上。


  第一步是在电影的每一帧中定位包含加朵脸部的区域。这是机器学习中的一项标准任务（当你在 Facebook 上发布照片，照片中每张脸周围会自动画出一个方框时，你就见识过它的实际应用）。这可以通过监督学习来实现：向算法输入大量照片，这些照片中每张脸周围都已手动绘制了方框，算法最终将学会如何自行绘制这些方框。更精确地说，这是一个双回归问题：两个目标变量是面部边界框的左上角和右下角坐标。对于换脸的目的，可以直接下载一个预训练的通用面部定位算法——这里无需针对凯奇或加朵进行任何特定训练。


  接下来，使用一种名为*自编码器*的简单但强大且流行的深度学习架构。通常，自编码器具有多个神经网络层，这些层首先逐渐变窄（构成自编码器的*编码器*部分），然后逐渐变宽回原始尺寸（后半部分是*解码器*）。它通过自我监督任务进行训练，即每次返回与输入完全相同的数据点。这乍听起来很奇怪，但实际上，通过将所有数据传递到自编码器狭窄的中间区域，算法被迫压缩数据——由于深度学习的魔力，算法不仅能自行找到最佳压缩方式，而且是通过内部学习到的数据概念化来实现的。


  更简单地说，自编码器被展示大量数据，并被告知必须找到一种像压缩文件一样压缩数据的方法，而它意识到最好的方法是先理解数据的含义。在处理面部图像时，自编码器会学习描述一张脸所需的一切，并用尽可能少的数字来表示——例如，它可能首先记录眼睛、嘴巴、鼻子等的位置，并以某种方式量化所有这些面部特征的形状，还可能找到一种用数字表示不同发型和颜色的方法，等等。我们无需知道它是如何工作的；只需运行它，看到它确实有效即可。自编码器的编码器部分负责将一张脸转换成这一组概括脸部的数字，然后解码器部分看到这些数字，并尝试从中重建这张脸。


  回到我们的换脸任务。这实际上使用了两个相互关联的自编码器。我们使用凯奇的照片训练一个自编码器来压缩并重建他的脸，同样地，我们使用加朵的照片训练一个针对她脸部的自编码器——但我们将这两个自编码器部分合并，让它们使用同一个编码器（这样只有解码器是针对每个人定制的）。结果是，一组概括脸部的数字现在可以被解码成凯奇的脸或加朵的脸。然后，对于电影中的每一帧，我们执行以下操作：首先定位加朵的脸，然后用我们训练好的编码器将其编码为一组数字，最后用我们的凯奇解码器进行解码。


  为了具体说明，假设自编码器发现的一个数字衡量的是嘴唇微笑的程度。当加朵大笑时，这个数字会很大——由于我们对加朵和凯奇使用相同的编码器，我们知道凯奇解码器会将这个大的数字解释为凯奇在大笑。这同时发生在他们脸部所有关键特征上：眼睛看的方向、嘴巴是否张开以及张开的程度和形状等。通过这种方式，粘贴上去的凯奇的脸将在每一帧中与加朵原始的表情紧密匹配。


  剩下的工作就是平滑凯奇脸部粘贴处的边缘，但这属于标准图像处理，因此我们可以直接使用现成的通用软件来完成。然而，如果你还记得，我在本章开头提到，上一章用于合成深度伪造照片的
  GAN 架构也用于像换脸这样的深度伪造电影编辑——但到目前为止我所描述的内容中并没有 GAN！确实，有些换脸算法不使用 GAN，但许多最成功的算法确实使用了。一种流行的整合方式如下：将上述过程视为
  GAN 中的生成器，然后向 GAN 的判别器输入混合视频——一部分是凯奇的脸被换到加朵身上的视频，另一部分是凯奇未经编辑的原始视频——并让它尝试分辨哪个是哪个。这将有助于教会换脸算法中的自编码器部分如何更好地完成其工作，因为它提供了一个明确的追求目标：生成尽可能逼真的换脸效果。




  #### 不同类型的深度伪造


  绝大多数深度伪造并未偏离其在 Reddit 上首次出现的猥亵形象：2019 年的一份报告^(⁵⁷)发现，互联网上 96% 的深度伪造都是未经同意的换脸色情内容，其中大部分使用了女明星的面孔。截至报告发布时，这些视频的累计观看量已超过一亿次。这些色情换脸视频之所以使用名人，部分原因在于观众的偏好，但也因为互联网上存在大量现成的名人影像素材，为深度学习算法提供了充足的训练数据。然而，重要的是，随着技术的持续发展，达到相同逼真度所需的训练数据量正在不断减少。


  一份较新的报告^(⁵⁸)发现，互联网上的深度伪造数量呈指数级增长，大约每六个月翻一番。发布这些报告的组织 DeepTrace Labs 截至 2020 年 6
  月已识别出近五万个深度伪造视频。在这些深度伪造视频的目标对象中，88.9% 来自娱乐行业，其中 21.7% 来自时尚界，4.4% 来自体育界。只有 4.1% 的目标来自商界，4%
  来自政界，但后两者的占比相比前几年均有所上升。


  目前已有多种用于制作深度伪造的公共软件工具，包括 `FakeApp`、`DFaker`、`faceswap`、`faceswap-GAN` 和 `DeepFaceLab`。虽然这些工具可以免费获取，但使用它们仍需投入大量时间、计算资源和用户技能。然而，相关方法的改进速度极快，随之而来的是制作令人信服的深度伪造所需的资源和技能正在迅速减少。话虽如此，很难想象制作深度伪造有一天会变得像制作浅度伪造——或者仅仅是欺骗性地修改字幕——那样快速和简单。


  为了提高公众对深度伪造及其在政治领域可能造成严重破坏的认识，2018 年 *BuzzFeed News* 与演员/编剧/导演乔丹·皮尔合作，制作了一个相当精致、引人注目且震撼人心的深度伪造视频^(⁵⁹)。视频中，巴拉克·奥巴马说道，其中包括：“我们正在进入一个时代，我们的敌人可以借此让任何人看起来在任何时间点说任何话——即使他们永远不会说那些话。所以，举例来说，他们可以让我说一些话，比如，我不知道，[...]
  特朗普总统是个彻头彻尾的蠢货。” 这个视频一经发布便引起了巨大轰动——并成功地将深度伪造的认知带给了更广泛的公众群体。


  这个奥巴马视频是一种被称为*重演*的深度伪造类型。你可以将其视为一种提线木偶戏，其中奥巴马是木偶，而皮尔是操纵者。皮尔被录像朗读脚本，然后他的嘴部被笨拙地粘贴到奥巴马的嘴上，接着，一个经过奥巴马演讲视频训练的深度学习算法被用来将这个简单的复制粘贴升级为皮尔的嘴部与奥巴马面部其余部分的无缝融合——从而根据皮尔的口部动作让奥巴马的整个面部活动起来。许多重演算法都使用
  GAN。简而言之，生成器对简单的复制粘贴视频进行融合，而判别器则将结果与真实演讲片段进行比较；通过这种方式，生成器学会了如何使其输出看起来像真实的演讲。除了视觉编辑，*BuzzFeed*
  团队还使用深度学习将皮尔的声音转化为令人信服的奥巴马声音模仿。^(⁶⁰) 这个项目大约花费了五十六小时的计算时间，并由一位视频特效专业人士监督。所使用的深度伪造视频应用是
  `FakeApp`。


  另一款在中国极为流行的换脸深度伪造应用是 `Zao`。仅需用户的一张照片，它就能将用户的脸部放入大型电视节目和电影中。虽然效果远非完美，但只需几秒钟就能在智能手机上完成。三星还开发了软件^(⁶¹)，用于从单张照片创建深度伪造视频——但类型与
  `Zao` 不同：三星预先用海量视频训练了一个深度学习算法，以学习人脸的自然运动方式；然后，这种通用知识被应用于用户提供的照片，根据用户同时提供给程序的数字操纵者视频，以逼真的方式让照片动起来。与使用特定于木偶的训练素材的深度伪造方法相比，这些三星视频往往保留更多操纵者的特征。


  学术界和 Adobe 的研究人员合作开发了一款由深度学习驱动的软件^(⁶²)，可以“让用户编辑视频的文字转录稿，从而添加、删除或改变某人直接说出的词语”。（你以为
  Adobe 的 Photoshop 已经够令人印象深刻了。）他们的系统首先识别视频中的*音素*（口语语音的基本单位），然后将其与相应的*视位*（面部表情和嘴部运动）进行匹配。该软件还会从视频中学习目标对象下半部分脸部的三维模型。当用户编辑转录稿的文字时，软件会在
  3D 模型中替换每个音素和对应的视位，然后利用这些信息修改原始视频。该系统目前仅适用于“说话头像”类型的视频，并且需要四十分钟的输入数据，当编辑后的文本与原始转录稿差异不大时，效果会更好。尽管如此，对于创建另一种类型的深度伪造来说，这仍是一种有趣的方法。


  你现在已经了解到，有许多不同类型的视频编辑流程都属于深度伪造这个总称——并且对于每种类型，都有多种应用和深度学习架构被使用，其中大多数涉及自编码器和 GAN。你已经看到深度伪造被用于娱乐（色情及其他方面），以及展示当前技术的可能性。你也已经看到浅度伪造和其他简单的视觉欺骗形式有着悠久的历史，并且至今仍在政治领域制造混乱。此时你可能会想，深度伪造是否也像浅度伪造一样，在现实世界中被用来操纵公众对政治事件的解读，甚至可能影响民主选举的结果。我希望你确实在思考这个问题，因为这是我接下来要讨论的话题。




  ## 政治领域中的深度伪造


  2018 年 5 月，比利时的一个社会民主党在推特和脸书上发布了一段一分钟的深度伪造视频，内容是特朗普总统用英语讲话并配有荷兰语字幕。^(⁶³) 无论是声音模仿还是深度伪造的视觉效果都相当粗糙，而讲话内容本身也明显表明这是对特朗普的讽刺性模仿（更像是《周六夜现场》的小品，而非精妙的骗局）。视频开头，特朗普宣称：“亲爱的比利时人民，这可不是小事。如你们所知，我有胆量退出《巴黎气候协定》，你们也应该这么做。”在片段接近尾声时，音频突然几乎静音，微弱的声音继续说道：“我们都知道气候变化是假的，就像这个视频一样。”除了这段偷偷承认的音频几乎听不清之外，这些话也是片段中唯一没有荷兰语字幕的部分。这个视频显然是个玩笑，但它被制作出来，确实有可能骗过粗心的观众。根据社交媒体上的评论——该视频在一天内达到了两万次观看——相当多的观众确实被愚弄，以为这是特朗普的真实片段。


  许多——但并非全部，你很快就会看到——出现在政治语境中的深度伪造，就像这个比利时的例子一样，更多是为了娱乐而非欺骗。2020 年 10 月，就在总统大选前一周，热门电视动画片《南方公园》的创作者在
  YouTube 上发布了一部完全基于深度伪造技术的网络剧集。^(⁶⁴) 剧中的主角是深度伪造版唐纳德·特朗普，而深度伪造版马克·扎克伯格则反复客串。首集贯穿始终的笑点是，所有看似真实的镜头实际上都是深度伪造，而剧中那些据称是深度伪造的片段，要么是滑稽的木偶，要么是真实的真人。


  2020 年，英国广播公司播出了伊丽莎白女王的圣诞致辞，与此同时，英国公共广播公司第四频道则播出了一段由深度伪造版女王发表的讽刺性致辞。^(⁶⁵) 如果她对王室的尖刻笑话还不足以让人明白这不是真正的女王，那么糟糕的声音模仿以及她突然跳起的、年轻得令人难以置信的舞蹈动作，肯定足以澄清事实。然而，有时幽默与政治之间的界限会变得更加模糊。2020
  年 4 月 26 日，在妻子 50 岁生日那天，特朗普总统在推特上发布了一段乔·拜登伸出舌头的低质量深度伪造视频，并配文如下：“‘邋遢乔’正在成为热门话题。我怀疑是不是因为这个。你能看出这是深度伪造，因为吉尔·拜登没有替他打掩护。”^(⁶⁶)
  当然，这并非意在直接欺骗，但看到一位以长期与真相有隙而闻名的总统，在社交媒体上公开分享一段针对其对手的、品味低下的深度伪造视频，并以此对他进行幼稚的挖苦，这仍然是社会上一个令人不安的时刻。


  2020 年 9 月 20 日，原计划有两则广告在华盛顿特区的福克斯、CNN 和 MSNBC 播出，一则 featuring 深度伪造的弗拉基米尔·普京，另一则
  featuring 深度伪造的金正恩。^(⁶⁷) 两者传达的信息相同：美国不需要外部干预选举，因为它自己就能毁掉自己的民主。这些广告由一个投票权组织赞助，旨在提高人们对美国民主脆弱性的认识，以及美国人需要积极、安全地参与选举过程。这里使用深度伪造并非为了欺骗，只是为了吸引观众的注意力，让人们震惊地认识到
  2020 年总统大选即将在充满技术陷阱的环境中进行。这些深度伪造视频是使用开源 `DeepFaceLab` 软件进行换脸制作的。两则广告的结尾都包含以下免责声明：“画面并非真实，但威胁是真实的。”在最后一刻，电视台全部撤下了这些广告，并未立即解释这一决定。人们当然可以想象到，对于涉足这些微妙的深度伪造领域，自然会有所犹豫。最终，这些广告只在社交媒体上出现。


  可以说，深度伪造技术首次被直接用于政治选举发生在 2020 年 2 月的印度。在德里立法议会选举前一天，印度人民党领袖马诺杰·蒂瓦里的两段 44 秒视频被分发到近
  6000 个 WhatsApp 群组，覆盖了大约 1500 万人。在两段视频中，蒂瓦里都批评了竞争对手、现任政治领袖。在一段视频中，他用英语讲话，而在另一段视频中，他讲的是名为哈里扬维语的印地语方言。从某种意义上说，这两段视频都是深度伪造。蒂瓦里首先用他的母语印地语录制了视频。然后，与一家名为“创意工厂”的政治传播公司合作，一名模仿者录制了英语和哈里扬维语版本的演讲音频。最后，使用一种基于蒂瓦里其他讲话视频训练而成的“唇形同步”式深度伪造再现技术，使他的嘴唇动作与新的音频相匹配。


  尽管使用了深度伪造技术，但这些蒂瓦里的视频并非特别恶意——它们只是政治竞选活动中用来接触更广泛、语言更多样化受众的工具。用印度人民党一位媒体和 IT 负责人的话说：“深度伪造技术帮助我们以前所未有的规模扩大了竞选活动。即使候选人不会说选民的语言，哈里扬维语视频也让我们能够令人信服地接触目标受众。”但是，亲眼看到某人说着他们实际上不会说的语言，这种不诚实性质让一些人感到反感，并产生了一种政治不诚实的感觉。正如《Vice》报道的那样，^(⁶⁸)
  蒂瓦里的哈里扬维语视频“被广泛用于劝阻德里大量讲哈里扬维语的移民工人群体不要投票给 rival 政党。”老实说，很难知道该如何看待这个政治深度伪造的案例。像大多数强大的工具一样，深度伪造技术既有好的应用，也有坏的应用，以及介于两者之间的各种应用——而所有应用范围的出现还需要一些时间。由于本书是关于假新闻的，我将主要关注那些邪恶的、欺骗性的用途，但在本章的后面，我将给出一个纯粹积极、合法的政治用途案例。




  印度也是两年前一起更明确令人反感的深度伪造事件的现场——尽管该事件与选举没有直接关系，但它仍然具有强烈的政治暗流和影响。`Rana Ayyub`当时是一位 36
  岁的印度女性，一名调查记者，也是一名虔诚的穆斯林。她表示^(⁶⁹)自己常被视为反建制派，并被称为“印度被辱骂最多的女性”。她解释说，她在`Twitter`上发布的任何内容都会引来数千条回复，其中大部分充满仇恨和威胁。她试图忽略这些网络喷子，继续从事自己的工作，并告诉自己网络上的仇恨和威胁“永远不会转化为现实中的虐待”。但在
  2018 年 4 月，情况发生了变化。


  一名 8 岁的克什米尔女孩遭到强奸，引发了全国范围的广泛愤怒。`BJP`（是的，就是上文刚刚讨论过的那个政党）是当时的执政党，其回应是组织了一场支持被指控犯下这一令人发指行为的嫌犯的保守派游行。`Ayyub`受邀在`BBC`和`Al
  Jazeera`上发表评论，谈论“印度如何因包庇儿童性侵犯而自取其辱”。不久之后，`BJP`中的一位男性联系人给`Ayyub`发了一条不祥的消息：“`WhatsApp`上有些东西在流传，我发给你，但你得保证不会难过。”她随后看到的是一部色情电影，而她似乎是其中的主角。这段视频是一个换脸深度伪造。用`Ayyub`自己的话说：“当我第一次打开它时，我很震惊地看到自己的脸，但我能看出那不是我，因为，首先，我是卷发，而那个女人的头发是直的。……我开始呕吐。”


  这段视频最初在`WhatsApp`上的私人政治频道中流传，但随后`BJP`领导人的粉丝页面公开了它，并迅速获得了超过四万次分享。`Ayyub`表示，她开始收到陌生人的`WhatsApp`消息，询问她是否提供性服务。她对这种情况的焦虑变得非常严重，以至于她因呕吐和心悸去了医院：“整个国家都在观看一部声称是我的色情视频。”`Ayyub`说，具有讽刺意味的是，就在这件事发生前一周，她的一位编辑提到了深度伪造在印度的潜在危险——她当时不知道那是什么，于是用谷歌搜索了一下，但决定不做相关报道，因为她不想引起更多关注，以免激发恶意使用。“然后一周后，它就发生在我身上了。……这是一个非常非常危险的工具，我不知道我们会走向何方。”令人心碎且警醒。我不知道还能说什么。而世界顶尖的数字取证专家之一`Hany
  Farid`表示^(⁷⁰)，来自世界各地发展中国家的少数政客曾请他帮忙揭穿那些显示他们处于性爱尴尬场景的视频。


  下一个影响现实世界政治的深度伪造案例是一个真正离奇的故事。^(⁷¹)非洲国家加蓬的总统`Ali Bongo`于 2018 年 10 月因未公开的疾病在沙特阿拉伯首都利雅得住院。12
  月，副总统宣布`Bongo`在当年秋天早些时候中风，但情况良好，正在摩洛哥首都拉巴特康复。尽管有这种含糊的保证，但在两个多月的时间里，除了政府发布的一些照片和一段无声视频外，几乎没有`Bongo`的任何迹象。猜测开始蔓延，认为官员们在撒谎，`Bongo`要么已经去世，要么至少是丧失了行动能力，情况比公开承认的要糟糕得多。这个国家自
  2009 年以来一直由`Ali Bongo`统治，在此之前，他的父亲`Omar Bongo`统治了 42 年。大多数人在加蓬几乎不记得有哪个时期国家元首不姓`Bongo`。对于`Ali`为何离开国家两个多月且基本上完全消失在公众视野中，官方解释几乎得不到信任。


  最后，为了平息日益增长的怀疑，总统的顾问们表示，他将发表惯例的新年致辞。果然，在 2019 年 1 月 1 日，政府在社交媒体上发布了一段总统`Ali Bongo`发表演讲的视频。但视频有些地方似乎不对劲。一些观众通过视频对总统的健康状况感到放心，但另一些人则认为这可能是他的替身。还有许多观众觉得视频的怪异源于其他原因，但他们又说不清楚具体是什么。


  随后，曾在过去两次选举中与`Bongo`竞争的加蓬著名政治家`Bruno Ben Moubamba`声称这段视频是深度伪造——他的理论迅速获得了大量追随者。`Moubamba`指出，在视频中，`Bongo`的脸和眼睛似乎“几乎悬浮在他的下巴上方”，并且他的眼睛移动“与下巴的运动完全不同步”。`Moubamba`解释说：“由不同面孔的多个元素组合成一个，正是构成深度伪造的特定元素。”其他总统的批评者和活动人士在`Twitter`上指出了更多可能表明是深度伪造的细节。例如，他们注意到`Bongo`在两分钟的视频中只眨了
  13 次眼，不到正常数量的一半，而且他的说话模式似乎也与平时不同。


  人们不知道该相信什么；这段视频引发的问题比它回答的还要多。`Bongo`的批评者指出，政府可能试图掩盖`Bongo`死亡或健康不佳，有一个非常真实且具体的原因：宪法规定，如果加蓬总统被认定无法胜任领导职务，那么参议院议长将担任临时总统，并在
  60 天内举行特别选举。批评者认为，加蓬执政党正在欺骗公众，以避免这次特别选举，或许是为了争取时间，直到能为继任者巩固支持——毕竟，这位继任者将是半个多世纪以来该国第一位不来自`Bongo`家族的总统。




  ## 排版后的文本


  在神秘的新年视频发布一周后，加蓬军方发动了一场政变——这是该国自 1964 年以来的首次——并明确引用该视频的异常之处，作为总统缺席且政府对此撒谎的证据。政变最终失败，政府仍掌控局势。时至今日，数字取证专家仍不确定该视频是否为深度伪造，尽管他们普遍倾向于这一结论。但他们指出的许多迹象也可能是邦戈中风所致。我们唯一确定的是，2019
  年 8 月，邦戈在中风后首次公开露面——而深度伪造技术及其给视频真实性投下的怀疑阴影，险些导致一国政府被军方推翻。


  惊人的相似之处在于，仅仅一年后，美国也发生了一件更短暂却诡异类似的事件。2020 年 10 月 2 日，星期五，是近期记忆中最奇怪、最令人困惑的日子之一（对 2020
  年而言，这已非同寻常）。当天早上有消息称，特朗普总统的新冠病毒检测结果呈阳性，几小时内我们得知他不仅阳性，而且出现了症状——随后，他的病情实际上相当严重，即将住院。当天所有事件都笼罩在不确定性和混乱的迷雾中，这很大程度上源于政府缺乏坦诚透明的沟通。当时距离美国历史上最重要的选举之一仅剩几周，我们却不知道总统的真实健康状况，人们迅速怀疑情况比官员们告诉我们的要糟糕得多。


  随后，当天下午 6 点 31 分，特朗普总统在推特上发布了一段 18 秒的视频讲话，称他正前往沃尔特·里德医院，但他安抚民众，认为自己情况良好。视频看起来很奇怪，非常奇怪。社交媒体上立即有人讨论这是深度伪造。^(⁷²)
  这一次，深度伪造的阴谋论很快消散，因为随后出现了更多特朗普的镜头，最令人信服的是几天后他出院时发表的现场讲话。但在那短暂的一刻，确实很难知道发生了什么、该相信什么；美国政府在大选前一个月制作深度伪造来掩盖总统健康状况的糟糕局面，似乎并非完全不可信。


  2021 年 3 月，缅甸一家军方运营的电视台播放了一段被拘留的前地区首席部长公开认罪的视频。他说自己向昂山素季行贿——这位诺贝尔和平奖得主在 2010 年代曾为缅甸从军政府统治向部分民主过渡发挥关键作用，但随后于
  2021 年 2 月 1 日与执政党其他成员一同被军方逮捕并罢黜。换句话说，军方正在出示所需的定罪证据，以证明其行动的正当性。但立即有人抗议称这份认罪是伪造的——声音听起来不像他平时的声音，画面也很奇怪——许多人怀疑这是深度伪造，但同样，我们无法确定。^(⁷³)


  现在让我转向政治背景下深度伪造的最后一个现实案例——这次展示的是该技术的积极用途。2020 年 7 月，奥斯卡提名活动家电影人大卫·弗朗斯在 HBO 首映了一部名为《欢迎来到车臣》的纪录片，讲述车臣发生的反
  LGBTQ 清洗事件。他希望对暴行幸存者进行采访，但他知道为了他们的人身安全，必须在影片中隐藏其身份——当时，他们正在祖国被追捕，并通过安全屋网络逃离该地区。他认为通常的纪录片技术——模糊面部——会导致讲述者与观众之间产生过多的情感隔阂，因此他转而使用了深度伪造技术。制作团队在车臣境外拍摄了与该国清洗事件无关的个人，在配备多角度面部捕捉摄像头的摄影棚中录制；随后使用深度学习算法将这些面孔融合到影片中
  23 名车臣人的脸上，为他们提供新的伪装面孔——从而获得匿名性。据《纽约时报》报道^(⁷⁴)，“在影片最令人震撼的时刻之一，当同性恋难民马克西姆·拉普诺夫在新闻发布会上恢复自己的姓名——以及真实面孔——时，特效效果消失了。‘我想让你感受他那一刻的感受，’弗朗斯说。”


  尽管令人信服的深度伪造在现实世界中似乎仍属罕见，但其使用频率和质量都在迅速提升。2021 年 3 月 10 日，美国联邦调查局发布官方警报^(⁷⁵)，大胆指出“恶意行为者几乎肯定会在未来
  12 至 18 个月内利用合成内容进行网络和外国影响力行动”，并明确说明深度伪造是其在此所指的合成内容的主要形式。如果我们开发出判定视频是否为深度伪造的工具，就能反击这些恶意行为，并在下次出现类似阿里·邦戈新年致辞、唐纳德·特朗普沃尔特·里德视频或缅甸认罪事件时应用这些工具。现在是时候审视开发此类工具的进展与挑战了。




  ## 检测深度伪造


  如果人工智能有能力制造深度伪造，难道它不应该也能检测它们吗？答案是既对也不对。一个广泛的挑战在于，深度伪造视频篡改的类型多种多样——你在本章中已经看到了一些，而且可以肯定每年都会有更多新类型出现——因此，试图判断视频是否为深度伪造的算法不能只寻找某一种特定的篡改类型。在技术层面也存在重大挑战。回想一下，大多数深度伪造生成算法都依赖于生成对抗网络（GAN）架构，其中生成器学习如何合成深度伪造，而判别器学习如何区分真实视频片段与合成视频片段。任何用于检测深度伪造的人工智能系统本质上都将扮演那个判别器的角色——但
  GAN 的关键点在于，通过训练过程，生成器学会了如何欺骗判别器。换句话说，深度伪造的构建过程本身就使得算法难以检测它们。


  另一个挑战——这可能是最大的一个——是深度伪造检测是一场军备竞赛：随着深度伪造检测技术的进步，深度伪造制造者规避检测的能力也会同步提升。例如，在深度伪造的早期（也就是几年前），一些研究人员注意到人们在深度伪造视频中眨眼的频率低于现实生活，并以此作为检测算法的基础^(⁷⁶)，但没过多久，深度伪造生成算法就克服了这一弱点，使这种特定的检测算法变得过时。另一种相关但更新的方法^(⁷⁷)目前看起来很有前景，即测量心跳节律和血液循环，但深度伪造制造者学会如何跨越这一障碍也只是时间问题。话虽如此，仅仅因为深度伪造检测算法的任务艰巨，并不意味着我们不应该努力尝试；恰恰相反，这意味着我们必须迅速而有力地行动起来，以应对这个不断演变的挑战。


  2020 年春天，广受欢迎的数据科学竞赛网站 Kaggle 举办了“深度伪造检测挑战赛”，这是一项公开竞赛，奖金为一百万美元，旨在看谁能制作出最准确的算法，将视频分类为深度伪造或真实视频。本次竞赛的组织者——他们既提供了参赛者用来构建和调整算法的训练数据，也提供了随后在幕后用于评估和排名参赛者表现的测试数据——包括
  Facebook、亚马逊、微软、一个学术团体，以及一个名为“人工智能媒体诚信指导委员会伙伴关系”的媒体和技术专家联盟。毫不意外，所有获胜团队都为其算法采用了深度学习架构。


  在这场 Kaggle 竞赛中，表现最佳的算法在测试数据上达到了 82.5%的准确率。如果在实践中依赖此类自动化方法，许多深度伪造视频将蒙混过关，而许多真实视频则会被错误标记为深度伪造。此外，在某个固定时间点的模拟竞赛中的表现，与在驱动深度伪造的技术不断变化的现实世界中的表现之间，存在着巨大差异。事实上，当在一个新的未见过的数据集上进行测试时，获胜参赛者的准确率骤降至
  65%；坦率地说，这比随机猜测好不了多少。而且，这次竞赛专注于纯粹由算法批量生成的深度伪造，因此，如果有人想在特定情况下欺骗检测算法，他们可以进行额外的手动处理来从中作梗。正如《科学美国人》所指出的^(⁷⁸)，“这种‘精心制作’的深度伪造视频更有可能造成真正的损害，而仔细的手动后期处理可以减少或消除检测算法所依赖的那些伪影。”


  竞赛中排名前五的团队（获得奖金的团队）除了都使用深度学习之外，还有一个共同点：他们都使用了一种名为`EfficientNets`的特定深度学习架构，该架构由谷歌于
  2019 年开发，以擅长识别图像中的人脸和其他物体而闻名。竞赛的获胜者 Selim Seferbekov 认为^(⁷⁹)，算法检测的下一步可能涉及关注视频帧之间的过渡：“即使是质量非常高的深度伪造，帧与帧之间也会有一些闪烁，”他指出。虽然这些闪烁对于人类肉眼来说不难发现，但
  Seferbekov 表示，他试图用他的算法捕捉这些闪烁，但发现计算量太大，因此暂时放弃了。在 Kaggle 竞赛结束后不久，Facebook 发布了一个公共数据库，其中包含超过三千名演员使用各种已知换脸深度伪造技术制作的超过十万个视频片段，希望这能帮助研究界开发出更好的检测方法。


  美国政府已在深度伪造检测方面投入巨资：2015 年，国防高级研究计划局（DARPA）——国防部内一个专注于为军方开发新兴技术的研究机构——启动了一个名为“媒体取证”（Media
  Forensics），或更简洁地称为`MediFor`的项目。这个项目的启动时间点颇为巧合。在此之前不久，俄罗斯的一个新闻频道播放了所谓的卫星图像，显示一架乌克兰战斗机向马来西亚航空
  17 号航班开火。结果证明这些图像是伪造的，尽管它们是用更传统的方法而非深度学习制作的；同时，该航班实际上是被一枚俄罗斯导弹击落的。这起俄罗斯事件很可能将虚假图像和视频推到了
  DARPA 关注清单的前列，并且随着深度伪造技术在随后的几年中发展，DARPA 有充分的理由对这个话题保持浓厚的兴趣。


  据《科学美国人》2018 年报道^(⁸⁰)，`MediFor`对其任务有三种广泛的方法，所有这些方法都是通过深度学习实现自动化的有力候选：“第一种方法是检查视频的数字指纹是否存在异常。第二种方法是确保视频遵循物理定律，例如阳光照射的方式与现实世界一致。第三种方法是检查外部数据，例如据称拍摄当天的天气情况。”参与该项目的一位研究人员深刻地总结了他们工作的背景：“我们不会赢得这场游戏，只是我们会让坏人玩起来越来越难。”




  ## 对抗视觉虚假信息的不同方法


  对抗视觉虚假信息的一种不同方法是，通过嵌入数字水印（借鉴传统防伪手段）或创建可用于驳斥后续出现的篡改版本的数据库，来验证照片和视频的真实性。例如，一家名为`Truepic`的圣地亚哥初创公司提供了一款智能手机应用，让用户拍摄被验证为未经篡改的照片或视频。它通过将照片/视频连同相机记录的各种传感器读数发送到`Truepic`的服务器来实现这一点，服务器会进行一系列测试，如果所有测试都通过，则该照片/视频被视为“已验证”并存储在服务器上。完整的测试集并未公开，但`Truepic`的首席执行官解释说，他们“会查看地理定位数据、附近的手机信号塔、手机上的气压传感器，并验证所有信息是否匹配。我们通过一系列计算机视觉测试来运行照片。”该应用迄今为止最大的客户是保险公司，因为它允许投保人拍摄事故和损坏的照片，公司可以确信这些照片未被篡改，但`Truepic`表示，它也被非政府组织用于记录侵犯人权的行为。


  英国一家名为`Serelay`的初创公司开发了一款与`Truepic`类似的应用，不同之处在于`Serelay`的应用不将完整照片存储在其服务器上，它只存储通过为每张图像计算约一百个数学值而获得的照片的小型数字指纹。无法从该指纹重建完整照片，但该公司声称，即使照片中的单个像素被修改，指纹也将无法匹配。当然，`Truepic`和`Serelay`的服务仅在人们事先知道某张特定照片的有效性日后可能受到质疑时才有效——因此，虽然在某些领域非常有用，但它们无法解决每天通过社交媒体快速渠道流动的大量可疑照片问题。也就是说，可以设想在不久的将来，每部智能手机默认使用此类验证服务，然后每当有人在社交媒体平台上发布照片或视频时，如果该内容通过验证服务，平台会在其旁边放置一个小对勾。


  除了自动深度伪造检测的所有技术挑战之外，还存在一个非常显著的社会学和心理学挑战，《科学美国人》的布鲁克·博雷尔称之为“谎言与真相之间的滞后”：即使一段病毒式传播的视频被证明是深度伪造，欺骗造成的损害通常已经造成，并且实际上不可逆转。一旦人们相信了某件事，尤其是当他们亲眼所见时，即使随后出现了无可辩驳的反面证据，也很难让他们改变想法。这表明，除了在有害的深度伪造内容病毒式传播后揭露它们之外，首先防止它们传播可能也是明智之举。这将我们带入下一个主题，即限制深度伪造可能造成的损害的立法方法。


  ### 法律监管


  佛罗里达州参议员马可·鲁比奥多次谈到深度伪造技术带来的威胁，并鼓励采取立法行动。内布拉斯加州参议员本·萨斯于 2018 年 12 月提出了一项旨在监管深度伪造的法案——这是同类法案中的首例——但一天后，联邦政府因预算僵局而关闭，等到政府重新开放时，萨斯提出的法案已经失效。接下来，与本章开篇提到的
  2019 年 6 月众议院关于深度伪造的听证会同时，纽约第九国会选区的众议员伊维特·克拉克提出了一项不同的、比萨斯的法案更全面的深度伪造法案。


  克拉克的法案——与计算机科学家、虚假信息专家和人权倡导者合作起草——将要求社交媒体公司更好地监控其平台上的深度伪造内容，要求研究人员开发用于深度伪造的数字水印工具，并将恶意使用深度伪造内容伤害个人或威胁国家安全的行为定为犯罪。该法案的顾问之一、数据与社会研究所研究员穆塔莱·恩孔德表示，该法案不太可能以其原始形式在国会通过，但她认为无论如何提出该法案都很重要，以便朝着深度伪造的立法监管迈出认真的第一步：“我们真正想做的是将视听操纵不可接受这一理念载入国会记录。”虽然该法案确实停滞不前，但克拉克在
  2021 年 2 月表示，她计划重新提出该法案的修订版，她认为由于 2020 年大选后的新政治环境以及疫情导致社交媒体使用增加，该修订版将获得更多支持：“通过一些有意义的深度伪造立法的条件已经成熟。”


  虽然联邦层面的监管在国会迄今停滞不前，但在州层面出现了一些有趣的发展。2019 年 10 月，加利福尼亚州签署了一项法律，将在选举前 60 天内恶意分发或创建关于政治候选人的“实质性欺骗性”媒体定为犯罪。（如果“理性人”对篡改过的照片或视频与原始版本相比有“根本不同的理解或印象”，则该内容被视为具有欺骗性。）“深度伪造”一词并未出现在该法律的文本中，但该法律被昵称为“加州深度伪造法”，并且它确实直接受到深度伪造及其对该州民主制度构成的威胁的启发。


  加州的法律规定了一些例外情况，例如讽刺作品以及带有声明其为虚假内容的免责声明的视频，但言论自由倡导者对此表示反对并质疑其合宪性（专门关注选举和 60 天窗口期是为了帮助缓解此类担忧）。与此同时，加州还颁布了一项法律，禁止未经同意的色情深度伪造。一个月前，德克萨斯州成为第一个对深度伪造进行立法的州，将“意图影响选举结果”使用深度伪造的行为定为犯罪。然而，法律学者指出，深度伪造在选举之外也可能非常危险（例如，当视频在法庭上用作证据时），而且，为了执行这些深度伪造法律，需要能够证明相关视频确实是深度伪造——正如你现在所知，这并非易事。


  即使联邦政府的立法部门在应对深度伪造挑战方面一直持谨慎态度，但它——至少在纸面上——已努力进行自我监管。2020 年 1 月 28 日，美国众议院道德委员会发布了一份题为“故意使用视听扭曲与深度伪造”的官方备忘录，其中包含以下文本：


  *   议员或其工作人员发布深度伪造内容可能会侵蚀公众信任、影响公共讨论或左右选举。因此，发布深度伪造或其他旨在误导公众的视听扭曲内容的议员、官员和工作人员可能违反了《官方行为准则》。在通过包括社交媒体在内的电子方式传播任何图像、视频或音频文件之前，议员和工作人员应尽合理努力考虑此类内容是否为深度伪造或是否被故意扭曲以误导公众。


  这项《官方行为准则》的执行严格程度如何，仍有待观察。




  ## 驳回有效证据


  在 2020 年大选前紧张的几个月里，一位竞选密苏里州众议院席位的国会候选人撰写并分享了一份长达 23 页的文件，标题为“乔治·弗洛伊德已死：公民关于深度伪造技术使用的调查报告”。她在文件中声称，那段引发全国愤怒、显示警察谋杀乔治·弗洛伊德的病毒式视频实际上是深度伪造。她声称视频中的人是一名演员，其面容被替换成了弗洛伊德（据称他已于
  2017 年去世）的模样。她表示^(⁸⁸)，这段视频是一场“假旗行动”，旨在“煽动美国黑人与白人之间的种族紧张关系”，并重振“摇摇欲坠的激进‘黑人的命也是命’运动”。这是一个荒谬且毫无根据的阴谋论。幸运的是，她在初选中落败了。但她并非唯一一个试图利用深度伪造技术的存在来扭曲公众对现实理解的人。


  许多人认为，深度伪造带来的最大威胁并非其直接欺骗的能力，而是它导致的社会信任普遍侵蚀，以及它为邪恶之徒提供的掩护——他们现在只需高喊“深度伪造”，就能看似合理地否认确凿的视频证据。在本章开头提到的
  2019 年 6 月听证会的开场白中，亚当·希夫曾富有远见地警告说：“不仅假视频可能被冒充为真，真信息也可能被冒充为假。这就是所谓的‘骗子红利’，那些有欺骗倾向的人将受益于这样一个环境：公众越来越难以判断什么是真实的。”


  你肯定还记得，就在 2016 年总统大选前一个月，《华盛顿邮报》发表了一篇文章，并附上了 2005 年那段如今臭名昭著的《走进好莱坞》录音带。在这段录音中，唐纳德·特朗普在未经其知情（推测）的情况下被录下的画外音中，对女性发表了极其粗俗的评论。此事在总统辩论前仅两天曝光，特朗普的回应是承认录音带中的言论是他说的，并为此道歉，但也试图将其轻描淡写为“更衣室闲聊”。一年后，特朗普却相当离奇且厚颜无耻地开始声称^(⁸⁹)那段录音是假的，他并没有说过我们听到的那些话。


  在 CNN 与安德森·库珀的一次采访中，肥皂剧女演员阿丽安·祖克（她是特朗普在《走进好莱坞》录音带中一些粗俗评论的对象）对此回应道：“我不知道那还能怎么造假，我的意思是，除非有人把话塞进你嘴里。”《走进好莱坞》节目组也回应说：“让我们把话说清楚，这盘录音带非常真实。他说的每一个字都是真的。”尽管如此，据报道^(⁹⁰)，特朗普在多次私下谈话中表示，他不确定录音带里的是不是他本人。2017
  年 1 月，他告诉一位参议员，他“正在考虑雇人确认那是不是他的声音”。


  或许，2021 年及以后的深度伪造技术终于为特朗普在 2017 年寻求的掩护提供了可能，以解释 2016 年竞选期间曝光的 2005 年那段破坏性录音。但正是这项可能让他否定《走进好莱坞》录音带的技术，也导致一些人不相信他在与
  COVID-19 作斗争期间关于其健康状况的真实录音保证。


  ## 总结


  深度伪造视频编辑是一系列修改视频片段的方法，用于改变人们所说的话以及说话的人。它由深度学习驱动，最常见的是生成对抗网络（GAN）架构，其中两个算法相互对抗，通过处理大量数据的训练过程，生成器学会常规性地欺骗判别器。这项技术首次出现在
  2017 年，当时被用于制作非自愿色情内容，如今它威胁着社会辨别真相的能力。阴谋论者通过声称合法的视频证据（如警察谋杀乔治·弗洛伊德）是深度伪造来质疑其真实性，而腐败的政客现在获得了一个强大的工具：他们可以将有罪视频片段斥为深度伪造而置之不理。与此同时，无辜的记者和政客因其面孔被深度伪造换脸到色情片段中而名誉受损。通过算法检测深度伪造已被证明具有挑战性，尽管该领域持续有努力，并出现了一些希望的曙光。通过规范深度伪造的使用来限制其传播的立法尝试，在国家层面迄今停滞不前；在地方层面，已采取了一些具体行动，但它们对言论自由的限制使其合宪性存疑。本章全部关于用于编辑视频的算法；在下一章中，我将转向视频的另一个算法方面：YouTube
  推荐。


