- "# 5. 推诿与测谎仪\n\n计算机能检测谎言吗？\n\n> *世上没有测谎仪，无论是人还是机器。*\n> \n> ——美国众议院委员会报告\n\n如果我们能截取某人说话的短视频，并运用人工智能来判断他们是否在说实话，那该有多好？这样的工具将有无数应用，包括帮助打击假新闻：一个发表不诚实演讲的虚伪政客会立刻被揭穿，一个故意在\
  \ YouTube 上发布谎言的阴谋论者也会如此。随着近年来深度学习的显著进步，为什么我们不能通过向算法展示大量谎言和真相的视频，让它根据能找到的任何视觉和听觉线索来学习区分两者呢？事实上，在过去十五年里，人们一直在尝试这种\
  \ 21 世纪对测谎仪的算法重塑。它的效果如何，以及被用于什么目的，是本章探讨的主要问题。为了不让您悬念太久：这种方法制造的假新闻几乎和它阻止的一样多——而参与这项工作的各家公司声称的相反情况，用一句不太恰当的话来说，就是假新闻。但首先，我将从传统测谎仪引人入胜的历史开始，为它那由人工智能驱动的当代对应物做好铺垫。\n\
  \n## 测谎仪的历史\n\n测谎仪，俗称*谎言探测器*，有一段有趣的历史^(¹⁴⁸)，揭示了它在社会——尤其是美国社会——中处于科学与伪科学之间、技术乐观主义与欺诈之间的尴尬地位。\n\
  \n\n\n### 马斯顿及其发明\n\n心理学家兼漫画作家威廉·马斯顿以其两项发明最为著名：测谎仪和神奇女侠。前者是与他的妻子伊丽莎白·霍洛威——一位成就卓著的律师兼心理学家——共同创造的，而后者则部分受她启发。这对非凡夫妇及其发明的故事值得讲述。1915\
  \ 年，马斯顿在哈佛大学攻读法律和心理学研究生时，提出了一种理论：当一个人在欺骗性地回答问题时，其血压会因压力而飙升。据说，他最初偶然发现这一理论，是因为霍洛威敏锐而随意地评论说，当她“生气或兴奋时”，她的血压“似乎会升高”。马斯顿随后开发了第一个收缩压测试，这是这对夫妇早期测谎仪原型的关键组成部分。\n\
  \n美国于 1917 年加入第一次世界大战，马斯顿看到了他们这项新兴技术的重要应用：抓捕间谍。他向多位政府官员推销了这一想法，并成功说服国家研究委员会成立一个委员会，以评估他提出的“欺骗测试方法的价值”。两周后，马斯顿热情地给委员会主席发了一封简短的电报：“在铁一般的预防措施下，三十次欺骗测试取得了显著成果，详情见信。”随后的信件详细阐述了马斯顿与同事们进行的实验。这些测试的第一批受试者主要是哈佛大学女生联谊会的女性，第二批受试者则来自波士顿市法院。基于马斯顿的乐观消息，委员会同意进一步推进他的提案。\n\
  \n然而，委员会主席随后撰写的报告并不像马斯顿那样乐观。该报告对使用血压测试表示强烈怀疑，显然是由于其他研究人员早先的尝试失败：“电流-心理和血管运动反应[可能]是比血压更微妙的指标；但同样的结果可能由许多不同的情况引起，任何需要同等活动（智力或情感）的事情都会导致，以至于实际上不可能区分任何个案。”换句话说，还有其他生物识别指标可能更好地追踪欺骗行为，但即便如此，这些指标也只能在整体上起作用；在任何特定情况下，人们无法区分谎言与真相，因为这些指标的飙升可能由众多事件引起，而不仅仅是欺骗行为。颇具先见之明的是，在表达了这种合理的怀疑之后，委员会主席接着提出了修改马斯顿实验方案的方法，以便更好地防止执行测谎测试的审查员产生偏见。审查员偏见这个问题非常重要，正如你很快会看到的，它至今仍是该领域的一个棘手问题。\n\
  \n随着马斯顿在哈佛的学业接近尾声，他与国家研究委员会的通信内容急剧转变，从单纯请求研究资金支持，转向直接寻求在政府内部获得职位。这一转变似乎主要是因为他意识到，完成学业意味着他不再是学生——因此有资格被征召入伍。尽管他一直设想自己成为一名大学教授，但与服兵役相比，政府研究职位无疑更合他的心意。\n\
  \n他在寻求政府职位方面取得了成功：到 1918 年，他已在战争部（这个名称更诚实的机构于 1949 年演变为国防部）内的一个医疗支援单位工作。在这个职位上，他继续着测谎仪的实验，并声称在波士顿刑事法庭使用他的收缩压设备进行的测试中，达到了百分之九十七的准确率。他后来撰文提到在\
  \ 1910 年代末及整个 1920 年代使用他的设备测试间谍，1935 年，时任联邦调查局局长的 J·埃德加·胡佛正式询问了马斯顿的工作，但关于马斯顿在间谍活动方面的工作，没有公开细节留存下来。马斯顿最终回归学术界，并以教授身份度过了余生；这为他提供了学术自由，使他能够将测谎研究引向任何他想要的方向，而无需说服上级指挥链中的上司相信这样做的价值。\n\
  \n\n\n### 步入法庭\n\n1923 年，马尔斯顿的人生、测谎仪的历史以及美国司法体系的历史迎来了一个重大时刻——他在具有影响力的案件*弗莱诉合众国案*中担任专家证人。詹姆斯·弗莱是一名一战老兵，因枪杀华盛顿特区知名医生\
  \ R·W·布朗医生而受审。弗莱承认抢劫了一名旅行推销员，据称警方就此审问他时，一些将他与谋杀医生案联系起来的定罪细节浮出水面。弗莱随后不久便供认枪杀了医生。他说自己去布朗医生的办公室开处方，但身上只有一美元，而处方费需要两美元。当时的一篇报纸文章描述了弗莱供词中接下来发生的事：^(¹⁴⁹)“他说，布朗医生拒绝接受他的手枪作为额外一美元的抵押品。麻烦随之而来，他声称医生从办公室追他到走廊，将他打倒在地。他称，正是在倒地时，他开了四五枪。”这算不上严格的自卫，但至少弗莱自己认为，离自卫也不远了。\n\
  \n然而，弗莱随后翻供，坚称自己无罪。他说之所以作出虚假供认，是因为一名侦探同意，如果弗莱承认谋杀，就撤销抢劫指控，而且该侦探还会与弗莱分享因获得这份供词而得到的一千美元赏金。现金奖励和撤销较轻的指控，似乎不足以成为承认自己未犯下的谋杀罪的动机，但弗莱相信自己有不在场证明，可以洗脱谋杀指控。他盘算着，承认谋杀是明智之举：这能让他摆脱抢劫指控，一旦不在场证明得到证实，尽管有供词，谋杀指控也会被撤销，而且在这个过程中他还能轻松赚点钱。真是个绝妙的计划，只可惜不在场证明未能成立。于是，按照他的说法，当面对一个无法轻易摆脱的谋杀指控时，他承认那份供词不过是这个失败计划编造出来的。（且不提他的供词中包含了一些局外人几乎肯定不可能知道的、关于犯罪现场的惊人准确细节。）\n\
  \n此时，弗莱的辩护专家证人马尔斯顿登场了，他相信自己能通过测谎仪证明弗莱在解释为何供词不实时的陈述是真实的，从而确立弗莱的无罪。^(¹⁵⁰)马尔斯顿用他的设备——当时基本上只是一个血压监测袖带和一个听诊器——对弗莱进行了测试，并宣称弗莱关于与侦探合谋的说法是真实的。随后，马尔斯顿试图通过为弗莱作证，将此作为正式的法庭证据。\n\
  \n然而，法官不为所动，反对使用这种未知且未经证实的工具。该案上诉至哥伦比亚特区巡回上诉法院，该法院同意初审法官对马尔斯顿的设备及证词所持的怀疑态度。上诉裁决中包含了一条关于专家证人证词可采性的更普遍性意见，这条意见后来被称为*弗莱标准*，主张如果专家意见所依据的科学技术在相关科学界被“普遍接受”为可靠的，则该专家意见可被采纳。弗莱案中确立的这一科学证据可采性的普遍接受标准，至今仍在某些司法管辖区作为原文法律适用，即使在那些不直接适用的司法管辖区，其法律本质上也只是在所谓的*《联邦证据规则》第\
  \ 702 条*中编纂而成的更详细、更复杂的版本。^(¹⁵¹)\n\n简而言之，尽管马尔斯顿希望通过展示他的测谎设备如何能证明无罪来创造历史，但他实际上创造历史的方式却是迫使法院系统阐明哪些类型的专家证词*不应*被采纳——而他的证词恰恰落入了这个被禁止的类别。事实上，不仅在\
  \ 1923 年当时他的设备未能通过弗莱标准，而且弗莱标准在近一百年后的今天，一直将测谎测试（即使是其更现代的版本）挡在法庭之外。（这或许算是一次挥棒落空，但他凭借另一项经久不衰的创作无疑打出了本垒打：1940\
  \ 年，他在担任 DC 漫画公司顾问期间，向该公司提议创作了一位漫画超级女英雄——一个名为*神奇女侠*的角色，她配备了一条“真言套索”，这条鞭子能迫使被它缠住的人说出真相。神奇女侠的灵感来源于马尔斯顿的妻子伊丽莎白·霍洛威，而真言套索的想法则源于他们共同对人类情感心理学进行的有影响力的研究。）\n\
  \n### 从血压到测谎仪\n\n马尔斯顿在弗莱案中令人尴尬的失败似乎反而激励了他，促使他将自己的测谎仪发展成更精密的设备。他不再仅仅依赖收缩压并在离散的时间间隔内进行测量，而是相信通过同时结合多种测量指标，并连续绘制它们随时间变化的曲线，可以描绘出更细致的图景。这便产生了*多导生理记录仪*（注意：“poly”是希腊语词根，意为“多”；“graph”是希腊语词根，意为“书写”）。除了血压，马尔斯顿在弗莱案后改进的多导生理记录仪还测量了呼吸频率和出汗程度（后者通过皮肤电导测量）。\n\
  \n现代测谎仪有时也被归功于大约同一时期在另一海岸的发明者：伯克利警官兼法医心理学家约翰·奥古斯都·拉尔森，他的设备也使用了收缩压监测仪，并能连续记录测量结果。关于谁在何时发明了什么，细节有些模糊不清，而且这两个人的发明和想法都基于更早的尝试（并且，如前所述，马尔斯顿的工作实际上是与他的妻子合作完成的）。无论当时情况如何，相关的事实是，我们今天所知的测谎仪——嗯，在我即将讨论的近期基于人工智能的系统出现之前——只是马尔斯顿和拉尔森提出的这些\
  \ 20 世纪早期设备的微小变体。\n\n\n\n### 决心寻找用途\n\n马尔斯顿或许在科学严谨性上有所欠缺，但他用商业头脑弥补了这一点：在他的职业生涯中，他努力推广自己的测谎仪，并通过公开广告活动甚至漫画书来吹嘘其所谓的革命性成功。他在这方面相当成功。但如果测谎仪在法庭上不被采信，那它又有什么用途呢？基本上只有一种用途，但这一用途却出奇地庞大且利润丰厚。虽然大多数私营公司使用测谎仪是违法的，但许多政府机构——无论是地方还是联邦——都将测谎仪作为其背景就业筛查流程的一部分。据估计^(¹⁵²)，美国每年进行\
  \ 250 万次测谎测试，远超其他任何国家，这催生了一个价值 20 亿美元的产业。\n\n2007 年的一项调查发现，大约四分之三的城市警长和警察部门在招聘过程中使用测谎仪。消防员和护理人员的招聘也普遍使用测谎仪。它们也是联邦政府安全审查流程的一部分；我多年前在\
  \ NSA（美国国家安全局）做大学暑期实习时就亲身经历过。我仍然记得当时很紧张，不得不飞越全国，在一个简朴的检查室里被绑在这台奇怪的机器上，旁边还有多位政府官员，就像好莱坞电影里的场景。我还记得当我意识到他们问我的问题并非困难或令人尴尬的个人细节时，紧张感很快就消失了——他们问的都是些简单问题，比如：“你是否曾积极密谋推翻美国政府？”我想知道这能揭示什么，又有谁会通不过这个测试。但他们不会与你分享测试结果，只是将测谎数据纳入保密的整体背景调查中，你所能做的就是信任这个系统。就我而言，我通过了筛查，并获得了那个夏天的安全许可，但直到今天，我仍然不知道测谎仪对我究竟显示了什么。\n\
  \n### 持久的质疑\n\n让我再强调一遍：测谎仪的可靠性不足以在法庭或私营公司中使用，然而公共部门却欣然接受了这项可疑的技术，并每年用它来筛查超过两百万人，其中大多数人只是在申请那些他们可以努力行善并对社会产生积极影响的工作。据信^(¹⁵³)，每年有数万或数十万申请者未能通过测谎测试，从而被拒绝录用（具体数字未知）。所有这一切，尽管测谎仪在其一百年的历史中，始终未能以公认的科学方式确立其合法性。事实上，1965\
  \ 年，美国政府运作委员会评估了科学证据并得出以下结论：^(¹⁵⁴)“不存在测谎仪，无论是人还是机器。人们被一个神话所欺骗，即调查员手中的一个金属盒子能够检测真伪。”在\
  \ 21 世纪，*金属盒子*已被*黑箱*所取代——也就是深度学习。这是我很快就要讨论的主要话题。\n\n但首先，在结束对老式（但仍广泛使用的）测谎仪背景历史的介绍之前，还有一点很重要，这一点也与新式人工智能测谎仪密切相关。前中央情报局局长詹姆斯·伍尔西在\
  \ 2009 年的一次采访中警告说：^(¹⁵⁵)“测谎仪的最大缺陷是它会产生大量的误报，尤其是在大规模筛查中使用时。”换句话说，测谎仪倾向于将真话误判为谎言，即使这种情况发生的概率相对较低（实际上未必如此），但当像就业筛查那样大规模使用时，这意味着大量的人被错误且不公平地认定为说谎者。事实上，伍尔西接着表示，这种误报问题“严重损害了许多人的生活，让他们在并未真正做错任何事的情况下未能通过测谎测试。”\n\
  \n进一步加剧这种不公的是，误报并非均匀地影响所有申请者。例如，20 世纪 80 年代悄然和解的一起种族歧视集体诉讼揭示^(156)，20 世纪 70 年代末，库克县惩教署的黑人申请者测谎失败率很高，这种情况随机发生的概率仅为千分之一——这意味着测谎结果几乎肯定对黑人申请者存在偏见。（和解协议的一部分是要求库克县立即停止在就业筛查中使用测谎测试。）同样，1990\
  \ 年，美国国防部进行了一项关于测谎仪可靠性的研究，发现在模拟刑事诉讼中，无辜的黑人比无辜的白人更容易收到误报。\n\n造成这种差异的原因尚不完全清楚，但专家提出的一种解释是，测谎仪的读数非常模糊且易于解读，以至于它们本质上成了审查员的罗夏测试，从而受到其个人情绪和偏见的影响。一位神经科学家表示：^(157)“一位审查员可能将血压峰值视为欺骗的迹象，另一位可能不予理会——正是在这些个人判断中，偏见可能悄然潜入。审查员的决定可能主要基于两人之间的人际互动。”美国公民自由联盟的一位高级政策分析师进一步阐述了这一点：^(158)“在这方面，测谎仪就像我们近年来看到的其他伪科学技术一样：因为它们从根本上就是虚假的，最终在缺乏真正有用测量的情况下，它们只不过成为了操作者用自己对受试者的个人评估来替代的工具。对于某些操作者来说，这不可避免地意味着种族偏见。”\n\
  \n结构性种族主义也可能在其中发挥作用，例如，导致黑人在政府审讯期间更加紧张。令人相当惊讶的是，关于测谎仪偏见的研究如此之少，尤其是考虑到它们在公共部门的使用如此广泛。\n\
  \n现在，我们对传统测谎仪的历史介绍就结束了。在舞台搭建妥当之后，我们将步入算法测谎的世界。\n\n## 测谎仪遇上人工智能\n\n正如你在关于深度伪造的章节中已经看到的那样，深度学习推动了我们在处理视觉数据能力方面的一场革命。乍一看，测谎似乎应该是一个相当直接的应用：在监督下的二分类任务中训练机器学习算法，将视频片段分类为真实或虚假。然而，事实证明，有偏误报的问题就像机器中的幽灵，并非那么容易消除。\n\
  \n\n\n### 眼中的谎言\n\n2014 年，由马克·库班资助的一家名为`Converus`的初创公司发布了一款名为`EyeDetect`的产品，号称是比测谎仪更快、更便宜、更准确的替代方案。这是该公司的主要产品，其自我描述为“愿景是为欺骗检测行业提供值得信赖的创新解决方案”。炒作和宣传很快使其得到了相当广泛的采用，主要（但并非\
  \ exclusively）用于公共部门的就业筛查。根据公司网站，截至 2019 年 1 月，`EyeDetect`已销往 40 个国家的 500 多个客户；在美国，这些客户包括联邦政府以及\
  \ 21 个州和地方机构。\n\n顾名思义，`EyeDetect`不依赖传统测谎仪所测量的血压、皮肤电导或呼吸频率；相反，它的焦点在于心灵的窗户：眼睛。或许更显著的区别在于，与传统测谎仪形成鲜明对比的是，`EyeDetect`不需要人类审查员来解读读数并判断什么是谎言、什么是真话——`EyeDetect`通过应用机器学习，以自动化、算法化的方式得出结论。事实上，`EyeDetect`被输入了说真话的参与者和说谎的参与者的细微眼部特写视频片段，算法将这些作为训练数据，以确定诚实与不诚实在眼中的表现。\n\
  \n将人类解释者排除在外，无疑有助于营造一种公正的氛围，但这种算法方法真的能产生可靠且无偏见的结果吗？遗憾的是，不能。过去几年告诉我们，算法偏见是机器学习中一个严重且根本的问题。算法不仅会吸收无意中潜入训练数据集的偏见，还会复制并常常放大这种偏见。关于这种有害的数据驱动反馈循环现象，已有大量文章进行了一般性讨论，我稍后将在此处针对测谎的具体场景进行探讨。\n\
  \n根据`Wired`在 2018 年的一项调查，美国国防部和美国海关与边境保护局一直在试用`Converus`的技术，虽然联邦法律禁止大多数私营公司在美国境内使用任何类型的测谎设备进行员工筛查，但显然包括联邦快递、麦当劳和优步在内的少数公司已在危地马拉、巴拿马和墨西哥使用了`EyeDetect`。信用评级机构益博睿在其哥伦比亚的员工中使用该技术，试图防止员工操纵记录以帮助家人欺诈性地获取贷款。`Converus`表示，一个未具名的中东国家已购买`EyeDetect`，用于筛查入境人员是否存在潜在的恐怖活动或关联。\n\
  \n`Converus`声称其系统达到了 86%的准确率，优于传统测谎仪估计约 70%的准确率（该公司甚至断言`EyeDetect`是“现有最准确的测谎仪”）。然而，`Wired`的调查指出，“关于`Converus`技术的唯一经过同行评审的学术研究，是由公司自己的科学家或他们实验室的学生进行的”，这并不特别令人放心，并且明显存在利益冲突。当一家私营公司为其旨在盈利的产品的有效性研究提供资金时，通常会引发质疑——但在这里，该公司不仅资助了研究，还关起门来亲自进行了研究。未参与`Converus`项目的心理学教授约翰·艾伦应`Wired`之邀，阅读了该公司的一些学术论文，试图评估情况。他是这样说的：“我最善意的看法是，它有一些前景，或许通过未来的独立研究，这项测试可以为形成关于欺骗行为的假设提供众多衡量标准之一。但即便如此，这也不是决定性的证据。”这算不上热情洋溢的推荐。\n\
  \n而且这些学术论文只涵盖了`Converus`进行的较为成功的实验；该公司的首次现场测试暴露了系统的一个明显缺陷，然而这次实验的结果从未公布。`Converus`的首席科学家（也是`EyeDetect`的联合创始人）后来承认了首次现场测试的情况：“尽管数据有限，但当我们测试申请航空公司工作的受过良好教育的人时，[测试]似乎效果不错，但当我们测试教育程度较低的安全公司申请人时，[测试]效果不佳。”这一评论强烈表明，驱动`EyeDetect`的机器学习算法是在一个高度选择性的、不具有代表性的样本上训练的，这在算法世界中是导致有害偏见的常见原因，这种偏见会不成比例地伤害弱势群体。\n\
  \n在更根本的层面上，首席科学家的评论提出了一个公司似乎尚未回答的尖锐问题：为什么一个人的视觉欺骗指标会取决于其教育水平？测谎的神话是，掩盖欺骗的努力是天生的、普遍的，在不同人群中保持不变——然而这次失败的现场测试表明，情况完全不是这样。这一观察本应动摇`Converus`努力的根基，但该公司似乎只是将其掩盖起来，并向问题投入了更多数据和更多神经网络层。作为非普遍性问题的进一步迹象，请考虑以下备忘录（同样在`Wired`的调查中被披露），这是`Converus`的一位营销经理在\
  \ 2016 年写给一个警察局客户的：“请注意，当`EyeDetect`测试作为演示进行时……结果往往与我们看到受测者在有后果的真实测试环境下进行测试时的结果不同。”这里有些东西非常可疑——而且情况更糟。\n\
  \n根据设计，`EyeDetect`系统允许审查员调整`sensitivity`，即算法判定检测到谎言的阈值。这背后的想法是，某些人群历史上可能比其他人群更诚实，因此在检查每个个体时，如果系统根据该人群的基线水平进行校准，就能产生更准确的结果。用`Converus`总裁兼首席执行官托德·米克尔森的话来说：“这给了所有受测者更公平的被正确分类的机会。大多数组织可以通过考虑先前背景调查失败的数量、面试数据、供词、证据等，来很好地估计基准率。”真的吗？\n\
  \n\n\n首先，米克尔森描述的那种数据对大多数组织来说并不可用。其次，他描述的数据已经带有偏见。例如，米克尔森建议基于历史背景调查失败率来设定基准率，但这些历史背景调查涉及什么？很可能是老式测谎仪（已知对少数族裔存在偏见，正如你在库克县案中已经看到的）和旧式私家侦探式调查（没人会认为它们没有偏见）的结合。康维鲁斯公司总裁兼首席执行官的这一声明实际上等于承认，`EyeDetect`鼓励审查员将过去的种族主义和其他形式的歧视嵌入到这项未来主义技术中。即使审查员不依赖有偏见的历史数据，米克尔森似乎也在鼓励他们引入自己个人的当代偏见——只要在审查你不信任的人群时，调高灵敏度就行了！你之前听到的美国公民自由联盟高级政策分析师完美地总结了当前情况：^(¹⁶²)“对测谎仪这类技术的批评是，它们允许偏见悄悄潜入，但在这个案例中，听起来偏见并非悄悄潜入——而是受到热烈欢迎，并被邀请留下来共进晚餐。”\n\
  \n因此，`EyeDetect`并未以任何传统的、无利益冲突的方式得到科学验证，而且其设计包含一个杠杆，允许审查员将结果向任一方向倾斜。除此之外，它是一个使用专有算法的封闭系统——该算法本身基于黑箱机器学习——因此基本上不可能审查系统的内部运作。尽管老式测谎仪有缺陷，但至少我们知道它究竟在测量什么，以及这些测量结果是如何被解释的，并且至少有一个理论（尽管有缺陷）试图解释为什么这些测量结果与隐藏的欺骗行为相关。另一方面，对于`EyeDetect`，计算机自行决定哪些眼球运动被视为欺骗的指标，并且除了计算机在过去数据中发现的结果之外，没有任何关于这些指标是什么以及它们为何表明欺骗的解释——至少对于其训练所基于的那个规模小且不具代表性的人群而言是这样。\n\
  \n《连线》杂志的调查敏锐地指出了`EyeDetect`的另一个麻烦问题：“其低廉的价格和自动化操作使其能够以耗时耗力的测谎仪测试永远无法做到的方式进行规模化。”如果它完美运行且没有有害后果，那么规模化将是好事——但考虑到已经讨论过的诸多缺陷，规模化是非常危险的。事实上，这就是有害的数据驱动反馈循环发挥作用的地方，我接下来会解释。\n\
  \n现在人们普遍认识到，基于某一种族人群训练的面部识别软件在其他人群上表现不佳，并且基本上所有在美国开发的机器学习算法在识别黑人和棕色人种面孔时的表现都比白人面孔差。^(¹⁶³)如果`EyeDetect`能成为这一规律的例外，我会感到震惊，这意味着`EyeDetect`很可能对黑人和棕色人种受测者产生比白人受测者更多的误报。当`EyeDetect`被大规模用于就业筛选时，黑人和棕色人种群体总体上被不公平地排除在劳动力市场之外。剥夺这些人群的就业机会加剧了美国本已严重的种族财富差距，将更多黑人和棕色人种推向贫困。\n\
  \n但故事并未就此结束。众所周知，与富裕的白人社区相比，警察更积极地巡逻贫困社区，尤其是那些黑人和棕色人种居民比例高的社区。^(¹⁶⁴)因此，总体而言，即使只是轻微程度，通过使黑人和棕色人种更难找到工作，`EyeDetect`将这些人群推向更容易被捕的环境。现在，真正的关键来了：更高的逮捕率导致背景调查（即使是老式的那种，因为逮捕记录是其主要工具之一）的失败率更高，这反过来又提高了米克尔森提到的用于调整`EyeDetect`灵敏度的“基准率”。可怕的讽刺是，这只会进一步加剧`EyeDetect`输出中的种族差异。\n\
  \n你明白这一切了吗？总而言之，从总体上看，`EyeDetect`对黑人和棕色人种产生更多误报，这使他们失去工作，将他们推向贫困和警察高度巡逻的社区，导致逮捕记录增加，进而导致背景调查失败，从而引发对`EyeDetect`的重新校准，导致对这些人群产生更多的误报。就这样，有害的歧视性循环一遍又一遍地重复，并且愈演愈烈。你可能会认为这有些牵强——这个过程有这么多步骤，而且多次提到的是总体行为而非个体——但唉，在过去几年里，我们已经了解到这些有害的数据驱动反馈循环是非常真实且非常危险的。如果你不相信，请看看脚注\
  \ 13 中的书籍或任何其他关于此主题的优秀著作。\n\n尽管显然未能通过弗莱普遍接受标准，但在 2018 年 5 月，`EyeDetect`首次被用于法庭案件，在新墨西哥州地区法院审理一名被指控强奸一名\
  \ 14 岁女孩的前高中教练的案件（陪审团未能达成一致裁决）。^(¹⁶⁵) 2019 年 4 月，康维鲁斯在公司网站上发布了一篇博文，^(¹⁶⁶)鼓励特朗普总统对全体白宫工作人员进行`EyeDetect`测试，并解释了他可以如何操作的后勤细节，以帮助遏制令人尴尬的泄密事件。我想我不需要指出，一家名为“与真理同在”且从事“欺骗检测行业”的公司，竟然在协助一位——怎么说呢——不太诚实的总统向公众隐瞒他的秘密，这其中有多么讽刺。\n\
  \n不出所料，康维鲁斯并不是唯一一个想要通过机器学习重新发明测谎仪的组织。\n\n\n\n### 深度学习微表情\n\n在 21 世纪初，神经网络尚未引发如今日般的深度学习革命之前，曼彻斯特城市大学的一名博士生珍妮特·罗斯韦尔，与她在计算机科学系的博士导师祖海尔·班达尔，利用少量人们诚实与不诚实回答问题的视频片段，训练了一个神经网络测谎算法。罗斯韦尔-班达尔算法在高度理想化数据的简单测试中达到了约\
  \ 80%的准确率（所有实例中光照条件完全相同，且如果有人戴眼镜，算法就会完全失灵）。这虽有些前景，但远不足以令人信服。令罗斯韦尔惊讶的是，她所在的大学发布了一篇新闻稿，宣称她的项目是一项将使测谎仪过时的新发明。罗斯韦尔于\
  \ 2006 年离开了该项目和大学，转而从事其他工作。\n\n另一方面，班达尔与两名新学生继续开发该项目多年，并于 2019 年 1 月，三人基于该技术创立了一家名为*Silent\
  \ Talker*的初创公司。这是市场上首批由深度学习驱动的测谎仪之一。联合创始人之一吉姆·奥谢（他追随导师的脚步，现为曼彻斯特城市大学的高级讲师）自豪地承认^(¹⁶⁷)了他们产品的黑箱特性：“心理学家常说你应该对系统如何运作有某种模型，但我们没有运作模型，也不需要。我们让\
  \ AI 自己搞清楚。”就在 2020 年 3 月，班达尔表示他的公司正在洽谈向律师事务所、银行和保险公司出售该技术——一如既往用于就业筛查，但也用于欺诈检测。奥谢表示，它也可用于员工评估。^(¹⁶⁸)\n\
  \n《麻省理工科技评论》报道^(¹⁶⁹)称，2018 年，一项将在一年后构成 Silent Talker 基础的技术参与了一项名为*iBorderCtrl*的实验性计划，该计划由欧盟资助，并在希腊、匈牙利和拉脱维亚的边境对志愿者进行了测试。宣布这一实验性项目的一份新闻稿^(¹⁷⁰)解释说，该项目“旨在提供更高效、更安全的陆路边境口岸，以协助边境警卫识别非法移民，从而有助于预防犯罪和恐怖主义。”新闻稿进一步提供了更多细节：“旅客将使用在线应用程序上传护照、签证和资金证明的图片，然后使用网络摄像头回答由计算机动画生成的边境警卫提出的问题，该警卫会根据旅客的性别、种族和语言进行个性化设置。这种独特的‘欺骗检测’方法通过分析旅客的微表情来判断受访者是否在撒谎。”（根据旅客的种族进行个性化设置？我无法想象偏见会如何渗透到这样的系统中……）在边境，被系统标记为高风险的旅客将接受更详细——也更传统——的检查。\n\
  \n《麻省理工科技评论》的报道指出，在 2018 年 iBorderCtrl 宣布之后，“活动家和政治家谴责该计划是监控国家前所未有的、奥威尔式的扩张。”一位荷兰籍欧洲议会议员兼中左翼政党领袖警告欧盟委员会，这是“更广泛趋势的一部分，即使用不透明且往往有缺陷的自动化系统来判断、评估和分类人群。”欧盟委员会似乎领会了暗示，并将该项目从实际试点重新定位为更理论化的研究项目，一位官员表示，欺骗检测系统“最终可能不会纳入设计中。”\n\
  \n2019 年，《拦截》杂志的记者在穿越塞尔维亚-匈牙利边境时，得以亲自试用 iBorderCtrl 系统。^(¹⁷¹)他们被问了 16 个问题，并对所有问题都给出了诚实的回答，然而基于\
  \ Silent Talker 的系统将其中四个回答判定为谎言——导致总体评估认为该旅客不诚实，需要当面进一步询问。这显然是一个误报。通常情况下，旅客不会被告知测谎报告，但这里的记者是通过欧洲版的《信息自由法》请求获得的。同年早些时候，米兰一个数字人权中心的学者使用相同的法律机制请求获取关于\
  \ iBorderCtrl 测谎系统的内部文件，但他们收到的文件“经过了大量删减，许多页面完全被涂黑。”其中一位学者以不信任和沮丧的态度回应^(¹⁷²)道：“那些文件里写了什么？该联盟如何证明使用这种伪科学技术的合理性？”\n\
  \n事实证明，Silent Talker 并非唯一一家为机场安检提供人工智能测谎服务的初创公司。一家名为*Discern Science International*（DSI）的公司于\
  \ 2018 年成立，其产品名为*Avatar*，提供的服务与 iBorderCtrl 中的非常相似：一个虚拟的边境警卫向旅客提出一组预先录制好的问题，系统捕获旅客的回答（包括视频和音频），并使用机器学习将每个回答标记为诚实或不诚实。该公司表示，该系统会寻找声音和面部中的“欺骗信号”，例如据说由说谎时的认知压力引发的非自愿“微表情”。\n\
  \nAvatar 是亚利桑那大学学者过去几年进行的一个研究项目的商业化成果。已知原型^(¹⁷³)已在罗马尼亚的一个机场和亚利桑那州的一个美国边境口岸进行了测试。加拿大边境服务局也对其进行了测试，但仅限于实验室环境，官方回应并不热情：“该实验以及整个技术存在许多重大局限性，导致我们得出结论，它并非现场测试的优先事项。”DSI\
  \ 表示，这些测试的准确率在 80%到 85%之间。虽然肯定比随机猜测要好，但这在现场应用中确实留下了大量错误评估。尽管如此，据报道^(¹⁷⁴)，2019 年\
  \ 8 月，Discern 已与一家未具名但知名的航空组织建立了合作伙伴关系，并计划在数月内向机场推广 Avatar。DSI 的网站目前表示，“欺骗检测技术应用的初始市场将是机场、政府机构、公共交通枢纽和体育场馆。”\n\
  \n\n\n### 从视频到音频和文本\n\n虽然`Silent Talker`依赖视频数据，而`Avatar`同时依赖视频和音频数据，但你可能想知道，是否有人尝试过在没有视觉成分的情况下进行人工智能测谎。确实有。`Nemesysco`是一家以色列公司，提供商业人工智能语音分析软件，已被纽约和中西部的警察部门用于审讯嫌疑人，也被债务催收呼叫中心使用。另一家名为`Neuro-ID`的初创公司甚至根本不需要看到或听到任何人——它专注于鼠标移动和按键操作。它已被银行和保险公司用于帮助检测欺诈。与这类事物一样，误报是一个严重问题。`Neuro-ID`的一位发言人澄清了该产品的预期用途^(¹⁷⁵)：“不存在\
  \ 100%准确的基于行为的分析。我们建议的是，你将此与申请人的其他信息结合使用，以做出更好的决策，并更有效地抓住[欺诈客户]。”\n\n一项学术合作在 2019\
  \ 年 2 月发表了一篇论文^(¹⁷⁶)，声称提供了迈向“在线测谎系统——或一种在无法面对面交流时，针对计算机中介欺骗的检测原型系统”的第一步。其想法是训练一个机器学习算法，在两人实时文本聊天的背景下区分说谎和说实话。该算法不仅依赖文本消息中的词语，还依赖它们的打字速度。我原本会猜测欺骗需要更多思考，因此表现为更慢的响应时间，但这篇论文的作者声称说谎与更快的响应速度相关；也许说谎确实需要更多时间，但说谎者意识到了这一点，因此为了掩盖欺骗而更快地回答以进行补偿。作者还发现，说谎者在交流中有更多焦虑的语言迹象、更多的负面情绪、每次回复中更多的词汇量，以及更多诸如“总是”和“从不”这样的确定性表达。诚实的回答，除了更慢、更短、更少负面/焦虑和更不确定（涉及“也许”和“猜测”等词）之外，还使用了更多诸如“因为”这样的因果表达。总体而言，该算法的准确率达到\
  \ 82%——再次强调，这比随机猜测要好，但在我看来，还不足以在实践中依赖。\n\n此外，这个在线测谎系统是在一个非常受控、有限且人为的环境中训练和评估的。几十名参与者参加了一个文本聊天游戏，他们被分成两人一组，然后每组通过提问和回答进行对话。这个游戏的主要规则是，在每次对话开始时，每个人被告知他们必须要么诚实地回答所有问题，要么不诚实地回答所有问题。因此，该算法并非试图将单个回答分类为真实或欺骗，而是将每次对话中的参与者分类为习惯性说实话者或习惯性说谎者。这在预期的准确性方面造成了巨大差异，并且强烈表明这是一个在现实中永远不会实际发生的模拟环境。不仅如此，正如著名数据科学家凯茜·奥尼尔所指出的^(¹⁷⁷)，在实验室环境中被指示说谎的人的行为，与在现实世界中利害攸关的熟练说谎者的行为截然不同。她直言不讳地称这是一项“糟糕的研究”，对当场抓住老练的说谎者“毫无意义”。类似地，纽约大学人工智能现在研究所的联合创始人凯特·克劳福德指出，这个实验检测的是“表演”，而非真实的欺骗行为。\n\
  \n## 假新闻\n\n想象一下，有一个算法能实时告诉你某人是否在说谎。这将是打击假新闻和虚假信息的强大武器。YouTube 网红的一个惊人说法可以立即被揭穿为捏造的阴谋论；政治家在新闻发布会或辩论中的断言可以在说出口的瞬间被揭示为谎言；目击者证词可以被审查和验证；你在\
  \ Facebook 上那个可疑的朋友，发送关于有争议政治事件的欺骗性聊天信息，会在每一次不诚实行为中被抓住。可惜，这样的算法是一个无法实现的幻想。虽然人工智能通过提供基于视频、音频或文本的现代测谎仪变体，重振并复兴了欺骗检测行业，但无法逃避一个基本事实：说谎没有科学可言。谎言是独特的、无法识别的、不可预测的——这还是指故意的谎言；无意的虚假陈述显然没有任何机会被本章讨论的任何方法检测到。\n\
  \n正如你在本章中所见，学术研究和公司网站上关于各种基于人工智能的测谎算法能力的夸大其词，简而言之，大多只是假新闻。本质上，对这些测谎方法中每一种的所有实证调查，都是由对该方法表现良好有直接经济利益的机构闭门进行的。这些实验往往是人为的且范围有限，报告中的准确性描绘了一幅关于可能性的、具有误导性的乐观图景。这些产品的训练数据集几乎肯定都太小，并且要么因历史偏见，要么因对多样化人群/情境的接触有限（或两者兼有）而存在偏差。此外，机器学习算法的黑箱性质意味着，没有人真正知道人工智能测谎系统为何如此运作，也不知道它实际上在做什么。\n\
  \n1923 年的弗莱案基本上决定了测谎仪在法庭上的命运，随后的立法也极大地限制了其在企业中的使用（尽管公共部门的就业筛查是监管网络中的一个巨大漏洞）。法律体系需要时间来赶上快速发展的技术世界。我们现在正处于一个危险的历史时期，测谎仪已被人工智能重塑，并在决定性的弗莱时刻到来之前迅速蔓延到社会的许多领域——那个时刻将踩下刹车，以遏制对一种根植于伪科学、利润丰厚但未经证实的技术所进行的考虑不周和过度热心的应用。正如帮助发起反对`iBorderCtrl`的公众运动的学者和隐私活动家维拉·王尔德所说^(¹⁷⁸)：“这是读心术的承诺。你可以看出它是骗人的，但这就是他们在卖的东西。”\n\
  \n西格蒙德·弗洛伊德曾写道：“没有凡人能保守秘密。如果他的嘴唇沉默，他就会用指尖喋喋不休。背叛从他每一个毛孔渗出。”但杜克大学的行为心理学家丹·艾瑞里指出^(¹⁷⁹)：“我们有巨大的能力去相信自己的谎言。一旦我们相信了自己的谎言，我们当然就不会提供任何不当行为的信号。”1965\
  \ 年去世前不久，本章前面简要提及的原始测谎仪的共同发明人、伯克利警察拉尔森，对他的发明留下了一个不祥的警告，这显示出比他那位偏执狂的共同发明人马斯顿更多的审慎：“超出我的预期，由于不可控的因素，这项科学调查实际上变成了一个弗兰肯斯坦的怪物。”这个怪物在人工智能时代今天重获新生。\n\
  \n\n\n"
- '# 摘要


  测谎仪的历史漫长而曲折，始于 1915 年至 1921 年间马斯顿（神奇女侠的创作者）及其妻子霍洛威，以及伯克利一位名叫拉森的警官的研究。马斯顿说服政府调查其发明的有效性，但官方的回应是基于常识和历史洞察的怀疑态度。为了产生革命性的影响，马斯顿试图在
  1923 年的一起谋杀案审判中用他的设备证明一名被告的清白，但他的努力被法庭驳回，反而催生了至今仍作为法律的**弗莱标准**：专家证人的证词只有在所依据的技术被科学界普遍接受时，才能在法庭上采纳。测谎仪当时未能通过这一测试，如今新型的
  AI 驱动算法变体也同样未能通过。


  尽管如此，过去几年间，人们对 AI 测谎的兴趣激增。一些方法依赖视频，另一些依赖音频，还有一些仅依赖文本。它们都面临着缺乏透明度、夸大准确性声明、高得令人不安的误报率，以及对少数群体造成不成比例影响的偏见等问题。但这并未阻止它们被用于就业筛选和欺诈检测，甚至偶尔出现在法庭上（尽管有弗莱标准），并在机场安检和其他场景中进行试验。鉴于所有这些缺陷、过度商业化的热情、企业保密行为，以及甚至缺乏尝试建立科学基础的尴尬局面，测谎仪——即使以
  AI 重新发明——似乎也永远无法以遏制假新闻所需的一致性来检测谎言。相反，在这个故事中，利用花哨技术窥探思想并可靠地识别欺骗的神话般能力，本身就是假新闻。


  如果我们无法使用算法测谎仪来揭露假新闻并在有争议的问题上获得真相，也许我们应该像数亿人每天所做的那样：去谷歌搜索一下。但要小心——正如你将在下一章中看到的，那里的幕后算法同样在系统地扭曲我们对现实的感知。


