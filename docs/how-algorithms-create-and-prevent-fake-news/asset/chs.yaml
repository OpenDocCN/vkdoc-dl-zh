- "# 9. 真相的工具\n\n面向记者与公众的事实核查资源\n\n> *谎言疾驰，真相蹒跚其后，待到人们醒悟时，为时已晚；玩笑已过，故事已生效。*\n>\n>\
  \ ——乔纳森·斯威夫特，1710 年\n\n本章首先讨论一系列由机器学习驱动的、公开可用（且大多免费）的事实核查工具；这旨在帮助你了解有哪些类型的工具可用，并深入了解它们的工作原理。最后，本章将简要探讨事实核查在谷歌、YouTube、脸书和推特等平台上的角色与范围。\n\
  \n## 在线工具\n\n在本节中，我将介绍一些能够以不同方式辅助事实核查、并在不同程度上涉及机器学习算法的在线工具。这仅仅是现有工具中的一小部分样本，还有一些未在此讨论的有用产品，它们巧妙地将多种方法整合到一个用户友好的工具中。我在此的主要目标并非提供一份详尽的软件包清单——因为这样的清单很快就会过时。相反，目标是说明机器学习如何被应用于事实核查流程，并帮助你理解自动化与半自动化事实核查背后的实际运作机制。\n\
  \n### Full Fact\n\n总部位于伦敦的慈善组织 *Full Fact* ^(³³⁸) 提供一系列免费的事实核查服务，包括对已核查话题的关键词搜索。虽然驱动这些事实核查的分析工作由人类专家完成，但机器学习以多种方式辅助这些专家，为他们提供工具，使工作更快速、更轻松。文本段落——通常来自文章、政治演讲、社交媒体帖子等——首先被分解为单个句子，然后使用谷歌的\
  \ `BERT`（在第 6 章中讨论过）以具有上下文意义的方式对每个句子中的单词进行数值编码。这种数值编码支持对每个句子中的“主张”进行算法检测和分类：像“GDP\
  \ 增长了 5%”这样的陈述被视为定量主张，而“这项经济政策导致碳排放减少”则是因果主张，“经济将增长 5%”则是预测性主张。这使得人类事实核查员能够快速浏览每份文档，迅速定位需要核查的主张及其类型。\n\
  \n`BERT` 编码还被用于估算每个识别出的主张是否与已核查主张档案中的某条匹配。毫不意外，大多数主张并非只出现一次，它们会以多种形式和在不同位置出现，因此，对每个主张的实质内容进行一次核查，而不是核查其每一次出现和细微变体，能节省大量时间。机器学习还用于根据当前事件和其他因素，识别每天最迫切需要核查的主张。这种让机器学习辅助而非取代人类审核员的混合方法非常明智；正如你可能从上一章中回忆起的，这与脸书的内容审核方法在精神上相似。`Full\
  \ Fact` 在其网页上直接声明：“人类不会很快消失——我们也不希望他们消失。”\n\n\n\n### Logically\n\n一家总部位于英国和印度的初创公司`Logically`提供了一套打击假新闻的工具。与`Full\
  \ Fact`类似，这家公司利用机器学习来辅助人工事实核查员，而非取代他们——或者，正如`Logically`官网诗意地表述，是“补充人类智能，而非取代它”。大致而言，其事实核查服务的工作流程如下：首先，用户提交一篇文章或帖子的链接，`Logically`利用机器学习识别其中的关键主张，这与我们看到的`Full\
  \ Fact`类似，区别在于这里不会对主张进行分类——而是提示用户选择其中一个已识别的主张作为重点。接着，利用机器学习搜索与所选主张相关的证据以及`Logically`之前的事实核查记录。如果找到高度匹配的事实核查结果，则无需人工干预；否则，该主张会被发送给人工事实核查团队，待完整报告完成后返回（并添加到已完成事实核查的数据库中）。\n\
  \n该公司还提供一项服务，通过结合上一章讨论的三种不同类型的预测因子，利用机器学习算法来“识别任何文本内容的准确性和可信度”：基于内容的特征（直接从文本中提取含义）、基于网络的特征（量化内容在社交媒体上的传播情况），以及基于元数据的特征（考虑诸如内容发布者及其来源等信息）。但除了这个模糊的列表外，并未提供关于这些预测因子或算法本身的任何细节。2020\
  \ 年 8 月，`Logically`推出了一款 Chrome 浏览器扩展程序，集成了公司部分服务；2021 年 2 月，宣布与 TikTok 合作，帮助检测该平台上的错误信息。\n\
  \n### Squash\n\n杜克大学旗下的记者实验室（Reporter's Lab）试验了一项名为`Squash`的实验性自动化事实核查服务。它与`Full\
  \ Fact`和`Logically`类似，主要步骤是将主张与人工进行的事实核查数据库进行匹配——但这里的重点在于实时口语陈述，因此首先会应用语音转文本算法。其结果是，用户可以在观看现场政治演讲和活动时，自动弹出事实核查气泡，不过该产品仍被认为处于研发阶段。\n\
  \n### FakerFact\n\n优步自动驾驶汽车部门的数据科学主管迈克·塔米尔（Mike Tamir）开发了一款名为`FakerFact`的免费工具，用于分析用户粘贴或提供链接的文本段落。虽然有时被宣传为在线事实核查工具，但该工具的网站明确表示，它“永远不会告诉你一篇文章是真是假”，其职责是“让读者能够识别一篇文章是专注于可信信息分享，还是旨在通过事实以外的手段操纵或影响读者”。这种崇高的描述听起来很有用，但实际上该工具只是一个风格分类器——它使用监督式深度学习，在数百万份文档上进行训练，将每篇文章标记为新闻、百科、讽刺、耸人听闻、观点或议程驱动。它并不试图识别文章中的事实，更不用说验证其准确性了；相反，它寻找与这些不同风格相关的用词模式。该工具的一个优点是，它不会只给出一个预测的风格标签，而是输出多个风格标签，每个标签都附有置信度评分。另一个优点是，它通常会高亮显示文本段落中对算法选择标签影响最大的特定句子。\n\
  \n然而，在我教授一个学期的数据科学课程时，我让学生们用`FakerFact`做实验，我们发现结果非常不可靠——而且常常令人捧腹。一名学生指出，美国宪法被标记为“观点”和“讽刺”。当我粘贴本书第一章时，`FakerFact`显示“这个听起来很傻”，并同样将其判定为“观点”和“讽刺”。就在刚才，我把《纽约时报》的第一个链接（一篇关于新冠疫苗试验的文章）输入`FakerFact`，它被标记为“耸人听闻”。奇怪的是，一些被高亮显示为对判断有影响的段落确实有道理：“包括迈阿密海滩在内的迈阿密-戴德县最近经历了全美最严重的疫情爆发之一，超过\
  \ 3.2 万佛罗里达人死于该病毒，这是该州领导人极少承认的难以想象的代价。”但其他段落似乎一点也不耸人听闻：“三分之二的参与者接种了疫苗，剂量间隔四周，其余参与者接种了生理盐水安慰剂。”但愿优步的自动驾驶汽车能比这个文本分析工具准确一些。\n\
  \n### 滑铁卢大学的立场检测\n\n加拿大滑铁卢大学的一个研究团队将全自动化事实核查流程分解为四个步骤：\n\n1.  检索与待核查主张相关的文档。\n2.\
  \  确定每份文档的“立场”，即它是支持、反对该主张，还是持中立/无关态度。\n3.  根据文档来源为其分配可信度评分。\n4.  结合文档立场（以文档可信度评分为权重）为该主张分配真实性评分（并高亮显示文档中的相关事实/背景信息）。\n\
  \n第一步可能比较棘手，因为它比`Full Fact`、`Logically`和`Squash`进行的匹配步骤更具开放性：不是在一个特定的事实核查数据库中搜索与主张匹配的内容，而是需要搜索整个网络，寻找可能包含与主张相关信息的文档。谷歌使用`BERT`分析用户搜索查询中的文本，让我们离这个目标更近了一步，但仍有许多挑战。第三步本质上就是谷歌和\
  \ Facebook 已经在做的事情——通过谷歌的`PageRank`和人工评估员，以及 Facebook 的`NEQ`评分，正如你在第 6 章和第 8 章中看到的。一旦前三步完成，第四步就很简单了，因此滑铁卢团队决定专注于第二步——立场检测——看看这一步骤的自动化程度能有多高。\n\
  \n他们使用了一个包含五万篇文章的数据集来训练一个深度学习分类算法，该算法会查看每篇文章的正文和标题，并估算正文是赞同标题、反对标题、讨论标题但不表明立场，还是与标题无关。他们的算法取得了相当可观的\
  \ 90%准确率，远高于其他研究人员之前的尝试。他们工作的主要洞见在于，从 Facebook 庞大的预训练深度学习算法`RoBERTa`开始，然后进行额外的针对性训练，以微调算法使其适用于当前特定任务。这种微调大规模预训练深度学习算法的通用过程被称为“迁移学习”，并且是人工智能领域极为成功的方法，因此这无疑是处理立场检测问题的正确途径——只是在`BERT`和`RoBERTa`出现之前，这还无法实现。\n\
  \n我认为滑铁卢大学这种立场检测方法的原型目前尚未公开可用，而且为了真正有效，我们还需要在文档检索步骤上取得进展。尽管如此，这是一项前景广阔的工作，很可能在不久的将来被整合到用户友好的软件中。\n\
  \n\n\n### SciFact\n\n艾伦人工智能研究所（你在第 2 章中曾简要了解过其用于检测 GPT-2 生成文本的 Grover 系统）开发了一款名为`SciFact`的免费工具^(³⁴⁵)，用于帮助核查与\
  \ COVID-19 相关的医学主张。用户输入一个论断，或从建议列表中选择一项，例如“SARS-CoV-2 病毒载量越高，症状越严重”，系统便会返回一系列医学研究出版物，每篇都附有预估评分，显示其在多大程度上支持或反驳该论断——这与滑铁卢团队的立场检测类似——同时还会提供每篇出版物中若干可能相关的摘录。当我尝试这个关于病毒载量的论断时，系统返回了七篇文章，其中四篇支持、三篇反驳——尽管并非所有文章都看起来相关或标注准确，但结果足以表明，在这个问题上并不存在强烈的科学共识。\n\
  \n他们的算法使用`BERT`处理文本，并按照以下方式进行了微调。首先，收集了一个规模适中的医学出版物集合，并提取了其中的引用句（即包含对其他研究出版物引用的句子）。接着，人类专家将这些句子手动改写为医学论断；他们被允许使用每个引用句周围的文本，但不能使用被引用的论文本身。人类专家还创建了这些论断的否定版本，以便算法能获得被文献反驳的论断示例，而不仅仅是得到支持的示例。然后，他们逐一人工判断每个论断是否确实被其引用的文章所支持、反驳，或者是否存在足够信息做出判断——在被标记为支持或反驳的情况下，专家们会高亮显示文章摘要中为这一标签提供最有力依据的段落。大致来说，这个过程就是他们训练基于`BERT`的算法以完成三项任务的方式：检索与给定论断相关的文章，评估每篇文章相对于该论断的立场，以及从每篇文章的摘要中提取相关段落。\n\
  \n研究人员的框架原则上适用于所有类型的医学和科学论断——而不仅仅是与 COVID 相关的——但由于训练算法涉及对数据进行细致的人工处理，他们决定最初在有限的环境和范围内推出该工具。读者需注意，研究人员也坦然承认，该工具主要旨在展示可能实现的功能以及尚存的挑战，而非供人盲目信任。他们测试了数十个\
  \ COVID-19 论断，发现算法在大约三分之二的情况下能返回相关论文并正确识别其立场。虽然该工具不应取代手动查找和阅读论文，但它或许仍有助于对医学主张进行快速的初步评估。\n\
  \n### Diffbot\n\n记录事实信息的一种方式是使用*知识图谱*，这是一种对实体间相互关联描述进行编码的网络结构。可以将其想象为一组本质上采用“主语-谓语-宾语”格式的事实集合，它们相互契合，为彼此提供详细说明和语境关联。一个非常简单的例子是信息的嵌套——波士顿位于马萨诸塞州，马萨诸塞州位于新英格兰，因此隐含的事实关联是波士顿位于新英格兰——但还有许多其他更多样化、更灵活的关系配置也是可能的。知识图谱是一种在计算机中存储信息的便捷方式，便于搜索、共享和扩展。谷歌构建了一个庞大的知识图谱，为许多搜索中显示的信息面板提供支持。谷歌表示，其知识图谱来源于数百个来源，其中维基百科是“一个常被引用的来源”，并且截至\
  \ 2020 年 5 月，它包含了关于 50 亿个实体的 5000 亿个事实^(³⁴⁶)——但谷歌一直极其不愿透露构建该知识图谱的任何技术细节。\n\n另一个庞大的知识图谱正由一家名为`Diffbot`的初创公司构建^(³⁴⁷)，该公司一直在抓取整个公共网络以获取事实。（据说`Diffbot`、谷歌和微软是已知仅有的三家出于任何目的爬取整个公共网络的公司。）它每月新增超过一亿个实体。`Diffbot`基于其知识图谱提供了一系列服务，其首席执行官表示^(³⁴⁸)，他最终希望用它来驱动一个“通用事实问答系统”。有趣的是，他在这里使用了“factoid”一词，该词在一般用法中既可以指一条事实信息片段，也可以指一个被反复提及以至于无论真假都被当作常识接受的陈述。我怀疑`Diffbot`实际上捕获的是后者，因为它从整个网络中提取信息，而不像谷歌那样只使用某些经过审查的来源。这让我感到担忧。我们都知道不能相信在网上读到的一切，那么为什么我们要相信一个通过阅读网络来收集所有知识的算法呢？我乐观地认为`Diffbot`的开发人员已尽力只将准确信息纳入其知识图谱，但对于他们在这方面是否成功，我远没有那么乐观。在我看来，这个项目既有价值又值得去做，但也充斥着那种当不可避免的缺陷和偏见出现时，一贯会损害人工智能公众形象的傲慢与炒作。\n\
  \n### Twitter 机器人检测\n\n`Bot Sentinel`^(³⁴⁹)本质上是 Twitter 内部用于自动检测机器人账户的机器人检测系统的公开版本。它使用机器学习技术（沿袭上一章讨论的思路）来检测\
  \ Twitter 上的机器人，并允许用户自由浏览这些被检测账户的数据库并追踪其活动。`Botometer`^(³⁵⁰)是一个相关的免费工具，你可以输入一个特定的\
  \ Twitter 用户名，然后它会应用机器学习分类方法（同样，类似于上一章讨论的方法）来评估该账户是机器人还是人类；它还会对指定账户的所有关注者提供机器人/人类的评估。`BotSlayer`^(³⁵¹)是一个免费的浏览器扩展，帮助用户检测和追踪那些以协调方式在\
  \ Twitter 上传播、暗示存在机器人活动的标签及其他信息。\n\n\n\n### Google 反向图片搜索\n\n谷歌的图片搜索标签页允许你进行关键词搜索，结果会显示网络上的图片，而非网站链接。你也可以将一张图片拖放到该标签页的搜索栏中，谷歌会搜索网络上与你提供的图片视觉上相似的图片；这被官方称为“反向图片搜索”，不过我认为更好的名称或许是“基于图片的搜索”，以区别于常见的关键词搜索。这项功能可以在多个方面帮助你对抗假新闻。如果你觉得正在阅读的文章中的某张图片被篡改过，可以尝试用该图片进行搜索，或许能找到未经修改的原版。即使图片未被篡改，你阅读的文章也可能断章取义地误导性地使用该图片（回想一下第\
  \ 3 章中那些具有欺骗性的标题示例）；搜索这张图片会显示它在网络上其他出现的位置，这有助于你追溯其原始出处。\n\n那么，这种图片搜索是如何工作的呢？你可能还记得第\
  \ 3 章中提到，自编码器是一种深度学习架构，它能自我学习如何压缩数据。当专门应用于图像数据时，它会找到对图像中有意义的视觉结构进行数值编码的方法。一个过于简化的例子是，人脸图片可能会被缩减为几个数字，分别表示对象的年龄、发色、发型等——但实际上，自编码器使用的数字并没有如此简单的人类可解释含义，因为它们是由算法自身生成的。反向图片搜索最常用的方法如下：首先，使用自编码器将网络上的每张图片表示为一个数值向量。可以将其想象成这些图片的路线图，其中的数值向量是经纬度坐标的高维类比。自编码器的美妙之处在于，视觉上相似的图片会在这张地图上彼此靠近。然后，当用户用一张图片进行搜索时，该图片会被同一个自编码器转换为数值向量——即确定了它在地图上的坐标——而搜索返回的图片，就是那些坐标与输入图片坐标最接近的图片。\n\
  \n也有一些工具可以对视频进行反向搜索。通常，这并非直接对整个视频进行数值编码，而是通过从视频中采样若干静态图像，然后搜索包含相似静态帧的其他视频来实现。换句话说，自编码器是在图像层面而非视频层面应用的。\n\
  \n### 其他工具\n\n*Hoaxy* ^(³⁵²) 是一个免费的关键词搜索工具，它能构建交互式网络可视化，展示经过主要事实核查网站核查过的言论在推特上的传播情况。*The\
  \ Factual* ^(³⁵³) 是一个免费的移动应用和浏览器扩展，它利用机器学习来评估新闻文章的质量；其做法是结合几个与文章相关的不同估算量，例如记者的声誉评分、出版商的\
  \ NEQ 类型评分，以及文章语言主观程度的衡量指标。\n\n## 大型平台上的事实核查\n\n在本节中，我将探讨谷歌、YouTube、脸书和推特如何将事实核查功能嵌入其平台。\n\
  \n### 谷歌\n\n谷歌搜索本身无疑是帮助进行事实核查的常见信息来源，但在此我想重点介绍几个更直接聚焦于事实核查的附加功能。我之前提到过谷歌的知识图谱，它为某些搜索中出现的信息面板提供支持——虽然那里的信息并非总是准确，但谷歌允许用户提供反馈和更正。2020\
  \ 年 9 月，谷歌表示^(³⁵⁴) 已“深化了与政府机构、卫生组织和维基百科的合作关系”，以提高知识图谱的准确性。我还提到了谷歌的反向图片搜索如何成为揭示图片来源的有用工具。现在，让我转向其他一些与谷歌相关的有用工具和事实核查话题。\n\
  \n如果你在谷歌搜索中以关键词“fact check”开头，那么在众多搜索结果的下方，谷歌会尝试提取出一句话的声明、做出该声明的个人或组织，以及（如果能找到的话）由事实核查组织提供的对该声明进行核查的开头部分。例如，我刚才搜索了“fact\
  \ check AstraZeneca vaccine banned”，最上面的结果是来自 Full Fact 的事实核查链接——就在该链接下方，谷歌显示“声明：17\
  \ 个国家已在英国之外禁止使用阿斯利康疫苗”以及“声称者：脸书用户”和“由 Full Fact 核查：事实并非如此。当时……”。谷歌会自动将这类事实核查信息包含在某些关键词搜索中，并且在\
  \ 2020 年 6 月，它也开始将其包含在某些图片搜索的缩略图下方。^(³⁵⁵) 谷歌还有一个工具^(³⁵⁶)，允许用户直接对事实核查进行关键词搜索，并浏览近期的事实核查结果。\n\
  \n### YouTube\n\n2019 年 3 月，YouTube 开始为那些容易传播错误信息的主题搜索添加由第三方事实核查组织编写的信息面板——但这些事实核查实际上是针对关键词搜索的，而非其返回的任何特定视频。这项功能最初在印度和巴西推出，随后于\
  \ 2020 年 4 月扩展到美国，很大程度上是为了帮助应对与新冠疫情相关的错误信息泛滥。^(³⁵⁷) 一些事实核查组织，如 PolitiFact，提供对单个\
  \ YouTube 视频的事实核查，不过你需要通过 PolitiFact 的网站^(³⁵⁸) 来访问这些内容，而非直接在 YouTube 上获取。\n\n\n\n\
  ### Facebook\n\n除了上一章所述删除或降低可疑内容排名的努力外，Facebook 还与多家事实核查组织合作，为某些类型的误导性帖子提供警告、额外背景信息和事实核查。在\
  \ 2020 年大选前的九个月里，Facebook 对近两亿条经第三方事实核查机构辟谣的内容加贴了警告标签。上一章描述的 Facebook 内容标记系统用于识别需要事实核查的帖子；随后——与我们之前看到的某些公共事实核查工具类似——机器学习被用于根据所涉及的声明对帖子进行分组，以减少人工需要执行的事实核查数量。\n\
  \n由于信息（以及错误信息）通常以视觉迷因的形式在 Facebook 上传播，该公司特别致力于开发能够判断两张图片内容是否相似的机器学习方法。与反向图片搜索中将整张图片输入自动编码器不同，Facebook\
  \ 的方法是先识别照片中的关键对象，然后在自动编码过程中仅使用包含这些对象的子区域。一篇公司博客文章^(³⁵⁹)解释道：“这使我们能够找到那些使用了我们已标记图片中部分元素的声明复制品，即使整体图片彼此差异很大。”此外，`RoBERTa`的一个扩展版本也被用于将词嵌入和句子嵌入与图像嵌入相结合，类似于上一章提到的该公司“整体性”内容检测方法。\n\
  \n2016 年大选后与 Facebook 合作的事实核查组织之一是`Snopes`，但经过两年合作后，`Snopes`于 2019 年 2 月决定退出合作。`Snopes`就此事的官方声明^(³⁶⁰)中包含以下评论：“目前我们正在评估提供第三方事实核查服务的后果与成本，我们希望确切地确定，我们协助任何特定平台的努力，对我们的在线社区、出版物和员工而言，是否净收益为正。”在该声明发布当天的一篇采访^(³⁶¹)中，`Snopes`运营副总裁澄清说，这一决定背后的主要问题是，仅雇佣了\
  \ 16 名员工的`Snopes`被 Facebook 要求的大量事实核查工作压得喘不过气，并质疑这种劳动密集型方法对双方是否合理。他暗示，或许`Snopes`有限的资源最好用在别处，或许\
  \ Facebook 需要找到一种更有效的方式来限制其平台上虚假新闻的传播。他还抱怨了 Facebook 专有的、针对特定平台的事实核查方法：“事实核查人员所做的工作不必仅仅为了\
  \ Facebook——我们可以为事实核查人员构建惠及整个网络的东西，这也能帮助 Facebook。”另一名`Snopes`员工表示，该组织应回归其原创报道的重点，而不是因处理\
  \ Facebook 上铺天盖地的事实核查请求而分散精力。\n\n### Twitter\n\n2020 年 6 月，就在开始标记特朗普总统的一些推文为“可能具有误导性”或“美化暴力”的几天后，Twitter\
  \ 在一系列推文^(³⁶²)中讨论了该平台在公共话语方面“提供背景信息，而非进行事实核查”的重点。在很大程度上，Twitter 选择了极简主义的方法，仅在有限的情况下链接到事实核查网站。2021\
  \ 年 1 月，Twitter 启动^(³⁶³)了一个名为`Birdwatch`的小型实验性“社区驱动”试点项目，在该项目中，一组经过筛选的用户可以为任何人的推文添加注释，以提供额外的背景信息。最初，只有一千名用户能够撰写这些注释，并且它们仅在`Birdwatch`网站上可见，但\
  \ Twitter 表示计划扩大该项目，并最终“在获得广泛且多样化的贡献者共识时”，使这些注释直接显示在其所关联的推文上。\n\n## 总结\n\n本章以一系列利用机器学习辅助事实核查任务的公开可用工具开篇，并以对\
  \ Google、YouTube、Facebook 和 Twitter 的事实核查工具及活动的简要讨论收尾。现在，你可以行动起来，为打击虚假新闻贡献自己的一份力量！\n\
