- '# 关于作者




  '
- "# 页面浏览量的危害\n\n数据驱动的在线新闻经济学\n\n> *互联网经济学催生了一套扭曲的激励机制，使得流量比真相更重要——也更有利可图。*\n> \n\
  > ——瑞安·霍利迪，《相信我，我在撒谎：一个媒体操纵者的自白》\n\n我们了解（或自以为了解）的世界上正在发生的事情，大部分是通过阅读新闻获得的。但如今，“新闻”的含义与过去几代人相比已大不相同。我们今天主要阅读的是互联网上的文章——从随意的博客帖子，到国内外新闻网站上经过精心调查的报道，无所不包。新闻业从印刷品向屏幕的转型，本质上并不意味着我们读到的内容比过去更不真实。然而，这种技术变革催生了一种不那么明显却极具影响力的经济转型：新闻业的*数据化*。正如我将要讨论的，我们在互联网上留下的页面浏览量和点击量，正是滋养着日益增长的错误信息和假新闻花园的数字肥料。通过追溯当代新闻周期中涉及的财务激励，我希望在本章中揭示一个令人震惊的程度：那些我们大多数人看不见、却由我们的行为和活动创造的数据，正在从根本上塑造我们每天阅读的内容，并威胁着传统新闻标准的堡垒。\n\
  \n## 故事的传播\n\n让我先做一个分类。在互联网媒体食物链的底层，如果你愿意这么理解的话，是那些专注于特定议题、兴趣或领域的小型博客和网站；它们可以是单人作者或多作者。往上一层是报纸、杂志和电视台的博客。这是一个令人困惑的中间地带，因为许多这类博客共享一个知名新闻来源的名称、网址和标志，但其编辑标准通常低于母机构，而且许多撰稿人缺乏人们可能期望从母机构获得的新闻培训。最顶层是官方新闻网站，它们可能是区域性的，但往往吸引大量的全国性或国际性读者。这种层级划分并非关乎质量——事实上，一些非常专注的小型博客能产出极高品质的内容，而一些大牌全国性新闻网站却持续发布准确性严重存疑的文章。这里的层级更多关乎受众和机构的规模，以及内容的范围。\n\
  \n信息在这个互联网新闻层级中既垂直流动，也水平流动。当《华盛顿邮报》爆出一则重大新闻时，只需几个小时，《纽约时报》也会进行报道，反之亦然，而且往往只是通过报道另一家报纸文章中的内容。这就是*水平传播*，之所以会发生，是因为即使第二家报纸不能声称是爆出该新闻的功劳，它也不希望自己的读者直接从竞争对手的报纸那里获取这些信息。*垂直传播*则有两个方向。顶层爆出的重大新闻会被较小的新闻机构和博客报道和复制，因为与水平传播类似，这是一种无需做太多工作就能留住读者的简便方式；这是信息的*向下*流动。\n\
  \n虽然水平传播和向下垂直传播都存在明显的冗余，从而导致整体系统效率低下，但对于追求真相的读者来说，唯一真正的危害是，当故事从一个机构传递到另一个机构时，重要的细节可能会被遗漏，事实可能会被扭曲——尽管有时，一个更专业的博客会通过深入挖掘故事的某个特定方面，提供有价值的服务，而这对于顶层机构来说可能并不合适。找到一家报纸爆出的新闻，然后比较它在其他一系列报纸和博客上的报道，会非常有启发性；这是揭示不同机构意识形态倾向的绝佳方式，因为同样的事实会因涉及的不同观点而被着色。\n\
  \n剩下的新闻传播形式是*向上*的垂直流动，即故事始于小型博客，有时最终会一路到达全国性新闻网站。这是本章的关键主题之一，因为它导致了我们所见到的数量惊人的错误报道和彻头彻尾的假新闻，而且这几乎完全是由数据和现代媒体的经济学驱动的。在探讨这个具体主题之前，退一步审视驱动博客和报纸的财务力量会有所帮助；在此过程中，我对“博客”采取宽泛的定义，将其基本涵盖所有在线发布书面内容的形式。\n\
  \n\n\n"
- '# 博客经济学


  表面上看，博客的收入来自出售广告。在线广告有多种金钱机制，例如广告公司把横幅广告固定在博客顶部，并根据*页面浏览量*（即看到横幅广告的博客访客数量）付费；在某些情况下，当博客读者点击广告链接并最终从广告公司实际购买产品时，广告商还会额外支付一笔费用。但最常见的形式是按展示付费和按点击付费广告，即博客在其网站的某个位置放置广告，并根据*展示量*（广告被博客读者看到的次数）或*点击量*（广告被博客读者点击的次数）获得报酬。归根结底，要最大化广告收入，博客需要最大化流量。


  但为什么我在上一段中要写“表面上看”呢？嗯，这里存在某种庞氏骗局的动态机制。即使是热门博客，广告收入也往往相对较低，因此大多数博客的真正野心——即使它们不承认——是获得足够的人气和流量，以便被一个更大的组织收购，并将其整合到更大的网站中以增加流量——这通常是为了让更大的网站提高被更大型组织收购的几率。


  例如，内特·西尔弗那个技术性强却出奇受欢迎的政治民调博客于 2008 年上线，2010 年被《纽约时报》引入，2013 年被 ESPN 收购，随后在 2018
  年转至其姊妹公司 ABC 新闻。阿里安娜·赫芬顿开创性的综合新闻博客《赫芬顿邮报》于 2005 年以一百万美元的投资创立，并在 2011 年以三亿五千万美元的价格卖给了美国在线——但颇具说明意义的是，在出售时，其年广告收入仅为三千一百万美元。这种收购价与年收入十倍的比例相当极端，表明美国在线押注于持续的长期增长以及其他因素，例如增加这样一个受欢迎的在线报纸所带来的声望，以及将超级明星阿里安娜本人招致麾下。归根结底，无论一个博客的目标是否是被收购，成功的道路都是网络流量。


  接下来，让我从博客的经济学转向博主本身的经济学。在博客的早期，博主要么按固定费率获得报酬，并需满足每日最低发帖量，要么按每篇帖子付费；在 21 世纪初，根据机构不同，这个费率通常低至每篇帖子五到十美元。当《Gawker》放弃这种按篇付费制度，转而每月向每位博主支付基本工资，并根据其文章记录的页面浏览量增加奖金时，一场范式转变发生了。从广告收入的角度来看，这种转变是合理的，并且迅速波及了整个博客圈，开启了一个新时代，在这个时代，页面浏览量成为了博客的基本货币。


  《Gawker》甚至更进一步，在其办公室安装了一块大板，实时显示所有博主及其帖子的页面浏览量统计数据（其他博客很快也采用了类似方法）。这导致了公司内部博主之间激烈的页面浏览量竞争，旨在刺激生产力，并标志着对数据分析的高度重视，使得博主们不得不关注哪些文章产生了最多的页面浏览量。


  这种博主薪酬制度公然是简化论的：读者对博文的看法无关紧要。事实上，读者是否真的阅读了帖子都无关紧要——一旦帖子的链接被点击，页面浏览量就被记录下来，这才是唯一重要的。一个不幸但基本可预见的后果是标题党的泛滥：那些
  catchy 的、通常是低俗的标题，鼓励点击而非体现优质新闻业。^(¹) 一篇经过方法严谨研究、事实核查的长文，其经济价值并不比一篇空洞的小报垃圾文章高。这过于简化了情况，因为许多读者关注某些博客恰恰是因为它们持续发布高质量文章，但许多读者在浏览社交媒体或新闻聚合器时，也会点击任何最吸引眼球的故事，而在后一种情况下，博客/机构的名声和声誉往往是点击决策中的次要因素——最重要的是标题。


  另一个重要的动态因素是，博文产生页面浏览量的生命周期通常很短。因此，博主和博客在持续追求更高流量的过程中，承受着巨大的压力，要尽可能快、尽可能多地生产帖子。传统的印刷报纸每天只需生产填充一个印刷版的内容；有线新闻网络需要生产填充全年无休、每天
  24 小时的内容；而博客拥有无限的空间，并且会因试图填满这种无限性而获得回报。这鼓励了仓促、草率的写作和新闻捷径；博主根本没有时间进行事实核查。事实上，引发争议的帖子往往也能产生页面浏览量。更糟糕的是，新闻文章中彻头彻尾的谬误常常会诱使不满的读者留下评论抱怨和/或纠正文章，但在博客上评论通常涉及多次点击和数据轨迹，这些都会变成博主口袋里的美元（好吧，是美分）。


  将这些观察综合起来，我们看到了一场冲击新闻业根基的完美风暴。博客和博主几乎都财务拮据，赚取的收入远低于局外人的预期，因此迫切需要更多的页面浏览量——无论是为了直接赚取广告收入，还是为了提高获得丰厚收购的可能性。这驱使他们过快地产出文章，几乎没时间进行事实核查和验证来源。即使他们有时间进行事实核查，他们痴迷的页面浏览量统计数据也表明，说实话并没有真正的经济激励，因为带有煽动性标题的误导性文章往往比真正的新闻作品更能吸引点击。


  让我非常清楚地说明这一点：正是博客行业这种数据驱动的动力，以及将多维度的新闻价值简化为一个单一、简单、肤浅的指标——页面浏览量——所导致的巨大过度简化和扭曲，才是这种危险状况的最大元凶。一些由页面浏览量驱动的博客能够依靠深思熟虑、方法严谨、准确无误的写作而蓬勃发展，在这个充斥着反常激励、迫使作者追求与这些崇高品质截然相反之物的市场中，这确实是非凡的。当我们看到优秀的博客和优秀的写作时，让我们都心存感激，因为它们确实存在，但它们在努力超越充斥互联网的、无处不在的标题党垃圾内容时，举步维艰。


  在介绍了博客和博主的数据驱动财务结构及其导致的有害压力之后，现在是时候回到之前关于博客圈分类学以及故事在其中传播的讨论了。




  '
- '# 从底层崛起


  斯坦福互联网观察站的研究员蕾妮·迪雷斯塔最近在《大西洋月刊》上写道：“媒体和社交媒体已不再泾渭分明；有影响力的叙事既自上而下，也自下而上地涌现，并在不同渠道间来回反弹。”回想一下，我尚未直接探讨的传播方向——尽管我声称它对我们当前媒体谎言的泥潭负有最大责任——正是这种自下而上的流动：故事从小型、通常是特定兴趣和/或地理上局部的博客开始，设法沿着食物链向上攀升，有时最终登上国家级新闻网站的顶端。我们在此必须提出的问题是：这种情况如何发生、为何发生，以及为何会导致新闻真实性下降？正如我接下来要讨论的，答案本质上都源于博客的流量经济学。


  所有博客和新闻来源，即使是顶端备受推崇的那些，都在不断寻找新故事。其中存在一个根本性的不平衡：实际故事（即世界上应当被报道的真实事件）的供应量，远小于博客和在线报纸所生产的故事供应量——因为，正如我前面所讨论的，积累流量的压力迫使作者们以不健康的速度填满互联网无限的带宽。这造成了一个危险的真空：各级博主都承受着巨大压力，必须想方设法不断寻找故事，常常还要无中生有，以维持现代媒体机器的运转。


  层级最低的博客通常资金不足、人手短缺，并且往往依赖其所属社区的小型、紧密联系的性质——这意味着他们经常根据社区成员的建议发布内容，并追踪社交媒体上的线索，而不真正质疑其真实性。从很多方面来看，这相当合理：一家受人尊敬的国家级新闻台在听到关于拜登政府的某些丑闻八卦时，必须在向公众报道前确保其绝对准确；而一个关于大白熊犬及其疯狂行为的博客，则不太担心其帖子可能被解读为假新闻。一般来说，规模更小、更专业的博客调查线索的资源更少，无论怎样，他们这样做的动力也更小。


  然而，当我们审视层级的中层时，问题就开始出现了。在这里，博主们仍然极度渴望故事，他们根本没有时间用传统的新闻方式去寻找，因此显而易见的捷径就是搜罗低层级的博客。那些展现出能吸引更广泛受众、产生流量潜力的激动人心的帖子，会迅速被中层博主捡起并重新包装。但这些博主缺乏时间和资源去追溯故事的源头并仔细核实事实，因此一个稳妥的规避风险的做法就是简单报道：某某博客（低层级的那个）报道了某某事件。这样你就不可能出错：无论原始故事是否真实，该故事确实在那个博客上被报道过，这是毋庸置疑的。


  接下来，随着横向传播的增多，故事本身与元故事之间的界限变得模糊，博主们互相引用，竞相分享这个独家新闻带来的流量。久而久之，这个故事本身的流行度就可能成为故事本身——因为病毒式传播本身就有新闻价值，不是吗？——到了这个地步，国家级报纸就可以安全地将事情提升到最高层级，用“这个故事在互联网上引起轰动”这样的标题来报道。我们在史蒂夫·乔布斯生命的最后几年里经常看到这种情况：来源不明的谣言在互联网的阴影中盘旋，以不可预测的方式获得关注，达到临界质量后最终影响了苹果公司的股价，并因此，可以这么说，变成了*真正的*新闻。


  博客帖子在层级中向上爬升也以更直接的方式发生。一项全国性调查发现，近九成记者使用博客来研究他们的报道，因此即使是顶层的记者也会向下寻找信息。此外，博主获得大量流量的最佳方式，就是他们的故事被更高层级的组织——尤其是国家级新闻网站——选中并链接。因此，中层博主经常将他们的帖子提交给大众媒体记者监控的新闻聚合网站，他们甚至直接联系记者，希望能引起他们的兴趣——因为，毕竟，即使是这些记者也在不断寻找能产生流量的热门故事。


  瑞安·霍利迪根据自己为了商业利益而故意鼓励和利用这种博客圈向上流动形式的经历，写了一本关于此现象的精彩著作——《相信我，我在撒谎：一个媒体操纵者的自白》。在书中，他描述了自己如何能够“通过将一个故事投给一个标准极低的小博客，使其成为大博客的故事来源，进而成为更大媒体机构的故事来源，从而将无中生有。”他说，他经常看到“付费编辑插入维基百科的措辞独特或经过选择性编辑的事实，后来以完全相同的措辞出现在主要报纸和博客中”，这是新闻捷径的明显标志，也显示了这些捷径如何被利用。他深刻且令人恐惧地总结了他多年来玩的这个游戏的社会后果：“新闻，无论是在网上还是印刷品中找到的，都只是成功通过了媒体过滤器的内容。[……]由于新闻塑造了我们对周围发生的事情的理解，这些过滤器创造了一个被构建的现实。”请记住，霍利迪所指的这个被构建的现实，源于数据驱动的流量经济学。21
  世纪的数据本应为我们提供一个强大、未经修饰的通往世界真相的新窗口，但在这场关于互联网新闻的讨论中，我们令人担忧地看到，它同时也支撑着对我们基本世界认知的一种危险扭曲。




