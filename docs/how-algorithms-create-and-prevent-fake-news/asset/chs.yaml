- "# 2. 由计算机精心打造\n\n人工智能如今生成标题、文章，甚至记者\n\n> *一些众所周知的事实，一些半真半假的陈述，以及一些彻头彻尾的谎言，被串在一起，乍看之下像是一个流畅的叙述。*\n\
  > \n> ——纽约大学教授朱利安·托吉利乌斯^(¹⁵) 评论最新的文本生成人工智能\n\n机器学习作为现代人工智能（AI）的主要分支，近年来已超越了数据驱动预测的任务——它现在能够以各种形式进行创造。这项新兴技术的应用数不胜数；本书的重点是它在假新闻中所扮演的角色。在本章中，你将首先看到人工智能被用于创建不存在记者的头像照片的例子，然后是自动为文章撰写标题的人工智能，接着是根据用户提示撰写整篇文章的人工智能。在探讨这些例子及其对打击虚假信息的意义之后，本章将提供一次通俗易懂的机器学习旋风之旅，从该学科的起源开始，一直讲到照片和文本合成背后的当代计算方法。最后，本章将展望迄今为止为自动化检测人工智能生成的图片和文本而开发的人工智能驱动工具。\n\
  \n\n\n## 合成照片\n\n2018 年底，一位拥有纽约大学博士学位的巴勒斯坦权利活动人士及其丈夫——伦敦城市大学高级讲师、曾担任巴勒斯坦解放组织法律顾问——被布鲁克林报纸《阿尔格迈纳》（该报报道美国及国际犹太人与以色列相关新闻）指控为“众所周知的恐怖主义同情者”。提出这一指控的作者奥利弗·泰勒，是英国伯明翰大学一名二十多岁的学生，他有着棕色眼睛、浅浅的胡茬和略带神秘的笑容。他的网络个人资料称自己是一名咖啡爱好者和政治迷，在传统的犹太家庭长大。他发表过一些自由撰稿的社论和博客文章，主要关注反犹太主义和犹太事务，曾出现在《耶路撒冷邮报》和《以色列时报》等知名媒体上。这对支持巴勒斯坦的活动人士夫妇感到困惑，不明白为何一名英国大学生会公开指控他们。\n\
  \n他们调出泰勒的网络头像照片，发现这名年轻男子的面部有些不对劲，但又说不清具体问题。他们联系了路透社并提请关注此事，路透社咨询了六名数字取证专家，专家表示泰勒的头像照片具有“深度伪造”的特征——这是一种近年来利用人工智能技术生成不存在人物照片的方法。要理解计算机如何从零开始创建出照片级逼真的人脸，你需要等到本章末尾；与此同时，如果你想看看这些方法在逼真度、灵活性和强大性方面令人惊叹的实例，可以浏览近期《纽约时报》一篇文章中提供的互动演示。^(¹⁶)\n\
  \n与简单地从网上抓取真实人物照片并重新标注相比，深度伪造头像照片之所以更加危险，是因为当使用真实照片时，人们通常可以通过网络反向图片搜索找到原始照片，从而揭露骗局；而深度伪造合成的照片则根本找不到原始照片。路透社咨询的一位专家说得最贴切：由于深度伪造技术，试图找到潜在虚假头像照片的来源，就像大海捞针，只不过现在这根针可能根本不存在。\n\
  \n在数字取证专家的发现基础上，路透社进一步调查了奥利弗·泰勒，发现^(¹⁷)他似乎是一个“精心编造的虚构人物”：伯明翰大学没有他的记录；拨打他提供给编辑的英国电话号码，听到的是自动错误提示音；他没有回复发送到他用于作者通信的\
  \ Gmail 地址的邮件；而最讽刺的是，有人可能会说，就是那张深度伪造的头像照片。路透社的调查人员通知了泰勒曾发表文章的报社，称他很可能是一个虚假身份。《耶路撒冷邮报》和《阿尔格迈纳》的编辑表示，泰勒最初是通过电子邮件联系他们，主动提出报道选题，且不要求稿酬。他们只采取了最表面的步骤来核实他的身份，其中一位编辑甚至为这种松散的做法辩护说：“我们又不是反间谍机构。”不过他承认，在泰勒事件之后，现在已经采取了更严格的安全措施。路透社调查后，《阿尔格迈纳》和《以色列时报》都撤下了泰勒撰写的文章。泰勒向两家报社发邮件抗议撤稿，但因编辑无法确认其身份而遭到拒绝。\n\
  \n《以色列时报》的一位观点编辑指出，即使泰勒的文章本身没有太大影响，但为他提供无法追踪头像照片的深度伪造技术，已经有可能“让处于她这种位置的人更不愿意冒险接受不知名作者”。换句话说，深度伪造的威胁可能比深度伪造本身更强大。我们将在本书中看到，这种情况并不罕见：人工智能对社会造成的冲击，不仅源于大规模*已经*发生的行为，也源于现在*可能*大规模实现的恶意活动。话虽如此，深度伪造合成的头像照片并非报社面临的空泛理论威胁；自奥利弗·泰勒事件以来，这项技术的非法使用迅速蔓延，正如专家最初所担忧的那样，它现在已成为许多武器化虚假信息宣传活动的核心组成部分。\n\
