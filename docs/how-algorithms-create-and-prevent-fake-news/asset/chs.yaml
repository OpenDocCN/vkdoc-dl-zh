- "# 8. 社交传播\n\n在 Facebook 和 Twitter 上审核虚假信息\n\n> *在算法助长的虚假信息和阴谋论泛滥之际，我们不能再对那种认为所有互动都是良好互动的技术理论视而不见。*^(²⁷²)\n\
  > \n> ——苹果公司 CEO 蒂姆·库克\n\n在本章中，我将探讨在虚假新闻问题上，算法与社交媒体复杂动态相互作用的几种方式。首先，我会提供一些背景、问题和案例，帮助我们更好地理解已经发生的事情及其利害关系。接下来，我将研究算法如何被用来从社交媒体平台抓取数据，以提供关于虚假新闻传播方式的显著定量洞察——无论是自然传播还是作为蓄意虚假信息活动的一部分。在此过程中，还将探讨社交媒体平台自身的内容推荐算法在这一传播中所扮演的角色。随后，注意力将转向社交媒体公司——主要是\
  \ Facebook 和 Twitter——已经使用或可能使用的算法工具，以对抗有害的虚假信息，以及采用算法方法应对这一棘手、多方面问题的局限性和挑战。\n\n\
  ## 背景铺垫\n\n在本节中，我将收集一些背景信息，这些信息将有助于构建和指导后续章节的讨论。首先，让我们看看一个人的媒体消费习惯如何与其对时事的兴趣和知识，以及接触虚假新闻的程度相关联。\n\
  \n\n\n### 主要依赖社交媒体的人群\n\n皮尤研究中心在 2019 年 10 月至 2020 年 6 月期间进行的调查发现^(²⁷³)，近五分之一的美国成年人表示，他们主要依靠社交媒体获取政治和选举新闻——而在\
  \ 30 岁以下人群中，这一比例接近二分之一。在主要依赖社交媒体的人群中，不到十分之一的人表示他们非常关注 2020 年大选的新闻，而对于主要依赖有线电视或印刷新闻的人群，大约有三分之一的人表示他们密切关注。在主要从有线电视、全国性电视网络、新闻网站或应用程序获取新闻的人群中，表示密切关注新冠疫情爆发的人数比例，是主要依赖社交媒体人群的两倍。\n\
  \n不仅以社交媒体为导向的参与者根据自我评估在政治和医疗新闻方面的参与度较低，他们实际掌握的知识也更少：皮尤的研究人员进行了一次简短测验，发现主要依赖社交媒体获取信息的群体中，只有\
  \ 17%的人在基本政治知识方面得分较高；而对于主要依赖有线电视或全国性电视网络的人群，这一比例约为三分之一；对于主要依赖印刷媒体、广播或新闻网站/应用程序的人群，这一比例则超过\
  \ 40%。与此同时，主要依赖社交媒体获取新闻的人接触到与疫情相关的虚假阴谋论的比例，高于所有其他媒体类别^(²⁷⁴)——然而，在社交媒体群体中，表示担心虚假信息对\
  \ 2020 年大选产生影响的人数比例，低于除主要依赖地方新闻群体外的所有其他群体。接触到阴谋论并不等同于相信它们——在某种程度上，社交媒体群体看到更多虚假信息却对此不那么担忧，这可能意味着该群体更善于辨别真伪。但知识测验中较低的表现削弱了这种乐观的解释。\n\
  \n这里一个棘手的问题是因果关系与相关性的问题：是主要依赖社交媒体，从而接触到更多虚假信息，导致人们与现实脱节；还是那些对世界兴趣不大、了解不多的人，天生更容易被社交媒体消费所吸引？虽然这对某些考量来说是一个重要问题，但答案对当前的讨论基本无关紧要：关键在于，很多人——尤其是年轻人——通过社交媒体来了解世界上正在发生的事情，而他们看到的内容并非全部属实。\n\
  \n接下来，让我谈谈社交媒体算法在传播假新闻方面所扮演角色的一些背景和语境。\n\n### 社交媒体算法\n\n在推特存在的头十年里，算法会推荐关注对象，但在信息流方面并不参与：你在平台上看到的只是你关注的人发布的所有帖子的时间顺序列表。然后，在\
  \ 2016 年，该公司通过创建机器学习算法来更主动地塑造你的个人体验，决定哪些帖子应该首先显示给你，根据帖子的受欢迎程度和算法预估的你对其的兴趣程度进行排序，而不仅仅是根据时间戳排序。就在\
  \ 2019 年初，推特更进一步，不仅开始向你展示你关注的人的推文，还开始展示你关注的账户所关注用户的部分推文（由算法选择）。\n\n这些起初可能看起来都是无害的举措，但重要的是要认识到，每当算法决定向你展示什么内容时，都存在一种风险，即虚假信息可能会被算法放大，超出其通常能够有机传播的范围。社交媒体算法通常旨在最大化各种用户参与度指标，因此，如果某个有害的阴谋论——例如新冠病毒是政府开发的生物武器，或者\
  \ 2020 年大选被窃取——引发了大量互动，那么算法就会捕捉到这一点，并更突出地展示这些虚假信息，将其传播给更广泛的受众。不用说，这不仅适用于推特，也适用于脸书的信息流以及社交媒体中的任何其他排名和推荐算法。\n\
  \n一个能真正看到这种情况发生的说明性例子涉及《大纪元时报》——你在第 2 章中首次接触到这个可疑的新闻机构，当时它涉及算法批量生产的低质量新闻和假新闻；然后在第\
  \ 4 章中再次出现，当时一个与《大纪元时报》秘密关联的假新闻频道网络在 YouTube 上涌现，兜售 2020 年大选胜利被从特朗普手中窃取的谎言。《纽约时报》在\
  \ 2020 年 10 月的一项调查^(²⁷⁵)详细描述了《大纪元时报》从“一份在纽约街角免费发放、带有反华倾向的小型低成本报纸”发展成为“美国最具影响力的数字出版商之一”和“右翼虚假信息的主要传播者”的过程。\n\
  \n《大纪元时报》从 2000 年创立到 2014 年经历了缓慢而稳定的增长，当时该机构的财务状况稳健，该报甚至获得了一些新闻奖项。但在 2015 年，其流量和广告收入突然下滑，据称是脸书对信息流算法进行修改的结果。作为回应，《大纪元时报》让其记者每天炮制多达五篇文章以寻求病毒式传播，其中大部分是低俗的点击诱饵。随后，随着\
  \ 2016 年大选的临近，报道方向急剧右转：该机构开始狂热支持唐纳德·特朗普及其圈子中的各种阴谋论。表面上，这被描绘成一种自然的政治联系：唐纳德·特朗普公开批评中国政府，这与《大纪元时报》长期受中国政府迫害的法轮功背景很好地吻合。但《纽约时报》的调查也揭示了其隐藏的动机：《大纪元时报》制定了一项秘密策略，利用脸书的平台和算法来迅速扩大该机构的关注度和财务状况，而选择与特朗普及其大量流行的虚假信息结盟不仅是政治性的——也是一种利用病毒式传播的马基雅维利式手段。\n\
  \n\n\n## 排版后的文本\n\n《*大纪元时报*》的 Facebook 策略始于在越南的一项实验。该组织的当地分部创建了一个 Facebook 页面网络，其中充斥着娱乐性的病毒视频以及支持特朗普的内容——其中许多内容直接复制自其他网站——然后他们使用机器人（bots）人为地夸大这些内容的点赞和分享量，这直接违反了\
  \ Facebook 关于禁止虚假账户的政策。这种人为的受欢迎程度随后被 Facebook 的算法在不知情的情况下捕捉到，并转化为真实的受欢迎程度：这些页面的快速增长导致它们被推荐给广泛的用户群，而轻松愉快的视频与极右翼内容（其中许多是耸人听闻的假新闻）的结合，找到了一个热切等待的受众群体。《*纽约时报*》获得的内部邮件显示，《*大纪元时报*》的领导层称赞这是前进的方向，很快，越南模式被输出到该组织在全球的其他业务中。这种“Facebook\
  \ 策略”是成功的：通过像在越南那样孵化数十个 Facebook 页面，《*大纪元时报*》如今在其社交媒体上的粉丝总数已达数千万。而特朗普的联系持续发挥作用，并达到了新的高度：在特朗普担任总统期间，他及其家人将《*大纪元时报*》的文章分享给了大量受众，甚至特朗普政府的成员也曾接受该报记者的采访。\n\
  \n简而言之，《*大纪元时报*》战略性地利用 Facebook 的推荐算法，将自己打造成一个庞大的媒体帝国。它部分通过被禁止的方法——使用机器人制造虚假互动——以及部分通过被允许但可以说非常不道德且危险的方法来实现这一点：兜售极右翼假新闻，通常打着平衡、真实新闻的幌子，以建立受欢迎的追随者群体。话虽如此，重要的是要认识到，当今社交媒体平台引发的社会问题并非全部由其机器学习排名/推荐算法造成，然而公众对社交媒体的普遍谴责往往聚焦于这些算法，却没有提供多少证据证明它们确实是问题的根源。《*纽约时报*》对《*大纪元时报*》的调查依赖于内部邮件以及与现任和前任员工的讨论，详细描述了该组织围绕\
  \ Facebook 算法精心策划的策略。我们不知道这些算法是否真的产生了所描述的影响，但至少我们知道《*大纪元时报*》的企业领导层相信它们产生了影响，并且他们的策略奏效了。\n\
  \n2021 年 1 月《*纽约时报*》的一篇文章^(²⁷⁶)声称，“Facebook 的算法诱使许多人在平台上分享更极端的观点——通过点赞和分享来奖励他们发布关于选举欺诈阴谋论、否认新冠疫情和反疫苗言论等主题的帖子。”为了支持这一论断，该文章介绍了几位发布此类内容的个人，并称“浏览他们的信息流可以一窥\
  \ Facebook 如何奖励夸大和谎言。”这些特定的个人都遵循了类似的路径：他们多年来试图通过发布非政治内容来积累社交媒体粉丝，但徒劳无功；最终他们尝试发布支持特朗普的内容和极右翼虚假信息，并发现这导致他们的粉丝数量急剧增加。但在我看来，文章中的细节并不能充分证明文章关于算法责任的强烈叙事。\n\
  \n文章中介绍的第一个个人据说每天在特朗普的 Facebook 帖子下写评论，以吸引人们对其个人 Facebook 页面的兴趣。我看不出这如何能归咎于算法失控——这只是一个用户去到一个热门地点，寻找志同道合的人，以便从中分流一些关注度。文章接着解释说，“大多数人意识到，与在群组页面上获得的点赞、分享和评论相比，同样的帖子在个人页面上只能获得微不足道的关注。志同道合者的\
  \ Facebook 群组是谎言开始滚雪球、积聚势头、获得支持并成为传说的起点。”这是对 Facebook 作为一个允许观点相似的人聚集在一起的平台的批评，而不是对推荐算法的批评。虽然推荐算法无疑在提升\
  \ Facebook 群组的受欢迎程度方面发挥了作用，但根据文章中提供的证据，文章对算法的抨击似乎相当缺乏依据。事实上，对于一篇关于人们为了受欢迎而宣扬观点的文章来说，这颇具讽刺意味：在我看来，这更像是作者们跳上了反算法的潮流，因为他们知道这是读者想看到的。\n\
  \n但是，仅仅因为许多主流新闻文章没有提供证据来支持其关于算法责任的叙事，并不意味着证据不存在。证据确实存在，而且通常相当确凿，正如你将在本章中看到的那样。例如，最近一项关于\
  \ 2020 年大选的研究^(²⁷⁷)发现，极右翼内容产生的互动比任何其他党派群体都多，而极右翼虚假信息产生的互动比极右翼事实内容高出 65%。这意味着，任何以互动为优化指标的推荐/排名算法，都会优先推送极右翼虚假信息。而且，Facebook\
  \ 和大多数其他社交媒体平台都围绕最大化互动这一目标而构建，并将这一优先级融入其所有算法中，这已不是什么秘密。\n\n在本章后面，我将详细介绍 Facebook\
  \ 在其平台上打击虚假信息传播所使用的算法方法——但首先，在继续铺垫背景的同时，通过退一步审视 Facebook 上假新闻的更大背景，并聚焦于几个说明所涉问题的具体例子，来预览这一主题会有所帮助。\n\
  \n\n\n### Facebook 的问题与反应\n\n《*华尔街日报*》报道^(²⁷⁸)，从 2021 年 1 月 6 日（国会大厦暴动当天）上午到下午，Facebook\
  \ 内部数据科学家团队注意到，平台上用户报告的暴力内容增加了十倍；用户关于假新闻的举报激增至每小时四万条，是此前高峰期的四倍。Facebook 领导层担心出现危险的反馈循环：网上的煽动性内容激发更多现实中的暴力行为，进而又在社交媒体上引发更多关注，如此循环往复。我们都知道，Facebook\
  \ 在数小时内做出回应，删除了特朗普总统的帖子，并宣布无限期暂停其账号。但 Facebook 还私下将美国列为政治暴力的“临时高风险地区”，这触发了“限制平台上潜在危险言论的紧急措施”，不过具体措施并未披露。Facebook\
  \ 试图推卸 1 月 6 日事件的责任，其首席运营官谢丽尔·桑德伯格厚颜无耻地表示：“这些事件主要是在那些没有我们阻止仇恨的能力、没有我们的标准、也没有我们透明度的平台上组织的。”\n\
  \n国会大厦暴动后的几天里，据报道^(²⁷⁹)，Facebook 在“爱国者”和民兵主题的群组中展示武器配件和防弹衣广告，同时夹杂着支持特朗普的虚假信息，声称选举被操纵和窃取。两天后，三位美国参议员联名致信\
  \ Facebook 创始人兼 CEO 马克·扎克伯格，敦促他立即采取行动停止这些广告，称其“旨在武装白人至上主义者、新纳粹分子和其他国内极端组织”。次日，Facebook\
  \ 妥协并宣布立即暂停所有此类广告一周，只允许在即将到来的就职典礼后恢复。但宣布后的第二天，人们发现许多危险广告并未被撤下。几周后，Facebook 开始实验性地减少部分用户看到的政治内容^(²⁸⁰)，试图“降低热度，阻止分裂性对话和社群”，并借助一个经过训练可识别政治内容的机器学习算法。\n\
  \n时间闪回到 2016 年 11 月 19 日，唐纳德·特朗普出人意料地赢得大选后不到两周。马克·扎克伯格在他的 Facebook 账号上发布了一条消息^(²⁸¹)，开头写道：“很多人问我们正在如何处理虚假信息，所以我想更新一下情况。”在表示“我们知道人们想要准确的信息”之后，他接着承认“这些问题在技术上和哲学上都很复杂”，并称\
  \ Facebook 正在采取间接方法：“我们不想自己充当真理的仲裁者，而是依靠我们的社区和值得信赖的第三方。”他列举了几个正在进行的打击虚假信息的项目，第一个也是“最重要的”是加强检测：“这意味着更好的技术系统，能在人们自己标记虚假内容之前就检测到它们。”扎克伯格在这里暗示，在所有限制其平台上虚假信息传播的方法中，首要的是开发预测性的机器学习算法。\n\
  \n这里有一个值得注意的微妙之处：他设想的并非将帖子分类为真或假的监督学习任务，而是一种认识论上稍弱一些的分类——将帖子分为可能被用户标记的和不太可能被标记的。这种细微差别很重要：一个私密群组中的帖子是否会被标记为误导性信息，很大程度上取决于该群组的主题。无论如何，这里的主要结论是，在\
  \ 2016 年大选之后，扎克伯格主张采用技术手段——特别是机器学习——来管理他的平台。在此前后多次公开声明中，扎克伯格一直秉持这一理念：在应对有害虚假信息传播等棘手社会问题时，人工智能将成为公司的万能药。但从那次总统大选到下一次大选之间发生了很多事情，本章的主要目标之一就是讨论\
  \ Facebook 实际尝试了哪些算法方法，它们的效果如何，以及还有哪些其他算法方法可能可行。\n\nFacebook 不断调整其平台——尤其是影响巨大的信息流算法，该算法决定我们所有人看到哪些帖子以及它们的排序——通常通过对照实验进行，其中随机选择的用户组使用修改后的平台，而所有其他用户作为对照组。这是一种受\
  \ 20 世纪彻底改变医学研究的随机对照试验（对照组服用安慰剂）启发的产品开发科学方法；它已席卷硅谷，被称为*A/B 测试*，而科技公司，尤其是科技巨头，能够快速且低成本地获取海量数据，使这种测试成为可能。\n\
  \n就像医学科学一样，并非所有实验性治疗都能成功。特朗普 2016 年大选获胜后不久，Facebook 尝试了一种相当简单的算法方法来减少假新闻，该方法既不依赖机器学习，也不依赖专业人工审核员。其思路是：当一篇分享的文章是假新闻时，通常精明的读者会识别出来，并发表评论指出该文章是假的，有时甚至会解释原因并提供证据支持。但这些有用的评论会被其他评论的洪流淹没，因此\
  \ Facebook 的实验就是自动将任何包含“fake”一词的评论置顶到评论区顶部。这似乎是一种相当直接的方式，可以帮助读者了解潜在的假新闻。\n\n这个实验的结果如何？在实施这种评论置顶方法的用户组中，大多数人感到愤怒、困惑，更难分辨真假，并且对\
  \ Facebook 遏制虚假信息传播的能力信心下降。为什么？因为突然之间，这些用户在几乎所有关于政治以及经济、气候变化等政治化话题的文章（来自最权威的新闻机构，如*BBC\
  \ 新闻*、*纽约时报*、*经济学人*等）下首先看到的，就是宣称该报道是假的评论。这种方法非但没有帮助人们识别真正的假新闻，反而让真实新闻看起来像假的，让读者陷入一个什么都不信、因而什么都信的世界。自由公关顾问珍·罗伯茨对此总结得很到位，她说^(²⁸²)“质疑每一条报道的真实性是荒谬的”，因为这“模糊了真实与虚假之间的界限”，并将\
  \ Facebook 的信息流变成了“某种可怕的奥威尔式双重思想实验”。简而言之，这是一次 A/B 测试，实验结束后，Facebook 决定废弃这一修改，回到原来的状态——尽管原来的状态也并不完美。\n\
  \n\n\n复杂算法在 Facebook 虚假新闻传播中扮演着重要角色，这不仅体现在信息流内容的排序、推荐加入的群组和关注的页面（本章主要议题），以及政治广告（上一章议题）中，还体现在\
  \ Facebook 的搜索和自动补全功能中——这些问题与第 6 章描述的 Google 问题类似。2019 年 2 月《卫报》的一份报告^(²⁸³)发现，当登录一个没有好友或其他活动的新用户账户时，在\
  \ Facebook 搜索栏中输入`\"vaccine\"`，自动补全建议会显示诸如`\"vaccine re-education\"`、`\"vaccine\
  \ truth movement\"`和`\"vaccine resistance movement\"`等内容，将用户推向反疫苗错误信息的世界。即使用户抵制这些自动补全的诱惑，仅搜索`\"\
  vaccination\"`，排名前十二的 Facebook 群组也全是反疫苗组织，而排名前十二的 Facebook 页面中有八个是充斥着错误信息的反疫苗页面。几个月前，Facebook\
  \ 曾推出一项政策，删除旨在煽动“暴力或身体伤害”的错误信息，但声明反疫苗内容并不违反该政策或任何其他 Facebook 政策。然而，这一情况在 2021 年\
  \ 2 月发生了变化，当时 Facebook 修订了其政策并宣布^(²⁸⁴)将开始删除几乎所有关于疫苗的虚假声明。\n\n亡羊补牢，为时未晚：2020 年 8\
  \ 月，进步派非营利组织 Avaaz 发布了一份报告^(²⁸⁵)，内容涉及前一年 Facebook 上全球健康错误信息（包括反疫苗宣传）的状况——其描绘的景象并不乐观。该报告估计，在那一年中，分享全球健康错误信息的群组和页面上的内容获得了近\
  \ 40 亿次浏览。在该报告的时间范围内，这些错误信息内容的浏览峰值出现在 4 月，当时新冠疫情正失控蔓延，尽管 Facebook 努力打击 COVID-19\
  \ 错误信息。报告估计，在 4 月的这一峰值期间，来自十大最受欢迎健康错误信息网站的内容获得的浏览量，是来自世界卫生组织（WHO）和美国疾病控制与预防中心（CDC）等十大权威信息来源内容的四倍。报告还发现，某些“超级传播者”页面应对大部分错误信息负责，而这些超级传播者中的许多都起源于反疫苗运动。一篇特别文章虚假声称美国医学会鼓励医生多报\
  \ COVID-19 死亡人数，获得了超过 600 万次评论或点赞，估计被浏览了 1.6 亿次。针对这份报告，Facebook 表示^(²⁸⁶)，从 4 月到\
  \ 6 月，它已对近 1 亿条 COVID-19 错误信息帖子应用了事实核查警告标签，并删除了该公司认为存在迫在眉睫伤害风险的另外 700 万条帖子。\n\n\
  Facebook 上另一个涉及算法且与错误信息相关的问题是机器人的使用——这些虚假账户可以被命令以特定方式行事。机器人通常被用来通过点赞、分享和评论，人为地为特定\
  \ Facebook 群组或页面注入初始人气；Facebook 的推荐和信息流算法检测到这种高参与度，并将其误认为是真实活动，导致算法将这些群组/页面推广给真实用户，从而推动其实际人气。回想一下，《大纪元时报》在其非常成功的“Facebook\
  \ 策略”中就使用了这种技术，尽管这明显违反了该平台关于虚假账户所有权和活动的政策。2020 年 9 月，一位名叫 Sophie Zhang 的数据科学家被解雇，她曾在\
  \ Facebook 的一个专门负责捕捉和封禁机器人账户的团队工作。在她上班的最后一天，她向整个公司发布了一份长篇内部备忘录^(²⁸⁷)，描述了该平台机器人问题的可怕规模，以及公司领导层不愿听取她反复警告、及时妥善应对这一问题的态度。\n\
  \n张的备忘录中充满了世界各地旨在影响舆论和选举结果的协调性机器人活动的具体例子——有时这些机器人可追溯到政府首脑和政党。她写道：“在 Facebook 工作的三年里，我多次发现外国政府公然试图大规模滥用我们的平台来误导本国公民，并多次引发国际新闻。”她说，在\
  \ 2018 年美国和大选的选举中，她的团队删除了超过 1000 万条针对知名政治人物的虚假反应和点赞。她对 Facebook 领导层对她团队发现的许多机器人活动反应迟缓（有时需要数月才采取行动）感到震惊，同时也对她和她的团队作为网站版主所拥有的不受制约的权力感到震惊：“我曾在没有监督的情况下做出影响国家总统的决定，并对全球如此多的知名政治人物采取过行动，以至于我都数不清了。”当张被解雇时，她获得了一份\
  \ 6.4 万美元的遣散费方案，但其中一项要求是她签署一份不诋毁协议。她拒绝了这份遣散费方案，以便能够发布她那份面向全公司的内部备忘录——希望这能促使公司内部发生一些真正的改变。\n\
  \n就在张离职前几个月，《华尔街日报》发表了一篇报道^(²⁸⁸)，揭示了 Facebook 内部对其平台和算法在过去几年中一些负面社会影响所进行的严密保护的研究及应对措施。事实证明，2016\
  \ 年向公司领导层提交的一份内部演示文稿显示，极端主义内容——其中大部分是种族主义、阴谋论和亲俄内容——广泛存在于德国超过三分之一的大型政治 Facebook\
  \ 群组中，而相对少数非常活跃的用户对这些内容负有主要责任。相当令人不安的是，该演示文稿声称“64%的极端主义群组加入行为是由我们的推荐工具导致的”，尤其是算法驱动的“你可能想加入的群组”和“发现”建议。该演示文稿直言不讳地指出：“我们的推荐系统加剧了问题。”Facebook\
  \ 员工告诉《华尔街日报》，毫不意外，这个问题绝非德国独有。两年后，另一份提交给公司领导层的内部演示文稿指出：“我们的算法利用了人脑对分裂性内容的吸引力”，并且如果不加控制，算法会选择“越来越多分裂性的内容，以获取用户注意力并增加用户在平台上的停留时间。”\n\
  \n\n\n这些内部演示是公司为了解 Facebook 算法如何以潜在有害方式影响用户行为所做的努力的一部分——其中一些倡议甚至源自最高层马克·扎克伯格。但《华尔街日报》披露，这些努力的成果在很大程度上被忽视了，而针对问题的解决方案大多被否决或大幅缩减范围。负责研究这些问题的主要团队在\
  \ 2018 年中期的一份内部文件中写道，其提出的许多补救措施都是“反增长的”，并要求公司“采取道德立场”。一个尤为棘手的问题是，该团队发现，虚假新闻、垃圾信息、点击诱饵和虚假用户等不良行为不成比例地来自极端党派用户——且存在比极左翼规模更大的极右翼网络。这意味着，即使是旨在减少不良行为的中立努力，总体上对保守派内容的影响也会大于对自由派内容的影响。Facebook\
  \ 领导层不愿采取看似带有自由派偏见的行动而疏远保守派用户，因此该公司在处理这些问题时受到极大限制。\n\n该内部研究团队提出的一项具体补救措施如下。由于 Facebook\
  \ 的算法旨在最大化各种用户参与度指标（点赞、分享、评论、登录时长等），平台上非常活跃的用户对算法的影响大于不太活跃的用户。该团队建议进行“节制分享”算法调整，以减少由过度活跃用户不成比例推动的内容传播。该团队认为这将有助于保护\
  \ Facebook 免受协同操纵行为的影响，但《华尔街日报》披露，Facebook 高管对此表示担忧，声称这会不公平地伤害平台最忠实的用户。当团队与高管无法达成一致时，这场争论最终被提交至扎克伯格处。据称，扎克伯格明确表示可以实施该方案，但前提是将提议的缓解权重削减\
  \ 80%——据报道，他“暗示自己对以社会公益之名重新调整平台的努力失去了兴趣”，并要求团队“不要再把类似的事情带到他面前”。\n\n## 为什么 QAnon\
  \ 如此棘手\n\n在社交媒体上控制错误信息传播所面临的挑战之一是，近期大量错误信息通过像 QAnon 运动这样分散、包罗万象且不断演变的阴谋论传播。这些阴谋论并非基于一个明确且可证伪的核心主张，而是将许多不相关的断言编织成一个欺骗之网，因此，驳斥该理论的任何特定方面——或将社交媒体上的个别帖子标记为虚假——几乎无法减缓整个运动的势头。内容审核的另一个障碍是，社交媒体平台遏制这些运动的行动，常常被阴谋论吸收，视为阻止人们了解真相的协同努力——这反而进一步激发了人们对这些运动的支持。这些理论并非静止不变，而更像病毒，不断适应和重组自身，以便持续存在并更猖獗地传播。这些运动的支持者积极寻找能让他们规避政策违规的信息；在此过程中，他们往往采用更温和、更中庸的方式来构建其意识形态——从长远来看，这使他们能够触及并说服更广泛的受众。这就像细菌感染，在抵抗了部分抗生素疗程后，变得更具隐蔽性和难以治疗。\n\
  \n你可以在 2020 年大选中看到所有这些因素在起作用。选举诚信伙伴关系——一个自称“研究实体联盟”，支持“研究界、选举官员、政府机构、民间社会组织与社交媒体平台之间的信息交流”——在\
  \ 2020 年 10 月的一份报告^(²⁸⁹)中，调查了旨在预先破坏 2020 年大选合法性的努力。报告指出，社交媒体上流传的关于“深层政府”企图窃取特朗普大选胜利的谣言“值得审视……以了解它如何将大量离散事件编织成一个包罗万象的元叙事”，以及这个“元叙事如何成为一个脚手架，任何未来事件都可以挂靠其上：任何新的抗议活动，或新发现的被丢弃的选票，都被视为进一步的佐证……证明存在一个窃取大选的巨大阴谋，并且选举结果将是非法的。”报告接着解释了这种框架的心理影响和社交媒体动态：“那些以前可能只是孤立事件、在社交媒体上几乎不受关注的事件，当它们被当作潜在阴谋的额外证据时，可能会获得显著的新分量。”这与你在第\
  \ 4 章中看到的 YouTube 情况惊人地相似：当一个易受影响的观众感觉所有迹象都指向同一个隐藏的真相时，推荐算法却天真地将来自不同用户的、关于同一阴谋主题的视频串联起来。\n\
  \n\n\n## QAnon 与社交媒体管控的演变\n\n近年来，最离奇、最具影响力且影响广泛的元叙事阴谋运动之一——甚至达到了美国众议院议员玛乔丽·泰勒·格林（Marjorie\
  \ Taylor Greene）的高度——便是`QAnon`。现在，让我们审视一下各方为控制其在社交媒体上的存在而不断演变的尝试。\n\n尽管某些特定的`QAnon`内容和账号曾因违反公司政策而被社交媒体平台封禁，但直到\
  \ 2020 年夏季，`QAnon`本身并未被禁止，尽管它植根于庞大的虚假信息网络，并可能对现实世界造成明显的危害。`Twitter`率先直接针对`QAnon`采取行动，于\
  \ 2020 年 7 月宣布^(²⁹⁰)，它将“（1）不再在趋势和推荐中提供与`QAnon`相关的内容和账号，（2）努力确保我们不会在搜索和对话中突出显示此类活动，以及（3）阻止与`QAnon`相关的`URL`在`Twitter`上被分享。”两个月后，`Twitter`表示^(²⁹¹)，平台上`QAnon`内容的浏览量下降了超过\
  \ 50%。\n\n在`Twitter`宣布其反`QAnon`努力一个月后，`Facebook`也紧随其后发布公告^(²⁹²)，称将开始“对与支持抗议活动中暴力行为的无政府主义团体、美国民兵组织以及`QAnon`相关的`Facebook`主页、群组和`Instagram`账号采取行动。”该公告承认，虽然直接宣扬暴力的内容已被平台禁止，但以更隐晦方式威胁公共安全的运动有所增长，例如庆祝暴力行为，或允许成员展示携带武器并暗示将使用它们。公告进一步解释说，`Facebook`仍将“允许人们发布支持这些运动和群体的内容”，但将开始“限制他们在我们平台上组织活动的能力。”换句话说，`QAnon`内容不会对个人`Facebook`用户禁止，但`Facebook`上的`QAnon`群组和主页将面临一系列新的限制。这些限制包括：不再将`QAnon`群组和主页推荐给用户加入/关注；降低`QAnon`群组和主页帖子的信息流排名；降低`QAnon`群组和主页的搜索排名，并从`Facebook`搜索功能的自动完成功能中移除其名称和`QAnon`话题标签；禁止`QAnon`投放付费广告和使用`Facebook`的筹款工具；以及移除讨论暴力的`QAnon`群组和主页——即使讨论依赖于“该运动特有的隐晦语言和符号。”\n\
  \n两个月后，`Facebook`发布了该公告的更新，声明“我们认为在处理`QAnon`时，这些努力需要加强。”自 2020 年 10 月 6 日起，`Facebook`将开始移除所有“代表`QAnon`的群组和主页，即使它们不包含暴力内容。”作为升级对`QAnon`行动的理由，`Facebook`列举了一些例子，例如该运动传播关于西海岸野火的虚假信息，这些信息虽不属于煽动甚至讨论暴力的范畴，但却通过阻碍地方官员灭火能力而造成了实际的公共危害。该公告的更新承认，由于`QAnon`信息传递的快速转变，执行这项新禁令并非易事，并且`Facebook`预计“会有新的尝试来规避我们的检测，无论是在行为上还是在平台上分享的内容上。”几周后，该公告再次更新，称现在当人们搜索与`QAnon`相关的术语时，他们将被引导至一个反恐组织。随后在\
  \ 2021 年 1 月，该公告又一次更新，这次提供了`QAnon`清除行动的最新数据：已移除超过三千个`Facebook`上的`QAnon`主页、一万个群组、五百个活动以及一万八千个个人资料。\n\
  \n在`Facebook`最初宣布将通过算法调整减少`QAnon`在其平台上的存在，到随后宣布彻底禁止该运动之间的两个月里，发生了什么？一方面，《纽约时报》发表了一篇尖锐的文章^(²⁹³)，表明`Facebook`的第一次打击尝试——委婉地说——是不够的。记者们发现，`Facebook`的推荐算法仍在继续推荐`QAnon`群组；一个特定的`QAnon`群组在首次打击后获得了数百名新关注者，尽管它公开反对重要的公共卫生建议，如佩戴口罩；`Facebook`上一个与`QAnon`有关联、呼吁在美国本土进行武装冲突的民兵运动获得了数千名新关注者；数十万`Facebook`用户被以打击人口贩卖的在线运动为幌子，推向了`QAnon`外围的阴谋论群组和主页。记者们追踪了`Facebook`上的一百个`QAnon`群组，并计算出在打击行动后，它们平均每周总共新增略超过一万三千名关注者，仅比打击前平均每周约两万名新增关注者略有下降。与此同时，这些群组变得稍微活跃了一些，打击后平均每周总互动量为六十万次，而打击前略高于五十万次。\n\
  \n记者们发现，许多`QAnon`群组/主页能够规避`Facebook`的打击，只需将其名称中的字母`Q`改为“`cue`”或“`17`”（引用`Q`是字母表中第\
  \ 17 个字母的事实），尽管`Facebook`早些时候声称会留意隐晦和象征性的引用。他们还发现，与政治无关的`Facebook`群组，如育儿和瑜伽群组，突然充斥着`QAnon`内容——但形式有所缓和，侧重于该运动中关于儿童贩卖的阴谋论方面。许多标榜为反贩卖组织、实为`QAnon`宣传群的`Facebook`群组，在`Facebook`打击行动后，其增长率实际上出现了飙升。简而言之，`QAnon`运动通过技术和心理两种方式适应了`Facebook`的努力，以确保其在新`Facebook`环境中继续繁荣和传播。随着\
  \ 2020 年大选临近，以及`QAnon`散布关于普遍选民欺诈的亲特朗普虚假信息，`Facebook`显然感到有必要放弃其原有策略，对不断蔓延和扩散的`QAnon`运动采取更强硬的立场。\n\
  \n在背景铺垫充分之后，我将首先更详细地探讨假新闻如何在社交媒体上传播，然后这将为后续关于遏制这种传播的方法的讨论提供依据。\n\n\n\n## 量化假新闻的传播\n\
  \n在本节中，我将审视几项关于假新闻复杂传播动态的学术研究。Facebook 的数据公开程度较低，因此这些研究大多聚焦于 Twitter。尽管如此，有一项研究^(²⁹⁴)\
  \ 调查了 2015 年 1 月至 2018 年 7 月期间 Facebook 和 Twitter 上的五百个假新闻网站及一万条假新闻故事，发现用户与假新闻的互动在两个平台上均稳步上升，直至\
  \ 2016 年底；此后，Facebook 上的互动急剧下降，而 Twitter 上则继续攀升。但我恳请读者在解读这一特定发现时保持谨慎：这仅是一项规模相对较小的研究，Facebook\
  \ 的假新闻问题很大程度上发生在难以追踪的私密群组中，而且自 2018 年以来发生了很多变化——尤其是 QAnon 运动的兴起以及新冠疫情错误信息的泛滥。例如，Facebook\
  \ 内部的数据科学家在 2020 年大选前的几个月发现^(²⁹⁵)，在面向美国公民事务的最活跃的一百个群组中，有七十个因仇恨言论、错误信息、霸凌和骚扰等问题被反复标记。其中一个顶级群组声称由唐纳德·特朗普的粉丝运营，但实际上是由“受经济利益驱动的阿尔巴尼亚人”运营，每天产生数百万次关于假新闻和其他有害内容的浏览量。\n\
  \n## Twitter 与 2016 年大选\n\n2019 年 1 月，一篇研究论文发表^(²⁹⁶)，该论文深入挖掘了 2016 年大选期间 Twitter\
  \ 上假新闻的动态数据。这是我们讨论假新闻如何在社交媒体上传播的合适起点。研究人员收集了大选前五个月内他们能找到的所有关于唐纳德·特朗普和希拉里·克林顿的推文，最终数量高达\
  \ 1100 万用户发送的 1.7 亿条推文。其中，超过 200 万用户发送的 3000 万条推文包含指向新闻文章或新闻机构的链接。研究人员利用传播学者对新闻媒体的分类——即那些发布虚假或未经证实的阴谋论新闻的媒体，与那些更传统、基于事实的媒体——将这\
  \ 3000 万条推文分别标记为事实性或虚假性。这里需要重点指出的是，他们并未试图判断 Twitter 上分享的每一条新闻故事的准确性（这极其困难），而仅评估每条推文中链接的新闻媒体通常是发布事实性新闻还是虚假新闻。研究人员还为每个新闻媒体记录了一个政治倾向和极端程度评分，该评分同样来自传播学者的共识。\n\
  \n他们发现，在包含新闻链接的 3000 万条推文中，10% 指向假新闻机构，另有 15% 指向极端偏颇的新闻。近五分之一的假新闻链接来自非官方 Twitter\
  \ 应用（而在来自非官方 Twitter 应用的推文中，链接到假新闻的可能性是链接到传统新闻的四倍）；虽然非官方应用也有一些合法或半合法的用途，但这被解读为在大选前夕假新闻传播中存在大量机器人活动的证据。通过分析转发，研究人员得以研究信息的网络流动并识别关键影响者。他们发现，传统新闻的主要传播者是拥有经过验证的\
  \ Twitter 账户的记者和公众人物，而大量虚假和极端偏颇新闻的主要传播者则是未知用户以及随后被删除的账户。假新闻的推文/转发网络比传统新闻的网络连接更紧密、更同质化；假新闻网络与右翼新闻推文网络的交织程度也高于与中间派和左翼新闻网络的交织程度。\n\
  \n或许最值得注意的是，研究人员发现了克林顿支持者和特朗普支持者在与 Twitter 新闻互动方面的两个关键差异。首先，对于中间派和左倾新闻，存在一种自上而下的效应：主要传播者——正如你所记得的，是记者和公众人物——强烈影响了克林顿支持者的\
  \ Twitter 活动；而对于特朗普支持者，影响方向则相反：以一种自下而上的方式，是特朗普支持者的活动影响了假新闻的主要传播者，这意味着假新闻的主要传播者主要是大众中流传故事的渠道和放大器。其次，研究发现克林顿支持者主要与中间派和左翼新闻来源互动，而特朗普支持者则更倾向于与各种新闻来源互动——从右翼到左翼，从事实性到虚假性。\n\
  \n\n\n另一组研究人员更直接地研究了²⁹⁷2016 年大选前几周 Twitter 上机器人活动的范围。通过使用政治话题标签和关键词搜索，他们在 9 月 16\
  \ 日至 10 月 21 日期间收集了近 300 万用户的 2000 万条推文。然后，他们应用机器学习算法将这些推文分类为人类发布和机器人发布，该算法报告称，近\
  \ 20%的推文可能来自机器人。但请记住，确定哪些社交媒体活动是由机器人驱动的已被证明具有挑战性，任何此类尝试都必然存在误差范围。本研究中使用的算法是一种监督学习方法，依赖于一千个预测因子，“涵盖内容和网络结构、时间活动、用户档案数据和情感分析”，这些预测因子基于已知的\
  \ Twitter 机器人和人类活动进行训练。在之前的测试中，它的准确率达到了 95%，但无法保证随着新的机器人算法、技巧和行为的发展，这种高准确率能够持续保持。\n\
  \n在训练完任何监督学习算法后，都可以对其进行检查，以确定哪些预测因子最具影响力（其技术术语是*特征重要性*）。对于本研究中使用的特定机器人检测算法，结果表明机器人账户的最强指标是：\n\
  \n*   用户资料看起来像 Twitter 默认设置，而非使用个性化信息进行定制；用户名在创建时具有随机性迹象；并且账户是最近创建的。\n*   缺少地理定位元数据（人类在通过移动设备发推文时会记录此信息）。\n\
  *   各种活动统计数据：机器人经常在短时间内发布大量推文，这是人类不可能或几乎不可能完成的；不出所料，它们的转发与原创推文的比例往往远高于人类，其关注数与粉丝数的比例也是如此。\n\
  \n当将算法标记为机器人活动的 400 万条推文与标记为人类活动的 1600 万条推文进行比较时，研究人员发现了一些有趣但某种程度上可预见的对比。首先，人类推文的数量往往对政治事件做出反应——例如，在总统辩论结束后立即有大量推文——而机器人的推文数量与政治事件的关联性较弱。其次，虽然机器人整体上生成的回复数量低于人类用户，但它们的推文被转发的比率与人类相同。另一个研究团队研究了²⁹⁸2016\
  \ 年大选前六个月开始的十个月期间 Twitter 上的机器人。他们发现，在错误信息传播的早期阶段，机器人尤其活跃且成功——经常在虚假新闻故事发布后的几秒钟内就进行分享——通过这种方式，它们会传播虚假新闻，直到这些新闻在\
  \ Twitter 上通过人类有机地传播开来。他们还发现，机器人经常以高频率的回复和提及来针对有影响力的人类用户，这往往会最终吸引人类用户参与。\n\n另一个研究团队，这次是牛津大学的团队，发表了一篇论文²⁹⁹，研究了\
  \ 2016 年大选前后十天期间美国境内 Twitter 上低质量政治信息的地理分布。在这项研究中，如果新闻故事链接指向的新闻机构属于某些俄罗斯、维基解密和垃圾/虚假新闻网站列表，则该链接被视为低质量；推文的位置信息则从用户账户资料中获取。并非所有用户都能获取位置信息，即使在能获取的用户中，资料中列出的位置也不一定准确；但总体而言，这仍然能给出一个合理的地理分布概念。研究人员发现，按每个州的推文数量加权后，选举中有影响力的摇摆州平均看到的低质量新闻链接推文比例高于非竞争州。这里的差距相对较小，但由于选举的激烈程度和选举人团的结构，微小的差距可能产生巨大的影响。该研究的一位作者表示³⁰⁰：“我们知道俄罗斯人确实在社交媒体上进行了投资。摇摆州正是你想要针对的目标。”\n\
  \n迄今为止讨论的研究提供了关于 2016 年大选期间 Twitter 上虚假新闻传播和网络结构的信息性视角，但缺少的是这如何转化为注册选民在 Twitter\
  \ 上的个人层面体验和活动。幸运的是，2019 年在顶级学术期刊《科学》上发表的一篇论文³⁰¹试图填补这一关键缺失的环节。研究人员将公共选民登记记录样本与 16000\
  \ 个 Twitter 账户关联起来，并收集了这些用户（我们称他们为“选民”）在 2016 年 8 月至 12 月期间的推文。他们收集了所有关注这些选民以及被这些选民关注的用户列表，并通过抽样后者发布的推文（称为“曝光”，因为这些是选民在其信息流中可能看到的推文），研究人员能够估算出选民信息流的构成。他们将调查范围限制在包含\
  \ Twitter 外部政治内容链接的曝光上，并利用这些链接对每位选民的左右意识形态进行离散估计。以下是他们的发现。\n\n\n\n首先，从曝光量和分享量的统计数据来看。在所有政治链接的曝光中，有\
  \ 5%来自假新闻，而这些假新闻曝光中超过一半来自同一个七家假新闻来源。但这些假新闻曝光在选民中并非均匀分布——事实上恰恰相反：仅占选民总数 1%的用户，其信息流就占据了假新闻曝光的\
  \ 80%。假新闻的发布则更加不均衡：选民分享的假新闻链接中，有 80%来自仅占选民总数 0.1%的用户。换句话说，虽然选民们看到和分享的假新闻数量庞大，但看到假新闻的行为高度集中在某些选民（被称为“假新闻重度消费者”）的信息流中，而分享假新闻的行为则更加集中在数量更少的选民（被称为“假新闻超级分享者”）身上。这些超级分享者极其活跃：平均而言，一个典型的假新闻超级分享者每天发布\
  \ 70 条推文，而整体上一位典型选民每十天才发布一条推文。一个典型的假新闻重度消费者每天接触近 4700 条政治链接，而整体上一位典型选民每天只接触 50 条。假新闻超级分享者的活跃程度甚至远超推特上一般的高产分享者，研究人员怀疑其中许多是所谓的`cyborg`账户，即半自动化账户（也就是机器人与人类的混合体）。\n\
  \n接下来，从选民角度的统计数据来看。在选举最后一个月，选民平均接触到 200 条假新闻链接。平均而言，选民看到的政治链接中只有 1%是假新闻。信息流中假新闻浓度较高的选民，其政治立场更倾向于保守派而非自由派：看到至少\
  \ 5%假政治链接的选民，在自由派选民中仅占 2.5%，但在保守派选民中却超过 16%。选民年龄越大，其信息流中看到的假新闻比例越高。摇摆州的选民看到的假新闻比例略高（这与之前讨论的研究结果一致），男性和白人也是如此，但这些影响的规模相当小。在政治立场被归类为极左的选民中，分享过假新闻链接的比例略低于\
  \ 5%；左派和中间派用户的比例也略低于 5%，而右派用户的比例则跃升至略低于 12%，在极右用户中，超过五分之一的人在五个月的研究期间分享过假新闻链接。\n\n\
  ## 谎言比真相传播得更快、更深\n\n上述讨论的研究通过将新闻机构的链接分类为传统媒体或假新闻媒体，调查了各种推文数据集。这种基于组织的方法提供了大量有价值的信息，但它有意忽略了这些推文中链接到的实际故事。一些媒体既发布真实新闻也发布假新闻，这使得这种方法存在问题。此外，从社会角度来看，在某种程度上最重要的是那些在社交媒体上病毒式传播的特定故事——这种传播通常涉及在不同新闻机构之间跳跃（回想一下你在第\
  \ 1 章中看到的纵向和横向传播）——以及这些故事沿途所触及的人群。一项被广泛视为假新闻研究巅峰之作的研究，由麻省理工学院的三位学者于 2018 年发表在《科学》杂志上，采取了一种全新的方法，追踪了推特上单个故事（包括真实和虚假的）的传播轨迹。他们的发现引人入胜且具有变革性；简而言之，他们表明谎言比真相传播得更快、更深。要理解这项研究的意义、影响和局限性，值得深入探究其中的细节。\n\
  \n研究人员首先整理了一份清单，基本上包含了在六个流行且备受尊敬的事实核查网站上至少出现过一次的所有故事/断言/主张。^(³⁰³) 这产生了一个“谣言”集合，每个谣言都通过结合各个事实核查组织（所有这些组织都依赖专家人工判断，而非本书下一章讨论的那种算法分析）的评分，在真实到虚假的尺度上进行了标注。研究人员获得了非凡且近乎前所未有的权限，可以访问推特上发布过的所有推文的完整历史档案，一直追溯到\
  \ 2006 年的第一条推文。他们搜索了截至 2016 年 12 月的所有英文推文，并提取了所有包含指向六个事实核查网站之一中某个条目链接的推文。在这些提取的推文中，他们进一步提取了那些以回复顶层推文形式存在的推文，然后结合机器学习和人工方法，检查事实核查链接中的标题是否与所回复的顶层推文内容高度匹配。对于每个包含相关事实核查回复的顶层推文，他们提取了完整的回复和转发网络，称之为“谣言级联”，因为顶层推文涉及整理清单中的某个谣言，而回复和转发网络则展示了该谣言实例如何在推特上层叠传播。\n\
  \n接下来，使用机器学习处理这些谣言级联中顶层推文的文本、链接和图片，根据它们所涉及的谣言进行分组。研究人员还通过搜索推特上包含与谣言级联中任何顶层推文相似的文本/链接/图片的顶层推文，并提取其回复和转发网络（即使回复中没有任何一条包含事实核查链接），收集了额外的谣言级联。最终，他们收集了超过\
  \ 12.5 万个谣言级联，这些级联对应着大约 2500 个不同的谣言。这些谣言代表了至少被六个组织之一核查过的任何有争议的信息片段，而谣言级联则代表了它们在推特上的各种传播轨迹。在这些谣言中，70%是虚假的，20%是真实的，其余\
  \ 10%是混合的；在谣言级联中，65%涉及虚假谣言，20%涉及真实谣言，其余 15%涉及混合谣言。\n\n\n\n利用网络科学工具分析这些信息级联后，本研究的主要发现如下：虚假谣言比真实谣言传播得更快、更远、更深、更广；这种传播在政治类虚假谣言中比在科学、金融和灾难等话题的虚假谣言中更为显著；虚假谣言往往更具新颖性，并涉及恐惧、厌恶和惊讶情绪，而真实谣言则更倾向于与其他内容相似，并涉及期待、悲伤、喜悦和信任；最后，机器人似乎以大致相同的速度加速了真实和虚假谣言的传播。综合第一点和最后一点发现，这意味着更倾向于传播虚假谣言而非真实谣言的是人类，而非机器人。话虽如此，需要牢记的是，这项研究关注的是十年跨度内的总体行为——在特定具体案例中，机器人可能扮演了更重要的角色，这种可能性是完全存在的。\n\
  \n以下是关于这些发现的更多细节。平均而言，虚假谣言传播到一千五百人的速度比真实谣言快六倍。即使控制了引发谣言级联的用户之间的各种差异（例如他们的粉丝数量以及账户是否经过推特验证），虚假谣言被转发的可能性仍比真实谣言高出百分之七十。当谣言为假时，最大的谣言级联可传播至约五万名用户，而当谣言为真时，仅能传播至约两千名用户。信息在推特上传播并触达大量用户有两种截然不同的方式：一位有影响力的网红可以发布一条故事，被众多粉丝直接转发；或者一位不太知名的用户发布一条故事，被少量粉丝转发，然后这些粉丝的粉丝再继续转发，以此类推。即使一条故事在这两种情况下获得了相同数量的转发，第一种被视为浅层传播，第二种则被视为深层传播，因为它更深入地渗透到了社交网络中。本研究发现，虚假谣言不仅最终覆盖了更广泛的受众，而且其传播深度也大得多：真实谣言很少能串联起超过十层转发，而传播最广的虚假谣言则能达到二十层转发——并且它们达到这一深度的速度，是真实谣言达到十层深度的十倍。\n\
  \n这项研究的主要局限——我甚至想称之为弱点或严重缺陷——在于它并非真正关于假新闻与真新闻：它关乎的是有争议的信息。这里研究的谣言绝不等同于所有新闻的代表性样本，因为它们是从出现在事实核查网站上的条目中提取的。大多数新闻故事甚至谈不上有争议，因此不会出现在事实核查网站上。随便打开一家在线报纸的首页，哪怕是高度党派化的报纸，问问自己其中有多少故事可能会出现在事实核查网站上——我猜是少之又少。换句话说，实际情况可能是，真实新闻在推特上的传播比假新闻更广；我们确实不得而知。事实上，多年来，推特上保持最多转发记录的故事是（无可争议为真，因此未经事实核查的）奥巴马总统在\
  \ 2012 年成功连任的新闻。这篇《科学》杂志论文所揭示的——并且这无疑是一个令人震惊且具有影响力的揭示——是：在那些争议程度足以引发事实核查的新闻事件/故事中，未能通过事实核查的事件/故事，在每一个可以想象的衡量指标上，都比通过核查的事件/故事传播得更广。\n\
  \n### 2020 年大选\n\n对于社交媒体在 2020 年大选中的作用，我们尚未像对 2016 年大选那样有详尽的理解（请注意，关于后者的某些最重要研究是在大选两三年后才发表的），但我们确实有一些初步分析。在\
  \ 2020 年大选那一周，Facebook 上提及“停止窃选”（“Stop the Steal”）这一短语的公开帖子获得了三百五十万次互动（点赞、分享、评论）。该短语是支持特朗普的虚假选民欺诈指控的口号。^(³⁰⁴)\
  \ 其中百分之六的互动发生在四位知名影响者的页面上——埃里克·特朗普和三位保守派社交媒体名人——但最大的超级传播者却是唐纳德·特朗普：包含“选举”一词的、互动量最高的二十个\
  \ Facebook 帖子均来自他，并且这些帖子均被认定为虚假或具有误导性。在 11 月 3 日前后四周内，特朗普总统和其他前二十五名选民欺诈虚假信息传播者，在\
  \ Avaaz 调查所索引的 Facebook 公开帖子中，产生了超过四分之一的关于选民欺诈虚假信息的互动。关于 Dominion 投票软件删除了投给特朗普的选票这一虚假说法，超过十分之一的互动仅来自七个帖子。Facebook\
  \ 上许多支持特朗普的选举虚假信息的顶级传播者，同时也是推特上相同虚假信息的顶级传播者——最显著的例子当然是特朗普总统本人。\n\n迄今为止，对 2020 年大选中社交媒体上假新闻最详尽的审视，是选举诚信伙伴关系（Election\
  \ Integrity Partnership）于 2021 年 3 月发布的一份长篇报告^(³⁰⁵)，该报告仔细追踪了超过六百条选举虚假信息。作者指出的一个挑战是，社交媒体应用\
  \ Parler 被认为藏匿了大量选举虚假信息，但它不轻易提供数据，因此研究人员很难研究 Parler 上的内容；同样，Facebook 的私人群组是虚假信息的温床，而它们提供的有限访问权限使得研究这些群组变得困难。总体而言，该报告的作者发现，2020\
  \ 年大选中的虚假信息在所有社交媒体平台上都经历了长时间的积累——尽管大型平台努力限制——并且非常明显地展现了之前在与 QAnon 相关的讨论中提到的、不断演变的元叙事结构。关于选举的虚假信息形式多样、实例众多，都指向一种普遍但错误的感受，即选举将会（并且已经）被从特朗普总统手中窃取，以至于揭穿任何特定说法都几乎无法减缓这一运动的势头，有时甚至反而会为这种说法带来更多关注，并进一步引发对相关社交媒体平台和/或事实核查组织的不信任阴谋论。\n\
  \n要了解这是如何展开的，不妨看看这份选举诚信伙伴关系报告中追踪的一个具体虚假信息演变案例。回想一下，“窃选”叙事的一部分是声称 Dominion 投票机删除了投给特朗普的选票这一虚假说法。以下是该报告的发现：\n\
  \n> “Dominion 叙事……始于网站和推特在线对话中关于投票站故障的说法，然后通过 YouTube 视频和使用话题标签……在推特及其他平台（如 Parler\
  \ 和 Reddit）上传播。此后，高知名度账户以及像《The Gateway Pundit》这样的极端党派新闻网站（该网站利用推特推广其讨论此事件的报道）进一步吸引了关注。这种集体性的\
  \ Dominion 叙事传播此后不断壮大，随后得到了‘骄傲男孩’、《西方日报》和迈克·赫卡比在多个平台上的推广，包括 Facebook、推特、Instagram、Telegram、Parler\
  \ 和 Gab。”\n\n\n\n这一叙事脉络从定性角度生动展现了 2020 年大选假新闻是如何产生并迅速发酵的——它们往往在多个平台间流转，尽管缺乏 2016\
  \ 年大选时大规模数据驱动研究所提供的定量细节。\n\n顺便一提，虽然多米宁投票机的虚假叙事是近期许多假新闻的典型代表，但后续发展却远非典型——且可能对虚假信息的整体传播产生深远影响。2020\
  \ 年 12 月，多米宁投票系统公司的一名员工对特朗普竞选团队、数名特朗普关联律师（包括鲁迪·朱利安尼和西德尼·鲍威尔）以及多家保守派新闻机构（包括*Newsmax*、*One\
  \ America News*和*Gateway Pundit*）提起诽谤诉讼，指控其参与有关多米宁的虚假阴谋论。这起诉讼连同投票技术公司 Smartmatic\
  \ 的类似诉讼威胁，促使*Newsmax*迅速撤回此前关于投票机选举欺诈的指控——2021 年 4 月 30 日，*Newsmax*以未公开金额和解多米宁案，并正式道歉，承认在毫无证据的情况下播报了该故事（多米宁案其余部分仍在审理中）。^(³⁰⁶)\
  \ 与此同时，多米宁和 Smartmatic 均起诉*福克斯新闻*，索赔金额超过四十亿美元。^(³⁰⁷) 看来，传播假新闻终于要承担问责了——至少在这一特定案例中如此，尽管这确实可能开创先例。但值得注意的是，参与传播这一危险阴谋论的社交媒体公司均未遭受任何财务或法律后果；其原因在于一项名为\"\
  第 230 条\"的法律保护条款，我将在本章后续部分讨论。\n\n现在，我们该从研究假新闻的传播转向算法设计与实施，以帮助遏制其蔓延。我将首先介绍 Facebook\
  \ 和 Twitter 实际采取的措施——基于它们公开的有限信息——然后在下一节中，我将转向社交媒体公司外部多位研究人员提出的算法方案。\n\n## 算法如何发挥作用\n\
  \n社交媒体公司为减少假新闻和有害内容传播而实施的部分技术解决方案相当直接。Facebook 旗下拥有即时通讯服务 WhatsApp，该平台已被证明是虚假信息病毒式传播的另一途径，尤其在美国以外的国家；你在第\
  \ 3 章中看到了印度记者遭恶意深度伪造的案例，虽然我在第 4 章中未提及，但 WhatsApp 也是巴西 2018 年大选中极右翼和阴谋论内容的重要传播载体。为应对这一问题，Facebook\
  \ 于 2018 年将 WhatsApp 消息可转发人数从 250 人降至 20 人，此后又进一步降至 5 人；为迎接 2020 年大选，它还将 Facebook\
  \ Messenger 的转发上限从 150 人降至 5 人。^(³⁰⁸)\n\n其他技术解决方案表面上相对简单，但实施起来却困难重重。2020 年 1 月，Facebook\
  \ 宣布^(³⁰⁹)了一项看似直截了当的措施：开始在其平台上禁止深度伪造内容。更准确地说，这是对\"误导性操纵媒体\"的禁令，即任何\"经过编辑或合成——超出清晰度或质量调整范围——且普通用户难以察觉，可能误导他人认为视频中的人物说出了其并未说过的话\"\
  ，同时\"是人工智能或机器学习的产物，通过合并、替换或叠加内容到视频上，使其看起来真实可信\"的视频。这段冗长的描述实际上旨在明确禁令针对的是以欺骗方式使用的深度伪造内容，但你在第\
  \ 3 章中已经看到，深度伪造的检测——无论是算法检测还是人工检测——目前乃至将来都可能极具挑战性，因此这项禁令在实践中并不容易实施。此外，请注意该禁令不涵盖任何类型的浅伪造，且对于深度伪造仅涉及言语内容，不涉及行为——因此，例如公众人物婚外情的虚假视频仍被允许。另一个政策决策远比实施简单的例子是：2019\
  \ 年 10 月，Twitter 宣布将开始禁止政治广告。这需要精确界定哪些广告属于政治广告，而这绝非易事。\n\n然而，许多已实施的技术方法相当复杂，且高度依赖机器学习。Facebook\
  \ 在这方面尤为突出，这也是我接下来要讨论的话题。\n\n\n\n### Facebook 的机器学习审核机制\n\n2019 年 11 月，Facebook\
  \ 的首席技术官发表了一篇博文^(³¹⁰)，介绍了公司最新的“社群守则执行报告”并阐述了相关背景。这篇博文恰如其分地重点概述了该公司在利用人工智能进行内容审核方面的最新进展。文中指出，近期最大的改进源于从监督学习向自监督学习的部分转变。监督学习需要手动标记数据，通常是一个耗时费力的过程；而自监督学习所需的标签则直接从数据中自动提取。你在第\
  \ 6 章中看到了自监督学习的一个例子：`BERT`。那里的训练数据是文本，其中一些单词被随机隐藏，算法需要学习预测这些隐藏词，而这些隐藏词的数据标签就是单词本身。自监督学习使得处理更大规模的数据集成为可能，因此可以训练出比使用传统监督学习方法时更大、也更准确的预测算法。由于\
  \ Facebook 拥有极其庞大的数据集，并且具备训练和支持超大规模算法的计算资源，这无疑是该公司值得探索的合理路径。当然，在很多情况下，我们仍然需要人工策划和标记的数据，但这些情况通常可以与自监督学习相结合，形成一种混合方法，从某种意义上说，这能兼顾两者的优势。\n\
  \n博文中提到的一个效果显著的自监督学习具体实例，是一个名为 `RoBERTa` 的语言处理系统，它是 Facebook 对标谷歌 `BERT` 的解决方案。回顾第\
  \ 6 章，`BERT` 与 `GPT-3` 非常相似，区别在于 `BERT` 的目标是生成单词的向量嵌入，这为在文本上执行广泛的机器学习操作打开了大门。与谷歌使用\
  \ `BERT` 类似，Facebook 利用 `RoBERTa` 来驱动其搜索算法——但不仅如此，Facebook 还使用 `RoBERTa` 来帮助识别仇恨言论等内容。这是一个混合方法的典型例子：Facebook\
  \ 在一个已手动标记为“仇恨”或“非仇恨”的帖子集合上训练一个传统的监督学习分类器，但算法并非直接处理这些帖子中的文本，而是处理经过自监督 `RoBERTa`\
  \ 转换后的文本——即这些帖子中的单词被转化成的数值向量。每当科技巨头需要计算机处理语言含义，尤其是语言中潜在的微妙用法时，你可以认为他们现在都在使用像 `BERT`\
  \ 或 `RoBERTa` 这样大规模的自监督语言模型，并且这样做已经显著提升了相比过去方法的性能。话虽如此，与严重依赖上下文和背景知识的虚假信息相比，仇恨言论通常更容易被识别，即使对计算机来说也是如此。\n\
  \n博文中强调的另一个重要进展是 Facebook 在内容审核上采用了一种新的“整体性”方法。此前，Facebook 的检测系统会分别查看帖子中的文字、图片和评论——并且系统也会分别处理每一种违规行为。例如，在采用整体性方法之前，一个分类器会检测发布照片中的裸露内容，另一个独立的分类器会检测照片中的暴力内容，还有一个独立的分类器会检测照片标题中的仇恨言论，等等。Facebook\
  \ 用一个名为 `Whole Post Integrity Embeddings`（`WPIE`）的预训练机器学习算法取代了这种做法。该算法将每个帖子（包括照片、文字、评论，甚至用户数据）转换成一个向量（一串数字），这样任何类型的违规分类器都只需处理这些向量，而无需将帖子数据拆分成互不关联的部分。换句话说，这就像\
  \ `RoBERTa`，但它处理的不仅仅是文本，而是整个 Facebook 帖子，包括评论、图片，并且能感知到发布帖子和评论的用户。\n\n总的来说，算法检测政策违规的工作方式是：算法为每条内容分配一个分数，如果该分数高于某个阈值，内容就会被自动移除；如果分数低于某个阈值，内容则被保留；如果分数介于这两个阈值之间，内容就会被标记出来，交由人工审核员查看和评估。Facebook\
  \ 表示，整体性的 `WPIE` 框架帮助该公司在 2019 年第三季度移除了超过 400 万条毒品销售内容，其中超过 97% 的内容得分高于自动移除阈值；这与采用\
  \ `WPIE` 之前的第一季度相比有了显著增长，当时移除的数量不到 100 万条，并且其中只有不到 85% 的内容得分超过了自动移除阈值。然而，几个月后新冠疫情爆发，检测健康虚假信息成为一项紧迫挑战，Facebook\
  \ 发现自己主要依赖人工审核员和外部事实核查组织——不过，正如我将在本章后面以及下一章更详细讨论的那样，机器学习在这一过程中仍然扮演着多个重要角色。\n\n正如你在本章前面所回忆的，社交媒体上的机器人活动长期以来一直是一个重大问题。同样，正如你在本章中所了解的，机器人的行为往往在数量上与人类行为存在明显差异——例如，其活动爆发速度远超人类所能达到的水平。在算法检测方面，机器人这种强大的效率反而成了它们的致命弱点：检测算法不仅可以在元数据中寻找机器人的直接迹象，还可以寻找行为上的差异。编写一个机器人来分享文章，甚至编写听起来像人类的简单帖子和评论相对容易，但要做到不被发现，就需要确保机器人以接近人类用户的频率和范围进行这些活动。而在\
  \ Facebook 的案例中，还有另一个重要因素：好友网络。在创建模拟人类行为的机器人方面，最具挑战性的是开发一个拥有看起来真实的好友网络的 Facebook\
  \ 账户^(³¹¹)——并且要创建足够多的此类账户，以便一支机器人大军能够产生显著影响。\n\n\n\n2020 年 11 月，Facebook 公布了其最新深度学习机器人检测算法的一些细节。该算法依赖于超过两万个预测变量，这些变量不仅关注目标用户，还关注该用户好友网络中的所有用户。预测变量包括人口统计信息（如好友网络中的年龄和性别分布）、好友网络的连接属性信息，以及\
  \ Facebook 未披露的许多其他信息。该算法通过两级流程进行训练：首先，在一个已自动标记的大型数据集上进行训练，以获得对任务的粗略理解；然后，在一个已手动标记的小型数据集上进行微调训练，使算法能够学习更细微的差别。Facebook\
  \ 估计，2020 年第四季度，其活跃用户中约有二十分之一是虚假账户。在那一年里，它利用这套新的深度学习系统移除了超过 50 亿个被认定为虚假且积极参与滥用行为的账户——这个数字还不包括每天数百万次被阻止的创建虚假账户的尝试。\n\
  \n2020 年 11 月，Facebook 还宣布了一种新的机器学习方法，用于对提交给人工审核员审查的帖子队列进行排序。此前，被标记为可能违反 Facebook\
  \ 政策（包括用户标记的帖子以及触发算法检测系统但未超过自动移除阈值的帖子）而需要人工审核的帖子，大多按照被标记的顺序由人工审核员审查。新方法使用机器学习来确定帖子在队列中的优先级，以便最紧急和危害最大的帖子得到优先处理。算法考虑的主要因素是传播性、严重性和违反政策的可能性——但这些因素的衡量方式以及它们之间的权衡并未披露，仅说明现实世界的危害被视为最重要的因素。\n\
  \n### Twitter 的机器人检测\n\n在 2017 年 9 月的一篇博文中，Twitter 披露了其在 2016 年大选后为遏制平台上的机器人活动所做的一些努力。当时，该公司的自动化系统每周能捕获约\
  \ 300 万个可疑账户——是选举前几个月前一年同期水平的两倍。Twitter 还使用机器学习来识别可疑的登录尝试——在该博文发布时，每天能阻止 50 万次此类尝试——通过寻找登录行为是脚本化或自动化的迹象，但并未说明这具体涉及哪些预测变量。此外，Twitter\
  \ 使用聚类算法来寻找由单一实体创建和/或控制的大型账户群，但我们不知道这个聚类过程涉及哪些变量。\n\n### 2020 年大选及其余波\n\n回顾第 6 章，Google\
  \ 减少错误信息影响的主要方法是在其搜索结果中提升优质新闻的排名——它通过为来源分配一个基于算法确定的分数来实现这一点，该分数基于数据驱动的指标（如 PageRank）以及人工驱动的质量评估指标。Facebook\
  \ 同样为新闻发布者分配一个分数，称为“新闻生态系统质量”（NEQ）分数，当帖子包含新闻文章链接时，该分数会发挥作用。通常情况下，NEQ 分数在信息流排名算法中只起很小的作用，但在\
  \ 2020 年大选几天后，马克·扎克伯格同意了员工团队的要求，大幅提高算法中 NEQ 分数的权重，以减少危险错误信息的传播。虽然这一变化是临时措施，但一些员工后来要求将其永久化；他们被高层领导拒绝了，但决定将研究这次临时提高\
  \ NEQ 分数的影响，并可能为未来的决策提供参考。\n\n### 其他方面？\n\n本节关于算法审核的描述，肯定只是 Facebook 和 Twitter 闭门开发调整算法以减少假新闻的无数多方面努力的冰山一角。为了了解其他可能的方法，不仅限于这两个平台，而是在任何社交媒体环境中，我接下来将转向由科技巨头之外的学术研究人员开发的方法。其中一些方法可能已经以某种形式被\
  \ Facebook 或 Twitter 的内部方法所吸收——我们只是不知道，因为公司对其方法保密。其他方法几乎肯定没有被采用，因为它们要么比公司实际使用的方法更原始，要么涉及过于庞大的设计改造，和/或过于严重地影响了公司的底线：用户参与度。此外，归根结底，社交媒体公司只会在有明确政策反对错误信息的情况下，才使用算法来移除它。尽管如此，仔细审视下一节中的方法是有帮助的。与上述\
  \ Facebook 和 Twitter 的内部方法不同，以下学术方法不隐藏任何技术细节——因此，除了展示可能性之外，它们还更具体地展示了算法审核在底层是如何真正运作的。\n\
  \n## 算法如何提供帮助\n\n在本节中，我将首先介绍基于更广泛的结构性理念来重新设计社交媒体网络的假新闻缓解方法；然后，我将转向更实际的方法，这些方法依赖于假新闻在当前运行的社交网络中的传播方式。\n\
  \n\n\n### 结构性方法\n\n2020 年 8 月提出的一项想法^(³¹⁷)是在社交媒体平台中引入“断路器”。类似于纽约证券交易所交易达到危险波动水平时自动关闭，社交媒体平台可以在关键时刻暂停或至少显著减缓内容的病毒式传播，以提供冷静期，并为事实核查人员争取更多时间来完成工作。这可能与\
  \ Facebook 在 2020 年大选后几天内实施紧急措施时的做法相差不远，但我们无法确定，因为正如我之前提到的，该公司几乎没有公开说明这些紧急措施究竟是什么。在危机时刻，可以在整个平台增加“摩擦”，也可以将其应用于单个有争议的内容，以减缓其病毒式传播，而不必完全审查。Facebook\
  \ 确实表示，它正在内部测试这种有意减缓病毒式帖子传播的想法。这种通过整体断路器或单个病毒式传播减速带来帮助打击错误信息的想法，甚至被比作“拉平曲线”——这是新冠疫情最初几个月封锁期间的口号。^(³¹⁸)\n\
  \n社交媒体上一个经常被讨论的问题是“过滤气泡”，即人们被引导进入同质化的网络，与志同道合的用户分享倾向于强化既有观点的内容；这可能导致社会更加分裂、两极分化，在极端情况下甚至可能使人们生活在彼此不同的感知现实中。一些研究人员提出了算法方法来打破或至少缓解这些社交媒体过滤气泡。一种特定的方法^(³¹⁹)是首先为每个用户和每条社交媒体帖子（或至少每条分享的新闻链接）分配一个数字向量，该向量提供诸如政治倾向等各个维度的量化度量。过滤气泡表现为一组用户，他们的向量彼此相似，并且倾向于发布具有相似向量的内容。基于此设置，研究人员设计了一种算法，优先向选定的用户群体推送多样化内容，这些用户被认为可能分享这些内容并帮助其在社交网络中传播，从而穿透过滤气泡。研究人员发现，他们选择用户来启动这种传播的特定策略，在提高网络中信息流整体多样性方面的效果，是简单地将多样化内容推送给连接最广泛的用户这一方法的**三倍**。研究人员承认，这种以多样性为导向的信息流算法无法像当前的社交媒体算法那样最大化用户参与度——我不禁要问，在现实世界中为这些意识形态数值向量赋值会有多么困难。\n\
  \n研究人员提出的另一种方法——与前一种方法类似，涉及对社交网络应如何运作以减少两极分化进行相当重大的重新构想——基于去中心化的理念。许多社交网络自然会在高影响力用户周围形成一系列中心。如果你将每个这样的影响者视为一个自行车轮的中心，辐条向外延伸到关注者，那么网络看起来就像一堆自行车轮，不同轮子之间有一些但并非很多连接。这种网络结构的一个后果是，观点和看法往往从数量有限的中心影响者那里产生并向外渗透，但它们很难从一个自行车轮跨越到另一个。以推特上的唐纳德·特朗普为例，存在一个以他为中心的庞大自行车轮，涵盖了该平台上大部分共和党用户群，并可能阻碍了该用户群内多样化观点的流动。社交网络去中心化的总体思路是重新设计它，使得这些自行车轮状的影响力圈不太可能出现。这也可以被视为创建*平等主义*网络，其中用户对彼此的影响力失衡程度较低。\n\
  \n一位倡导去中心化网络的知名学者声称^(³²⁰)，在平等主义网络中，“新想法和观点可以来自社区的任何地方”，它们的传播“基于其质量，而非宣扬它们的人”。这与中心化网络形成对比，据称在中心化网络中，“如果处于中心的那个影响者表现出哪怕一点点党派偏见，它也可能在整个群体中被放大”。这位学者甚至断言，社交媒体的中心化本质是“错误信息和假新闻变得如此普遍的主要原因之一”，因为它“赋予了有偏见的影响者对其社区不成比例的影响力——使得小的谣言和猜测被放大为广泛的误解和错误信念”。这些大胆的主张很难得到证实，但特朗普总统被发现^(³²¹)是新冠病毒错误信息的最大单一传播者这一事实，至少在一定程度上指向了这个方向。然而不幸的是，目前关于中心化网络弊病的研究远远超过了关于如何防止社交媒体网络变得中心化——而又不明确决定人们应该与谁交朋友和/或限制他们可以拥有的关注者数量——的研究。\n\
  \n\n\n### 虚假新闻检测\n\n本章前文关于量化虚假新闻传播的内容中，有一点应该显而易见：简而言之，虚假新闻在社交媒体上的传播方式通常与传统新闻有所不同。这是一家名为\
  \ *Fabula* 的伦敦人工智能初创公司开发的虚假新闻检测算法^(³²²)背后的基本原理，该算法在演示后不久，其公司便被推特收购。`Fabula` 的方法采用了一种针对网络进行定制优化的深度学习版本；这使得开发者能够训练一个监督学习分类器，其任务是基于大量关于社交媒体平台信息流动的预测因子，来区分真实新闻和虚假新闻。该算法对社交媒体帖子的内容视而不见——它只观察并依据那些通过用户互动构成的、在网络上传播内容的复杂网络（以及参与这些互动的用户资料）来进行分类。虽然这在每个个案中都不可能产生完美结果，但只要在大多数情况下准确，那么处于边界线上的案例总可以被推荐给人工审核。这种方法的主要挑战之一是，通常来说，我们希望在虚假新闻*变得*病毒式传播*之前*就抓住并移除它，而不是在它*已经*传播开来*之后*才识别出来——因此，为了让\
  \ `Fabula` 的算法在实践中发挥作用，它需要学会如何仅基于初始传播数据，在非常早期就检测出虚假新闻。\n\n2020 年 4 月，由微软研究院和亚利桑那州立大学的研究人员组成的团队提出了一种虚假新闻检测算法^(³²³)，其目标特别在于通过结合不同类型的预测因子来早期检测虚假新闻。与\
  \ `Fabula` 无视内容的系统不同，该团队的监督学习分类器确实从实际内容中提取了一些信息，但它只使用那些相当容易提取的度量指标（也就是说，它并不试图真正阅读、理解或评估内容的真实性）。他们的系统为帖子及链接中的文章分配情感分数（衡量其措辞的正面或负面程度），因为虚假新闻的情感范围往往比真实新闻更广；它通过将每个用户与一个带有标记偏见分数的用户数据库进行比较，来评估每个用户的偏见程度，因为带有偏见的用户更有可能分享虚假新闻；此外，该系统根据用户的元数据（个人资料信息和账户活动统计）对用户进行聚类，并将属于大型同质化集群的用户赋予较低的信用评分，因为他们更有可能是机器人或处于极强回音室中的人类用户。这些度量指标及其他相关指标构成了这个监督学习算法中的预测因子——而所有涉及的文本处理都由之前讨论过的\
  \ Facebook 的 `RoBERTa` 系统处理。由于预测因子涉及内容而不仅仅是网络流量，因此在虚假新闻传播之前就立即抓住它的可能性是存在的。\n\n仅仅几个月后，在\
  \ 2020 年 7 月，一篇研究论文^(³²⁴)发表，该论文在监督学习算法中使用了基于内容的预测因子——其目的并非检测虚假新闻，而是“将影响力操作与有机社交媒体活动区分开来”。他们选择只使用那些从社交媒体帖子的公开且可人工解读的方面提取的预测因子；这提供了透明度，也使得该算法能够在任何社交媒体平台上运行。他们的预测因子包括帖子的内部特征（如发布时间、字数、是否包含新闻网站\
  \ URL）和外部特征（如帖子中是否包含一个域名在已知水军活动的训练数据中很流行的 URL）。这篇论文的主要目标实际上与其说是设计一个实用的、最先进的算法，不如说是为了了解社交媒体内容的哪些方面最能指示特定环境下的影响力活动。具体来说，他们研究了在美国的推特、Facebook\
  \ 和 Reddit 上，中国、俄罗斯和委内瑞拉水军的活动。他们发现这些预测因子总体上效果不错，但哪些预测因子最相关，在不同社交媒体平台、不同影响力活动、甚至同一活动的不同月份之间，都存在显著差异。此外，为了能够准确检测出来自特定影响力活动的帖子，算法需要用来自同一活动的数据进行训练——这无疑限制了该方法在现实世界中的有效性。\n\
  \n2020 年的另一篇论文^(³²⁵)使用监督学习，根据新闻在推特上的传播情况，将其分类为虚假新闻或主流新闻。该研究特别关注了推特上不同类型互动（推文、转推、提及、回复和引用）所扮演的角色，并比较了在美国和意大利的表现。研究发现，提及的网络属性提供了一个相当强大的分类器，并且在美国最重要的网络理论预测因子与在意大利最重要的预测因子相同——但是，在一个国家训练的算法，在另一个国家直接应用时表现不佳，这表明需要进行针对特定国家的微调。虚假新闻检测算法对语言/地区的这种敏感性并非只是一个理论问题。最近发现^(³²⁶)，美国境内的西班牙语虚假信息在\
  \ Facebook 上泛滥，并且似乎比英语虚假信息更容易逃避算法检测：在 `Avaaz` 的一项研究中，70% 的英语虚假信息被标记了警告标签，而西班牙语虚假信息只有\
  \ 30% 被标记。一些人认为，这种差异可能是特朗普总统在 2020 年大选中在佛罗里达州表现意外强劲的驱动因素之一。\n\n### 算法调整\n\nFacebook\
  \ 应对虚假信息问题的主要方式有两种：一是向可疑内容添加警告标签（通过结合算法检测、专业审核和用户标记来发现这些内容），二是降低其在信息流算法中的排名。前面提到的\
  \ `Avaaz` 关于全球健康虚假信息的研究^(³²⁷)估计，如果更进一步，向所有在 Facebook 上与虚假信息互动过的用户提供更正后的事实信息，平均可以将他们对这些虚假信息的相信程度降低一半——并且，通过降低虚假信息内容本身以及有惯常发布虚假信息记录的小组、页面和用户的排名来“净化”信息流算法，将使此类内容的未来浏览量减少\
  \ 80%。在 `Avaaz` 报告发布之前^(³²⁸)，Facebook 已经在朝这个方向努力，并实施了一些较温和版本的这些措施（并试验了相关措施），此后这些努力也一直在继续，因此\
  \ `Avaaz` 对其提议的修改措施影响的“全有或全无”式描述有些误导性。尽管如此，看到对这类虚假信息缓解方法的潜在影响进行定量公开调查仍然非常有帮助，因为\
  \ Facebook 的内部研究是保密的。\n\n这个冗长章节的最后一个主题是一项已有 25 年历史的法案，该法案最近因其在允许社交媒体公司避免对其平台内容承担责任方面所扮演的角色而成为新闻焦点。\n\
  \n\n\n"
- '# 第 230 条


  1996 年《通信规范法》是美国联邦政府首次真正尝试通过立法来监管互联网上的低俗和淫秽内容。其中包含了如今臭名昭著的第 230 条，该条款规定：“任何交互式计算机服务的提供者或使用者，均不应被视为另一信息内容提供者所提供任何信息的发布者或发言人。”在撰写该条款时，这条措辞略显费解的规定主要意图是防止互联网服务提供商因网络上的非法内容而承担法律责任。那是在社交媒体时代之前，如今第
  230 条被解释为谷歌、Facebook 和 Twitter 等托管用户生成内容的科技公司的责任盾牌，免除了它们对其平台上内容的法律责任。关键在于，这些公司大多可以自行决定其政策和审核方式——而它们这样做的动机主要受商业考量驱动，而非直接担心承担法律责任。


  在 2020 年大选前夕，第 230 条引起了各政治派别人士的质疑：许多左派人士认为，它让谷歌和社交媒体公司可以毫无责任地传播有害的极端主义内容和虚假信息；而许多右派人士则认为，它允许这些公司歧视性地审查保守派言论并压制言论自由。2020
  年春天，Twitter 开始给特朗普总统关于选民欺诈的虚假和误导性推文贴上标签；特朗普对此回应称，应完全废除第 230 条。在此之前不久，乔·拜登也呼吁废除第
  230 条——但他的理由是，它让 Facebook 等公司得以“传播它们明知是虚假的谎言”。^(³²⁹) 就连马克·扎克伯格也表示支持对第 230 条进行一些修订，尽管
  1996 年原法案的合著者之一——参议员怀登——公开质疑了扎克伯格在这方面的意图：^(³³⁰) “他赚到了钱，现在想把身后的梯子抽走。Facebook 这样的公司竟然呼吁修改第
  230 条，这让你不禁要说，‘等等’。”


  2020 年大选结束仅几天后，国会邀请马克·扎克伯格和 Twitter 首席执行官杰克·多尔西就其平台、选举和虚假信息作证。^(³³¹) 扎克伯格欢迎建立一个新的跨平台监管框架，以确保所有大型科技公司都能在内容审核方面共同努力并受到平等对待，而多尔西则对此提出反对，称“一个集中的全球内容审核系统无法扩展”。多尔西表示，他的重点是给用户提供更多工具来自定义他们看到的内容，但他也呼吁对第
  230 条进行改革，要求对推荐/信息流算法进行更多监督并提高透明度。


  尽管 2020 年时任总统特朗普和时任候选人拜登都呼吁完全废除第 230 条，但现在看来，将会采取一种更温和的方式——基本上只是取消在特定情况下对特定类型内容的保护。目前正在审议的一项法案规定，如果科技公司的排名算法放大了与现实世界恐怖主义行为相关内容的传播，该公司将承担责任。^(³³²)
  此外，关于是否应完全取消在线广告的第 230 条保护也引发了讨论。拜登总统的副幕僚长合著了一篇专栏文章^(³³³)，指出“平台应对任何产生收入的内容负责”。在这场关于第
  230 条命运的辩论中，无论最终做出何种立法决定，几乎肯定会对科技巨头接下来在内容审核方面采取的技术方法产生巨大影响。


