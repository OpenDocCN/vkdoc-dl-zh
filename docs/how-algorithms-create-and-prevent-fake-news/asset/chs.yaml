- '# 自动播放的独裁者


  YouTube 推荐的算法与政治


  > *随着极右翼和阴谋论频道开始相互引用，YouTube 的推荐系统学会了将它们的内容串联起来。无论单个谣言本身多么不可信，当它们被整合在一起时，就会造成一种印象：数十个不同的来源都在揭示同一个可怕的真相。*

  >

  > ——马克斯·费舍尔与阿曼达·陶布，《纽约时报》


  随着对传统媒体信任度的下降，人们开始转向其他渠道获取新闻。在这方面，一个尤其受欢迎的平台（尤其是在年轻一代中，你将在本章中看到一些精确的事实和数据）就是 YouTube。任何人都可以发布视频来展示或解释世界上正在发生的事情，这一前提颇具吸引力，但现实是，YouTube
  在假新闻和虚假信息的传播中扮演了令人担忧的角色。强大而神秘的 YouTube 推荐算法驱动着该网站大部分的观看时长，因此，理解其运作方式对于理解 YouTube
  如何将观众推向离奇的阴谋论和危险的极右翼煽动者至关重要。本章将深入探讨推荐算法多年来的发展历程、它在实践中的行为方式、它可能如何影响了世界各地的选举和政治事件、该公司如何回应批评，以及它如何试图对其托管的内容进行审核。


  ## 日益增长的担忧之声


  “多年前，YouTube 的开放性对艺术家、活动家和创意人士来说是一种福音，但现在 YouTube 已成为扩大虚假信息传播活动的主要组成部分。”这是哈佛大学肖伦斯坦媒体、政治与公共政策研究中心研究主任琼·多诺万在
  2020 年大选后几天，一个支持特朗普推翻选举结果努力的假新闻 YouTube 频道网络出现时所说的话。^(⁹¹)


  “不到一代人之前，选民看待政治人物的方式很大程度上由成千上万的报纸编辑、记者和电视高管塑造。如今，大型科技平台背后的无形代码已成为新的‘造王者’。”这是《卫报》的保罗·刘易斯在其关于
  YouTube 算法如何扭曲真相的调查中所写。^(⁹²)


  “在 2018 年 1 月 4 日的一小段时间里，YouTube 上最受欢迎的直播视频是一个由白人至上主义者主导的节目。[……这个视频]是一个更大现象的一部分，即
  YouTube 用户试图通过以新闻和娱乐的形式传播极右翼思想来吸引年轻观众。[……]YouTube 在传播政治思想方面如此有效的一个原因是，在关于虚假信息和极右翼运动兴起的讨论中，它常常被忽视或低估。”这是丽贝卡·刘易斯在
  2018 年为数据与社会研究所撰写的一份关于 YouTube 的报告中所写。^(⁹³)


  “YouTube 强大的推荐算法，推动其 20 亿月活跃用户观看它认为他们会看的视频，这助推了该平台的崛起，使其成为全球许多人新的电视。[……]YouTube
  的成功伴随着阴暗面。研究表明，该网站的推荐系统系统地放大了分裂性、耸人听闻且明显虚假的视频。”这是《纽约时报》的杰克·尼卡斯在其关于 YouTube 算法如何鼓励阴谋论传播的调查中所写。^(⁹⁴)


  “YouTube 看起来像现实，但它被扭曲了，目的是让你在网上花更多时间。推荐算法优化的不是真实、平衡或对民主健康的内容。”曾参与 YouTube 推荐算法工作的前谷歌
  AI 工程师纪尧姆·沙斯洛说道。“在 YouTube 上，虚构正在超越现实，”沙斯洛继续说道。^(⁹⁵)


  “调查新闻网站 Bellingcat 分析了极右翼聊天室的信息，发现 YouTube 被列为成员‘觉醒’（一个网络俚语，指皈依极右翼信仰）的最常见原因。欧洲研究组织
  VOX-Pol 对近 3 万个与另类右翼相关的 Twitter 账户进行了单独分析，发现这些账户链接到 YouTube 的频率高于任何其他网站。”这是《纽约时报》的凯文·罗斯在其关于
  YouTube 如何激进化人们的调查中所写。^(⁹⁶)


  “现实是由任何走红的信息塑造的。”2016 年巴西左翼时任总统迪尔玛·罗塞夫弹劾运动的联合创始人佩德罗·德伊罗特说。“YouTube 的自动播放推荐就是我的政治教育。”巴西威权极右翼总统雅伊尔·博索纳罗所在政党的官员毛里西奥·马丁斯说。^(⁹⁷)


  本章的主要目标是深入探究这些令人不安的引述——理解 YouTube 神秘的推荐算法究竟做了什么，并剖析围绕它的争议。具体来说，我将探讨 YouTube 推荐算法是否真的助长了假新闻的传播，推动了有害阴谋论的增长，并支持了独裁者和另类右翼，尤其是在巴西和美国。


  ## YouTube 背景介绍


  YouTube 于 2005 年上线，一年后以 16.5 亿美元被谷歌收购。它在全球拥有超过 20 亿用户。^(⁹⁸) 这几乎占互联网用户的三分之一，超过了拥有电视的家庭数量。每天有
  10 亿小时的 YouTube 视频被观看。每分钟有超过 500 小时的视频被上传。YouTube 的流量估计在所有网站中排名第二，仅次于 Google.com。^(⁹⁹)
  在美国，YouTube 覆盖的 18 至 34 岁人群比任何电视网络都多；94%的 18 至 24 岁美国人使用 YouTube，这一比例高于任何其他在线服务。


  人们访问 YouTube 视频的方式主要有四种：


  *   嵌入在其他平台上的视频

  *   人们分享的视频的直接 URL 链接

  *   在 YouTube 首页进行关键词搜索

  *   YouTube 首页上的推荐视频以及播放视频时推荐的“接下来播放”视频


  2018 年，YouTube 首席产品官透露，^(¹⁰⁰) 用户观看 YouTube 视频总时长的 70%来自这第四类，即推荐视频。


  术语*推荐算法*指的是为这两种推荐视频（首页上的和“接下来播放”列表中的）提供动力的幕后系统；有时，它也用来指代 YouTube 的直接搜索功能，因为用户输入关键词，网站会返回它推荐作为匹配结果的视频列表，但我会避免混淆这些相当不同的过程。大多数关于
  YouTube 可能导致政治极化的公开辩论和讨论都集中在推荐算法上，这也将是本章的重点。


  公司内部人士表示，^(¹⁰¹) 推荐算法是 YouTube 增长的最重要引擎，他们将其描述为“现存规模最大、最复杂的工业推荐系统之一”。这种规模和重要性无疑为
  YouTube 的推荐算法对全球社会产生巨大影响创造了潜力，但要弄清楚它是否以及如何做到这一点，还需要深入挖掘。我将从技术角度的算法发展年表开始。




  ## 算法的发展


  在 YouTube 早期，推荐算法尚未问世之前，视频是通过嵌入或直接链接分享的，YouTube 网站本身主要是一个存储库，人们会在这里查找特定视频——例如，在办公室里被讨论的某个爆款片段。Facebook
  推出了信息流，即一条永无止境的个性化内容流，从而改变了社交媒体领域的格局。这项创新很快传播到了其他平台，如 Tumblr、Twitter、Instagram、LinkedIn——以及
  YouTube。对于 YouTube 而言，这一发展体现在两个方面：一是主页上会向用户推荐各类视频，二是在“`接下来播放`”的视频中，会建议用户在当前视频结束后观看什么。得益于
  2015 年新增的自动播放功能，用户甚至无需点击任何内容，就能顺着算法推荐的河流一路航行下去。


  ### 2012 年：从观看次数到观看时长


  你在第 1 章中看到，在线新闻业已将页面浏览量作为其主要货币：这是决定广告收入和定义成功的单一指标。在 YouTube 早期，视频的成功与否同样通过其获得的观看次数来衡量，但这存在一个大问题：广告分散在视频中，因此提前离开视频的用户看不到所有广告。两个观看次数相同的视频，如果其中一个能让用户观看更长时间，从而看到更多广告，那么它们产生的广告收入可能大相径庭。这表明，所有用户在某个视频上花费的总时间（称为*观看时长*）比观看次数更能体现视频的价值。请记住，不仅内容创作者从广告收入中获利——YouTube
  的公司利润也来自广告收入，因此 YouTube 公司需要用户尽可能长时间地观看视频。相应地，在 2012 年，YouTube 对其推荐算法进行了一项根本且持久的改变：目标不再是最大化观看次数，而是最大化观看时长。


  从技术角度来看，这意味着以下几点。当观看次数被优先考虑时，算法会尝试预测用户点击每个视频的概率，并推荐点击概率最高的视频。当以观看时长为目标时，算法则转而尝试预测用户会在每个视频上花费多长时间，并推荐预估时长最长的视频。从收入角度来看，算法的这一改变丝毫不令人意外；如果说有什么令人惊讶的，那就是它没有更早发生。而从整体增长的角度来看，这一改变取得了巨大的成功。YouTube
  的用户数量一直在稳步增长，但在 2012 年之前，每位用户在平台上花费的时间却相对平稳——尽管公司付出了诸多努力，例如改版网站以强调频道订阅，以及为顶级创作者购买高端录制设备。但随着算法指标从观看次数转变为观看时长，在接下来的三年里，每位用户的观看时长每年增长百分之五十。^(¹⁰²)


  在内容方面，一个显著的影响是大幅减少了平台上的标题党内容。正如优先考虑（页面）浏览量导致了博客和在线报纸上的标题党一样，YouTube 上也出现了同样的情况。在
  2012 年之前的 YouTube 时代，充斥着各种带有诱人标题和低俗缩略图的视频，用户点击后往往会感到失望——但这种失望并未被记录，因为无论用户多快离开视频，所有点击都算作一次观看。在推荐算法改变之后，为了在推荐排名中上升，视频必须尽可能长时间地吸引用户盯着屏幕。正如你将在本章剩余部分看到的那样，这并不意味着内容创作者不再钻系统的空子——它只是意味着游戏规则在
  2012 年发生了巨大而突然的改变。


  就在转向观看时长一个月后，YouTube 又做出了另一项关键改变：它开始允许所有视频创作者——而不仅仅是经过 YouTube 管理员审核的热门频道——在他们的视频中投放广告并赚取一部分广告收入。因此，无论是在算法发展还是经济层面，2012
  年对 YouTube 来说都是重要的一年。




  #### 2015 年：基于深度学习的重新设计


  下一个重大的幕后发展发生在 2015 年，当时 YouTube 母公司谷歌的人工智能部门 Google Brain 介入，重新设计了 YouTube 的推荐算法，旨在进一步提升平台的整体观看时长。Google
  Brain 基于深度学习构建了一个新版本的推荐算法。回顾第 2 章的速成课程，在传统机器学习中，算法设计者需要精心选择少量预测变量作为依据；而使用深度学习时，你可以向算法投入大量预测变量，它会自动从训练数据中学习如何将这些变量转化为少量有用的分层结构预测变量。通过这种方式，深度学习能够提取数据中更高层次的概念模式和含义。


  YouTube 推荐技术负责人吉姆·麦克法登^(¹⁰³)在评论这一向深度学习的转变时表示：“以前，如果我观看了一位喜剧演员的视频，我们的推荐算法能很好地给出另一个类似的视频。但
  Google Brain 模型能找出其他相似但不完全相同的喜剧演员——甚至更邻近的关系。”这一转变取得了成效：在 Google Brain 介入后的三年里，YouTube
  的总观看时长增长了二十倍。然而，深度学习的一个显著问题是它以透明度换取性能，YouTube 推荐算法也不例外。正如麦克法登本人所说：“我们不必思考太多。我们只需给它一些原始数据，让它自己找出答案。”


  Google Brain 深度学习算法首先将 YouTube 上浩瀚的视频海洋缩减为一个小池子，其中包含几百个用户可能喜欢的视频，依据是用户的观看历史、关键词搜索历史和人口统计数据。人口统计数据包括用户登录的地理区域、使用的设备类型，以及用户提供的年龄和性别信息（如果提供的话）。下一步是将这个小池子中的视频从最推荐到最不推荐进行排序，以便算法能够提供它认为在特定时刻最有可能吸引用户的视频。这一排序过程依赖于上述用户特定的预测变量，以及几百个视频特定的预测变量，包括用户与该视频所属频道的过往互动细节——例如用户观看过该频道的多少视频，以及用户上次观看该频道视频的时间。为了防止用户每次看到相同的推荐视频列表，算法会在向用户推荐某个视频而用户未观看时，降低该视频的排名。


  将过程分为两步（先缩减再排序）的主要原因之一是，第一步可以处理海量视频，但代价是使用较少的预测变量；而第二步可以纳入更多的预测变量，因为它专注于少量视频。这两步都依赖深度学习方法从海量数据信号中提取有意义的信息。完整的推荐系统在数千亿个样本上进行训练，最终形成一个拥有约十亿个参数的神经网络（你可能还记得第
  2 章中提到，这与 GPT-2 中使用的神经网络规模相当）。这就是 YouTube 自 2015 年起采用的 Google Brain 深度学习推荐算法的基本框架。^(¹⁰⁴)


  #### 2018 年：深度强化学习


  推荐算法必须在流行度与新鲜度之间取得艰难的平衡。如果它只推荐观看时长较长（或其他流行度指标，如观看次数、点赞数、评论数等）的视频，那么就会错过尚未走红但具有走红潜力的新内容和新视频。推荐算法还必须为每个用户选择的视频在熟悉度与新颖性之间取得微妙的平衡。它希望推荐与用户已观看视频相似的视频，因为这是判断用户个人品味和兴趣的最准确指南；但如果视频与用户已看过的视频*过于*相似，用户可能会感到厌倦和失去兴趣。Google
  Brain 团队在 2018 年带来的下一个重大创新，有助于解决这些相互抵消的因素。


  *强化学习*是机器学习的一部分，用于创建能在棋盘游戏（如国际象棋）和电脑游戏（如《星际争霸》）中击败人类玩家的计算机程序；它还被用来教机器人如何行走，以及教计算机化投资者如何玩转市场。它允许计算机进行探索和实验，并在过程中学习。简单来说，监督学习是关于开发预测，而强化学习是关于开发策略。强化学习已经存在了几十年，但在过去几年中，通过与深度学习的结合，它得到了强有力的复兴——深度学习帮助它探索更广阔的领域，并在过程中更深入地学习。


  强化学习的基本思想是创建一个奖励函数，算法会寻求最大化该函数。在电脑游戏中，奖励函数通常是获得的分数、完成的关卡数、生命耗尽前经过的时间、总移动距离，或其他类似的数量。在国际象棋等游戏中，奖励在整个游戏过程中为零，玩家获胜时为
  1，玩家失败时为-1。对于投资而言，奖励不出意外就是投资回报率。强化学习的一个关键方面是，算法采取的行动基于对奖励函数未来价值的估计，而不仅仅是当前价值。例如，在国际象棋中，大多数走法根本不会立即影响奖励函数，但通过足够的经验，算法可以估计哪些走法能使其更接近胜利。未来奖励相对于当前奖励会被折现，因此，一个能在三步内设置可能将死的走法比一个能在十步内设置可能将死的走法更有价值，但两者都比导致必然失败的走法更有价值。正是这种折现未来奖励的概念，使得强化学习算法能够制定出令人印象深刻的长远策略。


  但这与 YouTube 有什么关系呢？2018 年，Google Brain 团队将强化学习引入了推荐算法。在这里，计算机玩的“游戏”是尽可能长时间地让每个用户观看视频，因此奖励函数类似于每个用户在离开网站前，在一系列“接下来播放”推荐中花费的总观看时长。




  在强化学习出现之前，推荐算法会根据预估用户单独观看每个视频的时长，来选择并排序“接下来播放”的视频。这就像下棋时只考虑一步棋。而通过强化学习，算法会制定长期策略来吸引观众。例如，向用户推荐一个超出其舒适区的短视频，可能只会带来几分钟的观看时长，但如果这样做能引导用户接触到一个他们之前未曾涉足的新主题，那么用户可能会被这个新主题吸引，最终比停留在可靠但熟悉的领域停留更长时间。这是
  YouTube 推荐的长期战略层面，它有助于说明强化学习如何很好地应对了之前讨论的流行度与新鲜度、熟悉感与新奇感之间的微妙平衡。


  #### 此外……


  算法还发生了哪些其他重大变化？这很难知晓，因为算法在不断调整和修改，但 YouTube 将这些细节隐藏在公司的商业机密之下。我们大致了解谷歌大脑（Google
  Brain）深度学习方法的框架，因为该公司在 2016 年做出了一项不同寻常的举动：其工程师发布了一份高级技术报告^(¹⁰⁵)，描述了用于该算法的神经网络框架。YouTube
  工程师还在 2019 年发表了一篇关于强化学习方法的论文^(¹⁰⁶)，但其语气相当学术化：它描述了所提出的深度学习与强化学习混合方法带来的理论进步，并包含了一些来自有限实验的简要实证结果，但并未表明论文中讨论的方法已实际商业应用于
  YouTube 推荐算法。我们之所以知道它确实在 2018 年成为了算法的一部分，是因为该论文的第一作者在一次会议上的一则评论^(¹⁰⁷)。


  YouTube 工程师还发布了一些关于视频推荐系统的其他技术论文（例如，2019 年的另一篇^(¹⁰⁸)），但我们不知道其中哪些（如果有的话）已被纳入官方 YouTube
  算法，哪些只是为作者简历增添亮点的出版物。从很多方面来看，2016 年的深度学习论文是最后一次从内部提供的近距离观察。


  嗯，几乎如此。纪尧姆·沙斯洛（Guillaume Chaslot）是前谷歌 AI 工程师，曾参与 YouTube 推荐算法的工作。自 2013 年离开^(¹⁰⁹)公司后，他成为了一名公开的斗士，反对他所认为的该算法带来的有害影响。他一直致力于揭露该算法——以及那些闭门造车、塑造该算法的工程决策。我将在本章后面部分回到他的批评和揭露，但首先我需要总结一下
  YouTube 推荐算法的这段简短历史。


  由于沙斯洛和其他人将批判的聚光灯投向了该算法，以及它在 2016 年美国总统大选期间受到的广泛关注（有人可能会说是炮火），YouTube 公司代表被迫就算法的某些方面公开发表评论。这为我们提供了一些信息碎片，但远不及
  2016 年谷歌大脑技术报告中包含的细节。例如，在《卫报》2018 年的一项调查^(¹¹⁰)中，YouTube 代表表示，他们在 2016 年从单纯优化观看时长，转变为同时考虑“用户满意度”，具体方式包括考虑视频获得的点赞数、进行用户调查，并将这些数据纳入算法。


  在本章中，随着我讨论几项针对该算法的外部数据驱动调查（由沙斯洛和其他研究人员进行），你将会看到算法的更多细节。但现在，是时候转向本章的主要问题了：YouTube
  的推荐算法对社会产生了什么影响——尤其是在假新闻、大众对阴谋论的信仰，以及利用这些来获取支持的政治候选人/政党背景下？在上述《卫报》的调查中，一位 YouTube
  发言人就该算法可能影响 2016 年大选、使其有利于特朗普一事发表了如下言论：“我们的搜索和推荐系统反映了人们的搜索内容、可用视频的数量以及人们在 YouTube
  上选择观看的视频。这并非偏向任何特定候选人；而是反映了观众的兴趣。” YouTube 算法最早、最著名、最直言不讳的批评者之一是技术社会学家泽伊内普·图费克奇（Zeynep
  Tufekci）。在同一篇《卫报》文章中，她写道：“我们面临的问题是，仅仅因为引导人们大规模地陷入充满错误信息和谎言的仇恨兔子洞能增加人们在网站上的停留时间——而且它确实有效——就这样做，这在伦理上是否站得住脚。”


  我们应该相信哪一方？也许寻找答案的一个好起点是巴西。




  ## 巴西的 YouTube


  在巴西这个全球第四大民主国家，YouTube 的收视率已超过除一个电视频道外的所有频道。^(¹¹¹) 该国极右翼威权总统雅伊尔·博索纳罗，不久前还只是个在 YouTube
  频道上兜售阴谋论视频和极端主义宣传、在全国范围内知名度不高的边缘人物议员。在相对较短的时间内，他的 YouTube 频道订阅者数量激增，并为他吸引了一大批狂热追随者。他借助
  YouTube 上的人气浪潮，在 2018 年赢得了总统大选，而他并非孤例。一大批极右翼 YouTube 明星与博索纳罗一同竞选公职；其中许多人以历史性的优势赢得了选举，并且他们中的大多数现在都像特朗普在总统任期结束前使用
  Twitter 那样，通过 YouTube 进行治理。


  是什么让这群乌合之众在 YouTube 上迅速蹿红？2019 年，哈佛大学伯克曼·克莱因互联网与社会研究中心的一个研究团队为《纽约时报》进行了一项研究^(¹¹²)
  以寻找答案，他们找到的答案是（请击鼓）：YouTube 的推荐算法。研究人员编写了一个基于巴西的计算机程序，从一个热门频道或关键词搜索的 YouTube 视频开始，然后追踪其推荐的首选视频链。他们运行了该程序数千次，并研究了每次迭代产生的视频路径。他们发现，无论用户是从政治视频还是非政治视频开始，推荐算法“通常偏爱右翼、充满阴谋论的频道”，并且“观看过一个极右翼频道的用户，往往会被推荐更多此类频道”。正如《纽约时报》所报道的那样：“该算法将曾经边缘化的频道联合起来——然后为它们建立了受众群体……。博索纳罗先生的频道就是其中之一，他长期以来一直利用该平台发布骗局和阴谋论。”


  YouTube 在巴西的突然主导地位与该国政治体系的崩溃同时发生。博索纳罗无论是在线下还是线上，都没有改变自己的观点或行为；相反，他的视频被频繁地推荐给一个正在崛起的全国性受众群体，而这个国家当时正处于重大政治变革的前夕。针对《纽约时报》的调查，YouTube
  的一位发言人表示，该公司此后“在政策、资源和产品上投入巨资”，以减少有害错误信息的传播。嗯，这真让人安心。


  在确认 YouTube 在巴西 2018 年大选前后确实在推荐极右翼宣传内容之后，接下来需要解决两个重要问题：这些推荐是否真的在意识形态上改变了人们？以及，为什么由通常倾向左翼的硅谷计算机科学家设计的推荐算法会偏爱极右翼视频？对于前一个问题，我不知道是否有严谨的定量研究；然而，轶事证据以及政治运动内部成员的第一手经验，尽管并非确凿无疑，但表明答案是肯定的。现在让我来谈谈这一点。


  ### YouTube 对巴西人的政治影响


  根据 2019 年《纽约时报》的调查，博索纳罗政党的一位当地副主席将党内大部分成员的招募归功于 YouTube，包括他自己：“他回忆说，有一天他正在网站上消磨时间，平台向他展示了一个右翼博主的视频。他出于好奇观看了。然后平台又向他推荐了另一个，接着又一个。”他说在那次经历之前，他并没有意识形态上的政治背景，而
  YouTube 的自动播放推荐就是他的政治教育。


  政治团体“自由巴西运动”（MBL）的联合创始人——该组织非正式地被称为“巴西茶党”或“巴西 Breitbart”，曾在 2015 年召集推动自由派总统迪尔玛·罗塞夫下台的民众示威活动——表示：“我们这里有一种我们称之为‘点赞独裁’的东西。现实是由传播最广的信息塑造的。”他所说的“点赞”指的是社交媒体上的人气。MBL
  这个运动成立于 2014 年，在 2018 年选举中有六名候选人赢得了全国性席位，还有更多候选人赢得了州和地方级别的席位。MBL 的 YouTube 频道在选举当年从零订阅者增长到一百万订阅者，并且在选举前的一个月里，它每天都设法登上巴西
  YouTube 的首页；该团体 40% 的资金来自 YouTube 广告收入。^(¹¹³)


  MBL 中一位全国当选的候选人——被称为“假新闻头目”、“网络喷子”和“巴西版米洛·扬诺普洛斯”——在 22 岁时成为有史以来最年轻的巴西国会议员。他是如何如此早地涉足政坛的？在高中最后一年，他制作了一份关于一位巴西自由意志主义
  YouTuber 的报告——这份报告是他以 YouTube 视频形式完成的，该视频迅速走红，并为他带来了网络名声。他说 MBL 与博索纳罗更激进的极右翼政党存在冲突，但
  MBL 出于实际原因支持了它：博索纳罗能带来流量。另一位 MBL 候选人，现任州议员，表示：“我敢保证巴西的 YouTuber 比政客更有影响力。”他在选举时观看量最高的视频是什么？一个名为“与雅伊尔·博索纳罗的
  15 分钟”的视频，获得了近四百万次观看。“我真的很感激 YouTube，因为它成就了今天的我，”他曾这样宣称。在 2018 年他赢得的地方选举中，他获得了惊人的
  50 万张选票；而前几年的候选人赢得该席位只需 2 万张选票。


  关于 YouTube 对巴西政治的潜在影响这一问题仍在争论中，我们可能永远无法真正知道推荐算法是否影响了 2018 年大选的结果。话虽如此，我想你能猜到我在这场辩论中站在哪一边。所以现在让我转向上面提出的第二个问题，即，为什么一个表面上政治中立的推荐算法会支持极右翼和阴谋论视频。正如你将看到的，答案涉及
  YouTube 对其算法所做的工程调整，特别是之前讨论过的两个关键发展：2012 年主要指标从观看次数转向观看时长，以及 2015 年 Google Brain
  及其深度学习架构的介入。




  #### 极右翼如何受到青睐


  当然，并非`YouTube`推荐的政治视频全都是极右翼内容——只是它们占据了压倒性的、不成比例的比例。其中一个驱动因素本质上是心理层面的：一些容易吸引人们观看内容并让他们保持关注（从而最大化`YouTube`算法旨在优化的参数——观看时长）的情绪，是恐惧、怀疑和愤怒——而这些正是右翼极端分子和阴谋论者多年来所依赖的情绪。此外，许多右翼评论员早已在制作长篇视频论文并发布其播客的视频版本，因此`YouTube`从观看次数转向观看时长的策略，无意中奖励了那些原本就在做这些事的`YouTube`极右翼内容创作者。


  换句话说，可能并非极右翼煽动者精心设计其信息以在`YouTube`的推荐系统中获得良好表现——而且几乎可以肯定，并非`YouTube`故意设计其算法来支持极右翼内容。相反，两者似乎独立得出了关于如何吸引受众的相似结论，从而产生了意外的协同效应。`Google
  Brain`的深度学习框架通过不断向观众推荐他们未曾接触过的、越来越具有煽动性的视频，将他们进一步推入“兔子洞”，从而放大了这种意外的协同效应。该算法只是想为用户提供新鲜、引人入胜的内容，以最大化观看时长——但事后看来，实现这一目标的最佳方式，似乎是向观众提供越来越多的阴谋论、假新闻和极右翼宣传。


  随着时间的推移，极右翼阴谋论者和政治评论员意识到他们的方法正在奏效，并且`YouTube`的算法正在提升他们的人气。甚至在他们在`YouTube`上的人气催化出一场政治运动之前，这些内容创作者就已经有经济动力去加大制作力度——无论他们自己多么清楚视频中的说法是虚假的——这要归功于`YouTube`在
  2012 年决定允许所有用户（而不仅仅是经过审核的频道）通过广告收入将视频变现。


  #### 阴谋论盛行


  推荐算法不仅增加了`YouTube`上假新闻和阴谋论的观看量，还为其披上了一层合法的外衣。即使某个特定的阴谋论看起来明显不可信，但当`YouTube`推荐一系列来自不同创作者、相互模仿的同一主题视频时，观众往往会觉得所有迹象都指向同一个隐藏的真相。巴西女权活动家`Debora
  Diniz`曾成为一场激烈的右翼`YouTube`阴谋论诽谤运动的目标，她表示^(¹¹⁴)算法的这一方面让人感觉“好像是观众自己建立了联系，但实际上联系是由系统建立的。”


  这种现象在政治领域之外的话题中也能看到。巴西的医生发现，在`Google Brain`于 2015 年重新设计推荐算法后不久，就有患者前来将`寨卡病毒`归咎于疫苗和杀虫剂（而实际上，这些杀虫剂正是用于限制这种蚊媒疾病传播的）。患者也越来越多地因为自己在健康问题上的“`YouTube`教育”而拒绝接受重要的专业医疗建议。参与《纽约时报》对巴西`YouTube`调查的哈佛研究人员发现，“`YouTube`的系统经常将搜索`寨卡病毒`信息的用户，甚至那些观看过健康问题权威视频的用户，引导至阴谋论频道。”一位`YouTube`发言人证实了这些发现，并表示公司将改变其搜索工具呈现与`寨卡病毒`相关视频的方式（在我看来，这不过是杯水车薪）。为什么人们首先要制作这些有害的医疗虚假信息视频？为什么`YouTube`要推荐它们？因为它们能吸引观众并带来较长的观看时长——这意味着它们能为这些视频的创作者和`YouTube`自身带来收入。


  #### 玩这场游戏


  回顾`YouTube`算法的时间线，还记得 2018 年`Google Brain`引入了一种名为强化学习的机器学习技术（更常用于玩游戏），使推荐算法能够制定长期策略来吸引观众吗？在
  2019 年的一次人工智能会议上，一位`Google Brain`研究人员表示^(¹¹⁵)，就推动观看时长增长而言，这是两年来`YouTube`对算法最成功的调整。她还表示，这已经在改变平台上用户的行为：“我们确实可以引导用户进入一种不同的状态，而不是推荐他们熟悉的内容。”当这种不同的`YouTube`状态是一连串极右翼阴谋视频，并最终可能导致所有巴西公民进入一个不同的政治状态——一个仇外、反科学、威权的国家时，玩这场游戏就非常危险了。“有时我在看关于游戏的视频，突然就变成了一个`博索纳罗`的视频，”巴西一位
  17 岁的高中生说道^(¹¹⁶)，该国的投票年龄是 16 岁。


  ## YouTube 在美国


  尽管`YouTube`在巴西异常受欢迎，尤其是在有投票权的年轻人中，但几乎无法想象`YouTube`将用户推向极端右翼视频的问题仅限于巴西，并且只发生在巴西。`YouTube`推荐算法对美国另类右翼运动的潜在影响——尤其是在特朗普
  2016 年大选获胜以及他试图推翻 2020 年大选失利结果的背景下，以及更广泛地，在关于假新闻和危险阴谋论运动的全国性讨论日益增多的背景下——至今仍是一个激烈争论的话题。根据
  2019 年的一项调查，特朗普 2016 年获胜前的几年，对`YouTube`来说尤其鲁莽：^(¹¹⁷)“几位现任和前任`YouTube`员工……表示，公司领导在那几年痴迷于提高用户参与度。这些员工说，高管们很少考虑公司的算法是否在助长极端和充满仇恨的政治内容的传播。”如今，`YouTube`组织内外对这一问题的认识肯定比当时要高，但这并不意味着问题已经消失。




  ### 在 2020 年煽动选举风波


  2020 年选举日当天，在投票站关闭前数小时，YouTube 搜索“2020 年总统大选实时结果”的前 20 个视频中，有 8 个展示了带有虚假选举人团结果的类似地图。^(¹¹⁸)
  该列表中的一个频道拥有近 150 万订阅者，其中几个频道还获得了 YouTube 的“认证”。搜索“总统选举结果”的前四个结果全是虚假信息。奇怪的是，选举日当天搜索结果中出现的
  YouTube 频道大多与政治或新闻机构毫无关联——它们只是些投机取巧的人，利用选举轻松赚取广告收入。


  2020 年大选后的几天里，YouTube 上涌现出一批虚假新闻频道网络^(¹¹⁹)，大肆宣扬特朗普关于选举被操纵、胜利被窃取的虚假说法。这些频道与你在第 2
  章中遇到的、通过算法批量生产假新闻的*大纪元时报*媒体组织有着密切但大多被掩盖的联系。该网络其中一个频道的主持人迈克尔·刘易斯，在国会大厦暴乱发生仅几小时后就开始直播，重复特朗普关于选举的谎言，并将国会大厦暴徒归咎于反法西斯运动。他的
  YouTube 频道在不到两个月内就积累了超过 20 万订阅者和 1000 万次观看。尽管经过一些新闻调查后发现了其与*大纪元时报*的联系，该频道仍自称是刘易斯和几个“感觉真相正在消亡”的朋友的独立努力。


  总体而言，这个由七个虚假新闻 YouTube 频道组成的网络于 2020 年 11 月中旬启动，到 2021 年 1 月中旬已积累了超过 100 万订阅者和数千万次观看。2020
  年 12 月 9 日，YouTube 宣布^(¹²⁰)将删除此后发布的、声称存在影响选举结果的大规模欺诈或错误的任何视频；显然，这项政策并未得到足够严格的执行，未能阻止这些频道在
  12 月 9 日至 1 月 6 日期间发布的新视频获得数百万次观看。


  ### 美国媒体格局中的 YouTube


  美国人真的从 YouTube 及其推荐的视频中获取新闻和政治信息吗？奈特基金会和盖洛普 2018 年的一项民意调查发现^(¹²¹)，大多数美国成年人——以及超过十分之九的共和党人——表示他们近年来个人对新闻媒体失去了信任；这表明他们正在转向其他信息来源。与此同时，皮尤研究中心
  2018 年的一项调查发现^(¹²²)，表示从 YouTube 获取新闻或新闻标题的 YouTube 用户比例在 2013 年（20%）到 2018 年（38%）之间几乎翻了一番，并且大约一半的
  YouTube 用户表示该网站至少在一定程度上帮助他们理解世界上正在发生的事情。大约三分之二的用户表示，他们至少有时会遇到看起来明显虚假或不真实的视频。


  这项皮尤调查还发现，81%的 YouTube 用户表示他们至少偶尔会观看推荐算法建议的“接下来播放”视频，15%的用户表示他们经常这样做。也许人们在对民调机构甚至对自己坦诚时，并不总是诚实地承认自己让算法支配观看习惯的频率：回想一下，YouTube
  的内部统计发现，70%的观看时长来自推荐视频。


  除了直接观看之外，YouTube 改变美国政治话语的另一种方式是通过一种涟漪效应：YouTube 为各种个人提供大量观众，这些人随后又在传统媒体上接触到更庞大的主流受众。下面的故事说明了这种动态。


  2020 年 1 月新冠疫情爆发的头几周，一位名叫颜丽梦的香港医学研究员，基于未经证实的谣言（后来被证实完全是捏造和虚假的），开始相信该病毒是中国大陆政府制造的生物武器，并故意向公众释放。为了传播警告信息，她联系了一位以批评中国共产党而闻名的热门中国
  YouTube 博主王定刚。颜博士向王定刚自称是举报人和匿名消息来源，后者随后将这一关于新冠病毒的假新闻故事传播给了他的 10 万 YouTube 粉丝。这个故事继续传播并愈演愈烈；然后在
  9 月，颜博士不再匿名，出现在福克斯新闻的塔克·卡尔森访谈节目中，该节目获得了近 900 万次在线观看。


  同一名中国 YouTube 博主王定刚，据信^(¹²³)也是最早散播关于亨特·拜登的无根据虐待儿童谣言的人——这些谣言从他的 YouTube 频道传播到*InfoWars*，然后传到*纽约邮报*等主流媒体。通过这种方式，YouTube
  为第 1 章研究的假新闻危险垂直传播现象提供了一个强大的切入点。


  研究人员发现^(¹²⁴)，相信阴谋论的人往往比不太倾向于阴谋论的人群更依赖社交媒体获取信息。具体来说，60%相信 COVID-19 是由 5G 基站辐射引起的人表示“他们关于该病毒的大部分信息来自
  YouTube”，而在不相信这一虚假阴谋的人群中，这一数字下降到 14%。那些无视公共卫生建议、在出现新冠症状时外出的人，也比普通公众更依赖 YouTube 获取医疗新闻和信息。


  但这本书并非关于*技术*在假新闻中扮演的普遍角色，而是专门探讨*算法*——尤其是复杂的机器学习算法——所扮演的角色，在本章中，这表现为 YouTube 推荐算法。为了理解推荐算法对美国政治的潜在影响，我现在将转向几项实证调查，这些调查为我们了解算法的行为提供了一个窗口。


  ### 研究算法


  与上一节提到的皮尤调查并行，皮尤还对 YouTube 推荐算法进行了一次*随机游走*探索，类似于在巴西进行的哈佛调查。让我从这一点开始。




  ## 皮尤的随机漫步


  `皮尤`的探索^((125))是通过重复以下步骤十七万次来进行的：


  1.  从一个包含超过一万四千个英语 YouTube 频道（每个频道至少有二十五万订阅者）的列表中，随机选择一个排名靠前的视频。

  2.  随机选择排名前五的“接下来播放”推荐视频中的一个。

  3.  重复上一步骤四次。


  这产生了十七万条不同的、深入算法路径的五步漫步——所有这些操作都是针对一个“匿名”用户进行的，即一个未登录的用户，因此没有观看历史或其他算法可以依赖的个人数据。通过从整体上对这些随机漫步视频进行实证分析，`皮尤`的主要发现是，YouTube
  算法鼓励用户观看时长更长、更受欢迎的视频：视频的平均时长从最初选定视频的九分半钟，增加到随机漫步中第五个视频的十五分钟；平均观看次数则从第一个视频的八百万次增加到第五个视频的三千万次。这些随机漫步中的视频涵盖了各种主题，但其中很大一部分是音乐视频、电视竞赛节目、儿童内容和生活小窍门。


  换句话说，`皮尤`随机漫步实验的要旨在于，YouTube 将观众推向流行、通常是主流的內容。一些人将此视为证据，认为对 YouTube 算法用分裂性的另类右翼内容污染我们政治环境的担忧，即使不是完全捏造，也是夸大其词了。我对此并不信服，许多其他学者也是如此。


  首先，启动这些随机漫步的视频非常受欢迎——正如我提到的，平均有八百万次观看。可以想象，一旦算法发现用户正在观看非常流行的内容，它就会让用户停留在高观看量内容的轨道上，而那些对观看次数较少的视频表现出兴趣的用户，则可能会被推荐不那么主流的內容。我们不知道如果从更专业的内容开始，随机漫步的结果会有何不同。其次，这里的大规模分析相当粗糙——它总结了观看次数、时长和内容类别，但没有考察诸如合法新闻与假新闻、主流政治与极端政治（更不用说左派与右派）之间的区别。用户通常被推向音乐视频和儿童视频这类无害类别，这多少令人感到安心，但这种整体行为可能掩盖了许多重要的差异，并且对于专门在推荐中寻找新闻相关内容的用户，它没有提供任何信息。正如你很快会看到的，还有其他探究推荐算法的方法，而更精细的梳理会揭示出一个更为阴暗的故事。


  ## 查斯洛的政治推荐数据


  `查斯洛`，这位 2013 年被 YouTube 推荐算法团队解雇的计算机工程师，在 2016 年编写了一个程序，该程序与`皮尤`随机漫步中使用的程序类似，旨在探索
  YouTube 推荐算法将观众引向何处。其方法是从一个“种子”视频开始，然后自动依次点击排名第一的“接下来播放”视频。他的方法与`皮尤`的方法相比，一个主要区别在于，`查斯洛`的种子视频并非随机选取的热门视频，而是他相信在
  2016 年大选期间常见和/或重要的特定搜索的结果。也就是说，他试图模拟的不仅仅是 YouTube 上基于随机热度的推荐，更是源于特定时政搜索的推荐。他还考察了推荐视频中信息的质量，而不仅仅是像`皮尤`的整体分析那样提供粗略的主题分类。在十八个月的时间里，他使用自己的程序进行了各种实验，其结果发表在^((126))《卫报》上。他的研究“表明
  YouTube 系统性地放大了那些具有分裂性、煽动性和阴谋论的视频。”


  例如，当`查斯洛`的种子视频是对“米歇尔·奥巴马是谁？”这一关键词搜索的结果时，接下来的推荐链主要导向了声称她是男性的视频。当种子视频来自对教皇的搜索时，在“接下来播放”推荐序列中，有百分之八十的视频声称他是“邪恶的”、“撒旦般的”或“反基督者”。相当引人注目的是，`查斯洛`发现，无论用户搜索的是“克林顿”还是“特朗普”，然后点击一个视频并跟随“接下来播放”的推荐序列，算法“都更有可能将你推向支持特朗普的方向”。特朗普在
  2016 年赢得选举人团，得益于分布在三个摇摆州的八万张选票；当时，美国有超过一亿五千万 YouTube 用户，因此，推荐算法中即使存在微小的政治偏见，也可能对选举结果产生决定性影响。


  `查斯洛`向《卫报》的记者发送了一个包含八千多个视频的数据库，这些视频是他的程序在 2016 年美国大选前的四个月里，对“特朗普”和“克林顿”进行等量搜索，然后跟随排名第一的“接下来播放”视频链后所到达的。这些视频当然不全面，甚至不一定能代表当时
  YouTube 上的政治内容，但它们确实提供了大选前夕推荐系统的一个快照，用托数字新闻中心研究主任`乔纳森·奥尔布赖特`的话说，这是一种“可靠的方法论”，“捕捉到了
  YouTube 政治生态系统的明显方向”。




  ## 分析这八千个视频时


  在分析这八千个视频时，《卫报》记者表示，他们“对推荐内容中极端和阴谋论视频的数量之多感到震惊，而且几乎所有这类视频似乎都针对克林顿。”一些推荐视频并不出人意料——演讲片段、辩论、新闻，甚至《周六夜现场》的小品——但他们经常发现，当用户观看这些更主流的政治视频时，算法推荐中会出现反克林顿的阴谋论视频。这些反克林顿的阴谋论从质疑她的健康状况和精神状态，到“指控克林顿参与谋杀，或将她与撒旦教和恋童癖团体联系起来”。记者们手动查看了查斯洛特数据库中八千个视频里最常被推荐的一千个，发现“略超三分之一的视频要么与选举无关，要么内容大体中立或公正。在剩下的
  643 个视频中，551 个支持特朗普，只有 92 个支持克林顿的竞选活动。”


  查斯洛特的数据显示，推荐算法对亚历克斯·琼斯的《信息战》频道尤为有利，YouTube 最终在 2018 年将其移除并封禁——大约在 Facebook 首次采取此行动一周后。当
  YouTube 关闭该频道时，它已积累了 250 万订阅者，并在三万六千个视频中获得了 15 亿次页面浏览量。另一个被推荐算法大力推送的频道是加里·弗兰奇运营的《下一个新闻网络》，据《卫报》报道，该频道“表面上看起来像一个可信的新闻频道。但在这层表象背后，是一个可疑的运营机构，它回收来自极右翼出版物、假新闻网站和俄罗斯媒体机构的故事。”查斯洛特的研究表明，这个频道的受欢迎程度很大程度上可能来自
  YouTube 的推荐算法；YouTube 对此断然否认。《卫报》记者联系弗兰奇，想弄清这场争论中谁是正确的，弗兰奇发回了 YouTube 向其内容创作者提供的关于视频流量来源的官方私密数据截图。弗兰奇一个更受欢迎的视频是关于比尔·克林顿强奸一名
  13 岁女孩的假新闻故事，获得了 250 万次观看；弗兰奇的数据截图显示，该视频最大的流量来源是 YouTube 推荐。事实上，在弗兰奇截图中的所有视频里，除了一个之外，YouTube
  推荐都是其主要流量来源。


  虽然弗兰奇是一个（某种意义上的）全职投入其频道的专业人士，但《卫报》发现，即使是那些视频通常只有几百次观看的“业余侦探”和“兼职阴谋论者”，也“震惊于他们的反克林顿视频开始获得数百万次观看，仿佛被一股无形的力量推动着。”而在几乎每个案例中，YouTube
  的流量数据都揭示出这股无形的力量就是推荐算法。在一个案例中，YouTube 曾给一位内容创作者发邮件，称其反克林顿的虚假阴谋论视频违反了平台准则——然而，在这封邮件之后，来自推荐算法的流量仍持续涌入该视频，最终在选举前获得了超过两百万次观看。


  ### 追踪评论者


  2019 年，来自巴西一家研究机构和瑞士一家研究机构的学者团队进行了一项不同类型的研究^(¹²⁷)，探究 YouTube 如何可能将人们引向极右翼。该团队手动将近
  350 个 YouTube 频道上的超过 30 万个视频，分类到由反诽谤联盟设计的一个包含四个类别的系统中，该系统提供了一个极端主义光谱。从最不极端到最极端，这些类别分别是：媒体（传统事实新闻）、知识暗网（IDW，一个公开讨论优生学和“种族科学”等争议话题的社群）、另类轻右翼（声称否认白人至上主义，但相信关于少数群体“取代”的阴谋论），以及另类右翼（白人至上主义运动中的一个松散部分，由拒绝主流保守主义、转而支持拥抱种族主义、反犹太主义和白人至上主义意识形态的政治，并推动建立白人种族国家的个人组成）。


  通过追踪这些视频上超过 7200 万条评论的作者，他们发现“用户持续从较温和的内容迁移到更极端的内容”，并且“在某一年消费另类轻右翼或 IDW 内容的用户，在接下来一年中会成为另类右翼用户群的重要组成部分。”该团队还调查了推荐算法，并发现了可能通往另类右翼激进化路径，但这些路径相当微弱（“从另类轻右翼出发，我们跟随推荐系统
  5 次，大约每 25 次中会有 1 次发现一个另类右翼频道”）。


  需要指出的是，追踪评论活动只能提供一个有限且可能失真的 YouTube 观众情况窗口，因为绝大多数观众并不评论（而且不能假定评论者能代表全体观众），同时许多评论来自反驳视频主张、与支持者辩论或仅仅是挑衅的观众。该研究项目并未考虑评论的内容。此外，评论者每年在
  YouTube 上流向更极端内容的事实，并不能保证 YouTube 是这种右倾迁移的原因；很可能是一些外部力量将观众推向这个方向，而 YouTube 仅仅是反映了这股力量。尽管如此，追踪评论者是一种收集经验证据的有趣方式，与之前讨论的随机漫步方法截然不同——而且这项评论者研究似乎指向了与那些随机漫步研究相同的大方向。


  针对这项巴西-瑞士联合调查，YouTube 表示^(¹²⁸)“我们强烈不同意这项新研究中使用的方法论、数据，最重要的是其得出的结论。”巧合的是，当《卫报》记者就基于查斯洛特数据库的调查结果向
  YouTube 寻求回应时，YouTube 回应称，它非常尊重该报及其记者，但“然而，我们强烈不同意他们研究中使用的方法论、数据，最重要的是其得出的结论。”我们至少可以称赞
  YouTube 在这一点上的一致性。


  ### 矛盾的结果


  另一项关于推荐算法的实证研究^(¹²⁹)于 2019 年进行，与皮尤的随机漫步调查类似，发现 YouTube 的推荐算法起到了与激进化相反的作用——它“主动阻止观众访问激进或极端主义内容。相反，该算法被证明更倾向于主流媒体和有线电视新闻内容，而非独立的
  YouTube 频道。”作者莱德维奇和扎伊采夫甚至断言，“我们认为可以公平地说，大部分观看量都指向了左倾的主流内容。”


  这在社交媒体上引起了不小的轰动，并引发了其结论被直接推翻的巴西-瑞士团队的详细回应^(¹³⁰)。巴西-瑞士团队在逐点反驳的开头提出了如下精炼的指责：“对社交媒体数据进行大规模测量和分析是困难的。作者（莱德维奇和扎伊采夫）误解了他们的数据源，最终测量到的与他们自以为测量的东西不同，并基于其结果提出了毫无根据的主张。”莱德维奇和扎伊采夫随后又反驳了^(¹³¹)这一反驳。很难判断这场争论的实质；双方似乎都提出了合理的观点，却得出了截然相反的结论。




  ## 纵向研究


  2020 年春天，`Chaslot` 与加州大学伯克利分校的两位教授完成了一项关于 YouTube 阴谋论视频的纵向研究^(¹³²)。他们首先使用基于文本的监督式机器学习训练了一个算法，通过分析视频的描述、字幕和评论来判断其是否具有阴谋论倾向。随后，他们将这一算法应用于
  1500 万条推荐视频——这些视频是在 15 个月期间，向一个已退出登录的用户推荐的，该用户此前观看过来自 1000 个热门新闻相关频道的视频。他们发现了什么？请稍等片刻。


  YouTube 在 2019 年 1 月宣布^(¹³³)，将“开始减少推荐边缘内容以及可能以有害方式误导用户的内容——例如宣传严重疾病虚假神奇疗法的视频、声称地球是平的说法，或对
  9/11 等历史事件做出公然虚假声明的视频。”`Chaslot-伯克利`合作研究发现，在此公告发布后的几个月里，算法推荐的阴谋论视频数量确实稳步下降——从 2019
  年 1 月到 5 月，下降了 70%——但在 5 月达到相对低点后，数量又悄然回升，到 2020 年 3 月，仅比 YouTube 在 2019 年 1 月开始打击时低了
  40%。


  有趣的是，`Chaslot-伯克利`研究发现，YouTube 的打击行动在不同类别的阴谋论中效果差异显著。地平说视频和 9/11 骗局视频几乎已从 YouTube
  上完全清除，而否认气候变化的视频以及声称外星人建造了金字塔的视频却持续存在，甚至蓬勃发展。YouTube 的公告确实提到，其重点是打击可能以“有害方式”误导用户的内容，但他们如何解释和执行这一政策似乎相当令人费解。伯克利合作者之一`哈尼·法里德`曾这样表示^(¹³⁴)：“如果你有能力将某些特别有问题的内容基本降至零，那么你就能在很多事情上做得更多。他们用‘不能’这个词，其实意思是‘不愿’。”我稍后会回到
  YouTube 上审核虚假信息这个问题——然后在第 8 章中，我将更广泛地讨论社交媒体上的内容审核问题。


  ## 观看历史的作用


  本章讨论的所有基于数据的 YouTube 推荐算法调查——包括为《纽约时报》工作、探索巴西局势的哈佛团队，皮尤的随机漫步实证研究，《卫报》分析的`Chaslot`政治数据库，`Ledwich-Zaitsev`的论文，以及`Chaslot-伯克利`纵向研究——都有一个潜在的重大局限性：它们都依赖于一个已退出登录的匿名用户。这意味着该用户没有先前的观看历史、搜索历史或人口统计信息。


  与早期的机器学习形式相比，深度学习（正如你所记得的，这是谷歌大脑在 2015 年引入 YouTube 推荐的框架）的妙处之一在于，深度学习算法能够使用大量的预测因子，因为神经网络训练过程会自动将这些预测因子转化为数量更少、相关且具有层次结构的预测因子。在
  YouTube 的背景下，这意味着推荐算法不仅仅使用少数明显的预测因子（如观看次数和视频的平均观看时长），而是能够依靠详细的观看历史和行为，在更个性化的基础上剖析和分析用户。简而言之，深度学习实现了极致的个性化。


  这也是深度学习在医疗领域如此前景广阔的原因之一：它意味着计算机可以在极大程度上帮助医生定制诊断和治疗方案。但对于 YouTube 推荐来说，这意味着算法对你了解得非常多——它向你推荐的视频在很大程度上取决于你的个人数据。因此，通过一个仅仅从没有观看历史的匿名登录账户点击视频的计算机程序来模拟
  YouTube 算法在现实中的行为及其对社会的影响，是极其困难的。要获得关于该算法更真实的数据，唯一可行的方法是招募一大群志愿者，在一段时间内追踪他们与 YouTube
  推荐的互动体验。唉，据我所知，还没有这样的基于人类参与者的研究。


  ## 另一次算法失误


  在传播假新闻和虚假信息方面，推荐算法并非 YouTube 唯一的算法罪魁祸首。该公司的另一个算法会自动将平台上的视频整合到它创建的各种主题频道中。例如，CNN
  会将其所有视频发布到其官方 YouTube 频道，但 YouTube 的内部算法也会为该电视网的每个热门节目创建频道。问题在于，这个算法找到的视频并非全部真实。嗯，某种程度上是这样。


  2019 年 12 月发现^(¹³⁵)，最终出现在 YouTube 算法生成的 CNN 频道中的一些视频，实际上来自那些假冒 CNN 的虚假新闻机构。这些机构所做的，是发布
  CNN 真实片段的副本，但他们对缩略图进行了编辑，使其内容看起来耸人听闻、具有煽动性。例如，一个缩略图显示了一张看起来官方的 CNN 图表，上面有特朗普总统和伊朗总统，以及一条字幕写着“战争正式打响！”。但视频本身却是
  CNN 未经篡改的片段，与战争毫无关系。简而言之，视频内容本身并非假新闻，但浏览这些算法策划的新闻频道中列出的视频的 YouTube 用户，会在缩略图中看到令人震惊的虚假标题。


  仅仅一周之内，这些带有虚假缩略图的 CNN 视频就获得了超过 800 万次观看。YouTube 的一项调查发现，发布这些视频的机构并非任何有组织的政治影响或虚假信息宣传活动的一部分，也未发现与外国政府有任何关联。相反，这些机构似乎只是利用这种点击诱饵手段来从广告收入中获利。


  此时你可能会问自己：等等，YouTube 在从观看次数转向观看时长时，不是已经消除了点击诱饵吗？大部分情况下是的，但我猜想这里发生的情况是，用户会点击一个带有令人震惊缩略图的视频，然后观看相当长的时间，以为缩略图中的故事只是该集节目中的一个片段——也许他们甚至一直看到视频结尾才意识到自己被骗了（我承认自己也曾这样被忽悠着看完了整个
  YouTube 视频）。这仍然是一种点击诱饵形式，但由于它很可能导致较长的观看时长，实际上受到了 2012 年后推荐算法的推崇。另一方面，你可能还记得，YouTube
  确实说过，在 2016 年，它开始在算法的考量中除了观看时长之外还加入了点赞数，而这些虚假的 CNN 视频在这个指标上可能表现不佳。因此，算法对这些视频的推广力度，在很大程度上似乎取决于算法工程师如何决定平衡这两个指标——这种平衡可能多年来一直在变化，并且无论如何都未向公众公开。




  ## 审核 YouTube 上的内容


  美国联邦调查局（FBI）在 2019 年 5 月发布的一份文件^(¹³⁶)指出，边缘阴谋论的传播是一种新的国内恐怖主义威胁，这种威胁可能会在 2020 年选举周期期间加剧。九个月后，即
  2020 年 2 月，美国第九巡回上诉法院裁定^(¹³⁷)，`YouTube` 是一个私人论坛，因此不受第一修正案中言论自由要求的约束——这一裁定允许 `YouTube`
  自由决定禁止哪些内容。次月，`YouTube` 的一位发言人表示^(¹³⁸)：“仅在去年一年，我们就推出了 30 多项不同的变革，以减少对边缘内容和有害错误信息（包括气候变化错误信息和其他类型的阴谋论视频）的推荐。”并且“得益于这一变革，此类内容通过推荐获得的观看时长在美国下降了超过
  70%。”不幸的是，这三十项变革具体包含哪些内容并不为公众所知，支持这一“下降 70%”说法的具体方法也不得而知——因此我们只能盲目相信 `YouTube` 的企业承诺（回想一下，Chaslot-Berkeley
  纵向研究发现，在此期间的头几个月，阴谋论视频的推荐量最初下降了 70%，但之后又开始逐渐回升）。


  2020 年 3 月，`YouTube` 还宣布^(¹³⁹)，将更依赖机器学习来审核其内容^(¹⁴⁰)，而人工审核员则因疫情封锁被送回家。但六个月后，该公司承认^(¹⁴¹)，这种对
  AI 审核的更大依赖导致错误删除视频的数量显著增加。在这六个月期间，约有 1100 万个视频被下架，大约是正常水平的两倍。其中超过 30 万个下架决定被申诉，而一半的申诉获得了成功。`YouTube`
  的首席产品官（正是本章前面提到 70% 的 `YouTube` 观看时长来自推荐算法的那位）透露说，机器学习方法在内容审核方面“无法像人类一样精确”，因此公司决定在此期间宁可谨慎行事。他还指出，在这
  1100 万个视频中，超过一半是在任何实际 `YouTube` 用户观看之前就被删除的。“这就是机器的力量，”他说。


  仅仅一个月后，即 2020 年 10 月，`YouTube` 发布了一篇公司博客文章^(¹⁴²)，标题为“管理 `YouTube` 上的有害阴谋论”。文中宣布，`YouTube`
  关于仇恨言论和骚扰的政策现已更新并扩大范围，以禁止“针对个人或群体，利用已被用于为现实世界暴力辩护的阴谋论的内容”。一个重要的后果是，QAnon 和 Pizzagate
  阴谋论运动中的许多视频现在被归类为禁止内容。然而，值得注意的是，违反 `YouTube` 新政策的并非这些运动的一般虚假新闻方面——尽管它们既荒诞又具有政治破坏性——而是与线下身体暴力的特定关联触发了新的禁令。`YouTube`
  此前已经在删除直接威胁暴力的特定 QAnon 和 Pizzagate 视频，但扩大后的政策意味着，禁止的理由现在包括“通过暗示某人参与这些有害阴谋（如 QAnon
  或 Pizzagate）之一来威胁或骚扰他人的内容”。


  回想一下关于 Chaslot-Berkeley 纵向研究的讨论，2019 年 1 月，`YouTube` 宣布对推荐算法进行一次重大但未公开的更新，旨在专门限制有害错误信息的传播。2020
  年 10 月宣布对 QAnon 实施新限制的博客文章称，自 2019 年 1 月以来，来自推荐算法的 QAnon 相关视频的观看次数已经下降了 80%。这些减少
  QAnon 存在的努力很重要，但有人可能会说，这做得太少、太晚了：潘多拉的魔盒已经打开。


  事实上，正如《纽约时报》记者凯文·鲁斯所言^(¹⁴³)，人们认为 `YouTube` 在社交媒体平台中扮演了最大的角色之一，将“QAnon 从边缘推向了主流”。鲁斯报道称，许多
  QAnon 的早期活动人士制作了“`YouTube` 纪录片”来解释该运动的核心信仰，这些视频在 Facebook 和其他平台上被分享——这帮助它们获得了数百万的观看量，并吸引了更多人加入该运动。一些个人还通过创建流行的“`YouTube`
  脱口秀”节目，聚焦 QAnon 世界的最新发展，从而在 QAnon 运动中声名鹊起。




  ## 总结与结论


  虚假信息之战是一场复杂的军备竞赛，需要我们时刻保持警惕。过去几年里，我们目睹了一个反复出现的循环：先是某篇新闻报道或学术调查指责 YouTube 的推荐算法激化观众观点，将人们推向诸如另类右翼等危险的边缘运动；随后
  YouTube 发言人回应称，他们不同意这些指控或研究方法，但同时表示公司正在努力减少其网站上有害内容的传播——这实质上是在承认存在问题，却又不承认公司有过错。^(¹⁴⁴)


  YouTube 的深度学习算法基于每个用户的详细画像（包括观看历史、搜索历史和人口统计信息）提供高度个性化的推荐。这使得外部研究人员极难对推荐算法在现实世界中的表现进行准确的实证评估。尽管如此，我们在本章中看到并讨论的那些惊鸿一瞥——从
  YouTube 内部人士到外部调查，再到政治参与者和假新闻贩子的亲身经历——再加上一个不可否认的背景，即社会中的大部分群体日益对主流媒体形式失去信心，转而从 YouTube
  等平台获取新闻，这些都有力地证明了 YouTube 的推荐算法在过去五年中对我们的社会和政治产生了有害影响。


  目前事态如何，以及 YouTube 对算法的内部调整是否足以跟上步伐，尚不清楚。但清楚的是，通过允许这场虚假信息军备竞赛在谷歌的工程后台闭门进行，我们正在向这家公司倾注巨大的信任。正如保罗·刘易斯在《卫报》上关于
  YouTube 的文章^(¹⁴⁵)中所写：“通过将算法及其结果秘而不宣，YouTube 确保任何表明其算法存在意外偏见或扭曲的模式都隐藏于公众视野之外。通过为其数据筑起高墙，YouTube……保护自己免受审查。”


  2019 年，《彭博新闻》对 YouTube 的企业文化进行了一项广泛而尖锐的调查^(¹⁴⁶)，该调查主要基于现任和前任员工的内部信息。调查发现，通过提议调整推荐算法来遏制阴谋论视频传播的尝试，经常因“参与度”（衡量观看次数、观看时长和视频互动量的指标）而被高层管理人员否决：“与二十多位在
  YouTube 工作或近期离职的人士的对话揭示，公司领导层因担心抑制参与度而无法或不愿对这些内部警报采取行动。”一些员工只是试图收集他们认为有害但并未正式违反
  YouTube 政策的视频数据，但“他们得到的回应基本一致：别惹是生非。”


  也有一些草根层面的努力，通过制作极左翼内容来平衡 YouTube 上的极右翼内容，这些内容采用了与那些似乎因推荐算法而获得高播放量和观看时长的内容相同的耸人听闻手法。这方面的一个主要例子是一个名为“面包管”（BreadTube）的团体，其名称源于俄国无政府主义/共产主义革命家彼得·克鲁泡特金
  1892 年的著作《面包的征服》。虽然我能理解短期内通过劫持另类右翼运动的方法来重新平衡系统的愿望，但从长远来看，这似乎并非纠正 YouTube 给社会带来的问题的健康方式。然而，如果不诉诸如此极端的方法，我们要么只能相信
  YouTube 会秘密地自行解决问题，要么可以推动更多的透明度、问责制和政府监管；我的选择是后者。


  持此观点的一个原因是，即使 YouTube 自愿在打击假新闻方面采取更积极的立场，其他视频平台也会介入，填补其留下的监管真空。事实上，这已经在发生：Rumble
  是一个成立于 2013 年的视频网站，最近已成为 YouTube 的保守派和言论自由导向的替代品（类似于 Parler 相对于 Twitter 的角色）。Rumble
  的创始人兼首席执行官表示^(¹⁴⁷)，该平台自 2020 年夏季以来一直处于“火箭式”增长，自大选以来更是加速发展。他说该平台“禁止露骨内容、恐怖主义宣传和骚扰”，但“不负责甄别虚假信息或限制言论”。这向我表明，我们不应仅仅让个别公司自行决定如何以及多大程度上审核其内容——我们需要一种更集中、更协调的方法，以免在打击假新闻的斗争中落后到无可挽回的地步。我将在第
  8 章更广泛的背景下回到这一讨论。


  在等待立法努力解决这一问题的同时，仔细审视我们手头可用的技术工具也很重要。在下一章中，我将探讨最近由机器学习驱动的谎言检测算法是否可用于检测在线视频中的虚假信息。




