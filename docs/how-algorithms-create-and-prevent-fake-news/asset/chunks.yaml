- fmt: '# Longitudinal Study


    In the spring of 2020, `Chaslot` and two professors at UC Berkeley concluded a
    longitudinal study^([^(132)](#fn132)) of conspiracy videos on YouTube. They first
    used text-based supervised machine learning to train an algorithm to estimate
    whether a YouTube video was conspiratorial by looking at the description, transcript,
    and comments. Then, they applied this to eight million videos recommended over
    a fifteen-month period to a logged-out user after watching videos from one thousand
    popular news-related channels. What did they find? Hold that thought a second.


    YouTube announced^([^(133)](#fn133)) in January 2019 that it would “begin reducing
    recommendations of borderline content and content that could misinform users in
    harmful ways—such as videos promoting a phony miracle cure for a serious illness,
    claiming the earth is flat, or making blatantly false claims about historic events
    like 9/11.” The `Chaslot-Berkeley` research collaboration found that the number
    of conspiracy videos recommended by the algorithm indeed dropped steadily in the
    months after this announcement—from January to May 2019, it decreased by seventy
    percent—but after a relative low point in May, the number crept back up and by
    March 2020 it was only forty percent lower than when the YouTube crackdown began
    in January 2019.


    Interestingly, the `Chaslot-Berkeley` study found that the results of the YouTube
    crackdown varied significantly across the different categories of conspiracy theories.
    Flat Earth videos and 9/11 hoax videos have been almost completely scrubbed from
    YouTube, whereas climate change denial videos and videos claiming aliens built
    the pyramids have persisted and even flourished. The YouTube announcement did
    say that it was focusing on content that could misinform users in “harmful ways,”
    but it seems rather puzzling how they’ve chosen to interpret and enforce that
    policy. One of the Berkeley collaborators, `Hany Farid`, had the following to
    say:^([^(134)](#fn134)) “If you have the ability to essentially drive some of
    the particularly problematic content close to zero, well then you can do more
    on lots of things. They use the word ‘can’t’ when they mean ‘won’t’.” I’ll return
    to this issue of moderating misinformation on YouTube shortly—then I’ll provide
    a broader treatment of content moderation on social media in Chapter [8](../Text/508514_1_En_8_Chapter.xhtml).


    # The Role of Viewing History


    One potentially significant limitation with all the data-driven investigations
    of the YouTube recommendation algorithm discussed in this chapter—the Harvard
    team working for the *New York Times* to explore the situation in Brazil, the
    Pew random walk empirical study, the `Chaslot` political database analyzed by
    the *Guardian*, the `Ledwich-Zaitsev` paper, and the `Chaslot-Berkeley` longitudinal
    study—is that they all rely on a logged-out anonymous user. This means a user
    without prior viewing history, search history, or demographic information.


    Part of the beauty of deep learning (which, as you recall, is the framework Google
    Brain brought to YouTube recommendation in 2015) compared with earlier forms of
    machine learning is that with deep learning the algorithm is able to use a huge
    number of predictors since the neural network training process automatically transforms
    these into a smaller number of relevant and hierarchically structured predictors.
    In the context of YouTube, this means that rather than just using a small number
    of obvious predictors such as view counts and average view durations of videos,
    the recommendation algorithm is able to dissect and analyze users on a more individualized
    basis by relying on detailed viewing history and behavior. In short, deep learning
    allows for extreme personalization.


    This is one reason why deep learning is so promising in the realm of healthcare:
    it means computers can help doctors custom-tailor diagnoses and treatments to
    an incredible extent. But for YouTube recommendations, it means the algorithm
    knows a heck of a lot about you—and the videos it recommends to you depend heavily
    on your personal data. Consequently, it is damn hard to get an accurate portrait
    of how YouTube’s algorithm behaves in real life and how it impacts society by
    simulating it with a computer program that simply clicks videos from an anonymous
    login without viewing history. The only conceivable way to get more authentic
    data on the algorithm would be to recruit a large group of volunteers to track
    their experiences with YouTube recommendations for some period of time. Alas,
    I know of no such human participant–based studies.


    # Another Algorithmic Misfire


    The recommendation algorithm isn’t YouTube’s only algorithmic culprit when it
    comes to spreading fake news and disinformation. Another company algorithm automatically
    puts together videos on the platform into channels it creates on various topics.
    For instance, CNN posts all its videos to its official YouTube channel, but YouTube’s
    internal algorithm also creates channels for each of the network’s popular shows.
    The problem is that not all the videos this algorithm finds are authentic. Well,
    sort of.


    It was found^([^(135)](#fn135)) in December 2019 that some of the videos that
    ended up in YouTube’s algorithmically generated CNN channels were actually from
    fake news organizations that deceitfully posed as CNN. What these organizations
    did is post copies of actual clips from CNN, but they edited the thumbnail images
    to make the content look shocking and inflammatory. For example, one thumbnail
    showed an official-looking CNN graphic of President Trump and the president of
    Iran and a chyron that read “War officially started!” But the video itself was
    an undoctored clip from CNN that had nothing to do with war. In short, the video
    content itself wasn’t fake news, but YouTube users who browsed the videos listed
    in these algorithmically curated news channels would see alarming false headlines
    in the thumbnails.


    In just a single week, these CNN videos with fake thumbnails received more than
    eight million views. A YouTube investigation found that the organizations posting
    them were not part of any coordinated political influence or disinformation campaigns,
    and no connections to foreign governments were uncovered. Instead, it seems, these
    organizations were simply using this clickbait trick in order to profit from ad
    revenue.


    You might be asking yourself at this point: wait, didn’t YouTube eliminate clickbait
    when it switched from views to watch time? Mostly yes, but I suspect what happened
    here is that users would click one of the videos with an alarming thumbnail and
    then watch it for a considerable duration thinking the story from the thumbnail
    was just one of the segments on the episode—perhaps they even watched the video
    all the way through to the end before they realized they had been duped (I’ll
    admit that I’ve been suckered into watching entire YouTube videos this way). This
    is still a form of clickbait, but since it likely results in lengthy watch times,
    it is actually promoted by the post-2012 recommendation algorithm. On the other
    hand, as you may recall, YouTube did say that in 2016 it started incorporating
    upvotes in addition to watch time in the algorithm’s considerations, and presumably
    these fake CNN videos do not fare well in that metric. Thus, how strongly the
    algorithm promoted these videos seems to largely come down to how the algorithm’s
    engineers decided to balance these two metrics—a balance that has likely shifted
    over the years and regardless has been kept out of public view.'
