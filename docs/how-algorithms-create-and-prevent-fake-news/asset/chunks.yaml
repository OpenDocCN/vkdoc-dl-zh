  trans: "\n# 3. 深度伪造骗局\n\n当眼见不再为实，我们该相信什么？\n\n> *在这个假新闻时代，这段视频展示了……一项新人工智能技术的应用，它能像`Photoshop`处理数字图像一样处理音频和视频：允许对现实进行篡改。*\n\
    > \n> ——布鲁克·博雷尔，《科学美国人》\n\n上一章讨论的用于创建合成照片的深度学习生成对抗网络（`GANs`）也已应用于视频合成与编辑。如今可以制作出视频片段，让片中人物做出他们在现实生活中从未做过的事、说出从未说过的话。这给社会辨别真相带来了双重挑战：虚假视频在互联网上传播，使人们相信从未发生过的事件；同时，真实视频被诬称为深度伪造，导致人们怀疑现实本身。在本章中，你将看到深度伪造视频如何影响政治与新闻业，它们所引发的混乱与以往几代图像和视频篡改手段有何关联，以及法律和技术层面正在采取哪些措施来加以遏制。\n\
    \n## 敲响警钟\n\n2019 年 6 月 13 日，美国众议院就深度伪造问题举行了有史以来的首次听证会^(⁴⁷)。时任众议院情报委员会主席仅六个月的亚当·希夫在开场陈述中发出了坚定的警告：\n\
    \n> 人工智能和机器学习的进步催生了高级数字篡改媒体类型，即所谓的“深度伪造”，使恶意行为者能够煽动混乱、分裂或危机，并具备扰乱整个竞选活动（包括总统竞选）的能力。人工智能算法的快速进步使得篡改媒体（视频、图像、音频和文本）成为可能，且效果惊人、几乎难以察觉。只要有足够的训练数据，这些强大的深度伪造生成算法就能描绘出一个真实人物做出从未做过的事，或说出从未说过的话。这些工具易于获取，专家和新手都能使用，这意味着将深度伪造归因于特定作者——无论是敌对情报机构还是单个网络喷子——将始终是一个挑战。\n\
    \n在展示了几位专家制作的深度伪造视频示例以说明该技术后，希夫继续说道：“展望 2020 年及以后，无需任何想象力就能预见到更可怕的场景，这些场景将使政府、媒体和公众难以辨别真假。”\n\
    \n为了强调恶意篡改视频传播速度之惊人，希夫提到了一段视频，其中看似醉酒的众议院议长南希·佩洛西言语含糊——这段视频在短短两天内迅速传播，获得了数百万次观看。但希夫正确指出，这段被篡改的佩洛西视频并非深度伪造，而是有些人所称的“廉价伪造”或“浅层伪造”。其所用技术并非尖端人工智能，而是与电影本身一样古老：佩洛西的片段只是被放慢到大约\
    \ 75%的速度，以制造出醉态言语和动作的印象。\n\n如果人工智能驱动的深度伪造对社会和国家安全构成如此严重的威胁，为什么希夫没有提供它们在虚假信息宣传活动中实际使用的真实案例？它们是否曾在政治领域被使用过？我们如何检测并规范其使用？围绕深度伪造的反乌托邦恐惧是合理的，还是人工智能又一次制造了无法兑现的炒作？深度伪造视频到底是什么，它们又是如何制作的？这些是我将在本章探讨的问题。但首先，让我退一步，简要回顾一下政治领域篡改视觉媒体的历史；这有助于理解深度伪造所带来的当代威胁。\n\
    \n## 浅层伪造简史\n\n政治领域篡改视觉媒体的历史出奇地悠久。19 世纪 60 年代的一张版画将亚伯拉罕·林肯的头像移植到了狂热的奴隶制倡导者约翰·C·卡尔霍恩的身体上，据称是为了给瘦长的林肯增添更英勇的姿态；这一伪造直到\
    \ 20 世纪 50 年代末才被揭露。一张著名的内战照片显示尤利西斯·S·格兰特将军在弗吉尼亚州城市角骑马，实际上是三张独立照片的合成品；这一点直到 2007\
    \ 年才被发现。阿道夫·希特勒、菲德尔·卡斯特罗、毛泽东和约瑟夫·斯大林都曾篡改照片，以从照片中——进而也从历史书中——清除他们的敌人。\n\n约瑟夫·麦卡锡的手下分发了一张伪造的合成照片，将参议员米勒德·泰丁斯置于与美国共产党领袖厄尔·布劳德交谈的场景中，企图给泰丁斯贴上同情共产主义的标签；一些人认为这在他\
    \ 1950 年选举失败中起了关键作用。2004 年，在参议员约翰·克里竞选民主党总统候选人期间，一张伪造的合成照片浮出水面，显示他与简·方达一起出现在反越战示威活动中，甚至被《纽约时报》一篇关于克里早年反战活动的文章转载；当原始照片被出示时，一些右翼反对者谎称克里-方达的照片才是真实的，而原始独立照片是伪造品。图像具有强大的力量；篡改图像是篡改现实和历史的一种方法。\n\
    \n利用照片或视频制造虚假信息的一种常用手法就是简单地错误标注内容：声称某地发生的事件实际发生在别处，声称某一群人实际上是另一群人，等等。2018 年，特朗普反复对一群途经墨西哥前往美国的洪都拉斯移民进行恐吓之后，Facebook\
    \ 上出现了一篇病毒式传播的帖子，展示了一名墨西哥警察血迹斑斑的脸，配文是“墨西哥警察正遭到这支移民大篷车成员的野蛮对待，因为他们试图强行进入墨西哥。”这张照片与大篷车毫无关系——它是在欧洲新闻图片社网站上找到的，拍摄于\
    \ 2012 年的一次学生抗议活动。^(⁴⁸)\n\n2020 年 7 月，特朗普竞选广告中并排展示了两张照片——一张是特朗普与警方领导人会面的有序场景，配文“公共安全”；另一张是防暴警察似乎遭到一群抗议者暴力袭击的令人震惊的场景，配文“混乱与暴力”。广告没有明确说明第二张照片的拍摄时间和地点，但广告的发布时间强烈暗示它来自当时美国各地正在进行的“黑人的命也是命”抗议活动。然而，事实证明，这张照片来自\
    \ 2014 年乌克兰的一场亲民主抗议活动。^(⁴⁹) 在另一个例子中，^(⁵⁰) 一段某人被活活烧死的视频被科特迪瓦、南苏丹、肯尼亚和缅甸的不同群体虚假地声称是暴行的证据和采取行动的理由——在每一个案例中，这都导致了地区动荡和暴力。\n"
- fmt: '# 浅伪造（Shallowfake）与深度伪造（Deepfake）的起源


    “浅伪造”一词没有官方定义，但本质上它指的是任何不需要人工智能、具有欺骗意图的直接视频编辑形式。南希·佩洛西（Nancy Pelosi）的慢速视频就是其中一个例子。通常，浅伪造视频中的人物确实是其所声称的人，但视频通过非常原始的手段被修改，以误导性地描绘这些人物，使其显得负面。2018年7月，保守派评论（Conservative
    Review）的一位电视主持人在Facebook上发布了一段对当时民主党国会候选人亚历山德里娅·奥卡西奥-科尔特斯（Alexandria Ocasio-Cortez）的采访视频，视频中奥卡西奥-科尔特斯似乎对所有采访者的问题都给出了令人尴尬的糟糕回答。该视频在一周内获得了近350万次观看，然而这只是一个简单的拼接剪辑：奥卡西奥-科尔特斯的片段是真实镜头，只是它们并非她对采访者问题的回答——那些问题是单独录制的，然后被策略性地拼接在各个奥卡西奥-科尔特斯片段之间。^([^(51)](#fn51))
    采访者后来为这一假新闻行为辩护，称其为讽刺；浏览视频下方的评论可以清楚地看到，许多观众并未意识到这一点。


    有时，浅伪造编辑可能相当微妙且模棱两可。2018年11月，一段视频片段在网上疯传，显示在特朗普的一次新闻发布会上，CNN记者吉姆·阿科斯塔（Jim Acosta）与一名白宫女助手发生冲突。片段显示，该女助手伸手去拿阿科斯塔右手握着的麦克风，当她靠近时，阿科斯塔的左臂用力推开了女助手伸出的手臂，这看起来是一种明显的身体攻击行为。（顺便提一下，这次冲突的背景是，阿科斯塔质疑总统将穿越墨西哥的移民大篷车——即前几段提到的那个——描述为“入侵”，在几句口头交锋后，特朗普愤怒地回应“够了”，以此示意白宫女助手重新控制麦克风。）这段视频最初由保罗·约瑟夫·沃森（Paul
    Joseph Watson）在推特上发布，他是《信息战争》（*InfoWars*）（一个阴谋论频道，我将在下一章关于YouTube的内容中再次提到）的编辑。随后，白宫新闻秘书萨拉·赫卡比·桑德斯（Sarah
    Huckabee Sanders）转发了该视频，将其作为阿科斯塔“对一名只想做好本职工作的年轻女子动手”的证据，这为视频增添了一种合法性和官方性的光环。不仅如此，桑德斯还以此视频为由，暂时吊销了阿科斯塔的白宫记者证。


    这段阿科斯塔视频的“浅伪造”之处在哪里？一些观察者认为，在阿科斯塔的手臂伸向女助手伸出的手臂的那一刻，视频似乎被稍微加速了，将一个突然但不一定具有攻击性的动作变成了更像是一记轻微的手刀。其他观众指出，视频可能并没有被加速，但在关键时刻放大时，似乎切换到了低帧率的动画GIF格式——而低帧率使得阿科斯塔的手臂动作看起来比原始未编辑视频中更突然、更有力。沃森是明知故犯地使用动画GIF格式来达到这种误导效果，还是这只是一个无意的副产品？动画GIF是社交媒体上流行的视频格式，但在需要高质量细节时，它们通常不是首选格式。CNN高管表示该视频是“真正的假新闻”，而沃森则否认对视频进行了篡改或编辑，除了放大之外。


    《BuzzFeed新闻》提供了^([^(52)](#fn52)) 对阿科斯塔视频的深入分析，发现视频并未被加速，但在放大时确实切换到了降低的帧率。沃森解释说，他自己并没有进行GIF转换：“事实是，Daily
    Wire上传了一个GIF，我下载了那个GIF，放大了它，然后将其保存为`mt2`文件——接着转换成了`mp4`。经过处理和放大后，数字上看起来会有一点点不同，但我绝对没有故意‘加速’或‘扭曲’视频。那完全是胡说八道。”这是一个特别令人困惑的情况。从很多方面来看，每个相关方都是正确且诚实的，只是很难知道该如何理解这一切。在这种微妙的情况下，更大的背景可以成为在真相与谎言、真实视频与浅伪造之间狭窄通道中导航的有用指南针。用《BuzzFeed新闻》分析的话来说：“总结一下：一个历史上不可靠的叙述者，为一个阴谋网站工作，发布了一段视频……该片段迅速走红。白宫采纳并传播了那段视频……一场关于篡改视频的复杂技术细节的争论爆发了。”这就是我们所生活的令人困惑的世界——而且，你很快就会看到，当深度伪造登场时，情况只会变得更糟。


    书中最古老的把戏之一就是断章取义地引用某人的话，不出所料，这种简单技巧也出现在视频编辑中，或许可以将其视为浅伪造的另一种形式。在2020年总统大选前夕，马乔丽·泰勒·格林（Marjorie
    Taylor Greene）——当时以即将上任的美国众议员而臭名昭著，其竞选活动主要基于古怪的QAnon阴谋论——在推特上发布了一段视频片段^([^(53)](#fn53))，并配文如下：“乔·拜登在视频中说，民主党人建立了历史上最大的‘选民欺诈’行动。我们现在正亲眼目睹这一切！”该片段源自一位共和党全国委员会官员，并很快被埃里克·特朗普（Eric
    Trump）和白宫新闻秘书等人转发。在片段中，拜登确实谈到了组建“美国政治史上最广泛、最包容的选民欺诈组织”。然而，从原始完整背景中可以清楚地看出，他指的是一个*防止*选民欺诈的组织，但这段病毒式传播的片段当然故意使其看起来相反。


    现在，舞台已经为我们熟悉的主角——人工智能——的登场做好了准备。


    ## 深度伪造的起源


    “深度伪造”一词源自Reddit上一位匿名用户，他使用了用户名“deepfakes”，这是“深度学习”（deep learning）和“伪造”（fake）的合成词。2017年底，他^([^(54)](#fn54))
    应用了当时可用的深度学习算法，将以色列女演员盖尔·加朵（Gal Gadot）（她凭借2017年夏季大片《神奇女侠》*Wonder Woman* 刚刚获得国际声誉）的面容换到了一部色情视频中女演员的身体上，并将这一未经同意的结果发布到了Reddit。这一事件标志着人工智能历史上一个黑暗篇章的不祥开端，这一篇章至今仍在继续展开。不幸的是，他的帖子非常受欢迎，他很快又发布了几位其他名人的类似内容。'
  raw: 'The term *shallowfake* doesn’t have an official definition, but essentially
    it refers to any straightforward form of video editing with a deceptive intent
    that does not require AI. The slowed-down Nancy Pelosi video is an example of
    this. Often the people depicted in shallowfake videos are who it is claimed they
    are, but the videos have been modified through very primitive means to paint those
    depicted in a misleadingly negative light. In July 2018, a TV host at Conservative
    Review posted on Facebook an interview with Alexandria Ocasio-Cortez, then a Democratic
    congressional nominee, in which Ocasio-Cortez appears to provide embarrassingly
    terrible answers to all of the interviewer’s questions. The video reached nearly
    three and a half million views within a week, yet it was a simple splice edit:
    the clips of Ocasio-Cortez were real footage, they just weren’t her answers to
    the interviewer’s questions—those questions were recorded separately and then
    strategically spliced in between the various Ocasio-Cortez clips.^([^(51)](#fn51))
    The interviewer later defended this act of fake news by saying it was satire;
    perusing the comments on the video makes it clear that many viewers did not realize
    this.


    Sometimes, shallowfake editing can be quite subtle and borderline. In November
    2018, a video clip went viral showing a confrontation at a Trump press conference
    between CNN reporter Jim Acosta and a female White House aide. The clip shows
    the aide reaching for the microphone held in Acosta’s right hand, and as she nears
    it, Acosta’s left arm forcefully pushes away the aide’s extended arm in an apparent
    act of physical aggression. (Incidentally, the context of this confrontation was
    that Acosta challenged the president’s characterization of the migrant caravan
    moving through Mexico—the one mentioned just a few paragraphs earlier—as an “invasion,”
    and after some verbal sparring, Trump responded by angrily declaring “that’s enough”
    as an indication for the White House aide to regain control of the microphone.)
    This clip was originally tweeted by Paul Joseph Watson, an editor at *InfoWars*
    (a conspiracy theory channel I’ll come back to in the next chapter on YouTube),
    and it was soon provided an air of legitimacy and officiality when the White House
    press secretary Sarah Huckabee Sanders retweeted it as proof that Acosta “put
    his hands on a young woman just trying to do her job.” Not only that, but Sanders
    used this video as grounds for temporarily revoking Acosta’s White House press
    pass.


    What is shallowfake about this Acosta clip? Some observers thought the clip appeared
    to be sped up slightly at the moment when Acosta’s arm is heading toward the aide’s
    outstretched arm, transforming an abrupt but not necessarily aggressive motion
    into more of a mild karate chop. Other viewers noted that the clip maybe wasn’t
    sped up but that it seemed to switch to a low frame rate animated GIF format when
    it zoomed in at the crucial moment—and the low frame rate made Acosta’s arm motion
    appear more sudden and forceful than it was in the original unedited video. Did
    Watson knowingly and purposely use the animated GIF format for this misleading
    effect, or was this an unintentional by-product? Animated GIFs are a popular video
    format on social media, but usually they are not the preferred format when high-quality
    details are important. CNN executives said the video was “actual fake news,” while
    Watson denied doctoring or editing the video other than zooming in.


    *BuzzFeed News* provided^([^(52)](#fn52)) an in-depth analysis of the Acosta video
    and found that it had not been sped up but that it did indeed switch to a reduced
    frame rate when it zoomed in. Watson explained that he didn’t do the conversion
    to GIF himself: “Fact is, Daily Wire put up a gif, I download a gif, zoomed in
    saved it again as an mt2 file—then converted it to an mp4\. Digitally it’s gonna
    look a tiny bit different after processing and zooming in, but I did not in any
    way deliberately ‘speed up’ or ‘distort’ the video. That’s just horse shit.” This
    was a particularly confusing situation. In many ways, everyone involved was correct
    and honest, it’s just very hard to know what to make of it all. In subtle situations
    like this, the larger context can be a helpful compass for navigating the narrow
    channels between truth and lies, between real video and shallowfake. In the words
    of the *BuzzFeed News* analysis: “To sum it up: A historically unreliable narrator
    who works for a conspiracy website tweets a video […]. The clip goes viral. The
    White House picks up and disseminates that video […]. An argument breaks out over
    the intricate technical details of doctoring a clip.” This is the confusing world
    we live in—and, as you will soon see, matters only get worse when deepfakes enter
    the picture.


    One of the oldest tricks in the book is to quote someone out of context, and unsurprisingly
    this simple technique also rears its head in video editing where it can perhaps
    be viewed as another form of shallowfake. Leading up to the 2020 presidential
    election, Marjorie Taylor Greene—notorious at the time as an incoming US Representative
    whose campaign was largely based around the bizarre QAnon conspiracy theory—tweeted^([^(53)](#fn53))
    a video clip that she captioned with the following text: “Joe Biden Said On Video
    That Democrats Built the Biggest ‘Voter Fraud’ Operation in History. We’re seeing
    it on full display right now!” The clip originated from a Republican National
    Committee official and was quickly posted by Eric Trump and the White House Press
    Secretary, among others. In the clip, Biden indeed speaks of putting together
    “the most extensive and inclusive voter fraud organization in the history of American
    politics.” However, it is clear from the original full context that he was referring
    to an organization to *prevent* voter fraud, but of course this viral clip deliberately
    made it seem otherwise.


    The stage is now set for the entrance of our familiar protagonist: AI.


    ## The Origin of Deepfakes


    The term *deepfake* comes from an anonymous user on Reddit who used the username
    “deepfakes,” a portmanteau of “deep learning” and “fake.” Toward the end of 2017,
    he^([^(54)](#fn54)) applied deep learning algorithms available at the time to
    face-swap the visage of Israeli actress Gal Gadot (who had recently achieved international
    fame with the summer 2017 blockbuster *Wonder Woman*) onto the body of an actress
    in a pornographic video and posted the nonconsensual result to Reddit. This event
    marked the ominous beginning of a dark saga in the history of artificial intelligence
    that continues to unfold today. His post was, unfortunately, very popular, and
    he quickly followed up with a handful of other celebrities.'
  trans: '

    # 浅伪造（Shallowfake）与深度伪造（Deepfake）的起源


    “浅伪造”一词没有官方定义，但本质上它指的是任何不需要人工智能、具有欺骗意图的直接视频编辑形式。南希·佩洛西（Nancy Pelosi）的慢速视频就是其中一个例子。通常，浅伪造视频中的人物确实是其所声称的人，但视频通过非常原始的手段被修改，以误导性地描绘这些人物，使其显得负面。2018
    年 7 月，保守派评论（Conservative Review）的一位电视主持人在 Facebook 上发布了一段对当时民主党国会候选人亚历山德里娅·奥卡西奥-科尔特斯（Alexandria
    Ocasio-Cortez）的采访视频，视频中奥卡西奥-科尔特斯似乎对所有采访者的问题都给出了令人尴尬的糟糕回答。该视频在一周内获得了近 350 万次观看，然而这只是一个简单的拼接剪辑：奥卡西奥-科尔特斯的片段是真实镜头，只是它们并非她对采访者问题的回答——那些问题是单独录制的，然后被策略性地拼接在各个奥卡西奥-科尔特斯片段之间。^(⁵¹)
    采访者后来为这一假新闻行为辩护，称其为讽刺；浏览视频下方的评论可以清楚地看到，许多观众并未意识到这一点。


    有时，浅伪造编辑可能相当微妙且模棱两可。2018 年 11 月，一段视频片段在网上疯传，显示在特朗普的一次新闻发布会上，CNN 记者吉姆·阿科斯塔（Jim
    Acosta）与一名白宫女助手发生冲突。片段显示，该女助手伸手去拿阿科斯塔右手握着的麦克风，当她靠近时，阿科斯塔的左臂用力推开了女助手伸出的手臂，这看起来是一种明显的身体攻击行为。（顺便提一下，这次冲突的背景是，阿科斯塔质疑总统将穿越墨西哥的移民大篷车——即前几段提到的那个——描述为“入侵”，在几句口头交锋后，特朗普愤怒地回应“够了”，以此示意白宫女助手重新控制麦克风。）这段视频最初由保罗·约瑟夫·沃森（Paul
    Joseph Watson）在推特上发布，他是《信息战争》（*InfoWars*）（一个阴谋论频道，我将在下一章关于 YouTube 的内容中再次提到）的编辑。随后，白宫新闻秘书萨拉·赫卡比·桑德斯（Sarah
    Huckabee Sanders）转发了该视频，将其作为阿科斯塔“对一名只想做好本职工作的年轻女子动手”的证据，这为视频增添了一种合法性和官方性的光环。不仅如此，桑德斯还以此视频为由，暂时吊销了阿科斯塔的白宫记者证。


    这段阿科斯塔视频的“浅伪造”之处在哪里？一些观察者认为，在阿科斯塔的手臂伸向女助手伸出的手臂的那一刻，视频似乎被稍微加速了，将一个突然但不一定具有攻击性的动作变成了更像是一记轻微的手刀。其他观众指出，视频可能并没有被加速，但在关键时刻放大时，似乎切换到了低帧率的动画
    GIF 格式——而低帧率使得阿科斯塔的手臂动作看起来比原始未编辑视频中更突然、更有力。沃森是明知故犯地使用动画 GIF 格式来达到这种误导效果，还是这只是一个无意的副产品？动画
    GIF 是社交媒体上流行的视频格式，但在需要高质量细节时，它们通常不是首选格式。CNN 高管表示该视频是“真正的假新闻”，而沃森则否认对视频进行了篡改或编辑，除了放大之外。


    《BuzzFeed 新闻》提供了^(⁵²) 对阿科斯塔视频的深入分析，发现视频并未被加速，但在放大时确实切换到了降低的帧率。沃森解释说，他自己并没有进行 GIF
    转换：“事实是，Daily Wire 上传了一个 GIF，我下载了那个 GIF，放大了它，然后将其保存为`mt2`文件——接着转换成了`mp4`。经过处理和放大后，数字上看起来会有一点点不同，但我绝对没有故意‘加速’或‘扭曲’视频。那完全是胡说八道。”这是一个特别令人困惑的情况。从很多方面来看，每个相关方都是正确且诚实的，只是很难知道该如何理解这一切。在这种微妙的情况下，更大的背景可以成为在真相与谎言、真实视频与浅伪造之间狭窄通道中导航的有用指南针。用《BuzzFeed
    新闻》分析的话来说：“总结一下：一个历史上不可靠的叙述者，为一个阴谋网站工作，发布了一段视频……该片段迅速走红。白宫采纳并传播了那段视频……一场关于篡改视频的复杂技术细节的争论爆发了。”这就是我们所生活的令人困惑的世界——而且，你很快就会看到，当深度伪造登场时，情况只会变得更糟。


    书中最古老的把戏之一就是断章取义地引用某人的话，不出所料，这种简单技巧也出现在视频编辑中，或许可以将其视为浅伪造的另一种形式。在 2020 年总统大选前夕，马乔丽·泰勒·格林（Marjorie
    Taylor Greene）——当时以即将上任的美国众议员而臭名昭著，其竞选活动主要基于古怪的 QAnon 阴谋论——在推特上发布了一段视频片段^(⁵³)，并配文如下：“乔·拜登在视频中说，民主党人建立了历史上最大的‘选民欺诈’行动。我们现在正亲眼目睹这一切！”该片段源自一位共和党全国委员会官员，并很快被埃里克·特朗普（Eric
    Trump）和白宫新闻秘书等人转发。在片段中，拜登确实谈到了组建“美国政治史上最广泛、最包容的选民欺诈组织”。然而，从原始完整背景中可以清楚地看出，他指的是一个*防止*选民欺诈的组织，但这段病毒式传播的片段当然故意使其看起来相反。


    现在，舞台已经为我们熟悉的主角——人工智能——的登场做好了准备。


    ## 深度伪造的起源


    “深度伪造”一词源自 Reddit 上一位匿名用户，他使用了用户名“deepfakes”，这是“深度学习”（deep learning）和“伪造”（fake）的合成词。2017
    年底，他^(⁵⁴) 应用了当时可用的深度学习算法，将以色列女演员盖尔·加朵（Gal Gadot）（她凭借 2017 年夏季大片《神奇女侠》*Wonder Woman*
    刚刚获得国际声誉）的面容换到了一部色情视频中女演员的身体上，并将这一未经同意的结果发布到了 Reddit。这一事件标志着人工智能历史上一个黑暗篇章的不祥开端，这一篇章至今仍在继续展开。不幸的是，他的帖子非常受欢迎，他很快又发布了几位其他名人的类似内容。

    '
- fmt: '## Some Technical Details


    In a December 2017 interview^([^(55)](#fn55)) in *Vice*, the Reddit user deepfakes
    said that he’s not a professional researcher, he’s just a computer programmer
    with an interest in machine learning. He explained that the software he created
    to make the videos was based on multiple open source libraries (including `Keras`
    with the `TensorFlow` back end, for those who know what that means—don’t worry
    if you don’t, it doesn’t matter, the point is just that this is publicly available
    stuff widely used by the deep learning community). He used Google image search,
    stock photos, and YouTube videos to collect the training data his algorithms needed.


    There are by now a wide variety of video editing procedures powered by deep learning
    (you’ll encounter some of these shortly), so the term deepfake no longer refers
    only to the face-swap type used in the original Reddit posts. And there are many
    different deep learning architectures that have been used successfully—even for
    a single task, such as the face-swap. Rather than inundate you with the technical
    details of all of these, I’ll just explain here the main ideas behind one particular
    approach to the face-swap deepfake to give a sense of how the concepts from last
    chapter’s machine learning crash course are used here; an unusually curious and
    ambitious reader looking to learn more might consult a recent academic survey
    paper,^([^(56)](#fn56)) but doing so is certainly not necessary for reading this
    book. For concreteness, let’s suppose our goal is to swap Nicolas Cage’s face
    onto Gal Gadot’s body in *Wonder Woman*.


    The first step is to locate the region containing Gadot’s face in each frame of
    the movie. This is a standard task in machine learning (you’ve seen this in action
    whenever you post a photo on Facebook and a box is automatically drawn around
    each face in the photo). This can be achieved through supervised learning: feed
    the algorithm lots of photos of people where a box has already been manually drawn
    around each face, and the algorithm will eventually learn how to draw these boxes
    on its own. To be a bit more precise, this is a double regression problem: the
    two target variables are the upper-left and lower-right corners of the facial
    boundary box. For the purposes of a face-swap, one can simply download a pre-trained
    general algorithm for locating faces—there’s no need to do any training specific
    to Cage or Gadot here.


    Next, a simple but powerful and popular deep learning architecture called an *autoencoder*
    is used. In general, an autoencoder has multiple neural network layers that first
    get progressively narrower (these form the *encoder* portion of the autoencoder)
    and then progressively widen back to the original size (this second half is the
    *decoder*). This is trained on the self-supervised task of returning the exact
    same data point that it is fed each time. This sounds bizarre at first, but what’s
    really happening is that by passing all the data through the narrow middle region
    of the autoencoder, the algorithm is forced to compress the data—and due to the
    magic of deep leaning, the algorithm not only finds on its own the best way of
    doing this, but it does this through some internally learned conceptualization
    of the data.


    More simply put, the autoencoder is shown lots of data and told it must find a
    way to compress it like a zip file, and it realizes the best way to do this is
    by first understanding the meaning of the data. When doing this for images of
    faces, the autoencoder learns whatever it needs to describe a face with as few
    numbers as possible—for instance, it might first note the locations of the eyes,
    mouth, nose, etc., and somehow also quantify the shape of all these facial features,
    and it might also find a way to represent different hairstyles and colors numerically,
    and so on. We don’t have to know how it works; we just run it and see that it
    does. The encoder part of the autoencoder is what translates a face into this
    collection of numbers summarizing the face, then the decoder part sees these numbers
    and attempts to reconstruct the face from them.


    Back to our face-swap task. This actually uses two interlinked autoencoders. We
    use photos of Cage to train an autoencoder to compress and then reconstruct his
    face, and similarly we use photos of Gadot to train an autoencoder for her face—except
    we partially merge these two autoencoders by having them use the same encoder
    (so that only the decoder is customized to each person). The result is that a
    collection of numbers summarizing a face can now be decoded into either a Cage
    face or a Gadot face. What we then do for each frame in the movie is the following:
    first locate Gadot’s face, then encode it as a list of numbers with our trained
    encoder, then decode it with our Cage decoder.


    For concreteness, let’s pretend one of the numbers the autoencoder discovers measures
    how much the lips are smiling. When Gadot has a big smile, this number will be
    large—and since we use the same encoder for both Gadot and Cage, we know that
    the Cage decoder will interpret this large number as a large smile on Cage. This
    happens simultaneously for everything essential about their faces: what direction
    their eyes are looking, whether their mouth is open and how much and in what shape,
    etc. In this way, Cage’s pasted-in face will closely match the expression of Gadot’s
    original in each frame.


    All that remains is to smooth over the edges around the face where Cage was pasted
    in, but that’s standard image processing, so we can just use ready-made general-purpose
    software for that. However, if you remember, I mentioned at the beginning of this
    chapter that the GAN architecture used in the last chapter for synthesizing deepfake
    photos is also used for deepfake movie editing like face-swaps—but there are no
    GANs in what I’ve described here so far! Indeed, some face-swap algorithms do
    not use GANs, but many of the most successful ones do. One popular way to incorporate
    them is as follows: think of the process described above as the generator in the
    GAN, and feed the GAN’s discriminator a mixture of videos with Cage’s face swapped
    onto Gadot’s and original unedited videos of Cage and have it try to figure out
    which is which. This will help teach the autoencoder part of the face-swap algorithm
    how to do its job better since it provides a single explicit goal to strive for:
    producing face-swaps that are as convincing as possible.'
