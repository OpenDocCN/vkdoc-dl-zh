    rather than diluting its efforts with the deluge of fact-checking requests for
    content on Facebook.


    ### Twitter


    In June 2020, just a few days after it started flagging some tweets from President
    Trump as potentially misleading or glorifying violence, Twitter discussed in a
    series of tweets^([^(362)](#fn362)) the platform’s focus on “providing context,
