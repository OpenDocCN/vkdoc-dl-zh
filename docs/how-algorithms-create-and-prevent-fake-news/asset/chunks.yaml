- fmt: '### Signals the Algorithm Uses


    What factors determine how highly ranked pages are in Google searches? Once again,
    Google won’t reveal much about its algorithmic trade secrets—in part to prevent
    competitors from copying them, but also to prevent people from gaming the algorithm—so
    we only know the broadest outlines. The official company website describing the
    search algorithm^([^(217)](#fn217)) states the following: “Search algorithms look
    at many factors, including the words of your query, relevance and usability of
    pages, expertise of sources, and your location and settings. The weight applied
    to each factor varies depending on the nature of your query—for example, the freshness
    of the content plays a bigger role in answering queries about current news topics
    than it does about dictionary definitions.” These factors are largely about finding
    links that appear to be good matches to the search query. When it comes to ranking
    the results, Google says the algorithm attempts to “prioritize the most reliable
    sources available” by considering factors that “help determine which pages demonstrate
    expertise, authoritativeness, and trustworthiness on a given topic.” This sounds
    good, but it’s quite vague. The two examples Google gives are that a site is bumped
    up in the rankings if other prominent sites link to it (this is the essence of
    the original `PageRank` algorithm Google first launched with in 1998) or if many
    users visit the site after doing closely related searches.


    Earlier in the history of the algorithm, the `PageRank` method played a more prominent
    role, and less attention was given to assessing the quality of information by
    other means. Nefarious actors figured out how to use this narrow focus on link
    counting to manipulate the rankings. In December 2016, it was reported^([^(218)](#fn218))
    that fake news and right-wing extremist sites “created a vast network of links
    to each other and mainstream sites that has enabled them to game Google’s algorithm.”
    This led to harmful bigotry and disinformation—for instance, eight of the top
    ten search results for “was Hitler bad?” were to Holocaust denial sites.


    Several months later, in April 2017, Google admitted^([^(219)](#fn219)) that fake
    news had become a serious problem: “Today, in a world where tens of thousands
    of pages are coming online every minute of every day, there are new ways that
    people try to game the system. The most high profile of these issues is the phenomenon
    of ‘fake news,’ where content on the web has contributed to the spread of blatantly
    misleading, low quality, offensive or downright false information.” One change
    Google implemented at the time was to provide more detailed guidance on “misleading
    information, unexpected offensive results, hoaxes and unsupported conspiracy theories”
    for the team of human evaluators the company uses to provide feedback on the search
    algorithms: “These guidelines will begin to help our algorithms in demoting such
    low-quality content and help us to make additional improvements over time.” I’ll
    return to these human moderators and the role they play in shaping Google’s search
    algorithm at the end of this section. Google also said that the signals used in
    the algorithm were adjusted in order to “help surface more authoritative pages
    and demote low-quality content,” but no details were provided.


    One year later, as part of a multipronged effort to “elevate quality journalism”
    (including a three-hundred-million-dollar outreach initiative^([^(220)](#fn220))),
    Google tweaked the algorithm again. This time, it revealed which signals were
    prioritized in this adjustment and why, at least in very broad strokes:^([^(221)](#fn221))
    “To reduce the visibility of [harmful misinformation] during crisis or breaking
    news events, we’ve improved our systems to put more emphasis on authoritative
    results over factors like freshness or relevancy.”


    ### Featured Snippets


    In 2014, Google introduced a tool called *featured snippets*: a box of text is
    placed at the top of the results page for certain searches containing a highlighted
    passage from a top link that the algorithm believes is relevant to the search.
    These are not included for all searches, just ones that Google thinks are asking
    for specific information that it can try to find on the Web. Featured snippets
    help people extract information quickly from the internet since you get the answers
    to your questions directly from a Google search without having to choose a link,
    click it, then find the relevant passage buried somewhere on that site; they are
    also useful for voice search on mobile devices and Google’s Home Assistant because
    the user can ask a question verbally and then the device responds verbally by
    reading aloud the featured snippet resulting from the corresponding Google search.


    But if a Google search turns up fake news, then the answer provided by Google
    in the featured snippet might be wrong. And the featured snippet format strips
    the answer of any context and presents it in an authoritative-sounding manner,
    leaving the reader/listener even less aware than in a typical Google search of
    how unreliable the information source might be. Sure enough, featured snippets
    eventually made headlines for providing disastrously misinformed answers to a
    variety of questions.


    Indeed, in March 2017, it was found^([^(222)](#fn222)) that asking Google which
    US presidents were in the KKK resulted in a snippet falsely claiming that several
    were; asking “Is Obama planning a coup?” yielded a snippet that said “According
    to details exposed in Western Center for Journalism’s exclusive video, not only
    could Obama be in bed with the Communist Chinese, but Obama may in fact be planning
    a Communist coup d’état at the end of his term in 2016!”; searching for a gun
    control measure called “Proposition 63” yielded a snippet falsely describing it
    as “a deceptive ballot initiative that will criminalize millions of law abiding
    Californians.” In the case of the Obama coup snippet, the top search result was
    an article debunking this fake news story about an upcoming coup attempt, but
    when using Google’s Home Assistant, there are no search results listed—all one
    gets is the featured snippet read aloud.


    In a blog post^([^(223)](#fn223)) a year later describing how the snippets tool
    had improved over time, the company said “Last year, we took deserved criticism
    for featured snippets that said things like […] Obama was planning a coup. We
    failed in these cases because we didn’t weigh the authoritativeness of results
    strongly enough for such rare and fringe queries.” While this claim is superficially
    true, it conveniently sweeps under the rug that a prerequisite to *weighing* authoritativeness
    is *measuring* authoritativeness, which is a challenging, fraught issue—one I’ll
    return to at the end of this section. Reducing misinformation by elevating quality
    sources is not nearly as simple as adjusting a lever labeled “authoritativeness”
    the way Google suggests here in this remark.'
