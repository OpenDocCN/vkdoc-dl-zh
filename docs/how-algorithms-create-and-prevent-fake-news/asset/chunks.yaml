- fmt: '# Writing Entire Articles


    The most powerful, flexible, and highly lauded AI product for generating text
    was developed by a research lab called `OpenAI`. This lab launched as a nonprofit
    in 2015 by `Elon Musk` and others with a billion-dollar investment; then in 2019
    it added a for-profit component to its organization with another billion-dollar
    investment—this time from a single source: `Microsoft`. `OpenAI` has created a
    variety of AI products, but the one that has grabbed the most headlines is its
    text generation software `GPT`, an acronym for the technical name `Generative
    Pre-trained Transformer` that need not concern us.


    `GPT` refers to a sequence of products: the original `GPT` came out in 2018 to
    limited fanfare; then a year later, `GPT-2` was released^([^(24)](#fn24)) and
    reached a whole new level of capability; and just one year after that, the current
    state-of-the-art `GPT-3` was released and has really rattled society due to its
    power and potential. AI has a long history of generating both hype and suspicion,
    and `GPT-3` is no exception. At the time of writing this book, `GPT-3` is only
    available on a private invitation-only basis; the future plan^([^(25)](#fn25))
    is for `Microsoft` to have exclusive access to its inner workings, while the general
    public will be able to pay to interact with it and access its output on a per-usage
    basis.


    Toward the end of this chapter, I provide a short crash course in machine learning
    that covers the basics of how `GPT` works under the hood; for now, my focus is
    on what it does and what role it has and might soon play in the proliferation
    of fake news. The only technical details you need to know at the moment are the
    following. Before a user interacts with `GPT`, it has been fed vast volumes of
    text from scanned books and the Web (the exact amount of text has increased greatly
    with each new iteration of `GPT`). It doesn’t directly try to memorize this text;
    instead, it extracts statistical patterns and even abstract linguistic conceptualizations,
    though through the magic of deep learning `GPT` largely does this on its own,
    and it’s hard to know what it is really learning as it “reads” and how exactly
    it uses this computerized knowledge. `GPT`’s ultimate goal is to use these patterns
    and conceptualizations to estimate what word is most likely to follow any preceding
    collection of words. At the end of the day, this means a user feeds it a block
    of text as a prompt, and `GPT` extends this one word at a time for as long as
    the user likes. Simply put, it is the world’s largest and most sophisticated autocomplete
    feature.


    One of the first and most important questions to ask about `GPT` is how similar
    the text it produces is to text written by humans. In August 2019, two scholars
    published a study^([^(26)](#fn26)) in *Foreign Affairs* to see whether “synthetic
    disinformation,” in the form of nonfactual text generated by `GPT-2`, could “generate
    convincing news stories about complex foreign policy issues.” Their conclusion:
    while not perfect, it indeed can. Their study opens with a superficially plausible
    but entirely made-up passage generated by `GPT-2`:


    *   North Korean industry is critical to Pyongyang’s economy as international
    sanctions have already put a chill on its interaction with foreign investors who
    are traded in the market. Liberty Global Customs, which occasionally ships cargo
    to North Korea, stopped trading operations earlier this year because of pressure
    from the Justice Department, according to Rep. Ted Lieu (D-Calif.), chairman of
    the Congressional Foreign Trade Committee.


    The authors of this study wanted to test empirically how convincing passages such
    as this one really are. They fed `GPT-2` the first two paragraphs of a *New York
    Times* article about the seizure of a North Korean ship and had it extend this
    to twenty different full article-length texts; by hand they then selected the
    three most convincing of the twenty `GPT-2` generated articles (the paragraph
    above is taken from one of these generated texts). They conducted an online survey
    with five hundred respondents in which they divided the respondents into four
    groups: three groups were shown these hand-selected `GPT-2` generated articles,
    while the remaining group was shown the original *New York Times* article.


    They found that eighty-three percent of the respondents who were shown the original
    article considered it credible, while the percentage for the three synthesized
    articles ranged from fifty-eight percent to seventy-two percent. In other words,
    all three `GPT-2` articles were deemed credible by a majority of their readers,
    and the best of these was rated only a little less credible than the original
    article. The respondents were also asked if they were likely to share the article
    on social media, and roughly one in four said they were—regardless of which version
    of the article they had read.


    The authors of this study conclude that `GPT-2` is already capable of helping
    to significantly increase the scale of a disinformation campaign by allowing people
    to write just the beginnings of their fake news articles and then have the rest
    of the articles fabricated algorithmically. It should be emphasized here that
    this study was merely gauging the plausibility of this technique; it was not suggesting
    that this has already occurred in the real world. It should also be emphasized,
    however, that this study was on `GPT-2` rather than its much more powerful sibling,
    `GPT-3`.


    In fact, in the academic paper^([^(27)](#fn27)) introducing `GPT-3`—written by
    the team of `OpenAI` researchers who developed the program—there is a section
    describing an experiment the researchers conducted that is similar to the one
    just described for `GPT-2`. In this case, the researchers fed `GPT-3` a handwritten
    title and subtitle from a news article as the prompt and let the algorithm complete
    this to a short article of about two hundred words.^([^(28)](#fn28)) A collection
    of `GPT-3` generated articles of this form was combined with a collection of human-written
    articles of comparable length, and the `OpenAI` researchers claim that human readers
    had an average accuracy of fifty-two percent for determining which articles were
    `GPT-3` and which were human. In other words, people did only marginally better
    than they would have just by randomly guessing with a coin toss.


    Of course, the `OpenAI` researchers likely designed this study to produce as impressive
    results as possible. If they had used longer articles, the differences between
    human and machine would probably have emerged more prominently. Also, the human
    readers were low-paid contract workers recruited from Amazon’s crowdsourcing marketplace
    `Mechanical Turk`, so they were not a representative sample of the public, and
    they didn’t have any motivation to put much time or effort into the task—quite
    the opposite, actually, they get paid more the faster they click through their
    tasks. I wonder what the accuracy would have been if they had recruited, say,
    readers of the *New York Times* and gave them a small reward for each article
    that was successfully classified. Nonetheless, this experiment suggests that we’re
    already at the point where AI can write short articles that are at least superficially
    convincing to many readers, and the technology is sure to continue improving in
    the near future.'
