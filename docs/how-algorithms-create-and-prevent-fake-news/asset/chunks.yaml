  trans: '

    # 审核 YouTube 上的内容


    美国联邦调查局（FBI）在 2019 年 5 月发布的一份文件^(¹³⁶)指出，边缘阴谋论的传播是一种新的国内恐怖主义威胁，这种威胁可能会在 2020 年选举周期期间加剧。九个月后，即
    2020 年 2 月，美国第九巡回上诉法院裁定^(¹³⁷)，`YouTube` 是一个私人论坛，因此不受第一修正案中言论自由要求的约束——这一裁定允许 `YouTube`
    自由决定禁止哪些内容。次月，`YouTube` 的一位发言人表示^(¹³⁸)：“仅在去年一年，我们就推出了 30 多项不同的变革，以减少对边缘内容和有害错误信息（包括气候变化错误信息和其他类型的阴谋论视频）的推荐。”并且“得益于这一变革，此类内容通过推荐获得的观看时长在美国下降了超过
    70%。”不幸的是，这三十项变革具体包含哪些内容并不为公众所知，支持这一“下降 70%”说法的具体方法也不得而知——因此我们只能盲目相信 `YouTube`
    的企业承诺（回想一下，Chaslot-Berkeley 纵向研究发现，在此期间的头几个月，阴谋论视频的推荐量最初下降了 70%，但之后又开始逐渐回升）。


    2020 年 3 月，`YouTube` 还宣布^(¹³⁹)，将更依赖机器学习来审核其内容^(¹⁴⁰)，而人工审核员则因疫情封锁被送回家。但六个月后，该公司承认^(¹⁴¹)，这种对
    AI 审核的更大依赖导致错误删除视频的数量显著增加。在这六个月期间，约有 1100 万个视频被下架，大约是正常水平的两倍。其中超过 30 万个下架决定被申诉，而一半的申诉获得了成功。`YouTube`
    的首席产品官（正是本章前面提到 70% 的 `YouTube` 观看时长来自推荐算法的那位）透露说，机器学习方法在内容审核方面“无法像人类一样精确”，因此公司决定在此期间宁可谨慎行事。他还指出，在这
    1100 万个视频中，超过一半是在任何实际 `YouTube` 用户观看之前就被删除的。“这就是机器的力量，”他说。


    仅仅一个月后，即 2020 年 10 月，`YouTube` 发布了一篇公司博客文章^(¹⁴²)，标题为“管理 `YouTube` 上的有害阴谋论”。文中宣布，`YouTube`
    关于仇恨言论和骚扰的政策现已更新并扩大范围，以禁止“针对个人或群体，利用已被用于为现实世界暴力辩护的阴谋论的内容”。一个重要的后果是，QAnon 和 Pizzagate
    阴谋论运动中的许多视频现在被归类为禁止内容。然而，值得注意的是，违反 `YouTube` 新政策的并非这些运动的一般虚假新闻方面——尽管它们既荒诞又具有政治破坏性——而是与线下身体暴力的特定关联触发了新的禁令。`YouTube`
    此前已经在删除直接威胁暴力的特定 QAnon 和 Pizzagate 视频，但扩大后的政策意味着，禁止的理由现在包括“通过暗示某人参与这些有害阴谋（如 QAnon
    或 Pizzagate）之一来威胁或骚扰他人的内容”。


    回想一下关于 Chaslot-Berkeley 纵向研究的讨论，2019 年 1 月，`YouTube` 宣布对推荐算法进行一次重大但未公开的更新，旨在专门限制有害错误信息的传播。2020
    年 10 月宣布对 QAnon 实施新限制的博客文章称，自 2019 年 1 月以来，来自推荐算法的 QAnon 相关视频的观看次数已经下降了 80%。这些减少
    QAnon 存在的努力很重要，但有人可能会说，这做得太少、太晚了：潘多拉的魔盒已经打开。


    事实上，正如《纽约时报》记者凯文·鲁斯所言^(¹⁴³)，人们认为 `YouTube` 在社交媒体平台中扮演了最大的角色之一，将“QAnon 从边缘推向了主流”。鲁斯报道称，许多
    QAnon 的早期活动人士制作了“`YouTube` 纪录片”来解释该运动的核心信仰，这些视频在 Facebook 和其他平台上被分享——这帮助它们获得了数百万的观看量，并吸引了更多人加入该运动。一些个人还通过创建流行的“`YouTube`
    脱口秀”节目，聚焦 QAnon 世界的最新发展，从而在 QAnon 运动中声名鹊起。

    '
- fmt: '## Summary and Concluding Thoughts


    The misinformation war is a complex arms race that requires constant vigilance.
    Over the past several years, we have witnessed a repetitive cycle in which a journalistic
    accusation or academic investigation faults YouTube’s recommendation algorithm
    for radicalizing viewers and pushing people to dangerous fringe movements like
    the alt-right, then a YouTube spokesperson responds that they disagree with the
    accusation/methodology but also that the company is working to reduce the spread
    of harmful material on its site—in essence admitting there is a problem without
    admitting that the company is at fault.^([^(144)](#fn144))


    YouTube’s deep learning algorithm provides highly personalized recommendations
    based on a detailed portrait of each user drawn from their viewing history, search
    history, and demographic information. This renders it extremely difficult for
    external researchers to obtain an accurate empirical assessment of how the recommendation
    algorithm performs in the real world. Nonetheless, the glimpses we have seen and
    discussed throughout this chapter—from YouTube insiders to external investigations
    to firsthand experiences of political participants and fake news peddlers—together
    with the undeniable context that large segments of society increasingly have lost
    faith in mainstream forms of media and now turn to platforms like YouTube for
    their news, are fairly compelling evidence that YouTube’s recommendation algorithm
    has had a pernicious influence on our society and politics throughout the past
    half decade.


    What the current state of the matter is, and whether YouTube’s internal adjustments
    to the algorithm have been enough to keep pace, is unclear. What is clear is that
    by allowing this misinformation arms race to take place behind closed doors in
    the engineering backrooms of Google, we are placing a tremendous amount of trust
    in the company. As Paul Lewis wrote in his piece^([^(145)](#fn145)) on YouTube
    for the *Guardian*, “By keeping the algorithm and its results under wraps, YouTube
    ensures that any patterns that indicate unintended biases or distortions associated
    with its algorithm are concealed from public view. By putting a wall around its
    data, YouTube […] protects itself from scrutiny.”


    An extensive, scathing investigation^([^(146)](#fn146)) into the corporate culture
    at YouTube in 2019 by *Bloomberg News*, based largely on insider information from
    current and former employees, found that attempts to curb the spread of conspiracy
    theory videos through proposed adjustments to the recommendation algorithm were
    routinely shot down by upper management for the sake of “engagement,” a measure
    of the views, watch time, and interactions with videos: “Conversations with over
    twenty people who work at, or recently left, YouTube reveal a corporate leadership
    unable or unwilling to act on these internal alarms for fear of throttling engagement.”
    Some employees simply tried to collect data on videos they felt were harmful but
    which didn’t officially violate YouTube’s policies, but “they got the same basic
    response: Don’t rock the boat.”


    There are some grassroots efforts to counterbalance the far-right content on YouTube
    by creating far-left content that indulges in the same sensationalist techniques
    that seem to have resulted in large view counts and watch times propped up by
    the recommendation algorithm. One of the main instances of this is a group called
    *BreadTube*, whose name is a reference to the 1892 book *The Conquest of Bread*
    by Russian anarchist/communist revolutionary Peter Kropotkin. While I can understand
    the short-term desire to rebalance the system this way by hijacking methods from
    the alt-right movement, for the long-term outlook this really does not seem like
    a healthy way to correct the problem that YouTube has unleashed on society. But
    without resorting to such extreme methods, we can either trust YouTube to keep
    fixing the problem on its own in secret or we can push for more transparency,
    accountability, and government regulation; my vote is for the latter.


    One reason for this view is that even if YouTube voluntarily takes a more proactive
    stance in the fight against fake news, other video platforms will step in to fill
    the unregulated void left in its place. In fact, this is already happening: *Rumble*
    is a video site founded in 2013 that has recently emerged as a conservative and
    free speech–oriented alternative to YouTube (similar to the role Parler plays
    in relation to Twitter). The founder and chief executive of Rumble said^([^(147)](#fn147))
    that the platform has been on a “rocket ship” of growth since summer 2020 that
    has only accelerated since the election. He said the platform “prohibits explicit
    content, terrorist propaganda and harassment,” but that it was “not in the business
    of sorting out misinformation or curbing speech.” This suggests to me that we
    should not just leave it up to individual companies to decide how and how much
    to moderate their content—we need a more centralized, cohesive approach in order
    not to fall hopelessly behind in the fight against fake news. I’ll return to this
    discussion in a broader context in Chapter [8](../Text/508514_1_En_8_Chapter.xhtml).


    While waiting for legislative efforts to address this problem, it is important
    in the meantime to look carefully at the technical tools we have at our disposal.
    In the next chapter, I’ll explore whether recent lie detection algorithms powered
    by machine learning could be used to detect disinformation in online videos.'
  raw: '## Summary and Concluding Thoughts


    The misinformation war is a complex arms race that requires constant vigilance.
    Over the past several years, we have witnessed a repetitive cycle in which a journalistic
    accusation or academic investigation faults YouTube’s recommendation algorithm
    for radicalizing viewers and pushing people to dangerous fringe movements like
    the alt-right, then a YouTube spokesperson responds that they disagree with the
    accusation/methodology but also that the company is working to reduce the spread
    of harmful material on its site—in essence admitting there is a problem without
    admitting that the company is at fault.^([^(144)](#fn144))


    YouTube’s deep learning algorithm provides highly personalized recommendations
    based on a detailed portrait of each user drawn from their viewing history, search
    history, and demographic information. This renders it extremely difficult for
    external researchers to obtain an accurate empirical assessment of how the recommendation
    algorithm performs in the real world. Nonetheless, the glimpses we have seen and
    discussed throughout this chapter—from YouTube insiders to external investigations
    to firsthand experiences of political participants and fake news peddlers—together
    with the undeniable context that large segments of society increasingly have lost
    faith in mainstream forms of media and now turn to platforms like YouTube for
    their news, are fairly compelling evidence that YouTube’s recommendation algorithm
    has had a pernicious influence on our society and politics throughout the past
    half decade.


    What the current state of the matter is, and whether YouTube’s internal adjustments
    to the algorithm have been enough to keep pace, is unclear. What is clear is that
    by allowing this misinformation arms race to take place behind closed doors in
    the engineering backrooms of Google, we are placing a tremendous amount of trust
    in the company. As Paul Lewis wrote in his piece^([^(145)](#fn145)) on YouTube
    for the *Guardian*, “By keeping the algorithm and its results under wraps, YouTube
    ensures that any patterns that indicate unintended biases or distortions associated
    with its algorithm are concealed from public view. By putting a wall around its
    data, YouTube […] protects itself from scrutiny.”


    An extensive, scathing investigation^([^(146)](#fn146)) into the corporate culture
    at YouTube in 2019 by *Bloomberg News*, based largely on insider information from
    current and former employees, found that attempts to curb the spread of conspiracy
    theory videos through proposed adjustments to the recommendation algorithm were
    routinely shot down by upper management for the sake of “engagement,” a measure
    of the views, watch time, and interactions with videos: “Conversations with over
    twenty people who work at, or recently left, YouTube reveal a corporate leadership
    unable or unwilling to act on these internal alarms for fear of throttling engagement.”
    Some employees simply tried to collect data on videos they felt were harmful but
    which didn’t officially violate YouTube’s policies, but “they got the same basic
    response: Don’t rock the boat.”


    There are some grassroots efforts to counterbalance the far-right content on YouTube
    by creating far-left content that indulges in the same sensationalist techniques
    that seem to have resulted in large view counts and watch times propped up by
    the recommendation algorithm. One of the main instances of this is a group called
    *BreadTube*, whose name is a reference to the 1892 book *The Conquest of Bread*
    by Russian anarchist/communist revolutionary Peter Kropotkin. While I can understand
    the short-term desire to rebalance the system this way by hijacking methods from
    the alt-right movement, for the long-term outlook this really does not seem like
    a healthy way to correct the problem that YouTube has unleashed on society. But
    without resorting to such extreme methods, we can either trust YouTube to keep
    fixing the problem on its own in secret or we can push for more transparency,
    accountability, and government regulation; my vote is for the latter.


    One reason for this view is that even if YouTube voluntarily takes a more proactive
    stance in the fight against fake news, other video platforms will step in to fill
    the unregulated void left in its place. In fact, this is already happening: *Rumble*
    is a video site founded in 2013 that has recently emerged as a conservative and
    free speech–oriented alternative to YouTube (similar to the role Parler plays
    in relation to Twitter). The founder and chief executive of Rumble said^([^(147)](#fn147))
    that the platform has been on a “rocket ship” of growth since summer 2020 that
    has only accelerated since the election. He said the platform “prohibits explicit
    content, terrorist propaganda and harassment,” but that it was “not in the business
    of sorting out misinformation or curbing speech.” This suggests to me that we
    should not just leave it up to individual companies to decide how and how much
    to moderate their content—we need a more centralized, cohesive approach in order
    not to fall hopelessly behind in the fight against fake news. I’ll return to this
    discussion in a broader context in Chapter [8](../Text/508514_1_En_8_Chapter.xhtml).


    While waiting for legislative efforts to address this problem, it is important
    in the meantime to look carefully at the technical tools we have at our disposal.
    In the next chapter, I’ll explore whether recent lie detection algorithms powered
    by machine learning could be used to detect disinformation in online videos.'
  trans: '

    ## 总结与结论


    虚假信息之战是一场复杂的军备竞赛，需要我们时刻保持警惕。过去几年里，我们目睹了一个反复出现的循环：先是某篇新闻报道或学术调查指责 YouTube 的推荐算法激化观众观点，将人们推向诸如另类右翼等危险的边缘运动；随后
    YouTube 发言人回应称，他们不同意这些指控或研究方法，但同时表示公司正在努力减少其网站上有害内容的传播——这实质上是在承认存在问题，却又不承认公司有过错。^(¹⁴⁴)


    YouTube 的深度学习算法基于每个用户的详细画像（包括观看历史、搜索历史和人口统计信息）提供高度个性化的推荐。这使得外部研究人员极难对推荐算法在现实世界中的表现进行准确的实证评估。尽管如此，我们在本章中看到并讨论的那些惊鸿一瞥——从
    YouTube 内部人士到外部调查，再到政治参与者和假新闻贩子的亲身经历——再加上一个不可否认的背景，即社会中的大部分群体日益对主流媒体形式失去信心，转而从
    YouTube 等平台获取新闻，这些都有力地证明了 YouTube 的推荐算法在过去五年中对我们的社会和政治产生了有害影响。


    目前事态如何，以及 YouTube 对算法的内部调整是否足以跟上步伐，尚不清楚。但清楚的是，通过允许这场虚假信息军备竞赛在谷歌的工程后台闭门进行，我们正在向这家公司倾注巨大的信任。正如保罗·刘易斯在《卫报》上关于
    YouTube 的文章^(¹⁴⁵)中所写：“通过将算法及其结果秘而不宣，YouTube 确保任何表明其算法存在意外偏见或扭曲的模式都隐藏于公众视野之外。通过为其数据筑起高墙，YouTube……保护自己免受审查。”


    2019 年，《彭博新闻》对 YouTube 的企业文化进行了一项广泛而尖锐的调查^(¹⁴⁶)，该调查主要基于现任和前任员工的内部信息。调查发现，通过提议调整推荐算法来遏制阴谋论视频传播的尝试，经常因“参与度”（衡量观看次数、观看时长和视频互动量的指标）而被高层管理人员否决：“与二十多位在
    YouTube 工作或近期离职的人士的对话揭示，公司领导层因担心抑制参与度而无法或不愿对这些内部警报采取行动。”一些员工只是试图收集他们认为有害但并未正式违反
    YouTube 政策的视频数据，但“他们得到的回应基本一致：别惹是生非。”


    也有一些草根层面的努力，通过制作极左翼内容来平衡 YouTube 上的极右翼内容，这些内容采用了与那些似乎因推荐算法而获得高播放量和观看时长的内容相同的耸人听闻手法。这方面的一个主要例子是一个名为“面包管”（BreadTube）的团体，其名称源于俄国无政府主义/共产主义革命家彼得·克鲁泡特金
    1892 年的著作《面包的征服》。虽然我能理解短期内通过劫持另类右翼运动的方法来重新平衡系统的愿望，但从长远来看，这似乎并非纠正 YouTube 给社会带来的问题的健康方式。然而，如果不诉诸如此极端的方法，我们要么只能相信
    YouTube 会秘密地自行解决问题，要么可以推动更多的透明度、问责制和政府监管；我的选择是后者。


    持此观点的一个原因是，即使 YouTube 自愿在打击假新闻方面采取更积极的立场，其他视频平台也会介入，填补其留下的监管真空。事实上，这已经在发生：Rumble
    是一个成立于 2013 年的视频网站，最近已成为 YouTube 的保守派和言论自由导向的替代品（类似于 Parler 相对于 Twitter 的角色）。Rumble
    的创始人兼首席执行官表示^(¹⁴⁷)，该平台自 2020 年夏季以来一直处于“火箭式”增长，自大选以来更是加速发展。他说该平台“禁止露骨内容、恐怖主义宣传和骚扰”，但“不负责甄别虚假信息或限制言论”。这向我表明，我们不应仅仅让个别公司自行决定如何以及多大程度上审核其内容——我们需要一种更集中、更协调的方法，以免在打击假新闻的斗争中落后到无可挽回的地步。我将在第
    8 章更广泛的背景下回到这一讨论。


    在等待立法努力解决这一问题的同时，仔细审视我们手头可用的技术工具也很重要。在下一章中，我将探讨最近由机器学习驱动的谎言检测算法是否可用于检测在线视频中的虚假信息。

    '
