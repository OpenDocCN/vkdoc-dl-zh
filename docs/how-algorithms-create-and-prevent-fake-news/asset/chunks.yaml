  trans: '

    ### 结构性方法


    2020 年 8 月提出的一项想法^(³¹⁷)是在社交媒体平台中引入“断路器”。类似于纽约证券交易所交易达到危险波动水平时自动关闭，社交媒体平台可以在关键时刻暂停或至少显著减缓内容的病毒式传播，以提供冷静期，并为事实核查人员争取更多时间来完成工作。这可能与
    Facebook 在 2020 年大选后几天内实施紧急措施时的做法相差不远，但我们无法确定，因为正如我之前提到的，该公司几乎没有公开说明这些紧急措施究竟是什么。在危机时刻，可以在整个平台增加“摩擦”，也可以将其应用于单个有争议的内容，以减缓其病毒式传播，而不必完全审查。Facebook
    确实表示，它正在内部测试这种有意减缓病毒式帖子传播的想法。这种通过整体断路器或单个病毒式传播减速带来帮助打击错误信息的想法，甚至被比作“拉平曲线”——这是新冠疫情最初几个月封锁期间的口号。^(³¹⁸)


    社交媒体上一个经常被讨论的问题是“过滤气泡”，即人们被引导进入同质化的网络，与志同道合的用户分享倾向于强化既有观点的内容；这可能导致社会更加分裂、两极分化，在极端情况下甚至可能使人们生活在彼此不同的感知现实中。一些研究人员提出了算法方法来打破或至少缓解这些社交媒体过滤气泡。一种特定的方法^(³¹⁹)是首先为每个用户和每条社交媒体帖子（或至少每条分享的新闻链接）分配一个数字向量，该向量提供诸如政治倾向等各个维度的量化度量。过滤气泡表现为一组用户，他们的向量彼此相似，并且倾向于发布具有相似向量的内容。基于此设置，研究人员设计了一种算法，优先向选定的用户群体推送多样化内容，这些用户被认为可能分享这些内容并帮助其在社交网络中传播，从而穿透过滤气泡。研究人员发现，他们选择用户来启动这种传播的特定策略，在提高网络中信息流整体多样性方面的效果，是简单地将多样化内容推送给连接最广泛的用户这一方法的**三倍**。研究人员承认，这种以多样性为导向的信息流算法无法像当前的社交媒体算法那样最大化用户参与度——我不禁要问，在现实世界中为这些意识形态数值向量赋值会有多么困难。


    研究人员提出的另一种方法——与前一种方法类似，涉及对社交网络应如何运作以减少两极分化进行相当重大的重新构想——基于去中心化的理念。许多社交网络自然会在高影响力用户周围形成一系列中心。如果你将每个这样的影响者视为一个自行车轮的中心，辐条向外延伸到关注者，那么网络看起来就像一堆自行车轮，不同轮子之间有一些但并非很多连接。这种网络结构的一个后果是，观点和看法往往从数量有限的中心影响者那里产生并向外渗透，但它们很难从一个自行车轮跨越到另一个。以推特上的唐纳德·特朗普为例，存在一个以他为中心的庞大自行车轮，涵盖了该平台上大部分共和党用户群，并可能阻碍了该用户群内多样化观点的流动。社交网络去中心化的总体思路是重新设计它，使得这些自行车轮状的影响力圈不太可能出现。这也可以被视为创建*平等主义*网络，其中用户对彼此的影响力失衡程度较低。


    一位倡导去中心化网络的知名学者声称^(³²⁰)，在平等主义网络中，“新想法和观点可以来自社区的任何地方”，它们的传播“基于其质量，而非宣扬它们的人”。这与中心化网络形成对比，据称在中心化网络中，“如果处于中心的那个影响者表现出哪怕一点点党派偏见，它也可能在整个群体中被放大”。这位学者甚至断言，社交媒体的中心化本质是“错误信息和假新闻变得如此普遍的主要原因之一”，因为它“赋予了有偏见的影响者对其社区不成比例的影响力——使得小的谣言和猜测被放大为广泛的误解和错误信念”。这些大胆的主张很难得到证实，但特朗普总统被发现^(³²¹)是新冠病毒错误信息的最大单一传播者这一事实，至少在一定程度上指向了这个方向。然而不幸的是，目前关于中心化网络弊病的研究远远超过了关于如何防止社交媒体网络变得中心化——而又不明确决定人们应该与谁交朋友和/或限制他们可以拥有的关注者数量——的研究。

    '
- fmt: '### Fake News Detection


    One thing that should be apparent from the earlier section in this chapter on
    quantifying the spread of fake news is that, simply put, fake news typically propagates
    through social media in a somewhat different manner than traditional news. This
    is the basic principle behind a fake news detection algorithm^([^(322)](#fn322))
    developed by a London-based AI startup called *Fabula* that was acquired by Twitter
    shortly after the algorithm was demonstrated. `Fabula`’s approach uses a version
    of deep learning that is custom-tailored to networks; this allows the developers
    to train a supervised learning classifier on the task of distinguishing between
    real and fake news based on a vast number of predictors concerning the flow through
    a social media platform. The algorithm is blind to the content of social media
    posts—it only sees, and bases its classification on, the intricate web of user
    interactions that propagate content through the network (as well as the profiles
    of the users involved in these interactions). While this cannot possibly yield
    a perfect result in every individual case, as long as it is accurate in the bulk
    of cases, then the borderline ones can always be recommended for human inspection.
    One of the main challenges with this approach is that, generally speaking, we
    want to catch and remove fake news *before* it goes viral rather than recognizing
    it *after* it has already done so—hence, in order for `Fabula`’s algorithm to
    be useful in practice, it needs to learn how to detect fake news very early based
    only on initial propagation data.


    A fake news detection algorithm introduced^([^(323)](#fn323)) in April 2020 by
    a team of researchers from Microsoft Research and Arizona State University aims
    particularly at detecting fake news early on by combining different types of predictors.
    Unlike `Fabula`’s content-blind system, this team’s supervised learning classifier
    does draw some information from actual content, but it only uses measures that
    are fairly easy to extract (that is to say, it doesn’t try to really read and
    understand and estimate the factual accuracy of content). Their system assigns
    sentiment scores to posts and articles in links (measuring how strongly positively
    or negatively worded they are) because fake news tends to have a wider sentiment
    range than real news; it estimates how biased each user is by comparing them to
    a database of users with labeled bias scores, because biased users are more likely
    to share fake news; and the system clusters users based on their metadata (profile
    information and account activity statistics) and assigns users who are part of
    a large homogeneous cluster a lower credibility score because they are more likely
    to be bots or human users in extremely strong echo chambers. These measures and
    other related ones form the predictors in this supervised learning algorithm—and
    all the text processing involved is handled by Facebook’s `RoBERTa` system that
    was discussed earlier. Because the predictors do involve content and not just
    network flow, there is a reasonable chance of catching fake news immediately before
    it has spread.


    Just a few months later, in July 2020, a research paper^([^(324)](#fn324)) came
    out that uses content-based predictors in a supervised learning algorithm—not
    to detect fake news, but to “distinguish influence operations from organic social
    media activity.” They chose only to use predictors that draw from publicly available
    and human-interpretable aspects of social media posts; this provides transparency
    and also allows the algorithm to operate on any social media platform. Their predictors
    include internal characteristics of the post (such as timing, word count, and
    whether there is a news site URL included) and external ones (such as whether
    there’s a URL in the post with a domain that is popular in the training data for
    a known troll campaign). The main goal of this paper was actually less about devising
    a practical state-of-the-art algorithm and more about learning which aspects of
    social media content are most indicative of influence campaigns in which settings.
    In particular, they studied Chinese, Russian, and Venezuelan troll activity in
    the United States on Twitter, Facebook, and Reddit. They found that these predictors
    worked quite well overall, but which particular ones were most relevant varied
    quite substantially—across the different social media platforms, across the different
    influence campaigns, and even across the different months within each campaign.
    Moreover, to be able to accurately detect posts from a particular influence campaign,
    the algorithm needed to be trained on data from that same campaign—which certainly
    limits the real-world efficacy of this approach.


    Another paper^([^(325)](#fn325)) from 2020 used supervised learning to classify
    news as fake versus mainstream based on its propagation through Twitter. This
    one looked in particular at the role played by the different kinds of interactions
    on Twitter (tweet, retweet, mention, reply, and quote), and it also compared performance
    between the United States and Italy. It was found that the network properties
    of mentions provides a fairly strong classifier and that the most important network-theoretic
    predictors in the United States were the same as the most important ones in Italy—but
    that an algorithm trained in one country did not perform well when applied out
    of the box in the other country, suggesting that country-specific fine-tuning
    is necessary. This sensitivity of fake news detection algorithms to language/region
    is not just a theoretical matter. It was recently found^([^(326)](#fn326)) that
    Spanish-language misinformation in the United States is flourishing on Facebook
    and appears to be avoiding algorithmic detection much more than English-language
    misinformation: in a study by `Avaaz`, seventy percent of misinformation in English
    was flagged with a warning label, whereas for Spanish it was only thirty percent.
    Some believe this discrepancy may have been one of the driving factors in President
    Trump’s unexpectedly strong performance in Florida in the 2020 election.


    ### Algorithmic Adjustments


    Two of the main ways Facebook has responded to the problem of misinformation are
    by adding warning labels to questionable content (which is found using a combination
    of algorithmic detection, professional moderation, and user flagging) and demoting
    its ranking in the newsfeed algorithm. The `Avaaz` study on global health misinformation
    mentioned earlier^([^(327)](#fn327)) estimated that by going further and providing
    all users who have interacted with misinformation on Facebook with corrected factual
    information would on average cut their belief in that misinformation in half—and
    that “detoxing” the newsfeed algorithm by downgrading misinformation content itself
    as well as groups, pages, and users who have a track record of habitually posting
    misinformation would decrease future views of such content by eighty percent.
    Facebook was already moving in this direction and implementing some milder versions
    of these measures (and experimenting with related ones) prior^([^(328)](#fn328))
    to the `Avaaz` report, and these efforts have since continued, so `Avaaz`’s all-or-nothing
    framing of the impact of its proposed modifications is somewhat misleading. Nonetheless,
    it is still quite helpful to see a quantitative public investigation into the
    potential effect of these sorts of misinformation mitigation methods since Facebook’s
    internal research is kept private.


    The last topic in this lengthy chapter is a twenty-five-year-old law that has
    been in the news lately for its role in allowing social media companies to avoid
    responsibility for the content on their platforms.'
