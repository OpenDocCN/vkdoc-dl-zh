    heavily on context and background knowledge.


    Another important development highlighted in the blog post was a new “holistic”
    approach to content moderation on Facebook. Previously, Facebook’s detection systems
    looked separately at the words in a post, the images in a post, and the comments
    on a post—and the systems also considered each violation activity separately.
    For example, before the holistic approach, one classifier would look for nudity
    in a posted photo, a separate classifier would look for violence in the photo,
    a separate classifier would look for hate speech in the photo’s caption, etc.
    Facebook replaced this with a pre-trained machine learning algorithm called *Whole
    Post Integrity Embeddings* (*WPIE*) that converts each post (photos, text, comments,
    and even user data) into a vector—a sequence of numbers—so that any type of violation
    classifier need only work with these vectors rather than breaking the post data
    into disjoint pieces. In other words, this is like RoBERTa, but instead of just
    text, it reads in entire Facebook posts with comments and images and awareness
    of the users responsible for the posts and comments.


    In general, the way algorithmic detection for policy violations works is the algorithm
    assigns a score to each piece of content, and if that score is above a certain
    threshold, then the content is automatically removed; if the score is below a
    certain threshold, then the content is left alone; and if the score is between
    these two thresholds, then the content is flagged for human moderators to look
    at and evaluate. Facebook says the holistic WPIE framework helped the company
    remove over four million pieces of drug sale content in the third quarter of 2019,
    more than ninety-seven percent of which was scored above the automatic removal
    threshold; this was a substantial increase over the pre-WPIE first quarter when
    the number removed was less than a million, and less than eighty-five percent
    of these were scored over the automatic removal threshold. However, when the coronavirus
    pandemic came around a few months later and detecting health misinformation became
    an urgent challenge, Facebook found itself relying largely on human moderators
    and external fact-checking organizations—although, as I’ll discuss later in this
    chapter and more extensively in the next chapter, machine learning still plays
    multiple important roles in that process.


    As you recall from earlier in this chapter, bot activity on social media has long
    been a significant problem. As you also recall from this chapter, bot behavior
    tends to have quantitatively distinct patterns from human behavior—such as bursts
    of activity that far outpace what a human could achieve. When it comes to algorithmic
    detection, this powerful efficiency of bots is their own undoing: not only can
    detection algorithms look for direct signs of bots in metadata, but the algorithms
    can also look for behavioral differences. It is relatively easy to program a bot
    to share articles and even to write simple human-sounding posts and comments,
    but to fly under the radar, one needs to ensure that the bot does this at the
    approximate frequency and scope of a human user. And in the case of Facebook,
    there’s another important factor involved: the friendship network. What has proven
    most challenging when it comes to creating bots that simulate human behavior is
    developing a Facebook account with a realistic-looking network of friends^([^(311)](#fn311))—and
    doing this in large enough numbers for an army of bots to have a significant impact.'
  trans: '

    ### Facebook 的机器学习审核机制


    2019 年 11 月，Facebook 的首席技术官发表了一篇博文^(³¹⁰)，介绍了公司最新的“社群守则执行报告”并阐述了相关背景。这篇博文恰如其分地重点概述了该公司在利用人工智能进行内容审核方面的最新进展。文中指出，近期最大的改进源于从监督学习向自监督学习的部分转变。监督学习需要手动标记数据，通常是一个耗时费力的过程；而自监督学习所需的标签则直接从数据中自动提取。你在第
    6 章中看到了自监督学习的一个例子：`BERT`。那里的训练数据是文本，其中一些单词被随机隐藏，算法需要学习预测这些隐藏词，而这些隐藏词的数据标签就是单词本身。自监督学习使得处理更大规模的数据集成为可能，因此可以训练出比使用传统监督学习方法时更大、也更准确的预测算法。由于
    Facebook 拥有极其庞大的数据集，并且具备训练和支持超大规模算法的计算资源，这无疑是该公司值得探索的合理路径。当然，在很多情况下，我们仍然需要人工策划和标记的数据，但这些情况通常可以与自监督学习相结合，形成一种混合方法，从某种意义上说，这能兼顾两者的优势。


    博文中提到的一个效果显著的自监督学习具体实例，是一个名为 `RoBERTa` 的语言处理系统，它是 Facebook 对标谷歌 `BERT` 的解决方案。回顾第
    6 章，`BERT` 与 `GPT-3` 非常相似，区别在于 `BERT` 的目标是生成单词的向量嵌入，这为在文本上执行广泛的机器学习操作打开了大门。与谷歌使用
    `BERT` 类似，Facebook 利用 `RoBERTa` 来驱动其搜索算法——但不仅如此，Facebook 还使用 `RoBERTa` 来帮助识别仇恨言论等内容。这是一个混合方法的典型例子：Facebook
    在一个已手动标记为“仇恨”或“非仇恨”的帖子集合上训练一个传统的监督学习分类器，但算法并非直接处理这些帖子中的文本，而是处理经过自监督 `RoBERTa`
    转换后的文本——即这些帖子中的单词被转化成的数值向量。每当科技巨头需要计算机处理语言含义，尤其是语言中潜在的微妙用法时，你可以认为他们现在都在使用像 `BERT`
    或 `RoBERTa` 这样大规模的自监督语言模型，并且这样做已经显著提升了相比过去方法的性能。话虽如此，与严重依赖上下文和背景知识的虚假信息相比，仇恨言论通常更容易被识别，即使对计算机来说也是如此。


    博文中强调的另一个重要进展是 Facebook 在内容审核上采用了一种新的“整体性”方法。此前，Facebook 的检测系统会分别查看帖子中的文字、图片和评论——并且系统也会分别处理每一种违规行为。例如，在采用整体性方法之前，一个分类器会检测发布照片中的裸露内容，另一个独立的分类器会检测照片中的暴力内容，还有一个独立的分类器会检测照片标题中的仇恨言论，等等。Facebook
    用一个名为 `Whole Post Integrity Embeddings`（`WPIE`）的预训练机器学习算法取代了这种做法。该算法将每个帖子（包括照片、文字、评论，甚至用户数据）转换成一个向量（一串数字），这样任何类型的违规分类器都只需处理这些向量，而无需将帖子数据拆分成互不关联的部分。换句话说，这就像
    `RoBERTa`，但它处理的不仅仅是文本，而是整个 Facebook 帖子，包括评论、图片，并且能感知到发布帖子和评论的用户。


    总的来说，算法检测政策违规的工作方式是：算法为每条内容分配一个分数，如果该分数高于某个阈值，内容就会被自动移除；如果分数低于某个阈值，内容则被保留；如果分数介于这两个阈值之间，内容就会被标记出来，交由人工审核员查看和评估。Facebook
    表示，整体性的 `WPIE` 框架帮助该公司在 2019 年第三季度移除了超过 400 万条毒品销售内容，其中超过 97% 的内容得分高于自动移除阈值；这与采用
    `WPIE` 之前的第一季度相比有了显著增长，当时移除的数量不到 100 万条，并且其中只有不到 85% 的内容得分超过了自动移除阈值。然而，几个月后新冠疫情爆发，检测健康虚假信息成为一项紧迫挑战，Facebook
    发现自己主要依赖人工审核员和外部事实核查组织——不过，正如我将在本章后面以及下一章更详细讨论的那样，机器学习在这一过程中仍然扮演着多个重要角色。


    正如你在本章前面所回忆的，社交媒体上的机器人活动长期以来一直是一个重大问题。同样，正如你在本章中所了解的，机器人的行为往往在数量上与人类行为存在明显差异——例如，其活动爆发速度远超人类所能达到的水平。在算法检测方面，机器人这种强大的效率反而成了它们的致命弱点：检测算法不仅可以在元数据中寻找机器人的直接迹象，还可以寻找行为上的差异。编写一个机器人来分享文章，甚至编写听起来像人类的简单帖子和评论相对容易，但要做到不被发现，就需要确保机器人以接近人类用户的频率和范围进行这些活动。而在
    Facebook 的案例中，还有另一个重要因素：好友网络。在创建模拟人类行为的机器人方面，最具挑战性的是开发一个拥有看起来真实的好友网络的 Facebook
    账户^(³¹¹)——并且要创建足够多的此类账户，以便一支机器人大军能够产生显著影响。

    '
- fmt: '2020年11月，Facebook 公布了其最新深度学习机器人检测算法的一些细节。该算法依赖于超过两万个预测变量，这些变量不仅关注目标用户，还关注该用户好友网络中的所有用户。预测变量包括人口统计信息（如好友网络中的年龄和性别分布）、好友网络的连接属性信息，以及
    Facebook 未披露的许多其他信息。该算法通过两级流程进行训练：首先，在一个已自动标记的大型数据集上进行训练，以获得对任务的粗略理解；然后，在一个已手动标记的小型数据集上进行微调训练，使算法能够学习更细微的差别。Facebook
    估计，2020年第四季度，其活跃用户中约有二十分之一是虚假账户。在那一年里，它利用这套新的深度学习系统移除了超过50亿个被认定为虚假且积极参与滥用行为的账户——这个数字还不包括每天数百万次被阻止的创建虚假账户的尝试。


    2020年11月，Facebook 还宣布了一种新的机器学习方法，用于对提交给人工审核员审查的帖子队列进行排序。此前，被标记为可能违反 Facebook 政策（包括用户标记的帖子以及触发算法检测系统但未超过自动移除阈值的帖子）而需要人工审核的帖子，大多按照被标记的顺序由人工审核员审查。新方法使用机器学习来确定帖子在队列中的优先级，以便最紧急和危害最大的帖子得到优先处理。算法考虑的主要因素是传播性、严重性和违反政策的可能性——但这些因素的衡量方式以及它们之间的权衡并未披露，仅说明现实世界的危害被视为最重要的因素。


    ### Twitter 的机器人检测


    在2017年9月的一篇博文中，Twitter 披露了其在2016年大选后为遏制平台上的机器人活动所做的一些努力。当时，该公司的自动化系统每周能捕获约300万个可疑账户——是选举前几个月前一年同期水平的两倍。Twitter
    还使用机器学习来识别可疑的登录尝试——在该博文发布时，每天能阻止50万次此类尝试——通过寻找登录行为是脚本化或自动化的迹象，但并未说明这具体涉及哪些预测变量。此外，Twitter
    使用聚类算法来寻找由单一实体创建和/或控制的大型账户群，但我们不知道这个聚类过程涉及哪些变量。


    ### 2020年大选及其余波


    回顾第6章，Google 减少错误信息影响的主要方法是在其搜索结果中提升优质新闻的排名——它通过为来源分配一个基于算法确定的分数来实现这一点，该分数基于数据驱动的指标（如
    PageRank）以及人工驱动的质量评估指标。Facebook 同样为新闻发布者分配一个分数，称为“新闻生态系统质量”（NEQ）分数，当帖子包含新闻文章链接时，该分数会发挥作用。通常情况下，NEQ
    分数在信息流排名算法中只起很小的作用，但在2020年大选几天后，马克·扎克伯格同意了员工团队的要求，大幅提高算法中 NEQ 分数的权重，以减少危险错误信息的传播。虽然这一变化是临时措施，但一些员工后来要求将其永久化；他们被高层领导拒绝了，但决定将研究这次临时提高
    NEQ 分数的影响，并可能为未来的决策提供参考。


    ### 其他方面？


    本节关于算法审核的描述，肯定只是 Facebook 和 Twitter 闭门开发调整算法以减少假新闻的无数多方面努力的冰山一角。为了了解其他可能的方法，不仅限于这两个平台，而是在任何社交媒体环境中，我接下来将转向由科技巨头之外的学术研究人员开发的方法。其中一些方法可能已经以某种形式被
    Facebook 或 Twitter 的内部方法所吸收——我们只是不知道，因为公司对其方法保密。其他方法几乎肯定没有被采用，因为它们要么比公司实际使用的方法更原始，要么涉及过于庞大的设计改造，和/或过于严重地影响了公司的底线：用户参与度。此外，归根结底，社交媒体公司只会在有明确政策反对错误信息的情况下，才使用算法来移除它。尽管如此，仔细审视下一节中的方法是有帮助的。与上述
    Facebook 和 Twitter 的内部方法不同，以下学术方法不隐藏任何技术细节——因此，除了展示可能性之外，它们还更具体地展示了算法审核在底层是如何真正运作的。


    ## 算法如何提供帮助


    在本节中，我将首先介绍基于更广泛的结构性理念来重新设计社交媒体网络的假新闻缓解方法；然后，我将转向更实际的方法，这些方法依赖于假新闻在当前运行的社交网络中的传播方式。'
  raw: 'In November 2020, Facebook released^([^(312)](#fn312)) some details on its
    latest deep learning bot detection algorithm. It relies on over twenty thousand
    predictor variables that look not just at the user in question but also at all
    users in that user’s network of friends. The predictors include demographic information
    such as the distribution of ages and gender in the friend network, information
    on the connectivity properties of the friend network, and many other pieces of
    information that Facebook did not disclose. The algorithm is trained in a two-tier
    process: first, it is trained on a large data set that has been labeled automatically,
    to get a coarse understanding of the task, then it undergoes fine-tuning training
    on a small data set that has been labeled manually so the algorithm can learn
    more nuanced distinctions. Facebook estimated^([^(313)](#fn313)) in the fourth
    quarter of 2020 that approximately one in twenty of its active users were fake
    accounts. Throughout that year, it used this new deep learning system to remove
    over five billion accounts that were believed to be fake and actively engaging
    in abusive behavior—and that number does not include the millions of blocked attempts
    to create fake accounts each day.


    In November 2020, Facebook also announced^([^(314)](#fn314)) a new machine learning
    approach for ordering the queue of posts that are flagged for review by human
    moderators. Previously, posts flagged for human review for potentially violating
    Facebook’s policies (which includes both posts flagged by users and posts that
    triggered the algorithmic detection system but didn’t score above the threshold
    for automatic removal) were reviewed by human moderators mostly in the order in
    which they were flagged. The new approach uses machine learning to determine the
    priority of posts in the queue so that the most urgent and damaging ones are addressed
    first. The main factors the algorithm considers are virality, severity, and likelihood
    of violating a policy—but the ways these are measured and weighed against each
    other were not revealed, outside of saying that real-world harm is considered
    the most important.


    ### Twitter’s Bot Detection


    In a September 2017 blog post,^([^(315)](#fn315)) Twitter released some details
    on its efforts following the 2016 election to rein in bot activity on the platform.
    At the time, the company’s automated systems were catching around three million
    suspicious accounts per week—twice the rate from a year earlier in the months
    leading up to the election. Twitter also uses machine learning to identify suspicious
    login attempts—blocking half a million per day when the blog post was written—by
    looking for signs that the login is scripted or automated, though no indication
    of what predictors this actually involves was given. Additionally, Twitter uses
    clustering algorithms to look for large groups of accounts that were created and/or
    controlled by a single entity, but we don’t know what variables are involved in
    this clustering process.


    ### The 2020 Election and Its Aftermath


    Remember from Chapter [6](../Text/508514_1_En_6_Chapter.xhtml) that Google’s main
    approach to reducing the impact of misinformation is to elevate quality journalism
    in its search rankings—and it does this by assigning an algorithmically determined
    score to sources that is based on data-driven measures like PageRank as well as
    human-driven quality assessment measures. Facebook similarly assigns a score to
    news publishers, called a *news ecosystem quality* (*NEQ*) score, that is relevant
    when posts contain links to news articles. Ordinarily, NEQ scores play only a
    small role in the newsfeed ranking algorithm, but several days after the 2020
    election, Mark Zuckerberg acceded to the demands of a team of employees to significantly
    increase the algorithm’s weighting of NEQ scores in order to reduce the spread
    of dangerous misinformation.^([^(316)](#fn316)) While this change was a temporary
    measure, some employees later requested that it become permanent; they were rebuffed
    by senior leadership, but it was decided that the impact of this temporary increase
    to NEQ scores would be studied and could inform future decisions.


    ### What Else?


    What has been described so far in this section on algorithmic moderation surely
    only scratches the surface of the myriad and multifaceted efforts behind closed
    doors at Facebook and Twitter to reduce fake news through the development and
    adjustment of algorithms. To get a sense of what else is possible, not just on
    these two platforms but in any social media setting, I turn next to approaches
    that have been developed by academic researchers outside of the tech giants. Some
    of these approaches might, in one form or another, already be absorbed into Facebook’s
    or Twitter’s internal approach—we just don’t know, due to the veil of secrecy
    the companies keep around their methods. Others almost certainly are not, because
    they are either more primitive than what the companies actually use or they involve
    too massive of a design overhaul and/or they impinge too strongly upon the companies’
    bottom line: user engagement. Moreover, at the end of the day, social media companies
    will only use algorithms to remove misinformation in situations where they have
    an explicit policy against it. Nonetheless, it is helpful to look carefully at
    the methods in the next section. As opposed to the internal Facebook and Twitter
    approaches sketched above, the following academic approaches don’t hide any technical
    details—so in addition to showing what’s possible, they give a more concrete sense
    of how algorithmic moderation really works under the hood.


    ## How Algorithms Could Help


    In this section, I’ll start first with fake news mitigation methods based on broader
    structural ideas for reengineering social media networks; then I’ll turn to more
    down-to-earth methods that rely on the way fake news spreads through social networks
    as they currently operate.'
