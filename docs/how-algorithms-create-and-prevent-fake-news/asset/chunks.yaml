    # Google 地图上的虚假商家信息


    虚假商家在 Google 地图上显然是一门大生意：该平台在 2018 年移除了超过三百万条虚假商家信息。这一数据来自 Google 地图负责人撰写的一篇公司博客文章，标题为“我们如何打击
    Google 地图上的虚假商家资料”。这篇博文发表于 2019 年 6 月 20 日——与《*华尔街日报*》的报道同一天。不难想象，这篇时机巧妙的博文是一种战略举措，旨在减轻《*华尔街日报*》调查报道发布后必然会引发的负面反响。这篇文章还包含其他一些惊人的数据，包括
    Google 地图拥有超过两亿个地点，并且“每个月我们连接用户与商家的次数超过九十亿次，其中包括超过十亿次电话呼叫和三十亿次路线请求。”


    Google 地图的博文列举了一些人们如何利用虚假商家信息牟利的例子：“他们做的事情包括：向商家收取本应免费的服务费用，冒充真实商家欺诈顾客，以及冒充真实商家获取潜在客户信息然后转卖。”（我们从《*华尔街日报*》了解到，问题远不止这些。）文章还指出，随着人们找到欺骗系统的新方法，Google
    正在“不断研究新的、更好的方式来打击这些骗局，使用各种不断演进的人工和自动化系统”，但与此同时，不法用户也会找到新的欺骗手段，“循环就这样持续下去。”


    这些自动化系统——换句话说，即算法审核——是严格保密的公司机密，因为透露细节会“实际上帮助骗子找到击败我们系统的新方法。”这篇博文真正透露的信息只有：（1）在
    2018 年移除的三百万条虚假列表中，超过百分之九十是在用户看到之前就被内部系统移除的，其余则由平台上的用户举报；（2）2018 年有超过十五万个账户被禁用，比前一年增加了百分之五十。


    也许那篇博文的保密性让一些人感到不满，因为仅仅八个月后，一篇新的博文发布了——仍然由 Google 地图负责人撰写，但此时该职位已由不同的人担任——这篇博文虽然仍然谨慎，但更详细地介绍了该网站使用的算法审核机制。这篇文章称，Google
    地图使用“自动化检测系统，包括机器学习模型，扫描我们每天收到的数百万条贡献，以检测并移除违反政策的内容”，并且专门针对虚假评论，这些机器学习模型“会留意特定的词语和短语，检查某个账户过去贡献的内容类型模式，并能检测可疑的评论模式。”虽然仍然可以理解地含糊其辞，但我将在第
    8 章转向社交媒体审核中机器学习这一更广泛的主题，因此希望你能了解 Google 地图在此处暗示的方法——以及这些方法面临的挑战。


    这第二篇博文接着解释说，这些自动化系统“并不完美”，因此 Google 还依赖“由训练有素的操作员和分析师组成的团队，他们单独或批量审核评论、照片、商家资料和其他类型的内容。”该文章还提供了一些关于内容审核的有趣最新数据：2019
    年，Google 地图（1）“得益于我们机器学习模型和自动化检测系统的改进，这些系统在阻止违反政策的内容和检测异常以供我们的操作员审核方面做得越来越好”，移除了超过七千五百万条违反政策的评论和四百万个虚假商家资料；（2）下架了超过五十万条评论和二十五万个由用户举报的商家资料；（3）移除了一千万张照片；（4）禁用了近五十万个用户账户。


    ## Google 图片


    2016 年 4 月，一名 MBA 学生在 Twitter 上发布了一个令人不安的发现：在 Google 图片中搜索“unprofessional hairstyles
    for work”（不适合工作的发型）时，返回的结果几乎全是黑人女性的照片，其中许多是自然发型；而搜索“professional hairstyles for
    work”（适合工作的发型）时，返回的结果则几乎全是白人女性。为什么 Google 的图片搜索算法会如此公然带有种族主义色彩？这是一个复杂的问题，但答案的两个主要因素是：该算法天真地脱离上下文吸收信息，并且天真地反映了社会中普遍存在的公然种族主义。


    在这次特定搜索中出现的一些黑人女性图片，来自黑人女性撰写的博客文章和 Pinterest 画板，她们在讨论工作场所中对发型的种族主义态度。例如，一张排名靠前的图片来自一篇批评某大学禁止脏辫和玉米垄发型的文章；该文章通过展示拥有这些发型的黑人女性图片来说明被禁的发型，并哀叹这些发型被该大学视为不专业。这项禁令显然是种族主义的，而揭露这一问题的文章则恰恰相反，是反种族主义的。Google
    图片搜索将这两个截然不同的方面混为一谈，剥离了发型图片的上下文，仅仅将图片与“不专业”这个词关联起来。这样一来，它就把一张反种族主义的图片变成了种族主义的图片。通过这种无意的方式，一所大学校园里的种族主义被算法放大，并转化为大规模传播的种族主义信息：任何天真地在
    Google 上寻找如何看起来更专业的建议的人，都会收到一个可怕的暗示——身为黑人就是不专业。


    很快，这里形成了一个数据反馈循环。这位 MBA 学生的推文迅速走红，这在很大程度上是件好事，因为它有助于提高人们对 Google 算法种族主义的认识。但这种病毒式传播导致
    Google 上关于发型的搜索指向了这条推文本人以及围绕它的许多讨论——所有这些讨论都通过展示黑人女性被标记为“不专业”而白人女性被标记为“专业”的方式，来引起人们对
    Google 种族主义的关注。Google 再次将这些带有标签的图片收入囊中，并剥离了它们重要的上下文，这样一来，种族主义的效果反而变得更加强烈：更广泛的搜索开始出现这些冒犯性的关联。换句话说，Google
    图片搜索强化并固化了这条推文所揭露的种族主义本身。


    就在 Google 发型风波发生几个月后，巴西的一个三人研究小组发表了一项详细研究，探讨了 Google 图片搜索中种族主义的另一种表现形式——其恶劣程度如此之高，以至于这项学术研究很快就被《*华盛顿邮报*》重点报道。研究人员收集了
    Google 图片搜索“beautiful woman”（漂亮女人）和“ugly woman”（丑陋女人）的前五十个结果，他们针对数十个不同国家的搜索进行了这项操作，以观察结果如何因地区而异。这产生了超过两千张图片，随后将这些图片输入一个商业人工智能系统，用于估算每个人的年龄、种族和性别（据称准确率达到百分之九十）。以下是他们的发现。

    '
- fmt: '# 排版后的文本


    在研究人员分析的几乎所有国家中，白人女性在“美丽”（`beautiful`）的搜索结果中出现的频率更高，而黑人和棕色人种女性在“丑陋”（`ugly`）的搜索结果中出现的频率更高——即使在尼日利亚、安哥拉和巴西这些黑人和棕色人种占主导地位的国家也是如此。在美国，根据AI的估计，`beautiful`的搜索结果中百分之八十是白人，且年龄大多在19到28岁之间；而`ugly`的搜索结果中白人比例降至百分之六十，黑人比例升至百分之三十，年龄大多在30到50岁之间。这种形式的种族主义和年龄歧视并非由谷歌的算法发明，它源于社会本身——但算法捕捉到了这一点，并将其作为既定事实有害地呈现给世界。值得庆幸的是，谷歌似乎已经找到了在这方面改进其算法的方法，因为现在关于“美丽”的图片搜索产生了更加多样化的个体。


    `Google Photos`是谷歌于2015年推出的一项服务，允许用户存储和分享照片，并使用机器学习自动识别照片内容。它现在拥有超过十亿用户，这些用户每天共同向该平台上传超过十亿张照片。但在其首次发布仅一个月后，谷歌就不得不为一起种族主义事件发表官方道歉，并宣称自己“感到震惊并真诚道歉”——谷歌的首席社会架构师在推特上回应此事时写道：“天哪。……这百分之百不行。”发生了什么？一位黑人软件工程师兼社会活动家在推特上透露，`Google
    Photos`反复将他和女友的照片标记为“大猩猩”（`gorillas`）。谷歌表示，作为临时修复措施，它将完全停止使用`gorilla`这个标签，并将致力于更好的长期解决方案。


    两年半后，`Wired`进行了一项后续调查，以了解谷歌为解决这个令人发指的误标问题做了什么。事实证明，谷歌与其最初的草率变通方案相比并没有取得太大进展：在2018年，`gorilla`、`chimp`、`chimpanzee`和`monkey`在`Google
    Photos`中是被完全禁止的标签。事实上，`Wired`向`Google Photos`提供了一个包含四万张图片、其中有很多动物的数据库，发现该平台在返回所请求的任何动物的照片方面表现都非常出色——除了上述那些名称：当搜索这些词时，`Google
    Photos`显示未找到结果。尽管AI领域大肆宣传，谷歌大脑（`Google Brain`）团队备受赞誉，深度学习带来了被吹捧的突破，但地球上最先进的技术公司之一似乎除了明确移除`gorilla`作为可能的标签之外，想不出办法阻止其算法将黑人标记为大猩猩。


    这里的问题是，即使今天最好的AI算法也无法像人脑那样形成抽象概念或常识——它们只是在海量数据中寻找模式。（你可能会反对说，当我在本书前面讨论深度学习时，我确实说过它能够形成抽象概念，但这更多是指模式中的模式，而不是我们人类习惯的那种拟人化的概念。）如果谷歌的算法是在包含现实世界种族主义（例如黑人被称为大猩猩）的现实世界数据上训练的，那么算法将学习并复制这种相同形式的种族主义。


    让我快速回顾一下到目前为止讨论过的非常公开的谷歌种族主义事件，以强调时间线。2015年5月，`Washington Post`报道了`Google Maps`白宫事件，即美国历史上第一位黑人总统的办公室被标记为现存最具冒犯性的种族歧视词汇。一周后，谷歌推出了`Google
    Photos`，并在一个月内不得不为将黑人图片标记为大猩猩而道歉，`Wall Street Journal`等媒体对此进行了报道。不到一年后，即2016年4月，`Guardian`报道称，谷歌对“不专业的发型”（`unprofessional
    hairstyles`）的图片搜索大多显示的是黑人女性的照片。仅仅几个月后，即2016年8月，`Washington Post`报道了一项研究调查，该调查显示谷歌图片搜索结果将美丽与种族关联起来。哦，我差点忘了：两个月前，即2016年6月，包括`BBC
    News`在内的许多新闻媒体报道称，在谷歌图片中搜索“三个黑人青少年”（`three black teenagers`）主要返回的是警方大头照，而搜索“三个白人青少年”（`three
    white teenagers`）则只显示一群看起来健康快乐的微笑孩子。这些有记录可查的种族主义事件只是让谷歌数据饥渴的机器学习算法对世界照片库进行分类和分享所固有危险的一个样本。


    ## Google Autocomplete


    谷歌的自动补全功能（`Google Autocomplete`）会在用户在谷歌主页的搜索框或谷歌浏览器`Chrome`的地址栏中输入一个或多个单词后，为其推荐热门搜索。它本应是一个简单的效率工具，就像你手机上的自动补全功能，在你发短信时通过建议单词补全来帮你节省时间。但谷歌搜索是一个强大的工具，数十亿人将其作为几乎所有能想到的话题的初始信息来源，因此当谷歌的自动补全将人们引向危险方向时，后果可能相当严重。'
  raw: 'In almost every country the researchers analyzed, white women appeared more
    in the search results for “beautiful,” and Black and Brown women appeared more
    in the results for “ugly”—even in Nigeria, Angola, and Brazil, where Black and
    Brown populations are predominate. In the United States, the results for “beautiful”
    were eighty percent white and mostly in the age range of nineteen to twenty-eight,
    whereas the results for “ugly” dropped to sixty percent white—and rose to thirty
    percent Black—and the ages mostly ranged from thirty to fifty, according to the
    AI estimates. This form of racism and ageism was not invented by Google’s algorithm,
    it originates in society itself—but the algorithm picks up on it and then harmfully
    presents it to the world as an established fact. Thankfully, Google seems to have
    found ways of improving its algorithm in this regard as image searches for beauty
    now yield a much more diverse range of individuals.


    *Google Photos* is a service introduced by Google in 2015 that allows users to
    store and share photos, and it uses machine learning to automatically recognize
    the content of the photos. It now has over one billion users who collectively
    upload more than one billion photos to the platform daily. But just one month
    after its initial launch, Google had to offer an official apology and declared
    itself “appalled and genuinely sorry” for a racist incident—an incident that Google’s
    chief social architect responded^([^(195)](#fn195)) to on Twitter by writing “Holy
    fuck. […] This is 100% not OK.” What had happened? A Black software engineer and
    social activist revealed on Twitter that Google Photos repeatedly tagged pictures
    of himself and his girlfriend as “gorillas.” Google said that as an immediate
    fix it would simply discontinue using the label “gorilla” in any capacity, and
    the company would work on a better longer-term solution.


    Two and a half years later, *Wired* conducted a follow-up investigation^([^(196)](#fn196))
    to see what Google had done to solve this heinous mislabeling problem. It turns
    out Google hadn’t gotten very far from its original slapdash workaround: in 2018,
    “gorilla,” “chimp,” “chimpanzee,” and “monkey” were simply disallowed tags on
    Google Photos. Indeed, *Wired* provided Google Photos with a database of forty
    thousand images well stocked with animals and found the platform performed impressively
    well at returning photos of whatever animals were requested—except for those named
    above: when those words were searched, Google Photos said no results were found.
    For all the hype in AI, the highly lauded team at Google Brain, the heralded breakthroughs
    provided by deep learning, it seems one of the most advanced technology companies
    on the planet couldn’t figure out how to stop its algorithms from tagging Black
    people as gorillas other than by explicitly removing gorilla as a possible tag.


    The problem here is that even the best AI algorithms today don’t form abstract
    conceptualizations or common sense the way a human brain does—they just find patterns
    when hoovering up reams of data. (You might object that when I discussed deep
    learning earlier in this book, I did say that it is able to form abstract conceptualizations,
    but that’s more in the sense of patterns within patterns rather than the kind
    of anthropomorphic conceptualizations us humans are used to.) If Google’s algorithms
    are trained on real-world data that contains real-world racism, such as Black
    people being referred to as gorillas, then the algorithms will learn and reproduce
    this same form of racism.


    Let me quickly recap the very public racist Google incidents discussed so far
    to emphasize the timeline. In May 2015, the *Washington Post* reported the Google
    Maps White House story that the office of the first Black president in the history
    of the United States was labeled with the most offensive racial slur in existence.
    One week later, Google launched Google Photos and within a month had to apologize
    for tagging images of Black people as gorillas, a story covered by the *Wall Street
    Journal*, among others. Less than a year later, in April 2016, the *Guardian*
    reported that Google image searches for unprofessional hairstyles mostly showed
    photos of Black women. Just a few months after that, in August 2016, the *Washington
    Post* covered a research investigation that showed Google image search results
    correlated beauty with race. Oh, I almost forgot: two months earlier, in June
    2016, it was reported in many news outlets, including *BBC News*,^([^(197)](#fn197))
    that doing a Google image search for “three black teenagers” returned mostly police
    mugshots, whereas searching for “three white teenagers” just showed smiling groups
    of wholesome-looking kids. These documented racist incidents are just a sample
    of the dangers inherent in letting Google’s data-hungry machine learning algorithms
    sort and share the world’s library of photographs.


    ## Google Autocomplete


    Google’s autocomplete feature suggests popular searches for users after they type
    in one or more words to the search box on Google’s homepage or to the address
    bar in Google’s web browser Chrome. It is supposed to be a simple efficiency tool,
    like the autocomplete on your phone that helps you save time by suggesting word
    completions while you are texting. But Google searches are a powerful instrument
    that billions of people use as their initial source of information on just about
    every topic imaginable, so the consequences can be quite dire when Google’s autocompletes
    send people in dangerous directions.'
