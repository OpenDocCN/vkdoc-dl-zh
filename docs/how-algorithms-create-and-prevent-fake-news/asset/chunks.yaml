- fmt: '# 排版后的文本


    One week after the release of the enigmatic New Year’s video, Gabon’s military
    attempted a coup—the country’s first since 1964—and explicitly cited the oddness
    of the video as evidence that the president was absent and that the government
    was lying about it. The coup ended up failing, and the government retained control.
    To this day, digital forensics experts are uncertain whether the video is a deepfake,
    though they generally lean toward the conclusion that it is. But many of the signs
    they point to could also be caused by Bongo’s stroke. All we know for sure is
    that in August 2019 Bongo made his first public appearance since the stroke—and
    that deepfake technology, and the shadow of doubt it casts on the veracity of
    videos, nearly led to a military overthrowal of a national government.


    In a striking parallel, something briefer but eerily similar happened in the United
    States just one year later. Friday, October 2, 2020, was one of the strangest
    and most confusing days in recent memory (and for 2020, that’s saying a lot).
    News broke in the morning that President Trump had tested positive for COVID-19,
    and in a matter of hours we found out that he wasn’t just positive, he was symptomatic—and
    then, that his condition was actually quite serious, he was going to be hospitalized.
    All the day’s events were shrouded in a veil of uncertainty and chaos largely
    caused by the lack of frank and transparent communication from the government.
    It was literally just weeks before one of the most important elections in American
    history, yet we did not know the true state of the president’s health, and suspicion
    quickly grew that things were much worse than the officials were telling us.


    Then, at 6:31 p.m. that day, President Trump posted on Twitter an eighteen-second
    video address in which he said that he is heading to Walter Reed, but he reassured
    people that he thinks he is doing very well. The video looked strange. Very strange.
    Immediately there was talk on social media of it being a deepfake.^([^(72)](#fn72))
    This time the deepfake conspiracy faded quickly as more footage of Trump was soon
    seen, culminating most convincingly with a live address a few days later when
    he was released from Water Reed. But for a brief moment, it really was hard to
    know what was going on and what to believe; it did not seem entirely implausible
    for the US government, just one month before the election, to create a deepfake
    to cover up the dire state of the president’s health.


    In March 2021, a military-run TV station in Myanmar broadcast a video recording
    of a detained former regional chief minister providing a public confession. He
    said he bribed Aung San Suu Kyi, the Nobel Peace Prize laureate who in the 2010s
    played a key role in transitioning Myanmar from military rule to partial democracy
    but then was arrested and deposed—along with other members of her ruling political
    party—by the military in a coup on February 1, 2021. In other words, the military
    was presenting the incriminating evidence it needed to help justify its actions.
    But there was immediate outcry that this confession is fake—the voice doesn’t
    sound like his usual one, and the visuals look strange—and many people suspect
    it is a deepfake, but once again, we don’t know for sure.^([^(73)](#fn73))


    Let me turn now to one final example of real-world deepfakes in a political setting—this
    time showing a positive use of the technology. In July 2020, David France, an
    Oscar-nominated activist filmmaker, debuted on HBO a documentary called *Welcome
    to Chechnya* about the anti-LGBTQ purges that took place in Chechnya. He wanted
    to include interviews with survivors of these atrocities, but he knew that for
    their personal safety their identities must be concealed in the film—at the time,
    they were being hunted in their homeland and escaping the region through a network
    of safe houses. He felt the usual documentarian technique of blurring faces produced
    too much of an emotional disconnect between the speaker and the audience, so he
    instead used deepfake technology. The production team filmed individuals outside
    Chechnya, unrelated to the country’s purge, in a studio equipped with an array
    of cameras capturing their faces from many angles; then deep learning algorithms
    were used to blend these faces onto the faces of twenty-three Chechens in the
    film to provide them with new disguised faces—and hence anonymity. As reported^([^(74)](#fn74))
    in the *New York Times*, “In one of the film’s more breathtaking moments, the
    effects drop away after a gay refugee, Maksim Lapunov, reclaims his name—and his
    real face—at a news conference. ‘I wanted you to feel what he felt at that moment,’
    France said.”


    While convincing deepfakes still seem rare in the real world, both their usage
    and their quality have been accelerating swiftly. On March 10, 2021, the FBI issued
    an official alert^([^(75)](#fn75)) boldly stating that “Malicious actors almost
    certainly will leverage synthetic content for cyber and foreign influence operations
    in the next 12-18 months,” and the alert specifies that deepfakes are the main
    form of synthetic content it is referring to here. If we develop tools for determining
    when videos are deepfakes, we could push back against these malicious efforts
    and also apply these tools the next time something like the Ali Bongo New Year’s
    address or Donald Trump Walter Reed clip or Myanmar confession arises. It is time
    now to look at the progress and challenges in developing such tools.'
