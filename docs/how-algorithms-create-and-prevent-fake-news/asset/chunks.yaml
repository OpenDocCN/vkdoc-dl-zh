    nation’s worst outbreaks, and more than 32,000 Floridians have died from the virus,
    an unthinkable cost that the state’s leaders rarely acknowledge.” But others don’t
    seem the least bit sensational: “Two-thirds of participants were given the vaccine,
    with doses spaced four weeks apart, and the rest received a saline placebo.” Let’s
    hope Uber’s self-driving cars are a little more accurate than this text analysis
    tool.


    ### Waterloo’s Stance Detection


    A research team^([^(344)](#fn344)) based at Canada’s Waterloo University broke
    down the fully automated fact-checking process into four steps:


    1.  Retrieve documents relevant to the claim in question.


    2.  Determine the “stance” of each document, meaning whether it supports, rejects,
    or is ambivalent/unrelated to the claim.


    3.  Assign a credibility score to each document based on its source.


    4.  Assign a truthfulness score to the claim by combining the document stances
    weighted by the document credibility scores (and highlight relevant facts/context
    from the documents).


    The first step can be a tricky one, because it is more open-ended than the matching
    step conducted by Full Fact, Logically, and Squash: rather than searching through
    a specific database of fact-checks for a match to the claim, one needs to scour
    the Web for any documents that might have information related to the claim. Google’s
    use of BERT to analyze the text in user search queries is bringing us closer to
    this task, but many challenges still remain. The third step is essentially what
    Google and Facebook already do—through Google’s use of PageRank and human evaluators
    and through Facebook’s NEQ scores, as you saw in Chapters [6](../Text/508514_1_En_6_Chapter.xhtml)
    and [8](../Text/508514_1_En_8_Chapter.xhtml). The fourth step is straightforward
    once the first three are complete, so the Waterloo team decided to focus on the
    second step—stance detection—to see how well that could be automated.


    They used a data set of fifty thousand articles to train a deep learning classification
    algorithm that looks at the body of each article and the headline of the article
    and estimates whether the body agrees with the headline, disagrees with it, discusses
    it without taking a stance, or is unrelated to the headline. Their algorithm scored
    a very respectable ninety percent accuracy, which was considerably higher than
    previous attempts by other researchers. The main insight in their work was to
    start with Facebook’s massive pre-trained deep learning algorithm RoBERTa and
    then do additional focused training to fine-tune the algorithm for the specific
    task at hand. This general process of fine-tuning a massive pre-trained deep learning
    algorithm is called “transfer learning,” and it has been an extremely successful
    method in AI, so it is not at all surprising that this is the right way to go
    when it comes to stance detection—it just wasn’t possible before BERT and RoBERTa
    came out.


    I don’t believe a prototype of this Waterloo stance detection method is publicly
    available yet, and to really be effective we need progress on the document retrieval
    step as well. Nonetheless, it is promising work that may well find itself in user-friendly
    software in the near future.'
  trans: '

    ### Logically


    一家总部位于英国和印度的初创公司`Logically`提供了一套打击假新闻的工具。与`Full Fact`类似，这家公司利用机器学习来辅助人工事实核查员，而非取代他们——或者，正如`Logically`官网诗意地表述，是“补充人类智能，而非取代它”。大致而言，其事实核查服务的工作流程如下：首先，用户提交一篇文章或帖子的链接，`Logically`利用机器学习识别其中的关键主张，这与我们看到的`Full
    Fact`类似，区别在于这里不会对主张进行分类——而是提示用户选择其中一个已识别的主张作为重点。接着，利用机器学习搜索与所选主张相关的证据以及`Logically`之前的事实核查记录。如果找到高度匹配的事实核查结果，则无需人工干预；否则，该主张会被发送给人工事实核查团队，待完整报告完成后返回（并添加到已完成事实核查的数据库中）。


    该公司还提供一项服务，通过结合上一章讨论的三种不同类型的预测因子，利用机器学习算法来“识别任何文本内容的准确性和可信度”：基于内容的特征（直接从文本中提取含义）、基于网络的特征（量化内容在社交媒体上的传播情况），以及基于元数据的特征（考虑诸如内容发布者及其来源等信息）。但除了这个模糊的列表外，并未提供关于这些预测因子或算法本身的任何细节。2020
    年 8 月，`Logically`推出了一款 Chrome 浏览器扩展程序，集成了公司部分服务；2021 年 2 月，宣布与 TikTok 合作，帮助检测该平台上的错误信息。


    ### Squash


    杜克大学旗下的记者实验室（Reporter''s Lab）试验了一项名为`Squash`的实验性自动化事实核查服务。它与`Full Fact`和`Logically`类似，主要步骤是将主张与人工进行的事实核查数据库进行匹配——但这里的重点在于实时口语陈述，因此首先会应用语音转文本算法。其结果是，用户可以在观看现场政治演讲和活动时，自动弹出事实核查气泡，不过该产品仍被认为处于研发阶段。


    ### FakerFact


    优步自动驾驶汽车部门的数据科学主管迈克·塔米尔（Mike Tamir）开发了一款名为`FakerFact`的免费工具，用于分析用户粘贴或提供链接的文本段落。虽然有时被宣传为在线事实核查工具，但该工具的网站明确表示，它“永远不会告诉你一篇文章是真是假”，其职责是“让读者能够识别一篇文章是专注于可信信息分享，还是旨在通过事实以外的手段操纵或影响读者”。这种崇高的描述听起来很有用，但实际上该工具只是一个风格分类器——它使用监督式深度学习，在数百万份文档上进行训练，将每篇文章标记为新闻、百科、讽刺、耸人听闻、观点或议程驱动。它并不试图识别文章中的事实，更不用说验证其准确性了；相反，它寻找与这些不同风格相关的用词模式。该工具的一个优点是，它不会只给出一个预测的风格标签，而是输出多个风格标签，每个标签都附有置信度评分。另一个优点是，它通常会高亮显示文本段落中对算法选择标签影响最大的特定句子。


    然而，在我教授一个学期的数据科学课程时，我让学生们用`FakerFact`做实验，我们发现结果非常不可靠——而且常常令人捧腹。一名学生指出，美国宪法被标记为“观点”和“讽刺”。当我粘贴本书第一章时，`FakerFact`显示“这个听起来很傻”，并同样将其判定为“观点”和“讽刺”。就在刚才，我把《纽约时报》的第一个链接（一篇关于新冠疫苗试验的文章）输入`FakerFact`，它被标记为“耸人听闻”。奇怪的是，一些被高亮显示为对判断有影响的段落确实有道理：“包括迈阿密海滩在内的迈阿密-戴德县最近经历了全美最严重的疫情爆发之一，超过
    3.2 万佛罗里达人死于该病毒，这是该州领导人极少承认的难以想象的代价。”但其他段落似乎一点也不耸人听闻：“三分之二的参与者接种了疫苗，剂量间隔四周，其余参与者接种了生理盐水安慰剂。”但愿优步的自动驾驶汽车能比这个文本分析工具准确一些。


    ### 滑铁卢大学的立场检测


    加拿大滑铁卢大学的一个研究团队将全自动化事实核查流程分解为四个步骤：


    1.  检索与待核查主张相关的文档。

    2.  确定每份文档的“立场”，即它是支持、反对该主张，还是持中立/无关态度。

    3.  根据文档来源为其分配可信度评分。

    4.  结合文档立场（以文档可信度评分为权重）为该主张分配真实性评分（并高亮显示文档中的相关事实/背景信息）。


    第一步可能比较棘手，因为它比`Full Fact`、`Logically`和`Squash`进行的匹配步骤更具开放性：不是在一个特定的事实核查数据库中搜索与主张匹配的内容，而是需要搜索整个网络，寻找可能包含与主张相关信息的文档。谷歌使用`BERT`分析用户搜索查询中的文本，让我们离这个目标更近了一步，但仍有许多挑战。第三步本质上就是谷歌和
    Facebook 已经在做的事情——通过谷歌的`PageRank`和人工评估员，以及 Facebook 的`NEQ`评分，正如你在第 6 章和第 8 章中看到的。一旦前三步完成，第四步就很简单了，因此滑铁卢团队决定专注于第二步——立场检测——看看这一步骤的自动化程度能有多高。


    他们使用了一个包含五万篇文章的数据集来训练一个深度学习分类算法，该算法会查看每篇文章的正文和标题，并估算正文是赞同标题、反对标题、讨论标题但不表明立场，还是与标题无关。他们的算法取得了相当可观的
    90%准确率，远高于其他研究人员之前的尝试。他们工作的主要洞见在于，从 Facebook 庞大的预训练深度学习算法`RoBERTa`开始，然后进行额外的针对性训练，以微调算法使其适用于当前特定任务。这种微调大规模预训练深度学习算法的通用过程被称为“迁移学习”，并且是人工智能领域极为成功的方法，因此这无疑是处理立场检测问题的正确途径——只是在`BERT`和`RoBERTa`出现之前，这还无法实现。


    我认为滑铁卢大学这种立场检测方法的原型目前尚未公开可用，而且为了真正有效，我们还需要在文档检索步骤上取得进展。尽管如此，这是一项前景广阔的工作，很可能在不久的将来被整合到用户友好的软件中。

