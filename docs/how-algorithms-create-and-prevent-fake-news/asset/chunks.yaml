    # 分析这八千个视频时


    在分析这八千个视频时，《卫报》记者表示，他们“对推荐内容中极端和阴谋论视频的数量之多感到震惊，而且几乎所有这类视频似乎都针对克林顿。”一些推荐视频并不出人意料——演讲片段、辩论、新闻，甚至《周六夜现场》的小品——但他们经常发现，当用户观看这些更主流的政治视频时，算法推荐中会出现反克林顿的阴谋论视频。这些反克林顿的阴谋论从质疑她的健康状况和精神状态，到“指控克林顿参与谋杀，或将她与撒旦教和恋童癖团体联系起来”。记者们手动查看了查斯洛特数据库中八千个视频里最常被推荐的一千个，发现“略超三分之一的视频要么与选举无关，要么内容大体中立或公正。在剩下的
    643 个视频中，551 个支持特朗普，只有 92 个支持克林顿的竞选活动。”


    查斯洛特的数据显示，推荐算法对亚历克斯·琼斯的《信息战》频道尤为有利，YouTube 最终在 2018 年将其移除并封禁——大约在 Facebook 首次采取此行动一周后。当
    YouTube 关闭该频道时，它已积累了 250 万订阅者，并在三万六千个视频中获得了 15 亿次页面浏览量。另一个被推荐算法大力推送的频道是加里·弗兰奇运营的《下一个新闻网络》，据《卫报》报道，该频道“表面上看起来像一个可信的新闻频道。但在这层表象背后，是一个可疑的运营机构，它回收来自极右翼出版物、假新闻网站和俄罗斯媒体机构的故事。”查斯洛特的研究表明，这个频道的受欢迎程度很大程度上可能来自
    YouTube 的推荐算法；YouTube 对此断然否认。《卫报》记者联系弗兰奇，想弄清这场争论中谁是正确的，弗兰奇发回了 YouTube 向其内容创作者提供的关于视频流量来源的官方私密数据截图。弗兰奇一个更受欢迎的视频是关于比尔·克林顿强奸一名
    13 岁女孩的假新闻故事，获得了 250 万次观看；弗兰奇的数据截图显示，该视频最大的流量来源是 YouTube 推荐。事实上，在弗兰奇截图中的所有视频里，除了一个之外，YouTube
    推荐都是其主要流量来源。


    虽然弗兰奇是一个（某种意义上的）全职投入其频道的专业人士，但《卫报》发现，即使是那些视频通常只有几百次观看的“业余侦探”和“兼职阴谋论者”，也“震惊于他们的反克林顿视频开始获得数百万次观看，仿佛被一股无形的力量推动着。”而在几乎每个案例中，YouTube
    的流量数据都揭示出这股无形的力量就是推荐算法。在一个案例中，YouTube 曾给一位内容创作者发邮件，称其反克林顿的虚假阴谋论视频违反了平台准则——然而，在这封邮件之后，来自推荐算法的流量仍持续涌入该视频，最终在选举前获得了超过两百万次观看。


    ## 追踪评论者


    2019 年，来自巴西一家研究机构和瑞士一家研究机构的学者团队进行了一项不同类型的研究^(¹²⁷)，探究 YouTube 如何可能将人们引向极右翼。该团队手动将近
    350 个 YouTube 频道上的超过 30 万个视频，分类到由反诽谤联盟设计的一个包含四个类别的系统中，该系统提供了一个极端主义光谱。从最不极端到最极端，这些类别分别是：媒体（传统事实新闻）、知识暗网（IDW，一个公开讨论优生学和“种族科学”等争议话题的社群）、另类轻右翼（声称否认白人至上主义，但相信关于少数群体“取代”的阴谋论），以及另类右翼（白人至上主义运动中的一个松散部分，由拒绝主流保守主义、转而支持拥抱种族主义、反犹太主义和白人至上主义意识形态的政治，并推动建立白人种族国家的个人组成）。


    通过追踪这些视频上超过 7200 万条评论的作者，他们发现“用户持续从较温和的内容迁移到更极端的内容”，并且“在某一年消费另类轻右翼或 IDW 内容的用户，在接下来一年中会成为另类右翼用户群的重要组成部分。”该团队还调查了推荐算法，并发现了可能通往另类右翼激进化路径，但这些路径相当微弱（“从另类轻右翼出发，我们跟随推荐系统
    5 次，大约每 25 次中会有 1 次发现一个另类右翼频道”）。


    需要指出的是，追踪评论活动只能提供一个有限且可能失真的 YouTube 观众情况窗口，因为绝大多数观众并不评论（而且不能假定评论者能代表全体观众），同时许多评论来自反驳视频主张、与支持者辩论或仅仅是挑衅的观众。该研究项目并未考虑评论的内容。此外，评论者每年在
    YouTube 上流向更极端内容的事实，并不能保证 YouTube 是这种右倾迁移的原因；很可能是一些外部力量将观众推向这个方向，而 YouTube 仅仅是反映了这股力量。尽管如此，追踪评论者是一种收集经验证据的有趣方式，与之前讨论的随机漫步方法截然不同——而且这项评论者研究似乎指向了与那些随机漫步研究相同的大方向。


    针对这项巴西-瑞士联合调查，YouTube 表示^(¹²⁸)“我们强烈不同意这项新研究中使用的方法论、数据，最重要的是其得出的结论。”巧合的是，当《卫报》记者就基于查斯洛特数据库的调查结果向
    YouTube 寻求回应时，YouTube 回应称，它非常尊重该报及其记者，但“然而，我们强烈不同意他们研究中使用的方法论、数据，最重要的是其得出的结论。”我们至少可以称赞
    YouTube 在这一点上的一致性。


    ## 矛盾的结果


    另一项关于推荐算法的实证研究^(¹²⁹)于 2019 年进行，与皮尤的随机漫步调查类似，发现 YouTube 的推荐算法起到了与激进化相反的作用——它“主动阻止观众访问激进或极端主义内容。相反，该算法被证明更倾向于主流媒体和有线电视新闻内容，而非独立的
    YouTube 频道。”作者莱德维奇和扎伊采夫甚至断言，“我们认为可以公平地说，大部分观看量都指向了左倾的主流内容。”


    这在社交媒体上引起了不小的轰动，并引发了其结论被直接推翻的巴西-瑞士团队的详细回应^(¹³⁰)。巴西-瑞士团队在逐点反驳的开头提出了如下精炼的指责：“对社交媒体数据进行大规模测量和分析是困难的。作者（莱德维奇和扎伊采夫）误解了他们的数据源，最终测量到的与他们自以为测量的东西不同，并基于其结果提出了毫无根据的主张。”莱德维奇和扎伊采夫随后又反驳了^(¹³¹)这一反驳。很难判断这场争论的实质；双方似乎都提出了合理的观点，却得出了截然相反的结论。

