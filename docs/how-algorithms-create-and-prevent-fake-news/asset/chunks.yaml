    ### 算法使用的信号


    决定谷歌搜索结果页面排名高低的因素有哪些？谷歌再次对其算法商业机密讳莫如深——部分是为了防止竞争对手抄袭，也为了防止人们操纵算法——因此我们只知道最粗略的轮廓。官方公司网站描述搜索算法^(²¹⁷)时写道：“搜索算法会考虑许多因素，包括查询词、页面的相关性和可用性、来源的专业性，以及你的位置和设置。每个因素的权重会根据查询性质而变化——例如，在回答当前新闻话题的查询时，内容的新鲜度比回答词典定义时发挥的作用更大。”这些因素主要在于寻找与搜索查询匹配度高的链接。在结果排序方面，谷歌表示算法试图通过考虑“有助于判断哪些页面在特定主题上展现出专业性、权威性和可信度”的因素，来“优先呈现最可靠的可用来源”。这听起来不错，但相当模糊。谷歌给出的两个例子是：如果一个网站被其他知名网站链接（这是谷歌
    1998 年首次推出时原始`PageRank`算法的核心），或者许多用户在搜索密切相关的内容后访问该网站，那么该网站的排名就会提升。


    在算法发展的早期阶段，`PageRank`方法扮演了更突出的角色，而通过其他方式评估信息质量则较少受到关注。不法分子学会了如何利用这种对链接计数的狭隘关注来操纵排名。2016
    年 12 月，有报道^(²¹⁸)称，假新闻和右翼极端主义网站“建立了一个庞大的相互链接以及链接到主流网站的链接网络，使他们能够操纵谷歌的算法。”这导致了有害的偏见和虚假信息——例如，搜索“希特勒是坏人吗？”时，排名前十的结果中有八个是否认大屠杀的网站。


    几个月后，在 2017 年 4 月，谷歌承认^(²¹⁹)假新闻已经成为一个严重问题：“今天，在一个每分钟都有成千上万页面在线的世界里，人们有了操纵系统的新方法。其中最引人注目的问题就是‘假新闻’现象，网络上的内容助长了公然误导、低质量、冒犯性或彻头彻尾虚假信息的传播。”谷歌当时实施的一项变革是，为其用于提供搜索算法反馈的人工评估团队提供关于“误导性信息、意外冒犯性结果、恶作剧和未经证实的阴谋论”的更详细指导：“这些指导方针将开始帮助我们的算法降低此类低质量内容的排名，并帮助我们随着时间的推移进行更多改进。”我将在本节末尾回到这些人工审核员及其在塑造谷歌搜索算法中所扮演的角色。谷歌还表示，算法中使用的信号已经过调整，以“帮助呈现更权威的页面并降低低质量内容的排名”，但没有提供细节。


    一年后，作为“提升优质新闻”多管齐下努力的一部分（包括一项三亿美元的外展计划^(²²⁰)），谷歌再次调整了算法。这一次，它透露了在此次调整中哪些信号被优先考虑以及原因，至少是大致方向：^(²²¹)“为了在危机或突发新闻事件期间减少[有害错误信息]的可见性，我们改进了系统，更加强调权威结果，而不是新鲜度或相关性等因素。”


    ### 精选摘要


    2014 年，谷歌推出了一项名为*精选摘要*的工具：在某些搜索的结果页面顶部放置一个文本框，其中包含来自排名靠前链接的突出显示段落，算法认为该段落与搜索相关。并非所有搜索都会包含这些内容，只有谷歌认为用户正在询问特定信息，并且它可以在网络上尝试找到这些信息时才会显示。精选摘要帮助人们快速从互联网提取信息，因为你无需选择链接、点击它，然后在网站某处找到相关段落，就能直接从谷歌搜索中获得问题的答案；它们对于移动设备上的语音搜索和谷歌的
    Home Assistant 也很有用，因为用户可以口头提问，然后设备通过朗读相应谷歌搜索产生的精选摘要来口头回答。


    但是，如果谷歌搜索出现假新闻，那么谷歌在精选摘要中提供的答案可能就是错误的。而且精选摘要的格式剥离了答案的任何上下文，并以一种听起来权威的方式呈现，使得读者/听众比在典型的谷歌搜索中更难以意识到信息来源可能有多么不可靠。果然，精选摘要最终因对各种各样的问题提供了灾难性的错误信息而登上头条。


    事实上，在 2017 年 3 月，人们发现^(²²²)，询问谷歌哪些美国总统是三 K 党成员，结果得到的摘要错误地声称有几位是；询问“奥巴马在策划政变吗？”得到的摘要说“根据西方新闻中心独家视频揭露的细节，奥巴马不仅可能与中国共产党勾结，而且奥巴马实际上可能正在策划在他
    2016 年任期结束时发动一场共产主义政变！”；搜索一项名为“63 号提案”的枪支管制措施，得到的摘要错误地将其描述为“一项欺骗性的投票倡议，将使数百万守法的加州人犯罪化。”在奥巴马政变摘要的案例中，排名第一的搜索结果是一篇揭穿这场即将发生的政变假新闻故事的文章，但使用谷歌
    Home Assistant 时，不会列出搜索结果——用户只能听到朗读出来的精选摘要。


    一年后，在一篇描述摘要工具如何随时间改进的博文^(²²³)中，该公司表示：“去年，我们因精选摘要说了诸如……奥巴马在策划政变之类的话而受到了应有的批评。在这些案例中，我们失败了，因为对于这些罕见且边缘的查询，我们没有足够重视结果的权威性。”虽然这种说法表面上正确，但它巧妙地掩盖了一个事实，即*衡量*权威性是*权衡*权威性的先决条件，而这是一个充满挑战且棘手的问题——我将在本节末尾再次讨论。通过提升优质来源来减少错误信息，远非像谷歌在此评论中暗示的那样，只需调整一个标有“权威性”的杠杆那么简单。

    '
- fmt: '### Blocking Search Results


    Some fake news publishers scrape articles from the Web and repost them as their
    own in an effort to give the stories a wider platform and to collect ad revenue
    in the process. While most fake news on the Web doesn’t violate any Google policies
    that would prevent it from being eligible to show up on search results, if an
    article is found to be in violation of copyright, then Google will expunge it
    from search listings—so these spammy fake news sites indeed get delisted.


    But an extensive *Wall Street Journal* investigation^([^(224)](#fn224)) found
    an unsettling twist here: people have been gaming Google’s copyright infringement
    request system in order to delist content that is unflattering or financially
    impactful to certain parties. One of the techniques used is *backdating*: someone
    copies a published article and posts it on their blog but with a misleading time
    stamp to make it appear that it predates the published article; then they tell
    Google that the published article is violating their blog’s copyright, and the
    published article is removed from Google search results. When this happens, Google
    is delisting an actual news article on the basis of a false copyright infringement
    notification. Daphne Keller, a former Google lawyer and currently a program director
    at Stanford University’s Cyber Policy Center, said that “If people can manipulate
    the gatekeepers to make important and lawful information disappear, that’s a big
    deal.” The *Wall Street Journal* found that not only can people indeed do this,
    but they have been doing so in surprisingly large numbers.


    Google received copyright removal requests for fewer than one hundred thousand
    links between 2002 and 2012, whereas it now routinely handles more than a million
    requests in a single day. In order to scale up to this magnitude, a company spokesperson
    said that Google has automated much of the process so that human review is mostly
    not needed. In 2019, eighty percent of the nearly one-quarter billion links flagged
    for copyright infringement were removed from Google’s search listings. However,
    after the *Wall Street Journal* uncovered numerous cases of fraudulent violation
    notifications, Google restored more than fifty thousand links that had been removed.


    One of the clusters of fraudulent requests the *Wall Street Journal* found concerned
    Russian-language news articles critical of politicians and business leaders in
    Ukraine. These articles were taken off Google after various organizations including
    a Russian edition of *Newsweek* filed a copyright violation request—but it turned
    out these organizations were all fake, the supposed Russian *Newsweek* had nothing
    to do with *Newsweek*, it was just using *Newsweek*’s logo to deceive Google into
    thinking the copyright violation notification was legitimate.


    There is a secondary harm to these deceptive methods for tricking Google into
    delisting real news articles: in Google’s recent efforts to elevate quality journalism,
    one factor the ranking algorithm considers is the number of copyright violations
    sites have received. A Google spokesperson said that “If a website receives a
    large number of valid takedown notices, the site might appear lower overall in
    search results.” But the *Wall Street Journal* investigation established that
    many of the takedowns that Google thinks are valid are actually invalid and the
    result of deliberate disinformation aimed at Google’s automated system. This opens
    the door for more gaming of Google’s rankings by dishonest actors.


    ### BERT


    A humorous cultural trend emerging in the AI community over the past few years
    has been to make as many *Sesame Street* allusions as possible when naming deep
    learning text processing algorithms. You saw *Grover* in Chapter [2](../Text/508514_1_En_2_Chapter.xhtml),
    the system developed by the Allen Institute for AI to generate text like GPT-2
    with the ultimate goal of being able to detect such deep learning generated text.
    Currently, the two most impressive and powerful deep learning systems for text
    are GPT-3, which was discussed extensively in Chapter [2](../Text/508514_1_En_2_Chapter.xhtml),
    and a system developed by Google called *BERT* (which stands for *Bidirectional
    Encoder Representations from Transformers*, but don’t worry about that just yet).
    BERT builds on an earlier system developed by the Allen Institute for AI named
    *ELMo* (standing for *Embeddings from Language Models*). Alas, there is not yet
    an Ernie or a Snuffleupagus.


    While text generation is immensely useful, it turns out that for many applications
    one needs something that is essentially a by-product of the inner workings of
    a deep neural net that occurs automatically while training for tasks like text
    generation: a *vector representation* of words (sometimes called a *word embedding*).
    This means a way of representing each word as a vector—that is, a list of numerical
    coordinates—in such a way that the geometry of the distribution of word vectors
    reflects important semantic and syntactic information. Roughly speaking, we want
    words that frequently appear in close proximity to each other in written text
    to have vector representations that are geometrically in close proximity to each
    other. Vector embeddings translate data in messy formats like text into the standard
    numerical formats that machine learning algorithms know and love.


    Earlier word embeddings (one of the most popular, called *Word2vec*, was developed
    by Google in 2013) produced a fixed, static vector for each word. This opened
    the door to many breakthroughs: for example, analyzing the sentiment of words
    and sentences (how positive or negative they are) turns into a more familiar geometric
    analysis of vectors in Euclidean space, where, for instance, one looks for a plane
    that separates positive word vectors from negative word vectors. One of the key
    drawbacks in these early static approaches was that a single word can have multiple
    meanings (such as “stick” a landing, “stick” from a tree, and “stick” to a plan),
    and all the different meanings got conflated when the word was represented as
    a vector. In contrast, ELMo and BERT are *contextual* word embeddings, which means
    the vector representations are not fixed and static—they depend on the surrounding
    text. If you feed these systems the sentence “I hope the gymnast sticks the landing”
    and the sentence “the toddler sticks out her tongue,” the word “sticks” will have
    different vector representations in each case. This allows for much more flexibility
    in language modeling and understanding.'
