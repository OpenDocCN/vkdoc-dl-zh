    race requiring constant vigilance.


    Deep learning also powers impressive language generation software, such as the
    state-of-the-art GPT-3—a massive system for autocompleting text that can convincingly
    extend headlines into full-length articles. Here, minor instances of illicit use
    have been uncovered, but a large-scale weaponized use in a disinformation campaign
    has not yet surfaced. It remains to be seen whether that’s because the developers
    of GPT-3 have kept access to the product closely guarded, or if it’s simply because
    fake news is so easy and fast to write by hand that the automation provided by
    GPT-3 doesn’t really change the equation. Only time will tell.


    Meanwhile, similar to the situation with deepfake photos, researchers are developing
    tools for determining when passages of text have been generated by AI. The leading
    attempts here rely on the idea that in order to detect synthetic text, an algorithm
    first needs to learn how to create it. A big challenge is that, unlike its predecessor,
    GPT-3 is not open source: this makes it hard for researchers to build detection
    algorithms that are on par with GPT-3 itself. Once again, this is a technological
    arms race—but with the added challenge that training a state-of-the-art language
    generation algorithm costs many millions of dollars.


    Throughout this chapter, the term “deepfake” referred to a synthetic *photo*.
    In the next chapter, we’ll animate these still photos and let them come to life
    by exploring deepfake *movies* and the fascinating role they play in the world
    of fake news.


