- fmt: '### Racism in Google Advertising


    One of the first scholars to recognize and carefully investigate the harmful impact
    algorithms can have on society is Harvard professor Latanya Sweeney. In a 2013
    research paper,^([^(246)](#fn246)) she studied how Google ads for arrest records
    were appearing more frequently when users searched for names typically associated
    with Black people than with white people. In fact, she found that Googling her
    own name, “Latanya Sweeney,” resulted in a Google search ad from a company called
    *Instant Checkmate* suggesting that she had an arrest record (which she did not),
    while searching for several more stereotypically white names yielded no such ads.


    In the conclusion of the paper, Sweeney ponders the causes of this unseemly algorithmic
    advertising behavior: “Why is this discrimination occurring? Is this Instant Checkmate,
    Google, or society’s fault? Answering […] requires further information about the
    inner workings of Google AdSense.” She goes on to explain that Google allows advertisers
    to provide multiple different ads for the same keyword search, and Google displays
    these in a probabilistic manner: initially, they are given equal odds of appearing
    on the search, but as people click the different versions at different rates,
    Google’s algorithm updates the probabilities so that the more popular ones are
    then shown more frequently. Instant Checkmate said that the different messages
    in its ads were grouped by last name, not first name, so the fact that its arrest
    records ads were appearing more frequently for typically Black names than white
    means that people were clicking the arrest record ads for Black first names more
    often than for white first names. Thus, the racism here originated with society
    at large—but it was enabled and reinforced by Google’s algorithm.


    More recently, a July 2020 investigation^([^(247)](#fn247)) by two investigative
    reporters for the technology-oriented news site the *Markup* looked into Google’s
    *Keyword Planner*, which suggests terms for advertisers to associate with their
    ads so that the ads show up on relevant Google searches. They found that the majority
    of the keywords suggested for the phrases “Black girls,” “Latina girls,” and “Asian
    girls” were pornographic, and so were the suggestions for boys of these ethnicities,
    whereas for “white girls” and “white boys,” no keywords were returned at all.
    The investigators insightfully summarized the situation as follows: “Google’s
    systems contained a racial bias that equated people of color with objectified
    sexualization while exempting White people from any associations whatsoever. […]
    By not offering a significant number of non-pornographic suggestions, this system
    made it more difficult for marketers attempting to reach young Black, Latinx,
    and Asian people with products and services relating to other aspects of their
    lives.”


    An even more recent investigation by the *Markup* uncovered racist aspects of
    Google’s placement of ads on YouTube (which, as you recall, is owned by Google).
    In June 2020, just weeks after the police murder of George Floyd, the CEO of YouTube
    wrote^([^(248)](#fn248)) that “We’re committed to doing better as a platform to
    center and amplify Black voices and perspectives. […] At YouTube, we believe Black
    lives matter and we all need to do more to dismantle systemic racism.” But ten
    months later, in April 2021, the *Markup* found^([^(249)](#fn249)) that Google
    was blocking “Black Lives Matter” as a search phrase for advertisers to find videos
    and channels to place ads on. This makes it harder for people in the movement
    to monetize their videos, thereby denying them a valuable revenue source, and
    it also prevents people who want to place ads supporting the movement from being
    able to reach an appropriate audience.


    When a potential advertiser did a search on the Google Ads platform for the phrase
    “White Lives Matter” (which the Southern Poverty Law Center describes as a “racist
    response to the civil rights movements Black Lives Matter”), over thirty million
    YouTube videos were returned as possible places to place an ad; in contrast, searching
    “Black Lives Matter” returned zero videos. Over one hundred million videos were
    returned for the search “White Power,” whereas zero videos were returned for “Black
    Power.” After the *Markup* journalists contacted Google with these findings, Google
    blocked phrases associated with white supremacy like “White Lives Matter” and
    “White Power” from the ad search, but it did not unblock the corresponding Black
    phrases—even though it is widely considered that the white phrases are part of
    hate movements, while the Black phrases are part of legitimate social justice
    and antiracist movements. Strangely, the *Markup* found that Google even started
    to block more search phrases like “Black in Tech” and “antiracism.” The only conceivable
    excuse I can imagine for blocking phrases like these and “Black Lives Matter”
    is that, as the *Markup* reporters point out, it does make it harder for critics
    to monetize their anti-BLM videos—but to me at least, that doesn’t justify the
    unequal treatment caused by these rather surreptitious algorithmic adjustments.


    And back in September 2017, a *BuzzFeed News* investigation^([^(250)](#fn250))
    found that when advertisers tried to target audiences with certain bigoted phrases,
    Google not only allowed it but automatically suggested further offensive search
    phrases the advertiser should consider using. For instance, when the advertiser
    used “Why do Jews ruin everything” as the search phrase for targeting an ad, Google
    suggested also using “the evil Jew” and “Jewish control of banks.” These suggestions
    did not come from the minds of humans at Google—they were based on statistical
    associations that Google’s data-hungry algorithms absorbed from the massive amounts
    of search data that the company collects. *BuzzFeed* tested the system by placing
    an ad with these targeted search phrases, and indeed the ad went live and came
    up when someone searched Google for any of these phrases.


    ### Facebook Ads and Racism


    Facebook allows advertisers to pick from among a vast list of categories to target.
    For example, if you are selling pet products, you can likely find a “dog lovers”
    category and pay for a *promoted post*, which means your ad will be placed on
    the newsfeeds of users in this category. In traditional media advertising, the
    different target audiences an advertiser can aim for are organized manually and
    are rather broad—with Facebook, the ad categories are created and curated algorithmically,
    allowing advertisers to really focus their campaigns on niche target audiences.
    Facebook’s algorithm that creates the list of possible ad categories and decides
    which users are in which ones relies, unsurprisingly, on sophisticated machine
    learning—but, also unsurprisingly, the details are veiled in corporate secrecy,
    so we only know the broad outlines.


    The algorithm considers content users have explicitly written in their Facebook
    profiles (for instance, if you list dogs in the *interests* field, then you’ll
    probably get tagged in the dog lovers category), but it also harvests your interests
    from more implicit information in your online activity, such as your posts (if
    you share an article about best dog breeds, the algorithm will probably figure
    out that you are a dog lover), the posts by other users that you like or comment
    on, who you follow and who is in your friend network, etc. The key to remember
    here is that Facebook isn’t just deciding which advertising groups its nearly
    three billion users belong in—it is also algorithmically creating and naming these
    groups. And that’s where the problems with bigotry start to arise.'
