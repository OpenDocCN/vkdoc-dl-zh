    # 9. 真相的工具


    面向记者与公众的事实核查资源


    > *谎言疾驰，真相蹒跚其后，待到人们醒悟时，为时已晚；玩笑已过，故事已生效。*

    >

    > ——乔纳森·斯威夫特，1710 年


    本章首先讨论一系列由机器学习驱动的、公开可用（且大多免费）的事实核查工具；这旨在帮助你了解有哪些类型的工具可用，并深入了解它们的工作原理。最后，本章将简要探讨事实核查在谷歌、YouTube、脸书和推特等平台上的角色与范围。


    ## 在线工具


    在本节中，我将介绍一些能够以不同方式辅助事实核查、并在不同程度上涉及机器学习算法的在线工具。这仅仅是现有工具中的一小部分样本，还有一些未在此讨论的有用产品，它们巧妙地将多种方法整合到一个用户友好的工具中。我在此的主要目标并非提供一份详尽的软件包清单——因为这样的清单很快就会过时。相反，目标是说明机器学习如何被应用于事实核查流程，并帮助你理解自动化与半自动化事实核查背后的实际运作机制。


    ### Full Fact


    总部位于伦敦的慈善组织 *Full Fact* ^(³³⁸) 提供一系列免费的事实核查服务，包括对已核查话题的关键词搜索。虽然驱动这些事实核查的分析工作由人类专家完成，但机器学习以多种方式辅助这些专家，为他们提供工具，使工作更快速、更轻松。文本段落——通常来自文章、政治演讲、社交媒体帖子等——首先被分解为单个句子，然后使用谷歌的
    `BERT`（在第 6 章中讨论过）以具有上下文意义的方式对每个句子中的单词进行数值编码。这种数值编码支持对每个句子中的“主张”进行算法检测和分类：像“GDP
    增长了 5%”这样的陈述被视为定量主张，而“这项经济政策导致碳排放减少”则是因果主张，“经济将增长 5%”则是预测性主张。这使得人类事实核查员能够快速浏览每份文档，迅速定位需要核查的主张及其类型。


    `BERT` 编码还被用于估算每个识别出的主张是否与已核查主张档案中的某条匹配。毫不意外，大多数主张并非只出现一次，它们会以多种形式和在不同位置出现，因此，对每个主张的实质内容进行一次核查，而不是核查其每一次出现和细微变体，能节省大量时间。机器学习还用于根据当前事件和其他因素，识别每天最迫切需要核查的主张。这种让机器学习辅助而非取代人类审核员的混合方法非常明智；正如你可能从上一章中回忆起的，这与脸书的内容审核方法在精神上相似。`Full
    Fact` 在其网页上直接声明：“人类不会很快消失——我们也不希望他们消失。”

