- fmt: '# Fake Business Listings on Google Maps


    Fake business is evidently big business on Google Maps: the site removed over
    three million false business listings in 2018. That figure comes from a company
    blog post written by the director of Google Maps titled “How we fight fake business
    profiles on Google Maps.” This blog post was published on June 20, 2019—the same
    exact date as the *Wall Street Journal* piece. It does not take a great stretch
    of the imagination to see this conspicuously timed blog post as a strategic effort
    to reduce the backlash that would surely follow the publication of the *Wall Street
    Journal* investigation. This post includes some other staggering figures, including
    that Google Maps has over two hundred million places and that “every month we
    connect people to businesses more than nine billion times, including more than
    one billion phone calls and three billion requests for directions.”


    The Google Maps blog post gives some examples of how people capitalize on fake
    business listings: “They do things like charge business owners for services that
    are actually free, defraud customers by posing as real businesses, and impersonate
    real businesses to secure leads and then sell them.” (We know from the *Wall Street
    Journal* that there are more problems than just these.) The post also points out
    that as people find deceptive ways of gaming the system, Google is “continually
    working on new and better ways to fight these scams using a variety of ever-evolving
    manual and automated systems,” but that as it does this the nefarious users find
    new deceptive methods and “the cycle continues.”


    These automated systems—algorithmic moderation, in other words—are closely held
    corporate secrets because revealing details about them would “actually help scammers
    find new ways to beat our systems.” All the blog post really reveals is that (1)
    of the three million fake listings taken down in 2018, over ninety percent were
    removed by the internal systems before a user saw them, whereas the remaining
    ones were reported by users on the platform, and (2) more than one hundred fifty
    thousand accounts were disabled in 2018, a fifty percent increase over the previous
    year.


    Perhaps the secretiveness of that blog post did not sit well with some, as just
    eight months later a new blog post was published—still by the director of Google
    Maps, but with a different individual occupying this position—that, while still
    circumspect, went into more detail about the algorithmic moderation the site uses.
    This post said that Google Maps uses “automated detection systems, including machine
    learning models, that scan the millions of contributions we receive each day to
    detect and remove policy-violating content,” and that for fake reviews specifically
    these machine learning models “watch out for specific words and phrases, examine
    patterns in the types of content an account has contributed in the past, and can
    detect suspicious review patterns.” Still understandably vague, but I’ll turn
    to the more general topic of machine learning for social media moderation in Chapter
    8, so you’ll hopefully get a sense of the methods Google Maps is alluding to here—as
    well as the challenges these methods face.


    This second blog post goes on to explain that these automated systems are “not
    perfect,” so Google also relies on “teams of trained operators and analysts who
    audit reviews, photos, business profiles and other types of content both individually
    and in bulk.” The post also provides some interesting updated figures on content
    moderation: in 2019, Google Maps (1) removed more than seventy-five million policy-violating
    reviews and four million fake business profiles “thanks to refinements in our
    machine learning models and automated detection systems which are getting better
    at blocking policy-violating content and detecting anomalies for our operators
    to review”; (2) took down over half a million reviews and a quarter million business
    profiles that were reported by users; (3) removed ten million photos; (4) disabled
    almost half a million user accounts.


    ## Google Images


    In April 2016, an MBA student posted on Twitter a disturbing discovery: doing
    a Google image search for “unprofessional hairstyles for work” returned almost
    entirely pictures of Black women, many with natural hair, while “professional
    hairstyles for work” returned almost entirely white women. Why was Google’s image
    search algorithm so overtly racist? It’s a complicated question, but the two main
    ingredients to the answer are that the algorithm naively absorbs information out
    of context and that it naively reflects overt racism permeating society.


    Some of the images of Black women that came up on this particular search were
    from blog posts and Pinterest boards by Black women discussing racist attitudes
    about hair in the workplace. For instance, one top image was from a post criticizing
    a university’s ban on dreadlocks and cornrows; the post illustrated the banned
    hairstyles by showing pictures of Black women with them and lamented how these
    hairstyles were deemed unprofessional by the university. The ban was clearly racist,
    whereas the post calling attention to it was the opposite, it was antiracist.
    The Google image search conflated these two contrasting aspects and stripped the
    hairstyle image of its context, simply associating the image with the word “unprofessional.”
    In doing so, it turned an antiracist image into a racist one. In this inadvertent
    manner, racism on one college campus was algorithmically amplified and transformed
    into racist information that was broadcast on a massive scale: anyone innocently
    looking on Google for tips on how to look professional would be fed the horrendous
    suggestion that being Black is simply unprofessional.


    There soon came to be a data feedback loop here. The MBA student’s tweet went
    viral, which was largely a good thing because it helped raise awareness of Google’s
    algorithmic racism. But this virality caused Google searches on hairstyles to
    point to this tweet itself and the many discussions about—all of which were calling
    attention to Google’s racism by showing how Black women were labeled “unprofessional”
    while white women were labeled “professional.” Once again, Google vacuumed up
    these images with these labels and stripped them of their important context, and
    in doing so the racist effect actually became stronger: a broader array of searches
    began turning up these offensive associations. In other words, Google image search
    emboldened and ossified the very same racism that this tweet was calling attention
    to.


    Just a few months after this Google hairstyle fiasco, a trio of researchers in
    Brazil presented a detailed study on another manifestation of racism in Google’s
    image search—one so abhorrent that the academic study was promptly covered prominently
    by the *Washington Post*. The researchers collected the top fifty results from
    Google image searches for “beautiful woman” and “ugly woman,” and they did this
    for searches based in dozens of different countries to see how the results vary
    by region. This yielded over two thousand images that were then fed into a commercial
    AI system for estimating the age, race, and gender of each person (supposedly
    with ninety percent accuracy). Here’s what they found.'
