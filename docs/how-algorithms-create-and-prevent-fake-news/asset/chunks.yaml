  trans: '

    # 自动播放的独裁者


    YouTube 推荐的算法与政治


    > *随着极右翼和阴谋论频道开始相互引用，YouTube 的推荐系统学会了将它们的内容串联起来。无论单个谣言本身多么不可信，当它们被整合在一起时，就会造成一种印象：数十个不同的来源都在揭示同一个可怕的真相。*

    >

    > ——马克斯·费舍尔与阿曼达·陶布，《纽约时报》


    随着对传统媒体信任度的下降，人们开始转向其他渠道获取新闻。在这方面，一个尤其受欢迎的平台（尤其是在年轻一代中，你将在本章中看到一些精确的事实和数据）就是 YouTube。任何人都可以发布视频来展示或解释世界上正在发生的事情，这一前提颇具吸引力，但现实是，YouTube
    在假新闻和虚假信息的传播中扮演了令人担忧的角色。强大而神秘的 YouTube 推荐算法驱动着该网站大部分的观看时长，因此，理解其运作方式对于理解 YouTube
    如何将观众推向离奇的阴谋论和危险的极右翼煽动者至关重要。本章将深入探讨推荐算法多年来的发展历程、它在实践中的行为方式、它可能如何影响了世界各地的选举和政治事件、该公司如何回应批评，以及它如何试图对其托管的内容进行审核。


    ## 日益增长的担忧之声


    “多年前，YouTube 的开放性对艺术家、活动家和创意人士来说是一种福音，但现在 YouTube 已成为扩大虚假信息传播活动的主要组成部分。”这是哈佛大学肖伦斯坦媒体、政治与公共政策研究中心研究主任琼·多诺万在
    2020 年大选后几天，一个支持特朗普推翻选举结果努力的假新闻 YouTube 频道网络出现时所说的话。^(⁹¹)


    “不到一代人之前，选民看待政治人物的方式很大程度上由成千上万的报纸编辑、记者和电视高管塑造。如今，大型科技平台背后的无形代码已成为新的‘造王者’。”这是《卫报》的保罗·刘易斯在其关于
    YouTube 算法如何扭曲真相的调查中所写。^(⁹²)


    “在 2018 年 1 月 4 日的一小段时间里，YouTube 上最受欢迎的直播视频是一个由白人至上主义者主导的节目。[……这个视频]是一个更大现象的一部分，即
    YouTube 用户试图通过以新闻和娱乐的形式传播极右翼思想来吸引年轻观众。[……]YouTube 在传播政治思想方面如此有效的一个原因是，在关于虚假信息和极右翼运动兴起的讨论中，它常常被忽视或低估。”这是丽贝卡·刘易斯在
    2018 年为数据与社会研究所撰写的一份关于 YouTube 的报告中所写。^(⁹³)


    “YouTube 强大的推荐算法，推动其 20 亿月活跃用户观看它认为他们会看的视频，这助推了该平台的崛起，使其成为全球许多人新的电视。[……]YouTube
    的成功伴随着阴暗面。研究表明，该网站的推荐系统系统地放大了分裂性、耸人听闻且明显虚假的视频。”这是《纽约时报》的杰克·尼卡斯在其关于 YouTube 算法如何鼓励阴谋论传播的调查中所写。^(⁹⁴)


    “YouTube 看起来像现实，但它被扭曲了，目的是让你在网上花更多时间。推荐算法优化的不是真实、平衡或对民主健康的内容。”曾参与 YouTube 推荐算法工作的前谷歌
    AI 工程师纪尧姆·沙斯洛说道。“在 YouTube 上，虚构正在超越现实，”沙斯洛继续说道。^(⁹⁵)


    “调查新闻网站 Bellingcat 分析了极右翼聊天室的信息，发现 YouTube 被列为成员‘觉醒’（一个网络俚语，指皈依极右翼信仰）的最常见原因。欧洲研究组织
    VOX-Pol 对近 3 万个与另类右翼相关的 Twitter 账户进行了单独分析，发现这些账户链接到 YouTube 的频率高于任何其他网站。”这是《纽约时报》的凯文·罗斯在其关于
    YouTube 如何激进化人们的调查中所写。^(⁹⁶)


    “现实是由任何走红的信息塑造的。”2016 年巴西左翼时任总统迪尔玛·罗塞夫弹劾运动的联合创始人佩德罗·德伊罗特说。“YouTube 的自动播放推荐就是我的政治教育。”巴西威权极右翼总统雅伊尔·博索纳罗所在政党的官员毛里西奥·马丁斯说。^(⁹⁷)


    本章的主要目标是深入探究这些令人不安的引述——理解 YouTube 神秘的推荐算法究竟做了什么，并剖析围绕它的争议。具体来说，我将探讨 YouTube 推荐算法是否真的助长了假新闻的传播，推动了有害阴谋论的增长，并支持了独裁者和另类右翼，尤其是在巴西和美国。


    ## YouTube 背景介绍


    YouTube 于 2005 年上线，一年后以 16.5 亿美元被谷歌收购。它在全球拥有超过 20 亿用户。^(⁹⁸) 这几乎占互联网用户的三分之一，超过了拥有电视的家庭数量。每天有
    10 亿小时的 YouTube 视频被观看。每分钟有超过 500 小时的视频被上传。YouTube 的流量估计在所有网站中排名第二，仅次于 Google.com。^(⁹⁹)
    在美国，YouTube 覆盖的 18 至 34 岁人群比任何电视网络都多；94%的 18 至 24 岁美国人使用 YouTube，这一比例高于任何其他在线服务。


    人们访问 YouTube 视频的方式主要有四种：


    *   嵌入在其他平台上的视频

    *   人们分享的视频的直接 URL 链接

    *   在 YouTube 首页进行关键词搜索

    *   YouTube 首页上的推荐视频以及播放视频时推荐的“接下来播放”视频


    2018 年，YouTube 首席产品官透露，^(¹⁰⁰) 用户观看 YouTube 视频总时长的 70%来自这第四类，即推荐视频。


    术语*推荐算法*指的是为这两种推荐视频（首页上的和“接下来播放”列表中的）提供动力的幕后系统；有时，它也用来指代 YouTube 的直接搜索功能，因为用户输入关键词，网站会返回它推荐作为匹配结果的视频列表，但我会避免混淆这些相当不同的过程。大多数关于
    YouTube 可能导致政治极化的公开辩论和讨论都集中在推荐算法上，这也将是本章的重点。


    公司内部人士表示，^(¹⁰¹) 推荐算法是 YouTube 增长的最重要引擎，他们将其描述为“现存规模最大、最复杂的工业推荐系统之一”。这种规模和重要性无疑为
    YouTube 的推荐算法对全球社会产生巨大影响创造了潜力，但要弄清楚它是否以及如何做到这一点，还需要深入挖掘。我将从技术角度的算法发展年表开始。

    '
- fmt: '# Development of the Algorithm


    In the early days of YouTube, before the recommendation algorithm, videos were
    shared through embedding or direct links, and the YouTube site itself was primarily
    a repository where people would look up specific videos—for instance, a viral
    clip that was discussed at the office. Facebook changed the lay of the social
    media land when it introduced the newsfeed, an infinite stream of personalized
    content. This was an innovation that soon spread to other platforms, such as Tumblr,
    Twitter, Instagram, LinkedIn—and YouTube. For YouTube, this development shows
    up both on the homepage where videos in various categories are suggested to the
    user and in the `up next` videos that suggest what a user should watch after the
    current video concludes. Thanks to the autoplay feature that was added in 2015,
    the user doesn’t even have to click anything in order to set sail down the river
    of algorithmic recommendations.


    ## 2012: From Views to Watch Time


    You saw in Chapter [1](../Text/508514_1_En_1_Chapter.xhtml) that online journalism
    has adopted the pageview as its primary currency: the single metric that determines
    ad revenue and defines success. In the early years of YouTube, the success of
    a video was similarly measured by the number of views it received, but there was
    a big problem with this: ads are dispersed throughout videos so users who leave
    videos early do not see all the ads. Two videos with the same number of views
    might generate very different amounts of ad revenue if one was getting users to
    watch longer and therefore see more ads. This suggests that the combined amount
    of time all users spend on a video (called *watch time*) is a better proxy for
    the value of a video than the number of views. And keep in mind it’s not just
    content creators who earn money from ad revenue—YouTube’s corporate profits are
    from ad revenue, so YouTube the company needs users to watch videos for as long
    as possible. Accordingly, in 2012, YouTube made a fundamental and lasting change
    to its recommendation algorithm: instead of aiming to maximizing views, it would
    aim to maximize watch time.


    From a technical perspective, what this means is the following. When views were
    prioritized, the algorithm was trying to predict the probability that the user
    would click each video, and it would recommend the video with the highest click
    probability. With watch time as the goal, the algorithm is instead trying to predict
    how long the user would spend on each video, and it recommends the video with
    the highest estimate. From a revenue perspective, this change to the algorithm
    was not at all surprising; if anything, what is surprising is that it didn’t happen
    earlier. And from an overall growth perspective, it was incredibly successful.
    The number of users on YouTube had been steadily increasing, but the amount of
    time each user was spending on the platform was relatively flat prior to 2012—despite
    a slew of company efforts such as revamping the site to emphasize channel subscriptions
    and buying high-end recording equipment for top creators. But with the change
    in algorithmic metric from views to watch time, per-user watch time grew fifty
    percent a year for the next three years.^([^(102)](#fn102))


    In terms of content, a noticeable impact this had was to drastically reduce the
    amount of clickbait on the platform. Just as prioritizing (page)views led to clickbait
    in blogs and online newspapers, so too did it on YouTube. The pre-2012 years of
    YouTube saw a proliferation of videos with tantalizing titles and salacious thumbnails
    that would disappoint the viewer once they clicked on the video—but this disappointment
    was not registered because all clicks lead to views no matter how quickly the
    user leaves the video. After the change to the recommendation algorithm, in order
    to rise up in the recommendation rankings, videos have to keep viewers glued to
    their screens for as long as possible. As you will see throughout the remainder
    of this chapter, this doesn’t mean that content creators no longer game the system—it
    just means that the rules of the game changed considerably and abruptly in 2012.


    Just a month after the switch to watch time, YouTube made another key change:
    it started allowing all video creators—not just popular channels vetted by YouTube
    administrators—to run ads in their videos and earn a portion of the ad revenue.
    Thus, 2012 was an important year for YouTube in terms of both algorithmic and
    economic developments.'
