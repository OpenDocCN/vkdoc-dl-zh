- fmt: '### Into the Courtroom


    A big moment—in Marston’s life, in the history of the polygraph, and in the history
    of the American judicial system—came in 1923 when Marston served as an expert
    witness in the influential case *Frye v. United States*. James Frye, a veteran
    of WWI, was on trial for shooting and killing a prominent Washington DC physician,
    Dr. R. W. Brown. Frye admitted to robbing a traveling salesman, and supposedly
    while the police were questioning him on this matter, some incriminating details
    emerged linking him to the murder of the doctor. Frye soon thereafter confessed
    to shooting the doctor. He said he went to Dr. Brown’s office for a prescription,
    but he only had one dollar and the prescription cost two. A newspaper article
    at the time described what happened next in Frye’s confession:^([^(149)](#fn149))
    “Dr. Brown, he said, declined to accept his pistol as collateral for the extra
    dollar. Trouble followed, and the physician, he declared, knocked him down, having
    followed him from the office to the hallway. It was while he was down, he stated,
    that he fired four or five shots.” Not exactly self-defense, but not too far from
    it, at least in Frye’s estimation.


    However, Frye subsequently recanted this confession and instead professed his
    innocence. He said the reason for the false confession was that a detective had
    agreed to drop the robbery charges if Frye confessed to the murder and moreover
    that the detective would share with Frye a thousand dollar reward that the detective
    would collect for obtaining this confession. A cash reward and the dropping of
    a lesser charge don’t seem like much incentive to confess to a murder that one
    did not commit, but Frye believed he had an alibi that would exonerate him from
    the murder charge. By his calculation, confessing to the murder was the smart
    thing to do: it would get him out of the robbery arrest, the murder charge would
    be dropped despite the confession once the alibi was corroborated, and he’d even
    pick up a few easy bucks in the process. Brilliant plan, except that the alibi
    failed. And so, according to his version of the story, when left facing a murder
    charge that he could no longer easily avoid, he admitted that the confession was
    nothing more than a fabrication from this failed scheme. (Never mind the fact
    that his confession included some strikingly accurate details about the crime
    scene that an outsider almost surely would not have known.)


    Enter Marston, expert witness for Frye’s defense, who believed he could establish
    Frye’s innocence by using his lie detector to prove that Frye was being truthful
    when he explained why his confession was untruthful.^([^(150)](#fn150)) Marston
    used his device—which at the time was basically just a blood pressure monitor
    cuff and a stethoscope—on Frye and declared that he was telling the truth about
    conspiring with the detective. Marston then attempted to use this as official
    courtroom evidence by testifying on Frye’s behalf.


    However, the judge was unswayed and objected to the use of an unknown and unproven
    tool. The case was appealed up to the DC circuit court, which agreed with the
    trial court judge’s skeptical view of Marston’s device and testimony. The appellate
    ruling included a remark on the admissibility of expert witness testimony more
    generally, a remark that became known as the *Frye standard*, asserting that expert
    opinion is admissible if the scientific technique on which the opinion is based
    is “generally accepted” as reliable in the relevant scientific community. This
    general acceptance standard for admissibility of scientific evidence from the
    Frye case is still the verbatim law in some jurisdictions today, and even in jurisdictions
    where it is not, the law is essentially just a more detailed and elaborate version
    codified^([^(151)](#fn151)) in the so-called *Federal Rule 702*.


    In short, while Marston hoped to make history by showing how his lie detection
    device could prove innocence, instead he made history by forcing the court system
    to articulate what kinds of expert testimony should *not* be allowed—and his landed
    squarely in this disallowed category. In fact, not only did his device fail the
    Frye standard at the time in 1923, but the Frye standard has kept polygraph tests,
    even in their more modern incarnations, out of the courtroom for nearly one hundred
    years now. (A swing and a miss there, perhaps, but he definitely hit a home run
    with his other enduring creation: the comic book super heroine he proposed to
    DC Comics in 1940 while working as a consultant for them—a character named *Wonder
    Woman* who was equipped with the “Lasso of Truth,” a whip that forces anyone it
    ensnares to tell the truth. Wonder Woman drew inspiration from Marston’s wife,
    Elizabeth Holloway, and the idea for the Lasso arose from their influential joint
    research into the psychology of human emotions.)


    ### From Blood Pressure to Polygraph


    Marston’s embarrassing failure in the Frye case seems only to have galvanized
    him into developing his lie detector into a more sophisticated device. Rather
    than relying on systolic blood pressure alone and only taking measurements at
    discrete time intervals, he believed a more nuanced portrait would be provided
    by combining multiple measurements simultaneously and by continuously plotting
    their movements over time. This resulted in the *polygraph* (note that “poly”
    is the Greek root for “many,” and “graph” is the Greek root for “to write”). In
    addition to blood pressure, Marston’s post-Frye polygraph measured breathing rate
    and sweatiness (the latter via skin conductance).


    The modern polygraph is sometimes attributed to another inventor from around the
    same time on the opposite coast: Berkeley police officer and forensic psychologist
    John Augustus Larson, whose device also used a systolic blood pressure monitor
    and produced a continuous recording of the measurements. The details of who invented
    what and when are a little murky, and both these men based their inventions and
    ideas on earlier attempts (and, as mentioned earlier, Marston’s work was really
    in collaboration with his wife). Whatever the case was back then, the relevant
    fact is that the polygraphs we know today—well, the ones prior to the recent AI-based
    systems that I’ll soon discuss—are only small variants of these early 20th-century
    devices put forth by Marston and Larson.'
