  trans: '

    利用网络科学工具分析这些信息级联后，本研究的主要发现如下：虚假谣言比真实谣言传播得更快、更远、更深、更广；这种传播在政治类虚假谣言中比在科学、金融和灾难等话题的虚假谣言中更为显著；虚假谣言往往更具新颖性，并涉及恐惧、厌恶和惊讶情绪，而真实谣言则更倾向于与其他内容相似，并涉及期待、悲伤、喜悦和信任；最后，机器人似乎以大致相同的速度加速了真实和虚假谣言的传播。综合第一点和最后一点发现，这意味着更倾向于传播虚假谣言而非真实谣言的是人类，而非机器人。话虽如此，需要牢记的是，这项研究关注的是十年跨度内的总体行为——在特定具体案例中，机器人可能扮演了更重要的角色，这种可能性是完全存在的。


    以下是关于这些发现的更多细节。平均而言，虚假谣言传播到一千五百人的速度比真实谣言快六倍。即使控制了引发谣言级联的用户之间的各种差异（例如他们的粉丝数量以及账户是否经过推特验证），虚假谣言被转发的可能性仍比真实谣言高出百分之七十。当谣言为假时，最大的谣言级联可传播至约五万名用户，而当谣言为真时，仅能传播至约两千名用户。信息在推特上传播并触达大量用户有两种截然不同的方式：一位有影响力的网红可以发布一条故事，被众多粉丝直接转发；或者一位不太知名的用户发布一条故事，被少量粉丝转发，然后这些粉丝的粉丝再继续转发，以此类推。即使一条故事在这两种情况下获得了相同数量的转发，第一种被视为浅层传播，第二种则被视为深层传播，因为它更深入地渗透到了社交网络中。本研究发现，虚假谣言不仅最终覆盖了更广泛的受众，而且其传播深度也大得多：真实谣言很少能串联起超过十层转发，而传播最广的虚假谣言则能达到二十层转发——并且它们达到这一深度的速度，是真实谣言达到十层深度的十倍。


    这项研究的主要局限——我甚至想称之为弱点或严重缺陷——在于它并非真正关于假新闻与真新闻：它关乎的是有争议的信息。这里研究的谣言绝不等同于所有新闻的代表性样本，因为它们是从出现在事实核查网站上的条目中提取的。大多数新闻故事甚至谈不上有争议，因此不会出现在事实核查网站上。随便打开一家在线报纸的首页，哪怕是高度党派化的报纸，问问自己其中有多少故事可能会出现在事实核查网站上——我猜是少之又少。换句话说，实际情况可能是，真实新闻在推特上的传播比假新闻更广；我们确实不得而知。事实上，多年来，推特上保持最多转发记录的故事是（无可争议为真，因此未经事实核查的）奥巴马总统在
    2012 年成功连任的新闻。这篇《科学》杂志论文所揭示的——并且这无疑是一个令人震惊且具有影响力的揭示——是：在那些争议程度足以引发事实核查的新闻事件/故事中，未能通过事实核查的事件/故事，在每一个可以想象的衡量指标上，都比通过核查的事件/故事传播得更广。


    ### 2020 年大选


    对于社交媒体在 2020 年大选中的作用，我们尚未像对 2016 年大选那样有详尽的理解（请注意，关于后者的某些最重要研究是在大选两三年后才发表的），但我们确实有一些初步分析。在
    2020 年大选那一周，Facebook 上提及“停止窃选”（“Stop the Steal”）这一短语的公开帖子获得了三百五十万次互动（点赞、分享、评论）。该短语是支持特朗普的虚假选民欺诈指控的口号。^(³⁰⁴)
    其中百分之六的互动发生在四位知名影响者的页面上——埃里克·特朗普和三位保守派社交媒体名人——但最大的超级传播者却是唐纳德·特朗普：包含“选举”一词的、互动量最高的二十个
    Facebook 帖子均来自他，并且这些帖子均被认定为虚假或具有误导性。在 11 月 3 日前后四周内，特朗普总统和其他前二十五名选民欺诈虚假信息传播者，在
    Avaaz 调查所索引的 Facebook 公开帖子中，产生了超过四分之一的关于选民欺诈虚假信息的互动。关于 Dominion 投票软件删除了投给特朗普的选票这一虚假说法，超过十分之一的互动仅来自七个帖子。Facebook
    上许多支持特朗普的选举虚假信息的顶级传播者，同时也是推特上相同虚假信息的顶级传播者——最显著的例子当然是特朗普总统本人。


    迄今为止，对 2020 年大选中社交媒体上假新闻最详尽的审视，是选举诚信伙伴关系（Election Integrity Partnership）于 2021
    年 3 月发布的一份长篇报告^(³⁰⁵)，该报告仔细追踪了超过六百条选举虚假信息。作者指出的一个挑战是，社交媒体应用 Parler 被认为藏匿了大量选举虚假信息，但它不轻易提供数据，因此研究人员很难研究
    Parler 上的内容；同样，Facebook 的私人群组是虚假信息的温床，而它们提供的有限访问权限使得研究这些群组变得困难。总体而言，该报告的作者发现，2020
    年大选中的虚假信息在所有社交媒体平台上都经历了长时间的积累——尽管大型平台努力限制——并且非常明显地展现了之前在与 QAnon 相关的讨论中提到的、不断演变的元叙事结构。关于选举的虚假信息形式多样、实例众多，都指向一种普遍但错误的感受，即选举将会（并且已经）被从特朗普总统手中窃取，以至于揭穿任何特定说法都几乎无法减缓这一运动的势头，有时甚至反而会为这种说法带来更多关注，并进一步引发对相关社交媒体平台和/或事实核查组织的不信任阴谋论。


    要了解这是如何展开的，不妨看看这份选举诚信伙伴关系报告中追踪的一个具体虚假信息演变案例。回想一下，“窃选”叙事的一部分是声称 Dominion 投票机删除了投给特朗普的选票这一虚假说法。以下是该报告的发现：


    > “Dominion 叙事……始于网站和推特在线对话中关于投票站故障的说法，然后通过 YouTube 视频和使用话题标签……在推特及其他平台（如 Parler
    和 Reddit）上传播。此后，高知名度账户以及像《The Gateway Pundit》这样的极端党派新闻网站（该网站利用推特推广其讨论此事件的报道）进一步吸引了关注。这种集体性的
    Dominion 叙事传播此后不断壮大，随后得到了‘骄傲男孩’、《西方日报》和迈克·赫卡比在多个平台上的推广，包括 Facebook、推特、Instagram、Telegram、Parler
    和 Gab。”

    '
- fmt: 'This narrative trajectory gives a decent qualitative sense of how so much
    of the 2020 election fake news started and then snowballed, often passing through
    multiple platforms along the way, even though it lacks the quantitative details
    that the large-scale data-driven studies of the 2016 election offered.


    Incidentally, while the spread of the Dominion voting machine false narrative
    is typical of many recent false narratives, what happened afterward is much less
    typical—and could potentially have far-reaching ramifications for the spread of
    disinformation in general. In December 2020, an employee of Dominion Voting Systems
    filed a defamation lawsuit against the Trump campaign, several Trump-affiliated
    lawyers (including Rudy Giuliani and Sidney Powell), and several conservative
    news organizations (including *Newsmax*, *One America News*, and *Gateway Pundit*)
    for their role in the false conspiracy theory concerning Dominion. This lawsuit,
    together with the threat of a related one by the voting company Smartmatic, led
    *Newsmax* to quickly retract its earlier claims of voting machine election fraud—and
    on April 30, 2021, *Newsmax* settled the Dominion case for an undisclosed amount
    and provided an official apology for broadcasting the story without any evidence
    that it was true (the rest of the Dominion case is still ongoing).^([^(306)](#fn306))
    Meanwhile, Dominion and Smartmatic are both suing *Fox News*, seeking over four
    billion dollars in damages.^([^(307)](#fn307)) Finally, it seems, there is some
    accountability for broadcasting fake news—at least in this specific situation,
    though this may indeed set a new precedent. But it is important to note that none
    of the social media companies involved in the spread of this dangerous conspiracy
    theory have suffered any financial or legal consequences; the reason for this
    is a legal protection called Section 230 that I’ll come to later in this chapter.


    Now it is time to turn from studying the spread of fake news to the design and
    implementation of algorithms to help curb it. I’ll start first with what Facebook
    and Twitter have actually done—based on the limited information they have made
    publicly available—then in the subsequent section, I’ll turn to algorithmic approaches
    that have been suggested by various researchers outside of the social media companies.


    ## How Algorithms Have Helped


    Some of the technical solutions social media companies have implemented to reduce
    the spread of fake news and harmful content are quite straightforward. Facebook
    owns the messaging service WhatsApp which has proven yet another way that misinformation
    spreads virally, especially in countries outside the United States; you saw this
    with the malicious deepfake of a journalist in India in Chapter [3](../Text/508514_1_En_3_Chapter.xhtml),
    and while I didn’t discuss it in Chapter [4](../Text/508514_1_En_4_Chapter.xhtml),
    WhatsApp was also a significant vector for far-right and conspiracy theory content
    in Brazil’s 2018 election. To help counteract this, in 2018 Facebook reduced the
    number of people a WhatsApp message could be forwarded to from two hundred fifty
    to twenty, and this number has since been reduced to five; in anticipation of
    the 2020 election, it also reduced the forwarding limit on Facebook’s Messenger
    from one hundred fifty to five.^([^(308)](#fn308))


    Other technical solutions are on the surface relatively simple but difficult to
    implement. In January 2020, Facebook announced^([^(309)](#fn309)) a seemingly
    straightforward move: it would start banning deepfakes on its platform. More precisely,
    this was a ban on “misleading manipulated media,” meaning any video that “has
    been edited or synthesized—beyond adjustments for clarity or quality—in ways that
    aren’t apparent to an average person and would likely mislead someone into thinking
    that a subject of the video said words that they did not actually say” and that
    also “is the product of artificial intelligence or machine learning that merges,
    replaces or superimposes content onto a video, making it appear to be authentic.”
    This lengthy description really is intended to spell out that the ban is aimed
    at deepfakes that are used in a deceptive manner, but you saw in Chapter [3](../Text/508514_1_En_3_Chapter.xhtml)
    that detection of deepfakes—whether algorithmic or manual—is, and likely always
    will be, quite challenging, so this ban will not be easy to implement in practice.
    Also, note that this prohibition doesn’t cover shallowfakes of any kind, and for
    deepfakes it only covers words, not actions—so fake videos of public figures engaged
    in adulterous activity, for instance, are still allowed. Here’s another example
    of a policy decision that was far simpler to state than to implement: in October
    2019, Twitter announced that it would start banning political advertising. This
    requires deciding exactly which ads count as political, which is no simple matter.


    Many of the technical approaches that have been implemented, however, are quite
    sophisticated and rely extensively on machine learning. This is particularly true
    of Facebook, and it’s the topic I turn to next.'
