- fmt: "## Concluding Thoughts\n\nIn November 2019, Google announced in a blog post^([^(270)](#fn270))\
    \ that it would be “making a few changes to how we handle political ads on our\
    \ platforms globally” in order to “help promote confidence in digital political\
    \ advertising and trust in electoral processes worldwide.” After explaining how\
    \ the new policy would further limit microtargeting in political advertising,\
    \ the post has a section titled “Clarifying our ads policies” that includes the\
    \ following: “It’s against our policies for any advertiser to make a false claim—whether\
    \ it’s a claim about the price of a chair or a claim that you can vote by text\
    \ message, that election day is postponed, or that a candidate has died.” This\
    \ sounds great, but what Google failed to mention here—and it continues to sweep\
    \ this under the rug—is that even when the ads do not make false claims, they\
    \ might be placed by Google’s algorithms on a fake news site. If Google really\
    \ wants to promote trust in electoral processes, it is not enough to prevent false\
    \ advertising—Google needs to stop funneling nearly a hundred million dollars\
    \ a year to fake news publishers.\n\nIn the immediate aftermath of the 2016 election,\
    \ Facebook publicly asserted that fake news is prohibited from the platform’s\
    \ political advertisements. As you have seen, this stance seems to have dissolved\
    \ in the lead-up to the 2020 election as numerous blatantly false political accusations\
    \ were allowed in political ads—and in the case of the Trump campaign’s video\
    \ ad about Biden’s interactions with Ukraine, a formal request to take down the\
    \ blatantly untrue ad was formally rebuffed by Facebook. From 2019 onward, Facebook\
    \ issued a series of policy statements that, while somewhat vaguely worded, seem\
    \ to suggest the company no longer believes in disallowing disinformation in political\
    \ ads. One gets the impression from Google and Facebook that they will not take\
    \ a stronger stance against profiting from fake news until the government steps\
    \ in and develops regulation in this sector. And indeed, why should they walk\
    \ away from this source of revenue when there is no real incentive to do so?\n\
    \nOne particular challenge with fake news showing up in social media advertisements\
    \ comes from the way that the distribution algorithms allow for extreme microtargeting.\
    \ In a remarkable article^([^(271)](#fn271)) from 2012, the techno-sociologist\
    \ Zeynep Tufekci (whom you previously encountered in Chapter [4](../Text/508514_1_En_4_Chapter.xhtml)\
    \ with a critique of YouTube’s recommendation algorithm) presciently wrote that\
    \ “Misleading TV ads can be countered and fact-checked,” but a misleading microtargeted\
    \ ad “remains hidden from challenge by the other campaign or the media.” In other\
    \ words, the algorithmic distribution system for ads used by Facebook and other\
    \ platforms shields misleading ads from public scrutiny because there is no public\
    \ record of all the ads that are shown—there is only the algorithmically tailored\
    \ experience of each individual user. This means it is important for each user\
    \ to take an active role in fact-checking; I’ll discuss some tools and approaches\
    \ for this in Chapter [9](../Text/508514_1_En_9_Chapter.xhtml).\n\n## Summary\n\
    \nGoogle is the largest advertising company in the world, and it serves ads in\
    \ two ways: by placing them on its own site—for instance, to appear when users\
    \ do keyword searches—and by placing them on external sites in the so-called Google\
    \ Display Network. Many sites in this network have a proven track record of publishing\
    \ fake news, and yet they remain in the network. The result is that Google is\
    \ funneling huge sums of money to fake news publishers—and it is profiting tremendously\
    \ in the process. Facebook, on the other hand, only services ads on its own properties,\
    \ but numerous investigations have demonstrated that its algorithmically powered\
    \ ad distribution system has a years-long track record of engaging in federally\
    \ prohibited discriminatory practices. Meanwhile, the company’s policies on fake\
    \ news in political advertisements have proven rather mercurial and seem to have\
    \ recently tended toward a laissez-faire loosening under the guise of free speech\
    \ adherence. In the next chapter, I take a direct look at how Facebook and Twitter\
    \ have dealt with the spread of fake news on their platforms.\n\nFootnotes [1](#508514_1_En_7_Chapter.xhtml#Fn1_source)\
    \ [2](#508514_1_En_7_Chapter.xhtml#Fn2_source) [3](#508514_1_En_7_Chapter.xhtml#Fn3_source)\
    \ [4](#508514_1_En_7_Chapter.xhtml#Fn4_source) [5](#508514_1_En_7_Chapter.xhtml#Fn5_source)\
    \ [6](#508514_1_En_7_Chapter.xhtml#Fn6_source) [7](#508514_1_En_7_Chapter.xhtml#Fn7_source)\
    \ [8](#508514_1_En_7_Chapter.xhtml#Fn8_source) [9](#508514_1_En_7_Chapter.xhtml#Fn9_source)\
    \ [10](#508514_1_En_7_Chapter.xhtml#Fn10_source) [11](#508514_1_En_7_Chapter.xhtml#Fn11_source)\
    \ [12](#508514_1_En_7_Chapter.xhtml#Fn12_source) [13](#508514_1_En_7_Chapter.xhtml#Fn13_source)\
    \ [14](#508514_1_En_7_Chapter.xhtml#Fn14_source) [15](#508514_1_En_7_Chapter.xhtml#Fn15_source)\
    \ [16](#508514_1_En_7_Chapter.xhtml#Fn16_source) [17](#508514_1_En_7_Chapter.xhtml#Fn17_source)\
    \ [18](#508514_1_En_7_Chapter.xhtml#Fn18_source) [19](#508514_1_En_7_Chapter.xhtml#Fn19_source)\
    \ [20](#508514_1_En_7_Chapter.xhtml#Fn20_source) [21](#508514_1_En_7_Chapter.xhtml#Fn21_source)\
    \ [22](#508514_1_En_7_Chapter.xhtml#Fn22_source) [23](#508514_1_En_7_Chapter.xhtml#Fn23_source)\
    \ [24](#508514_1_En_7_Chapter.xhtml#Fn24_source) [25](#508514_1_En_7_Chapter.xhtml#Fn25_source)\
    \ [26](#508514_1_En_7_Chapter.xhtml#Fn26_source) [27](#508514_1_En_7_Chapter.xhtml#Fn27_source)\
    \ [28](#508514_1_En_7_Chapter.xhtml#Fn28_source) [29](#508514_1_En_7_Chapter.xhtml#Fn29_source)\
    \ [30](#508514_1_En_7_Chapter.xhtml#Fn30_source) [31](#508514_1_En_7_Chapter.xhtml#Fn31_source)\
    \ [32](#508514_1_En_7_Chapter.xhtml#Fn32_source) [33](#508514_1_En_7_Chapter.xhtml#Fn33_source)\
    \ [34](#508514_1_En_7_Chapter.xhtml#Fn34_source) [35](#508514_1_En_7_Chapter.xhtml#Fn35_source)\
    \ [36](#508514_1_En_7_Chapter.xhtml#Fn36_source) [37](#508514_1_En_7_Chapter.xhtml#Fn37_source)\
    \ [38](#508514_1_En_7_Chapter.xhtml#Fn38_source) [39](#508514_1_En_7_Chapter.xhtml#Fn39_source)\n\
    \n# 8. Social Spread\n\nModerating Misinformation on Facebook and Twitter\n\n\
    > *At a moment of rampant disinformation and conspiracy theories juiced by algorithms,\
    \ we can no longer turn a blind eye to a theory of technology that says all engagement\
    \ is good engagement.*^([^(272)](#fn272))\n> \n> —Apple CEO Tim Cook\n\nIn this\
    \ chapter, I explore several ways in which algorithms interact with the complex\
    \ dynamics of social media when it comes to fake news. First, I set the stage\
    \ with some context, issues, and examples that help us better understand what\
    \ has happened and what’s at stake. Next, I look at how algorithms have been used\
    \ to scrape data from social media platforms to provide remarkable quantitative\
    \ insight into how fake news spreads—both organically and when part of deliberate\
    \ disinformation campaigns. Along the way, the role in this spread played by the\
    \ social media platforms’ own content recommendation algorithms is explored. Attention\
    \ is then turned to the algorithmic tools that social media companies—primarily\
    \ Facebook and Twitter—have used and could potentially use in their battle against\
    \ harmful misinformation, as well as the limitations and challenges of taking\
    \ algorithmic approaches to this thorny, multifaceted problem.\n\n## Setting the\
    \ Stage\n\nIn this section, I collect some background information that will help\
    \ frame and inform the discussions in the following sections. To start out, let\
    \ me take a look at how one’s media diet correlates with one’s interest and knowledge\
    \ in current events and with one’s exposure to fake news."
