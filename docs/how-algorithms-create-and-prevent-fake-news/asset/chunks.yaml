    回顾第 6 章，Google 减少错误信息影响的主要方法是在其搜索结果中提升优质新闻的排名——它通过为来源分配一个基于算法确定的分数来实现这一点，该分数基于数据驱动的指标（如
    PageRank）以及人工驱动的质量评估指标。Facebook 同样为新闻发布者分配一个分数，称为“新闻生态系统质量”（NEQ）分数，当帖子包含新闻文章链接时，该分数会发挥作用。通常情况下，NEQ
    分数在信息流排名算法中只起很小的作用，但在 2020 年大选几天后，马克·扎克伯格同意了员工团队的要求，大幅提高算法中 NEQ 分数的权重，以减少危险错误信息的传播。虽然这一变化是临时措施，但一些员工后来要求将其永久化；他们被高层领导拒绝了，但决定将研究这次临时提高
    NEQ 分数的影响，并可能为未来的决策提供参考。


    ### 其他方面？


    本节关于算法审核的描述，肯定只是 Facebook 和 Twitter 闭门开发调整算法以减少假新闻的无数多方面努力的冰山一角。为了了解其他可能的方法，不仅限于这两个平台，而是在任何社交媒体环境中，我接下来将转向由科技巨头之外的学术研究人员开发的方法。其中一些方法可能已经以某种形式被
    Facebook 或 Twitter 的内部方法所吸收——我们只是不知道，因为公司对其方法保密。其他方法几乎肯定没有被采用，因为它们要么比公司实际使用的方法更原始，要么涉及过于庞大的设计改造，和/或过于严重地影响了公司的底线：用户参与度。此外，归根结底，社交媒体公司只会在有明确政策反对错误信息的情况下，才使用算法来移除它。尽管如此，仔细审视下一节中的方法是有帮助的。与上述
    Facebook 和 Twitter 的内部方法不同，以下学术方法不隐藏任何技术细节——因此，除了展示可能性之外，它们还更具体地展示了算法审核在底层是如何真正运作的。


    ## 算法如何提供帮助


    在本节中，我将首先介绍基于更广泛的结构性理念来重新设计社交媒体网络的假新闻缓解方法；然后，我将转向更实际的方法，这些方法依赖于假新闻在当前运行的社交网络中的传播方式。

    '
- fmt: '### Structural Approaches


    One idea proposed^([^(317)](#fn317)) in August 2020 was to introduce “circuit
    breakers” into social media platforms. Similar to how the New York Stock Exchange
    automatically closes when trading reaches dangerously volatile levels, social
    media platforms could pause or at least significantly slow the viral spread of
    content at key moments in order to provide a cool-off period and avail fact-checkers
    of more time to do their job. This is probably not very far from what Facebook
    actually did when it enacted emergency measures in the days after the 2020 election,
    but we don’t know for sure because, as I mentioned earlier, the company has provided
    very few public indications of what those emergency measures really were. Friction
    could be added to platforms overall in moments of crisis, or it could be applied
    to individual pieces of controversial content to slow their virality without entirely
    censoring them. Facebook did say that it is internally testing this idea of deliberately
    slowing the spread of viral posts. The idea of an overall circuit breaker or individual
    virality speed bumps to help fight misinformation has even been likened to “flattening
    the curve,” the mantra for lockdowns during the first months of the COVID-19 pandemic.^([^(318)](#fn318))


    A frequently discussed issue with social media is “filter bubbles,” the idea that
    people get funneled into homogeneous networks of like-minded users sharing content
    that tends to reinforce preexisting viewpoints; this can create a more divisive,
    polarized society, and in extreme cases it may even lead to people living in different
    perceived realities from each other. Some researchers have proposed algorithmic
    methods for bursting, or at least mitigating, these social media filter bubbles.
    One particular approach^([^(319)](#fn319)) is to first assign a vector of numbers
    to each user and to each social media post (or at least each news link shared)
    that provides a quantitative measure of various dimensions such as political alignment.
    A filter bubble is reflected by a collection of users whose vectors are similar
    to each other and who tend to post content with similar vectors as well. With
    this setup, researchers designed an algorithm to prioritize diverse content to
    a select group of users who are deemed likely to share it and help it spread across
    the social network, penetrating filter bubbles as it goes. The researchers’ particular
    strategy for selecting the users to seed this spread was found to be three times
    more effective at increasing the overall diversity of newsfeeds in the network
    than a simpler approach of just targeting diverse content to the most well-connected
    users. The researchers do admit that this diversity-oriented newsfeed algorithm
    would not maximize engagement the way the current social media algorithms do—and
    I cannot help but wondering how challenging it would be to assign these numerical
    ideology vectors in the real world.


    Another method researchers have suggested—which, like the previous method, involves
    a fairly significant reenvisioning of how social networks should operate in order
    to reduce polarization—is based around the idea of decentralization. Many social
    networks naturally form a collection of hubs around highly influential users.
    If you think of each of these influencers as the center of a bicycle wheel shape
    with spokes emanating out to the followers, the network will look like a bunch
    of bicycle wheels with some but not many connections between the different wheels.
    A consequence of this network structure is that ideas and viewpoints tend to emerge
    from the limited number of central influencers and percolate outward, but they
    have difficulty crossing from one bicycle wheel to the next. In the case of Donald
    Trump on Twitter, there was a massive bicycle wheel with him at the center that
    encompassed much of the Republican user base on the platform and possibly impeded
    the flow of diverse perspectives within this user base. The general idea of decentralizing
    a social network is to reengineer it so that these bicycle-shaped circles of influence
    are less likely to emerge. This can also be seen as creating *egalitarian* networks
    in which users have less heavily imbalanced influence on each other.


    One leading scholar advocating for decentralized networks claims^([^(320)](#fn320))
    that in an egalitarian network “new ideas and opinions can emerge from anywhere
    in the community,” and their spread is “based on their quality, and not the person
    touting them.” This is in contrast to a centralized network, where it is claimed
    that “if the influencer at the middle shows even a small amount of partisan bias,
    it can become amplified throughout the entire group.” This scholar goes so far
    as to assert that the centralized nature of social media is “one of the main reasons
    why misinformation and fake news has become so pervasive,” because it provides
    “biased influencers a disproportionate impact on their community—enabling small
    rumors and suppositions to become amplified into widespread misconceptions and
    false beliefs.” It is difficult to back up these bold claims, but the fact that
    President Trump was found^([^(321)](#fn321)) to be the single largest driver of
    coronavirus misinformation does at least modestly point in this direction. Unfortunately,
    however, research on the ills of centralized networks at present far outpaces
    research on how to prevent social media networks from becoming centralized—without
    explicitly deciding who people should be friends with and/or limiting the number
    of followers they can have.'
