  trans: '

    ### 眼中的谎言


    2014 年，由马克·库班资助的一家名为`Converus`的初创公司发布了一款名为`EyeDetect`的产品，号称是比测谎仪更快、更便宜、更准确的替代方案。这是该公司的主要产品，其自我描述为“愿景是为欺骗检测行业提供值得信赖的创新解决方案”。炒作和宣传很快使其得到了相当广泛的采用，主要（但并非
    exclusively）用于公共部门的就业筛查。根据公司网站，截至 2019 年 1 月，`EyeDetect`已销往 40 个国家的 500 多个客户；在美国，这些客户包括联邦政府以及
    21 个州和地方机构。


    顾名思义，`EyeDetect`不依赖传统测谎仪所测量的血压、皮肤电导或呼吸频率；相反，它的焦点在于心灵的窗户：眼睛。或许更显著的区别在于，与传统测谎仪形成鲜明对比的是，`EyeDetect`不需要人类审查员来解读读数并判断什么是谎言、什么是真话——`EyeDetect`通过应用机器学习，以自动化、算法化的方式得出结论。事实上，`EyeDetect`被输入了说真话的参与者和说谎的参与者的细微眼部特写视频片段，算法将这些作为训练数据，以确定诚实与不诚实在眼中的表现。


    将人类解释者排除在外，无疑有助于营造一种公正的氛围，但这种算法方法真的能产生可靠且无偏见的结果吗？遗憾的是，不能。过去几年告诉我们，算法偏见是机器学习中一个严重且根本的问题。算法不仅会吸收无意中潜入训练数据集的偏见，还会复制并常常放大这种偏见。关于这种有害的数据驱动反馈循环现象，已有大量文章进行了一般性讨论，我稍后将在此处针对测谎的具体场景进行探讨。


    根据`Wired`在 2018 年的一项调查，美国国防部和美国海关与边境保护局一直在试用`Converus`的技术，虽然联邦法律禁止大多数私营公司在美国境内使用任何类型的测谎设备进行员工筛查，但显然包括联邦快递、麦当劳和优步在内的少数公司已在危地马拉、巴拿马和墨西哥使用了`EyeDetect`。信用评级机构益博睿在其哥伦比亚的员工中使用该技术，试图防止员工操纵记录以帮助家人欺诈性地获取贷款。`Converus`表示，一个未具名的中东国家已购买`EyeDetect`，用于筛查入境人员是否存在潜在的恐怖活动或关联。


    `Converus`声称其系统达到了 86%的准确率，优于传统测谎仪估计约 70%的准确率（该公司甚至断言`EyeDetect`是“现有最准确的测谎仪”）。然而，`Wired`的调查指出，“关于`Converus`技术的唯一经过同行评审的学术研究，是由公司自己的科学家或他们实验室的学生进行的”，这并不特别令人放心，并且明显存在利益冲突。当一家私营公司为其旨在盈利的产品的有效性研究提供资金时，通常会引发质疑——但在这里，该公司不仅资助了研究，还关起门来亲自进行了研究。未参与`Converus`项目的心理学教授约翰·艾伦应`Wired`之邀，阅读了该公司的一些学术论文，试图评估情况。他是这样说的：“我最善意的看法是，它有一些前景，或许通过未来的独立研究，这项测试可以为形成关于欺骗行为的假设提供众多衡量标准之一。但即便如此，这也不是决定性的证据。”这算不上热情洋溢的推荐。


    而且这些学术论文只涵盖了`Converus`进行的较为成功的实验；该公司的首次现场测试暴露了系统的一个明显缺陷，然而这次实验的结果从未公布。`Converus`的首席科学家（也是`EyeDetect`的联合创始人）后来承认了首次现场测试的情况：“尽管数据有限，但当我们测试申请航空公司工作的受过良好教育的人时，[测试]似乎效果不错，但当我们测试教育程度较低的安全公司申请人时，[测试]效果不佳。”这一评论强烈表明，驱动`EyeDetect`的机器学习算法是在一个高度选择性的、不具有代表性的样本上训练的，这在算法世界中是导致有害偏见的常见原因，这种偏见会不成比例地伤害弱势群体。


    在更根本的层面上，首席科学家的评论提出了一个公司似乎尚未回答的尖锐问题：为什么一个人的视觉欺骗指标会取决于其教育水平？测谎的神话是，掩盖欺骗的努力是天生的、普遍的，在不同人群中保持不变——然而这次失败的现场测试表明，情况完全不是这样。这一观察本应动摇`Converus`努力的根基，但该公司似乎只是将其掩盖起来，并向问题投入了更多数据和更多神经网络层。作为非普遍性问题的进一步迹象，请考虑以下备忘录（同样在`Wired`的调查中被披露），这是`Converus`的一位营销经理在
    2016 年写给一个警察局客户的：“请注意，当`EyeDetect`测试作为演示进行时……结果往往与我们看到受测者在有后果的真实测试环境下进行测试时的结果不同。”这里有些东西非常可疑——而且情况更糟。


    根据设计，`EyeDetect`系统允许审查员调整`sensitivity`，即算法判定检测到谎言的阈值。这背后的想法是，某些人群历史上可能比其他人群更诚实，因此在检查每个个体时，如果系统根据该人群的基线水平进行校准，就能产生更准确的结果。用`Converus`总裁兼首席执行官托德·米克尔森的话来说：“这给了所有受测者更公平的被正确分类的机会。大多数组织可以通过考虑先前背景调查失败的数量、面试数据、供词、证据等，来很好地估计基准率。”真的吗？

    '
- fmt: '首先，米克尔森描述的那种数据对大多数组织来说并不可用。其次，他描述的数据已经带有偏见。例如，米克尔森建议基于历史背景调查失败率来设定基准率，但这些历史背景调查涉及什么？很可能是老式测谎仪（已知对少数族裔存在偏见，正如你在库克县案中已经看到的）和旧式私家侦探式调查（没人会认为它们没有偏见）的结合。康维鲁斯公司总裁兼首席执行官的这一声明实际上等于承认，`EyeDetect`鼓励审查员将过去的种族主义和其他形式的歧视嵌入到这项未来主义技术中。即使审查员不依赖有偏见的历史数据，米克尔森似乎也在鼓励他们引入自己个人的当代偏见——只要在审查你不信任的人群时，调高灵敏度就行了！你之前听到的美国公民自由联盟高级政策分析师完美地总结了当前情况：^([^(162)](#fn162))“对测谎仪这类技术的批评是，它们允许偏见悄悄潜入，但在这个案例中，听起来偏见并非悄悄潜入——而是受到热烈欢迎，并被邀请留下来共进晚餐。”


    因此，`EyeDetect`并未以任何传统的、无利益冲突的方式得到科学验证，而且其设计包含一个杠杆，允许审查员将结果向任一方向倾斜。除此之外，它是一个使用专有算法的封闭系统——该算法本身基于黑箱机器学习——因此基本上不可能审查系统的内部运作。尽管老式测谎仪有缺陷，但至少我们知道它究竟在测量什么，以及这些测量结果是如何被解释的，并且至少有一个理论（尽管有缺陷）试图解释为什么这些测量结果与隐藏的欺骗行为相关。另一方面，对于`EyeDetect`，计算机自行决定哪些眼球运动被视为欺骗的指标，并且除了计算机在过去数据中发现的结果之外，没有任何关于这些指标是什么以及它们为何表明欺骗的解释——至少对于其训练所基于的那个规模小且不具代表性的人群而言是这样。


    《连线》杂志的调查敏锐地指出了`EyeDetect`的另一个麻烦问题：“其低廉的价格和自动化操作使其能够以耗时耗力的测谎仪测试永远无法做到的方式进行规模化。”如果它完美运行且没有有害后果，那么规模化将是好事——但考虑到已经讨论过的诸多缺陷，规模化是非常危险的。事实上，这就是有害的数据驱动反馈循环发挥作用的地方，我接下来会解释。


    现在人们普遍认识到，基于某一种族人群训练的面部识别软件在其他人群上表现不佳，并且基本上所有在美国开发的机器学习算法在识别黑人和棕色人种面孔时的表现都比白人面孔差。^([^(163)](#fn163))如果`EyeDetect`能成为这一规律的例外，我会感到震惊，这意味着`EyeDetect`很可能对黑人和棕色人种受测者产生比白人受测者更多的误报。当`EyeDetect`被大规模用于就业筛选时，黑人和棕色人种群体总体上被不公平地排除在劳动力市场之外。剥夺这些人群的就业机会加剧了美国本已严重的种族财富差距，将更多黑人和棕色人种推向贫困。


    但故事并未就此结束。众所周知，与富裕的白人社区相比，警察更积极地巡逻贫困社区，尤其是那些黑人和棕色人种居民比例高的社区。^([^(164)](#fn164))因此，总体而言，即使只是轻微程度，通过使黑人和棕色人种更难找到工作，`EyeDetect`将这些人群推向更容易被捕的环境。现在，真正的关键来了：更高的逮捕率导致背景调查（即使是老式的那种，因为逮捕记录是其主要工具之一）的失败率更高，这反过来又提高了米克尔森提到的用于调整`EyeDetect`灵敏度的“基准率”。可怕的讽刺是，这只会进一步加剧`EyeDetect`输出中的种族差异。


    你明白这一切了吗？总而言之，从总体上看，`EyeDetect`对黑人和棕色人种产生更多误报，这使他们失去工作，将他们推向贫困和警察高度巡逻的社区，导致逮捕记录增加，进而导致背景调查失败，从而引发对`EyeDetect`的重新校准，导致对这些人群产生更多的误报。就这样，有害的歧视性循环一遍又一遍地重复，并且愈演愈烈。你可能会认为这有些牵强——这个过程有这么多步骤，而且多次提到的是总体行为而非个体——但唉，在过去几年里，我们已经了解到这些有害的数据驱动反馈循环是非常真实且非常危险的。如果你不相信，请看看脚注13中的书籍或任何其他关于此主题的优秀著作。


    尽管显然未能通过弗莱普遍接受标准，但在2018年5月，`EyeDetect`首次被用于法庭案件，在新墨西哥州地区法院审理一名被指控强奸一名14岁女孩的前高中教练的案件（陪审团未能达成一致裁决）。^([^(165)](#fn165))
    2019年4月，康维鲁斯在公司网站上发布了一篇博文，^([^(166)](#fn166))鼓励特朗普总统对全体白宫工作人员进行`EyeDetect`测试，并解释了他可以如何操作的后勤细节，以帮助遏制令人尴尬的泄密事件。我想我不需要指出，一家名为“与真理同在”且从事“欺骗检测行业”的公司，竟然在协助一位——怎么说呢——不太诚实的总统向公众隐瞒他的秘密，这其中有多么讽刺。


    不出所料，康维鲁斯并不是唯一一个想要通过机器学习重新发明测谎仪的组织。'
  raw: 'First of all, no, the kind of data Mickelsen describes is not available to
    most organizations. Second, the data he describes is already tainted by bias.
    For example, Mickelsen suggests using base rates based on historical rates of
    failed background checks, but what was involved in those historical background
    checks? Probably a combination of old-school polygraphs (known to be biased against
    minority populations, as you have already seen, for instance, in the Cook County
    case) and old-fashioned private-eye type investigations (which nobody would argue
    are free from bias). This statement by the president and CEO of Converus is in
    effect an admission that EyeDetect encourages examiners to embed racism and other
    forms of discrimination from the past into this futuristic technology. And even
    if the examiner does not rely on biased historical data, Mickelsen seems to be
    encouraging them to introduce their own personal contemporary bias—just crank
    up the sensitivity whenever you’re examining someone from a population you don’t
    trust! The same senior policy analyst with the ACLU that you heard from earlier
    excellently summed up the present situation:^([^(162)](#fn162)) “The criticism
    of technologies like lie detectors is that they allow bias to sneak in, but in
    this case it sounds like bias isn’t sneaking in—it’s being welcomed with open
    arms and invited to stay for dinner.”


    So, EyeDetect is not scientifically proven in any kind of traditional way that
    is free from conflict of interest, and its design includes a lever allowing the
    examiner to skew the results in either direction. On top of this, it is a closed
    system using a proprietary algorithm—which itself is based on black-box machine
    learning—so it is essentially impossible to scrutinize the inner workings of the
    system. As faulty as the old-school polygraph is, at least we know what exactly
    it is measuring and how those measurements are supposedly interpreted, and there
    is at least a theory (albeit a flawed one) trying to explain why those measurements
    correlate with concealed deceit. With EyeDetect, on the other hand, a computer
    decides which eye movements it considers indicators of deceit, and there is no
    explanation of what they are and why they indicate deceit, other than that’s what
    the computer found in past data—at least for the small and nonrepresentative population
    that it was trained on.


    The *Wired* investigation astutely points out yet another troublesome issue with
    EyeDetect: “Its low price and automated operation also allow it to scale up in
    a way that time-consuming and labor-intensive polygraph tests never could.” If
    it worked perfectly and had no harmful consequences, then scaling up would be
    great—but given the many flaws already discussed, scaling up is very dangerous.
    In fact, this is where pernicious data-driven feedback loops come into play, as
    I next explain.


    It is widely recognized now that facial recognition software trained on one racial
    population does not perform well on other populations, and essentially all machine
    learning algorithms developed in the United States perform worse on Black and
    Brown faces than on white faces.^([^(163)](#fn163)) I would be shocked if EyeDetect
    were somehow an exception to this pattern, which means EyeDetect very likely produces
    more false positives for Black and Brown examinees than it does for white examinees.
    When EyeDetect is then used en masse for employment screenings, Black and Brown
    people in the aggregate are unfairly kept out of the workforce. Denying these
    populations jobs exacerbates the already significant racial wealth gap in the
    United States, pushing more Black and Brown people into poverty.


    But the story doesn’t end there. Police are known to more actively patrol impoverished
    communities, especially ones with high proportions of Black and Brown residents,
    compared to wealthy white communities.^([^(164)](#fn164)) So in the aggregate,
    even if just by a small amount, by making it harder for Black and Brown people
    to land jobs, EyeDetect is pushing these populations into environments where they
    are more likely to get arrested. Now here’s the real kicker: this higher arrest
    rate leads to a higher failure rate for background checks (even the old-fashioned
    kind, because arrest records are one of the main tools used for those), which
    in turn boosts the “base rates” Mickelsen mentioned that are used to adjust the
    sensitivity in EyeDetect. The horrible irony is that this just further exacerbates
    the racial discrepancy in EyeDetect’s output.


    Did you catch that all? In summary, and in the aggregate, EyeDetect gives Black
    and Brown people more false positives, which keeps them out of jobs, which pushes
    them into poverty and highly policed neighborhoods, which leads to increased arrest
    records, which leads to failed background checks, which leads to a recalibration
    of EyeDetect that leads to even more false positives for these populations. In
    this way, the harmful discriminatory cycle repeats over and over, intensifying
    as it goes. You might think this is a stretch—there’s so many steps in this process,
    and so many mentions of aggregate behavior rather than individuals—but alas, in
    the past few years we’ve learned that these pernicious data-driven feedback loops
    are very real and very dangerous. If you don’t believe, please take a look at
    the books in Footnote 13 or any of the other excellent writing on the topic.


    Despite pretty clearly not passing the bar of the Frye general acceptance standard,
    in May 2018 EyeDetect was used in a court case for the first time, in a New Mexico
    district court in the trial of a former high school coach accused of raping a
    fourteen-year-old girl (the jury failed to agree on a verdict).^([^(165)](#fn165))
    And in April 2019, Converus published a blog post^([^(166)](#fn166)) on the company
    website encouraging President Trump to administer EyeDetect tests on the entire
    White House staff and explaining the logistics of how he could do this, in an
    effort to help clamp down on embarrassing leaks. I suppose I don’t need to point
    out the irony in a company called “with truth” that works in the “deception detection
    industry” assisting a president who has been, well, let’s just say less than honest,
    conceal his secrets from the public.


    Unsurprisingly, Converus was not the only organization with the idea of reinventing
    the lie detector through machine learning.'
