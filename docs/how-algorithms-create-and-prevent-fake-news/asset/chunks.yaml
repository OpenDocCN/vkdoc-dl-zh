  trans: '

    # 温斯顿对可疑用户的调查


    `温斯顿`调查了该可疑用户的发帖历史，发现其帖子——平均长度惊人地达到六段——正以每分钟一篇的速度涌现。^(³⁷) 在`温斯顿`的业余调查中，他发现该用户已经持续爆发式发帖超过一周。他注意到，到周末时这些爆发式发帖的长度显著增加——这让`温斯顿`怀疑该用户要么是变得更加大胆，要么甚至希望被“抓住”。`温斯顿`立刻怀疑该用户依赖的是`GPT-3`。“有好几次，我谷歌搜索了帖子中那些听起来很聪明的句子，”他说，“以为会发现它们是从网上抄袭的。但每次谷歌都显示零结果。”这反而加深了他的怀疑，因为人类写出的巧妙措辞往往是对其他来源的引用。而`GPT-3`并非在引用，它是在创造。


    急于解决此事，`温斯顿`找到了一个讨论`GPT-3`的子版块，并在其中发帖询问那里的专家是否认为这个可疑用户是一个由`GPT-3`驱动的机器人。几分钟内，他的怀疑就得到了证实，因为有人精准指出了几乎肯定被使用的、源自`GPT-3`的特定产品。它叫做`哲学家
    AI`，通过依赖这个而非直接使用`GPT-3`，该用户不仅能够获得未经授权的服务访问权限，甚至还能规避商业用户通常需要支付的费用。`温斯顿`将情况告知了`哲学家
    AI`的开发者，后者立即阻止了该特定用户的访问。一小时内，这个 Reddit 用户的帖子便不再出现。案件告破。


    从这个故事中得出的一个明确教训是，创建一个`GPT-3`机器人远比发现它要容易和快速得多。只有时间才能告诉我们`GPT-3`机器人会变得多么猖獗，以及它们在虚假信息宣传活动中不可避免的崛起会对社会产生多大影响。在本章末尾，我将讨论一些目前正在开发的、用于对抗被武器化的`GPT-3`的
    AI 驱动工具。但首先，是时候审视一下这台机器中的具体构造了。


    ## 机器学习速成课


    `监督学习`是机器学习的一个庞大分支，其目标首先是在一个称为`训练`的过程中从数据中学习模式，然后利用这些模式进行数据驱动的预测。我现在将简要解释这意味着什么，然后概述它如何被用于驱动本章重点关注的文本和照片生成
    AI 算法。


    ### 监督学习


    我们通常从电子表格形式的数据开始，其中列对应变量，行指定这些变量的实例（换句话说，每一行都是一个数据点）。每个变量可以是`数值型`（测量连续量，如身高或体重，或离散量，如鞋码），也可以是`类别型`（其中每个实例取有限数量的非量化值之一，如性别或当前居住州）。在监督学习框架中，我们首先挑出一个变量作为`目标`（这是我们将根据其他变量的值尝试预测的变量）；所有其他变量则被视为`预测变量`。^(³⁸)
    例如，我们可能尝试根据一个人的身高、体重、性别和居住州来预测其鞋码（像这样的数值预测称为`回归`），或者我们可能尝试根据一个人的身高、体重、鞋码和居住州来预测其性别（像这样的类别预测称为`分类`）。


    有一些流行的监督学习算法，其中大部分主要是在 20 世纪 90 年代发展起来的。每种算法都基于假设目标变量依赖于预测变量的总体方式，然后在训练过程中微调这种关系。例如，如果你想根据身高和体重预测鞋码，分别称之为`y`、`x[1]`和`x[2]`，并且你预期这种关系是线性的，那么你可以使用一个线性算法，该算法从一个形式为`y
    = a[1] * x[1] + a[2] * x[2] + c`的方程开始，其中`a[1]`、`a[2]`和`c`是在训练过程中被“学习”的、称为`参数`的数字。这意味着算法被输入大量数据行，并从中尝试推导出参数的最佳值（这里的“最佳”意味着，平均而言，由这个线性公式给出的`y`值尽可能接近鞋码目标变量的实际值）。


    更复杂的算法依赖于更复杂的公式，但整体过程是相同的：算法利用数据调整其内部公式中的所有参数，使得公式的输出尽可能接近数据中目标变量的实际值。这被称为`训练`算法，或将其`拟合`到数据。一旦完成，我们就可以拿一个算法从未见过的新数据点（我们只有预测变量的值，而没有目标变量的值），然后将这些预测变量的值代入算法已拟合的公式中。我们得到的输出就是算法对该数据点目标变量值的最佳猜测（或`预测`）。


    监督学习中最大的挑战之一是选择一组好的预测变量。例如，你可能会觉得在尝试预测一个人的鞋码时，包含其居住州很奇怪；事实证明，一般来说，包含不相关的变量不仅无助于算法的预测能力——实际上还会使其更差。类似地，包含冗余变量（例如一个人的身高（英寸）和身高（厘米））甚至只是高度相关的变量（例如身高和体重）有时也会导致算法表现更差。另一方面，没有包含足够的预测变量也可能有问题——例如，仅知道一个人的身高和体重可能不足以预测其鞋码，但如果我们还知道其性别，那么成功的机会就会更大。


    机器学习从业者常常花费数小时尝试不同的预测变量组合，并从原始变量中手动构建可能比原始变量表现更好的新变量。例如，与其分别使用身高和体重，不如将两者相加，创建一个衡量整体大小的新单一指标。知道如何有效地做到这一点既是一门科学，也是一门艺术，而该领域的一个长期圣杯就是找到自动化这一过程的方法。这便引出了我们机器学习的下一个主题。

    '
- fmt: '### Deep Learning


    The biggest advance in machine learning since the 1990s is unquestionably *deep
    learning*, which blossomed to truly revolutionary levels throughout the past decade.
    For the purposes of this book, it isn’t necessary to understand the *neural network*
    foundations that underlie deep learning. (Roughly speaking, neural networks provide
    a structured but flexible way of writing nonlinear formulas for the target variable
    `y` in terms of the predictor `x` variables that are loosely inspired by the architecture
    of the brain.) What is important to understand with deep learning is that you
    can include as many predictors as you want, and during the training process, the
    algorithm on its own will figure out how to transform these into a new collection
    of predictors that encode higher-level conceptualizations of the data and typically
    perform far better than the original collection—at least when very large volumes
    of training data are involved. These algorithmically derived predictors are organized
    in a hierarchical manner, with higher-level predictors corresponding to the deeper
    layers of neurons in the neural network.


    Image processing provides an illustrative example to consider. The original predictors
    are the numerical color values of each pixel in the image, which fully encodes
    the raw data but doesn’t have any spatial awareness: each pixel is unaware of
    the values of its neighboring pixels. When training a deep learning algorithm
    for a supervised task such as facial recognition, the neural network learns from
    the data (which is many images of faces) how to organize these pixel values into
    more coherent and conceptual predictors. For instance, lower-level predictors
    typically indicate the location of high-contrast edges in the image; mid-level
    predictors might then use these edge locations to express the location and shape
    of facial features such as eyes and nose and mouth; then higher-level predictors
    might put these facial feature locations and shapes together to form new predictors
    that hint at concepts like gender, ethnicity, etc. This explanation is an idealized
    and rather anthropomorphized version of what really happens inside the black box
    of the neural network, but it at least gives a general sense of the way hierarchical
    structure emerges from the data in deep learning.


    ### GPT-3


    Remarkably, you already have enough technical background now to learn how the
    text generation algorithm `GPT-3` works! It is just a specific deep learning approach
    to the supervised learning task of predicting the next word in a sentence. A data
    point is a block of text, the predictor variables are all the words except for
    the last one, and the target variable is the final word. Training the algorithm
    means feeding it lots of text and steadily adjusting the internal parameters so
    that the words predicted by the algorithm match the actual words as often as possible.


    A crucial point here is that this form of supervised learning is actually *self-supervised*:
    instead of needing a human to record the value of the target variable for each
    training data point (e.g., manually typing the name of the main object in each
    photo when training for image recognition), the target values come directly from
    the text as much as the predictor values do. This is what enables the algorithm
    to be trained on unfathomably large data sets. Indeed, `GPT-3` was trained on
    text containing about five hundred billion words. About eighty-six percent of
    this training text came from the Web, and the rest was from scanned books. To
    get a sense of the scope of this, consider the following remarkable fact: the
    entirety of Wikipedia was included in `GPT-3`’s training text, and it only accounted
    for about half a percent of the full training text.


    Since `GPT-3` relies on deep learning, we know that layers of the neural network
    learn through the training process to create a hierarchical organization of predictors
    that in some way encode hierarchical linguistic structure. I’d like to say that
    the lower layers focus on short-range grammatical and syntactical aspects of each
    sentence, while the higher layers might focus instead on larger-scale semantics
    such as plot, characters, narrative continuity, etc.—but we really don’t know
    too much about what happens inside the mind of `GPT-3` in a detailed conceptual
    sense like this.


    The overall design of `GPT-3` is the same as that of `GPT-2`—what changed is the
    number of parameters the algorithm relies on and the size of the text data set
    used in the training process. The original `GPT` (released in 2018) had just over
    one hundred million parameters; `GPT-2` (released in 2019) had one and a half
    billion parameters; `GPT-3` (released in 2020) has one hundred seventy-five billion
    parameters. The training set also grew considerably with each iteration. The training
    of these algorithms happens in advance and was an expensive endeavor; Sam Altman,
    the CEO of OpenAI, has suggested^([^(39)](#fn39)) that the one-time cost for the
    cloud computing resources used to train `GPT-3` ran to tens of millions of dollars.
    Luckily, training of the algorithm only occurs once and OpenAI footed the bill
    for it.


    After `GPT-3` finished reading through its massive training data set of text a
    sufficient number of times, it locked the values of all its internal parameters
    and was then ready for public use (at least, for those granted access). Each user
    can input a block of text, and the algorithm will generate text to extend it as
    long as one would like. Internally, the algorithm takes the original input text
    and predicts the next word after it (as it was trained to do), and then it appends
    this predicted word to the input words and uses this to predict the next word,
    etc.^([^(40)](#fn40)) Thus, it writes text one word at a time—as a human also
    does—always by choosing words based on the words already written on the page.
    Importantly, no computer skills or statistical knowledge are required to use `GPT-3`;
    the user really just plugs in the initial text prompt, and the algorithm does
    the rest.


    Having discussed the technical side of text generation, I can now turn to the
    technical side of photo generation.'
