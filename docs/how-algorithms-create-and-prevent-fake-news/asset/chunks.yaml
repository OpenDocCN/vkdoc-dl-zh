  trans: '

    BERT 通过一个大规模的**自监督预训练**过程来学习其上下文词嵌入，这个过程与 GPT-3 有些相似。你可能还记得第 2 章的内容，GPT-3 被喂入了海量文本，在阅读过程中，它利用前面的单词来尝试预测下一个单词。BERT
    的自监督训练过程也涉及阅读海量文本，但不同的是，其中一定百分比的单词会被随机遮蔽（对算法隐藏）。BERT 通过猜测这些缺失的单词来学习如何“预测”它们，然后解除遮蔽，并利用猜测结果与实际未遮蔽单词之间的差异作为误差，通过神经网络进行反向传播并调整所有参数，从而使猜测随着时间的推移变得越来越准确。通过这种方式，BERT
    被训练来预测缺失的单词。BERT 的最终目标并非预测单词，但能够很好地预测单词被认为是理解单词的一个良好替代指标；或者，从更技术的角度来看，BERT 在训练隐藏单词预测时内部开发的上下文向量嵌入，结果证明对广泛的语言任务都非常有用。


    实际上，这个遮蔽单词任务帮助 BERT 学习每个句子语境中的单词，但为了获得更全局的视角，它同时还在一个自监督的句子预测任务上进行训练：它被展示来自训练文本的句子对，并学习估计一个句子紧跟在另一个句子之后的概率。这个任务有助于词嵌入编码超越单个句子的更大范围的意义。如果你好奇的话，BERT
    名称中的*双向*（Bidirectional）指的是它从左到右和从右到左两个方向阅读训练文本，以便为每个单词获取过去和未来的上下文。这样做是合理的，恰恰因为与
    GPT-3 不同，BERT 的目标不是预测未来的单词——它的目标是生成尽可能多地汲取上下文的词嵌入。名称中的*编码器表示*（Encoder Representations）部分仅表示单词被编码为向量表示，而其中的*Transformer*指的是一种特定的深度学习架构。


    当你在谷歌中输入一个搜索短语时，你提供的不仅仅是一组要匹配的关键词——你通常提供的是一个语法文本片段，谷歌的搜索算法需要理解它。BERT 就是那个中间服务，它将你的搜索短语翻译成一组向量，然后搜索算法可以对这些向量进行量化处理。在
    2019 年 10 月一篇宣布将 BERT 整合到谷歌搜索算法的公司博客文章中，谷歌搜索副总裁表示^(²²⁵)，“搜索关乎理解语言”，而 BERT 确实是让计算机更好地理解人类语言方面最成功的进步之一。


    这篇谷歌博客文章还提到，“在结果排名方面，BERT 将帮助搜索更好地理解美国英语中十分之一的搜索”，并且“特别是对于更长、更口语化的查询，或者像‘for’和‘to’这样的介词对含义至关重要的搜索，搜索将能够理解你查询中单词的上下文。”为了说明用户应该期待哪些类型的改进，该博客文章包含了一个用户搜索“Can
    you get medicine for someone pharmacy”的例子。以前，排名靠前的搜索结果是一篇包含所有这些单个单词的文章，但它并没有回答用户试图提出的问题；而借助新的
    BERT 驱动的搜索，排名靠前的结果是一篇专门讨论人们何时以及如何在药房为他人取药的文章。


    谷歌显然低估了自己“十分之一”的说法，因为几乎整整一年后，在另一篇公司博客文章^(²²⁶)中，谷歌宣称“BERT 现在几乎被用于每一个英语查询中”。2020
    年 9 月，谷歌宣布^(²²⁷)BERT 也被用于“改善新闻报道与现有事实核查之间的匹配”。在第 9 章中，我将深入介绍事实核查工具；目前，这里相关的是，BERT
    被用于自动扫描人工事实核查报告列表，并找出哪些报告与给定的新闻文章相关。


    但 BERT 也在最近一场让谷歌登上新闻、形象受损的争议中扮演了重要角色。斯坦福大学培养的计算机科学家蒂姆尼特·格布鲁是全球人工智能伦理和算法偏见领域的顶尖专家之一；她是“*Black
    in AI*”组织的联合创始人；并且，直到最近，她一直是谷歌伦理人工智能团队的领导者之一。但她于 2020 年 12 月突然被谷歌解雇。^(²²⁸)当时她正与几位谷歌员工合作撰写一篇研究论文，这时上级要求她要么撤回论文，要么从论文中删除所有谷歌员工的名字。她拒绝了，并要求知道是谁提出了这个奇怪的要求以及背后的理由，但谷歌领导层拒绝了她的要求，反而解雇了她。


    这一举动不仅令格布鲁本人震惊，也令整个 AI 界震惊。格布鲁因其重要的开创性工作而广受尊敬和认可；谷歌对此事的铁腕处理方式让大多数人感到不满。谷歌审查并随后解雇一位在伦理团队担任领导职务的、受人尊敬且深受喜爱的黑人女性
    AI 研究员，至少可以说，这给人的观感非常糟糕。而最初引发所有这些争议的格布鲁的研究论文主题是什么？这篇论文的标题是《论随机鹦鹉的危险：语言模型能太大吗？》，内容涉及像
    BERT 这样的大型深度学习语言模型所带来的危险——从环境成本到难以理解性，再到有害的偏见。


    我们现在来到这个冗长章节以及整章的最后一个主题，即谷歌如何一直试图调整其算法，以便准确的信息能排在搜索结果的前列，而虚假新闻则被降级到搜索结果的后续页面。

