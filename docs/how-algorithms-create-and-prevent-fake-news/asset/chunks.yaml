- fmt: "# Perils of Pageview\n\nThe Data-Driven Economics of Online Journalism\n\n\
    > *The economics of the Internet created a twisted set of incentives that make\
    \ traffic more important—and more profitable—than the truth.*\n> \n> —Ryan Holiday,\
    \ *Trust Me, I’m Lying: Confessions of a Media Manipulator*\n\nMuch of what we\
    \ know, or think we know, about what is happening in the world we learn by reading\
    \ the news. But nowadays “the news” means something different than it did in generations\
    \ past. What we read primarily today are articles on the internet—everything ranging\
    \ from casual blog posts to meticulously researched stories on national and international\
    \ news sites. The transition of journalism from print to screen does not inherently\
    \ mean what we read is less truthful than it used to be. However, this technological\
    \ transformation has enabled a less overt but nonetheless extraordinarily influential\
    \ economic transformation: the *datafication* of the journalism industry. The\
    \ pageviews and clicks we all sprinkle across the internet are, as I will discuss,\
    \ the digital fertilizer feeding a burgeoning garden of misinformation and fake\
    \ news. By tracing the financial incentives involved in the contemporary news\
    \ cycle, I hope in this chapter to convey the alarming extent that data, unseen\
    \ to most of us yet created by our actions and activities, is fundamentally shaping\
    \ what we read every day and threatening the bulwark of traditional journalistic\
    \ standards.\n\n## Propagation of Stories\n\nLet me start with a taxonomy of sorts.\
    \ At the bottom of the internet media food chain, if you will, are small blogs\
    \ and websites that cover very focused issues, interests, or regions; these can\
    \ be single author or multi-author. The next tier up comprises the blogs of newspapers,\
    \ magazines, and television stations. This is a confusing middle ground because\
    \ many of these blogs share the name, URL, and logo of a recognizable news source\
    \ yet the editorial standards are generally lower than those of the parent organization,\
    \ and many of the contributors lack the journalistic training one might expect\
    \ from the parent organization. Then at the top are the official news sites, which\
    \ can be regional but tend to draw a large national or international readership.\
    \ This hierarchy is not about quality—indeed, some very focused small blogs produce\
    \ content of extremely high quality, while some big-name national news sites consistently\
    \ publish articles of seriously questionable accuracy. The levels here are more\
    \ about the size of both the audience and the organization and about the scope\
    \ of the content.\n\nInformation flows both vertically and horizontally through\
    \ this internet news hierarchy. When the *Washington Post* breaks a big story,\
    \ it is only a matter of hours before the *New York Times* covers it as well,\
    \ and vice versa, often simply by reporting what was reported in the other newspaper’s\
    \ article. This is *horizontal propagation*, and it happens because even though\
    \ the second newspaper cannot claim credit for breaking the story, it does not\
    \ want its readership to obtain this information directly from the competitor\
    \ newspaper. *Vertical propagation* happens in two directions. A big story broken\
    \ at the top will be covered and duplicated by smaller news organizations and\
    \ blogs because, similar to horizontal propagation, this is an easy way of keeping\
    \ readers without doing much work; this is a *downward* flow of information.\n\
    \nWhile there is an obvious redundancy, hence an overall systemic inefficiency,\
    \ to both horizontal propagation and downward vertical propagation, the only real\
    \ harm to the truth-seeking reader is that important details might be omitted\
    \ and facts distorted as the story is passed from organization to organization—though\
    \ sometimes a more specialized blog will provide a valuable service by delving\
    \ deeper into a particular facet of the story than would be appropriate for the\
    \ top-level organization. It can be quite illuminating to find a story that was\
    \ broken by one newspaper and then compare its coverage across a range of other\
    \ newspapers and blogs; this is an excellent way to uncover the ideological inclinations\
    \ of different organizations, since the same set of facts will be colored by the\
    \ different viewpoints involved.\n\nThe remaining form of journalistic propagation\
    \ is the *upward* vertical flow, where stories start at small blogs and sometimes\
    \ end all the way up at national news sites. This is one of the key topics of\
    \ this chapter because it is responsible for a staggering amount of the misreporting\
    \ and outright fake news that we see, and it is driven almost entirely by data\
    \ and the economics of modern media. Before exploring this specific topic, it\
    \ helps to take a step back and look at the financial forces driving blogs and\
    \ newspapers; throughout, I take a broad view of “blogging” to include essentially\
    \ all forms of posting written content online."
