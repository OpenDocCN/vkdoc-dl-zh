    only visible on a Birdwatch website, but Twitter said it plans to expand the program
    and to eventually make the notes visible directly on the tweets they pertain to
    “when there is consensus from a broad and diverse set of contributors.”


    ## Summary


    This chapter opened with a list of publicly available tools that use machine learning
    to assist with fact-checking tasks, and it closed with a brief discussion of the
    fact-checking tools and activities at Google, YouTube, Facebook, and Twitter.
    Now you can go forth and do your own part in the fight against fake news!'
  trans: '

    ### Facebook


    除了上一章所述删除或降低可疑内容排名的努力外，Facebook 还与多家事实核查组织合作，为某些类型的误导性帖子提供警告、额外背景信息和事实核查。在 2020
    年大选前的九个月里，Facebook 对近两亿条经第三方事实核查机构辟谣的内容加贴了警告标签。上一章描述的 Facebook 内容标记系统用于识别需要事实核查的帖子；随后——与我们之前看到的某些公共事实核查工具类似——机器学习被用于根据所涉及的声明对帖子进行分组，以减少人工需要执行的事实核查数量。


    由于信息（以及错误信息）通常以视觉迷因的形式在 Facebook 上传播，该公司特别致力于开发能够判断两张图片内容是否相似的机器学习方法。与反向图片搜索中将整张图片输入自动编码器不同，Facebook
    的方法是先识别照片中的关键对象，然后在自动编码过程中仅使用包含这些对象的子区域。一篇公司博客文章^(³⁵⁹)解释道：“这使我们能够找到那些使用了我们已标记图片中部分元素的声明复制品，即使整体图片彼此差异很大。”此外，`RoBERTa`的一个扩展版本也被用于将词嵌入和句子嵌入与图像嵌入相结合，类似于上一章提到的该公司“整体性”内容检测方法。


    2016 年大选后与 Facebook 合作的事实核查组织之一是`Snopes`，但经过两年合作后，`Snopes`于 2019 年 2 月决定退出合作。`Snopes`就此事的官方声明^(³⁶⁰)中包含以下评论：“目前我们正在评估提供第三方事实核查服务的后果与成本，我们希望确切地确定，我们协助任何特定平台的努力，对我们的在线社区、出版物和员工而言，是否净收益为正。”在该声明发布当天的一篇采访^(³⁶¹)中，`Snopes`运营副总裁澄清说，这一决定背后的主要问题是，仅雇佣了
    16 名员工的`Snopes`被 Facebook 要求的大量事实核查工作压得喘不过气，并质疑这种劳动密集型方法对双方是否合理。他暗示，或许`Snopes`有限的资源最好用在别处，或许
    Facebook 需要找到一种更有效的方式来限制其平台上虚假新闻的传播。他还抱怨了 Facebook 专有的、针对特定平台的事实核查方法：“事实核查人员所做的工作不必仅仅为了
    Facebook——我们可以为事实核查人员构建惠及整个网络的东西，这也能帮助 Facebook。”另一名`Snopes`员工表示，该组织应回归其原创报道的重点，而不是因处理
    Facebook 上铺天盖地的事实核查请求而分散精力。


    ### Twitter


    2020 年 6 月，就在开始标记特朗普总统的一些推文为“可能具有误导性”或“美化暴力”的几天后，Twitter 在一系列推文^(³⁶²)中讨论了该平台在公共话语方面“提供背景信息，而非进行事实核查”的重点。在很大程度上，Twitter
    选择了极简主义的方法，仅在有限的情况下链接到事实核查网站。2021 年 1 月，Twitter 启动^(³⁶³)了一个名为`Birdwatch`的小型实验性“社区驱动”试点项目，在该项目中，一组经过筛选的用户可以为任何人的推文添加注释，以提供额外的背景信息。最初，只有一千名用户能够撰写这些注释，并且它们仅在`Birdwatch`网站上可见，但
    Twitter 表示计划扩大该项目，并最终“在获得广泛且多样化的贡献者共识时”，使这些注释直接显示在其所关联的推文上。


    ## 总结


    本章以一系列利用机器学习辅助事实核查任务的公开可用工具开篇，并以对 Google、YouTube、Facebook 和 Twitter 的事实核查工具及活动的简要讨论收尾。现在，你可以行动起来，为打击虚假新闻贡献自己的一份力量！

    '
