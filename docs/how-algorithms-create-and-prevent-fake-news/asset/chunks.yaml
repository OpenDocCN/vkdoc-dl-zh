- fmt: '### Suggesting Hate


    In December 2016, it was reported in the *Guardian* that Google’s suggested autocompletes
    for the phrase “are Jews” included “evil,” and for “are Muslims” they included
    “bad.” Several other examples of offensive autocompletes were also found. In response,
    a Google representative said the following: “Our search results are a reflection
    of the content across the web. This means that sometimes unpleasant portrayals
    of sensitive subject matter online can affect what search results appear for a
    given query. These results don’t reflect Google’s own opinions or beliefs.” This
    refrain—that Google isn’t racist, it’s merely reflecting racism in society—has
    been a recurring defense throughout all these scandals. Google’s response to this
    *Guardian* article went on to explain that its algorithmically generated autocomplete
    predictions “may be unexpected or unpleasant,” but that “We do our best to prevent
    offensive terms, like porn and hate speech, from appearing.”


    On the official company blog, Google explains that autocomplete is really providing
    “predictions” rather than “suggestions”—meaning it is using machine learning trained
    on the company’s vast database of searches to estimate the words most likely to
    follow the words the user has typed so far. In other words, Google is not trying
    to suggest what you should search for, it is just trying to figure out what is
    most probable that you will be searching for based on what you have typed so far.
    The Google blog explains that the autocomplete algorithm makes these statistical
    estimates based on what other users have searched for historically, what searches
    are currently trending, and also—if the user is logged in—your personal search
    history and geographic location.


    Google is smart enough to moderate (both algorithmically and manually) the results
    of this machine learning prediction system. The company blog states that “Google
    removes predictions that are against our autocomplete policies, which bar: sexually
    explicit predictions that are not related to medical, scientific, or sex education
    topics; hateful predictions against groups and individuals on the basis of race,
    religion or several other demographics; violent predictions; dangerous and harmful
    activity in predictions.” It says that a “guiding principle” here is to “not shock
    users with unexpected or unwanted predictions.” In case you lost track, this means
    Google has said that its autocompletes may be “unexpected or unpleasant,” but
    they aren’t supposed to be “unexpected or unwanted.” Confused yet? I know that
    I am.


    A Google spokesperson said the company took action within hours of being notified
    of the offensive autocompletes uncovered by the *Guardian* article. However, the
    *Guardian* found that only some of the offensive examples listed in that article
    were removed; others remained. Evidently, Google’s “guiding principle” is difficult
    to implement uniformly and incontrovertibly in practice. A little over a year
    later, in a February 2018 UK parliamentary hearing, Google’s vice president of
    news admitted that “As much as I would like to believe our algorithms will be
    perfect, I don’t believe they ever will be.”


    An investigation was published in *Wired* just a few days after this UK hearing,
    finding that “almost a year after removing the ‘are jews evil?’ prompt, Google
    search still drags up a range of awful autocomplete suggestions for queries related
    to gender, race, religion, and Adolf Hitler.” To avoid possibly misleading results,
    the searches for this *Wired* article were conducted in “incognito” mode, meaning
    Google’s algorithm was only using general search history data rather than user-specific
    data. The top autocompletes for the prompt “Islamists are” were, in order of appearance,
    “not our friends,” “coming,” “evil,” “nuts,” “stupid,” and “terrorists.” The prompt
    “Hitler is” yielded several reasonable autocompletes as well as two cringeworthy
    ones: “my hero” and “god.” The first autocomplete for “white supremacy is” was
    “good,” whereas “black lives matter is” elicited the autocomplete “a hate group.”
    Fortunately, at least, the top link for the search “black lives matter is a hate
    group” was to a Southern Poverty Law Center post explaining why BLM is not, in
    fact, a hate group. Sadly, however, one of the top links for the search “Hitler
    is my hero” was a headline proclaiming “10 Reasons Why Hitler Was One of the Good
    Guys.”


    Strikingly, the prompt “blacks are” had only one autocomplete, which was “not
    oppressed,” and the prompt “feminists are” also only had a single autocomplete:
    “sexist.” Google had clearly removed most of the autocompletes for these prompts
    but missed these ones which are still biased and a potentially harmful direction
    to send unwitting users toward. Some things did improve in the year between the
    original *Guardian* story and the *Wired* follow-up. For instance, the prompt
    “did the hol” earlier autocompleted to “did the Holocaust happen,” and then the
    top link for this completed search was to the neo-Nazi propaganda/fake news website
    *Daily Stormer*, whereas afterward this autocomplete disappeared, and even if
    a user typed the full search phrase manually, the top search result was, reassuringly,
    the Holocaust Museum’s page on combatting Holocaust denial.


    It’s difficult to tell how many of the autocomplete and search improvements that
    happen over time are due to specific ad hoc fixes and how many are due to overall
    systemic adjustments to the algorithms. On this matter, a Google spokesperson
    wrote: “I don’t think anyone is ignorant enough to think, ‘We fixed this one thing.
    We can move on now’.” It is important to remember that when it comes to hate,
    prejudice, and disinformation, Google—like many of the other tech giants—is up
    against a monumental and mercurial challenge.


    One week after the *Wired* article, it was noted that the top autocomplete for
    “white culture is” was “superior”; the top autocompletes for “black culture is”
    were “toxic,” “bad,” and “taking over America.” Recall that in 2014, Ferguson,
    Missouri, was the site of a large protest movement responding to the fatal police
    shooting of an eighteen-year-old Black man named Michael Brown. In February 2018,
    the autocompletes for “Ferguson was” were, in order: “a lie,” “staged,” “not about
    race,” “a thug,” “planned,” “he armed,” “a hoax,” “fake,” “stupid,” and “not racist”;
    the top autocompletes for “Michael Brown was” were “a thug,” “no angel,” and “a
    criminal.”


    While drafting this chapter in November 2020, I was curious to see how things
    had developed since the articles discussed here. After switching to incognito
    mode, I typed “why are black people” and Google provided the following autocompletes:
    “lactose intolerant,” “’s eyes red,” “faster,” “called black,” and “’s palms white.”
    Somewhat strange, but not the most offensive statements. I was relieved to see
    that Google had indeed cleaned up its act. But then, before moving on, I decided
    to try modifying the prompt very slightly: “why do black people” (just changing
    the “are” to “do”). The autocompletes this produced absolutely shocked and appalled
    me. In order, the top five were “sag their pants,” “wear white to funerals,” “resist
    arrest,” “wear durags,” and “hate jews.” How it is deemed even remotely acceptable
    to use an algorithm to broadcast such harmful vitriol and misinformation to any
    of the billions of people who naively seek information from Google is simply beyond
    me.


    In addition to all these autocompletes that are wrong in a moral sense, many autocompletes
    are just plain wrong in a literal, factual sense, as I next discuss.'
  raw: '### Suggesting Hate


    In December 2016, it was reported^([^(198)](#fn198)) in the *Guardian* that Google’s
    suggested autocompletes for the phrase “are Jews” included “evil,” and for “are
    Muslims” they included “bad.” Several other examples of offensive autocompletes
    were also found. In response,^([^(199)](#fn199)) a Google representative said
    the following: “Our search results are a reflection of the content across the
    web. This means that sometimes unpleasant portrayals of sensitive subject matter
    online can affect what search results appear for a given query. These results
    don’t reflect Google’s own opinions or beliefs.” This refrain—that Google isn’t
    racist, it’s merely reflecting racism in society—has been a recurring defense
    throughout all these scandals. Google’s response to this *Guardian* article went
    on to explain that its algorithmically generated autocomplete predictions “may
    be unexpected or unpleasant,” but that “We do our best to prevent offensive terms,
    like porn and hate speech, from appearing.”


    On the official company blog, Google explains^([^(200)](#fn200)) that autocomplete
    is really providing “predictions” rather than “suggestions”—meaning it is using
    machine learning trained on the company’s vast database of searches to estimate
    the words most likely to follow the words the user has typed so far.^([^(201)](#fn201))
    In other words, Google is not trying to suggest what you should search for, it
    is just trying to figure out what is most probable that you will be searching
    for based on what you have typed so far. The Google blog explains that the autocomplete
    algorithm makes these statistical estimates based on what other users have searched
    for historically, what searches are currently trending, and also—if the user is
    logged in—your personal search history and geographic location.


    Google is smart enough to moderate (both algorithmically and manually) the results
    of this machine learning prediction system. The company blog states that “Google
    removes predictions that are against our autocomplete policies, which bar: sexually
    explicit predictions that are not related to medical, scientific, or sex education
    topics; hateful predictions against groups and individuals on the basis of race,
    religion or several other demographics; violent predictions; dangerous and harmful
    activity in predictions.” It says that a “guiding principle” here is to “not shock
    users with unexpected or unwanted predictions.” In case you lost track, this means
    Google has said that its autocompletes may be “unexpected or unpleasant,” but
    they aren’t supposed to be “unexpected or unwanted.” Confused yet? I know that
    I am.


    A Google spokesperson said the company took action within hours of being notified
    of the offensive autocompletes uncovered by the *Guardian* article. However, the
    *Guardian* found^([^(202)](#fn202)) that only some of the offensive examples listed
    in that article were removed; others remained. Evidently, Google’s “guiding principle”
    is difficult to implement uniformly and incontrovertibly in practice. A little
    over a year later, in a February 2018 UK parliamentary hearing, Google’s vice
    president of news admitted that “As much as I would like to believe our algorithms
    will be perfect, I don’t believe they ever will be.”


    An investigation^([^(203)](#fn203)) was published in *Wired* just a few days after
    this UK hearing, finding that “almost a year after removing the ‘are jews evil?’
    prompt, Google search still drags up a range of awful autocomplete suggestions
    for queries related to gender, race, religion, and Adolf Hitler.” To avoid possibly
    misleading results, the searches for this *Wired* article were conducted in “incognito”
    mode, meaning Google’s algorithm was only using general search history data rather
    than user-specific data. The top autocompletes for the prompt “Islamists are”
    were, in order of appearance, “not our friends,” “coming,” “evil,” “nuts,” “stupid,”
    and “terrorists.” The prompt “Hitler is” yielded several reasonable autocompletes
    as well as two cringeworthy ones: “my hero” and “god.” The first autocomplete
    for “white supremacy is” was “good,” whereas “black lives matter is” elicited
    the autocomplete “a hate group.” Fortunately, at least, the top link for the search
    “black lives matter is a hate group” was to a Southern Poverty Law Center post
    explaining why BLM is not, in fact, a hate group. Sadly, however, one of the top
    links for the search “Hitler is my hero” was a headline proclaiming “10 Reasons
    Why Hitler Was One of the Good Guys.”


    Strikingly, the prompt “blacks are” had only one autocomplete, which was “not
    oppressed,” and the prompt “feminists are” also only had a single autocomplete:
    “sexist.” Google had clearly removed most of the autocompletes for these prompts
    but missed these ones which are still biased and a potentially harmful direction
    to send unwitting users toward. Some things did improve in the year between the
    original *Guardian* story and the *Wired* follow-up. For instance, the prompt
    “did the hol” earlier autocompleted to “did the Holocaust happen,” and then the
    top link for this completed search was to the neo-Nazi propaganda/fake news website
    *Daily Stormer*, whereas afterward this autocomplete disappeared, and even if
    a user typed the full search phrase manually, the top search result was, reassuringly,
    the Holocaust Museum’s page on combatting Holocaust denial.


    It’s difficult to tell how many of the autocomplete and search improvements that
    happen over time are due to specific ad hoc fixes and how many are due to overall
    systemic adjustments to the algorithms. On this matter, a Google spokesperson
    wrote: “I don’t think anyone is ignorant enough to think, ‘We fixed this one thing.
    We can move on now’.” It is important to remember that when it comes to hate,
    prejudice, and disinformation, Google—like many of the other tech giants—is up
    against a monumental and mercurial challenge.


    One week after the *Wired* article, it was noted^([^(204)](#fn204)) that the top
    autocomplete for “white culture is” was “superior”; the top autocompletes for
    “black culture is” were “toxic,” “bad,” and “taking over America.” Recall that
    in 2014, Ferguson, Missouri, was the site of a large protest movement responding
    to the fatal police shooting of an eighteen-year-old Black man named Michael Brown.
    In February 2018, the autocompletes for “Ferguson was” were, in order: “a lie,”
    “staged,” “not about race,” “a thug,” “planned,” “he armed,” “a hoax,” “fake,”
    “stupid,” and “not racist”; the top autocompletes for “Michael Brown was” were
    “a thug,” “no angel,” and “a criminal.”


    While drafting this chapter in November 2020, I was curious to see how things
    had developed since the articles discussed here. After switching to incognito
    mode, I typed “why are black people” and Google provided the following autocompletes:
    “lactose intolerant,” “’s eyes red,” “faster,” “called black,” and “’s palms white.”
    Somewhat strange, but not the most offensive statements. I was relieved to see
